- fmt: '### Elevating Quality Journalism


    In February 2019, at an international security conference in Munich, Google released
    a white paper^([^(229)](#fn229)) on the company’s efforts “to tackle the intentional
    spread of misinformation—across `Google Search`, `Google News`, `YouTube` and
    our advertising systems.” While mostly repeating the philosophies and general
    approaches that were already sprinkled across various Google blog posts and corporate
    documents (and already mentioned in this chapter), this white paper does include
    a few remarks and insights that helpfully shine some additional light on certain
    details.


    In attempting to elevate quality journalism, Google’s search ranking algorithm
    needs to assess the trustworthiness of news sites. The white paper clarifies that
    these assessments are not just overall measures, they depend specifically on the
    scope of the search phrase: “For instance, a national news outlet’s articles might
    be deemed authoritative in response to searches relating to current events, but
    less reliable for searches related to gardening.” It also clarifies that the “ranking
    system does not identify the intent or factual accuracy of any given piece of
    content.” In other words, everything—true and false—is allowed to show up on Google,
    and Google’s search algorithm does not try to determine which particular links
    contain valid information versus misinformation; instead, it just tries to rank
    more highly the sites it deems more generally trustworthy in the context of the
    present search.


    In June 2020, the Parliament of the United Kingdom published a policy report^([^(230)](#fn230))
    with numerous recommendations aimed at helping the government fight against the
    “pandemic of misinformation” powered by internet technology. The report is rather
    forceful on the conclusions it reaches:


    *   The Government must make sure that online platforms bear ultimate responsibility
    for the content that their algorithms promote. […] Transparency of online platforms
    is essential if democracy is to flourish. Platforms like Facebook and Google seek
    to hide behind ‘black box’ algorithms which choose what content users are shown.
    They take the position that their decisions are not responsible for harms that
    may result from online activity. This is plain wrong. The decisions platforms
    make in designing and training these algorithmic systems shape the conversations
    that happen online.


    While preparing this report, Parliament collected oral evidence from a variety
    of key figures. One of these was Vint Cerf, Vice President and Chief Internet
    Evangelist at Google. He was asked: “Can you give us any evidence that the high-quality
    information, as you describe it, that you promote is more likely to be true or
    in the category, ‘The earth is not flat’, rather than the category, ‘The earth
    is flat’?” His intriguing response provided a sliver of daylight in the tightly
    sealed backrooms of Google:


    *   The amount of information on the world wide web is extraordinarily large.
    There are billions of pages. We have no ability to manually evaluate all that
    content, but we have about 10,000 people, as part of our Google family, who evaluate
    websites. We have perhaps as many as nine opinions of selected pages. In the case
    of search, we have a 168-page document given over to how you determine the quality
    of a website. […] Once we have samples of webpages that have been evaluated by
    those evaluators, we can take what they have done and the webpages their evaluations
    apply to, and make a machine-learning neural network that reflects the quality
    they have been able to assert for the webpages. Those webpages become the training
    set for a machine-learning system. The machine-learning system is then applied
    to all the webpages we index in the world wide web. Once that application has
    been done, we use that information and other indicators to rank-order the responses
    that come back from a web search.


    He summarized this as follows: “There is a two-step process. There is a manual
    process to establish criteria and a good-quality training set, and then a machine-learning
    system to scale up to the size of the world wide web, which we index.” Many of
    Google’s blog posts and official statements concerning the company’s efforts to
    elevate quality journalism come back to this team of ten thousand human evaluators,
    so to dig deeper into Cerf’s dense statement here, it would be helpful to better
    understand what these people do and how their work impacts the algorithm. Fortunately,
    an inside look at the job of the Google evaluator was provided in a *Wall Street
    Journal* investigation^([^(231)](#fn231)) from November 2019.


    While Google employees are very well compensated financially, these ten thousand
    evaluators are hourly contract workers who work from home and earn around $13.50
    per hour. One such worker profiled in the *Wall Street Journal* article said he
    was required to sign a nondisclosure agreement, that he had zero contact with
    anyone at Google, and that he was never told what his work would be used for (and
    remember these are the people Cerf referred to as “part of our Google family”).
    He said he was “given hundreds of real search results and told to use his judgment
    to rate them according to quality, reputation and usefulness, among other factors.”
    The main task these workers perform, it seems, is rating individual sites as well
    as evaluating the rankings for various searches returned by Google. These tasks
    are closely guided by the hundred-sixty-eight-page document these workers are
    provided. Sometimes, the workers also received notes, through their contract work
    agencies, from Google telling them the “correct” results for certain searches.
    For instance, at one point, the search phrase “best way to kill myself” was turning
    up how-to manuals, and the contract workers were sent a note saying that all searches
    related to suicide should return the National Suicide Prevention Lifeline as the
    top result.


    This window into the work of the evaluators, brief though it is, helps us unpack
    Cerf’s testimony. Google employees—presumably high-level ones—make far-reaching
    decisions about how the search algorithm should perform on various topics and
    in various situations. But rather than trying to directly implement these in the
    computer code for the search algorithm, they codify these decisions in the instruction
    manual that is sent to the evaluators. The evaluators then manually rate sites
    and search rankings according to this manual, but even with this army of ten thousand
    evaluators, there are far too many sites and searches to go through by hand—so
    as Cerf explained, these manual evaluations provide the training data for supervised
    learning algorithms whose job is essentially to extrapolate these evaluations
    so that hopefully all searches, not just the ones that have been manually evaluated,
    behave as the Google leadership intends.


    While some of the notable updates to the Google search algorithm have been publicly
    announced^([^(232)](#fn232)) by the company (several were mentioned in this chapter),
    Google actually tweaks its algorithm extremely often. In fact, the same *Wall
    Street Journal* investigation just mentioned also found that Google modified its
    algorithm over thirty-two hundred times in 2018. And the number of algorithm adjustments
    has been increasing rapidly: in 2017, there were around twenty-four hundred, and
    back in 2010 there were only around five hundred. Google has developed an extensive
    process for approving all these algorithm adjustments that includes having evaluators
    experiment and report on the impact to search rankings. This gives Google a sense
    of how the adjustments will work in practice before turning them loose on Google’s
    massive user base. For instance, if certain adjustments are intended to demote
    the rankings of fake news sites, the evaluators can see if that actually happens
    in the searches they try.'
