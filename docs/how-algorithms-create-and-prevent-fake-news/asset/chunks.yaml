    # Google 新闻


    Google 的*新闻*版块会通过算法将文章聚合到几个不同的集合中，并提供链接：*为你推荐*的文章是基于用户数据的个性化推荐；*头条新闻*是广大用户群体中流行的热门故事；此外还有多种分类（如商业、科技、体育等），按主题汇集热门报道。Google
    新闻还允许用户进行关键词搜索，但只返回新闻文章，而非任意网站链接。毋庸置疑，当报道出现在这些聚合集合或新闻文章搜索中时，除了能获得大量受众之外，还会被赋予一种可信度——即使该报道是假新闻。


    这些新闻收集/排名算法的具体运作细节是严格保密的公司机密。2019 年 5 月，Google 新闻副总裁写道^(²¹²)：“我们用于新闻体验的算法会分析数百种不同因素，以识别和整理记者们正在报道的故事，从而提升多样化、可信赖的信息。”虽然这数百种因素中的大部分并不为公众所知，但据了解，它们包括文章的点击量、对发布机构可信度的评估、地理相关性以及内容的时效性等。


    Google 新闻副总裁还表示：“Google 不会对显示哪些报道做出编辑决策”，并且“我们的主要方法是利用技术反映新闻格局，将编辑决策留给发布商。”为了防止假新闻在平台上泛滥，Google
    表示：“我们的算法旨在提升来自权威来源的新闻。”至于这究竟意味着什么以及如何实现，公开的说法少之又少。我在 Google 官网上找到的据称描述如何提升可信新闻的内容^(²¹³)，只提到算法依赖于一些信号，这些信号“可以包括其他人是否在类似查询中看重该来源，或者该主题的其他知名网站是否链接到该报道。”


    唉，在揭露 Google 新闻上假新闻的状况以及公司为限制假新闻所做的努力方面，似乎进展不大。不过，Google 新闻的官方解释网站也指出：“我们在 Google
    和 YouTube 新闻中用于新闻内容的排名系统，使用了与 Google 搜索相同的网页抓取和索引技术。”因此，现在似乎是时候转向本章最长的部分了：Google
    搜索在假新闻传播中所扮演的角色。


    # Google 搜索


    当我们在 Google 上搜索信息时，出现的结果及其呈现顺序会塑造我们的观点和信念。这意味着，为了限制错误信息的传播，Google 必须找到方法来训练其算法，将有质量的来源提升到顶部，同时避免对有争议的问题采取主观、有偏见的视角，并且不妨碍人们深入挖掘网络的能力。这个故事有很多方面。在本节中，我将提供证据来支持搜索结果排名会影响个人世界观的论断；探究
    Google 搜索算法用于决定链接排名的因素；说明突出显示热门搜索摘要如何导致了有问题的错误信息；展示真实链接如何通过欺骗手段被从 Google 中移除；介绍
    Google 最近推出的用于驱动其搜索及许多其他工具的深度学习语言模型；最后，讨论 Google 在其搜索排名中提升优质新闻的努力。


    ## 排名至关重要


    2015 年 8 月，一项关于 Google 搜索排名对政治观点影响的研究^(²¹⁴)发表在著名研究期刊《美国国家科学院院刊》上。该研究的主要实验之一如下。参与者被随机分为三组。所有参与者都获得了两位政治候选人的简要描述，姑且称之为
    A 和 B，然后被问及他们对每位候选人的喜爱和信任程度，以及他们会投票给谁。接着，他们被给予十五分钟时间，使用一个模拟的 Google 版本进一步了解候选人，该版本只有三十个搜索结果——对所有参与者来说都是相同的三十个——这些结果链接到过去一次选举中的真实网站。在这十五分钟的环节之后，参与者被再次问及关于两位候选人的相同问题。关键在于，一组的结果排序是优先显示对候选人
    A 有利的结果，另一组优先显示对候选人 B 有利的结果，而第三组的结果顺序则是混合的。


    研究人员发现，在所有衡量标准上，参与者对候选人的看法都朝着模拟搜索排名所偏向的方向转变，变化幅度在 37% 到 63% 之间。而这仅仅来自一次十五分钟的搜索环节。研究人员还用一次真实的选举进行了实验——2014
    年印度选举中的两千名未决定选民。作者指出^(²¹⁵)：“即使在这里，面对那些对候选人非常熟悉、每天都被竞选言论轰炸的真实选民，我们仍然表明，搜索排名可以使支持任何候选人的比例提高超过
    20%——在某些人口群体中甚至超过 60%。”


    研究人员接着大胆地提出：“Google 的搜索算法，在用户活动的推动下，多年来一直在决定全球范围内势均力敌的选举结果，并且由于互联网普及率的提高，其影响力每年都在增加。”我认为这种说法有些牵强——至少，真正支持这一点的证据并不在他们的
    PNAS 论文中——但我在本书中的关注点并非政治偏见和选举，而是假新闻。而这里的研究人员确实令人信服地证明了搜索排名至关重要，并且会影响人们的观点，这意味着当
    Google 将假新闻链接置于其搜索排名的高位时，会产生实际的后果。


    迪伦·鲁夫，这名新纳粹分子于 2015 年在南卡罗来纳州查尔斯顿的一座教堂谋杀了九名黑人，他撰写了一份宣言^(²¹⁶)，声称自己受到了 Google 的启发。他描述了自己如何在
    Google 上输入“黑人对白人的犯罪”，并且“从那天起就再也不是从前的我了”。他说，这次搜索产生的第一个网站是一个名为“保守公民委员会”的组织。该网站包含大量关于“黑人残忍谋杀白人”的描述。他声称，看到这些内容让他质疑媒体对特雷沃恩·马丁案的关注，并促使他在
    Google 上开始了一段关于种族问题的自我教育之旅——正如我们现在所知，这段旅程以难以想象的悲剧告终。


    虽然这只是轶事证据，但仍然令人相当不安，并展示了让算法决定我们应该看到哪些信息以及以何种顺序看到这些信息的危险之一。正如加州大学洛杉矶分校教授萨菲亚·诺布尔在其批评
    Google 的著作《压迫的算法》中所指出的，鲁夫搜索结果的顶部本应是一个权威来源，例如 FBI 的犯罪统计数据——该数据显示，针对美国白人的大部分暴力行为是由美国白人实施的——而不是“保守公民委员会”这个组织，其《原则声明》称其“反对一切混合人类种族的努力”。

