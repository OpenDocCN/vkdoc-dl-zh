  trans: '

    ### 在 2020 年煽动选举风波


    2020 年选举日当天，在投票站关闭前数小时，YouTube 搜索“2020 年总统大选实时结果”的前 20 个视频中，有 8 个展示了带有虚假选举人团结果的类似地图。^(¹¹⁸)
    该列表中的一个频道拥有近 150 万订阅者，其中几个频道还获得了 YouTube 的“认证”。搜索“总统选举结果”的前四个结果全是虚假信息。奇怪的是，选举日当天搜索结果中出现的
    YouTube 频道大多与政治或新闻机构毫无关联——它们只是些投机取巧的人，利用选举轻松赚取广告收入。


    2020 年大选后的几天里，YouTube 上涌现出一批虚假新闻频道网络^(¹¹⁹)，大肆宣扬特朗普关于选举被操纵、胜利被窃取的虚假说法。这些频道与你在第
    2 章中遇到的、通过算法批量生产假新闻的*大纪元时报*媒体组织有着密切但大多被掩盖的联系。该网络其中一个频道的主持人迈克尔·刘易斯，在国会大厦暴乱发生仅几小时后就开始直播，重复特朗普关于选举的谎言，并将国会大厦暴徒归咎于反法西斯运动。他的
    YouTube 频道在不到两个月内就积累了超过 20 万订阅者和 1000 万次观看。尽管经过一些新闻调查后发现了其与*大纪元时报*的联系，该频道仍自称是刘易斯和几个“感觉真相正在消亡”的朋友的独立努力。


    总体而言，这个由七个虚假新闻 YouTube 频道组成的网络于 2020 年 11 月中旬启动，到 2021 年 1 月中旬已积累了超过 100 万订阅者和数千万次观看。2020
    年 12 月 9 日，YouTube 宣布^(¹²⁰)将删除此后发布的、声称存在影响选举结果的大规模欺诈或错误的任何视频；显然，这项政策并未得到足够严格的执行，未能阻止这些频道在
    12 月 9 日至 1 月 6 日期间发布的新视频获得数百万次观看。


    ### 美国媒体格局中的 YouTube


    美国人真的从 YouTube 及其推荐的视频中获取新闻和政治信息吗？奈特基金会和盖洛普 2018 年的一项民意调查发现^(¹²¹)，大多数美国成年人——以及超过十分之九的共和党人——表示他们近年来个人对新闻媒体失去了信任；这表明他们正在转向其他信息来源。与此同时，皮尤研究中心
    2018 年的一项调查发现^(¹²²)，表示从 YouTube 获取新闻或新闻标题的 YouTube 用户比例在 2013 年（20%）到 2018 年（38%）之间几乎翻了一番，并且大约一半的
    YouTube 用户表示该网站至少在一定程度上帮助他们理解世界上正在发生的事情。大约三分之二的用户表示，他们至少有时会遇到看起来明显虚假或不真实的视频。


    这项皮尤调查还发现，81%的 YouTube 用户表示他们至少偶尔会观看推荐算法建议的“接下来播放”视频，15%的用户表示他们经常这样做。也许人们在对民调机构甚至对自己坦诚时，并不总是诚实地承认自己让算法支配观看习惯的频率：回想一下，YouTube
    的内部统计发现，70%的观看时长来自推荐视频。


    除了直接观看之外，YouTube 改变美国政治话语的另一种方式是通过一种涟漪效应：YouTube 为各种个人提供大量观众，这些人随后又在传统媒体上接触到更庞大的主流受众。下面的故事说明了这种动态。


    2020 年 1 月新冠疫情爆发的头几周，一位名叫颜丽梦的香港医学研究员，基于未经证实的谣言（后来被证实完全是捏造和虚假的），开始相信该病毒是中国大陆政府制造的生物武器，并故意向公众释放。为了传播警告信息，她联系了一位以批评中国共产党而闻名的热门中国
    YouTube 博主王定刚。颜博士向王定刚自称是举报人和匿名消息来源，后者随后将这一关于新冠病毒的假新闻故事传播给了他的 10 万 YouTube 粉丝。这个故事继续传播并愈演愈烈；然后在
    9 月，颜博士不再匿名，出现在福克斯新闻的塔克·卡尔森访谈节目中，该节目获得了近 900 万次在线观看。


    同一名中国 YouTube 博主王定刚，据信^(¹²³)也是最早散播关于亨特·拜登的无根据虐待儿童谣言的人——这些谣言从他的 YouTube 频道传播到*InfoWars*，然后传到*纽约邮报*等主流媒体。通过这种方式，YouTube
    为第 1 章研究的假新闻危险垂直传播现象提供了一个强大的切入点。


    研究人员发现^(¹²⁴)，相信阴谋论的人往往比不太倾向于阴谋论的人群更依赖社交媒体获取信息。具体来说，60%相信 COVID-19 是由 5G 基站辐射引起的人表示“他们关于该病毒的大部分信息来自
    YouTube”，而在不相信这一虚假阴谋的人群中，这一数字下降到 14%。那些无视公共卫生建议、在出现新冠症状时外出的人，也比普通公众更依赖 YouTube
    获取医疗新闻和信息。


    但这本书并非关于*技术*在假新闻中扮演的普遍角色，而是专门探讨*算法*——尤其是复杂的机器学习算法——所扮演的角色，在本章中，这表现为 YouTube 推荐算法。为了理解推荐算法对美国政治的潜在影响，我现在将转向几项实证调查，这些调查为我们了解算法的行为提供了一个窗口。


    ### 研究算法


    与上一节提到的皮尤调查并行，皮尤还对 YouTube 推荐算法进行了一次*随机游走*探索，类似于在巴西进行的哈佛调查。让我从这一点开始。

    '
- fmt: '# Pew’s Random Walk


    `Pew`’s exploration^([(125)](#fn125)) was conducted by taking the following steps
    one hundred seventy thousand times:


    1. Select a top-ranked video at random from a list of more than fourteen thousand
    English-language YouTube channels with at least a quarter million subscribers.

    2. Select at random one of the top five “up next” recommended videos.

    3. Repeat the previous step four times.


    This resulted in one hundred seventy thousand different five-video-deep walks
    down the algorithm’s road—all of which were done for an “anonymous” user, meaning
    one that is not logged in and so has no viewing history or other personal data
    that the algorithm can rely on. By analyzing these random walk videos empirically
    in the aggregate, `Pew`’s main finding was that the YouTube algorithm encourages
    users to watch progressively longer and more popular videos: the average length
    of the videos increased from nine and a half minutes for the originally selected
    video to fifteen minutes for the fifth video in the random walk, and the average
    view counts increased from eight million for the first to thirty million for the
    fifth. The videos in these random walks covered a range of topics, but a large
    share of them were music videos, TV competitions, children’s content, and life
    hacks.


    The gist of the `Pew` random walk experiment, in other words, is that YouTube
    pushes viewers toward popular, often mainstream, content. Some people took this
    as evidence that the fears of YouTube’s algorithm tainting our political waters
    with divisive alt-right content were overblown, if not outright fabricated. I’m
    not convinced, and neither are many other scholars.


    First of all, the videos that launched these random walks were very popular—eight
    million views on average, as I mentioned. One can certainly imagine that once
    the algorithm finds users watching very popular content, it keeps them in the
    orbit of highly viewed content, whereas users who show an interest in videos with
    fewer views might be recommended less mainstream content. We don’t know how the
    random walks might have differed if they had started with more specialized content.
    Secondly, the large-scale analysis here was rather coarse—it summarized views,
    durations, and content categories, but it did not look into distinctions such
    as legitimate news versus fake news and mainstream politics versus extremist politics
    (let alone left versus right). It is somewhat reassuring that users were generally
    pushed toward anodyne categories like music videos and children’s videos, but
    this aggregate behavior might mask a lot of important variation, and it says nothing
    about users who specifically seek out news-related content among their recommendations.
    There are other ways of probing the recommendation algorithm, as you’ll soon see,
    and a finer-tooth comb reveals a much darker story.


    # Chaslot’s Political Recommendation Data


    `Chaslot`, the computer engineer fired from YouTube’s recommendation algorithm
    team in 2013, wrote a program in 2016 that, like the one used in `Pew`’s random
    walks, was designed to explore the places YouTube’s recommendation algorithm takes
    its viewers by starting with a “seed” video and then automatically clicking the
    top “up next” videos one at a time. One of the main differences with his approach
    compared to `Pew`’s is that rather than starting with random popular seed videos,
    `Chaslot`’s seed videos were the result of specific searches that he believed
    were common and/or important during the 2016 election. That is, he tried to simulate
    not just recommendations from random popularity on YouTube, but recommendations
    stemming specifically from timely political inquiries. He also looked at the quality
    of the information in the recommended videos, instead of providing only a coarse
    topical classification as with `Pew`’s aggregate analysis. For eighteen months,
    he used his program to conduct a variety of experiments, the results of which
    are reported^([(126)](#fn126)) in the *Guardian*. His research “suggests YouTube
    systematically amplifies videos that are divisive, sensational and conspiratorial.”


    For instance, when `Chaslot`’s seed video was the result of a keyword search for
    “who is Michelle Obama?”, the chain of up next recommendations led mostly to videos
    that claimed she is a man. When the seed was from a search for the pope, eighty
    percent of the videos in the up next recommendation sequence claimed he is “evil,”
    “satanic,” or “the anti-Christ.” Quite strikingly, `Chaslot` found that whether
    a user searched for “Clinton” or “Trump” and then clicked a video and followed
    the sequence of up next recommendations, the algorithm “was much more likely to
    push you in a pro-Trump direction.” Trump won the electoral college in 2016 as
    a result of eighty thousand votes spread across three swing states; at the time,
    there were more than one hundred fifty million YouTube users in the United States,
    so even a small degree of political bias in the recommendation algorithm could
    have had a decisive impact on the electoral outcome.


    `Chaslot` sent journalists at the *Guardian* a database of more than eight thousand
    videos that his program reached during the four months leading up to the 2016
    US election after doing an equal number of searches for “Trump” and for “Clinton”
    and then following a chain of top up next videos. These videos are certainly not
    comprehensive nor even necessarily representative of the political content on
    YouTube at the time, but they do provide a snapshot into the recommendation system
    just prior to the election, and, in the words of `Jonathan Albright`, research
    director at the Tow Center for Digital Journalism, it is a “reputable methodology”
    that “captured the apparent direction of YouTube’s political ecosystem.”'
  raw: '#### Pew’s Random Walk


    Pew’s exploration^([^(125)](#fn125)) was conducted by taking the following steps
    one hundred seventy thousand times:


    1.  Select a top-ranked video at random from a list of more than fourteen thousand
    English-language YouTube channels with at least a quarter million subscribers.


    2.  Select at random one of the top five “up next” recommended videos.


    3.  Repeat the previous step four times.


    This resulted in one hundred seventy thousand different five-video-deep walks
    down the algorithm’s road—all of which were done for an “anonymous” user, meaning
    one that is not logged in and so has no viewing history or other personal data
    that the algorithm can rely on. By analyzing these random walk videos empirically
    in the aggregate, Pew’s main finding was that the YouTube algorithm encourages
    users to watch progressively longer and more popular videos: the average length
    of the videos increased from nine and a half minutes for the originally selected
    video to fifteen minutes for the fifth video in the random walk, and the average
    view counts increased from eight million for the first to thirty million for the
    fifth. The videos in these random walks covered a range of topics, but a large
    share of them were music videos, TV competitions, children’s content, and life
    hacks.


    The gist of the Pew random walk experiment, in other words, is that YouTube pushes
    viewers toward popular, often mainstream, content. Some people took this as evidence
    that the fears of YouTube’s algorithm tainting our political waters with divisive
    alt-right content were overblown, if not outright fabricated. I’m not convinced,
    and neither are many other scholars.


    First of all, the videos that launched these random walks were very popular—eight
    million views on average, as I mentioned. One can certainly imagine that once
    the algorithm finds users watching very popular content, it keeps them in the
    orbit of highly viewed content, whereas users who show an interest in videos with
    fewer views might be recommended less mainstream content. We don’t know how the
    random walks might have differed if they had started with more specialized content.
    Secondly, the large-scale analysis here was rather coarse—it summarized views,
    durations, and content categories, but it did not look into distinctions such
    as legitimate news versus fake news and mainstream politics versus extremist politics
    (let alone left versus right). It is somewhat reassuring that users were generally
    pushed toward anodyne categories like music videos and children’s videos, but
