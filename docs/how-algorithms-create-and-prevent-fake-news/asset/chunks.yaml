- fmt: '# QAnon 与社交媒体管控的演变


    近年来，最离奇、最具影响力且影响广泛的元叙事阴谋运动之一——甚至达到了美国众议院议员玛乔丽·泰勒·格林（Marjorie Taylor Greene）的高度——便是`QAnon`。现在，让我们审视一下各方为控制其在社交媒体上的存在而不断演变的尝试。


    尽管某些特定的`QAnon`内容和账号曾因违反公司政策而被社交媒体平台封禁，但直到2020年夏季，`QAnon`本身并未被禁止，尽管它植根于庞大的虚假信息网络，并可能对现实世界造成明显的危害。`Twitter`率先直接针对`QAnon`采取行动，于2020年7月宣布^([^(290)](#fn290))，它将“（1）不再在趋势和推荐中提供与`QAnon`相关的内容和账号，（2）努力确保我们不会在搜索和对话中突出显示此类活动，以及（3）阻止与`QAnon`相关的`URL`在`Twitter`上被分享。”两个月后，`Twitter`表示^([^(291)](#fn291))，平台上`QAnon`内容的浏览量下降了超过50%。


    在`Twitter`宣布其反`QAnon`努力一个月后，`Facebook`也紧随其后发布公告^([^(292)](#fn292))，称将开始“对与支持抗议活动中暴力行为的无政府主义团体、美国民兵组织以及`QAnon`相关的`Facebook`主页、群组和`Instagram`账号采取行动。”该公告承认，虽然直接宣扬暴力的内容已被平台禁止，但以更隐晦方式威胁公共安全的运动有所增长，例如庆祝暴力行为，或允许成员展示携带武器并暗示将使用它们。公告进一步解释说，`Facebook`仍将“允许人们发布支持这些运动和群体的内容”，但将开始“限制他们在我们平台上组织活动的能力。”换句话说，`QAnon`内容不会对个人`Facebook`用户禁止，但`Facebook`上的`QAnon`群组和主页将面临一系列新的限制。这些限制包括：不再将`QAnon`群组和主页推荐给用户加入/关注；降低`QAnon`群组和主页帖子的信息流排名；降低`QAnon`群组和主页的搜索排名，并从`Facebook`搜索功能的自动完成功能中移除其名称和`QAnon`话题标签；禁止`QAnon`投放付费广告和使用`Facebook`的筹款工具；以及移除讨论暴力的`QAnon`群组和主页——即使讨论依赖于“该运动特有的隐晦语言和符号。”


    两个月后，`Facebook`发布了该公告的更新，声明“我们认为在处理`QAnon`时，这些努力需要加强。”自2020年10月6日起，`Facebook`将开始移除所有“代表`QAnon`的群组和主页，即使它们不包含暴力内容。”作为升级对`QAnon`行动的理由，`Facebook`列举了一些例子，例如该运动传播关于西海岸野火的虚假信息，这些信息虽不属于煽动甚至讨论暴力的范畴，但却通过阻碍地方官员灭火能力而造成了实际的公共危害。该公告的更新承认，由于`QAnon`信息传递的快速转变，执行这项新禁令并非易事，并且`Facebook`预计“会有新的尝试来规避我们的检测，无论是在行为上还是在平台上分享的内容上。”几周后，该公告再次更新，称现在当人们搜索与`QAnon`相关的术语时，他们将被引导至一个反恐组织。随后在2021年1月，该公告又一次更新，这次提供了`QAnon`清除行动的最新数据：已移除超过三千个`Facebook`上的`QAnon`主页、一万个群组、五百个活动以及一万八千个个人资料。


    在`Facebook`最初宣布将通过算法调整减少`QAnon`在其平台上的存在，到随后宣布彻底禁止该运动之间的两个月里，发生了什么？一方面，《纽约时报》发表了一篇尖锐的文章^([^(293)](#fn293))，表明`Facebook`的第一次打击尝试——委婉地说——是不够的。记者们发现，`Facebook`的推荐算法仍在继续推荐`QAnon`群组；一个特定的`QAnon`群组在首次打击后获得了数百名新关注者，尽管它公开反对重要的公共卫生建议，如佩戴口罩；`Facebook`上一个与`QAnon`有关联、呼吁在美国本土进行武装冲突的民兵运动获得了数千名新关注者；数十万`Facebook`用户被以打击人口贩卖的在线运动为幌子，推向了`QAnon`外围的阴谋论群组和主页。记者们追踪了`Facebook`上的一百个`QAnon`群组，并计算出在打击行动后，它们平均每周总共新增略超过一万三千名关注者，仅比打击前平均每周约两万名新增关注者略有下降。与此同时，这些群组变得稍微活跃了一些，打击后平均每周总互动量为六十万次，而打击前略高于五十万次。


    记者们发现，许多`QAnon`群组/主页能够规避`Facebook`的打击，只需将其名称中的字母`Q`改为“`cue`”或“`17`”（引用`Q`是字母表中第17个字母的事实），尽管`Facebook`早些时候声称会留意隐晦和象征性的引用。他们还发现，与政治无关的`Facebook`群组，如育儿和瑜伽群组，突然充斥着`QAnon`内容——但形式有所缓和，侧重于该运动中关于儿童贩卖的阴谋论方面。许多标榜为反贩卖组织、实为`QAnon`宣传群的`Facebook`群组，在`Facebook`打击行动后，其增长率实际上出现了飙升。简而言之，`QAnon`运动通过技术和心理两种方式适应了`Facebook`的努力，以确保其在新`Facebook`环境中继续繁荣和传播。随着2020年大选临近，以及`QAnon`散布关于普遍选民欺诈的亲特朗普虚假信息，`Facebook`显然感到有必要放弃其原有策略，对不断蔓延和扩散的`QAnon`运动采取更强硬的立场。


    在背景铺垫充分之后，我将首先更详细地探讨假新闻如何在社交媒体上传播，然后这将为后续关于遏制这种传播的方法的讨论提供依据。'
  raw: 'One of the most bizarre yet influential sprawling meta-narrative conspiracy
    movements in recent years—even reaching the heights of the US House of Representatives
    in Marjorie Taylor Greene—is QAnon; let me now take a look at the evolving attempts
    to control its presence on social media. While some specific QAnon material and
    accounts had been banned from social media platforms for violating certain company
    policies, until the summer of 2020 there was nothing prohibited about QAnon itself
    despite the vast landscape of misinformation it is rooted in and the obvious potential
    for real-world harm it could lead to. Twitter made the first official move directly
    against QAnon when in July 2020 it announced^([^(290)](#fn290)) that it would
    “(1) No longer serve content and accounts associated with QAnon in Trends and
    recommendations, (2) Work to ensure we’re not highlighting this activity in search
    and conversations, and (3) Block URLs associated with QAnon from being shared
    on Twitter.” Two months later, Twitter said^([^(291)](#fn291)) that views of QAnon
    content on the platform had dropped by more than fifty percent.


    One month after Twitter announced its anti-QAnon efforts, Facebook followed suit
    with an announcement^([^(292)](#fn292)) that it would start “taking action against
    Facebook Pages, Groups and Instagram accounts tied to offline anarchist groups
    that support violent acts amidst protests, US-based militia organizations and
    QAnon.” The announcement admitted that while content directly advocating violence
    was already banned on the platform, there had been a growth of movements threatening
    public safety in slightly more oblique manners such as celebrating violent acts
    or harboring members who show themselves carrying weapons with the suggestion
    that they will use them. It went on to explain that Facebook would still “allow
    people to post content that supports these movements and groups,” but it would
    start to “restrict their ability to organize on our platform.” In other words,
    QAnon content would not be prohibited from individual Facebook users, but QAnon
    groups and pages on Facebook would face a new collection of restrictions. These
    restrictions included no longer suggesting QAnon groups and pages as recommendations
    for users to join/follow; decreasing the newsfeed ranking for posts from QAnon
    groups and pages; decreasing the search ranking for QAnon groups and pages and
    removing their names and QAnon hashtags from the autocomplete feature in Facebook’s
    search function; prohibiting paid ads and Facebook’s fundraising tools for QAnon;
    and removing QAnon groups and pages that discuss violence—even if the discussion
    relies on “veiled language and symbols particular to the movement.”


    Two months later, Facebook posted an update to this announcement declaring that
    “we believe these efforts need to be strengthened when addressing QAnon.” As of
    October 6, 2020, Facebook would start removing all groups and pages “representing
    QAnon, even if they contain no violent content.” As justification for ramping
    up its actions against QAnon, Facebook noted examples such as the movement spreading
    misinformation about the west coast wildfires that did not fall under the umbrella
    of inciting or even discussing violence and yet caused real public harm by impeding
    local officials’ ability to fight the fires. This update to the announcement admitted
    that enforcing this new ban would not be a trivial matter due to how quickly QAnon
    pivots its messaging and that Facebook expects “renewed attempts to evade our
    detection, both in behavior and content shared on our platform.” A few weeks later,
    the announcement was updated again to say that now when people search for terms
    related to QAnon, they would be directed to a counter-terrorism organization.
    Then in January 2021 the announcement was updated once again, this time to provide
    current tallies for the QAnon takedown effort: over three thousand Facebook QAnon
    pages, ten thousand groups, five hundred events, and eighteen thousand profiles
    had been removed.


    What happened in the two months between Facebook’s initial announcement that it
    would reduce QAnon’s presence on the platform, primarily through algorithmic adjustments,
    and its ensuing announcement of an outright ban on the movement? For one thing,
    the *New York Times* published a scathing article^([^(293)](#fn293)) showing that
    Facebook’s first crackdown attempt was, to put it mildly, insufficient. The journalists
    found that Facebook’s recommendation algorithm continued to suggest QAnon groups;
    one particular QAnon group gained hundreds of followers after the initial crackdown
    despite openly pushing against important public health advice on the pandemic
    such as wearing masks; a militia movement on Facebook affiliated with QAnon that
    was calling for armed conflict on American soil gained thousands of new followers;
    and hundreds of thousands of Facebook users were pushed toward conspiracy theory
    groups and pages in the general QAnon orbit under the false pretense of an online
    campaign against human trafficking. The journalists tracked a hundred QAnon groups
    on Facebook and calculated that in sum they averaged just over thirteen thousand
    new followers per week after the crackdown, only a modest decrease from the roughly
    twenty thousand combined new followers they were averaging prior to it. Meanwhile,
    these groups became slightly more active, averaging a combined six hundred thousand
    weekly engagements after the crackdown compared to just over five hundred thousand
    prior to it.


    The journalists found that many QAnon groups/pages were able to avoid Facebook’s
    crackdown simply by changing the letter Q in their name to “cue” or “17” (referencing
    the fact that Q is the 17th letter of the alphabet), despite Facebook’s earlier
    assertion that it would be on the lookout for veiled and symbolic references.
    They also found that Facebook groups that had nothing to do with politics, such
    as parenting and yoga groups, were suddenly suffused with QAnon content—but of
    a toned-down form, emphasizing the conspiratorial child trafficking aspects of
    the movement. Many Facebook groups that were branded as anti-trafficking organizations
    but really were QAnon propaganda groups actually saw their growth rates spike
    after the Facebook crackdown. In short, the QAnon movement adapted to Facebook’s
    efforts in both technological and psychological ways to ensure it continued to
    prosper and spread in the new Facebook environment. With the 2020 election on
    the horizon and QAnon spreading pro-Trump misinformation about rampant voter fraud,
    Facebook evidently felt the need to ditch its original strategy and take a much
    stronger stance against the spiraling and spreading QAnon movement.


    Now that the stage has been properly set, I’ll first look in more detail at how
    fake news spreads on social media, then this will inform the ensuing discussion
    of methods for curbing this spread.'
  trans: '

    # QAnon 与社交媒体管控的演变


    近年来，最离奇、最具影响力且影响广泛的元叙事阴谋运动之一——甚至达到了美国众议院议员玛乔丽·泰勒·格林（Marjorie Taylor Greene）的高度——便是`QAnon`。现在，让我们审视一下各方为控制其在社交媒体上的存在而不断演变的尝试。


    尽管某些特定的`QAnon`内容和账号曾因违反公司政策而被社交媒体平台封禁，但直到 2020 年夏季，`QAnon`本身并未被禁止，尽管它植根于庞大的虚假信息网络，并可能对现实世界造成明显的危害。`Twitter`率先直接针对`QAnon`采取行动，于
    2020 年 7 月宣布^(²⁹⁰)，它将“（1）不再在趋势和推荐中提供与`QAnon`相关的内容和账号，（2）努力确保我们不会在搜索和对话中突出显示此类活动，以及（3）阻止与`QAnon`相关的`URL`在`Twitter`上被分享。”两个月后，`Twitter`表示^(²⁹¹)，平台上`QAnon`内容的浏览量下降了超过
    50%。


    在`Twitter`宣布其反`QAnon`努力一个月后，`Facebook`也紧随其后发布公告^(²⁹²)，称将开始“对与支持抗议活动中暴力行为的无政府主义团体、美国民兵组织以及`QAnon`相关的`Facebook`主页、群组和`Instagram`账号采取行动。”该公告承认，虽然直接宣扬暴力的内容已被平台禁止，但以更隐晦方式威胁公共安全的运动有所增长，例如庆祝暴力行为，或允许成员展示携带武器并暗示将使用它们。公告进一步解释说，`Facebook`仍将“允许人们发布支持这些运动和群体的内容”，但将开始“限制他们在我们平台上组织活动的能力。”换句话说，`QAnon`内容不会对个人`Facebook`用户禁止，但`Facebook`上的`QAnon`群组和主页将面临一系列新的限制。这些限制包括：不再将`QAnon`群组和主页推荐给用户加入/关注；降低`QAnon`群组和主页帖子的信息流排名；降低`QAnon`群组和主页的搜索排名，并从`Facebook`搜索功能的自动完成功能中移除其名称和`QAnon`话题标签；禁止`QAnon`投放付费广告和使用`Facebook`的筹款工具；以及移除讨论暴力的`QAnon`群组和主页——即使讨论依赖于“该运动特有的隐晦语言和符号。”


    两个月后，`Facebook`发布了该公告的更新，声明“我们认为在处理`QAnon`时，这些努力需要加强。”自 2020 年 10 月 6 日起，`Facebook`将开始移除所有“代表`QAnon`的群组和主页，即使它们不包含暴力内容。”作为升级对`QAnon`行动的理由，`Facebook`列举了一些例子，例如该运动传播关于西海岸野火的虚假信息，这些信息虽不属于煽动甚至讨论暴力的范畴，但却通过阻碍地方官员灭火能力而造成了实际的公共危害。该公告的更新承认，由于`QAnon`信息传递的快速转变，执行这项新禁令并非易事，并且`Facebook`预计“会有新的尝试来规避我们的检测，无论是在行为上还是在平台上分享的内容上。”几周后，该公告再次更新，称现在当人们搜索与`QAnon`相关的术语时，他们将被引导至一个反恐组织。随后在
    2021 年 1 月，该公告又一次更新，这次提供了`QAnon`清除行动的最新数据：已移除超过三千个`Facebook`上的`QAnon`主页、一万个群组、五百个活动以及一万八千个个人资料。


    在`Facebook`最初宣布将通过算法调整减少`QAnon`在其平台上的存在，到随后宣布彻底禁止该运动之间的两个月里，发生了什么？一方面，《纽约时报》发表了一篇尖锐的文章^(²⁹³)，表明`Facebook`的第一次打击尝试——委婉地说——是不够的。记者们发现，`Facebook`的推荐算法仍在继续推荐`QAnon`群组；一个特定的`QAnon`群组在首次打击后获得了数百名新关注者，尽管它公开反对重要的公共卫生建议，如佩戴口罩；`Facebook`上一个与`QAnon`有关联、呼吁在美国本土进行武装冲突的民兵运动获得了数千名新关注者；数十万`Facebook`用户被以打击人口贩卖的在线运动为幌子，推向了`QAnon`外围的阴谋论群组和主页。记者们追踪了`Facebook`上的一百个`QAnon`群组，并计算出在打击行动后，它们平均每周总共新增略超过一万三千名关注者，仅比打击前平均每周约两万名新增关注者略有下降。与此同时，这些群组变得稍微活跃了一些，打击后平均每周总互动量为六十万次，而打击前略高于五十万次。


    记者们发现，许多`QAnon`群组/主页能够规避`Facebook`的打击，只需将其名称中的字母`Q`改为“`cue`”或“`17`”（引用`Q`是字母表中第
    17 个字母的事实），尽管`Facebook`早些时候声称会留意隐晦和象征性的引用。他们还发现，与政治无关的`Facebook`群组，如育儿和瑜伽群组，突然充斥着`QAnon`内容——但形式有所缓和，侧重于该运动中关于儿童贩卖的阴谋论方面。许多标榜为反贩卖组织、实为`QAnon`宣传群的`Facebook`群组，在`Facebook`打击行动后，其增长率实际上出现了飙升。简而言之，`QAnon`运动通过技术和心理两种方式适应了`Facebook`的努力，以确保其在新`Facebook`环境中继续繁荣和传播。随着
    2020 年大选临近，以及`QAnon`散布关于普遍选民欺诈的亲特朗普虚假信息，`Facebook`显然感到有必要放弃其原有策略，对不断蔓延和扩散的`QAnon`运动采取更强硬的立场。


    在背景铺垫充分之后，我将首先更详细地探讨假新闻如何在社交媒体上传播，然后这将为后续关于遏制这种传播的方法的讨论提供依据。

    '
- fmt: '# Quantifying the Spread of Fake News


    In this section, I look at a handful of academic studies on the intricate propagation
    dynamics of fake news. Facebook’s data is less publicly available, so most of
    these studies focus on Twitter. That said, one study^([^(294)](#fn294)) looked
    at five hundred fake news sites and ten thousand fake news stories on Facebook
    and Twitter between January 2015 and July 2018 and found that user interactions
    with fake news steadily rose on both platforms through the end of 2016 and then
    sharply declined on Facebook while continuing to rise on Twitter. But I urge the
    reader caution when interpreting that particular finding: it was only one relatively
    small study, much of Facebook’s fake news problem occurs in private groups that
    cannot be tracked so easily, and a lot has happened since 2018—especially with
    the ramp-up of QAnon and the flood of coronavirus misinformation. For instance,
    data scientists within Facebook found^([^(295)](#fn295)) in the months before
    the 2020 election that seventy of the top one hundred most active groups oriented
    toward US civics had been flagged for repeated issues such as hate speech, misinformation,
    bullying, and harassment. One of these top groups claimed it was run by fans of
    Donald Trump, but it was actually run by “financially motivated Albanians” and
    generated millions of daily views on fake news and other harmful content.


    ## Twitter and the 2016 Election


    In January 2019, a research paper was published^([^(296)](#fn296)) that took a
    deep data dive into the dynamics of fake news on Twitter in the 2016 election.
    This is a convenient place to start our discussion of how fake news spreads on
    social media. The researchers collected every tweet they could find concerning
    Donald Trump and Hillary Clinton in the five months leading up to the election,
    which ended up being a whopping one hundred and seventy million tweets sent by
    eleven million users. Of these, thirty million tweets by just over two million
    users contained links to news articles or organizations. Using a characterization
    of news outlets by communications scholars into those that publish fake or unsubstantiated
    conspiratorial news versus those that are more traditional and fact based, the
    researchers labeled each of these thirty million tweets as factual or fake. Important
    to note here is that they didn’t try to judge the accuracy of each individual
    news story shared on Twitter, which would be extremely difficult, they only assessed
    whether the news outlet linked to in each tweet was typically factual or typically
    fake. The researchers also recorded a political orientation and extremity score
    for each news outlet that again came from a consensus of communications scholars.


    They found that among the thirty million tweets with news links, ten percent were
    to fake news organizations and another fifteen percent were to extremely biased
    news. Nearly one in five of the fake news links were tweeted from non-official
    Twitter apps (and among the tweets that came from non-official Twitter apps, links
    to news were four times as likely to be to fake news than to traditional news);
    while there are some legitimate and semi-legitimate uses of non-official apps,
    this was interpreted as evidence of substantial bot activity in the spread of
    fake news during the lead-up to the election. By looking at retweets, the researchers
    were able to study the network flow of information and identify the key influencers.
    They found that the top spreaders of traditional news were journalists and public
    figures with verified Twitter accounts, whereas a large number of the top spreaders
    of fake and extremely biased news were unknown users and accounts that were subsequently
    deleted. The tweeting/retweeting network was more connected and homogeneous for
    fake news than it was for traditional news; the fake news network was also more
    tightly entwined with the network of right-wing news tweets than it was for center
    and left-wing news.


    Perhaps most remarkably, the researchers uncovered two crucial differences between
    Clinton supporters and Trump supporters in terms of their interactions with news
    on Twitter. First, for center and left-leaning news, there was a top-down effect
    in which the top spreaders—which, as you recall, were journalists and public figures—strongly
    influenced the Twitter activity of Clinton supporters, whereas for Trump supporters
    the direction of influence was reversed: in a bottom-up manner, it was the activity
    of Trump supporters that influenced top spreaders of fake news, meaning the top
    fake news spreaders were primarily conduits and amplifiers for the stories circulating
    among the masses. Second, it was found that Clinton supporters mostly interacted
    with center and left-wing news sources, whereas Trump supporters were more inclined
    to interact with news sources across the gamut—from right-wing to left-wing and
    from factual to fake.'
