- fmt: 'These internal presentations were part of company efforts—some initiating
    at the very top with Mark Zuckerberg—to understand how Facebook’s algorithms influenced
    user behavior in potentially harmful ways. But the *Wall Street Journal* revealed
    that the findings from these efforts were to a large extent ignored, and the proposals
    for addressing the problems were mostly dismissed or greatly reduced in scope.
    The main team looking at these issues wrote in a mid-2018 internal document that
    many of its proposed remediations were “antigrowth” and required the company to
    “take a moral stance.” A particularly delicate issue was that the team found that
    problematic behavior such as fake news, spam, clickbait, and inauthentic users
    came disproportionately from hyperpartisan users—and that there were larger networks
    aligned with the far right than the far left. This meant that even politically
    neutral efforts to reduce problematic behavior would, overall, affect conservative
    content more than liberal content. Facebook leadership did not want to alienate
    conservative users with actions that appeared to project a liberal bias, so the
    company’s handling of these matters has been highly constrained.


    One specific remediation proposed by this internal Facebook research team was
    the following. Since Facebook’s algorithms were designed to maximize various user
    engagement metrics (likes, shares, comments, time spent logged on, etc.), users
    who are very active on the platform have a greater impact on the algorithms than
    do less active users. The team suggested a “Sparing Sharing” algorithmic adjustment
    to reduce the spread of content that was disproportionately driven by hyperactive
    users. The team believed this would help protect Facebook from coordinated manipulation
    efforts, but the *Wall Street Journal* revealed that senior Facebook executives
    were apprehensive, claiming this would unfairly hurt the platform’s most dedicated
    users. When the team and the senior executives couldn’t agree about this, the
    debate over it was eventually elevated all the way up to Zuckerberg who evidently
    said to implement it but only after cutting the proposed mitigation weighting
    by eighty percent—and he reportedly “signaled he was losing interest in the effort
    to recalibrate the platform in the name of social good” and asked the team “that
    they not bring him something like that again.”


    ## Why QAnon Is So Tricky


    One of the challenges that has emerged with controlling the spread of misinformation
    on social media is that much of it lately comes by way of diffuse, all-encompassing,
    and constantly evolving conspiracy theories like the QAnon movement. Rather than
    being based on a well-defined and falsifiable central tenant, these conspiracy
    theories weave together many unrelated assertions in a web of deceit so that debunking
    any particular aspects of the theory—or labeling individual posts on social media
    as false—does little to slow down the movement as a whole. A further hurdle to
    moderation is that actions by social media platforms to rein in these movements
    are frequently absorbed into the conspiracy theories as coordinated efforts to
    keep people from learning the truth—which further galvanizes support for the movements.
    Rather than being static, these theories are more like viruses that constantly
    adapt and reconfigure themselves in order to persist and spread more rampantly.
    The supporters of these movements actively look for messaging that allows them
    to escape policy violations; often while doing so, they land on softer and more
    moderate ways to frame their ideology—and in the long run, this allows them to
    reach and convince an even wider audience. It’s almost like a bacterial infection
    that becomes more insidious and difficult to treat after resisting a partial course
    of antibiotics.


    You can see all these factors at play in the 2020 election. An October 2020 report^([^(289)](#fn289))
    from the Election Integrity Partnership—a self-described “coalition of research
    entities” supporting “information exchange between the research community, election
    officials, government agencies, civil society organizations, and social media
    platforms”—looked into preemptive efforts to delegitimize the 2020 election. It
    noted that the rumor spreading across social media of a deep state coup attempt
    to steal the election from Trump was “worth examining […] to understand how it
    weaves together a wide swath of discrete events into an overarching meta-narrative,”
    and how this “meta-narrative becomes a scaffolding on which any future event can
    be hung: any new protest, or newly-discovered discarded ballot, is processed as
    further confirmatory evidence […] that there is a vast conspiracy to steal the
    election, and that the results will be illegitimate.” The report goes on to explain
    the psychological impact, and social media dynamics, of this framework: “What
    may previously have been isolated incidents with minimal social media traction
    may gain significant new weight when they are processed as additional evidence
    of an underlying conspiracy.” This is strikingly similar to what you saw in Chapter
    [4](../Text/508514_1_En_4_Chapter.xhtml) with YouTube where an impressionable
    viewer feels that all signs point to the same hidden truth when the recommendation
    algorithm naively strings together videos from different users on the same conspiratorial
    themes.'
  raw: 'These internal presentations were part of company efforts—some initiating
    at the very top with Mark Zuckerberg—to understand how Facebook’s algorithms influenced
    user behavior in potentially harmful ways. But the *Wall Street Journal* revealed
    that the findings from these efforts were to a large extent ignored, and the proposals
    for addressing the problems were mostly dismissed or greatly reduced in scope.
    The main team looking at these issues wrote in a mid-2018 internal document that
    many of its proposed remediations were “antigrowth” and required the company to
    “take a moral stance.” A particularly delicate issue was that the team found that
    problematic behavior such as fake news, spam, clickbait, and inauthentic users
    came disproportionately from hyperpartisan users—and that there were larger networks
    aligned with the far right than the far left. This meant that even politically
    neutral efforts to reduce problematic behavior would, overall, affect conservative
    content more than liberal content. Facebook leadership did not want to alienate
    conservative users with actions that appeared to project a liberal bias, so the
    company’s handling of these matters has been highly constrained.


    One specific remediation proposed by this internal Facebook research team was
    the following. Since Facebook’s algorithms were designed to maximize various user
    engagement metrics (likes, shares, comments, time spent logged on, etc.), users
    who are very active on the platform have a greater impact on the algorithms than
    do less active users. The team suggested a “Sparing Sharing” algorithmic adjustment
    to reduce the spread of content that was disproportionately driven by hyperactive
    users. The team believed this would help protect Facebook from coordinated manipulation
    efforts, but the *Wall Street Journal* revealed that senior Facebook executives
    were apprehensive, claiming this would unfairly hurt the platform’s most dedicated
    users. When the team and the senior executives couldn’t agree about this, the
    debate over it was eventually elevated all the way up to Zuckerberg who evidently
    said to implement it but only after cutting the proposed mitigation weighting
    by eighty percent—and he reportedly “signaled he was losing interest in the effort
    to recalibrate the platform in the name of social good” and asked the team “that
    they not bring him something like that again.”


    ### Why QAnon Is So Tricky


    One of the challenges that has emerged with controlling the spread of misinformation
    on social media is that much of it lately comes by way of diffuse, all-encompassing,
    and constantly evolving conspiracy theories like the QAnon movement. Rather than
    being based on a well-defined and falsifiable central tenant, these conspiracy
    theories weave together many unrelated assertions in a web of deceit so that debunking
    any particular aspects of the theory—or labeling individual posts on social media
    as false—does little to slow down the movement as a whole. A further hurdle to
    moderation is that actions by social media platforms to rein in these movements
    are frequently absorbed into the conspiracy theories as coordinated efforts to
    keep people from learning the truth—which further galvanizes support for the movements.
    Rather than being static, these theories are more like viruses that constantly
    adapt and reconfigure themselves in order to persist and spread more rampantly.
    The supporters of these movements actively look for messaging that allows them
    to escape policy violations; often while doing so, they land on softer and more
    moderate ways to frame their ideology—and in the long run, this allows them to
    reach and convince an even wider audience. It’s almost like a bacterial infection
    that becomes more insidious and difficult to treat after resisting a partial course
    of antibiotics.


    You can see all these factors at play in the 2020 election. An October 2020 report^([^(289)](#fn289))
    from the Election Integrity Partnership—a self-described “coalition of research
    entities” supporting “information exchange between the research community, election
    officials, government agencies, civil society organizations, and social media
    platforms”—looked into preemptive efforts to delegitimize the 2020 election. It
    noted that the rumor spreading across social media of a deep state coup attempt
    to steal the election from Trump was “worth examining […] to understand how it
    weaves together a wide swath of discrete events into an overarching meta-narrative,”
    and how this “meta-narrative becomes a scaffolding on which any future event can
    be hung: any new protest, or newly-discovered discarded ballot, is processed as
    further confirmatory evidence […] that there is a vast conspiracy to steal the
    election, and that the results will be illegitimate.” The report goes on to explain
    the psychological impact, and social media dynamics, of this framework: “What
    may previously have been isolated incidents with minimal social media traction
    may gain significant new weight when they are processed as additional evidence
    of an underlying conspiracy.” This is strikingly similar to what you saw in Chapter
    [4](../Text/508514_1_En_4_Chapter.xhtml) with YouTube where an impressionable
    viewer feels that all signs point to the same hidden truth when the recommendation
    algorithm naively strings together videos from different users on the same conspiratorial
    themes.'
  trans: '

    这些内部演示是公司为了解 Facebook 算法如何以潜在有害方式影响用户行为所做的努力的一部分——其中一些倡议甚至源自最高层马克·扎克伯格。但《华尔街日报》披露，这些努力的成果在很大程度上被忽视了，而针对问题的解决方案大多被否决或大幅缩减范围。负责研究这些问题的主要团队在
    2018 年中期的一份内部文件中写道，其提出的许多补救措施都是“反增长的”，并要求公司“采取道德立场”。一个尤为棘手的问题是，该团队发现，虚假新闻、垃圾信息、点击诱饵和虚假用户等不良行为不成比例地来自极端党派用户——且存在比极左翼规模更大的极右翼网络。这意味着，即使是旨在减少不良行为的中立努力，总体上对保守派内容的影响也会大于对自由派内容的影响。Facebook
    领导层不愿采取看似带有自由派偏见的行动而疏远保守派用户，因此该公司在处理这些问题时受到极大限制。


    该内部研究团队提出的一项具体补救措施如下。由于 Facebook 的算法旨在最大化各种用户参与度指标（点赞、分享、评论、登录时长等），平台上非常活跃的用户对算法的影响大于不太活跃的用户。该团队建议进行“节制分享”算法调整，以减少由过度活跃用户不成比例推动的内容传播。该团队认为这将有助于保护
    Facebook 免受协同操纵行为的影响，但《华尔街日报》披露，Facebook 高管对此表示担忧，声称这会不公平地伤害平台最忠实的用户。当团队与高管无法达成一致时，这场争论最终被提交至扎克伯格处。据称，扎克伯格明确表示可以实施该方案，但前提是将提议的缓解权重削减
    80%——据报道，他“暗示自己对以社会公益之名重新调整平台的努力失去了兴趣”，并要求团队“不要再把类似的事情带到他面前”。


    ## 为什么 QAnon 如此棘手


    在社交媒体上控制错误信息传播所面临的挑战之一是，近期大量错误信息通过像 QAnon 运动这样分散、包罗万象且不断演变的阴谋论传播。这些阴谋论并非基于一个明确且可证伪的核心主张，而是将许多不相关的断言编织成一个欺骗之网，因此，驳斥该理论的任何特定方面——或将社交媒体上的个别帖子标记为虚假——几乎无法减缓整个运动的势头。内容审核的另一个障碍是，社交媒体平台遏制这些运动的行动，常常被阴谋论吸收，视为阻止人们了解真相的协同努力——这反而进一步激发了人们对这些运动的支持。这些理论并非静止不变，而更像病毒，不断适应和重组自身，以便持续存在并更猖獗地传播。这些运动的支持者积极寻找能让他们规避政策违规的信息；在此过程中，他们往往采用更温和、更中庸的方式来构建其意识形态——从长远来看，这使他们能够触及并说服更广泛的受众。这就像细菌感染，在抵抗了部分抗生素疗程后，变得更具隐蔽性和难以治疗。


    你可以在 2020 年大选中看到所有这些因素在起作用。选举诚信伙伴关系——一个自称“研究实体联盟”，支持“研究界、选举官员、政府机构、民间社会组织与社交媒体平台之间的信息交流”——在
    2020 年 10 月的一份报告^(²⁸⁹)中，调查了旨在预先破坏 2020 年大选合法性的努力。报告指出，社交媒体上流传的关于“深层政府”企图窃取特朗普大选胜利的谣言“值得审视……以了解它如何将大量离散事件编织成一个包罗万象的元叙事”，以及这个“元叙事如何成为一个脚手架，任何未来事件都可以挂靠其上：任何新的抗议活动，或新发现的被丢弃的选票，都被视为进一步的佐证……证明存在一个窃取大选的巨大阴谋，并且选举结果将是非法的。”报告接着解释了这种框架的心理影响和社交媒体动态：“那些以前可能只是孤立事件、在社交媒体上几乎不受关注的事件，当它们被当作潜在阴谋的额外证据时，可能会获得显著的新分量。”这与你在第
    4 章中看到的 YouTube 情况惊人地相似：当一个易受影响的观众感觉所有迹象都指向同一个隐藏的真相时，推荐算法却天真地将来自不同用户的、关于同一阴谋主题的视频串联起来。

