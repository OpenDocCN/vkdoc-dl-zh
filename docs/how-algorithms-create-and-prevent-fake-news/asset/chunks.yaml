- fmt: 'After analyzing these cascades with tools from network science, the main findings
    in this study were the following: false rumors spread faster, farther, deeper,
    and more broadly than true rumors; this spread was more pronounced for false political
    rumors than for false rumors about topics like science, finance, and disasters;
    false rumors tended to be more novel and to involve fear, disgust, and surprise,
    whereas true rumors tended to be more similar to other content and to involve
    anticipation, sadness, joy, and trust; finally, bots appear to have accelerated
    the spread of true and false rumors at roughly equal rates. Putting the first
    and last findings together implies that it was humans, not bots, that were more
    likely to spread false rumors than true rumors. That said, it is important to
    keep in mind that this study concerns aggregate behavior over a ten-year span—it
    is quite plausible that in certain specific instances bots played a much larger
    role.


    Here are some more details on these findings. On average, false rumors reached
    fifteen hundred people six times faster than true rumors did. Even when controlling
    for various differences between the users that originated rumor cascades, such
    as their number of followers and whether the account was verified by Twitter,
    false rumors were seventy percent more likely to get retweeted than true rumors.
    The largest rumor cascades reached around fifty thousand users when the rumor
    was false but only around two thousand users when it was true. There are two very
    different ways that information can spread and reach a large number of users on
    Twitter: a prominent influencer could tweet a story that many followers will directly
    retweet, or a less prominent user could tweet a story that gets retweeted by a
    small number of followers who then get it retweeted by some of their followers,
    etc. Even if a story reaches the same number of retweets in these two scenarios,
    the first is considered a shallow spread and the second a deep spread since it
    penetrates more deeply into the social network. It was found in this study that
    not only did false rumors ultimately reach larger audiences, but they did so with
    much greater depth: true rumors seldom chained together more than ten layers of
    retweets, whereas the most viral false rumors reached twenty layers of retweets—and
    they did so ten times as quickly as the true rumors reached their ten.


    The main caveat—I’m tempted to call it a weakness or even a serious flaw—with
    this study is that it is not really about fake versus real news: it is about contested
    information. The rumors studied here are in no way a representative sample of
    all news since they were drawn from items that appeared on fact-checking websites.
    Most news stories are not even remotely controversial and so will have no presence
    on fact-checking sites. Go to the homepage of an online newspaper, even a highly
    partisan one, and ask yourself how many of the stories there are likely to appear
    on a fact-checking site—my guess is very few. Put another way, it could actually
    be the case that valid news spreads more on Twitter than fake news; we really
    don’t know. In fact, for many years, the story on Twitter that had the record
    for receiving the most retweets was the (undeniably true and therefore not fact-checked)
    news of President Obama’s victorious reelection in 2012. What this *Science* paper
    reveals—and it is unequivocally a startling and influential revelation—is that
    among the news events/stories where there is a sufficient degree of dispute to
    warrant a fact-check, the events/stories that fail this fact-check spread more
    in every conceivable metric than do the ones that pass it.


    ### The 2020 Election


    We don’t yet have as detailed an understanding of the role of social media in
    the 2020 election as we do with the 2016 election (note that some of the most
    important studies of the latter were only published two or three years after the
    election), but we do have some preliminary analysis of the situation. During the
    week of the 2020 election, there were three and a half million engagements (likes,
    shares, comments) on public Facebook posts referencing the phrase “Stop the Steal,”
    a slogan for the pro-Trump false claims of voter fraud.^([^(304)](#fn304)) Six
    percent of these engagements occurred on the pages of four prominent influencers—Eric
    Trump and three conservative social media personalities—but the biggest super
    spreader here was Donald Trump: the twenty most engaged Facebook posts containing
    the word “election” were all from him, and they were all found to be false or
    misleading. In a four-week period surrounding November 3, President Trump and
    the other top twenty-five spreaders of voter fraud misinformation generated more
    than a quarter of the engagements on public voter fraud misinformation on Facebook
    that was indexed by an Avaaz investigation. Concerning the false claim that Dominion
    voting software deleted votes for Trump, more than a tenth of all engagements
    came from just seven posts. Many of the top spreaders of pro-Trump election misinformation
    on Facebook were also top spreaders of this same misinformation on Twitter—most
    notably, of course, President Trump himself.


    The most detailed look so far at fake news on social media in the 2020 election
    is a lengthy report published^([^(305)](#fn305)) in March 2021 by the Election
    Integrity Partnership that carefully tracked over six hundred pieces of election
    misinformation. One challenge the authors noted is that the social media app Parler
    is believed to have harbored a lot of election misinformation, but it does not
    make its data readily available, and so it is challenging for researchers to study
    content on Parler; similarly, Facebook’s private groups were hotbeds for misinformation,
    and the limited access they grant renders them difficult to study. Overall, the
    authors of this report found that misinformation in the 2020 election built up
    over a long period of time on all the social media platforms—despite efforts by
    the big ones to limit it—and very much exhibited the evolving meta-narrative structure
    discussed earlier in the context of QAnon. There were so many different forms
    and instances of false information about the election all pointing to a general—yet
    incorrect—feeling that the election would be, then was, stolen from President
    Trump that debunking any particular claim did little to slow down the movement,
    and sometimes doing so even brought more attention to the claim and further generated
    conspiratorial mistrust of the social media platform and/or fact-checking organization
    involved.


    To see how this unfolded, it helps to look at one of the specific items of misinformation
    evolution tracked in this Election Integrity Partnership report. Recall that one
    part of the stolen election narrative was the false claim that Dominion voting
    machines deleted votes for Trump. Here’s what the report found:


    > “Dominion narratives […] began with claims of poll glitches in online conversations
    on websites and Twitter, then spread through YouTube videos and the use of hashtags
    […] on Twitter and other platforms, such as Parler and Reddit. From there, high-profile
    accounts drew further attention to the incidents, as did hyperpartisan news websites
    like The Gateway Pundit, which used Twitter to promote its article discussing
    the incident. This collective Dominion narrative spread has since grown, having
    been subsequently promoted by the Proud Boys, The Western Journal, and Mike Huckabee
    across a number of platforms, including Facebook, Twitter, Instagram, Telegram,
    Parler, and Gab.”'
