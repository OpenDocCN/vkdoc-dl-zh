    now.


    ### YouTube’s Political Influence on Brazilians


    According to the 2019 *New York Times* investigation, one local vice president
    of Bolsonaro’s political party credited most of the party’s recruitment to YouTube,
    including his own: “He was killing time on the site one day, he recalled, when
    the platform showed him a video by a right-wing blogger. He watched out of curiosity.
    It showed him another, and then another.” He said that he didn’t have an ideological
    political background before that experience and that YouTube’s autoplaying recommendations
    were his political education.


    A cofounder of the political group Movimento Brasil Livre (MBL), known informally
    as the “Brazilian Tea Party” or the “Brazilian Breitbart,” which convened the
    popular demonstrations in 2015 pushing for the ouster of the liberal president
    Dilma Rousseff, said “we have something here that we call the dictatorship of
    the like. Reality is shaped by whatever message goes most viral.” By “the like”
    he meant popularity on social media. MBL, a movement that was only founded in
    2014, had six victorious candidates at the national level in the 2018 elections
    and many more at the state and local levels. The YouTube channel of MBL went from
    zero to one million subscribers in the year of the election, and in the month
    leading up to the election, it managed to reach the front page of YouTube in Brazil
    every single day; forty percent of the group’s funding came from YouTube ad revenue.^([^(113)](#fn113))


    One of the nationally elected MBL candidates—who has been referred to as a “fake
    news kingpin,” a “troll,” and “Brazil’s equivalent of Milo Yiannopoulos”—became
    at age twenty-two the youngest person ever elected to Brazil’s Congress. How did
    he get such an early start in politics? During his last year of high school, he
    did a report on a Brazilian libertarian YouTuber—a report that he did as a YouTube
    video that quickly went viral and launched his own internet fame. He says MBL
    clashes with Bolsonaro’s more militant far-right party but that MBL supported
    it for practical reasons: Bolsonaro is good for traffic. Another MBL candidate,
    now a state representative, said “I guarantee YouTubers in Brazil are more influential
    than politicians.” His most-watched video at the time of the election? A video
    called “15 minutes with Jair Bolsonaro” that reached almost four million views.
    “I’m really grateful to YouTube because it turned me into what I am today,” he
    once declared. In the local election that he won in 2018, he received an astronomical
    half million votes; candidates in previous years had won that seat with twenty
    thousand votes.


    This question of YouTube’s potential influence on Brazilian politics is still
    debated, and we may never truly know whether the recommendation algorithm affected
    the outcome of the 2018 election. That said, I think you can figure out which
    side of the debate I fall on. So now let me turn to the second question raised
    above, namely, why an ostensibly politically neutral recommendation algorithm
    would support extremist right-wing and conspiratorial videos. The answer, as you
    will see, involves the engineering adjustments YouTube made to its algorithm,
    especially two key developments discussed earlier: the 2012 switch of primary
    metric from views to watch time and the 2015 involvement of Google Brain and their
    deep learning architecture.'
  trans: '

    # 巴西的 YouTube


    在巴西这个全球第四大民主国家，YouTube 的收视率已超过除一个电视频道外的所有频道。^(¹¹¹) 该国极右翼威权总统雅伊尔·博索纳罗，不久前还只是个在
    YouTube 频道上兜售阴谋论视频和极端主义宣传、在全国范围内知名度不高的边缘人物议员。在相对较短的时间内，他的 YouTube 频道订阅者数量激增，并为他吸引了一大批狂热追随者。他借助
    YouTube 上的人气浪潮，在 2018 年赢得了总统大选，而他并非孤例。一大批极右翼 YouTube 明星与博索纳罗一同竞选公职；其中许多人以历史性的优势赢得了选举，并且他们中的大多数现在都像特朗普在总统任期结束前使用
    Twitter 那样，通过 YouTube 进行治理。


    是什么让这群乌合之众在 YouTube 上迅速蹿红？2019 年，哈佛大学伯克曼·克莱因互联网与社会研究中心的一个研究团队为《纽约时报》进行了一项研究^(¹¹²)
    以寻找答案，他们找到的答案是（请击鼓）：YouTube 的推荐算法。研究人员编写了一个基于巴西的计算机程序，从一个热门频道或关键词搜索的 YouTube 视频开始，然后追踪其推荐的首选视频链。他们运行了该程序数千次，并研究了每次迭代产生的视频路径。他们发现，无论用户是从政治视频还是非政治视频开始，推荐算法“通常偏爱右翼、充满阴谋论的频道”，并且“观看过一个极右翼频道的用户，往往会被推荐更多此类频道”。正如《纽约时报》所报道的那样：“该算法将曾经边缘化的频道联合起来——然后为它们建立了受众群体……。博索纳罗先生的频道就是其中之一，他长期以来一直利用该平台发布骗局和阴谋论。”


    YouTube 在巴西的突然主导地位与该国政治体系的崩溃同时发生。博索纳罗无论是在线下还是线上，都没有改变自己的观点或行为；相反，他的视频被频繁地推荐给一个正在崛起的全国性受众群体，而这个国家当时正处于重大政治变革的前夕。针对《纽约时报》的调查，YouTube
    的一位发言人表示，该公司此后“在政策、资源和产品上投入巨资”，以减少有害错误信息的传播。嗯，这真让人安心。


    在确认 YouTube 在巴西 2018 年大选前后确实在推荐极右翼宣传内容之后，接下来需要解决两个重要问题：这些推荐是否真的在意识形态上改变了人们？以及，为什么由通常倾向左翼的硅谷计算机科学家设计的推荐算法会偏爱极右翼视频？对于前一个问题，我不知道是否有严谨的定量研究；然而，轶事证据以及政治运动内部成员的第一手经验，尽管并非确凿无疑，但表明答案是肯定的。现在让我来谈谈这一点。


    ## YouTube 对巴西人的政治影响


    根据 2019 年《纽约时报》的调查，博索纳罗政党的一位当地副主席将党内大部分成员的招募归功于 YouTube，包括他自己：“他回忆说，有一天他正在网站上消磨时间，平台向他展示了一个右翼博主的视频。他出于好奇观看了。然后平台又向他推荐了另一个，接着又一个。”他说在那次经历之前，他并没有意识形态上的政治背景，而
    YouTube 的自动播放推荐就是他的政治教育。


    政治团体“自由巴西运动”（MBL）的联合创始人——该组织非正式地被称为“巴西茶党”或“巴西 Breitbart”，曾在 2015 年召集推动自由派总统迪尔玛·罗塞夫下台的民众示威活动——表示：“我们这里有一种我们称之为‘点赞独裁’的东西。现实是由传播最广的信息塑造的。”他所说的“点赞”指的是社交媒体上的人气。MBL
    这个运动成立于 2014 年，在 2018 年选举中有六名候选人赢得了全国性席位，还有更多候选人赢得了州和地方级别的席位。MBL 的 YouTube 频道在选举当年从零订阅者增长到一百万订阅者，并且在选举前的一个月里，它每天都设法登上巴西
    YouTube 的首页；该团体 40% 的资金来自 YouTube 广告收入。^(¹¹³)


    MBL 中一位全国当选的候选人——被称为“假新闻头目”、“网络喷子”和“巴西版米洛·扬诺普洛斯”——在 22 岁时成为有史以来最年轻的巴西国会议员。他是如何如此早地涉足政坛的？在高中最后一年，他制作了一份关于一位巴西自由意志主义
    YouTuber 的报告——这份报告是他以 YouTube 视频形式完成的，该视频迅速走红，并为他带来了网络名声。他说 MBL 与博索纳罗更激进的极右翼政党存在冲突，但
    MBL 出于实际原因支持了它：博索纳罗能带来流量。另一位 MBL 候选人，现任州议员，表示：“我敢保证巴西的 YouTuber 比政客更有影响力。”他在选举时观看量最高的视频是什么？一个名为“与雅伊尔·博索纳罗的
    15 分钟”的视频，获得了近四百万次观看。“我真的很感激 YouTube，因为它成就了今天的我，”他曾这样宣称。在 2018 年他赢得的地方选举中，他获得了惊人的
    50 万张选票；而前几年的候选人赢得该席位只需 2 万张选票。


    关于 YouTube 对巴西政治的潜在影响这一问题仍在争论中，我们可能永远无法真正知道推荐算法是否影响了 2018 年大选的结果。话虽如此，我想你能猜到我在这场辩论中站在哪一边。所以现在让我转向上面提出的第二个问题，即，为什么一个表面上政治中立的推荐算法会支持极右翼和阴谋论视频。正如你将看到的，答案涉及
    YouTube 对其算法所做的工程调整，特别是之前讨论过的两个关键发展：2012 年主要指标从观看次数转向观看时长，以及 2015 年 Google Brain
    及其深度学习架构的介入。

    '
- fmt: '### How the Far-Right Was Favored


    It’s certainly not true that the political videos `YouTube` recommended were exclusively
    far right—it’s just that they were vastly, disproportionately so. One driving
    factor for this is essentially psychological: some of the emotions that tend to
    draw people in to content and keep them tuned in (thereby maximizing the parameter
    `YouTube`’s algorithm was designed to optimize, watch time) are fear, doubt, and
    anger—and these are the same emotions that right-wing extremists and conspiracy
    theorists have relied on for years. In addition, many right-wing commentators
    had already been making long video essays and posting video versions of their
    podcast, so `YouTube`’s switch from views to watch time inadvertently rewarded
    `YouTube`’s far-right content creators for doing what they were already doing.


    In other words, it may not be the case that far-right provocateurs strategically
    engineered their message to do well in `YouTube`’s recommendation system—and it’s
    almost certainly not the case that `YouTube` deliberately engineered its algorithm
    to support far-right content. Instead, the two seem to have independently reached
    similar conclusions on how to hook an audience, resulting in an accidental synergy.
    `Google Brain`’s deep learning framework amped up this accidental synergy by continually
    pushing viewers further down the rabbit hole with recommendations for increasingly
    provocative videos on topics viewers hadn’t been exposed to. The algorithm simply
    wanted to offer fresh, captivating content to its users in order to maximize watch
    time—but the best way to do this, it appears in hindsight, was for it to provide
    viewers with more and more conspiracy theories, fake news, and far-right propaganda.


    In time, the far-right conspiracy theorists and political commentators realized
    that their methods were working and that `YouTube`’s algorithm was boosting their
    popularity. And even before their `YouTube` popularity catalyzed a political movement,
    these content creators were already financially incentivized to ramp up production—no
    matter how fake they all knew the claims in their videos were—thanks to `YouTube`’s
    2012 decision to allow all users, not just the vetted channels, to monetize videos
    with ad revenue.


    ### Conspiracy Theories Flourished


    The recommendation algorithm didn’t just increase the viewership of fake news
    and conspiracy theories on `YouTube`, it also provided an air of legitimacy to
    them. Even if a particular conspiracy theory seems blatantly implausible, as `YouTube`
    recommends a sequence of videos from different creators on the same topic mimicking
    each other, the viewer tends to feel that all signs are pointing to the same hidden
    truth. `Debora Diniz`, a Brazilian women’s rights activist who became the target
    of an intense right-wing `YouTube` conspiracy theory smear campaign, said^([^(114)](#fn114))
    this aspect of the algorithm makes it feel “like the connection is made by the
    viewer, but the connection is made by the system.”


    This phenomenon can be seen in topics outside of politics as well. Doctors in
    Brazil found that not long after `Google Brain`’s 2015 redesign of the recommendation
    algorithm, patients would come in blaming `Zika` on vaccines and insecticides
    (the very insecticides that in reality were being used to limit the spread of
    the mosquito-borne disease). Patients also were increasingly refusing crucial
    professional medical advice due to their own “`YouTube` education” on health matters.
    The Harvard researchers involved in the *New York Times* investigation of `YouTube`
    in Brazil found that “`YouTube`’s systems frequently directed users who searched
    for information on `Zika`, or even those who watched a reputable video on health
    issues, toward conspiracy channels.” A `YouTube` spokesperson confirmed these
    findings and said the company would change how its search tool surfaced videos
    related to `Zika` (a band-aid on a bullet wound, in my opinion). Why did people
    create these harmful medical disinformation videos in the first place, and why
    did `YouTube` recommend them? Because they attracted viewers and drove lengthy
    watch times—which means they made money for both the creators of these videos
    and for `YouTube` itself.


    ### Playing the Game


    Remember from the timeline of `YouTube`’s algorithm how in 2018 `Google Brain`
    brought in a machine learning technique called reinforcement learning—more commonly
    used for playing games—that allows the recommendation algorithm to develop long-term
    strategies for sucking in viewers? At an AI conference in 2019, a `Google Brain`
    researcher said^([^(115)](#fn115)) this was `YouTube`’s most successful adjustment
    to the algorithm in two years in terms of driving increased watch time. She also
    said that it was already altering the behavior of users on the platform: “We can
    really lead the users toward a different state, versus recommending content that
    is familiar.” This is a dangerous game to play when that different `YouTube` state
    is a chain of far-right conspiracy videos which might ultimately have led to a
    different political state for all citizens of Brazil—a xenophobic, anti-science,
    authoritarian state. “Sometimes I’m watching videos about a game, and all of a
    sudden it’s a `Bolsonaro` video,” said^([^(116)](#fn116)) a seventeen-year-old
    high school student in Brazil, where the voting age is sixteen.


    ## YouTube in America


    While `YouTube` is inordinately popular in Brazil, especially among the voting
    youth, it is nearly impossible to fathom that the problem of `YouTube` pushing
    viewers to extremist right-wing videos was isolated and somehow only occurred
    in Brazil. The potential impact of `YouTube`’s recommendation algorithm on the
    alt-right movement in the United States—especially in the context of Trump’s 2016
    election victory and his efforts to overturn the results of his 2020 election
    loss, and more generally with regard to the growing national discussion of fake
    news and dangerous conspiracy theory movements—continues to be a hotly debated
    topic to this day. According to a 2019 investigation, the years leading up to
    Trump’s 2016 victory were particularly reckless ones at `YouTube`:^([^(117)](#fn117))
    “Several current and former `YouTube` employees […] said company leaders were
    obsessed with increasing engagement during those years. The executives, the people
    said, rarely considered whether the company’s algorithms were fueling the spread
    of extreme and hateful political content.” Awareness of this issue, both inside
    and outside the `YouTube` organization, is certainly greater now than it was then,
    but that doesn’t mean the problems have gone away.'
