- fmt: '### Logically


    A startup based in the UK and India called `Logically` offers a suite of tools
    to combat fake news. Like `Full Fact`, this company uses machine learning to assist
    human fact-checkers rather than to replace them—or, as `Logically`’s website poetically
    puts it, to “supplement human intelligence, not supplant it.” In broad strokes,
    the fact-checking service works as follows. First, a user submits a link to an
    article or post, and `Logically` uses machine learning to identify the key claims
    in it, similar to what we saw with `Full Fact` except that here the claims are
    not classified—instead, the user is prompted to select one of the identified claims
    to focus on. Next, machine learning is used to search for evidence and previous
    fact-checks by `Logically` related to the selected claim. If a close fact-check
    match is found, then no human intervention is needed; otherwise, the claim is
    sent to the human fact-checking team, and a full report is returned (and added
    to the database of completed fact-checks) once it is ready.


    The company also provides a service to “identify the accuracy and credibility
    of any piece of text content” by using machine learning algorithms that combine
    the three different types of predictors discussed in the previous chapter: content-based
    features that extract meaning directly from text, network-based features quantifying
    the spread of content across social media, and metadata-based features that consider
    things like who posted the content and where it originated from. But no details
    are provided about the predictors beyond this vague list, nor about the algorithm
    itself. In August 2020, `Logically` launched a Chrome web browser extension with
    some of the company’s services, and in February 2021 a partnership with TikTok
    was announced to help detect misinformation on that platform.


    ### Squash


    The Reporter’s Lab housed at Duke University trialed an experimental automated
    fact-checking service nicknamed `Squash`. It is similar to `Full Fact` and `Logically`
    in that the main step is to match claims to a database of human-conducted fact-checks—but
    the emphasis here is on real-time spoken statements, so a speech-to-text algorithm
    is applied first. The result is that users can watch live political speeches and
    events with pop-up fact-check bubbles appearing automatically, although the product
    is considered to be still in the research and development stage.


    ### FakerFact


    Mike Tamir, head of data science at Uber’s self-driving car division, produced
    a free tool called `FakerFact` for analyzing passages of text that users either
    paste in or provide a link to. While sometimes billed as an online fact-checker,
    the website for this tool says explicitly that it “will never tell you if an article
    is True or Not” and that its job is instead to “enable readers to detect when
    an article is focused on credible information sharing vs. when the focus is on
    manipulating or influencing of the reader by means other than the facts.” This
    lofty description sounds quite useful, but really the tool is just a style classifier—it
    uses supervised deep learning, trained on millions of documents, to label each
    article as journalism, wiki, satire, sensational, opinion, or agenda-driven. It
    doesn’t try to identify facts in articles, let alone verify their accuracy; instead,
    it looks for patterns in word usage that correlate with these various styles.
    One nice feature of the tool is that instead of just giving a single predicted
    style label, it outputs multiple style labels each with an assigned confidence
    score. Another nice feature is that it often highlights particular sentences in
    the passage of text that were most responsible for the algorithm’s choice of label(s).


    However, when teaching a data science class one semester, I assigned my students
    to experiment with `FakerFact`, and we found the results quite unreliable—and
    often laughable. One student noted that the US Constitution was labeled opinion
    and satire. When I pasted in the first chapter of this book, `FakerFact` said
    “this one sounds silly” and also deemed it opinion and satire. Just now, I fed
    `FakerFact` the first link on the `New York Times`, which was an article about
    a COVID vaccine trial, and it was labeled sensational. Curiously, some of the
    passages highlighted as influential for this decision actually made sense: “Miami-Dade
    County, which includes Miami Beach, has recently endured one of the nation’s worst
    outbreaks, and more than 32,000 Floridians have died from the virus, an unthinkable
    cost that the state’s leaders rarely acknowledge.” But others don’t seem the least
    bit sensational: “Two-thirds of participants were given the vaccine, with doses
    spaced four weeks apart, and the rest received a saline placebo.” Let’s hope Uber’s
    self-driving cars are a little more accurate than this text analysis tool.


    ### Waterloo’s Stance Detection


    A research team based at Canada’s Waterloo University broke down the fully automated
    fact-checking process into four steps:


    1.  Retrieve documents relevant to the claim in question.

    2.  Determine the “stance” of each document, meaning whether it supports, rejects,
    or is ambivalent/unrelated to the claim.

    3.  Assign a credibility score to each document based on its source.

    4.  Assign a truthfulness score to the claim by combining the document stances
    weighted by the document credibility scores (and highlight relevant facts/context
    from the documents).


    The first step can be a tricky one, because it is more open-ended than the matching
    step conducted by `Full Fact`, `Logically`, and `Squash`: rather than searching
    through a specific database of fact-checks for a match to the claim, one needs
    to scour the Web for any documents that might have information related to the
    claim. Google’s use of `BERT` to analyze the text in user search queries is bringing
    us closer to this task, but many challenges still remain. The third step is essentially
    what Google and Facebook already do—through Google’s use of `PageRank` and human
    evaluators and through Facebook’s `NEQ` scores, as you saw in Chapters 6 and 8.
    The fourth step is straightforward once the first three are complete, so the Waterloo
    team decided to focus on the second step—stance detection—to see how well that
    could be automated.


    They used a data set of fifty thousand articles to train a deep learning classification
    algorithm that looks at the body of each article and the headline of the article
    and estimates whether the body agrees with the headline, disagrees with it, discusses
    it without taking a stance, or is unrelated to the headline. Their algorithm scored
    a very respectable ninety percent accuracy, which was considerably higher than
    previous attempts by other researchers. The main insight in their work was to
    start with Facebook’s massive pre-trained deep learning algorithm `RoBERTa` and
    then do additional focused training to fine-tune the algorithm for the specific
    task at hand. This general process of fine-tuning a massive pre-trained deep learning
    algorithm is called “transfer learning,” and it has been an extremely successful
    method in AI, so it is not at all surprising that this is the right way to go
    when it comes to stance detection—it just wasn’t possible before `BERT` and `RoBERTa`
    came out.


    I don’t believe a prototype of this Waterloo stance detection method is publicly
    available yet, and to really be effective we need progress on the document retrieval
    step as well. Nonetheless, it is promising work that may well find itself in user-friendly
    software in the near future.'
