  trans: '

    # 排版后的文本


    在神秘的新年视频发布一周后，加蓬军方发动了一场政变——这是该国自 1964 年以来的首次——并明确引用该视频的异常之处，作为总统缺席且政府对此撒谎的证据。政变最终失败，政府仍掌控局势。时至今日，数字取证专家仍不确定该视频是否为深度伪造，尽管他们普遍倾向于这一结论。但他们指出的许多迹象也可能是邦戈中风所致。我们唯一确定的是，2019
    年 8 月，邦戈在中风后首次公开露面——而深度伪造技术及其给视频真实性投下的怀疑阴影，险些导致一国政府被军方推翻。


    惊人的相似之处在于，仅仅一年后，美国也发生了一件更短暂却诡异类似的事件。2020 年 10 月 2 日，星期五，是近期记忆中最奇怪、最令人困惑的日子之一（对
    2020 年而言，这已非同寻常）。当天早上有消息称，特朗普总统的新冠病毒检测结果呈阳性，几小时内我们得知他不仅阳性，而且出现了症状——随后，他的病情实际上相当严重，即将住院。当天所有事件都笼罩在不确定性和混乱的迷雾中，这很大程度上源于政府缺乏坦诚透明的沟通。当时距离美国历史上最重要的选举之一仅剩几周，我们却不知道总统的真实健康状况，人们迅速怀疑情况比官员们告诉我们的要糟糕得多。


    随后，当天下午 6 点 31 分，特朗普总统在推特上发布了一段 18 秒的视频讲话，称他正前往沃尔特·里德医院，但他安抚民众，认为自己情况良好。视频看起来很奇怪，非常奇怪。社交媒体上立即有人讨论这是深度伪造。^(⁷²)
    这一次，深度伪造的阴谋论很快消散，因为随后出现了更多特朗普的镜头，最令人信服的是几天后他出院时发表的现场讲话。但在那短暂的一刻，确实很难知道发生了什么、该相信什么；美国政府在大选前一个月制作深度伪造来掩盖总统健康状况的糟糕局面，似乎并非完全不可信。


    2021 年 3 月，缅甸一家军方运营的电视台播放了一段被拘留的前地区首席部长公开认罪的视频。他说自己向昂山素季行贿——这位诺贝尔和平奖得主在 2010 年代曾为缅甸从军政府统治向部分民主过渡发挥关键作用，但随后于
    2021 年 2 月 1 日与执政党其他成员一同被军方逮捕并罢黜。换句话说，军方正在出示所需的定罪证据，以证明其行动的正当性。但立即有人抗议称这份认罪是伪造的——声音听起来不像他平时的声音，画面也很奇怪——许多人怀疑这是深度伪造，但同样，我们无法确定。^(⁷³)


    现在让我转向政治背景下深度伪造的最后一个现实案例——这次展示的是该技术的积极用途。2020 年 7 月，奥斯卡提名活动家电影人大卫·弗朗斯在 HBO 首映了一部名为《欢迎来到车臣》的纪录片，讲述车臣发生的反
    LGBTQ 清洗事件。他希望对暴行幸存者进行采访，但他知道为了他们的人身安全，必须在影片中隐藏其身份——当时，他们正在祖国被追捕，并通过安全屋网络逃离该地区。他认为通常的纪录片技术——模糊面部——会导致讲述者与观众之间产生过多的情感隔阂，因此他转而使用了深度伪造技术。制作团队在车臣境外拍摄了与该国清洗事件无关的个人，在配备多角度面部捕捉摄像头的摄影棚中录制；随后使用深度学习算法将这些面孔融合到影片中
    23 名车臣人的脸上，为他们提供新的伪装面孔——从而获得匿名性。据《纽约时报》报道^(⁷⁴)，“在影片最令人震撼的时刻之一，当同性恋难民马克西姆·拉普诺夫在新闻发布会上恢复自己的姓名——以及真实面孔——时，特效效果消失了。‘我想让你感受他那一刻的感受，’弗朗斯说。”


    尽管令人信服的深度伪造在现实世界中似乎仍属罕见，但其使用频率和质量都在迅速提升。2021 年 3 月 10 日，美国联邦调查局发布官方警报^(⁷⁵)，大胆指出“恶意行为者几乎肯定会在未来
    12 至 18 个月内利用合成内容进行网络和外国影响力行动”，并明确说明深度伪造是其在此所指的合成内容的主要形式。如果我们开发出判定视频是否为深度伪造的工具，就能反击这些恶意行为，并在下次出现类似阿里·邦戈新年致辞、唐纳德·特朗普沃尔特·里德视频或缅甸认罪事件时应用这些工具。现在是时候审视开发此类工具的进展与挑战了。

    '
- fmt: '# Detecting Deepfakes


    If AI has the ability to create deepfakes, shouldn’t it also be able to detect
    them? Yes and no. One broad challenge is that there are many different types of
    deepfake video manipulations—you have already seen a handful in this chapter,
    and surely more will keep coming out each year—so an algorithm trying to decide
    if a video is a deepfake cannot just look for one specific type of manipulation.
    There are significant challenges at the technical level too. Recall that most
    deepfake creation algorithms rely on the GAN architecture where the generator
    learns how to synthesize deepfakes and the discriminator learns how to distinguish
    real video clips from the synthetic ones. Any AI system for detecting deepfakes
    will in essence be playing the role of that discriminator—but the whole point
    in a GAN is that through the training procedure the generator learns how to fool
    the discriminator. In other words, the very process by which deepfakes are constructed
    makes them difficult for algorithms to detect.


    An additional challenge—and this is probably the biggest one—is that deepfake
    detection is an arms race: as deepfake-detecting technology improves, the ability
    of deepfake creators to avoid detection will also improve. For instance, in the
    early days of deepfakes (which is to say, a couple years ago), some researchers
    noticed that people blinked at a lower rate in deepfake videos than in real life
    and used this observation as the basis for a detection algorithm,^([^(76)](#fn76))
    but it did not take long for deepfake creation algorithms to overcome this weakness
    and render this particular detection algorithm obsolete. A related but more recent
    approach^([^(77)](#fn77)) that currently looks promising is to measure heartbeat
    rhythms and blood flow circulation, but it is only a matter of time before the
    deepfake creators learn how to get past this hurdle as well. That said, just because
    deepfake detection algorithms have a difficult task does not mean we shouldn’t
    bother trying; quite the opposite, it means we must move quickly and vigorously
    to stay on top of this ever-evolving challenge.


    In spring 2020, the popular data science competition site Kaggle hosted the “Deepfake
    Detection Challenge,” a public competition with one million dollars in prize money
    to see who could produce the most accurate algorithm for classifying videos as
    deepfake versus authentic. The organizers for this competition—who provided both
    the training data that the competitors used to build and tweak their algorithms
    and the testing data that was used behind the scenes afterward to evaluate and
    rank the performance of the entrants—included Facebook, Amazon, Microsoft, a group
    of academics, and a coalition of media and technology experts called the “Partnership
    on AI’s Media Integrity Steering Committee.” Unsurprisingly, all the winning teams
    relied on deep learning architectures for their algorithms.


    The top performer in this Kaggle competition managed an accuracy rate of 82.5%
    on the testing data. If automated methods like this are relied upon in practice,
    many deepfake videos will slip through the radar and many authentic videos will
    be mislabeled as deepfakes. Also, there is a big difference between performance
    in a simulated contest like this at a fixed moment in time and performance in
    the real world where the technology driving deepfakes is constantly changing.
    In fact, when tested on a new unseen data set, the winning entrant’s accuracy
    rate dropped precipitously to 65%; to be blunt, that’s not a heck of a lot better
    than random guessing. Moreover, this competition focused on purely algorithmically
    mass-produced deepfakes, so if one wanted to fool a detection algorithm in a particular
    instance, one could do additional manual processing to throw a monkey wrench in
    the works. As noted^([^(78)](#fn78)) in *Scientific American*, “Such ‘crafted’
    deepfake videos are more likely to cause real damage, and careful manual post
    processing can reduce or remove artifacts that the detection algorithms are predicated
    on.”


    The top five teams in the competition (the ones receiving prize money) all had
    something in common beyond their use of deep learning: they all used a specific
    deep learning architecture called `EfficientNets` developed by Google in 2019
    that is known to be good at recognizing faces and other objects in images. The
    winner of the competition, Selim Seferbekov, thinks^([^(79)](#fn79)) the next
    step for algorithmic detection might involve a focus on the transition between
    frames in the video: “Even very high-quality deepfakes have some flickering between
    frames,” he pointed out. While these flickers are not hard for humans to spot
    with the naked eye, Seferbekov says he tried to capture them with his algorithm
    but found it too computationally intensive so gave up for now. Shortly after the
    Kaggle competition concluded, Facebook released a public database of more than
    one hundred thousand video clips produced using over three thousand actors and
    a variety of known face-swap deepfake techniques hoping that this will help the
    research community develop better detection methods.


    The US Government has a significant investment in deepfake detection: in 2015,
    the Defense Advanced Research Projects Agency (DARPA)—a research organization
    within the Department of Defense focusing on emerging technologies for use by
    the military—launched a program called Media Forensics, or more briefly `MediFor`.
    The creation of this program was curiously time. Shortly before, a news channel
    in Russia had broadcast supposed satellite imagery of a Ukrainian fighter jet
    shooting at Malaysia Airlines Flight 17\. It turned out these images were fake,
    though they were made with more traditional methods rather than deep learning;
    it also turned out the flight was downed by a Russian missile. This Russian incident
    likely put fake imagery and videos high on DARPA’s list, and as deepfake technology
    developed over the following several years, DARPA had good reason to maintain
    a keen interest in the topic.


    It was reported^([^(80)](#fn80)) by *Scientific American* in 2018 that `MediFor`
    had three broad approaches to its task, all of which are strong candidates for
    automation through deep learning: “The first examines a video’s digital fingerprint
    for anomalies. The second ensures a video follows the laws of physics, such as
    sunlight falling the way it would in the real world. And the third checks for
    external data, such as the weather on the day it was allegedly filmed.” One of
    the researchers involved in this project insightfully summarized the context of
    their work: “We will not win this game, it’s just that we will make it harder
    and harder for the bad guys to play it.”'
  raw: '## Detecting Deepfakes


    If AI has the ability to create deepfakes, shouldn’t it also be able to detect
    them? Yes and no. One broad challenge is that there are many different types of
    deepfake video manipulations—you have already seen a handful in this chapter,
    and surely more will keep coming out each year—so an algorithm trying to decide
    if a video is a deepfake cannot just look for one specific type of manipulation.
    There are significant challenges at the technical level too. Recall that most
    deepfake creation algorithms rely on the GAN architecture where the generator
    learns how to synthesize deepfakes and the discriminator learns how to distinguish
    real video clips from the synthetic ones. Any AI system for detecting deepfakes
    will in essence be playing the role of that discriminator—but the whole point
    in a GAN is that through the training procedure the generator learns how to fool
    the discriminator. In other words, the very process by which deepfakes are constructed
    makes them difficult for algorithms to detect.


    An additional challenge—and this is probably the biggest one—is that deepfake
    detection is an arms race: as deepfake-detecting technology improves, the ability
    of deepfake creators to avoid detection will also improve. For instance, in the
    early days of deepfakes (which is to say, a couple years ago), some researchers
    noticed that people blinked at a lower rate in deepfake videos than in real life
    and used this observation as the basis for a detection algorithm,^([^(76)](#fn76))
    but it did not take long for deepfake creation algorithms to overcome this weakness
    and render this particular detection algorithm obsolete. A related but more recent
    approach^([^(77)](#fn77)) that currently looks promising is to measure heartbeat
    rhythms and blood flow circulation, but it is only a matter of time before the
    deepfake creators learn how to get past this hurdle as well. That said, just because
    deepfake detection algorithms have a difficult task does not mean we shouldn’t
    bother trying; quite the opposite, it means we must move quickly and vigorously
    to stay on top of this ever-evolving challenge.


    In spring 2020, the popular data science competition site Kaggle hosted the “Deepfake
    Detection Challenge,” a public competition with one million dollars in prize money
    to see who could produce the most accurate algorithm for classifying videos as
    deepfake versus authentic. The organizers for this competition—who provided both
    the training data that the competitors used to build and tweak their algorithms
    and the testing data that was used behind the scenes afterward to evaluate and
    rank the performance of the entrants—included Facebook, Amazon, Microsoft, a group
    of academics, and a coalition of media and technology experts called the “Partnership
    on AI’s Media Integrity Steering Committee.” Unsurprisingly, all the winning teams
    relied on deep learning architectures for their algorithms.


    The top performer in this Kaggle competition managed an accuracy rate of 82.5%
    on the testing data. If automated methods like this are relied upon in practice,
    many deepfake videos will slip through the radar and many authentic videos will
    be mislabeled as deepfakes. Also, there is a big difference between performance
    in a simulated contest like this at a fixed moment in time and performance in
    the real world where the technology driving deepfakes is constantly changing.
    In fact, when tested on a new unseen data set, the winning entrant’s accuracy
    rate dropped precipitously to 65%; to be blunt, that’s not a heck of a lot better
    than random guessing. Moreover, this competition focused on purely algorithmically
    mass-produced deepfakes, so if one wanted to fool a detection algorithm in a particular
    instance, one could do additional manual processing to throw a monkey wrench in
    the works. As noted^([^(78)](#fn78)) in *Scientific American*, “Such ‘crafted’
    deepfake videos are more likely to cause real damage, and careful manual post
    processing can reduce or remove artifacts that the detection algorithms are predicated
    on.”


    The top five teams in the competition (the ones receiving prize money) all had
    something in common beyond their use of deep learning: they all used a specific
    deep learning architecture called *EfficientNets* developed by Google in 2019
    that is known to be good at recognizing faces and other objects in images. The
    winner of the competition, Selim Seferbekov, thinks^([^(79)](#fn79)) the next
    step for algorithmic detection might involve a focus on the transition between
    frames in the video: “Even very high-quality deepfakes have some flickering between
    frames,” he pointed out. While these flickers are not hard for humans to spot
    with the naked eye, Seferbekov says he tried to capture them with his algorithm
    but found it too computationally intensive so gave up for now. Shortly after the
    Kaggle competition concluded, Facebook released a public database of more than
    one hundred thousand video clips produced using over three thousand actors and
    a variety of known face-swap deepfake techniques hoping that this will help the
    research community develop better detection methods.


    The US Government has a significant investment in deepfake detection: in 2015,
    the Defense Advanced Research Projects Agency (DARPA)—a research organization
    within the Department of Defense focusing on emerging technologies for use by
    the military—launched a program called Media Forensics, or more briefly *MediFor*.
    The creation of this program was curiously time. Shortly before, a news channel
    in Russia had broadcast supposed satellite imagery of a Ukrainian fighter jet
    shooting at Malaysia Airlines Flight 17\. It turned out these images were fake,
    though they were made with more traditional methods rather than deep learning;
    it also turned out the flight was downed by a Russian missile. This Russian incident
    likely put fake imagery and videos high on DARPA’s list, and as deepfake technology
    developed over the following several years, DARPA had good reason to maintain
    a keen interest in the topic.


    It was reported^([^(80)](#fn80)) by *Scientific American* in 2018 that MediFor
    had three broad approaches to its task, all of which are strong candidates for
    automation through deep learning: “The first examines a video’s digital fingerprint
    for anomalies. The second ensures a video follows the laws of physics, such as
    sunlight falling the way it would in the real world. And the third checks for
    external data, such as the weather on the day it was allegedly filmed.” One of
    the researchers involved in this project insightfully summarized the context of
    their work: “We will not win this game, it’s just that we will make it harder
    and harder for the bad guys to play it.”'
  trans: '

    # 检测深度伪造


    如果人工智能有能力制造深度伪造，难道它不应该也能检测它们吗？答案是既对也不对。一个广泛的挑战在于，深度伪造视频篡改的类型多种多样——你在本章中已经看到了一些，而且可以肯定每年都会有更多新类型出现——因此，试图判断视频是否为深度伪造的算法不能只寻找某一种特定的篡改类型。在技术层面也存在重大挑战。回想一下，大多数深度伪造生成算法都依赖于生成对抗网络（GAN）架构，其中生成器学习如何合成深度伪造，而判别器学习如何区分真实视频片段与合成视频片段。任何用于检测深度伪造的人工智能系统本质上都将扮演那个判别器的角色——但
    GAN 的关键点在于，通过训练过程，生成器学会了如何欺骗判别器。换句话说，深度伪造的构建过程本身就使得算法难以检测它们。


    另一个挑战——这可能是最大的一个——是深度伪造检测是一场军备竞赛：随着深度伪造检测技术的进步，深度伪造制造者规避检测的能力也会同步提升。例如，在深度伪造的早期（也就是几年前），一些研究人员注意到人们在深度伪造视频中眨眼的频率低于现实生活，并以此作为检测算法的基础^(⁷⁶)，但没过多久，深度伪造生成算法就克服了这一弱点，使这种特定的检测算法变得过时。另一种相关但更新的方法^(⁷⁷)目前看起来很有前景，即测量心跳节律和血液循环，但深度伪造制造者学会如何跨越这一障碍也只是时间问题。话虽如此，仅仅因为深度伪造检测算法的任务艰巨，并不意味着我们不应该努力尝试；恰恰相反，这意味着我们必须迅速而有力地行动起来，以应对这个不断演变的挑战。


    2020 年春天，广受欢迎的数据科学竞赛网站 Kaggle 举办了“深度伪造检测挑战赛”，这是一项公开竞赛，奖金为一百万美元，旨在看谁能制作出最准确的算法，将视频分类为深度伪造或真实视频。本次竞赛的组织者——他们既提供了参赛者用来构建和调整算法的训练数据，也提供了随后在幕后用于评估和排名参赛者表现的测试数据——包括
    Facebook、亚马逊、微软、一个学术团体，以及一个名为“人工智能媒体诚信指导委员会伙伴关系”的媒体和技术专家联盟。毫不意外，所有获胜团队都为其算法采用了深度学习架构。


    在这场 Kaggle 竞赛中，表现最佳的算法在测试数据上达到了 82.5%的准确率。如果在实践中依赖此类自动化方法，许多深度伪造视频将蒙混过关，而许多真实视频则会被错误标记为深度伪造。此外，在某个固定时间点的模拟竞赛中的表现，与在驱动深度伪造的技术不断变化的现实世界中的表现之间，存在着巨大差异。事实上，当在一个新的未见过的数据集上进行测试时，获胜参赛者的准确率骤降至
    65%；坦率地说，这比随机猜测好不了多少。而且，这次竞赛专注于纯粹由算法批量生成的深度伪造，因此，如果有人想在特定情况下欺骗检测算法，他们可以进行额外的手动处理来从中作梗。正如《科学美国人》所指出的^(⁷⁸)，“这种‘精心制作’的深度伪造视频更有可能造成真正的损害，而仔细的手动后期处理可以减少或消除检测算法所依赖的那些伪影。”


    竞赛中排名前五的团队（获得奖金的团队）除了都使用深度学习之外，还有一个共同点：他们都使用了一种名为`EfficientNets`的特定深度学习架构，该架构由谷歌于
    2019 年开发，以擅长识别图像中的人脸和其他物体而闻名。竞赛的获胜者 Selim Seferbekov 认为^(⁷⁹)，算法检测的下一步可能涉及关注视频帧之间的过渡：“即使是质量非常高的深度伪造，帧与帧之间也会有一些闪烁，”他指出。虽然这些闪烁对于人类肉眼来说不难发现，但
    Seferbekov 表示，他试图用他的算法捕捉这些闪烁，但发现计算量太大，因此暂时放弃了。在 Kaggle 竞赛结束后不久，Facebook 发布了一个公共数据库，其中包含超过三千名演员使用各种已知换脸深度伪造技术制作的超过十万个视频片段，希望这能帮助研究界开发出更好的检测方法。


    美国政府已在深度伪造检测方面投入巨资：2015 年，国防高级研究计划局（DARPA）——国防部内一个专注于为军方开发新兴技术的研究机构——启动了一个名为“媒体取证”（Media
    Forensics），或更简洁地称为`MediFor`的项目。这个项目的启动时间点颇为巧合。在此之前不久，俄罗斯的一个新闻频道播放了所谓的卫星图像，显示一架乌克兰战斗机向马来西亚航空
    17 号航班开火。结果证明这些图像是伪造的，尽管它们是用更传统的方法而非深度学习制作的；同时，该航班实际上是被一枚俄罗斯导弹击落的。这起俄罗斯事件很可能将虚假图像和视频推到了
    DARPA 关注清单的前列，并且随着深度伪造技术在随后的几年中发展，DARPA 有充分的理由对这个话题保持浓厚的兴趣。


    据《科学美国人》2018 年报道^(⁸⁰)，`MediFor`对其任务有三种广泛的方法，所有这些方法都是通过深度学习实现自动化的有力候选：“第一种方法是检查视频的数字指纹是否存在异常。第二种方法是确保视频遵循物理定律，例如阳光照射的方式与现实世界一致。第三种方法是检查外部数据，例如据称拍摄当天的天气情况。”参与该项目的一位研究人员深刻地总结了他们工作的背景：“我们不会赢得这场游戏，只是我们会让坏人玩起来越来越难。”

