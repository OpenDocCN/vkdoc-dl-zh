  trans: '

    ### 2017 年报告


    2017 年 10 月，*问责运动 (CfA)* ——一个无党派、非营利、基于证据的监督组织——发布了一份详细报告^(²³⁷)，内容涉及谷歌在极端党派、误导性和虚假信息网站上投放广告的算法机制。报告指出，谷歌的服务条款并未禁止谷歌展示网络中的网站发布假新闻。此外，谷歌允许广告商选择广告投放内容类型的控制面板，虽然允许用户选择左翼或右翼政治内容，但并未包含任何关于极端党派内容的选项——也未对优质新闻与假新闻做出任何区分。尽管谷歌已终止了一些特别恶劣网站的展示网络成员资格，但
    CfA 发现，谷歌仍保留了众多经常发布虚假信息的极端党派网站。


    此外，谷歌还提供了一个“匿名”选项，允许广告托管网站向广告组织隐藏其身份。广告商可以选择不在任何匿名网站上投放广告，但这样做会切断一个重要的收入来源，因为这些匿名网站带来的利润异常丰厚。事实上，CfA
    报告分析了谷歌展示网络中超过一千个党派新闻网站的样本，发现只有 15% 是匿名的——但这些匿名网站每个站点贡献的收入是非匿名网站的八倍，而样本中这 15%
    的匿名网站提供了样本总收入的约 60%。正如报告作者所描述的，“广告商被迫在安全受众和大量受众之间做出选择，并可能在不经意间资助那些与其价值观背道而驰的团体和活动。”


    2016 年美国大选后，公众和少数主要广告商对谷歌通过广告收入支持充满仇恨和事实误导性网站的作用提出了一些投诉。谷歌回应^(²³⁸)称，其声明中包含以下主张：“未来，我们将限制在那些歪曲、虚假陈述或隐瞒发布者、发布者内容或网络资产主要目的信息的页面上投放广告。”这是一个相当微妙的声明：如果仔细阅读，你会发现它并非关于禁止网站发布误导性内容（正如当时许多新闻标题所解读的那样），而只是关于禁止展示网络中的网站误导它们希望争取并从中获利的广告组织。但即便是这种温和的限制形式，似乎也——容我们说——是假新闻，因为谷歌显然继续允许广告托管方保持匿名——在我看来，这正是“隐瞒发布者信息”的定义。


    很难理解谷歌的公开声明与广告分发系统实际内部运作之间的这种公然矛盾，除了谷歌公司领导层的背信弃义之外，还能作何解释。在这番空洞的公开声明之后，为何仍允许匿名，没有任何解释；早些时候的一篇问答帖子^(²³⁹)只是简单地说：“一些通过
    AdSense 计划与谷歌合作，并为我们提供在展示网络中投放广告位置的发布者，出于各种原因选择匿名提供这些位置，并且不向广告商披露其网站名称。”多亏了 CfA
    的报告，我们现在知道了谷歌继续允许这样做真正的原因：巨额利润。


    关于有害广告投放的投诉仍在继续，2017 年 3 月，谷歌试图加强其措施：^(²⁴⁰)“从今天开始，我们对仇恨、攻击性和贬低性内容采取更强硬的立场。这包括更有效地从基于种族、宗教、性别或类似类别攻击或骚扰他人的内容中移除广告。”但
    CfA 报告发现，此类内容仍存在于谷歌展示网络中。例如，*Breitbart* 仍在该网络中。许多广告商一旦意识到他们的广告被投放在 *Breitbart*
    上，就明确撤回了广告，但这只能临时进行，因为谷歌的控制面板缺乏精细的控制来从一开始就防止此类广告投放。正如 CfA 报告所述：“在谷歌的体系下，识别并屏蔽他们认为有问题的特定域名是广告商的责任。但谷歌并未让这件事变得容易：其广告平台不允许广告商将假新闻网站作为一个类别进行屏蔽。[…]
    即使广告商能够识别出特定的极端网站，谷歌也为这些发布者提供了一种通过使其网站匿名来规避广告商排除规则的方法。”


    CfA 报告发现了大量谷歌广告被投放在假新闻文章上的例子——例如，关于拉斯维加斯大规模枪击事件的文章，该事件发生在 CfA 报告发布前几周。引人注目的是，在
    CfA 分析的托管方样本中，右翼内容生产者创造了 68% 的收入，而左翼内容生产者仅创造了 4%。此外，报告发现，“像 *Breitbart*、*Drudge
    Report* 和 *Daily Mail* 这类经常发布高度可疑和阴谋论内容的极端党派右翼网站，是样本中收入最高的发布者。”


    尽管 2016 年大选后谷歌面临的公众强烈抗议主要集中在谷歌搜索结果及其推荐新闻文章中的公然虚假信息和偏见上——这是前一章的主题——但谷歌的广告投放服务虽然不那么显眼，却似乎在资助具有政治危险性的组织方面扮演了重要角色。接下来，让我们看看谷歌的广告投放政策和模式在随后的几年里是否有所改善。

    '
- fmt: '### 2019 Report


    In September 2019, a UK nonprofit called the *Global Disinformation Index (GDI)*
    released a report^([^(241)](#fn241)) analyzing ad placement on fake news sites.
    The researchers behind this report started by collecting a list of seventeen hundred
    websites that had been flagged by fact-checking organizations such as *PolitiFact*
    for publishing content that included fake news. They found that `Google` was serving
    up ads on a whopping seventy percent of these dubious sites; the second largest
    contributor was `AppNexus`, with ads on eight percent of the sites; coming in
    at third place was `Amazon`, with four percent.


    By estimating the number of monthly pageviews these sites received and then applying
    a market average figure for ad rates, the `GDI` researchers produced a ballpark
    estimate for the annual ad revenue these seventeen hundred sites took home. These
    sites are believed to be representative of a much larger collection of twenty
    thousand sites known to publish fake news. By extrapolating the revenue estimate
    for the seventeen hundred sites to this larger collection, the `GDI` researchers
    came to the conclusion that the fake news industry brought in nearly a quarter
    billion dollars in the year 2019—of which `Google` was responsible for an estimated
    eighty-seven million dollars, the largest amount of any ad exchange. This means
    `Google` was responsible for almost forty percent of the fake news industry’s
    revenue^([^(242)](#fn242)) that year; curiously, this is almost exactly the same
    share of ad revenue that `Google` was responsible for among well-respected, factual
    news sites. In other words, `Google` had equally dominant shares of the advertising
    market on both real and fake news sites.


    This bears repeating: fake news is a *big* business, worth nearly a quarter billion
    dollars in 2019 in online ad revenue—at least according to the `GDI` estimates—and
    `Google` was responsible for a larger share of this revenue than any other advertising
    company. If `Google` really has been attempting to stanch the flow of funds to
    fake news sites since the 2016 election, evidently by 2019 there was still quite
    a lot of room for improvement in this regard.


    ### 2021 Report


    The news rating company *NewsGuard Technologies* released a report^([^(243)](#fn243))
    in January 2021 studying ad placement and revenue on sites publishing fake news
    concerning the 2020 US presidential election. `NewsGuard` flagged one hundred
    sixty sites “for publishing falsehoods and conspiracy theories about the election,”
    and it found that between October 1, 2020, and January 14, 2021, these sites ran
    over eight thousand unique ads from over sixteen hundred different brands; around
    forty percent of these brands ran ads on more than one of the flagged sites. It
    is believed that many of the brands did this unknowingly and likely would have
    been apprehensive to be associated with, and to financially support, electoral
    disinformation that ultimately played a role in the Capitol building uprising.
    More than eighty percent of these flagged sites received their algorithmic ad
    placements from `Google`.


    The two brands that ran ads on the largest number of these flagged sites were
    `Progressive Insurance` (which ran nearly three hundred ads across twenty-five
    of the sites) and `Planned Parenthood` (which ran seventy-one ads across eighteen
    of the sites). The `AARP`, the `American Cancer Society`, and `Sloan Kettering
    Cancer Center` each ran dozens of ads across a handful of these sites. The sites
    included some of Trump’s favorites for peddling his bogus claims of election fraud,
    such as *One America News Network* and the *Gateway Pundit*. A particularly sad
    irony is that several well-respected medical organizations inadvertently provided
    funding, via ad revenue, to fake news sites that published harmful medical disinformation.
    Family-friendly `Disney` ran ads on a site that “published claims that COVID-19
    was a hoax and promoted false cures for the virus.” `American Express` advertised
    on *Sputnik News*, an organization controlled by the Russian government that is
    known for targeting disinformation at American audiences. Even the `Department
    of Veterans Affairs` and the `Department of Homeland Security` were found to have
    placed a few ads on flagged sites, as was the `BBC`.


    A `Google` spokesperson said^([^(244)](#fn244)) that “Claims that voter fraud
    was widespread or that the election was stolen are all prohibited by our policies.
    When we find content that violates our policies we remove its ability to monetize.”
    `Google` first demonetizes individual stories that violate its policies; it only
    resorts to sitewide demonetization in cases of persistent, egregious violation.
    Most of the sites tracked by `NewsGuard` posted content that quite clearly violates
    `Google`’s policies—evidently, though, they hadn’t crossed `Google`’s threshold
    for sitewide prohibition.


    In August 2020, the leaders of more than a dozen large philanthropic organizations
    wrote a public letter^([^(245)](#fn245)) to `Sundar Pichai`, CEO of `Google`’s
    parent company, `Alphabet`, after it was discovered that ads for `Red Cross` and
    others were placed alongside COVID-19 misinformation. They urged `Google` to institute
    a new system that “does not put [advertisers] into unwanted and damaging associations
    that undermine their good works and values.” `Google` seems to have responded
    by demonetizing individual articles but not repeat offender sites other than in
    extremely rare instances.


    To sum up, the problem of `Google` funding fake news through algorithmically placed
    ads—which first came to public awareness around the 2016 election—is evidently
    still ongoing today. And this is despite multiple public declarations and various
    tweaks to the algorithm and to company policies allegedly aimed at addressing
    the issue. Before moving on to the ills of `Facebook`’s algorithmic advertising
    system, I’d like to take a moment to look at another problematic issue with `Google`’s
    algorithmic advertisements: racism. All the discussion so far in this section
    has been about `Google`’s placement of ads on external sites in the Display Network;
    the following discussion concerns the other form of `Google` advertising, where
    ads are placed directly on `Google`’s site and aligned with user-specified keyword
    searches.'
