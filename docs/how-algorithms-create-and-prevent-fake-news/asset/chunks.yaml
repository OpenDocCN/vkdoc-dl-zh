  trans: '

    # 博客经济学


    表面上看，博客的收入来自出售广告。在线广告有多种金钱机制，例如广告公司把横幅广告固定在博客顶部，并根据*页面浏览量*（即看到横幅广告的博客访客数量）付费；在某些情况下，当博客读者点击广告链接并最终从广告公司实际购买产品时，广告商还会额外支付一笔费用。但最常见的形式是按展示付费和按点击付费广告，即博客在其网站的某个位置放置广告，并根据*展示量*（广告被博客读者看到的次数）或*点击量*（广告被博客读者点击的次数）获得报酬。归根结底，要最大化广告收入，博客需要最大化流量。


    但为什么我在上一段中要写“表面上看”呢？嗯，这里存在某种庞氏骗局的动态机制。即使是热门博客，广告收入也往往相对较低，因此大多数博客的真正野心——即使它们不承认——是获得足够的人气和流量，以便被一个更大的组织收购，并将其整合到更大的网站中以增加流量——这通常是为了让更大的网站提高被更大型组织收购的几率。


    例如，内特·西尔弗那个技术性强却出奇受欢迎的政治民调博客于 2008 年上线，2010 年被《纽约时报》引入，2013 年被 ESPN 收购，随后在 2018
    年转至其姊妹公司 ABC 新闻。阿里安娜·赫芬顿开创性的综合新闻博客《赫芬顿邮报》于 2005 年以一百万美元的投资创立，并在 2011 年以三亿五千万美元的价格卖给了美国在线——但颇具说明意义的是，在出售时，其年广告收入仅为三千一百万美元。这种收购价与年收入十倍的比例相当极端，表明美国在线押注于持续的长期增长以及其他因素，例如增加这样一个受欢迎的在线报纸所带来的声望，以及将超级明星阿里安娜本人招致麾下。归根结底，无论一个博客的目标是否是被收购，成功的道路都是网络流量。


    接下来，让我从博客的经济学转向博主本身的经济学。在博客的早期，博主要么按固定费率获得报酬，并需满足每日最低发帖量，要么按每篇帖子付费；在 21 世纪初，根据机构不同，这个费率通常低至每篇帖子五到十美元。当《Gawker》放弃这种按篇付费制度，转而每月向每位博主支付基本工资，并根据其文章记录的页面浏览量增加奖金时，一场范式转变发生了。从广告收入的角度来看，这种转变是合理的，并且迅速波及了整个博客圈，开启了一个新时代，在这个时代，页面浏览量成为了博客的基本货币。


    《Gawker》甚至更进一步，在其办公室安装了一块大板，实时显示所有博主及其帖子的页面浏览量统计数据（其他博客很快也采用了类似方法）。这导致了公司内部博主之间激烈的页面浏览量竞争，旨在刺激生产力，并标志着对数据分析的高度重视，使得博主们不得不关注哪些文章产生了最多的页面浏览量。


    这种博主薪酬制度公然是简化论的：读者对博文的看法无关紧要。事实上，读者是否真的阅读了帖子都无关紧要——一旦帖子的链接被点击，页面浏览量就被记录下来，这才是唯一重要的。一个不幸但基本可预见的后果是标题党的泛滥：那些
    catchy 的、通常是低俗的标题，鼓励点击而非体现优质新闻业。^(¹) 一篇经过方法严谨研究、事实核查的长文，其经济价值并不比一篇空洞的小报垃圾文章高。这过于简化了情况，因为许多读者关注某些博客恰恰是因为它们持续发布高质量文章，但许多读者在浏览社交媒体或新闻聚合器时，也会点击任何最吸引眼球的故事，而在后一种情况下，博客/机构的名声和声誉往往是点击决策中的次要因素——最重要的是标题。


    另一个重要的动态因素是，博文产生页面浏览量的生命周期通常很短。因此，博主和博客在持续追求更高流量的过程中，承受着巨大的压力，要尽可能快、尽可能多地生产帖子。传统的印刷报纸每天只需生产填充一个印刷版的内容；有线新闻网络需要生产填充全年无休、每天
    24 小时的内容；而博客拥有无限的空间，并且会因试图填满这种无限性而获得回报。这鼓励了仓促、草率的写作和新闻捷径；博主根本没有时间进行事实核查。事实上，引发争议的帖子往往也能产生页面浏览量。更糟糕的是，新闻文章中彻头彻尾的谬误常常会诱使不满的读者留下评论抱怨和/或纠正文章，但在博客上评论通常涉及多次点击和数据轨迹，这些都会变成博主口袋里的美元（好吧，是美分）。


    将这些观察综合起来，我们看到了一场冲击新闻业根基的完美风暴。博客和博主几乎都财务拮据，赚取的收入远低于局外人的预期，因此迫切需要更多的页面浏览量——无论是为了直接赚取广告收入，还是为了提高获得丰厚收购的可能性。这驱使他们过快地产出文章，几乎没时间进行事实核查和验证来源。即使他们有时间进行事实核查，他们痴迷的页面浏览量统计数据也表明，说实话并没有真正的经济激励，因为带有煽动性标题的误导性文章往往比真正的新闻作品更能吸引点击。


    让我非常清楚地说明这一点：正是博客行业这种数据驱动的动力，以及将多维度的新闻价值简化为一个单一、简单、肤浅的指标——页面浏览量——所导致的巨大过度简化和扭曲，才是这种危险状况的最大元凶。一些由页面浏览量驱动的博客能够依靠深思熟虑、方法严谨、准确无误的写作而蓬勃发展，在这个充斥着反常激励、迫使作者追求与这些崇高品质截然相反之物的市场中，这确实是非凡的。当我们看到优秀的博客和优秀的写作时，让我们都心存感激，因为它们确实存在，但它们在努力超越充斥互联网的、无处不在的标题党垃圾内容时，举步维艰。


    在介绍了博客和博主的数据驱动财务结构及其导致的有害压力之后，现在是时候回到之前关于博客圈分类学以及故事在其中传播的讨论了。

    '
- fmt: '# Up from the Bottom


    Renée DiResta, a researcher at the Stanford Internet Observatory, recently wrote
    in the *Atlantic* that “Media and social media are no longer distinct; consequential
    narratives emerge from the bottom up, as well as the top down, and bounce back
    and forth among different channels.” Recall that the propagation direction I haven’t
    yet directly addressed, despite claiming it is the one most responsible for our
    current morass of media mendacity, is the upward flow where stories start in small,
    typically special interest and/or geographically local blogs, and manage to work
    their way up the food chain, sometimes ending all the way at the top on national
    news sites. The questions we must ask here are: how and why does this happen,
    and why does this lead to less truthful news? The answers, as I next discuss,
    all essentially follow from the pageview economics of blogging.


    All blogs and sources of news, even the highly regarded ones at the top, are in
    constant search for new stories. There is a fundamental inequality at play that
    the supply of actual stories (meaning real events transpiring in the world that
    ought to be reported) is substantially smaller than the supply of stories produced
    by blogs and online newspaper—because, as I discussed above, the pressure to accumulate
    pageviews compels writers to fill the limitless bandwidth of the internet at an
    unhealthy rate. This creates a dangerous vacuum in which bloggers at all levels
    are under immense pressure to constantly find stories wherever they can, and oftentimes
    to create something out of nothing, to keep the wheels of the modern media machine
    turning.


    Blogs at the lowest levels of the hierarchy are typically underfunded and understaffed
    and tend to rely upon the small, close-knit nature of the community they are part
    of—meaning they often publish material based on suggestions from members of the
    community and follow leads on social media without really questioning their veracity.
    In many ways, this is quite reasonable: a respected national news station upon
    hearing some scandalous gossip regarding the Biden administration needs to be
    damn sure it is accurate before reporting it to the public, whereas a blog about
    Great Pyrenees dogs and their crazy antics is less concerned with the possibility
    that its posts might be construed as fake news. Generally speaking, smaller and
    more specialized blogs have fewer resources to investigate leads and less incentive
    to do so regardless.


    The problem starts to arise, however, when we look at the middle rung in the hierarchy.
    Here, the bloggers are still desperate for stories, and they simply don’t have
    time to search for them in traditional journalistic ways, so the obvious shortcut
    is to scour lower-tier blogs. Exciting posts that exhibit the potential to generate
    pageviews from a larger audience are quickly scooped up and refashioned by the
    mid-range bloggers. But these bloggers lack the time and resources to trace the
    stories back to their origins and fact-check them carefully, so a safe hedge is
    to simply report that such-and-such blog (the lower-tier one) is reporting that
    such-and-such happened. You can’t be wrong: whether or not that original story
    is true, it is unquestionably true that the story was featured on the blog in
    question.


    Next, with enough horizontal propagation, the distinction between the story and
    the meta-story becomes blurred as bloggers quote each other and race to share
    in the pageviews generated by this scoop. In time, the popularity of this story
    itself can become the story—for virality is newsworthy, isn’t it?—at which point
    it is safe for national newspapers to elevate matters to the highest rung with
    headlines about this story taking the internet by storm. We saw this frequently
    in the final years of Steve Jobs: rumors of unknown provenance swirled about the
    shadows of the internet, gaining traction in unpredictable ways, and upon reaching
    a critical mass ended up influencing the stock price of Apple and in this way
    became *real* news, so to speak.


    The upward creep of blog posts through the hierarchy happens in more direct ways
    as well. A national survey found that nearly nine out of ten journalists use blogs
    to research their stories, so even those at the top look downward for information.
    Moreover, the best way for a blogger to gain serious traffic is to have their
    stories picked up—and linked to—by higher-level organizations, especially national
    news sites. So, mid-level bloggers often submit their posts to news aggregators
    that are monitored by mass media journalists, and they even directly contact journalists
    in the hopes of getting interest from them—because, after all, even these journalists
    are in the constant hunt for pageview-generating popular stories.


    Ryan Holiday wrote a marvelous book on this phenomenon, *Trust Me, I’m Lying:
    Confessions of a Media Manipulator*, based on his experiences of deliberately
    encouraging and exploiting for commercial gain this blogospheric form of upward
    mobility. In it, he describes how he can “turn nothing into something by placing
    a story with a small blog that has very low standards, which then becomes the
    source for a story by a larger blog, and that, in turn, for a story by larger
    media outlets.” He says that he often sees “uniquely worded or selectively edited
    facts that paid editors inserted into Wikipedia show up later in major newspapers
    and blogs, with the exact same wording,” a clear sign of journalistic shortcuts
    and how they can be taken advantage of. He insightfully, and frighteningly, summarizes
    the societal consequences of this game that he played for years as follows: “The
    news, whether it’s found online or in print, is just the content that successfully
    navigated the media’s filters. [...] Since the news informs our understanding
    of what is occurring around us, these filters create a constructed reality.” And
    remember, this constructed reality Holiday refers to stems from data-driven pageview
    economics. Data in the 21st century is supposed to provide a powerful new unvarnished
    window of truth into our world, but we see in this discussion of internet journalism
    that, alarmingly, it also undergirds a perilous perversion of our basic perceptions
    of the world.'
