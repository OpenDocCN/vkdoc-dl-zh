- fmt: 'Prior to reinforcement learning, the recommendation algorithm would choose
    and then rank the up next videos by how long it estimates the user will watch
    each one individually. This is like playing chess by only looking one move ahead.
    With reinforcement learning, the algorithm develops long-term strategies for hooking
    the viewer. For example, showing someone a short video that is outside their comfort
    zone might only score a couple minutes of watch time, but if doing this brings
    the viewer to a new topic they hadn’t previously been exposed to, then the user
    might get sucked into this new topic and end up sticking around longer than if
    they had stayed in reliable but familiar territory. This is a long-term strategic
    aspect of YouTube recommendations, and it helps illustrate how reinforcement learning
    is well suited to tackle the delicate balances discussed earlier between popularity
    and freshness and between familiarity and novelty.


    ### And…


    What other significant changes to the algorithm have occurred? It is difficult
    to know because the algorithm is constantly tweaked and modified, but YouTube
    keeps the details under a veil of corporate secrecy. We know the broad strokes
    of the Google Brain deep learning methodology because, in a somewhat unusual move
    for the company, in 2016 its engineers posted a high-level technical report^([^(105)](#fn105))
    describing their neural network framework for the algorithm. YouTube engineers
    also posted a paper^([^(106)](#fn106)) in 2019 on the reinforcement learning approach,
    but it takes a rather academic tone: it describes the theoretical advances provided
    by the proposed deep learning reinforcement learning hybrid approach, and it includes
    some brief empirical results from a few limited experiments, but it gives no indication
    that the method discussed in the paper has actually been commercially implemented
    in the YouTube recommendation algorithm. We only know that it did indeed become
    part of the algorithm in 2018 because of a comment^([^(107)](#fn107)) at a conference
    by the lead author of the paper.


    YouTube engineers have released some other technical papers on video recommendation
    systems (e.g., another one^([^(108)](#fn108)) in 2019), but we don’t know which
    if any of these have been absorbed into the official YouTube algorithm and which
    are just publications providing lines on the resumes of the authors. In many ways,
    the 2016 deep learning paper was the last major close-up view that has been offered
    from the inside.


    Well, almost. Guillaume Chaslot is a former Google AI engineer who worked on the
    YouTube recommendation algorithm, and since leaving^([^(109)](#fn109)) the company
    in 2013, he has become a public crusader against what he perceives to be the harmful
    impacts of the algorithm. He has been fighting to shed light on the algorithm—and
    on the behind-closed-doors engineering decisions that have gone into crafting
    it. I’ll come back to his critiques and exposés later in this chapter, but first
    I need to conclude this brief history of YouTube’s recommendation algorithm.


    Due to the critical spotlight Chaslot and others have shone on the algorithm,
    and the large amount of attention—flak, some might say—it received surrounding
    the 2016 US presidential election, YouTube company representatives have been forced
    to comment publicly on some aspects of the algorithm. This has provided us with
    some nuggets of information, but nothing nearly as detailed as what was contained
    in the 2016 Google Brain technical report. For instance, in a 2018 investigation^([^(110)](#fn110))
    by the *Guardian*, YouTube representatives said that in 2016 they switched from
    purely optimizing watch time to also taking into account “user satisfaction” by
    considering how many likes videos have received and also by conducting surveys
    and incorporating data from those into the algorithm.


    You will see a few more details of the algorithm throughout this chapter as I
    discuss several external data-driven investigations into the algorithm (by Chaslot
    and other researchers), but for now it is time to turn to the main question of
    this chapter: what impact has YouTube’s recommendation algorithm had on society—especially
    in the context of fake news, popular belief in conspiracy theories, and the political
    candidates/parties that leverage these for support? In the aforementioned *Guardian*
    investigation, a YouTube spokesperson had this to say in regard to the algorithm
    potentially influencing the 2016 election in Trump’s favor: “Our search and recommendation
    systems reflect what people search for, the number of videos available, and the
    videos people choose to watch on YouTube. That’s not a bias towards any particular
    candidate; that is a reflection of viewer interest.” One of the earliest, most
    prominent, and most vocal critics of YouTube’s algorithm has been techno-sociologist
    Zeynep Tufekci. In the same *Guardian* piece, she writes: “The question before
    us is the ethics of leading people down hateful rabbit holes full of misinformation
    and lies at scale just because it works to increase the time people spend on the
    site—and it does work.”


    Whose side should we believe here? Perhaps a good place to start looking for answers
    is in Brazil.'
