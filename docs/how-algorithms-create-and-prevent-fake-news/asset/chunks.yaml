  trans: '

    # 皮尤的随机漫步


    `皮尤`的探索^((125))是通过重复以下步骤十七万次来进行的：


    1.  从一个包含超过一万四千个英语 YouTube 频道（每个频道至少有二十五万订阅者）的列表中，随机选择一个排名靠前的视频。

    2.  随机选择排名前五的“接下来播放”推荐视频中的一个。

    3.  重复上一步骤四次。


    这产生了十七万条不同的、深入算法路径的五步漫步——所有这些操作都是针对一个“匿名”用户进行的，即一个未登录的用户，因此没有观看历史或其他算法可以依赖的个人数据。通过从整体上对这些随机漫步视频进行实证分析，`皮尤`的主要发现是，YouTube
    算法鼓励用户观看时长更长、更受欢迎的视频：视频的平均时长从最初选定视频的九分半钟，增加到随机漫步中第五个视频的十五分钟；平均观看次数则从第一个视频的八百万次增加到第五个视频的三千万次。这些随机漫步中的视频涵盖了各种主题，但其中很大一部分是音乐视频、电视竞赛节目、儿童内容和生活小窍门。


    换句话说，`皮尤`随机漫步实验的要旨在于，YouTube 将观众推向流行、通常是主流的內容。一些人将此视为证据，认为对 YouTube 算法用分裂性的另类右翼内容污染我们政治环境的担忧，即使不是完全捏造，也是夸大其词了。我对此并不信服，许多其他学者也是如此。


    首先，启动这些随机漫步的视频非常受欢迎——正如我提到的，平均有八百万次观看。可以想象，一旦算法发现用户正在观看非常流行的内容，它就会让用户停留在高观看量内容的轨道上，而那些对观看次数较少的视频表现出兴趣的用户，则可能会被推荐不那么主流的內容。我们不知道如果从更专业的内容开始，随机漫步的结果会有何不同。其次，这里的大规模分析相当粗糙——它总结了观看次数、时长和内容类别，但没有考察诸如合法新闻与假新闻、主流政治与极端政治（更不用说左派与右派）之间的区别。用户通常被推向音乐视频和儿童视频这类无害类别，这多少令人感到安心，但这种整体行为可能掩盖了许多重要的差异，并且对于专门在推荐中寻找新闻相关内容的用户，它没有提供任何信息。正如你很快会看到的，还有其他探究推荐算法的方法，而更精细的梳理会揭示出一个更为阴暗的故事。


    # 查斯洛的政治推荐数据


    `查斯洛`，这位 2013 年被 YouTube 推荐算法团队解雇的计算机工程师，在 2016 年编写了一个程序，该程序与`皮尤`随机漫步中使用的程序类似，旨在探索
    YouTube 推荐算法将观众引向何处。其方法是从一个“种子”视频开始，然后自动依次点击排名第一的“接下来播放”视频。他的方法与`皮尤`的方法相比，一个主要区别在于，`查斯洛`的种子视频并非随机选取的热门视频，而是他相信在
    2016 年大选期间常见和/或重要的特定搜索的结果。也就是说，他试图模拟的不仅仅是 YouTube 上基于随机热度的推荐，更是源于特定时政搜索的推荐。他还考察了推荐视频中信息的质量，而不仅仅是像`皮尤`的整体分析那样提供粗略的主题分类。在十八个月的时间里，他使用自己的程序进行了各种实验，其结果发表在^((126))《卫报》上。他的研究“表明
    YouTube 系统性地放大了那些具有分裂性、煽动性和阴谋论的视频。”


    例如，当`查斯洛`的种子视频是对“米歇尔·奥巴马是谁？”这一关键词搜索的结果时，接下来的推荐链主要导向了声称她是男性的视频。当种子视频来自对教皇的搜索时，在“接下来播放”推荐序列中，有百分之八十的视频声称他是“邪恶的”、“撒旦般的”或“反基督者”。相当引人注目的是，`查斯洛`发现，无论用户搜索的是“克林顿”还是“特朗普”，然后点击一个视频并跟随“接下来播放”的推荐序列，算法“都更有可能将你推向支持特朗普的方向”。特朗普在
    2016 年赢得选举人团，得益于分布在三个摇摆州的八万张选票；当时，美国有超过一亿五千万 YouTube 用户，因此，推荐算法中即使存在微小的政治偏见，也可能对选举结果产生决定性影响。


    `查斯洛`向《卫报》的记者发送了一个包含八千多个视频的数据库，这些视频是他的程序在 2016 年美国大选前的四个月里，对“特朗普”和“克林顿”进行等量搜索，然后跟随排名第一的“接下来播放”视频链后所到达的。这些视频当然不全面，甚至不一定能代表当时
    YouTube 上的政治内容，但它们确实提供了大选前夕推荐系统的一个快照，用托数字新闻中心研究主任`乔纳森·奥尔布赖特`的话说，这是一种“可靠的方法论”，“捕捉到了
    YouTube 政治生态系统的明显方向”。

    '
- fmt: '# When analyzing these eight thousand videos


    When analyzing these eight thousand videos, the *Guardian* journalists said they
    “were stunned by how many extreme and conspiratorial videos had been recommended,
    and the fact that almost all of them appeared to be directed against Clinton.”
    Some of the recommended videos were unsurprising—clips from speeches, debates,
    news, even *Saturday Night Live* sketches—but they often found anti-Clinton conspiracy
    videos among the recommendations offered by the algorithm to a user watching one
    of these more mainstream political videos. The anti-Clinton conspiracy theories
    ranged from questioning her health and mental fitness to “accusing Clinton of
    involvement in murders or connecting her to satanic and paedophilic cults.” The
    journalists went through by hand the top one thousand most recommended videos
    in Chaslot’s database of eight thousand and found that “Just over a third of the
    videos were either unrelated to the election or contained content that was broadly
    neutral or even-handed. Of the remaining 643 videos, 551 were videos favouring
    Trump, while only 92 favoured the Clinton campaign.”


    Chaslot’s data show that the recommendation algorithm was particularly favorable
    to Alex Jones’ *InfoWars* channel, which YouTube eventually removed and banned
    in 2018—about a week after Facebook first did so. When YouTube took the channel
    down, it had already amassed two and a half million followers and one and a half
    billion pageviews across thirty-six thousand videos. Another channel that was
    heavily pushed by the recommendation algorithm is the *Next News Network* run
    by Gary Franchi, which according to the *Guardian* “has the appearances of a credible
    news channel. But behind the facade is a dubious operation that recycles stories
    harvested from far-right publications, fake news sites and Russian media outlets.”
    Chaslot’s research suggests that the popularity of this channel could largely
    have come from YouTube’s recommendation algorithm; YouTube sharply dismissed this.
    The *Guardian* journalists contacted Franchi to find out who was correct in this
    debate, and Franchi sent back screenshots of the official private data that YouTube
    provides to its content creators on the sources of their videos’ traffic. One
    of Franchi’s more popular videos was a fake news story about Bill Clinton raping
    a thirteen-year-old that had two and a half million views; Franchi’s data screenshot
    showed that the largest source of traffic to this video was YouTube recommendations.
    In fact, YouTube recommendations were the primary traffic source for all but one
    of the videos in Franchi’s screenshot.


    While Franchi is a professional (of sorts) fully devoted to his channel, the *Guardian*
    found that even the “amateur sleuths” and “part-time conspiracy theorists,” who
    typically received only a few hundred views on their videos, were “shocked when
    their anti-Clinton videos started to receive millions of views, as if they were
    being pushed by an invisible force.” And in nearly every case, YouTube’s traffic
    data revealed that invisible force to be the recommendation algorithm. In one
    case, YouTube emailed a content creator that his anti-Clinton fake conspiracy
    video violated its guidelines—and yet, traffic continued to flow in to the video
    from the recommendation algorithm after this email, and it ended up getting over
    two million views prior to the election.


    ## Tracking Commenters


    In 2019, a team of scholars at a Brazilian research institute and a Swiss research
    institute conducted a different kind of study^([^(127)](#fn127)) into how YouTube
    might be driving people to the far right. The team manually classified over three
    hundred thousand videos on nearly three hundred fifty YouTube channels into a
    system of four categories designed by the Anti-Defamation League that provides
    a spectrum of extremism. From least to most extreme, these are media (traditional
    factual news), the intellectual dark web (IDW, a community that openly considers
    controversial topics like eugenics and “race science”), the alt-lite (which purports
    to deny white supremacy but believes in conspiracy theories about “replacement”
    by minority groups), and the alt-right (a loose segment of the white supremacist
    movement consisting of individuals who reject mainstream conservatism in favor
    of politics that embrace racist, anti-Semitic, and white supremacist ideology
    and who push for a white ethnostate).


    By tracking the authors of over seventy-two million comments on these videos,
    they found that “users consistently migrate from milder to more extreme content”
    and “users who consumed alt-lite or IDW content in a given year go on to become
    a significant fraction of the alt-right user base in the following year.” This
    team also investigated the recommendation algorithm and found possible pathways
    to alt-right radicalization, but they were rather faint (“from the alt-lite we
    follow the recommender system 5 times, approximately 1 out of each 25 times we
    will have spotted an alt-right channel”).


    It should be noted that tracking of comment activity provides only a limited and
    possibly distorted window into YouTube viewership because the large majority of
    viewers do not comment (and one cannot presume that the commenters are representative
    of the full population of viewers), and also many comments are from viewers refuting
    the claims in the video and debating with, or simply trolling, the supporters.
    This research project did not consider the content of comments. Moreover, the
    fact that commenters flow to further extremes on YouTube each year does not guarantee
    that YouTube is the cause of this rightward migration; it could well be that some
    external force is pushing viewers this way, and YouTube is merely reflecting this
    force. Nonetheless, tracking commenters is an interesting way of collecting empirical
    evidence that is quite distinct from the random walk approaches discussed earlier—and
    this commenter study appears to point in the same general direction as those random
    walk studies.


    In response to this Brazilian-Swiss investigation, YouTube said^([^(128)](#fn128))
    “We strongly disagree with the methodology, data and, most importantly, the conclusions
    made in this new research.” Incidentally, when journalists from the *Guardian*
    reached out to YouTube for a reaction to their investigation based on Chaslot’s
    database, YouTube responded that it has a great deal of respect for the newspaper
    and its journalists but that “We strongly disagree, however, with the methodology,
    data and, most importantly, the conclusions made in their research.” We can at
    least give YouTube credit for consistency.


    ## Contradictory Results


    Another empirical study^([^(129)](#fn129)) of the recommendation algorithm was
    conducted in 2019 and, like the Pew random walk investigation, found that YouTube’s
    recommendation algorithm did the opposite of radicalize—it “actively discourages
    viewers from visiting radicalizing or extremist content. Instead, the algorithm
    is shown to favor mainstream media and cable news content over independent YouTube
    channels.” The authors, Ledwich and Zaitsev, even assert “we believe that it would
    be fair to state that the majority of the views are directed towards left-leaning
    mainstream content.”


    This created quite a stir on social media, and it elicited a lengthy response^([^(130)](#fn130))
    from the Brazilian-Swiss team whose findings it directly contradicts. The Brazilian-Swiss
    team began their point-by-point rebuttal with the following pithy accusation:
    “Large-scale measurement and analysis of social media data is hard. The authors
    [Ledwich and Zaitsev] misunderstood their data source and ended up measuring a
    different thing than they thought they did, and made unfounded claims based on
    their results.’’ Ledwich and Zaitsev in turn rebutted^([^(131)](#fn131)) this
    rebuttal. It’s hard to know what to make of this debate; both sides appear to
    raise valid points while reaching diametrically opposed conclusions.'
