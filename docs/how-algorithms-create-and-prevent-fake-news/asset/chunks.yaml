  trans: '

    ### 法律诉讼


    在民权倡导者和法律组织多年施压后，2019 年 3 月，美国公民自由联盟（ACLU）宣布，作为多起诉讼和解的结果，Facebook 最终同意对其广告平台进行全面改革。ACLU
    的声明^(²⁵⁶)称赞这是“一项历史性的民权和解协议”，并详细说明了 Facebook 将实施的“重大变革”：“在今天宣布的这项史无前例的和解协议中，Facebook
    同意在其平台上为广告商创建一个独立空间，用于发布招聘、住房和信贷广告。在这个独立空间内，Facebook 将取消基于年龄和性别的定向投放，以及与受保护特征或群体相关的定向选项。基于邮政编码或半径小于
    15 英里的地理区域的定向投放也将被禁止。”Facebook 表示将在年底前实施这些变革——也就是说，它允许自己继续违反联邦法律长达九个月。


    然而，就在 ACLU 宣布这项和解协议仅仅一周后，Facebook 就被美国住房和城市发展部（HUD）以违反《公平住房法》为由在联邦法院提起诉讼。相当奇怪的是，联邦政府并未对*ProPublica*在两年半前揭露的、且一直未予纠正的明显违反《公平住房法》的行为采取行动，而最终提起诉讼的时间，恰恰是在
    ACLU 达成旨在彻底终结 Facebook 惯常违规行为的里程碑式和解协议之后几天。政治动机可能在其中发挥了作用，因为特朗普政府当时正对 Facebook
    及其他科技巨头的一些行为感到不满，一些人认为这些行为压制了平台上的右翼言论。在报道 HUD 这项指控时，《华盛顿邮报》宣称^(²⁵⁷)“特朗普政府首次对一家科技巨头实施制裁”，并透露
    HUD 已警告 Twitter 和谷歌，正在审查它们的做法是否存在类似违规行为。无论动机如何，我坚信这是 HUD 采取的正确行动，尽管早该如此。


    但不幸的是，人们很快就会发现，Facebook 的种族主义问题比最初认为的更为根深蒂固。


    ### 算法偏见


    在 HUD 提起诉讼八个月后，由东北大学两位教授领导的一组学者发表了一篇研究论文^(²⁵⁸)，表明在 Facebook 的广告系统中消除被禁止的歧视，远比简单地从界面中移除被排除的类别要困难得多。原因在于，驱动
    Facebook 用于决定向哪些用户展示哪些广告的机器学习算法的数据中，本身就嵌入了社会偏见。


    Facebook 允许每个广告购买者为算法选择三种不同的优化指标之一：广告获得的展示次数、获得的点击量和互动量，或产生的销售额。这使广告分发成为一个监督学习任务：根据广告内容和选定的受众类别，算法预测哪些
    Facebook 用户将产生所选指标的最高价值。然后，广告会根据这些预测显示在用户的新闻推送中。由于这是监督学习，预测基于先前用户行为的数据，而偏见问题就由此产生：算法会在数据中寻找任何可能有助于优化所选指标的规律——即使这些规律反映了历史偏见。简而言之，Facebook
    的广告算法从其接收的训练数据（这些数据反映了社会中的这些偏见形式）中学习种族主义、性别歧视和其他形式的偏见；然后利用这些偏见试图提升所选广告指标，从而导致带有偏见的结果，进而将社会进一步推向种族主义、性别歧视和歧视的深渊。这是另一个有害的数据驱动算法反馈循环，类似于第
    5 章在讨论用于就业筛选的算法测谎偏见时简要提及的情况。


    这项研究的具体发现说明了 Facebook 广告算法中偏见的严重性和范围。研究人员为医生创建了一则招聘广告，发现 Facebook 为其提供的受众中有 44%是白人；而一则几乎相同的清洁工招聘广告，其受众中只有
    36%是白人。人工智能（AI）相关职位的广告比例更高（53%），而出租车司机广告的比例则更低（29%）。这里的广告购买者并未选择不同的目标受众，他们只是更改了广告内容中的文字，然后让算法自行运作。同样，AI
    职位的广告展示给了 54%为男性的受众，而护理职位的广告受众中男性仅占 37%，秘书职位为 26%，幼儿园职位仅为 24%。研究人员还发现，Facebook
    的算法为房屋销售广告提供的受众中约四分之三是白人，而房屋租赁广告的受众中仅约一半是白人。Facebook 广告平台的巨大规模（它控制了美国数字广告市场 22%的份额，仅次于谷歌^(²⁵⁹))意味着，即使百分比上的微小差异，也会导致观看这些不同广告的总人数产生巨大差异。


    总之，东北大学的这项研究发现，Facebook 的算法检测并利用了——这反过来意味着延续和放大了——现有的偏见，这些偏见使白人男性比少数族裔女性更容易获得高薪和更体面的工作，并且鼓励白人比非白人更倾向于拥有住房。Facebook
    的广告购买者如何尝试弥补这种自动化的机器学习偏见呢？除了等待 Facebook 从内部彻底重新设计其系统外，基本上唯一的选择就是明确地将目标对准代表性不足的受众，例如，为科技职位和房屋销售广告选择黑人受众。但颇具讽刺意味的是，正如你所记得的，这种定向投放的选项恰恰是
    Facebook 为了消除其广告分发系统中的偏见而移除的。


    ### 企业进展


    2020 年 7 月，《华尔街日报》报道^(²⁶⁰)称，Facebook“正在创建新团队，专门致力于研究和解决其核心平台及 Instagram 部门上潜在的种族偏见问题，这背离了该公司此前不愿探索其产品如何影响不同少数族裔群体的态度。”此举是在民权组织（包括反诽谤联盟、Color
    of Change 和全国有色人种协进会）的持续施压、员工日益高涨的不满情绪以及持续数月的广告抵制（包括可口可乐、迪士尼、麦当劳、星巴克和沃尔玛等大型知名客户）之后——并且很可能是其结果——这些抵制使
    Facebook 损失了广告收入并损害了全球声誉。Facebook 的这些新的公平与包容团队旨在研究公司所有产品和算法——不仅仅是其定向广告平台——如何影响少数族裔用户，以及黑人、西班牙裔和其他族裔群体的用户体验与白人用户有何不同。让我们希望这些团队能够获得所需的资源和尊重，以便在公司内部产生积极影响。

    '
- fmt: '### What of Fake News?


    Since Facebook, unlike Google, only places ads on its own site, there is no risk
    of funding fake news organizations the way Google does. The only risk here is
    that fake news organizations might post ads on Facebook that users see while scrolling
    through their newsfeed, and the ads could be misinterpreted as actual news, despite
    a “sponsored” label on the ads. This is a significant concern—it is estimated^([^(261)](#fn261))
    that during the 2018 midterm elections, approximately four hundred million dollars
    was spent on political advertising on Facebook in the United States and users
    were receiving on average twelve political ads per day—but for the most part,
    this boils down to company policies rather than algorithmic behavior. As such,
    this aspect of fake news falls outside the purview of this book—other than that,
    as I will explore in the next chapter, Facebook uses algorithms to help moderate
    its platform and enforce its policies. That said, it’s worth taking a moment to
    highlight some of the significant developments and events concerning Facebook’s
    stance on fake news in advertising:


    - One week after the 2016 election, Facebook updated its advertising policies
    to clarify that its prohibition of deceptive and misleading content includes a
    ban on fake news:^([^(262)](#fn262)) “We do not integrate or display ads in apps
    or sites containing content that is illegal, misleading or deceptive, which includes
    fake news.” An academic study^([^(263)](#fn263)) came out later that aimed to
    measure the impact of this policy update. The authors used Twitter as a control
    group since it did not implement any advertising policy changes at the time, and
    they found that shares on Facebook of fake news articles about childhood vaccines
    dropped by seventy-five percent after this update compared to Twitter.


    - In August 2017, Facebook announced^([^(264)](#fn264)) that it would try to limit
    the spread of fake news by banning pages that have repeatedly shared disinformation
    from advertising on Facebook: “We’ve found instances of Pages using Facebook ads
    to build their audiences in order to distribute false news more broadly. Now,
    if a Page repeatedly shares stories that have been marked as false by third-party
    fact-checkers, they will no longer be able to buy ads on Facebook.”


    - In October 2019, Facebook denied a request from the Biden campaign to take down
    a video ad from the Trump campaign that falsely claimed Biden offered Ukraine
    a billion dollars in foreign aid if it halted the investigation of a company tied
    to his son.^([^(265)](#fn265)) The ad racked up five million views within a couple
    weeks. In a written response to the Biden campaign’s denied request, Facebook’s
    head of global elections policy hinted that the company has chosen to follow a
    more laissez-faire approach to moderating political advertising: “Our approach
    is grounded in Facebook’s fundamental belief in free expression, respect for the
    democratic process, and the belief that, in mature democracies with a free press,
    political speech is already arguably the most scrutinized speech there is.” I
    don’t see how to reconcile this statement with the company’s post-2016 election
    claim that it doesn’t allow fake news in ads, yet I haven’t been able to find
    any public statements overtly stating that that earlier policy has been revoked.


    - Days later, Elizabeth Warren’s presidential campaign ran a deliberately, and
    provocatively, false political ad on Facebook to illustrate that the platform
    was not doing enough to limit fake news in political advertising.^([^(266)](#fn266))
    The ad shockingly read: “Breaking news: Mark Zuckerberg and Facebook just endorsed
    Donald Trump for re-election. You’re probably shocked, and you might be thinking,
    ‘how could this possibly be true?’ Well it’s not. (Sorry.) But what Zuckerberg
    *has* done is given Donald Trump free rein to lie on his platform—and then to
    pay Facebook gobs of money to push out their lies to American voters.” In a subsequent
    tweet, Warren wrote “We intentionally made a Facebook ad with false claims and
    submitted it to Facebook’s ad platform to see if it’d be approved. It got approved
    quickly and the ad is now running on Facebook.” In another tweet, she wrote “Facebook
    changed their ads policy to allow politicians to run ads with known lies—explicitly
    turning the platform into a disinformation-for-profit machine. This week, we decided
    to see just how far it goes.”


    - On January 9, 2020, Facebook announced^([^(267)](#fn267)) the introduction of
    additional controls on the platform that allow users to reduce the amount of political
    content they see, if so desired. The announcement also included the following
    statement on the company’s political ad policy: “In the absence of regulation,
    Facebook and other companies are left to design their own policies. We have based
    ours on the principle that people should be able to hear from those who wish to
    lead them, warts and all, and that what they say should be scrutinized and debated
    in public.” The post practically begs for governmental regulation so that the
    tech giants don’t have to each chart their own course on political censorship
    and fact-checking: “Frankly, we believe the sooner Facebook and other companies
    are subject to democratically accountable rules on this the better.”


    - On January 24, 2020, Donald Trump’s reelection campaign ran political ads on
    Facebook claiming that the “Fake news media” will block his upcoming Super Bowl
    ad.^([^(268)](#fn268)) This was patently false—in fact, for a network TV station
    to block his ad would be a violation of FCC regulations. The Facebook ad also
    encouraged users to “DEMAND THAT THE LIBERAL MEDIA AIRS OUR AD,” which is particularly
    ironic since the Super Bowl, and hence Trump’s ad, was broadcast on Murdoch-owned
    Fox.


    - In June 2020, Facebook announced^([^(269)](#fn269)) that it would disallow ads
    from media organizations that are “wholly or partially under the editorial control”
    of foreign governments: “later this summer we will begin blocking ads from these
    outlets in the US out of an abundance of caution to provide an extra layer of
    protection against various types of foreign influence in the public debate ahead
    of the November 2020 election in the US.”'
  raw: '### What of Fake News?


    Since Facebook, unlike Google, only places ads on its own site, there is no risk
    of funding fake news organizations the way Google does. The only risk here is
    that fake news organizations might post ads on Facebook that users see while scrolling
    through their newsfeed, and the ads could be misinterpreted as actual news, despite
    a “sponsored” label on the ads. This is a significant concern—it is estimated^([^(261)](#fn261))
    that during the 2018 midterm elections, approximately four hundred million dollars
    was spent on political advertising on Facebook in the United States and users
    were receiving on average twelve political ads per day—but for the most part,
    this boils down to company policies rather than algorithmic behavior. As such,
    this aspect of fake news falls outside the purview of this book—other than that,
    as I will explore in the next chapter, Facebook uses algorithms to help moderate
    its platform and enforce its policies. That said, it’s worth taking a moment to
    highlight some of the significant developments and events concerning Facebook’s
    stance on fake news in advertising:


    *   One week after the 2016 election, Facebook updated its advertising policies
    to clarify that its prohibition of deceptive and misleading content includes a
    ban on fake news:^([^(262)](#fn262)) “We do not integrate or display ads in apps
    or sites containing content that is illegal, misleading or deceptive, which includes
    fake news.” An academic study^([^(263)](#fn263)) came out later that aimed to
    measure the impact of this policy update. The authors used Twitter as a control
    group since it did not implement any advertising policy changes at the time, and
    they found that shares on Facebook of fake news articles about childhood vaccines
    dropped by seventy-five percent after this update compared to Twitter.


    *   In August 2017, Facebook announced^([^(264)](#fn264)) that it would try to
    limit the spread of fake news by banning pages that have repeatedly shared disinformation
    from advertising on Facebook: “We’ve found instances of Pages using Facebook ads
    to build their audiences in order to distribute false news more broadly. Now,
    if a Page repeatedly shares stories that have been marked as false by third-party
    fact-checkers, they will no longer be able to buy ads on Facebook.”


    *   In October 2019, Facebook denied a request from the Biden campaign to take
    down a video ad from the Trump campaign that falsely claimed Biden offered Ukraine
    a billion dollars in foreign aid if it halted the investigation of a company tied
    to his son.^([^(265)](#fn265)) The ad racked up five million views within a couple
    weeks. In a written response to the Biden campaign’s denied request, Facebook’s
    head of global elections policy hinted that the company has chosen to follow a
    more laissez-faire approach to moderating political advertising: “Our approach
    is grounded in Facebook’s fundamental belief in free expression, respect for the
    democratic process, and the belief that, in mature democracies with a free press,
    political speech is already arguably the most scrutinized speech there is.” I
    don’t see how to reconcile this statement with the company’s post-2016 election
    claim that it doesn’t allow fake news in ads, yet I haven’t been able to find
    any public statements overtly stating that that earlier policy has been revoked.


    *   Days later, Elizabeth Warren’s presidential campaign ran a deliberately, and
    provocatively, false political ad on Facebook to illustrate that the platform
    was not doing enough to limit fake news in political advertising.^([^(266)](#fn266))
    The ad shockingly read: “Breaking news: Mark Zuckerberg and Facebook just endorsed
    Donald Trump for re-election. You’re probably shocked, and you might be thinking,
    ‘how could this possibly be true?’ Well it’s not. (Sorry.) But what Zuckerberg
    *has* done is given Donald Trump free rein to lie on his platform—and then to
    pay Facebook gobs of money to push out their lies to American voters.” In a subsequent
    tweet, Warren wrote “We intentionally made a Facebook ad with false claims and
    submitted it to Facebook’s ad platform to see if it’d be approved. It got approved
    quickly and the ad is now running on Facebook.” In another tweet, she wrote “Facebook
    changed their ads policy to allow politicians to run ads with known lies—explicitly
    turning the platform into a disinformation-for-profit machine. This week, we decided
    to see just how far it goes.”


    *   On January 9, 2020, Facebook announced^([^(267)](#fn267)) the introduction
    of additional controls on the platform that allow users to reduce the amount of
    political content they see, if so desired. The announcement also included the
    following statement on the company’s political ad policy: “In the absence of regulation,
    Facebook and other companies are left to design their own policies. We have based
    ours on the principle that people should be able to hear from those who wish to
    lead them, warts and all, and that what they say should be scrutinized and debated
    in public.” The post practically begs for governmental regulation so that the
    tech giants don’t have to each chart their own course on political censorship
    and fact-checking: “Frankly, we believe the sooner Facebook and other companies
    are subject to democratically accountable rules on this the better.”


    *   On January 24, 2020, Donald Trump’s reelection campaign ran political ads
    on Facebook claiming that the “Fake news media” will block his upcoming Super
    Bowl ad.^([^(268)](#fn268)) This was patently false—in fact, for a network TV
    station to block his ad would be a violation of FCC regulations. The Facebook
    ad also encouraged users to “DEMAND THAT THE LIBERAL MEDIA AIRS OUR AD,” which
    is particularly ironic since the Super Bowl, and hence Trump’s ad, was broadcast
    on Murdoch-owned Fox.


    *   In June 2020, Facebook announced^([^(269)](#fn269)) that it would disallow
    ads from media organizations that are “wholly or partially under the editorial
    control” of foreign governments: “later this summer we will begin blocking ads
    from these outlets in the US out of an abundance of caution to provide an extra
    layer of protection against various types of foreign influence in the public debate
    ahead of the November 2020 election in the US.”'
  trans: '

    ### 假新闻何去何从？


    由于 Facebook 与谷歌不同，仅在自家网站上投放广告，因此不存在像谷歌那样资助假新闻机构的风险。唯一的风险在于，假新闻机构可能在 Facebook 上发布广告，用户在浏览信息流时可能会看到这些广告，尽管广告上带有“赞助”标签，但仍可能被误认为是真实新闻。这是一个值得关注的问题——据估计^(²⁶¹)，在
    2018 年中期选举期间，美国在 Facebook 上的政治广告支出约为四亿美元，用户平均每天收到 12 条政治广告——但总体而言，这更多归结于公司政策而非算法行为。因此，假新闻的这一方面不在本书的讨论范围之内——不过，正如我将在下一章探讨的，Facebook
    会利用算法来协助管理其平台并执行其政策。即便如此，还是值得花点时间强调一下 Facebook 在广告中应对假新闻立场方面的一些重大进展和事件：


    - 2016 年大选一周后，Facebook 更新了其广告政策，明确禁止欺骗性和误导性内容，其中包括禁止假新闻：^(²⁶²)“我们不会在包含非法、误导或欺骗性内容（包括假新闻）的应用或网站中集成或展示广告。”随后有一项学术研究^(²⁶³)旨在衡量这一政策更新的影响。作者将
    Twitter 作为对照组，因为当时 Twitter 并未实施任何广告政策变更，他们发现，与 Twitter 相比，此次更新后，Facebook 上关于儿童疫苗的假新闻文章的分享量下降了
    75%。


    - 2017 年 8 月，Facebook 宣布^(²⁶⁴)将尝试通过禁止反复分享虚假信息的页面在 Facebook 上投放广告来限制假新闻的传播：“我们发现有些页面利用
    Facebook 广告来建立受众群体，以便更广泛地传播虚假新闻。现在，如果一个页面反复分享被第三方事实核查机构标记为虚假的故事，他们将无法再在 Facebook
    上购买广告。”


    - 2019 年 10 月，Facebook 拒绝了拜登竞选团队的要求，即撤下特朗普竞选团队的一则视频广告，该广告虚假声称拜登向乌克兰提供十亿美元的外国援助，条件是乌克兰停止调查一家与他儿子有关的公司。^(²⁶⁵)该广告在几周内获得了五百万次观看。在给拜登竞选团队被拒请求的书面回复中，Facebook
    全球选举政策主管暗示，该公司选择对政治广告采取更自由放任的监管方式：“我们的做法基于 Facebook 对言论自由的根本信念、对民主进程的尊重，以及这样一种信念：在拥有自由媒体的成熟民主国家，政治言论可以说已经是受到最严格审视的言论。”我不明白如何将这一声明与该公司在
    2016 年大选后声称不允许广告中出现假新闻的说法相协调，但我尚未能找到任何公开声明明确表示该早期政策已被撤销。


    - 几天后，伊丽莎白·沃伦的总统竞选团队在 Facebook 上故意且挑衅性地投放了一则虚假政治广告，以说明该平台在限制政治广告中的假新闻方面做得不够。^(²⁶⁶)这则广告惊人地写道：“突发新闻：马克·扎克伯格和
    Facebook 刚刚支持唐纳德·特朗普连任。你可能感到震惊，也许在想，‘这怎么可能是真的？’好吧，这不是真的。（抱歉。）但扎克伯格*确实*做了的是，他给了唐纳德·特朗普在他的平台上撒谎的自由——然后让特朗普付给
    Facebook 大笔钱，向美国选民推送他们的谎言。”在随后的一条推文中，沃伦写道：“我们故意制作了一则带有虚假声明的 Facebook 广告，并将其提交给
    Facebook 的广告平台，看看它是否会被批准。它很快就被批准了，现在这则广告正在 Facebook 上运行。”在另一条推文中，她写道：“Facebook
    改变了他们的广告政策，允许政客投放带有已知谎言的广告——明确地将该平台变成了一个为牟利而传播虚假信息的机器。本周，我们决定看看这到底能走多远。”


    - 2020 年 1 月 9 日，Facebook 宣布^(²⁶⁷)在平台上引入额外控制措施，允许用户（如果愿意）减少他们看到的政治内容数量。该公告还包括以下关于公司政治广告政策的声明：“在缺乏监管的情况下，Facebook
    和其他公司只能自行设计政策。我们的政策基于这样一个原则：人们应该能够听到那些希望领导他们的人的声音，无论其优缺点如何，并且他们所说的话应该在公众面前受到审视和辩论。”这篇帖子几乎是在恳求政府监管，这样科技巨头就不必各自在政治审查和事实核查上自行其是：“坦率地说，我们认为
    Facebook 和其他公司越早在这方面受到民主问责规则的约束越好。”


    - 2020 年 1 月 24 日，唐纳德·特朗普的连任竞选团队在 Facebook 上投放政治广告，声称“假新闻媒体”将阻止他即将播出的超级碗广告。^(²⁶⁸)这显然是错误的——事实上，网络电视台阻止他的广告将违反
    FCC 的规定。这则 Facebook 广告还鼓励用户“要求自由派媒体播放我们的广告”，这尤其具有讽刺意味，因为超级碗（以及特朗普的广告）是在默多克旗下的福克斯电视台播出的。


    - 2020 年 6 月，Facebook 宣布^(²⁶⁹)将禁止“完全或部分受外国政府编辑控制”的媒体机构投放广告：“今年夏末，出于高度谨慎，我们将开始在美国屏蔽这些媒体的广告，以便在
    2020 年 11 月美国大选前的公开辩论中，为抵御各种形式的外国影响提供额外保护层。”

