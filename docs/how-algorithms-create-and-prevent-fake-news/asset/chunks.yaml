    \n# 6. Gravitating to Google\n\nThe Dangers of Letting an Algorithm Answer Our\
    \ Questions\n\n> *Search engines have come to play a central role in corralling\
    \ and controlling the ever-growing sea of information that is available to us,\
    \ and yet they are trusted more readily than they ought to be. They freely provide,\
    \ it seems, a sorting of the wheat from the chaff, and answer our most profound\
    \ and most trivial questions. They have become an object of faith.*\n> \n> —Alex\
    \ Halavais, *Search Engine Society*\n\nBillions of people turn to Google to find\
    \ information, but there is no guarantee that what you find there is accurate.\
    \ As awareness of fake news has risen in recent years, so has the pressure on\
    \ Google to find ways of modifying its algorithms so that trustworthy content\
    \ rises to the top. Fake news is not limited to Google’s main web search platform—deceptive\
    \ and harmful content also play a role on other Google products such as Google\
    \ Maps, Google News, and Google Images, and it also shows up on Google’s autocomplete\
    \ tool that feeds into all these different products. In this chapter, I’ll look\
    \ at the role fake news plays in all these contexts and what Google has done about\
    \ it over the years. In doing so, I’ll take a somewhat more expansive view of\
    \ the term “fake news” compared with previous chapters to include hateful racist\
    \ stereotypes and bigoted misinformation."
