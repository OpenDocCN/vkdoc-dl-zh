  trans: '

    ### Google 反向图片搜索


    谷歌的图片搜索标签页允许你进行关键词搜索，结果会显示网络上的图片，而非网站链接。你也可以将一张图片拖放到该标签页的搜索栏中，谷歌会搜索网络上与你提供的图片视觉上相似的图片；这被官方称为“反向图片搜索”，不过我认为更好的名称或许是“基于图片的搜索”，以区别于常见的关键词搜索。这项功能可以在多个方面帮助你对抗假新闻。如果你觉得正在阅读的文章中的某张图片被篡改过，可以尝试用该图片进行搜索，或许能找到未经修改的原版。即使图片未被篡改，你阅读的文章也可能断章取义地误导性地使用该图片（回想一下第
    3 章中那些具有欺骗性的标题示例）；搜索这张图片会显示它在网络上其他出现的位置，这有助于你追溯其原始出处。


    那么，这种图片搜索是如何工作的呢？你可能还记得第 3 章中提到，自编码器是一种深度学习架构，它能自我学习如何压缩数据。当专门应用于图像数据时，它会找到对图像中有意义的视觉结构进行数值编码的方法。一个过于简化的例子是，人脸图片可能会被缩减为几个数字，分别表示对象的年龄、发色、发型等——但实际上，自编码器使用的数字并没有如此简单的人类可解释含义，因为它们是由算法自身生成的。反向图片搜索最常用的方法如下：首先，使用自编码器将网络上的每张图片表示为一个数值向量。可以将其想象成这些图片的路线图，其中的数值向量是经纬度坐标的高维类比。自编码器的美妙之处在于，视觉上相似的图片会在这张地图上彼此靠近。然后，当用户用一张图片进行搜索时，该图片会被同一个自编码器转换为数值向量——即确定了它在地图上的坐标——而搜索返回的图片，就是那些坐标与输入图片坐标最接近的图片。


    也有一些工具可以对视频进行反向搜索。通常，这并非直接对整个视频进行数值编码，而是通过从视频中采样若干静态图像，然后搜索包含相似静态帧的其他视频来实现。换句话说，自编码器是在图像层面而非视频层面应用的。


    ### 其他工具


    *Hoaxy* ^(³⁵²) 是一个免费的关键词搜索工具，它能构建交互式网络可视化，展示经过主要事实核查网站核查过的言论在推特上的传播情况。*The Factual*
    ^(³⁵³) 是一个免费的移动应用和浏览器扩展，它利用机器学习来评估新闻文章的质量；其做法是结合几个与文章相关的不同估算量，例如记者的声誉评分、出版商的 NEQ
    类型评分，以及文章语言主观程度的衡量指标。


    ## 大型平台上的事实核查


    在本节中，我将探讨谷歌、YouTube、脸书和推特如何将事实核查功能嵌入其平台。


    ### 谷歌


    谷歌搜索本身无疑是帮助进行事实核查的常见信息来源，但在此我想重点介绍几个更直接聚焦于事实核查的附加功能。我之前提到过谷歌的知识图谱，它为某些搜索中出现的信息面板提供支持——虽然那里的信息并非总是准确，但谷歌允许用户提供反馈和更正。2020
    年 9 月，谷歌表示^(³⁵⁴) 已“深化了与政府机构、卫生组织和维基百科的合作关系”，以提高知识图谱的准确性。我还提到了谷歌的反向图片搜索如何成为揭示图片来源的有用工具。现在，让我转向其他一些与谷歌相关的有用工具和事实核查话题。


    如果你在谷歌搜索中以关键词“fact check”开头，那么在众多搜索结果的下方，谷歌会尝试提取出一句话的声明、做出该声明的个人或组织，以及（如果能找到的话）由事实核查组织提供的对该声明进行核查的开头部分。例如，我刚才搜索了“fact
    check AstraZeneca vaccine banned”，最上面的结果是来自 Full Fact 的事实核查链接——就在该链接下方，谷歌显示“声明：17
    个国家已在英国之外禁止使用阿斯利康疫苗”以及“声称者：脸书用户”和“由 Full Fact 核查：事实并非如此。当时……”。谷歌会自动将这类事实核查信息包含在某些关键词搜索中，并且在
    2020 年 6 月，它也开始将其包含在某些图片搜索的缩略图下方。^(³⁵⁵) 谷歌还有一个工具^(³⁵⁶)，允许用户直接对事实核查进行关键词搜索，并浏览近期的事实核查结果。


    ### YouTube


    2019 年 3 月，YouTube 开始为那些容易传播错误信息的主题搜索添加由第三方事实核查组织编写的信息面板——但这些事实核查实际上是针对关键词搜索的，而非其返回的任何特定视频。这项功能最初在印度和巴西推出，随后于
    2020 年 4 月扩展到美国，很大程度上是为了帮助应对与新冠疫情相关的错误信息泛滥。^(³⁵⁷) 一些事实核查组织，如 PolitiFact，提供对单个
    YouTube 视频的事实核查，不过你需要通过 PolitiFact 的网站^(³⁵⁸) 来访问这些内容，而非直接在 YouTube 上获取。

    '
- fmt: '### Facebook


    In addition to the efforts described in the previous chapter to remove or down-rank
    questionable content, Facebook also partners with a variety of fact-checking organizations
    to provide warnings, additional context, and fact-checks to some types of misinformative
    posts. In the nine months leading up to the 2020 election, Facebook placed warning
    labels on nearly two hundred million pieces of content that had been debunked
    by third-party fact-checkers. Facebook’s content flagging system described in
    the previous chapter is used to identify posts needing fact-checks; then—much
    like what we saw above with some of the public fact-checking tools—machine learning
    is used to group posts according to the claims involved in order to reduce the
    number of fact-checks humans need to perform.


    Since information, and misinformation, is often shared on Facebook in the form
    of visual memes, the company has gone to particular lengths to develop machine
    learning methods that can tell when two images have similar content. Rather than
    feeding the entire image into an autoencoder as would be done with a reverse image
    search, Facebook’s approach is to first identify key objects in the photo and
    only use the subregions containing them in the autoencoding process. A company
    blog post^([^(359)](#fn359)) explains that “this allows us to find reproductions
    of the claim that use pieces from an image we’ve already flagged, even if the
    overall pictures are very different from each other.” An extension of `RoBERTa`
    is also used to combine word and sentence embeddings with image embeddings, similar
    to the company’s “holistic” approach to content detection mentioned in the previous
    chapter.


    One of the fact-checking organizations that partnered with Facebook in the aftermath
    of the 2016 election was `Snopes`, but after two years of collaboration, `Snopes`
    decided to withdraw from the partnership in February 2019. `Snopes`’ official
    statement^([^(360)](#fn360)) on the matter included the following remark: “At
    this time we are evaluating the ramifications and costs of providing third-party
    fact-checking services, and we want to determine with certainty that our efforts
    to aid any particular platform are a net positive for our online community, publication,
    and staff.” In an interview^([^(361)](#fn361)) published the same day as this
    announcement, `Snopes`’ vice president of operations clarified that the main issue
    behind this decision was that `Snopes`, an organization employing only sixteen
    people, was overwhelmed with the flood of fact-checks Facebook required and questioned
    whether that labor-intensive approach made sense for both parties. He hinted that
    perhaps `Snopes`’ limited resources were best put elsewhere and that perhaps Facebook
    needed to find a more efficient way to limit the spread of fake news on its platform.
    He also complained about Facebook’s proprietary, platform-specific approach to
    fact-checking: “The work that fact-checkers are doing doesn’t need to be just
    for Facebook—we can build things for fact-checkers that benefit the whole web,
    and that can also help Facebook.” Another `Snopes` employee expressed that the
    organization should return to its focus on original reporting rather than diluting
    its efforts with the deluge of fact-checking requests for content on Facebook.


    ### Twitter


    In June 2020, just a few days after it started flagging some tweets from President
    Trump as potentially misleading or glorifying violence, Twitter discussed in a
    series of tweets^([^(362)](#fn362)) the platform’s focus on “providing context,
    not fact-checking” when it comes to public discourse. For the most part, Twitter
    has chosen a minimalist approach and only links to fact-checking sites in limited
    instances. In January 2021, Twitter launched^([^(363)](#fn363)) a small experimental
    “community-driven” pilot program called `Birdwatch` in which a select group of
    users can add notes to anyone’s tweets to provide them with additional context.
    Initially, only one thousand users are able to write these notes, and they are
    only visible on a `Birdwatch` website, but Twitter said it plans to expand the
    program and to eventually make the notes visible directly on the tweets they pertain
    to “when there is consensus from a broad and diverse set of contributors.”


    ## Summary


    This chapter opened with a list of publicly available tools that use machine learning
    to assist with fact-checking tasks, and it closed with a brief discussion of the
    fact-checking tools and activities at Google, YouTube, Facebook, and Twitter.
    Now you can go forth and do your own part in the fight against fake news!'
  raw: '### Facebook


    In addition to the efforts described in the previous chapter to remove or down-rank
    questionable content, Facebook also partners with a variety of fact-checking organizations
    to provide warnings, additional context, and fact-checks to some types of misinformative
    posts. In the nine months leading up to the 2020 election, Facebook placed warning
    labels on nearly two hundred million pieces of content that had been debunked
    by third-party fact-checkers. Facebook’s content flagging system described in
    the previous chapter is used to identify posts needing fact-checks; then—much
    like what we saw above with some of the public fact-checking tools—machine learning
    is used to group posts according to the claims involved in order to reduce the
    number of fact-checks humans need to perform.


    Since information, and misinformation, is often shared on Facebook in the form
    of visual memes, the company has gone to particular lengths to develop machine
