    over fifty-five. His stories, which reached an audience of up to six million monthly
    visitors, were often taken seriously and wound up on the same Macedonian fake
    news farm that Wade and Goldman were involved in—despite Blair’s supposed attempts
    to cast his followers and likers and sharers as ignoramuses and pawns. Part of
    the problem with Blair’s approach here, as you’ll see throughout this book and
    especially in Chapter [8](../Text/508514_1_En_8_Chapter.xhtml), is that social
    media provides news articles with a life and trajectory of their own and frequently
    strips articles of their original context and intent.


    For a while, Blair liked to let people share his articles and then call them out
    for spreading his fake news—he thought that publicly embarrassing people would
    lead them to think more critically about what they shared online—but the site’s
    popularity among true believers grew at a staggering rate nonetheless. On his
    personal Facebook page, he once wrote: “No matter how racist, how bigoted, how
    offensive, how obviously fake we get, people keep coming back. Where is the edge?
    Is there ever a point where people realize they’re being fed garbage and decide
    to return to reality?” Perhaps Blair was underestimating the intense gravitational
    pull of the pageview-driven blogosphere—or perhaps he was well aware of it and
    simply enjoyed profiting from it financially.


    In November 2016, *NPR* tracked down^([^(11)](#fn11)) the author of one particular
    fake news story that went viral during the election, to try to understand where
    such things come from. The article’s headline was “FBI Agent Suspected In Hillary
    Email Leaks Found Dead In Apparent Murder-Suicide.” It was published in what appeared
    to be a local newspaper called the *Denver Guardian*, and despite being completely
    fabricated, it was shared on Facebook over half a million times. The website for
    this newspaper had the local weather but only one news story, this fake one. Some
    clever online detective work led to the identity of the individual behind this
    fake local newspaper, who turned out to be Jestin Coler, a forty-year-old registered
    Democrat and father of two.


    Coler claimed he entered the fake news business in 2013 with similar intentions
    as Christopher Blair: “The whole idea from the start was to build a site that
    could kind of infiltrate the echo chambers of the alt-right, publish blatantly
    false or fictional stories and then be able to publicly denounce those stories
    and point out the fact that they were fiction.” After realizing how easily and
    rapidly his stories were spreading, Coler decided to capitalize on this endeavor
    and ended up forming a fake news company that employed a couple dozen writers
    and spanned an undisclosed number of websites, including the one for the *Denver
    Guardian—*a site that, according to Coler, collected over one and a half million
    views in a ten-day period. In describing the fake FBI agent story, Coler said:
    “Everything about it was fictional: the town, the people, the sheriff, the FBI
    guy. And then … our social media guys kind of go out and do a little dropping
    it throughout Trump groups and Trump forums and boy it spread like wildfire.”
    As it and other fake stories written by his company spread across the country,
    Coler was making around twenty thousand dollars per month from ad revenue.


    One consequence of the shifting economic forces in journalism has been the decimation
    of regional newspapers. As I discuss next, Coler’s fake Denver-based newspaper
    was not an isolated invention: nefarious entities have found strategic ways to
    fill the journalistic vacuum left behind as authentic local newspapers have gone
    out of business.'
  trans: '

    # 虚假新闻贩子的典型案例


    2016 年，帕里斯·韦德和本·戈德曼都是二十六岁，他们共同运营的网站`LibertyWritersNews.com`在六个月内积累了数千万的页面浏览量；该网站百分之九十五的流量来自他们在此期间在
    Facebook 上获得的八十万粉丝。在巅峰时期，他们的月收入高达四万美元。在此之前，他们都是失业的餐厅员工。


    韦德和戈德曼在发布他们的“新闻”故事后，会一丝不苟地分析数据，看看什么内容最能吸引读者。以下是他们一篇典型帖子的标题：“真相大白！媒体不想让你看到希拉里在落败后做了什么……”。韦德向《*华盛顿邮报*》^(⁹)解释说：“这篇文章里没有任何反媒体的内容，但这个标题我用过上千次。暴力和混乱以及激进的措辞才是人们感兴趣的东西。”戈德曼补充道：“我们的受众不信任主流媒体。用这个来吸引他们显然更容易。”韦德接着说：“我们没怎么深思熟虑。除了用这个框架来包装故事以便获得点击量。我们就是新一代的黄色新闻记者。我们就是那些在街边大喊世界末日要来了的人。”


    为什么韦德和戈德曼对来自左倾主流媒体《*华盛顿邮报*》的记者如此坦诚？因为他们不在乎。他们对自己网站上写的内容一个字都不信，但他们知道自己的读者群永远不会去看《*华盛顿邮报*》的文章——更不用说信任了——所以他们很乐意吹嘘自己的商业成功，并嘲笑那些被他们用毫不掩饰的假新闻欺骗的傻瓜。2018
    年，有消息揭露韦德和戈德曼也参与了 2016 年总统大选前在马其顿运作的假新闻计划，该计划因可能帮助特朗普扭转选举平衡而获得了大量媒体报道。当这个马其顿关联首次被报道时，韦德正在竞选内华达州议会议员；他输给了民主党对手——幸运的是，我想我们都同意这一点。


    克里斯托弗·布莱尔与一些朋友在 2016 年总统大选前夕，在 Facebook 上推出了一个虚假的右翼新闻网站。《*华盛顿邮报*》在一篇全盘托出的报道^(¹⁰)中对他进行了特写。但布莱尔比韦德和戈德曼更没什么好隐瞒的，因为布莱尔的网站是公开的讽刺网站。事实上，布莱尔是一位自由派博主，他的网站最初只是朋友间的一个恶作剧，旨在取笑在极右翼中传播的极端主义思想，并揭露那些无法区分明显假新闻与现实的人的轻信。布莱尔编造了极右翼且牵强附会的故事，内容涉及“加州实施伊斯兰教法、前总统比尔·克林顿成为连环杀手、无证移民污损拉什莫尔山、以及前总统巴拉克·奥巴马在九岁时逃避越战兵役”。在做这些事的同时，他意识到：“我们越极端，人们就越相信。”


    尽管布莱尔的网站是公开的讽刺网站——它包含了十四项免责声明，其中一项直接声明“此页面上的内容均非真实”——但它一度成为 Facebook 上五十五岁以上支持特朗普的保守派中最受欢迎的页面。他的故事每月吸引多达六百万访客，这些故事经常被当真，并最终出现在韦德和戈德曼参与的那个马其顿假新闻农场——尽管布莱尔本意是想把他的粉丝、点赞者和分享者描绘成无知者和棋子。布莱尔这种做法的问题之一，正如你将在本书中，尤其是在第
    8 章中看到的那样，在于社交媒体赋予了新闻文章自己的生命和轨迹，并且常常剥离文章的原始背景和意图。


    有一段时间，布莱尔喜欢让人们分享他的文章，然后指责他们传播他的假新闻——他认为公开让人难堪会促使他们更批判性地思考自己在网上分享的内容——但该网站在真正信徒中的受欢迎程度却以惊人的速度增长。在他的个人
    Facebook 页面上，他曾写道：“无论我们变得多么种族主义、多么偏执、多么冒犯、多么明显虚假，人们还是会不断回来。底线在哪里？有没有一个时刻，人们会意识到自己被喂了垃圾，并决定回归现实？”也许布莱尔低估了页面浏览量驱动的博客圈的强大引力——或者他对此心知肚明，只是乐于从中获利。


    2016 年 11 月，*NPR*追踪到了^(¹¹)一篇在大选期间疯传的特定假新闻故事的作者，试图了解这类东西的来源。这篇文章的标题是“涉嫌希拉里邮件泄露的
    FBI 探员被发现死于明显的谋杀后自杀案”。它发表在一家名为《*丹佛卫报*》的本地报纸网站上，尽管完全是捏造的，但在 Facebook 上被分享了超过五十万次。这家报纸的网站有当地天气信息，但只有一篇新闻报道，就是这篇假新闻。一些聪明的在线侦探工作查出了这个虚假本地报纸背后的人，结果是杰斯廷·科勒，一位四十岁的注册民主党人，两个孩子的父亲。


    科勒声称他于 2013 年进入假新闻行业，初衷与克里斯托弗·布莱尔类似：“从一开始，整个想法就是建立一个能够渗透到另类右翼回音室的网站，发布公然虚假或虚构的故事，然后能够公开谴责这些故事，并指出它们是虚构的事实。”在意识到他的故事传播得多么容易和迅速后，科勒决定利用这一事业牟利，最终成立了一家假新闻公司，雇佣了二十多名写手，并运营着数量不详的网站，其中包括《*丹佛卫报*》的网站——据科勒称，该网站在十天内获得了超过一百五十万的浏览量。在描述那个虚假的
    FBI 探员故事时，科勒说：“关于它的一切都是虚构的：小镇、人物、警长、FBI 探员。然后……我们的社交媒体人员会出去，在特朗普群组和特朗普论坛里稍微投放一下，天哪，它就像野火一样蔓延开来。”随着这篇以及他公司撰写的其他虚假故事在全国传播，科勒每月从广告收入中赚取大约两万美元。


    新闻业经济力量转变的一个后果是地方报纸的消亡。正如我接下来要讨论的，科勒那个虚假的丹佛报纸并非孤立的发明：随着真正的地方报纸倒闭，邪恶实体找到了战略性的方法来填补留下的新闻真空。

