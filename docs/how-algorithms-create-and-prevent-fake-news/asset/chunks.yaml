    # 9. Tools for Truth


    Fact-Checking Resources for Journalists and You


    > *Falsehood flies, and truth comes limping after it, so that when men come to
    be undeceived, it is too late; the jest is over, and the tale hath had its effect.*

    >

    > —Jonathan Swift, 1710


    This chapter starts by discussing a collection of publicly available (and mostly
    free) fact-checking tools that are powered by machine learning; this is to help
    you know what kinds of tools are available and to provide some insight into how
    they work. It concludes with a brief look at the role and scope of fact-checking
    at Google, YouTube, Facebook, and Twitter.


    ## Online Tools


    In this section, I describe a handful of online tools that can assist with fact-checking
    in various ways and that involve machine learning algorithms to varying extents.
    This is only a sample of what’s out there, and some useful products not discussed
    here helpfully combine multiple approaches into a single user-friendly tool. My
    main goal here is not to provide a comprehensive list of software packages, for
    such a list would surely become outdated quite quickly. Instead, the goal is to
    illustrate how machine learning is used in the fact-checking process and to help
    you understand what’s actually going on under the hood with automated and semi-automated
    fact-checking.


    ### Full Fact


    The London-based charity organization *Full Fact* ^([^(338)](#fn338)) provides
    a range of freely available fact-checking services, including a keyword search
    for topics that have been fact-checked. While human experts are enlisted for the
    analyses driving these fact-checks, machine learning is used in several ways to
    assist these experts with tools that make their job faster and easier. Passages
    of text—typically coming from articles, political speeches, social media posts,
    etc.—are first broken down to individual sentences, and then Google’s `BERT` (discussed
    in Chapter [6](../Text/508514_1_En_6_Chapter.xhtml)) is used to numerically encode
    the words in each sentence in a contextually meaningful way. This numerical encoding
    powers an algorithmic detection and classification of “claims” in each sentence:
    a statement such as “GDP has risen by 5%” is considered a quantitative claim,
    while “this economic policy leads to a reduction in carbon emissions” is a cause-and-effect
    claim, and “the economy will grow by 5%” is a predictive claim. This allows human
    fact-checkers to skim each document and quickly see where the claims that need
    fact-checking are located and what kinds of claims they are.


    The `BERT` encodings are also used to estimate whether each identified claim matches
    one in the archive of previously fact-checked claims. Unsurprisingly, most claims
    don’t just appear once, they appear in many different locations and guises, so
    it saves an enormous amount of time to check each claim in substance once rather
    than checking every instance and minor variation of it. Machine learning is also
    used to identify the claims that most urgently require fact-checking each day,
    based on current events and other factors. This hybrid approach in which machine
    learning assists human reviewers, rather than replacing them, is very sensible;
    it is, as you may recall from the previous chapter, similar in spirit to Facebook’s
    approach to content moderation. `Full Fact` directly states on its web page that
    “Humans aren’t going anywhere anytime soon—and nor would we want them to be.”'
