    # 第 230 条


    1996 年《通信规范法》是美国联邦政府首次真正尝试通过立法来监管互联网上的低俗和淫秽内容。其中包含了如今臭名昭著的第 230 条，该条款规定：“任何交互式计算机服务的提供者或使用者，均不应被视为另一信息内容提供者所提供任何信息的发布者或发言人。”在撰写该条款时，这条措辞略显费解的规定主要意图是防止互联网服务提供商因网络上的非法内容而承担法律责任。那是在社交媒体时代之前，如今第
    230 条被解释为谷歌、Facebook 和 Twitter 等托管用户生成内容的科技公司的责任盾牌，免除了它们对其平台上内容的法律责任。关键在于，这些公司大多可以自行决定其政策和审核方式——而它们这样做的动机主要受商业考量驱动，而非直接担心承担法律责任。


    在 2020 年大选前夕，第 230 条引起了各政治派别人士的质疑：许多左派人士认为，它让谷歌和社交媒体公司可以毫无责任地传播有害的极端主义内容和虚假信息；而许多右派人士则认为，它允许这些公司歧视性地审查保守派言论并压制言论自由。2020
    年春天，Twitter 开始给特朗普总统关于选民欺诈的虚假和误导性推文贴上标签；特朗普对此回应称，应完全废除第 230 条。在此之前不久，乔·拜登也呼吁废除第
    230 条——但他的理由是，它让 Facebook 等公司得以“传播它们明知是虚假的谎言”。^(³²⁹) 就连马克·扎克伯格也表示支持对第 230 条进行一些修订，尽管
    1996 年原法案的合著者之一——参议员怀登——公开质疑了扎克伯格在这方面的意图：^(³³⁰) “他赚到了钱，现在想把身后的梯子抽走。Facebook 这样的公司竟然呼吁修改第
    230 条，这让你不禁要说，‘等等’。”


    2020 年大选结束仅几天后，国会邀请马克·扎克伯格和 Twitter 首席执行官杰克·多尔西就其平台、选举和虚假信息作证。^(³³¹) 扎克伯格欢迎建立一个新的跨平台监管框架，以确保所有大型科技公司都能在内容审核方面共同努力并受到平等对待，而多尔西则对此提出反对，称“一个集中的全球内容审核系统无法扩展”。多尔西表示，他的重点是给用户提供更多工具来自定义他们看到的内容，但他也呼吁对第
    230 条进行改革，要求对推荐/信息流算法进行更多监督并提高透明度。


    尽管 2020 年时任总统特朗普和时任候选人拜登都呼吁完全废除第 230 条，但现在看来，将会采取一种更温和的方式——基本上只是取消在特定情况下对特定类型内容的保护。目前正在审议的一项法案规定，如果科技公司的排名算法放大了与现实世界恐怖主义行为相关内容的传播，该公司将承担责任。^(³³²)
    此外，关于是否应完全取消在线广告的第 230 条保护也引发了讨论。拜登总统的副幕僚长合著了一篇专栏文章^(³³³)，指出“平台应对任何产生收入的内容负责”。在这场关于第
    230 条命运的辩论中，无论最终做出何种立法决定，几乎肯定会对科技巨头接下来在内容审核方面采取的技术方法产生巨大影响。


    # 结语


    2018 年，Facebook 宣布计划成立一个新的监督委员会，以帮助审议和裁决有关该平台对公共话语影响的事务。该委员会常被称为“Facebook 的最高法院”，由一系列国际专家组成——从媒体研究、法律和公共政策领域的顶尖学者，到人权组织和智库的领导人，甚至还有一位诺贝尔和平奖得主和一位丹麦前首相。作为该委员会活动的一个例子，其任务是判定无限期暂停特朗普的
    Facebook 账户是否合理，以及是否应继续维持。


    然而，哥伦比亚大学言论自由研究所的两位学者最近指出^(³³⁴)，该委员会的权限范围非常有限——它几乎只关注个别内容删除的案例——以至于在某种意义上只是一个幌子。他们指出，内容审核的具体问题固然重要，但公司对其平台设计以及驱动平台的算法所做的决策影响更为深远：“[Facebook
    的]排名算法决定了哪些内容出现在用户信息流的顶部。它关于哪些类型的内容可以分享以及如何分享的决定，帮助决定了哪些想法能获得关注。[……]该委员会实际上被引导着将
    Facebook 的平台架构视为既定事实。”


    换句话说，该委员会给公众留下了外部监管和致力于减轻社会负面影响的印象，但有害内容在社交媒体上传播的问题以及如何审核的问题，远比针对个别内容的决策要深刻得多。真正的讨论必须涉及对当前旨在最大化用户参与度的算法方法进行调查，并可能进行彻底的反思。你在本章中已经看到，关于算法放大有害内容的研究已经有很多富有洞察力的成果，甚至还有一些关于重新设计社交网络结构以应对这一问题的有前景的想法。这些算法设计问题对于未来的发展方向至关重要，但
    Facebook 却方便地将所有相关决策都掌握在自己手中，并排除在其最高法院的管辖范围之外。


    而 Facebook 及其他科技巨头通过算法手段改善问题的努力，也并非总是充满足够的热情。凯西·奥尼尔，作为最早一批呼吁关注社会过度依赖算法危险性的杰出数据科学家，在
    2021 年 2 月写道^(³³⁵)：“我自己在内容审核方面的经历让我对公司的动机深表怀疑。”她说，她曾受邀参与谷歌一个关于 YouTube 有毒评论的人工智能项目，但在看到该项目分配的微薄预算后拒绝了，并得出结论：“这要么是不认真的，要么就是注定要失败。”她在
    Twitter 的一个反骚扰项目上也有类似经历。即使这些公司在审核的一些技术问题上取得了进展，新的挑战也会迅速且频繁地出现。例如，用户现在利用 Facebook、YouTube
    和其他平台的直播功能来传播他们的信息，有时受众极其庞大，而直播视频流在审核方面显然带来了许多棘手的技难题。

    '
- fmt: 'Karen Hao, a technology journalist who has for several years written articles
    exploring bias in—and unintended consequences of—machine learning algorithms,
    published an article^([^(336)](#fn336)) in March 2021 that she described^([^(337)](#fn337))
    as “The hardest and most complex story I’ve ever worked on.” The title of the
    article? “How Facebook Got Addicted to Spreading Misinformation.” She said that
    “Reporting this thoroughly convinced me that self-regulation does not, cannot
    work” and that the article is “not about corrupt people do corrupt things […]
    it’s about good people genuinely trying to do the right thing. But they’re trapped
    in a rotten system trying their best to push the status quo that won’t budge.”


    Here’s the gist of Hao’s ambitious article. Facebook built its massive platform
    by designing algorithms to maximize user engagement at all costs. Numerous internal
    studies concluded that algorithms designed to maximize engagement also increase
    polarization and amplify questionable content, but Zuckerberg and others in the
    company’s senior leadership were fixated on engagement as a means to growth. Internal
    efforts to bring in more ethical considerations to the company’s use of AI have
    mostly focused on algorithmic bias. Mitigating algorithmic bias, especially to
    prevent federally prohibited discriminatory behavior, is an important and challenging
    topic, but Facebook allegedly has not prioritized other vital tasks such as rooting
    out misinformation; some insiders are doubtful it could succeed at that if it
    tried. Moreover, some of the anti-bias efforts led to misinformation moderation
    algorithms being shelved when they flagged more conservative content than liberal
    content—even though it has long been recognized that misinformation disproportionately
    plagues the far right. The algorithmic, economic, and psychological themes and
    dynamics at play here are ones you’ve seen many times in different guises throughout
    this book, but I encourage you to read Hao’s article for yourself to see how all
    this came together in one company and to see the human side of building, then
    being unable to control, this misinformation-spreading behemoth.


    One additional challenge—seen particularly during the 2020 election—is that content
    now frequently crosses between different social media platforms, making moderation
    more of a complex multicompany issue than it was in the past. Curiously, and perhaps
    tellingly, one of the most effective instances of social media moderation seen
    in recent times is when the tech giants banded together to essentially pull the
    plug on the upstart platform Parler. After Facebook and Twitter started clamping
    down on pro-Trump electoral disinformation, many disaffected users left and joined
    Parler, which billed itself as a free speech–oriented alternative that is more
    friendly to politically conservative discourse. But while Parler did not have
    policies against the harmful content that was rapidly spreading on its platform,
    the tech giants powering and distributing its app (Amazon, Apple, and Google)
    do have such policies and responded promptly and powerfully, leaving Parler struggling
    to survive. At the risk of putting an overly cynical spin on the situation, I
    must say that these companies seem much more capable and willing to moderate each
    other than themselves.


    ## Summary


    This chapter opened with a survey showing that people who rely primarily on social
    media for their news tend to be younger, more exposed to fake news, and less informed
    about politics and global health than people who get their news from most other
    forms of media. Next, I discussed the role played by recommendation and ranking
    algorithms in the spread of fake news, with a particular emphasis on Facebook
    to give a sense of the problem on that platform and to show some of what’s been
    said and done regarding it. I also discussed how wide-ranging and constantly evolving
    conspiracy movements like QAnon pose a particular challenge for moderation. I
    then summarized and contextualized a collection of academic papers that use sophisticated
    methods to study quantitatively how fake news spreads on social media (mostly
    Twitter because data is more accessible there than it is for Facebook) and how
    bots are involved. Next, I looked at some of the machine learning methods that
    social media companies (mostly Facebook because Twitter has been less forthcoming)
    have used in their fight against bots and misinformation, and then I looked at
    some of the methods that academic researchers have proposed for this purpose.
    Finally, I conveyed some of the recent debates and proclamations concerning Section
    230, the law that protects social media companies from liability for the content
    they host, and then I closed with some thoughts on the reluctance of Facebook
    and others to step up their game in the fight against fake news. In the next—and
    final—chapter, I’ll tour some of the algorithmic tools available to help in your
    own personal fight against fake news.'
