  trans: '

    这一叙事脉络从定性角度生动展现了 2020 年大选假新闻是如何产生并迅速发酵的——它们往往在多个平台间流转，尽管缺乏 2016 年大选时大规模数据驱动研究所提供的定量细节。


    顺便一提，虽然多米宁投票机的虚假叙事是近期许多假新闻的典型代表，但后续发展却远非典型——且可能对虚假信息的整体传播产生深远影响。2020 年 12 月，多米宁投票系统公司的一名员工对特朗普竞选团队、数名特朗普关联律师（包括鲁迪·朱利安尼和西德尼·鲍威尔）以及多家保守派新闻机构（包括*Newsmax*、*One
    America News*和*Gateway Pundit*）提起诽谤诉讼，指控其参与有关多米宁的虚假阴谋论。这起诉讼连同投票技术公司 Smartmatic
    的类似诉讼威胁，促使*Newsmax*迅速撤回此前关于投票机选举欺诈的指控——2021 年 4 月 30 日，*Newsmax*以未公开金额和解多米宁案，并正式道歉，承认在毫无证据的情况下播报了该故事（多米宁案其余部分仍在审理中）。^(³⁰⁶)
    与此同时，多米宁和 Smartmatic 均起诉*福克斯新闻*，索赔金额超过四十亿美元。^(³⁰⁷) 看来，传播假新闻终于要承担问责了——至少在这一特定案例中如此，尽管这确实可能开创先例。但值得注意的是，参与传播这一危险阴谋论的社交媒体公司均未遭受任何财务或法律后果；其原因在于一项名为"第
    230 条"的法律保护条款，我将在本章后续部分讨论。


    现在，我们该从研究假新闻的传播转向算法设计与实施，以帮助遏制其蔓延。我将首先介绍 Facebook 和 Twitter 实际采取的措施——基于它们公开的有限信息——然后在下一节中，我将转向社交媒体公司外部多位研究人员提出的算法方案。


    ## 算法如何发挥作用


    社交媒体公司为减少假新闻和有害内容传播而实施的部分技术解决方案相当直接。Facebook 旗下拥有即时通讯服务 WhatsApp，该平台已被证明是虚假信息病毒式传播的另一途径，尤其在美国以外的国家；你在第
    3 章中看到了印度记者遭恶意深度伪造的案例，虽然我在第 4 章中未提及，但 WhatsApp 也是巴西 2018 年大选中极右翼和阴谋论内容的重要传播载体。为应对这一问题，Facebook
    于 2018 年将 WhatsApp 消息可转发人数从 250 人降至 20 人，此后又进一步降至 5 人；为迎接 2020 年大选，它还将 Facebook
    Messenger 的转发上限从 150 人降至 5 人。^(³⁰⁸)


    其他技术解决方案表面上相对简单，但实施起来却困难重重。2020 年 1 月，Facebook 宣布^(³⁰⁹)了一项看似直截了当的措施：开始在其平台上禁止深度伪造内容。更准确地说，这是对"误导性操纵媒体"的禁令，即任何"经过编辑或合成——超出清晰度或质量调整范围——且普通用户难以察觉，可能误导他人认为视频中的人物说出了其并未说过的话"，同时"是人工智能或机器学习的产物，通过合并、替换或叠加内容到视频上，使其看起来真实可信"的视频。这段冗长的描述实际上旨在明确禁令针对的是以欺骗方式使用的深度伪造内容，但你在第
    3 章中已经看到，深度伪造的检测——无论是算法检测还是人工检测——目前乃至将来都可能极具挑战性，因此这项禁令在实践中并不容易实施。此外，请注意该禁令不涵盖任何类型的浅伪造，且对于深度伪造仅涉及言语内容，不涉及行为——因此，例如公众人物婚外情的虚假视频仍被允许。另一个政策决策远比实施简单的例子是：2019
    年 10 月，Twitter 宣布将开始禁止政治广告。这需要精确界定哪些广告属于政治广告，而这绝非易事。


    然而，许多已实施的技术方法相当复杂，且高度依赖机器学习。Facebook 在这方面尤为突出，这也是我接下来要讨论的话题。

    '
- fmt: '### Facebook’s Machine Learning Moderation


    In November 2019, Facebook’s Chief Technology Officer wrote a blog post^([^(310)](#fn310))
    announcing and contextualizing the company’s latest “Community Standards Enforcement
    Report.” Conveniently, this blog post highlighted and outlined some of the company’s
    recent developments in AI for content moderation. It stated that the biggest recent
    improvements were driven by a partial transition from supervised learning, where
    data needs to be manually labeled in what is typically a time-consuming and laborious
    process, to self-supervised learning where the required labels are automatically
    drawn directly from the data. You saw an example of self-supervised learning in
    Chapter [6](../Text/508514_1_En_6_Chapter.xhtml) with `BERT`: the training data
    there is text with some words randomly hidden that the algorithm learns to predict,
    and the data labels for these hidden words are simply the words themselves. Self-supervision
    allows for much larger data sets to be processed so that one can train much larger,
    hence more accurate, predictive algorithms than one could when using traditional
    supervised learning methods. Since Facebook has access to truly enormous data
    sets, and it has the computational resources to train and support very large algorithms,
    this certainly is a logical path for the company to pursue. There are still plenty
    of situations where one really needs manually curated and labeled data, but often
    these situations can be combined with self-supervision in a hybrid approach that
    is, in a sense, the best of both worlds.


    One of the specific instances mentioned in the blog post of self-supervised learning
    used to great effect is a language processing system called `RoBERTa` that was
    Facebook’s answer to Google’s `BERT`. Recall from Chapter [6](../Text/508514_1_En_6_Chapter.xhtml)
    that `BERT` is very similar to `GPT-3` except that `BERT`’s goal is to produce
    vector embeddings of words since this opens the door to a wide range of machine
    learning operations on text. Like Google’s use of `BERT`, Facebook uses `RoBERTa`
    to power its search algorithm—but more than that, Facebook also uses `RoBERTa`
    to help with identifying things like hate speech. This is a good example of a
    hybrid situation: Facebook trains a traditional supervised learning classifier
    on a collection of posts that have been manually labeled as hateful or not hateful,
    but rather than having the algorithm work directly with the text in these posts,
    it instead works with the text after the self-supervised `RoBERTa` has transformed
    the words in these posts into numerical vectors. Wherever there’s a situation
    in which the tech giants need a computer to be able to deal with the meaning of
    language, especially potentially subtle uses of language, you can assume that
    they now use a massive self-supervised language model like `BERT` or `RoBERTa`
    and that doing so has drastically improved performance over past approaches. That
    said, hate speech is generally much more self-apparent, even to a computer, than
    something like misinformation that depends heavily on context and background knowledge.


    Another important development highlighted in the blog post was a new “holistic”
    approach to content moderation on Facebook. Previously, Facebook’s detection systems
    looked separately at the words in a post, the images in a post, and the comments
    on a post—and the systems also considered each violation activity separately.
    For example, before the holistic approach, one classifier would look for nudity
    in a posted photo, a separate classifier would look for violence in the photo,
    a separate classifier would look for hate speech in the photo’s caption, etc.
    Facebook replaced this with a pre-trained machine learning algorithm called `Whole
    Post Integrity Embeddings` (`WPIE`) that converts each post (photos, text, comments,
    and even user data) into a vector—a sequence of numbers—so that any type of violation
    classifier need only work with these vectors rather than breaking the post data
    into disjoint pieces. In other words, this is like `RoBERTa`, but instead of just
    text, it reads in entire Facebook posts with comments and images and awareness
    of the users responsible for the posts and comments.


    In general, the way algorithmic detection for policy violations works is the algorithm
    assigns a score to each piece of content, and if that score is above a certain
    threshold, then the content is automatically removed; if the score is below a
    certain threshold, then the content is left alone; and if the score is between
    these two thresholds, then the content is flagged for human moderators to look
    at and evaluate. Facebook says the holistic `WPIE` framework helped the company
    remove over four million pieces of drug sale content in the third quarter of 2019,
    more than ninety-seven percent of which was scored above the automatic removal
    threshold; this was a substantial increase over the pre-`WPIE` first quarter when
    the number removed was less than a million, and less than eighty-five percent
    of these were scored over the automatic removal threshold. However, when the coronavirus
    pandemic came around a few months later and detecting health misinformation became
    an urgent challenge, Facebook found itself relying largely on human moderators
    and external fact-checking organizations—although, as I’ll discuss later in this
    chapter and more extensively in the next chapter, machine learning still plays
    multiple important roles in that process.


    As you recall from earlier in this chapter, bot activity on social media has long
    been a significant problem. As you also recall from this chapter, bot behavior
    tends to have quantitatively distinct patterns from human behavior—such as bursts
    of activity that far outpace what a human could achieve. When it comes to algorithmic
    detection, this powerful efficiency of bots is their own undoing: not only can
    detection algorithms look for direct signs of bots in metadata, but the algorithms
    can also look for behavioral differences. It is relatively easy to program a bot
    to share articles and even to write simple human-sounding posts and comments,
    but to fly under the radar, one needs to ensure that the bot does this at the
    approximate frequency and scope of a human user. And in the case of Facebook,
    there’s another important factor involved: the friendship network. What has proven
    most challenging when it comes to creating bots that simulate human behavior is
    developing a Facebook account with a realistic-looking network of friends^([^(311)](#fn311))—and
    doing this in large enough numbers for an army of bots to have a significant impact.'
