  trans: '

    # 政治领域中的深度伪造


    2018 年 5 月，比利时的一个社会民主党在推特和脸书上发布了一段一分钟的深度伪造视频，内容是特朗普总统用英语讲话并配有荷兰语字幕。^(⁶³) 无论是声音模仿还是深度伪造的视觉效果都相当粗糙，而讲话内容本身也明显表明这是对特朗普的讽刺性模仿（更像是《周六夜现场》的小品，而非精妙的骗局）。视频开头，特朗普宣称：“亲爱的比利时人民，这可不是小事。如你们所知，我有胆量退出《巴黎气候协定》，你们也应该这么做。”在片段接近尾声时，音频突然几乎静音，微弱的声音继续说道：“我们都知道气候变化是假的，就像这个视频一样。”除了这段偷偷承认的音频几乎听不清之外，这些话也是片段中唯一没有荷兰语字幕的部分。这个视频显然是个玩笑，但它被制作出来，确实有可能骗过粗心的观众。根据社交媒体上的评论——该视频在一天内达到了两万次观看——相当多的观众确实被愚弄，以为这是特朗普的真实片段。


    许多——但并非全部，你很快就会看到——出现在政治语境中的深度伪造，就像这个比利时的例子一样，更多是为了娱乐而非欺骗。2020 年 10 月，就在总统大选前一周，热门电视动画片《南方公园》的创作者在
    YouTube 上发布了一部完全基于深度伪造技术的网络剧集。^(⁶⁴) 剧中的主角是深度伪造版唐纳德·特朗普，而深度伪造版马克·扎克伯格则反复客串。首集贯穿始终的笑点是，所有看似真实的镜头实际上都是深度伪造，而剧中那些据称是深度伪造的片段，要么是滑稽的木偶，要么是真实的真人。


    2020 年，英国广播公司播出了伊丽莎白女王的圣诞致辞，与此同时，英国公共广播公司第四频道则播出了一段由深度伪造版女王发表的讽刺性致辞。^(⁶⁵) 如果她对王室的尖刻笑话还不足以让人明白这不是真正的女王，那么糟糕的声音模仿以及她突然跳起的、年轻得令人难以置信的舞蹈动作，肯定足以澄清事实。然而，有时幽默与政治之间的界限会变得更加模糊。2020
    年 4 月 26 日，在妻子 50 岁生日那天，特朗普总统在推特上发布了一段乔·拜登伸出舌头的低质量深度伪造视频，并配文如下：“‘邋遢乔’正在成为热门话题。我怀疑是不是因为这个。你能看出这是深度伪造，因为吉尔·拜登没有替他打掩护。”^(⁶⁶)
    当然，这并非意在直接欺骗，但看到一位以长期与真相有隙而闻名的总统，在社交媒体上公开分享一段针对其对手的、品味低下的深度伪造视频，并以此对他进行幼稚的挖苦，这仍然是社会上一个令人不安的时刻。


    2020 年 9 月 20 日，原计划有两则广告在华盛顿特区的福克斯、CNN 和 MSNBC 播出，一则 featuring 深度伪造的弗拉基米尔·普京，另一则
    featuring 深度伪造的金正恩。^(⁶⁷) 两者传达的信息相同：美国不需要外部干预选举，因为它自己就能毁掉自己的民主。这些广告由一个投票权组织赞助，旨在提高人们对美国民主脆弱性的认识，以及美国人需要积极、安全地参与选举过程。这里使用深度伪造并非为了欺骗，只是为了吸引观众的注意力，让人们震惊地认识到
    2020 年总统大选即将在充满技术陷阱的环境中进行。这些深度伪造视频是使用开源 `DeepFaceLab` 软件进行换脸制作的。两则广告的结尾都包含以下免责声明：“画面并非真实，但威胁是真实的。”在最后一刻，电视台全部撤下了这些广告，并未立即解释这一决定。人们当然可以想象到，对于涉足这些微妙的深度伪造领域，自然会有所犹豫。最终，这些广告只在社交媒体上出现。


    可以说，深度伪造技术首次被直接用于政治选举发生在 2020 年 2 月的印度。在德里立法议会选举前一天，印度人民党领袖马诺杰·蒂瓦里的两段 44 秒视频被分发到近
    6000 个 WhatsApp 群组，覆盖了大约 1500 万人。在两段视频中，蒂瓦里都批评了竞争对手、现任政治领袖。在一段视频中，他用英语讲话，而在另一段视频中，他讲的是名为哈里扬维语的印地语方言。从某种意义上说，这两段视频都是深度伪造。蒂瓦里首先用他的母语印地语录制了视频。然后，与一家名为“创意工厂”的政治传播公司合作，一名模仿者录制了英语和哈里扬维语版本的演讲音频。最后，使用一种基于蒂瓦里其他讲话视频训练而成的“唇形同步”式深度伪造再现技术，使他的嘴唇动作与新的音频相匹配。


    尽管使用了深度伪造技术，但这些蒂瓦里的视频并非特别恶意——它们只是政治竞选活动中用来接触更广泛、语言更多样化受众的工具。用印度人民党一位媒体和 IT 负责人的话说：“深度伪造技术帮助我们以前所未有的规模扩大了竞选活动。即使候选人不会说选民的语言，哈里扬维语视频也让我们能够令人信服地接触目标受众。”但是，亲眼看到某人说着他们实际上不会说的语言，这种不诚实性质让一些人感到反感，并产生了一种政治不诚实的感觉。正如《Vice》报道的那样，^(⁶⁸)
    蒂瓦里的哈里扬维语视频“被广泛用于劝阻德里大量讲哈里扬维语的移民工人群体不要投票给 rival 政党。”老实说，很难知道该如何看待这个政治深度伪造的案例。像大多数强大的工具一样，深度伪造技术既有好的应用，也有坏的应用，以及介于两者之间的各种应用——而所有应用范围的出现还需要一些时间。由于本书是关于假新闻的，我将主要关注那些邪恶的、欺骗性的用途，但在本章的后面，我将给出一个纯粹积极、合法的政治用途案例。

    '
- fmt: '印度也是两年前一起更明确令人反感的深度伪造事件的现场——尽管该事件与选举没有直接关系，但它仍然具有强烈的政治暗流和影响。`Rana Ayyub`当时是一位36岁的印度女性，一名调查记者，也是一名虔诚的穆斯林。她表示^([^(69)](#fn69))自己常被视为反建制派，并被称为“印度被辱骂最多的女性”。她解释说，她在`Twitter`上发布的任何内容都会引来数千条回复，其中大部分充满仇恨和威胁。她试图忽略这些网络喷子，继续从事自己的工作，并告诉自己网络上的仇恨和威胁“永远不会转化为现实中的虐待”。但在2018年4月，情况发生了变化。


    一名8岁的克什米尔女孩遭到强奸，引发了全国范围的广泛愤怒。`BJP`（是的，就是上文刚刚讨论过的那个政党）是当时的执政党，其回应是组织了一场支持被指控犯下这一令人发指行为的嫌犯的保守派游行。`Ayyub`受邀在`BBC`和`Al
    Jazeera`上发表评论，谈论“印度如何因包庇儿童性侵犯而自取其辱”。不久之后，`BJP`中的一位男性联系人给`Ayyub`发了一条不祥的消息：“`WhatsApp`上有些东西在流传，我发给你，但你得保证不会难过。”她随后看到的是一部色情电影，而她似乎是其中的主角。这段视频是一个换脸深度伪造。用`Ayyub`自己的话说：“当我第一次打开它时，我很震惊地看到自己的脸，但我能看出那不是我，因为，首先，我是卷发，而那个女人的头发是直的。……我开始呕吐。”


    这段视频最初在`WhatsApp`上的私人政治频道中流传，但随后`BJP`领导人的粉丝页面公开了它，并迅速获得了超过四万次分享。`Ayyub`表示，她开始收到陌生人的`WhatsApp`消息，询问她是否提供性服务。她对这种情况的焦虑变得非常严重，以至于她因呕吐和心悸去了医院：“整个国家都在观看一部声称是我的色情视频。”`Ayyub`说，具有讽刺意味的是，就在这件事发生前一周，她的一位编辑提到了深度伪造在印度的潜在危险——她当时不知道那是什么，于是用谷歌搜索了一下，但决定不做相关报道，因为她不想引起更多关注，以免激发恶意使用。“然后一周后，它就发生在我身上了。……这是一个非常非常危险的工具，我不知道我们会走向何方。”令人心碎且警醒。我不知道还能说什么。而世界顶尖的数字取证专家之一`Hany
    Farid`表示^([^(70)](#fn70))，来自世界各地发展中国家的少数政客曾请他帮忙揭穿那些显示他们处于性爱尴尬场景的视频。


    下一个影响现实世界政治的深度伪造案例是一个真正离奇的故事。^([^(71)](#fn71))非洲国家加蓬的总统`Ali Bongo`于2018年10月因未公开的疾病在沙特阿拉伯首都利雅得住院。12月，副总统宣布`Bongo`在当年秋天早些时候中风，但情况良好，正在摩洛哥首都拉巴特康复。尽管有这种含糊的保证，但在两个多月的时间里，除了政府发布的一些照片和一段无声视频外，几乎没有`Bongo`的任何迹象。猜测开始蔓延，认为官员们在撒谎，`Bongo`要么已经去世，要么至少是丧失了行动能力，情况比公开承认的要糟糕得多。这个国家自2009年以来一直由`Ali
    Bongo`统治，在此之前，他的父亲`Omar Bongo`统治了42年。大多数人在加蓬几乎不记得有哪个时期国家元首不姓`Bongo`。对于`Ali`为何离开国家两个多月且基本上完全消失在公众视野中，官方解释几乎得不到信任。


    最后，为了平息日益增长的怀疑，总统的顾问们表示，他将发表惯例的新年致辞。果然，在2019年1月1日，政府在社交媒体上发布了一段总统`Ali Bongo`发表演讲的视频。但视频有些地方似乎不对劲。一些观众通过视频对总统的健康状况感到放心，但另一些人则认为这可能是他的替身。还有许多观众觉得视频的怪异源于其他原因，但他们又说不清楚具体是什么。


    随后，曾在过去两次选举中与`Bongo`竞争的加蓬著名政治家`Bruno Ben Moubamba`声称这段视频是深度伪造——他的理论迅速获得了大量追随者。`Moubamba`指出，在视频中，`Bongo`的脸和眼睛似乎“几乎悬浮在他的下巴上方”，并且他的眼睛移动“与下巴的运动完全不同步”。`Moubamba`解释说：“由不同面孔的多个元素组合成一个，正是构成深度伪造的特定元素。”其他总统的批评者和活动人士在`Twitter`上指出了更多可能表明是深度伪造的细节。例如，他们注意到`Bongo`在两分钟的视频中只眨了13次眼，不到正常数量的一半，而且他的说话模式似乎也与平时不同。


    人们不知道该相信什么；这段视频引发的问题比它回答的还要多。`Bongo`的批评者指出，政府可能试图掩盖`Bongo`死亡或健康不佳，有一个非常真实且具体的原因：宪法规定，如果加蓬总统被认定无法胜任领导职务，那么参议院议长将担任临时总统，并在60天内举行特别选举。批评者认为，加蓬执政党正在欺骗公众，以避免这次特别选举，或许是为了争取时间，直到能为继任者巩固支持——毕竟，这位继任者将是半个多世纪以来该国第一位不来自`Bongo`家族的总统。'
  raw: 'India was also the site of a much more unequivocally repugnant usage of deepfakes
    that occurred two years earlier—and while it is not directly related to an election,
    it still has strong political undercurrents and ramifications. Rana Ayyub was
    a thirty-six-year-old Indian woman, an investigative journalist, and a practicing
    Muslim. She said^([^(69)](#fn69)) she was often seen as anti-establishment and
    that she has been called “the most abused woman in India.” She explained that
    anything she posted on Twitter would result in thousands of replies, much of it
    hateful and threatening. She tried to ignore the trolls and continue going about
    her job, telling herself that the online hate and threats “would never translate
    into offline abuse.” But in April 2018, that changed.


    An eight-year-old Kashmiri girl had been raped, leading to widespread outrage
    across the country. The BJP (yes, the same one just discussed above) was the ruling
    political party at the time and responded by organizing a reactionary march in
    support of those accused of perpetrating this heinous act. Ayyub was invited to
    speak on the BBC and Al Jazeera about “how India was bringing shame on itself
    by protecting child sex abusers.” Shortly afterward, a male contact in the BJP
    sent Ayyub an ominous message: “Something is circulating around WhatsApp, I’m
    going to send it to you but promise me you won’t feel upset.” What she then saw
    was a pornographic movie in which she appeared to be the star. The video was a
    face-swap deepfake. In Ayyub’s own words: “When I first opened it, I was shocked
    to see my face, but I could tell it wasn’t actually me because, for one, I have
    curly hair and the woman had straight hair. […] I started throwing up.”


    The video was circulating in private political channels on WhatsApp, but then
    the fanpage of BJP’s leader posted it publicly, and it quickly tallied more than
    forty thousand shares. Ayyub says she started getting WhatsApp messages from strangers
    requesting her services as a prostitute. Her anxiety over the situation became
    so severe that she went to the hospital with vomiting and heart palpitations:
    “The entire country was watching a porn video that claimed to be me.” Ayyub says
    that, ironically, just a week before this incident, one of her editors mentioned
    the potential dangers of deepfakes in India—she didn’t know what they were so
    Googled them but decided against doing a story on them because she didn’t want
    to bring more attention to them that might inspire any malicious use. “Then one
    week later it happened to me. […] It is a very, very dangerous tool and I don’t
    know where we’re headed with it.” Devastating and alarming. I don’t know what
    else to say. And one of the world’s foremost digital forensics experts, Hany Farid,
    said^([^(70)](#fn70)) that a handful of politicians from developing countries
    around the world have asked him to try to debunk videos appearing to show them
    in compromising sexual situations.


    The next example of deepfakery impacting politics in the real world is a truly
    bizarre story.^([^(71)](#fn71)) Ali Bongo, the president of the African nation
    Gabon, was hospitalized in Riyadh, the capital of Saudi Arabia, for an undisclosed
    illness in October 2018\. In December, the vice president announced that Bongo
    had suffered a stroke earlier in the fall but is doing well and recovering in
    Rabat, the capital of Morocco. Despite this vague reassurance, there were almost
    no signs of Bongo for over two months aside from a few pictures and a silent video
    released by the government. Speculation began to run rampant that the officials
    were lying, that Bongo had either died or at least was incapacitated and in far
    worse condition than was publicly admitted. This is a country that was ruled by
    Ali Bongo since 2009, and before that his father Omar Bongo ruled for forty-two
    years. Most people literally did not remember a time in Gabon when the head of
    the government was not named Bongo. There was little trust in the official explanation
    for why Ali had been out of the country for over two months and essentially out
    of sight the entire time.


    Finally, to help quell the growing suspicion, the president’s advisors said he
    would deliver the customary New Year’s address. And indeed, on January 1, 2019,
    the government posted to social media a video of President Ali Bongo giving his
    speech. But something about it didn’t seem right. Some viewers were reassured
    of the president’s health by the video, but others thought it was perhaps a body
    double impersonating him. And many other viewers felt the video’s strangeness
    was the result of something else, but they couldn’t quite put their finger on
    it.


    Then Bruno Ben Moubamba, a prominent Gabonese politician who ran against Bongo
    in the previous two elections, claimed the video was a deepfake—and his theory
    rapidly gained a sizable following. Moubamba pointed out that in the video Bongo’s
    face and eyes seem “almost suspended above his jaw” and that his eyes move “completely
    out of sync with the movements of his jaw.” Moubamba explained: “The composition
    of several elements of different faces, fused into one are the very specific elements
    that constitute a deepfake.” Other activists and critics of the president took
    to Twitter to point out more elements that suggested a possible deepfake. For
    instance, they noted that Bongo only blinked thirteen times during the two-minute
    video, less than half the typical amount, and his speech patterns seemed to differ
    from his usual ones.


    People didn’t know what to believe; the video raised more questions than it answered.
    And Bongo’s critics observed that there was a very real and specific reason why
    the government might be trying to cover up Bongo’s death or ill-health: the constitution
    states that if Gabon’s president is ever found to be unfit to lead, then the Senate
    President becomes the interim president and a special election is to be held within
    sixty days. Gabon’s ruling party, critics argued, was deceiving the public in
    order to avoid this special election, perhaps to buy time until it could shore
    up support for a successor—a successor that would, after all, be the country’s
    first president not from the Bongo family in more than half a century.'
