- fmt: '# YouTube in Brazil


    In Brazil, the fourth largest democracy on the planet, YouTube has become more
    widely watched than all but one TV channel.^([^(111)](#fn111)) Jair Bolsonaro,
    the country’s authoritarian far-right president, not long ago was a fringe figure
    lawmaker with little national recognition peddling conspiracy videos and extremist
    propaganda on his YouTube channel. In a relatively short span of time, his YouTube
    channel grew massively in subscribers and provided him with a sizable cult following.
    He rode this wave of YouTube popularity to presidential victory in 2018, and he
    wasn’t alone. A whole movement of far-right YouTube stars ran for office along
    with Bolsonaro; many of them won their races by historic margins, and most of
    them now govern through YouTube the way Trump did with Twitter up until the end
    of his presidency.


    What propelled this motley crew to such meteoric heights on YouTube? In 2019,
    a team of researchers at Harvard’s Berkman Klein Center for Internet & Society
    conducted a study^([^(112)](#fn112)) for the *New York Times* to find out, and
    the answer they found is (drumroll please): the YouTube recommendation algorithm.
    The researchers wrote a Brazil-based computer program to start on a YouTube video
    from a popular channel or keyword search and then follow the chain of top-recommended
    videos it leads to. They ran the program thousands of times and studied the paths
    of videos each iteration produced. They found that regardless of whether a user
    started with a political or nonpolitical video, the recommendation algorithm “often
    favored right-wing, conspiracy-filled channels,” and that “users who watched one
    far-right channel would often be shown many more.” As the *New York Times* reported:
    “The algorithm had united once-marginal channels—and then built an audience for
    them […]. One of those channels belonged to Mr. Bolsonaro, who had long used the
    platform to post hoaxes and conspiracies.”


    YouTube’s sudden predominance in Brazil coincided with the collapse of the country’s
    political system. Bolsonaro did not change his views or behavior, in person or
    online; rather, his videos became frequently recommended to a burgeoning national
    audience in a country that was primed for a significant political transformation.
    In response to the *New York Times* investigation, a spokesperson for YouTube
    said that the company has since “invested heavily in the policies, resources and
    products” to reduce the spread of harmful misinformation. Well, that’s reassuring.


    Having confirmed that YouTube was indeed recommending far-right propaganda leading
    up to and following Brazil’s 2018 election, two important questions need to be
    addressed next: did the recommendations actually convert people ideologically,
    and why did the recommendation algorithm—designed by generally left-leaning Silicon
    Valley computer scientists—favor far-right videos? I am not aware of a rigorous
    quantitative study addressing the first of these two questions; the anecdotal
    evidence, however, and firsthand experience of members working inside the political
    movements, while not unequivocal, suggest the answer is yes. Let me turn to this
    now.


    ## YouTube’s Political Influence on Brazilians


    According to the 2019 *New York Times* investigation, one local vice president
    of Bolsonaro’s political party credited most of the party’s recruitment to YouTube,
    including his own: “He was killing time on the site one day, he recalled, when
    the platform showed him a video by a right-wing blogger. He watched out of curiosity.
    It showed him another, and then another.” He said that he didn’t have an ideological
    political background before that experience and that YouTube’s autoplaying recommendations
    were his political education.


    A cofounder of the political group Movimento Brasil Livre (MBL), known informally
    as the “Brazilian Tea Party” or the “Brazilian Breitbart,” which convened the
    popular demonstrations in 2015 pushing for the ouster of the liberal president
    Dilma Rousseff, said “we have something here that we call the dictatorship of
    the like. Reality is shaped by whatever message goes most viral.” By “the like”
    he meant popularity on social media. MBL, a movement that was only founded in
    2014, had six victorious candidates at the national level in the 2018 elections
    and many more at the state and local levels. The YouTube channel of MBL went from
    zero to one million subscribers in the year of the election, and in the month
    leading up to the election, it managed to reach the front page of YouTube in Brazil
    every single day; forty percent of the group’s funding came from YouTube ad revenue.^([^(113)](#fn113))


    One of the nationally elected MBL candidates—who has been referred to as a “fake
    news kingpin,” a “troll,” and “Brazil’s equivalent of Milo Yiannopoulos”—became
    at age twenty-two the youngest person ever elected to Brazil’s Congress. How did
    he get such an early start in politics? During his last year of high school, he
    did a report on a Brazilian libertarian YouTuber—a report that he did as a YouTube
    video that quickly went viral and launched his own internet fame. He says MBL
    clashes with Bolsonaro’s more militant far-right party but that MBL supported
    it for practical reasons: Bolsonaro is good for traffic. Another MBL candidate,
    now a state representative, said “I guarantee YouTubers in Brazil are more influential
    than politicians.” His most-watched video at the time of the election? A video
    called “15 minutes with Jair Bolsonaro” that reached almost four million views.
    “I’m really grateful to YouTube because it turned me into what I am today,” he
    once declared. In the local election that he won in 2018, he received an astronomical
    half million votes; candidates in previous years had won that seat with twenty
    thousand votes.


    This question of YouTube’s potential influence on Brazilian politics is still
    debated, and we may never truly know whether the recommendation algorithm affected
    the outcome of the 2018 election. That said, I think you can figure out which
    side of the debate I fall on. So now let me turn to the second question raised
    above, namely, why an ostensibly politically neutral recommendation algorithm
    would support extremist right-wing and conspiratorial videos. The answer, as you
    will see, involves the engineering adjustments YouTube made to its algorithm,
    especially two key developments discussed earlier: the 2012 switch of primary
    metric from views to watch time and the 2015 involvement of Google Brain and their
    deep learning architecture.'
