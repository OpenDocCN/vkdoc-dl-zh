    ### 提升优质新闻质量


    2019 年 2 月，在慕尼黑的一场国际安全会议上，谷歌发布了一份白皮书^(²²⁹)，阐述该公司“如何应对通过`Google Search`、`Google
    News`、`YouTube`及广告系统蓄意传播虚假信息”的努力。尽管该白皮书大多重复了此前分散在谷歌各类博客文章和企业文件（本章已提及）中的理念与通用方法，但它确实包含了一些有助于进一步阐明某些细节的评论和见解。


    为了提升优质新闻质量，谷歌的搜索排名算法需要评估新闻网站的可信度。白皮书明确指出，这些评估并非整体性指标，而是具体取决于搜索短语的范围：“例如，一家全国性新闻媒体的文章在涉及当前事件的搜索中可能被视为权威，但在与园艺相关的搜索中则可靠性较低。”白皮书还澄清，“排名系统并不识别任何特定内容的意图或事实准确性。”换言之，所有内容——无论真假——都允许出现在谷歌上，而谷歌的搜索算法并不试图判断哪些特定链接包含有效信息或虚假信息；相反，它只是试图在当前搜索语境下，将那些被认为整体更可信的网站排在更靠前的位置。


    2020 年 6 月，英国议会发布了一份政策报告^(²³⁰)，其中包含大量建议，旨在帮助政府应对由互联网技术驱动的“虚假信息疫情”。该报告对其得出的结论措辞相当强硬：


    *   政府必须确保在线平台对其算法推广的内容承担最终责任。[……] 如果民主要蓬勃发展，在线平台的透明度至关重要。像 Facebook 和谷歌这样的平台试图躲在‘黑箱’算法背后，这些算法选择向用户展示哪些内容。它们认为自己的决策不对在线活动可能造成的伤害负责。这显然是错误的。平台在设计并训练这些算法系统时所做的决策，塑造了在线发生的对话。


    在准备这份报告期间，议会收集了多位关键人物的口头证词。其中之一是谷歌副总裁兼首席互联网布道师文特·瑟夫。他被问道：“您能否提供任何证据，证明您所推广的所谓高质量信息更可能属于‘地球不是平的’这类真实范畴，而非‘地球是平的’这类虚假范畴？”他耐人寻味的回答为谷歌严密封闭的后台透进了一丝光亮：


    *   万维网上的信息量极其庞大。有数十亿个页面。我们无法手动评估所有这些内容，但作为谷歌大家庭的一部分，我们大约有 1 万人负责评估网站。我们可能对选定的页面有多达九条评估意见。就搜索而言，我们有一份
    168 页的文件，专门用于指导如何确定网站质量。[……] 一旦我们获得了由这些评估员评估过的网页样本，我们就可以利用他们的工作成果及其评估所适用的网页，构建一个机器学习神经网络，该网络能够反映他们为这些网页所确定的质量水平。这些网页便成为机器学习系统的训练集。然后，这个机器学习系统被应用于我们在万维网上索引的所有网页。完成这一应用后，我们利用这些信息及其他指标，对网络搜索返回的结果进行排序。


    他总结如下：“这是一个两步过程。首先是手动过程，用于建立标准和一个高质量的训练集；然后是一个机器学习系统，将其规模扩展到我们索引的整个万维网。”谷歌许多关于其提升优质新闻努力的博客文章和官方声明，都会提到这支由一万名人工评估员组成的团队。因此，为了深入解读瑟夫上述密集的陈述，更好地理解这些人的工作内容以及他们的工作如何影响算法，将大有裨益。幸运的是，2019
    年 11 月《华尔街日报》的一项调查^(²³¹)提供了对谷歌评估员工作的内部观察。


    虽然谷歌员工薪酬优厚，但这万名评估员是按小时计酬的合同工，在家工作，时薪约为 13.50 美元。一位在《华尔街日报》文章中提及的此类工作者表示，他被要求签署保密协议，与谷歌的任何人都没有联系，也从未被告知其工作将用于何处（请记住，这些人就是瑟夫所称的“谷歌大家庭的一部分”）。他说，他“被给予数百个真实的搜索结果，并被要求运用自己的判断力，根据质量、声誉、有用性等因素对其进行评级。”这些工作者执行的主要任务似乎是：对单个网站进行评级，并评估谷歌返回的各种搜索结果的排名。这些任务受到提供给他们的那份
    168 页文件的严格指导。有时，这些工作者还会通过其合同工作机构收到谷歌的便条，告知他们某些搜索的“正确”结果。例如，有一次，搜索短语“杀死自己的最佳方法”出现了操作指南，合同工们便收到通知，要求所有与自杀相关的搜索都应返回“国家自杀预防生命热线”作为首要结果。


    这个窥探评估员工作的窗口，虽然简短，却有助于我们解析瑟夫的证词。谷歌员工——很可能是高层——就搜索算法应如何应对各种主题和情况做出影响深远的决策。但他们并非试图直接在搜索算法的计算机代码中实现这些决策，而是将这些决策编纂成发送给评估员的指导手册。然后，评估员根据这本手册手动对网站和搜索排名进行评级。然而，即使拥有这支万人的评估员大军，需要手动处理的网站和搜索数量仍然过于庞大——因此，正如瑟夫所解释的，这些手动评估为监督学习算法提供了训练数据，这些算法的工作本质上是外推这些评估结果，以期所有搜索（而不仅仅是那些经过手动评估的搜索）都能按照谷歌领导层的意图运行。


    尽管谷歌搜索算法的一些显著更新已由公司公开宣布^(²³²)（本章已提及数项），但谷歌实际上极其频繁地调整其算法。事实上，刚才提到的同一项《华尔街日报》调查还发现，谷歌在
    2018 年对其算法进行了超过 3200 次修改。而且算法调整的数量正在迅速增加：2017 年约为 2400 次，而早在 2010 年仅为 500 次左右。谷歌已开发出一套广泛的流程来批准所有这些算法调整，其中包括让评估员进行实验并报告对搜索排名的影响。这使谷歌在将这些调整推向其庞大的用户群之前，能够了解它们在实际操作中的效果。例如，如果某些调整旨在降低虚假新闻网站的排名，评估员就可以在他们尝试的搜索中查看这一效果是否真的发生。

    '
- fmt: 'Let me return now to Vint Cerf. Shortly after the question that led to his
    description of Google’s “two-step” process that I quoted above, the chair of the
    committee asked Cerf another important, and rather pointed, question: “Your algorithm
    took inaccurate information, that Muslims do not pay council tax, which went straight
    to the top of your search results and was echoed by your voice assistant. That
    is catastrophic; a thing like that can set off a riot. Obviously, 99 percent of
    what you do is not likely to do that. How sensitised are your algorithms to that
    type of error?” Once again, Cerf’s frank answer was quite intriguing. He said
    that neural networks (which, as you recall, are the framework for deep learning)
    are “brittle,” meaning sometimes tiny changes in input can lead to surprisingly
    bad outputs. Cerf elaborated further:


    > Your reaction to this is, “WTF? How could that possibly happen?” The answer
    is that these systems do not recognise things in the same way we do. We abstract
    from images. We recognise cats as having little triangular ears, fur and a tail,
    and we are pretty sure that fire engines do not. But the mechanical system of
    recognition in machine-learning systems does not work in the same way our brains
    do. We know they can be brittle, and you just cited a very good example of that
    kind of brittleness. We are working to remove those problems or identify where
    they could occur, but it is still an area of significant research. To your primary
    question, are we conscious of the sensitivity and the potential failure modes?
    Yes. Do we know how to prevent all those failure modes? No, not yet.


    In short, we trust Google’s algorithms to provide society with the answers to
    all its questions—even though it sometimes fans the flames of hate and fake news
    and we don’t entirely know how to stop it from doing so.


    Recall the quote I included earlier from Google’s white paper: “[Google’s] ranking
    system does not identify the intent or factual accuracy of any given piece of
    content.” The *Wall Street Journal* investigation discussed in this section noted
    that Facebook has taken a more aggressive approach to removing misinformation
    and said Google publicly attributes this difference in approach to the fact that
    Facebook actually hosts content whereas Google merely indexes it. But in private
    a Google search executive told the *Wall Street Journal* that the problem of defining
    misinformation is incredibly hard and Google “didn’t want to go down the path
    of figuring it out.”


    ## Summary


    Fake news and harmful misinformation appearing at or near the top of Google search
    results became a widely discussed topic after Trump unexpectedly won the 2016
    election. Many people started to blame Google and the other tech giants for their
    role in the election and in eroding the very notion of truth. Google responded
    by making a series of adjustments to its ranking algorithm—often with the assistance
    of an army of low-paid contract workers—over the ensuing years aimed at bringing
    trustworthy links to the top of searches and pushing less reliable ones lower
    down. In this chapter, I presented a variety of examples where this played out,
    gathered what technical details I could about the closely guarded search algorithm,
    and looked into the public statements and general strategies Google has employed
    in this effort to elevate quality journalism. I also discussed instances of misinformation,
    deception, hateful stereotyping, and blatant racism that surfaced on other corners
    of Google such as maps, image search, and autocomplete.


    In the next chapter, I tackle another aspect of Google: how its advertising platform
    provides the revenue stream for a huge fraction of the fake news industry. Facebook
    is also brought into the fray, though its advertising platform fans the flames
    of fake news in a rather different way, as you will soon see.


