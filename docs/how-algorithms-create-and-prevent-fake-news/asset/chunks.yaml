- fmt: '## Losing Reliable Local News


    Twenty percent of local newspapers across America have shut down over the past
    decade, and many of the ones that remain have had to significantly cut their staff
    due to financial pressures. This sad development was largely precipitated by the
    shift from print to online newspapers: most regional papers cannot possibly get
    enough web traffic to support themselves financially with ad revenue, and paywalls
    don’t work much better because if a reader is to pay for an online subscription
    to a newspaper, then it is usually going to be a well-known national paper rather
    than a regional one. Unfortunately, the loss of local reporters and the increased
    financial constraints and time pressures on the ones that remain have exacerbated
    the flaws described earlier in the news hierarchy that allow fake news to propagate
    and proliferate.


    The disappearance of local newspapers has also been taken advantage of more directly
    through deliberate subterfuge. At the end of 2019, the *Columbia Journalism Review*
    (*CJR*), expanding on stories first reported elsewhere, uncovered^([^(12)](#fn12))
    a network of nearly five hundred websites masquerading as local news organizations,
    each “distributing thousands of algorithmically generated articles and a smaller
    number of reported stories.” I’ll turn to more sophisticated forms of automated
    story generation, based on cutting-edge artificial intelligence, in the next chapter;
    the “algorithmic” methods of automation used here, in contrast, are quite simple—essentially
    just bulk applications of copy-and-paste.


    Almost half of these fake local news websites were set up by a single company,
    `Metric Media`, in a single year, and they all trace back to `Brian Timpone`,
    a conservative businessman who attracted outrage in 2012 for his “pink slime journalism”
    company `Journatic` that used low-cost automated story generation and was shown
    to have faked quotes and plagiarized rampantly. *CJR* found that during a two-week
    period leading up to the publication of its study, over fifty thousand stories
    had been published in this network, but “only about a hundred titles had the bylines
    of human reporters. The rest cited automated services or press releases.”


    The websites in this *CJR* study, with names like *East Michigan News*, *Hickory
    Sun*, and *Grand Canyon Times*, are designed to look like ordinary local news
    organizations. They largely comprise easily mass-produced stories on topics such
    as local real estate prices, but strategically interspersed in this filler are
    political pieces—for instance, quoting local Republican officials on national
    right-wing talking points. These sites contain little information on funding sources
    or political usage, even though some were revealed to have been funded by political
    candidates and lobbying campaigns. They are, in short, a sinister weaponization
    of the trust people place in local news.


    Just one year after the *CJR* study was released, the *New York Times* published
    an in-depth investigation^([^(13)](#fn13)) of this deceptive `Timpone`-led network
    based on interviews with dozens of current and former employees and thousands
    of internal emails spanning multiple years. It found that the network had grown
    to over a thousand websites—more than double the number for the largest authentic
    newspaper chain in the country—and now operates in all fifty US states. These
    fake local news sites publish “propaganda ordered up by dozens of conservative
    think tanks, political operatives, corporate executives and public-relations professionals.”
    The sites in the network eschew journalistic standards such as fairness and transparency
    but stop short of outright fake news. The editors assign articles to freelance
    writers with “precise instructions on whom to interview and what to write” and
    typically pay from a few dollars to a few dozen dollars per article. And they
    continue to surround these handwritten articles with lots of easily automated
    content—for instance, by pasting in press releases published elsewhere or by stitching
    together a local weather forecast with generic fluff to give the impression of
    an article written by a regional meteorologist. Drawing on nostalgia for the halcyon
    days of local news, in some cases these fake local news setups even deliver print
    copies of their papers, unsolicited, to residents’ houses.


    In a November 2020 interview^([^(14)](#fn14)) with the *Atlantic*, just days after
    `Joe Biden` defeated `Donald Trump` in the presidential election, `Barack Obama`
    described how the media landscape has changed since he first ran with `Biden`
    on his ticket—and the consequences this has had for the American political landscape.
    He said that in late 2008, even a Republican-owned small-town newspaper editor
    would meet with him and write an editorial that presented him as a liberal Chicago
    lawyer but a decent guy with some good ideas, and the local TV coverage was also
    fair. He lamented that “you go into those communities today and the newspapers
    are gone. If `Fox News` isn’t on every television in every barbershop and `VFW`
    hall, then it might be a `Sinclair`-owned station, and the presuppositions that
    exist there, about who I am and what I believe, are so fundamentally different,
    have changed so much, that it’s difficult to break through.” He went on to bemoan
    how “Now you have a situation in which large swaths of the country genuinely believe
    that the Democratic Party is a front for a pedophile ring. This stuff takes root.”


    The disappearance of genuine local news organizations—a significant loss in American
    media, triggered largely by the economics of the internet—has produced a vacuum
    that’s been filled in unscrupulous ways. This has created a more polarized nation
    and fanned the flames of fake news.'
