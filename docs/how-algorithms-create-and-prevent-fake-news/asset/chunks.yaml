  trans: '

    在强化学习出现之前，推荐算法会根据预估用户单独观看每个视频的时长，来选择并排序“接下来播放”的视频。这就像下棋时只考虑一步棋。而通过强化学习，算法会制定长期策略来吸引观众。例如，向用户推荐一个超出其舒适区的短视频，可能只会带来几分钟的观看时长，但如果这样做能引导用户接触到一个他们之前未曾涉足的新主题，那么用户可能会被这个新主题吸引，最终比停留在可靠但熟悉的领域停留更长时间。这是
    YouTube 推荐的长期战略层面，它有助于说明强化学习如何很好地应对了之前讨论的流行度与新鲜度、熟悉感与新奇感之间的微妙平衡。


    ### 此外……


    算法还发生了哪些其他重大变化？这很难知晓，因为算法在不断调整和修改，但 YouTube 将这些细节隐藏在公司的商业机密之下。我们大致了解谷歌大脑（Google
    Brain）深度学习方法的框架，因为该公司在 2016 年做出了一项不同寻常的举动：其工程师发布了一份高级技术报告^(¹⁰⁵)，描述了用于该算法的神经网络框架。YouTube
    工程师还在 2019 年发表了一篇关于强化学习方法的论文^(¹⁰⁶)，但其语气相当学术化：它描述了所提出的深度学习与强化学习混合方法带来的理论进步，并包含了一些来自有限实验的简要实证结果，但并未表明论文中讨论的方法已实际商业应用于
    YouTube 推荐算法。我们之所以知道它确实在 2018 年成为了算法的一部分，是因为该论文的第一作者在一次会议上的一则评论^(¹⁰⁷)。


    YouTube 工程师还发布了一些关于视频推荐系统的其他技术论文（例如，2019 年的另一篇^(¹⁰⁸)），但我们不知道其中哪些（如果有的话）已被纳入官方
    YouTube 算法，哪些只是为作者简历增添亮点的出版物。从很多方面来看，2016 年的深度学习论文是最后一次从内部提供的近距离观察。


    嗯，几乎如此。纪尧姆·沙斯洛（Guillaume Chaslot）是前谷歌 AI 工程师，曾参与 YouTube 推荐算法的工作。自 2013 年离开^(¹⁰⁹)公司后，他成为了一名公开的斗士，反对他所认为的该算法带来的有害影响。他一直致力于揭露该算法——以及那些闭门造车、塑造该算法的工程决策。我将在本章后面部分回到他的批评和揭露，但首先我需要总结一下
    YouTube 推荐算法的这段简短历史。


    由于沙斯洛和其他人将批判的聚光灯投向了该算法，以及它在 2016 年美国总统大选期间受到的广泛关注（有人可能会说是炮火），YouTube 公司代表被迫就算法的某些方面公开发表评论。这为我们提供了一些信息碎片，但远不及
    2016 年谷歌大脑技术报告中包含的细节。例如，在《卫报》2018 年的一项调查^(¹¹⁰)中，YouTube 代表表示，他们在 2016 年从单纯优化观看时长，转变为同时考虑“用户满意度”，具体方式包括考虑视频获得的点赞数、进行用户调查，并将这些数据纳入算法。


    在本章中，随着我讨论几项针对该算法的外部数据驱动调查（由沙斯洛和其他研究人员进行），你将会看到算法的更多细节。但现在，是时候转向本章的主要问题了：YouTube
    的推荐算法对社会产生了什么影响——尤其是在假新闻、大众对阴谋论的信仰，以及利用这些来获取支持的政治候选人/政党背景下？在上述《卫报》的调查中，一位 YouTube
    发言人就该算法可能影响 2016 年大选、使其有利于特朗普一事发表了如下言论：“我们的搜索和推荐系统反映了人们的搜索内容、可用视频的数量以及人们在 YouTube
    上选择观看的视频。这并非偏向任何特定候选人；而是反映了观众的兴趣。” YouTube 算法最早、最著名、最直言不讳的批评者之一是技术社会学家泽伊内普·图费克奇（Zeynep
    Tufekci）。在同一篇《卫报》文章中，她写道：“我们面临的问题是，仅仅因为引导人们大规模地陷入充满错误信息和谎言的仇恨兔子洞能增加人们在网站上的停留时间——而且它确实有效——就这样做，这在伦理上是否站得住脚。”


    我们应该相信哪一方？也许寻找答案的一个好起点是巴西。

