  raw: '### Suggesting Fake News


    When people use Google to search for information, they sometimes interpret the
    autocomplete suggestions as headlines, as statements of fact. So when autocompletes
    are incorrect or misleading assertions, this can be seen as another instance of
    fake news on Google.


    A December 2016 investigation in *Business Insider* found^([^(206)](#fn206)) the
    following. The first autocomplete for “Hillary Clinton is” was “dead,” and the
    top link that resulted from this search was an article on a fake news site asserting
    that she was indeed dead. The top autocomplete for “Tony Blair is” was also “dead.”
    Same for Vladimir Putin. The February 2018 *Wired* investigation cited above noted
    that the top autocompletes for “climate change is” were, in order, “not real,”
    “real,” “a hoax,” and “fake.” Also in February 2018, it was noted^([^(207)](#fn207))
    that the autocompletes for “mass shootings are” included “fake,” “rare,” “democrats,”
    and “the price of freedom”; the top autocomplete for “David Hogg,” the activist
    student survivor of the Stoneman Douglas High School mass shooting, was “actor.”


    In September 2020, Google announced^([^(208)](#fn208)) that it had updated the
    autocomplete policies related to elections: “We will remove predictions that could
    be interpreted as claims for or against any candidate or political party. We will
    also remove predictions that could be interpreted as a claim about participation
    in the election—like statements about voting methods, requirements, or the status
    of voting locations—or the integrity or legitimacy of electoral processes, such
    as the security of the election.” After a week, *Wired* conducted experiments^([^(209)](#fn209))
    to see how well Google’s new policies were working. In short, while this policy
    change was well intentioned and mostly successful, the implementation was not
    perfect. Typing “donate” led to a variety of suggestions, none of which concerned
    the upcoming presidential election, but typing “donate bid” was autocompleted
    to “donate biden harris actblue,” a leading Democratic political action committee.
    On the other hand, typing “donate” and then the first few letters of Trump’s name
    didn’t result in any political autocompletes—the only autocomplete was “donate
    trumpet.”


    A few weeks later, Google posted^([^(210)](#fn210)) an overview description of
    how the autocomplete feature works. It includes the following remark on fake news:
    “After a major news event, there can be any number of unconfirmed rumors or information
    spreading, which we would not want people to think Autocomplete is somehow confirming.
    In these cases, our systems identify if there’s likely to be reliable content
    on a particular topic for a particular search. If that likelihood is low, the
    systems might automatically prevent a prediction from appearing.” You have to
    read that statement carefully: Google is not saying that it removes misinformative
    autocompletes, it is saying that it removes some autocompletes that would yield
    mostly fake news search results. I suppose the idea behind this is that if a user
    sees a false assertion as an autocomplete, the truth should be revealed when the
    user proceeds to search for that assertion—and only if the assertion is not readily
    debunkable this way should it be removed from autocomplete. But, to me at least,
    that doesn’t really jibe with the first sentence in Google’s statement, which
    makes it seem that the company is concerned about people seeing misinformative
    autocompletes regardless of the searches they lead to.


    Do you remember Guillaume Chaslot, the former Google computer engineer you met
    in Chapter [4](../Text/508514_1_En_4_Chapter.xhtml) who went from working on YouTube’s
    recommendation on the inside to exposing the algorithm’s ills from the outside?
    On November 3, 2020—election day—he found that the top autocompletes for “civil
    war is” were, in order: “coming,” “here,” “inevitable,” “upon us,” “what,” “coming
    to the us,” and “here 2020.” On January 6, 2021—the day of the Capitol building
    insurrection—he tried the same phrase and found the top autocompletes were no
    less terrifying: “coming,” “an example of which literary term,” “inevitable,”
    “here,” “imminent,” “upon us.”


    In a post^([^(211)](#fn211)) on *Medium*, Chaslot used Google Trends to look into
    how popular these searches were. Rather shockingly, he found that in the month
    leading up to the Capitol building event, the phrase “civil war is what” was searched
    seventeen times more than “civil war is coming,” thirty-five times more than “civil
    war is here,” fifty-two times more than “civil war is starting,” one hundred thirteen
    times more than “civil war is inevitable,” and one hundred seventy-five times
    more than “civil war is upon us.” In other words, Google was suggesting extremely
    incendiary searches even though they were far less popular than a harmless informative
    query. Chaslot pointed out that this “demonstrates that Google autocomplete results
    can be completely uncorrelated to search volumes” and that “We don’t even know
    which AI is used for Google autocomplete, neither what it tries to optimize for.”
    He also found that one of the autocompletes for “we’re hea” was “we’re heading
    into civil war”—so that even people typing something completely unrelated might
    be dangerously drawn into this extremist propaganda.


    In October 2020, just weeks before the election, Chaslot also found harmful misinformation
    about the COVID pandemic: the autocompletes for “coronavirus is” included “not
    that serious,” “ending,” “the common cold,” “not airborne,” and “over now.” In
    fact, of the ten autocompletes for this search phrase, six were assertions that
    have been proven wrong. And once again the order of these autocompletes was unrelated
    to search popularity as measured by Google Trends. Chaslot found climate change
    denial/misinformation persisted as well: three of the top five autocompletes for
    “global warming is” were “not caused by humans,” “good,” and “natural.” The phrase
    “global warming is bad” was searched three times as often as “global warming is
    good,” and yet the latter was the number four autocomplete, while the former was
    not included as an autocomplete.


    The popularity of a search depends on the window of time one is considering (the
    last hour? day? month? year?), so it’s possible that Google’s autocomplete algorithm
    was just using a different window than Chaslot was on Google Trends, but we don’t
    really know. Chaslot concludes his *Medium* post with the following stark warning/critique:
    “The Google autocomplete is serving the commercial interests of Google, Inc. […]
    It tries to maximize a set of metrics, that are increasing Google’s profit or
    its market share. They choose how they configure their AI.”'
  trans: '

    ### 建议虚假新闻


    当人们使用谷歌搜索信息时，有时会将自动补全建议解读为新闻标题或事实陈述。因此，当自动补全建议包含错误或误导性断言时，这可以被视为谷歌上虚假新闻的又一例证。


    2016 年 12 月《商业内幕》的一项调查发现^(²⁰⁶)：针对“希拉里·克林顿是”的首个自动补全建议是“死了”，而该搜索产生的首要链接是一篇来自虚假新闻网站的文章，声称她确实已死。针对“托尼·布莱尔是”的首个自动补全建议也是“死了”。弗拉基米尔·普京的情况相同。上文引用的
    2018 年 2 月《连线》杂志调查指出，针对“气候变化是”的自动补全建议依次为“不真实”、“真实”、“骗局”和“虚假”。同样在 2018 年 2 月，有报道指出^(²⁰⁷)，针对“大规模枪击事件是”的自动补全建议包括“虚假”、“罕见”、“民主党人”和“自由的代价”；针对帕克兰高中枪击案幸存学生活动家“大卫·霍格”的首个自动补全建议是“演员”。


    2020 年 9 月，谷歌宣布^(²⁰⁸)已更新与选举相关的自动补全政策：“我们将移除可能被解读为支持或反对任何候选人或政党的预测。我们还将移除可能被解读为关于参与选举的声明——例如关于投票方式、要求或投票站状态的陈述——或关于选举过程完整性或合法性的声明，例如选举的安全性。”一周后，《连线》杂志进行了实验^(²⁰⁹)，以检验谷歌新政策的效果如何。简而言之，虽然这项政策变更用意良好且大体成功，但执行并不完美。输入“捐赠”会得到各种建议，但没有一条与即将到来的总统选举有关；但输入“捐赠
    拜”后，自动补全建议为“捐赠 拜登 哈里斯 ActBlue”，这是一个主要的民主党政治行动委员会。另一方面，输入“捐赠”后紧接着输入特朗普名字的前几个字母，则没有产生任何政治相关的自动补全建议——唯一的自动补全是“捐赠
    小号”。


    几周后，谷歌发布^(²¹⁰)了一份关于自动补全功能如何运作的概述说明。其中包含以下关于虚假新闻的评论：“在重大新闻事件发生后，可能会有各种未经证实的谣言或信息传播，我们不希望人们认为自动补全在某种程度上证实了这些信息。在这些情况下，我们的系统会识别某个特定搜索主题是否可能存在可靠内容。如果这种可能性很低，系统可能会自动阻止某个预测出现。”你必须仔细阅读这份声明：谷歌并不是说它会移除误导性的自动补全建议，而是说它会移除那些主要产生虚假新闻搜索结果的自动补全建议。我认为这背后的想法是，如果用户看到一个虚假断言作为自动补全建议，那么当用户继续搜索该断言时，真相应该会显现——只有当该断言无法通过这种方式轻易被揭穿时，才应将其从自动补全中移除。但至少对我来说，这与谷歌声明中的第一句话并不完全吻合，那句话似乎表明公司关心的是人们看到误导性自动补全建议本身，而无论这些建议会引导他们进行何种搜索。


    你还记得纪尧姆·查斯洛吗？这位前谷歌计算机工程师你在第 4 章见过，他从内部参与 YouTube 推荐系统工作，转变为从外部揭露该算法的弊端。2020 年
    11 月 3 日——选举日——他发现针对“内战是”的自动补全建议依次为：“即将来临”、“在此”、“不可避免”、“逼近我们”、“什么”、“即将降临美国”和“2020
    年在此”。2021 年 1 月 6 日——国会大厦暴乱当天——他尝试了同样的短语，发现自动补全建议同样令人恐惧：“即将来临”、“文学术语的一个例子”、“不可避免”、“在此”、“迫在眉睫”、“逼近我们”。


    在《Medium》上的一篇文章^(²¹¹)中，查斯洛使用谷歌趋势调查了这些搜索的热度。令人震惊的是，他发现，在国会大厦事件发生前的一个月里，“内战是什么”这个短语的搜索量是“内战即将来临”的
    17 倍，是“内战在此”的 35 倍，是“内战开始”的 52 倍，是“内战不可避免”的 113 倍，是“内战逼近我们”的 175 倍。换句话说，谷歌在推荐极具煽动性的搜索词，尽管它们的受欢迎程度远低于一个无害的信息性查询。查斯洛指出，这“表明谷歌的自动补全结果可能与搜索量完全无关”，并且“我们甚至不知道谷歌自动补全使用了哪种人工智能，也不知道它试图优化什么。”他还发现，针对“我们正走”的自动补全建议之一是“我们正走向内战”——因此，即使是输入完全无关内容的人，也可能被危险地卷入这种极端主义宣传。


    2020 年 10 月，就在大选前几周，查斯洛还发现了关于新冠疫情的有害错误信息：针对“冠状病毒是”的自动补全建议包括“没那么严重”、“即将结束”、“普通感冒”、“非空气传播”和“已经结束”。事实上，针对这个搜索短语的十个自动补全建议中，有六个是被证明错误的断言。而且，这些自动补全建议的顺序再次与谷歌趋势衡量的搜索热度无关。查斯洛发现，否认/误导气候变化的信息也依然存在：针对“全球变暖是”的前五个自动补全建议中，有三个是“非人类造成”、“好事”和“自然现象”。“全球变暖是坏事”的搜索量是“全球变暖是好事”的三倍，然而后者却排在自动补全建议的第四位，而前者根本不在自动补全建议之列。


    搜索的热度取决于所考虑的时间窗口（过去一小时？一天？一个月？一年？），因此谷歌的自动补全算法可能只是使用了与查斯洛在谷歌趋势上不同的时间窗口，但我们并不真正了解。查斯洛在《Medium》文章的结尾发出了以下严厉的警告/批评：“谷歌自动补全服务于谷歌公司的商业利益……它试图最大化一系列指标，这些指标旨在增加谷歌的利润或市场份额。他们选择如何配置自己的人工智能。”

