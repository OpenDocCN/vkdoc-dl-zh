  trans: '

    ## 一些技术细节


    在 2017 年 12 月接受《Vice》杂志的一次采访中^(⁵⁵)，Reddit 用户“deepfakes”表示，他并非专业研究人员，只是一名对机器学习感兴趣的计算机程序员。他解释说，他用来制作这些视频的软件基于多个开源库（包括使用`TensorFlow`后端的`Keras`，懂的人自然明白这意味着什么——不懂也没关系，这不重要，关键在于这些都是深度学习社区广泛使用的公开资源）。他利用谷歌图片搜索、图库照片和
    YouTube 视频来收集算法所需的训练数据。


    如今，由深度学习驱动的视频编辑程序种类繁多（稍后你将接触到其中一些），因此“deepfake”一词不再仅指最初 Reddit 帖子中使用的那种换脸技术。而且，有许多不同的深度学习架构已被成功应用——即使是针对换脸这一单一任务也是如此。为了避免用所有这些技术细节淹没你，我在此仅解释一种特定换脸深度伪造方法背后的主要思路，以便让你了解上一章机器学习速成课中的概念是如何在此应用的；那些异常好奇且雄心勃勃、想了解更多信息的读者可以查阅一篇近期的学术综述论文^(⁵⁶)，但阅读本书完全无需如此。为了具体说明，假设我们的目标是将尼古拉斯·凯奇的脸换到《神奇女侠》中盖尔·加朵的身体上。


    第一步是在电影的每一帧中定位包含加朵脸部的区域。这是机器学习中的一项标准任务（当你在 Facebook 上发布照片，照片中每张脸周围会自动画出一个方框时，你就见识过它的实际应用）。这可以通过监督学习来实现：向算法输入大量照片，这些照片中每张脸周围都已手动绘制了方框，算法最终将学会如何自行绘制这些方框。更精确地说，这是一个双回归问题：两个目标变量是面部边界框的左上角和右下角坐标。对于换脸的目的，可以直接下载一个预训练的通用面部定位算法——这里无需针对凯奇或加朵进行任何特定训练。


    接下来，使用一种名为*自编码器*的简单但强大且流行的深度学习架构。通常，自编码器具有多个神经网络层，这些层首先逐渐变窄（构成自编码器的*编码器*部分），然后逐渐变宽回原始尺寸（后半部分是*解码器*）。它通过自我监督任务进行训练，即每次返回与输入完全相同的数据点。这乍听起来很奇怪，但实际上，通过将所有数据传递到自编码器狭窄的中间区域，算法被迫压缩数据——由于深度学习的魔力，算法不仅能自行找到最佳压缩方式，而且是通过内部学习到的数据概念化来实现的。


    更简单地说，自编码器被展示大量数据，并被告知必须找到一种像压缩文件一样压缩数据的方法，而它意识到最好的方法是先理解数据的含义。在处理面部图像时，自编码器会学习描述一张脸所需的一切，并用尽可能少的数字来表示——例如，它可能首先记录眼睛、嘴巴、鼻子等的位置，并以某种方式量化所有这些面部特征的形状，还可能找到一种用数字表示不同发型和颜色的方法，等等。我们无需知道它是如何工作的；只需运行它，看到它确实有效即可。自编码器的编码器部分负责将一张脸转换成这一组概括脸部的数字，然后解码器部分看到这些数字，并尝试从中重建这张脸。


    回到我们的换脸任务。这实际上使用了两个相互关联的自编码器。我们使用凯奇的照片训练一个自编码器来压缩并重建他的脸，同样地，我们使用加朵的照片训练一个针对她脸部的自编码器——但我们将这两个自编码器部分合并，让它们使用同一个编码器（这样只有解码器是针对每个人定制的）。结果是，一组概括脸部的数字现在可以被解码成凯奇的脸或加朵的脸。然后，对于电影中的每一帧，我们执行以下操作：首先定位加朵的脸，然后用我们训练好的编码器将其编码为一组数字，最后用我们的凯奇解码器进行解码。


    为了具体说明，假设自编码器发现的一个数字衡量的是嘴唇微笑的程度。当加朵大笑时，这个数字会很大——由于我们对加朵和凯奇使用相同的编码器，我们知道凯奇解码器会将这个大的数字解释为凯奇在大笑。这同时发生在他们脸部所有关键特征上：眼睛看的方向、嘴巴是否张开以及张开的程度和形状等。通过这种方式，粘贴上去的凯奇的脸将在每一帧中与加朵原始的表情紧密匹配。


    剩下的工作就是平滑凯奇脸部粘贴处的边缘，但这属于标准图像处理，因此我们可以直接使用现成的通用软件来完成。然而，如果你还记得，我在本章开头提到，上一章用于合成深度伪造照片的
    GAN 架构也用于像换脸这样的深度伪造电影编辑——但到目前为止我所描述的内容中并没有 GAN！确实，有些换脸算法不使用 GAN，但许多最成功的算法确实使用了。一种流行的整合方式如下：将上述过程视为
    GAN 中的生成器，然后向 GAN 的判别器输入混合视频——一部分是凯奇的脸被换到加朵身上的视频，另一部分是凯奇未经编辑的原始视频——并让它尝试分辨哪个是哪个。这将有助于教会换脸算法中的自编码器部分如何更好地完成其工作，因为它提供了一个明确的追求目标：生成尽可能逼真的换脸效果。

    '
- fmt: '### Different Types of Deepfakes


    The vast majority of deepfakes do not stray far from that first lecherous appearance
    on Reddit: a report^([^(57)](#fn57)) in 2019 found that ninety-six percent of
    deepfakes on the internet were nonconsensual face-swap pornography, most of which
    used the faces of female celebrities. At the time of the report, these videos
    had amassed over one hundred million views. Part of why these pornographic face-swaps
    use celebrities is simply the predilection of the audience, but it is also that
    there is an abundance of footage of celebrities readily available on the internet
    that provides ample training material for the deep learning algorithms. Importantly,
    however, as the technology continues to develop, less and less training data is
    needed to achieve the same level of verisimilitude.


    A more recent report^([^(58)](#fn58)) found that the number of deepfakes on the
    internet has been growing exponentially, doubling approximately every six months.
    The organization behind these reports, DeepTrace Labs, identified nearly fifty
    thousand deepfake videos by June 2020. Of the targets in these deepfake videos,
    88.9% were from the entertainment industry, including 21.7% from fashion and 4.4%
    from sports. Only 4.1% of the targets were from the business world and 4% from
    politics, but both these latter figures represent increases in the percentages
    over previous years.


    There is now a collection of public software tools for creating deepfakes, including
    `FakeApp`, `DFaker`, `faceswap`, `faceswap-GAN`, and `DeepFaceLab`. While these
    are freely available, using them still requires significant time, computational
    resources, and user skill. However, the methods have been improving extremely
    quickly, and as they do the resources and skill needed to produce convincing deepfakes
    have been decreasing rapidly. That said, it’s hard to imagine it ever reaching
    the point where creating a deepfake is as quick and easy as creating a shallowfake—or
    simply altering a caption deceptively.


    To help raise awareness of deepfakes and their potential to wreak havoc in politics,
    in 2018 *BuzzFeed News* worked with actor/writer/director Jordan Peele to produce
    a rather polished, compelling, and striking deepfake video^([^(59)](#fn59)) in
    which Barack Obama said, among other things: “We’re entering an era in which our
    enemies can make it look like anyone is saying anything at any point in time—even
    if they would never say those things. So, for instance, they could have me say
    things like, I don’t know, [...] President Trump is a total and complete dipshit.”
    This video made a big splash when it came out—and it succeeded in bringing awareness
    of deepfakes to a much wider segment of the public.


    This Obama video is a type of deepfake called a *reenactment*. You can think of
    this as a form of puppeteering, where here Obama was the puppet and Peele was
    the puppeteer. Peele was videotaped reading the script, then his mouth was clumsily
    pasted onto Obama’s, then a deep learning algorithm that had been trained on footage
    of Obama speaking was used to upgrade this simple copy-and-paste into a seamless
    blending of Peele’s mouth with the rest of Obama’s face—thereby animating Obama’s
    entire face according to Peele’s oral motions. Many reenactment algorithms use
    GANs. In short, the generator does the blending on the simple copy-and-paste video,
    and the discriminator compares the result to clips of authentic speech; in this
    way, the generator learns how to make its output look like authentic speech. In
    addition to the visual editing, the *BuzzFeed* team also used deep learning to
    transform Peele’s voice into a convincing acoustic impersonation of Obama.^([^(60)](#fn60))
    This project took roughly fifty-six hours of computational time and was overseen
    by a video effects professional. The deepfake video app used was `FakeApp`.


    Another app for making face-swap deepfakes, which has been enormously popular
    in China, is `Zao`. With just a single photograph of the user, it is able to place
    the user’s face in big television shows and movies. While the results are far
    from perfect, they can be done in just a few seconds on a smartphone. Samsung
    also developed software^([^(61)](#fn61)) for creating deepfake videos from a single
    photo—but a different kind than `Zao`: ahead of time Samsung trained a deep learning
    algorithm on a huge volume of videos to learn how human faces naturally move;
    then this general knowledge is applied to a user-provided photo to animate it
    in a lifelike manner according to a video of a digital puppeteer that the user
    also provides to the program. These Samsung videos tend to retain more semblance
    to the puppeteer than deepfake methods that use training footage specific to the
    puppet.


    A collaboration between researchers in academia and at Adobe created software^([^(62)](#fn62))
    powered by deep learning to “let users edit the text transcript of a video to
    add, delete, or change the words coming right out of somebody’s mouth.” (And you
    thought Adobe’s Photoshop was already impressive enough.) Their system first identifies
    the *phonemes* (the basic units of sound in spoken speech) in the video, then
    it matches these with the accompanying *visemes* (facial expressions and movements
    of the mouth). The software also learns a three-dimensional model of the lower
    half of the subject’s face from the video. When the user edits the text of the
    transcript, the software replaces each phoneme and corresponding viseme in the
    3D model and then uses this to modify the original video. This system currently
    only works for “talking head” style video and requires forty minutes of input
    data, and the results are better when the text does not differ too much from the
    original transcript. Nonetheless, it is an interesting approach for creating yet
    another type of deepfake.


    You’ve now seen that there are many different types of video editing procedures
    that fall under the umbrella term of deepfake—and for each type, there are a variety
    of apps and deep learning architectures that have been used, most involving autoencoders
    and GANs. You’ve seen that deepfakes have been used for entertainment (pornographic
    and otherwise) and to illustrate what’s currently possible. And you’ve seen that
    shallowfakes and other simple forms of visual deception have a long history and
    are still sowing confusion in politics today. You might be wondering at this point
    whether deepfakes have also been used in the real world, the way shallowfakes
    have, to manipulate the public’s interpretation of political events and possibly
    even influence the outcome of democratic elections. I hope you are indeed wondering
    this, as it is the topic I shall turn to now.'
