  trans: '

    # 纵向研究


    2020 年春天，`Chaslot` 与加州大学伯克利分校的两位教授完成了一项关于 YouTube 阴谋论视频的纵向研究^(¹³²)。他们首先使用基于文本的监督式机器学习训练了一个算法，通过分析视频的描述、字幕和评论来判断其是否具有阴谋论倾向。随后，他们将这一算法应用于
    1500 万条推荐视频——这些视频是在 15 个月期间，向一个已退出登录的用户推荐的，该用户此前观看过来自 1000 个热门新闻相关频道的视频。他们发现了什么？请稍等片刻。


    YouTube 在 2019 年 1 月宣布^(¹³³)，将“开始减少推荐边缘内容以及可能以有害方式误导用户的内容——例如宣传严重疾病虚假神奇疗法的视频、声称地球是平的说法，或对
    9/11 等历史事件做出公然虚假声明的视频。”`Chaslot-伯克利`合作研究发现，在此公告发布后的几个月里，算法推荐的阴谋论视频数量确实稳步下降——从
    2019 年 1 月到 5 月，下降了 70%——但在 5 月达到相对低点后，数量又悄然回升，到 2020 年 3 月，仅比 YouTube 在 2019
    年 1 月开始打击时低了 40%。


    有趣的是，`Chaslot-伯克利`研究发现，YouTube 的打击行动在不同类别的阴谋论中效果差异显著。地平说视频和 9/11 骗局视频几乎已从 YouTube
    上完全清除，而否认气候变化的视频以及声称外星人建造了金字塔的视频却持续存在，甚至蓬勃发展。YouTube 的公告确实提到，其重点是打击可能以“有害方式”误导用户的内容，但他们如何解释和执行这一政策似乎相当令人费解。伯克利合作者之一`哈尼·法里德`曾这样表示^(¹³⁴)：“如果你有能力将某些特别有问题的内容基本降至零，那么你就能在很多事情上做得更多。他们用‘不能’这个词，其实意思是‘不愿’。”我稍后会回到
    YouTube 上审核虚假信息这个问题——然后在第 8 章中，我将更广泛地讨论社交媒体上的内容审核问题。


    # 观看历史的作用


    本章讨论的所有基于数据的 YouTube 推荐算法调查——包括为《纽约时报》工作、探索巴西局势的哈佛团队，皮尤的随机漫步实证研究，《卫报》分析的`Chaslot`政治数据库，`Ledwich-Zaitsev`的论文，以及`Chaslot-伯克利`纵向研究——都有一个潜在的重大局限性：它们都依赖于一个已退出登录的匿名用户。这意味着该用户没有先前的观看历史、搜索历史或人口统计信息。


    与早期的机器学习形式相比，深度学习（正如你所记得的，这是谷歌大脑在 2015 年引入 YouTube 推荐的框架）的妙处之一在于，深度学习算法能够使用大量的预测因子，因为神经网络训练过程会自动将这些预测因子转化为数量更少、相关且具有层次结构的预测因子。在
    YouTube 的背景下，这意味着推荐算法不仅仅使用少数明显的预测因子（如观看次数和视频的平均观看时长），而是能够依靠详细的观看历史和行为，在更个性化的基础上剖析和分析用户。简而言之，深度学习实现了极致的个性化。


    这也是深度学习在医疗领域如此前景广阔的原因之一：它意味着计算机可以在极大程度上帮助医生定制诊断和治疗方案。但对于 YouTube 推荐来说，这意味着算法对你了解得非常多——它向你推荐的视频在很大程度上取决于你的个人数据。因此，通过一个仅仅从没有观看历史的匿名登录账户点击视频的计算机程序来模拟
    YouTube 算法在现实中的行为及其对社会的影响，是极其困难的。要获得关于该算法更真实的数据，唯一可行的方法是招募一大群志愿者，在一段时间内追踪他们与 YouTube
    推荐的互动体验。唉，据我所知，还没有这样的基于人类参与者的研究。


    # 另一次算法失误


    在传播假新闻和虚假信息方面，推荐算法并非 YouTube 唯一的算法罪魁祸首。该公司的另一个算法会自动将平台上的视频整合到它创建的各种主题频道中。例如，CNN
    会将其所有视频发布到其官方 YouTube 频道，但 YouTube 的内部算法也会为该电视网的每个热门节目创建频道。问题在于，这个算法找到的视频并非全部真实。嗯，某种程度上是这样。


    2019 年 12 月发现^(¹³⁵)，最终出现在 YouTube 算法生成的 CNN 频道中的一些视频，实际上来自那些假冒 CNN 的虚假新闻机构。这些机构所做的，是发布
    CNN 真实片段的副本，但他们对缩略图进行了编辑，使其内容看起来耸人听闻、具有煽动性。例如，一个缩略图显示了一张看起来官方的 CNN 图表，上面有特朗普总统和伊朗总统，以及一条字幕写着“战争正式打响！”。但视频本身却是
    CNN 未经篡改的片段，与战争毫无关系。简而言之，视频内容本身并非假新闻，但浏览这些算法策划的新闻频道中列出的视频的 YouTube 用户，会在缩略图中看到令人震惊的虚假标题。


    仅仅一周之内，这些带有虚假缩略图的 CNN 视频就获得了超过 800 万次观看。YouTube 的一项调查发现，发布这些视频的机构并非任何有组织的政治影响或虚假信息宣传活动的一部分，也未发现与外国政府有任何关联。相反，这些机构似乎只是利用这种点击诱饵手段来从广告收入中获利。


    此时你可能会问自己：等等，YouTube 在从观看次数转向观看时长时，不是已经消除了点击诱饵吗？大部分情况下是的，但我猜想这里发生的情况是，用户会点击一个带有令人震惊缩略图的视频，然后观看相当长的时间，以为缩略图中的故事只是该集节目中的一个片段——也许他们甚至一直看到视频结尾才意识到自己被骗了（我承认自己也曾这样被忽悠着看完了整个
    YouTube 视频）。这仍然是一种点击诱饵形式，但由于它很可能导致较长的观看时长，实际上受到了 2012 年后推荐算法的推崇。另一方面，你可能还记得，YouTube
    确实说过，在 2016 年，它开始在算法的考量中除了观看时长之外还加入了点赞数，而这些虚假的 CNN 视频在这个指标上可能表现不佳。因此，算法对这些视频的推广力度，在很大程度上似乎取决于算法工程师如何决定平衡这两个指标——这种平衡可能多年来一直在变化，并且无论如何都未向公众公开。

    '
- fmt: '# Moderating Content on YouTube


    The FBI produced a document^([^(136)](#fn136)) in May 2019 identifying the spread
    of fringe conspiracy theories as a new domestic terrorism threat that would likely
    intensify throughout the 2020 election cycle. Nine months later, in February 2020,
    the US Court of Appeals for the Ninth Circuit ruled^([^(137)](#fn137)) that `YouTube`
    is a private forum and therefore not subject to free speech requirements under
    the First Amendment—a ruling that allows `YouTube` to freely make decisions on
    what content to prohibit. The next month, a spokesperson for `YouTube` said^([^(138)](#fn138))
    that “In the past year alone, we’ve launched over 30 different changes to reduce
    recommendations of borderline content and harmful misinformation, including climate
    change misinformation and other types of conspiracy videos” and that “Thanks to
    this change, watchtime this type of content gets from recommendations has dropped
    by over 70 percent in the U.S.” Unfortunately, what these thirty changes comprised
    is not public knowledge, nor is the methodology supporting this claim of a seventy
    percent reduction—so we are left to blindly take `YouTube` at its corporate word
    (and recall that the Chaslot-Berkeley longitudinal study found that recommendations
    of conspiracy videos initially declined by seventy percent during the first few
    months of this period but then started creeping back up after that).


    In March 2020, `YouTube` also announced^([^(139)](#fn139)) that it would rely
    more heavily on machine learning to moderate its content^([^(140)](#fn140)) while
    human reviewers were sent home for the pandemic lockdown. But six months later,
    the company admitted^([^(141)](#fn141)) that this greater reliance on AI for moderation
    led to a significant increase in incorrect video removals. Around eleven million
    videos were taken down during this six-month period, which is roughly twice the
    normal rate. Over three hundred thousand of these takedowns were appealed, and
    half of the appeals were successful. `YouTube`’s Chief Product Officer (the same
    one who earlier in this chapter revealed that seventy percent of `YouTube` watch
    time comes via the recommendation algorithm) revealingly said that the machine
    learning approach to content moderation “couldn’t be as precise as humans” so
    the company decided to err on the side of caution during this period. He also
    pointed out that of these eleven million videos, more than half were removed before
    a single actual `YouTube` user watched the video. “That’s the power of machines,”
    he said.


    Just one month later, in October 2020, `YouTube` posted a company blog post^([^(142)](#fn142))
    titled “Managing harmful conspiracy theories on `YouTube`.” It included an announcement
    that `YouTube`’s policy on hate speech and harassment is now updated and expanded
    to prohibit “content that targets an individual or group with conspiracy theories
    that have been used to justify real-world violence.” One significant consequence
    is that many videos in the QAnon and Pizzagate conspiracy theory movements are
    now classified as banned content. It is important to note, however, that it is
    not the general fake news aspect of these movements that violates `YouTube`’s
    new policy—outlandish and politically destructive as they are—it is specifically
    the association with offline physical violence that triggers the new prohibition.
    `YouTube` was already removing specific QAnon and Pizzagate videos that directly
    threatened violence, but the expanded policies mean that grounds for prohibition
    now include “content that threatens or harasses someone by suggesting they are
    complicit in one of these harmful conspiracies, such as QAnon or Pizzagate.”


    Recall from the discussion of the Chaslot-Berkeley longitudinal study that in
    January 2019 `YouTube` announced a significant, but undisclosed, update to the
    recommendation algorithm aimed specifically at limiting the reach of harmful misinformation.
    The October 2020 blog post announcing new restrictions on QAnon said the number
    of views on videos related to QAnon coming from the recommendation algorithm had
    already dropped by eighty percent since January 2019. These efforts to reduce
    the presence of QAnon are important, but one might argue that it was too little,
    too late: the genie is already out of the bottle.


    Indeed, it is believed that `YouTube` played one of the largest roles among the
    social media platforms in “moving QAnon from the fringes to the mainstream,” in
    the words^([^(143)](#fn143)) of *New York Times* journalist Kevin Roose. Roose
    reported that a number of QAnon’s early activists produced “`YouTube` documentaries”
    explaining the movement’s core beliefs and that these videos were shared on Facebook
    and other platforms—which helped them gather millions of views and draw more people
    into the movement. Some individuals also rose to prominence in the QAnon movement
    by creating popular “`YouTube` talk shows” focusing on the latest developments
    in the world of QAnon.'
