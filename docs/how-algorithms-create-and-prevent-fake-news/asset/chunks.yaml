  trans: '

    ## 背景铺垫


    2016 年 11 月 14 日上午，也就是特朗普赢得选举人团、希拉里赢得普选票（两者均以较大优势获胜）的美国总统大选六天后，在谷歌搜索"最终选举结果"时，"新闻动态"板块置顶的链接是一篇声称特朗普以
    70 万张普选票优势获胜的文章。^(¹⁸⁰) 这篇文章来自一个质量低劣的 WordPress 博客，其信息来源仅是推特帖子，但谷歌的算法却将这条假新闻推到了最顶端。针对这一令人担忧的失误，谷歌发言人表示：^(¹⁸¹)
    "搜索的目标是为用户提供最相关、最有用的结果。我们显然没有做到位，但我们正在持续改进算法。"


    次日，刚担任谷歌 CEO 一年的桑达尔·皮查伊在接受 BBC 采访时^(¹⁸²)被问及，假新闻的病毒式传播是否可能影响了美国大选的结果。马克·扎克伯格此前已将此想法（事后看来显得天真且傲慢）斥为"相当疯狂"，而皮查伊则更为谨慎："我不完全确定。要知道，这是一场势均力敌的选举，所以从科学角度看，每一百个选民中只要有一人改变投票方向，就足以左右选举结果。"事实上，由于选举人团制度，这场选举最终仅取决于十万张选票。当被直接问及如此微小的差距是否意味着假新闻可能发挥了决定性作用时，皮查伊停顿片刻后说："当然。我认为，假新闻整体上可能成为一个问题。"


    不到一年后，谷歌母公司 Alphabet 的执行董事长埃里克·施密特公开承认，^(¹⁸³) 谷歌低估了来自敌对外国势力的武器化虚假信息宣传活动的潜在投入和影响："我们没有充分认识到政府——本质上就是俄罗斯人所做的——会利用黑客手段来控制信息空间的程度。这是我们未能充分预料到的事情。"他是在
    2017 年 8 月 30 日发表这番言论的。


    一个月零两天后，2017 年 10 月 1 日，美国现代史上最严重的枪击案在拉斯维加斯发生。数小时内，一条假新闻被发布在可疑网站 4chan 上一个与另类右翼相关的"政治不正确"板块，错误地指控一名自由派人士为枪手。谷歌的算法捕捉到了这条消息的热度，很快，搜索这位被冤枉者姓名时，第一个结果就是
    4chan 的帖子——谷歌将其误导性地标注为"头条新闻"。谷歌发言人的回应^(184) 不出所料地带有防御性和含糊其辞："不幸的是，今天清晨，我们在少量搜索查询中短暂地呈现了一个不准确的
    4chan 网站。[……] 它本不应出现在任何查询结果中，我们将继续改进算法以防止此类事件再次发生。"出错的并非只有谷歌的算法：Facebook 上关于拉斯维加斯枪击案的"热门话题"页面列出了多条假新闻，其中包括俄罗斯宣传网站*卫星通讯社*的一条消息。^(185)
    施密特一个月前关于俄罗斯干预的言论，现在看来出奇地有先见之明——或者，取决于你的视角，是令人沮丧地显而易见。


    一个半月后，在一次国际安全会议上，施密特试图解释^(186) 谷歌在处理假新闻时面临的挑战："假设这个群体相信事实 A，那个群体相信事实 B，你们激烈地相互反对，都在发表文章、撰写相关内容，等等等等。我们很难判断真相。[……]
    我们很难区分 A 和 B 哪个排名更高。"他接着解释说，当涉及广泛共识时，谷歌更容易处理虚假信息。这在某些方面是个合理的观点，但很难想象这如何适用于过去的这些失败案例——难道在
    2016 年大选中，特朗普输掉了普选票不是共识吗？在拉斯维加斯枪击案中，一个另类右翼网站上未经证实的谣言不是真正的新闻，这难道不是共识吗？那么仅仅几个月后，2018
    年 2 月，YouTube（正如你从第 4 章回忆起的，它归谷歌所有，并且基本上接管了谷歌的视频搜索部分）上最热门的视频^(187) 是一个恶劣的阴谋论，声称佛罗里达州帕克兰高中枪击案的一些幸存者是演员，这又该如何解释？


    如果这些事件中真的缺乏"共识"，人们不禁要问，这究竟是施密特所说的谷歌算法问题的真正原因，还是他可能把因果关系搞反了。也许正是谷歌算法助长了此类虚假故事，从而赋予它们合法性和广阔的平台，这导致了真相的侵蚀，最终使得那些本不应有争议的话题失去了共识。换句话说，谷歌是反映了混乱状态，还是制造了混乱？很可能，答案是两者兼而有之。要开始厘清这个复杂问题，区分谷歌提供的不同服务会有所帮助，这样我们就能深入探究每种服务背后的算法动态，并审视每种服务上出现的欺骗性和仇恨内容。


    在本章中，我将更广泛地使用"假新闻"一词，以涵盖种族主义和偏执内容。到目前为止，我在本书中很大程度上避免这样做，因为关于算法偏见的论述已经很多了，所以我不想通过复述那些故事来使这些章节过于拥挤，而是鼓励你去查阅关于这个问题的优秀且快速发展的文献。但当涉及到谷歌——对如此多的人来说，它是一个如此亲密且直接的信息来源——时，我无法真诚地将以新闻为导向的虚假信息与以社会为导向的虚假信息（如种族主义、性别歧视、反犹太主义等）区分开来。一方面，许多假新闻网站与倾向白人至上主义的另类右翼结盟，因此，当谷歌向用户提供偏执信息时，它也在为他们接受硬核的另类右翼假新闻材料做准备。而在更哲学的层面上，可以说种族主义刻板印象本身就是一种假新闻——它们本质上是有害的虚假信息，只是恰好聚焦于某些人群。

    '
- fmt: '# Google Maps


    One of the most abhorrent examples of hateful disinformation on a Google platform
    occurred in May 2015, during President Obama’s second term in office. It was reported^([^(188)](#fn188))
    in the *Washington Post* that if one searched Google Maps for “N****r king” or
    “N***a house” (with the asterisks filled in), the map would locate and zoom in
    on the White House. This was not the result of algorithmic bias or some other
    subtle failure of AI, it was directly the result of racist users with malicious
    intent—or as some people call it, third-party trolling and vandalism. This, and
    other acts of vandalism, caused Google to suspend user-submitted edits to Google
    Maps at the time: “We are temporarily disabling editing on Map Maker starting
    today while we continue to work towards making the moderation system more robust.”


    An intriguing and thankfully less hateful act of vandalistic disinformation on
    Google Maps occurred^([^(189)](#fn189)) in February 2020 when an artist tricked
    the service into showing a nonexistent traffic jam in the center of Berlin. How
    did he pull this off? He simply piled a hundred borrowed and rented smartphones
    into a little red wagon that he slowly walked around the city while the phones’
    location services were enabled.


    Most of the false information on Google Maps is not motivated by hate or artistry—it
    results from purely financial considerations, as I next discuss.


    ## Fake Business Information


    In June 2019, the *Wall Street Journal* reported^([^(190)](#fn190)) on the deluge
    of fake businesses listed on Google Maps. Experts estimated that around ten million
    business listings on Google Maps at any given moment are falsified and that hundreds
    of thousands of new ones appear each month. They claim that the “majority of listings
    for contractors, electricians, towing and car repair services and lawyers, among
    other business categories, aren’t located at their pushpins on Google Maps.” One
    motivation for someone to make fake listings is to give a misleading sense of
    the reach of one’s business by exaggerating the number of locations and branch
    offices on Google Maps. Another motivation is to drown out the competition.


    The owner of a cash-for-junk-cars business in the Chicago suburbs mostly relied
    on the Yellow Pages for advertising, but in 2018 he was contacted by a marketing
    firm that offered to broadcast his business on Google Maps—for a five-figure fee.
    He agreed, but then a few months later, the firm came back with a threat: if he
    doesn’t start giving them half his revenue, then they will bury his Google Maps
    listing under hundreds of fictitious competitors. He refused, and sure enough
    they posted an avalanche of made-up competitors with locations near him so that
    it would be very difficult for customers to find his business amid all the fake
    noise. He drove around a few Chicago neighborhoods and searched on his phone for
    auto salvage yards as he went; he said that more than half the results that came
    up were fake. These fake listings pushed his business listing off the first page
    of Google Maps search results, and soon his number of incoming calls dropped by
    fifty percent.


    Businesses do not pay anything to be listed on Google Maps, but before each one
    appears on the service, Google usually sends either a postcard or email or calls
    the business on the phone to provide a verification code that must be typed into
    Google Maps in order to have the listing approved. This precautionary measure
    is quite flimsy, and scammers have consistently been able to bypass it. In fact,
    doing so has become a business. The *Wall Street Journal* profiled a “listings
    merchant” who placed nearly four thousand fake listings on Google Maps each day
    from his basement in rural Pennsylvania.


    This listings merchant claimed to have had a staff of eleven employees who ran
    a “mostly” legitimate service that helped clients improve their visibility on
    Google Maps. But he also claimed to have had a separate staff of twenty-five employees
    in the Philippines who used “unsanctioned methods to fill orders for fake listings”
    at a rate of ninety-nine dollars per fake listing. This fake listing service was
    “aimed at businesses that want to pepper Google Maps with faux locations to generate
    more customer calls.” His employees gathered addresses from commercial real estate
    listings; to bypass Google’s safeguards, they simply purchased phone numbers cheaply
    online and had Google’s verification codes sent to these, then they routed these
    numbers to the clients once the Google Maps listings were approved. At the time
    of the *Wall Street Journal* article, however, this listings merchant said Google
    was investigating him, and tens of thousands of his listings had already been
    taken down.'
