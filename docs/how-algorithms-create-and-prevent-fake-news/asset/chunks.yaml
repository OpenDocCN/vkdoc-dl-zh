    We let the AI figure it out.” As recently as March 2020, Bandar said that his
    company was in talks to sell the technology to law firms, banks, and insurance
    companies—for employment screening, as usual, but also for fraud detection. O’Shea
    said it could also be used in employee assessment.^([^(168)](#fn168))


    The *MIT Technology Review* reported^([^(169)](#fn169)) that in 2018 the technology
    that would one year later form the basis for Silent Talker was involved in an
    experimental initiative called *iBorderCtrl* that was funded by the European Union
    and tested on volunteers at borders in Greece, Hungary, and Latvia. A press release^([^(170)](#fn170))
    announcing this experimental venture explained that it “is aiming to deliver more
    efficient and secure land border crossings to facilitate the work of border guards
    in spotting illegal immigrants, and so contribute to the prevention of crime and
    terrorism.” The press release goes on to provide more details: “Travelers will
    use an online application to upload pictures of their passport, visa and proof
    of funds, then use a webcam to answer questions from a computer-animated border
    guard, personalized to the traveler’s gender, ethnicity and language. The unique
    approach to ‘deception detection’ analyses the micro-gestures of travelers to
    figure out if the interviewee is lying.” (Personalized to the traveler’s ethnicity?
    I can’t imagine how bias might creep into a system like this…) At the border,
    travelers flagged by the system as high risk undergo a more detailed—and traditional—check.


    The *MIT Technology Review* report notes that after this 2018 iBorderCtrl announcement,
    “activists and politicians decried the program as an unprecedented, Orwellian
    expansion of the surveillance state.” A Dutch member of the European Parliament
    and leader of a center-left party warned the European Commission that this is
    “part of a broader trend towards using opaque, and often deficient, automated
    systems to judge, assess, and classify people.” The European Commission seems
    to have taken the hint and rebranded the venture from a practical pilot to a more
    theoretical research project, and one official said the deception detection system
    “may ultimately not make it into the design.”


    In 2019, journalists at the *Intercept* were able to try out the iBorderCtrl system
    for themselves, while crossing the Serbian-Hungarian border.^([^(171)](#fn171))
    They were asked sixteen questions and gave honest answers to all of them, yet
    the Silent Talker–based system scored four of these as lies—resulting in an overall
    assessment that the traveler was untruthful and required further questioning in
    person. Clearly a false positive. Ordinarily, the traveler is not informed of
    the lie detector’s report, but the journalists here obtained it through the European
    analogue of a Freedom of Information Act request. Earlier in the year, scholars
    at a digital human rights center in Milan used the same legal mechanism to request
    internal documents about iBorderCtrl’s lie detector system, but what they received
    was “heavily redacted, with many pages completely blacked out.” One of the scholars
    responded^([^(172)](#fn172)) with distrust and frustration: “What is written in
    those documents? How does the consortium justify the use of such a pseudoscientific
    technology?”


    It turns out Silent Talker is not the only startup doing AI-powered lie detection
    for airport screenings. A company called *Discern Science International* (DSI)
    that launched in 2018 has a product called *Avatar* that provides a very similar
    service as the one in iBorderCtrl: a virtual border guard asks travelers a prerecorded
    set of questions, and the system captures the traveler’s answers (both video and
    audio) and uses machine learning to label each answer as honest or dishonest.
    The company says the system looks for “deception signals” in the voice and face,
    such as involuntary “microexpressions” that supposedly are triggered by the cognitive
    stress of lying.


    Avatar is the commercialization of a research project undertaken by academics
    at the University of Arizona over the past several years. Prototypes are known^([^(173)](#fn173))
    to have been tested at an airport in Romania and a US border port in Arizona.
    It was also tested by the Canada Border Services Agency, but only in a laboratory
    setting, and the official response was less than enthusiastic: “a number of significant
    limitations to the experiment in question and to the technology as a whole led
    us to conclude that it was not a priority for field testing.” DSI says these tests
    yielded accuracy rates between eighty and eighty-five percent. While certainly
    better than random guessing, that sure leaves a lot of incorrect assessments in
    the field. Nonetheless, it was reported^([^(174)](#fn174)) in August 2019 that
    Discern had struck a partnership with an unnamed but well-established aviation
    organization and was planning on marketing Avatar to airports in a matter of months.
    DSI’s website currently says that the “Initial markets for the application of
    the deception detection technology will be at airports, government institutions,
    mass transit hubs, and sports stadiums.”'
  trans: '

    ### 深度学习微表情


    在 21 世纪初，神经网络尚未引发如今日般的深度学习革命之前，曼彻斯特城市大学的一名博士生珍妮特·罗斯韦尔，与她在计算机科学系的博士导师祖海尔·班达尔，利用少量人们诚实与不诚实回答问题的视频片段，训练了一个神经网络测谎算法。罗斯韦尔-班达尔算法在高度理想化数据的简单测试中达到了约
    80%的准确率（所有实例中光照条件完全相同，且如果有人戴眼镜，算法就会完全失灵）。这虽有些前景，但远不足以令人信服。令罗斯韦尔惊讶的是，她所在的大学发布了一篇新闻稿，宣称她的项目是一项将使测谎仪过时的新发明。罗斯韦尔于
    2006 年离开了该项目和大学，转而从事其他工作。


    另一方面，班达尔与两名新学生继续开发该项目多年，并于 2019 年 1 月，三人基于该技术创立了一家名为*Silent Talker*的初创公司。这是市场上首批由深度学习驱动的测谎仪之一。联合创始人之一吉姆·奥谢（他追随导师的脚步，现为曼彻斯特城市大学的高级讲师）自豪地承认^(¹⁶⁷)了他们产品的黑箱特性：“心理学家常说你应该对系统如何运作有某种模型，但我们没有运作模型，也不需要。我们让
    AI 自己搞清楚。”就在 2020 年 3 月，班达尔表示他的公司正在洽谈向律师事务所、银行和保险公司出售该技术——一如既往用于就业筛查，但也用于欺诈检测。奥谢表示，它也可用于员工评估。^(¹⁶⁸)


    《麻省理工科技评论》报道^(¹⁶⁹)称，2018 年，一项将在一年后构成 Silent Talker 基础的技术参与了一项名为*iBorderCtrl*的实验性计划，该计划由欧盟资助，并在希腊、匈牙利和拉脱维亚的边境对志愿者进行了测试。宣布这一实验性项目的一份新闻稿^(¹⁷⁰)解释说，该项目“旨在提供更高效、更安全的陆路边境口岸，以协助边境警卫识别非法移民，从而有助于预防犯罪和恐怖主义。”新闻稿进一步提供了更多细节：“旅客将使用在线应用程序上传护照、签证和资金证明的图片，然后使用网络摄像头回答由计算机动画生成的边境警卫提出的问题，该警卫会根据旅客的性别、种族和语言进行个性化设置。这种独特的‘欺骗检测’方法通过分析旅客的微表情来判断受访者是否在撒谎。”（根据旅客的种族进行个性化设置？我无法想象偏见会如何渗透到这样的系统中……）在边境，被系统标记为高风险的旅客将接受更详细——也更传统——的检查。


    《麻省理工科技评论》的报道指出，在 2018 年 iBorderCtrl 宣布之后，“活动家和政治家谴责该计划是监控国家前所未有的、奥威尔式的扩张。”一位荷兰籍欧洲议会议员兼中左翼政党领袖警告欧盟委员会，这是“更广泛趋势的一部分，即使用不透明且往往有缺陷的自动化系统来判断、评估和分类人群。”欧盟委员会似乎领会了暗示，并将该项目从实际试点重新定位为更理论化的研究项目，一位官员表示，欺骗检测系统“最终可能不会纳入设计中。”


    2019 年，《拦截》杂志的记者在穿越塞尔维亚-匈牙利边境时，得以亲自试用 iBorderCtrl 系统。^(¹⁷¹)他们被问了 16 个问题，并对所有问题都给出了诚实的回答，然而基于
    Silent Talker 的系统将其中四个回答判定为谎言——导致总体评估认为该旅客不诚实，需要当面进一步询问。这显然是一个误报。通常情况下，旅客不会被告知测谎报告，但这里的记者是通过欧洲版的《信息自由法》请求获得的。同年早些时候，米兰一个数字人权中心的学者使用相同的法律机制请求获取关于
    iBorderCtrl 测谎系统的内部文件，但他们收到的文件“经过了大量删减，许多页面完全被涂黑。”其中一位学者以不信任和沮丧的态度回应^(¹⁷²)道：“那些文件里写了什么？该联盟如何证明使用这种伪科学技术的合理性？”


    事实证明，Silent Talker 并非唯一一家为机场安检提供人工智能测谎服务的初创公司。一家名为*Discern Science International*（DSI）的公司于
    2018 年成立，其产品名为*Avatar*，提供的服务与 iBorderCtrl 中的非常相似：一个虚拟的边境警卫向旅客提出一组预先录制好的问题，系统捕获旅客的回答（包括视频和音频），并使用机器学习将每个回答标记为诚实或不诚实。该公司表示，该系统会寻找声音和面部中的“欺骗信号”，例如据说由说谎时的认知压力引发的非自愿“微表情”。


    Avatar 是亚利桑那大学学者过去几年进行的一个研究项目的商业化成果。已知原型^(¹⁷³)已在罗马尼亚的一个机场和亚利桑那州的一个美国边境口岸进行了测试。加拿大边境服务局也对其进行了测试，但仅限于实验室环境，官方回应并不热情：“该实验以及整个技术存在许多重大局限性，导致我们得出结论，它并非现场测试的优先事项。”DSI
    表示，这些测试的准确率在 80%到 85%之间。虽然肯定比随机猜测要好，但这在现场应用中确实留下了大量错误评估。尽管如此，据报道^(¹⁷⁴)，2019 年
    8 月，Discern 已与一家未具名但知名的航空组织建立了合作伙伴关系，并计划在数月内向机场推广 Avatar。DSI 的网站目前表示，“欺骗检测技术应用的初始市场将是机场、政府机构、公共交通枢纽和体育场馆。”

    '
- fmt: '### From Video to Audio and Text


    While `Silent Talker` relies on video data, and `Avatar` relies simultaneously
    on video and audio data, you might be wondering if AI-powered lie detection has
    been attempted without the visual component. Indeed, it has. `Nemesysco` is an
    Israeli company offering commercial AI voice analysis software that has been used
    by police departments in New York and the Midwest to interview suspects and also
    by debt collection call centers. Another startup, called `Neuro-ID`, doesn’t even
    have to see or hear someone at all—instead, it focuses on mouse movements and
    keystrokes. It has been used by banks and insurance companies to help detect fraud.
    As always with this kind of thing, false positives are a serious issue. A `Neuro-ID`
    spokesperson clarified^([^(175)](#fn175)) the intended use of this product: “There’s
    no such thing as behavior-based analysis that’s 100% accurate. What we recommend
    is that you use this in combination with other information about applicants to
    make better decisions and catch [fraudulent clients] more efficiently.”


    An academic collaboration produced a paper^([^(176)](#fn176)) in February 2019
    claiming to provide the first steps toward an “online polygraph system—or a prototype
    detection system for computer-mediated deception when face-to-face interaction
    is not available.” The idea was to train a machine learning algorithm to distinguish
    lying from truth-telling in the context of a live text chat between two people.
    The algorithm relied on not just the words within the text messages but also the
    rate at which they were typed. I would have guessed that deception requires more
    thought and therefore is manifest in a slower response time, but the authors of
    this paper claim that lying correlated with a faster response rate; perhaps lying
    does take more time, but the liars were aware of this and so answered more quickly
    in order to compensate for this in an attempt to hide their deception. The authors
    also found that liars had more verbal signs of anxiety in their communication,
    more negative emotions, a greater volume of words in each response, and more expressions
    of certainty such as “always” and “never.” Honest answers, in addition to being
    slower, shorter, less negative/anxious, and less certain (involving words like
    “perhaps” and “guess”), also used more causal expressions such as “because.” Overall,
    the algorithm scored an eighty-two percent accuracy—once again, better than random
    guessing but not enough to rely on in practice, in my opinion.


    Moreover, this online polygraph was trained and evaluated in a very controlled,
    limited, and artificial setting. A few dozen participants took part in a text
    chat game in which they were split into pairs, and then each pair conversed by
    asking and answering questions. The main rule for this game was that at the outset
    of each conversation, each individual was told that they must either answer all
    the questions honestly or answer them all dishonestly. The algorithm, therefore,
    was not attempting to classify individual answers as truthful versus deceptive,
    it was classifying the participants in each conversation as habitual truth-tellers
    versus habitual liars. This makes a big difference in terms of the accuracies
    one expects, and it strongly signals a simulated environment that would never
    actually occur in reality. Not only that, but as the prominent data scientist
    Cathy O’Neil pointed out,^([^(177)](#fn177)) the behavior of someone instructed
    to lie in a lab setting is very different than that of a practiced liar in the
    real world with skin in the game. She bluntly called this a “bad study” that has
    “no bearing” on being able to catch a seasoned liar in the act. In a similar vein,
    Kate Crawford, cofounder of the AI Now Institute at New York University, noted
    that this experiment was detecting “performance” rather than authentic deceptive
    behavior.


    ## Fake News


    Imagine having an algorithm that in real time would tell you whether someone was
    lying. This would be a tremendous weapon against fake news and disinformation.
    A shocking claim by a YouTube personality could immediately be outed as a fabricated
    conspiracy theory; an assertion by a politician during a press conference or debate
    could be revealed as a falsehood the moment it is uttered; eyewitness testimony
    could be vetted and verified; your questionable friend on Facebook who sends you
    deceptive chat messages about controversial political events would be caught in
    each act of dishonesty. Alas, such an algorithm is an unattainable fantasy. While
    AI has rejuvenated and revitalized the deception detection industry by providing
    modern variants of the polygraph based on video, audio, or text, there is no escaping
    the fundamental truth that there is no science to lying. Lies are unique, unrecognizable,
    and unpredictable—and that’s when they are deliberate; unintentional falsehoods
    clearly have zero chance of detection by any of the methods discussed in this
    chapter.


    As you have seen throughout this chapter, the bold claims in academic studies
    and corporate websites about the power of various AI-based lie detection algorithms
    are, simply put, mostly just fake news. Essentially, all the empirical investigations
    into each of these lie detection methods have been conducted behind closed doors
    by the organization with a direct financial incentive in the method performing
    well. The experiments tend to be artificial and limited in scope, and the reported
    accuracies paint a misleadingly rosy picture of what is possible. The training
    data sets for these products are almost certainly all too small and biased either
    by historical prejudice or by limited exposure to diverse people/situations (or
    both). Moreover, the black-box nature of machine learning algorithms means that
    nobody really knows why an AI lie detection system works as it does, nor what
    it is actually doing.


    The 1923 Frye case essentially sealed the fate of the polygraph in the courtroom,
    and subsequent legislation drastically limited its corporate usage as well (though
    public sector employment screening is a gaping hole in the regulatory web). It
    takes time for the legal system to catch up to the fast-paced world of technology.
    We are at a dangerous period of history now where the polygraph has been reinvented
    by AI and is quickly spreading across many sectors of society before the definitive
    Frye moment where the brakes are applied to rein in the ill-conceived and overzealous
    applications of a highly lucrative but unproven technology rooted in pseudoscience.
    As Vera Wilde, an academic and privacy activist who helped start the public campaign
    against `iBorderCtrl`, put it:^([^(178)](#fn178)) “It’s the promise of mind-reading.
    You can see that it’s bogus, but that’s what they’re selling.”


    Sigmund Freud once wrote that “No mortal can keep a secret. If his lips are silent,
    he chatters with his fingertips. Betrayal oozes out of him at every pore.” But
    Dan Ariely, a behavioral psychologist at Duke University, pointed out^([^(179)](#fn179))
    that “We have this tremendous capacity to believe our own lies. And once we believe
    our own lies, of course we don’t provide any signal of wrongdoing.” Shortly before
    he died in 1965, Larson, the Berkeley police cocreator of the original polygraph
    whom you briefly met earlier in this chapter, left an ominous warning about his
    invention that shows more circumspection than his monomaniacal fellow inventor
    Marston: “Beyond my expectation, through uncontrollable factors, this scientific
    investigation became for practical purposes a Frankenstein’s monster.” This monster
    breathes new life today in the age of AI.'
