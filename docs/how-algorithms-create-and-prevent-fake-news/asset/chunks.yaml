- fmt: '# Section 230


    The Communications Decency Act of 1996 was the US federal government’s first real
    legislative effort to regulate indecent and obscene material on the internet.
    It includes the now-notorious Section 230 stating, among other things, that “No
    provider or user of an interactive computer service shall be treated as the publisher
    or speaker of any information provided by another information content provider.”
    At the time it was written, the primary intent of this somewhat confusingly worded
    passage was to prevent internet service providers from being liable for illegal
    content on the Web. That was before the days of social media, and Section 230
    is now interpreted as a liability shield for tech companies like Google and Facebook
    and Twitter that host user-created content, absolving them of legal responsibility
    for the content on their platforms. The punchline is that these companies are
    mostly left to each determine their own policies and moderation methods—and their
    motivation for doing so is driven primarily by business considerations rather
    than a direct fear of legal liability.


    In the ramp-up to the 2020 election, Section 230 caught the skeptical eye of people
    of all political persuasions: many on the left said it allows Google and the social
    media companies to serve up harmful extremist content and misinformation without
    any culpability, while many on the right said it allows these companies to discriminately
    censor conservatives and stifle free speech. In the spring of 2020, Twitter started
    labeling false and misleading tweets by President Trump about voter fraud; Trump
    responded by calling for a total revocation of Section 230. Just prior to that,
    Joe Biden also called for the revocation of Section 230—but his reason was that
    it allows companies like Facebook to “propagate falsehoods they know to be false.”^([^(329)](#fn329))
    Even Mark Zuckerberg has expressed support for some revisions to Section 230,
    though Senator Wyden—one of the co-authors of the original 1996 law—openly questioned
    Zuckerberg’s intentions in this regard:^([^(330)](#fn330)) “He made his money,
    and now he wants to pull up the ladder behind him. The fact that Facebook, of
    all companies, is calling for changes to 230 makes you say, ‘Wait a second’.”


    Just days after the 2020 election, congress invited Mark Zuckerberg and Twitter
    CEO Jack Dorsey to testify about their platforms, the election, and misinformation.^([^(331)](#fn331))
    While Zuckerberg welcomed a new cross-platform regulatory framework to ensure
    that all large tech companies work toward—and are treated equally regarding—content
    moderation, Dorsey pushed back against this saying that “A centralized global
    content moderation system does not scale.” Dorsey said his focus is on giving
    users more tools to customize the content they see, but he also called for reforms
    to Section 230 that would require more oversight of, and transparency in, recommendation/newsfeed
    algorithms.


    Despite calls in 2020 from both then-President Trump and then-candidate Biden
    for Section 230 to be repealed entirely, it now appears that a milder approach
    will be pursued—essentially just eliminating protections for certain specific
    kinds of content in certain specific situations. One bill currently under consideration
    would hold a tech company responsible if its ranking algorithms amplified the
    spread of content linked to a real-world act of terrorism.^([^(332)](#fn332))
    There has also been discussion of whether Section 230 protections should be stripped
    entirely from online advertising. President Biden’s deputy chief of staff co-authored
    an op-ed^([^(333)](#fn333)) stating that “platforms should be held accountable
    for any content that generates revenue.” Whatever legislative decisions ultimately
    occur in this debate about the fate of Section 230 will almost certainly have
    a huge impact on the technological approaches the tech giants take next when it
    comes to content moderation.


    # Concluding Thoughts


    In 2018, Facebook announced plans for a new Oversight Board to help deliberate
    and adjudicate matters concerning the platform’s influence on public discourse.
    The board, often called “Facebook’s Supreme Court,” comprises a range of international
    experts—from top scholars in media studies, law, and public policy to leaders
    of human rights organizations and think tanks, and even a Nobel Peace Prize winner
    and a former prime minister of Denmark. As an example of the board’s activities,
    it was tasked with determining whether the indefinite suspension of Trump’s Facebook
    account was justified and whether it should continue.


    However, it was recently pointed out^([^(334)](#fn334)) by two scholars at Columbia
    University’s free speech institute that the board is so limited in scope—it focuses
    almost exclusively on individual instances of content removal—that it is in some
    sense a façade. They note that specific questions of content moderation are important,
    but far more consequential are the decisions the company makes about the design
    of its platform and the algorithms that power it: “[Facebook’s] ranking algorithms
    determine which content appears at the top of users’ news feeds. Its decisions
    about what types of content can be shared, and how, help determine which ideas
    gain traction. [...] The board has effectively been directed to take the architecture
    of Facebook’s platform as a given.”


    In other words, the board provides the public impression of external regulation
    and a dedication to mitigating ill effects on society, but the problem of harmful
    content spreading on social media and the question of how to moderate it run much
    deeper than decisions about individual pieces of content. The real discussion
    must involve investigations into, and possibly a vast rethinking of, the current
    algorithmic approach to maximizing user engagement. You have seen in this chapter
    that there are already many insightful investigations into algorithmic amplification
    of harmful content and even some promising ideas for redesigning the structure
    of social networks to counteract this. These questions of algorithmic design are
    central to the way forward, but Facebook has conveniently left all decisions concerning
    them in its own hands and out of the purview of its Supreme Court.


    And efforts at Facebook and the other tech giants to improve matters through algorithmic
    means have not always been undertaken with sufficient gusto. Cathy O’Neil, a prominent
    data scientist in the first generation of those calling attention to the dangers
    of society’s overreliance on algorithms, wrote^([^(335)](#fn335)) in February
    2021 that “My own experience with content moderation has left me deeply skeptical
    of the companies’ motives.” She said she was invited to work on an AI project
    at Google concerning toxic comments on YouTube, but she declined after seeing
    the paltry budget the project was allocated and concluded that “it was either
    unserious or expected to fail.” She had a similar experience with an anti-harassment
    project at Twitter. And even as these companies make progress on some technical
    issues with moderation, new challenges rapidly and routinely emerge. For instance,
    users now use live broadcast features on Facebook and YouTube and other platforms
    to spread their messages, sometimes to enormous audiences, and a live video feed
    clearly poses numerous vexing technical obstacles when it comes to moderation.'
