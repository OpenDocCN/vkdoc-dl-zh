    \ this internet news hierarchy. When the *Washington Post* breaks a big story,\
    \ it is only a matter of hours before the *New York Times* covers it as well,\
    \ and vice versa, often simply by reporting what was reported in the other newspaper’s\
    \ article. This is *horizontal propagation* , and it happens because even though\
    \ the second newspaper cannot claim credit for breaking the story, it does not\
    \ want its readership to obtain this information directly from the competitor\
    \ newspaper. *Vertical propagation* happens in two directions. A big story broken\
    \ at the top will be covered and duplicated by smaller news organizations and\
    \ blogs because, similar to horizontal propagation, this is an easy way of keeping\
    \ readers without doing much work; this is a *downward* flow of information.\n\
    \nWhile there is an obvious redundancy, hence an overall systemic inefficiency,\
    \ to both horizontal propagation and downward vertical propagation, the only real\
    \ harm to the truth-seeking reader is that important details might be omitted\
    \ and facts distorted as the story is passed from organization to organization—though\
    \ sometimes a more specialized blog will provide a valuable service by delving\
    \ deeper into a particular facet of the story than would be appropriate for the\
    \ top-level organization. It can be quite illuminating to find a story that was\
    \ broken by one newspaper and then compare its coverage across a range of other\
    \ newspapers and blogs; this is an excellent way to uncover the ideological inclinations\
    \ of different organizations, since the same set of facts will be colored by the\
    \ different viewpoints involved.\n\nThe remaining form of journalistic propagation\
    \ is the *upward* vertical flow, where stories start at small blogs and sometimes\
    \ end all the way up at national news sites. This is one of the key topics of\
    \ this chapter because it is responsible for a staggering amount of the misreporting\
    \ and outright fake news that we see, and it is driven almost entirely by data\
    \ and the economics of modern media. Before exploring this specific topic, it\
    \ helps to take a step back and look at the financial forces driving blogs and\
    \ newspapers; throughout, I take a broad view of “blogging” to include essentially\
    \ all forms of posting written content online."
  trans: "\n# 页面浏览量的危害\n\n数据驱动的在线新闻经济学\n\n> *互联网经济学催生了一套扭曲的激励机制，使得流量比真相更重要——也更有利可图。*\n\
    > \n> ——瑞安·霍利迪，《相信我，我在撒谎：一个媒体操纵者的自白》\n\n我们了解（或自以为了解）的世界上正在发生的事情，大部分是通过阅读新闻获得的。但如今，“新闻”的含义与过去几代人相比已大不相同。我们今天主要阅读的是互联网上的文章——从随意的博客帖子，到国内外新闻网站上经过精心调查的报道，无所不包。新闻业从印刷品向屏幕的转型，本质上并不意味着我们读到的内容比过去更不真实。然而，这种技术变革催生了一种不那么明显却极具影响力的经济转型：新闻业的*数据化*。正如我将要讨论的，我们在互联网上留下的页面浏览量和点击量，正是滋养着日益增长的错误信息和假新闻花园的数字肥料。通过追溯当代新闻周期中涉及的财务激励，我希望在本章中揭示一个令人震惊的程度：那些我们大多数人看不见、却由我们的行为和活动创造的数据，正在从根本上塑造我们每天阅读的内容，并威胁着传统新闻标准的堡垒。\n\
    \n## 故事的传播\n\n让我先做一个分类。在互联网媒体食物链的底层，如果你愿意这么理解的话，是那些专注于特定议题、兴趣或领域的小型博客和网站；它们可以是单人作者或多作者。往上一层是报纸、杂志和电视台的博客。这是一个令人困惑的中间地带，因为许多这类博客共享一个知名新闻来源的名称、网址和标志，但其编辑标准通常低于母机构，而且许多撰稿人缺乏人们可能期望从母机构获得的新闻培训。最顶层是官方新闻网站，它们可能是区域性的，但往往吸引大量的全国性或国际性读者。这种层级划分并非关乎质量——事实上，一些非常专注的小型博客能产出极高品质的内容，而一些大牌全国性新闻网站却持续发布准确性严重存疑的文章。这里的层级更多关乎受众和机构的规模，以及内容的范围。\n\
    \n信息在这个互联网新闻层级中既垂直流动，也水平流动。当《华盛顿邮报》爆出一则重大新闻时，只需几个小时，《纽约时报》也会进行报道，反之亦然，而且往往只是通过报道另一家报纸文章中的内容。这就是*水平传播*，之所以会发生，是因为即使第二家报纸不能声称是爆出该新闻的功劳，它也不希望自己的读者直接从竞争对手的报纸那里获取这些信息。*垂直传播*则有两个方向。顶层爆出的重大新闻会被较小的新闻机构和博客报道和复制，因为与水平传播类似，这是一种无需做太多工作就能留住读者的简便方式；这是信息的*向下*流动。\n\
    \n虽然水平传播和向下垂直传播都存在明显的冗余，从而导致整体系统效率低下，但对于追求真相的读者来说，唯一真正的危害是，当故事从一个机构传递到另一个机构时，重要的细节可能会被遗漏，事实可能会被扭曲——尽管有时，一个更专业的博客会通过深入挖掘故事的某个特定方面，提供有价值的服务，而这对于顶层机构来说可能并不合适。找到一家报纸爆出的新闻，然后比较它在其他一系列报纸和博客上的报道，会非常有启发性；这是揭示不同机构意识形态倾向的绝佳方式，因为同样的事实会因涉及的不同观点而被着色。\n\
    \n剩下的新闻传播形式是*向上*的垂直流动，即故事始于小型博客，有时最终会一路到达全国性新闻网站。这是本章的关键主题之一，因为它导致了我们所见到的数量惊人的错误报道和彻头彻尾的假新闻，而且这几乎完全是由数据和现代媒体的经济学驱动的。在探讨这个具体主题之前，退一步审视驱动博客和报纸的财务力量会有所帮助；在此过程中，我对“博客”采取宽泛的定义，将其基本涵盖所有在线发布书面内容的形式。\n"
- fmt: '# Economics of Blogging


    Ostensibly, the revenue for blogs comes from selling advertisements. There are
    a variety of pecuniary mechanisms for online advertisements, such as the advertising
    company affixing a banner atop the blog and paying based on *pageviews* (the number
    of users who visit the blog where the banner is displayed), and in some cases
    the advertiser pays an additional sum when a reader on the blog clicks the ad
    link and proceeds to actually purchase a product from the advertising company.
    But the most common format is pay-per-impression and pay-per-click advertising,
    in which the blog places an ad somewhere on its website and is paid based on *impressions*
    (the number of times the ad is seen by a reader on the blog) or *clicks* (the
    number of times the ad is clicked by a reader on the blog). The bottom line is
    that to maximize ad revenue, the blog needs to maximize traffic.


    But why did I write “ostensibly” in the preceding paragraph? Well, there is somewhat
    of a Ponzi scheme dynamic at play here. Advertising revenue tends to be relatively
    low even for popular blogs, so the real ambition of most blogs, even if they don’t
    admit it, is to gain sufficient popularity and traffic that a larger organization
    will buy them out and incorporate the blog into its larger website in order to
    increase traffic—often so that the larger website can boost its odds of being
    bought by a yet larger organization.


    For example, Nate Silver’s technical yet surprisingly popular blog on political
    polls was launched in 2008, brought into the *New York Times* in 2010, acquired
    by ESPN in 2013, then transferred to the sister property ABC News in 2018. Arianna
    Huffington’s groundbreaking general news blog the *Huffington Post* was founded
    in 2005 with a one million dollar investment and sold to AOL in 2011 for three
    hundred and fifty million—but, quite tellingly, at the time of this sale, its
    ad revenue was only thirty-one million dollars per year. This tenfold purchase
    price to annual revenue ratio is rather extreme and suggests that AOL was banking
    on continued long-term growth as well as other factors like the prestige of adding
    such a popular online newspaper and bringing onboard the superstar Arianna herself.
    At the end of the day, whether a blog aims to be bought out or not, the path to
    success is web traffic.


    Next, let me turn from the economics of blogs to that of the bloggers themselves.
    In the early days of blogging, bloggers tended to be paid either a flat rate with
    a required minimum number of daily posts, or they were paid per post; in the mid-2000s,
    depending on the establishment, this rate was often a dismal five or ten dollars
    per post. A paradigm shift occurred when *Gawker* left this per-post payment system
    and instead paid each blogger a monthly salary that was augmented by a bonus based
    on the number of pageviews recorded by the blogger’s articles. This shift made
    sense from an ad revenue perspective, and it quickly rippled across the blogosphere
    and ushered in a new era in which pageviews became the fundamental currency of
    blogging.


    *Gawker* took things even further when it installed a large board in its office
    showing a live tally of the pageview statistics for all its bloggers and their
    posts (other blogs soon turned to similar methods as well). This led to an intense
    pageview competition among the bloggers at the company, designed to stimulate
    productivity, and it signaled a strong emphasis on analytics in which bloggers
    could not help but keep score of which articles generated the most pageviews.


    This blogger remuneration system is blatantly reductionist: the reader’s opinion
    of a blog post is irrelevant. In fact, it does not even matter whether the reader
    actually reads the post—once the link to a post is clicked, the pageview is recorded,
    and that’s all that counts. An unfortunate but largely predictable consequence
    has been the proliferation of clickbait: catchy, often trashy, headlines that
    encourage clicks rather than bespeaking quality journalism.^([¹](#fn1)) A lengthy,
    methodically researched and fact-checked article provides no more financial value
    than a piece of vapid tabloid trash. This oversimplifies the situation as many
    readers follow certain blogs precisely because they consistently post high-quality
    articles, but many readers also click whatever stories are catchiest when scrolling
    through social media or news aggregators, and in these latter settings the name
    and reputation of the blog/organization is often a secondary factor in the decision
    to click—it is the headline that matters most.


    An additional, and significant, dynamic is that blog posts tend to have short-lived
    pageview-generating lifespans. Consequently, bloggers and blogs, in their constant
    journey for increased traffic, are under intense pressure to produce as many posts
    as possible, as rapidly as possible. A traditional print newspaper had to produce
    content that filled one print edition per day; a cable news network has to produce
    content that fills twenty-four hours a day, three hundred and sixty-five days
    a year; a blog has limitless space and is rewarded for attempting to fill this
    infinitude. This encourages rushed, sloppy writing and journalistic shortcuts;
    bloggers simply don’t have time to fact-check. In fact, posts that generate controversy
    tend to also generate pageviews. Even worse, outright fallacies in news articles
    often entice disgruntled readers to leave comments complaining and/or correcting
    the article, but commenting on blogs usually involves multiple clicks and data
    trails that are dollars (well, pennies) in the pockets of the blogger.


    Putting these observations all together, we see the perfect storm of conditions
    assaulting the foundations of journalism. Blogs and bloggers are almost all financially
    strapped, earning far less revenue than an outsider might expect, and so are in
    desperate need of more pageviews—whether to earn ad revenue directly or to raise
    the prospect of a lucrative buyout. This drives them to produce articles far too
    quickly, leaving precious little time to fact-check and verify sources. Even if
    they had time to fact-check, the pageview statistics they obsess over show that
    there is no real financial incentive for being truthful, as misleading articles
    with salacious headlines often encourage more clicks than do works of authentic
    journalism.


    And let me be abundantly clear about this: it is the data-driven impetus of the
    blogging industry, and the vast oversimplification and distortion of multidimensional
    journalistic value caused by reducing everything to a single, simple-minded, superficial
    metric—the pageview—that is most responsible for this dangerous state of affairs.
    That some pageview-driven blogs thrive on thoughtful, methodical, accurate writing
    is truly remarkable in this market that is saturated with perverse incentives
    pressuring writers to engage in the exact opposite of these noble qualities. Let
    us all be thankful for the good blogs and good writing when we see it, for it
    is certainly out there but it struggles to rise above the ubiquitous clickbait
    filth pervading the internet.


    Having presented the data-driven financial structure of blogs and bloggers, and
    the pernicious pressures it leads to, it is time now to turn back to the earlier
    discussion of the taxonomy of the blogosphere and the propagation of stories through
    it.'
