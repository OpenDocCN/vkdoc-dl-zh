- fmt: "# 3. Deepfake Deception\n\nWhat to Trust When Seeing Is No Longer Believing\n\
    \n> *In this era of fake news, the video was [...] showcasing an application of\
    \ new artificial-intelligence technology that could do for audio and video what\
    \ `Photoshop` has done for digital images: allow for the manipulation of reality.*\n\
    > \n> —Brooke Borel, *Scientific American*\n\nThe deep learning generative adversarial\
    \ networks (`GANs`) discussed in the previous chapter for creating synthetic photos\
    \ have also been applied to video synthesis and editing. Clips can now be created\
    \ of people doing and saying things they never did or said in real life. This\
    \ is leading to a double-pronged challenge in society’s attempts at discerning\
    \ the truth: fake videos are spreading across the internet causing people to believe\
    \ in events that never took place, and simultaneously real videos have been falsely\
    \ claimed as deepfakes causing people to doubt reality itself. In this chapter,\
    \ you will see how deepfake videos have impacted politics and journalism, how\
    \ the discord they sow relates to that of previous generations of image and video\
    \ manipulation, and what legal and technological attempts are being made to rein\
    \ them in.\n\n## Sounding the Alarm\n\nOn June 13, 2019, the US House of Representatives\
    \ held its first ever hearing^([^(47)](#fn47)) on deepfakes. Adam Schiff, just\
    \ six months into his chairmanship of the House Intelligence Committee, began\
    \ his opening statement with a resolute warning:\n\n> Advances in AI and machine\
    \ learning have led to the emergence of advanced digitally doctored types of media,\
    \ so-called “deepfakes,” that enable malicious actors to foment chaos, division\
    \ or crisis and they have the capacity to disrupt entire campaigns, including\
    \ that for the presidency. Rapid progress in artificial intelligence algorithms\
    \ has made it possible to manipulate media—video, imagery, audio, and text—with\
    \ incredible, nearly imperceptible results. With sufficient training data, these\
    \ powerful deepfake-generating algorithms can portray a real person doing something\
    \ they never did, or saying words they never uttered. These tools are readily\
    \ available and accessible to both experts and novices alike, meaning that attribution\
    \ of a deepfake to a specific author—whether a hostile intelligence service or\
    \ a single Internet troll—will be a constant challenge.\n\nAfter presenting a\
    \ few examples of deepfake videos created by expert practitioners to illustrate\
    \ the technology, Schiff continued: “Thinking ahead to 2020 and beyond, one does\
    \ not need any great imagination to envision even more nightmarish scenarios that\
    \ would leave the government, the media, and the public struggling to discern\
    \ what is real and what is fake.”\n\nTo emphasize the alarming speed at which\
    \ a maliciously doctored video could spread, Schiff mentioned one showing a seemingly\
    \ intoxicated Speaker of the House Nancy Pelosi slurring her speech—a video that\
    \ went viral and received millions of views in just two days. But Schiff correctly\
    \ noted that this doctored Pelosi video was not a deepfake, it was what some have\
    \ termed a “cheap fake” or a “shallowfake.” Rather than relying on cutting-edge\
    \ AI, the technology used is as old as film itself: the Pelosi clip was simply\
    \ slowed down to about seventy-five percent speed to create the impression of\
    \ inebriated speech and gestures.\n\nIf AI-powered deepfakes are such a dire threat\
    \ to society and national security, why didn’t Schiff provide a real example of\
    \ their effective use in a disinformation campaign? Have they ever been used in\
    \ a political arena? How can we detect them and regulate their use? Is the dystopian\
    \ fear surrounding deepfakes legitimate or is this yet another instance of AI\
    \ creating hype that it fails to live up to? And what the heck are deepfake videos\
    \ anyway and how are they made? These are the questions I shall explore in this\
    \ chapter. But first, let me step back and take a brief look at the history of\
    \ manipulated visual media in politics; this helps to contextualize the contemporary\
    \ threat posed by deepfakes.\n\n## A Brief Tour of Shallowfakes\n\nThere is a\
    \ surprisingly long history of manipulation of visual media in politics. A print\
    \ from the 1860s transposed the head of Abraham Lincoln onto the body of virulent\
    \ slavery advocate John C. Calhoun, supposedly to provide a more heroic posture\
    \ to the gangly Lincoln; this forgery was only uncovered in the late 1950s. A\
    \ famous Civil War photograph of General Ulysses S. Grant astride his horse at\
    \ City Point, Virginia, is a composite of three separate photos; this was only\
    \ discovered in 2007. Adolf Hitler, Fidel Castro, Mao Zedong, and Joseph Stalin\
    \ all had photographs altered to purge the photos—and hence also the history books—of\
    \ their enemies.\n\nA fake composite photo distributed by Joseph McCarthy’s staff\
    \ placed Senator Millard Tydings in apparent conversation with Earl Browder, head\
    \ of the American Communist Party, in an effort to taint Tydings with Communist\
    \ sympathies; some believe this played a key role in Tydings’ electoral defeat\
    \ in 1950. In 2004, during Senator John Kerry’s campaign for the Democratic presidential\
    \ nomination, a fake composite photo appearing to show him standing together with\
    \ Jane Fonda at an anti-Vietnam demonstration surfaced and was even reprinted\
    \ in a *New York Times* article about Kerry’s erstwhile antiwar activities; when\
    \ the original photographs were presented, some right-wing opponents falsely claimed\
    \ that the Kerry-Fonda photo was the authentic one and the original separate photos\
    \ were the forgeries. Images are powerful; altering images is a method to alter\
    \ reality and history.\n\nA commonly employed technique to produce disinformation\
    \ with either photographs or videos is simply to mislabel content: claim an event\
    \ in one place instead happened elsewhere, that one group of people is instead\
    \ a different group, etc. After Trump’s repeated fearmongering over a group of\
    \ Honduran migrants traveling through Mexico to the United States in 2018, there\
    \ was a viral post on Facebook showing the bloodied face of a Mexican police officer\
    \ with the caption “Mexican police are being brutalized by members of this caravan\
    \ as they attempt to FORCE their way into Mexico.” The photo had nothing to do\
    \ with the caravan—it was found on the website of the European Pressphoto Agency\
    \ and was taken during a student protest in 2012.^([^(48)](#fn48))\n\nA Trump\
    \ campaign advertisement in July 2020 included side-by-side photos—one showing\
    \ an orderly scene of Trump meeting with police leaders with the caption “public\
    \ safety,” and the other showing an alarming scene in which riot police appear\
    \ to be violently attacked by a mob of protesters with the caption “chaos & violence.”\
    \ There was no explicit mention of when or where this second photo was taken,\
    \ but the timing of the ad strongly implied that it was from the Black Lives Matter\
    \ protests that were taking place across the United States at the time. It turns\
    \ out, however, that the photo was from a pro-democracy protest in Ukraine in\
    \ 2014.^([^(49)](#fn49)) In another example,^([^(50)](#fn50)) a single video of\
    \ someone burned alive was falsely claimed by different groups in Ivory Coast,\
    \ South Sudan, Kenya, and Burma as evidence of an atrocity and grounds for action—and\
    \ in each case, this led to regional unrest and violence."
