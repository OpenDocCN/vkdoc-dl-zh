- fmt: '### 2017 Report


    In October 2017, the *Campaign for Accountability (CfA)* —a nonpartisan, nonprofit,
    evidence-based watchdog organization—released a detailed report^([^(237)](#fn237))
    on Google’s algorithmic placement of ads on hyperpartisan, misleading, and misinformative
    websites. The report noted that Google’s terms of service did not prohibit sites
    in the Google Display Network from publishing fake news. Additionally, Google’s
    dashboard where advertisers choose what kind of content their ads should be placed
    on allowed users to select left-wing or right-wing political content, but it did
    not include any options concerning hyperpartisan content—nor did it make any distinctions
    between quality journalism and fake news. While Google had discontinued Display
    Network membership for some particularly egregious sites, the CfA found that Google
    continued to include many hyperpartisan sites that frequently post disinformation.


    Moreover, Google provided an “anonymous” option that allowed ad hosting websites
    to conceal their identity from the advertising organizations. Advertisers could
    choose not to place ads on any anonymous sites, but doing so would cut out a significant
    revenue source since the anonymous sites were disproportionately lucrative. Indeed,
    the CfA report analyzed a sample of over a thousand partisan news sites in the
    Google Display Network and found that only fifteen percent were anonymous—but
    these anonymous ones contributed eight times as much revenue per site compared
    with the non-anonymous ones, and this anonymous fifteen percent of the sampled
    sites provided an estimated sixty percent of the total revenue in the sample.
    As the report authors described it, “advertisers are forced to choose between
    safe audiences and large audiences, and may unwittingly end up funding groups
    and activities that are antithetical to their values.”


    After the 2016 US election, there were some complaints from the public and from
    a handful of major advertisers over Google’s role in supporting hateful and factually
    misleading sites with ad revenue. Google responded^([^(238)](#fn238)) with a statement
    that included the following assertion: “Moving forward, we will restrict ad serving
    on pages that misrepresent, misstate, or conceal information about the publisher,
    the publisher’s content, or the primary purpose of the web property.” This is
    a pretty subtle statement: if you read it closely, you notice that it is not about
    prohibiting sites from publishing misleading content (as a number of news headlines
    at the time interpreted it), it is just about prohibiting sites in the Display
    Network from misleading the advertising organizations that they hope to secure
    and profit from. But even this mild form of restriction seems to have been, shall
    we say, fake news, because Google evidently continued to allow ad hosts to remain
    anonymous—the very definition of “conceal information about the publisher,” in
    my opinion.


    It’s hard to fathom how this blatant contradiction between Google’s public statement
    and the actual inner workings of the ad distribution system is anything but perfidy
    on the part of Google’s corporate leadership. There was no explanation for why
    anonymity continued to be allowed after this vapid public declaration; an earlier
    Q&A post^([^(239)](#fn239)) simply said “some publishers who’ve partnered with
    Google via the AdSense program, and provide us with the slots for placing your
    ads on the Display Network, choose to offer these placements anonymously and not
    disclose their site names to advertisers for various reasons.” Thanks to the CfA
    report, we now know the real reason Google continued to allow this: substantial
    profits.


    Complaints about harmful ad placements continued, and in March 2017 Google tried
    to step up its game:^([^(240)](#fn240)) “Starting today, we’re taking a tougher
    stance on hateful, offensive and derogatory content. This includes removing ads
    more effectively from content that is attacking or harassing people based on their
    race, religion, gender or similar categories.” But the CfA report found that content
    of this type remained in the Google Display Network. For instance, *Breitbart*
    was included in the network. Many advertisers explicitly pulled their ads from
    *Breitbart* once they realized their ads were being placed there, but this had
    to happen on an ad hoc basis since Google’s dashboard lacked the refined controls
    for preventing such ad placement in the first place. As the CfA report describes:
    “Under Google’s system, it is incumbent upon advertisers to identify and blacklist
    specific domains that they find objectionable. But Google doesn’t make this easy:
    its ad platforms don’t allow advertisers to block fake news sites as a category.
    […] Even if advertisers could identify specific extreme websites, Google offers
    these publishers a way to circumvent advertiser exclusions by making their sites
    anonymous.”


    The CfA report found numerous examples of Google ads placed on fake news articles—for
    instance, ones concerning the Las Vegas mass shooting that took place just weeks
    before the CfA report was published. Strikingly, in the sample of hosts analyzed
    by the CfA, right-wing content producers generated sixty-eight percent of the
    revenue, whereas left-wing content producers generated only four percent. Moreover,
    the report found that “Hyper-partisan, right-wing websites like *Breitbart*, *Drudge
    Report* and the *Daily Mail*, which commonly post highly dubious and conspiracy-minded
    content, were the top revenue-generating publishers in the sample.”


    While much of the public outcry facing Google in the period after the 2016 election
    centered on overt disinformation and bias in Google’s search results and its suggested
    news articles—the topics of the previous chapter—it seems that Google’s ad placement
    service, while much less visible, was playing a substantial role in funding politically
    dangerous organizations. Let us next see if Google’s ad placement policies and
    patterns improved in the years that followed.'
