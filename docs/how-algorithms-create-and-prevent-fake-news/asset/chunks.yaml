  trans: '

    ### 不同类型的深度伪造


    绝大多数深度伪造并未偏离其在 Reddit 上首次出现的猥亵形象：2019 年的一份报告^(⁵⁷)发现，互联网上 96% 的深度伪造都是未经同意的换脸色情内容，其中大部分使用了女明星的面孔。截至报告发布时，这些视频的累计观看量已超过一亿次。这些色情换脸视频之所以使用名人，部分原因在于观众的偏好，但也因为互联网上存在大量现成的名人影像素材，为深度学习算法提供了充足的训练数据。然而，重要的是，随着技术的持续发展，达到相同逼真度所需的训练数据量正在不断减少。


    一份较新的报告^(⁵⁸)发现，互联网上的深度伪造数量呈指数级增长，大约每六个月翻一番。发布这些报告的组织 DeepTrace Labs 截至 2020 年
    6 月已识别出近五万个深度伪造视频。在这些深度伪造视频的目标对象中，88.9% 来自娱乐行业，其中 21.7% 来自时尚界，4.4% 来自体育界。只有 4.1%
    的目标来自商界，4% 来自政界，但后两者的占比相比前几年均有所上升。


    目前已有多种用于制作深度伪造的公共软件工具，包括 `FakeApp`、`DFaker`、`faceswap`、`faceswap-GAN` 和 `DeepFaceLab`。虽然这些工具可以免费获取，但使用它们仍需投入大量时间、计算资源和用户技能。然而，相关方法的改进速度极快，随之而来的是制作令人信服的深度伪造所需的资源和技能正在迅速减少。话虽如此，很难想象制作深度伪造有一天会变得像制作浅度伪造——或者仅仅是欺骗性地修改字幕——那样快速和简单。


    为了提高公众对深度伪造及其在政治领域可能造成严重破坏的认识，2018 年 *BuzzFeed News* 与演员/编剧/导演乔丹·皮尔合作，制作了一个相当精致、引人注目且震撼人心的深度伪造视频^(⁵⁹)。视频中，巴拉克·奥巴马说道，其中包括：“我们正在进入一个时代，我们的敌人可以借此让任何人看起来在任何时间点说任何话——即使他们永远不会说那些话。所以，举例来说，他们可以让我说一些话，比如，我不知道，[...]
    特朗普总统是个彻头彻尾的蠢货。” 这个视频一经发布便引起了巨大轰动——并成功地将深度伪造的认知带给了更广泛的公众群体。


    这个奥巴马视频是一种被称为*重演*的深度伪造类型。你可以将其视为一种提线木偶戏，其中奥巴马是木偶，而皮尔是操纵者。皮尔被录像朗读脚本，然后他的嘴部被笨拙地粘贴到奥巴马的嘴上，接着，一个经过奥巴马演讲视频训练的深度学习算法被用来将这个简单的复制粘贴升级为皮尔的嘴部与奥巴马面部其余部分的无缝融合——从而根据皮尔的口部动作让奥巴马的整个面部活动起来。许多重演算法都使用
    GAN。简而言之，生成器对简单的复制粘贴视频进行融合，而判别器则将结果与真实演讲片段进行比较；通过这种方式，生成器学会了如何使其输出看起来像真实的演讲。除了视觉编辑，*BuzzFeed*
    团队还使用深度学习将皮尔的声音转化为令人信服的奥巴马声音模仿。^(⁶⁰) 这个项目大约花费了五十六小时的计算时间，并由一位视频特效专业人士监督。所使用的深度伪造视频应用是
    `FakeApp`。


    另一款在中国极为流行的换脸深度伪造应用是 `Zao`。仅需用户的一张照片，它就能将用户的脸部放入大型电视节目和电影中。虽然效果远非完美，但只需几秒钟就能在智能手机上完成。三星还开发了软件^(⁶¹)，用于从单张照片创建深度伪造视频——但类型与
    `Zao` 不同：三星预先用海量视频训练了一个深度学习算法，以学习人脸的自然运动方式；然后，这种通用知识被应用于用户提供的照片，根据用户同时提供给程序的数字操纵者视频，以逼真的方式让照片动起来。与使用特定于木偶的训练素材的深度伪造方法相比，这些三星视频往往保留更多操纵者的特征。


    学术界和 Adobe 的研究人员合作开发了一款由深度学习驱动的软件^(⁶²)，可以“让用户编辑视频的文字转录稿，从而添加、删除或改变某人直接说出的词语”。（你以为
    Adobe 的 Photoshop 已经够令人印象深刻了。）他们的系统首先识别视频中的*音素*（口语语音的基本单位），然后将其与相应的*视位*（面部表情和嘴部运动）进行匹配。该软件还会从视频中学习目标对象下半部分脸部的三维模型。当用户编辑转录稿的文字时，软件会在
    3D 模型中替换每个音素和对应的视位，然后利用这些信息修改原始视频。该系统目前仅适用于“说话头像”类型的视频，并且需要四十分钟的输入数据，当编辑后的文本与原始转录稿差异不大时，效果会更好。尽管如此，对于创建另一种类型的深度伪造来说，这仍是一种有趣的方法。


    你现在已经了解到，有许多不同类型的视频编辑流程都属于深度伪造这个总称——并且对于每种类型，都有多种应用和深度学习架构被使用，其中大多数涉及自编码器和 GAN。你已经看到深度伪造被用于娱乐（色情及其他方面），以及展示当前技术的可能性。你也已经看到浅度伪造和其他简单的视觉欺骗形式有着悠久的历史，并且至今仍在政治领域制造混乱。此时你可能会想，深度伪造是否也像浅度伪造一样，在现实世界中被用来操纵公众对政治事件的解读，甚至可能影响民主选举的结果。我希望你确实在思考这个问题，因为这是我接下来要讨论的话题。

    '
- fmt: '# Deepfakes in Politics


    In May 2018, a social democratic party in Belgium posted to Twitter and Facebook
    a one-minute deepfake video of President Trump speaking in English with Dutch
    subtitles.^([^(63)](#fn63)) The quality of both the vocal impersonation and the
    deepfake visuals is rather poor, and the spoken content itself makes it quite
    obvious that this is a satirical caricature of Trump (think SNL sketch more than
    subtle subterfuge). The video opens with the following proclamation by Trump:
    “Dear people of Belgium, this is a huge deal. As you know, I had the balls to
    withdraw from the Paris climate agreement, and so should you.” Near the end of
    the clip, the audio suddenly goes almost mute and the now-faint voice continues:
    “We all know climate change is fake, just like this video.” In addition to the
    audio being barely audible for this sneaky admission, these words are the only
    ones in the clip without Dutch subtitles. The video is clearly a joke, but it
    was made to have a real chance of tricking an inattentive viewer. Based on the
    social media comments—where it reached twenty thousand views within a single day—a
    significant number of viewers were indeed fooled into thinking that it was an
    authentic clip of Trump.


    Many—but not all, as you will soon see—of the deepfakes appearing in a political
    context are, like this Belgian example, more about entertainment than deception.
    The creators of the popular TV cartoon *South Park* in October 2020, just one
    week before the presidential election, released a web series on YouTube^([^(64)](#fn64))
    that is based entirely on deepfakes. The main character in the show is a deepfake
    version of Donald Trump, and a deepfake Mark Zuckerberg has a repeated cameo.
    The running joke of the opening episode is that all the supposedly real footage
    is actually deepfake, while the clips in the show that are supposedly deepfake
    are either silly puppets or actual real people.


    The 2020 Christmas address by Queen Elizabeth on the BBC was accompanied by a
    satirical address on the British public broadcast Channel 4 by a deepfake version
    of the queen.^([^(65)](#fn65)) If her stinging jokes about the royal family were
    not enough to make it clear that this was not really the queen, then the poorly
    voiced impersonation and the implausibly youthful dance routine she breaks into
    would surely be enough to settle the issue. Sometimes, however, the line between
    humor and politics is a bit more confusing. On April 26, 2020, the day of his
    wife’s 50th birthday, President Trump tweeted^([^(66)](#fn66)) a low-quality deepfake
    video of Joe Biden sticking his tongue out and added the following caption: “Sloppy
    Joe is trending. I wonder if it’s because of this. You can tell it’s a deep fake
    because Jill Biden isn’t covering for him.” Certainly, no outright deception was
    intended there, but it was still an uncomfortable moment for society to see a
    president known for having chronic issues with the truth openly share a tasteless
    deepfake video of his rival on social media and use it to make an immature dig
    at him.


    On September 20, 2020, two ads were scheduled^([^(67)](#fn67)) to air on Fox,
    CNN, and MSNBC in the DC region, one featuring a deepfake Vladimir Putin and the
    other featuring a deepfake Kim Jong-un. Both had the same message: America doesn’t
    need electoral interference because it will ruin its democracy all by itself.
    These ads were sponsored by a voting rights group and aimed to raise awareness
    of the fragility of American democracy and the need for Americans to actively
    and securely engage in the electoral process. The use of deepfakes here was not
    for deception, it was just to grab the viewers’ attention and startle people into
    recognizing the technologically fraught environment in which the 2020 presidential
    election was to take place. The deepfakes were face-swaps created using open source
    `DeepFaceLab` software. Both ads included the following disclaimer at the end:
    “The footage is not real, but the threat is.” At the last minute, the TV stations
    all pulled the ads and didn’t immediately provide an explanation for this decision.
    One can surely imagine a natural hesitation about wading into these delicate deepfake
    waters. In the end, the ads only appeared on social media.


    Arguably, the first direct use of deepfake technology in a political election
    occurred in India in February 2020. One day before the Legislative Assembly elections
    in Delhi, two forty-four-second videos of Manoj Tiwari, the leader of the Bharatiya
    Janata Party (BJP), were distributed across nearly six thousand WhatsApp groups,
    reaching roughly fifteen million people. In both videos, Tiwari criticized the
    rival incumbent political leader. In one video, he spoke in English, while in
    the other video he spoke a Hindi dialect called Haryanvi. Both videos were, in
    a sense, deepfakes. Tiwari first recorded the video in Hindi, his native tongue.
    Then, in partnership with a political communications firm called The Ideaz Factory,
    an impersonator recorded the audio for the English and Haryanvi versions of the
    speech. Finally, a “lip-syncing” form of reenactment deepfake that had been trained
    on other footage of Tiwari speaking was used to match his lip movements to the
    new audio.


    Despite using deepfake technology, these Tiwari videos were not particularly malicious—they
    were simply tools used in a political campaign to reach a broader and more linguistically
    diverse audience. In the words of one of the BJP’s heads of media and IT: “Deepfake
    technology has helped us scale campaign efforts like never before. The Haryanvi
    videos let us convincingly approach the target audience even if the candidate
    didn’t speak the language of the voter.” But the disingenuous nature of literally
    seeing someone speak a language they don’t actually speak left some people with
    a bitter taste and slight feeling of political dishonesty. As reported^([^(68)](#fn68))
    in *Vice*, Tiwari’s Haryanvi video “was used widely to dissuade the large Haryanvi-speaking
    migrant worker population in Delhi from voting for the rival political party.”
    Honestly, it’s hard to know how to feel about this instance of political deepfakery.
    Like most powerful tools, there are good applications of deepfake technology and
    bad applications and everything in between—and it will take some time for the
    full range of applications to emerge. Since this book is on fake news, I will
    focus mostly on the nefarious, deceptive uses, but later in this chapter, I will
    give one purely positive, legitimate use in politics.'
  raw: '## Deepfakes in Politics


    In May 2018, a social democratic party in Belgium posted to Twitter and Facebook
    a one-minute deepfake video of President Trump speaking in English with Dutch
    subtitles.^([^(63)](#fn63)) The quality of both the vocal impersonation and the
    deepfake visuals is rather poor, and the spoken content itself makes it quite
    obvious that this is a satirical caricature of Trump (think SNL sketch more than
    subtle subterfuge). The video opens with the following proclamation by Trump:
    “Dear people of Belgium, this is a huge deal. As you know, I had the balls to
    withdraw from the Paris climate agreement, and so should you.” Near the end of
    the clip, the audio suddenly goes almost mute and the now-faint voice continues:
    “We all know climate change is fake, just like this video.” In addition to the
    audio being barely audible for this sneaky admission, these words are the only
    ones in the clip without Dutch subtitles. The video is clearly a joke, but it
    was made to have a real chance of tricking an inattentive viewer. Based on the
    social media comments—where it reached twenty thousand views within a single day—a
    significant number of viewers were indeed fooled into thinking that it was an
    authentic clip of Trump.


    Many—but not all, as you will soon see—of the deepfakes appearing in a political
    context are, like this Belgian example, more about entertainment than deception.
    The creators of the popular TV cartoon *South Park* in October 2020, just one
    week before the presidential election, released a web series on YouTube^([^(64)](#fn64))
    that is based entirely on deepfakes. The main character in the show is a deepfake
    version of Donald Trump, and a deepfake Mark Zuckerberg has a repeated cameo.
    The running joke of the opening episode is that all the supposedly real footage
    is actually deepfake, while the clips in the show that are supposedly deepfake
    are either silly puppets or actual real people.


