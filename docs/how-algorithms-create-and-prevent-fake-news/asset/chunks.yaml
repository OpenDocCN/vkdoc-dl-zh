- fmt: 'First, the statistics in terms of exposures and shares. Five percent of all
    political link exposures were to fake news, and more than half of these fake news
    exposures came from the same seven fake news sources. But these fake news exposures
    were not distributed evenly among the voters—quite the opposite, in fact: the
    newsfeeds of just one percent of the voters accounted for eighty percent of the
    fake news exposures. Posting of fake news was even more uneven: eighty percent
    of the fake news links shared by the voters came from just one-tenth of a percent
    of the voters. In other words, while there was a lot of fake news being seen and
    shared by the voters, the seeing of it was quite concentrated into the newsfeeds
    of certain voters (called “superconsumers of fake news”), and the sharing of it
    was even more concentrated into an even smaller number of the voters (called “supersharers
    of fake news”). The supersharers were extremely active: on average, a typical
    supersharer of fake news tweeted seventy times per day, while overall a typical
    voter tweeted only once every ten days. A typical superconsumer of fake news had
    almost forty-seven hundred exposures to political links per day, while overall
    a typical voter had fifty. The supersharers of fake news were much more active
    than even the highly prolific sharers on Twitter in general, and the researchers
    suspect that many of them were so-called `cyborg` accounts, which means a partially
    automated account (i.e., a hybrid of a bot and a human).


    Next, the statistics in terms of the voters. The voters averaged two hundred exposures
    to fake news links during the last month of the election. On average, only one
    percent of the political links the voters saw were to fake news. The voters with
    higher concentrations of fake news in their newsfeed were far more likely to be
    conservative than liberal: people seeing at least five percent fake political
    links made up only two and a half percent of the liberal voters but over sixteen
    percent of the conservative voters. The older a voter was, the higher was the
    proportion of fake news they saw in their newsfeed. Voters in swing states had
    slightly higher proportions of fake news (corroborating studies discussed earlier),
    as did men and whites, but the size of these effects was quite small. Among the
    voters classified politically as extreme left, just under five percent ever shared
    a fake news link; the rate for left and center users was also just under five
    percent, whereas for politically right users it jumped up to just under twelve
    percent, and more than one in five extreme right users shared a fake news link
    during the five months of the study period.


    ## Lies Spread Faster and Deeper Than Truth


    The studies discussed above investigated various data sets of tweets by classifying
    links to news organizations as either traditional media outlets or fake news outlets.
    This organization-based approach provides a wealth of valuable information, but
    it is by design blind to the actual stories linked to in these tweets. Some outlets
    publish both real and fake news, which renders this approach problematic. Moreover,
    in some sense what matters most from a societal perspective are the particular
    stories that spread virally across social media—a spread that usually involves
    hopping across different news organizations (recall the vertical and horizontal
    propagation you saw in Chapter [1](../Text/508514_1_En_1_Chapter.xhtml))—and the
    people these stories reach along the way. A study^([^(302)](#fn302)) widely considered
    the pinnacle of fake news research, published by a trio of academics from MIT
    in 2018 in *Science*, took a drastically new approach by tracking the trajectory
    of individual stories—both true and false ones—across Twitter. Their findings
    are fascinating and transformative; in short, they showed that lies spread faster
    and deeper than the truth. To understand the meaning, impact, and limitations
    of this study, it is worth really getting into the weeds here.


    The researchers started by collating a list of essentially all the stories/assertions/claims
    that have appeared on at least one of six popular and well-respected fact-checking
    websites.^([^(303)](#fn303)) This yielded a collection of “rumors,” each labeled
    on a true-to-false scale by combining the scores from the individual fact-checking
    organizations (all of which rely on expert human opinion rather than algorithmic
    analysis of the type discussed in the next chapter of this book). The researchers
    were granted remarkable and nearly unprecedented access to the full historical
    archive of all tweets ever posted on Twitter, going back to the very first tweet
    in 2006. They searched through all the English-language tweets, up through December
    2016, and extracted all of those with a link to an item in one of the six fact-checking
    websites. Among these extracted tweets, they further extracted the ones that were
    in the form of a reply to a top-level tweet, and then they used a combination
    of machine learning and manual methods to check whether the headline in the fact-checking
    link closely matched the content of the top-level tweet being replied to. For
    each of these top-level tweets with a relevant fact-checking reply, they extracted
    the full network of replies and retweets, which they call a “rumor cascade” since
    the top-level tweet concerns one of the rumors in the collated list and the network
    of replies and retweets conveys how this particular instance of the rumor cascaded
    through Twitter.


    Next, machine learning was used to process the text, links, and images in the
    top-level tweets in these rumor cascades to group them according to the rumor
    they concerned. The researchers also collected additional rumor cascades by searching
    Twitter for top-level tweets that contained similar text/links/images to any of
    the top-level tweets in the rumor cascades and extracting their network of replies
    and retweets even if none of the replies contained a fact-checking link. In the
    end, they collected over one hundred and twenty-five thousand rumor cascades that
    were mapped onto about twenty-five hundred distinct rumors. The rumors represent
    any piece of contested information that was fact-checked by at least one of the
    six organizations, and the rumor cascades represent their various trajectories
    on Twitter. Of the rumors, seventy percent were false, twenty percent were true,
    and the remaining ten percent were mixed; of the rumor cascades, sixty-five percent
    concerned a false rumor, twenty percent concerned a true rumor, and the remaining
    fifteen percent concerned a mixed one.'
