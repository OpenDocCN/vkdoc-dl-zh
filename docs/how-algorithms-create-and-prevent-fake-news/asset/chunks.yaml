    set for a machine-learning system. The machine-learning system is then applied
    to all the webpages we index in the world wide web. Once that application has
    been done, we use that information and other indicators to rank-order the responses
    that come back from a web search.


    He summarized this as follows: “There is a two-step process. There is a manual
    process to establish criteria and a good-quality training set, and then a machine-learning
    system to scale up to the size of the world wide web, which we index.” Many of
    Google’s blog posts and official statements concerning the company’s efforts to
    elevate quality journalism come back to this team of ten thousand human evaluators,
    so to dig deeper into Cerf’s dense statement here, it would be helpful to better
    understand what these people do and how their work impacts the algorithm. Fortunately,
    an inside look at the job of the Google evaluator was provided in a *Wall Street
    Journal* investigation^([^(231)](#fn231)) from November 2019.


    While Google employees are very well compensated financially, these ten thousand
    evaluators are hourly contract workers who work from home and earn around $13.50
    per hour. One such worker profiled in the *Wall Street Journal* article said he
    was required to sign a nondisclosure agreement, that he had zero contact with
    anyone at Google, and that he was never told what his work would be used for (and
    remember these are the people Cerf referred to as “part of our Google family”).
    He said he was “given hundreds of real search results and told to use his judgment
    to rate them according to quality, reputation and usefulness, among other factors.”
    The main task these workers perform, it seems, is rating individual sites as well
    as evaluating the rankings for various searches returned by Google. These tasks
    are closely guided by the hundred-sixty-eight-page document these workers are
    provided. Sometimes, the workers also received notes, through their contract work
    agencies, from Google telling them the “correct” results for certain searches.
    For instance, at one point, the search phrase “best way to kill myself” was turning
    up how-to manuals, and the contract workers were sent a note saying that all searches
    related to suicide should return the National Suicide Prevention Lifeline as the
    top result.


    This window into the work of the evaluators, brief though it is, helps us unpack
    Cerf’s testimony. Google employees—presumably high-level ones—make far-reaching
    decisions about how the search algorithm should perform on various topics and
    in various situations. But rather than trying to directly implement these in the
    computer code for the search algorithm, they codify these decisions in the instruction
    manual that is sent to the evaluators. The evaluators then manually rate sites
    and search rankings according to this manual, but even with this army of ten thousand
    evaluators, there are far too many sites and searches to go through by hand—so
    as Cerf explained, these manual evaluations provide the training data for supervised
    learning algorithms whose job is essentially to extrapolate these evaluations
    so that hopefully all searches, not just the ones that have been manually evaluated,
    behave as the Google leadership intends.


    While some of the notable updates to the Google search algorithm have been publicly
    announced^([^(232)](#fn232)) by the company (several were mentioned in this chapter),
    Google actually tweaks its algorithm extremely often. In fact, the same *Wall
    Street Journal* investigation just mentioned also found that Google modified its
    algorithm over thirty-two hundred times in 2018\. And the number of algorithm
    adjustments has been increasing rapidly: in 2017, there were around twenty-four
    hundred, and back in 2010 there were only around five hundred. Google has developed
    an extensive process for approving all these algorithm adjustments that includes
    having evaluators experiment and report on the impact to search rankings. This
    gives Google a sense of how the adjustments will work in practice before turning
    them loose on Google’s massive user base. For instance, if certain adjustments
    are intended to demote the rankings of fake news sites, the evaluators can see
    if that actually happens in the searches they try.'
