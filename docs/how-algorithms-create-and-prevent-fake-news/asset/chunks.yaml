  trans: '

    ### 深度学习


    自 20 世纪 90 年代以来，机器学习领域最大的进步无疑是*深度学习*，它在过去十年间蓬勃发展，达到了真正革命性的水平。就本书而言，我们无需深入理解构成深度学习基础的*神经网络*原理。（粗略来说，神经网络提供了一种结构化且灵活的方式，用于根据预测变量`x`来编写目标变量`y`的非线性公式，其灵感大致来源于大脑的架构。）理解深度学习的关键在于，你可以包含任意数量的预测变量，而在训练过程中，算法会自动找出如何将这些变量转换为一组新的预测变量，这些新变量编码了数据更高层次的概念化特征，并且通常比原始变量表现好得多——至少在涉及海量训练数据时是如此。这些由算法推导出的预测变量按层级结构组织，其中更高层次的预测变量对应于神经网络中更深层的神经元。


    图像处理是一个很好的说明性例子。原始预测变量是图像中每个像素的数值颜色值，它完整地编码了原始数据，但没有任何空间感知能力：每个像素都不知道其相邻像素的值。在训练用于人脸识别等监督任务的深度学习算法时，神经网络会从数据（即大量人脸图像）中学习如何将这些像素值组织成更连贯、更具概念性的预测变量。例如，低层预测变量通常指示图像中高对比度边缘的位置；中层预测变量可能利用这些边缘位置来表达眼睛、鼻子和嘴巴等面部特征的位置和形状；然后高层预测变量可能将这些面部特征的位置和形状整合起来，形成新的预测变量，这些变量暗示着性别、种族等概念。这种解释是对神经网络黑箱内部真实情况的一种理想化且相当拟人化的描述，但它至少能让人大致了解深度学习中层结构是如何从数据中涌现出来的。


    ### GPT-3


    值得注意的是，你现在已经具备了足够的技术背景，可以了解文本生成算法`GPT-3`的工作原理了！它只是针对预测句子中下一个单词这一监督任务的一种特定深度学习方法。一个数据点是一段文本，预测变量是除最后一个单词外的所有单词，而目标变量则是最后一个单词。训练该算法意味着向其输入大量文本，并稳步调整内部参数，以使算法预测的单词尽可能频繁地与真实单词匹配。


    这里的关键一点是，这种形式的监督学习实际上是*自监督*的：无需人工为每个训练数据点记录目标变量的值（例如，在训练图像识别时手动输入每张照片中主要对象的名称），目标值与预测值一样，直接来自文本本身。这使得算法能够在规模难以想象的数据集上进行训练。事实上，`GPT-3`是在包含约五千亿单词的文本上训练的。这些训练文本中约
    86%来自网络，其余来自扫描的书籍。为了让你了解其规模，请考虑以下惊人事实：整个维基百科都包含在`GPT-3`的训练文本中，但它仅占全部训练文本的约 0.5%。


    由于`GPT-3`依赖于深度学习，我们知道神经网络的各层在训练过程中会学习创建一种预测变量的层级组织，这种组织以某种方式编码了层级语言结构。我想说，较低层关注每个句子的短程语法和句法方面，而较高层可能转而关注更大尺度的语义，如情节、人物、叙事连贯性等——但实际上，我们并不太清楚`GPT-3`内部在如此详细的概念层面上发生了什么。


    `GPT-3`的整体设计与`GPT-2`相同——变化的是算法所依赖的参数数量以及训练过程中使用的文本数据集大小。最初的`GPT`（2018 年发布）仅有略超过
    1 亿个参数；`GPT-2`（2019 年发布）有 15 亿个参数；`GPT-3`（2020 年发布）则有 1750 亿个参数。训练集也随着每次迭代大幅增长。这些算法的训练是预先进行的，且成本高昂；OpenAI
    的首席执行官山姆·奥特曼曾表示^(³⁹)，用于训练`GPT-3`的云计算资源的一次性成本高达数千万美元。幸运的是，算法只训练一次，并且 OpenAI 为此买单。


    在`GPT-3`对其庞大的训练文本数据集进行了足够多次的“阅读”之后，它锁定了所有内部参数的值，然后就可以供公众使用了（至少对那些获得访问权限的人而言）。每个用户都可以输入一段文本，算法会根据需要生成文本来扩展它。在内部，算法会接收原始输入文本，预测其后的下一个单词（正如它被训练的那样），然后将这个预测的单词附加到输入单词之后，并用此来预测下一个单词，依此类推。^(⁴⁰)
    因此，它像人类一样一次写一个单词，总是根据页面上已经写下的单词来选择单词。重要的是，使用`GPT-3`不需要任何计算机技能或统计知识；用户只需输入初始文本提示，剩下的工作由算法完成。


    在讨论了文本生成的技术方面之后，我现在可以转向照片生成的技术方面了。

    '
- fmt: '### Deepfake Photo Generation


    Very broadly, we want to feed an algorithm a large collection of photos of human
    faces and have it learn from these how to produce new faces on its own. It is
    absolutely astonishing that this is now possible. We don’t want to have to explicitly
    teach the algorithm that human faces generally have an oval shape with two ears
    on either side, two eyes, one nose in the middle, one mouth below that, etc.,
    so we will rely on deep learning to automatically extract this high-level understanding
    directly from the data.


    For text generation, we were able to piggyback off of supervised deep learning
    in a rather straightforward way—by reading text and attempting to predict each
    word as we go. For image generation, this doesn’t really work too well. While
    `GPT-3` produces text that is quite convincing on a small scale (each sentence
    looks grammatical and related to the surrounding sentences), it tends to lose
    the thread of coherence over a larger scale (narrative contradictions emerge,
    or, for instance, in a story the villain and hero might spontaneously swap). This
    limitation often goes unnoticed by a casual reader. But large-scale coherence
    is absolutely crucial for image tasks such as synthesizing photographs of faces:
    a `GPT-3` type approach would likely lead to globs of flesh and hair and facial
    features that seem organic in isolation but which constitute hideous inhuman monstrosities
    on the whole—the wrong number of eyes, ears in the wrong place, that kind of thing.


    It turns out that supervised learning can be used effectively for image generation,
    but in a more subtle, complex way that was only first invented in 2014. The deep
    learning framework for this is called a *generative adversarial network* (or *GAN*
    for short). The basic idea is to pit two self-supervised deep learning algorithms
    against each other. The first one, called the *generator*, tries to synthesize
    original faces—and it needs no prior knowledge, it really can just start out by
    producing random pixel values—whereas the second one, called the *discriminator*,
    is always handed a collection of images, half of which are real photos of faces
    and half of which are the fake photos synthesized by the generator. During the
    training process, the generator learns to adjust its parameters in order to fool
    the discriminator into thinking the synthesized images are authentic, but simultaneously
    the discriminator learns to adjust its parameters in order to better distinguish
    the synthetic images from the authentic ones.


    The training process is quite delicate, much more so than for traditional supervised
    learning, because the two algorithms need to be kept in balance. But throughout
    the seven years that GANs have existed, progress in overcoming this and many other
    technical challenges has been rapid and breathtaking. The links provided earlier
    in this chapter give you the opportunity to see the outputs from state-of-the-art
    facial photo-generating GANs. And, as with essentially all topics in deep learning,
    there are no signs of this rapid progress abating. It is both exciting and frightening
    to think of what this technology might be capable of next.


    And now, having completed this crash course in machine learning, I can turn to
    the last topic of this chapter, which is how we can use AI to detect when a photo
    or passage of text has been synthesized by AI. This is the defensive side of a
    hastily escalating technological arms race.


    ## Algorithmic Detection


    Let me start with deepfake photos. In February 2020, a research and product development
    unit within Google focusing on issues at the interface of technology and society
    announced^([^(41)](#fn41)) that it was piloting a tool called *Assembler* designed
    to “help fact-checkers and journalists identify and analyze manipulated media.”
    The goal wasn’t to fully automate the process; instead, it was to provide “strong
    signals” that could be combined with traditional human expertise. At the time
    of the announcement, `Assembler` was being trialed with a small number of fact-checker
    and media organizations, and it appears this is still the case at the time of
    writing this book (the project website is [`https://projectassembler.org/`](https://projectassembler.org/)).
    `Assembler` puts together in one package several tools developed externally by
    various academic researchers, and in doing so it looks for different types of
    media manipulation. But the Google researchers also included a new detector they
    developed internally aimed specifically at the most recent and popular deepfake
    photo synthesis system.


    This deepfake system, called *StyleGAN*, is a refinement of the general GAN design
    sketched above; the generator algorithm is given various architectural boosts
    to help it learn how to adjust more large-scale structure—the “stylistic” aspects—of
    the images it generates. (Most of the examples provided in links earlier in this
    chapter are generated using `StyleGAN`.) Google didn’t reveal much about `Assembler`’s
    `StyleGAN` detector other than that it relies on machine learning. Presumably,
    they fed a deep learning algorithm lots of authentic photos and lots of `StyleGAN`
    deepfake photos and trained it on the supervised classification task of determining
    which photos are which. But we don’t know any of the details, nor do we know how
    well it performs.


    On September 1, 2020, Microsoft announced^([^(42)](#fn42)) a collection of new
    steps it was taking to help combat disinformation. One of these is a new tool
    called *Microsoft Video Authenticator* that provides an estimated probability
    that a user-inputted photo was generated or manipulated by AI (if the user inputs
    a video instead of a photo, then it provides a real-time frame-by-frame probability
    estimate as the video plays). According to Microsoft, “It works by detecting the
    blending boundary of the deepfake and subtle fading or greyscale elements that
    might not be detectable by the human eye.” Unfortunately, once again, we don’t
    know much beyond this. The Microsoft announcement does realistically admit that
    any detection system will make mistakes, and it also points out that AI generation/manipulation
    methods will continue to advance. Any detection system will be rendered ineffective
    and obsolete if it does not keep pace with the technological developments.


    Now, let me turn to text generation. Researchers at Harvard and MIT built a tool^([^(43)](#fn43))
    to estimate the likelihood that a passage of text was written by an AI system
    like GPT. Here’s the basic idea behind the tool. The researchers first use a trained
    deep learning language algorithm to estimate the probability that each word in
    the passage follows the preceding text, and then they color each word based on
    this probability: if the word is among the top ten predictions, then it is colored
    green; if not but it is among the top one hundred, then it is yellow; similarly,
    red is for top one thousand; and all remaining words are colored violet. We know
    that language generation algorithms select words according to their estimated
    probabilities, so the idea is that algorithmically generated text will be largely
    green and yellow, whereas human text is expected to contain a lot more red and
    violet.'
  raw: '### Deepfake Photo Generation


    Very broadly, we want to feed an algorithm a large collection of photos of human
    faces and have it learn from these how to produce new faces on its own. It is
    absolutely astonishing that this is now possible. We don’t want to have to explicitly
    teach the algorithm that human faces generally have an oval shape with two ears
    on either side, two eyes, one nose in the middle, one mouth below that, etc.,
    so we will rely on deep learning to automatically extract this high-level understanding
    directly from the data.


    For text generation, we were able to piggyback off of supervised deep learning
    in a rather straightforward way—by reading text and attempting to predict each
    word as we go. For image generation, this doesn’t really work too well. While
    GPT-3 produces text that is quite convincing on a small scale (each sentence looks
    grammatical and related to the surrounding sentences), it tends to lose the thread
    of coherence over a larger scale (narrative contradictions emerge, or, for instance,
    in a story the villain and hero might spontaneously swap). This limitation often
    goes unnoticed by a casual reader. But large-scale coherence is absolutely crucial
    for image tasks such as synthesizing photographs of faces: a GPT-3 type approach
    would likely lead to globs of flesh and hair and facial features that seem organic
    in isolation but which constitute hideous inhuman monstrosities on the whole—the
    wrong number of eyes, ears in the wrong place, that kind of thing.


    It turns out that supervised learning can be used effectively for image generation,
    but in a more subtle, complex way that was only first invented in 2014\. The deep
    learning framework for this is called a *generative adversarial network* (or *GAN*
    for short). The basic idea is to pit two self-supervised deep learning algorithms
    against each other. The first one, called the *generator*, tries to synthesize
    original faces—and it needs no prior knowledge, it really can just start out by
    producing random pixel values—whereas the second one, called the *discriminator*,
    is always handed a collection of images, half of which are real photos of faces
    and half of which are the fake photos synthesized by the generator. During the
    training process, the generator learns to adjust its parameters in order to fool
    the discriminator into thinking the synthesized images are authentic, but simultaneously
    the discriminator learns to adjust its parameters in order to better distinguish
    the synthetic images from the authentic ones.


    The training process is quite delicate, much more so than for traditional supervised
    learning, because the two algorithms need to be kept in balance. But throughout
    the seven years that GANs have existed, progress in overcoming this and many other
    technical challenges has been rapid and breathtaking. The links provided earlier
    in this chapter give you the opportunity to see the outputs from state-of-the-art
    facial photo-generating GANs. And, as with essentially all topics in deep learning,
    there are no signs of this rapid progress abating. It is both exciting and frightening
    to think of what this technology might be capable of next.


    And now, having completed this crash course in machine learning, I can turn to
    the last topic of this chapter, which is how we can use AI to detect when a photo
    or passage of text has been synthesized by AI. This is the defensive side of a
    hastily escalating technological arms race.


    ## Algorithmic Detection


    Let me start with deepfake photos. In February 2020, a research and product development
    unit within Google focusing on issues at the interface of technology and society
    announced^([^(41)](#fn41)) that it was piloting a tool called *Assembler* designed
    to “help fact-checkers and journalists identify and analyze manipulated media.”
    The goal wasn’t to fully automate the process; instead, it was to provide “strong
    signals” that could be combined with traditional human expertise. At the time
    of the announcement, Assembler was being trialed with a small number of fact-checker
    and media organizations, and it appears this is still the case at the time of
    writing this book (the project website is [`https://projectassembler.org/`](https://projectassembler.org/)).
    Assembler puts together in one package several tools developed externally by various
    academic researchers, and in doing so it looks for different types of media manipulation.
    But the Google researchers also included a new detector they developed internally
    aimed specifically at the most recent and popular deepfake photo synthesis system.


    This deepfake system, called *StyleGAN* , is a refinement of the general GAN design
    sketched above; the generator algorithm is given various architectural boosts
    to help it learn how to adjust more large-scale structure—the “stylistic” aspects—of
    the images it generates. (Most of the examples provided in links earlier in this
    chapter are generated using StyleGAN.) Google didn’t reveal much about Assembler’s
    StyleGAN detector other than that it relies on machine learning. Presumably, they
    fed a deep learning algorithm lots of authentic photos and lots of StyleGAN deepfake
    photos and trained it on the supervised classification task of determining which
    photos are which. But we don’t know any of the details, nor do we know how well
    it performs.


    On September 1, 2020, Microsoft announced^([^(42)](#fn42)) a collection of new
    steps it was taking to help combat disinformation. One of these is a new tool
    called *Microsoft Video Authenticator* that provides an estimated probability
    that a user-inputted photo was generated or manipulated by AI (if the user inputs
    a video instead of a photo, then it provides a real-time frame-by-frame probability
    estimate as the video plays). According to Microsoft, “It works by detecting the
    blending boundary of the deepfake and subtle fading or greyscale elements that
    might not be detectable by the human eye.” Unfortunately, once again, we don’t
    know much beyond this. The Microsoft announcement does realistically admit that
    any detection system will make mistakes, and it also points out that AI generation/manipulation
    methods will continue to advance. Any detection system will be rendered ineffective
    and obsolete if it does not keep pace with the technological developments.


    Now, let me turn to text generation. Researchers at Harvard and MIT built a tool^([^(43)](#fn43))
    to estimate the likelihood that a passage of text was written by an AI system
    like GPT. Here’s the basic idea behind the tool. The researchers first use a trained
    deep learning language algorithm to estimate the probability that each word in
    the passage follows the preceding text, and then they color each word based on
    this probability: if the word is among the top ten predictions, then it is colored
    green; if not but it is among the top one hundred, then it is yellow; similarly,
    red is for top one thousand; and all remaining words are colored violet. We know
    that language generation algorithms select words according to their estimated
    probabilities, so the idea is that algorithmically generated text will be largely
    green and yellow, whereas human text is expected to contain a lot more red and
    violet.'
  trans: '

    ### 深度伪造照片生成


    从广义上讲，我们希望向算法输入大量人脸照片，让它从中学习如何自行生成新的人脸。令人惊叹的是，这在如今已成为可能。我们无需明确地教给算法“人脸通常是椭圆形，两侧各有一只耳朵，两只眼睛，中间一个鼻子，鼻子下方一张嘴”等知识，而是依靠深度学习直接从数据中自动提取这种高层理解。


    对于文本生成，我们可以以一种相当直接的方式借助监督式深度学习——通过阅读文本并尝试预测每个后续单词。但对于图像生成，这种方法效果并不理想。虽然 `GPT-3`
    在小范围内生成的文本相当令人信服（每个句子看起来语法正确且与上下文相关），但在更大范围内往往会失去连贯性（出现叙事矛盾，例如故事中的反派和主角可能会突然互换）。这种局限性往往不会被普通读者注意到。但对于合成人脸照片等图像任务而言，大范围的连贯性至关重要：采用类似
    `GPT-3` 的方法很可能会生成一堆肉块、毛发和面部特征，这些局部看起来自然，但整体却构成可怕的非人怪物——眼睛数量不对、耳朵位置错误，诸如此类。


    事实证明，监督式学习可以有效地用于图像生成，但需要以更微妙、更复杂的方式实现，这种方式直到 2014 年才首次被发明。这种深度学习框架被称为*生成对抗网络*（简称
    *GAN*）。其基本思想是让两个自监督深度学习算法相互对抗。第一个算法称为*生成器*，它尝试合成原始人脸——它不需要任何先验知识，完全可以一开始就生成随机像素值；而第二个算法称为*判别器*，它始终接收一组图像，其中一半是真实人脸照片，另一半是生成器合成的假照片。在训练过程中，生成器学习调整其参数，以欺骗判别器，使其认为合成的图像是真实的；但同时，判别器也学习调整其参数，以更好地区分合成图像和真实图像。


    训练过程相当微妙，比传统的监督式学习要复杂得多，因为需要保持两个算法之间的平衡。但在 GAN 存在的七年里，克服这一挑战以及许多其他技术难题的进展迅速且令人惊叹。本章前面提供的链接让你有机会看到最先进的人脸照片生成
    GAN 的输出结果。而且，与深度学习领域几乎所有主题一样，这种快速进展没有放缓的迹象。想到这项技术未来可能具备的能力，既令人兴奋，也令人恐惧。


    现在，完成了这个机器学习速成课程后，我可以转向本章的最后一个主题：我们如何利用人工智能来检测一张照片或一段文本是否由人工智能合成。这是一场迅速升级的技术军备竞赛中的防御方。


    ## 算法检测


    让我从深度伪造照片开始。2020 年 2 月，谷歌内部一个专注于技术与社会交叉领域问题的研究与产品开发部门宣布^(⁴¹)，它正在试点一个名为 *Assembler*
    的工具，旨在“帮助事实核查员和记者识别和分析被篡改的媒体”。其目标并非完全自动化这一过程，而是提供可与传统人类专业知识相结合的“强信号”。在宣布之时，`Assembler`
    正在与少数事实核查和媒体组织进行试验，并且在撰写本书时似乎仍是如此（项目网站是 [`https://projectassembler.org/`](https://projectassembler.org/)）。`Assembler`
    将多个由不同学术研究人员外部开发的工具整合到一个软件包中，以此来检测不同类型的媒体篡改。但谷歌研究人员还加入了一个他们内部开发的新检测器，专门针对最新、最流行的深度伪造照片合成系统。


    这个名为 *StyleGAN* 的深度伪造系统是对上述通用 GAN 设计的改进；生成器算法获得了各种架构上的增强，以帮助它学习如何调整其生成图像的更大尺度结构——即“风格”方面。（本章前面链接中提供的大多数示例都是使用
    `StyleGAN` 生成的。）谷歌没有透露 `Assembler` 的 `StyleGAN` 检测器的太多信息，只提到它依赖于机器学习。据推测，他们向深度学习算法输入了大量真实照片和大量
    `StyleGAN` 深度伪造照片，并训练其执行监督式分类任务，以判断哪些照片是真实的。但我们不知道任何细节，也不知道它的性能如何。


    2020 年 9 月 1 日，微软宣布^(⁴²)了一系列帮助打击虚假信息的新举措。其中之一是一个名为 *Microsoft Video Authenticator*
    的新工具，它可以估算用户输入的照片是由人工智能生成或篡改的概率（如果用户输入的是视频而非照片，它会在视频播放时提供实时的逐帧概率估算）。据微软称，“它的工作原理是检测深度伪造的混合边界以及人眼可能无法察觉的细微褪色或灰度元素。”不幸的是，我们再次对此知之甚少。微软的公告确实现实地承认，任何检测系统都会犯错，并指出人工智能生成/篡改方法将继续进步。任何检测系统如果跟不上技术发展的步伐，都将变得无效并被淘汰。


    现在，让我转向文本生成。哈佛大学和麻省理工学院的研究人员构建了一个工具^(⁴³)，用于估算一段文本由像 GPT 这样的人工智能系统编写的可能性。以下是该工具背后的基本思想。研究人员首先使用一个训练好的深度学习语言算法来估算段落中每个单词出现在前文之后的概率，然后根据这个概率为每个单词着色：如果该单词位于前十名预测中，则将其着色为绿色；如果不是，但位于前一百名中，则着色为黄色；类似地，红色对应前一千名；所有剩余单词则着色为紫色。我们知道语言生成算法是根据其估算的概率来选择单词的，因此其思路是：算法生成的文本将主要是绿色和黄色，而人类撰写的文本预计会包含更多红色和紫色。

    '
- fmt: 'It turns out this system works quite well if the algorithm for making these
    color-determining probability estimates is very similar to the algorithm for text
    generation that the tool is attempting to unmask, but it struggles otherwise.
    Since even the inner workings of `GPT-2` have been made public, this means the
    researchers were able to access the internal probability estimates it relies on
    and thus have a pretty reliable tool for detecting `GPT-2` output. Alas, we are
    not in such a position with `GPT-3`: as I mentioned earlier, `OpenAI` is only
    releasing the inner workings of `GPT-3` to `Microsoft`. Moreover, the neural network
    underlying `GPT-3` is so massive and expensive to train, and not all the data
    it was trained on is publicly available nor are all the technical details involved
    in the training process, so it would be extremely challenging for a third-party
    organization to independently create an open source `GPT-3` clone. Thus, we cannot
    accurately replicate the probability estimates `GPT-3` makes, so we also cannot
    customize this Harvard-MIT color-coding tool to perform well against `GPT-3`.


    Researchers at the University of Washington and the Allen Institute for Artificial
    Intelligence developed a different tool, `Grover`, for detecting AI-generated
    text. Like the Harvard-MIT tool, `Grover` uses the general idea that in order
    to detect AI-generated text, an algorithm must first learn how to write it—but
    beyond this superficial similarity, it takes a rather different approach. Basically,
    `Grover` is a `GAN`: it simultaneously trains one deep learning algorithm to create
    text and one to classify it as synthetic or authentic. The twist is that ordinarily
    when using a `GAN` one throws away the discriminator component after training
    and just uses the generator (because usually one simply wants to generate), whereas
    `Grover` does the opposite—the trained discriminator is the desired component
    because its very job is telling real text from fake. So, after the researchers
    finished training this `GAN`, they created an interface^([^(44)](#fn44)) so that
    people can use it and apply the discriminator to any input text to estimate if
    it is synthetic or authentic.


    The researchers tasked `Grover` with classifying a collection of news articles,
    half of which were synthetic and half were authentic. They found^([^(45)](#fn45))
    an impressive ninety-two percent accuracy when the synthetic articles were written
    by `Grover`’s own deep learning generator, but the rate dropped to seventy percent
    when the synthetic batch was instead written by `GPT-2`. `GPT-3` was not available
    at the time of that experiment, so we don’t know how well `Grover` would perform
    on it, but almost surely there would be a drop from seventy percent—and potentially
    a quite large one. On the other hand, building an updated `Grover` with a larger
    number of parameters and training it on a larger database would surely increase
    its performance. As with the Harvard-MIT color-coding tool, in order for `Grover`
    to remain useful, it will need to be expanded and retrained periodically in order
    to keep pace with the state of the art in deep learning language generation. This
    training is a costly endeavor, but it may well be worthwhile as a public service
    to help in the fight against fake news. Thankfully, in contrast to `OpenAI` with
    `GPT-3`, the Allen Institute is a fully nonprofit organization, and `Grover` is
    open source.


    ## Summary


    Artificial intelligence is making the news. This was true in one sense yesterday,
    and today it is becoming true in another sense.^([^(46)](#fn46)) Whether we want
    it or not, automation is coming to journalism, and none are more poised to take
    advantage of this than the peddlers of fake news.


    Two years ago, deepfake photos of nonexistent people first started being employed
    to cover the tracks of fake personas writing and sharing questionable news articles.
    Now, this is a standard technique in disinformation campaigns reaching all the
    way to Putin’s orbit, and it played a key role in the false Hunter Biden conspiracy
    that Trump and his allies tried to use to swing the 2020 election. These deepfake
    photos are cheap and easy to create, thanks to a recent deep learning architecture
    involving dueling neural networks. Google and Microsoft are both developing AI-powered
    tools for detecting when a photo is a deepfake, but this is a technological arms
    race requiring constant vigilance.


    Deep learning also powers impressive language generation software, such as the
    state-of-the-art `GPT-3`—a massive system for autocompleting text that can convincingly
    extend headlines into full-length articles. Here, minor instances of illicit use
    have been uncovered, but a large-scale weaponized use in a disinformation campaign
    has not yet surfaced. It remains to be seen whether that’s because the developers
    of `GPT-3` have kept access to the product closely guarded, or if it’s simply
    because fake news is so easy and fast to write by hand that the automation provided
    by `GPT-3` doesn’t really change the equation. Only time will tell.


    Meanwhile, similar to the situation with deepfake photos, researchers are developing
    tools for determining when passages of text have been generated by AI. The leading
    attempts here rely on the idea that in order to detect synthetic text, an algorithm
    first needs to learn how to create it. A big challenge is that, unlike its predecessor,
    `GPT-3` is not open source: this makes it hard for researchers to build detection
    algorithms that are on par with `GPT-3` itself. Once again, this is a technological
    arms race—but with the added challenge that training a state-of-the-art language
    generation algorithm costs many millions of dollars.


    Throughout this chapter, the term “deepfake” referred to a synthetic *photo*.
    In the next chapter, we’ll animate these still photos and let them come to life
    by exploring deepfake *movies* and the fascinating role they play in the world
    of fake news.


