- fmt: '### 2015: Redesigned with Deep Learning


    The next big behind-the-scenes development happened in 2015 when Google Brain,
    the artificial intelligence division of YouTube’s parent company Google, came
    onboard to revamp YouTube’s recommendation algorithm in an effort to further increase
    overall watch time on the platform. Google Brain built a new version of the recommendation
    algorithm based on deep learning. Recall from the crash course in Chapter [2](../Text/508514_1_En_2_Chapter.xhtml)
    that in traditional machine learning the algorithm designers need to carefully
    choose a small number of predictors to rely on, whereas with deep learning you
    can toss a much larger number of predictors at the algorithm and it will automatically
    learn from the training data how to transform these into a smaller number of useful
    hierarchically structured predictors. In doing so, deep learning is able to extract
    higher-level conceptual patterns and meaning in the data.


    Jim McFadden, the technical lead for YouTube recommendations, commented^([^(103)](#fn103))
    on this shift to deep learning: “Whereas before, if I watch this video from a
    comedian, our recommendations were pretty good at saying, here’s another one just
    like it. But the Google Brain model figures out other comedians who are similar
    but not exactly the same—even more adjacent relationships.” And it worked: aggregate
    watch time on YouTube increased twentyfold in the three years that followed Google
    Brain’s involvement. However, one significant issue with deep learning is that
    it trades transparency for performance, and the YouTube recommendation algorithm
    is no exception. As McFadden himself put it: “We don’t have to think as much.
    We’ll just give it some raw data and let it figure it out.”


    The Google Brain deep learning algorithm starts by whittling down the vast ocean
    of videos on YouTube to a small pool of a few hundred videos the user might like
    based on the user’s watched video history, keyword search history, and demographics.
    The demographic data include the geographic region the user is logged in from,
    the type of device they are using, and the user’s age and gender if they have
    provided that information. The next step is to rank this small pool of videos
    from most highly recommended to least highly recommended, so that the algorithm
    can offer the videos it deems most likely to appeal to the user at the given moment.
    This ranking process relies on the user-specific predictors mentioned above but
    also a few hundred video-specific predictors, including details on the user’s
    previous interactions with the channel the video is from—such as how many videos
    the user has watched from this channel and when was the last time the user watched
    a video from this channel. To prevent the user from being shown the same list
    of recommended videos every time, the algorithm demotes the rank of a video whenever
    it is offered to the user and the user does not watch it.


    One of the main reasons for breaking the process into two steps—whittling then
    ranking—is that the first step can handle a huge volume of videos but at the expense
    of having a smaller number of predictors, whereas the second step can incorporate
    a larger number of predictors because it is focused on a small number of videos.
    Both steps rely on deep learning methods to extract meaningful information from
    this massive collection of data signals. The full recommendation system is trained
    on hundreds of billions of examples and results in a neural network with about
    one billion parameters (you might recall from Chapter [2](../Text/508514_1_En_2_Chapter.xhtml)
    that this is comparable in size to the neural network used in GPT-2). This is
    the basic framework of YouTube’s Google Brain deep learning recommendation algorithm
    from 2015.^([^(104)](#fn104))


    ### 2018: Deep Reinforcement Learning


    The recommendation algorithm must strike a difficult balance between popularity
    and freshness. If it only recommends videos with large watch times (or other indicators
    of popularity such as views, upvotes, comments, etc.), then it will miss out on
    new content, on fresh videos that haven’t yet gone viral but which might have
    the potential to do so. The recommendation algorithm must also strike a delicate
    balance between familiarity and novelty in the videos it selects for each individual
    user. It wants to recommend similar videos to the ones each user has already watched,
    since that’s the most accurate guide to that user’s personal tastes and interests,
    but if the videos are *too* similar to the ones the user has already seen, then
    the user might become bored and disinterested. The next big innovation brought
    in by the Google Brain team, in 2018, helps address these countervailing factors.


    *Reinforcement learning* is the part of machine learning that is used to create
    computer programs that can beat human players at board games like chess and computer
    games like *StarCraft*; it has also been used to teach robots how to walk and
    computerized investors how to play the market. It allows the computer to explore
    and experiment and to learn as it does so. Put simply, supervised learning is
    about developing predictions, whereas reinforcement learning is about developing
    strategies. Reinforcement learning has been around for a few decades, but it has
    been powerfully revitalized in the past few years by combining it with deep learning
    which helps it to explore greater landscapes and to learn more deeply while doing
    so.


    The basic idea with reinforcement learning is to create a reward function that
    the algorithm seeks to maximize. In computer games, the reward function is usually
    the number of points earned, or the number of levels completed, or the amount
    of time elapsed before running out of lives, or the total distance traveled, or
    other quantities like these. In games like chess, the reward is zero throughout
    the game and one when the player wins and negative one when the player loses.
    For investing, the reward is, unsurprisingly, return on investment. A crucial
    aspect of reinforcement learning is that the actions the algorithm makes are based
    on estimates of the future value of the reward function, not just the current
    value. For instance, in chess, most moves don’t immediately impact the reward
    function at all, but with enough experience the algorithm can estimate which moves
    take it closer to victory. Future rewards are discounted compared to present ones,
    so a move that sets up a likely checkmate in three moves is more valuable than
    a move that sets up a likely checkmate in ten moves, but both are more valuable
    than a move that leads to certain defeat. It is this notion of discounted future
    reward that allows reinforcement learning algorithms to develop impressive long-term
    strategies.


    But what does this have to do with YouTube? Well, in 2018, the Google Brain team
    brought reinforcement learning to the recommendation algorithm. Here, the “game”
    the computer plays is to keep each user watching videos as long as possible, so
    the reward function is something like the total amount of watch time each user
    spends in a sequence of up next recommendations before leaving the site.'
