  trans: '

    # 量化假新闻的传播


    在本节中，我将审视几项关于假新闻复杂传播动态的学术研究。Facebook 的数据公开程度较低，因此这些研究大多聚焦于 Twitter。尽管如此，有一项研究^(²⁹⁴)
    调查了 2015 年 1 月至 2018 年 7 月期间 Facebook 和 Twitter 上的五百个假新闻网站及一万条假新闻故事，发现用户与假新闻的互动在两个平台上均稳步上升，直至
    2016 年底；此后，Facebook 上的互动急剧下降，而 Twitter 上则继续攀升。但我恳请读者在解读这一特定发现时保持谨慎：这仅是一项规模相对较小的研究，Facebook
    的假新闻问题很大程度上发生在难以追踪的私密群组中，而且自 2018 年以来发生了很多变化——尤其是 QAnon 运动的兴起以及新冠疫情错误信息的泛滥。例如，Facebook
    内部的数据科学家在 2020 年大选前的几个月发现^(²⁹⁵)，在面向美国公民事务的最活跃的一百个群组中，有七十个因仇恨言论、错误信息、霸凌和骚扰等问题被反复标记。其中一个顶级群组声称由唐纳德·特朗普的粉丝运营，但实际上是由“受经济利益驱动的阿尔巴尼亚人”运营，每天产生数百万次关于假新闻和其他有害内容的浏览量。


    ## Twitter 与 2016 年大选


    2019 年 1 月，一篇研究论文发表^(²⁹⁶)，该论文深入挖掘了 2016 年大选期间 Twitter 上假新闻的动态数据。这是我们讨论假新闻如何在社交媒体上传播的合适起点。研究人员收集了大选前五个月内他们能找到的所有关于唐纳德·特朗普和希拉里·克林顿的推文，最终数量高达
    1100 万用户发送的 1.7 亿条推文。其中，超过 200 万用户发送的 3000 万条推文包含指向新闻文章或新闻机构的链接。研究人员利用传播学者对新闻媒体的分类——即那些发布虚假或未经证实的阴谋论新闻的媒体，与那些更传统、基于事实的媒体——将这
    3000 万条推文分别标记为事实性或虚假性。这里需要重点指出的是，他们并未试图判断 Twitter 上分享的每一条新闻故事的准确性（这极其困难），而仅评估每条推文中链接的新闻媒体通常是发布事实性新闻还是虚假新闻。研究人员还为每个新闻媒体记录了一个政治倾向和极端程度评分，该评分同样来自传播学者的共识。


    他们发现，在包含新闻链接的 3000 万条推文中，10% 指向假新闻机构，另有 15% 指向极端偏颇的新闻。近五分之一的假新闻链接来自非官方 Twitter
    应用（而在来自非官方 Twitter 应用的推文中，链接到假新闻的可能性是链接到传统新闻的四倍）；虽然非官方应用也有一些合法或半合法的用途，但这被解读为在大选前夕假新闻传播中存在大量机器人活动的证据。通过分析转发，研究人员得以研究信息的网络流动并识别关键影响者。他们发现，传统新闻的主要传播者是拥有经过验证的
    Twitter 账户的记者和公众人物，而大量虚假和极端偏颇新闻的主要传播者则是未知用户以及随后被删除的账户。假新闻的推文/转发网络比传统新闻的网络连接更紧密、更同质化；假新闻网络与右翼新闻推文网络的交织程度也高于与中间派和左翼新闻网络的交织程度。


    或许最值得注意的是，研究人员发现了克林顿支持者和特朗普支持者在与 Twitter 新闻互动方面的两个关键差异。首先，对于中间派和左倾新闻，存在一种自上而下的效应：主要传播者——正如你所记得的，是记者和公众人物——强烈影响了克林顿支持者的
    Twitter 活动；而对于特朗普支持者，影响方向则相反：以一种自下而上的方式，是特朗普支持者的活动影响了假新闻的主要传播者，这意味着假新闻的主要传播者主要是大众中流传故事的渠道和放大器。其次，研究发现克林顿支持者主要与中间派和左翼新闻来源互动，而特朗普支持者则更倾向于与各种新闻来源互动——从右翼到左翼，从事实性到虚假性。

    '
- fmt: '另一组研究人员更直接地研究了[^(297)](#fn297)2016年大选前几周Twitter上机器人活动的范围。通过使用政治话题标签和关键词搜索，他们在9月16日至10月21日期间收集了近300万用户的2000万条推文。然后，他们应用机器学习算法将这些推文分类为人类发布和机器人发布，该算法报告称，近20%的推文可能来自机器人。但请记住，确定哪些社交媒体活动是由机器人驱动的已被证明具有挑战性，任何此类尝试都必然存在误差范围。本研究中使用的算法是一种监督学习方法，依赖于一千个预测因子，“涵盖内容和网络结构、时间活动、用户档案数据和情感分析”，这些预测因子基于已知的Twitter机器人和人类活动进行训练。在之前的测试中，它的准确率达到了95%，但无法保证随着新的机器人算法、技巧和行为的发展，这种高准确率能够持续保持。


    在训练完任何监督学习算法后，都可以对其进行检查，以确定哪些预测因子最具影响力（其技术术语是*特征重要性*）。对于本研究中使用的特定机器人检测算法，结果表明机器人账户的最强指标是：


    *   用户资料看起来像Twitter默认设置，而非使用个性化信息进行定制；用户名在创建时具有随机性迹象；并且账户是最近创建的。

    *   缺少地理定位元数据（人类在通过移动设备发推文时会记录此信息）。

    *   各种活动统计数据：机器人经常在短时间内发布大量推文，这是人类不可能或几乎不可能完成的；不出所料，它们的转发与原创推文的比例往往远高于人类，其关注数与粉丝数的比例也是如此。


    当将算法标记为机器人活动的400万条推文与标记为人类活动的1600万条推文进行比较时，研究人员发现了一些有趣但某种程度上可预见的对比。首先，人类推文的数量往往对政治事件做出反应——例如，在总统辩论结束后立即有大量推文——而机器人的推文数量与政治事件的关联性较弱。其次，虽然机器人整体上生成的回复数量低于人类用户，但它们的推文被转发的比率与人类相同。另一个研究团队研究了[^(298)](#fn298)2016年大选前六个月开始的十个月期间Twitter上的机器人。他们发现，在错误信息传播的早期阶段，机器人尤其活跃且成功——经常在虚假新闻故事发布后的几秒钟内就进行分享——通过这种方式，它们会传播虚假新闻，直到这些新闻在Twitter上通过人类有机地传播开来。他们还发现，机器人经常以高频率的回复和提及来针对有影响力的人类用户，这往往会最终吸引人类用户参与。


    另一个研究团队，这次是牛津大学的团队，发表了一篇论文[^(299)](#fn299)，研究了2016年大选前后十天期间美国境内Twitter上低质量政治信息的地理分布。在这项研究中，如果新闻故事链接指向的新闻机构属于某些俄罗斯、维基解密和垃圾/虚假新闻网站列表，则该链接被视为低质量；推文的位置信息则从用户账户资料中获取。并非所有用户都能获取位置信息，即使在能获取的用户中，资料中列出的位置也不一定准确；但总体而言，这仍然能给出一个合理的地理分布概念。研究人员发现，按每个州的推文数量加权后，选举中有影响力的摇摆州平均看到的低质量新闻链接推文比例高于非竞争州。这里的差距相对较小，但由于选举的激烈程度和选举人团的结构，微小的差距可能产生巨大的影响。该研究的一位作者表示[^(300)](#fn300)：“我们知道俄罗斯人确实在社交媒体上进行了投资。摇摆州正是你想要针对的目标。”


    迄今为止讨论的研究提供了关于2016年大选期间Twitter上虚假新闻传播和网络结构的信息性视角，但缺少的是这如何转化为注册选民在Twitter上的个人层面体验和活动。幸运的是，2019年在顶级学术期刊《科学》上发表的一篇论文[^(301)](#fn301)试图填补这一关键缺失的环节。研究人员将公共选民登记记录样本与16000个Twitter账户关联起来，并收集了这些用户（我们称他们为“选民”）在2016年8月至12月期间的推文。他们收集了所有关注这些选民以及被这些选民关注的用户列表，并通过抽样后者发布的推文（称为“曝光”，因为这些是选民在其信息流中可能看到的推文），研究人员能够估算出选民信息流的构成。他们将调查范围限制在包含Twitter外部政治内容链接的曝光上，并利用这些链接对每位选民的左右意识形态进行离散估计。以下是他们的发现。'
  raw: 'Another pair of researchers looked more directly^([^(297)](#fn297)) into the
    scope of bot activity on Twitter in the weeks leading up to the 2016 election.
    By using political hashtag and keyword searches, they collected twenty million
    tweets from nearly three million users between September 16 and October 21\. They
    then applied a machine learning algorithm to classify these tweets as human versus
    bot, and the algorithm reported that nearly twenty percent of the tweets were
    likely from bots. Keep in mind, however, that determining what social media activity
    is bot-driven has proven challenging, and any attempt to do so will surely have
    a margin of error. The algorithm used in this study was a supervised learning
    method relying on one thousand predictors “spanning content and network structure,
    temporal activity, user profile data, and sentiment analysis” that was trained
    on known bot and human activity on Twitter. In previous tests, it scored an accuracy
    rate of ninety-five percent, but there’s no guarantee that this high accuracy
    rate would be sustained as new bot algorithms, tricks, and behaviors develop.


    After any supervised learning algorithm has been trained, it is possible to inspect
    it to determine which predictors are most influential (the technical term for
    this is *feature importance*). For the particular bot detection algorithm used
    in this study, it turned out the strongest indicators of bot accounts were:


    *   That the user profile looked like the Twitter default, rather than being customized
    with individual information; the username had signs of randomness in its creation;
    and the account was created recently.


    *   The absence of geolocation metadata (which for humans is recorded when tweeting
    from mobile devices).


    *   Various activity statistics: Bots often post large numbers of tweets in short
    spans of time that would be impossible or nearly impossible for humans to accomplish,
    and unsurprisingly their ratio of retweets to original tweets tends to be much
    higher than for humans and so is their ratio of accounts followed to followers.


    When comparing the four million tweets that their algorithm labeled as bot activity
    with the sixteen million tweets labeled as human activity, the researchers found
    a couple intriguing although somewhat predictable contrasts. First, the volume
    of human tweets tended to respond to political events—for instance, there were
    large numbers of tweets immediately following the presidential debates—whereas
    the volume for bots was less closely tied to political events. Second, while bots
    generated replies at a lower level than human users overall, they got retweeted
    at the same rate as humans. A different research team studied^([^(298)](#fn298))
    bots on Twitter during a ten-month period beginning six months before the 2016
    election. They found that bots were particularly active and successful in the
    very early stages of virality for misinformation—often sharing fake news stories
    within seconds of them being published—and in this way would broadcast fake news
    until it caught on and spread organically through humans on Twitter. They also
    found that bots frequently targeted influential human users with high volumes
    of replies and mentions that tended to eventually draw in the human users.


    Yet another team of researchers, this one based at Oxford University, produced
    a paper^([^(299)](#fn299)) that looked at the geographic distribution in the United
    States of low-quality political information on Twitter in a ten-day period around
    the 2016 election. In this study, a link to a news story was deemed low quality
    if the news organization was among a list of certain Russian, WikiLeaks, and junk/fake
    news sites, and the location of a tweet was obtained from information on the user’s
    account profile. The location was not available for all users, and even among
    the users for which it was available, the location listed in a profile is not
    necessarily accurate; but in the aggregate, this still gives a reasonable sense
    of geographic distribution. The researchers found that, when weighted by the number
    of tweets coming from each state, the influential swing states in the election
    on average saw a higher fraction of tweets with low-quality news links than did
    the uncontested states. The margin here was relatively small, but this was an
    election where small margins could have had large impacts due to tightness of
    the race and the structure of the electoral college. One of the authors of the
    study said^([^(300)](#fn300)) that “We know the Russians have literally invested
    in social media. Swing states would be the ones you would want to target.”


    The studies discussed so far provide an informative view of the propagation and
    network structure of fake news on Twitter during the 2016 election, but what’s
    missing is how this translates to the individual-level experiences and activities
    of registered voters on Twitter. Fortunately, a paper^([^(301)](#fn301)) was published
    in 2019 in the top academic journal *Science* that attempts to fill in this crucial
    missing piece of the story. The researchers linked a sample of public voter registration
    records to sixteen thousand Twitter accounts and collected the tweets from these
    users—let’s call them the “voters”—between August and December 2016\. They collected
    lists of all the users following and followed by the voters, and by sampling the
    tweets posted by the latter—called “exposures” since these are the tweets the
    voters were potentially exposed to in their newsfeeds—the researchers were able
    to estimate the composition of the voters’ newsfeeds. They limited their investigation
    to exposures containing links to political content outside of Twitter, and they
    used these links to provide a discrete estimate of the left-right ideology of
    each voter. Here’s what they found.'
  trans: '

    另一组研究人员更直接地研究了²⁹⁷2016 年大选前几周 Twitter 上机器人活动的范围。通过使用政治话题标签和关键词搜索，他们在 9 月 16 日至
    10 月 21 日期间收集了近 300 万用户的 2000 万条推文。然后，他们应用机器学习算法将这些推文分类为人类发布和机器人发布，该算法报告称，近 20%的推文可能来自机器人。但请记住，确定哪些社交媒体活动是由机器人驱动的已被证明具有挑战性，任何此类尝试都必然存在误差范围。本研究中使用的算法是一种监督学习方法，依赖于一千个预测因子，“涵盖内容和网络结构、时间活动、用户档案数据和情感分析”，这些预测因子基于已知的
    Twitter 机器人和人类活动进行训练。在之前的测试中，它的准确率达到了 95%，但无法保证随着新的机器人算法、技巧和行为的发展，这种高准确率能够持续保持。


    在训练完任何监督学习算法后，都可以对其进行检查，以确定哪些预测因子最具影响力（其技术术语是*特征重要性*）。对于本研究中使用的特定机器人检测算法，结果表明机器人账户的最强指标是：


    *   用户资料看起来像 Twitter 默认设置，而非使用个性化信息进行定制；用户名在创建时具有随机性迹象；并且账户是最近创建的。

    *   缺少地理定位元数据（人类在通过移动设备发推文时会记录此信息）。

    *   各种活动统计数据：机器人经常在短时间内发布大量推文，这是人类不可能或几乎不可能完成的；不出所料，它们的转发与原创推文的比例往往远高于人类，其关注数与粉丝数的比例也是如此。


