- fmt: '# 排版后的文本


    《*Epoch Times*》的 Facebook 策略始于在越南的一项实验。该组织的当地分部创建了一个 Facebook 页面网络，其中充斥着娱乐性的病毒视频以及支持特朗普的内容——其中许多内容直接复制自其他网站——然后他们使用机器人（bots）人为地夸大这些内容的点赞和分享量，这直接违反了
    Facebook 关于禁止虚假账户的政策。这种人为的受欢迎程度随后被 Facebook 的算法在不知情的情况下捕捉到，并转化为真实的受欢迎程度：这些页面的快速增长导致它们被推荐给广泛的用户群，而轻松愉快的视频与极右翼内容（其中许多是耸人听闻的假新闻）的结合，找到了一个热切等待的受众群体。《*New
    York Times*》获得的内部邮件显示，《*Epoch Times*》的领导层称赞这是前进的方向，很快，越南模式被输出到该组织在全球的其他业务中。这种“Facebook
    策略”是成功的：通过像在越南那样孵化数十个 Facebook 页面，《*Epoch Times*》如今在其社交媒体上的粉丝总数已达数千万。而特朗普的联系持续发挥作用，并达到了新的高度：在特朗普担任总统期间，他及其家人将《*Epoch
    Times*》的文章分享给了大量受众，甚至特朗普政府的成员也曾接受该报记者的采访。


    简而言之，《*Epoch Times*》战略性地利用 Facebook 的推荐算法，将自己打造成一个庞大的媒体帝国。它部分通过被禁止的方法——使用机器人制造虚假互动——以及部分通过被允许但可以说非常不道德且危险的方法来实现这一点：兜售极右翼假新闻，通常打着平衡、真实新闻的幌子，以建立受欢迎的追随者群体。话虽如此，重要的是要认识到，当今社交媒体平台引发的社会问题并非全部由其机器学习排名/推荐算法造成，然而公众对社交媒体的普遍谴责往往聚焦于这些算法，却没有提供多少证据证明它们确实是问题的根源。《*New
    York Times*》对《*Epoch Times*》的调查依赖于内部邮件以及与现任和前任员工的讨论，详细描述了该组织围绕 Facebook 算法精心策划的策略。我们不知道这些算法是否真的产生了所描述的影响，但至少我们知道《*Epoch
    Times*》的企业领导层相信它们产生了影响，并且他们的策略奏效了。


    2021 年 1 月《*New York Times*》的一篇文章^([^(276)](#fn276))声称，“Facebook 的算法诱使许多人在平台上分享更极端的观点——通过点赞和分享来奖励他们发布关于选举欺诈阴谋论、否认新冠疫情和反疫苗言论等主题的帖子。”为了支持这一论断，该文章介绍了几位发布此类内容的个人，并称“浏览他们的信息流可以一窥
    Facebook 如何奖励夸大和谎言。”这些特定的个人都遵循了类似的路径：他们多年来试图通过发布非政治内容来积累社交媒体粉丝，但徒劳无功；最终他们尝试发布支持特朗普的内容和极右翼虚假信息，并发现这导致他们的粉丝数量急剧增加。但在我看来，文章中的细节并不能充分证明文章关于算法责任的强烈叙事。


    文章中介绍的第一个个人据说每天在特朗普的 Facebook 帖子下写评论，以吸引人们对其个人 Facebook 页面的兴趣。我看不出这如何能归咎于算法失控——这只是一个用户去到一个热门地点，寻找志同道合的人，以便从中分流一些关注度。文章接着解释说，“大多数人意识到，与在群组页面上获得的点赞、分享和评论相比，同样的帖子在个人页面上只能获得微不足道的关注。志同道合者的
    Facebook 群组是谎言开始滚雪球、积聚势头、获得支持并成为传说的起点。”这是对 Facebook 作为一个允许观点相似的人聚集在一起的平台的批评，而不是对推荐算法的批评。虽然推荐算法无疑在提升
    Facebook 群组的受欢迎程度方面发挥了作用，但根据文章中提供的证据，文章对算法的抨击似乎相当缺乏依据。事实上，对于一篇关于人们为了受欢迎而宣扬观点的文章来说，这颇具讽刺意味：在我看来，这更像是作者们跳上了反算法的潮流，因为他们知道这是读者想看到的。


    但是，仅仅因为许多主流新闻文章没有提供证据来支持其关于算法责任的叙事，并不意味着证据不存在。证据确实存在，而且通常相当确凿，正如你将在本章中看到的那样。例如，最近一项关于
    2020 年大选的研究^([^(277)](#fn277))发现，极右翼内容产生的互动比任何其他党派群体都多，而极右翼虚假信息产生的互动比极右翼事实内容高出
    65%。这意味着，任何以互动为优化指标的推荐/排名算法，都会优先推送极右翼虚假信息。而且，Facebook 和大多数其他社交媒体平台都围绕最大化互动这一目标而构建，并将这一优先级融入其所有算法中，这已不是什么秘密。


    在本章后面，我将详细介绍 Facebook 在其平台上打击虚假信息传播所使用的算法方法——但首先，在继续铺垫背景的同时，通过退一步审视 Facebook 上假新闻的更大背景，并聚焦于几个说明所涉问题的具体例子，来预览这一主题会有所帮助。'
  raw: 'The *Epoch Times*’ Facebook strategy began as an experiment in Vietnam, where
    the organization’s local division created a network of Facebook pages filled with
    entertaining viral videos as well as pro-Trump content—much of it directly copied
    from other sites—then they used bots to artificially inflate the likes and shares
    on this material, in direct violation of Facebook’s policies against inauthentic
    accounts. This artificial popularity was then unknowingly picked up by Facebook’s
    algorithms and transformed into actual popularity: the rapid growth in these pages
    led them to be recommended to a wide user base, and the combination of lighthearted
    videos and far-right content (much of it sensational fake news) found an enthusiastic
    audience awaiting. Internal emails obtained by the *New York Times* showed that
    the *Epoch Times*’ leadership praised this as the way forward, and soon the Vietnam
    model was exported internationally to the rest of the organization’s operations.
    This “Facebook strategy” was successful: by incubating dozens of Facebook pages
    the way it had in Vietnam, the *Epoch Times* has now grown to have tens of millions
    of followers across its social media presence. And the Trump connection continued
    to work and reached new heights: articles by the *Epoch Times* were shared to
    massive audiences by Trump and members of his family during his presidency, and
    the *Epoch Times* even had members of the Trump administration sit for interviews
    with its reporters.


    In short, the *Epoch Times* strategically used Facebook’s recommendation algorithms
    to build itself into a massive media empire. It did this in part through prohibited
    methods—using bots to generate artificial engagement—and in part through allowed
    but arguably very unethical and dangerous methods: peddling far-right fake news,
    often in the guise of balanced authentic journalism, in order to build a popular
    following. That said, it is important to recognize that not all of the societal
    problems frequently discussed today with social media platforms are caused by
    their machine learning ranking/recommendation algorithms, and yet the popular
    vilification of social media often focuses on these algorithms without providing
    much evidence that they are indeed the root of the problem. The *New York Times*
    investigation into the *Epoch Times* relied on internal emails and discussions
    with current and former employees to detail the organization’s deliberate approach
    centered on Facebook’s algorithms. We don’t know if the algorithms really had
    the impact ascribed to them there, but at least we know that the corporate leaders
    of the *Epoch Times* believed they did, and that their strategy worked.


    A January 2021 article^([^(276)](#fn276)) in the *New York Times* claims that
    “Facebook’s algorithms have coaxed many people into sharing more extreme views
    on the platform—rewarding them with likes and shares for posts on subjects like
    election fraud conspiracies, Covid-19 denialism and anti-vaccination rhetoric.”
    To back up this assertion, the article profiled several individuals who have been
    posting this kind of content, and the article says that “a journey through their
    feeds offers a glimpse of how Facebook rewards exaggerations and lies.” These
    particular individuals all followed a similar path: they tried in vain for years
    to amass social media followings by posting nonpolitical content; then eventually
    they tried posting pro-Trump content and far-right disinformation and found this
    yielded a sharp increase in their number of followers. But the details in the
    article, in my opinion, don’t adequately justify the article’s strong narrative
    of algorithmic blame.


    The first individual profiled in the article is said to have daily written comments
    on Trump’s Facebook posts in order to generate interest in the individual’s own
    Facebook page. I fail to see how this is a matter of an algorithm gone awry—it’s
    just a user going to a popular location to find people with sympathetic views
    where he can syphon off some of the attention. The article goes on to explain
    that “Most realized that the same post on a personal page generated only scant
    attention compared with the likes, shares and comments it could get on a group
    page. Facebook groups for like-minded people are where lies begin to snowball,
    building momentum, gaining backers and becoming lore.” This is a critique of Facebook
    as a platform for allowing people with similar views to come together, not a critique
    of recommendation algorithms. While recommendation algorithms certainly play a
    role in augmenting the popularity of Facebook groups, the article’s inveighing
    against algorithms seems rather unsubstantiated based on the evidence presented
    in the article. In fact, somewhat ironically for an article about people espousing
    views for the sake of popularity, this strikes me as the authors jumping on the
    anti-algorithm bandwagon because they know that’s what readers want to see.


    But just because many mainstream news articles do not provide the evidence to
    support their narrative of algorithmic culpability does not mean the evidence
    doesn’t exist. The evidence does exist and is generally quite damning, as you’ll
    see in this chapter. For instance, a recent study^([^(277)](#fn277)) of the 2020
    election found that far-right content generated more engagement than any other
    partisan group, and far-right misinformation generated sixty-five percent more
    engagement than far-right factual content. This means that any recommendation/ranking
    algorithm with engagement as the metric it aims to maximize will prioritize far-right
    misinformation above all else. And it is no secret that Facebook and most other
    social media platforms are built around the goal of maximizing engagement, and
    they bake this priority into all of their algorithms.


    Later in this chapter, I’ll detail the algorithmic approaches Facebook has used
    in the battle against misinformation spreading on its platform—but first, while
    still setting the stage here, it helps to preview the topic by both stepping back
    to see the larger context of fake news on Facebook and also zooming in on a few
    concrete examples that illustrate the issues involved.'
