    # 7. Avarice of Advertising


    How Algorithmic Ad Distribution Funds Fake News and Reinforces Racism


    > *One of the incentives for a good portion of fake news is money.*

    >

    > —Fil Menczer, Professor of Informatics, Indiana University


    When we think of Google supporting the fake news industry, the first thing that
    comes to mind is how, as described in the previous chapter, it serves up an audience
    with its various search products. However, there is an entirely separate way—less
    obvious but extremely influential—that Google supports the fake news industry:
    financially through ad revenue. The first half of this chapter focuses on the
    mechanics and scale of Google’s algorithmic ad distribution system, the extent
    to which it funds fake news organizations, and the reluctant steps Google has
    taken over the years to curtail this dangerous flow of funds.


    The second half of the chapter turns attention to Facebook. Here, the issue is
    not that the company is funding fake news, the issue is that Facebook profits
    from fake news in the form of political advertisements and in the process exposes
    a massive audience to fake news. The chapter also takes a deep dive into Facebook’s
    algorithmically powered ad distribution system and details multiple dimensions
    of racism and discrimination that the system engages in. Here, too, the sequence
    of reluctant steps the company has taken to mitigate these problems is discussed.'
