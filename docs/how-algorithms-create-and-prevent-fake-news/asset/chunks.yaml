  trans: '

    ### Facebook 的问题与反应


    《*华尔街日报*》报道^(²⁷⁸)，从 2021 年 1 月 6 日（国会大厦暴动当天）上午到下午，Facebook 内部数据科学家团队注意到，平台上用户报告的暴力内容增加了十倍；用户关于假新闻的举报激增至每小时四万条，是此前高峰期的四倍。Facebook
    领导层担心出现危险的反馈循环：网上的煽动性内容激发更多现实中的暴力行为，进而又在社交媒体上引发更多关注，如此循环往复。我们都知道，Facebook 在数小时内做出回应，删除了特朗普总统的帖子，并宣布无限期暂停其账号。但
    Facebook 还私下将美国列为政治暴力的“临时高风险地区”，这触发了“限制平台上潜在危险言论的紧急措施”，不过具体措施并未披露。Facebook 试图推卸
    1 月 6 日事件的责任，其首席运营官谢丽尔·桑德伯格厚颜无耻地表示：“这些事件主要是在那些没有我们阻止仇恨的能力、没有我们的标准、也没有我们透明度的平台上组织的。”


    国会大厦暴动后的几天里，据报道^(²⁷⁹)，Facebook 在“爱国者”和民兵主题的群组中展示武器配件和防弹衣广告，同时夹杂着支持特朗普的虚假信息，声称选举被操纵和窃取。两天后，三位美国参议员联名致信
    Facebook 创始人兼 CEO 马克·扎克伯格，敦促他立即采取行动停止这些广告，称其“旨在武装白人至上主义者、新纳粹分子和其他国内极端组织”。次日，Facebook
    妥协并宣布立即暂停所有此类广告一周，只允许在即将到来的就职典礼后恢复。但宣布后的第二天，人们发现许多危险广告并未被撤下。几周后，Facebook 开始实验性地减少部分用户看到的政治内容^(²⁸⁰)，试图“降低热度，阻止分裂性对话和社群”，并借助一个经过训练可识别政治内容的机器学习算法。


    时间闪回到 2016 年 11 月 19 日，唐纳德·特朗普出人意料地赢得大选后不到两周。马克·扎克伯格在他的 Facebook 账号上发布了一条消息^(²⁸¹)，开头写道：“很多人问我们正在如何处理虚假信息，所以我想更新一下情况。”在表示“我们知道人们想要准确的信息”之后，他接着承认“这些问题在技术上和哲学上都很复杂”，并称
    Facebook 正在采取间接方法：“我们不想自己充当真理的仲裁者，而是依靠我们的社区和值得信赖的第三方。”他列举了几个正在进行的打击虚假信息的项目，第一个也是“最重要的”是加强检测：“这意味着更好的技术系统，能在人们自己标记虚假内容之前就检测到它们。”扎克伯格在这里暗示，在所有限制其平台上虚假信息传播的方法中，首要的是开发预测性的机器学习算法。


    这里有一个值得注意的微妙之处：他设想的并非将帖子分类为真或假的监督学习任务，而是一种认识论上稍弱一些的分类——将帖子分为可能被用户标记的和不太可能被标记的。这种细微差别很重要：一个私密群组中的帖子是否会被标记为误导性信息，很大程度上取决于该群组的主题。无论如何，这里的主要结论是，在
    2016 年大选之后，扎克伯格主张采用技术手段——特别是机器学习——来管理他的平台。在此前后多次公开声明中，扎克伯格一直秉持这一理念：在应对有害虚假信息传播等棘手社会问题时，人工智能将成为公司的万能药。但从那次总统大选到下一次大选之间发生了很多事情，本章的主要目标之一就是讨论
    Facebook 实际尝试了哪些算法方法，它们的效果如何，以及还有哪些其他算法方法可能可行。


    Facebook 不断调整其平台——尤其是影响巨大的信息流算法，该算法决定我们所有人看到哪些帖子以及它们的排序——通常通过对照实验进行，其中随机选择的用户组使用修改后的平台，而所有其他用户作为对照组。这是一种受
    20 世纪彻底改变医学研究的随机对照试验（对照组服用安慰剂）启发的产品开发科学方法；它已席卷硅谷，被称为*A/B 测试*，而科技公司，尤其是科技巨头，能够快速且低成本地获取海量数据，使这种测试成为可能。


    就像医学科学一样，并非所有实验性治疗都能成功。特朗普 2016 年大选获胜后不久，Facebook 尝试了一种相当简单的算法方法来减少假新闻，该方法既不依赖机器学习，也不依赖专业人工审核员。其思路是：当一篇分享的文章是假新闻时，通常精明的读者会识别出来，并发表评论指出该文章是假的，有时甚至会解释原因并提供证据支持。但这些有用的评论会被其他评论的洪流淹没，因此
    Facebook 的实验就是自动将任何包含“fake”一词的评论置顶到评论区顶部。这似乎是一种相当直接的方式，可以帮助读者了解潜在的假新闻。


    这个实验的结果如何？在实施这种评论置顶方法的用户组中，大多数人感到愤怒、困惑，更难分辨真假，并且对 Facebook 遏制虚假信息传播的能力信心下降。为什么？因为突然之间，这些用户在几乎所有关于政治以及经济、气候变化等政治化话题的文章（来自最权威的新闻机构，如*BBC
    新闻*、*纽约时报*、*经济学人*等）下首先看到的，就是宣称该报道是假的评论。这种方法非但没有帮助人们识别真正的假新闻，反而让真实新闻看起来像假的，让读者陷入一个什么都不信、因而什么都信的世界。自由公关顾问珍·罗伯茨对此总结得很到位，她说^(²⁸²)“质疑每一条报道的真实性是荒谬的”，因为这“模糊了真实与虚假之间的界限”，并将
    Facebook 的信息流变成了“某种可怕的奥威尔式双重思想实验”。简而言之，这是一次 A/B 测试，实验结束后，Facebook 决定废弃这一修改，回到原来的状态——尽管原来的状态也并不完美。

    '
- fmt: '复杂算法在Facebook虚假新闻传播中扮演着重要角色，这不仅体现在信息流内容的排序、推荐加入的群组和关注的页面（本章主要议题），以及政治广告（上一章议题）中，还体现在Facebook的搜索和自动补全功能中——这些问题与第[6](../Text/508514_1_En_6_Chapter.xhtml)章描述的Google问题类似。2019年2月《卫报》的一份报告^([^(283)](#fn283))发现，当登录一个没有好友或其他活动的新用户账户时，在Facebook搜索栏中输入`"vaccine"`，自动补全建议会显示诸如`"vaccine
    re-education"`、`"vaccine truth movement"`和`"vaccine resistance movement"`等内容，将用户推向反疫苗错误信息的世界。即使用户抵制这些自动补全的诱惑，仅搜索`"vaccination"`，排名前十二的Facebook群组也全是反疫苗组织，而排名前十二的Facebook页面中有八个是充斥着错误信息的反疫苗页面。几个月前，Facebook曾推出一项政策，删除旨在煽动“暴力或身体伤害”的错误信息，但声明反疫苗内容并不违反该政策或任何其他Facebook政策。然而，这一情况在2021年2月发生了变化，当时Facebook修订了其政策并宣布^([^(284)](#fn284))将开始删除几乎所有关于疫苗的虚假声明。


    亡羊补牢，为时未晚：2020年8月，进步派非营利组织Avaaz发布了一份报告^([^(285)](#fn285))，内容涉及前一年Facebook上全球健康错误信息（包括反疫苗宣传）的状况——其描绘的景象并不乐观。该报告估计，在那一年中，分享全球健康错误信息的群组和页面上的内容获得了近40亿次浏览。在该报告的时间范围内，这些错误信息内容的浏览峰值出现在4月，当时新冠疫情正失控蔓延，尽管Facebook努力打击COVID-19错误信息。报告估计，在4月的这一峰值期间，来自十大最受欢迎健康错误信息网站的内容获得的浏览量，是来自世界卫生组织（WHO）和美国疾病控制与预防中心（CDC）等十大权威信息来源内容的四倍。报告还发现，某些“超级传播者”页面应对大部分错误信息负责，而这些超级传播者中的许多都起源于反疫苗运动。一篇特别文章虚假声称美国医学会鼓励医生多报COVID-19死亡人数，获得了超过600万次评论或点赞，估计被浏览了1.6亿次。针对这份报告，Facebook表示^([^(286)](#fn286))，从4月到6月，它已对近1亿条COVID-19错误信息帖子应用了事实核查警告标签，并删除了该公司认为存在迫在眉睫伤害风险的另外700万条帖子。


    Facebook上另一个涉及算法且与错误信息相关的问题是机器人的使用——这些虚假账户可以被命令以特定方式行事。机器人通常被用来通过点赞、分享和评论，人为地为特定Facebook群组或页面注入初始人气；Facebook的推荐和信息流算法检测到这种高参与度，并将其误认为是真实活动，导致算法将这些群组/页面推广给真实用户，从而推动其实际人气。回想一下，《大纪元时报》在其非常成功的“Facebook策略”中就使用了这种技术，尽管这明显违反了该平台关于虚假账户所有权和活动的政策。2020年9月，一位名叫Sophie
    Zhang的数据科学家被解雇，她曾在Facebook的一个专门负责捕捉和封禁机器人账户的团队工作。在她上班的最后一天，她向整个公司发布了一份长篇内部备忘录^([^(287)](#fn287))，描述了该平台机器人问题的可怕规模，以及公司领导层不愿听取她反复警告、及时妥善应对这一问题的态度。


    张的备忘录中充满了世界各地旨在影响舆论和选举结果的协调性机器人活动的具体例子——有时这些机器人可追溯到政府首脑和政党。她写道：“在Facebook工作的三年里，我多次发现外国政府公然试图大规模滥用我们的平台来误导本国公民，并多次引发国际新闻。”她说，在2018年美国和大选的选举中，她的团队删除了超过1000万条针对知名政治人物的虚假反应和点赞。她对Facebook领导层对她团队发现的许多机器人活动反应迟缓（有时需要数月才采取行动）感到震惊，同时也对她和她的团队作为网站版主所拥有的不受制约的权力感到震惊：“我曾在没有监督的情况下做出影响国家总统的决定，并对全球如此多的知名政治人物采取过行动，以至于我都数不清了。”当张被解雇时，她获得了一份6.4万美元的遣散费方案，但其中一项要求是她签署一份不诋毁协议。她拒绝了这份遣散费方案，以便能够发布她那份面向全公司的内部备忘录——希望这能促使公司内部发生一些真正的改变。


    就在张离职前几个月，《华尔街日报》发表了一篇报道^([^(288)](#fn288))，揭示了Facebook内部对其平台和算法在过去几年中一些负面社会影响所进行的严密保护的研究及应对措施。事实证明，2016年向公司领导层提交的一份内部演示文稿显示，极端主义内容——其中大部分是种族主义、阴谋论和亲俄内容——广泛存在于德国超过三分之一的大型政治Facebook群组中，而相对少数非常活跃的用户对这些内容负有主要责任。相当令人不安的是，该演示文稿声称“64%的极端主义群组加入行为是由我们的推荐工具导致的”，尤其是算法驱动的“你可能想加入的群组”和“发现”建议。该演示文稿直言不讳地指出：“我们的推荐系统加剧了问题。”Facebook员工告诉《华尔街日报》，毫不意外，这个问题绝非德国独有。两年后，另一份提交给公司领导层的内部演示文稿指出：“我们的算法利用了人脑对分裂性内容的吸引力”，并且如果不加控制，算法会选择“越来越多分裂性的内容，以获取用户注意力并增加用户在平台上的停留时间。”'
  raw: 'Sophisticated algorithms play a role in the spread of fake news on Facebook
    not just through the ranking of newsfeed content and recommendations for groups
    to join and pages to follow (the main topics of this chapter), and in political
    advertising (the topic of the previous chapter), but also in Facebook’s search
    and autocomplete features where the problems are similar to the ones with Google
    described in Chapter [6](../Text/508514_1_En_6_Chapter.xhtml). A February 2019
    report^([^(283)](#fn283)) by the *Guardian* found that when logged in to a new
    user account, with no friends or other activity, typing “vaccine” into Facebook’s
    search bar produced autocompletes such as “vaccine re-education,” “vaccine truth
    movement,” and “vaccine resistance movement” that push people into the world of
    anti-vax misinformation. Even if the user resisted these autocomplete temptations
    and simply searched for “vaccination,” the top twelve Facebook groups that came
    up were all anti-vaccination organizations, and eight of the top twelve Facebook
    pages that came up were anti-vaccination pages suffused with misinformation. Several
    months earlier, Facebook had launched a policy of deleting misinformation designed
    to provoke “violence or physical harm,” but it stated that anti-vax content does
    not violate this or any other Facebook policy. However, that changed in February
    2021 when Facebook revised its policies and announced^([^(284)](#fn284)) that
    it would start removing essentially all false claims about vaccines.


    Better late than never: in August 2020, the progressive nonprofit organization
    Avaaz released a report^([^(285)](#fn285)) on the state of global health misinformation,
    including anti-vax propaganda, on Facebook throughout the preceding year—and the
    picture it painted was not pretty. The report estimated that content on groups
    and pages sharing global health misinformation received nearly four billion views
    during that year. Within the timeframe of the report, views of this misinformative
    content peaked in April when the coronavirus pandemic was spiraling out of control,
    despite Facebook’s concerted efforts to fight COVID-19 misinformation. The report
    estimated that during this April peak, content from the top ten most popular health
    misinformation sites collected four times as many views as did content from the
    top ten leading authoritative sources such as the WHO and the CDC. It also found
    that certain “super spreader” pages were responsible for a large fraction of the
    misinformation, and that many of these super spreaders had origins in the anti-vax
    movement. One particular article falsely claiming that the American Medical Association
    was encouraging doctors to overcount COVID-19 deaths received over six million
    comments or likes and was viewed an estimated one hundred and sixty million times.
    In response to this report, Facebook said^([^(286)](#fn286)) that from April to
    June it applied fact-checker warning labels to nearly one hundred million COVID-19
    misinformation posts and removed seven million others that the company believed
    risked imminent harm.


    Another problem on Facebook involving algorithms and related to misinformation
    has been the use of bots—fake accounts that can be commanded to behave in certain
    ways. Bots are often used to artificially seed initial popularity in specified
    Facebook groups or pages through likes and shares and comments; Facebook’s recommendation
    and newsfeed algorithms detect this high level of engagement and mistake it for
    authentic activity, causing the algorithms to promote the groups/pages to real
    users, which in turn drives their actual popularity. As you recall, the *Epoch
    Times* used this technique in its highly successful “Facebook strategy,” even
    though it manifestly violates the platform’s policies against inauthentic account
    ownership and activity. In September 2020, a data scientist named Sophie Zhang
    who had been working at Facebook on a team dedicated to catching and blocking
    bot accounts was fired. On her last day in the office, she posted^([^(287)](#fn287))
    a lengthy internal memo to the entire company describing the terrifying scope
    of the platform’s bot problem and the corporate leadership’s reluctance to heed
    her repeated warnings to promptly and properly respond to this problem.


    Zhang’s memo is filled with concrete examples of coordinated bot activities around
    the world aimed to sway public opinion and influence election outcomes—sometimes
    with the bots traced to heads of government and political parties. “In the three
    years I’ve spent at Facebook, I’ve found multiple blatant attempts by foreign
    national governments to abuse our platform on vast scales to mislead their own
    citizenry, and caused international news on multiple occasions,” she wrote. She
    said that in the 2018 elections in the United States and in Brazil, her team took
    down over ten million fake reactions and likes of high-profile politicians. She
    was shocked at how slow Facebook leadership was to respond to many of the bot
    campaigns her team uncovered—sometimes taking months to act—and also shocked at
    the unchecked power she and her team had as moderators on the site: “I have personally
    made decisions that affected national presidents without oversight, and taken
    action to enforce against so many prominent politicians globally that I’ve lost
    count.” When Zhang was fired, she was offered a sixty-four-thousand-dollar severance
    package, but one requirement it included was that she sign a non-disparagement
    agreement. She turned down this severance package specifically so that she could
    post her internal company-wide memo—in the hope that it would lead to some real
    change within the company.


    Just a few months before Zhang’s departure, the *Wall Street Journal* published^([^(288)](#fn288))
    a glimpse into the closely guarded backrooms of Facebook’s private research on,
    and response to, some of the negative societal impacts of the company’s platform
    and algorithms over the preceding few years. It turns out that an internal presentation
    to company leadership in 2016 showed that extremist content—much of it racist,
    conspiracy-minded, and pro-Russian—was widely found on over a third of large political
    Facebook groups in Germany, and a relatively small number of very active users
    were responsible for a large amount of this content. Quite disturbingly, the presentation
    asserted that “64% of all extremist group joins are due to our recommendation
    tools,” especially the algorithmically driven “Groups You Should Join” and “Discover”
    suggestions. Quite bluntly, the presentation stated that “Our recommendation systems
    grow the problem.” And Facebook employees told the *Wall Street Journal* that,
    unsurprisingly, this problem was in no way special to Germany. Two years later,
    another internal presentation to company leadership stated that “Our algorithms
    exploit the human brain’s attraction to divisiveness” and that if left unchecked
    they would select “more and more divisive content in an effort to gain user attention
    & increase time on the platform.”'
