- fmt: '# Autoplay the Autocrats


    The Algorithm and Politics of YouTube Recommendations


    > *As far-right and conspiracy channels began citing one another, YouTube’s recommendation
    system learned to string their videos together. However implausible any individual
    rumor might be on its own, joined together, they created the impression that dozens
    of disparate sources were revealing the same terrifying truth.*

    >

    > —Max Fisher and Amanda Taub, *New York Times*


    As trust in traditional media outlets has declined, people have turned to alternative
    sources to get their news. One particularly popular platform in this regard, especially
    among the younger generations (as you’ll soon see in this chapter with some precise
    facts and figures), is YouTube. The premise that anyone can post videos showing
    or explaining what is happening in the world is appealing, but the reality is
    that YouTube has played an alarming role in the spread of fake news and disinformation.
    The powerful yet mysterious YouTube recommendation algorithm drives the majority
    of watch time on the site, so understanding how it works is crucial to understanding
    how YouTube has pushed viewers toward outlandish conspiracy theories and dangerous
    alt-right provocateurs. This chapter takes a close look at how the recommendation
    algorithm has developed over the years, how it behaves in practice, how it may
    have influenced elections and political events around the world, how the company
    has responded to criticism, and how it has tried to moderate the content it hosts.


    ## Growing Chorus of Concern


    “Years ago, the openness of YouTube was a benefit to artists, activists, and creative
    types, but YouTube is now a major component of scaling disinformation campaigns.”
    This was said by Joan Donovan, research director of the Shorenstein Center on
    Media, Politics, and Public Policy at Harvard, after a network of fake news YouTube
    channels supporting Trump’s efforts to overturn the 2020 election appeared in
    the days after the election.^([^(91)](#fn91))


    “Less than a generation ago, the way voters viewed their politicians was largely
    shaped by tens of thousands of newspaper editors, journalists and TV executives.
    Today, the invisible codes behind the big technology platforms have become the
    new kingmakers.” This was written by Paul Lewis of the *Guardian* in his investigation
    into how YouTube’s algorithm distorts the truth.^([^(92)](#fn92))


    “For a short time on January 4, 2018, the most popular livestreamed video on YouTube
    was a broadcast dominated by white nationalists. […This video] is part of a larger
    phenomenon, in which YouTubers attempt to reach young audiences by broadcasting
    far-right ideas in the form of news and entertainment. […] One reason YouTube
    is so effective for circulating political ideas is because it is often ignored
    or underestimated in discourse on the rise of disinformation and far-right movements.”
    This was written by Rebecca Lewis in a 2018 report on YouTube for the Data & Society
    Research Institute.^([^(93)](#fn93))


    “YouTube’s powerful recommendation algorithm, which pushes its two billion monthly
    users to videos it thinks they will watch, has fueled the platform’s ascent to
    become the new TV for many across the world. […] YouTube’s success has come with
    a dark side. Research has shown that the site’s recommendations have systematically
    amplified divisive, sensationalist and clearly false videos.” This was written
    by Jack Nicas of the *New York Times* in his investigation into how YouTube’s
    algorithm encourages the spread of conspiracy theories.^([^(94)](#fn94))


    “YouTube is something that looks like reality, but it is distorted to make you
    spend more time online. The recommendation algorithm is not optimizing for what
    is truthful, or balanced, or healthy for democracy.” This was said by Guillaume
    Chaslot, a former Google AI engineer who worked on YouTube’s recommendation algorithm.
    “On YouTube, fiction is outperforming reality,” Chaslot continued.^([^(95)](#fn95))


    “Bellingcat, an investigative news site, analyzed messages from far-right chat
    rooms and found that YouTube was cited as the most frequent cause of members’
    ‘red-pilling’—an internet slang term for converting to far-right beliefs. A European
    research group, VOX-Pol, conducted a separate analysis of nearly 30,000 Twitter
    accounts affiliated with the alt-right. It found that the accounts linked to YouTube
    more often than to any other site.” This was written by Kevin Roose of the *New
    York Times* in his investigation into how YouTube radicalizes people.^([^(96)](#fn96))


    “Reality is shaped by whatever message goes viral,” said Pedro D’Eyrot, cofounder
    of the group that formed to agitate for the impeachment in 2016 of Brazil’s left-wing
    then-president, Dilma Rousseff. “YouTube’s auto-playing recommendations were my
    political education,” said Mauricio Martins, an official in the political party
    of Brazil’s authoritarian far-right president, Jair Bolsonaro.^([^(97)](#fn97))


    The main goal of this chapter is to get to the bottom of these unnerving quotes—to
    understand what YouTube’s enigmatic recommendation algorithm does and to unpack
    the controversies surrounding it. In particular, I’ll explore whether the YouTube
    recommendation algorithm really has contributed to the spread of fake news, driven
    the growth of deleterious conspiracy theories, and propped up autocrats and the
    alt-right, especially in Brazil and the United States.


    ## Background on YouTube


    YouTube launched in 2005 and was acquired by Google a year later for $1.65 billion.
    It has over two billion users across the globe.^([^(98)](#fn98)) That’s almost
    one-third of the internet and more than the number of households that own televisions.
    One billion hours of YouTube videos are watched daily. More than five hundred
    hours of video are uploaded every minute. YouTube’s traffic is estimated to be
    the second highest of any website, behind only Google.com.^([^(99)](#fn99)) In
    the United States, YouTube reaches more people between the ages of eighteen and
    thirty-four than any television network; ninety-four percent of Americans aged
    eighteen to twenty-four use YouTube, a higher percentage than for any other online
    service.


    There are basically four different ways that people access YouTube videos:


    *   Embedded videos on other platforms

    *   Direct URL links to videos that people share

    *   Keyword searches on YouTube’s homepage

    *   Recommended videos on YouTube’s homepage and “up next” videos that are recommended
    whenever a video is playing


    In 2018, it was revealed^([^(100)](#fn100)) by YouTube’s Chief Product Officer
    that seventy percent of the total time users spend watching YouTube videos comes
    from this fourth category, the recommended videos.


    The term *recommendation algorithm* refers to the behind-the-scenes systems powering
    both forms of recommended videos (the ones on the homepage and the “up next” list);
    occasionally, it is also used to refer to the direct search function on YouTube,
    since the user types keywords and the site returns a list of videos that it recommends
    as matches to the search, but I’ll avoid conflating these rather different processes.
    Most of the public debate and discourse about YouTube’s potential for political
    polarization focuses on the recommendation algorithm, and that will also be the
    focus of this chapter.


    Company insiders say^([^(101)](#fn101)) that the recommendation algorithm is the
    single most important engine of YouTube’s growth, and they describe it as “one
    of the largest scale and most sophisticated industrial recommendation systems
    in existence.” This sense of scale and significance certainly creates the potential
    for YouTube’s recommendation algorithm to have a tremendous impact on society
    worldwide, but to find out if and how it does so will take some digging. I shall
    start with a technically oriented chronology of the algorithm.'
