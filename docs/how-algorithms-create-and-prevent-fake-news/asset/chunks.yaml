- fmt: '# Winston’s Investigation into a Suspicious User


    `Winston` looked into the suspicious user’s posting history and found that their
    posts—which ran an impressive six paragraphs long on average—were appearing at
    a staggering rate of one per minute.^([^(37)](#fn37)) At this point in `Winston`’s
    armchair investigation, he found that this user had been posting in bursts for
    just over a week. He noticed that the length of these bursts increased significantly
    by the end of the week—leading `Winston` to suspect that the user was either getting
    bolder or perhaps even hoping to get “caught.” `Winston` immediately suspected
    this user was relying on `GPT-3`. “Several times I Googled clever sounding lines
    from the posts,” he said, “assuming I’d find that they had been cribbed from the
    internet. Every time Google reported zero results.” This actually increased his
    suspicion, because often a clever-sounding phrase written by a human is really
    a quote from another source. `GPT-3` was not quoting; it was inventing.


    Eager to resolve this matter, `Winston` found a subreddit discussing `GPT-3` and
    posted in it asking if the experts there think this suspicious user is a bot powered
    by `GPT-3`. Within minutes, his suspicion was confirmed as someone there pinpointed
    the specific product derived from `GPT-3` that was almost surely being used. It
    was called `Philosopher AI`, and by relying on this instead of `GPT-3` directly,
    the user was able not just to gain ungranted access to the service but even to
    avoid the fees that a commercial user would ordinarily be required to pay. `Winston`
    alerted the developer of `Philosopher AI` of the situation, and the developer
    immediately blocked that particular user’s access. Within one hour, the Reddit
    user’s posts stopped appearing. Case closed.


    A clear lesson from this story is that it was far easier and faster to create
    a `GPT-3` bot than it was to uncover it. Only time will tell how rampant `GPT-3`
    bots become and how significantly their inevitable rise in disinformation campaigns
    impacts society. At the end of this chapter, I’ll discuss some AI-powered tools
    currently being developed in the fight against weaponized `GPT-3`. But first,
    it is time to look at the nuts and bolts in the machine.


    ## Crash Course in Machine Learning


    The goal of `supervised learning`, a large branch of machine learning, is first
    to learn patterns from data in a process called `training` and then to use these
    patterns to make data-driven predictions. I will now briefly explain what this
    means and then outline how it has been used to power the text- and photo-generating
    AI algorithms that have been the focus of this chapter.


    ### Supervised Learning


    We usually start with data in spreadsheet form, where the columns correspond to
    variables and the rows specify instances of these variables (in other words, each
    row is a data point). Each variable can be `numerical` (measuring a continuous
    quantity like height or weight or a discrete quantity like shoe size), or it can
    be `categorical` (in which each instance takes on one of a finite number of nonquantitative
    values, like gender or current state of residence). In the supervised learning
    framework, we first single out one variable as the `target` (this is the one we
    will try to predict, based on the values of the others); all the other variables
    are then considered `predictors`.^([^(38)](#fn38)) For example, we might try to
    predict a person’s shoe size based on their height, weight, gender, and state
    of residence (a numerical prediction like this is called `regression`), or we
    might try to predict a person’s gender based on their height, weight, shoe size,
    and state of residence (a categorical prediction like this is called `classification`).


    There are a handful of popular supervised learning algorithms, most of which were
    largely developed in the 1990s. Each algorithm is based on assuming the overall
    manner in which the target depends on the predictors and then fine-tuning this
    relation during the training process. For instance, if you want to predict shoe
    size, call it `y`, based on height and weight, call those `x[1]` and `x[2]`, and
    if you expect the relationship to be linear, then you can use a linear algorithm
    that starts with an equation of the form `y = a[1] * x[1] + a[2] * x[2] + c`,
    where `a[1]`, `a[2]`, and `c` are numbers called `parameters` that are “learned”
    in the training process. This means the algorithm is fed lots of rows of data
    from which it tries to deduce the best values of the parameters (“best” here meaning
    that, on average, the `y` values given by this linear formula are as close as
    possible to the actual values of the shoe size target variable).


    More complicated algorithms rely on more complicated formulas, but the overall
    process is the same: the algorithm uses the data to adjust all the parameters
    in the algorithm’s internal formula so that the formula’s output is as close as
    possible to the actual target variable values in the data. This is called `training`
    the algorithm, or `fitting` it to the data. Once this is done, we can then take
    a new data point that the algorithm has not seen yet where we only have the values
    of the predictor variables, not the target, and then we plug those predictor values
    into the algorithm’s fitted formula. The output we then get is the algorithm’s
    best guess (or `prediction`) for the value of the target variable for this data
    point.


    One of the biggest challenges in supervised learning is choosing a good collection
    of predictor variables. For instance, you might find it strange to include a person’s
    state of residence when trying to predict their shoe size; it turns out that,
    in general, including irrelevant variables doesn’t just not help the predictive
    power of the algorithm—it actually makes it worse. Similarly, including redundant
    variables (such as a person’s height in inches and their height in centimeters)
    or even just highly correlated variables (such as height and weight) can sometimes
    make the algorithm perform worse. On the other hand, not including enough predictors
    can also be problematic—for instance, just knowing someone’s height and weight
    probably isn’t enough to predict their shoe size, but if we also know their gender,
    then we have a better chance of success.


    Machine learning practitioners often spend hours trying different combinations
    of predictors and manually crafting new ones from the original ones that might
    perform better than the originals. For instance, instead of using height and weight
    separately, it might be better to add the two together to create a new single
    measure of overall size. Knowing how to do this effectively has been as much of
    an art as a science, and a holy grail in the subject has long been to find ways
    of automating this process. This brings us to our next topic in machine learning.'
