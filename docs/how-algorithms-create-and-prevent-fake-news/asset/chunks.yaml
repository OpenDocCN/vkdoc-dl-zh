- fmt: '### Determined to Find a Use


    What Marston perhaps lacked in scientific rigor, he made up for with commercial
    savvy: throughout his career, he worked hard to push his lie detector and touted
    its supposedly revolutionary success in a public advertising campaign and even
    in comic books. And he was quite successful in this endeavor. But if polygraphs
    are not admissible in court, what use has been found for them? Basically just
    one, but it is surprisingly large and lucrative. While it is illegal for most
    private companies to use polygraphs, many government agencies—local and federal—rely
    on polygraphs as part of their background employment screening process. It is
    estimated^([^(152)](#fn152)) that two and a half million polygraph tests are conducted
    annually in the United States, far more than in any other country, fueling a two-billion-dollar
    industry.


    A 2007 survey found that around three-quarters of urban sheriff and police departments
    used polygraphs in their hiring process. They are commonly used when hiring firefighters
    and paramedics too. They are also part of the federal government security clearance
    process; I know this firsthand from a college summer internship I did at the NSA
    years ago. I still remember being nervous about having to fly across the country
    to be strapped into this strange machine in an austere examination room with multiple
    government officials, just like a scene from a Hollywood movie. I also remember
    the nervousness quickly fading when I realized the questions they were asking
    me were not difficult or embarrassing personal details—they were lobbing softballs
    such as: “Have you ever actively conspired to overthrow the US Government?” I
    wondered what this could possibly reveal, and who would ever fail this test. But
    they don’t share the results of the test with you, they just incorporate the polygraph
    data into the overall background check that is kept confidential, and all you
    can do is trust the system. In my case, I passed the screening and received a
    security clearance for the summer, but to this day I have no idea what the polygraph
    supposedly indicated about me.


    ### Enduring Skepticism


    Let me repeat for emphasis: polygraphs are not reliable enough to be used in the
    courtroom nor by private companies, yet the public sector readily embraces the
    questionable technology and uses it to screen over two million people each year,
    most of them simply applying for jobs in which they could try to do good and have
    a positive impact on society. It is believed^([^(153)](#fn153)) that tens or hundreds
    of thousands of these applicants fail the polygraph each year and are thereby
    denied employment (exact figures are unknown). All this, despite the fact that
    throughout its hundred-year lifespan the polygraph has failed to establish its
    legitimacy in an accepted scientific fashion. In fact, in 1965, the US Committee
    on Government Operations evaluated the scientific evidence and reached the following
    conclusion:^([^(154)](#fn154)) “There is no lie detector, neither man nor machine.
    People have been deceived by a myth that a metal box in the hands of an investigator
    can detect truth or falsehood.” In the 21st century, the *metal box* has been
    supplanted by the *black box*—which is to say, deep learning. This is the main
    topic I’ll be coming to shortly.


    But first, there’s one more important point to make before concluding this background
    history of the old-school (but still widely used) polygraph device that is quite
    germane to the newfangled AI lie detectors as well. James Woolsey, former director
    of the CIA, warned during a 2009 interview:^([^(155)](#fn155)) “The polygraph’s
    great flaw is the substantial number of false positives that it gives out, especially
    when you’re using it for large-scale screenings.” In other words, polygraphs have
    a tendency to misclassify truthful statements as lies, and even if the rate at
    which this occurs were relatively low (which it isn’t necessarily), when used
    en masse as they are in employment screening, this means a large number of people
    are falsely and unfairly deemed liars. Indeed, Woolsey went on to express how
    this issue with false positives is “seriously damaging a lot of people’s lives
    by having them fail the polygraph when they haven’t really done anything.”


    Aggravating this inequity further, false positives do not strike applicants uniformly.
    For instance, a racial discrimination class action lawsuit that was quietly settled
    in the 1980s revealed^([^(156)](#fn156)) that the high rate of polygraph failure
    among Black applicants to the Cook County Department of Corrections in the late
    1970s had only a one in a thousand chance of happening randomly—meaning the polygraph
    results were almost certainly biased against Black applicants. (Part of the settlement
    agreement was for Cook County to immediately stop using polygraph tests for employment
    screening.) Similarly, in 1990, the US Department of Defense conducted a study
    on polygraph reliability and found that under simulated criminal proceedings,
    innocent Black people were more likely to receive false positives than innocent
    white people.


    It is not entirely known what accounts for this discrepancy, but one explanation
    put forth by experts is that the polygraph’s readings are so vague and open to
    interpretation that they in essence act as a Rorschach test for the examiner and
    are thereby subject to their human whims and biases. One neuroscientist said,^([^(157)](#fn157))
    “One examiner might see a blood pressure peak as a sign of deception, another
    might dismiss it—and it is in those individual judgments that bias can sneak in.
    The examiner’s decision is probably based primarily on the human interaction that
    the two people have.” And a senior policy analyst for the ACLU expanded on this
    point:^([^(158)](#fn158)) “In this respect polygraphs are just like other pseudo-scientific
    technologies that we’ve seen in recent years: Because they are fundamentally bogus,
    they end up becoming no more than a vehicle for operators to substitute their
    own personal assessments of subjects in the absence of genuinely useful measurements.
    For some operators, that’s inevitably going to mean racial bias.”


    It is quite possible that structural racism plays a role too by, for instance,
    causing Black people to be more nervous during governmental interrogations. It
    is rather surprising how little research has been conducted on bias in polygraphs,
    especially considering how widespread their use is in the public sector.


    Now our history of the traditional polygraph is complete, and, with the stage
    properly set, we step into the world of algorithmic lie detection.


    ## The Polygraph Meets AI


    As you have already witnessed in the chapter on deepfakes, deep learning has powered
    a revolution in our ability to process visual data. At first glance, lie detection
    seems like it should be a rather straightforward application: train a machine
    learning algorithm on the supervised binary classification task of sorting video
    clips into truthful versus untruthful. It turns out, however, that the problem
    of biased false positives is a ghost in the machine that is not so easily vanquished.'
