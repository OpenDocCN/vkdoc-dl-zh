- fmt: '# Google Ads and Fake News


    Peddlers of fake news surely hope to profit from their nefarious endeavor in some
    way. For a portion of them, the aim is primarily political—they could be part
    of a foreign government’s disinformation campaign intended to sow chaos and weaken
    a sovereign nation’s democratic pillars, or part of a domestic movement resorting
    to deceptive means in order to sway popular opinion on certain issues. For many
    others, however, the aim is quite simply money, and peddling fake news is just
    a business.


    But how does one make money by peddling fake news? Usually, through pageview advertising
    of the kind discussed in Chapter [1](../Text/508514_1_En_1_Chapter.xhtml). This
    is where Google enters the story: while we typically view Google as a search engine
    or a technology company, from a revenue perspective it is predominantly an advertising
    company—and it is the biggest one in the world. A report from 2017 found^([^(233)](#fn233))
    that online advertising had surpassed television to become the largest ad medium,
    that Google’s ad revenue in 2016 (nearly eighty billion dollars) was the biggest
    in the advertising industry and triple that of the next competitor, Facebook,
    and that Google and Facebook combined for nearly twenty percent of the earnings
    of the entire global advertising industry. In 2020, Google’s annual ad revenue
    had grown^([^(234)](#fn234)) to nearly one hundred fifty billion dollars, and
    it accounted for eighty percent of the company’s combined revenue. In other words,
    four out of every five dollars that Google earns comes by way of advertising.
    And one out of every three dollars made in the US digital advertising industry
    goes to Google.^([^(235)](#fn235))


    There are two ways that Google earns revenue through advertising; to understand
    them, it helps to think in terms of real estate. The most direct method is that
    organizations pay Google to display their ads on Google’s site. For instance,
    if you want to advertise a particular product, you can pay Google to place your
    ad at the top of Google searches that include keywords of your choosing. This
    is like renting a small piece of property directly from Google where you can place
    your ad. The second method is more indirect—here again organizations pay Google
    to place their ads, but this time they are placed on third-party properties rather
    than Google’s own. In this approach, Google is just a middleman, in essence a
    virtual realtor helping facilitate transactions between different clients. If
    you want to advertise a product, you tell Google what kind of websites you’d like
    your ad shown on, and Google will find ones that are willing to host ads and then
    place yours there for a fee. On the other hand, if you run a popular website and
    would like to make money from it, just tell Google that a piece of your web property
    is for rent, and Google will, for a fee, find an advertiser happy to take up your
    offer. The websites hosting ads placed by Google are officially called the *Google
    Display Network* (since the sites “display” ads). Due to the massive size of this
    network and the literally billions^([^(236)](#fn236)) of ads placed in it every
    single day, these transactions are all automated and powered by algorithms.


    This brings us back to fake news. When Google places ads on a website that publishes
    misinformation, Google is providing a revenue stream—often the only one—for this
    website. But how can Google’s ad placement algorithm know if the information on
    a website is accurate? I’ll turn to this topic in the last two chapters of this
    book; the brief answer is that it is *very* hard. Even if this were doable, there
    are no laws preventing Google from profiting by placing ads on fake news or dangerously
    provocative sites. Moreover, popular backlash for this manifestly unethical conduct
    is limited because users on an ad hosting site see no indication of which company
    was responsible for the ad placement; the invisible hand of Google’s algorithm
    is hidden from all except those directly involved in the transaction.


    In short, Google is financially incentivized to provide ads on as many sites as
    possible, not just the trustworthy ones. And in doing so, Google is providing
    a financial incentive for these sites to bring in as much web traffic as possible,
    even if it comes by way of manipulative disinformation. In this manner, unscrupulous
    bloggers and journalists profit from sensational attention-grabbing fake news—and
    so does Google. This connects the main topic of this chapter with the main topic
    of Chapter [1](../Text/508514_1_En_1_Chapter.xhtml), the pageview economic corruption
    of journalism.


    It is time now to take a closer look at Google’s role in funding fake news through
    algorithmic ad placement.'
