  trans: '

    ### 攻击性广告类别


    2017 年 9 月，*ProPublica*的记者发现^(²⁵¹)了一个名为“犹太人仇恨者”的 Facebook 广告类别，并试图在其中投放一篇推广帖子。Facebook
    的系统回应称该类别规模太小，只接受目标受众超过最低人数限制的广告，因此 Facebook 提供了一个算法生成的建议，建议联合定位第二个类别：“第二修正案”。显然，Facebook
    的算法相当骇人地将反犹主义者与枪支爱好者关联了起来。记者们转而决定搜索更多反犹类别，只是想看看还有哪些可用。他们确实找到了其他类别，例如“如何焚烧犹太人”和“‘犹太人为何毁灭世界’的历史”。记者指出，如果你想推销纳粹纪念品或为极右翼集会招募游行者，这些将是极佳的类别选择。


    这些反犹太类别的成员数量仍然太少，因此*ProPublica*的记者又添加了一个类别：德国国家民主党——一个极右翼、极端民族主义的政党。合并后的成员数量接近二十万，他们终于达到了目标。他们向
    Facebook 支付了三十美元，在这些类别中投放了几篇推广帖子，广告在十五分钟内就获得了批准。一周后，他们收到报告称，他们的广告触达了五千八百九十七人，产生了一百零一次点击和十三次*互动*（对帖子的*点赞*、*分享*或评论）。在就这一实验联系
    Facebook 后，记者们发现的特定反犹类别被从 Facebook 的广告类别列表中移除，但这当然只是对溃烂伤口贴上一块创可贴——记者调查所揭示的更大问题依然存在。


    而这并非*ProPublica*首次揭露 Facebook 算法广告系统中的严重问题。


    ### 种族歧视性排除广告


    大约一年前，即 2016 年 10 月，*ProPublica*发现^(²⁵²)Facebook 的广告系统允许广告主按种族排除用户。在 Facebook
    上购买广告时，除了选择要触达的目标受众类别外，屏幕上还会出现一个“缩小受众范围”的选项，提示用户选择要从广告受众中排除的“人口统计特征、兴趣或行为”类别。广告主可以选择排除的人口统计特征包括“非裔美国人”、“亚裔美国人”和“西班牙裔”。记者们巧妙地将其置于背景中描述如下：“想象一下，在吉姆·克劳时代，一家报纸为广告主提供选项，只将广告投放到白人读者手中的报纸。这基本上就是
    Facebook 现在正在做的事情。”联邦法律禁止广告中的此类种族排除行为，至少对于就业、住房和信贷广告是如此。


    也许 Facebook 认为，如果这些非法的排除类别是由算法而非人类想出来的（尽管我们甚至不知道是否如此），那就没问题。或者，Facebook 站不住脚的理由是，它将这些类别描述为“种族亲和力”而非种族（尽管将它们嵌套在“人口统计特征”类别下）——暗示
    Facebook 并非让你将黑人排除在广告之外，而只是排除对黑人话题感兴趣的人。当*ProPublica*的记者向著名民权律师约翰·雷尔曼展示这些种族排除类别时，他回应道：“这太可怕了。这严重违法。这几乎是你能找到的对联邦《公平住房法》最明目张胆的违反。”Facebook
    是如何回应的？Facebook 最终因此事被告上法庭了吗？我稍后会回到这些问题，但首先请允许我简短地岔开话题。


    ### 算法可以助益而非伤害


    为了提供背景，并说明算法既能带来好处也能带来坏处，不妨将 Facebook 算法生成的种族主义广告类别——无论是定向群体还是排除群体——与一个利用算法帮助人工审核员*减少*广告偏见的例子进行比较。


    *纽约时报*运行着一个自动过滤器^(²⁵³)，用于捕捉包含“仅限白人”等歧视性短语的广告，并将任何包含已知潜在歧视性暗语（如“靠近教堂”和“靠近乡村俱乐部”）的广告提请人工审核员注意。*纽约时报*还会拒绝照片中白人比例过高的住房广告，而算法可以帮助检测这一点。并非*纽约时报*的算法毫无缺陷，只是它们主要被用作辅助人工审核员的工具——而在
    Facebook，算法似乎是主要的裁决者。然而，公平地说，Facebook 处理的规模比*纽约时报*大许多个数量级，因此这并非一个公平的比较。话虽如此，人们应该记住，使用算法的方式有很多种。


    ### 非法排除性广告的延续


    快进到 2017 年 11 月。此时距离*ProPublica*首次引起公众关注 Facebook 非法将不同种族人口统计特征排除在广告之外的选项，刚过一年；距离*ProPublica*揭露
    Facebook 为广告主提供定向攻击性和仇恨性兴趣群体的能力，刚过两个月。同时，这也是 Facebook 宣布^(²⁵⁴)已采取多项措施加强其防止歧视性广告的程序（尤其是在住房、就业和信贷这三个联邦法律禁止歧视性广告的领域）九个月之后。报道这一公司声明的《华盛顿邮报》标题写道：“Facebook
    打击歧视性广告”。但*ProPublica*此时进行了另一项调查，发现 Facebook 所谓的改进远未达到其大胆的声明。


    事实上，*ProPublica*在 2017 年 11 月的调查^(²⁵⁵)显示，广告购买者仍然可以选择排除的受众类别，例如“非裔美国人、高中孩子的母亲、对轮椅坡道感兴趣的人、犹太人、来自阿根廷的外籍人士以及西班牙语使用者”。所有这些群体都受到联邦《公平住房法》的保护，因此
    Facebook 仍然明显违反了联邦法律。Facebook 这次如何回应？“这是我们在执行上的失败，我们对自己未能履行承诺感到失望。[…] *ProPublica*购买的广告本应触发我们设置的额外审查和认证，但由于技术故障未能触发。”一个极其含糊的借口/保证。


    *ProPublica*的记者报告称，根据他们作为广告购买者的经验，与一年前相比，投放这些非法广告时唯一注意到的区别是，“种族亲和力”类别已更名为“多元文化亲和力”，并且已从“人口统计特征”部分移至“行为”部分。换句话说，Facebook
    似乎仍在暗中躲在那个站不住脚的借口后面，即广告主并非基于种族排除人群，而是基于他们的……种族行为？天哪。*ProPublica*的记者还毫不费力地进行了*红线歧视*——也就是说，通过将
    Facebook 广告定向到特定的邮政编码区域，以此作为定向特定种族群体的方式。这也是联邦法律所禁止的。然而，Facebook 仍无所畏惧、厚颜无耻地将这种明显的不法行为又持续了十六个月，直到……

    '
- fmt: '### Legal Action


    After years of pressure by civil rights advocates and legal organizations, in
    March 2019 the ACLU announced that Facebook finally agreed to make sweeping changes
    to its advertising platform as the result of a settlement arising from multiple
    legal cases. The ACLU announcement^([^(256)](#fn256)) lauded this as a “historic
    civil rights settlement” and detailed some of the “major changes” Facebook would
    undertake: “In the first-of-its-kind settlement announced today, Facebook has
    agreed to create a separate place on its platform for advertisers to create ads
    for jobs, housing, and credit. Within the separate space, Facebook will eliminate
    age- and gender-based targeting as well as options for targeting associated with
    protected characteristics or groups. Targeting based on ZIP code or a geographic
    area that is less than a 15-mile radius will not be allowed.” Facebook said it
    would enact these changes by the end of the year—which is to say, it allowed itself
    to continue violating federal law for another nine months.


    Then, just one week after this ACLU settlement was announced, Facebook was charged
    in federal court by the US Department of Housing and Urban Development (HUD) for
    violating the Fair Housing Act. It’s rather strange that the federal government
    didn’t act upon the clear violations of the Fair Housing Act that were uncovered
    by *ProPublica* two and a half years earlier—and which were left in place this
    entire time—and that the charges were finally brought literally days after the
    ACLU’s landmark settlement that was intended to once and for all halt Facebook’s
    habitual violations. Political motivations may have played a role, as the Trump
    administration was chafing at some of the actions of Facebook and the other tech
    giants that some felt were stifling right-wing discourse on the platforms. When
    reporting the news of this HUD charge, the *Washington Post* declared^([^(257)](#fn257))
    “The Trump administration delivered its first sanction of a tech giant” and revealed
    that HUD had already alerted Twitter and Google that it is scrutinizing their
    practices for similar violations. Whatever the motivation, I strongly believe
    this was the right, albeit long overdue, course of action from HUD.


    Unfortunately, however, it would soon be found that Facebook’s problems with racism
    run deeper than initially believed.


    ### Algorithmic Bias


    Eight months after the HUD suit was announced, a research paper was published^([^(258)](#fn258))
    by a group of scholars led by two professors at Northeastern University showing
    how eliminating prohibited discrimination in Facebook’s advertising system is
    much more difficult than simply removing excluded categories from the interface.
    The reason is that societal bias is baked into the data that drive the machine
    learning algorithm Facebook uses to determine which users to show which ads.


    Facebook lets each ad purchaser choose one of three different metrics for the
    algorithm to maximize: the number of views an ad gets, the number of clicks and
    amount of engagement it receives, or the quantity of sales it generates. This
    sets up ad distribution as a supervised learning task: based on the ad’s content
    and the selected audience categories, the algorithm predicts which Facebook users
    will result in the highest value of the selected metric. The ad is then displayed
    in the newsfeeds of users according to these predictions. Since this is supervised
    learning, the predictions are based on data of prior user behavior, and that’s
    where the problem of bias comes in: the algorithm will hunt for whatever patterns
    it can find in the data that might give an edge in optimizing the selected metric—even
    if these patterns reflect historical bias. In short, Facebook’s ad algorithm learns
    racism, sexism, and other forms of bias from the training data it is fed (which
    reflects these forms of bias in society); then it uses this bias to try to boost
    the chosen ad metric, which leads to biased outcomes that in turn push society
    further down the road of racism and sexism and discrimination. This is yet another
    pernicious data-driven algorithmic feedback loop, similar to the one briefly discussed
    in Chapter [5](../Text/508514_1_En_5_Chapter.xhtml) in the context of bias in
    algorithmic lie detection for employment screening.


    The specific findings of this research study illustrate the severity and scope
    of bias in Facebook’s ad algorithm. The researchers created an employment ad for
    doctors and found that Facebook provided it with an audience that was forty-four
    percent white, whereas a nearly identical ad for janitors was given an audience
    that was only thirty-six percent white. The percentage was even higher for jobs
    in AI (fifty-three) and even lower for taxi driver ads (twenty-nine). The ad purchasers
    here did not choose different targeted audiences, they just changed the words
    in the ad content and let the algorithm do its thing. Similarly, ads for AI jobs
    were shown to an audience that was fifty-four percent male, whereas for nursing
    jobs it was only thirty-seven percent, for secretaries it was twenty-six percent,
    and for jobs in a preschool it was only twenty-four percent male. The researchers
    also found that Facebook’s algorithm provided ads for home sales with an audience
    that was about three-quarters white, whereas the audience for home rental ads
    was only about half white. The enormity of Facebook’s advertising platform (it
    controls twenty-two percent of the US market share for digital ads, second only
    to Google^([^(259)](#fn259))) means that even small differences in percentages
    here lead to huge differences in the total number of people viewing these different
    ads.


    In sum, this Northeastern University study found that Facebook’s algorithm detected
    and utilized—which in turn means perpetuated and amplified—existing biases that
    put white men in higher-paying and more prestigious jobs than minority women,
    and it encouraged homeownership for white people more than for non-white people.
    How might a Facebook ad purchaser attempt to compensate for this kind of automated
    machine learning bias? Other than waiting for Facebook to drastically redesign
    its system from within, essentially the only option one had was to explicitly
    target the underrepresented audiences, for instance, choosing Black audiences
    for tech jobs and home sales advertisements. But, in somewhat of a Catch 22 irony,
    the option for such targeting is, as you recall, precisely what was removed by
    Facebook in an effort to eliminate bias in its ad distribution system.


    ### Corporate Progress


    In July 2020, the *Wall Street Journal* reported^([^(260)](#fn260)) that Facebook
    was “creating new teams dedicated to studying and addressing potential racial
    bias on its core platform and Instagram unit, in a departure from the company’s
    prior reluctance to explore the way its products affect different minority groups.”
    This followed—and likely resulted from—sustained pressure from civil rights groups
    (including the Anti-Defamation League, Color of Change, and the NAACP), increasingly
    vocal employee unrest, and a months-long advertising boycott (including large,
    prominent clients such as Coca-Cola, Disney, McDonald’s, Starbucks, and Walmart)
    that cost Facebook advertising revenue and global reputation. These new equity
    and inclusion teams at Facebook aim to study how all of the company’s products
    and algorithms—not just its targeted advertising platform—impact minority users
    and how the user experience for Black, Hispanic, and other ethnic groups differs
    from that of white users. Let’s hope these teams are given the resources and respect
    they need to make a positive impact at the company.'
