- fmt: '# Introduction


    You might have heard rumors that the newsfeed algorithm at Facebook and the video
    recommendation algorithm at YouTube are spreading fake news, or that artificial
    intelligence (AI) can now rapidly generate convincing articles and make videos
    of people doing and saying things they never did, or that machine learning algorithms
    will save us from fake news by automatically detecting it and labeling assertions
    as true or false. But what do these claims even mean, and what should you believe?
    The main goal of this book is to help readers of all backgrounds—no knowledge
    of math, statistics, computers, algorithms, or journalism required—understand
    what’s really going on by collecting all the investigations, research, and stories
    about fake news and algorithms in one place and explaining it in a simple way
    while weaving it together into a coherent narrative. Another goal is to teach
    you about the publicly available tools that can help you do your own part in the
    fight against fake news.


    “If we are not serious about facts and what’s true and what’s not, if we can’t
    discriminate between serious arguments and propaganda, then we have problems.”
    Barack Obama said this on November 17, 2016, just nine days after Donald Trump
    was elected to be his successor in the White House. Since then, there has been
    an increasing awareness of the scope and impact of “fake news,” a catchall label
    for *misinformation* (false information that is spread regardless of intent to
    mislead) and *disinformation* (deliberately false or misleading information).
    There has also been an increasing awareness of the role played by data-driven
    algorithms in the creation, dissemination, and detection/moderation of fake news.
    But the story of fake news and algorithms has been difficult for most of us to
    follow. It has unfolded in a wide range of academic publications, journalistic
    investigations, corporate announcements, and governmental hearings, and it involves
    many sophisticated technological concepts that sound mysterious. I strongly believe
    that the barriers to entering this important discussion are not nearly as high
    as they might seem, and this book is my attempt to lower them even further.


    Chapter [1](../Text/508514_1_En_1_Chapter.xhtml) sets the stage by exploring the
    economics of blogging and online newspapers, with an emphasis on the dynamics
    that have led to a proliferation of low-quality journalism. Data, in the form
    of clicks and pageviews, has transformed the news industry, and you’ll see how
    fake news peddlers have taken advantage of this. Chapter [2](../Text/508514_1_En_2_Chapter.xhtml)
    looks at a new development in our ongoing battle to understand what’s real and
    what’s not: fake journalists with untraceable lifelike profile photos synthesized
    by AI, and entire articles written by AI with the click of a button. You’ll learn
    about the technology behind these advances (`GPT-3` and deepfake `GANs`, with
    a gentle overview of machine learning along the way) and the impact they’re having
    on journalism. Chapter [3](../Text/508514_1_En_3_Chapter.xhtml) continues this
    line of investigation by turning to deepfake video editing—explaining how it works,
    what it can do, and the role it has played in politics. Chapter [4](../Text/508514_1_En_4_Chapter.xhtml)
    is all about YouTube and its recommendation algorithm that automatically selects
    videos for you to watch. A history of this algorithm is provided, including brief
    discursions into deep learning and reinforcement learning, and empirical investigations
    into the way it works in practice are explored. This frames a discussion of fake
    news and conspiratorial content on YouTube, especially in the context of Brazil’s
    2018 election and the 2016 and 2020 US elections.


    After several chapters on how AI can create and spread fake news, Chapter [5](../Text/508514_1_En_5_Chapter.xhtml)
    asks if AI can help fight it by determining whether someone in a video is lying.
    This is part of an algorithmic reinvention of the polygraph that is currently
    being trialed at airports and elsewhere. Chapter [6](../Text/508514_1_En_6_Chapter.xhtml)
    takes a deep look at one of the world’s most popular sources of information: Google.
    The company’s efforts to elevate quality content over fake news and harmful material
    are detailed, as are the various failures that have occurred along the way and
    the challenges that remain. Chapter [7](../Text/508514_1_En_7_Chapter.xhtml) shows
    how Google supports the fake news industry financially through ad revenue and
    how Facebook’s algorithmically distributed ads have been a persistent source of
    fake news and racism. Chapter [8](../Text/508514_1_En_8_Chapter.xhtml) takes a
    thorough look at how fake news spreads across social media and how algorithms
    have been used to detect and mitigate this spread. Finally, Chapter [9](../Text/508514_1_En_9_Chapter.xhtml)
    collects and explains some publicly available AI-powered fact-checking tools that
    you can use to make sure what you’re reading is trustworthy and truthful.


    # Acknowledgments


    Thanks to Jordan Ellenberg, Cathy O’Neil, and Francis Su for inspiring me to write
    a book and helping me learn about the publishing industry. Thanks to Karen Hao,
    Will Douglas Heaven, Davey Alba, Jack Nicas, Kevin Roose, James Vincent, Issie
    Lapowsky, Carole Cadwalladr, Julia Angwin, Deepa Seetharaman, Jeff Horwitz, Sheera
    Frenkel, and so many other technology journalists for doing the hard work that
    this book relies so heavily upon. Thanks to Gerald Seidler, Jim Morrow, Henry
    Cohn, Dan Abramovich, Angela Gibney, Bernd Sturmfels, and my other teachers and
    mentors who helped me become a math professor. Thanks to Charlie Hadlock, Rick
    Oches, Lucy Kimball, and others at Bentley University for believing in me as a
    data scientist and providing me with the opportunities that led to this book.
    Thanks to Steffen Marcus for encouraging me to think and write about the broader
    context of math and technology. Thanks to Tom Taulli for putting me in contact
    with Apress, and to my team at Apress—Shiva Ramachandran, Matthew Moodie, Nancy
    Chen, Rita Fernando, and Mark Powers—for all their work shaping this book and
    helping get it across the finish line. Thanks to my parents, Bob and Dorothy,
    for homeschooling me and passing along a passion for lifelong learning. Thanks
    to my brother, Jeffrey, for paving the way forward for us both. And thanks to
    my wife, Emily, and our daughter, Claire, for more than words can convey.


