    2021 年 2 月表示，她计划重新提出该法案的修订版，她认为由于 2020 年大选后的新政治环境以及疫情导致社交媒体使用增加，该修订版将获得更多支持：“通过一些有意义的深度伪造立法的条件已经成熟。”


    虽然联邦层面的监管在国会迄今停滞不前，但在州层面出现了一些有趣的发展。2019 年 10 月，加利福尼亚州签署了一项法律，将在选举前 60 天内恶意分发或创建关于政治候选人的“实质性欺骗性”媒体定为犯罪。（如果“理性人”对篡改过的照片或视频与原始版本相比有“根本不同的理解或印象”，则该内容被视为具有欺骗性。）“深度伪造”一词并未出现在该法律的文本中，但该法律被昵称为“加州深度伪造法”，并且它确实直接受到深度伪造及其对该州民主制度构成的威胁的启发。


    加州的法律规定了一些例外情况，例如讽刺作品以及带有声明其为虚假内容的免责声明的视频，但言论自由倡导者对此表示反对并质疑其合宪性（专门关注选举和 60 天窗口期是为了帮助缓解此类担忧）。与此同时，加州还颁布了一项法律，禁止未经同意的色情深度伪造。一个月前，德克萨斯州成为第一个对深度伪造进行立法的州，将“意图影响选举结果”使用深度伪造的行为定为犯罪。然而，法律学者指出，深度伪造在选举之外也可能非常危险（例如，当视频在法庭上用作证据时），而且，为了执行这些深度伪造法律，需要能够证明相关视频确实是深度伪造——正如你现在所知，这并非易事。


    即使联邦政府的立法部门在应对深度伪造挑战方面一直持谨慎态度，但它——至少在纸面上——已努力进行自我监管。2020 年 1 月 28 日，美国众议院道德委员会发布了一份题为“故意使用视听扭曲与深度伪造”的官方备忘录，其中包含以下文本：


    *   议员或其工作人员发布深度伪造内容可能会侵蚀公众信任、影响公共讨论或左右选举。因此，发布深度伪造或其他旨在误导公众的视听扭曲内容的议员、官员和工作人员可能违反了《官方行为准则》。在通过包括社交媒体在内的电子方式传播任何图像、视频或音频文件之前，议员和工作人员应尽合理努力考虑此类内容是否为深度伪造或是否被故意扭曲以误导公众。


    这项《官方行为准则》的执行严格程度如何，仍有待观察。

    '
- fmt: '# Dismissing Valid Evidence


    In the tense months leading up to the 2020 election, a congressional candidate
    running for a House seat in Missouri wrote and shared a twenty-three-page document
    titled "George Floyd is Dead: A Citizens'' Investigative Report on the Use of
    Deep Fake Technology." In it, she argued that the viral video showing the police
    murder of George Floyd that sparked national outrage was actually a deepfake.
    She claimed the person seen in the video was an actor with the countenance of
    Floyd (who supposedly died in 2017) face-swapped in. She said^([^(88)](#fn88))
    the video was a false flag operation intended to "stoke racial tensions between
    Black and white Americans" and reinvigorate the "flailing radical Black Lives
    Matter movement." It was an absurd and unfounded conspiracy theory. Thankfully,
    she lost in the primary. But she was not alone in using the mere existence of
    deepfake technology in attempts to distort the public''s understanding of reality.


    A number of people have argued that the biggest threat from deepfakes is not the
    direct deception they are capable of—it is the general erosion of trust they lead
    to in society and the cover they provide to nefarious individuals now to plausibly
    deny damning videographic evidence by simply crying deepfake. Further into his
    opening remarks from the June 2019 hearing that began this chapter, Adam Schiff
    presciently warned that "not only may fake videos be passed off as real, but real
    information can be passed off as fake. This is called the liar''s dividend, in
    which people with a propensity to deceive are given the benefit of an environment
    in which it is increasingly difficult for the public to determine what is true."


    As you surely remember, just one month before the 2016 presidential election,
    the *Washington Post* published an article accompanied by the now-notorious "*Access
    Hollywood* tape" from 2005 in which Donald Trump makes extremely lewd comments
    about women in off-camera audio that was recorded presumably without his knowledge.
    This story broke just two days before one of the presidential debates, and Trump
    responded by admitting he made the remarks caught on tape and apologized for them
    but also attempted to minimize their significance as "locker room banter." One
    year later, Trump quite bizarrely and brazenly started claiming^([^(89)](#fn89))
    the audio on that tape was fake and that he didn''t say the words we heard.


    Responding to this assertion in a CNN interview with Anderson Cooper, the soap
    opera actress Arianne Zucker who was the subject of some of Trump''s vulgar comments
    in the *Access Hollywood* tape had this to say: "I don''t know how else that could
    be fake, I mean, unless someone''s planting words in your mouth." *Access Hollywood*
    responded as well: "Let us make this perfectly clear, the tape is very real. He
    said every one of those words." Nonetheless, Trump reportedly said^([^(90)](#fn90))
    in multiple private conversations that he''s not sure if it was really him in
    the tape, and in January 2017 he told a senator he was "looking into hiring people
    to ascertain whether or not it was his voice."


    Perhaps deepfake technology in 2021 and beyond finally provides the cover Trump
    sought in 2017 to explain the damaging recording from 2005 that surfaced during
    his campaign in 2016. But the same technology that might have allowed him to discount
    the *Access Hollywood* tape is what led some people not to believe the authentic
    recorded reassurances about his health during his battle with COVID-19.


    # Summary


    Deepfake video editing is a wide range of methods for modifying video clips to
    change the words people say and the people who say them. It is powered by deep
    learning, most commonly the GAN architecture in which two algorithms are pit against
    each other and through the data-crunching training process the generator learns
    to routinely fool the discriminator. This technology first appeared in 2017 when
    it was used to make nonconsensual pornography, and it now threatens society''s
    ability to discern the truth. Conspiracy theorists call legitimate videographic
    evidence (such as George Floyd''s murder by the police) into question by claiming
    it is deepfake, and corrupt politicians are now granted a powerful tool: they
    can dismiss incriminating clips as deepfake. Meanwhile, innocent journalists and
    politicians have had their reputations tarnished when their faces were deepfake
    swapped into sexual clips. Algorithmically detecting deepfakes has proven challenging,
    though there is sustained effort in that realm and some glimmers of hope. Legislative
    attempts to limit the spread of deepfakes by regulating their usage have so far
    stalled at the national level; at the local level, there has been some concrete
    action, but the impingement of free speech they necessitate leaves their constitutionality
    in question. This chapter was all about the algorithms used to edit videos; in
    the next chapter, I turn to another algorithmic aspect of videos: YouTube recommendations.


