    # 排版后的内容


    哈佛大学研究人员最近一项关于 2020 年大选中邮寄选票欺诈虚假信息宣传活动的研究^(⁴)，详细列举了假新闻故事的具体案例。这些故事最初源于编辑标准极低的低端出版物，随后通过系统向上传播，并在此过程中横向扩散。例如，2020
    年 8 月《纽约邮报》的一篇文章仅依据一位匿名消息来源（据称是一名民主党特工）未经证实的信息，声称此人几十年来一直从事各种选民欺诈活动以利民主党。不久之后，《烈焰》、《布莱巴特》、《每日电讯》和《华盛顿观察家》等媒体纷纷发布了该故事的版本，最终它传到了《福克斯新闻》，并在塔克·卡尔森的节目和《福克斯与朋友们》中进行了报道。哈佛研究人员甚至认为（尽管缺乏太多量化证据），在质疑
    2020 年总统选举结果这一特定背景下，主流新闻媒体对虚假信息的病毒式传播负有比备受诟病的社交媒体更大的责任。我将在第 8 章重新讨论这个话题。


    这种新闻业的现状——用花哨的标题和煽情的内容吸引读者注意力比质量更重要，而对真相的忠诚只是事后才考虑的事情——对于有历史意识的人来说可能似曾相识。事实上，19
    世纪末 20 世纪初所谓的“黄色新闻”——那些在街角兜售、标题吸睛但内容匮乏的报纸——与当今在线媒体生态系统存在许多相同的弊病。要理解我们如何摆脱这一困境，回顾过去并看看当时是如何解决的不无裨益。


    ## 历史背景


    西奥多·罗斯福曾哀叹，他担任总统期间的报纸“习惯性地、持续地、作为商业惯例，实践着人类已知的各种谎言形式，从压制真相、暗示虚假到直接撒谎。”^(⁵) 就在他上任前，在一个最极端的案例中，假新闻帮助发动了美西战争。威廉·伦道夫·赫斯特知道战争将极大地促进他的报纸销量，但当他在哈瓦那的一名记者告诉他不会发生战争时，赫斯特宿命般地回应道：“你提供图片，我来提供战争。”随后，赫斯特在他的《晨报》上刊登了古巴官员对美国妇女进行脱衣搜查的假图画，他利润丰厚的战争很快随之而来。^(⁶)


    解决不可信报纸问题的方案是*订阅模式*，该模式由《纽约时报》在世纪之交引入，旨在刻意使新闻业更加可靠。它奏效了，并在整个 20 世纪成为行业规范。通过订阅模式，被内容误导或失望的读者会取消订阅并转向竞争对手的报纸，因此出版商有直接的经济激励来维持高质量、真实的新闻报道。简而言之，客户最终是在为声誉付费，而不仅仅是标题。


    21 世纪在某些方面将新闻业带回了 19 世纪，因为与 20 世纪读者只订阅一两个新闻来源的订阅模式不同，现在有了社交媒体和新闻聚合器，对许多读者来说，新闻机构本身已退居标题之后。^(⁷)
    浏览谷歌新闻的头条故事，与站在 19 世纪的街角听报童吆喝最新标题以诱使你上钩，并无太大区别。但当时与现在的主要区别在于：(1) 互联网带来的规模效应——不再是少数几家报纸争夺街角销售，而是无数网站争夺点击量；(2)
    详细的页面浏览量数据，这基本上使整个新闻博客圈成为一个旨在最大化点击量（高于一切）的大型量化实验。简而言之，当代由页面浏览量驱动的新闻，就是令人遗憾的 19
    世纪黄色新闻的数字增强版。


    然而，也有一些希望的迹象。正如《纽约时报》在 20 世纪初开创了印刷订阅模式一样，《华尔街日报》在 21 世纪初开创了在线订阅模式（*付费墙*），随后《纽约时报》、《华盛顿邮报》以及许多其他享有盛誉的新闻机构也纷纷效仿——可以说，这一举措在纠正早期许多弊端方面取得了巨大成功。读者向这些机构支付月费，以获取和支持高质量的新闻报道。


    订阅模式的一个主要缺点是，它为获取高质量新闻设置了经济障碍，因此经济条件较差的人更容易依赖准确性较低的新闻——这可能导致危险的社会经济紧张和分裂。确实，一个可怕的想法是，中上层美国人能够负担得起阅读《纽约客》、《大西洋月刊》和《华尔街日报》，而底层民众则只能阅读完全依赖广告收入、因此由页面浏览量驱动的免费在线报纸。


    此外，订阅模式对于除最大型机构之外的所有机构来说根本不是一个可行的选择。21 世纪媒体格局最积极的方面之一是，它比以往任何时候都更加民主化和多样化。我们不再需要依赖少数几个守门人来告诉我们世界上正在发生什么。传统上被排除在主流媒体之外的声音现在首次被听到。但没有人愿意订阅几十种不同的报纸；由于订阅费用不菲，人们会非常有选择性地决定克服哪些付费墙。结果是，通常只有覆盖范围广、受众面大的机构才有可能获得付费订阅者的财务支持。对于其他机构来说，广告收入是唯一可用的财务模式。


    幸运的是，即使在免费博客领域，也闪烁着希望之光。例如，在 COVID-19 大流行初期，一篇篇幅长、技术性强且研究深入的博客文章^(⁸)最终获得了超过四千万的阅读量，并可能在改变政府应如何应对大流行的政治话语方面发挥了重要作用。这篇文章与点击诱饵截然相反，它表明在适当的背景下，真正有实质内容的东西能够吸引惊人的页面浏览量。正如许多具有环保或社会意识的消费者现在会根据所购公司的观点和价值观来选择购物地点一样，也许新闻消费者已经准备好将页面浏览量视为有影响力的货币，并更有意义、更审慎地使用它。


    然而，在你变得过于乐观之前，我想讲述一些关于页面浏览量新闻如何推动假新闻传播并塑造我们政治现实的具体故事。

    '
- fmt: '# Examples of Fake News Peddlers


    Paris Wade and Ben Goldman were both twenty-six years old in 2016 when the website
    they ran together, `LibertyWritersNews.com`, accumulated tens of millions of pageviews
    in the span of six months; ninety-five percent of the site’s traffic came from
    the eight hundred thousand followers they acquired on Facebook during this period.
    At its peak, their monthly revenue reached upwards of forty thousand dollars.
    Prior to this venture, they were both unemployed restaurant workers.


    Wade and Goldman would studiously follow the analytics of their “news” stories
    after posting them to see what brought in the most readers. Here’s a typical headline
    for one of their posts: “THE TRUTH IS OUT! The Media Doesn’t Want You To See What
    Hillary Did After Losing….” Wade explained to the *Washington Post*^([⁹](#fn9))
    that “Nothing in this article is anti-media, but I’ve used this headline a thousand
    times. Violence and chaos and aggressive wording is what people are attracted
    to.” Goldman added: “Our audience does not trust the mainstream media. It’s definitely
    easier to hook them with that.” Wade followed up: “There’s not a ton of thought
    put into it. Other than it frames the story so it gets a click. We’re the new
    yellow journalists. We’re the people on the side of the street yelling that the
    world is about to end.”


    Why were Wade and Goldman so open with a journalist from the left-leaning, mainstream
    media *Washington Post*? Because they didn’t care. They didn’t believe a word
    of what they wrote on their website, but they knew their readership was never
    going to see—let alone trust—an article in the *Washington Post*, so they were
    happy to brag about their business success and have a laugh about all the suckers
    they have been duping with unabashedly fake news. In 2018, it was uncovered that
    Wade and Goldman were also involved in the fake news scheme run out of Macedonia
    before the 2016 presidential election that has generated a lot of press coverage
    for the possibility that it helped tilt the balance of the election to Trump.
    At the time when this Macedonian connection was first reported, Wade was running
    for Nevada state assembly; he lost to the Democratic contender—fortunately so,
    I think we can all agree.


    Christopher Blair, along with some friends, launched a fake right-wing news site
    on Facebook during the run-up to the 2016 presidential election. He was profiled
    in a tell-all story^([^(10)](#fn10)) in the *Washington Post*. But Blair had even
    less to hide than Wade and Goldman, for Blair’s site was openly satirical. Indeed,
    Blair was a liberal blogger, and his site started simply as a practical joke among
    friends to poke fun at the extremist ideas spreading among the far right and to
    reveal the gullibility of people who couldn’t tell obvious fake news from reality.
    Blair invented far-right, and far-fetched, stories about “California instituting
    sharia, former president Bill Clinton becoming a serial killer, undocumented immigrants
    defacing Mount Rushmore, and former president Barack Obama dodging the Vietnam
    draft when he was nine.” While doing this, he realized that “The more extreme
    we become, the more people believe it.”


    Even though Blair’s site was openly satirical—it included fourteen disclaimers,
    one of which directly stated that “Nothing on this page is real”—for a time it
    became the most popular page on Facebook among Trump-supporting conservatives
    over fifty-five. His stories, which reached an audience of up to six million monthly
    visitors, were often taken seriously and wound up on the same Macedonian fake
    news farm that Wade and Goldman were involved in—despite Blair’s supposed attempts
    to cast his followers and likers and sharers as ignoramuses and pawns. Part of
    the problem with Blair’s approach here, as you’ll see throughout this book and
    especially in Chapter [8](../Text/508514_1_En_8_Chapter.xhtml), is that social
    media provides news articles with a life and trajectory of their own and frequently
    strips articles of their original context and intent.


    For a while, Blair liked to let people share his articles and then call them out
    for spreading his fake news—he thought that publicly embarrassing people would
    lead them to think more critically about what they shared online—but the site’s
    popularity among true believers grew at a staggering rate nonetheless. On his
    personal Facebook page, he once wrote: “No matter how racist, how bigoted, how
    offensive, how obviously fake we get, people keep coming back. Where is the edge?
    Is there ever a point where people realize they’re being fed garbage and decide
    to return to reality?” Perhaps Blair was underestimating the intense gravitational
    pull of the pageview-driven blogosphere—or perhaps he was well aware of it and
    simply enjoyed profiting from it financially.


    In November 2016, *NPR* tracked down^([^(11)](#fn11)) the author of one particular
    fake news story that went viral during the election, to try to understand where
    such things come from. The article’s headline was “FBI Agent Suspected In Hillary
    Email Leaks Found Dead In Apparent Murder-Suicide.” It was published in what appeared
    to be a local newspaper called the *Denver Guardian*, and despite being completely
    fabricated, it was shared on Facebook over half a million times. The website for
    this newspaper had the local weather but only one news story, this fake one. Some
    clever online detective work led to the identity of the individual behind this
    fake local newspaper, who turned out to be Jestin Coler, a forty-year-old registered
    Democrat and father of two.


    Coler claimed he entered the fake news business in 2013 with similar intentions
    as Christopher Blair: “The whole idea from the start was to build a site that
    could kind of infiltrate the echo chambers of the alt-right, publish blatantly
    false or fictional stories and then be able to publicly denounce those stories
    and point out the fact that they were fiction.” After realizing how easily and
    rapidly his stories were spreading, Coler decided to capitalize on this endeavor
    and ended up forming a fake news company that employed a couple dozen writers
    and spanned an undisclosed number of websites, including the one for the *Denver
    Guardian*—a site that, according to Coler, collected over one and a half million
    views in a ten-day period. In describing the fake FBI agent story, Coler said:
    “Everything about it was fictional: the town, the people, the sheriff, the FBI
    guy. And then … our social media guys kind of go out and do a little dropping
    it throughout Trump groups and Trump forums and boy it spread like wildfire.”
    As it and other fake stories written by his company spread across the country,
    Coler was making around twenty thousand dollars per month from ad revenue.


    One consequence of the shifting economic forces in journalism has been the decimation
    of regional newspapers. As I discuss next, Coler’s fake Denver-based newspaper
    was not an isolated invention: nefarious entities have found strategic ways to
    fill the journalistic vacuum left behind as authentic local newspapers have gone
    out of business.'
