    2020 年大选的研究^(²⁷⁷)发现，极右翼内容产生的互动比任何其他党派群体都多，而极右翼虚假信息产生的互动比极右翼事实内容高出 65%。这意味着，任何以互动为优化指标的推荐/排名算法，都会优先推送极右翼虚假信息。而且，Facebook
    和大多数其他社交媒体平台都围绕最大化互动这一目标而构建，并将这一优先级融入其所有算法中，这已不是什么秘密。


    在本章后面，我将详细介绍 Facebook 在其平台上打击虚假信息传播所使用的算法方法——但首先，在继续铺垫背景的同时，通过退一步审视 Facebook 上假新闻的更大背景，并聚焦于几个说明所涉问题的具体例子，来预览这一主题会有所帮助。

    '
- fmt: '### Facebook’s Problems and Reactions


    The *Wall Street Journal* reported^([^(278)](#fn278)) that from the morning of
    January 6, 2021 (the day of the Capitol building insurrection) to the afternoon,
    Facebook’s internal team of data scientists noted a tenfold increase in user-reported
    violent content on the platform; user reports of fake news surged to forty thousand
    per hour, which was quadruple the peak from prior days. Leadership at Facebook
    feared a dangerous feedback loop in which incendiary material online inspires
    more violent real-world action which then leads to even more attention on social
    media and so on. We all know that Facebook responded within hours by taking down
    posts by President Trump and announcing that he was suspended from the platform
    indefinitely. But Facebook also privately designated the United States a “temporary
    high-risk location” for political violence, which “triggered emergency measures
    to limit potentially dangerous discourse” on the platform, though it was not revealed
    exactly what this meant. Facebook tried to dodge the blame for the events that
    transpired on January 6 when Sheryl Sandberg, the Chief Operating Officer, brazenly
    said that “these events were largely organized on platforms that don’t have our
    abilities to stop hate, don’t have our standards and don’t have our transparency.”


    In the days after the Capitol building insurrection, it was reported^([^(279)](#fn279))
    that Facebook was showing ads for weapons accessories and body armor in “patriot”
    and militia-themed Facebook groups alongside pro-Trump disinformation about the
    election being rigged and stolen. Two days later, three US Senators co-authored
    a public letter to Facebook founder and CEO Mark Zuckerberg urging him to take
    immediate action to halt these ads that they described as “designed to equip white
    nationalists, neo-Nazis and other domestic extremist organizations.” The next
    day, Facebook acquiesced and announced it was immediately halting all such ads
    for a week, only allowing them to return after the upcoming inauguration. But
    the day after this announcement, it was found that many of these dangerous ads
    had not been taken down. A few weeks later, Facebook began experimentally reducing
    the amount of political content for a sample of users^([^(280)](#fn280)) in an
    effort to “turn down the temperature and discourage divisive conversations and
    communities,” with the aid of a machine learning algorithm trained to identify
    political content.


    Flashback to November 19, 2016, less than two weeks after Donald Trump’s surprising
    election victory. Mark Zuckerberg posts^([^(281)](#fn281)) a message on his Facebook
    account that begins: “A lot of you have asked what we’re doing about misinformation,
    so I wanted to give an update.” After saying that “we know people want accurate
    information,” he goes on to admit that “The problems here are complex, both technically
    and philosophically” and that Facebook is taking an indirect approach: “We do
    not want to be arbiters of truth ourselves, but instead rely on our community
    and trusted third parties.” He lists several projects underway in the fight against
    misinformation, the first and “most important” being stronger detection: “This
    means better technical systems to detect what people will flag as false before
    they do it themselves.” Zuckerberg is implying here that out of all the approaches
    to limit the spread of misinformation on his platform, the primary one is developing
    predictive machine learning algorithms.


    A curious subtlety to note here is that what he has in mind is not the supervised
    learning task of classifying posts as true or false, but instead a somewhat less
    epistemological classification into posts likely to be flagged by users versus
    posts unlikely to be flagged. This nuanced distinction matters: whether or not
    a post in a private group gets flagged as misleading depends a lot on what the
    focus of the group is. Regardless, the main takeaway here is that in the wake
    of the 2016 election, Zuckerberg was advocating a technical—and specifically,
    machine learning—approach to moderating his platform. In numerous public statements
    before and after this, Zuckerberg has maintained this philosophy that AI will
    be the company’s panacea when it comes to thorny societal problems like the spread
    of harmful misinformation. But a lot transpired between that presidential election
    and the next, and one of the main goals of this chapter is to discuss what algorithmic
    approaches Facebook actually tried and how well they worked and what other algorithmic
    methods might be possible.


    Facebook continually tweaks its platform—especially the enormously influential
    newsfeed algorithm that decides what posts we are all shown and in what order—usually
    through controlled experiments in which a random group of users is provided with
    the modified platform and all the other users serve as the control group. This
    is a scientific approach to product development inspired by the randomized controlled
    trial that revolutionized medical research in the 20th century (where the control
    group is the one given placebos); it has swept through Silicon Valley, where it
    goes by the name *A/B testing* and is made possible by the tremendous amount of
    data that tech companies, especially the tech giants, are able to quickly and
    cheaply obtain.


    Just like in medical science, not all experimental treatments are successful.
    Shortly after Trump’s 2016 election victory, Facebook trialed a quite simple algorithmic
    approach to mitigating fake news that didn’t rely on machine learning or professional
    human moderators. The idea was that when a shared article is fake news, very often
    astute readers recognize this and post comments calling out the article as fake,
    sometimes even explaining why it is fake and providing evidence supporting the
    assertion. But these helpful comments get buried under the deluge of other comments,
    so Facebook’s experiment was just to automatically promote any comment containing
    the word “fake” to the top of the comments section. This seemed like a fairly
    straightforward way to help inform readers about potential fake news.


    What was the result of this experiment? People in the group where this comment
    promotion method was implemented were for the most part angry, confused, less
    able to tell what was fake versus real, and less confident in Facebook’s ability
    to stem the flow of misinformation. Why? Because suddenly the first thing these
    users saw under nearly every article about politics and politicized topics like
    the economy and climate change from the most reputable news organizations like
    *BBC News*, the *New York Times*, the *Economist*, etc. were comments proclaiming
    the story to be fake. Rather than helping people spot actual fake news, this made
    real news look fake and left readers in a world where nothing, and hence everything,
    was believable. Jen Roberts, a freelance PR consultant, captured it well when
    she said^([^(282)](#fn282)) that “to question the veracity of every single story
    is preposterous” because this “blurs the lines between what is real and what isn’t”
    and turns Facebook newsfeeds into “some awful Orwellian doublethink experiment.”
    Suffice it to say, this was one A/B test that when the experiment concluded Facebook
    decided to trash the modification and go back to the way things were, imperfect
    as they were.'
