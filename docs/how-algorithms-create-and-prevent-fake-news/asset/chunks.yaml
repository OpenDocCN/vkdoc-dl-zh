  trans: '

    ### 谷歌广告中的种族主义


    最早认识到并仔细研究算法可能对社会造成有害影响的学者之一是哈佛大学教授拉塔尼娅·斯威尼。在 2013 年的一篇研究论文中^(²⁴⁶)，她研究了当用户搜索通常与非裔美国人相关的名字时，谷歌的逮捕记录广告出现频率为何高于搜索白人名字。事实上，她发现搜索自己的名字“Latanya
    Sweeney”时，会出现一家名为*Instant Checkmate*的公司投放的谷歌搜索广告，暗示她有逮捕记录（实际上她没有），而搜索几个更典型的白人名字时则没有出现此类广告。


    在论文的结论部分，斯威尼思考了这种不体面的算法广告行为的成因：“为什么会出现这种歧视？这是 Instant Checkmate、谷歌还是社会的错？要回答这个问题……需要进一步了解谷歌
    AdSense 的内部运作机制。”她接着解释说，谷歌允许广告商为同一关键词搜索提供多个不同的广告，并以概率方式展示这些广告：最初，它们有均等的几率出现在搜索结果中，但随着人们以不同频率点击不同版本的广告，谷歌的算法会更新概率，使得更受欢迎的广告更频繁地展示。Instant
    Checkmate 表示，其广告中的不同信息是按姓氏而非名字分组的，因此其逮捕记录广告在典型非裔名字中比白人名字出现得更频繁，这意味着人们点击非裔名字的逮捕记录广告的频率高于白人名字。因此，这里的种族主义源于整个社会——但谷歌的算法助长了它并使其加剧。


    最近，2020 年 7 月，科技新闻网站*Markup*的两名调查记者进行了一项调查^(²⁴⁷)，研究了谷歌的*关键词规划师*，该工具为广告商推荐与其广告关联的词语，以便广告出现在相关的谷歌搜索中。他们发现，针对“Black
    girls”、“Latina girls”和“Asian girls”这些短语推荐的大多数关键词都是色情内容，针对这些族裔的男孩的推荐也是如此；而对于“white
    girls”和“white boys”，则完全没有返回任何关键词。调查记者们一针见血地总结了这一情况：“谷歌的系统存在种族偏见，将有色人种等同于物化的性化对象，同时完全免除了白人与任何关联。……由于没有提供大量非色情建议，这个系统使得试图通过产品和服务触及年轻黑人、拉丁裔和亚裔人群生活其他方面的营销人员变得更加困难。”


    *Markup*的一项更近期的调查揭露了谷歌在 YouTube（如你所知，YouTube 归谷歌所有）上投放广告的种族主义问题。2020 年 6 月，就在警察谋杀乔治·弗洛伊德事件发生几周后，YouTube
    首席执行官写道^(²⁴⁸)：“我们致力于作为一个平台做得更好，以聚焦和放大黑人的声音和观点。……在 YouTube，我们相信黑人的命也是命，我们都需要做更多来消除系统性种族主义。”但十个月后，在
    2021 年 4 月，*Markup*发现^(²⁴⁹)谷歌屏蔽了“Black Lives Matter”作为广告商寻找视频和频道投放广告的搜索短语。这使得该运动中的参与者更难通过视频获利，从而剥夺了他们一个宝贵的收入来源，同时也阻止了那些希望投放支持该运动广告的人接触到合适的受众。


    当潜在广告商在谷歌广告平台上搜索“White Lives Matter”（南方贫困法律中心将其描述为“对民权运动‘黑人的命也是命’的种族主义回应”）时，有超过三千万个
    YouTube 视频被返回作为可能的广告投放位置；相比之下，搜索“Black Lives Matter”则返回了零个视频。搜索“White Power”返回了超过一亿个视频，而搜索“Black
    Power”则返回了零个视频。在*Markup*记者将这些发现告知谷歌后，谷歌屏蔽了与白人至上主义相关的短语，如“White Lives Matter”和“White
    Power”，使其不再出现在广告搜索中，但并未解除对相应黑人短语的屏蔽——尽管人们普遍认为，白人短语是仇恨运动的一部分，而黑人短语是合法的社会正义和反种族主义运动的一部分。奇怪的是，*Markup*发现谷歌甚至开始屏蔽更多搜索短语，如“Black
    in Tech”和“antiracism”。我能想到的屏蔽这些短语以及“Black Lives Matter”的唯一可能借口是，正如*Markup*记者所指出的，这确实让批评者更难通过反
    BLM 视频获利——但至少对我来说，这并不能证明这些相当隐秘的算法调整所造成的不平等对待是合理的。


    再往前追溯，2017 年 9 月，*BuzzFeed News*的一项调查^(²⁵⁰)发现，当广告商试图针对某些偏执的短语定位受众时，谷歌不仅允许这样做，还会自动建议广告商考虑使用更具攻击性的搜索短语。例如，当广告商使用“Why
    do Jews ruin everything”作为定位广告的搜索短语时，谷歌还建议使用“the evil Jew”和“Jewish control of
    banks”。这些建议并非来自谷歌员工的头脑——它们是基于谷歌从其收集的海量搜索数据中，其渴求数据的算法所吸收的统计关联。*BuzzFeed*通过使用这些目标搜索短语投放广告来测试该系统，广告确实上线了，并且当有人在谷歌上搜索这些短语中的任何一个时，广告就会出现。


    ### Facebook 广告与种族主义


    Facebook 允许广告商从庞大的类别列表中进行选择以定位受众。例如，如果你销售宠物产品，你很可能可以找到一个“爱狗人士”类别，并付费发布*推广帖子*，这意味着你的广告将被投放到该类别用户的新闻推送中。在传统媒体广告中，广告商可以瞄准的不同目标受众是手动组织的，并且相当宽泛——而在
    Facebook 上，广告类别是通过算法创建和管理的，使广告商能够真正将营销活动集中在利基目标受众上。Facebook 创建可能广告类别列表并决定哪些用户属于哪个类别的算法，毫不意外地依赖于复杂的机器学习——但同样毫不意外的是，细节被公司秘密所掩盖，因此我们只知道大致轮廓。


    该算法会考虑用户在 Facebook 个人资料中明确写下的内容（例如，如果你在*兴趣*字段中列出了狗，那么你很可能被标记为爱狗人士类别），但它也会从你在线活动中更隐含的信息中收集你的兴趣，例如你的帖子（如果你分享了一篇关于最佳犬种的文章，算法很可能会判断出你是一个爱狗人士）、你点赞或评论的其他用户的帖子、你关注了谁以及你的好友网络中有谁，等等。这里需要记住的关键点是，Facebook
    不仅仅是在决定其近 30 亿用户属于哪些广告组——它还在通过算法创建和命名这些组。而这正是偏执问题开始出现的地方。

