    ### 2019 年报告


    2019 年 9 月，一家名为*全球虚假信息指数（GDI）*的英国非营利组织发布了一份报告^(²⁴¹)，分析了虚假新闻网站上的广告投放情况。该报告的研究人员首先收集了一份包含
    1700 个网站的清单，这些网站曾被*PolitiFact*等事实核查机构标记为发布包含虚假新闻的内容。他们发现，`Google` 在这些可疑网站中的高达
    70% 上投放了广告；第二大贡献者是 `AppNexus`，在 8% 的网站上投放了广告；排名第三的是 `Amazon`，占比为 4%。


    通过估算这些网站获得的月页面浏览量，并应用市场平均广告费率，`GDI` 的研究人员对这些 1700 个网站的年广告收入进行了粗略估算。这些网站被认为代表了已知发布虚假新闻的更大范围的
    20000 个网站。通过将这 1700 个网站的收入估算外推到这更大的范围，`GDI` 的研究人员得出结论：虚假新闻行业在 2019 年带来了近 2.5 亿美元的收入——其中
    `Google` 估计贡献了 8700 万美元，是所有广告交易平台中金额最大的。这意味着 `Google` 当年贡献了虚假新闻行业近 40% 的收入^(²⁴²)；奇怪的是，这几乎与
    `Google` 在备受尊敬的真实新闻网站中所占的广告收入份额完全相同。换句话说，`Google` 在真实和虚假新闻网站的广告市场中占据着同等主导地位的份额。


    这一点值得重申：虚假新闻是一门*大*生意，2019 年在线广告收入价值近 2.5 亿美元——至少根据 `GDI` 的估计是如此——而 `Google` 在这部分收入中所占的份额比任何其他广告公司都大。如果
    `Google` 自 2016 年大选以来真的试图切断流向虚假新闻网站的资金流，那么显然到 2019 年，这方面仍有相当大的改进空间。


    ### 2021 年报告


    新闻评级公司 *NewsGuard Technologies* 于 2021 年 1 月发布了一份报告^(²⁴³)，研究了发布关于 2020 年美国总统大选虚假新闻的网站上的广告投放和收入情况。`NewsGuard`
    标记了 160 个“因发布关于选举的谎言和阴谋论”的网站，并发现从 2020 年 10 月 1 日到 2021 年 1 月 14 日，这些网站投放了来自 1600
    多个不同品牌的超过 8000 条独特广告；其中约 40% 的品牌在不止一个被标记的网站上投放了广告。据信，许多品牌是在不知情的情况下这样做的，并且很可能对与最终在国会大厦暴乱中扮演了角色的选举虚假信息产生关联并提供资金支持感到不安。这些被标记的网站中，超过
    80% 的算法广告投放来自 `Google`。


    在被标记网站上投放广告数量最多的两个品牌是 `Progressive Insurance`（在 25 个网站上投放了近 300 条广告）和 `Planned
    Parenthood`（在 18 个网站上投放了 71 条广告）。`AARP`、`American Cancer Society` 和 `Sloan Kettering
    Cancer Center` 各自在少数几个网站上投放了数十条广告。这些网站包括特朗普最喜欢用来兜售其关于选举舞弊的虚假说法的网站，例如 *One America
    News Network* 和 *Gateway Pundit*。一个特别令人悲哀的讽刺是，几家备受尊敬的医疗机构无意中通过广告收入为发布有害医疗虚假信息的虚假新闻网站提供了资金。适合家庭观看的
    `Disney` 在一个“发布声称 COVID-19 是一场骗局并推广虚假病毒疗法”的网站上投放了广告。`American Express` 在 *Sputnik
    News* 上投放了广告，这是一个由俄罗斯政府控制的组织，以针对美国受众传播虚假信息而闻名。甚至 `Department of Veterans Affairs`
    和 `Department of Homeland Security` 也被发现在被标记的网站上投放了一些广告，`BBC` 也是如此。


    一位 `Google` 发言人表示^(²⁴⁴)：“关于选民欺诈普遍存在或选举被窃取的指控均被我们的政策所禁止。当我们发现违反我们政策的内容时，我们会移除其获利能力。”
    `Google` 首先会对违反其政策的单篇报道进行去货币化处理；只有在持续、严重违规的情况下，它才会对整个网站进行去货币化处理。`NewsGuard` 追踪的大多数网站发布的内容明显违反了
    `Google` 的政策——但显然，它们尚未达到 `Google` 禁止整个网站的门槛。


    2020 年 8 月，在发现 `Red Cross` 等机构的广告与 COVID-19 错误信息一同出现后，十多个大型慈善组织的领导人写了一封公开信^(²⁴⁵)给
    `Google` 母公司 `Alphabet` 的 CEO `Sundar Pichai`。他们敦促 `Google` 建立一个新的系统，“不会让[广告商]陷入不必要且有害的关联中，从而损害他们的善举和价值观”。`Google`
    似乎通过将单篇文章去货币化来回应，但除了极少数情况外，并未对屡次违规的网站采取行动。


    总而言之，`Google` 通过算法投放广告资助虚假新闻的问题——该问题首次在 2016 年大选前后引起公众关注——显然至今仍在持续。尽管有多项公开声明以及据称旨在解决该问题的算法和公司政策的各种调整，情况依然如此。在继续讨论
    `Facebook` 算法广告系统的弊端之前，我想花点时间看看 `Google` 算法广告的另一个问题：种族主义。本节到目前为止的所有讨论都集中在 `Google`
    在展示网络外部网站上的广告投放；接下来的讨论涉及 `Google` 广告的另一种形式，即广告直接投放在 `Google` 的网站上，并与用户指定的关键词搜索相匹配。

