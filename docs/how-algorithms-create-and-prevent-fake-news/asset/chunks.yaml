  trans: '

    ### 主要依赖社交媒体的人群


    皮尤研究中心在 2019 年 10 月至 2020 年 6 月期间进行的调查发现^(²⁷³)，近五分之一的美国成年人表示，他们主要依靠社交媒体获取政治和选举新闻——而在
    30 岁以下人群中，这一比例接近二分之一。在主要依赖社交媒体的人群中，不到十分之一的人表示他们非常关注 2020 年大选的新闻，而对于主要依赖有线电视或印刷新闻的人群，大约有三分之一的人表示他们密切关注。在主要从有线电视、全国性电视网络、新闻网站或应用程序获取新闻的人群中，表示密切关注新冠疫情爆发的人数比例，是主要依赖社交媒体人群的两倍。


    不仅以社交媒体为导向的参与者根据自我评估在政治和医疗新闻方面的参与度较低，他们实际掌握的知识也更少：皮尤的研究人员进行了一次简短测验，发现主要依赖社交媒体获取信息的群体中，只有
    17%的人在基本政治知识方面得分较高；而对于主要依赖有线电视或全国性电视网络的人群，这一比例约为三分之一；对于主要依赖印刷媒体、广播或新闻网站/应用程序的人群，这一比例则超过
    40%。与此同时，主要依赖社交媒体获取新闻的人接触到与疫情相关的虚假阴谋论的比例，高于所有其他媒体类别^(²⁷⁴)——然而，在社交媒体群体中，表示担心虚假信息对
    2020 年大选产生影响的人数比例，低于除主要依赖地方新闻群体外的所有其他群体。接触到阴谋论并不等同于相信它们——在某种程度上，社交媒体群体看到更多虚假信息却对此不那么担忧，这可能意味着该群体更善于辨别真伪。但知识测验中较低的表现削弱了这种乐观的解释。


    这里一个棘手的问题是因果关系与相关性的问题：是主要依赖社交媒体，从而接触到更多虚假信息，导致人们与现实脱节；还是那些对世界兴趣不大、了解不多的人，天生更容易被社交媒体消费所吸引？虽然这对某些考量来说是一个重要问题，但答案对当前的讨论基本无关紧要：关键在于，很多人——尤其是年轻人——通过社交媒体来了解世界上正在发生的事情，而他们看到的内容并非全部属实。


    接下来，让我谈谈社交媒体算法在传播假新闻方面所扮演角色的一些背景和语境。


    ### 社交媒体算法


    在推特存在的头十年里，算法会推荐关注对象，但在信息流方面并不参与：你在平台上看到的只是你关注的人发布的所有帖子的时间顺序列表。然后，在 2016 年，该公司通过创建机器学习算法来更主动地塑造你的个人体验，决定哪些帖子应该首先显示给你，根据帖子的受欢迎程度和算法预估的你对其的兴趣程度进行排序，而不仅仅是根据时间戳排序。就在
    2019 年初，推特更进一步，不仅开始向你展示你关注的人的推文，还开始展示你关注的账户所关注用户的部分推文（由算法选择）。


    这些起初可能看起来都是无害的举措，但重要的是要认识到，每当算法决定向你展示什么内容时，都存在一种风险，即虚假信息可能会被算法放大，超出其通常能够有机传播的范围。社交媒体算法通常旨在最大化各种用户参与度指标，因此，如果某个有害的阴谋论——例如新冠病毒是政府开发的生物武器，或者
    2020 年大选被窃取——引发了大量互动，那么算法就会捕捉到这一点，并更突出地展示这些虚假信息，将其传播给更广泛的受众。不用说，这不仅适用于推特，也适用于脸书的信息流以及社交媒体中的任何其他排名和推荐算法。


    一个能真正看到这种情况发生的说明性例子涉及《大纪元时报》——你在第 2 章中首次接触到这个可疑的新闻机构，当时它涉及算法批量生产的低质量新闻和假新闻；然后在第
    4 章中再次出现，当时一个与《大纪元时报》秘密关联的假新闻频道网络在 YouTube 上涌现，兜售 2020 年大选胜利被从特朗普手中窃取的谎言。《纽约时报》在
    2020 年 10 月的一项调查^(²⁷⁵)详细描述了《大纪元时报》从“一份在纽约街角免费发放、带有反华倾向的小型低成本报纸”发展成为“美国最具影响力的数字出版商之一”和“右翼虚假信息的主要传播者”的过程。


    《大纪元时报》从 2000 年创立到 2014 年经历了缓慢而稳定的增长，当时该机构的财务状况稳健，该报甚至获得了一些新闻奖项。但在 2015 年，其流量和广告收入突然下滑，据称是脸书对信息流算法进行修改的结果。作为回应，《大纪元时报》让其记者每天炮制多达五篇文章以寻求病毒式传播，其中大部分是低俗的点击诱饵。随后，随着
    2016 年大选的临近，报道方向急剧右转：该机构开始狂热支持唐纳德·特朗普及其圈子中的各种阴谋论。表面上，这被描绘成一种自然的政治联系：唐纳德·特朗普公开批评中国政府，这与《大纪元时报》长期受中国政府迫害的法轮功背景很好地吻合。但《纽约时报》的调查也揭示了其隐藏的动机：《大纪元时报》制定了一项秘密策略，利用脸书的平台和算法来迅速扩大该机构的关注度和财务状况，而选择与特朗普及其大量流行的虚假信息结盟不仅是政治性的——也是一种利用病毒式传播的马基雅维利式手段。

