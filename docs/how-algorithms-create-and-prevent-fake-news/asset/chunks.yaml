    # 引言


    你可能听说过这样的传言：Facebook 的新闻推送算法和 YouTube 的视频推荐算法正在传播假新闻；或者人工智能（AI）现在能快速生成令人信服的文章，并制作出人们从未做过或说过的视频；又或者机器学习算法将通过自动检测假新闻、将断言标记为真或假，从而拯救我们于假新闻之中。但这些说法究竟意味着什么，你又该相信什么？本书的主要目标是帮助所有背景的读者——无需数学、统计学、计算机、算法或新闻学知识——通过将关于假新闻和算法的所有调查、研究和故事汇集一处，并以简单易懂的方式将其编织成一个连贯的叙述，来理解真正发生了什么。另一个目标是教你使用一些公开可用的工具，这些工具能帮助你在对抗假新闻的斗争中尽自己的一份力。


    “如果我们不严肃对待事实、不区分真假，如果我们无法辨别严肃的论证和宣传，那我们就有麻烦了。”巴拉克·奥巴马在 2016 年 11 月 17 日，也就是唐纳德·特朗普当选为其白宫继任者仅仅九天之后，说了这番话。自那时起，人们对“假新闻”的范围和影响的认识日益加深。“假新闻”是一个统称，涵盖了*错误信息*（无论是否有意误导而传播的虚假信息）和*虚假信息*（故意虚假或误导性的信息）。同时，人们也日益认识到数据驱动算法在假新闻的创建、传播以及检测/审核中所扮演的角色。但对我们大多数人来说，假新闻和算法的故事一直难以追踪。它展开于广泛的学术出版物、新闻调查、公司公告和政府听证会中，并涉及许多听起来神秘的高科技概念。我坚信，进入这场重要讨论的门槛远没有看起来那么高，而本书正是我试图进一步降低这一门槛的尝试。


    第 1 章通过探讨博客和在线报纸的经济学来奠定基础，重点分析了导致低质量新闻泛滥的动态因素。以点击量和页面浏览量形式呈现的数据已经改变了新闻业，你将看到假新闻贩子是如何利用这一点的。第
    2 章着眼于我们在理解真假之战中的一个新发展：由 AI 合成的、无法追踪的逼真头像照片的虚假记者，以及只需点击一下按钮就能由 AI 撰写的整篇文章。你将了解这些进步背后的技术（`GPT-3`
    和深度伪造 `GANs`，并附带对机器学习的简要概述）以及它们对新闻业的影响。第 3 章通过转向深度伪造视频编辑来继续这一调查线索——解释其工作原理、能做什么以及在政治中扮演的角色。第
    4 章全部关于 YouTube 及其自动为你选择观看视频的推荐算法。本章提供了该算法的历史，包括对深度学习和强化学习的简要讨论，并探讨了对其实际工作方式的实证研究。这引出了关于
    YouTube 上假新闻和阴谋论内容的讨论，尤其是在巴西 2018 年大选以及 2016 年和 2020 年美国大选的背景下。


    在用了几个章节讨论 AI 如何创建和传播假新闻之后，第 5 章提出了一个问题：AI 能否通过判断视频中的人是否在说谎来帮助打击假新闻？这是测谎仪算法化改造的一部分，目前正在机场和其他地方进行试验。第
    6 章深入探讨了世界上最受欢迎的信息来源之一：谷歌。本章详细介绍了该公司为提升优质内容、压制假新闻和有害材料所做的努力，以及在此过程中发生的各种失败和仍然存在的挑战。第
    7 章展示了谷歌如何通过广告收入在财务上支持假新闻产业，以及 Facebook 算法分发的广告如何一直是假新闻和种族主义的持续来源。第 8 章全面审视了假新闻如何在社交媒体上传播，以及如何使用算法来检测和减缓这种传播。最后，第
    9 章收集并解释了一些公开可用的、由 AI 驱动的事实核查工具，你可以使用它们来确保你所阅读的内容是可信和真实的。


    # 致谢


    感谢乔丹·艾伦伯格、凯西·奥尼尔和弗朗西斯·苏激励我写书，并帮助我了解出版业。感谢凯伦·郝、威尔·道格拉斯·天堂、戴维·阿尔巴、杰克·尼卡斯、凯文·鲁斯、詹姆斯·文森特、伊西·拉波夫斯基、卡罗尔·卡德瓦拉德、朱莉娅·安温、迪帕·西塔拉曼、杰夫·霍维茨、希拉·弗伦克尔以及众多其他科技记者，他们所做的艰苦工作是本书赖以存在的基础。感谢杰拉尔德·赛德勒、吉姆·莫罗、亨利·科恩、丹·阿布拉莫维奇、安吉拉·吉布尼、伯恩德·斯图姆费尔斯以及我的其他老师和导师，他们帮助我成为了一名数学教授。感谢本特利大学的查理·哈德洛克、里克·奥奇斯、露西·金博尔等人，他们相信我能成为一名数据科学家，并为我提供了促成这本书的机会。感谢史蒂芬·马库斯鼓励我思考并撰写关于数学和技术更广泛背景的文章。感谢汤姆·陶利让我与
    Apress 取得联系，以及我在 Apress 的团队——希瓦·拉马钱德兰、马修·穆迪、南希·陈、丽塔·费尔南多和马克·鲍尔斯——为塑造本书并帮助其最终完成所做的一切工作。感谢我的父母鲍勃和多萝西，他们让我在家接受教育，并传递给我终身学习的热情。感谢我的兄弟杰弗里，为我们俩铺平了前进的道路。还要感谢我的妻子艾米丽和我们的女儿克莱尔，言语无法表达我的感激之情。


    # 关于作者

