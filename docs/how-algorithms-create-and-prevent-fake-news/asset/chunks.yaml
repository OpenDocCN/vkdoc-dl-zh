  trans: '

    # 撰写整篇文章


    最强大、灵活且备受赞誉的文本生成 AI 产品，由名为`OpenAI`的研究实验室开发。该实验室于 2015 年以非营利组织形式成立，由`埃隆·马斯克`等人投资十亿美元；随后在
    2019 年，其组织架构中增加了营利性部门，并再次获得十亿美元投资——这次来自单一来源：`微软`。`OpenAI`已开发出多种 AI 产品，但最受瞩目的当属其文本生成软件`GPT`，该缩写对应技术名称`生成式预训练变换器`，其具体含义我们无需深究。


    `GPT`指的是一系列产品：最初的`GPT`于 2018 年发布，反响有限；一年后，`GPT-2`问世^(²⁴)，能力达到全新水平；又过了一年，当前最先进的`GPT-3`发布，其强大功能与潜力着实震撼了社会。AI
    长期以来既引发热议也招致质疑，`GPT-3`也不例外。在撰写本书时，`GPT-3`仅限受邀用户私下使用；未来计划^(²⁵)是让`微软`独家访问其内部机制，而普通公众则可通过按次付费的方式与之交互并获取输出。


    在本章末尾，我将提供一份关于机器学习的基础速成课程，涵盖`GPT`底层工作原理；目前，我的重点是它做什么、扮演什么角色，以及它可能很快在假新闻泛滥中发挥的作用。你现在只需了解以下技术细节：在用户与`GPT`交互之前，它已从扫描书籍和网络中获取了海量文本（每次`GPT`迭代，文本量都大幅增加）。它并非直接尝试记忆这些文本，而是提取统计模式甚至抽象的
    linguistic 概念化，不过通过深度学习的魔力，`GPT`在很大程度上自主完成这些工作，我们很难确切知道它在“阅读”时真正学到了什么，以及它如何运用这些计算机化的知识。`GPT`的最终目标是利用这些模式和概念化来估算，在任意给定词序列之后，最可能出现的下一个词是什么。归根结底，这意味着用户输入一段文本作为提示，`GPT`就会逐词扩展，持续到用户满意为止。简而言之，它是世界上最大、最复杂的自动补全功能。


    关于`GPT`，首要且最重要的问题之一是：它生成的文本与人类撰写的文本有多相似？2019 年 8 月，两位学者在《外交事务》上发表了一项研究^(²⁶)，旨在检验由`GPT-2`生成的非事实性文本（即“合成虚假信息”）能否“生成关于复杂外交政策问题的、令人信服的新闻报道”。他们的结论是：虽然并非完美，但确实可以。该研究以一段由`GPT-2`生成的、表面合理但完全虚构的文字开篇：


    *   朝鲜工业对平壤经济至关重要，因为国际制裁已使其与在市场上交易的外国投资者的互动陷入停滞。据国会外交贸易委员会主席、加利福尼亚州民主党众议员泰德·刘称，偶尔向朝鲜运送货物的自由全球海关公司，因司法部压力于今年早些时候停止了贸易业务。


    该研究的作者希望实证检验此类段落究竟有多令人信服。他们向`GPT-2`输入了《纽约时报》一篇关于扣押朝鲜船只文章的前两段，并让其扩展成二十篇完整的文章长度文本；随后他们手动从这二十篇`GPT-2`生成的文章中选出了三篇最令人信服的（上文段落即取自其中一篇）。他们进行了一项包含五百名受访者的在线调查，将受访者分为四组：三组分别阅读这些手动筛选出的`GPT-2`生成文章，剩余一组则阅读《纽约时报》原文。


    他们发现，阅读原文的受访者中有 83%认为其可信，而三篇合成文章的可信度比例则在 58%到 72%之间。换言之，所有三篇`GPT-2`文章都被大多数读者认为可信，其中最佳的一篇可信度仅略低于原文。受访者还被问及是否可能在社交媒体上分享该文章，大约四分之一的人表示会——无论他们阅读的是哪个版本。


    该研究的作者得出结论：`GPT-2`已能够通过让人们仅撰写假新闻文章的开头，然后由算法生成剩余部分，从而显著扩大虚假信息宣传的规模。需要强调的是，这项研究仅仅是在评估这种技术的可行性，并非暗示现实世界中已发生此类情况。然而同样需要强调的是，这项研究针对的是`GPT-2`，而非其功能强大得多的兄弟产品`GPT-3`。


    事实上，在介绍`GPT-3`的学术论文^(²⁷)中——由开发该程序的`OpenAI`研究团队撰写——有一个章节描述了研究人员进行的一项实验，该实验与上述针对`GPT-2`的实验类似。在此实验中，研究人员向`GPT-3`输入一篇新闻文章的手写标题和副标题作为提示，让算法将其补全为一篇约两百词的短文。^(²⁸)
    将一组以此方式生成的`GPT-3`文章与一组长度相当的人类撰写的文章混合，`OpenAI`研究人员声称，人类读者判断哪些文章由`GPT-3`生成、哪些由人类撰写的平均准确率为
    52%。换句话说，人们的表现仅比随机抛硬币猜测略好一点。


    当然，`OpenAI`研究人员很可能有意设计这项研究以得出尽可能令人印象深刻的结果。如果他们使用更长的文章，人机之间的差异可能会更明显。此外，人类读者是从亚马逊众包平台`Mechanical
    Turk`招募的低薪合同工，他们并非公众的代表性样本，也没有动力投入大量时间或精力完成任务——实际上恰恰相反，他们点击任务的速度越快，报酬就越高。我很好奇，如果他们招募的是《纽约时报》的读者，并对每篇成功分类的文章给予小额奖励，准确率会是多少。尽管如此，这项实验表明，我们已经达到了这样一个阶段：AI
    能够撰写至少对许多读者而言表面令人信服的短文，而且这项技术在未来几年必将持续改进。

    '
- fmt: '2020年9月，米德尔伯里学院恐怖主义、极端主义与反恐研究中心的学者们发布了一篇关于`GPT-3`的论文^([^(29)](#fn29))。他们此前发现，`GPT-2`能够根据用户选择的主题和指定风格，生成有害、充满仇恨且具有煽动性的文本，但这并不容易做到：这需要所谓的*微调*，即对已训练的`GPT-2`算法，在所需领域和风格的文本上进一步训练，以适当聚焦其输出。这是一个僵化且脆弱的过程——作者指出，在将`GPT-2`微调以撰写白人至上主义内容后，若不回到原始的`GPT-2`并从头开始再次微调，就无法让它生成极端伊斯兰主义内容。


    但有了`GPT-3`，情况不再如此：任何用户都能轻松、即时地获得令人担忧的定制化危险输出。用他们的话说：“只需用几条推文、段落、论坛帖子或电子邮件提示`GPT-3`，模型就会无需任何额外训练而理解模式与意图。”他们的实验表明，通过简短直接的提示，他们能立即让`GPT-3`撰写类似克赖斯特彻奇枪手宣言的文本；模仿在线论坛讨论中宣扬纳粹主义、鼓吹种族灭绝的风格；以及像虔诚的`QAnon`信徒那样回答问题。他们对`GPT-3`在庞大训练过程中明显习得的一些边缘、极右翼内容感到震惊。作者没有讨论生成极端伊斯兰主义内容，但我怀疑这不会成为问题，因为这里的要点是：`GPT-3`能够仅通过提示来模仿风格，而无需像`GPT-2`那样通过微调来调整算法本身。


    但是，询问`GPT`*能否*被用来撰写具有误导性的、类似人类的文章，与询问它*是否*已在现实世界中这样做，是两回事。对于`GPT-3`，私密的邀请制访问无疑限制了其迄今为止的实际应用——尤其是用于制造假新闻等邪恶目的，因为每个获得访问权限的用户都被要求列出其专业资质，并预先说明计划如何使用该产品。尽管如此，已有一些有趣的迹象表明，不受限制的`GPT-3`在新闻领域能做什么。


    2020年8月，在热门链接聚合与留言板社交新闻网站、被誉为硅谷主流的*Hacker News*上，排名第一的帖子是一名大学生用`GPT-3`生成的假故事。^([^(30)](#fn30))
    这名学生利亚姆·波尔只是想用人工智能文本生成技术，以假名创建一个假博客，作为一次有趣的实验。从最初想法产生后的几个小时内，波尔通过联系一位已获得`OpenAI`访问权限的前博士生获得了`GPT-3`的访问权，并创建了他的第一篇假博客文章。他查看了*Hacker
    News*上热门帖子的标题，手动仿照类似风格创作了自己的标题，然后让`GPT-3`根据这些虚构标题生成文章。“实际上这超级简单，而这正是可怕之处，”他说。


    波尔确实注意到，结果在某些类别中比其他类别更具说服力。“它非常擅长生成优美的语言，但在逻辑和理性方面表现不佳，”他解释道。这缩小了他的选择范围，尤其是考虑到*Hacker
    News*主要关注计算机科学和创业。他决定专注于生产力和自助类文章。仅仅几周后，波尔的假`GPT-3`博客就吸引了2.6万名访客，其中一篇帖子在*Hacker
    News*上排名第一。随后，他在一篇真实的博客文章中揭露了骗局^([^(31)](#fn31))，解释了他玩的把戏，并称这是为了说明`GPT-3`如何轻易地扩大假新闻的生产规模。


    然而，波尔后来^([^(32)](#fn32))淡化了`GPT-3`在对抗假新闻中构成的威胁，因为根据他的亲身经历，要制造高质量的虚假信息，仍然需要人类付出相当多的努力。这也可以从《卫报》最近的一篇文章中看出。2020年9月，为了引起关注、震撼读者并制造轰动，《卫报》发表了一篇专栏文章^([^(33)](#fn33))，标题大胆：“整篇文章由机器人撰写。人类，你害怕了吗？”文章开头声称这是`GPT-3`“从零开始”撰写的。但在文章结尾，却解释了实际制作过程。


    原来，《卫报》专栏编辑团队向`GPT-3`输入了一个包含几个句子的提示，^([^(34)](#fn34))然后他们选取了`GPT-3`生成的八个不同长度的文章扩展版本，由人类编辑团队手动从这八个不同输出中拼接出各个段落（用他们的话说，是“挑选每个版本的最佳部分”）。他们还“删减了一些行和段落，并在某些地方重新调整了顺序”，但他们声称，总体而言，这“比编辑许多人类专栏文章花费的时间更少”。这篇专栏文章发表后，遭到了人工智能社区一些成员的强烈反对，他们认为《卫报》过度炒作`GPT-3`，并淡化了人类在创作中并非微不足道的作用——将这一过程的描述放在文章末尾，而开头却用了如此大胆且可能有些误导性的标题。


    话虽如此，社会在过去五年中反复学到的一个重要教训是，即使是写得相当拙劣的假新闻，也可能极具影响力。事实上，一个虚假故事越不连贯、越不合逻辑，它似乎就越有可能病毒式传播。如果你不相信我，请仔细看看`QAnon`阴谋论（或者如果你真想挑战自己的耐心，可以看看地平说运动）。哥伦比亚大学一家言论自由研究所的研究员钱德·拉金德拉-尼科卢奇说得很好^([^(35)](#fn35))：“`GPT-3`不需要为《大西洋月刊》写每周专栏就能发挥作用。它只需要能够在阅读那些可信度较低的在线内容（如推文、博客、Facebook帖子以及‘假新闻’）的用户中不引起警觉即可。”


    `GPT-3`是否提供了一种比“老式”方法——即在互联网上雇佣低薪自由职业者（或像2016年那样雇佣马其顿巨魔农场的青少年）——更便宜、更快速的生产有效假新闻的方式，仍有待观察。这个问题的答案——很大程度上取决于`OpenAI`向客户收取的价格——可能决定`GPT-3`在不久的将来究竟会在多大程度上助长假新闻的火焰。


    最近在`Reddit`上发现了一个`GPT-3`已被秘密使用的例子——我强烈怀疑类似的行为很快会蔓延到许多其他平台和在线新闻/社交媒体的角落（如果它还没有在我们未察觉的情况下发生的话）。2020年10月，软件工程师兼博主菲利普·温斯顿偶然发现了一个`Reddit`帖子，其标题是一个无害但具有挑衅性的问题：“这个用户怎么能如此迅速地发布这么多长篇、深度的帖子？”这个帖子以及发帖用户的账户后来都被删除了，但温斯顿回忆道^([^(36)](#fn36))，该帖子本质上是在问，某个特定的`Reddit`用户如何在几秒钟内对许多`Reddit`问题帖子发布长篇回复。你可能已经猜到了答案——如果是这样，那你就猜对了。'
  raw: 'In September 2020, scholars at Middlebury College’s Center on Terrorism, Extremism,
    and Counterterrorism posted a paper^([^(29)](#fn29)) on GPT-3\. They had previously
    found that GPT-2 could produce harmful, hateful, radicalizing text on topics of
    the user’s choosing and in user-specified styles, but it was not easy to do this:
    it required what is called *fine-tuning*, which means taking the trained GPT-2
    algorithm and training it further on texts in the desired realm and style in order
    to focus its output appropriately. And this is a rigid, brittle process—the authors
    noted that after fine-tuning GPT-2 to write white supremacist content, they could
    not get it to produce extremist Islamist content without going back to the original
    GPT-2 and fine-tuning it again, from scratch.


    But with GPT-3, they found, this was no longer the case: any user could easily
    and immediately get worryingly customized dangerous output. In their own words:
    “It is as simple as prompting GPT-3 with a few Tweets, paragraphs, forum threads,
    or emails, and the model will pick up on the patterns and intent without any other
    training.” Their experiments showed that with short, straightforward prompts they
    could immediately get GPT-3 to write manifestos reminiscent of the one by the
    Christchurch shooter; write in the style of online forum discussions on genocide
    promoting Nazism; and answer questions as a devout QAnon believer. They were alarmed
    at some of the fringe, far-right content that GPT-3 evidently picked up during
    its massive training process. The authors didn’t discuss producing extremist Islamist
    content, but I suspect this would not have been a problem because the main point
    here is that GPT-3 is able to mimic styles simply by prompting it rather than
    by adjusting the algorithm itself through fine-tuning as was needed for GPT-2.


    But asking whether GPT *could* be used to write misleadingly human-like articles
    is different from asking whether it *has* done so in the wild, so to speak. For
    GPT-3, the private invitation-only access has surely limited its real-world uses
    so far—especially for nefarious purposes such as creating fake news, since each
    user who has been granted access was required to list their professional credentials
    and state in advance their planned use of the product. That said, there are already
    some interesting hints of what GPT-3 turned loose can do in the journalistic realm.


    In August 2020, the post that reached the top spot on *Hacker News*—a popular
    link aggregator and message board social news site known as a staple of Silicon
    Valley—was a fake story produced by a college student with GPT-3.^([^(30)](#fn30))
    The student, Liam Porr, just wanted to create a fake blog under a fake name using
    AI text generation as a fun experiment. Within a couple hours of the initial idea,
    Porr had obtained access to GPT-3 from a former PhD student he contacted who had
    been granted access by OpenAI, and Porr had created his first fake blog posts.
    He looked at the headlines of posts that were trending on *Hacker News* and manually
    crafted his own headlines in similar styles as these then let GPT-3 create articles
    based on these made-up headlines. “It was super easy, actually, which was the
    scary part,” he said.


    Porr did notice that the results were more convincing in some categories than
    others. “It’s quite good at making pretty language, and it’s not very good at
    being logical and rational,” he explained. This narrowed down his options, especially
    since *Hacker News* largely focuses on computer science and entrepreneurship.
    He decided to concentrate on productivity and self-help articles. After only a
    couple weeks, Porr’s fake GPT-3 blog had twenty-six thousand visitors, and one
    of its posts reached number one on *Hacker News*. He then revealed the deceit
    in a real blog post^([^(31)](#fn31)) in which he explained the game he was playing
    and said it was to illustrate how easy GPT-3 makes it to scale up the production
    of fake news.


    However, Porr later^([^(32)](#fn32)) downplayed the threat posed by GPT-3 in the
    battle against fake news because, as he discovered through firsthand experience,
    it still requires a fair amount of work from humans in order to create high-quality
    disinformation. This can be seen as well in the story of a recent article in the
    *Guardian*. In an attempt to raise awareness, startle readers, and make a splash,
    in September 2020 the *Guardian* published an op-ed article^([^(33)](#fn33)) with
    the audacious headline “A robot wrote this entire article. Are you scared yet,
    human?” The article states at the opening that it was written “from scratch” by
    GPT-3\. But then at the end of the article, there is an explanation of how it
    was actually produced.


    It turns out the *Guardian* op-ed team fed GPT-3 a several-sentence prompt,^([^(34)](#fn34))
    then they took eight different article-length extensions of the prompt produced
    by GPT-3, and by hand the human editorial team stitched together various paragraphs
    from these eight different outputs (to “pick the best parts of each,” in their
    words). They also “cut lines and paragraphs, and rearranged the order of them
    in some places,” but they claim that, overall, this “took less time to edit than
    many human op-eds.” Following the publication of this op-ed, there was a strong
    backlash from some members of the AI community arguing that the *Guardian* overhyped
    GPT-3 and downplayed the not-insignificant role humans had in the composition
    by relegating this description of the process to the end of the article after
    starting with such a bold and perhaps somewhat misleading headline.


    That said, one important lesson society has learned repeatedly throughout the
    past five years is that even rather poorly written fake news can be extremely
    influential. Indeed, it often seems that the less coherent and logical a bogus
    story is, the more likely it is to go viral. If you don’t believe me on this,
    please have a close look at the QAnon conspiracy (or the flat Earth movement if
    you really want to challenge your patience). Chand Rajendra-Nicolucci, a research
    fellow at a free speech institute based in Columbia University, said^([^(35)](#fn35))
    it well: “GPT-3 doesn’t need to be writing a weekly column for the *Atlantic*
    to be effective. It just has to be able to not raise alarms among readers of less
    credentialed online content such as tweets, blogs, Facebook posts, and ‘fake news’.”


    Whether GPT-3 provides a significantly cheaper and faster way to produce effective
    fake news than the “old-fashioned” way of hiring low-paid freelancers on the internet
    (or teenagers in a Macedonia troll farm, as was the case in 2016) remains to be
    seen. The answer to this question—which largely depends on the price OpenAI charges
    customers—might determine how much GPT-3 will in fact fan the flames of fake news
    in the near future.


    A glimpse into one of the surreptitious ways that GPT-3 is already being used
    was recently found on Reddit—and I strongly suspect similar behavior will soon
    spread to many other platforms and corners of online news/social media (if it
    hasn’t done so already without us noticing). Philip Winston, a software engineer
    and blogger, in October 2020 came across a Reddit post whose title was an innocuous
    but provocative question: “How does this user post so many large, deep posts so
    rapidly?” This post and the account of the user who made it were both later deleted,
    but Winston recalls^([^(36)](#fn36)) that it essentially asked how a particular
    Reddit user was posting lengthy replies to many Reddit question posts within a
    matter of seconds. You probably already have a guess for the answer—and if so,
    you are correct.'
  trans: '

    2020 年 9 月，米德尔伯里学院恐怖主义、极端主义与反恐研究中心的学者们发布了一篇关于`GPT-3`的论文^(²⁹)。他们此前发现，`GPT-2`能够根据用户选择的主题和指定风格，生成有害、充满仇恨且具有煽动性的文本，但这并不容易做到：这需要所谓的*微调*，即对已训练的`GPT-2`算法，在所需领域和风格的文本上进一步训练，以适当聚焦其输出。这是一个僵化且脆弱的过程——作者指出，在将`GPT-2`微调以撰写白人至上主义内容后，若不回到原始的`GPT-2`并从头开始再次微调，就无法让它生成极端伊斯兰主义内容。


    但有了`GPT-3`，情况不再如此：任何用户都能轻松、即时地获得令人担忧的定制化危险输出。用他们的话说：“只需用几条推文、段落、论坛帖子或电子邮件提示`GPT-3`，模型就会无需任何额外训练而理解模式与意图。”他们的实验表明，通过简短直接的提示，他们能立即让`GPT-3`撰写类似克赖斯特彻奇枪手宣言的文本；模仿在线论坛讨论中宣扬纳粹主义、鼓吹种族灭绝的风格；以及像虔诚的`QAnon`信徒那样回答问题。他们对`GPT-3`在庞大训练过程中明显习得的一些边缘、极右翼内容感到震惊。作者没有讨论生成极端伊斯兰主义内容，但我怀疑这不会成为问题，因为这里的要点是：`GPT-3`能够仅通过提示来模仿风格，而无需像`GPT-2`那样通过微调来调整算法本身。


    但是，询问`GPT`*能否*被用来撰写具有误导性的、类似人类的文章，与询问它*是否*已在现实世界中这样做，是两回事。对于`GPT-3`，私密的邀请制访问无疑限制了其迄今为止的实际应用——尤其是用于制造假新闻等邪恶目的，因为每个获得访问权限的用户都被要求列出其专业资质，并预先说明计划如何使用该产品。尽管如此，已有一些有趣的迹象表明，不受限制的`GPT-3`在新闻领域能做什么。


    2020 年 8 月，在热门链接聚合与留言板社交新闻网站、被誉为硅谷主流的*Hacker News*上，排名第一的帖子是一名大学生用`GPT-3`生成的假故事。^(³⁰)
    这名学生利亚姆·波尔只是想用人工智能文本生成技术，以假名创建一个假博客，作为一次有趣的实验。从最初想法产生后的几个小时内，波尔通过联系一位已获得`OpenAI`访问权限的前博士生获得了`GPT-3`的访问权，并创建了他的第一篇假博客文章。他查看了*Hacker
    News*上热门帖子的标题，手动仿照类似风格创作了自己的标题，然后让`GPT-3`根据这些虚构标题生成文章。“实际上这超级简单，而这正是可怕之处，”他说。


    波尔确实注意到，结果在某些类别中比其他类别更具说服力。“它非常擅长生成优美的语言，但在逻辑和理性方面表现不佳，”他解释道。这缩小了他的选择范围，尤其是考虑到*Hacker
    News*主要关注计算机科学和创业。他决定专注于生产力和自助类文章。仅仅几周后，波尔的假`GPT-3`博客就吸引了 2.6 万名访客，其中一篇帖子在*Hacker
    News*上排名第一。随后，他在一篇真实的博客文章中揭露了骗局^(³¹)，解释了他玩的把戏，并称这是为了说明`GPT-3`如何轻易地扩大假新闻的生产规模。


    然而，波尔后来^(³²)淡化了`GPT-3`在对抗假新闻中构成的威胁，因为根据他的亲身经历，要制造高质量的虚假信息，仍然需要人类付出相当多的努力。这也可以从《卫报》最近的一篇文章中看出。2020
    年 9 月，为了引起关注、震撼读者并制造轰动，《卫报》发表了一篇专栏文章^(³³)，标题大胆：“整篇文章由机器人撰写。人类，你害怕了吗？”文章开头声称这是`GPT-3`“从零开始”撰写的。但在文章结尾，却解释了实际制作过程。


    原来，《卫报》专栏编辑团队向`GPT-3`输入了一个包含几个句子的提示，^(³⁴)然后他们选取了`GPT-3`生成的八个不同长度的文章扩展版本，由人类编辑团队手动从这八个不同输出中拼接出各个段落（用他们的话说，是“挑选每个版本的最佳部分”）。他们还“删减了一些行和段落，并在某些地方重新调整了顺序”，但他们声称，总体而言，这“比编辑许多人类专栏文章花费的时间更少”。这篇专栏文章发表后，遭到了人工智能社区一些成员的强烈反对，他们认为《卫报》过度炒作`GPT-3`，并淡化了人类在创作中并非微不足道的作用——将这一过程的描述放在文章末尾，而开头却用了如此大胆且可能有些误导性的标题。


    话虽如此，社会在过去五年中反复学到的一个重要教训是，即使是写得相当拙劣的假新闻，也可能极具影响力。事实上，一个虚假故事越不连贯、越不合逻辑，它似乎就越有可能病毒式传播。如果你不相信我，请仔细看看`QAnon`阴谋论（或者如果你真想挑战自己的耐心，可以看看地平说运动）。哥伦比亚大学一家言论自由研究所的研究员钱德·拉金德拉-尼科卢奇说得很好^(³⁵)：“`GPT-3`不需要为《大西洋月刊》写每周专栏就能发挥作用。它只需要能够在阅读那些可信度较低的在线内容（如推文、博客、Facebook
    帖子以及‘假新闻’）的用户中不引起警觉即可。”


    `GPT-3`是否提供了一种比“老式”方法——即在互联网上雇佣低薪自由职业者（或像 2016 年那样雇佣马其顿巨魔农场的青少年）——更便宜、更快速的生产有效假新闻的方式，仍有待观察。这个问题的答案——很大程度上取决于`OpenAI`向客户收取的价格——可能决定`GPT-3`在不久的将来究竟会在多大程度上助长假新闻的火焰。


    最近在`Reddit`上发现了一个`GPT-3`已被秘密使用的例子——我强烈怀疑类似的行为很快会蔓延到许多其他平台和在线新闻/社交媒体的角落（如果它还没有在我们未察觉的情况下发生的话）。2020
    年 10 月，软件工程师兼博主菲利普·温斯顿偶然发现了一个`Reddit`帖子，其标题是一个无害但具有挑衅性的问题：“这个用户怎么能如此迅速地发布这么多长篇、深度的帖子？”这个帖子以及发帖用户的账户后来都被删除了，但温斯顿回忆道^(³⁶)，该帖子本质上是在问，某个特定的`Reddit`用户如何在几秒钟内对许多`Reddit`问题帖子发布长篇回复。你可能已经猜到了答案——如果是这样，那你就猜对了。

