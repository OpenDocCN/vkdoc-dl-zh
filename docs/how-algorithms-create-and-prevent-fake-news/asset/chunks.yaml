    that search rankings matter and affect people’s views, which means there are real
    consequences when Google places fake news links highly in its search rankings.


    Dylann Roof, the neo-Nazi who in 2015 murdered nine Black people at a church in
    Charleston, South Carolina, wrote a manifesto^([^(216)](#fn216)) in which he claims
    to have been inspired by Google. He described how he typed “black on White crime”
    into Google, and he has “never been the same since that day.” He says the first
    site this search produced was for an organization called the Council of Conservative
    Citizens (CCC). It contained numerous descriptions of “brutal black on White murders.”
    He alleges that seeing this made him question the media’s attention on the Trayvon
    Martin case, and it motivated him to pursue a self-education journey on Google
    on racial matters—a journey that, as we now know, ended in unfathomable tragedy.


    While this is anecdotal evidence, it is nonetheless quite unsettling and shows
    one of the dangers of letting algorithms decide what information we should see,
    and in what order. As UCLA professor Safiya Noble pointed out in her book *Algorithms
    of Oppression* critiquing Google, the top result for Roof’s search should have
    been an authoritative source such as FBI crime statistics—which shows that most
    violence against white Americans is committed by white Americans—rather than the
    CCC, an organization whose Statement of Principles says that it “opposes all efforts
    to mix the races of mankind.”'
