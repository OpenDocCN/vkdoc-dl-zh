  trans: '

    ### 极右翼如何受到青睐


    当然，并非`YouTube`推荐的政治视频全都是极右翼内容——只是它们占据了压倒性的、不成比例的比例。其中一个驱动因素本质上是心理层面的：一些容易吸引人们观看内容并让他们保持关注（从而最大化`YouTube`算法旨在优化的参数——观看时长）的情绪，是恐惧、怀疑和愤怒——而这些正是右翼极端分子和阴谋论者多年来所依赖的情绪。此外，许多右翼评论员早已在制作长篇视频论文并发布其播客的视频版本，因此`YouTube`从观看次数转向观看时长的策略，无意中奖励了那些原本就在做这些事的`YouTube`极右翼内容创作者。


    换句话说，可能并非极右翼煽动者精心设计其信息以在`YouTube`的推荐系统中获得良好表现——而且几乎可以肯定，并非`YouTube`故意设计其算法来支持极右翼内容。相反，两者似乎独立得出了关于如何吸引受众的相似结论，从而产生了意外的协同效应。`Google
    Brain`的深度学习框架通过不断向观众推荐他们未曾接触过的、越来越具有煽动性的视频，将他们进一步推入“兔子洞”，从而放大了这种意外的协同效应。该算法只是想为用户提供新鲜、引人入胜的内容，以最大化观看时长——但事后看来，实现这一目标的最佳方式，似乎是向观众提供越来越多的阴谋论、假新闻和极右翼宣传。


    随着时间的推移，极右翼阴谋论者和政治评论员意识到他们的方法正在奏效，并且`YouTube`的算法正在提升他们的人气。甚至在他们在`YouTube`上的人气催化出一场政治运动之前，这些内容创作者就已经有经济动力去加大制作力度——无论他们自己多么清楚视频中的说法是虚假的——这要归功于`YouTube`在
    2012 年决定允许所有用户（而不仅仅是经过审核的频道）通过广告收入将视频变现。


    ### 阴谋论盛行


    推荐算法不仅增加了`YouTube`上假新闻和阴谋论的观看量，还为其披上了一层合法的外衣。即使某个特定的阴谋论看起来明显不可信，但当`YouTube`推荐一系列来自不同创作者、相互模仿的同一主题视频时，观众往往会觉得所有迹象都指向同一个隐藏的真相。巴西女权活动家`Debora
    Diniz`曾成为一场激烈的右翼`YouTube`阴谋论诽谤运动的目标，她表示^(¹¹⁴)算法的这一方面让人感觉“好像是观众自己建立了联系，但实际上联系是由系统建立的。”


    这种现象在政治领域之外的话题中也能看到。巴西的医生发现，在`Google Brain`于 2015 年重新设计推荐算法后不久，就有患者前来将`寨卡病毒`归咎于疫苗和杀虫剂（而实际上，这些杀虫剂正是用于限制这种蚊媒疾病传播的）。患者也越来越多地因为自己在健康问题上的“`YouTube`教育”而拒绝接受重要的专业医疗建议。参与《纽约时报》对巴西`YouTube`调查的哈佛研究人员发现，“`YouTube`的系统经常将搜索`寨卡病毒`信息的用户，甚至那些观看过健康问题权威视频的用户，引导至阴谋论频道。”一位`YouTube`发言人证实了这些发现，并表示公司将改变其搜索工具呈现与`寨卡病毒`相关视频的方式（在我看来，这不过是杯水车薪）。为什么人们首先要制作这些有害的医疗虚假信息视频？为什么`YouTube`要推荐它们？因为它们能吸引观众并带来较长的观看时长——这意味着它们能为这些视频的创作者和`YouTube`自身带来收入。


    ### 玩这场游戏


    回顾`YouTube`算法的时间线，还记得 2018 年`Google Brain`引入了一种名为强化学习的机器学习技术（更常用于玩游戏），使推荐算法能够制定长期策略来吸引观众吗？在
    2019 年的一次人工智能会议上，一位`Google Brain`研究人员表示^(¹¹⁵)，就推动观看时长增长而言，这是两年来`YouTube`对算法最成功的调整。她还表示，这已经在改变平台上用户的行为：“我们确实可以引导用户进入一种不同的状态，而不是推荐他们熟悉的内容。”当这种不同的`YouTube`状态是一连串极右翼阴谋视频，并最终可能导致所有巴西公民进入一个不同的政治状态——一个仇外、反科学、威权的国家时，玩这场游戏就非常危险了。“有时我在看关于游戏的视频，突然就变成了一个`博索纳罗`的视频，”巴西一位
    17 岁的高中生说道^(¹¹⁶)，该国的投票年龄是 16 岁。


    ## YouTube 在美国


    尽管`YouTube`在巴西异常受欢迎，尤其是在有投票权的年轻人中，但几乎无法想象`YouTube`将用户推向极端右翼视频的问题仅限于巴西，并且只发生在巴西。`YouTube`推荐算法对美国另类右翼运动的潜在影响——尤其是在特朗普
    2016 年大选获胜以及他试图推翻 2020 年大选失利结果的背景下，以及更广泛地，在关于假新闻和危险阴谋论运动的全国性讨论日益增多的背景下——至今仍是一个激烈争论的话题。根据
    2019 年的一项调查，特朗普 2016 年获胜前的几年，对`YouTube`来说尤其鲁莽：^(¹¹⁷)“几位现任和前任`YouTube`员工……表示，公司领导在那几年痴迷于提高用户参与度。这些员工说，高管们很少考虑公司的算法是否在助长极端和充满仇恨的政治内容的传播。”如今，`YouTube`组织内外对这一问题的认识肯定比当时要高，但这并不意味着问题已经消失。

    '
- fmt: '### Stirring Up Electoral Trouble in 2020


    On election day in 2020, hours before any of the polls had closed, eight videos
    out of the top twenty in a YouTube search for “LIVE 2020 Presidential Election
    Results” were showing similar maps with fake electoral college results.^([^(118)](#fn118))
    One of the channels in this list had almost one and a half million subscribers,
    and several of the channels were “verified” by YouTube. The top four search results
    for “Presidential Election Results” were all fake. Curiously, most of the YouTube
    channels coming up in election day searches for election results were not even
    affiliated with political or news organizations—they were just people opportunistically
    using the election to snag some easy ad revenue.


    In the days after the 2020 election, a network of fake news channels on YouTube
    sprang up^([^(119)](#fn119)) and peddled Trump’s false claims that the election
    was rigged and victory was stolen from him. These channels have close ties, albeit
    largely obfuscated, with the *Epoch Times* media organization that you encountered
    in Chapter [2](../Text/508514_1_En_2_Chapter.xhtml) in the context of algorithmically
    mass-produced fake news. Michael Lewis, the host of one of the channels in this
    network, went live just hours after the Capitol building insurrection to repeat
    Trump’s lies about the election and to blame the Capitol building mob on antifa.
    His YouTube channel recorded over two hundred thousand subscribers and ten million
    views in less than two months. The channel describes itself as an independent
    effort by Lewis and a few friends who “felt like truth was dying,” despite connections
    to *Epoch Times* that were uncovered after some journalistic sleuthing.


    Collectively, this network of seven fake news YouTube channels that launched in
    mid-November 2020 amassed over a million subscribers and tens of millions of views
    by mid-January 2021. On December 9, 2020, YouTube announced^([^(120)](#fn120))
    that it would remove any videos posted after this date that claim there was widespread
    fraud or errors that influenced the outcome of the election; evidently this policy
    was not enforced vigilantly enough to prevent the millions of views that new videos
    from these channels received between December 9 and January 6.


    ### YouTube in the American Media Landscape


    Do Americans actually get their news and political information from YouTube and
    the videos it recommends? A 2018 poll by the Knight Foundation and Gallup found^([^(121)](#fn121))
    that most US adults—and more than nine in ten Republicans—say they personally
    have lost trust in the news media in recent years; this suggests that they are
    turning to other sources for their information. Meanwhile, a 2018 Pew Research
    Center survey found^([^(122)](#fn122)) that the share of YouTube users who say
    they get news or news headlines from YouTube nearly doubled between 2013 (twenty
    percent) and 2018 (thirty-eight percent), and that around half of YouTube users
    say the site is at least somewhat important for helping them understand things
    that are happening in the world. Around two-thirds of users say they at least
    sometimes encounter videos that seem obviously false or untrue.


    This Pew survey also found that eighty-one percent of YouTube users say they at
    least occasionally watch the “up next” videos suggested by the recommendation
    algorithm, and fifteen percent say they do so regularly. Perhaps people are not
    always honest with pollsters, or even themselves, about how often they let an
    algorithm dictate their viewing habits: recall that YouTube’s internal accounting
    found that seventy percent of all watch time comes by way of recommended videos.


    In addition to direct viewership, another way that YouTube is shifting political
    discourse in America is through a sort of ripple effect where YouTube serves up
    sizable audiences to various individuals who then reach even more massive mainstream
    audiences on traditional media outlets. The following story illustrates this dynamic.


    In the first weeks of the coronavirus pandemic in January 2020, a medical researcher
    in Hong Kong named Dr. Li-Meng Yan had, based on unsubstantiated rumors (which
    it later turned out were totally fabricated and false), started to believe that
    the virus was a bioweapon manufactured by the government in mainland China and
    deliberately released on the public. To spread a message of warning, she reached
    out to a popular Chinese YouTube personality, Wang Dinggang, known for criticizing
    the Chinese Communist Party. Dr. Yan portrayed herself as a whistleblower and
    anonymous source to Dinggang, who then broadcast this fake news story about the
    coronavirus to his one hundred thousand YouTube followers. The story continued
    to spread and spiral; then in September, Dr. Yan shed her anonymity and appeared
    on Fox News in an interview with Tucker Carlson that racked up nearly nine million
    online views.


    The same Chinese YouTube host, Dinggang, is also believed^([^(123)](#fn123)) to
    have been the first to seed baseless child abuse rumors about Hunter Biden—rumors
    that spread from his YouTube channel to *InfoWars* and then to the mainstream
    press in the *New York Post*. In this way, YouTube provides a powerful entry point
    for the dangerous vertical propagation phenomenon of fake news studied in Chapter
    [1](../Text/508514_1_En_1_Chapter.xhtml).


    Researchers found^([^(124)](#fn124)) that people who believe in conspiracy theories
    tend to rely more heavily on social media for information than do the less conspiratorially
    inclined segments of the population. Specifically, sixty percent of those who
    believe that COVID-19 is caused by radiation from 5G towers said that “much of
    their information on the virus came from YouTube,” whereas this figure drops to
    fourteen percent for those who do not believe this false conspiracy. People who
    ignored public health advice and went outside while having COVID symptoms were
    also much more reliant on YouTube for medical news and information than the general
    public.


    But this book is not about the role that *technology* in general plays in fake
    news, it is specifically about the role played by *algorithms*—especially sophisticated
    machine learning algorithms—and in this chapter that takes the form of the YouTube
    recommendation algorithm. In order to understand the potential influence of the
    recommendation algorithm on American politics, I’ll turn now to several empirical
    investigations that provide a window into the algorithm’s behavior.


    ### Studying the Algorithm


    In parallel to the Pew surveys mentioned in the preceding section, Pew also conducted
    a *random walk* exploration of the YouTube recommendation algorithm, similar to
    the Harvard investigation conducted in Brazil. Let me start with this.'
