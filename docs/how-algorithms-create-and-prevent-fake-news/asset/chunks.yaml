- fmt: '### Offensive Ad Categories


    In September 2017, journalists at *ProPublica* found^([^(251)](#fn251)) a Facebook
    ad category called “Jew hater” and tried to place a sponsored post in it. Facebook’s
    system responded that the category was too small, it only accepts ads whose target
    audience is above a minimum cutoff size, so Facebook offered an algorithmically
    generated suggestion for a second category to jointly target: “Second Amendment.”
    Evidently, Facebook’s algorithm had, rather frighteningly, correlated anti-Semites
    with gun enthusiasts. The journalists decided instead to search for more anti-Semitic
    categories just to see what was available. And indeed they found others, such
    as “How to burn jews” and “History of ‘why jews ruin the world’.” The journalists
    noted that these would be excellent category choices if you wanted to, say, market
    Nazi memorabilia or recruit marchers for a far-right rally.


    The memberships in these anti-Semitic categories were still too small, so the
    *ProPublica* journalists added another category: The National Democratic Party
    of Germany—a far-right, ultranationalist political party. With a combined membership
    of close to two hundred thousand, they finally hit the mark. They paid Facebook
    thirty dollars to place a few sponsored posts in these categories, and the ads
    were approved within fifteen minutes. A week later, they received a report that
    their ads reached five thousand eight hundred ninety-seven people, generating
    one hundred one clicks and thirteen *engagements* (a *like* or *share* or comment
    on the post). After contacting Facebook about this experiment, the particular
    anti-Semitic categories the journalists had found were removed from Facebook’s
    list of ad categories, but of course this was just a band-aid on a festering wound—the
    larger problem the journalists were getting at with their investigation remained.


    And this wasn’t the first serious problem *ProPublica* had exposed in Facebook’s
    algorithmic advertising system.


    ### Racist Exclusionary Advertising


    Almost one year earlier, in October 2016, *ProPublica* found^([^(252)](#fn252))
    that Facebook’s ad system allowed advertisers to exclude users by race. When purchasing
    an ad on Facebook, in addition to choosing target audience categories to reach,
    a screen came up with an option to “Narrow Audience” that had a prompt for the
    user to select categories of “demographics, interests, or behaviors” to exclude
    from the ad’s audience. Among the possible demographics the advertiser could select
    to exclude were “African American,” “Asian American,” and “Hispanic.” The journalists
    smartly contextualize this as follows: “Imagine if, during the Jim Crow era, a
    newspaper offered advertisers the option of placing ads only in copies that went
    to white readers. That’s basically what Facebook is doing nowadays.” Such racial
    exclusion in advertising is prohibited by federal law, at least for employment
    and housing and credit advertising.


    Maybe Facebook thought that if an algorithm comes up with these illegal exclusionary
    categories instead of a person (though we don’t even know if that’s what happened),
    then it’s OK. Or maybe Facebook’s flimsy reasoning was that it described these
    categories as “ethnic affinities” rather than ethnicities (despite nesting them
    under the “demographics” category)—implying that Facebook wasn’t letting you exclude
    Black people from advertisements, just people interested in Black topics. When
    the *ProPublica* journalists showed these ethnic exclusionary categories to the
    prominent civil rights lawyer John Relman, he responded: “This is horrifying.
    This is massively illegal. This is about as blatant a violation of the federal
    Fair Housing Act as one can find.’’ How did Facebook respond, and did Facebook
    end up in the courtroom for this? I’ll come back to these questions momentarily,
    but first please allow me a quick digression.


    ### Algorithms Could Help Instead of Hurt


    For context, and to show that algorithms are capable of both good and bad, it
    helps to compare Facebook’s algorithmically generated racist ad categories—both
    the targeted groups and the excluded groups—with an example where algorithms are
    used to help human moderators *reduce* bias in advertising.


    The *New York Times* runs an automated filter^([^(253)](#fn253)) to catch ads
    that contain discriminatory phrases such as “whites only,” and also to bring to
    the attention of human moderators any ads with known potentially discriminatory
    coded phrases such as “near churches” and “close to a country club.” The *Times*
    also rejects housing ads with photos that are too disproportionately white, which
    is something that an algorithm could help detect. It’s not that the algorithms
    at the *Times* are without flaw, it’s just that they are used primarily as tools
    to assist human moderators—whereas at Facebook the algorithms seem to be the primary
    arbiters. To be fair, however, Facebook is dealing with a scale that is many orders
    of magnitude larger than the *Times*, so it isn’t really a fair comparison. That
    said, one should keep in mind that there are many different ways of using algorithms.


    ### Illegal Exclusionary Advertising Continued


    Fast-forward to November 2017\. This is just over a year since *ProPublica* brought
    attention to Facebook’s option of illegally excluding various ethnic demographics
    from advertisements, and two months after *ProPublica* brought attention to Facebook
    providing advertisers with the ability to target offensive and hateful interest
    groups. It is also nine months after Facebook announced^([^(254)](#fn254)) that
    it had taken several steps to strengthen the procedures it uses to prevent discriminatory
    advertising, especially in the areas of housing, employment, and credit—the three
    areas in which federal law prohibits discriminatory ads. The *Washington Post*
    headline reporting this company announcement read “Facebook cracks down on ads
    that discriminate.” But *ProPublica* conducted another investigation at this time
    and found that Facebook’s supposed improvements fell far short of the bold proclamation.


    Indeed, *ProPublica*’s November 2017 investigation^([^(255)](#fn255)) showed that
    it was still possible for ad purchasers to select excluded audience categories
    such as “African Americans, mothers of high school kids, people interested in
    wheelchair ramps, Jews, expats from Argentina, and Spanish speakers.” All of these
    groups are protected under the federal Fair Housing Act, so Facebook was still
    quite clearly in violation of federal law. Facebook’s response this time? “This
    was a failure in our enforcement and we’re disappointed that we fell short of
    our commitments. The […] ads purchased by *ProPublica* should have but did not
    trigger the extra review and certifications we put in place due to a technical
    failure.” A remarkably vague excuse/reassurance.


    The *ProPublica* journalists reported that from their experience as ad purchasers,
    the only difference they noticed when placing these illegal ads compared to one
    year earlier is that the “Ethnic Affinity” category had been renamed “Multicultural
    Affinity” and it had been moved from the “Demographics” section to the “Behaviors”
    section. In other words, Facebook still seemed to be implicitly hiding behind
    the flimsy excuse that advertisers were not excluding people based on their race
    but based on their… racial behavior? Good grief. The *ProPublica* journalists
    also had no trouble *redlining*—which is to say, targeting their Facebook ads
    at specific ZIP codes as a way of targeting specific racial groups. This is also
    prohibited by federal law. And yet, Facebook undauntedly and unabashedly continued
    this manifestly malfeasant activity for another sixteen months, until…'
