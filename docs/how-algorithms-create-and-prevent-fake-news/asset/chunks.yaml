  trans: '

    ### 屏蔽搜索结果


    一些虚假新闻发布者会从网络上抓取文章，并将其重新发布为自己的内容，以此扩大文章的传播平台并从中获取广告收入。虽然网络上的大多数虚假新闻并未违反谷歌禁止其出现在搜索结果中的政策，但如果某篇文章被发现侵犯版权，谷歌就会将其从搜索结果中移除——因此，这些垃圾虚假新闻网站确实会被除名。


    然而，《华尔街日报》的一项广泛调查^(²²⁴)发现了一个令人不安的转折：有人一直在利用谷歌的版权侵权投诉系统，以移除对某些方不利或造成经济影响的内容。其中使用的一种技术是*倒填日期*：有人复制一篇已发表的文章，发布在自己的博客上，但使用误导性的时间戳，使其看起来比原文章更早发布；然后他们告诉谷歌，原文章侵犯了他们博客的版权，于是原文章便从谷歌搜索结果中被移除。在这种情况下，谷歌是基于虚假的版权侵权通知，将一篇真实的新闻文章除名。前谷歌律师、现任斯坦福大学网络政策中心项目主任达芙妮·凯勒表示：“如果人们能够操纵这些守门人，让重要且合法的信息消失，那问题就严重了。”《华尔街日报》发现，人们不仅确实能做到这一点，而且这样做的数量惊人。


    谷歌在 2002 年至 2012 年间收到的版权移除请求不到十万个链接，而现在，它每天处理的请求通常超过一百万个。为了达到如此规模，一位公司发言人表示，谷歌已将大部分流程自动化，因此大多无需人工审核。2019
    年，近 2.5 亿个被标记为侵犯版权的链接中，有 80%被从谷歌的搜索结果中移除。然而，在《华尔街日报》揭露了大量欺诈性侵权通知案例后，谷歌恢复了超过五万个此前被移除的链接。


    《华尔街日报》发现的一批欺诈性请求涉及批评乌克兰政界人士和商界领袖的俄语新闻文章。这些文章在包括《新闻周刊》俄语版在内的多个组织提交版权侵权请求后被谷歌移除——但事实证明，这些组织都是假的，所谓的俄语《新闻周刊》与《新闻周刊》毫无关系，它只是利用《新闻周刊》的标识来欺骗谷歌，使其相信版权侵权通知是合法的。


    这些欺骗谷歌以移除真实新闻文章的伎俩还带来了二次伤害：在谷歌近期提升优质新闻的努力中，排名算法考虑的一个因素是网站收到的版权侵权通知数量。一位谷歌发言人表示：“如果一个网站收到大量有效的移除通知，该网站在搜索结果中的整体排名可能会降低。”但《华尔街日报》的调查证实，谷歌认为有效的许多移除通知实际上都是无效的，是故意针对谷歌自动化系统的虚假信息所致。这为不诚实的行为者进一步操纵谷歌排名打开了大门。


    ### BERT


    过去几年，人工智能界出现了一种幽默的文化趋势，即在命名深度学习文本处理算法时，尽可能多地引用《芝麻街》的元素。你在第 2 章中看到了*Grover*，这是艾伦人工智能研究所开发的系统，旨在像
    GPT-2 一样生成文本，其最终目标是能够检测此类深度学习生成的文本。目前，最令人印象深刻且功能强大的两个深度学习文本系统是 GPT-3（在第 2 章中已详细讨论）和谷歌开发的*BERT*（*Bidirectional
    Encoder Representations from Transformers*的缩写，但暂时不必担心这个）。BERT 建立在艾伦人工智能研究所早期开发的*ELMo*（*Embeddings
    from Language Models*的缩写）系统之上。唉，目前还没有 Ernie 或 Snuffleupagus。


    虽然文本生成非常有用，但事实证明，对于许多应用来说，人们需要的是深度神经网络内部运作的副产品，这种副产品在训练文本生成等任务时会自动产生：即单词的*向量表示*（有时称为*词嵌入*）。这意味着一种将每个单词表示为向量（即一系列数值坐标）的方法，使得词向量分布的几何结构能够反映重要的语义和句法信息。粗略地说，我们希望书面文本中经常相邻出现的单词，其向量表示在几何上也彼此接近。向量嵌入将文本等杂乱格式的数据转换为机器学习算法熟悉且喜爱的标准数值格式。


    早期的词嵌入（其中最流行的一种是谷歌在 2013 年开发的*Word2vec*）为每个单词生成一个固定的静态向量。这为许多突破打开了大门：例如，分析单词和句子的情感（它们积极或消极的程度）变成了欧几里得空间中更熟悉的几何分析，比如寻找一个将积极词向量与消极词向量分开的平面。这些早期静态方法的一个关键缺点是，一个单词可能有多种含义（例如，“stick”
    a landing 中的“stick”、来自树的“stick”以及“stick” to a plan 中的“stick”），当单词被表示为向量时，所有这些不同的含义都被混为一谈。相比之下，ELMo
    和 BERT 是*上下文*词嵌入，这意味着向量表示不是固定和静态的——它们取决于周围的文本。如果你向这些系统输入句子“I hope the gymnast
    sticks the landing”和“the toddler sticks out her tongue”，单词“sticks”在每种情况下都会有不同的向量表示。这使得语言建模和理解具有更大的灵活性。

    '
- fmt: 'BERT learns its contextual word embeddings through a massive self-supervised
    pre-training process somewhat similar to that of GPT-3. As you may recall from
    Chapter [2](../Text/508514_1_En_2_Chapter.xhtml), GPT-3 was fed huge volumes of
    text, and as it read through this, it used the preceding words to try to predict
    the next word. BERT’s self-supervised training process also involved reading massive
    volumes of text, but in this case a percentage of the words were randomly masked
    (hidden from the algorithm). BERT learned how to “predict” these missing words
    by guessing what they were and then unmasking them and using the difference between
    the guess and the actual unmasked word as an error to propagate through the neural
    net and adjust all the parameters so that over time the guesses become more accurate.
    In this way, BERT was trained to predict missing words. BERT’s ultimate goal is
    not to predict words, but being able to predict words well is considered a good
    proxy for understanding them; or, from a more technical perspective, the contextual
    vector embeddings BERT develops internally while training on hidden word prediction
    turn out to be very useful for a wide range of linguistic tasks.


    Actually, this masked word task helps BERT learn about words in the context of
    each sentence, but to get a more global perspective, it is simultaneously trained
    on a self-supervised sentence prediction task: it is shown pairs of sentences
    from the training text and learns to estimate the probability that one sentence
    immediately precedes the other. This task helps the word embeddings encode larger-scale
    meaning that extends beyond individual sentences. In case you are curious, the
    *Bidirectional* in BERT’s name refers to the fact that it reads training text
    both left-to-right and right-to-left in order to get both past and future context
    for each word. This is a reasonable thing to do precisely because, unlike GPT-3,
    BERT is not aiming to predict future words—it is aiming to produce word embeddings
    that draw in as much context as possible. The *Encoder Representations* part of
    the name just indicates that words are encoded with vector representations, and
    the *Transformer* in the name refers to a specific deep learning architecture
    that is used.


    When you type a search phrase into Google, you are providing more than just a
    list of keywords to match—often you are providing a grammatical snippet of text
    that Google’s search algorithm needs to understand. BERT is the intermediary service
    that translates your search phrase into a collection of vectors that the search
    algorithm can then process quantitatively. In an October 2019 company blog post
    announcing the absorption of BERT into Google’s search algorithm, Google’s vice
    president of Search said^([^(225)](#fn225)) that “Search is about understanding
    language,” and BERT has indeed been one of the most successful steps forward in
    allowing computers to better understand human language.


    This Google blog post went on to say that “when it comes to ranking results, BERT
    will help Search better understand one in 10 searches in the U.S. in English”
    and that “Particularly for longer, more conversational queries, or searches where
    prepositions like ‘for’ and ‘to’ matter a lot to the meaning, Search will be able
    to understand the context of the words in your query.” To illustrate the types
    of improvements users should expect, the blog post included an example of a user
    searching “Can you get medicine for someone pharmacy.” Previously, the top search
    result was an article that included each of these individual words, but it didn’t
    answer the question the user was attempting to ask; with the new BERT-powered
    search, the top result was an article specifically addressing when and how people
    can pick up medications for others at the pharmacy.


    Google evidently underestimated itself with the “one in 10” figure, because almost
    exactly one year later in another company blog post^([^(226)](#fn226)) Google
    declared that “BERT is now used in almost every query in English.” And in September
    2020, Google announced^([^(227)](#fn227)) that BERT was also being used “to improve
    the matching between news stories and available fact checks.” In Chapter [9](../Text/508514_1_En_9_Chapter.xhtml),
    I’ll cover fact-checking tools in depth; for now, what’s relevant here is that
    BERT is used to automatically scan through lists of human fact-check reports and
    figure out which ones pertain to a given news article.


    But BERT also featured prominently in a recent debacle that landed Google in the
    news in an unflattering light. Stanford-trained computer scientist Timnit Gebru
    is one of the world’s leading experts on ethics in AI and algorithmic bias; she
    is a cofounder of the organization *Black in AI*; and, until recently, she was
    one of the leaders of Google’s Ethical Artificial Intelligence Team. But she was
    abruptly fired from Google in December 2020.^([^(228)](#fn228)) She was working
    on a research paper with several other Google employees when a request from the
    higher-ups came in asking her to either withdraw the paper or remove the names
    of all Google employees from it. She refused and demanded to know who was responsible
    for this bizarre request and their reasoning behind it, but Google leadership
    rebuffed her demand and instead fired her.


    This move was shocking, not just to Gebru but to the entire AI community. Gebru
    is widely respected and recognized for important pioneering work; Google’s iron-fisted
    handling of this incident did not sit well with most people. The optics of Google
    censoring and then firing a prominent and beloved Black woman AI researcher from
    a leadership role on an ethics team were very poor, to say the least. And what
    was the topic of Gebru’s research paper that stirred up all this controversy in
    the first place? The paper was titled “On the Dangers of Stochastic Parrots: Can
    Language Models Be Too Big?”, and it was on the dangers—ranging from environmental
    costs to inscrutability to harmful biases—involved in large deep learning language
    models like BERT.


    We now come to the final topic of this lengthy section, and of the entire chapter,
    which is how Google has been trying to adjust its algorithm so that accurate information
    rises to the top of search rankings and fake news is relegated to later pages
    of search results.'
  raw: 'BERT learns its contextual word embeddings through a massive self-supervised
    pre-training process somewhat similar to that of GPT-3\. As you may recall from
    Chapter [2](../Text/508514_1_En_2_Chapter.xhtml), GPT-3 was fed huge volumes of
    text, and as it read through this, it used the preceding words to try to predict
    the next word. BERT’s self-supervised training process also involved reading massive
    volumes of text, but in this case a percentage of the words were randomly masked
    (hidden from the algorithm). BERT learned how to “predict” these missing words
    by guessing what they were and then unmasking them and using the difference between
    the guess and the actual unmasked word as an error to propagate through the neural
    net and adjust all the parameters so that over time the guesses become more accurate.
    In this way, BERT was trained to predict missing words. BERT’s ultimate goal is
    not to predict words, but being able to predict words well is considered a good
    proxy for understanding them; or, from a more technical perspective, the contextual
    vector embeddings BERT develops internally while training on hidden word prediction
    turn out to be very useful for a wide range of linguistic tasks.


    Actually, this masked word task helps BERT learn about words in the context of
    each sentence, but to get a more global perspective, it is simultaneously trained
    on a self-supervised sentence prediction task: it is shown pairs of sentences
    from the training text and learns to estimate the probability that one sentence
    immediately precedes the other. This task helps the word embeddings encode larger-scale
