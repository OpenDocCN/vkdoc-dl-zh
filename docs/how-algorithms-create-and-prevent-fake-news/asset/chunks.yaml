- fmt: '# 对抗视觉虚假信息的不同方法


    对抗视觉虚假信息的一种不同方法是，通过嵌入数字水印（借鉴传统防伪手段）或创建可用于驳斥后续出现的篡改版本的数据库，来验证照片和视频的真实性。例如，一家名为`Truepic`的圣地亚哥初创公司提供了一款智能手机应用，让用户拍摄被验证为未经篡改的照片或视频。它通过将照片/视频连同相机记录的各种传感器读数发送到`Truepic`的服务器来实现这一点，服务器会进行一系列测试，如果所有测试都通过，则该照片/视频被视为“已验证”并存储在服务器上。完整的测试集并未公开，但`Truepic`的首席执行官解释说，他们“会查看地理定位数据、附近的手机信号塔、手机上的气压传感器，并验证所有信息是否匹配。我们通过一系列计算机视觉测试来运行照片。”该应用迄今为止最大的客户是保险公司，因为它允许投保人拍摄事故和损坏的照片，公司可以确信这些照片未被篡改，但`Truepic`表示，它也被非政府组织用于记录侵犯人权的行为。


    英国一家名为`Serelay`的初创公司开发了一款与`Truepic`类似的应用，不同之处在于`Serelay`的应用不将完整照片存储在其服务器上，它只存储通过为每张图像计算约一百个数学值而获得的照片的小型数字指纹。无法从该指纹重建完整照片，但该公司声称，即使照片中的单个像素被修改，指纹也将无法匹配。当然，`Truepic`和`Serelay`的服务仅在人们事先知道某张特定照片的有效性日后可能受到质疑时才有效——因此，虽然在某些领域非常有用，但它们无法解决每天通过社交媒体快速渠道流动的大量可疑照片问题。也就是说，可以设想在不久的将来，每部智能手机默认使用此类验证服务，然后每当有人在社交媒体平台上发布照片或视频时，如果该内容通过验证服务，平台会在其旁边放置一个小对勾。


    除了自动深度伪造检测的所有技术挑战之外，还存在一个非常显著的社会学和心理学挑战，《科学美国人》的布鲁克·博雷尔称之为“谎言与真相之间的滞后”：即使一段病毒式传播的视频被证明是深度伪造，欺骗造成的损害通常已经造成，并且实际上不可逆转。一旦人们相信了某件事，尤其是当他们亲眼所见时，即使随后出现了无可辩驳的反面证据，也很难让他们改变想法。这表明，除了在有害的深度伪造内容病毒式传播后揭露它们之外，首先防止它们传播可能也是明智之举。这将我们带入下一个主题，即限制深度伪造可能造成的损害的立法方法。


    ## 法律监管


    佛罗里达州参议员马可·鲁比奥多次谈到深度伪造技术带来的威胁，并鼓励采取立法行动。内布拉斯加州参议员本·萨斯于2018年12月提出了一项旨在监管深度伪造的法案——这是同类法案中的首例——但一天后，联邦政府因预算僵局而关闭，等到政府重新开放时，萨斯提出的法案已经失效。接下来，与本章开篇提到的2019年6月众议院关于深度伪造的听证会同时，纽约第九国会选区的众议员伊维特·克拉克提出了一项不同的、比萨斯的法案更全面的深度伪造法案。


    克拉克的法案——与计算机科学家、虚假信息专家和人权倡导者合作起草——将要求社交媒体公司更好地监控其平台上的深度伪造内容，要求研究人员开发用于深度伪造的数字水印工具，并将恶意使用深度伪造内容伤害个人或威胁国家安全的行为定为犯罪。该法案的顾问之一、数据与社会研究所研究员穆塔莱·恩孔德表示，该法案不太可能以其原始形式在国会通过，但她认为无论如何提出该法案都很重要，以便朝着深度伪造的立法监管迈出认真的第一步：“我们真正想做的是将视听操纵不可接受这一理念载入国会记录。”虽然该法案确实停滞不前，但克拉克在2021年2月表示，她计划重新提出该法案的修订版，她认为由于2020年大选后的新政治环境以及疫情导致社交媒体使用增加，该修订版将获得更多支持：“通过一些有意义的深度伪造立法的条件已经成熟。”


    虽然联邦层面的监管在国会迄今停滞不前，但在州层面出现了一些有趣的发展。2019年10月，加利福尼亚州签署了一项法律，将在选举前60天内恶意分发或创建关于政治候选人的“实质性欺骗性”媒体定为犯罪。（如果“理性人”对篡改过的照片或视频与原始版本相比有“根本不同的理解或印象”，则该内容被视为具有欺骗性。）“深度伪造”一词并未出现在该法律的文本中，但该法律被昵称为“加州深度伪造法”，并且它确实直接受到深度伪造及其对该州民主制度构成的威胁的启发。


    加州的法律规定了一些例外情况，例如讽刺作品以及带有声明其为虚假内容的免责声明的视频，但言论自由倡导者对此表示反对并质疑其合宪性（专门关注选举和60天窗口期是为了帮助缓解此类担忧）。与此同时，加州还颁布了一项法律，禁止未经同意的色情深度伪造。一个月前，德克萨斯州成为第一个对深度伪造进行立法的州，将“意图影响选举结果”使用深度伪造的行为定为犯罪。然而，法律学者指出，深度伪造在选举之外也可能非常危险（例如，当视频在法庭上用作证据时），而且，为了执行这些深度伪造法律，需要能够证明相关视频确实是深度伪造——正如你现在所知，这并非易事。


    即使联邦政府的立法部门在应对深度伪造挑战方面一直持谨慎态度，但它——至少在纸面上——已努力进行自我监管。2020年1月28日，美国众议院道德委员会发布了一份题为“故意使用视听扭曲与深度伪造”的官方备忘录，其中包含以下文本：


    *   议员或其工作人员发布深度伪造内容可能会侵蚀公众信任、影响公共讨论或左右选举。因此，发布深度伪造或其他旨在误导公众的视听扭曲内容的议员、官员和工作人员可能违反了《官方行为准则》。在通过包括社交媒体在内的电子方式传播任何图像、视频或音频文件之前，议员和工作人员应尽合理努力考虑此类内容是否为深度伪造或是否被故意扭曲以误导公众。


    这项《官方行为准则》的执行严格程度如何，仍有待观察。'
  raw: 'A different approach in the war against visual disinformation is to authenticate
    photos and videos either by embedding digital watermarks in them (taking inspiration
    from old-school ways of stopping counterfeiters) or by creating databases that
    can be used to refute modified versions that show up later. For instance, a San
    Diego startup called *Truepic* offers a smartphone app that lets users take photos
    or videos that are authenticated as undoctored. It does this by sending the photo/video
    along with various sensor readings recorded by the camera to Truepic’s servers
    where a variety of tests are undertaken, and if the tests are all passed, then
    the photo/video is considered “verified” and is stored on the server. The full
    set of tests is not disclosed, but the CEO of Truepic explained^([^(81)](#fn81))
    that they “look at geolocation data, at the nearby cell towers, at the barometric-pressure
    sensor on the phone, and verify that everything matches. We run the photo through
    a bunch of computer-vision tests.” The app’s biggest clients so far are insurance
    companies, since it allows policyholders to take photos of accidents and damages
    that the company can be sure have not been doctored, but Truepic says it has also
    been used by NGOs to document human rights violations.


    A startup in the UK called *Serelay* developed an app that is similar to Truepic’s,
    except Serelay’s app does not store the full photo in its server, it only stores
    a small digital fingerprint of the photo obtained by computing about a hundred
    mathematical values for each image. One cannot reconstruct the full photo from
    this fingerprint, but the company claims^([^(82)](#fn82)) that if even a single
    pixel in the photo has been modified, then the fingerprints will not match up.
    Of course, both the Truepic and Serelay services only work if one knows in advance
    that the validity of a particular photo might later be questioned—so while very
    useful in some realms, they do not address the ocean of questionable photos flowing
    through the rapid channels of social media every day. That said, one can envision
    a world in the not-too-distant future in which every smartphone by default uses
    a verification service like this, and then whenever someone posts a photo or video
    on a social media platform, the platform places a little check mark beside it
    if it passes the verification service.


    In addition to all the technical challenges with automated deepfake detection,
    there is a very significant sociological and psychological challenge as well that
    Brooke Borel at *Scientific American* calls^([^(83)](#fn83)) “the lag between
    lies and truth”: even if a viral video is proven to be a deepfake, often the damage
    caused by the deception will already have been done and is effectively irreversible.
    Once people are convinced of something, especially if they have seen it with their
    own eyes, it can be very difficult to disabuse them of it even if irrefutable
    evidence to the contrary has subsequently surfaced. This suggests that in addition
    to unmasking harmful deepfakes after they have gone viral, it may well be prudent
    to prevent them from spreading in the first place. This takes us to our next topic,
    which is legislative approaches to limiting the damage that deepfakes can do.


    ## Legal Regulation


    Senator Marco Rubio from Florida has spoken multiple times about the threats posed
    by deepfake technology and encouraged legislative action. Senator Ben Sasse from
    Nebraska in December 2018 introduced a bill aimed at regulating deepfakes—the
    first of its kind—but a day later, the federal government shut down over a budgetary
    impasse, and Sasse’s proposed bill expired by the time the government reopened.
    Next, in parallel to the June 2019 House hearing on deepfakes that opened this
    chapter, a Representative for New York’s ninth congressional district, Yvette
    Clarke, introduced a different bill on deepfakes, more extensive than Sasse’s.


    Clarke’s bill—drafted in collaboration with computer scientists, disinformation
    experts, and human rights advocates—would require social media companies to better
    monitor their platforms for deepfakes and researchers to develop digital watermarking
    tools for deepfakes, and it would criminalize the malicious use of deepfakes that
    harm individuals or threaten national security. One of the advisers on the bill,
    Mutale Nkonde, a fellow at the Data & Society Research Institute, said^([^(84)](#fn84))
    the bill was unlikely to pass through Congress in its original form but felt it
    important to introduce the bill regardless in order to make the first serious
    step toward legislative regulation of deepfakes: “What we’re really looking to
    do is enter into the congressional record the idea of audiovisual manipulation
    being unacceptable.” While the bill did indeed stall, in February 2021 Clarke
    said^([^(85)](#fn85)) she’s planning to reintroduce a revised version of the bill
    that she felt would gain more traction due to the new political environment after
    the 2020 election and the fact that the pandemic has led to an increase in social
    media usage: “the conditions [are] ripe for actually passing some meaningful deepfake
    legislation.”


    While regulation at the federal level has stalled in Congress so far, at the state
    level there have been some interesting developments. In October 2019, California
    signed a law^([^(86)](#fn86)) making it a crime to maliciously distribute or create
    “materially deceptive” media about a political candidate within sixty days of
    an election. (A doctored photo or video is considered deceptive if a “reasonable
    person” would have a “fundamentally different understanding or impression” of
    it compared to the original version.) The term deepfake does not appear in the
    text of this law, but the law has been nicknamed the “California Deepfake Law,”
    and indeed it is directly inspired by deepfakes and the threat they pose to the
    state’s democratic systems.


    California’s law provides some exceptions, such as satire and videos with disclaimers
    stating that they are fake, but free speech advocates voiced objections to it
    and question its constitutionality (the specific focus on elections and the sixty-day
    window are an attempt to help assuage such concerns). Simultaneously, California
    also enacted a law banning nonconsensual pornographic deepfakes. And one month
    earlier, Texas became the first state to legislate deepfakes by criminalizing
    them when they are used “with intent to influence the outcome of an election.”
    However, legal scholars have pointed out that deepfakes can be very dangerous
    outside of elections as well (for instance, when videos are used as evidence in
    court), and, moreover, in order to enforce any of these deepfake laws, one needs
    to be able to prove that a video in question really is a deepfake—which, as you
    now know, is no easy task.


    Even if the legislative branch of the federal government has been apprehensive
    to tackle the challenge of deepfakes, it has—at least on paper—made an effort
    to police itself. On January 28, 2020, the US House Ethics Committee released
    an official memo^([^(87)](#fn87)) titled “Intentional Use of Audio-Visual Distortions
    & Deep Fakes” that includes the following text:


    *   Members or their staff posting deep fakes could erode public trust, affect
    public discourse, or sway an election. Accordingly, Members, officers, and employees
    posting deep fakes or other audio-visual distortions intended to mislead the public
    may be in violation of the Code of Official Conduct. Prior to disseminating any
    image, video, or audio file by electronic means, including social media, Members
    and staff are expected to take reasonable efforts to consider whether such representations
    are deep fakes or are intentionally distorted to mislead the public.


    How strictly this Code of Official Conduct is adhered to remains to be seen.'
