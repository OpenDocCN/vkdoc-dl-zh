- fmt: '### SciFact


    The Allen Institute for Artificial Intelligence (which you briefly encountered
    in Chapter [2](../Text/508514_1_En_2_Chapter.xhtml) for its Grover system for
    detecting GPT-2 type generated text) developed a free tool called `SciFact` ^([^(345)](#fn345))
    to help with fact-checking medical claims related to COVID-19. The user types
    an assertion, or chooses from a list of suggestions, such as “Higher viral loads
    of SARS-CoV-2 are associated with more severe symptoms,” and a list of medical
    research publications is returned, each with an estimated score of how strongly
    it supports or rejects the assertion—similar to the Waterloo team’s stance detection—and
    a few potentially relevant excerpts from each publication are provided. When I
    tried this higher viral load assertion, seven articles were returned, four supporting
    and three refuting—and while not all of them seemed relevant or accurately labeled,
    the results were enough to show that there is not a strong scientific consensus
    on this issue.


    Their algorithm uses `BERT` to process text, and it was fine-tuned as follows.
    First, a modestly sized collection of medical publications was assembled and the
    citation sentences (i.e., sentences that include a citation to another research
    publication) were extracted. Next, human experts manually rewrote these sentences
    as medical assertions; they were allowed to use the text surrounding each citation
    sentence, but not the paper being cited. The human experts also created negated
    versions of these assertions, so that the algorithm would have examples of assertions
    refuted by the literature, not just ones supported by it. They then went through
    by hand and decided whether each assertion is indeed supported by the article
    it cites, or refuted by it, or whether there is insufficient information to make
    this decision—and in the cases where it was labeled as supported or refuted, the
    experts highlighted the passages in the article’s abstract that provided the strongest
    basis for this label. Roughly speaking, this process is how they trained their
    `BERT`-based algorithm to do all three tasks involved: retrieve articles relevant
    to a given assertion, estimate the stance of each article in relation to the assertion,
    and extract relevant passages from each article’s abstract.


    The researchers’ framework in principle applies to all kinds of medical and scientific
    assertions—not just COVID-related ones—but since training their algorithm involves
    careful manual work with the data, they decided to launch this tool initially
    in a limited setting and scope. The reader is cautioned, and the researchers readily
    admit, that this tool is largely intended to show what is possible and what challenges
    remain, rather than to be blindly trusted. They tested a few dozen COVID-19 assertions
    and found the algorithm returned relevant papers and correctly identified their
    stance about two-thirds of the time. While this tool should not replace finding
    and reading papers manually, it might still help with a quick first-pass assessment
    of medical claims.


    ### Diffbot


    One way to record factual information is with a *knowledge graph*, a network structure
    that encodes interrelated descriptions of entities. Think of a collection of facts
    that are essentially in a subject-verb-object format, and they fit together to
    provide elaborations and contextualization for each other. A very simple example
    is nesting of information—Boston is located in Massachusetts, Massachusetts is
    located in New England, so there is an implied factual connection that Boston
    is located in New England—but many other more varied and flexible relational configurations
    are possible. Knowledge graphs are a convenient way of storing information in
    a computer that is easily searchable, sharable, and expandable. Google has built
    a massive knowledge graph that powers the information panels that show up on many
    searches. Google said that its knowledge graph draws from hundreds of sources,
    with Wikipedia a “commonly-cited source,” and that as of May 2020 it contained
    half a trillion facts on five billion entities^([^(346)](#fn346))—but it has been
    extremely reluctant to reveal any of the technical details underlying the construction
    of this knowledge graph.


    Another massive knowledge graph is being assembled by a startup called `Diffbot`
    ^([^(347)](#fn347)) that has been scraping the entire public Web for facts. (Diffbot,
    Google, and Microsoft are supposedly the only three companies known to crawl the
    entire public Web for any purpose.) It has been adding over a hundred million
    entities per month. `Diffbot` offers a handful of services based on its knowledge
    graph, and the CEO said^([^(348)](#fn348)) that he eventually wants to use it
    to power a “universal factoid question answering system.” It is curious that he
    used the term “factoid” here, which in general usage can refer to either a snippet
    of factual information or a statement that is repeated so often that it becomes
    accepted as common knowledge whether or not it is actually true. I suspect `Diffbot`
    is actually capturing the latter, because it draws from all of the Web rather
    than just using certain vetted sources as Google does. And this worries me. We
    all know not to trust everything we read on the Web, so why should we trust an
    algorithm that gathered all of its knowledge by reading the Web? I’m optimistic
    that the developers at `Diffbot` have attempted to include only accurate information
    in their knowledge graph, but I’m far less optimistic that they’ve been successful
    in this regard. This project strikes me as valuable and worthwhile but also suffused
    with the kind of hubris and hype that has consistently damaged the public image
    of artificial intelligence when the inevitable shortcomings and biases arise.


    ### Twitter Bot Detection


    `Bot Sentinel`^([^(349)](#fn349)) is essentially a public-facing version of the
    bot detection systems used internally by Twitter to automatically detect bot accounts.
    It uses machine learning techniques (along the lines discussed in the previous
    chapter) to detect bots on Twitter and lets users freely explore a database of
    these detected accounts and track their activity. `Botometer`^([^(350)](#fn350))
    is a related free tool that lets you type in a specific Twitter username and then
    applies machine learning classification methods (again, like the ones discussed
    last chapter) to estimate whether that account is a bot or a human; it also provides
    bot-versus-human estimates on all the followers of the specified account. `BotSlayer`
    ^([^(351)](#fn351)) is a free browser extension that helps users detect and track
    hashtags and other information spreading across Twitter in a coordinated manner
    suggestive of a bot campaign.'
