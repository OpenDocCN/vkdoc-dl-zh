  trans: '

    ### SciFact


    艾伦人工智能研究所（你在第 2 章中曾简要了解过其用于检测 GPT-2 生成文本的 Grover 系统）开发了一款名为`SciFact`的免费工具^(³⁴⁵)，用于帮助核查与
    COVID-19 相关的医学主张。用户输入一个论断，或从建议列表中选择一项，例如“SARS-CoV-2 病毒载量越高，症状越严重”，系统便会返回一系列医学研究出版物，每篇都附有预估评分，显示其在多大程度上支持或反驳该论断——这与滑铁卢团队的立场检测类似——同时还会提供每篇出版物中若干可能相关的摘录。当我尝试这个关于病毒载量的论断时，系统返回了七篇文章，其中四篇支持、三篇反驳——尽管并非所有文章都看起来相关或标注准确，但结果足以表明，在这个问题上并不存在强烈的科学共识。


    他们的算法使用`BERT`处理文本，并按照以下方式进行了微调。首先，收集了一个规模适中的医学出版物集合，并提取了其中的引用句（即包含对其他研究出版物引用的句子）。接着，人类专家将这些句子手动改写为医学论断；他们被允许使用每个引用句周围的文本，但不能使用被引用的论文本身。人类专家还创建了这些论断的否定版本，以便算法能获得被文献反驳的论断示例，而不仅仅是得到支持的示例。然后，他们逐一人工判断每个论断是否确实被其引用的文章所支持、反驳，或者是否存在足够信息做出判断——在被标记为支持或反驳的情况下，专家们会高亮显示文章摘要中为这一标签提供最有力依据的段落。大致来说，这个过程就是他们训练基于`BERT`的算法以完成三项任务的方式：检索与给定论断相关的文章，评估每篇文章相对于该论断的立场，以及从每篇文章的摘要中提取相关段落。


    研究人员的框架原则上适用于所有类型的医学和科学论断——而不仅仅是与 COVID 相关的——但由于训练算法涉及对数据进行细致的人工处理，他们决定最初在有限的环境和范围内推出该工具。读者需注意，研究人员也坦然承认，该工具主要旨在展示可能实现的功能以及尚存的挑战，而非供人盲目信任。他们测试了数十个
    COVID-19 论断，发现算法在大约三分之二的情况下能返回相关论文并正确识别其立场。虽然该工具不应取代手动查找和阅读论文，但它或许仍有助于对医学主张进行快速的初步评估。


    ### Diffbot


    记录事实信息的一种方式是使用*知识图谱*，这是一种对实体间相互关联描述进行编码的网络结构。可以将其想象为一组本质上采用“主语-谓语-宾语”格式的事实集合，它们相互契合，为彼此提供详细说明和语境关联。一个非常简单的例子是信息的嵌套——波士顿位于马萨诸塞州，马萨诸塞州位于新英格兰，因此隐含的事实关联是波士顿位于新英格兰——但还有许多其他更多样化、更灵活的关系配置也是可能的。知识图谱是一种在计算机中存储信息的便捷方式，便于搜索、共享和扩展。谷歌构建了一个庞大的知识图谱，为许多搜索中显示的信息面板提供支持。谷歌表示，其知识图谱来源于数百个来源，其中维基百科是“一个常被引用的来源”，并且截至
    2020 年 5 月，它包含了关于 50 亿个实体的 5000 亿个事实^(³⁴⁶)——但谷歌一直极其不愿透露构建该知识图谱的任何技术细节。


    另一个庞大的知识图谱正由一家名为`Diffbot`的初创公司构建^(³⁴⁷)，该公司一直在抓取整个公共网络以获取事实。（据说`Diffbot`、谷歌和微软是已知仅有的三家出于任何目的爬取整个公共网络的公司。）它每月新增超过一亿个实体。`Diffbot`基于其知识图谱提供了一系列服务，其首席执行官表示^(³⁴⁸)，他最终希望用它来驱动一个“通用事实问答系统”。有趣的是，他在这里使用了“factoid”一词，该词在一般用法中既可以指一条事实信息片段，也可以指一个被反复提及以至于无论真假都被当作常识接受的陈述。我怀疑`Diffbot`实际上捕获的是后者，因为它从整个网络中提取信息，而不像谷歌那样只使用某些经过审查的来源。这让我感到担忧。我们都知道不能相信在网上读到的一切，那么为什么我们要相信一个通过阅读网络来收集所有知识的算法呢？我乐观地认为`Diffbot`的开发人员已尽力只将准确信息纳入其知识图谱，但对于他们在这方面是否成功，我远没有那么乐观。在我看来，这个项目既有价值又值得去做，但也充斥着那种当不可避免的缺陷和偏见出现时，一贯会损害人工智能公众形象的傲慢与炒作。


    ### Twitter 机器人检测


    `Bot Sentinel`^(³⁴⁹)本质上是 Twitter 内部用于自动检测机器人账户的机器人检测系统的公开版本。它使用机器学习技术（沿袭上一章讨论的思路）来检测
    Twitter 上的机器人，并允许用户自由浏览这些被检测账户的数据库并追踪其活动。`Botometer`^(³⁵⁰)是一个相关的免费工具，你可以输入一个特定的
    Twitter 用户名，然后它会应用机器学习分类方法（同样，类似于上一章讨论的方法）来评估该账户是机器人还是人类；它还会对指定账户的所有关注者提供机器人/人类的评估。`BotSlayer`^(³⁵¹)是一个免费的浏览器扩展，帮助用户检测和追踪那些以协调方式在
    Twitter 上传播、暗示存在机器人活动的标签及其他信息。

    '
- fmt: '### Google Reverse Image Search


    The image search tab of Google allows you to do keyword searches that result in
    images on the Web rather than links to websites. You can also drag and drop an
    image onto the search bar in this tab, and Google will search the Web for images
    that are visually similar to your image; this is officially called a “reverse
    image search,” though I think a better name might be “image-based search” to contrast
    it with the usual keyword-based search. This can help you fight against fake news
    in several ways. If you think an image in an article you’re reading has been doctored,
    try a search with that image and you may find the original undoctored version.
    Even if the image hasn’t been doctored, the article you’re reading might be using
    the image misleadingly out of context (recall the deceptive caption examples from
    Chapter [3](../Text/508514_1_En_3_Chapter.xhtml)); searching for this image will
    show you where else it has appeared on the Web, which can help you track down
    the original context.


    So how does this kind of image search work? You may remember from Chapter [3](../Text/508514_1_En_3_Chapter.xhtml)
    that an autoencoder is a deep learning architecture that teaches itself how to
    compress data, and when applied specifically to image data, it finds numerical
    ways of encoding meaningful visual structure in the images. An overly simplified
    example would be that pictures of faces might be reduced to one number indicating
    the subject’s age, another the hair color, another the hairstyle, etc.—but in
    reality the numbers autoencoders use don’t have such simple human-interpretable
    meanings since they are generated by the algorithm itself. The most common approach
    to the reverse image search is the following. First, an autoencoder is used to
    represent every image on the Web as a numerical vector. Picture this as a road
    map to these images, where the numerical vectors are a higher-dimensional analogue
    of latitude/longitude coordinates. The beauty of autoencoders is that visually
    similar images will be placed near each other on this map. Then, whenever a user
    searches with an image, that image is converted to a numerical vector by the same
    autoencoder—meaning its coordinates on our map are determined—and the images returned
    by this search are those whose coordinates are nearest to the coordinates of this
    input image.


    There are also tools to do reverse searches for videos. Rather than attempting
    to directly encode entire videos numerically, usually this is performed simply
    by sampling several still images from the video and then searching for other videos
    that contain similar still frames. In other words, the autoencoder is applied
    at the level of images rather than videos.


    ### Additional Tools


    *Hoaxy* ^([^(352)](#fn352)) is a free keyword search tool that builds interactive
    network visualizations for the diffusion across Twitter of claims that have been
    fact-checked by one of the main fact-checking sites. *The* *Factual* ^([^(353)](#fn353))
    is a free mobile app and browser extension that uses machine learning to estimate
    the quality of news articles; it does this by combining a few different estimated
    quantities pertaining to the article, such as a reputation score for the journalist(s),
    an NEQ-type score for the publisher, and a measure of how opinionated the article’s
    language is.


    ## Fact-Checking on the Big Platforms


    In this section, I look at the ways that Google, YouTube, Facebook, and Twitter
    have embedded fact-checking into their platforms.


    ### Google


    The Google search itself is certainly a common source of information that can
    help with fact-checking, but here I want to highlight a few additional features
    that more directly focus on fact-checking. I already mentioned Google’s knowledge
    graph that powers the information panels appearing on certain searches—while the
    information there is not always accurate, Google allows users to provide feedback
    and corrections, and in September 2020 Google said^([^(354)](#fn354)) that it
    “deepened our partnerships with government agencies, health organizations and
    Wikipedia” to increase the accuracy of the knowledge graph. I also mentioned how
    Google’s reverse image search can be a helpful tool for uncovering the provenance
    of images. Let me turn now to some other helpful tools and fact-checking topics
    related to Google.


    If you begin a Google search with the keywords “fact check,” then below many of
    the search results Google will attempt to extract a one-sentence claim, the people
    or organizations making the claim, and the beginning of a fact-check of the claim
    provided by a fact-checking organization if this information can be found. For
    instance, just now I searched for “fact check AstraZeneca vaccine banned,” and
    the top result is a link to a fact-check from Full Fact—and just below the link
    Google says “Claim: Seventeen countries have banned the AstraZeneca vaccine outside
    of the UK” and “Claimed by: Facebook users” and “Fact check by Full Fact: This
    is not the case. At the time of….” Google automatically includes this kind of
    fact-check information on certain keyword searches, and in June 2020 it started
    including it below some image thumbnails for certain image searches as well.^([^(355)](#fn355))
    Google also has a tool^([^(356)](#fn356)) that lets users directly do keyword
    searches for fact-checks and browse recent fact-checks.


    ### YouTube


    In March 2019, YouTube began adding information panels written by third-party
    fact-checking organizations to searches for topics prone to misinformation—but
    these fact-checks really were about the keyword search, not any of the particular
    videos that it returned. This feature launched initially in India and Brazil and
    then reached the United States in April 2020, in large part to help deal with
    the flood of COVID-related misinformation.^([^(357)](#fn357)) Some fact-checking
    organizations such as PolitiFact offer fact-checks of individual YouTube videos,
    though you have to access these from PolitiFact’s website^([^(358)](#fn358)) rather
    than directly through YouTube.'
