  trans: '

    # Google 广告与假新闻


    假新闻的兜售者无疑希望以某种方式从其邪恶行径中获利。对其中一部分人而言，其目标主要是政治性的——他们可能是外国政府虚假信息宣传活动的一部分，旨在制造混乱并削弱主权国家的民主支柱；也可能是国内某些运动的参与者，利用欺骗手段来左右公众对特定议题的看法。然而，对许多其他人来说，目标非常简单直接，就是赚钱，而兜售假新闻不过是一门生意。


    但兜售假新闻如何赚钱呢？通常，是通过第 1 章讨论的那种页面浏览量广告。这正是谷歌登场之处：虽然我们通常将谷歌视为搜索引擎或科技公司，但从收入角度来看，它本质上是一家广告公司——而且是全球最大的广告公司。2017
    年的一份报告发现^(²³³)，在线广告已超越电视成为最大的广告媒介，谷歌 2016 年的广告收入（近八百亿美元）位居广告行业之首，是紧随其后的竞争对手 Facebook
    的三倍，而谷歌和 Facebook 的广告收入合计占全球整个广告行业收入的近百分之二十。到 2020 年，谷歌的年广告收入已增长^(²³⁴)至近一千五百亿美元，占公司总收入的百分之八十。换句话说，谷歌每赚五美元，就有四美元来自广告。而美国数字广告行业每赚三美元，就有一美元落入谷歌口袋。^(²³⁵)


    谷歌通过两种方式赚取广告收入；要理解它们，不妨用房地产的概念来思考。最直接的方式是，机构向谷歌付费，让谷歌在其自有网站上展示广告。例如，如果你想为某款特定产品做广告，你可以付费让谷歌将你的广告置于包含你选定关键词的谷歌搜索结果顶部。这就像直接从谷歌租用一小块地产来放置你的广告。第二种方式则更为间接——同样是机构向谷歌付费投放广告，但这次广告是投放在第三方网站上，而非谷歌自有网站。在这种方式中，谷歌只是一个中间商，本质上是一个虚拟的房地产经纪人，帮助促成不同客户之间的交易。如果你想为产品做广告，你告诉谷歌你希望广告出现在哪种类型的网站上，谷歌就会找到愿意托管广告的网站，并收取费用将你的广告放置在那里。另一方面，如果你运营着一个热门网站并想从中获利，只需告诉谷歌你网站上的某块“地产”可供出租，谷歌便会收取费用，找到愿意接受你报价的广告商。托管谷歌所投放广告的网站被正式称为
    *Google 展示广告网络*（因为这些网站“展示”广告）。由于该网络规模庞大，且每天有数十亿^(²³⁶)条广告在其中投放，所有这些交易都是自动化的，并由算法驱动。


    这就让我们回到了假新闻的话题。当谷歌在发布虚假信息的网站上投放广告时，谷歌实际上是在为这些网站提供收入来源——这往往是它们唯一的收入来源。但谷歌的广告投放算法又如何能判断网站上的信息是否准确呢？我将在本书最后两章探讨这个话题；简短的答案是，这*非常*困难。即使这能做到，也没有法律禁止谷歌通过在假新闻或危险煽动性网站上投放广告来获利。此外，公众对这种明显不道德行为的抵制是有限的，因为广告托管网站上的用户看不到是哪家公司负责投放了广告；谷歌算法的无形之手，除了直接参与交易的人之外，对所有人都隐藏了起来。


    简而言之，谷歌有经济动机在尽可能多的网站上投放广告，而不仅仅是那些值得信赖的网站。这样做时，谷歌也为这些网站提供了经济激励，促使它们吸引尽可能多的网络流量，即使这些流量是通过操纵性的虚假信息获得的。如此一来，无良的博主和记者通过耸人听闻、吸引眼球的假新闻获利——谷歌也同样获利。这就将本章的主题与第
    1 章的主题——新闻业的页面浏览量经济腐败——联系了起来。


    现在，是时候更仔细地审视谷歌如何通过算法广告投放为假新闻提供资金支持了。

