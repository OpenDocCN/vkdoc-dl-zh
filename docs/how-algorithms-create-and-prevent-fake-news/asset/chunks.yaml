  trans: '

    ### 决心寻找用途


    马尔斯顿或许在科学严谨性上有所欠缺，但他用商业头脑弥补了这一点：在他的职业生涯中，他努力推广自己的测谎仪，并通过公开广告活动甚至漫画书来吹嘘其所谓的革命性成功。他在这方面相当成功。但如果测谎仪在法庭上不被采信，那它又有什么用途呢？基本上只有一种用途，但这一用途却出奇地庞大且利润丰厚。虽然大多数私营公司使用测谎仪是违法的，但许多政府机构——无论是地方还是联邦——都将测谎仪作为其背景就业筛查流程的一部分。据估计^(¹⁵²)，美国每年进行
    250 万次测谎测试，远超其他任何国家，这催生了一个价值 20 亿美元的产业。


    2007 年的一项调查发现，大约四分之三的城市警长和警察部门在招聘过程中使用测谎仪。消防员和护理人员的招聘也普遍使用测谎仪。它们也是联邦政府安全审查流程的一部分；我多年前在
    NSA（美国国家安全局）做大学暑期实习时就亲身经历过。我仍然记得当时很紧张，不得不飞越全国，在一个简朴的检查室里被绑在这台奇怪的机器上，旁边还有多位政府官员，就像好莱坞电影里的场景。我还记得当我意识到他们问我的问题并非困难或令人尴尬的个人细节时，紧张感很快就消失了——他们问的都是些简单问题，比如：“你是否曾积极密谋推翻美国政府？”我想知道这能揭示什么，又有谁会通不过这个测试。但他们不会与你分享测试结果，只是将测谎数据纳入保密的整体背景调查中，你所能做的就是信任这个系统。就我而言，我通过了筛查，并获得了那个夏天的安全许可，但直到今天，我仍然不知道测谎仪对我究竟显示了什么。


    ### 持久的质疑


    让我再强调一遍：测谎仪的可靠性不足以在法庭或私营公司中使用，然而公共部门却欣然接受了这项可疑的技术，并每年用它来筛查超过两百万人，其中大多数人只是在申请那些他们可以努力行善并对社会产生积极影响的工作。据信^(¹⁵³)，每年有数万或数十万申请者未能通过测谎测试，从而被拒绝录用（具体数字未知）。所有这一切，尽管测谎仪在其一百年的历史中，始终未能以公认的科学方式确立其合法性。事实上，1965
    年，美国政府运作委员会评估了科学证据并得出以下结论：^(¹⁵⁴)“不存在测谎仪，无论是人还是机器。人们被一个神话所欺骗，即调查员手中的一个金属盒子能够检测真伪。”在
    21 世纪，*金属盒子*已被*黑箱*所取代——也就是深度学习。这是我很快就要讨论的主要话题。


    但首先，在结束对老式（但仍广泛使用的）测谎仪背景历史的介绍之前，还有一点很重要，这一点也与新式人工智能测谎仪密切相关。前中央情报局局长詹姆斯·伍尔西在 2009
    年的一次采访中警告说：^(¹⁵⁵)“测谎仪的最大缺陷是它会产生大量的误报，尤其是在大规模筛查中使用时。”换句话说，测谎仪倾向于将真话误判为谎言，即使这种情况发生的概率相对较低（实际上未必如此），但当像就业筛查那样大规模使用时，这意味着大量的人被错误且不公平地认定为说谎者。事实上，伍尔西接着表示，这种误报问题“严重损害了许多人的生活，让他们在并未真正做错任何事的情况下未能通过测谎测试。”


    进一步加剧这种不公的是，误报并非均匀地影响所有申请者。例如，20 世纪 80 年代悄然和解的一起种族歧视集体诉讼揭示^(156)，20 世纪 70 年代末，库克县惩教署的黑人申请者测谎失败率很高，这种情况随机发生的概率仅为千分之一——这意味着测谎结果几乎肯定对黑人申请者存在偏见。（和解协议的一部分是要求库克县立即停止在就业筛查中使用测谎测试。）同样，1990
    年，美国国防部进行了一项关于测谎仪可靠性的研究，发现在模拟刑事诉讼中，无辜的黑人比无辜的白人更容易收到误报。


    造成这种差异的原因尚不完全清楚，但专家提出的一种解释是，测谎仪的读数非常模糊且易于解读，以至于它们本质上成了审查员的罗夏测试，从而受到其个人情绪和偏见的影响。一位神经科学家表示：^(157)“一位审查员可能将血压峰值视为欺骗的迹象，另一位可能不予理会——正是在这些个人判断中，偏见可能悄然潜入。审查员的决定可能主要基于两人之间的人际互动。”美国公民自由联盟的一位高级政策分析师进一步阐述了这一点：^(158)“在这方面，测谎仪就像我们近年来看到的其他伪科学技术一样：因为它们从根本上就是虚假的，最终在缺乏真正有用测量的情况下，它们只不过成为了操作者用自己对受试者的个人评估来替代的工具。对于某些操作者来说，这不可避免地意味着种族偏见。”


    结构性种族主义也可能在其中发挥作用，例如，导致黑人在政府审讯期间更加紧张。令人相当惊讶的是，关于测谎仪偏见的研究如此之少，尤其是考虑到它们在公共部门的使用如此广泛。


    现在，我们对传统测谎仪的历史介绍就结束了。在舞台搭建妥当之后，我们将步入算法测谎的世界。


    ## 测谎仪遇上人工智能


    正如你在关于深度伪造的章节中已经看到的那样，深度学习推动了我们在处理视觉数据能力方面的一场革命。乍一看，测谎似乎应该是一个相当直接的应用：在监督下的二分类任务中训练机器学习算法，将视频片段分类为真实或虚假。然而，事实证明，有偏误报的问题就像机器中的幽灵，并非那么容易消除。

    '
- fmt: '### Lies in the Eyes


    In 2014, a startup funded by Mark Cuban called `Converus` released a product called
    `EyeDetect`, pitched as a faster, cheaper, and more accurate alternative to the
    polygraph. It is the main product from this company with a self-described “vision
    to provide trustworthy, innovative solutions for the deception detection industry.”
    The hype and fanfare quickly led to fairly widespread adoption, primarily though
    not exclusively for public sector employment screening. According to the company
    website, by January 2019, `EyeDetect` had been sold to over five hundred clients
    in forty countries; in the United States, these clients included the federal government
    and twenty-one state and local agencies.


    As the name suggests, `EyeDetect` relies not on blood pressure or skin conductivity
    or respiration rates like the traditional polygraph; instead, its focus is on
    the windows to the soul: the eyes. Perhaps an even more significant difference
    is that, in stark contrast to traditional polygraphs, `EyeDetect` does not involve
    a human examiner to interpret the readings and decide what is a lie and what is
    truthful—`EyeDetect` reaches its conclusions in an automated, algorithmic manner
    by applying machine learning. Indeed, `EyeDetect` was fed close-up video footage
    of subtle eye movements for participants who were telling the truth and also for
    participants who were lying, and the algorithm used this as training data to determine
    what honesty and dishonesty look like in the eyes.


    Taking the human interpreter out of the equation certainly helps to create an
    air of impartiality, but does this algorithmic approach actually yield reliable
    and unbiased results? Sadly, no. The past several years have taught us that algorithmic
    bias is a serious and fundamental issue in machine learning. Not only do algorithms
    absorb bias that inadvertently creeps into data sets used for training, but the
    algorithms reproduce and often amplify this bias. Much has been written about
    this pernicious data-driven feedback loop phenomenon in general, and I’ll return
    to it here in the specific setting of lie detection shortly.


    According to a 2018 investigation by `Wired`, the Department of Defense and US
    Customs and Border Protection have been trialing `Converus`’ technology, and while
    federal law prohibits most private companies from using any kind of lie detection
    device for employee screening on American soil, evidently a handful of companies
    including FedEx and McDonald’s and Uber have used `EyeDetect` in Guatemala and
    Panama and Mexico. The credit rating agency Experian uses it on its staff in Colombia
    to try to prevent employees from manipulating records in order to help fraudulently
    secure loans for family members. `Converus` said an unnamed Middle Eastern country
    had purchased `EyeDetect` to screen people entering the country for possible terrorist
    activity/affiliations.


    `Converus` claims its system attains an eighty-six percent accuracy rate, better
    than the roughly seventy percent estimated for traditional polygraphs (the company
    goes so far as to assert that `EyeDetect` is “the most accurate lie detector available”).
    However, the `Wired` investigation points out that “The only peer-reviewed academic
    studies of `Converus`’ technology have been carried out by the company’s own scientists
    or students in their labs,” which is not particularly reassuring and screams of
    an obvious conflict of interest. Eyebrows are usually raised when a private company
    funds research into the efficacy of a product that the company aims to profit
    from—but here the company didn’t just fund the research, it conducted the research
    itself behind closed doors. John Allen, a psychology professor not involved with
    `Converus`, was asked by `Wired` to read a couple of the company’s academic papers
    in order to try to assess the situation. This is what he had to say: “My kindest
    take is that there is some promise, and that perhaps with future independent research
    this test might provide one measure among many for formulating a hypothesis about
    deceptive behavior. But even that would not be definitive evidence.” Not exactly
    a glowing recommendation.


    And these academic papers only cover the more successful experiments conducted
    by `Converus`; the company’s first field test revealed a glaring weakness in the
    system, yet the results of this experiment were never published. The chief scientist
    at `Converus`, who is also the cocreator of `EyeDetect`, later admitted what happened
    during this first field test: “Although the data were limited, the [test] appeared
    to work well when we tested well-educated people who had applied to work for an
    airline, but the [test] was ineffective when we tested less well-educated applicants
    for security companies.” This remark very much suggests that the machine learning
    algorithms powering `EyeDetect` were trained on a highly selective and nonrepresentative
    sample of the population, which is a common recipe in the algorithmic world for
    pernicious bias that disproportionately harms underprivileged populations.


    At an even more fundamental level, the chief scientist’s remark raises a striking
    question that the company seems to have left unanswered: why would one’s visual
    indicators of deceit depend on one’s level of education? The mythology of lie
    detection is that efforts to conceal deception are innate and universal, unvarying
    across populations—yet this failed field test shows that this is not at all the
    case. This observation should have rattled the very foundations of `Converus`’
    endeavor, but instead the company seems to have just swept it under the rug and
    threw more data and more neural network layers at the problem. As a further indication
    of problematic non-universality, consider the following memo (also revealed in
    the `Wired` investigation) that a `Converus` marketing manager wrote to a police
    department client in 2016: “Please note, when an `EyeDetect` test is taken as
    a demo […] the results are often varied from what we see when examinees take the
    test under real test circumstances where there are consequences.” Something is
    very fishy here—and it gets worse.


    By design, the `EyeDetect` system allows the examiner to adjust the `sensitivity`,
    meaning the threshold at which the algorithm declares a lie to have been detected.
    The idea behind this is that certain populations historically might be more truthful
    than others, so the system will produce more accurate results if it is calibrated
    to the population baseline level when examining each individual. In the words
    of the president and CEO of `Converus`, Todd Mickelsen: “This gives all examinees
    a fairer chance of being classified correctly. Most organizations can make good
    estimates of base rates by considering the number of previously failed background
    checks, interview data, confessions, evidence, etc.” Really?'
