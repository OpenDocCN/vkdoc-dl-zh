- fmt: "# Summary\n\nAmerican newspapers in the late 19th century were sold each day\
    \ on an individual basis and competed for sales by having the wildest headlines\
    \ even if the actual content was exaggerated or fabricated. The subscription model\
    \ took over and dominated throughout the 20th century; it brought fake news under\
    \ control by providing a financial incentive for journalists to write accurate,\
    \ well-researched stories because misleading content would cause customers to\
    \ cancel their subscriptions and turn to competitor papers.\n\nAs news moved to\
    \ online formats in the 21st century, ad revenue became the prevailing financial\
    \ structure, and pageviews rose to prominence as the fundamental currency. Simultaneously,\
    \ the news industry diversified to include a vast number of publishers of varying\
    \ sizes, and social media and news aggregators became a common way for people\
    \ to get their news. Loyalty to specific newspapers diminished, and the battle\
    \ for customer attention returned, bringing back many of the problems from the\
    \ 19th century—except worse: quantitative methods allow authors to engineer clickbait\
    \ headlines and articles for maximal virality, even if doing so involves fabricating\
    \ fake news.\n\nThe intense competition for ad revenue also encourages journalists\
    \ to take shortcuts by spending their time scouring blogs and papers for stories\
    \ rather than doing direct investigations. This results in a vertical propagation\
    \ in which fake news can slip into the system at the bottom in blogs or low-level\
    \ newspapers with minimal editorial standards and then work its way up to the\
    \ top.\n\nThe subscription model has been returning to some newspapers, in the\
    \ online form of a paywall, but plenty of free papers supported by ad revenue\
    \ remain. Moreover, a long-term consequence of the changing technological and\
    \ economic landscape of journalism is the stark contraction of regional newspapers,\
    \ which shows no signs of abating. Opportunistic political propagandists and professional\
    \ fake news peddlers have been rapidly filling this void with deceptive papers\
    \ that appeal to people’s old-fashioned trust in local news.\n\nWhile this chapter\
    \ did not delve into algorithmic aspects of fake news—the main topic of this book—it\
    \ set the stage by showing how journalism is currently structured and funded and\
    \ in doing so revealed some vulnerabilities in the system that will play an important\
    \ role in the following chapters. It also showed how data—in the form of pageviews—play\
    \ a central role. All the algorithms you will encounter later in this book are\
    \ powered by data in various forms. This chapter did include a brief primitive\
    \ example of automated news production—a network of fake regional news sites pasting\
    \ in press releases from other sources and putting together simple generic content\
    \ based on local weather forecasts. In the next chapter, I’ll show how algorithmically\
    \ produced news content has been taken to previously unimaginable levels of sophistication\
    \ and explore the role it now plays in the proliferation of fake news.\n\nFootnotes\
    \ [1](#508514_1_En_1_Chapter.xhtml#Fn1_source) [2](#508514_1_En_1_Chapter.xhtml#Fn2_source)\
    \ [3](#508514_1_En_1_Chapter.xhtml#Fn3_source) [4](#508514_1_En_1_Chapter.xhtml#Fn4_source)\
    \ [5](#508514_1_En_1_Chapter.xhtml#Fn5_source) [6](#508514_1_En_1_Chapter.xhtml#Fn6_source)\
    \ [7](#508514_1_En_1_Chapter.xhtml#Fn7_source) [8](#508514_1_En_1_Chapter.xhtml#Fn8_source)\
    \ [9](#508514_1_En_1_Chapter.xhtml#Fn9_source) [10](#508514_1_En_1_Chapter.xhtml#Fn10_source)\
    \ [11](#508514_1_En_1_Chapter.xhtml#Fn11_source) [12](#508514_1_En_1_Chapter.xhtml#Fn12_source)\
    \ [13](#508514_1_En_1_Chapter.xhtml#Fn13_source) [14](#508514_1_En_1_Chapter.xhtml#Fn14_source)\n\
    \n# 2. Crafted by Computer\n\nArtificial Intelligence Now Generates Headlines,\
    \ Articles, and Journalists\n\n> *Some well-known facts, some half-truths, and\
    \ some straight lies, strung together in what first looks like a smooth narrative.*\n\
    > \n> —NYU Professor Julian Togelius^([^(15)](#fn15)) on the latest text-generating\
    \ AI\n\nMachine learning, the predominant branch of modern artificial intelligence\
    \ (AI), has in recent years moved beyond the task of making data-driven predictions—it\
    \ is now capable of creativity in various forms. The applications of this emerging\
    \ technology are myriad; the focus in this book is the role it plays in fake news.\
    \ In this chapter, you will first see examples of AI being used to create profile\
    \ photos of nonexistent journalists, then AI that automatically writes headlines\
    \ for articles, then AI that writes entire articles based on a user’s prompt.\
    \ After exploring these examples and what they mean for the battle against disinformation,\
    \ this chapter provides an accessible whirlwind tour of machine learning starting\
    \ from the very beginning of the subject and leading up to the contemporary computational\
    \ methods behind the synthesis of photos and text. It then concludes with a look\
    \ at the AI-powered tools developed so far for automating the detection of AI-generated\
    \ photos and text."
