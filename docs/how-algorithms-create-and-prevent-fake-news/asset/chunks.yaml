- fmt: '# Google News


    The *News* section of Google provides links to articles that are algorithmically
    aggregated into collections in a few different ways: *For you* articles are individualized
    recommendations based on user data, *Top stories* are trending stories that are
    popular among a wide segment of the user population, and there are a variety of
    categories (such as business, technology, sports, etc.) that collect trending
    stories by topic. Google News also allows users to perform keyword searches that
    return only news articles rather than arbitrary website links. Needless to say,
    when stories appear in these aggregated collections or news article searches,
    it lends them an air of legitimacy, in addition to a large audience—even if the
    story is fake news.


    The details of how these news gathering/ranking algorithms work are closely guarded
    corporate secrets. In May 2019, the VP of Google News wrote^([^(212)](#fn212))
    that “The algorithms used for our news experiences analyze hundreds of different
    factors to identify and organize the stories journalists are covering, in order
    to elevate diverse, trustworthy information.” While most of these hundreds of
    factors are not publicly known, it is understood that they include, among other
    things, the number of clicks articles get, estimates of the trustworthiness of
    the publishing organizations, geographic relevance, and freshness of the content.


    The VP of Google News also stated that “Google does not make editorial decisions
    about which stories to show” and that “our primary approach is to use technology
    to reflect the news landscape, and leave editorial decisions to publishers.” To
    prevent fake news from running rampant on the platform, Google says “Our algorithms
    are designed to elevate news from authoritative sources.” Very little has been
    said publicly about what this really means and how it is accomplished. All I could
    find on Google’s official website that supposedly describes how trustworthy news
    is elevated^([^(213)](#fn213)) is that the algorithms rely on signals that “can
    include whether other people value the source for similar queries or whether other
    prominent websites on the subject link to the story.”


    Alas, it doesn’t seem that much progress has been made toward uncovering the state
    of fake news on Google News and the company’s efforts to limit it. However, the
    official explanatory site for Google News also states that “Our ranking systems
    for news content across Google and YouTube News use the same web crawling and
    indexing technology as Google Search,” so it seems the time is right to turn now
    to this chapter’s lengthiest section: the role Google search plays in the dissemination
    of fake news.


    # Google Search


    When we search for information on Google, the results that come up—and the order
    they are presented in—shape our views and beliefs. This means that for Google
    to limit the spread of misinformation, it must find ways of training its algorithms
    to lift quality sources to the top without taking subjective, biased perspectives
    on contentious issues and also without impinging on people’s ability to scour
    the depths of the Web. There are many pieces of this story. In this section, I
    will present evidence backing up the assertion that search result rankings affect
    individuals’ worldviews; look into what factors Google’s search algorithm uses
    to decide how to rank links; illustrate how featuring highlights from top searches
    has led to problematic misinformation; show how authentic links have been removed
    from Google through deceptive means; introduce the deep learning language model
    Google recently launched to power its search and many other tools; and, finally,
    discuss Google’s efforts to elevate quality journalism in its search rankings.


    ## Ranking Matters


    In August 2015, a study^([^(214)](#fn214)) of the impact Google search rankings
    have on political outlook was published in the prestigious research journal *Proceedings
    of the National Academy of Sciences*. One of the main experiments in this study
    was the following. Participants were randomly placed in three different groups.
    The participants were all provided brief descriptions of two political candidates,
    call them A and B, and then asked how much they liked and trusted each candidate
    and whom they would vote for. They were then given fifteen minutes to look further
    into the candidates using a simulated version of Google that only had thirty search
    results—the same thirty for all participants—that linked to actual websites from
    a past election. After this fifteen-minute session, the participants were asked
    the same questions as before about the two candidates. The key was that one group
    had the search results ordered to return the results favorable to candidate A
    first, another group had results favorable to candidate B first, and for the third
    group the order was mixed.


    The researchers found that on all measures, the participants’ views of the candidates
    shifted in the direction favored by the simulated search rankings, by amounts
    ranging between thirty-seven and sixty-three percent. And this was just from a
    single fifteen-minute search session. The researchers also experimented with a
    real election—two thousand undecided votes in a 2014 election in India. The authors
    stated^([^(215)](#fn215)) that “Even here, with real voters who were highly familiar
    with the candidates and who were being bombarded with campaign rhetoric every
    day, we showed that search rankings could boost the proportion of people favoring
    any candidate by more than 20 percent—more than 60 percent in some demographic
    groups.”


    The researchers go on to boldly suggest that “Google’s search algorithm, propelled
    by user activity, has been determining the outcomes of close elections worldwide
    for years, with increasing impact every year because of increasing Internet penetration.”
    I find this assertion to be a stretch—at least, the evidence to really back it
    up isn’t in their PNAS paper—but my focus in this book is not political bias and
    elections, it is fake news. And the researchers here did convincingly establish
    that search rankings matter and affect people’s views, which means there are real
    consequences when Google places fake news links highly in its search rankings.


    Dylann Roof, the neo-Nazi who in 2015 murdered nine Black people at a church in
    Charleston, South Carolina, wrote a manifesto^([^(216)](#fn216)) in which he claims
    to have been inspired by Google. He described how he typed “black on White crime”
    into Google, and he has “never been the same since that day.” He says the first
    site this search produced was for an organization called the Council of Conservative
    Citizens (CCC). It contained numerous descriptions of “brutal black on White murders.”
    He alleges that seeing this made him question the media’s attention on the Trayvon
    Martin case, and it motivated him to pursue a self-education journey on Google
    on racial matters—a journey that, as we now know, ended in unfathomable tragedy.


    While this is anecdotal evidence, it is nonetheless quite unsettling and shows
    one of the dangers of letting algorithms decide what information we should see,
    and in what order. As UCLA professor Safiya Noble pointed out in her book *Algorithms
    of Oppression* critiquing Google, the top result for Roof’s search should have
    been an authoritative source such as FBI crime statistics—which shows that most
    violence against white Americans is committed by white Americans—rather than the
    CCC, an organization whose Statement of Principles says that it “opposes all efforts
    to mix the races of mankind.”'
