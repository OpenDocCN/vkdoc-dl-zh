    = "pearson")

    age_yr_op_correlation

    Listing 7-6

    Outlining the Pearson Coefficient of the Relationship Between Age and Year of
    Operation

    ```


    Table [7-3](#527603_1_En_7_Chapter.xhtml#Tab3) suggests the presence of a very
    weak positive correlation relationship between `Year_of_operation` and `Age` (with
    the Pearson correlation coefficient at 0.0926).


