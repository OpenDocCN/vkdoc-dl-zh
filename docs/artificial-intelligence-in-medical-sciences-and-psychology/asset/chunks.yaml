    Listing [6-1](#527603_1_En_6_Chapter.xhtml#PC1) preprocesses the images (for training)
    by carrying out the `image_dataset_from_directory()` method from the `keras` library.
    Equally, it outlines the `validation_split`, `subset`, `image_size,` and `batch_size`.
    Start by installing Keras in your environment: `pip install keras`. In addition,
    install NumPy in your environment: `pip install numpy`.


    ```

    import keras

    import numpy as np

    import pathlib

    covid_19_data = pathlib.Path(r"filepath\cov_19_ct_scans")

    covid_19_training_data = image_dataset_from_directory(covid_19_data,seed = 123,
    validation_split = 0.2, subset = "training",  image_size = (180, 180), batch_size
    = 16)

    Listing 6-1

    Preprocessing the Training COVID-19 CT Scan Data

    ```


    ### Preprocessing the Validation COVID-19 CT Scan Data


    Listing [6-2](#527603_1_En_6_Chapter.xhtml#PC2) preprocesses the images (for validation)
    by carrying out the `image_dataset_from_directory()` method from the `keras` library.
    Equally, it outlines the `validation_split`, `subset`, `image_size,` and `batch_size`.


    ```

    covid_19_validation_data = image_dataset_from_directory(covid_19_data, seed =
    123, validation_split = 0.2, subset = "validation", image_size = (180, 180), batch_size
    = 16)

    Listing 6-2

    Preprocessing the Validation COVID-19 CT Scan Data

    ```


    ### Generating the Training COVID-19 CT Scan Data


    Listing [6-3](#527603_1_En_6_Chapter.xhtml#PC3) generates an image for training
    by carrying out the `ImageDataGenerator()` method and outlining the rescaled ratio.
    Following that, it executes the `flow_from_directory()` method and outlines the
    `target_size`, `class_mode,` and `batch_size`.


    ```

    import numpy as np

    covid_19_training_data_categories = np.array(covid_19_training_data.class_names)

    covid_19_generated_image_data = keras.preprocessing.image.ImageDataGenerator(rescale
    = 1./255)

    covid_19_generated_image_data_for_training = covid_19_generated_image_data.flow_from_directory(covid_19_data,  target_size
    = (180, 180),  class_mode = "categorical",  shuffle = True, batch_size = 16)

    covid_19_images, covid_19_labels = next(iter(covid_19_generated_image_data_for_training))

    Listing 6-3

    Generating the Training COVID-19 CT Scan Data

    ```


    ### Tuning the Training COVID-19 CT Scan Data


    This section develops a convolutional neural network. Initially, it prepares the
    image data in such a way that the network better identifies patterns by tuning
    them (see Listing [6-4](#527603_1_En_6_Chapter.xhtml#PC4)).


    ```

    covid_19_experimental_tuning = tf.data.experimental.AUTOTUNE

    covid_19_training_data = covid_19_training_data.cache().shuffle(1000).prefetch(buffer_size
    = covid_19_experimental_tuning)

    covid_19_validation_data = covid_19_validation_data.cache().prefetch(buffer_size
    = covid_19_experimental_tuning)

    Listing 6-4

    Tuning the Training COVID-19 CT Scan Data

    ```


    ## Carrying Out the CNN to Classify COVID-19 CT Scan Data


    Listing [6-5](#527603_1_En_6_Chapter.xhtml#PC5) carries out the convolutional
    neural network on the image data. Start by installing TensorFlow in your environment:
    `pip install tensorflow`. The architectural structure of the CNN constructed in
    this chapter is similar to those constructed in the preceding chapter to classify
    patient brain tumor and pneumonia outcomes. It also comprises a set of 2D convolutional
    and MaxPooling 2D layers, a flatten layer, and two dense layers; all layers contain
    a `relu` activation function, consisting of a sparse cross-categorical cross-entropy
    loss function, and an accuracy metric. Furthermore, it is trained across 64 epochs.


    ```

    from tensorflow.keras import layers

    from tensorflow.python.keras.layers import Dense, Flatten, Conv2D, Dropout, MaxPooling2D

    covid_19_convolutional_net_model = tf.keras.Sequential([

    tf.keras.layers.experimental.preprocessing.Rescaling(1./255),

    tf.keras.layers.Conv2D(16, 3, activation = "relu"),

    tf.keras.layers.MaxPooling2D(),

    tf.keras.layers.Conv2D(64, 3, activation="relu"),

    tf.keras.layers.MaxPooling2D(),

    tf.keras.layers.Conv2D(128, 3, activation="relu"),

    tf.keras.layers.MaxPooling2D(),

    tf.keras.layers.Flatten(),

    tf.keras.layers.Dense(255, activation="relu"),

    tf.keras.layers.Dense(3)

    ])

    covid_19_convolutional_net_model.compile(optimizer = "adam",   = tf.keras.losses.SparseCategoricalCrossentropy(from_logits
    = True), metrics = ["accuracy"])

    covid_19_convolutional_net_model_history = covid_19_convolutional_net_model.fit(covid_19_training_data,
    validation_data = covid_19_validation_data, epochs = 64)

    Listing 6-5

    Carrying Out the CNN to Classify COVID-19 CT Scan Data

    ```


    ### Considering the CNN’s Performance


    To determine how well the CNN classifies patient Covid-19 outcomes in training
    and cross-validation, this segment monitors the degree of sparse categorical cross-entropy
    loss and accuracy metric fluctuations as epochs increase.


    #### Accuracy Fluctuations Across Epochs in Training and Cross-Validation


    Figure [6-2](#527603_1_En_6_Chapter.xhtml#Fig2) depicts the degree of accuracy
    fluctuations as epochs increase in training and cross-validation when the CNN
    classifies patient Covid-19 outcomes. See the code in Listing [6-6](#527603_1_En_6_Chapter.xhtml#PC6).


    ![](images/527603_1_En_6_Chapter/527603_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Accuracy fluctuations across epochs in training and cross-validation


    ```

    plt.plot(covid_19_convolutional_net_model_history.history["accuracy"],

    color = "orange",

    marker = "o",

    label = "Training accuracy")

    plt.plot(covid_19_convolutional_net_model_history.history["val_accuracy"],

    color = "blue",

    marker = "o",

    label = "CV accuracy")

    plt.xlabel("Epochs")

    plt.ylabel("Accuracy")

    plt.legend(loc = "best")

    plt.show()

    Listing 6-6

    Charting Accuracy Fluctuations Across Epochs in Training and Cross-Validation

    ```


    Figure [6-2](#527603_1_En_6_Chapter.xhtml#Fig2) depicts accuracy increase as epochs
    increase in training and cross-validation, with it being higher during training
    than cross-validation.


    #### Sparse Categorical Cross-Entropy Loss Fluctuations Across Epochs in Training
    and Cross-Validation


    Figure [6-3](#527603_1_En_6_Chapter.xhtml#Fig3) depicts the degree of sparse categorical
    cross-entropy loss fluctuations as epochs increase in training and cross-validation
    when the CNN classifies patient Covid-19 outcomes. See Listing [6-7](#527603_1_En_6_Chapter.xhtml#PC7).


    ![](images/527603_1_En_6_Chapter/527603_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Sparse categorical cross-entropy loss fluctuations across epochs in training and
    cross-validation


    ```

    plt.plot(covid_19_convolutional_net_model_history.history["loss"],

    color = "orange",

    marker = "o",

    label = "Training loss")

    plt.plot(covid_19_convolutional_net_model_history.history["val_loss"],

    color = "blue",

    marker = "o",

    label = "CV loss")

    plt.xlabel("Epochs")

    plt.ylabel("Loss")

    plt.legend(loc = "best")

    plt.show()

    Listing 6-7

    Charting Sparse Categorical Cross-Entropy Loss Fluctuations Across Epochs in Training
    and Cross-Validation

    ```


    Figure [6-3](#527603_1_En_6_Chapter.xhtml#Fig3) depicts in training, the sparse
    categorical cross-entropy loss slightly declines in the first two epochs, followed
    by an upward trend until the 10th epoch, but the trend is erased by the 11th epoch
    and further expands until the 64th epoch. Meanwhile, the sparse categorical cross-entropy
    loss slowly deteriorates as epochs increase.


    ## Conclusion


    This chapter introduced you to the chest CT scan image classification for COVID-19
    by a convolutional neural network via an approach similar to the two prior chapters.


