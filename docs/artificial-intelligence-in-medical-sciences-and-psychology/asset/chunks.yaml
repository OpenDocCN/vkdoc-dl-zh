    ## 肺炎


    肺炎是一种由细菌或病毒引起的可预防的肺部感染。为预防此病，可以选择接种疫苗。肺炎的典型症状包括持续咳嗽、长期发热和呼吸困难等。该病在哮喘患者、糖尿病患者和吸烟者等风险人群中较为常见。对抗此病的医学分支称为肺病学。


