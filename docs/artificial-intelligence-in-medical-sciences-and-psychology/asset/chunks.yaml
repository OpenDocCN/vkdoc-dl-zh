    # Debunking Deep Belief Networks


    A deep belief network lumps together manifold restricted Boltzmann machines by
    permitting innumerable hidden layers, thus magnifying the complexity of a neural
    network. Equation [2-1](#527603_1_En_2_Chapter.xhtml#Equ1) defines a deep belief
    network:


    ![$$ E(w)={\sum}_{i=1}^ne\left(f\left({x}_i,w\right),{y}_i\right). $$](images/527603_1_En_2_Chapter/527603_1_En_2_Chapter_TeX_Equ1.png)


    (Equation 2-1)


    ## Designing the Deep Belief Network


    Listing [2-5](#527603_1_En_2_Chapter.xhtml#PC5) develops the artificial neural
    network. To begin, it imports crucial libraries for developing the network. Following
    that, it outlines the structure of the network in such a way that the input layer
    holds 11 neurons with a `relu` activation, three hidden layers hold 11 neurons
    with a `relu` activation function, and the output layer generates labels with
    a sigmoid function (see Figure [2-2](#527603_1_En_2_Chapter.xhtml#Fig2)). Start
    by installing `TensorFlow` in your environment: `pip install tensorflow`.


    ![](images/527603_1_En_2_Chapter/527603_1_En_2_Fig2_HTML.png)


    Figure 2-2


    Neural network structure


    ```python

    import tensorflow as tf

    from tensorflow.keras import Sequential, regularizers

    from tensorflow.keras.layers import Dense

    def cardiovascular_dbn_function():

    cardiovascular_dbn_model = Sequential()

    cardiovascular_dbn_model.add(Dense(11, input_dim = 11, activation = "relu"))

    cardiovascular_dbn_model.add(Dense(11, activation = "relu"))

    cardiovascular_dbn_model.add(Dense(11, activation = "relu"))

    cardiovascular_dbn_model.add(Dense(11, activation = "relu"))

    cardiovascular_dbn_model.add(Dense(1, activation = "sigmoid"))

    cardiovascular_dbn_model.compile(loss = "binary_crossentropy", optimizer = "adam",
    metrics = ["accuracy"])

    return cardiovascular_dbn_model

    Listing 2-5

    Structuring the Deep Belief Network

    ```


    ## Relu Activation Function


    Figure [2-2](#527603_1_En_2_Chapter.xhtml#Fig2) depicts that the deep belief network
    encloses the `relu` activation function in the input layer.


    Equation [2-2](#527603_1_En_2_Chapter.xhtml#Equ2) defines a `relu` activation
    function:


    ![$$ Relu=\mathit{\max}\left(0,x\right). $$](images/527603_1_En_2_Chapter/527603_1_En_2_Chapter_TeX_Equ2.png)


    (Equation 2-2)


    Equation [2-2](#527603_1_En_2_Chapter.xhtml#Equ2) suggests that the independent
    feature holds any value from 0.


    ## Sigmoid Activation Function


    Equally, Equation [2-3](#527603_1_En_2_Chapter.xhtml#Equ3) defines a sigmoid activation
    in the output layer:


    ![$$ Sigmoid=\frac{1}{1+{e}^{-x}}. $$](images/527603_1_En_2_Chapter/527603_1_En_2_Chapter_TeX_Equ3.png)


    (Equation 2-3)


    Equation [2-3](#527603_1_En_2_Chapter.xhtml#Equ3) generates classes (either 0
    or 1).


    Listing [2-6](#527603_1_En_2_Chapter.xhtml#PC6) encloses the deep belief network.


    ```python

    from keras.wrappers.scikit_learn import KerasClassifier

    cardiovascular_dbn_model = KerasClassifier(build_fn = cardiovascular_dbn_function)

    Listing 2-6

    Enclosing the Deep Belief Network

    ```


    ## Training the Deep Belief Network


    Listing [2-7](#527603_1_En_2_Chapter.xhtml#PC7) trains the artificial neural network
    on the data. Equally, it outlines the validation data, including the number of
    epochs (equally recognized as iterations) and batch size (equally recognized as
    the number of samples the artificial neural network learns at each iteration).


    ```python

    cardiovascular_dbn_model_history = cardiovascular_dbn_model.fit(x_train_cardio,
