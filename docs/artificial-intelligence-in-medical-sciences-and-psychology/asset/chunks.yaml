    # 9. A Case for Psychology: Factoring and Clustering Personality Dimensions


    This chapter covers how to analyze the underlying patterns in human behavior by
    carrying out exploratory factor analysis and cluster analysis. To begin, you’ll
    learn about the big five personality dimensions. Following that, you’ll explore
    an approach for collecting data by retaining a Likert scale and measuring the
    reliability of the scale with Cronbach’s reliability testing strategy. Subsequently,
    you’ll perform factor analysis beginning with estimating Bartlett Sphericity statistics
    and then the Kaiser-Meyer-Olkin statistic. Following that, you’ll rotate the eigenvalues
    by carrying out the varimax rotation method and estimate the proportional variances
    and cumulative variances. In addition, you’ll execute the K-Means method to observe
    clusters in the data beginning with standardizing the data and carrying out principal
    component analysis.


    ## Personality Dimensions


    A person’s personality is a combination of traits that make that person unique
    and reflect consistent patterns in behavior. The most standard way for underpinning
    human behavior involves the use of the big five personality dimensions test, which
    groups several traits (see Table [9-1](#527603_1_En_9_Chapter.xhtml#Tab1)).


    **Table 9-1** Big Five Personality Dimensions


    | Personality trait | Description |

    | --- | --- |

    | **Extraversion** | Signifies traits that reflect the inclination towards socializing
    and confidence. Contrasting traits are introversion, constituting self-reservedness,
    seriousness, and quietness, among others. |

    | **Neuroticism** | Signifies traits that reflect the inclination towards anxiety,
    tenseness, low self-esteem, and irrationality, among others. The contrasting traits
    is stability. |

    | **Conscientious** | Signifies traits that reflect the inclination towards obedience,
    impulse control, and integrity, among other traits. The contrasting trait is expediency.
    |

    | **Openness to experience** | Signifies traits that reflect the inclination towards
    new ideas, intellectual pursuits, and diverse interests, among others. The opposite
    is closedness to experience. |

    | **Agreeableness** | Signifies traits that reflect the inclination towards trusting,
    empathy, and cooperativeness, among others. Contrasting traits are disagreeability
    or hostility. |


    Learn more about the big five personality dimensions from the official Open Psychometrics
    website^([^(12)](#fn12)).


    ## Questionnaires


    A questionnaire is a set of questions that are structured in such a way that they
    capture the underlying behavior of a subject, so we can examine patterns in the
    behavior of a set of subjects. A basic questionnaire comprises two sections: biogeographical
    factors and the Likert scale.


    ## Likert Scale


    The most convenient approach for studying human behavior involves administering
    questionnaires to the subject (referred to as self-administered questionnaires).
    To capture variability in data among a set of subjects, we standardize the questionnaire
    using some scale (i.e., the Likert scale), entailing that all subjects receive
    the same questionnaire.


    **Table [9-2](#527603_1_En_9_Chapter.xhtml#Tab2)** exhibits the structure of a
    Likert scale.


    **Table 9-2** Structure of a Likert Scale


    | | Strongly disagree | Disagree | Neither disagree nor agree | Agree | Strongly
    agree |

    | --- | --- | --- | --- | --- | --- |

    | **Question item** | - | - | - | - | - |


    Figure [9-1](#527603_1_En_9_Chapter.xhtml#Fig1) exhibits the structure of a Likert
    scale where we code `"strongly disagree"` as `1`, `"disagree"` as `2`, `"neither
    disagree nor agree"` as `3`, `"agree"` as `4`, and `"strongly agree"` as `5`.


    ![](images/527603_1_En_9_Chapter/527603_1_En_9_Fig1_HTML.png)


    **Figure 9-1** Negative and positive responses


    This chapter applies a factor model and a K-Means cluster to model the big five
    personality dataset provided by Open Psychometrics^([^(13)](#fn13)). You may download
    the dataset from Kaggle^([^(14)](#fn14)).


