    \n**代码清单 2-20**  \n训练与交叉验证中二元交叉熵损失随轮次的变化\n\n`图 2-8` 显示，二元交叉熵损失在训练中保持恒定，但在交叉验证中却急剧上升。\n\
    \n## 结论\n\n本章介绍了人工神经网络在疾病识别与分割中的实际应用。首先，总结了两类可预防的疾病。随后，提供了神经网络的一些必要背景知识。接着，提出了一种设计网络结构、训练网络并评估性能的方法。\n\
    \n脚注 1 2\n\n# 3. COVID-19 案例研究：考虑隐藏状态与模拟结果\n\n在本章中，你将运用一组序列方法（或称时间序列方法）进行预测，以识别美国\
    \ COVID-19 确诊病例的模式。首先，你将使用高斯隐马尔可夫模型继承序列、对其进行建模，并考虑隐藏状态，包括这些状态中的均值和协方差。随后，你将使用蒙特卡洛模拟方法，在多次试验中复制美国\
    \ COVID-19 确诊病例，从而深入理解数据中的模式。\n\n## 执行隐马尔可夫模型\n\n你首先使用隐马尔可夫模型来揭示美国 COVID-19 确诊病例中的隐藏状态（可视为类别或分类）。你将采用最简化的马尔可夫模型，即高斯隐马尔可夫模型，该模型返回两个状态：0（表示美国\
    \ COVID-19 确诊病例增加）和 1（表示美国 COVID-19 确诊病例减少）。\n\n让我们基于“当前状态和后续状态依赖于先前状态”这一前提来构建隐马尔可夫模型。`公式\
    \ 3-1` 定义了高斯隐马尔可夫模型：\n\n![$$ P\\left(,{S}_{i2},{S}_{i3}\\dots, {S}_{ik-1}\\right)=P\\\
    left({S}_{ij}|{S}_{ik-1}\\right) $$](img/527603_1_En_3_Chapter_TeX_Equ1.png)\n\
    \n**（公式 3-1）**\n\n其中，`S[ij]` 表示隐藏状态的独立观测值，`S[i1]` 表示第一个隐藏状态，`S[i2]` 表示第二个隐藏状态，以此类推。\n\
    \n`图 3-1` 展示了转移概率（定义见`公式 3-2`）和初始概率（定义见`公式 3-3`）：\n\n![$$ {\\alpha}_{ij}=P\\left({S}_i|{S}_j\\\
    right) $$](img/527603_1_En_3_Chapter_TeX_Equ2.png)\n\n**（公式 3-2）**\n\n![](img/527603_1_En_3_Fig1_HTML.png)\n\
    \n**图 3-1**  \n转移概率\n\n以及\n\n![$$ {\\pi}_i=P\\left({S}_i\\right). $$](img/527603_1_En_3_Chapter_TeX_Equ3.png)\n\
    \n**（公式 3-3）**\n\n`图 3-1` 显示了两个状态：`“COVID-19 确诊病例增加”`和`“COVID-19 确诊病例减少”`，其中转移概率为\
    \ `P(“COVID-19 确诊病例增加” | “COVID-19 确诊病例增加”)` = 0.4，`P(“COVID-19 确诊病例减少” | “COVID-19\
    \ 确诊病例增加”)` = 0.6。\n\n约翰霍普金斯大学收集的数据于 2021 年 9 月 24 日从 GitHub^(³) 下载。\n\n**注意**\
    \  \n约翰霍普金斯大学每天更新数据。要重现本练习，请从本章的 GitHub 文件夹中下载数据集。\n"
- fmt: '### Descriptive Analysis


    Before you execute the Gaussian Hidden Markov Model, first you should perform
    exploratory descriptive analysis. In this section, you consider the distribution
    of the data by constructing a histogram and a box plot. Following that, you describe
    the data by its central tendency and dispersion. Listing [3-1](#527603_1_En_3_Chapter.xhtml#PC1)
    collects the data and identifies null values (see Figure [3-2](#527603_1_En_3_Chapter.xhtml#Fig2)).
    Start by installing `pandas` in your environment: `pip install pandas`. In addition,
    install `Matplotlib` in your environment: `pip install matplotlib`. Also, install
    `seaborn` in your environment: `pip install seaborn`.


    ![](images/527603_1_En_3_Chapter/527603_1_En_3_Fig2_HTML.png)


    Figure 3-2


    Heatmap for null values


    ```

    import pandas as pd

    import matplotlib.pyplot as plt

    %matplotlib inline

    import seaborn as sns

    covid_us_df = pd.read_csv(r"filepaht\time_series_covid19_deaths_US.csv", index_col=[0],
    parse_dates=[0])["cases_confirmed"]

    covid_us_df = pd.DataFrame(covid_us_df)

    sns.heatmap(covid_us_df.isnull())

    plt.show()

    Listing 3-1

    Collecting Data on US Confirmed COVID-19 Cases

    ```


    Listing [3-2](#527603_1_En_3_Chapter.xhtml#PC2) drops missing values. In addition,
    it plots another heatmap to verify whether null values were dropped (see Figure
    [3-3](#527603_1_En_3_Chapter.xhtml#Fig3)).


    ![](images/527603_1_En_3_Chapter/527603_1_En_3_Fig3_HTML.png)


    Figure 3-3


    Heatmap for null values


    ```

    import seaborn as sns

