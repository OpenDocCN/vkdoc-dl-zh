    it classifies the scans. Figure [4-2](#527603_1_En_4_Chapter.xhtml#Fig2) depicts
    a simple example of a convolutional neural network.


    ![](images/527603_1_En_4_Chapter/527603_1_En_4_Fig2_HTML.png)


    **Figure 4-2** Example of a convolutional neural network


    Figure [4-2](#527603_1_En_4_Chapter.xhtml#Fig2) depicts a CNN comprising an input
    layer that receives input skin cancer scans. Following that, it reduces the input
    data into a few dimensions to form parts of an object using a linear or non-linear
    kernel. Subsequently, it aggregates the reduced data to form the object. This
    object detection procedure replicates that of the human visual cortex.


    At most, a CNN outperforms a shallow neural network because of its ability to
    conduct dimension reduction. As seen in Figure [4-2](#527603_1_En_4_Chapter.xhtml#Fig2),
    a CNN comprises these key layers:


    - **Convolutional layer:** Receives data from the input layer. Then it identifies
    and prioritizes important features in the data and transmits the data into the
    pooling layer.

    - **Pooling layer:** Processes and aggregates the features received from the convolutional
    layer into a single individual neuron in the subsequent layer.

    - **Fully connected layer:** Links all neurons from the preceding layers, operates
    the data, and transmits the data into the output layer.


    Besides the use cases in this chapter, a CNN can be used in face detection, recommendation
    systems, and natural language processing, among other applications.


    ## A CNN Pipeline


    This chapter follows the simple pipeline depicted in Figure [4-3](#527603_1_En_4_Chapter.xhtml#Fig3).
    A pipeline is steps that sum up the model lifecycle.


    ![](images/527603_1_En_4_Chapter/527603_1_En_4_Fig3_HTML.png)


    **Figure 4-3** A CNN pipeline


    Figure [4-3](#527603_1_En_4_Chapter.xhtml#Fig3) depicts data extraction as the
    initial step in the pipeline. The data used in this chapter was extracted from
    Kaggle^([⁴](#fn4)). The subsequent step is data preprocessing, which involves
    the following tasks:


    - Specifying data subsets for training and validation (setting aside a portion
    of data that the CNN learns image patterns from and another portion used to validate
    its estimates)

    - Specifying a validation split (the ratio for splitting the data into training
    and validation data)

    - Assigning the image size (inputting the image channels and pixels)

    - Specifying the batch size (the number of training labels to be processed per
    iteration)


    The next step is data rescaling, which involves these tasks:


    - Specifying the class mode

    - Specifying the target size (the size of images that the CNN generates)

    - Assigning the batch size

    - Generating labels


    Following this is model development and evaluation.


    ## A CNN’s Architectural Structure


    The CNN that classifies patient brain tumor outcomes has a relatively simple architectural
    structure, as shown in Figure [4-4](#527603_1_En_4_Chapter.xhtml#Fig4).


    ![](images/527603_1_En_4_Chapter/527603_1_En_4_Fig4_HTML.png)


    **Figure 4-4** A CNN’s architectural structure


    The CNN comprises a set of 2D convolutional and `MaxPooling2D` layers, a flatten
    layer, and two dense layers, with all layers consisting of a rectified linear
    unit (`relu`) activation function that absorbs and models inputs to estimate a
    set of unconstrained values of the target feature. Chapter [2](#527603_1_En_2_Chapter.xhtml)
    discusses the `relu` function in detail.


