  trans: '

    # 概述生存表


    生存表是生存分析的核心。生存表用于追踪临床试验中的受试者。它概述了受试者加入研究的时间以及退出研究的时间等信息。同样，它也列出了处于风险中的受试者。


    清单 7-8 概述了生存表（见表 7-5）。首先在你的环境中安装 `lifelines`：`pip install lifelines`。


    **表 7-5** 癌症生存表


    | | removed | observed | censored | entrance | at_risk |

    | --- | --- | --- | --- | --- | --- |

    | **event_at** | | | | | |

    | **0.0** | 0 | 0 | 0 | 305 | 305 |

    | **58.0** | 36 | 36 | 0 | 0 | 305 |

    | **59.0** | 27 | 27 | 0 | 0 | 269 |

    | **60.0** | 28 | 28 | 0 | 0 | 242 |

    | **61.0** | 26 | 26 | 0 | 0 | 214 |

    | **62.0** | 23 | 23 | 0 | 0 | 188 |

    | **63.0** | 30 | 30 | 0 | 0 | 165 |

    | **64.0** | 30 | 30 | 0 | 0 | 135 |

    | **65.0** | 28 | 28 | 0 | 0 | 105 |

    | **66.0** | 28 | 28 | 0 | 0 | 77 |

    | **67.0** | 25 | 25 | 0 | 0 | 49 |

    | **68.0** | 13 | 13 | 0 | 0 | 24 |

    | **69.0** | 11 | 11 | 0 | 0 | 11 |


    ```

    from lifelines.utils import survival_table_from_events

    Time = survival_censored_data["Year_of_operation"]

    Event = survival_censored_data["Event"]

    survival_table = survival_table_from_events(Time, Event)

    survival_table

    Listing 7-8

    Cancer Survival Table

    ```


    表 7-5 显示，第一年有 305 名患者进入研究。默认情况下，所有 305 名患者均处于风险中。1958 年，36 名患者退出试验，次年试验剩余 269
    人。随后，28 名患者退出研究，试验剩余 242 人。到 1969 年，有 11 名患者处于风险中。


    # 执行 Nelson-Aalen 加法模型


    清单 7-9 执行了 Nelson-Aalen 加法模型，并概述了时间列（`Year_of_operations`）和事件列（`Event`）。


    ```

    aalen_additive_method = AalenAdditiveFitter().fit(survival_censored_data, "Year_of_operation",
    event_col = "Event")

    Listing 7-9

    Carrying Out the Nelson-Aalen Additive Model

    ```


