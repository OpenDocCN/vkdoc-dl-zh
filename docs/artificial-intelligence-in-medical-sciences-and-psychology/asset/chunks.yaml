    | **Min** | 0.000000e+00 |

    | **25%** | 1.094280e+05 |

    | **50%** | 3.560650e+05 |

    | **75%** | 5.653697e+05 |

    | **Max** | 1.217892e+06 |


    ```

    covid_us_df.describe()

    Listing 3-7

    Computing Descriptive Statistics

    ```


    ## Carrying Out the Gaussian Hidden Markov Model


    Listing [3-8](#527603_1_En_3_Chapter.xhtml#PC8) carries out the Gaussian Hidden
    Markov Model with `n_components` as `2` across `10` iterations. Start by installing
    `hmmlearn` in your environment: `pip install hmmlearn`.


    ```

    from hmmlearn.hmm import GaussianHMM

    hmm_data = np.column_stack([covid_us_df])

    gaussian_hmm_model = GaussianHMM(n_components=2, tol=0.0001, n_iter=10)

    gaussian_hmm_model.fit(hmm_data)

    Listing 3-8

    Carrying Out the Gaussian Hidden Markov Model

    ```'
