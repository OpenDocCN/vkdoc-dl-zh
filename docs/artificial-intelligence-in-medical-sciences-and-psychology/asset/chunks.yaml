    sns.heatmap(covid_us_df.isnull())

    plt.show()

    Listing 3-2

    Substituting Null Values

    ```


    The most suitable approach to studying the inclination of the data towards central
    instances involves constructing the confidence interval against the frequency
    of the data using a histogram.


    Listing [3-3](#527603_1_En_3_Chapter.xhtml#PC3) constructs a histogram of US confirmed
    COVID-19 cases (see Figure [3-4](#527603_1_En_3_Chapter.xhtml#Fig4)).


    ![](images/527603_1_En_3_Chapter/527603_1_En_3_Fig4_HTML.png)


    Figure 3-4


    US confirmed COVID-19 cases


    ```

    sns.histplot(data=covid_us_df, x = covid_us_df.cases_confirmed, color = "orange")

    plt.show()

    Listing 3-3

    US Confirmed COVID-19 Cases Histogram

    ```


    Listing [3-4](#527603_1_En_3_Chapter.xhtml#PC4) constructs a box plot of US confirmed
    COVID-19 cases to confirm the distribution found in Figure [3-3](#527603_1_En_3_Chapter.xhtml#Fig3)
    (see Figure [3-5](#527603_1_En_3_Chapter.xhtml#Fig5)).


    ![](images/527603_1_En_3_Chapter/527603_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    US confirmed COVID-19 cases box plot


    ```

    sns.boxplot(covid_us_df.cases_confirmed, color = "orange")

    plt.show()

    Listing 3-4

    US Confirmed COVID-19 Cases Box Plot

    ```


    Figure [3-5](#527603_1_En_3_Chapter.xhtml#Fig5) confirms the inclination of US
    confirmed COVID-19 cases data towards the left. In addition, it indicates vast
    outliers.


    To prevent outliers from misrepresenting the data, you perform imputation, which
    is the substitution of values using some specified value (in this case, you substitute
    outliers with the mean value).


    Listing [3-5](#527603_1_En_3_Chapter.xhtml#PC5) substitutes outliers with the
    mean values. Then, it constructs another box plot to verify whether the outliers
    have been removed (see Figure [3-6](#527603_1_En_3_Chapter.xhtml#Fig6)). Start
    by installing `NumPy` in your environment: `pip install numpy`.


    ![](images/527603_1_En_3_Chapter/527603_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    US confirmed COVID-19 cases box plot after outlier removal


    ```

    import numpy as np

