    ## Realizing a Correlation Relationship


    The Pearson correlation realizes related association between two features, where
    instances of the features are continuous. For features with classes, you execute
    other correlation methods (i.e., the Spearman and Kendall correlation methods).
    Equation [7-2](#527603_1_En_7_Chapter.xhtml#Equ2) defines the Pearson correlation
    method:


    ![$$ {Corr}_{xy}=\frac{Cov_{xy}\ }{s_x{s}_y} $$](images/527603_1_En_7_Chapter/527603_1_En_7_Chapter_TeX_Equ2.png)


    (Equation 7-2)


    where `S[x]` signifies the magnitude at which values of `x` deviate from ![$$
    \underset{\_}{x} $$](images/527603_1_En_7_Chapter/527603_1_En_7_Chapter_TeX_IEq1.png),
    `S[y]` signifies the magnitude at which values of `y` deviates from ![$$ \underset{\_}{y}
    $$](images/527603_1_En_7_Chapter/527603_1_En_7_Chapter_TeX_IEq2.png), and `Cov[xy]`
    signifies the magnitude of related changes in `x` and `y`. Equation [7-3](#527603_1_En_7_Chapter.xhtml#Equ3)
    defines the covariance method:


    ![$$ {Cov}_{xy}=\frac{\sum \left({x}_i-\underset{\_}{x}\right)\left({y}_i-\underset{\_}{y}\right)\
    }{n-1}. $$](images/527603_1_En_7_Chapter/527603_1_En_7_Chapter_TeX_Equ3.png)


    (Equation 7-3)


    Equation [7-2](#527603_1_En_7_Chapter.xhtml#Equ2) generates a correlation coefficient
    between -1 and 1, where -1 signals an exceedingly negative association, 0 signals
    the absence of correlation, and 1 signals a remarkably positive association.


    Listing [7-6](#527603_1_En_7_Chapter.xhtml#PC6) outlines the Pearson coefficient
    of the relationship between `Age` and `Year_of_operation` (see Table [7-3](#527603_1_En_7_Chapter.xhtml#Tab3)).


