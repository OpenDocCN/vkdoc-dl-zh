- fmt: '# Carrying Out the Factor Model


    Factor analysis is an alternative dimension reduction technique. It equally considers
    the variability in factors. Although it shares considerable similarities with
    principal component analysis, before carrying out it, there are a series of steps
    that you ought to take (i.e., recognizing the sample adequacy). Figure [9-2](#527603_1_En_9_Chapter.xhtml#Fig2)
    exhibits how factor analysis functions.


    ![](images/527603_1_En_9_Chapter/527603_1_En_9_Fig2_HTML.png)


    Figure 9-2


    Factor model


    Figure [9-2](#527603_1_En_9_Chapter.xhtml#Fig2) constitutes features (extraversion,
    neuroticism, conscientiousness, openness to experience, and agreeableness) grounded
    on factors (`F1`, `F2`, `F3`, and `F4`). Equations [9-3](#527603_1_En_9_Chapter.xhtml#Equ3),
    [9-4](#527603_1_En_9_Chapter.xhtml#Equ4), [9-5](#527603_1_En_9_Chapter.xhtml#Equ5),
    [9-6](#527603_1_En_9_Chapter.xhtml#Equ6), and [9-7](#527603_1_En_9_Chapter.xhtml#Equ1)
    express Figure [9-2](#527603_1_En_9_Chapter.xhtml#Fig2):


    ![$$ {Extraversion}_1={\beta}_{10}+{\beta}_{11}{F}_1+{\beta}_{12}{F}_2+{\varepsilon}_i
    $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_Equ3.png)


    (Equation 9-3)


    ![$$ {Neuroticism}_2={\beta}_{20}+{\beta}_{21}{F}_2+{\beta}_{12}{F}_2+{\varepsilon}_i
    $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_Equ4.png)


    (Equation 9-4)


    ![$$ {Conscientious}_3={\beta}_{30}+{\beta}_{31}{F}_3+{\beta}_{13}{F}_3+{\varepsilon}_i
    $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_Equ5.png)


    (Equation 9-5)


    ![$$ Openness\ to\ {experience}_4={\beta}_{40}+{\beta}_{41}{F}_4+{\beta}_{14}{F}_4+{\varepsilon}_i
    $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_Equ6.png)


    (Equation 9-6)


    ![$$ {Agreeableness}_5={\beta}_{50}+{\beta}_{51}{F}_1+{\beta}_{52}{F}_5+{\varepsilon}_i
    $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_Equ7.png)


    (Equation 9-7)


    ## Carrying Out the Bartlett Sphericity Test


    Prior to performing factor analysis, initially you must decide whether the data
    is suitable. The most prevalent method for unanimously ratifying the appropriateness
    of data is the Bartlett Sphericity.


    Listing [9-4](#527603_1_En_9_Chapter.xhtml#PC4) puts together the p-value by carrying
    out the `calculate_bartlett_sphericity` method in the `factor_analyzer` library
    (see Table [9-3](#527603_1_En_9_Chapter.xhtml#Tab3), which returns the p-value).
    Start by installing `factor_analyzer` in your environment: `pip install factor_analyzer`.


    Table 9-3


    Bartlett Sphericity Statistics


    |   | Bartlett sphericity |

    | --- | --- |

    | **Chi squared** | 1.717619e+07 |

    | **P value** | 0.000000e+00 |


    ```

    from factor_analyzer.factor_analyzer import calculate_bartlett_sphericity

    chi_square, p_values = calculate_bartlett_sphericity(big_five_data)

    chi_square = pd.DataFrame(pd.Series(chi_square),columns=["Chi squared"])

    p_values = pd.DataFrame(pd.Series(p_values),columns = ["P value"])

    barlett_sphericity = pd.concat([chi_square, p_values],axis=1)

    barlett_sphericity = barlett_sphericity.transpose()

    barlett_sphericity.columns = ["Bartlett sphericity"]

    barlett_sphericity

    Listing 9-4

    Carrying Out the Bartlett Sphericity Test

    ```


    ## Carrying Out the Kaiser-Meyer-Olkin Test


    It is a traditional practice, especially in academic research, to decide whether
    data is worth interrogating. A prevalent approach for doing so involves carrying
    out the Kaiser-Meyer-Olkin statistic.


    Listing [9-5](#527603_1_En_9_Chapter.xhtml#PC5) puts together the p-value by carrying
    out the `calculate_kmo()` method in the `factor_analyzer` library (see Table [9-4](#527603_1_En_9_Chapter.xhtml#Tab4),
    which returns the p-value).


    Table 9-4


    KMO test statistics


    |   | KMO test |

    | --- | --- |

    | **P value** | 0.908983 |


    ```

    from factor_analyzer.factor_analyzer import calculate_kmo

    kaiser_meyer_olkin_variance, kaiser_meyer_olkin_test = calculate_kmo(big_five_data)

    kaiser_meyer_olkin_test = pd.DataFrame(pd.Series(kaiser_meyer_olkin_test))

    kaiser_meyer_olkin_test.columns = ["KMO Test"]

    kaiser_meyer_olkin_test.index = ["P value"]

    kaiser_meyer_olkin_test

    Listing 9-5

    Carrying Out the KMO Test

    ```


    Table [9-4](#527603_1_En_9_Chapter.xhtml#Tab4) shows that the p-value > 0.5, so
    the data is appropriate. After deciding on the appropriateness of the data, the
    subsequent step involves deciding on a number of factors.


    ## Discerning K with a Scree Plot


    The most prevalent way for wisely deciding on the number of factors involves constructing
    a scree plot, which constitutes factors in the x-axis and Eigen loadings or eigenvalues
    (vectors from a linear transformation). To determine the number of factors, detect
    an area where the curve brings into being an extreme bend.


    Listing [9-6](#527603_1_En_9_Chapter.xhtml#PC6) puts together a scree plot (see
    Figure [9-3](#527603_1_En_9_Chapter.xhtml#Fig3)). Start by installing `Matplotlib`
    in your environment: `pip install matplotlib`.


    ![](images/527603_1_En_9_Chapter/527603_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Scree plot


    ```

    import matplotlib.pyplot as plt

    %matplotlib inline

    from factor_analyzer import FactorAnalyzer

    factor_analys_model = FactorAnalyzer(rotation = None,impute = "drop", n_factors
    = big_five_data.shape[1])

    factor_analys_model.fit(big_five_data)

    eigenvalues,_ = factor_analys_model.get_eigenvalues()

    plt.scatter(range(1, big_five_data.shape[1]+1), eigenvalues, s = 200, color =
    "blue")

    plt.plot(range(1, big_five_data.shape[1]+1), eigenvalues, lw = 4, color = "orange")

    plt.xlabel("n factors")

    plt.ylabel("Eigenvalues")

    plt.show()

    Listing 9-6

    Putting Together a Scree Plot

    ```


    Figure [9-3](#527603_1_En_9_Chapter.xhtml#Fig3) shows that the curve begins to
    bend extremely from the second factor. As a result, the factor analysis model
    will be fitted containing two factors.


    ## Carrying Out Eigenvalue Rotation


    After fitting the factor analysis model, the subsequent step typically involves
    rotating the eigenvalue. There are innumerable rotation techniques in the `factor_analyzer`
    library (i.e., `promax`, `oblique`, `oblimin`, and `oblimax`, among others). The
    next section shows how to satisfactorily perform the varimax rotation.'
