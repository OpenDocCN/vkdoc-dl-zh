    生存数据配对图

    ```


    图 7-6 表明特征值在散点图中分布广泛。此外，只有 `Age` 显示出正态分布。


    ## 实现相关性关系


    皮尔逊相关性用于识别两个特征之间的相关关联，其中特征的实例是连续的。对于具有类别的特征，需要执行其他相关性方法（即斯皮尔曼和肯德尔相关性方法）。公式 7-2
    定义了皮尔逊相关性方法：


    ![$$ {Corr}_{xy}=\frac{Cov_{xy}\ }{s_x{s}_y} $$](img/527603_1_En_7_Chapter_TeX_Equ2.png)


    （公式 7-2）


    其中 `S[x]` 表示 `x` 的值偏离 ![$$ \underset{\_}{x} $$](img/527603_1_En_7_Chapter_TeX_IEq1.png)
    的程度，`S[y]` 表示 `y` 的值偏离 ![$$ \underset{\_}{y} $$](img/527603_1_En_7_Chapter_TeX_IEq2.png)
    的程度，`Cov[xy]` 表示 `x` 和 `y` 相关变化的程度。公式 7-3 定义了协方差方法：


    ![$$ {Cov}_{xy}=\frac{\sum \left({x}_i-\underset{\_}{x}\right)\left({y}_i-\underset{\_}{y}\right)\
    }{n-1}. $$](img/527603_1_En_7_Chapter_TeX_Equ3.png)


    （公式 7-3）


    公式 7-2 生成一个介于 -1 和 1 之间的相关系数，其中 -1 表示极强的负相关，0 表示无相关性，1 表示极强的正相关。


    清单 7-6 概述了 `Age` 和 `Year_of_operation` 之间关系的皮尔逊系数（见表 7-3）。


    表 7-3


    年龄与手术年份之间关系的皮尔逊系数


    |   | Age | Year_of_operation |

    | --- | --- | --- |

    | **Age** | 1.000000 | 0.092623 |

    | **Year_of_operation** | 0.092623 | 1.000000 |


    ```

    age_yr_op_correlation = survival_censored_data[["Age", "Year_of_operation"]].corr(method
    = "pearson")

    age_yr_op_correlation

    清单 7-6

    概述年龄与手术年份之间关系的皮尔逊系数

    ```


    表 7-3 表明 `Year_of_operation` 和 `Age` 之间存在非常弱的正相关关系（皮尔逊相关系数为 0.0926）。


    清单 7-7 概述了 `Year_of_operation` 和 `Event` 之间关系的皮尔逊系数（见表 7-4）。


    表 7-4


    手术年份与事件之间关系的皮尔逊系数


    |   | Year_of_operation | Event |

    | --- | --- | --- |

    | **Year_of_operation** | 1.000000 | -0.004076 |

    | **Event** | -0.004076 | 1.000000 |


    ```

    yr_op_event_correlation = survival_censored_data[["Year_of_operation", "Event"]].corr(method
    = "pearson")

    yr_op_event_correlation

    清单 7-7

    概述手术年份与事件之间关系的皮尔逊系数

    ```


    表 7-4 表明 `Year_of_operation` 和 `Event` 之间存在明显的固有弱负相关关系（皮尔逊相关系数为 -0.0040）。

