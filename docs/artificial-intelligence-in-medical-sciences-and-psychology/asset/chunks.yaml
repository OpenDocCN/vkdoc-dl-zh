    # 3. A Case for COVID-19: Considering the Hidden States and Simulation Results


    In this chapter, you’ll carry out a set of sequential methods (or time series
    methods) for forecasting to discern patterns in confirmed COVID-19 cases in the
    US. To begin, you’ll use the Gaussian Hidden Markov Model to inherit the series,
    model it, and consider the hidden states, including the means and covariance in
    those states. Subsequently, you’ll use the Monte Carlo simulation method to replicate
    confirmed US COVID-19 cases across multiple trials, therefore providing a rich
    comprehension of patterns in the data.


    ## Executing the Hidden Markov Model


    You start by using the Hidden Markov Model to uncover hidden states, acknowledged
    as classes or categorizes, in US-related confirmed COVID-19 cases. You’ll employ
    the most simplified Markov Model identified as the Gaussian Hidden Markov Model,
    which returns two states 0 (signifying increasing US confirmed COVID-19 cases)
    and 1 (signifying decreasing US confirmed COVID-19 cases).


    Let’s base the Hidden Markov Model on the premise that current and subsequent
    states rely on preceding states. Equation [3-1](#527603_1_En_3_Chapter.xhtml#Equ1)
    defines the Gaussian Hidden Markov model as


    ![$$ P\left(,{S}_{i2},{S}_{i3}\dots, {S}_{ik-1}\right)=P\left({S}_{ij}|{S}_{ik-1}\right)
    $$](images/527603_1_En_3_Chapter/527603_1_En_3_Chapter_TeX_Equ1.png)


    (Equation 3-1)


    where *S*[*ij*] delineates the independent observation of the hidden states, *S*[*i*1]
    delineates the first hidden state, *S*[*i*2] delineates the second hidden state,
    and so forth.


    Figure [3-1](#527603_1_En_3_Chapter.xhtml#Fig1) shows the transition probabilities
    (defined in Equation [3-2](#527603_1_En_3_Chapter.xhtml#Equ2)) and initial probabilities
    (defined in Equation [3-3](#527603_1_En_3_Chapter.xhtml#Equ3)):


    ![$$ {\alpha}_{ij}=P\left({S}_i|{S}_j\right) $$](images/527603_1_En_3_Chapter/527603_1_En_3_Chapter_TeX_Equ2.png)


    (Equation 3-2)


    ![](images/527603_1_En_3_Chapter/527603_1_En_3_Fig1_HTML.png)


    Figure 3-1


    Transition probabilities


    and


    ![$$ {\pi}_i=P\left({S}_i\right). $$](images/527603_1_En_3_Chapter/527603_1_En_3_Chapter_TeX_Equ3.png)


    (Equation 3-3)


    Figure [3-1](#527603_1_En_3_Chapter.xhtml#Fig1) shows two states, `"increasing
    confirmed COVID-19 cases"` and `"decreasing confirmed COVID-19 cases,"` whereby
    the transition probabilities are `P("increasing confirmed COVID-19 cases" | "increasing
    confirmed COVID-19 cases")` = 0.4 and `P("decreasing confirmed COVID-19 cases"
    | "increasing confirmed COVID-19 cases")` = 0.6.


    The data that Johns Hopkins University collected was downloaded on September 24,
    2021, from GitHub^([³](#fn3)).


    Note


    Johns Hopkins University updates the data daily. To reproduce the exercise, download
    the dataset from the GitHub folder for this chapter.'
