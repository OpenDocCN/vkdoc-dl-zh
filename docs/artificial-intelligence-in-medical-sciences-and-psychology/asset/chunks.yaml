    # 结论


    本章阐释了执行一种流行的生存回归器（即 Nelson-Aalen 加性模型）的基本原理。该方法通过对生存删失数据进行建模，利用风险函数合理预测研究对象的生存率，从而能够预测患者随时间变化的生存状态概率。生存回归还有其他方法，包括
    Cox 比例风险模型和 Weibull 加性模型。


    # 参考文献


    1. 芝加哥大学比林斯医院。(1999). *Haberman 生存数据*. 芝加哥大学比林斯医院。


    脚注 1


    # 8. 医疗记录分类


    本章介绍了一种通过执行线性判别分析模型来识别医疗记录模式的整体方法。你将了解什么是医疗记录，然后学习一种通过执行正则化和`TfidfVectorizer`等基本方法来清洗文本数据的技术。之后，你将执行一种方法来对医学专科进行分类，并评估其区分不同类别的程度。


    ## 医疗记录


    医疗记录是与患者病史相关的历史数据。全科医生会保存患者的记录以供参考，并针对特定医疗状况决定应采取哪些合理的预防措施。他们也会出于法律原因保存记录，例如在集体诉讼中，他们可能出示这些记录进行辩护，而检察官则可能利用这些记录在法庭上陈述案情。


    ## 本章背景


    传统上，全科医生将患者的病史记录在纸上，然后存放在安全的设施中。如今，医疗从业者利用计算机化的数据仓库。


    医疗从业者可能希望研究其患者医疗记录中的模式。本章介绍了一种执行分类算法的有效技术来实现这一目标。图 8-1 描绘了本章的背景。


    ![](img/527603_1_En_8_Fig1_HTML.png)


    图 8-1 本章背景


    该练习可能有助于改善患者的医疗记录，并帮助医疗从业者轻松访问这些记录。


    你可以从 Kaggle^(¹⁰)获取该数据集（原始数据集来自 mtsamples^(¹¹)）。


    ## 使用线性判别分析进行分类


    线性判别分析构建了一个与线性回归模型相似的模型，因为它执行线性变换。它可以用于多类分类。它仔细确定类内矩阵和类间矩阵，同时最大化它们（参见公式 8-1、8-2
    和 8-3）。


    公式 8-1 定义了类内矩阵：


    ![$$ {S}_{within- class\ matrix}={\sum}_{i=1}^C{\sum}_{j=1}^{M_i}\left({y}_j-{\mu}_i\right){\left({y}_j-{\mu}_i\right)}^T.
    $$](img/527603_1_En_8_Chapter_TeX_Equ1.png)


    （公式 8-1）


    公式 8-2 定义了类间矩阵：


    ![$$ {S}_{between- class\ matrix}={\sum}_{i=1}^C\left({y}_j-{\mu}_i\right){\left({y}_j-{\mu}_i\right)}^T.
    $$](img/527603_1_En_8_Chapter_TeX_Equ2.png)


    （公式 8-2）


    公式 8-3 最大化类间矩阵并最小化类内矩阵：


    ![$$ \mathit{\max}=\frac{\mathit{\det}\left({S}_w\right)}{\mathit{\det}\left({S}_b\right)}.
    $$](img/527603_1_En_8_Chapter_TeX_Equ3.png)


    （公式 8-3）


