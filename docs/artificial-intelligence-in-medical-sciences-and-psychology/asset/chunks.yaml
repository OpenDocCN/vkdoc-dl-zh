- fmt: '### Carrying Out Principal Component Analysis


    The principal component analysis technique enables you to investigate inconsistencies
    in the data. It considers the extent to which variability in the data describes
    the model. When carrying out this technique, you focus on components equally recognized
    as latent variables. A component represents a variable that derives from a quantitative
    model in place of observation.


    Figure [9-4](#527603_1_En_9_Chapter.xhtml#Fig4) demonstrates an abstract model,
    where each component represents a variable of interest.


    ![](images/527603_1_En_9_Chapter/527603_1_En_9_Fig4_HTML.png)


    Figure 9-4


    Principal components


    Figure [9-4](#527603_1_En_9_Chapter.xhtml#Fig4) constitutes features (`extraversion`,
    `neuroticism`, `conscientiousness`, `openness to experience`, and `agreeableness`)
    grounded on components (`C1`, `C2`, `C3`, and `C4`). A component that remarkably
    considers the variability constitutes the first component, the subsequent component
    constitutes the second component, and so forth.


    Equation [9-9](#527603_1_En_9_Chapter.xhtml#Equ9) defines the PCA model:


    ![$$ {\sum}_{i=1}^n\frac{1}{m}\left({x}_t-\underset{\_}{x}\right){\left({x}_i-\underset{\_}{x}\right)}^T
    $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_Equ9.png)


    (Equation 9-9)


    where ![$$ \underset{\_}{x}=\sum {x}_i $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_IEq2.png)
    is the eigenvalue.


    Listing [9-9](#527603_1_En_9_Chapter.xhtml#PC9) carries out principal component
    analysis. Start by installing `scikit-learn` in your environment: `pip install
    scikit-learn`.


    ```

    from sklearn.preprocessing import StandardScaler

    from sklearn.decomposition import PCA

    pca = PCA(n_components = 5)

    pca.fit(big_five_data)

    scaler = StandardScaler()

    standardized_big_five_data = scaler.fit_transform(big_five_data)

    pca_big_five_data = pca.transform(standardized_big_five_data)

    Listing 9-9

    Carrying Out Principal Component Analysis

    ```


    Listing [9-10](#527603_1_En_9_Chapter.xhtml#PC10) carries out the K-Means model.


    ```

    from sklearn.cluster import KMeans

    big_five_data_kmeans = KMeans(n_clusters = 5)

    big_five_data_kmeans_model = kmeans.fit(pca_big_five_data)

    big_five_data_kmeans_model

    Listing 9-10

    Carrying Out the K-Means Model

    ```


    ### Returning K-Means Labels


    Listing [9-11](#527603_1_En_9_Chapter.xhtml#PC11) returns K-Means labels (see
    Table [9-7](#527603_1_En_9_Chapter.xhtml#Tab7)).


    Table 9-7


    K-Means Labels


    |   | Clusters |

    | --- | --- |

    | **0** | 2 |

    | **1** | 3 |

    | **2** | 2 |

    | **3** | 0 |

    | **4** | 2 |

    | **...** | ... |

    | **874429** | 3 |

    | **874430** | 0 |

    | **874431** | 1 |

    | **874432** | 0 |

    | **874433** | 1 |


    ```

    big_five_data_kmeans_labels = pd.DataFrame(big_five_data_kmeans_model.labels_,
    columns = ["Clusters"])

    big_five_data_kmeans_labels

    Listing 9-11

    Returning K-Means Labels

    ```


    ### Discerning K-Means Cluster Centers


    Listing [9-12](#527603_1_En_9_Chapter.xhtml#PC12) discerns K-Means cluster centers
    (Table [9-8](#527603_1_En_9_Chapter.xhtml#Tab8))


    Table 9-8


    K-Means Cluster Centers


    |   | Cluster 1 | Cluster 2 | Cluster 3 | Cluster 4 | Cluster 5 |

    | --- | --- | --- | --- | --- | --- |

    | **0** | 1.070171 | -2.365766 | -4.186860 | 0.702053 | 0.049696 |

    | **1** | 6.917444 | 5.127327 | 8.496112 | 8.223140 | 10.037378 |

    | **2** | 5.106830 | 6.945864 | 5.599746 | 6.354891 | 8.202415 |

    | **3** | 1.625516 | 2.770158 | 2.578343 | 4.617922 | 2.585453 |

    | **4** | -5.435118 | -5.658154 | -5.808755 | -7.238314 | -4.330565 |


    ```

    big_five_data_kmeans_centers = big_five_data_kmeans_model.cluster_centers_big_five_data_kmeans_centroids
    =

    pd.DataFrame(big_five_data_kmeans_centers).transpose()

    big_five_data_kmeans_centroids.columns = ["Cluster 1","Cluster 2", "Cluster 3",
    "Cluster 4", "Cluster 5"]

    big_five_data_kmeans_centroids

    Listing 9-12

    Discerning K-Means Cluster Centers

    ```


    Listing [9-13](#527603_1_En_9_Chapter.xhtml#PC13) displaying K-Means labels together
    with the cluster centers (see Figure [9-5](#527603_1_En_9_Chapter.xhtml#Fig5)).


    ![](images/527603_1_En_9_Chapter/527603_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    K-Means results


    ```

    fig, ax = plt.subplots()

    plt.scatter(pca_big_five_data[:,0], pca_big_five_data[:,1], c=big_five_data_kmeans_model.labels_,
    cmap = "coolwarm",s = 15)

    plt.scatter(big_five_data_kmeans_centers[:,0], big_five_data_kmeans_centers[:,1],
    color="black")

    plt.xlabel("y")

    plt.show()

    Listing 9-13

    Displaying K-Means Labels

    ```


    ## Conclusion


    This chapter concluded the book by presenting a holistic approach for analyzing
    distinct personalities by carrying out a factor analysis and a cluster analysis.
    You fitted the cluster model with the reduced data deriving from the principal
    component analysis method.


    I hope you find this book useful and I hope it helps you comprehend ways of tackling
    various problems across several fields in the medical sciences. Please spread
    the word and share the book with your counterparts.


    Thank you for your time.'
