    ## Carrying Out Cluster Analysis


    This section carries out the K-Means model to discern distinct clusters in the
    big five personality dimensions dataset. Initially, you standardize the data,
    and then you perform principal component analysis. The model computes the considerable
    distance between instances of the data to realize similar instances, and then
    it figures out the centers of the cluster.


    Equation [9-8](#527603_1_En_9_Chapter.xhtml#Equ8) defines K-Means:


    ![$$ J={\sum}_{j=1}^k{\sum}_{i=1}^n{\left|{x}_i^j-{C}_j\right|}^2 $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_Equ8.png)


    (Equation 9-8)


    where *J* signifies the objective function, *k* signifies the number of clusters,
    *n* signifies the number of cases, *x* signifies *C*[*j*], and *C*[*j*] signifies
    the centroids of *j*.


    The K-Means models show data reduced with principal component analysis.'
