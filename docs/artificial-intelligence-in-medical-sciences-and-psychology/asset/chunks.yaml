- fmt: '# Outlining the Survival Table


    Survival tables are the core of survival analysis. A survival table keeps track
    of subjects in a clinical trial. It outlines information like the time at which
    a subject is included in a study and the time at which a subject abandons the
    study. Equally, it outlines those at risk.


    Listing [7-8](#527603_1_En_7_Chapter.xhtml#PC8) outlines the survival table (see
    Table [7-5](#527603_1_En_7_Chapter.xhtml#Tab5)). Start by installing `lifelines`
    in your environment: `pip install lifelines`.


    **Table 7-5** Cancer Survival Table


    | | removed | observed | censored | entrance | at_risk |

    | --- | --- | --- | --- | --- | --- |

    | **event_at** | | | | | |

    | **0.0** | 0 | 0 | 0 | 305 | 305 |

    | **58.0** | 36 | 36 | 0 | 0 | 305 |

    | **59.0** | 27 | 27 | 0 | 0 | 269 |

    | **60.0** | 28 | 28 | 0 | 0 | 242 |

    | **61.0** | 26 | 26 | 0 | 0 | 214 |

    | **62.0** | 23 | 23 | 0 | 0 | 188 |

    | **63.0** | 30 | 30 | 0 | 0 | 165 |

    | **64.0** | 30 | 30 | 0 | 0 | 135 |

    | **65.0** | 28 | 28 | 0 | 0 | 105 |

    | **66.0** | 28 | 28 | 0 | 0 | 77 |

    | **67.0** | 25 | 25 | 0 | 0 | 49 |

    | **68.0** | 13 | 13 | 0 | 0 | 24 |

    | **69.0** | 11 | 11 | 0 | 0 | 11 |


    ```

    from lifelines.utils import survival_table_from_events

    Time = survival_censored_data["Year_of_operation"]

    Event = survival_censored_data["Event"]

    survival_table = survival_table_from_events(Time, Event)

    survival_table

    Listing 7-8

    Cancer Survival Table

    ```


    Table [7-5](#527603_1_En_7_Chapter.xhtml#Tab5) suggests that in the first year,
    305 patients entered the research. By default, all 305 patients were at risk.
    In 1958, 36 patients left the trial, leaving the trial with 269 the following
    year. Following that, 28 patients left the study, leaving the trial with 242 patients.
    By 1969, there were 11 patients at risk.


    # Carrying Out the Nelson-Aalen Additive Model


    Listing [7-9](#527603_1_En_7_Chapter.xhtml#PC9) executes the Nelson-Aalen additive
    model and outlines the time column (`Year_of_operations`) and event column (`Event`).


    ```

    aalen_additive_method = AalenAdditiveFitter().fit(survival_censored_data, "Year_of_operation",
    event_col = "Event")

    Listing 7-9

    Carrying Out the Nelson-Aalen Additive Model

    ```


    Listing [7-10](#527603_1_En_7_Chapter.xhtml#PC10) outlines the Nelson-Aalen additive
    model’s profile table (see Table [7-6](#527603_1_En_7_Chapter.xhtml#Tab6)).


    **Table 7-6** The Nelson-Aalen Additive Model’s Profile Table


