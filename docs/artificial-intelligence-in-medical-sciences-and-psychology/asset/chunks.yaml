    # 8. Medical Records Categorization


    This chapter covers a holistic approach for realizing patterns in medical records
    by executing a linear discriminant analysis model. You’ll learn what medical records
    are and then you’ll learn a technique of cleansing textual data by executing fundamental
    methods like regularization and `TfidfVectorizer`. Afterward, you’ll execute a
    method to classify the medical specialty and assess the extent to which it segregates
    classes.


    ## Medical Records


    Medical records are historical data relating to the medical history of a patient.
    General medical practitioners keep records of their patients for reference and
    decide on reasonable precautions to undertake for a given medical condition. They
    also keep records for legal reasons such as class action lawsuits where they may
    present the records in their defense and prosecutors may use them to present a
    case in the court of law.


    ## Context of the Chapter


    Traditionally, general medical practitioners maintained their patients’ medical
    history on paper, which was then stored in a secure facility. Today, medical practitioners
    harness computerized data warehouses.


    Medical practitioners may intend to investigate patterns in the medical records
    of their patients. This chapter introduces an effective technique for executing
    a classification algorithm to do so. Figure [8-1](#527603_1_En_8_Chapter.xhtml#Fig1)
    depicts the context of the chapter.


    ![](images/527603_1_En_8_Chapter/527603_1_En_8_Fig1_HTML.png)


    Figure 8-1 Chapter context


    The exercise may be useful to better patients’ medical records and help medical
    practitioners easily access the records.


    You can obtain the dataset from Kaggle^([^(10)](#fn10)) (the original dataset
    comes from mtsamples^([^(11)](#fn11))).


    ## Categorization with Linear Discriminant Analysis


    Linear discriminant analysis makes up a model that bears similarities to linear
    regression models in the sense that it performs a linear transform. It can be
    employed for multi-class classification. It carefully ascertains the within-class
    matrix and between-class matrix while maximizing them (see Equations [8-1](#527603_1_En_8_Chapter.xhtml#Equ1),
    [8-2](#527603_1_En_8_Chapter.xhtml#Equ2), and [8-3](#527603_1_En_8_Chapter.xhtml#Equ3)).


    Equation [8-1](#527603_1_En_8_Chapter.xhtml#Equ1) defines the within-class matrix:


    ![$$ {S}_{within- class\ matrix}={\sum}_{i=1}^C{\sum}_{j=1}^{M_i}\left({y}_j-{\mu}_i\right){\left({y}_j-{\mu}_i\right)}^T.
    $$](images/527603_1_En_8_Chapter/527603_1_En_8_Chapter_TeX_Equ1.png)


    (Equation 8-1)


    Equation [8-2](#527603_1_En_8_Chapter.xhtml#Equ2) defines the between-class matrix:


    ![$$ {S}_{between- class\ matrix}={\sum}_{i=1}^C\left({y}_j-{\mu}_i\right){\left({y}_j-{\mu}_i\right)}^T.
    $$](images/527603_1_En_8_Chapter/527603_1_En_8_Chapter_TeX_Equ2.png)


    (Equation 8-2)


    Equation [8-3](#527603_1_En_8_Chapter.xhtml#Equ3) maximizes the between-class
    matrix and minimizes the within-class matrix:


    ![$$ \mathit{\max}=\frac{\mathit{\det}\left({S}_w\right)}{\mathit{\det}\left({S}_b\right)}.
    $$](images/527603_1_En_8_Chapter/527603_1_En_8_Chapter_TeX_Equ3.png)


    (Equation 8-3)


