    ## Discerning the Survival Hazard


    Listing [7-12](#527603_1_En_7_Chapter.xhtml#PC12) depicts the Nelson-Aalen additive
    model’s survival hazard (see Figure [7-7](#527603_1_En_7_Chapter.xhtml#Fig7)).


    ![](images/527603_1_En_7_Chapter/527603_1_En_7_Fig7_HTML.jpg)


    **Figure 7-7** The Nelson-Aalen additive model’s survival hazard


    ```

    aalen_additive_method.plot()

    plt.ylabel("Survival hazard")

    plt.xlabel("Year of operation")

    plt.show()

    Listing 7-12

    Depicting the Nelson-Aalen Additive Model’s Survival Hazard

    ```


    Figure [7-7](#527603_1_En_7_Chapter.xhtml#Fig7) signals less activity in relation
    to `Age` and `Axillary_lymph_nodes`. Moreover, the survival hazard escalates from
    1958, reaching its peak in 1967, followed by a slight decrease in the subsequent
    year, and then an increase.


    ## Discerning the Cumulative Survival Hazard


    Listing [7-13](#527603_1_En_7_Chapter.xhtml#PC13) depicts the Nelson-Aalen additive
    model’s cumulative survival hazard (see Figure [7-8](#527603_1_En_7_Chapter.xhtml#Fig8)).


    ![](images/527603_1_En_7_Chapter/527603_1_En_7_Fig8_HTML.jpg)


    **Figure 7-8** The Nelson-Aalen additive model’s cumulative survival hazard


    ```

    aalen_additive_method.cumulative_hazards_.plot(lw = 4)

    plt.ylabel("Cumulative hazard")

    plt.xlabel("Year of operation")

    plt.show()

    Listing 7-13

    Depicting the Nelson-Aalen Additive Model’s Cumulative Survival Hazard

    ```


    Figure [7-8](#527603_1_En_7_Chapter.xhtml#Fig8) signals a very strong trend in
    the cumulative survival hazard from 1958-1966. Moreover, in 1967, the trend lost
    its momentum, which is marked by a sharp decline in that period. In 1968, a sharp
    increase erased the decline.


    ## Baseline Survival Hazard


    Listing [7-14](#527603_1_En_7_Chapter.xhtml#PC14) depicts the Nelson-Aalen additive
    model’s baseline survival hazard (see Figure [7-9](#527603_1_En_7_Chapter.xhtml#Fig9)).


    ![](images/527603_1_En_7_Chapter/527603_1_En_7_Fig9_HTML.jpg)


    **Figure 7-9** The Nelson-Aalen additive model’s cumulative baseline survival
    hazard


    ```

    aalen_additive_method.cumulative_variance_.plot(lw=4)

    plt.ylabel("Cumulative variance")

    plt.xlabel("Year of operation")

    plt.show()

    Listing 7-14

    Depicting the Nelson-Aalen Additive Model’s Baseline Survival Hazard

    ```


    Figure [7-9](#527603_1_En_7_Chapter.xhtml#Fig9) signals what looks like exponential
    growth in the cumulative variance.'
