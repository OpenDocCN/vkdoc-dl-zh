    # 5. Modeling Magnetic Resonance Imaging and X-Rays by Executing Artificial Neural
    Networks


    This chapter acquaints you with the practical application of computer vision and
    artificial neural networks in neurology and radiology. Over the course of this
    chapter, you will execute convolutional neural networks (CNNs) for image classification.
    The initial network will model MRI scans to differentiate patients with and without
    a brain tumor, and the second network will model X-ray scans to differentiate
    patients with and without pneumonia. You’ll learn an effective technique for appraising
    networks in medical image classification.


    ## Brain Tumors


    A brain tumor represents an abnormal growth of cells around the brain region.
    There are several types of brain tumors. Figure [5-1](#527603_1_En_5_Chapter.xhtml#Fig1)
    depicts the most common brain tumors.


    ![](images/527603_1_En_5_Chapter/527603_1_En_5_Fig1_HTML.png)


    Figure 5-1


    Types of brain tumors


    ### MRI Procedure


    The most prevalent method for uncovering brain tumors involves magnetic resonance
    imaging (MRI) scanning, which is performed by specialized healthcare professionals
    like neurologists and neurosurgeons, among others. Figure [5-2](#527603_1_En_5_Chapter.xhtml#Fig2)
    provides a high-level overview of the MRI scanning procedure.


    ![](images/527603_1_En_5_Chapter/527603_1_En_5_Fig2_HTML.png)


    Figure 5-2


    Simple MRI procedure


    Figure [5-2](#527603_1_En_5_Chapter.xhtml#Fig2) depicts a radiologist using a
    computer-based system that transmits radio frequencies received by radio frequency
    coils, in addition to gradient pulses received by a magnetic coil. In return,
    the computer-based system receives and processes feedback frequency to generate
    an MRI scan.


    ### Preprocessing the Training MRI Image Data


    Listing [5-1](#527603_1_En_5_Chapter.xhtml#PC1) preprocesses the images (for training)
