    # 6. A Case for COVID-19 CT Scan Segmentation


    This chapter presents an approach for carrying out convolutional neural networks
    to model chest CT scan images and differentiate between patients with and without
    COVID-19\. You can download the dataset from Kaggle^([⁷](#fn7)); the initial dataset
    comes from here^([⁸](#fn8)).


    ## A Simple Computer Tomography Scan Procedure


    A nasal swab test is used in COVID-19 testing; it involves inserting a swab inside
    the nasal passage to extract cells. Moreover, radiologists can perform a computer
    tomography (CT) scan to get an image that helps determine whether an individual
    is COVID-19 positive. Figure [6-1](#527603_1_En_6_Chapter.xhtml#Fig1) depicts
    a simple CT scan procedure.


