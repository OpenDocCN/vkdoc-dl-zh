- fmt: '# 1. An Introduction to Artificial Intelligence in Medical Sciences and Psychology


    In this chapter, I’ll establish the specific context and structure of the book,
    and then offer an overview of the varying medical specialties central to it before
    covering independent subsets of artificial intelligence. I then run through some
    valuable tools for undertaking exercises, such as the `Python` programming language,
    distribution package, and libraries. Lastly, I’ll acquaint you with different
    algorithms, including when to carry them out.


    **Disclaimer**


    This book is not a medical article or textbook; rather, it is a programming technical
    book that demonstrates approaches of properly implementing subsets of artificial
    intelligence to discover patterns in health sciences. None of the content in this
    book is health advice.


    ## Context of the Book


    This book is not a medical science textbook, nor am I a medical scientist.


    The aim of this book is to offer health science practitioners a way of implementing
    machine learning to simplify their practices. The book does not cover key theoretical
    concepts underpinning medical fields, as this is outside the scope of this book.


    ## The Book’s Central Point


    Figure 1-1 shows the medical specialties central to this book.


    ![](images/527603_1_En_1_Chapter/527603_1_En_1_Fig1_HTML.png)


    **Figure 1-1** Medical specialities central to this book


    I have centered this book on medical and mental health sciences. I present an
    approach for implementing machine learning to tackle data that is related to medical
    sciences (i.e., oncology, neuroscience, and cardiology) and social science (i.e.,
    psychology).


    ## Artificial Intelligence Subsets Covered in this Book


    Figure 1-2 exhibits the subsets of artificial intelligence that this book covers
    to help you understand the practical implications of artificial intelligence in
    medical sciences.


    ![](images/527603_1_En_1_Chapter/527603_1_En_1_Fig2_HTML.png)


    **Figure 1-2** Artificial intelligence subsets covered in this book


    This book covers three subsets of artificial intelligence (i.e., machine learning,
    computer vision, and natural language).


    ## Structure of the Book


    Table 1-1 outlines the structure of the book.


    **Table 1-1** The Structure of This Book


    | Chapter | Subset | Medical specialty |

    | --- | --- | --- |

    | **Chapter 2** | Deep learning | Cardiology |

    | **Chapter 3** | Markov’s method and Monte Carlo simulation method | Virology
    |

    | **Chapter 4** | Computer vision and deep learning | Oncology |

    | **Chapter 5** | Computer vision and deep learning | Neurology and radiology
    |

    | **Chapter 6** | Computer vision and deep learning | Virology |

    | **Chapter 7** | Survival analysis | Oncology (clinical trials) |

    | **Chapter 8** | Machine learning and natural language processing | General |


    This book covers machine learning, computer vision, and natural language processing.
    In addition, it also covers survival regression analysis, Hidden Markov decision-making,
    and Monte Carlo simulation. It includes key medical specialties (i.e., cardiology,
    oncology, and neurology, among others).


    Before you proceed with this book, make sure you understand key concepts in statistics
    and key health sciences. Although unnecessary, besides proper comprehension of
    relevant concepts, some background experience in programming using the `Python`
    programming language will help.


    ## Tools Used in This Book


    This book implements the `Python` programming language to perform typical research
    tasks that are associated with investigating patterns in medical-related data.
    `Python` is an open-source programming language that is relatively easy to learn.
    It supports us when programming applications and implementing scientific research
    tasks via a human-like language, therefore gaining the skills for programming
    will not be difficult. It is a suitable candidate for implementing and scaling
    artificial intelligence projects.


    ## Python Distribution Package


    To make your `Python` programming experience easier, you will employ a distribution
    package that efficiently manages key `Python` resources and functional dependencies.
    There are myriad `Python` distribution packages (i.e., `Anaconda`, etc.) and integrated
    development environments (i.e., `PyCharm`).


    ## Anaconda Distribution Package


    `Anaconda` is the most prevalent `Python` distribution package. In addition, it
    supports other programming languages (i.e., `R`, `Scala`, `PySpark`, etc.). The
    comprehensive package contains environments like `JupyterLab`, `Jupyter Notebook`,
    and `Spyder`. Plus, it holds a `cmd` and a `PowerShell` terminal to execute scripts.


    ### Jupyter Notebook


    `Jupyter Notebook` is the most prevalent interactive environment for writing `Python`
    programming. It enables you to view the output of your code inline. You do not
    have to write, assemble, or test the entire program. It is a suitable candidate
    for prototyping.'
