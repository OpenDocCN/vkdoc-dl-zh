- fmt: '# Python Libraries


    The availability of a global pool of open-source libraries sets the `Python` programming
    language apart from other languages. A library is an elaborate set of prewritten
    programming code that allows you to perform complex programming tasks with little
    effort. There is a large pool of standard open-source `Python` libraries.


    Table [1-2](#527603_1_En_1_Chapter.xhtml#Tab2) outlines the libraries that this
    book implements, including their basic usage and installation.


    **Table 1-2** Primary Python Libraries Used in This Book


    | Name | Usage | Installation |

    | --- | --- | --- |

    | `Matplotlib` | 2D static charting | For a `Python` environment, use `pip install
    matplotlib`. For a `conda` environment, use `conda install -c conda-forge matplotlib`.
    |

    | `seaborn` | 2D static charting | For a `Python` environment, use `pip install
    seaborn`. For a `conda` environment, use `conda install -c anaconda seaborn`.
    |

    | `pandas` | Static tabulation and data manipulation | For a `Python` environment,
    use `pip install pandas`. For a `conda` environment, use `conda install -c anaconda
    pandas`. |

    | `NumPy` | Numeric computation and data manipulation | For a `Python` environment,
    use `pip install numpy`. For a `conda` environment, use `conda install -c anaconda
    numpy`. |

    | `CV2` | Computer vision and image data manipulation | For a `Python` environment,
    use `pip install opencv-python`. For a `conda` environment, use `conda install
    -c conda-forge opencv`. |

    | `TensorFlow` | Neural network development | For a `Python` environment, use
    `pip install tensorflow`. For a `conda` environment, use `conda install -c conda-forge
    tensorflow`. |

    | `Keras` | Neural network development | For a `Python` environment, use `pip
    install keras`. For a `conda` environment, use `conda install -c conda-forge keras`.
    |

    | `scikit-learn` | Preprocessing, model selection, development, and evaluation
    | For a `Python` environment, use `pip install scikit-learn`. For a `conda` environment,
    use `conda install -c anaconda scikit-learn`. |

    | `Factor Analyzer` | Exploratory factor analysis | For a `Python` environment,
    use `pip install factor_analyzer`. For a `conda` environment, use `conda install
    -c ets factor_analyzer`. |


    ## Encapsulating Artificial Intelligence


    To recognize artificial intelligence, first you must understand human intelligence,
    which involves scanning information in the environment, modeling it, finding patterns
    to make conclusions, and then using such conclusions as a basis of action. The
    unified field of artificial intelligence intends to program computer systems in
    ways that mirror human intelligence. In simple terms, deep learning attempts to
    mirror the underlying process of the human brain; computer vision attempts to
    mirror the underlying process of the human visual system; and natural language
    processing attempts to mirror the approach of human process language.


    ## Implementing Algorithms


    This book will implement myriad algorithms to predict an array of instances from
    various datasets. An algorithm is a logical sequence of steps that involves inheriting
    instances of features, modeling, and computing instances of a feature with support
    of a function. You can consider algorithms as formulas.


    Figure [1-3](#527603_1_En_1_Chapter.xhtml#Fig3) exhibits key algorithms.


    ![](images/527603_1_En_1_Chapter/527603_1_En_1_Fig3_HTML.png)


    **Figure 1-3** Key algorithms


    ### Supervised Algorithms


    Figure [1-4](#527603_1_En_1_Chapter.xhtml#Fig4) exhibits the primary families
    of supervised algorithms.


    ![](images/527603_1_En_1_Chapter/527603_1_En_1_Fig4_HTML.png)


    **Figure 1-4** Supervised algorithm families


    The primary families of supervised algorithms includes the regression family (i.e.,
    ordinary least-square), the classification family (i.e., logistic regression),
    the tree family, and the ensemble family (i.e., random forest trees).


    ### Unsupervised Algorithms


    Figure [1-5](#527603_1_En_1_Chapter.xhtml#Fig5) depicts the primary families of
    unsupervised algorithms.


    ![](images/527603_1_En_1_Chapter/527603_1_En_1_Fig5_HTML.png)


    **Figure 1-5** Unsupervised algorithm families


    The primary families of unsupervised algorithms are the cluster family and association
    algorithms.


    ## Artificial Neural Networks


    Table [1-3](#527603_1_En_1_Chapter.xhtml#Tab3) depicts the artificial neural networks
    that this book implements, including their usage activation function and layers.


    **Table 1-3** Primary Artificial Neural Networks Employed in This Book


    | Name | Usage | Activation function | Layers |

    | --- | --- | --- | --- |

    | Deep Belief Network | Classifying diabetes and cardiovascular disease | `Relu`
    and `sigmoid` | `Dense` and `Dropout` |

    | Convolutional neural networks | Classifying MRI, cancer (breast, skin, and brain
    cancer), and X-ray scans | `Relu` and `Softmax` | `Conv2D`, `MaxPooling2D`, `Flatten`,
    and `Dropout` |


    The subsequent chapters will acquaint you with the different activation functions,
    layers, and their usage.


    ## Conclusion


    Now that you have a sense of the material I’ll be covering in this book and the
    tools you will need to work your way through the various exercises, let’s dive
    right in and explore using neural networks to detect patterns in diseases.


    # 2. Realizing Patterns in Diseases with Neural Networks


    This chapter covers the application of artificial neural networks in modeling
    medical data. You’ll learn how to execute deep belief networks to model data and
    predict whether a patient suffers from a disease (specifically cardiovascular
    disease and diabetes). Further, you will learn how to appraise networks with key
    metrics to find out the extent to which the networks differentiate patients who
    suffer from the disease from those who do not.


    ## Classifying Cardiovascular Disease Diagnosis Outcome Data by Executing a Deep
    Belief Network


    In this section, you will learn how to classify patients with cardiovascular diseases
    by executing a deep belief network. Cardiovascular disease signifies a disorder
    in the heart and blood vessels. You may download the dataset from Kaggle^([¹](#fn1)).


    Listing [2-1](#527603_1_En_2_Chapter.xhtml#PC1) collects data relating to cardiovascular
    disease from the `CSV` file and removes the column titled `id`. Start by installing
    `pandas` in your environment: `pip install pandas`.


    ```

    import pandas as pd

    cardiovascular_data = pd.read_csv(r"filepath\cardio_train.csv", sep=";")

    cardiovascular_data.drop(["id"], axis = 1, inplace = True)

    ```


    **Listing 2-1** Collecting Data


    Listing [2-2](#527603_1_En_2_Chapter.xhtml#PC2) processes the column titled `age`
    so that it is suitable for analysis.


    ```

    cardiovascular_data["age"] = round(cardiovascular_data["age"] / 365.25, 2)

    ```


    **Listing 2-2** Age Rounding


    Listing [2-3](#527603_1_En_2_Chapter.xhtml#PC3) constructs a pair plot, which
    exhibits how features relate to each other in the cardiovascular dataset. In addition,
    it depicts the distribution of the features (see Figure [2-1](#527603_1_En_2_Chapter.xhtml#Fig1)).
    Start by installing `Matplotlib` in your environment: `pip install matplotlib`.


    ![](images/527603_1_En_2_Chapter/527603_1_En_2_Fig1_HTML.jpg)


    **Figure 2-1** Pair plot


    ```

    import matplotlib.pyplot as plt

    %matplotlib inline

    import seaborn as sns

    sns.set("talk","ticks", font_scale = 1, font = "Calibri")

    sns.pairplot(cardiovascular_data)

    plt.show()

    ```


    **Listing 2-3** Constructing a Pair Plot'
