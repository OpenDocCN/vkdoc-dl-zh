    from tensorflow.keras import layers

    from tensorflow.python.keras.layers import Dense, Flatten, Conv2D, Dropout, MaxPooling2D

    brain_tumor_convolutional_net_model = tf.keras.Sequential([

    tf.keras.layers.experimental.preprocessing.Rescaling(1./255),

    tf.keras.layers.Conv2D(16, 3, activation = "relu"),

    tf.keras.layers.MaxPooling2D(),

    tf.keras.layers.Conv2D(64, 3, activation="relu"),

    tf.keras.layers.MaxPooling2D(),

    tf.keras.layers.Conv2D(128, 3, activation="relu"),

    tf.keras.layers.MaxPooling2D(),

    tf.keras.layers.Flatten(),

    tf.keras.layers.Dense(255, activation="relu"),

    tf.keras.layers.Dense(3)

    ])

    brain_tumor_convolutional_net_model.compile(optimizer = "adam", loss = tf.keras.losses.SparseCategoricalCrossentropy(from_logits
    = True), metrics = ["accuracy"])

    brain_tumor_convolutional_net_model_history = brain_tumor_convolutional_net_model.fit(brain_tumor_training_data,
