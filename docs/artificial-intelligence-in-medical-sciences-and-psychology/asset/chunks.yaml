    Figure [4-7](#527603_1_En_4_Chapter.xhtml#Fig7) depicts two common forms of breast
    cancer: benign and malignant.


    ### Classifying Ultrasound Scans of Breast Cancer Patients by Executing a CNN


    Listing [4-9](#527603_1_En_4_Chapter.xhtml#PC9) collects the data by executing
    the `pathlib` library.


    ```

    breast_cancer_data = pathlib.Path(r"filepath\Dataset_BUSI_with_GT")

