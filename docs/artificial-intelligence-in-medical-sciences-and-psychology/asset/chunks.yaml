    ### 描述性分析


    在执行高斯隐马尔可夫模型之前，首先应进行探索性描述分析。在本节中，你将通过构建直方图和箱线图来考察数据的分布情况。随后，你将通过集中趋势和离散程度来描述数据。清单
    3-1 收集数据并识别空值（见图 3-2）。首先，在你的环境中安装 `pandas`：`pip install pandas`。此外，在你的环境中安装 `Matplotlib`：`pip
    install matplotlib`。同时，在你的环境中安装 `seaborn`：`pip install seaborn`。


