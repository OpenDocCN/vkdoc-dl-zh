- fmt: '# Executing a Deep Belief Network to Classify Diabetes Diagnosis Outcome Data


    Listing [2-15](#527603_1_En_2_Chapter.xhtml#PC15) allots features to `NumPy` arrays.
    Subsequently, it separates the values of features for training and testing the
    deep belief network. Then, it standardizes the training-independent features.
    It concludes by training the network on the diabetes data.


    The network is structured in such a way that the input layer holds 11 neurons
    with a `relu` activation, three hidden layers hold 11 neurons with a `relu` activation
    function, and the output layer generates labels with a `sigmoid` function (see
    Figure [2-6](#527603_1_En_2_Chapter.xhtml#Fig6)).


    ![](images/527603_1_En_2_Chapter/527603_1_En_2_Fig6_HTML.png)


    Figure 2-6


    The deep belief network’s structure


    ```

    x_diabetes = np.array(diabetes_data.iloc[::, 0:8])

    y_diabetes = np.array(diabetes_data.iloc[::, -1])

    x_train_diabetes, x_test_diabetes, y_train_diabetes, y_test_diabetes = train_test_split(x_diabetes,
    y_diabetes, test_size = 0.2, random_state = 0)

    x_train_diabetes, x_val_diabetes, y_train_diabetes, y_val_diabetes = train_test_split(x_train_diabetes,
    y_train_diabetes, test_size = 0.1, random_state = 0)

    standard_scaler_for_diabetes = StandardScaler()

    x_train_diabetes = standard_scaler_for_diabetes.fit_transform(x_train_diabetes)

    x_test_diabetes = standard_scaler_for_diabetes.transform(x_test_diabetes)

    from tensorflow.python.keras.layers import Dropout

    def diabetes_dbn_function():

    diabetes_dbn_model = Sequential()

    diabetes_dbn_model.add(Dense(8, input_dim = 8, activation="relu"))

    diabetes_dbn_model.add(Dropout(0.2))

    diabetes_dbn_model.add(Dense(8, activation = "relu"))

    diabetes_dbn_model.add(Dense(8, activation = "relu"))

    diabetes_dbn_model.add(Dense(8, activation = "relu"))

    diabetes_dbn_model.add(Dense(1, activation = "sigmoid"))

    diabetes_dbn_model.compile(loss = "binary_crossentropy", optimizer = "adam", metrics
    = ["accuracy"])

    return diabetes_dbn_model

    diabetes_dbn_model = KerasClassifier(build_fn = diabetes_dbn_function)

    diabetes_dbn_model_history = diabetes_dbn_model.fit(x_train_diabetes, y_train_diabetes,
    validation_data = (x_val_diabetes, y_val_diabetes), epochs = 64, batch_size =
    16)

    diabetes_dbn_model_history

