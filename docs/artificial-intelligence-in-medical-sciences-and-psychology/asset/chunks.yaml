- fmt: '### Carrying Out a Regular Expression


    Listing [8-5](#527603_1_En_8_Chapter.xhtml#PC5) executes a regular expression
    to clean the textual data in the medical records. It eliminates special characters,
    single characters, multiple spaces, and the prefix “b”, and then it converts all
    text to lower cases. Start by installing `regex` in your environment: `pip install
    regex`.


    ```

    import re

    clean_ind_variables = []

    for sentence in range(len(ind_variables)):

    clean_ind_variable = re.sub(r''\W'', '' '', str(ind_variables[sentence]))

    clean_ind_variable = re.sub(r''\s+[a-zA-Z]\s+'', '' '', clean_ind_variable)

    clean_ind_variable = re.sub(r''\^[a-zA-Z]\s+'', '' '', clean_ind_variable)

    clean_ind_variable = re.sub(r''\s+'', '' '', clean_ind_variable, flags=re.I)

    clean_ind_variable = re.sub(r''b^\s+'', '' '', clean_ind_variable)

    clean_ind_variable = clean_ind_variable.lower()

    clean_ind_variables.append(clean_ind_variable)

    Listing 8-5

    Regular Expression

    ```


    ### Carrying Out Word Vectorization


    Listing [8-6](#527603_1_En_8_Chapter.xhtml#PC6) vectorizes the words in the medical
    transcript by executing the `TfidfVectorizer()` method and outlining the `max_features`
    as `2500`, `min_df` as `8`, and `max_df` as `0.8`. The method alters text to draw
    a `TF-IDF` (frequency-inverse document frequency) features matrix. Start by installing
    `nltk` in your environment: `pip install nltk`.


    ```

    import nltk

    from nltk.corpus import stopwords

    from sklearn.feature_extraction.text import TfidfVectorizer

    vectorizer = TfidfVectorizer(max_features=2500,

    min_df=8,

    max_df=0.7,

    stop_words=stopwords.words("english"))

    clean_ind_variables = vectorizer.fit_transform(clean_ind_variables).toarray()

    Listing 8-6

    Word Vectorization

    ```


