    # 4. Cancer Segmentation with Neural Networks


    This chapter explains the practical application of computer vision and convolutional
    neural networks for breast and skin cancer realization and segmentation. In it,
    you’ll explore an approach to filtering medical scans by applying `canny`, `luplican`,
    and `sobel` filters. You’ll also ascertain the extent to which the networks accurately
    differentiate scans of patients with and without cancer.


    ## Exploring Cancer


    Cancer is a disease that marks an irregular growth of cells with an inclination
    to spread transversely across the body. We recognize this specific disease by
    the visible presence of a tumor, atypical bleeding, and a prolonged cough.


    There is a vast pool of cancer-causing agents. Besides exposure to certain chemicals,
    lifestyle behaviors such as smoking and excessive alcohol consumption may be risks.


    The most prevalent approaches for diagnosing cancer in a patient involve MRI and
    ultrasound scans. In its developmental stages, cancer can be treated by chemotherapy,
    surgery, and radiation therapy, among others. Provided the above, it is crucial
    to conduct periodic medical checks to diagnose cancer.


    ## Exploring Skin Cancer


    Let’s execute a convolutional neural network (CNN) to realize the visible presence
    of skin cancer. Figure [4-1](#527603_1_En_4_Chapter.xhtml#Fig1) depicts the dominant
    forms of skin cancer that the network will differentiate.


    ![](images/527603_1_En_4_Chapter/527603_1_En_4_Fig1_HTML.png)


    **Figure 4-1** Various forms of skin cancer


    Figure [4-1](#527603_1_En_4_Chapter.xhtml#Fig1) shows common forms of skin cancer
    such as actinic keratosis, basal cell carcinoma, dermatofibroma, and more.'
