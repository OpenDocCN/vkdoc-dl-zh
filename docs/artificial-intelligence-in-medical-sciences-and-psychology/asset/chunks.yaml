    ## Executing the CNN to Classify Chest X-Ray Image Data


    The architectural structure of the CNN that classifies patient pneumonia outcomes
    is like that of the CNN above that classifies patient brain tumor outcomes. It
    also comprises a set of 2D convolutional and MaxPooling 2D layers, a flatten layer,
    and two dense layers. All layers contain a `relu` activation function, consisting
