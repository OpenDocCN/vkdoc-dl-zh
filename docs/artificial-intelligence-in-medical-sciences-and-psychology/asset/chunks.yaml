    plt.show()

    Listing 3-5

    Substituting Outliers

    ```


    Figure [3-6](#527603_1_En_3_Chapter.xhtml#Fig6) confirms that the mean value indeed
    substituted outliers.


    Listing [3-6](#527603_1_En_3_Chapter.xhtml#PC6) plots US confirmed COVID-19 cases
    series (Figure [3-7](#527603_1_En_3_Chapter.xhtml#Fig7)).


