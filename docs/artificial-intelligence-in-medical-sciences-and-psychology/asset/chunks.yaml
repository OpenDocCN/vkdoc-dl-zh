    **Listing 9-2** Preprocessing the Data


    ## Scale Reliability


    There are innumerable scale reliability testing strategies. This chapter only
    acquaints you with two prevalent reliability testing strategies: Spearman-Brown
    and Cronbach’s reliability testing.


    ### Spearman-Brown Reliability Testing Strategy


    Equation [9-1](#527603_1_En_9_Chapter.xhtml#Equ1) defines the Spearman-Brown reliability
    test:


    ![$$ {r}_{tt}=\frac{2{r}_h}{1+{r}_h} $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_Equ1.png)


    **(Equation 9-1)**


    where `r[tt]` constitutes the reliability and `r[h]` constitutes the correlation
    between the two halves of the test.


    ### Carrying Out the Cronbach’s Reliability Testing Strategy


    This section shows that Cronbach’s coefficient alpha technique captures the overall
    reliability. Internal consistency represents the degree to which the responses
    are consistent with the items within a specific measure.


    Equation [9-2](#527603_1_En_9_Chapter.xhtml#Equ2) defines Cronbach’s reliability
    test:


    ![$$ {\rho}_T=\frac{k^2\underset{\_}{\sigma_{ij}}}{\sigma_X^2} $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_Equ2.png)


    **(Equation 9-2)**


    where `ρ[T]` constitutes the reliability test, `k` constitutes the number of items
    in the Likert scale, `σ[ij]` constitutes how `X[i]` and `X[j]`, and ![$$ {\sigma}_X^2
    $$](images/527603_1_En_9_Chapter/527603_1_En_9_Chapter_TeX_IEq1.png) constitutes
    the variance and covariance among items.


    Listing [9-3](#527603_1_En_9_Chapter.xhtml#PC3) discerns the Cronbach’s coefficient
    alpha. Start by installing `pingouin` in your environment: `pip install pingouin`.


    ```

    import pingouin as pg

    pg.cronbach_alpha(data = big_five_data)

    (0.5199338748916366, array([0.518, 0.521]))

    ```


    **Listing 9-3** Discerning the Cronbach’s Coefficient Alpha


    The findings above suggest that Cronbach’s coefficient alpha is `0.5199`, which
    suggests the measurement is not exemplary. Moreover, there is mediocre consistency
    with the items in the measurement scale.'
