    ## Pneumonia


    Pneumonia is a preventable infection in the lungs that derives from a bacteria
    or virus. To prevent it, one may opt for a vaccination. Typical symptoms of pneumonia
    include a persistent cough, prolonged fever, and breathing difficulties, among
    others. This disease is common among asthmatics, diabetic individuals, and smokers,
    among other risk factors. The branch of medical science that combats this disease
    is called pulmonology.


