- fmt: '# 7. Modeling Clinical Trial Data


    This chapter explains the prime essentials of the most widespread method for adequately
    investigating data from a clinical trial, recognized as a survival method. It
    also explains the Nelson-Aalen additive model. To begin, you’ll explore the method.
    Then you’ll go through exploratory analysis and then correlation analysis by carrying
    out the Pearson correlation method. Following that, you’ll learn about the survival
    table and fit the model. Finally, you’ll learn about the profile table and confidence
    interval and then you’ll reproduce the cumulative and baseline hazard.


    ## Clinical Trials


    A clinical trial is an investigation that studies changes in a group of subjects
    upon intervention in a controlled environment over an extended period. This distinct
    research approach is widespread in medicine and psychology. It’s considered more
    reliable than other investigations (i.e., cross-sectional investigation) since
    it occurs in a controlled environment. Besides that, it typically involves a controlled
    group, which is a set of subjects.


    ## An Overview of Survival Analysis


    When dealing with clinical trial data, we usually execute survival methods. These
    methods are a suitable candidate for data that comprises time components with
    missing values, equally recognized as censored data.


    Table [7-1](#527603_1_En_7_Chapter.xhtml#Tab1) outlines two forms of groups of
    research subjects that participate in a clinical trial.


    Table 7-1


    Groups in a Clinical Trial


    | Two forms of survival analysis families | Description |

    | --- | --- |

    | **Survival classifiers** | Making up survival methods that solve time-event
    problem, where there is censored data (missing data due to subjects in a clinical
    trial leaving the trial prior to conclusion) that comprise a dependent feature
    or an event column with classes. These are probabilistic methods. For instance,
    we apply survival classifiers when we want to determine the likelihood of a patient
    surviving an illness (or not dying from a certain illness under examination),
    considering time and censored events. |

    | **Survival regressors** | Making survival methods that solve censored data comprise
    a dependent feature (or event column) that is continuous. Similar to survival
    classifiers, these methods are used for time-event problem solving with censored
    data, but they apply linear-based frameworks (using the hazard function) to address
    these problems. In addition, the outcome derives from a combination of covariates.
    |


    Figure [7-1](#527603_1_En_7_Chapter.xhtml#Fig1) depicts various survival methods
    and their families.


    ![](images/527603_1_En_7_Chapter/527603_1_En_7_Fig1_HTML.png)


    Figure 7-1


    Survival analysis families


    In the medical context, let’s assume that there a pharmaceutical firm has discovered
    a new drug. Before the firm takes the drug into the market, it ought to comply
    with the rules and regulations that administer drugs. More importantly, the firm
    ought to ensure that the drug is effective.


    The method requires you to assign research subjects to two groups (see Table [7-2](#527603_1_En_7_Chapter.xhtml#Tab2)).


    Table 7-2


    Groups in a Clinical Trial


    | Type of group | Description |

    | --- | --- |

    | **Uncontrolled group** | A group that is affected by the intervention (i.e.,
    patients who consume the drug) |

    | **Controlled group** | A group of research subjects that are not impacted by
    an intervention (i.e., patients who do not consume the drug) |


    See Figure [7-2](#527603_1_En_7_Chapter.xhtml#Fig2) to further comprehend the
    example.


    ![](images/527603_1_En_7_Chapter/527603_1_En_7_Fig2_HTML.png)


    Figure 7-2


    Clinical trial setup


    Figure [7-2](#527603_1_En_7_Chapter.xhtml#Fig2) depicts the setup of a clinical
    trial.


    Clinical research scientists investigate the effects of the drug on the controlled
    group. In addition, they discern the placebo effect (a condition whereby the uncontrolled
    group exhibits effects similar to those of the controlled, but not as a result
    of consuming the drug). The presence of the placebo effect suggests the ineffectiveness
    of the drug.


    ## Context of the Chapter


    This chapter executes a survival regression method known as the Nelson-Aalen additive
    method. The dataset contains records relating to patients who underwent an operation
    to address breast cancer from 1958 to 1970 (University of Chicago’s Billings Hospital,
    1999). Download the dataset here^([⁹](#fn9)).


    ## Exploring the Nelson-Aalen Additive Model


    The Nelson-Aalen Additive method is a prevalent survival regression method. It
    realizes the probability of survival at a specified time (*t*) by carrying out
    the hazard function. Equation [7-1](#527603_1_En_7_Chapter.xhtml#Equ1) defines
    the Nelson-Aalen additive hazard function:


    ![$$ {\overset{\sim }{H}}_t={\sum}_{t\le 1}\frac{d_i}{n_i} $$](images/527603_1_En_7_Chapter/527603_1_En_7_Chapter_TeX_Equ1.png)


    (Equation 7-1)


    where *d*[*i*] signifies the events across time (*t*) and *n*[*i*] signifies the
    number of subjects at risk.


    The method will predict the likelihood of a patient’s survival status upon an
    intervention at a certain time (the `Year_of_operation`).'
