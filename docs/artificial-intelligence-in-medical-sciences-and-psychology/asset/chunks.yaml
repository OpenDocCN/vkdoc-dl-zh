    Figure 5-5


    X-ray imaging procedure


    Figure [5-5](#527603_1_En_5_Chapter.xhtml#Fig5) depicts the X-ray machine releasing
    radiation doses which pass through the body and are detected by the X-ray detector,
    which is then transmitted to the cassette and an image is generated.


    ### Classifying X-Rays by Executing a CNN


