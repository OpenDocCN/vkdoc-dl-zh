    of the drug.


    ## Context of the Chapter


    This chapter executes a survival regression method known as the Nelson-Aalen additive
    method. The dataset contains records relating to patients who underwent an operation
    to address breast cancer from 1958 to 1970 (University of Chicago’s Billings Hospital,
    1999). Download the dataset here^([⁹](#fn9)).


    ## Exploring the Nelson-Aalen Additive Model


    The Nelson-Aalen Additive method is a prevalent survival regression method. It
    realizes the probability of survival at a specified time (*t*) by carrying out
    the hazard function. Equation [7-1](#527603_1_En_7_Chapter.xhtml#Equ1) defines
    the Nelson-Aalen additive hazard function:


    ![$$ {\overset{\sim }{H}}_t={\sum}_{t\le 1}\frac{d_i}{n_i} $$](images/527603_1_En_7_Chapter/527603_1_En_7_Chapter_TeX_Equ1.png)


    (Equation 7-1)


    where *d*[*i*] signifies the events across time (*t*) and *n*[*i*] signifies the
    number of subjects at risk.


    The method will predict the likelihood of a patient’s survival status upon an
    intervention at a certain time (the `Year_of_operation`).'
