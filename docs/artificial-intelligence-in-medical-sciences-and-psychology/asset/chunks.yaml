    ## Executing the CNN to Classify Chest X-Ray Image Data


    The architectural structure of the CNN that classifies patient pneumonia outcomes
    is like that of the CNN above that classifies patient brain tumor outcomes. It
    also comprises a set of 2D convolutional and MaxPooling 2D layers, a flatten layer,
    and two dense layers. All layers contain a `relu` activation function, consisting
    of a sparse cross-categorical cross-entropy loss function, and an accuracy metric.
    Furthermore, it is trained across 64 epochs. See the code in Listing [5-15](#527603_1_En_5_Chapter.xhtml#PC15).


    ```

    chest_x_ray_convolutional_net_model = tf.keras.Sequential([

    tf.keras.layers.experimental.preprocessing.Rescaling(1./255),

    tf.keras.layers.Conv2D(16, 3, activation = "relu"),

    tf.keras.layers.MaxPooling2D(),

    tf.keras.layers.Conv2D(64, 3, activation="relu"),

    tf.keras.layers.MaxPooling2D(),

    tf.keras.layers.Conv2D(128, 3, activation="relu"),

    tf.keras.layers.MaxPooling2D(),

    tf.keras.layers.Flatten(),

    tf.keras.layers.Dense(255, activation="relu"),

    tf.keras.layers.Dense(3)

    ])

    chest_x_ray_convolutional_net_model.compile(optimizer = "adam", loss = tf.keras.losses.SparseCategoricalCrossentropy(from_logits
    = True), metrics = ["accuracy"])

    chest_x_ray_convolutional_net_model_history = chest_x_ray_convolutional_net_model.fit(chest_x_ray_training_data,
    validation_data = chest_x_ray_validation_data, epochs = 64)

