- "# 3. COVID-19 案例研究：考虑隐藏状态与模拟结果\n\n在本章中，你将运用一组序列方法（或称时间序列方法）进行预测，以识别美国 COVID-19\
  \ 确诊病例的模式。首先，你将使用高斯隐马尔可夫模型继承序列、对其进行建模，并考虑隐藏状态，包括这些状态中的均值和协方差。随后，你将使用蒙特卡洛模拟方法，在多次试验中复制美国\
  \ COVID-19 确诊病例，从而深入理解数据中的模式。\n\n## 执行隐马尔可夫模型\n\n你首先使用隐马尔可夫模型来揭示美国 COVID-19 确诊病例中的隐藏状态（可视为类别或分类）。你将采用最简化的马尔可夫模型，即高斯隐马尔可夫模型，该模型返回两个状态：0（表示美国\
  \ COVID-19 确诊病例增加）和 1（表示美国 COVID-19 确诊病例减少）。\n\n让我们基于“当前状态和后续状态依赖于先前状态”这一前提来构建隐马尔可夫模型。`公式\
  \ 3-1` 定义了高斯隐马尔可夫模型：\n\n![$$ P\\left(,{S}_{i2},{S}_{i3}\\dots, {S}_{ik-1}\\right)=P\\\
  left({S}_{ij}|{S}_{ik-1}\\right) $$](img/527603_1_En_3_Chapter_TeX_Equ1.png)\n\n\
  **（公式 3-1）**\n\n其中，`S[ij]` 表示隐藏状态的独立观测值，`S[i1]` 表示第一个隐藏状态，`S[i2]` 表示第二个隐藏状态，以此类推。\n\
  \n`图 3-1` 展示了转移概率（定义见`公式 3-2`）和初始概率（定义见`公式 3-3`）：\n\n![$$ {\\alpha}_{ij}=P\\left({S}_i|{S}_j\\\
  right) $$](img/527603_1_En_3_Chapter_TeX_Equ2.png)\n\n**（公式 3-2）**\n\n![](img/527603_1_En_3_Fig1_HTML.png)\n\
  \n**图 3-1**  \n转移概率\n\n以及\n\n![$$ {\\pi}_i=P\\left({S}_i\\right). $$](img/527603_1_En_3_Chapter_TeX_Equ3.png)\n\
  \n**（公式 3-3）**\n\n`图 3-1` 显示了两个状态：`“COVID-19 确诊病例增加”`和`“COVID-19 确诊病例减少”`，其中转移概率为\
  \ `P(“COVID-19 确诊病例增加” | “COVID-19 确诊病例增加”)` = 0.4，`P(“COVID-19 确诊病例减少” | “COVID-19\
  \ 确诊病例增加”)` = 0.6。\n\n约翰霍普金斯大学收集的数据于 2021 年 9 月 24 日从 GitHub^(³) 下载。\n\n**注意** \
  \ \n约翰霍普金斯大学每天更新数据。要重现本练习，请从本章的 GitHub 文件夹中下载数据集。\n\n\n\n## 描述性分析\n\n在执行高斯隐马尔可夫模型之前，首先应进行探索性描述分析。在本节中，你将通过构建直方图和箱线图来考察数据的分布情况。随后，你将通过集中趋势和离散程度来描述数据。清单\
