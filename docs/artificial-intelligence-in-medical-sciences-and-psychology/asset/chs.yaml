  ### 实现相关性关系


  皮尔逊相关性用于识别两个特征之间的相关关联，其中特征的实例是连续的。对于具有类别的特征，需要执行其他相关性方法（即斯皮尔曼和肯德尔相关性方法）。公式 7-2 定义了皮尔逊相关性方法：


  ![$$ {Corr}_{xy}=\frac{Cov_{xy}\ }{s_x{s}_y} $$](img/527603_1_En_7_Chapter_TeX_Equ2.png)


  （公式 7-2）


  其中 `S[x]` 表示 `x` 的值偏离 ![$$ \underset{\_}{x} $$](img/527603_1_En_7_Chapter_TeX_IEq1.png)
  的程度，`S[y]` 表示 `y` 的值偏离 ![$$ \underset{\_}{y} $$](img/527603_1_En_7_Chapter_TeX_IEq2.png)
  的程度，`Cov[xy]` 表示 `x` 和 `y` 相关变化的程度。公式 7-3 定义了协方差方法：


  ![$$ {Cov}_{xy}=\frac{\sum \left({x}_i-\underset{\_}{x}\right)\left({y}_i-\underset{\_}{y}\right)\
  }{n-1}. $$](img/527603_1_En_7_Chapter_TeX_Equ3.png)


  （公式 7-3）


  公式 7-2 生成一个介于 -1 和 1 之间的相关系数，其中 -1 表示极强的负相关，0 表示无相关性，1 表示极强的正相关。


