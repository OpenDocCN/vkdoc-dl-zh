  ### 封装人工智能


  要认识人工智能，首先必须理解人类智能，它涉及扫描环境中的信息、建立模型、寻找模式以得出结论，然后将这些结论作为行动的基础。人工智能这一统一领域旨在以模拟人类智能的方式对计算机系统进行编程。简单来说，深度学习试图模拟人脑的底层过程；计算机视觉试图模拟人类视觉系统的底层过程；自然语言处理则试图模拟人类处理语言的方式。


