  ### 使用碎石图判断 K 值


  最常用于明智地决定因子数量的方法是构建一个碎石图，该图以因子为 x 轴，以特征载荷或特征值（来自线性变换的向量）为 y 轴。要确定因子数量，需检测曲线出现急剧弯曲的区域。


