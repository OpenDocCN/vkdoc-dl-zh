  ### 执行特征值旋转


  在拟合因子分析模型后，下一步通常涉及旋转特征值。`factor_analyzer` 库中有无数的旋转技术（例如，`promax`、`oblique`、`oblimin`
  和 `oblimax` 等）。下一节将展示如何令人满意地执行最大方差旋转。




  #### 最大方差旋转


  最大方差旋转用于简化因子载荷。


  清单 9-7 通过执行 `FactorAnalyzer()` 方法整合了因子载荷，然后指定了因子数量和旋转方法（见表 9-5）。


