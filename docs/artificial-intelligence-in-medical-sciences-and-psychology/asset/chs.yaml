  ## 结论


  本章通过执行因子分析和聚类分析，提出了一种分析不同人格特征的整体方法，以此作为本书的结尾。你使用从主成分分析方法中得到的降维数据拟合了聚类模型。


  我希望你觉得这本书有用，并希望它能帮助你理解在医学科学多个领域中解决各种问题的方法。请向你的同行推荐并分享本书。


  感谢你的阅读。




