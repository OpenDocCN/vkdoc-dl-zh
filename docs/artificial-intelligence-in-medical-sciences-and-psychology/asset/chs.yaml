  **图 1-1** 本书核心所涉及的医学专科


  本书以医学和心理健康科学为核心。我提出了一种实现机器学习的方法，用于处理与医学科学（如肿瘤学、神经科学和心脏病学）以及社会科学（如心理学）相关的数据。


