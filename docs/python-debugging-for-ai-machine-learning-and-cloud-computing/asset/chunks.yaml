    # 挂起


    > *1. 等待一个永远不会发生的事件。“系统挂起，因为它无法从崩溃的驱动器中读取数据。”*

    >

    > *2. 等待某个事件发生。“程序显示一个菜单，然后挂起，直到你输入一个字符。”*

    >

    > 埃里克·S·雷蒙德，《新黑客词典》，第三版


    线程会与其他线程交互，包括其他进程的线程。这些交互可以看作是发送消息和等待响应。某些进程可能至关重要，因为它们的线程会处理来自其他进程的许多其他线程的消息。如果此类关键进程的线程停止发送响应，所有其他等待的线程都将被阻塞。死锁是指两个线程相互等待。当挂起时，该进程仍会出现在可用进程列表中。还有一些进程（关键组件），当它们的线程挂起时，会阻塞来自许多其他进程（非关键组件）的线程。图
    1-6 描述了这些组件及其在正常场景下通过消息抽象化的交互，而图 1-7 则展示了非关键组件因关键组件死锁而被阻塞并等待响应的异常场景。


    ![](img/606465_1_En_1_Fig7_HTML.png)


    关键组件与 PID 的框图。关键组件由 PID 20 和 80 的块组成。PID 20 的 TID 20 与 PID 80、PID 45 的 TID 45、PID
    55 的 TID 55 以及 PID 70 的 TID 71 互连。


    图 1-7


    被阻塞和死锁的组件


    ![](img/606465_1_En_1_Fig6_HTML.png)


    关键组件与 PID 的框图。关键组件由 PID 20 和 80 组成。PID 20 的 TID 20 与 PID 45 的 TID 45、PID 55 的
    TID 55 以及 PID 70 的 TID 71 互连。


    图 1-6


    关键与非关键系统组件之间的请求与响应交互


    # 总结


    在本章中，你学习了将在后续章节中使用的基本术语。下一章将介绍一种面向模式的调试方法。


    # 2. 面向模式的调试


    本章介绍面向模式的调试过程方法以及你将在后续章节中使用的模式语言。


    ## 理念的起源


    在调试中使用模式的想法并不新鲜^(¹)。早期，这类模式分为两种：错误模式^(²)和调试模式^(³)。在 2000 年之前，只能找到少数与调试相关的模式，例如调试打印方法^(⁴)。


    错误模式通常是针对特定语言和平台的特定模式。我们所说的错误，指的是软件缺陷。通常，这些缺陷与源代码相关，但也可能与配置和数据模型有关。


    以源代码作为调试的起点，仅适用于有限数量的场景，例如当你拥有 Python 堆栈跟踪时。然而，在许多情况下，源代码调查的起点是未知的。此时，一个定义良好的过程可能会有所帮助。过去曾提出过许多调试过程，包括多学科方法^(⁵)。


    “面向模式的调试”这一短语大约出现在 1987-1988 年，当时是在进程交互模式的背景下^(⁶)。这与 2014 年提出的“面向模式的调试过程”^(⁷)不同，后者是作为
    2010 年引入的*统一调试模式*^(⁸)的进一步发展。自 2013 年起，这些模式已成功用于教授非托管（原生、Win64、C、C++）和托管（.NET、C#）代码的
    Windows 调试^(⁹)，历时近十年。总的来说，这种面向模式的方法可以追溯到我们早期于 2011 年出版的一本书中提出的观点^(¹⁰)。在该书中，我们将相同的面向模式的过程应用于云和机器学习环境中的
    Python 调试。


    ## 模式与分析模式


    在查看调试过程之前，先简单介绍一下诊断和调试背景下的模式。所谓*模式*，我们指的是一组常见的、可重复识别的指标（症状、迹象）。所谓*分析模式*，我们指的是在特定上下文中常见的、可重复的分析技术和模式识别方法。所谓*模式语言*，我们指的是用于沟通的模式和分析模式的通用名称。


    ## 开发过程


    让我们首先看看传统的软件开发过程阶段。图 2-1 从包括瀑布式和迭代式在内的几种开发过程中抽象出了这些阶段。


    ![](img/606465_1_En_2_Fig1_HTML.png)


    一个堆叠的框图代表了软件开发过程的各个阶段。这些块分别是需求、分析、架构、设计和实现。沿着这些块从上到下绘制了一个向下的箭头。


    图 2-1


    典型软件开发过程的阶段


    ## 开发模式


    对于每个阶段，都存在某种模式语言，例如针对常见的、可重复识别的、具有语法、语义和语用学问题的解决方案词汇表。图 2-2 还包括用于人机交互的软件使用模式和呈现模式。在本书中，我假设你熟悉此类模式语言（下面提供了一些参考资料）。


    ![](img/606465_1_En_2_Fig2_HTML.png)


    一个堆叠的框图代表了软件开发模式语言。这些块分别是需求、分析、架构、设计、实现、使用和呈现模式。沿着这些块从上到下绘制了一个向下的箭头。


    图 2-2


    典型的软件开发模式语言

