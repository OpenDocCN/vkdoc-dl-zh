    # 9. Debugging Design Patterns


    In the previous chapter, you looked at debugging architecture patterns, answering
    the most important question of where, when, and how we debug and what we debug.


    In this chapter, I introduce the most common debugging design patterns (Figure
    [9-1](#606465_1_En_9_Chapter.xhtml#Fig1)) in real-life case studies involving
    elementary diagnostics patterns, analysis, and debugging architecture. These patterns
    are **Mutation**, **Replacement**, **Isolation**, and **Try-Catch**. The selection
    of pattern names is based on the author''s experience with debugging in software
    domains, including system programming, user interface development, machine learning,
    and cloud-native applications. Other software domains, such as games or embedded,
    may have different and additional pattern names. Pattern languages are not fixed;
    everyone can have their patterns or adapt existing patterns from the book you
    are reading if this helps their teams and software community^([^(56)](#fn56)).


    **Mutation** deals with changing code, data, and configuration values to see the
    outcome during execution and while using debugging implementation patterns.


    **Replacement** works on a higher level where you can replace whole functions,
    classes, or even components with others that have compatible interfaces.


    **Isolation** is used to debug code independently from other parts while having
    all other dependencies fixed and not having any side effects on the code you debug.


    **Try-Catch** is a procedure where you repeat all chosen patterns and hope to
    see changes in behavior.


    ![](images/606465_1_En_9_Chapter/606465_1_En_9_Fig1_HTML.png)


    A stacked block diagram of the pattern-oriented debugging process. Blocks from
    top to bottom are elementary diagnostics, debugging analysis, debugging architecture,
    debugging design, debugging implementation, debugging usage, and debugging presentation
    patterns. The debugging design is highlighted.


    Figure 9-1


    Pattern-oriented debugging process and debugging design patterns


    You may have had the impression that the pattern-oriented debugging process is
    straightforward and waterfall-like. This impression is far from the real case
    debugging scenarios of complex software issues. The actual pattern-oriented debugging
    process is usually iterative. It may trigger the reevaluation of debugging requirements,
    diagnostics (analysis), architecture, and design based on debugging results and
    a new set of execution artifacts (Figure [9-2](#606465_1_En_9_Chapter.xhtml#Fig2))
    with new sets of corresponding debugging patterns for use.


    ![](images/606465_1_En_9_Chapter/606465_1_En_9_Fig2_HTML.png)


    A stacked block diagram represents the pattern-oriented debugging process. Blocks
    from top to bottom are debugging requirements, debugging analysis, debugging architecture,
    debugging design, and debugging implementation. Arrows are mapped from debugging
    implementation to other blocks.


    Figure 9-2


    Iterative nature of the pattern-oriented debugging process


    Let’s now examine two debugging case studies and their corresponding debugging
    pattern layers.


    ## CI Build Case Study


    This case study describes the debugging problem one of the engineers faced when
    a cloud CI build system written in Python failed after the upgrade. The problem
    had to be fixed quickly for the time being to do builds now without escalating
    code change to the cloud CI build system team and waiting for a new release.


    ### Elementary Diagnostics


    The system crashed, printing a stack trace on the console with the following bottom
    line:


    ```

    ...

    File ".../ci/build-driver.py", line 346, in isVersion

    varStr = variable.replace("-","")

    AttributeError: ''Variable'' object has no attribute ''replace''

    ```


    ### Analysis


    The **Managed Stack Trace** analysis pattern was useful in finding the problem
    object `variable` with the failing method `replace`.


    ### Architecture


    The Python code was unfamiliar to the engineer and executed inside a Python virtual
    environment. Therefore, it was decided to do **Postmortem** debugging **In Vivo**
    inside the same failing environment using **Software Narratives** (console logs).


    ### Design


    The debugging design involved code **Mutation** to add a `print(variable)` statement
    and then analyzing the resulting **State Dump** in the console output.


    ### Implementation


    The engineer used the **Type Structure** and the **Variable Value** to find out
    the best course of action. After the code change, the console output included
    the representation of the `variable` object, which contained the name of configuration
    file parameter instead of value. The build system configuration file was written
    in one of the popular cloud-native configuration languages. So the engineer changed
    the debugging design, this time with the configuration **Mutation,** by replacing
    all occurrences of the parameter variable in the build configuration file with
    a hard-coded value as a temporary fix. This time the CI build was successful.


    ## Data Processing Case Study


    This case study describes the debugging problem the engineers faced when using
    the Pandas data analysis and manipulation library in a third-party data processing
    and machine learning system on Windows that used Python DLL to execute the Python
    scripts.


    ### Elementary Diagnostics


    In addition to the ability to execute Python scripts, the system also had embedded
    Python REPL. However, REPL experienced a **Hang** when executing the following
    Python code line:


    ```

    import pandas

    ```


    Since the data processing system was frozen, it was decided to save its process
    memory dump as described in Chapter [3](#606465_1_En_3_Chapter.xhtml)’s “How to
    Generate Process Memory Dumps on Windows” section.'
  raw: '## The How? Category


    This category of debugging architecture patterns answers the question of **how**
    you will debug relative to software execution time and space.


    ### Software Narrative


    **Software Narratives** are software execution artifacts not limited to traces
    and logs. They also include source code and various documents and descriptions.
    This term was originally introduced in software narratology^([^(55)](#fn55)).
    You choose this architectural pattern if you want to see how the software structure
    and behavior changes with time but you are not interested in seeing all state
    changes in every part of the program.


    ### Software State


    The traditional live and postmortem debugging approaches inspect the program’s
    state, such as memory. For example, they can watch the value of a variable or
    object field over time (live debugging) or inspect memory addresses at the time
    of a crash or hang (postmortem debugging). You use this **Software State** architectural
    pattern when you want to analyze the program or even the entire system state at
    once. A typical example is a program that depends on several system services,
    and these services depend on each other and the operating system. In this case,
    you may need the whole physical memory snapshot for the analysis of different
    virtual memory process spaces.


    ## Summary


    In this chapter, you overviewed the debugging architecture patterns. You will
    encounter them again in some of the case studies in subsequent chapters. The next
    chapter looks at the most common debugging design patterns that are used to refine
    more general debugging architecture patterns in the context of case studies that
    involve the analysis, architecture, and design of debugging.


