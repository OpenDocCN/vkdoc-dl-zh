  trans: "\n# 摘要\n\nPython 作为最流行的编程语言之一，拥有庞大的工具和库生态系统。将人工智能/机器学习引入调试工作流程，可以彻底改变开发者解决问题的方式。虽然调试中的人为因素（直觉和经验）始终不可替代，但人工智能可以充当宝贵的助手，减少错误解决所花费的时间，并提升代码质量。随着这些技术的逐步改进，我们可以期待一个未来，调试更像是人与机器之间的协作努力，使软件开发更高效，调试也更有趣。\n\
    \n# 16. 调试模式列表\n\n本章列出调试模式名称，以便于快速回忆。\n\n## 基础诊断模式\n\n在第 3 章中介绍：\n\n* 用例偏差\n*\
    \ 崩溃\n* 挂起\n* 计数器值\n* 错误消息\n\n## 调试分析模式\n\n在第 4 章中介绍：\n\n* 旁文本\n* 状态转储\n* 计数器值\n\
    * 堆栈跟踪模式\n  * 堆栈跟踪\n  * 运行时线程\n  * 托管堆栈跟踪\n  * 源代码堆栈跟踪\n  * 堆栈跟踪集合\n  * 堆栈跟踪集\n\
    * 异常模式\n  * 托管代码异常\n  * 嵌套异常\n  * 异常堆栈跟踪\n  * 软件异常\n* 模块模式\n  * 模块集合\n  * 非我的版本\n\
    \  * 异常模块\n  * 源模块\n* 线程模式\n  * 峰值线程\n  * 活动线程\n  * 阻塞线程\n  * 阻塞模块\n* 同步模式\n \
    \ * 等待链\n  * 死锁\n  * 活锁\n* 内存消耗模式\n  * 内存泄漏\n  * 句柄泄漏\n\n## 调试架构模式\n\n在第 8 章中介绍：\n\
    \n* 在哪里？\n  * 纸上调试\n  * 现场调试\n  * 体外调试\n  * 硅中调试\n  * 原位调试\n  * 异位调试\n* 何时？\n\
    \  * 实时\n  * 即时编译\n  * 事后\n* 什么？\n  * 代码\n  * 数据\n  * 交互\n* 如何？\n  * 软件叙事\n  *\
    \ 软件状态\n\n## 调试设计模式\n\n在第 9 章中介绍：\n\n* 变异\n* 替换\n* 隔离\n* 尝试捕获\n\n## 调试实现模式\n\n\
    在第 5 章中介绍：\n\n* 中断\n* 代码断点\n* 代码跟踪\n* 作用域\n* 变量值\n* 类型结构\n* 断点动作\n* 使用跟踪\n\n##\
    \ 调试使用模式\n\n在第 10 章中介绍：\n\n* 精确序列\n* 脚本化\n* 调试器扩展\n* 抽象命令\n* 空间转换\n* 提升\n* 手势\n\
    \n## 调试呈现模式\n\n在第 7 章中介绍：\n\n* 交互式解释器\n* 断点工具栏\n* 动作工具栏\n* 状态仪表板\n"
