    # 总结


    在本章中，你了解了在 Python 命令行调试器环境下的调试实现模式。下一章将介绍在各种 Python IDE 环境下的相同模式。


    脚注 1 2


    # 6. 云端 IDE 调试


    本章将介绍在一些 Python IDE 环境下的调试实现模式。


    ## Visual Studio Code


    让我们在 Visual Studio Code IDE 环境下回顾上一章的调试实现模式语言和案例研究。我假设你已在本地机器上安装了 VS Code 及所需的扩展。关于必要的步骤，请查看
    Visual Studio Code 的 Python 扩展说明^(³¹)。


    ### WSL 设置


    在为本书记录准备一些案例研究时，我使用了 VS Code 进行编辑，并使用运行 Debian 的 WSL（适用于 Linux 的 Windows 子系统）来执行
    Python 代码（从而模拟远程云实例）。因此，在介绍云设置之前，我想为你提供一些说明，以便在你无法访问云环境时，如何使用 IDE 在本地进行调试。请参考
    `https://github.com/Microsoft/vscode-python` 上的文章^(³²)，了解如何准备这样的环境。不过，那里推荐的设置可能需要进行一些故障排除。在我们的
    Windows 11 WSL2 系统上，我必须在 `.bashrc` 中添加以下行：


    ```

    alias code= "''/mnt/c/Users/[USER]/AppData/Local/Programs/Microsoft VS Code/Code.exe''"

    ```


    所需的设置还会安装云设置所必需的 **Remote – SSH** VS Code 扩展。


    ### 云端 SSH 设置


    为了准备云端远程调试环境，我建议先完成关于通过 SSH 进行远程开发的文章^(³³)中的前置步骤。


    下面我提供一个示例，展示在 Windows 11 上运行的 VS Code 如何连接到我们在不同云（非 Azure）中运行的 Ubuntu AArch64
    系统，该云环境在参考文章中已有描述。由于我在配置云实例时已经生成了 SSH 密钥对，因此我直接使用它进行连接。


