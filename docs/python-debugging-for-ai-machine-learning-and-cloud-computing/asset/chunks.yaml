    # 10. Debugging Usage Patterns


    In the previous chapter, you looked at debugging design patterns. In this chapter,
    you will explore the most common debugging usage patterns (Figure [10-1](#606465_1_En_10_Chapter.xhtml#Fig1)).


    ![](images/606465_1_En_10_Chapter/606465_1_En_10_Fig1_HTML.png)


    A stacked block illustration represents a debugging usage pattern. The blocks
    are elementary diagnostics, debugging analysis, debugging architecture, debugging
    design, debugging implementation, debugging usage, and debugging presentation
    patterns.


    **Figure 10-1** Pattern-oriented debugging process and debugging design patterns


    These usage patterns are about debugging pragmatics and automating patterns from
    other layers. They accumulate experience developing and using debugging tools
    and products across various operating systems and platforms. I list them with
    brief descriptions below.


    ## Exact Sequence


    Sometimes pattern implementations for the specific debugger, operating system,
    or debugging space involve exact sequences of commands or specific command options
    to achieve the desired effect. Not following `Exact Sequences` may generate unintended
    side effects and incorrect and misleading command output.


    Typical examples are:


    - Switching to the correct process space and reloading user space symbols in live
    Windows or complete memory dump postmortem debugging

    - Dumping symbolic references from a thread stack region


    ## Scripting


    Most debuggers include support for scripting languages; for example, GDB provides
    support for simple scripting (Listings [10-1](#606465_1_En_10_Chapter.xhtml#PC1)
    and [10-2](#606465_1_En_10_Chapter.xhtml#PC2)) and Python scripts^([^(61)](#fn61)),
    and WinDbg includes native scripting language^([^(62)](#fn62)) and also supports
    JavaScript^([^(63)](#fn63)).


    ```

    (gdb) source script.txt

    (gdb) dpp 0x7ffdf45637f8 10

    0x7ffdf45637f8: 0x7ffdf4565756: 0x622f3d4c4c454853

    0x7ffdf4563800: 0x7ffdf4565766: 0x544e4f4354534948

    0x7ffdf4563808: 0x7ffdf456577d: 0x545349445f4c5357

    0x7ffdf4563810: 0x7ffdf4565794: 0x5345443d454d414e

    0x7ffdf4563818: 0x7ffdf45657a9: 0x6d6f682f3d445750

    0x7ffdf4563820: 0x7ffdf45657c7: 0x3d454d414e474f4c

    0x7ffdf4563828: 0x7ffdf45657d8: 0x4944504d545f434d

    0x7ffdf4563830: 0x7ffdf45657f3: 0x313d4449535f434d

    0x7ffdf4563838: 0x7ffdf45657fe: 0x6f682f3d454d4f48

    0x7ffdf4563840: 0x7ffdf4565812: 0x5f6e653d474e414c

    Listing 10-2

    A Sample Output from the GDB Script Example

    ```


    ```

    define dpp

    set $i = 0

    set $p = $arg0

    while $i < $arg1

    printf "%p: ", $p

    x/ga *(long *)$p

    set $i = $i + 1

    set $p = $p + 8

    end

    end

    Listing 10-1

    A Simple GDB Script for Double Memory Dereference

    ```


    ## Debugger Extension


    Usually, by a debugger extension, we mean a DLL or shared library that a debugger
    process can load to provide additional debugging commands or extend the existing
    ones. GDB uses Python scripting capabilities for the Python debugging extension^([^(64)](#fn64)),
    which you used in the Chapter [4](#606465_1_En_4_Chapter.xhtml) case study. WinDbg
    has many extensions^([^(65)](#fn65)) and provides C/C++ APIs to write them^([^(66)](#fn66)),
    but the dedicated third-party extension to debug Python doesn’t work with the
    latest Python versions^([^(67)](#fn67)). You will use WinDbg extensions for native
    debugging analysis patterns in the next chapter.


    ## Abstract Command


    Sometimes, when describing or communicating debugging scenarios, it is easy to
    abstract differences between debuggers, their commands, and `Exact Sequences`
    by creating a debugging domain language and using either debugging extensions
    or scripts for this language implementation. This approach is adopted in some
    memory forensics tools.


    ## Space Translation


    Debugging implementation pattern names used for debugging process user space can
    be reused for kernel or managed spaces, although their implementations, such as
    debugger commands, may differ. A typical example is the need to dump symbolic
    references from user space thread stack and kernel space thread stack memory regions.


    ## Lifting


    Problem solving techniques can be borrowed from other domains of activity and,
    vice versa, existing debugging analysis and implementation patterns can be applied
    to other domains, such as to debugging cloud native computing environments^([^(68)](#fn68)).


    ## Gestures


    First, I introduce some definitions adapted to debugging from software diagnostics
    where they were originally introduced^([^(69)](#fn69)).


    - A debugging action is a user interface action, a command, a technique, a debugging
    algorithm, and a debugging pattern.

    - A space of tools is a collection of physical and virtual (mental, imaginary)
    tools at some physical or virtual (mathematical) distance from each other.

    - A configuration of debugging actions is a directed graph (digraph) in a topological
    space of tools or a diagram in a category theory^([^(70)](#fn70)) sense.

    - A debugging gesture is a configuration of debugging actions across the space
    of tools and time, resulting in a workflow of diagnostic actions.

    - A debugging hypergesture is a gesture^([^(71)](#fn71)) of debugging gestures,
    a transformation of one gesture into another, between sets of tools, similar to
    porting debugging patterns from one platform to another, for example, from Windows
    to Linux or from one domain to another, for example, from logs to texts (see also
    the `Lifting` pattern above). You can view debugging hypergestures as debugging
    gesture patterns.


    The “gesture” metaphor stems from the fact that despite recent automation efforts,
    the debugging process is still manual when it requires substantial domain expertise.
    We still use various tools, graphical and command line ones (hand movements),
    and move in cyberspace. So, combining all these physical and virtual movements
    into some abstract space path is natural. There’s also a question of debugging
    performance (in terms of achieving debugging goals) and repertoire. Debugging
    gestures also include tool improvisation, data exploration, action experimentation,
    and aesthetics (coolness, for example). Some gestures can be used to discover
    further debugging patterns.'
  raw: '### Architecture


    To speed up the debugging process and avoid frequently sending memory dumps, engineers
    proposed using **In Vivo JIT Code** debugging by attaching the WinDbg debugger^([^(59)](#fn59))
    to the process once the program became frozen and then analyzing its **Software
    State**.


    ### Design


    Since the problem involved the Python interpreter and native libraries from the
    third-party package, it was proposed to Python version **Replacement**. If no
    compatible Python helps (for example, the system couldn’t use the latest Python
    due to other legacy components), then you can try a **Replacement** for the Pandas
    library. Find a compatible library with a similar interface that doesn’t use NumPy.


    ### Implementation


    Debugging implementation patterns involved a **Break-in** and **Breakpoint Action**
    to print stack traces. Finally, after numerous attempts with different Python
    versions and libraries with similar interfaces, it was decided to use the Polars^([^(60)](#fn60))
    library instead of Pandas.


    ## Summary


    In this chapter, you explored some case studies and basic debugging patterns.
    The next chapter examines pragmatics: debugging usage patterns, the last debugging
    pattern category.


