    # 引言


    Python 是人工智能和机器学习领域中使用的主流语言，其数据和管道均部署在云环境中。除了在流行的集成开发环境、笔记本和命令行调试器中调试 Python 代码外，本书还涵盖了理解、诊断和调试复杂软件问题所必需的本地操作系统接口（Windows
    和 Linux）。


    本书首先介绍面向模式的软件诊断和调试流程，这些流程在进行 Python 调试之前，会先诊断内存转储、跟踪和日志等各种软件工件中的问题。接着，本书通过模拟异常软件行为的
    Python 案例研究，教授各种调试模式。此外，本书还涵盖了云原生和机器学习环境中 Python 调试的特定内容。最后，本书总结了人工智能/机器学习的最新进展如何助力
    Python 调试。本书还深入探讨了环境问题、崩溃、挂起、资源激增、泄漏和性能下降等案例研究。除了内存转储及其使用原生 `WinDbg` 和 `GDB` 调试器进行的分析外，本书还涵盖了跟踪和日志记录。


    本书适合希望了解 Python 调试如何用于开发健壮可靠的 AI、机器学习和云计算软件的人士阅读。它采用一种新颖的面向模式的方法来诊断和调试异常的软件结构和行为。软件开发人员、AI/ML
    工程师、研究人员、数据工程师、MLOps、DevOps 以及任何使用 Python 的人士都将从本书中受益。


    源代码：本书中使用的所有源代码均可从 `github.com/Apress/Python-Debugging-for-AI-Machine-Learning-and-Cloud-Computing`
    下载。


    # 关于作者 关于技术审校者


    # 1. 基础术语


    在机器学习和云计算环境中调试复杂的软件问题，不仅需要了解 Python 语言及其解释器（或编译器），以及标准库和外部库，还需要了解必要且相关的执行环境和操作系统内部机制。在本章中，你将回顾软件诊断和调试语言中的一些必要基础知识，以便为后续章节建立相同的理解基础。在本书中，我假设你熟悉
    Python 语言及其运行时环境。


    ## 进程


    Python 脚本通过编译成字节码然后执行来进行解释，甚至可以被预编译成应用程序。在这两种情况下，这个解释器文件或编译后的应用程序都是一个可执行程序（在 Windows
    中，它可能具有 `.exe` 扩展名），它引用了一些操作系统库（Windows 中的 `.dll` 和 Linux 中的 `.so`）。这个应用程序可以被多次加载到计算机内存中；每次都会创建一个独立的进程，拥有自己的资源和唯一的进程
    ID（PID，也称为 TGID），如图 1-1 所示。该进程也可能有一个创建它的父进程，并带有父进程 ID（PPID）。


    ![](img/606465_1_En_1_Fig1_HTML.png)


    一个关于固态硬盘和内存的框图。固态硬盘中一个带有文件的框连接到内存中 PID 60 和 61 的框。


    **图 1-1** 两个具有不同 PID 的 `python3` 进程


    为了说明这一点，我在 Windows 和 Linux 上分别执行了两次清单 1-1 中的代码。


    ```

    import time

    def main():

    foo()

    def foo():

    bar()

    def bar():

    while True:

    time.sleep(1)

    if __name__ == "__main__":

    main()

    ```


    **清单 1-1** 一个模拟运行中 Python 代码的简单脚本


    图 1-2 显示了 Windows 上的两个进程。


    ![](img/606465_1_En_1_Fig2_HTML.jpg)


    任务管理器中菜单图标的屏幕截图。它显示了一个表格，表头为名称、PID、状态、CPU、内存、架构和描述。python 3 dot 11 dot e x e 文件的
    PID 被高亮显示。


    **图 1-2** Windows 上两个正在运行的 `python3.11.exe` 进程


    在 Linux 上，当你在两个独立的终端中执行相同的脚本时，你也可以看到两个进程：


    ```

    ~/Chapter1$ which python3

    /usr/bin/python3

    ~/Chapter1$ ps -a

    PID TTY          TIME CMD

    17 pts/0    00:00:00 mc

    60 pts/2    00:00:00 python3

    61 pts/1    00:00:00 python3

    80 pts/3    00:00:00 ps

    ```


    **注意** 操作系统控制硬件和进程/线程。从高层来看，它只是一个进程的集合，操作系统内核本身也是一个进程。

