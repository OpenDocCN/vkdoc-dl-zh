    ```\n\n## 内存转储\n\n进程内存可以保存到内存转储文件中。\n\n> *大量未经消化、关于问题或系统状态的信息，尤其是指那些以十六进制符文描述内存逐字节状态的转储内容。*\n\
    > \n> 埃里克·S·雷蒙德，《新黑客词典》第三版\n\n这些内存转储在 Linux 中也被称为*核心转储*。此外，还可以获取内核内存转储和物理内存转储（在\
    \ Windows 中称为*完整内存转储*）。图 1-5 展示了不同的内存转储类型。\n\n![](img/606465_1_En_1_Fig5_HTML.png)\n\
