    *To Ekaterina, Alexandra, Kirill, and Maria*


    # Introduction


    Python is the dominant language used in AI and machine learning with data and
    pipelines in cloud environments. Besides debugging Python code in popular IDEs,
    notebooks, and command-line debuggers, this book also includes coverage of native
    OS interfacing (Windows and Linux) necessary to understand, diagnose, and debug
    complex software issues.


    The book begins with an introduction to pattern-oriented software diagnostics
    and debugging processes that, before doing Python debugging, diagnose problems
    in various software artifacts such as memory dumps, traces, and logs. Next, it
    teaches various debugging patterns using Python case studies that model abnormal
    software behavior. Further, it covers Python debugging specifics in cloud native
    and machine learning environments. It concludes with how recent advances in AI/ML
    can help in Python debugging. The book also goes deep for case studies when there
    are environmental problems, crashes, hangs, resource spikes, leaks, and performance
    degradation. It includes tracing and logging besides memory dumps and their analysis
    using native `WinDbg` and `GDB` debuggers.


    This book is for those who wish to understand how Python debugging is and can
    be used to develop robust and reliable AI, machine learning, and cloud computing
    software. It uses a novel pattern-oriented approach to diagnosing and debugging
    abnormal software structure and behavior. Software developers, AI/ML engineers,
    researchers, data engineers, MLOps, DevOps, and anyone who uses Python will benefit
    from this book.


    Source Code: All source code used in this book can be downloaded from `github.com/Apress/Python-Debugging-for-AI-Machine-Learning-and-Cloud-Computing`.


    # About the Author About the Technical Reviewer


    # 1. Fundamental Vocabulary


    Debugging complex software issues in machine learning and cloud computing environments
    requires not only the knowledge of the Python language and its interpreter (or
    compiler), plus standard and external libraries, but also necessary and relevant
    execution environment and operating system internals. In this chapter, you will
    review some necessary fundamentals from software diagnostics and debugging languages
    to have the same base level of understanding for the following chapters. In this
    book, I assume that you are familiar with the Python language and its runtime
    environment.


    ## Process


    A Python script is interpreted by compiling it into bytecode and then executing
    it, or it can even be precompiled into an application program. In both cases,
    this interpreter file or the compiled application is an executable program (in
    Windows, it may have a `.exe` extension) that references some operating system
    libraries (`.dll` in Windows and `.so` in Linux). This application can be loaded
    into computer memory several times; each time, a separate process is created with
    its own resources and unique process ID (PID, also TGID), as shown in Figure [1-1](#606465_1_En_1_Chapter.xhtml#Fig1).
    The process may also have a parent process that created it, with a parent process
    ID (PPID).


    ![](images/606465_1_En_1_Chapter/606465_1_En_1_Fig1_HTML.png)


    A block diagram of the S D D and memory. A block with a file in S D D is connected
    to the blocks P I D 60 and 61 in the memory.


    **Figure 1-1** Two `python3` processes with two different PIDs


    To illustrate, I executed the code in Listing [1-1](#606465_1_En_1_Chapter.xhtml#PC1)
    on both Windows and Linux twice.


    ```

    import time

    def main():

    foo()

    def foo():

    bar()

    def bar():

    while True:

    time.sleep(1)

    if __name__ == "__main__":

    main()

    ```


    **Listing 1-1** A Simple Script to Model Running Python Code


    Figure [1-2](#606465_1_En_1_Chapter.xhtml#Fig2) shows two processes on Windows.


    ![](images/606465_1_En_1_Chapter/606465_1_En_1_Fig2_HTML.jpg)


    A screenshot of menu icons in the task manager. It displays a table with the headers
    name, P I D, status, C P U, memory, architecture, and description. The P I Ds
    of python 3 dot 11 dot e x e files are highlighted.


    **Figure 1-2** Two running `python3.11.exe` processes on Windows


    On Linux, you can also see two processes when you execute the same script in two
    separate terminals:


    ```

    ~/Chapter1$ which python3

    /usr/bin/python3

    ~/Chapter1$ ps -a

    PID TTY          TIME CMD

    17 pts/0    00:00:00 mc

    60 pts/2    00:00:00 python3

    61 pts/1    00:00:00 python3

    80 pts/3    00:00:00 ps

    ```


    **Note** The operating system controls hardware and processes/threads. From a
    high level, it is just a collection of processes with the operating system kernel
    as a process too.'
