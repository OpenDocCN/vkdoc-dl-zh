- fmt: "# Module\n\nLike the distinction between managed and unmanaged stack traces,\
    \ there is a difference between Python modules (which may correspond to files\
    \ in traceback) and native modules such as DLLs in Windows and `.so` files in\
    \ Linux, which are loaded into memory when you execute the Python compiler/interpreter.\
    \ For example, the following shared libraries are loaded in Linux for the simple\
    \ multithreaded example from Listing [1-2](#606465_1_En_1_Chapter.xhtml#PC3):\n\
