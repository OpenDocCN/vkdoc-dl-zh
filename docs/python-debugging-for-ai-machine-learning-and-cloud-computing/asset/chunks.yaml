  raw: '## Thread


    From an operating system perspective, a process is just a memory container for
    a Python interpreter, its code, and data. But the interpreter code needs to be
    executed, for example, to interpret the Python bytecode. This unit of execution
    is called a thread. A process may have several such units of execution (several
    threads, the so-called multithreaded application). Each thread has its own unique
    thread ID (TID, also LWP or SPID), as shown in Figure [1-3](#606465_1_En_1_Chapter.xhtml#Fig3).
    For example, one thread may process user interface events and others may do complex
    calculations in response to UI requests, thus making the UI responsive. On Windows,
    thread IDs are usually different from process IDs, but in Linux, the thread ID
    of the main thread is the same as the process ID for a single-threaded process.


    ![](images/606465_1_En_1_Chapter/606465_1_En_1_Fig3_HTML.png)


    A block diagram of the S D D and memory. A block with a file in S D D is connected
    to the blocks P I D 60 and 45 in the memory. P I D 60 has T I D 60\. P I D 45
    has T I D 45, 46, and 47.


    Figure 1-3


    Two python3 processes with different numbers of threads


    To model multithreading, I executed the code in Listing [1-2](#606465_1_En_1_Chapter.xhtml#PC3)
    on both Windows and Linux.


    ```

    import time

    import threading

    def thread_func():

    foo()

    def main():

    t1 = threading.Thread(target=thread_func)

    t1.start()

    t2 = threading.Thread(target=thread_func)

    t2.start()

    t1.join()

    t2.join()

    def foo():

    bar()

    def bar():

    while True:

    time.sleep(1)

    if __name__ == "__main__":

    main()

    Listing 1-2

    A Simple Script to Model Multiple Threads

    ```


    Figure [1-4](#606465_1_En_1_Chapter.xhtml#Fig4) shows that in Windows, you can
    see 11 threads at the beginning (this number later changes to 7 and then to 5).
    You see that the number of threads may be greater than expected.


    ![](images/606465_1_En_1_Chapter/606465_1_En_1_Fig4_HTML.jpg)


    A screenshot of menu icons in the task manager. It displays a table with the headers
    name, P I D, status, C P U, memory, architecture, and description. The total number
    of threads of python 3 dot 11 dot e x e files is 11, which is highlighted.


    Figure 1-4


    The number of threads in the running python3.11.exe process on Windows


    In Linux, you can see the expected number of threads – 3:


    ```

    ~/Chapter1$ ps -aT

    PID  SPID TTY          TIME CMD

    17    17 pts/0    00:00:00 mc

    45    45 pts/2    00:00:00 python3

    45    46 pts/2    00:00:00 python3

    45    47 pts/2    00:00:00 python3

    54    54 pts/1    00:00:00 ps

    ```


    ## Stack Trace (Backtrace, Traceback)


    I should distinguish Python source code tracebacks (which we call *managed stack
    traces*) and unmanaged (native) ones from the Python compiler and interpreter
    that compiles to and executes Python byte code. You will see this distinction
    in some chapters for several case studies and how to get both traces. But, for
    now, I will just show the difference. Listing [1-3](#606465_1_En_1_Chapter.xhtml#PC5)
    shows managed stack trace. Listing [1-4](#606465_1_En_1_Chapter.xhtml#PC6) shows
    the corresponding unmanaged Linux stack trace with debugging symbols (the most
    recent call first). Listing [1-5](#606465_1_En_1_Chapter.xhtml#PC7) shows the
    corresponding unmanaged Windows stack trace without debugging symbols (the most
    recent call first).


    ```

