- fmt: "# Stack Trace\n\n在 Python 参考实现（CPython）中，代码被编译为字节码，并由 Python 虚拟机执行。该虚拟机拥有自己的函数，这些函数会调用其他函数，包括操作系统\
    \ API。在任意时刻，这种函数调用的链条通常被称为堆栈跟踪（`stack trace`）或回溯（`backtrace`）。\n\n**Stack Trace**\
    \ 分析模式涉及从原生调试器（例如 Windows 上的 `WinDbg` 和 Linux 上的 `GDB`）或外部堆栈跟踪采样工具获取此类堆栈跟踪的方法。此模式不限于\
    \ Python 代码执行线程；它涵盖 Python 进程中的任何线程，并且可能包括来自内核空间的堆栈跟踪。\n\n# Runtime Thread\n\n\
    Python 进程可以是单线程或多线程的。Windows 进程通常比 Linux 进程拥有更多线程。**Runtime Thread** 分析模式涉及识别与\
    \ Python 代码执行（无论是脚本代码还是垃圾回收）直接相关的线程。\n\n# Managed Stack Trace\n\n**Managed** 这个名称最初来自\
    \ Microsoft .NET 托管代码，这些代码被编译为在语言运行时下运行的中间语言。Python 源代码也是如此。无论它是被解释还是直接编译，Python\
    \ 函数调用的链条构成了其自身的堆栈跟踪。\n\n**Managed Stack Trace** 分析模式涉及获取此类堆栈跟踪（`traceback`）的方法。通常，当异常发生时，您会从控制台输出或错误日志中捕获它们。然而，脚本可能包含代码，用于定期转储感兴趣方法中的回溯，或通过使用装饰器来实现。清单\
    \ [4-1](#606465_1_En_4_Chapter.xhtml#PC1) 展示了如何使用 `traceback` 模块和装饰器，在调用某个感兴趣的函数时转储堆栈跟踪（另一个示例见第\
    \ [6](#606465_1_En_4_Chapter.xhtml#PC1) 章）。\n\n```\n# managed-stack-trace.py\n\
    import traceback\ndef main():\nfoo()\ndef foo():\nbar()\ndef managed_stack_trace(func):\n\
    def call(*args, **kwargs):\ntraceback.print_stack()\nreturn func(*args, **kwargs)\n\
    return call\n@managed_stack_trace\ndef bar():\nprint(\"Hello Traceback!\")\nif\
    \ __name__ == \"__main__\":\nmain()\nListing 4-1\nA Script to Illustrate Traceback\
    \ Module Usage\n```\n\n当您调用 `bar` 函数时，会得到以下输出：\n\n```\n~/Python-Book/Chapter 4$\
    \ python3 managed-stack-trace.py\nFile \"managed-stack-trace.py\", line 22, in\
    \ \nmain()\nFile \"managed-stack-trace.py\", line 6, in main\nfoo()\nFile \"managed-stack-trace.py\"\
    , line 9, in foo\nbar()\nFile \"managed-stack-trace.py\", line 13, in call\ntraceback.print_stack()\n\
    Hello Traceback!\n```\n\n如果您不想打印装饰器堆栈跟踪帧（以粗体突出显示），您可以使用 `inspect` 模块来指定回溯的起始帧，如清单\
    \ [4-2](#606465_1_En_4_Chapter.xhtml#PC3) 所示。\n\n```\n# managed-stack-trace2.py\n\
    import traceback\nimport inspect\ndef main():\nfoo()\ndef foo():\nbar()\ndef managed_stack_trace(func):\n\
    def call(*args, **kwargs):\ntraceback.print_stack(f=inspect.currentframe().f_back)\n\
    return func(*args, **kwargs)\nreturn call\n@managed_stack_trace\ndef bar():\n\
    print(\"Hello Traceback!\")\nif __name__ == \"__main__\":\nmain()\nListing 4-2\n\
    A Script to Illustrate Inspecting Module Usage\n```\n\n您现在会得到改进后的输出：\n\n```\n\
    ~/Python-Book/Chapter 4$ python3 managed-stack-trace2.py\nFile \"managed-stack-trace2.py\"\
    , line 23, in \nmain()\nFile \"managed-stack-trace2.py\", line 7, in main\nfoo()\n\
    File \"managed-stack-trace2.py\", line 10, in foo\nbar()\nHello Traceback!\n```\n\
    \n一些原生调试器，例如 `GDB`，具有扩展功能，可以从核心内存转储或在进行实时原生调试时转储 Python 回溯。您将在本章末尾的案例研究中用到这样一个扩展。\n\
    \n# Source Stack Trace\n\nPython 的 **Managed Stack Traces** 与 **Source Stack Traces**\
    \ 是相同的，因为它们都包含文件名和行号。然而，当您从 Python 运行时获得 **Stack Traces** 时，只有使用 Python 解释器的调试版本，它们才可能包含源代码信息。\n\
    \n# Stack Trace Collection\n\n**Stack Trace Collection** 分析模式涉及从所有进程线程、多个进程或定期从同一进程获取堆栈跟踪的方法，无论这些线程是否是\
    \ **Runtime Threads**。\n\n此模式有不同的变体；例如，获取所有 **Managed Stack Traces** 的方法与获取所有非托管\
    \ **Stack Traces** 的方法不同。您将在本章末尾的案例研究中看到这一点。\n\n# Stack Trace Set\n\n**Stack Trace\
    \ Set** 分析模式涉及从 **Stack Trace Collection** 中获取具有某些属性的子集的方法，例如，具有某个公共函数，或者只是一组唯一的、不重复的堆栈跟踪。\n\
    \n# Exception Patterns\n\n调试中第二重要的分析模式组与异常相关：\n\n*   Managed Code Exception\n\
    *   Nested Exception\n*   Exception Stack Trace\n*   Software Exception\n\n##\
    \ Managed Code Exception\n\n**Managed** 这个名称也来自 Microsoft .NET，就像在 **Managed Stack\
    \ Trace** 分析模式中一样。这些是来自 Python 代码的异常，并且它们有关联的回溯。\n\n## Nested Exception\n\n**Nested\
    \ Exception** 分析模式处理的是处理异常的代码引发新异常的情况。当捕获到后一个异常时，其数据也会链接到原始异常，如清单 [4-3](#606465_1_En_4_Chapter.xhtml#PC5)\
    \ 所示。\n\n```\n# nested-exception.py\ndef main():\nfoo()\ndef foo():\nbar()\ndef\
    \ bar():\ntry:\nraise Exception(\"Inner Exception\")\nexcept Exception:\nraise\
    \ Exception(\"Outer Exception\")\nif __name__ == \"__main__\":\nmain()\nListing\
    \ 4-3\nA Script to Illustrate Nested Exceptions\n```\n\n当您运行该脚本时，会得到以下输出：\n\n\
    ```\n~/Python-Book/Chapter 4$ python3 nested-exception.py\nTraceback (most recent\
    \ call last):\nFile \"nested-exception.py\", line 11, in bar\nraise Exception(\"\
    Inner Exception\")\nException: Inner Exception\n```\n\n在处理上述异常期间，发生了另一个异常：\n\n\
    ```\nTraceback (most recent call last):\nFile \"nested-exception.py\", line 16,\
    \ in \nmain()\nFile \"nested-exception.py\", line 4, in main\nfoo()\nFile \"nested-exception.py\"\
    , line 7, in foo\nbar()\nFile \"nested-exception.py\", line 13, in bar\nraise\
    \ Exception(\"Outer Exception\")\nException: Outer Exception\n```\n\n## Exception\
    \ Stack Trace\n\n当您遇到异常时，您希望获取其 **Exception Stack Trace** 以分析函数调用的序列。一个 **Managed\
    \ Code Exception** 拥有一个 **Managed Stack Trace**，并且根据工件类型，可能可以提取出非托管的运行时 **Stack\
    \ Trace**。\n\n## Software Exception\n\n**Software Exception** 分析模式是一个通用的分析模式，描述了来自\
    \ Python 代码或 Python 运行时，以及来自与非 Python 模块和操作系统 API 库的接口的各种非硬件异常。"
  raw: "### Stack Trace\n\nIn Python reference implementation (CPython), code is compiled\
    \ into bytecode, and this bytecode is executed by the Python virtual machine.\
    \ This virtual machine has its own functions that call other functions, including\
    \ operating system APIs. The chain of such function calls at any given time is\
    \ usually called a stack trace or backtrace.\n\nThe **Stack Trace** analysis pattern\
    \ deals with methods to get such stack traces from the native debugger, for example,\
    \ WinDbg for Windows and GDB for Linux, or from external stack trace sampling\
    \ tools. This pattern is not limited to Python code execution thread; it covers\
    \ any thread from a Python process and may include a stack trace from the kernel\
    \ space.\n\n### Runtime Thread\n\nA Python process may be single-threaded or multithreaded.\
    \ Windows processes usually have more threads than Linux ones. The **Runtime Thread**\
    \ analysis pattern deals with the recognition of threads that are directly related\
    \ to Python code execution, be it script code or garbage collection.\n\n### Managed\
    \ Stack Trace\n\nThe name **Managed** originally comes from Microsoft .NET managed\
    \ code, which is compiled into an intermediate language that runs under language\
    \ runtime. The same happens with Python source code. Regardless of whether it\
    \ is interpreted or directly compiled, the chain of Python function calls constitutes\
    \ its own stack trace.\n\nThe **Manage Stack Trace** analysis pattern deals with\
    \ methods to get such stack traces (tracebacks). Usually, you capture them from\
    \ console output or error logs when exceptions happen. However, scripts may have\
    \ code added to periodically dump tracebacks in methods of interest or by using\
    \ decorators. Listing [4-1](#606465_1_En_4_Chapter.xhtml#PC1) shows how to use\
    \ the `traceback` module and decorators to dump a stack trace when some function\
    \ of interest is used (see Chapter [6](#606465_1_En_6_Chapter.xhtml) for another\
    \ example).\n\n```\n# managed-stack-trace.py\nimport traceback\ndef main():\n\
    foo()\ndef foo():\nbar()\ndef managed_stack_trace(func):\ndef call(*args, **kwargs):\n\
    traceback.print_stack()\nreturn func(*args, **kwargs)\nreturn call\n@managed_stack_trace\n\
    def bar():\nprint(\"Hello Traceback!\")\nif __name__ == \"__main__\":\nmain()\n\
    Listing 4-1\nA Script to Illustrate Traceback Module Usage\n```\n\nYou get the\
    \ following output when you call the `bar` function:\n\n```\n~/Python-Book/Chapter\
    \ 4$ python3 managed-stack-trace.py\nFile \"managed-stack-trace.py\", line 22,\
    \ in \nmain()\nFile \"managed-stack-trace.py\", line 6, in main\nfoo()\nFile \"\
    managed-stack-trace.py\", line 9, in foo\nbar()\nFile \"managed-stack-trace.py\"\
    , line 13, in call\ntraceback.print_stack()\nHello Traceback!\n```\n\nIf you don’t\
    \ want to print the decorator stack trace frame (highlighted in bold), you can\
    \ use the `inspect` module to specify the starting frame for the traceback, as\
    \ shown in Listing [4-2](#606465_1_En_4_Chapter.xhtml#PC3).\n\n```\n# managed-stack-trace2.py\n\
    import traceback\nimport inspect\ndef main():\nfoo()\ndef foo():\nbar()\ndef managed_stack_trace(func):\n\
    def call(*args, **kwargs):\ntraceback.print_stack(f=inspect.currentframe().f_back)\n\
    return func(*args, **kwargs)\nreturn call\n@managed_stack_trace\ndef bar():\n\
    print(\"Hello Traceback!\")\nif __name__ == \"__main__\":\nmain()\nListing 4-2\n\
    A Script to Illustrate Inspecting Module Usage\n```\n\nYou now get the improved\
    \ output:\n\n```\n~/Python-Book/Chapter 4$ python3 managed-stack-trace2.py\nFile\
    \ \"managed-stack-trace2.py\", line 23, in \nmain()\nFile \"managed-stack-trace2.py\"\
    , line 7, in main\nfoo()\nFile \"managed-stack-trace2.py\", line 10, in foo\n\
    bar()\nHello Traceback!\n```\n\nSome native debuggers, such as GDB, have extensions\
    \ to dump Python tracebacks from core memory dumps or when doing live native debugging.\
    \ You will use one such extension in the case study at the end of this chapter.\n\
    \n### Source Stack Trace\n\nPython **Managed Stack Traces** are identical to **Source\
    \ Stack Traces** since they include file names and line numbers. However, when\
    \ you have **Stack Traces** from Python runtime, they may only have source code\
    \ information if you use a debug build of Python interpreter.\n\n### Stack Trace\
    \ Collection\n\nThe **Stack Trace Collection** analysis pattern deals with methods\
    \ to get stack traces from all process threads or from several processes, or from\
    \ the same process periodically, irrespective of whether these threads are **Runtime\
    \ Threads** or not.\n\nThis pattern has different variants; for example, methods\
    \ for getting all **Managed Stack Traces** are different from methods for getting\
    \ all unmanaged **Stack Traces**. You will see this in the case study at the end\
    \ of this chapter.\n\n### Stack Trace Set\n\nThe **Stack Trace Set** analysis\
    \ pattern deals with methods to get a subset having some property from **Stack\
    \ Trace Collection**, for example, having some common function or just a set of\
    \ unique non-duplicated stack traces.\n\n## Exception Patterns\n\nThe second group\
    \ of the most important analysis patterns for debugging is exception related:\n\
    \n*   Managed Code Exception\n\n*   Nested Exception\n\n*   Exception Stack Trace\n\
    \n*   Software Exception\n\n### Managed Code Exception\n\nThe name **Managed**\
    \ also comes from Microsoft .NET, like in the **Managed Stack Trace** analysis\
    \ pattern. These are exceptions from Python code, and they have associated tracebacks.\n\
    \n### Nested Exception\n\nThe **Nested Exception** analysis pattern deals with\
    \ cases when the code processing an exception raises a new exception. When the\
    \ latter exception is caught, its data is also linked to the original exception,\
    \ as shown in Listing [4-3](#606465_1_En_4_Chapter.xhtml#PC5).\n\n```\n# nested-exception.py\n\
    def main():\nfoo()\ndef foo():\nbar()\ndef bar():\ntry:\nraise Exception(\"Inner\
    \ Exception\")\nexcept Exception:\nraise Exception(\"Outer Exception\")\nif __name__\
    \ == \"__main__\":\nmain()\nListing 4-3\nA Script to Illustrate Nested Exceptions\n\
    ```\n\nWhen you run the script, you get the following output:\n\n```\n~/Python-Book/Chapter\
    \ 4$ python3 nested-exception.py\nTraceback (most recent call last):\nFile \"\
    nested-exception.py\", line 11, in bar\nraise Exception(\"Inner Exception\")\n\
    Exception: Inner Exception\n```\n\nDuring the handling of the above exception,\
    \ another exception occurred:\n\n```\nTraceback (most recent call last):\nFile\
    \ \"nested-exception.py\", line 16, in \nmain()\nFile \"nested-exception.py\"\
    , line 4, in main\nfoo()\nFile \"nested-exception.py\", line 7, in foo\nbar()\n\
    File \"nested-exception.py\", line 13, in bar\nraise Exception(\"Outer Exception\"\
    )\nException: Outer Exception\n```\n\n### Exception Stack Trace\n\nWhen you have\
    \ an exception, you want to get its **Exception Stack Trace** to analyze the sequence\
    \ of function calls. A **Managed Code Exception** has a **Managed Stack Trace,**\
    \ and depending on an artifact, it may be possible to extract an unmanaged runtime\
    \ **Stack Trace**.\n\n### Software Exception\n\nThe **Software Exception** analysis\
    \ pattern is a general analysis pattern describing all sorts of non-hardware exceptions\
    \ coming from either Python code or the Python runtime and from interfaces with\
    \ non-Python modules and operating system API libraries."
  trans: "\n# 堆栈跟踪\n\n在 Python 参考实现（CPython）中，代码被编译为字节码，并由 Python 虚拟机执行。该虚拟机拥有自己的函数，这些函数会调用其他函数，包括操作系统\
    \ API。在任意时刻，这种函数调用的链条通常被称为堆栈跟踪（`stack trace`）或回溯（`backtrace`）。\n\n**堆栈跟踪** 分析模式涉及从原生调试器（例如\
    \ Windows 上的 `WinDbg` 和 Linux 上的 `GDB`）或外部堆栈跟踪采样工具获取此类堆栈跟踪的方法。此模式不限于 Python 代码执行线程；它涵盖\
    \ Python 进程中的任何线程，并且可能包括来自内核空间的堆栈跟踪。\n\n# 运行时线程\n\nPython 进程可以是单线程或多线程的。Windows\
    \ 进程通常比 Linux 进程拥有更多线程。**运行时线程** 分析模式涉及识别与 Python 代码执行（无论是脚本代码还是垃圾回收）直接相关的线程。\n\
    \n# 托管堆栈跟踪\n\n**托管** 这个名称最初来自 Microsoft .NET 托管代码，这些代码被编译为在语言运行时下运行的中间语言。Python\
    \ 源代码也是如此。无论它是被解释还是直接编译，Python 函数调用的链条构成了其自身的堆栈跟踪。\n\n**托管堆栈跟踪** 分析模式涉及获取此类堆栈跟踪（`traceback`）的方法。通常，当异常发生时，您会从控制台输出或错误日志中捕获它们。然而，脚本可能包含代码，用于定期转储感兴趣方法中的回溯，或通过使用装饰器来实现。清单\
    \ 4-1 展示了如何使用 `traceback` 模块和装饰器，在调用某个感兴趣的函数时转储堆栈跟踪（另一个示例见第 6 章）。\n\n```\n# managed-stack-trace.py\n\
    import traceback\ndef main():\nfoo()\ndef foo():\nbar()\ndef managed_stack_trace(func):\n\
    def call(*args, **kwargs):\ntraceback.print_stack()\nreturn func(*args, **kwargs)\n\
    return call\n@managed_stack_trace\ndef bar():\nprint(\"Hello Traceback!\")\nif\
    \ __name__ == \"__main__\":\nmain()\n清单 4-1\n一个用于演示 Traceback 模块用法的脚本\n```\n\n\
    当您调用 `bar` 函数时，会得到以下输出：\n\n```\n~/Python-Book/Chapter 4$ python3 managed-stack-trace.py\n\
    File \"managed-stack-trace.py\", line 22, in \nmain()\nFile \"managed-stack-trace.py\"\
    , line 6, in main\nfoo()\nFile \"managed-stack-trace.py\", line 9, in foo\nbar()\n\
    File \"managed-stack-trace.py\", line 13, in call\ntraceback.print_stack()\nHello\
    \ Traceback!\n```\n\n如果您不想打印装饰器堆栈跟踪帧（以粗体突出显示），您可以使用 `inspect` 模块来指定回溯的起始帧，如清单\
    \ 4-2 所示。\n\n```\n# managed-stack-trace2.py\nimport traceback\nimport inspect\n\
    def main():\nfoo()\ndef foo():\nbar()\ndef managed_stack_trace(func):\ndef call(*args,\
    \ **kwargs):\ntraceback.print_stack(f=inspect.currentframe().f_back)\nreturn func(*args,\
    \ **kwargs)\nreturn call\n@managed_stack_trace\ndef bar():\nprint(\"Hello Traceback!\"\
    )\nif __name__ == \"__main__\":\nmain()\n清单 4-2\n一个用于演示 Inspect 模块用法的脚本\n```\n\
    \n您现在会得到改进后的输出：\n\n```\n~/Python-Book/Chapter 4$ python3 managed-stack-trace2.py\n\
    File \"managed-stack-trace2.py\", line 23, in \nmain()\nFile \"managed-stack-trace2.py\"\
    , line 7, in main\nfoo()\nFile \"managed-stack-trace2.py\", line 10, in foo\n\
    bar()\nHello Traceback!\n```\n\n一些原生调试器，例如 `GDB`，具有扩展功能，可以从核心内存转储或在进行实时原生调试时转储\
    \ Python 回溯。您将在本章末尾的案例研究中用到这样一个扩展。\n\n# 源代码堆栈跟踪\n\nPython 的**托管堆栈跟踪**与**源代码堆栈跟踪**是相同的，因为它们都包含文件名和行号。然而，当您从\
    \ Python 运行时获得**堆栈跟踪**时，只有使用 Python 解释器的调试版本，它们才可能包含源代码信息。\n\n# 堆栈跟踪收集\n\n**堆栈跟踪收集**分析模式涉及从所有进程线程、多个进程或定期从同一进程获取堆栈跟踪的方法，无论这些线程是否是**运行时线程**。\n\
    \n此模式有不同的变体；例如，获取所有**托管堆栈跟踪**的方法与获取所有非托管**堆栈跟踪**的方法不同。您将在本章末尾的案例研究中看到这一点。\n\n\
    # 堆栈跟踪集合\n\n**堆栈跟踪集合**分析模式涉及从**堆栈跟踪收集**中获取具有某些属性的子集的方法，例如，具有某个公共函数，或者只是一组唯一的、不重复的堆栈跟踪。\n\
    \n# 异常模式\n\n调试中第二重要的分析模式组与异常相关：\n\n*   托管代码异常\n*   嵌套异常\n*   异常堆栈跟踪\n*   软件异常\n\
    \n## 托管代码异常\n\n**托管**这个名称也来自 Microsoft .NET，就像在**托管堆栈跟踪**分析模式中一样。这些是来自 Python\
    \ 代码的异常，并且它们有关联的回溯。\n\n## 嵌套异常\n\n**嵌套异常**分析模式处理的是处理异常的代码引发新异常的情况。当捕获到后一个异常时，其数据也会链接到原始异常，如清单\
    \ 4-3 所示。\n\n```\n# nested-exception.py\ndef main():\nfoo()\ndef foo():\nbar()\n\
    def bar():\ntry:\nraise Exception(\"Inner Exception\")\nexcept Exception:\nraise\
    \ Exception(\"Outer Exception\")\nif __name__ == \"__main__\":\nmain()\n清单 4-3\n\
    一个用于演示嵌套异常的脚本\n```\n\n当您运行该脚本时，会得到以下输出：\n\n```\n~/Python-Book/Chapter 4$ python3\
    \ nested-exception.py\nTraceback (most recent call last):\nFile \"nested-exception.py\"\
    , line 11, in bar\nraise Exception(\"Inner Exception\")\nException: Inner Exception\n\
    ```\n\n在处理上述异常期间，发生了另一个异常：\n\n```\nTraceback (most recent call last):\nFile \"\
    nested-exception.py\", line 16, in \nmain()\nFile \"nested-exception.py\", line\
    \ 4, in main\nfoo()\nFile \"nested-exception.py\", line 7, in foo\nbar()\nFile\
    \ \"nested-exception.py\", line 13, in bar\nraise Exception(\"Outer Exception\"\
    )\nException: Outer Exception\n```\n\n## 异常堆栈跟踪\n\n当您遇到异常时，您希望获取其**异常堆栈跟踪**以分析函数调用的序列。一个**托管代码异常**拥有一个**托管堆栈跟踪**，并且根据工件类型，可能可以提取出非托管的运行时**堆栈跟踪**。\n\
    \n## 软件异常\n\n**软件异常**分析模式是一个通用的分析模式，描述了来自 Python 代码或 Python 运行时，以及来自与非 Python\
    \ 模块和操作系统 API 库的接口的各种非硬件异常。\n"
- fmt: '# Module Patterns


    When you talk about modules, you need to distinguish between Python modules and
    traditional operating system modules. A Python module is either a single file
    or a collection of files in a package. An operating system module is usually a
    shared library exporting an API and dynamically linked to an executable, for example
    `.DLL` files (Windows) or `.so` files (Linux).


    ## Module Collection


    The **Module Collection** analysis pattern describes how to get all imported modules
    for a Python program at some point in time, such as at the time of the exception.
    Listing [4-4](#606465_1_En_4_Chapter.xhtml#PC8) shows how this can be done.


    ```

    # module-collection.py

    import math

    import mymodule

    def main():

    foo()

    def foo():

    bar()

    def bar():

    mymodule.myfunc()

    math.sqrt(-1)

    if __name__ == "__main__":

    try:

    main()

    except:

    import sys

    for name in sys.modules:

    print(f"{sys.modules[name]}")

    # mymodule.py

    import random

    def myfunc():

    random.seed()

    Listing 4-4

    A Script to Illustrate Module Collection

    ```


    If you run the script, you get the list of imported modules including modules
    imported by imported modules and their location:


    ```

    ~/Python-Book/Chapter 4$ python3 module-collection.py

    ```


    For an executable program, a module collection is usually a collection of all
    loaded DLLs or shared libraries. You will learn how to get this information when
    you analyze problems of interfacing with non-Python modules and an operating system
    using debuggers such as `WinDbg` and `GDB`.


    ## Not My Version


    The name of this pattern originates from the `NotMyFault`^([^(27)](#fn27)) Sysinternals
    tool for modeling crashes, hangs, and leaks on Windows platforms. When looking
    at **Module Collection** information, you may spot module or package versions,
    not the ones you intended.


    ## Exception Module


    A **Managed Code Exception** happens in a function from some **Exception Module**.
    The analysis of the exception usually starts with that module’s function.


    ## Origin Module


    After looking at the **Exception Module**, let’s move down the call chain of functions
    from **Stack Trace** or **Managed Stack Trace** to find out the possible **Origin
    Module** where the problem possibly could have originated.


    # Thread Patterns


    The large group of debugging analysis patterns is about execution threads. Stack
    traces are usually related to some thread. Most Python programs are single-threaded
    from a Python language source code perspective, but other threads may be created
    in the same Python process by either an operating system or third-party libraries.


    ## Spiking Thread


    The **Spiking Thread** analysis pattern deals with problem cases when there is
    some significant CPU consumption and you want to identify the relevant thread
    and its **Stack Trace**. **Paratext** may help here with additional operating
    system data.


    ## Active Thread


    If you look at some random process and one of its threads, you will see it sleeping
    or waiting. This is because there are dozens (or hundreds on multiuser systems)
    of processes and hundreds (or thousands on multiuser systems) of threads (especially
    on Windows) and only a few CPUs for simultaneous thread execution. Therefore,
    the presence of an **Active Thread** is something unusual that may trigger further
    investigation. Such a thread may not be a **Spiking Thread** and may be a temporary
    activity.


    ## Blocked Thread


    Most threads are not **Active Threads**, and this should be normal. However, some
    threads may get your attention as **Blocked Threads**, waiting for interprocess
    communication, synchronization locks, file, and socket I/O. You will see some
    examples in later chapters when you look at problems related to interfacing with
    an operating system.


    ## Blocking Module


    This analysis pattern should belong to the module patterns category, but I mention
    it here because after identifying a **Blocked Thread** and looking at its (**Managed**)
    **Stack Trace**, you can find out the **Blocking Module** where the blocking code
    is located and even find out the **Origin Module** where all blocking behavior
    originated.


    # Synchronization Patterns


    This group of patterns is about threads waiting for synchronization objects such
    as locks, mutexes, events, and critical sections.


    ## Wait Chain


    A **Blocked Thread** may wait for another thread or a synchronization object owned
    by some other thread, and that thread may also wait. This waiting activity constitutes
    the so-called **Wait Chain**.


    ## Deadlock


    When a **Wait Chain** is cyclic, we call it a **Deadlock**. The simplest case
    is when two processes or threads are waiting for each other: thread #1 holds a
    lock and is waiting for another lock that is held by thread #2, which is waiting
    for the lock held by thread #1.


    ## Livelock


    A **Livelock** is a sort of a **Deadlock**, but threads wait only periodically,
    perhaps due to small wait timeouts or just being **Active Threads**.


    # Memory Consumption Patterns


    Finally, let’s look at memory consumption. There are different types of memory:
    process heap, virtual memory, physical memory, and kernel pools.


    ## Memory Leak


    The **Memory Leak** analysis pattern deals with diagnosing the problem of gradually
    increasing memory consumption. Here periodic memory dumps, tracing, and logging
    may help to identify memory usage patterns such as **Stack Traces** of allocation,
    deallocation, and their relative ratio. You will debug a memory leak example in
    Chapter [5](#606465_1_En_5_Chapter.xhtml).


    ## Handle Leak


    A handle (or descriptor or ID) is a numeric representation of some resource, be
    it a process or thread, file, or operating system resource. The code is supposed
    to close it after usage, but it doesn’t do so due to some code defect. **Handle
    Leaks** are closely related to **Memory Leaks** because handles refer to structures
    in memory, and forgetting to close does not free or release the associated dynamic
    memory (usually in kernel space).'
