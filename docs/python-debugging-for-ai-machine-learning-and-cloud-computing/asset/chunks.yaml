- fmt: '# Debugging Process and Patterns


    The debugging process mirrors the development process and development patterns,
    as shown in Figure [2-3](#606465_1_En_2_Chapter.xhtml#Fig3). Let’s look at each
    stage.


    ![](images/606465_1_En_2_Chapter/606465_1_En_2_Fig3_HTML.png)


    A stacked block diagram represents the pattern-oriented debugging process. The
    blocks are elementary diagnostics, debugging analysis, debugging architecture,
    debugging design, debugging implementation, debugging usage, and debugging presentation
    patterns. A downward arrow is drawn from top to bottom.


    Figure 2-3


    Stages of the pattern-oriented debugging process


    ## Elementary Diagnostics Patterns


    Elementary software diagnostics patterns got inspiration from the *Elemental Design
    Patterns* book title^([^(11)](#fn11)), but they are different and correspond to
    requirements from the software development process. These are what software users
    experience, and the requirement is to eliminate such experiences via debugging.


    ## Debugging Analysis Patterns


    You need to diagnose the right problem before doing any debugging. Debugging analysis
    patterns correspond to software diagnostics. For example, in memory dump analysis,
    there are analysis patterns such as `Managed Code Exception`, `Managed Stack Trace`,
    `Stack Overflow`, `Deadlock`, `Spiking Thread`, and many others. There are hundreds
    of them^([^(12)](#fn12)). Trace and log analysis patterns such as `Thread of Activity`,
    `Discontinuity`, `Time Delta`, `Counter Value`, `State Dump`, and many more are
    also included in this category^([^(13)](#fn13)). We look at the most common of
    them in Chapter [4](#606465_1_En_4_Chapter.xhtml).


    ## Debugging Architecture Patterns


    Debugging architecture patterns are partly inspired by POSA^([^(14)](#fn14)),
    for example, `Debug Event Subscription/Notification`. They are more high-level
    than design patterns that may differ for specific technologies, for example, object-oriented
    and functional.


    ## Debugging Design Patterns


    Debugging design patterns are partly inspired by the GoF design pattern approach^([^(15)](#fn15)),
    for example, `Punctuated Execution`.


    Both debugging architecture and debugging design patterns pertain to the development
    of debugging tools and to actual debugging architectures and designs as reusable
    solutions to common recurrent debugging problems in specific contexts.


    ## Debugging Implementation Patterns


    Debugging implementation patterns are patterns of debugging strategies and core
    debugging techniques, such as `Break-in`, `Code Breakpoint`, `Data Breakpoint`,
    and others covered in subsequent chapters in Python debugging case studies.


    ## Debugging Usage Patterns


    Debugging usage patterns are about debugging pragmatics of reusable debugging
    scenarios: how, what, when, and where to use the previous debugging pattern categories,
    such as using data breakpoints in user (process) and kernel space debugging.


    ## Debugging Presentation Patterns


    Debugging presentation patterns are about user interface and interaction design^([^(16)](#fn16)),
    for example, watch dialog. These patterns are also related to debugging usage.
    We cover such patterns in the chapter devoted to existing Python IDEs and their
    usage for Python debugging.


    In our opinion, recent Python debugging books^([^(17)](#fn17)) correspond to debugging
    implementation, usage, and presentation. Automated debugging^([^(18)](#fn18))
    belongs to debugging architecture and design. In this book, we extract some of
    this knowledge into corresponding debugging pattern languages, combine them with
    pattern-oriented software diagnostics, and form a novel pattern-oriented Python
    debugging approach in the context of machine learning and cloud computing environments.


    ## Summary


    In this chapter, you learned about the pattern-oriented debugging process, its
    stages, and corresponding pattern languages. The subsequent chapters provide examples
    of debugging patterns from each category from a Python programming perspective.
    The next chapter is about the first stage and its patterns: elementary diagnostics
    patterns.


