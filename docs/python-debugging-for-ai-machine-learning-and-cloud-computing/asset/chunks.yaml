    \ Python 与操作系统交互的章节中，你将看到更多调试分析模式。下一章将探讨 Python 命令行调试器 `pdb` 背景下的调试实现模式。\n\n脚注\
    \ 1   2   3   4   5   6   7\n\n# 5. 调试实现模式\n\n在上一章中，我在几个 Python 案例研究的背景下介绍了特定的调试分析模式。在本章中，你将探讨\
    \ Python 调试器 `pdb` 背景下的特定调试实现模式。（图 5-1）。\n\n![](img/606465_1_En_5_Fig1_HTML.png)\n\
    \n一个面向模式的调试过程的堆叠框图。从上到下的模块依次是：基础诊断、调试分析、调试架构、调试设计、调试实现、调试使用和调试呈现模式。其中“调试实现”被高亮显示。\n\
    \n图 5-1\n\n面向模式的调试过程与调试实现模式\n\n我将跳过架构和设计调试模式，因为对于简单情况，你可能不需要显式地考虑它们。相比之下，实现一个简单的命令行工具或脚本时，你通常不会显式地使用一个繁重的开发过程。在这种情况下，架构和设计决策已经是隐式的，例如，在编写命令行工具的需求中就已隐含。此外，在学习编程时，最好从一些具体有用的实现示例开始。因此，当我积累足够的案例研究并看到一些非平凡问题时，我才会讨论调试架构和设计模式。\n\
    \n## 模式概述\n\n我现在介绍在 Python 调试器 `pdb`^(²⁹) 背景下的调试实现模式语言。这种模式语言并非该调试器所特有；同样的模式语言也适用于许多其他命令行^(³⁰)和\
    \ IDE 的 Python 调试器，甚至适用于像 `GDB` 和 `WinDbg` 这样的原生操作系统调试器。当然，为了实现这些模式，调试器的命令会有所不同。\n"
- fmt: "### Break-Ins\n\nOne of the basic operations of debugging is breaking the\
    \ execution of a process or thread to inspect its process or thread state. In\
    \ the case of Python code, this **Break-in** can be done either internally by\
    \ putting the `breakpoint()` function inside the code or externally via executing\
    \ the script under the debugger and then breaking in via a keyboard interrupt\
    \ (`^C`) or exception. Some debuggers, such as GDB, allow external **Break-ins**\
    \ after the program starts independently.\n\nTo illustrate the first way, execute\
    \ the code in Listing [5-1](#606465_1_En_5_Chapter.xhtml#PC1) on Linux (for Windows,\
    \ you should get similar results).\n\n```\n# test-breakpoint.py\ndef main():\n\
    \    foo()\ndef foo():\n    bar()\ndef bar():\n    while True:\n        breakpoint()\n\
    if __name__ == \"__main__\":\n    main()\nListing 5-1\nA Simple Script to Test\
    \ an Internal Break-in\n```\n\nAfter the **Break-in**, you can inspect the managed\
    \ stack trace (`where` command or `w`) and resume execution (`continue` command\
    \ or `c`). The `quit` command (or `q`) exits the debugger and aborts the script.\
    \ There are other commands you will learn when you look at other debugging implementation\
    \ patterns.\n\n```\n~/Chapter5$ python3 test-breakpoint.py\n> ~/Chapter5/test-breakpoint.py(9)bar()\n\
    -> breakpoint()\n(Pdb) w\n  ~/Chapter5/test-breakpoint.py(12)<module>()\n-> main()\n\
    \  ~/Chapter5/test-breakpoint.py(2)main()\n-> foo()\n  ~/Chapter5/test-breakpoint.py(5)foo()\n\
    -> bar()\n> ~/Chapter5/test-breakpoint.py(9)bar()\n-> breakpoint()\n(Pdb) c\n\
    > ~/Chapter5/test-breakpoint.py(9)bar()\n-> breakpoint()\n(Pdb) q\nTraceback (most\
    \ recent call last):\n  File \"test-breakpoint.py\", line 12, in <module>\n  \
    \  main()\n  File \"test-breakpoint.py\", line 2, in main\n    foo()\n  File \"\
    test-breakpoint.py\", line 5, in foo\n    bar()\n  File \"test-breakpoint.py\"\
    , line 9, in bar\n    breakpoint()\n  File \"test-breakpoint.py\", line 9, in\
    \ bar\n    breakpoint()\n  File \"/usr/lib/python3.7/bdb.py\", line 88, in trace_dispatch\n\
    \    return self.dispatch_line(frame)\n  File \"/usr/lib/python3.7/bdb.py\", line\
    \ 113, in dispatch_line\n    if self.quitting: raise BdbQuit\nbdb.BdbQuit\n~/Chapter5$\n\
    ```\n\nFor the external **Break-in**, you specify the `pdb` module when you execute\
    \ the script. To illustrate this way, execute the code in Listing [5-2](#606465_1_En_5_Chapter.xhtml#PC3)\
    \ on Linux (for Windows, you should get similar results).\n\n```\n# test-pdb.py\n\
    import time\nclass cls:\n    def __init__(self, field1, field2):\n        self.field1\
    \ = field1\n        self.field2 = field2\ndef main():\n    func = \"main\"\n \
    \   while True:\n        foo()\n        time.sleep(1)\ndef foo():\n    func =\
    \ \"foo\"\n    bar(\"argument\")\ndef bar(arg):\n    func = \"bar\"\n    obj =\
    \ [1, 2]\n    obj = cls(1, 2)\nif __name__ == \"__main__\":\n    main()\nListing\
    \ 5-2\nA Simple Script to Test an External Break-In and Other Patterns\n```\n\n\
    The debugger stops before executing the first script line. You can `continue`\
    \ execution and do **Break-in** at any time using `^C` (or by sending the `SIGINT`\
    \ signal using the `kill` command from a separate terminal window).\n\n```\n~/Chapter5$\
    \ python3 -m pdb test-pdb.py\n> ~/Chapter5/test-pdb.py(1)<module>()\n-> import\
    \ time\n(Pdb) c\n^C\nProgram interrupted. (Use 'cont' to resume).\n> ~/Chapter5/test-pdb.py(11)main()\n\
    -> foo()\n(Pdb) w\n  /usr/lib/python3.7/runpy.py(193)_run_module_as_main()\n->\
    \ \"__main__\", mod_spec)\n  /usr/lib/python3.7/runpy.py(85)_run_code()\n-> exec(code,\
    \ run_globals)\n  /usr/lib/python3.7/pdb.py(1728)<module>()\n-> pdb.main()\n \
    \ /usr/lib/python3.7/pdb.py(1701)main()\n-> pdb._runscript(mainpyfile)\n  /usr/lib/python3.7/pdb.py(1570)_runscript()\n\
    -> self.run(statement)\n  /usr/lib/python3.7/bdb.py(585)run()\n-> exec(cmd, globals,\
    \ locals)\n  <string>(1)<module>()\n  ~/Chapter5/test-pdb.py(1)<module>()\n->\
    \ import time\n> ~/Chapter5/test-pdb.py(11)main()\n-> foo()\n(Pdb)\n```\n\nLet’s\
    \ continue exploring other `pdb` commands in the pattern examples below.\n\n###\
    \ Code Breakpoint\n\nYou don’t need to pollute your code with `breakpoint()` function\
    \ calls each time you want to do **Break-in** at different locations in the script.\
    \ After the initial **Break-in**, you can use the `break` (`b`) command to put\
    \ **Code Breakpoint** at `filename:lineno` or a function name. For example, let’s\
    \ put such a breakpoint whenever the `bar` function is called:\n\n```\n(Pdb) b\
    \ bar\nBreakpoint 1 at ~/Chapter5/test-pdb.py:18\n(Pdb) c\n> ~/Chapter5/test-pdb.py(19)bar()\n\
    -> func = \"bar\"\n(Pdb) w\n  /usr/lib/python3.7/runpy.py(193)_run_module_as_main()\n\
    -> \"__main__\", mod_spec)\n  /usr/lib/python3.7/runpy.py(85)_run_code()\n-> exec(code,\
    \ run_globals)\n  /usr/lib/python3.7/pdb.py(1728)<module>()\n-> pdb.main()\n \
    \ /usr/lib/python3.7/pdb.py(1701)main()\n-> pdb._runscript(mainpyfile)\n  /usr/lib/python3.7/pdb.py(1570)_runscript()\n\
    -> self.run(statement)\n  /usr/lib/python3.7/bdb.py(585)run()\n-> exec(cmd, globals,\
    \ locals)\n  <string>(1)<module>()\n  ~/Chapter5/test-pdb.py(1)<module>()\n->\
    \ import time\n  ~/Chapter5/test-pdb.py(11)main()\n-> foo()\n  ~/Chapter5/test-pdb.py(16)foo()\n\
    -> bar(\"argument\")\n> ~/Chapter5/test-pdb.py(19)bar()\n-> func = \"bar\"\n```\n\
    \nThe arrow points to the next line to be executed. The `breakpoint` command without\
    \ arguments lists available breakpoints, their numbers, and their information.\n\
    \n```\n(Pdb) b\nNum Type         Disp Enb   Where\n1   breakpoint   keep yes \
    \  at ~/Chapter5/test-pdb.py:18\n\tbreakpoint already hit 1 time\n```\n\nThen\
    \ you can `continue` until any of the breakpoints are hit again. The `clear` (`cl`)\
    \ command removes the existing breakpoint numbers. If you need a breakpoint that\
    \ is executed only once, use the `tbreak` command instead of `break`. You can\
    \ also `enable` and `disable` breakpoints by their numbers. For high-frequency\
    \ breakpoints, you can also specify conditions to trigger. I provide such an example\
    \ in the case study at the end of this chapter.\n\n### Code Trace\n\nOnce you\
    \ are inside some function, either via a **Break-in** or **Code Breakpoint**,\
    \ you can start executing lines one by one using the `step` (`s`) command. If\
    \ you want to treat the function call as one line and not go inside to execute\
    \ line by line, you should use the `next` (`n`) command. If you accidentally step\
    \ into a function, you can continue using the `return` (`r`) command. If you want\
    \ to skip tracing some code lines, you can use the `until` (`unt`) command and\
    \ specify the line number. If you even want to skip their execution, you can use\
    \ the `jump` (`j`) command and specify the target line number.\n\n```\n(Pdb) c\n\
    > ~/Chapter5/test-pdb.py(19)bar()\n-> func = \"bar\"\n(Pdb) s\n> ~/Chapter5/test-pdb.py(20)bar()\n\
    -> obj = [1, 2]\n(Pdb) s\n> ~/Chapter5/test-pdb.py(21)bar()\n-> obj = cls(1, 2)\n\
    (Pdb) s\n--Call--\n> ~/Chapter5/test-pdb.py(4)__init__()\n-> def __init__(self,\
    \ field1, field2):\n(Pdb) r\n--Return--\n> ~/Chapter5/test-pdb.py(6)__init__()->None\n\
    -> self.field2 = field2\n(Pdb) r\n--Return--\n> ~/Chapter5/test-pdb.py(21)bar()->None\n\
    -> obj = cls(1, 2)\n(Pdb) s\n--Return--\n> ~/Chapter5/test-pdb.py(16)foo()->None\n\
    -> bar(\"argument\")\n(Pdb) s\n> ~/Chapter5/test-pdb.py(12)main()\n-> time.sleep(1)\n\
    (Pdb) c\n> ~/Chapter5/test-pdb.py(19)bar()\n-> func = \"bar\"\n(Pdb) n\n> ~/Chapter5/test-pdb.py(20)bar()\n\
    -> obj = [1, 2]\n(Pdb) n\n> ~/Chapter5/test-pdb.py(21)bar()\n-> obj = cls(1, 2)\n\
    (Pdb) n\n--Return--\n> ~/Chapter5/test-pdb.py(21)bar()->None\n-> obj = cls(1,\
    \ 2)\n(Pdb) n\n--Return--\n> ~/Chapter5/test-pdb.py(16)foo()->None\n-> bar(\"\
    argument\")\n(Pdb) n\n> ~/Chapter5/test-pdb.py(12)main()\n-> time.sleep(1)\n(Pdb)\n\
    ```"
  raw: "### Break-Ins\n\nOne of the basic operations of debugging is breaking the\
    \ execution of a process or thread to inspect its process or thread state. In\
    \ the case of Python code, this **Break-in** can be done either internally by\
    \ putting the `breakpoint()` function inside the code or externally via executing\
    \ the script under the debugger and then breaking in via a keyboard interrupt\
    \ (^C) or exception. Some debuggers, such as GDB, allow external **Break-ins**\
    \ after the program starts independently.\n\nTo illustrate the first way, execute\
    \ the code in Listing [5-1](#606465_1_En_5_Chapter.xhtml#PC1) on Linux (for Windows,\
    \ you should get similar results).\n\n```\n# test-breakpoint.py\ndef main():\n\
    foo()\ndef foo():\nbar()\ndef bar():\nwhile True:\nbreakpoint()\nif __name__ ==\
    \ \"__main__\":\nmain()\nListing 5-1\nA Simple Script to Test an Internal Break-in\n\
    ```\n\nAfter the **Break-in**, you can inspect the managed stack trace (`where`\
    \ command or `w`) and resume execution (`continue` command or `c`). The `quit`\
    \ command (or `q`) exits the debugger and aborts the script. There are other commands\
    \ you will learn when you look at other debugging implementation patterns.\n\n\
    ```\n~/Chapter5$ python3 test-breakpoint.py\n> ~/Chapter5/test-breakpoint.py(9)bar()\n\
    -> breakpoint()\n(Pdb) w\n~/Chapter5/test-breakpoint.py(12)()\n-> main()\n~/Chapter5/test-breakpoint.py(2)main()\n\
    -> foo()\n~/Chapter5/test-breakpoint.py(5)foo()\n-> bar()\n> ~/Chapter5/test-breakpoint.py(9)bar()\n\
    -> breakpoint()\n(Pdb) c\n> ~/Chapter5/test-breakpoint.py(9)bar()\n-> breakpoint()\n\
    (Pdb) q\nTraceback (most recent call last):\nFile \"test-breakpoint.py\", line\
    \ 12, in \nmain()\nFile \"test-breakpoint.py\", line 2, in main\nfoo()\nFile \"\
    test-breakpoint.py\", line 5, in foo\nbar()\nFile \"test-breakpoint.py\", line\
    \ 9, in bar\nbreakpoint()\nFile \"test-breakpoint.py\", line 9, in bar\nbreakpoint()\n\
    File \"/usr/lib/python3.7/bdb.py\", line 88, in trace_dispatch\nreturn self.dispatch_line(frame)\n\
    File \"/usr/lib/python3.7/bdb.py\", line 113, in dispatch_line\nif self.quitting:\
    \ raise BdbQuit\nbdb.BdbQuit\n~/Chapter5$\n```\n\nFor the external **Break-in**,\
    \ you specify the *pdb* module when you execute the script. To illustrate this\
    \ way, execute the code in Listing [5-2](#606465_1_En_5_Chapter.xhtml#PC3) on\
    \ Linux (for Windows, you should get similar results).\n\n```\n# test-pdb.py\n\
    import time\nclass cls:\ndef __init__(self, field1, field2):\nself.field1 = field1\n\
    self.field2 = field2\ndef main():\nfunc = \"main\"\nwhile True:\nfoo()\ntime.sleep(1)\n\
    def foo():\nfunc = \"foo\"\nbar(\"argument\")\ndef bar(arg):\nfunc = \"bar\"\n\
    obj = [1, 2]\nobj = cls(1, 2)\nif __name__ == \"__main__\":\nmain()\nListing 5-2\n\
    A Simple Script to Test an External Break-In and Other Patterns\n```\n\nThe debugger\
    \ stops before executing the first script line. You can `continue` execution and\
    \ do **Break-in** at any time using ^C (or by sending the `SIGINT` signal using\
    \ the `kill` command from a separate terminal window).\n\n```\n~/Chapter5$ python3\
    \ -m pdb test-pdb.py\n> ~/Chapter5/test-pdb.py(1)()\n-> import time\n(Pdb) c\n\
    ^C\nProgram interrupted. (Use 'cont' to resume).\n> ~/Chapter5/test-pdb.py(11)main()\n\
    -> foo()\n(Pdb) w\n/usr/lib/python3.7/runpy.py(193)_run_module_as_main()\n-> \"\
    __main__\", mod_spec)\n/usr/lib/python3.7/runpy.py(85)_run_code()\n-> exec(code,\
    \ run_globals)\n/usr/lib/python3.7/pdb.py(1728)()\n-> pdb.main()\n/usr/lib/python3.7/pdb.py(1701)main()\n\
    -> pdb._runscript(mainpyfile)\n/usr/lib/python3.7/pdb.py(1570)_runscript()\n->\
    \ self.run(statement)\n/usr/lib/python3.7/bdb.py(585)run()\n-> exec(cmd, globals,\
    \ locals)\n(1)()\n~/Chapter5/test-pdb.py(1)()\n-> import time\n> ~/Chapter5/test-pdb.py(11)main()\n\
    -> foo()\n(Pdb)\n```\n\nLet’s continue exploring other pdb commands in the pattern\
    \ examples below.\n\n### Code Breakpoint\n\nYou don’t need to pollute your code\
    \ with `breakpoint()` function calls each time you want to do **Break-in** at\
    \ different locations in the script. After the initial **Break-in**, you can use\
    \ the `break` (`b`) command to put **Code Breakpoint** at `filename:lineno` or\
    \ a function name. For example, let’s put such a breakpoint whenever the `bar`\
    \ function is called:\n\n```\n(Pdb) b bar\nBreakpoint 1 at ~/Chapter5/test-pdb.py:18\n\
    (Pdb) c\n> ~/Chapter5/test-pdb.py(19)bar()\n-> func = \"bar\"\n(Pdb) w\n/usr/lib/python3.7/runpy.py(193)_run_module_as_main()\n\
    -> \"__main__\", mod_spec)\n/usr/lib/python3.7/runpy.py(85)_run_code()\n-> exec(code,\
    \ run_globals)\n/usr/lib/python3.7/pdb.py(1728)()\n-> pdb.main()\n/usr/lib/python3.7/pdb.py(1701)main()\n\
    -> pdb._runscript(mainpyfile)\n/usr/lib/python3.7/pdb.py(1570)_runscript()\n->\
    \ self.run(statement)\n/usr/lib/python3.7/bdb.py(585)run()\n-> exec(cmd, globals,\
    \ locals)\n(1)()\n~/Chapter5/test-pdb.py(1)()\n-> import time\n~/Chapter5/test-pdb.py(11)main()\n\
    -> foo()\n~/Chapter5/test-pdb.py(16)foo()\n-> bar(\"argument\")\n> ~/Chapter5/test-pdb.py(19)bar()\n\
    -> func = \"bar\"\n```\n\nThe arrow points to the next line to be executed. The\
    \ `breakpoint` command without arguments lists available breakpoints, their numbers,\
    \ and their information.\n\n```\n(Pdb) b\nNum Type         Disp Enb   Where\n\
    1   breakpoint   keep yes   at ~/Chapter5/test-pdb.py:18\nbreakpoint already hit\
    \ 1 time\n```\n\nThen you can `continue` until any of the breakpoints are hit\
    \ again. The `clear` (`cl`) command removes the existing breakpoint numbers. If\
    \ you need a breakpoint that is executed only once, use the `tbreak` command instead\
    \ of `break`. You can also `enable` and `disable` breakpoints by their numbers.\
    \ For high-frequency breakpoints, you can also specify conditions to trigger.\
    \ I provide such an example in the case study at the end of this chapter.\n\n\
    ### Code Trace\n\nOnce you are inside some function, either via a **Break-in**\
    \ or **Code Breakpoint**, you can start executing lines one by one using the `step`\
    \ (s) command. If you want to treat the function call as one line and not go inside\
    \ to execute line by line, you should use the `next` (`n`) command. If you accidentally\
    \ step into a function, you can continue using the `return` (`r`) command. If\
    \ you want to skip tracing some code lines, you can use the `until` (`unt`) command\
    \ and specify the line number. If you even want to skip their execution, you can\
    \ use the `jump` (`j`) command and specify the target line number.\n\n```\n(Pdb)\
    \ c\n> ~/Chapter5/test-pdb.py(19)bar()\n-> func = \"bar\"\n(Pdb) s\n> ~/Chapter5/test-pdb.py(20)bar()\n\
    -> obj = [1, 2]\n(Pdb) s\n> ~/Chapter5/test-pdb.py(21)bar()\n-> obj = cls(1, 2)\n\
    (Pdb) s\n--Call--\n> ~/Chapter5/test-pdb.py(4)__init__()\n-> def __init__(self,\
    \ field1, field2):\n(Pdb) r\n--Return--\n> ~/Chapter5/test-pdb.py(6)__init__()->None\n\
    -> self.field2 = field2\n(Pdb) r\n--Return--\n> ~/Chapter5/test-pdb.py(21)bar()->None\n\
    -> obj = cls(1, 2)\n(Pdb) s\n--Return--\n> ~/Chapter5/test-pdb.py(16)foo()->None\n\
    -> bar(\"argument\")\n(Pdb) s\n> ~/Chapter5/test-pdb.py(12)main()\n-> time.sleep(1)\n\
    (Pdb) c\n> ~/Chapter5/test-pdb.py(19)bar()\n-> func = \"bar\"\n(Pdb) n\n> ~/Chapter5/test-pdb.py(20)bar()\n\
    -> obj = [1, 2]\n(Pdb) n\n> ~/Chapter5/test-pdb.py(21)bar()\n-> obj = cls(1, 2)\n\
    (Pdb) n\n--Return--\n> ~/Chapter5/test-pdb.py(21)bar()->None\n-> obj = cls(1,\
    \ 2)\n(Pdb) n\n--Return--\n> ~/Chapter5/test-pdb.py(16)foo()->None\n-> bar(\"\
    argument\")\n(Pdb) n\n> ~/Chapter5/test-pdb.py(12)main()\n-> time.sleep(1)\n(Pdb)\n\
    ```"
  trans: "\n### 中断\n\n调试的基本操作之一就是中断进程或线程的执行，以便检查其进程或线程状态。对于 Python 代码，这种**中断**可以通过两种方式实现：一种是在代码内部放置\
    \ `breakpoint()` 函数，另一种是在调试器下执行脚本，然后通过键盘中断（`^C`）或异常从外部中断。某些调试器（如 GDB）允许在程序独立启动后进行外部**中断**。\n\
    \n为了演示第一种方式，请在 Linux 上执行代码清单 5-1 中的代码（在 Windows 上，你应该会得到类似的结果）。\n\n```\n# test-breakpoint.py\n\
    def main():\n    foo()\ndef foo():\n    bar()\ndef bar():\n    while True:\n \
    \       breakpoint()\nif __name__ == \"__main__\":\n    main()\n代码清单 5-1\n一个用于测试内部中断的简单脚本\n\
    ```\n\n**中断**后，你可以检查托管堆栈跟踪（`where` 命令或 `w`）并恢复执行（`continue` 命令或 `c`）。`quit` 命令（或\
    \ `q`）会退出调试器并中止脚本。在查看其他调试实现模式时，你还会学到其他命令。\n\n```\n~/Chapter5$ python3 test-breakpoint.py\n\
    > ~/Chapter5/test-breakpoint.py(9)bar()\n-> breakpoint()\n(Pdb) w\n  ~/Chapter5/test-breakpoint.py(12)<module>()\n\
    -> main()\n  ~/Chapter5/test-breakpoint.py(2)main()\n-> foo()\n  ~/Chapter5/test-breakpoint.py(5)foo()\n\
    -> bar()\n> ~/Chapter5/test-breakpoint.py(9)bar()\n-> breakpoint()\n(Pdb) c\n\
    > ~/Chapter5/test-breakpoint.py(9)bar()\n-> breakpoint()\n(Pdb) q\nTraceback (most\
    \ recent call last):\n  File \"test-breakpoint.py\", line 12, in <module>\n  \
    \  main()\n  File \"test-breakpoint.py\", line 2, in main\n    foo()\n  File \"\
    test-breakpoint.py\", line 5, in foo\n    bar()\n  File \"test-breakpoint.py\"\
    , line 9, in bar\n    breakpoint()\n  File \"test-breakpoint.py\", line 9, in\
    \ bar\n    breakpoint()\n  File \"/usr/lib/python3.7/bdb.py\", line 88, in trace_dispatch\n\
    \    return self.dispatch_line(frame)\n  File \"/usr/lib/python3.7/bdb.py\", line\
    \ 113, in dispatch_line\n    if self.quitting: raise BdbQuit\nbdb.BdbQuit\n~/Chapter5$\n\
    ```\n\n对于外部**中断**，你需要在执行脚本时指定 `pdb` 模块。为了演示这种方式，请在 Linux 上执行代码清单 5-2 中的代码（在 Windows\
    \ 上，你应该会得到类似的结果）。\n\n```\n# test-pdb.py\nimport time\nclass cls:\n    def __init__(self,\
    \ field1, field2):\n        self.field1 = field1\n        self.field2 = field2\n\
    def main():\n    func = \"main\"\n    while True:\n        foo()\n        time.sleep(1)\n\
    def foo():\n    func = \"foo\"\n    bar(\"argument\")\ndef bar(arg):\n    func\
    \ = \"bar\"\n    obj = [1, 2]\n    obj = cls(1, 2)\nif __name__ == \"__main__\"\
    :\n    main()\n代码清单 5-2\n一个用于测试外部中断和其他模式的简单脚本\n```\n\n调试器会在执行第一行脚本之前停止。你可以 `continue`\
    \ 执行，并随时使用 `^C`（或通过从另一个终端窗口使用 `kill` 命令发送 `SIGINT` 信号）进行**中断**。\n\n```\n~/Chapter5$\
    \ python3 -m pdb test-pdb.py\n> ~/Chapter5/test-pdb.py(1)<module>()\n-> import\
    \ time\n(Pdb) c\n^C\nProgram interrupted. (Use 'cont' to resume).\n> ~/Chapter5/test-pdb.py(11)main()\n\
    -> foo()\n(Pdb) w\n  /usr/lib/python3.7/runpy.py(193)_run_module_as_main()\n->\
    \ \"__main__\", mod_spec)\n  /usr/lib/python3.7/runpy.py(85)_run_code()\n-> exec(code,\
    \ run_globals)\n  /usr/lib/python3.7/pdb.py(1728)<module>()\n-> pdb.main()\n \
    \ /usr/lib/python3.7/pdb.py(1701)main()\n-> pdb._runscript(mainpyfile)\n  /usr/lib/python3.7/pdb.py(1570)_runscript()\n\
    -> self.run(statement)\n  /usr/lib/python3.7/bdb.py(585)run()\n-> exec(cmd, globals,\
    \ locals)\n  <string>(1)<module>()\n  ~/Chapter5/test-pdb.py(1)<module>()\n->\
    \ import time\n> ~/Chapter5/test-pdb.py(11)main()\n-> foo()\n(Pdb)\n```\n\n让我们继续在下面的模式示例中探索其他\
    \ `pdb` 命令。\n\n### 代码断点\n\n你不需要每次想在脚本的不同位置进行**中断**时，都用 `breakpoint()` 函数调用污染你的代码。在初始**中断**之后，你可以使用\
    \ `break`（`b`）命令在 `filename:lineno` 或函数名处设置**代码断点**。例如，让我们在每次调用 `bar` 函数时设置这样一个断点：\n\
    \n```\n(Pdb) b bar\nBreakpoint 1 at ~/Chapter5/test-pdb.py:18\n(Pdb) c\n> ~/Chapter5/test-pdb.py(19)bar()\n\
    -> func = \"bar\"\n(Pdb) w\n  /usr/lib/python3.7/runpy.py(193)_run_module_as_main()\n\
    -> \"__main__\", mod_spec)\n  /usr/lib/python3.7/runpy.py(85)_run_code()\n-> exec(code,\
    \ run_globals)\n  /usr/lib/python3.7/pdb.py(1728)<module>()\n-> pdb.main()\n \
    \ /usr/lib/python3.7/pdb.py(1701)main()\n-> pdb._runscript(mainpyfile)\n  /usr/lib/python3.7/pdb.py(1570)_runscript()\n\
    -> self.run(statement)\n  /usr/lib/python3.7/bdb.py(585)run()\n-> exec(cmd, globals,\
    \ locals)\n  <string>(1)<module>()\n  ~/Chapter5/test-pdb.py(1)<module>()\n->\
    \ import time\n  ~/Chapter5/test-pdb.py(11)main()\n-> foo()\n  ~/Chapter5/test-pdb.py(16)foo()\n\
    -> bar(\"argument\")\n> ~/Chapter5/test-pdb.py(19)bar()\n-> func = \"bar\"\n```\n\
    \n箭头指向要执行的下一行。不带参数的 `breakpoint` 命令会列出可用的断点、它们的编号及其信息。\n\n```\n(Pdb) b\nNum Type\
    \         Disp Enb   Where\n1   breakpoint   keep yes   at ~/Chapter5/test-pdb.py:18\n\
    \tbreakpoint already hit 1 time\n```\n\n然后你可以 `continue` 直到再次命中任何断点。`clear`（`cl`）命令会移除现有的断点编号。如果你需要一个只执行一次的断点，请使用\
    \ `tbreak` 命令而不是 `break`。你还可以通过编号 `enable` 和 `disable` 断点。对于高频断点，你还可以指定触发条件。我在本章末尾的案例研究中提供了这样一个示例。\n\
    \n### 代码跟踪\n\n一旦你通过**中断**或**代码断点**进入某个函数，你就可以使用 `step`（`s`）命令开始逐行执行代码。如果你希望将函数调用视为一行，而不进入其内部逐行执行，则应使用\
    \ `next`（`n`）命令。如果你不小心步入了某个函数，可以使用 `return`（`r`）命令继续执行。如果你想跳过跟踪某些代码行，可以使用 `until`（`unt`）命令并指定行号。如果你甚至想跳过它们的执行，可以使用\
    \ `jump`（`j`）命令并指定目标行号。\n\n```\n(Pdb) c\n> ~/Chapter5/test-pdb.py(19)bar()\n->\
    \ func = \"bar\"\n(Pdb) s\n> ~/Chapter5/test-pdb.py(20)bar()\n-> obj = [1, 2]\n\
    (Pdb) s\n> ~/Chapter5/test-pdb.py(21)bar()\n-> obj = cls(1, 2)\n(Pdb) s\n--Call--\n\
    > ~/Chapter5/test-pdb.py(4)__init__()\n-> def __init__(self, field1, field2):\n\
