- fmt: '# Summary


    In this chapter, you looked at debugging implementation patterns in the context
    of the Python command-line debugger. The next chapter looks at the same patterns
    in the context of various Python IDEs.


    Footnotes [1](#606465_1_En_5_Chapter.xhtml#Fn1_source) [2](#606465_1_En_5_Chapter.xhtml#Fn2_source)


    # 6. IDE Debugging in the Cloud


    This chapter will look at the debugging implementation patterns in the context
    of some Python IDEs.


    ## Visual Studio Code


    Let’s review the debugging implementation pattern language and case study from
    the previous chapter in the context of the Visual Studio Code IDE. I assume that
    you already have VS Code installed on your local machine with the required extensions.
    For the necessary steps, please look at the Python extension for Visual Studio
    Code README^([^(31)](#fn31)).


    ### WSL Setup


    When preparing some case studies for this book, I used VS Code for editing and
    WSL (Windows Subsystem for Linux) running Debian to execute Python code (thus
    simulating a remote cloud instance). So, before looking at cloud setup, I want
    to provide you with instructions on how to make the same environment to debug
    locally using an IDE if you don’t have access to a cloud environment. Please refer
    to the article^([^(32)](#fn32)) at `https://github.com/Microsoft/vscode-python`
    for how to prepare such an environment. However, the recommended setup there might
    require some troubleshooting. On our Windows 11 WSL2 system, I had to add the
    following line to `.bashrc`:


    ```

    alias code= "''/mnt/c/Users/[USER]/AppData/Local/Programs/Microsoft VS Code/Code.exe''"

    ```


    The required setup also installs the **Remote – SSH** VS Code extension necessary
    for the cloud setup.


    ### Cloud SSH Setup


    To prepare a cloud remote debugging environment, I recommend the prerequisite
    steps in the article about remote development over SSH^([^(33)](#fn33)).


    Below I provide an example of VS Code running on Windows 11 and connecting to
    our Ubuntu AArch64 system running in a cloud different from Azure, which was described
    in the referenced article. Since I already have the SSH key pair generated for
    us when I provisioned a cloud instance, I use it to connect.


    The bottom-left corner of VS Code window has a connect button (Figure [6-1](#606465_1_En_6_Chapter.xhtml#Fig1)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig1_HTML.jpg)


    A screenshot of the visual studio code window with several icons on the left panel,
    where the connect button at the bottom left is highlighted.


    Figure 6-1


    Open a remote window and use the connect button


    When you click it, you will see different options. Choose *Connect Current Window
    to Host* in the *Remote-SSH* section (Figure [6-2](#606465_1_En_6_Chapter.xhtml#Fig2)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig2_HTML.jpg)


    A screenshot of the visual studio code window with several icons on the left panel
    where connect button is clicked. It displays several search options in the center
    panel where Connect Current Window to Host in the Remote-S S H is highlighted.


    Figure 6-2


    Options to connect to a remote host via SSH


    Then choose *Configure SSH Hosts* (Figure [6-3](#606465_1_En_6_Chapter.xhtml#Fig3)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig3_HTML.jpg)


    A screenshot of the visual studio code window with several icons on the left panel
    where connect button is clicked. It displays a search dropdown in the center panel
    where the configure S S H hosts option is selected.


    Figure 6-3


    Options to configure remote hosts via SSH


    Next, choose a config file to write a cloud instance IP address, cloud instance
    username, and private key location (in our case, on Windows), as shown in Figure
    [6-4](#606465_1_En_6_Chapter.xhtml#Fig4).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig4_HTML.jpg)


    A screenshot of the visual studio code window with several icons on the left panel
    where connect button is clicked. It displays a dropdown under the select S S H
    configuration file to update, where a dot s s h configuration file under users,
    d m i t r folder is selected.


    Figure 6-4


    Choosing a configuration file


    Choose a configuration file located in the `C:\Users` folder and add the required
    information (Figure [6-5](#606465_1_En_6_Chapter.xhtml#Fig5)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig5_HTML.jpg)


    A screenshot of a config visual studio code window with with connect button clicked
    on the left panel. It displays a program in the workspace where the i p address
    tag for hostname is highlighted. Other parameters are port 22, user ubuntu, identity
    file with a path, and identities only as yes.


    Figure 6-5


    A sample SSH configuration file. You need to specify an IP address of a cloud
    instance, username, and private key path


    Save the config file and click again the bottom-left *Open a Remote Window* button
    (Figure [6-2](#606465_1_En_6_Chapter.xhtml#Fig2)).


    Then choose the host saved in the config file (Figure [6-6](#606465_1_En_6_Chapter.xhtml#Fig6)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig6_HTML.jpg)


    A screenshot of a config visual studio code window with with connect button clicked
    on the left panel. It displays a program in the workspace, which is overlayed
    by a dropdown under the search box to select the configured S S H host with ubuntu
    arm 64 cloud selected.


    Figure 6-6


    Choosing the host to connect


    You will get connected. The host is shown in the bottom-left connection button
    (Figure [6-7](#606465_1_En_6_Chapter.xhtml#Fig7)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig7_HTML.jpg)


    A screenshot of the Welcome Visual Studio code window with several icons on the
    left panel. It displays the options under the Welcome screen, and S S H ubuntu
    arm 64 cloud is highlighted in the bottom-left connection button.


    Figure 6-7


    Connected host via SSH'
