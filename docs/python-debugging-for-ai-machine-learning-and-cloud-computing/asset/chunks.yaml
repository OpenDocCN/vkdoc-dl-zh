    \n线程 #2 和 #3 是**阻塞线程**（在第 4 章中介绍），它们使用 Python 的 `with` 语句进入 `cs2` 和 `cs1` Python\
    \ 对象。由于这些对象是 `RLock`，你可以在不检查 Python 脚本源代码的情况下检查它们的线程所有权。可重入锁必须保持线程所有权，以区分所有者线程和其他线程。\n\
    \n从上面的输出中，你获得了 Python 解释器进程内 `RLock` 地址的以下原生信息：\n\n```\nThread 3 (Thread 0x7f7e55f42700\
    \ (LWP 60)):\n\nThread 2 (Thread 0x7f7e56743700 (LWP 59)):\n\n```\n\n让我们转储远程地址的内存，并检查附近偏移量的值，即所谓的**指针锥**。\n\
    \n```\n(gdb) x/4a 0x7f7e56891d80\n0x7f7e56891d80: 0x4     0x87d1a0 \n0x7f7e56891d90:\
    \ 0xe4eec0        0x7f7e56743700\n(gdb) x/4a 0x7f7e56891f30\n0x7f7e56891f30: 0x4\
    \     0x87d1a0 \n0x7f7e56891f40: 0xe3e110        0x7f7e55f42700\n```\n\n从上面的输出中，你看到线程\
    \ #3 正在等待由线程 #2（`0x7f7e56743700`）拥有的 `RLock 0x7f7e56891d80`。你还看到线程 #2 正在等待由线程\
    \ #3（`0x7f7e55f42700`）拥有的 `RLock 0x7f7e56891f30`。基于这种相互等待，你推测存在**死锁**。\n\n# 调试架构\n\
    \n由于源代码很小（清单 12-1），让我们进行**事后**调试，采用**现场**和**纸上**方式。\n\n```\n# deadlock.py\nimport\
    \ time\nimport threading\ncs1 = threading.RLock()\ncs2 = threading.RLock()\ndef\
    \ thread_func1():\nwith cs1:\ntime.sleep(1)\nwith cs2:\npass\ndef thread_func2():\n\
    with cs2:\ntime.sleep(1)\nwith cs1:\npass\ndef main():\nthread1 = threading.Thread(target=thread_func1)\n\
    thread2 = threading.Thread(target=thread_func2)\nthread1.start()\nthread2.start()\n\
    thread1.join()\nthread2.join()\nif __name__ == \"__main__\":\nmain()\n清单 12-1\n\
    一个说明两个线程间死锁的简单脚本\n```\n\n你立即看到了线程中相反的锁获取顺序。如果你修正它（清单 12-2），脚本将运行完成而不会冻结：\n\n```\n\
    def thread_func1():\nwith cs1:\ntime.sleep(1)\nwith cs2:\npass\ndef thread_func2():\n\
    with cs1:\ntime.sleep(1)\nwith cs2:\npass\n清单 12-2\n死锁的代码修复\n```\n\n```\n~/Chapter12$\
    \ python3 deadlock-fix.py\n~/Chapter12$\n```\n\n# 异常与死锁\n\n`with` 是 `acquire`\
    \ 和 `release` 方法的语法糖。如果直接使用，或者在使用具有相同 acquire 和 release 语义的第三方及原生操作系统同步对象时，在存在**已处理异常**的情况下，你可能会遇到同步问题（清单\
    \ 12-3）。异常会跳过锁的 `release` 方法，从而导致**死锁**。在这种情况下，我建议在异常处理代码中添加日志记录，以便对异常处理过程具有可见性。\n\
    \n```\n# deadlock-exception.py\nimport time\nimport threading\nimport logging\n\
    cs1 = threading.RLock()\ncs2 = threading.RLock()\ndef foo (data):\nif data: raise\
    \ \"Exception\"\ndef thread_func1():\ntry:\ncs1.acquire()\nfoo(1)\ncs1.release()\n\
    except:\nlogging.error(\"Exception logged\")\ntime.sleep(2)\ncs2.acquire()\ncs2.release()\n\
    def thread_func2():\ncs2.acquire()\ncs1.acquire()\ntime.sleep(3)\ncs1.release()\n\
    cs2.release()\ndef main():\nthread1 = threading.Thread(target=thread_func1)\n\
    thread2 = threading.Thread(target=thread_func2)\nthread1.start()\nthread2.start()\n\
    thread1.join()\nthread2.join()\nif __name__ == \"__main__\":\nmain()\n清单 12-3\n\
    一个说明在存在已处理异常的情况下两个线程间死锁的脚本\n```\n\n# 总结\n\n本章介绍了一个在 Linux 上使用 GDB 诊断和调试死锁的案例研究。下一章将讨论云计算中\
    \ Python 调试的挑战。\n"
- fmt: '# 13. Challenges of Python Debugging in Cloud Computing


    In the previous chapter, you looked at deadlock debugging. In this chapter, you
    will start surveying the challenges of debugging in cloud computing, AI, and machine
    learning. You will start with cloud computing first, the backbone of modern AI/ML.


    Cloud computing is no longer a novelty in today’s software development landscape.
    It provides scalable infrastructure, high availability, and numerous services
    that aid in building robust applications. When developers transit from local and
    server-based development environments to cloud platforms, they encounter unique
    challenges when debugging their Python applications.


    ## Complex Distributed Systems


    The term *complexity* here means intricate but difficult to learn and comprehend.
    In cloud environments, applications often span multiple services and systems.
    Debugging becomes challenging when errors arise from these interconnected components.
    In a monolithic architecture, you might be able to reproduce an issue locally
    and examine it. However, in a microservices architecture in the cloud, where each
    service might be written in Python (or other languages) and communicating asynchronously,
    tracing a problem requires a lot more effort.


    When you transition from a local machine or client/server-based setup to the cloud,
    the first fundamental shift you experience is in the architecture. More often
    than not, cloud deployments involve distributed systems, especially if we''re
    looking at modern microservices architectures. This transition from localized,
    monolithic systems to distributed cloud-based ones is no small feat. This paradigm
    shift comes with an architectural transformation amplifying the manifold debugging
    challenges. Understanding distributed systems is foundational to debugging in
    the cloud.


    ### Granularity of Services


    In traditional monolithic and server designs, you often have the luxury of searching
    for bugs in a singular, unified codebase. With cloud deployments, especially when
    embracing microservices, your application is fragmented into smaller services.
    Each could be written in a different language. When a bug manifests, the detective
    work isn’t just about finding the problematic code but also about identifying
    the service it resides in.


    #### Service Multiplicity


    Distributed systems, particularly those following a microservices architecture,
    fragment the application into multiple distinct services. Each service has its
    logic, data flow, and potential pitfalls.


    #### Localization of Issues


    Given the distributed nature, localizing which service is the root cause of a
    given issue becomes the primary challenge.


    ### Communication Channels Overhead


    Services in distributed systems communicate over the network through HTTP requests,
    RPCs, or message queues and brokers. Debugging issues arising from these communications,
    such as failed requests or delayed message deliveries, can be difficult.


    #### Nature of Communication


    Different service communication layers and mechanisms in distributed systems introduce
    multiple potential failure points.


    #### Payload Discrepancies


    Data being exchanged between services must adhere to expected formats. Mismatches
    in expected payloads, such as their schemas, can lead to bugs that can be challenging
    to trace and resolve.


    #### Latency Concerns


    With services hosted potentially across different regions or even continents,
    network latencies can impact the responsiveness of service-to-service communication.


    #### Timeout Configurations


    Default timeout settings might not always be optimal. Understanding and tweaking
    these, whether for database connections or HTTP requests, can make a difference.


    ### Inter-Service Dependencies


    One service in a distributed application might depend on several others. If one
    service fails, it can cause a cascading effect, making understanding the root
    cause in such scenarios difficult and further complicating the debugging process.


    #### Service Chaining


    In many cloud architectures, especially those serving complex business logic,
    service calls are often chained, with one service invoking another, and so on.
    Identifying the weak link when something breaks is very laborious in such chains.


    #### Service Interactions


    Cloud platform Python applications often interact with databases, caches, message
    queues, and other services. Each interaction is a potential point of failure.
    Understanding nuances like connection pooling or back-off strategies can be pivotal
    in debugging.


    #### Data Consistency


    Ensuring robust data consistency in distributed systems is challenging. Eventual
    consistency models, while mitigating some issues, introduce others like out-of-order
    data updates or race conditions.


    ## Layers of Abstraction


    Cloud-native platforms layer abstractions over physical resources in their approach
    to simplify infrastructure management. While beneficial, these abstractions create
    various debugging challenges.


    ### Opaque Managed Services


    Cloud providers offer various managed services, from databases to machine learning
    platforms. The services being managed are black boxes to developers. When issues
    arise within these services, developers have limited insights and controls for
    debugging.


    Managed services come with their own logs. Often more abstract than what one might
    get from a self-managed service, these logs require interpretation skills. Beyond
    logs, managed services offer metrics, which can be indispensable in understanding
    issues. For instance, if a Python application experiences database issues, analyzing
    metrics like CPU utilization, connection counts, or read/write latencies can offer
    insights into software behavior.


    ### Serverless and Function as a Service


    Function as a Service (FaaS) solutions abstract away the entire server. Debugging
    applications in such environments necessitates a paradigm shift, as traditional
    approaches like using SSH to connect to a compute instance are no longer applicable.


    One of the quirks of serverless environments is the concept of cold starts. After
    being idle, a function’s initial invocation can have noticeably higher latencies.
    Understanding and optimizing for this can be important.


    Serverless environments have resource restrictions, like execution time limits
    or memory constraints. Ensuring that Python applications and pipelines are designed
    within these confines is vital.


    ### Container Orchestration Platforms


    Platforms like Kubernetes introduce another abstraction layer, where applications
    run within containers orchestrated by a complex system. Understanding the nuances
    of these platforms, from pod lifecycles to networking policies, is essential for
    effective debugging.


    Tools like Prometheus^([^(76)](#fn76)) can be invaluable in understanding container-specific
    metrics. Memory leaks or CPU spikes within containers can often be debugged using
    these insights.


    In orchestrated environments, services discover each other dynamically. Ensuring
    this discovery is seamless and debugging possible issues that may arise there
    requires understanding underlying systems, for example, `etcd`^([^(77)](#fn77)).'
