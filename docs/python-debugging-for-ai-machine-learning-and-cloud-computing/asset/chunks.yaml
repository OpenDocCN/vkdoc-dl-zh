    # 12. Case Study: Deadlock


    In the previous chapter, you looked at resource leaks. In this chapter, you will
    diagnose and debug another common problem type, that of synchronization deadlocks,
    but you will use Linux as your operation system and GDB as a debugger. Some problem
    types do not require all debugging pattern layers; only some may be sufficient.
    For example, with postmortem debugging, sometimes the debugging analysis stage
    is sufficient.'
  raw: '## Debugging Implementation


    In complex scenarios, when you have much bigger code potentially involving third-party
    libraries, you would want to collect the **Usage Trace** for handles to see which
    thread created them^([^(74)](#fn74)). For postmortem debugging, you need to enable
    an *application verifier* in 64-bit global flags (`gflags.exe)` on the computer
    where you are running Python (Figure [11-3](#606465_1_En_11_Chapter.xhtml#Fig3)).


    This `gflags` application is a part of the Debugging Tools for Windows package
    that you can download and install as a part of WDK or SDK^([^(75)](#fn75)). You
    can also install these tools on a separate computer and copy `gflags.exe` and
    `gflagsui.dll` to a computer where you want to set global flags for diagnostics
    and debugging. If you can’t have a GUI on your problem computer (for example,
    server or Docker environments), then you can set the appropriate registry value,
    which in my case is the following:


    ```

    Computer\HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image
    File Execution Options\python.exe

    GlobalFlag (REG_DWORD) 0x100 (256)

    ```


    Then, you run your script again and collect the new dump after noticing an increased
    number of handles. Also, don’t forget to clear all flags after you finish troubleshooting
    and debugging; some flags may affect performance.


