    # 12. 案例研究：死锁


    在上一章中，你了解了资源泄漏。在本章中，你将诊断和调试另一种常见问题类型——同步死锁，但这次你将使用 Linux 作为操作系统，并使用 GDB 作为调试器。某些问题类型不需要所有调试模式层；可能只有部分层就足够了。例如，对于事后调试，有时调试分析阶段就足够了。

