    \    _singleton = None\n    @staticmethod\n    def __new__(cls):\n        self\
    \ = Processes._singleton\n        if not self:\n            Processes._singleton\
    \ = self = super().__new__(cls)\n        return self\n    def __init__(self):\n\
    \        pass\n    _procinfo = {}\n    def add_process(self, pid, info):\n   \
