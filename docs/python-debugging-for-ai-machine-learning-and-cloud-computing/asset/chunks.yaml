- fmt: "# Case Study\n\nTo illustrate a few debugging analysis patterns, execute the\
    \ code in Listing [4-5](#606465_1_En_4_Chapter.xhtml#PC10) on Linux.\n\n```\n\
    # spiking-thread.py\nimport time\nimport threading\nimport math\ndef thread_func(spike):\n\
    foo(spike)\ndef main():\nthreads: list[threading.Thread] = []\nthreads.append(threading.Thread(target=thread_func,\
    \ args=[False]))\nthreads.append(threading.Thread(target=thread_func, args=[True]))\n\
    threads.append(threading.Thread(target=thread_func, args=[False]))\nfor thread\
    \ in threads:\nthread.start()\nfor thread in threads:\nthread.join()\ndef foo(spike):\n\
    bar(spike)\ndef bar(spike):\nwhile True:\nif spike:\nmath.sqrt(2);\nelse:\ntime.sleep(1)\n\
    if __name__ == \"__main__\":\nmain()\nListing 4-5\nA Script to Illustrate Some\
    \ Debugging Analysis Patterns\n```\n\nRun the script and wait for a few minutes.\
    \ When executing the `top` command, you’ll see one **Spiking Thread** consuming\
    \ a lot of CPU time:\n\n```\n~/Python-Book/Chapter 4$ ps\nPID TTY          TIME\
    \ CMD\n162082 pts/0    00:00:00 bash\n163195 pts/0    00:52:51 python3\n164966\
    \ pts/0    00:00:00 ps\n~/Python-Book/Chapter 4$ ps -T\nPID    SPID TTY      \
    \    TIME CMD\n162082  162082 pts/0    00:00:00 bash\n163195  163195 pts/0   \
    \ 00:00:00 python3\n163195  163197 pts/0    00:00:00 python3\n163195  163198 pts/0\
    \    00:53:19 python3\n163195  163199 pts/0    00:00:00 python3\n165070  165070\
    \ pts/0    00:00:00 ps\n~/Python-Book/Chapter 4$ top -H -p 163195\ntop - 14:20:55\
    \ up 14 days,  3:30,  0 users,  load average: 1.00, 1.04, 1.04\nThreads:   4 total,\
    \   1 running,   3 sleeping,   0 stopped,   0 zombie\n%Cpu(s): 50.7 us,  0.4 sy,\
    \  0.0 ni, 48.7 id,  0.0 wa,  0.0 hi,  0.2 si,  0.0 st\nMiB Mem :  11940.2 total,\
    \   8176.1 free,    729.2 used,   3035.0 buff/cache\nMiB Swap:      0.0 total,\
    \      0.0 free,      0.0 used.  10996.1 avail Mem\nPID USER      PR   NI  VIRT\
    \    RES     SHR S   %CPU   %MEM     TIME+ COMMAND\n163198 ubuntu    20   0  \
    \ 236060  11084   7596 R  99.6   0.1  56:46.22 python3\n163195 ubuntu    20  \
    \ 0   236060  11084   7596 S   0.0   0.1   0:00.15 python3\n163197 ubuntu    20\
    \   0   236060  11084   7596 S   0.0   0.1   0:00.13 python3\n163199 ubuntu  \
    \  20   0   236060  11084   7596 S   0.0   0.1   0:00.10 python3\n```\n\nNote\
    \ that the **Spiking Thread** ID is `163198`.\n\nNow you can either attach GDB\
    \ to the running process or save a process core memory dump using the `gcore`\
    \ tool. Take the second approach. If you don’t have these tools on your Linux\
    \ box, you need to install them for this case study. On our Ubuntu AArch64 cloud\
    \ instance, the following command installed both tools:\n\n```\n~/Python-Book/Chapter\
    \ 4$ sudo apt install gdb\n```\n\nThen save a core dump for later memory dump\
    \ analysis:\n\n```\n~/Python-Book/Chapter 4$ sudo gcore 163195\n[New LWP 163197]\n\
    [New LWP 163198]\n[New LWP 163199]\n[Thread debugging using libthread_db enabled]\n\
    Using host libthread_db library \"/lib/aarch64-linux-gnu/libthread_db.so.1\".\n\
    0x0000ffffbe76b268 in do_futex_wait.constprop () from /lib/aarch64-linux-gnu/libpthread.so.0\n\
    warning: target file /proc/163195/cmdline contained unexpected null characters\n\
    Saved corefile core.163195\n[Inferior 1 (process 163195) detached]\n~/Python-Book/Chapter\
    \ 4$ ls -l\ntotal 232444\n-rw-r--r-- 1 root   root   238014728 Jul  8 15:51 core.163195\n\
    -rw-rw-r-- 1 ubuntu ubuntu       667 Jul  8 13:08 spiking-thread.py\n```\n\nFor\
    \ the analysis of various managed patterns, you also need to install Python debugging\
    \ packages (if you use the Red Hat distribution flavor, please check this article^([^(28)](#fn28))):\n\
    \n```\n~/Python-Book/Chapter 4$ sudo apt install python3-dbg\n```\n\nNow load\
    \ the saved memory dump into GDB, specifying the Python executable as the source\
    \ of symbols:\n\n```\n~/Python-Book/Chapter 4$ which python3\n/usr/bin/python3\n\
    ~/Python-Book/Chapter 4$ gdb -c core.163195 -se /usr/bin/python3\nGNU gdb (Ubuntu\
    \ 9.2-0ubuntu1~20.04.1) 9.2\nCopyright (C) 2020 Free Software Foundation, Inc.\n\
