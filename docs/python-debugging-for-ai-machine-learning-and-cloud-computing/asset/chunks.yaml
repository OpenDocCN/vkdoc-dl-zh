    ### 如何在 Linux 上启用进程核心转储


    可以使用以下命令为当前用户临时启用核心转储：


    ```

    $ ulimit -c unlimited

    ```


    通过编辑 `/etc/security/limits.conf` 文件，可以为除 root 以外的所有用户永久启用核心转储。添加或取消注释以下行：


    ```

    *     soft  core  unlimited

    ```


    要将 root 用户的限制设为 1GB，请添加或取消注释以下行：


    ```

    *     hard  core  1000000

    ```


    ### 如何在 Windows 上启用进程内存转储


    最好通过 `LocalDumps` 注册表项来完成。文章 *收集用户模式转储*^(¹⁹) 在 [`https://learn.microsoft.com/en-us/windows/win32/wer/collecting-user-mode-dumps`](https://learn.microsoft.com/en-us/windows/win32/wer/collecting-user-mode-dumps)
    中概述了具体操作方法。


    ## 挂起


    **挂起** 表现为进程从用户视角（以及可能请求某些功能的另一个进程的视角）来看变得无响应（冻结）。但它仍然可以通过进程列表命令或 GUI 进程管理器看到，这些工具可能会也可能不会指示进程已冻结。这种基本模式还包括延迟。此时，API
    和库跟踪可能指向被阻塞的调用，或者更好的做法是，手动内存转储肯定能显示被阻塞的进程线程，甚至能提示是否存在死锁（线程相互等待），即所谓的“事后调试”场景。


    也可以在调试器下启动程序（或在启动后附加到程序），等待其挂起，然后检查线程和内存（实时调试）。


    ### 如何在 Linux 上生成进程核心转储


    有几种方法：


    - `kill` 命令（需要 `ulimit`）

    - `gcore`


    ```

    $ kill -s SIGQUIT PID

    $ kill -s SIGABRT PID

    ```


    - `ProcDump`^(²⁰)


    ```

    $ gcore [-o filename] PID

    ```


    ### 如何在 Windows 上生成进程内存转储


    如果使用 GUI 环境，可以通过任务管理器选择 Python 进程，右键单击，然后选择“创建转储文件”来完成，如图 3-2 所示。


    ![](img/606465_1_En_3_Fig2_HTML.jpg)


    任务管理器的屏幕截图。右侧选中了菜单图标。它显示一个表格，列标题为名称、PID、状态、CPU、内存、体系结构和描述。右键单击了 Python 3.11.exe。从上下文菜单中选择了“创建转储文件”。


    图 3-2


    使用任务管理器保存进程内存转储


    `ProcDump`^(²¹) 命令行工具可用于控制台环境。还建议使用 `-ma` 开关来保存完整的进程转储。


    ## 计数器值


    **计数器值** 涉及某个测量量（指标）或系统变量突然显示意外（或异常）值的情况。因此，它也包括资源泄漏，如句柄和内存，以及 CPU 峰值。此时，可以通过向程序添加额外代码来记录与**计数器值**相关的数据。也可以在调试器下运行程序，并定期停止它以检查相关变量和内存值（实时调试）。定期或在超过某个阈值后保存内存转储也能达到同样的效果（事后调试）。


    ## 错误消息


    **错误消息** 表现为某种错误输出，无论是基于控制台（终端）的还是 GUI 消息框或对话框。程序可以在调试器下运行，然后中断以进行检查。在出现**错误消息**时保存内存转储是某些调试场景的替代方案。


    请注意，几种基本诊断模式可能同时出现，例如，**挂起**和**计数器值**、**挂起**和**错误消息**，或**错误消息**和**崩溃**。


    ## 总结


    在本章中，你详细了解了基本诊断模式，并学习了如何收集某些类型的软件执行产物，例如内存转储。下一章将在几个 Python 案例研究的背景下介绍具体的调试分析模式。


    脚注 1 2 3


    # 4. 调试分析模式


    在上一章中，你了解了基本诊断模式，这些模式指导你在适当的情况下收集必要的软件执行产物，例如内存转储、跟踪和日志。你分析了这些产物中的诊断指标（信号、迹象和症状），这些指标描述了异常软件结构和行为所对应的问题。我们将常见的、可重复识别的、并附带一组在特定上下文中适用的建议和可能解决方案的问题称为*诊断模式*。


    在本章中，你将了解一种模式语言，它包含在特定上下文（即软件诊断领域本身）中识别诊断模式的常用分析技术和方法。这种模式语言独立于特定的调试器、语言或平台，例如**堆栈跟踪收集**，但用于收集和分析信息的调试器命令在
    Windows 和 Linux 上可能不同，对于 Python 代码堆栈跟踪和执行 Python 代码的 Python 进程的堆栈跟踪也可能不同。我们将此类分析模式变体称为*分析模式实现*。有许多这样的分析模式^(²²)最初由软件诊断研究所^(²³)开发，它们可以分类成组。你将了解其中最常用的一些。


    由于软件诊断先于调试，我们将这些触发调试架构、设计和实现的诊断分析模式称为*调试分析模式*（图 4-1）。


    ![](img/606465_1_En_4_Fig1_HTML.png)


    面向模式的调试过程的堆叠框图。从上到下的块依次是：基本诊断、调试分析、调试架构、调试设计、调试实现、调试使用和调试呈现模式。其中“调试分析”被突出显示。


    图 4-1


    面向模式的调试过程和调试分析模式


    ## 副文本


    此模式的名称借用了文学理论^(²⁴)。在我们的上下文中，它指的是主要软件诊断产物的附加支持材料，例如，显示你的 Python 进程如何与其他进程和文件交互，以及其内存、句柄和
    CPU 使用情况的操作系统跟踪和日志。在 Windows 中，它可以是来自 `Process Monitor`^(²⁵) 的日志；在 Linux 中，它是来自
    `top`、`pmap`、`strace`、`ltrace` 和 `lsof` 等工具的输出。例如，CPU 线程使用信息在 Linux 进程核心内存转储中不可用，但在
    Windows 进程内存转储中可用，正如你将在本章末尾的案例研究中针对**峰值线程**分析模式所看到的那样。


    ## 状态转储


    此模式源于跟踪和日志分析模式^(²⁶)，并且对于 Python 代码的脚本性质特别有用。你可以识别感兴趣的变量和对象，并定期（或在某个感兴趣的函数内部）将其值转储到日志文件中。


    ## 计数器值


    此模式也源于跟踪和日志分析，并且通常与指标监控相关，例如内存消耗大小和 CPU 使用百分比。这些周期性值通常来自**副文本**，但也可能是**状态转储**的一部分。


    ## 堆栈跟踪模式


    第一组堆栈跟踪模式包含最重要的调试分析模式，这些模式与堆栈跟踪（回溯、traceback）相关：


    - 堆栈跟踪

    - 运行时线程

    - 托管堆栈跟踪

    - 堆栈跟踪收集

    - 堆栈跟踪集合

