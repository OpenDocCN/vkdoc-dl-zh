- fmt: '# The How? Category


    This category of debugging architecture patterns answers the question of **how**
    you will debug relative to software execution time and space.


    ## Software Narrative


    **Software Narratives** are software execution artifacts not limited to traces
    and logs. They also include source code and various documents and descriptions.
    This term was originally introduced in software narratology^([^(55)](#fn55)).
    You choose this architectural pattern if you want to see how the software structure
    and behavior changes with time but you are not interested in seeing all state
    changes in every part of the program.


    ## Software State


    The traditional live and postmortem debugging approaches inspect the program’s
    state, such as memory. For example, they can watch the value of a variable or
    object field over time (live debugging) or inspect memory addresses at the time
    of a crash or hang (postmortem debugging). You use this **Software State** architectural
    pattern when you want to analyze the program or even the entire system state at
    once. A typical example is a program that depends on several system services,
    and these services depend on each other and the operating system. In this case,
    you may need the whole physical memory snapshot for the analysis of different
    virtual memory process spaces.


    # Summary


    In this chapter, you overviewed the debugging architecture patterns. You will
    encounter them again in some of the case studies in subsequent chapters. The next
    chapter looks at the most common debugging design patterns that are used to refine
    more general debugging architecture patterns in the context of case studies that
    involve the analysis, architecture, and design of debugging.


    Footnotes [1](#606465_1_En_8_Chapter.xhtml#Fn1_source) [2](#606465_1_En_8_Chapter.xhtml#Fn2_source)
    [3](#606465_1_En_8_Chapter.xhtml#Fn3_source) [4](#606465_1_En_8_Chapter.xhtml#Fn4_source)
    [5](#606465_1_En_8_Chapter.xhtml#Fn5_source) [6](#606465_1_En_8_Chapter.xhtml#Fn6_source)
    [7](#606465_1_En_8_Chapter.xhtml#Fn7_source) [8](#606465_1_En_8_Chapter.xhtml#Fn8_source)
