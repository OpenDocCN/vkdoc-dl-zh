  trans: "\n# 线程\n\n从操作系统的角度来看，进程只是 Python 解释器、其代码和数据的内存容器。但解释器代码需要被执行，例如，用于解释 Python\
    \ 字节码。这种执行单元被称为线程。一个进程可以有多个这样的执行单元（多个线程，即所谓的多线程应用程序）。每个线程都有自己唯一的线程 ID（`TID`，也称为\
    \ `LWP` 或 `SPID`），如图 1-3 所示。例如，一个线程可以处理用户界面事件，而其他线程可以响应 UI 请求进行复杂计算，从而使 UI 保持响应。在\
    \ Windows 上，线程 ID 通常与进程 ID 不同，但在 Linux 中，对于单线程进程，主线程的线程 ID 与进程 ID 相同。\n\n![](img/606465_1_En_1_Fig3_HTML.png)\n\
    \nS D D 和内存的框图。S D D 中带有文件的块连接到内存中的块 P I D 60 和 45。P I D 60 具有 T I D 60。P I D\
    \ 45 具有 T I D 45、46 和 47。\n\n**图 1-3** 两个具有不同线程数的 `python3` 进程\n\n为了模拟多线程，我在 Windows\
    \ 和 Linux 上执行了清单 1-2 中的代码。\n\n```\nimport time\nimport threading\ndef thread_func():\n\
    \    foo()\ndef main():\n    t1 = threading.Thread(target=thread_func)\n    t1.start()\n\
    \    t2 = threading.Thread(target=thread_func)\n    t2.start()\n    t1.join()\n\
    \    t2.join()\ndef foo():\n    bar()\ndef bar():\n    while True:\n        time.sleep(1)\n\
    if __name__ == \"__main__\":\n    main()\n```\n\n**清单 1-2** 一个用于模拟多个线程的简单脚本\n\n\
    图 1-4 显示，在 Windows 中，你最初可以看到 11 个线程（这个数字后来变为 7，然后变为 5）。你可以看到线程数可能比预期的要多。\n\n![](img/606465_1_En_1_Fig4_HTML.jpg)\n\
    \n任务管理器中菜单图标的屏幕截图。它显示了一个包含名称、P I D、状态、C P U、内存、架构和描述等表头的表格。`python3.11.exe` 文件的总线程数为\
    \ 11，已高亮显示。\n\n**图 1-4** 在 Windows 上运行的 `python3.11.exe` 进程中的线程数\n\n在 Linux 中，你可以看到预期的线程数——3：\n\
    \n```\n~/Chapter1$ ps -aT\nPID  SPID TTY          TIME CMD\n17    17 pts/0   \
    \ 00:00:00 mc\n45    45 pts/2    00:00:00 python3\n45    46 pts/2    00:00:00\
    \ python3\n45    47 pts/2    00:00:00 python3\n54    54 pts/1    00:00:00 ps\n\
    ```\n\n# 堆栈跟踪（回溯，Traceback）\n\n我应该区分 Python 源代码回溯（我们称之为*托管堆栈跟踪*）和来自 Python 编译器和解释器的非托管（原生）堆栈跟踪，这些编译器和解释器将\
    \ Python 字节码编译并执行。你将在某些章节中看到这种区别，了解几个案例研究以及如何获取这两种跟踪。但现在，我将只展示差异。清单 1-3 显示了托管堆栈跟踪。清单\
