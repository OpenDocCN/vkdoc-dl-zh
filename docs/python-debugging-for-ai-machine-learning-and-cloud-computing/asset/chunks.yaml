    ```\n\n## Memory Dump\n\nA process memory can be saved in a memory dump file.\n\
    \n> *An undigested and voluminous mass of information about a problem or the state\
    \ of a system and most especially one consisting of hex runes describing the byte-by-byte\
    \ state of memory.*\n> \n> Eric S. Raymond, *The New Hacker’s Dictionary*, Third\
    \ Edition\n\nThese memory dumps are also called *core dumps* in Linux. It is also\
    \ possible to get a kernel memory dump and a dump of physical memory (also called\
    \ a *complete memory dump* in Windows). Figure [1-5](#606465_1_En_1_Chapter.xhtml#Fig5)\
    \ shows different memory dump types.\n\n![](images/606465_1_En_1_Chapter/606465_1_En_1_Fig5_HTML.png)\n\
    \nA block diagram of the memory and S D D. The bock memory is mapped to the physical\
    \ dump of S D D. P I D 0 of memory is mapped to Kernal dump of S D D. P I D 45\
    \ of memory is mapped to process dump of S D D.\n\nFigure 1-5\n\nMemory dump types\n\
    \nMemory dumps may be useful for debugging hard-to-reproduce intermittent problems.\
    \ This approach is called postmortem debugging. You will see some case studies\
    \ in the following chapters.\n\n## Crash\n\n> *To fail suddenly. “Has the system\
    \ just crashed?” “Something crashed the OS!” Also used transitively to indicate\
    \ the cause of the crash (usually a person or a program, or both). “Those idiots\
    \ playing SPACEWAR crashed the system.”*\n> \n> Eric S. Raymond, *The New Hacker’s\
    \ Dictionary*, Third Edition.\n\nWhen something illegal happens inside a process\
    \ thread, such as when memory outside its available range is accessed or you write\
    \ to read-only memory, the operating system reports the error and terminates the\
    \ process. It may also save the process memory into a memory dump file. The process\
    \ then disappears from the list of available processes."
