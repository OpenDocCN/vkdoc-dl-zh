- fmt: '### How to Enable Process Core Dumps on Linux


    Core dumps can be temporarily enabled for the current user using this command:


    ```

    $ ulimit -c unlimited

    ```


    Core dumps can be permanently enabled for every user except root by editing the
    `/etc/security/limits.conf` file. Add or uncomment the following line:


    ```

    *     soft  core  unlimited

    ```


    To limit the root to 1GB, add or uncomment the following line:


    ```

    *     hard  core  1000000

    ```


    ### How to Enable Process Memory Dumps on Windows


    This is best done via the `LocalDumps` registry key. The article *Collecting User-Mode
    Dumps*^([^(19)](#fn19)) at [`https://learn.microsoft.com/en-us/windows/win32/wer/collecting-user-mode-dumps`](https://learn.microsoft.com/en-us/windows/win32/wer/collecting-user-mode-dumps)
    outlines how to do it.


    ## Hang


    A **Hang** manifests itself when a process becomes unresponsive (frozen) from
    a user’s perspective (and also from the perspective of another process that may
    request some functionality). But it is still visible from the process list command
    or GUI process managers, which may or may not indicate that the process is frozen.
    This elementary pattern also includes delays. Here API and library tracing may
    point to the blocked call, or better, a manual memory dump should definitely show
    blocked process threads and even suggest whether there is a deadlock (threads
    mutually waiting for each other), the so-called postmortem debugging scenario.


    It is also possible to start a program under a debugger (or attach it after the
    start), wait until it hangs, and then inspect threads and memory (live debugging).


    ### How to Generate Process Core Dumps on Linux


    There are several methods:


    - The `kill` command (requires `ulimit`)

    - `gcore`


    ```

    $ kill -s SIGQUIT PID

    $ kill -s SIGABRT PID

    ```


    - `ProcDump`^([^(20)](#fn20))


    ```

    $ gcore [-o filename] PID

    ```


    ### How to Generate Process Memory Dumps on Windows


    If you use a GUI environment, this can be done via Task Manager by selecting a
    Python process, right-clicking, and choosing Create dump file, as shown in Figure
    [3-2](#606465_1_En_3_Chapter.xhtml#Fig2).


    ![](images/606465_1_En_3_Chapter/606465_1_En_3_Fig2_HTML.jpg)


    A screenshot of the task manager. The menu icon is selected on the right. It displays
    a table with column headers name, P I D, status, C P U, memory, architecture,
    and description. Python 3 dot 11 dot e x e is right-clicked. The create dump file
    is selected from the context menu.


    Figure 3-2


    Saving a process memory dump using Task Manager


    The `ProcDump`^([^(21)](#fn21)) command-line tool can be used for console environments.
    It is also recommended to use the `-ma` switch to save full process dumps.


    ## Counter Value


    A **Counter Value** is about some measured quantity (metrics) or system variable
    that suddenly shows an unexpected (or abnormal) value. Therefore, it also includes
    resource leaks such as handles and memory plus CPU spikes. Here it is possible
    to instrument a program with additional code that logs data related to the **Counter
    Value**. It is also possible to run the program under a debugger and periodically
    stop it to inspect related variables and memory values (live debugging). Saving
    the memory dump periodically or after some threshold has the same effect (postmortem
    debugging).


    ## Error Message


    An **Error Message** manifests itself as some error output, be it console (terminal)
    based or a GUI message box or dialog box. The program may be run under a debugger
    and then get interrupted for inspection. Saving a memory dump when an **Error
    Message** appears is an alternative for some debugging scenarios.


    Please note that several elementary diagnostics patterns may present themselves
    together, for example, **Hang** and **Counter Value**, **Hang** and **Error Message**,
    or **Error Message** and **Crash**.


    ## Summary


    In this chapter, you looked at elementary diagnostics patterns in some detail
    and learned how to gather some types of software execution artifacts, such as
    memory dumps. The next chapter introduces specific debugging analysis patterns
    in the context of several Python case studies.


    Footnotes [1](#606465_1_En_3_Chapter.xhtml#Fn1_source) [2](#606465_1_En_3_Chapter.xhtml#Fn2_source)
