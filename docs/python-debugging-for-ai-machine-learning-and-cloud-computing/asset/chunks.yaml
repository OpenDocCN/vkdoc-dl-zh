    # 11. Case Study: Resource Leaks


    In the previous chapter, you looked at debugging usage patterns. In this chapter,
    you will use the pattern approach to diagnose and debug a common problem type
    in the Windows operating system: resource leaks.


    ## Elementary Diagnostics


    If you run the `handle-leak.py` script, you will notice the constant monotone
    increase of the handles’ **Counter Value** (Figure 11-1).


