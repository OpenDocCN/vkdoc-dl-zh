    A screenshot of the process monitoring p y window, where variables and call stack
    dropdowns are on the left panel. It displays a program under the workspace on
    the right panel. Below the code is the value of the length of processes dot processes
    dot underscore proc info as 21.


    Figure 6-11


    Using the debugging console to inspect variable values


    Since you know that the size of the dictionary starts increasing only after some
    time, open the `processes.py` file and put a **Code Breakpoint** on the first
    line of the `add_process` function (Figure [6-12](#606465_1_En_6_Chapter.xhtml#Fig12)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig12_HTML.jpg)


    A screenshot of a window with the processes p y file, where variables and call
    stack dropdowns are on the left panel. It displays a program under the workspace
    on the right panel, where the breakpoint on line 17 under add process function
    definition.


    Figure 6-12


    Setting a code breakpoint


    Then right-click the breakpoint dot and choose *Edit Breakpoint* and then specify
    the expression to be hit only when the dictionary size exceeds 100 (press Enter
    to set the condition). You will see the dot change in shape. Continue execution
    again using the *Debug* toolbar (F5) and wait (Figure [6-13](#606465_1_En_6_Chapter.xhtml#Fig13)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig13_HTML.jpg)


    A screenshot of a window with processes p y file, where variables and call stack
    dropdowns are on the left panel. It displays a program under the workspace on
    the right panel, where the expression line with length of processes dot processes
    dot underscore proc info greater than 100 is highlighted.


    Figure 6-13


    Setting the code breakpoint conditional expression


    After a few minutes, you had a new **Break-in** with the dot changed in shape.
    You can now repeat your **Variable Value** expression in the Debug Console. Please
    also note that the call stack has a reverse direction than the traceback (Figure
    [6-14](#606465_1_En_6_Chapter.xhtml#Fig14)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig14_HTML.jpg)


    A screenshot of a window with processes p y file, where the call stack dropdown
    on the left panel, line 17 of the program in the workspace on the right panel,
    and length of processes dot underscore proc info greater than 101 in the debug
    console are highlighted.


    Figure 6-14


    Conditional break-in


    Now remove the conditional expression for the breakpoint and create another **Code
    Breakpoint** for the `remove_process` function with a **Breakpoint Action** in
    both breakpoints to log ADD and REMOVE messages (Figure [6-15](#606465_1_En_6_Chapter.xhtml#Fig15)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig15_HTML.jpg)


    A screenshot of a window with processes p y file, with several options on the
    left panel. Breakpoint is on line 20 in the program under remove process function
    on the right panel. The log message below for the word, remove that is highlighted,
    reads 21.


    Figure 6-15


    Specifying the breakpoint action


    Continue the execution and see that the log messages with ADD messages are twice
    as many as the REMOVE messages (Figure [6-16](#606465_1_En_6_Chapter.xhtml#Fig16)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig16_HTML.jpg)


    A screenshot of a window with processes p y file, with several options on the
    left panel. Breakpoints are on lines 17 and 20 in the program on the right panel,
    where the log messages options are highlighted under the debug console, which
    reads, 2 add, remove, 2 add, remove.


    Figure 6-16


    Log messages


    I don’t know their **Usage Trace,** and I couldn’t find a reliable way to print
    backtraces like I did when using PDB in the previous chapter. But since you are
    using the IDE editor, you can modify the file of interest directly and add additional
    debugging variables to print in the *Debugging Console* (Figure [6-17](#606465_1_En_6_Chapter.xhtml#Fig17)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig17_HTML.jpg)


    A screenshot of a window with processes p y file, with several options on the
    left panel. Breakpoints are on lines 19 and 24 in the program, where traceback
    is added in the variable t b, to print the log messages under the debug console
    with the words remove and t b.


    Figure 6-17


    Adding traceback to logging


    You have to restart your debugging session from the *Debugging* toolbar (Ctrl-Shift-F5).
    After the restart, execution continues, and you wait for a few minutes, pause,
    and examine the last ADD and REMOVE entries in the log (Figure [6-18](#606465_1_En_6_Chapter.xhtml#Fig18)).


    ![](images/606465_1_En_6_Chapter/606465_1_En_6_Fig18_HTML.jpg)


    A screenshot of a window with processes p y file, with several options on the
    left panel. Breakpoints are on lines 19 and 24 in the program. The debug console
    window has file paths and also the word, add, which is highlighted.


    Figure 6-18


    Generating the usage trace


    From the log, you can see that the ADD actions from the `filemon.py` module do
    not have any compensating REMOVE actions with the same recommendation as in the
    previous chapter.


