    # 4. Debugging Analysis Patterns


    In the previous chapter, you looked at elementary diagnostics patterns that guide
    you in gathering, where appropriate, the necessary software execution artifacts,
    such as memory dumps, traces, and logs. You analyzed these artifacts for diagnostic
    indicators (signals, signs, and symptoms) of abnormal software structure and behavior
    that describe problems. We call common recurrent identifiable problems, together
    with a set of recommendations and possible solutions to apply in a specific context,
    as *diagnostic pattern*s.


    In this chapter, you will look at a pattern language of recurrent analysis techniques
    and methods of diagnostic pattern identification in a specific context: the domain
    of software diagnostics proper. This pattern language is independent of a particular
    debugger, language, or platform, such as **Stack Trace Collection**, but the debugger
    commands to gather and analyze the information may be different for Windows and
    Linux, and also for Python code stack trace and the stack trace of a Python process
    that executes Python code. We call such analysis pattern variants as *analysis
    pattern implementations*. There are many such analysis patterns^([^(22)](#fn22))
    originally developed by the Software Diagnostics Institute^([^(23)](#fn23)), and
    they can be classified into groups. You will look at the most frequent ones.


    Since software diagnostics precedes debugging, we call these diagnostic analysis
    patterns that trigger debugging architecture, design, and implementation as *debugging
    analysis patterns* (Figure [4-1](#606465_1_En_4_Chapter.xhtml#Fig1)).


    ![](images/606465_1_En_4_Chapter/606465_1_En_4_Fig1_HTML.png)


    A stacked block diagram of the pattern-oriented debugging process. Blocks from
    top to bottom are elementary diagnostics, debugging analysis, debugging architecture,
    debugging design, debugging implementation, debugging usage, and debugging presentation
    patterns. The debugging analysis is highlighted.


    Figure 4-1


    Pattern-oriented debugging process and debugging analysis patterns


    ## Paratext


    The name of this pattern was borrowed from literary theory^([^(24)](#fn24)). In
    our context, it means additional supporting material for main software diagnostic
    artifacts, for example, operating system traces and logs showing how your Python
    process interacted with other processes and files plus its memory, handle, and
    CPU usage. In Windows, it can be the logs from `Process Monitor`^([^(25)](#fn25));
    in Linux, it’s the output from the `top`, `pmap`, `strace`, `ltrace`, and `lsof`
    tools. For example, CPU thread usage information is not available in Linux process
    core memory dumps but is available in Windows process memory dumps, as you will
    see later for the **Spiking Thread** analysis pattern in the case study at the
    end of this chapter.


    ## State Dump


    This pattern comes from trace and log analysis patterns^([^(26)](#fn26)) and is
    specifically useful for the scripting nature of Python code. You identify variables
    and objects of interest and periodically (or inside some function of interest)
    dump their values into a log file.


    ## Counter Value


    This pattern also comes from trace and log analysis and is often related to metric
    monitoring, such as the size of memory consumption and the percentage of CPU used.
    These periodic values usually come from **Paratext** but may also be a part of
    a **State Dump**.


    ## Stack Trace Patterns


    The first group of stack trace patterns contains the most important analysis patterns
    for debugging, which are patterns related to stack traces (backtraces, tracebacks):


    - Stack Trace

    - Runtime Thread

    - Managed Stack Trace

    - Stack Trace Collection

    - Stack Trace Set'
