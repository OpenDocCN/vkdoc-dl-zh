    ### 断点动作


    在调试会话期间，你可能希望自动化**代码追踪**和相关命令，例如打印回溯和**变量值**。这里**断点动作**通过将调试器命令与**代码断点**关联来提供帮助。例如，你可以在每次命中断点时打印回溯并自动继续（使用
    `^C` 再次执行**中断**）：


    ```

