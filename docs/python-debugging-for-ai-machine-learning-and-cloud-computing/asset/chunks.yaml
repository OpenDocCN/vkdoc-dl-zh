    program from the process monitoring file in the Jupyter environment. The rightward
    arrowhead button for cell execution on the toolbar is highlighted.


    **Figure 7-4** Jupyter Notebook button to execute the cell


    This interruption is equivalent to a `Break-in` (Figure [7-6](#606465_1_En_7_Chapter.xhtml#Fig6)),
    and you can inspect the `Variable Value` of the size of the `Processes._procinfo`
    dictionary (Figure [7-7](#606465_1_En_7_Chapter.xhtml#Fig7)).


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig7_HTML.png)


    A screenshot of the Jupyter environment window displays the workspace under kernel
    with a code block of 4 lines under keyboard interrupt and an arrow pointing to
    a line. The value below reads, length of Processes proc info dictionary, 288.


    **Figure 7-7** Inspecting variable values


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig6_HTML.png)


    A screenshot of the Jupyter environment window displays the workspace under kernel
    with a program from the process monitoring file. A code block with 4 lines are
    under keyboard interrupt, in the bottom and an arrow points to a code line. An
    unfilled circle is highlighted in the toolbar on the right.


    **Figure 7-6** Interrupted cell


    To put in `Code Breakpoints`, enable debugging (Figure [7-8](#606465_1_En_7_Chapter.xhtml#Fig8)).
    Enabling the debugger adds the gutter to cells where you can put breakpoints (Figure
    [7-9](#606465_1_En_7_Chapter.xhtml#Fig9)).


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig9_HTML.jpg)


    A screenshot of the Jupyter environment window displays the workspace under kernel
    with a code block of 4 lines under keyboard interrupt and an arrow pointing to
    a line. The gutter on the left next to the code line numbers, below the interrupt
    code block is highlighted.


    **Figure 7-9** The gutter to turn breakpoints on/off


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig8_HTML.jpg)


    A screenshot of the Jupyter environment window displays the workspace under kernel
    with a code block of 4 lines under keyboard interrupt and an arrow pointing to
    a line. The enabled debugger button on the toolbar is highlighted.


    **Figure 7-8** Enable the Debugger button


    You can now put two `Code Breakpoints` in the gutter and open the Debugger Panel
    via the View menu item (Figure [7-10](#606465_1_En_7_Chapter.xhtml#Fig10)), where
    you can see the list of breakpoints, the call stack, and the watch variables.


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig10_HTML.jpg)


    A screenshot of the Jupyter environment window displays the workspace under kernel
    with a program from the process monitoring file. The view tab on the menu bar
    and the cell execution button on the toolbar are highlighted. Breakpoints are
    on lines 17 and 20, with its details on the right.


    **Figure 7-10** Debugger panel


    Now you continue the execution of the cell. When the breakpoint is hit, you can
    see its call stack (Figure [7-11](#606465_1_En_7_Chapter.xhtml#Fig11)) plus global
    and local `Variable Values`. Inspecting them now shows that enabling the debugger
    restarted the cell. But once a breakpoint is hit, you can choose to continue or
    terminate. It is also possible to do the usual next, step in, and step out actions
    all available on the call stack panel section toolbar.


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig11_HTML.jpg)


    A screenshot of the Jupyter environment window displays the workspace under kernel
    with a program from the process monitoring file. Breakpoints are on lines 17 and
    20. The call list dropdown is highlighted on the right panel.


    **Figure 7-11** The breakpoint hit and call stack


    Let’s now explore the garbage collection^([^(42)](#fn42)) (GC) stats and `tracemalloc`
    techniques^([^(43)](#fn43)) for `Memory Leak` debugging analysis and `Usage Trace`
    debugging implementation patterns.


    For example, you can add the code from Listing [7-2](#606465_1_En_7_Chapter.xhtml#PC4)
    inside the `while` loop to check the number of allocated objects and other statistics.


    ```

    import gc

    print(len(gc.get_objects()))

    print(gc.get_stats())

    ```


    **Listing 7-2** Code to Check the Number of Allocated Objects


    You stop the debugging session, clear the breakpoints, close the Debugger Panel,
    and then execute the cell again. From the cell output, after the initial drop,
    you can see a steady increase in the number of objects (Figure [7-12](#606465_1_En_7_Chapter.xhtml#Fig12)).


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig12_HTML.jpg)


    A screenshot of the Jupyter environment window displays the workspace under kernel
    with a program from the process monitoring file. A panel below displays the values
    of object list with key words of collections, collected, and uncollectable.


    **Figure 7-12** Tracing the number of objects


    The `gc` module has additional debugging flags that may help in other scenarios^([^(44)](#fn44)).


    You can also see where all extra objects are allocated by using the `tracemalloc`
    module and comparing allocation snapshot differences. Replace the main script
    code with the code from Listing [7-3](#606465_1_En_7_Chapter.xhtml#PC5), where
    you also remove sleep calls for faster memory leak modeling.


    ```

    procs = Processes()

    files = Files()

    import tracemalloc

    tracemalloc.start()

    s1 = tracemalloc.take_snapshot()

    for pid in range (1, 10):

    procs.add_process(pid, "info")

    try:

    while True:

    pid += 1

    procs.add_process(pid, "info")

    procs.remove_process(pid)

    files.process_files()

    except:

    s2 = tracemalloc.take_snapshot()

    top_user = s2.compare_to(s1, "traceback")[0]

    print("\n".join(top_user.traceback.format()))

    ```


    **Listing 7-3** Code to Compare Allocations and Print the Topmost malloc User
    Traceback


    Run the cell again and interrupt it after a few seconds. Now, instead of the `KeyboadInterrupt`
    exception, you see the top allocation and its code (Figure [7-13](#606465_1_En_7_Chapter.xhtml#Fig13)).


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig13_HTML.jpg)


    A screenshot of the Jupyter environment window displays the workspace under kernel
    with a program from the process monitoring file. It displays a workspace with
    the top allocation and its code.


    **Figure 7-13** The topmost allocation traceback


    You get the allocation distribution if you dump several top allocations instead
    of only the topmost. Using this technique, you can compare normal runs with those
    leaking process memory, the so-called `Object Distribution Anomaly` debugging
    analysis pattern.


    Please check its extensive documentation for additional examples of the `tracemalloc`
    module usage^([^(45)](#fn45)).


    ## Suggested Presentation Patterns


    So far, you have seen both command line and visual debuggers. I suggest the following
    presentation patterns:


    - `REPL`: Read, execute, print loop

    - `Breakpoint Toolbar`

    - `Action Toolbar`

    - `State Dashboard`


    The meaning of these pattern names should be obvious. The `State Dashboard` includes
    panel windows for variables and stack traces. The `REPL` abbreviation traditionally
    meant **read, eval, and print loop**, but I changed eval to **execute** for debugging
    commands. The `Action Toolbar` is for actions intrinsic to debugging sessions,
    such as stepping. The `Breakpoint Toolbar` is for setting and removing breakpoints
    and specifying their actions.'
