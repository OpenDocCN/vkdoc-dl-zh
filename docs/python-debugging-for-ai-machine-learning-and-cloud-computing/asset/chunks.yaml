    \    procs.add_process(pid, \"info\")\n    time.sleep(1)\n    procs.remove_process(pid)\n\
    \    time.sleep(1)\n    files.process_files()\n```\n\n**清单 7-1** 为 Jupyter Notebook\
    \ 改编的内存泄漏示例\n\n我想你应该熟悉 Jupyter Notebook 环境^(⁴¹)。如果不熟悉，你可以通过一个简单的命令来安装它（本案例研究使用\
