  trans: '

    ![](img/606465_1_En_7_Fig4_HTML.jpg)


    浏览器窗口截图显示了 Jupyter 环境中内核下的工作区，其中包含来自进程监控文件的程序。工具栏上用于执行单元格的右箭头按钮被高亮显示。


    **图 7-4** Jupyter Notebook 中执行单元格的按钮


    此中断相当于一个 `Break-in`（图 7-6），你可以检查 `Processes._procinfo` 字典大小的 `Variable Value`（图
    7-7）。


    ![](img/606465_1_En_7_Fig7_HTML.png)


    Jupyter 环境窗口截图显示了内核下的工作区，其中包含键盘中断下的一个 4 行代码块，以及一个指向某行的箭头。下方的值显示为：Processes proc
    info 字典的长度，288。


    **图 7-7** 检查变量值


    ![](img/606465_1_En_7_Fig6_HTML.png)


    Jupyter 环境窗口截图显示了内核下的工作区，其中包含来自进程监控文件的程序。底部有一个键盘中断下的 4 行代码块，一个箭头指向某行代码。右侧工具栏中有一个未填充的圆圈被高亮显示。


    **图 7-6** 被中断的单元格


    要设置 `Code Breakpoints`，请启用调试功能（图 7-8）。启用调试器会在单元格中添加装订线，你可以在其中放置断点（图 7-9）。


    ![](img/606465_1_En_7_Fig9_HTML.jpg)


    Jupyter 环境窗口截图显示了内核下的工作区，其中包含键盘中断下的一个 4 行代码块，以及一个指向某行的箭头。中断代码块下方，代码行号左侧的装订线被高亮显示。


    **图 7-9** 用于开启/关闭断点的装订线


    ![](img/606465_1_En_7_Fig8_HTML.jpg)


    Jupyter 环境窗口截图显示了内核下的工作区，其中包含键盘中断下的一个 4 行代码块，以及一个指向某行的箭头。工具栏上已启用的调试器按钮被高亮显示。


    **图 7-8** 启用调试器按钮


    现在你可以在装订线中放置两个 `Code Breakpoints`，并通过“视图”菜单项打开调试器面板（图 7-10），在其中你可以看到断点列表、调用堆栈和监视变量。


    ![](img/606465_1_En_7_Fig10_HTML.jpg)


    Jupyter 环境窗口截图显示了内核下的工作区，其中包含来自进程监控文件的程序。菜单栏上的“视图”选项卡和工具栏上的单元格执行按钮被高亮显示。断点位于第
    17 行和第 20 行，其详细信息显示在右侧。


    **图 7-10** 调试器面板


    现在继续执行单元格。当命中断点时，你可以看到其调用堆栈（图 7-11）以及全局和局部 `Variable Values`。此时检查它们会发现，启用调试器会重新启动单元格。但一旦命中断点，你可以选择继续或终止。还可以执行通常的“下一步”、“单步进入”和“单步跳出”操作，这些操作都可在调用堆栈面板部分的工具栏上找到。


    ![](img/606465_1_En_7_Fig11_HTML.jpg)


    Jupyter 环境窗口截图显示了内核下的工作区，其中包含来自进程监控文件的程序。断点位于第 17 行和第 20 行。右侧面板上的调用列表下拉菜单被高亮显示。


    **图 7-11** 命中断点与调用堆栈


    现在，让我们探索用于 `Memory Leak` 调试分析和 `Usage Trace` 调试实现模式的垃圾回收^(⁴²)（GC）统计信息和 `tracemalloc`
    技术^(⁴³)。


    例如，你可以将清单 7-2 中的代码添加到 `while` 循环内部，以检查已分配对象的数量和其他统计信息。


    ```

    import gc

    print(len(gc.get_objects()))

    print(gc.get_stats())

    ```


    **清单 7-2** 检查已分配对象数量的代码


    停止调试会话，清除断点，关闭调试器面板，然后再次执行单元格。从单元格输出中可以看到，在初始下降之后，对象数量稳步增长（图 7-12）。


    ![](img/606465_1_En_7_Fig12_HTML.jpg)


    Jupyter 环境窗口截图显示了内核下的工作区，其中包含来自进程监控文件的程序。下方的一个面板显示了对象列表的值，其中包含 collections、collected
    和 uncollectable 等关键词。


    **图 7-12** 追踪对象数量


    `gc` 模块还有其他调试标志，可能在其他场景中有所帮助^(⁴⁴)。


    你还可以通过使用 `tracemalloc` 模块并比较分配快照差异，来查看所有额外对象的分配位置。将主脚本代码替换为清单 7-3 中的代码，同时移除 sleep
    调用以加快内存泄漏建模速度。


    ```

    procs = Processes()

    files = Files()

    import tracemalloc

    tracemalloc.start()

    s1 = tracemalloc.take_snapshot()

    for pid in range (1, 10):

    procs.add_process(pid, "info")

    try:

    while True:

    pid += 1

    procs.add_process(pid, "info")

    procs.remove_process(pid)

    files.process_files()

    except:

    s2 = tracemalloc.take_snapshot()

    top_user = s2.compare_to(s1, "traceback")[0]

    print("\n".join(top_user.traceback.format()))

    ```


    **清单 7-3** 比较分配并打印最顶层 malloc 用户回溯的代码


    再次运行单元格，并在几秒后中断它。现在，你不会看到 `KeyboadInterrupt` 异常，而是会看到最顶层的分配及其代码（图 7-13）。


    ![](img/606465_1_En_7_Fig13_HTML.jpg)


    Jupyter 环境窗口截图显示了内核下的工作区，其中包含来自进程监控文件的程序。它显示了一个包含最顶层分配及其代码的工作区。


    **图 7-13** 最顶层的分配回溯


    如果你转储多个顶层分配而不仅仅是最顶层的一个，就可以得到分配分布。使用这种技术，你可以将正常运行与那些泄漏进程内存的运行进行比较，即所谓的 `Object
    Distribution Anomaly` 调试分析模式。


    有关 `tracemalloc` 模块使用的更多示例，请查阅其详细文档^(⁴⁵)。


    ## 建议的呈现模式


    到目前为止，你已经看到了命令行调试器和可视化调试器。我建议采用以下呈现模式：


    - `REPL`：读取、执行、打印循环

    - `Breakpoint Toolbar`

    - `Action Toolbar`

    - `State Dashboard`


    这些模式名称的含义应该显而易见。`State Dashboard` 包括用于变量和堆栈跟踪的面板窗口。`REPL` 缩写传统上意为 **读取、求值和打印循环**，但我将求值改为
    **执行**，以适用于调试命令。`Action Toolbar` 用于调试会话固有的操作，例如单步执行。`Breakpoint Toolbar` 用于设置和移除断点，并指定其操作。

    '
- fmt: '# Summary


    In this chapter, you looked at debugging engines for various IDEs, a Jupyter Notebook
    case study, and the most common debugging presentation patterns. The next two
    chapters introduce debugging architecture and debugging design patterns.


    Footnotes [1](#606465_1_En_7_Chapter.xhtml#Fn1_source) [2](#606465_1_En_7_Chapter.xhtml#Fn2_source)
    [3](#606465_1_En_7_Chapter.xhtml#Fn3_source) [4](#606465_1_En_7_Chapter.xhtml#Fn4_source)
    [5](#606465_1_En_7_Chapter.xhtml#Fn5_source) [6](#606465_1_En_7_Chapter.xhtml#Fn6_source)
    [7](#606465_1_En_7_Chapter.xhtml#Fn7_source) [8](#606465_1_En_7_Chapter.xhtml#Fn8_source)
    [9](#606465_1_En_7_Chapter.xhtml#Fn9_source) [10](#606465_1_En_7_Chapter.xhtml#Fn10_source)
    [11](#606465_1_En_7_Chapter.xhtml#Fn11_source) [12](#606465_1_En_7_Chapter.xhtml#Fn12_source)


    # 8. Debugging Architecture Patterns


    In the previous two chapters, you looked at some IDEs and debugging presentation
    patterns. You now have enough background material that I can introduce debugging
    architecture patterns (Figure 8-1) in this chapter. These are solutions to common
    problems of how to proceed with debugging. These patterns answer the most important
    questions of where, when, and how we debug and what we debug based on the debugging
    analysis patterns covered in Chapter 4. The diagnostics and debugging "questions"
    pattern language thinking originated from memory and trace acquisition patterns.^([(46)](#fn46))
    There are many ways to answer such questions and propose debugging strategies
    and methods; sometimes, you may even need to combine different approaches. However,
    there are the most important decisions^([(47)](#fn47)) to make before any debugging
    is done, and we name them *debugging architecture patterns* vs. *debugging design
    patterns*, which can be many for the particular architecture pattern. All debugging
    architecture patterns can be combined to form pattern sequences and pattern networks
    to solve complex problems of software behavior.


    ![](images/606465_1_En_8_Chapter/606465_1_En_8_Fig1_HTML.png)


    A stacked block diagram represents the pattern-oriented debugging process. The
    blocks are elementary diagnostics, debugging analysis, debugging architecture,
    debugging design, debugging implementation, debugging usage, and debugging presentation
    patterns. The debugging architecture is highlighted.


    **Figure 8-1** Pattern-oriented debugging process and debugging architecture patterns


    ## The Where? Category


    This category of debugging architecture patterns answers the question of **where**
    debugging session(s) will happen relative to the place of software execution.
    This is especially important because of the distributed nature of cloud-native
    applications and possible access restrictions.


    ### In Papyro


    Some debugging scenarios may only need a whiteboard (or blackboard) to solve a
    problem, and some must be solved without access to production environments due
    to security restrictions. This pattern name is borrowed from experimental studies^([(48)](#fn48))
    where only paper and pencil are used for analysis. However, in our modern times,
    this also includes descriptions, screenshots, and various tools that may be used
    to view and search collected data, such as log viewers.


    ### In Vivo


    This (micro)biological^([(49)](#fn49)) pattern''s name is borrowed from the proposed
    pattern language for POCs (Proof of Concept)^([(50)](#fn50)). It means that you
    debug in the environment where you have the original problem, such as the specific
    running process from the specific Python virtual directory.


    ### In Vitro


    This pattern''s name is borrowed from (micro)biology^([(51)](#fn51)) and, in the
    debugging architecture context, it means that you try to reproduce and debug the
    problem in the environment that is outside of its original place, such as on a
    developer machine.


    ### In Silico


    This pattern''s name is borrowed from experimental sciences^([(52)](#fn52)) and
    in this context means that you try to reproduce and debug the problem using some
    modeling process or system. For example, if particular library doesn''t work in
    a production environment, you create a test environment with similar characteristics
    and input data where you run a small program that uses the library and see if
    the toy software model throws the same errors.


    ### In Situ


    Situ patterns^([(53)](#fn53)) address the question where you analyze the execution
    artifacts, such as logs. In the case of **In Situ**, you keep artifacts where
    they were produced and analyze them right there. This pattern also covers examples
    of debugging using console logs from distributed environments such as Kubernetes.


    ### Ex Situ


    **Ex Situ** is the opposite of **In Situ**: you move produced artifacts out of
    the problem environment for offline analysis on a different computer. In cloud
    environments, observability logs are usually transported to some log collection
    services for later analysis if necessary. This pattern also covers crash and hang
    memory dumps or heap snapshots gathered for memory leak analysis later in a different
    environment where all necessary visual tools are installed.


    ## The When? Category


    This category of debugging architecture patterns answers the question of **when**
    debugging session(s) should and will happen relative to the timeline of software
    execution.


    ### Live


    **Live** debugging usually starts before the problem manifests itself. You either
    start the program under a debugger or attach a debugger at some point when you
    think the problem will appear soon or after some action. Then you wait for the
    problem to happen while periodically tracing execution progress and inspecting
    program state such as variables.


    ### JIT


    Just-in-time (**JIT**) debugging starts at the moment the problem manifests itself.
    For example, the runtime environment or operating system launches the debugger
    as a response to some signal or exception.


    ### Postmortem


    **Postmortem** debugging starts after the problem manifests itself, such as after
    a crash or when various execution artifacts, such as traces and logs, are produced
    to be debugged either **In Situ** or **Ex Situ**. The debugging is then done usually
    **In Papyro** mode, assisted by software tools such as debuggers for viewing memory
    dumps and log viewers.


    Time travel debugging^([(54)](#fn54)) usually blends **Postmortem** and **Live**
    as some tools on specific operating system platforms may allow recording program
    execution and replaying it later by going back in time to do test state corrections
    and different execution paths.


    ## The What? Category


    This category of debugging architecture patterns answers the question of **what**
    you will debug during the debugging session(s) relative to the structure of the
    program.


    ### Code


    Fixing **code** defects is the traditional goal of debugging activity. Here you
    debug code in the traditional sense by tracing source lines, making changes to
    the state, and altering execution paths. This is usually done by using source
    code debuggers and Python language and ecosystem tracing and logging facilities.


    ### Data


    There can also be problems with configuration or input data, and the goal of data
    debugging is to fix such **Data** defects. This is also important for machine
    learning using already well-debugged libraries and frameworks.


    ### Interaction


    Sometimes, the problem is not in code or data but in the improper usage of the
    software. Here **Interaction** defects may be analyzed by HCI action recorders
    or simply screen recording.'
