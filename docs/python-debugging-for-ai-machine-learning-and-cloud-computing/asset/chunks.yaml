- fmt: "# Summary\n\nIn this chapter, you looked at debugging implementation patterns\
    \ in the context of the Python IDE and Visual Studio Code. You also learned how\
    \ to connect it to WSL on Windows and to a cloud environment using SSH. The next\
    \ chapter looks at a few more IDEs, including the one popular in machine learning\
    \ environments; it also introduces debugging presentation patterns.\n\nFootnotes\
    \ [1](#606465_1_En_6_Chapter.xhtml#Fn1_source) [2](#606465_1_En_6_Chapter.xhtml#Fn2_source)\
    \ [3](#606465_1_En_6_Chapter.xhtml#Fn3_source)\n\n# 7. Debugging Presentation\
    \ Patterns\n\nIn the previous chapter, you looked at debugging implementation\
    \ patterns in the Python IDE Visual Studio Code context. In this chapter, you\
    \ will look at another Python IDE, Jupyter Notebook and Lab, with a case study\
    \ introducing a few more debugging analysis techniques and implementation patterns.\
    \ Finally, after comparing Python CLIs and IDEs, you will discern a few basic\
    \ debugging presentation patterns (Figure [7-1](#606465_1_En_7_Chapter.xhtml#Fig1)).\n\
    \n## Python Debugging Engines\n\nModern Python debugging IDEs have similar debugging\
    \ engines; for example, Visual Studio Code uses `debugpy`^([^(34)](#fn34)), which\
    \ can also be used in the CLI mode, similar to the `pdb` module used in Chapter\
    \ [5](#606465_1_En_5_Chapter.xhtml). It also has remote debugging capabilities\
    \ via listening on an interface and port, allowing debug clients to connect. PyCharm^([^(35)](#fn35))\
    \ uses `pydevd`^([^(36)](#fn36)) (which is also bundled with `debugpy`). Jupyter\
    \ Notebook and Lab^([^(37)](#fn37)) use `ipykernel`^([^(38)](#fn38)) to access\
    \ `ipdb`^([^(39)](#fn39)) debugging functionality provided by IPython^([^(40)](#fn40)).\n\
    \n![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig1_HTML.png)\n\nA screenshot\
    \ lists the following steps. Elementary Diagnostics Patterns, Debugging Analysis\
    \ Patterns, Debugging Architecture Patterns, Debugging Design Patterns, Debugging\
    \ Implementation Patterns, Debugging Usage Patterns, and Debugging Presentation\
    \ Patterns, which is highlighted.\n\n**Figure 7-1** Pattern-oriented debugging\
    \ process and debugging presentation patterns\n\n## Case Study\n\nYou will use\
    \ a similar Python code for this case study as in the previous chapter but you\
    \ will adapt it to the Jupyter Notebook format (Listing [7-1](#606465_1_En_7_Chapter.xhtml#PC1)).\
    \ Please note that Jupyter Notebook files can also be loaded and debugged in Visual\
    \ Studio Code.\n\nTo recall the previous chapter, the case study models a problem\
    \ I observed with a monitoring script that, after time, shows increasing process\
    \ memory consumption.\n\n```\nclass Processes:\n    _singleton = None\n    @staticmethod\n\
    \    def __new__(cls):\n        self = Processes._singleton\n        if not self:\n\
    \            Processes._singleton = self = super().__new__(cls)\n        return\
    \ self\n    def __init__(self):\n        pass\n    _procinfo = {}\n    def add_process(self,\
    \ pid, info):\n        Processes._procinfo[pid] = info\n    def remove_process(self,\
    \ pid):\n        del Processes._procinfo[pid]\n\nclass Files:\n    def __init__(self):\n\
    \        self._processes = Processes()\n        self._count = 0\n    def process_files(self):\n\
    \        self._count += 1\n        if self._count > 25:\n            self._processes.add_process(self._count,\
    \ \"\")\n\nimport time\nprocs = Processes()\nfiles = Files()\nfor pid in range\
    \ (1, 10):\n    procs.add_process(pid, \"info\")\nwhile True:\n    pid += 1\n\
    \    procs.add_process(pid, \"info\")\n    time.sleep(1)\n    procs.remove_process(pid)\n\
    \    time.sleep(1)\n    files.process_files()\n```\n\n**Listing 7-1** Memory Leak\
    \ Example Adapted for Jupyter Notebook\n\nI suppose you are familiar with the\
    \ Jupyter Notebook environment^([^(41)](#fn41)). If not, you can install it with\
    \ a simple command (I use Windows for this case study, Python 3.11.4, and assume\
    \ your Python environment is accessible via `PATH`):\n\n```\nChapter7>pip install\
    \ notebook\n...\n```\n\nTo start the Jupyter Notebook environment, use the following\
    \ command:\n\n```\nChapter7>jupyter notebook\n...\n[I 2023-08-13 13:45:59.513\
    \ ServerApp] Jupyter Server 2.7.0 is running at:\n[I 2023-08-13 13:45:59.513 ServerApp]\
    \ http://localhost:8888/tree?token=2aae60bdf51574972f646f61f27a8bcb5416c08c2a835087\n\
    [I 2023-08-13 13:45:59.513 ServerApp]     http://127.0.0.1:8888/tree?token=2aae60bdf51574972f646f61f27a8bcb5416c08c2a835087\n\
    [I 2023-08-13 13:45:59.514 ServerApp] Use Control-C to stop this server and shut\
    \ down all kernels (twice to skip confirmation).\n[C 2023-08-13 13:45:59.675 ServerApp]\n\
    To access the server, open this file in a browser:\n...\nOr copy and paste one\
    \ of these URLs:\nhttp://localhost:8888/tree?token=2aae60bdf51574972f646f61f27a8bcb5416c08c2a835087\n\
    ...\n```\n\nOn our system, a browser window opens automatically with a file tree\
    \ window (Figure [7-2](#606465_1_En_7_Chapter.xhtml#Fig2)). Select the `process-monitoring.ipynb`\
    \ file and open it. A new browser tab opens with the file's contents in a notebook\
    \ cell (Figure [7-3](#606465_1_En_7_Chapter.xhtml#Fig3)). To execute any cell\
    \ contents, use the toolbar or press `<Shift-Enter>` on the keyboard.\n\n![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig3_HTML.jpg)\n\
    \nA screenshot of the browser window displays the workspace under kernel with\
    \ a program from the process monitoring file in the Jupyter environment.\n\n**Figure\
    \ 7-3** Jupyter Notebook with an opened file\n\n![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig2_HTML.jpg)\n\
    \nA screenshot of the browser window displays the files under the Jupyter application.\
    \ The file name is `process-monitoring.ipynb` with a file size of 2.8 kilobytes.\n\
    \n**Figure 7-2** Jupyter Notebook file tree window\n\nNow execute the cell (Figure\
    \ [7-4](#606465_1_En_7_Chapter.xhtml#Fig4)), wait for a few minutes, and interrupt\
    \ execution (the kernel) from the toolbar (Figure [7-5](#606465_1_En_7_Chapter.xhtml#Fig5)).\
    \ Please note that the running indicator to the right of the Python kernel indicator\
    \ becomes filled when the code is being executed.\n\n![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig5_HTML.jpg)\n\
    \nA screenshot of a browser window displays the workspace under kernel with a\
    \ program from the process monitoring file in the Jupyter environment. The interrupt\
    \ execution button on the toolbar and a filled circle to the right denoting the\
    \ running indicator are highlighted.\n\n**Figure 7-5** Jupyter Notebook button\
    \ to stop cell execution"
  raw: '## Summary


    In this chapter, you looked at debugging implementation patterns in the context
    of the Python IDE and Visual Studio Code. You also learned how to connect it to
    WSL on Windows and to a cloud environment using SSH. The next chapter looks at
    a few more IDEs, including the one popular in machine learning environments; it
    also introduces debugging presentation patterns.


    Footnotes [1](#606465_1_En_6_Chapter.xhtml#Fn1_source)   [2](#606465_1_En_6_Chapter.xhtml#Fn2_source)
      [3](#606465_1_En_6_Chapter.xhtml#Fn3_source)


    # 7. Debugging Presentation Patterns


    In the previous chapter, you looked at debugging implementation patterns in the
    Python IDE Visual Studio Code context. In this chapter, you will look at another
    Python IDE, Jupyter Notebook and Lab, with a case study introducing a few more
    debugging analysis techniques and implementation patterns. Finally, after comparing
    Python CLIs and IDEs, you will discern a few basic debugging presentation patterns
    (Figure [7-1](#606465_1_En_7_Chapter.xhtml#Fig1)).


    ## Python Debugging Engines


    Modern Python debugging IDEs have similar debugging engines; for example, Visual
    Studio Code uses `debugpy`^([^(34)](#fn34)), which can also be used in the CLI
    mode, similar to the `pdb` module used in Chapter [5](#606465_1_En_5_Chapter.xhtml).
    It also has remote debugging capabilities via listening on an interface and port,
    allowing debug clients to connect. PyCharm^([^(35)](#fn35)) uses `pydevd`^([^(36)](#fn36))
    (which is also bundled with `debugpy`). Jupyter Notebook and Lab^([^(37)](#fn37))
    use `ipykernel`^([^(38)](#fn38)) to access `ipdb`^([^(39)](#fn39)) debugging functionality
    provided by IPython^([^(40)](#fn40)).


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig1_HTML.png)


    A screenshot lists the following steps. Elementary Diagnostics Patterns, Debugging
    Analysis Patterns, Debugging Architecture Patterns, Debugging Design Patterns,
    Debugging Implementation Patterns, Debugging Usage Patterns, and Debugging Presentation
    Patterns, which is highlighted.


    Figure 7-1


    Pattern-oriented debugging process and debugging presentation patterns


    ## Case Study


    You will use a similar Python code for this case study as in the previous chapter
    but you will adapt it to the Jupyter Notebook format (Listing [7-1](#606465_1_En_7_Chapter.xhtml#PC1)).
    Please note that Jupyter Notebook files can also be loaded and debugged in Visual
    Studio Code.


    To recall the previous chapter, the case study models a problem I observed with
    a monitoring script that, after time, shows increasing process memory consumption.


    ```

    class Processes:

    _singleton = None

    @staticmethod

    def __new__(cls):

    self = Processes._singleton

    if not self:

    Processes._singleton = self = super().__new__(cls)

    return self

    def __init__(self):

    pass

    _procinfo = {}

    def add_process(self, pid, info):

    Processes._procinfo[pid] = info

    def remove_process(self, pid):

    del Processes._procinfo[pid]

    class Files:

    def __init__(self):

    self._processes = Processes()

    self._count = 0

    def process_files(self):

    self._count += 1

    if self._count > 25:

    self._processes.add_process(self._count, "")

    import time

    procs = Processes()

    files = Files()

    for pid in range (1, 10):

    procs.add_process(pid, "info")

    while True:

    pid += 1

    procs.add_process(pid, "info")

    time.sleep(1)

    procs.remove_process(pid)

    time.sleep(1)

    files.process_files()

    Listing 7-1

    Memory Leak Example Adapted for Jupyter Notebook

    ```


    I suppose you are familiar with the Jupyter Notebook environment^([^(41)](#fn41)).
    If not, you can install it with a simple command (I use Windows for this case
    study, Python 3.11.4, and assume your Python environment is accessible via PATH):


    ```

    Chapter7>pip install notebook

    ...

    ```


    To start the Jupyter Notebook environment, use the following command:


    ```

    Chapter7>jupyter notebook

    ...

    [I 2023-08-13 13:45:59.513 ServerApp] Jupyter Server 2.7.0 is running at:

    [I 2023-08-13 13:45:59.513 ServerApp] http://localhost:8888/tree?token=2aae60bdf51574972f646f61f27a8bcb5416c08c2a835087

    [I 2023-08-13 13:45:59.513 ServerApp]     http://127.0.0.1:8888/tree?token=2aae60bdf51574972f646f61f27a8bcb5416c08c2a835087

    [I 2023-08-13 13:45:59.514 ServerApp] Use Control-C to stop this server and shut
    down all kernels (twice to skip confirmation).

    [C 2023-08-13 13:45:59.675 ServerApp]

    To access the server, open this file in a browser:

    ...

    Or copy and paste one of these URLs:

    http://localhost:8888/tree?token=2aae60bdf51574972f646f61f27a8bcb5416c08c2a835087

    ...

    ```


    On our system, a browser window opens automatically with a file tree window (Figure
    [7-2](#606465_1_En_7_Chapter.xhtml#Fig2)). Select the `process-monitoring.ipynb`
    file and open it. A new browser tab opens with the file''s contents in a notebook
    cell (Figure [7-3](#606465_1_En_7_Chapter.xhtml#Fig3)). To execute any cell contents,
    use the toolbar or press <Shift-Enter> on the keyboard.


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig3_HTML.jpg)


    A screenshot of the browser window displays the workspace under kernel with a
    program from the process monitoring file in the Jupyter environment.


    Figure 7-3


    Jupyter Notebook with an opened file


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig2_HTML.jpg)


    A screenshot of the browser window displays the files under the Jupyter application.
    The file name is process monitoring dot i p y n b with a file size of 2.8 kilobytes.


    Figure 7-2


    Jupyter Notebook file tree window


    Now execute the cell (Figure [7-4](#606465_1_En_7_Chapter.xhtml#Fig4)), wait for
    a few minutes, and interrupt execution (the kernel) from the toolbar (Figure [7-5](#606465_1_En_7_Chapter.xhtml#Fig5)).
    Please note that the running indicator to the right of the Python kernel indicator
    becomes filled when the code is being executed.


    ![](images/606465_1_En_7_Chapter/606465_1_En_7_Fig5_HTML.jpg)


    A screenshot of a browser window displays the workspace under kernel with a program
    from the process monitoring file in the Jupyter environment. The interrupt execution
    button on the toolbar and a filled circle to the right denoting the running indicator
    are highlighted.


    Figure 7-5


    Jupyter Notebook button to stop cell execution'
  trans: "\n# 总结\n\n在本章中，你了解了在 Python IDE 和 Visual Studio Code 环境下调试实现模式的相关内容。你还学习了如何将其连接到\
    \ Windows 上的 WSL 以及通过 SSH 连接到云环境。下一章将介绍更多 IDE，包括机器学习环境中常用的一种；同时还会引入调试呈现模式。\n\n\
    脚注 1 2 3\n\n# 7. 调试呈现模式\n\n在上一章中，你了解了 Python IDE Visual Studio Code 环境下的调试实现模式。在本章中，你将了解另一种\
    \ Python IDE——Jupyter Notebook 和 Lab，并通过一个案例研究介绍更多调试分析技术和实现模式。最后，在比较 Python CLI\
