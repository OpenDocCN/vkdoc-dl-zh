    commands, such as printing tracebacks and **Variable Values**. Here **Breakpoint
    Actions** help by associating debugger commands with **Code Breakpoints**. For
    example, you can print a traceback each time you hit the breakpoint and automatically
    continue (use `^C` to do **Break-in** again):


    ```

