    \ SPACEWAR 的傻瓜搞垮了系统。”*\n> \n> 埃里克·S·雷蒙德，《新黑客词典》第三版。\n\n当进程线程内部发生非法操作时，例如访问了其可用范围之外的内存，或向只读内存写入数据，操作系统会报告错误并终止该进程。它还可能将进程内存保存到内存转储文件中。随后，该进程会从可用进程列表中消失。\n"
- fmt: '# Hang


    > *1. To wait for an event that will never occur. “The system is hanging because
    it can’t read from the crashed drive.”*

    >

    > *2. To wait for an event to occur. “The program displays a menu and then hangs
    until you type a character.”*

    >

    > Eric S. Raymond, *The New Hacker’s Dictionary*, Third Edition


    Threads interact with other threads, including other processes’ threads. These
    interactions can be viewed as sending messages and waiting for the responses.
    Some processes may be critical because their threads process messages from many
    other threads from other processes. If threads from such a critical process stop
    sending responses, all other waiting threads are blocked. A deadlock is when two
    threads are waiting for each other. When hanging, the process continues to be
    present in the list of available processes. There are also processes (critical
    components) that, when their threads hang, block threads from many other processes
    (noncritical components). Figure [1-6](#606465_1_En_1_Chapter.xhtml#Fig6) depicts
    such components and their interaction abstracted via messages in the normal scenario,
    and Figure [1-7](#606465_1_En_1_Chapter.xhtml#Fig7) shows the abnormal scenario
    when noncritical components are blocked and waiting for responses because the
    critical components are deadlocked.


    ![](images/606465_1_En_1_Chapter/606465_1_En_1_Fig7_HTML.png)


    A block diagram of the critical and P I Ds. The critical consists of blocks P
    I D 20 and 80. T I D 20 of P I D 20 is interconnected with P I D 80, T I D 45
    of P I D 45, T I D 55 of P I D 55, and T I D 71 of P I D 70.


    Figure 1-7


    Blocked and deadlocked components


    ![](images/606465_1_En_1_Chapter/606465_1_En_1_Fig6_HTML.png)


    A block diagram of the critical and P I Ds. Critical consists of P I D 20 and
    80. T I D 20 of P I D 20 is interconnected with T I D 45 of P I D 45, T I D 55
    of P I D 55, and T I D 71 of P I D 70.


    Figure 1-6


    Request and response interaction between critical and noncritical system components


    # Summary


    In this chapter, you learned the fundamental vocabulary you will use in subsequent
    chapters. The next chapter introduces a pattern-oriented debugging approach.


    # 2. Pattern-Oriented Debugging


    This chapter introduces the pattern-oriented debugging process approach and the
    pattern languages you will use in subsequent chapters.


    ## The History of the Idea


    The idea of using patterns in debugging is not new^([¹](#fn1)). Earlier, such
    patterns came in two types: bug patterns^([²](#fn2)) and debug patterns^([³](#fn3)).
    Before 2000, only a few debugging-related patterns could be found, such as the
    Debug Printing Method^([⁴](#fn4)).


    Bug patterns are usually specific patterns for specific languages and platforms.
    By bugs, we mean software defects. Usually, these are related to the source code
    but can also be related to configuration and data models.


    Using source code as a starting point for debugging is only possible for a limited
    number of scenarios, such as when you have a Python stack trace. However, there
    are many cases when the starting point for source code investigation is unknown.
    Here, a well-defined process may benefit. A number of debugging processes were
    proposed in the past, including multidisciplinary approaches^([⁵](#fn5)).


    The phrase “pattern-oriented debugging” appeared around 1987-1988 in the context
    of patterns of process interaction^([⁶](#fn6)). It is not the same as the “pattern-oriented
    debugging process” proposed in 2014^([⁷](#fn7)) as further development of *unified
    debugging patterns* that were introduced in 2010^([⁸](#fn8)). Since then, these
    patterns have been used for successfully teaching Windows debugging of unmanaged
    (native, Win64, C, C++) and managed (.NET, C#) code^([⁹](#fn9)) for almost a decade,
    starting in 2013. Overall, this pattern-oriented approach can be traced to our
    earlier presentation published as a book in 2011^([^(10)](#fn10)). In it, we apply
    the same pattern-oriented process to Python debugging in cloud and machine learning
    environments.


    ## Patterns and Analysis Patterns


    Before looking at the debugging process, a few words about patterns in the context
    of diagnostics and debugging. By a *pattern*, we mean a common recurrent identifiable
    set of indicators (symptoms, signs). By an *analysis* pattern, we mean a common
    recurrent analysis technique and method of pattern identification in a specific
    context. By *pattern language*, we mean common names of patterns and analysis
    patterns used for communication.


    ## Development Process


    Let’s first look at the traditional software development process stages. Figure
    [2-1](#606465_1_En_2_Chapter.xhtml#Fig1) abstracts them from several development
    processes, including waterfall and iterative ones.


    ![](images/606465_1_En_2_Chapter/606465_1_En_2_Fig1_HTML.png)


    A stacked block diagram represents the software development process stages. The
    blocks are requirements, analysis, architecture, design, and implementation. A
    downward arrow is drawn from top to bottom along the blocks.


    Figure 2-1


    Stages of the typical software development process


    ## Development Patterns


    For each stage, there exists some pattern language such as a vocabulary of solutions
    to common recurrent identifiable problems with grammar, semantics, and pragmatics.
    Figure [2-2](#606465_1_En_2_Chapter.xhtml#Fig2) also includes software usage and
    presentation patterns for human-computer interaction. In this book, I assume you
    have familiarity with such pattern languages (some references are provided below).


    ![](images/606465_1_En_2_Chapter/606465_1_En_2_Fig2_HTML.png)


    A stacked block diagram represents the software development pattern languages.
    The blocks are requirements, analysis, architecture, design, implementation, usage,
    and presentation patterns. A downward arrow is drawn from top to bottom along
    the blocks.


    Figure 2-2


    Typical software development pattern languages'
