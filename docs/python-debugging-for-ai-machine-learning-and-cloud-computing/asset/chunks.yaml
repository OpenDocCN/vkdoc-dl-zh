    \n# 5. Debugging Implementation Patterns\n\nIn the previous chapter, I introduced\
    \ specific debugging analysis patterns in the context of several Python case studies.\
    \ In this chapter, you will look at specific debugging implementation patterns\
    \ in the context of the Python debugger, `pdb`. (Figure [5-1](#606465_1_En_5_Chapter.xhtml#Fig1)).\n\
    \n![](images/606465_1_En_5_Chapter/606465_1_En_5_Fig1_HTML.png)\n\nA stacked block\
    \ diagram of the pattern-oriented debugging process. Blocks from top to bottom\
    \ are elementary diagnostics, debugging analysis, debugging architecture, debugging\
    \ design, debugging implementation, debugging usage, and debugging presentation\
    \ patterns. The debugging implementation is highlighted.\n\nFigure 5-1\n\nPattern-oriented\
    \ debugging process and debugging implementation patterns\n\nI will skip architecture\
    \ and design debugging patterns since, for simple cases, you may not need to think\
    \ about them implicitly. Compare that to the implementation of a simple command-line\
    \ utility or script: you don’t usually use a heavy development process there explicitly.\
    \ In such a case, architectural and design decisions are already implicit, for\
    \ example, in the need to write a command-line utility. Also, when learning to\
    \ program, it is better to start with some concrete useful implementation examples.\
    \ Therefore, I will talk about debugging architecture and design patterns when\
    \ I have enough case studies to generalize and when I see some non-trivial problems.\n\
    \n## Overview of Patterns\n\nI now introduce debugging implementation pattern\
    \ language in the context of `pdb`, the Python debugger^([^(29)](#fn29)). This\
    \ pattern language is not specific to this debugger; the same pattern language\
    \ is applicable to many other command line^([^(30)](#fn30)) and IDE Python debuggers\
    \ and even to native operating system debuggers like `GDB` and `WinDbg`. Of course,\
    \ to implement these patterns, the debugger commands will be different."
