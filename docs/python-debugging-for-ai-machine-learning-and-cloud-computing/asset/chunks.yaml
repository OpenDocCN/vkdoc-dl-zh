    # 调试实现


    在复杂场景中，当你的代码规模更大且可能涉及第三方库时，你可能需要收集句柄的`Usage Trace`来查看是哪个线程创建了它们^(⁷⁴)。对于事后调试，你需要在运行
    Python 的计算机上通过 64 位全局标志（`gflags.exe`）启用`应用程序验证器`（图 11-3）。


    `gflags` 应用程序是 Windows 调试工具包的一部分，你可以将其作为 WDK 或 SDK^(⁷⁵) 的一部分下载并安装。你也可以将这些工具安装到另一台计算机上，然后将
