    dropdowns are on the left panel. It displays a program under the workspace on
    the right panel, where the expression line with length of processes dot processes
    dot underscore proc info greater than 100 is highlighted.


    Figure 6-13


    Setting the code breakpoint conditional expression


    After a few minutes, you had a new **Break-in** with the dot changed in shape.
    You can now repeat your **Variable Value** expression in the Debug Console. Please
    also note that the call stack has a reverse direction than the traceback (Figure
