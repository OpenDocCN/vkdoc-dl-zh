    ### 案例研究


    在本案例研究中，请使用上一章中的相同 Python 脚本。现在，连接到云实例后，您可以打开一个包含 Python 脚本的文件夹（*文件 ➤ 打开文件夹*）。如果您是首次打开或创建
    Python 文件，系统可能会提示您安装 Python VS Code 扩展。


    回顾一下，该案例研究模拟了我曾遇到的一个云主机监控脚本问题：该脚本运行一段时间后，会开始泄漏进程内存。


    要进行调试，请使用 F5 键（*运行 ➤ 启动调试*）启动 `process-monitoring.py`，并选择 *Python 文件* 配置（图 6-8）。


    ![](img/606465_1_En_6_Fig8_HTML.jpg)


    进程监控 py 窗口的截图，左侧面板上有多个图标。搜索框下方覆盖了一个下拉菜单，其中选中了“Python 文件 调试当前活动的 Python 文件”选项。


    图 6-8


    选择调试配置


    程序现在正在运行，您可以通过*调试*浮动工具栏上的*暂停*（F6）按钮进行**中断**（图 6-9）。


    ![](img/606465_1_En_6_Fig9_HTML.jpg)


    进程监控 py 窗口的截图，左侧面板上有多个图标。工作区下显示了一个程序，其中顶部工具栏的暂停按钮和左侧面板中调用堆栈旁边的“正在运行”字样被高亮显示。


    图 6-9


    运行中的程序与调试工具栏


    暂停后，在调用堆栈中选择合适的**作用域**，以便访问各种变量（图 6-10）。


    ![](img/606465_1_En_6_Fig10_HTML.jpg)


    进程监控 py 窗口的截图，其中带有标签的变量和调用堆栈下的主进程被高亮显示。工作区下显示了一个程序，其中第 14 行的“移除进程”被高亮显示。


    图 6-10


    调试作用域


    现在切换到*调试控制台*选项卡，输入表达式以检查 `Processes._procinfo` 字典大小的**变量值**（图 6-11）。


    ![](img/606465_1_En_6_Fig11_HTML.jpg)


    进程监控 py 窗口的截图，左侧面板上有变量和调用堆栈下拉菜单。右侧面板的工作区下显示了一个程序。代码下方显示的是 `len(processes._procinfo)`
    的值，为 21。


    图 6-11


    使用调试控制台检查变量值


    由于您知道字典的大小只会在运行一段时间后开始增加，请打开 `processes.py` 文件，并在 `add_process` 函数的第一行设置一个**代码断点**（图
    6-12）。


    ![](img/606465_1_En_6_Fig12_HTML.jpg)


    一个包含 processes.py 文件的窗口截图，左侧面板上有变量和调用堆栈下拉菜单。右侧面板的工作区下显示了一个程序，其中 `add_process`
    函数定义下的第 17 行设置了断点。


    图 6-12


    设置代码断点


    然后右键单击断点圆点，选择*编辑断点*，并指定仅在字典大小超过 100 时才命中的表达式（按 Enter 键设置条件）。您会看到圆点的形状发生了变化。再次使用*调试*工具栏（F5）继续执行并等待（图
    6-13）。


    ![](img/606465_1_En_6_Fig13_HTML.jpg)


    一个包含 processes.py 文件的窗口截图，左侧面板上有变量和调用堆栈下拉菜单。右侧面板的工作区下显示了一个程序，其中包含表达式 `len(processes._procinfo)
    > 100` 的行被高亮显示。


    图 6-13


    设置代码断点条件表达式


    几分钟后，您会再次**中断**，并且圆点的形状发生了变化。您现在可以在调试控制台中重复执行您的**变量值**表达式。另请注意，调用堆栈的方向与回溯相反（图
    6-14）。


    ![](img/606465_1_En_6_Fig14_HTML.jpg)


    一个包含 processes.py 文件的窗口截图，左侧面板上的调用堆栈下拉菜单、右侧面板工作区中程序的第 17 行以及调试控制台中的 `len(processes._procinfo)
    > 101` 被高亮显示。


    图 6-14


    条件中断


    现在移除该断点的条件表达式，并为 `remove_process` 函数创建另一个**代码断点**，在两个断点中都设置**断点操作**以记录 ADD 和 REMOVE
    消息（图 6-15）。


    ![](img/606465_1_En_6_Fig15_HTML.jpg)


    一个包含 processes.py 文件的窗口截图，左侧面板上有多个选项。右侧面板的程序中，`remove_process` 函数下的第 20 行设置了断点。下方高亮显示的“remove”一词的日志消息显示为
    21。


    图 6-15


    指定断点操作


    继续执行，您会看到日志消息中 ADD 消息的数量是 REMOVE 消息的两倍（图 6-16）。


    ![](img/606465_1_En_6_Fig16_HTML.jpg)


    一个包含 processes.py 文件的窗口截图，左侧面板上有多个选项。右侧面板的程序中，第 17 行和第 20 行设置了断点，调试控制台下的日志消息选项被高亮显示，内容为“2
    add, remove, 2 add, remove”。


    图 6-16


    日志消息


    我不知道它们的**使用跟踪**，也找不到像上一章使用 PDB 时那样打印回溯的可靠方法。但由于您使用的是 IDE 编辑器，您可以直接修改相关文件，并添加额外的调试变量以在*调试控制台*中打印（图
    6-17）。


    ![](img/606465_1_En_6_Fig17_HTML.jpg)


    一个包含 processes.py 文件的窗口截图，左侧面板上有多个选项。程序中第 19 行和第 24 行设置了断点，在变量 `tb` 中添加了回溯，以便在调试控制台下打印包含“remove”和“tb”字样的日志消息。


    图 6-17


    向日志记录添加回溯


    您需要从*调试*工具栏（Ctrl-Shift-F5）重新启动调试会话。重启后，继续执行，等待几分钟，然后暂停，检查日志中最后几条 ADD 和 REMOVE
    条目（图 6-18）。


    ![](img/606465_1_En_6_Fig18_HTML.jpg)


    一个包含 processes.py 文件的窗口截图，左侧面板上有多个选项。程序中第 19 行和第 24 行设置了断点。调试控制台窗口包含文件路径以及高亮显示的“add”字样。


    图 6-18


    生成使用跟踪


    从日志中，您可以看到来自 `filemon.py` 模块的 ADD 操作没有相应的 REMOVE 操作，这与上一章的建议相同。


