- fmt: '### Scope


    When you do **Break-in**, you are in a particular execution **Scope** that includes
    the currently executing function, its arguments, already defined local variables,
    and variables accessible from outer and global contexts. You can change the scope
    using the `up` (`u`) and `down` (`d`) commands to navigate up and down in the
    traceback of called functions. To see the current code location, you can use the
    `list` (`l`) command.


    ```

