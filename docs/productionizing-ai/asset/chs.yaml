  \n## 其他案例研究\n\n本章的最后一部分将探讨在之前未提及的其他重要行业和子行业中，适合进行人工智能创新的关键领域。\n\n### 公共部门与政府\n\n\
  对政府在人工智能应用方面的市场估值各不相同，从政府领域的 49 亿美元^(¹²⁹) 到全球人工智能治理市场的 10 亿美元^(¹³⁰)。虽然伦理和风险规避是首要考虑因素，但政府部门正越来越多地采用数据驱动的分析和人工智能方法来提供公共服务。许多相同的方法也被用于媒体广告和衡量公众看法。\n\
  \n除了关键的公民主参与应用（例如，通过仪表盘洞察行业绩效和公众情绪、聊天机器人 2.0、智能虚拟助手以及用于“公众之声”和提供个性化公共服务的情感分析）之外，通常还会开展数据项目来支持或引导政策制定，并提升信任度和公众认知。\n\
  \n人工智能的应用还帮助公共部门机构和组织通过文档处理和自动化等方式提高效率，并借助物联网设备的普及来应对激增的欺诈活动。同时，用于支持政策规划与制定以及提高生产力的更精细分析也日益显现，包括：\n\
  \n![](img/527966_1_En_8_Fig20_HTML.jpg)\n\n图示展示了公共部门和政府面临的挑战。它包括规划（供应、消费者需求）、公共服务交付（建筑、资源）以及社会流动性（医疗保健差距）。\n\
  \n**图 8-20** 政府在人工智能方面面临的挑战\n\n*   行业分析、政策制定、规划与交付\n*   行政与部门流程自动化\n*   政策文档检索与处理\n\
  *   异常检测，包括公共欺诈、健康问题和福利系统\n*   计量经济学预测与时间序列分析\n\n### 制造业\n\n前面描述的供应链中人工智能的许多应用也涵盖了制造业用例，工业\
  \ 4.0 旨在将物联网、云和分析结合起来，彻底改变生产和分销流程。\n\n安全库存水平、交付计划、供应链物流以及基础费用，都是在一个有抱负（即使尚未完全实现）的智能制造解决方案下的优化参数。仓库中区块链的使用也在增加，旨在提高可审计性，并使供应链更高效、更可靠。\n\
  \n理论上，人工智能模拟应有助于通过降低制造过程的刚性、动态纠正产品缺陷并鼓励产品即兴改进来减少产品召回。同样，如今利用人工智能应用可以更好地管理设备/机械故障对交付计划、预算和声誉的连锁影响。特别是预测性维护，结合大数据（通常是物联网数据）统计分析，可以实现更好的计划内维护（不影响交付）并减少未来故障。\n\
  \n鉴于这种对数字和数据的依赖，任何工业 4.0 解决方案如果不解决网络安全问题（我们下一小节的主题），在今天都是不完整的。\n\n### 网络安全\n\n对于\
  \ 2022 年的企业和组织来说，没有比网络安全更大的挑战了。\n\n如今，互联网已经真正渗透到每一个工业系统中，无论是在本地（生产）层面还是全球供应链层面。随之而来的是网络攻击风险的巨大增加，黑客试图获取信息，甚至更糟的是，控制有时与国家安全相关的高度战略性设施。除了关键的纵深防御安全层和提供强大的防火墙之外，机器学习和深度学习正被用来防御这些极具破坏性、实时、动态的网络安全攻击。\n\
  \n我们已经在第 7 章的动手实验室中研究了一个网络安全用例，该实验室部署了一个用于检测网络安全 DDoS 攻击的已训练机器学习模型的 API 端点。读者可参考该实验室，特别是模型训练过程（步骤\
  \ 4），该步骤展示了如何使用各种网络参数作为特征来识别网络活动中的模式，这些模式可能构成例如来自网络入侵事件的雨滴恶意软件。^(¹³¹)\n\n\n\n###\
  \ 保险/远程信息处理\n\n保险公司的商业模式正在发生变化，人工智能正在迅速重塑该行业，并改变多项客户和内部服务：\n\n-   风险评估与风险管理，转向基于风险的定价\n\
  -   客户细分定位\n-   个性化服务\n-   定制保费与承保费用\n-   理赔管理与运营流程自动化\n\n作为对传统精算方法的补充，利用来自车载远程信息处理的海量（富含客户行为）大数据进行动态的基于风险的定价，是汽车/车队保险领域一个特别令人兴奋的领域。然而，人工智能在所有保险领域的应用是显而易见的，例如通过社交媒体倾听客户声音，并根据捕获的客户态度数据，创造敏感、引人入胜或差异化的客户体验。\n\
  \n### 法律\n\n法律行业正在经历一场由人工智能技术带来的变革，尤其是在研究活动和合同方面。^(¹³²)\n\n详尽的分析超出了本文档的范围，但我们在图\
  \ 8-21 中展示了一个关键的综合应用，该应用正被用于帮助法律文件数字化，并支持搜索、检索和归档流程——即通过 OCR（光学字符识别）进行文档分类和文本提取。\n\
  \n![](img/527966_1_En_8_Fig21_HTML.png)\n\n该框架展示了不同类型的模块、子流程、关键技术和集成点，以及模块的主要功能或目的。这些模块包括导入文档、扫描文档、准备图像数据、深度学习和文本提取。\n\
  \n**图 8-21** 法律人工智能：通过 OCR 进行文档分类和文本提取实现文件数字化\n\n### DALL-E 在创意艺术领域的应用：动手实践\n\n\
  **生成式人工智能——从自然语言想象数字图像**\n\n本章我们还有一个实验——逐步实现人工智能领域最激动人心的发展之一：OpenAI 的 DALL-E。\n\n\
  `DALL-E` 由一个自编码器（参见第 5 章）和一个变换器（第 8 章）组成——本质上，通过输入自然语言，我们可以随意召唤出任何图像。虽然本章没有讨论创意艺术行业的应用，但其应用显而易见：例如，从设计和时尚到建筑。\n\
