  \ 需求预测\n        2.  优化运输零件（从四个供应商到三个制造商）和交付产品（从三个制造商到四个仓库）的成本\n5.  使用决策优化器完成规范优化过程后，运行（Shiny）仪表板应用，并查询库存、需求与供应以及物流视图\n\
  6.  练习 – 将仪表板上的产品类别从数字更改为名称\n7.  拓展练习 – 安排每月一次使用新数据重新训练和运行模型\n\n## 石油和天然气/能源与公用事业解决方案\n\
  \n能源行业涵盖了价值链上的许多不同企业，从石油和天然气巨头到分销公司、发电厂和可再生能源运营商（REC）、公用事业公司和能源零售商。我们将在下面探讨 AI 的机遇。\n\
  \n### 能源、石油和天然气行业面临的挑战\n\n在当前供应减少、供应链紧张和价格飙升的环境下，能源行业若对 AI 作为创收和成本优化的推动力关注不足，也是情有可原的。但\
  \ AIaaS（AI 即服务）仍有大量机会来释放价值，尤其是在分布式能源链和可再生能源领域。AIaaS 在石油和天然气领域也在增加价值，因为寻找安全、经济和可持续的勘探与生产方法，以及减少石油生产对环境的影响，是关键关注点。\n\
  \n早在当前的能源危机之前，企业就已经被遗留的（ETRM）工具和糟糕的创新实践所拖累。能源行业变革步伐缓慢的部分原因在于，员工队伍在统计上趋于老龄化，同时中层管理人员臃肿，他们担心变革会影响自己的工作与生计。其他人则对使用新兴技术存在伦理担忧，尽管其中许多工具早已不再是“新兴”技术。\n\
  \n不断变化的劳动力人口结构开始推动对数据驱动创新的需求，以及利用 AI 摆脱落后、低效业务流程的需求。事实上，能源价值链上并不缺乏数据——挑战在于如何处理所有这些数据，以及如何处理在整个能源供应链中呈指数级增长的物联网传感器数据。\n\
  \n\n### 能源领域的人工智能解决方案——机遇还是威胁？\n\n能源领域多种力量的日益融合，近期催生了快速原型设计以及加速人工智能解决方案交付的趋势。当前趋势正从旧的垄断体系，转向一个由人工智能生态系统中同类最佳但高度集成的数字解决方案组成的异构平台；这些解决方案通常更便宜、更小巧，且更多采用开源方式。\n\
  \n规模较小或“微型人工智能”解决方案的交付速度更快，而单一云端的“大型科技”解决方案在某种意义上已变得“过于庞大”且成本过高。人工智能带来的生产力提升已变得难以忽视，并且可能引发一种破坏性的不良文化，尤其是当与旧有流程的性能基准对比显示出令人信服的优势时。\n\
  \n风险/资产管理工具，例如嵌入了机器学习、可通过`fbprophet`或循环神经网络实现“一键式”客户/负荷/价格预测的客户风险引擎，正开始变得普遍——即便不作为生产级解决方案，至少也作为原型`python/Dash`脚本出现。后台办公的\
  \ CRPA 和文档检索解决方案也已显现，例如用于天然气/电力政策搜索、结算、计费以及合同管理。而交易支持解决方案，包括算法交易、自动化市场分析以及支持“假设”情景分析的智能系统，正被用于提升前台盈利能力。\n\
  \n上述许多在零售领域应用的预测性人工智能工具，在能源领域也证明了自己的价值，例如结合社交媒体情绪分析的“实时”客户决策引擎、聊天机器人和智能虚拟助手、自动化客户服务交付，以及反映批发市场动态和能源新闻的仪表盘与报告解决方案。同样，上一节提到的具有强大求解能力的供应链优化解决方案，通常也适用于从上游能源源头，经输配渠道到供应商，再到下游客户的交付规划、优化调度和路径规划。\n\
  \n边缘人工智能是另一个令人兴奋的应用领域，它能够及时利用日益去中心化、分布式的资产发电和消费（例如风力涡轮机、太阳能电池板、热泵和小型电池储能）。\n\n![](img/527966_1_En_8_Fig16_HTML.jpg)\n\
  \n一幅插图展示了能源领域人工智能解决方案的概览，包括风险与资产管理、客户与市场参与、高性能优化以及投资回报率加速器。\n\n**图 8-16** – 能源领域的人工智能解决方案\n\
  \n### 医疗保健与制药解决方案\n\n虽然人工智能在能源领域的部署可能落后于其他一些行业，但医疗保健和制药行业的情况却并非如此。消费者出于监测、比较和改善个人健康与健身的目的，对健康科技或数字健康产品与服务表现出参与热情，这推动了该领域大量的人工智能创新。\n\
  \n### 医疗保健——人工智能鸿沟\n\n医疗保健行业以极快的速度运转，有时似乎几乎没有时间去研究更好的做事方法。从本质上讲，护理优先于创新，这可能导致突破性的技术解决方案无法到达可能需要它们的医生、顾问和患者手中。\n\
  \n数字化的快速发展为医疗保健专业人员提供了利用低延迟、易用、高度可视化、交互性强且信息丰富的预测分析支持的机会，有助于缩小财务和效率差距。\n\n尤其是在医疗保健支持职能方面，由人工智能主导的文化转变——从临时、执行不佳的运营流程、过于复杂的非标准流程、主观/有偏见/武断的决策以及人为错误中转变出来——有助于释放价值，无论是帮助减少或控制不断膨胀的医疗采购成本，还是实现针对患者的营销，例如针对制药/天然健康产品的营销。\n\
  \n### 医疗保健与制药解决方案\n\n从 NHS 支持服务到心理健康试验，聊天机器人和智能虚拟助手在整个医疗保健领域越来越引人注目。自 Cortana 时代以来，对话助手或聊天机器人已经取得了长足的进步，智能虚拟助手结合自然语言处理和文档检索，为健康管理者和顾问提供（并接收^(¹²¹)）自动化知识转移，有助于实现更全面的决策支持系统和更好的患者预后/“脉搏检查”。^(¹²²)\n\
  \n自然语言生成也是一项有趣的人工智能创新，它可以简化患者治疗前后的文书工作、行政活动以及预约安排。利用 GPU 或集群支持的机器学习进行采购成本预测——例如，使用`Databricks`、`Apache\
  \ Spark`和`fbprophet`，跨多个医疗设施、多种药品生产线或患者手术所需的设备进行预测——也可以显著降低当地医院或药房的预算成本。\n\n预测只是机器学习在医疗保健和制药行业应用的一个方面。数据驱动的药物发现、临床试验、患者诊断，以及应用于\
  \ X 光或 MRI 扫描的（深度学习）图像分类技术，正在为医生和护士提供宝贵的“第二意见”支持。^(¹²³)\n\n## 人力资源解决方案\n\n在我们最后一个聚焦的人工智能用例中，注意力将转向\
  \ 2022 年人工智能服务的一个关键业务职能——人力资源。\n\n### 2022 年的人力资源\n\n人力资源分析市场预计将以 14.2%的年复合增长率增长至\
  \ 63 亿美元，因为雇主们正在应对不确定的后疫情未来以及员工对工作的觉醒情绪和态度。但只有 21%的人力资源领导者认为其组织能有效利用数据来为人力资源决策提供信息。^(¹²⁴)\n\
  \n在人口结构变化、数字颠覆、新冠疫情以及如今生活成本螺旋式上升带来的不确定性时代，人力资源高管们正在寻找易于获取的数据和人力资源分析解决方案，以实现更好的人才管理和支持，减少招聘和工作场所中的偏见，并帮助提高员工绩效和降低离职率。\n\
  \n如果企业人工智能要取得成功，公司从人力资源领域的挑战以及预测分析能够提供帮助的地方入手，不失为一个好的起点。如图 8-17 所示，我们看到这些当前的挑战（以及相关的人力资源分析解决方案）可分为反映员工旅程的三个领域：招聘、人才管理/人力资本管理和员工体验。\n\
  \n![](img/527966_1_En_8_Fig17_HTML.jpg)\n\n一幅插图基于挑战（招聘、入职与在职培训、能力与精通）和支持工具（招聘、人力资本管理和员工体验）描绘了\
  \ 2022 年的人力资源状况。\n\n**图 8-17** – 2022 年人工智能在人力资源领域的应用\n\n如下文所述，管理数据洪流并确保绩效指标不具侵入性，是当今创建\
  \ 360 度员工分析解决方案的主要挑战。人力资源领域的人工智能解决方案既可以帮助员工管理工作量平衡，也可以通过告知人力资源部门谁积极主动、谁想做更多、谁接近倦怠、谁需要更多帮助或支持来发挥作用。如果使用得当，这些指标还可以通过定义可实现的目标并帮助员工实现这些目标，从而提高员工基于任务的效率和专注度。\n\
  \n\n\n### 人力资源解决方案示例\n\n仪表盘是大家最喜爱的分析工具，对于人力资源高管而言，它对于覆盖员工旅程的各个方面至关重要，包括招聘关键绩效指标、员工在职指标（如工作效率和远程办公）^(¹²⁵)、考勤^(¹²⁶)与纪律监督，以及员工流失和公司反馈。^(¹²⁷)\n\
  \n市场上最佳的人力资源仪表盘之一来自 Agile Analytics，它提供了 20 多个内置的描述性和预测性 `PowerBI` 报告视图。\n\n如图 8-18\
  \ 所示，有多种机器学习应用，包括应用于候选人信息（领英、简历）的 OCR、NLP 和文本分析。深度学习有助于职位描述扫描（或基于 NLG 的职位描述创建）以及起草员工合同，而\
  \ NLP 支持的偏见消除也有助于确保公平的招聘政策。\n\n![](img/527966_1_En_8_Fig18_HTML.jpg)\n\n图示描绘了员工生命周期的概览。它包括：招聘分析、绩效分析、缺勤分析、培训分析以及员工流失与离职分析。\n\
  \n**图 8-18** 人力资源分析（Agile Analytics）\n\n无代码/低代码用户界面在人力资源经理中越来越受欢迎，为他们提供了非技术性、直观的途径来访问预测性分析和员工建模。聊天机器人和智能虚拟助手有助于实时了解“员工体验”、收集对组织变革和公司文化的反馈、进行员工情绪和情感“温度检查”，并识别潜在的员工流失。如今的智能虚拟助手还具备搜索自动化功能^(¹²⁸)，并与后端系统集成，例如用于查询内部职位空缺或公司政策。\n\
  \n在入职方面，可以基于人口统计、技能组合和心理测评分数，利用推荐引擎为员工职业发展提供内部内容个性化推荐。异常检测有助于识别员工态度和行为中的警示信号。\n\n\
  ### 人力资源员工流失：动手实践\n\n**掌握员工流失情况**\n\n本练习的目标是在 Jupyter Notebook 中使用 Python，运行 `AutoAI`\
