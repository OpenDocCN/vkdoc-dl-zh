  \ 30 个时间步长的预测。\n\n## 调优深度学习模型\n\n本章的最后一部分，我们将介绍我们可用的众多“性能增强”杠杆，以构建一个可靠的深度学习模型。\n\
  \n##### 激活函数\n\n如前几节所述，神经元使用激活函数根据加权输入信号产生输出信号。因此，实际上，激活函数是对神经元输出的简单映射，其中神经网络中的加权输入被求和并通过激活（或传递）函数。\n\
  \n术语“激活”与神经元被激活的阈值以及相应输出信号的强度有关。简单感知机中使用的 Heaviside 阶跃函数是一种简单的阶跃激活函数，如果求和输入超过 1，则神经元将输出值\
  \ 1。\n\n![](img/527966_1_En_5_Fig24_HTML.jpg)\n\n模型图展示了激活/传递函数架构。它包括输入、权重、激活和输出。\n\
  \n**图 5-24**\n激活/传递函数架构（显示 Heaviside 阶跃函数）\n\n我们在实践中实际使用的四种主要的非线性激活函数提供了更丰富的功能：\n\
  \n#### （逻辑）Sigmoid 函数\n\nSigmoid 激活函数具有特征性的“S”形曲线，用于二分类问题。实值输入被“压缩”/映射到 0 到 1 的范围内，表示特定二元输出的概率。\n\
  \n#### 双曲正切函数 (tanh)\n\n`Tanh`（发音为“tanch”）也是一个“S”形曲线，但这次重新调整了逻辑 sigmoid 函数。输出范围从\
  \ -1 到 1。由于 `tanh` 的梯度比 sigmoid 更强，因此作为激活函数，`tanh` 通常比 sigmoid 更受青睐。\n\n#### 修正线性单元\
  \ (ReLU)\n\n`tanh` 和 sigmoid 都容易出现“饱和”或梯度消失的问题。因此，深度学习模型中最常用的激活函数是更简单的修正线性单元（`ReLU`）。`ReLU`\
  \ 通过其更简单的数学运算，对负值返回 0，对正值返回 `x`，从而加速了随机梯度下降（将在下一节介绍）的收敛。\n\n在 `ReLU` 激活导致“死亡神经元”（即神经元变得不活跃，对任何输入都输出\
  \ 0）的情况下，有时会使用一种变体，即 `Leaky ReLU`。`Leaky ReLU` 对于负值有一个小的斜率（设置为超参数^(⁷⁴)），而不是平坦的斜率。\n\
  \n需要指出的是，`leaky ReLU` 并不总是优于 `ReLU` – 如果使用 `ReLU` 激活的模型性能良好，请坚持使用它。\n\n#### Softmax\n\
  \nSoftmax 激活函数（或归一化指数函数）是多类分类问题的一个特例，其中输出是离散的（非二元）的，例如大多数图像分类问题（例如，图像是人、建筑物、车辆、道路等）。\n\
  \n`Softmax` 将 logits（神经网络的最后一层）转换为总和为 1 的概率。\n\n![](img/527966_1_En_5_Fig25_HTML.jpg)\n\
  \n图示展示了包括形状和公式在内的激活函数：sigmoid、tanh、阶跃函数、soft plus、E L U、Log of Sigmoid、Mish、Sinc、Swish、ReLU、Soft\
  \ sign、Leaky ReLu。\n\n**图 5-25**\n激活函数 – 形状和公式\n\n\n\n### 梯度下降与反向传播\n\n`梯度下降`是训练神经网络的主要过程。它本质上是一种通过更新神经网络中的权重来最小化**损失**（或**代价函数**）的方法。^(⁷⁵)\n\
  \n对于大多数大数据问题，使用的是**随机梯度下降（SGD）**——每次迭代并非使用整个数据集，而是使用数据的一个样本。\n\n随后执行**前向传播**^(⁷⁶)，输入数据通过网络进行变换，通过隐藏层激活神经元，最终产生一个输出值。然后将此输出与期望（实际）输出进行比较，并计算误差。\n\
  \n#### 反向传播\n\n当上述误差逐层通过网络反向传播时，就会发生`反向传播`，并且权重会根据其对误差的贡献程度进行更新。\n\n该过程反复调整权重，以最小化实际输出与期望输出之间的差异，并对训练数据中的所有行/样本重复此过程（一个**周期**）。神经网络通常会在多个周期上进行训练，通常以\
  \ 100 个周期为上限。\n\n![](img/527966_1_En_5_Fig26_HTML.jpg)\n\n权重与成本之间的抛物线。它说明了`梯度下降`过程，该过程包含诸如成本导数、增量步长、初始权重、最小成本和梯度等因素。\n\
  \n图 5-26\n\n用于最小化神经网络损失的`梯度下降`过程\n\n### 其他优化算法\n\n在实践中，`随机梯度下降`可能会陷入局部最小值，或者收敛时间过长，因此会使用更复杂的变体来获得更好的模型性能。\n\
  \n#### 带动量的随机梯度下降\n\n正如我们在上一节中看到的，`随机梯度下降`解决了`梯度下降`的一个大内存劣势（加载整个数据集来计算损失导数）。`带动量的随机梯度下降`是对基础`SGD`算法的增强，有助于在正确方向上加速梯度向量，从而加快收敛速度。\n\
  \n#### AdaGrad、Adadelta 和 RMSProp\n\n`SGD`需要手动调整网络的学习率，这可能既慢又繁琐——以下三种算法能更有效地更新网络权重。\n\
  \n`AdaGrad`或`自适应梯度算法`是另一种随机优化方法，它试图通过使学习率适应网络参数（权重）来解决这个问题。\n\n另一方面，`Adadelta`使用指数移动平均学习率，以避免`AdaGrad`中学习率过小/收敛缓慢的问题。\n\
  \n`均方根传播（RMSProp）`与`Adadelta`类似，处理`AdaGrad`中学习率急剧下降的问题，但它还将学习率除以梯度平方的指数衰减平均值。\n\n\
  #### Adam\n\n**Adam**（源自**自适应矩估计**）通常是深度学习中的优化算法选择。为了更快地收敛（使用此算法可能是在几分钟、几天或几个月内获得高质量结果的关键），`Adam`同时使用`动量`来加速随机梯度下降过程，以及`自适应学习率`来在训练阶段降低学习率。\n\
  \n`Adam`结合了`AdaGrad`和`RMSProp`算法的最佳特性，以处理噪声问题上的稀疏梯度。\n\n### 损失函数\n\n在我们继续探讨提高深度学习性能的最佳实践之前，让我们更仔细地研究一下神经网络中“损失”或代价函数的概念。\n\
  \n在深度学习中最小化损失函数等同于最小化训练误差或降低神经网络/权重校准过程的成本。\n\n三种最常见的损失函数是用于二分类的**二元交叉熵**、用于多分类的**稀疏分类交叉熵**以及用于回归的**mse（均方误差）**，但与深度学习中的所有事物一样，存在多种变体，在某些条件下可以提供更好的结果：\n\
  \n表 5-1\n\n损失函数比较\n\n| 损失函数 | 类型 | 描述 | 优点 | 缺点 |\n| --- | --- | --- | --- | ---\
  \ |\n| 平方误差 (L2) 损失 / 均方误差 (MSE) | 回归 | 实际值与预测值之差的平方 | 通过平方来惩罚大误差 | 对异常值不鲁棒 |\n\
  | 绝对误差损失 / 平均绝对误差 (MAE) | 回归 | 预测值与实际值之间的距离 | 与 MSE 相比，对异常值更鲁棒 | 对大误差的惩罚可能不足 |\n\
  | Huber 损失 | 回归 | 结合 MSE 和 MAE - 对于小误差是二次的，否则是线性的 | 比 MSE 对异常值更鲁棒 | 收敛速度较慢 |\n|\
  \ 二元交叉熵 | 二分类 | 使用对数损失和 Sigmoid 函数 | 非常适合二分类模型 | Sigmoid 可能饱和并导致梯度消失 |\n| 铰链损失 |\
  \ 二分类 | 主要用于支持向量机 (SVM) | 惩罚错误预测以及低置信度的正确预测 | 仅限于 SVM 模型 |\n| 多类交叉熵损失 / 分类交叉熵 |\
  \ 多分类 | 二元交叉熵损失的推广 | 适用于独热编码的目标变量 | 每个样本应具有多个类别或用软概率标记 |\n| 稀疏分类交叉熵 | 多分类 | 分类交叉熵的稀疏目标变量分类版本\
  \ | 通过为类别使用单个整数来减少内存和计算开销 | 仅适用于互斥的类别 |\n| KL 散度损失 | 多类交叉熵损失 | 衡量一个概率分布与另一个概率分布的差异程度\
  \ | 基于概率 | 更常用于逼近复杂函数，而非多分类 |\n\n### 提高深度学习性能\n\n上述深度学习模型的内部工作原理有助于理解“引擎盖下”发生的事情，而所描述的用于改进结果的选项在某种程度上是实验性的，与我们所面对的具体数据集以及业务或组织问题密切相关。\n\
  \n然而，如果我们着手提高神经网络性能，应该从哪里开始呢？我们应该采用最佳实践方法，几乎总是从（并以）审查底层数据开始：^(⁷⁷)\n\n1.  审查数据\n\
  \    *   创造更多数据\n    *   重新缩放数据\n    *   转换数据\n    *   特征选择\n2.  引入更复杂的算法\n3.  调整超参数\n\
  4.  尝试算法集成\n5.  获取更多数据\n\n除了这些实现更高模型性能的核心原则外，还应在模型维护中内置定期重构，以确保代码尽可能高效，并且（Python）库和函数未被弃用。\n\
  \n### 深度学习最佳实践 – 超参数\n\n上述高级步骤具有参考价值，但在数据审查过程用尽之后，我们具体可以使用哪些超参数来调整和校准模型输出呢？下面我们将这些超参数分为两类：网络调整和过程调整。^(⁷⁸)\n\
  \n#### 网络调整\n\n##### 更深的网络/更多层/更多神经元\n\n添加更多隐藏层/每层更多神经元意味着我们向模型添加了更多参数，从而使模型能够拟合更复杂的函数。\n\
  \n##### 激活函数\n\n如上所述，通常在**CNN**中，外层使用`ReLU`来解决梯度消失问题，并结合`Sigmoid`（二分类）或`Softmax`（多分类）。对于`RNN`，使用`tanh`来克服梯度消失问题，因为它的二阶导数可以在归零之前维持较长的范围。\n\
  \n\n\n### 神经网络集成\n\n与随机森林是决策树模型的增强版以防止机器学习中的过拟合类似，我们可以在深度学习中采用集成方法——使用不同模型配置的多个神经网络来防止同样的问题。然而，这确实会带来训练和维护多个模型的计算开销。更好的方法是使用下文所述的丢弃法。\n\
  \n### 批量归一化\n\n深度神经网络的训练过程也对初始随机权重和学习算法的配置很敏感。对网络层的输入进行归一化（`批量归一化`）可以通过对数据进行中心化和缩放，帮助人工神经网络运行得更快、更稳定。\n\
  \n### 池化\n\n卷积神经网络中的多个卷积层可以非常有效，既能学习低级特征（例如线条），也能学习高级特征，如外层中的形状或特定物体。\n\n然而，这些“特征图”与输入中特征的**精确**位置紧密相关。这种“不灵活性”可能导致对于微小的图像变化（如裁剪、旋转、平移）产生不同的特征图，从而导致模型对新数据的泛化能力下降。\n\
  \n池化（通过池化层实现）用于对卷积神经网络中的卷积层进行下采样，并避免过拟合于精确的图像特征。这种输入信号的低分辨率版本仅保留重要的结构元素，类似于机器学习中“剪枝决策树”的效果。\n\
  \n### 图像增强\n\n图像数据增强用于人为地扩大卷积神经网络训练数据集的大小。其理念是，在更多数据上训练意味着模型更熟练。使用 Keras 中的 `ImageDataGenerator`\
  \ 类来生成增强图像的批次，我们可以通过多种方式实现这一点：\n\n*   图像的随机旋转\n*   图像内物体的平移\n*   剪切（沿轴扭曲）\n*   图像翻转（例如，上下翻转）\n\
  \n![](img/527966_1_En_5_Fig27_HTML.jpg)\n\n一张猫的增强图像，包含 8 个图像数据集，这些数据集由原始图像的旋转、偏移和扭曲副本组成。\n\
  \n**图 5-27** Keras 中的图像增强，使用原始图像的旋转、偏移或扭曲副本来增强图像数据集\n\n## 过程调优\n\n### 轮数与批量大小\n\n\
  增加轮数（对整个训练集的完整采样）通常会产生更好的性能，但仅限于一定程度。当验证（测试）准确率下降而训练准确率仍在上升时，这应该为轮数设置一个上限，否则我们本质上是在过拟合模型。与其反复试验，我们可以通过实施早停标准来控制轮数设置过高的问题，以避免在训练集上过拟合。\n\
  \n我们的批量大小——前向传播中使用的输入数据样本的大小——是我们可以使用的另一个杠杆。使用过大的批量大小会对泛化产生负面影响，也就是说，网络的测试准确率会更差，因为我们在训练过程中减少了梯度下降的随机性。对于较大的数据集（例如，>\
  \ 10,000 张图像），经验法则是首先使用默认值 32，如果模型欠拟合或训练时间过长，则增加到 64、128 和 256。\n\n### 学习率\n\n学习率是一个超参数，用于影响梯度下降过程的速度。设置过高意味着算法会来回震荡而无法达到局部最小值，而设置过低则收敛可能需要很长时间。\n\
  \n### 正则化\n\n正则化是一种修改学习算法的通用技术，目的是使模型更好地泛化，即避免过拟合。在机器学习中，正则化惩罚特征系数，而在深度学习中，正则化惩罚节点/神经元的权重矩阵。\n\
  \n正则化系数（一个超参数）控制正则化——如果这个正则化系数过高，以至于某些权重矩阵几乎等于零，我们就会得到欠拟合。L1 和 L2 是最基本的正则化类型，它们通过添加另一个称为正则化项的项来更新通用代价函数：\n\
  \n![](img/527966_1_En_5_Fig28_HTML.jpg)\n\n一个说明适当模型拟合的示意图。它在 y 轴和 x 轴之间形成一个侧抛物线。\n\
  \n**图 5-28** 适当的模型拟合\n\n`代价函数 = 损失 + 正则化项`\n\n### 丢弃法\n\n当数据集相对较小时，深度学习神经网络容易过拟合。丢弃法是一种计算成本低且有效的正则化方法，用于减少过拟合并改善泛化误差。实际上，丢弃法通过在训练期间随机丢弃节点（神经元），在单个模型中模拟了大量不同的网络架构。^(⁷⁹)\n\
  \n丢弃法的一个良好起点是将其设置为 20%，如果模型影响很小，则增加到例如 50%。设置过高会导致欠拟合。\n\n![](img/527966_1_En_5_Fig29_HTML.jpg)\n\
  \n两个模型示意图说明了丢弃法。标准神经网络和应用丢弃法后的标准神经网络。标准神经网络具有相同的神经元或节点，而应用丢弃法后，绿色神经元与红色神经元混合。\n\n\
  **图 5-29** 丢弃法示意图 ([`medium.com`](http://medium.com))\n\n### 早停\n\n我们应该在验证数据集上的性能开始下降时停止训练，例如，通过以下方式：\n\
  \n*   在给定轮数内指标无变化\n*   指标的绝对变化\n*   在给定轮数内观察到的性能下降\n*   在给定轮数内指标的平均变化\n\n这在 Keras\
  \ 中使用 `EarlyStopping` 函数实现。下面的示例监控并试图最小化各轮次的验证损失：\n\n```\nEarlyStopping(monitor='val_loss',\
  \ mode='min')\n```\n\n![](img/527966_1_En_5_Fig30_HTML.jpg)\n\n一个显示轮数与误差的折线图。折线图在停止训练后上升。\n\
  \n**图 5-30** Keras 中的早停\n\n### 迁移学习\n\n迁移学习实际上是深度学习模型的“加速器”——本质上，我们是将一个预训练模型作为另一个（不同但相关）模型的起点。在深度学习中，它常用于减少从头开发神经网络模型所需的计算量，有许多研究模型常用于迁移学习：\n\
  \n*   牛津 VGG 模型\n*   谷歌 Inception 模型\n*   微软 ResNet 模型\n    *   另请参见 [`https://github.com/BVLC/caffe/wiki/Model-Zoo`](https://github.com/BVLC/caffe/wiki/Model-Zoo)\n\
  \nVGG 模型用于我们上述动手实验中的迁移学习练习（使用 Keras 和 TensorFlow 的卷积神经网络）。\n\n\n\n### 总结\n\n我们刚刚详细探讨的穷举式神经网络和流程调优显然十分复杂。所描述的最佳实践技术往往相当模糊，可用的选项范围及可配置的设置也难以确定，尤其是在需要相对快速获得结果的情况下。但快速取胜总是可能的，只要采用结构化的方法并迭代监控性能，坚持追求更好的结果通常都会得到回报。\n\
  \n虽然本章内容已近尾声，但下一章我们将探讨如何将深度学习的最佳实践与训练（及测试）自动化相结合，以帮助加速机器学习和深度学习模型的微调过程。不过在此之前，我们将通过两个深度学习模型调优实验来结束本章。\n\
  \n### Softmax：动手实践\n\n使用 Softmax 激活 Logits\n\n**简单的动手实验，了解 Softmax 激活函数如何接收最后一个神经网络层，并将输出转换为总和为\
