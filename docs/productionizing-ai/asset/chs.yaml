  \n### 分支与合并\n\n简化的“分支”是 `Git` 成为迄今为止最广泛使用的版本控制系统的主要原因之一。\n\n下图展示了从主仓库创建分支（到一个开发“dev”分支）以进一步开发代码的过程——项目中的另外两名开发人员正在添加功能请求。第一位开发人员进行了一些小修改，并将其代码更改合并到开发（dev）分支，而另一位开发人员则继续处理他们的功能，将合并推迟到以后。\n\
  \n一旦开发（错误修复和功能请求）完成，将在 dev 分支上进行测试，然后最终提交（回）到主仓库。\n\n![](img/527966_1_En_2_Fig10_HTML.jpg)\n\
  \n一个表示 Git 中开发分支的图表。分支从主仓库开始，并进一步包含开发层和 2 个功能层。\n\n图 2-10\n\nGit 中的开发分支\n\n### Git\
  \ 工作流\n\nGit 工作流是将代码和数据的更改放入仓库的方法。代码和数据可以通过四个基本的“层”：工作目录（通常是本地用户机器）、暂存区、本地仓库和远程仓库（通常在\
  \ GitHub 本身上）。\n\n虽然工作目录中的文件可以处于三种可能的状态：已暂存、已修改和已提交，但由于 `Git` 是一个分布式版本控制系统，而不是集中式系统，某些命令（例如提交）每次执行时不需要与远程服务器通信。如下图所示，下方显示了相应的工作流和\
  \ `git` 命令。\n\n![](img/527966_1_En_2_Fig13_HTML.jpg)\n\n一个表示 `git` 命令、源和目标的表格。`git`\
  \ 命令包括 `git add`、`commit`、`push`、`fetch`、`merge` 和 `pull`。\n\n图 2-13\n\nGit 命令\n\
  \n![](img/527966_1_En_2_Fig12_HTML.jpg)\n\n一个 Git 工作流涉及工作目录、暂存区、本地仓库和主仓库。`git` 命令中包含\
  \ `git add`、`commit`、`push`、`merge`、`fetch` 和 `pull`。\n\n图 2-12\n\nGit 工作流\n\n![](img/527966_1_En_2_Fig11_HTML.png)\n\
