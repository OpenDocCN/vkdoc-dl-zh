  \n## AI 项目生命周期\n\n### 从设计思维到敏捷开发\n\n在了解了从实验到产品化的有效方法之后，如何从头开始实施一种方法呢？\n\n激烈的竞争迫使组织需要快速改变战略，这促使公司仔细审视自身的能力和流程，并识别出适应性和创新方面的障碍与益处。采用最初的**设计思维**方法有助于驾驭这种颠覆性的格局，确保业务利益相关者、流程、工具、系统和数据接触点都被纳入范围。\n\
  \n**设计思维**作为一种创造性的问题解决过程，其关注点是人而非工具。如果做得好，一个关键成果就是产生一组项目来交付“正确的事情”。这些项目本身并不足以保证成功部署——但它们通常会融入\
  \ DataOps 的基石之一——专注于“把事情做对”的**敏捷**开发和交付。图 9-4 阐释了这一概念：\n\n![](img/527966_1_En_9_Fig4_HTML.jpg)\n\
  \n该图解释了三个圆圈，分别是：探索问题、构建正确的事情、把事情做对。每个圆圈内分别提到了设计思维、精益和敏捷。\n\n**图 9-4** 设计思维、精益与敏捷（来源：Jonny\
  \ Schneider）\n\n### 通过假设驱动开发\n\n在 AI 项目中，敏捷开发是什么样的？**假设驱动开发**是一种原型方法论，它允许解决方案架构师（以及数据科学家和\
  \ AI 工程师）开发、测试并重建一个产品，直到用户满意为止。\n\n该过程高度迭代，它获取项目期间定义的假设，并尝试通过用户/客户反馈来验证这些假设。与“传统”的需求捕获（后者容易产生类似于“瀑布”方法中的错误）相比，这些假设更具演进性，它们认识到世界是复杂、多变且常常令人困惑的。\n\
  \n如图 9-5 所示，总体思路是尽早并频繁地进行实验，征求客户反馈，并舍弃那些益处甚微的功能。\n\n![](img/527966_1_En_9_Fig5_HTML.jpg)\n\
  \n该图由六个呈椭圆形排列的圆圈组成。在椭圆形的中间，有七个六边形。\n\n**图 9-5** IBM Garage 假设驱动开发\n\n### 协作、测试、衡量、重复\n\
  \n正如本章引言中提到的，2010 年代雇佣数据专家的公司缺乏远见，导致了**技术债务**的巨额积累。结果并非完全集成的 AI（利益相关者！）和解决方案，而是系统在缺乏维护、监控和更新的流程与工具的情况下被部署。^(¹³⁶)\n\
  \nDataOps 中的**持续测试**是帮助解决这些问题的一种手段。表面上，它旨在预先建立对数据的信任，并在信任丧失之前减少识别和修复问题所需的时间：\n\n\
  - **版本控制** – 使用 `git`、GitHub 来改善协作。\n- **自动化测试** – 自动化测试：帮助加速创新生命周期和变更流程。\n- **衡量错误**\
  \ – 跟踪并降低月度生产错误率。\n- **跟踪生产力** – 对流程改进和交付时间进行基准测试。\n\n\n\n### 持续流程改进\n\n在人工智能项目中，我们究竟如何追踪生产力并衡量流程改进的基准？\n\
  \n商业智能仪表盘非常适合报告 DataOps 的关键绩效指标，尤其是在嵌入自动化编排来收集和展示指标的情况下。\n\n例如，可以构建一个 `CDO` 仪表盘来追踪和监控以下指标的进展：\n\
  \n- **团队协作** – 为每个团队项目创建“厨房”\n- **错误率** – 随着测试成熟度和测试数量的增加，错误率应随时间推移而下降\n- **生产力**\
  \ – 通过测试数量和数据管道步骤（关键点）来衡量\n- **部署** – 例如，追踪平均部署周期时间、服务等级协议违规趋势的减少\n- **测试** – 测试数量应随时间推移而增加，更稳健的质量控制也应日益普及\n\
  \n![](img/527966_1_En_9_Fig6_HTML.jpg)\n\n该水平条形图标题为龙卷风图。条形图的负侧表示为运营影响。条形图的正侧表示为解决所需的小时数。\n\
  \n**图 9-6** – DataKitchen 龙卷风图，展示生产问题的运营影响及其解决所需时间\n\n### 数据漂移\n\n任何用于交付和部署人工智能解决方案的持续改进周期，在面对部署后的接口/数据变化时也需要具备弹性，包括稳健的数据漂移缓解和模型重新训练。\n\
  \n模型性能随时间推移而下降通常归因于以下两者之一：(a) 数据（或协变量）漂移，或 (b) 概念漂移，即数据分布与原始训练集的分布出现显著偏差：\n\n- **数据漂移**\
  \ 指的是特征漂移，以及特征之间关系随时间变化的可能性\n- **概念漂移** 指的是目标变量的变化\n\n管理模型漂移的推荐方法是实施 DataOps/MLOps\
  \ 最佳实践，并追踪底层数据的变化，包括特征之间的相关性，例如，可以在一个单独的 Python 追踪脚本中，或者在一个运营（而非战略/CDO）仪表盘中实现。\n\
  \n![](img/527966_1_En_9_Fig7_HTML.jpg)\n\n该图表绘制了准确率与月份的关系。一条虚线穿过图表，用于确定可接受的性能阈值。\n\
  \n**图 9-7** – 因数据漂移导致的模型随时间推移的性能下降（来源：[`www.kdnuggets.com`](http://www.kdnuggets.com)）\n\
  \n### 自动重新训练\n\n一旦我们开始追踪数据漂移，就需要实施一个流程来确保我们的模型保持有效/高性能。理想情况下，这应该是自动化的——要实现基于数据/模型漂移的自动重新训练流程，主要有两种选择：\n\
  \n**定时重新训练**\n\n1.  在每日结束流程中，从训练集中归档最旧的一天，并加入新一天的数据\n2.  每月（如果数据特别动态，则每天）安排一次重新训练流程\n\
  3.  评估新性能，并检查是否优于之前的运行\n4.  使用 `cron` 任务/任务调度器，或者例如 `AWS CloudWatch Event` 来触发数据准备、训练、评估和部署的\
  \ Step Function 编排\n\n**基于性能/动态重新训练**\n\n1.  收集新的每日训练数据\n2.  自动监控模型在生产环境中对新数据的性能，并判断其是否突然表现不佳\n\
  3.  测量平均预测值和标准差。如果预测值在特定时间间隔内下降 10%，或者超出例如 2 或 3 个标准差，则触发一个并行的重新训练运行\n4.  通过定时调度的\
  \ `AWS Lambda`/`Step Functions`，或 `IBM Watson Machine Learning` 持续学习来管理重新训练\n5.\
  \  持续追踪所有历史重新训练运行（例如，使用 `Databricks` 中的 `MLFlow`），以确保性能（`fbeta`、`recall`/`precision`、`loss`/`accuracy`\
  \ 等）不会随时间推移而下降\n\n### 在 Heroku 上托管 – 端到端：动手实践\n\n从开发到生产\n\n我们的下一个实验将获取一个样板应用，并将其作为\
  \ Heroku 托管的应用程序推送到云端：\n\n1.  在 [`www.heroku.com/`](http://www.heroku.com/) 上注册\
  \ Heroku\n2.  在 Heroku 中创建一个新应用，区域选择欧洲，例如 `my-heroku-app`\n3.  安装 Heroku CLI\n4.\
  \  克隆下方链接中的样板应用程序：\n\n    [`https://github.com/bw-cetech/apress-9.2.git`](https://github.com/bw-cetech/apress-9.2.git)\n\
  \n5.  按照第 7 章所述设置虚拟环境并安装依赖项\n6.  练习 – 尝试在本地运行该应用\n7.  在本地驱动器上 `cd` 进入克隆的应用后，在终端中使用\
  \ `heroku login` 登录 Heroku，然后按顺序输入以下命令推送到 Heroku：\n\n    ```\n    git status # 本地仓库应已初始化\n\
  \    git add .\n    git commit -am \"updated python runtime to heroku supported\
  \ stack version 3.9.7\"\n    git push heroku master\n    ```\n\n8.  最后，通过访问网址 [`https://my-heroku-app.herokuapp.com/`](https://my-heroku-app.herokuapp.com/)\
  \ 或在终端中输入 `heroku open` 来打开你的 Heroku 应用\n9.  练习：仍在终端中，尝试重命名你的应用\n\n## 赋能工程与基础设施\n\
  \n人员、流程和工具是任何最佳实践框架（包括将人工智能应用投入生产）的三大基石。从人工智能云栈开始，我们将在本小节中简要探讨如何将前几章讨论的一些工程和基础设施工具整合成一个连贯的人工智能解决方案。\n\
  \n### 人工智能生态系统 – 人工智能云栈\n\n如第 3 章所述，成功的人工智能需要端到端的云基础设施，尤其是用于处理大数据的敏捷（可扩展且弹性）服务，涵盖数据摄取、收集、处理、存储、查询到数据可视化。除了数据处理，“纵向扩展”的可扩展性和“横向扩展”的弹性是处理用户流量以及最终人工智能应用特定使用模式的关键支持资源需求。\n\
  \n无论我们的解决方案是由胖客户端应用还是瘦客户端提供，关键的存储（或数据），例如数据湖或 NoSQL 数据库，以及计算，例如虚拟机或 Apache Spark，都将服务于我们在开发和最终部署项目时所使用的基础人工智能服务和工具。图\
  \ 9-8 描述了这种人工智能支持基础设施的生态系统。\n\n![](img/527966_1_En_9_Fig8_HTML.jpg)\n\n图像上出现一组三个对话框，标题分别为人工智能服务、人工智能基础设施和人工智能工具。人工智能基础设施包含子标题人工智能数据和人工智能计算。\n\
  \n**图 9-8** – 人工智能生态系统：基础设施、工具和服务\n\n\n\n### 数据湖部署 – 最佳实践\n\n如今，许多希望实施企业级人工智能的公司都致力于构建一个数据湖，该数据湖能够持续刷新其多个数据流，同时优化性能和拓扑结构。\n\
  \n并非每家公司都能[负担得起构建数据湖的成本](https://www.trellance.com/the-cost-of-building-a-data-warehouse-for-an-analytics-platform/)，但即使单一工具难以企及，尽可能复制数据湖架构也是实现生产级敏捷性的最佳方式，同时还能避免数据仓库、关系型与非关系型数据库、大数据引擎、机器学习工具和日志文件等资源之间出现多重（且通常是冗余的）数据流。为了解决这些问题，例如\
  \ `dremio` 推荐以下最佳实践设计：\n\n- **采用以数据湖为中心的设计** – 将数据湖视为单一事实来源\n- **计算与数据分离** – 实现成本节约\n\
  - **最小化数据副本** – 减少治理开销\n- **确定高层级数据湖设计模式** – 支持用户层级和合规性\n- **保持开放、灵活和可移植** – 确保架构可变更/面向未来，支持多云环境\n\
  \n![](img/527966_1_En_9_Fig9_HTML.jpg)\n\n中心轮图显示为 AWS 数据湖。周围七个点分别显示为关系型数据库、非关系型数据库、机器学习、数据仓库、日志分析和大数据处理。\n\
  \n**图 9-9** – 作为集中式单一事实来源的数据湖 (`dremio`)\n\n### 数据管道运营与编排\n\n为了了解这在实际中如何运作，值得看一个案例研究。以下架构以\
  \ Azure Data Lake Storage (`ADLS Gen2`) 为核心，展示了一家游戏公司如何运行复杂的分析。^(¹⁴¹)\n\n底层业务场景是：一家游戏公司从游戏日志中收集\
  \ PB 级的（用户）数据，并希望分析这些日志以深入了解客户偏好、人口统计信息和使用行为。通常，本地数据存储会保存参考/主数据，例如（敏感的）客户详细信息、游戏\
  \ ID 和营销活动数据。\n\n该公司的次要目标可能包括识别追加销售和交叉销售机会、开发引人注目的新功能、推动业务增长以及提供更好的客户体验 (`CX`)。\n\
  \n此案例中的目标架构^(¹⁴²)（图 9-10）使用 Azure Data Factory（非常适合其基于云的 ETL 和数据集成服务）来（自动）编排数据驱动的工作流/管道，启动一个从\
  \ `ADLS Gen2`（批处理数据）和 `Kafka`（流式数据）获取数据的 Spark 集群（Azure HDInsight），然后将转换后的数据发布到\
  \ Azure SQL 数据库，用于下游报告。\n\n![](img/527966_1_En_9_Fig10_HTML.jpg)\n\n流程图显示两个输入数据：历史/批处理数据和流式数据。第一个输入流经摄取、存储、预处理、服务并提供给\
  \ Power BI。\n\n**图 9-10** – 用于 PB 级数据处理和分析的现代架构 (Azure)\n\n## 大数据引擎与并行化\n\n我们已经在前面章节中探讨过分布式处理和集群的使用，并在第\
  \ 5 章中探讨过作为大数据处理引擎的 Apache Spark。\n\n作为分布式、横向扩展数据处理的事实标准，Apache Spark 自然适用于需要（PB\
  \ 级）大数据处理的人工智能应用，但其基于 Scala 的语法和可用性，即使通过 `PySpark`（用于实现 Apache Spark 的 Python 库/封装器），也比像\
  \ `pandas` 这样的标准 Python 库要复杂一些。\n\n然而，除了直接使用 Apache Spark 之外，还有其他选择，例如 Koalas——它将用户友好的\
  \ `pandas` 风格数据框操作与高性能的 Apache Spark DataFrame 分布相结合^(¹⁴³)。\n\n`Dask`——一个用于扩展 Python\
  \ 的平台，与 Spark 类似，可以从单节点扩展到数千节点集群——是另一个替代方案，我们现在将介绍它。\n\n### Dask\n\n`Dask` 的功能比\
  \ Spark 少，体积更小，因此比 Spark 更轻量。它也没有 Spark 那种对统一应用计算的高层优化，但 `Dask` 确实有其优势：^(¹⁴⁴)\n\n\
  - 使用 Python 而非 Scala 编写\n- 与 `Pandas` 和 `Scikit-learn` 等其他 Python 库集成性强\n- 侧重于 Python\
  \ 集成，而非 Apache 项目集成\n- 将计算移至数据所在位置，而非相反\n\n`Dask` 基于两个关键概念工作：延迟/后台执行和惰性执行，用于堆叠转换/计算以实现并行处理。我们将在下面的动手实验中探讨这两者。\n\
