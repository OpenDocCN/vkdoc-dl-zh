  \n2.  按照此处步骤 1-4 在 AWS 中创建访问密钥：[`https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.xhtml`](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.xhtml)\n\
