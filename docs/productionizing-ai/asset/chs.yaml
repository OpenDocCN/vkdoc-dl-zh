  \n### PyTorch NLP：动手实践\n\n使用 PyTorch 进行文本分类\n\n本实验的目标是通过将文本示例作为一系列字符读取，然后使用 PyTorch\
  \ 构建并训练一个循环神经网络（RNN），来预测姓氏来自哪种语言\n\n1.  将以下链接中的两个文件上传到 Jupyter 笔记本：\n\n    [`​github.​com/​bw-cetech/​apress-10.​3b.​git`](https://github.com/bw-cetech/apress-10.3b.git)\n\
  \n2.  将 `PyTorch_Functions.py.txt` 文件重命名，去掉 `.txt` 扩展名，以转换为 Python 脚本^(¹⁸³)\n\n\
  3.  打开 `.ipynb` 文件\n\n4.  使用以下命令安装 PyTorch：\n\n    ```\n    import torch\n    ```\n\
  \n5.  运行笔记本，将 PyTorch RNN 函数（位于 `PyTorch_Functions.py` 中）导入到笔记本中\n\n6.  执行所示的练习：\n\
  \    1.  显示一个三维（随机）张量以测试 PyTorch 库的导入\n    2.  下载此问题的训练数据字典（18 种不同语言的姓氏），解压并在 Jupyter\
  \ 工作目录中重命名\n    3.  显示葡萄牙语字典中的最后五个名字，以测试 PyTorch 自定义函数\n    4.  观察模型在测试集上的性能（如下图所示），并将预测结果和损失似然输出（测试样本名称属于某种语言的概率）导出为\
  \ csv 文件\n\n7.  练习（拓展） – 调整导入的数据字典集，以解决不同的 NLP 分类器问题，例如预测 (a) 名字到性别、(b) 字符到作者或 (c)\
  \ 城市到国家等。\n\n## NLP 工具与应用\n\n在本最后一章的最后一节中，我们将介绍一些知名的开源和工业级 Python 库，然后分析当今使用的主要自然语言应用和工具。最后，我们将通过最终的动手实验，解决一些关键的\
  \ NLP 用例和工具，包括一个端到端的聊天机器人部署，我们将使用 Watson Assistant 开发用户对话树，并将我们的应用推送到 IBM Cloud。\n\
  \n\n\n### Python Libraries\n\n实现自然语言处理的主要库有哪些？我们在表 10-1 中列出了通用 NLP 的主要库，以及一些用于特定行业应用的专用库。\n\
  \n**表 10-1 Python NLP 库**\n\n| 库/工具 | 描述/主要用途 | 独特卖点 | 缺点 |\n| --- | --- | --- |\
  \ --- |\n| `NLTK` | NLP 领先平台，支持句子检测、分词、词形还原、词干提取、句法分析、组块分析和词性标注。提供 50 个语料库和词汇资源的\
  \ UI | 作为最常用的 Python NLP 库，功能全面 | 运行速度慢，不支持神经网络 |\n| `TEXTBLOB` | 通过将`TextBlob`对象视为\
  \ Python 字符串，访问常见的文本处理操作 | 为 NLP/DL 准备数据，易于使用的 UI | 运行速度慢，不适合大规模生产 |\n| `CORENLP`\
  \ | 斯坦福开发的一套用于语言分析的人类语言技术工具 | 速度快，用 Java 编写 | 底层语言需要安装 Java^(¹⁸⁴) |\n| `SPACY` |\
  \ 专为生产环境设计，帮助开发者创建能处理/理解大量文本的 NLP 应用 | 处理大数据，支持多语言 | 与`NLTK`相比缺乏灵活性 |\n| `PYTORCH`^(¹⁸⁵)\
  \ | Facebook 开源的`PyTorch`是一个基于 API 的框架，用于扩展 Torch 深度学习库^(¹⁸⁶) | 执行速度快，支持计算图 | 核心\
  \ NLP 算法复杂 |\n| `GENSIM` | 用于主题建模、文档索引和大型语料库相似性检索的专用库 | 内存独立，支持大于 RAM 的数据集^(¹⁸⁷)\
  \ | 无监督文本建模有限，需与其他 Python 库集成 |\n\n其他具有特定优势的库，如`Pattern`和`PyNLPl`（发音为 Pineapple），分别用于网络数据挖掘和文件格式处理；而`sumy`、`pysummarization`和`BERT\
  \ summarizer`则擅长文本摘要。^(¹⁸⁸)\n\n虽然并非专门用于自然语言处理的工具，但另外两个重要的 Python 库是`Twitter API`^(¹⁸⁹)和用于\
  \ Facebook Insights API 的`facebookinsights`封装器。这些库的用例——社交媒体情感（和指标）分析——将在下文讨论，而第\
  \ 8 章将提供`Twitter API`的动手实验。\n\n### NLP 应用\n\n电子邮件/垃圾邮件过滤器、词云^(¹⁹⁰)、文字处理器中的自动更正以及编程中的（代码）自动补全，是自然语言处理最早且现已成熟的一些应用。但直到最近，上述\
  \ Python 库与云计算的结合，才解锁了对海量非结构化数据进行更高价值自然语言处理的能力。\n\n无论是从非结构化数据中提取商业价值、进行深度文档信息搜索与检索、加速内部研究或尽职调查流程、提高报告生产力与内容创作，还是寻求与覆盖性认知机器人流程自动化（CRPA）目标的协同效应，企业都在争相建立内部\
  \ NLP 能力以交付价值。\n\n虽然许多流行的“千万亿级”NLP 加速器可能才刚刚开始投入使用，我们现在来审视一下主流 NLP 商业和组织应用当前的成熟度水平。\n\
  \n#### 文本分析\n\n文本分析或文本挖掘涉及从数据中提取高质量信息。它本质上是更复杂的非结构化数据分析（包括文本转语音和情感分析）的使能器，其关键增值在于能够在训练过程中增强特定领域的数据/语料库^(¹⁹¹)，以改进分类任务。\n\
  \n微软可能是此领域的领导者之一，特别是其`Azure Cognitive Services`，它包含了丰富的文本分析功能，包括`Content Moderator`和`Language\
  \ Understanding`（`LUIS`）。`IBM Watson Knowledge Catalog`也是一款领先产品。\n\n##### 文本转语音与语音转文本\n\
  \n文本转语音（以及语音转文本）现在是一个成熟且竞争激烈的市场。市场领导者包括`Amazon Polly`和`API Cloud Service IBM Watson\
  \ Text to Speech`。^(¹⁹²)\n\n#### 社交媒体情感分析/意见挖掘\n\n情感分析/意见挖掘是一种上下文文本挖掘，用于从源数据中识别和提取主观信息。该技术主要与社交媒体渠道相关联，企业（以及政府/政治家）直接或间接地使用它来了解其品牌的社会情感、客户之声（VoC）或衡量公众看法。\n\
  \n如今的情感分析已超越简单的正面和负面情感指标——监听或监控（实时）在线对话可以触发对讨论类别、概念和主题以及情绪检测的相关关键洞察分析。\n\n所有全球零售商、快速消费品行业和电信行业都依赖于对情感分析结果的复杂捕捉——大多数应用依赖于通过`Python`的`tweepy`或`snscrape`库访问`Twitter\
  \ API`，和/或通过`facebookinsights`封装器访问`Facebook Insights`。第 8 章将提供一个使用`Twitter API`进行社交媒体情感分析的动手实验。\n\
  \n![](img/527966_1_En_10_Fig10_HTML.jpg)\n\n一个仪表图显示了悲伤、中性和快乐三种表情符号。指针指向快乐表情符号。\n\
  \n**图 10-10** 社交媒体情感分析\n\n#### 聊天机器人、对话助手和 IVA\n\n作为自然语言处理最著名的应用，如今的聊天机器人可以进行交互式对话，并标配了先进的语音识别和文本转语音功能。\n\
  \n自`Cortana`早期以来，聊天机器人技术已大幅改进。智能虚拟助手（IVA）内置了 AI 训练、认知和自我学习能力，并能适应上下文，利用最新的 Transformer\
  \ 技术。\n\n如今部署聊天机器人的商业价值集中在客户旅程和客户体验的阶梯式改进上——具有快速、低成本解决问题的明显潜力。\n\n无论是`Amazon Alexa`、`Apple`的`Siri`、`Google`的\
  \ IVA 生态系统（`Meena`/`DialogFlow`/`LaMDA`）、`IBM Watson`、`Azure LUIS`和`QnA Bot`，还是`Rasa`，自然语言处理和深度学习都被结合起来，以最佳方式匹配/学习用户的“意图”和“实体”到对话“语料库”中。\n\
  \n\n\n### NLP 2.0\n\n上一节已经讨论了自然语言转换器（Transformer）的无限潜力，但下面我们将关注近期在顶尖（SOTA）NLP 技术方面的其他进展，这些技术预计将在不久的将来成为核心的企业级应用。\n\
  \n#### 自然语言生成\n\n自然语言生成是对自然语言的**产生**，而非**解释**。尽管有些原始，但自动补全功能就是 NLG 的一个例子。\n\n广泛的行业应用案例包括：数字营销内容创作、金融/医疗报告生成、新闻业、电商/零售中的产品标签、旅行信息更新以及客户服务优化。\n\
  \n尽管 NLG 已经存在多年，但 Transformer 日益强大的参数化能力带来了输出质量的巨大提升，尤其是在 AI 生成报告的可信度方面。\n\n谷歌的\
  \ `Smart Compose`、`Arria` 和 `WordSmith` 是支持自然语言生成的三大领先工具^(¹⁹³)，但正如我们将在本章末尾的动手实验中看到的，我们也可以使用\
  \ GPT-3 Transformer 来生成文本，例如根据食材生成菜谱。\n\n#### 辩论\n\n计算讨论、论证和辩论技术的成熟度已达到机器能够可信地与人类辩论的程度。^(¹⁹⁴)\n\
  \nIBM 的 `Project Debater` 被誉为“首个能在复杂话题上与人类辩论的 AI 系统”，它由四个核心模块组成：论点挖掘、论点知识库（AKB）、论点反驳和辩论构建，其中前两个模块为辩论提供内容。^(¹⁹⁵)\
  \ 该工具使用了与 Transformer 内在机制类似的序列到序列和注意力机制，并且在开场演讲等方面，与人类（非专家）演讲及其他 NLP Transformer（如\
  \ GPT-2）相比，获得了良好的评价。\n\n![](img/527966_1_En_10_Fig11_HTML.jpg)\n\n该图展示了“补贴学前教育”的输入，分组进入论点挖掘和知识库。论点知识库通过原则性引导和情感关键词响应，进入反驳模型。这些模型为辩论构建提供基于语料库的、原则性的和反驳性的论点，最终生成演讲。\n\
  \n**图 10-11** IBM Project Debater 系统架构\n\n#### 自动 NLP\n\n自然地，鉴于机器学习和深度学习领域全面自动化的趋势，自动化\
  \ NLP 生命周期中涉及的众多步骤成为了关注焦点。\n\n`Hugging Face` 是该领域的领导者，其 `AutoNLP` 工具集成了 `Hugging\
  \ Face Hub` 中大量的数据集和预训练^(¹⁹⁶)的 SOTA Transformer 模型。`NeuralSpace` 是另一家，它提供多语言支持，可使用\
  \ `AutoNLP` 训练 87 种语言的模型。^(¹⁹⁷)\n\n`auto-nlp` Python 库还在现有 Python NLP 包（如 `spaCy`）之上提供了一个抽象层和低代码功能，其方式与\
  \ `auto-sklearn` 为 `sklearn` 机器学习提供低代码自动化类似。`AutoVIML`（自动变体可解释机器学习）是另一个用于 Auto-NLP\
  \ 的 Python 库，它自动化了预处理、语言分析（词干提取和词形还原等）和向量化步骤。\n\n### 总结\n\n在了解了这些 NLP 趋势之后，我们将通过几个动手实验来完成这最后一章关于自然语言处理的内容，这些实验聚焦于\
  \ 2022 年的一些主流应用和工具。这些实验将带领我们结束这段旅程，并为《使用云和 Python 实现 AI 解决方案的生产化》一书画上一个实际的句号。不过，在最后的几页中，我们还有一些结束语。\n\
  \n本书反复出现的一个主题是实施 AI 时所采用的实验水平，以及有时基于（云）成本的变通方法。并非每家公司都有预算来满足高性能计算实例或高吞吐量、安全存储的成本。当前\
  \ AI 解决方案实施的环境以及市场力量的集中可能意味着这些挑战在未来几年仍将持续，但在最后几页中，我们将探讨可能改变游戏规则的创新，这些创新或许能让更广泛的生态系统摆脱云服务提供商（CSP）的引力束缚。\n\
  \n### WATSON Assistant 聊天机器人/IVA：动手实践\n\n面向对话式 AI 的人力资源对话配置\n\n作为 Gartner 企业级对话式\
  \ AI 魔力象限的领导者，且 IBM Watson 用户在三年的时间内实现了 337%的投资回报率^(¹⁹⁸)，Watson Assistant 是 IVA\
  \ 自动化领域的行业领先工具之一。\n\n本练习的目标是在 Watson Assistant 上创建一个 HR IVA，该 IVA 利用不断增长的用户交互来重新训练并改进对用户关于求职申请和公司内部政策问题的回答：\n\
  \n1.  访问链接^(¹⁹⁹) `https://eu-de.assistant.watson.cloud.ibm.com/` 并使用您的 IBM ID 登录。如果被重定向到\
  \ IBM Cloud，请输入登录详细信息或注册。\n\n2.  选择屏幕左上方（LHS）的“Assistant”选项 > 创建 Assistant\n\n3.\
  \  添加对话技能 > 上传技能，并从以下链接上传 json 对话文件\n\n    `https://github.com/bw-cetech/apress-10.4.git`\n\
  \n4.  打开新创建的 Assistant，观察用户意图（这些是用户问题的主题，如组织结构、薪资、投诉、行政、幽默等）和**实体**（用户问题的主题，如团队、人员、服务、薪酬、额外福利：股票/股份/养老金等）\n\
  \n5.  对话已预先配置好——使用下面的对话进行测试^(²⁰⁰)\n\n    第一部分（求职咨询）\n\n    ```\n    你好\n    能告诉我我的求职申请进度吗\n\
  \    空缺职位\n    技术岗\n    是的\n    ```\n\n    第二部分（公司政策）：\n\n    ```\n    你能帮我了解股票期权吗\n\
  \    员工有折扣价吗？\n    ```\n\n    第三部分（幽默）：\n\n    ```\n    我可能快死了，我的寿险、工资和养老金如何支付给我的家人？\n\
  \    不\n    再见\n    ```\n\n6.  **练习** – 将对话替换为面向在线零售商的典型客户支持 IVA\n\n7.  **练习（进阶）**\
  \ – 通过向您的 Watson Assistant 添加网页聊天集成来推送到 IBM Cloud（API 详情显示在 Assistant UI 上的“查看 API\
  \ 详情”下）\n\n8.  **练习（进阶）** – 向您的 Watson Assistant 添加 WhatsApp（通过 Twilio）集成\n\n9.\
  \  **练习** – 设置一个应用程序例程，该例程每月根据最新的用户对话自动重新训练 NLP 模型\n\n\n\n### 面向聊天机器人的 Transformer\
  \ 模型：动手实践\n\n#### 使用 GPT-3 进行自然语言生成\n\n在最后一个实验中，我们将使用 OpenAI 预训练的 GPT-3（生成式预训练 Transformer）模型来：(a)\
  \ 根据用户输入的食材生成烹饪食谱（采用“零样本”训练，即不向模型提供任何示例）；(b) 实现一个“讽刺”风格的聊天机器人（采用“少样本”训练，即向模型提供有限数量的示例进行训练）：\n\
  \n1. 在 OpenAI 官网注册账号 [`openai.com/join/`](https://openai.com/join/)，并在仪表盘右上角“个人”菜单下获取提供的\
  \ API 密钥。\n\n2. 克隆以下 GitHub 仓库：  \n   [`github.com/bw-cetech/apress-10.4b.git`](https://github.com/bw-cetech/apress-10.4b.git)\n\
  \n3. 将 OpenAI API 密钥复制并粘贴到`openai_credentials.py`文件中字符串的双引号内。\n\n4. 在 Colab 中按步骤运行\
  \ Python 笔记本：\n   1. 安装`openai`，然后注释掉该代码。\n   2. 导入库。\n   3. 将 OpenAI 凭据文件拖放到 Colab\
  \ 临时存储中。\n   4. 定义 GPT-3 Transformer 函数——该函数将对接高性能 GPT-3 `text-davinci-002`引擎。\n\
  \   5. 调用该函数，根据苹果、面粉、鸡肉和盐这些基本食材生成一份食谱。\n\n5. 练习——将食材改为例如：新鲜罗勒、大蒜、松子、特级初榨橄榄油、帕玛森芝士、螺旋面、柠檬、盐、胡椒、红辣椒片和烤松子^(²⁰¹)，然后再次调用该函数生成一份意面食谱。\n\
  \n6. 双击写入 Colab 临时存储的`receipe.txt`文件，验证生成的食谱。\n\n7. 练习（进阶）——修改代码，确保 GPT-3 模型生成的食谱不会被截断。\n\
  \n8. 使用相同的 GPT-3 Transformer 模型，继续运行最后两个单元格，这两个单元格提供了“讽刺”语境的示例^(²⁰²)，然后调用（相同的）GPT-3\
  \ Transformer 函数。该函数会针对上下文示例/聊天机器人文本中的最后一个问题“现在几点了？”（该问题为空^(²⁰³)）返回一个（NLG 生成的）“讽刺”回答。\n\
