  ### 深度学习工具\n\n在继续探讨如何在 Python 中实现人工神经网络之前，我们先了解一些支持深度学习所需的主要库和工具。\n\n### 深度学习工具\n\
  \n粗略浏览最新的 [TIOBE 编程社区指数](https://www.tiobe.com/tiobe-index/) 即可发现，Python 持续流行，截至\
  \ 2022 年 6 月，它仍然是排名第一的软件编程语言。\n\n作为机器学习和深度学习的“首选”编程语言，与所有主要深度学习库和 API 的关键集成是开发路径的核心，同时强大的数据挖掘功能和特性也至关重要，尤其是与主要数据整理库\
  \ `Pandas` 的结合。\n\n鉴于本书的主题是使用 Python 进行 AI 编程，并且我们已经涵盖了几个动手实践的 Python 实验，因此我们假设读者已具备一定的\
  \ Python 语言知识。本节剩余部分将重点介绍构建包含卷积层或循环层的神经网络并简化深度学习过程所需的开源工具。\n\n### TensorFlow\n\n\
  作为众多行业专业人士和研究人员的首选工具，`TensorFlow` 是由 Google 开发并于 2015 年作为开源发布的端到端深度学习框架。\n\n尽管 `TensorFlow`\
  \ 拥有完善的文档、训练支持、可扩展的生产和部署选项、多抽象层级以及对不同平台（如 Ubuntu、Android 和 iOS）的支持，但它是一种复杂的底层编程语言，其编码本身对数据科学家来说并非特别直观。\n\
  \n过去 5-10 年对 `TensorFlow` 开发的关注意味着其在研究、灵活性和速度方面的加速改进，使其被当今许多知名品牌和公司所采用，包括 Airbnb、可口可乐、通用电气和\
  \ Twitter。\n\n`TensorFlow` 已不再仅仅是底层语言，Google 在其 2019 年的上一个主要版本（`TensorFlow 2.0`）中改进了与\
  \ Python 运行时的集成。如今的 `TensorFlow` 生态系统涵盖了 Python、JavaScript（`TensorFlow.js`）和移动端（`TensorFlow\
  \ Lite`）开发，以及用于机器学习生产流水线/部署的 `TensorFlow Extended (TFX)`、用于模型和结果可视化的 `TensorBoard`\
  \ 和用于预训练模型的 `TensorFlow Hub`。\n\n有多种方式和集成开发环境可以安装和导入 `TensorFlow`，但在本书中，我们将使用我们认为最简单的方法——Google\
  \ Colab。由于 Colab 与其创建者的关联、增强的用户工作流程以及对 `TensorFlow` 的支持，我们只需将 `TensorFlow` 作为库导入，而无需安装代码。Colab\
  \ 还提供 GPU 支持，这对于加速、扩展和生产化深度学习模型至关重要。\n\n### Keras\n\n`Keras` 由麻省理工学院开发，于 2015 年开源，旨在解决在用户友好度较低的“后端”语言（如\
  \ `TensorFlow`、`Theano` 和 `CNTK`^(⁶⁹) 中使用的语法）中编码深度学习模型训练和推理的易用性挑战，后两者现已弃用。\n\n`Keras`\
  \ 是一个用 Python 编写的高级、模块化且可扩展的 API，专注于快速实验。它是 `TensorFlow 2` 的高级 API，也是 Kaggle 上排名前五的获胜团队中最常用的深度学习框架。\n\
  \n其“拖放式”编程风格保持了与 `TensorFlow` 的后端连接，并加速了深度学习模型的设计、拟合、评估和使用，只需几行代码即可进行预测。\n\n`Keras`\
  \ API 在 `TensorFlow` 上的实际实现被编码为 `tf.keras`，在 Python 中的设置很简单：\n\n```python\nimport\
  \ numpy as np\nimport tensorflow as tf\nfrom tf import keras\n```\n\n`Keras` 的核心数据结构是\
  \ `layers` 和 `models`，最简单的模型类型是 `sequential model`，即层的线性堆叠。我们将在本章下一节中进一步讨论这些层以及如何在\
  \ `Keras` 中实现深度学习模型。\n\n### PyTorch\n\n`PyTorch` 是本书将介绍的最后一个主要深度学习“工具”，主要用于自然语言处理领域的深度学习。^(⁷⁰)\n\
  \n`PyTorch` 由 Facebook 的 AI 研究小组开发，并于 2017 年在 GitHub 上开源。它声称简单、易用且灵活，同时通过动态计算图实现高效的内存使用。`PyTorch`\
  \ 速度更快，并拥有出色的调试支持，但对其易用性的宣称应持保留态度——它是一种底层语言。`PyTorch` 与像 `Keras` 这样更简单的深度学习框架的集成尚不存在，尽管作为为\
  \ `PyTorch` 提供高级接口的轻量级包装器，`PyTorch Lightning` 可能会在未来几年内成为一种替代方案。\n\n在作者看来，使用 Windows\
  \ 上的 Jupyter Notebook 实现 `PyTorch` 更容易。我们将使用一次性 shell 命令（直接在 Jupyter notebook 的单元格中）安装\
  \ `PyTorch`：\n\n```bash\n%pip install torch\n```\n\n注释掉上述 Python 代码行后，可以通过运行示例 `PyTorch`\
  \ 代码来验证安装：\n\n```python\nimport torch\nx = torch.rand(5, 3)\nprint(x)\n```\n\n如果安装成功，屏幕上应显示一个随机张量输出。\n\
  \n\n\n### 其他重要的深度学习工具\n\n当然，`TensorFlow`（与`Keras`配合使用）和`PyTorch`并非当今唯一使用的深度学习框架。存在大量工具，其中许多工具在专注于特定用例时，本身就能产生更好的结果或性能。\n\
  \n例如，`Eclipse Deeplearning4J`（也称为`DL4J`）是一组项目，旨在支持基于 Java 虚拟机（JVM）的深度学习应用的所有需求。\n\
  \n在 Python 库方面，虽然`Theano`（由蒙特利尔大学开发）和`微软认知工具包（CNTK）`都曾风光一时，但现已弃用，而由加州大学伯克利分校开发的`Caffe`仍在使用，特别是在图像分类/分割领域。`Caffe`在\
  \ NVIDIA GPU 集成方面表现出色，但调试起来有些困难。\n\n来自庞大的 Apache 工具集生态系统的`MXNet`，为深度学习提供多语言支持和高级\
  \ API 支持。\n\n#### Apache Spark\n\n虽然`MXNet`更像是一个小众的深度学习工具，但`Apache Spark`是一个流行的大数据处理统一分析引擎，内置了流处理、SQL、机器学习和深度学习以及图处理模块。\n\
  \n由于其在处理大数据方面固有的“可扩展性”，以及其内置的、通过隐式数据并行性对整个集群进行编程的接口（因此非常适合对大型数据集进行分布式训练）和容错性，数据科学家们已将`Apache\
  \ Spark`视为将深度学习投入生产的加速器。\n\n存在许多 API 可以简化在 Python 中实现和使用`Apache Spark`的过程，包括`PySpark`（`Apache\
  \ Spark`的事实标准 Python API）和`SparkTorch`（用于在`Apache Spark`上运行`PyTorch`模型）。\n\n`Apache\
  \ Spark`可能是对将深度学习投入生产至关重要的“其他”工具中最重要的一个，它将是本书下一章动手实验的重点。\n\n## 深度学习与实现框架\n\n既然我们已经确立了用于深度学习的主要\
  \ Python 集成工具，我们就可以进入本章的重点——如何实现一个深度学习模型。\n\n### 张量\n\n`TensorFlow`和`PyTorch`都使用**张量**，因此在继续了解它们如何在深度学习模型中构建和使用之前，理解这个重要的数据结构是很有帮助的。\n\
  \n实际上，**张量**是一个具有统一数据类型的多维数组。它们类似于`numpy`数组，但不可变，很像标准的 Python “元组”。与标准的 CPU 内存不同，张量也可以存储在\
  \ GPU 内存中，从而优化深度学习的用途。\n\n![](img/527966_1_En_5_Fig18_HTML.jpg)\n\n一个模型图展示了具有形状的秩为\
  \ 4 的多维数组。\n\n**图 5-18** 形状为 `[3, 2, 4, 5]` 的秩为 4 的张量\n\n### TensorFlow 关键概念\n\n\
  `TensorFlow 2.0` 默认使用**即时执行模式**来立即评估操作，因此会在代码中计算张量的值。类似于命令式编程的概念，即时执行模式涉及由 Python\
  \ 逐步执行操作，然后将结果立即返回给 Python。\n\n`TensorFlow` 中的另一种执行方法是**图执行模式**。在这里，张量计算通过`tf.operations`图节点作为数据流图`tf.Graph`来执行。\n\
  \n由于这是一本关于使用 Python 将 AI 应用投入生产的书，我们专注于`TensorFlow`中的即时执行模式，而非图执行模式。一般的最佳实践是在即时模式下进行开发和调试，然后使用`TensorFlow`的`tf.function`进行装饰/生产化，该函数将常规\
  \ Python 代码转换为可调用的 TensorFlow 图函数，通常能提供更好的性能。\n\n`TensorFlow` 还利用各种**执行管道**来在深度学习过程中执行多个/并发任务：\n\
  \n*   `tf.data` – API 支持重用复杂的输入管道，例如，聚合来自多个文件的数据，对图像应用随机“噪声”，并批量随机图像用于训练\n*   `TFX\
  \ Pipelines` – 将其扩展到端到端的 MLOps（输入 ➤ 训练 ➤ 部署 ➤ 跟踪）\n\n### 深度学习建模生命周期\n\n转向初始实现，当我们经历数据导入、使用`numpy`进行向量化、模型构建和模型运行过程时，我们知道，除非在使用`TensorFlow`即时执行模式进行实验、可视化即时结果和调试之前将数据转换为张量，否则建模将会失败。\n\
  \n为了将编码（和故障排除）追溯到底层过程，将深度学习建模生命周期视为具有五个不同的阶段是很有用的：\n\n*   定义模型\n*   编译模型\n*   拟合模型\n\
  *   模型评估\n*   预测/推理\n\n这些阶段可以进一步细分为与`Keras`/`TensorFlow`操作大致相关的子过程，并通过一行 Python\
  \ 代码来定义。\n\n![](img/527966_1_En_5_Fig19_HTML.jpg)\n\n一个模型图展示了深度学习建模生命周期。它包含 5 个模块，分别是定义模型、编译模型、拟合模型、模型评估和进行预测。\n\
  \n**图 5-19** 深度学习建模生命周期（来源：machinelearningmastery）\n\n反映上述深度学习阶段的示例代码：\n\n```\n\
  ##### 定义模型\nmodel = ...\n#### 编译模型\nopt = SGD(learning_rate=0.01, momentum=0.9)\n\
  model.compile(optimizer=opt, loss='binary_crossentropy')\n#### 拟合模型\nmodel.fit(X,\
  \ y, epochs=100, batch_size=32, verbose=0)\n#### 评估模型\nloss = model.evaluate(X,\
  \ y, verbose=0)\n#### 进行预测\nyhat = model.predict(X)\n```\n\n### 顺序模型 API 和函数式模型\
  \ API\n\n在上述过程和 Python 代码中，为了构建模型，我们首先需要定义它。在`Keras` API（`tf.keras`）中，实际上有两种主要方法可以做到这一点：顺序模型和函数式模型。\n\
  \n#### 顺序模型 API\n\n顺序模型是最简单的方法，它适用于神经网络层，其中每一层恰好有一个输入张量和一个输出张量。\n\n要在 Python 中实现这一点，如下面的代码所示，我们使用`model.add()`以线性方式逐层向模型添加层。\n\
  \n**使用顺序 API 定义的模型示例**\n\n```\nfrom tensorflow.keras import Sequential\nfrom tensorflow.keras.layers\
  \ import Dense\n##### 定义模型\nmodel = Sequential()\nmodel.add(Dense(10, input_shape=(8,)))\n\
  model.add(Dense(1))\n```\n\n#### 函数式模型 API\n\n`Keras` 函数式 API 比顺序 API 更复杂，但也更灵活。这里不是线性地添加层，而是使用一个模型对象来指定输入层和输出层，并显式地将一层的所有输出连接到另一层的输入（每个连接都被指定）。\n\
  \n**使用函数式 API 定义的模型示例**\n\n```\nfrom tensorflow.keras import Model\nfrom tensorflow.keras\
  \ import Input\nfrom tensorflow.keras.layers import Dense\n##### 定义层\nx_in = Input(shape=(8,))\n\
  x = Dense(10)(x_in)\nx_out = Dense(1)(x)\n##### 定义模型\nmodel = Model(inputs=x_in,\
  \ outputs=x_out)\n```\n\n\n\n### 实现 CNN\n\n上述章节涵盖了通用的深度学习实现流程，但当我们具体构建，例如用于图像分类的卷积神经网络时，流程又是怎样的呢？机器学习和深度学习建模是一个高度迭代的过程，构建一个高性能的卷积神经网络可以说是难度最高的任务之一。\n\
  \n正如我们将在本节之后的动手实验中看到的那样，采用逐步推进的流程，同时为围绕探索性数据分析和数据整理的迭代过程预留空间，是让模型（a）成功运行并（b）使其性能达到可接受标准（例如\
  \ `fbeta > 0.9`）的关键。\n\n在导入数据并执行基本的探索性数据分析之后，针对 CNN 的数据整理和模型设置存在一些独特的要求。下面将对这些要求进行描述，而相关的技术子流程将在本章的下一节中介绍。\n\
  \n1.  **预处理与数据划分**\n    *   将图像转换为数据矩阵/张量\n    *   将数据集划分为训练集和测试集\n    *   将张量数据格式转换为浮点数并进行缩放\n\
  \n2.  **构建网络**\n    *   为卷积基（卷积层和池化层）初始化滤波器\n    *   定义激活函数以计算梯度/实现反向传播\n    * \
  \  更新全连接层的权重\n\n3.  **编译网络**\n    *   结合前向和反向操作，构建神经网络\n\n其余步骤在很大程度上与上述深度学习生命周期中展示的通用流程一致，包括训练网络、在测试集上进行评估（检查损失、准确率、混淆矩阵和分类报告等指标）。通常，训练和评估会重复进行，直到达到我们的“目标”性能，并且常常会添加\
  \ Dropout 来解决过拟合问题。\n\n**典型的 Keras CNN 实现：**\n\n```python\nmodel = models.Sequential()\n\
  model.add(layers.Conv2D(32, (3, 3), activation='relu', input_shape=(32, 32, 3)))\n\
  model.add(layers.MaxPooling2D((2, 2)))\nmodel.add(layers.Conv2D(64, (3, 3), activation='relu'))\n\
  model.add(layers.MaxPooling2D((2, 2)))\nmodel.add(layers.Conv2D(64, (3, 3), activation='relu'))\n\
  model.add(layers.Flatten())\nmodel.add(layers.Dense(64, activation='relu'))\nmodel.add(layers.Dense(10))\n\
  model.compile(optimizer='adam',\n              loss=tf.keras.losses.SparseCategoricalCrossentropy(from_logits=True),\n\
  \              metrics=['accuracy'])\nhistory = model.fit(train_images, train_labels,\
  \ epochs=10,\n                    validation_data=(test_images, test_labels))\n\
  ```\n\n### 实现 RNN\n\n实际上，在 Keras 中我们可以利用三种类型的循环神经网络“层”：\n\n**`keras.layers.SimpleRNN`**\n\
  \n这是“基础”版本——本质上是一个全连接的 RNN，其中上一个时间步的输出会被馈送到下一个时间步。\n\n![](img/527966_1_En_5_Fig20_HTML.jpg)\n\
  \n一个模型图展示了循环神经网络。它包含 a 和 x 输入、tanh 函数、SoftMax 以及 y 输出。\n\n图 5-20：循环神经网络 – SimpleRNN\n\
  \n**`keras.layers.GRU`**\n\n门控循环单元是循环神经网络中的一种门控机制，旨在解决标准 RNN 中的梯度消失问题。通过一个更新门和一个重置门，GRU\
  \ 在将信息传递到输出之前对其进行“审查”，从而避免了 `SimpleRNN` 中梯度递减和权重僵化（不变）的问题。我们将在本章后面的第 6 节“调优深度学习模型”中更详细地讨论梯度消失问题。\n\
  \n**GRU 和 SimpleRNN 层的 Keras RNN 实现示例：**\n\n```python\nmodel = keras.Sequential()\n\
  model.add(layers.Embedding(input_dim=1000, output_dim=64))\n#### GRU 的输出将是一个形状为\
  \ (batch_size, timesteps, 256) 的 3D 张量\nmodel.add(layers.GRU(256, return_sequences=True))\n\
  #### SimpleRNN 的输出将是一个形状为 (batch_size, 128) 的 2D 张量\nmodel.add(layers.SimpleRNN(128))\n\
  model.add(layers.Dense(10))\nmodel.summary()\n```\n\n**`keras.layers.LSTM`**\n\n\
  正如我们从本章第 3 节所知，LSTM 通常有助于在考虑“长期效应”的情况下实现更好的预测。网络中的这种“记忆”是通过三个门来维持隐藏状态实现的：\n\n* \
  \  **输入门** 将信息添加到细胞状态\n*   **遗忘门** 移除模型不再需要的信息\n*   **输出门** 选择要作为输出的信息\n\n**基础 LSTM\
  \ 实现示例：**\n\n```python\nmodel = Sequential()\nmodel.add(LSTM(50, activation='relu',\
  \ input_shape=(n_steps, n_features)))\nmodel.add(Dense(1)) # 单个 LSTM 单元隐藏层\nmodel.compile(optimizer='adam',\
  \ loss='mse')\n```\n\n![](img/527966_1_En_5_Fig21_HTML.jpg)\n\n一个长短期记忆网络包含 LSTM\
  \ 细胞中的遗忘门、更新门、tanh 和输出门，输出 y 通过 SoftMax 发送。\n\n图 5-21：LSTM 架构\n\n#### 用于时间序列的 LSTM\
  \ 实现\n\n我们将在本节稍后的第二个实验中构建一个 LSTM，但在那之前，需要先处理用于 LSTM（或任何 RNN）时间序列预测的数据整理过程。\n\n在时间序列预测中，先前的时间步实际上会成为深度学习过程的“特征”，而目标变量则是当前（训练）或下一个（推理）时间步。如果我们打算向前预测（例如）60\
  \ 个时间步，那么提供给 LSTM 的每一行数据都需要包含从 T-60 开始往回追溯的先前时间步的数据。如下表所示，其中标记为“时间步”的列实际上是我们的目标变量，而其他列则是我们的特征集。\n\
  \n![](img/527966_1_En_5_Figb_HTML.jpg)\n\n一个表格展示了 7 列和 7 行。时间步列有从 T-0 到 T-60 的 7\
  \ 行，特征 1 包含从 T-60 到 T-120 的行，特征 2 包含从 T-119 开始的行。\n\n![](img/527966_1_En_5_Figc_HTML.jpg)\n\
  \n一个关于有无迁移学习时训练与性能的折线图。有迁移学习的图显示性能上升，斜率更高，渐近线也更高。\n\n### 神经网络 – 术语\n\n在下一节中，我们将详细讨论微调神经网络所涉及的更具技术性的建模概念。现在，我们提供一个总结性的参考，列出我们可用于构建和运行模型并实现令人满意性能的主要“杠杆”：\n\
  \n*   **Epoch（轮次）** — 对整个数据集的一次遍历。轮次数是您遍历训练集的次数。\n*   **Learning rate（学习率）** — 用于通过梯度下降训练模型的标量。学习率决定了每次迭代权重变化的速度。\n\
  *   **Activation function（激活函数）** — 给定一组输入后，节点/神经元的输出，该输出随后用作下一个节点的输入。示例包括 `ReLU`、`tanh`、`sigmoid`\
  \ 和线性函数。\n*   **Regularization（正则化）** — 一种改变学习算法以防止过拟合的技术（和超参数）。正则化率也用于指定正则化的速率。\n\
  *   **Batch size（批量大小）** — 在单次迭代中运行的一小部分随机选择的数据子集。1 个 epoch（遍历整个训练集）= 批量大小 * 迭代/步数。\n\
  *   **Hidden layer（隐藏层）** — 输入层和输出层之间的层，其中的神经元接收加权输入并使用激活函数产生输出。\n*   **Loss function（损失函数）**（或成本函数）——\
  \ 输出层给出的预测与真实值之间的偏差有多大？神经网络的目标就是最小化这个偏差。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n### 计算多层神经网络的输出\n\n本节的最后一部分，我们将为神经网络内的计算过程提供一些指导。下面描述了如何计算多层神经网络的输出 `ŷ` (`y_hat`)。\n\
  \n对于一个具有 `m` 个特征的输入 `X`：\n\n-   `m` 个特征对应 `m` 个权重（`w1`, `w2`, …, `wm`）\n-   我们可以计算输入与权重集合的点积，然后加上偏置：\n\
  \n`z = w1x1 + w2x2 + … wnxn + bias`\n\n-   然后将 `z` 输入到一个激活函数中，以获得隐藏层输出 `h`：（`h1`,\
  \ `h2`, …, `hn`）\n-   隐藏层有 `n` 个神经元\n-   `n` 个神经元对应 `n` 个权重（`w1`, `w2`, …, `wn`）\n\
  \n由此我们得到最终输出 `y_hat = h1w1 + h2w2 + … + hnwn`\n\n![](img/527966_1_En_5_Fig22_HTML.png)\n\
  \n模型图展示了一个多层神经网络，包含输入数据、一个隐藏层以及具有 1 个隐藏层的多层结构。\n\n**图 5-22**\n多层神经网络 – 我们如何从输入数据得到输出？\n\
