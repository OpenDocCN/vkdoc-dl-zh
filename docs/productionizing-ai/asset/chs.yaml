  \n**图 3-6** PowerBI 中的 Parquet 数据可视化\n\n## 面向 AI 的数据存储\n\nAI 解决方案的数据摄取需要存储，无论是临时存储还是固定存储。下一节将详细阐述存储数据时需要考虑的重要因素，例如定义数据需求、我们需要哪种类型的数据存储、数据湖与数据仓库、OLAP\
  \ 与 OLAP、ETL 与 ELT、SQL 与 NoSQL，以及弹性与可扩展性的概念。\n\n### 数据存储：数据湖与数据仓库\n\n**数据存储**是指用于在整个企业中存储、管理和分发数据的存储库。通常，这指的是许多最终用户依赖的生产数据库，例如\
  \ CRM 或 ERP 系统。\n\n广义上讲，当今大多数企业主要使用三种**数据存储**：\n\n*   **数据湖** – 数据湖大约在过去十年间出现，正日益成为大多数数据驱动型组织的首选系统。数据湖是一个单一的存储库，用于存储原始、多格式的数据源，包括结构化和非结构化数据。数据湖在设计上能更好地管理数据的四个“V”：多样性、速度、容量和真实性（完整性），并通过其持续刷新多个数据流同时优化性能和拓扑结构的能力来衡量。数据湖也有缺点——数据编目更加困难，并且由于缺乏数据治理以及有时难以处理的数据源/模型，导致了“数据沼泽”这一术语的出现。\n\
  \n*   **数据仓库** – 数据仓库是干净、组织有序的数据存储，通常被设计并用作企业数据的“单一事实来源”。它们最常与组织成“模式”的结构化数据类型相关联，但现代数据仓库拥有更多功能，包括存储非结构化格式，并且数据可以组织为现有数据湖之上的视图模式。\n\
  \n*   **数据集市** – 数据集市通常是数据仓库的过滤和/或聚合子集。数据集市便于进行简单、有限场景的查询，并拥有更小的模式，包含聚焦的表格数据，以实现更快速的下游分析/BI。\n\
  \n以上显然是“数据库”风格的数据存储，但请注意，组织中使用的任何文件系统/硬盘驱动器也是数据存储的示例，其中包含用于 AI 的额外丰富数据集（例如图像、PDF\
  \ 以及列式格式/平面文件）。\n\n#### 湖仓一体\n\n许多公司看到了同时维护数据湖和数据仓库以满足特定组织需求的好处。因此，湖仓一体作为一种结合了两者最佳特性的新型开放架构被引入也就不足为奇了。示例包括\
  \ **Databricks Lakehouse Platform**、**GCP BigLake**，而 **Snowflake** 至少在一定程度上被认为是一个数据湖仓。也许更有趣的是\
  \ **Delta Lake**^(⁴⁶)——一个开源项目，它支持在数据湖之上构建湖仓一体架构。\n\n鉴于“企业目标”是拥有尽可能灵活和高效的数据存储系统，拥有多个独立的数据湖、数据仓库和数据库的想法似乎是最有效的解决方案，但成本开销和多个集成点会带来复杂性和延迟。\n\
  \n湖仓一体试图通过使用类似于数据仓库的数据结构和数据管理功能，同时拥有类似于数据湖的低成本存储选项来避免这些问题。\n\n### 界定项目数据需求\n\n尽管通常可以选择数据来源，但认真在数字时代竞争的企业需要在源头“挖掘”数据——传统的“ETL”方法已不足以应对。\n\
  \n摄取数据的最佳实践通常包括：\n\n*   “挂载”数据源\n\n*   从主要来源摄取数据，而非通过中间件\n\n*   寻求“原子级”数据，而非聚合/汇总数据\n\
  \n除了确保企业能够直接连接到原始数据源之外，还应采用 DataOps/敏捷方法来界定底层业务/组织的数据需求。一种方法是在“数据字典”中捕获需求——这是一个极好的工具，用于捕获范围，并随后交付低（MVP）和高保真度的\
  \ AI 解决方案。\n\n一个结构良好的数据字典有助于：\n\n*   利益相关者达成一致、获得支持以及项目签署\n\n*   术语定义和数据类型定义\n\n\
  *   收集和分类对数据项目成功至关重要的数据\n\n*   对来自结构化和非结构化数据以及在线、离线、移动端源的属性进行分类/映射\n\n*   快速检查用于连接数据的主键\n\
  \n*   隔离异常情况和数据流冲突\n\n*   记录使用新数据源的经验\n\n*   持续的数据维护\n\n### OLTP/OLAP – 确定最佳方法\n\
  \n鉴于所有项目的数据需求最终都归结为 OLTP 和 OLAP 源，最佳方法是什么？历史上，OLTP 数据库会通过 ETL 过程（下一节将详细介绍）被摄取到 OLAP\
  \ 系统中，但随着从源头获取数据的需求日益增长，我们通常需要获取“原始”形式的数据，即访问数据湖而非数据仓库。\n\n通常，我们应该为每个下游分析/BI 或 AI\
  \ 需求确定前三到五个业务优先级，以决定如何存储/获取我们的数据：\n\n*   OLTP：如果速度/响应时间是关键\n\n*   OLAP：如果管理/战略洞察更为重要\n\
  \n\n\n### ETL 与 ELT\n\n如前所述，历史上通常使用 ETL（提取、转换、加载）流程将数据从源系统导入数据仓库/数据库。在许多情况下，这种方法仍然是首选，因为它能将数据固有地转换为结构化的、固定模式的、关系型数据库格式，并且一旦完成数据转换的开销，就能对预处理后的数据进行更快、更直观的分析。ETL\
  \ 方法通常也更适用于将数据存储从本地迁移到云端。\n\n然而，还有另一种选择，它有时更适合数据湖的底层设计，并且在支持数据科学和人工智能所需的关键数据挖掘和特征工程任务方面更加灵活。\n\
  \n在这种替代性的 ELT 流程（提取、加载、转换）中，数据被提取后，首先直接加载到存储层，而不进行任何转换。\n\n由于我们可以直接查询已加载到数据库中的数据，因此\
  \ ELT 流程是将原始数据暴露给最终用户进行分析、商业智能或人工智能的最快方式。然而，通常还需要进行一些“轻量级转换”，用于：\n\n-   列选择（我们不需要整个数据源）\n\
  -   隐私保护——某些字段可能需要被过滤或哈希处理，例如，个人身份信息 (PII)\n-   增量提取——仅上传新行并处理模式变更\n\n在我们可以将数据可视化（例如，在\
  \ BI 平台/GUI 中）之前，还需要进行大量复杂的转换逻辑：从清理数据到删除重复或过时的条目；将数据从一种格式转换为另一种格式；连接和聚合数据，以及排序和排序数据。因此，当对源数据集有（或可以有）更深入的（内部）了解时，ELT\
  \ 流程更适合探索性分析和数据科学。\n\nELT 流程是将数据加载到数据湖中的首选方法；由于 ETL 是在没有数据湖的时代开发的，它不太符合现代对直接访问原始数据的需求。\n\
  \n要将数据导入数据湖，需要从源系统（通过 API）提取数据，并且（通常）使用 CSP 或 EL 供应商提供的提取脚本。我们将在关于数据管道的最后一部分中更详细地介绍提取脚本。\n\
  \n### SQL 与 NoSQL 数据库\n\n在讨论这一部分时，我们无法不将上述概念：数据湖与数据仓库、OLTP 与 OLAP、以及 ETL 与 ELT，与\
  \ SQL 和 NoSQL 数据库的结构和用例联系起来。\n\n在大多数情况下，关系型或 SQL 数据库用于 OLAP 系统，并使用 SQL 查询来分析数据和提取洞察——SQL\
  \ 简单而强大的 `JOIN` 子句用于组合多个数据源，至今仍非常流行。\n\nSQL 数据库具有严格的、结构化的数据存储方式，通常包含两个或多个具有列和行的表——它们更像数据仓库而非数据湖。`MS\
  \ SQL Server`、`MySQL`、`Oracle`、`IBM DB2` 和 `PostgreSQL` 都是符合 ACID（原子性、一致性、隔离性和持久性）的\
  \ SQL 数据库，如今被广泛用于支持人工智能项目。\n\nNoSQL，即非关系型数据库，开发于 2000 年代末期，旨在改善扩展性、查询速度，并支持 DevOps\
  \ 中所需的频繁应用变更。NoSQL 数据库的特点是没有固定模式，其结构基于键值对（JSON 文档）以及节点和边（图数据库），而不是具有固定行和列的表。除了在处理非结构化数据（如图像、文档文件和电子邮件）方面具有无模式的优势外，NoSQL\
  \ 还非常适合需要海量（PB 级）数据存储需求的分布式数据存储。流行的 NoSQL 数据库示例包括 `MongoDB`、`Redis`、`Neo4j`、`Apache\
  \ Cassandra` 和 `Apache HBase`，所有现代数据湖和现代数据仓库都包含连接 SQL 和 NoSQL 的连接器。图 3-7 比较了 SQL\
  \ 和 NoSQL。\n\n![](img/527966_1_En_3_Fig7_HTML.jpg)\n\n一幅插图展示了 SQL 和 NoSQL 数据库之间的比较。SQL\
  \ 有一个关系型数据库，包含博客文章、博客标签和博客评论的表。NoSQL 有一个非关系型数据库，存储在一个单一的文档文件中。\n\n图 3-7 SQL 与 NoSQL（Upwork）\n\
  \n### 弹性与可扩展性\n\n本节的最后一个词是关于两个重要概念，它们与使用云的基本业务和组织驱动因素相关，即弹性与可扩展性。\n\n**可扩展性** –\
  \ 指的是增加“计算能力”，即计算资源以支持**静态**需求和/或容纳更大的**静态**负载的能力：\n\n-   纵向扩展 – 实质上意味着增强硬件\n- \
  \  横向扩展 – 添加额外的“节点”（更多计算机或虚拟机）\n\n**弹性** – 指的是为当前工作负载**动态**提供必要资源的能力\n\n自然地，这为处于更高（数据）成熟度水平的公司带来了更复杂的能力衡量标准——**弹性伸缩**，即根据不断变化的应用流量模式自动添加或删除计算或网络基础设施的能力。\n\
  \n如今，大多数云服务既具有弹性又具有可扩展性，但成本模型差异很大，并且将 CSP 固有的纵向或横向扩展能力与预测的（甚至实际的）AI 应用使用情况联系起来，仍然迷雾重重。\n\
  \n### 用于 AI 的数据存储：动手实践\n\n现在我们已经了解了关键概念，让我们看看 AWS 云上广泛使用的两种数据存储如何支持 AI 项目。\n\n**AWS\
  \ 数据管道**\n\n本练习的目标是在 AWS 上创建一个 `DynamoDB` NoSQL 表、一个 `S3`（文件存储）输出桶，以及一个用于将数据从 `DynamoDB`\
  \ 传输到 `S3` 的 `AWS 数据管道`：\n\n1.  按照以下步骤了解数据如何在 AWS 上的数据存储之间传输：\n    1.  添加 `DynamoDB`\
  \ NoSQL 表\n    2.  创建 `S3` 桶\n    3.  配置 `AWS 数据管道`\n    4.  启动包含多个 `EC2` 实例的 `EMR`\
  \ 集群\n    5.  激活管道\n    6.  导出 `S3` 数据\n\n![](img/527966_1_En_3_Fig8_HTML.jpg)\n\
  \n一个数据流图从 `DynamoDB` 开始，经过 `AWS 管道`、`EMR`、多个 `Amazon EC2`，最终到达 `S3` 桶。\n\n图 3-8\
  \ 用于 AI 的数据存储（动手实践）——数据流\n\n## 用于数据摄入的云服务\n\n在本第三节中，我们将探讨用于摄入和查询流式数据以及存储分析/批处理数据的云服务和工具，以便为下游的企业分析和\
  \ BI 团队提供服务。\n\n### 云（SQL）数据仓库\n\n当今企业主要使用四种云数据仓库：\n\n-   **Azure：SQL 数据仓库/Synapse\
  \ Analytics** – 基于 SQL Server 构建、作为 Azure 云计算平台一部分运行的 PB 级大规模并行处理 (MPP) 分析型数据仓库\n\
  -   **AWS Redshift** – 用于使用标准 SQL 跨数据仓库、操作型数据库和数据湖查询和连接 EB 级（1000*PB）的结构化和半结构化数据\n\
  -   **GCP BigQuery** – 无服务器、高度可扩展且经济高效的多云数据仓库，支持 ANSI SQL，专为业务敏捷性而设计\n-   **Snowflake\
  \ 云数据平台** – 作为 2020 年有史以来最大的软件 IPO，Snowflake 被引入为一种现代的“无服务器”/SaaS 云数据平台，它运行在 AWS\
  \ 或 Azure 基础设施之上。它具有显著优势，例如无需选择、安装、配置或管理任何硬件或软件，非常适合不希望为内部服务器的设置、维护和支持投入资源的组织。\n\
  \n其他值得注意的包括 `IBM Db2`（适合机器学习）、`Oracle`（适合自动化）、`SAP`（适合传统 SAP 用户）和 `Teradata Vantage`（良好的\
  \ CSP 集成）。\n\n\n\n### 数据湖存储\n\n**Microsoft Azure 数据湖存储 (ADLS) 或 Gen2** 被宣传为用于大数据分析的下一代数据湖解决方案。它构建在\
  \ Azure Blob（二进制大型对象）存储之上，特别适用于海量非结构化数据，包括流式视频和音频，这些数据被容器化在组织的存储帐户中。\n\n`ADLS` 是一个完全托管、弹性、可扩展且安全的文件系统，支持\
  \ HDFS 语义，并与 Apache Hadoop 生态系统协同工作。它也是 PowerBI 数据流的底层存储。\n\n**AWS 简单存储服务 (S3)：**\
  \ 在 Amazon Web Services 上，`S3` 是在 AWS 上构建数据湖的首选存储服务。`S3` 安全、高度可扩展且持久耐用，能够摄取结构化和非结构化数据，并对数据进行编目和索引以供下游分析，如今被广泛应用于许多分析项目和机器学习应用程序中作为底层数据存储。当需要块存储时，会使用\
  \ Amazon Elastic Block Store (`EBS`)（与 Azure Blob 存储相当）。\n\n**Google BigLake**：BigLake\
  \ 最近作为 GCP 上全新的跨平台数据存储引擎推出。\n\n#### Hadoop\n\nApache Hadoop 是事实上的框架，允许跨集群对大型数据集进行分布式处理，本质上是一组用于利用计算机网络解决大数据问题的软件集合。\n\
  \n**MapReduce** 是 Hadoop 的基本编程模型，位于 Apache Hadoop 的核心，用于使用主/从架构处理海量数据（图 3-9）。如图\
  \ 3-10 所示，它的工作原理是执行 (1) **映射任务**，将数据拆分然后映射为键/值对格式，以及 (2) **归约任务**，将映射后的输出进行混洗并合并成更小的键/值对集合。\n\
  \n![](img/527966_1_En_3_Fig10_HTML.jpg)\n\nMapReduce 中的流程图。它接收输入语句，然后将数据拆分并映射为键值对。接着，这些键值对被混洗并归约为更小的键值对集合。\n\
  \n图 3-10\n\n使用 Hadoop 跨集群的 MapReduce（来源：[`guru99.com`](http://guru99.com)）\n\n![](img/527966_1_En_3_Fig9_HTML.jpg)\n\
  \nHadoop 网络架构特点是在一个主节点下有三个从节点。主节点包括一个名称节点和一个资源管理器。每个从节点包括一个数据节点、节点管理器、映射和归约。\n\n\
  图 3-9\n\nHadoop 架构（元数据存储在 NameNode 中）。MapReduce 算法如图 3-10 所示。\n\nMapReduce 的并行特性使其对于使用（云）集群中的多台机器执行大规模数据分析非常有价值。如今，大多数\
  \ CSP 都提供内置在其服务产品中的 Hadoop 大数据处理功能：`AWS EMR`、`Azure HDInsight` 和 `GCP Cloud Dataproc`。\n\
  \n### 流处理与流分析\n\n上述云服务是当今许多业务用户首选的数据存储，但是使用什么工具来将数据从一个数据存储获取/提取到另一个数据存储，或者进入（或离开）AI\
  \ 应用程序呢？\n\n流处理，或复杂事件处理，是查询连续数据流的过程。在理想情况下，此数据流将是实时的，但实际上，检测时间段从几毫秒（**原生流处理**）到几秒（**微批处理**）不等。\n\
  \n目标通常是尽可能接近“即时”地从数据中获取洞察，因为数据的价值会随时间迅速降低。如果我们考虑一个特定案例：通过温度传感器在温度达到冰点时接收警报，流处理将确定数据读取（和传输）的粒度，例如毫秒或微秒。\n\
  \n如今，许多处理流处理的工具都带有扩展的分析能力——**流分析**。Apache 工具套件：`Apache Storm`、`Sqoop`、`Spark`、`Flink`\
  \ 和 `Apache Kafka`、`Talend`、`Algorithmia` 以及 `upsolver` 都是具有这些内置功能的流处理框架，`AWS Kinesis`\
  \ 也是如此。在本书的动手实验中，我们将研究其中三个——用于大数据机器学习的 `Apache Spark`、用于流式传输股票价格数据的 `AWS Kinesis`\
  \ 以及利用消息代理处理流入 AI 应用程序的流数据的 `Apache Kafka`。\n\n无论是 `Kafka` 还是 `Kinesis`，当今有大量的 AI\
  \ 用例依赖于实时流技术，包括算法交易、供应链优化、欺诈检测和体育分析。\n\n\n\n### 简易数据流：动手实践\n\n本部分第一个实验将探讨如何使用最广泛使用的工具之一——Microsoft\
  \ Excel 来流式传输数据。\n\n#### 使用 Microsoft Excel 与 Python 流式传输股票价格\n\n**本练习的目标是，在用 Python\
  \ 抓取最新（科技）股票价格后，利用 Microsoft Data Streamer 作为为 AI 应用搭建流式概念验证（PoC）的最基本方法之一。**\n\n\
  1.  获取 Microsoft Data Streamer 的加载项，方法是打开一个空白 Excel 文件，然后依次选择：\n    1.  文件 ➤ 选项\n\
  \    2.  加载项\n    3.  COM 加载项\n    4.  转到\n    5.  在 COM 加载项对话框中，勾选“Microsoft Data\
  \ Streamer for Excel”复选框，然后单击“确定”。\n\n2.  从下方的 GitHub 仓库下载实验文件：\n    [`https://github.com/bw-cetech/apress-3.3a`](https://github.com/bw-cetech/apress-3.3a)\n\
