  \ Build Actions`）下，应该会出现“发布 HTML 报告”的选项。\n\n### 总结\n\n完成了关于持续测试工具和接口的最后一个实验后，我们结束了本章关于`DataOps`的内容。从敏捷开发，到代码仓库、CI/CD、测试和监控，这里的重点一直是理解利益相关者关系、端到端流程、工具生态系统和集成环境，以便在本书后续部分“构建”我们的\
