  \ Azure ML 插件添加到 MS Excel 并输入示例数据，从 Excel 调用 API\n\n## 强化学习\n\n强化学习涉及实时的机器（或深度）学习，采用智能体/环境机制，该机制根据周围环境的实时反馈（模型的准确度如何）对模型的迭代进行惩罚或奖励。\n\
