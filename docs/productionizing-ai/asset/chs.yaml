- "# 3. 面向人工智能的数据摄取\n\n从历史上看，在实施任何软件解决方案之前，一个全面的范围界定工作会围绕相关人员或利益相关者、业务流程和工具，或“现状”架构格局来捕获需求。如今，任何具有韧性的\
  \ AI 项目都必须捕获一个额外的、或许也是最重要的因素：数据。因此，本章的目标是介绍最佳实践以及正确的（云）数据架构和编排需求，以确保 AI 项目的成功交付。\n\
  \n本章首先探讨数据摄取过程，研究所使用的数据类型，以及方法、存储考量如何随计划/批处理数据和流式/事务数据而变化，然后介绍可供 AI 工程师使用的云计算服务和\
  \ API。\n\n接着，我们将探讨面向 AI 的数据存储，从需求收集和创建数据字典的过程开始，然后介绍处理 OLTP/OLAP 数据源的最佳实践，以及可供我们使用的数据存储类型。\n\
  \n我们的第三部分将介绍用于摄取和查询流式数据以及存储分析/批处理数据的云服务和工具，以便为下游的企业分析和商业智能团队提供服务。最后，我们将总结如何编排所有这些数据、管理数据存储的企业策略、将数据导入机器学习和深度学习模型的过程，以及在\
  \ AI 项目中，对数据整理和模型选择过程实现完全自动化日益增长的需求。\n\n## 数据摄取简介\n\n那么，什么是数据摄取？简单来说，它是一种导入数据的方式，但在数据消费无处不在的时代被重新定义。在这个时代，丰富的数据集（理想情况下是预先标记好的）可以使组织的服务、产品和促销活动与竞争对手区分开来。\n\
  \n更正式地说，数据摄取是将数据从源端移动到目标端的过程，数据可以在目标端进行存储和进一步分析。在本章的过程中，更细致的定义会逐渐清晰，但我们首先从审视当前全球数据需求开始。\n\
  \n### 数据摄取——当今的挑战\n\n如今，源数据有多种不同的格式，从关系型或 RDBMS SQL 类型的数据库到非关系型或 NoSQL 数据存储，从`csv`和文本文件到\
  \ API 连接或流式数据。适用于大规模数据传输的压缩新格式已经崭露头角，包括`avro`和`parquet`。\n\nIDC 预测，到 2025 年，全球数据将增长到\
  \ 175 泽字节，如果你习惯用拍字节计算，那就是 1.75 亿拍字节。为了让读者对这个数字有多大有个概念，这相当于 175 万亿个 1GB 容量的 U 盘。^(⁴²)\
  \ 在这个大数据时代，数据的复杂性和多样性带来了根本性的挑战——无论数据源是什么，数据在摄取后几乎总是需要清洗和转换。\n\n所有这些数据都需要一个愿景，理想情况下需要数据策略和数据专家。如今，大多数公司都认识到三个关键的数据优先级：\n\
  \n*   数据摄取/下游处理的速度\n*   合规性与安全性\n*   成本\n\n### AI 阶梯\n\n回顾我们之前失败的 AI 项目，最大的失误之一在于一开始就没有正确定义数据策略。如果没有一个架构化的数据摄取解决方案，开展\
  \ AI 项目是毫无意义的；换句话说，没有信息架构（IA），就没有人工智能（AI）。\n\n在更广泛的生态系统中，解决项目中大数据差距的较好工具之一是 IBM\
  \ 的 AI 阶梯方法论（如图 3-1 所示），该方法侧重于数据摄取的最佳实践，以此作为企业加速其 AI 之旅的手段。该方法旨在强化“没有 IA 就没有 AI”这一信息，并专注于通过**在多云环境中统一数据**（IBM\
  \ 在 2022 年的核心卖点之一）来释放价值。这种“数据湖”式的设置旨在产生以下四个关键价值杠杆：\n\n*   **收集**数据：使数据无论位于何处都能简单易取\n\
  *   **组织**数据：创建业务就绪的分析基础\n*   **分析**数据：以信任和透明度构建和扩展 AI\n*   **注入**AI：将 AI 注入整个企业，创建智能工作流（CRPA）\n\
  \n我们将在后续章节进一步讨论数据湖，但在此之前，我们先探讨 AI 数据摄取中的一些关键概念。\n\n![](img/527966_1_En_3_Fig1_HTML.jpg)\n\
  \nAI 阶梯的示意图，旨在展示加速 AI 之旅的方法，并展示了 4 个关键价值杠杆。它包括注入、分析、组织和收集。\n\n**图 3-1** IBM 的 AI\
  \ 阶梯\n\n### 云架构/云“堆栈”\n\n成功的 AI 需要端到端的云基础设施，我们在第 1 章中看到，存储和计算是 AI 项目中用于大数据处理的主要基于云的服务。\n\
  \n从架构角度来看，存储、计算和数据摄取是企业解决方案架构的基本方面，该架构旨在支持数据管道和下游分析过程。如果采用 Xenonstack 的模型，大数据架构通常包含六个层次：\n\
  \n*   **数据摄取层** – 连接数据源，对数据进行优先级排序和分类\n*   **数据收集层** – 将数据传输到数据管道的其余部分\n*   **数据处理层**\
  \ – 处理、路由和分类数据\n*   **数据存储层** – 根据数据大小处理存储\n*   **数据查询层** – 从存储层收集数据，这次用于主动分析处理\n\
  *   **数据可视化层** – 将数据整合为高价值的呈现格式\n\n这些层次很重要，因为它们最终定义了消费数据的最终用户的主要关注点。\n\n\n\n###\
  \ 计划性（OLAP）与流式（OLTP）数据\n\n所有企业中的数据处理，本质上都可以看作是计划性（批处理）或聚合数据与实时（流式）处理事务数据的组合。传统上，这两种数据类型分别被称为\
  \ OLAP（在线分析处理）和 OLTP（在线事务处理），其主要目标要么是处理数据（OLTP），要么是分析数据（OLAP）。\n\n聚合的批处理数据会按照定期计划的时间间隔被导入（并存储，例如在数据仓库中）——非常适合用于日终报告或管理报告。另一方面，流式处理是一种“即用即弃”的方法，对时间敏感的数据进行近实时处理，然后大部分被丢弃。当今许多超高速的数据消费，尤其是通过移动/手持设备消费的数据，都是以流式数据的形式进行的，例如物联网传感器数据、股票价格变动和智能电表信息。\n\
  \n最终，当今的组织必须划分其数据需求和架构版图，以决定哪些数据作为批处理数据处理，哪些作为流式数据处理。图 3-2 中的简化表示展示了大多数组织如何处理需要存储的流式数据：将其推送到企业数据仓库中。\n\
  \n![](img/527966_1_En_3_Fig2_HTML.jpg)\n\n该图展示了业务流程和企业数据仓库的 OLTP 操作与 OLAP 信息。此外，它还包含了分析、策略和事务。\n\
  \n图 3-2\n\n[`verticaltrail.com`](http://verticaltrail.com)\n\n如今，**Lambda 架构**和**微批处理**是存储和促进批处理及实时数据摄入处理的重要概念。\n\
  \n#### API\n\n除了远程数据库和原始日志之外，当今连接 OLTP 和 OLAP 数据最常见的方式之一是通过 API（应用程序编程接口）。本质上，API\
  \ 是一个软件中介，允许两个应用程序相互通信。下面的示例展示了 Amazon API Gateway 的使用，它是 Amazon Web Services 的关键组件，也是通过\
  \ REST、HTTP 或 WebSocket API 以及 AWS Kinesis 将流式数据从网络摄入到 AI 应用程序中的方式。\n\n![](img/527966_1_En_3_Fig3_HTML.jpg)\n\
  \n该图展示了为 Amazon API Gateway 确定的数据摄入管道。该过程包括模拟 API、API Gateway 和 Kinesis。\n\n图 3-3\n\
  \n通过 AWS API Gateway REST API 进行数据摄入\n\n### 数据类型（结构化与非结构化）\n\n批处理与流式是当今数据摄入的一个视角，但**结构化与非结构化**在\
  \ 2022 年可以说更为重要，在数据战略中掌握这两者，往往是区分一个敏捷企业能否快速从数据中识别增值机会的关键。\n\n**结构化数据**是在放入数据存储之前，已按照预定结构进行预定义和格式化的数据。这是自计算机问世以来大多数业务用户所熟悉的表格数据；`csvs`和`excel`是结构化数据的例子。\n\
  \n**非结构化数据**是以其原始、原生格式存储的数据，通常在使用前才进行处理。当今 AI 领域对非结构化数据的兴趣激增，源于其能够更快地积累数据以及其固有的丰富特征组成；`pdfs`和图像是非结构化格式。\n\
  \n![](img/527966_1_En_3_Fig4_HTML.jpg)\n\n一组 3 个表示非结构化数据、半结构化数据和结构化数据的图示。非结构化数据是以原始形式存储的数据。结构化数据以表格形式表示。\n\
  \n图 3-4\n\n非结构化、半结构化和结构化数据\n\n### 文件类型\n\n我们通过更深入地了解文件格式来结束对数据摄入的介绍。如何将大数据存储在现代化数据存储中至关重要，任何解决方案架构师都需要考虑数据的底层格式、压缩方式，以及如何利用分布式计算/如何以最快、最优的方式对数据进行分区。\n\
  \n传统的文件格式，如`.txt`、`.csv`和`json`，已经存在了几十年，因此我们假设读者对此已熟悉。较新的格式，如`avro`、`Parquet`、`Apache\
  \ ORC`、`tr.gz`和`pickle`格式，则随着集群（一组远程计算机）在大数据处理中的快速应用而涌现。\n\n**Apache Parquet**是\
  \ Apache Hadoop 生态系统中的一种开源列式数据存储格式。作为一种二进制格式，它通过将重复的数据结构存储为列来实现更高的压缩率。Parquet 包含关于数据内容的元数据，例如列名、压缩/编码、数据类型和基本统计信息。像\
  \ Parquet、ORC 和 Hadoop RCFile 这样的压缩列式文件具有较低的存储需求，并且由于读取速度快（尽管写入速度慢），非常适合在查询执行期间实现最佳性能。我们将在本节末尾的实验室中进一步了解`parquet`格式。\n\
  \n**Avro 文件**是一种基于行的二进制文件，其模式以字典（特别是 JSON）格式存储。Avro 文件通过管理添加、缺失和更改的字段，支持强大的模式演化。由于它们是基于行的，Avro\
  \ 或 JSON 非常适合 ETL（提取、转换、加载）暂存层。\n\n这些文件格式与`csv`和`json`的比较总结如图 3-5 所示。\n\n![](img/527966_1_En_3_Fig5_HTML.png)\n\
  \n该表格总结了与 CSV、JSON、Parquet 和 Avro 相比的文件格式特性。包含的属性有：列式、可压缩、可分割、可读性和模式演化。\n\n图 3-5\n\
  \n大数据文件格式的特性（[`luminousmen.com`](http://luminousmen.com)）\n\n**另外两种重要的格式，Pickle**和**HDF5**^(⁴³)（分层数据格式第\
  \ 5 版），常用于 Python 中，通常用于存储训练好的模型。两者速度都很快——尤其是`pickle`，但其缺点是占用更多的存储空间。HDF5 对大型（异构）数据有更好的支持，它以分层（类似目录/文件夹）结构存储数据，并以类似于`parquet`文件的方式压缩重复数据。\n\
  \n### 自动化数据摄入：动手实践\n\n在简要介绍了 AI 数据摄入之后，我们现在进入第一个关于数据摄入的动手实践。\n\nPYTHON 数据摄入——天气数据\n\
  \n**本练习的目标是使用 Jupyter Notebook 中的 Python，自动化摄入（实时的）半结构化天气数据，然后转换并提取温度数据**^(⁴⁴)**以用于预测。**\n\
  \n1.  克隆下面的 GitHub 仓库\n\n[`https://github.com/bw-cetech/apress-3.1.git`](https://github.com/bw-cetech/apress-3.1.git)\n\
