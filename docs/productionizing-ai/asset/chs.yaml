- "# 10. 自然语言处理\n\n任何关于当今人工智能运营化的书籍都不能忽视自然语言处理（NLP）的增长，其市场规模预计在 2025 年将达到 4300 亿美元。^(¹⁴⁷)\
  \ 表面上，NLP 是人工智能的一个分支，专注于对计算机进行编程以理解书面和口头文本，但在 2022 年，NLP 的应用正被推向更广阔的领域。定性分析、上下文/特定领域的推理以及思想领导力的创造^(¹⁴⁸)\
  \ 都在其范围之内，并且性能提升是巨大的，如果你相信谷歌工程师的说法，甚至可能是颠覆性的。^(¹⁴⁹)\n\nNLP 被许多人视为数字化竞赛中的一项关键技能，其关注点主要在于将从结构化数据处理和预测建模过程中学到的技术和最佳实践，扩展到非结构化数据。其隐含目标是将非结构化数据转换为机器可读的格式，然后我们可以在其上执行与标准\
  \ ML/DL 中类似（即使不完全相同）的流程。\n\n虽然本书的主要焦点在于机器学习和深度学习本身的应用，但我们在最后一章中涵盖了自然语言处理的主要主题、基本的\
  \ NLP 理论以及实现，然后介绍了部署 NLP 解决方案所需的所有重要工具和库。\n\n这些工具中的许多都依赖于本书其他地方已经描述过的机器学习和深度学习技术，但我们将在最后一章中介绍主要的\
  \ Python NLP 库 `NLTK` 的使用，以及用于解决 NLP 问题的其他库，如 `PyTorch` 和 `spaCy`。我们还将介绍一些利用 NLP\
  \ 的知名 API（例如 Twitter API），这些 API 在 2022 年被应用于高度相关的客户旅程和公众感知用例中。\n\n在最后一章中，我们还将采用我们一贯的动手实践、基于实验的方法，通过识别和拆分（解析）单词以及提取主题、实体和“意图”来自动化理解复杂语言的过程——这是当今许多自然语言应用的核心子过程，包括情感分析和聊天机器人/对话代理。\n\
  \n## NLP 简介\n\n我们首先简要介绍历史背景，并探讨自然语言处理的基本定义、其在更广泛的“AI 生态系统”中的地位，以及它与机器学习和深度学习过程的交互。\n\
  \n然后，我们的第一部分将讨论 NLP 如何在世界各地的企业和组织中被大规模应用，以及为何如此，最后总结 NLP 的生命周期，特别是交付成功 NLP 实施所必需的任务序列的最佳实践路线图。\n\
  \n### NLP 基础\n\n自然语言处理是人工智能的一个分支，涉及使用自然语言的计算机与人类之间的交互。其目标是读取、破译、理解并以某种对最终用户和整个组织有价值的方式理解语言。为此，采用了两种关键的\
  \ linguistic 技术：句法分析和语义分析。\n\n重要的是，与本书的主题相联系，NLP 随后将机器学习和深度学习算法应用于非结构化数据，将其转换为计算机可以理解的形式。这种“重叠”如图\
  \ 10-1 所示。\n\n![](img/527966_1_En_10_Fig1_HTML.jpg)\n\n一个圆形维恩图说明了 AI、ML、DL 和 NLP\
  \ 之间的关系。它将深度学习描述为机器学习的一个子集，并与自然语言处理部分相交。所有圆圈都位于人工智能这个大圆圈内。\n\n**图 10-1** NLP 与机器学习和深度学习的接口\n\
  \n#### NLP 的历史背景与发展\n\n我们上面提到，语言学研究是使用自然语言处理的基础。NLP 的早期应用涉及基于规则的方法，但受到现有规则范围以及随着数据集规模增大而带来的计算规模和速度的限制。此后，统计\
  \ NLP 中使用的概率建模方法使得 NLP 解决方案能够扩展，利用机器学习和深度学习技术更动态地解释自然语言。其中一个主要例子是 N-gram，我们可以训练一个\
  \ NLP 模型来概率性地预测单词序列，例如二元组“Machine Learning”。\n\n特别是深度学习从大数据集中生成复杂预测结果的能力，与我们处理语言模型时的整体问题表述非常契合，因为单词和字符的底层结构和含义是复杂的——实际上我们正在处理另一个“大数据”数据集，但这里的区别在于底层语法（在任何语言中）具有固有的序列或顺序。出于这个原因，循环神经网络/专门的\
  \ LSTM 已被采用，以将词序作为状态通过神经网络架构进行传播。\n\n正如我们将看到的，词嵌入或向量化是循环神经网络读取、转换和迭代底层语言的句法和语义含义的基本机制——单词在一个\
  \ N 维向量空间中被表达。\n\n\n\n### NLP 目标与特定行业用例\n\n与机器学习和深度学习一样，在项目启动之初就确立目标，对于确保项目能够取得成功的成果至关重要。\n\
  \n并非所有自然语言处理解决方案都专注于文本分类、生成情感指标或提供聊天机器人，不同行业之间存在许多细微差别。但总体而言，构建 NLP 应用的目标可归为以下一个或多个类别：\n\
  \n- 信息检索与提取 (IR/IE)\n- 文本分类\n- 主题识别/检测\n- 命名实体识别 (NER)^(¹⁵⁰)\n- 翻译\n- 文本摘要\n- 情感分析\n\
  \n上述类别常与实际 NLP 应用相混淆——然而实际上，企业或组织应用往往整合了上述一个或多个目标，而市场或产品赋予这些 NLP 解决方案的名称常常模糊了目标与技术之间的界限。\n\
  \n例如，使用文本分类的商业价值通常由下游客户驱动——既有“宏观”价值，例如销售邮件进入分类系统（例如，基于客户细分、产品线或提案阶段）；也有“微观”价值，例如根据邮件中识别的关键词将邮件重新路由到特定部门。同样，同一文本分类可能触发自动发送客户\
  \ KBA 或聊天机器人回复。\n\n#### 关键行业应用\n\n在本章剩余部分，我们将介绍几个关于当今主要 NLP 应用的动手实验。从相对初级的应用（垃圾邮件过滤器、网络搜索应用、文本摘要等）开始，NLP\
  \ 解决方案的范围已扩展到这些应用成为许多公司关键差异化因素的程度。\n\n自然语言处理是许多知名应用背后的驱动力，包括语言翻译应用（如 Google 翻译）、文字处理器（如\
  \ Microsoft Word 和 Grammarly，它们利用 NLP 检查文本的语法准确性或执行自动补全任务），以及利用社交媒体情感分析的应用。\n\n\
  智能虚拟代理 (IVA) 或聊天机器人 2.0/3.0，以及呼叫中心使用的交互式语音应答 (IVR) 应用，现在能够响应用户的特定请求，而个人助理应用（如 OK\
  \ Google、Siri、Cortana 和 Alexa）已成为主流的家庭或移动设备应用。\n\n而自然语言生成则前景更为广阔，它使得短报告乃至大规模出版物写作的完全自动化更接近实际应用。在进一步深入之前，我们将快速浏览技术视角，了解\
  \ NLP 如何利用通用开发框架来提供如此多样化的行业解决方案。\n\n### NLP 生命周期\n\n从数据抓取和收集，到字符分割、停用词移除、分词、词形还原和嵌入，NLP\
  \ 应用的开发需要像处理结构化 AI 数据的任何方法一样，拥有同样强大的框架。\n\n#### 从解析到语言分析\n\n处理非结构化数据的数据整理可能存在问题，但如同机器学习和深度学习一样，最佳实践是遵循特定流程，其中底层的“解析”子流程将数据转换为最终格式，以便输入到下游的向量化（编码）和建模过程中。在\
  \ Python 中，用于数据整理的主要库是 `NLTK` 和正则表达式 (`re`) 库。\n\n根据任务的不同，某些子流程可能并非必需，在某些情况下，可能还需要额外的特定领域整理任务，例如从银行报告中推断外汇信息。现在，我们列出主要的\
  \ NLP 整理子流程以供参考，并将其分解为三个核心流程：预处理、语言学和转换，以及预模型编码/词嵌入。\n\n![](img/527966_1_En_10_Fig2_HTML.jpg)\n\
  \n自然语言处理的文本挖掘路线图，包含 6 个主要流程：基本流程、NLP 基本假设、序列标注、词嵌入和文档，然后是字符串距离和分词，最终产生一系列处理结果。\n\
  \n图 10-2 文本挖掘路线图 (GitHub)^(¹⁵¹)\n\n**预处理/初始清洗**\n\n- 移除特殊字符\n- 正则表达式：移除符号（例如，推文中的“#”和“RT”）\n\
  - 正则表达式：移除标点符号\n- 剥离 HTML 标签\n\n**语言学和数据转换**（图 10-3）\n\n![](img/527966_1_En_10_Fig3_HTML.png)\n\
  \n一个流程图展示了在自然语言处理系统中，输入句子经过词法分析、句法分析、语义分析和输出转换的过程，最终从数据库输出数据。\n\n图 10-3 NLP 预建模流程\n\
  \n**词法分析：**\n\n- 过滤“停用”词\n- 分词\n\n**句法分析：**\n\n- 转换为小写\n- 词性标注 (POS)\n- 命名实体识别 (NER)\n\
  - 处理缩略形式^(¹⁵²)\n- 词干提取\n\n**语义分析：**\n\n- 词形还原\n- 消歧（确定特定短语最可能的含义）\n- N-gram\n\n\
  #### 从词嵌入到深度学习\n\n实际上，语义分析进一步扩展到向量化和词嵌入——这是使用非结构化数据进行建模前的最终准备步骤。\n\n**文本向量化 / 词嵌入\
  \ / 编码**\n\n**基于规则 / 基于频率的嵌入**\n\n- 独热编码\n- 词袋模型 (BoW)\n- TF-IDF\n\n**基于预测的词嵌入：**\n\
  \n- Word2Vec (Google)\n- GloVe (Stanford)\n- FastText (Facebook)\n\n在下一节中，除了词嵌入，我们还将介绍文本摘要、主题建模、序列建模以及\
  \ Transformer/注意力模型的建模要点。需要注意的是，对于众多 NLP 解决方案，并不存在单一的“万能”建模流程——方法高度依赖于问题定义、行业背景、首要目标驱动结果以及性能阈值。\n\
  \n与深度学习非常相似，我们首先概述一个最佳实践的“路线图”，希望这对读者有所帮助，同时也要认识到，在预建模解析和向量化过程，以及实际的模型训练、推理和后续性能基准测试中，很可能存在许多迭代步骤。\n\
  \n\n\n### 创建词云：动手实践\n\n**十二生肖风格汉字词云**\n\n**NLP 最简单的应用之一，被全球营销团队广泛使用，就是词云。虽然基础，但这里使用的技术在许多当前存在的高知名度工业应用中都有复现——本实验将介绍这些技术：**\n\
  \n1.  将以下 GitHub 仓库克隆到本地驱动器：\n\n    [`github.com/bw-cetech/apress-10.1.git`](https://github.com/bw-cetech/apress-10.1.git)\n\
  \n2.  进入克隆了 GitHub 文件的本地文件夹，并使用以下命令（依次执行）设置虚拟环境：\n\n    ```\n    python -m venv\
  \ env\n    env\\Scripts\\Activate\n    ```\n\n3.  在虚拟环境中运行 Python 脚本，使用命令：\n\n \
  \   ```\n    python WordCloud_ 中文.py\n    ```\n\n    注意：名称中的中文字符在终端中不会正确显示，但上述命令仍可运行。\n\
  \n4.  如果系统提示，请逐一安装依赖项：\n\n    ```\n    pip install wordcloud\n    pip install jieba\n\
  \    ```\n\n5.  将根据 GitHub 文件夹中提供的《中国日报》新闻摘录中的中文字符生成一个词云。\n\n6.  练习：改用英文数据示例（意大利面食谱）运行代码。\n\
  \n7.  练习：将猪的图像模板替换为另一个生肖图像（例如，使用来自 [www.astrosage.com/chinese-zodiac/](http://www.astrosage.com/chinese-zodiac/)\
  \ 的图片）。\n\n8.  练习（进阶）：更新代码，使其根据当前中国农历年份（虎年、兔年、龙年等）生成词云。\n\n## 预处理与语言学\n\n由于我们处理的大部分是非结构化文本数据，自然语言处理与语言结构密不可分。\n\
  \n无论是获取源数据并通过正则表达式执行初始预处理和清理任务，应用句法或语义分析，还是实现词嵌入以将数据转换为词向量，理解语言学都有助于规划从原始数据到模型就绪数据格式的路径，并最终提取洞察。\n\
  \n本节涵盖了关键的 NLP 概念，参考了语言学家的观点，并按照 NLP 生命周期中所述的方式进行分解。\n\n### 预处理/初始清理\n\n#### 正则表达式\n\
  \n正则表达式（或称“regex”）是非结构化数据“字符串”搜索的基本工具。通常在抓取/数据导入后作为第一步使用，其思路是通过搜索数据中我们想要移除的特定模式来快速清理数据。由于分词和向量化自然紧随此步骤，目标是移除对标点符号、符号（如短信中的笑脸或表情符号，或推文中的话题标签）以及特殊字符（如货币符号或括号）等对将编码文本转换为词向量无帮助的内容。\n\
  \n以下示例展示了在 Python 中的实现——`re` 是所使用的库：\n\n```\nimport re\npattern = '^a...s$'\ntest_string\
  \ = 'abyss'\nresult = re.match(pattern, test_string)\nif result:\nprint(\"Search\
  \ successful.\")\nelse:\nprint(\"Search unsuccessful.\")\n```\n\n`^` 匹配字符串的开头，而\
  \ `$` 匹配字符串的结尾，因此在此例中返回 `Search successful`。\n\n#### 文本剥离（例如，HTML 标签）\n\nPython\
  \ 拥有大量内置函数，可以简化清理非结构化数据/搜索正则表达式的过程。对于文本“剥离”特别有用的是 Python 的 `.strip` 方法。更复杂的 HTML\
  \ 剥离，例如从 HTML 标签中提取新闻标题，是通过使用 `BeautifulSoup` 库进行 `.text.strip()` 方法链式调用来完成的。\n\n\
  Python 中的 `.split` 函数通常在剥离/清理底层文本数据后应用——`.split` 能有效地将文本分词为单独的单词。\n\n### 语言学与数据转换\n\
  \n在预处理数据之后，虽然非结构化数据可能已经“干净”（即我们移除了冗余字符），但它尚未处于可以“向量化”以用于建模的状态。\n\n与机器学习和深度学习中的数据整理过程一样，需要执行多个转换步骤来准备非结构化数据，每个步骤都基于数据的语言结构。这些步骤大致分为词法分析、句法分析和语义分析步骤。\n\
  \n#### 词法分析\n\n作为这些步骤中的第一步，词法分析指的是将文本数据转换为其构成基本单元（根据底层语言，可以是单词、字符或符号）的过程。\n\n#####\
  \ 移除停用词\n\n停用词通常是句子中非常常见的词，它们对句子的基本含义没有增加价值。在大多数情况下，它们应该被移除，但对于机器翻译和文本摘要等特定应用，它们应该被保留。\n\
  \n诸如（`a`、`the`、`is`、`at` 等）之类的词在 Python 中使用 `nltk` 库中的停用词模块进行移除。\n\n##### 分词\n\n\
  我们已经在预处理步骤中提到了在剥离文本时解析文本的一种方法。更常见的是，使用 `NLTK` 库中的一种分词方法进行分词，通常是 `.word_tokenize`\
  \ 将句子拆分为单词，但根据目标，可能需要短语分词，如下面的德语示例所示：\n\n```\nimport nltk\ngerman_tokenizer = nltk.data.load('tokenizers/punkt/german.pickle')\n\
  german_tokens=german_tokenizer.tokenize('Wie geht es Ihnen?  Gut, danke.')\nprint(german_tokens)\n\
  ```\n\n上述代码返回问题和答案：\n\n```\n['Wie geht es Ihnen?', 'Gut, danke.']\n```\n\nPython\
  \ 支持的 Hugging Face，这个开源数据科学平台，正越来越多地被用于在更大数据集上扩展分词过程，通过微调预训练模型（而不是从头构建）来减少训练时间（以及环境影响）。\n\
  \n#### 句法分析\n\n在通过词法分析获得语言构建块之后，下一步是使用句法分析来转换数据；在考虑语法规则的同时从文本中提取逻辑含义。\n\n##### 转换为小写\n\
  \n句法分析的第一步是使用 Python 内置函数 `lower()` 将数据转换为小写。因为在向量空间模型中，首字母大写的相同单词（`Hello`）和小写单词（`hello`）会被表示为两个不同的单词，应用\
  \ `lower()` 函数可以解决稀疏性问题，减少我们正在解决的维度问题，并加快运行时间。\n\n\n\n##### 词性标注\n\n`POS`标注是信息提取的核心，也是我们在第一节中提到的\
  \ NLP 解决方案的关键目标之一。使用 NLTK 的 `.pos_tag` 方法，该过程涉及根据单词的语法形式对其进行分类。执行此任务的目的是为了更好地为后续的深度学习建模过程提供关于特定词序列概率的序列信息。\n\
  \n这些概率是由特定语法形式（例如动词或名词）出现在其他语法形式（例如动词）之后的频率决定的。\n\n```\ntext = word_tokenize(\"\
  And now for something completely different\")\nnltk.pos_tag(text)\n```\n\n输出是一个元组列表：\n\
  \n```\n[('And', 'CC'), ('now', 'RB'), ('for', 'IN'), ('something', 'NN'),\n('completely',\
  \ 'RB'), ('different', 'JJ')]\n```\n\n其中：^(¹⁵⁷)\n\n- `CC` 是并列连词\n- `RB` 是副词，例如“occasionally”和“swiftly”\n\
  - `IN` 是介词/从属连词\n- `NN` 是单数名词\n- `JJ` 是大型形容词\n\n本质上，这里使用了马尔可夫链，表明（如图 10-4 所示）一个特定语法术语出现在另一个词之后的概率。\n\
  \n![](img/527966_1_En_10_Fig4_HTML.jpg)\n\n一张示意图展示了包含动词和名词的词性标注。从动词指向名词的箭头上方有一个数字\
  \ 0.6。动词处有一个弯曲箭头，指示为 0.2。\n\n**图 10-4** 词性标注（来源：Towards Data Science）\n\n##### 命名实体识别\n\
  \n从某些角度来看，命名实体识别是词性标注的一种应用。通常在 `POS` 标注之后进行，其思想是通过定位文本中的命名实体来识别文本主题。该过程在 Python\
  \ 的 `spaCy` 库中特别高效，^(¹⁵⁸) 通过识别限定词，后跟形容词，再跟名词，可以快速提取名词短语，并显示主要实体的快速摘要，如下所示：\n\n![](img/527966_1_En_10_Figa_HTML.jpg)\n\
  \n方括号内的一组文本内容如下：European, `NORP`, Google, `ORG`, 5.1 billion dollars, Wednesday,\
  \ Date, and Money。\n\n像所有 AI 应用一样，NLP 应用具有高度的领域特异性，虽然 `POS` 标注和 `NER` 任务可以承担文本标注的重任，但某些词汇术语总是存在差距。因此，`POS`\
  \ 和 `NER` 标注通常都辅以（手动的）特定领域实体整理和手动标注过程。\n\n下面的示例展示了此过程如何与 IBM Watson Knowledge Catalogue\
  \ 配合工作，其中一组经批准的领域专家能够高亮单词/术语并定义实体类型。\n\n![](img/527966_1_En_10_Fig5_HTML.jpg)\n\n\
  一张 Watson Knowledge Studio 应用程序的截图高亮显示了 2004 49 168 A . t x t 文件下的一组单词。右侧有一个实体类型列表，包括：事故原因、状况、影响、制造商、型号、年份、部件、人员、车辆。\n\
  \n**图 10-5** IBM Watson Knowledge Catalogue 中的手动标注\n\n##### 处理缩略形式\n\nNLP 中的缩略形式指的是确保俚语表达被扩展为其完整等价形式：I'll\
  \ = I will, You’d = You would 等。此处的目的类似于小写化，即在向量化之前移除缩略形式有助于降维。\n\n可以使用 Python 中的\
  \ `contractions` 库来实现缩略形式的处理。\n\n##### 词干提取\n\n词干提取和词形还原是自然语言处理中紧密耦合的文本规范化子任务。许多语言包含具有相同底层词根或“词干”的单词，词干提取指的是将这些单词缩短为其词根形式的过程，而不考虑其含义——本质上，我们只是将末尾字符剥离到一个共同的前缀，即使该前缀本身不能独立作为一个语法术语。\n\
  \n词干提取对于情感分析很有用，因为词干可以传达负面或正面的情感。\n\n词干提取通常使用 `nltk.stem` 来实现。\n\n#### 语义分析\n\n\
  我们最后的 NLP 转换过程本质上是“语义分析”步骤——在句法分析的逻辑和语法任务基础上进行改进，语义分析使我们能够从底层文本中提取含义——解释整个文本并分析语法结构，以识别词汇术语之间的（上下文特定的）关系。这是自然语言处理在向量化之前的最后阶段。\n\
  \n##### 词形还原\n\n与词干提取相反，词形还原是“上下文特定的”，并将单词转换为有意义的词根形式。它考虑了单词的屈折形式，因此像“better”这样的单词会被词形还原为“good”，而“caring”会被词形还原为“care”（而词干提取会得到“car”）。词干提取使用\
  \ `nltk.stem.PorterStemmer()` 函数，而词形还原使用 `WordNetLemmatizer()` 函数。\n\n本质上，词形还原是对词干提取的增强，它考虑了语义，更常用于更复杂的情感分析应用，例如聊天机器人。\n\
  \n##### 词义消歧\n\n词义消歧是在特定短语的定义存在潜在歧义时，确定其最可能含义的过程。单独来看，像“bank”这样的单词有多个含义，^(¹⁵⁹) NLTK\
  \ 的 `WordNet` 模块允许我们根据其在更广泛文本中的用法，以概率方式识别其实际含义，尽管 Python 也有一个词义消歧包装器（`pywsd`），它可以与\
  \ NLTK 一起使用。\n\n##### N-gram\n\nNLTK 库还附带了一个 `ngrams` 模块。N-gram 是一串相连的词汇术语——本质上是单词或短语的连续序列。这里的“N”指的是我们所说的相连术语或单词的数量，一个二元组（2-gram）是“United\
  \ States”，一个三元组是“gross domestic product”。顺序很重要，例如在语料库中匹配“red apple”与“apple red”是不同的。\n\
  \nN-gram 在自然语言处理中被大量使用，因为我们通常是从单词序列而不是单个单词本身来创建特征。\n\n![](img/527966_1_En_10_Figb_HTML.jpg)\n\
  \n括号内的一系列单词内容如下：this, is, a. is, a, very. a, very, good. very, good, book. good,\
  \ book, to. book, to, study.\n\n### 使用 NLTK 进行文本解析：动手实践\n\n**整理维基百科：SpaceX**\n\n\
  结合本节中描述的一些技术，本实验的目标是抓取典型的非结构化网络数据（此处为 SpaceX 的维基百科页面），并逐步执行预处理和词法分析步骤，以生成关于词频的洞察：\n\
  \n1.  从此 GitHub 仓库下载 Jupyter notebook：\n\n    [`github.com/bw-cetech/apress-10.2.git`](https://github.com/bw-cetech/apress-10.2.git)\n\
  \n2.  运行以下步骤：\n    1.  导入库并连接到网页\n    2.  使用 Beautiful Soup 解析网页\n    3.  对文本进行分词\n\
  \    4.  统计词频\n    5.  绘制词频图\n\n3.  练习——将词频绘制为条形图而非折线图\n\n4.  练习——继续 notebook 分析，执行进一步的句法和语义数据清洗/分组步骤^(¹⁶⁰)\n\
  \n\n\n## 文本向量化、词嵌入与 NLP 建模\n\n在上一节中，我们探讨了为提取非结构化数据中的词汇、句法和语义层面而进行的特定语言/转换过程。在确立了数据准备与实施的流程后，重点将转向“编码”或**文本向量化**过程以及深度学习建模。\n\
  \nNLP 生命周期下一阶段的第一部分是利用文本向量化和词嵌入从文本数据中创建*数值*特征。^(¹⁶¹) 随后，我们将审视 2022 年生产级应用中采用的主要\
  \ NLP 建模实践，而非对整个技术生态系统进行详尽分析。\n\n有时，我们会引用一些特定的工具和库，这些内容将在本章最后一节中详细描述。\n\n![](img/527966_1_En_10_Fig6_HTML.jpg)\n\
  \n一张自然语言处理路线图，包含 5 个主要模型：基础模型、任务模型、分布式表示模型、编码器、解码器和语言模型。它们进一步关联着一系列流程和其他子模型。\n\n\
  图 10-6 自然语言处理路线图（GitHub）^(¹⁶²)\n\n### 基于规则/频率的嵌入\n\n我们从更简单的“基于频率”或“基于规则”的方法入手，对数据进行向量化/编码。\n\
  \n#### 独热编码与计数向量化\n\n机器学习领域的读者应该熟悉独热编码方法，它通过为列中每个不同的值创建新列，来转换名义分类文本字段（即那些值没有内在顺序的字段^(¹⁶³)）。\n\
  \n独热编码实现简单，适用于二元或离散变量，但考虑到大型文本语料库中词汇近乎无限的排列组合，以及存储 N 元组（而非仅单个单词）的可能性，所涉及的特征数量会迅速变得难以管理。每个词都被编码为一个独热“向量”，因此一个句子就变成了一个向量数组，一段文本则变成了一个矩阵数组（即张量）。\n\
  \n计数向量化将独热编码的术语作为**文档-术语矩阵**中的列，统计出现次数，然后存储非空值以用于后续的文本摘要。\n\n#### 词袋模型（BoW）\n\n\
  词袋模型是将文本数据编码为固定长度向量最简单、最著名的方法之一——它基本上等同于对整个文档应用独热编码，并使用简单的`numpy`（或`pandas`）方法来编码文本。\n\
  \n收集数据后（例如包含多篇文章的新闻源），首先提取并统计（或哈希化^(¹⁶⁴)）不重复的单词。\n\n数据中不重复单词的数量决定了特定**文档**（此处指新闻文章）的向量大小。每篇新闻文章随后可表示为一个唯一的布尔向量，其中每个不重复单词根据其是否出现在该新闻文章中被编码为\
  \ 0 或 1。\n\n最终，词袋模型存在诸多缺陷：它没有考虑单词顺序或上下文的句法或语义信息，并且由于许多文档中不包含低频词，最终会导致严重的稀疏性问题。\n\
  \n#### 潜在语义分析（LSA）\n\nLSA 是上述词袋模型的扩展，它利用奇异值分解（SVD）^(¹⁶⁵)来降低数据维度，从而缓解稀疏性问题。LSA 以包含`m`个文档和`n`个单词的数据集（**文档-术语矩阵**）为输入，将文本数据重构为`r`个潜在^(¹⁶⁶)特征，其中`r`小于我们拥有的文档数量。\n\
  \n#### TF-IDF\n\nTF-IDF（词频-逆文档频率）通过采用数值统计来反映一个词在集合/语料库中对某篇文档的重要性，试图解决词袋模型的固有缺陷。\n\
  \n这里的`TF`指一个词在文档中出现的频率，但正是`IDF`元素（衡量该词“重要性”的指标）使该方法区别于词袋模型。对于任何特定单词，其`IDF`值是文档总数除以包含该词的文档数的对数，因此像“the”这样的词得分会很低，因为它出现在所有文档中，而`log(1)`等于零。^(¹⁶⁷)\n\
  \n`TF-IDF`是词频与`IDF`得分的乘积，它倾向于对以下两类词赋予更高权重：（a）在单个文档中频繁出现的词，以及（b）在整个集合中较少出现/罕见的词。\n\
  \n尽管相比词袋模型有诸多优势，但这些确定性的、基于频率的方法无法扩展到解释“上下文”——为此，我们需要词嵌入。\n\n#### 关于余弦相似度\n\n无论是词袋模型、LSA\
  \ 还是 TF-IDF，余弦相似度通常用于衡量词嵌入中文档的相似性。\n\n该度量是对简单欧氏距离（两点间的直线距离）的改进，因为词嵌入包含了文档中词的频率。\n\
  \n两个相似的词（例如足球裁判报告中的“犯规”和“违例”）在 n 维空间中可能相距甚远，因为其中一个词（“违例”）在文档中出现的频率低得多。由于余弦相似度衡量的是这些词向量表示之间的夹角，而忽略向量的模长，因此当词之间的夹角很小时，我们能够保留“相似性”的概念。\n\
  \n\n\n### 词嵌入 / 基于预测的嵌入\n\n无论从哪个角度看，词嵌入都是一种“概率匹配”技术，它应用无监督机器学习或深度学习方法将文本数据向量化——实际上，每个单词都被转换为一个\
  \ n 维的“词向量”，含义相似的词会聚集在一个密集的“簇”中。\n\n图 10-6 展示了这一过程在两个文档中的工作原理——其结果是在维度空间中，专有名词、名词和动词等含义相似的词会彼此靠近（例如，西雅图和波士顿，讲座和演讲，有和给予等）。\n\
  \n词向量/词嵌入可以从头开始训练，但像 `Word2Vec` 这样的预训练模型为加速 NLP 应用开发提供了主要手段。\n\n![](img/527966_1_En_10_Fig7_HTML.jpg)\n\
  \n一张文档与词嵌入的对比图，以 x 和 y 轴的形式绘制了关于波士顿和西雅图特定研究讲座的数据。\n\n**图 10-7** 两个文档的词嵌入示例（来源：towardsdatascience.com）\n\
  \n#### Word2Vec（谷歌）\n\n`Word2vec` 可能是最著名的词嵌入模型——它是谷歌搜索引擎用于搜索相似文本、短语、句子或查询的过程。^(¹⁶⁸)\
  \ 这是一个两层神经网络，通过“向量化”单词来处理文本，`Word2vec` 基于两种架构：**连续词袋模型（CBOW）** 和 **跳字模型（skip-gram）**。^(¹⁶⁹)\n\
  \nCBOW 架构允许底层模型基于相似上下文的单词来预测单词，但忽略了单词的顺序，这与基于规则的词袋模型非常相似。跳字模型则考虑了单词的顺序，并对向量空间中上下文更接近的单词赋予更大的权重。CBOW\
  \ 的价值主要在于执行速度，而跳字模型在处理不常见单词时性能更优。\n\n`Word2Vec` 和潜在语义分析（LSA）的文档“相似度”都是使用余弦相似度计算的。余弦相似度是……\n\
  \n#### 其他模型\n\n`Word2Vec` 是目前最常见的词嵌入模型，但还有许多变体。\n\n此外，由斯坦福大学开发的开源项目 `GloVe` 和由 Facebook\
  \ 开发的 `fastText` 也各有优势。\n\n`GloVe` 是全局向量的缩写，其模型训练使用单词共现统计，并结合了全局矩阵分解和局部上下文窗口^(¹⁷⁰)方法。它的独特卖点在于能够发现单词之间的关系，例如公司-产品对，但其对共现矩阵的依赖会降低运行速度。\n\
  \n`fastText` 实际上是 `Word2Vec` 模型的一个扩展，其中单词被有效地建模为字符的 n-gram。^(¹⁷¹) 这种方法意味着 `fastText`\
  \ 在处理罕见词时表现更好，因为底层的字符 n-gram 与其他词共享，但它的速度也比 `Word2Vec` 慢。\n\n其他值得注意的模型包括 `LexRank`——一种用于自动文本摘要的无监督图基方法。^(¹⁷²)\n\
  \n### NLP 建模\n\n尽管上述许多过程都隐式地利用机器学习或深度学习来实现文本的向量表示，但词嵌入通常进一步发展，以执行自然语言“预测”。在这最后一个小节中，我们将介绍\
  \ NLP 中的主要预测建模技术，然后进入关于 Python 实现和当今主要 NLP 用例的最后一章。\n\n#### 文本摘要\n\n许多自然语言处理应用都涉及文本摘要，即使不是直接目标，也是作为中间过程。文本摘要通过两种方式自动化该过程：**基于抽取的摘要**，即从源文档中提取关键短语；或**基于抽象的摘要**，涉及对源文档进行释义和缩短。基于抽象的摘要性能更优，但也更复杂。\n\
  \n基于抽取方法的算法实现首先使用语言学分析（例如，词性标注）提取关键词，然后收集包含关键短语的文档，^(¹⁷³) 接着采用监督机器学习技术，利用带有关键短语的文档样本构建模型，其特征包括关键短语的长度、字符数、最常出现的词以及频率^(¹⁷⁴)。\n\
  \n`LexRank`、`Luhn` 和 `LSA` 都是之前提到的文本摘要技术，可以通过 Python 的 `sumy` 库访问，`KL-Sum` 也是如此，它使用词分布相似性来匹配句子与原始文本。\n\
  \n#### 主题建模\n\n与文本摘要紧密相关的是主题建模的概念。上述提到的许多相同算法，特别是 `LSA`、`pLSA`、`LDA` 和 `lda2Vec`，都用于主题建模——其根本目标是从文档或数据语料库中*存在的主题（或议题）*中识别单词，^(¹⁷⁵)\
  \ 而不是从整个文档中提取单词这种更费力的方法。\n\n#### 序列模型\n\n序列模型是用于解释文本中单词序列的机器学习模型。其应用包括文本流、音频片段和视频片段的序列建模，在这些应用中，就像时间序列数据一样，会使用循环神经网络（特别是\
  \ LSTM 或 GRU）。\n\n**序列到序列**或 **seq2seq** 可能是最著名的技术，应用于机器翻译、文本摘要和聊天机器人。\n\n`seq2seq`\
  \ 实际上是 RNN 的一个特殊类别，它使用**编码器-解码器架构**。编码器将输入数据按序列逐个输入到 LSTM/GRU 网络中，生成上下文向量（隐藏状态向量）以及输出。^(¹⁷⁶)\
  \ 解码器（也是一个 LSTM/GRU）使用编码器网络的最终状态（上下文向量）进行初始化，并在一次前向传播中生成输出。解码器通过反复将之前的输出反馈回解码器来生成未来的输出，从而进行训练。\n\
  \n![](img/527966_1_En_10_Fig8_HTML.jpg)\n\n一张示意图展示了从编码器到解码器的上下文编码和解码过程。句子中的每个单词都被分配了一个唯一的数字。\n\
  \n**图 10-8** 展示机器翻译的 PyTorch 序列到序列编码器-解码器架构\n\n\n\n#### 变换器与注意力模型\n\n序列到序列模型在处理较短句子时表现良好，但较长句子往往会加重底层编码器-解码器网络的内部记忆负担。近年来发展出了变换器模型，其中引入了增强型注意力机制或注意力模型，迫使模型关注输入序列的特定部分。\n\
  \n本质上属于“大规模”深度学习模型，变换器可以通过 [Hugging Face](https://huggingface.co/) 库在 Python 中实现。谷歌的\
  \ `BERT`（来自变换器的双向编码器表示）、OpenAI 的 `GPT-3`（生成式预训练变换器）^(¹⁷⁷) 以及艾伦人工智能研究所的 `ELMo`（来自语言模型的嵌入）是其中最大的三个模型。\n\
  \n围绕 `GPT-3` 尤其存在大量炒作，源于该技术能够轻松利用基于数十亿参数预训练的模型来撰写文章和论文^(¹⁷⁸)，甚至重现古代哲学家之间的对话^(¹⁷⁹)。本章开头提到的谷歌仅解码器变换器语言模型\
  \ `LaMDA`（对话应用语言模型）^(¹⁸⁰)，可以说是下一代模型，它基于 1370 亿个参数和数万亿条公共对话数据进行了预训练。\n\nPython 封装库\
  \ `bert-extractive-summarizer` 利用 HuggingFace PyTorch 变换器库，可生成长文本的摘要。^(¹⁸¹) 通过在\
  \ OpenAI 注册个人使用账户后安装 `openai` 库并获取 API 密钥，即可在 Python 中实现 `GPT-3`。\n\n### 词嵌入：动手实践\n\
  \nWORD2VEC 可视化\n\n现在我们来看本节讨论的一些技术，首先介绍如何实现 Word2Vec 来向量化非结构化数据，并绘制生成的词嵌入：\n\n1.\
  \  克隆以下 GitHub 仓库：\n\n    [`​github.​com/​bw-cetech/​apress-10.​3.​git`](https://github.com/bw-cetech/apress-10.3.git)\n\
  \n2.  在 Jupyter 或 Colab 中运行 Python 笔记本步骤，以：\n    1.  从 `intents.json` 文件导入数据\n \
  \   2.  结合使用词汇、句法和语义技术清洗数据\n    3.  对数据进行分词，并使用 Word2Vec 构建模型\n    4.  显示模型词汇表\n\
  \    5.  查看一个样本词嵌入向量\n    6.  绘制所有词嵌入\n\n3.  练习 – 提高词嵌入图中词标签的可见性\n\n4.  练习（拓展） –\
  \ 将 json 意图数据替换为更大的 10 页以上 PDF，并在绘制词嵌入前执行主题建模\n\n### Seq2Seq：动手实践\n\n用于语言翻译的编码器-解码器模型\n\
  \n本实验的目标是使用 Keras 和 LSTM 深度学习，实现一个字符级序列到序列模型，将英语翻译成法语^(¹⁸²)\n\n1.  克隆以下 GitHub 仓库：\n\
  \n    [`​github.​com/​prasoons075/​Deep-Learning-Codes/​tree/​master/​Encoder%20​Decoder%20​Model`](https://github.com/prasoons075/Deep-Learning-Codes/tree/master/Encoder%2520Decoder%2520Model)\n\
