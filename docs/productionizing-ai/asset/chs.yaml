  \n### AI 开发的软件与工具\n\n基于第一部分的内容，我们现在来探讨实际的 AI 应用/软件开发，比较主要的云供应商及其可用于支持 AI 项目和基础设施的工具与服务，开发特定行业的用例和解决方案，最终成功部署应用程序。\n\
  \n### AI 需要数据与云\n\n云对于 AI 应用集成以及数据为应用提供支持的重要性不容低估。虽然云是 AI 的关键推动因素，但只有当数据策略建立在丰富、海量的数据源和/或训练数据之上时，云才能为\
  \ AI 发挥作用。\n\n如今成功的数据项目都已（企业级）AI 化，需要端到端的云基础设施，特别是存储和计算，作为大数据处理的主要云组件。\n\n虽然企业级机器学习项目可以在两者上以较低的开销运行，但深度学习项目则不能。\n\
  \n如下文所述，所有主要的云服务提供商都提供了一系列 AI 服务和工具，极大地简化了构建应用程序的过程。但必须注意隐藏的成本。^(¹⁰⁹) AWS、Azure\
  \ 和 GCP 这三大巨头最近已尝试让定价模式更加透明，但任何希望在缺乏企业预算支持的情况下进行实验的人显然都处于不利地位。\n\n![](img/527966_1_En_7_Fig8_HTML.jpg)\n\
  \n一组三张表格描绘了大规模洞察交付。其中包括 IDC 市场、基于决策管理、数据文化与素养、领域洞察等的未来智能软件工具。\n\n图 7-8\nIDC 市场概览——智能的未来\n\
  \n![](img/527966_1_En_7_Fig7_HTML.jpg)\n\n一幅插图描绘了 Forrester 浪潮云数据仓库。它包括挑战者、竞争者、强劲表现者和领导者，并揭示了更强的战略、市场占有率以及更强和更弱的现有产品。\n\
  \n图 7-7\nForrester 浪潮——领先的云数据仓库\n\n![](img/527966_1_En_7_Fig6_HTML.jpg)\n\n一幅插图描绘了\
  \ Gartner 魔力象限，包含执行能力和愿景完整性。它包括：1. 挑战者；2. 领导者（微软、谷歌、IBM）；3. 利基市场参与者；4. 远见者。\n\n\
  图 7-6\nGartner 魔力象限——领先的云服务提供商\n\n### 云平台\n\n业界对领先的云平台已有普遍共识，但我们现在将进一步深入探讨每个平台提供的主要服务和资源，从亚马逊云服务开始。\n\
  \n#### AWS\n\nAWS 声称提供最广泛、最深入的机器学习服务和配套云基础设施。`SageMaker` 是数据科学的主要工具，因其在机器学习方面的可扩展性；而在\
  \ NLP 方面，AWS 还提供 Amazon Polly（文本转语音）和 Lex（聊天机器人）。\n\n从使用 AWS 的客户名单（如西门子、FICO、F1、普华永道和\
  \ Netflix）中可以明显看出，AWS 拥有强大的 AI 行业用例集，包括文档处理、欺诈检测和预测。\n\n作为全球最大的云服务提供商，许多 AI 应用依赖\
  \ AWS 广泛的支持基础设施，从简单存储服务（`S3`）云存储到弹性计算（`EC2`）实例、弹性 MapReduce（`EMR`）——用于运行 Apache\
  \ Spark 的托管集群、`Redshift`——AWS 的云数据仓库、`Lambda`——用于处理事件的无服务器计算，以及用于实时流式传输的 `Kinesis`。\n\
  \n然而，尽管表面如此，AWS 的“免费套餐”并非完全免费。AWS 产品可以*“免费探索”*，*部分*产品是免费的，有些则*在限定时间内免费*。几乎所有产品都有容量/使用限制。\n\
  \n#### Azure\n\n微软 Azure AI 平台的优势在于对关键 Azure 云服务的 API 访问，以及令人印象深刻的客户名单，包括空客、英国国家医疗服务体系、雀巢和英国广播公司。\n\
  \n使用 Azure SDK，通过 Jupyter Notebook 和 Visual Studio Code 进行简单的 API 调用，即可与底层 Python\
  \ 代码、`sklearn` 机器学习以及 `TensorFlow`/`PyTorch` 深度学习模型集成。\n\nAzure SDK 还支持访问 Azure\
  \ 机器学习，并通过 Azure Kubernetes 服务（`AKS`）、Azure Databricks（支持 Apache Spark）以及 Azure\
  \ 认知服务中的高质量视觉、语音、语言和决策模型（包括异常检测器、内容审查器、`LUIS` 和 `QnA Maker`（基于知识的聊天机器人/对话式 AI）、语音转文本/文本转语音以及计算机视觉（预构建模型）和自定义视觉（构建自己的模型）进行扩展。\n\
  \n![](img/527966_1_En_7_Fig9_HTML.png)\n\nAzure AI 架构。它包括 Azure 应用 AI 服务（云安全模型）、Azure\
  \ 认知服务（可定制的 API）、AI 基础设施和 Azure 机器学习（端到端 ML 平台）。\n\n图 7-9\nAzure AI\n\n#### GCP\n\
  \n尽管 `TensorFlow` 现已开源，但它仍是谷歌的“亲儿子”，仍由谷歌研究人员开发，并且可能仍然是谷歌云平台（`GCP`）上开发 AI 项目的独特卖点。\n\
  \n当与 `BigQuery`（谷歌的无服务器数据仓库）、`Vertex AI`（托管机器学习）以及用于运行 Jupyter 笔记本的 `Colab` 结合使用时，谷歌为数据科学家和\
  \ AI 工程师提供了大量强大的产品。\n\n`Vertex AI` 以前隶属于谷歌 AI 平台，是将沙盒机器学习模型投入生产的首选“托管服务”，包括 Cloud\
  \ `AutoML`（高质量低代码模型，采用最先进的迁移学习）。它还支持深度学习容器，以及从中央仓库和 Google AI Hub 上的 ML 流水线共享代码。\n\
  \nAI Hub 上的相同 ML 流水线可以部署到基于 Docker 的高度可扩展且可移植的 `Kubeflow` 流水线上。\n\nGoogle 自然语言 API\
  \ 提供与 Google NLP 模型的应用集成，而 `Dialogflow` 则用于将聊天机器人和智能虚拟助手集成到移动和 Web 应用中。\n\n\n\n\
  #### IBM Cloud\n\n尽管 IBM 可能已不再处于大型科技公司的第一梯队，且`IBM Cloud`也未被列入“三大”云服务提供商之列，但毫无疑问，该公司在创新方面依然保持领先地位，常常在主流市场普及之前就推出新的开发成果和服务。\n\
  \nIBM 的`Watson`平台自 2011 年在“危险边缘！”问答节目中获胜以来，一直是商业 AI 领域的先驱，并持续推动着 IBM 当前在`IBM Cloud`上提供的一系列\
  \ AI 服务。主要工具如下所示：\n\n- `WATSON Studio` – 数据科学平台\n- `WATSON Assistant` – 聊天机器人/智能虚拟助手\n\
  - `WATSON Discovery` – 企业级 AI 搜索\n- `WATSON Knowledge Studio` – 特定领域的自然语言处理（NLP）内容整理\n\
  \n最近，`IBM Cloud Pak® for Data`（`CPDaaS`）已成为 IBM 首选的业务数据与 AI 一体化平台，它通过自动化（`AutoAI`）以及对数据和\
  \ AI 生命周期的治理，将 AI“注入”到应用程序中。\n\n`Cloud Pak`是一个一站式平台，用于收集、整理和分析数据资产，以进行机器学习和深度学习。它由集成的微服务组成，这些微服务受益于在多节点`Red\
  \ Hat® OpenShift®`集群上运行。`Cloud Pak`提供开放且可扩展的`REST API`，支持混合云和本地资源，并能以“最小化”停机时间实现弹性资源管理。\n\
  \n#### Heroku\n\n作为最早的云平台之一，`Heroku`现在归`Salesforce`所有。虽然知名度稍低，但就简洁性和优雅性而言，它是我们最喜欢的平台之一。应用程序可以像在其他主流平台上一样，在云上进行部署、管理和扩展。\n\
  \n在我们看来，对于快速部署应用程序而言，这是最具成本效益的云平台。免费计划不会强制用户/开发者花费积分来启用机器/深度学习工具，前提是你限制每月的使用量。例如，`Azure\
  \ VMs`和`AWS SageMaker`并非免费，但你可以在`Heroku`上免费部署一个机器学习/深度学习应用。\n\n模型扩展也很直观——只需为应用程序的每月正常运行时间选择简单的“按需付费”选项。托管模型通过`Heroku`的`dynos`完成——这些是支撑/驱动`Heroku`应用程序的构建块。本质上它们是容器，但每种\
  \ dyno 类型都带有特定数量的集群工作节点（免费/爱好级 dyno 为 1 个集群，标准级为 2 个集群，中性能级为 5 个集群，高性能级为 28 个集群）。\n\
  \n`Heroku`为我们介绍了可用于构建 AI 解决方案的主要云平台。本节的剩余部分将探讨如何通过基于 Python 的用户界面来为这些解决方案提供前端支持。^(¹¹⁰)\n\
  \n### 基于 Python 的用户界面\n\n下面我们将介绍三种主要的用于创建 Web 应用的 Python 框架。我们将在第 9 章中介绍另一个框架`Streamlit`，它使用简单的\
  \ API，支持定义为 Python 变量的交互式小部件，并且部署速度非常快。^(¹¹¹)\n\n#### Flask\n\n`Flask`是一个用 Python\
  \ 编写的微 Web 框架。\n\n代码简单、独立但可扩展，非常适合单页应用。`SQLAlchemy`可用于数据库连接，并且`Flask`支持的数据库范围（例如\
  \ NoSQL）比`Django`（下文讨论）更广。\n\n正如我们将在本节后的动手实验中看到的，在安装 Python 用于独立脚本编写以及`Visual Studio\
  \ Code`之后，推荐的工作流程是从 GitHub 克隆一个 flask 应用，`cd`进入该应用的本地副本，并使用以下命令创建一个虚拟环境：\n\n```\n\
  python -m venv env\nenv\\Scripts\\Activate\n```\n\n然后，在虚拟环境中以常规方式安装`Flask`，即：\n\n\
  ```\npip install flask\n```\n\n#### Dash\n\n`Dash`将 Python 脚本转换为生产级业务应用。它填补了传统 BI/Tableau/PowerBI/Looker\
  \ 仪表板中存在的**预测分析空白**，支持复杂的 Python 分析/商业智能，并构建在`Flask`、`Plotly.js`和`React.js`之上。\n\
  \n`Dash`还为机器学习和深度学习模型提供了“点击式界面”，极大地简化了为 AI 应用（例如，目标检测和自然语言处理用户界面，如聊天机器人）提供前端支持的过程。\n\
  \n`pip install dash`命令还会安装许多其他工具：^(¹¹²)\n\n- `dash_html_components`\n- `dash_core_components`\n\
  - `dash_table`\n- `plotly` 绘图库\n\n`Dash`的吸引力在于它能够快速封装用户界面 Python 代码；它通过一个包含四个文件（具有类似\
  \ HTML 的元素）的文件结构来实现这一点：\n\n- **布局（Layouts）** – 描述仪表板的外观\n- **组件（Components）** –\
  \ 组件构成布局，包括`dash_core_components`和`dash_html_components`\n- **回调（Callbacks）** –\
  \ 控制 Dash 应用的交互性\n- **Bootstrap** – 用于创建交互式和移动端就绪应用的预构建 CSS 框架\n\n![](img/527966_1_En_7_Fig10_HTML.jpg)\n\
  \n屏幕显示了一个包含物联网流数据警报的控制图仪表板。它包括一个过程控制指标摘要、一个实时 SPC 图以及一个按参数显示 OOC 百分比的饼图。\n\n**图\
  \ 7-10** 用于物联网流数据警报的 Dash 用户界面\n\n#### Django\n\n被 Facebook、Instagram 和 Netflix\
  \ 使用的`Django`，旨在让开发者能够更轻松、更快速、用更少的代码构建更好的 Web 应用。与`Flask`一样，`Django`是一个用于快速开发 Web\
  \ 应用的高级 Python Web 框架，但相比之下，这些应用往往是全尺寸的，并且比更简单的`Flask`有限页面应用更强大。\n\n`Django`是免费且开源的，拥有一个“功能齐全”的框架，预装了大部分功能。它带有自动化工具以避免重复性任务，以及一个简洁且“务实”的设计，通过简化的三步流程来处理模型更改，从而省去了\
  \ Web 开发中的许多麻烦：\n\n- 在`models.py`中更改模型\n- 运行`python manage.py makemigrations`为更改创建迁移文件\n\
  - 运行`python manage.py migrate`将这些更改应用到底层数据库\n\n### 其他 AI 软件供应商\n\n在本节中，我们最后来看一些其他\
  \ AI 软件供应商，它们各自都能以独特的方式支持 AI 应用的构建。\n\n#### ONNX（开放神经网络交换格式）\n\n`ONNX`是一个用于机器学习的开源模型格式和运行时，其平台无关的设计便于在不同框架和硬件平台之间迁移。在大型科技公司占据主导/整合的时代，它的吸引力在于其社区模式和互操作性。\n\
  \n#### C3\n\n`C3`是一家 AI 和物联网软件提供商，用于构建企业级 AI 应用。它提供开箱即用/预构建的、针对特定行业的 AI 应用，以优化关键流程——`C3`声称每天运行\
  \ 480 万个 AI 模型并执行 15 亿次预测。\n\n#### DataRobot\n\n`DataRobot`的整个商业模式（和独特卖点）是 MLOps\
  \ 自动化以及“加速从数据到价值的转化”。该产品面向技术能力较弱的用户，例如，希望在没有机器学习知识的情况下构建预测分析的业务分析师。\n\n现在，我们将进入本节动手实验环节，看看上面介绍的三个工具。\n\
