  \ 创建图表 – 此时图表将为空白\n    5.  Data Streamer 选项卡 ➤ 播放数据\n\n    **您应该能够在图表中看到以时间线形式呈现的流式数据。**\n\
  \n4.  练习：利用 Jupyter Notebook 中下载的 Python 脚本 `StockPriceScraper.ipynb`，导出从 1 月 21\
