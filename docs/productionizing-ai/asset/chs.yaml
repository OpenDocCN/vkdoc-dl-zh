- "# 9. 部署 AI 解决方案（生产化与容器化）\n\n**将 AI 模型生产化并非易事。** 许多 AI 项目都停留在概念验证阶段，Gartner 指出，50%的\
  \ IT 领导者将难以将其 AI 项目从演示/原型阶段推进到生产阶段。在创建概念验证和生产级企业 AI 解决方案这两个目标之间，组织内部常常存在混淆，部分原因是业务部门其他人员缺乏相关专业知识。毕竟，如果其他员工没有至少掌握基本的\
  \ AI 技能、不了解如何使用 AI 及其优势，更重要的是不知道如何与 AI 交互或使用它，那么生产化就毫无意义。\n\nAI 实施需要务实的心态和纪律。与炒作相反，许多问题实际上源于试图将\
  \ AI 应用于“一切”。AI 是增强智能，意味着它通过“人在回路中”的方式来解决特定的业务问题。其他项目问题则源于 2010 年代的数据科学家随意构建“Kaggle\
  \ 级别”的模型，积累“技术债务”，而忽视了在业务/组织环境中所需的实用性、局限性和集体学习。\n\n所涉及的数据量巨大也意味着，试图先解决最大的问题在 AI\
  \ 中行不通——工作量估算应纳入前期规划。通常，从小处着手并“保持专注”更好——你并不总是需要“大数据”来训练模型——并询问诸如增量性能提升是否值得存储和/或管道延迟开销之类的问题？\n\
  \n我们的倒数第二章试图提出这些问题，并提供一个“串联各个点”的实用视角，解决障碍并简化在云上实现企业 AI 全栈部署和生产化的挑战。\n\n在我们的实践实验室中，从测试版应用走向生产，并最终在云上托管应用，我们首先回顾\
  \ AI 项目在开发、交付和测试阶段的项目生命周期和敏捷技术。我们研究如何根据最佳实践映射用户旅程，定义成功框架，以及流程优化和领先 AI 工具的集成。\n\n\
  在再次审视分布式存储、并行化以及在 AI 应用扩展和弹性背景下优化计算（和存储）之后，我们以两个实践实验室结束本章，这两个实验室围绕生产化 AI 解决方案的两种最佳方式——在\
  \ Azure 上容器化 AI 应用并在 Heroku 上托管。\n\n## 生产化 AI 应用\n\n我们从宏观视角开始，审视部署的障碍、关于云/基础设施的决策，以及在跑之前先学会走路的重要性。\n\
  \n### 生产化的典型障碍\n\nAI 项目本质上分为两个不同的阶段——实验和工业化。\n\n两者的目标不同；实验的目标是尽可能快速准确地找到一个能回答（业务）问题的模型，而工业化的目标是可靠且自动地运行应用程序。\n\
  \n客户/公司是小型（初创公司）还是大型（企业）将影响我们的解决方案。如图 9-1 所示，对于进行实验的初创公司，缺乏数据和预算是制约因素，而（数据）工程资源缺口是生产化的主要障碍。对于中型组织，运行概念验证所需的专用服务器和云基础设施通常缺乏，而数据孤岛^(¹³⁵)和重建多系统生产环境的困难则给企业带来了重大挑战。当与分散的利益相关者责任和不可移动的遗留系统相结合时，这些问题可能会阻碍任何有意义的生产化（企业\
  \ AI）解决方案。\n\n![](img/527966_1_En_9_Fig1_HTML.jpg)\n\n两张图表。第一张图表标题为实验。第二张图表标题为工业化。两张图表都有三个副标题：初创公司、中型企业和大型企业。\n\
  \n图 9-1\n\nAI 实验与工业化（来源：[`towardsdatascience.com`](http://towardsdatascience.com)）\n\
  \n### 云/CSP 轮盘赌\n\n无论是初创公司、中小企业还是大型企业，可实施的企业 AI 解决方案通常必须克服五个关键限制：\n\n*   赢得利益相关者的支持\n\
  *   清晰的数据处理策略\n*   云存储和计算\n*   解决方案持久化的成本\n*   创新\n\n如今，大多数 AI 解决方案在 AWS、Azure 和\
  \ GCP 这三个主要 CSP 上存在显著的“解决方案集中度”（图 9-2）。无论是存储还是计算，很可能在亚马逊、微软或谷歌上配置了一两个服务/资源。\n\n\
  考虑到这一点，通过四个不同阶段来规划和界定项目范围，有助于引导 AI 项目走向利益相关者达成一致的解决方案：\n\n*   设计与实施\n*   第三方接口\n\
  *   训练与测试\n*   采用\n\n![](img/527966_1_En_9_Fig2_HTML.jpg)\n\n该图代表三个人，分别是 G C P A\
  \ L 平台、azure M L 和 A W S sagemaker。这三个人互相用枪指着对方。\n\n图 9-2\n\nCSP 市场力量\n\n### 简化\
  \ AI 挑战——从小处着手，保持专注\n\n在界定解决方案范围时，特别是为了实现上述最后一个阶段（实现 AI 采用）的目标，围绕三个数据/MLOps 成熟度级别来准备开发和实施是一个好主意：\n\
