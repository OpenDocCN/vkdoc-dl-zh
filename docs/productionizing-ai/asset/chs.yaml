  \ `x1` 和 `x2` 坐标的变换）经过网络的隐藏层到输出\n4. 顶部显示了一些超参数（用于微调建模过程的杠杆）——我们将在本章后面介绍这些内容\n5.\
  \ 注意问题类型设置为“分类”——我们试图预测数据属于蓝色组还是橙色组\n6. 以第一个（同心圆）数据集为例，尝试调整 (a) 特征数量、(b) 隐藏层数量以及\
  \ (c) 每层神经元数量，并观察模型收敛的速度（损失接近零）。注意，隐藏层和神经元越多，收敛速度越快\n7. 练习：尝试在最复杂/非线性的数据集（螺旋模式）上训练模型，并观察需要多长时间（多少个周期）才能使损失低于\
  \ 0.05\n8. 拓展练习：找到一个合适的配置，在 500 个周期内使损失低于 0.01\n\n## 随机过程\n\n在进一步探讨当今实际行业用例中使用的不同类型的神经网络之前，我们首先需要了解一些基本的概率论，以理解\
  \ ANN 中发生的复杂过程。\n\n\n\n### 生成式模型与判别式模型\n\n理解深度学习模型工作原理的一个关键概念，在于区分判别式模型与生成式模型。\n\
  \n判别式模型和生成式模型都用于执行机器学习和深度学习。两者的区别在于：判别式模型基于条件概率 `p(y|x)` 进行预测，寻找类别间的决策边界，并用于监督学习；而生成式模型则通过显式建模每个类别的实际分布，从联合概率分布\
  \ `p(x,y)` 中预测条件概率，并用于无监督特征学习。\n\n为了理解这一概念，可以类比如何将语音分类为两种语言之一。我们可以利用语言模型之间的差异（判别式），也可以分别学习每种语言（生成式）。\n\
  \n由于神经网络试图学习哪些特征 `x` 会映射到 `y`，从而对输入进行判别，因此它们使用的是判别式模型。\n\n![](img/527966_1_En_5_Figa_HTML.jpg)\n\
  \n两种模型的示意图。左侧为判别式模型，右侧的生成式模型描绘了两个分离的椭圆形状。\n\n### 随机游走\n\n理解神经网络的另一个重要概念是随机游走。\n\n\
  随机游走是一种随机过程，描述了一个由变量上连续随机步骤组成的路径。我们可以想象一个人在十字路口每次抛两次硬币来决定前进、后退、向左或向右，从而可视化二维随机游走：\n\
  \n- 正面、正面 -> 前进\n- 正面、反面 -> 向右\n- 反面、正面 -> 向左\n- 反面、反面 -> 后退\n\n我们将在本节的动手实验中很快创建这个二维随机游走。\n\
  \n这里的重要方面是，随机游走每一步的每个结果都具有相等的概率。随机游走对于例如图像分割非常重要，它们用于确定与每个像素相关联的标签（例如“物体”或“背景”）。它们也用于对大规模在线图（如在线社交网络）进行采样。\n\
  \n### 马尔可夫链与马尔可夫过程\n\n马尔可夫链是一种随机模型，描述了一系列可能的事件，其中每个事件的概率仅取决于前一个事件的状态。\n\n马尔可夫链的定义特征是，无论过程如何到达当前状态，可能的未来状态都是固定的。实际上，马尔可夫链是无记忆的——给定当前和过去状态，过程未来状态的条件分布仅取决于当前状态，而完全与过去状态无关。\n\
  \n这里用一个赌博类比来帮助理解——押注一系列独立公平抛硬币的结果：\n\n- 如果正面，她/他赢得一美元。\n- 如果反面，她/他输掉一美元。\n\n停止条件是\
  \ (a) 她/他达到 N 美元的财富，或 (b) 他/她的钱包空了。\n\n建模为马尔可夫过程的系统产生了隐马尔可夫模型（HMM）——类似于神经网络/深度学习中的隐藏层/状态的统计模型。\n\
  \n要了解它们如何工作以及如何应用于现实世界现象，请查看一个实际运行的马尔可夫链：[`https://setosa.io/ev/markov-chains/`](https://setosa.io/ev/markov-chains/)\n\
  \n### 其他随机过程：鞅\n\n鞅的概念在时间序列分析、量化金融、算法交易和博彩业中非常重要。\n\n最初是 18 世纪法国的一类赌博策略，赌徒 (a) 如果抛硬币正面朝上则赢得赌注，反面则输掉，并且\
  \ (b) 每次输后加倍赌注。其思想是，如果赌徒的财富和可用性是无限的，那么最终抛出正面的概率趋近于 1。\n\n深度学习模型（尤其是循环神经网络）的统计能力，与以鞅理论为基础的\
  \ ARMA/ARIMA 时间序列模型有相似之处。\n\n### 用 Python 实现随机游走：动手实践\n\n神经网络基础——随机理论\n\n**使用 Jupyter\
  \ Notebook 中的 Python，本练习的目标是用 Python 实现一个二维随机游走：**\n\n1.  克隆以下 GitHub 仓库：\n\n  \
