  ### 用于数据摄入的云服务：动手实践\n\n在下一个实验中，我们还将探讨如何通过主要的云服务之一来流式传输数据以进行数据摄入。\n\n#### 使用 Python\
  \ 与 AWS KINESIS 进行流式传输\n\n**本练习的目标是构建一个 Python 脚本，在 AWS 中创建访问密钥、IAM 策略和 IAM 用户，然后连接到\
  \ Kinesis 并流式传输股票价格数据。**\n\n1.  创建一个新的（空白）Python 脚本（例如，在 Jupyter notebook、Google\
