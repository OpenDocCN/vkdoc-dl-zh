  \ Replika [`https://replika.com/`](https://replika.com/) 的超链接截图\n\n## 代码仓库\n\n任何致力于开发`AI`解决方案的凝聚力团队都需要“步调一致”。代码仓库（“repos”）是确保开发人员和数据专家协同工作的关键协作推动因素之一。\n\
  \n\n\n### Git 与 GitHub\n\n版本控制，或称源代码控制，是一种跟踪和管理源代码变更的实践。近年来，版本控制系统（VCS），特别是分布式版本控制系统（DVCS），对\
  \ DataOps 团队来说变得非常有价值。除了固有的“DevOps”优势（包括缩短开发时间和提高成功部署次数）之外，不断演变的数据集，例如广泛使用的[约翰霍普金斯大学的新冠数据](https://github.com/CSSEGISandData)，也越来越多地通过分布式版本控制系统进行维护。\n\
  \n`Git`^(³³) 是迄今为止最流行的 DVC，尽管还有其他一些系统，例如 `Beanstalk`、`Apache Subversion`、`AWS CodeCommit`\
  \ 和 `BitBucket`，它们用于需要与其他（通常是单一的）CSP 提供商进行特定集成的项目。\n\n除了可追溯性和文件变更历史（跟踪每一次代码修改和每一次数据集变更）之外，`Git`\
  \ 还简化了在开发过程中回滚到早期代码/数据状态的过程，并增强了分支和合并功能，这对于处理特定应用组件或用户故事的 DataOps 团队至关重要。\n\nGitHub“生态系统”包含\
  \ `Git`（实际上是命令行后端）、GitHub（一种基于云的托管服务，允许您从中心位置管理 Git 仓库）以及 GitHub Desktop（一种桌面版本，可通过\
  \ GUI 与 GitHub 交互）。\n\n如今，全球数百万软件开发者和公司都在使用 GitHub。2020 年 2 月之前存在的公共仓库已存档于 GitHub\
  \ Arctic Code Vault 中——这是一个位于北极山脉永久冻土层下 250 米处的长期档案库。在 GitHub 上**复刻**一个仓库，或者将一个公共\
  \ GitHub 仓库**克隆**到本地目录，是在 GitHub 上访问和开发已有源代码（或更新数据集）的主要方式。这两种操作都可以通过终端中的 `git` 命令或（更直观地）使用\
  \ GitHub Desktop 来完成。\n\n![](img/527966_1_En_2_Fig8_HTML.jpg)\n\nGitHub 生态系统示意图。它包含\
