  ```\n\n### 测试、性能评估与监控\n\n本章的最后一部分将探讨数据/MLOps 环境中的自动化测试、性能评估和应用监控。\n\n#### Selenium\n\
  \nSelenium 创建于 2004 年，用于自动化 Web 应用的测试操作，是一个支持跨浏览器和跨平台测试的自动化框架，并支持多种语言（Java、C#、Python）。与\
  \ DataOps 生态系统中的许多工具一样，它是免费且开源的。\n\nSelenium 不仅是一个单一工具，而是一个软件套件，可根据特定组织的质量保证（QA）需求进行定制，并支持涉及数据管道和分析的重要\
  \ DataOps 单元测试流程^(³⁸)。单元测试完成后，持续集成开始，QA 测试人员能够创建测试用例和测试套件，用于逻辑分组的测试用例，包括传输中数据和静态数据。\n\
  \n在 Jenkins 中运行 Selenium 测试允许用户：(a) 每次软件变更时运行测试；(b) 测试通过后将软件部署到新环境。Jenkins 还可以安排\
  \ Selenium 测试在特定时间运行，并保存执行历史记录和测试报告。\n\n![](img/527966_1_En_2_Fig18_HTML.jpg)\n\n\
  流程图展示了 Jenkins、Maven 和 Selenium 的过程接口。该过程从触发 Jenkins 构建开始，还包括显示测试报告。\n\n图 2-18\n\
  \nJenkins、Maven 和 Selenium 过程接口\n\n#### TestNG\n\nSelenium 测试脚本可与 TestNG（下一代测试）配合使用——这是一个测试框架，解决了\
  \ Selenium Webdriver 中的报告缺口，可在执行后生成默认的 HTML 报告。这些报告（如下所示）标识了测试用例的信息（如通过、跳过或失败）以及项目的整体状态。\n\
  \n![](img/527966_1_En_2_Fig19_HTML.jpg)\n\n窗口页面展示了 TestNG 报告。该报告显示了测试用例的信息，包括通过、失败、跳过、时间、包含组和排除组。\n\
  \n图 2-19\n\nTestNG 报告\n\n#### 问题管理\n\n问题管理与问题追踪允许项目经理、用户或开发人员记录并跟进数据项目中的问题进度，捕获缺陷、错误、功能请求和客户投诉。问题追踪标准通常包括：\n\
  \n*   重要程度\n*   分配的团队成员\n*   进度指标\n\n![](img/527966_1_En_2_Fig20_HTML.jpg)\n\n活动完成情况图展示了发布\
  \ ID，以及已完成、按时、逾期、延迟和即将到来事项的百分比详情。\n\n图 2-20\n\n软件交付发布——问题追踪（Plutora）\n\n##### Jira\n\
  \nJira 是最流行的问题（工单）追踪和项目管理工具之一，尽管 Trello、GitHub Boards 和 Monday 也被广泛使用。\n\nJira 由\
  \ Atlassian 开发，已存在多年（2002 年），是一款敏捷项目管理和问题/缺陷追踪工具。它配备了易于使用的仪表板和“无压力”的项目管理功能，包括敏捷交付特性，如团队/用户故事和冲刺监督、Scrum\
  \ 和看板面板、路线图以及团队绩效报告。\n\n##### ServiceNow\n\nJira 与 ServiceNow 集成——这是一个工作流自动化解决方案，用于连接组织内的人员、功能和系统。ServiceNow\
  \ 的产品独特卖点在于提升客户服务并将员工队伍/员工数字化。\n\n下图展示了 ServiceNow 如何在 CI/CD 管道中自动化变更请求工作流。\n\n\
  ![](img/527966_1_En_2_Fig21_HTML.jpg)\n\n图示展示了使用 ServiceNow 自动化变更请求工作流的过程。该过程涉及分配资源、完成构建和测试、变更审批以及部署。\n\
  \n图 2-21\n\n使用 ServiceNow 在 CI/CD 管道中自动化变更请求\n\n除了明显的自动化生产力优势外，ServiceNow 还通过“AIOps”帮助扩展\
  \ IT 能力，跨组织解释遥测数据，并使用机器学习进行例如异常检测等操作。\n\n![](img/527966_1_En_2_Fig22_HTML.jpg)\n\
  \n一组 2 个表示图和 1 个 ServiceNow AIOps 图表展示了遥测数据的收集、噪声的减少以及异常的检测。\n\n图 2-22\n\nServiceNow\
  \ AIOps – 遥测异常检测\n\n\n\n### 监控与告警\n\n当 AI 应用经过全面测试，并建立了问题管理流程后，重点便转向了应用监控——这在 AI\
  \ 领域至关重要，因为数据变化（数据漂移）会迅速导致模型结果失效或欠佳。\n\n最终目标并非单纯的监控，而是 AI 应用的“可观测性”——即对数据管道和数据“健康度”的更深入理解。最佳的系统在其底层产品中内置了跟踪、告警和推荐功能，并通过统计过程控制（SPC）持续监控和管理数据分析管道。一旦出现异常，分析团队会通过自动告警收到通知。\n\
  \n`Nagios`（下文将介绍）是最流行的应用监控工具之一，但`Databand`的可观测性平台在`DataOps`领域正逐渐获得关注。`Databand`支持数据工程师排查管道故障和数据质量问题——其目标是实现洞察的细粒度、持久性、自动化、普遍性和及时性。\n\
  \n![](img/527966_1_En_2_Fig23_HTML.jpg)\n\n一个金字塔框架解释了数据监控的最佳实践。它包括数据访问、数据趋势、数据合理性、管道延迟和管道执行。\n\
  \n**图 2-23** Databand 应用监控\n\n#### Nagios\n\n`Nagios`监控整个 IT 基础设施，以确保系统、应用程序、服务和业务流程正常运行，并在发生故障时通知技术人员。`Nagios`甚至比`Jira`更早问世，于\
  \ 1999 年首次发布。\n\n`Nagios`工具套件包括企业服务器和网络监控软件（`Nagios XI`）、集中式日志管理、监控和分析（`Nagios Log\
  \ Server`）、基础设施监控（`Nagios Fusion`），以及带带宽利用率的 Netflow 分析（`Nagios Network Analyzer`）。\n\
  \n![](img/527966_1_En_2_Fig24_HTML.jpg)\n\n`Nagios XI`的一个窗口页面展示了网络状态图。它每 10 秒更新一次。左侧是图表、地图、事件管理和监控流程选项。\n\
  \n**图 2-24** Nagios XI\n\n### Jenkins CI/CD 与 Selenium 测试脚本：动手实践\n\n**持续测试**\n\n\
