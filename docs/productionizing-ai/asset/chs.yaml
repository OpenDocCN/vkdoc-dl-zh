- "# 5. 神经网络与深度学习\n\n当今大多数“旗舰级”或“被热炒的”人工智能应用的核心是深度学习，特别是人工神经网络（ANN）的使用及其预测能力。\n\n\
  这些神经网络如何消耗海量数据来运行，并最终实现通常令人惊叹的复杂预测，是本章的主题。\n\n更具体地说，本章的主要收获是了解从何处开始使用人工智能，包括历史背景、从机器学习到深度学习的业务/用户旅程，以及实现深度学习所需的基础大数据/云架构。为此，我们将介绍基础的随机过程理论及其与神经网络的关系，以及深度学习中使用的不同类型的神经网络。我们将探讨深度学习模式的生命周期、基于大数据进行建模和推断的技术，以及围绕模型训练和测试过程的关键诊断方法，还有我们可用的许多杠杆，例如激活函数、池化层和丢弃法，以实现更好的性能。\n\
  \n总而言之，最终的目标是如何为深度学习建立正确（最佳实践）的人工神经网络架构、数据编排管道和基础设施。在本书的其余部分和动手实验中，我们将介绍许多人工智能工具，但本章的重点将围绕\
  \ `TensorFlow`、`Keras` 和 `PyTorch`。\n\n## 深度学习简介\n\n在第一部分中，我们将从介绍开始，涵盖关键概念、历史里程碑、人工智能炒作周期以及支撑深度学习的神经网络架构。\n\
  \n### 什么是深度学习\n\n在我们深入探讨神经网络的细节之前，我们应该先理清这些（经常被误解的）用于解决复杂问题的算法结构与相对较新的“深度”学习概念之间的关系。\n\
  \n当今的共识是，深度学习本质上是基于人工神经网络的机器学习的一个子领域，而两者都是人工智能的子领域。因此，与机器学习一样，深度学习涉及自动化机器来执行（预测性）任务，但这次底层算法要复杂得多，并且高度非线性。“深度”这个名称来源于神经网络中的隐藏层，大部分优化和收敛过程都在这些层中进行。\n\
  \n神经网络的发展可以追溯到 20 世纪 50 年代，但如今我们拥有足够快的计算机和数据处理能力来实际训练大型神经网络。正是这一点，加上其固有的性能复杂性，真正导致了它在全球试图把握收入增长机会和成本优化的企业和组织中作为工具而爆炸式流行。潜力基本上是无限的——正如\
  \ Google Brain 联合创始人吴恩达所证明的那样；传统算法的性能随着数据规模的扩大而受到限制，但深度学习的性能会随着训练数据量的增加而持续提升（图 5-1）。\n\
  \n![](img/527966_1_En_5_Fig1_HTML.jpg)\n\n一张图表展示了性能与数据量的关系。它表明深度学习的性能在提升，而旧的学习算法在达到一定数据量后性能保持不变。\n\
  \n图 5-1\n\n[`https://machinelearningmastery.com/`](https://machinelearningmastery.com/)\n\
  \n当今媒体讨论的大多数“被热炒的”人工智能应用都是深度学习解决方案：从无人驾驶汽车（自动驾驶汽车）到搜索引擎、计算机视觉/图像识别、聊天机器人，以及投资组合优化和预测。\n\
  \n\n\n### 深度学习——为何是现在？\n\n尽管大多数人认为 20 世纪 50 年代是深度学习发展历程中的关键里程碑（得益于现代计算机的诞生），但真正取得爆发式进展是在过去\
  \ 20-25 年间。若非半导体技术的快速进步——这为当今个人电脑和笔记本电脑的处理能力奠定了基础——其中许多成就将无法实现。以下是这一时期促成大众认知的关键时间节点，人们普遍认为深度学习是数字优先型企业和组织的关键差异化优势。\n\
  \n* 1997 年：IBM 的“深蓝”在国际象棋中击败加里·卡斯帕罗夫\n* 2011 年：IBM Watson 赢得智力竞赛节目《危险边缘》\n* 2012\
  \ 年：ImageNet 竞赛——AlexNet 深度神经网络大幅降低了视觉物体识别的错误率\n* 2015 年：Facebook 将名为 DeepFace 的深度学习技术投入运营，用于在照片中自动标记和识别用户\n\
  * 2016 年：谷歌 DeepMind 的 AlphaGo 算法掌握了复杂的棋盘游戏围棋，并击败了世界顶尖职业棋手之一李世石\n\n这些事件被媒体广泛报道，加之行业深度学习解决方案的可扩展性日益增强，雪球效应最终推动了更广泛市场对深度学习实施项目的委托。\n\
  \n### AI 与深度学习炒作周期\n\n尽管上述深度学习的重大里程碑为那些希望通过采用深度学习技术和解决方案获得投资回报的企业亮起了“绿灯”，但围绕 AI\
  \ 整体的炒作依然显著，正如高德纳炒作周期（如下所示）所频繁揭示的那样。\n\n![](img/527966_1_En_5_Fig2_HTML.jpg)\n\n\
  一张 2022 年人工智能炒作周期的期望值随时间变化图包含多个阶段。它绘制了一条钟形上升曲线，表示将在不到 2 年、2 至 5 年、5 至 10 年、超过 10\
  \ 年内达到的平台期，以及在平台期前就已过时的阶段，数据截至 2022 年 7 月。\n\n**图 5-2** 高德纳 AI 炒作周期\n\n企业中的这种炒作部分源于无知，部分源于科幻想象。职场中的\
  \ AI 指的是“增强”智能，而非人工智能。人工智能常常被误认为是电影中的“通用人工智能”及其所有可怕的末日景象。^(⁶⁶)\n\n如今，真正的“增强”智能通常被认为正在发挥其潜力，而企业和组织所获得的切实利益已成为现实，这得益于新冠疫情期间加速数字化的生存需求，例如：\n\
  \n* 疫情期间提供聊天机器人支持\n* 将深度学习应用于医疗诊断\n* 计算机视觉支持社交距离监测\n* 利用机器学习模拟经济重启的影响\n\n在 2022\
  \ 年及以后，焦点已转向后疫情时代 AI 和深度学习的“民主化”，将项目从专家/小众知识和堆积如山的“技术债务”转变为在更广泛的关键利益相关者（所有员工、客户）生态系统中获得认同（和理解）。同样，AI\
  \ 的“工业化”也已跃居前沿和中心位置，推动了对 AI 解决方案可重用性、可扩展性和安全性的需求。^(⁶⁷)\n\n### 高层架构\n\n如上所述，深度学习将机器学习扩展到使用神经网络来解决困难且规模庞大的大数据业务问题。计算过载通常通过集群或图形处理单元（GPU）上的并行处理来实现，以加速内部计算。\n\
  \n正如我们将在本章后面看到的，繁重的计算发生在人工神经网络（ANN）内部。这些 ANN 是深度学习的基础，其灵感来源于大脑的结构和功能。一个简单的图示如下所示：\n\
  \n* 两个隐藏层，每层四个节点（或神经元）\n* 四个输入\n* 一个输出\n\n大多数 ANN 以及深度学习模型都可以将其架构追溯到这种基本结构。为了了解这些\
  \ ANN 的实际运作方式以及如何使用它们进行预测，我们现在将进入本章的第一个动手实验。\n\n![](img/527966_1_En_5_Fig3_HTML.jpg)\n\
  \n一个典型的人工神经网络模型，包含 4 个相互连接的层级。它包括输入、权重、神经元和输出。\n\n**图 5-3** 典型的 ANN 架构\n\n### TensorFlow\
