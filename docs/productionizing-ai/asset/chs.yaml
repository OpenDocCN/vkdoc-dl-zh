  \ AWS CloudWatch 中查看指标。\n    2.  尝试让 DynamoDB 消费数据。\n    3.  修改代码，通过 API 接入 Yahoo\
  \ / Quandl 上的实时股票价格数据。\n\n## 数据管道编排 – 最佳实践\n\n在本章的动手实验中，我们到目前为止已经探讨了建立与天气数据的实时连接，利用云工具（AWS\
  \ Data Pipeline）将数据从源端推送到目标端（DynamoDB 到 S3 存储桶），以及使用 `boto3`（AWS）库在 Python 中查看通过\
  \ Kinesis 的数据流。\n\n本章的总结部分将更深入地探讨将数据流入和流出 AI 应用的最佳实践，并基于这些动手实验，研究如何最佳地构建依赖于 OLTP\
  \ 或 OLAP 数据（或两者混合）的 AI 解决方案架构。\n\n### 存储考量\n\n在 AI 项目启动时，存储考量应列入优先考虑清单。我们能否仅使用简单的数据库或数据集市，还是需要（如同大多数企业项目一样）与数据仓库或数据湖进行集成？\n\
  \n成本始终很重要，灵活性与敏捷性也同样重要，尤其是在处理非结构化数据源时。在这两种情况下，数据湖通常是首选方案，但数据仓库公司正在改善消费者云体验，并使其更容易以极低的管理开销来试用、购买和扩展数据仓库。\n\
  \n如果安全性是优先考虑因素，AI 项目可能倾向于与具有成熟安全模型的传统数据仓库集成。数据仓库在支持机器学习和 AI 方面也可能更有优势——通常它们对最新数据的“读取”速度比数据湖更快。数据仓库还能减少数据重复，通过模式覆盖提高数据质量，适配可复用的特性和功能，并且在预自动化转换方面表现更佳。\n\
  \n数据科学家百分之八十的工作在于数据准备和数据整理，因此目标“最终用户”会极大地影响方法选择——如果研究与探索性数据分析更符合公司愿景，那么数据湖将为数据挖掘提供更广阔的范围；而如果自动化与解释性数据分析是关键，那么集成应尽可能针对精简的数据库或数据集市。\n\
  \n\n\n### 数据摄取调度\n\n在确定数据存储方案后，有效的数据摄取应遵循以下流程：\n\n- 确定数据源的优先级\n- 验证单个文件\n- 将数据项路由到正确的目标位置\n\
  \n如上述第 2 节所述，记录数据摄取的参数有助于指导流程和持续改进：\n\n- **数据速度** – 源数据的更新频率是多少？\n- **数据规模** – 每个相关数据源的存储容量有多大？\n\
  - **数据频率** – 我们需要以多高的频率访问数据？是采用批量/分析上传，还是应该采用流式/实时方式？\n- **数据格式** – 所有数据都是结构化/表格格式，还是包含半结构化数据（`.json`、`.css`等）或非结构化数据（图像、音频、视频）？\n\
  \n对上述要点进行严格考量，可以构建出性能更优的数据摄取流程和更易访问的数据湖，类似于 Just Eat 公司（使用 Apache Airflow）通过摄取、转换、学习、输出和编排周期所采用的方案。\n\
  \n### 无服务器计算\n\n云上最流行的无服务器组件之一是 AWS Lambda。Lambda 的事件驱动型无服务器计算架构，因其无需管理基础设施且采用按使用量付费的定价模式，使得最终用户能够将更多时间专注于快速构建数据和管道分析。\n\
  \n虽然源端和目标端数据存储显然无法与此流程完全隔离，但无服务器计算可以简化通常为数据摄取配置的复杂告警驱动事件。\n\n### 日终处理\n\n许多企业公司都会执行日终处理（EOD）。特别是在银行和零售行业，例如，门店打烊后的对外开票和收银对账，这些都是关键的业务工作流。\n\
  \n典型的 EOD 流程包括：(a) 更新、验证和过账每日销售信息，以及 (b) 将原始交易聚合为有意义的业务数据。这里的自动化需求，结合作业调度和工作流自动化，非常适合批量处理和数据处理管道编排。这些自动化工作流可能涉及其他（非每日调度的）批量处理，例如季度或年度报告。\n\
  \n### 机器学习和深度学习的数据导入\n\n当今许多 AI 实施项目的目标是实现生产级 AI 模型，通过 EOD 夜间批量处理来自动化整个数据摄取流程/数据管道，具有一些明显的优势：\n\
  \n- 收集数据\n- 通过企业消息总线发送数据\n- 处理数据（例如，重新训练模型）以提供预计算结果\n- 为第二天的运营提供指导\n\n然而，上述流程并未完全满足机器学习/深度学习应用的需求，因为特征和预测具有时间敏感性。例如，Netflix\
  \ 的推荐引擎、Uber 的到达时间估算、LinkedIn 的好友推荐、Airbnb 的搜索引擎，都需要实时训练，或至少是实时推理（预测）。\n\n机器学习和深度学习的数据摄取需要考虑在线模型分析（实时、运营决策）和离线数据发现（对历史聚合数据进行学习和分析），如图\
  \ 3-11 所示。\n\n![](img/527966_1_En_3_Fig11_HTML.jpg)\n\n一个包含两条流程的框图。流程 1：将流数据发送至特征工程。流程\
  \ 2：将批量数据发送至特征工程，再进行训练或评估。这些流程汇合到已部署的模型中，然后进入评分环节。\n\n**图 3-11**\n\n[`towardsdatascience.com`](http://towardsdatascience.com)\n\
  \n### 构建交付管道\n\n那么，我们如何最好地构建数据管道呢？每个项目都不同，但我们可以从一开始就尽最大努力，引导我们走上正确的道路。\n\n我们通过将编排流程分解为一种文档化的方法来结束本节和本章：\n\
  \n**确立业务背景** – 在传统分析架构中构建新的分析管道，通常需要业务、数据工程、数据科学和分析团队之间进行广泛的协调，首先协商需求、模式、基础设施容量需求和工作负载管理。\n\
  \n**定义具体问题** – 业务用户、数据科学家和分析师需要简单、无摩擦、自助式的选项来构建端到端的数据管道，因为预定义不断变化的模式并花时间协商容量槽位既困难又低效。\n\
  \n**寻找“无摩擦”解决方案** – 例如，无服务器数据湖架构能够在共享基础设施上，为公司内所有数据消费者角色提供敏捷且自助式的数据接入和分析服务。\n\n\
  **编写详细解决方案** – 将数据湖中心的分析架构视为由六个逻辑层组成的堆栈会很有帮助，每一层都有多个组件：\n\n- 摄取层\n- 存储层（包含三个独立的“区域”）\n\
  \  - 原始区域\n  - 清洗区域\n  - 精选区域\n- 编目与搜索层\n- 处理层\n- 消费层\n- 安全与治理层\n\n由于没有“万能方案”，我们在下面展示了四个健壮的数据摄取架构和管道的示例，这些架构和管道旨在更好地服务、加速和扩展\
  \ AI 与分析解决方案。\n\n#### 示例：XenonStack\n\nXenonStack 的大数据摄取架构包含六个关键层：摄取层、收集层、处理层、存储层、查询层和可视化层。\n\
  \n![](img/527966_1_En_3_Fig12_HTML.jpg)\n\n一个 XenonStack 大数据摄取架构包含 6 个不同的层：数据可视化层、数据查询层、数据处理层、数据存储层、数据收集层和数据摄取层。\n\
  \n**图 3-12** – XenonStack 大数据摄取架构\n\n#### 示例：Red Hat/IBM\n\nRed Hat 的摄取数据管道，结合了对象存储和\
  \ Kafka 流处理。\n\n![](img/527966_1_En_3_Fig13_HTML.jpg)\n\n一个架构模式展示了 Red Hat 数据管道摄取的流程、技术和产品。该流程包括对象摄取、存储、处理与转换，以及消费。\n\
  \n**图 3-13** – Red Hat 数据管道摄取\n\n#### 示例：AWS 无服务器架构\n\nAWS 无服务器架构 – Lambda 是关键（无服务器）组件，但通过接口与\
  \ AWS Glue 连接，以使用 Scala 或 Python 运行大型工作负载。下方还展示了一个更通用的 AWS 数据摄取架构图，其中涉及更广泛的 AWS\
  \ 资源配置。\n\n![](img/527966_1_En_3_Fig15_HTML.jpg)\n\n一个用于数据摄取的 AWS 架构。该流程包含 5 个阶段：1.\
  \ 摄取；2. 存储与处理；3. 编目、治理与搜索；4. 消费；5. 安全与监控。\n\n**图 3-15** – AWS 数据摄取\n\n![](img/527966_1_En_3_Fig14_HTML.jpg)\n\
  \n一个 AWS 无服务器架构将 Lambda 视为数据摄取的关键组件。该流程涉及第三方数据、cookie cutter AWS 批量模板、批量输入 S3 存储桶等。\n\
  \n**图 3-14** – 用于数据摄取的 AWS 无服务器（Lambda）架构\n\n#### 示例：Databricks 与 Apache Spark\n\
  \n这个 Databricks 示例展示了 Apache Kafka 和 Spark 如何协同进行流式分析以及 AI/BI 报告。Databricks 与 Apache\
  \ Spark 是本章最后一个动手实验的主题。\n\n![](img/527966_1_En_3_Fig16_HTML.jpg)\n\n一个 Databricks\
  \ 示例。该流程涉及 Kafka、数据湖和 Spark 的分区、重新处理、更新与合并、验证、流式分析以及 AI 与报告。\n\n**图 3-16** – Databricks\
  \ 与 Apache Spark\n\n\n\n### 示例：Snowflake 工作负载管理\n\n最后，图 3-17 展示了 Snowflake 的架构，该架构旨在确保数据管道性能与企业环境中的工作负载管理和资源竞争保持一致：\n\
  \n![](img/527966_1_En_3_Fig17_HTML.jpg)\n\nSnowflake 工作负载管理架构。它具有以下属性：弹性、持续、隔离资源、高可用性。它涉及\
  \ 3 个阶段：批处理、流处理以及与数据仓库交互的 BI 或分析管道。\n\n**图 3-17** Snowflake 工作负载管理\n\n### 数据管道编排：动手实践\n\
  \n因此，在了解了这些架构良好的数据管道后，我们最后的动手实验将探讨如何利用业界领先的大数据处理工具之一来扩展我们的 AI 解决方案，从而自行实现一个数据管道。\n\
  \n**使用 Apache Spark 的 Databricks**\n\n本练习的目标是利用 Apache Spark^(⁴⁷) 的大数据处理能力，使用 `fbprophet`\
  \ 运行区域和产品级别的预测——这是全球跨国公司的常见用例，目前星巴克也在使用。\n\n1.  注册 Databricks – 注册 Databricks 社区版\
  \ (DCE)，登录，并启动一个集群\n2.  通过将以下网址粘贴到浏览器中来导入笔记本：[`https://databricks.com/wp-content/uploads/notebooks/fine-grained-demand-forecasting-spark-3.xhtml`](https://databricks.com/wp-content/uploads/notebooks/fine-grained-demand-forecasting-spark-3.xhtml)，选择“导入笔记本”并复制\
  \ URL\n3.  连接到集群并导入库\n4.  通过访问 [`www.kaggle.com/c/demand-forecasting-kernels-only/data`](http://www.kaggle.com/c/demand-forecasting-kernels-only/data)\
  \ 下载数据。向下滚动并选择“下载全部”（您应接受 Kaggle 竞赛规则），然后解压 `train.csv` 文件\n5.  将数据导入 Databricks\
  \ 文件系统 (DBFS) – 在 Databricks 控制台中启用管理员权限\n6.  按照描述在笔记本中使用 `fbprophet` 运行基线预测\n7.\
  \  使用数据管道，利用 Apache Spark 将预测扩展到每个商店和商品组合\n\n### 总结\n\n我们最后的实验结束了本章的内容。在本章中，我们介绍了\
  \ AIaaS 背景下的数据摄取，探讨了当今公司在处理海量数据时面临的挑战、如何存储这些数据、如何使用云服务处理数据，以及如何理想地通过无缝、自动化的数据管道来编排各种不同的数据源。\n\
  \n下一章将快速浏览机器学习。由于读者应该已经了解大部分核心概念，我们的主要兴趣在于将机器学习作为更深入探讨深度学习（在后续章节中）的桥梁。然而，我们还将为成功实施机器学习制定一个最佳实践路线图，涵盖关键的数据整理、训练、测试、基准测试、实施和部署阶段。\n\
