    writing. Fresh graduates struggling to find high value jobs, returning to work
    mums who want flexible work with high pay, and those who have reached the end
    of a career cycle and have no real prospect for further growth have all turned
    to Pairview to kickstart their careers. The company was created to help close
    the talent gap that was growing in the data space. This gap has since spread to
    most other aspects of technology as new technology innovation comes around and
    companies continue to grapple with the ultimatum to adopt technology-induced change
    or sink.


    Barry’s passion for Artificial Intelligence combined with his vast knowledge of
    the subject matter and the work he has done for our numerous clients over the
    years makes him an authority on the subject. Barry has acquired first-hand exposure
    to the opportunities, challenges and the risks associated with AI ecosystems and
    development processes. He knows what it takes to get buy-ins and drive organisation
    wide-adoption of AI capabilities and the business impact. Barry has over the years
    become an evangelist of the value of AI to business while being fully aware of
    the enormous investment of time, resources and scrutiny required to get AI right
    first time and drive it through the digital transformation value chain.


    Although Artificial intelligence has been with us for many decades, in recent
    times new capabilities have emerged in the constellation; enabling more complexity
    in sensing, comprehending, acting and learning with human-like levels of intelligence.
    With mathematical technologies like machine learning and natural language processing
    the landscape of AI continues to expand and increasingly co-exist with humans,
    enabling businesses to dare to digitalise with never-before levels of accuracy,
    consistency and availability. A combination of data analytics, machine learning
    and deep learning embedded with ever-more powerful computing power such as quantum
