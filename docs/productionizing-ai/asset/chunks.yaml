    \ number of iterations to run the pipeline optimization process – although a decent\
    \ pipeline (and ML model) can be achieved relatively quickly, more generations\
    \ are required to ensure the most performant pipeline is achieved, particularly\
    \ for large datasets.\n\n### Python Automation with TPOT: Hands-on Practice\n\n\
