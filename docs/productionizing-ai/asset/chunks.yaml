- fmt: "### Data Wrangling\n\nThe above concepts are very much central to the role\
    \ of the Data Engineer but there is considerable overlap, particularly in the\
    \ Transform step in ETL in serving downstream Data Science and Data Analysis processes.\n\
    \n`Data Wrangling` (or `Data Munging`) is the main process in Data Science and\
    \ AI which ensures data is in a fit-for-purpose state to carry out analytics or\
    \ BI. Many people are familiar with the statistic that cleaning data is 80% of\
    \ the job of a Data Scientist. In truth, `Data Wrangling` can take up to 80% of\
    \ a Data Scientist job, and it involves more than just cleaning data: there are\
    \ many more subprocesses including formatting, filtering, encoding, scaling and\
    \ normalizing, and shuffling or splitting. And these are not only restricted to\
    \ structured data, unstructured data (such as text or images) is in scope too\
    \ for both machine and deep learning.\n\n`Data Wrangling` sits in a process after\
    \ data acquisition and before modeling/machine or deep learning. It is highly\
    \ iterative and often coupled with exploratory data analysis (`EDA`) to understand\
    \ better the structure of the individual fields (typically columns) within a dataset.\
    \ While `EDA` focuses on passively “looking” at the data, `Data Wrangling` actually\
    \ actively “changes” the data in some way.\n\nWe will discuss `Data Wrangling`\
    \ (and `ETL` processes) in more detail in our chapter on Machine Learning and\
    \ in particular look to establish best practice techniques for productionizing\
    \ Machine Learning by looking at key Case Studies such as Fraud Detection.\n\n\
    ### Performance Benchmarking\n\nWhile `ETL` and `Data Wrangling` deal with preprocessing\
    \ of data, we also need a means to “score” (ideally continuously) the data flowing\
    \ into an AI solution.\n\nBuilding an AI app requires constant training and testing.\
    \ Knowing how to benchmark performance and which measures to use is a key overhead\
    \ in both machine and deep learning and needs to be rigorous and adaptive to the\
    \ evolving (input) data pipeline.\n\nMeasures such as accuracy, recall, precision,\
    \ and a confusion matrix for Supervised Classification problems to understand\
    \ better the proportion of actual cases we correctly predicted (whether negative\
    \ or positive). For Supervised Regression problems, root mean squared error and\
    \ `R-squared` are used to compare forecasted output with the actual target data.\
    \ In Deep Learning we may use similar measures to above plus additional specific\
    \ Deep Learning measures such as loss and cross-entropy.\n\n### AI Pipeline Automation\
    \ – AutoAI\n\nMuch of the focus in recent years in AI has been around the potential\
    \ to automate the entire end-to-end process of performing `ETL`, `Data Wrangling`,\
    \ and `Performance benchmarking`. Coupled with automation around `Data Drift`\
    \ (measuring how much data changes each time we refresh the input pipeline), achieving\
    \ end-to-end automation with full-scale monitoring and metrics for each step is\
    \ key to achieving a true Enterprise AI strategy.\n\nWhile the “vision” for most\
    \ organizations is to automate everything, in practice, not everything is currently\
    \ in the scope of `AutoAI` – instead, we mention in Table [1-2](#527966_1_En_1_Chapter.xhtml#Tab2)\
    \ some of the key variables that can be incorporated into a fully functional and\
    \ automated Data Pipeline, as evidenced in tools such as `IBM Cloud Pak for Data`,\
    \ `DataRobot`, and `Google Vertex AI`.\n\n**Table 1-2**  \nKey processes and levers\
    \ for AI pipeline automation\n\n| Pre-Modeling | Post-Modeling |\n| --- | ---\
    \ |\n| **Raw data import** | **Feature engineering** |\n| • Static (batch) files\
    \ | • Dimensionality reduction |\n| • Multiple SQL queries | • Normalization (scale\
    \ between 0 and 1) |\n| • Authenticated APIs via Python libraries | • Standardization\
    \ (scale to mean 0, std 1/fit to a normal distribution) |\n| **Data wrangling**\
    \ | **Model tuning** |\n| • Identification + treatment | • Performance benchmarking\
    \ |\n| • Missing values | • Hyperparameter tuning/grid search |\n| • Encoding\
    \ | • Algo selection |\n| **Data partitioning** | **Retraining** |\n| • Identify\
    \ target variable | • Data drift |\n| • Shuffle and split train/validation |  \
    \ |\n| • Test or k-folds |   |\n\n### Build Your Own AI Pipeline: Hands-on Practice\n\
    \nHaving spent some time looking at what constitutes an AI Pipeline, let's take\
    \ a look at a real lab example – how does this look like in practice?\n\n**NO-CODE\
    \ CLASSIFICATION**\n\nThe goal of this exercise is to understand the dependency\
    \ and flow of data on the outcomes from any AI application. The exercise walks\
    \ through how this is done with a “No-code” binary (supervised) classification\
    \ model to predict income levels in `Microsoft Azure ML Studio`.\n\n1.  If you\
    \ do not already have a Microsoft account (e.g., a `hotmail.com`, `live.com`,\
    \ or `outlook.com` account), sign up for one at `https://signup.live.com`.\n\n\
    2.  Navigate to `https://studio.azureml.net`, click the option to sign up, and\
    \ choose the Free Workspace option. To test, sign in using your Microsoft account,\
    \ then sign out again.\n\n3.  Follow the steps in the tutorial below to import\
    \ data, perform basic `EDA` and `Data Wrangling`, modeling, and performance benchmarking.\n\
    \n4.  `http://gallery.cortanaintelligence.com/Details/3fe213e3ae6244c5ac84a73e1b451dc4`\n\
    \n5.  As “stretch” exercises, try to improve the model performance by modifying\
    \ the input data (features), encoding one of the categorical features, changing\
    \ the training/test set partition % or changing the algorithm from two class-boosted\
    \ decision trees.\n\n## Neural Networks and Deep Learning\n\nWhile the Data, or\
    \ the AI Pipelines we discussed in the previous section are the key means by which\
    \ AI applications seamlessly integrate with and incorporate evolving data sources,\
    \ they are wrapped around the engine of AI applications, that is, a machine or\
    \ deep learning model which lies at the “kernel” of the application.\n\nBefore\
    \ embarking on a high-level look at Deep Learning, let's take a quick refresher\
    \ on Machine Learning. As mentioned in the opening section, it is expected readers\
    \ have some grounding in Machine Learning already, so we will only address important\
    \ concepts here that are relevant to implementing an AI solution."
  raw: '### Data Wrangling


    The above concepts are very much central to the role of the Data Engineer but
    there is considerable overlap, particularly in the Transform step in ETL in serving
    downstream Data Science and Data Analysis processes.


    Data Wrangling (or Data Munging) is the main process in Data Science and AI which
    ensures data is in a fit-for-purpose state to carry out analytics or BI. Many
    people are familiar with the statistic that cleaning data is 80% of the job of
    a Data Scientist In truth, Data Wrangling can take up to 80% of a Data Scientist
    job, and it involves more than just cleaning data: there are many more subprocesses
    including formatting, filtering, encoding, scaling and normalizing, and shuffling
    or splitting. And these are not only restricted to structured data, unstructured
    data (such as text or images) is in scope too for both machine and deep learning


    Data Wrangling sits in a process after data acquisition and before modeling/machine
    or deep learning. It is highly iterative and often coupled with exploratory data
    analysis (EDA) to understand better the structure of the individual fields (typically
    columns) within a dataset. While EDA focuses on passively “looking” at the data,
    Data Wrangling actually actively “changes” the data in some way.


    We will discuss Data Wrangling (and ETL processes) in more detail in our chapter
    on Machine Learning and in particular look to establish best practice techniques
    for productionizing Machine Learning by looking at key Case Studies such as Fraud
    Detection.


    ### Performance Benchmarking


    While ETL and Data Wrangling deal with preprocessing of data, we also need a means
    to “score” (ideally continuously) the data flowing into an AI solution.


    Building an AI app requires constant training and testing. Knowing how to benchmark
    performance and which measures to use is a key overhead in both machine and deep
    learning and needs to be rigorous and adaptive to the evolving (input) data pipeline.


    Measures such as accuracy, recall, precision, and a confusion matrix for Supervised
    Classification problems to understand better the proportion of actual cases we
    correctly predicted (whether negative or positive). For Supervised Regression
    problems, root mean squared error and R-squared are used to compare forecasted
    output with the actual target data. In Deep Learning we may use similar measures
    to above plus additional specific Deep Learning measures such as loss and cross-entropy.


    ### AI Pipeline Automation – AutoAI


    Much of the focus in recent years in AI has been around the potential to automate
    the entire end-to-end process of performing ETL, Data Wrangling, and Performance
    benchmarking. Coupled with automation around Data Drift (measuring how much data
    changes each time we refresh the input pipeline), achieving end-to-end automation
    with full-scale monitoring and metrics for each step is key to achieving a true
    Enterprise AI strategy.


    While the “vision” for most organizations is to automate everything, in practice,
    not everything is currently in the scope of AutoAI – instead, we mention in Table
    [1-2](#527966_1_En_1_Chapter.xhtml#Tab2) some of the key variables that can be
    incorporated into a fully functional and automated Data Pipeline, as evidenced
    in tools such as IBM Cloud Pak for Data, DataRobot, and Google Vertex AI.


    Table 1-2


    Key processes and levers for AI pipeline automation


    | Pre-Modeling | Post-Modeling |

    | --- | --- |

    | **Raw data import** | **Feature engineering** |

    | • Static (batch) files | • Dimensionality reduction |

    | • Multiple SQL queries | • Normalization (scale between 0 and 1) |

    | • Authenticated APIs via Python libraries | • Standardization (scale to mean
    0, std 1/fit to a normal distribution) |

    | **Data wrangling** | **Model tuning** |

    | • Identification + treatment | • Performance benchmarking |

    | • Missing values | • Hyperparameter tuning/grid search |

    | • Encoding | • Algo selection |

    | **Data partitioning** | **Retraining** |

    | • Identify target variable | • Data drift |

    | • Shuffle and split train/validation |   |

    | • Test or k-folds |   |


    ### Build Your Own AI Pipeline: Hands-on Practice


    Having spent some time looking at what constitutes an AI Pipeline, let''s take
    a look at a real lab example – how does this look like in practice?


    NO-CODE CLASSIFICATION


    **The goal of this exercise is to understand the dependency and flow of data on
    the outcomes from any AI application. The exercise walks through how this is done
    with a “No-code” binary (supervised) classification model to predict income levels
    in Microsoft Azure ML Studio**


    1.  If you do not already have a Microsoft account (e.g., a [`hotmail.com`](http://hotmail.com),
    [`live.com`](http://live.com), or [`outlook.com`](http://outlook.com) account),
    sign up for one at [`https://signup.live.com`](https://signup.live.com)


    2.  Navigate to [`https://studio.azureml.net`](https://studio.azureml.net), click
    the option to sign up, and choose the Free Workspace option. To test, sign in
    using your Microsoft account, then sign out again.


    3.  Follow the steps in the tutorial below to import data, perform basic EDA and
    Data Wrangling, modeling, and performance benchmarking.


    4.  [`http://gallery.cortanaintelligence.com/Details/3fe213e3ae6244c5ac84a73e1b451dc4`](http://gallery.cortanaintelligence.com/Details/3fe213e3ae6244c5ac84a73e1b451dc4)


    5.  As “stretch” exercises, try to improve the model performance by modifying
    the input data (features), encoding one of the categorical features, changing
    the training/test set partition % or changing the algorithm from two class-boosted
    decision trees.


    ## Neural Networks and Deep Learning


    While the Data, or the AI Pipelines we discussed in the previous section are the
    key means by which AI applications seamlessly integrate with and incorporate evolving
    data sources, they are wrapped around the engine of AI applications, that is,
    a machine or deep learning model which lies at the “kernel” **of the application.**


    Before embarking on a high-level look at Deep Learning, let''s take a quick refresher
    on Machine Learning. As mentioned in the opening section, it is expected readers
    have some grounding in Machine Learning already, so we will only address important
    concepts here that are relevant to implementing an AI solution.'
  trans: "\n### 数据整理\n\n上述概念对于数据工程师的角色至关重要，但在服务于下游数据科学和数据分析流程的 ETL 转换步骤中，存在相当大的重叠。\n\
    \n`数据整理`（或`数据清洗`）是数据科学和人工智能中的主要流程，它确保数据处于适合进行分析或商业智能的状态。许多人熟悉这样一个统计数据：数据清洗占据了数据科学家\
    \ 80%的工作。实际上，`数据整理`可能占据数据科学家高达 80%的工作，并且它不仅仅涉及数据清洗：还包括许多其他子流程，如格式化、过滤、编码、缩放与归一化，以及打乱或拆分。这些操作不仅限于结构化数据，非结构化数据（如文本或图像）也属于机器学习和深度学习的处理范围。\n\
    \n`数据整理`位于数据采集之后、建模/机器学习或深度学习之前的流程中。它具有高度迭代性，并且通常与探索性数据分析（`EDA`）相结合，以更好地理解数据集中各个字段（通常是列）的结构。虽然`EDA`侧重于被动地“观察”数据，但`数据整理`实际上是以某种方式主动“改变”数据。\n\
    \n我们将在机器学习章节中更详细地讨论`数据整理`（以及`ETL`流程），并特别通过研究诸如欺诈检测等关键案例，来确立将机器学习投入生产的最佳实践技术。\n\
    \n### 性能基准测试\n\n虽然`ETL`和`数据整理`处理的是数据预处理，但我们还需要一种方法来“评分”（理想情况下是持续地）流入人工智能解决方案的数据。\n\
    \n构建人工智能应用需要持续的训练和测试。了解如何对性能进行基准测试以及使用哪些度量指标，是机器学习和深度学习中的关键开销，并且需要严格且适应不断演变的（输入）数据管道。\n\
    \n对于监督分类问题，可以使用准确率、召回率、精确率和混淆矩阵等度量指标，以更好地理解我们正确预测的实际案例比例（无论是负例还是正例）。对于监督回归问题，则使用均方根误差和`R\
    \ 平方`来比较预测输出与实际目标数据。在深度学习中，我们可能会使用与上述类似的度量指标，再加上额外的特定深度学习度量指标，如损失和交叉熵。\n\n###\
    \ 人工智能管道自动化 – AutoAI\n\n近年来，人工智能领域的许多关注点都集中在自动化执行`ETL`、`数据整理`和`性能基准测试`的整个端到端流程的潜力上。结合围绕`数据漂移`（衡量每次刷新输入管道时数据变化的程度）的自动化，实现端到端自动化，并对每一步进行全面的监控和度量，是实现真正企业级人工智能战略的关键。\n\
    \n虽然大多数组织的“愿景”是实现一切自动化，但在实践中，目前并非所有内容都在`AutoAI`的范围内——相反，我们在表 1-2 中列出了一些关键变量，这些变量可以整合到一个功能完备的自动化数据管道中，正如`IBM\
    \ Cloud Pak for Data`、`DataRobot`和`Google Vertex AI`等工具所证明的那样。\n\n**表 1-2**  \n\
    人工智能管道自动化的关键流程和杠杆\n\n| 建模前 | 建模后 |\n| --- | --- |\n| **原始数据导入** | **特征工程** |\n\
    | • 静态（批处理）文件 | • 降维 |\n| • 多个 SQL 查询 | • 归一化（缩放到 0 到 1 之间） |\n| • 通过 Python 库进行身份验证的\
    \ API | • 标准化（缩放到均值为 0，标准差为 1/拟合正态分布） |\n| **数据整理** | **模型调优** |\n| • 识别与处理 |\
    \ • 性能基准测试 |\n| • 缺失值 | • 超参数调优/网格搜索 |\n| • 编码 | • 算法选择 |\n| **数据划分** | **重新训练**\
    \ |\n| • 识别目标变量 | • 数据漂移 |\n| • 打乱并拆分训练集/验证集 |   |\n| • 测试集或 k 折交叉验证 |   |\n\n\
    ### 构建你自己的 AI 管道：动手实践\n\n在花了一些时间了解人工智能管道的构成之后，让我们来看一个真实的实验室示例——它在实践中是怎样的？\n\n\
    **无代码分类**\n\n本练习的目标是理解数据对任何人工智能应用结果的依赖性和流动。该练习将逐步演示如何使用“无代码”二元（监督）分类模型在`Microsoft\
    \ Azure ML Studio`中预测收入水平。\n\n1.  如果你还没有微软账户（例如`hotmail.com`、`live.com`或`outlook.com`账户），请在`https://signup.live.com`注册一个。\n\
    \n2.  导航至`https://studio.azureml.net`，点击注册选项，并选择免费工作区选项。为了测试，请使用你的微软账户登录，然后再次注销。\n\
    \n3.  按照下方教程中的步骤导入数据，执行基本的`EDA`和`数据整理`、建模以及性能基准测试。\n\n4.  `http://gallery.cortanaintelligence.com/Details/3fe213e3ae6244c5ac84a73e1b451dc4`\n\
    \n5.  作为“拓展”练习，尝试通过修改输入数据（特征）、对其中一个分类特征进行编码、更改训练/测试集划分百分比或将算法从双类提升决策树更改为其他算法，来改进模型性能。\n\
    \n## 神经网络与深度学习\n\n虽然我们在上一节讨论的数据或人工智能管道是人工智能应用无缝集成并整合不断变化的数据源的关键手段，但它们包裹在人工智能应用的引擎周围，即位于应用“内核”的机器学习或深度学习模型。\n\
    \n在开始对深度学习进行高层次概述之前，让我们快速回顾一下机器学习。正如开篇所述，我们期望读者已经具备一定的机器学习基础，因此我们在此仅讨论与实施人工智能解决方案相关的重要概念。\n"
- fmt: '### Machine Learning


    At a basic level, there are two types of Machine Learning: Supervised and Unsupervised
    Machine Learning. Reinforcement Learning is sometimes considered a third type,
    although can equally be considered a type of Unsupervised Learning.


    #### Supervised Machine Learning


    What distinguishes Supervised Machine Learning from Unsupervised Machine Learning
    is the prevalence of "labeled" or "ground truth" data, that is, a specific target
    field or variable that we wish to train a model to predict.


    There are two main types of Supervised Machine Learning:^([^(19)](#fn19)) classification
    and regression. Whereas the label or target variable in classification is discrete
    (usually binary, but sometimes multiclass), the label in a Supervised Regression
    problem is continuous. A key industry machine learning application using a classification
    technique is determining whether a customer is likely to churn (or not), while
    forecasting customer revenue is an example of a regression technique. In both
    of these cases, the **features** used to predict or forecast the target variable
    are typically customer attributes, normally both transactional and demographic
    but can also include behavioral or attitudinal data such as time spent on a web
    page or sentiment from social media engagement.


    #### Unsupervised Machine Learning


    With unsupervised machine learning, we have no ground truth, so the predictive
    modeling aspect is instead trying to impose an unseen pattern on the underlying
    data. Typically some form of clustering is used to group data into clusters, for
    example, for customer data buried in a CRM platform, an unsupervised machine learning
    approach might throw up segments which have some degree of commonality (high spend,
    low to mid income, located in a specific region. etc.).


    Dimensionality reduction is also sometimes considered an unsupervised technique
    in that a machine learning algorithm is used to simplify the data (often from
    thousands of underlying features into tens of features if using Principal Component
    Analysis) into a form which statistically resembles the original data. While this
    approach can greatly reduce datasets and improve runtime/performance, it is not
    strictly a Machine Learning modeling technique in the normal sense as the outcome
    in this case is another dataset, albeit compressed, rather than a trained model.


    #### Reinforcement Learning


    Reinforcement learning involves real-time machine (or deep) learning with an agent/environment
    mechanism which either penalizes or rewards iterations of a model based on real-time
    feedback from the surrounding environment (how accurate is the model).


    While the scope of this book is mainly focused on mainstream business and organizational
    applications, advances in reinforcement learning are in general where there is
    considerable hype in the media – essentially this is the underlying technique
    that drives "industrial-scale" applications such as Google''s Search Engine, autonomous
    vehicles, and robotics.


    ### What Is a Neural Network?


    With that brief recap on Machine Learning, let''s move onto a high-level overview
    of Deep Learning.


    Artificial Neural Networks (ANNs) are the structures underpinning Deep Learning.
    Biologically inspired by the brain, ANNs are used for complex problem solving
    for their ability to extract hierarchical, abstract, or "hidden" features from
    underlying data.


    In general, an Artificial Neural Network consists of an input layer, multiple
    hidden layers, and an output layer. In a "forward pass" through the network, various
    data points are taken as inputs (comparable with features in a Machine Learning
    model), fed through the weighted network to activate various neurons and ultimately
    produce a numerical output. In the case of a Computer Vison or Image Classification
    application, iterating over many of these forward passes (an epoch) results in
    a probabilistic array of values corresponding to the probability the data corresponds
    to two or more outcomes (in this case images, such as a person or an object).


    ### The Simple Perceptron


    The Simple Perceptron is the building block of an Artificial Neural Network –
    effectively a simplified model of the biological neurons in our brain.


    The single neuron (shown in Figure [1-11](#527966_1_En_1_Chapter.xhtml#Fig11))
    has multiple inputs, and based on these inputs the neuron either fires off or
    it doesn''t. If we structure these perceptrons in layers we get a Multilayer Perceptron
    or Deep Neural Network and something that more closely resembles our brain in
    function, with multiple neurons firing depending on the input signal.


    ![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig11_HTML.jpg)


    Two diagrams. 1\. Simple perception. Input x 1, 2, and 3 flow w 1, 2, and 3 and
    it produced output y. 2\. Deep neural network. The 3 input layers flow to hidden
    layers 1, and 2\. Produced 1-layer Output.


    Figure 1-11


    Simple Perceptron vs. Multilayer Perceptron/Deep Neural Network


    The "activation" function in a simple perceptron uses the Heaviside step function
    – a simple on/off switch. Simple perceptrons can also only learn linear functions
    and as such are only really useful as a performance reference. Multilayer perceptrons
    (Figure [1-11](#527966_1_En_1_Chapter.xhtml#Fig11)) on the other hand can learn
    nonlinear functions by virtue of having more than one neuron and their reliance
    on more advanced activation functions such as sigmoid, tanh, and ReLu.'
  raw: '### Machine Learning


    At a basic level, there are two types of Machine Learning: Supervised and Unsupervised
    Machine Learning. Reinforcement Learning is sometimes considered a third type,
    although can equally be considered a type of Unsupervised Learning.


    #### Supervised Machine Learning


    What distinguishes Supervised Machine Learning from Unsupervised Machine Learning
    is the prevalence of “labeled” or “ground truth” data, that is, a specific target
    field or variable that we wish to train a model to predict.


    There are two main types of Supervised Machine Learning:^([^(19)](#fn19)) classification
    and regression. Whereas the label or target variable in classification is discrete
    (usually binary, but sometimes multiclass), the label in a Supervised Regression
    problem is continuous. A key industry machine learning application using a classification
    technique is determining whether a customer is likely to churn (or not), while
    forecasting customer revenue is an example of a regression technique. In both
    of these cases, the **features** used to predict or forecast the target variable
    are typically customer attributes, normally both transactional and demographic
    but can also include behavioral or attitudinal data such as time spent on a web
    page or sentiment from social media engagement.


    #### Unsupervised Machine Learning


    With unsupervised machine learning, we have no ground truth, so the predictive
    modeling aspect is instead trying to impose an unseen pattern on the underlying
    data. Typically some form of clustering is used to group data into clusters, for
    example, for customer data buried in a CRM platform, an unsupervised machine learning
    approach might throw up segments which have some degree of commonality (high spend,
    low to mid income, located in a specific region. etc.).


    Dimensionality reduction is also sometimes considered an unsupervised technique
    in that a machine learning algorithm is used to simplify the data (often from
    thousands of underlying features into tens of features if using Principal Component
    Analysis) into a form which statistically resembles the original data. While this
    approach can greatly reduce datasets and improve runtime/performance, it is not
    strictly a Machine Learning modeling technique in the normal sense as the outcome
    in this case is another dataset, albeit compressed, rather than a trained model.


    #### Reinforcement Learning


    Reinforcement learning involves real-time machine (or deep) learning with an agent/environment
    mechanism which either penalizes or rewards iterations of a model based on real-time
    feedback from the surrounding environment (how accurate is the model).


