    \ with the highest score.\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig4_HTML.jpg)\n\
    \nA tree based structure of the T P O T operation. It starts from the entire data\
    \ set, polynomial features, P C A, combine features, recursive feature elimination,\
    \ and random forest classifier.\n\nFigure 6-4\n\nTPOT operation (Source: towardsdatascience)\n\
