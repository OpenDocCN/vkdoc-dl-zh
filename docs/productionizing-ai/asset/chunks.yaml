    # 序言


    在众多失败的数据科学项目和技术债务累积的荒原中，如今的组织正试图重塑人工智能格局，并推行一种更广泛、更审慎的设计/系统思维方法，以穿透炒作迷雾。当务之急是确保数据/人工智能解决方案在构建之初就考虑多用户参与（包括技术人员和非技术人员），并着眼于系统范围的生态系统、企业数据中心、基础设施/集成以及端到端流程。


    利用最新技术进展的人工智能应用牢牢占据着这一炒作周期的顶端。^(¹) 由于人工智能的生产力效益难以忽视，新冠疫情和飞速的数字化催生了一种恶劣的颠覆文化，加速的采用迫使脆弱的公司以更便宜、更小巧、更开源的方式构建或购买解决方案。这些力量的汇聚意味着对快速原型设计和加速人工智能解决方案交付的需求很高。


    与此同时，并非每家公司都清楚人工智能能做什么，或意味着什么。这些公司通常是受困于遗留工具和不良创新实践的企业。有些公司担心对就业的影响；另一些则有伦理方面的担忧。但对大多数高管而言，已变得清晰的是，人工智能的实施必须契合“企业人工智能”愿景——一个价值
    3410 亿美元的市场^(²)——而普遍趋势是走向一个由不同但高度集成的“最佳组合”人工智能解决方案组成的平台。


    对于我们这些数据与数字技术已与职业生活及就业市场中的相关机遇密不可分的人来说，这些有意义、高价值的人工智能解决方案正是雇主们所追求的目标。而持续专注于交付投资回报率（ROI）——理解并更重要的是，使用人工智能（通常是机器学习和深度学习）交付切实成果——正是我们得以受雇的原因。


    这可能令人筋疲力尽，商业领袖面临的挑战之一是，高度技术性的技能组合从未为组织其他部门带来特别直观、可沟通（且可理解）的结果——大多数数据科学家并不擅长商业智能，也并非因其软技能而被招聘。如今就业市场上的雇主越来越倾向于寻找更全面/更广泛的“端到端”技能，这些技能能转化为更好的可视化、前端功能和集成能力。数据专业人士的机会在于，通过解决技术债务并具备交付全栈数据解决方案的能力，为自己赢得“优势”。


    这种“机会”在很大程度上依赖于云计算；人工智能或数据科学不仅仅是一个`Python`笔记本和一张活动挂图——它需要识别和摄取合适的数据集，并利用云服务从沙盒扩展到概念验证、原型，再到最小可行产品。最终，如今大多数公司和组织瞄准的是企业人工智能。但对于许多担任特定角色的个人和许多非企业公司而言，利用云计算是一个雷区，充满了有时不明确、文档不全的工件和隐藏成本。企业人工智能远非负担得起。


    成功（且负担得起）的企业人工智能项目交付需要相当程度的情商^(³)、敏捷思维、稳健的数据驱动管道，以及大量的变通方法，以设计、规划并实现人员、流程和工具之间的集成——我们所有人都依赖于三大超大规模云服务提供商（CSP）：亚马逊云服务、微软
    Azure 和谷歌云平台，^(⁴)受限于它们的数据中心、可扩展存储和计算实例。


    敏捷很重要，但混合/无关型解决方案、多技能、T 型能力和基于结果的交付也同样重要。最重要的是，高级利益相关者/管理者如果只是在制造混乱或编织将项目失败/责任归咎于他人的网，就不应因实施“敏捷”项目方法而自诩为蜘蛛侠或蜘蛛女。敏捷只有在遵循项目设计直至达到符合整体项目愿景的交付标准时才有效，如果其表面之下只是一团糟，则毫无意义。^(⁵)


    鉴于许多组织在将人工智能投入运营方面举步维艰，本书旨在超越简单的`Python`脚本编写，探讨当前数据科学交付的“那又怎样”的问题。


    这并不意味着`python`被忽略——恰恰相反。`Python`技能在工作场所的需求比以往任何时候都高，其受欢迎程度在 2022 年 9 月有所上升，在 TIOBE
    编程社区指数中仍排名第一。^(⁶) 使用`Python`进行开发是本书的核心目标，但在此我们采用自上而下、“目标导向”的方法，倾向于使用基于`Python`和低代码的框架来加速全栈开发过程，而不是意识流式的`Python`后端。本书的叙述也与
    DataOps 最佳实践保持一致，并关注在应对需求变更、进度延误、灵活性改进和用户失望方面达成关键绩效指标。


    本书中穿插了动手实验，旨在提供“如何做”的示例，不仅利用`Python`代码，还尽可能多地使用关键的人工智能云服务以及面向关键非技术利益相关者（通常是决定是否委托、实施或扩展人工智能项目的主要决策者）的无代码/低代码界面。


    企业人工智能关乎将人工智能嵌入组织的数据战略，整个员工队伍都需要就公司有形（及无形/隐性）的数据和人工智能资产达成一致并接受培训。因此，每个人都应该能够使用和理解人工智能，通过开发本书中的解决方案，希望读者能更好地具备交付公司“更大图景”目标的能力。


    # 前言


    当 Barry 联系我为这本书写前言时，我满心欢喜，不仅仅是因为我要为他的新书作序（虽然被邀请总是件好事），更主要的是，提出请求的这个人，是我在过去几年里看着他在我的领导下于
    Pairview 茁壮成长起来的。

    '
- fmt: 'The work we do at Pairview has helped shape thousands of fledgeling careers
    across the UK and around the world for more than thirteen years at the time of
    writing. Fresh graduates struggling to find high value jobs, returning to work
    mums who want flexible work with high pay, and those who have reached the end
    of a career cycle and have no real prospect for further growth have all turned
    to Pairview to kickstart their careers. The company was created to help close
    the talent gap that was growing in the data space. This gap has since spread to
    most other aspects of technology as new technology innovation comes around and
    companies continue to grapple with the ultimatum to adopt technology-induced change
    or sink.


    Barry’s passion for Artificial Intelligence combined with his vast knowledge of
    the subject matter and the work he has done for our numerous clients over the
    years makes him an authority on the subject. Barry has acquired first-hand exposure
    to the opportunities, challenges and the risks associated with AI ecosystems and
    development processes. He knows what it takes to get buy-ins and drive organisation
    wide-adoption of AI capabilities and the business impact. Barry has over the years
    become an evangelist of the value of AI to business while being fully aware of
    the enormous investment of time, resources and scrutiny required to get AI right
    first time and drive it through the digital transformation value chain.


    Although Artificial intelligence has been with us for many decades, in recent
    times new capabilities have emerged in the constellation; enabling more complexity
    in sensing, comprehending, acting and learning with human-like levels of intelligence.
    With mathematical technologies like machine learning and natural language processing
    the landscape of AI continues to expand and increasingly co-exist with humans,
    enabling businesses to dare to digitalise with never-before levels of accuracy,
    consistency and availability. A combination of data analytics, machine learning
    and deep learning embedded with ever-more powerful computing power such as quantum
    and edge, AI is being used to deliver next generation capabilities across all
    aspects of human reach.


    While we have seen many organisations invest quite heavily in machine learning
    and analytics capabilities, bringing the insight and models from machine learning
    developments into production continues to pose a significant challenge for many
    business leaders, particularly CDOs, CEOs and Data and AI leads responsible for
    the embedding and delivery or AI enabled products to markets at the speed and
    scale required for success. This is why this book is a must read for leaders of
    these organisations, programmes or products. It provides a strong framework for
    planning, developing and deploying enterprise AI to production at scale.


    Frank Abu


    Director


    Pairview Limited


