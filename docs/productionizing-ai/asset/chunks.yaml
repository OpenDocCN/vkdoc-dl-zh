    # 1. 人工智能与 AI 生态系统简介


    在我们所处的第四次工业革命时代，AI 与物联网、基因工程等一起，是创新的核心焦点。但它也伴随着大量的炒作，尤其是在就业岗位流失和创造方面，因为全球许多企业和组织正在数字时代超高速地转变其运营模式。大部分新增就业岗位都围绕着蓬勃发展的数据科学家职业，这一角色大约从
    2012 年才开始成为主流。但该角色本身及其所需的技能范围，在这段相对较短的时间内，并未总是随着公司关键资产（人员、流程和工具）不断增长的需求而演变。特别是，大量资金和时间被浪费在规划不善的数据科学项目上，这些项目除了开发出一个
    `R` 或 `Python` 脚本外，一无所获，这些脚本通常编码高度复杂，但组织中很少有人了解。实际上，虽然这些解决方案可能很稳健，并且与一组数据科学家相关，但它们在一个拥有众多不同人员、流程和工具相互交互并争夺内部预算的大型组织/企业级结构中，并不“适用”。


    本章通过我们认为与当今成功交付 AI 项目最相关的主题视角，介绍了我们对当前能力与需求不匹配的看法。


    本章的目标，是从一个快速的、走马观花式的历史回顾开始，在相当高的层面上定义关键的 AI 概念，并向读者介绍 AI 当前和新兴的趋势，包括其中的炒作和陷阱。最终，本章将引出许多企业和组织如何在当今的工作场所中难以将机器学习和深度学习投入运营这一话题。本章讨论的主题将在后续章节中进行更详细的阐述。


    在本章中，我们将首先浅尝辄止，然后再进入后续章节更深入的动手实践和应用。目的是为读者提供本章中的工具，以便继续前进，围绕 AI 生态系统、AI 的主要应用、数据摄取和数据管道、以及基于神经网络的机器学习和深度学习提供简洁的背景和定义，最后以
    AI 的生产化部署作为收尾。


    ## AI 生态系统


    我们的第一部分为当今的 AI 设定了背景——首先审视炒作周期，然后回顾 AI 如何演变到这一阶段。我们还介绍了一些定义、作为可扩展 AI 使能者的云计算、“全栈”AI
    的生态系统，并讨论了日益增长的伦理问题。


    ### 炒作周期


    尽管围绕 AI 存在大量炒作，但人们普遍认为它现在正在兑现其潜力。对企业和组织的好处是实实在在的，这些好处因新冠数字化而加速，并因疫情期间聊天机器人支持的激增、深度学习支持的医疗诊断、用于社交距离措施的计算机视觉使用，以及重新开放经济影响的机器学习建模而得到证实。


    在工作场所，虽然 AI 作为一种服务正在成熟，但其应用在很大程度上只涉及少数 IT 专家。AI 的民主化是 2022 年的一个重点，正在从专家/小众知识转向在更广泛的关键利益相关者（所有员工、客户和业务合作伙伴）生态系统中获得认同。AI
    的工业化也是当今的一个主要趋势，雇主们推动更“智能”地实施 AI 项目；在设计思维阶段就关注 AI 的可重用性、可扩展性和安全性，而不是事后才考虑。


    我们开始这第一部分，先看看人工智能是如何演变和成熟到当前这种现状的，这种现状最好地概括为从“独立 AI”扩展到“企业级 AI”的需求。

