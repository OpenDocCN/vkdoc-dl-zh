  raw: "### TFX and Vertex AI Pipelines: Hands-on Practice\n\nAUTODL WITH TFX, KERAS,\
    \ AND VERTEX AI\n\n**This lab is based on the TensorFlow tutorial** [**www.tensorflow.org/tfx/tutorials/tfx/gcp/vertex_pipelines_simple**](http://www.tensorflow.org/tfx/tutorials/tfx/gcp/vertex_pipelines_simple)\
    \ **– the goal is to use Google Cloud Vertex Pipelines to automate a TFX pipeline\
    \ for training a deep learning model:**\n\n1.  Activate your free trial on GCP\
    \ by pressing the blue ACTIVATE button in the top right if you have not already\
    \ done so. You will need to enter credit card details to activate the $300 of\
    \ free GCP credit over three months – take care to monitor usage in your Google\
    \ Cloud Portal^([^(101)](#fn101)) although Google claim they won’t auto-charge\
    \ when credit limits are exhausted.\n\n2.  After activating your free trial, go\
    \ back to the Create a Vertex AI dashboard [`https://console.cloud.google.com/vertex-ai`](https://console.cloud.google.com/vertex-ai)\
    \ and create a project. Make note of your project ID.\n\n3.  Create a Cloud Storage\
    \ bucket in the region closest to your location by following the four steps here:\
    \ [`https://cloud.google.com/storage/docs/creating-buckets`](https://cloud.google.com/storage/docs/creating-buckets)\n\
    \nMake note of your bucket name and region for step 6b below\n\n1.  Enable Vertex\
    \ AI and Cloud Storage APIs by confirming your project, then enabling at the link\
    \ below:\n\n    [`https://console.cloud.google.com/flows/enableapi?apiid=aiplatform.googleapis.com,storage-component.googleapis.com`](https://console.cloud.google.com/flows/enableapi%253Fapiid%253Daiplatform.googleapis.com,storage-component.googleapis.com)\n\
    \n2.  Download the notebook from the GitHub repo below and run it in Colab:\n\n\
    \    [`https://github.com/bw-cetech/apress-6.4-tfx-vertex-ai.git`](https://github.com/bw-cetech/apress-6.4-tfx-vertex-ai.git)\n\
    \n3.  Run through the notebook steps making sure to restart the runtime after\
    \ installing the dependencies at the start\n    1.  Log into your google account\
    \ from the notebook\n\n    2.  Set up your variables (project, region, and bucket\
    \ name)\n\n    3.  Prepare the example data from the Palmer Penguins sample dataset\n\
    \n    4.  Create the TFX Pipeline\n\n    5.  Run the pipeline on Vertex AI Pipelines\n\
    \n4.  The TFX pipeline at the end is orchestrated using Vertex Pipelines and Kubeflow\
    \ V2 dag runner. Make sure to click on the link shown in the last cells output\
    \ to see the pipeline job progress in Vertex AI on GCP, or visit the Google Cloud\
    \ Console: [`https://console.cloud.google.com/`](https://console.cloud.google.com/)\
    \ to see the API requests.\n\n**NB make sure to delete resources on GCP after\
    \ finishing the lab, namely your pipeline run, Colab notebook, Cloud Storage bucket,\
    \ and project**\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig11_HTML.jpg)\n\
    \nA window screen displays the google cloud vertex (T F X pipeline). It includes\
    \ project info, compute engine, google cloud platform status, monitoring, error\
    \ replacing, A P Is and resources.\n\nFigure 6-11\n\nGoogle Cloud Console Vertex/TFX\
    \ Pipeline API calls\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig10_HTML.jpg)\n\
    \nA window screen displays the vertex A I (tensor flow extended) pipeline progress.\
    \ It includes pipeline run analysis with basic information.\n\nFigure 6-10\n\n\
    Vertex AI (TFX) Pipeline progress on GCP\n\n### Azure Video Analyzer: Hands-on\
    \ Practice\n\nCATEGORIZE AND CATALOGUE VIDEO WITH AZURE VIDEO ANALYZER\n\n**Although\
    \ not strictly part of Azure Machine Learning, Azure Video Analyzer is part of\
    \ Azure Cognitive Services** **and exhibits many of the automated features central\
    \ to AutoML/AutoDL/AutoAI. This lab takes a look at automating the cataloging\
    \ process of video metadata and video sections/snippets****.**\n\n**NB this lab\
    \ is part of the Microsoft Azure AI Engineer certification** [**https://docs.microsoft.com/en-us/learn/certifications/azure-ai-engineer/**](https://docs.microsoft.com/en-us/learn/certifications/azure-ai-engineer/)\
    \ – **highly recommended for readers interested in cloud-based certification:**\n\
