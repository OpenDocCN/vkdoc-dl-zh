  trans: "\n### 敏捷团队与协作\n\n`DataOps` 旨在“解决分析领域中集中化与自由化之间的冲突”——既需要管控，但同样地，在日益“颠覆或被颠覆”的数字环境中脱颖而出的公司，能够培育一种拥抱实验和“实验室式”创新的文化。\n\
    \n作为`DataOps`的三大基石之一，敏捷开发与交付的核心在于协作与适应性，以平衡这些看似矛盾的目标。\n\n其主要部分明确立足于“人”的视角。`DataOps`将多元化的利益相关者聚集在一个数据项目中，其角色涵盖业务/客户方（定义业务需求，传统角色：数据/解决方案架构师和数据工程师，较新的角色包括数据科学家和`ML`工程师，以及`IT`运维人员或构建和维护数据基础设施的人员）。\n\
    \n![](img/527966_1_En_2_Fig5_HTML.jpg)\n\n一张数据运维交接流程图展示了数据供应、数据工程、数据分析和业务客户的需求。它涉及数据源、数据集和分析。\n\
    \n图 2-5\n\n`DataOps` 交接（[`medium.com`](http://medium.com)）\n\n![](img/527966_1_En_2_Fig4_HTML.jpg)\n\
    \n一个框架展示了数据运维的各个团队。它包括解决方案架构师、数据工程师、数据科学家、数据或`BI`分析师、`IT 运维`人员以及组织或业务利益相关者。\n\n\
    图 2-4\n\n`DataOps` 团队（来源：Eckerson Group）\n\n### 开发/产品冲刺\n\n项目上对业务需求的优先级排序会使用诸如`MoSCoW`（即**必**须有此需求、**应**该有此需求、**可**以添加如果不影响其他功能、**想**要此功能/愿望清单）之类的技术。成功的数据项目通过“冲刺”来优先处理错误修复和功能开发，这些冲刺贯穿从数据集成到清洗、转换和发布的管道流程，通常持续\
    \ 2-4 周。\n\n虽然定义明确的项目工作包应能促成交付团队间流畅、敏捷的交接，但在开始时，团队通常会将组织的数仓和分析环境重建为一个初始的缩小型沙盒（原型）环境。从这些初步的起点开始，沙盒会扩展为实验室环境，用于流程编排和敏捷测试阶段，并持续集成（`CI`）代码变更。\n\
    \n最终目标是，通过“生产流水线”进行动态部署（`CD`）并监控结果。\n\n![](img/527966_1_En_2_Fig6_HTML.jpg)\n\n\
    一张图表展示了由`MoSCoW`方法确定的冲刺优先级。该流程包括数据集成、清洗、转换和发布。持续时间为 2 至 4 周。\n\n图 2-6\n\n`DataOps`\
    \ 冲刺\n\n### 敏捷的优势\n\n从沙盒、扩展再到部署的`DataOps`测试与发布周期，是围绕敏捷软件交付框架设计的。数据和分析专家利用这种`DataOps`最佳实践来快速修复错误并实现功能请求，以便重新部署到生产环境。最终结果是实现“受控交付”，它解决了以下关键领域：\n\
    \n**需求变更** – 增量式方法有助于演进集中式数据仓库，并支持“动态”分析需求。\n\n**进度延误** – 迭代、分步的方法缩短了整体交付时间。\n\
    \n**灵活性提升** – 允许通过持续的过程改进来快速处理功能请求管道，同时限制无关功能的交付。\n\n**用户失望** – 系统化、加速的问题解决流程意味着交付物不符合用户需求的可能性更小。\n\
    \n最终，持续（循环）改进过程应能带来更高质量的产品交付和更高的`ROI`。\n\n### 适应性\n\n虽然“人”的视角理应得到优先考虑，但敏捷（以及`DataOps`）的范畴超越了优化团队与协作，延伸到了应用和系统。适应性至关重要，尤其是在当今许多`AI`应用以云计算为基础的情况下；从根本上说，适应性意味着可扩展性以及业务逻辑、`API`和微服务的复用。\n\
    \n随着企业从单一服务器上的孤立代码转向将应用作为一组更小、独立运行的组件集合，微服务在应用生态系统中变得尤为流行。\n\n微服务集成所依托的底层架构促进了业务逻辑的一致和安全复用、`API`共享以及事件处理，从而通过去中心化的团队所有权、基于使用量的弹性可扩展性，以及在运行时将运行变更与其他微服务隔离而实现的离散弹性，实现了更高的敏捷性。\n\
    \n![](img/527966_1_En_2_Fig7_HTML.jpg)\n\n敏捷集成架构涉及细粒度部署、去中心化所有权和云原生基础设施。它促进了`API`共享。\n\
    \n图 2-7\n\n微服务敏捷架构（来源：IBM）\n\n### react.js：动手实践\n\n为你的 AI 应用构建前端\n\n`React.js`\
    \ 与 `Vue.js` 和 `Angular` 一样，是用于构建美观用户界面的最佳开源前端`JavaScript`库之一。本实验的目标是实现一个简单的 React\
    \ 应用，该应用可以扩展为`AI`应用的前端：\n\n1.  从下方链接安装 `node` 和 `npm` – 两者都通过单个 Windows 安装程序安装：\n\
    \n    [`https://nodejs.org/en/download/`](https://nodejs.org/en/download/)\n\n\
    2.  在本地驱动器上创建一个测试文件夹，例如 `my-react-app`\n\n3.  在新文件夹中打开终端（在 Windows 资源管理器路径中输入\
    \ `cmd` 并按回车），通过运行以下命令安装 React 样板应用：\n\n```\nnpm install -g create-react-app\n\
    ```\n\n1.  使用以下命令构建你的应用：\n\n```\nnpx create-react-app reactapp\n```\n\n1.  练习\
    \ – 尝试实现一些基本的前端更改：\n    1.  更改 React 网页上显示的消息\n    2.  （拓展）在旋转的 (react.js) 徽标的`右侧`添加一个图标\n\
    \n### VueJS：动手实践\n\n使用 VueJS 进行渐进式 AI 网页应用（PWA）开发\n\n作为构建网页应用的另一种选择，`VueJS` 可能更适合为较小、不太复杂的`AI`应用构建前端。`React`\
    \ 是一个库，而 `VueJS` 是一个渐进式`JavaScript`框架。这里我们将介绍如何启动并运行一个 `VueJS` 应用，作为构建`AI`用户界面的模板。\n\
    \n1.  如果尚未安装，请从上方 react.js 实验步骤 1 中的网址安装 `node.js`（和 `npm`）\n\n`https://nodejs.org/en/download/`\n\
    \n1.  打开终端（检查已安装的 `npm` 版本，使用\n\n```\nnpm -v\n```\n\n1.  安装 `vue-cli`（`VueJS`\
    \ 的命令行支持）\n\n```\nnpm install -g @vue/cli\n```\n\n1.  重启终端并检查 `vue-cli` 版本\n\n\
    ```\nvue --version\n```\n\n1.  导航到一个应用测试文件夹，并创建一个名为 `my-vue` 的项目\n\n```\nvue create\
    \ my-vue\n```\n\n1.  选择 Babel 默认源到源编译器，用于生成浏览器可读的 `.js`、`.xhtml`、`.css` 文件（使用方向键选择）\n\
    2.  `cd` 进入项目文件夹\n\n```\ncd myvue\n```\n\n1.  运行应用\n\n```\nnpm run serve\n```\n\
    \n1.  最后，在浏览器中导航到终端显示的网址，即 `http://localhost:8080`，查看正在运行的应用\n\n练习 - 尝试更新源代码，删除“Welcome\
    \ to Your Vue.js App”消息下方的所有文本，并将其替换为指向 Replika [`https://replika.com/`](https://replika.com/)\
    \ 的超链接截图\n\n## 代码仓库\n\n任何致力于开发`AI`解决方案的凝聚力团队都需要“步调一致”。代码仓库（“repos”）是确保开发人员和数据专家协同工作的关键协作推动因素之一。\n"
- fmt: "### Git and GitHub\n\nVersion control, or source control, is the practice\
    \ of tracking and managing changes to source code. In recent years version control\
    \ systems (VCS) and, specifically, Distributed Version Control Systems (DVCS)\
    \ have become valuable to DataOps teams. Besides intrinsic “DevOps” benefits including\
    \ reduced development time and increased number of successful deployments, evolving\
    \ datasets, such as widely used [Covid data from John Hopkins University](https://github.com/CSSEGISandData)\
    \ are increasingly widely maintained on distributed version control systems.\n\
    \n`Git`^([^(33)](#fn33)) is by far the most popular DVC, though there are a number\
    \ of other systems, such as `Beanstalk`, `Apache Subversion`, `AWS CodeCommit`,\
    \ and `BitBucket`, used for projects with specific integrations to other (usually\
    \ single) CSP providers.\n\nBesides traceability and file change history (keeping\
    \ track of every code modification and every dataset change), `Git` eases the\
    \ process of rolling back to earlier code/data states during development and has\
    \ enhanced branching and merging features vital for DataOps teams working on specific\
    \ application components or user stories.\n\nThe GitHub “ecosystem” comes complete\
    \ with `Git` (effectively the command line back-end), GitHub – a cloud-based hosting\
    \ service that lets you manage Git repos from a central location and GitHub Desktop\
    \ – a desktop version to interact with GitHub using a GUI.\n\nGitHub is now utilized\
    \ by millions of software developers and companies worldwide with public repos\
    \ in existence prior to February 2020 archived in the GitHub Arctic Code Vault\
    \ – a long-term archive 250m below the permafrost of an Arctic mountain. **Forking**\
    \ a repo on GitHub or **cloning** a public GitHub repo into a local directory\
    \ are the main ways to access and develop preexisting source code (or update datasets)\
    \ on GitHub. Both can be carried out using `git` commands in terminal or (more\
    \ intuitively) using GitHub Desktop.\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig8_HTML.jpg)\n\
    \nA representation of the GitHub ecosystem. It comprises `git`, GitHub desktop,\
    \ and GitHub.\n\nFigure 2-8\n\nGitHub ecosystem\n\n### Version Control\n\nThe\
    \ below image is an example of how `Git` performs version control on three different\
    \ versions of the same (`.py`) file. Multiple users can select which version of\
    \ the file they want to use and make changes to it independently before merging\
    \ back to the single “Master” repo.\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig9_HTML.jpg)\n\
    \nA representation of version control in `git` exhibits the 3 different versions\
    \ of the same file. The versions of an initial file, adding lines, and making\
    \ changes are exhibited from the left to right.\n\nFigure 2-9\n\nVersion Control\
    \ in Git (Source: [`www.freecodecamp.org`](http://www.freecodecamp.org))\n\n###\
    \ Branching and Merging\n\nSimplified “branching” is one of the main reasons why\
    \ `Git` is by far the most widely used version control system today.\n\nThe diagram\
    \ below shows branching (to a development “dev” branch) from a master repo in\
    \ order to develop code further – with two other developers on the project adding\
    \ feature requests. The first developer makes some minor changes and merges their\
    \ code changes to the development (dev) branch, while the other developer continues\
    \ working on their feature, postponing merging until later.\n\nOnce development\
    \ (bug fixes and feature requests) have been completed, testing would be done\
    \ on the dev branch before finally being committed (back) to the master repo.\n\
    \n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig10_HTML.jpg)\n\nA diagram\
    \ represents the development branches in Git. The branching initiates from a master\
    \ repo and further includes development and 2 feature levels.\n\nFigure 2-10\n\
    \nDevelopment branches in Git\n\n### Git Workflows\n\nGit workflows are the means\
    \ by which changes to code and data are placed into repos. There are four fundamental\
    \ “layers” through which code and data can pass: a working directory (typically\
    \ a local user machine), staging area, local repository, and remote repository\
    \ (typically on GitHub itself).\n\nWhile a file in your working directory can\
    \ be in three possible states: staged, modified, and committed, because `Git`\
    \ is a distributed version control system as opposed to a centralized system,\
    \ certain commands (such as commits) do not require communication with a remote\
    \ server each time they are actioned. This is shown in the diagram below, with\
    \ corresponding workflows and `git` commands shown underneath.\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig13_HTML.jpg)\n\
    \nA table represents the `git` commands, sources, and destinations. The `git`\
    \ commands include `git add`, `commit`, `push`, `fetch`, `merge` and `pull`.\n\
    \nFigure 2-13\n\nGit commands\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig12_HTML.jpg)\n\
    \nA Git workflow involves a working directory, staging area, local repo, and master\
    \ repo. `Git add`, `commit`, `push`, `merge`, `fetch` and `pull` are included\
    \ in the `git` commands.\n\nFigure 2-12\n\nGit workflows\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig11_HTML.png)\n\
    \nA diagram exhibits the distributed version control system. Every programmer\
    \ has a local clone of the main repository. The act of committing and updating\
    \ is allowed.\n\nFigure 2-11\n\nGitHub DVCS showing commits\n\n### GitHub and\
    \ Git: Hands-on Practice\n\nBASIC GIT\n\n**No development is done today without\
    \ recourse to GitHub so let's take a look in this lab at setting up a GitHub account,\
    \ installing and creating a new repo using Git:**\n\n1.  Set up GitHub account\
    \ – sign up at [`https://github.com/`](https://github.com/)\n\n2.  Install Git\
    \ from [`https://gitforwindows.org/`](https://gitforwindows.org/)\n\n3.  Create\
    \ a test folder on your local directory, for example, `git-intro`\n\n4.  Introduce\
    \ yourself to Git (by right-clicking the folder and selecting Git Bash or via\
    \ terminal opened in your test folder):\n\n    ```\n    git config --global user.name\
    \ \"USER-NAME\" # NB same username as created account with\n    git config --global\
    \ user.email \"YOUR-EMAIL\"\n    git config --global --list # To check the info\
    \ you just provided\n    ```\n\n5.  GitHub’s preferred authentication method is\
    \ using SSH authentication. Check for existing keys, generate a new SSH key and\
    \ add this to the SSH agent. See links below for support with this:\n\n    [`https://docs.github.com/en/github/authenticating-to-github/connecting-to-github-with-ssh/checking-for-existing-ssh-keys`](https://docs.github.com/en/github/authenticating-to-github/connecting-to-github-with-ssh/checking-for-existing-ssh-keys)\n\
    \n    [`https://docs.github.com/en/github/authenticating-to-github/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent`](https://docs.github.com/en/github/authenticating-to-github/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent)\n\
    \n6.  Add the new SSH key to your GitHub account\n\n7.  Create a New Repository\
    \ on GitHub\n\n8.  Make sure the SSH button is selected and run the `git add`,\
    \ `commit` and `push` commands shown on the screen by click on the copy button\
    \ and pasting them to Git Bash (still opened at your local folder) or by pasting\
    \ them in terminal\n\n9.  Upon refreshing your repo you should now see a `README.md`\
    \ file in your GitHub repo\n\n10.  Exercise – try to add the `react.js` app source\
    \ code from section 2 (Agile) to your local repo and push to GitHub\n\n11.  Exercise\
    \ – clone a public repo into a different local repo (make sure you have created\
    \ a new folder and are running the clone command in that folder)\n\n**NB this\
    \ lab can be completed instead by installing GitHub Desktop from** [**https://desktop.github.com/**](https://desktop.github.com/)\
    \ **and using that instead of Git.**\n\nAs an additional exercise with GitHub\
    \ Desktop, try to fork a public repo (into your GitHub account) in addition to\
    \ cloning to a local repo."
