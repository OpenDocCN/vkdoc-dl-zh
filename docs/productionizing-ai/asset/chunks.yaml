  trans: '

    # AI 案例研究


    如今，人工智能技术被用于改善客户服务、提供个性化促销、抵御网络攻击、检测和预防欺诈、自动生成管理报告、执行视觉识别、降低保险风险，以及对文档和图像进行分类整理。


    许多技术已经对日常生活产生了重大影响，尤其是我们在手持设备上使用的日常“应用程序”和定制化内容服务。


    本章将全面（跨行业、跨职能）审视过去几年中主要的 AI 应用案例，以揭示推动工作场所对 AI 需求和业务要求的驱动因素。


    在深入探讨电信、零售、银行与金融服务、石油与天然气、能源与公用事业、供应链、人力资源和医疗保健等特定垂直行业的挑战之前，我们将先了解 AI 的关键赋能因素。最终目标是将上一章的工具视角与本章的业务或组织问题相结合，以便更深入地理解为解决这些问题而实施的机器学习和深度学习应用。


    本章包含一些更高级的用例，涉及多工具集成，例如社交媒体（`Twitter API`）情感分析、欺诈检测和供应链优化。这些案例旨在映射出最适合处理底层数据和
    AI 组件（具体包括数据摄取、存储、计算与建模以及分析）的 AI 技术和平台。


    作为这些增强用例的一部分，我们将探讨如何设置 Twitter 开发者账户并实现 `Twitter API` 以进行社交媒体情感分析，如何利用关键的云解决方案组件（如
    `AWS SageMaker`、`Lambda`、`S3` 和 `QuickSight`）来训练和部署欺诈检测模型，以及如何使用 `IBM Cloud Pak
    for Data`、`Watson Studio`、`Watson Assistant`、`AutoAI` 和集成了 `CPLEX` 的 `Decision
    Optimizer` 进行供应链优化。


    ## 行业案例研究


    本章的第一部分将高层次地审视工作场所对 AI 解决方案的需求和赋能因素，然后快速浏览主要用例，构建 AI 挑战的框架，最后以审视 AI 的目标架构作为结尾。


    ### 业务/组织对 AI 的需求


    经过验证的可扩展性意味着，如今大多数私营公司和公共部门组织都将 AI 视为一种变革性技术。但有时，当前的炒作似乎将 AI 呈现为解决所有问题的万能药。


    这种炒作也带来了相当大的恐惧，特别是围绕工作替代/失业、不平等和偏见等日益增长的担忧。最近“企业 AI”的趋势正试图解决这些不平衡问题，尤其是在非技术员工方面。


    从创新的角度来看，重点坚定地放在“增强智能”案例上——利用 AI 解决许多有针对性的/定制的业务和组织问题。同时，通过培养内部 AI 学习文化（例如，通过可视化
    UI 促进实验和更好的团队协作）来打开大门，对于确保和谐的劳动力队伍至关重要。


    ### AI 赋能因素


    如今，商业 AI 解决方案和用例的主要赋能因素有四个方面。从云服务的出现，到存储的简化和更广泛的访问，以及支持复杂计算的无限制扩展和计算能力，这些都是关键。


    传感器的大规模使用意味着物联网（和移动）设备现在能够常规性地生成特征丰富、PB 级的数据。这些数据通常与智能 API 集成，这意味着机器和深度学习并不总是需要“从头开始”构建——用户可以通过
    API 接入预训练的端点解决方案。


    当然，数字化转型本身以及“颠覆或被颠覆”的驱动力，使人工智能成为一个增值的利润中心，专注于持续管理成本、提高生产率和开辟新收入来源的需求。


    ### 按垂直行业划分的 AI 解决方案


    在接下来的章节中，我们将回顾第 1 章中提到的 AI 用例。此外，图 8-1 中展示了更全面的 AI 解决方案细分，以供参考，其中许多将在本章的其余部分进一步讨论。


    ![](img/527966_1_En_8_Fig1_HTML.jpg)


    按垂直行业划分的 AI 解决方案示意图。包括制造业和汽车、公共部门、政府和人力资源、零售和电信、营销和媒体、能源、石油和天然气以及公用事业等。


    **图 8-1** AI 用例


    ### AI 用例 – 解决方案框架


    没有一个全面的解决方案框架，上述任何用例都无法实现。


    从定义战略和目标，到数据战略、安全模型、测试、实施和变更管理流程，提出正确的问题至关重要。图 8-2 展示了一些我们认为必要的关键问题，以便权衡全局并努力实现成功交付。


    ![](img/527966_1_En_8_Fig2_HTML.jpg)


    AI 用例的一组解决方案框架。包括战略、目标、KPI、AI 方法、项目所有权、技术、变更管理、AI 责任、实施、测试和数据战略。


    **图 8-2** AI 解决方案框架


    ### 解决方案架构


    对现有 IT 环境进行尽职调查是了解数据、流程、技术和基础设施方面差距的必要前提。这些差距为实施和解决方案方法提供了信息——在这个学习旅程的某个阶段，将需要一个“目标”解决方案架构来阐明
    AI 解决方案将如何与支持性的（混合）基础设施（包括本地和基于云的基础设施）进行交互。


    我们已经在关于数据摄取的章节（参见构建交付管道）中查看了一些示例架构，因此我们将通过快速查看另一个示例来结束本节——这次是 Azure 云 BI 架构。


    #### 示例：Azure


    AI 项目通常是从更简单的描述性分析项目中发展而来的。


    图 8-3 中简单的 Azure 架构显示了（在训练阶段 I）由 `Azure Data Factory`（`ADF`）执行的提取、加载和转换（ELT）管道。`ADF`
    自动化工作流，将数据从本地 SQL 数据库移动到基于云的数据库——在本例中是 `Azure Synapse`（SQL 数据仓库）。


    ![](img/527966_1_En_8_Fig3_HTML.jpg)


    AI 用例的一组解决方案框架。包括：战略、AI 方法、基础设施、目标、数据战略与安全、测试、实施、AI 责任、技术和 KPI。


    **图 8-3** 基本数据分析 Azure 架构


    然后，使用 `Azure Analysis Service` 对 `Azure Synapse` 中的数据进行转换以进行分析，从而有效地为 `Power BI`
    创建一个语义模型，供最终用户生成见解。


    ## 电信解决方案


    现在，我们将注意力转向特定行业的主要 AI 用例，从电信行业开始。

