- fmt: '### Historical Context


    Depending on your perspective, Artificial Intelligence has its roots in the age
    of computing in the 1950s or in the “automata” of ancient philosophy.


    Modern AI probably originated in classical philosophy in references to human thought
    as a mechanical process so before we start, it''s useful to establish some of
    this context for AI today.^([⁸](#fn8)) Table [1-1](#527966_1_En_1_Chapter.xhtml#Tab1)
    provides an overview of Artificial Intelligence’s evolution.


    **Table 1-1** The evolution of Artificial Intelligence


    | Date | Event |

    | --- | --- |

    | **5th century BC** | First records of mechanical robots: Chinese Daoist Philosopher
    Lao Tzu accounts of a life-sized, human-shaped mechanical automaton |

    | **c. 428–347 BC** | Greek scientists create “automata” – specifically Archytas
    creates a mechanical bird |

    | **9th century** | First recorded programmable complex mechanical machine |

    | **1833** | Charles Babbage conceives an Analytical Engine – a programmable calculating
    machine |

    | **1872** | Samuel Butler’s novel Erewhon includes the notion of machines with
    human-like intelligence |

    | **1st half of 20th century** | Science Fiction awareness of AI (Tin Man in Wizard
    of Oz, Maria robot double in Metropolis) |

    | **1950** | Alan Turing publishes Computing Machinery and Intelligence – asking
    “Can machines think?” – or “can machines successfully imitate thought?” |

    | **1956** | MIT cognitive scientist Marvin Minsky coins the term “Artificial
    Intelligence” |

    | **1974–1993** | Long AI “Winter” – lack of tangible commercial success and poor
    performance of neural networks lead to reduced funding from governments |

    | **1997** | IBM''s Deep Blue defeats Garry Kasparov at Chess |

    | **2011** | IBM Watson wins the quiz show "Jeopardy!" |

    | **2012** | ImageNet competition – AlexNet Deep Neural Networks result in significant
    reduction in error in visual object recognition |


    ### AI – Some Definitions


    Whether we consider a philosophical automaton or a thinking machine as real “AI”
    is up for debate but what we can make use of, with the benefit of hindsight, are
    specific terms to understand and articulate Artificial Intelligence


    | Terminology | Description | Example |

    | --- | --- | --- |

    | **Simple machine** | A device that does work (transfer of energy from one object
    to another) | Wheels, levers, pulleys, inclined planes, wedges, and screws |

    | **Complex machines** | Combinations of simple machines | Wheelbarrow, bicycle,
    mechanical robot (Lao Tzu, mechanical bird) |

    | **Programmable machines** | Receive input, store and manipulate data, and provide
    output in a useful format | Punched cards, encoded music rolls |

    | **Calculating machines** | Mechanical device used to perform automatically the
    basic operations of arithmetic | Abacus, slide rule, difference engine, calculator
    |

    | **Digital machines** | Systems that generate and process binary data | Computers
    |


    On a timeline, Figure [1-1](#527966_1_En_1_Chapter.xhtml#Fig1) shows how this
    looks.


    ![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig1_HTML.jpg)


    A timeline diagram starts with simple, complex, programmable, programmable, calculating,
    programmable calculating, digital machines, A I, and democratic A I.


    **Figure 1-1** A timeline of AI’s evolution


    ### AI Today


    While the question of “what is AI” may be less clear (we will address this in
    the next section), without Digital Machines or Computers we certainly wouldn’t
    be talking about AI – and as we will see shortly, ultimately it’s the growth of
    cloud computing and the high-performance computing that comes with it that have
    enabled AI or democratic AI.


    When we look at the mechanics and, in particular, the applied use cases of AI
    today, Machine and Deep Learning are the underpinning techniques of real Artificial
    Intelligence, rather than any misconceived ideas about a “rise of the machines”
    partly based on ignorance, part science fiction. AI in the job-world stands for
    Augmented Intelligence and no-one really wants to see Artificial General Intelligence
    in the same way as no-one (hopefully) wants a third world war.


    #### Machine Learning


    As shown in Figure [1-2](#527966_1_En_1_Chapter.xhtml#Fig2), Machine Learning
    can be thought of as a subset of AI giving computers the ability to learn without
    being explicitly programmed. Operationally, machine learning is much like how
    humans learn from experience, that is, if we touch something hot and get burnt,
    the negative experience is stored in memory and we quickly learn not to touch
    it again.


    We feed a computer data, which represents past experience, and then with the use
    of different statistical methods, we “learn” from the data and apply that knowledge
    to future events – these are our model “predictions.”


    #### Deep Learning


    Deep Learning is often considered a subset of Machine Learning and is distinguished
    by the fact that deep neural network layers are used to solve predictive problems.


    Because of their reliance on Big data and Modelling, all of AI, Machine, and Deep
    Learning are core techniques for Data Science which combines modeling, statistics,
    programming, and some domain expertise to extract insights and value from data.


    ![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig2_HTML.jpg)


    A diagram explains the subset of A I, which is Machine learning, and deep learning
    comes under M L and A I, and is considered as the subset of A I which are core
    techniques of D S.


    **Figure 1-2** Deep Learning as a subset of AI (Source: Abris AI in Banking ^([⁹](#fn9)))


    ### What Is Artificial Intelligence


    The Artificial Intelligence with which we are concerned with in this book is often
    confused with the science fiction variety. How do we distinguish the two?


    **Narrow AI** is the current form of AI used in business and organizations, that
    is, where a machine is designed to perform a single task. The machine gets very
    good at performing that particular task (such as e.g. Google Translate) but once
    the machine is trained, it does not generalize to unseen domains.


    **Artificial General Intelligence (AGI)** is the form of AI that can accomplish
    any human intellectual task, with underlying “conscious” decision making. Although
    it may constitute an existential threat, it does remain, for now, aspirational
    due to challenges including scaling of hardware, energy consumption, and catastrophic
    memory loss which also affects some of the advanced deep learning algorithms today.


    **Artificial Superintelligence or ASI** is the form of AI most close to that used
    in science fiction movies. ASI in theory has capability more than that of humans.'
