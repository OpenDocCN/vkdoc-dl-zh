- fmt: "### Implementing a CNN\n\nThe above sections cover the generic deep learning\
    \ implementation process but how does the process go when we are specifically\
    \ building, for example, a Convolutional Neural Network for Image Classification?\
    \ Machine and Deep Learning modeling is highly iterative and building a performant\
    \ Convolution Neural Network is about as difficult as it gets.\n\nAs we will see\
    \ shortly in the hand-on lab following this section, adopting a step-by-step process\
    \ while budgeting for a degree of iteration around EDA and Data Wrangling is key\
    \ to getting (a) the model to run and (b) performance to meet acceptable criteria\
    \ (e.g., `fbeta > 0.9`).\n\nAfter importing the data and performing basic Exploratory\
    \ Data Analysis, there are a number of requirements unique to the data wrangling\
    \ and model set up for a CNN. These are described below with the technical subprocesses\
    \ covered in the next section in this chapter.\n\n1.  **Preprocessing and partitioning**\n\
    \    *   Image to data matrix/tensor conversion\n    *   Partitioning of the dataset\
    \ into training and test sets\n    *   Conversion of the tensor data format to\
    \ a float and rescaling\n\n2.  **Build network**\n    *   Initialize filters for\
    \ the convolutional base (convolutional and pooling layers)\n    *   Define activation\
    \ functions to compute gradients/enable backpropagation\n    *   Update weights\
    \ for the dense layers\n\n3.  **Compile network**\n    *   Combine forward and\
    \ backward operations and build NN\n\nThe remaining steps are for the most part\
    \ in line with the generic process shown in the Deep Learning lifecycle above,\
    \ from training the network, through evaluation on the test set (checking such\
    \ metrics as loss, accuracy, confusion matrix, and classification report). Often\
    \ training and evaluation is repeated until we hit our “target” performance, with\
    \ dropout often added to address overfitting.\n\n**Typical Keras CNN implementation:**\n\
    \n```python\nmodel = models.Sequential()\nmodel.add(layers.Conv2D(32, (3, 3),\
    \ activation='relu', input_shape=(32, 32, 3)))\nmodel.add(layers.MaxPooling2D((2,\
    \ 2)))\nmodel.add(layers.Conv2D(64, (3, 3), activation='relu'))\nmodel.add(layers.MaxPooling2D((2,\
    \ 2)))\nmodel.add(layers.Conv2D(64, (3, 3), activation='relu'))\nmodel.add(layers.Flatten())\n\
    model.add(layers.Dense(64, activation='relu'))\nmodel.add(layers.Dense(10))\n\
    model.compile(optimizer='adam',\n              loss=tf.keras.losses.SparseCategoricalCrossentropy(from_logits=True),\n\
    \              metrics=['accuracy'])\nhistory = model.fit(train_images, train_labels,\
    \ epochs=10,\n                    validation_data=(test_images, test_labels))\n\
    ```\n\n### Implementing an RNN\n\nThere are actually three types of Recurrent\
    \ Neural Network “layers” we can leverage in Keras:\n\n**`keras.layers.SimpleRNN`**\n\
    \nThis is the “vanilla” version – essentially a fully connected RNN where the\
    \ output from previous timestep is to be fed to next timestep.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig20_HTML.jpg)\n\
    \nA model diagram illustrates Recurrent Neural Network. It comprises a and x input,\
    \ tanh function, SoftMax, and y output.\n\nFigure 5-20: Recurrent Neural Network\
    \ – SimpleRNN\n\n**`keras.layers.GRU`**\n\nGated recurrent units (GRUs) are gating\
    \ mechanisms in recurrent neural networks intended to solve the vanishing gradient\
    \ problem in standard RNNs. Via an update gate and a reset gate, a GRU “vets”\
    \ information before passing to an output, thus avoiding diminishing gradients\
    \ and inflexible (unchanging) weights in a `SimpleRNN`. We will discuss vanishing\
    \ gradients in more detail in the next section 6 “Tuning a DL Model” in this chapter.\n\
    \n**Example Keras RNN implementation of GRU and SimpleRNN layers:**\n\n```python\n\
    model = keras.Sequential()\nmodel.add(layers.Embedding(input_dim=1000, output_dim=64))\n\
    # The output of GRU will be a 3D tensor of shape (batch_size, timesteps, 256)\n\
    model.add(layers.GRU(256, return_sequences=True))\n# The output of SimpleRNN will\
    \ be a 2D tensor of shape (batch_size, 128)\nmodel.add(layers.SimpleRNN(128))\n\
    model.add(layers.Dense(10))\nmodel.summary()\n```\n\n**`keras.layers.LSTM`**\n\
    \nAs we know from Section 3 in this chapter, LSTMs generally help achieve better\
    \ forecasts with “longer-term effects.” This “memory” in the network is achieved\
    \ through the persistence of hidden state through three gates:\n\n*   Input gate\
    \ adds information to the cell state\n*   Forget gate removes the information\
    \ that is no longer required by the model\n*   Output gate selects the information\
    \ to be shown as output\n\n**Example Vanilla LSTM implementation:**\n\n```python\n\
    model = Sequential()\nmodel.add(LSTM(50, activation='relu', input_shape=(n_steps,\
    \ n_features)))\nmodel.add(Dense(1)) # single hidden layer of LSTM units\nmodel.compile(optimizer='adam',\
    \ loss='mse')\n```\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig21_HTML.jpg)\n\
    \nA Long Short-Term Memory network comprises forget gate, update gate, tanh, and\
    \ output gate in a Long Short-Term Memory cell, output y is sent through SoftMax.\n\
    \nFigure 5-21: LSTM Architecture\n\n#### LSTM Implementation for Time Series\n\
    \nWe will be building an LSTM in our second lab in this section shortly but before\
    \ we do so, the wrangling process for data used in time series forecasting with\
    \ LSTMs (or any RNNs) should be addressed.\n\nIn time series forecasting, previous\
    \ time steps actually become “features” for the deep learning process, with the\
    \ target being the current (training) or next (inference) time step. If we are\
    \ going to forecast forward (for example) 60 time steps, then each row of data\
    \ presented to the LSTM needs to include the data from previous time steps going\
    \ back to T-60. This is shown in the following table, where the column labeled\
    \ “Time Step” is effectively our target variable and the other columns are our\
    \ Feature set.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Figb_HTML.jpg)\n\
    \nA table illustrates 7 columns and 7 rows. Columns Time step have 7 rows starting\
    \ from T-0 to T-60, feature 1 comprises rows starting from T-60 to T-120, Feature\
    \ 2 comprises rows starting from T-119.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Figc_HTML.jpg)\n\
    \nA line graph between training and performance with transfer and without transfer.\
    \ The graph of with transfer indicates a rise in the performances with higher\
    \ slope and higher asymptote.\n\n### Neural Networks – Terminology\n\nIn the next\
    \ section, we will go into some detail on the more technical modeling concepts\
    \ involved in fine-tuning neural networks. For now, we present below a summary\
    \ reference of the main “levers” we have at our disposal to build and run a model\
    \ and achieve satisfactory performance:\n\n*   **Epoch** — a pass over the entire\
    \ dataset. The number of epochs is the number of times you go through your training\
    \ set\n*   **Learning rate** — a scalar used to train a model via gradient descent.\
    \ Learning Rate determines how fast weights change for each iteration\n*   **Activation\
    \ function** — the output of a node/neuron, given a set of inputs, which is then\
    \ used as input for the next node. Examples include `ReLU`, `tanh`, `sigmoid`,\
    \ and linear\n*   **Regularization** — a technique (and hyperparameter) which\
    \ changes the learning algorithm to prevent overfitting. Regularization Rate is\
    \ also used to specify the rate of regularization\n*   **Batch size** — a small,\
    \ randomly selected subset of the data run in a single iteration. 1 epoch (a pass\
    \ thru entire training set) = batch size * no. of iterations/steps\n*   **Hidden\
    \ layer** — a layer between input and output layers, where neurons take weighted\
    \ inputs and use the activation function to produce an output\n*   **Loss function**\
    \ (or a cost function) – by how much does the prediction given by the output layer\
    \ deviate from actual (ground truth)? The objective of a neural network is to\
    \ minimize this"
