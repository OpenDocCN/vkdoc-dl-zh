  trans: "\n### 生成式模型与判别式模型\n\n理解深度学习模型工作原理的一个关键概念，在于区分判别式模型与生成式模型。\n\n判别式模型和生成式模型都用于执行机器学习和深度学习。两者的区别在于：判别式模型基于条件概率\
    \ `p(y|x)` 进行预测，寻找类别间的决策边界，并用于监督学习；而生成式模型则通过显式建模每个类别的实际分布，从联合概率分布 `p(x,y)` 中预测条件概率，并用于无监督特征学习。\n\
    \n为了理解这一概念，可以类比如何将语音分类为两种语言之一。我们可以利用语言模型之间的差异（判别式），也可以分别学习每种语言（生成式）。\n\n由于神经网络试图学习哪些特征\
    \ `x` 会映射到 `y`，从而对输入进行判别，因此它们使用的是判别式模型。\n\n![](img/527966_1_En_5_Figa_HTML.jpg)\n\
    \n两种模型的示意图。左侧为判别式模型，右侧的生成式模型描绘了两个分离的椭圆形状。\n\n### 随机游走\n\n理解神经网络的另一个重要概念是随机游走。\n\
    \n随机游走是一种随机过程，描述了一个由变量上连续随机步骤组成的路径。我们可以想象一个人在十字路口每次抛两次硬币来决定前进、后退、向左或向右，从而可视化二维随机游走：\n\
    \n- 正面、正面 -> 前进\n- 正面、反面 -> 向右\n- 反面、正面 -> 向左\n- 反面、反面 -> 后退\n\n我们将在本节的动手实验中很快创建这个二维随机游走。\n\
    \n这里的重要方面是，随机游走每一步的每个结果都具有相等的概率。随机游走对于例如图像分割非常重要，它们用于确定与每个像素相关联的标签（例如“物体”或“背景”）。它们也用于对大规模在线图（如在线社交网络）进行采样。\n\
    \n### 马尔可夫链与马尔可夫过程\n\n马尔可夫链是一种随机模型，描述了一系列可能的事件，其中每个事件的概率仅取决于前一个事件的状态。\n\n马尔可夫链的定义特征是，无论过程如何到达当前状态，可能的未来状态都是固定的。实际上，马尔可夫链是无记忆的——给定当前和过去状态，过程未来状态的条件分布仅取决于当前状态，而完全与过去状态无关。\n\
    \n这里用一个赌博类比来帮助理解——押注一系列独立公平抛硬币的结果：\n\n- 如果正面，她/他赢得一美元。\n- 如果反面，她/他输掉一美元。\n\n停止条件是\
    \ (a) 她/他达到 N 美元的财富，或 (b) 他/她的钱包空了。\n\n建模为马尔可夫过程的系统产生了隐马尔可夫模型（HMM）——类似于神经网络/深度学习中的隐藏层/状态的统计模型。\n\
    \n要了解它们如何工作以及如何应用于现实世界现象，请查看一个实际运行的马尔可夫链：[`https://setosa.io/ev/markov-chains/`](https://setosa.io/ev/markov-chains/)\n\
    \n### 其他随机过程：鞅\n\n鞅的概念在时间序列分析、量化金融、算法交易和博彩业中非常重要。\n\n最初是 18 世纪法国的一类赌博策略，赌徒 (a)\
    \ 如果抛硬币正面朝上则赢得赌注，反面则输掉，并且 (b) 每次输后加倍赌注。其思想是，如果赌徒的财富和可用性是无限的，那么最终抛出正面的概率趋近于 1。\n\
    \n深度学习模型（尤其是循环神经网络）的统计能力，与以鞅理论为基础的 ARMA/ARIMA 时间序列模型有相似之处。\n\n### 用 Python 实现随机游走：动手实践\n\
    \n神经网络基础——随机理论\n\n**使用 Jupyter Notebook 中的 Python，本练习的目标是用 Python 实现一个二维随机游走：**\n\
    \n1.  克隆以下 GitHub 仓库：\n\n    [`https://github.com/bw-cetech/apress-5.2.git`](https://github.com/bw-cetech/apress-5.2.git)\n\
    \n2.  浏览代码示例：\n    1.  导入 Python 库\n    2.  定义随机游走的步数以及用于捕获结果的列表\n    3.  尝试使用\
    \ `For` 循环和四个 `If` 语句创建二维随机游走\n    4.  绘制结果并观察分形\n    5.  作为拓展练习，尝试实现三维随机游走！\n\
    \n![](img/527966_1_En_5_Fig4_HTML.jpg)\n\n图表描绘了随机游走中的步数。250 标记了较大的位置，而 y 轴上的 200\
    \ 具有较小的值。\n\n图 5-4\n\nPython 中的二维随机游走\n\n## 神经网络简介\n\n将上述概率论作为我们的主要关注点——及其在神经网络中的应用，我们现在在本节中更深入地探讨神经网络的构成，研究不同类型的神经网络及其区别。\n\
    \n### 人工神经网络（ANN）\n\n如下文所述，人工神经网络（ANN）是受生物启发的网络，能够从底层数据中提取层次化的抽象特征。本质上，它是用于解决预测问题的任何类型神经网络的通用名称。人工神经网络由输入层、隐藏层和输出层组成，将各种数据点作为输入，通过网络传递数据，并输出某个数值。当今使用的主要人工智能应用，包括语音识别、图像识别、机器翻译和预测，都利用了某种类型的人工神经网络。\n\
    \n正如我们将看到的，深度学习中使用的 ANN 架构和算法种类繁多且各不相同。我们将介绍以下主要类型，从“基础”版本开始：简单感知机和多层感知机，然后介绍卷积神经网络和循环神经网络——这是当今人工智能应用（从语音和图像识别到机器翻译和预测）中使用的两种主要类型。\n\
    \n![](img/527966_1_En_5_Fig5_HTML.jpg)\n\n该模型展示了 7 种类型的人工神经网络：单层感知机、径向基网络、循环神经网络、LSTM\
    \ 循环神经网络、Hopfield 网络和玻尔兹曼机。单层感知机有 2 个输入单元和 1 个输出单元。\n\n图 5-5\n\nANN 的类型\n\n###\
    \ 简单感知机\n\n简单（或单层）感知机是所有人工神经网络的构建模块。本质上，它是我们大脑中生物神经元的简化模型。\n\n我们大脑中的神经元从其他神经元接收多个输入，基于这些输入，神经元要么触发，要么不触发。简单感知机则简单得多——它是一个单一的神经元，接收多个输入并学习一个线性函数以产生输出。激活函数（Heaviside\
    \ 阶跃函数）帮助简单感知机对二元输出（开或关）进行分类。\n\n如果我们将这些感知机结构化为一个多层网络，并使每个神经元能够使用来自前一层的输入/神经元来学习非线性函数，我们就得到了一个多层感知机（MLP），以及一个更接近我们大脑的东西。\n\
    \n![](img/527966_1_En_5_Fig6_HTML.jpg)\n\n示意图展示了一个简单感知机。它描绘了三个输入 `x1`、`x2` 和 `x3`\
    \ 进入一个圆形块，并输出 `y`。\n\n图 5-6\n\n简单感知机\n"
- fmt: "### Multilayer Perceptron (MLP)\n\nFormally, a Multilayer Perceptron (or `MLP`)\
    \ is a class of feedforward `ANN`, essentially a neural network connecting multiple\
    \ layers in a **directed** graph (or **finite acyclic graph**). Because it has\
    \ multiple “hidden” layers of neurons, a Multilayer Perceptron is a type of **Deep\
    \ Neural Network.** It is these hidden layers that distinguish between a machine\
    \ learning model and a deep learning model.\n\nThe “direction” stems from the\
    \ **forward pass** mechanism where input data is fed into the network, passing\
    \ through the nodes (neurons) in only one direction (i.e., left to right) until\
    \ we arrive at our output layer.\n\nIn contrast to a simple perceptron, each node\
    \ in a Multilayer Perceptron, apart from the input nodes, has a **nonlinear activation**\
    \ function, typically `sigmoid`, `tanh`, or `ReLU`. We will discuss these in the\
    \ section below.\n\nThe “feedforward” nature of an `MLP` should not be confused\
    \ with another important process which occurs after a forward pass, that of **backpropagation**.\
    \ Backpropagation is a supervised learning algorithm for updating the weights\
    \ in the network (based on the error between the prediction and the actual labeled\
    \ data) after a forward pass.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig7_HTML.jpg)\n\
    \nA model diagram illustrates Multilayer Perceptron as a class of feedforward\
    \ Artificial Neural Networks. It comprises 4 layers: input, first hidden, second\
    \ output, and output layer.\n\n**Figure 5-7**  \nMultilayer Perceptron as a class\
    \ of feedforward `ANN`\n\n### Convolutional Neural Networks (CNN)\n\nMultilayer\
    \ perceptrons take vector inputs and while capable of harder problems such as\
    \ image classification (image pixels can be reduced to a single long vector of\
    \ input data) are not themselves sufficient to carry out the vast majority of\
    \ predictive challenges faced today.\n\nIn particular for Image Classification\
    \ problems, since the seismic improvements presented at the `ImageNet` competition\
    \ in 2012, Convolutional Neural Networks (`CNNs`) have become the preferred approach,\
    \ with the image data fed in as tensors rather than vectors.\n\nThese `CNNs` are\
    \ specialized neural network models designed for working with two-dimensional\
    \ image data where learning spatial relationships are critical.\n\nAnd in contrast\
    \ to an `MLP`, where the number of weights in a neural network rapidly becomes\
    \ unmanageable (because they are fully connected), a `CNN` will utilize “convolutions”\
    \ and techniques such as pooling and dropout to reduce the number of weights.\n\
    \nA convolution is a mathematical way of combining two signals to form a third\
    \ signal and in neural networks this is the simple application of a filter (i.e.,\
    \ **a set of weights**) to an input that results in an activation. The popularity\
    \ of `CNNs` stems from their ability to automatically learn a large number of\
    \ filters in parallel during the model training process and thereby **extract\
    \ hierarchical patterns from input data** (such as identifying a person or building\
    \ in a composite image).\n\nAcross the entire network, `CNNs` rely on several\
    \ convolutional layers, repeatedly applying the same filter to the input data,\
    \ resulting in a **feature map** of activations indicating the locations and strength\
    \ of a detected feature in an image.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig8_HTML.jpg)\n\
    \nA model diagram features examples of `CNN` used for image classification. It\
    \ starts from input and passes through feature learning that comprises convolution\
    \ and `ReLU`, pooling, convolution, and `ReLU` and pooling, ending with classification\
    \ comprising flatten, fully connected, and `softmax`.\n\n**Figure 5-8**  \nExample\
    \ `CNN` used for Image Classification\n\n### Recurrent Neural Networks (RNN)\n\
    \nWhile Convolutional Neural Networks are the artificial neural network of choice\
    \ for Image Classification, Recurrent Neural Networks (`RNNs`) are the class of\
    \ `ANNs` commonly used for ordinal or temporal problems, including Natural Language\
    \ Processing, language translation, speech recognition, and forecasting.\n\nLike\
    \ feedforward networks such as `CNNs`, `RNNs` utilize the input/training data\
    \ to learn with the connections between nodes forming a directed graph but this\
    \ time along a temporal sequence. This allows `RNNs` to address an inherent sequential\
    \ data weakness in feedforward networks, that is, when the order of the inputs\
    \ matters.\n\nAs such, `RNNs` are distinguished by their “memory” as they take\
    \ information from prior inputs to influence the current input layer and output.\
    \ Effectively a **hidden state** is used to carry pertinent information from one\
    \ input item in the series to others. Or put another way, and as shown in the\
    \ diagram below, the outputs of recurrent neural networks depend on the prior\
    \ elements within the sequence.\n\nRecurrent Neural Networks are the `ANN` architecture\
    \ behind popular applications such as Alexa, Siri, voice search, and Google Translate.\
    \ High-accuracy, industrial-scale recurrent neural networks (`RNNs`) are also\
    \ increasingly able to outperform traditional methods in **forecasting**, particularly\
    \ specialized Long Short-Term Memory networks (`LSTMs`).\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig9_HTML.jpg)\n\
    \nA model diagram features a Hidden state within a Recurrent Neural Network. It\
    \ comprises factors `h`, `w`, `x`, and `y` for `n` number of times.\n\n**Figure\
    \ 5-9**  \n“Hidden state” within a Recurrent Neural Network\n\n#### Long Short-Term\
    \ Memory (LSTM) networks\n\n`LSTMs` are a type of recurrent neural network capable\
    \ of learning order dependence in sequence prediction problems.^([^(68)](#fn68))\
    \ `LSTMs` are distinguishable from more general Recurrent Neural Networks as they\
    \ are able to store past information that is important, and forget the information\
    \ that is not.\n\nThe internal “gates” of a Long Short-Term Memory network in\
    \ effect enable `LSTMs` to learn much longer-term dependencies than a vanilla\
    \ `RNN`. Whereas standard `RNNs` fail to learn in the presence of time lags greater\
    \ than 5 to 10 discrete time steps, `LSTM` can learn to bridge minimal time lags\
    \ in excess of 1000 discrete time steps by enforcing constant error flow.\n\n\
    `LSTMs` are commonly used for (time-series) forecasting but also in speech recognition\
    \ and translation, by virtue of their ability to learn more sophisticated grammar\
    \ relationships.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig10_HTML.jpg)\n\
    \nA model diagram illustrates the Long Short-Term Memory network. It comprises\
    \ 3 sigma and 1 `tanh` input.\n\n**Figure 5-10**  \n`LSTM` Architecture\n\n###\
    \ Other Types of Neural Networks\n\nConvolutional and Recurrent Neural Networks\
    \ are used as deep learning architectures to train on Supervised Learning problems,\
    \ that is, where we have prelabeled data (such as classified images or end-of-day\
    \ stock prices for forecasting). This is the focus of our first hands-on exercise\
    \ at the end of this section.\n\nBefore we go to that, we will take a quick look\
    \ at other architectures which are generally applied to solving Unsupervised Deep\
    \ Learning problems. These include **Restricted Boltzmann Machines (`RBMs`)**,\
    \ **Deep Belief Networks (`DBNs`)**, and **Deep Boltzmann Machines (`DBMs`)**\
    \ as well as **Autoencoders, Variational Autoencoders,** and **Generative Adversarial\
    \ Networks**. Autoencoders are addressed in our second hands-on lab in this section."
  raw: '### Multilayer Perceptron (MLP)


    Formally, a Multilayer Perceptron (or MLP) is a class of feedforward ANN, essentially
    a neural network connecting multiple layers in a **directed** graph (or **finite
    acyclic graph**). Because it has multiple “hidden” layers of neurons, a Multilayer
    Perceptron is a type of **Deep Neural Network.** It is these hidden layers that
    distinguish between a machine learning model and a deep learning model.


    The “direction” stems from the **forward pass** mechanism where input data is
    fed into the network, passing through the nodes (neurons) in only one direction
    (i.e., left to right) until we arrive at our output layer.


    In contrast to a simple perceptron, each node in a Multilayer Perceptron, apart
    from the input nodes, has a **nonlinear activation** function, typically sigmoid,
    tanh, or ReLU. We will discuss these in the section below.


    The “feedforward” nature of an MLP should not be confused with another important
    process which occurs after a forward pass, that of **backpropagation**. Backpropagation
    is a supervised learning algorithm for updating the weights in the network (based
    on the error between the prediction and the actual labeled data) after a forward
    pass.


    ![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig7_HTML.jpg)


    A model diagram illustrates Multilayer Perceptron as a class of feedforward Artificial
    Neural Networks. It comprises 4 layers: input, first hidden, second output, and
    output layer.


    Figure 5-7


    Multilayer Perceptron as a class of feedforward ANN


    ### Convolutional Neural Networks (CNN)


    Multilayer perceptrons take vector inputs and while capable of harder problems
    such as image classification (image pixels can be reduced to a single long vector
    of input data) are not themselves sufficient to carry out the vast majority of
    predictive challenges faced today.


    In particular for Image Classification problems, since the seismic improvements
    presented at the ImageNet competition in 2012, Convolutional Neural Networks (CNNs)
    have become the preferred approach, with the image data fed in as tensors rather
    than vectors.


    These CNNs are specialized neural network models designed for working with two-dimensional
    image data where learning spatial relationships are critical.


    And in contrast to an MLP, where the number of weights in a neural network rapidly
    becomes unmanageable (because they are fully connected), a CNN will utilize “convolutions”
    and techniques such as pooling and dropout to reduce the number of weights.


    A convolution is a mathematical way of combining two signals to form a third signal
    and in neural networks this is the simple application of a filter (i.e., **a set
    of weights**) to an input that results in an activation. The popularity of CNNs
    stems from their ability to automatically learn a large number of filters in parallel
    during the model training process and thereby **extract hierarchical patterns
    from input data** (such as identifying a person or building in a composite image).


    Across the entire network, CNNs rely on several convolutional layers, repeatedly
    applying the same filter to the input data, resulting in a **feature map** of
    activations indicating the locations and strength of a detected feature in an
    image.


    ![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig8_HTML.jpg)


    A model diagram features examples of C N N used for image classification. It starts
    from input and passes through feature learning that comprises convolution and
    relu, pooling, convolution, and relu and pooling, ending with classification comprising
    flatten, fully connected, and softmax.


    Figure 5-8


    Example CNN used for Image Classification


    ### Recurrent Neural Networks (RNN)


    While Convolutional Neural Networks are the artificial neural network of choice
    for Image Classification, Recurrent Neural Networks (RNNs) are the class of ANNs
    commonly used for ordinal or temporal problems, including Natural Language Processing,
    language translation, speech recognition, and forecasting.


    Like feedforward networks such as CNNs, RNNs utilize the input/training data to
    learn with the connections between nodes forming a directed graph but this time
    along a temporal sequence. This allows RNNs to address an inherent sequential
    data weakness in feedforward networks, that is, when the order of the inputs matters.


    As such, RNNs are distinguished by their “memory” as they take information from
    prior inputs to influence the current input layer and output. Effectively a **hidden
    state** is used to carry pertinent information from one input item in the series
    to others. Or put another way, and as shown in the diagram below, the outputs
    of recurrent neural networks depend on the prior elements within the sequence.


    Recurrent Neural Networks are the ANN architecture behind popular applications
    such as Alexa, Siri, voice search, and Google Translate. High-accuracy, industrial-scale
    recurrent neural networks (RNNs) are also increasingly able to outperform traditional
    methods in **forecasting**, particularly specialized Long Short-Term Memory networks
    (LSTMs).


    ![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig9_HTML.jpg)


    A model diagram features a Hidden state within a Recurrent Neural Network. It
    comprises factors h, w, x, and y for n number of times.


    Figure 5-9


    “Hidden state” within a Recurrent Neural Network


    #### Long Short-Term Memory (LSTM) networks


    LSTMs are a type of recurrent neural network capable of learning order dependence
    in sequence prediction problems.^([^(68)](#fn68)) LSTMs are distinguishable from
    more general Recurrent Neural Networks as they are able to store past information
    that is important, and forget the information that is not.


    The internal “gates” of a Long Short-Term Memory network in effect enable LSTMs
    to learn much longer-term dependencies than a vanilla RNN. Whereas standard RNNs
    fail to learn in the presence of time lags greater than 5 to 10 discrete time
    steps, LSTM can learn to bridge minimal time lags in excess of 1000 discrete time
    steps by enforcing constant error flow.


    LSTMs are commonly used for (time-series) forecasting but also in speech recognition
    and translation, by virtue of their ability to learn more sophisticated grammar
    relationships.


    ![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig10_HTML.jpg)


    A model diagram illustrates the Long Short-Term Memory network. It comprises 3
    sigma and 1 tanh input.


    Figure 5-10


    LSTM Architecture


    ### Other Types of Neural Networks


    Convolutional and Recurrent Neural Networks are used as deep learning architectures
    to train on Supervised Learning problems, that is, where we have prelabeled data
    (such as classified images or end-of-day stock prices for forecasting). This is
    the focus of our first hands-on exercise at the end of this section.


    Before we go to that, we will take a quick look at other architectures which are
    generally applied to solving Unsupervised Deep Learning problems. These include
    **Restricted Boltzmann Machines (RBMs)**, **Deep Belief Networks (DBNs)**, and
    **Deep Boltzmann Machines (DBMs)** as well as **Autoencoders, Variational Autoencoders,**
    and **Generative Adversarial Networks**. Autoencoders are addressed in our second
    hands-on lab in this section.'
  trans: "\n### 多层感知机（MLP）\n\n从形式上讲，多层感知机（或 `MLP`）是一类前馈 `ANN`，本质上是一种在**有向**图（或**有限无环图**）中连接多个层的神经网络。由于它拥有多个“隐藏”神经元层，多层感知机是一种**深度神经网络**。正是这些隐藏层区分了机器学习模型和深度学习模型。\n\
    \n“方向”源于**前向传播**机制，即输入数据被馈入网络，仅沿一个方向（即从左到右）通过节点（神经元），直到到达输出层。\n\n与简单的感知机不同，多层感知机中除输入节点外的每个节点都具有**非线性激活**函数，通常是\
    \ `sigmoid`、`tanh` 或 `ReLU`。我们将在下一节中讨论这些函数。\n\n不应将 `MLP` 的“前馈”特性与在前向传播之后发生的另一个重要过程——**反向传播**——相混淆。反向传播是一种监督学习算法，用于在前向传播之后（根据预测值与实际标注数据之间的误差）更新网络中的权重。\n\
    \n![](img/527966_1_En_5_Fig7_HTML.jpg)\n\n模型图展示了多层感知机作为一类前馈人工神经网络。它包含 4 个层：输入层、第一隐藏层、第二隐藏层和输出层。\n\
    \n**图 5-7**  \n作为前馈 `ANN` 一类的多层感知机\n\n### 卷积神经网络（CNN）\n\n多层感知机接收向量输入，虽然能够处理图像分类等更复杂的问题（图像像素可以简化为一个长输入数据向量），但其本身不足以应对当今面临的大多数预测挑战。\n\
    \n特别是在图像分类问题中，自 2012 年 `ImageNet` 竞赛取得突破性进展以来，卷积神经网络（`CNN`）已成为首选方法，图像数据以张量而非向量的形式输入。\n\
    \n这些 `CNN` 是专门为处理二维图像数据而设计的神经网络模型，其中学习空间关系至关重要。\n\n与 `MLP`（由于全连接，网络中的权重数量会迅速变得难以管理）不同，`CNN`\
    \ 会利用“卷积”以及池化和丢弃等技术来减少权重数量。\n\n卷积是一种将两个信号组合成第三个信号的数学方法，在神经网络中，这相当于简单地将一个滤波器（即**一组权重**）应用于输入，从而产生激活。`CNN`\
    \ 的流行源于它们能够在模型训练过程中自动并行学习大量滤波器，从而**从输入数据中提取层次化模式**（例如在合成图像中识别人物或建筑物）。\n\n在整个网络中，`CNN`\
    \ 依赖多个卷积层，反复将相同的滤波器应用于输入数据，从而生成一个**特征图**，其中包含指示图像中检测到的特征位置和强度的激活信息。\n\n![](img/527966_1_En_5_Fig8_HTML.jpg)\n\
    \n模型图展示了用于图像分类的 `CNN` 示例。它从输入开始，经过包含卷积和 `ReLU`、池化、卷积和 `ReLU` 以及池化的特征学习阶段，最后以包含展平、全连接和\
    \ `softmax` 的分类阶段结束。\n\n**图 5-8**  \n用于图像分类的 `CNN` 示例\n\n### 循环神经网络（RNN）\n\n卷积神经网络是图像分类的首选人工神经网络，而循环神经网络（`RNN`）则是常用于序列或时间问题的一类\
    \ `ANN`，包括自然语言处理、语言翻译、语音识别和预测。\n\n与前馈网络（如 `CNN`）类似，`RNN` 利用输入/训练数据进行学习，节点之间的连接形成有向图，但这次是沿着时间序列进行的。这使得\
    \ `RNN` 能够解决前馈网络在序列数据上的固有弱点，即当输入的顺序很重要时。\n\n因此，`RNN` 以其“记忆”能力而著称，因为它们会利用先前输入的信息来影响当前的输入层和输出。实际上，**隐藏状态**用于将相关信息从一个输入项传递到序列中的其他项。或者换句话说，如下方图表所示，循环神经网络的输出取决于序列中的先前元素。\n\
    \n循环神经网络是 Alexa、Siri、语音搜索和 Google 翻译等流行应用背后的 `ANN` 架构。高精度、工业规模的循环神经网络（`RNN`）在**预测**方面也日益超越传统方法，特别是专门的**长短期记忆网络（`LSTM`）**。\n\
    \n![](img/527966_1_En_5_Fig9_HTML.jpg)\n\n模型图展示了循环神经网络中的隐藏状态。它包含因子 `h`、`w`、`x`\
    \ 和 `y`，重复 `n` 次。\n\n**图 5-9**  \n循环神经网络中的“隐藏状态”\n\n#### 长短期记忆（LSTM）网络\n\n`LSTM`\
    \ 是一种循环神经网络，能够学习序列预测问题中的顺序依赖性。^(⁶⁸) `LSTM` 与更通用的循环神经网络的区别在于，它们能够存储重要的过去信息，并遗忘不重要的信息。\n\
    \n长短期记忆网络的内部“门”实际上使 `LSTM` 能够学习比普通 `RNN` 长得多的长期依赖关系。标准 `RNN` 在时间延迟超过 5 到 10 个离散时间步长时无法学习，而\
    \ `LSTM` 通过强制保持误差流恒定，可以学习跨越超过 1000 个离散时间步长的最小时间延迟。\n\n`LSTM` 通常用于（时间序列）预测，也用于语音识别和翻译，因为它们能够学习更复杂的语法关系。\n\
    \n![](img/527966_1_En_5_Fig10_HTML.jpg)\n\n模型图展示了长短期记忆网络。它包含 3 个 sigma 和 1 个 `tanh`\
    \ 输入。\n\n**图 5-10**  \n`LSTM` 架构\n\n### 其他类型的神经网络\n\n卷积神经网络和循环神经网络被用作深度学习架构，用于训练监督学习问题，即我们拥有预标注数据（例如分类后的图像或用于预测的收盘股价）的情况。这是我们本节末尾第一个动手练习的重点。\n\
    \n在此之前，我们将快速了解其他通常用于解决无监督深度学习问题的架构。这些包括**受限玻尔兹曼机（`RBM`）**、**深度信念网络（`DBN`）**、**深度玻尔兹曼机（`DBM`）**，以及**自编码器、变分自编码器**和**生成对抗网络**。自编码器将在本节第二个动手实验室中讨论。\n"
- fmt: "### Restricted Boltzmann Machines (RBMs)\n\nRBMs are generative, stochastic\
    \ two-layered artificial neural networks which learn a probability distribution\
    \ over a set of inputs. There are only two types of neurons, hidden (`h` in diagram)\
    \ and visible (`v` in diagram), all of which are connected to each other. There\
    \ are no output nodes.\n\nWhereas Boltzmann Machines have connections between\
    \ input nodes, Restricted Boltzmann Machines are a special class with restricted\
    \ connections between the visible and the hidden units. This allows for more efficient\
    \ training using gradient-based contrastive divergence algorithms.\n\nIn general,\
    \ RBMs are less frequently used today as the time needed to calculate probabilities\
    \ is significantly slower than the backpropagation algorithm. Generative Adversarial\
    \ Networks (GANs) or Variational Autoencoders are preferred, both of which are\
    \ discussed below.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig11_HTML.jpg)\n\
    \nA model diagram illustrates the Boltzmann machine versus the restricted Boltzmann\
    \ machine. It has two units visible and hidden units that are interconnected.\n\
    \nFigure 5-11: Boltzmann machine vs. restricted Boltzmann machine\n\n### Deep\
    \ Belief Networks (DBNs)\n\nIf we stack Restricted Boltzmann Machines then fine-tune\
    \ using gradient descent and back-propagation, then we have a Deep Belief Network.\
    \ Essentially stacked layers of RBMs, the top two layers have undirected connections\
    \ while lower layers are directed.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig12_HTML.jpg)\n\
    \nA model diagram illustrates Deep Belief Network. It has two layers; the upper\
    \ layer has an undirected connection and the lower layer has a directed connection.\n\
    \nFigure 5-12: Deep Belief Network (DBN)\n\n### Deep Boltzmann Machines (DBMs)\n\
    \nA Deep Boltzmann Machine (DBM) is an undirected probabilistic graphical model\
    \ with multiple layers of hidden random variables.\n\nLike Deep Belief Networks,\
    \ DBMs can learn complex and abstract internal representations of the input in\
    \ tasks such as object or speech recognition. However in contrast to DBNs, training\
    \ and inference processes are done in both directions, bottom-up and top-down,\
    \ which allows DBMs to better interpret input data/features.\n\nThe learning process\
    \ in Deep Boltzmann Machine can be slow, limiting their performance potential\
    \ and functionality.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig13_HTML.jpg)\n\
    \nA model diagram illustrates the Deep Boltzmann Machines (DBM) Example. It has\
    \ 3 layers that comprise `h1^3`, `h2^3`, and `h3^3`. The last and fourth layer\
    \ comprises `V1`, `V2`, and `V3`.\n\nFigure 5-13: Deep Boltzmann Machines (DBM)\
    \ Example\n\n### Autoencoders\n\nAn autoencoder neural network is a type of feedforward\
    \ neural network. Specifically, it's an unsupervised learning algorithm that applies\
    \ backpropagation and sets the target values to be equal to the inputs. Autoencoders\
    \ are one component of OpenAI's exciting DALL-E Generative AI model which we will\
    \ take a look at in a hands-on lab in Chapter [8](#527966_1_En_8_Chapter.xhtml).\n\
    \nAutoencoders compress the input into a lower-dimensional code then reconstruct\
    \ the output from this representation. Architecturally they consist of three components:\
    \ an encoder, code, and a decoder. The encoder compresses the input and produces\
    \ the code while the decoder then reconstructs the input from the code as shown\
    \ in Figure [5-13](#527966_1_En_5_Chapter.xhtml#Fig13).\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig14_HTML.jpg)\n\
    \nA model diagram illustrates the reconstruction of the image using an Autoencoder.\
    \ Original input is given to Encoder that gives output as a compressed representation\
    \ which is further sent to Decoder and lastly reconstructed image is received.\n\
    \nFigure 5-14: Reconstructed image using an Autoencoder (Source: keras.io)\n\n\
    Variational autoencoders (VAE) are an improvised version of autoencoders. Like\
    \ autoencoders they are unsupervised artificial neural networks that learn how\
    \ to efficiently compress and encode data.\n\nWhere they differ is in the output\
    \ of the encoder – an autoencoder (AE) outputs a vector whereas a VAE outputs\
    \ parameters of a probability distribution for every input.\n\n### Generative\
    \ Adversarial Networks\n\nGenerative Adversarial Networks, or GANs, are the technology\
    \ behind Deepfakes. They create synthetic images and use generative modeling,\
    \ auto-discovering/learning regularities/patterns in input data.\n\nA GAN model\
    \ is applied to generate/output completely new examples that are “credible” in\
    \ comparison with the original dataset.\n\nAlthough they employ unsupervised deep\
    \ learning, building a Generative Adversarial Network is partly “framed” as a\
    \ supervised deep learning problem. The underlying generator and discriminator\
    \ submodels are trained together, with the generator generating a batch of samples\
    \ which are then passed with a real dataset to the discriminator for classification.\
    \ Because of the reliance on a real dataset in the discriminator model, the training\
    \ process is benchmarked on a “supervised loss.” The two models (generative and\
    \ discriminator) are trained together in a zero-sum, adversarial game.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig15_HTML.jpg)\n\
    \nA flow diagram illustrates a Generative Adversarial Network. It starts from\
    \ a Random input vector passing through the Generator model to Discriminator Model\
    \ to the Binary Classification Real/Fake.\n\nFigure 5-15: Generative Adversarial\
    \ Network – Modeling Process\n\n### A Simple Deep Learning Solution – MNIST: Hands-on\
    \ Practice\n\nA FIRST LOOK AT THE DEEP LEARNING MODELING PROCESS\n\nThe MNIST\
    \ (Modified National Institute of Standards and Technology) handwritten digits\
    \ dataset is a standard dataset used in computer vision and deep learning.\n\n\
    Consisting of 60,000 small square 28×28 pixel grayscale images of handwritten\
    \ single digits between 0 and 9, it's great as a basis for learning and practicing\
    \ how to develop, evaluate, and use convolutional deep learning neural networks\
    \ for image classification.\n\nAs such, the goal of this exercise is to implement\
    \ a Convolutional Neural Network in Python (with Google Colab) to correctly identify\
    \ (classify) the handwritten numbers.\n\n1.  Clone the GitHub repo below:\n\n\
    \    [`https://github.com/bw-cetech/apress-5.3.git`](https://github.com/bw-cetech/apress-5.3.git)\n\
    \n2.  Import the notebook to Google Colab. Colab has better support for TensorFlow\
    \ (no install!) so it’s easier to run the notebook.\n\n3.  Take a look at the\
    \ Table of Contents on the RHS panel, showing each part of the modeling process\
    \ from Data Import through EDA, Data Wrangling, Building and Running the Neural\
    \ Network, and Performance Benchmarking.\n\n4.  Try to complete the exercises\
    \ first before looking at the solutions as you progress through the notebook.\n\
    \n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig16_HTML.jpg)\n\nAn image illustrates\
    \ the Modified National Institute of Standards and Technology dataset. It has\
    \ 6 numbers 5, 0, 4, 1, 9, 2, 1, 3, and 1.\n\nFigure 5-16: MNIST dataset"
  raw: "#### Restricted Boltzmann Machines (RBMs)\n\nRBMs are generative, stochastic\
    \ two-layered artificial neural networks which learn a probability distribution\
    \ over a set of inputs. There are only two types of neurons, hidden (h in diagram)\
    \ and visible (v in diagram), all of which are connected to each other. There\
    \ are no **output nodes.**\n\nWhereas Boltzmann Machines have connections between\
    \ input nodes, Restricted Boltzmann Machines are a special class with restricted\
    \ connections between the visible and the hidden units. This allows for more efficient\
    \ training using gradient-based contrastive divergence algorithms.\n\nIn general,\
    \ RBMs are less frequently used today as the time needed to calculate probabilities\
    \ is significantly slower than the backpropagation algorithm. Generative Adversarial\
    \ Networks (GANs) or Variational Autoencoders are preferred, both of which are\
    \ discussed below.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig11_HTML.jpg)\n\
    \nA model diagram illustrates the Boltzmann machine versus the restricted Boltzmann\
    \ machine. It has two units visible and hidden units that are interconnected.\n\
    \nFigure 5-11\n\nBoltzmann machine vs. restricted Boltzmann machine\n\n#### Deep\
    \ Belief Networks (DBNs)\n\nIf we stack Restricted Boltzmann Machines then fine-tune\
    \ using **gradient descent** and **back-propagation**, then we have a Deep Belief\
    \ Network. Essentially stacked layers of RBMs, the top two layers have undirected\
    \ connections while lower layers are directed.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig12_HTML.jpg)\n\
    \nA model diagram illustrates Deep Belief Network. It has two layers; the upper\
    \ layer has an undirected connection and the lower layer has a directed connection.\n\
    \nFigure 5-12\n\nDeep Belief Network (DBN)\n\n#### Deep Boltzmann Machines (DBMs)\n\
    \nA Deep Boltzmann Machine (DBM) is an **undirected** probabilistic graphical\
    \ model with multiple layers of hidden random variables.\n\nLike Deep Belief Networks,\
    \ DBMs can **learn complex and abstract internal representations** of the input\
    \ in tasks such as object or speech recognition. However in contrast to DBNs,\
    \ training and inference processes are done in both directions, bottom-up and\
    \ top-down, which allows DBMs to better interpret input data/features.\n\nThe\
    \ learning process in Deep Boltzmann Machine can be slow, limiting their performance\
    \ potential and functionality.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig13_HTML.jpg)\n\
    \nA model diagram illustrates the Deep Boltzmann Machines (DBM) Example. It has\
    \ 3 layers that comprise h1superscript 3, h2 superscript 3, and h3 superscript\
    \ 3\\. The last and fourth layer comprises V1, V2, and V3.\n\nFigure 5-13\n\n\
    Deep Boltzmann Machines (DBM) Example\n\n#### Autoencoders\n\nAn autoencoder neural\
    \ network is a type of feedforward neural network. Specifically, it's an **unsupervised\
    \ learning algorithm** that applies backpropagation and sets the target values\
    \ to be equal to the inputs. Autoencoders are one component of OpenAI's exciting\
    \ DALL-E Generative AI model which we will take a look at in a hands-on lab in\
    \ Chapter [8](#527966_1_En_8_Chapter.xhtml).\n\nAutoencoders compress the input\
    \ into a lower-dimensional code then reconstruct the output from this representation.\
    \ Architecturally they consist of three components: an encoder, code, and a decoder.\
    \ The encoder compresses the input and produces the code while the decoder then\
    \ reconstructs the input from the code as shown in Figure [5-13](#527966_1_En_5_Chapter.xhtml#Fig13).\n\
    \n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig14_HTML.jpg)\n\nA model diagram\
    \ illustrates the reconstruction of the image using an Autoencoder. Original input\
    \ is given to Encoder that gives output as a compressed representation which is\
    \ further sent to Decoder and lastly reconstructed image is received.\n\nFigure\
    \ 5-14\n\nReconstructed image using an Autoencoder (Source: keras.io)\n\nVariational\
    \ autoencoders (VAE) are an improvised version of autoencoders. Like autoencoders\
    \ they are unsupervised artificial neural networks that learn how to efficiently\
    \ compress and encode data\n\nWhere they differ is in the output of the encoder\
    \ – an autoencoder (AE) outputs a vector whereas a VAE outputs parameters of a\
    \ **probability distribution** for every input.\n\n#### Generative Adversarial\
    \ Networks\n\nGenerative Adversarial Networks, or GANs, are the technology behind\
    \ Deepfakes. They create synthetic images and use generative modeling, auto-discovering/learning\
    \ regularities/patterns in input data.\n\nA GAN model is applied to generate/output\
    \ completely new examples that are “credible” in comparison with the original\
    \ dataset.\n\nAlthough they employ unsupervised deep learning, building a Generative\
    \ Adversarial Network is partly “framed” as a supervised deep learning problem.\
    \ The underlying generator and discriminator submodels are trained together, with\
    \ the generator generating a batch of samples which are then passed with a real\
    \ dataset to the discriminator for classification. Because of the reliance on\
    \ a real dataset in the discriminator model, the training process is benchmarked\
    \ on a “supervised loss.” The two models (generative and discriminator) are trained\
    \ together in a zero-sum, adversarial game.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig15_HTML.jpg)\n\
    \nA flow diagram illustrates a Generative Adversarial Network. It starts from\
    \ a Random input vector passing through the Generator model to Discriminator Model\
    \ to the Binary Classification Real/Fake.\n\nFigure 5-15\n\nGenerative Adversarial\
    \ Network – Modeling Process\n\n### A Simple Deep Learning Solution – MNIST: Hands-on\
    \ Practice\n\nA FIRST LOOK AT THE DEEP LEARNING MODELING PROCESS\n\n**The MNIST\
    \ (Modified National Institute of Standards and Technology****) handwritten digits\
    \ dataset is a standard dataset used in computer vision and deep learning.**\n\
    \n**Consisting of 60,000 small square 28×28 pixel grayscale images of handwritten\
    \ single digits between 0 and 9, it's great as a basis for learning and practicing\
    \ how to develop, evaluate, and use convolutional deep learning neural networks\
    \ for image classification.**\n\n**As such, the goal of this exercise is to implement\
    \ a Convolutional Neural Network in Python (with Google Colab) to correctly identify\
    \ (classify) the handwritten numbers.**\n\n1.  Clone the GitHub repo below:\n\n\
    \    [`https://github.com/bw-cetech/apress-5.3.git`](https://github.com/bw-cetech/apress-5.3.git)\n\
    \n2.  Import the notebook to Google Colab. Colab has better support for TensorFlow\
    \ (no install!) so it’s easier to run the notebook\n\n3.  Take a look at the Table\
    \ of Contents on the RHS panel, showing each part of the modeling process from\
    \ Data Import through EDA, Data Wrangling, Building and Running the Neural Network,\
    \ and Performance Benchmarking\n\n4.  Try to complete the exercises first before\
    \ looking at the solutions as you progress through the notebook\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig16_HTML.jpg)\n\
    \nAn image illustrates the Modified National Institute of Standards and Technology\
    \ dataset. It has 6 numbers 5, 0, 4, 1, 9, 2, 1, 3, and 1.\n\nFigure 5-16\n\n\
    MNIST dataset"
  trans: "\n### 受限玻尔兹曼机（RBM）\n\n受限玻尔兹曼机是一种生成式、随机的两层人工神经网络，它学习一组输入上的概率分布。其中只有两种神经元：隐藏神经元（图中标记为`h`）和可见神经元（图中标记为`v`），所有神经元之间相互连接。没有输出节点。\n\
    \n玻尔兹曼机在输入节点之间存在连接，而受限玻尔兹曼机则是一种特殊类别，其可见单元和隐藏单元之间的连接受到限制。这使得使用基于梯度的对比散度算法进行更高效的训练成为可能。\n\
    \n总的来说，由于计算概率所需的时间明显慢于反向传播算法，如今 RBM 的使用频率较低。目前更倾向于使用生成对抗网络（GAN）或变分自编码器，这两种方法将在下文讨论。\n\
    \n![](img/527966_1_En_5_Fig11_HTML.jpg)\n\n模型图展示了玻尔兹曼机与受限玻尔兹曼机的对比。它包含两个相互连接的单元：可见单元和隐藏单元。\n\
    \n图 5-11：玻尔兹曼机与受限玻尔兹曼机\n\n### 深度信念网络（DBN）\n\n如果我们堆叠受限玻尔兹曼机，然后使用梯度下降和反向传播进行微调，就得到了深度信念网络。本质上，DBN\
    \ 是堆叠的 RBM 层，其顶部两层具有无向连接，而较低层则是有向连接。\n\n![](img/527966_1_En_5_Fig12_HTML.jpg)\n\
    \n模型图展示了深度信念网络。它包含两层：上层具有无向连接，下层具有有向连接。\n\n图 5-12：深度信念网络（DBN）\n\n### 深度玻尔兹曼机（DBM）\n\
    \n深度玻尔兹曼机（DBM）是一种具有多层隐藏随机变量的无向概率图模型。\n\n与深度信念网络类似，DBM 可以在诸如物体或语音识别等任务中学习输入数据的复杂且抽象的内部表示。然而，与\
    \ DBN 不同的是，DBM 的训练和推理过程是双向进行的（自底向上和自顶向下），这使得 DBM 能够更好地解释输入数据/特征。\n\n深度玻尔兹曼机的学习过程可能很慢，这限制了其性能潜力和功能。\n\
    \n![](img/527966_1_En_5_Fig13_HTML.jpg)\n\n模型图展示了深度玻尔兹曼机（DBM）示例。它包含三层，分别由`h1³`、`h2³`和`h3³`组成。最后一层（第四层）由`V1`、`V2`和`V3`组成。\n\
    \n图 5-13：深度玻尔兹曼机（DBM）示例\n\n### 自编码器\n\n自编码器神经网络是一种前馈神经网络。具体来说，它是一种无监督学习算法，应用反向传播并将目标值设置为等于输入值。自编码器是\
    \ OpenAI 令人兴奋的 DALL-E 生成式 AI 模型的一个组成部分，我们将在第 8 章的动手实验中对其进行探讨。\n\n自编码器将输入压缩成低维编码，然后根据该表示重建输出。从架构上看，它们由三个组件组成：编码器、编码和解码器。编码器压缩输入并生成编码，而解码器则根据编码重建输入，如图\
    \ 5-13 所示。\n\n![](img/527966_1_En_5_Fig14_HTML.jpg)\n\n模型图展示了使用自编码器重建图像的过程。原始输入被送入编码器，输出为压缩表示，该表示进一步被送入解码器，最后得到重建的图像。\n\
    \n图 5-14：使用自编码器重建的图像（来源：keras.io）\n\n变分自编码器（VAE）是自编码器的改进版本。与自编码器一样，它们也是无监督的人工神经网络，学习如何高效地压缩和编码数据。\n\
    \n它们的不同之处在于编码器的输出——自编码器（AE）输出一个向量，而 VAE 则为每个输入输出一个概率分布的参数。\n\n### 生成对抗网络\n\n生成对抗网络（GAN）是深度伪造（Deepfakes）背后的技术。它们创建合成图像，并使用生成式建模，自动发现/学习输入数据中的规律/模式。\n\
    \nGAN 模型用于生成/输出与原始数据集相比“可信”的全新样本。\n\n尽管它们采用无监督深度学习，但构建生成对抗网络在一定程度上被“框架化”为一个监督式深度学习问题。底层的生成器和判别器子模型被一起训练，生成器生成一批样本，然后与真实数据集一起传递给判别器进行分类。由于判别器模型依赖于真实数据集，训练过程以“监督损失”为基准。这两个模型（生成器和判别器）在一个零和的对抗博弈中一起训练。\n\
    \n![](img/527966_1_En_5_Fig15_HTML.jpg)\n\n流程图展示了生成对抗网络。它从随机输入向量开始，经过生成器模型，再到判别器模型，最后进行二元分类（真实/伪造）。\n\
    \n图 5-15：生成对抗网络——建模过程\n\n### 一个简单的深度学习解决方案——MNIST：动手实践\n\n深度学习建模过程初探\n\nMNIST（改进的国家标准与技术研究所）手写数字数据集是计算机视觉和深度学习中使用的标准数据集。\n\
    \n它包含 60,000 张 28×28 像素的方形灰度图像，图像内容是 0 到 9 之间的单个手写数字。该数据集非常适合作为基础，用于学习和练习如何开发、评估和使用卷积深度学习神经网络进行图像分类。\n\
    \n因此，本练习的目标是使用 Python（配合 Google Colab）实现一个卷积神经网络，以正确识别（分类）手写数字。\n\n1.  克隆以下 GitHub\
    \ 仓库：\n\n    [`https://github.com/bw-cetech/apress-5.3.git`](https://github.com/bw-cetech/apress-5.3.git)\n\
    \n2.  将笔记本导入 Google Colab。Colab 对 TensorFlow 有更好的支持（无需安装！），因此更容易运行笔记本。\n\n3. \
    \ 查看右侧面板上的目录，其中显示了建模过程的每个部分，从数据导入到 EDA、数据整理、构建和运行神经网络，以及性能基准测试。\n\n4.  在浏览笔记本的过程中，先尝试完成练习，然后再查看解决方案。\n\
    \n![](img/527966_1_En_5_Fig16_HTML.jpg)\n\n图像展示了改进的国家标准与技术研究所数据集。它包含 6 个数字：5、0、4、1、9、2、1、3\
    \ 和 1。\n\n图 5-16：MNIST 数据集\n"
- fmt: "### Autoencoders in Keras: Hands-on Practice\n\nUNSUPERVISED DEEP LEARNING\n\
    \n**Our follow-up lab in this section explores Unsupervised Deep Learning using\
    \ the MNIST Fashion dataset.** The idea is to leverage the encoder, code and decoder\
    \ architecture of an autoencoder to effectively “re-construct” specific images\
    \ for a given class (here articles of clothing but the code is easily adapted\
    \ to other image sets):\n\n1.  Clone the GitHub repo below:\n\n    [`https://github.com/bw-cetech/apress-5.3b.git`](https://github.com/bw-cetech/apress-5.3b.git)\n\
    \n2.  Import and run the notebook in Colab\n\n3.  Run through the notebook and\
    \ built-in exercises\n    1.  Perform EDA\n    2.  Normalize image data\n    3.\
    \  Add noise to the images for a more generalizable model\n    4.  Build and configure\
    \ the model\n    5.  Reducing image noise and reconstruct images using the trained\
    \ autoencoder\n\n4.  Compare runtime using Colab GPU runtime vs. a normal (CPU)\
    \ runtime\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig17_HTML.jpg)\n\n\
    A model diagram illustrates Autoencoder: Encoder-Decoder model. It comprises an\
    \ interconnected network with input, hidden, and output.\n\n**Figure 5-17** Autoencoder:\
    \ Encoder-Decoder model\n\n## Deep Learning Tools\n\nBefore proceeding to how\
    \ to implement an artificial neural network in Python, let's take a look at some\
    \ of the main libraries and tools required to support Deep Learning.\n\n### Tools\
    \ for Deep Learning\n\nAny cursory glance at the latest [TIOBE Programming Community\
    \ index](https://www.tiobe.com/tiobe-index/) shows continuing Python popularity\
    \ and as of June 2022 it is still the number 1 software programming language.\n\
    \nAs the “go-to” programming language for Machine and Deep Learning, investment\
    \ in key integration with all the main Deep Learning libraries and APIs is central\
    \ to the development pathway as is strong functionality and features for data\
    \ mining, particularly with the main data wrangling library, `Pandas`.\n\nGiven\
    \ programming AI in Python is the theme of this book and we have already covered\
    \ several hands-on Python labs, we assume a certain amount of knowledge of the\
    \ language already. The rest of this section is concerned with the open-sourced\
    \ tools we need to build neural networks with convolutional layers or recurrent\
    \ loops and simplify the deep learning process.\n\n### TensorFlow\n\nThe favorite\
    \ tool of many industry professionals and researchers, `TensorFlow` is an end-to-end\
    \ deep learning framework developed by Google and released as open source in 2015.\n\
    \nThough well-documented with training support, scalable production and deployment\
    \ options, multiple abstraction levels, and support for different platforms (such\
    \ as Ubuntu, Android, and iOS), `TensorFlow` is a complex low-level programming\
    \ language, coding of which on its own is not massively intuitive to Data Scientists.\n\
    \nA focus in the last 5-10 years on `TensorFlow` development means that accelerated\
    \ improvements in research, flexibility, and speed have led to uptake by many\
    \ of the major brands and corporations recognized today, including Airbnb, Coca\
    \ Cola, GE, and Twitter.\n\nNo longer just the low-level language, Google improved\
    \ integration with Python runtime in its last major (`TensorFlow 2.0`) release\
    \ in 2019. Today’s `TensorFlow` ecosystem encompasses Python, JavaScript (`TensorFlow.js`),\
    \ and mobile (`TensorFlow Lite`) development as well as `TensorFlow Extended (TFX)`\
    \ for ML Production Pipelines/deployment, `TensorBoard` for model and results\
    \ visualisation and `TensorFlow Hub` for pretrained models.\n\nThere are multiple\
    \ ways and IDEs in which to install and import `TensorFlow`, but in this book\
    \ we will use what we consider is by far the easiest – Google Colab. Because of\
    \ its linkage to its creator, enhanced user workflow and `TensorFlow` support\
    \ on Colab means we can just simply import `TensorFlow` as a library without installing\
    \ the code. Colab also comes with GPU support, important for accelerating, scaling,\
    \ and productionizing Deep Learning models.\n\n### Keras\n\nDeveloped by MIT,\
    \ `Keras` was open-sourced in 2015 to address the challenges around ease of use\
    \ coding deep learning model training and inference in less user-friendly “back-end’\
    \ languages, such as the syntax used in `TensorFlow`, `Theano`, and `CNTK`,^([^(69)](#fn69))\
    \ the latter two of which are now deprecated.\n\nA high-level, modular and extensible\
    \ API written in Python focused on fast experimentation, `Keras` is the high-level\
    \ API of `TensorFlow 2` and the most used Deep Learning framework among top-5\
    \ winning teams on Kaggle.\n\nIt’s “drag-and-drop” style of programming maintains\
    \ back-end linkage to `TensorFlow` and accelerates the design, fit, evaluation,\
    \ and use of deep learning models to make predictions in a few lines of code.\n\
    \nThe actual implementation of the `Keras` API on `TensorFlow` is codified as\
    \ `tf.keras` with set up in Python is simple:\n\n```python\nimport numpy as np\n\
    import tensorflow as tf\nfrom tf import keras\n```\n\nThe core data structures\
    \ of `Keras` are `layers` and `models` with the simplest type of model a `sequential\
    \ model`, a linear stack of layers. We will discuss these layers and the implementation\
    \ of a deep learning model in `Keras` more in the following section of this chapter.\n\
    \n### PyTorch\n\n`PyTorch` is the last of the main Deep Learning “tools” we will\
    \ cover in this book and is predominantly used for Deep Learning with Natural\
    \ Language Processing.^([^(70)](#fn70))\n\nDeveloped by Facebook’s AI research\
    \ group and open-sourced on GitHub in 2017, `PyTorch` claims to be simple and\
    \ easy to use and flexible, as well as possessing efficient memory usage with\
    \ dynamic computational graphs. `PyTorch` is faster and has excellent debugging\
    \ support, however claims to be easier to use should be taken with a pinch of\
    \ salt– it is a low-level language. `PyTorch` integration with a simpler DL framework\
    \ like `Keras` does not yet exist although `PyTorch Lightning` as a lightweight\
    \ wrapper providing a high-level interface to `PyTorch` may come into its own\
    \ as an alternative in the coming years.\n\nIn this author’s opinion, implementation\
    \ of `PyTorch` is easier using Jupyter Notebook on Windows. We will install `PyTorch`\
    \ using the one-off shell command (directly in a cell in a Jupyter notebook):\n\
    \n```bash\n%pip install torch\n```\n\nAfter commenting out the above Python code\
    \ line, the installation can then be verified by running the sample `PyTorch`\
    \ code:\n\n```python\nimport torch\nx = torch.rand(5, 3)\nprint(x)\n```\n\nwhere,\
    \ if successful, a random tensor output should be displayed on the screen."
