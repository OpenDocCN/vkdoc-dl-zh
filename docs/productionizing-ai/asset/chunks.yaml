  trans: '

    ### 玩转 Docker：动手实践


    #### 玩转 DOCKER


    既然我们已经介绍了 CI/CD 环境中的容器和 Docker，接下来让我们看看如何使用 Play With Docker（支持 4 小时免费使用）将一个简单应用容器化的过程：


    1.  在 [`https://hub.docker.com/`](https://hub.docker.com/) 注册 Docker 账号

    2.  注册并验证邮箱后，登录 Play with Docker：[`https://labs.play-with-docker.com/`](https://labs.play-with-docker.com/)

    3.  屏幕打开后，选择“添加新实例”

    4.  Play With Docker 屏幕上应会打开一个嵌入式终端


    ![](img/527966_1_En_2_Fig17_HTML.jpg)


    窗口页面截图，Docker 游乐场展示了一个嵌入式终端。页面左侧提供了“添加新实例”和“关闭会话”选项


    图 2-17


    玩转 Docker


    1.  在 PWD 终端中输入以下命令：


    ```

    docker run -dp 80:80 docker/getting-started:pwd

    ```


    这将启动一个容器——点击端口 80 即可打开它


    **注意：请使用“ctrl + shift + V”将命令粘贴到 Docker 命令行界面（CLI）中**


    1.  该容器是一个 Docker 入门教程。^(³⁷) 请完成教程直至第一部分“我们的应用”结束，该部分将引导你构建一个“待办事项列表”应用


    **注意：在构建应用的容器镜像（创建 Dockerfile）时，请使用以下命令：**


    1.  练习——完成教程的下一部分“更新我们的应用”，了解如何修改已容器化应用的消息和行为

    2.  练习——完成“分享我们的应用”部分，了解如何使用 Docker Hub 上的 Docker 注册表分享 Docker 镜像


    ```

    touch Dockerfile

    ```


    ### 测试、性能评估与监控


    本章的最后一部分将探讨数据/MLOps 环境中的自动化测试、性能评估和应用监控。


    #### Selenium


    Selenium 创建于 2004 年，用于自动化 Web 应用的测试操作，是一个支持跨浏览器和跨平台测试的自动化框架，并支持多种语言（Java、C#、Python）。与
    DataOps 生态系统中的许多工具一样，它是免费且开源的。


    Selenium 不仅是一个单一工具，而是一个软件套件，可根据特定组织的质量保证（QA）需求进行定制，并支持涉及数据管道和分析的重要 DataOps 单元测试流程^(³⁸)。单元测试完成后，持续集成开始，QA
    测试人员能够创建测试用例和测试套件，用于逻辑分组的测试用例，包括传输中数据和静态数据。


    在 Jenkins 中运行 Selenium 测试允许用户：(a) 每次软件变更时运行测试；(b) 测试通过后将软件部署到新环境。Jenkins 还可以安排
    Selenium 测试在特定时间运行，并保存执行历史记录和测试报告。


    ![](img/527966_1_En_2_Fig18_HTML.jpg)


    流程图展示了 Jenkins、Maven 和 Selenium 的过程接口。该过程从触发 Jenkins 构建开始，还包括显示测试报告。


    图 2-18


    Jenkins、Maven 和 Selenium 过程接口


    #### TestNG


    Selenium 测试脚本可与 TestNG（下一代测试）配合使用——这是一个测试框架，解决了 Selenium Webdriver 中的报告缺口，可在执行后生成默认的
    HTML 报告。这些报告（如下所示）标识了测试用例的信息（如通过、跳过或失败）以及项目的整体状态。


    ![](img/527966_1_En_2_Fig19_HTML.jpg)


    窗口页面展示了 TestNG 报告。该报告显示了测试用例的信息，包括通过、失败、跳过、时间、包含组和排除组。


    图 2-19


    TestNG 报告


    #### 问题管理


    问题管理与问题追踪允许项目经理、用户或开发人员记录并跟进数据项目中的问题进度，捕获缺陷、错误、功能请求和客户投诉。问题追踪标准通常包括：


    *   重要程度

    *   分配的团队成员

    *   进度指标


    ![](img/527966_1_En_2_Fig20_HTML.jpg)


    活动完成情况图展示了发布 ID，以及已完成、按时、逾期、延迟和即将到来事项的百分比详情。


    图 2-20


    软件交付发布——问题追踪（Plutora）


    ##### Jira


    Jira 是最流行的问题（工单）追踪和项目管理工具之一，尽管 Trello、GitHub Boards 和 Monday 也被广泛使用。


    Jira 由 Atlassian 开发，已存在多年（2002 年），是一款敏捷项目管理和问题/缺陷追踪工具。它配备了易于使用的仪表板和“无压力”的项目管理功能，包括敏捷交付特性，如团队/用户故事和冲刺监督、Scrum
    和看板面板、路线图以及团队绩效报告。


    ##### ServiceNow


    Jira 与 ServiceNow 集成——这是一个工作流自动化解决方案，用于连接组织内的人员、功能和系统。ServiceNow 的产品独特卖点在于提升客户服务并将员工队伍/员工数字化。


    下图展示了 ServiceNow 如何在 CI/CD 管道中自动化变更请求工作流。


    ![](img/527966_1_En_2_Fig21_HTML.jpg)


    图示展示了使用 ServiceNow 自动化变更请求工作流的过程。该过程涉及分配资源、完成构建和测试、变更审批以及部署。


    图 2-21


    使用 ServiceNow 在 CI/CD 管道中自动化变更请求


    除了明显的自动化生产力优势外，ServiceNow 还通过“AIOps”帮助扩展 IT 能力，跨组织解释遥测数据，并使用机器学习进行例如异常检测等操作。


    ![](img/527966_1_En_2_Fig22_HTML.jpg)


    一组 2 个表示图和 1 个 ServiceNow AIOps 图表展示了遥测数据的收集、噪声的减少以及异常的检测。


    图 2-22


    ServiceNow AIOps – 遥测异常检测

    '
- fmt: "### Monitoring and Alerts\n\nOnce an AI application is fully tested, and a\
    \ process is implemented for managing issues, the focus turns to application monitoring\
    \ – essential in AI due to data changes (data drift) quickly rendering model results\
    \ invalid or suboptimal.\n\nRather than monitoring, the end goal is rather AI\
    \ application \"observability\" – a deeper understanding of data pipelines, and\
    \ data \"health.\" The best systems have tracking, alerting, and recommendation\
    \ features built into the underlying product and statistical process control (SPC)\
    \ constantly monitoring and controlling the data analytics pipelines. If an anomaly\
    \ occurs, analytics teams notified through automated alerts.\n\n`Nagios` (looked\
    \ at below) is one of the most popular application monitoring tools, but `Databand`'s\
    \ observability platform is gaining some traction in `DataOps`. `Databand` supports\
    \ data engineers troubleshoot pipeline failures and data quality issues – the\
    \ ambition is to achieve insight granularity, persistence, automation, ubiquity,\
    \ and timeliness.\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig23_HTML.jpg)\n\
    \nA pyramid framework explains the best practices of data monitoring. It includes\
    \ data access, data trends, data sanity, pipeline latency, and pipeline execution.\n\
    \n**Figure 2-23** Databand Application Monitoring\n\n#### Nagios\n\n`Nagios` monitors\
    \ entire IT infrastructure to ensure systems, applications, services, and business\
    \ processes are functioning properly, with technical staff alerted in the event\
    \ of failure. Even older than `Jira`, `Nagios` was first launched in 1999.\n\n\
    The `Nagios` suite of tools consists of an Enterprise Server and Network Monitoring\
    \ Software (`Nagios XI`), centralized log management, monitoring and analysis\
    \ (`Nagios Log Server`), Infrastructure monitoring (`Nagios Fusion`), and Netflow\
    \ Analysis with Bandwidth Utilization (`Nagios Network Analyzer`).\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig24_HTML.jpg)\n\
    \nA window page of `Nagios XI` exhibits the network status map. It gets updated\
    \ every 10 seconds. Graphs, maps, incident management, and monitoring process\
    \ options are on the left side.\n\n**Figure 2-24** Nagios XI\n\n### Jenkins CI/CD\
    \ and Selenium Test Scripts: Hands-on Practice\n\n**CONTINUOUS TESTING**\n\nAnd\
    \ so to our final lab in this chapter focused on CI/CD and testing, this extensive\
    \ lab introduces readers to `Jenkins` on Azure and running `Selenium` test scripts.\
    \ `Maven` integration is also included as an exercise:\n\n1.  Create A Virtual\
    \ Machine by going to the link below. This will also create a storage resource,\
    \ which may incur a small monthly cost^([^(39)](#fn39))\n\n    [`https://portal.azure.com/#cloudshell/`](https://portal.azure.com/%2523cloudshell/)\n\
    \n2.  Toggle CLI settings to Bash and follow steps 3-9 in the link below\n\n \
    \   [`https://docs.microsoft.com/en-us/azure/developer/jenkins/configure-on-linux-vm`](https://docs.microsoft.com/en-us/azure/developer/jenkins/configure-on-linux-vm)\n\
    \n    **NB** you may want to replace the Azure region (references in `az group\
    \ create` command) to a closer Data Centre\n\n3.  Configure `Jenkins` by following\
    \ the steps in the link above under section 4. Configure Jenkins\n\n4.  Continue\
    \ to 5. Create Your First Job\n\n    **Note** it may take some time at the end\
    \ (10-15 mins) for the project home page to appear\n\n5.  Continue to 6. Build\
    \ the sample Java app\n\n6.  Carry out Selenium Scripting by:\n    1.  Downloading\
    \ Eclipse IDE from [`www.eclipse.org/`](http://www.eclipse.org/). `Eclipse` is\
    \ a popular IDE for Java development.\n    2.  Follow steps 1-7 in this link:\n\
    \        [`https://q-automations.com/2019/06/01/how-run-selenium-tests-in-jenkins-using-maven/`](https://q-automations.com/2019/06/01/how-run-selenium-tests-in-jenkins-using-maven/)\n\
    \    3.  For step 8 above, add all dependencies WITHIN the `<project>` tag\n \
    \   4.  For step 9, the `TestNG` add-in is required which can be downloaded from\
    \ the link: [`https://marketplace.eclipse.org/content/testng-eclipse`](https://marketplace.eclipse.org/content/testng-eclipse)\
    \ and drag and dropped into the Eclipse workspace^([^(40)](#fn40))\n    5.  Complete\
    \ steps 10-13\n\n7.  Exercise – try to push your Selenium script to GitHub. Push\
    \ source code to GitHub first and then connect from Jenkins to repo. **NB** to\
    \ integrate GitHub to Jenkins follow Configuring GitHub and Configuring Jenkins\
    \ steps here: [`www.blazemeter.com/blog/how-to-integrate-your-github-repository-to-your-jenkins-project`](http://www.blazemeter.com/blog/how-to-integrate-your-github-repository-to-your-jenkins-project)\n\
    \n8.  Exercise – for Maven integration, try to follow steps under \"Integrating\
    \ Your Test Into Jenkins\" here [`https://qautomation.blog/2019/06/01/how-run-selenium-tests-in-jenkins-using-maven/`](https://qautomation.blog/2019/06/01/how-run-selenium-tests-in-jenkins-using-maven/)^([^(41)](#fn41))\n\
    \n9.  Exercise – to integrate all three tools: Jenkins, Maven, and Selenium, follow\
    \ steps 1-12 under \"Integrating Your Test Into Jenkins\": [`https://q-automations.com/2019/06/01/how-run-selenium-tests-in-jenkins-using-maven/`](https://q-automations.com/2019/06/01/how-run-selenium-tests-in-jenkins-using-maven/)\
    \ and note the following:\n    1.  For step 6, under Root POM put: `C:\\Users\\\
    [YOUR-NAME]\\eclipse-workspace\\SeleniumScript\\target`\n    2.  Under Goals and\
    \ Options enter below:\n    3.  `test -Dsurefire.suitXmlFiles=\" $TestSuite\"\
    \ -Dbrowser=\"$BROSWER\" -DURL=\"$APP_URL\"`\n    4.  For step 7 you need the\
    \ HTML Publisher plug in. Go to `Manage Jenkins > Manage Plugins`, select `Available`\
    \ tab, type `HTML Publisher` and click check box\n    5.  Download/install now\
    \ and restart Jenkins\n\n    The option to Publish HTML reports should now be\
    \ available under `Build Settings` tab (and `Post Build Actions`) of the Job created\
    \ in step 2 of the q-automations link above.\n\n### Wrap-up\n\nHaving completed\
    \ our last lab on tools and interfaces for continuous testing, we bring an end\
    \ to this chapter on `DataOps`. From Agile development, through code repos, CI/CD,\
    \ testing, and monitoring, the emphasis here has been on understanding stakeholder\
    \ relationships, the end-to-end process, ecosystem of tools, and integration landscape\
    \ in order to \"frame\" our AI solutions later in this book.\n\nOur next chapter\
    \ takes the learning from `DataOps` and applies best practice into one of the\
    \ first (and perhaps most critical) phases of an AI project implementation: data\
    \ ingestion.\n\nFootnotes [1](#527966_1_En_2_Chapter.xhtml#Fn1_source)   [2](#527966_1_En_2_Chapter.xhtml#Fn2_source)\
    \   [3](#527966_1_En_2_Chapter.xhtml#Fn3_source)   [4](#527966_1_En_2_Chapter.xhtml#Fn4_source)\
    \   [5](#527966_1_En_2_Chapter.xhtml#Fn5_source)   [6](#527966_1_En_2_Chapter.xhtml#Fn6_source)\
    \   [7](#527966_1_En_2_Chapter.xhtml#Fn7_source)   [8](#527966_1_En_2_Chapter.xhtml#Fn8_source)\
    \   [9](#527966_1_En_2_Chapter.xhtml#Fn9_source)   [10](#527966_1_En_2_Chapter.xhtml#Fn10_source)\
    \   [11](#527966_1_En_2_Chapter.xhtml#Fn11_source)   [12](#527966_1_En_2_Chapter.xhtml#Fn12_source)\
    \   [13](#527966_1_En_2_Chapter.xhtml#Fn13_source)   [14](#527966_1_En_2_Chapter.xhtml#Fn14_source)\
    \   [15](#527966_1_En_2_Chapter.xhtml#Fn15_source)   [16](#527966_1_En_2_Chapter.xhtml#Fn16_source)\
    \   [17](#527966_1_En_2_Chapter.xhtml#Fn17_source)"
