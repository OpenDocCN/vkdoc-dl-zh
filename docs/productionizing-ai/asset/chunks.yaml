    \ supply-demand data\n        1.  Suppliers\n\n        2.  Manufacturers\n\n \
    \       3.  Warehouses\n\n    2.  **Shiny Data Prep** notebook\n\n    3.  **LSTM\
    \ Demand Forecasts** (not included)\n\n    4.  **Decision Optimizer**: Run a Prescriptive\
    \ Optimization\n        1.  Load in preprepared LSTM Demand Forecasts\n\n    \
    \    2.  Optimize cost to ship parts (from four suppliers to three manufacturers)\
