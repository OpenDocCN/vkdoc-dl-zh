- fmt: "# Graphical Processing Units (GPUs)\n\nWhile `CPU`s (Central Processing Units)\
    \ work well enough for simple models and small datasets, execution time is prohibitive\
    \ for larger datasets. `GPU`s (Graphical Processing Units) have more logical cores\
    \ than `CPU`s and support running concurrent processes instead of one after the\
    \ other. As such, they are especially suited for problems that can be expressed\
    \ as data-parallel computations, such as an AI problem that has many hundreds\
    \ of thousands of parameters.\n\n`GPU`s are more famously utilized in modern multiplayer\
    \ games, but their evolution to handle applications that involve arithmetic on\
    \ large amounts of data has seen all CSPs offering pay-per-use high-performance\
    \ `GPU`s on their cloud platform.\n\nUnder the hood, `GPU`s are generally dependent\
    \ on `CUDA` (Compute Unified Device Architecture) parallel programming developed\
    \ by NVIDIA.\n\n# TensorFlow Processing Units (TPUs)\n\n`TPU`s (TensorFlow Processing\
    \ Units) are Google’s hardware accelerators specialized in deep learning tasks.\n\
    \nTypically used by researchers and developers, they are more expensive than `GPU`s\
    \ but highly optimized for large batches and CNNs. On the whole, they are faster\
    \ and more energy efficient, but for mid-large datasets `GPU`s can still be most\
    \ performant.\n\nParallel processing/computing is a fast-moving area of research\
    \ and development, with all the main high-profile media AI projects (self-driving\
    \ cars, robotics, for example) reliant on the latest technology. Two of interest\
    \ are likely to be competitive in the near future: `DPU`s (data processing units)\
    \ – a new class of programmable processor or “system on a chip” (`SoC`) specializing\
    \ in moving data in data centers, and `FGPA`s (field programmable gate arrays)\
    \ – integrated circuits with a programmable hardware fabric. `FGPA`s are also\
    \ potentially more sustainable due to savings in energy consumption compared with\
    \ (energy-guzzling) `GPU`s.\n\n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig4_HTML.jpg)\n\
    \nAn illustration depicts four parallelization technologies and their features.\
    \ It includes `CPU` (small models and datasets), `GPU` (medium to large models\
    \ and datasets), `TPU` (matrix computations), and `FPGA` (large datasets).\n\n\
    **Figure 7-4** Comparison of latest parallelization technology (Source: inaccel)\n\
    \n# Sharding\n\n`Sharding` is the process of breaking up large tables into smaller\
    \ chunks called shards that are spread across multiple servers.^([^(108)](#fn108))\
    \ A shard is essentially a horizontal data partition that contains a subset of\
    \ the total dataset, and hence is responsible for serving a portion of the overall\
    \ workload.\n\n`Sharding` in Deep Learning is capable of saving over 60% in memory\
    \ and training models twice as large in `PyTorch`.\n\n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig5_HTML.jpg)\n\
    \nA comparative analysis between the unshared table in one database (single server)\
    \ and shared table in three databases (includes server A, server B, and server\
    \ C separately).\n\n**Figure 7-5** Sharding (Source: Oracle)\n\nBefore proceeding\
    \ to our next section and a look at the main software vendors and their ecosystem\
    \ of tools for AI application development, we finish this section with a look\
    \ at creating isolated (virtual) environments for application development and\
    \ some hands-on practice around scripting and working with APIs in Python before\
    \ wrapping up with the use of `GPU`s in Colab.\n\n# Virtual Environments\n\nVirtual\
    \ Environments offer isolated Python package installations for specific apps,\
    \ allowing apps to coexist independently on the same system. Because these are\
    \ self-contained Python (and Python library) installations where an application\
    \ does not share dependencies with any other application, they are particularly\
    \ useful for developing AI solutions.\n\nA virtual environment in Python is created\
    \ using `virtualenv` (or `venv` from Python 3.3+) which includes a Python binary\
    \ and essential tools for package management including `pip`, for installing Python\
    \ libraries. The following hands-on lab describes how to set up a virtual environment\
    \ from terminal.\n\n# Running Python from Terminal: Hands-on Practice\n\n**GETTING\
    \ AWAY FROM NOTEBOOKS – PYTHON SCRIPTING (.PY)**\n\nMany AI applications utilize\
    \ raw Python scripts (`.py` files) instead of Jupyter notebooks. Using standalone\
    \ Python, the goal of this exercise is to get familiar with these scripts, create\
    \ a virtual environment and run the script:\n\n1.  Install a stable release of\
    \ Python from [`www.python.org/downloads/windows/`](https://www.python.org/downloads/windows/)\n\
    2.  Add the path of the installed location on your laptop as a (system) environment\
    \ variable – this will enable both `python` and `pip` (library installer) commands\
    \ to work on terminal\n3.  Create a “test” folder in a suitable location on your\
    \ local directory. Clone the Python script to your local drive from GitHub below:\n\
    \    [`https://github.com/bw-cetech/apress-7.1.git`](https://github.com/bw-cetech/apress-7.1.git)\n\
    4.  On File/Windows Explorer go to the cloned local folder and type `cmd` in the\
    \ pathname to open terminal. Create a virtual environment using the commands below\
    \ (one after the other):\n    ```\n    python -m venv env\n    env\\Scripts\\\
    Activate\n    ```\n5.  Your virtual environment should now be enabled. Run the\
    \ simple game with the command:\n    ```\n    python python-guessing-game.py\n\
    \    ```\n    When finished, close the virtual environment with `deactivate`.\n\
    6.  Stretch exercise – try to run the random walk exercise done in Chapter [5](#527966_1_En_5_Chapter.xhtml)\
    \ (Neural Networks and Deep Learning) as a standalone Python script, after reactivating\
    \ the same virtual environment above. NB for any `ModuleNotFoundError: No module\
    \ named` errors (e.g., `numpy`), run the following command:\n    ```\n    pip\
    \ install numpy\n    ```\n\n# API Web Services and Endpoints: Hands-on Practice\n\
    \n**MACHINE LEARNING FOR CYBERSECURITY DDOS ATTACK**\n\nThe goal of this exercise\
    \ is to deploy, then test/perform inference via an endpoint on a machine learning\
    \ model for detecting cybersecurity (DDoS – Distributed Denial of Service) threats:\n\
    \n1.  Starting from the experiment below trained on labeled network traffic events,\
    \ we deploy a machine learning model from Azure Machine Learning Studio by first\
    \ creating a predictive experiment:\n    [`https://gallery.cortanaintelligence.com/Experiment/Cyber-DDoS-trained-model`](https://gallery.cortanaintelligence.com/Experiment/Cyber-DDoS-trained-model)\n\
    2.  Next we set up an endpoint by deploying the Web Service.\n3.  Finally consume\
    \ the Web Service by invoking the API from Excel. Test using the sample data at\
    \ the GitHub link below. NB the first record is a “teardrop” denial of service\
    \ (DoS) attack, the second record is benign network traffic:\n    [`https://github.com/bw-cetech/apress-7.1b.git`](https://github.com/bw-cetech/apress-7.1b.git)\n\
    4.  Exercise: walk through the model training process as well by following the\
    \ link [`https://gallery.azure.ai/Experiment/e7fb30de726e4e02b034233ec6c34ce4`](https://gallery.azure.ai/Experiment/e7fb30de726e4e02b034233ec6c34ce4).\
    \ Note the training experiment originally used Azure Blob storage links to the\
    \ datasets but as these are no longer supported, now uses instead the training\
    \ `network_intrusion_detection.csv` and test sets `network_intrusion_detection_test.csv`\
    \ at the same GitHub link above.\n5.  Stretch: see if you can beat the model performance\
    \ (AUC = 0.85) by changing the data (or the algorithms) used."
