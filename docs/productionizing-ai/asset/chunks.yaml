    \ increasing IoT sensor data generated across the entire energy supply chain."
  raw: "### Challenges Across Supply Chains\n\n“Supply Chain” is of course not a specific\
    \ vertical industry or sector, rather a means by which many businesses and organizations\
    \ source and deliver their products and services. Planning, logistics, and procurement\
    \ activity within Supply Chain Management (SCM) stretches across multiple industries\
    \ including manufacturing wholesale, distribution and retail, transport (haulier,\
    \ fleet delivery) and oil and gas industries and healthcare and public services.\n\
    \nOrganizations have often struggled with knowledge gaps around use of high-performance,\
    \ sophisticated planning, scheduling, and optimization software but AI Engineers\
    \ and Data Scientists today can employ advances in cloud computing, “visual” machine\
    \ learning^([^(120)](#fn120)) and solver capability coupled with compelling front-end\
    \ design to engage a wider audience within the enterprise. Moreover, today’s AI\
    \ solutions for SCM can help operational staff understand and better manage the\
    \ company’s delivery logistics through finding answers to questions such as\n\n\
    *   How to determine the location and capacity of warehouses\n\n*   Which plant\
    \ should manufacture which product\n\n*   Allocate aircraft and crew to flights\n\
    \n### Predictive Analytics Solutions\n\nBefore taking a look at a niche end-to-end\
    \ solution for Supply Chain Optimization, there are plenty of cases of Predictive\
    \ Analytics implemented in-house to manage key areas across the supply chain.\n\
    \nThese include risk managing vendor/supplier/customer relationships with transactional\
    \ anomaly detection, procurement engines, and fraud detection models, customer\
    \ support solutions like chatbots and IVAs or document search and retrieval, logistics\
    \ using inventory and contract management tools with “Edge AI” solutions to enable\
    \ more granular predictive analytics (e.g., supply/demand matching at local rather\
    \ than regional level) as well as asset optimization and forecasting for specific\
    \ assets and business divisions.\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig13_HTML.png)\n\
    \nAn architecture of predictive analytics solutions. It includes transactional\
    \ anomaly detection, procurement risk engine, fraud detection, inventory management,\
    \ contract management, chatbots, and I V As.\n\nFigure 8-13\n\nSCM Predictive\
