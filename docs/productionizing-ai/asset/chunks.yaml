    critical processes – C3 claims to run 4.8 million AI models and 1.5 billion predictions
    per day.


    #### DataRobot


    DataRobot’s entire business model (and USP) is MLOps automation and “accelerating
    data to value.” The product targets less technical users, for example, Business
    Analysts looking to build predictive analytics with no knowledge of Machine Learning.


    We now move onto have a look at three of the tools covered above in our hands-on
    labs for this section.'
  trans: '

    #### IBM Cloud


    尽管 IBM 可能已不再处于大型科技公司的第一梯队，且`IBM Cloud`也未被列入“三大”云服务提供商之列，但毫无疑问，该公司在创新方面依然保持领先地位，常常在主流市场普及之前就推出新的开发成果和服务。


    IBM 的`Watson`平台自 2011 年在“危险边缘！”问答节目中获胜以来，一直是商业 AI 领域的先驱，并持续推动着 IBM 当前在`IBM Cloud`上提供的一系列
    AI 服务。主要工具如下所示：


    - `WATSON Studio` – 数据科学平台

    - `WATSON Assistant` – 聊天机器人/智能虚拟助手

    - `WATSON Discovery` – 企业级 AI 搜索

    - `WATSON Knowledge Studio` – 特定领域的自然语言处理（NLP）内容整理


    最近，`IBM Cloud Pak® for Data`（`CPDaaS`）已成为 IBM 首选的业务数据与 AI 一体化平台，它通过自动化（`AutoAI`）以及对数据和
    AI 生命周期的治理，将 AI“注入”到应用程序中。


    `Cloud Pak`是一个一站式平台，用于收集、整理和分析数据资产，以进行机器学习和深度学习。它由集成的微服务组成，这些微服务受益于在多节点`Red Hat®
    OpenShift®`集群上运行。`Cloud Pak`提供开放且可扩展的`REST API`，支持混合云和本地资源，并能以“最小化”停机时间实现弹性资源管理。


    #### Heroku


    作为最早的云平台之一，`Heroku`现在归`Salesforce`所有。虽然知名度稍低，但就简洁性和优雅性而言，它是我们最喜欢的平台之一。应用程序可以像在其他主流平台上一样，在云上进行部署、管理和扩展。


    在我们看来，对于快速部署应用程序而言，这是最具成本效益的云平台。免费计划不会强制用户/开发者花费积分来启用机器/深度学习工具，前提是你限制每月的使用量。例如，`Azure
    VMs`和`AWS SageMaker`并非免费，但你可以在`Heroku`上免费部署一个机器学习/深度学习应用。


    模型扩展也很直观——只需为应用程序的每月正常运行时间选择简单的“按需付费”选项。托管模型通过`Heroku`的`dynos`完成——这些是支撑/驱动`Heroku`应用程序的构建块。本质上它们是容器，但每种
    dyno 类型都带有特定数量的集群工作节点（免费/爱好级 dyno 为 1 个集群，标准级为 2 个集群，中性能级为 5 个集群，高性能级为 28 个集群）。


    `Heroku`为我们介绍了可用于构建 AI 解决方案的主要云平台。本节的剩余部分将探讨如何通过基于 Python 的用户界面来为这些解决方案提供前端支持。^(¹¹⁰)


    ### 基于 Python 的用户界面


    下面我们将介绍三种主要的用于创建 Web 应用的 Python 框架。我们将在第 9 章中介绍另一个框架`Streamlit`，它使用简单的 API，支持定义为
    Python 变量的交互式小部件，并且部署速度非常快。^(¹¹¹)


    #### Flask


    `Flask`是一个用 Python 编写的微 Web 框架。


    代码简单、独立但可扩展，非常适合单页应用。`SQLAlchemy`可用于数据库连接，并且`Flask`支持的数据库范围（例如 NoSQL）比`Django`（下文讨论）更广。


    正如我们将在本节后的动手实验中看到的，在安装 Python 用于独立脚本编写以及`Visual Studio Code`之后，推荐的工作流程是从 GitHub
    克隆一个 flask 应用，`cd`进入该应用的本地副本，并使用以下命令创建一个虚拟环境：


    ```

    python -m venv env

    env\Scripts\Activate

    ```


    然后，在虚拟环境中以常规方式安装`Flask`，即：


    ```

    pip install flask

    ```


    #### Dash


    `Dash`将 Python 脚本转换为生产级业务应用。它填补了传统 BI/Tableau/PowerBI/Looker 仪表板中存在的**预测分析空白**，支持复杂的
    Python 分析/商业智能，并构建在`Flask`、`Plotly.js`和`React.js`之上。


    `Dash`还为机器学习和深度学习模型提供了“点击式界面”，极大地简化了为 AI 应用（例如，目标检测和自然语言处理用户界面，如聊天机器人）提供前端支持的过程。


    `pip install dash`命令还会安装许多其他工具：^(¹¹²)


    - `dash_html_components`

    - `dash_core_components`

    - `dash_table`

    - `plotly` 绘图库


    `Dash`的吸引力在于它能够快速封装用户界面 Python 代码；它通过一个包含四个文件（具有类似 HTML 的元素）的文件结构来实现这一点：


    - **布局（Layouts）** – 描述仪表板的外观

    - **组件（Components）** – 组件构成布局，包括`dash_core_components`和`dash_html_components`

    - **回调（Callbacks）** – 控制 Dash 应用的交互性

    - **Bootstrap** – 用于创建交互式和移动端就绪应用的预构建 CSS 框架


    ![](img/527966_1_En_7_Fig10_HTML.jpg)


    屏幕显示了一个包含物联网流数据警报的控制图仪表板。它包括一个过程控制指标摘要、一个实时 SPC 图以及一个按参数显示 OOC 百分比的饼图。


    **图 7-10** 用于物联网流数据警报的 Dash 用户界面


    #### Django


    被 Facebook、Instagram 和 Netflix 使用的`Django`，旨在让开发者能够更轻松、更快速、用更少的代码构建更好的 Web 应用。与`Flask`一样，`Django`是一个用于快速开发
    Web 应用的高级 Python Web 框架，但相比之下，这些应用往往是全尺寸的，并且比更简单的`Flask`有限页面应用更强大。


    `Django`是免费且开源的，拥有一个“功能齐全”的框架，预装了大部分功能。它带有自动化工具以避免重复性任务，以及一个简洁且“务实”的设计，通过简化的三步流程来处理模型更改，从而省去了
    Web 开发中的许多麻烦：


    - 在`models.py`中更改模型

    - 运行`python manage.py makemigrations`为更改创建迁移文件

    - 运行`python manage.py migrate`将这些更改应用到底层数据库


    ### 其他 AI 软件供应商


    在本节中，我们最后来看一些其他 AI 软件供应商，它们各自都能以独特的方式支持 AI 应用的构建。


    #### ONNX（开放神经网络交换格式）


    `ONNX`是一个用于机器学习的开源模型格式和运行时，其平台无关的设计便于在不同框架和硬件平台之间迁移。在大型科技公司占据主导/整合的时代，它的吸引力在于其社区模式和互操作性。


    #### C3


    `C3`是一家 AI 和物联网软件提供商，用于构建企业级 AI 应用。它提供开箱即用/预构建的、针对特定行业的 AI 应用，以优化关键流程——`C3`声称每天运行
    480 万个 AI 模型并执行 15 亿次预测。


    #### DataRobot


    `DataRobot`的整个商业模式（和独特卖点）是 MLOps 自动化以及“加速从数据到价值的转化”。该产品面向技术能力较弱的用户，例如，希望在没有机器学习知识的情况下构建预测分析的业务分析师。


    现在，我们将进入本节动手实验环节，看看上面介绍的三个工具。'
- fmt: "# Introduction to Dash: Hands-on Practice\n\nDEPLOY AN IOT APP WITH DASH\n\
    \nUsing sample **Dash app** boilerplates on GitHub, the goal of this exercise\
    \ is to clone an IoT app’s source code and run it locally. This lab includes a\
    \ number of stretch exercises to edit source code, work with Dash callbacks and\
    \ deploy a Dash app to Heroku to gain further experience with Dash:\n\n1. We are\
    \ going to clone the app shown at the link below:\n\n   [`https://dash-gallery.plotly.host/dash-manufacture-spc-dashboard/`](https://dash-gallery.plotly.host/dash-manufacture-spc-dashboard/)\n\
    \n2. Go to [`https://github.com/dkrizman/dash-manufacture-spc-dashboard`](https://github.com/dkrizman/dash-manufacture-spc-dashboard),\
    \ click on green button to download a zip file containing the source code\n\n\
    3. Unzip the folder into a suitable location on your local drive\n\n4. Copy the\
    \ code from the `app.py` file to a notepad and save as `app.ipynb`\n\n5. Open\
    \ the new Jupyter notebook, change `Debug = True` in the last line to `Debug =\
    \ False` and try to run it. NB you may need to install `dash_daq` first be running\
    \ (then commenting out) `%pip install dash_daq` in the first code cell.\n\n6.\
    \ Click \"Proceed to measurement\" to see streaming metrics typical for a IoT\
    \ sensor data. Press \"stop\" to stop streaming\n\n   Exercise (Stretch): clone\
    \ the Jupyter notebook `Dash-Jupyter-getting_started.ipynb` at the GitHub link\
    \ [`https://github.com/bw-cetech/apress-7.2.git`](https://github.com/bw-cetech/apress-7.2.git)\
    \ and run the code locally. Try to:\n   1. Change the color shown in the scatter\
    \ plot\n   2. Increase the size of the plots\n   3. Change the line plots to bar\
    \ plots\n\n7. Exercise (Stretch): clone `Dash-InteractiveChart.ipynb` from [`https://github.com/bw-cetech/apress-7.2.git`](https://github.com/bw-cetech/apress-7.2.git)\
    \ and change the chart to a European chart\n\n8. Exercise (Stretch): try to deploy\
    \ the IoT app to Heroku\n\n## Flask: Hands-on Practice\n\nDEPLOYING A FLASK DASHBOARD\n\
    \nIn this lab, starting from a boilerplate on GitHub, we create a virtual environment,\
    \ install some Python dependencies and create a **Flask dashboard**\n\n1. Clone\
    \ the source code at the link below to your local drive\n\n   [`https://github.com/app-generator/flask-black-dashboard.git`](https://github.com/app-generator/flask-black-dashboard.git)\n\
    \n2. Using a suitable Interactive Development Environment (IDE) such as IDLE or\
    \ Visual Studio, open Powershell and create a virtual environment\n\n3. Install\
    \ dependencies listed in the requirements file by executing the command below:\n\
    \n   ```\n   pip install -r requirements.txt\n   ```\n\n4. Run the app with the\
    \ command (in command prompt/terminal)\n\n   ```\n   flask run --host=0.0.0.0\
    \ --port=5000\n   ```\n\n5. Exercise – try to add authentication to the app\n\n\
    6. Stretch: change the font and font size on LHS menu and replace the \"Daily\
    \ Sales\" chart with a different dataset\n\n## Introduction to Django: Hands-on\
    \ Practice\n\nDJANGO APPLICATION DEVELOPMENT\n\nFollowing on from the previous\
    \ labs on Dash and Flask, the goal of this exercise is to familiarize ourselves\
    \ with another Python front-end (web) framework: **Django**\n\n1. Set up a virtual\
    \ environment\n\n2. Install Django into the virtual environment (NB first check\
    \ if you have this installed already with `py -m django --version`)\n\n3. Start\
    \ the app by `cd`'ing into the `mysite` folder then running\n\n   ```\n   python\
    \ manage.py runserver\n   ```\n\n4. Create a polls app by following the steps\
    \ at the tutorial link below, and for the remainder of this lab\n\n   [`https://docs.djangoproject.com/en/3.2/intro/tutorial01/`](https://docs.djangoproject.com/en/3.2/intro/tutorial01/)\n\
    \n5. Follow the steps in the tutorial to \"Write your first view\"\n\n   Exercise:\
    \ try to complete \"Writing your first Django app part 2\" by following the instructions\
    \ on the next page of the tutorial. Make sure to go through the steps below to\
    \ understand how the application interfaces to the underlying datastore for the\
    \ dashboard and how to manage the application development process\n\n   - Set\
    \ up virtual environment\n   - Creating a simple polls app\n   - Create SQLite\
    \ tables\n   - Playing with the Django API\n   - Admin oversight\n   - Create\
    \ tables in the \"lightweight\" SQLite database\n   - Create database models and\
    \ activate\n   - Play with the API\n   - Create an admin user and explore functionality\n\
    \n## ML Apps\n\nWe now turn our attention to the specific Machine and Deep Learning\
    \ applications developed and deployed in organizations and businesses today.\n\
    \nAs we have already covered the high-level overview of AI applications in our\
    \ first chapter, we focus this section on how these applications are being built\
    \ in organizations and the tools used. The specific \"industry perspective\" will\
    \ be covered in the next chapter on AI Case Studies.\n\n### Developing Machine\
    \ Learning Applications\n\nAlmost all organizations and businesses today are looking\
    \ to build an AI strategy through implementable Machine Learning solutions. The\
    \ drivers are varied, although the actual applications themselves tend to be concentrated\
    \ around a relatively small subset of supervised and unsupervised machine learning\
    \ problems. The uniqueness of the solution tends to reveal itself more in the\
    \ tailored use of data and feature engineering undertaken to model the outcomes.\n\
    \n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig11_HTML.jpg)\n\nAn illustration\
    \ depicts the development of machine learning applications. It includes: unsupervised\
    \ learning, clustering, dimensionally reduction, classification, supervised learning,\
    \ and regression with its features.\n\n**Figure 7-11** Machine Learning Applications\
    \ grouped by technique (Source: Forbes)\n\nBy no means exhaustive, the table below\
    \ describes what is driving businesses, what applications they are using, and\
    \ the data enablers and sources that tend to be pulled on to get the job done.\
    \ What is clear is that framing an organizational problem and documenting the\
    \ delivery plan is key to successfully implementing Machine Learning – best practice\
    \ is to embrace continual improvement over many iterative processes: from problem\
    \ framing, through data collection and cleansing, EDA and data prep, feature engineering,\
    \ model training, evaluation and benchmarking, inference and data drift.\n\n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig12_HTML.jpg)\n\
    \nAn illustration depicts the development of machine learning in business cases.\
    \ It includes 1. drivers. 2. M L applications. 3. Data sources and enablers along\
    \ with the lists of their characteristics.\n\n**Figure 7-12** Machine Learning\
    \ – the business case\n\n### Customer Experience\n\nMost businesses today are\
    \ striving to achieve greater brand authority by tailoring and improving **Customer\
    \ Experience (CX)** via predictive modeling and using customer feedback directly\
    \ in the model training process\n\nThe classic application of machine learning\
    \ to customer experience is a Recommendation Engine providing personalized offers\
    \ to customers based on\n\n- Who they are\n- Where they are\n- What they like\
    \ based on past purchasing patterns\n- Current conditions, such as the weather\n\
    - As well as outcomes from a retention model/their propensity to churn\n\nEffective\
    \ Customer Experience can provide bespoke predictions on the back of training\
    \ a model across multiple transactional, demographical, and behavioral features\
    \ such as\n\n- **Transactional** – total customer revenue, minimum purchase, maximum\
    \ purchase, time of last purchase\n- **Demographic** – gender, age, address/city\n\
    - **Behavioral** – customer journey and browsing patterns including pages visited,\
    \ time spent, device usage, likes, reviews, social media commentary, keywords\
    \ used\n\nTransactional and demographic data are long-established value levers,\
    \ but in 2022, more sophisticated mining of customer journey and behavioral data,\
    \ often unstructured, is what differentiates high-value retail organizations."
