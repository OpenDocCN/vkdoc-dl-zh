  trans: '

    ### 机器学习


    从基础层面来看，机器学习分为两类：监督式学习和无监督式学习。强化学习有时被视为第三类，但同样也可以看作是无监督式学习的一种。


    #### 监督式机器学习


    监督式机器学习与无监督式机器学习的区别在于是否存在“已标注”或“真实值”数据，即我们期望训练模型预测的特定目标字段或变量。


    监督式机器学习主要有两种类型：^(¹⁹)分类和回归。分类问题中的标签或目标变量是离散的（通常是二元的，但有时也是多类的），而监督式回归问题中的标签则是连续的。在行业关键机器学习应用中，使用分类技术的一个例子是判断客户是否会流失（或不会），而预测客户收入则是回归技术的一个例子。在这两种情况下，用于预测或预报目标变量的**特征**通常是客户属性，一般包括交易数据和人口统计数据，但也可能包含行为或态度数据，例如在网页上停留的时间或社交媒体互动中的情感倾向。


    #### 无监督式机器学习


    在无监督式机器学习中，我们没有真实值，因此预测建模的方面转而试图在底层数据上强加一种未见过的模式。通常使用某种形式的聚类将数据分组，例如，对于埋藏在 CRM
    平台中的客户数据，无监督式机器学习方法可能会发现一些具有一定共性的细分群体（高消费、中低收入、位于特定区域等）。


    降维有时也被视为一种无监督技术，因为机器学习算法被用来简化数据（如果使用主成分分析，通常是从数千个底层特征简化为数十个特征），使其在统计上类似于原始数据。虽然这种方法可以极大地缩减数据集并提高运行时间/性能，但它严格来说并不是通常意义上的机器学习建模技术，因为在这种情况下，输出的是另一个数据集（尽管是压缩后的），而不是一个训练好的模型。


    #### 强化学习


    强化学习涉及实时机器（或深度）学习，它采用一种智能体/环境机制，根据来自周围环境的实时反馈（模型的准确度如何）来对模型的迭代进行惩罚或奖励。


    虽然本书的范围主要集中在主流商业和组织应用上，但强化学习的进展通常是媒体大肆炒作的热点——本质上，它是驱动“工业级”应用（如谷歌搜索引擎、自动驾驶汽车和机器人技术）的底层技术。


    ### 什么是神经网络？


    在简要回顾了机器学习之后，让我们进入深度学习的高层概述。


    人工神经网络是支撑深度学习的结构。受大脑的生物启发，人工神经网络因其能够从底层数据中提取层次化、抽象或“隐藏”特征的能力，而被用于解决复杂问题。


    通常，人工神经网络由一个输入层、多个隐藏层和一个输出层组成。在网络的“前向传播”过程中，各种数据点作为输入（类似于机器学习模型中的特征），通过加权网络馈送以激活各种神经元，并最终产生数值输出。在计算机视觉或图像分类应用中，多次迭代这些前向传播（一个周期）会产生一个概率数组，其值对应于数据对应两个或多个结果（本例中为图像，例如一个人或一个物体）的概率。


    ### 简单感知器


    简单感知器是人工神经网络的构建模块——实际上是大脑中生物神经元的简化模型。


    单个神经元（如图 1-11 所示）有多个输入，根据这些输入，神经元要么被激活，要么不被激活。如果我们将这些感知器按层组织，就会得到一个多层感知器或深度神经网络，其功能更接近我们的大脑，多个神经元会根据输入信号被激活。


    ![](img/527966_1_En_1_Fig11_HTML.jpg)


    两张图。1. 简单感知器。输入 x1、x2、x3 经过权重 w1、w2、w3 后产生输出 y。2. 深度神经网络。3 个输入层流向隐藏层 1 和隐藏层 2，产生
    1 层输出。


    图 1-11


    简单感知器与多层感知器/深度神经网络


    简单感知器中的“激活”函数使用赫维赛德阶跃函数——一个简单的开/关开关。简单感知器也只能学习线性函数，因此实际上仅作为性能参考有用。另一方面，多层感知器（图
    1-11）由于拥有多个神经元，并依赖于更先进的激活函数（如 sigmoid、tanh 和 ReLu），因此可以学习非线性函数。

    '
- fmt: '### Deep Learning


    We saw above that Deep Learning refers to applying artificial neural networks
    with several hidden layers, that is, a deep neural network.


    Deep Learning though can use a number of different types of Artificial Neural
    Network, each of which has a number of key features which contribute to their
    adoption in solving specific predictive analytics challenges in the workplace.
    The main types covered in our hands-on labs in this book are listed below.^([^(20)](#fn20))


    #### Convolutional Neural Networks


    Convolutional neural networks are a type of neural network that uses convolutions
    to extract hierarchical patterns from the input data. Convolution is a mathematical
    way of combining two signals to form a third signal. CNNs are predominantly used
    in data that has spatial relationships, such as images.


    #### Recurrent Neural Networks


    Recurrent neural networks are used to process sequential data or data with underlying
    order/syntax. As a result, RNNs are typically used in forecasting time series
    data such as stock market data or IoT/sensor data that has underlying temporal
    dependencies.


    Because grammatical terms follow a certain sequence and order, speech recognition
    and Natural Language Processing applications such as chatbots and IVAs also typically
    use a type of Recurrent Neural Network, such as an LSTM (long short-term memory)
    network to capture nuances, structure and order in the underlying grammar.


    #### Autoencoders and Variational Autoencoders (VAEs)


    Variational Autoencoders are an improvised version of autoencoders – unsupervised
    artificial neural networks that learn how to efficiently compress and encode data.
    Autoencoders receive a lot of attention in the media because of their ability
    to generate image data; and are sometimes confused as the technique behind Deep
    Fakes. Autoencoders and VAEs consist of an encoder (for the input data) and a
    decoder (for reconstructing the input from the network output). The difference
    between these two types of neural network techniques is that VAEs produce a distributed
    (probabilistic) output.


    #### Generative Adversarial Networks (GANs)


    A GAN is a type of CNN that uses a generator continuously generating data while
    a discriminator learns to discriminate fake from real data. As training progresses,
    the generator improves at generating fake data that looks real while the discriminator’s
    ability to detect the difference between fake and real also improves. GANs are
    the real technology behind Deep Fakes.


    As a result of this “virtuous cycle,” a GAN trained on faces can be used to generate
    images of faces that do not exist but look very real. Despite the similarity,
    GANs are different from Autoencoders and VAEs as they work to generate new data
    which can''t be distinguished from real data, rather than reconstructing the (same)
    input data.


    ### Neural Networks – terminology


    Due to its complexity, Deep Learning comes with a bewildering vocabulary of concepts,
    tools and techniques for model configuration and improvement. We will look at
    these more closely later and expand on the definitions below, but for now we list
    below the main concepts fundamental to an understanding of how the model training
    process works.


    **Epoch** — a complete cycle through the entire dataset.


    **Learning Rate** — how fast weights change during gradient descent / backpropagation^([^(21)](#fn21)).


    **Activation Function** — triggers the output of a node/neuron, given a set of
    inputs


    **Regularization** — a “hyperparameter” to prevent overfitting


    **Batch Size** — size of the random sample taken from the input data for each
    forward pass


    **Hidden Layer** — a layer between input and output layers


    **Loss function** — calculates the delta between predicted and actual output


    Minimizing the latter of these (loss function) is the essential objective in training
    a neural network.


    ### Tools for Deep Learning


    In this book, the main tools we will be using for Deep Learning are `Python`,^([^(22)](#fn22))
    `TensorFlow`, and `Keras`. These tools are all open source and freely available
    today but it is worth noting many of the tools used in Deep Learning, including
    `TensorFlow` and `Keras`, have evolved out of internal development carried out
    by academia and Big Tech.


    `TensorFlow` is the brainchild of Google, and is still used to power all of Google’s
    Machine and Deep Learning on big datasets as well as other global brands such
    as Airbnb, Coca Cola, GE, and Twitter. It was open-sourced in 2015 and though
    it is a low-level language normally requiring highly specialized programmers to
    operate and run, like most of today’s ecosystem, the underlying code has since
    been served through high-level “wrappers” such as `Keras`, developed by MIT and
    easily importable as a Python library.


    We also use `PyTorch` in this book for applications of Deep Learning with Natural
    Language Processing. The development of `PyTorch` has a similar path to that of
    `TensorFlow` – it is a Facebook tool open-sourced on GitHub in 2017.


    Other tools for Deep Learning include `Caffe`, `Apache MXNet`, and `Theano` –
    tend to be used where there are strong integration requirements (e.g., with NVIDIA
    in the case of `Caffe` or with Apache Kafka or Apache Spark in the case of `MXNet`).
    `Theano` was developed by Université de Montréal, and while it had its day, development
    ceased in 2017 as a result of its inability to compete with the bigger (budget)
    offerings from Big Tech.


    ### Introduction to Neural Networks and DL: Hands-on Practice


    Now we have set the context for Neural Networks and Deep Learning, it’s worth
    exploring how they work. Rather than diving into code at this stage though, we
    will make use of great visual tool for visualizing how data is processed through
    a neural network in order to train a deep learning model.


    TENSORFLOW PLAYGROUND


    **The goal of this exercise is to visualize the training process of a simplified
    deep learning model and to try and improve its performance by playing with some
    of the many tuning “levers” available to us.**


    1.  Go to [`http://playground.tensorflow.org/`](http://playground.tensorflow.org/)


    2.  Have a look at the four datasets by clicking on the thumbnail icon on the
    RHS of the screen (under DATA),


    3.  Note in all cases the (supervised) datasets have labeled data: either blue
    or orange and the output shows these datapoints plotted on a 2D (x1, x2) grid.
    The inputs for our model are shown under FEATURES and are initially set to just
    x1 and x2 coordinates while we have two hidden layers of 4 and 2 neurons respectively.


    4.  Choose one dataset and press run. This will start the training process (and
    immediately after the evaluation process). Notice how the neural network weights
    get updated through each forward pass and each epoch.


    5.  Observe the Training and Test loss shown on the right-hand side. A good model
    will have both the training and test loss close to zero.


    6.  Stop the model training process for now. The first three datasets are relatively
    easy to train on. Choose the last (spiral) dataset and restart the training process.


    7.  As “stretch” exercises, try to improve the model performance (lower loss in
    less epochs) by making neural network architecture more complex – add synthetic
    features to the model (`x1x2`, power or trigonometric transforms) and/or increase
    the number of layers in the network. You can also change the ratio of training
    and test data on the LHS or increase/decrease the batch size or modify the hyperparameters
    along the top. Try to find a suitable configuration which achieves a loss < 0.01
    in under 500 epochs.


    8.  Choose the last (spiral) dataset and restart the training process. For now,
    notice that this time the modelling process struggles to converge – the loss oscillates
    a lot. We will have another look at TensorFlow Playground later on in this book
    in Chapter [5](#527966_1_En_5_Chapter.xhtml), and try to achieve a better result
    training on this dataset.'
