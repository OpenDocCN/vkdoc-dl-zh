    # 7. AI 全栈：应用开发


    IDC 估计，目前人工智能是一个价值 3410 亿美元的市场，如果全球管理咨询公司的预测可信，^(¹⁰²) 到 2030 年，它可能为全球经济贡献 13 万亿美元（麦肯锡）或
    15.7 万亿美元（普华永道）。


    显然，市场正在蓬勃发展，但企业如何克服与积累和过度依赖独立的、高度技术化的脚本模型以及管理不善的数据科学团队相关的历史性“技术债务”呢？


    当今的“顶尖”技能集在于将“企业级”AI 愿景转化为已部署的现实。随着全球疫情将 AI 推至企业议程的首位，增强了业务的韧性和相关性，现在的重点是如何重构和嵌入演示及原型，使其成为跨企业的全栈
    AI 解决方案。


    IDC 预测（图 7-1），未来五年，客户对开发、实施和管理 AI 应用所需技术专长的 AI 服务需求将以 18.4% 的复合年增长率增长。本章从关键的业务/组织对
    AI 的需求出发，旨在确定正确的 ML 或 DL 解决方案和技术，以开发和交付这些“全栈 AI”解决方案，同时在我们的动手实验室中将其中一些开发为样板解决方案。


    ![](img/527966_1_En_7_Fig1_HTML.jpg)


    一张关于 2020 年至 2024 年全球 AI 软件增长预测的图表。它包括六条曲线：AI CRM、AI ERM、其他 AI 应用、AI 应用开发与部署、软件平台和基础设施。


    **图 7-1** IDC 2024 年 AI 增长预测


    ## AI 应用开发简介


    在本节中，我们将探讨当前推动 AI 应用开发的因素、从脚本到解决方案的一些基础知识，以及处理大数据的加速器：并行处理、集群和 GPU。


    ### 开发 AI 解决方案


    敏捷软件开发是 `itjobswatch` 上的头号工作。^(¹⁰³) 源于对 AI 解决方案的狂热需求，这为全栈数据科学家或 AI 工程师带来了巨大的机遇。


    2022 年，大多数 AI 应用属于以下三类之一：机器学习、计算机视觉或 NLP。但由于其技术复杂性，机器学习和深度学习的实现历来在运营上各自为政，由博士级别的统计学家来解释代码繁重的技术模型。


    人们依赖快速修复或模拟的虚拟/合成数据集，而不是实施数据编织方法来连接（或创建）复杂的预标记数据集。训练和测试通常仅限于 Python 笔记本（`Jupyter`、`Colab`
    等），而推理（通常没有 API）则被当作事后才考虑的事情。最终结果是巨大的技术债务——当然不是我们所认知的“应用”。


    发展趋势是转向“企业级 AIaaS”解决方案，或许与 TinyAI 结合：这是一种在不损失能力的情况下缩小现有深度学习模型的新算法。^(¹⁰⁴)


    ### AI 应用——启动与运行


    我们如何着手开发一个 AI 应用？从流程角度来看，我们建议遵循敏捷方法，从小处着手，但不要留下技术债务，最终目标应该是企业级 AI，即使这是一个长达 2-5
    年的旅程。以下七步计划是一个成功的良好框架：


    1.  选择一个有趣的话题/问题

    2.  开发低保真度解决方案——找到一个快速的解决方案，并尽可能保持开源！使用 `google` 来帮助（说真的！），用精确的关键词来定义问题

    3.  改进你的简单解决方案——在 `Kaggle` 或 AI/DL 或 ML 领域众多杰出思想领袖的博客/网站上寻找类似的问题表述和 Python 代码示例^(¹⁰⁵)

    4.  分享你的解决方案并征求反馈——利用相同的特定论坛提问并寻求支持/调试

    5.  针对不同问题重复步骤 1-4——将模糊/不明确的业务/组织目标转化为可用 ML/DL 解决的具体问题

    6.  完成一个 `Kaggle` 竞赛并开展合作

    7.  瞄准高价值解决方案——它是否解决了组织问题？是否可衡量？


    成功部署 AI 解决方案需要大量的支持性基础设施，以及对目标/未来架构的理解。下面我们讨论扩展解决方案的两个关键方面——在 API 后面以 Web 服务的形式运行机器学习和深度学习代码，以及分布式计算。


    ### API 和端点


    应用程序编程接口（API）提供了两个软件应用程序之间标准化的通信方式。


    API 开放某些用户定义的 URL 端点，这些端点随后用于发送或接收数据请求。REST（表述性状态转移）API 是最流行的专业 Web 服务 API 之一，它使用
    URI、HTTP 协议和 JSON 数据格式，但也有其他选择，例如 Google 的高性能远程过程调用（RPC）框架 `gRPC` 和 Facebook 的
    `GraphQL` 都是合适的替代方案。^(¹⁰⁶) 两者现在都已开源。


    将 AI/ML 模型作为 API 公开具有明显的好处，从 UI/UX 或提供用户友好的分析/模型界面和工作流程，到端点稳定性、包含数据验证^(¹⁰⁷)检查和安全处理的能力、数据科学和
    IT 职能的分离、在更广泛组织中的可用性以及多应用可重用性。


    除了内部生产力之外，API 支持的 AI 解决方案还能创造额外的外部价值，将数据科学模型暴露给更广泛的客户群。API 端点/响应可以使用 `cURL` 和/或
    `Postman` 进行测试——两者都简化了构建 API 和排查/调试连接问题的步骤。图 7-2 对此进行了说明。


    ![](img/527966_1_En_7_Fig2_HTML.jpg)


    一个典型 API 的架构。它包括一个分析服务器、API、带有数据负载的 HTTPs 请求，以及带有数据负载和应用的 HTTPs 响应。


    **图 7-2** 典型 API 架构（来源：ubiops）


    ### 分布式处理和集群


    由于深度学习（有时也包括机器学习）需要对大型训练集进行矩阵计算，分布式计算使得并行执行这些计算成为可能，从而节省时间。如今，大多数生产级解决方案都需要这种大数据处理能力来支持底层的
    AI 应用。


    #### 集群


    集群是高性能计算（HPC）系统中的一组节点（计算机）（图 7-3），它们使用并行处理来处理分布式工作负载。


    最著名的例子是 Apache Hadoop——一个允许跨集群对大型数据集进行分布式处理的框架。有关 Hadoop 的更多信息，请参见第 3 章。


    ![](img/527966_1_En_7_Fig3_HTML.jpg)


    一个流程图描述了使用并行处理的分布式工作负载。他们比较了正常处理和并行处理。在并行处理程序中，使用 CPU 的任务 1、任务 2 和任务 3 会给出结果。


    **图 7-3** 计算中的并行化——使用多个 CPU 将 ML/DL 过程拆分为并发任务

