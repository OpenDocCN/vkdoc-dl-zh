  trans: "\n# 性能基准测试\n\n构建 AI 应用需要持续的**训练**和**测试**——了解如何设定性能基准以及使用哪些衡量指标是一项关键的开销。将模型输出与基线进行比较总是一个好主意。\n\
    \n对于监督分类模型，基线可以是一个为测试集中每个数据点随机分配类别的模型，或者是一个使用所有可用特征（除了与运行时错误相关的数据清洗外不做改动，例如移除缺失值、对文本数据进行编码等）的模型——本质上是一个没有“特征工程”的模型。对于监督回归模型，通常使用`持久性`预测作为基线，即预测只是“持续”（即重复）测试集中的某种数据模式，例如前一天、前七天或前一年等。与分类模型一样，最好使用所有特征运行一个基线，以便与后续进行了更复杂特征工程的运行结果进行比较。\n\
    \n上述基线对于监督机器学习的“启动和运行”很有用，但在经过 5-10 次模型迭代后，就需要更复杂的方法了。如下表所示，会使用多种衡量指标来确定模型的性能。\n\
    \n对于无监督学习，我们没有标记数据，因此与基线进行基准测试没有意义。但在这里，我们可以利用诸如簇内平方和之类的衡量指标，来了解数据在模型输出的模型簇中“紧密”程度。\n\
    \n![](img/527966_1_En_4_Fig7_HTML.jpg)\n\n混淆矩阵展示了精确率和召回率的值。`T N`和`F N`分别表示真负例和假负例，而`F\
    \ P`和`T P`分别表示假正例和真正例。`T N = 50`，`F N = 5`，`F P = 10`，`T P = 100`。\n\n**图 4-7**\
    \ 混淆矩阵，其中`召回率 = 100 / (100 + 5) = 0.95`，`精确率 = 100 / (100 + 10) = 0.91`\n\n**表\
    \ 4-3** 机器学习性能指标\n\n| 指标/基准 | 描述 | 机器学习类型 |\n| --- | --- | --- |\n| **准确率** |\
    \ 分类器正确的频率是多少？ | 监督分类 |\n| **召回率** | 我们正确预测的实际正例的比例：`TP/(TP+FN)` | 监督分类 |\n| **精确率**\
    \ | 正确预测的比例：`TP/(TP+FP)` | 监督分类 |\n| **F 值** | 真正例率（召回率）和精确率的加权平均值：`2 * 召回率 *\
    \ 精确率 / (召回率 + 精确率)` | 监督分类 |\n| **混淆矩阵** | 与实际结果相比，正确和错误预测的数量 | 监督分类 |\n| **分类报告**\
    \ | 显示模型的精确率、召回率、F1 和支持度分数 | 监督分类 |\n| **ROC 曲线/AUC** | 敏感性与特异性之间的权衡 | 监督分类 |\n\
    | **均方根误差 (RMSE)** | 预测值与实际值之间平均误差的平方根 | 监督回归 |\n| **R² (决定系数)** | 衡量模型将预测值拟合到实际值的程度\
    \ | 监督回归 |\n| **方差** | 由于过拟合导致对微小变化敏感而产生的误差 | 监督回归 |\n\n## 持续改进\n\n持续改进当然是性能基准测试的一部分——与其依赖静态指标和盲目的试错方法来改进结果，不如采用最佳实践，以确保随着时间的推移，我们能够超越模型性能的容忍度。\n\
    \n几乎总是应该首先重新审视数据，并批判性地评估用于关键数据清洗任务的方法，例如为缺失值估算代理值——当我们从另一个特征中移除缺失数据时，是否丢失了太多有价值的（其他）特征信息？仅仅用平均值替换缺失值是否合适？等等。其中一些关于信息丢失和/或模型偏差的担忧，也延伸到了之前为不平衡数据集描述的采样方法中。\n\
    \n数据问题进一步延伸到数据采集过程——虽然更多的数据并不总是意味着更好的结果，但从统计学角度看，更大的样本更有可能带来更好的性能。更多的数据也不一定意味着更多的记录或数据行——新的特征，通常从现有特征衍生而来（例如“自上次购买以来的天数”、“购买频率”等），可能会产生巨大影响。\n\
    \n无论采用何种精细的方法，只有在详尽地重新审视数据之后，我们才应考虑进一步的算法测试（并行或其他方式）和超参数调优。\n\n虽然上述重点在于持续改进模型训练和测试结果，但模型弹性也是一个额外的考虑因素。今天的一个好模型不一定在一个月后仍然适用——在最后一章中，我们将探讨数据漂移和用于缓解问题的自动重新训练。\n\
    \n## 机器学习分类器：动手实践\n\n**SKLEARN 回顾**\n\n`Scikit-learn`（或`sklearn`）是进行简单预测分析和建模的“首选”工具——在本实验中，我们将`scikit-learn`中的机器学习算法与三个不同的数据集进行比较。\n\
    \n`sklearn`不仅仅是“入门级”的机器学习，它还被包括摩根大通、Spotify 和[booking.com](http://booking.com)在内的知名品牌广泛用于生产环境。它构建在`NumPy`、`SciPy`和`matplotlib`之上，除了机器学习的主要算法流程外，`sklearn`还附带了一些内置的数据集、预处理、特征工程和模型选择函数/方法：\n\
    \n1.  从以下地址克隆 Python 笔记本：[`https://github.com/bw-cetech/apress-4.9.git`](https://github.com/bw-cetech/apress-4.9.git)\n\
    \n2.  按照笔记本中的描述：\n    1.  导入三个虚拟数据集\n    2.  进行缩放\n    3.  进行并行运行，并将数据拟合到十种不同的算法中\n\
    \n3.  直观地比较多种算法如何拟合训练数据\n\n4.  最后，尝试完成练习：\n    1.  提取模型分数（屏幕上显示的列表中的原始值）\n   \
    \ 2.  仅针对`\"make_circles\"`数据集隔离多层感知器（MLP）。用输入数据绘制此图，并在屏幕上使其更大\n\n![](img/527966_1_En_4_Fig8_HTML.jpg)\n\
    \n该图展示了十种不同机器学习算法对三个虚拟数据集的分类情况。\n\n**图 4-8** 十种机器学习算法与三个不同数据集的比较\n\n## 模型选择、部署与推理\n\
    \n上述性能指标是初始和最终模型选择的基础——在 2022 年，这一过程更常使用诸如贝叶斯优化和 AutoML/AutoAI 等自动化技术来完成。这是第 6\
    \ 章关于 AutoAI 的主题，我们将把对该过程的讨论留到那时。\n\n机器（和深度）学习部署是第 7 章和第 9 章的重点——本质上，它是将模型部署到生产环境中的过程，在此过程中对新数据执行`推理`——将新数据输入模型以获得预测/预报。\n\
    \n推理将在本章的最后一个动手实验中进行，本质上它与算法建模部分中描述的测试预测步骤没有区别，只是在这种情况下，我们向训练好的模型输入新数据，而不是来自测试集的样本数据点。\n"
- fmt: "### Inference: Hands-on Practice\n\nAZURE MACHINE LEARNING – INFERENCE API\
    \ TESTING\n\n**Using Python in Jupyter Notebook, the goal of this exercise is\
    \ to…**\n\n1.  In Azure Machine Learning Studio, follow the steps below to train\
    \ and evaluate a machine learning model on predicting whether income is above\
    \ or below $50k:\n\n    [`https://gallery.azure.ai/Experiment/3fe213e3ae6244c5ac84a73e1b451dc4`](https://gallery.azure.ai/Experiment/3fe213e3ae6244c5ac84a73e1b451dc4)\n\
    \n2.  Now follow the steps below to set up a web service and perform a simple\
    \ API inference test:\n    1.  Making sure model has already run, set up web service\n\
    \    2.  Select predictive web service (recommended)\n    3.  Run\n    4.  Deploy\
    \ web service\n    5.  Click on TEST (blue button) beside REQUEST/RESPONSE to\
    \ do a simple test\n    6.  SHOW with some default values (age = 12, income =\
    \ 45) customer predicted to have LOW INCOME (shown in small text at the bottom\
    \ of the screen)\n    7.  Exercise – after deploying the Web Service and using\
    \ the config settings shown under “Consume,” add the Azure ML add-in to MS excel\
    \ and entering sample data, call the API from excel\n\n## Reinforcement Learning\n\
    \nReinforcement learning involves real-time machine (or deep) learning with an\
    \ agent/environment mechanism which either penalizes or rewards iterations of\
    \ a model based on real-time feedback from the surrounding environment (how accurate\
    \ is the model).\n\nThere are three primary components to the algorithm, with\
    \ the aim being to discover through trial and error which actions maximize the\
    \ expected reward over a given amount of time:\n\n*   The agent (the learner or\
    \ decision maker)\n*   The environment (everything the agent interacts with)\n\
    *   Actions (what the agent can do)\n\nWhile the scope of this book is mainly\
    \ focused on mainstream business and organizational applications, advances in\
    \ reinforcement learning are in general where there is considerable hype in the\
    \ media – essentially this is the underlying technique that drives “industrial-scale”\
    \ applications such as Google’s Search Engine, autonomous vehicles, robotics,\
    \ and gaming.\n\n## Wrap-up\n\nWhether Reinforcement Learning is Machine or Deep\
    \ Learning may be a moot point but yawning skill gaps means AI ambitions for most\
    \ companies today are in establishing in-house capabilities in more prosaic Machine\
    \ Learning solutions.\n\nDeep Learning represents a step-up in organizational\
    \ AI maturity and having reached the end of this chapter’s accelerated run through\
    \ on Machine Learning, we move onto how cloud data-fed neural networks have become\
    \ mainstream and their specific application in Deep Learning solutions in our\
    \ next chapter.\n\nFootnotes [1](#527966_1_En_4_Chapter.xhtml#Fn1_source) [2](#527966_1_En_4_Chapter.xhtml#Fn2_source)\
    \ [3](#527966_1_En_4_Chapter.xhtml#Fn3_source) [4](#527966_1_En_4_Chapter.xhtml#Fn4_source)\
    \ [5](#527966_1_En_4_Chapter.xhtml#Fn5_source) [6](#527966_1_En_4_Chapter.xhtml#Fn6_source)\
    \ [7](#527966_1_En_4_Chapter.xhtml#Fn7_source) [8](#527966_1_En_4_Chapter.xhtml#Fn8_source)\
    \ [9](#527966_1_En_4_Chapter.xhtml#Fn9_source) [10](#527966_1_En_4_Chapter.xhtml#Fn10_source)\
    \ [11](#527966_1_En_4_Chapter.xhtml#Fn11_source) [12](#527966_1_En_4_Chapter.xhtml#Fn12_source)\
    \ [13](#527966_1_En_4_Chapter.xhtml#Fn13_source) [14](#527966_1_En_4_Chapter.xhtml#Fn14_source)\
    \ [15](#527966_1_En_4_Chapter.xhtml#Fn15_source) [16](#527966_1_En_4_Chapter.xhtml#Fn16_source)\
    \ [17](#527966_1_En_4_Chapter.xhtml#Fn17_source) [18](#527966_1_En_4_Chapter.xhtml#Fn18_source)\n\
    \n# 5. Neural Networks and Deep Learning\n\nAt the heart of most of today’s “flagship”\
    \ or “hyped-up” applications of Artificial Intelligence is Deep Learning, and,\
    \ specifically the use and predictive power of Artificial Neural Networks, or\
    \ ANNs.\n\nHow these neural networks consume vast amounts of data in order to\
    \ operate and ultimately achieve, often astonishingly sophisticated predictions\
    \ is the subject of this chapter.\n\nMore specifically, the main takeaways of\
    \ this chapter are knowing where to start with AI, from the historical context\
    \ and the business/user journey from machine to deep learning to underlying Big\
    \ Data/Cloud architectures necessary to productionize Deep Learning. To get there\
    \ we will cover underlying stochastic process theory and how it relates to neural\
    \ networks as well as the different types of Neural Networks used in Deep Learning.\
    \ We will look at the deep learning mode lifecycle, techniques to model and infer\
    \ from Big Data as well as critical diagnostics around the model training and\
    \ testing process and the many levers we have at our disposal, such as activation\
    \ functions, pooling layers, and dropout to achieve better performance.\n\nBringing\
    \ everything together, ultimately the goal here is how to establish the right\
    \ (best practice) artificial neural network architecture, data orchestration pipeline,\
    \ and infrastructure for Deep Learning. We will cover many AI tools throughout\
    \ the rest of this book and in our hands-on labs, but the main focus in this chapter\
    \ will be around `TensorFlow`, `Keras`, and `PyTorch`.\n\n## Introduction to Deep\
    \ Learning\n\nIn our first section we start with an introduction, covering key\
    \ concepts, historical milestones, the AI hype cycle, and the neural network architecture\
    \ underpinning deep learning.\n\n### What Is Deep Learning\n\nBefore we embark\
    \ on specifics of neural networks, we should address the relationship between\
    \ these (often misunderstood) algorithmic structures for solving complex problems\
    \ and the relatively recent concept of “deep” learning.\n\nThe common consensus\
    \ today is that Deep Learning is essentially a subfield of machine learning based\
    \ on artificial neural networks, while both are subfields of Artificial Intelligence.\
    \ So, like machine learning, deep learning involves automating a machine to perform\
    \ a (predictive) task, but this time the underlying algorithm is far more complex,\
    \ and highly nonlinear. The name “deep” comes from the hidden layers within a\
    \ neural network where much of the optimization and convergence process takes\
    \ place.\n\nNeural network development goes back to the 1950s, but today we have\
    \ fast enough computers and data handling capacity to actually train large neural\
    \ networks. It is this, together with inherent performance sophistication, that\
    \ has really led to their explosion in popularity as a tool in businesses and\
    \ organizations worldwide trying to get a handle on both revenue growth opportunities\
    \ and cost optimization. The sky is essentially the limit – as evidenced by Andrew\
    \ Ng, the co-founder of Google Brain; traditional algorithms performance is limited\
    \ as data scales but performance in Deep Learning continues to improve as the\
    \ volume of training data increases (Figure [5-1](#527966_1_En_5_Chapter.xhtml#Fig1)).\n\
    \n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig1_HTML.jpg)\n\nA graph illustrates\
    \ the performance against the amount of data. It indicates increasing performance\
    \ for deep learning and remains constant throughout after a certain amount of\
    \ data for older learning algorithms.\n\nFigure 5-1\n\n[`https://machinelearningmastery.com/`](https://machinelearningmastery.com/)\n\
    \nMost of the “hyped-up” AI applications discussed in the media today are Deep\
    \ Learning solutions: from Driverless Cars (Autonomous Vehicles) to Search Engines,\
    \ Computer Vision/Image Recognition, Chatbots, and Portfolio Optimization and\
    \ Forecasting."
