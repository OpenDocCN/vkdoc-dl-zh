  trans: "\n### 数据洗牌与划分/分割\n\n与特征工程类似，将数据洗牌并分割为训练集和测试集可视为数据整理的一部分。通常我们按 70/80% 和 30/20%\
    \ 的比例分割数据用于训练和测试。在 Python 中（`sklearn` 库）通过 `train_test_split` 函数实现。默认情况下，数据会被洗牌，以确保行的选择/分割是随机进行的（即防止行的非随机分配以及模型偏差的可能性）。\n\
    \n通常会采用更高层次的随机化，以使非随机分配的概率几乎可以忽略不计。这种技术称为 `KFolds` 交叉验证，它将训练集进一步划分为训练（子集）和验证集。\n\
    \n![](img/527966_1_En_4_Fig5_HTML.jpg)\n\n数据划分示意图。数据被分割为训练集和测试集。训练集和测试集分别由 `X_train`\
    \ 和 `y_train` 以及 `X_test` 和 `y_test` 组成。\n\n**图 4-5** 用于机器学习建模的数据划分\n\n### 采样\n\
    \n在接下来的两节中，我们将探讨算法流程和性能基准测试。由于数据整理具有高度迭代性，它还包含许多通常要在多次模型运行之后才会执行的任务。上述提到的归一化和缩放就是两种这样的技术，它们并非让模型“启动并运行”所必需，而是为了在模型流程稳定后进行微调。采样，特别是过采样或欠采样，是另一种应用于不平衡数据集的技术。\n\
    \n大多数数据集都存在固有的不平衡性——以欺诈检测为例，欺诈交易的数量通常远少于非欺诈交易。网络安全领域也是如此——DDoS 攻击就像在浩如烟海的正常网络活动中大海捞针。\n\
    \n当我们拥有不平衡数据时，随机欠采样指的是仅从多数类中采样足够数量的样本，以使多数类和少数类样本的数量大致相等。而对于随机过采样，我们则通过合成数据（从少数类中复制数据以达到相同效果）来实现。\n\
    \n欠采样或过采样常常能决定模型性能的好坏，尽管欠采样存在丢失对模型可能有价值的数据信息的风险，而过采样则可能导致过拟合。\n\n我们将在第 8 章中探讨欠采样的一种具体应用——`SMOTE`（合成少数类过采样技术）。\n\
    \n### 端到端数据整理：动手实践\n\n**使用 Kaggle API 密钥进行信用风险建模准备**\n\n本练习的目标是在 Google Colab\
    \ 中使用 Python，将探索性数据分析和数据整理技术应用于一个常见的银行业挑战——检测和预测客户信用风险：\n\n1.  克隆 GitHub 仓库 `https://github.com/bw-cetech/-apress-4.4.git`\n\
    2.  参考 Colab 左侧的目录，逐步完成以下流程：\n    1.  导入库\n    2.  配置\n    3.  使用 Kaggle API 密钥直接连接数据集\n\
    \    4.  探索性数据分析\n    5.  数据整理\n    6.  特征选择\n3.  进入笔记本的建模部分，先进行基准运行，然后进行特定特征缩放的场景运行\n\
    4.  练习——尝试通过进行更多次运行并更改数据/增强特征工程流程来改进模型性能\n5.  练习——执行相同操作，但这次在多个算法上并行运行\n\n## 算法建模\n\
    \n将数据分割为训练集和测试集（或训练集、验证集和测试集）后，我们就可以“拟合”模型了。算法技术利用训练数据，将算法拟合到模型上。模型训练完成后，使用 `sklearn`\
    \ 中的 `.predict()` 函数，将测试数据输入训练好的算法，以基准测试模型的预测结果（参见下文）。\n\n本书是对构建人工智能应用的实践性探讨，而非对机器学习或深度学习算法原理的理论性（且常常无关紧要的）讨论。尽管如此，本章及其他章节中有大量实验展示了底层算法（包括机器学习和深度学习）是如何应用的，并在后续章节中提供了大量关于如何微调并充分利用建模过程的相关最佳实践。\n\
    \n为便于本书后续参考，我们在下文中总结了所使用的主要机器学习算法及其优缺点。随后在下一节中，我们将进行一个动手实验，在三个不同的数据集上训练多种机器学习算法（以及一种深度学习算法）并比较其性能。\n\
    \n**表 4-1** 监督分类算法\n\n| 算法 | 优势 | 劣势 |\n| --- | --- | --- |\n| 朴素贝叶斯 | 基于类别条件概率的简单模型。易于实现\
    \ | 假设所有特征相互独立——实际情况很少如此 |\n| 逻辑回归 | 直接明了，易于理解——输出具有概率性 | 在处理多个或非线性决策边界时表现不佳 |\n\
    | 分类树/随机森林/梯度提升树/CatBoost | 能够学习非线性关系，对异常值鲁棒 | 在无约束时容易过拟合（通过约束或使用集成方法可缓解） |\n\
    | 支持向量机 | 能够对非线性决策边界建模；在高维空间中对异常值相当鲁棒 | 内存密集，难以调参，不适用于大规模数据集 |\n| 多层神经网络（深度学习）\
    \ | 在分类音频、文本和图像数据时表现非常出色 | 需要大量数据进行训练，非通用型 |\n\n**表 4-2** 监督回归算法\n\n| 算法 | 优势\
    \ | 劣势 |\n| --- | --- | --- |\n| 线性回归 | 直接明了，易于理解 | 处理非线性关系时表现不佳 |\n| Lasso、Ridge\
    \ 和 Elastic-Net | 正则化——惩罚大系数以避免过拟合 | 复杂的超参数调优 |\n| 回归树/随机森林/梯度提升树/XGBoost/LightGBM/CatBoost\
    \ | 能够学习非线性关系，对异常值鲁棒 | 在无约束时容易过拟合（通过约束或使用集成方法可缓解） |\n| K 近邻 | 搜索最相似训练观测值的简单方法\
    \ | 内存密集，在高维数据上表现不佳 |\n| 多层神经网络（深度学习） | 能够学习极其复杂的模式，高效学习高维数据，在计算机视觉、语音识别方面表现出色\
    \ | 计算密集，需要高度专业知识进行调优。不适合通用目的，因为需要大数据进行训练 |\n\n对于无监督机器学习，`K 均值` 是主要算法，但也有包括层次聚类在内的几种变体。神经网络（特别是自编码器）也可用于无监督机器/深度学习，而主成分分析（前面讨论过）本质上也是一种无监督机器学习算法。\n\
    \n![](img/527966_1_En_4_Fig6_HTML.jpg)\n\n`K 均值` 算法示意图。`K = 2`。它任意选择 `K` 个对象作为初始聚类中心。该过程包括分配对象、更新聚类均值以及重新分配。\n\
    \n**图 4-6** `KMeans` 算法——运行机制\n"
- fmt: "# Performance Benchmarking\n\nBuilding an AI app requires constant training\
    \ and testing – knowing how to benchmark performance and which measures to use\
    \ is a key overhead. It’s always a good idea to compare model output with a baseline.\n\
    \nFor supervised classification models, this can be a model which randomly assigns\
    \ classes to each datapoint in the test set, or a model which uses all available\
    \ features (unaltered except for data cleansing associated with runtime errors,\
    \ e.g., missing values removed, text data encoded, etc.) – essentially a model\
    \ with no “feature engineering.” For supervised regression models, a `persistence`\
    \ forecast is often used as a baseline, where the forecast just “persists” (i.e.,\
    \ repeats) a pattern of data from the test set, for example, day minus 1, day\
    \ minus 7, or year minus 1, etc. As with classification models, it’s a good idea\
    \ to run a baseline with all features to compare later runs where more sophisticated\
    \ feature engineering has been carried out.\n\nThe above baseline is useful for\
    \ supervised machine learning “up and running” but after 5-10 model iterations\
    \ more sophistication is required and, as shown in the table below, a number of\
    \ measures are used to determine how well a model is performing.\n\nFor unsupervised\
    \ learning, we have no labeled data and benchmarking against a baseline makes\
    \ no sense. However here we can make use of measures such as within cluster sum\
    \ of squares to get an idea of how “closely” data is grouped together in the model\
    \ output model clusters.\n\n![](images/527966_1_En_4_Chapter/527966_1_En_4_Fig7_HTML.jpg)\n\
    \nA confusion matrix exposes precision and recall values. `T N` and `F N` denote\
    \ true and false negatives whereas `F P` and `T P` denote false and true positives\
    \ respectively. `T N = 50`, `F N = 5`, `F P = 10`, and `T P = 100`.\n\n**Figure\
    \ 4-7** Confusion Matrix with `recall = 100 / (100 + 5) = 0.95` and `precision\
    \ = 100 / (100 + 10) = 0.91`\n\n**Table 4-3** Machine Learning Performance Metrics\n\
    \n| Metric/Benchmark | Description | Machine Learning type |\n| --- | --- | ---\
    \ |\n| **Accuracy** | How often is the classifier correct? | Supervised Classification\
    \ |\n| **Recall** | Proportion of the actual positive cases that we correctly\
    \ predicted: `TP/(TP+FN)` | Supervised Classification |\n| **Precision** | Proportion\
    \ of correct predictions: `TP/(TP+FP)` | Supervised Classification |\n| **f-measure**\
    \ | Weighted average of the true positive rate (recall) and precision: `2 * recall\
    \ * precision / (recall + precision)` | Supervised Classification |\n| **Confusion\
    \ Matrix** | Number of correct and incorrect predictions compared to the actual\
    \ outcomes | Supervised Classification |\n| **Classification Report** | Displays\
    \ precision, recall, F1, and support scores for the model | Supervised Classification\
    \ |\n| **ROC Curve/AUC** | Trade-off between sensitivity and specificity | Supervised\
    \ Classification |\n| **Root mean Squared Error (RMSE)** | Square root of mean\
    \ error between predictions and actual values | Supervised Regression |\n| **R²\
    \ (R-squared)** | A measure of how well a model fits predictions to the actual\
    \ values | Supervised Regression |\n| **Variance** | Error from sensitivity to\
    \ small changes as a result of overfitting | Supervised Regression |\n\n## Continual\
    \ Improvement\n\nContinual improvement is of course part of performance benchmarking\
    \ – rather than relying on static metrics and blind trial and error approaches\
    \ to improve results, best practice should be adopted to ensure over time we can\
    \ surpass tolerances on model performance.\n\nAlmost always revisiting the data\
    \ should be the first port of call and critiquing the approach used for key data\
    \ cleansing tasks such as imputing proxy values for missing values – has too much\
    \ valuable (other) feature information been lost when we removed missing data\
    \ from another feature, is it appropriate to just replace missing values with\
    \ the mean value, etc.? Some of these same concerns around loss of information\
    \ and/or model bias extend to the sampling approaches already described for imbalanced\
    \ datasets.\n\nThe question of data extends further to the data acquisition process\
    \ – while more data doesn’t always mean better results, a larger sample is statistically\
    \ more likely to yield better performance. More data also doesn’t necessarily\
    \ mean more records or rows of data – new features, often derived from existing\
    \ ones (such as “no. of days since last purchase,” “freq of purchase,” etc.) can\
    \ have a huge impact.\n\nWhatever the granular approach taken, only after an exhaustive\
    \ reexamining of the data should we look to further algorithmic testing (parallel\
    \ or otherwise) and hyperparameter tuning.\n\nAnd while the above focus is on\
    \ continually improving model training and test results, model resiliency is an\
    \ additional consideration. A great model today isn’t always fit for purpose in\
    \ one month’s time – in our last chapter we will look at data drift and automated\
    \ retraining for problem mitigation.\n\n## Machine Learning Classifiers: Hands-on\
    \ Practice\n\n**SKLEARN RETROSPECTIVE**\n\n`Scikit-learn` (or `sklearn`) is the\
    \ “go-to” for simple predictive analysis and modeling – in this lab we compare\
    \ machine learning algorithms in `scikit-learn` against three different datasets.\n\
    \nNot just “entry-level” ML, `sklearn` is widely used in production by well-known\
    \ brands including J.P.Morgan, Spotify, and [booking.com](http://booking.com).\
    \ Built on `NumPy`, `SciPy`, and `matplotlib`, and besides the main algorithmic\
    \ processes in machine learning, `sklearn` comes with some built-in datasets,\
    \ preprocessing, feature engineering, and model selection functions/methods:\n\
    \n1.  Clone the Python notebook from: [`https://github.com/bw-cetech/apress-4.9.git`](https://github.com/bw-cetech/apress-4.9.git)\n\
    \n2.  As described in the notebook:\n    1.  Import the three dummy datasets\n\
    \    2.  Scale\n    3.  Carry out a parallel run and fit the data to the ten different\
    \ algorithms\n\n3.  Compare visually how the multiple algorithms fit to the training\
    \ data\n\n4.  Finally, have a go at the exercises:\n    1.  Extract the model\
    \ scores (raw values in a list displayed on the screen)\n    2.  Isolate the multilayer\
    \ perceptron (MLP) for the `\"make_circles\"` dataset only. Plot this with the\
    \ input data and make it bigger on the screen\n\n![](images/527966_1_En_4_Chapter/527966_1_En_4_Fig8_HTML.jpg)\n\
    \nA representation exposes the classification of ten different machine learning\
    \ algorithms for three dummy datasets.\n\n**Figure 4-8** Comparison of ten machine\
    \ learning algorithms against three different datasets\n\n## Model Selection,\
    \ Deployment, and Inference\n\nThe above performance metrics are the basis for\
    \ initial and final model selection – a process which is more commonly carried\
    \ out in 2022 using automated techniques such as Bayesian Optimization and AutoML/AutoAI.\
    \ This is the subject of Chapter 6 on AutoAI and we will leave a discussion of\
    \ the process until then.\n\nMachine (and Deep) Learning deployment is the focus\
    \ of Chapters 7 and 9 – essentially it is the process of deploying a model into\
    \ production, where `inference` is carried out on new data – running new data\
    \ through the model to obtain a prediction/forecast.\n\nInference is performed\
    \ in our last hands-on lab in this chapter and in essence is no different from\
    \ the test prediction step described in the Algorithmic Modeling section, only\
    \ in this case we are exposing new data to the trained model, instead of a sample\
    \ datapoint from the test set."
