  trans: "\n### 持续流程改进\n\n在人工智能项目中，我们究竟如何追踪生产力并衡量流程改进的基准？\n\n商业智能仪表盘非常适合报告 DataOps\
    \ 的关键绩效指标，尤其是在嵌入自动化编排来收集和展示指标的情况下。\n\n例如，可以构建一个 `CDO` 仪表盘来追踪和监控以下指标的进展：\n\n- **团队协作**\
    \ – 为每个团队项目创建“厨房”\n- **错误率** – 随着测试成熟度和测试数量的增加，错误率应随时间推移而下降\n- **生产力** – 通过测试数量和数据管道步骤（关键点）来衡量\n\
    - **部署** – 例如，追踪平均部署周期时间、服务等级协议违规趋势的减少\n- **测试** – 测试数量应随时间推移而增加，更稳健的质量控制也应日益普及\n\
    \n![](img/527966_1_En_9_Fig6_HTML.jpg)\n\n该水平条形图标题为龙卷风图。条形图的负侧表示为运营影响。条形图的正侧表示为解决所需的小时数。\n\
    \n**图 9-6** – DataKitchen 龙卷风图，展示生产问题的运营影响及其解决所需时间\n\n### 数据漂移\n\n任何用于交付和部署人工智能解决方案的持续改进周期，在面对部署后的接口/数据变化时也需要具备弹性，包括稳健的数据漂移缓解和模型重新训练。\n\
    \n模型性能随时间推移而下降通常归因于以下两者之一：(a) 数据（或协变量）漂移，或 (b) 概念漂移，即数据分布与原始训练集的分布出现显著偏差：\n\n\
    - **数据漂移** 指的是特征漂移，以及特征之间关系随时间变化的可能性\n- **概念漂移** 指的是目标变量的变化\n\n管理模型漂移的推荐方法是实施\
    \ DataOps/MLOps 最佳实践，并追踪底层数据的变化，包括特征之间的相关性，例如，可以在一个单独的 Python 追踪脚本中，或者在一个运营（而非战略/CDO）仪表盘中实现。\n\
    \n![](img/527966_1_En_9_Fig7_HTML.jpg)\n\n该图表绘制了准确率与月份的关系。一条虚线穿过图表，用于确定可接受的性能阈值。\n\
    \n**图 9-7** – 因数据漂移导致的模型随时间推移的性能下降（来源：[`www.kdnuggets.com`](http://www.kdnuggets.com)）\n\
    \n### 自动重新训练\n\n一旦我们开始追踪数据漂移，就需要实施一个流程来确保我们的模型保持有效/高性能。理想情况下，这应该是自动化的——要实现基于数据/模型漂移的自动重新训练流程，主要有两种选择：\n\
    \n**定时重新训练**\n\n1.  在每日结束流程中，从训练集中归档最旧的一天，并加入新一天的数据\n2.  每月（如果数据特别动态，则每天）安排一次重新训练流程\n\
    3.  评估新性能，并检查是否优于之前的运行\n4.  使用 `cron` 任务/任务调度器，或者例如 `AWS CloudWatch Event` 来触发数据准备、训练、评估和部署的\
    \ Step Function 编排\n\n**基于性能/动态重新训练**\n\n1.  收集新的每日训练数据\n2.  自动监控模型在生产环境中对新数据的性能，并判断其是否突然表现不佳\n\
    3.  测量平均预测值和标准差。如果预测值在特定时间间隔内下降 10%，或者超出例如 2 或 3 个标准差，则触发一个并行的重新训练运行\n4.  通过定时调度的\
    \ `AWS Lambda`/`Step Functions`，或 `IBM Watson Machine Learning` 持续学习来管理重新训练\n\
    5.  持续追踪所有历史重新训练运行（例如，使用 `Databricks` 中的 `MLFlow`），以确保性能（`fbeta`、`recall`/`precision`、`loss`/`accuracy`\
    \ 等）不会随时间推移而下降\n\n### 在 Heroku 上托管 – 端到端：动手实践\n\n从开发到生产\n\n我们的下一个实验将获取一个样板应用，并将其作为\
    \ Heroku 托管的应用程序推送到云端：\n\n1.  在 [`www.heroku.com/`](http://www.heroku.com/) 上注册\
    \ Heroku\n2.  在 Heroku 中创建一个新应用，区域选择欧洲，例如 `my-heroku-app`\n3.  安装 Heroku CLI\n\
    4.  克隆下方链接中的样板应用程序：\n\n    [`https://github.com/bw-cetech/apress-9.2.git`](https://github.com/bw-cetech/apress-9.2.git)\n\
    \n5.  按照第 7 章所述设置虚拟环境并安装依赖项\n6.  练习 – 尝试在本地运行该应用\n7.  在本地驱动器上 `cd` 进入克隆的应用后，在终端中使用\
    \ `heroku login` 登录 Heroku，然后按顺序输入以下命令推送到 Heroku：\n\n    ```\n    git status #\
    \ 本地仓库应已初始化\n    git add .\n    git commit -am \"updated python runtime to heroku\
    \ supported stack version 3.9.7\"\n    git push heroku master\n    ```\n\n8. \
    \ 最后，通过访问网址 [`https://my-heroku-app.herokuapp.com/`](https://my-heroku-app.herokuapp.com/)\
    \ 或在终端中输入 `heroku open` 来打开你的 Heroku 应用\n9.  练习：仍在终端中，尝试重命名你的应用\n\n## 赋能工程与基础设施\n\
    \n人员、流程和工具是任何最佳实践框架（包括将人工智能应用投入生产）的三大基石。从人工智能云栈开始，我们将在本小节中简要探讨如何将前几章讨论的一些工程和基础设施工具整合成一个连贯的人工智能解决方案。\n\
    \n### 人工智能生态系统 – 人工智能云栈\n\n如第 3 章所述，成功的人工智能需要端到端的云基础设施，尤其是用于处理大数据的敏捷（可扩展且弹性）服务，涵盖数据摄取、收集、处理、存储、查询到数据可视化。除了数据处理，“纵向扩展”的可扩展性和“横向扩展”的弹性是处理用户流量以及最终人工智能应用特定使用模式的关键支持资源需求。\n\
    \n无论我们的解决方案是由胖客户端应用还是瘦客户端提供，关键的存储（或数据），例如数据湖或 NoSQL 数据库，以及计算，例如虚拟机或 Apache Spark，都将服务于我们在开发和最终部署项目时所使用的基础人工智能服务和工具。图\
    \ 9-8 描述了这种人工智能支持基础设施的生态系统。\n\n![](img/527966_1_En_9_Fig8_HTML.jpg)\n\n图像上出现一组三个对话框，标题分别为人工智能服务、人工智能基础设施和人工智能工具。人工智能基础设施包含子标题人工智能数据和人工智能计算。\n\
    \n**图 9-8** – 人工智能生态系统：基础设施、工具和服务\n"
- fmt: "### Data Lake Deployment – Best Practice\n\nMany companies looking to implement\
    \ Enterprise AI today strive to architect a Data Lake that constantly refreshes\
    \ its multiple data streams yet optimizes performance and topology.\n\nNot every\
    \ company can [afford the cost of building a Data Lake](https://www.trellance.com/the-cost-of-building-a-data-warehouse-for-an-analytics-platform/),\
    \ but even if one single tool is out-of-reach, replicating as far as possible\
    \ a data lake architecture is the best way to achieve production-grade agility\
    \ while at the same time avoiding multiple (and often redundant) data flows to\
    \ and from resources such as data warehouses, relational and nonrelational databases,\
    \ big data engines, machine learning tools, and log files. To address these issues,\
    \ `dremio`, for example, recommend the following best practice design:\n\n- **Employ\
    \ a Data Lake-Centric Design** – view the data lake as the single source of truth\n\
    - **Separate Compute from Data** – achieve cost savings\n- **Minimize Data Copies**\
    \ – reducing governance overhead\n- **Determine a High-Level Data Lake Design\
    \ Pattern** – support user hierarchies and compliance\n- **Stay Open, Flexible,\
    \ and Portable** – keep architecture change/future-proof, support multicloud\n\
    \n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig9_HTML.jpg)\n\nThe wheel diagram\
    \ at the center reads AWS data lake. Seven points around read relational databases,\
    \ non-relational databases, machine learning, data warehouses, log analytics,\
    \ and big data processing.\n\n**Figure 9-9** – Data lake as a centralized single\
    \ source of truth (`dremio`)\n\n### Data Pipeline Operationalization and Orchestration\n\
    \nTo see how this might work in action, it's worth taking a look at a Case Study.\
    \ The below architecture, with Azure Data Lake Storage (`ADLS Gen2`) at its heart,\
    \ shows how a gaming company might run sophisticated analytics.^([^(141)](#fn141))\n\
    \nThe underlying business scenario is a gaming company collecting petabytes of\
    \ (user) data from game logs and wanting to analyze these logs to gain insights\
    \ into customer preferences, demographics, and usage behavior. Typically an on-prem\
    \ data store will hold reference/master data such as (sensitive) customer details,\
    \ game IDs, and marketing campaign data.\n\nSecondary goals for this company might\
    \ include identifying up-sell and cross-sell opportunities, developing compelling\
    \ new features, driving business growth, and providing a better customer experience\
    \ (`CX`).\n\nThe target architecture^([^(142)](#fn142)) in this case (Figure [9-10](#527966_1_En_9_Chapter.xhtml#Fig10))\
    \ uses Azure Data Factory (ideally suited for its cloud-based ETL and data integration\
    \ services) to (automatically) orchestrate data-driven workflows/pipelines, spin\
    \ up a Spark cluster (Azure HDInsight) feeding off `ADLS Gen2` (batch data) and\
    \ `Kafka` (streaming data), then publish transformed data into Azure SQL database\
    \ for downstream reporting.\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig10_HTML.jpg)\n\
    \nThe flowchart diagram shows two input data: historic/batch data and streaming\
    \ data. The first input flows as ingest, store, prep process, serve, and power\
    \ BI.\n\n**Figure 9-10** – Modern architecture for peta-scale data and analytics\
    \ handling (Azure)\n\n## Big Data Engines and Parallelization\n\nWe have already\
    \ looked at distributed processing and the use of clusters in earlier chapters\
    \ as well as Apache Spark as a Big Data processing engine in Chapter [5](#527966_1_En_5_Chapter.xhtml).\n\
    \nAs the de facto standard for distributed, scale-out data processing, Apache\
    \ Spark is naturally suited for AI applications that require (petascale) Big Data\
    \ processing, but its Scala-based syntax and usability, even via `PySpark` (Python\
    \ library/wrapper for implementing Apache Spark), is somewhat more complicated\
    \ than standard Python libraries like `pandas`.\n\nThere are however alternatives\
    \ to using Apache Spark directly, such as Koalas – which combines user-friendly\
    \ `pandas`-style dataframe manipulation with performant Apache Spark DataFrame\
    \ distribution^([^(143)](#fn143)).\n\n`Dask` – a platform for scaling Python which,\
    \ like Spark, can scale from single node to thousand-node clusters is another\
    \ alternative, which we will cover now.\n\n### Dask\n\n`Dask` has fewer features\
    \ than Spark and is smaller and therefore more lightweight than Spark. It also\
    \ lacks Spark’s high-level optimization of uniformly applied computations but\
    \ `Dask` does have its advantages:^([^(144)](#fn144))\n\n- Written in Python rather\
    \ than Scala\n- Strong integration with other Python libraries such as `Pandas`\
    \ and `Scikit-learn`\n- Python integration focus rather than Apache project-integration\n\
    - Moves computation to the data, rather than the other way around\n\n`Dask` works\
    \ with two key concepts: delayed/background execution and lazy execution for stacking\
    \ transformations/compute for parallel processing. We will look at both of these\
    \ in a hands-on lab below.\n\n### Leveraging S3 File Storage: Hands-on Practice\n\
    \n**Application File Stores with S3**\n\nUsing Python, the goal of this exercise\
    \ is to interface to one of the most important storage resources on cloud: Amazon\
    \ Simple Storage Service (`S3`):\n\n1. Clone files from the following GitHub link,\
    \ and unzip into a local directory:\n\n   `https://github.com/bw-cetech/apress-9.3.git`\n\
    \n2. Create a publicly accessible `S3` bucket called e.g. `my-s3-fs` in an AWS\
    \ region closest to you.\n\n3. Create AWS Access Keys and download:\n\n   `https://console.aws.amazon.com/iam/home?#/security_credentials`\n\
    \n4. Download the AWS CLI installer `https://awscli.amazonaws.com/AWSCLIV2.msi`\
    \ and install AWS Command Line Interface.\n\n5. Push (upload) your local files\
    \ to your `S3` bucket on AWS by following the steps below:\n   1. Open terminal\
    \ / command prompt.\n   2. Type `aws configure`.\n   3. Enter access and secret\
    \ key downloaded above.\n   4. Enter your Default AWS Region e.g. `eu-west-2`.\n\
    \   5. Specify default output format as `json`.\n   6. `cd` into folder where\
    \ the local (unzipped) files have been extracted.\n   7. Sync the data to your\
    \ `S3` bucket with:\n\n      `aws s3 sync . s3://pv-s3-fs`\n\n   The downloaded\
    \ GitHub data has now been pushed to AWS and is stored in your `S3` bucket.\n\n\
    6. **Exercise** – try to connect to `S3` from Python to download the images. Check\
    \ your answer with the notebook `AWS-S3-Download.ipynb` provided in the GitHub\
    \ link above.\n\n### Apache Spark Quick Start on Databricks: Hands-on Practice\n\
    \n**BIG IOT DATA PROCESSING WITH APACHE SPARK**\n\nIn this lab we revisit Databricks\
    \ and Apache Spark to compare runtimes on an IoT dataset.\n\n1. In Databricks\
    \ Community Edition [`https://community.cloud.databricks.com/login.xhtml`](https://community.cloud.databricks.com/login.xhtml)\
    \ create a blank notebook and spin up a Cluster.\n\n2. Following the steps in\
    \ the notebook below: [`https://community.cloud.databricks.com/?o=765164012049213#notebook/1443608314106734/command/3293421293983457`](https://community.cloud.databricks.com/%253Fo%253D765164012049213%2523notebook/1443608314106734/command/3293421293983457)\
    \ complete the steps as shown:\n   1. Import IoT data from the link below: [`https://raw.githubusercontent.com/dmatrix/examples/master/spark/databricks/notebooks/py/data/iot_devices.json`](https://raw.githubusercontent.com/dmatrix/examples/master/spark/databricks/notebooks/py/data/iot_devices.json)\n\
    \n      **NB:** due to the 61 MB file size, you may need to copy and paste the\
    \ JSON file contents into a `.txt` file and save locally as a JSON first.\n\n\
    \   2. Using Scala perform EDA and Wrangling on the dataset.\n   3. Query the\
    \ data using SQL.\n   4. Compare runtime Spark Cluster vs. Jupyter."
