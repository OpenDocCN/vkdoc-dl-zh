- fmt: "### Sample HR Solutions\n\nDashboards are everyone’s favorite analytics tool,\
    \ and especially for HR Execs, vital to cover various aspects of the employee\
    \ journey, including hiring KPIs, employee on-the-job metrics including workforce\
    \ productivity and remote working,^([^(125)](#fn125)) attendance^([^(126)](#fn126))\
    \ and disciplinary oversight as well as employee churn and company feedback.^([^(127)](#fn127))\n\
    \nOne of the best HR Dashboards on the market is from Agile Analytics – with 20+\
    \ descriptive and predictive `PowerBI` built-in reporting views.\n\nAs shown in\
    \ Figure [8-18](#527966_1_En_8_Chapter.xhtml#Fig18) there are multiple machine\
    \ learning applications including OCR, NLP, and text analytics applied to candidate\
    \ information (LinkedIn, CVs). Deep Learning can help with job description (JD)\
    \ scanning (or NLG-support JD creation) and drawing up employee contracts while\
    \ NLP-supported bias stripping can also help ensure equitable recruitment policies.\n\
    \n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig18_HTML.jpg)\n\nAn illustration\
    \ depicts the overview of an employee's lifecycle. It includes: hiring analysis,\
    \ performance analysis, absenteeism analysis, training analysis, and employee\
    \ attrition and termination.\n\n**Figure 8-18** HR Analytics (Agile Analytics)\n\
    \nNo/Lo code UIs are growing in popularity among HR managers, giving nontechnical,\
    \ intuitive access to predictive analytics and employee modeling. Chatbots and\
    \ IVAs can help with real-time “Employee Experience,” feedback on organizational\
    \ changes and company culture, take employee mood and sentiment “temperature-checks”\
    \ and identify potential employee attrition. Todays’ IVAs can also come with search\
    \ automation^([^(128)](#fn128)) and are integrated with back-end systems for,\
    \ for example, internal job vacancies or company policy retrieval.\n\nFor onboarding,\
    \ internal content personalization for employee professional development can be\
    \ supported with recommendation engines based on demographics, skillsets, and\
    \ psychometric scores. Anomaly detection can help identify amber or red flags\
    \ in employee attitudes and behavior.\n\n### HR Employee Attrition: Hands-on Practice\n\
    \n**Getting a Handle on Employee Churn**\n\nUsing Python in Jupyter Notebook,\
    \ the goal of this exercise is to run `AutoAI` to perform feature engineering\
    \ and algorithmic benchmarking on an employee attrition dataset:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig19_HTML.jpg)\n\
    \nAn illustration depicts the H R employee attrition and performance of auto A\
    \ I. It is based on feature transformers, pipelines, top algorithms, 90 percent\
    \ training data, 3 folds, and 100 percent hold out data.\n\n**Figure 8-19** Performing\
    \ `AutoAI` on Employee Attrition data with IBM Cloud Pak\n\n1.  Login to IBM Cloud\
    \ Pak at the link below and create a project\n\n    [https://​eu-gb.​dataplatform.​cloud.​ibm.​com/​home2?​context=​cpdaas](https://eu-gb.dataplatform.cloud.ibm.com/home2%253Fcontext%253Dcpdaas)\n\
    \n2.  Create an `AutoAI` experiment\n\n3.  Add the dataset `emp_attrition.csv`\n\
    \n4.  Configure the `AutoAI` experiment to predict employee attrition\n\n5.  View\
    \ performance of the model training process and test results\n\n6.  Implement\
    \ a Flask UI to run predictions for employee types\n\n7.  Exercise – test whether\
    \ the predictions make sense, for example, by entering data for an employee on\
    \ a relatively low monthly income, with limited years of service\n\n## Other Case\
    \ Studies\n\nOur final section in this chapter takes a look at the key areas ripe\
    \ for AI innovation within some of the other important industries and subsectors\
    \ we have thus far not mentioned.\n\n### Public Sector and Government\n\nEstimates\
    \ for the use of Artificial Intelligence in government varies market from $4.9b\
    \ in government^([^(129)](#fn129)) to a $1b Global AI governance market.^([^(130)](#fn130))\
    \ While ethics and risk aversion are the primary concern, governmental departments\
    \ are increasingly adopting data-led analytics and AI approaches to deliver public\
    \ services. Many of the same approaches are also used in the media for advertising\
    \ and gauging public perception.\n\nBesides key public engagement applications\
    \ such as dashboard-driven insights into sector performance and the public mood,\
    \ chatbot 2.0, IVAs and sentiment analysis for “voice of the public” and to provide\
    \ personalized public services, data project are often undertaken to help back\
    \ up or steer policy and to boost trust and public perception.\n\nAI adoption\
    \ is also helping Public Sector agencies and organizations to drive efficiency\
    \ improvements via, for example, document processing and automation, and tackle\
    \ a surge in fraudulent activity, aided by the proliferation of IoT devices. And\
    \ at the same time, more granular analytics for supporting policy planning and\
    \ development and productivity improvements are in evidence, including:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig20_HTML.jpg)\n\
    \nA representation of challenges for public sectors and government. It includes\
    \ planning (supply, consumer demand), public service delivery (buildings, resources),\
    \ and social mobility (healthcare disparities).\n\n**Figure 8-20** Challenges\
    \ for AI in Government\n\n*   Sectoral analysis, policy creation, planning and\
    \ delivery\n*   Admin and departmental process automation\n*   Policy document\
    \ retrieval and processing\n*   Anomaly detection including public fraud, health\
    \ issues, and the benefits system\n*   Econometrics Forecasts and Time Series\
    \ Analysis\n\n### Manufacturing\n\nMuch of the use of AI across Supply Chains\
    \ described earlier also covers manufacturing use cases with Manufacturing 4.0\
    \ intended to bring together IoT, cloud, and analytics to revolutionize the production\
    \ and distribution process.\n\nSafety stock levels, delivery schedules, supply\
    \ chain logistics, and underlying expenses are all optimized parameters under\
    \ an aspiring, if not functioning Smart Manufacturing Solution. Warehouse use\
    \ of blockchains is also increasing, with the intention of improving auditability\
    \ and making supply chains more efficient and reliable.\n\nAI simulation in theory\
    \ should help reduce product recalls by reducing manufacturing processes rigidity,\
    \ dynamically correcting product flaws and encouraging product improvisation.\
    \ Similarly knock-on impacts of equipment/machinery failures on delivery schedules,\
    \ budgets, and reputation are better managed today using AI applications. Predictive\
    \ Maintenance in particular, coupled with big (often IoT) data statistical analysis,\
    \ leads to better scheduled maintenance (without impacting delivery) and reducing\
    \ future failures.\n\nGiven this digital reliance and big data dependency, no\
    \ Manufacturing 4.0 solution today is complete without addressing cyber security\
    \ concerns – the subject of our next subsection.\n\n### Cybersecurity\n\nThere\
    \ is no greater challenge to business and organizations in 2022 than Cybersecurity.\n\
    \nThe Internet has well and truly penetrated into every industrial system today,\
    \ but at a local (production) level and across global supply chains. With it has\
    \ come a huge increase in risk of cyberattack from hackers trying to gain access\
    \ to information or worse, take control of sometimes highly strategic facilities\
    \ tied to national security. Besides critical Defense in Depth layers of security\
    \ and provision of robust firewalls, machine, and deep learning is being leveraged\
    \ to protect against these highly disruptive, real-time, dynamic cybersecurity\
    \ attacks.\n\nWe have already taken a look in Chapter [7](#527966_1_En_7_Chapter.xhtml)\
    \ at a cybersecurity use case in our hands-on lab looking at deploying an API\
    \ endpoint for a trained machine learning model trained to detect cybersecurity\
    \ DDoS attacks. Readers are referred back to that lab and in particular the model\
    \ training process (step 4) which shows how various network parameters are used\
    \ as features to identify patterns in network activity that might constitute,\
    \ for example, raindrop malware from a network intrusion event.^([^(131)](#fn131))"
