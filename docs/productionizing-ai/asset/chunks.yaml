- fmt: "### Creating a Word Cloud: Hands-on Practice\n\nZODIAC-STYLE CHINESE CHARACTER\
    \ WORD CLOUD\n\n**One of the simplest applications of NLP, widely used by marketing\
    \ teams across the globe, is a Word Cloud. Although basic, the techniques used\
    \ here are replicated in many of the high-profile industrial applications currently\
    \ in existence – this lab provides an introduction to those techniques:**\n\n\
    1.  Clone the GitHub repo below to your local drive:\n\n    [https://github.com/bw-cetech/apress-10.1.git](https://github.com/bw-cetech/apress-10.1.git)\n\
    \n2.  Go to your local folder where you have cloned the GitHub files and set up\
    \ a virtual environment using the commands below (one after the other):\n\n  \
    \  ```\n    python -m venv env\n    env\\Scripts\\Activate\n    ```\n\n3.  Run\
    \ the Python script in your virtual environment with\n\n    ```\n    python WordCloud_中文.py\n\
    \    ```\n\n    NB the Chinese characters in the name will not be rendered in\
    \ terminal but the above command will still run\n\n4.  If prompted, install the\
    \ dependencies one by one with\n\n    ```\n    pip install wordcloud\n    pip\
    \ install jieba\n    ```\n\n5.  A word cloud will generate with the Chinese characters\
    \ from the China Daily news extract provided in the GitHub folder\n\n6.  Exercise:\
    \ run the code using instead the English data example (pasta recipe)\n\n7.  Exercise:\
    \ replace the pig image template with a different Chinese zodiac image (use images\
    \ from, for example, [www.astrosage.com/chinese-zodiac/](http://www.astrosage.com/chinese-zodiac/))\n\
    \n8.  Exercise (stretch): update the code to generate the word cloud based on\
    \ the current Chinese Year (tiger, rabbit, dragon, etc.)\n\n## Preprocessing and\
    \ Linguistics\n\nBecause we are dealing with the most part with unstructured text\
    \ data, natural language processing is inextricably linked to linguistic structure.\n\
    \nWhether it’s taking source data and performing initial preprocessing and cleaning\
    \ tasks through the use of regular expressions, applying syntactic or semantic\
    \ analysis or implementing word embeddings to convert data into word vectors,\
    \ having an understanding of linguistics helps in both framing the journey from\
    \ a raw to model-ready data format and ultimately extracting insights.\n\nThis\
    \ section covers the key NLP concepts, referenced to linguists and broken down\
    \ as described in the NLP lifecycle.\n\n### Preprocessing/Initial Cleaning\n\n\
    #### Regular Expressions\n\nRegular expressions or “regex” are the bread and butter\
    \ of unstructured data “string” searches. Often employed as a first step after\
    \ scraping/data import, the idea is to quickly clean the data by searching for\
    \ specific patterns in the data that we want to remove. As tokenization and vectorization\
    \ naturally follow this step, the aim is to remove punctuation, symbols (such\
    \ as smiley faces or emoticons from text messages or hashtags from a tweet), and\
    \ special characters (such as currency symbols or brackets) that are unhelpful\
    \ for converting encoding text as word vectors.\n\nThe below example shows an\
    \ example implemented in Python – `re` is the library used\n\n```\nimport re\n\
    pattern = '^a...s$'\ntest_string = 'abyss'\nresult = re.match(pattern, test_string)\n\
    if result:\nprint(\"Search successful.\")\nelse:\nprint(\"Search unsuccessful.\"\
    )\n```\n\nThe `^` matches the start of the string, while the `$` matches the end\
    \ of the string, so in this case `Search successful` is returned\n\n#### Text\
    \ Stripping (e.g., HTML tags)\n\nPython comes with an abundance of built-in functions\
    \ which can simplify the process of cleaning unstructured data/searching for regular\
    \ expressions. Particularly useful for text “stripping” is the Python `.strip`\
    \ method. More sophisticated html stripping, to extract, for example, a news headline\
    \ from an html tag is performed using `.text.strip()` method chaining with the\
    \ `BeautifulSoup` library.\n\nThe `.split` function in Python is often applied\
    \ after stripping/cleaning underlying text data – `.split` effectively tokenizes\
    \ text into separate words.\n\n### Linguistics and Data Transformation\n\nAfter\
    \ preprocessing our data, while the unstructured data may be “clean” in the sense\
    \ that we have removed redundant characters, it is not yet in a state that can\
    \ be “vectorized” for modeling.\n\nAs with the data wrangling process in machine\
    \ and deep learning, a number of transformation steps are required to prepare\
    \ the unstructured data, each of which is underpinned by the linguistic structure\
    \ of the data. Broadly these are arranged into lexical, syntactic, and semantic\
    \ analysis steps.\n\n#### Lexical Analysis\n\nThe first of these steps, lexical\
    \ analysis refers to the process of conversion of the text data into its constituent\
    \ building blocks (words, characters, or symbols according to the underlying language).\n\
    \n##### Removing Stop Words\n\nStop words are often quite frequent words in a\
    \ sentence that add no value to the underlying meaning of a sentence. In most\
    \ cases they should be removed, but for specific applications such as machine\
    \ translation and text summarization they should be retained.\n\nWords such as\
    \ (`a`, `the`, `is`, `at`, etc.) are removed in Python using the stop words module\
    \ in the `nltk` library.\n\n##### Tokenization\n\nWe already mentioned one way\
    \ to parse text when stripping text during the preprocessing step. More commonly\
    \ tokenization is performed using one of the tokenize methods from the `NLTK`\
    \ library, typically `.word_tokenize` to split sentences into words, but depending\
    \ on the goal, phrase tokenization may be required such as in the German example\
    \ below:\n\n```\nimport nltk\ngerman_tokenizer = nltk.data.load('tokenizers/punkt/german.pickle')\n\
    german_tokens=german_tokenizer.tokenize('Wie geht es Ihnen?  Gut, danke.')\nprint(german_tokens)\n\
    ```\n\nThe above returns the question and answer:\n\n```\n['Wie geht es Ihnen?',\
    \ 'Gut, danke.']\n```\n\nPython-supported Hugging Face, the open source Data Science\
    \ platform is increasingly being used to scale tokenization processes on larger\
    \ datasets, reducing training time (as well as environmental impact) by fine-tuning\
    \ pretrained models rather than building from scratch.\n\n#### Syntactic Analysis\n\
    \nAfter obtaining our language building blocks from lexical analysis, the next\
    \ step is to transform the data using syntactic analysis; extracting logical meaning\
    \ from the text whilst considering rules of grammar.\n\n##### Switch to Lowercase\n\
    \nThe first step in syntactic analysis is to switch our data to lowercase using\
    \ the built-in Python function `lower()`. Because the same word in proper case\
    \ (`Hello`) and lowercase (`hello`) would be represented as two different words\
    \ in vector space model, applying the `lower()` function addresses sparsity, reduces\
    \ the dimensional problem we are solving and speeds up runtime."
  raw: "### Creating a Word Cloud: Hands-on Practice\n\nZODIAC-STYLE CHINESE CHARACTER\
    \ WORD CLOUD\n\n**One of the simplest applications of NLP, widely used by marketing\
    \ teams across the globe, is a Word Cloud. Although basic, the techniques used\
    \ here are replicated in many of the high-profile industrial applications currently\
    \ in existence – this lab provides an introduction to those techniques****:**\n\
    \n1.  Clone the GitHub repo below to your local drive:\n\n    [https://​github.​com/​bw-cetech/​apress-10.​1.​git](https://github.com/bw-cetech/apress-10.1.git)\n\
    \n2.  Go to your local folder where you have cloned the GitHub files and set up\
    \ a virtual environment using the commands below (one after the other):^([^(153)](#fn153))\n\
    \n    ```\n    python -m venv env\n    env\\Scripts\\Activate\n    ```\n\n3. \
    \ Run the Python script in your virtual environment with\n\n```\npython WordCloud_中文.py\n\
    ```\n\nNB the Chinese characters in the name will not be rendered in terminal\
    \ but the above command will still run\n\n1.  If prompted, install the dependencies\
    \ one by one with\n\n    ```\n    pip install wordcloud\n    pip install jieba\n\
    \    ```\n\n2.  A word cloud will generate with the Chinese characters from the\
    \ China Daily news extract provided in the GitHub folder\n\n3.  Exercise: run\
    \ the code using instead the English data example (pasta recipe)\n\n4.  Exercise:\
    \ replace the pig image template with a different Chinese zodiac image (use images\
    \ from, for example, [www.​astrosage.​com/​chinese-zodiac/​](http://www.astrosage.com/chinese-zodiac/))\n\
    \n5.  Exercise (stretch): update the code to generate the word cloud based on\
    \ the current Chinese Year (tiger, rabbit, dragon, etc.)\n\n## Preprocessing and\
    \ Linguistics\n\nBecause we are dealing with the most part with unstructured text\
    \ data, natural language processing is inextricably linked to linguistic structure.\n\
    \nWhether it’s taking source data and performing initial preprocessing and cleaning\
    \ tasks through the use of regular expressions, applying syntactic or semantic\
    \ analysis or implementing word embeddings to convert data into word vectors,\
    \ having an understanding of linguistics helps in both framing the journey from\
    \ a raw to model-ready data format and ultimately extracting insights.\n\nThis\
    \ section covers the key NLP concepts, referenced to linguists and broken down\
    \ as described in the NLP lifecycle.\n\n### Preprocessing/Initial Cleaning\n\n\
    #### Regular Expressions\n\nRegular expressions or “regex” are the bread and butter\
    \ of unstructured data “string” searches. Often employed as a first step after\
    \ scraping/data import, the idea is to quickly clean the data by searching for\
    \ specific patterns in the data that we want to remove. As tokenization and vectorization\
    \ naturally follow this step, the aim is to remove punctuation, symbols (such\
    \ as smiley faces or emoticons from text messages or hashtags from a tweet), and\
    \ special characters (such as currency symbols or brackets) that are unhelpful\
    \ for converting encoding text as word vectors.\n\nThe below example shows an\
    \ example implemented in Python – “re” is the library used^([^(154)](#fn154))\n\
    \n```\nimport re\npattern = '^a...s$'\ntest_string = 'abyss'\nresult = re.match(pattern,\
    \ test_string)\nif result:\nprint(\"Search successful.\")\nelse:\nprint(\"Search\
    \ unsuccessful.\")\n```\n\nThe “^” matches the start of the string, while the\
    \ “$” matches the end of the string, so in this case “Search successful” is returned\n\
    \n#### Text Stripping (e.g., HTML tags)\n\nPython comes with an abundance of built-in\
    \ functions which can simplify the process of cleaning unstructured data/searching\
    \ for regular expressions. Particularly useful for text “stripping” is the Python\
    \ .strip method. More sophisticated html stripping, to extract, for example, a\
    \ news headline from an html tag is performed using .text.strip() method chaining\
    \ with the BeautifulSoup library.\n\nThe .split function in Python is often applied\
    \ after stripping/cleaning underlying text data – .split effectively tokenizes\
    \ text into separate words.\n\n### Linguistics and Data Transformation\n\nAfter\
    \ preprocessing our data, while the unstructured data may be “clean” in the sense\
    \ that we have removed redundant characters, it is not yet in a state that can\
    \ be “vectorized” for modeling.\n\nAs with the data wrangling process in machine\
    \ and deep learning, a number of transformation steps are required to prepare\
    \ the unstructured data, each of which is underpinned by the linguistic structure\
    \ of the data. Broadly these are arranged into lexical, syntactic, and semantic\
    \ analysis steps.\n\n#### Lexical Analysis\n\nThe first of these steps, lexical\
    \ analysis refers to the process of conversion of the text data into its constituent\
    \ building blocks (words, characters, or symbols according to the underlying language).\n\
    \n##### Removing Stop Words\n\nStop words are often quite frequent words in a\
    \ sentence that add no value to the underlying meaning of a sentence. In most\
    \ cases they should be removed, but for specific applications such as machine\
    \ translation and text summarization they should be retained.\n\nWords such as\
    \ (“a,” “the,” “is,” “at,” etc. are removed in Python using the stop words module\
    \ in the nltk library.\n\n##### Tokenization\n\nWe already mentioned one way to\
    \ parse text when stripping text during the preprocessing step. More commonly\
    \ tokenization is performed using one of the tokenize methods from the NLTK library,\
    \ typically .word_tokenize to split sentences into words, but depending on the\
    \ goal, phrase tokenization may be required such as in the German example below:\n\
    \n```\nimport nltk\ngerman_tokenizer = nltk.data.load('tokenizers/punkt/german.pickle')\n\
    german_tokens=german_tokenizer.tokenize('Wie geht es Ihnen?  Gut, danke.')\nprint(german_tokens)\n\
    ```\n\nThe above returns the question and answer:\n\n```\n['Wie geht es Ihnen?',\
    \ 'Gut, danke.']\n```\n\nPython-supported Hugging Face,^([^(155)](#fn155)) the\
    \ open source Data Science platform is increasingly being used to scale tokenization\
    \ processes on larger datasets, reducing training time (as well as environmental\
    \ impact) by fine-tuning pretrained models rather than building from scratch.^([^(156)](#fn156))\n\
    \n#### Syntactic Analysis\n\nAfter obtaining our language building blocks from\
    \ lexical analysis, the next step is to transform the data using syntactic analysis;\
    \ extracting logical meaning from the text whilst considering rules of grammar.\n\
    \n##### Switch to Lowercase\n\nThe first step in syntactic analysis is to switch\
    \ our data to lowercase using the built-in Python function lower(). Because the\
    \ same word in proper case (“Hello”) and lowercase (“hello”) would be represented\
    \ as two different words in vector space model, applying the lower() function\
    \ addresses sparsity, reduces the dimensional problem we are solving and speeds\
    \ up runtime."
  trans: "\n### 创建词云：动手实践\n\n**十二生肖风格汉字词云**\n\n**NLP 最简单的应用之一，被全球营销团队广泛使用，就是词云。虽然基础，但这里使用的技术在许多当前存在的高知名度工业应用中都有复现——本实验将介绍这些技术：**\n\
    \n1.  将以下 GitHub 仓库克隆到本地驱动器：\n\n    [`github.com/bw-cetech/apress-10.1.git`](https://github.com/bw-cetech/apress-10.1.git)\n\
    \n2.  进入克隆了 GitHub 文件的本地文件夹，并使用以下命令（依次执行）设置虚拟环境：\n\n    ```\n    python -m venv\
    \ env\n    env\\Scripts\\Activate\n    ```\n\n3.  在虚拟环境中运行 Python 脚本，使用命令：\n\n\
    \    ```\n    python WordCloud_ 中文.py\n    ```\n\n    注意：名称中的中文字符在终端中不会正确显示，但上述命令仍可运行。\n\
    \n4.  如果系统提示，请逐一安装依赖项：\n\n    ```\n    pip install wordcloud\n    pip install\
    \ jieba\n    ```\n\n5.  将根据 GitHub 文件夹中提供的《中国日报》新闻摘录中的中文字符生成一个词云。\n\n6.  练习：改用英文数据示例（意大利面食谱）运行代码。\n\
    \n7.  练习：将猪的图像模板替换为另一个生肖图像（例如，使用来自 [www.astrosage.com/chinese-zodiac/](http://www.astrosage.com/chinese-zodiac/)\
    \ 的图片）。\n\n8.  练习（进阶）：更新代码，使其根据当前中国农历年份（虎年、兔年、龙年等）生成词云。\n\n## 预处理与语言学\n\n由于我们处理的大部分是非结构化文本数据，自然语言处理与语言结构密不可分。\n\
    \n无论是获取源数据并通过正则表达式执行初始预处理和清理任务，应用句法或语义分析，还是实现词嵌入以将数据转换为词向量，理解语言学都有助于规划从原始数据到模型就绪数据格式的路径，并最终提取洞察。\n\
    \n本节涵盖了关键的 NLP 概念，参考了语言学家的观点，并按照 NLP 生命周期中所述的方式进行分解。\n\n### 预处理/初始清理\n\n#### 正则表达式\n\
    \n正则表达式（或称“regex”）是非结构化数据“字符串”搜索的基本工具。通常在抓取/数据导入后作为第一步使用，其思路是通过搜索数据中我们想要移除的特定模式来快速清理数据。由于分词和向量化自然紧随此步骤，目标是移除对标点符号、符号（如短信中的笑脸或表情符号，或推文中的话题标签）以及特殊字符（如货币符号或括号）等对将编码文本转换为词向量无帮助的内容。\n\
    \n以下示例展示了在 Python 中的实现——`re` 是所使用的库：\n\n```\nimport re\npattern = '^a...s$'\n\
    test_string = 'abyss'\nresult = re.match(pattern, test_string)\nif result:\nprint(\"\
    Search successful.\")\nelse:\nprint(\"Search unsuccessful.\")\n```\n\n`^` 匹配字符串的开头，而\
    \ `$` 匹配字符串的结尾，因此在此例中返回 `Search successful`。\n\n#### 文本剥离（例如，HTML 标签）\n\nPython\
    \ 拥有大量内置函数，可以简化清理非结构化数据/搜索正则表达式的过程。对于文本“剥离”特别有用的是 Python 的 `.strip` 方法。更复杂的 HTML\
    \ 剥离，例如从 HTML 标签中提取新闻标题，是通过使用 `BeautifulSoup` 库进行 `.text.strip()` 方法链式调用来完成的。\n\
    \nPython 中的 `.split` 函数通常在剥离/清理底层文本数据后应用——`.split` 能有效地将文本分词为单独的单词。\n\n### 语言学与数据转换\n\
    \n在预处理数据之后，虽然非结构化数据可能已经“干净”（即我们移除了冗余字符），但它尚未处于可以“向量化”以用于建模的状态。\n\n与机器学习和深度学习中的数据整理过程一样，需要执行多个转换步骤来准备非结构化数据，每个步骤都基于数据的语言结构。这些步骤大致分为词法分析、句法分析和语义分析步骤。\n\
    \n#### 词法分析\n\n作为这些步骤中的第一步，词法分析指的是将文本数据转换为其构成基本单元（根据底层语言，可以是单词、字符或符号）的过程。\n\n\
    ##### 移除停用词\n\n停用词通常是句子中非常常见的词，它们对句子的基本含义没有增加价值。在大多数情况下，它们应该被移除，但对于机器翻译和文本摘要等特定应用，它们应该被保留。\n\
    \n诸如（`a`、`the`、`is`、`at` 等）之类的词在 Python 中使用 `nltk` 库中的停用词模块进行移除。\n\n##### 分词\n\
    \n我们已经在预处理步骤中提到了在剥离文本时解析文本的一种方法。更常见的是，使用 `NLTK` 库中的一种分词方法进行分词，通常是 `.word_tokenize`\
    \ 将句子拆分为单词，但根据目标，可能需要短语分词，如下面的德语示例所示：\n\n```\nimport nltk\ngerman_tokenizer =\
    \ nltk.data.load('tokenizers/punkt/german.pickle')\ngerman_tokens=german_tokenizer.tokenize('Wie\
    \ geht es Ihnen?  Gut, danke.')\nprint(german_tokens)\n```\n\n上述代码返回问题和答案：\n\n\
    ```\n['Wie geht es Ihnen?', 'Gut, danke.']\n```\n\nPython 支持的 Hugging Face，这个开源数据科学平台，正越来越多地被用于在更大数据集上扩展分词过程，通过微调预训练模型（而不是从头构建）来减少训练时间（以及环境影响）。\n\
    \n#### 句法分析\n\n在通过词法分析获得语言构建块之后，下一步是使用句法分析来转换数据；在考虑语法规则的同时从文本中提取逻辑含义。\n\n#####\
    \ 转换为小写\n\n句法分析的第一步是使用 Python 内置函数 `lower()` 将数据转换为小写。因为在向量空间模型中，首字母大写的相同单词（`Hello`）和小写单词（`hello`）会被表示为两个不同的单词，应用\
    \ `lower()` 函数可以解决稀疏性问题，减少我们正在解决的维度问题，并加快运行时间。\n"
- fmt: "# Part of Speech (POS) Tagging\n\n`POS` tagging is central to information\
    \ extraction, one of the key aims of an NLP solution mentioned in our first section.\
    \ Using the NLTK `.pos_tag` method, the process involves categorizing words according\
    \ to their grammatical form. The purpose of carrying out this task is to better\
    \ equip the subsequent deep learning modeling process with sequencing information\
    \ as to the probability of sequencing-specific words.\n\nThese probabilities are\
    \ determined by the frequency of certain grammatical forms (e.g., a verb or a\
    \ noun) following other grammatical forms (such as a verb)\n\n```\ntext = word_tokenize(\"\
    And now for something completely different\")\nnltk.pos_tag(text)\n```\n\nThe\
    \ output is a list of tuples:\n\n```\n[('And', 'CC'), ('now', 'RB'), ('for', 'IN'),\
    \ ('something', 'NN'),\n('completely', 'RB'), ('different', 'JJ')]\n```\n\nwhere:\
    \ ^([^(157)](#fn157))\n\n- `CC` is a coordinating conjunction\n- `RB` is an adverb,\
    \ like “occasionally” and “swiftly”\n- `IN` is a preposition/subordinating conjunction\n\
    - `NN` is a singular noun\n- `JJ` is a large adjective\n\nEssentially Markov Chains\
    \ are being employed here, indicating (as shown in Figure [10-4](#527966_1_En_10_Chapter.xhtml#Fig4))\
    \ the probability of a specific grammatical term following another word.\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig4_HTML.jpg)\n\
    \nA schematic diagram illustrates the Parts of Speech tagging that comprises Verb\
    \ and noun. An arrow directs to noun from verb has a number, 0.6 above it. There\
    \ is a curved arrow indicating 0.2 in the verb.\n\n**Figure 10-4** PoS Tagging\
    \ (Source: Towards Data Science)\n\n## Named Entity Recognition (NER)\n\nNamed\
    \ Entity Recognition is by some measures an application of Part of Speech tagging.\
    \ Often carried out after `POS` tagging, the idea is to identify topics from text\
    \ based on locating named entities in text. The process is particularly efficient\
    \ in the Python `spaCy` library,^([^(158)](#fn158)) where noun phrases can be\
    \ extracted quickly by recognizing a determiner, followed by adjective(s) and\
    \ then a noun, displaying a quick summary of the main entities as shown below:\n\
    \n![](images/527966_1_En_10_Chapter/527966_1_En_10_Figa_HTML.jpg)\n\nA set of\
    \ texts inside the square bracket reads the following. European, `NORP`, Google,\
    \ `ORG`, 5.1 billion dollars, Wednesday, Date, and Money.\n\nNLP applications\
    \ like all AI apps are highly domain-specific, and while `POS` tagging and `NER`\
    \ tasks can do the heavy lifting of annotating texts, they are always gaps with\
    \ certain lexical terms. As such, both `POS` and `NER` tagging are often supported\
    \ by a (manual) sector-specific entity curation and manual annotation process.\n\
    \nThe below example shows how this process works with IBM Watson Knowledge Catalogue,\
    \ where an approved group of subject matter experts are able to highlight words/terms\
    \ and define entity types.\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig5_HTML.jpg)\n\
    \nA screenshot of Watson knowledge studio application highlights a set of words\
    \ under 2004 49 168 A dot t x t file. There is a list of entity types at the right\
    \ side which includes, accident cause, condition, impact, manufacturer, model,\
    \ year, part, person, and vehicle.\n\n**Figure 10-5** Manual annotation in IBM\
    \ Watson Knowledge Catalogue\n\n## Handling Contractions\n\nContractions in NLP\
    \ refer to ensuring slang expressions are expanded to their full equivalent: I'll\
    \ = I will, You’d = You would, etc. The purpose in this case is similar to lower\
    \ casing in that removing contractions before vectorizing helps with dimensionality\
    \ reduction.\n\nContractions can be implemented using the `contractions` library\
    \ in Python.\n\n## Stemming\n\nStemming and lemmatization are closely coupled\
    \ text normalization subtasks in natural language processing. Many languages contain\
    \ words with the same underlying root or “stem” and stemming refers to the process\
    \ of shortening these words to their root form, regardless of meaning – essentially\
    \ here we are just stripping down the end characters to a common prefix, even\
    \ if the prefix itself does not standalone itself as a grammatical term.\n\nStemming\
    \ is useful for sentiment analysis as the stem word can convey negative or positive\
    \ sentiment.\n\nStemming is typically implemented using `nltk.stem`.\n\n# Semantic\
    \ Analysis\n\nOur final NLP transformation processes are essentially “semantic\
    \ analysis” steps – improving on the logical and grammatic tasks from syntactic\
    \ analysis, semantic analysis allows us to draw meaning from the underlying text\
    \ – interpreting whole texts and analyzing grammatical structure in order to identify\
    \ (context-specific) relationships between lexical terms. It is the final stage\
    \ in natural language processing prior to vectorization.\n\n## Lemmatization\n\
    \nIn contrast to stemming, lemmatization is “context-specific” and converts words\
    \ to a meaningful root form. The inflected form of a word is considered, so a\
    \ word such as “better” will be lemmatized as “good,” while “caring” would be\
    \ lemmatized as “care” (while stemming would result in “car”). While the `nltk.stem.PorterStemmer()`\
    \ function is used for stemming, lemmatization uses the `WordNetLemmatizer()`\
    \ function.\n\nEssentially an enhancement on stemming which considers semantics,\
    \ lemmatization is more commonly used in more sophisticated applications of sentiment\
    \ analysis, such as chatbots.\n\n## Disambiguation\n\nDisambiguation is the process\
    \ of determining the most probable meaning of a specific phrase when there is\
    \ underlying ambiguity in its definition. On its own a word such as “bank” has\
    \ several meanings,^([^(159)](#fn159)) the NLTK `WordNet` module allows us to\
    \ identify probabilistically the actual meaning from its usage in a broader text,\
    \ although Python also has a Word Sense Disambiguation wrapper (`pywsd`) which\
    \ works with NLTK.\n\n## N-grams\n\nThe NLTK library also comes with an `ngrams`\
    \ module. N-grams are a string of connected lexical terms – essentially a continuous\
    \ sequences of words or phrases. “N” here refers to the number of connected terms\
    \ or words we are referring to, a bigram (2-gram) would be “United States,” a\
    \ trigram “gross domestic product”. The order is important as in matching “red\
    \ apple” in a corpus, as opposed to “apple red.”\n\nN-grams are heavily used in\
    \ natural language processing as typically we are creating features from series\
    \ of words rather than individual words themselves\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Figb_HTML.jpg)\n\
    \nA series of words inside the parentheses reads the following. this, is, a. is,\
    \ a, very. a, very, good. very, good, book. good, book, to. book, to, study.\n\
    \n# Text Parsing with NLTK: Hands-on Practice\n\n**WRANGLING WIKIPEDIA: SPACEX**\n\
    \nBringing together some of the techniques described in this section, the goal\
    \ of this lab is to scrape typical unstructured web data (here the SpaceX Wikipedia\
    \ web page) and walk-through preprocessing and lexical analysis steps in order\
    \ to produce insights on word count:\n\n1.  Download the Jupyter notebook from\
    \ this GitHub repo:\n\n    [https://github.com/bw-cetech/apress-10.2.git](https://github.com/bw-cetech/apress-10.2.git)\n\
    \n2.  Run the steps:\n    1.  Libraries and Connect to web page\n    2.  Parse\
    \ the web page using Beautiful Soup\n    3.  Tokenize text\n    4.  Count word\
    \ frequency\n    5.  Plot word frequency\n\n3.  Exercise – plot word frequency\
    \ as a bar plot rather than a line plot\n\n4.  Exercise – continue the notebook\
    \ analysis by performing further syntactic and semantic data cleansing/grouping\
    \ steps^([^(160)](#fn160))"
  raw: "##### Part of Speech (POS) Tagging\n\nPOS tagging is central to information\
    \ extraction, one of the key aims of an NLP solution mentioned in our first section.\
    \ Using the NLTK .pos_tag method, the process involves categorizing words according\
    \ to their grammatical form. The purpose of carrying out this task is to better\
    \ equip the subsequent deep learning modeling process with sequencing information\
    \ as to the probability of sequencing-specific words.\n\nThese probabilities are\
    \ determined by the frequency of certain grammatical forms (e.g., a verb or a\
    \ noun) following other grammatical forms (such as a verb)\n\n```\ntext = word_tokenize(\"\
    And now for something completely different\")\nnltk.pos_tag(text)\n```\n\nThe\
    \ output is a list of tuples:\n\n```\n[('And', 'CC'), ('now', 'RB'), ('for', 'IN'),\
    \ ('something', 'NN'),\n('completely', 'RB'), ('different', 'JJ')]\n```\n\nwhere:\
    \ ^([^(157)](#fn157))\n\nCC is a coordinating conjunction\n\nRB is an adverb,\
    \ like “occasionally” and “swiftly”\n\nIN is a preposition/subordinating conjunction\n\
    \nNN is a singular noun\n\nJJ is a large adjective\n\nEssentially Markov Chains\
    \ are being employed here, indicating (as shown in Figure [10-4](#527966_1_En_10_Chapter.xhtml#Fig4))\
    \ the probability of a specific grammatical term following another word.\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig4_HTML.jpg)\n\
    \nA schematic diagram illustrates the Parts of Speech tagging that comprises Verb\
    \ and noun. An arrow directs to noun from verb has a number, 0.6 above it. There\
    \ is a curved arrow indicating 0.2 in the verb.\n\nFigure 10-4\n\nPoS Tagging\
    \ (Source: Towards Data Science)\n\n##### Named Entity Recognition (NER)\n\nNamed\
    \ Entity Recognition is by some measures an application of Part of Speech tagging.\
    \ Often carried out after POS tagging, the idea is to identify topics from text\
    \ based on locating named entities in text. The process is particularly efficient\
    \ in the Python spaCy library,^([^(158)](#fn158)) where noun phrases can be extracted\
    \ quickly by recognizing a determiner, followed by adjective(s) and then a noun,\
    \ displaying a quick summary of the main entities as shown below:\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Figa_HTML.jpg)\n\
    \nA set of texts inside the square bracket reads the following. European, N O\
    \ R P, Google, O R G, 5.1 billion dollars, Wednesday, Date, and Money.\n\nNLP\
    \ applications like all AI apps are highly domain-specific, and while POS tagging\
    \ and NER tasks can do the heavy lifting of annotating texts, they are always\
    \ gaps with certain lexical terms. As such, both POS and NER tagging are often\
    \ supported by a (manual) sector-specific entity curation and manual annotation\
    \ process.\n\nThe below example shows how this process works with IBM Watson Knowledge\
    \ Catalogue, where an approved group of subject matter experts are able to highlight\
    \ words/terms and define entity types.\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig5_HTML.jpg)\n\
    \nA screenshot of Watson knowledge studio application highlights a set of words\
    \ under 2004 49 168 A dot t x t file. There is a list of entity types at the right\
    \ side which includes, accident cause, condition, impact, manufacturer, model,\
    \ year, part, person, and vehicle.\n\nFigure 10-5\n\nManual annotation in IBM\
    \ Watson Knowledge Catalogue\n\n##### Handling Contractions\n\nContractions in\
    \ NLP refer to ensuring slang expressions are expanded to their full equivalent:\
    \ I'll = I will, You’d = You would, etc. The purpose in this case is similar to\
    \ lower casing in that removing contractions before vectorizing helps with dimensionality\
    \ reduction.\n\nContractions can be implemented using the contractions library\
    \ in Python.\n\n##### Stemming\n\nStemming and lemmatization are closely coupled\
    \ **text normalization** subtasks in natural language processing. Many languages\
    \ contain words with the same underlying root or “stem” and stemming refers to\
    \ the process of shortening these words to their root form, regardless of meaning\
    \ – essentially here we are just stripping down the end characters to a common\
    \ prefix, even if the prefix itself does not standalone itself as a grammatical\
    \ term.\n\nStemming in useful for sentiment analysis as the stem word can convey\
    \ negative or positive sentiment.\n\nStemming is typically implemented using nltk.stem.\n\
    \n#### Semantic Analysis\n\nOur final NLP transformation processes are essentially\
    \ “semantic analysis” steps – improving on the logical and grammatic tasks from\
    \ syntactic analysis, semantic analysis allows us to draw meaning from the underlying\
    \ text – interpreting whole texts and analyzing grammatical structure in order\
    \ to identify (context-specific) relationships between lexical terms. It is the\
    \ final stage in natural language processing prior to vectorization.\n\n#####\
    \ Lemmatization\n\nIn contrast to stemming, lemmatization is “context-specific”\
    \ and coverts words to a meaningful root form. The inflected form of a word is\
    \ considered, so a word such as “better” will be lemmatized as “good,” while “caring”\
    \ would be lemmatized as “care” (while stemming would result in “car”). While\
    \ the nltk.stem PorterStemmer() function is used for stemming, lemmatization uses\
    \ the WordNetLemmatizer() function.\n\nEssentially an enhancement on stemming\
    \ which considers semantics, lemmatization is more commonly used in more sophisticated\
    \ applications of sentiment analysis, such as chatbots.\n\n##### Disambiguation\n\
    \nDisambiguation is the process of determining the most probable meaning of a\
    \ specific phrase when there is underlying ambiguity in its definition. On its\
    \ own a word such as “bank” has several meanings,^([^(159)](#fn159)) the NLTK\
    \ WordNet module allows us to identify probabilistically the actual meaning from\
    \ its usage in a broader text, although Python also has a Word Sense Disambiguation\
    \ wrapper (pywsd) which works with NLTK.\n\n##### N-grams\n\nThe NLTK library\
    \ also comes with an ngrams module. N-grams are a string of connected lexical\
    \ terms – essentially a continuous sequences of words or phrases. “N” here refers\
    \ to the number of connected terms or words we are referring to, a bigram (2-gram)\
    \ would be “United States,” a trigram “gross domestic product”. The order is important\
    \ as in matching “red apple” in a corpus, as opposed to “apple red.”\n\nN-grams\
    \ are heavily used in natural language processing as typically we are creating\
    \ features from series of words rather than individual words themselves\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Figb_HTML.jpg)\n\
    \nA series of words inside the parentheses reads the following. this, is, a. is,\
    \ a, very. a, very, good. very, good, book. good, book, to. book, to, study.\n\
    \n### Text Parsing with NLTK: Hands-on Practice\n\nWRANGLING WIKIPEDIA: SPACEX\n\
    \n**Bringing together some of the techniques described in this section, the goal\
    \ of this lab is to scrape typical unstructured web data (here the SpaceX Wikipedia\
    \ web page) and walk-through preprocessing and lexical analysis steps in order**\
    \ **to produce insights on word count:**\n\n1.  Download the Jupyter notebook\
    \ from this GitHub repo:\n\n    [https://​github.​com/​bw-cetech/​apress-10.​2.​git](https://github.com/bw-cetech/apress-10.2.git)\n\
    \n2.  Run the steps:\n    1.  Libraries and Connect to web page\n\n    2.  Parse\
    \ the web page using Beautiful Soup\n\n    3.  Tokenize text\n\n    4.  Count\
    \ word frequency\n\n    5.  Plot word frequency\n\n3.  Exercise – plot word frequency\
    \ as a bar plot rather than a line plot\n\n4.  Exercise – continue the notebook\
    \ analysis by performing further syntactic and semantic data cleansing/grouping\
    \ steps^([^(160)](#fn160))"
  trans: "\n# 词性标注\n\n`POS`标注是信息提取的核心，也是我们在第一节中提到的 NLP 解决方案的关键目标之一。使用 NLTK 的 `.pos_tag`\
    \ 方法，该过程涉及根据单词的语法形式对其进行分类。执行此任务的目的是为了更好地为后续的深度学习建模过程提供关于特定词序列概率的序列信息。\n\n这些概率是由特定语法形式（例如动词或名词）出现在其他语法形式（例如动词）之后的频率决定的。\n\
    \n```\ntext = word_tokenize(\"And now for something completely different\")\n\
    nltk.pos_tag(text)\n```\n\n输出是一个元组列表：\n\n```\n[('And', 'CC'), ('now', 'RB'), ('for',\
    \ 'IN'), ('something', 'NN'),\n('completely', 'RB'), ('different', 'JJ')]\n```\n\
    \n其中：^(¹⁵⁷)\n\n- `CC` 是并列连词\n- `RB` 是副词，例如“occasionally”和“swiftly”\n- `IN` 是介词/从属连词\n\
    - `NN` 是单数名词\n- `JJ` 是大型形容词\n\n本质上，这里使用了马尔可夫链，表明（如图 10-4 所示）一个特定语法术语出现在另一个词之后的概率。\n\
    \n![](img/527966_1_En_10_Fig4_HTML.jpg)\n\n一张示意图展示了包含动词和名词的词性标注。从动词指向名词的箭头上方有一个数字\
    \ 0.6。动词处有一个弯曲箭头，指示为 0.2。\n\n**图 10-4** 词性标注（来源：Towards Data Science）\n\n## 命名实体识别\n\
    \n从某些角度来看，命名实体识别是词性标注的一种应用。通常在 `POS` 标注之后进行，其思想是通过定位文本中的命名实体来识别文本主题。该过程在 Python\
    \ 的 `spaCy` 库中特别高效，^(¹⁵⁸) 通过识别限定词，后跟形容词，再跟名词，可以快速提取名词短语，并显示主要实体的快速摘要，如下所示：\n\n\
    ![](img/527966_1_En_10_Figa_HTML.jpg)\n\n方括号内的一组文本内容如下：European, `NORP`, Google,\
    \ `ORG`, 5.1 billion dollars, Wednesday, Date, and Money。\n\n像所有 AI 应用一样，NLP 应用具有高度的领域特异性，虽然\
    \ `POS` 标注和 `NER` 任务可以承担文本标注的重任，但某些词汇术语总是存在差距。因此，`POS` 和 `NER` 标注通常都辅以（手动的）特定领域实体整理和手动标注过程。\n\
    \n下面的示例展示了此过程如何与 IBM Watson Knowledge Catalogue 配合工作，其中一组经批准的领域专家能够高亮单词/术语并定义实体类型。\n\
    \n![](img/527966_1_En_10_Fig5_HTML.jpg)\n\n一张 Watson Knowledge Studio 应用程序的截图高亮显示了\
    \ 2004 49 168 A . t x t 文件下的一组单词。右侧有一个实体类型列表，包括：事故原因、状况、影响、制造商、型号、年份、部件、人员、车辆。\n\
    \n**图 10-5** IBM Watson Knowledge Catalogue 中的手动标注\n\n## 处理缩略形式\n\nNLP 中的缩略形式指的是确保俚语表达被扩展为其完整等价形式：I'll\
    \ = I will, You’d = You would 等。此处的目的类似于小写化，即在向量化之前移除缩略形式有助于降维。\n\n可以使用 Python\
    \ 中的 `contractions` 库来实现缩略形式的处理。\n\n## 词干提取\n\n词干提取和词形还原是自然语言处理中紧密耦合的文本规范化子任务。许多语言包含具有相同底层词根或“词干”的单词，词干提取指的是将这些单词缩短为其词根形式的过程，而不考虑其含义——本质上，我们只是将末尾字符剥离到一个共同的前缀，即使该前缀本身不能独立作为一个语法术语。\n\
    \n词干提取对于情感分析很有用，因为词干可以传达负面或正面的情感。\n\n词干提取通常使用 `nltk.stem` 来实现。\n\n# 语义分析\n\n我们最后的\
    \ NLP 转换过程本质上是“语义分析”步骤——在句法分析的逻辑和语法任务基础上进行改进，语义分析使我们能够从底层文本中提取含义——解释整个文本并分析语法结构，以识别词汇术语之间的（上下文特定的）关系。这是自然语言处理在向量化之前的最后阶段。\n\
    \n## 词形还原\n\n与词干提取相反，词形还原是“上下文特定的”，并将单词转换为有意义的词根形式。它考虑了单词的屈折形式，因此像“better”这样的单词会被词形还原为“good”，而“caring”会被词形还原为“care”（而词干提取会得到“car”）。词干提取使用\
    \ `nltk.stem.PorterStemmer()` 函数，而词形还原使用 `WordNetLemmatizer()` 函数。\n\n本质上，词形还原是对词干提取的增强，它考虑了语义，更常用于更复杂的情感分析应用，例如聊天机器人。\n\
    \n## 词义消歧\n\n词义消歧是在特定短语的定义存在潜在歧义时，确定其最可能含义的过程。单独来看，像“bank”这样的单词有多个含义，^(¹⁵⁹) NLTK\
    \ 的 `WordNet` 模块允许我们根据其在更广泛文本中的用法，以概率方式识别其实际含义，尽管 Python 也有一个词义消歧包装器（`pywsd`），它可以与\
    \ NLTK 一起使用。\n\n## N-gram\n\nNLTK 库还附带了一个 `ngrams` 模块。N-gram 是一串相连的词汇术语——本质上是单词或短语的连续序列。这里的“N”指的是我们所说的相连术语或单词的数量，一个二元组（2-gram）是“United\
    \ States”，一个三元组是“gross domestic product”。顺序很重要，例如在语料库中匹配“red apple”与“apple red”是不同的。\n\
    \nN-gram 在自然语言处理中被大量使用，因为我们通常是从单词序列而不是单个单词本身来创建特征。\n\n![](img/527966_1_En_10_Figb_HTML.jpg)\n\
    \n括号内的一系列单词内容如下：this, is, a. is, a, very. a, very, good. very, good, book. good,\
    \ book, to. book, to, study.\n\n# 使用 NLTK 进行文本解析：动手实践\n\n**整理维基百科：SpaceX**\n\n\
    结合本节中描述的一些技术，本实验的目标是抓取典型的非结构化网络数据（此处为 SpaceX 的维基百科页面），并逐步执行预处理和词法分析步骤，以生成关于词频的洞察：\n\
    \n1.  从此 GitHub 仓库下载 Jupyter notebook：\n\n    [`github.com/bw-cetech/apress-10.2.git`](https://github.com/bw-cetech/apress-10.2.git)\n\
    \n2.  运行以下步骤：\n    1.  导入库并连接到网页\n    2.  使用 Beautiful Soup 解析网页\n    3.  对文本进行分词\n\
    \    4.  统计词频\n    5.  绘制词频图\n\n3.  练习——将词频绘制为条形图而非折线图\n\n4.  练习——继续 notebook\
    \ 分析，执行进一步的句法和语义数据清洗/分组步骤^(¹⁶⁰)\n"
- fmt: '## Text Vectorization, Word Embeddings, and Modelling in NLP


    In the last section, we looked at specific linguistic/transformation processes
    undertaken in order to extract lexical, syntactic, and semantic aspects of the
    underlying unstructured data. Having established a process for preparing our data
    and implementing it, the focus shifts to the “encoding” or **text vectorization**
    process and deep learning modeling.


    The first part of this next stage in the NLP lifecycle is to create *numeric*
    features from the text data using text vectorization and word embedding.^([^(161)](#fn161))
    It is followed by a look at the main NLP modeling practices utilized in production-grade
    applications in 2022, rather than an exhaustive analysis of the entire ecosystem
    of techniques being applied.


    On occasion, we reference specific tools and libraries which are described subsequently
    in our last section in this chapter.


    ![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig6_HTML.jpg)


    A diagram of the Natural Language Processing roadmap comprises 5 major models,
    which are basic, task, distributed representation, encoder, decoder, and language
    model. They further associate with a set of processes and other sub models.


    Figure 10-6


    Natural Language Processing Roadmap (GitHub)^([^(162)](#fn162))


    ### Rule-Based/Frequency-Based Embedding


    We start with simpler “frequency”- or “rule”-based approaches to vectorizing/encoding
    our data.


    #### One Hot Encoding and Count Vectorization


    One hot encoding methods should be familiar to readers from machine learning where
    nominal categorical text fields (i.e., those where the values have no inherent
    order^([^(163)](#fn163))) are transformed by creating a new column for each separate
    value in the column.


    One hot encoding may be simple to implement and works well for binary or discrete
    variables but when considering the almost infinite permutations of lexical terms
    in a large corpus of text, as well as the possibility of storing N-grams, not
    just single words, the number of features involved quickly becomes unmanageable.
    Each word is encoded as a one hot “vector,” so that a sentence becomes an array
    of vectors, and a passage of text an array of matrices (so a tensor).


    Count vectorization takes one hot encoded terms as columns in a **document term
    matrix** and counts up the number of occurrences before storing nonnull values
    for onward text summarization.


    #### Bag of Words (BoW)


    Bag of Words is one of the simplest and most well-known methods to encode text
    data as fixed-length vectors – it is more or less the same as one hot encoding
    applied to an entire document and uses simple `numpy` (or `pandas`) methods to
    encode text.


    After collecting the data (consider a news feed with several articles), unique
    words are first extracted and counted (or hashed^([^(164)](#fn164))).


    The number of unique words determines the vector size for specific **documents**
    (here news articles) within the data. Each news article can then be represented
    as a unique boolean vector where each unique word is encoded as either 0 or 1
    depending on whether the word appears in the news article.


    Ultimately, there are many drawbacks with the BoW method in that there is no syntactic
    or semantic consideration for the order of the words or the context of the words
    and ultimately we end up with a huge sparsity problem from many documents containing
    no occurrences of less frequent words.


    #### Latent Semantic Analysis (LSA)


    LSA is an extension of the bag of words approach above which uses singular value
    decomposition (SVD)^([^(165)](#fn165)) to reduce data dimensions and thus sparsity.
    LSA takes a dataset of `m` documents and `n` words (**document-term matrix**)
    and remodels the text data in terms of `r` latent^([^(166)](#fn166)) features,
    where `r` is less than the number of documents we have.


    #### TF-IDF


    Otherwise known as Term frequency–Inverse document frequency, TF-IDF attempts
    to address the inherent weaknesses of the bag of words method by employing a numerical
    statistic to reflect how important a word is to a document in a collection/corpus.


    `TF` here refers to how frequently a term appears in the document, but it is the
    `IDF` element, which measures how “important” that term is which distinguishes
    the method from the Bag-of-words model. For any specific word, its `IDF` is the
    log of the number of documents divided by the number of documents in which that
    word appears, so a word like “the” will have a low score as it will appear in
    all documents, and `log(1)` is zero.^([^(167)](#fn167))


    `TF-IDF` is the product of the Term Frequency and `IDF` score and tends to weight
    higher both ((a) words which are frequent in a single document and b) less frequent/rare
    words over the entire collection.


    For all its advantages over the BoW model, these deterministic, frequency-based
    approaches are unable to scale to interpreting “context” – for these we need word
    embeddings.


    #### A Word on Cosine Similarity


    Whether it''s BoW, LSA, or TF-IDF, cosine similarity is typically used for measuring
    similarity of documents in Word Embeddings.


    The measure is an enhancement on the simple Euclidean distance measure (straight
    line distance between two points) as word embeddings incorporate frequency of
    words in documents.


    Two similar terms (e.g., “foul” and “infringement” in a football referee report)
    may be far apart in n-dimensional space by virtue of one word (“infringement”)
    having a much lower occurrence in the document. Because cosine similarity measures
    the angle between the vector representation of these words, disregarding the magnitude
    of the vector, we manage to retain the concept of “sameness” as the angle between
    the words is small.'
