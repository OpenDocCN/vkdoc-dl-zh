    \ – gender, age, address/city\n\n*   **Behavioral** – customer journey and browsing\
    \ patterns including pages visited, time spent, device usage, likes, reviews,\
    \ social media commentary, keywords used\n\nTransactional and demographic data\
    \ are long-established value levers, but in 2022, more sophisticated mining of\
    \ customer journey and behavioral data, often unstructured, is what differentiates\
    \ high-value retail organizations."
  trans: "\n# Dash 入门：动手实践\n\n使用 DASH 部署物联网应用\n\n本练习的目标是利用 GitHub 上的示例 **Dash 应用**模板，克隆一个物联网应用的源代码并在本地运行。本实验包含一系列拓展练习，涉及编辑源代码、使用\
    \ Dash 回调函数以及将 Dash 应用部署到 Heroku，以进一步积累 Dash 的使用经验：\n\n1.  我们将克隆下方链接中展示的应用：\n\n\
    \    [`https://dash-gallery.plotly.host/dash-manufacture-spc-dashboard/`](https://dash-gallery.plotly.host/dash-manufacture-spc-dashboard/)\n\
    \n2.  访问 [`https://github.com/dkrizman/dash-manufacture-spc-dashboard`](https://github.com/dkrizman/dash-manufacture-spc-dashboard)，点击绿色按钮下载包含源代码的\
    \ zip 文件\n\n3.  将解压后的文件夹放到本地驱动器的合适位置\n\n4.  将 `app.py` 文件中的代码复制到记事本，并另存为 `app.ipynb`\n\
    \n5.  打开新的 Jupyter notebook，将最后一行的 `Debug = True` 改为 `Debug = False`，然后尝试运行。注意：你可能需要先在第一个代码单元格中运行（然后注释掉）`%pip\
    \ install dash_daq` 来安装 `dash_daq`。\n\n6.  点击“Proceed to measurement”查看典型的物联网传感器数据流指标。点击“stop”停止数据流。\n\
    \n    练习（拓展）：克隆 GitHub 链接 [`https://github.com/bw-cetech/apress-7.2.git`](https://github.com/bw-cetech/apress-7.2.git)\
    \ 中的 Jupyter notebook `Dash-Jupyter-getting_started.ipynb`，并在本地运行代码。尝试：\n    1.\
    \  更改散点图中显示的颜色\n    2.  增大图表尺寸\n    3.  将折线图改为柱状图\n\n7.  练习（拓展）：从 [`https://github.com/bw-cetech/apress-7.2.git`](https://github.com/bw-cetech/apress-7.2.git)\
    \ 克隆 `Dash-InteractiveChart.ipynb`，并将图表改为欧洲图表\n\n8.  练习（拓展）：尝试将物联网应用部署到 Heroku\n\
    \n## Flask：动手实践\n\n部署 FLASK 仪表板\n\n在本实验中，我们将从 GitHub 上的一个模板开始，创建一个虚拟环境，安装一些 Python\
    \ 依赖项，并创建一个 **Flask 仪表板**\n\n1.  将下方链接中的源代码克隆到本地驱动器\n\n    [`https://github.com/app-generator/flask-black-dashboard.git`](https://github.com/app-generator/flask-black-dashboard.git)\n\
    \n2.  使用合适的集成开发环境（IDE），如 IDLE 或 Visual Studio，打开 Powershell 并创建一个虚拟环境\n\n3.  执行以下命令安装\
    \ requirements 文件中列出的依赖项：\n\n    ```\n    pip install -r requirements.txt\n  \
    \  ```\n\n4.  使用以下命令（在命令提示符/终端中）运行应用：\n\n    ```\n    flask run --host=0.0.0.0\
    \ --port=5000\n    ```\n\n5.  练习 – 尝试为应用添加身份验证功能\n\n6.  拓展：更改左侧菜单的字体和字号，并用不同的数据集替换“Daily\
    \ Sales”图表\n\n## Django 入门：动手实践\n\nDJANGO 应用开发\n\n继之前的 Dash 和 Flask 实验之后，本练习的目标是让我们熟悉另一个\
    \ Python 前端（Web）框架：**Django**\n\n1.  设置一个虚拟环境\n\n2.  在虚拟环境中安装 Django（注意：首先使用 `py\
    \ -m django --version` 检查是否已安装）\n\n3.  通过 `cd` 命令进入 `mysite` 文件夹，然后运行以下命令启动应用：\n\
    \n    ```\n    python manage.py runserver\n    ```\n\n4.  按照下方教程链接中的步骤创建一个投票应用，本实验的剩余部分也将遵循该教程：\n\
    \n    [`https://docs.djangoproject.com/en/3.2/intro/tutorial01/`](https://docs.djangoproject.com/en/3.2/intro/tutorial01/)\n\
    \n5.  按照教程中的步骤“编写你的第一个视图”\n\n    练习：尝试按照教程下一页的说明完成“编写你的第一个 Django 应用，第二部分”。确保完成以下步骤，以理解应用如何与仪表板底层数据存储交互，以及如何管理应用开发过程：\n\
    \n    -   设置虚拟环境\n    -   创建一个简单的投票应用\n    -   创建 SQLite 表\n    -   使用 Django\
    \ API\n    -   管理后台\n    -   在“轻量级”SQLite 数据库中创建表\n    -   创建数据库模型并激活\n    - \
    \  使用 API\n    -   创建管理员用户并探索功能\n\n## 机器学习应用\n\n现在，我们将注意力转向当今组织和企业中开发和部署的具体机器学习和深度学习应用。\n\
    \n由于我们已经在第一章中介绍了人工智能应用的高级概述，本节将重点介绍这些应用在组织中是如何构建的，以及所使用的工具。具体的“行业视角”将在下一章关于人工智能案例研究的内容中介绍。\n\
    \n### 开发机器学习应用\n\n如今，几乎所有的组织和企业都希望通过可实施的机器学习解决方案来构建人工智能战略。驱动因素多种多样，尽管实际应用本身往往集中在相对较小的一部分监督学习和无监督学习问题上。解决方案的独特性更多地体现在为建模结果而进行的定制化数据使用和特征工程中。\n\
    \n![](img/527966_1_En_7_Fig11_HTML.jpg)\n\n一幅插图展示了机器学习应用的开发过程。它包括：无监督学习、聚类、降维、分类、监督学习以及回归及其特征。\n\
    \n**图 7-11** 按技术分类的机器学习应用（来源：福布斯）\n\n下表虽非详尽无遗，但描述了驱动企业的因素、企业正在使用的应用，以及为完成任务通常调用的数据支持者和数据源。显而易见的是，构建组织问题框架并记录交付计划是成功实施机器学习的关键——最佳实践是在许多迭代过程中拥抱持续改进：从问题框架构建，到数据收集与清洗、探索性数据分析与数据准备、特征工程、模型训练、评估与基准测试、推理与数据漂移。\n\
    \n![](img/527966_1_En_7_Fig12_HTML.jpg)\n\n一幅插图展示了机器学习在商业案例中的开发过程。它包括：1. 驱动因素。2.\
    \ 机器学习应用。3. 数据源与支持者，以及它们各自的特征列表。\n\n**图 7-12** 机器学习——商业案例\n\n### 客户体验\n\n如今，大多数企业都致力于通过预测建模，并直接在模型训练过程中使用客户反馈，来定制和改善**客户体验（CX）**，从而提升品牌权威性。\n\
    \n机器学习在客户体验方面的经典应用是推荐引擎，它根据以下因素为客户提供个性化推荐：\n\n-   他们是谁\n-   他们在哪里\n-   他们根据过去购买模式喜欢什么\n\
    -   当前条件，例如天气\n-   以及留存模型的结果/他们的流失倾向\n\n有效的客户体验可以在跨多个交易、人口统计和行为特征（例如）训练模型的基础上提供定制化预测：\n\
    \n-   **交易特征** – 客户总收入、最低购买额、最高购买额、上次购买时间\n-   **人口统计特征** – 性别、年龄、地址/城市\n-   **行为特征**\
    \ – 客户旅程和浏览模式，包括访问的页面、停留时间、设备使用情况、点赞、评论、社交媒体评论、使用的关键词\n\n交易和人口统计数据是长期确立的价值杠杆，但在\
    \ 2022 年，对客户旅程和行为数据（通常是非结构化数据）进行更精细的挖掘，才是高价值零售组织的差异化优势所在。\n"
- fmt: "# Fraud Detection and Cybersecurity\n\nThe `$23.05b` Fraud Detection and Prevention\
    \ market is driving demand for Machine Learning and Fraud Analytics applications\
    \ and shows no sign of let up. Fortune Business Insights forecast 27% CAGR to\
    \ `$142b` by 2028 due to the increasing number of online transactions. And it’s\
    \ not just digital banking, insurance companies, and e-commerce increasing investment\
    \ in secure online services, painful experiences of fraud across most private\
    \ and public organizations have fast-tracked cybersecurity to the top of the corporate\
    \ agenda.\n\nThe rationale is fairly obvious – leveraging the inherent strength\
    \ of machine and deep learning algorithms to learn from historical fraud patterns\
    \ and recognize them in future transactions.\n\nThe marketplace is somewhat congested\
    \ with vendors such as `FICO`, `AltexSoft`, `SAS`, and `DataVisor` but the ability\
    \ to leverage open source and Cloud fraud detection “boilerplates” using, for\
    \ example, `AWS SageMaker` and `IBM WATSON Studio` is making cheaper, custom-developed\
    \ solutions more accessible to AI Engineers and Developers.\n\n# Operations Management,\
    \ Decision, and Business Support\n\nMachine Learning use for Operations Management\
    \ is largely focused on robotic process automation, cognitive or otherwise (`RPA`/`CRPA`),\
    \ and planning and scheduling/rescheduling.\n\nDecision Support systems built\
    \ with a BI front-end (such as `PowerBI`, `Tableau`, `Google Data Studio`, or\
    \ `Looker`) and predictive/prescriptive modeling (`Python`, `CPLEX`, etc.) often\
    \ underpin usage in both Operations Management and SCM (Supply Chain Management).\n\
    \nSpecifically in SCM end-to-end Machine Learning processes encompassing automated\
    \ data collection through analysis, prediction and optimization are being adopted\
    \ to deliver everything from automated dashboard engines to predictive maintenance,\
    \ inventory management and materials planning, optimized purchasing and procurement,\
    \ budgeting or customer/demand forecasting, and enhanced business process management\
    \ (`BPM`) performance.\n\n# Risk Management, and Portfolio and Asset Optimization\n\
    \nBesides the risk management and forecasting examples mentioned in Chapter [1](#527966_1_En_1_Chapter.xhtml),\
    \ there is considerable interest in the use of Machine Learning in Quantitative\
    \ Finance, from constructing Investment Strategies to trading stocks.\n\nThe approach\
    \ generally relies on forecasting to predict the movement of stocks and building\
    \ bots (Robo-Advisors) that can look at the stock movement and directly recommend\
    \ whether to buy/sell/hold. One of the more recent developments along these lines\
    \ is the use of Reinforcement Learning in building optimal stock portfolios and\
    \ comparing with portfolio theory–based approaches.\n\nOther innovations are `CVXPY`,\
    \ a Python-embedded modelling language for convex optimization problems which\
    \ we will take a look at in the lab at the end of this section and `DeepDow` (Deep,\
    \ rather than Machine Learning) - a Python package that focuses on neural networks\
    \ to perform asset allocation in a single forward pass.\n\n# Developing a Recommendation\
    \ Engine: Hands-on Practice\n\n## USING CURL TO TEST DEPLOYMENT TO A LOCAL ENDPOINT\n\
    \nWe take a trained (content-based filtering^([(113)](#fn113))) Netflix movie\
    \ / TV series recommendation engine model and deploy it as local endpoint and\
    \ test the app with `cURL`:\n\n1.  Download GitHub source code from the link below\
    \ [`https://github.com/MAbdElRaouf/Content-based-Recommendation-Engine`](https://github.com/MAbdElRaouf/Content-based-Recommendation-Engine)\n\
    \n2.  Set up a virtual environment\n\n3.  Install dependencies in the `requirements.txt`\
    \ file\n\n4.  Run the app from the terminal\n\n5.  Add a JSON file to the local\
    \ app folder with a movie title/TV series of interest\n\n    ```\n    {\n    \"\
    title\" : \"Narcos\"\n    }\n    ```\n\nChange the movie title to a movie/TV series\n\
    \n1.  Test the app with `cURL` (installed by default with Windows systems):\n\n\
    ```\ncurl -H \"Content-Type: application/json\" --data @test.json http://127.0.0.1:5000/api/\n\
    ```\n\nYou should now see a list of recommended movies/TV series in a `test.json`\
    \ file in your app folder based on the movie/TV series entered in step 5\n\n1.\
    \  Exercise: see what recommendations you get for “The Crown”\n\n2.  Stretch:\
    \ `Postman` is another utility to explore and test APIs – set up a `Postman` account\
    \ and send a request to the app above\n\n3.  Stretch: instead of content-based\
    \ filtering, train and deploy a more sophisticated collaborative filtering model^([(114)](#fn114))\
    \ which models similarity between users and movie / TV series purchases.\n\n#\
    \ Portfolio Optimization Accelerator: Hands-on Practise\n\n## MAXIMISING PROFIT\
    \ & MINIMISING RISK WITH CVXPY IN PYTHON\n\nAlthough not strictly involving machine\
    \ learning, prescriptive analytics problems requiring the use of complex optimisation\
    \ techniques and solvers are often run in parallel (or as a post process) to ML/DL\
    \ processes to maximise profit or minimise risk.\n\nThis lab takes a look at implementing\
    \ Convex Programming with Python – in this case simplifying via a Linear Prigramming\
    \ (LP) special case where the model constraints and objective function are linear.\n\
    \n1.  Clone the below GitHub repo:\n\n    `https://github.com/bw-cetech/apress-7.3.git`\n\
    \n2.  Run through the python notebook steps in Colab:\n    1.  Import libraries\
    \ including the `CVXPY` library\n\n    2.  Import the stock data from the monthly\
    \ csv data file downloaded from GitHub\n\n    3.  Plot the data\n\n    4.  Compute\
    \ expected risk and returns for each of the three stocks\n\n    5.  Optimise a\
    \ `$1000` across each of the three stocks to achieve a balanced portfolio\n\n\
    3.  Exercise (stretch) – adapt the code to connect to live stock prices with `Pandas\
    \ DataReader` and `Yahoo Finance` Python libraries, optimising / balancing `£100k`\
    \ capital spend across three tech stocks\n\n# DL Apps\n\nWhile certain machine\
    \ learning applications are firmly established in many organizations, implementing\
    \ Deep Learning applications has been far more an aspirational goal. That is starting\
    \ to change, partly through the use of leading accelerator AutoAI tools we discussed\
    \ in Chapter [6](#527966_1_En_6_Chapter.xhtml) and partly via experimentation\
    \ and prototyping around the main use cases we discuss in this final section.\n\
    \n## Developing Deep Learning Applications\n\nStill relatively new in an “enterprise\
    \ context,” Deep Learning is starting to drive great advances in visual recognition,\
    \ natural language processing, text analysis, and cybersecurity use cases.\n\n\
    Some of the drivers related to machine learning apply here too, but there is increased\
    \ sophistication as well, such as in understanding customer journeys rather than\
    \ just buying patterns. Some of these drivers are shown in the table in Figure\
    \ [7-13](#527966_1_En_7_Chapter.xhtml#Fig13), together with key business applications\
    \ and benefits.\n\n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig13_HTML.jpg)\n\
    \nAn illustration depicts deep learning in business cases. It includes 1\\. drivers.\
    \ 2\\. D L applications. 3\\. Benefits followed by its features.\n\nFigure 7-13\n\
    \nDeep Learning – the business case\n\nForward planning on cloud storage and compute\
    \ are vital in delivering a successful Deep Learning solution, and deep learning\
    \ projects require a lot of iteration, a lot of time, and a lot of effort. But\
    \ being disciplined, leveraging your resources to the max and monitoring progress\
    \ along the way can help bring about success.\n\nLike ML it starts by understanding\
    \ the problem context and project lifecycle and a kaizen (continual improvement)\
    \ approach is key. Before proceeding to our final section in this chapter, we\
    \ outline below a DL-specific high-level framework for success (Source: neptune.ai):\n\
    \n*   Define the data sources and collect\n\n*   Identify the high-level solution\
    \ (`CNN`, `RNN`, `GANs`?)\n\n*   Establish a robust data pipeline for streaming/batch\
    \ data\n\n*   Build a model based on `ANNs`\n\n*   Leverage Transfer Learning\n\
    \n*   Training and inference\n\n*   Deploy to cloud: `Heroku`, `IBM`, `AWS`, `GCP`,\
    \ `Azure`"
