  raw: "### Churn and Retention Modelling\n\nThe above unprecedented changes to consumer\
    \ shopping behavior and their preferences have brought an increasing focus on\
    \ the “customer journey” from first purchase to (potentially) disenchantment.\n\
    \nIn today’s fiercely competitive markets, churn rate metrics reflect a group\
    \ of customer’s (customer segment) response toward the product, service, price,\
    \ and competition. For most retail businesses measuring the existing churn rate\
    \ is critical to prevent profit erosion or negative marketing of the brand/store.\
    \ More than that, an active approach to predict and prevent customer churn is\
    \ a necessity to retain existing customers and drive dependable revenue streams.\n\
    \n#### A Best Practice Approach to Modelling Churn\n\nWhere to start from a modeling\
    \ perspective? The data generated during the sign-up (**demographic** data) and\
    \ sale process (**transactional** data) is key, but on its own that is insufficient\
    \ in today’s more mature, data-savvy retailers.\n\nThe Data Science/AI value-add\
    \ for retailers today is in mining customer data to isolate **behavioral and attitudinal**\
    \ features, such as via product and product category purchases made via a loyalty\
    \ card (and therefore searchable) or in visits/page opens/page hits on specific\
    \ products sold or services marketed on the retailer's online platform.\n\nWhile\
    \ there is no hard and fast rule, a good working churn model will typically involve\
    \ at least 50 features per customer, involving several data types (numeric continuous\
    \ such as total transaction value, numeric categoric such as type of product purchased,\
    \ text/string such as customer reviews and date-like, e.g., time since last online\
    \ visit).\n\nIn churn modeling, a “holdout” data sample is created from the customer\
    \ base and set aside for inference at the end of the model training and validation\
    \ phase.\n\nDuring model training and cross-validation (with multialgorithm benchmarking),\
    \ the most important predictors are identified (and nurtured/included in subsequent\
    \ runs) while feature elimination can address initial high variance (overfit)\
    \ models. The model is thus iteratively improved, sometimes with more transactional,\
    \ promotional, or behavioral data to increase performance or using recursive feature\
    \ elimination techniques such as multicollinearity and chi-square tests.\n\nModels\
    \ with intrinsic commercial value tend to prioritize precision over recall due\
    \ to the need to reduce costs and the relative cost overhead of a high recall\
    \ but poor precision-based model.\n\nFinally, the holdout sample defined at the\
    \ start is used as the basis for churn propensity (i.e., does the trained model\
    \ generalize well to new data – does it identify well at-risk customers, etc.)\
    \ and A/B testing is performed using two control customer samples where model\
    \ outputs are either used or omitted and comparing, for example, the subsequent\
    \ income streams for the month ahead. A periodic (e.g., quarterly) “ROI review”\
    \ of model value should also compare the likely cost or commercial impact of targeting\
    \ all customers vs. targeting only our predicted churners.\n\n#### Model Design\
    \ and Outcomes\n\nThe best churn models are platform (and cloud) agnostic and\
    \ (where necessary) connected to real-time customer transactions, for example,\
    \ via a Data Lake with raw OLTP/OLAP data connectors.\n\nThis kind of “extensible”\
    \ model should also facilitate reporting across multiple cashflow at-risk scenarios\
    \ (by region, business division, product or service line, and customer segment)\
    \ with a front-end hook-up clearly identifying the multifaceted opportunities\
    \ and threats:\n\n*   Tangible churn prevention/retention impact\n\n*   Ranked\
    \ customers\n\n*   Revenue at risk\n\n*   Highest (segment) propensity to churn\n\
    \n*   Greatest value at-risk consumers\n\nGiven the end customer of a churn model\
    \ is often a marketing team looking to support campaign ideas with data-driven\
    \ analytics and model outcomes, marketing (and media) “hook-ups” can help automate\
    \ engagement with the most at-risk customers.\n\n### Online Retail Predictive\
    \ Analytics with GCP BigQuery: Hands-on Practice\n\nPredictive Retail Analytics\n\
    \n**Using Google Cloud Platform** **BigQuery ML****, the goal of this lab is to\
    \ train a machine learning model to forecast average duration for bike rental\
    \ trips**\n\n1.  Sign up for a GCP Free Tier account at the link below:\n\n  \
    \  [https://​console.​cloud.​google.​com](https://console.cloud.google.com)\n\n\
    2.  Login to GCP sandbox below (free even after three-month expiry of GCP Free\
    \ Tier) and create a project\n\n    https://console.cloud.google.com/bigquery?ref=https:%2F%2Faccounts.google.com%2F&project=gcp-bigquery-26apr21&ws=!1m0\n\
    \n3.  Add the Public Austin Bike Share dataset\n\n4.  Exercise: perform a couple\
    \ of quick SQL “EDA” queries to get (a) the number of records and the (b) the\
    \ busiest bike station\n\n5.  Compose another SQL query to build an ML model using\
    \ the features below:\n    1.  Starting station name\n\n    2.  Hour the trip\
    \ started\n\n    3.  Weekday of the trip\n\n    4.  Address of the start station\n\
    \n    5.  2018 data only\n\n6.  Repeat the above for a second model but add “bike\
    \ share subscriber type” and remove the two features:\n    1.  Weekday of the\
    \ trip\n\n    2.  Address of the start station\n\n7.  Evaluate the two models\n\
    \n8.  Exercise: Predict average bike duration for the best model\n\n### Predicting\
    \ Customer Churn: Hands-on Practise\n\nChurn Modelling with Python\n\nUsing Python\
    \ in Jupyter Notebook, the goal of this exercise is to predict the likelihood\
    \ of an active customer leaving an organization and identify key indicators of\
    \ churn\n\n1.  Clone the GitHub repo below containing a churn model Python notebook\
    \ and “customer_churn_data” dataset\n\n    [https://​github.​com/​bw-cetech/​apress-8.​3.​git](https://github.com/bw-cetech/apress-8.3.git)\n\
    \n2.  Run through the notebook in Google Colab, importing the data then carrying\
    \ out:\n    1.  Pre-processing\n\n    2.  Visual EDA\n\n    3.  Feature Engineering\n\
    \n    4.  Modelling\n\n    5.  Exercise – identify the main indicators of churn\
    \ by looking at feature_importances\n\n    6.  Exercise – carry out future predictions\
    \ using the trained model\n\n    7.  Exercise (Stretch)\n        1.  rather than\
    \ using a dataset with a predefined target (churn) variable, swap it out with\
    \ a retail dataset containing customer order information (such as the dataset\
    \ “AW-SOH.xlsx” also uploaded to the GitHub repo above) and define “churn” as\
    \ a custom variable based on a target number of months (N) elapsed since a customer\
    \ made a purchase.\n\n        2.  Aggregate order data by customer, engineering\
    \ any new transactional features which could be indicative of churn (e.g. average\
    \ purchase amount, length of time as customer etc.).\n\n        3.  Finally, split\
    \ the data into a training and test set, train a predictive model in the same\
    \ way, then predict whether new customers are likely to churn or not in the next\
    \ N months\n\n### Social Network Analysis: Hands-on Practise\n\nSupermarket Tweet\
    \ Analysis with NetworkX\n\nOur final lab in this section takes a look at how\
    \ to implement social network analysis on tweets. Here we take a look at tweets\
    \ on four UK supermarkets and perform network analysis on the location of those\
    \ tweets focussed around major cities\n\n1.  Clone the GitHub repo below to a\
    \ local folder\n\n    [https://​github.​com/​bw-cetech/​apress-8.​3b.​git](https://github.com/bw-cetech/apress-8.3b.git)\n\
    \n2.  Run through the notebook in with Jupyter Notebook or Google Colab, following\
    \ the steps below:\n    1.  Install network as described\n\n    2.  Import the\
    \ (static) dataset of tweets\n\n    3.  Perform a quick EDA on the tweet information\n\
    \n    4.  Filter out specific locations (i.e. not “UK\")\n\n    5.  Create an\
    \ exclusion list for further analysis\n\n    6.  Create a major cities list\n\n\
    3.  Finally create the network analysis showing tweets by supermarket and (major\
    \ city) location"
  trans: "\n### 客户流失与留存建模\n\n上述消费者购物行为及偏好的空前变化，使得人们越来越关注从首次购买到（潜在）失望的“客户旅程”。\n\n在当今竞争激烈的市场中，流失率指标反映了某一客户群（客户细分）对产品、服务、价格和竞争的反应。对于大多数零售企业而言，衡量现有流失率对于防止利润侵蚀或品牌/商店的负面营销至关重要。更重要的是，采取主动措施预测和防止客户流失，是留住现有客户并驱动可靠收入流的必要条件。\n\
    \n#### 流失建模的最佳实践方法\n\n从建模角度来看，应该从哪里开始？注册过程中产生的数据（**人口统计**数据）和销售过程中的数据（**交易**数据）是关键，但在当今更成熟、更精通数据的零售商眼中，仅凭这些数据是不够的。\n\
    \n如今，数据科学/人工智能为零售商带来的增值在于挖掘客户数据，以分离出**行为和态度**特征，例如通过使用会员卡进行的商品和商品类别购买（因此是可搜索的），或者访问/页面打开/页面点击零售商在线平台上销售或营销的特定产品。\n\
    \n虽然没有硬性规定，但一个良好的流失模型通常每个客户至少包含 50 个特征，涉及多种数据类型（数值连续型，如总交易额；数值分类型，如购买的产品类型；文本/字符串型，如客户评论；以及日期型，例如自上次在线访问以来的时间）。\n\
    \n在流失建模中，会从客户群中创建一个“保留”数据样本，留待模型训练和验证阶段结束时进行推理。\n\n在模型训练和交叉验证（使用多算法基准测试）期间，会识别出最重要的预测因子（并在后续运行中加以培育/包含），而特征消除可以解决初始高方差（过拟合）模型的问题。模型因此得到迭代改进，有时会加入更多交易、促销或行为数据以提高性能，或使用递归特征消除技术，如多重共线性检验和卡方检验。\n\
    \n具有内在商业价值的模型倾向于优先考虑精确率而非召回率，因为需要降低成本，并且高召回率但低精确率的模型会带来相对较高的成本开销。\n\n最后，开始时定义的保留样本被用作流失倾向的基础（即，训练后的模型是否能很好地泛化到新数据——它是否能很好地识别高风险客户等），并使用两个控制客户样本进行\
    \ A/B 测试，其中一个样本使用模型输出，另一个不使用，并比较例如未来一个月的后续收入流。还应定期（例如每季度）对模型价值进行“投资回报率审查”，比较针对所有客户与仅针对我们预测的流失客户的可能成本或商业影响。\n\
    \n#### 模型设计与成果\n\n最好的流失模型是与平台（和云）无关的，并且在必要时连接到实时客户交易，例如通过一个带有原始 OLTP/OLAP 数据连接器的数据湖。\n\
    \n这种“可扩展”模型还应能够促进跨多种现金流风险情景（按地区、业务部门、产品或服务线以及客户细分）的报告，并通过前端连接清晰地识别多方面的机会和威胁：\n\
    \n*   切实的流失预防/留存影响\n*   排名客户\n*   面临风险的收入\n*   最高（细分）流失倾向\n*   价值最高的风险消费者\n\n\
    鉴于流失模型的最终客户通常是寻求用数据驱动分析和模型结果来支持营销活动创意的营销团队，营销（和媒体）“连接”有助于自动化与最高风险客户的互动。\n\n###\
    \ 使用 GCP BigQuery 进行在线零售预测分析：动手实践\n\n预测性零售分析\n\n**使用 Google Cloud Platform** **BigQuery\
    \ ML****，本实验的目标是训练一个机器学习模型来预测自行车租赁行程的平均时长**\n\n1.  通过以下链接注册 GCP 免费套餐账户：\n\n  \
    \  [`​console.​cloud.​google.​com`](https://console.cloud.google.com)\n\n2.  登录以下\
    \ GCP 沙盒（即使在 GCP 免费套餐三个月到期后仍免费）并创建一个项目\n\n    [`console.cloud.google.com/bigquery?ref=https:%2F%2Faccounts.google.com%2F&project=gcp-bigquery-26apr21&ws=!1m0`](https://console.cloud.google.com/bigquery?ref=https:%2F%2Faccounts.google.com%2F&project=gcp-bigquery-26apr21&ws=!1m0)\n\
    \n3.  添加公共奥斯汀共享单车数据集\n\n4.  练习：执行几个快速的 SQL “EDA” 查询，以获取 (a) 记录数和 (b) 最繁忙的自行车站点\n\
    \n5.  编写另一个 SQL 查询，使用以下特征构建一个 ML 模型：\n    1.  起始站点名称\n    2.  行程开始的小时\n    3.\
    \  行程的星期几\n    4.  起始站点的地址\n    5.  仅限 2018 年数据\n\n6.  重复上述步骤构建第二个模型，但添加“共享单车订阅者类型”并移除以下两个特征：\n\
    \    1.  行程的星期几\n    2.  起始站点的地址\n\n7.  评估这两个模型\n\n8.  练习：预测最佳模型的平均自行车骑行时长\n\n\
    ### 预测客户流失：动手实践\n\n使用 Python 进行流失建模\n\n在 Jupyter Notebook 中使用 Python，本练习的目标是预测活跃客户离开组织的可能性，并识别流失的关键指标\n\
    \n1.  克隆以下包含流失模型 Python notebook 和 `customer_churn_data` 数据集的 GitHub 仓库\n\n  \
    \  [`​github.​com/​bw-cetech/​apress-8.​3.​git`](https://github.com/bw-cetech/apress-8.3.git)\n\
    \n2.  在 Google Colab 中运行该 notebook，导入数据，然后执行：\n    1.  预处理\n    2.  可视化 EDA\n\
    \    3.  特征工程\n    4.  建模\n    5.  练习 – 通过查看 `feature_importances` 识别流失的主要指标\n\
    \    6.  练习 – 使用训练好的模型进行未来预测\n    7.  练习（拓展）\n        1.  与其使用带有预定义目标（流失）变量的数据集，不如将其替换为包含客户订单信息的零售数据集（例如同样上传到上述\
    \ GitHub 仓库的数据集 `AW-SOH.xlsx`），并根据自客户上次购买以来经过的目标月数 (N) 将“流失”定义为一个自定义变量。\n    \
    \    2.  按客户聚合订单数据，设计任何可能预示流失的新交易特征（例如平均购买金额、客户时长等）。\n        3.  最后，将数据拆分为训练集和测试集，以相同方式训练预测模型，然后预测新客户在未来\
    \ N 个月内是否可能流失。\n\n### 社交网络分析：动手实践\n\n使用 NetworkX 进行超市推文分析\n\n本节中的最后一个实验将探讨如何对推文实施社交网络分析。在这里，我们查看关于四家英国超市的推文，并对这些聚焦于主要城市的推文位置进行网络分析\n\
    \n1.  将以下 GitHub 仓库克隆到本地文件夹\n\n    [`​github.​com/​bw-cetech/​apress-8.​3b.​git`](https://github.com/bw-cetech/apress-8.3b.git)\n\
    \n2.  使用 Jupyter Notebook 或 Google Colab 运行该 notebook，遵循以下步骤：\n    1.  按说明安装 network\n\
    \    2.  导入推文的（静态）数据集\n    3.  对推文信息执行快速 EDA\n    4.  过滤掉特定位置（即不是“英国”）\n    5.\
    \  创建排除列表以供进一步分析\n    6.  创建主要城市列表\n\n3.  最后创建网络分析，显示按超市和（主要城市）位置分类的推文\n"
- fmt: "# Banking and Financial Services/FinTech Solutions\n\nBanking and Financial\
    \ Services industries are the subject of our next section in this chapter. We\
    \ take a look first at industry challenges before presenting one of the main AI\
    \ solutions – Fraud Detection.\n\n## Industry Challenges\n\nAcross multiple industries\
    \ including Banking and Financial Services, AI is rapidly reshaping risk management\
    \ practices and transforming client and internal services. Key areas of disruption\
    \ are shown below:\n\n- Governance, Risk Management and Compliance (GRC)\n- Fraud\
    \ detection and prevention\n- Personalized banking\n- Trading\n- Process automation\n\
    - Customer complaints\n\nBut it's not just in risk control and cost prevention\
    \ where AI-as-a-service can add value in Banking and FinTech. AI innovation is\
    \ also helping to:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig10_HTML.jpg)\n\
    \nA comparison of banking and financial (insurance) services along with the percentages\
    \ of customer service, back-office operations, financial advisors, fraud detection,\
    \ risk management, and compliance.\n\n**Figure 8-10** Deloitte – key focus B&FS\
    \ use cases from C-Level Executives\n\n- Create an engaging and differentiated\
    \ customer experience (retail banking)\n- Change business relationships with customers\
    \ from money movers to money managers (digital banking)\n- Increase the lifetime\
    \ value of customers (CLV) from global access enablement to banking, investment,\
    \ and stock market trading services (such as via Robo Advisory or algorithmic\
    \ trading services and “day trading”/CFD apps)\n- Decrease customer support costs\
    \ through the use of chatbot and IVA technologies and automated systems including\
    \ document search, retrieval, and archiving\n- Build trust and loyalty through\
    \ robust fraud detection measures and periodic personalized offers (loans, cashback\
    \ incentives, etc.)\n\nWhile there are clearly many areas where Predictive Analytics\
    \ is adding value, our main focus in this section is on the “flagship” AI use\
    \ case for Banking and FinTech – Fraud Detection.\n\n## Fraud Detection\n\nBusiness\
    \ and organizational fraud risk goes beyond a simple identification of large transactions\
    \ – a robust solution must address key operational risks too. With fraud an ongoing\
    \ problem costing businesses billions of dollars annually, applying learning capability,\
    \ as opposed to simpler, rule-based methods, is perceived as an existential need\
    \ in the highly disruptive B&FS sector.\n\nThe main Fraud Detection applications\
    \ of Machine and Deep Learning today are able to achieve better sophistication\
    \ in model outcomes and by virtue of cloud-connectivity have embedded auditability\
    \ to prevent fraud out-of-the-box. These applications can detect a wider range\
    \ of fraud incidents by combining machine learning with an advanced rule engine,\
    \ identifying along the way:\n\n- Duplicate payments\n- Duplicate invoices\n-\
    \ Unusual payment amounts\n- Unusual payment description\n- One-time payments\n\
    - Entities of interest\n\nBesides the above, Fraud Detection bound to a company’s\
    \ internal Data and AI Strategy and fully integrated with internal and external\
    \ data sources – claims systems, watch lists, third-party systems is a matter\
    \ of course, as are model features including dynamic approaches to authentication\
    \ flows in an age of multifactor authentication (2FA, 3FA), addressing specific\
    \ fraud challenges associated with mobile channels, plus encoding of unstructured\
    \ text in the feature engineering process.\n\n### Case Study: AWS Fraud Detection\n\
    \nAmazon Web Service’s industry leading Fraud Detection Solution uses Automated\
    \ Transaction Processing with `SageMaker` and is the subject of our hands-on lab\
    \ below. `SageMaker` itself sits on a fully managed `EC2` (compute) instance that\
    \ runs Jupyter Notebook.\n\nEssentially the Fraud Detection solution loads a “live”\
    \ credit card transaction dataset, training two models to recognize fraud patterns\
    \ before deploying as two separate endpoints. The initial model performs Anomaly\
    \ Detection using unsupervised learning (Random Cut Forest algorithm) and is then\
    \ followed up by supervised training (`xgboost` algorithm) for Fraud Detection\
    \ using labeled data.\n\nThe deployed solution automates detection of fraudulent\
    \ activity, flagging fraud activity for review.\n\nAs shown in the architecture\
    \ diagram below, integration of `SageMaker` is with:\n\n1. Two Amazon Simple Storage\
    \ Service (`S3`) buckets for data storage, one for storing input data to the model,\
    \ and one for storing downstream (postmodeling) analytics data\n2. `Lambda` for\
    \ processing a continuous stream of prediction requests (triggered by Amazon (REST)\
    \ API Gateway)\n3. `Kinesis Firehose` which loads processed transactions into\
    \ the second `S3` bucket for downstream BI in `QuickSight`\n\nIn the lab that\
    \ follows we will make use of an AWS CloudFormation template to provision the\
    \ multiple resource requirements. Note these resources do incur costs:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig11_HTML.jpg)\n\
    \nThe architecture of AWS fraud detection. It starts with Amazon API Gateway,\
    \ AWS Lambda, anomaly detection, fraud detection, Amazon S3 bucket model and data,\
    \ and Amazon Kinesis Data Firehose.\n\n**Figure 8-11** AWS Fraud Detection – architecture\n\
    \n- **$1.50** – one-time cost for Amazon SageMaker `ml.c4.large` instance\n- **$0.65/hour**\
    \ – cost to process transactions using AWS example dataset\n\n## AWS Fraud Detection\
    \ with AWS SageMaker: Hands-on Practice\n\nFrom Transaction Monitoring to Dashboard\
    \ Analytics: Fraud Detection on Cloud\n\nOur goal in this lab is to build an end-to-end\
    \ implementation of the AWS Fraud Detection solution, from resource setup via\
    \ a Cloud Formation template to creation of dashboard analytics via `QuickSight`.\n\
    \nThe operational process for this lab, from Data Import to `QuickSight` Analytics\
    \ is extensively described in the section above and summarized in the image process\
    \ map below:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig12_HTML.png)\n\
    \nAn illustration depicts the AWS fraud detection from transaction monitoring\
    \ to dashboard analytics. It includes process, sub-process, key technologies,\
    \ integration points and CSAT measures.\n\n**Figure 8-12** AWS Fraud Detection\
    \ – seamless automation from transactional data import to (`QuickSight`) Dashboard\
    \ Analytics\n\n1. Create AWS Fraud Detection Resources by going to the link below\
    \ and launching an AWS Cloud Formation template:\n\n   `https://console.aws.amazon.com/cloudformation/home?region=us-east-1#/stacks/new?&templateURL=https:%2F%2Fs3.amazonaws.com%2Fsolutions-reference%2Ffraud-detection-using-machine-learning%2Flatest%2Ffraud-detection-using-machine-learning.template`\n\
    \n2. Run the notebook, performing each step in turn:\n   1. Data Import\n   2.\
    \ Data Exploration\n   3. Verify the Lambda Function Is Processing Transactions\
    \ then proceed through the modeling steps (`SageMaker` through `Lambda` to `Kinesis`):\n\
    \      1. Anomaly detection\n      2. Fraud event detection\n      3. Model evaluation\n\
    \n3. Check the `S3` bucket results and the `Kinesis` Stream\n   1. Data Pipeline\
    \ and Model deployment (API)\n   2. CloudWatch logs\n\n4. Finally view results\
    \ in `QuickSight` and show Fraud Detection analytics as a Dashboard\n\n5. Stretch\
    \ Exercise – improve the model performance by using SMOTE (Synthetic Minority\
    \ Oversampling Technique) for balancing the minority class (here fraudulent transactions)\n\
    \n## Supply Chain Solutions\n\nFraud of course doesn’t just impact financial institutions.\
    \ Supply chains are impacted as well, and there are further disparate challenges\
    \ faced by vertically integrated companies, not least in dealing with inflationary\
    \ pricing, managing or shipping scarce resources and caring for the environment\
    \ amid a destabilizing global climate.\n\nThis next section takes a look at how\
    \ AI solutions are being used in SCM (Supply Chain Management)."
  raw: "## Banking and Financial Services/FinTech Solutions\n\nBanking and Financial\
    \ Services industries are the subject of our next section in this chapter.^([^(118)](#fn118))\
    \ We take a look first at industry challenges before presenting one of the main\
    \ AI solutions – Fraud Detection.\n\n### Industry Challenges\n\nAcross multiple\
    \ industries including Banking and Financial Services, AI is rapidly reshaping\
    \ risk management practices and transforming client and internal services. Key\
    \ areas of disruption are shown below:\n\n*   Governance, Risk Management and\
    \ Compliance (GRC)\n\n*   Fraud detection and prevention\n\n*   Personalized banking\n\
    \n*   Trading\n\n*   Process automation\n\n*   Customer complaints\n\nBut it's\
    \ not just in risk control and cost prevention where AI-as-a-service can add value\
    \ in Banking and FinTech. AI innovation is also helping to:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig10_HTML.jpg)\n\
    \nA comparison of banking and financial (insurance) services along with the percentages\
    \ of customer service, back-office operations, financial advisors, fraud detection,\
    \ risk management, and compliance.\n\nFigure 8-10\n\nDeloitte – key focus B&FS\
    \ use cases from C-Level Executives\n\n*   Create an engaging and differentiated\
    \ customer experience (retail banking)\n\n*   Change business relationships with\
    \ customers from money movers to money managers (digital banking)\n\n*   Increase\
    \ the lifetime value of customers (CLV) from global access enablement to banking,\
    \ investment, and stock market trading services (such as via Robo Advisory or\
    \ algorithmic trading services and “day trading”/CFD apps)\n\n*   Decrease customer\
    \ support costs through the use of chatbot and IVA technologies and automated\
    \ systems including document search, retrieval, and archiving\n\n*   Build trust\
    \ and loyalty through robust fraud detection measures and periodic personalized\
    \ offers (loans, cashback incentives, etc.)\n\nWhile there are clearly many areas\
    \ where Predictive Analytics is adding value, our main focus in this section is\
    \ on the “flagship” AI use case for Banking and FinTech – Fraud Detection.\n\n\
    ### Fraud Detection\n\nBusiness and organizational fraud risk goes beyond a simple\
    \ identification of large transactions – a robust solution must address key operational\
    \ risks too. With fraud an ongoing problem costing businesses billions of dollars\
    \ annually, applying learning capability, as opposed to simpler, rule-based methods,\
    \ is perceived as an existential need in the highly disruptive B&FS sector.\n\n\
    The main Fraud Detection applications of Machine and Deep Learning today are able\
    \ to achieve better sophistication in model outcomes and by virtue of cloud-connectivity\
    \ have embedded auditability to prevent fraud out-of-the-box. These applications\
    \ can detect a wider range of fraud incidents by combining machine learning with\
    \ an advanced rule engine, identifying along the way:\n\n*   Duplicate payments\n\
    \n*   Duplicate invoices\n\n*   Unusual payment amounts\n\n*   Unusual payment\
    \ description\n\n*   One-time payments\n\n*   Entities of interest\n\nBesides\
    \ the above, Fraud Detection bound to a company’s internal Data and AI Strategy\
    \ and fully integrated with internal and external data sources – claims systems,\
    \ watch lists, third-party systems is a matter of course, as are model features\
    \ including dynamic approaches to authentication flows in an age of multifactor\
    \ authentication (2FA, 3FA), addressing specific fraud challenges associated with\
    \ mobile channels, plus encoding of unstructured text in the feature engineering\
    \ process.\n\n#### Case Study: AWS Fraud Detection\n\nAmazon Web Service’s industry\
    \ leading Fraud Detection Solution uses Automated Transaction Processing with\
    \ SageMaker and is the subject of our hands-on lab below. SageMaker itself sits\
    \ on a fully managed EC2 (compute) instance that runs Jupyter Notebook\n\nEssentially\
    \ the Fraud Detection solution loads a “live” credit card transaction dataset,\
    \ training two models to recognize fraud patterns before deploying as two separate\
    \ endpoints. The initial model performs Anomaly Detection using unsupervised learning\
    \ (Random Cut Forest algorithm) and is then followed up by supervised training\
    \ (xgboost algorithm) for Fraud Detection using labeled data.\n\nThe deployed\
    \ solution automates detection of fraudulent activity, flagging fraud activity\
    \ for review.\n\nAs shown in the architecture diagram below, integration of SageMaker\
    \ is with\n\n1.  Two Amazon Simple Storage Service **(S3) buckets** for data storage,\
    \ one for storing input data to the model, and one for storing downstream (postmodeling)\
    \ analytics data^([^(119)](#fn119))\n\n2.  **Lambda** for processing a continuous\
    \ stream of prediction requests (triggered by **Amazon (REST) API Gateway and**\n\
    \n3.  **Kinesis Firehose** which loads processed transactions into the second\
    \ S3 bucket for downstream BI in **QuickSight**\n\nIn the lab that follows we\
    \ will make use of an **AWS CloudFormation** template to provision the multiple\
    \ resource requirements. Note these resources do incur costs:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig11_HTML.jpg)\n\
    \nThe architecture of A W S fraud detection. It starts with amazon A P I gateway,\
    \ A W S lambda, anomaly detection, fraud detection, amazon S 3 bucket model and\
    \ data, and amazon kinesis data firehose.\n\nFigure 8-11\n\nAWS Fraud Detection\
    \ – architecture\n\n*   **$1.50** – one-time cost for Amazon SageMaker ml.c4.large\
    \ instance\n\n*   **$0.65/hour** – cost to process transactions using AWS example\
    \ dataset\n\n### AWS Fraud Detection with AWS SageMaker: Hands-on Practice\n\n\
    From Transaction Monitoring to Dashboard Analytics: Fraud Detection on Cloud\n\
    \nOur goal in this lab is to build an end-to-end implementation of the AWS Fraud\
    \ Detection solution, from resource setup via a Cloud Formation template to creation\
    \ of dashboard analytics via QuickSight.\n\nThe operational process for this lab,\
    \ from Data Import to QuickSight Analytics is extensively described in the section\
    \ above and summarized in the image process map below:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig12_HTML.png)\n\
    \nAn illustration depicts the A W S fraud detection from transaction monitoring\
    \ to dashboard analytics. It includes process, sub-process, key technologies,\
    \ integration points and C S A T measures.\n\nFigure 8-12\n\nAWS Fraud Detection\
    \ – seamless automation from transactional data import to (QuickSight) Dashboard\
    \ Analytics\n\n1.  Create AWS Fraud Detection Resources by going to the link below\
    \ and launching an AWS Cloud Formation template:\n\n    https://console.aws.amazon.com/cloudformation/home?region=us-east-1#/stacks/new?&templateURL=https:%2F%2Fs3.amazonaws.com%2Fsolutions-reference%2Ffraud-detection-using-machine-learning%2Flatest%2Ffraud-detection-using-machine-learning.template\n\
    \n2.  Run the notebook, performing each step in turn:\n    1.  Data Import\n\n\
    \    2.  Data Exploration\n\n    3.  Verify the Lambda Function Is Processing\
    \ Transactions then proceed through the modeling steps (SageMaker through Lambda\
    \ to Kinesis):\n        1.  Anomaly detection\n\n        2.  Fraud event detection\n\
    \n        3.  Model evaluation\n\n3.  Check the S3 bucket results and the Kinesis\
    \ Stream\n    1.  Data Pipeline and Model deployment (API)\n\n    2.  CloudWatch\
    \ logs\n\n4.  Finally view results in QuickSight and show Fraud Detection analytics\
    \ as a Dashboard\n\n5.  Stretch Exercise – improve the model performance by using\
    \ SMOTE (Synthetic Minority Oversampling Technique) for balancing the minority\
    \ class (here fraudulent transactions)\n\n## Supply Chain Solutions\n\nFraud of\
    \ course doesn’t just impact financial institutions. Supply chains are impacted\
    \ as well, and there are further disparate challenges faced by vertically integrated\
    \ companies, not least in dealing with inflationary pricing, managing or shipping\
    \ scarce resources and caring for the environment amid a destabilizing global\
    \ climate.\n\nThis next section takes a look at how AI solutions are being used\
    \ in SCM (Supply Chain Management)."
  trans: "\n# 银行与金融服务/金融科技解决方案\n\n银行与金融服务行业是本章下一节的主题。我们首先审视行业挑战，然后介绍主要的 AI 解决方案之一——欺诈检测。\n\
    \n## 行业挑战\n\n在包括银行与金融服务在内的多个行业中，AI 正在迅速重塑风险管理实践，并改变客户与内部服务。关键变革领域如下所示：\n\n- 治理、风险管理和合规（GRC）\n\
    - 欺诈检测与预防\n- 个性化银行服务\n- 交易\n- 流程自动化\n- 客户投诉\n\n但 AI 即服务在银行与金融科技领域的价值并不仅限于风险控制和成本预防。AI\
    \ 创新还有助于：\n\n![](img/527966_1_En_8_Fig10_HTML.jpg)\n\n银行与金融（保险）服务对比图，展示了客户服务、后台运营、财务顾问、欺诈检测、风险管理和合规的百分比。\n\
    \n**图 8-10** 德勤——C 级高管关注的银行与金融服务关键用例\n\n- 打造引人入胜且差异化的客户体验（零售银行）\n- 将客户业务关系从资金转移者转变为资金管理者（数字银行）\n\
    - 通过提供全球接入的银行、投资和股票市场交易服务（例如通过机器人顾问或算法交易服务以及“日内交易”/差价合约应用），提高客户终身价值\n- 通过使用聊天机器人和\
    \ IVA 技术以及包括文档搜索、检索和归档在内的自动化系统，降低客户支持成本\n- 通过强大的欺诈检测措施和定期个性化优惠（贷款、现金返还激励等）建立信任和忠诚度\n\
    \n尽管预测分析在许多领域都发挥着价值，但本节的主要焦点是银行与金融科技领域的“旗舰”AI 用例——欺诈检测。\n\n## 欺诈检测\n\n企业与组织的欺诈风险不仅仅涉及大额交易的简单识别——一个稳健的解决方案还必须应对关键的操作风险。欺诈是一个持续存在的问题，每年给企业造成数十亿美元的损失。在高度颠覆性的银行与金融服务领域，应用学习能力（而非更简单的基于规则的方法）被视为一种生存需求。\n\
    \n如今，机器学习和深度学习的主要欺诈检测应用能够在模型结果上实现更高的复杂性，并凭借云连接性内置了可审计性，从而开箱即用地预防欺诈。这些应用通过将机器学习与高级规则引擎相结合，能够检测更广泛的欺诈事件，沿途识别：\n\
    \n- 重复付款\n- 重复发票\n- 异常付款金额\n- 异常付款描述\n- 一次性付款\n- 关注实体\n\n除此之外，欺诈检测必须与公司的内部数据和\
    \ AI 战略相结合，并与内部和外部数据源（理赔系统、观察名单、第三方系统）完全集成，这已是理所当然。模型特征还包括在多因素认证时代（2FA、3FA）的动态认证流程方法，应对与移动渠道相关的特定欺诈挑战，以及在特征工程过程中对非结构化文本进行编码。\n\
    \n### 案例研究：AWS 欺诈检测\n\n亚马逊网络服务行业领先的欺诈检测解决方案使用`SageMaker`进行自动化交易处理，这也是我们下面动手实验的主题。`SageMaker`本身运行在一个完全托管的`EC2`（计算）实例上，该实例运行\
    \ Jupyter Notebook。\n\n该欺诈检测解决方案本质上加载一个“实时”信用卡交易数据集，训练两个模型以识别欺诈模式，然后将其部署为两个独立的端点。初始模型使用无监督学习（随机割森林算法）执行异常检测，随后使用有监督训练（`xgboost`算法）基于标记数据进行欺诈检测。\n\
    \n部署的解决方案自动检测欺诈活动，并标记欺诈活动以供审查。\n\n如下方架构图所示，`SageMaker`的集成涉及：\n\n1. 两个用于数据存储的 Amazon\
    \ Simple Storage Service（`S3`）存储桶，一个用于存储模型的输入数据，另一个用于存储下游（建模后）分析数据\n2. `Lambda`用于处理连续的预测请求流（由\
    \ Amazon REST API 网关触发）\n3. `Kinesis Firehose`将处理后的交易加载到第二个`S3`存储桶中，用于`QuickSight`中的下游商业智能分析\n\
    \n在接下来的实验中，我们将使用 AWS CloudFormation 模板来配置多个资源需求。请注意，这些资源会产生费用：\n\n![](img/527966_1_En_8_Fig11_HTML.jpg)\n\
    \nAWS 欺诈检测架构图。从 Amazon API 网关、AWS Lambda、异常检测、欺诈检测、Amazon S3 存储桶（模型和数据）到 Amazon\
    \ Kinesis Data Firehose。\n\n**图 8-11** AWS 欺诈检测——架构\n\n- **1.50 美元** – Amazon\
    \ SageMaker `ml.c4.large`实例的一次性费用\n- **0.65 美元/小时** – 使用 AWS 示例数据集处理交易的成本\n\n\
    ## 使用 AWS SageMaker 进行 AWS 欺诈检测：动手实践\n\n从交易监控到仪表盘分析：云端欺诈检测\n\n本实验的目标是构建 AWS 欺诈检测解决方案的端到端实现，从通过\
    \ Cloud Formation 模板进行资源设置，到通过`QuickSight`创建仪表盘分析。\n\n本实验的操作流程，从数据导入到`QuickSight`分析，已在上一节中详细描述，并总结在下方流程图中：\n\
    \n![](img/527966_1_En_8_Fig12_HTML.png)\n\n图示展示了从交易监控到仪表盘分析的 AWS 欺诈检测流程。包括流程、子流程、关键技术、集成点和客户满意度指标。\n\
    \n**图 8-12** AWS 欺诈检测——从交易数据导入到（`QuickSight`）仪表盘分析的无缝自动化\n\n1. 通过访问以下链接并启动 AWS\
    \ Cloud Formation 模板来创建 AWS 欺诈检测资源：\n\n   `https://console.aws.amazon.com/cloudformation/home?region=us-east-1#/stacks/new?&templateURL=https:%2F%2Fs3.amazonaws.com%2Fsolutions-reference%2Ffraud-detection-using-machine-learning%2Flatest%2Ffraud-detection-using-machine-learning.template`\n\
    \n2. 运行笔记本，依次执行每一步：\n   1. 数据导入\n   2. 数据探索\n   3. 验证 Lambda 函数正在处理交易，然后进行建模步骤（从`SageMaker`经`Lambda`到`Kinesis`）：\n\
    \      1. 异常检测\n      2. 欺诈事件检测\n      3. 模型评估\n\n3. 检查`S3`存储桶结果和`Kinesis`流\n\
    \   1. 数据管道与模型部署（API）\n   2. CloudWatch 日志\n\n4. 最后在`QuickSight`中查看结果，并将欺诈检测分析显示为仪表盘\n\
    \n5. 拓展练习——通过使用 SMOTE（合成少数类过采样技术）平衡少数类（此处为欺诈交易）来改进模型性能\n\n## 供应链解决方案\n\n欺诈当然不仅影响金融机构。供应链也受到影响，垂直整合公司还面临着其他各种挑战，尤其是在应对通胀定价、管理或运输稀缺资源以及在气候不稳定的背景下关爱环境等方面。\n\
    \n下一节将探讨 AI 解决方案如何应用于供应链管理。\n"
- fmt: "### Challenges Across Supply Chains\n\n“Supply Chain” is of course not a specific\
    \ vertical industry or sector, rather a means by which many businesses and organizations\
    \ source and deliver their products and services. Planning, logistics, and procurement\
    \ activity within Supply Chain Management (SCM) stretches across multiple industries\
    \ including manufacturing wholesale, distribution and retail, transport (haulier,\
    \ fleet delivery) and oil and gas industries and healthcare and public services.\n\
    \nOrganizations have often struggled with knowledge gaps around use of high-performance,\
    \ sophisticated planning, scheduling, and optimization software but AI Engineers\
    \ and Data Scientists today can employ advances in cloud computing, “visual” machine\
    \ learning^([^(120)](#fn120)) and solver capability coupled with compelling front-end\
    \ design to engage a wider audience within the enterprise. Moreover, today’s AI\
    \ solutions for SCM can help operational staff understand and better manage the\
    \ company’s delivery logistics through finding answers to questions such as:\n\
    \n*   How to determine the location and capacity of warehouses\n*   Which plant\
    \ should manufacture which product\n*   Allocate aircraft and crew to flights\n\
    \n### Predictive Analytics Solutions\n\nBefore taking a look at a niche end-to-end\
    \ solution for Supply Chain Optimization, there are plenty of cases of Predictive\
    \ Analytics implemented in-house to manage key areas across the supply chain.\n\
    \nThese include risk managing vendor/supplier/customer relationships with transactional\
    \ anomaly detection, procurement engines, and fraud detection models, customer\
    \ support solutions like chatbots and IVAs or document search and retrieval, logistics\
    \ using inventory and contract management tools with “Edge AI” solutions to enable\
    \ more granular predictive analytics (e.g., supply/demand matching at local rather\
    \ than regional level) as well as asset optimization and forecasting for specific\
    \ assets and business divisions.\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig13_HTML.png)\n\
    \nAn architecture of predictive analytics solutions. It includes transactional\
    \ anomaly detection, procurement risk engine, fraud detection, inventory management,\
    \ contract management, chatbots, and IVAs.\n\n**Figure 8-13** SCM Predictive Analytics\
    \ solutions\n\n### Supply Chain Optimization and Prescriptive Analytics\n\nPredictive\
    \ Analytics on its own is insufficient for many Supply Chain Optimization problems\
    \ as its focus is on what may happen (as in expected demand in a demand forecast).\
    \ Prescriptive Analytics extends the solution space to “the way to make it happen,”\
    \ as in matching supply to expected demand as shown in the picture below.\n\n\
    Many supply chain problems (e.g., routing, scheduling, warehouse optimization,\
    \ and dispatch) involve **matching supply and demand** and require the use of\
    \ high-performance solvers to ensure optimal scheduling, routing, and dispatch\
    \ solutions applied to targeted vertical industries. `CPLEX`, `Gurobi`, and `FICO`\
    \ are industry-leading solvers for these types of planning and scheduling problems,\
    \ and we will make use of `CPLEX` in the hands-on lab for this section below.\n\
    \n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig14_HTML.jpg)\n\nAn illustration\
    \ depicts the influence of analytics on business performance based on diagnostic\
    \ analytics (9.5 percent CAGR), descriptive analytics, predictive analytics (22.1),\
    \ and prescriptive analytics (31.7).\n\n**Figure 8-14** -way Analytics (Source:\
    \ iotforall)\n\nImplementing robust prescriptive analytics algorithms or “solvers”\
    \ while following a best practice “DataOps” delivery model can ultimately bring\
    \ about some key value differentiators for an organization:\n\n*   Optimal planning\
    \ and scheduling\n*   Support for what-if scenario analysis\n*   Cost reduction\
    \ and incremental revenue benefits\n*   Performance benchmarking against legacy\
    \ processes\n\n### Supply Chain Optimization with IBM CloudPak/Watson Studio:\
    \ Hands-on Practice\n\nOrchestrating Decision Optimization and Cplex with Watson\
    \ Studio and IBM Cloud Pak\n\nIn this lab, we will deploy an end-to-end boilerplate\
    \ Supply Chain Optimization project in IBM CloudPak for Data:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig15_HTML.png)\n\
    \nA representation of supply chain optimization with IBM Cloud Pak. It includes\
    \ 1. Data preprocessing. 2. Shiny data prep notebook. 3. Supply chain or warehouse\
    \ routing optimisation (decision optimiser).\n\n**Figure 8-15** IBM CloudPak for\
    \ Data – Supply Chain Optimization\n\n1.  Sign up/log in to IBM Cloud Pak\n  \
    \  1.  [https://dataplatform.cloud.ibm.com/exchange/public/entry/view/427846c7e99026edd5fa0022830bc002?context=cpdaass](https://dataplatform.cloud.ibm.com/exchange/public/entry/view/427846c7e99026edd5fa0022830bc002%253Fcontext%253Dcpdaass)\n\
    2.  Create a project\n3.  Create a deployment space\n4.  Run each of the Jupyter\
    \ notebooks below, one by one:\n    1.  **Data preprocessing:** preprocess supply-demand\
    \ data\n        1.  Suppliers\n        2.  Manufacturers\n        3.  Warehouses\n\
    \    2.  **Shiny Data Prep** notebook\n    3.  **LSTM Demand Forecasts** (not\
    \ included)\n    4.  **Decision Optimizer**: Run a Prescriptive Optimization\n\
    \        1.  Load in preprepared LSTM Demand Forecasts\n        2.  Optimize cost\
    \ to ship parts (from four suppliers to three manufacturers) and deliver products\
    \ (from three manufacturers to four warehouses)\n5.  On completion of the Prescriptive\
    \ optimization process with Decision Optimizer, run the (Shiny) Dashboard App\
    \ and interrogate the Inventory and Demand and Supply and Logistics views\n6.\
    \  Exercise – change the product categories on the dashboard to names rather than\
    \ numbers\n7.  Stretch Exercise – schedule a once per month retrain and model\
    \ run with new data\n\n## Oil and Gas/Energy and Utilities Solutions\n\nThe Energy\
    \ sector encompasses many different businesses across the value chain, from oil\
    \ and gas majors to distribution companies, electricity generators and renewable\
    \ operators (RECs), utilities and energy retailers. We look at the opportunities\
    \ for AI below.\n\n### Challenges in Energy, Oil, and Gas Sectors\n\nIn the current\
    \ climate of reduced supply, tight supply chains and inflated prices, the energy\
    \ sector could be forgiven for paying little attention to AI as an enabler for\
    \ revenue creation and cost optimization. But there are a wealth of opportunities\
    \ for AIaaS to unlock value, particularly in the distributed energy chain and\
    \ the renewables sector. AIaaS is also adding value in the oil and gas sectors\
    \ too, as finding safe, economic, and sustainable methods of exploration and production\
    \ is a key concern, as is reducing the environmental impact of oil production.\n\
    \nLong before the current energy crisis, corporates have been burdened by legacy\
    \ (ETRM) tools and poor innovation practices. Part of the slow pace of change\
    \ in energy stems from a statistically aging workforce coupled with a bloated\
    \ tier of middle managers fearful of the impact of transformation on their jobs\
    \ and livelihoods. Others have ethical concerns about the use of emerging technologies,\
    \ even though many of these tools have long ceased to be “emerging.”\n\nChanging\
    \ workforce demographics are beginning to fuel demand for data-driven innovation\
