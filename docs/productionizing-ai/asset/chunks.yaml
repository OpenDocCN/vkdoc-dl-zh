- fmt: "# 9. Deploying an AI Solution (Productionizing and Containerization)\n\n**Productionizing\
    \ an AI model is not easy.** Many AI projects get stuck at Proof of Concept (PoC)\
    \ phase, with Gartner suggesting 50% of IT leaders will struggle to move their\
    \ AI projects past demo/prototype and into production. There is often organizational\
    \ confusion between the two aims of creating a POC and a production-grade Enterprise\
    \ AI solution, partly from the lack of expertise from the rest of the business.\
    \ There is no point, after all, in productionizing if the rest of the workforce\
    \ isn’t, at least at a basic level, upskilled on AI, how to use it and its benefits\
    \ and importantly, how to interface or engage with it or how to use it.\n\nAI\
    \ implementation requires a practical mindset and discipline. Contrary to the\
    \ hype, many issues actually stem from attempts to apply AI to “everything.” AI\
    \ is Augmented Intelligence, meaning it's applied to solving a specific business\
    \ problem with a “human-in-the-loop.” Other project issues have arisen from the\
    \ Data Scientists of the 2010s taking liberties to build “Kaggle-grade” models,\
    \ building up “technical debt” and losing sight of the practicalities, limitations,\
    \ and collective learning required in a business/organizational context.\n\nThe\
    \ sheer volume of data involved also means trying to solve the biggest problem\
    \ first doesn’t work in AI – effort estimation should be factored into upfront\
    \ planning. It's often better to start small and “stay niche” – you don’t always\
    \ need “Big Data” to train a model – and ask questions such as is the incremental\
    \ performance improvement worth the storage and/or pipeline latency overhead?\n\
    \nOur second last chapter attempts to ask these questions and provide a practical\
    \ look at “joining the dots,” addressing the barriers and simplifying the challenges\
    \ to full-stack deployment and productionization of Enterprise AI on Cloud.\n\n\
    Journeying from beta application to production and ultimately hosting apps on\
    \ cloud in our hands-on labs, we start by revisiting the project lifecycle and\
    \ agile techniques in development, delivery and testing phases of an AI project.\
    \ We look at mapping the user journey with best practice and define frameworks\
    \ for success, as well as process optimization and integration of the leading\
    \ AI tools.\n\nAfter another look at distributed storage, parallelization, and\
    \ optimizing compute (and storage) in the context of AI application scaling and\
    \ elasticity, we end the chapter with a couple of hands-on labs around two of\
    \ the best ways to productionize an AI solution – containerizing an AI app on\
    \ Azure and hosting on Heroku.\n\n## Productionizing an AI Application\n\nWe start\
    \ with the big picture and look at barriers to deployment, decisions around cloud/infrastructure,\
    \ and the importance of walking before we run.\n\n### Typical Barriers to Production\n\
    \nThere are in essence two distinct phases of an AI project – experimentation\
    \ and industrialization.\n\nThe goals for both are different; for experimentation,\
    \ it’s about finding a model that answers a (business) question accurately and\
    \ as fast as possible while for industrialization it’s about running the application\
    \ reliably and automatically.\n\nWhether the client/company is small (start-up)\
    \ or large (corporate) will impact our solution. As shown in Figure [9-1](#527966_1_En_9_Chapter.xhtml#Fig1),\
    \ for start-ups experimenting, the lack of data and budget is a constraint, while\
    \ a (data) engineering resource gap is the main barrier to productionization.\
    \ For mid-tier organizations often dedicated servers and cloud infrastructure\
    \ needed to run POCs are often lacking while data silos^([^(135)](#fn135)) and\
    \ the difficulty of recreating a multisystem production environment present significant\
    \ challenges to corporates. When coupled with devolved stakeholder responsibility\
    \ and immovable legacy systems, these issues can prevent any meaningful productionized\
    \ (Enterprise AI) solution.\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig1_HTML.jpg)\n\
    \nA set of two charts. The first chart is titled experimentation. The second chart\
    \ is titled industrialization. Both charts have three subtitles startup, mid-sized,\
    \ and corporate.\n\nFigure 9-1\n\nAI Experimentation vs. Industrialization (Source:\
    \ [`towardsdatascience.com`](http://towardsdatascience.com))\n\n### Cloud/CSP\
    \ Roulette\n\nWhether it’s a start-up, SME, or corporate, implementable Enterprise\
    \ AI solutions generally have to overcome five key constraints:\n\n*   Winning\
    \ over stakeholders\n*   A clear data-handling strategy\n*   Cloud storage and\
    \ compute\n*   Cost of solution persistence\n*   Innovation\n\nMost AI solutions\
    \ today have significant “solution concentration” around the three main CSPs of\
    \ AWS, Azure, and GCP (Figure [9-2](#527966_1_En_9_Chapter.xhtml#Fig2)). Whether\
    \ it's storage or compute, there is likely to be one or two services/resources\
    \ provisioned on Amazon, Microsoft, or Google.\n\nWith this in mind, planning\
    \ around and scoping the project in four distinct phases can help steer an AI\
    \ project toward an agreed stakeholder solution:\n\n*   Design and Implementation\n\
    *   3rd Party Interfaces\n*   Training and Testing\n*   Adoption\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig2_HTML.jpg)\n\
    \nThe diagram represents three persons, namely G C P A L platform, azure M L,\
    \ and A W S sagemaker. The three persons point the gun at each other.\n\nFigure\
    \ 9-2\n\nCSP market power\n\n### Simplifying the AI Challenge – Start Small, Stay\
    \ Niche\n\nIn scoping out our solution, and in particular toward the goal of the\
    \ last phase above (achieving AI adoption), it’s a good idea to prepare for development\
    \ and implementation around three Data/MLOps maturity levels:\n\n1.  **Manual\
    \ building and deploying of models**\n\nMake use of simple tools, for example,\
    \ `Jupyter notebook`, `Colab`, `AutoML`, drag and drop (No Code) to demonstrate\
    \ quick business/organizational value\n\n2.  **Deploy pipelines instead of models**\n\
    \nBesides use of (pretrained) model registries, this means handling each subprocess\
    \ below as a “pipeline” in order to achieve increases in stability and traceability\
    \ within the AI project:\n\n3.  **CICD integration, automated retraining, concept\
    \ drift detection**\n\n    1.  Data preprocessing\n    2.  Algo tuning\n    3.\
    \  Training and evaluation\n    4.  Model selection\n    5.  Deployment\n\nEssentially\
    \ full automation including batch inference to streaming API inference and full\
    \ integration into a CI/CD triggered re-training flow\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig3_HTML.jpg)\n\
    \nThe image represents a graph of prove experimentation versus prove industrialisation.\
    \ The x and y axis reads run reliably and automatically, and find a model answering\
    \ the question a s a p, respectively.\n\nFigure 9-3\n\nModel maturity from POC\
    \ to Production"
  raw: '# 9. Deploying an AI Solution (Productionizing and Containerization)


    **Productionizing an AI model is not easy.** Many AI projects get stuck at Proof
    of Concept (PoC) phase, with Gartner suggesting 50% of IT leaders will struggle
    to move their AI projects past demo/prototype and into production. There is often
    organizational confusion between the two aims of creating a POC and a production-grade
    Enterprise AI solution, partly from the lack of expertise from the rest of the
    business. There is no point, after all, in productionizing if the rest of the
    workforce isn’t, at least at a basic level, upskilled on AI, how to use it and
    its benefits and importantly, how to interface or engage with it or how to use
    it.


    AI implementation requires a practical mindset and discipline. Contrary to the
    hype, many issues actually stem from attempts to apply AI to “everything.” AI
    is Augmented Intelligence, meaning it''s applied to solving a specific business
    problem with a “human-in-the-loop.” Other project issues have arisen from the
    Data Scientists of the 2010s taking liberties to build “Kaggle-grade” models,
    building up “technical debt” and losing sight of the practicalities, limitations,
    and collective learning required in a business/organizational context.


    The sheer volume of data involved also means trying to solve the biggest problem
    first doesn’t work in AI – effort estimation should be factored into upfront planning.
    It''s often better to start small and “stay niche” – you don’t always need “Big
    Data” to train a model – and ask questions such as is the incremental performance
    improvement worth the storage and/or pipeline latency overhead?


    Our second last chapter attempts to ask these questions and provide a practical
    look at “joining the dots,” addressing the barriers and simplifying the challenges
    to full-stack deployment and productionization of Enterprise AI on Cloud.


    Journeying from beta application to production and ultimately hosting apps on
    cloud in our hands-on labs, we start by revisiting the project lifecycle and agile
    techniques in development, delivery and testing phases of an AI project. We look
    at mapping the user journey with best practice and define frameworks for success,
    as well as process optimization and integration of the leading AI tools.


    After another look at distributed storage, parallelization, and optimizing compute
    (and storage) in the context of AI application scaling and elasticity, we end
    the chapter with a couple of hands-on labs around two of the best ways to productionize
    an AI solution – containerizing an AI app on Azure and hosting on Heroku.


    ## Productionizing an AI Application


    We start with the big picture and look at barriers to deployment, decisions around
    cloud/infrastructure, and the importance of walking before we run.


    ### Typical Barriers to Production


    There are in essence two distinct phases of an AI project – experimentation and
    industrialization.


    The goals for both are different; for experimentation, it’s about finding a model
    that answers a (business) question accurately and as fast as possible while for
    industrialization it’s about running the application reliably and automatically.


    Whether the client/company is small (start-up) or large (corporate) will impact
    our solution. As shown in Figure [9-1](#527966_1_En_9_Chapter.xhtml#Fig1), for
    start-ups experimenting, the lack of data and budget is a constraint, while a
    (data) engineering resource gap is the main barrier to productionization. For
    mid-tier organizations often dedicated servers and cloud infrastructure needed
    to run POCs are often lacking while data silos^([^(135)](#fn135)) and the difficulty
    of recreating a multisystem production environment present significant challenges
    to corporates. When coupled with devolved stakeholder responsibility and immovable
    legacy systems, these issues can prevent any meaningful productionized (Enterprise
    AI) solution.


    ![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig1_HTML.jpg)


    A set of two charts. The first chart is titled experimentation. The second chart
    is titled industrialization. Both charts have three subtitles startup, mid-sized,
    and corporate.


    Figure 9-1


    AI Experimentation vs. Industrialization (Source: [`towardsdatascience.com`](http://towardsdatascience.com))


    ### Cloud/CSP Roulette


    Whether it’s a start-up, SME, or corporate, implementable Enterprise AI solutions
    generally have to overcome five key constraints:


    *   Winning over stakeholders


    *   A clear data-handling strategy


    *   Cloud storage and compute


    *   Cost of solution persistence


    *   Innovation


    Most AI solutions today have significant “solution concentration” around the three
    main CSPs of AWS, Azure, and GCP (Figure [9-2](#527966_1_En_9_Chapter.xhtml#Fig2)).
    Whether it''s storage or compute, there is likely to be one or two services/resources
    provisioned on Amazon, Microsoft, or Google.


    With this in mind, planning around and scoping the project in four distinct phases
    can help steer an AI project toward an agreed stakeholder solution:


    *   Design and Implementation


    *   3rd Party Interfaces


    *   Training and Testing


    *   Adoption


    ![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig2_HTML.jpg)


    The diagram represents three persons, namely G C P A L platform, azure M L, and
    A W S sagemaker. The three persons point the gun at each other.


    Figure 9-2


    CSP market power


    ### Simplifying the AI Challenge – Start Small, Stay Niche


    In scoping out our solution, and in particular toward the goal of the last phase
    above (achieving AI adoption), it’s a good idea to prepare for development and
    implementation around three Data/MLOps maturity levels:


    1.  **Manual building and deploying of models**


    Make use of simple tools, for example, Jupyter notebook, Colab, AutoML, drag and
    drop (No Code) to demonstrate quick business/organizational value


    1.  **Deploy pipelines instead of models**


    Besides use of (pretrained) model registries, this means handling each subprocess
    below as a “pipeline” in order to achieve increases in stability and traceability
    within the AI project:


    1.  **CICD integration, automated retraining, concept drift detection**


    1.  Data preprocessing


    2.  Algo tuning


    3.  Training and evaluation


    4.  Model selection


    5.  Deployment


    Essentially full automation including batch inference to streaming API inference
    and full integration into a CI/CD triggered re-training flow


    ![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig3_HTML.jpg)


    The image represents a graph of prove experimentation versus prove industrialisation.
    The x and y axis reads run reliably and automatically, and find a model answering
    the question a s a p, respectively.


    Figure 9-3


    Model maturity from POC to Production'
  trans: "\n# 9. 部署 AI 解决方案（生产化与容器化）\n\n**将 AI 模型生产化并非易事。** 许多 AI 项目都停留在概念验证阶段，Gartner\
    \ 指出，50%的 IT 领导者将难以将其 AI 项目从演示/原型阶段推进到生产阶段。在创建概念验证和生产级企业 AI 解决方案这两个目标之间，组织内部常常存在混淆，部分原因是业务部门其他人员缺乏相关专业知识。毕竟，如果其他员工没有至少掌握基本的\
    \ AI 技能、不了解如何使用 AI 及其优势，更重要的是不知道如何与 AI 交互或使用它，那么生产化就毫无意义。\n\nAI 实施需要务实的心态和纪律。与炒作相反，许多问题实际上源于试图将\
    \ AI 应用于“一切”。AI 是增强智能，意味着它通过“人在回路中”的方式来解决特定的业务问题。其他项目问题则源于 2010 年代的数据科学家随意构建“Kaggle\
    \ 级别”的模型，积累“技术债务”，而忽视了在业务/组织环境中所需的实用性、局限性和集体学习。\n\n所涉及的数据量巨大也意味着，试图先解决最大的问题在 AI\
    \ 中行不通——工作量估算应纳入前期规划。通常，从小处着手并“保持专注”更好——你并不总是需要“大数据”来训练模型——并询问诸如增量性能提升是否值得存储和/或管道延迟开销之类的问题？\n\
    \n我们的倒数第二章试图提出这些问题，并提供一个“串联各个点”的实用视角，解决障碍并简化在云上实现企业 AI 全栈部署和生产化的挑战。\n\n在我们的实践实验室中，从测试版应用走向生产，并最终在云上托管应用，我们首先回顾\
    \ AI 项目在开发、交付和测试阶段的项目生命周期和敏捷技术。我们研究如何根据最佳实践映射用户旅程，定义成功框架，以及流程优化和领先 AI 工具的集成。\n\
    \n在再次审视分布式存储、并行化以及在 AI 应用扩展和弹性背景下优化计算（和存储）之后，我们以两个实践实验室结束本章，这两个实验室围绕生产化 AI 解决方案的两种最佳方式——在\
    \ Azure 上容器化 AI 应用并在 Heroku 上托管。\n\n## 生产化 AI 应用\n\n我们从宏观视角开始，审视部署的障碍、关于云/基础设施的决策，以及在跑之前先学会走路的重要性。\n\
    \n### 生产化的典型障碍\n\nAI 项目本质上分为两个不同的阶段——实验和工业化。\n\n两者的目标不同；实验的目标是尽可能快速准确地找到一个能回答（业务）问题的模型，而工业化的目标是可靠且自动地运行应用程序。\n\
    \n客户/公司是小型（初创公司）还是大型（企业）将影响我们的解决方案。如图 9-1 所示，对于进行实验的初创公司，缺乏数据和预算是制约因素，而（数据）工程资源缺口是生产化的主要障碍。对于中型组织，运行概念验证所需的专用服务器和云基础设施通常缺乏，而数据孤岛^(¹³⁵)和重建多系统生产环境的困难则给企业带来了重大挑战。当与分散的利益相关者责任和不可移动的遗留系统相结合时，这些问题可能会阻碍任何有意义的生产化（企业\
    \ AI）解决方案。\n\n![](img/527966_1_En_9_Fig1_HTML.jpg)\n\n两张图表。第一张图表标题为实验。第二张图表标题为工业化。两张图表都有三个副标题：初创公司、中型企业和大型企业。\n\
    \n图 9-1\n\nAI 实验与工业化（来源：[`towardsdatascience.com`](http://towardsdatascience.com)）\n\
    \n### 云/CSP 轮盘赌\n\n无论是初创公司、中小企业还是大型企业，可实施的企业 AI 解决方案通常必须克服五个关键限制：\n\n*   赢得利益相关者的支持\n\
    *   清晰的数据处理策略\n*   云存储和计算\n*   解决方案持久化的成本\n*   创新\n\n如今，大多数 AI 解决方案在 AWS、Azure\
    \ 和 GCP 这三个主要 CSP 上存在显著的“解决方案集中度”（图 9-2）。无论是存储还是计算，很可能在亚马逊、微软或谷歌上配置了一两个服务/资源。\n\
    \n考虑到这一点，通过四个不同阶段来规划和界定项目范围，有助于引导 AI 项目走向利益相关者达成一致的解决方案：\n\n*   设计与实施\n*   第三方接口\n\
    *   训练与测试\n*   采用\n\n![](img/527966_1_En_9_Fig2_HTML.jpg)\n\n该图代表三个人，分别是 G C P\
    \ A L 平台、azure M L 和 A W S sagemaker。这三个人互相用枪指着对方。\n\n图 9-2\n\nCSP 市场力量\n\n###\
    \ 简化 AI 挑战——从小处着手，保持专注\n\n在界定解决方案范围时，特别是为了实现上述最后一个阶段（实现 AI 采用）的目标，围绕三个数据/MLOps\
    \ 成熟度级别来准备开发和实施是一个好主意：\n\n1.  **手动构建和部署模型**\n\n使用简单工具，例如`Jupyter notebook`、`Colab`、`AutoML`、拖放（无代码）来快速展示业务/组织价值\n\
    \n2.  **部署管道而非模型**\n\n除了使用（预训练）模型注册表之外，这意味着将以下每个子流程作为“管道”来处理，以便在 AI 项目中实现稳定性和可追溯性的提升：\n\
    \n3.  **CICD 集成、自动重训练、概念漂移检测**\n\n    1.  数据预处理\n    2.  算法调优\n    3.  训练与评估\n\
    \    4.  模型选择\n    5.  部署\n\n本质上是完全自动化，包括从批量推理到流式 API 推理，以及完全集成到 CI/CD 触发的重训练流程中\n\
    \n![](img/527966_1_En_9_Fig3_HTML.jpg)\n\n该图表示一个证明实验与证明工业化的图表。x 轴和 y 轴分别标注为“可靠且自动地运行”和“尽可能快地找到回答问题的模型”。\n\
    \n图 9-3\n\n从概念验证到生产的模型成熟度\n"
- fmt: "### Database Management in Python: Hands-on Practice\n\n**SQL DATABASE READ/WRITE\
    \ FROM PYTHON**\n\nIntegrating two important components of an AI solution – Data\
    \ Storage and Python, the goal of this lab is to use Python to write to and then\
    \ read back from a SQL database:\n\n1.  Install SQLite by going to [`www.sqlite.org/download.xhtml`](http://www.sqlite.org/download.xhtml)\
    \ and downloading the precompiled binaries for Windows (both `sqlite-dll-win64-x64-3360000.zip`\
    \ and `sqlite-tools-win32-x86-3360000.zip`).\n2.  Create a folder on your local\
    \ drive `C:\\sqlite` and unzip the two files above.\n3.  Add `C:\\sqlite` as a\
    \ system path environment variable.\n4.  Test the install in terminal by typing:\n\
    \    ```\n    sqlite3\n    sqlite3 test.db\n    ```\n    The latter step will\
    \ create a test database called `test`.\n\nNow (optionally) install DB Browser\
    \ [`https://sqlitebrowser.org/`](https://sqlitebrowser.org/) to see the SQL database\
    \ and tables created in the remainder of this lab.\n\n1.  Download the Python\
    \ notebook from the GitHub repo below:\n    [`https://github.com/bw-cetech/apress-9.1.git`](https://github.com/bw-cetech/apress-9.1.git)\n\
    2.  Run through the steps in the notebook to:\n    1.  Create database.\n    2.\
    \  Create table.\n    3.  Insert data (single record).\n    4.  Run a select query.\n\
    \    5.  Import the `“HRE-short.csv”` file downloaded from the GitHub link above\
    \ to Python and then bulk export to SQLite.\n    6.  View the data in DB Browser.\n\
    \    7.  Finally, convert the data to a DataFrame in Python.\n\n### App Building\
    \ on GCP: Hands-on Practice\n\n**DEPLOYING A MACHINE LEARNING MODEL ON GCP**\n\
    \nIn this lab we look at deploying a simple machine learning model on Google Cloud\
    \ Platform.\n\n1.  Create a project on GCP [`https://console.cloud.google.com`](https://console.cloud.google.com).\n\
    2.  Create an app using App Engine at the link below: [`https://console.cloud.google.com/appengine`](https://console.cloud.google.com/appengine).\n\
    3.  Start GCP cloud shell and connect to the project.\n4.  Clone (in Cloud Shell)\
    \ the sample model at the GitHub link below:\n    [`https://github.com/opeyemibami/deployment-of-titanic-on-google-cloud`](https://github.com/opeyemibami/deployment-of-titanic-on-google-cloud)\n\
    5.  Initialize `gcloud` in the project directory by running `gcloud init`.\n6.\
    \  Deploy the app following the steps in the link below:\n    [`https://heartbeat.comet.ml/deploying-machine-learning-models-on-google-cloud-platform-gcp-7b1ff8140144`](https://heartbeat.comet.ml/deploying-machine-learning-models-on-google-cloud-platform-gcp-7b1ff8140144)\n\
    7.  Download Postman Desktop version from the link below: [`www.postman.com/downloads/`](http://www.postman.com/downloads/)\
    \ and test the connection with the app.\n\n### PowerBI – Python Handshake: Hands-on\
    \ Practice\n\n**FRONT-ENDING PREDICTIVE ANALYTICS**\n\nThis short lab takes the\
    \ previously completed “Python Data Ingestion – Met Office weather data” lab from\
    \ Chapter [3](#527966_1_En_3_Chapter.xhtml) and creates a PowerBI front-end from\
    \ the Python-scraped output.\n\n1.  If not already installed, download PowerBI\
    \ desktop from the link below:\n    [`https://powerbi.microsoft.com/en-us/downloads/`](https://powerbi.microsoft.com/en-us/downloads/)\n\
    \    and follow the steps here to set the Python path in PowerBI:\n    [`https://docs.microsoft.com/en-us/power-bi/connect-data/desktop-python-scripts`](https://docs.microsoft.com/en-us/power-bi/connect-data/desktop-python-scripts)\n\
    2.  Paste the completed script from the Met Office Data Ingestion lab in Chapter\
    \ [3](#527966_1_En_3_Chapter.xhtml), under `Data > More > Other > Python script`\
    \ in PowerBI.\n3.  Create a line chart showing the minimum and maximum temperatures\
    \ for the next 5 days. Note you will need to:\n    1.  Convert the imported columns\
    \ (forecast values) to a whole number.\n    2.  Format the chart into a “presentation-quality”\
    \ visualization in PowerBI.\n\n## AI Project Lifecycle\n\n### Design Thinking\
    \ Through to Agile Development\n\nHaving taken a look at what works in moving\
    \ from experimentation to productization, how to go about implementing an approach\
    \ from scratch?\n\nIntense competition has driven the need for organizations to\
    \ change strategy quickly, forcing companies to look closely at their capabilities\
    \ and processes and identify barriers and benefits to adaptability and innovation.\
    \ Adoption of initial **Design Thinking** approaches helps to navigate this disruptive\
    \ landscape, ensuring that business stakeholders, processes, tools, systems, and\
    \ data touchpoints are brought in-scope.\n\n**Design Thinking** as creative problem-solving\
    \ process is focused on people, rather than tools and, when done well, a key outcome\
    \ is a set of projects to deliver the “right things.” These projects themselves\
    \ are not enough to guarantee a successful deployment – but often feed into one\
    \ of the cornerstones of DataOps – **agile** development and delivery focused\
    \ on “building the thing right.” Figure [9-4](#527966_1_En_9_Chapter.xhtml#Fig4)\
    \ illustrates this concept:\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig4_HTML.jpg)\n\
    \nThe diagram explains three circles namely, explore the problem, build the right\
    \ things, and build the thing right. Inside each circle is mentioned design thinking,\
    \ lean, and agile, respectively.\n\n**Figure 9-4** Design Thinking, Lean and Agile\
    \ (Source: Jonny Schneider)\n\n### Driving Development Through Hypothesis\n\n\
    How does agile development look in an AI project? **Hypothesis-driven development**\
    \ is a prototype methodology that allows Solution Architects (as well as Data\
    \ Scientists and AI Engineers) to develop, test, and rebuild a product until it's\
    \ acceptable by the users.\n\nHighly iterative, the process takes assumptions\
    \ defined during the project and attempts to validate them with users/client feedback.\
    \ More evolutionary than “traditional” requirements capture which give rise to\
    \ errors similar to those in “waterfall” approaches, these hypotheses recognize\
    \ that world is complex, changing, and often confusing.\n\nAs shown in Figure\
    \ [9-5](#527966_1_En_9_Chapter.xhtml#Fig5), the general idea is to experiment\
    \ early and often, solicit feedback from customers and discard features that provide\
    \ little benefit.\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig5_HTML.jpg)\n\
    \nThe diagram consists of six circles arranged in an elliptical formation. In\
    \ the middle of the ellipse, there are seven hexagon shapes.\n\n**Figure 9-5**\
    \ IBM Garage hypothesis-driven development\n\n### Collaborate, Test, Measure,\
    \ Repeat\n\nAs mentioned in the introduction to this chapter, a lack of foresight\
    \ from companies employing Data specialists in the 2010s has led to an enormous\
    \ accumulation of **technical debt.** Rather than fully integrated AI (stakeholders!)\
    \ and solutions, the result has been systems deployed without the processes and\
    \ tools to maintain, monitor, and update them.^([^(136)](#fn136))\n\n**Continuous\
    \ testing** in DataOps is one means to help address these issues. Ostensibly it's\
    \ about building trust in data upfront and reducing the time it takes to identify\
    \ and fix problems before trust is lost:\n\n- **Version control** – using `git`,\
    \ GitHub to improve collaboration.\n- **Automate tests** – automating tests: to\
    \ help accelerate innovation lifecycle and change processes.\n- **Measure errors**\
    \ – tracking and lowering monthly production error rates.\n- **Track productivity**\
    \ – benchmarking process improvements and time to deliver."
