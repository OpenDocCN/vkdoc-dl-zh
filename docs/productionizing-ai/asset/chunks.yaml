- fmt: "### Containerization\n\nWhile the relative low cost and ease of deployment\
    \ of compute and storage solutions on cloud have underpinned adoption of cloud\
    \ for AI, the use of containers has become the go-to means of productionizing\
    \ AI applications.\n\nAll the main cloud platforms contain containerization services\
    \ – a lightweight alternative to full machine virtualization that involves encapsulating\
    \ an application in a container with its own operating environment. Containerization\
    \ comes with a number of benefits highly suited to building robust production-grade\
    \ AI solutions including the ability to simplify and speed up the development,\
    \ deployment, and applications configuration process, increased portability and\
    \ server integration and scalability as well as increased productivity and federated\
    \ security.\n\n#### Docker and Kubernetes\n\n`Docker` is the main container runtime\
    \ we will utilize in this book. `Docker`’s USP lies in its handling of dependencies,\
    \ multiple (programming) language, and compilation issues when creating isolated\
    \ environments to launch and deploy applications. In much the same way a “physical”\
    \ container can be transported by ship, truck, or train, standardization within\
    \ a `Docker` container means it is effectively able to run on any platform.\n\n\
    Although there are many similarities with Virtual Machines, as shown in Figure\
    \ [1-12](#527966_1_En_1_Chapter.xhtml#Fig12), `Docker` better supports multiple\
    \ applications sharing the same underlying operating system. `Docker` is also\
    \ fast, starting and stopping apps in a few seconds. `PostgreSQL`, `Java`, `Apache`,\
    \ `elastic`, and `mongoDB` all run on `Docker`.\n\n![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig12_HTML.jpg)\n\
    \nTwo diagrams. On the left are the applications A to F, docker, host operating\
    \ system, and infrastructure. On the right are the applications A to C of the\
    \ guest O S, hypervisor, and infrastructure.\n\n**Figure 1-12** Comparing Docker\
    \ with a Virtual Machine (Source: Docker)\n\nAlthough we will not use it in this\
    \ book, `Kubernetes` (`k8s`), a container management tool, is often used to orchestrate\
    \ `Docker` “instances.” As an open source platform, `Kubernetes` was originally\
    \ designed by Google and automates deployment, management, and scaling of applications\
    \ in the container.\n\n### Productionizing AI: Hands-on Practice\n\nWith that\
    \ brief introduction to containers and `Docker`, we reach our last hands-on lab\
    \ for the first chapter.\n\n**AUTOMATING THE AI PROCESS – TOOLS AND TECHNIQUES**\n\
    \n**The goal of this exercise is to get familiar with Compute, Storage, and Container\
    \ solutions on cloud and to explore Machine Learning automation with Python –\
    \ often the end goal of a production-grade AI solution.**\n\n1.  Sign up for AWS\
    \ Free Tier and open AWS Console: [`https://console.aws.amazon.com`](https://console.aws.amazon.com)\n\
    \n2.  Explore the key compute, storage, and container services on AWS\n\n    [`https://aws.amazon.com/products/compute/`](https://aws.amazon.com/products/compute/)\n\
    \n    [`https://aws.amazon.com/products/storage/`](https://aws.amazon.com/products/storage/)\n\
    \n    [`https://aws.amazon.com/containers/services/`](https://aws.amazon.com/containers/services/)\n\
    \n3.  Now go to Google Colab and run the Python script below to see an end-to-end\
    \ example of machine learning automation.\n\n4.  This script uses `PyCaret` and\
    \ an inbuilt insurance dataset to run through a number of data pipeline/feature\
    \ transformations, train linear regression models and select the best one based\
    \ on performance. This same hands-on lab will be the starting point for an extensive\
    \ final lab in Chapter [9](#527966_1_En_9_Chapter.xhtml) on Productionizing AI.\n\
    \n5.  Note the script uses a static data file built into the `PyCaret` library\
    \ but often this kind of automation with a Big Data dataset leverages cloud storage,\
    \ and distributed computing to improve overall performance and data security.\n\
    \nPython code:\n\n```\n#ONE OFF INSTALL – comment out after running\n#NB install\
    \ may display an error at end of process, however this doesn’t impact the subsequent\
    \ autoML modelling process\n%pip install pycaret\n# Import dataset from pycaret\
    \ repository\nfrom pycaret.datasets import get_data\ninsurance = get_data('insurance')\n\
    #insurance.head()\n# NB when running below, make sure press enter to continue\
    \ / accept\n# Initialize environment\nfrom pycaret.regression import *\nr1 = setup(insurance,\
    \ target = 'charges', session_id = 123,\nnormalize = True,\npolynomial_features\
    \ = True, trigonometry_features = True,\nfeature_interaction=True,\nbin_numeric_features=\
    \ ['age', 'bmi'])\n# Train a linear regression model\nlr = create_model('lr')\n\
    # save transformation pipeline and model\n# NB gets saved in /content folder as\
    \ pkl file\n# NB model_only=True added in line with reference https://github.com/pycaret/pycaret/issues/985\n\
    save_model(lr, model_name = 'insurance-ml', model_only=True)\n```\n\n## Wrap-up\n\
    \nThis glimpse at productionizing AI using AWS Storage and Compute instances and,\
    \ separately, `PyCaret` hopefully gives readers a taste of things to come. While\
    \ basic, the emphasis is on exposure at this stage to key tools and techniques,\
    \ all of which will be elaborated in subsequent chapters.\n\nIn our next chapter,\
    \ we look at the high level of AI solution implementation and best practice AI\
    \ project delivery with DataOps.\n\nFootnotes [1](#527966_1_En_1_Chapter.xhtml#Fn1_source)\
    \   [2](#527966_1_En_1_Chapter.xhtml#Fn2_source)   [3](#527966_1_En_1_Chapter.xhtml#Fn3_source)\
    \   [4](#527966_1_En_1_Chapter.xhtml#Fn4_source)   [5](#527966_1_En_1_Chapter.xhtml#Fn5_source)\
    \   [6](#527966_1_En_1_Chapter.xhtml#Fn6_source)   [7](#527966_1_En_1_Chapter.xhtml#Fn7_source)\
    \   [8](#527966_1_En_1_Chapter.xhtml#Fn8_source)   [9](#527966_1_En_1_Chapter.xhtml#Fn9_source)\
    \   [10](#527966_1_En_1_Chapter.xhtml#Fn10_source)   [11](#527966_1_En_1_Chapter.xhtml#Fn11_source)\
    \   [12](#527966_1_En_1_Chapter.xhtml#Fn12_source)   [13](#527966_1_En_1_Chapter.xhtml#Fn13_source)\
    \   [14](#527966_1_En_1_Chapter.xhtml#Fn14_source)   [15](#527966_1_En_1_Chapter.xhtml#Fn15_source)\
    \   [16](#527966_1_En_1_Chapter.xhtml#Fn16_source)   [17](#527966_1_En_1_Chapter.xhtml#Fn17_source)\n\
    \n# 2. AI Best Practice and DataOps\n\nWe ran through in the first chapter the\
    \ key themes for productionizing AI today. Before we proceed into an exhaustive\
    \ look at data ingestion and techniques and tools for building an AI application,\
    \ it's important to establish a framework for success.\n\nThat framework starts\
    \ with a step-back and a “top-down” understanding of the wider context for AI,\
    \ key stakeholders, business/organizational process methodologies, the importance\
    \ of collaboration and stakeholder consensus, adaptability and reuse as well as\
    \ best practice in delivering high-performance AI solutions. There are many best\
    \ practice frameworks which can perform this function but in this book we consider\
    \ the one best we consider as best placed to achieve a culture of continuous improvement\
    \ in the workplace today – DataOps.\n\nThe approach taken in this chapter is focused\
    \ on awareness of DataOps concepts, rather than a “deep dive” but along the way\
    \ we will touch on the cornerstones of DataOps^([^(25)](#fn25)) including agile\
    \ and how to orchestrate agile development and delivery, team and design sprint\
    \ methods and collaboration.\n\nWe will also take a brief look at creating a high-performance\
    \ culture, reusing materials and artifacts, version control and code automation\
    \ including continuous integration (CI) and continuous deployment (CD) with `Jenkins`\
    \ and containerization with `Docker` as well as test automation with `Selenium`\
    \ and monitoring with `Nagios`.\n\nIn later chapters, we will “join-the-dots”\
    \ when we take a look at practical implementation of a data/analytics/AI project,\
    \ and adapting projects from other industries while tying implementation of best\
    \ practice to DataOps techniques.\n\n### Introduction to DataOps and MLOps\n\n\
    We start in this first section by introducing the key concept: DataOps (and MLOps)\
    \ as a framework for the successful productionization of Artificial Intelligence\
    \ applications."
