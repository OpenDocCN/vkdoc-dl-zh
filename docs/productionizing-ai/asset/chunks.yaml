    # 4. Machine Learning on Cloud


    In terms of (Gartner) Hype Cycle transitions, Machine Learning has long since
    passed its “peak of inflated expectations,” but it remains the core AI technique
    in use in most businesses and organizations today.


    Before embarking on an extended look at Deep Learning, we carry out in this chapter
    a quick refresher on Machine Learning with reference to applications on cloud.
    As mentioned in Chapter [1](#527966_1_En_1_Chapter.xhtml), it is expected readers
    have some grounding in Machine Learning already, so will assume a basic understanding
    of supervised and unsupervised machine learning exists.


    As such this fourth chapter is an accelerated run through of the mechanics of
    Machine Learning, covering critical processes from Data Import through EDA and
    Data Wrangling (cleaning, encoding, normalizing, and scaling) as well as the model
    training process. We will look at both unsupervised (clustering) techniques and
    supervised classification and regression as well as time series approaches before
    interpreting results and comparing performance across multiple algorithms.


    We wrap up with the inference process and deploying a model to cloud. Following
    a more expansive look at Neural Networks and Deep Learning in AI in the next chapter,
    we will revisit machine learning again in Chapter [6](#527966_1_En_6_Chapter.xhtml),
    specifically usage of increasingly important NoLo code UIs and AutoML tools for
    AI: Azure Machine Learning and IBM Cloud Pak for Data.


