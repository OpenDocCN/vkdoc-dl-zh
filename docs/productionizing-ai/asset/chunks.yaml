    \ CSP capability to scale up or scale out with forecasted (or even actual) AI\
    \ application usage is still mired in opacity.\n\n### Data Stores for AI: Hands-on\
    \ Practice\n\nNow that we have gone through the key concepts, let’s take a look\
    \ at how at two Data Stores widely used on AWS Cloud can support AI projects\n\
    \nAWS DATA PIPELINE\n\n**The goal of this exercise is to create a DynamoDB NoSQL\
    \ table on AWS, an S3 (File Store) output bucket, and an AWS Data Pipeline to\
    \ transfer data from DynamoDB to S3:**\n\n1.  Follow the steps below to see how\
    \ data can be transferred across data stores on AWS:\n    1.  Add DynamoDB NoSQL\
    \ table\n\n    2.  Create S3 bucket\n\n    3.  Configure AWS Data Pipeline\n\n\
    \    4.  Launch EMR cluster with multiple EC2 instances\n\n    5.  Activate pipeline\n\
    \n    6.  Export S3 data\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig8_HTML.jpg)\n\
    \nA data flow diagram initiates from dynamo D B, passes through A W S pipeline,\
    \ E M R, multiple amazon E C 2, and ends at the S 3 bucket.\n\nFigure 3-8\n\n\
    Data Stores for AI (Hands-on Practice) – data flow\n\n## Cloud Services for Data\
    \ Ingestion\n\nIn this third section, we take a look at cloud services and tools\
    \ for ingesting and querying streaming data and data storage of analytical/batch\
    \ data in order to service downstream enterprise analytics and BI teams.\n\n###\
    \ Cloud (SQL) Data Warehouses\n\nThere are four main cloud data warehouses in\
    \ use by companies today:\n\n**Azure: SQL Data Warehouse/Synapse Analytics –**\
    \ petabyte-scale Massively Parallel Processing (MPP) analytical data warehouse\
    \ built on the foundation of SQL Server and run as part of the Azure Cloud Computing\
    \ Platform\n\n**AWS Redshift –** for querying and joining exabytes (1000*petabyte)\
    \ of structured and semistructured data across data warehouses, operational databases,\
    \ and data lakes using standard SQL\n\n**GCP BigQuery –** serverless, highly scalable,\
    \ and cost-effective multicloud data warehouse with ANSI SQL support designed\
    \ for business agility\n\n**Snowflake Cloud Data Platform –** the largest ever\
    \ software IPO in 2020, Snowflake was introduced as a modern “serverless”/SaaS\
    \ cloud-based data platform which sits on top of AWS or Azure infrastructure.\
    \ It has notable advantages, such as no hardware or software to select, install,\
    \ configure, or manage, and is ideal for organizations that don’t want to dedicate\
    \ resources for setup, maintenance, and support of in-house servers\n\nNotable\
    \ others include IBM Db2 (good for Machine Learning), Oracle (good for automation)\
    \ SAP (good for legacy SAP users), and Teradata Vantage (good CSP integration)."
  trans: "\n### ETL 与 ELT\n\n如前所述，历史上通常使用 ETL（提取、转换、加载）流程将数据从源系统导入数据仓库/数据库。在许多情况下，这种方法仍然是首选，因为它能将数据固有地转换为结构化的、固定模式的、关系型数据库格式，并且一旦完成数据转换的开销，就能对预处理后的数据进行更快、更直观的分析。ETL\
    \ 方法通常也更适用于将数据存储从本地迁移到云端。\n\n然而，还有另一种选择，它有时更适合数据湖的底层设计，并且在支持数据科学和人工智能所需的关键数据挖掘和特征工程任务方面更加灵活。\n\
    \n在这种替代性的 ELT 流程（提取、加载、转换）中，数据被提取后，首先直接加载到存储层，而不进行任何转换。\n\n由于我们可以直接查询已加载到数据库中的数据，因此\
    \ ELT 流程是将原始数据暴露给最终用户进行分析、商业智能或人工智能的最快方式。然而，通常还需要进行一些“轻量级转换”，用于：\n\n-   列选择（我们不需要整个数据源）\n\
    -   隐私保护——某些字段可能需要被过滤或哈希处理，例如，个人身份信息 (PII)\n-   增量提取——仅上传新行并处理模式变更\n\n在我们可以将数据可视化（例如，在\
    \ BI 平台/GUI 中）之前，还需要进行大量复杂的转换逻辑：从清理数据到删除重复或过时的条目；将数据从一种格式转换为另一种格式；连接和聚合数据，以及排序和排序数据。因此，当对源数据集有（或可以有）更深入的（内部）了解时，ELT\
    \ 流程更适合探索性分析和数据科学。\n\nELT 流程是将数据加载到数据湖中的首选方法；由于 ETL 是在没有数据湖的时代开发的，它不太符合现代对直接访问原始数据的需求。\n\
    \n要将数据导入数据湖，需要从源系统（通过 API）提取数据，并且（通常）使用 CSP 或 EL 供应商提供的提取脚本。我们将在关于数据管道的最后一部分中更详细地介绍提取脚本。\n\
    \n### SQL 与 NoSQL 数据库\n\n在讨论这一部分时，我们无法不将上述概念：数据湖与数据仓库、OLTP 与 OLAP、以及 ETL 与 ELT，与\
    \ SQL 和 NoSQL 数据库的结构和用例联系起来。\n\n在大多数情况下，关系型或 SQL 数据库用于 OLAP 系统，并使用 SQL 查询来分析数据和提取洞察——SQL\
    \ 简单而强大的 `JOIN` 子句用于组合多个数据源，至今仍非常流行。\n\nSQL 数据库具有严格的、结构化的数据存储方式，通常包含两个或多个具有列和行的表——它们更像数据仓库而非数据湖。`MS\
    \ SQL Server`、`MySQL`、`Oracle`、`IBM DB2` 和 `PostgreSQL` 都是符合 ACID（原子性、一致性、隔离性和持久性）的\
    \ SQL 数据库，如今被广泛用于支持人工智能项目。\n\nNoSQL，即非关系型数据库，开发于 2000 年代末期，旨在改善扩展性、查询速度，并支持 DevOps\
    \ 中所需的频繁应用变更。NoSQL 数据库的特点是没有固定模式，其结构基于键值对（JSON 文档）以及节点和边（图数据库），而不是具有固定行和列的表。除了在处理非结构化数据（如图像、文档文件和电子邮件）方面具有无模式的优势外，NoSQL\
    \ 还非常适合需要海量（PB 级）数据存储需求的分布式数据存储。流行的 NoSQL 数据库示例包括 `MongoDB`、`Redis`、`Neo4j`、`Apache\
    \ Cassandra` 和 `Apache HBase`，所有现代数据湖和现代数据仓库都包含连接 SQL 和 NoSQL 的连接器。图 3-7 比较了 SQL\
    \ 和 NoSQL。\n\n![](img/527966_1_En_3_Fig7_HTML.jpg)\n\n一幅插图展示了 SQL 和 NoSQL 数据库之间的比较。SQL\
    \ 有一个关系型数据库，包含博客文章、博客标签和博客评论的表。NoSQL 有一个非关系型数据库，存储在一个单一的文档文件中。\n\n图 3-7 SQL 与\
    \ NoSQL（Upwork）\n\n### 弹性与可扩展性\n\n本节的最后一个词是关于两个重要概念，它们与使用云的基本业务和组织驱动因素相关，即弹性与可扩展性。\n\
    \n**可扩展性** – 指的是增加“计算能力”，即计算资源以支持**静态**需求和/或容纳更大的**静态**负载的能力：\n\n-   纵向扩展 – 实质上意味着增强硬件\n\
    -   横向扩展 – 添加额外的“节点”（更多计算机或虚拟机）\n\n**弹性** – 指的是为当前工作负载**动态**提供必要资源的能力\n\n自然地，这为处于更高（数据）成熟度水平的公司带来了更复杂的能力衡量标准——**弹性伸缩**，即根据不断变化的应用流量模式自动添加或删除计算或网络基础设施的能力。\n\
    \n如今，大多数云服务既具有弹性又具有可扩展性，但成本模型差异很大，并且将 CSP 固有的纵向或横向扩展能力与预测的（甚至实际的）AI 应用使用情况联系起来，仍然迷雾重重。\n\
    \n### 用于 AI 的数据存储：动手实践\n\n现在我们已经了解了关键概念，让我们看看 AWS 云上广泛使用的两种数据存储如何支持 AI 项目。\n\n\
    **AWS 数据管道**\n\n本练习的目标是在 AWS 上创建一个 `DynamoDB` NoSQL 表、一个 `S3`（文件存储）输出桶，以及一个用于将数据从\
    \ `DynamoDB` 传输到 `S3` 的 `AWS 数据管道`：\n\n1.  按照以下步骤了解数据如何在 AWS 上的数据存储之间传输：\n   \
    \ 1.  添加 `DynamoDB` NoSQL 表\n    2.  创建 `S3` 桶\n    3.  配置 `AWS 数据管道`\n    4.\
    \  启动包含多个 `EC2` 实例的 `EMR` 集群\n    5.  激活管道\n    6.  导出 `S3` 数据\n\n![](img/527966_1_En_3_Fig8_HTML.jpg)\n\
    \n一个数据流图从 `DynamoDB` 开始，经过 `AWS 管道`、`EMR`、多个 `Amazon EC2`，最终到达 `S3` 桶。\n\n图 3-8\
    \ 用于 AI 的数据存储（动手实践）——数据流\n\n## 用于数据摄入的云服务\n\n在本第三节中，我们将探讨用于摄入和查询流式数据以及存储分析/批处理数据的云服务和工具，以便为下游的企业分析和\
    \ BI 团队提供服务。\n\n### 云（SQL）数据仓库\n\n当今企业主要使用四种云数据仓库：\n\n-   **Azure：SQL 数据仓库/Synapse\
    \ Analytics** – 基于 SQL Server 构建、作为 Azure 云计算平台一部分运行的 PB 级大规模并行处理 (MPP) 分析型数据仓库\n\
    -   **AWS Redshift** – 用于使用标准 SQL 跨数据仓库、操作型数据库和数据湖查询和连接 EB 级（1000*PB）的结构化和半结构化数据\n\
    -   **GCP BigQuery** – 无服务器、高度可扩展且经济高效的多云数据仓库，支持 ANSI SQL，专为业务敏捷性而设计\n-   **Snowflake\
    \ 云数据平台** – 作为 2020 年有史以来最大的软件 IPO，Snowflake 被引入为一种现代的“无服务器”/SaaS 云数据平台，它运行在 AWS\
    \ 或 Azure 基础设施之上。它具有显著优势，例如无需选择、安装、配置或管理任何硬件或软件，非常适合不希望为内部服务器的设置、维护和支持投入资源的组织。\n\
    \n其他值得注意的包括 `IBM Db2`（适合机器学习）、`Oracle`（适合自动化）、`SAP`（适合传统 SAP 用户）和 `Teradata Vantage`（良好的\
    \ CSP 集成）。\n"
- fmt: '### Data Lake Storage


    **Microsoft Azure Data Lake Storage (ADLS) or Gen2** is marketed as a next-generation
    data lake solution for big data analytics. It is built on Azure Blob (Binary Large
    Object) storage, particularly suited for vast amounts of unstructured data including
    streaming video and audio, containerized on organization’s storage account.


    `ADLS` is a fully managed, elastic, scalable, and secure file system that supports
    HDFS semantics and works with the Apache Hadoop ecosystem. It is also the underlying
    storage for PowerBI Dataflows.


    **AWS Simple Storage Service (S3):** on Amazon Web Services, `S3` is the storage
    service of choice to build a data lake on AWS. Secure, highly scalable and durable,
    able to both ingest structured and unstructured data and catalog and index the
    data for downstream analysis, `S3` is used as an underlying Data Store in many
    analytics projects and machine learning applications today. When block storage
    is required, Amazon Elastic Block Store (`EBS`) is used (comparable with Azure
    Blob Storage).


    **Google BigLake**: BigLake has recently been launched on GCP as a new cross-platform
    data storage engine.


    #### Hadoop


    Apache Hadoop is the defacto framework that allows for the distributed processing
    of large datasets across clusters, essentially a collection of software for solving
    BIG data problems using a network of computers.


    **MapReduce** is the fundamental programming model of Hadoop at the heart of Apache
    Hadoop for processing huge amounts of data using a Master/Slave architecture (Figure
    [3-9](#527966_1_En_3_Chapter.xhtml#Fig9)). As shown in Figure [3-10](#527966_1_En_3_Chapter.xhtml#Fig10),
    it works by performing a (1) **mapping task** which splits data then maps to a
    key/value pair format and (2) **reduction task** where the mapped output is shuffled
    and combined into a smaller set of key/value pairs.


    ![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig10_HTML.jpg)


    A flow diagram in MapReduce. It takes an input statement then splits and maps
    the data into key-value pairs. Then they are shuffled and reduced to smaller set
    of key-value pairs.


    Figure 3-10


    MapReduce across a cluster with Hadoop (Source: [`guru99.com`](http://guru99.com))


    ![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig9_HTML.jpg)


    The Hadoop network architecture features 3 slave nodes under a master node. The
    master node includes a name node and resource manager. Each slave node includes
    a data node, node manager, map, and reduce.


    Figure 3-9


    Hadoop Architecture (Metadata stored in NameNode). The MapReduce algorithm is
    shown in Figure [3-10](#527966_1_En_3_Chapter.xhtml#Fig10).


    The parallel nature of MapReduce makes it valuable for performing large-scale
    data analysis using multiple machines in the (cloud) cluster. Today most of the
    CSPs offer Hadoop Big Data Processing built into their service offerings: `AWS
    EMR`, `Azure HDInsight`, and `GCP Cloud Dataproc`.


    ### Stream Processing and Stream Analytics


    The above cloud services are the Data Stores of choice for many business users
    today, but what tools are used to get/extract data from one Data Store to another,
    or into (or out of) an AI application?


    Stream Processing, or Complex Event Processing is the process of querying a continuous
    data stream. In an ideal world, this data flow would be real time, but in reality
    the detection time period varies from few milliseconds (**native streaming**)
    to seconds (**micro-batching**).


    The goal is usually to gain as close to “immediate” insight from data where the
    value diminishes quickly with time. If we take a specific case of receiving an
    alert via a temperature sensor when the temperature has reached freezing point,
    stream processing would determine at what granularity the data is read (and transmitted),
    for example, milli or micro seconds.


    Many tools which handle stream processing today come with extended analytics capabilities
    – **Stream Analytics**. The Apache tooling suite: `Apache Storm`, `Sqoop`, `Spark`,
    `Flink` and `Apache Kafka`, `Talend`, `Algorithmia`, and `upsolver` are all streaming
    frameworks with these inbuilt features, as is `AWS Kinesis`. We will take a look
    at three of these in our hands-on labs in this book – `Apache Spark` for Big Data
    Machine Learning, `AWS Kinesis` for streaming stock price data and `Apache Kafka`,
    which makes use of message brokers for handling streaming data into an AI application.


    Whether it’s `Kafka` or `Kinesis`, there are a huge number of AI use cases today
    which rely on real-time streaming technologies including algo trading, supply
    chain optimization, fraud detection, and sports analytics.'
