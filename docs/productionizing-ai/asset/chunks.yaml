    # 1. Introduction to AI and the AI Ecosystem


    In the age of the Fourth Industrial Revolution that we live in today, AI is a
    central focus of innovation, along with IoT and genetic engineering among others.
    But it comes with a lot of hype, in particular in relation to job loss and job
    creation as much of the world’s businesses and organizations hyperspeed transforming
    their operational model in the Digital Age. Much of the job creation is centered
    around the booming career of the Data Scientist, a role which has really only
    been mainstream since about 2012\. But the role itself and the scope of skills
    it entails has not always evolved in that relatively short period of time to accommodate
    growing needs across a company’s key assets: people, processes, and tools. In
    particular, much money and time has been spent on poorly planned Data Science
    projects where nothing other than an R or Python script has been developed, often
    with highly sophisticated coding, but of which very few people in the organization
    are cognizant. In effect, while these solutions may be robust and relatable to
    a group of Data Scientists, they are not “fit for purpose” in a large organizational/enterprise-wide
    structure with many different people, processes, and tools interfacing and competing
    for internal budgets.


    This chapter introduces our take on the current mismatch in capabilities and requirements
    through the lens of those topics which we consider most relevant to the successful
    delivery of an AI project today.


    The goal of this chapter, from an initial whistle-stop historical tour, is to
    define key AI concepts at a fairly high level and introduce the reader to current
    and emerging trends in AI, including the hype and the pitfalls. Ultimately the
    chapter leads to how many businesses and organizations are struggling to get machine
    and deep learning operationalized in today’s workplaces. The topics discussed
    in this chapter are then elaborated in greater detail in the subsequent chapters.


    In this chapter, we will scratch the surface first, before embarking on the more
    involved hands-on practice and applications of later chapters. The intention is
    to provide readers with the tools in this chapter to go forward, providing concise
    context and definitions around the AI Ecosystem, the main applications of AI,
    data ingestion and data pipelines, and machine and deep learning with neural networks
    before wrapping up on productionizing AI.


    ## The AI Ecosystem


