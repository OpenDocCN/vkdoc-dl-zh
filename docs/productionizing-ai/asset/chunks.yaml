    \ style Data Stores but note that any file systems/hard drives used in an organization\
    \ are also examples of a Data Store containing additional rich datasets for AI\
    \ (such as images, pdfs, and columnar formats/flat files).\n\n#### Lakehouses\n\
    \nMany companies see the benefits of maintaining both Data Lakes and Data Warehouses\
    \ served to target specific organizational needs. It is no surprise then that\
    \ Lakehouses have been introduced as a new, open architecture that combines the\
    \ best features of both. Examples include **Databricks Lakehouse Platform**, **GCP\
    \ BigLake**, and **Snowflake** is at least partly considered a Data Lakehouse.\
    \ Perhaps even more interesting, is **Delta Lake**^([^(46)](#fn46)) – an open\
    \ source project that enables building a Lakehouse architecture on top of data\
    \ lakes.\n\nGiven that the “enterprise goal” is to have a Data Store system that\
    \ is as flexible and performant as possible, the idea of multiple, separate data\
    \ lakes, warehouses and databases might seem the most productive solution, but\
    \ the cost overhead and multiple integration points create complexity and latency.\n\
    \nLakehouses attempt to avoid these issues through the use of data structures\
    \ and data management features akin to that of a data warehouse while at the same\
    \ time possessing low-cost storage options similar to that of data lakes.\n\n\
    ### Scoping Project Data Requirements\n\nAlthough there is often a choice from\
    \ where to source data, businesses serious about competing in the age of digital\
    \ need to “mine” data at source – legacy “ETL” approaches are inadequate.\n\n\
    Best practice for ingesting data in general involves:\n\n*   “Mounting” data source(s)\n\
    \n*   Ingesting from primary source(s), not via middleware\n\n*   Seeking “atomic-level”\
    \ data, not aggregated/roll-out\n\nBesides ensuring the business is able to connect\
    \ directly to raw data sources, a DataOps/Agile approach should be used to scope\
    \ out the underlying business/organizational data requirements. One way of doing\
    \ this is capturing requirements in a “data dictionary” – a great tool for capturing\
    \ scope and later delivering both low (MVP) and high fidelity AI solutions.\n\n\
    A well-structured Data Dictionary helps with:\n\n*   Stakeholder alignment, buy-in,\
    \ and project sign-off\n\n*   Terminology and defining data types\n\n*   Collecting\
    \ and classifying data critical to the success of a Data project\n\n*   Categorizing/mapping\
    \ attributes from structured and unstructured data as well as online, offline,\
    \ and mobile sources\n\n*   Quick checks for primary keys for joining data\n\n\
    *   Isolating anomalies and data flow conflicts\n\n*   Documenting experiences\
    \ with new data sources\n\n*   Ongoing data maintenance\n\n### OLTP/OLAP – Determining\
    \ the Best Approach\n\nGiven the data requirements on all projects boil down to\
    \ OLTP and OLAP sources, what it the best approach? Historically, OLTP databases\
    \ would be ingested into OLAP systems through an ETL process (more on this in\
    \ the following section) but with the increasing need to source data from source,\
    \ we often need to get at the “raw” form, that is, Data Lake rather than Data\
    \ Warehouse access.\n\nIn general, we should identify the top three to five business\
    \ priorities for each downstream analytics/BI or AI requirement to determine how\
    \ to store/source our data:\n\n*   OLTP: if speed/response time is key\n\n*  \
    \ OLAP: if management/strategic insights are more important"
  trans: "\n### 使用 Parquet：动手实践\n\n医疗保健领域的大数据压缩与扩展\n\n**我们在本节前面部分介绍了 parquet 文件如何利用列式格式进行数据压缩。在本实验中，我们将探讨如何处理这些文件。**\n\
    \n1.  克隆下方的 GitHub 仓库\n\n    [`https://github.com/bw-cetech/apress-3.1b.git`](https://github.com/bw-cetech/apress-3.1b.git)\n\
    \n2.  从下方链接下载美国 CDC（疾病控制与预防中心）数据集：\n\n    [`https://catalog.data.gov/dataset/social-vulnerability-index-2018-united-states-tract`](https://catalog.data.gov/dataset/social-vulnerability-index-2018-united-states-tract)\n\
    \n    **注意：上述文件大小为 201 MB，因此在良好的网络连接下（8 GB 内存笔记本电脑，约 50 Mbps 宽带下载速度）可能需要长达 10\
    \ 分钟才能下载完成。**\n\n3.  在 Google Colab 中运行代码：\n\n    1.  导入用于处理 Parquet 的库（此处为 Apache\
    \ Arrow 的 `pyarrow` 库）\n\n    2.  上传上面下载的 CDC 数据（由于文件大小，此过程可能需要长达 30 分钟）\n\n \
    \   3.  执行基本的 EDA（数据维度/行列数、数据类型以及前五行等）\n\n    4.  挂载 Google Drive 以准备保存 Parquet\
    \ 文件\n\n    5.  将 `Pandas DataFrame` 转换为 parquet 格式——压缩至 75 MB。注意：这可以直接完成，无需先转换为\
    \ Arrow 表\n\n    6.  重新读取 Parquet 文件\n\n    7.  对 parquet 数据重复 EDA 步骤以验证数据\n\n\
    4.  练习——最后尝试在 Microsoft Power BI 中打开 parquet 文件（`获取数据` ➤ `Parquet` ➤ `连接`^(⁴⁵)），并显示下图所示的亚利桑那州各县总平方英里面积的树状图。\n\
    \n![](img/527966_1_En_3_Fig6_HTML.png)\n\n该图展示了亚利桑那州 15 个县的总面积（平方英里）。其中，可可尼诺县（18,619\
    \ 平方英里）和莫哈维县（13,311 平方英里）是面积最大的两个县。\n\n**图 3-6** PowerBI 中的 Parquet 数据可视化\n\n\
    ## 面向 AI 的数据存储\n\nAI 解决方案的数据摄取需要存储，无论是临时存储还是固定存储。下一节将详细阐述存储数据时需要考虑的重要因素，例如定义数据需求、我们需要哪种类型的数据存储、数据湖与数据仓库、OLAP\
    \ 与 OLAP、ETL 与 ELT、SQL 与 NoSQL，以及弹性与可扩展性的概念。\n\n### 数据存储：数据湖与数据仓库\n\n**数据存储**是指用于在整个企业中存储、管理和分发数据的存储库。通常，这指的是许多最终用户依赖的生产数据库，例如\
    \ CRM 或 ERP 系统。\n\n广义上讲，当今大多数企业主要使用三种**数据存储**：\n\n*   **数据湖** – 数据湖大约在过去十年间出现，正日益成为大多数数据驱动型组织的首选系统。数据湖是一个单一的存储库，用于存储原始、多格式的数据源，包括结构化和非结构化数据。数据湖在设计上能更好地管理数据的四个“V”：多样性、速度、容量和真实性（完整性），并通过其持续刷新多个数据流同时优化性能和拓扑结构的能力来衡量。数据湖也有缺点——数据编目更加困难，并且由于缺乏数据治理以及有时难以处理的数据源/模型，导致了“数据沼泽”这一术语的出现。\n\
    \n*   **数据仓库** – 数据仓库是干净、组织有序的数据存储，通常被设计并用作企业数据的“单一事实来源”。它们最常与组织成“模式”的结构化数据类型相关联，但现代数据仓库拥有更多功能，包括存储非结构化格式，并且数据可以组织为现有数据湖之上的视图模式。\n\
    \n*   **数据集市** – 数据集市通常是数据仓库的过滤和/或聚合子集。数据集市便于进行简单、有限场景的查询，并拥有更小的模式，包含聚焦的表格数据，以实现更快速的下游分析/BI。\n\
    \n以上显然是“数据库”风格的数据存储，但请注意，组织中使用的任何文件系统/硬盘驱动器也是数据存储的示例，其中包含用于 AI 的额外丰富数据集（例如图像、PDF\
    \ 以及列式格式/平面文件）。\n\n#### 湖仓一体\n\n许多公司看到了同时维护数据湖和数据仓库以满足特定组织需求的好处。因此，湖仓一体作为一种结合了两者最佳特性的新型开放架构被引入也就不足为奇了。示例包括\
    \ **Databricks Lakehouse Platform**、**GCP BigLake**，而 **Snowflake** 至少在一定程度上被认为是一个数据湖仓。也许更有趣的是\
    \ **Delta Lake**^(⁴⁶)——一个开源项目，它支持在数据湖之上构建湖仓一体架构。\n\n鉴于“企业目标”是拥有尽可能灵活和高效的数据存储系统，拥有多个独立的数据湖、数据仓库和数据库的想法似乎是最有效的解决方案，但成本开销和多个集成点会带来复杂性和延迟。\n\
    \n湖仓一体试图通过使用类似于数据仓库的数据结构和数据管理功能，同时拥有类似于数据湖的低成本存储选项来避免这些问题。\n\n### 界定项目数据需求\n\n\
    尽管通常可以选择数据来源，但认真在数字时代竞争的企业需要在源头“挖掘”数据——传统的“ETL”方法已不足以应对。\n\n摄取数据的最佳实践通常包括：\n\n\
    *   “挂载”数据源\n\n*   从主要来源摄取数据，而非通过中间件\n\n*   寻求“原子级”数据，而非聚合/汇总数据\n\n除了确保企业能够直接连接到原始数据源之外，还应采用\
    \ DataOps/敏捷方法来界定底层业务/组织的数据需求。一种方法是在“数据字典”中捕获需求——这是一个极好的工具，用于捕获范围，并随后交付低（MVP）和高保真度的\
    \ AI 解决方案。\n\n一个结构良好的数据字典有助于：\n\n*   利益相关者达成一致、获得支持以及项目签署\n\n*   术语定义和数据类型定义\n\
    \n*   收集和分类对数据项目成功至关重要的数据\n\n*   对来自结构化和非结构化数据以及在线、离线、移动端源的属性进行分类/映射\n\n*   快速检查用于连接数据的主键\n\
    \n*   隔离异常情况和数据流冲突\n\n*   记录使用新数据源的经验\n\n*   持续的数据维护\n\n### OLTP/OLAP – 确定最佳方法\n\
    \n鉴于所有项目的数据需求最终都归结为 OLTP 和 OLAP 源，最佳方法是什么？历史上，OLTP 数据库会通过 ETL 过程（下一节将详细介绍）被摄取到\
    \ OLAP 系统中，但随着从源头获取数据的需求日益增长，我们通常需要获取“原始”形式的数据，即访问数据湖而非数据仓库。\n\n通常，我们应该为每个下游分析/BI\
    \ 或 AI 需求确定前三到五个业务优先级，以决定如何存储/获取我们的数据：\n\n*   OLTP：如果速度/响应时间是关键\n\n*   OLAP：如果管理/战略洞察更为重要\n"
- fmt: "### ETL vs. ELT\n\nAs mentioned in the previous section, an ETL (extract,\
    \ transform, and load) process was historically used to get data from source into\
    \ a Data Warehouse/database. In many cases, this approach is still preferred due\
    \ to its inherent transformation of data into a structured, relational database,\
    \ fixed-schema format and, once the overhead of transforming the data is performed,\
    \ a much faster and more intuitive analysis or the preprocessed data. ETL approaches\
    \ are also generally preferred for migrating data stores from on-prem to cloud.\n\
    \nHowever there is another option, sometimes better suited to the underlying design\
    \ of a Data Lake and far more agile in supporting key data mining and feature\
    \ engineering tasks required for Data Science and AI.\n\nIn this alternative ELT\
    \ process (extract, load, and transform), data is extracted and directly loaded\
    \ into the storage layer first without any transformation.\n\nBecause we can already\
    \ query data which is already loaded into a database, an ELT process is the fastest\
    \ way to expose raw data to an end user for analytics, business intelligence,\
    \ or AI. However, there are often some “light transformations” required for:\n\
    \n- Column selection (we don’t need the entire data source)\n- Privacy – some\
    \ fields might need to be filtered/hashed, for example, Personally Identifiable\
    \ Information (PII)\n- Incremental extraction – only uploading new rows and accounting\
    \ for changing schemas\n\nThere is also an abundance of complex transformation\
    \ logic required before we can visualize the data (e.g., in a BI platform/GUI):\
    \ from cleansing the data to removing duplicates or out-of-date entries; converting\
    \ data from one format to another; joining and aggregating data as well as sorting\
    \ and ordering data. For this reason, ELT processes are better suited for exploratory\
    \ analysis and Data Science when there is (or can be) a deeper (internal) knowledge\
    \ of the source datasets.\n\nAn ELT process is the preferred approach for loading\
    \ data into a Data Lake; as ETL was developed when there were no data lakes, it\
    \ doesn’t fit well with modern requirements for direct access to raw data.\n\n\
    To get data into a Data lake, data is extracted from source (via an API) and (often)\
    \ an extract script provided by a CSP or EL vendor. We will take a closer look\
    \ at extraction scripts in our final section on Data Pipelines to follow.\n\n\
    ### SQL vs. NoSQL Databases\n\nWe could not pass by this section without tying\
    \ the above concepts: Data Lake vs. Warehouse, OLTP vs. OLAP, and ETL vs. ELT\
    \ to the structure and use cases for SQL and NoSQL databases.\n\nFor the most\
    \ part, relational or SQL databases are used for OLAP systems and make use of\
    \ SQL queries to analyze data and extract insight – SQL’s simple and powerful\
    \ `JOIN` clause to combine multiple data sources remains highly popular.\n\nSQL\
    \ databases have a rigid, structured way of storing data and typically contain\
    \ two or more tables with columns and rows – they are more akin to a data warehouse\
    \ than a data lake. `MS SQL Server`, `MySQL`, `Oracle`, `IBM DB2`, and `PostgreSQL`\
    \ are all ACID compliant (Atomicity, Consistency, Isolation, and Durability) SQL\
    \ databases widely used today to support AI projects.\n\nNoSQL, or nonrelational\
    \ databases, were developed in the late 2000s to improve scaling, speed of querying,\
    \ and to support the frequent application changes required in DevOps. Rather than\
    \ tables with fixed rows and columns, NoSQL databases are characterized by no\
    \ fixed schema, with a structure based on key-value pairs (JSON documents) and\
    \ nodes and edges (graph databases). Besides their schema-less advantage in handling\
    \ unstructured data such as images, document files, and emails, NoSQL is ideally\
    \ suited for distributed data stores with BIG (peta-scale) data storage needs.\
    \ Popular examples of NoSQL databases include `MongoDB`, `Redis`, `Neo4j`, `Apache\
    \ Cassandra`, and `Apache HBase` with all modern data lakes and modern data warehouses\
    \ containing connectors to both SQL and NoSQL. Figure [3-7](#527966_1_En_3_Chapter.xhtml#Fig7)\
    \ compares SQL and NoSQL.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig7_HTML.jpg)\n\
    \nAn illustration exhibits the comparison between SQL and NoSQL databases. SQL\
    \ has a relational database with tables for blog posts, blog tags, and blog comments.\
    \ NoSQL has a non-relational database in a single document file.\n\nFigure 3-7\
    \ SQL vs. NoSQL (Upwork)\n\n### Elasticity vs. Scalability\n\nOur final word in\
    \ this section is on two important concepts tied to the underlying business and\
    \ organizational drivers for the use of cloud, that of elasticity vs. scalability.\n\
    \n**Scalable** – refers to the ability to add “compute,” that is, computing resources\
    \ to support **static** demand and/or accommodate larger **static** load:\n\n\
    - Scale up – effectively means strengthening hardware\n- Scale out – adding additional\
    \ “nodes” (more computers or VMs)\n\n**Elasticity** – refers to the ability to\
    \ provide necessary resources **dynamically** for the current workload\n\nNaturally,\
    \ this brings about more sophisticated capability measure for those companies\
    \ at higher (data) maturity levels – **elastic scaling**, or the ability to automatically\
    \ add or remove compute or networking infrastructure based on changing application\
    \ traffic patterns.\n\nMost cloud services today are both elastic and scalable\
    \ but cost models vary greatly and tying the inherent CSP capability to scale\
    \ up or scale out with forecasted (or even actual) AI application usage is still\
    \ mired in opacity.\n\n### Data Stores for AI: Hands-on Practice\n\nNow that we\
    \ have gone through the key concepts, let’s take a look at how at two Data Stores\
    \ widely used on AWS Cloud can support AI projects\n\n**AWS DATA PIPELINE**\n\n\
    The goal of this exercise is to create a `DynamoDB` NoSQL table on AWS, an `S3`\
    \ (File Store) output bucket, and an `AWS Data Pipeline` to transfer data from\
    \ `DynamoDB` to `S3`:\n\n1.  Follow the steps below to see how data can be transferred\
    \ across data stores on AWS:\n    1.  Add `DynamoDB` NoSQL table\n    2.  Create\
    \ `S3` bucket\n    3.  Configure `AWS Data Pipeline`\n    4.  Launch `EMR` cluster\
    \ with multiple `EC2` instances\n    5.  Activate pipeline\n    6.  Export `S3`\
    \ data\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig8_HTML.jpg)\n\nA data\
    \ flow diagram initiates from `DynamoDB`, passes through `AWS Pipeline`, `EMR`,\
    \ multiple `Amazon EC2`, and ends at the `S3` bucket.\n\nFigure 3-8 Data Stores\
    \ for AI (Hands-on Practice) – data flow\n\n## Cloud Services for Data Ingestion\n\
    \nIn this third section, we take a look at cloud services and tools for ingesting\
    \ and querying streaming data and data storage of analytical/batch data in order\
    \ to service downstream enterprise analytics and BI teams.\n\n### Cloud (SQL)\
    \ Data Warehouses\n\nThere are four main cloud data warehouses in use by companies\
    \ today:\n\n- **Azure: SQL Data Warehouse/Synapse Analytics** – petabyte-scale\
    \ Massively Parallel Processing (MPP) analytical data warehouse built on the foundation\
    \ of SQL Server and run as part of the Azure Cloud Computing Platform\n- **AWS\
    \ Redshift** – for querying and joining exabytes (1000*petabyte) of structured\
    \ and semistructured data across data warehouses, operational databases, and data\
    \ lakes using standard SQL\n- **GCP BigQuery** – serverless, highly scalable,\
    \ and cost-effective multicloud data warehouse with ANSI SQL support designed\
    \ for business agility\n- **Snowflake Cloud Data Platform** – the largest ever\
    \ software IPO in 2020, Snowflake was introduced as a modern “serverless”/SaaS\
    \ cloud-based data platform which sits on top of AWS or Azure infrastructure.\
    \ It has notable advantages, such as no hardware or software to select, install,\
    \ configure, or manage, and is ideal for organizations that don’t want to dedicate\
    \ resources for setup, maintenance, and support of in-house servers\n\nNotable\
    \ others include `IBM Db2` (good for Machine Learning), `Oracle` (good for automation),\
    \ `SAP` (good for legacy SAP users), and `Teradata Vantage` (good CSP integration)."
