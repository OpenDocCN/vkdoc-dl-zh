  trans: "\n### 供应链面临的挑战\n\n“供应链”当然不是一个特定的垂直行业或领域，而是许多企业和组织采购及交付其产品与服务的一种手段。供应链管理（SCM）中的规划、物流和采购活动横跨多个行业，包括制造批发、分销和零售、运输（货运公司、车队配送）、石油和天然气行业，以及医疗保健和公共服务。\n\
    \n组织常常在如何使用高性能、复杂的规划、排程和优化软件方面存在知识缺口，但如今，AI 工程师和数据科学家可以利用云计算、“可视化”机器学习^(¹²⁰)和求解器能力的进步，结合引人注目的前端设计，来吸引企业内更广泛的受众。此外，当今针对\
    \ SCM 的 AI 解决方案可以通过寻找以下问题的答案，帮助运营人员理解并更好地管理公司的交付物流：\n\n*   如何确定仓库的位置和容量\n*   哪个工厂应该生产哪种产品\n\
    *   将飞机和机组人员分配到航班\n\n### 预测分析解决方案\n\n在探讨供应链优化的利基端到端解决方案之前，已有大量内部实施的预测分析案例用于管理供应链的关键领域。\n\
    \n这些案例包括：通过交易异常检测、采购引擎和欺诈检测模型来管理供应商/客户关系的风险；客户支持解决方案，如聊天机器人和 IVA（智能虚拟助手）或文档搜索与检索；利用库存和合同管理工具结合“边缘\
    \ AI”解决方案的物流，以实现更精细的预测分析（例如，在本地而非区域层面进行供需匹配）；以及针对特定资产和业务部门的资产优化与预测。\n\n![](img/527966_1_En_8_Fig13_HTML.png)\n\
    \n预测分析解决方案的架构图。它包括交易异常检测、采购风险引擎、欺诈检测、库存管理、合同管理、聊天机器人和 IVA。\n\n**图 8-13** SCM 预测分析解决方案\n\
    \n### 供应链优化与规范分析\n\n对于许多供应链优化问题而言，仅靠预测分析是不够的，因为它关注的是“可能发生什么”（例如需求预测中的预期需求）。而规范分析则将解决方案空间扩展到“实现它的方法”，如下方图片所示，即如何将供应与预期需求相匹配。\n\
    \n许多供应链问题（例如，路线规划、排程、仓库优化和调度）都涉及**供需匹配**，并且需要使用高性能求解器来确保针对目标垂直行业应用最优的排程、路线规划和调度解决方案。`CPLEX`、`Gurobi`\
    \ 和 `FICO` 是这类规划和排程问题的行业领先求解器，我们将在本节下面的动手实验中使用 `CPLEX`。\n\n![](img/527966_1_En_8_Fig14_HTML.jpg)\n\
    \n该图展示了基于诊断分析（复合年增长率 9.5%）、描述性分析、预测分析（22.1%）和规范分析（31.7%）的分析对业务绩效的影响。\n\n**图 8-14**\
    \ 分析方式（来源：iotforall）\n\n在遵循最佳实践“DataOps”交付模型的同时，实施稳健的规范分析算法或“求解器”，最终可以为组织带来一些关键的价值差异化优势：\n\
    \n*   最优规划和排程\n*   支持假设情景分析\n*   降低成本并带来增量收入\n*   与遗留流程进行绩效基准比较\n\n### 使用 IBM\
    \ CloudPak/Watson Studio 进行供应链优化：动手实践\n\n使用 Watson Studio 和 IBM Cloud Pak 编排决策优化与\
    \ Cplex\n\n在本实验中，我们将在 IBM Cloud Pak for Data 中部署一个端到端的供应链优化样板项目：\n\n![](img/527966_1_En_8_Fig15_HTML.png)\n\
    \n使用 IBM Cloud Pak 进行供应链优化的示意图。它包括：1. 数据预处理。2. Shiny 数据准备笔记本。3. 供应链或仓库路线优化（决策优化器）。\n\
    \n**图 8-15** IBM Cloud Pak for Data – 供应链优化\n\n1.  注册/登录 IBM Cloud Pak\n    1.\
    \  [`dataplatform.cloud.ibm.com/exchange/public/entry/view/427846c7e99026edd5fa0022830bc002?context=cpdaass`](https://dataplatform.cloud.ibm.com/exchange/public/entry/view/427846c7e99026edd5fa0022830bc002%253Fcontext%253Dcpdaass)\n\
    2.  创建一个项目\n3.  创建一个部署空间\n4.  逐一运行以下每个 Jupyter 笔记本：\n    1.  **数据预处理：** 预处理供需数据\n\
    \        1.  供应商\n        2.  制造商\n        3.  仓库\n    2.  **Shiny 数据准备** 笔记本\n\
    \    3.  **LSTM 需求预测**（未包含）\n    4.  **决策优化器：** 运行规范优化\n        1.  加载预先准备好的 LSTM\
    \ 需求预测\n        2.  优化运输零件（从四个供应商到三个制造商）和交付产品（从三个制造商到四个仓库）的成本\n5.  使用决策优化器完成规范优化过程后，运行（Shiny）仪表板应用，并查询库存、需求与供应以及物流视图\n\
    6.  练习 – 将仪表板上的产品类别从数字更改为名称\n7.  拓展练习 – 安排每月一次使用新数据重新训练和运行模型\n\n## 石油和天然气/能源与公用事业解决方案\n\
    \n能源行业涵盖了价值链上的许多不同企业，从石油和天然气巨头到分销公司、发电厂和可再生能源运营商（REC）、公用事业公司和能源零售商。我们将在下面探讨 AI\
    \ 的机遇。\n\n### 能源、石油和天然气行业面临的挑战\n\n在当前供应减少、供应链紧张和价格飙升的环境下，能源行业若对 AI 作为创收和成本优化的推动力关注不足，也是情有可原的。但\
    \ AIaaS（AI 即服务）仍有大量机会来释放价值，尤其是在分布式能源链和可再生能源领域。AIaaS 在石油和天然气领域也在增加价值，因为寻找安全、经济和可持续的勘探与生产方法，以及减少石油生产对环境的影响，是关键关注点。\n\
    \n早在当前的能源危机之前，企业就已经被遗留的（ETRM）工具和糟糕的创新实践所拖累。能源行业变革步伐缓慢的部分原因在于，员工队伍在统计上趋于老龄化，同时中层管理人员臃肿，他们担心变革会影响自己的工作与生计。其他人则对使用新兴技术存在伦理担忧，尽管其中许多工具早已不再是“新兴”技术。\n\
    \n不断变化的劳动力人口结构开始推动对数据驱动创新的需求，以及利用 AI 摆脱落后、低效业务流程的需求。事实上，能源价值链上并不缺乏数据——挑战在于如何处理所有这些数据，以及如何处理在整个能源供应链中呈指数级增长的物联网传感器数据。"
- fmt: '# AI Solutions in Energy – An Opportunity or a Threat?


    A growing convergence of forces in the energy sector has led in more recent times
    to rapid prototyping and an increase in accelerated AI solution delivery. The
    current trend is away from old monopolistic systems toward a disparate platform
    of best-of-breed, but highly integrated digital solutions across the AI Ecosystem;
    often cheaper, smaller, and more open source solutions.


    Smaller-scale, or “Tiny AI” solutions are faster to deliver while single-cloud
    “Big Tech” solutions have become in some sense “too big” and too costly. The productivity
    benefits of AI have become too difficult to ignore and might be expected to give
    way to a vicious culture of disruption especially if performance benchmarking
    against legacy processes suggests a compelling case.


    Risk/asset management tools such as customer risk engines with embedded machine
    learning to “push-button” customer/load/price forecasting with `fbprophet` or
    recurrent neural networks are starting to become commonplace, if not as production-grade
    solutions, then as prototype `python/Dash` scripts. Back office CRPA and document
    retrieval solutions are in evidence, for example, for gas/electricity policy search,
    settlements, and billing as well as contract management. And trade support solutions
    including algorithmic trading and automated market analysis and intelligence with
    support for “what-if” scenario analysis are being used to boost front-office profitability.


    Many of the same Predictive AI tools mentioned above in the retail sector are
    also proving valuable in the energy sector such as “live” customer decision engines
    with social media sentiment analysis, chatbots and IVAs, automated customer service
    delivery and dashboards and reporting solutions reflecting wholesale market dynamics
    and energy news. Similarly, the same supply chain optimization solutions with
    robust solver capability mentioned in the previous section are often applicable
    to delivery planning, optimized scheduling, and routing from upstream energy sources
    through transmission and distribution channels to suppliers and down to customers.


    Edge AI is another exciting application area which can in time capitalize on increasingly,
    decentralized, distributed asset generation and consumption (e.g., wind turbines,
    solar panels, heat pumps, and small-scale battery storage).


    ![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig16_HTML.jpg)


    An illustration depicts the overview of AI solutions in the energy sector. It
    includes risk and asset management, client and market engagement and high-performance
    optimization, and ROI accelerators.


    **Figure 8-16** – AI solutions in the Energy sector


    ## Healthcare and Pharma Solutions


    While AI deployments in energy may lag some other sectors, the same cannot be
    said for healthcare and pharma industries. Consumer-driven engagement with, and
    enthusiasm for, Health Tech or Digital Health products and services as a means
    to monitor, compare and improve individual health and fitness has led to substantial
    AI innovation in this space.


    ### Healthcare – The AI Gap


    The Healthcare industry moves at a break-neck speed and it can seem at times there
    is little time to investigate better ways of doing things. By nature, care is
    prioritized over innovation, which can lead to a failure in ground-breaking technological
    solutions reaching the doctors, consultants, and patients that may need them.


    The rapid pace of digitalization has opened opportunities to tap into low latency,
    easy-to-use, highly visual, interactive, and informative predictive analytics
    support for healthcare professionals, helping to close finance and efficiency
    gaps.


    Particularly in healthcare support functions, an AI-led cultural shift away from
    ad hoc, poorly executed operational processes, overly complicated nonstandard
    processes, subjective/biased/arbitrary decisions, and human error can help unlock
    value, whether to help reduce or control ballooning healthcare procurement costs,
    or enable patient-targeted marketing, for example, of pharma/natural health products.


    ### Healthcare and Pharma Solutions


    From NHS support services to mental health trials, chatbots and IVAs are being
    more noticeable across the healthcare sector. Conversation Assistants or Chatbots
    have come a long way since the days of Cortana with IVAs coupled with NLP and
    document retrieval providing automated knowledge transfer to (and from^([^(121)](#fn121)))
    health managers and consultants helping to achieve a more holistic decision support
    system and better patient outcomes/“pulse-checks.”^([^(122)](#fn122))


    Natural Language Generation is also an interesting AI innovation which can simplify
    pre and post patient treatment paperwork as well as administrative activity and
    appointment scheduling. GPU or cluster-leveraged machine learning-enabled procurement
    cost forecasting, conducted using, for example, `Databricks`, `Apache Spark`,
    and `fbprophet` over multiple healthcare facilities and across multiple drug product
    lines or equipment necessary for patient operations can also dramatically reduce
    local hospital or pharmacy budgeting costs.


    Forecasting is just one of the applications of machine learning in the Healthcare
    and Pharma industry, data-driven drug discovery, clinical trials, patient diagnostics,
    and (deep-learning) image classification techniques applied to x-rays or MRI scans
    are providing valuable “second-opinions” to support doctors and nurses.^([^(123)](#fn123))


    ## HR Solutions


    For our final focused AI use case, our attention now turns to a key business function
    served by AI in 2022 – Human resources.


    ### HR in 2002


    The HR Analytics market is forecasted to grow into a $6.3b market @ 14.2% CAGR
    as employers grapple with an uncertain postpandemic future and awakening employee
    sentiment and attitudes to work. But only 21% of HR leaders believe their organization
    is effective at using data to inform HR decisions.^([^(124)](#fn124))


    In an era of shifting demographics and uncertainty wrought by digital disruption,
    Covid and now spiraling living costs, HR executives are looking for accessible
    data and HR analytics solutions for better talent management and support, reducing
    bias in recruitment and in the workplace and to help improve employee performance
    and attrition rates.


    If Enterprise AI is to be successful, a company could do worse than starting with
    challenges in Human Resources and where Predictive Analytics can help. As shown
    in Figure [8-17](#527966_1_En_8_Chapter.xhtml#Fig17), we see these current challenges
    (and associated HR analytics solutions) falling into one of three areas mirroring
    the employee journey: Recruitment, Talent management/Human Capital Management
    (HCM), and Employee Experience.


    ![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig17_HTML.jpg)


    An illustration depicts the HR in 2002 based on challenges (hiring, onboarding
    and job training, competency and mastery) and supporting tools (recruitment, human
    capital management, and employee experience).


    **Figure 8-17** – AI in HR 2022


    As we shall see below, managing the data deluge and ensuring performance metrics
    are nonintrusive is the main challenge to creating a 360-degree employee analytics
    solution today. AI solutions for Human Resources can help both employees manage
    a balanced workload and by informing HR functions who is proactive, who wants
    to do more, who is close to burnout, and who needs more help or support. If used
    in the right way, these metrics can also lead to employee task-based efficiency
    and improved focus, through defining achievable goals and helping employees achieve
    them.'
  raw: '### AI Solutions in Energy – An Opportunity or a Threat?


    A growing convergence of forces in the energy sector has led in more recent times
    to rapid prototyping and an increase in accelerated AI solution delivery. The
    current trend is away from old monopolistic systems toward a disparate platform
    of best-of-breed, but highly integrated digital solutions across the AI Ecosystem;
    often cheaper, smaller, and more open source solutions.


    Smaller-scale, or “Tiny AI” solutions are faster to deliver while single-cloud
    “Big Tech” solutions have become in some sense “too big” and too costly. The productivity
    benefits of AI have become too difficult to ignore and might be expected to give
    way to a vicious culture of disruption especially if performance benchmarking
    against legacy processes suggests a compelling case.


    Risk/asset management tools such as customer risk engines with embedded machine
    learning to “push-button” customer/load/price forecasting with fbprophet or recurrent
    neural networks are starting to become commonplace, if not as production-grade
    solutions, then as protype python/Dash scripts. Back office CRPA and document
    retrieval solutions are in evidence, for example, for gas/electricity policy search,
    settlements, and billing as well as contract management. And trade support solutions
    including algorithmic trading and automated market analysis and intelligence with
    support for “what-if” scenario analysis are being used to boost front-office profitability.


    Many of the same Predictive AI tools mentioned above in the retail sector are
    also proving valuable in the energy sector such as “live” customer decision engines
    with social media sentiment analysis, chatbots and IVAs, automated customer service
    delivery and dashboards and reporting solutions reflecting wholesale market dynamics
    and energy news. Similarly, the same supply chain optimization solutions with
    robust solver capability mentioned in the previous section are often applicable
    to delivery planning, optimized scheduling, and routing from upstream energy sources
    through transmission and distribution channels to suppliers and down to customers.


    Edge AI is another exciting application area which can in time capitalize on increasingly,
    decentralized, distributed asset generation and consumption (e.g., wind turbines,
    solar panels, heat pumps, and small-scale battery storage).


    ![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig16_HTML.jpg)


    An illustration depicts the overview of A I solutions in the energy sector. It
    includes risk and asset management, client and market engagement and high-performance
    optimization, and R O I accelerators.


    Figure 8-16


    AI solutions in the Energy sector


    ## Healthcare and Pharma Solutions


    While AI deployments in energy may lag some other sectors, the same cannot be
    said healthcare and pharma industries. Consumer-driven engagement with, and enthusiasm
    for, Health Tech or Digital Health products and services as a means to monitor,
    compare and improve individual health and fitness has led to substantial AI innovation
    in this space.


    ### Healthcare – The AI Gap


    The Healthcare industry moves at a break-neck speed and it can seem at times there
    is little time to investigate better ways of doing things. By nature, care is
    prioritized over innovation, which can lead to a failure in ground-breaking technological
    solutions reaching the doctors, consultants, and patients that may need them.


    The rapid pace of digitalization has opened opportunities to tap into low latency,
    easy-to-use, highly visual, interactive, and informative predictive analytics
    support for healthcare professionals, helping to close finance and efficiency
    gaps.


    Particularly in healthcare support functions, an AI-led cultural shift away from
    ad hoc, poorly executed operational processes, overly complicated nonstandard
    processes, subjective/biased/arbitrary decisions, and human error can help unlock
    value, whether to help reduce or control ballooning healthcare procurement costs,
    or enable patient-targeted marketing, for example, of pharma/natural health products.


    ### Healthcare and Pharma Solutions


    From NHS support services to mental health trials, chatbots and IVAs are being
    more noticeable across the healthcare sector. Conversation Assistants or Chatbots
    have come a long way since the days of Cortana with IVAs coupled with NLP and
    document retrieval providing automated knowledge transfer to (and from^([^(121)](#fn121)))
    health managers and consultants helping to achieve a more holistic decision support
    system and better patient outcomes/“pulse-checks.”^([^(122)](#fn122))


    Natural Language Generation is also an interesting AI innovation which can simplify
    pre and post patient treatment paperwork as well as administrative activity and
    appointment scheduling. GPU or cluster-leveraged machine Learning-enabled procurement
    cost forecasting, conducted using, for example, Databricks, Apache Spark, and
    fbprophet over multiple healthcare facilities and across multiple drug product
    lines or equipment necessary for patient operations can also dramatically reduced
    local hospital or pharmacy budgeting costs.


    Forecasting is just one of the applications of machine learning in the Healthcare
    and Pharma industry, data-driven drug discovery, clinical trials, patient diagnostics,
    and (deep-learning) image classification techniques applied to x-rays or MRI scans
    are providing valuable “second-opinions” to support doctors and nurses.^([^(123)](#fn123))


    ## HR Solutions


    For our final focused AI use case, our attention now turns to a key business function
    served by AI in 2022 – Human resources.


    ### HR in 2002


    The HR Analytics market is forecasted to grow into a $6.3b market @ 14.2% CAGR
    as employers grapple with an uncertain postpandemic future and awakening employee
    sentiment and attitudes to work. But only 21% of HR leaders believe their organization
    is effective at using data to inform HR decisions.^([^(124)](#fn124))


    In an era of shifting demographics and uncertainty wrought by digital disruption,
    Covid and now spiraling living costs HR executives are looking for accessible
    data and HR analytics solutions for better talent management and support, reducing
    bias in recruitment and in the workplace and to help improve employee performance
    and attrition rates.


    If Enterprise AI is to be successful, a company could do worse than starting with
    challenges in Human Resources and where Predictive Analytics can help. As shown
    in Figure [8-17](#527966_1_En_8_Chapter.xhtml#Fig17), we see these current challenges
    (and associated HR analytics solutions) falling into one of three areas mirroring
    the employee journey: Recruitment, Talent management/Human Capital Management
    (HCM), and Employee Experience.


    ![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig17_HTML.jpg)


    An illustration depicts the H R in 2002 based on challenges (hiring, onboarding
    and job training, competency and mastery) and supporting tools (recruitment, human
    capital management, and employee experience).


    Figure 8-17


    AI in HR 2022


    As we shall see below, managing the data deluge and ensuring performance metrics
    are nonintrusive is the main challenge to creating a 360-degree employee analytics
    solution today. AI solutions for Human Resources can help both employees manage
    a balanced workload and by informing HR functions who is proactive, who wants
    to do more, who is close to burnout, and who needs more help or support. If used
    in the right way, these metrics can also lead to employee task-based efficiency
    and improved focus, through defining achievable goals and helping employees achieve
    them.'
