  trans: '

    ### 深度学习——为何是现在？


    尽管大多数人认为 20 世纪 50 年代是深度学习发展历程中的关键里程碑（得益于现代计算机的诞生），但真正取得爆发式进展是在过去 20-25 年间。若非半导体技术的快速进步——这为当今个人电脑和笔记本电脑的处理能力奠定了基础——其中许多成就将无法实现。以下是这一时期促成大众认知的关键时间节点，人们普遍认为深度学习是数字优先型企业和组织的关键差异化优势。


    * 1997 年：IBM 的“深蓝”在国际象棋中击败加里·卡斯帕罗夫

    * 2011 年：IBM Watson 赢得智力竞赛节目《危险边缘》

    * 2012 年：ImageNet 竞赛——AlexNet 深度神经网络大幅降低了视觉物体识别的错误率

    * 2015 年：Facebook 将名为 DeepFace 的深度学习技术投入运营，用于在照片中自动标记和识别用户

    * 2016 年：谷歌 DeepMind 的 AlphaGo 算法掌握了复杂的棋盘游戏围棋，并击败了世界顶尖职业棋手之一李世石


    这些事件被媒体广泛报道，加之行业深度学习解决方案的可扩展性日益增强，雪球效应最终推动了更广泛市场对深度学习实施项目的委托。


    ### AI 与深度学习炒作周期


    尽管上述深度学习的重大里程碑为那些希望通过采用深度学习技术和解决方案获得投资回报的企业亮起了“绿灯”，但围绕 AI 整体的炒作依然显著，正如高德纳炒作周期（如下所示）所频繁揭示的那样。


    ![](img/527966_1_En_5_Fig2_HTML.jpg)


    一张 2022 年人工智能炒作周期的期望值随时间变化图包含多个阶段。它绘制了一条钟形上升曲线，表示将在不到 2 年、2 至 5 年、5 至 10 年、超过
    10 年内达到的平台期，以及在平台期前就已过时的阶段，数据截至 2022 年 7 月。


    **图 5-2** 高德纳 AI 炒作周期


    企业中的这种炒作部分源于无知，部分源于科幻想象。职场中的 AI 指的是“增强”智能，而非人工智能。人工智能常常被误认为是电影中的“通用人工智能”及其所有可怕的末日景象。^(⁶⁶)


    如今，真正的“增强”智能通常被认为正在发挥其潜力，而企业和组织所获得的切实利益已成为现实，这得益于新冠疫情期间加速数字化的生存需求，例如：


    * 疫情期间提供聊天机器人支持

    * 将深度学习应用于医疗诊断

    * 计算机视觉支持社交距离监测

    * 利用机器学习模拟经济重启的影响


    在 2022 年及以后，焦点已转向后疫情时代 AI 和深度学习的“民主化”，将项目从专家/小众知识和堆积如山的“技术债务”转变为在更广泛的关键利益相关者（所有员工、客户）生态系统中获得认同（和理解）。同样，AI
    的“工业化”也已跃居前沿和中心位置，推动了对 AI 解决方案可重用性、可扩展性和安全性的需求。^(⁶⁷)


    ### 高层架构


    如上所述，深度学习将机器学习扩展到使用神经网络来解决困难且规模庞大的大数据业务问题。计算过载通常通过集群或图形处理单元（GPU）上的并行处理来实现，以加速内部计算。


    正如我们将在本章后面看到的，繁重的计算发生在人工神经网络（ANN）内部。这些 ANN 是深度学习的基础，其灵感来源于大脑的结构和功能。一个简单的图示如下所示：


    * 两个隐藏层，每层四个节点（或神经元）

    * 四个输入

    * 一个输出


    大多数 ANN 以及深度学习模型都可以将其架构追溯到这种基本结构。为了了解这些 ANN 的实际运作方式以及如何使用它们进行预测，我们现在将进入本章的第一个动手实验。


    ![](img/527966_1_En_5_Fig3_HTML.jpg)


    一个典型的人工神经网络模型，包含 4 个相互连接的层级。它包括输入、权重、神经元和输出。


    **图 5-3** 典型的 ANN 架构


    ### TensorFlow Playground：动手实践


    如今，如果不了解 TensorFlow（谷歌现已开源的 AI 库），就无法进行深度学习。我们稍后将更详细地介绍这个工具及其代码本身（通过 Keras，即 Python
    与 TensorFlow 的接口），但这里我们先从“宏观”视角直观地了解使用该工具训练人工神经网络（即深度学习模型）时发生的情况。


    **可视化深度学习**


    **本练习的目标是熟悉人工神经网络、数据如何导入，以及如何训练网络来预测输出：**


    1. 访问 [`https://playground.tensorflow.org`](https://playground.tensorflow.org)

    2. 注意屏幕左侧的数据配置——有四个示例数据集可供选择，每个数据集由一组 `x1` 和 `x2` 坐标定义

    3. 神经网络架构从左到右显示在中间，即从特征（数据集中 `x1` 和 `x2` 坐标的变换）经过网络的隐藏层到输出

    4. 顶部显示了一些超参数（用于微调建模过程的杠杆）——我们将在本章后面介绍这些内容

    5. 注意问题类型设置为“分类”——我们试图预测数据属于蓝色组还是橙色组

    6. 以第一个（同心圆）数据集为例，尝试调整 (a) 特征数量、(b) 隐藏层数量以及 (c) 每层神经元数量，并观察模型收敛的速度（损失接近零）。注意，隐藏层和神经元越多，收敛速度越快

    7. 练习：尝试在最复杂/非线性的数据集（螺旋模式）上训练模型，并观察需要多长时间（多少个周期）才能使损失低于 0.05

    8. 拓展练习：找到一个合适的配置，在 500 个周期内使损失低于 0.01


    ## 随机过程


    在进一步探讨当今实际行业用例中使用的不同类型的神经网络之前，我们首先需要了解一些基本的概率论，以理解 ANN 中发生的复杂过程。

