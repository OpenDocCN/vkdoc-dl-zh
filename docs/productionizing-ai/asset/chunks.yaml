    \ analytics (9.5 percent C A G R), descriptive analytics, predictive analytics\
    \ (22.1), and prescriptive analytics (31.7).\n\nFigure 8-14\n\n-way Analytics\
    \ (Source: iotforall)\n\nImplementing robust prescriptive analytics algorithms\
    \ or “solvers” while following a best practice “DataOps” delivery model can ultimately\
    \ bring about some key value differentiators for an organization:\n\n*   Optimal\
    \ planning and scheduling\n\n*   Support for what-if scenario analysis\n\n*  \
    \ Cost reduction and incremental revenue benefits\n\n*   Performance benchmarking\
    \ against legacy processes\n\n### Supply Chain Optimization with IBM CloudPak/Watson\
    \ Studio: Hands-on Practice\n\nOrchestrating Decision Optimization and Cplex with\
