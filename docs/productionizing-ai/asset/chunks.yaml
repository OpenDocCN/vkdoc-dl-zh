- fmt: "### Scheduled (OLAP) vs. Streaming (OLTP) Data\n\nThe entirety of data processing\
    \ in all enterprises can be viewed as simply a combination of scheduled (batch)\
    \ or aggregated data vs. real-time (stream) processing of transactional data.\
    \ Traditionally these two types of data were referred to as OLAP (online analytical\
    \ processing) and OLTP (online transactional processing) where the primary objective\
    \ was either to process data (OLTP) or analyze the data (OLAP).\n\nAggregated\
    \ batch data is imported (and stored, e.g., in a data warehouse) at regularly\
    \ scheduled intervals – great for end-of-day, or management reporting. Stream\
    \ processing, on the other hand, is a “use and lose” approach, where time-sensitive\
    \ data is processed near real time and then largely discarded. Much of today’s\
    \ hyper-speed consumption of data, particularly via mobile/handheld devices is\
    \ consumed as streaming data, for example, IoT sensor data, stock price movements,\
    \ and smart meter information.\n\nUltimately organizations today have to carve\
    \ up their data needs and architectural landscape to decide which data is handled\
    \ as batch data and which as streaming data. The simplified representation in\
    \ Figure [3-2](#527966_1_En_3_Chapter.xhtml#Fig2) shows how most organizations\
    \ deal with streaming data that needs to be stored by pushing it into an Enterprise\
    \ Data Warehouse.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig2_HTML.jpg)\n\
    \nA representation exhibits the OLTP operations and the OLAP information of business\
    \ processes and business data warehouse. Also, it includes analytics, strategy\
    \ and transactions.\n\nFigure 3-2\n\n[`verticaltrail.com`](http://verticaltrail.com)\n\
    \nToday **lambda architectures** and **micro-batching** are important concepts\
    \ in storage and facilitating processing of both data ingested in batches and\
    \ in real-time.\n\n#### APIs\n\nBesides remote databases and raw logs, one of\
    \ the most common ways to connect to OLTP and OLAP data today is via an API (Application\
    \ Programming Interface). Essentially an API is a software intermediary that allows\
    \ two applications to talk to each other. The example below shows the use of Amazon\
    \ API Gateway, a key component of Amazon Web Services and the means by which streaming\
    \ data can be ingested from the web via REST, HTTP, or WebSocket API and AWS Kinesis\
    \ into an AI application.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig3_HTML.jpg)\n\
    \nA representation exhibits the data ingestion pipeline, determined for Amazon\
    \ API Gateway. The process includes simulated API, API Gateway and Kinesis.\n\n\
    Figure 3-3\n\nData Ingestion via AWS API Gateway REST API\n\n### Data Types (Structured\
    \ vs. Unstructured)\n\nBatch vs. streaming is one perspective of Data Ingestion\
    \ today, but **structured vs. unstructured** is arguably even more relevant in\
    \ 2022 and mastering both of these in a Data Strategy is often the difference\
    \ between an agile business able to quickly identify value-added opportunities\
    \ from data.\n\n**Structured data** is data that has been predefined and formatted\
    \ to a set structure before being placed in data storage. This is the tabular\
    \ data that most business users have been familiar with since computers have been\
    \ around; `csvs` and `excel` are examples of structured data.\n\n**Unstructured\
    \ data** is data stored in its raw, native format and not generally processed\
    \ until it is used. The explosion of interest in unstructured data in AI today\
    \ stems from the ability to accumulate the data faster and its inherently feature-rich\
    \ composition; `pdfs` and images are unstructured formats.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig4_HTML.jpg)\n\
    \nA set of 3 representations of unstructured data, semi structured data and structured\
    \ data. Unstructured data is data stored in its raw form. Structured data is represented\
    \ in tabular form.\n\nFigure 3-4\n\nUnstructured, semistructured, and structured\
    \ data\n\n### File Types\n\nWe wrap up our introduction to data ingestion with\
    \ a closer look at file formats. How you store Big Data in modern data stores\
    \ is critical, and any solution architect needs to consider the underlying format\
    \ of the data, compression and how to leverage distributed computing/how to partition\
    \ data in the fastest, most optimal way.\n\nTraditional file formats such as `.txt`,\
    \ `.csv`, and `json` have been around for decades and so we assume the reader\
    \ is familiar with these. Newer formats such as `avro`, `Parquet`, and `Apache\
    \ ORC`, `tr.gz`, and `pickle` formats have sprung up to mesh with rapid advances\
    \ in the use of clusters (a group of remote computers) in big data processing.\n\
    \n**Apache Parquet** is an open source column-oriented data storage format of\
    \ the Apache Hadoop ecosystem. A binary format that is more compressed by virtue\
    \ of storing repeat data structures as columns, Parquet contains metadata about\
    \ contents of the data such as column names, compression/encoding, data types,\
    \ and basic stats. Compressed columnar files like Parquet, ORC, and Hadoop RCFile\
    \ have lower storage requirements and are ideal for optimal performance during\
    \ query execution as they read quickly (although write slowly). We will take a\
    \ further look at `parquet` formats in a lab at the end of this section.\n\n**Avro\
    \ files** are a row-based binary file with a schema stored in a dictionary (specifically\
    \ JSON) format. Avro files support strong schema evolution by managing added,\
    \ missed, and changed fields. Because they are row-based, Avro or JSON is ideally\
    \ suited for ETL (extract, transform, and load) staging layers.\n\nA summary of\
    \ these file formats compared with `csv` and `json` is shown in Figure [3-5](#527966_1_En_3_Chapter.xhtml#Fig5).\n\
    \n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig5_HTML.png)\n\nA table represents\
    \ a summary of the file formats compared with CSV, JSON, Parquet and Avro. Columnar,\
    \ compressable, splittable, readable and scheme evolution are the included properties.\n\
    \nFigure 3-5\n\nFeatures of BIG data file formats ([`luminousmen.com`](http://luminousmen.com))\n\
    \n**Two other important formats, Pickle** and **HDF5**^([^(43)](#fn43)) (Hierarchical\
    \ Data Format version 5) are often used in Python, generally to store trained\
    \ models. Both are fast – `pickle` in particular, but comes with the drawback\
    \ of increased storage space. HDF5 has better support for Big (heterogeneous)\
    \ Data, storing data in a hierarchical (directory-like/folder) structure, with\
    \ repeat data compressed in a similar way to `parquet` files.\n\n### Automated\
    \ Data Ingestion: Hands-on Practice\n\nHaving covered a brief introduction to\
    \ AI Data Ingestion, we now move on to our first hands-on practice on Data Ingestion.\n\
    \nPYTHON DATA INGESTION – WEATHER DATA\n\n**Using Python in Jupyter Notebook,\
    \ the goal of this exercise is to automate the ingestion of (live) semistructured\
    \ weather data, then transform and extract temperatures data**^([^(44)](#fn44))\
    \ **for forecasting.**\n\n1.  Clone the GitHub repo below\n\n[`https://github.com/bw-cetech/apress-3.1.git`](https://github.com/bw-cetech/apress-3.1.git)\n\
    \n2.  Run through the code carrying the steps as below:\n    1.  Import Python\
    \ Libraries\n    2.  Connect to MetOffice data\n    3.  Carry our “recursive wrangling”\
    \ to extract temperature forecasts for D to D+7 (day time and night time)\n  \
    \  4.  Tidy up and present a Pandas dataframe table of forecasted temperatures"
