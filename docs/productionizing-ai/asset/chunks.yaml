    notice that this time the modelling process struggles to converge – the loss oscillates
    a lot. We will have another look at TensorFlow Playground later on in this book
    in Chapter [5](#527966_1_En_5_Chapter.xhtml), and try to achieve a better result
    training on this dataset.'
  trans: '

    ### 深度学习


    上文我们看到，深度学习指的是应用具有多个隐藏层的人工神经网络，即深度神经网络。


    然而，深度学习可以使用多种不同类型的人工神经网络，每种网络都有一些关键特性，这些特性使其被用于解决工作中特定的预测分析挑战。本书动手实验环节涵盖的主要类型如下所列。^(²⁰)


    #### 卷积神经网络


    卷积神经网络是一种利用卷积运算从输入数据中提取层次化模式的神经网络。卷积是一种将两个信号组合成第三个信号的数学方法。CNN 主要用于处理具有空间关系的数据，例如图像。


    #### 循环神经网络


    循环神经网络用于处理序列数据或具有潜在顺序/语法结构的数据。因此，RNN 通常用于预测时间序列数据，例如股票市场数据或具有潜在时间依赖性的物联网/传感器数据。


    由于语法术语遵循特定的序列和顺序，语音识别和自然语言处理应用（如聊天机器人和智能虚拟助手）通常也使用一种循环神经网络，例如 LSTM（长短期记忆）网络，以捕捉底层语法中的细微差别、结构和顺序。


    #### 自编码器和变分自编码器


    变分自编码器是自编码器的一种改进版本——自编码器是一种无监督的人工神经网络，学习如何高效地压缩和编码数据。自编码器因其生成图像数据的能力而受到媒体广泛关注；有时会被误认为是深度伪造背后的技术。自编码器和
    VAE 由一个编码器（用于输入数据）和一个解码器（用于从网络输出重建输入）组成。这两种神经网络技术的区别在于，VAE 产生的是分布式（概率性）输出。


    #### 生成对抗网络


    GAN 是一种 CNN，它使用一个持续生成数据的生成器，同时一个判别器学习区分虚假数据和真实数据。随着训练的进行，生成器在生成看起来真实的虚假数据方面不断改进，而判别器检测虚假与真实数据差异的能力也在提升。GAN
    是深度伪造背后的真正技术。


    由于这种“良性循环”，在面部图像上训练的 GAN 可用于生成不存在但看起来非常真实的面部图像。尽管有相似之处，但 GAN 与自编码器和 VAE 不同，它们致力于生成无法与真实数据区分的新数据，而不是重建（相同的）输入数据。


    ### 神经网络 – 术语


    由于其复杂性，深度学习在模型配置和改进方面带来了大量令人困惑的概念、工具和技术。我们稍后将更详细地研究这些内容，并扩展下面的定义，但现在我们列出理解模型训练过程工作原理所必需的主要概念。


    **Epoch（周期）** — 对整个数据集完成一次完整的遍历。


    **Learning Rate（学习率）** — 在梯度下降/反向传播过程中权重更新的速度^(²¹)。


    **Activation Function（激活函数）** — 在给定一组输入的情况下，触发节点/神经元输出的函数。


    **Regularization（正则化）** — 用于防止过拟合的“超参数”。


    **Batch Size（批次大小）** — 每次前向传播从输入数据中随机抽取的样本大小。


    **Hidden Layer（隐藏层）** — 位于输入层和输出层之间的层。


    **Loss function（损失函数）** — 计算预测输出与实际输出之间的差值。


    最小化最后一个（损失函数）是训练神经网络的核心目标。


    ### 深度学习工具


    在本书中，我们将用于深度学习的主要工具是 `Python`、^(²²) `TensorFlow` 和 `Keras`。这些工具目前都是开源且免费提供的，但值得注意的是，深度学习中使用的许多工具，包括
    `TensorFlow` 和 `Keras`，都是从学术界和大型科技公司的内部开发中演变而来的。


    `TensorFlow` 是谷歌的产物，至今仍被用于驱动谷歌所有基于大数据集的机器学习和深度学习，以及 Airbnb、可口可乐、通用电气和推特等其他全球品牌。它于
    2015 年开源，虽然它是一种低级语言，通常需要高度专业化的程序员来操作和运行，但像当今生态系统中的大多数工具一样，其底层代码后来通过高级“封装器”（如 `Keras`）提供服务，`Keras`
    由麻省理工学院开发，可以像 Python 库一样轻松导入。


    在本书中，我们还将使用 `PyTorch` 进行自然语言处理方面的深度学习应用。`PyTorch` 的发展路径与 `TensorFlow` 类似——它是 Facebook
    的一款工具，于 2017 年在 GitHub 上开源。


    其他深度学习工具包括 `Caffe`、`Apache MXNet` 和 `Theano`——它们通常用于有强集成需求的场景（例如，`Caffe` 与 NVIDIA
    集成，`MXNet` 与 Apache Kafka 或 Apache Spark 集成）。`Theano` 由蒙特利尔大学开发，虽然曾风光一时，但由于无法与大型科技公司提供的（预算更充足的）产品竞争，其开发于
    2017 年停止。


    ### 神经网络与深度学习入门：动手实践


    现在我们已经为神经网络和深度学习设定了背景，值得探索它们的工作原理。不过，在此阶段，我们不会直接深入代码，而是利用一个出色的可视化工具来观察数据如何通过神经网络进行处理，以训练深度学习模型。


    TENSORFLOW PLAYGROUND


    **本练习的目标是将简化版深度学习模型的训练过程可视化，并尝试通过调整我们可用的众多调优“杠杆”来提升其性能。**


    1.  访问 [`http://playground.tensorflow.org/`](http://playground.tensorflow.org/)


    2.  点击屏幕右侧（DATA 下方）的缩略图图标，查看四个数据集。


    3.  注意，在所有情况下，（监督）数据集都有标记数据：要么是蓝色，要么是橙色，输出结果显示这些数据点绘制在二维（x1, x2）网格上。我们模型的输入显示在
    FEATURES 下，初始设置为仅 x1 和 x2 坐标，而我们有两个隐藏层，分别包含 4 个和 2 个神经元。


    4.  选择一个数据集并点击运行。这将启动训练过程（并立即开始评估过程）。注意神经网络权重如何通过每次前向传播和每个周期进行更新。


    5.  观察右侧显示的训练损失和测试损失。一个好的模型，其训练损失和测试损失都应接近于零。


    6.  暂时停止模型训练过程。前三个数据集相对容易训练。选择最后一个（螺旋形）数据集并重新启动训练过程。


    7.  作为“拓展”练习，尝试通过使神经网络架构更复杂来提升模型性能（在更少的周期内实现更低的损失）——向模型添加合成特征（`x1x2`、幂变换或三角变换）和/或增加网络中的层数。您还可以更改左侧的训练和测试数据比例，增加或减少批次大小，或修改顶部的超参数。尝试找到一个合适的配置，在
    500 个周期内实现损失 < 0.01。


    8.  选择最后一个（螺旋形）数据集并重新启动训练过程。注意，这次建模过程难以收敛——损失波动很大。我们将在本书后面的第 5 章再次查看 TensorFlow
    Playground，并尝试在该数据集上训练获得更好的结果。

    '
- fmt: '# Productionizing AI


    Theory is one thing and delivery is another. We discussed briefly in Section 3
    about the proliferation of failed AI projects – the reality is that ever since
    Data Science has become a “glamorous” job role backed by over-hyped job board
    marketing, poorly designed, and over-engineered `R` and `Python` scripts, with
    broken integration links have left a trail of waste across the Enterprise AI landscape.^([^(23)](#fn23))


    Out of this “wasteland” most organizations and businesses are attempting to redress
    the landscape and recognize a need to introduce a broader Design/System Thinking
    approach at the outset to ensure that AI solutions are built with multiuser engagement
    (both technical and nontechnical), end-to-end process and system-wide ecosystem,
    infrastructure and integration in mind.


    ## Compute and Storage


    Very few AI solutions today can be considered as “on-prem” solutions, and any
    true Enterprise AI solution goes way beyond the underlying machine or deep learning
    model. AI solutions today are inextricably tied to Cloud Computing and specific
    resources and services offered by Big Tech – the need for cloud stems from two
    key “grouped service” offerings: Compute and Storage.


    **Compute** is essentially computer processing power – tied to computing memory,
    it is the ability to perform software computation and (often complex and highly
    parallelized) calculations. Compute is typically delivered via a Virtual Machine
    on Cloud.


    **Storage** in the context of an organization’s operational and strategic needs
    is the means by which all their data requirements are supplied, replenished, and
    maintained. Most Cloud providers offer File Storage and SQL/NoSQL-based options
    for storing both structured and unstructured data.


    While original transactional DB systems required storage and compute to be as
    close as possible to reduce latency, faster networks and the increasing availability
    and scalability of database systems coupled with the need to reduce hosting costs
    have driven the separation of compute power and storage.


    All businesses need two types of data: transactional and processed (batched or
    aggregated) data. Much of this still resides in Data Warehouses today, but because
    sophistication in Predictive Analytics demands complex analytical queries, businesses
    and organizations often decide to migrate their data to cloud as the relative
    increase in latency is a lower priority than the overall cost savings achieved
    through cloud.


    ## The CSPs – Why No-one Can Be Successful in AI Without Investing in Amazon,
    Microsoft, or Google


    Having established that all AI projects (or at least Enterprise AI projects) require
    Cloud, the question arises as to which one? Amazon Web Services gobbled up this
    space many years ago. Today, as can be seen in Table [1-3](#527966_1_En_1_Chapter.xhtml#Tab3),
    there is some fragmentation, with Microsoft Azure competitive with AWS. Google
    Cloud Platform is also gaining market share and there are a handful of other providers
    such as IBM Cloud, Alibaba (mainly in China), and Heroku.


    **Table 1-3** Gartner Worldwide IaaS Public Cloud Services Market Share, 2019-2020
    (Millions of US Dollars)^([^(24)](#fn24))


    | Company | 2020 Revenue | 2020 Market Share (%) | 2019 Revenue | 2019 Market
    Share (%) | 2019-2020 Growth (%) |

    | --- | --- | --- | --- | --- | --- |

    | Amazon | 26,201 | 40.8 | 20,365 | 44.6 | 28.7 |

    | Microsoft | 12,658 | 19.7 | 7,950 | 17.4 | 59.2 |

    | Alibaba | 6,117 | 9.5 | 4,004 | 8.8 | 52.8 |

    | Google | 3,932 | 6.1 | 2,367 | 5.2 | 66.1 |

    | Huawei | 2,672 | 4.2 | 882 | 1.9 | 202.8 |

    | Others | 12,706 | 19.8 | 10,115 | 22.1 | 25.6 |

    | **Total** | **64,286** | **100.0** | **45,684** | **100.0** | **40.7** |


    Vendor-lock on one particular Big Tech provider has become an issue, with many
    companies now trying to diversify and utilize services from multiple cloud service
    providers.


    While each CSP comes with its own “Marketplace” of cloud tools, we discuss below
    only those that fall under the key Compute and Storage grouped services. Other
    grouped services such as Governance, Security, Auto-scaling, and Containerization
    are discussed in more detail later.


    ### Compute Services


    `Azure Virtual Machines` and `EC2` instances, typically provisioned via a Virtual
    Machine on a Virtual Private Cloud on AWS, are the main options for Cloud Compute.
    `Google Compute Engine` is GCP’s main offering.


    ### Storage Services


    `Amazon Simple Storage Service S3` is probably AWS’s most well-known storage service,
    and is used to securely store data and files in “buckets.” Comparable services
    from other vendors include `Azure Blob storage`, and `Google Cloud Storage`. We
    will make use of these compute and storage services in some of our hands-on labs
    later.


    > **Important Note**

    >

    > Use of Cloud doesn’t come free, despite the pretense to offer “Free Tiers.”
    We will be using it frequently in this book, but be prepared for costs that could
    run up to $500 to follow all the labs.

    >

    > Free Tiers are limited to certain resources, and these resources themselves
    have rather mediocre capacity limits. There are limits on usage of services, so
    if a customer faces costs on their cloud account, it''s likely this is a result
    of usage on a cloud resource/service exceeding free tier limits or the subscription
    has rolled over to pay-as-you-go (after one year)

    >

    > It is the reader’s responsibility to bear all costs related to provisioning
    of cloud services. We strongly advise to always stop and delete resources when
    finished with them. It is a source of immense frustration to this author that
    Big Tech will not do it automatically for you. One wonders how this practice is
    justifiable from the richest companies in the world.

    >

    > Virtual Machines in particular incur costs when not running as they are someone
    else’s server, and whether it''s on or not, there are energy costs involved (particularly
    high right now with a war going on between Russia and Ukraine)

    >

    > Help to manage your costs by use of sandbox environments (where available) and
    by deleting resources when done. The author is also happy to provide complaint
    letters to a CSP for onward referrals or a small donation to a charity, but ultimately
    it is your responsibility to bear all costs related to provisioning of cloud services.'
