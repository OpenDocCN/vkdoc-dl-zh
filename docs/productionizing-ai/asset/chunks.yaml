    \nAn illustration depicts deep learning in business cases. It includes 1\\. drivers.\
    \ 2\\. D L applications. 3\\. Benefits followed by its features.\n\nFigure 7-13\n\
    \nDeep Learning – the business case\n\nForward planning on cloud storage and compute\
    \ are vital in delivering a successful Deep Learning solution, and deep learning\
    \ projects require a lot of iteration, a lot of time, and a lot of effort. But\
    \ being disciplined, leveraging your resources to the max and monitoring progress\
    \ along the way can help bring about success.\n\nLike ML it starts by understanding\
    \ the problem context and project lifecycle and a kaizen (continual improvement)\
    \ approach is key. Before proceeding to our final section in this chapter, we\
    \ outline below a DL-specific high-level framework for success (Source: neptune.ai):\n\
    \n*   Define the data sources and collect\n\n*   Identify the high-level solution\
    \ (CNN, RNN, GANs?)\n\n*   Establish a robust data pipeline for streaming/batch\
    \ data\n\n*   Build a model based on ANNs\n\n*   Leverage Transfer Learning\n\n\
    *   Training and inference\n\n*   Deploy to cloud: Heroku, IBM, AWS, GCP, Azure"
  trans: "\n# 欺诈检测与网络安全\n\n价值`$23.05b`的欺诈检测与预防市场正推动着对机器学习与欺诈分析应用的需求，且丝毫没有放缓的迹象。Fortune\
    \ Business Insights 预测，由于在线交易数量的不断增加，到 2028 年该市场将以 27%的复合年增长率（CAGR）增长至`$142b`。不仅数字银行、保险公司和电子商务在增加对安全在线服务的投资，大多数私营和公共组织所经历的欺诈痛苦经历，也迅速将网络安全推至企业议程的首位。\n\
    \n其基本原理相当明显——利用机器和深度学习算法的内在优势，从历史欺诈模式中学习，并在未来的交易中识别它们。\n\n该市场有些拥挤，供应商包括`FICO`、`AltexSoft`、`SAS`和`DataVisor`，但利用开源和云端欺诈检测“样板”（例如使用`AWS\
    \ SageMaker`和`IBM WATSON Studio`）的能力，使得更便宜、定制开发的解决方案对 AI 工程师和开发者来说更加触手可及。\n\n\
    # 运营管理、决策与业务支持\n\n机器学习在运营管理中的应用主要集中在机器人流程自动化（认知或其他，即`RPA`/`CRPA`）以及计划与调度/重新调度上。\n\
    \n由 BI 前端（如`PowerBI`、`Tableau`、`Google Data Studio`或`Looker`）和预测/规范建模（`Python`、`CPLEX`等）构建的决策支持系统，通常支撑着运营管理和供应链管理（SCM）中的使用。\n\
    \n特别是在 SCM 中，涵盖从自动化数据收集到分析、预测和优化的端到端机器学习流程正被采用，以交付从自动化仪表盘引擎到预测性维护、库存管理和物料计划、优化采购、预算或客户/需求预测，以及增强的业务流程管理（`BPM`）性能等一切。\n\
    \n# 风险管理、投资组合与资产优化\n\n除了第 1 章中提到的风险管理和预测示例外，人们对机器学习在量化金融中的应用（从构建投资策略到股票交易）也抱有极大兴趣。\n\
    \n该方法通常依赖于预测来预测股票走势，并构建能够查看股票走势并直接建议买入/卖出/持有的机器人（Robo-Advisors）。沿着这些思路的最新发展之一是使用强化学习来构建最优股票投资组合，并与基于投资组合理论的方法进行比较。\n\
    \n其他创新包括`CVXPY`（一种用于凸优化问题的 Python 嵌入式建模语言，我们将在本节末尾的实验室中学习）和`DeepDow`（深度学习，而非机器学习）——一个专注于神经网络以在单次前向传递中执行资产分配的\
    \ Python 包。\n\n# 开发推荐引擎：动手实践\n\n## 使用 CURL 测试部署到本地端点\n\n我们采用一个训练好的（基于内容的过滤^((113))）Netflix\
    \ 电影/电视剧推荐引擎模型，将其部署为本地端点，并使用`cURL`测试该应用：\n\n1.  从以下链接下载 GitHub 源代码：[`https://github.com/MAbdElRaouf/Content-based-Recommendation-Engine`](https://github.com/MAbdElRaouf/Content-based-Recommendation-Engine)\n\
    \n2.  设置一个虚拟环境\n\n3.  安装`requirements.txt`文件中的依赖项\n\n4.  从终端运行该应用\n\n5.  将一个包含感兴趣电影/电视剧标题的\
    \ JSON 文件添加到本地应用文件夹中\n\n    ```\n    {\n    \"title\" : \"Narcos\"\n    }\n  \
    \  ```\n\n将电影标题更改为一部电影/电视剧\n\n1.  使用`cURL`（Windows 系统默认安装）测试该应用：\n\n```\ncurl\
    \ -H \"Content-Type: application/json\" --data @test.json http://127.0.0.1:5000/api/\n\
    ```\n\n现在，您应该会在应用文件夹中的`test.json`文件中看到基于第 5 步输入的电影/电视剧推荐的一系列电影/电视剧。\n\n1.  练习：查看您为“The\
    \ Crown”获得的推荐结果\n\n2.  拓展：`Postman`是另一个用于探索和测试 API 的实用工具——设置一个`Postman`账户并向上述应用发送请求\n\
    \n3.  拓展：除了基于内容的过滤，训练并部署一个更复杂的协同过滤模型^((114))，该模型对用户与电影/电视剧购买之间的相似性进行建模。\n\n# 投资组合优化加速器：动手实践\n\
    \n## 使用 Python 中的 CVXPY 实现利润最大化与风险最小化\n\n尽管严格来说不涉及机器学习，但需要使用复杂优化技术和求解器的规范分析问题，通常与\
    \ ML/DL 流程并行运行（或作为后处理），以最大化利润或最小化风险。\n\n本实验室将研究如何使用 Python 实现凸规划——在本例中，通过线性规划（LP）特例进行简化，其中模型约束和目标函数是线性的。\n\
    \n1.  克隆以下 GitHub 仓库：\n\n    `https://github.com/bw-cetech/apress-7.3.git`\n\n\
    2.  在 Colab 中运行 Python 笔记本步骤：\n    1.  导入库，包括`CVXPY`库\n\n    2.  从从 GitHub 下载的月度\
    \ csv 数据文件中导入股票数据\n\n    3.  绘制数据图表\n\n    4.  计算三只股票中每只的预期风险和回报\n\n    5.  优化三只股票中每只的`$1000`投资，以实现平衡的投资组合\n\
    \n3.  练习（拓展）——修改代码，使用`Pandas DataReader`和`Yahoo Finance` Python 库连接实时股票价格，优化/平衡三只科技股的`£100k`资本支出\n\
    \n# 深度学习应用\n\n虽然某些机器学习应用已在许多组织中牢固确立，但实施深度学习应用在很大程度上仍是一个理想目标。这种情况正在开始改变，部分原因是通过使用我们在第\
    \ 6 章中讨论的领先加速器 AutoAI 工具，部分原因是通过围绕我们在本节最后部分讨论的主要用例进行实验和原型设计。\n\n## 开发深度学习应用\n\n\
    深度学习在“企业环境”中仍然相对较新，但它正开始在视觉识别、自然语言处理、文本分析和网络安全用例方面推动巨大进步。\n\n一些与机器学习相关的驱动因素也适用于此，但复杂性也有所增加，例如理解客户旅程而不仅仅是购买模式。其中一些驱动因素如图\
    \ 7-13 中的表格所示，同时还有关键的业务应用和收益。\n\n![](img/527966_1_En_7_Fig13_HTML.jpg)\n\n一幅插图描绘了商业案例中的深度学习。它包括\
    \ 1. 驱动因素。2. 深度学习应用。3. 收益及其特征。\n\n图 7-13\n\n深度学习——商业案例\n\n在云存储和计算方面进行前瞻性规划对于成功交付深度学习解决方案至关重要，而深度学习项目需要大量的迭代、大量的时间和大量的精力。但是，保持自律、最大限度地利用资源并在此过程中监控进度，有助于取得成功。\n\
    \n与机器学习一样，它始于理解问题背景和项目生命周期，而改善（持续改进）方法是关键。在进入本章的最后一节之前，我们概述了一个针对深度学习的成功高级框架（来源：neptune.ai）：\n\
    \n*   定义数据源并进行收集\n\n*   确定高级解决方案（`CNN`、`RNN`、`GANs`？）\n\n*   为流式/批量数据建立稳健的数据管道\n\
    \n*   基于`ANNs`构建模型\n\n*   利用迁移学习\n\n*   训练与推理\n\n*   部署到云端：`Heroku`、`IBM`、`AWS`、`GCP`、`Azure`\n"
- fmt: "### Key Deep Learning Apps\n\nMost of the below applications were covered\
    \ in our introductions chapter so we wrap up this section with a brief summary\
    \ of how major Deep Learning applications are generally being deployed and what\
    \ tools are involved.\n\n#### Computer Vision\n\nNo Computer Vision project today\
    \ is developed without recourse to `TensorFlow` or `OpenCV` (open source computer\
    \ vision tool). While `TensorFlow` has already been extensively discussed, `OpenCV`\
    \ was originally developed by Intel and offers support for multiple programming\
    \ languages and operating systems. `OpenCV-Python` is the Python library interface\
    \ to the tool.\n\nMost of the CSPs have APIs for Computer Vision, with `IBM Watson\
    \ Visual Recognition`, `Google Cloud Vision API`, and `Microsoft Computer Vision`\
    \ perhaps three of the best. Critical to these offerings is the huge storage requirement\
    \ for Computer Vision coupled with low latency compute during critical training\
    \ and inference processes, with ease of deployment (as containerized solutions)\
    \ also increasingly important.\n\n#### Forecasting\n\nAs described in Chapter\
    \ [5](#527966_1_En_5_Chapter.xhtml), LSTMs have become highly accurate in forecast\
    \ short- and mid-term horizons. These algorithms, combined (or compared) with\
    \ `fbprophet` for longer-term forecasting with multiplicative seasonality where\
    \ seasonality is added to the trend, provide a powerful multihorizon forecasting\
    \ “arsenal.”\n\nThe enhanced forecasting capability of neural networks means AI\
    \ augmentation of traditional forecasting approaches is increasingly common –\
    \ often LSTMs are compared with regressional techniques and exponential smoothing,\
    \ ARMA/ARIMA/SARIMA/SARIMAX techniques, Monte Carlo, and VaR approaches.\n\n####\
    \ IoT\n\nMore than 9 billion IoT devices currently exist online with some 50 billion\
    \ to nearly 1 trillion devices expected online in the next decade.\n\nThis incredibly\
    \ rich source of data is fueling the current trend toward the artificial Internet\
    \ of things (AIoT) – the intersection of AI and IoT.\n\nEffectively an embedding\
    \ of predictive and cognitive capability in smart devices, this somewhat “Minority\
    \ Report” – like dystopian “Smart Retail” use case is already globally prevalent.\
    \ Cameras can be (and in many places are) equipped with computer vision while\
    \ the bewildering granularity of data on our smart devices triggers real-time\
    \ predictive (and attitudinal) analytics on consumer demographics and behavior\
    \ as well as enablement of dynamic marketing/product placement.\n\nThere are plenty\
    \ of other high-profile examples of IoT and AI working together including robotics,\
    \ autonomous vehicles (self-driving/driverless cars), cashierless shopping (Amazon\
    \ Go), drone traffic monitoring, and (telematics-equipped) fleet insurance.\n\n\
    ### Full-Stack Deep Learning: Hands-on Practice\n\nDEPLOYING OUR FIRST AI APP\
    \ WITH REACT, DASH, FLASK AND TENSORFLOW\n\nThe goal of this exercise is to deploy\
    \ a deep learning application using a “hand-shake” between `react.js` and `Flask`:\n\
    \n1.  Using a simple Early Stopping Criteria, train and export the VGG model from\
    \ Chapter [5](#527966_1_En_5_Chapter.xhtml)\n\n2.  Put the exported model above\
    \ into a new local folder for the app called `dl-traffic-app`\n\n3.  Create a\
    \ `react.js` front-end boilerplate by `cd`'ing into this folder from terminal\
    \ and running the commands below (this will create a folder called `react-frontend`\
    \ for the front-end source code we need):\n\n    ```\n    npm install -g create-react-app\n\
    \    npx create-react-app react-frontend\n    cd reactapp\n    npm start\n   \
    \ ```\n\nNB install `nodejs` and `npm` from here if not already installed: [`https://nodejs.org/en/download/`](https://nodejs.org/en/download/).\n\
    \n1.  Create an (empty) Flask backend folder called `flask-backend`, with two\
    \ subfolders: `static`, `templates`, and a (blank) `main.py` file\n\n2.  Create\
    \ a virtual environment\n\n3.  Install dependencies by creating a `requirements.txt`\
    \ file with the following libraries:\n\n    ```\n    numpy\n    flask #==1.1.2\n\
    \    dash\n    dash_bootstrap_components\n    matplotlib\n    tensorflow\n   \
    \ opencv-python\n    ```\n\n4.  To have the Flask backend serve the `react.js`\
    \ front-end edit the blank `main.py` file with the contents of the file `sample_flask.py`\
    \ here:\n\n    [`https://github.com/bw-cetech/apress-7.4.git`](https://github.com/bw-cetech/apress-7.4.git)\n\
    \n5.  A number of changes have to be made to the react front-end. Rather than\
    \ detail these here, watch this video: [`www.youtube.com/watch?v=YW8VG_U-m48&feature=youtu.be`](http://www.youtube.com/watch%253Fv%253DYW8VG_U-m48%2526feature%253Dyoutu.be)\n\
    \n6.  Fire up the Flask backend by `cd`'ing into the folder created in step 3\
    \ and running:\n\n    ```\n    python main.py\n    ```\n\n7.  Taking the `additional-files`\
    \ folder at the GitHub repo above [`https://github.com/bw-cetech/apress-7.4.git`](https://github.com/bw-cetech/apress-7.4.git),\
    \ replace those in the `react-frontend` and `flask-backend` folders. Add drag\
    \ and drop capability to front end and model function call from flask. Additionally:\n\
    \    1.  Create a `python` folder under `flask-backend` and add the new file `dlmodel.py`\
    \ (renamed from `sample_dlmodel.py`)\n\n    2.  Also update the path to the trained\
    \ model in the Python script (`dlmodel.py`) to:\n\n        ```\n        model\
    \ = load_model(\"python/best-model-traffic-ESC.h5\") # load model\n        ```\n\
    \n8.  Unpack the `react-frontend` folder with:\n\n    ```\n    npm run build\n\
    \    ```\n\n9.  Test the app with some sample images from our GitHub repo:\n\n\
    \    [`https://github.com/bw-cetech/apress-7.4.git`](https://github.com/bw-cetech/apress-7.4.git)\n\
    \n10. Stretch: complete the steps in this lab using a VueJS front-end instead\
    \ of `react.js`^([^(115)](#fn115))\n\n11. Stretch (HARD): separate out React and\
    \ Flask in a Docker container\n\n12. Stretch (HARD): Add a database to serve the\
    \ app with training images\n\n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig14_HTML.png)\n\
    \nA set of two images of a full stack app to predict German traffic signs. 1.\
    \ A circle with the number 30 inside. 2. A diamond-shaped outline.\n\n**Figure\
    \ 7-14** Full-stack app to predict German traffic signs\n\n### Wrap-up\n\nThis\
    \ extensive lab bringing together back-end development (Flask and TensorFlow)\
    \ with a front-end UI (Dash and React) hopefully gives a flavor of what to expect\
    \ in building out “full-stack” AI application. We will walk-through several more\
    \ of these labs in the next chapter when we cover solutions for specific industry\
    \ case studies before a final look at end-to-end AI deployment in our penultimate\
    \ chapter.\n\nFootnotes [1](#527966_1_En_7_Chapter.xhtml#Fn1_source)   [2](#527966_1_En_7_Chapter.xhtml#Fn2_source)\
    \   [3](#527966_1_En_7_Chapter.xhtml#Fn3_source)   [4](#527966_1_En_7_Chapter.xhtml#Fn4_source)\
    \   [5](#527966_1_En_7_Chapter.xhtml#Fn5_source)   [6](#527966_1_En_7_Chapter.xhtml#Fn6_source)\
    \   [7](#527966_1_En_7_Chapter.xhtml#Fn7_source)   [8](#527966_1_En_7_Chapter.xhtml#Fn8_source)\
    \   [9](#527966_1_En_7_Chapter.xhtml#Fn9_source)   [10](#527966_1_En_7_Chapter.xhtml#Fn10_source)\
    \   [11](#527966_1_En_7_Chapter.xhtml#Fn11_source)   [12](#527966_1_En_7_Chapter.xhtml#Fn12_source)\
    \   [13](#527966_1_En_7_Chapter.xhtml#Fn13_source)   [14](#527966_1_En_7_Chapter.xhtml#Fn14_source)"
