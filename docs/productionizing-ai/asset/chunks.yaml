- fmt: "### Simple Data Streaming: Hands-on Practise\n\nOur first lab in this section\
    \ takes a look at how to stream data in one of the mostly widely used tools out\
    \ there – Microsoft Excel.\n\n#### Streaming Stock Prices with Microsoft Excel\
    \ & Python\n\n**The goal of this exercise is to leverage Microsoft Data Streamer\
    \ as one of the most basic ways to set up a streaming PoC for an AI application\
    \ after scraping the latest (tech) stock prices with Python.**\n\n1.  Get the\
    \ add-in for Microsoft Data Streamer by opening a blank excel file then selecting:\n\
    \    1.  File ➤ Options\n    2.  Add-ins\n    3.  COM Add-ins\n    4.  Go\n  \
    \  5.  In the COM Add-ins dialogue check the box for Microsoft Data Streamer for\
    \ Excel and click OK.\n\n2.  Download the lab files from the GitHub repo below:\n\
    \    [`https://github.com/bw-cetech/apress-3.3a`](https://github.com/bw-cetech/apress-3.3a)\n\
    \n3.  Stream the sample data as follows:\n    1.  Data Streamer tab ➤ Import Data\
    \ File\n    2.  Point to the `df_eth.csv` file downloaded from GitHub\n    3.\
    \  On the `Data In` sheet ➤ Highlight cells `B7:C22`\n    4.  Press `alt + F1`\
    \ to create a chart – this will be blank for now\n    5.  Data Streamer tab ➤\
    \ Play Data\n\n    **You should be able to see the streamed data as a timeline\
    \ in the chart.**\n\n4.  Exercise: making use of the downloaded python script\
    \ `StockPriceScraper.ipynb` in Jupyter Notebook, export live stock prices (reader\
    \ can choose which tech stock they want to export) from Jan-21 to D-1 as well\
    \ as the latest Ethereum EOD prices. Stream the stock prices in an excel chart\
    \ as described above.\n\n### Cloud services for Data Ingestion: Hands-on Practise\n\
    \nLet's also take a look in this next lab at streaming data through one of the\
    \ main cloud services for data ingestion.\n\n#### Streaming with Python & AWS\
    \ KINESIS\n\n**The goal of this exercise is to build a python script, create an\
    \ access key in AWS, an IAM Policy and IAM User then connect to Kinesis and stream\
    \ stock price data.**\n\n1.  Create a new (blank) python script (e.g. in Jupyter\
    \ notebook, Google Colab) and add the Python libraries for AWS (`boto3`) shown\
    \ in the sample notebook here:\n    [`https://github.com/bw-cetech/apress-3.3`](https://github.com/bw-cetech/apress-3.3)\n\
    \n2.  Create an access key in AWS by following steps 1-4 here: [`https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.xhtml`](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.xhtml)\n\
    \n3.  Create a Kinesis stream by following steps 1-7 below: [`https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-create-stream.xhtml`](https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-create-stream.xhtml)\n\
    \n4.  Create an IAM policy by following the steps here: [`https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-iam.xhtml`](https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-iam.xhtml)\n\
    \n5.  Create an IAM user by following this link:\n    [`https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-iam.xhtml`](https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-iam.xhtml)\n\
    \n6.  Add the remaining config steps shown in the above sample Python notebook\
    \ to view the streaming data.\n\n7.  Try the following as \"stretch\" exercises:\n\
    \    1.  Once your data is streaming, view metrics in AWS CloudWatch.\n    2.\
    \  Try to get DynamoDB to consume the data.\n    3.  Modify your code to API into\
    \ live stock price data on yahoo / quandl.\n\n## Data Pipeline Orchestration –\
    \ Best Practice\n\nSo far in our hands-on labs in this chapter we have looked\
    \ at establishing a live connection to weather data, made use of cloud tooling\
    \ (AWS Data Pipeline) to push data from source to sink (DynamoDB to an S3 bucket),\
    \ and viewed a data flow through Kinesis in Python with the `boto3` (AWS) library.\n\
    \nOur wrap-up of this chapter takes a closer look at best practice for flowing\
    \ data into and out of an AI application, expanding on these hands-on labs to\
    \ examine how best to architect AI solutions dependent on OLTP or OLAP data, or\
    \ a mixture of both.\n\n### Storage Considerations\n\nAt the commencement of an\
    \ AI project storage considerations should be on the list of priority considerations.\
    \ Can we get away with a simple database or data mart, or is integration (as in\
    \ most enterprise projects) required with a data Warehouse or data lake?\n\nCost\
    \ is always important as is flexibility/agility, particularly around unstructured\
    \ data sources. In both cases data lakes are usually the preferred option but\
    \ data warehouse companies are improving the consumer cloud experience and making\
    \ it easier to try, buy, and expand data warehouses with little to no administrative\
    \ overhead.\n\nIf security is a priority, an AI project may favor integration\
    \ with a legacy data warehouse with a mature security model. Data warehousing\
    \ may also have better support for machine learning and AI – generally they have\
    \ faster \"reads\" of up-to-the-minute data than in a data lake. Data Warehouses\
    \ also reduce duplication, have schema-overlay to improve data quality, fit reusable\
    \ features and functions, and are better at preautomating transformations.\n\n\
    Eighty percent of the job of a Data Scientist is in data prep and wrangling so\
    \ the target \"end user\" can heavily influence the approach – if research and\
    \ exploratory data analysis is more aligned with the company's vision then a data\
    \ lake will provide a wider scope for data mining while if automation and explanatory\
    \ data analysis is key then integration should where possible be to a scaled-down\
    \ database or data mart."
