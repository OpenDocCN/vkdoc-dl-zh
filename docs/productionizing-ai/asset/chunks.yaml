  trans: '

    ### 数据湖存储


    **Microsoft Azure 数据湖存储 (ADLS) 或 Gen2** 被宣传为用于大数据分析的下一代数据湖解决方案。它构建在 Azure Blob（二进制大型对象）存储之上，特别适用于海量非结构化数据，包括流式视频和音频，这些数据被容器化在组织的存储帐户中。


    `ADLS` 是一个完全托管、弹性、可扩展且安全的文件系统，支持 HDFS 语义，并与 Apache Hadoop 生态系统协同工作。它也是 PowerBI
    数据流的底层存储。


    **AWS 简单存储服务 (S3)：** 在 Amazon Web Services 上，`S3` 是在 AWS 上构建数据湖的首选存储服务。`S3` 安全、高度可扩展且持久耐用，能够摄取结构化和非结构化数据，并对数据进行编目和索引以供下游分析，如今被广泛应用于许多分析项目和机器学习应用程序中作为底层数据存储。当需要块存储时，会使用
    Amazon Elastic Block Store (`EBS`)（与 Azure Blob 存储相当）。


    **Google BigLake**：BigLake 最近作为 GCP 上全新的跨平台数据存储引擎推出。


    #### Hadoop


    Apache Hadoop 是事实上的框架，允许跨集群对大型数据集进行分布式处理，本质上是一组用于利用计算机网络解决大数据问题的软件集合。


    **MapReduce** 是 Hadoop 的基本编程模型，位于 Apache Hadoop 的核心，用于使用主/从架构处理海量数据（图 3-9）。如图
    3-10 所示，它的工作原理是执行 (1) **映射任务**，将数据拆分然后映射为键/值对格式，以及 (2) **归约任务**，将映射后的输出进行混洗并合并成更小的键/值对集合。


    ![](img/527966_1_En_3_Fig10_HTML.jpg)


    MapReduce 中的流程图。它接收输入语句，然后将数据拆分并映射为键值对。接着，这些键值对被混洗并归约为更小的键值对集合。


    图 3-10


    使用 Hadoop 跨集群的 MapReduce（来源：[`guru99.com`](http://guru99.com)）


    ![](img/527966_1_En_3_Fig9_HTML.jpg)


    Hadoop 网络架构特点是在一个主节点下有三个从节点。主节点包括一个名称节点和一个资源管理器。每个从节点包括一个数据节点、节点管理器、映射和归约。


    图 3-9


    Hadoop 架构（元数据存储在 NameNode 中）。MapReduce 算法如图 3-10 所示。


    MapReduce 的并行特性使其对于使用（云）集群中的多台机器执行大规模数据分析非常有价值。如今，大多数 CSP 都提供内置在其服务产品中的 Hadoop
    大数据处理功能：`AWS EMR`、`Azure HDInsight` 和 `GCP Cloud Dataproc`。


    ### 流处理与流分析


    上述云服务是当今许多业务用户首选的数据存储，但是使用什么工具来将数据从一个数据存储获取/提取到另一个数据存储，或者进入（或离开）AI 应用程序呢？


    流处理，或复杂事件处理，是查询连续数据流的过程。在理想情况下，此数据流将是实时的，但实际上，检测时间段从几毫秒（**原生流处理**）到几秒（**微批处理**）不等。


    目标通常是尽可能接近“即时”地从数据中获取洞察，因为数据的价值会随时间迅速降低。如果我们考虑一个特定案例：通过温度传感器在温度达到冰点时接收警报，流处理将确定数据读取（和传输）的粒度，例如毫秒或微秒。


    如今，许多处理流处理的工具都带有扩展的分析能力——**流分析**。Apache 工具套件：`Apache Storm`、`Sqoop`、`Spark`、`Flink`
    和 `Apache Kafka`、`Talend`、`Algorithmia` 以及 `upsolver` 都是具有这些内置功能的流处理框架，`AWS Kinesis`
    也是如此。在本书的动手实验中，我们将研究其中三个——用于大数据机器学习的 `Apache Spark`、用于流式传输股票价格数据的 `AWS Kinesis`
    以及利用消息代理处理流入 AI 应用程序的流数据的 `Apache Kafka`。


    无论是 `Kafka` 还是 `Kinesis`，当今有大量的 AI 用例依赖于实时流技术，包括算法交易、供应链优化、欺诈检测和体育分析。

