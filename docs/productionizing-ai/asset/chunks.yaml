  trans: "\n### DataOps\n\n让我们从基础开始——`DataOps` 并非 `DevOps`。`DevOps` 关注软件开发，而数据分析（以及人工智能）除了需要这一点，还需要对数据如何演变进行控制。\n\
    \n由于数据是数据分析师、数据科学家或人工智能工程师角色的底层“货币”，如果我们想要产生切实、有意义的结果和洞察，治理和数据质量就至关重要——除了克隆生产环境来开发“应用程序”或“解决方案”之外，底层基础设施还必须适应不断变化的数据的“持续编排”。\n\
    \n如图 2-1 所示（来自 DataKitchen），一个 `DataOps` 实现贯穿整个数据管道——从多个数据源开始，经过集成、清洗和转换，然后被（多个）最终用户消费。`DataOps`\
    \ 的背景是，如果没有有效的数据策略，分析和人工智能就会失败，而 89% 的企业在管理数据方面存在困难。^(²⁶)\n\n![](img/527966_1_En_2_Fig1_HTML.jpg)\n\
    \n数据操作管道的表示。涉及多个数据源、集成、清洗、转换、处理与发布。\n\n图 2-1\n\nDataOps 管道 (DataKitchen)\n\n###\
    \ 数据“工厂”\n\n`DataOps` 本质上是三个关键领域的融合：**DevOps、敏捷和精益**，^(²⁷) 其目标是通过缩短创新和变更周期、降低生产中的错误率、通过例如自助服务赋能等方式改善协作和生产力，从而简化数据管道（更多内容见第\
    \ 3 章）并提高数据质量（和可靠性）。在更细粒度的层面上，数据监控与测量、元数据、可扩展平台和版本控制也是确保数据管道解决方案由组织目标驱动的关键领域。\n\
    \n除了作为一个框架或方法论之外，`DataOps` 也是一种**文化**，通常由首席信息官/首席数据官或组织的 IT 职能部门推动。指标是关键，无论是在个人贡献者层面，还是在衡量跨项目的生产力和质量改进方面。\n\
    \n### 人工智能的问题：从 DataOps 到 MLOps\n\n那么 `MLOps` 呢？\n\n即使存在稳健的数据策略，也只有不到一半（Gartner：47%，DeepLearning.ai：22%）的机器学习模型能够投入生产。^(²⁸)\n\
    \n我们知道机器学习（和人工智能）不仅仅是代码，它是代码加数据。虽然代码开发通常在受控环境（即 `DevOps`）中进行，但另一方面，数据具有**高熵**，并且独立于底层代码而演变。\n\
    \n**`MLOps` 是**机器学习运营化，它很大程度上借鉴了 `DataOps` 的最佳实践和经验教训，但这次的重点是优化机器（或深度^(²⁹)）学习模型的生产生命周期，而不是像\
    \ `DataOps` 那样处理更通用的数据/分析或人工智能解决方案。\n\n除了高熵数据之外，机器学习的真正挑战不在于构建模型本身。如图 2-2 所示（来自\
    \ nvidia 和 GCP 的 `MLOps` 流程地图/全景图），挑战在于集成一个机器学习系统，无数项目因未能采用“全系统”方法而导致实施效果不佳：\n\
    \n![](img/527966_1_En_2_Fig3_HTML.jpg)\n\nMLOps 核心流程的表示，涉及数据收集、数据验证、自动化、配置、元数据管理、模型分析和服务基础设施。\n\
    \n图 2-3\n\nMLOps 核心流程 (来源：GCP)\n\n![](img/527966_1_En_2_Fig2_HTML.jpg)\n\nMLOps\
    \ 展示 AI 生命周期的表示。涉及数据收集、摄取、分析和整理、标注、验证和准备，以及机器学习系统部署和验证。\n\n图 2-2\n\nMLOps (来源：nvidia)\n\
    \n*   不一致、繁琐（且脆弱）的部署\n*   缺乏可重复性\n*   由于训练和推理过程偏差导致的性能下降\n\n### 企业级人工智能\n\n正如我们将在后续章节中看到的，`MLOps`（和\
    \ `DataOps`）与“企业级人工智能”紧密耦合——有效地将人工智能嵌入到组织的全公司战略中。`MLOps` 和企业级人工智能关乎设计目标/未来架构，并实施稳健的人工智能基础设施和企业数据中心，同时确保全体员工了解公司切实的人工智能资产并接受相关培训。\n\
    \n企业级人工智能被 C 级/董事会视为企业成功运行人工智能的最佳实践——`MLOps` 符合这一愿景，如今许多 CSP 将 `MLOps` 作为内置解决方案提供，而其他公司（如\
    \ DataRobot）则将 `MLOps` 作为其整个商业模式或产品。\n\n### GCP/BigQuery：动手实践\n\n云端数据操作：PYTHON\
    \ 和 BIGQUERY\n\n**本练习的目标是在 Jupyter Notebook 中使用 Python，初步了解 Google Cloud Platform\
    \ 和 BigQuery，以帮助弥合独立数据科学与云管理的 DataOps 或 MLOps 解决方案之间的知识差距。**\n\n1.  通过下方链接设置一个\
    \ GCP 账户\n\n[`https://console.cloud.google.com`](https://console.cloud.google.com)\n\
    \n1.  激活免费试用——这需要输入信用卡信息，但包含价值 300 美元的免费额度^(³⁰)\n\n2.  在 [`https://console.cloud.google.com/projectselector2/home/dashboard`](https://console.cloud.google.com/projectselector2/home/dashboard)\
    \ 创建一个项目\n\n3.  要启用对 GCP API 的身份验证，请设置一个服务账户 [`https://console.cloud.google.com/iam-admin/serviceaccounts?project=gcp-python-bigquery&supportedpurview=project`](https://console.cloud.google.com/iam-admin/serviceaccounts%253Fproject%253Dgcp-python-bigquery%2526supportedpurview%253Dproject)\n\
    \n4.  获取 API 服务密钥，并将下载的 JSON 文件移动到你的 Jupyter 工作目录\n\n5.  从下方的 GitHub 克隆 Jupyter\
    \ notebook，并运行该 notebook，以了解 Python–BigQuery 接口如何工作\n\n[`https://github.com/bw-cetech/apress-2.1.git`](https://github.com/bw-cetech/apress-2.1.git)\n\
    \n### 使用 Kafka 进行事件流处理：动手实践\n\n使用 KAFKA 进行事件流处理\n\n**与基于 Apache Kafka 的数据流架构的无缝集成，对于实现\
    \ DataOps 目标日益关键。我们将在第** **3****章更详细地探讨流式处理（以及批处理数据），但本实验将向读者介绍 Kafka 以及如何在大数据环境中使用它。**\n\
    \n1.  在以下地址设置一个 Lenses 门户账户\n\n    [`https://portal.lenses.io/register/`](https://portal.lenses.io/register/)\n\
    \n2.  电子邮件验证后，选择 Lenses Demo 并创建一个工作区\n\n3.  通过选择 SQL Studio 然后选择 `sea_vessel_position_reports`\
    \ 来探索实时数据。运行以下查询以查看移动中的实时船只：\n\n    ```\n    SELECT Speed, Latitude, Longitude\n\
    \    FROM sea_vessel_position_reports\n    run query\n    WHERE Speed > 10\n \
    \   ```\n\n在流式处理自动停止几分钟后（可能相当大，约 50 MB），下载结果的 JSON 文件\n\n1.  练习——在其他数据集上运行不同的流式查询，例如\
    \ `financial_tweets`\n\n2.  按照此处的步骤：[`https://lenses.io/box/`](https://lenses.io/box/)\
    \ 完成以下其余步骤，以了解如何设置 Kafka 主题，包括消费者和生产者，以及如何监控实时流\n    1.  创建 Kafka 主题\n    2. \
    \ 创建数据管道\n    3.  执行流处理\n    4.  消费者监控\n    5.  监控实时流\n\n## 敏捷\n\n我们在上一节中看到，敏捷是\
    \ `DataOps` 固有的三大核心实践之一。下一节将更详细地探讨敏捷在人工智能解决方案化背景下的应用。\n"
- fmt: "### Agile Teams and Collaboration\n\n`DataOps` intends to “resolve the struggle\
    \ between centralization and freedom in analytics” – there has to be control,\
    \ but equally companies that get ahead in an increasingly “disrupt or be disrupted”\
    \ digital environment are able to foster a culture that embraces experimentation\
    \ and “lab-based” innovation.\n\nAs one of the three cornerstones of `DataOps`,\
    \ agile development and delivery is all about collaboration and adaptability to\
    \ balance these seemingly competing aims.\n\nThe main part is clearly anchored\
    \ on the “people” perspective. `DataOps` brings a diverse mix of stakeholders\
    \ together on a data project with roles spanning the business/client (who define\
    \ the business requirements, traditional roles: data/solution architects and data\
    \ engineers, newer roles including Data Scientists and `ML` Engineers and `IT`\
    \ operations or those who build and maintain the data infrastructure).\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig5_HTML.jpg)\n\
    \nA process chart of data ops hand-offs represents the requirements of data supply,\
    \ data engineering, data analysis, and business customer. It involves data sources,\
    \ data sets, and analytics.\n\nFigure 2-5\n\n`DataOps` hand-offs ([`medium.com`](http://medium.com))\n\
    \n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig4_HTML.jpg)\n\nA framework\
    \ exhibits various teams of Data Ops. It comprises, solution architects, data\
    \ engineers, data scientists, data or `BI` analysts, `IT Ops`, and organizational\
    \ or business stakeholders.\n\nFigure 2-4\n\n`DataOps` teams (Source: Eckerson\
    \ Group)\n\n### Development/Product Sprints\n\nPrioritization of business requirements\
    \ on projects makes use of techniques such as `MoSCoW` (i.e., **m**ust have this\
    \ requirement, **s**hould have, **c**ould add if doesn’t affect anything else,\
    \ **w**ould like to have this feature/wishlist). Successful data projects prioritize\
    \ bug fixes and features through “sprints” which walk through the pipeline process\
    \ from data integration, to cleaning, transforming, and publishing and typically\
    \ last 2-4 weeks in length.\n\nWhile well-defined project work packages should\
    \ lead to slick, agile handoffs across delivery teams, at the start, teams often\
    \ rebuild organizational Data Warehousing and Analytics landscapes into an initial\
    \ scaled-down sandbox (prototyping) environment. From these modest beginnings,\
    \ sandboxes get scaled-up to lab environments for process orchestration and agile\
    \ testing phases with continual integration (`CI`) of code changes.\n\nUltimately\
    \ the end goal is to dynamically deploy (`CD`) via a “Production Belt” and monitor\
    \ the results.\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig6_HTML.jpg)\n\
    \nA diagram represents the sprint prioritization determined by moscow. The process\
    \ includes data integration, cleaning, transforming, and publishing. It lasts\
    \ 2 to 4 weeks in length.\n\nFigure 2-6\n\n`DataOps` Sprints\n\n### Benefits of\
    \ Agile\n\nThe `DataOps` test and release cycle from sandbox, scale-up through\
    \ deployment is designed around agile software delivery frameworks. Data and Analytics\
    \ specialists use this `DataOps` best practice to rapidly fix errors and implement\
    \ feature requests for re-deployment into Production. The end result is a “managed\
    \ delivery” which addresses the key areas below:\n\n**Changing requirements –**\
    \ incremental approach helps evolve a centralized data repository and supports\
    \ “dynamic” analytic requirements.\n\n**Slipped schedules –** iterative, stepped\
    \ approach shortens the overall delivery times\n\n**Improved flexibility –** allows\
    \ a pipeline of feature requests turned around with continual process improvement\
    \ while limiting the delivery of irrelevant features\n\n**Disappointed users –**\
    \ systemized, accelerated issue resolution process means less scope for deliverables\
    \ not meeting user requirements\n\nUltimately the continual (cyclical) improvement\
    \ process should lead to higher-quality product delivery and `ROI`.\n\n### Adaptability\n\
    \nWhile the people perspective rightfully gets prioritized, Agile (and `DataOps`)\
    \ extends beyond optimizing teams and collaboration to applications and systems.\
    \ Adaptability is important, particularly with cloud computing underpinning many\
    \ `AI` applications today; essentially adaptability means scalability and reuse\
    \ of business logic, `APIs`, and microservices.\n\nMicroservices in particular\
    \ have become popular across the application ecosystem as companies move away\
    \ from siloed code on a single server to applications as a collection of smaller,\
    \ independently run components.\n\nThe underlying architectures from microservice\
    \ integration promote consistent and secure reuse of business logic, `API` sharing,\
    \ and events handling and so enable greater agility from having decentralized\
    \ team ownership, elastic scalability around usage, and discrete resilience from\
    \ isolating run changes from other microservices at runtime.\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig7_HTML.jpg)\n\
    \nThe architecture of agile integration involves fine-grained deployment, decentralized\
    \ ownership, and cloud-native infrastructure. It promotes `API` sharing.\n\nFigure\
    \ 2-7\n\nMicroservices agile architecture (Source: IBM)\n\n### react.js: Hands-on\
    \ Practice\n\nFRONT-ENDING YOUR AI APPLICATIONS\n\n`React.js`, along with `Vue.js`\
    \ and `Angular` is one of the best and open source front-end `JavaScript` libraries\
    \ for building an aesthetic user interface. The goal of this lab is to implement\
    \ a simple react app which can be extended to front-ending `AI` applications:\n\
    \n1.  Install `node` and `npm` from the link below – both are installed from the\
    \ single windows installer:\n\n    [`https://nodejs.org/en/download/`](https://nodejs.org/en/download/)\n\
    \n2.  Create a test folder, for example, `my-react-app` on your local drive\n\n\
    3.  Opening terminal from within your new folder (type `cmd` in the windows explorer\
    \ path and press enter), install the react boilerplate app by running:\n\n```\n\
    npm install -g create-react-app\n```\n\n1.  Build your app with:\n\n```\nnpx create-react-app\
    \ reactapp\n```\n\n1.  Exercise – try to implement some basic front-end changes:\n\
    \    1.  Change the message shown on the react web page\n    2.  (Stretch) add\
    \ an icon to the `RHS` of the spinning (react.js) logo\n\n### VueJS: Hands-on\
    \ Practise\n\nProgressive AI Web App (PWA) Development with VueJS\n\nAs an alternative\
    \ for building web applications, `VueJS` can be more suitable for front-ending\
    \ smaller, less complex `AI` applications. While `React` is a library, `VueJS`\
    \ is a Progressive `JavaScript` Framework. Here we walk through how to get a `VueJS`\
    \ up and running as a template for building an `AI` user interface.\n\n1.  If\
    \ not already installed, go ahead and install `node.js` (and `npm`) from the url\
    \ in step 1 for the react.js lab above\n\n`https://nodejs.org/en/download/`\n\n\
    1.  Open a terminal (Check the version of `npm` installed with\n\n```\nnpm -v\n\
    ```\n\n1.  Install `vue-cli` (command line support for `VueJS`)\n\n```\nnpm install\
    \ -g @vue/cli\n```\n\n1.  Restart terminal and check `vue-cli` version\n\n```\n\
    vue --version\n```\n\n1.  Navigate to an app testing folder and create a project\
    \ called `my-vue`\n\n```\nvue create my-vue\n```\n\n1.  Select the Babel default\
    \ source-source compiler for browser-readable `.js`, `.xhtml`, `.css` (using arrow\
    \ keys)\n2.  `cd` into the project folder\n\n```\ncd myvue\n```\n\n1.  Run the\
    \ app\n\n```\nnpm run serve\n```\n\n1.  Finally navigate in your browser to the\
    \ url shown in the terminal i.e. `http://localhost:8080` to see the app running\n\
    \nExercise - try to update the source code to remove all the text underneath the\
    \ message “Welcome to Your Vue.js App” and replace with a hyperlinked screenshot\
    \ to Replika [`https://replika.com/`](https://replika.com/)\n\n## Code Repositories\n\
    \nAny cohesive team working on developing an `AI` solution needs to be “singing\
    \ from the same hymn sheet.” Code repositories “repos” are one of the key collaborative\
    \ enablers for ensuring developers and data specialists are working in sync."
