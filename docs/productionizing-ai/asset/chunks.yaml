    \ and configure the model\n\n    5.  Reducing image noise and reconstruct images\
    \ using the trained autoencoder\n\n4.  Compare runtime using Colab GPU runtime\
    \ vs. a normal (CPU) runtime\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig17_HTML.jpg)\n\
    \nA model diagram illustrates Autoencoder: Encoder-Decoder model. It comprises\
    \ an interconnected network with input, hidden, and output.\n\nFigure 5-17\n\n\
    Autoencoder: Encoder-Decoder model\n\n## Deep Learning Tools\n\nBefore proceeding\
    \ to how to implement an artificial neural network in Python, let's take a look\
    \ at some of the main libraries and tools required to support Deep Learning.\n\
    \n### Tools for Deep Learning\n\nAny cursory glance at the latest [TIOBE Programming\
    \ Community index](https://www.tiobe.com/tiobe-index/) shows continuing Python\
    \ popularity and as of June 2022 it is still the number 1 software programming\
    \ language.\n\nAs the “go-to” programming language for Machine and Deep Learning,\
    \ investment in key integration with all the main Deep Learning libraries and\
    \ APIs is central to the development pathway as is strong functionality and features\
    \ for data mining, particularly with the main data wrangling library, Pandas.\n\
    \nGiven programming AI in Python is the theme of this book and we have already\
    \ covered several hands-on Python labs, we assume a certain amount of knowledge\
    \ of the language already. The rest of this section is concerned with the open-sourced\
    \ tools we need to build neural networks with convolutional layers or recurrent\
    \ loops and simplify the deep learning process.\n\n### TensorFlow\n\nThe favorite\
    \ tool of many industry professionals and researchers, TensorFlow is an end-to-end\
    \ deep learning framework developed by Google and released as open source in 2015.\n\
    \nThough well-documented with training support, scalable production and deployment\
    \ options, multiple abstraction levels, and support for different platforms (such\
    \ as Ubuntu, Android, and iOS), TensorFlow is a complex low-level programming\
    \ language, coding of which on its own is not massively intuitive to Data Scientists.\n\
    \nA focus in the last 5-10 years on TensorFlow development means that accelerated\
    \ improvements in research, flexibility, and speed have led to uptake by many\
    \ of the major brands and corporations recognized today, including Airbnb, Coca\
    \ Cola, GE, and Twitter.\n\nNo longer just the low-level language, Google improved\
    \ integration with Python runtime in its last major (TensorFlow 2.0) release in\
    \ 2019. Today’s TensorFlow ecosystem encompasses Python, JavaScript (TensorFlow.js),\
    \ and mobile (TensorFlow Lite) development as well as TensorFlow Extended (TFX)\
    \ for ML Production Pipelines/deployment, TensorBoard for model and results visualisation\
    \ and TensorFlow Hub for pretrained models.\n\nThere are multiple ways and IDEs\
    \ in which to install and import TensorFlow, but in this book we will use what\
    \ we consider is by far the easiest – Google Colab. Because of its linkage to\
    \ its creator, enhanced user workflow and TensorFlow support on Colab means we\
    \ can just simply import TensorFlow as a library without installing the code.\
    \ Colab also comes with GPU support, important for accelerating, scaling, and\
    \ productionizing Deep Learning models.\n\n### Keras\n\nDeveloped by MIT, Keras\
    \ was open-sourced in 2015 to address the challenges around ease of use coding\
    \ deep learning model training and inference in less user-friendly “back-end’\
    \ languages, such as the syntax used in TensorFlow, Theano, and CNTK,^([^(69)](#fn69))\
    \ the latter two of which are now deprecated.\n\nA high-level, modular and extensible\
    \ API written in Python focused on fast experimentation, Keras is the high-level\
    \ API of TensorFlow 2 and the most used Deep Learning framework among top-5 winning\
    \ teams on Kaggle.\n\nIt’s “drag-and-drop” style of programming maintains back-end\
    \ linkage to TensorFlow and accelerates the design, fit, evaluation, and use of\
    \ deep learning models to make predictions in a few lines of code.\n\nThe actual\
    \ implementation of the Keras API on TensorFlow is codified as tf.keras with set\
    \ up in Python is simple:\n\n```\nimport numpy as np\nimport tensorflow as tf\n\
    from tf import keras\n```\n\nThe core data structures of Keras are **layers**\
    \ and **models** with the simplest type of model a **sequential model**, a linear\
    \ stack of layers. We will discuss these layers and the implementation of a deep\
    \ learning model in Keras more in the following section of this chapter.\n\n###\
    \ PyTorch\n\nPyTorch is the last of the main Deep Learning “tools” we will cover\
    \ in this book and is predominantly used for Deep Learning with Natural Language\
    \ Processing.^([^(70)](#fn70))\n\nDeveloped by Facebook’s AI research group and\
    \ open-sourced on GitHub in 2017, PyTorch claims to be simple and easy to use\
    \ and flexible, as well as possessing efficient memory usage with dynamic computational\
    \ graphs. PyTorch is faster and has excellent debugging support, however claims\
    \ to be easier to use should be taken with a pinch of salt– it is a low-level\
    \ language. PyTorch integration with a simpler DL framework like Keras does not\
    \ yet exist although PyTorch Lightning as a lightweight wrapper providing a high-level\
    \ interface to PyTorch may come into its own as an alternative in the coming years.\n\
    \nIn this author’s opinion, implementation of PyTorch is easier using Jupyter\
    \ Notebook on Windows. We will install PyTorch using the one-off shell command\
    \ (directly in a cell in a Jupyter notebook):\n\n```\n%pip install torch\n```\n\
    \nAfter commenting out the above Python code line, the installation can then be\
    \ verified by running the sample PyTorch code:\n\n```\nimport torch\nx = torch.rand(5,\
    \ 3)\nprint(x)\n```\n\nwhere, if successful, a random tensor output should be\
    \ displayed on the screen"
  trans: "\n### Keras 中的自编码器：动手实践\n\n无监督深度学习\n\n**本节的后续实验将使用 MNIST Fashion 数据集探索无监督深度学习。**\
    \ 其思路是利用自编码器的编码器、编码和解码器架构，有效地“重建”特定类别的图像（此处为服装类物品，但代码可轻松适配其他图像集）：\n\n1.  克隆以下\
    \ GitHub 仓库：\n\n    [`https://github.com/bw-cetech/apress-5.3b.git`](https://github.com/bw-cetech/apress-5.3b.git)\n\
    \n2.  在 Colab 中导入并运行笔记本\n\n3.  运行笔记本及内置练习\n    1.  执行探索性数据分析\n    2.  归一化图像数据\n\
    \    3.  为图像添加噪声以增强模型泛化能力\n    4.  构建并配置模型\n    5.  使用训练好的自编码器降低图像噪声并重建图像\n\n\
    4.  比较使用 Colab GPU 运行时与普通（CPU）运行时的运行时间\n\n![](img/527966_1_En_5_Fig17_HTML.jpg)\n\
    \n模型图展示了自编码器：编码器-解码器模型。它包含一个由输入层、隐藏层和输出层组成的互联网络。\n\n**图 5-17** 自编码器：编码器-解码器模型\n\
    \n## 深度学习工具\n\n在继续探讨如何在 Python 中实现人工神经网络之前，我们先了解一些支持深度学习所需的主要库和工具。\n\n### 深度学习工具\n\
    \n粗略浏览最新的 [TIOBE 编程社区指数](https://www.tiobe.com/tiobe-index/) 即可发现，Python 持续流行，截至\
    \ 2022 年 6 月，它仍然是排名第一的软件编程语言。\n\n作为机器学习和深度学习的“首选”编程语言，与所有主要深度学习库和 API 的关键集成是开发路径的核心，同时强大的数据挖掘功能和特性也至关重要，尤其是与主要数据整理库\
    \ `Pandas` 的结合。\n\n鉴于本书的主题是使用 Python 进行 AI 编程，并且我们已经涵盖了几个动手实践的 Python 实验，因此我们假设读者已具备一定的\
    \ Python 语言知识。本节剩余部分将重点介绍构建包含卷积层或循环层的神经网络并简化深度学习过程所需的开源工具。\n\n### TensorFlow\n\
    \n作为众多行业专业人士和研究人员的首选工具，`TensorFlow` 是由 Google 开发并于 2015 年作为开源发布的端到端深度学习框架。\n\n\
    尽管 `TensorFlow` 拥有完善的文档、训练支持、可扩展的生产和部署选项、多抽象层级以及对不同平台（如 Ubuntu、Android 和 iOS）的支持，但它是一种复杂的底层编程语言，其编码本身对数据科学家来说并非特别直观。\n\
    \n过去 5-10 年对 `TensorFlow` 开发的关注意味着其在研究、灵活性和速度方面的加速改进，使其被当今许多知名品牌和公司所采用，包括 Airbnb、可口可乐、通用电气和\
    \ Twitter。\n\n`TensorFlow` 已不再仅仅是底层语言，Google 在其 2019 年的上一个主要版本（`TensorFlow 2.0`）中改进了与\
    \ Python 运行时的集成。如今的 `TensorFlow` 生态系统涵盖了 Python、JavaScript（`TensorFlow.js`）和移动端（`TensorFlow\
    \ Lite`）开发，以及用于机器学习生产流水线/部署的 `TensorFlow Extended (TFX)`、用于模型和结果可视化的 `TensorBoard`\
    \ 和用于预训练模型的 `TensorFlow Hub`。\n\n有多种方式和集成开发环境可以安装和导入 `TensorFlow`，但在本书中，我们将使用我们认为最简单的方法——Google\
    \ Colab。由于 Colab 与其创建者的关联、增强的用户工作流程以及对 `TensorFlow` 的支持，我们只需将 `TensorFlow` 作为库导入，而无需安装代码。Colab\
    \ 还提供 GPU 支持，这对于加速、扩展和生产化深度学习模型至关重要。\n\n### Keras\n\n`Keras` 由麻省理工学院开发，于 2015\
    \ 年开源，旨在解决在用户友好度较低的“后端”语言（如 `TensorFlow`、`Theano` 和 `CNTK`^(⁶⁹) 中使用的语法）中编码深度学习模型训练和推理的易用性挑战，后两者现已弃用。\n\
    \n`Keras` 是一个用 Python 编写的高级、模块化且可扩展的 API，专注于快速实验。它是 `TensorFlow 2` 的高级 API，也是\
    \ Kaggle 上排名前五的获胜团队中最常用的深度学习框架。\n\n其“拖放式”编程风格保持了与 `TensorFlow` 的后端连接，并加速了深度学习模型的设计、拟合、评估和使用，只需几行代码即可进行预测。\n\
    \n`Keras` API 在 `TensorFlow` 上的实际实现被编码为 `tf.keras`，在 Python 中的设置很简单：\n\n```python\n\
    import numpy as np\nimport tensorflow as tf\nfrom tf import keras\n```\n\n`Keras`\
    \ 的核心数据结构是 `layers` 和 `models`，最简单的模型类型是 `sequential model`，即层的线性堆叠。我们将在本章下一节中进一步讨论这些层以及如何在\
    \ `Keras` 中实现深度学习模型。\n\n### PyTorch\n\n`PyTorch` 是本书将介绍的最后一个主要深度学习“工具”，主要用于自然语言处理领域的深度学习。^(⁷⁰)\n\
    \n`PyTorch` 由 Facebook 的 AI 研究小组开发，并于 2017 年在 GitHub 上开源。它声称简单、易用且灵活，同时通过动态计算图实现高效的内存使用。`PyTorch`\
    \ 速度更快，并拥有出色的调试支持，但对其易用性的宣称应持保留态度——它是一种底层语言。`PyTorch` 与像 `Keras` 这样更简单的深度学习框架的集成尚不存在，尽管作为为\
    \ `PyTorch` 提供高级接口的轻量级包装器，`PyTorch Lightning` 可能会在未来几年内成为一种替代方案。\n\n在作者看来，使用 Windows\
    \ 上的 Jupyter Notebook 实现 `PyTorch` 更容易。我们将使用一次性 shell 命令（直接在 Jupyter notebook\
    \ 的单元格中）安装 `PyTorch`：\n\n```bash\n%pip install torch\n```\n\n注释掉上述 Python 代码行后，可以通过运行示例\
    \ `PyTorch` 代码来验证安装：\n\n```python\nimport torch\nx = torch.rand(5, 3)\nprint(x)\n\
    ```\n\n如果安装成功，屏幕上应显示一个随机张量输出。\n"
- fmt: '### Other Important Deep Learning Tools


    Of course, `TensorFlow` (with `Keras`) and `PyTorch` are not the only Deep Learning
    frameworks in use today. An abundance of tools exist, many of which in their own
    right may produce better results or performance when focused on a specific use
    case.


    `Eclipse Deeplearning4J`, also known as `DL4J`, for example, is a set of projects
    intended to support all the needs of a Java Virtual Machine (JVM) based deep learning
    application.


    In terms of Python libraries, while both `Theano` (developed by Université de
    Montréal) and `Microsoft Cognitive Toolkit (CNTK)` have seen their day and are
    now deprecated, `Caffe`, developed by the University of California, Berkeley remains
    in use, particularly for Image classification/segmentation. `Caffe` is strong
    on NVIDIA GPU integration, although somewhat difficult to debug.


    `MXNet`, from the incredibly large Apache toolset ecosystem, has multilanguage
    support for Deep Learning and high-level API support.


    #### Apache Spark


    While `MXNet` is more of a niche Deep Learning tool, `Apache Spark` is a popular
    unified analytics engine for big data processing, with built-in modules for streaming,
    SQL, machine and deep learning, and graph processing.


    Because of its inherent “scalability” around Big Data processing and its built-in
    interface for programming entire clusters with implicit data parallelism (so a
    great fit for distributed training on large datasets) and fault tolerance, Data
    Scientists have jumped on `Apache Spark` as an accelerator for productionizing
    Deep Learning.


    Many APIs exist to simplify the implementation and usage of `Apache Spark` in
    Python, including `PySpark` (defacto Python API for `Apache Spark`) and `SparkTorch`
    (for running `PyTorch` models on `Apache Spark`).


    Probably the most important of the “other” tools important for productionizing
    Deep Learning, `Apache Spark` is the focus of a hands-on lab in the next chapter
    of this book.


    ## Frameworks for Deep Learning and Implementation


    Now that we have established the main Python integration tools for Deep Learning,
    we can proceed to the main focus of this chapter – how to implement a Deep Learning
    model.


    ### Tensors


    Both `TensorFlow` and `PyTorch` utilize **tensors**, so it''s helpful to understand
    this important data structure before proceeding to how they are constructed and
    used in a deep learning model.


    In effect, a **tensor** is a multidimensional array with a uniform data type.
    They are similar to `numpy` arrays but are immutable, much like a standard Python
    “tuple.” Tensors can also be stored in GPU memory as opposed to standard CPU memory,
    optimizing usage for deep learning.


    ![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig18_HTML.jpg)


    A model diagram features rank-4 multidimensional arrays with shapes.


    **Figure 5-18** rank-4 tensor with shape: `[3, 2, 4, 5]`


    ### Key TensorFlow Concepts


    `TensorFlow 2.0` uses **eager execution** by default to evaluate operations immediately,
    and therefore calculates the values of tensors as they occur in the code. Similar
    to the concept of imperative programming, eager execution involves step-by-step
    operations executed by Python then results returned back to Python (immediately).


    The other type of execution method in `TensorFlow` is **graph execution.** Here
    tensor computations are executed as a dataflow graph `tf.Graph` through `tf.operations`
    graph nodes.


    As this is a book on Python for productionizing AI applications, we focus on eager
    execution in `TensorFlow` rather than graph execution. Best practice in general
    is to develop and debug in eager mode, then decorate/productionize with `TensorFlow`’s
    `tf.function` which converts regular Python code to a callable Tensorflow graph
    function generally offering better performance.


    `TensorFlow` also makes use of various **execution pipelines** for performing
    multiple/concurrent tasks in the deep learning process:


    *   `tf.data` – API enables reuse of complex input pipelines to, for example,
    aggregate data from multiple files, apply stochastic “noise” to images and batch
    random images for training

    *   `TFX Pipelines` – extends this to end-to-end MLOps (input ➤ train ➤ deploy
    ➤ track)


    ### The Deep Learning Modeling Lifecycle


    Moving on to initial implementation, as we go through the data import, vectorize
    with `numpy`, model building, and model running processes, we know that modeling
    will fail unless the data is transformed into a tensor before using `TensorFlow`
    eager execution to experiment, visualize immediate results and debug.


    In order to traceback coding (and troubleshooting) to the underlying process,
    it is useful to think of the Deep Learning modeling lifecycle as having five distinct
    phases:


    *   Define the model

    *   Compiling the model

    *   Fitting the model

    *   Model evaluation

    *   Predictions/Inference


    These phases can be further subdivided into subprocesses broadly relatable to
    `Keras`/`TensorFlow` operations and defined via a single line of Python code.


    ![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig19_HTML.jpg)


    A model diagram illustrates the Deep Learning modeling lifecycle. It comprises
    5 blocks, which are Define the model, Compiling the model, fitting the model,
    model evaluation, and making predictions.


    **Figure 5-19** Deep Learning modeling lifecycle (Source: machinelearningmastery)


    Example code mirroring the above DL phases:


    ```

    # define the model

    model = ...

    # compile the model

    opt = SGD(learning_rate=0.01, momentum=0.9)

    model.compile(optimizer=opt, loss=''binary_crossentropy'')

    # fit the model

    model.fit(X, y, epochs=100, batch_size=32, verbose=0)

    # evaluate the model

    loss = model.evaluate(X, y, verbose=0)

    # make a prediction

    yhat = model.predict(X)

    ```


    ### Sequential and Functional Model APIs


    In the process and Python code above, in order to build a model we first need
    to define it. In the `Keras` API (`tf.keras`) there are in fact two main ways
    to do this: the sequential model and functional model.


    #### Sequential Model API


    The simplest approach, the Sequential model works on neural network layers where
    each layer has exactly one input tensor and one output tensor.


    To implement this in Python, as shown in the code below, we add layers to the
    model one by one in a linear manner using `model.add()`.


    **Example of a model defined with the sequential API**


    ```

    from tensorflow.keras import Sequential

    from tensorflow.keras.layers import Dense

    # define the model

    model = Sequential()

    model.add(Dense(10, input_shape=(8,)))

    model.add(Dense(1))

    ```


    #### Functional Model API


    The `Keras` functional API is more complex but more flexible than the sequential
    API. Rather than linearly adding layers, here we use a model object specifying
    the input and output layers and explicitly connect ALL outputs of one layer to
    the inputs of another layer (each connection is specified)


    **Example of a model defined with the functional API**


    ```

    from tensorflow.keras import Model

    from tensorflow.keras import Input

    from tensorflow.keras.layers import Dense

    # define the layers

    x_in = Input(shape=(8,))

    x = Dense(10)(x_in)

    x_out = Dense(1)(x)

    # define the model

    model = Model(inputs=x_in, outputs=x_out)

    ```'
