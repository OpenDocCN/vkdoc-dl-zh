    labs.


    ![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig1_HTML.jpg)


    A graph on the growth of worldwide A I software forecast 2020 to 2024\. It includes
    six plots: A I C R M, A I E R M, rest of A I apps, A I application development
    and deployment, software platforms, and infrastructure.


    Figure 7-1


    IDC AI Growth Forecast to 2024


    ## Introduction to AI Application Development


    In this first section, we take a look at the current drivers for AI application
    development, some basics in moving from script to solution as well as accelerators
    for Big Data handling: parallel processing, clusters, and GPUs.


    ### Developing an AI Solution


    Agile Software Development is the number 1 job on itjobswatch.^([^(103)](#fn103))
    Stemming from a frenzied demand for AI solutions, this presents a huge opportunity
    for Full-Stack Data Scientists or AI Engineers.


    In 2022, most AI apps fit into one of three categories: Machine Learning, Computer
    Vision, or NLP but due to their technical complexity, machine and deep learning
    implementations have historically been operationally siloed with PhD-level statisticians
    left to explain code-heavy technical models.


    Quick-fix or mock-up dummy/synthetic datasets have been relied on rather than
    implementing a Data Fabric approach to connect to (or create) sophisticated prelabeled
    datasets. Training and testing has often been limited to a Python notebook (Jupyter,
    Colab, etc.) and inference (often without an API) done as an afterthought. The
    end result is significant technical debt – certainly not an “app” as we know it.


    The evolution is toward an “Enterprise AIaaS” solution, perhaps coupled with TinyAI:
    new algorithms to shrink existing deep learning models without losing their capabilities.^([^(104)](#fn104))


    ### AI Apps – Up and Running


    How do we go about developing an AI app? From a process perspective, we recommend
    following an agile approach, start small, but don’t leave technical debt behind,
    the end goal should be Enterprise AI, even if that is a longer 2-5-year journey.
    The below seven-step plan is a good framework for success:


    1.  Pick an interesting topic/problem


    2.  Develop the low fidelity solution – find a quick solution and keep it open
    source – if possible! Use google to help (seriously!), framing the problem with
    **precise** keywords


    3.  Improve your simple solution – look for similar problem formulation and example
    Python code on Kaggle or on blogs/websites of one of the many great thought leaders
    in AI/DL or ML^([^(105)](#fn105))


    4.  Share your solution and solicit feedback – make use of same specific forums
    to ask questions and for support/debugging


    5.  Repeat steps 1-4 for different problems – turn ambiguous/vague business/organizational
    objectives into concrete problems solvable with ML/DL


    6.  Complete a Kaggle competition and collaborate


    7.  Aim for a high-value solution – does it solve the organizational problem,
    is it measurable?


    Successful deployment of an AI solution requires a huge amount of supporting infrastructure
    and an understanding of the target/To-Be architecture. We discuss two aspects
    critical to scaling a solution below – running machine and deep learning code
    as web services behind APIs and distributed computing.


    ### APIs and Endpoints


    **Application Programming Interfaces (or APIs)** provide a standardized way of
    communication between two software applications.


    An API opens up certain **user-defined URL endpoints**, which are then used to
    send or receive data requests. REST (representational state transfer) APIs are
    one of the most popular specialized web service APIs which make use of URIs, HTTP
    protocol, and JSON data formats, but there are others, with Google’s gRPC high-performance
    Remote Procedure Call (RPC) framework and Facebook’s GraphQL suitable alternatives.^([^(106)](#fn106))
    Both are now open-sourced.


    There are clear benefits in exposing AI/ML models as an API, from UI/UX or providing
    a user-friendly analytics/model interface and workflow to endpoint stability,
    ability to include data validation^([^(107)](#fn107)) checks and security handling,
    separation of Data Science and IT functions, usability across a wider organization
    as well as multi-app reusability.


    Besides internal productivity, there is additional external value creation from
    API-supported AI solutions also exposing Data Science models to a wider customer
    base. API endpoints/responses can be tested using cURL and/or Postman – both simplifying
    the steps in building an API and troubleshooting/debugging connection issues.
    Figure [7-2](#527966_1_En_7_Chapter.xhtml#Fig2) illustrates this.


    ![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig2_HTML.jpg)


    An architecture of a typical A P I. It includes an analytics server, A P I, H
    T T Ps request with data payload, and H T T Ps response with data payload and
    application.


    Figure 7-2


    Typical API architecture (source: ubiops)


    ### Distributed Processing and Clusters


    As Deep (and sometimes Machine) Learning requires matrix computations on large
    training sets, distributed computing makes it possible to perform these computations
    in parallel, thus saving on time. Most production-grade solutions today require
    this big data processing capability to support the underlying AI application.


    #### Clusters


    Clusters are a group of nodes (computers) in a high-performance computing (HPC)
    system (Figure [7-3](#527966_1_En_7_Chapter.xhtml#Fig3)) which process distributed
    workloads using parallel processing.


    The most famous example is Apache Hadoop – a framework that allows for the distributed
    processing of large datasets across clusters. See Chapter [3](#527966_1_En_3_Chapter.xhtml)
    for more on Hadoop.


    ![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig3_HTML.jpg)


    A flow chart depicts the distributed workloads using parallel processing. They
    compare normal processing and parallel. In parallel processing program with C
    P U task 1, task 2 and task 3 gives result.


    Figure 7-3


    Parallelization in computing – use of multiple CPUs to split ML/DL processes into
    concurrent tasks'
