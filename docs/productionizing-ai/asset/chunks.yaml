    \ for example, internal job vacancies or company policy retrieval.\n\nFor onboarding,\
    \ internal content personalization for employee professional development can be\
    \ supported with recommendation engines based on demographics, skillsets, and\
    \ psychometric scores. Anomaly detection can help identify amber or red flags\
    \ in employee attitudes and behavior.\n\n### HR Employee Attrition: Hands-on Practice\n\
    \nGetting a Handle on Employee Churn\n\nUsing Python in Jupyter Notebook, the\
    \ goal of this exercise is to run AutoAI to perform feature engineering and algorithmic\
    \ benchmarking on an employee attrition dataset:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig19_HTML.jpg)\n\
    \nAn illustration depicts the H R employee attrition and performance of auto A\
    \ I. It is based on feature transformers, pipelines, top algorithms, 90 percent\
    \ training data, 3 folds, and 100 percent hold out data.\n\nFigure 8-19\n\nPerforming\
    \ AutoAI on Employee Attrition data with IBM Cloud Pak\n\n1.  Login to IBM Cloud\
    \ Pak at the link below and create a project\n\n    [https://​eu-gb.​dataplatform.​cloud.​ibm.​com/​home2?​context=​cpdaas](https://eu-gb.dataplatform.cloud.ibm.com/home2%253Fcontext%253Dcpdaas)\n\
    \n2.  Create an AutoAI experiment\n\n3.  Add the dataset emp_attrition.csv\n\n\
    4.  Configure the AutoAI experiment to predict employee attrition\n\n5.  View\
    \ performance of the model training process and test results\n\n6.  Implement\
    \ a Flask UI to run predictions for employee types\n\n7.  Exercise – test whether\
    \ the predictions make sense, for example, by entering data for an employee on\
    \ a relatively low monthly income, with limited years of service\n\n## Other Case\
    \ Studies\n\nOur final section in this chapter takes a look at the key areas ripe\
    \ for AI innovation within some of the other important industries and subsectors\
    \ we have thus far not mentioned.\n\n### Public Sector and Government\n\nEstimates\
    \ for the use of Artificial Intelligence in government varies market from $4.9b\
    \ in government^([^(129)](#fn129)) to a $1b Global AI governance market.^([^(130)](#fn130))\
    \ While ethics and risk aversion are the primary concern, governmental departments\
    \ are increasingly adopting data-led analytics and AI approaches to deliver public\
    \ services. Many of the same approaches are also used in the media for advertising\
    \ and gauging public perception.\n\nBesides key public engagement applications\
    \ such as dashboard-driven insights into sector performance and the public mood,\
    \ chatbot 2.0, IVAs and sentiment analysis for “voice of the public” and to provide\
    \ personalized public services, data project are often undertaken to help back\
    \ up or steer policy and to boost trust and public perception.\n\nAI adoption\
    \ is also helping Public Sector agencies and organizations to drive efficiency\
    \ improvements via, for example, document processing and automation, and tackle\
    \ a surge in fraudulent activity, aided by the proliferation of IoT devices. And\
    \ at the same time, more granular analytics for supporting policy planning and\
    \ development and productivity improvements are in evidence, including:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig20_HTML.jpg)\n\
    \nA representation of challenges for public sectors and government. It includes\
    \ planning (supply, consumer demand), public service delivery (buildings, resources),\
    \ and social mobility (healthcare disparities).\n\nFigure 8-20\n\nChallenges for\
    \ AI in Government\n\n*   Sectoral analysis, policy creation, planning and delivery\n\
    \n*   Admin and departmental process automation\n\n*   Policy document retrieval\
    \ and processing\n\n*   Anomaly detection including public fraud, health issues,\
    \ and the benefits system\n\n*   Econometrics Forecasts and Time Series Analysis\n\
    \n### Manufacturing\n\nMuch of the use of AI across Supply Chains described earlier\
    \ also covers manufacturing use cases with Manufacturing 4.0 intended to bring\
    \ together IoT, cloud, and analytics to revolutionize the production and distribution\
    \ process.\n\nSafety stock levels, delivery schedules, supply chain logistics,\
    \ and underlying expenses are all optimized parameters under an aspiring, if not\
    \ functioning Smart Manufacturing Solution. Warehouse use of blockchains is also\
    \ increasing, with the intention of improving auditability and making supply chains\
    \ more efficient and reliable.\n\nAI simulation in theory should help reduce product\
    \ recalls by reducing manufacturing processes rigidity, dynamically correcting\
    \ product flaws and encouraging product improvisation. Similarly knock-on impacts\
    \ of equipment/machinery failures on delivery schedules, budgets, and reputation\
    \ are better managed today using AI applications. Predictive Maintenance in particular,\
    \ coupled with big (often IoT) data statistical analysis, leads to better scheduled\
    \ maintenance (without impacting delivery) and reducing future failures.\n\nGiven\
    \ this digital reliance and big data dependency, no Manufacturing 4.0 solution\
    \ today is complete without addressing cyber security concerns – the subject of\
    \ our next subsection.\n\n### Cybersecurity\n\nThere is no greater challenge to\
    \ business and organizations in 2022 than Cybersecurity.\n\nThe Internet has well\
    \ and truly penetrated into every industrial system today, but at a local (production)\
    \ level and across global supply chains. With it has come a huge increase in risk\
    \ of cyberattack from hackers trying to gain access to information or worse, take\
    \ control of sometimes highly strategic facilities tied to national security.\
    \ Besides critical Defense in Depth layers of security and provision of robust\
    \ firewalls, machine, and deep learning is being leveraged to protect against\
    \ these highly disruptive, real-time, dynamic cybersecurity attacks.\n\nWe have\
    \ already taken a look in Chapter [7](#527966_1_En_7_Chapter.xhtml) at a cybersecurity\
    \ use case in our hands-on lab looking at deploying an API endpoint for a trained\
    \ machine learning model trained to detect cybersecurity DDoS attacks. Readers\
    \ are referred back to that lab and in particular the model training process (step\
    \ 4) which shows how various network parameters are used as features to identify\
    \ patterns in network activity that might constitute, for example, raindrop malware\
    \ from a network intrusion event.^([^(131)](#fn131))"
  trans: "\n### 人力资源解决方案示例\n\n仪表盘是大家最喜爱的分析工具，对于人力资源高管而言，它对于覆盖员工旅程的各个方面至关重要，包括招聘关键绩效指标、员工在职指标（如工作效率和远程办公）^(¹²⁵)、考勤^(¹²⁶)与纪律监督，以及员工流失和公司反馈。^(¹²⁷)\n\
    \n市场上最佳的人力资源仪表盘之一来自 Agile Analytics，它提供了 20 多个内置的描述性和预测性 `PowerBI` 报告视图。\n\n如图\
    \ 8-18 所示，有多种机器学习应用，包括应用于候选人信息（领英、简历）的 OCR、NLP 和文本分析。深度学习有助于职位描述扫描（或基于 NLG 的职位描述创建）以及起草员工合同，而\
    \ NLP 支持的偏见消除也有助于确保公平的招聘政策。\n\n![](img/527966_1_En_8_Fig18_HTML.jpg)\n\n图示描绘了员工生命周期的概览。它包括：招聘分析、绩效分析、缺勤分析、培训分析以及员工流失与离职分析。\n\
    \n**图 8-18** 人力资源分析（Agile Analytics）\n\n无代码/低代码用户界面在人力资源经理中越来越受欢迎，为他们提供了非技术性、直观的途径来访问预测性分析和员工建模。聊天机器人和智能虚拟助手有助于实时了解“员工体验”、收集对组织变革和公司文化的反馈、进行员工情绪和情感“温度检查”，并识别潜在的员工流失。如今的智能虚拟助手还具备搜索自动化功能^(¹²⁸)，并与后端系统集成，例如用于查询内部职位空缺或公司政策。\n\
    \n在入职方面，可以基于人口统计、技能组合和心理测评分数，利用推荐引擎为员工职业发展提供内部内容个性化推荐。异常检测有助于识别员工态度和行为中的警示信号。\n\
    \n### 人力资源员工流失：动手实践\n\n**掌握员工流失情况**\n\n本练习的目标是在 Jupyter Notebook 中使用 Python，运行\
    \ `AutoAI` 对员工流失数据集执行特征工程和算法基准测试：\n\n![](img/527966_1_En_8_Fig19_HTML.jpg)\n\n\
    图示展示了人力资源员工流失与 AutoAI 的性能。它基于特征转换器、流水线、顶级算法、90% 的训练数据、3 折交叉验证和 100% 的留出数据。\n\n\
    **图 8-19** 使用 IBM Cloud Pak 对员工流失数据执行 `AutoAI`\n\n1.  通过以下链接登录 IBM Cloud Pak 并创建一个项目\n\
    \n    [`​eu-gb.​dataplatform.​cloud.​ibm.​com/​home2?​context=​cpdaas`](https://eu-gb.dataplatform.cloud.ibm.com/home2%253Fcontext%253Dcpdaas)\n\
    \n2.  创建一个 `AutoAI` 实验\n\n3.  添加数据集 `emp_attrition.csv`\n\n4.  配置 `AutoAI` 实验以预测员工流失\n\
    \n5.  查看模型训练过程和测试结果的性能\n\n6.  实现一个 Flask UI 来运行针对员工类型的预测\n\n7.  练习——测试预测是否合理，例如，输入一名月收入相对较低、服务年限有限的员工数据\n\
    \n## 其他案例研究\n\n本章的最后一部分将探讨在之前未提及的其他重要行业和子行业中，适合进行人工智能创新的关键领域。\n\n### 公共部门与政府\n\
    \n对政府在人工智能应用方面的市场估值各不相同，从政府领域的 49 亿美元^(¹²⁹) 到全球人工智能治理市场的 10 亿美元^(¹³⁰)。虽然伦理和风险规避是首要考虑因素，但政府部门正越来越多地采用数据驱动的分析和人工智能方法来提供公共服务。许多相同的方法也被用于媒体广告和衡量公众看法。\n\
    \n除了关键的公民主参与应用（例如，通过仪表盘洞察行业绩效和公众情绪、聊天机器人 2.0、智能虚拟助手以及用于“公众之声”和提供个性化公共服务的情感分析）之外，通常还会开展数据项目来支持或引导政策制定，并提升信任度和公众认知。\n\
    \n人工智能的应用还帮助公共部门机构和组织通过文档处理和自动化等方式提高效率，并借助物联网设备的普及来应对激增的欺诈活动。同时，用于支持政策规划与制定以及提高生产力的更精细分析也日益显现，包括：\n\
    \n![](img/527966_1_En_8_Fig20_HTML.jpg)\n\n图示展示了公共部门和政府面临的挑战。它包括规划（供应、消费者需求）、公共服务交付（建筑、资源）以及社会流动性（医疗保健差距）。\n\
    \n**图 8-20** 政府在人工智能方面面临的挑战\n\n*   行业分析、政策制定、规划与交付\n*   行政与部门流程自动化\n*   政策文档检索与处理\n\
    *   异常检测，包括公共欺诈、健康问题和福利系统\n*   计量经济学预测与时间序列分析\n\n### 制造业\n\n前面描述的供应链中人工智能的许多应用也涵盖了制造业用例，工业\
    \ 4.0 旨在将物联网、云和分析结合起来，彻底改变生产和分销流程。\n\n安全库存水平、交付计划、供应链物流以及基础费用，都是在一个有抱负（即使尚未完全实现）的智能制造解决方案下的优化参数。仓库中区块链的使用也在增加，旨在提高可审计性，并使供应链更高效、更可靠。\n\
    \n理论上，人工智能模拟应有助于通过降低制造过程的刚性、动态纠正产品缺陷并鼓励产品即兴改进来减少产品召回。同样，如今利用人工智能应用可以更好地管理设备/机械故障对交付计划、预算和声誉的连锁影响。特别是预测性维护，结合大数据（通常是物联网数据）统计分析，可以实现更好的计划内维护（不影响交付）并减少未来故障。\n\
    \n鉴于这种对数字和数据的依赖，任何工业 4.0 解决方案如果不解决网络安全问题（我们下一小节的主题），在今天都是不完整的。\n\n### 网络安全\n\n\
    对于 2022 年的企业和组织来说，没有比网络安全更大的挑战了。\n\n如今，互联网已经真正渗透到每一个工业系统中，无论是在本地（生产）层面还是全球供应链层面。随之而来的是网络攻击风险的巨大增加，黑客试图获取信息，甚至更糟的是，控制有时与国家安全相关的高度战略性设施。除了关键的纵深防御安全层和提供强大的防火墙之外，机器学习和深度学习正被用来防御这些极具破坏性、实时、动态的网络安全攻击。\n\
    \n我们已经在第 7 章的动手实验室中研究了一个网络安全用例，该实验室部署了一个用于检测网络安全 DDoS 攻击的已训练机器学习模型的 API 端点。读者可参考该实验室，特别是模型训练过程（步骤\
    \ 4），该步骤展示了如何使用各种网络参数作为特征来识别网络活动中的模式，这些模式可能构成例如来自网络入侵事件的雨滴恶意软件。^(¹³¹)\n"
- fmt: '### Insurance/Telematics


    Insurers'' business models are changing with AI rapidly reshaping the sector and
    transforming multiple client and internal services:


    - Risk assessment and risk management to risk-based pricing

    - Customer segment targeting

    - Personalized services

    - Bespoke premiums and underwriting expenses

    - Claims Management and Operational Process automation


    Augmenting traditional actuarial-based methods, dynamic risk-based pricing drawing
    on the deluge of (customer behavior-rich) big data from in-vehicle telematics
    is a particularly exciting area in the automobile/fleet insurance sector. However,
    the use of AI across all Insurance sectors is evident from tapping into the voice
    of the customer via social media and creating a sensitive, engaging, or differentiated
    customer experiences based on captured customer attitudinal data.


    ### Legal


    The legal sector is experiencing something of a transformation from the use of
    AI technologies, particularly in relation to research activity and contracting.^([^(132)](#fn132))


    An exhaustive analysis is beyond the scope of this document, however we lay out
    in Figure [8-21](#527966_1_En_8_Chapter.xhtml#Fig21) one key integrated application
    which is being used to help digitalize legal documents and support the search
    and retrieval and archive process – Document Classification and Text Extraction
    with OCR (optical character recognition).


    ![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig21_HTML.png)


    A framework exposes the different kinds of modules, sub-processes, key technologies
    and integration points, and the main features or the purpose of the module. The
    modules include import documents, scanning documents, preparing image data, deep
    learning and text extraction.


    **Figure 8-21** Legal AI: Digitalizing Documents through Document Classification
    and Text Extraction with OCR


    ### DALL-E for the Creative Arts: Hands-on Practise


    **Generative AI – Imagining Digital Images from natural language**


    We have one more lab in this chapter – walking through implementation of one of
    the most exciting developments in AI – OpenAI''s DALL-E.


    `DALL-E` is composed of an autoencoder (see Chapter [5](#527966_1_En_5_Chapter.xhtml))
    and transformer (Chapter [8](#527966_1_En_8_Chapter.xhtml)) – essentially by typing
    in natural language we can conjure any image at will. Although we haven''t discussed
    applications in the creative arts industry in this Chapter, there are obvious
    applications here: from e.g. design and fashion to architecture.


    Register an account with OpenAI [https://openai.com/join/](https://openai.com/join/)
    and access the API Key provided under "Personal" in the top right corner of your
    dashboard.


    Clone the below GitHub repo:


    [https://github.com/bw-cetech/apress-10.9.git](https://github.com/bw-cetech/apress-10.9.git)


    Copy and paste the OpenAI API Key inside the double quotes of the string defined
    in the `openai_credentials.py` file.


    Run through the python notebook steps in Colab:


    - Install `openai`, then comment out the code

    - Import libraries

    - Drag and drop the OpenAI credentials file to Colab temporary storage

    - Run the cell to call the DALL-E model function using the example given of a
    cow holding a frying pan


    NB calling the API function requires a paid account^([^(133)](#fn133)) – make
    sure you have followed the instructions in the notebook to create this first.


    **Exercise (stretch)** – modify the code to create an image of an astronaut on
    a bicycle.


    ## Wrap-up


    The legal perspective above brings this chapter to a close. From a look at the
    digital (and cybersecurity) challenges faced in Telco and Retail sectors, Financial
    Services, Insurance and Government, across manufacturing, supply chain and energy
    industries, in healthcare organizations and across HR functions our trawl through
    AI use cases here sets the scene for our final chapter^([^(134)](#fn134)) on productionizing
    AI.


    Despite the very different nature of these vertical industries, AI solutions are
    often surprisingly similar, "horizontal" in their application, and recyclable.
    Adopting economies of scale makes sense. As such, this is the approach we will
    take in the next chapter – not just to describe the end-to-end processes and implementation
    actions to develop, build and deploy robust plug-and-play AI solutions, but additionally
    in our final two end-to-end deployment labs in this book.


