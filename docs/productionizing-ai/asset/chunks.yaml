    as a unique boolean vector where each unique word is encoded as either 0 or 1
    depending on whether the word appears in the news article.


    Ultimately, there are many drawbacks with the BoW method in that there is no syntactic
    or semantic consideration for the order of the words or the context of the words
    and ultimately we end up with a huge sparsity problem from many documents containing
    no occurrences of less frequent words.


    #### Latent Semantic Analysis (LSA)


    LSA is an extension of the bag of words approach above which uses singular value
    decomposition (SVD)^([^(165)](#fn165)) to reduce data dimensions and thus sparsity.
    LSA takes a dataset of m documents and n words (**document-term matrix**) and
    remodels the text data in terms of r latent^([^(166)](#fn166)) features, where
    r is less than the number of documents we have.


    #### TF-IDF


    Otherwise known as Term frequency–Inverse document frequency, TF-IDF attempts
    to address the inherent weaknesses of the bag of words method by employing a numerical
    statistic to reflect how important a word is to a document in a collection/corpus.


    TF here refers to how frequently a term appears in the document, but it is the
    IDF element, which measures how “important” that term is which distinguishes the
    method from the Bag-of-words model. For any specific word, its IDF is the log
    of the number of documents divided by the number of documents in which that word
    appears, so a word like “the” will have a low score as it will appear in all documents,
    and log(1) is zero.^([^(167)](#fn167))


    TF-IDF is the product of the Term Frequency and IDF score and tends to weight
    higher both ((a) words which are frequent in a single document and b) less frequent/rare
    words over the entire collection.


    For all its advantages over the BoW model, these deterministic, frequency-based
    approaches are unable to scale to interpreting “context” – for these we need word
    embeddings.


    #### A Word on Cosine Similarity


    Whether it''s BoW, LSA, or TF-IDF, cosine similarity is typically used for measuring
    similarity of documents in Word Embeddings.


    The measure is an enhancement on the simple Euclidean distance measure (straight
    line distance between two points) as word embeddings incorporate frequency of
    words in documents.


    Two similar terms (e.g., “foul” and “infringement” in a football referee report)
    may be far apart in n-dimensional space by virtue of one word (“infringement”)
    having a much lower occurrence in the document. Because cosine similarity measures
    the angle between the vector representation of these words, disregarding the magnitude
    of the vector, we manage to retain the concept of “sameness” as the angle between
    the words is small.'
