    \ going to zero."
  trans: "\n### 梯度下降与反向传播\n\n`梯度下降`是训练神经网络的主要过程。它本质上是一种通过更新神经网络中的权重来最小化**损失**（或**代价函数**）的方法。^(⁷⁵)\n\
    \n对于大多数大数据问题，使用的是**随机梯度下降（SGD）**——每次迭代并非使用整个数据集，而是使用数据的一个样本。\n\n随后执行**前向传播**^(⁷⁶)，输入数据通过网络进行变换，通过隐藏层激活神经元，最终产生一个输出值。然后将此输出与期望（实际）输出进行比较，并计算误差。\n\
    \n#### 反向传播\n\n当上述误差逐层通过网络反向传播时，就会发生`反向传播`，并且权重会根据其对误差的贡献程度进行更新。\n\n该过程反复调整权重，以最小化实际输出与期望输出之间的差异，并对训练数据中的所有行/样本重复此过程（一个**周期**）。神经网络通常会在多个周期上进行训练，通常以\
    \ 100 个周期为上限。\n\n![](img/527966_1_En_5_Fig26_HTML.jpg)\n\n权重与成本之间的抛物线。它说明了`梯度下降`过程，该过程包含诸如成本导数、增量步长、初始权重、最小成本和梯度等因素。\n\
    \n图 5-26\n\n用于最小化神经网络损失的`梯度下降`过程\n\n### 其他优化算法\n\n在实践中，`随机梯度下降`可能会陷入局部最小值，或者收敛时间过长，因此会使用更复杂的变体来获得更好的模型性能。\n\
    \n#### 带动量的随机梯度下降\n\n正如我们在上一节中看到的，`随机梯度下降`解决了`梯度下降`的一个大内存劣势（加载整个数据集来计算损失导数）。`带动量的随机梯度下降`是对基础`SGD`算法的增强，有助于在正确方向上加速梯度向量，从而加快收敛速度。\n\
    \n#### AdaGrad、Adadelta 和 RMSProp\n\n`SGD`需要手动调整网络的学习率，这可能既慢又繁琐——以下三种算法能更有效地更新网络权重。\n\
    \n`AdaGrad`或`自适应梯度算法`是另一种随机优化方法，它试图通过使学习率适应网络参数（权重）来解决这个问题。\n\n另一方面，`Adadelta`使用指数移动平均学习率，以避免`AdaGrad`中学习率过小/收敛缓慢的问题。\n\
    \n`均方根传播（RMSProp）`与`Adadelta`类似，处理`AdaGrad`中学习率急剧下降的问题，但它还将学习率除以梯度平方的指数衰减平均值。\n\
    \n#### Adam\n\n**Adam**（源自**自适应矩估计**）通常是深度学习中的优化算法选择。为了更快地收敛（使用此算法可能是在几分钟、几天或几个月内获得高质量结果的关键），`Adam`同时使用`动量`来加速随机梯度下降过程，以及`自适应学习率`来在训练阶段降低学习率。\n\
    \n`Adam`结合了`AdaGrad`和`RMSProp`算法的最佳特性，以处理噪声问题上的稀疏梯度。\n\n### 损失函数\n\n在我们继续探讨提高深度学习性能的最佳实践之前，让我们更仔细地研究一下神经网络中“损失”或代价函数的概念。\n\
    \n在深度学习中最小化损失函数等同于最小化训练误差或降低神经网络/权重校准过程的成本。\n\n三种最常见的损失函数是用于二分类的**二元交叉熵**、用于多分类的**稀疏分类交叉熵**以及用于回归的**mse（均方误差）**，但与深度学习中的所有事物一样，存在多种变体，在某些条件下可以提供更好的结果：\n\
    \n表 5-1\n\n损失函数比较\n\n| 损失函数 | 类型 | 描述 | 优点 | 缺点 |\n| --- | --- | --- | --- | ---\
    \ |\n| 平方误差 (L2) 损失 / 均方误差 (MSE) | 回归 | 实际值与预测值之差的平方 | 通过平方来惩罚大误差 | 对异常值不鲁棒 |\n\
    | 绝对误差损失 / 平均绝对误差 (MAE) | 回归 | 预测值与实际值之间的距离 | 与 MSE 相比，对异常值更鲁棒 | 对大误差的惩罚可能不足 |\n\
    | Huber 损失 | 回归 | 结合 MSE 和 MAE - 对于小误差是二次的，否则是线性的 | 比 MSE 对异常值更鲁棒 | 收敛速度较慢 |\n\
    | 二元交叉熵 | 二分类 | 使用对数损失和 Sigmoid 函数 | 非常适合二分类模型 | Sigmoid 可能饱和并导致梯度消失 |\n| 铰链损失\
    \ | 二分类 | 主要用于支持向量机 (SVM) | 惩罚错误预测以及低置信度的正确预测 | 仅限于 SVM 模型 |\n| 多类交叉熵损失 / 分类交叉熵\
    \ | 多分类 | 二元交叉熵损失的推广 | 适用于独热编码的目标变量 | 每个样本应具有多个类别或用软概率标记 |\n| 稀疏分类交叉熵 | 多分类 |\
    \ 分类交叉熵的稀疏目标变量分类版本 | 通过为类别使用单个整数来减少内存和计算开销 | 仅适用于互斥的类别 |\n| KL 散度损失 | 多类交叉熵损失\
    \ | 衡量一个概率分布与另一个概率分布的差异程度 | 基于概率 | 更常用于逼近复杂函数，而非多分类 |\n\n### 提高深度学习性能\n\n上述深度学习模型的内部工作原理有助于理解“引擎盖下”发生的事情，而所描述的用于改进结果的选项在某种程度上是实验性的，与我们所面对的具体数据集以及业务或组织问题密切相关。\n\
    \n然而，如果我们着手提高神经网络性能，应该从哪里开始呢？我们应该采用最佳实践方法，几乎总是从（并以）审查底层数据开始：^(⁷⁷)\n\n1.  审查数据\n\
    \    *   创造更多数据\n    *   重新缩放数据\n    *   转换数据\n    *   特征选择\n2.  引入更复杂的算法\n3.\
    \  调整超参数\n4.  尝试算法集成\n5.  获取更多数据\n\n除了这些实现更高模型性能的核心原则外，还应在模型维护中内置定期重构，以确保代码尽可能高效，并且（Python）库和函数未被弃用。\n\
    \n### 深度学习最佳实践 – 超参数\n\n上述高级步骤具有参考价值，但在数据审查过程用尽之后，我们具体可以使用哪些超参数来调整和校准模型输出呢？下面我们将这些超参数分为两类：网络调整和过程调整。^(⁷⁸)\n\
    \n#### 网络调整\n\n##### 更深的网络/更多层/更多神经元\n\n添加更多隐藏层/每层更多神经元意味着我们向模型添加了更多参数，从而使模型能够拟合更复杂的函数。\n\
    \n##### 激活函数\n\n如上所述，通常在**CNN**中，外层使用`ReLU`来解决梯度消失问题，并结合`Sigmoid`（二分类）或`Softmax`（多分类）。对于`RNN`，使用`tanh`来克服梯度消失问题，因为它的二阶导数可以在归零之前维持较长的范围。\n"
- fmt: "### Neural Network Ensembles\n\nIn much the same way that a random forests\
    \ is an enhancement of a decision tree model to prevent overfitting in machine\
    \ learning, we can use ensemble methods in deep learning - different neural networks\
    \ with different model configurations to prevent the same issue. However, this\
    \ does come at the computational expense of training and maintaining multiple\
    \ models. A better approach is to use dropout as described in the section below.\n\
    \n### Batch Normalization\n\nThe deep neural networks training process is also\
    \ sensitive to the initial random weights and configuration of the learning algorithm.\
    \ Normalization of the layers' inputs (`batch normalization`) can help to make\
    \ artificial neural networks faster and more stable by recentering and rescaling\
    \ of the data.\n\n### Pooling\n\nMultiple convolutional layers in a CNN can be\
    \ very effective, learning both low-level features (e.g., lines) and higher-order\
    \ features, like shapes or specific objects in the outer layers.\n\nHowever, these\
    \ “feature maps” are tied to the EXACT position of features in the input. This\
    \ “inflexibility” can result in different feature maps for minor image changes\
    \ such as cropping, rotation, shifting, and a resultant loss in model generalization\
    \ to new data.\n\nPooling (implemented using pooling layers) is used to down sample\
    \ convolutional layers in a CNN and avoid overfitting to exact/precise image features.\
    \ This lower-resolution version of an input signal which retains only important\
    \ structural elements is similar to the effect of “pruning a decision tree” in\
    \ machine learning.\n\n### Image Augmentation\n\nImage data augmentation is used\
    \ to artificially expand the size of a training dataset for Convolutional Neural\
    \ Networks. The idea is that training on more data means a more skillful model.\
    \ Using the `ImageDataGenerator` class in Keras to generate batches of augmented\
    \ images, we can achieve this in a number of ways:\n\n*   Random rotation of the\
    \ image\n*   Shifting the objects within the images\n*   Shear (distortion along\
    \ an axis)\n*   Flipping the image (e.g., upside down)\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig27_HTML.jpg)\n\
    \nAn augmented image of a cat with 8 image datasets that comprise rotated, offset,\
    \ and distorted copies of the original image.\n\n**Figure 5-27** Image Augmentation\
    \ in Keras to augment an image datasets with rotated, offset, or distorted copies\
    \ of the original image\n\n## Process Tuning\n\n### Number of Epochs and Batch\
    \ Size\n\nIncreasing the number of epochs (a complete sampling of the entire training\
    \ set) will generally produce better performance, but only up to a point. Evidence\
    \ of validation (test) accuracy decreasing even when training accuracy is increasing\
    \ should put an upper limit on the number of epochs, otherwise we are essentially\
    \ overfitting our model. Rather than trial and error, we can control setting the\
    \ number of epochs at too high a level by implementing early stopping criteria\
    \ to avoid overfitting on the training set.\n\nOur batch size – the size of the\
    \ input data sample used in a forward pass is another lever we have at our disposal.\
    \ Using too large a batch size can have a negative effect on generalization, that\
    \ is, the test accuracy of the network is worse as we have reduced the stochasticity\
    \ (randomness) of gradient descent during the training process. A rule of thumb\
    \ for largish datasets (e.g., > 10,000 images) is to use the default value of\
    \ 32 first, then increase to 64, 128, and 256 if the model is underfit or the\
    \ training time is onerous.\n\n### Learning Rate\n\nLearning rate is a hyperparameter\
    \ used to impact the speed of the gradient descent process. Setting this too high\
    \ can mean the algorithm will bounce back and forth without reaching a local minimum,\
    \ while too low and convergence can take some time.\n\n### Regularization\n\n\
    Regularization is a general technique to modify the learning algorithm such that\
    \ the model generalizes better, that is, avoids overfitting. In machine learning\
    \ regularization penalizes feature coefficients while in deep learning regularization\
    \ penalizes the weight matrices of the nodes/neurons.\n\nA regularization coefficient\
    \ (a hyperparameter) controls regularization – we get underfitting if this regularization\
    \ coefficient is so high that some of the weight matrices are nearly equal to\
    \ zero. L1 and L2 are the most basic types of regularization, updating the general\
    \ cost function by adding another term known as the regularization term:\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig28_HTML.jpg)\n\
    \nA diagram illustrates appropriate model fitting. It has a side parabola formed\
    \ between the y and x axis.\n\n**Figure 5-28** Appropriate model fitting\n\n`Cost\
    \ function = Loss + Regularization term`\n\n### Dropout\n\nDeep learning neural\
    \ networks are prone to overfitting when datasets are relatively small. Dropout\
    \ is a computationally cheap and effective regularization method to reduce overfitting\
    \ and improve generalization error. In effect, dropout simulates in a single model\
    \ a large number of different network architectures by randomly dropping out nodes\
    \ (neurons) during training.^([^(79)](#fn79))\n\nA good starting point for dropout\
    \ is to set this @ 20% and increase to, for example, 50% if the model impact is\
    \ minimal. Too high will result in under-fitting.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig29_HTML.jpg)\n\
    \nTwo model diagrams illustrate dropouts. Standard neural net and standard neural\
    \ net after applying dropout. The standard neural net has the same neurons or\
    \ nodes while after applying dropout the green neurons mix with red neurons.\n\
    \n**Figure 5-29** Illustration of Dropout ([`medium.com`](http://medium.com))\n\
    \n### Early Stopping\n\nWe should stop training at the point when performance\
    \ on a validation dataset starts to degrade, for example, by:\n\n*   No change\
    \ in metric over a given number of epochs\n*   An absolute change in a metric\n\
    *   A decrease in performance observed over a given number of epochs\n*   Average\
    \ change in metric over a given number of epochs\n\nThis is implemented in Keras\
    \ using the `EarlyStopping` function. The below example monitors and seeks to\
    \ minimize validation loss across epochs:\n\n```\nEarlyStopping(monitor='val_loss',\
    \ mode='min')\n```\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig30_HTML.jpg)\n\
    \nA line graph between a number of epochs and errors. The line graph rises upwards\
    \ after stopping training.\n\n**Figure 5-30** EarlyStopping in Keras\n\n### Transfer\
    \ Learning\n\nTransfer learning is actually an “accelerator” for deep learning\
    \ model – essentially we are taking a pretrained model as a starting point for\
    \ another (different, but related) model. Popular in Deep Learning to reduce the\
    \ computation required to develop neural network models from scratch, there are\
    \ a number of research models often used for transfer learning:\n\n*   Oxford\
    \ VGG Model\n*   Google Inception Model\n*   Microsoft ResNet Model\n    *   See\
    \ also [`https://github.com/BVLC/caffe/wiki/Model-Zoo`](https://github.com/BVLC/caffe/wiki/Model-Zoo)\n\
    \nThe VGG model is used in the Transfer Learning exercise in our Hands-On lab\
    \ above ([Convolutional Neural Networks with Keras & TensorFlow](#527966_1_En_5_Chapter.xhtml#Sec47))."
