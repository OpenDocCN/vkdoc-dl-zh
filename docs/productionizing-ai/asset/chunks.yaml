    \ many AI applications rely on AWS’s breadth of supporting infrastructure, from\
    \ Simple Storage Service (S3) cloud storage to Elastic Compute (EC2) instances,\
    \ Elastic MapReduce (EMR) – managed clusters for running Apache Spark, Redshift\
    \ – AWS’s cloud data warehouse, Lambda – serverless compute for processing events\
    \ and Kinesis for real-time streaming.\n\nHowever despite appearances, AWS’s “free\
    \ tier” isn’t completely free. AWS products can be *“explored” for free*, *some*\
    \ products are free and some are *free for a limited period*. Almost all have\
    \ capacity/usage limits.\n\n#### Azure\n\nThe strength of Microsoft’s Azure AI\
    \ platform lies in API access to key Azure cloud services and an impressive list\
    \ of clients from Airbus, NHS, Nestle, and the BBC.\n\nUsing Azure SDKs, simple\
    \ API calls from Jupyter Notebook and Visual Studio Code enable integration with\
    \ underlying Python code and sklearn machine learning and TensorFlow/PyTorch deep\
    \ learning models.\n\nAzure SDKs also enable access to Azure Machine Learning,\
    \ with scaling via Azure Kubernetes Service (AKS), Azure Databricks (with Apache\
    \ Spark support), and high-quality vision, speech, language, and decision-making\
    \ models in Azure Cognitive Services including Anomaly Detector, Content Moderator,\
    \ LUIS and QnA Maker (knowledge-based chatbots/conversational AI), speech to text\
    \ to speech and Computer (prebuilt models) and Custom Vision (build your own models).\n\
    \n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig9_HTML.png)\n\nThe architecture\
    \ of Azure A I. It includes Azure Applied A I services (cloud security model),\
    \ azure cognitive service (customizable A P Is), A I infrastructure and azure\
    \ machine learning (end to end M L platform).\n\nFigure 7-9\n\nAzure AI\n\n####\
    \ GCP\n\nAlthough it's now open source TensorFlow is Google’s child, is still\
    \ developed by Google researchers and is probably still the USP for developing\
    \ on Google Cloud Platform (GCP) for AI projects.\n\nWhen coupled with BigQuery,\
    \ Google’s serverless Data Warehouse, Vertex AI, managed machine learning, and\
    \ Colab for running Jupyter notebooks Google has a wealth of strong products for\
    \ Data Scientists and AI Engineers.\n\nPreviously under the Google AI Platform\
    \ umbrella, Vertex AI is the preferred “managed service” for taking sandbox machine\
    \ learning models into production and includes Cloud AutoML high-quality low-code\
    \ models with state-of-the-art transfer learning. It also supports Deep Learning\
    \ containers and sharing of code from the centralized repos and ML pipelines on\
    \ Google AI Hub.\n\nThe same ML pipelines on AI Hub can be deployed to highly\
    \ scalable and portable Kubeflow pipelines based on Docker.\n\nThe Google Natural\
    \ Language API provides app integration with Google NLP models while Dialogflow\
    \ is used to integrate chatbots and IVAs into mobile and web apps."
  trans: "\n### AI 加速器 - GPU：动手实践\n\n#### COLAB GPU 性能测试\n\n本节的最后一个实验比较了大数据管道的运行时间——具体来说，是从\
    \ Kaggle 直接下载 zip 文件然后解压所需的时间。\n\n1.  从 Kaggle 获取 API 密钥（`kaggle.json` 文件），或使用第\
    \ 4 章和第 5 章实验中使用的相同密钥。\n2.  现在，从下面的 GitHub 链接下载 Python 脚本 `GPU_test.ipynb`，并在\
    \ Colab 中打开：\n    [`https://github.com/bw-cetech/apress-7.1c.git`](https://github.com/bw-cetech/apress-7.1c.git)\n\
    3.  将你的 `kaggle.json` 文件拖放到 Colab 默认的（`content`）文件夹中。\n4.  运行 Colab 笔记本，将 `json`\
    \ 文件复制到根目录下的 `.kaggle` 文件夹。\n5.  直接连接 Kaggle 上的一个大数据集——给出的示例将下载一个包含 50,000 张图片、大小为\
    \ 350 MB 的数据集。首先使用标准（无硬件加速器/CPU）运行时进行此操作，并记录所需时间。\n6.  将图片解压到一个 `review` 文件夹——仍然使用标准运行时，并记录所需时间。\n\
    7.  完成后（如果耗时过长，可中断代码后），将 `运行时` 类型设置为 `GPU`，重复上述步骤 5 和 6。将这两个步骤在 GPU 运行时下的耗时与标准运行时进行比较。\n\
    \n**注意** 尽管本实验侧重于数据导入过程，但相同的并行处理效率也适用于机器学习和深度学习，在训练和部署模型时可大幅节省运行时间。\n\n1.  练习——首先使用本地运行时，然后使用\
    \ GPU 运行上述 GitHub 链接中的另一个 Python 笔记本 `Autoencoders.ipynb`。验证使用 GPU 时模型训练时间是否显著缩短。\n\
    \n### AI 开发的软件与工具\n\n基于第一部分的内容，我们现在来探讨实际的 AI 应用/软件开发，比较主要的云供应商及其可用于支持 AI 项目和基础设施的工具与服务，开发特定行业的用例和解决方案，最终成功部署应用程序。\n\
    \n### AI 需要数据与云\n\n云对于 AI 应用集成以及数据为应用提供支持的重要性不容低估。虽然云是 AI 的关键推动因素，但只有当数据策略建立在丰富、海量的数据源和/或训练数据之上时，云才能为\
    \ AI 发挥作用。\n\n如今成功的数据项目都已（企业级）AI 化，需要端到端的云基础设施，特别是存储和计算，作为大数据处理的主要云组件。\n\n虽然企业级机器学习项目可以在两者上以较低的开销运行，但深度学习项目则不能。\n\
    \n如下文所述，所有主要的云服务提供商都提供了一系列 AI 服务和工具，极大地简化了构建应用程序的过程。但必须注意隐藏的成本。^(¹⁰⁹) AWS、Azure\
    \ 和 GCP 这三大巨头最近已尝试让定价模式更加透明，但任何希望在缺乏企业预算支持的情况下进行实验的人显然都处于不利地位。\n\n![](img/527966_1_En_7_Fig8_HTML.jpg)\n\
    \n一组三张表格描绘了大规模洞察交付。其中包括 IDC 市场、基于决策管理、数据文化与素养、领域洞察等的未来智能软件工具。\n\n图 7-8\nIDC 市场概览——智能的未来\n\
    \n![](img/527966_1_En_7_Fig7_HTML.jpg)\n\n一幅插图描绘了 Forrester 浪潮云数据仓库。它包括挑战者、竞争者、强劲表现者和领导者，并揭示了更强的战略、市场占有率以及更强和更弱的现有产品。\n\
    \n图 7-7\nForrester 浪潮——领先的云数据仓库\n\n![](img/527966_1_En_7_Fig6_HTML.jpg)\n\n一幅插图描绘了\
    \ Gartner 魔力象限，包含执行能力和愿景完整性。它包括：1. 挑战者；2. 领导者（微软、谷歌、IBM）；3. 利基市场参与者；4. 远见者。\n\n\
    图 7-6\nGartner 魔力象限——领先的云服务提供商\n\n### 云平台\n\n业界对领先的云平台已有普遍共识，但我们现在将进一步深入探讨每个平台提供的主要服务和资源，从亚马逊云服务开始。\n\
    \n#### AWS\n\nAWS 声称提供最广泛、最深入的机器学习服务和配套云基础设施。`SageMaker` 是数据科学的主要工具，因其在机器学习方面的可扩展性；而在\
    \ NLP 方面，AWS 还提供 Amazon Polly（文本转语音）和 Lex（聊天机器人）。\n\n从使用 AWS 的客户名单（如西门子、FICO、F1、普华永道和\
    \ Netflix）中可以明显看出，AWS 拥有强大的 AI 行业用例集，包括文档处理、欺诈检测和预测。\n\n作为全球最大的云服务提供商，许多 AI 应用依赖\
    \ AWS 广泛的支持基础设施，从简单存储服务（`S3`）云存储到弹性计算（`EC2`）实例、弹性 MapReduce（`EMR`）——用于运行 Apache\
    \ Spark 的托管集群、`Redshift`——AWS 的云数据仓库、`Lambda`——用于处理事件的无服务器计算，以及用于实时流式传输的 `Kinesis`。\n\
    \n然而，尽管表面如此，AWS 的“免费套餐”并非完全免费。AWS 产品可以*“免费探索”*，*部分*产品是免费的，有些则*在限定时间内免费*。几乎所有产品都有容量/使用限制。\n\
    \n#### Azure\n\n微软 Azure AI 平台的优势在于对关键 Azure 云服务的 API 访问，以及令人印象深刻的客户名单，包括空客、英国国家医疗服务体系、雀巢和英国广播公司。\n\
    \n使用 Azure SDK，通过 Jupyter Notebook 和 Visual Studio Code 进行简单的 API 调用，即可与底层 Python\
    \ 代码、`sklearn` 机器学习以及 `TensorFlow`/`PyTorch` 深度学习模型集成。\n\nAzure SDK 还支持访问 Azure\
    \ 机器学习，并通过 Azure Kubernetes 服务（`AKS`）、Azure Databricks（支持 Apache Spark）以及 Azure\
    \ 认知服务中的高质量视觉、语音、语言和决策模型（包括异常检测器、内容审查器、`LUIS` 和 `QnA Maker`（基于知识的聊天机器人/对话式 AI）、语音转文本/文本转语音以及计算机视觉（预构建模型）和自定义视觉（构建自己的模型）进行扩展。\n\
    \n![](img/527966_1_En_7_Fig9_HTML.png)\n\nAzure AI 架构。它包括 Azure 应用 AI 服务（云安全模型）、Azure\
    \ 认知服务（可定制的 API）、AI 基础设施和 Azure 机器学习（端到端 ML 平台）。\n\n图 7-9\nAzure AI\n\n#### GCP\n\
    \n尽管 `TensorFlow` 现已开源，但它仍是谷歌的“亲儿子”，仍由谷歌研究人员开发，并且可能仍然是谷歌云平台（`GCP`）上开发 AI 项目的独特卖点。\n\
    \n当与 `BigQuery`（谷歌的无服务器数据仓库）、`Vertex AI`（托管机器学习）以及用于运行 Jupyter 笔记本的 `Colab` 结合使用时，谷歌为数据科学家和\
    \ AI 工程师提供了大量强大的产品。\n\n`Vertex AI` 以前隶属于谷歌 AI 平台，是将沙盒机器学习模型投入生产的首选“托管服务”，包括 Cloud\
    \ `AutoML`（高质量低代码模型，采用最先进的迁移学习）。它还支持深度学习容器，以及从中央仓库和 Google AI Hub 上的 ML 流水线共享代码。\n\
    \nAI Hub 上的相同 ML 流水线可以部署到基于 Docker 的高度可扩展且可移植的 `Kubeflow` 流水线上。\n\nGoogle 自然语言\
    \ API 提供与 Google NLP 模型的应用集成，而 `Dialogflow` 则用于将聊天机器人和智能虚拟助手集成到移动和 Web 应用中。\n"
- fmt: '#### IBM Cloud


    While IBM may no longer be in the top tier of Big Tech companies, and `IBM Cloud`
    lies outside the “Big 3” cloud offerings, there is no doubt that the company continues
    to lead in terms of innovation, often rolling out new developments and services
    before mainstream catches on.


    IBM’s `Watson` platform has pioneered Commercial AI since winning the "Jeopardy!”
    quiz show in 2011 and continues to drive IBM’s current suite of AI services provisioned
    on `IBM Cloud`. The main tools are shown below:


    - `WATSON Studio` – Data Science platform

    - `WATSON Assistant` – Chatbots/IVAs

    - `WATSON Discovery` – Enterprise AI search

    - `WATSON Knowledge Studio` – domain-specific NLP curation


    More recently, `IBM Cloud Pak® for Data` (`CPDaaS`) has become IBM’s go-to business
    data and AI platform-in-a-box, “infusing” applications with AI while automating
    (`AutoAI`) and governing data and the AI lifecycle.


    `Cloud Pak` is a one-stop shop for collecting, organizing, and analyzing data
    assets for undertaking machine and deep learning. Composed of integrated microservices
    benefitting from running on a multinode `Red Hat® OpenShift®` cluster, `Cloud
    Pak` provides open and extensible `REST APIs`, support for hybrid cloud and on-prem
    resources and elastic resource management with “minimal” downtime.


    #### Heroku


    One of the first cloud platforms, `Heroku` is now owned by `Salesforce`. Lesser
    known but one of our favorites in terms of simplicity and elegance, apps can be
    deployed, managed, and scaled on cloud much like the other leading platforms.


    In our opinion, it is the most cost-effective cloud for quick application deployment.
    The Free Plan doesn’t force users/developers to spend credits on enabling tools
    for machine/deep learning, provided you limit monthly usage. `Azure VMs` and `AWS
    SageMaker`, for example, are not free, but you can deploy an ML/DL app on `Heroku`
    for free.


    Scaling models is also intuitive – with a simple “pay as you go” option for app
    monthly uptime. The hosting models are done through `Heroku` `dynos` – building
    blocks that underpin/power `Heroku` apps. Essentially these are containers, but
    each dyno type comes with a specific number of cluster workers (free/hobby dyno
    1 cluster, standard 2 clusters, medium-performance 5 clusters, high-performance
    28 clusters).


    `Heroku` brings to a close the main cloud platforms available to build an AI solution.
    The remainder of this section looks at front-ending these solutions with Python-based
    user interfaces.^([^(110)](#fn110))


    ### Python-Based UIs


    We address three main Python frameworks for creating web apps below. We will take
    a look at another, `Streamlit`, in Chapter [9](#527966_1_En_9_Chapter.xhtml) which
    uses a simple API, supports interactive widgets defined as Python variables, and
    deploys pretty quickly.^([^(111)](#fn111))


    #### Flask


    `Flask` is a micro web framework written in Python.


    Simple, self-contained but scalable code, mostly suited for single-page applications,
    `SQLAlchemy` can be used for database connectivity and `Flask` comes with a wider
    range of database support (such as NoSQL) than `Django` (discussed below).


    As we will see in the hands-on lab that follows this section, after installing
    Python for standalone scripting together with `Visual Studio Code`, the recommended
    workflow is to clone a flask app from GitHub, `cd` into the local copy of the
    app and create a virtual environment with


    ```

    python -m venv env

    env\Scripts\Activate

    ```


    `Flask` is then installed within the virtual environment in the normal way, that
    is,


    ```

    pip install flask

    ```


    #### Dash


    `Dash` converts Python scripts to production-grade business apps. Filling a perceived
    **Predictive Analytics gap** in Traditional BI/Tableau/PowerBI/Looker dashboards,
    `Dash` supports complex Python analytics /BI and is written on top of `Flask`,
    `Plotly.js`, and `React.js`.


    `Dash` also provides a “point-and-click interface” to Machine Learning and Deep
    Learning models, greatly simplifying the process of front-ending AI apps with,
    for example, object detection and NLP user interfaces (e.g., chatbots).


    The `pip install dash` command will also install a number of other tools:^([^(112)](#fn112))


    - `dash_html_components`

    - `dash_core_components`

    - `dash_table`

    - `plotly` graphing library


    The attraction of `Dash` is in the potential to quickly wrap a user interface
    Python code; it does this via a file structure of four files with html-like elements:


    - **Layouts** – describe how the dashboard will look

    - **Components** – Components make up a layout, comprising `dash_core_components`
    and `dash_html_components`

    - **Callbacks** – control the interactivity of a dash app

    - **Bootstrap** – prebuilt CSS Framework for creating interactive and mobile-ready
    applications


    ![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig10_HTML.jpg)


    A screen displays the control charts dashboard with I O T streaming data alerts.
    It includes a process control metrics summary, a live S P C chart, and a pie chart
    on O O C percentages per parameter.


    **Figure 7-10** Dash UI for IoT streaming data alerts


    #### Django


    Used by Facebook, Instagram, and Netflix, `Django` is designed to make it easier
    to build better Web apps more quickly and with less code. Like `Flask`, `Django`
    is a high-level Python Web framework for rapid development of web apps, but in
    contrast these apps tend to be full-scale and more powerful than simpler `Flask`
    limited-page apps.


    `Django` is free and open source and has a “batteries-included” framework with
    most of the features preinstalled. It comes with automated tools to avoid repetitive
    tasks and a clean and “pragmatic” design which takes care of much of the hassle
    of Web development with a simplified three-step process for making model changes:


    - Change models in `models.py`

    - Run `python manage.py makemigrations` to create migrations for changes

    - Run `python manage.py migrate` to apply those changes to the underlying database


    ### Other AI Software Vendors


    We take a final look in this section at some of the other AI software vendors
    that in their own way can support AI application building.


    #### ONNX (Open Neural Network Exchange)


    `ONNX` is an open-source model format and runtime for machine learning with a
    platform-agnostic design facilitating moving between different frameworks and
    hardware platforms. Its attraction in an age of Big Tech dominance/consolidation
    is its community model and interoperability.


    #### C3


    `C3` is an AI and IoT software provider for building enterprise-scale AI applications.
    It offers out-the-box/prebuilt, industry-specific AI applications to optimize
    critical processes – `C3` claims to run 4.8 million AI models and 1.5 billion
    predictions per day.


    #### DataRobot


    `DataRobot`’s entire business model (and USP) is MLOps automation and “accelerating
    data to value.” The product targets less technical users, for example, Business
    Analysts looking to build predictive analytics with no knowledge of Machine Learning.


    We now move onto have a look at three of the tools covered above in our hands-on
    labs for this section.'
