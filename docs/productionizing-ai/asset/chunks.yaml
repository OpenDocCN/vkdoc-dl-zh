  trans: "\n### TPOT\n\n`TPOT`（基于树的流水线优化工具）采用基于树的结构/遗传编程来优化机器学习流水线，旨在数小时内完成大规模数据集的训练。`TPOT`\
    \ API 支持监督分类和回归任务，如图 6-4 所示，在迭代训练、测试和递归特征消除之前，会进行数据整理和主成分分析，最终得出得分最高的流水线。\n\n\
    ![](img/527966_1_En_6_Fig4_HTML.jpg)\n\n`TPOT` 操作的树状结构。它从整个数据集开始，依次进行多项式特征、主成分分析、特征组合、递归特征消除和随机森林分类器。\n\
    \n图 6-4\n\n`TPOT` 操作（来源：towardsdatascience）\n\n`pipeline_optimizer` 变量中使用的 `generations`\
    \ 参数是运行流水线优化过程的迭代次数——虽然可以相对较快地获得一个不错的流水线（和机器学习模型），但需要更多代来确保获得性能最佳的流水线，尤其是在处理大型数据集时。\n\
    \n### 使用 TPOT 进行 Python 自动化：动手实践\n\n遗传编程自动机器学习\n\n**本实验的目标是使用 TPOT 优化，在合成分类问题上找到性能最佳的流水线和算法。代码示例还展示了如何在\
    \ Python 中自动化实现直接连接、解压和读取网络数据集：**\n\n1.  克隆以下 GitHub 仓库：\n\n    [`https://github.com/bw-cetech/apress-6.3.git`](https://github.com/bw-cetech/apress-6.3.git)\n\
    \n2.  逐步浏览笔记本，直接从 UCI 网站读取数据集，解压文件，并导入较小的 csv 数据集\n\n3.  执行基本的探索性数据分析、数据整理、数据分区，并配置\
    \ K 折交叉验证（步骤 2、3 和 4）\n\n4.  运行 `TPOT` 优化步骤，观察几分钟后开始出现的流水线/模型得分。整个过程不应超过 30 分钟\n\
    \n5.  练习——流水线基于准确率评分——通过其他指标（例如召回率、精确率或 fbeta）评分，检查模型是否具有良好的类别区分度（即模型不仅仅预测单一类别）\n\
    \n6.  练习——执行更复杂的数据整理，例如对名义分类变量进行独热编码、改进特征选择和/或特征缩放\n\n7.  打开导出的流水线文件 `tpot_best_model.py`，观察性能最佳的算法及其相关的超参数\n\
    \n8.  练习（进阶）：将数据替换为更大的银行数据集。通过使用 GPU 加速器在 Colab 上执行来加快运行时间，并比较 10 代内的流水线性能\n\n\
    ## AutoAI 工具与平台\n\n现在我们进入本章的主要部分——介绍几个关键的 AutoAI “NoLo” 工具。^(⁹²) 目的是让读者了解这些工具如何凭借其简洁性、高度可视化、可转化性和协作性的独特卖点赢得商业领袖的青睐，并越来越多地被人工智能工程师和数据科学家采用，以适应/实现“企业级”业务目标。\n\
    \n本节以几个动手实验作为结尾，涵盖这些工具在特定人工智能用例中的应用。\n\n### IBM Cloud Pak for Data\n\nIBM Cloud\
    \ Pak for Data 以“数据编织”架构的数据和人工智能平台形式呈现，本质上将多个传统工具（包括 Watson Studio、Decision Optimization\
    \ 和 Watson Assistant）整合到一个平台解决方案中，并在其上添加了 AutoAI。\n\n该产品的“数据编织”支持意味着产品支持多个 API，可访问分布在多云环境（无论是\
    \ IBM Cloud、AWS、Azure 还是 GCP）中的结构化和非结构化数据源。这支撑了该产品的独特卖点——IBM 声称数据编织架构使数据访问速度提高\
    \ 8 倍，同时减少的 ETL 请求使生产力提升 25-65%。此外，还有数据治理方面的好处——由于产品内置的智能数据消除了手动编目的需要，可节省 2700\
    \ 万美元的成本。\n\nAutoAI 是之前内置于 Watson Studio 中的图形化工具，它自动化了人工智能流程——分析数据，发现最适合特定预测建模问题的数据转换、算法和参数设置。^(⁹³)\
    \ 如下所示，这些自动化本质上符合前面描述的四个核心人工智能自动化流程：\n\n![](img/527966_1_En_6_Fig5_HTML.jpg)\n\
    \n人工智能自动化流程图。它从提供结构化文件或数据库中的数据开始，然后准备数据、选择模型类型、生成和排序模型流水线，最后保存和部署模型。\n\n图 6-5\n\
    \nIBM Cloud Pak for Data：AutoAI 自动化\n\nAutoAI 将底层自动化的结果显示为模型候选流水线，并按排行榜排序，供最终用户选择。\n\
    \n![](img/527966_1_En_6_Fig6_HTML.png)\n\n一个窗口屏幕显示流水线排行榜，用于检测流水线排名、准确率、算法和增强功能。屏幕左侧包含一个进度图。\n\
    \n图 6-6\n\nIBM AutoAI – 模型流水线排名\n\n虽然与贝叶斯优化类似，但 AutoAI 实际上使用 `RBfOpt` 作为其全局搜索算法。与将高斯模型拟合到未知目标函数的贝叶斯优化不同，`RBfOpt`\
    \ 拟合径向基函数以找到最大化目标函数的超参数配置。^(⁹⁴)\n\n### Azure 机器学习\n\n回到第 1 章和第 4 章，我们曾了解过 Azure\
    \ 机器学习工作室。微软将在 2024 年弃用这个“经典”界面，并将该工具迁移到 Azure 机器学习。其外观和感觉与最初的“工作室”版本非常相似，但与 Azure\
    \ 增强的云服务集成以及内置的自动化机器学习意味着 Azure ML 在功能上与 IBM Cloud Pak 相当。\n\n微软将 AzureML 定位为用于大规模构建关键业务机器学习模型的企业级服务。该产品具备\
    \ MLOps 模型治理和控制功能，并声称可减少 70% 的模型训练步骤，以及（作为无代码工具有点矛盾的是）减少 90% 的代码行数。\n\n![](img/527966_1_En_6_Fig7_HTML.jpg)\n\
    \n一个窗口屏幕显示微软 Azure 机器学习。它包括一个关于聚合特征重要性的条形图和一个关于特征重要性职业类别被拒绝的折线图。\n\n图 6-7\n\n\
    Azure 机器学习用户界面\n"
- fmt: "### Google Cloud Vertex AI\n\n`Vertex AI` is now Google’s main platform for\
    \ API-driven AI automation. It is part `AutoML` for training models on image,\
    \ tabular, text, and video datasets without writing code and part `AI Platform`\
    \ for running custom training code. Google Teachable Machine, which we will look\
    \ at in a hands-on lab below, is part of Google's `AutoML` platform.\n\nThe entire\
    \ ecosystem of MLOps tools within the `Vertex AI` platform is too broad to mention\
    \ here^([^(95)](#fn95)) but of note is `Vertex AI Pipelines` – a serverless service\
    \ that runs both `TensorFlow Extended`, which we will cover shortly, `Kubeflow`\
    \ pipelines. In keeping with the theme of unified data and machine learning, `Vertex\
    \ AI` also comes with multiple integrations to `BigQuery`^([^(96)](#fn96)).\n\n\
    ![](images/527966_1_En_6_Chapter/527966_1_En_6_Figa_HTML.jpg)\n\nA schematic representation\
    \ of `Vertex AI` pipeline. The steps includes data readiness, feature engineering,\
    \ training H P tuning, model serving, understanding tuning, edge, model monitorizing\
    \ and management.\n\n#### Google Cloud Composer\n\nAs the creator of `TensorFlow`,\
    \ it’s no surprise the scope of Google’s AI automation extends beyond `Vertex\
    \ AI`. `Google Cloud Composer` is a managed version of `Apache Airflow` for orchestrating\
    \ data pipelines. The workflow and GCP architecture consists of `Dataprep` for\
    \ import and wrangling, `Cloud Dataflow` for transforming data, `BigQuery ML`\
    \ for model training, and `Cloud Composer` for pipelining/orchestrating the data.\n\
    \n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig8_HTML.jpg)\n\nA representation\
    \ of `Google Cloud Composer`. 1\\. Import and wrangle. 2. Execute. 3\\. Train\
    \ a linear regression model. 4\\. Automate the complete pipeline. It includes\
    \ a schematic of cloud storage to big query.\n\nFigure 6-8\n\nUsing `Google Cloud\
    \ Dataprep API` to trigger automated wrangling jobs with `Cloud Composer`^([^(97)](#fn97))\n\
    \n### AWS SageMaker Autopilot\n\nLike `Google Vertex AI`, the `Amazon SageMaker`\
    \ stack consists of multiple tools for `AutoML`,^([^(98)](#fn98)) the main ones\
    \ being `Amazon SageMaker Studio`, `Amazon SageMaker Autopilot`, and `SageMaker\
    \ Data Wrangler`.\n\n`Amazon SageMaker Studio` comes with recommended models which\
    \ can be used as building blocks for customization while `Autopilot` simplifies\
    \ the ML model build process after `Data Wrangler` performs the necessary wrangling\
    \ tasks such as automatically populating missing data, displaying column stats,\
    \ encoding nonnumeric columns, and extracting date and time fields.\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Figb_HTML.jpg)\n\
    \nAn export PDF report depicts a horizontal bar chart on aggregate SHAP value\
    \ for each feature across all instances of the data. It includes plan type, customer\
    \ service rating, base fee, et cetera.\n\n### TensorFlow Extended (TFX)\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Figc_HTML.png)\n\
    \nA representation of `TensorFlow Extended (TFX)` logo model.\n\nOur final `AutoML`\
    \ tool mentioned in this section goes to `TFX`. Although developed by Google,\
    \ `TensorFlow Extended (TFX)` is an open source tool and considered here in its\
    \ own right. Built for scalable, high-performance ML Production Pipelines/deployment,\
    \ `TFX` extends `TensorFlow` execution pipelines and the `tf.data` API to end-to-end\
    \ MLOps.\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig9_HTML.jpg)\n\n\
    An illustration of `TensorFlow Extended` pipeline operation. It includes the following\
    \ steps: ingest and validation data, train and analyze model and deploy in prediction.\n\
    \nFigure 6-9\n\n`TFX` Pipeline operation\n\nSeveral big brands use `TFX`, including\
    \ Spotify (for personalized recommendations) and Twitter (for ranking tweets)\
    \ and although `TFX` is not strictly a no-code tool for AI automation, we will\
    \ take a look at how this works in one of our hands-on labs below.\n\n### Wrap-up\n\
    \nThe above coverage of the main `AutoAI` tools being used today completes this\
    \ chapter. While many strive to incorporate NoLo user interfaces to ensure stakeholder\
    \ engagement extends beyond data team silos, the need for many of these applications\
    \ to support model customization with Python remains. In the next chapter, we\
    \ will turn our attention to developing AI applications – specifically taking\
    \ back-end models beyond simple scripts to front-ended “full-stack” solutions.\n\
    \n### AutoAI with IBM Cloud Pak for Data: Hands-on Practice\n\nAUTOAI FOR PREDICTING\
    \ CREDIT LOAN DEFAULTS\n\n**We now proceed to have a look at our AutoAI tools\
    \ – first up is IBM Cloud Pak where we will run an AutoAI experiment for predicting\
    \ customers likely to default on loans:**\n\n1.  Download lab assets from `https://ibm.github.io/ddc-2021-development-to-production/setup/`\n\
    \n2.  Sign up/log in to IBM Cloud Pak at the link below\n\n    `https://dataplatform.cloud.ibm.com`\n\
    \n3.  Set up your CloudPak environment\n\n4.  We need to provision `WATSON Studio`\
    \ – add a Machine Learning service then Create a Project and Deployment Space\n\
    \n5.  Run `AutoAI` to select features/choose best algo to predict customers at\
    \ highest risk of credit loan defaults\n\n6.  Deploy your best scoring model\n\
    \n7.  Create and test an online endpoint\n\n8.  Exercise – create and test also\
    \ a batch endpoint where several customer records are entered as a batch and predictions\
    \ returned for all of them\n\n9.  Exercise (stretch) – try to integrate your deployed\
    \ model with a sample (`Flask`^([^(99)](#fn99))) application\n    1.  copy `.env`\
    \ file\n    2.  add API key and endpoint\n    3.  install and initialize virtual\
    \ environment, install dependencies\n    4.  run app locally on your machine\n\
    \    5.  test app\n\n10.  **NB make sure to stop your environment runtime after**\
    \ use by following the instructions \"Stop the Environment\" here:\n\n    `https://ibm.github.io/ddc-2021-development-to-production/ml-model-deployment/batch-model-deployment/`\n\
    \n### Healthcare diagnostics with Google Teachable Machines: Hands-on Practice\n\
    \nNO-CODE ML – XRAY IMAGE CLASSIFICATION\n\n**This lab takes a look at how** `Google\
    \ Teachable Machines` **operates by loading in xray images from Kaggle and training\
    \ a predictive model to detect health issues from the scans (in this case pneumonia).**\n\
    \n**See also** `https://towardsdatascience.com/build-a-machine-learning-app-in-less-than-an-hour-300d97f0b620`\
    \ **for reference:**\n\n1.  Download training images from Kaggle at the link below\n\
    \n    `www.kaggle.com/datasets/paultimothymooney/chest-xray-pneumonia`\n\nNote\
    \ this is a large 2GB dataset so may take several minutes to download.\n\n1. \
    \ Unzip the images in your local drive – this should complete in < 5 minutes.\n\
    \n2.  Go to the url `https://teachablemachine.withgoogle.com/train/image` to train\
    \ images on Google Teachable Machines:\n\n3.  Upload normal xray scans from the\
    \ unzipped training folder to Class 1 on Teachable Machines, upload the pneumonia\
    \ cases to Class 2\\. Note that the xrays with pneumonia have areas of “abnormal\
    \ opacification” – the xray is more “opaque”/less transparent\n\n4.  Select “Train\
    \ Model,” changing Batch Size from 16 to 128 to speed up the training process\n\
    \n5.  Test the model on completion using images from the test set in the unzipped\
    \ image folder\n\n6.  Export the model, choosing `TensorFlow` and `Keras`. We\
    \ will need this in a later lab^([^(100)](#fn100))"
  raw: "### Google Cloud Vertex AI\n\nVertex AI is now Google’s main platform for\
    \ API-driven AI automation. It is part **AutoML** for training models on image,\
    \ tabular, text, and video datasets without writing code and part **AI Platform**\
    \ for running custom training code. Google Teachable Machine, which we will look\
    \ at in a hands-on lab below, is part of Google's AutoML platform.\n\nThe entire\
    \ ecosystem of MLOps tools within the Vertex AI platform is too broad to mention\
    \ here^([^(95)](#fn95)) but of note is **Vertex AI Pipelines** – a serverless\
    \ service that runs both TensorFlow Extended, which we will cover shortly, Kubeflow\
    \ pipelines. In keeping with the theme of unified data and machine learning, Vertex\
    \ AI also comes with multiple integrations to BigQuery^([^(96)](#fn96)).\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Figa_HTML.jpg)\n\
    \nA schematic representation of vertex A I pipeline. The steps includes data readiness,\
    \ feature engineering, training H P tuning, model serving, understanding tuning,\
    \ edge, model monitorizing and management.\n\n#### Google Cloud Composer\n\nAs\
    \ the creator of TensorFlow, it’s no surprise the scope of Google’s AI automation\
    \ extends beyond Vertex AI. Google Cloud Composer is a managed version of Apache\
    \ Airflow for orchestrating data pipelines. The workflow and GCP architecture\
    \ consists of **Dataprep** for import and wrangling, **Cloud Dataflow** for transforming\
    \ data, **BigQuery ML** for model training, and **Cloud Composer** for pipelining/orchestrating\
    \ the data.\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig8_HTML.jpg)\n\
    \nA representation of google cloud composer. 1\\. Import and wrangle. 2. Execute.\
    \ 3\\. Train a linear regression model. 4\\. Automate the complete pipeline. It\
    \ includes a schematic of cloud storage to big query.\n\nFigure 6-8\n\nUsing Google\
    \ Cloud Dataprep API to trigger automated wrangling jobs with Cloud Composer^([^(97)](#fn97))\n\
    \n### AWS SageMaker Autopilot\n\nLike Google Vertex AI, the Amazon SageMaker stack\
    \ consists of multiple tools for AutoML,^([^(98)](#fn98)) the main ones being\
    \ **Amazon SageMaker Studio**, **Amazon SageMaker Autopilot**, and **SageMaker\
    \ Data Wrangler**.\n\nAmazon SageMaker Studio comes with recommended models which\
    \ can be used as building blocks for customization while Autopilot simplifies\
    \ the ML model build process after Data Wrangler performs the necessary wrangling\
    \ tasks such as automatically populating missing data, displaying column stats,\
    \ encoding nonnumeric columns, and extracting date and time fields.\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Figb_HTML.jpg)\n\
    \nAn export P D F report depicts a horizontal bar chart on aggregate S H A P value\
    \ for each feature across all instances of the data. It includes plan type, customer\
    \ service rating, base fee, et cetera.\n\n### TensorFlow Extended (TFX)\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Figc_HTML.png)\n\
    \nA representation of tensor flow extended (T F X) logo model.\n\nOur final AutoML\
    \ tool mentioned in this section goes to TFX. Although developed by Google, TensorFlow\
    \ Extended (TFX) is an open source tool and considered here in its own right.\
    \ Built for scalable, high-performance ML Production Pipelines/deployment, TFX\
    \ extends TensorFlow execution pipelines and the tf.data API to end-to-end MLOps.\n\
    \n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig9_HTML.jpg)\n\nAn illustration\
    \ of tensor flow extended pipeline operation. It includes the following steps:\
    \ ingest and validation data, train and analyze model and deploy in prediction.\n\
    \nFigure 6-9\n\nTFX Pipeline operation\n\nSeveral big brands use TFX, including\
    \ Spotify (for personalized recommendations) and twitter (for ranking tweets)\
    \ and although TFX is not strictly a no-code tool for AI automation, we will take\
    \ a look at how this works in one of our hands-on labs below.\n\n### Wrap-up\n\
    \nThe above coverage of the main AutoAI tools being used today completes this\
    \ chapter. While many strive to incorporate NoLo user interfaces to ensure stakeholder\
    \ engagement extends beyond data team silos, the need for many of these applications\
    \ to support model customization with Python remains. In the next chapter, we\
    \ will turn our attention to developing AI applications – specifically taking\
    \ back-end models beyond simple scripts to front-ended “full-stack” solutions.\n\
    \n### AutoAI with IBM Cloud Pak for Data: Hands-on Practice\n\nAUTOAI FOR PREDICTING\
    \ CREDIT LOAN DEFAULTS\n\n**We now proceed to have a look at our AutoAI tools\
    \ – first up is IBM Cloud Pak where we will run an AutoAI experiment for predicting\
    \ customers likely to default on loans:**\n\n1.  Download lab assets from [`https://ibm.github.io/ddc-2021-development-to-production/setup/`](https://ibm.github.io/ddc-2021-development-to-production/setup/)\n\
    \n2.  Sign up/log in to IBM Cloud Pak at the link below\n\n    [`https://dataplatform.cloud.ibm.com`](https://dataplatform.cloud.ibm.com)\n\
    \n3.  Set up your CloudPak environment\n\n4.  We need to provision WATSON Studio\
    \ – add a Machine Learning service then Create a Project and Deployment Space\n\
    \n5.  Run AutoAI to select features/choose best algo to predict customers at highest\
    \ risk of credit loan defaults\n\n6.  Deploy your best scoring model\n\n7.  Create\
    \ and test an online endpoint\n\n8.  Exercise – create and test also a batch endpoint\
    \ where several customer records are entered as a batch and predictions returned\
    \ for all of them\n\n9.  Exercise (stretch) – try to integrate your deployed model\
    \ with a sample (Flask^([^(99)](#fn99))) application\n    1.  copy .env file\n\
    \n    2.  add API key and endpoint\n\n    3.  install and initialize virtual environment,\
    \ install dependencies\n\n    4.  run app locally on your machine\n\n    5.  test\
    \ app\n\n10.  **NB make sure to stop your environment runtime after** use by following\
    \ the instructions \"Stop the Environment\" here:\n\n    [`https://ibm.github.io/ddc-2021-development-to-production/ml-model-deployment/batch-model-deployment/`](https://ibm.github.io/ddc-2021-development-to-production/ml-model-deployment/batch-model-deployment/)\n\
    \n### Healthcare diagnostics with Google Teachable Machines: Hands-on Practice\n\
    \nNO-CODE ML – XRAY IMAGE CLASSIFICATION\n\n**This lab takes a look at how** **Google\
    \ Teachable Machines** **operates by loading in xray images from Kaggle and training\
    \ a predictive model to detect health issues from the scans (in this case pneumonia).**\n\
    \n**See also** [**https://towardsdatascience.com/build-a-machine-learning-app-in-less-than-an-hour-300d97f0b620**](https://towardsdatascience.com/build-a-machine-learning-app-in-less-than-an-hour-300d97f0b620)\
    \ **for reference:**\n\n1.  Download training images from Kaggle at the link below\n\
    \n    [`www.kaggle.com/datasets/paultimothymooney/chest-xray-pneumonia`](http://www.kaggle.com/datasets/paultimothymooney/chest-xray-pneumonia)\n\
    \nNote this is a large 2GB dataset so may take several minutes to download.\n\n\
    1.  Unzip the images in your local drive – this should complete in < 5 minutes.\n\
    \n2.  Go to the url [`https://teachablemachine.withgoogle.com/train/image`](https://teachablemachine.withgoogle.com/train/image)\
    \ to train images on Google Teachable Machines:\n\n3.  Upload normal xray scans\
    \ from the unzipped training folder to Class 1 on Teachable Machines, upload the\
    \ pneumonia cases to Class 2\\. Note that the xrays with pneumonia have areas\
    \ of “abnormal opacification” – the xray is more “opaque”/less transparent\n\n\
    4.  Select “Train Model,” changing Batch Size from 16 to 128 to speed up the training\
    \ process\n\n5.  Test the model on completion using images from the test set in\
    \ the unzipped image folder\n\n6.  Export the model, choosing TensorFlow and Keras.\
    \ We will need this in a later lab^([^(100)](#fn100))"
  trans: "\n### Google Cloud Vertex AI\n\n`Vertex AI` 现已成为谷歌用于 API 驱动型 AI 自动化的主要平台。它既包含用于在图像、表格、文本和视频数据集上无需编写代码即可训练模型的\
    \ `AutoML` 部分，也包含用于运行自定义训练代码的 `AI Platform` 部分。我们将在下面的动手实验中看到的 Google Teachable\
    \ Machine，是谷歌 `AutoML` 平台的一部分。\n\n`Vertex AI` 平台内完整的 MLOps 工具生态系统过于庞大，此处无法一一列举^(⁹⁵)，但值得关注的是\
    \ `Vertex AI Pipelines`——一项无服务器服务，可运行我们稍后将介绍的 `TensorFlow Extended` 和 `Kubeflow`\
    \ 管道。秉承统一数据与机器学习的主题，`Vertex AI` 还提供了与 `BigQuery`^(⁹⁶) 的多种集成。\n\n![](img/527966_1_En_6_Figa_HTML.jpg)\n\
    \n`Vertex AI` 管道的示意图。步骤包括数据准备、特征工程、训练超参数调优、模型服务、理解调优、边缘计算、模型监控和管理。\n\n#### Google\
    \ Cloud Composer\n\n作为 `TensorFlow` 的创建者，谷歌的 AI 自动化范围超越 `Vertex AI` 也就不足为奇了。`Google\
    \ Cloud Composer` 是 `Apache Airflow` 的托管版本，用于编排数据管道。其工作流和 GCP 架构包括用于导入和整理的 `Dataprep`、用于数据转换的\
    \ `Cloud Dataflow`、用于模型训练的 `BigQuery ML`，以及用于管道编排数据的 `Cloud Composer`。\n\n![](img/527966_1_En_6_Fig8_HTML.jpg)\n\
    \n`Google Cloud Composer` 的示意图。1. 导入和整理。2. 执行。3. 训练线性回归模型。4. 自动化完整管道。它包括从云存储到\
    \ BigQuery 的示意图。\n\n图 6-8\n\n使用 `Google Cloud Dataprep API` 通过 `Cloud Composer`^(⁹⁷)\
    \ 触发自动化数据整理任务\n\n### AWS SageMaker Autopilot\n\n与 `Google Vertex AI` 类似，`Amazon\
    \ SageMaker` 堆栈包含多个用于 `AutoML`^(⁹⁸) 的工具，主要包括 `Amazon SageMaker Studio`、`Amazon\
    \ SageMaker Autopilot` 和 `SageMaker Data Wrangler`。\n\n`Amazon SageMaker Studio`\
    \ 提供了推荐模型，可用作定制的构建模块；而 `Autopilot` 则在 `Data Wrangler` 执行必要的整理任务（例如自动填充缺失数据、显示列统计信息、编码非数值列以及提取日期和时间字段）后，简化了机器学习模型的构建过程。\n\
    \n![](img/527966_1_En_6_Figb_HTML.jpg)\n\n一份导出的 PDF 报告描绘了一个水平条形图，显示了数据所有实例中每个特征的聚合\
    \ SHAP 值。其中包括计划类型、客户服务评级、基本费用等。\n\n### TensorFlow Extended (TFX)\n\n![](img/527966_1_En_6_Figc_HTML.png)\n\
    \n`TensorFlow Extended (TFX)` 徽标模型的示意图。\n\n我们在本节中提到的最后一个 `AutoML` 工具是 `TFX`。尽管由谷歌开发，`TensorFlow\
    \ Extended (TFX)` 是一个开源工具，在此我们将其视为独立的工具。`TFX` 专为可扩展、高性能的机器学习生产管道/部署而构建，它将 `TensorFlow`\
    \ 执行管道和 `tf.data` API 扩展到端到端的 MLOps。\n\n![](img/527966_1_En_6_Fig9_HTML.jpg)\n\
    \n`TensorFlow Extended` 管道操作的示意图。它包括以下步骤：摄取和验证数据、训练和分析模型，以及部署进行预测。\n\n图 6-9\n\n\
    `TFX` 管道操作\n\n多个知名品牌使用 `TFX`，包括 Spotify（用于个性化推荐）和 Twitter（用于推文排序）。尽管 `TFX` 严格来说并非用于\
    \ AI 自动化的无代码工具，但我们将在下面的一个动手实验中了解其工作原理。\n\n### 总结\n\n以上对当前主要 `AutoAI` 工具的概述为本章节画上了句号。虽然许多工具致力于整合无代码用户界面，以确保利益相关者的参与度超越数据团队孤岛，但其中许多应用程序仍需支持使用\
    \ Python 进行模型定制。在下一章中，我们将把注意力转向开发 AI 应用程序——具体来说，是将后端模型从简单的脚本转变为带有前端的“全栈”解决方案。\n\
    \n### 使用 IBM Cloud Pak for Data 进行 AutoAI：动手实践\n\n用于预测信贷违约的 AUTOAI\n\n**现在我们来看一下我们的\
    \ AutoAI 工具——首先是 IBM Cloud Pak，我们将在其中运行一个 AutoAI 实验，用于预测可能贷款违约的客户：**\n\n1.  从\
    \ `https://ibm.github.io/ddc-2021-development-to-production/setup/` 下载实验资产\n\n\
    2.  通过以下链接注册/登录 IBM Cloud Pak\n\n    `https://dataplatform.cloud.ibm.com`\n\n\
    3.  设置您的 CloudPak 环境\n\n4.  我们需要配置 `WATSON Studio` – 添加一个机器学习服务，然后创建一个项目和部署空间\n\
    \n5.  运行 `AutoAI` 以选择特征/选择最佳算法来预测信用贷款违约风险最高的客户\n\n6.  部署您得分最高的模型\n\n7.  创建并测试一个在线端点\n\
    \n8.  练习 – 同时创建并测试一个批量端点，在该端点中，以批次形式输入多个客户记录，并返回所有记录的预测结果\n\n9.  练习（拓展） – 尝试将您部署的模型与一个示例（`Flask`^(⁹⁹)）应用程序集成\n\
    \    1.  复制 `.env` 文件\n    2.  添加 API 密钥和端点\n    3.  安装并初始化虚拟环境，安装依赖项\n    4.\
    \  在您的本地机器上运行应用程序\n    5.  测试应用程序\n\n10.  **注意：使用后务必按照此处“停止环境”的说明停止您的环境运行时：**\n\
    \n    `https://ibm.github.io/ddc-2021-development-to-production/ml-model-deployment/batch-model-deployment/`\n\
    \n### 使用 Google Teachable Machines 进行医疗诊断：动手实践\n\n无代码机器学习 – X 光图像分类\n\n**本实验通过从\
    \ Kaggle 加载 X 光图像并训练预测模型以从扫描图像中检测健康问题（本例中为肺炎），来了解** `Google Teachable Machines`\
    \ **的运作方式。**\n\n**另请参阅** `https://towardsdatascience.com/build-a-machine-learning-app-in-less-than-an-hour-300d97f0b620`\
    \ **作为参考：**\n\n1.  通过以下链接从 Kaggle 下载训练图像\n\n    `www.kaggle.com/datasets/paultimothymooney/chest-xray-pneumonia`\n\
    \n注意，这是一个 2GB 的大型数据集，下载可能需要几分钟时间。\n\n1.  将图像解压缩到您的本地驱动器 – 这应在 5 分钟内完成。\n\n2. \
    \ 访问网址 `https://teachablemachine.withgoogle.com/train/image` 在 Google Teachable\
    \ Machines 上训练图像：\n\n3.  将解压后的训练文件夹中的正常 X 光扫描图像上传到 Teachable Machines 的类别 1，将肺炎病例上传到类别\
    \ 2。注意，患有肺炎的 X 光片存在“异常不透明”区域——X 光片更“不透明”/透明度更低。\n\n4.  选择“训练模型”，将批量大小从 16 更改为\
    \ 128 以加快训练过程\n\n5.  完成后，使用解压图像文件夹中测试集的图像测试模型\n\n6.  导出模型，选择 `TensorFlow` 和 `Keras`。我们将在后面的实验中用到它^(¹⁰⁰)\n"
- fmt: "# TFX and Vertex AI Pipelines: Hands-on Practice\n\n## AUTODL WITH TFX, KERAS,\
    \ AND VERTEX AI\n\nThis lab is based on the TensorFlow tutorial [www.tensorflow.org/tfx/tutorials/tfx/gcp/vertex_pipelines_simple](http://www.tensorflow.org/tfx/tutorials/tfx/gcp/vertex_pipelines_simple)\
    \ – the goal is to use Google Cloud Vertex Pipelines to automate a TFX pipeline\
    \ for training a deep learning model:\n\n1. Activate your free trial on GCP by\
    \ pressing the blue ACTIVATE button in the top right if you have not already done\
    \ so. You will need to enter credit card details to activate the $300 of free\
    \ GCP credit over three months – take care to monitor usage in your Google Cloud\
    \ Portal^([^(101)](#fn101)) although Google claim they won’t auto-charge when\
    \ credit limits are exhausted.\n\n2. After activating your free trial, go back\
    \ to the Create a Vertex AI dashboard [`https://console.cloud.google.com/vertex-ai`](https://console.cloud.google.com/vertex-ai)\
    \ and create a project. Make note of your project ID.\n\n3. Create a Cloud Storage\
    \ bucket in the region closest to your location by following the four steps here:\
    \ [`https://cloud.google.com/storage/docs/creating-buckets`](https://cloud.google.com/storage/docs/creating-buckets)\n\
    \nMake note of your bucket name and region for step 6b below\n\n4. Enable Vertex\
    \ AI and Cloud Storage APIs by confirming your project, then enabling at the link\
    \ below:\n\n   [`https://console.cloud.google.com/flows/enableapi?apiid=aiplatform.googleapis.com,storage-component.googleapis.com`](https://console.cloud.google.com/flows/enableapi%253Fapiid%253Daiplatform.googleapis.com,storage-component.googleapis.com)\n\
    \n5. Download the notebook from the GitHub repo below and run it in Colab:\n\n\
    \   [`https://github.com/bw-cetech/apress-6.4-tfx-vertex-ai.git`](https://github.com/bw-cetech/apress-6.4-tfx-vertex-ai.git)\n\
    \n6. Run through the notebook steps making sure to restart the runtime after installing\
    \ the dependencies at the start\n   1. Log into your google account from the notebook\n\
    \   2. Set up your variables (`project`, `region`, and `bucket name`)\n   3. Prepare\
    \ the example data from the Palmer Penguins sample dataset\n   4. Create the TFX\
    \ Pipeline\n   5. Run the pipeline on Vertex AI Pipelines\n\n7. The TFX pipeline\
    \ at the end is orchestrated using Vertex Pipelines and Kubeflow V2 dag runner.\
    \ Make sure to click on the link shown in the last cells output to see the pipeline\
    \ job progress in Vertex AI on GCP, or visit the Google Cloud Console: [`https://console.cloud.google.com/`](https://console.cloud.google.com/)\
    \ to see the API requests.\n\n**NB make sure to delete resources on GCP after\
    \ finishing the lab, namely your pipeline run, Colab notebook, Cloud Storage bucket,\
    \ and project**\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig11_HTML.jpg)\n\
    \nA window screen displays the google cloud vertex (TFX pipeline). It includes\
    \ project info, compute engine, google cloud platform status, monitoring, error\
    \ replacing, APIs and resources.\n\nFigure 6-11 Google Cloud Console Vertex/TFX\
    \ Pipeline API calls\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig10_HTML.jpg)\n\
    \nA window screen displays the vertex AI (tensor flow extended) pipeline progress.\
    \ It includes pipeline run analysis with basic information.\n\nFigure 6-10 Vertex\
    \ AI (TFX) Pipeline progress on GCP\n\n# Azure Video Analyzer: Hands-on Practice\n\
    \n## CATEGORIZE AND CATALOGUE VIDEO WITH AZURE VIDEO ANALYZER\n\nAlthough not\
    \ strictly part of Azure Machine Learning, Azure Video Analyzer is part of Azure\
    \ Cognitive Services and exhibits many of the automated features central to AutoML/AutoDL/AutoAI.\
    \ This lab takes a look at automating the cataloging process of video metadata\
    \ and video sections/snippets.\n\n**NB this lab is part of the Microsoft Azure\
    \ AI Engineer certification** [https://docs.microsoft.com/en-us/learn/certifications/azure-ai-engineer/](https://docs.microsoft.com/en-us/learn/certifications/azure-ai-engineer/)\
    \ – **highly recommended for readers interested in cloud-based certification:**\n\
    \n1. Launch the Microsoft Lab below\n\n   [`https://docs.microsoft.com/en-us/learn/modules/analyze-video/5-exercise-video-indexer`](https://docs.microsoft.com/en-us/learn/modules/analyze-video/5-exercise-video-indexer)\n\
    \n2. Login and Launch Virtual Machine\n\n3. Clone the GitHub repo\n\n4. Upload\
    \ Video to Video Analyzer at [`www.videoindexer.ai`](https://www.videoindexer.ai)\
    \ (on your local machine, not the VM) – you will need to login using an Azure\
    \ account (sign up here if not already done: [`https://azure.microsoft.com/en-gb/free/`](https://azure.microsoft.com/en-gb/free/))\n\
