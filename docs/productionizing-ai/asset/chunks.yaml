- fmt: "### Cloud Computing\n\nSo we are concerned with Narrow AI, at least for now,\
    \ and by the time AGI or ASI comes around, if we are to believe Elon Musk, we\
    \ should all hope we are gone.\n\nAs mentioned above, the enabler for this form\
    \ of AI is cloud and successful Narrow AI implementation requires an end-to-end\
    \ Cloud Infrastructure. It is difficult to underestimate the degree to which cloud\
    \ computing is a fundamental requirement for any business in 2022. Growth has\
    \ been explosive with a 33% increase in cloud spend in 2020 driven by intense\
    \ demand to support remote working and learning, ecommerce, content streaming,\
    \ online gaming, and collaboration.\n\n`Storage` and `Compute Power` are the main\
    \ Cloud components used for Big Data handling central to AI. While Enterprise\
    \ Machine Learning projects can run with low overheads on both, Deep Learning\
    \ projects cannot. `Amazon Web Services`, `Azure`, and `Google Cloud Platform`\
    \ are the major (“Big Three”) cloud service providers (or CSPs), with `IBM Cloud`\
    \ and `Heroku` also used.^([^(10)](#fn10)) We will cover hands-on examples of\
    \ all of these in this book. All CSPs provide a catalog of AI services and tools\
    \ which greatly simplify the process of building applications.\n\nWhile cloud\
    \ is the key enabler of AI, cloud computing only really works for Enterprise,\
    \ or production-grade AI if the company’s Data Strategy is underpinned by rich,\
    \ BIG data sources and/or training data.\n\n### CSPs – What Do They Offer ?\n\n\
    Each of the CSPs has clear differentiators over the others. `AWS` has the greatest\
    \ reach, while `Azure` naturally interfaces well with Windows-based systems. `Google\
    \ Cloud Platform` tends to have better support for app-building, as depicted in\
    \ Figure [1-3](#527966_1_En_1_Chapter.xhtml#Fig3).\n\n![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig3_HTML.jpg)\n\
    \nA screenshot describes amazon leading the 200-billion-dollar cloud market. The\
    \ cloud infrastructure market size of 12 months ended June 2022 is 203.5 billion\
    \ dollars.\n\nFigure 1-3\n\nThe leading cloud platforms Q222 (Source: Statista)\n\
    \nSummarized in Figure [1-4](#527966_1_En_1_Chapter.xhtml#Fig4) are some of the\
    \ additional USPs of each of the main cloud platforms.\n\n![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig4_HTML.jpg)\n\
    \nA screenshot describes the U S P s of google cloud platform, Azure, amazon web\
    \ service, I B M WATSON, salesforce of Heroku, Einstein, and S A P.\n\nFigure\
    \ 1-4\n\nUSPs for cloud service providers\n\n### The Wider AI Ecosystem\n\nDespite\
    \ the dominance of the Big Three CSPs, some companies are starting to move away\
    \ or influenced by Consultant/SIs away from Big Tech “lock-in” and toward a platform\
    \ of multivendor, niche AI solutions. These open source, cheaper platforms can\
    \ also be quicker to implement, are more closely coupled with agile delivery models\
    \ (more on this in Chapter [2](#527966_1_En_2_Chapter.xhtml)), and are somewhat\
    \ unburdened by legacy, size, or corporate social responsibility (CSR).\n\n![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig5_HTML.jpg)\n\
    \nA diagram describes the cloud computing market ecosystem. It includes S I S,\
    \ consultants, and managed service providers, C S P s of SaaS, IaaS, and PaaS,\
    \ and Connectivity providers and O E M S.\n\nFigure 1-5\n\nSupporting the wider\
    \ AI Ecosystem – CSPs, Sis, and OEMs\n\n### Full-Stack AI\n\nIt's not all about\
    \ cloud of course. While cloud provides the platform, a whole host of proprietary\
    \ and open-sourced tools are used to implement AI from data engineering tooling\
    \ such as `Apache Kafka` or `AWS Kinesis` to NoSQL databases such as `mongoDB`\
    \ and `AWS DynamoDB` through back-end programming languages like `Python` and\
    \ `Scala`^([^(11)](#fn11)) coupled with model engines like `Apache Spark` and\
    \ front-end BI layers/dashboards like `Dash`, `PowerBI`, and `Google Data Studio`.\n\
    \n![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig6_HTML.jpg)\n\nA screenshot\
    \ explains the full stack A I.\n\nFigure 1-6\n\nFull-Stack AI\n\nWe will be using\
    \ many of the above in our hands-on examples in this book.\n\n### AI Ethics and\
    \ Risk: Issues and Concerns\n\nA final word on this first section in this chapter\
    \ should be reserved for what is rapidly becoming a growing fear in many larger\
    \ organizations today – the ethical use of data and AI to drive business value.\n\
    \nMany problems today stem from overly hyped early years of commercial AI development\
    \ where issues around data bias, model risk, “black-box” auditability, and even\
    \ user consent were largely ignored in order to generate ROI from the outcomes.\n\
    \nFollowing some high-profile cases in the media, there is a negative perception\
    \ that the inherent bias in an AI model coupled with the overreliance on automation\
    \ can discriminate or set poverty traps for the poor. There are in effect two\
    \ main algorithmic “webs” outlined below:\n\n**Credit-reporting algorithms** –\
    \ these affect access to private goods and services like cars, homes, and employment.\
    \ Of concern are potential ethical breaches such as the Apple Card case where\
    \ Goldman Sachs (as the card operator) was investigated by regulators^([^(12)](#fn12))\
    \ for using an AI algorithm that allegedly discriminated against women by granting\
    \ larger credit limits to men.\n\n**Government/public sector agencies** – here\
    \ AI algorithms impact access to public benefits like healthcare, unemployment,\
    \ and child support services. Another recent case in the United States saw UnitedHealth\
    \ investigated by regulators for creating an algorithm with racial basis toward\
    \ white patients over sicker black patients.\n\n### The AI ecosystem: Hands-on\
    \ Practise\n\nAI Ethics and Governance brings to an end our first section in this\
    \ introductory chapter but in order to get to grips with some of the outcomes\
    \ from an AI project, its worthwhile taking a look at an important tool from the\
    \ wider AI ecosystem.\n\nCreating a Covid Dashboard with PowerBI\n\nAll good AI\
    \ solutions require a visualisation / business intelligence (BI) layer to ensures\
    \ solutions are delivered with a compelling dashboard or interface to a dashboard.\
    \ There are many such tools used for this purpose including `AWS QuickSight`,\
    \ `Google Data Studio`, `Cognos`, `Tableau` and `Looker`^([^(13)](#fn13)). Here\
    \ we take a look at `Microsoft PowerBI` – one of the leading BI tools at the moment.\n\
    \n1.  Accept cookies and sign up and download `PowerBI` from the link below:\n\
    \n    `https://powerbi.microsoft.com`\n\n2.  Google “John Hopkins Covid data GitHub”\
    \ to find the latest GitHub data from John Hopkins University. For reference the\
    \ live csv files for confirmed, recovered and mortality cases are at the link\
    \ below:\n\n    `https://github.com/CSSEGISandData/COVID-19/tree/master/csse_covid_19_data/csse_covid_19_time_series`\n\
    \n3.  Open `PowerBI` and Go to `Get Data > Web`. Enter the url for each of the\
    \ three files separately, selecting “Load Data” to import the data to the `PowerBI`\
    \ data model\n\n    NB as the link is to the “live” files, the data shown in the\
    \ visuals below will automatically update each day\n\n4.  Exercise: In the Explorer\
    \ view of `PowerBI` recreate the visuals shown in the example dashboard at the\
    \ link below:\n\n    `https://app.powerbi.com/view?r=eyJrIjoiN2FkNzZlMWQtMmE2OC00NzRiLWI0ZGItNDMzNzZhYTIwYTViIiwidCI6IjhlYTkwMTE5LWUxYzQtNDgyNC05Njk2LTY0NzBjYmZiMjRlNiJ9`\n\
    \n5.  Make sure to create the visuals one by one by:\n    1.  Selecting the correct\
    \ visual (e.g. card, table, bar chart, area chart, tree chart)\n    2.  Dragging\
    \ and dropping the correct dimensions (entities to report on e.g. country) and\
    \ measures (values to report on e.g. confirmed cases)\n    3.  Filter if necessary,\
    \ e.g. on top 10 cases\n    4.  Finally add slicers on date and country to allow\
    \ a user to quickly drill-down into Covid cases by date (window) and country\n\
    \n6.  Exercise (Stretch) – push the finished `PowerBI` report to `PowerBI Service`^([^(14)](#fn14)),\
    \ then proceed to host your dashboard on a public url"
