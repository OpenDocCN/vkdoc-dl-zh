    \ – set up an app routine which automatically re-trains the NLP model each month\
    \ based on the latest user conversations"
  trans: "\n### NLP 2.0\n\n上一节已经讨论了自然语言转换器（Transformer）的无限潜力，但下面我们将关注近期在顶尖（SOTA）NLP\
    \ 技术方面的其他进展，这些技术预计将在不久的将来成为核心的企业级应用。\n\n#### 自然语言生成\n\n自然语言生成是对自然语言的**产生**，而非**解释**。尽管有些原始，但自动补全功能就是\
    \ NLG 的一个例子。\n\n广泛的行业应用案例包括：数字营销内容创作、金融/医疗报告生成、新闻业、电商/零售中的产品标签、旅行信息更新以及客户服务优化。\n\
    \n尽管 NLG 已经存在多年，但 Transformer 日益强大的参数化能力带来了输出质量的巨大提升，尤其是在 AI 生成报告的可信度方面。\n\n谷歌的\
    \ `Smart Compose`、`Arria` 和 `WordSmith` 是支持自然语言生成的三大领先工具^(¹⁹³)，但正如我们将在本章末尾的动手实验中看到的，我们也可以使用\
    \ GPT-3 Transformer 来生成文本，例如根据食材生成菜谱。\n\n#### 辩论\n\n计算讨论、论证和辩论技术的成熟度已达到机器能够可信地与人类辩论的程度。^(¹⁹⁴)\n\
    \nIBM 的 `Project Debater` 被誉为“首个能在复杂话题上与人类辩论的 AI 系统”，它由四个核心模块组成：论点挖掘、论点知识库（AKB）、论点反驳和辩论构建，其中前两个模块为辩论提供内容。^(¹⁹⁵)\
    \ 该工具使用了与 Transformer 内在机制类似的序列到序列和注意力机制，并且在开场演讲等方面，与人类（非专家）演讲及其他 NLP Transformer（如\
    \ GPT-2）相比，获得了良好的评价。\n\n![](img/527966_1_En_10_Fig11_HTML.jpg)\n\n该图展示了“补贴学前教育”的输入，分组进入论点挖掘和知识库。论点知识库通过原则性引导和情感关键词响应，进入反驳模型。这些模型为辩论构建提供基于语料库的、原则性的和反驳性的论点，最终生成演讲。\n\
    \n**图 10-11** IBM Project Debater 系统架构\n\n#### 自动 NLP\n\n自然地，鉴于机器学习和深度学习领域全面自动化的趋势，自动化\
    \ NLP 生命周期中涉及的众多步骤成为了关注焦点。\n\n`Hugging Face` 是该领域的领导者，其 `AutoNLP` 工具集成了 `Hugging\
    \ Face Hub` 中大量的数据集和预训练^(¹⁹⁶)的 SOTA Transformer 模型。`NeuralSpace` 是另一家，它提供多语言支持，可使用\
    \ `AutoNLP` 训练 87 种语言的模型。^(¹⁹⁷)\n\n`auto-nlp` Python 库还在现有 Python NLP 包（如 `spaCy`）之上提供了一个抽象层和低代码功能，其方式与\
    \ `auto-sklearn` 为 `sklearn` 机器学习提供低代码自动化类似。`AutoVIML`（自动变体可解释机器学习）是另一个用于 Auto-NLP\
    \ 的 Python 库，它自动化了预处理、语言分析（词干提取和词形还原等）和向量化步骤。\n\n### 总结\n\n在了解了这些 NLP 趋势之后，我们将通过几个动手实验来完成这最后一章关于自然语言处理的内容，这些实验聚焦于\
    \ 2022 年的一些主流应用和工具。这些实验将带领我们结束这段旅程，并为《使用云和 Python 实现 AI 解决方案的生产化》一书画上一个实际的句号。不过，在最后的几页中，我们还有一些结束语。\n\
    \n本书反复出现的一个主题是实施 AI 时所采用的实验水平，以及有时基于（云）成本的变通方法。并非每家公司都有预算来满足高性能计算实例或高吞吐量、安全存储的成本。当前\
    \ AI 解决方案实施的环境以及市场力量的集中可能意味着这些挑战在未来几年仍将持续，但在最后几页中，我们将探讨可能改变游戏规则的创新，这些创新或许能让更广泛的生态系统摆脱云服务提供商（CSP）的引力束缚。\n\
    \n### WATSON Assistant 聊天机器人/IVA：动手实践\n\n面向对话式 AI 的人力资源对话配置\n\n作为 Gartner 企业级对话式\
    \ AI 魔力象限的领导者，且 IBM Watson 用户在三年的时间内实现了 337%的投资回报率^(¹⁹⁸)，Watson Assistant 是 IVA\
    \ 自动化领域的行业领先工具之一。\n\n本练习的目标是在 Watson Assistant 上创建一个 HR IVA，该 IVA 利用不断增长的用户交互来重新训练并改进对用户关于求职申请和公司内部政策问题的回答：\n\
    \n1.  访问链接^(¹⁹⁹) `https://eu-de.assistant.watson.cloud.ibm.com/` 并使用您的 IBM ID\
    \ 登录。如果被重定向到 IBM Cloud，请输入登录详细信息或注册。\n\n2.  选择屏幕左上方（LHS）的“Assistant”选项 > 创建 Assistant\n\
    \n3.  添加对话技能 > 上传技能，并从以下链接上传 json 对话文件\n\n    `https://github.com/bw-cetech/apress-10.4.git`\n\
    \n4.  打开新创建的 Assistant，观察用户意图（这些是用户问题的主题，如组织结构、薪资、投诉、行政、幽默等）和**实体**（用户问题的主题，如团队、人员、服务、薪酬、额外福利：股票/股份/养老金等）\n\
    \n5.  对话已预先配置好——使用下面的对话进行测试^(²⁰⁰)\n\n    第一部分（求职咨询）\n\n    ```\n    你好\n    能告诉我我的求职申请进度吗\n\
    \    空缺职位\n    技术岗\n    是的\n    ```\n\n    第二部分（公司政策）：\n\n    ```\n    你能帮我了解股票期权吗\n\
    \    员工有折扣价吗？\n    ```\n\n    第三部分（幽默）：\n\n    ```\n    我可能快死了，我的寿险、工资和养老金如何支付给我的家人？\n\
    \    不\n    再见\n    ```\n\n6.  **练习** – 将对话替换为面向在线零售商的典型客户支持 IVA\n\n7.  **练习（进阶）**\
    \ – 通过向您的 Watson Assistant 添加网页聊天集成来推送到 IBM Cloud（API 详情显示在 Assistant UI 上的“查看\
    \ API 详情”下）\n\n8.  **练习（进阶）** – 向您的 Watson Assistant 添加 WhatsApp（通过 Twilio）集成\n\
    \n9.  **练习** – 设置一个应用程序例程，该例程每月根据最新的用户对话自动重新训练 NLP 模型\n"
- fmt: "### Transformers for Chatbots: Hands-on Practice\n\n#### NATURAL LANGUAGE\
    \ GENERATION WITH GPT-3\n\nIn our final lab, we use OpenAI’s pretrained GPT-3\
    \ (Generative Pretrained Transformer) models to (a) generate a cooking recipe\
    \ based on ingredients entered by a user (using “zero-shot” training where no\
    \ examples are provided to the model) and (b) implement a “sarcastic” chatbot\
    \ (using “few-shot” training where a limited number of examples are provided to\
    \ train the model):\n\n1. Register an account with OpenAI [https://openai.com/join/](https://openai.com/join/)\
    \ and access the API Key provided under “Personal” in the top right corner of\
    \ your dashboard.\n\n2. Clone the below GitHub repo:  \n   [https://github.com/bw-cetech/apress-10.4b.git](https://github.com/bw-cetech/apress-10.4b.git)\n\
    \n3. Copy and paste the OpenAI API Key inside the double quotes of the string\
    \ defined in the `openai_credentials.py` file.\n\n4. Run through the Python notebook\
    \ steps in Colab:\n   1. Install `openai`, then comment out the code.\n   2. Import\
    \ libraries.\n   3. Drag and drop the OpenAI credentials file to Colab temporary\
    \ storage.\n   4. Define the GPT-3 transformer function – this will interface\
    \ to a high performance GPT-3 `text-davinci-002` engine.\n   5. Call the function\
    \ to create a recipe from a basic recipe with apple, flour, chicken, and salt.\n\
    \n5. Exercise – change the ingredients to e.g. fresh basil, garlic, pine nuts,\
    \ extra-virgin olive oil, parmesan cheese, fusilli, lemon, salt, pepper, red pepper\
    \ flakes, and toasted pine nuts^([^(201)](#fn201)) and call the function again\
    \ to create a pasta recipe.\n\n6. Double-click the `receipe.txt` file that gets\
    \ written to Colab temporary storage to validate the recipe.\n\n7. Exercise (stretch)\
    \ – modify the code to ensure the recipe generated from the GPT-3 model isn’t\
    \ truncated.\n\n8. Using the same GPT-3 transformer model, proceed to run the\
    \ last two cells which provide contextual examples^([^(202)](#fn202)) of “sarcasm”\
    \ then calls the (same) GPT-3 transformer function. The function returns an (NLG-)\
    \ generated “sarcastic” response to the (empty^([^(203)](#fn203))) last question\
    \ “What time is it?” in the contextual examples/chatbot text."
