- fmt: "# Transformers and Attention Models\n\nThe sequence-to-sequence model works\
    \ well enough with smaller sentences but longer sentences tend to stress internal\
    \ memory of the underlying encoder-decoder network. In recent years Transformers\
    \ have been developed, where an augmenting attention mechanism or attention model\
    \ is incorporated to force model attention on specific part(s) of the input sequence.\n\
    \nEssentially “massive” deep learning models, transformers can be implemented\
    \ in Python using the [Hugging Face](https://huggingface.co/) library. Google’s\
    \ `BERT` (Bidirectional Encoder Representations from Transformers), OpenAI’s `GPT-3`\
    \ (Generative Pretrained Transformer),^([^(177)](#fn177)) and the Allen Institute\
    \ for AI’s `ELMo` (Embeddings from Language Models) are three of the biggest.\n\
    \nThere is a lot of hype around `GPT-3` in particular, stemming from the ease\
    \ at which the technology is able to leverage pretrained models on billions of\
    \ parameters to write articles and essays^([^(178)](#fn178)) or even recreate\
    \ a dialogue between ancient philosophers.^([^(179)](#fn179)) Google’s decoder-only\
    \ transformer language model `LaMDA` (Language Model for Dialogue Applications),\
    \ referenced at the start of this chapter,^([^(180)](#fn180)) is arguably the\
    \ next generation, pretrained on 137 billion parameters and trillions of public\
    \ dialogue data.\n\nThe Python wrapper `bert-extractive-summarizer` utilizes HuggingFace\
    \ PyTorch transformers library to produce shortened summaries of large text.^([^(181)](#fn181))\
    \ `GPT-3` can be implemented in Python by installing the `openai` library and\
    \ obtaining an API Key after registering a personal-use account with OpenAI.\n\
    \n## Word Embeddings: Hands-on Practice\n\nWORD2VEC VISUALIZATION\n\nWe now take\
    \ a look at some of the techniques discussed in this section, starting with a\
    \ look at implementing Word2Vec to vectorize unstructured data and plotting the\
    \ resultant Word Embeddings:\n\n1.  Clone the below GitHub repo:\n\n    [https://​github.​com/​bw-cetech/​apress-10.​3.​git](https://github.com/bw-cetech/apress-10.3.git)\n\
    \n2.  Run through the Python notebook steps in Jupyter or Colab to:\n    1.  Import\
    \ the data from the `intents.json` file\n    2.  Clean the data using a combination\
    \ of lexical, syntactic, and semantic techniques\n    3.  Tokenize the data and\
    \ build a model with Word2Vec\n    4.  Display the model vocabulary\n    5.  View\
    \ a sample word embedding vector\n    6.  Plot all the word embeddings\n\n3. \
    \ Exercise – improve the visibility of word labels in the word embeddings plot\n\
    \n4.  Exercise (stretch) – swap out the json intents data with a larger 10+ page\
    \ pdf and perform topic modeling before plotting word embeddings\n\n## Seq2Seq:\
    \ Hands-on Practice\n\nAN ENCODER-DECODER MODEL FOR LANGUAGE TRANSLATION\n\nUsing\
    \ Keras and LSTM deep learning the goal of this lab is to implement a character-level\
    \ sequence-to-sequence model to translate English to French^([^(182)](#fn182))\n\
    \n1.  Clone the GitHub repo below:\n\n    [https://​github.​com/​prasoons075/​Deep-Learning-Codes/​tree/​master/​Encoder%20​Decoder%20​Model](https://github.com/prasoons075/Deep-Learning-Codes/tree/master/Encoder%2520Decoder%2520Model)\n\
    \n2.  Open the `Encoder_decoder_model` with Jupyter notebook\n\n3.  Run through\
    \ the data prep cells:\n    1.  Display the number of sample translations for\
    \ training\n\n        NB you will need to change the path link to the training\
    \ data from `fra.txt` to `fra-eng/fra.txt`\n\n    2.  Vectorize the data and display\
    \ the number of unique input and output tokens and maximum sequence lengths\n\n\
    \    3.  Define the encoder-decoder architecture\n\n4.  Train the sequence model/LSTM\
    \ on the training language samples – note this may take up to 5-10 minutes to\
    \ run through 100 epochs\n\n    NB if an error `NotImplementedError: Cannot convert\
    \ a symbolic Tensor` is encountered, run the notebook instead in Colab (Open Notebook\
    \ > GitHub > enter the GitHub source url above, opening the `Encoder_decoder_model`\
    \ direct from GitHub. Note you will also need to drag and drop the `fra.txt` data\
    \ file from the GitHub source `Encoder Decoder Model/fra-eng` folder to the default\
    \ Colab temporary storage (content) folder\n\n5.  The model is saved in the previous\
    \ step. Reimport this and set up the decoder model for sampling/testing the model\n\
    \n6.  Finally, test the model with a few sequences from the training set (up to\
    \ 10000) to see how the model translates English terms\n\n7.  Exercise – adapt\
    \ the notebook to support a basic (in notebook) user interface where the user’s\
    \ phrase is translated to French\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig9_HTML.jpg)\n\
    \nA diagram comprises 18 languages arranged both horizontally and vertically.\
    \ A scale with gradient colors, ranging from 0 to 0.8, is at the right side.\n\
    \nFigure 10-9\n\nSurname language classification with PyTorch\n\n## PyTorch NLP:\
    \ Hands-on Practice\n\nTEXT CLASSIFICATION WITH PYTORCH\n\nThe goal of this lab\
    \ is to predict which language a surname is from by reading in text examples as\
    \ a series of characters, then building and training a recurrent neural network\
    \ (RNN) with PyTorch\n\n1.  Upload the two files at the link below to Jupyter\
    \ Notebook:\n\n    [https://​github.​com/​bw-cetech/​apress-10.​3b.​git](https://github.com/bw-cetech/apress-10.3b.git)\n\
    \n2.  Rename the `PyTorch_Functions.py.txt` file without the `.txt` extension\
    \ to convert to a Python script^([^(183)](#fn183))\n\n3.  Open the `.ipynb` file\n\
    \n4.  Install PyTorch with\n\n    ```\n    import torch\n    ```\n\n5.  Run through\
    \ the notebook, importing the PyTorch RNN functions (in `PyTorch_Functions.py`)\
    \ to the notebook\n\n6.  Perform the exercises shown:\n    1.  Display a three-dimensional\
    \ (random) tensor to test the PyTorch library import\n    2.  Download the training\
    \ data dictionaries for this problem (surnames for 18 different languages), unzip\
    \ and rename in your Jupyter working directory\n    3.  Display the last five\
    \ names in the Portuguese dictionary to test the PyTorch custom functions\n  \
    \  4.  Observe the model performance on the test set (as shown in the graphic\
    \ below) and export both the predictions and loss likelihood output (probability\
    \ of the test sample names belonging to a certain language) to csv files\n\n7.\
    \  Exercise (stretch) – adapt the set of data dictionaries imported to solve a\
    \ different NLP classifier such as predicting (a) names to gender or (b) character\
    \ to writer or (c) city to country, etc.\n\n## Tools and Applications of NLP\n\
    \nOur final section in this final chapter takes a look at some of the better-known\
    \ open source and industrial-scale Python libraries followed by an analysis of\
    \ the main natural language applications and tools used today. We wrap up with\
    \ our final hands-on labs addressing some of the key NLP use cases and tools used\
    \ including an end-to-end chatbot deployment where we develop a user dialogue\
    \ tree with Watson Assistant and push our app to IBM Cloud."
