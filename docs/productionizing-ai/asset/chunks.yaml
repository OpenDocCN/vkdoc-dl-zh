  trans: "\n### Git 与 GitHub\n\n版本控制，或称源代码控制，是一种跟踪和管理源代码变更的实践。近年来，版本控制系统（VCS），特别是分布式版本控制系统（DVCS），对\
    \ DataOps 团队来说变得非常有价值。除了固有的“DevOps”优势（包括缩短开发时间和提高成功部署次数）之外，不断演变的数据集，例如广泛使用的[约翰霍普金斯大学的新冠数据](https://github.com/CSSEGISandData)，也越来越多地通过分布式版本控制系统进行维护。\n\
    \n`Git`^(³³) 是迄今为止最流行的 DVC，尽管还有其他一些系统，例如 `Beanstalk`、`Apache Subversion`、`AWS\
    \ CodeCommit` 和 `BitBucket`，它们用于需要与其他（通常是单一的）CSP 提供商进行特定集成的项目。\n\n除了可追溯性和文件变更历史（跟踪每一次代码修改和每一次数据集变更）之外，`Git`\
    \ 还简化了在开发过程中回滚到早期代码/数据状态的过程，并增强了分支和合并功能，这对于处理特定应用组件或用户故事的 DataOps 团队至关重要。\n\n\
    GitHub“生态系统”包含 `Git`（实际上是命令行后端）、GitHub（一种基于云的托管服务，允许您从中心位置管理 Git 仓库）以及 GitHub\
    \ Desktop（一种桌面版本，可通过 GUI 与 GitHub 交互）。\n\n如今，全球数百万软件开发者和公司都在使用 GitHub。2020 年 2\
    \ 月之前存在的公共仓库已存档于 GitHub Arctic Code Vault 中——这是一个位于北极山脉永久冻土层下 250 米处的长期档案库。在 GitHub\
    \ 上**复刻**一个仓库，或者将一个公共 GitHub 仓库**克隆**到本地目录，是在 GitHub 上访问和开发已有源代码（或更新数据集）的主要方式。这两种操作都可以通过终端中的\
    \ `git` 命令或（更直观地）使用 GitHub Desktop 来完成。\n\n![](img/527966_1_En_2_Fig8_HTML.jpg)\n\
    \nGitHub 生态系统示意图。它包含 `git`、GitHub Desktop 和 GitHub。\n\n图 2-8\n\nGitHub 生态系统\n\n\
    ### 版本控制\n\n下图展示了 `Git` 如何对同一个（`.py`）文件的三个不同版本执行版本控制。多个用户可以选择他们想要使用的文件版本，独立进行更改，然后再合并回单一的“主”仓库。\n\
    \n![](img/527966_1_En_2_Fig9_HTML.jpg)\n\n`git` 中版本控制的示意图，展示了同一文件的 3 个不同版本。从左到右依次展示了初始文件的版本、添加行以及进行更改。\n\
    \n图 2-9\n\nGit 中的版本控制（来源：[`www.freecodecamp.org`](http://www.freecodecamp.org)）\n\
    \n### 分支与合并\n\n简化的“分支”是 `Git` 成为迄今为止最广泛使用的版本控制系统的主要原因之一。\n\n下图展示了从主仓库创建分支（到一个开发“dev”分支）以进一步开发代码的过程——项目中的另外两名开发人员正在添加功能请求。第一位开发人员进行了一些小修改，并将其代码更改合并到开发（dev）分支，而另一位开发人员则继续处理他们的功能，将合并推迟到以后。\n\
    \n一旦开发（错误修复和功能请求）完成，将在 dev 分支上进行测试，然后最终提交（回）到主仓库。\n\n![](img/527966_1_En_2_Fig10_HTML.jpg)\n\
    \n一个表示 Git 中开发分支的图表。分支从主仓库开始，并进一步包含开发层和 2 个功能层。\n\n图 2-10\n\nGit 中的开发分支\n\n###\
    \ Git 工作流\n\nGit 工作流是将代码和数据的更改放入仓库的方法。代码和数据可以通过四个基本的“层”：工作目录（通常是本地用户机器）、暂存区、本地仓库和远程仓库（通常在\
    \ GitHub 本身上）。\n\n虽然工作目录中的文件可以处于三种可能的状态：已暂存、已修改和已提交，但由于 `Git` 是一个分布式版本控制系统，而不是集中式系统，某些命令（例如提交）每次执行时不需要与远程服务器通信。如下图所示，下方显示了相应的工作流和\
    \ `git` 命令。\n\n![](img/527966_1_En_2_Fig13_HTML.jpg)\n\n一个表示 `git` 命令、源和目标的表格。`git`\
    \ 命令包括 `git add`、`commit`、`push`、`fetch`、`merge` 和 `pull`。\n\n图 2-13\n\nGit 命令\n\
    \n![](img/527966_1_En_2_Fig12_HTML.jpg)\n\n一个 Git 工作流涉及工作目录、暂存区、本地仓库和主仓库。`git`\
    \ 命令中包含 `git add`、`commit`、`push`、`merge`、`fetch` 和 `pull`。\n\n图 2-12\n\nGit 工作流\n\
    \n![](img/527966_1_En_2_Fig11_HTML.png)\n\n一个展示分布式版本控制系统的图表。每个程序员都有主仓库的一个本地克隆。允许进行提交和更新操作。\n\
    \n图 2-11\n\n展示提交的 GitHub DVCS\n\n### GitHub 与 Git：动手实践\n\nGIT 基础\n\n**如今，任何开发都离不开\
    \ GitHub，因此让我们在本实验中看看如何设置 GitHub 帐户、安装 Git 并使用 Git 创建一个新仓库：**\n\n1.  设置 GitHub\
    \ 帐户 – 在 [`https://github.com/`](https://github.com/) 注册\n\n2.  从 [`https://gitforwindows.org/`](https://gitforwindows.org/)\
    \ 安装 Git\n\n3.  在本地目录中创建一个测试文件夹，例如 `git-intro`\n\n4.  向 Git 介绍你自己（右键单击该文件夹并选择\
    \ Git Bash，或通过在测试文件夹中打开的终端执行）：\n\n    ```\n    git config --global user.name \"\
    USER-NAME\" # 注意：与创建帐户时使用的用户名相同\n    git config --global user.email \"YOUR-EMAIL\"\
    \n    git config --global --list # 检查你刚刚提供的信息\n    ```\n\n5.  GitHub 首选的认证方法是使用\
    \ SSH 认证。检查现有密钥，生成一个新的 SSH 密钥并将其添加到 SSH 代理。有关支持，请参阅以下链接：\n\n    [`https://docs.github.com/en/github/authenticating-to-github/connecting-to-github-with-ssh/checking-for-existing-ssh-keys`](https://docs.github.com/en/github/authenticating-to-github/connecting-to-github-with-ssh/checking-for-existing-ssh-keys)\n\
    \n    [`https://docs.github.com/en/github/authenticating-to-github/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent`](https://docs.github.com/en/github/authenticating-to-github/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent)\n\
    \n6.  将新的 SSH 密钥添加到你的 GitHub 帐户\n\n7.  在 GitHub 上创建一个新仓库\n\n8.  确保选中 SSH 按钮，然后通过单击复制按钮并将它们粘贴到\
    \ Git Bash（仍在你的本地文件夹中打开）或粘贴到终端中，来运行屏幕上显示的 `git add`、`commit` 和 `push` 命令\n\n9.\
    \  刷新你的仓库后，你现在应该会在 GitHub 仓库中看到一个 `README.md` 文件\n\n10. 练习 – 尝试将第 2 节（敏捷）中的 `react.js`\
    \ 应用源代码添加到你的本地仓库并推送到 GitHub\n\n11. 练习 – 将一个公共仓库克隆到另一个不同的本地仓库（确保你已创建一个新文件夹，并在该文件夹中运行克隆命令）\n\
    \n**注意：本实验也可以通过从** [**https://desktop.github.com/**](https://desktop.github.com/)\
    \ **安装 GitHub Desktop 并使用它来代替 Git 来完成。**\n\n作为使用 GitHub Desktop 的额外练习，除了克隆到本地仓库之外，还可以尝试复刻一个公共仓库（到你的\
    \ GitHub 帐户）。\n"
- fmt: "### Deploying an App to GitHub Pages: Hands-on Practice\n\n**GitHub isn’t\
    \ just about version control. This lab shows you how to deploy and host the react\
    \ app from section 2 (Agile) to GitHub Pages.**\n\n**NB the approach shown is\
    \ via Git but a deployment using GitHub Desktop can also be carried out by following\
    \ the instructions here:** [**https://pages.github.com/**](https://pages.github.com/)\n\
    \n1. Complete the steps in the lab “react.js: Hands-on Practise: FRONT-ENDING\
    \ YOUR AI APPLICATIONS” above\n2. Create a Git repository\n3. Copy the https url\
    \ for your new repo\n4. Initialize your react app directory as a local (Git) repo\
    \ then:\n   1. Commit\n   2. Push to remote\n5. Amend the `package.json` in your\
    \ react app folder by:\n   1. adding `\"homepage\": \"https://[YOUR-GITHUB-NAME].github.io/[YOUR-GITHUB-REPO]\"\
    ` (right at top of json)\n   2. under ‘Scripts’ add:\n      `\"predeploy\": \"\
    npm run build\"`\n      `\"deploy\": \"gh-pages -d build\"`\n6. `cd` into the\
    \ react app folder on terminal\n7. Install GitHub Pages and deploy your app by\
    \ running the command below one by one:\n\n```\nnpm install gh-pages –save-dev\n\
    git init\ngit remote add origin [https git repo url]\ngit add .\ngit commit –m\
    \ “Deploy react to GitHub pages”\nnpm run deploy # NB if errors running this then\
    \ delete node_modules\\.cache\\gh-pages folder of local app and try again\ngit\
    \ push –u origin master\n```\n\nYou should then be open the app at `https://[myusername].github.io/[my-app]`\
    \ where `myusername` is your GitHub username and `my-app` is your repo name.\n\
    \n## Continuous Integration and Continuous Delivery (CI/CD)\n\nHaving covered\
    \ key team (Agile) and collaborative (GitHub) aspects of DataOps, we move on to\
    \ our next section on CI/CD where the focus is on streamlining data processes\
    \ in a way that facilitates, improves, and accelerates AI solution delivery.\n\
    \n### CI/CD in DataOps\n\nThe intention of Continuous Integration and Continuous\
    \ Delivery (or Continuous Deployment^([^(34)](#fn34))) in software is to enforce\
    \ automation through build, test, and deploy processes. Essentially this is to\
    \ enable teams to release a constant flow of software updates into production\
    \ to quicken release cycles, lower costs, and reduce the risks associated with\
    \ development.\n\nIn the context of DataOps (as opposed to DevOps) and AI, the\
    \ scope of automation has extended to data pipeline orchestration including data\
    \ drift and modeling automation including the retraining process. In theory, this\
    \ should mean each time a change is made to underlying code or infrastructure\
    \ **and** a data change occurs (or, more realistically, each time data distributions\
    \ have deviated significantly), automation kicks-in and the application is rebuilt,\
    \ tested, and pushed to production.\n\n### Introduction to Jenkins\n\n**Jenkins\
    \ is an open source automation server with hundreds of plug-ins and one of the\
    \ leading CI/CD tools for DataOps. It is used by Expedia, Autodesk, UnitedHealth\
    \ Group, and Boeing as a continuous delivery pipeline.**\n\nOriginally built to\
    \ automate testing for Java developers, but now with support for multilanguage\
    \ multicode repositories, Jenkins simplifies the setup of a continuous integration\
    \ or continuous delivery (CI/CD) environment. It does this via a `Jenkinsfile`,\
    \ effectively a “pipeline” script where a declarative programming (macro-managed)\
    \ model defines executable steps via a hierarchy: pipeline block > agent > stages.\n\
    \nA Jenkins pipeline is really a collection of jobs triggering each other in a\
    \ specified sequence. For a small app, this would be, for example, three jobs:\
    \ job1 build, job2 test, and job3 deploy. Jobs can also be run concurrently and\
    \ for more complex pipelines, a Jenkins Pipeline Project is used where jobs are\
    \ written as one whole script and the entire deployment flow is managed through\
    \ Pipeline as Code. Continuous integration with Jenkins also supports GitHub automation.^([^(35)](#fn35))\n\
    \nBlue Ocean provides a better UX for setting up Jenkins pipelines by exposing\
    \ a low-code interface and low-click functional development processes, negating\
    \ the need for programming a `Jenkinsfile`.\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig14_HTML.jpg)\n\
    \nA flow diagram exhibits the process included in the Jenkins job pipeline with\
    \ GitHub integration. It involves pushing, cloning, building project, sending\
    \ artifacts, and creating a deployment.\n\nFigure 2-14\n\nJenkins Job pipeline\
    \ with GitHub integration\n\n### Maven\n\nClosely coupled with Jenkins (Jenkins\
    \ uses Maven as its build tool), Apache Maven is a Project Management tool designed\
    \ to work across the software lifecycle (performing compile, test, package, install,\
    \ and deploy tasks), centrally managing project build including dependencies,\
    \ reporting, and documentation.\n\nWhen a Jenkins build is triggered, Maven downloads\
    \ the latest code changes and updates, packages them, and performs the build.\
    \ Like Jenkins, Maven works with multiple plugins, allowing users to add other\
    \ bespoke tasks, but only does Continuous Delivery, not Continuous Integration\
    \ (CI).^([^(36)](#fn36))\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig15_HTML.jpg)\n\
    \nA set of 2 flow diagrams represent maven build management. The process initiates\
    \ with the triggering of the Jenkin build and ends with the test reports.\n\n\
    Figure 2-15\n\nMaven build management\n\n### Containerization\n\nWe finish this\
    \ section with a look at containerization.\n\nBecause containers standardize deployments\
    \ across multiple machines and platforms, they can naturally accelerate DataOps\
    \ processes, and in particular CI/CD, where testing and debugging processes are\
    \ “ringfenced” from external file dependencies.\n\nContainerization comes with\
    \ a number of additional benefits highly suited to building robust production-grade\
    \ AI solutions including the ability to simplify and speed up the development,\
    \ deployment, and applications configuration process, increased portability and\
    \ server integration and scalability as well as increased productivity and federated\
    \ security.\n\n#### Docker and Kubernetes\n\nDocker is the main container runtime\
    \ we will utilize in this book. Docker’s USP lies in its handling of dependencies,\
    \ multiple (programming) language, and compilation issues when creating isolated\
    \ environments to launch and deploy applications as containers. Although there\
    \ are many similarities with Virtual Machines, as shown in the image below, Docker\
    \ better supports multiple applications sharing the same underlying operating\
    \ system. Docker is also fast, starting and stopping apps in a few seconds. PostgreSQL,\
    \ Java, Apache, elastic, and mongoDB all run on Docker.\n\nAlthough we will not\
    \ use it in this book, Kubernetes (k8s), a container management tool, is often\
    \ used to orchestrate Docker “instances.” As an open source platform, Kubernetes\
    \ was originally designed by Google and automates deployment, management, and\
    \ scaling of applications in the container.\n\n![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig16_HTML.jpg)\n\
    \nA set of 2 architectures of docker and virtual machine. Docker consists of containerized\
    \ applications a to f. The host operating system is engaged in docker and hypervisor\
    \ in a virtual machine.\n\nFigure 2-16\n\nDocker architecture"
