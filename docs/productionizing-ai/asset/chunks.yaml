    # Prologue


    Out of a wasteland of failed Data Science projects and mounting technical debt,^([¹](#fn1))
    organizations today are attempting to redress the AI landscape and enforce a broader,
    more considered Design/System Thinking approach which cuts through the hype. The
    imperative is to ensure that Data/AI solutions are built with multiuser engagement
    at the outset (both technical and nontechnical) and have system-wide ecosystem,
    enterprise data center, infrastructure/integration, and end-to-end process in
    mind.


    Applications of Artificial Intelligence leveraging the latest technological advances
    are firmly at the top of this hype cycle.^([²](#fn2)) With the productivity benefits
    of AI difficult to ignore, Covid and galloping digitalization have given rise
    to a vicious culture of disruption, the accelerated uptake forcing fragile companies
    to build or buy solutions cheaper, smaller, and more open sourced. This convergence
    of forces means that demand for rapid prototyping and accelerated AI solution
    delivery is high.


    At the same time, not every company is cognizant of what AI can do, or what it
    means. Often these are corporates burdened by legacy tools and poor innovation
    practices. Some are fearful of the impact on jobs; others have ethical concerns.
    But what has become clear for most C-Levels is that AI implementation must fit
    an “Enterprise AI” vision – a $341b market^([³](#fn3)) – and the prevalent trend
    is toward a platform of disparate but highly integrated “best-of-breed” AI solutions.


    For many of us where data and digital are inextricably tied up in our professional
    life and associated opportunities in the job market, these meaningful, high-value
    AI solutions are what employers are targeting. And the constant focus on delivering
    an Return On Investment (ROI) – understanding and, more importantly, delivering
    tangible outcomes using AI, typically machine and deep learning – is what keeps
    us employed.


    This can be exhausting and part of the challenge for business leaders is that
    highly technical skillsets have never led to particularly visual, communicable
    (and understandable) results for the rest of the organization – most Data Scientists
    are not good at BI or recruited for their soft skills. Employers in the job market
    today are increasingly looking for more rounded/broader “end-to-end” skills which
    translate to better visualization, front-end features, and integration. The opportunity
    for Data Professionals is to give themselves an “edge” by addressing technical
    debt and possessing the ability to deliver full-stack data solutions.


    A great deal of this “opportunity” depends on cloud computing; AI or Data Science
    is not just a `Python` notebook and a flip chart – it demands identifying and
    ingesting suitable datasets and leveraging services on cloud to scale from sandbox
    to proof-of-concept to prototype to minimum viable product. Ultimately today it
    is Enterprise AI that most companies and organizations are targeting. But for
    many individuals employed in roles and for many noncorporate companies, leveraging
    cloud is a minefield of sometimes unclear, poorly documented artifacts and hidden
    costs. Enterprise AI is far from affordable.


    Successful (and affordable) Enterprise AI project delivery requires a healthy
    amount of Emotional Intelligence,^([⁴](#fn4)) an agile mindset, robust data-fed
    pipelines and a whole lot of workarounds to design, scope, and achieve integration
    across people, processes, and tools – with all of us dependent on the three main
    hyperscalers/cloud service providers (CSPs): Amazon Web Services, Microsoft Azure,
    and Google Cloud Platform,^([⁵](#fn5)) bound to their data centers, scalable storage,
    and compute instances.


    Agile is important, but so are hybrid/agnostic solutions, multiskill, T-shaped
    capabilities, and results-based delivery. Above all, senior stakeholders/managers
    should not be taking credit for being spiderman or spiderwoman implementing “agile”
    project methodologies if they are just orchestrating chaos or spinning webs that
    attribute project failures/blame elsewhere. Agile only works if it follows project
    design through to a standard of delivery which meets the overall project vision,
    not if under the surface it’s just a pile of shit.^([⁶](#fn6))


    With many organizations struggling to operationalize AI, this book is intended
    to go a step beyond a simple `Python` scripting and address the “so what” of current
    Data Science delivery.


    This doesn’t mean `python` is passed over – far from it. `Python` skills are more
    than ever in demand in the workplace, with popularity up in September 2022 and
    still number 1 on the TIOBE Programming Community index.^([⁷](#fn7)) Developing
    in `Python` is central to the aims of this book but here we take a top-down, “goal-focused”
    approach, preferring `Python`-based and low-code frameworks for accelerating the
    full-stack development process, rather than stream of consciousness `Python` back-ends.
    The narrative of the book is also aligned with DataOps best practice and an awareness
    of meeting KPIs around shifting requirements, slipped schedules, flexibility improvements,
    and disappointed users.


    Hands-on labs are populated throughout the book and are intended to present “how-to”
    examples, not just utilizing `Python` code, but as much with critical cloud services
    for AI and no-/low-code interfaces for key nontechnical stakeholders, often the
    main decision makers in whether to commission, implement, or scale an AI project.


    Enterprise AI is about embedding AI into an organization’s data strategy, and
    an entire workforce needs to be aligned and trained on a company’s tangible (and
    intangible/hidden) data and AI assets. Everyone therefore should get to use and
    understand AI, and by developing the solutions in this book it is hoped the reader
    is better equipped to deliver a company’s “bigger picture” goals.


    # Preface


    When Barry approached me to write a preface for this book, it filled me with delight,
    not just because I was writing a preface for his new book, although it is always
    nice to be asked, but primarily because I was being asked by someone who I have
    watched flourish under my leadership at Pairview for the last few years.'
