  trans: "\n### 将应用部署到 GitHub Pages：动手实践\n\n**GitHub 不仅仅是版本控制工具。本实验将向您展示如何将第 2 节（敏捷）中的\
    \ React 应用部署并托管到 GitHub Pages。**\n\n**注意：此处展示的方法是通过 Git 进行的，但也可以按照以下说明使用 GitHub\
    \ Desktop 进行部署：** [**https://pages.github.com/**](https://pages.github.com/)\n\
    \n1.  完成上方实验“react.js：动手实践：为你的 AI 应用构建前端”中的步骤\n2.  创建一个 Git 仓库\n3.  复制新仓库的 https\
    \ 网址\n4.  将你的 React 应用目录初始化为本地 (Git) 仓库，然后：\n    1.  提交\n    2.  推送到远程仓库\n5. \
    \ 通过以下方式修改 React 应用文件夹中的 `package.json`：\n    1.  添加 `\"homepage\": \"https://[你的-GitHub-用户名].github.io/[你的-GitHub-仓库名]\"\
    `（放在 json 的最顶部）\n    2.  在 'Scripts' 下添加：\n        `\"predeploy\": \"npm run build\"\
    `\n        `\"deploy\": \"gh-pages -d build\"`\n6.  在终端中 `cd` 进入 React 应用文件夹\n\
    7.  安装 GitHub Pages 并通过逐一运行以下命令来部署你的应用：\n\n```\nnpm install gh-pages –save-dev\n\
    git init\ngit remote add origin [https git 仓库地址]\ngit add .\ngit commit –m “将\
    \ React 部署到 GitHub pages”\nnpm run deploy # 注意：如果运行此命令时出错，请删除本地应用的 node_modules\\\
    .cache\\gh-pages 文件夹并重试\ngit push –u origin master\n```\n\n然后，你应该可以在 `https://[我的用户名].github.io/[我的应用]`\
    \ 打开该应用，其中 `我的用户名` 是你的 GitHub 用户名，`我的应用` 是你的仓库名称。\n\n## 持续集成与持续交付 (CI/CD)\n\n\
    在介绍了 DataOps 的关键团队（敏捷）和协作（GitHub）方面之后，我们进入下一节关于 CI/CD 的内容，其重点在于以促进、改进和加速 AI 解决方案交付的方式来简化数据处理流程。\n\
    \n### DataOps 中的 CI/CD\n\n软件中持续集成与持续交付（或持续部署^(³⁴)）的意图是通过构建、测试和部署流程来强制执行自动化。本质上，这是为了使团队能够将持续的软件更新流发布到生产环境，从而加快发布周期、降低成本并减少与开发相关的风险。\n\
    \n在 DataOps（相对于 DevOps）和 AI 的背景下，自动化的范围已扩展到数据管道编排（包括数据漂移）和建模自动化（包括重新训练过程）。理论上，这意味着每当底层代码或基础设施发生更改**并且**数据发生更改时（或者更现实地说，每当数据分布发生显著偏离时），自动化就会启动，应用程序会被重建、测试并推送到生产环境。\n\
    \n### Jenkins 简介\n\n**Jenkins 是一个拥有数百个插件的开源自动化服务器，也是 DataOps 领先的 CI/CD 工具之一。Expedia、Autodesk、UnitedHealth\
    \ Group 和 Boeing 都将其用作持续交付管道。**\n\nJenkins 最初是为 Java 开发者自动化测试而构建的，但现在支持多语言多代码仓库，它简化了持续集成或持续交付\
    \ (CI/CD) 环境的设置。它通过一个 `Jenkinsfile` 来实现这一点，这实际上是一个“管道”脚本，其中声明式编程（宏观管理）模型通过一个层次结构定义可执行步骤：管道块\
    \ > 代理 > 阶段。\n\nJenkins 管道实际上是一系列按指定顺序相互触发的作业集合。对于一个小的应用，例如，这可能是三个作业：作业 1 构建、作业\
    \ 2 测试和作业 3 部署。作业也可以并发运行，对于更复杂的管道，会使用 Jenkins 管道项目，其中作业被编写为一个完整的脚本，整个部署流程通过“管道即代码”进行管理。Jenkins\
    \ 的持续集成也支持 GitHub 自动化。^(³⁵)\n\nBlue Ocean 通过提供低代码界面和低点击功能开发流程，为设置 Jenkins 管道提供了更好的用户体验，从而无需编写\
    \ `Jenkinsfile` 程序。\n\n![](img/527966_1_En_2_Fig14_HTML.jpg)\n\n一个流程图展示了包含 GitHub\
    \ 集成的 Jenkins 作业管道中的过程。它涉及推送、克隆、构建项目、发送工件和创建部署。\n\n图 2-14\n\n具有 GitHub 集成的 Jenkins\
    \ 作业管道\n\n### Maven\n\nApache Maven 与 Jenkins 紧密耦合（Jenkins 使用 Maven 作为其构建工具），是一个项目管理工具，旨在跨软件生命周期工作（执行编译、测试、打包、安装和部署任务），集中管理项目构建，包括依赖项、报告和文档。\n\
    \n当触发 Jenkins 构建时，Maven 会下载最新的代码更改和更新，打包它们，并执行构建。与 Jenkins 一样，Maven 可与多个插件配合使用，允许用户添加其他定制任务，但仅执行持续交付，不执行持续集成\
    \ (CI)。^(³⁶)\n\n![](img/527966_1_En_2_Fig15_HTML.jpg)\n\n一组 2 个流程图展示了 Maven 构建管理。该过程从触发\
    \ Jenkins 构建开始，以测试报告结束。\n\n图 2-15\n\nMaven 构建管理\n\n### 容器化\n\n我们以容器化来结束本节。\n\n\
    由于容器标准化了跨多台机器和平台的部署，它们可以自然地加速 DataOps 流程，特别是 CI/CD，其中测试和调试过程与外部文件依赖项“隔离”。\n\n\
    容器化带来了许多额外的好处，非常适合构建健壮的生产级 AI 解决方案，包括能够简化和加速开发、部署和应用程序配置过程，提高可移植性、服务器集成和可扩展性，以及提高生产力和联合安全性。\n\
    \n#### Docker 和 Kubernetes\n\nDocker 是本书中将使用的主要容器运行时。Docker 的独特卖点在于它在创建隔离环境以将应用程序作为容器启动和部署时，处理依赖项、多种（编程）语言和编译问题的能力。尽管与虚拟机有许多相似之处，如下图所示，但\
    \ Docker 更好地支持多个应用程序共享相同的底层操作系统。Docker 也很快，可以在几秒钟内启动和停止应用程序。PostgreSQL、Java、Apache、Elasticsearch\
    \ 和 MongoDB 都可以在 Docker 上运行。\n\n虽然本书不会使用它，但容器管理工具 Kubernetes (k8s) 通常用于编排 Docker\
    \ “实例”。作为一个开源平台，Kubernetes 最初由 Google 设计，可自动部署、管理和扩展容器中的应用程序。\n\n![](img/527966_1_En_2_Fig16_HTML.jpg)\n\
    \n一组 2 个 Docker 和虚拟机的架构图。Docker 由容器化应用程序 a 到 f 组成。主机操作系统参与 Docker，而虚拟机中则涉及虚拟机监控程序。\n\
    \n图 2-16\n\nDocker 架构\n"
- fmt: '### Play With Docker: Hands-on Practice


    #### PLAY WITH DOCKER


    Now that we have introduced containers and Docker in a CI/CD context, let''s take
    a look at the process of containerizing a simple application with Play With Docker,
    which supports 4 hours of free usage:


    1.  Sign up to Docker at [`https://hub.docker.com/`](https://hub.docker.com/)

    2.  After signing up and verifying your email, logon to Play with Docker at [`https://labs.play-with-docker.com/`](https://labs.play-with-docker.com/)

    3.  When the screen opens, select “Add New Instance”

    4.  An embedded terminal should open on the Play With Docker screen


    ![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig17_HTML.jpg)


    A screenshot of the window page, docker playground exhibits an embedded terminal.
    Add new instance and close session option are exposed on the left of the page


    Figure 2-17


    Play with Docker


    1.  Type the following command in your PWD terminal:


    ```

    docker run -dp 80:80 docker/getting-started:pwd

    ```


    This will start a container – click on port 80 to open it


    **NB use "ctrl + shift + V" to paste commands into the Docker command line interface
    (CLI)**


    1.  The container is a tutorial for Docker – getting started.^([^(37)](#fn37))
    Complete the tutorial to the end of the first part "Our Application" which will
    walk through how to build a “To-do list” app


    **NB when Building the App''s Container Image (creating Dockerfile), use the command
    below:**


    1.  Exercise – complete the next part of the tutorial "Updating our App" to see
    how to amend the message and behavior of the Dockerized application

    2.  Exercise – complete "Sharing our App" to see how to share Docker images, using
    a Docker registry on Docker Hub


    ```

    touch Dockerfile

    ```


    ### Testing, Performance Evaluation, and Monitoring


    Our last section in this chapter takes a look at automated testing, performance
    evaluation, and application monitoring in a Data/MLOps context.


    #### Selenium


    Created in 2004 to automate testing actions on web apps, Selenium is an automated
    framework for testing across different browsers and platforms and has multilanguage
    support (Java, C#, Python). Like much of the DataOps ecosystem, it''s free and
    open source.


    Not just a single tool but a software suite, Selenium is customized for specific
    organizational quality assurance (QA) requirements and supports important DataOps
    unit testing processes^([^(38)](#fn38)) involving data pipelines and analytics.
    Once unit testing is complete, continuous integration commences with QA testers
    able to create test cases and test suites for logically grouped test cases including
    data-in-transit and data-at-rest.


    Running Selenium tests in Jenkins allows users to (a) run tests every time software
    changes and (b) deploy software to a new environment when the tests pass. Jenkins
    can also schedule Selenium tests to run at specific time, saving execution history
    and test reports.


    ![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig18_HTML.jpg)


    A flow diagram represents the process interface of jenkins, maven, and selenium.
    The process initiates with the triggering of jenkins build. Also, it includes
    displaying test reports.


    Figure 2-18


    Jenkins, Maven, and Selenium process interfaces


    #### TestNG


    Selenium Test Scripts work with TestNG (Test Next generation) – a testing framework
    which addresses a reporting gap in Selenium Webdriver, generating default HTML
    reports after execution. These reports (shown below) identify information about
    test cases (such as pass, skip, or fail) and the overall status of a project.


    ![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig19_HTML.jpg)


    A window page represents the test N G report. The report exhibits information
    about test cases that includes pass, fail, skip, time, included group, and excluded
    group.


    Figure 2-19


    TestNG report


    #### Issue Management


    Issue Management and Issue Tracking allow project managers, users, or developers
    to record and follow up the progress of issues on a Data project, capturing bugs,
    errors, feature requests, and customer complaints. Issue tracking criteria typically
    include


    *   Level of importance

    *   Team members assigned

    *   A progress metric


    ![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig20_HTML.jpg)


    A representation of activity completion exhibits the release I D, and the percentages
    of completed, on - time, overdue, late, and upcoming details.


    Figure 2-20


    Software delivery release – issue tracking (Plutora)


    ##### Jira


    Jira is one of the most popular issue (ticket) tracking and PM tools, although
    Trello, GitHub Boards, and Monday are also widely used.


    Developed by Atlassian, Jira has been around a while (2002) and is an agile project
    management and issue/bug tracking tool. It comes with an easy-to-use dashboard
    and “stress-free” PM including agile delivery features such as team/user story
    and sprint oversight, scrum and kanban boards, roadmaps, and team performance
    reporting.


    ##### ServiceNow


    Jira is integrated with ServiceNow – a workflow automation solution to connect
    people, functions, and systems across an organization. ServiceNow’s product USPs
    are ramping up customer service and transforming workforce/employees to digital.


    The below image shows how ServiceNow automates a change request workflow across
    a CI/CD pipeline.


    ![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig21_HTML.jpg)


    A representation exhibits the automation of change request workflow with ServiceNow.
    The process involves assigning resources, completing build and testing, changing
    approval, and deploying.


    Figure 2-21


    Automating a change request across a CI/CD pipeline with ServiceNow


    Besides clear automation productivity benefits, ServiceNow also helps scale IT
    with “AIOps,” interpreting telemetry data across organizations and using machine
    learning for, for example, anomaly detection.


    ![](images/527966_1_En_2_Chapter/527966_1_En_2_Fig22_HTML.jpg)


    A set of 2 representations and a graph of ServiceNow A I ops exhibit the collection
    of telemetry data, reduction of noise, and detection of anomalies.


    Figure 2-22


    ServiceNow AIOps – telemetry anomaly detection'
