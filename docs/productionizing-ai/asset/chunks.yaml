    \ UK Public Housing Output)\n\n    4.  Derive fbprophet forecasting components\
    \ from the data\n\n    5.  Output a ten-year forecast\n\n4.  Exercise (stretch):\
    \ repeat the exercise to forecast at monthly level\n\n5.  Exercise (stretch):\
    \ automate the data import to read in the latest data (i.e., pick up the latest\
    \ quarter)\n\n## Unsupervised Machine Learning\n\nUnsupervised machine learning\
    \ is all about identifying hidden patterns in data, specifically when there is\
    \ no “labeled” data to tell us otherwise. Clustering is the predictive modeling\
    \ technique but we also take a look in this section at unsupervised ML as means\
    \ to reduce “Big Data” datasets.\n\n### Clustering\n\nWith unsupervised machine\
    \ learning, we have no labeled data or “ground truth,” so the goal of predictive\
    \ modeling in this context is instead to identify an unseen pattern on the underlying\
    \ data. These patterns are identified as “clusters” often over multiple dimensions,\
    \ where intracluster distances (the distance between datapoints within a cluster)\
    \ are minimized and intercluster distances (distance between separate clusters)\
    \ are maximized.\n\nBecause of its inherent ability to find hidden patterns in\
    \ BIG datasets running into hundreds, thousands, or even more parameters/features,\
    \ unsupervised clustering is ideally suited to mine customer data buried in a\
    \ CRM platform (or multiple systems) and for **anomaly detection**. Given a specific\
    \ number of groupings (clusters), an unsupervised machine learning approach can\
    \ throw up customer segments which have some degree of commonality (high spend,\
    \ low to mid income, located in a specific region, etc.). Equally after training\
    \ an unsupervised machine learning model on the data, anomalies in the data stand\
    \ out as isolated clusters, as shown in Figure [4-2](#527966_1_En_4_Chapter.xhtml#Fig2).\n\
    \n![](images/527966_1_En_4_Chapter/527966_1_En_4_Fig2_HTML.jpg)\n\nScatterplot\
    \ of training data, resulting model and applied to new input of supervised and\
    \ unsupervised learnings are exposed. The training examples of unsupervised learning\
    \ do not have ground truth labels.\n\nFigure 4-2\n\nSupervised vs. unsupervised\
    \ ML (Source: ResearchGate)\n\n### Dimensionality Reduction\n\nDimensionality\
    \ Reduction is also considered an unsupervised technique. Here the idea is that\
    \ a machine learning algorithm is used to simplify (reduce) the data, often from\
    \ thousands of underlying features into tens of features.\n\nThe process of reducing\
    \ the number of dimensions in your data can of course be carried out in both a\
    \ manual way (by dropping unwanted features) or automated via an algorithm. The\
    \ main unsupervised technique used is Principal Component Analysis, where the\
    \ data is “collapsed” into a form that statistically resembles the original data.\n\
    \nWhile this approach can greatly reduce datasets and improve runtime/performance,\
    \ it is not strictly a Machine Learning modeling technique in the normal sense\
    \ as the outcome in this case is another dataset, albeit compressed, rather than\
    \ a trained model.\n\n### Unsupervised Machine Learning (Clustering): Hands-on\
    \ Practice\n\nK-MEANS APPLIED TO AERIAL LIDAR POINT CLOUD DATASET\n\n**Using Python\
    \ in Jupyter Notebook, the goal of this exercise is to apply unsupervised machine\
    \ learning technique (using the K-Means algorithm**^([^(52)](#fn52))**) to a LIDAR\
    \ dataset – here an unlabeled “point cloud”**^([^(53)](#fn53)) **representing\
    \ an airport terminal****:**\n\n1.  Clone the GitHub repo below:\n\n    [`https://github.com/bw-cetech/apress-4.3.git`](https://github.com/bw-cetech/apress-4.3.git)\n\
    \n2.  Walk-through the Python code in Jupyter notebook step by step:\n    1. \
    \ Import the data\n\n    2.  Point Cloud quick selection – flatten data to 2D\n\
    \n    3.  Point Cloud Filtering\n\n    4.  K-Means Clustering Implementation\n\
    \n3.  Exercise – display an “elbow plot” to compare different values of k – is\
    \ k=2 optimal?\n\n4.  Exercise (stretch) – try to apply the same technique to\
    \ the car dataset provided in the GitHub link above\n\n## Semisupervised Machine\
    \ Learning\n\nNot strictly a technique in its own right, semisupervised machine\
    \ learning essentially involves two processes: unsupervised machine learning followed\
    \ by supervised (classification or regression). As such, semisupervised machine\
    \ learning uses both unlabeled and labeled data for training – typically a large\
    \ amount of unlabeled data and a small amount of labeled data.\n\nA large amount\
    \ of unsupervised data is used as unlabeled data is less expensive and takes less\
    \ effort to acquire – semisupervised learning is useful when the cost associated\
    \ with labeling (often involving annotation by subject matter experts) is too\
    \ high to allow for a fully labeled training process.\n\nFor the above reasons,\
    \ semisupervised machine learning is often adopted by businesses and organizations\
    \ looking to scale an AI strategy, but there are also applications such as identifying\
    \ a person's face on a (low-quality) webcam, which rely on only a few labeled\
    \ training images^([^(54)](#fn54)) and are able to achieve high performance."
  trans: "\n### 时间序列预测\n\n正如第 1 章所述，当前在预测领域使用人工智能正成为一种趋势。我们将在下一章探讨神经网络和深度学习的具体应用，并在第\
    \ 6 章介绍 AutoAI 方法^(⁴⁹)，但除此之外，还有许多机器学习应用扩展了传统的回归技术：自回归（`AR`）、移动平均（`MA`）、自回归移动平均（`ARMA`）、差分自回归移动平均（`ARIMA`）以及季节性差分自回归移动平均（`SARIMA`）。\n\
    \nFacebook 开源的时间序列预测算法 `fbprophet` 尤其受欢迎。^(⁵⁰) 该算法能够自动对具有非线性趋势、季节性和节假日效应的时间序列数据进行预测，捕捉时间序列的四个关键组成部分：长期趋势、季节变动、周期变动和不规则变动。然而，与机器学习中的常见做法一致，通常不会仅依赖单一方法，而是会采用并比较多种算法技术（例如\
    \ `ARIMA`、`fbprophet` 和 `RNNs`），最终根据具体的预测用例选择模型。\n\n### fbprophet 入门：动手实践\n\n\
    **预测建筑行业需求**\n\n本练习的目标是在 Jupyter Notebook 中使用 Python，介绍如何利用 `fbprophet` 加速预测过程。在此特定案例中，我们预测英国季度住房需求，但代码示例具有良好的适应性，可以轻松替换数据以用于其他行业/领域的预测。\n\
    \n1.  克隆 GitHub 仓库 `https://github.com/bw-cetech/apress-4.2.git`\n2.  在 Colab\
    \ 中运行笔记本^(⁵¹)，逐步浏览代码示例\n3.  代码将执行以下操作：\n    1.  导入 `fbprophet`（现已更名为 `prophet`）\n\
    \    2.  从英国国家统计局导入建筑数据\n    3.  将数据整理为所需格式（显示英国公共住房产出的季度时间序列）\n    4.  从数据中推导出\
    \ `fbprophet` 的预测组件\n    5.  输出十年期预测结果\n4.  练习（拓展）：重复练习，预测月度数据\n5.  练习（拓展）：自动化数据导入，以读取最新数据（即获取最新季度数据）\n\
    \n## 无监督机器学习\n\n无监督机器学习的核心在于识别数据中隐藏的模式，特别是在没有“标记”数据提供指导的情况下。聚类是其中一种预测建模技术，但本节我们还将探讨无监督机器学习作为缩减“大数据”数据集的一种手段。\n\
    \n### 聚类\n\n在无监督机器学习中，我们没有标记数据或“真实情况”，因此此背景下预测建模的目标是识别底层数据中未被发现的模式。这些模式通常在多维空间中被识别为“簇”，其中簇内距离（簇内数据点之间的距离）被最小化，而簇间距离（不同簇之间的距离）被最大化。\n\
    \n由于其内在能力，能够发现包含数百、数千甚至更多参数/特征的大数据中的隐藏模式，无监督聚类非常适合挖掘 CRM 平台（或多个系统）中埋藏的客户数据，以及用于异常检测。给定特定数量的分组（簇），无监督机器学习方法可以找出具有一定共性的客户细分群体（例如高消费、中低收入、位于特定区域等）。同样，在数据上训练无监督机器学习模型后，数据中的异常会以孤立簇的形式凸显出来，如图\
    \ 4-2 所示。\n\n![](img/527966_1_En_4_Fig2_HTML.jpg)\n\n训练数据的散点图、生成的模型以及应用于新输入的结果，展示了监督学习和无监督学习的区别。无监督学习的训练示例没有真实情况标签。\n\
    \n图 4-2 监督学习 vs. 无监督机器学习（来源：ResearchGate）\n\n### 降维\n\n降维也被视为一种无监督技术。其核心思想是使用机器学习算法来简化（减少）数据，通常是将数千个底层特征缩减为数十个特征。\n\
    \n减少数据维度的过程当然可以通过手动方式（删除不需要的特征）或通过算法自动完成。主要使用的无监督技术是主成分分析，它将数据“压缩”成一种在统计上类似于原始数据的形式。\n\
    \n虽然这种方法可以极大地缩减数据集并提高运行时间/性能，但它严格来说并非通常意义上的机器学习建模技术，因为此过程的输出是另一个数据集（尽管是压缩后的），而非一个训练好的模型。\n\
    \n### 无监督机器学习（聚类）：动手实践\n\n**K-MEANS 算法应用于航空激光雷达点云数据集**\n\n本练习的目标是在 Jupyter Notebook\
    \ 中使用 Python，将无监督机器学习技术（使用 K-Means 算法^(⁵²)）应用于一个激光雷达数据集——这里是一个代表机场航站楼的未标记“点云”^(⁵³)：\n\
    \n1.  克隆以下 GitHub 仓库：\n    `https://github.com/bw-cetech/apress-4.3.git`\n2. \
    \ 在 Jupyter Notebook 中逐步浏览 Python 代码：\n    1.  导入数据\n    2.  点云快速选择——将数据展平为二维\n\
    \    3.  点云滤波\n    4.  K-Means 聚类实现\n3.  练习——显示“肘部图”以比较不同 `k` 值——`k=2` 是否最优？\n\
    4.  练习（拓展）——尝试将相同技术应用于上述 GitHub 链接中提供的汽车数据集\n\n## 半监督机器学习\n\n半监督机器学习严格来说并非一种独立的技术，它本质上涉及两个过程：无监督机器学习，随后是监督学习（分类或回归）。因此，半监督机器学习在训练时同时使用未标记数据和标记数据——通常是大量的未标记数据和少量的标记数据。\n\
    \n使用大量无监督数据是因为未标记数据成本更低，获取所需精力也更少——当标记成本（通常涉及领域专家的标注）过高，无法进行完全标记的训练过程时，半监督学习就非常有用。\n\
    \n基于上述原因，半监督机器学习常被寻求扩展其人工智能战略的企业和组织所采用。此外，它也有一些应用场景，例如在（低质量）网络摄像头上识别人脸，这类应用仅依赖少量标记的训练图像^(⁵⁴)就能实现高性能。\n"
- fmt: '# Machine Learning Implementation


    Having covered the key concepts above, let’s take a look at the process of implementing
    a machine learning model. Although machine learning is never quite as “linear”
    as we would like, as shown below, the process essentially progresses from Data
    Import through Exploratory Data Analysis (EDA), Data Wrangling involving a number
    of subprocesses described below, Modeling and Performance Benchmarking and Deployment.


    Design Thinking and Data Mining and Data Import have been covered in Chapters
    [2](#527966_1_En_2_Chapter.xhtml) and [3](#527966_1_En_3_Chapter.xhtml). We will
    cover each of the subprocesses from EDA to Performance Benchmarking in the sections
    that follow with Deployment covered in Chapter [7](#527966_1_En_7_Chapter.xhtml)
    on Application Development.


    ![](images/527966_1_En_4_Chapter/527966_1_En_4_Fig3_HTML.jpg)


    A flow diagram exposes the process of a machine learning model. It includes design
    thinking and data mining, data import, EDA, data wrangling, modelling, performance
    benchmarking and deployment.


    Figure 4-3


    Machine Learning process


    ## Exploratory Data Analysis (EDA)


    Exploratory Data Analysis is the process carried out typically once we have imported
    our data sources, but “ground work” on the process can also occur prior to import.
    The main activity is to understand the data, firstly by performing basic analysis
    such as looking at the size of the dataset(s) (number of data files, number of
    rows and columns in each, etc.), as well as looking at the top and bottom rows,^([^(55)](#fn55))
    data types, and high-level statistics.


    Following this basic EDA, a secondary process involves “going a level deeper”
    and checking, for example, the number of missing values, the specific values in
    each column and the frequency of these values. We may also look at specific column/field
    names in the case of larger datasets (e.g., 20+ columns) to get a “feel” for which
    fields/variables are likely to be good predictors, and which might be “target”
    variables.


    Although we are initially just looking to output/display key metrics from these
    EDA tasks, invariably we progress to use of graphical analysis to visualize the
    data – first single feature plots (histograms for distributions and boxplots for
    outliers, for example) then multiple feature plots for looking at how features
    vary against a target variable (e.g., via a `pairplot`) or for multifeature analysis,
    for example, via correlation plots (Pearson’s correlation for continuous variables,
    or Spearman rank correlation for categorical variables^([^(56)](#fn56))).


    ![](images/527966_1_En_4_Chapter/527966_1_En_4_Fig4_HTML.jpg)


    A box and whisker plot represents the first, second, and third quartiles, minimum,
    median, and maximum values. A vertical line inside the box marks the median.


    Figure 4-4


    Boxplot interpretation for dealing with outliers


    ## Data Wrangling


    While EDA involves passively observing the data,^([^(57)](#fn57)) Data Wrangling
    is focused on actively changing the data in some way. There are a number of subprocesses
    here, described below as a desired sequence of steps, although many are iterative
    and, depending on the dataset, there can be many loopbacks to an earlier sub-process.


    **Data cleaning**: primarily dealing with incomplete data, that is, missing values,
    but formatting or dealing with invalid data such as negative ages or salaries,
    inaccurate data (incorrect application of a formula at source, e.g., profit),
    removing duplicates, and treating outliers are additional tasks that may be required.
    Dealing with missing values involves taking a decision as to whether the data
    can be (a) dropped outright (e.g., drop rows when < 1% values missing in a column
    or drop column when sparsity > 97%), (b) replaced with a proxy value: mean for
    normal distributions, median for skewed or mode for categorical variables, or
    (c) interpolated when more sophistication/performance tuning is required.


    Data cleaning also includes dealing with outliers. Outliers are problematic in
    machine learning as they can lead to overfitting, but equally outliers can be
    important to building sophisticated models. Ultimately a decision is taken about
    removing outliers, usually in conjunction with normalization and scaling techniques
    covered below:^([^(58)](#fn58))


    **Encoding** – involves transforming text (string) data to a numerical format.
    Most machine learning algorithms require all data to be numeric^([^(59)](#fn59))
    – there are two approaches: **ordinal encoding** when the field values have an
    underlying order (e.g., movie ratings – good 2, average 1, bad 0) and **nominal
    encoding** when the field values have no intrinsic order (e.g., gender). Nominal
    encoding is often referred to as **one hot encoding** due to the transformed appearance
    of the data resembling binary machine language (in the case of gender we would
    typically create 2 columns one for females (taking 0 or 1 values) and one for
    males.^([^(60)](#fn60))


    **Normalization** – normalization is the process of transforming a skewed field/variable
    distribution into a normal distribution. Log transforms are normally used for
    right-skewed distributions while power transforms are used for left-skewed.


    **Standardization (Scaling)** – refers to the process where data is brought under
    the same scale, with treatment different for data that is normally distributed
    (`StandardScaler` in Python) or skewed (`MinMaxScaler` or `RobustScaler`).


    ### Feature Engineering


    Data Wrangling is considered by some to include Feature Engineering – the process
    of selecting which features to use in a predictive model (i.e., in the machine
    learning training process). This process is highly iterative, occurring before
    and after each iteration of the machine learning training process.


    Feature Engineering includes manual processes such as dropping variables which
    are not likely to be good predictors in an ML model (such as Control IDs) or adding
    new derived features such as calculating the number of months that have elapsed
    since a customer made their last purchase.


    Typically feature engineering will also include a postprocess to looking at a
    correlation plot during EDA. Correlation plots (whether Pearson or Spearman) tell
    us two things: to what degree features are correlated to the target variable (and
    hence which are likely to be strong predictors), as well as how well features
    are correlated to each other.


    Care must be taken in the latter case to rule out **multicollinearity** – a variable
    dependency which can skew model performance and create model bias. Calculating
    the Variable Inflation Factor (VIF) for continuous variables and carrying out
    chi-square test(s) for categorical variables can be carried out in those cases
    where we suspect variable dependencies.


    Feature Engineering also includes automated techniques such as `KBest` (selecting
    the K best features which explain the variance of the target variable) or Recursive
    Feature Elimination (RFE) which eliminates features after fitting a model until
    a predefined number of features is reached.'
