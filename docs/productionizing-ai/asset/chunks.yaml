  trans: '

    ### 保险/远程信息处理


    保险公司的商业模式正在发生变化，人工智能正在迅速重塑该行业，并改变多项客户和内部服务：


    -   风险评估与风险管理，转向基于风险的定价

    -   客户细分定位

    -   个性化服务

    -   定制保费与承保费用

    -   理赔管理与运营流程自动化


    作为对传统精算方法的补充，利用来自车载远程信息处理的海量（富含客户行为）大数据进行动态的基于风险的定价，是汽车/车队保险领域一个特别令人兴奋的领域。然而，人工智能在所有保险领域的应用是显而易见的，例如通过社交媒体倾听客户声音，并根据捕获的客户态度数据，创造敏感、引人入胜或差异化的客户体验。


    ### 法律


    法律行业正在经历一场由人工智能技术带来的变革，尤其是在研究活动和合同方面。^(¹³²)


    详尽的分析超出了本文档的范围，但我们在图 8-21 中展示了一个关键的综合应用，该应用正被用于帮助法律文件数字化，并支持搜索、检索和归档流程——即通过 OCR（光学字符识别）进行文档分类和文本提取。


    ![](img/527966_1_En_8_Fig21_HTML.png)


    该框架展示了不同类型的模块、子流程、关键技术和集成点，以及模块的主要功能或目的。这些模块包括导入文档、扫描文档、准备图像数据、深度学习和文本提取。


    **图 8-21** 法律人工智能：通过 OCR 进行文档分类和文本提取实现文件数字化


    ### DALL-E 在创意艺术领域的应用：动手实践


    **生成式人工智能——从自然语言想象数字图像**


    本章我们还有一个实验——逐步实现人工智能领域最激动人心的发展之一：OpenAI 的 DALL-E。


    `DALL-E` 由一个自编码器（参见第 5 章）和一个变换器（第 8 章）组成——本质上，通过输入自然语言，我们可以随意召唤出任何图像。虽然本章没有讨论创意艺术行业的应用，但其应用显而易见：例如，从设计和时尚到建筑。


    在 OpenAI [`openai.com/join/`](https://openai.com/join/) 注册一个账户，并访问仪表盘右上角“个人”下提供的
    API 密钥。


    克隆以下 GitHub 仓库：


    [`github.com/bw-cetech/apress-10.9.git`](https://github.com/bw-cetech/apress-10.9.git)


    将 OpenAI API 密钥复制并粘贴到 `openai_credentials.py` 文件中定义的字符串的双引号内。


    在 Colab 中运行 Python 笔记本的步骤：


    -   安装 `openai`，然后注释掉代码

    -   导入库

    -   将 OpenAI 凭据文件拖放到 Colab 临时存储中

    -   使用给出的“拿着煎锅的牛”示例，运行单元格以调用 DALL-E 模型函数


    注意：调用 API 函数需要付费账户^(¹³³)——请确保您已按照笔记本中的说明先创建好账户。


    **练习（拓展）** – 修改代码，创建一张“骑自行车的宇航员”的图像。


    ## 总结


    以上法律视角为本章画上了句号。从电信和零售、金融服务、保险和政府、制造业、供应链和能源行业、医疗保健组织以及人力资源职能中面临的数字（和网络安全）挑战来看，我们对人工智能用例的梳理为最后一章^(¹³⁴)（关于人工智能的生产化）奠定了基础。


    尽管这些垂直行业性质迥异，但人工智能解决方案往往惊人地相似，在应用上具有“横向”特点，并且是可复用的。采用规模经济是合理的。因此，这将是我们在下一章中采取的方法——不仅描述开发、构建和部署稳健的即插即用人工智能解决方案的端到端流程和实施行动，而且还将通过本书最后两个端到端部署实验来加以说明。


