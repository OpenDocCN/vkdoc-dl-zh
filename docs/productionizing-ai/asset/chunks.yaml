  trans: "\n### Python 数据库管理：动手实践\n\n**从 Python 读写 SQL 数据库**\n\n本实验旨在整合 AI 解决方案的两个重要组成部分——数据存储与\
    \ Python，目标是使用 Python 向 SQL 数据库写入数据，然后再读取回来：\n\n1.  访问 [`www.sqlite.org/download.xhtml`](http://www.sqlite.org/download.xhtml)\
    \ 下载 SQLite，并获取适用于 Windows 的预编译二进制文件（包括 `sqlite-dll-win64-x64-3360000.zip` 和 `sqlite-tools-win32-x86-3360000.zip`）。\n\
    2.  在本地驱动器上创建文件夹 `C:\\sqlite`，并将上述两个文件解压到该文件夹中。\n3.  将 `C:\\sqlite` 添加为系统路径环境变量。\n\
    4.  在终端中输入以下命令测试安装：\n    ```\n    sqlite3\n    sqlite3 test.db\n    ```\n    后一步将创建一个名为\
    \ `test` 的测试数据库。\n\n现在（可选）安装 DB Browser [`https://sqlitebrowser.org/`](https://sqlitebrowser.org/)，以便查看本实验后续部分创建的\
    \ SQL 数据库和表。\n\n1.  从以下 GitHub 仓库下载 Python 笔记本：\n    [`https://github.com/bw-cetech/apress-9.1.git`](https://github.com/bw-cetech/apress-9.1.git)\n\
    2.  按照笔记本中的步骤执行以下操作：\n    1.  创建数据库。\n    2.  创建表。\n    3.  插入数据（单条记录）。\n    4.\
    \  运行选择查询。\n    5.  将从上述 GitHub 链接下载的 `“HRE-short.csv”` 文件导入 Python，然后批量导出到 SQLite。\n\
    \    6.  在 DB Browser 中查看数据。\n    7.  最后，将数据转换为 Python 中的 DataFrame。\n\n### 在\
    \ GCP 上构建应用：动手实践\n\n**在 GCP 上部署机器学习模型**\n\n在本实验中，我们将学习如何在 Google Cloud Platform\
    \ 上部署一个简单的机器学习模型。\n\n1.  在 GCP 上创建一个项目 [`https://console.cloud.google.com`](https://console.cloud.google.com)。\n\
    2.  通过以下链接使用 App Engine 创建一个应用： [`https://console.cloud.google.com/appengine`](https://console.cloud.google.com/appengine)。\n\
    3.  启动 GCP Cloud Shell 并连接到该项目。\n4.  在 Cloud Shell 中克隆以下 GitHub 链接中的示例模型：\n  \
    \  [`https://github.com/opeyemibami/deployment-of-titanic-on-google-cloud`](https://github.com/opeyemibami/deployment-of-titanic-on-google-cloud)\n\
    5.  在项目目录中运行 `gcloud init` 来初始化 `gcloud`。\n6.  按照以下链接中的步骤部署应用：\n    [`https://heartbeat.comet.ml/deploying-machine-learning-models-on-google-cloud-platform-gcp-7b1ff8140144`](https://heartbeat.comet.ml/deploying-machine-learning-models-on-google-cloud-platform-gcp-7b1ff8140144)\n\
    7.  从以下链接下载 Postman 桌面版： [`www.postman.com/downloads/`](http://www.postman.com/downloads/)\
    \ 并测试与应用的连接。\n\n### PowerBI – Python 握手：动手实践\n\n**预测分析的前端呈现**\n\n这个简短的实验将利用之前第\
    \ 3 章完成的“Python 数据摄取——英国气象局天气数据”实验，基于 Python 抓取的输出创建一个 PowerBI 前端。\n\n1.  如果尚未安装，请从以下链接下载\
    \ PowerBI Desktop：\n    [`https://powerbi.microsoft.com/en-us/downloads/`](https://powerbi.microsoft.com/en-us/downloads/)\n\
    \    并按照此处的步骤在 PowerBI 中设置 Python 路径：\n    [`https://docs.microsoft.com/en-us/power-bi/connect-data/desktop-python-scripts`](https://docs.microsoft.com/en-us/power-bi/connect-data/desktop-python-scripts)\n\
    2.  将第 3 章“英国气象局数据摄取”实验中完成的脚本粘贴到 PowerBI 的 `数据 > 更多 > 其他 > Python 脚本` 下。\n3. \
    \ 创建一个折线图，显示未来 5 天的最低和最高温度。请注意，你需要：\n    1.  将导入的列（预测值）转换为整数。\n    2.  将图表格式化为\
    \ PowerBI 中“演示级”的可视化效果。\n\n## AI 项目生命周期\n\n### 从设计思维到敏捷开发\n\n在了解了从实验到产品化的有效方法之后，如何从头开始实施一种方法呢？\n\
    \n激烈的竞争迫使组织需要快速改变战略，这促使公司仔细审视自身的能力和流程，并识别出适应性和创新方面的障碍与益处。采用最初的**设计思维**方法有助于驾驭这种颠覆性的格局，确保业务利益相关者、流程、工具、系统和数据接触点都被纳入范围。\n\
    \n**设计思维**作为一种创造性的问题解决过程，其关注点是人而非工具。如果做得好，一个关键成果就是产生一组项目来交付“正确的事情”。这些项目本身并不足以保证成功部署——但它们通常会融入\
    \ DataOps 的基石之一——专注于“把事情做对”的**敏捷**开发和交付。图 9-4 阐释了这一概念：\n\n![](img/527966_1_En_9_Fig4_HTML.jpg)\n\
    \n该图解释了三个圆圈，分别是：探索问题、构建正确的事情、把事情做对。每个圆圈内分别提到了设计思维、精益和敏捷。\n\n**图 9-4** 设计思维、精益与敏捷（来源：Jonny\
    \ Schneider）\n\n### 通过假设驱动开发\n\n在 AI 项目中，敏捷开发是什么样的？**假设驱动开发**是一种原型方法论，它允许解决方案架构师（以及数据科学家和\
    \ AI 工程师）开发、测试并重建一个产品，直到用户满意为止。\n\n该过程高度迭代，它获取项目期间定义的假设，并尝试通过用户/客户反馈来验证这些假设。与“传统”的需求捕获（后者容易产生类似于“瀑布”方法中的错误）相比，这些假设更具演进性，它们认识到世界是复杂、多变且常常令人困惑的。\n\
    \n如图 9-5 所示，总体思路是尽早并频繁地进行实验，征求客户反馈，并舍弃那些益处甚微的功能。\n\n![](img/527966_1_En_9_Fig5_HTML.jpg)\n\
    \n该图由六个呈椭圆形排列的圆圈组成。在椭圆形的中间，有七个六边形。\n\n**图 9-5** IBM Garage 假设驱动开发\n\n### 协作、测试、衡量、重复\n\
    \n正如本章引言中提到的，2010 年代雇佣数据专家的公司缺乏远见，导致了**技术债务**的巨额积累。结果并非完全集成的 AI（利益相关者！）和解决方案，而是系统在缺乏维护、监控和更新的流程与工具的情况下被部署。^(¹³⁶)\n\
    \nDataOps 中的**持续测试**是帮助解决这些问题的一种手段。表面上，它旨在预先建立对数据的信任，并在信任丧失之前减少识别和修复问题所需的时间：\n\
    \n- **版本控制** – 使用 `git`、GitHub 来改善协作。\n- **自动化测试** – 自动化测试：帮助加速创新生命周期和变更流程。\n\
    - **衡量错误** – 跟踪并降低月度生产错误率。\n- **跟踪生产力** – 对流程改进和交付时间进行基准测试。\n"
- fmt: "### Continual Process Improvement\n\nHow exactly do we track productivity\
    \ and benchmark process improvements in an AI project?\n\nBusiness Intelligence\
    \ dashboards are perfect for reporting DataOps KPIs, particularly when automated\
    \ orchestration is embedded to collect and display metrics.\n\nA `CDO` dashboard,\
    \ for example, can be built to track and monitor metric progress such as:\n\n\
    - **Team collaboration** – creation of “kitchens” for each team project\n- **Error\
    \ rates** – over time these should decrease as testing matures and the number\
    \ of tests increases\n- **Productivity** – measured by number of tests and data\
    \ pipeline steps (keys)\n- **Deployments** – tracking, for example, mean deployment\
    \ cycle times, trend reduction in SLA breaches\n- **Tests** – volume of tests\
    \ should increase over time, as should prevalence of more robust quality control\n\
    \n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig6_HTML.jpg)\n\nThe horizontal\
    \ bar graph is titled tornado diagram. The negative side of the bar chart is represented\
    \ as operational impact. The positive side of the bar chart is represented as\
    \ hours to resolve.\n\n**Figure 9-6** – DataKitchen Tornado chart showing operational\
    \ impact of production issues and the time required to resolve them\n\n### Data\
    \ Drift\n\nAny continuous improvement cycle for delivering and deploying an AI\
    \ solution also needs resiliency in the face of post deployment interface/data\
    \ changes, including robust data drift mitigation and model re-training.\n\nDegradation\
    \ in model performance over time is usually attributed to one of (a) data (or\
    \ covariate) drift or (b) concept drift, that is, when data distributions have\
    \ deviated significantly from those of the original training set:\n\n- **Data\
    \ drift** refers to feature drift and the possibility that relationships between\
    \ features change over time\n- **Concept drift** refers to changes in the target\
    \ variable\n\nThe recommended way to manage model drift is to implement DataOps/MLOps\
    \ best practice and track changes to underlying data including correlations between\
    \ features, either, for example, in a separate Python tracking script or an operational\
    \ (as opposed to strategic/CDO) dashboard.\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig7_HTML.jpg)\n\
    \nThe graph plots accuracy versus months. A dashed line passes through the graph\
    \ to determine the accepted performance threshold.\n\n**Figure 9-7** – Model degradation\
    \ over time as a result of data drift (Source: [`www.kdnuggets.com`](http://www.kdnuggets.com))\n\
    \n### Automated Retraining\n\nOnce we have started tracking data drift, we need\
    \ to implement a process to ensure our model remains valid/performant. Ideally,\
    \ this should be automated – to implement an automated retraining process based\
    \ on data/model drift, there are two main options:\n\n**Scheduled retraining**\n\
    \n1. In an end-of-day (EOD) process, archive the oldest day from the training\
    \ set, and add in the new day of data\n2. Schedule a retrain process each month\
    \ (or each day if especially dynamic data)\n3. Evaluate new performance and check\
    \ whether performs better than previous run(s)\n4. Use a `cron` job/job scheduler\
    \ or, for example, `AWS CloudWatch Event` to trigger a Step Function orchestration\
    \ of data prep, training, evaluation, and deployment\n\n**Performance-based/Dynamic\
    \ Retraining**\n\n1. Collect new daily training data\n2. Automatically monitor\
    \ the performance of model in production on new data and determine if it is suddenly\
    \ under-performing\n3. Measure mean prediction and standard deviation. If prediction\
    \ falls by 10% over a certain time interval, or outside, for example, 2 or 3 standard\
    \ deviations then trigger a parallel (retrain) run\n4. Manage retraining via scheduled\
    \ `AWS Lambda`/`Step Functions`, or `IBM Watson Machine Learning` continuous learning\n\
    5. Continue to track all historic retraining runs (e.g., with `MLFlow` in `Databricks`)\
    \ to ensure performance (`fbeta`, `recall`/`precision`, `loss`/`accuracy`, etc.)\
    \ doesn’t degrade over time\n\n### Hosting on Heroku – End-to-End: Hands-on Practice\n\
    \nFROM DEV TO PRODUCTION\n\nOur next lab takes a boiler plate app and pushes it\
    \ to cloud as a Heroku-hosted application:\n\n1. Sign up on Heroku at [`www.heroku.com/`](http://www.heroku.com/)\n\
    2. Create a new app in Heroku in the Europe region, for example, `my-heroku-app`\n\
    3. Install the Heroku CLI\n4. Clone the boilerplate application at the link below:\n\
    \n   [`https://github.com/bw-cetech/apress-9.2.git`](https://github.com/bw-cetech/apress-9.2.git)\n\
    \n5. Set up a Virtual Environment as described in Chapter 7 and install the dependencies\n\
    6. Exercise – try to run the app locally\n7. After `cd`’ing into the cloned app\
    \ on your local drive, login to Heroku from your terminal with `heroku login`\
    \ then push to Heroku by entering the following commands in sequence:\n\n   ```\n\
    \   git status # local repo should already be initialised\n   git add .\n   git\
    \ commit -am \"updated python runtime to heroku supported stack version 3.9.7\"\
    \n   git push heroku master\n   ```\n\n8. Finally, open your Heroku app by going\
    \ to the url [`https://my-heroku-app.herokuapp.com/`](https://my-heroku-app.herokuapp.com/)\
    \ or by typing `heroku open` in terminal\n9. Exercise: still in terminal, try\
    \ to rename your app\n\n## Enabling Engineering and Infrastructure\n\nPeople,\
    \ processes, and tools are the three cornerstones of any best practice framework\
    \ including productionizing an AI application. Starting with the AI Cloud Stack,\
    \ we take a look in this short section at bringing together as a coherent AI solution\
    \ some of the engineering and infrastructure tooling discussed in previous chapters.\n\
    \n### The AI Ecosystem – The AI Cloud Stack\n\nAs seen in Chapter 3, successful\
    \ AI requires an end-to-end Cloud Infrastructure and especially agile (scalable\
    \ and elastic) services for handling Big Data, from data ingestion, collection,\
    \ processing, storage, querying through data visualization. Besides data handling,\
    \ “scale-up” scalability and “scale-out” elasticity are crucial supporting resource\
    \ requirements in the handling of user traffic, and specific patterns of usage\
    \ on the end AI application.\n\nWhether our solution is served by a thick client\
    \ application or a thin client, key storage (or data), such as a Data Lake or\
    \ NoSQL database, and compute, such as a Virtual Machine or Apache Spark will\
    \ serve the underlying AI services and tools we use in developing and ultimately\
    \ deploying our project. Figure 9-8 describes this ecosystem of supporting infrastructure\
    \ for AI.\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig8_HTML.jpg)\n\n\
    A set of three dialog boxes titled AI services, AI infrastructure, and AI tools\
    \ appear on the image. The AI infrastructure has subtitles AI data, and AI compute.\n\
    \n**Figure 9-8** – AI Ecosystem: Infrastructure, Tools, and Services"
