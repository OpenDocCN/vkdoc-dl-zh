- fmt: "### Time Series Forecasting\n\nAs mentioned in Chapter [1](#527966_1_En_1_Chapter.xhtml),\
    \ the use of AI in forecasting is trending right now. We will take a look at the\
    \ specific application of neural networks and deep learning in the next chapter\
    \ as well as AutoAI approaches in Chapter [6](#527966_1_En_6_Chapter.xhtml)^([^(49)](#fn49))\
    \ but there are plenty of machine learning applications as well which expand on\
    \ traditional regression techniques: Autoregression (`AR`), Moving Average (`MA`),\
    \ Autoregressive Moving Average (`ARMA`), Autoregressive Integrated Moving Average\
    \ (`ARIMA`), and Seasonal Autoregressive Integrated Moving-Average (`SARIMA`).\n\
    \nFacebook’s open-sourced algorithm `fbprophet` for time series forecasting is\
    \ particularly popular.^([^(50)](#fn50)) The algorithm automates forecasting on\
    \ time series data with nonlinear trends, seasonality, and holiday effects, capturing\
    \ the four key time series components: secular trends, seasonal variations, cyclical\
    \ variations, and irregular variations. Rather than relying on any one approach\
    \ however, and in line with common practice in machine learning, multiple algorithmic\
    \ techniques (such as `ARIMA`, `fbprophet`, and `RNNs`) are generally employed\
    \ and compared before the final model selection for the specific forecasting use\
    \ case.\n\n### Introduction to fbprophet: Hands-on Practice\n\n**FORECASTING DEMAND\
    \ FOR THE CONSTRUCTION SECTOR**\n\nUsing Python in Jupyter Notebook, the goal\
    \ of this exercise is to introduce `fbprophet` as an accelerator for forecasting.\
    \ In this specific case we forecast UK quarterly housing demand, but adaptability\
    \ of the code sample supports easy swapping out of the data for other sectoral/industry\
    \ forecasts.\n\n1.  Clone the GitHub repo `https://github.com/bw-cetech/apress-4.2.git`\n\
    2.  Running the notebook in Colab,^([^(51)](#fn51)) walk-through the code sample\n\
    3.  The code will\n    1.  Import `fbprophet` (now renamed `prophet`)\n    2.\
    \  Import construction data from the Office of National Statistics\n    3.  Wrangle\
    \ the data into the required format (showing quarterly time series for UK Public\
    \ Housing Output)\n    4.  Derive `fbprophet` forecasting components from the\
    \ data\n    5.  Output a ten-year forecast\n4.  Exercise (stretch): repeat the\
    \ exercise to forecast at monthly level\n5.  Exercise (stretch): automate the\
    \ data import to read in the latest data (i.e., pick up the latest quarter)\n\n\
    ## Unsupervised Machine Learning\n\nUnsupervised machine learning is all about\
    \ identifying hidden patterns in data, specifically when there is no “labeled”\
    \ data to tell us otherwise. Clustering is the predictive modeling technique but\
    \ we also take a look in this section at unsupervised ML as means to reduce “Big\
    \ Data” datasets.\n\n### Clustering\n\nWith unsupervised machine learning, we\
    \ have no labeled data or “ground truth,” so the goal of predictive modeling in\
    \ this context is instead to identify an unseen pattern on the underlying data.\
    \ These patterns are identified as “clusters” often over multiple dimensions,\
    \ where intracluster distances (the distance between datapoints within a cluster)\
    \ are minimized and intercluster distances (distance between separate clusters)\
    \ are maximized.\n\nBecause of its inherent ability to find hidden patterns in\
    \ BIG datasets running into hundreds, thousands, or even more parameters/features,\
    \ unsupervised clustering is ideally suited to mine customer data buried in a\
    \ CRM platform (or multiple systems) and for anomaly detection. Given a specific\
    \ number of groupings (clusters), an unsupervised machine learning approach can\
    \ throw up customer segments which have some degree of commonality (high spend,\
    \ low to mid income, located in a specific region, etc.). Equally after training\
    \ an unsupervised machine learning model on the data, anomalies in the data stand\
    \ out as isolated clusters, as shown in Figure [4-2](#527966_1_En_4_Chapter.xhtml#Fig2).\n\
    \n![](images/527966_1_En_4_Chapter/527966_1_En_4_Fig2_HTML.jpg)\n\nScatterplot\
    \ of training data, resulting model and applied to new input of supervised and\
    \ unsupervised learnings are exposed. The training examples of unsupervised learning\
    \ do not have ground truth labels.\n\nFigure 4-2 Supervised vs. unsupervised ML\
    \ (Source: ResearchGate)\n\n### Dimensionality Reduction\n\nDimensionality Reduction\
    \ is also considered an unsupervised technique. Here the idea is that a machine\
    \ learning algorithm is used to simplify (reduce) the data, often from thousands\
    \ of underlying features into tens of features.\n\nThe process of reducing the\
    \ number of dimensions in your data can of course be carried out in both a manual\
    \ way (by dropping unwanted features) or automated via an algorithm. The main\
    \ unsupervised technique used is Principal Component Analysis, where the data\
    \ is “collapsed” into a form that statistically resembles the original data.\n\
    \nWhile this approach can greatly reduce datasets and improve runtime/performance,\
    \ it is not strictly a Machine Learning modeling technique in the normal sense\
    \ as the outcome in this case is another dataset, albeit compressed, rather than\
    \ a trained model.\n\n### Unsupervised Machine Learning (Clustering): Hands-on\
    \ Practice\n\n**K-MEANS APPLIED TO AERIAL LIDAR POINT CLOUD DATASET**\n\nUsing\
    \ Python in Jupyter Notebook, the goal of this exercise is to apply unsupervised\
    \ machine learning technique (using the K-Means algorithm^([^(52)](#fn52))) to\
    \ a LIDAR dataset – here an unlabeled “point cloud”^([^(53)](#fn53)) representing\
    \ an airport terminal:\n\n1.  Clone the GitHub repo below:\n    `https://github.com/bw-cetech/apress-4.3.git`\n\
    2.  Walk-through the Python code in Jupyter notebook step by step:\n    1.  Import\
    \ the data\n    2.  Point Cloud quick selection – flatten data to 2D\n    3. \
    \ Point Cloud Filtering\n    4.  K-Means Clustering Implementation\n3.  Exercise\
    \ – display an “elbow plot” to compare different values of `k` – is `k=2` optimal?\n\
    4.  Exercise (stretch) – try to apply the same technique to the car dataset provided\
    \ in the GitHub link above\n\n## Semisupervised Machine Learning\n\nNot strictly\
    \ a technique in its own right, semisupervised machine learning essentially involves\
    \ two processes: unsupervised machine learning followed by supervised (classification\
    \ or regression). As such, semisupervised machine learning uses both unlabeled\
    \ and labeled data for training – typically a large amount of unlabeled data and\
    \ a small amount of labeled data.\n\nA large amount of unsupervised data is used\
    \ as unlabeled data is less expensive and takes less effort to acquire – semisupervised\
    \ learning is useful when the cost associated with labeling (often involving annotation\
    \ by subject matter experts) is too high to allow for a fully labeled training\
    \ process.\n\nFor the above reasons, semisupervised machine learning is often\
    \ adopted by businesses and organizations looking to scale an AI strategy, but\
    \ there are also applications such as identifying a person's face on a (low-quality)\
    \ webcam, which rely on only a few labeled training images^([^(54)](#fn54)) and\
    \ are able to achieve high performance."
