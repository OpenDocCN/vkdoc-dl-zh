  trans: "\n### 神经网络集成\n\n与随机森林是决策树模型的增强版以防止机器学习中的过拟合类似，我们可以在深度学习中采用集成方法——使用不同模型配置的多个神经网络来防止同样的问题。然而，这确实会带来训练和维护多个模型的计算开销。更好的方法是使用下文所述的丢弃法。\n\
    \n### 批量归一化\n\n深度神经网络的训练过程也对初始随机权重和学习算法的配置很敏感。对网络层的输入进行归一化（`批量归一化`）可以通过对数据进行中心化和缩放，帮助人工神经网络运行得更快、更稳定。\n\
    \n### 池化\n\n卷积神经网络中的多个卷积层可以非常有效，既能学习低级特征（例如线条），也能学习高级特征，如外层中的形状或特定物体。\n\n然而，这些“特征图”与输入中特征的**精确**位置紧密相关。这种“不灵活性”可能导致对于微小的图像变化（如裁剪、旋转、平移）产生不同的特征图，从而导致模型对新数据的泛化能力下降。\n\
    \n池化（通过池化层实现）用于对卷积神经网络中的卷积层进行下采样，并避免过拟合于精确的图像特征。这种输入信号的低分辨率版本仅保留重要的结构元素，类似于机器学习中“剪枝决策树”的效果。\n\
    \n### 图像增强\n\n图像数据增强用于人为地扩大卷积神经网络训练数据集的大小。其理念是，在更多数据上训练意味着模型更熟练。使用 Keras 中的 `ImageDataGenerator`\
    \ 类来生成增强图像的批次，我们可以通过多种方式实现这一点：\n\n*   图像的随机旋转\n*   图像内物体的平移\n*   剪切（沿轴扭曲）\n* \
    \  图像翻转（例如，上下翻转）\n\n![](img/527966_1_En_5_Fig27_HTML.jpg)\n\n一张猫的增强图像，包含 8 个图像数据集，这些数据集由原始图像的旋转、偏移和扭曲副本组成。\n\
    \n**图 5-27** Keras 中的图像增强，使用原始图像的旋转、偏移或扭曲副本来增强图像数据集\n\n## 过程调优\n\n### 轮数与批量大小\n\
    \n增加轮数（对整个训练集的完整采样）通常会产生更好的性能，但仅限于一定程度。当验证（测试）准确率下降而训练准确率仍在上升时，这应该为轮数设置一个上限，否则我们本质上是在过拟合模型。与其反复试验，我们可以通过实施早停标准来控制轮数设置过高的问题，以避免在训练集上过拟合。\n\
    \n我们的批量大小——前向传播中使用的输入数据样本的大小——是我们可以使用的另一个杠杆。使用过大的批量大小会对泛化产生负面影响，也就是说，网络的测试准确率会更差，因为我们在训练过程中减少了梯度下降的随机性。对于较大的数据集（例如，>\
    \ 10,000 张图像），经验法则是首先使用默认值 32，如果模型欠拟合或训练时间过长，则增加到 64、128 和 256。\n\n### 学习率\n\n\
    学习率是一个超参数，用于影响梯度下降过程的速度。设置过高意味着算法会来回震荡而无法达到局部最小值，而设置过低则收敛可能需要很长时间。\n\n### 正则化\n\
    \n正则化是一种修改学习算法的通用技术，目的是使模型更好地泛化，即避免过拟合。在机器学习中，正则化惩罚特征系数，而在深度学习中，正则化惩罚节点/神经元的权重矩阵。\n\
    \n正则化系数（一个超参数）控制正则化——如果这个正则化系数过高，以至于某些权重矩阵几乎等于零，我们就会得到欠拟合。L1 和 L2 是最基本的正则化类型，它们通过添加另一个称为正则化项的项来更新通用代价函数：\n\
    \n![](img/527966_1_En_5_Fig28_HTML.jpg)\n\n一个说明适当模型拟合的示意图。它在 y 轴和 x 轴之间形成一个侧抛物线。\n\
    \n**图 5-28** 适当的模型拟合\n\n`代价函数 = 损失 + 正则化项`\n\n### 丢弃法\n\n当数据集相对较小时，深度学习神经网络容易过拟合。丢弃法是一种计算成本低且有效的正则化方法，用于减少过拟合并改善泛化误差。实际上，丢弃法通过在训练期间随机丢弃节点（神经元），在单个模型中模拟了大量不同的网络架构。^(⁷⁹)\n\
    \n丢弃法的一个良好起点是将其设置为 20%，如果模型影响很小，则增加到例如 50%。设置过高会导致欠拟合。\n\n![](img/527966_1_En_5_Fig29_HTML.jpg)\n\
    \n两个模型示意图说明了丢弃法。标准神经网络和应用丢弃法后的标准神经网络。标准神经网络具有相同的神经元或节点，而应用丢弃法后，绿色神经元与红色神经元混合。\n\
    \n**图 5-29** 丢弃法示意图 ([`medium.com`](http://medium.com))\n\n### 早停\n\n我们应该在验证数据集上的性能开始下降时停止训练，例如，通过以下方式：\n\
    \n*   在给定轮数内指标无变化\n*   指标的绝对变化\n*   在给定轮数内观察到的性能下降\n*   在给定轮数内指标的平均变化\n\n这在 Keras\
    \ 中使用 `EarlyStopping` 函数实现。下面的示例监控并试图最小化各轮次的验证损失：\n\n```\nEarlyStopping(monitor='val_loss',\
    \ mode='min')\n```\n\n![](img/527966_1_En_5_Fig30_HTML.jpg)\n\n一个显示轮数与误差的折线图。折线图在停止训练后上升。\n\
    \n**图 5-30** Keras 中的早停\n\n### 迁移学习\n\n迁移学习实际上是深度学习模型的“加速器”——本质上，我们是将一个预训练模型作为另一个（不同但相关）模型的起点。在深度学习中，它常用于减少从头开发神经网络模型所需的计算量，有许多研究模型常用于迁移学习：\n\
    \n*   牛津 VGG 模型\n*   谷歌 Inception 模型\n*   微软 ResNet 模型\n    *   另请参见 [`https://github.com/BVLC/caffe/wiki/Model-Zoo`](https://github.com/BVLC/caffe/wiki/Model-Zoo)\n\
    \nVGG 模型用于我们上述动手实验中的迁移学习练习（使用 Keras 和 TensorFlow 的卷积神经网络）。\n"
- fmt: "# Wrap-up\n\nThe exhaustive neural network and process tuning that we have\
    \ just walked through is clearly complex. The best practice techniques described\
    \ are often rather vague and the range of options available/settings to configure\
    \ can be difficult to pin down, especially if results are required relatively\
    \ quickly. But quick wins are always possible and perseverance in achieving better\
    \ results is usually rewarded provided a structured approach is adopted and performance\
    \ iteratively monitored.\n\nWhile we may have reached the end of this chapter,\
    \ our next chapter will take a look at how we can couple best practice in deep\
    \ learning with training (and testing) automation to help accelerate the process\
    \ of fine-tuning both machine and deep learning models. Before we go there though,\
    \ we complete this chapter with two deep learning model tuning labs.\n\n## Softmax:\
    \ Hands-on Practice\n\nACTIVATING LOGITS WITH SOFTMAX\n\n**Simple hands-on lab\
    \ to see how the Softmax activation function takes the last neural network layer\
    \ and turns output into probabilities that sum to one:**\n\n1.  Clone the GitHub\
    \ repo below:\n\n    [`https://github.com/bw-cetech/apress-5.6.git`](https://github.com/bw-cetech/apress-5.6.git)\n\
    \n2.  Run through the Python code in Jupyter Notebook to see how softmax is computed.\n\
    \n3.  As a stretch exercise try to create a Python function which stores the softmax\
    \ activation formula and call the function.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig31_HTML.jpg)\n\
    \nAn equation reads e superscript y i over sigma from j equals to zero to n, e\
    \ superscript y j.\n\nFigure 5-31\n\nSoftmax activation function\n\n## Early Stopping:\
    \ Hands-on Practice\n\nAVOID OVERFITTING IN DEEP LEARNING\n\n**In this lab, we\
    \ will continue with our German traffic light image classification dataset and\
    \ look at the impact of early stopping criteria on model performance:**\n\n1.\
    \  Continue with the notebook from earlier (Convolutional Neural Networks with\
    \ Keras and TensorFlow: Hands-on Practice)\n\n2.  Run through the remainder of\
    \ the notebook from “2nd Run –Early Stopping Criteria”\n\n3.  Complete the exercises\
    \ as part of the lab\n\nFootnotes [1](#527966_1_En_5_Chapter.xhtml#Fn1_source)\
    \ [2](#527966_1_En_5_Chapter.xhtml#Fn2_source) [3](#527966_1_En_5_Chapter.xhtml#Fn3_source)\
    \ [4](#527966_1_En_5_Chapter.xhtml#Fn4_source) [5](#527966_1_En_5_Chapter.xhtml#Fn5_source)\
    \ [6](#527966_1_En_5_Chapter.xhtml#Fn6_source) [7](#527966_1_En_5_Chapter.xhtml#Fn7_source)\
    \ [8](#527966_1_En_5_Chapter.xhtml#Fn8_source) [9](#527966_1_En_5_Chapter.xhtml#Fn9_source)\
    \ [10](#527966_1_En_5_Chapter.xhtml#Fn10_source) [11](#527966_1_En_5_Chapter.xhtml#Fn11_source)\
    \ [12](#527966_1_En_5_Chapter.xhtml#Fn12_source) [13](#527966_1_En_5_Chapter.xhtml#Fn13_source)\
    \ [14](#527966_1_En_5_Chapter.xhtml#Fn14_source)\n\n# 6. AutoML, AutoAI, and the\
    \ Rise of NoLo UIs\n\nIn what is still so far a relatively short space of time,\
    \ growth in machine and deep learning implementations in organizations across\
    \ the world has been extraordinary. However, this hasn’t always translated into\
    \ commercial success, with disappointingly low adoption rates in the retail sector\
    \ (11.5% in the UK^([^(80)](#fn80))) and just over 50% of prototypes ending up\
    \ in production across all industries.^([^(81)](#fn81)) Historically many solutions\
    \ have been operationally siloed with PhD-level statisticians left to explain\
    \ code-heavy technical models.\n\nCoupled with a reliance on dummy or synthetic\
    \ datasets for training, an absence of, or worse, broken interfaces with training\
    \ and testing done in a Python notebook (`Jupyter`, `Colab`, etc.) and the “technical\
    \ debt” associated with these poorly designed applications starts to become a\
    \ burden to the organization.\n\nRoll forward to today and we are starting to\
    \ see a rise in the rollout of “AutoML”^([^(82)](#fn82)) and “AutoAI” tools far\
    \ better equipped for an enterprise-wide deployment – from fully automated data\
    \ import, through interface orchestration, machine/deep learning, and deployment.\
    \ Moreover, these tools are increasingly more usable, and, importantly, understandable\
    \ to multiple stakeholders across departments by virtue of built-in user-friendly\
    \ “NoLo” GUIs and embedded data traceability and auditability.\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig1_HTML.jpg)\n\
    \nA horizontal bar chart of the percentages of production and evaluation of auto\
    \ M L tools. Amazon sagemaker and hyperparameter tuning has a high number of productions\
    \ and Microsoft azure auto ML has high in evaluating.\n\nFigure 6-1\n\nUse of\
    \ AutoML tools (Source: O'Reilly AI Adoption in the Enterprise 2022)\n\nThe step\
    \ change in use, and collaboration across AutoML/AI tools and so-called NoLo,\
    \ or no/low code applications,^([^(83)](#fn83)) is coming at a time companies\
    \ shift from ”rule-based” robotic process automation (RPA) to enhanced cognitive\
    \ robotic process automation (CRPA) with AI-infused “context.”\n\nPerhaps this\
    \ is nowhere more apparent than in the evolution of chatbots where intelligent\
    \ virtual agents (IVAs) or “conversational” chatbots have supplanted legacy, rule-based\
    \ chatbots, but the trend is also evident in the proliferation of augmenting tools\
    \ such as Microsoft PowerAutomate on top of PowerBI, NLP/text analytics on top\
    \ of optical character recognition (OCR) and specific sectoral enhancements such\
    \ as (X-Ray) diagnostics (AI) on top of patient screening (RPA) in the healthcare\
    \ industry.\n\nThe drive for this business transformation is in essence a pursuit\
    \ of an “Employer’s Dream” – the democratization of tools which are universally\
    \ popular, highly visual, and collaborative yet are able to perform often complex\
    \ predictions on future outcomes for the organization. As such the aims of this\
    \ chapter are to start readers on a path to meet this goal, developing a “production\
    \ mindset\" to deliver \"enterprise-wide, full-integration, full-stack\" AI applications\
    \ and solutions.\n\nAfter first revisiting the end-to-end machine learning process\
    \ and an introduction to Bayesian Optimization as the basis for AutoML, we will\
    \ take a hands-on look at Python model automation libraries before focusing on\
    \ the growing ecosystem of automated AI tools. By no means exhaustive, our labs\
    \ in this chapter will focus on a number of the leading best-of-breed NoLo tools\
    \ for AutoML and AutoAI including IBM Cloud Pak for Data, Azure Machine Learning,\
    \ and Google Teachable Machines."
