  trans: "\n# 变换器与注意力模型\n\n序列到序列模型在处理较短句子时表现良好，但较长句子往往会加重底层编码器-解码器网络的内部记忆负担。近年来发展出了变换器模型，其中引入了增强型注意力机制或注意力模型，迫使模型关注输入序列的特定部分。\n\
    \n本质上属于“大规模”深度学习模型，变换器可以通过 [Hugging Face](https://huggingface.co/) 库在 Python 中实现。谷歌的\
    \ `BERT`（来自变换器的双向编码器表示）、OpenAI 的 `GPT-3`（生成式预训练变换器）^(¹⁷⁷) 以及艾伦人工智能研究所的 `ELMo`（来自语言模型的嵌入）是其中最大的三个模型。\n\
    \n围绕 `GPT-3` 尤其存在大量炒作，源于该技术能够轻松利用基于数十亿参数预训练的模型来撰写文章和论文^(¹⁷⁸)，甚至重现古代哲学家之间的对话^(¹⁷⁹)。本章开头提到的谷歌仅解码器变换器语言模型\
    \ `LaMDA`（对话应用语言模型）^(¹⁸⁰)，可以说是下一代模型，它基于 1370 亿个参数和数万亿条公共对话数据进行了预训练。\n\nPython\
    \ 封装库 `bert-extractive-summarizer` 利用 HuggingFace PyTorch 变换器库，可生成长文本的摘要。^(¹⁸¹)\
    \ 通过在 OpenAI 注册个人使用账户后安装 `openai` 库并获取 API 密钥，即可在 Python 中实现 `GPT-3`。\n\n## 词嵌入：动手实践\n\
    \nWORD2VEC 可视化\n\n现在我们来看本节讨论的一些技术，首先介绍如何实现 Word2Vec 来向量化非结构化数据，并绘制生成的词嵌入：\n\n\
    1.  克隆以下 GitHub 仓库：\n\n    [`​github.​com/​bw-cetech/​apress-10.​3.​git`](https://github.com/bw-cetech/apress-10.3.git)\n\
    \n2.  在 Jupyter 或 Colab 中运行 Python 笔记本步骤，以：\n    1.  从 `intents.json` 文件导入数据\n\
    \    2.  结合使用词汇、句法和语义技术清洗数据\n    3.  对数据进行分词，并使用 Word2Vec 构建模型\n    4.  显示模型词汇表\n\
    \    5.  查看一个样本词嵌入向量\n    6.  绘制所有词嵌入\n\n3.  练习 – 提高词嵌入图中词标签的可见性\n\n4.  练习（拓展）\
    \ – 将 json 意图数据替换为更大的 10 页以上 PDF，并在绘制词嵌入前执行主题建模\n\n## Seq2Seq：动手实践\n\n用于语言翻译的编码器-解码器模型\n\
    \n本实验的目标是使用 Keras 和 LSTM 深度学习，实现一个字符级序列到序列模型，将英语翻译成法语^(¹⁸²)\n\n1.  克隆以下 GitHub\
    \ 仓库：\n\n    [`​github.​com/​prasoons075/​Deep-Learning-Codes/​tree/​master/​Encoder%20​Decoder%20​Model`](https://github.com/prasoons075/Deep-Learning-Codes/tree/master/Encoder%2520Decoder%2520Model)\n\
    \n2.  使用 Jupyter 笔记本打开 `Encoder_decoder_model`\n\n3.  运行数据准备单元格：\n    1.  显示用于训练的样本翻译数量\n\
    \n        注意：你需要将训练数据的路径链接从 `fra.txt` 更改为 `fra-eng/fra.txt`\n\n    2.  对数据进行向量化，并显示唯一输入和输出令牌的数量以及最大序列长度\n\
    \n    3.  定义编码器-解码器架构\n\n4.  在训练语言样本上训练序列模型/LSTM – 注意运行 100 个周期可能需要 5-10 分钟\n\n\
    \    注意：如果遇到错误 `NotImplementedError: Cannot convert a symbolic Tensor`，请在 Colab\
    \ 中运行笔记本（打开笔记本 > GitHub > 输入上述 GitHub 源 URL，直接从 GitHub 打开 `Encoder_decoder_model`。注意，你还需要将\
    \ GitHub 源 `Encoder Decoder Model/fra-eng` 文件夹中的 `fra.txt` 数据文件拖放到默认的 Colab 临时存储（内容）文件夹中）\n\
    \n5.  模型在上一步中保存。重新导入该模型，并设置解码器模型用于采样/测试模型\n\n6.  最后，使用训练集中的几个序列（最多 10000 个）测试模型，观察模型如何翻译英语术语\n\
    \n7.  练习 – 调整笔记本以支持一个基本的（笔记本内）用户界面，用户输入的短语将被翻译成法语\n\n![](img/527966_1_En_10_Fig9_HTML.jpg)\n\
    \n该图包含 18 种语言，按水平和垂直方向排列。右侧有一个带有渐变颜色的比例尺，范围从 0 到 0.8。\n\n图 10-9\n\n使用 PyTorch\
    \ 进行姓氏语言分类\n\n## PyTorch NLP：动手实践\n\n使用 PyTorch 进行文本分类\n\n本实验的目标是通过将文本示例作为一系列字符读取，然后使用\
    \ PyTorch 构建并训练一个循环神经网络（RNN），来预测姓氏来自哪种语言\n\n1.  将以下链接中的两个文件上传到 Jupyter 笔记本：\n\n\
    \    [`​github.​com/​bw-cetech/​apress-10.​3b.​git`](https://github.com/bw-cetech/apress-10.3b.git)\n\
    \n2.  将 `PyTorch_Functions.py.txt` 文件重命名，去掉 `.txt` 扩展名，以转换为 Python 脚本^(¹⁸³)\n\n\
    3.  打开 `.ipynb` 文件\n\n4.  使用以下命令安装 PyTorch：\n\n    ```\n    import torch\n   \
    \ ```\n\n5.  运行笔记本，将 PyTorch RNN 函数（位于 `PyTorch_Functions.py` 中）导入到笔记本中\n\n6.\
    \  执行所示的练习：\n    1.  显示一个三维（随机）张量以测试 PyTorch 库的导入\n    2.  下载此问题的训练数据字典（18 种不同语言的姓氏），解压并在\
    \ Jupyter 工作目录中重命名\n    3.  显示葡萄牙语字典中的最后五个名字，以测试 PyTorch 自定义函数\n    4.  观察模型在测试集上的性能（如下图所示），并将预测结果和损失似然输出（测试样本名称属于某种语言的概率）导出为\
    \ csv 文件\n\n7.  练习（拓展） – 调整导入的数据字典集，以解决不同的 NLP 分类器问题，例如预测 (a) 名字到性别、(b) 字符到作者或\
    \ (c) 城市到国家等。\n\n## NLP 工具与应用\n\n在本最后一章的最后一节中，我们将介绍一些知名的开源和工业级 Python 库，然后分析当今使用的主要自然语言应用和工具。最后，我们将通过最终的动手实验，解决一些关键的\
    \ NLP 用例和工具，包括一个端到端的聊天机器人部署，我们将使用 Watson Assistant 开发用户对话树，并将我们的应用推送到 IBM Cloud。\n"
- fmt: '### Python Libraries


    实现自然语言处理的主要库有哪些？我们在表[10-1](#527966_1_En_10_Chapter.xhtml#Tab1)中列出了通用NLP的主要库，以及一些用于特定行业应用的专用库。


    **表10-1 Python NLP库**


    | 库/工具 | 描述/主要用途 | 独特卖点 | 缺点 |

    | --- | --- | --- | --- |

    | `NLTK` | NLP领先平台，支持句子检测、分词、词形还原、词干提取、句法分析、组块分析和词性标注。提供50个语料库和词汇资源的UI | 作为最常用的Python
    NLP库，功能全面 | 运行速度慢，不支持神经网络 |

    | `TEXTBLOB` | 通过将`TextBlob`对象视为Python字符串，访问常见的文本处理操作 | 为NLP/DL准备数据，易于使用的UI |
    运行速度慢，不适合大规模生产 |

    | `CORENLP` | 斯坦福开发的一套用于语言分析的人类语言技术工具 | 速度快，用Java编写 | 底层语言需要安装Java^([^(184)](#fn184))
    |

    | `SPACY` | 专为生产环境设计，帮助开发者创建能处理/理解大量文本的NLP应用 | 处理大数据，支持多语言 | 与`NLTK`相比缺乏灵活性 |

    | `PYTORCH`^([^(185)](#fn185)) | Facebook开源的`PyTorch`是一个基于API的框架，用于扩展Torch深度学习库^([^(186)](#fn186))
    | 执行速度快，支持计算图 | 核心NLP算法复杂 |

    | `GENSIM` | 用于主题建模、文档索引和大型语料库相似性检索的专用库 | 内存独立，支持大于RAM的数据集^([^(187)](#fn187))
    | 无监督文本建模有限，需与其他Python库集成 |


    其他具有特定优势的库，如`Pattern`和`PyNLPl`（发音为Pineapple），分别用于网络数据挖掘和文件格式处理；而`sumy`、`pysummarization`和`BERT
    summarizer`则擅长文本摘要。^([^(188)](#fn188))


    虽然并非专门用于自然语言处理的工具，但另外两个重要的Python库是`Twitter API`^([^(189)](#fn189))和用于Facebook
    Insights API的`facebookinsights`封装器。这些库的用例——社交媒体情感（和指标）分析——将在下文讨论，而第[8](#527966_1_En_8_Chapter.xhtml)章将提供`Twitter
    API`的动手实验。


    ### NLP应用


    电子邮件/垃圾邮件过滤器、词云^([^(190)](#fn190))、文字处理器中的自动更正以及编程中的（代码）自动补全，是自然语言处理最早且现已成熟的一些应用。但直到最近，上述Python库与云计算的结合，才解锁了对海量非结构化数据进行更高价值自然语言处理的能力。


    无论是从非结构化数据中提取商业价值、进行深度文档信息搜索与检索、加速内部研究或尽职调查流程、提高报告生产力与内容创作，还是寻求与覆盖性认知机器人流程自动化（CRPA）目标的协同效应，企业都在争相建立内部NLP能力以交付价值。


    虽然许多流行的“千万亿级”NLP加速器可能才刚刚开始投入使用，我们现在来审视一下主流NLP商业和组织应用当前的成熟度水平。


    #### 文本分析


    文本分析或文本挖掘涉及从数据中提取高质量信息。它本质上是更复杂的非结构化数据分析（包括文本转语音和情感分析）的使能器，其关键增值在于能够在训练过程中增强特定领域的数据/语料库^([^(191)](#fn191))，以改进分类任务。


    微软可能是此领域的领导者之一，特别是其`Azure Cognitive Services`，它包含了丰富的文本分析功能，包括`Content Moderator`和`Language
    Understanding`（`LUIS`）。`IBM Watson Knowledge Catalog`也是一款领先产品。


    ##### 文本转语音与语音转文本


    文本转语音（以及语音转文本）现在是一个成熟且竞争激烈的市场。市场领导者包括`Amazon Polly`和`API Cloud Service IBM Watson
    Text to Speech`。^([^(192)](#fn192))


    #### 社交媒体情感分析/意见挖掘


    情感分析/意见挖掘是一种上下文文本挖掘，用于从源数据中识别和提取主观信息。该技术主要与社交媒体渠道相关联，企业（以及政府/政治家）直接或间接地使用它来了解其品牌的社会情感、客户之声（VoC）或衡量公众看法。


    如今的情感分析已超越简单的正面和负面情感指标——监听或监控（实时）在线对话可以触发对讨论类别、概念和主题以及情绪检测的相关关键洞察分析。


    所有全球零售商、快速消费品行业和电信行业都依赖于对情感分析结果的复杂捕捉——大多数应用依赖于通过`Python`的`tweepy`或`snscrape`库访问`Twitter
    API`，和/或通过`facebookinsights`封装器访问`Facebook Insights`。第[8](#527966_1_En_8_Chapter.xhtml)章将提供一个使用`Twitter
    API`进行社交媒体情感分析的动手实验。


    ![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig10_HTML.jpg)


    一个仪表图显示了悲伤、中性和快乐三种表情符号。指针指向快乐表情符号。


    **图10-10** 社交媒体情感分析


    #### 聊天机器人、对话助手和IVA


    作为自然语言处理最著名的应用，如今的聊天机器人可以进行交互式对话，并标配了先进的语音识别和文本转语音功能。


    自`Cortana`早期以来，聊天机器人技术已大幅改进。智能虚拟助手（IVA）内置了AI训练、认知和自我学习能力，并能适应上下文，利用最新的Transformer技术。


    如今部署聊天机器人的商业价值集中在客户旅程和客户体验的阶梯式改进上——具有快速、低成本解决问题的明显潜力。


    无论是`Amazon Alexa`、`Apple`的`Siri`、`Google`的IVA生态系统（`Meena`/`DialogFlow`/`LaMDA`）、`IBM
    Watson`、`Azure LUIS`和`QnA Bot`，还是`Rasa`，自然语言处理和深度学习都被结合起来，以最佳方式匹配/学习用户的“意图”和“实体”到对话“语料库”中。'
  raw: '### Python Libraries


    What are the main libraries for implementing Natural Language Processing? We outline
    in Table [10-1](#527966_1_En_10_Chapter.xhtml#Tab1) the main ones for general
    purpose NLP as well as a few of the specialist libraries used for targeted industry
    applications.


    Table 10-1


    Python Libraries for NLP


    | LIBRARY/TOOL | DESCRIPTION/MAIN USE | USP | DRAWBACK |

    | --- | --- | --- | --- |

    | **NLTK** | Leading platform for NLP, sentence detection, tokenization, lemmatization,
    stemming, parsing, chunking, and POS tagging. UI to 50 corpora and lexical resources
    | Versality as the most commonly used Python library for NLP | Slow runtime, no
    neural networks |

    | **TEXTBLOB** | Access to common text-processing ops through TextBlob objects
    treated as Python strings | Data prep for NLP/DL, easy UI | Slow runtime, not
    for large scale production |

    | **CORENLP** | Stanford-developed assortment of human language technology tools
    for linguistic analysis | Speed, written in Java | Requires Java install as underlying
    language^([^(184)](#fn184)) |

    | **SPACY** | Designed explicitly for production usage for developers to create
    NLP apps that can process/understand large texts | Big data handling and multi-foreign
    language support | Lack of flexibility in comparison to NLTK |

    | **PYTORCH**^([^(185)](#fn185)) | Facebook’s open-sourced PyTorch is an API-driven
    framework for extending the Torch deep learning library^([^(186)](#fn186)) | Speed
    of execution, computational graph support | Core NLP algorithms complexity |

    | **GENSIM** | Specialist library for topic modeling, document indexing, and similarity
    retrieval with large corpora | Memory independence supports large data sets >
    RAM^([^(187)](#fn187)) | Unsupervised text modeling limitation, requires integration
    with other Python libs |


    Others with specific strengths, such as **Pattern** and **PyNLPl** (pronounced
    Pineapple) are also used for their web data mining and file format handling capabilities
    respectively while **sumy**, **pysummarization,** and **BERT summarizer** are
    great for text summarization.^([^(188)](#fn188))


    Although not exclusively tools for natural language processing, two other important
    Python libraries are the Twitter API^([^(189)](#fn189)) and the facebookinsights
    wrapper for the Facebook Insights API. The use cases for those – social media
    sentiment (and metric) analysis will be discussed below while a hands-on lab is
    provided for the Twitter API in Chapter [8](#527966_1_En_8_Chapter.xhtml).


    ### NLP Applications


    Email/spam filters, word clouds,^([^(190)](#fn190)) auto-correct in word processors,
    and (code) auto-complete in programming are some of the earliest, and now established,
    applications of natural language processing. But it is only relatively recently
    that the above Python libraries, coupled with cloud, have unlocked higher-value
    natural language processing of VAST volumes of unstructured data.


    Whether its extracting business value from unstructured data, deep document information
    search and retrieval, acceleration of internal research or due diligence processes,
    reporting productivity increases and content creation or seeking synergies with
    overriding cognitive robotic process automation (CRPA) goals, companies are scrambling
    to establish in-house NLP capabilities to deliver value.


    While many of the trending, “peta-scale” NLP accelerators may only just be starting
    to be employed, we take a look now current levels of sophistication around mainstream
    NLP business and organizational applications.


    #### Text Analytics


    Text analytics or text mining involves the extraction of high-quality information
    from data. Essentially an enabler for more complex unstructured data analysis
    including text-to-speech and sentiment analysis, a key value-add is the ability
    to augment domain-specific data/corpora in the training process^([^(191)](#fn191))
    for enhanced classification tasks.


    Microsoft is probably one of the leaders here, specifically with Azure Cognitive
    Services which encompasses a wealth of text analytics including Content Moderator
    and Language Understanding (LUIS). IBM Watson Knowledge Catalog is also a leading
    product.


    ##### Text-to-Speech-to-Text


    Text to Speech (and Speech to Text) is now a well-established and somewhat crowded
    market. Market leaders include Amazon Polly and the API Cloud Service IBM Watson
    Text to Speech.^([^(192)](#fn192))


    #### Social Media Sentiment Analysis/Opinion Mining


    Sentiment Analysis/Opinion Mining is contextual text mining which is used to identify
    and extract subjective information from source data. Overwhelmingly associated
    with social media channels, businesses (and governments/politicians) use the technique
    directly or indirectly to understand the social sentiment of their brand, the
    voice of the customer (VoC) or gauge public perception.


    Sentiment Analysis today goes beyond just simple positive and negative sentiment
    metrics – listening in or monitoring (real-time) online conversation can trigger
    related key insight analysis on discussion categories, concepts and themes, and
    emotion detection.


    All global retailers, FMCG industries, and the TELCO sector are reliant on sophisticated
    capture of sentiment analysis outcomes – with most apps reliant on accessing the
    Twitter API (via the Python tweepy or snscrape library) and/or Facebook Insights
    (via the facebookinsights wrapper). A hands-on lab for social media sentiment
    analysis is provided for the Twitter API in Chapter [8](#527966_1_En_8_Chapter.xhtml).


    ![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig10_HTML.jpg)


    A gauge chart represents 3 emoji expressions for sad, neutral and happy. The pointer
    is at the emoji with happy expression.


    Figure 10-10


    Social media sentiment analysis


    #### Chatbots, Conversational Assistants, and IVAs


    Probably the most famous application of natural language processing, chatbots
    today conduct interactive dialog, and come as standard with sophisticated speech
    recognition and text-to-speech capability.


    Chabot technologies vastly improved since the earliest days of Cortana. Intelligent
    Virtual Assistants (IVAs) have AI training built-in, cognitive, self-learning
    capability, and adapt to context, leveraging the latest Transformer technology.


    The business value in deploying chatbots today is focused around step-change improvements
    in customer journey and customer experience – with the obvious potential to resolve
    issues quickly, and at low cost.


    Whether its Amazon Alexa, Apple’s Siri, Google’s IVA ecosystem (Meena/DialogFlow/LaMDA),
    IBM Watson, Azure LUIS and QnA Bot or Rasa, Natural Language Processing and Deep
    Learning are combined to best-fit/learn user “intents” and “entities” to a dialogue
    “corpus.”'
