- fmt: '### Word Embeddings / Prediction-Based Embedding


    For all intents and purposes, Word Embeddings are a “probabilistic matching” technique
    which applies unsupervised machine or deep learning approaches to vectorize text
    data – effectively every word is converted into an n-dimensional “word vector,”
    with words of similar meaning located in a dense “cluster.”


    Figure [10-6](#527966_1_En_10_Chapter.xhtml#Fig6) shows how this works in reference
    to two documents – the outcome is groups of proper nouns, nouns, and verbs with
    similar meaning close together in dimensional space (i.e., Seattle and Boston,
    lecture and talk, had and gave, etc.).


    Word vectors / Word Embeddings can be trained from scratch, but pretrained models
    like `Word2Vec` provide the main means to accelerate NLP application development.


    ![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig7_HTML.jpg)


    A graph of document versus word embeddings plots the data about the given research
    talks in Boston and Seattle in the form of x and y.


    **Figure 10-7** Word embeddings example for two documents (Source: towardsdatascience.com)


    #### Word2Vec (Google)


    `Word2vec` is probably the most famous word embedding model – it is the process
    used by Google search engine to search similar text, phrases, sentences, or queries.^([^(168)](#fn168))
    A two-layer neural net that processes text by “vectorizing” words, `Word2vec`
    is based on two architectures: **continuous bag of words or CBOW** and the **skip-gram**
    model.^([^(169)](#fn169))


    The CBOW architecture allows the underlying model to predict words based on similar-context
    words, but ignores the order of words, much like in the rule-based BoW model.
    The skip-gram model takes into account the order of the words and applies a greater
    weight to words closer in context in vector space. The value in CBOW is primarily
    the speed of execution, while skip-gram is more performant on infrequent words.


    Document “similarity” for both `Word2Vec` and Latent Semantic Analysis is calculated
    using cosine similarity. Cosine similarity is….


    #### Other Models


    `Word2Vec` is by far the most common model for Word Embeddings, but there are
    many variants.


    Additionally, open source projects `GloVe`, developed by Stanford and `fastText`,
    developed by Facebook also have their advantages.


    Short for Global Vectors, `GloVe` model training uses word co-occurrence stats
    and combines global matrix factorization and local context window^([^(170)](#fn170))
    methods. Its USP is in finding relationships between words such as company-product
    couples, but its reliance on co-occurrence matrix slows down runtime.


    `fastText` is actually an extension of the `Word2Vec` model where words are effectively
    modeled as an n-gram of characters.^([^(171)](#fn171)) This approach means `fastText`
    performs better on rare words as the underlying character n-grams are shared with
    other words but it is also slower than `Word2Vec`.


    Other notable models include `LexRank` – an unsupervised graph-based approach
    for automatic text summarization.^([^(172)](#fn172))


    ### NLP Modeling


    Although many of the processes described above implicitly leverage machine or
    deep learning in order to achieve vector representation of text, word embeddings
    are typically evolved to then perform natural language “predictions.” In this
    last subsection, we take a look at the main predictive modeling techniques in
    NLP prior to moving onto our last chapter on Python implementation and the main
    NLP use cases today.


    #### Text Summarization


    Many Natural Language Processing applications involve Text Summarization, if not
    as a direct goal, then as an intermediate process. Text Summarization automates
    the process using either **extraction-based summarization** where keyphrases are
    pulled from the source document, or **abstraction-based summarization** involving
    paraphrasing and shortening the source document. Abstraction-based summarization
    is more performant, but more complex.


    The algorithmic implementation for the extraction-based approach first extracts
    keywords using linguistics analysis (e.g., PoS), then collects documents with
    keyphrases^([^(173)](#fn173)) before employing a supervised machine learning technique
    to take the document samples with key phrases and build a model, with features
    such as the length, number of characters, most recurring word, and frequency^([^(174)](#fn174))
    of keyphrases determined.


    `LexRank`, `Luhn`, and `LSA` are all text summarization techniques previously
    mentioned and accessible from the Python `sumy` library, as is `KL-Sum` which
    uses word distribution similarity to match sentences with original texts.


    #### Topic Modeling


    Closely coupled to text summarization is the concept of topic modeling. Many of
    the same algorithms mentioned above, specifically `LSA`, `pLSA`, `LDA`, and `lda2Vec`
    are used for topic modeling – the underlying goal is to recognize words from the
    *topics (or themes) present* in a document or corpus of data,^([^(175)](#fn175))
    rather than more laborious method of extracting words from an entire document.


    #### Sequence Models


    Sequence models are machine learning models used to interpret word sequences in
    texts. Applications include sequence modeling of text streams, audio clips, and
    video clips, where, like time-series data, [Recurrent Neural Networks](#527966_1_En_5_Chapter.xhtml#Sec18)
    (specifically [LSTMs](#527966_1_En_5_Chapter.xhtml#Sec19) or GRUs) are used.


    **Sequence to sequence** or **seq2seq** is probably the most well-known technique
    with applications in machine translation, text summarization, and chatbots.


    `seq2seq` is in fact a special class of RNN which uses an **Encoder-Decoder architecture**.
    The encoder feeds the input data, sequence by sequence into an LSTM/GRU network,
    producing context vectors (hidden state vectors) as well as outputs.^([^(176)](#fn176))
    The decoder (also an LSTM/GRU) initializes with the final states (context vector)
    of the encoder network and generates an output on one forward pass. The decoder
    trains by repeatedly feeding back into the decoder previous outputs to generate
    future outputs.


    ![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig8_HTML.jpg)


    A diagram illustrates the process of encoding and decoding of the context from
    the encoder to decoder. Each word in the sentence is assigned with a unique number.


    **Figure 10-8** PyTorch Sequence to Sequence Encoder-Decoder architecture showing
    Machine Translation'
