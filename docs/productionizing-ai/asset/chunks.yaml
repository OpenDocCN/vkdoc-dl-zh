    \ Python, the goal of this exercise is to get familiar with these scripts, create\
    \ a virtual environment and run the script:**\n\n1.  Install a stable release\
    \ of Python from [`www.python.org/downloads/windows/`](https://www.python.org/downloads/windows/)\n\
    \n2.  Add the path of the installed location on your laptop as a (system) environment\
    \ variable – this will enable both Python and pip (library installer) commands\
    \ to work on terminal\n\n3.  Create a “test” folder in a suitable location on\
    \ your local directory. Clone the Python script to your local drive from GitHub\
    \ below:\n\n    [`https://github.com/bw-cetech/apress-7.1.git`](https://github.com/bw-cetech/apress-7.1.git)\n\
    \n4.  On File/Windows Explorer go to the cloned local folder and type “cmd” in\
    \ the pathname to open terminal. Create a virtual environment using the commands\
    \ below (one after the other):\n\n    ```\n    python -m venv env\n    env\\Scripts\\\
    Activate\n    ```\n\n5.  Your virtual environment should now be enabled. Run the\
    \ simple game with the command\n\n```\npython python-guessing-game.py\n```\n\n\
    when finished, close the virtual environment with “deactivate”\n\n1.  Stretch\
    \ exercise – try to run the random walk exercise done in Chapter [5](#527966_1_En_5_Chapter.xhtml)\
    \ (Neural Networks and Deep Learning) as a standalone Python script, after reactivating\
    \ the same virtual environment above. NB for any ModuleNotFoundError: No module\
    \ named errors (e.g., numpy), run the following command:\n\n```\npip install numpy\n\
    ```\n\n### API Web Services and Endpoints: Hands-on Practice\n\nMACHINE LEARNING\
    \ FOR CYBERSECURITY DDOS ATTACK\n\n**The goal of this exercise is to deploy, then\
    \ test/perform inference via an endpoint on a machine learning model for detecting\
    \ cybersecurity (DDoS – Distributed Denial of Service) threats****:**\n\n1.  Starting\
    \ from the experiment below trained on labeled network traffic events, we deploy\
    \ a machine learning model from Azure Machine Learning Studio by first creating\
    \ a predictive experiment\n\n    [`https://gallery.cortanaintelligence.com/Experiment/Cyber-DDoS-trained-model`](https://gallery.cortanaintelligence.com/Experiment/Cyber-DDoS-trained-model)\n\
    \n2.  Next we set up an endpoint by deploying the Web Service\n\n3.  Finally consume\
    \ the Web Service by invoking the API from excel. Test using the sample data at\
    \ the GitHub link below. NB the first record is a “teardrop” denial of service\
    \ (DoS) attack, the second record is benign network traffic\n\n    [`https://github.com/bw-cetech/apress-7.1b.git`](https://github.com/bw-cetech/apress-7.1b.git)\n\
    \n4.  Exercise: walk through the model training process as well by following the\
    \ link [`https://gallery.azure.ai/Experiment/e7fb30de726e4e02b034233ec6c34ce4`](https://gallery.azure.ai/Experiment/e7fb30de726e4e02b034233ec6c34ce4).\
    \ Note the training experiment originally used Azure Blob storage links to the\
    \ datasets but as these are no longer supported, now uses instead the training\
    \ network_intrusion_detection.csv and test sets network_intrusion_detection_test.csv\
    \ at the same GitHub link above\n\n5.  Stretch: see if you can beat the model\
    \ performance (AUC = 0.85) by changing the data (or the algorithms) used"
  trans: "\n# 图形处理单元（GPU）\n\n虽然`CPU`（中央处理单元）对于简单模型和小型数据集表现良好，但对于较大的数据集，其执行时间过长。`GPU`（图形处理单元）比`CPU`拥有更多的逻辑核心，并且支持并发运行进程，而非顺序执行。因此，它们特别适合那些可以表示为数据并行计算的问题，例如具有数十万个参数的人工智能问题。\n\
    \n`GPU`在现代多人游戏中更为著名，但它们在处理涉及大量数据算术运算的应用方面的演进，已使得所有云服务提供商（CSP）都在其云平台上提供按需付费的高性能`GPU`。\n\
    \n在底层，`GPU`通常依赖于 NVIDIA 开发的`CUDA`（统一计算设备架构）并行编程。\n\n# 张量处理单元（TPU）\n\n`TPU`（张量处理单元）是谷歌专门用于深度学习任务的硬件加速器。\n\
    \n通常由研究人员和开发者使用，它们比`GPU`更昂贵，但针对大批量和卷积神经网络（CNN）进行了高度优化。总体而言，它们速度更快、能效更高，但对于中大型数据集，`GPU`仍然可能性能最佳。\n\
    \n并行处理/计算是一个快速发展的研发领域，所有主流的高知名度媒体人工智能项目（例如自动驾驶汽车、机器人技术）都依赖于最新技术。在不久的将来，有两项技术可能会具有竞争力：`DPU`（数据处理单元）——一种新型可编程处理器或“片上系统”（`SoC`），专门用于在数据中心内移动数据；以及`FPGA`（现场可编程门阵列）——具有可编程硬件结构的集成电路。与（高能耗的）`GPU`相比，`FPGA`由于节省能源消耗，也可能更具可持续性。\n\
    \n![](img/527966_1_En_7_Fig4_HTML.jpg)\n\n一幅插图展示了四种并行化技术及其特性。其中包括`CPU`（小型模型和数据集）、`GPU`（中大型模型和数据集）、`TPU`（矩阵计算）和`FPGA`（大型数据集）。\n\
    \n**图 7-4** 最新并行化技术对比（来源：inaccel）\n\n# 分片\n\n`分片`是将大型表分解成称为分片的较小块，并分布到多个服务器上的过程。^(¹⁰⁸)\
    \ 分片本质上是一个水平数据分区，包含总数据集的一个子集，因此负责处理整体工作负载的一部分。\n\n深度学习中的`分片`能够节省超过 60%的内存，并在`PyTorch`中训练规模两倍的模型。\n\
    \n![](img/527966_1_En_7_Fig5_HTML.jpg)\n\n一个数据库（单服务器）中的未分片表与三个数据库（分别包含服务器 A、服务器\
    \ B 和服务器 C）中的分片表之间的对比分析。\n\n**图 7-5** 分片（来源：Oracle）\n\n在进入下一节并了解主要软件供应商及其用于 AI\
    \ 应用开发的工具生态系统之前，我们先在本节最后探讨如何为应用开发创建隔离的（虚拟）环境，并进行一些关于 Python 脚本编写和使用 API 的动手实践，最后介绍在\
    \ Colab 中使用`GPU`。\n\n# 虚拟环境\n\n虚拟环境为特定应用提供隔离的 Python 包安装，允许应用在同一系统上独立共存。由于这些是自包含的\
    \ Python（和 Python 库）安装，应用之间不共享依赖关系，因此它们对于开发 AI 解决方案特别有用。\n\nPython 中的虚拟环境是使用`virtualenv`（或\
    \ Python 3.3+中的`venv`）创建的，它包含一个 Python 二进制文件和用于包管理的基本工具，包括用于安装 Python 库的`pip`。以下动手实验描述了如何从终端设置虚拟环境。\n\
    \n# 从终端运行 Python：动手实践\n\n**摆脱笔记本 – Python 脚本（.PY）**\n\n许多 AI 应用使用原始的 Python 脚本（`.py`文件）而不是\
    \ Jupyter 笔记本。本练习的目标是使用独立的 Python，熟悉这些脚本，创建一个虚拟环境并运行该脚本：\n\n1.  从[`www.python.org/downloads/windows/`](https://www.python.org/downloads/windows/)安装一个稳定的\
    \ Python 版本。\n2.  将笔记本电脑上安装位置的路径添加为（系统）环境变量——这将使`python`和`pip`（库安装程序）命令能够在终端上工作。\n\
    3.  在本地目录的合适位置创建一个“test”文件夹。从下面的 GitHub 将 Python 脚本克隆到本地驱动器：\n    [`https://github.com/bw-cetech/apress-7.1.git`](https://github.com/bw-cetech/apress-7.1.git)\n\
    4.  在文件/Windows 资源管理器中，转到克隆的本地文件夹，并在路径名中输入`cmd`以打开终端。使用以下命令（依次执行）创建一个虚拟环境：\n \
    \   ```\n    python -m venv env\n    env\\Scripts\\Activate\n    ```\n5.  现在您的虚拟环境应该已启用。使用以下命令运行简单游戏：\n\
    \    ```\n    python python-guessing-game.py\n    ```\n    完成后，使用`deactivate`关闭虚拟环境。\n\
    6.  拓展练习——在重新激活上述同一虚拟环境后，尝试将第 5 章（神经网络与深度学习）中完成的随机游走练习作为独立的 Python 脚本运行。注意：如果出现任何`ModuleNotFoundError:\
    \ No module named`错误（例如`numpy`），请运行以下命令：\n    ```\n    pip install numpy\n   \
    \ ```\n\n# API Web 服务和端点：动手实践\n\n**用于网络安全 DDoS 攻击的机器学习**\n\n本练习的目标是部署一个用于检测网络安全（DDoS——分布式拒绝服务）威胁的机器学习模型，然后通过端点进行测试/执行推理：\n\
    \n1.  从下面基于标记网络流量事件训练的实验中，我们首先创建一个预测实验，从 Azure 机器学习工作室部署一个机器学习模型：\n    [`https://gallery.cortanaintelligence.com/Experiment/Cyber-DDoS-trained-model`](https://gallery.cortanaintelligence.com/Experiment/Cyber-DDoS-trained-model)\n\
    2.  接下来，我们通过部署 Web 服务来设置一个端点。\n3.  最后，通过从 Excel 调用 API 来使用 Web 服务。使用下面 GitHub\
    \ 链接中的样本数据进行测试。注意：第一条记录是“泪滴”拒绝服务（DoS）攻击，第二条记录是良性网络流量：\n    [`https://github.com/bw-cetech/apress-7.1b.git`](https://github.com/bw-cetech/apress-7.1b.git)\n\
    4.  练习：也通过以下链接 [`https://gallery.azure.ai/Experiment/e7fb30de726e4e02b034233ec6c34ce4`](https://gallery.azure.ai/Experiment/e7fb30de726e4e02b034233ec6c34ce4)\
    \ 走一遍模型训练过程。请注意，训练实验最初使用 Azure Blob 存储链接到数据集，但由于这些链接不再受支持，现在改用上述同一 GitHub 链接中的训练集`network_intrusion_detection.csv`和测试集`network_intrusion_detection_test.csv`。\n\
    5.  拓展：看看您是否可以通过更改使用的数据（或算法）来超越模型性能（AUC = 0.85）。\n"
- fmt: "### AI Accelerators - GPUs: Hands-on Practise\n\n#### PERFORMANCE TESTING\
    \ COLAB GPUS\n\nThe final lab in this section compares runtime for a Big Data\
    \ pipeline – specifically the time to download a zip file directly from Kaggle\
    \ then unzip the file.\n\n1.  Obtain an API key from Kaggle (`kaggle.json` file)\
    \ or use the same key used in labs from Chapter [4](#527966_1_En_4_Chapter.xhtml)\
    \ and [5](#527966_1_En_5_Chapter.xhtml).\n2.  Now download the python script `GPU_test.ipynb`\
    \ at the GitHub link below and open in Colab:\n    [`https://github.com/bw-cetech/apress-7.1c.git`](https://github.com/bw-cetech/apress-7.1c.git)\n\
    3.  Drag and drop your `kaggle.json` file to the Colab default (`content`) folder.\n\
    4.  Run the Colab notebook to copy the `json` file to a root > `.kaggle` folder.\n\
    5.  Connect directly to a BIG dataset on Kaggle – the example given will download\
    \ a 350 MB dataset containing 50,000 images. Do this initially with the standard\
    \ (no hardware accelerator / CPU) runtime and time how long it takes.\n6.  Unzip\
    \ the images to a `review` folder – still using the standard runtime, timing how\
    \ long it takes.\n7.  After completion (or after interrupting the code if taking\
    \ too long), repeat steps 5 and 6 above with `Runtime` type set to `GPU`. Compare\
    \ the time taken for both steps with the standard runtime.\n\n**NB** Although\
    \ the lab is focussed on the data import process, the same parallel process efficiencies\
    \ extend to machine and deep learning, providing substantial runtime savings when\
    \ training and deploying models.\n\n1.  Exercise – run the additional python notebook\
    \ `Autoencoders.ipynb` at the GitHub link above first using a local runtime, then\
    \ with a GPU. Verify that the model training time is substantially quicker using\
    \ a GPU.\n\n### Software and Tools for AI Development\n\nBuilding on our first\
    \ section, we now take a look at practical AI application/software development,\
    \ comparing the main cloud vendors and their tools and services available to support\
    \ AI projects and infrastructure, develop industry-specific use cases and solutions\
    \ in order to ultimately deploy a successful application.\n\n### AI Needs Data\
    \ and Cloud\n\nThe importance of cloud for AI application integration, and data\
    \ to feed the application cannot be underestimated. While Cloud is a key enabler\
    \ of AI, Cloud only works for AI if the Data Strategy is underpinned by rich,\
    \ BIG data sources and/or training data.\n\nSuccessful Data Projects today are\
    \ now (Enterprise) AI-Infused, requiring an end-to-end Cloud Infrastructure and\
    \ in particular, Storage and Compute as the main Cloud components for Big Data\
    \ processing.\n\nWhile Enterprise Machine Learning projects can run with low overheads\
    \ on both, Deep Learning projects cannot.\n\nAs we will see below, all major cloud\
    \ service providers provide a catalog of AI services and tools which greatly simplify\
    \ the process of building applications. But care must be taken around hidden costs.^([^(109)](#fn109))\
    \ The big 3 of AWS, Azure, and GCP have made recent attempts to make pricing models\
    \ less opaque, but anyone wishing to do experimentation without a supporting corporate\
    \ budget is clearly disadvantaged.\n\n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig8_HTML.jpg)\n\
    \nA set of three tables depict the delivery of insights at scale. It includes\
    \ the I D C market, a future intelligence of software tools based on decision\
    \ management, data culture, and literacy, domain insights, et cetera.\n\nFigure\
    \ 7-8\nIDC Market Glance – future of intelligence\n\n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig7_HTML.jpg)\n\
    \nAn illustration depicts the Forrester wave-cloud data warehouse. It includes\
    \ challengers, contenders, strong performers, and leaders and reveals stronger\
    \ strategy, market presence, and stronger and weaker current offerings.\n\nFigure\
    \ 7-7\nForrester Wave – leading Cloud Data Warehouses\n\n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig6_HTML.jpg)\n\
    \nAn illustration depicts the garter magic quadrant with the ability to execute\
    \ and completeness of vision. It includes 1\\. Challengers. 2. Leadership (Microsoft,\
    \ google, I B M). 3\\. Niche players. 4. Visionaries.\n\nFigure 7-6\nGartner Magic\
    \ Quadrant – leading CSPs\n\n### Cloud Platforms\n\nThere is general consensus\
    \ on the leading cloud platforms, but we will now drill down further into the\
    \ main services and resources offered by each, starting with Amazon Web Services.\n\
    \n#### AWS\n\nAWS claims to offer the broadest and deepest set of machine learning\
    \ services and supporting cloud infrastructure. `SageMaker` is the main tool for\
    \ Data Science due to its scalability in machine learning while for NLP, AWS also\
    \ offers Amazon Polly (text-to-speech) and Lex (Chatbots).\n\nEvident from the\
    \ list of customers using AWS, such as Siemens, FICO, Formula1, pwc, and Netflix,\
    \ is a strong set of industry use cases for AI including Document Processing,\
    \ Fraud Detection, and Forecasting.\n\nAs the world’s biggest cloud service provider,\
    \ many AI applications rely on AWS’s breadth of supporting infrastructure, from\
    \ Simple Storage Service (`S3`) cloud storage to Elastic Compute (`EC2`) instances,\
    \ Elastic MapReduce (`EMR`) – managed clusters for running Apache Spark, `Redshift`\
    \ – AWS’s cloud data warehouse, `Lambda` – serverless compute for processing events\
    \ and `Kinesis` for real-time streaming.\n\nHowever despite appearances, AWS’s\
    \ “free tier” isn’t completely free. AWS products can be *“explored” for free*,\
    \ *some* products are free and some are *free for a limited period*. Almost all\
    \ have capacity/usage limits.\n\n#### Azure\n\nThe strength of Microsoft’s Azure\
    \ AI platform lies in API access to key Azure cloud services and an impressive\
    \ list of clients from Airbus, NHS, Nestle, and the BBC.\n\nUsing Azure SDKs,\
    \ simple API calls from Jupyter Notebook and Visual Studio Code enable integration\
    \ with underlying Python code and `sklearn` machine learning and `TensorFlow`/`PyTorch`\
    \ deep learning models.\n\nAzure SDKs also enable access to Azure Machine Learning,\
    \ with scaling via Azure Kubernetes Service (`AKS`), Azure Databricks (with Apache\
    \ Spark support), and high-quality vision, speech, language, and decision-making\
    \ models in Azure Cognitive Services including Anomaly Detector, Content Moderator,\
    \ `LUIS` and `QnA Maker` (knowledge-based chatbots/conversational AI), speech\
    \ to text to speech and Computer (prebuilt models) and Custom Vision (build your\
    \ own models).\n\n![](images/527966_1_En_7_Chapter/527966_1_En_7_Fig9_HTML.png)\n\
    \nThe architecture of Azure A I. It includes Azure Applied A I services (cloud\
    \ security model), azure cognitive service (customizable A P Is), A I infrastructure\
    \ and azure machine learning (end to end M L platform).\n\nFigure 7-9\nAzure AI\n\
    \n#### GCP\n\nAlthough it's now open source `TensorFlow` is Google’s child, is\
    \ still developed by Google researchers and is probably still the USP for developing\
    \ on Google Cloud Platform (`GCP`) for AI projects.\n\nWhen coupled with `BigQuery`,\
    \ Google’s serverless Data Warehouse, `Vertex AI`, managed machine learning, and\
    \ `Colab` for running Jupyter notebooks Google has a wealth of strong products\
    \ for Data Scientists and AI Engineers.\n\nPreviously under the Google AI Platform\
    \ umbrella, `Vertex AI` is the preferred “managed service” for taking sandbox\
    \ machine learning models into production and includes Cloud `AutoML` high-quality\
    \ low-code models with state-of-the-art transfer learning. It also supports Deep\
    \ Learning containers and sharing of code from the centralized repos and ML pipelines\
    \ on Google AI Hub.\n\nThe same ML pipelines on AI Hub can be deployed to highly\
    \ scalable and portable `Kubeflow` pipelines based on Docker.\n\nThe Google Natural\
    \ Language API provides app integration with Google NLP models while `Dialogflow`\
    \ is used to integrate chatbots and IVAs into mobile and web apps."
