    ### 其他重要的深度学习工具


    当然，`TensorFlow`（与`Keras`配合使用）和`PyTorch`并非当今唯一使用的深度学习框架。存在大量工具，其中许多工具在专注于特定用例时，本身就能产生更好的结果或性能。


    例如，`Eclipse Deeplearning4J`（也称为`DL4J`）是一组项目，旨在支持基于 Java 虚拟机（JVM）的深度学习应用的所有需求。


    在 Python 库方面，虽然`Theano`（由蒙特利尔大学开发）和`微软认知工具包（CNTK）`都曾风光一时，但现已弃用，而由加州大学伯克利分校开发的`Caffe`仍在使用，特别是在图像分类/分割领域。`Caffe`在
    NVIDIA GPU 集成方面表现出色，但调试起来有些困难。


    来自庞大的 Apache 工具集生态系统的`MXNet`，为深度学习提供多语言支持和高级 API 支持。


    #### Apache Spark


    虽然`MXNet`更像是一个小众的深度学习工具，但`Apache Spark`是一个流行的大数据处理统一分析引擎，内置了流处理、SQL、机器学习和深度学习以及图处理模块。


    由于其在处理大数据方面固有的“可扩展性”，以及其内置的、通过隐式数据并行性对整个集群进行编程的接口（因此非常适合对大型数据集进行分布式训练）和容错性，数据科学家们已将`Apache
    Spark`视为将深度学习投入生产的加速器。


    存在许多 API 可以简化在 Python 中实现和使用`Apache Spark`的过程，包括`PySpark`（`Apache Spark`的事实标准
    Python API）和`SparkTorch`（用于在`Apache Spark`上运行`PyTorch`模型）。


    `Apache Spark`可能是对将深度学习投入生产至关重要的“其他”工具中最重要的一个，它将是本书下一章动手实验的重点。


    ## 深度学习与实现框架


    既然我们已经确立了用于深度学习的主要 Python 集成工具，我们就可以进入本章的重点——如何实现一个深度学习模型。


    ### 张量


    `TensorFlow`和`PyTorch`都使用**张量**，因此在继续了解它们如何在深度学习模型中构建和使用之前，理解这个重要的数据结构是很有帮助的。


    实际上，**张量**是一个具有统一数据类型的多维数组。它们类似于`numpy`数组，但不可变，很像标准的 Python “元组”。与标准的 CPU 内存不同，张量也可以存储在
    GPU 内存中，从而优化深度学习的用途。


    ![](img/527966_1_En_5_Fig18_HTML.jpg)


    一个模型图展示了具有形状的秩为 4 的多维数组。


    **图 5-18** 形状为 `[3, 2, 4, 5]` 的秩为 4 的张量


    ### TensorFlow 关键概念


    `TensorFlow 2.0` 默认使用**即时执行模式**来立即评估操作，因此会在代码中计算张量的值。类似于命令式编程的概念，即时执行模式涉及由 Python
    逐步执行操作，然后将结果立即返回给 Python。


    `TensorFlow` 中的另一种执行方法是**图执行模式**。在这里，张量计算通过`tf.operations`图节点作为数据流图`tf.Graph`来执行。


    由于这是一本关于使用 Python 将 AI 应用投入生产的书，我们专注于`TensorFlow`中的即时执行模式，而非图执行模式。一般的最佳实践是在即时模式下进行开发和调试，然后使用`TensorFlow`的`tf.function`进行装饰/生产化，该函数将常规
    Python 代码转换为可调用的 TensorFlow 图函数，通常能提供更好的性能。


    `TensorFlow` 还利用各种**执行管道**来在深度学习过程中执行多个/并发任务：


    *   `tf.data` – API 支持重用复杂的输入管道，例如，聚合来自多个文件的数据，对图像应用随机“噪声”，并批量随机图像用于训练

    *   `TFX Pipelines` – 将其扩展到端到端的 MLOps（输入 ➤ 训练 ➤ 部署 ➤ 跟踪）


    ### 深度学习建模生命周期


    转向初始实现，当我们经历数据导入、使用`numpy`进行向量化、模型构建和模型运行过程时，我们知道，除非在使用`TensorFlow`即时执行模式进行实验、可视化即时结果和调试之前将数据转换为张量，否则建模将会失败。


    为了将编码（和故障排除）追溯到底层过程，将深度学习建模生命周期视为具有五个不同的阶段是很有用的：


    *   定义模型

    *   编译模型

    *   拟合模型

    *   模型评估

    *   预测/推理


    这些阶段可以进一步细分为与`Keras`/`TensorFlow`操作大致相关的子过程，并通过一行 Python 代码来定义。


    ![](img/527966_1_En_5_Fig19_HTML.jpg)


    一个模型图展示了深度学习建模生命周期。它包含 5 个模块，分别是定义模型、编译模型、拟合模型、模型评估和进行预测。


    **图 5-19** 深度学习建模生命周期（来源：machinelearningmastery）


    反映上述深度学习阶段的示例代码：


    ```

    # 定义模型

    model = ...

    # 编译模型

    opt = SGD(learning_rate=0.01, momentum=0.9)

    model.compile(optimizer=opt, loss=''binary_crossentropy'')

    # 拟合模型

    model.fit(X, y, epochs=100, batch_size=32, verbose=0)

    # 评估模型

    loss = model.evaluate(X, y, verbose=0)

    # 进行预测

    yhat = model.predict(X)

    ```


    ### 顺序模型 API 和函数式模型 API


    在上述过程和 Python 代码中，为了构建模型，我们首先需要定义它。在`Keras` API（`tf.keras`）中，实际上有两种主要方法可以做到这一点：顺序模型和函数式模型。


    #### 顺序模型 API


    顺序模型是最简单的方法，它适用于神经网络层，其中每一层恰好有一个输入张量和一个输出张量。


    要在 Python 中实现这一点，如下面的代码所示，我们使用`model.add()`以线性方式逐层向模型添加层。


    **使用顺序 API 定义的模型示例**


    ```

    from tensorflow.keras import Sequential

    from tensorflow.keras.layers import Dense

    # 定义模型

    model = Sequential()

    model.add(Dense(10, input_shape=(8,)))

    model.add(Dense(1))

    ```


    #### 函数式模型 API


    `Keras` 函数式 API 比顺序 API 更复杂，但也更灵活。这里不是线性地添加层，而是使用一个模型对象来指定输入层和输出层，并显式地将一层的所有输出连接到另一层的输入（每个连接都被指定）。


    **使用函数式 API 定义的模型示例**


    ```

    from tensorflow.keras import Model

    from tensorflow.keras import Input

    from tensorflow.keras.layers import Dense

    # 定义层

    x_in = Input(shape=(8,))

    x = Dense(10)(x_in)

    x_out = Dense(1)(x)

    # 定义模型

    model = Model(inputs=x_in, outputs=x_out)

    ```

