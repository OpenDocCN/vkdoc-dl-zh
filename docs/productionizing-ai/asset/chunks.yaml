    \n*   **Regularization** — a technique (and hyperparameter) which changes the\
    \ learning algorithm to prevent overfitting. Regularization Rate is also used\
    \ to specify the rate of regularization\n\n*   **Batch size** — a small, randomly\
    \ selected subset of the data run in a single iteration. 1 epoch (a pass thru\
    \ entire training set) = batch size * no. of iterations/steps\n\n*   **Hidden\
    \ layer** — a layer between input and output layers, where neurons take weighted\
    \ inputs and use the activation function to produce an output\n\n*   **Loss function**\
    \ (or a cost function) – by how much does the prediction given by the output layer\
    \ deviate from actual (ground truth)? The objective of a neural network is to\
    \ minimize this"
  trans: "\n### 实现 CNN\n\n上述章节涵盖了通用的深度学习实现流程，但当我们具体构建，例如用于图像分类的卷积神经网络时，流程又是怎样的呢？机器学习和深度学习建模是一个高度迭代的过程，构建一个高性能的卷积神经网络可以说是难度最高的任务之一。\n\
    \n正如我们将在本节之后的动手实验中看到的那样，采用逐步推进的流程，同时为围绕探索性数据分析和数据整理的迭代过程预留空间，是让模型（a）成功运行并（b）使其性能达到可接受标准（例如\
    \ `fbeta > 0.9`）的关键。\n\n在导入数据并执行基本的探索性数据分析之后，针对 CNN 的数据整理和模型设置存在一些独特的要求。下面将对这些要求进行描述，而相关的技术子流程将在本章的下一节中介绍。\n\
    \n1.  **预处理与数据划分**\n    *   将图像转换为数据矩阵/张量\n    *   将数据集划分为训练集和测试集\n    *   将张量数据格式转换为浮点数并进行缩放\n\
    \n2.  **构建网络**\n    *   为卷积基（卷积层和池化层）初始化滤波器\n    *   定义激活函数以计算梯度/实现反向传播\n    *\
    \   更新全连接层的权重\n\n3.  **编译网络**\n    *   结合前向和反向操作，构建神经网络\n\n其余步骤在很大程度上与上述深度学习生命周期中展示的通用流程一致，包括训练网络、在测试集上进行评估（检查损失、准确率、混淆矩阵和分类报告等指标）。通常，训练和评估会重复进行，直到达到我们的“目标”性能，并且常常会添加\
    \ Dropout 来解决过拟合问题。\n\n**典型的 Keras CNN 实现：**\n\n```python\nmodel = models.Sequential()\n\
    model.add(layers.Conv2D(32, (3, 3), activation='relu', input_shape=(32, 32, 3)))\n\
    model.add(layers.MaxPooling2D((2, 2)))\nmodel.add(layers.Conv2D(64, (3, 3), activation='relu'))\n\
    model.add(layers.MaxPooling2D((2, 2)))\nmodel.add(layers.Conv2D(64, (3, 3), activation='relu'))\n\
    model.add(layers.Flatten())\nmodel.add(layers.Dense(64, activation='relu'))\n\
    model.add(layers.Dense(10))\nmodel.compile(optimizer='adam',\n              loss=tf.keras.losses.SparseCategoricalCrossentropy(from_logits=True),\n\
    \              metrics=['accuracy'])\nhistory = model.fit(train_images, train_labels,\
    \ epochs=10,\n                    validation_data=(test_images, test_labels))\n\
    ```\n\n### 实现 RNN\n\n实际上，在 Keras 中我们可以利用三种类型的循环神经网络“层”：\n\n**`keras.layers.SimpleRNN`**\n\
    \n这是“基础”版本——本质上是一个全连接的 RNN，其中上一个时间步的输出会被馈送到下一个时间步。\n\n![](img/527966_1_En_5_Fig20_HTML.jpg)\n\
    \n一个模型图展示了循环神经网络。它包含 a 和 x 输入、tanh 函数、SoftMax 以及 y 输出。\n\n图 5-20：循环神经网络 – SimpleRNN\n\
    \n**`keras.layers.GRU`**\n\n门控循环单元是循环神经网络中的一种门控机制，旨在解决标准 RNN 中的梯度消失问题。通过一个更新门和一个重置门，GRU\
    \ 在将信息传递到输出之前对其进行“审查”，从而避免了 `SimpleRNN` 中梯度递减和权重僵化（不变）的问题。我们将在本章后面的第 6 节“调优深度学习模型”中更详细地讨论梯度消失问题。\n\
    \n**GRU 和 SimpleRNN 层的 Keras RNN 实现示例：**\n\n```python\nmodel = keras.Sequential()\n\
    model.add(layers.Embedding(input_dim=1000, output_dim=64))\n# GRU 的输出将是一个形状为 (batch_size,\
    \ timesteps, 256) 的 3D 张量\nmodel.add(layers.GRU(256, return_sequences=True))\n\
    # SimpleRNN 的输出将是一个形状为 (batch_size, 128) 的 2D 张量\nmodel.add(layers.SimpleRNN(128))\n\
    model.add(layers.Dense(10))\nmodel.summary()\n```\n\n**`keras.layers.LSTM`**\n\
    \n正如我们从本章第 3 节所知，LSTM 通常有助于在考虑“长期效应”的情况下实现更好的预测。网络中的这种“记忆”是通过三个门来维持隐藏状态实现的：\n\n\
    *   **输入门** 将信息添加到细胞状态\n*   **遗忘门** 移除模型不再需要的信息\n*   **输出门** 选择要作为输出的信息\n\n**基础\
    \ LSTM 实现示例：**\n\n```python\nmodel = Sequential()\nmodel.add(LSTM(50, activation='relu',\
    \ input_shape=(n_steps, n_features)))\nmodel.add(Dense(1)) # 单个 LSTM 单元隐藏层\nmodel.compile(optimizer='adam',\
    \ loss='mse')\n```\n\n![](img/527966_1_En_5_Fig21_HTML.jpg)\n\n一个长短期记忆网络包含 LSTM\
    \ 细胞中的遗忘门、更新门、tanh 和输出门，输出 y 通过 SoftMax 发送。\n\n图 5-21：LSTM 架构\n\n#### 用于时间序列的\
    \ LSTM 实现\n\n我们将在本节稍后的第二个实验中构建一个 LSTM，但在那之前，需要先处理用于 LSTM（或任何 RNN）时间序列预测的数据整理过程。\n\
    \n在时间序列预测中，先前的时间步实际上会成为深度学习过程的“特征”，而目标变量则是当前（训练）或下一个（推理）时间步。如果我们打算向前预测（例如）60 个时间步，那么提供给\
    \ LSTM 的每一行数据都需要包含从 T-60 开始往回追溯的先前时间步的数据。如下表所示，其中标记为“时间步”的列实际上是我们的目标变量，而其他列则是我们的特征集。\n\
    \n![](img/527966_1_En_5_Figb_HTML.jpg)\n\n一个表格展示了 7 列和 7 行。时间步列有从 T-0 到 T-60 的\
    \ 7 行，特征 1 包含从 T-60 到 T-120 的行，特征 2 包含从 T-119 开始的行。\n\n![](img/527966_1_En_5_Figc_HTML.jpg)\n\
    \n一个关于有无迁移学习时训练与性能的折线图。有迁移学习的图显示性能上升，斜率更高，渐近线也更高。\n\n### 神经网络 – 术语\n\n在下一节中，我们将详细讨论微调神经网络所涉及的更具技术性的建模概念。现在，我们提供一个总结性的参考，列出我们可用于构建和运行模型并实现令人满意性能的主要“杠杆”：\n\
    \n*   **Epoch（轮次）** — 对整个数据集的一次遍历。轮次数是您遍历训练集的次数。\n*   **Learning rate（学习率）** —\
    \ 用于通过梯度下降训练模型的标量。学习率决定了每次迭代权重变化的速度。\n*   **Activation function（激活函数）** — 给定一组输入后，节点/神经元的输出，该输出随后用作下一个节点的输入。示例包括\
    \ `ReLU`、`tanh`、`sigmoid` 和线性函数。\n*   **Regularization（正则化）** — 一种改变学习算法以防止过拟合的技术（和超参数）。正则化率也用于指定正则化的速率。\n\
    *   **Batch size（批量大小）** — 在单次迭代中运行的一小部分随机选择的数据子集。1 个 epoch（遍历整个训练集）= 批量大小 * 迭代/步数。\n\
    *   **Hidden layer（隐藏层）** — 输入层和输出层之间的层，其中的神经元接收加权输入并使用激活函数产生输出。\n*   **Loss function（损失函数）**（或成本函数）——\
    \ 输出层给出的预测与真实值之间的偏差有多大？神经网络的目标就是最小化这个偏差。\n"
- fmt: "### Computing the Output of a Multilayer Neural Network\n\nA final word in\
    \ this section is reserved for some guidance around the computational process\
    \ within a neural network. This is described below for calculating the output\
    \ of a multilayer neural network `ŷ` (`y_hat`).\n\nFor an input `X` with `m` features:\n\
    \n- `m` features have `m` weights (`w1`, `w2`, …, `wm`)\n- we can take the dot\
    \ product of the input and the set of weights then add bias:\n\n`z = w1x1 + w2x2\
    \ + … wnxn + bias`\n\n- `z` is then fed into an activation function to get hidden\
    \ output `h`: (`h1`, `h2`, …, `hn`)\n- hidden layer has `n` neurons\n- `n` neurons\
    \ have `n` weights (`w1`, `w2`, …, `wn`)\n\nWhich gives us a final output `y_hat\
    \ = h1w1 + h2w2 + … + hnwn`\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig22_HTML.png)\n\
    \nA model diagram features Multilayer Neural Network that has input data, a hidden\
    \ layer, and multilayers with 1 hidden layer.\n\n**Figure 5-22**  \nMultilayer\
    \ Neural Network – how do we get our output from the input data?\n\n### Convolutional\
    \ Neural Networks with Keras and TensorFlow: Hands-on Practice\n\n**GERMAN TRAFFIC\
    \ LIGHT IMAGE CLASSIFICATION**\n\nIn this lab, we will build and train a Convolutional\
    \ Neural Network in `Keras` and `TensorFlow` to solve a predictive (multiclass\
    \ classification of complex images) problem:\n\n1.  Clone the GitHub repo below:\
    \  \n    [`https://github.com/bw-cetech/apress-5.5.git`](https://github.com/bw-cetech/apress-5.5.git)\n\
    2.  Import the notebook to Google Colab. Colab has better support for `TensorFlow`\
    \ (no install!) so it’s easier to run the notebook.\n3.  Take a look at the Table\
    \ of Contents on the RHS panel, hyperlinking to each part of the modeling process.\n\
    4.  Run through the notebook – importing the code from Kaggle, performing EDA,\
    \ model Prep/image wrangling, building, and running the CNN using Transfer Learning,\
    \ and finally performing inference.\n5.  Complete the exercises as part of the\
    \ lab, stopping at markdown section “2nd Run – Early Stopping Criteria” (we will\
    \ cover this in the next section).\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig23_HTML.jpg)\n\
    \nA screenshot illustrates multiple German traffic signs from Label 0 (15) to\
    \ Label 61 (282). It includes signals such as no parking, zebra crossing, No turn,\
    \ parking, and no entry.\n\n**Figure 5-23**  \nImage Classification – German Traffic\
    \ Signs\n\n### Recurrent Neural Networks – Time Series Forecasting: Hands-on Practice\n\
    \n**STOCK PRICE FORECASTING WITH UNIVARIATE RNNS**\n\nThe goal of this lab is\
    \ to build and train an LSTM for stock price (univariate) forecasting, that is,\
    \ where the forecasted stock price depends only on previous time steps:^([^(73)](#fn73))\n\
    \n1.  Clone the GitHub repo below:  \n    [`https://github.com/bw-cetech/apress-5.5b.git`](https://github.com/bw-cetech/apress-5.5b.git)\n\
    2.  Import the notebook to Google Colab.\n3.  Run through the notebook – uploading\
    \ the data into a (temporary) Colab folder as described and importing, performing\
    \ EDA and Data Wrangling in order to transform the stock price data into the format\
    \ needed to forecast with RNNs.\n4.  Complete the exercises as part of the lab.\n\
    5.  Exercise - retrain the model with a different batch size and compare the (root\
    \ mean square) error.\n6.  Exercise – retrain the model with a different activation\
    \ function (`tanh`) and compare the test result (`tanh` generally regulates better\
    \ the output of a recurrent neural network than `ReLU`).\n7.  Stretch Exercise\
    \ – adapt the TATA univariate forecast to carry out a live stock price forecast\
    \ by completing the exercise commented out under “Live Stock Price Scenario”.\
    \ Run thru the steps to import the latest stock price for a leading Tech Stock\
    \ (e.g. Apple or Tesla) from Jan-21 to D-1 and performing a forecast 30 time steps\
    \ into the future.\n\n## Tuning a DL Model\n\nOur final section in this chapter\
    \ is reserved for the multitude of “performance-enhancing” levers we have at our\
    \ disposal in order to build a credible deep learning model.\n\n### Activation\
    \ Functions\n\nAs discussed in previous sections, neurons produce an output signal\
    \ from weighted input signals using an activation function. So in effect, an activation\
    \ function is a simple mapping to the output of the neuron where weighted inputs\
    \ in the neural network are summed and passed through the activation (or transfer)\
    \ function.\n\nThe term “activation” is related to the threshold at which the\
    \ neuron is activated and the corresponding strength of the output signal. The\
    \ Heaviside step function used in the Simple Perceptron is a simple step activation\
    \ function where if the summed input exceeds 1 then the neuron would output a\
    \ value of 1.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig24_HTML.jpg)\n\
    \nA model diagram features Activation Transfer Function architecture. It comprises\
    \ inputs, weights, activation, and output.\n\n**Figure 5-24**  \nActivation/Transfer\
    \ Function architecture (showing Heaviside step function)\n\nThe four main nonlinear\
    \ activation functions which we actually use in practice provide much richer functionality:\n\
    \n#### (Logistic) sigmoid function\n\nThe sigmoid activation function has a characteristic\
    \ “S” shaped curve and is used for binary classification problems. Real value\
    \ inputs are “squashed”/mapped into a range from 0 to 1 representing the probability\
    \ of a specific binary output.\n\n#### Hyperbolic Tangent Function (tanh)\n\n\
    `Tanh` (pronounced “tanch”) is also an “s” shaped curve, but this time rescales\
    \ the logistic sigmoid function. The outputs range from -1 to 1. Because the gradient\
    \ is stronger for `tanh` than sigmoid, `tanh` is generally preferred over sigmoid\
    \ as an activation function.\n\n#### Rectified Linear Unit (ReLU)\n\nBoth `tanh`\
    \ and sigmoid are prone to “saturation” or vanishing gradients. For this reason,\
    \ the most commonly used activation function in deep learning models is the simpler\
    \ Rectified linear unit (`ReLU`). `ReLU` speeds up the convergence of stochastic\
    \ gradient descent (covered in the next section), by virtue of its simpler mathematical\
    \ operations, returning 0 for negative values, and `x` for positive values.\n\n\
    In the case of `ReLU` activation leading to “dead neurons” (where neurons become\
    \ inactive and output 0 for any input), a variation, `Leaky ReLU` is sometimes\
    \ used. `Leaky ReLU` has a small slope (set as a hyperparameter^([^(74)](#fn74)))\
    \ for negative values instead of a flat slope.\n\nIt should be pointed out that\
    \ `leaky ReLU` does not always outperform `ReLU` – if a model using `ReLU` activation\
    \ is performant, stick with it.\n\n#### Softmax\n\nThe softmax activation function\
    \ (or normalized exponential function) is a special case for multiclass classification\
    \ problems where there is a discrete (non-binary) output, such as in the case\
    \ of most image classification problems (e.g., is the image a person, a building,\
    \ a vehicle, a road, etc.).\n\n`Softmax` turns logits (the final layer in neural\
    \ network) into probabilities that sum to 1.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig25_HTML.jpg)\n\
    \nAn illustration illustrates activation functions including shapes and formulas,\
    \ sigmoid, tanh, step function, soft plus, E L U, Log of Sigmoid, Mish, Sinc,\
    \ Swish, ReLU, Soft sign, Leaky ReLu.\n\n**Figure 5-25**  \nActivation functions\
    \ – shapes and formulae"
