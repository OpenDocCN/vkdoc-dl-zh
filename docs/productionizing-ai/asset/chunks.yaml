  trans: '

    # 机器学习：流程回顾


    我们首先回顾数据管道编排和端到端机器学习流程。作为当今大多数内置 AutoML 功能的基础——几乎所有 AutoAI 工具都基于以下一系列步骤——在此打下基础将为本章后续内容提供参考，涵盖从重要的贝叶斯优化与推理，到自动化
    Python 建模库，再到实践实验室中涉及的 AutoML/AutoAI 工具。


    在实践中，并非所有内容都属于 AutoML 的范畴，但如图 6-2 所示，我们可以将这些步骤分为建模前和建模后流程。从原始数据导入开始，AutoML/AutoAI
    依赖于流畅的数据管道编排，贯穿这些建模前和建模后的步骤，直至超参数调优和最终算法选择。当今领先的 AutoAI 产品甚至包含了“重新训练”流程的自动化，即监控“数据漂移”，并在底层数据集出现统计显著偏差时触发新的训练流程。^(⁸⁴)


    ![](img/527966_1_En_6_Fig2_HTML.jpg)


    建模前（原始数据导入、数据整理、数据分区）和建模后（特征工程、模型调优和重新训练）的示意图。该图展示了上述流程网络。


    **图 6-2** 机器学习中的自动化流程


    正如我们稍后将看到的，^(⁸⁵) 上述自动化通常被归结为构建和评估候选模型管道的四个核心流程^(⁸⁶)：


    *   数据预处理

    *   自动化模型预选

    *   自动化特征工程

    *   超参数优化


    # 全局搜索算法


    虽然上述许多流程可以在 AutoML 和 AutoAI 中实现自动化，但一旦数据被导入，模型训练过程实际上会使用全局搜索算法来“优化”看似无限的特征和特征权重组合。^(⁸⁷)


    随机采样是一种方法，网格搜索也是如此，后者从参数/特征的搜索空间中更均匀地抽取样本。在这两种情况下，目标都是最小化成本函数或目标函数——通常是实际预测/预报与模型输出之间的差异/增量“分数”。


    ## 贝叶斯优化与推理


    然而，随机采样和网格搜索都有其局限性——两者都没有利用之前的样本结果来指导/改进下一次迭代的采样。当今备受关注的一种更好/更复杂的方法^(⁸⁸) 是使用贝叶斯优化，其中“调优算法”根据上一次迭代的“分数”来优化每次迭代中的参数选择，也就是说，贝叶斯优化“自适应地”以概率方式采样更可能“最优”的数据，而贝叶斯推理则“推断”结果/分数。


    在底层，贝叶斯优化试图找到一个代理函数来优化数据、特征、算法和超参数，以便逼近目标函数。^(⁸⁹) 通常，代理函数使用监督回归技术（如随机森林或高斯过程回归）来总结目标函数的条件概率。对于后者，需要一个核函数来控制目标函数的形状——默认使用径向基函数（RBF），但不同数据集的性能可能决定使用不同的核函数。


    贝叶斯优化在解决维度/特征少于 20 个的问题时效果最佳，因此对于大型数据集，应首先采用主成分分析等降维技术。


    ## 贝叶斯推理：动手实践


    **搜索优化性能基准测试**


    **本实验的目标是比较使用 (a) 随机采样、(b) 网格搜索和 (c) 贝叶斯优化时的机器学习模型性能**


    1.  克隆以下 GitHub 仓库：


    [`https://github.com/bw-cetech/apress-6.2.git`](https://github.com/bw-cetech/apress-6.2.git)


    2.  浏览笔记本，该笔记本导入数据集（也提供在上方仓库中），设置数据整理管道，然后使用上述三种不同技术搜索预测心脏信号的最优模型参数


    3.  练习——尝试绘制三种技术的平均测试分数（AUC）


    4.  练习（进阶）——导入一个更大的物联网或零售数据集，更新整理管道和建模假设，并查看平均分数，以了解贝叶斯推理如何优于其他技术


    # 用于自动化的基于 Python 的库


    贝叶斯优化是 AutoML 和 AutoAI 中使用的主要技术，用于以概率方式搜索底层（代理）模型可用的多维参数空间。


    虽然对于非程序员来说，它显然不如我们稍后将介绍的 NoLo 代码工具那样易用和可访问，但我们现在将首先介绍大量可用于 AutoAI 的 Python 库。


    ## PyCaret


    虽然需要 Python 经验，但 PyCaret 因其加速机器学习模型训练的方法而被宣传为低代码机器学习。其独特卖点在于机器学习的民主化，如图 6-3 中训练数据集进行异常检测的示例所示，只需最少的端到端编码。


    ![](img/527966_1_En_6_Fig3_HTML.jpg)


    使用 PyCaret 机器学习方法进行端到端编码的示意图。


    **图 6-3** 用于异常检测的 PyCaret


    我们将在最后一章中，作为将保险保费计算器部署到 Azure 的广泛实践实验室的一部分，来研究 PyCaret。


    ## auto-sklearn


    `auto-sklearn` 自动化了来自 `scikit-learn` 的数据科学库，以便为监督分类和回归数据集确定有效的机器学习管道。


    面向“企业”的机器学习，优先考虑数据团队的效率和生产力，对非数据科学家来说更易上手，但与 PyCaret 一样，仍然涉及 Python 编码。它内置了预处理和数据清洗、特征选择/工程、算法选择、超参数优化、基准测试/性能指标以及后处理功能。


    `auto-sklearn` 的一个变体是 `Hyperopt-Sklearn`，它使用 `Hyperopt`^(⁹⁰) 来描述 `sklearn` 预处理和分类模块的可能配置的搜索空间。


    ## Auto-WEKA


    `Auto-WEKA` 实际上是一个用于算法选择和超参数优化的 Java 应用程序，它基于新西兰怀卡托大学的 WEKA^(⁹¹) 机器学习平台构建。`pyautoweka`
    是其 Python 封装器。


    与 `auto-sklearn` 相比，`Auto-WEKA` 同时选择学习算法并配置超参数，旨在帮助非专业用户更有效地识别适合应用的机器学习算法和超参数设置，并提升性能。

    '
- fmt: "### TPOT\n\n`TPOT` (Tree-based Pipeline Optimization Tool) uses a tree-based\
    \ structure/genetic programming to optimize machine learning pipelines and is\
    \ designed to train on large datasets over several hours. The `TPOT` API supports\
    \ both supervised classification and regression, carrying out, as shown in Figure\
    \ [6-4](#527966_1_En_6_Chapter.xhtml#Fig4), data wrangling and PCA before iterative\
    \ training, testing, and recursive feature elimination to arrive at a pipeline\
    \ with the highest score.\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig4_HTML.jpg)\n\
    \nA tree based structure of the `TPOT` operation. It starts from the entire data\
    \ set, polynomial features, PCA, combine features, recursive feature elimination,\
    \ and random forest classifier.\n\nFigure 6-4\n\n`TPOT` operation (Source: towardsdatascience)\n\
    \nThe `generations` parameter used in the `pipeline_optimizer` variable is the\
    \ number of iterations to run the pipeline optimization process – although a decent\
    \ pipeline (and ML model) can be achieved relatively quickly, more generations\
    \ are required to ensure the most performant pipeline is achieved, particularly\
    \ for large datasets.\n\n### Python Automation with TPOT: Hands-on Practice\n\n\
    GENETIC PROGRAMMING AUTOML\n\n**The goal of this lab is to use TPOT optimization\
    \ to find the best-performing pipeline and algorithm on a synthetic classification\
    \ problem. The code sample also shows how to automate in Python a direct connection,\
    \ unzip, and read of a web dataset:**\n\n1.  Clone the GitHub repo below:\n\n\
    \    [`https://github.com/bw-cetech/apress-6.3.git`](https://github.com/bw-cetech/apress-6.3.git)\n\
    \n2.  Walk-through the notebook step by step to read in the dataset directly from\
    \ the UCI website, unzip the files, and import the smaller csv dataset\n\n3. \
    \ Carry out basic EDA, data wrangling, partition the data and configure KFolds\
    \ cross-validation (STEPS 2, 3, and 4)\n\n4.  Run the `TPOT` optimization step\
    \ and observe the pipeline/model scores as they start to come through after a\
    \ few minutes. The whole process should take no more than 30 minutes\n\n5.  Exercise\
    \ – the pipeline is scored on accuracy – check there is good model separation\
    \ of classes (i.e., the model is not just predicting one single class) by scoring\
    \ on. For example, recall, precision, or fbeta\n\n6.  Exercise – perform more\
    \ sophisticated data wrangling, for example, one hot encoding for nominal categorical\
    \ variables, improved feature selection, and/or scaling\n\n7.  Open the exported\
    \ pipeline file `tpot_best_model.py` and observe the best-performing algorithm\
    \ and associated hyperparameters\n\n8.  Exercise (Stretch): swap out the data\
    \ with the larger banking dataset. Speed up runtime by executing instead on Colab\
    \ using a GPU accelerator and compare pipeline performance over 10 generations\n\
    \n## AutoAI Tools and Platforms\n\nWe now arrive at our main section in this chapter\
    \ – a look at several key “NoLo” tools for AutoAI.^([^(92)](#fn92)) The intention\
    \ is to give the reader a flavor of how these tools are winning over business\
    \ leaders with their simplicity and highly visual, translatable, and collaborative\
    \ USPs and are increasingly adopted by AI Engineers and Data Scientists to fit/achieve\
    \ “enterprise-wide” business goals.\n\nThe section is bookended with several hands-on\
    \ labs covering the operation of these tools applied to specific use cases in\
    \ AI.\n\n### IBM Cloud Pak for Data\n\nDressed as a data and AI platform with\
    \ a “data fabric” architecture, IBM Cloud Pak for Data essentially brings together\
    \ a number of legacy tools (including Watson Studio, Decision Optimization, and\
    \ Watson Assistant) into one platform solution, adding AutoAI on top.\n\nThe product’s\
    \ “Data Fabric” support means the product supports multiple APIs into structured\
    \ and unstructured data sources spread across multicloud environments, whether\
    \ IBM Cloud, AWS, Azure, or GCP. This underpins of the USP of the product – IBM\
    \ claim that Data Fabric architecture means data access is 8* faster, while reduced\
    \ ETL requests amount to a 25-65% productivity boost. There are data governance\
    \ benefits as well – $27m saving in costs by virtue of the products inbuilt smart\
    \ data negating the need for manual cataloging.\n\nAutoAI is the graphical tool,\
    \ previously built into Watson Studio, which automates the AI process – analyzing\
    \ data, discovering data transformations, algorithms, and parameter settings that\
    \ work best for a specific predictive modeling problem.^([^(93)](#fn93)) As shown\
    \ below, these automations essentially fit the four core AI automation processes\
    \ described earlier:\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig5_HTML.jpg)\n\
    \nA flowchart of the AI automation processes. It starts with providing data in\
    \ a structured file or database, prepare data, select model type, generate and\
    \ rank model pipelines and save and deploy a model.\n\nFigure 6-5\n\nIBM Cloud\
    \ Pak for Data: AutoAI automation\n\nAutoAI displays the results of the underlying\
    \ automations as model candidate pipelines ranked on a leaderboard for the end\
    \ user to select.\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig6_HTML.png)\n\
    \nA window screen displays the pipeline leaderboard to detect the pipeline ranking,\
    \ its accuracy, algorithm and enhancements. It includes a progress map in left\
    \ side of the screen.\n\nFigure 6-6\n\nIBM AutoAI – model pipeline ranking\n\n\
    Although similar to Bayesian optimization, AutoAI actually uses `RBfOpt` as its\
    \ global search algorithm. In contrast to Bayesian optimization, which fits a\
    \ Gaussian model to the unknown objective function, `RBfOpt` fits a radial basis\
    \ function to find hyperparameter configurations that maximize the objective function.^([^(94)](#fn94))\n\
    \n### Azure Machine Learning\n\nBack in Chapters [1](#527966_1_En_1_Chapter.xhtml)\
    \ and [4](#527966_1_En_4_Chapter.xhtml), we took a look at Azure Machine Learning\
    \ Studio. Microsoft are deprecating this “classic” interface in 2024 and moving\
    \ the tool instead to Azure Machine Learning (AzureML). The look and feel is very\
    \ similar to the original “Studio” version but the enhanced cloud service integration\
    \ with Azure and built-in automated machine learning means Azure ML is comparable\
    \ with IBM Cloud Pak in terms of functionality.\n\nMicrosoft promote AzureML in\
    \ terms of an enterprise-grade service for building business-critical machine\
    \ learning models at scale. The product comes with MLOps model governance and\
    \ control and claims to 70% fewer model training steps and (somewhat contradictory\
    \ as a no-code tool), 90% fewer lines of code.\n\n![](images/527966_1_En_6_Chapter/527966_1_En_6_Fig7_HTML.jpg)\n\
    \nA window screen displays Microsoft azure machine learning. It includes a bar\
    \ chart on aggregate feature importance and a line graph on feature importance\
    \ occupation class rejected.\n\nFigure 6-7\n\nAzure Machine Learning UI"
  raw: "### TPOT\n\nTPOT (Tree-based Pipeline Optimization Tool) uses a tree-based\
