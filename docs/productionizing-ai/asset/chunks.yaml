  trans: "\n### 数据湖部署 – 最佳实践\n\n如今，许多希望实施企业级人工智能的公司都致力于构建一个数据湖，该数据湖能够持续刷新其多个数据流，同时优化性能和拓扑结构。\n\
    \n并非每家公司都能[负担得起构建数据湖的成本](https://www.trellance.com/the-cost-of-building-a-data-warehouse-for-an-analytics-platform/)，但即使单一工具难以企及，尽可能复制数据湖架构也是实现生产级敏捷性的最佳方式，同时还能避免数据仓库、关系型与非关系型数据库、大数据引擎、机器学习工具和日志文件等资源之间出现多重（且通常是冗余的）数据流。为了解决这些问题，例如\
    \ `dremio` 推荐以下最佳实践设计：\n\n- **采用以数据湖为中心的设计** – 将数据湖视为单一事实来源\n- **计算与数据分离** – 实现成本节约\n\
    - **最小化数据副本** – 减少治理开销\n- **确定高层级数据湖设计模式** – 支持用户层级和合规性\n- **保持开放、灵活和可移植** – 确保架构可变更/面向未来，支持多云环境\n\
    \n![](img/527966_1_En_9_Fig9_HTML.jpg)\n\n中心轮图显示为 AWS 数据湖。周围七个点分别显示为关系型数据库、非关系型数据库、机器学习、数据仓库、日志分析和大数据处理。\n\
    \n**图 9-9** – 作为集中式单一事实来源的数据湖 (`dremio`)\n\n### 数据管道运营与编排\n\n为了了解这在实际中如何运作，值得看一个案例研究。以下架构以\
    \ Azure Data Lake Storage (`ADLS Gen2`) 为核心，展示了一家游戏公司如何运行复杂的分析。^(¹⁴¹)\n\n底层业务场景是：一家游戏公司从游戏日志中收集\
    \ PB 级的（用户）数据，并希望分析这些日志以深入了解客户偏好、人口统计信息和使用行为。通常，本地数据存储会保存参考/主数据，例如（敏感的）客户详细信息、游戏\
    \ ID 和营销活动数据。\n\n该公司的次要目标可能包括识别追加销售和交叉销售机会、开发引人注目的新功能、推动业务增长以及提供更好的客户体验 (`CX`)。\n\
    \n此案例中的目标架构^(¹⁴²)（图 9-10）使用 Azure Data Factory（非常适合其基于云的 ETL 和数据集成服务）来（自动）编排数据驱动的工作流/管道，启动一个从\
    \ `ADLS Gen2`（批处理数据）和 `Kafka`（流式数据）获取数据的 Spark 集群（Azure HDInsight），然后将转换后的数据发布到\
    \ Azure SQL 数据库，用于下游报告。\n\n![](img/527966_1_En_9_Fig10_HTML.jpg)\n\n流程图显示两个输入数据：历史/批处理数据和流式数据。第一个输入流经摄取、存储、预处理、服务并提供给\
    \ Power BI。\n\n**图 9-10** – 用于 PB 级数据处理和分析的现代架构 (Azure)\n\n## 大数据引擎与并行化\n\n我们已经在前面章节中探讨过分布式处理和集群的使用，并在第\
    \ 5 章中探讨过作为大数据处理引擎的 Apache Spark。\n\n作为分布式、横向扩展数据处理的事实标准，Apache Spark 自然适用于需要（PB\
    \ 级）大数据处理的人工智能应用，但其基于 Scala 的语法和可用性，即使通过 `PySpark`（用于实现 Apache Spark 的 Python\
    \ 库/封装器），也比像 `pandas` 这样的标准 Python 库要复杂一些。\n\n然而，除了直接使用 Apache Spark 之外，还有其他选择，例如\
    \ Koalas——它将用户友好的 `pandas` 风格数据框操作与高性能的 Apache Spark DataFrame 分布相结合^(¹⁴³)。\n\n\
    `Dask`——一个用于扩展 Python 的平台，与 Spark 类似，可以从单节点扩展到数千节点集群——是另一个替代方案，我们现在将介绍它。\n\n###\
    \ Dask\n\n`Dask` 的功能比 Spark 少，体积更小，因此比 Spark 更轻量。它也没有 Spark 那种对统一应用计算的高层优化，但 `Dask`\
    \ 确实有其优势：^(¹⁴⁴)\n\n- 使用 Python 而非 Scala 编写\n- 与 `Pandas` 和 `Scikit-learn` 等其他\
    \ Python 库集成性强\n- 侧重于 Python 集成，而非 Apache 项目集成\n- 将计算移至数据所在位置，而非相反\n\n`Dask` 基于两个关键概念工作：延迟/后台执行和惰性执行，用于堆叠转换/计算以实现并行处理。我们将在下面的动手实验中探讨这两者。\n\
    \n### 利用 S3 文件存储：动手实践\n\n**使用 S3 的应用文件存储**\n\n本练习的目标是使用 Python 与云上最重要的存储资源之一——Amazon\
    \ Simple Storage Service (`S3`)——进行交互：\n\n1. 从以下 GitHub 链接克隆文件，并解压到本地目录：\n\n \
    \  `https://github.com/bw-cetech/apress-9.3.git`\n\n2. 在离你最近的 AWS 区域创建一个可公开访问的\
    \ `S3` 存储桶，例如命名为 `my-s3-fs`。\n\n3. 创建 AWS 访问密钥并下载：\n\n   `https://console.aws.amazon.com/iam/home?#/security_credentials`\n\
    \n4. 下载 AWS CLI 安装程序 `https://awscli.amazonaws.com/AWSCLIV2.msi` 并安装 AWS 命令行界面。\n\
    \n5. 按照以下步骤将你的本地文件推送（上传）到 AWS 上的 `S3` 存储桶：\n   1. 打开终端/命令提示符。\n   2. 输入 `aws configure`。\n\
    \   3. 输入上面下载的访问密钥和秘密密钥。\n   4. 输入你的默认 AWS 区域，例如 `eu-west-2`。\n   5. 将默认输出格式指定为\
    \ `json`。\n   6. 使用 `cd` 命令进入本地（解压后）文件所在的文件夹。\n   7. 使用以下命令将数据同步到你的 `S3` 存储桶：\n\
    \n      `aws s3 sync . s3://pv-s3-fs`\n\n   下载的 GitHub 数据现已推送至 AWS，并存储在你的 `S3`\
    \ 存储桶中。\n\n6. **练习** – 尝试从 Python 连接到 `S3` 以下载图片。使用上述 GitHub 链接中提供的笔记本 `AWS-S3-Download.ipynb`\
    \ 核对你的答案。\n\n### 在 Databricks 上快速上手 Apache Spark：动手实践\n\n**使用 Apache Spark 处理海量物联网数据**\n\
    \n在本实验中，我们将重新审视 Databricks 和 Apache Spark，以比较它们在物联网数据集上的运行时间。\n\n1. 在 Databricks\
    \ 社区版 [`https://community.cloud.databricks.com/login.xhtml`](https://community.cloud.databricks.com/login.xhtml)\
    \ 中，创建一个空白笔记本并启动一个集群。\n\n2. 按照下方笔记本中的步骤：[`https://community.cloud.databricks.com/?o=765164012049213#notebook/1443608314106734/command/3293421293983457`](https://community.cloud.databricks.com/%253Fo%253D765164012049213%2523notebook/1443608314106734/command/3293421293983457)\
    \ 完成所示步骤：\n   1. 从下方链接导入物联网数据：[`https://raw.githubusercontent.com/dmatrix/examples/master/spark/databricks/notebooks/py/data/iot_devices.json`](https://raw.githubusercontent.com/dmatrix/examples/master/spark/databricks/notebooks/py/data/iot_devices.json)\n\
    \n      **注意：** 由于文件大小为 61 MB，你可能需要将 JSON 文件内容复制粘贴到一个 `.txt` 文件中，并先将其作为 JSON 文件保存在本地。\n\
    \n   2. 使用 Scala 对数据集执行探索性数据分析（EDA）和数据整理。\n   3. 使用 SQL 查询数据。\n   4. 比较 Spark\
    \ 集群与 Jupyter 的运行时间。\n"
- fmt: "### Dask Parallelization: Hands-on Practice\n\n**DASK PARALLELIZATION**\n\n\
    Following the steps shown in the process diagram below, the goal of this exercise\
    \ is to familiarize ourselves with (Python-based) big data processing using Dask:\n\
    \n1.  Clone the GitHub repo `git clone` [`http://github.com/dask/dask-tutorial`](http://github.com/dask/dask-tutorial)\n\
    2.  Create a conda environment\n3.  Launch either Jupyter Lab or Jupyter Notebook\n\
    4.  Walk through the code sample `dask.delayed.ipynb` to get a feel for how Delayed\
    \ Execution works in Dask\n\nNB to see how complex extract, transform and load\
    \ (ETL) over a cluster works see the gif in the follow-on notebook:\n\n[`https://github.com/dask/dask-tutorial/blob/main/01x_lazy.ipynb`](https://github.com/dask/dask-tutorial/blob/main/01x_lazy.ipynb)\n\
    \n1.  Exercise – do the same with Lazy Execution, that is, run the `01x_lazy.ipynb`\
    \ notebook\n2.  Compare runtime reading the `README.md` file word by word vs.\
    \ line by line\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig11_HTML.png)\n\
    \nThe diagram is shown as a staircase. The steps at each level read clone github\
    \ dask tutorial, create conda environment, launch notebook, and practise with\
    \ `dask.dot.delayed`.\n\n**Figure 9-11** Introduction to Dask – lab process\n\n\
    ## Full Stack and Containerization…the final frontier\n\nAnd so we arrive at the\
    \ last section in this penultimate chapter where we address packaging a “full-stack”\
    \ deployed solution. We revisit our full stack AI application lab from Chapter\
    \ [7](#527966_1_En_7_Chapter.xhtml) before wrapping up on the use of containers,\
    \ specifically Docker^([^(145)](#fn145)) – often the final piece of the jigsaw\
    \ to simplify and successfully deploy an AI app.\n\n### Full Stack AI – React\
    \ and Flask Case Study\n\nAt the end of Chapter [7](#527966_1_En_7_Chapter.xhtml),\
    \ we deployed our first AI application using `react.js`, Plotly Dash, Flask, and\
    \ TensorFlow. The process used is a great step-by-step guide to implementing any\
    \ AI application from training a model and exporting the model as a hierarchical\
    \ data format (`.h5`) file, setting up a virtual environment, creating a back-end\
    \ for model integration, then a front-end UI before running the app locally first,\
    \ then as a hosted endpoint solution.\n\nThis deployment process is shown graphically\
    \ in Figure [9-12](#527966_1_En_9_Chapter.xhtml#Fig12) for reference.\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig12_HTML.jpg)\n\
    \nA set of four tabs with titles establish storage resource, train and export\
    \ model, create flashback end, and install and design react front end.\n\n**Figure\
    \ 9-12** Full-Stack Deployment revisited – `react.js` and Flask\n\nUnfortunately\
    \ building an AI app in this way can be rather cumbersome due to the high dependency\
    \ on local file and library configuration. This is where containers can help –\
    \ providing a means to ringfence dependencies and ensure there are no conflicts\
    \ when deploying across different end-user systems.\n\n### Deploying on Cloud\
    \ with a Docker Container\n\nThe subject of our final hands-on lab in this chapter,\
    \ deploying on cloud with Docker, is the recommended route for productionizing\
    \ AI. As shown in the graphic below, this starts by training a model before exporting\
    \ (this time as a pickle file).\n\nWe then download a boilerplate solution (source\
    \ code From GitHub), and can optionally test the steps for Full-Stack AI described\
    \ above, to carry out an (a) local (standalone) install (complete with local file\
    \ dependencies).\n\nFollowing a successful local install, we proceed to (b) a\
    \ local containerized docker instance, testing that before finally (c) authenticating\
    \ the cloud (in this case ACR – Azure Container Registry), rebuilding our container\
    \ image and pushing our Docker instance to ACR.\n\nLastly, we create an (Azure)\
    \ Web App, point to the Docker image in ACR, and view our deployed application.\
    \ The real value of this productionized solution is that all our dependencies\
    \ are installed via a `requirements.txt` file within the internal Docker environment,\
    \ ringfenced from potential conflicts with outside (external) files.\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig13_HTML.jpg)\n\
    \nA set of seven points title, run training script, download app source code and\
    \ run locally, install docker and kitematic, build docker image, run docker local,\
    \ authenticate with A C R and push to cloud, create, and run azure web app.\n\n\
    **Figure 9-13** Deploying a containerized Docker AI app to Azure\n\n### Implementing\
    \ a Continuous Delivery Pipeline\n\nWe finish off by returning to our distinct\
    \ AI project phases from “Typical barriers to Production” above. Experimentation\
    \ around solution development and design is a means to an end, that is, toward\
    \ our goal of productionizing or industrializing our AI application.\n\nAs DataKitchen\
    \ put it, we have an innovation pipeline and a value pipeline:\n\n*   **Innovation\
    \ Pipeline** – AI models are developed, designed, tested, and deployed into the\
    \ Value Pipeline\n*   **Value Pipeline** – data is fed into AI models producing\
    \ analytics that deliver value to the process for new model creation\n\nEach pipeline\
    \ in itself is a set of iterative stages typically defined by a set of files and\
    \ implemented using a range of tools, from scripts, source code, algorithms, html\
    \ configuration files, parameter files, and containers.\n\nAnd code of course\
    \ controls the entire data-analytics pipeline from end to end, effectively from\
    \ ideation, design, and requirements capture through training, testing, deployment\
    \ to operations, and postproduction maintenance.\n\n![](images/527966_1_En_9_Chapter/527966_1_En_9_Fig14_HTML.jpg)\n\
    \nThe chart determines the following steps of the value pipeline, data to production,\
    \ development, and idea to value. The middle part is known as the quality innovation\
    \ pipeline.\n\n**Figure 9-14** The continuous delivery pipeline\n\n### Wrap-up\n\
    \nWith that look at continuous AI delivery, we have reached the end of our journey\
    \ through how to deploy an AI solution. The two labs that follow are intended\
    \ to give a more “immersive” experience of productionizing AI, with the end goal\
    \ being “full-stack” AI application.\n\nAlthough this chapter brings us to the\
    \ end of the main theme of this book, we do have one further chapter to go. Largely\
    \ due to step-changes in enabling technology (particularly transformers) and heightened\
    \ focus on unstructured data, Natural Language Processing has carved off as its\
    \ own field of interest and is the subject of our final chapter.\n\n### DL App\
    \ deployment with Streamlit and Heroku: Hands-on Practice\n\n**DL HOSTING WITH\
    \ STREAMLIT, GOOGLE, AND HEROKU**\n\nOur last two labs are end-to-end application\
    \ deployments, this one trains a model first with Google teachable Machine, uses\
    \ Streamlit to create a front-end for inference, then deploys to Heroku as a hosted\
    \ app:\n\n1.  Go to [`https://teachablemachine.withgoogle.com/train/image`](https://teachablemachine.withgoogle.com/train/image)\
    \ and create a trained model as described in steps 1-5 under \"Steps to create\
    \ the model and app\" at the link below:\n\n    [`https://towardsdatascience.com/build-a-machine-learning-app-in-less-than-an-hour-300d97f0b620`](https://towardsdatascience.com/build-a-machine-learning-app-in-less-than-an-hour-300d97f0b620)\n\
    \n2.  Download files from `C:\\Users\\Barry Walsh\\Testing\\xray-automl\\Streamlit-Heroku-setup.zip`\
    \ and unzip to a test folder on your local drive\n\n3.  Install all requirements\
    \ in a virtual environment including `pillow`, `tensorflow` and `scikit-learn`\n\
    \n4.  Run the command below and check that the app is working correctly locally\n\
    \n![](images/527966_1_En_9_Chapter/527966_1_En_9_Figa_HTML.jpg)\n\nThe dialog\
    \ box is provided with a thorax x-ray. The title of the box is image classification\
    \ with teachable machine learning with the subtitle normal x-ray versus pneumonia\
    \ x-ray.\n\n1.  Exercise: finally repeat the steps in the lab above “Hosting on\
    \ Heroku – End-to-End: Hands-on Practice” to deploy as an endpoint solution on\
    \ cloud\n\n```\nstreamlit run xray.py\n```"
