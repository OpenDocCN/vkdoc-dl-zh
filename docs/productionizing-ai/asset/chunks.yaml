- fmt: "### NLP 2.0\n\nThe limitless potential of natural language transformers has\
    \ already been discussed in the last section but we take a look below at other\
    \ recent advances in state-of-the-art (SOTA) NLP technologies expected to become\
    \ core organizational apps in the near future.\n\n#### Natural Language Generation\n\
    \nNatural language generation is the production, rather than interpretation, of\
    \ natural language. Although somewhat primitive, autocomplete is an example of\
    \ NLG.\n\nExtensive sectoral use cases include digital marketing content creation,\
    \ financial/medical report creation and journalism, product labeling in ecommerce/retail,\
    \ travel updates, and customer service optimization.\n\nAlthough NLG has also\
    \ been around for some years already, the increasingly massive parametrization\
    \ capability of transformers has resulted in seismic improvements in outputs,\
    \ particularly in relation to credibility of AI-generated report writing.\n\n\
    Google’s `Smart Compose`, `Arria`, and `WordSmith` are three leading tools for\
    \ supporting natural language generation^([^(193)](#fn193)) but as we will see\
    \ in a hands-on lab at the end of this chapter, we can also use a GPT-3 transformer\
    \ to generate text, in this case a cooking recipe based on ingredients.\n\n####\
    \ Debating\n\nSophistication in computational discussion, argumentation, and debating\
    \ technologies has reached a point where machines are able to credibly debate\
    \ humans.^([^(194)](#fn194))\n\nIBM’s `Project Debater` is pitched as the “first\
    \ AI system that can debate humans on complex topics” and is composed of four\
    \ core modules: argument mining, an argument knowledge base (AKB), argument rebuttal\
    \ and debate construction, where the first two modules provide the content for\
    \ debates.^([^(195)](#fn195)) The tool uses similar sequence to sequence and attention\
    \ mechanisms intrinsic to transformers and has favorable ratings for, for example,\
    \ an opening speech when compared with human (nonexpert) speeches and other NLP\
    \ transformers such as GPT-2.\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig11_HTML.jpg)\n\
    \nA diagram illustrates the input from Subsidize preschool, groups into argument\
    \ mining, and knowledge base. The argument knowledge base proceeds to make rebuttal\
    \ model through principled leads and sentiment key term responses. The models\
    \ provide corpus-based, principled, and rebutted arguments for debate construction\
    \ resulting in a speech.\n\n**Figure 10-11** IBM Project Debater System Architecture\n\
    \n#### Auto-NLP\n\nNaturally, given the trends toward full automation in machine\
    \ and deep learning, there is much focus on automating the myriad of steps involved\
    \ in the NLP lifecycle.\n\n`Hugging Face` are a leader in this area, their `AutoNLP`\
    \ tool integrates with the `Hugging Face Hub`’s substantial collection of datasets\
    \ and pretrained^([^(196)](#fn196)) SOTA transformer models. `NeuralSpace` are\
    \ another, with multilingual support to train models with `AutoNLP` in 87 languages.^([^(197)](#fn197))\n\
    \nThe `auto-nlp` Python library also provides an abstraction layer and low code\
    \ functionality over existing Python NLP packages (such as `spaCy`) in much the\
    \ same way as `auto-sklearn` provides low code automation for `sklearn` machine\
    \ learning. `AutoVIML` (Automatic Variant Interpretable ML) is another Python\
    \ library for Auto-NLP which automates the preprocessing, linguistic analysis\
    \ (stemming and lemmatization, etc.), and vectorization steps.\n\n### Wrap-up\n\
    \nMoving on from these NLP trends, we complete this final chapter on natural language\
    \ processing with a couple of hands-on labs focused on some of the dominant applications\
    \ and tools in 2022. These labs bring us to the end of this journey and a practical\
    \ conclusion to Productionizing AI solutions with Cloud and Python. We do though\
    \ have some final words to close out on in our concluding few pages.\n\nA recurring\
    \ theme of this book has been the level of experimentation, and at times (cloud)\
    \ cost-based workarounds, employed to implement AI. Not every company has budget\
    \ to meet the costs of high-performance compute instances, or high throughput,\
    \ secure storage. The current climate for AI solution implementation and the concentration\
    \ of market power may mean these challenges remain for several years to come but\
    \ we look in these last pages at the possibility of game-changing innovations\
    \ that may allow the wider ecosystem to escape the gravitational pull of the CSPs.\n\
    \n### WATSON Assistant Chatbot/IVA: Hands-on Practice\n\nHR DIALOGUE CONFIG FOR\
    \ CONVERSATIONAL AI\n\nAs a Gartner Magic Quadrant leader for Enterprise Conversational\
    \ AI, and with IBM Watson users achieving a 337% ROI over three years,^([^(198)](#fn198))\
    \ Watson Assistant is one of the industry-leading tools for IVA automation.\n\n\
    The goal of this exercise is to create an HR IVA on Watson Assistant which uses\
    \ growing user interaction to re-train and improve responses to user questions\
    \ on job applications and internal company policy:\n\n1.  Go to the link^([^(199)](#fn199))\
    \ `https://eu-de.assistant.watson.cloud.ibm.com/` and sign in with your IBM ID.\
    \ If redirected to IBM Cloud, enter login details or sign up.\n\n2.  Select the\
    \ Assistant option on the top LHS of the screen > Create Assistant\n\n3.  Add\
    \ dialog skill > Upload Skill and upload the json dialogue from the link below\n\
    \n    `https://github.com/bw-cetech/apress-10.4.git`\n\n4.  Open the newly created\
    \ Assistant and observe the user intents (these are the themes of the user’s questions\
    \ such as org structure, payroll, complaint, admin, humor, etc.) and **entities**\
    \ (the subject of the user’s questions such as team, people, services, pay, extras:\
    \ stocks/shares/pension, etc.)\n\n5.  The dialogue is preconfigured – test it\
    \ with the dialogue below^([^(200)](#fn200))\n\n    PART I (job enquiry)\n\n \
    \   ```\n    hello\n    can you fill me in on my job application\n    open position\n\
    \    technical\n    yes\n    ```\n\n    PART II (company policies):\n\n    ```\n\
    \    can you help me with share options\n    is there a reduced price for employees?\n\
    \    ```\n\n    PART III (humor):\n\n    ```\n    I may be dead soon, how is my\
    \ life insurance, salary and pension paid to my family?\n    no\n    goodbye\n\
    \    ```\n\n6.  **Exercise** – swap the dialog for a typical customer support\
    \ IVA for an online retailer\n\n7.  **Exercise (stretch)** – push to IBM Cloud\
    \ by adding web chat integration to your Watson Assistant (API details are shown\
    \ under “View API Details” on the Assistant UI)\n\n8.  **Exercise (stretch)**\
    \ – add WhatsApp (with Twilio) integration to your Watson Assistant\n\n9.  **Exercise**\
    \ – set up an app routine which automatically re-trains the NLP model each month\
    \ based on the latest user conversations"
  raw: "### NLP 2.0\n\nThe limitless potential of natural language transformers has\
    \ already been discussed in the last section but we take a look below at other\
    \ recent advances in state-of-the-art (SOTA) NLP technologies expected to become\
    \ core organizational apps in the near future.\n\n#### Natural Language Generation\n\
    \nNatural language generation is the production, rather than interpretation, of\
    \ natural language. Although somewhat primitive, autocomplete is an example of\
    \ NLG.\n\nExtensive sectoral use cases include digital marketing content creation,\
    \ financial/medical report creation and journalism, product labeling in ecommerce/retail,\
    \ travel updates, and customer service optimization.\n\nAlthough NLG has also\
    \ been around for some years already, the increasingly massive parametrization\
    \ capability of transformers has resulted in seismic improvements in outputs,\
    \ particularly in relation to credibility of AI-generated report writing.\n\n\
    Google’s Smart Compose, Arria, and WordSmith are three leading tools for supporting\
    \ natural language generation^([^(193)](#fn193)) but as we will see in a hands-on\
    \ lab at the end of this chapter, we can also use a GPT-3 transformer to generate\
    \ text, in this case a cooking recipe based on ingredients.\n\n#### Debating\n\
    \nSophistication in computational discussion, argumentation, and debating technologies\
    \ has reached a point where machines are able to credibly debate humans.^([^(194)](#fn194))\n\
    \nIBM’s Project Debater is pitched as the “first AI system that can debate humans\
    \ on complex topics” and is composed of four core modules: argument mining, an\
    \ argument knowledge base (AKB), argument rebuttal and debate construction, where\
    \ the first two modules provide the content for debates.^([^(195)](#fn195)) The\
    \ tool uses similar sequence to sequence and attention mechanisms intrinsic to\
    \ transformers and has favorable ratings for, for example, an opening speech when\
    \ compared with human (nonexpert) speeches and other NLP transformers such as\
    \ GPT-2.\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig11_HTML.jpg)\n\
    \nA diagram illustrates the input from Subsidize preschool, groups into argument\
    \ mining, and knowledge base. The argument knowledge base proceeds to make rebuttal\
    \ model through principled leads and sentiment key term responses. The models\
    \ provide corpus-based, principled, and rebutted arguments for debate construction\
    \ resulting in a speech.\n\nFigure 10-11\n\nIBM Project Debater System Architecture\n\
    \n#### Auto-NLP\n\nNaturally, given the trends toward full automation in machine\
    \ and deep learning, there is much focus on automating the myriad of steps involved\
    \ in the NLP lifecycle.\n\nHugging Face are a leader in this area, their AutoNLP\
    \ tool integrates with the Hugging Face Hub’s substantial collection of datasets\
    \ and pretrained^([^(196)](#fn196)) SOTA transformer models. NeuralSpace are another,\
    \ with multilingual support to train models with AutoNLP in 87 languages.^([^(197)](#fn197))\n\
    \nThe auto-nlp Python library also provides an abstraction layer and low code\
    \ functionality over existing Python NLP packages (such as spaCy) in much the\
    \ same way as auto-sklearn provides low code automation for sklearn machine learning.\
    \ AutoVIML (Automatic Variant Interpretable ML) is another Python library for\
    \ Auto-NLP which automates the preprocessing, linguistic analysis (stemming and\
    \ lemmatization, etc.), and vectorization steps.\n\n### Wrap-up\n\nMoving on from\
    \ these NLP trends, we complete this final chapter on natural language processing\
    \ with a couple of hands-on labs focused on some of the dominant applications\
    \ and tools in 2022\\. These labs bring us to the end of this journey and a practical\
    \ conclusion to Productionizing AI solutions with Cloud and Python. We do though\
    \ have some final words to close out on in our concluding few pages.\n\nA recurring\
    \ theme of this book has been the level of experimentation, and at times (cloud)\
    \ cost-based workarounds, employed to implement AI. Not every company has budget\
    \ to meet the costs of high-performance compute instances, or high throughput,\
    \ secure storage. The current climate for AI solution implementation and the concentration\
    \ of market power may mean these challenges remain for several years to come but\
    \ we look in these last pages at the possibility of game-changing innovations\
    \ that may allow the wider ecosystem to escape the gravitational pull of the CSPs.\n\
    \n### WATSON Assistant Chatbot/IVA: Hands-on Practice\n\nHR DIALOGUE CONFIG FOR\
    \ CONVERSATIONAL AI\n\n**As a Gartner Magic Quadrant leader for Enterprise Conversational\
    \ AI, and with IBM Watson users achieving a 337% ROI over three years,**^([^(198)](#fn198))\
    \ **Watson Assistant is one of the industry-leading tools for IVA automation.**\n\
    \n**The goal of this exercise is to create an HR IVA on Watson Assistant** **which\
    \ uses growing user interaction to re-train and improve responses to user questions\
    \ on job applications and internal company policy:**\n\n1.  Go to the link^([^(199)](#fn199))\
    \ [https://​eu-de.​assistant.​watson.​cloud.​ibm.​com/​](https://eu-de.assistant.watson.cloud.ibm.com/)\
    \ and sign in with your IBM ID. If redirected to IBM Cloud, enter login details\
    \ or sign up.\n\n2.  Select the Assistant option on the top LHS of the screen\
    \ > Create Assistant\n\n3.  Add dialog skill > Upload Skill and upload the json\
    \ dialogue from the link below\n\n    [https://​github.​com/​bw-cetech/​apress-10.​4.​git](https://github.com/bw-cetech/apress-10.4.git)\n\
    \n4.  Open the newly created Assistant and observe the user intents (these are\
    \ the themes of the user’s questions such as org structure, payroll, complaint,\
    \ admin, humor, etc.) and **entities** (the subject of the user’s questions such\
    \ as team, people, services, pay, extras: stocks/shares/pension, etc.)\n\n5. \
    \ The dialogue is preconfigured – test it with the dialogue below^([^(200)](#fn200))\n\
    \n    PART I (job enquiry)\n\n    ```\n    hello\n    can you fill me in on my\
    \ job application\n    open position\n    technical\n    yes\n    ```\n\n    PART\
    \ II (company policies):\n\n    can you help me with share options\n\n    is there\
    \ a reduced price for employees?\n\n    PART III (humor):\n\n    I may be dead\
    \ soon, how is my life insurance, salary and pension paid to my family?\n\n  \
    \  no\n\n    goodbye\n\n6.  **Exercise** – swap the dialog for a typical customer\
    \ support IVA for an online retailer\n\n7.  **Exercise (stretch)** – push to IBM\
    \ Cloud by adding web chat integration to your Watson Assistant (API details are\
    \ shown under “View API Details” on the Assistant UI)\n\n8.  **Exercise (stretch)**\
