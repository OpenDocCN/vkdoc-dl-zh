    \ API Gateway, a key component of Amazon Web Services and the means by which streaming\
    \ data can be ingested from the web via REST, HTTP, or WebSocket API and AWS Kinesis\
    \ into an AI application.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig3_HTML.jpg)\n\
    \nA representation exhibits the data ingestion pipeline, determined for amazon\
    \ A P I gateway. The process includes simulated A P I, A P I gateway and kinesis.\n\
    \nFigure 3-3\n\nData Ingestion via AWS API Gateway REST API\n\n### Data Types\
    \ (Structured vs. Unstructured)\n\nBatch vs. streaming is one perspective of Data\
    \ Ingestion today, but **structured vs. unstructured** is arguably even more relevant\
    \ in 2022 and mastering both of these in a Data Strategy is often the difference\
    \ between an agile business able to quickly identify value-added opportunities\
    \ from data.\n\n**Structured data** is data that has been predefined and formatted\
    \ to a set structure before being placed in data storage. This is the tabular\
    \ data that most business users have been familiar with since computers have been\
    \ around; csvs and excel are examples of structured data.\n\n**Unstructured data**\
    \ is data stored in its raw, native format and not generally processed until it\
    \ is used. The explosion of interest in unstructured data in AI today stems from\
    \ the ability to accumulate the data faster and its inherently feature-rich composition;\
    \ pdfs and images are unstructured formats.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig4_HTML.jpg)\n\
    \nA set of 3 representations of unstructured data, semi structured data and structured\
    \ data. Unstructured data is data stored in its raw form. Structured data is represented\
    \ in tabular form.\n\nFigure 3-4\n\nUnstructured, semistructured, and structured\
    \ data\n\n### File Types\n\nWe wrap up our introduction to data ingestion with\
    \ a closer look at file formats. How you store Big Data in modern data stores\
    \ is critical, and any solution architect needs to consider the underlying format\
    \ of the data, compression and how to leverage distributed computing/how to partition\
    \ data in the fastest, most optimal way.\n\nTraditional file formats such as .txt,\
    \ .csv, and json have been around for decades and so we assume the reader is familiar\
    \ with these. Newer formats such as avro, Parquet, and Apache ORC, tr.gz, and\
    \ pickle formats have sprung up to mesh with rapid advances in the use of clusters\
    \ (a group of remote computers) in big data processing.\n\n**Apache Parquet**\
    \ is an open source column-oriented data storage format of the Apache Hadoop ecosystem.\
    \ A binary format that is more compressed by virtue of storing repeat data structures\
    \ as columns, Parquet contains metadata about contents of the data such as column\
    \ names, compression/encoding, data types, and basic stats. Compressed columnar\
    \ files like Parquet, ORC, and Hadoop RCFile have lower storage requirements and\
    \ are ideal for optimal performance during query execution as they read quickly\
    \ (although write slowly). We will take a further look at parquet formats in a\
    \ lab at the end of this section.\n\n**Avro files** are a row-based binary file\
    \ with a schema stored in a dictionary (specifically JSON) format. Avro files\
    \ support strong schema evolution by managing added, missed, and changed fields.\
    \ Because they are row-based, Avro or JSON is ideally suited for ETL (extract,\
    \ transform, and load) staging layers.\n\nA summary of these file formats compared\
    \ with csv and json is shown in Figure [3-5](#527966_1_En_3_Chapter.xhtml#Fig5).\n\
    \n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig5_HTML.png)\n\nA table represents\
    \ a summary of the file formats compared with C S V, J S O N, parquet and avro.\
    \ Columnar, compressable, splittable, readable and scheme evolution are the included\
    \ properties.\n\nFigure 3-5\n\nFeatures of BIG data file formats ([`luminousmen.com`](http://luminousmen.com))\n\
    \n**Two other important formats, Pickle** and **HDF5**^([^(43)](#fn43)) (Hierarchical\
    \ Data Format version 5) are often used in Python, generally to store trained\
    \ models. Both are fast – pickle in particular, but comes with the drawback of\
    \ increased storage space. HDF5 has better support for Big (heterogeneous) Data,\
    \ storing data in a hierarchical (directory-like/folder) structure, with repeat\
    \ data compressed in a similar way to parquet files.\n\n### Automated Data Ingestion:\
    \ Hands-on Practice\n\nHaving covered a brief introduction to AI Data Ingestion,\
    \ we now move on to our first hands-on practice on Data Ingestion.\n\nPYTHON DATA\
    \ INGESTION – WEATHER DATA\n\n**Using Python in Jupyter Notebook, the goal of\
    \ this exercise is to automate the ingestion of (live) semistructured weather\
    \ data, then transform and extract temperatures data**^([^(44)](#fn44)) **for\
    \ forecasting.**\n\n1.  Clone the GitHub repo below\n\n[`https://github.com/bw-cetech/apress-3.1.git`](https://github.com/bw-cetech/apress-3.1.git)\n\
    \n1.  Run through the code carrying the steps as below:\n    1.  Import Python\
    \ Libraries\n\n    2.  Connect to MetOffice data\n\n    3.  Carry our “recursive\
    \ wrangling” to extract temperature forecasts for D to D+7 (day time and night\
    \ time)\n\n    4.  Tidy up and present a Pandas dataframe table of forecasted\
    \ temperatures"
  trans: "\n### 计划性（OLAP）与流式（OLTP）数据\n\n所有企业中的数据处理，本质上都可以看作是计划性（批处理）或聚合数据与实时（流式）处理事务数据的组合。传统上，这两种数据类型分别被称为\
    \ OLAP（在线分析处理）和 OLTP（在线事务处理），其主要目标要么是处理数据（OLTP），要么是分析数据（OLAP）。\n\n聚合的批处理数据会按照定期计划的时间间隔被导入（并存储，例如在数据仓库中）——非常适合用于日终报告或管理报告。另一方面，流式处理是一种“即用即弃”的方法，对时间敏感的数据进行近实时处理，然后大部分被丢弃。当今许多超高速的数据消费，尤其是通过移动/手持设备消费的数据，都是以流式数据的形式进行的，例如物联网传感器数据、股票价格变动和智能电表信息。\n\
    \n最终，当今的组织必须划分其数据需求和架构版图，以决定哪些数据作为批处理数据处理，哪些作为流式数据处理。图 3-2 中的简化表示展示了大多数组织如何处理需要存储的流式数据：将其推送到企业数据仓库中。\n\
    \n![](img/527966_1_En_3_Fig2_HTML.jpg)\n\n该图展示了业务流程和企业数据仓库的 OLTP 操作与 OLAP 信息。此外，它还包含了分析、策略和事务。\n\
    \n图 3-2\n\n[`verticaltrail.com`](http://verticaltrail.com)\n\n如今，**Lambda 架构**和**微批处理**是存储和促进批处理及实时数据摄入处理的重要概念。\n\
    \n#### API\n\n除了远程数据库和原始日志之外，当今连接 OLTP 和 OLAP 数据最常见的方式之一是通过 API（应用程序编程接口）。本质上，API\
    \ 是一个软件中介，允许两个应用程序相互通信。下面的示例展示了 Amazon API Gateway 的使用，它是 Amazon Web Services\
    \ 的关键组件，也是通过 REST、HTTP 或 WebSocket API 以及 AWS Kinesis 将流式数据从网络摄入到 AI 应用程序中的方式。\n\
    \n![](img/527966_1_En_3_Fig3_HTML.jpg)\n\n该图展示了为 Amazon API Gateway 确定的数据摄入管道。该过程包括模拟\
    \ API、API Gateway 和 Kinesis。\n\n图 3-3\n\n通过 AWS API Gateway REST API 进行数据摄入\n\n\
    ### 数据类型（结构化与非结构化）\n\n批处理与流式是当今数据摄入的一个视角，但**结构化与非结构化**在 2022 年可以说更为重要，在数据战略中掌握这两者，往往是区分一个敏捷企业能否快速从数据中识别增值机会的关键。\n\
    \n**结构化数据**是在放入数据存储之前，已按照预定结构进行预定义和格式化的数据。这是自计算机问世以来大多数业务用户所熟悉的表格数据；`csvs`和`excel`是结构化数据的例子。\n\
    \n**非结构化数据**是以其原始、原生格式存储的数据，通常在使用前才进行处理。当今 AI 领域对非结构化数据的兴趣激增，源于其能够更快地积累数据以及其固有的丰富特征组成；`pdfs`和图像是非结构化格式。\n\
    \n![](img/527966_1_En_3_Fig4_HTML.jpg)\n\n一组 3 个表示非结构化数据、半结构化数据和结构化数据的图示。非结构化数据是以原始形式存储的数据。结构化数据以表格形式表示。\n\
    \n图 3-4\n\n非结构化、半结构化和结构化数据\n\n### 文件类型\n\n我们通过更深入地了解文件格式来结束对数据摄入的介绍。如何将大数据存储在现代化数据存储中至关重要，任何解决方案架构师都需要考虑数据的底层格式、压缩方式，以及如何利用分布式计算/如何以最快、最优的方式对数据进行分区。\n\
    \n传统的文件格式，如`.txt`、`.csv`和`json`，已经存在了几十年，因此我们假设读者对此已熟悉。较新的格式，如`avro`、`Parquet`、`Apache\
    \ ORC`、`tr.gz`和`pickle`格式，则随着集群（一组远程计算机）在大数据处理中的快速应用而涌现。\n\n**Apache Parquet**是\
    \ Apache Hadoop 生态系统中的一种开源列式数据存储格式。作为一种二进制格式，它通过将重复的数据结构存储为列来实现更高的压缩率。Parquet\
    \ 包含关于数据内容的元数据，例如列名、压缩/编码、数据类型和基本统计信息。像 Parquet、ORC 和 Hadoop RCFile 这样的压缩列式文件具有较低的存储需求，并且由于读取速度快（尽管写入速度慢），非常适合在查询执行期间实现最佳性能。我们将在本节末尾的实验室中进一步了解`parquet`格式。\n\
    \n**Avro 文件**是一种基于行的二进制文件，其模式以字典（特别是 JSON）格式存储。Avro 文件通过管理添加、缺失和更改的字段，支持强大的模式演化。由于它们是基于行的，Avro\
    \ 或 JSON 非常适合 ETL（提取、转换、加载）暂存层。\n\n这些文件格式与`csv`和`json`的比较总结如图 3-5 所示。\n\n![](img/527966_1_En_3_Fig5_HTML.png)\n\
    \n该表格总结了与 CSV、JSON、Parquet 和 Avro 相比的文件格式特性。包含的属性有：列式、可压缩、可分割、可读性和模式演化。\n\n图 3-5\n\
    \n大数据文件格式的特性（[`luminousmen.com`](http://luminousmen.com)）\n\n**另外两种重要的格式，Pickle**和**HDF5**^(⁴³)（分层数据格式第\
    \ 5 版），常用于 Python 中，通常用于存储训练好的模型。两者速度都很快——尤其是`pickle`，但其缺点是占用更多的存储空间。HDF5 对大型（异构）数据有更好的支持，它以分层（类似目录/文件夹）结构存储数据，并以类似于`parquet`文件的方式压缩重复数据。\n\
    \n### 自动化数据摄入：动手实践\n\n在简要介绍了 AI 数据摄入之后，我们现在进入第一个关于数据摄入的动手实践。\n\nPYTHON 数据摄入——天气数据\n\
    \n**本练习的目标是使用 Jupyter Notebook 中的 Python，自动化摄入（实时的）半结构化天气数据，然后转换并提取温度数据**^(⁴⁴)**以用于预测。**\n\
    \n1.  克隆下面的 GitHub 仓库\n\n[`https://github.com/bw-cetech/apress-3.1.git`](https://github.com/bw-cetech/apress-3.1.git)\n\
    \n2.  按照以下步骤运行代码：\n    1.  导入 Python 库\n    2.  连接到英国气象局数据\n    3.  执行“递归整理”以提取\
    \ D 到 D+7 天（白天和夜间）的温度预测\n    4.  整理并呈现一个包含预测温度的 Pandas 数据框表格\n"
- fmt: "### Working with Parquet: Hands-on Practise\n\nCompressing & Scaling Big data\
    \ in Healthcare\n\n**We described earlier in this section how parquet files use\
    \ a columnar format for data compression. We take a look in this lab at how to\
    \ work with these files.**\n\n1.  Clone the GitHub repo below\n\n    [`https://github.com/bw-cetech/apress-3.1b.git`](https://github.com/bw-cetech/apress-3.1b.git)\n\
    \n2.  Download the US CDC (Centers for Disease Control and Prevention) dataset\
    \ from the link below:\n\n    [`https://catalog.data.gov/dataset/social-vulnerability-index-2018-united-states-tract`](https://catalog.data.gov/dataset/social-vulnerability-index-2018-united-states-tract)\n\
    \n    **NB the above file is 201 MB so may take up to 10 minutes to download on\
    \ a good connection (8 GB RAM laptop, c. 50 Mbps broadband download speed)**\n\
    \n3.  Run through the code in Google Colab:\n\n    1.  Import libraries to work\
    \ with Parquet (here the Apache Arrow `pyarrow` library)\n\n    2.  Upload the\
    \ CDC data downloaded above (this may take up to 30 minutes due to the file size)\n\
    \n    3.  Perform basic EDA (data dimensions / no. of rows/columns, data types\
    \ and first five rows etc.)\n\n    4.  Mount Google Drive in preparation for saving\
    \ the Parquet files\n\n    5.  Convert `Pandas DataFrame` to parquet - compresses\
    \ to 75 MB. NB this can be done directly rather by first converting to an Arrows\
    \ table\n\n    6.  Read Parquet file back\n\n    7.  Repeat EDA steps on the parquet\
    \ data to validate the data\n\n4.  Exercise - finally have a go at opening the\
    \ parquet file in Microsoft Power BI (`Get Data` ➤ `Parquet` ➤ `Connect`^([^(45)](#fn45)))\
    \ and display the tree map shown below for total square mile area for counties\
    \ in Arizona\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig6_HTML.png)\n\
    \nAn illustration exhibits the total area in square miles for the 15 counties\
    \ in the state of Arizona. Coconino with 18,619 square miles and Mohave with 13,311\
    \ square miles are 2 of the largest.\n\n**Figure 3-6** Parquet Data visualisation\
    \ in PowerBI\n\n## Data Stores for AI\n\nData ingestion for an AI solution requires\
    \ storage, whether transient or fixed. Our next section elaborates on what’s important\
    \ to consider when storing data such as defining the data requirements, what kind\
    \ of data store do we need, Data Lake vs. Data Warehouse, OLAP vs. OLAP, ETL vs.\
    \ ELT, SQL vs. NoSQL, and the concept of elasticity vs. scalability\n\n### Data\
    \ Stores: Data Lakes and Data Warehouses\n\nA **Data Store** is the name given\
    \ to a repository for storing, managing, and distributing data across an enterprise.\
    \ Usually, this refers to a production database upon which many end users are\
    \ reliant, such as a CRM or ERP system.\n\nBroadly there are three main **Data\
    \ Stores** in use in most businesses today:\n\n*   **Data Lake** – around for\
    \ the last ten or so years, Data Lakes are increasingly the system of choice for\
    \ most data-led organizations, a Data Lake is a single storage repository for\
    \ raw, multiformat data sources, both structured and unstructured. Data Lakes\
    \ are by design better equipped to manage the four “v”s of data: variety, velocity,\
    \ volume, and veracity (integrity) and are measured by their ability to constantly\
    \ refresh multiple data streams yet optimizes performance and topology. Data Lakes\
    \ do have drawbacks – cataloging data is more difficult and a perceived lack of\
    \ data governance coupled with sometimes intractable data sources/models has led\
    \ to the term “data swamp”\n\n*   **Data Warehouse** – Data Warehouses are clean,\
    \ organized Data Stores, often designed and leveraged as a “single source of truth”\
    \ for enterprise data. They are most associated with structured data types organized\
    \ into a “schema” but modern Data Warehouses possess more functionality, including\
    \ storage of unstructured formats and data can be organized as a schema of views\
    \ on top of an existing data lake\n\n*   **Data Marts** – these are generally\
    \ a filtered and or aggregated subset of a Data Warehouse. Data Marts facilitate\
    \ simple, limited case querying and possess smaller schemas with focused tabular\
    \ data for faster downstream analytics/BI\n\nThe above are obviously “database”\
    \ style Data Stores but note that any file systems/hard drives used in an organization\
    \ are also examples of a Data Store containing additional rich datasets for AI\
    \ (such as images, pdfs, and columnar formats/flat files).\n\n#### Lakehouses\n\
    \nMany companies see the benefits of maintaining both Data Lakes and Data Warehouses\
    \ served to target specific organizational needs. It is no surprise then that\
    \ Lakehouses have been introduced as a new, open architecture that combines the\
    \ best features of both. Examples include **Databricks Lakehouse Platform**, **GCP\
    \ BigLake**, and **Snowflake** is at least partly considered a Data Lakehouse.\
    \ Perhaps even more interesting, is **Delta Lake**^([^(46)](#fn46)) – an open\
    \ source project that enables building a Lakehouse architecture on top of data\
    \ lakes.\n\nGiven that the “enterprise goal” is to have a Data Store system that\
    \ is as flexible and performant as possible, the idea of multiple, separate data\
    \ lakes, warehouses and databases might seem the most productive solution, but\
    \ the cost overhead and multiple integration points create complexity and latency.\n\
    \nLakehouses attempt to avoid these issues through the use of data structures\
    \ and data management features akin to that of a data warehouse while at the same\
    \ time possessing low-cost storage options similar to that of data lakes.\n\n\
    ### Scoping Project Data Requirements\n\nAlthough there is often a choice from\
    \ where to source data, businesses serious about competing in the age of digital\
    \ need to “mine” data at source – legacy “ETL” approaches are inadequate.\n\n\
    Best practice for ingesting data in general involves:\n\n*   “Mounting” data source(s)\n\
    \n*   Ingesting from primary source(s), not via middleware\n\n*   Seeking “atomic-level”\
    \ data, not aggregated/roll-out\n\nBesides ensuring the business is able to connect\
    \ directly to raw data sources, a DataOps/Agile approach should be used to scope\
    \ out the underlying business/organizational data requirements. One way of doing\
    \ this is capturing requirements in a “data dictionary” – a great tool for capturing\
    \ scope and later delivering both low (MVP) and high fidelity AI solutions.\n\n\
    A well-structured Data Dictionary helps with:\n\n*   Stakeholder alignment, buy-in,\
    \ and project sign-off\n\n*   Terminology and defining data types\n\n*   Collecting\
    \ and classifying data critical to the success of a Data project\n\n*   Categorizing/mapping\
    \ attributes from structured and unstructured data as well as online, offline,\
    \ and mobile sources\n\n*   Quick checks for primary keys for joining data\n\n\
    *   Isolating anomalies and data flow conflicts\n\n*   Documenting experiences\
    \ with new data sources\n\n*   Ongoing data maintenance\n\n### OLTP/OLAP – Determining\
    \ the Best Approach\n\nGiven the data requirements on all projects boil down to\
    \ OLTP and OLAP sources, what it the best approach? Historically, OLTP databases\
    \ would be ingested into OLAP systems through an ETL process (more on this in\
    \ the following section) but with the increasing need to source data from source,\
    \ we often need to get at the “raw” form, that is, Data Lake rather than Data\
    \ Warehouse access.\n\nIn general, we should identify the top three to five business\
    \ priorities for each downstream analytics/BI or AI requirement to determine how\
    \ to store/source our data:\n\n*   OLTP: if speed/response time is key\n\n*  \
    \ OLAP: if management/strategic insights are more important"
