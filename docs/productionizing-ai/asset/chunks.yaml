- fmt: '### Cognitive Robotic Process Automation (CRPA)


    `Cognitive Robotic Process Automation` is `Robotic Process Automation` that leverages
    AI. While traditional `RPA` configures computer software to execute a business
    process, cognitive `RPA` tools and solutions add predictive capability and enhanced
    exception handling on top of the underlying business process making use of such
    techniques as `OCR` and automated scanning, `Text Analytics`, `Voice to text`,
    and `Machine Learning`.


    While traditional `RPA` supports automation based on structured data, `CRPA` more
    commonly includes unstructured data sources.


    Many operational or portfolio management processes are today coupled with `Cognitive
    Robotic Process Automation (CRPA)`, marrying AI and automation for business problems
    such as:


    - Bulk payment processing

    - Transactional risk monitoring

    - Auto-completion of forms

    - Document Archiving


    In risk management, sophisticated AI augmentation of `Monte Carlo` and `VaR` approaches
    are also increasingly common to both benchmark and improve existing risk practices.


    ### Other AI Applications


    The above introduction to the main uses of Artificial Intelligence in the workplace
    is intended to give a flavor of what to expect later on in this book. Specifically,
    `Machine` and `Deep Learning`, `Natural Language Processing`, and `CRPA` underpin
    the industry-specific use cases adopted by the private and public sectors today.


    We will describe and walk through many of these later on in our hands-on practice,
    but for now we have captured in Figure [1-9](#527966_1_En_1_Chapter.xhtml#Fig9)
    a broad segmentation of use cases by sector.


    ![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig9_HTML.jpg)


    The classification of AI applications of manufacturing and automotive, public
    sector, government and HR, retail and telco, marketing and media, financial services
    and insurance, healthcare, and housing.


    Figure 1-9 AI applications


    While emerging AI applications may not yet be fully commercialized or indeed in
    use in most workplaces, we also include below a view from Gartner of what is on
    the horizon with several of note (e.g., `Reinforcement Learning` and `Edge AI`)
    likely to enter the mainstream in the coming years.


    ![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig10_HTML.jpg)


    A line graph of expectation versus time represents the hype cycle for artificial
    intelligence. It contains 5 phases naming, innovation trigger, peak of inflated
    expectations, trough of disillusionment, slope of enlightenment, and plateau of
    productivity.


    Figure 1-10 Gartner AI hype cycle


    ### AI Applications: Hands-on Practice


    Now that we have taken a first look at the main applications for Artificial Intelligence
    in today’s companies and organizations, we will now take a look at a hands-on
    lab example


    #### Calling Azure Text Analytics API


    The goal of our first exercise is to start getting familiar with cloud and cloud
    services (in this case Azure and the `Text Analytics API`) and familiarize ourselves
    with a key AI application, that of `Natural Language Processing`


    1. We use a “sandbox” environment on Microsoft Learn for this exercise: [`https://docs.microsoft.com/en-us/learn/modules/classify-user-feedback-with-the-text-analytics-api/3-exercise-call-the-text-analytics-api-using-the-api-testing-console`](https://docs.microsoft.com/en-us/learn/modules/classify-user-feedback-with-the-text-analytics-api/3-exercise-call-the-text-analytics-api-using-the-api-testing-console)

    2. Activating the sandbox requires a Microsoft account and an Azure account^([^(17)](#fn17))

    3. Follow the steps in the tutorial to input text and a) detect language, b) extract
    key phrases, c) analyze sentiment, and d) extract entities

    4. As “stretch” exercises, change the documents in section number 2 and see what
    the API returns – try with `"Ich bin so sauer auf dich"`

    5. Try the other methods, `Detect Language`, `Entities`, and `Key Phrases`, using
    the same subscription key

    6. Try to make a call from a different region with your subscription and observe
    what happens

    7. Go back to your `Cognitive Services` resource created on Azure Portal and observe
    API requests on free tier


    ## Data Ingestion and AI Pipelines


    From key AI application, we move on to our next section on Data Ingestion and
    automating data pipelines. Chapter [3](#527966_1_En_3_Chapter.xhtml) will discuss
    this in far greater detail but for now we introduce AI Engineering as the core
    skill requirement for delivering tangible, production-grade AI solutions^([^(18)](#fn18))
    along with important definitions for Data Pipelines, pivotal `ETL` processes,
    best practice around data wrangling and transformation, and `AutoAI`.


    ### AI Engineering


    Industry research shows that very few AI projects are successful, partly because
    technically minded, and often junior resources on an AI project tend to forget
    that AI involves people, processes, and tools. The reality is writing machine
    or deep learning code is just one small part – and invariable notebooks or scripts
    fail when not considered complex surrounding infrastructure.


    Data pipelines lie behind every successful AI application – from data ingestion
    through several stages of data classification, transformation, analytics, training
    machine learning, and deep learning models through inference and retraining/data-drift
    processes, the goal is to yield increasingly accurate decisions or insights.


    Ultimately no AI project can be a success without a Data Strategy in place with
    a robust, serviced delivery pipeline for ingesting data into downstream modeling
    and analytics processes. With that in mind, we discuss in this section how data
    ingestion works and setting up data pipeline necessary for building a successful
    AI application.


    ### What Is a Data Pipeline?


    A Data Pipeline is a flow of data from upstream source(s) to a downstream sink
    where it can be more easily consumed by end users. More formally, it is an automated
    set of actions that extract or ingest data from various sources, often transform
    the data, and then place in a data store or repository for downstream analysis.


    In the age of cloud computing, there are multiple ways this is done such as shifting
    data from the web or an app to a data warehouse or from a data lake to a database.
    What all have in common in 2022 is a growing need to make the tools and transformational
    processes involved as seamless as possible and ultimately achieve full automation.


    ### Extract, Transform, and Load (ETL)


    `Extract`, `transform`, and `load`, or `ETL`, is often confused with a data pipeline.
    While an `ETL` process refers to the process by which data is extracted from different
    sources, transformed into a usable format, and then loaded into an end-user system,
    it is a discrete, limited set of steps. Data pipelines on the other hand are not
    discrete in time and deal with the continuous flow of data.


    Because a data pipeline can in a sense be considered as a continuous loop of `ETL`
    steps, it can be helpful to define these three steps.


    #### Extract


    Data is extracted from a variety of internal and external sources such as text
    files, `csv`, `excel`, `json`, `html`, relational and nonrelational databases,
    websites, or APIs. More modern formats such as `parquet` and `avro` are also increasingly
    utilized for their efficient compression of datasets.


    #### Transform


    Data is transformed in order to make it suitable for, and compatible with, the
    schema of a target end-user system. Transform involves cleansing data to remove
    duplicates or out-of-date entries; converting data from one format to another;
    joining and aggregating data; sorting and ordering data among others.


    #### Load


    In the final `ETL` step, data is loaded into a target system such as a data warehouse.
    Once inside the data warehouse, data can be efficiently queried and used for analytics
    and business intelligence.'
