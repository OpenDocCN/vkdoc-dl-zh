    \ and dropping the correct dimensions (entities to report on e.g. country) and\
    \ measures (values to report on e.g. confirmed cases)\n\n    3.  Filter if necessary,\
    \ e.g. on top 10 cases\n\n    4.  Finally add slicers on date and country to allow\
    \ a user to quickly drill-down into Covid cases by date (window) and country\n\
    \n5.  Exercise (Stretch) – push the finished PowerBI report to PowerBI Service^([^(14)](#fn14)),\
    \ then proceed to host your dashboard on a public url"
  trans: "\n### 云计算\n\n因此，我们至少目前关注的是狭义人工智能，而如果按照埃隆·马斯克的说法，等到通用人工智能或超级人工智能出现时，我们都应该希望自己已经不在了。\n\
    \n如上所述，实现这种人工智能的推动力是云，而成功的狭义人工智能实施需要一个端到端的云基础设施。无论怎样强调云计算在 2022 年对任何企业的基础性要求都不为过。其增长呈爆炸性，2020\
    \ 年云支出增长了 33%，这得益于支持远程工作和学习、电子商务、内容流媒体、在线游戏和协作的强劲需求。\n\n`存储`和`计算能力`是用于处理人工智能核心大数据的主要云组件。虽然企业级机器学习项目可以在两者上以较低的开销运行，但深度学习项目则不能。`Amazon\
    \ Web Services`、`Azure`和`Google Cloud Platform`是主要的（“三大”）云服务提供商，此外还有`IBM Cloud`和`Heroku`。^(¹⁰)\
    \ 我们将在本书中涵盖所有这些平台的实践示例。所有云服务提供商都提供一系列人工智能服务和工具，极大地简化了构建应用程序的过程。\n\n虽然云是人工智能的关键推动者，但云计算只有在公司的数据战略以丰富、海量的数据源和/或训练数据为基础时，才能真正为企业级或生产级人工智能发挥作用。\n\
    \n### 云服务提供商——它们提供什么？\n\n每个云服务提供商都有相对于其他提供商的明显差异化优势。`AWS`覆盖范围最广，而`Azure`与基于 Windows\
    \ 的系统自然衔接良好。`Google Cloud Platform`通常对应用程序构建有更好的支持，如图 1-3 所示。\n\n![](img/527966_1_En_1_Fig3_HTML.jpg)\n\
    \n一张截图描述了亚马逊在 2000 亿美元云市场中的领先地位。截至 2022 年 6 月的 12 个月内，云基础设施市场规模为 2035 亿美元。\n\n\
    图 1-3\n\n领先的云平台 2022 年第二季度（来源：Statista）\n\n图 1-4 总结了每个主要云平台的一些额外独特卖点。\n\n![](img/527966_1_En_1_Fig4_HTML.jpg)\n\
    \n一张截图描述了 Google Cloud Platform、Azure、Amazon Web Service、IBM WATSON、Salesforce\
    \ of Heroku、Einstein 和 SAP 的独特卖点。\n\n图 1-4\n\n云服务提供商的独特卖点\n\n### 更广泛的人工智能生态系统\n\
    \n尽管三大云服务提供商占据主导地位，但一些公司开始迁移，或受咨询公司/系统集成商影响，远离大型科技公司的“锁定”，转向多供应商、利基人工智能解决方案的平台。这些开源、更便宜的平台实施速度也可能更快，与敏捷交付模式（更多内容见第\
    \ 2 章）结合更紧密，并且在某种程度上不受遗留系统、规模或企业社会责任的束缚。\n\n![](img/527966_1_En_1_Fig5_HTML.jpg)\n\
    \n一张图表描述了云计算市场生态系统。它包括系统集成商、咨询公司和托管服务提供商，提供 SaaS、IaaS 和 PaaS 的云服务提供商，以及连接提供商和原始设备制造商。\n\
    \n图 1-5\n\n支持更广泛的人工智能生态系统——云服务提供商、系统集成商和原始设备制造商\n\n### 全栈人工智能\n\n当然，这不仅仅是关于云。虽然云提供了平台，但还有大量专有和开源工具用于实现人工智能，从数据工程工具（如`Apache\
    \ Kafka`或`AWS Kinesis`）到 NoSQL 数据库（如`mongoDB`和`AWS DynamoDB`），再到后端编程语言（如`Python`和`Scala`^(¹¹)），以及模型引擎（如`Apache\
    \ Spark`）和前端商业智能层/仪表板（如`Dash`、`PowerBI`和`Google Data Studio`）。\n\n![](img/527966_1_En_1_Fig6_HTML.jpg)\n\
    \n一张截图解释了全栈人工智能。\n\n图 1-6\n\n全栈人工智能\n\n我们将在本书的实践示例中使用上述许多工具。\n\n### 人工智能伦理与风险：问题与担忧\n\
    \n本章第一部分的最后一点，应该留给如今许多大型组织中迅速增长的担忧——即合乎伦理地使用数据和人工智能来驱动商业价值。\n\n当今的许多问题源于商业人工智能开发早期过度炒作的那些年，当时为了从结果中产生投资回报率，数据偏差、模型风险、“黑箱”可审计性，甚至用户同意等问题在很大程度上被忽视了。\n\
    \n在媒体曝光了一些引人注目的案例之后，存在一种负面看法，即人工智能模型固有的偏差加上对自动化的过度依赖，可能会歧视穷人或为其设置贫困陷阱。实际上，主要有以下两种算法“网络”：\n\
    \n**信用报告算法**——这些算法影响对汽车、住房和就业等私人商品和服务的获取。令人担忧的是潜在的伦理违规行为，例如苹果卡事件，高盛（作为该卡运营商）因使用据称歧视女性的\
    \ AI 算法（给予男性更高的信用额度）而受到监管机构调查^(¹²)。\n\n**政府/公共部门机构**——在这里，AI 算法影响对医疗保健、失业和儿童抚养服务等公共福利的获取。美国最近的另一个案例是，联合健康集团因创建一种算法，偏向白人患者而非病情更重的黑人患者，而受到监管机构调查。\n\
    \n### 人工智能生态系统：动手实践\n\n人工智能伦理与治理结束了我们本介绍性章节的第一部分，但为了掌握人工智能项目的一些成果，值得看看更广泛人工智能生态系统中的一个重要工具。\n\
    \n使用 PowerBI 创建新冠疫情仪表板\n\n所有优秀的人工智能解决方案都需要一个可视化/商业智能层，以确保解决方案通过一个引人注目的仪表板或仪表板界面交付。用于此目的的工具很多，包括`AWS\
    \ QuickSight`、`Google Data Studio`、`Cognos`、`Tableau`和`Looker`^(¹³)。这里我们来看看`Microsoft\
    \ PowerBI`——目前领先的商业智能工具之一。\n\n1.  接受 cookies，注册并从以下链接下载`PowerBI`：\n\n    `https://powerbi.microsoft.com`\n\
    \n2.  谷歌搜索“John Hopkins Covid data GitHub”，找到约翰霍普金斯大学最新的 GitHub 数据。作为参考，确诊病例、康复病例和死亡病例的实时\
    \ csv 文件位于以下链接：\n\n    `https://github.com/CSSEGISandData/COVID-19/tree/master/csse_covid_19_data/csse_covid_19_time_series`\n\
    \n3.  打开`PowerBI`，进入`获取数据 > Web`。分别输入三个文件的 URL，选择“加载数据”将数据导入`PowerBI`数据模型\n\n\
    \    注意：由于链接指向的是“实时”文件，下方可视化中显示的数据将每天自动更新\n\n4.  练习：在`PowerBI`的“资源管理器”视图中，重新创建下方链接示例仪表板中显示的可视化效果：\n\
    \n    `https://app.powerbi.com/view?r=eyJrIjoiN2FkNzZlMWQtMmE2OC00NzRiLWI0ZGItNDMzNzZhYTIwYTViIiwidCI6IjhlYTkwMTE5LWUxYzQtNDgyNC05Njk2LTY0NzBjYmZiMjRlNiJ9`\n\
    \n5.  确保逐一创建可视化效果，方法是：\n    1.  选择正确的可视化类型（例如，卡片、表格、条形图、面积图、树状图）\n    2.  拖放正确的维度（要报告的实体，例如国家）和度量（要报告的值，例如确诊病例）\n\
    \    3.  如有必要，进行筛选，例如筛选前 10 个病例\n    4.  最后，在日期和国家上添加切片器，以便用户按日期（窗口）和国家快速深入查看新冠病例\n\
    \n6.  练习（进阶）——将完成的`PowerBI`报告发布到`PowerBI Service`^(¹⁴)，然后将您的仪表板托管在公共 URL 上\n"
- fmt: '# Applications of AI


    Taking the context from the previous section and in keeping with the light introductory
    nature of this first chapter, we will now address in the next section the main
    AI applications:


    - `Machine Learning`

    - `Deep Learning` including Computer Vision and Portfolio, Risk Management and
    Forecasting

    - `NLP` including Chatbots

    - `Cognitive Robotic Process Automation (CRPA)`


    ## Machine Learning


    `Machine Learning` is a technique enabling computers to make inferences from complex
    data and remains the biggest area of AI research today. There are three main types:
    Supervised, Unsupervised, and Reinforcement Learning,^([^(15)](#fn15)) the development
    and deployment of each we will look at in subsequent chapters. For now, we have
    provided some basic definitions focused on the inherent difference between these
    machine learning approaches:


    - **Supervised** – training on datapoints where the desired "target" output is
    known

    - **Unsupervised** – no outputs available but machine learning is used to identify
    patterns in data

    - **Reinforcement learning** – training a machine learning model by maximizing
    a reward/score


    A key application of machine learning today is in Fraud Detection, which is often
    run as both an unsupervised ML and supervised ML problem. The goal is to try and
    predict patterns in transactional (and customer) data that indicate fraud is taking
    place.


    It is assumed that most readers are familiar in some way with basic `Machine Learning`
    techniques and would direct readers to other books to augment their understanding
    in case some of the applications discussed in this book go beyond assumed knowledge.


    ## Deep Learning


    In many ways `Deep Learning` is a subset of `Machine Learning`; essentially extending
    `Machine Learning` to hard, "Big Data" problems typically solved using neural
    networks. Neural networks themselves are inspired by neuron connections in the
    human brain – when put together we get something like the image on the right (a).
    This is in fact a multilayer neural network taking four inputs and providing one
    output after various data transformations carried out within the two "hidden"
    layers of four nodes (or neurons) each.


    `Deep Learning` is commonly used in Image Classification or Computer Vision (such
    as predicting whether an image contains people, buildings, or vehicles) where
    the inputs are essentially the (training) images converted to pixels, then a machine-readable
    format (`tensors`) and the hidden layers act as function mappings to extract "patterns"
    which tend to prevail in the images.


    ![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig7_HTML.jpg)


    A diagram of a multilayer perceptron describes the input flows to weights and
    reacts with neurons and produces output.


    **Figure 1-7** Multilayer Perceptron


    ### Computer Vision


    As illustrated in Figure [1-8](#527966_1_En_1_Chapter.xhtml#Fig8), Computer Vision
    is used for Object Classification, Identification, Verification, Detection, Segmentation,
    and Recognition and, using the picture as an example, gives rise to responses
    to questions such as:


    - Which type of object is in the image?

    - Does the object exist in the image?

    - What category of objects are in the image?


    The many applications of Computer Vision include facial recognition and surveillance,
    document search and archiving, healthcare diagnostics, and crop disease prevention.


    ![](images/527966_1_En_1_Chapter/527966_1_En_1_Fig8_HTML.jpg)


    A photograph of object classification in computer vision of traffic lights, persons,
    handbags, buses, trucks, and cars.


    **Figure 1-8** Object Classification in Computer Vision (Source: Ilija Mihajlovic,
    [`towardsdatascience.com`](https://towardsdatascience.com))


    ### Portfolio, Risk Management, and Forecasting


    AI, and specifically `Deep Learning`, is widely used today in risk management
    and portfolio optimization to increase the efficiency and accuracy of operational
    workflows. Similarly, the optimization of financial assets, stock price prediction,
    portfolio, and risk management are all exciting areas of innovation in 2022.


    Forecasting is also a big area right now – advances in cloud storage and processing
    power have exposed weather and demand forecasting, asset optimization, algorithmic
    trading, and robo-advisors to AI methods. High-accuracy, industrial-scale recurrent
    neural networks (`RNNs`), and specialized long short-term memory models (`LSTMs`)
    are increasingly able to outperform traditional methods. We will look at some
    practical hands-on examples of these in Chapter [5](#527966_1_En_5_Chapter.xhtml)
    on `Deep Learning`.


    ## Natural Language Processing (NLP)


    The global market for `NLP` is growing year on year, and is predicted to reach
    43 million dollars by 2025 (Statista).


    `Natural Language Processing` is a branch of AI that deals with the interaction
    between computers and humans using natural language. Essentially `NLP` applies
    `Machine Learning` algorithms to unstructured data and converts it into a form
    that computers can understand – the objective is to read, decipher, understand,
    and make sense of language in a manner that is (commercially) valuable.


    `NLP` is the driving force behind language translation apps such as Google Translate.
    Word Processors such as Microsoft Word and Grammarly also employ `NLP` to check
    the grammatical accuracy of texts. The growing adoption of `NLP` applications
    in industry means the global market is predicted to reach $43m by 2025.^([^(16)](#fn16))


    ### Chatbots


    Probably the most well-known application of `NLP` is chatbots and personal assistant
    applications such as Siri and Alexa and Watson Assistant.


    Chatbots are essentially software applications to conduct interactive dialogue,
    with growing text-to-speech and speech-to-text capability.


    The technology has vastly improved since the earliest days of Cortana on Windows.
    Today it has evolved to the extent that today Intelligent Virtual Agents (`IVAs`
    or Chatbots 2.0) or Interactive Voice Response (`IVR`) applications are widely
    used in call centers to respond to user requests. `IVAs` have in-built self-learning
    capability and adapt to context in contrast to earlier dialog rule-based chatbots.


    The business value in 2002 is in improving the customer journey and customer experience
    – with the ability to resolve issues quickly, although not in more complex cases.


    The main techniques in `Natural Language Processing` are syntactic analysis and
    semantic analysis. Syntactic analysis focuses on grammar while semantic analysis
    is concerned with the underlying meaning of text. Both involve a number of underlying
    subprocesses (such as lemmatization and word disambiguation) important for categorization
    and more ultimately, insight extraction. We will look at these in more detail
    in a later chapter.


    In its simplest sense, `Natural Language Processing` in chatbots is invoked to
    detect, then best-fit user "intents" and "entities" to a preconfigured dialogue
    "corpus." As user interaction grows, increasingly more data can be used in the
    training process to improve the matching process, and enhance the dialog.'
