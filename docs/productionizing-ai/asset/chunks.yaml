    \ network) into probabilities that sum to 1.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig25_HTML.jpg)\n\
    \nAn illustration illustrates activation functions including shapes and formulas,\
    \ sigmoid, tanh, step function, soft plus, E L U, Log of Sigmoid, Mish, Sinc,\
    \ Swish, ReLU, Soft sign, Leaky ReLu.\n\nFigure 5-25\n\nActivation functions –\
    \ shapes and formulae"
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n### 计算多层神经网络的输出\n\
    \n本节的最后一部分，我们将为神经网络内的计算过程提供一些指导。下面描述了如何计算多层神经网络的输出 `ŷ` (`y_hat`)。\n\n对于一个具有 `m`\
    \ 个特征的输入 `X`：\n\n-   `m` 个特征对应 `m` 个权重（`w1`, `w2`, …, `wm`）\n-   我们可以计算输入与权重集合的点积，然后加上偏置：\n\
    \n`z = w1x1 + w2x2 + … wnxn + bias`\n\n-   然后将 `z` 输入到一个激活函数中，以获得隐藏层输出 `h`：（`h1`,\
    \ `h2`, …, `hn`）\n-   隐藏层有 `n` 个神经元\n-   `n` 个神经元对应 `n` 个权重（`w1`, `w2`, …, `wn`）\n\
    \n由此我们得到最终输出 `y_hat = h1w1 + h2w2 + … + hnwn`\n\n![](img/527966_1_En_5_Fig22_HTML.png)\n\
    \n模型图展示了一个多层神经网络，包含输入数据、一个隐藏层以及具有 1 个隐藏层的多层结构。\n\n**图 5-22**\n多层神经网络 – 我们如何从输入数据得到输出？\n\
    \n### 使用 Keras 和 TensorFlow 的卷积神经网络：动手实践\n\n**德国交通灯图像分类**\n\n在本实验中，我们将使用 `Keras`\
    \ 和 `TensorFlow` 构建并训练一个卷积神经网络，以解决一个预测性（复杂图像的多类分类）问题：\n\n1.  克隆下方的 GitHub 仓库：\n\
    \    [`https://github.com/bw-cetech/apress-5.5.git`](https://github.com/bw-cetech/apress-5.5.git)\n\
    2.  将笔记本导入 Google Colab。Colab 对 `TensorFlow` 有更好的支持（无需安装！），因此更容易运行笔记本。\n3.  查看右侧面板上的目录，其中包含指向建模过程每个部分的超链接。\n\
    4.  运行整个笔记本 – 从 Kaggle 导入代码，执行 EDA、模型准备/图像整理，使用迁移学习构建和运行 CNN，最后执行推理。\n5.  完成作为实验一部分的练习，在\
    \ markdown 部分“第二次运行 – 早停标准”处停止（我们将在下一节中介绍此内容）。\n\n![](img/527966_1_En_5_Fig23_HTML.jpg)\n\
    \n截图展示了从标签 0 (15) 到标签 61 (282) 的多个德国交通标志。其中包括禁止停车、斑马线、禁止转弯、停车和禁止驶入等标志。\n\n**图\
    \ 5-23**\n图像分类 – 德国交通标志\n\n### 循环神经网络 – 时间序列预测：动手实践\n\n**使用单变量 RNN 进行股票价格预测**\n\
    \n本实验的目标是构建并训练一个用于股票价格（单变量）预测的 LSTM，即预测的股票价格仅取决于先前的时间步长：^(⁷³)\n\n1.  克隆下方的 GitHub\
    \ 仓库：\n    [`https://github.com/bw-cetech/apress-5.5b.git`](https://github.com/bw-cetech/apress-5.5b.git)\n\
    2.  将笔记本导入 Google Colab。\n3.  运行整个笔记本 – 按照描述将数据上传到（临时）Colab 文件夹并导入，执行 EDA 和数据整理，以便将股票价格数据转换为使用\
    \ RNN 进行预测所需的格式。\n4.  完成作为实验一部分的练习。\n5.  练习 - 使用不同的批次大小重新训练模型，并比较（均方根）误差。\n6.\
    \  练习 – 使用不同的激活函数（`tanh`）重新训练模型，并比较测试结果（`tanh` 通常比 `ReLU` 能更好地调节循环神经网络的输出）。\n\
    7.  拓展练习 – 通过完成“实时股票价格场景”下注释掉的练习，调整 TATA 单变量预测以执行实时股票价格预测。按照步骤导入从 1 月到 D-1 日的主要科技股（例如苹果或特斯拉）的最新股票价格，并执行未来\
    \ 30 个时间步长的预测。\n\n## 调优深度学习模型\n\n本章的最后一部分，我们将介绍我们可用的众多“性能增强”杠杆，以构建一个可靠的深度学习模型。\n\
    \n### 激活函数\n\n如前几节所述，神经元使用激活函数根据加权输入信号产生输出信号。因此，实际上，激活函数是对神经元输出的简单映射，其中神经网络中的加权输入被求和并通过激活（或传递）函数。\n\
    \n术语“激活”与神经元被激活的阈值以及相应输出信号的强度有关。简单感知机中使用的 Heaviside 阶跃函数是一种简单的阶跃激活函数，如果求和输入超过\
    \ 1，则神经元将输出值 1。\n\n![](img/527966_1_En_5_Fig24_HTML.jpg)\n\n模型图展示了激活/传递函数架构。它包括输入、权重、激活和输出。\n\
    \n**图 5-24**\n激活/传递函数架构（显示 Heaviside 阶跃函数）\n\n我们在实践中实际使用的四种主要的非线性激活函数提供了更丰富的功能：\n\
    \n#### （逻辑）Sigmoid 函数\n\nSigmoid 激活函数具有特征性的“S”形曲线，用于二分类问题。实值输入被“压缩”/映射到 0 到 1\
    \ 的范围内，表示特定二元输出的概率。\n\n#### 双曲正切函数 (tanh)\n\n`Tanh`（发音为“tanch”）也是一个“S”形曲线，但这次重新调整了逻辑\
    \ sigmoid 函数。输出范围从 -1 到 1。由于 `tanh` 的梯度比 sigmoid 更强，因此作为激活函数，`tanh` 通常比 sigmoid\
    \ 更受青睐。\n\n#### 修正线性单元 (ReLU)\n\n`tanh` 和 sigmoid 都容易出现“饱和”或梯度消失的问题。因此，深度学习模型中最常用的激活函数是更简单的修正线性单元（`ReLU`）。`ReLU`\
    \ 通过其更简单的数学运算，对负值返回 0，对正值返回 `x`，从而加速了随机梯度下降（将在下一节介绍）的收敛。\n\n在 `ReLU` 激活导致“死亡神经元”（即神经元变得不活跃，对任何输入都输出\
    \ 0）的情况下，有时会使用一种变体，即 `Leaky ReLU`。`Leaky ReLU` 对于负值有一个小的斜率（设置为超参数^(⁷⁴)），而不是平坦的斜率。\n\
    \n需要指出的是，`leaky ReLU` 并不总是优于 `ReLU` – 如果使用 `ReLU` 激活的模型性能良好，请坚持使用它。\n\n#### Softmax\n\
    \nSoftmax 激活函数（或归一化指数函数）是多类分类问题的一个特例，其中输出是离散的（非二元）的，例如大多数图像分类问题（例如，图像是人、建筑物、车辆、道路等）。\n\
    \n`Softmax` 将 logits（神经网络的最后一层）转换为总和为 1 的概率。\n\n![](img/527966_1_En_5_Fig25_HTML.jpg)\n\
    \n图示展示了包括形状和公式在内的激活函数：sigmoid、tanh、阶跃函数、soft plus、E L U、Log of Sigmoid、Mish、Sinc、Swish、ReLU、Soft\
    \ sign、Leaky ReLu。\n\n**图 5-25**\n激活函数 – 形状和公式\n"
- fmt: "### Gradient Descent and Backpropagation\n\n`Gradient descent` is the main\
    \ process by which neural networks are trained. It is essentially a method to\
    \ minimize **loss** (or **cost function**) by updating weights in the neural network.^([^(75)](#fn75))\n\
    \nFor most big data problems, **stochastic gradient descent (SGD)** is used –\
    \ rather than using the entire dataset for each iteration, a sample of the data\
    \ is used.\n\nA **forward pass**^([^(76)](#fn76)) is then carried out where the\
    \ input data gets transformed through the network, activating neurons through\
    \ hidden layers to ultimately produce an output value. This output is then compared\
    \ to the expected (actual) output and an error is calculated.\n\n#### Backpropagation\n\
    \n`Backpropagation` takes place when the above error is propagated back through\
    \ the network, one layer at a time, and the weights are updated according to the\
    \ amount that they contributed to the error.\n\nThe process repeatedly adjusts\
    \ weights so as to minimize the difference between actual output and desired output\
    \ and is repeated for all rows/examples in the training data (an **epoch**). A\
    \ neural network is typically trained over multiple epochs, with 100 generally\
    \ being an upper limit.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig26_HTML.jpg)\n\
    \nA parabola between weight and cost. It illustrates the `Gradient Descent` process\
    \ that comprises factors such as derivative of cost, incremental step, initial\
    \ weight, minimum cost, and gradient.\n\nFigure 5-26\n\nThe `Gradient Descent`\
    \ process used to minimize loss in a neural network\n\n### Other Optimization\
    \ Algorithms\n\nIn practice, `Stochastic Gradient Descent` can get stuck at local\
    \ minima, or take too long to converge, and so more sophisticated variants are\
    \ used to achieve better model performance\n\n#### SGD with Momentum\n\nAs we\
    \ saw in the previous section, `Stochastic Gradient Descent` addresses a large\
    \ memory disadvantage of `Gradient Descent` (loads the entire datasets to compute\
    \ loss derivative). `SGD with Momentum` is an enhancement of the vanilla `SGD`\
    \ algorithm, helping accelerate gradient vectors in the right directions in order\
    \ to speed up convergence.\n\n#### AdaGrad, Adadelta, and RMSProp\n\n`SGD` involves\
    \ manually tuning the learning rate of the network which can be slow and cumbersome\
    \ – the below three algorithms more efficiently update network weights.\n\n`AdaGrad`\
    \ or `Adaptive Gradient Algorithm` is another stochastic optimization method that\
    \ attempts to address this by adapting the learning rate to the network parameters\
    \ (weights).\n\n`Adadelta` on the other hand uses an exponentially moving average\
    \ learning rate to avoid very small learning rates/slow convergence in `AdaGrad`.\n\
    \n`Root mean square prop (RMSProp)`, like `Adadelta`, deals with `AdaGrad`’s radically\
    \ diminishing learning rates but also divides the learning rate by an exponentially\
    \ decaying average of squared gradients.\n\n#### Adam\n\n**Adam** (derived from\
    \ **adaptive moment estimation**) is generally the choice of optimization algorithm\
    \ in Deep Learning. To converge faster (use of this algorithm can be the difference\
    \ in getting quality results in minutes, days, or months), `Adam` uses both `Momentum`\
    \ to accelerate the stochastic gradient descent process and `Adaptive Learning\
    \ Rates` to reduce the learning rate in the training phase.\n\n`Adam` combines\
    \ the best properties of the `AdaGrad` and `RMSProp` algorithms to handle sparse\
    \ gradients on noisy problems.\n\n### Loss Functions\n\nBefore we move on to look\
    \ at best practice in improving Deep Learning performance, let’s take a closer\
    \ look at the concept of “loss” or the cost function in a neural network.\n\n\
    Minimizing a loss function in Deep Learning equates to minimizing the training\
    \ error or lowering the cost of the neural network/weight calibration process.\n\
    \nThe three most common loss are **binary cross entropy** for binary classification,\
    \ **sparse categorical cross entropy** for multiclass classification and **mse\
    \ (mean squared error)** for regression, but as with all things in deep learning\
    \ there are several variants which under certain conditions can provide better\
    \ results:\n\nTable 5-1\n\nLoss function comparison\n\n| Loss Function | Type\
    \ | Description | Pros | Cons |\n| --- | --- | --- | --- | --- |\n| Squared Error\
    \ (L2) Loss / Mean square error(MSE) | Regression | square of the difference between\
    \ the actual and the predicted values | penalizes large errors by squaring them\
    \ | Not robust to outliers |\n| Absolute Error Loss / Mean Absolute Error (MAE)\
    \ | Regression | distance between the predicted and the actual values | more robust\
    \ to outliers as compared to MSE | Penalization of large errors may be insufficient\
    \ |\n| Huber Loss | Regression | Combined MSE and MAE - quadratic for smaller\
    \ errors, linear otherwise | more robust to outliers than MSE | Slower convergence\
    \ |\n| Binary Cross-Entropy | Binary Classification | Uses Log-Loss and sigmoid\
    \ function | Ideally suited for binary classification models | Sigmoid can saturate\
    \ and kill gradients |\n| Hinge Loss | Binary Classification | primarily used\
    \ with Support Vector Machine (SVM) | penalizes wrong predictions as well as low\
    \ confidence right predictions | Limited to SVM models |\n| Multi-class Cross\
    \ Entropy Loss / Categorical Cross entropy | Multi-class Classification | generalization\
    \ of the Binary Cross Entropy loss | Works well with one hot encoded target variables\
    \ | Each sample should have multiple classes or is labelled with soft probabilities\
    \ |\n| Sparse categorical cross entropy | Multi-class Classification | Sparse\
    \ target variable classification version of Categorical Cross entropy | Reduces\
    \ memory and computational overhead through use of single integers for classes\
    \ | Only works for classes which are mutually exclusive |\n| Kullback Leibler\
    \ Divergence Loss | Multi-class Cross Entropy Loss | measure of how a probability\
    \ distribution differs from another distribution | Based on probabilities | more\
    \ commonly used to approximate complex functions than in multi-class classification\
    \ |\n\n### Improving DL Performance\n\nThe above internal workings of a deep learning\
    \ model help to understand what is happening “under the hood” and the options\
    \ described to improve results are somewhat experimental, tied to the specific\
    \ dataset and business or organizational problem with which we are presented.\n\
    \nWhere do we start though if we are embarking on improving neural network performance?\
    \ We should take a best practice approach, almost always commencing (and ending)\
    \ with a review of the underlying data:^([^(77)](#fn77))\n\n1.  Review Data\n\
    \    *   Invent More Data\n    *   Rescale Your Data\n    *   Transform Your Data\n\
    \    *   Feature Selection\n2.  Include more sophisticated algorithms\n3.  Tune\
    \ hyperparameters\n4.  Try Algorithm Ensembles\n5.  Get More Data\n\nBesides these\
    \ core principles for achieving higher model performance, periodic refactoring\
    \ should be built into model maintenance to ensure code is as efficient as possible\
    \ and (python) libraries and functions are not deprecated.\n\n### Deep Learning\
    \ Best Practice – Hyperparameters\n\nThe above high-level steps are informative,\
    \ but on exhaustion of a data review process, what specific hyperparameters do\
    \ we have at our disposal to tune and calibrate the model output? Below we group\
    \ these together into two categories: network and process tuning.^([^(78)](#fn78))\n\
    \n#### Network Tuning\n\n##### Deeper Network/More Layers/More Neurons\n\nAdding\
    \ more hidden layers/more neurons per layer means we add more parameters to the\
    \ model, and therefore allow the model to fit more complex functions\n\n#####\
    \ Activation Function\n\nAs described above, generally **with CNNs,** `ReLU` is\
    \ used to address vanishing gradients with `Sigmoid` (binary) or `Softmax` (multiclass\
    \ classification) in the outer layer. For `RNNs`, `tanh` is used to overcome the\
    \ vanishing gradient problem, as its second derivative can sustain for a long\
    \ range before going to zero."
