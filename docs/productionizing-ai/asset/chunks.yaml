- fmt: "### Shuffling and Data Partitioning/Splitting\n\nLike Feature Engineering,\
    \ shuffling and splitting the data into training and test sets can be considered\
    \ as part of Data Wrangling. Typically we split the data 70/80% for training and\
    \ 30/20% for testing. This is implemented in Python (`sklearn` library) using\
    \ the `train_test_split` function. By default, data is shuffled so that the row\
    \ selection/split occurs randomly (i.e., to prevent nonrandom assignment of rows\
    \ and the possibility of model bias).\n\nA further level of randomization is typically\
    \ employed to render the probability of nonrandom assignment almost negligible.\
    \ This technique, `KFolds` cross validation, splits the training set further into\
    \ a training (subset) and validation set.\n\n![](images/527966_1_En_4_Chapter/527966_1_En_4_Fig5_HTML.jpg)\n\
    \nA representation of data partitioning. The data is split into training and test\
    \ sets. Training and test sets are comprised of `X_train` and `y_train` and `X_test`\
    \ and `y_test`.\n\n**Figure 4-5** Data partitioning for ML modeling\n\n### Sampling\n\
    \nIn the next two sections, we will take a look at the algorithmic process and\
    \ performance benchmarking. As it is highly iterative, data wrangling also encompasses\
    \ a number of tasks not typically performed until several model runs have been\
    \ undertaken. Normalization and scaling are two such techniques mentioned above,\
    \ which are not always necessary to get a model “up and running” but rather to\
    \ fine tune once there is a stable model process. Sampling, specifically over\
    \ or undersampling, is another when it's applied to imbalanced datasets.\n\nMost\
    \ datasets have inherent imbalance – take fraud detection where the number of\
    \ fraudulent transactions is typically minuscule in comparison to the number of\
    \ nonfraud transactions. The same applies in cybersecurity – a DDoS attack can\
    \ be like finding a needle in a haystack of benign network activity.\n\nWhen we\
    \ have imbalanced data, random undersampling refers to the process of only sampling\
    \ enough of the majority class so that we have approximately the same volume of\
    \ both majority and minority class samples. For random oversampling, we instead\
    \ synthesize data (duplicates from the minority class to achieve the same effect).\n\
    \nUnder or oversampling can often make the difference between a good and badly\
    \ performing model although undersampling runs the risk of losing information\
    \ in the data that may be valuable to the model while oversampling can lead to\
    \ overfitting.\n\nWe will take a look at a specific application of undersampling,\
    \ `SMOTE` (Synthetic Minority Oversampling Technique) in Chapter 8.\n\n### End-to-End\
    \ Wrangling: Hands-on Practice\n\n**CREDIT RISK MODELING PREP USING THE KAGGLE\
    \ API KEY**\n\nUsing Python in Google Colab, the goal of this exercise is to apply\
    \ EDA and Data Wrangling techniques to a common banking challenge – detecting\
    \ and predicting customer credit risk:\n\n1.  Clone the GitHub repo `https://github.com/bw-cetech/-apress-4.4.git`\n\
    2.  Referencing the TOC on the LHS in Colab walk-through the processes below:\n\
    \    1.  Library import\n    2.  Config\n    3.  Direct connection to the dataset\
    \ using a Kaggle API key\n    4.  EDA\n    5.  Data Wrangling\n    6.  Feature\
    \ Selection\n3.  Proceed to the modeling part of the notebook, carrying out a\
    \ baseline run then a scenario where specific features are scaled\n4.  Exercise\
    \ – try to improve model performance by carrying out more runs and changing the\
    \ data/enhancing the feature engineering process\n5.  Exercise – do the same but\
    \ this time carry out a parallel run across multiple algorithms\n\n## Algorithmic\
    \ Modelling\n\nAfter splitting our data into training and test sets (or training,\
    \ validation, and test sets), we are ready to “fit” a model. The algorithmic technique\
    \ takes the training data and fits an algorithm to the model. Once the model has\
    \ been trained, using the `.predict()` function in `sklearn`, we put the test\
    \ data through the trained algorithm in order to benchmark model predictions/forecasts\
    \ (see section below).\n\nThis book is a practical look at building AI applications,\
    \ not a theoretical (and often irrelevant) discussion on the mechanics of machine\
    \ or deep learning algorithms. That said, there are plenty of labs in this chapter\
    \ and others showing how underlying algorithms, both machine and deep learning,\
    \ are applied and plenty of relevant best practice on how to fine-tune and get\
    \ the most out of the modeling process in later chapters.\n\nFor reference going\
    \ forward in this book, we summarize below the main machine learning algorithms\
    \ used and their strengths and weaknesses. This is followed by a hands-on lab\
    \ in the next section where we train multiple machine learning (and one deep learning)\
    \ algorithm on three different datasets and compare performance.\n\n**Table 4-1**\
    \ Supervised Classification Algos\n\n| ALGORITHM | STRENGTHS | WEAKNESSES |\n\
    | --- | --- | --- |\n| NAÏVE BAYES | Simple model based on conditional probability\
    \ of classes. Easy to implement | Assumes independence of all features – rarely\
    \ the case |\n| LOGISTIC REGRESSION | Straightforward, easy to understand – outputs\
    \ are probabilistic | Underperforms with multiple or nonlinear decision boundaries\
    \ |\n| CLASSIFICATION TREES (CART)/RANDOM FOREST/GRADIENT BOOSTED TREES/CATBOOST\
    \ | Can learn nonlinear relationships, robust to outliers | Prone to overfitting\
    \ when unconstrained (alleviated by constraining/using ensembles) |\n| SUPPORT\
    \ VECTOR MACHINES | Can model nonlinear decision boundaries; fairly robust against\
    \ outliers in high-dimensional space | Memory intensive, hard to tune, don’t scale\
    \ well to larger datasets |\n| MULTILAYER NEURAL NETWORKS (DEEP LEARNING) | Performs\
    \ very well when classifying audio, text, and image data | Require very large\
    \ amounts of data to train, not general-purpose |\n\n**Table 4-2** Supervised\
    \ Regression Algos\n\n| ALGORITHM | STRENGTHS | WEAKNESSES |\n| --- | --- | ---\
    \ |\n| LINEAR REGRESSION | Straightforward, easy to understand | Performs poorly\
    \ with nonlinear relationships |\n| LASSO, RIDGE, AND ELASTIC-NET | Regularization\
    \ – penalizes large coefficients to avoid overfitting | Complex hyperparameter\
    \ tuning |\n| REGRESSION TREES (CART)/RANDOM FOREST/GRADIENT BOOSTED TREES/XGBOOST/LIGHTGBM/CATBOOST\
    \ | Can learn nonlinear relationships, robust to outliers | Prone to overfitting\
    \ when unconstrained (alleviated by constraining/using ensembles) |\n| K NEAREST\
    \ NEIGHBORS | Simple search for most similar training observation method | Memory\
    \ intensive, perform poorly on high-dimensional data |\n| MULTILAYER NEURAL NETWORKS\
    \ (DEEP LEARNING) | Can learn extremely complex patterns, efficient learners of\
    \ high-dimensional data, excel at computer vision, speech recognition | Computationally\
    \ intensive, high degree of expertise to tune. Not suitable for general purpose\
    \ as require BIG data to train on |\n\nFor unsupervised machine learning, `K Means`\
    \ is the main algorithm, but there are several variants including hierarchical\
    \ clustering. Neural networks (specifically autoencoders) can also be used for\
    \ unsupervised machine/deep learning, and Principal Component Analysis (discussed\
    \ earlier) is essentially also an unsupervised machine learning algorithm.\n\n\
    ![](images/527966_1_En_4_Chapter/527966_1_En_4_Fig6_HTML.jpg)\n\nA representation\
    \ of `K means` algorithm. `K = 2`. It arbitrarily chooses `K` object as the initial\
    \ cluster center. The process involves assigning objects, updating the cluster\
    \ means, and reassigning.\n\n**Figure 4-6** `KMeans` algorithm – operational mechanism"
