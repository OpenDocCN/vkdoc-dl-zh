- fmt: "### Generative vs. Discriminative\n\nA key concept in understanding how deep\
    \ learning models work is the difference between a discriminative and a generative\
    \ model.\n\nDiscriminative and generative models are used to perform both machine\
    \ and deep learning. What distinguishes the two is that while discriminative models\
    \ make predictions based on conditional probability `p(y|x)`, seek a decision\
    \ boundary between classes and are used in supervised learning, generative models\
    \ predict conditional probability from a joint probability distribution `p(x,y)`\
    \ by explicitly modeling the actual distribution of each class and are used for\
    \ unsupervised feature learning.\n\nTo understand the concept, an analogy is when\
    \ considering how to classify speech as one of two languages. We can either use\
    \ the difference within the linguistic models (discriminative) or learn each language\
    \ (generative).\n\nBecause neural networks attempt to learn which features `x`\
    \ will map to `y`, and therefore tries to discriminate among inputs, they use\
    \ a discriminative model.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Figa_HTML.jpg)\n\
    \nA schematic diagram of 2 models. The discriminative model is on the left, generative\
    \ model depicts two separate elliptical shapes on the right.\n\n### Random Walks\n\
    \nAnother important concept for understanding neural networks is a random walk.\n\
    \nA random walk is a stochastic or random process describing a path that consists\
    \ of a succession of random steps on a variable. A two-dimensional random walk\
    \ can be visualized if we were to consider a person tossing a coin twice every\
    \ time they are standing at a crossroads in order to determine where they can\
    \ go ahead, turn back go left or right:\n\n- heads, heads -> forward\n- heads,\
    \ tails -> right\n- tails, heads -> left\n- tails, tails -> backward\n\nWe will\
    \ create this 2D random walk shortly in the hands-on lab for this section.\n\n\
    The important aspect here is that each of the outcomes from each step of a random\
    \ walk have equal probability. Random walks are important for, for example, image\
    \ segmentation, where they are used to determine the labels (i.e., “object” or\
    \ “background”) associated with each pixel. They are also used to sample massive\
    \ online graphs such as online social networks.\n\n### Markov Chains and Markov\
    \ Processes\n\nA Markov chain is a stochastic model describing a sequence of possible\
    \ events in which the probability of each event depends only on the state of the\
    \ previous event.\n\nThe defining characteristic of a Markov chain is that no\
    \ matter how the process arrived at its present state, the possible future states\
    \ are fixed. In effect, Markov chains are memoryless – the conditional distribution\
    \ of future states of the process given present and past states depends only on\
    \ the present state and not at all on the past states.\n\nConsider another gambling\
    \ analogy is helpful here – betting on the outcome of a sequence of independent\
    \ fair coin tosses:\n\n- If head, she/he gains one dollar.\n- If tail, she/he\
    \ loses one dollar.\n\nThe stopping criteria is (a) if she/he reaches a fortune\
    \ of N dollars or (b) if his purse is ever empty.\n\nSystems modeled as a Markov\
    \ process give rise to hidden Markov models (HMMs) – statistical models similar\
    \ to the hidden layers/states in neural networks/deep learning.\n\nTo see how\
    \ they work and how they can be applied to real-world phenomena, take a look at\
    \ a Markov chain in action: [`https://setosa.io/ev/markov-chains/`](https://setosa.io/ev/markov-chains/)\n\
    \n### Other Stochastic Processes: Martingales\n\nThe concept of Martingales is\
    \ important in time series analysis, quantitative finance, algorithmic trading,\
    \ and the betting industry.\n\nOriginally a class of betting strategies in 18th-century\
    \ France, a gambler (a) wins their stake if a coin toss comes up heads, or loses\
    \ if tails and (b) doubles their bet after every loss. The idea is that if a gamblers\
    \ wealth and availability is infinite, the probability of eventually flipping\
    \ heads approaches 1.\n\nThe statistical power of Deep Learning models, particularly\
    \ Recurrent Neural Networks, bears similarities to ARMA/ARIMA time series models\
    \ underpinned by Martingale theory.\n\n### Implementing a Random Walk in Python:\
    \ Hands-on Practice\n\nNEURAL NETWORK FUNDAMENTALS – STOCHASTIC THEORY\n\n**Using\
    \ Python in Jupyter Notebook, the goal of this exercise is to implement a 2D random\
    \ walk with Python:**\n\n1.  Clone the GitHub repo below:\n\n    [`https://github.com/bw-cetech/apress-5.2.git`](https://github.com/bw-cetech/apress-5.2.git)\n\
    \n2.  Walk through the code sample:\n    1.  Import Python Libraries\n    2. \
    \ Define number of steps in your random walk and lists to capture the outcomes\n\
    \    3.  Try the exercise to create a 2D random walk using a `For` loop and four\
    \ `If` statements\n    4.  Plot the outcomes and observe the fractal\n    5. \
    \ As a stretch exercise try to implement a random walk in 3D!\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig4_HTML.jpg)\n\
    \nA graph depicts the number of steps in a random walk. 250 marks the larger place,\
    \ while 200 on the y-axis has a lesser value.\n\nFigure 5-4\n\n2D Random Walk\
    \ in Python\n\n## Introduction to Neural Networks\n\nTaking the above probability\
    \ theory into our main focus – its application to neural networks, we now take\
    \ a deeper dive in this section into what constitutes a neural network, looking\
    \ at the different types of neural networks and what distinguishes them.\n\n###\
    \ Artificial Neural Networks (ANNs)\n\nAs we will see below, Artificial Neural\
    \ Networks, or ANNs, are biologically inspired networks able to extract hierarchical\
    \ abstract features from underlying data. Essentially the generic name for any\
    \ type of neural network used to solve a predictive problem, Artificial Neural\
    \ Networks consist of an input layer, a hidden layer, and an output layer, taking\
    \ as inputs various data points, feeding that data through the network and outputting\
    \ some numerical value. All the main AI applications in use today including speech\
    \ recognition, image recognition, machine translation, and forecasting make use\
    \ of a type of Artificial Neural Network.\n\nAs we will see, the number of ANN\
    \ architectures and algorithms used in Deep learning is wide and varied. We will\
    \ cover the main ones below, starting with the “vanilla” versions: the Simple\
    \ Perceptron and the Multilayer Perceptron before proceeding to Convolutional\
    \ Neural Networks and Recurrent Neural Networks – the two main types for AI applications\
    \ in use today, from speech and image recognition to machine translation and forecasting.\n\
    \n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig5_HTML.jpg)\n\nThe model features\
    \ 7 types of Artificial Neural Networks: Single layer perceptron, radial basis\
    \ network, recurrent neural network, LSTM recurrent neural network, Hopfield network,\
    \ and Boltzmann machine. Single-layer perceptron has 2 input and one output unit.\n\
    \nFigure 5-5\n\nTypes of ANN\n\n### The Simple Perceptron\n\nThe Simple (or Single\
    \ Layer) Perceptron is the building block of all Artificial Neural Networks. Essentially\
    \ it is a simplified model of the biological neurons in our brain.\n\nNeurons\
    \ in our brain have multiple inputs from other neurons and based on these inputs\
    \ the neuron either fires off or it doesn’t. A simple perceptron is much simpler\
    \ – a single neuron which takes a number of inputs and learns a linear function\
    \ to produce an output. An activation function (Heaviside step function) helps\
    \ the simple perceptron classify the binary output (on or off).\n\nIf we structure\
    \ these perceptrons in a multilayered network and enable each neuron to learn\
    \ nonlinear functions using inputs/neurons from prior layers, we get a multilayer\
    \ perceptron (MLP) and something that more closely resembles our brain.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Fig6_HTML.jpg)\n\
    \nA schematic diagram features a simple perceptron. It depicts three inputs `x1`,\
    \ `x2`, and `x3` entering into a circular block, providing output `y`.\n\nFigure\
    \ 5-6\n\nSimple perceptron"
  raw: "### Generative vs. Discriminative\n\nA key concept in understanding how deep\
    \ learning models work is the difference between a discriminative and a generative\
    \ model.\n\nDiscriminative and generative models are used to perform both machine\
    \ and deep learning. What distinguishes the two is that while discriminative models\
    \ **make predictions based on conditional probability p(y|x)**, seek a decision\
    \ boundary between classes and are used in supervised learning, generative models\
    \ **predict conditional probability from a joint probability distribution p(x,y)**\
    \ by explicitly modeling the **actual distribution** of each class and are used\
    \ for unsupervised feature learning.\n\nTo understand the concept, an analogy\
    \ is when considering how to classify speech as one of two languages. We can either\
    \ use the difference within the linguistic models (discriminative) or learn each\
    \ language (generative).\n\nBecause neural networks attempt to learn which features\
    \ x will map to y, and therefore tries to discriminate among inputs, they use\
    \ a discriminative model.\n\n![](images/527966_1_En_5_Chapter/527966_1_En_5_Figa_HTML.jpg)\n\
    \nA schematic diagram of 2 models. The discriminative model is on the left, generative\
    \ model depicts two separate elliptical shapes on the right.\n\n### Random Walks\n\
