- fmt: "### Specific Challenges\n\nImplementing AI solutions comes with specific challenges\
    \ in the Telco sector, stretching across people, processes, and tools. As shown\
    \ in Figure [8-4](#527966_1_En_8_Chapter.xhtml#Fig4) from Boston Consulting, commissioned\
    \ AI projects and applications need to demonstrate proof of value, data governance,\
    \ agile digital delivery, in-house AI capabilities, and managed business transformation.\
    \ We address some of these challenges as we pick out the main Telco AI and Analytics\
    \ solutions in the sections below.\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig4_HTML.jpg)\n\
    \nA set of five specific challenges in the telco sector. They are proof of value,\
    \ data governance, digital platforms, people, and change management including\
    \ analytic solutions below.\n\n**Figure 8-4** BCG: Five AI Roadblocks in TELCO\n\
    \n### Solution Categories\n\nThe Telco sector is unique in its reliance on famously\
    \ “feature-rich” datasets – information on customers often turns in hundreds of\
    \ variables regarding demographics (age, gender, etc.), transactional (e.g., total\
    \ spend per month), and attitudinal parameters (such as visited upgrade plans).\n\
    \nBut AI solutions are not always focused on the end-customer. Broadly we see\
    \ three main categories of AI solution in the Telco sector. These are grouped\
    \ as shown in Figure [8-5](#527966_1_En_8_Chapter.xhtml#Fig5) into Data and Governance\
    \ and Oversight, Dashboards-driven Insights, and Predictive Analytics.\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig5_HTML.jpg)\n\
    \nA set of three categories of AI solutions in the telco sector including the\
    \ solutions below. 1. Governance and oversight. 2. Dashboard-driven insights.\
    \ 3. Predictive analytics.\n\n**Figure 8-5** Telco AI solution categories\n\n\
    ### Real-time Dashboards\n\nChurn is one of the main metrics by which a telco\
    \ company is measured with industry analysis^([^(116)](#fn116)) showing customer\
    \ churn drivers for Mobile services varying by:\n\n*   Price 45%\n*   Customer\
    \ Service 45%\n*   Network Coverage 36%\n\nIdeally, businesses want a single place\
    \ to track progress across multiple client metrics and internal KPIs and prevent\
    \ churn. Making data-driven decisions requires a 360° perspective on key customer\
    \ metrics including customer complaints tracking and key SLA metrics.\n\nReal-time,\
    \ compelling dashboards can support the supervisory process with key metrics,\
    \ monitoring, and automated reporting on customer complaints:\n\n*   Examine customer\
    \ profiles\n*   Evaluate customer assessments\n*   Monitor indicators\n*   Measure\
    \ risks including probability that risks materialize\n*   Unstructured text complaint\
    \ analysis\n*   Resource and time-based complaint resolution KPIs\n\nAs shown\
    \ above, today’s AI solutions ultimately need to extract insights from increasingly\
    \ pivotal unstructured text. Besides integration with multiple data sources on\
    \ cloud, the best dashboard solutions today (such as `PowerBI` and `Looker`) come\
    \ with support for unstructured data handling and an embedded “Single Customer\
    \ View,” with multiple, well-documented benefits:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig6_HTML.jpg)\n\
    \nAn example representation of a real-time dashboard with customer risk analysis.\
    \ It includes the comparison between the client profile and churner profile with\
    \ demographics, phone service, and contract terms.\n\n**Figure 8-6** Example Telco\
    \ dashboard view – churners vs. non-churners (Source: Microsoft PowerBI / Starschema)\n\
    \n*   Real-time analysis with quick navigation\n*   Improved decision making\n\
    *   Easy to access and shareable information\n*   Know your business (or customer)\
    \ with key metrics reporting\n*   Cross-sell and up-sell opportunity identification\n\
    *   Fast answers to business queries\n\n### Sentiment Analysis\n\nSentiment Analysis\
    \ using Natural Language Processing has become a valuable tool for companies in\
    \ the Telco industry to better understand the voice and opinions of the customer.\
    \ But typically customer “sentiment” is just one of the key tracking criteria\
    \ (KTCs) that a company is interested in gleaning from its customer engagement\
    \ channels. Other KTCs include customer themes or concepts, emotions, entity,\
    \ and keyword analysis.\n\nWe will look below at how to implement a Sentiment\
    \ Analysis solution for Telco using the Python Twitter API below, but in terms\
    \ of a project approach these KTCs are a good starting point in which to create\
    \ a solution design for displaying social media metrics relevant to the business\
    \ and upon which marketing teams can segment customers and act.\n\nTypically the\
    \ best-of-breed sentiment analysis solutions are full-stack, combining analysis\
    \ of feature-rich Telco datasets and under-the-hood KTC analysis of the latest\
    \ Twitter feeds (or Facebook Insights) with a front-end dashboard displaying KPIs\
    \ in real time.\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig7_HTML.jpg)\n\
    \nA representation depicts sentiment analysis of feature-rich telco datasets.\n\
    \n**Figure 8-7** Telco datasets are famously \"feature-rich\"\n\n### Predictive\
    \ Analytics\n\nBesides dashboards and sentiment analysis, more generic “Predictive\
    \ Analytics” solutions leveraging Machine Learning are sought after by Telcos\
    \ to achieve productivity improvements.\n\nThe use cases are varied, from optimal\
    \ planning and scheduling (e.g., of broadband repairs) through push-button forecasting\
    \ of customer demand (by segment) and competitor pricing, support for what-if\
    \ scenario analysis (e.g., modeling rollout of a new service), automation of customer\
    \ service delivery including installations and service upgrades to document search\
    \ capability/probabilistic document retrieval (e.g., based on contract terms).\n\
    \nA natural fit for these challenges is an “in-house” Machine Learning as-a-service\
    \ capability that can tackle these myriad issues, transforming into solvable machine\
    \ or deep learning problems, often unsupervised at first before moving to a scheduled\
    \ (e.g., monthly) supervised learning approach (until a sufficient volume of data\
    \ is captured and auto-updated through a pipeline). The key here for delivering\
    \ production-grade solutions in Telco, as in all sectors, is performance benchmarking\
    \ against legacy processes with either:\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig8_HTML.jpg)\n\
    \nA set of predictive analyses depicts the uses of PCA on feature-rich telco datasets\
    \ and as a valuable tool for data reduction.\n\n**Figure 8-8** Use of PCA – a\
    \ valuable tool for data reduction on \"feature-rich\" Telco datasets\n\n*   A\
    \ demonstratable ROI from the underlying predictive analytics solution\n*   A\
    \ cost reduction or\n*   Incremental revenue benefits\n\n### Connecting to the\
    \ Twitter API from Python\n\nWe wrap up this section with a look at how to connect\
    \ to the Twitter API from Python – a prerequisite for our first hands-on lab in\
    \ this Chapter.\n\n**Before we can import the twitter library in a Python notebook,\
    \ there are three overriding setup requirements we need:**\n\n1.  A twitter account\n\
    2.  A twitter developer account\n3.  Approval from twitter for use cases\n\nThe\
    \ process is as shown below:\n\n*   Set up a twitter account\n    *   [https://twitter.com/i/flow/signup](https://twitter.com/i/flow/signup)\n\
    *   Set up a Twitter Developer Account\n    *   [https://developer.twitter.com/en/portal/petition/use-case](https://developer.twitter.com/en/portal/petition/use-case)\n\
    \    *   There is a 5-10 minute application form to fill out – make sure to clarify\
    \ use cases are for upskilling on NLP and to understand social media sentiment\n\
    *   Get Twitter API Credentials\n    *   `API_KEY`, `API_SECRET_KEY`, `ACCESS_TOKEN`,\
    \ `ACCESS_TOKEN_SECRET`\n\nOpening a Python notebook (e.g., with Jupyter or Google\
    \ Colab) we can now import the twitter library with the command below and start\
    \ to query live (and historic) tweets.\n\n```\nimport twitter\n```"
