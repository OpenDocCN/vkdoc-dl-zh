    on its potential. The benefits for businesses and organizations are tangible,
    accelerated by Covid-digitalization and evidenced by the proliferation of chatbot
    support during the pandemic, deep-learning supported healthcare diagnostics, usage
    of computer vision for social-distancing measures, and machine learning modeling
    of the effects from reopening economies.


    In the workplace, while AI is maturing as a service, application has largely involved
    only a handful of IT experts. Democratization of AI is a big focus in 2022 and
    shifting from expert/niche knowledge to achieving buy-in across the wider ecosystem
    of key stakeholders (all employees, customers, and business partners). Industrialization
