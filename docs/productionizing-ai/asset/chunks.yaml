  trans: "\n### 具体挑战\n\n在电信行业实施人工智能解决方案会面临一系列具体挑战，这些挑战涉及人员、流程和工具等多个方面。如图 8-4（源自波士顿咨询公司）所示，委托开展的人工智能项目和应用需要证明其价值、具备数据治理能力、实现敏捷数字化交付、拥有内部人工智能能力，并管理好业务转型。在接下来的章节中，我们将挑选出主要的电信人工智能与分析解决方案，并探讨其中部分挑战。\n\
    \n![](img/527966_1_En_8_Fig4_HTML.jpg)\n\n电信行业面临的五项具体挑战。它们分别是：价值证明、数据治理、数字平台、人员以及变革管理（包括下文的分析解决方案）。\n\
    \n**图 8-4** 波士顿咨询公司：电信行业五大人工智能障碍\n\n### 解决方案类别\n\n电信行业独特之处在于其依赖以“特征丰富”著称的数据集——关于客户的信息通常包含数百个变量，涉及人口统计特征（年龄、性别等）、交易数据（例如，每月总支出）以及态度参数（如已浏览的升级套餐）。\n\
    \n但人工智能解决方案并非总是聚焦于最终客户。总体而言，我们在电信行业看到了三大类人工智能解决方案。如图 8-5 所示，这些方案被分为：数据与治理及监督、仪表盘驱动的洞察，以及预测性分析。\n\
    \n![](img/527966_1_En_8_Fig5_HTML.jpg)\n\n电信行业三大类人工智能解决方案，包括以下方案：1. 治理与监督；2. 仪表盘驱动的洞察；3.\
    \ 预测性分析。\n\n**图 8-5** 电信行业人工智能解决方案类别\n\n### 实时仪表盘\n\n客户流失率是衡量电信公司业绩的主要指标之一。行业分析^(¹¹⁶)显示，移动服务的客户流失驱动因素各不相同：\n\
    \n*   价格 45%\n*   客户服务 45%\n*   网络覆盖 36%\n\n理想情况下，企业希望有一个单一平台来跟踪多项客户指标和内部关键绩效指标的进展，并防止客户流失。做出数据驱动的决策需要全面了解关键客户指标，包括客户投诉跟踪和关键服务水平协议指标。\n\
    \n实时、引人注目的仪表盘可以通过关键指标、监控以及客户投诉的自动报告来支持监督流程：\n\n*   检查客户档案\n*   评估客户评价\n*   监控指标\n\
    *   衡量风险，包括风险发生的概率\n*   非结构化文本投诉分析\n*   基于资源和时间的投诉解决关键绩效指标\n\n如上所示，当今的人工智能解决方案最终需要从日益重要的非结构化文本中提取洞察。除了与云上的多个数据源集成外，当今最好的仪表盘解决方案（例如\
    \ `PowerBI` 和 `Looker`）都支持非结构化数据处理，并内置了“单一客户视图”，具有多项有据可查的优势：\n\n![](img/527966_1_En_8_Fig6_HTML.jpg)\n\
    \n一个包含客户风险分析的实时仪表盘示例。它展示了客户画像与流失客户画像在人口统计特征、电话服务和合同条款方面的对比。\n\n**图 8-6** 电信仪表盘视图示例\
    \ – 流失客户与非流失客户（来源：Microsoft PowerBI / Starschema）\n\n*   快速导航下的实时分析\n*   改进的决策制定\n\
    *   易于访问和共享的信息\n*   通过关键指标报告了解您的业务（或客户）\n*   交叉销售和追加销售机会识别\n*   快速解答业务查询\n\n###\
    \ 情感分析\n\n使用自然语言处理的情感分析已成为电信行业公司更好地理解客户声音和意见的宝贵工具。但通常，客户“情感”只是公司希望从其客户互动渠道中收集的关键跟踪标准之一。其他关键跟踪标准包括客户主题或概念、情绪、实体和关键词分析。\n\
    \n我们将在下文探讨如何使用 Python Twitter API 为电信行业实施情感分析解决方案。但就项目方法而言，这些关键跟踪标准是一个很好的起点，可用于创建解决方案设计，以展示与业务相关的社交媒体指标，营销团队可以据此对客户进行细分并采取行动。\n\
    \n通常，最优秀的情感分析解决方案是全栈式的，它将特征丰富的电信数据集分析与底层的最新 Twitter 信息流（或 Facebook Insights）关键跟踪标准分析相结合，并通过前端仪表盘实时显示关键绩效指标。\n\
    \n![](img/527966_1_En_8_Fig7_HTML.jpg)\n\n该图描绘了对特征丰富的电信数据集进行情感分析的过程。\n\n**图 8-7**\
    \ 电信数据集以“特征丰富”著称\n\n### 预测性分析\n\n除了仪表盘和情感分析，电信公司也在寻求利用机器学习的更通用的“预测性分析”解决方案，以实现生产力提升。\n\
    \n其用例多种多样，从最优规划和调度（例如，宽带维修），到一键式客户需求预测（按细分市场）和竞争对手定价分析，支持假设情景分析（例如，模拟新服务的推出），客户服务交付自动化（包括安装和服务升级），以及文档搜索能力/概率性文档检索（例如，基于合同条款）。\n\
    \n应对这些挑战的一个自然选择是“内部”机器学习即服务能力，它可以处理这些众多问题，将其转化为可解决的机器或深度学习问题，通常先采用无监督学习，然后转向定期（例如，每月）的有监督学习方法（直到通过管道捕获足够数量的数据并自动更新）。与所有行业一样，在电信行业交付生产级解决方案的关键在于，通过以下方式之一，与现有流程进行性能基准测试：\n\
    \n![](img/527966_1_En_8_Fig8_HTML.jpg)\n\n一组预测性分析图，展示了主成分分析在特征丰富的电信数据集上的应用，以及它作为数据降维工具的价值。\n\
    \n**图 8-8** 主成分分析的应用——对“特征丰富”的电信数据集进行数据降维的宝贵工具\n\n*   底层预测性分析解决方案可证明的投资回报率\n*\
    \   成本降低，或\n*   增量收入收益\n\n### 从 Python 连接到 Twitter API\n\n在本节结尾，我们将探讨如何从 Python\
    \ 连接到 Twitter API——这是本章第一个动手实验的先决条件。\n\n**在 Python 笔记本中导入 twitter 库之前，我们需要满足三个首要的设置要求：**\n\
    \n1.  一个 Twitter 账户\n2.  一个 Twitter 开发者账户\n3.  Twitter 对用例的批准\n\n流程如下所示：\n\n*\
    \   设置一个 Twitter 账户\n    *   [`twitter.com/i/flow/signup`](https://twitter.com/i/flow/signup)\n\
    *   设置一个 Twitter 开发者账户\n    *   [`developer.twitter.com/en/portal/petition/use-case`](https://developer.twitter.com/en/portal/petition/use-case)\n\
    \    *   需要填写一份 5-10 分钟的申请表——确保说明用例是为了提升自然语言处理技能和理解社交媒体情感\n*   获取 Twitter API\
    \ 凭证\n    *   `API_KEY`, `API_SECRET_KEY`, `ACCESS_TOKEN`, `ACCESS_TOKEN_SECRET`\n\
    \n打开一个 Python 笔记本（例如，使用 Jupyter 或 Google Colab），我们现在可以使用以下命令导入 twitter 库，并开始查询实时（和历史）推文。\n\
    \n```\nimport twitter\n```\n"
- fmt: "### Twitter API and Basic Sentiment Analysis: Hands-on Practice\n\n#### Getting\
    \ Familiar with the Twitter API\n\n**Accessing the Python Twitter API**, the goal\
    \ of this lab is two-fold:\n\n1. Analyze the twitter feed in Python with Jupyter\
    \ Notebook\n2. Perform basic sentiment analysis on the latest tweets with `tweepy`\
    \ and `nltk`\n\n##### a) Analyze the twitter feed:\n\n1. Make sure you have followed\
    \ the set of the Twitter API as described under \"Connecting to the Twitter API\
    \ from Python\" above\n2. Download the notebook from GitHub repo below:\n\n`https://github.com/bw-cetech/apress-8.2.git`\n\
    \n3. Run through the `TwitterFeed.ipynb` notebook and using Figure [8-9](#527966_1_En_8_Chapter.xhtml#Fig9)\
    \ as a roadmap:\n   - **Get tweets** – Import Libraries and credentials, define\
    \ twitter search criteria, and fetch tweets\n   - **Process the tweets** – Collect\
    \ tweets in Python list and filter out retweets\n   - **Analyze tweets** – Who\
    \ is tweeting? Isolate locational metrics and convert list to a pandas dataframe\n\
    4. Finally, complete the advanced twitter query Exercise.\n\n##### b) Perform\
    \ basic sentiment analysis\n\n![](images/527966_1_En_8_Chapter/527966_1_En_8_Fig9_HTML.jpg)\n\
    \nAn illustration depicts the Twitter feed with sentiment analysis. It includes\
    \ 5 steps: get tweets, process tweets, analyze tweets, clean tweets, and finally\
    \ sentiment analysis\n\n**Figure 8-9** Sentiment analysis with the Twitter API\n\
    \n1. Run through the `TwitterSentimentAnalysis.ipynb` notebook following the steps/substeps\
    \ shown in the image below\n2. Make sure to complete the exercises in the notebook\
    \ for creating analytics on the processed tweets\n\n### Retail Solutions\n\nMany\
    \ of the same challenges exist in the retail sector as in the Telco industry,\
    \ but there are also certain unique challenges, related to products and customer\
    \ experiences that distinguish digital disruption from more service-driven industries\
    \ such as Telco. This section takes a look at how AI solutions are helping retailers\
    \ overcome these challenges.\n\n#### Challenges in the Retail Industry\n\nDigital\
    \ disruption to the retail sector and the high street has been in evidence since\
    \ the start of the 2010s and has accelerated in the last five years, exacerbated\
    \ further by the Pandemic.\n\nAs markets have rapidly evolved, so too have consumer\
    \ expectations, such as in the provision of unique in-store experiences, with\
    \ statistics^([^(117)](#fn117)) suggesting that more people are likely to shop\
    \ in-store than online if a personalized experience is offered. Synchronized,\
    \ seamless online and store shopping experiences not only help to create more\
    \ \"immersive shopping experiences\" but can also address operational inefficiencies.\
    \ With customers increasingly reliant on social media, retailers leveraging model\
    \ outcomes on these channels can help differentiate services/give an edge over\
    \ the competition, and ensure engagement with the direct customer, their relatives,\
    \ and key influencers they know and trust.\n\nFaced with an onslaught of data\
    \ across the supply chain and from all corners of their business (online and instore),\
    \ retailers need to filter through the noise to transform these disparate data\
    \ sources into consumer-first strategies. Traditional supply chains are out in\
    \ favor of adaptive and flexible ecosystems that can quickly respond to consumers'\
    \ shifting behaviors.\n\nMeanwhile, dynamic pricing is contributing to price (and\
    \ promotions) transparency and helping some retailers define their brand value.\
    \ At the same time, the constant undercutting (and commitment to delivery dates)\
    \ by online retailers has presented numerous challenges to stores looking to compete.\n\
    \nAll of the above trends in retail (and to a certain extent transport and aviation\
    \ sectors) are driven by data and increasingly innovative predictive modeling\
    \ techniques. Although one of the leading sectors in terms of AI uptake, the retail\
    \ sector by virtue of its size remains a key battleground for AI solutions in\
    \ 2022, particularly those with better data pipeline integration and supporting\
    \ cloud (storage and compute) infrastructure."
