  trans: "\n### Dask 并行化：动手实践\n\n**DASK 并行化**\n\n按照下方流程图中所示的步骤，本练习的目标是让我们熟悉使用 Dask\
    \ 进行（基于 Python 的）大数据处理：\n\n1.  克隆 GitHub 仓库 `git clone` [`http://github.com/dask/dask-tutorial`](http://github.com/dask/dask-tutorial)\n\
    2.  创建一个 conda 环境\n3.  启动 Jupyter Lab 或 Jupyter Notebook\n4.  浏览代码示例 `dask.delayed.ipynb`，了解\
    \ Dask 中延迟执行的工作原理\n\n注意：要了解在集群上执行复杂的提取、转换、加载（ETL）操作是如何工作的，请参阅后续笔记本中的 GIF 动图：\n\
    \n[`https://github.com/dask/dask-tutorial/blob/main/01x_lazy.ipynb`](https://github.com/dask/dask-tutorial/blob/main/01x_lazy.ipynb)\n\
    \n1.  练习 – 对惰性执行执行相同操作，即运行 `01x_lazy.ipynb` 笔记本\n2.  比较逐词读取与逐行读取 `README.md` 文件的运行时间\n\
    \n![](img/527966_1_En_9_Fig11_HTML.png)\n\n该图显示为一个阶梯。每一级的步骤依次为：克隆 GitHub dask\
    \ 教程、创建 conda 环境、启动笔记本、以及使用 `dask.dot.delayed` 进行练习。\n\n**图 9-11** Dask 简介 – 实验流程\n\
    \n## 全栈与容器化……最后的边界\n\n至此，我们来到了这倒数第二章的最后一节，我们将讨论如何打包一个“全栈”部署的解决方案。在结束容器（特别是 Docker^(¹⁴⁵)）的使用之前，我们将重新审视第\
    \ 7 章中的全栈 AI 应用实验——容器通常是简化并成功部署 AI 应用的最后一块拼图。\n\n### 全栈 AI – React 与 Flask 案例研究\n\
    \n在第 7 章的结尾，我们使用 `react.js`、Plotly Dash、Flask 和 TensorFlow 部署了第一个 AI 应用。所使用的流程是一个很好的分步指南，可用于实现任何\
    \ AI 应用：从训练模型并将模型导出为分层数据格式（`.h5`）文件，设置虚拟环境，创建用于模型集成的后端，然后创建前端 UI，最后先在本地运行应用，再将其作为托管端点解决方案运行。\n\
    \n此部署过程以图形方式显示在图 9-12 中，以供参考。\n\n![](img/527966_1_En_9_Fig12_HTML.jpg)\n\n一组四个选项卡，标题分别为：建立存储资源、训练并导出模型、创建\
    \ Flask 后端、安装并设计 React 前端。\n\n**图 9-12** 全栈部署回顾 – `react.js` 和 Flask\n\n不幸的是，由于高度依赖本地文件和库配置，以这种方式构建\
    \ AI 应用可能相当繁琐。这正是容器可以发挥作用的地方——提供一种隔离依赖关系的方法，并确保在跨不同最终用户系统部署时不会发生冲突。\n\n### 使用\
    \ Docker 容器在云上部署\n\n本章最后一个动手实验的主题是使用 Docker 在云上部署，这是将 AI 投入生产的推荐路径。如下图所示，这首先从训练模型开始，然后导出（这次是导出为\
    \ pickle 文件）。\n\n然后，我们下载一个样板解决方案（来自 GitHub 的源代码），并可以选择测试上述全栈 AI 的步骤，以执行 (a) 本地（独立）安装（包含本地文件依赖）。\n\
    \n在本地安装成功后，我们继续执行 (b) 本地容器化的 Docker 实例，测试通过后，最后 (c) 对云（本例中为 ACR – Azure 容器注册表）进行身份验证，重建我们的容器镜像并将\
    \ Docker 实例推送到 ACR。\n\n最后，我们创建一个（Azure）Web 应用，指向 ACR 中的 Docker 镜像，并查看我们部署的应用。这种生产化解决方案的真正价值在于，我们所有的依赖关系都通过内部\
    \ Docker 环境中的 `requirements.txt` 文件进行安装，从而与外部（外部）文件的潜在冲突隔离开来。\n\n![](img/527966_1_En_9_Fig13_HTML.jpg)\n\
    \n一组七个要点标题：运行训练脚本、下载应用源代码并在本地运行、安装 Docker 和 Kitematic、构建 Docker 镜像、运行本地 Docker、使用\
    \ ACR 进行身份验证并推送到云端、创建并运行 Azure Web 应用。\n\n**图 9-13** 将容器化的 Docker AI 应用部署到 Azure\n\
    \n### 实现持续交付流水线\n\n最后，我们回到上面“生产化的典型障碍”中提到的不同 AI 项目阶段。围绕解决方案开发和设计的实验是达到目的的一种手段，即实现我们生产化或工业化\
    \ AI 应用的目标。\n\n正如 DataKitchen 所说，我们拥有一个创新流水线和一个价值流水线：\n\n*   **创新流水线** – AI 模型被开发、设计、测试并部署到价值流水线中\n\
    *   **价值流水线** – 数据被输入 AI 模型，产生分析结果，为创建新模型的过程提供价值\n\n每个流水线本身都是一组迭代阶段，通常由一组文件定义，并使用一系列工具实现，包括脚本、源代码、算法、HTML\
    \ 配置文件、参数文件和容器。\n\n当然，代码从头到尾控制着整个数据分析流水线，实际上涵盖了从构思、设计和需求捕获，到训练、测试、部署到运维以及后期维护的全过程。\n\
    \n![](img/527966_1_En_9_Fig14_HTML.jpg)\n\n该图表确定了价值流水线的以下步骤：从数据到生产、开发、以及从创意到价值。中间部分被称为质量创新流水线。\n\
    \n**图 9-14** 持续交付流水线\n\n### 总结\n\n通过对持续 AI 交付的探讨，我们关于如何部署 AI 解决方案的旅程已到达终点。接下来的两个实验旨在提供更“沉浸式”的\
    \ AI 生产化体验，最终目标是实现“全栈”AI 应用。\n\n尽管本章标志着本书主要主题的结束，但我们还有一章要讲。主要由于使能技术（特别是 Transformer）的阶跃式变化以及对非结构化数据关注度的提高，自然语言处理已经开辟出自己的兴趣领域，并成为我们最后一章的主题。\n\
    \n### 使用 Streamlit 和 Heroku 部署深度学习应用：动手实践\n\n**使用 STREAMLIT、GOOGLE 和 HEROKU 托管深度学习模型**\n\
    \n我们的最后两个实验是端到端的应用部署，本实验首先使用 Google Teachable Machine 训练模型，使用 Streamlit 创建用于推理的前端，然后作为托管应用部署到\
    \ Heroku：\n\n1.  访问 [`https://teachablemachine.withgoogle.com/train/image`](https://teachablemachine.withgoogle.com/train/image)\
    \ 并按照下方链接中“创建模型和应用的步骤”下的步骤 1-5 创建一个训练好的模型：\n\n    [`https://towardsdatascience.com/build-a-machine-learning-app-in-less-than-an-hour-300d97f0b620`](https://towardsdatascience.com/build-a-machine-learning-app-in-less-than-an-hour-300d97f0b620)\n\
    \n2.  从 `C:\\Users\\Barry Walsh\\Testing\\xray-automl\\Streamlit-Heroku-setup.zip`\
    \ 下载文件并解压到本地驱动器上的一个测试文件夹中\n\n3.  在虚拟环境中安装所有依赖，包括 `pillow`、`tensorflow` 和 `scikit-learn`\n\
    \n4.  运行以下命令并检查应用在本地是否正常工作\n\n![](img/527966_1_En_9_Figa_HTML.jpg)\n\n对话框中显示了一张胸部\
    \ X 光片。对话框的标题是“使用 Teachable Machine Learning 进行图像分类”，副标题是“正常 X 光片对比肺炎 X 光片”。\n\
    \n1.  练习：最后重复上面“在 Heroku 上托管 – 端到端：动手实践”实验中的步骤，将其作为云上的端点解决方案进行部署\n\n```\nstreamlit\
    \ run xray.py\n```\n"
- fmt: "### Deploying on Azure with a Docker Container: Hands-on Practice\n\n####\
    \ Containerizing an ML Model for Predicting Insurance Premiums\n\nUsing `PyCaret`\
    \ in Colab, our final “marathon” lab trains an AutoML model to predict insurance\
    \ premiums, then exports the resultant pickle file. We then attach the trained\
    \ model to a boilerplate Flask app, run locally before Dockerizing as a container\
    \ app and pushing to Azure Container Registry for running as an (Azure) web app.\n\
    \nThe process is described further in the section above “Deploying on Cloud with\
    \ a Docker Container” and is summarized below:\n\n1.  First, we train a machine\
    \ learning pipeline (AutoML) to predict insurance charges:\n    1.  Install `pycaret`\n\
    \    2.  Download and run the following notebook in Colab:^([^(146)](#fn146))\n\
    \        [`https://github.com/bw-cetech/apress-9.4.git`](https://github.com/bw-cetech/apress-9.4.git)\n\
    \    3.  Export pickle file\n\n2.  Next clone the app source code, create a local\
    \ folder\n\n```\ngit clone https://github.com/pycaret/deployment-heroku.git\n\
    ```\n\nand\n\n1.  Install Docker\n    1.  Download Docker for Windows\n    2.\
    \  Install Linux kernel update package\n    3.  (optional) Install Kitematic\n\
    \n2.  Build the Docker Image\n    1.  Create `Dockerfile`\n    2.  Add additional\
    \ `pycaret` requirement\n    3.  Build image\n\n3.  Run Docker locally\n    1.\
    \  `docker run`\n    2.  Open local url\n\n4.  Authenticate with Azure Container\
    \ Registry (ACR) and push/deploy our container solution to cloud\n    1.  Login\
    \ to Azure Container Registry\n    2.  Delete local container and image\n    3.\
    \  Rebuild and push to ACR\n\n5.  Create and run Azure Web App\n    1.  Finally,\
    \ we create a Web App in the Azure portal\n    2.  Point to Docker image in ACR\n\
    \    3.  View app on public url\n\n1.  Create local folder\n2.  Clone from GitHub\n\
    3.  Set up virtual environment\n4.  Install dependencies\n5.  Swap out model and\
    \ upgrade `pycaret`\n\n**NB don’t forget to clean up (stop and delete) resources\
    \ (Azure Web App, ACR instance, and any VMs), to preserve cloud credits/prevent\
    \ running up cloud costs!**\n\nFootnotes [1](#527966_1_En_9_Chapter.xhtml#Fn1_source)\
    \   [2](#527966_1_En_9_Chapter.xhtml#Fn2_source)   [3](#527966_1_En_9_Chapter.xhtml#Fn3_source)\
    \   [4](#527966_1_En_9_Chapter.xhtml#Fn4_source)   [5](#527966_1_En_9_Chapter.xhtml#Fn5_source)\
    \   [6](#527966_1_En_9_Chapter.xhtml#Fn6_source)   [7](#527966_1_En_9_Chapter.xhtml#Fn7_source)\
    \   [8](#527966_1_En_9_Chapter.xhtml#Fn8_source)   [9](#527966_1_En_9_Chapter.xhtml#Fn9_source)\
    \   [10](#527966_1_En_9_Chapter.xhtml#Fn10_source)   [11](#527966_1_En_9_Chapter.xhtml#Fn11_source)\
    \   [12](#527966_1_En_9_Chapter.xhtml#Fn12_source)\n\n# 10. Natural Language Processing\n\
    \nAny book on operationalizing Artificial Intelligence today cannot ignore growth\
    \ in Natural Language Processing (NLP), with market size projected to be $43b\
    \ in 2025.^([^(147)](#fn147)) Ostensibly the branch of AI concerned with programming\
    \ computers to understand both written and spoken text, NLP applications in 2022\
    \ are being pushed further to do much more. Qualitative analysis, contextual/domain-specific\
    \ reasoning, and thought leadership creation^([^(148)](#fn148)) are all in scope\
    \ and performance improvements are dramatic, even potentially seismic if you believe\
    \ Google’s Engineers.^([^(149)](#fn149))\n\nPerceived by many as a critical skill\
    \ in the race to digitalize, much of the attention on NLP is taking techniques\
    \ and best practice learned from structured data wrangling and predictive modeling\
    \ processes and expanding the scope to unstructured data. The implicit goal is\
    \ to transform unstructured data into machine readable formats where we can then\
    \ carry out similar, if not identical processes carried out in standard ML/DL.\n\
    \nWhile the overwhelming focus in this book is on applications of machine and\
    \ deep learning in their own right, we cover in this last chapter the main themes\
    \ for Natural Language Processing, basic NLP theory, and implementation before\
    \ addressing all the important tools and libraries for deploying NLP solutions.\n\
    \nMany of these tools rely on machine and deep learning techniques described elsewhere\
    \ in this book already but we will go through in this final chapter the use of\
    \ the main Python NLP library, `NLTK`, alongside other libraries such as `PyTorch`\
    \ and `spaCy` used for solving NLP problems. We will also cover some of well-known\
    \ APIs which leverage NLP (such as the Twitter API) which are being applied to\
    \ highly relevant customer journey and public perception use cases in 2022.\n\n\
    We will also take our usual hands-on, lab-based approach, in this last chapter\
    \ at automating the process of understanding complex language by identifying and\
    \ splitting (parsing) words and extracting topics, entities, and “intents” – core\
    \ subprocesses for many NL applications today, including sentiment analysis and\
    \ chatbots/conversation agents.\n\n## Introduction to NLP\n\nWe start with a brief\
    \ historical context and a look at a basic definition of Natural Language Processing,\
    \ its place in the wider “AI Ecosystem” and interaction with machine and deep\
    \ learning processes.\n\nOur first section then proceeds to address how and why\
    \ NLP is being applied at scale in businesses and organizations worldwide before\
    \ wrapping up on the NLP lifecycle and in particular, a best practice roadmap\
    \ for the sequence of tasks central to delivering a successful NLP implementation.\n\
    \n### NLP Fundamentals\n\nNatural Language Processing is the branch of AI that\
    \ deals with the interaction between computers and humans using natural language.\
    \ The objective is to read, decipher, understand, and make sense of language in\
    \ a manner that is valuable in some way to end users and organizations as a whole.\
    \ To do this, two key linguistic techniques are adopted: syntactic analysis and\
    \ semantic analysis.\n\nImportantly, and linking back to the main theme of this\
    \ book, NLP then applies Machine and Deep Learning algorithms to unstructured\
    \ data, converting into a form that computers can understand. This “overlap” is\
    \ shown in Figure [10-1](#527966_1_En_10_Chapter.xhtml#Fig1).\n\n![](images/527966_1_En_10_Chapter/527966_1_En_10_Fig1_HTML.jpg)\n\
    \nA circle Venn diagram illustrates relations between AI, ML, DL, and NLP. It\
    \ describes deep learning as a subset of machine learning which intersects natural\
    \ language processing partially. All the circles are inside the big circle of\
    \ artificial intelligence.\n\n**Figure 10-1** NLP interface to Machine and Deep\
    \ Learning\n\n#### Historical Context and Development of NLP\n\nWe mentioned above,\
    \ linguistics study underpins use of Natural Language Processing. Early applications\
    \ of NLP involved rule-based approaches, limited by the scope of rules that existed\
    \ and computational scale and speed as the size of the dataset increased. Probabilistic\
    \ modeling approaches used in statistical NLP have since allowed NLP solutions\
    \ to scale, leveraging machine and deep learning techniques to more dynamically\
    \ interpret natural language. One of the main examples of this is an N-gram, where\
    \ we can train an NLP model to probabilistically predict word sequences, such\
    \ as the bigram “Machine Learning.”\n\nThe power of Deep Learning in particular\
    \ to generate sophisticated predicted outcomes from big datasets fits the overall\
    \ problem formulation we have with linguistic models, where the underlying structure\
    \ and meaning of words and characters is complex – in effect we are dealing with\
    \ another “Big Data” dataset but the difference here is that the underlying grammar\
    \ (in any language) has an inherent sequence or order. For this reason, Recurrent\
    \ Neural Networks/specialized LSTMs have been adopted to propagate word order\
    \ as state through a neural network architecture.\n\nAs we will see, word embeddings\
    \ or vectorization is the essential mechanism by which Recurrent Neural Networks\
    \ read, transform, and iterate over syntax and semantic meaning of the underlying\
    \ language – with words being expressed in an N-dimensional vector space."
