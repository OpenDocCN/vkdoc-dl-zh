  trans: "\n### 简易数据流：动手实践\n\n本部分第一个实验将探讨如何使用最广泛使用的工具之一——Microsoft Excel 来流式传输数据。\n\
    \n#### 使用 Microsoft Excel 与 Python 流式传输股票价格\n\n**本练习的目标是，在用 Python 抓取最新（科技）股票价格后，利用\
    \ Microsoft Data Streamer 作为为 AI 应用搭建流式概念验证（PoC）的最基本方法之一。**\n\n1.  获取 Microsoft\
    \ Data Streamer 的加载项，方法是打开一个空白 Excel 文件，然后依次选择：\n    1.  文件 ➤ 选项\n    2.  加载项\n\
    \    3.  COM 加载项\n    4.  转到\n    5.  在 COM 加载项对话框中，勾选“Microsoft Data Streamer\
    \ for Excel”复选框，然后单击“确定”。\n\n2.  从下方的 GitHub 仓库下载实验文件：\n    [`https://github.com/bw-cetech/apress-3.3a`](https://github.com/bw-cetech/apress-3.3a)\n\
    \n3.  按如下步骤流式传输示例数据：\n    1.  Data Streamer 选项卡 ➤ 导入数据文件\n    2.  指向从 GitHub 下载的\
    \ `df_eth.csv` 文件\n    3.  在 `Data In` 工作表上 ➤ 高亮单元格 `B7:C22`\n    4.  按 `alt +\
    \ F1` 创建图表 – 此时图表将为空白\n    5.  Data Streamer 选项卡 ➤ 播放数据\n\n    **您应该能够在图表中看到以时间线形式呈现的流式数据。**\n\
    \n4.  练习：利用 Jupyter Notebook 中下载的 Python 脚本 `StockPriceScraper.ipynb`，导出从 1 月\
    \ 21 日到前一日（D-1）的实时股票价格（读者可选择要导出的科技股）以及最新的以太坊 EOD 价格。按照上述方法在 Excel 图表中流式传输股票价格。\n\
    \n### 用于数据摄入的云服务：动手实践\n\n在下一个实验中，我们还将探讨如何通过主要的云服务之一来流式传输数据以进行数据摄入。\n\n#### 使用\
    \ Python 与 AWS KINESIS 进行流式传输\n\n**本练习的目标是构建一个 Python 脚本，在 AWS 中创建访问密钥、IAM 策略和\
    \ IAM 用户，然后连接到 Kinesis 并流式传输股票价格数据。**\n\n1.  创建一个新的（空白）Python 脚本（例如，在 Jupyter\
    \ notebook、Google Colab 中），并添加此处示例笔记本中所示的 AWS Python 库（`boto3`）：\n    [`https://github.com/bw-cetech/apress-3.3`](https://github.com/bw-cetech/apress-3.3)\n\
    \n2.  按照此处步骤 1-4 在 AWS 中创建访问密钥：[`https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.xhtml`](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.xhtml)\n\
    \n3.  按照下方步骤 1-7 创建 Kinesis 数据流：[`https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-create-stream.xhtml`](https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-create-stream.xhtml)\n\
    \n4.  按照此处步骤创建 IAM 策略：[`https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-iam.xhtml`](https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-iam.xhtml)\n\
    \n5.  通过此链接创建 IAM 用户：\n    [`https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-iam.xhtml`](https://docs.aws.amazon.com/streams/latest/dev/tutorial-stock-data-kplkcl-iam.xhtml)\n\
    \n6.  添加上述示例 Python 笔记本中所示的其余配置步骤，以查看流式数据。\n\n7.  尝试以下“拓展”练习：\n    1.  数据开始流式传输后，在\
    \ AWS CloudWatch 中查看指标。\n    2.  尝试让 DynamoDB 消费数据。\n    3.  修改代码，通过 API 接入 Yahoo\
    \ / Quandl 上的实时股票价格数据。\n\n## 数据管道编排 – 最佳实践\n\n在本章的动手实验中，我们到目前为止已经探讨了建立与天气数据的实时连接，利用云工具（AWS\
    \ Data Pipeline）将数据从源端推送到目标端（DynamoDB 到 S3 存储桶），以及使用 `boto3`（AWS）库在 Python 中查看通过\
    \ Kinesis 的数据流。\n\n本章的总结部分将更深入地探讨将数据流入和流出 AI 应用的最佳实践，并基于这些动手实验，研究如何最佳地构建依赖于 OLTP\
    \ 或 OLAP 数据（或两者混合）的 AI 解决方案架构。\n\n### 存储考量\n\n在 AI 项目启动时，存储考量应列入优先考虑清单。我们能否仅使用简单的数据库或数据集市，还是需要（如同大多数企业项目一样）与数据仓库或数据湖进行集成？\n\
    \n成本始终很重要，灵活性与敏捷性也同样重要，尤其是在处理非结构化数据源时。在这两种情况下，数据湖通常是首选方案，但数据仓库公司正在改善消费者云体验，并使其更容易以极低的管理开销来试用、购买和扩展数据仓库。\n\
    \n如果安全性是优先考虑因素，AI 项目可能倾向于与具有成熟安全模型的传统数据仓库集成。数据仓库在支持机器学习和 AI 方面也可能更有优势——通常它们对最新数据的“读取”速度比数据湖更快。数据仓库还能减少数据重复，通过模式覆盖提高数据质量，适配可复用的特性和功能，并且在预自动化转换方面表现更佳。\n\
    \n数据科学家百分之八十的工作在于数据准备和数据整理，因此目标“最终用户”会极大地影响方法选择——如果研究与探索性数据分析更符合公司愿景，那么数据湖将为数据挖掘提供更广阔的范围；而如果自动化与解释性数据分析是关键，那么集成应尽可能针对精简的数据库或数据集市。\n"
- fmt: "### Data Ingestion Schedules\n\nAfter deciding on a data store, effective\
    \ data ingestion should follow a process of:\n\n- Prioritizing data sources\n\
    - Validating individual files\n- Routing data items to the correct destination\n\
    \nAs described in section 2 above, documenting the parameters for Data Ingestion\
    \ helps to inform the process and continual improvement:\n\n- **Data velocity**\
    \ – how often is the source data updated?\n- **Data size** – what is the storage\
    \ size of each relative data source?\n- **Data frequency** – how frequently do\
    \ we NEED to access the data? Can we do a batch/analytical upload or should it\
    \ be streamed/real time?\n- **Data format** – is all the data structured/in tabular\
    \ format or do we have semistructured (`.json`, `.css`, etc.) or unstructured\
    \ (images, audios, videos)?\n\nA rigorous take on the above can lead to a more\
    \ performant data ingestion process and accessible data lake similar to that used\
    \ at Just Eat (using Apache Airflow) through the Ingestion, Transformation, Learn,\
    \ Egress, and Orchestration cycle.\n\n### Serverless Computing\n\nOne of the most\
    \ popular serverless components on cloud is AWS Lambda. Lambda’s event-driven,\
    \ serverless compute architecture allows end users to focus more time on rapidly\
    \ building data and analytics pipelines by virtue of its independence from infrastructure\
    \ management and a pay-per-use pricing model.\n\nWhile a source and sink data\
    \ store are obviously not isolated from this process, serverless computing can\
    \ simplify the often complex alert-driven events configured for data ingestion.\n\
    \n### End-of-day Processes\n\nMany corporate companies undertake end-of-day processes\
    \ (EOD). Particularly in banking and retail sectors, for example, outbound billing\
    \ and reconciling tills after stores have closed, these are crucial operational\
    \ workflows.\n\nTypically an EOD process involves (a) updating, verifying, and\
    \ posting daily sales information and (b) aggregation of raw transactions into\
    \ meaningful business data. The automation requirements here coupled with job\
    \ scheduling and workflow automation are ideally suited for batch processing and\
    \ data pipeline orchestration. These automated workflows can involve other (non-daily\
    \ scheduled) batch processing, such as quarterly or annual reporting.\n\n### Data\
    \ Import for Machine and Deep Learning\n\nThe aim of many AI implementation projects\
    \ today is to achieve production-grade AI models and there are some obvious advantages\
    \ in automating the entire data ingestion process/data pipeline through an EOD\
    \ overnight batch process:\n\n- Collect data\n- Send it through an enterprise\
    \ message bus\n- Process it (e.g., re-train a model) to provide precalculated\
    \ results\n- Provide guidance for next day’s operations\n\nHowever, the above\
    \ process doesn’t fully capture requirements for ML/DL applications, because features\
    \ and predictions are time-sensitive. As examples, Netflix’s recommendation engines,\
    \ Uber’s arrival time estimation, LinkedIn’s connections suggestions, Airbnb’s\
    \ search engines all require training, or at least inference (predictions) in\
    \ real time.\n\nData Ingestion for ML/DL needs to consider both online model analytics\
    \ (real time, operational decision making) and offline data discovery (learning\
    \ and analysis on historical aggregated data) as shown in Figure [3-11](#527966_1_En_3_Chapter.xhtml#Fig11).\n\
    \n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig11_HTML.jpg)\n\nA block diagram\
    \ with 2 flows. Flow 1: stream data to feature engineering. Flow 2: batch data\
    \ to feature engineering to training or evaluation. These flows merge into deployed\
    \ model. Then it leads to scoring.\n\n**Figure 3-11**\n\n[`towardsdatascience.com`](http://towardsdatascience.com)\n\
    \n### Building a Delivery Pipeline\n\nSo how do we best build a data pipeline?\
    \ Every project is different, but we can use best endeavors at the start to guide\
    \ us on the right path.\n\nWe end this section and this chapter by breaking the\
    \ orchestration process down into a documented approach:\n\n**Establish the business\
    \ context** – building new analytics pipelines in traditional analytics architectures\
    \ typically requires extensive coordination across business, data engineering,\
    \ and Data Science and analytics teams to first negotiate requirements, schema,\
    \ infrastructure capacity needs, and workload management\n\n**Define the specific\
    \ problem** – business users, Data Scientists, and analysts are demanding easy,\
    \ frictionless, self-service options to build end-to-end data pipelines because\
    \ it’s hard and inefficient to predefine constantly changing schemas and spend\
    \ time negotiating capacity slots\n\n**Look for a “frictionless” solution** –\
    \ for example, a serverless data lake architecture enables agile and self-service\
    \ data onboarding and analytics for all data consumer roles across a company on\
    \ shared infrastructure\n\n**Write a detailed solution** – it’s helpful to consider\
    \ data lake–centric analytics architectures as a stack of six logical layers,\
    \ each of which has multiple components:\n\n- Ingestion\n- Storage with three\
    \ separate “zones”\n  - Raw zone\n  - Cleaned\n  - Curated\n- Cataloging and search\
    \ layer\n- Processing layer\n- Consumption layer\n- Security and governance layer\n\
    \nAs there is no “one size fits all,” we show below four examples of robust data\
    \ ingestion architectures and pipelines built to better service, speed-up, and\
    \ scale AI and analytics solutions.\n\n#### Example: XenonStack\n\nXenonStack’s\
    \ Big Data Ingestion Architecture consists of six key layers: Ingestion, Collector,\
    \ Processing, Storage, Query, and Visualization.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig12_HTML.jpg)\n\
    \nA xenon stack big data ingestion architecture consists of 6 different layers:\
    \ data visualization, data query, data processing, data storage, data collector,\
    \ and data ingestion layers.\n\n**Figure 3-12** – XenonStack Big Data Ingestion\
    \ Architecture\n\n#### Example: Red Hat/IBM\n\nRed Hat’s Ingest Data Pipeline\
    \ with object storage and Kafka streaming.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig13_HTML.jpg)\n\
    \nAn architecture pattern exhibits the process, technology, and products of red\
    \ hat data pipeline ingestion. The process includes object ingestion, storage,\
    \ process and transformation, and consumption.\n\n**Figure 3-13** – Red Hat Data\
    \ Pipeline Ingestion\n\n#### Example: AWS Serverless Architecture\n\nAWS Serverless\
    \ Architecture – Lambda is the key (serverless) component but interfaces to AWS\
    \ Glue for running large workloads with Scala or Python. A larger Architecture\
    \ Diagram for generic Data Ingestion on AWS is also shown underneath this one,\
    \ involving a more expansive provisioning of AWS resources.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig15_HTML.jpg)\n\
    \nAn AWS architecture for data ingestion. The process involves 5 phases. 1. Ingestion.\
    \ 2. Storage and processing. 3. Cataloging, governance, and search. 4. Consumption.\
    \ 5. Security and monitoring.\n\n**Figure 3-15** – AWS Data Ingestion\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig14_HTML.jpg)\n\
    \nAn AWS serverless architecture considers Lambda as the key component for data\
    \ ingestion. The process involves third-party data, cookie cutter AWS batch template,\
    \ and batch-input S3 bucket among others.\n\n**Figure 3-14** – AWS Serverless\
    \ (Lambda) Architecture for Data Ingestion\n\n#### Example: Databricks with Apache\
    \ Spark\n\nThis Databricks example shows how both Apache Kafka and Spark interface\
    \ for streaming analytics and AI/BI reporting. Databricks with Apache Spark is\
    \ the subject of our final hands-on lab in this chapter.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig16_HTML.jpg)\n\
    \nAn example of Databricks. The process involves partitioning, reprocessing, updating\
    \ and merging, validation, streaming analytics, and AI and reporting of Kafka,\
    \ data lake, and Spark.\n\n**Figure 3-16** – Databricks with Apache Spark"
  raw: "### Data Ingestion Schedules\n\nAfter deciding on a data store, effective\
    \ data ingestion should follow a process of\n\n*   Prioritizing data sources\n\
    \n*   Validating individual files\n\n*   Routing data items to the correct destination\n\
    \nAs described in section 2 above, documenting the parameters for Data Ingestion\
    \ helps to inform the process and continual improvement:\n\n*   **Data velocity**\
    \ – how often is the source data updated?\n\n*   **Data size** – what is the storage\
    \ size of each relative data source?\n\n*   **Data frequency** –how frequently\
    \ do we NEED to access the data? Can we do a batch/analytical upload or should\
    \ it be streamed/real time?\n\n*   **Data format** – is all the data structured/in\
    \ tabular format or do we have semistructured (.json, .css, etc.) or unstructured\
    \ (images, audios, videos)?\n\nA rigorous take on the above can lead to a more\
    \ performant data ingestion process and accessible data lake similar to that used\
    \ at Just Eat (using Apache Airflow) through the Ingestion, Transformation, Learn,\
    \ Egress, and Orchestration cycle.\n\n#### Serverless Computing\n\nOne of the\
    \ most popular serverless components on cloud is AWS Lambda. Lambda’s event-driven,\
    \ serverless compute architecture allows end users to focus more time on rapidly\
    \ building data and analytics pipelines by virtue of its independence from infrastructure\
    \ management and a pay-per-use pricing model.\n\nWhile a source and sink data\
    \ store are obviously not isolated from this process, serverless computing can\
    \ simplify the often complex alert-driven events configured for data ingestion.\n\
    \n#### End-of-day Processes\n\nMany corporate companies undertake end-of-day processes\
    \ (EOD). Particularly in banking and retail sectors, for example, outbound billing\
    \ and reconciling tills after stores have closed, these are crucial operational\
    \ workflows.\n\nTypically an EOD process involves (a) updating, verifying, and\
    \ posting daily sales information and (b) aggregation of raw transactions into\
    \ meaningful business data. The automation requirements here coupled with job\
    \ scheduling and workflow automation are ideally suited for batch processing and\
    \ data pipeline orchestration. These automated workflows can involve other (non-daily\
    \ scheduled) batch processing, such as quarterly or annual reporting.\n\n####\
    \ Data Import for Machine and Deep Learning\n\nThe aim of many AI implementation\
    \ projects today is to achieve production-grade AI models and there are some obvious\
    \ advantages in automating the entire data ingestion process/data pipeline through\
    \ an EOD overnight batch process:\n\n*   Collect data\n\n*   Send it through an\
    \ enterprise message bus\n\n*   Process it (e.g., re-train a model) to provide\
    \ precalculated results\n\n*   Provide guidance for next day’s operations\n\n\
    However, the above process doesn’t fully capture requirements for ML/DL applications,\
    \ because features and predictions are time-sensitive. As examples, Netflix’s\
    \ recommendation engines, Uber’s arrival time estimation, LinkedIn’s connections\
    \ suggestions, Airbnb’s search engines all require training, or at least inference\
    \ (predictions) in real time.\n\nData Ingestion for ML/DL needs to consider both\
    \ online model analytics (real time, operational decision making) and offline\
    \ data discovery (learning and analysis on historical aggregated data) as shown\
    \ in Figure [3-11](#527966_1_En_3_Chapter.xhtml#Fig11).\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig11_HTML.jpg)\n\
    \nA block diagram with 2 flows. Flow 1: stream data to feature engineering. Flow\
    \ 2: batch data to feature engineering to training or evaluation. These flows\
    \ merge into deployed model. Then it leads to scoring.\n\nFigure 3-11\n\n[`towardsdatascience.com`](http://towardsdatascience.com)\n\
    \n### Building a Delivery Pipeline\n\nSo how do we best build a data pipeline?\
    \ Every project is different, but we can use best endeavors at the start to guide\
    \ us on the right path.\n\nWe end this section and this chapter by breaking the\
    \ orchestration process down into a documented approach:\n\n**Establish the business\
    \ context** – building new analytics pipelines in traditional analytics architectures\
    \ typically requires extensive coordination across business, data engineering,\
    \ and Data Science and analytics teams to first negotiate requirements, schema,\
    \ infrastructure capacity needs, and workload management\n\n**Define the specific\
    \ problem** – business users, Data Scientists, and analysts are demanding easy,\
    \ frictionless, self-service options to build end-to-end data pipelines because\
    \ it’s hard and inefficient to predefine constantly changing schemas and spend\
    \ time negotiating capacity slots\n\n**Look for a “frictionless” solution –**\
    \ for example, a serverless data lake architecture enables agile and self-service\
    \ data onboarding and analytics for all data consumer roles across a company on\
    \ shared infrastructure\n\n**Write a detailed solution –** it’s helpful to consider\
    \ data lake–centric analytics architectures as a stack of six logical layers,\
    \ each of which has multiple components:\n\n*   Ingestion\n\n*   Storage with\
    \ three separate “zones”\n    *   Raw zone\n\n    *   Cleaned\n\n    *   Curated\n\
    \n*   Cataloging and search layer\n\n*   Processing layer\n\n*   Consumption layer\n\
    \n*   Security and governance layer\n\nAs there is no “one size fits all,” we\
    \ show below four examples of robust data ingestion architectures and pipelines\
    \ built to better service, speed-up, and scale AI and analytics solutions.\n\n\
    #### Example: XenonStack\n\nXenonStack’s Big Data Ingestion Architecture consists\
    \ of six key layers: Ingestion, Collector, Processing, Storage, Query, and Visualization.\n\
    \n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig12_HTML.jpg)\n\nA xenon stack\
    \ big data ingestion architecture consists of 6 different layers: data visualization,\
    \ data query, data processing, data storage, data collector, and data ingestion\
    \ layers.\n\nFigure 3-12\n\nXenonStack Big Data Ingestion Architecture\n\n####\
    \ Example: Red Hat/IBM\n\nRed Hat’s Ingest Data Pipeline with object storage and\
    \ Kafka streaming.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig13_HTML.jpg)\n\
    \nAn architecture pattern exhibits the process, technology, and products of red\
    \ hat data pipeline ingestion. The process includes object ingestion, storage,\
    \ process and transformation, and consumption.\n\nFigure 3-13\n\nRed Hat Data\
    \ Pipeline Ingestion\n\n#### Example: AWS Serverless Architecture\n\nAWS Serverless\
    \ Architecture – Lambda is the key (serverless) component but interfaces to AWS\
    \ Glue for running large workloads with Scala or Python. A larger Architecture\
    \ Diagram for generic Data Ingestion on AWS is also shown underneath this one,\
    \ involving a more expansive provisioning of AWS resources.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig15_HTML.jpg)\n\
    \nAn A W S architecture for data ingestion. The process involves 5 phases. 1\\\
    . Ingestion. 2\\. Storage and processing. 3\\. Cataloging, governance, and search.\
    \ 4\\. Consumption. 5\\. Security and monitoring.\n\nFigure 3-15\n\nAWS Data Ingestion\n\
    \n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig14_HTML.jpg)\n\nAn A W S serverless\
    \ architecture considers lambda as the key component for data ingestion. The process\
    \ involves third-party data, cookie cutter A W S batch template, and batch-input\
    \ S3 bucket among others.\n\nFigure 3-14\n\nAWS Serverless (Lambda) Architecture\
    \ for Data Ingestion\n\n#### Example: Databricks with Apache Spark\n\nThis Databricks\
    \ example shows how both Apache Kafka and Spark interface for streaming analytics\
    \ and AI/BI reporting. Databricks with Apache Spark is the subject of our final\
    \ hands-on lab in this chapter.\n\n![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig16_HTML.jpg)\n\
    \nAn example of Databricks. The process involves partitioning, reprocessing, updating\
    \ and merging, validation, streaming analytics, and A I and reporting of Kafka,\
    \ data lake, and spark.\n\nFigure 3-16\n\nDatabricks with Apache Spark"
  trans: "\n### 数据摄取调度\n\n在确定数据存储方案后，有效的数据摄取应遵循以下流程：\n\n- 确定数据源的优先级\n- 验证单个文件\n- 将数据项路由到正确的目标位置\n\
    \n如上述第 2 节所述，记录数据摄取的参数有助于指导流程和持续改进：\n\n- **数据速度** – 源数据的更新频率是多少？\n- **数据规模** –\
    \ 每个相关数据源的存储容量有多大？\n- **数据频率** – 我们需要以多高的频率访问数据？是采用批量/分析上传，还是应该采用流式/实时方式？\n- **数据格式**\
    \ – 所有数据都是结构化/表格格式，还是包含半结构化数据（`.json`、`.css`等）或非结构化数据（图像、音频、视频）？\n\n对上述要点进行严格考量，可以构建出性能更优的数据摄取流程和更易访问的数据湖，类似于\
    \ Just Eat 公司（使用 Apache Airflow）通过摄取、转换、学习、输出和编排周期所采用的方案。\n\n### 无服务器计算\n\n云上最流行的无服务器组件之一是\
    \ AWS Lambda。Lambda 的事件驱动型无服务器计算架构，因其无需管理基础设施且采用按使用量付费的定价模式，使得最终用户能够将更多时间专注于快速构建数据和管道分析。\n\
    \n虽然源端和目标端数据存储显然无法与此流程完全隔离，但无服务器计算可以简化通常为数据摄取配置的复杂告警驱动事件。\n\n### 日终处理\n\n许多企业公司都会执行日终处理（EOD）。特别是在银行和零售行业，例如，门店打烊后的对外开票和收银对账，这些都是关键的业务工作流。\n\
    \n典型的 EOD 流程包括：(a) 更新、验证和过账每日销售信息，以及 (b) 将原始交易聚合为有意义的业务数据。这里的自动化需求，结合作业调度和工作流自动化，非常适合批量处理和数据处理管道编排。这些自动化工作流可能涉及其他（非每日调度的）批量处理，例如季度或年度报告。\n\
    \n### 机器学习和深度学习的数据导入\n\n当今许多 AI 实施项目的目标是实现生产级 AI 模型，通过 EOD 夜间批量处理来自动化整个数据摄取流程/数据管道，具有一些明显的优势：\n\
    \n- 收集数据\n- 通过企业消息总线发送数据\n- 处理数据（例如，重新训练模型）以提供预计算结果\n- 为第二天的运营提供指导\n\n然而，上述流程并未完全满足机器学习/深度学习应用的需求，因为特征和预测具有时间敏感性。例如，Netflix\
    \ 的推荐引擎、Uber 的到达时间估算、LinkedIn 的好友推荐、Airbnb 的搜索引擎，都需要实时训练，或至少是实时推理（预测）。\n\n机器学习和深度学习的数据摄取需要考虑在线模型分析（实时、运营决策）和离线数据发现（对历史聚合数据进行学习和分析），如图\
    \ 3-11 所示。\n\n![](img/527966_1_En_3_Fig11_HTML.jpg)\n\n一个包含两条流程的框图。流程 1：将流数据发送至特征工程。流程\
    \ 2：将批量数据发送至特征工程，再进行训练或评估。这些流程汇合到已部署的模型中，然后进入评分环节。\n\n**图 3-11**\n\n[`towardsdatascience.com`](http://towardsdatascience.com)\n\
    \n### 构建交付管道\n\n那么，我们如何最好地构建数据管道呢？每个项目都不同，但我们可以从一开始就尽最大努力，引导我们走上正确的道路。\n\n我们通过将编排流程分解为一种文档化的方法来结束本节和本章：\n\
    \n**确立业务背景** – 在传统分析架构中构建新的分析管道，通常需要业务、数据工程、数据科学和分析团队之间进行广泛的协调，首先协商需求、模式、基础设施容量需求和工作负载管理。\n\
    \n**定义具体问题** – 业务用户、数据科学家和分析师需要简单、无摩擦、自助式的选项来构建端到端的数据管道，因为预定义不断变化的模式并花时间协商容量槽位既困难又低效。\n\
    \n**寻找“无摩擦”解决方案** – 例如，无服务器数据湖架构能够在共享基础设施上，为公司内所有数据消费者角色提供敏捷且自助式的数据接入和分析服务。\n\n\
    **编写详细解决方案** – 将数据湖中心的分析架构视为由六个逻辑层组成的堆栈会很有帮助，每一层都有多个组件：\n\n- 摄取层\n- 存储层（包含三个独立的“区域”）\n\
    \  - 原始区域\n  - 清洗区域\n  - 精选区域\n- 编目与搜索层\n- 处理层\n- 消费层\n- 安全与治理层\n\n由于没有“万能方案”，我们在下面展示了四个健壮的数据摄取架构和管道的示例，这些架构和管道旨在更好地服务、加速和扩展\
    \ AI 与分析解决方案。\n\n#### 示例：XenonStack\n\nXenonStack 的大数据摄取架构包含六个关键层：摄取层、收集层、处理层、存储层、查询层和可视化层。\n\
    \n![](img/527966_1_En_3_Fig12_HTML.jpg)\n\n一个 XenonStack 大数据摄取架构包含 6 个不同的层：数据可视化层、数据查询层、数据处理层、数据存储层、数据收集层和数据摄取层。\n\
    \n**图 3-12** – XenonStack 大数据摄取架构\n\n#### 示例：Red Hat/IBM\n\nRed Hat 的摄取数据管道，结合了对象存储和\
    \ Kafka 流处理。\n\n![](img/527966_1_En_3_Fig13_HTML.jpg)\n\n一个架构模式展示了 Red Hat 数据管道摄取的流程、技术和产品。该流程包括对象摄取、存储、处理与转换，以及消费。\n\
    \n**图 3-13** – Red Hat 数据管道摄取\n\n#### 示例：AWS 无服务器架构\n\nAWS 无服务器架构 – Lambda 是关键（无服务器）组件，但通过接口与\
    \ AWS Glue 连接，以使用 Scala 或 Python 运行大型工作负载。下方还展示了一个更通用的 AWS 数据摄取架构图，其中涉及更广泛的 AWS\
    \ 资源配置。\n\n![](img/527966_1_En_3_Fig15_HTML.jpg)\n\n一个用于数据摄取的 AWS 架构。该流程包含 5 个阶段：1.\
    \ 摄取；2. 存储与处理；3. 编目、治理与搜索；4. 消费；5. 安全与监控。\n\n**图 3-15** – AWS 数据摄取\n\n![](img/527966_1_En_3_Fig14_HTML.jpg)\n\
    \n一个 AWS 无服务器架构将 Lambda 视为数据摄取的关键组件。该流程涉及第三方数据、cookie cutter AWS 批量模板、批量输入 S3\
    \ 存储桶等。\n\n**图 3-14** – 用于数据摄取的 AWS 无服务器（Lambda）架构\n\n#### 示例：Databricks 与 Apache\
    \ Spark\n\n这个 Databricks 示例展示了 Apache Kafka 和 Spark 如何协同进行流式分析以及 AI/BI 报告。Databricks\
    \ 与 Apache Spark 是本章最后一个动手实验的主题。\n\n![](img/527966_1_En_3_Fig16_HTML.jpg)\n\n\
    一个 Databricks 示例。该流程涉及 Kafka、数据湖和 Spark 的分区、重新处理、更新与合并、验证、流式分析以及 AI 与报告。\n\n**图\
    \ 3-16** – Databricks 与 Apache Spark\n"
- fmt: '### Example: Snowflake Workload Management


    Finally, Figure [3-17](#527966_1_En_3_Chapter.xhtml#Fig17) shows Snowflake’s architecture
    designed to ensure data pipeline performance is aligned with workload management
    and competition of resources across a corporate environment:


    ![](images/527966_1_En_3_Chapter/527966_1_En_3_Fig17_HTML.jpg)


    A Snowflake workload management architecture. It has the following attributes:
    elastic, continuous, isolated resources, highly available. It involves 3 phases:
    batch, streaming, and BI or analytics interacting with data warehouse through
    pipeline.


    **Figure 3-17** Snowflake workload management


    ### Data Pipeline Orchestration: Hands-on Practice


    So with these well-architected data pipelines in mind, our final hands-on lab
    below takes a look at how to implement one ourselves, leveraging one of the industry-leading
    tools for Big Data Processing to scale our AI solution.


    **DATABRICKS WITH APACHE SPARK**


    The goal of this exercise is to leverage Apache Spark’s^([^(47)](#fn47)) Big Data
    Processing capability to run regional and product level forecasts with `fbprophet`
    – a common use case for a global multinational and currently run by Starbucks.


    1.  Databricks sign up – sign up to Databricks Community Edition (DCE), login,
    and spin up a cluster

    2.  Import notebook by pasting into a browser: [`https://databricks.com/wp-content/uploads/notebooks/fine-grained-demand-forecasting-spark-3.xhtml`](https://databricks.com/wp-content/uploads/notebooks/fine-grained-demand-forecasting-spark-3.xhtml),
    selecting “Import Notebook” and copy url

    3.  Attach to cluster and import libraries

    4.  Download the data by going to [`www.kaggle.com/c/demand-forecasting-kernels-only/data`](http://www.kaggle.com/c/demand-forecasting-kernels-only/data).
    Scroll down and select “download all” (you should accept Kaggle competition rules)
    and unzip the `train.csv` file

    5.  Import Data to Databricks Filing System (DBFS) – enable admin rights in the
    Databricks console

    6.  Run the baseline forecast with `fbprophet` in the notebook as described

    7.  Using a Data Pipeline, leverage Apache Spark to scale the forecast to every
    store and item combination


    ## Wrap-up


    Our last lab brings to an end this chapter where we have introduced Data Ingestion
    in the context of AIaaS, looking at the challenges today in dealing with the deluge
    of data available to companies, how to store this data, how to process the data
    using cloud services, and how to orchestrate the various different data sources,
    ideally through a seamless, automated data pipeline.


    Our next chapter takes a whistle-stop tour through Machine Learning. As most of
    the core concepts should already be known to the reader, our main interest is
    on machine learning as a bridge to a more in-depth look at Deep Learning (in the
    subsequent chapter). However, we will also lay out a best practice roadmap for
    successfully implementing Machine Learning, covering critical data wrangling,
    training, testing, benchmarking, implementing, and deployment phases.


    Footnotes [1](#527966_1_En_3_Chapter.xhtml#Fn1_source) [2](#527966_1_En_3_Chapter.xhtml#Fn2_source)
    [3](#527966_1_En_3_Chapter.xhtml#Fn3_source) [4](#527966_1_En_3_Chapter.xhtml#Fn4_source)
    [5](#527966_1_En_3_Chapter.xhtml#Fn5_source) [6](#527966_1_En_3_Chapter.xhtml#Fn6_source)


    # 4. Machine Learning on Cloud


    In terms of (Gartner) Hype Cycle transitions, Machine Learning has long since
    passed its “peak of inflated expectations,” but it remains the core AI technique
    in use in most businesses and organizations today.


    Before embarking on an extended look at Deep Learning, we carry out in this chapter
    a quick refresher on Machine Learning with reference to applications on cloud.
    As mentioned in Chapter [1](#527966_1_En_1_Chapter.xhtml), it is expected readers
    have some grounding in Machine Learning already, so will assume a basic understanding
    of supervised and unsupervised machine learning exists.


    As such this fourth chapter is an accelerated run through of the mechanics of
    Machine Learning, covering critical processes from Data Import through EDA and
    Data Wrangling (cleaning, encoding, normalizing, and scaling) as well as the model
    training process. We will look at both unsupervised (clustering) techniques and
    supervised classification and regression as well as time series approaches before
    interpreting results and comparing performance across multiple algorithms.


    We wrap up with the inference process and deploying a model to cloud. Following
    a more expansive look at Neural Networks and Deep Learning in AI in the next chapter,
    we will revisit machine learning again in Chapter [6](#527966_1_En_6_Chapter.xhtml),
    specifically usage of increasingly important NoLo code UIs and AutoML tools for
    AI: Azure Machine Learning and IBM Cloud Pak for Data.


    ## ML Fundamentals


    As mentioned in Chapter [1](#527966_1_En_1_Chapter.xhtml), Machine Learning is
    a technique enabling computers to make inferences from complex data. High-level
    definitions for the main types are given below, focused on the inherent difference
    between these machine learning approaches:


    **Supervised** – training on data points where the desired “target” or labeled
    output is known


    **Unsupervised** – no labeled outputs available but machine learning is used to
    identify patterns in data


    **Semisupervised** – an initial unsupervised ML approach applied to a large amount
    of unlabeled data followed by supervised machine learning on labeled data


    **Reinforcement learning** – training a machine learning model by maximizing a
    reward/score


    ## Supervised Machine Learning


    At a basic level, there are two types of Machine Learning: Supervised and Unsupervised
    Machine Learning. Reinforcement Learning is sometimes considered a third type,
    although can equally be considered a type of Unsupervised Learning.


    ### Classification and Regression


    What distinguishes Supervised Machine Learning from Unsupervised Machine Learning
    is the prevalence of “labeled” or “ground truth” data, that is, a specific target
    field or variable that we wish to train a model to predict.


    There are two main types of Supervised Machine Learning:^([^(48)](#fn48)) classification
    and regression. Whereas the label or target variable in classification is discrete
    (usually binary, but sometimes multiclass), the label in a Supervised Regression
    problem is continuous. The objective of supervised classification is to find a
    decision boundary which splits the (training/test) dataset into separate “classes”
    while for supervised regression the aim is to find a “best-fit” line through the
    data – a straight line for linear regression or a curve for nonlinear regression
    as shown in Figure [4-1](#527966_1_En_4_Chapter.xhtml#Fig1).


    ![](images/527966_1_En_4_Chapter/527966_1_En_4_Fig1_HTML.jpg)


    A representation exhibits the two types of machine learning algorithms. Supervised
    classification and regression are represented on the left and right sides.


    **Figure 4-1** Supervised classification vs. regression


    A key industry machine learning application using a classification technique is
    determining whether a customer is likely to churn (or not), while forecasting
    customer revenue is an example of a regression technique. In both of these cases,
    the **features** used to predict or forecast the target variable are typically
    customer attributes, normally both transactional and demographic but can also
    include behavioral or attitudinal data such as time spent on a web page or sentiment
    from social media engagement.'
