  trans: '

    # AI 驱动解决方案的质量保证


    AI 模型可以支持一次性的战略（管理）决策，也可以优化和改进重复性的运营流程。对于后者而言，仅有优秀的模型是不够的。它必须作为 AI 驱动软件解决方案的一部分来运作。因此，质量保证必须涵盖三个领域：


    1.  测试不含 AI 组件的软件解决方案。图形用户界面是否正常工作？计算结果是否正确？

    2.  AI 模型的质量保证。预测和分类模型是否有效？

    3.  验证 AI 模型与软件解决方案的集成。


    第一点涉及标准的软件测试。所有功能是否都按照规范正确实现？时尚商店应用中的购物车功能和支付流程是否正常？应用是否会崩溃？IT 文献广泛涵盖了测试内容。公司拥有标准和指南，并建立了由经验丰富的测试人员和测试经理组成的测试组织。因此，可以假设第一点几乎在任何地方都已得到解决，而前面的页面涵盖了第二点，即
    AI 模型的质量保证。这最后一部分将聚焦于第三方面：将 AI 模型集成并耦合到完整软件解决方案中时特有的潜在问题。我们有时尚应用，也有一个向顾客推荐商品的
    AI 模型——它们能否协同工作？


    集成的质量保证和测试措施取决于所选的集成模式。前一章介绍了三种主要模式。第一种也是最简单的是**预计算**。这种模式不需要 AI 组件与软件解决方案之间进行任何技术集成。相反，数据科学家或
    IT 运维专家将最新数据（例如时尚应用客户的购物历史）输入 AI 模型。然后，AI 模型为每位客户单独预测其最可能购买的时尚单品。这些结果被写入一个 CSV
    或 Excel 文件。数据科学家或 IT 运维专家将该文件上传到，例如，CRM 工具中。CRM 工具向客户发送个性化的推送消息。这些消息旨在激发客户的好奇心，去查看（并购买）推荐的商品。


    集成本身不需要任何测试，只需验证生成的文件是否符合 CRM 工具的格式要求。由于这是一个手动过程，清单或四眼原则可以降低运营风险，尤其是对于重复性流程。


    第二种集成模式是**模型（重新）实现**。数据科学家提供模型，例如用 Python 或 R 语言编写。然后，实际软件解决方案的开发者接手。他们直接添加代码，或者用
    Java 或 C#重新编写相同的逻辑。该模型成为软件解决方案源代码的一部分。这种模式需要专门的测试用例来解决两个问题。


    第一个问题涉及*重新实现中的错误*。用不同语言重新编码代码片段存在调用函数时混淆参数的风险。此外，忽略或忘记重新实现单行代码以及混淆变量名也是风险。使用样本输入/输出数据对的测试用例可以应对这种风险。例如，基于特定狗图像的测试用例。假设在
    AI 模型训练环境中输出分类值为`0.857`。那么，软件解决方案中重新实现的 AI 模型必须产生完全相同的结果。


    此外，在复制神经网络时，对配置、元数据和权重参数进行校验和检查也很有帮助。所有参数值的总和（一个语义上无关的数字）必须相同。更高级的指标可以检测到参数值互换或行交换。


    第二个问题涉及实际的连接或*接口*，特别是参数的使用。第一个参数是最后购买的产品 ID 还是数量——或者顺序是相反的？`1` 表示图像包含狗，还是 `0`
    代表狗的信息？简单的错误会导致软件解决方案毫无用处，并损害，例如，时尚商店应用的客户体验和销售数字。AI 项目经理应再次确认软件解决方案的测试人员是否也处理了这些质量风险。


    第三种集成选项是**AI 运行时服务器**，例如 RStudio Server。其理念是提供一个服务器，公司内所有 AI 模型都在该服务器上运行。当软件解决方案想要集成一个
    AI 模型时，它会调用 AI 运行时服务器上的特定模型。潜在的测试需求再次涉及服务调用时参数使用是否正确。然后，模型管理变得更加重要。调用或部署的是正确的模型（即狗检测模型），而不是猫的模型？当前使用的模型是基于最新的冬季时尚商品目录，还是两年前的沙滩装时尚目录？在实现这种集成模式时，软件开发者和数据科学家可以完全独立地工作，并且（几乎）无需相互沟通。因此，在这种设置下，检查软件解决方案是否使用正确的参数调用了正确的模型变得更为关键。


    ## 总结


    AI 为许多组织提供了新的优化机会。同时，测试和质量保证也面临新的挑战。混淆矩阵或`R²`值等指标是确定 AI 模型质量的基础。它们是任何就绪性评估的核心。根据训练集、验证集和测试集来衡量
    AI 模型的性能，为模型训练提供了结构，并使 AI 项目经理能够跟踪项目进度。


    与秉持“运行中的系统不要碰”态度的传统软件不同，AI 模型需要监控。几周或几个月后，它们是否仍然适用？还是数据科学家需要训练一个新的、改进的版本？然而，任何令人信服的
    AI 模型的关键在于正确的训练数据。AI 项目不仅要重视数据数量，还要重视数据质量。


    当然，还存在其他类似非功能性需求的必要条件，例如监管需求、伦理或可解释性。我们将在下一章中涵盖这些质量方面。


    # 伦理、法规与可解释性


    大型科技公司、创新型初创企业以及利用 IT 创新优势的公司的自由放任时代即将结束——在 AI 领域也是如此。政策制定者多年来一直在讨论监管问题。但现在，他们正在采取行动。AI
    组织和公司必须自问——出于伦理原因——他们是否应该创建正在开发的 AI 模型，以及他们的项目是否合法。他们不能再仅仅专注于开发卓越的 AI 模型、验证其质量，而忽略其他一切。


    虽然 AI 伦理听起来像是一个象牙塔般的话题，但事实并非如此。首先，大多数公司都害怕负面新闻和公众的愤怒。他们避免声誉风险，尤其是在一些专家在没有明确业务需求或明显收益的情况下玩弄技术时。其次，AI
    法规正在变化之中。今天的 AI 伦理讨论是明天 AI 监管需求的来源。这些讨论使 AI 组织能够预测监管机构接下来可能会要求什么。不需要预言家也能预见，AI
    监管将成为 2020 年代的主导话题。


    因此，本章将讨论监管和伦理话题。第三个话题——可解释性——是对这两个话题的补充。它是一个概念或一种 AI 模型属性，有助于满足特定的 AI 伦理和监管要求。

    '
- fmt: '# AI Ethics


    Suppose you want to buy a new apartment. You ask your bank for a mortgage. They
    decline. The banker tells you their AI calculated a 75% probability that you get
    divorced within the next two years. So, no mortgage for you. Would you consider
    this prediction as ethically adequate? In more than a decade working with Swiss
    banks, I learned that the big pink elephant in the room is the divorce risk. No
    banker talks about the topic – especially not with customers – though rumors are
    clear: divorces are the most crucial reason for mortgage problems. It is a big
    dilemma for banks. Like most other companies, organizations, and corporations,
    banks aim to be seen as reasonable and responsible, not as the source of family
    disputes or escalating relationship problems. Most companies have higher ethical
    standards than “Don’t be evil.” These pledges have implications for their AI organizations.
    They have to be aware of three potential areas where ethical questions might interfere
    with their daily work and long-term business or IT architectural ambitions.


    ## The Three Areas of Ethical Risks


    Ethical risks for AI fall into three categories (Figure [4-1](#516372_1_En_4_Chapter.xhtml#Fig1)):
    unethical use cases, unethical engineering practices, and unethical AI models.


    **Unethical use cases** such as calculating divorce probabilities are not AI topics.
    They are business strategy decisions. Data scientists can and should require a
    clear judgment on whether a use case is acceptable or not. This judgment is with
    the business, not with the IT or AI side of an organization.


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig1_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig1_HTML.png)


    Figure 4-1


    A Lifecycle Perspective on Ethical Questions in AI


    **Ethics in engineering** relates to the development and maintenance process.
    For example, Apple contractors listened to and transcribed Siri users’ conversations
    enabling Apple to improve Siri’s AI capabilities. This engineering and product
    improvement approach resulted in a public outcry since society sees the approach
    as an invasion of the users’ privacy.


    Finally, the **ethical** questions related to the **AI model** and its implications
    for customers, society, and humans are the true core of any AI ethics discourse.
    When algorithms decide who gets the first Covid vaccination and governments outsource
    the AI model development to a controversial IT service provider, AI decides about
    life and death – and AI ethics is no longer an ivory tower topic.


    ## Handling Ethical Dilemmas


    Ethical dilemmas are on a different dimension than inconvenient management decisions.
    Should a social media web page post statements of a well-known agitator to attract
    clicks? Should a start-up harvest public domain images on a large scale to save
    money instead of making their own photos? These are inconvenient questions for
    managers, who have to balance ethical behavior and standards vs. profit, loss,
    and risk. However, real ethical dilemmas are more severe. They relate more to
    the AI models themselves. Training an AI model means measuring how good a system
    is. It means quantifying results and optimizing or minimizing loss functions.
    These loss functions are at the core of **ethical dilemmas**, challenging situations
    for which no undisputable choices exist. The classic example is the **trolley
    problem**. Ahead of a trolley are three persons on the track. They cannot move,
    and the trolley cannot stop. There is only one way to stop the trolley from killing
    these three persons: diverting the trolley. As a result, the trolley would not
    kill the persons on the track. It would kill another person that would not have
    been harmed otherwise. What is the most ethical choice? If the “damage” of killing
    someone on the track is “-5”, what should be the penalty for killing an innocent
    person – also “-5” or better “-10”?


    The trolley problem is behind many ethical dilemmas, including autonomous cars
    deciding whether to hit pedestrians or crash into another vehicle. When AI directly
    impacts people’s lives, it is mandatory to understand how data scientists train
    the AI models to choose an action in such challenging situations.


    Data scientists can generally design an AI component dealing with such situations
    in two ways: top-down and bottom-up. In a bottom-up approach, the AI system learns
    by observation. Since ethical dilemmas of this type are pretty rare, it can take
    years or decades until a driver faces such a dilemma – if at all. Luckily, most
    of us never had to decide whether to overrun a baby or a young boy. Observing
    the crowd instead of working with selected training drivers is an option to get
    training data quicker. The disadvantage is also apparent: the crowd also teaches
    bad habits such as speeding or cursing.


    Alternatively, data scientists can follow a top-down approach with ethical guidelines
    guiding through critical situations. The best-known example are Asimov’s laws
    for robots:


    1.  A robot may not injure a human being or allow a human being to come to harm.


    2.  A robot must obey orders given to it by human beings except where such orders
    would conflict with the First Law.


    3.  A robot must protect its own existence as long as such protection does not
    conflict with the First or Second Law.


    Asimov’s laws are intriguing but abstract. They require a translation or interpretation
    for deciding whether a car hits a pedestrian, a cyclist, or a truck when an accident
    is inevitable.


    In practice, however, laws and regulations clearly define acceptable and unacceptable
    actions for many circumstances. If not, it gets tricky. Is the life of a 5-year-old
    boy more important or the life of a 40-year-old mother with three teenage daughters?
    An AI model making a definitive decision on whom to kill is not a driver in a
    stressful situation with an impulse to save his own life. It is an emotionless,
    calculating, and rational AI component that decides and kills. For AI systems,
    society’s expectations are higher than for a human driver. What complicates matters
    are contradicting expectations. In general, society expects autonomous cars to
    minimize the overall harm to humans. There is just one exception: vehicle owners
    want to be protected by their own vehicle, independent of their general love for
    utilitarian ethics when discussing cars in general.


    Implementing top-down ethics in AI systems requires close collaboration of data
    scientists or engineers with ethics specialists. Data scientists build frameworks
    that capture the world, control devices, or combine ethical judgments with the
    AI component’s original aim. It is up to the ethics specialists to decide how
    to quantify the severity of harm and make it comparable – or how to choose an
    option if there are only bad ones. However, the good news for AI specialists is:
    ethical dilemmas are exceptional cases.'
