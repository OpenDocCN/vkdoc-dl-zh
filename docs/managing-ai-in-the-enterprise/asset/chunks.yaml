    sales figures plump due to a not-so-good-anymore AI model.


    A forward-looking AI project manager addresses such uncertainties and obvious
    necessity by implementing monitoring functionality as part of the project. It
    is a paradigm shift compared to the traditional QA approach in IT departments.
    The traditional QA strategy tests rigorously before going live. Afterward, the
    rule is: never touch a running system. AI models need a different approach. They
    might degenerate and become outdated within hours, days, weeks, or months. It
    is often a gradual process, but there are clear, measurable indicators:


    *   A significant change in the input values, for example, changes in the mean
    value or the distribution of input variables. Do shopping baskets contain 80%
    swimwear instead of 80% products of the winter clothing category?


    *   A significant change in the output values ​​of the statistical model. Does
    the distribution of the classification output change, for example, from 30% dog
    pictures to 45%? Will only 20 products be proposed to all customers over one day
    instead of 1000 different products per day previously?


    *   Declining forecast quality: Are 20% fewer customers adding the product proposed
    by the AI component to their shopping cart than a month ago?


    Of course, an application must collect these key figures so that business users
    or data analysts can recognize changes or an automatic alarm is possible.


    An (more complex) alternative to monitoring indicators is retraining the actual
    model from time to time or even every night. A new model is generated with the
    then-current data and compared with the previous model. In the event of significant
    deviations, data scientists replace the older model with the new one. How often
    do you generate a new model for control purposes – and whether you can automate
    this model creation – is ultimately a commercial question.'
  trans: '

    ### 使用验证数据集评估 AI 模型


    当 AI 模型在训练数据上表现良好时，下一步就是使用验证数据集对其进行测试。我们执行与先前评估完全相同的操作，只是数据不同。这次，我们输入的是验证数据集。验证数据是*未*用于训练模型的数据。此评估旨在检测训练数据中的**过拟合**或**高偏差**。其症状是相同的——在训练集上表现良好（例如召回率、精确率、`R²`），但在验证集上表现不佳。


    在**过拟合**的情况下，模型无法很好地泛化。AI 模型反映了样本数据中的所有异常，但未能进行泛化，而这正是对未知数据表现良好所必需的。对于数学基础扎实的人：如果你有一个包含
    1001 个数据点的训练数据集，你可以拟合一个 1000 次多项式作为预测函数。该函数对训练数据完美适用，但在其他任何地方都完全不稳定。图 3-7 (d)
    可视化了这一现象。该曲线能很好地将训练数据中的狗和猫图像分开。然而，区域之间的边界非常不规则，导致模型对与训练图像相似且接近的图像分类结果不同。


    图 3-8 从另一个角度展示了欠拟合/过拟合的挑战。在图的左侧，模型欠拟合且过于简单。模型在训练集和验证集上的误差都很高。当模型变得更复杂时，其性能提升，即训练数据和验证数据的误差下降。当模型进一步复杂化时，训练数据的模型误差越来越低，而验证数据的模型误差却上升了。我们正在对模型进行过拟合。数据科学家面临的挑战是接近最优的模型复杂度，即欠拟合和过拟合之间的临界点。正则化是简化他们工作的一种选择。这意味着在比较模型质量时，对更复杂的模型进行惩罚。


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig8_HTML.png](img/516372_1_En_3_Fig8_HTML.png)


    图 3-8


    模型复杂度与模型误差的困境


    **有偏差的数据**是导致模型在训练数据上表现良好但在验证数据上表现不佳的第二个潜在根本原因。有偏差的数据意味着训练数据和验证数据（以及潜在的现实数据）具有不同的数据分布和特征。在我们的猫狗示例中，一个数据集可能由一组精心制作的狗和猫图片组成。第二个和第三个数据集可能来自从互联网和维基百科爬取与猫和狗相关的图像。显然，使用其中一个数据集训练模型会在该特定数据集上产生良好性能，但在使用其他任何数据集进行测试时则不一定。如果没有预算进行人工审查图像，自动收集的训练数据可能包含被标记为“猫”但实际包含猫粮或宠物猫砂盆的图像。这三种方法对于获取训练、验证和测试数据集都是合理的。当不混合来自不同数据集的图像，而是将一个作为训练集，下一个作为验证集，最后一个作为测试集时，偏差问题就会出现。这些图像集的特征很可能差异过大。


    图 3-7 (e) 说明了偏差问题。当使用圆形数据训练模型时，一条垂直线可以很好地将两个类别分开。然而，如果验证数据的分布（用菱形表示）不同，那么模型就无法正确地对它们进行分类。


    希望你的 AI 项目训练了一个或多个候选 AI 模型，这些模型在验证测试数据集上表现良好。那么，在投入生产部署之前，该 AI 模型就可以准备使用测试数据进行最终检查了。


    ### 使用测试数据集评估 AI 模型


    最终评估使用的是测试数据集。处于此阶段的 AI 模型已经成功通过了训练数据和验证数据的评估。然而，它仍然可能在测试数据上失败，指标值不佳。那么，在假设验证集和测试集相似的情况下，该模型可能对验证数据过拟合了。


    这个解释可能会让人惊讶。验证阶段的目的是检测过拟合，但我们却在测试阶段遇到了这个问题。原因很简单：验证阶段检测的是对训练数据的过拟合，而不是对验证数据的过拟合。由于模型现在处于测试阶段，它在验证数据上表现良好（与其他候选模型相比也是如此）。显然，一个过拟合的模型有很大机会表现良好并进入测试数据阶段。如何解决这个缺陷？增加验证数据集的大小以降低过拟合的可能性，重复验证测试，并为使用测试数据的最终评估选择不同的模型。


    ## 监控生产环境中的 AI 模型


    随着 AI 模型部署到生产环境，以研究为导向的教科书就到此为止了。除了一个高性能的模型，你还能期待什么呢？在实践中，业务部门期望一个性能良好的模型不仅能运行一天，而是能运行数周乃至数月。如果质量下降，就需要重新训练。在部署时，第一个问题可能是模型是否提供了实现预期业务收益所需的分类和预测质量。此外，业务部门可能会提出第二个问题：我们如何确保模型能够长期提供改进和节省成本？即使他们现在不问，如果业务收益消失，或者由于
    AI 模型不再那么出色而导致销售额暴跌，他们也会明确表达他们的期望。


    一个有远见的 AI 项目经理通过将监控功能作为项目的一部分来实现，以应对这种不确定性和明显的必要性。这与 IT 部门传统的 QA 方法相比是一种范式转变。传统的
    QA 策略在上线前进行严格测试。之后，规则是：永远不要碰运行中的系统。AI 模型需要不同的方法。它们可能会在数小时、数天、数周或数月内退化并变得过时。这通常是一个渐进的过程，但存在清晰、可衡量的指标：


    -   输入值的显著变化，例如输入变量的均值或分布发生变化。购物篮中是否包含 80%的泳装，而不是 80%的冬季服装类产品？

    -   统计模型输出值的显著变化。分类输出的分布是否发生变化，例如从 30%的狗图片变为 45%？是否一天内只向所有客户推荐了 20 种产品，而之前每天推荐
    1000 种不同的产品？

    -   预测质量下降：与一个月前相比，将 AI 组件推荐的产品添加到购物车的客户是否减少了 20%？


    当然，应用程序必须收集这些关键指标，以便业务用户或数据分析师能够识别变化，或者实现自动报警。


    监控指标的一个（更复杂的）替代方案是时不时地，甚至每晚重新训练实际模型。使用当前数据生成一个新模型，并与之前的模型进行比较。如果出现显著偏差，数据科学家会用新模型替换旧模型。为了控制目的，你多久生成一次新模型——以及你是否能自动化这个模型创建过程——最终是一个商业问题。

    '
- fmt: '# Data Quality


    The problem with cheating in exams by copying your neighbor’s answers is simple.
    Typically, the least-prepared students do not sit next to the best and brightest.
    Their neighbors might also not have a clue – and replicating wrong answers and
    building on them usually does not end well.


    Data scientists face similar situations. They create AI models, sometimes too
    naïvely, assuming that the training data is in good shape. A recent study found
    publicly available training sets used in academia and research to have issues
    with 0.15 to 10.1% of the training set elements. These numbers should be a warning
    for data scientists and AI project managers to take the topics seriously during
    the CRISP-DM phase “data understanding.” Projects benefit from looking at data
    quality right from the beginning.


    The literature is full of good ideas and frameworks. Implementing them and ensuring
    good data governance practices is often a real challenge. Luckily, this is not
    the responsibility of data scientists. They are not the ones who should get involved
    in extensive data cleaning exercises. However, they might have to do some data
    preparation with limited improvements themselves. From an AI or data science perspective,
    data scientists and AI projects can restrict their focus on three main data quality
    aspects (Figure [3-9](#516372_1_En_3_Chapter.xhtml#Fig9)):


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig9_HTML.png](images/516372_1_En_3_Chapter/516372_1_En_3_Fig9_HTML.png)


    **Figure 3-9** The Three Dimensions of Data Quality


    - Technical correctness

    - Match with reality

    - The reputation of the data


    ## Technical Correctness


    Data is correct from a technical perspective if it matches the defined data model.
    Mandatory fields have values, expected relationships and links between data sets
    exist, and data types and actual data match. IT specialists from the database
    world sometimes forget one fact: not all training data for AI models intelligence
    comes from tables with strictly enforced schema constraints such as `NOT NULL`
    or `UNIQUE`. Log data, JSON files, or manually filled Excel sheets often are in
    a less strict format. Plus, some documents are broken for whatever reason, or
    attributes are missing or filled with placeholders such as `"xxxxxx"` if not known
    when creating the row. Humans get pretty creative when forms do not match their
    needs and reality.


    Just skipping – instead of improving – technical inaccurate training data can
    have unexpected severe side effects. Suppose you create a model for customer behavior
    in the EU. The various source systems together deliver 500,000 data items for
    your training set. 35,000 miss multiple attributes. The data scientists suggest
    skipping them. What should you say or do as an AI project manager under pressure?


    Skipping 35,000 from 500,000 data points is not a significant quantitative loss.
    Still, the impact on the model quality can be severe. Suppose the 35,000 are not
    equally distributed over the data set, but are the complete German market data.
    If training a model without such German data, the model probably works nicely
    on the training data. The metrics might look perfect even for the validation and
    test data when this data also comes from data that skipped the incomplete rows.
    However, once in production, the model probably performs poorly for German customers.
    Thus, addressing technical data quality by removing data requires a second thought
    and at least a rudimentary analysis before removing the rows from your data set.
    Otherwise, you might skip essential information.


    ## Data Matches Reality?


    About 100 million AUD$ just for extra legroom on a flight was what the Qantas
    app showed a passenger as the price. In the end, he was charged 70 AUD$ on his
    credit card. It is an extreme example of discrepancies between data in two systems.
    Similar, though usually less severe, differences can exist when comparing data
    in a training set and the reality.


    AI project managers and teams cannot validate each and every data item. Still,
    they can verify various aspects by checking individual data items or looking for
    hints for quality issues. They could, for example, look at the following:


    - Is the provided data, such as street names or sales figures, correct?

    - Is the data complete and free of redundancies, for example, there is precisely
    one booking for each customer purchase – and not two or none?

    - Is the data consistent? If, for example, two attributes store the same information,
    such as the tax location, are they always the same?

    - Does the distribution of the training data reflect the reality – or do we have
    in our training data much more pictures of expensive cars than of the various
    standard entry-level cars?

    - How quickly does a change in the real world result in an adaptation of the data?
    Does it show up in the training set one hour later, or only next month if customers
    make purchases?


    Measuring such objective criteria helps understand when to rely on specific data
    sources and to detect if sources have discrepancies and (timely/delay-caused)
    inconsistencies.


    ## Reputation of Data


    The third dimension differs from the first two. It puts human judgment in the
    foreground. What do recipients of the data (or the recipients of your AI model)
    think about the data quality of the training data sources? They might not have
    a short-term alternative if they question your data sources and, thus, the models
    you create. Eventually, however, they find other options – other teams, doing
    something “on top” with Excel, or getting a service from an external provider.
    I learned this lesson on my very first client engagement. We had a consulting
    mandate within a large IT service provider. I was trying to draw a diagram with
    all the systems storing and processing data. One system responsible proudly told
    me that his data is of top quality and always up to date. Well, one of the recipient
    teams implemented another solution to clean the data before using it.


    The system responsible was neither a liar nor negligent. With different needs
    and usages, the same data can be anything from “not useful” to “excellent.” An
    attribute `"sold items"` can count the number of items which customers put in
    their shopping basket – or the numbers of shipped items and not returned. If you
    are in the controlling department, your focus might be more on correct numbers
    than on valid shipping addresses. Data quality has a recipient-specific subjective
    component. This aspect is vital for AI projects. It can impact the acceptance
    of the AI model if you use known-to-be-good or known-to-be-often-wrong sources
    for your training data.'
