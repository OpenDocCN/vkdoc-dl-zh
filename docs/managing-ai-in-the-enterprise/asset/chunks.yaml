- fmt: '### Cloud-AI Risk Mitigation


    Many AI organizations are ahead of their time when it comes to moving to the cloud,
    which brings them into trouble. Massive amounts of data, highly fluctuating compute
    needs, and the availability of sophisticated AI frameworks in the public cloud
    foster a quick cloud adoption by data scientists and AI specialists. The rest
    of the company and the IT security organization might be on the journey to the
    cloud. Most AI organizations are already there. As a consequence, AI organizations
    have to take over more security-related tasks compared with traditional on-premise
    environments. Thus, AI managers, data scientists, and engineers benefit from a
    basic understanding of the main security risks.


    Before elaborating on the risks of being *in* the cloud, we look at the unique
    **compliance risks** when moving *to* the cloud, especially to the big global
    players. First, public cloud providers offer many different services, from compute
    and storage to very specific niche services for IoT or the blockchain. Not every
    service is available in each region – and even if the actual configuration of
    the data scientists and engineers determine whether the data end up in a data
    center in an adequate **jurisdiction**. One wrong click during configuration and
    data scientists or data engineers transfer EU data to the US, often a big issue.
    Second, the **Cloud Act** means that US authorities might get access even to data
    in non-US data centers. These data transfers or the potential data exposure can
    be a no-go for regulators. Third, there is the **sanctions** risk. In such a case,
    a company might have to switch to a new provider in a different jurisdiction immediately.
    In an on-premise world, the software continues to run when a company is put under
    sanctions, even if security patches are withheld. In contrast, access to all data
    and software is blocked immediately in the cloud – a real risk even for smaller
    companies and governmental offices in OECD countries as Sassnitz harbor in Germany
    exemplifies. The port handles 2.2 Mio tons of freight per year, nothing compared
    to 469 Mio in Rotterdam. It is owned by the local city and a German federal state.
    Economically irrelevant, solid owners – and in the middle of a pipeline controversy
    resulting in the US threatening to sanction the port. What would happen with such
    a company if its logistics, for example, depend on AI frameworks in the public
    cloud?


    Once the AI organization decides to move to the cloud, particular security risks
    emerge and become newly relevant. Figure [7-13](#516372_1_En_7_Chapter.xhtml#Fig13)
    provides an overview of the risk areas requiring cloud-specific **technical security
    measures**. They are important if the AI organization has an extra cloud or a
    separate tenant, but only to a lesser degree if running in the same tenant as
    the rest of the company.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig13_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig13_HTML.png)


    Figure 7-13


    Cloud Security Risks for AI Organizations


    The first risk area relates to user access. Data scientists and engineers have
    to connect and log in to the cloud (Figure [7-10](#516372_1_En_7_Chapter.xhtml#Fig10),
    1). If the AI organization does not use the same cloud environment as the rest
    of the organization, they might bypass the company’s central **user and access
    management** and Active Directory. So, managing new employees or dealing with
    leavers or ones moving to new positions becomes an issue. There is one thing more
    inconvenient than having an employee guided out of the building by a security
    guard: if this former employee has access to the cloud for the next weeks and
    months allowing for revenge because the Active Directory is locked, but not a
    cloud account “in the wild.” Furthermore, most companies enforce **multi-factor
    authentication**. Logging in just with a user name and password is frowned upon
    these days. Employees need RSA keys or special apps on their mobile phones. The
    public clouds provide these features as well, but they are not enforced by default.


    **Service accounts** are the second area, quite a similar topic (Figure [7-10](#516372_1_En_7_Chapter.xhtml#Fig10),
    2). The on-premise world or the other company’s cloud environments have to interact
    with the AI organization’s cloud tenant:


    *   Training data must get to the AI environment.

    *   A trained AI model might have to be moved to the on-premise world if the runtime
    environment is there or if the model becomes part of the application code.

    *   A trained model might rely on the cloud as an AI runtime environment. Then,
    various applications of the company have to be able to invoke the AI models on
    the cloud for inference.


    The challenge with service accounts is preventing issues with stolen passwords
    or access keys. It would be a catastrophe if a data engineer leaves the company,
    copies a password, and continues to have access to the cloud for weeks and months.


    **Internet-exposed platform-as-a-service services** are the third risk area (Figure
    [7-10](#516372_1_En_7_Chapter.xhtml#Fig10), 3) – and they are unique to public
    clouds. Databases or object storage are web services. Applications – and attackers
    – can reach them potentially from the public Internet. Both can invoke AI models
    and many more services and resources in the same way. Engineers should configure
    them such that only authenticated users coming from specific IP addresses have
    access. However, misconfigurations can result in public exposure. The majority
    of cloud data leakages were the result of such misconfigurations, not of sophisticated
    attacks.


    For clarification, the risk is not so prominent for infrastructure-as-a-service
    services such as VMs. Accidentally opening up a VM to the Internet requires many
    more misconfigurations than in the PaaS world.


    The fourth topic is **security operations** in the cloud. Who takes care of security
    incidents, inspects logs, and analyzes warnings? (Figure [7-10](#516372_1_En_7_Chapter.xhtml#Fig10),
    4)


    The cloud-risk areas are not specific to AI organizations. Every engineer should
    be aware of them. However, at the moment, most companies are in a transitional
    phase. AI organizations might not have the usual support from IT security. Suppose
    the AI organization decides unilaterally to set up an AI cloud. In that case,
    they are responsible for security engineering and security operations. They cannot
    assume that the IT security organization helps them. AI managers might realize
    quickly: auditors do not sympathize with an AI cloud with large amounts of data
    and insufficient IT security know-how. Finally, to make things worse, the auditors
    expect that the AI cloud follows the same norms and standards as the rest of the
    organization, including, for example, the ISO 27000 information security standard.'
