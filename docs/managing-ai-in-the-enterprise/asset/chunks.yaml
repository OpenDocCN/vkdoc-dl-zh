- fmt: "### The ISO 27000 Information Security Standard\n\nStandards are not a creative’s\
    \ – or an IT specialist’s – darlings. Most engineers and data scientists prefer\
    \ working in sectors without heavy regulations and strict norms. Even if there\
    \ are engineering or organizational standards such as `Scrum`, `SAFe`, `Cobit`,\
    \ `ITIL`, or `TOGAF`, they allow heavy tailoring and interpretation. One broadly\
    \ relevant exception to the rule of ease is the `ISO 27000` standard. If the senior\
    \ management decides to take this norm seriously, the IT security department and\
    \ auditors get persistent. IT norms did not impact traditional statisticians’\
    \ teams. The situation differs for AI organizations and data scientists writing\
    \ code, providing web services, and running and hosting software. They fall under\
    \ the same rules as any software engineering and systems integration team.\n\n\
    The `ISO 27000` standard is a **standard family** consisting of a variety of documents\
    \ with different purposes (Figure [7-14](#516372_1_En_7_Chapter.xhtml#Fig14)).\
    \ `ISO 27000` is the vocabulary standard. It provides a basic overview and defines\
    \ the terminology. Then, there are binding standard documents: `ISO 27001` and\
    \ `ISO 27006`. `ISO 27006` is irrelevant for AI teams since it addresses auditing\
    \ organizations only. In contrast, `ISO 27001` is the bible for any certification.\
    \ It states all certification requirements. The standard has a main section and\
    \ appendix A. The main section defines a general information security framework.\
    \ Topics such as top management involvement or the need for an incident management\
    \ system are more relevant for senior managers and IT security departments than\
    \ for AI teams and software engineers. Appendix A lists concrete security topics\
    \ (“controls”) to be implemented. Some apply directly to AI organizations, including\
    \ the needs for:\n\n![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig14_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig14_HTML.png)\n\
    \nFigure 7-14  \nThe ISO 27000 Norm Family\n\n*   Identifying and classifying\
    \ assets such as code, data, or documentation and defining access control mechanisms\n\
    *   Securing development environments and test data\n*   Performing acceptance\
    \ and security tests\n*   Change control procedures in development and production\
    \ to prevent unwanted changes and clear rules who can do which installations\n\
    \n`ISO 27001` compliant companies often translate these requirements into internal\
    \ guidelines and directives, such that many organizations implement the requirements\
    \ without engineers and AI specialists being aware.\n\nAs mentioned, the `ISO\
    \ 27000` standard family comprises many more norms and documents. Though the `ISO\
    \ 27001` standard is the only normative binding document for IT organizations,\
    \ `ISO 27002` is worth taking a closer look at since it helps to set up the controls\
    \ of appendix A of `ISO 27001`.\n\n**Additional guidelines** focusing on specific\
    \ aspects. `ISO 27003`, for example, looks at information security management\
    \ systems, and `ISO 27005` at risk management. Sector-specific guideline standards\
    \ are also available, for example, for the financial services industry (now withdrawn),\
    \ telcos, or the energy sector. However, most companies focus on `ISO 27001`/`ISO\
    \ 27002` and do not pay much attention to the additional documents.\n\nA number\
    \ behind the standard reflects the publishing year and allows to distinguish different\
    \ versions, for example, the `ISO27001:2013` version from the older version, `ISO27001:2005`.\
    \ At the moment, there is a peculiar situation with a new draft version of the\
    \ `ISO 27002` standard out, but not a new `ISO 27001` draft, which would be the\
    \ actual binding norm. However, at this moment, there seems not to be much change\
    \ impacting AI organizations.\n\nFor most AI organizations, it is more an **emotional\
    \ shock** than a big issue to adhere to `ISO 27001`, at least if they are in contact\
    \ and aligned with the IT security organization beforehand.\n\n### Summary\n\n\
    Securing an AI environment means ensuring confidentiality, integrity, and availability\
    \ of the AI environment and its training data and AI models. While every company\
    \ has a Chief Information Security Officer with a smaller or larger team, AI organizations\
    \ have to contribute substantially to securing their AI environment, especially\
    \ if they rely on cloud infrastructure the rest of the organization is not using\
    \ (yet). Correctly configuring their AI components and implementing suitable access\
    \ control mechanisms are just two sample responsibilities of an AI organization.\n\
    \nAI organizations and their assets face various risks and threats. First, AI\
    \ models and training data should not leave the organization since they are often\
    \ sensitive, critical intellectual property. Second, an attacker (or unhappy employee)\
    \ might manipulate the training data, resulting in poorly working AI models. Finally,\
    \ if the AI organization runs an AI runtime server which executes all the company’s\
    \ AI models, a non-availability of the AI runtime server impacts all processes\
    \ somehow depending on requesting AI model inference services on the non-available\
    \ server.\n\nAs a consequence, AI organizations should conduct a risk assessment\
    \ together with the security organization to identify weaknesses and implement\
    \ technical and procedural best practices for securing their AI environment and\
    \ their assets.\n\n# 8. Looking Forward\n\nIt is a characteristic of excellent\
    \ AI line managers and project managers to direct world-class data scientists\
    \ to build AI solutions that match the company’s strategic business goals. The\
    \ challenge is not having ideas on how AI could change the world. The challenge\
    \ is to build practical, helpful AI solutions delivering concrete benefits and,\
    \ afterward, running these AI solutions over the years.\n\nThe various book chapters\
    \ elaborated all relevant success factors from shaping and managing AI projects,\
    \ organizing testing and quality assurance, integrating AI components into broader\
    \ application landscapes and operating them, to incorporating ethics, compliance,\
    \ and security-related topics. These are the concepts every AI line or project\
    \ manager needs to set up, organize, and manage an AI department and its project\
    \ portfolio.\n\nWhen data scientists move to a new project, they might require\
    \ a deep understanding of different AI algorithms or frameworks. In contrast,\
    \ AI managers can master various projects with the know-how presented in this\
    \ book. Their tasks are very similar, whether the projects are about voice biometrics,\
    \ text understanding, support chatbots, automated credit ratings, or autonomous\
    \ cars and planes. Thus, if you are an AI project or line manager and made it\
    \ to this page, it is time for me to congratulate you for taking the time and\
    \ investing so much effort. I hope you enjoyed reading the book as much as I enjoyed\
    \ structuring the topic and bringing it to paper. I wish you many successful AI\
    \ projects in the years to come. Plus, I am sure you can move your company’s AI\
    \ organization to the next level with the ideas you learned from this book!"
  raw: '### The ISO 27000 Information Security Standard


    Standards are not a creative’s – or an IT specialist’s – darlings. Most engineers
    and data scientists prefer working in sectors without heavy regulations and strict
    norms. Even if there are engineering or organizational standards such as Scrum,
    SAFe, Cobit, ITIL, or TOGAF, they allow heavy tailoring and interpretation. One
    broadly relevant exception to the rule of ease is the ISO 27000 standard. If the
    senior management decides to take this norm seriously, the IT security department
    and auditors get persistent. IT norms did not impact traditional statisticians’
    teams. The situation differs for AI organizations and data scientists writing
    code, providing web services, and running and hosting software. They fall under
    the same rules as any software engineering and systems integration team.


    The ISO 27000 standard is a **standard family** consisting of a variety of documents
    with different purposes (Figure [7-14](#516372_1_En_7_Chapter.xhtml#Fig14)). ISO
    27000 is the vocabulary standard. It provides a basic overview and defines the
    terminology. Then, there are binding standard documents: ISO 27001 and ISO 27006\.
    ISO 27006 is irrelevant for AI teams since it addresses auditing organizations
    only. In contrast, ISO 27001 is the bible for any certification. It states all
    certification requirements. The standard has a main section and appendix A. The
    main section defines a general information security framework. Topics such as
    top management involvement or the need for an incident management system are more
    relevant for senior managers and IT security departments than for AI teams and
    software engineers. Appendix A lists concrete security topics (“controls”) to
    be implemented. Some apply directly to AI organizations, including the needs for:


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig14_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig14_HTML.png)


    Figure 7-14


    The ISO 27000 Norm Family


    *   Identifying and classifying assets such as code, data, or documentation and
    defining access control mechanisms


    *   Securing development environments and test data


    *   Performing acceptance and security tests


    *   Change control procedures in development and production to prevent unwanted
    changes and clear rules who can do which installations


    ISO 27001 compliant companies often translate these requirements into internal
    guidelines and directives, such that many organizations implement the requirements
    without engineers and AI specialists being aware.


    As mentioned, the ISO 27000 standard family comprises many more norms and documents.
    Though the ISO 27001 standard is the only normative binding document for IT organizations,
    ISO 27002 is worth taking a closer look at since it helps to set up the controls
    of appendix A of ISO 27001.


    **Additional guidelines** focusing on specific aspects. ISO 27003, for example,
    looks at information security management systems, and ISO 27005 at risk management.
    Sector-specific guideline standards are also available, for example, for the financial
    services industry (now withdrawn), telcos, or the energy sector. However, most
    companies focus on ISO 27001/27002 and do not pay much attention to the additional
    documents.


    A number behind the standard reflects the publishing year and allows to distinguish
    different versions, for example, the ISO27001:2013 version from the older version,
    ISO27001:2005\. At the moment, there is a peculiar situation with a new draft
    version of the ISO 27002 standard out, but not a new ISO 27001 draft, which would
    be the actual binding norm. However, at this moment, there seems not to be much
    change impacting AI organizations.


    For most AI organizations, it is more an **emotional shock** than a big issue
    to adhere to ISO 27001, at least if they are in contact and aligned with the IT
    security organization beforehand.


    ### Summary


    Securing an AI environment means ensuring confidentiality, integrity, and availability
    of the AI environment and its training data and AI models. While every company
    has a Chief Information Security Officer with a smaller or larger team, AI organizations
    have to contribute substantially to securing their AI environment, especially
    if they rely on cloud infrastructure the rest of the organization is not using
    (yet). Correctly configuring their AI components and implementing suitable access
    control mechanisms are just two sample responsibilities of an AI organization.


    AI organizations and their assets face various risks and threats. First, AI models
    and training data should not leave the organization since they are often sensitive,
    critical intellectual property. Second, an attacker (or unhappy employee) might
    manipulate the training data, resulting in poorly working AI models. Finally,
    if the AI organization runs an AI runtime server which executes all the company’s
    AI models, a non-availability of the AI runtime server impacts all processes somehow
    depending on requesting AI model inference services on the non-available server.


    As a consequence, AI organizations should conduct a risk assessment together with
    the security organization to identify weaknesses and implement technical and procedural
    best practices for securing their AI environment and their assets.


    # 8. Looking Forward


    It is a characteristic of excellent AI line managers and project managers to direct
    world-class data scientists to build AI solutions that match the company’s strategic
    business goals. The challenge is not having ideas on how AI could change the world.
    The challenge is to build practical, helpful AI solutions delivering concrete
    benefits and, afterward, running these AI solutions over the years.


    The various book chapters elaborated all relevant success factors from shaping
    and managing AI projects, organizing testing and quality assurance, integrating
    AI components into broader application landscapes and operating them, to incorporating
    ethics, compliance, and security-related topics. These are the concepts every
    AI line or project manager needs to set up, organize, and manage an AI department
    and its project portfolio.


    When data scientists move to a new project, they might require a deep understanding
    of different AI algorithms or frameworks. In contrast, AI managers can master
    various projects with the know-how presented in this book. Their tasks are very
    similar, whether the projects are about voice biometrics, text understanding,
    support chatbots, automated credit ratings, or autonomous cars and planes. Thus,
    if you are an AI project or line manager and made it to this page, it is time
    for me to congratulate you for taking the time and investing so much effort. I
    hope you enjoyed reading the book as much as I enjoyed structuring the topic and
    bringing it to paper. I wish you many successful AI projects in the years to come.
    Plus, I am sure you can move your company’s AI organization to the next level
    with the ideas you learned from this book!'
  trans: "\n### ISO 27000 信息安全标准\n\n标准并非创意人员或 IT 专家的心头好。大多数工程师和数据科学家更倾向于在监管宽松、规范不严的领域工作。即便存在诸如\
    \ `Scrum`、`SAFe`、`Cobit`、`ITIL` 或 `TOGAF` 等工程或组织标准，它们也允许大幅度的定制和解读。`ISO 27000`\
    \ 标准是一个普遍相关的例外。如果高级管理层决定认真对待这一规范，IT 安全部门和审计人员便会持续跟进。IT 规范过去并未影响传统的统计学家团队。但对于编写代码、提供网络服务、运行和托管软件的\
    \ AI 组织及数据科学家而言，情况则有所不同。他们与任何软件工程和系统集成团队遵循相同的规则。\n\n`ISO 27000` 标准是一个**标准系列**，由一系列用途各异的文档组成（图\
    \ 7-14）。`ISO 27000` 是词汇标准，它提供了基本概述并定义了术语。此外，还有具有约束力的标准文档：`ISO 27001` 和 `ISO 27006`。`ISO\
    \ 27006` 与 AI 团队无关，因为它仅针对审计组织。相比之下，`ISO 27001` 是任何认证的“圣经”，它规定了所有认证要求。该标准包含一个主要章节和附录\
    \ A。主要章节定义了通用的信息安全框架。诸如高层管理参与或事件管理系统需求等主题，对高级管理层和 IT 安全部门而言，比对 AI 团队和软件工程师更为重要。附录\
    \ A 列出了需要实施的具体安全主题（“控制措施”）。其中一些直接适用于 AI 组织，包括以下需求：\n\n![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig14_HTML.png](img/516372_1_En_7_Fig14_HTML.png)\n\
    \n图 7-14  \nISO 27000 规范系列\n\n*   识别和分类资产（如代码、数据或文档），并定义访问控制机制\n*   保护开发环境和测试数据的安全\n\
    *   执行验收测试和安全测试\n*   在开发和生产环境中实施变更控制程序，以防止不必要的变更，并明确谁可以进行哪些安装的规则\n\n符合 `ISO 27001`\
    \ 的公司通常将这些要求转化为内部指南和指令，因此许多组织在工程师和 AI 专家未察觉的情况下就实施了这些要求。\n\n如前所述，`ISO 27000` 标准系列包含更多规范和文档。虽然\
    \ `ISO 27001` 标准是 IT 组织唯一具有约束力的规范性文档，但 `ISO 27002` 也值得仔细研究，因为它有助于建立 `ISO 27001`\
    \ 附录 A 中的控制措施。\n\n**附加指南** 侧重于特定方面。例如，`ISO 27003` 关注信息安全管理体系，`ISO 27005` 关注风险管理。也存在针对特定行业的指南标准，例如针对金融服务行业（现已撤销）、电信行业或能源行业的标准。然而，大多数公司专注于\
    \ `ISO 27001`/`ISO 27002`，而对附加文档关注不多。\n\n标准编号后的数字反映了发布年份，并允许区分不同版本，例如 `ISO27001:2013`\
    \ 版本与旧版本 `ISO27001:2005`。目前，出现了一种特殊情况：`ISO 27002` 标准的新草案版本已经发布，但作为实际约束性规范的 `ISO\
    \ 27001` 新草案尚未发布。然而，目前看来，似乎没有太多影响 AI 组织的变更。\n\n对于大多数 AI 组织而言，遵守 `ISO 27001` 与其说是一个大问题，不如说是一种**情感冲击**，至少如果它们事先与\
    \ IT 安全组织保持联系并保持一致的话。\n\n### 总结\n\n保护 AI 环境的安全意味着确保 AI 环境及其训练数据和 AI 模型的机密性、完整性和可用性。虽然每家公司都有一位首席信息安全官及其规模不一的团队，但\
    \ AI 组织必须为保护其 AI 环境的安全做出实质性贡献，特别是当它们依赖组织其他部门（尚）未使用的云基础设施时。正确配置其 AI 组件并实施适当的访问控制机制，只是\
    \ AI 组织职责的两个示例。\n\nAI 组织及其资产面临各种风险和威胁。首先，AI 模型和训练数据不应流出组织，因为它们通常是敏感且关键的知识产权。其次，攻击者（或不满的员工）可能会操纵训练数据，导致\
    \ AI 模型性能不佳。最后，如果 AI 组织运行一个执行公司所有 AI 模型的 AI 运行时服务器，那么该服务器的不可用将影响所有在某种程度上依赖向该不可用服务器请求\
    \ AI 模型推理服务的流程。\n\n因此，AI 组织应与安全组织一起进行风险评估，以识别弱点，并实施技术和流程上的最佳实践，以保护其 AI 环境及其资产的安全。\n\
    \n# 8. 展望未来\n\n优秀的 AI 直线经理和项目经理的特点在于，他们能够指导世界一流的数据科学家构建符合公司战略业务目标的 AI 解决方案。挑战不在于如何利用\
    \ AI 改变世界，而在于构建实用、有益的 AI 解决方案，提供切实的效益，并在之后多年持续运行这些 AI 解决方案。\n\n本书各章节详细阐述了所有相关的成功因素，从塑造和管理\
    \ AI 项目、组织测试和质量保证、将 AI 组件集成到更广泛的应用环境并运营它们，到整合伦理、合规和安全相关主题。这些都是每位 AI 直线经理或项目经理需要掌握的概念，以便建立、组织和管理一个\
    \ AI 部门及其项目组合。\n\n当数据科学家转向一个新项目时，他们可能需要深入理解不同的 AI 算法或框架。相比之下，AI 经理可以利用本书介绍的知识来驾驭各种项目。无论项目是关于语音生物识别、文本理解、支持聊天机器人、自动信用评级，还是自动驾驶汽车和飞机，他们的任务都非常相似。因此，如果您是一位\
    \ AI 项目或直线经理，并且读到了这里，那么是时候祝贺您投入了时间和精力。我希望您享受阅读本书的过程，就像我享受梳理主题并将其付诸笔端一样。祝您在未来的岁月里成功完成众多\
    \ AI 项目。此外，我相信您能够运用从本书中学到的理念，将您公司的 AI 组织提升到一个新的水平！\n"
