- fmt: '# 5. Building an AI Delivery Organization


    When AI shall rock your company, a few projects here and there won’t do the trick.
    You need a stable AI organization always ready to step in, help, and drive forward
    the transition towards a data and AI-driven company. This aim has implications
    for data scientists and the overall AI organizations. They have to widen their
    focus and shift it away from projects and models towards a kind of nation-building
    for AI within organizations. The task: build an AI organization that lasts.


    Building an AI organization starts with identifying (internal) customers and securing
    funding. Customers mean that there are managers within your organization with
    a challenge they can and want to solve with AI. You have to convince them that
    your AI organization is technically competent, understands their business challenge,
    and helps them achieve their ambition. An AI organization cannot just focus on
    technology, or only within very few very large corporations with a high division
    of labor. From understanding the business problem to providing a solution for
    the exact context, this end-to-end perspective is the key to success with customers
    and for funding.


    When new to corporate politics, it is especially crucial to be aware of two types
    of managers who support you. A *sponsor* helps you fund your service. She has
    a budget, or she can help you get funding from someone else. On the other hand,
    a *non-material patron* tells you how great you, your ideas, and your entrepreneurial
    spirit are. However, she has no money, and she does not lobby for any budget for
    you.


    Once an AI organization ensured funding, the team must deliver the promised AI
    projects and sort out and run its AI infrastructure. Spending months on evaluating
    technologies and detailing all technical concepts seldom matches corporate expectations.
    Instead, sponsors and senior managers want to see that the AI organization delivers
    substantial business value.


    This chapter helps managers to succeed with these challenges by elaborating on
    three aspects:


    - Shaping an AI service, that is, discussing typical elements of (AI) services
    and what choices exist.

    - Looking at the organizational challenges of AI organizations running projects
    for creating superior AI models.

    - Detailing the organizational needs of AI operations that run an AI model for
    years, for example, as part of the solution code or on a dedicated AI runtime
    server.


    This topics combination helps managers prepare their service proposals and implement
    the actual service organization once senior management has approved the concept
    and ensures funding.


    ## Shaping an AI Service


    Personally, I always enjoy working with teams and managers to shape services within
    IT departments. You discuss a lot with engineers, managers, and customers, thereby
    deepening your knowledge about the topic and the organization. It is like Goethe’s
    Faust, aiming to «… understand whatever binds the world’s innermost core together,
    see all its workings, and its seeds.»


    ### IT Services Characteristics


    “Service” is one of those terms most people have more of an intuitive than a precise
    understanding. However, an accurate understanding helps to design AI (and other)
    services. Nearly twenty years ago, Joe Peppard elaborated on the main characteristics
    of IT services. They are: intangible nature, human factor, simultaneous provisioning
    and consumption, and no upfront demonstration.


    The **intangible** nature of services reflects that services do not produce anything
    physical you can touch. Instead, a service is about someone doing something with
    something, which might change a physical or digital asset.


    AI teams typically create, deploy, and maintain digital assets: AI models, inference
    results in the form of lists when applying and using the models, code for data
    cleaning and preparation, or interface configurations when integrating models
    in complex solutions. Additionally, AI teams might provide communication-intense
    consulting (e.g., helping internal customers formulate the question AI should
    solve) or support for technical incidents related to the model and its integration.


    The **human factor** reflects that people interact and collaborate. Handling customer
    interactions professionally is as essential to avoid unhappy customers as successfully
    solving tasks and problems. Data scientists often have more academic merits than
    many of their customers. Still, they must patiently explain topics and communicate
    in an easy-to-understand language, value their internal customers’ business know-how
    and experience, and show interest and understand the application context.


    A second often overlooked aspect is the need for the customer side to contribute
    constructively. Suppose the integration between an AI runtime server and a sales
    campaign management system does not work. The owner or manager of the campaign
    management system cannot simply blame the AI team and refuse debugging on their
    side as well. Seniority and experience working with customers help handling such
    situations.


    **Simultaneous provisioning and consumption** mean that service provisioning and
    consumption usually take place at the same time. If a physician examines me, I
    have to be present. The same applies to AI services. When AI models or interfaces
    fail, the AI team has to start working on the issue as soon as possible. Such
    incidents cannot wait, and such a support service cannot be prepared in advance
    and “place into stock.” Depending on the exact request, the simultaneity is relaxed.
    Creating an AI model is a multi-week task. You might not want to generate a list
    in August with clients to target with Christmas tree coupons in early December.
    You have to do this in November or December, though one day or even a week earlier
    or later does not make a big difference.


    The simultaneous nature has two implications for the AI organization. First, the
    management has to ensure that the AI team always has an adequate amount of work
    – not too much, not too little. Second, while proactive quality control for digital
    assets such as AI models is possible, proactive quality control is impossible
    for human interaction. Training data scientists on how to handle customers is
    an important measure. Still, when a data scientist yells at a customer, you cannot
    “quality control” the interaction before it impacts the customer. You can only
    do “damage control” afterward.


    **No upfront demonstration**. It is usually impossible to demonstrate an IT service
    before the contract is signed and the service is established. You cannot test-drive
    an IT or AI service. An AI manager or data scientist can explain the sales team’s
    success based on a new AI model. Still, such storytelling is no full equivalent
    to a live demonstration, for example, of the benefits AI can bring for a team
    optimizing an engine.


    IT and AI service characteristics have clear **implications for an AI organization**.
    As mentioned, AI managers must carefully balance potential staffing needs and
    work gaps due to canceled or delayed projects due to the simultaneous provisioning
    and consumption of AI services. Managers with a consultancy or IT service provider
    background find this obvious. It is a new aspect for employees with a more academic
    background. The two other implications are similar – obvious for consultants,
    more surprising for others. AI team members require interpersonal skills for fruitful
    daily interactions, especially team members interacting with customers. Finally,
    when the AI organization requires identifying new projects, acquisition skills
    for AI managers are essential due to AI services’ intangible and impossible-to-demonstrate-beforehand
    nature. However, the exact requirements and needs differ from project to project
    and service to service – and especially between companies with different corporate
    cultures and organizational structures.'
