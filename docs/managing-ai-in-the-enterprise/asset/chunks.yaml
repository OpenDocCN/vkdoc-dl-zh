  trans: '

    # CIA 三角


    信息安全专业人员经常提及信息安全的两项基本原则：知悉必要原则和 CIA 三角（或称 CIA 三元组）。CIA 是机密性、完整性和可用性的缩写（图 7-2）。这三个术语清晰地表明：信息安全不仅仅是使用防火墙保护网络和运行防病毒软件。因此，它们同样适用于并影响着人工智能组织及其基础设施和平台。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig2_HTML.png](img/516372_1_En_7_Fig2_HTML.png)


    图 7-2


    CIA 三角


    **机密性**意味着保守秘密。用户只能访问其工作所需的数据和系统（知悉必要原则）。通常，员工会根据其角色获得必要的访问权限。其他访问权限需要有人明确授予。为人力资源部门工作的数据科学家需要访问数据湖中存储的与人力资源相关的数据。相比之下，从事销售主题的数据科学家则无权访问人力资源数据。


    CIA 三角的第二个方面是**完整性**。完整性意味着数据库、文件和数据湖中的数据与信息是正确的。应用程序、用户和客户可以信赖它们。例如，训练数据对于创建可用的
    AI 模型至关重要。移除某个国家或与特定少数群体相关的所有数据会影响模型的正确性或质量。完整性并不要求在技术上使所有数据篡改和伪造变得不可能。确保完整性需要检测篡改行为，例如，通过使用和验证校验和。因此，完整性与不可否认性密切相关。用户或工程师只有在完成身份验证后才能更改数据、应用程序或配置。身份验证是记录谁做了什么的前提。毋庸置疑：以防篡改的方式存储这些日志文件至关重要。


    CIA 三角的第三个也是最后一个概念是**可用性**。存储在文件、数据库和软件解决方案中的数据与信息，只有在能够访问时才能带来益处。当楼宇门禁系统依赖 AI
    组件来识别员工时，该系统必须 7/24 全天候运行。如果系统不可用，则无人能进入大楼。实现可用性的典型技术措施是备份或冗余。架构必须辅以这些措施，并额外防范拒绝服务攻击或意外应用程序关闭。


    ## 安全相关职责


    对于技术和 AI 领域的专家来说，安全通常只是附带工作。大多数工程师和架构师乐于将各种 AI 相关组件和系统整合在一起。当项目面临谁接手特定任务的问题时，即使工程能力短缺，项目团队内部通常也能找到解决方案。更大的挑战在于如何在系统运行的多年间保持其安全性。谁定期检查日志以发现异常？谁检查是否存在漏洞以及供应商是否提供了补丁——尤其是针对零日攻击漏洞？


    当 AI 组织自行运行训练环境时，他们负责运行时服务器，并可能拥有模型仓库或数据湖。AI 组织必须确保这些系统是安全的。通常不清楚哪些任务由安全组织接管，哪些任务需要
    AI 团队自行组织。AI 管理者面临的一个特殊挑战是理解 IT 安全组织的典型双重角色：安全服务与安全治理（图 7-3）。两者都有助于公司和 AI 组织保护其
    IT 基础设施和应用环境。然而，其方法和目标有所不同。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig3_HTML.png](img/516372_1_En_7_Fig3_HTML.png)


    图 7-3


    安全职责的组织视角


    公司的**安全治理**职能的核心任务是制定策略、执行评估，并管理因实际系统实现和流程偏离策略而产生的 IT 相关运营风险。安全治理职能只是治理职能之一。还有其他职能，如法律与合规或数据治理，同样影响着
    AI 组织，这些内容将在其他章节讨论。


    编写安全策略就像给圣诞老人写愿望清单。你写下来，但实际的交付和实现并非你的职责。策略包含流程和技术要求。流程要求的一个例子是，要求软件开发人员或数据科学家在向公司其他部门提供
    Web 服务之前进行渗透测试。技术要求的一个例子是要求使用 TLS 1.3 加密所有网络流量。治理专家通常根据标准和框架（如 ISO 27000 系列和 ISAE
    3402）或来自软件供应商或公有云提供商的最佳实践文档来制定策略。


    IT 安全治理团队不向其他团队提供任何技术服务。他们通过其策略引导组织走向更安全的配置。此外，他们支持高级管理层了解公司的整体 IT 安全和风险状况。组织的其余部分，包括所有
    IT 和 AI 团队，扮演着圣诞老人的角色。他们必须满足策略中列出的愿望和需求。每个**应用所有者**必须确保其应用程序是安全的，并符合安全策略。AI 组织必须为其训练环境、运行时服务器或模型仓库满足与任何其他处理大量敏感数据的应用程序或系统相同的要求。这些任务通常由
    AI 组织的应用管理和运维专家负责，他们为数据科学家、数据工程师和 AI 翻译员提供内部服务。图 7-3 将这些组件称为**托管 AI 平台和基础设施**。

    '
- fmt: '除了治理功能外，许多安全组织还提供安全服务——AI组织内外的应用所有者都能从中受益。其中一种服务类型是**集中式安全服务**。这些服务针对公司特定的通用任务进行处理和解决。它们涉及保护公司边界——防火墙、数据丢失防护工具、扫描传入文件中的恶意软件——或检查与补丁相关的问题及（操作系统级别的）漏洞。


    相比之下，**协作式安全服务**需要IT安全交付团队与应用所有者之间的紧密协作。身份与访问管理（IAM）或Web应用防火墙（WAF）就是例子。两者都需要针对每个应用进行定制。IAM系统只有了解角色，并且AI平台能够与IAM解决方案进行技术交互时，才能管理对AI平台的访问。复杂的WAF需要经过训练，以微调其规则，从而学习AI运行时服务器可能接收到的所有合法请求。


    换句话说，与集中式安全服务不同，协作式安全服务要求AI组织执行专门的任务来保护AI系统。负责设置托管AI平台和基础设施的集成工程师，有责任确保其安全。上线后，AI组织的应用管理和运维专家必须在未来几年内保持其系统的安全性。AI管理层可以确保数据科学家和工程师不会因安全相关任务而分心，从而保持AI组织的生产力。只有一个重大例外：个人非托管安装和应用。当AI专家安装系统时，无论系统运行在服务器上还是云端，他们都必须确保其安全。


    **实验性安装**会带来特殊风险，尽管有时确实需要它们。数据科学家或工程师会不时尝试新工具。他们在笔记本电脑或虚拟机上安装这些工具，并执行一些用例，可能涉及实际的公司数据。一个典型的误解是，这类系统与组织的整体安全态势无关，因为它们只是实验性的。但事实恰恰相反，尤其是（但不仅限于）当它们包含实际数据时。实验性安装通常不如生产系统那样安全。因此，黑客可能更快地攻陷此类实验性系统，并利用它们攻击其他应用以及窃取机密数据。如果保护此类系统不可行，唯一的解决方案是在隔离的网络区域中设置一个沙箱环境。


    AI专家和管理者绝不能忘记保护其系统的两个原因。第一个是确保数据的机密性，并保证数据的完整性以及系统的可用性。他们负有责任，即使他们可以或必须依赖某些安全服务。


    AI组织必须强化其系统的第二个原因是防止“**溢出**”效应。例如，对单个（Web）应用的成功攻击绝不能使攻击者能够轻松接管AI运行时服务器或AI训练环境——或实验性系统。没有任何安全组织能保证这一点。这是AI组织每个成员的最终责任。


    我们以一个关于使用**公有云服务**的AI组织的最终说明来结束关于责任的讨论。这是一个热门话题，这意味着其治理和责任划分不如传统数据中心那样完善。AI组织应与安全组织确认是否允许使用预期的云服务。此外，他们还应确认安全组织是否为预期的云环境提供标准安全服务。否则，AI组织可能不得不自行设置和管理云安全——或者冒着审计人员关闭其环境的风险。


    ## 映射风险格局


    AI的崛起及其对关键业务流程的贡献正在改变组织——并带来新的风险。如果攻击者操纵AI功能或窃取数据或模型，会发生什么？AI对许多风险和安全专家来说是一个新领域，但方法论保持不变。首先，了解威胁行为者及其动机、目标和能力。其次，识别攻击者可能攻击或试图窃取的资产。第三，理解攻击场景以及攻击者的目标。第四，也是最后，根据可能性和潜在影响进行筛选，以识别相关风险。图[7-4](#516372_1_En_7_Chapter.xhtml#Fig4)展示了这些步骤。我们将在下文详细探讨它们。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig4_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig4_HTML.png)


    图7-4


    从威胁到AI组织的风险'
  raw: 'Besides the governance function, many security organizations providesecurity
    services – application owners inside and outside the AI organization benefit from
    them. One service type comprises **centralized security services** . These services
    address and solve specific, generic tasks for the company. They relate to protecting
    the company’s perimeter – firewalls, data loss prevention tools, scanning incoming
    files for malware – or checking for patching-related issues or (OS-level) vulnerabilities.


    In contrast, **collaborative security services** require close collaboration between
    an IT security delivery team and application owners. Identity and access management
    (IAM) or web application firewalls (WAF) are examples. Both require per-application
    customization. An IAM system can only manage access to an AI platform if it knows
    the roles and if the AI platform can interact technically with the IAM solution.
    Sophisticated WAFs need training for fine-tuning their rules to learn all the
    legitimate requests an AI runtime server might receive.


    In other words, in contrast to centralized security services, collaborative security
    services require the AI organization to perform dedicated tasks to secure the
    AI systems. The integration engineers, who set up the managed AI platforms and
    infrastructure, are responsible for securing them. After the go-live, the application
    management and operations experts of the AI organization have to keep their systems secure
    for the years to come. The AI management can ensure that data scientists and engineers
    are not distracted by security-related tasks to keep up the AI organization’s
    productivity. There is just one big exception: personal unmanaged installations
    and applications. When AI specialists install systems, they have to secure them,
    whether the systems run on servers or in the cloud.


    **Experimental installations** pose a particular risk, though there can be a need
    for them. From time to time, data scientists or engineers try out new tools. They
    install the tools on their laptops or a VM and perform some use cases, potentially
    with actual company data. A typical misconception is that such systems are not
    relevant to the organization’s overall security posture because they are just
    experimental. The contrary is true, especially (but not only) when they contain
    actual data. Experimental installations are often not secured as well as production
    systems. Thus, hackers might take over such experimental systems more quickly
    and misuse them for attacking other applications and extracting confidential data.
    If protecting such systems seems not feasible, the only solution is setting up
    a sandbox environment in a locked-up network zone.


    AI specialists and managers must never forget two reasons why to secure their
    systems. The first one is to ensure that their data remains confidential and to
    guarantee data integrity and their systems’ availability. They are responsible,
    even though they can or have to build on some security services.


    The second reason why AI organizations must harden their systems is to prevent
    “**spilling over**” effects. A successful attack, for example, on a single (web)
    application, must never put the attacker in the position to take over effortlessly
    also the AI runtime server or the AI training environment – or experimental systems.
    No security organization can guarantee that. It is the ultimate responsibility
    of every member of the AI organization.


    We conclude the discussion about responsibilities with a final remark about AI
    organizations using **public cloud services** . It is a booming topic, which means
    that governance and responsibilities are less elaborated than for traditional
    data centers. The AI organization should clarify with the security organization
    whether they are allowed to use the intended cloud services. Furthermore, they
    should also clarify whether the security organization provides the standard security
    services for the envisioned cloud environment. Otherwise, the AI organization
    might have to set up and manage the cloud security all by themselves – or risk
    that auditors shut down their environment.


    ## Mapping the Risk Landscape


    The rise of AI and its contribution to business-critical processes transform organizations
    – and creates new risks. What if attackers manipulate AI features or steal data
    or models? AI is a new domain for many risk and security specialists, but the
    methodology remains the same. First, understand the threat actors and their motivations,
    aims, and capabilities. Second, identify assets attackers might attack or try
    to steal. Third, understand scenarios and what attackers aim for. Fourth, and
    finally, filter for likelihood and potential impact to identify the relevant risks.
    Figure [7-4](#516372_1_En_7_Chapter.xhtml#Fig4) illustrates these steps. We take
    a closer look at them in the following.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig4_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig4_HTML.png)


    Figure 7-4


    From Threats to Risks for AI Organizations'
  trans: '

    除了治理功能外，许多安全组织还提供安全服务——AI 组织内外的应用所有者都能从中受益。其中一种服务类型是**集中式安全服务**。这些服务针对公司特定的通用任务进行处理和解决。它们涉及保护公司边界——防火墙、数据丢失防护工具、扫描传入文件中的恶意软件——或检查与补丁相关的问题及（操作系统级别的）漏洞。


    相比之下，**协作式安全服务**需要 IT 安全交付团队与应用所有者之间的紧密协作。身份与访问管理（IAM）或 Web 应用防火墙（WAF）就是例子。两者都需要针对每个应用进行定制。IAM
    系统只有了解角色，并且 AI 平台能够与 IAM 解决方案进行技术交互时，才能管理对 AI 平台的访问。复杂的 WAF 需要经过训练，以微调其规则，从而学习
    AI 运行时服务器可能接收到的所有合法请求。


    换句话说，与集中式安全服务不同，协作式安全服务要求 AI 组织执行专门的任务来保护 AI 系统。负责设置托管 AI 平台和基础设施的集成工程师，有责任确保其安全。上线后，AI
    组织的应用管理和运维专家必须在未来几年内保持其系统的安全性。AI 管理层可以确保数据科学家和工程师不会因安全相关任务而分心，从而保持 AI 组织的生产力。只有一个重大例外：个人非托管安装和应用。当
    AI 专家安装系统时，无论系统运行在服务器上还是云端，他们都必须确保其安全。


    **实验性安装**会带来特殊风险，尽管有时确实需要它们。数据科学家或工程师会不时尝试新工具。他们在笔记本电脑或虚拟机上安装这些工具，并执行一些用例，可能涉及实际的公司数据。一个典型的误解是，这类系统与组织的整体安全态势无关，因为它们只是实验性的。但事实恰恰相反，尤其是（但不仅限于）当它们包含实际数据时。实验性安装通常不如生产系统那样安全。因此，黑客可能更快地攻陷此类实验性系统，并利用它们攻击其他应用以及窃取机密数据。如果保护此类系统不可行，唯一的解决方案是在隔离的网络区域中设置一个沙箱环境。


    AI 专家和管理者绝不能忘记保护其系统的两个原因。第一个是确保数据的机密性，并保证数据的完整性以及系统的可用性。他们负有责任，即使他们可以或必须依赖某些安全服务。


    AI 组织必须强化其系统的第二个原因是防止“**溢出**”效应。例如，对单个（Web）应用的成功攻击绝不能使攻击者能够轻松接管 AI 运行时服务器或 AI
    训练环境——或实验性系统。没有任何安全组织能保证这一点。这是 AI 组织每个成员的最终责任。


    我们以一个关于使用**公有云服务**的 AI 组织的最终说明来结束关于责任的讨论。这是一个热门话题，这意味着其治理和责任划分不如传统数据中心那样完善。AI
    组织应与安全组织确认是否允许使用预期的云服务。此外，他们还应确认安全组织是否为预期的云环境提供标准安全服务。否则，AI 组织可能不得不自行设置和管理云安全——或者冒着审计人员关闭其环境的风险。


    ## 映射风险格局


    AI 的崛起及其对关键业务流程的贡献正在改变组织——并带来新的风险。如果攻击者操纵 AI 功能或窃取数据或模型，会发生什么？AI 对许多风险和安全专家来说是一个新领域，但方法论保持不变。首先，了解威胁行为者及其动机、目标和能力。其次，识别攻击者可能攻击或试图窃取的资产。第三，理解攻击场景以及攻击者的目标。第四，也是最后，根据可能性和潜在影响进行筛选，以识别相关风险。图
    7-4 展示了这些步骤。我们将在下文详细探讨它们。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig4_HTML.png](img/516372_1_En_7_Fig4_HTML.png)


    图 7-4


    从威胁到 AI 组织的风险

