  trans: '

    # 5. 构建一个人工智能交付组织


    当人工智能要撼动你的公司时，零星的几个项目是行不通的。你需要一个稳定的人工智能组织，随时准备介入、提供帮助，并推动公司向数据与人工智能驱动型企业转型。这一目标对数据科学家和整个人工智能组织都有影响。他们必须拓宽视野，将重心从项目和模型转移到为组织内部进行人工智能的“国家建设”上来。任务就是：构建一个持久的人工智能组织。


    构建人工智能组织始于识别（内部）客户并确保资金支持。客户意味着组织内部存在一些管理者，他们面临可以用人工智能解决且愿意用人工智能解决的挑战。你必须说服他们，你的人工智能组织技术过硬，理解他们的业务挑战，并能帮助他们实现目标。一个人工智能组织不能只关注技术，或者只存在于少数分工高度细化的大型企业中。从理解业务问题到为具体场景提供解决方案，这种端到端的视角是与客户合作成功以及获得资金支持的关键。


    当你初涉公司政治时，尤其要留意两种支持你的管理者。一位*赞助者*会帮助你为你的服务提供资金。她有预算，或者能帮你从其他人那里获得资金。另一方面，一位*非物质支持者*会告诉你，你、你的想法和你的创业精神有多么出色。然而，她没有钱，也不会为你争取任何预算。


    一旦人工智能组织确保了资金，团队就必须交付承诺的人工智能项目，并梳理和运行其人工智能基础设施。花费数月时间评估技术和细化所有技术概念，很少能符合企业的期望。相反，赞助者和高级管理者希望看到人工智能组织能带来实质性的商业价值。


    本章通过阐述以下三个方面，帮助管理者成功应对这些挑战：


    -   塑造人工智能服务，即讨论（人工智能）服务的典型要素以及存在哪些选择。

    -   审视运行项目以创建卓越人工智能模型的人工智能组织所面临的组织挑战。

    -   详细说明人工智能运维的组织需求，这些运维需要长期运行人工智能模型，例如，作为解决方案代码的一部分或在专用的人工智能运行时服务器上运行。


    这种主题组合有助于管理者准备他们的服务提案，并在高级管理层批准概念并确保资金后，实施实际的服务组织。


    ## 塑造人工智能服务


    就个人而言，我一直很喜欢与团队和管理者一起在 IT 部门内塑造服务。你会与工程师、管理者和客户进行大量讨论，从而加深你对主题和组织的了解。这就像歌德的《浮士德》中所追求的：“……理解是什么将世界的核心联系在一起，看清它的一切运作和根源。”


    ### IT 服务特性


    “服务”是这样一个术语：大多数人对它的理解更多是直觉性的，而非精确的。然而，精确的理解有助于设计人工智能（及其他）服务。大约二十年前，乔·佩帕德详细阐述了
    IT 服务的主要特性。它们是：无形性、人为因素、生产与消费的同时性，以及无法预先演示。


    **无形性**反映了服务不会产生任何你可以触摸到的实物。相反，服务是关于某人为某事做某事，这可能会改变有形或数字资产。


    人工智能团队通常会创建、部署和维护数字资产：人工智能模型、应用和使用模型时以列表形式呈现的推理结果、用于数据清洗和准备的代码，或者将模型集成到复杂解决方案中时的接口配置。此外，人工智能团队还可能提供沟通密集型的咨询（例如，帮助内部客户明确人工智能应解决的问题），或为与模型及其集成相关的技术事件提供支持。


    **人为因素**反映了人们的互动与协作。专业地处理客户互动，对于避免客户不满与成功解决问题同样重要。数据科学家通常比他们的许多客户拥有更多的学术成就。尽管如此，他们必须耐心地解释主题，用易于理解的语言沟通，重视内部客户的业务知识和经验，并表现出对应用场景的兴趣和理解。


    第二个经常被忽视的方面是客户方需要做出建设性贡献。假设人工智能运行时服务器与销售活动管理系统之间的集成出现问题。活动管理系统的所有者或管理者不能简单地指责人工智能团队，并拒绝在自己这边进行调试。与客户合作的资历和经验有助于处理此类情况。


    **生产与消费的同时性**意味着服务的提供和消费通常同时发生。如果医生给我做检查，我必须到场。人工智能服务也是如此。当人工智能模型或接口出现故障时，人工智能团队必须尽快开始处理问题。此类事件不能等待，这种支持服务也无法提前准备并“入库”。根据具体请求的不同，这种同时性会有所放宽。创建一个人工智能模型是一项需要数周的任务。你可能不想在八月份生成一份客户名单，用于在十二月初向他们发放圣诞树优惠券。你必须在十一月或十二月做这件事，尽管早一天或晚一天差别不大。


    这种同时性对人工智能组织有两个影响。首先，管理层必须确保人工智能团队始终有适量的工作——既不能太多，也不能太少。其次，虽然对人工智能模型等数字资产可以进行主动质量控制，但对于人际互动则无法进行主动质量控制。培训数据科学家如何与客户打交道是一项重要措施。然而，当数据科学家对客户大喊大叫时，你无法在影响客户之前对互动进行“质量控制”。你只能在事后进行“损害控制”。


    **无法预先演示**。通常不可能在合同签署和服务建立之前演示一项 IT 服务。你无法试驾一项 IT 或人工智能服务。人工智能经理或数据科学家可以解释基于新人工智能模型的销售团队的成功案例。尽管如此，这种故事叙述并不能完全等同于现场演示，例如，演示人工智能能为优化发动机的团队带来的好处。


    IT 和人工智能服务的特性对**人工智能组织**有明确的影响。如前所述，由于人工智能服务的生产与消费同时性，人工智能经理必须仔细平衡潜在的人员配置需求与因项目取消或延迟造成的工作缺口。具有咨询或
    IT 服务提供商背景的管理者会觉得这显而易见。对于具有更多学术背景的员工来说，这是一个新的方面。另外两个影响是相似的——对顾问来说显而易见，对其他人来说则更令人惊讶。人工智能团队成员需要具备人际交往能力，以实现富有成效的日常互动，尤其是与客户互动的团队成员。最后，当人工智能组织需要识别新项目时，由于人工智能服务的无形性和无法预先演示的特性，人工智能经理的获取客户技能至关重要。然而，确切的要求和需求因项目而异，因服务而异——尤其是在具有不同企业文化和组织结构的公司之间差异更大。

    '
- fmt: '### AI Service Types


    Creating an AI model for identifying the best city to build the next shopping
    mall vs. running and developing an AI component for a webshop suggesting customers
    the next best item to buy – these are two completely different services. One is
    an AI project (service); the other requires a stable AI operations service.


    Projects – `AI projects` and others – have clearly defined goals and deliverables
    with set due dates and transparent effort estimations. Delivering “on time and
    in budget” is the aim of all project managers.


    The core deliverable of an AI project is one (or more) AI model(s) complemented
    by secondary deliverables. One typical secondary deliverable is an inference result,
    such as a list for bank advisors as to which customers they should call to sell
    a new investment fund. The list gets created by applying the AI model to the customers’
    buying history. Another type of secondary deliverable is an analysis and explanation
    of an AI model pointing out and listing the (input) parameters with the highest
    impact on the overall result, for example, the carbon content or the exact heat
    when modeling steel production in a blast furnace.


    AI projects need strong collaboration between AI specialists and employees from
    the line organization in the business to succeed. The latter have the required
    business know-how; they have to share it and must be willing to discuss and answer
    questions from the data scientists about the semantics of data or the exact business
    need and the business meaning of results.


    The second service type consists of the `AI operations services`, which come in
    two variants. The first is integrating an AI component into a software solution.
    The software components trigger inference by the AI model whenever needed. There
    is no human involvement. The second variant of AI operational service requires
    data scientists or IT specialists to generate AI inference whenever needed or
    periodically, for example, every month. An operations engineer might generate
    a list of potential buyers of neon-orange handbags not only once but every month.


    The AI organization has to balance the costs for automation with the costs for
    manual inference execution and handling customer requests – plus consider the
    operational risk of, once in a while, mixing up whom to send coupons for neon-orange
    handbags and whom for Ascot ties. Furthermore, even if the goal is complete automation,
    the second variant fits the minimum valuable product (MVP) concept: getting the
    solution to work and providing first results before working on advanced features
    such as full automation.


    In any case, and in contrast to projects, AI operations services are a long-term
    commitment for many years. An AI operations service requires running and maintaining
    an AI platform, self-developed code, and interfaces and monitoring the model quality.
    From time to time, retraining the model is necessary, requiring short projects.
    Thus, an AI operations service needs (some) AI knowledge, but in general, running
    and maintaining an AI component is a standard IT operations topic. Data scientists
    are essential for model-related challenges. However, IT operations and application
    management specialists can take over all other tasks.


    AI operations services have different collaboration patterns compared to project
    services. Projects require close interactions for efficiency. In contrast, operations
    services minimize interactions for cost reasons. They prefer asynchronous, highly
    structured, and standardized interactions: ticketing and workflow systems, not
    emails, phone calls, and in-person support. We discuss this topic in more detail
    later. Furthermore, Table [5-1](#516372_1_En_5_Chapter.xhtml#Tab1) summarizes
    AI project and operations services’ characteristics and compares them.


    **Table 5-1** Comparing AI project services and AI operations services


    | | AI Project Services | AI Operations Services |

    | --- | --- | --- |

    | Goals and Deliverables | Create an AI model and either apply it once (or a few
    times) or analyze the model | Ensure that an AI team or an AI component continuously
    delivers AI inference results |

    | Duration | Limited. Projects end once all deliverables are provided | Long-running,
    ongoing service, usually a few years |

    | Duration | Single, defined project with clear deliverables | Typically several
    years |

    | Scope | Create an AI model and apply the model on data once or a few times or
    analyze the insights the model provides. | Frequent manual inference or running
    and maintaining an AI component with an AI model, monitoring the AI model for
    degeneration, trigger an AI model retraining |

    | Interaction Pattern | Close collaboration between business and AI specialists
    | Mostly ticketing system |'
