  trans: '

    ### 从范围界定问题到商业案例


    范围界定问题有助于 AI 项目经理在邀请资深数据科学家和软件架构师（或外部供应商）制定高层级项目计划之前，厘清诸多细节。


    此阶段的项目计划需确定主要里程碑和潜在有价值的中间交付物，例如最小可行产品。它应说明各里程碑大致何时能实现，并列出所需资源。资源涵盖需要多少名具备特定技能的工程师，并可能指出关键岗位的内部候选人。资源同样包括外部人员、许可证和计算基础设施（无论是内部服务器、高性能笔记本电脑还是公有云资源）的财务预算。


    制定项目计划和所需资源是项目经理处理非 AI 和 AI 项目的标准流程。通常，他们必须遵循公司特定的强制性规则和流程，并填写标准模板。


    仅包含项目计划和费用的商业案例是不完整的。管理层同样希望了解收益和潜在的投资回报。前一章节已更详细地介绍了 AI 项目的潜在收益。


    最终，重要时刻来临。高级经理或管理委员会将根据你的商业案例，决定作为 AI 项目经理的你能否获得项目资金。通过明确的范围、令人信服的高层级项目计划以及针对性的详细商业收益，你可以最大化成功几率。如果获得资金，数据科学家们将乐于准备并着手开发预期的
    AI 模型——他们的核心项目交付物。


    ## 理解 AI 模型


    AI 模型旨在解决特定的、狭窄的问题。一个模型可能以闭路电视录像作为输入，并输出摄像头上的“移动物体”是无害的猫还是潜在的窃贼。半个多世纪以来，AI 领域的研究和工程提出了多种生成此类洞察的方法。它们主要分为两大类：计算智能和符号人工智能。


    基于符号人工智能的解决方案显式地表示知识，例如使用一阶逻辑或形式语言。这些系统拥有对其符号知识进行操作的形式化规则或操作。这类系统在我上世纪 90 年代末上大学时很流行。因此，一些读者可能熟悉该领域某些概念和语言的名称，例如`状态空间`、`手段-目的分析`、`积木世界`、`专家系统`或`Prolog`和`Lisp`。


    一个易于理解的示例如下`Prolog`代码片段。系统知道一个小群体中谁喜欢谁的一些事实：


    ```

    /* 让我们从一些事实开始…… */

    likes(peter, john) /* 彼得喜欢约翰*/

    likes(peter, andrea) /* 彼得喜欢安德莉亚*/

    likes(peter, sophie) /* 彼得喜欢苏菲*/

    likes(john, peter) /*约翰喜欢彼得*/

    ```


    推理规则生成新知识并驱动系统的推理。在此示例中，一条规则将朋友定义为相互喜欢对方的两个人。


    ```

    /* 定义友谊的规则…… */

    friends(x, y) :- likes (x,y), likes (y,x)

    ```


    向`Prolog`提出查询即启动推理过程。系统尝试证明或反驳一个陈述（安德莉亚和约翰是朋友吗？），或确定使查询成立的值（彼得的朋友是谁？）。


    ```

    /* 让我们提出查询，让系统进行一些推理…… */

    ?- friends(john, andrea)

    No

    ?- friends(peter, X)

    X = john

    ```


    如今，第二大 AI 方法组——计算智能——要流行得多。它以完全不同的方式处理知识和事实的表示、推理以及洞察生成。计算智能方法将信息或事实存储为数字。没有显式的知识表示。洞察生成意味着对大型矩阵进行乘法和操作。


    图 2-7 提供了一个示例。输入图片是一个大型矩阵，其中的数字代表颜色和亮度。然后系统实现矩阵运算——即推理和洞察生成。该图包含了第一个矩阵运算，即对单元格值进行平均以减小矩阵尺寸。经过更多矩阵运算后，系统会判断该图像是汽车、卡车、船只还是飞机。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig7_HTML.png](img/516372_1_En_2_Fig7_HTML.png)


    图 2-7


    计算智能：通过数字表示图像内容，后续处理也基于数值运算，本例中通过计算输入作为第一步处理和推理步骤。（图片来源：[`​pixabay.​com/​photos/​vw-beetle-oldtimer-classic-1396111/​`](https://pixabay.com/photos/vw-beetle-oldtimer-classic-1396111/)）


    计算智能算法是企业当前 AI 革命的核心。虽然数据科学家知道在何种情境下使用何种算法和方法，但 AI 项目经理需要基本理解，以便在“完成定义”或质量保证讨论中做出贡献。对众多算法感兴趣的读者，可以在各种以算法为中心的
    AI 教科书中找到详细论述。


    下文我们将聚焦于两个示例：一种老式的统计方法（有些人甚至可能不认为它是 AI）和深度学习神经网络。对于后者，我们将介绍基本的神经网络概念并讨论高级拓扑结构。这些算法需要一些入门级数学知识，但即使没有，理解其精髓也是可能的。

    '
- fmt: '### Statistics-Based Models


    Mathematicians and statisticians developed various algorithms over the last decades
    and even centuries. Many work perfectly for table-based Excel-like input data,
    typically available in ERP or core banking systems. We focus on one algorithm
    and just look from a high level: linear regression. Suppose an online marketplace
    for secondhand cars wants to incorporate a “fair price” feature. It should make
    deals smoother by fostering trust between car dealers and customers by suggesting
    a “fair price” to the contract partners. Therefore, the marketplace needs algorithms
    to estimate, for example, the market price for a Porsche 911 3.8 Turbo Cabrio.


    In the first step, the model might consider only one input parameter for price
    estimations: the car’s age. Since we use linear regression, the mathematical function
    to determine the car price is a linear function:


    ![$$ Price\left( Age\; of\kern0.17em the\; Car\right)={a}_1\ast age+{a}_0 $$](images/516372_1_En_2_Chapter/516372_1_En_2_Chapter_TeX_Equa.png)


    Once we know the price of two car sales – for example, 153,900 EUR for a 12-month-old
    car and 124,150 Euro for a 28-month-old one – we put these two data points in
    a diagram and draw a line through them. The line is a linear function for our
    car-price estimation (Figure [2-8](#516372_1_En_2_Chapter.xhtml#Fig8), left).


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig8_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig8_HTML.png)


    Figure 2-8


    Using Linear Regression for Price Predictions


    However, a good pricing model needs hundreds or thousands of data points. Figure
    [2-8](#516372_1_En_2_Chapter.xhtml#Fig8) (right) illustrates this. The example
    contains many data points, meaning the model accuracy should be good. However,
    it is (nearly) impossible to draw a line going through all data points if you
    have more than two. So, how can linear regression help? Basically, there are two
    needs:


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig9_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig9_HTML.png)


    Figure 2-9


    Least Squares Illustrated with Two Estimation Functions (Dotted and Dashed Lines).
    The Algorithm Calculates for Each Data Point the Derivation Between Prediction
    Value and Actual Data (Residual). Then, the Algorithm Squares the Residuals and
    Sums Them Up. The Result Is 118 for the Dotted and 168 for the Dashed Line. Thus,
    the Dotted Line Is the Better of the Two. However, an Even Better One Might Exist
    and Requires Additional Experimentation


    *   An error metric measuring how good a function reflects reality. A metric makes
    two or more estimation functions comparable. We can measure which of them estimates
    sales prices better. A widely used metric for that purpose is “least squares”
    (see Figure [2-9](#516372_1_En_2_Chapter.xhtml#Fig9)).

    *   An algorithm that systematically or randomly tries out various values for
    parameters such as `a[0]` and `a[1]` in the example. Using the error metric, it
    calculates the quality of a specific parameter setting. It readjusts the parameters
    and calculates the error again – until the algorithm decides to terminate the
    optimization and returns the best values for `a[0]` and `a[1]`.


    We already mentioned two impact factors for model quality: the learning algorithm
    and the size and quality of the training data set. Similarly important are which
    attributes the model incorporates. In our example, the fair-price estimation function
    for cars considers just one attribute: the age of a vehicle (`v[1]`). The function
    is insufficient even if trained with millions of sales data points. The reason:
    various other factors impact the price of a car as well significantly, for example,
    the number of driven kilometers (`v[2]`), whether the vehicle was involved in
    a heavy accident (`v[3]`), has air conditioning (`v[4]`), or a high-end music
    system (`v[5]`). As a result, we get a more complex price estimation function
    to optimize:


    ![$$ Price\left({v}_5,{v}_4,{v}_3,{v}_2,{v}_1\right)={a}_5\ast {v}_5+{a}_4\ast
    {v}_4+{a}_3\ast {v}_3+{a}_2\ast {v}_2+{a}_1\ast {v}_1+{a}_0 $$](images/516372_1_En_2_Chapter/516372_1_En_2_Chapter_TeX_Equb.png)


    The underlying assumption for such a linear regression function is that the nature
    of the problem is linear. However, used car price estimation functions are **not
    linear**. The value of a car drops heavily when a car dealer sells it the first
    time to a customer. The price decline slows down afterward, and, usually, the
    sales price does not get negative. Depending on the problem’s nature, replacing
    the linear estimation function with a different (more complex) mathematical function
    results in better estimations.


    Another algorithm similar to linear regression is **logistic regression**. Logistic
    regression helps for classification tasks such as deciding for specific credit
    card payments whether they are fraudulent. Usually, a function such as the sigmoid
    one is applied in the end to provide a classification value between 0 and 1 (see
    Figure [2-10](#516372_1_En_2_Chapter.xhtml#Fig10), left). If the value is 0.5
    or higher, it might be a yes, otherwise a no.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig10_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig10_HTML.png)


    Figure 2-10


    Sigmoid Function (left) and Rectifier – or ReLU, Rectified Linear Unit – Function
    (left)'
