    AI model-based decision-making better.'
  trans: '

    ### 局部可解释性


    局部可解释性旨在理解影响单个预测的参数。为什么这栋房子这么贵？是因为浴室数量、花园面积，还是游泳池？局部可解释性并不旨在理解总体上是什么影响了市场上的房价，而是试图理解是什么对某一栋特定房子的价格影响最大。实现局部可解释性的一种方法是创建并分析一个更简单且可解释的模型。这个模型能够很好地描述神经网络在兴趣点附近（！）的行为，但忽略了其余部分。


    更详细地说，起点是一个逼近现实的神经网络。数据科学家构建这个模型，例如，使用包含去年房价的数据集（图 4-6）。这个神经网络可能能很好地预测房价，但人类无法理解。当查看神经网络及其权重时，我们无法理解什么对模型影响最大，或者对于
    80 平方米和 200 平方米的房子（图 4-6 中的 A 和 B），尺寸的微小变化是否重要。因此，为了实现局部可解释性，数据科学家针对他们想要理解的每个预测值执行三个步骤：


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig6_HTML.png](img/516372_1_En_4_Fig6_HTML.png)


    图 4-6


    基于在兴趣点附近用线性函数逼近模型行为的局部可解释性


    1.  **探测**。数据科学家需要训练数据来创建 XAI 模型。因此，他们在兴趣点附近探测神经网络模型。在图 4-6 中，他们会分别查找模型预测的房价，例如，对于
    79 平方米、80 平方米、80.5 平方米和 82 平方米（情况 A），以及 185 平方米、203 平方米和 210 平方米（情况 B）。


    2.  **构建可解释模型**。数据科学家使用步骤 1 中的数据探测结果来训练一个新模型。这个新模型估计神经网络在 A 点和 B 点附近的行为。核心思想是使用一个简单的估计函数，例如线性回归。预测质量会降低，但线性函数易于理解。因此，在图
    4-6 中，数据科学家为两个兴趣点 A 和 B 创建了两个独立的线性函数。


    3.  **理解与解释**。步骤 2 中的线性逼近函数使我们能够理解 A 点和 B 点附近的局部情况。在情况 A 中，房屋面积的变化对价格影响很大，但在情况
    B 中影响不大。对于具有更多输入特征（不仅仅是居住面积，还包括花园面积、浴室和车棚数量，或者房子是否有阳台或室外游泳池）的模型，解释显然会更加丰富。


    给数学基础较强的读者一个提示：关键不仅仅是计算梯度，而是在兴趣点周围进行探测。这种方法可以减少局部扰动和噪声恰好位于兴趣点上的影响，而这些扰动和噪声在附近区域可能并不存在（图
    4-7）。


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig7_HTML.png](img/516372_1_En_4_Fig7_HTML.png)


    图 4-7


    使用梯度与基于区域探测的线性回归来逼近局部行为


    总结：局部可解释性能够识别——对于具体的预测——改变哪些参数最能改变预测结果。它帮助房主弄清楚，对于他们各自的房子，是增加一个游泳池还是停车场更能提升房屋价值。


    ### 全局可解释性


    与局部可解释性相反，全局可解释性不关注单个预测。它追求的是不可能之事：向人类解释一个本质上过于复杂而无法理解的神经网络及其整体行为。一种著名的算法是排列重要性。排列重要性决定了各种输入特征对给定模型预测的影响。


    该算法遍历所有输入列。每次迭代都会打乱表格中某一特定列的值（图 4-8，➌）。准确率下降得越多，被打乱的单个特征就越重要。例如，通过比较打乱`sex`列和`zip`列后的准确率，数据科学家可以理解`sex`对顾客购物习惯的影响比邮政编码更大（图
    4-8，➍）。


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig8_HTML.png](img/516372_1_En_4_Fig8_HTML.png)


    图 4-8


    理解排列重要性


    可解释人工智能是一个高度动态的领域，每年都会涌现许多新想法。然而，由于监管压力以及社会期望企业行为合乎道德，如今的商业产品已经实现了 XAI 功能，这从所有大型云服务提供商——谷歌云、微软
    Azure 和亚马逊 AWS——身上可以得到证明。看到小众研究迅速成为主流并对许多公司产生重要影响，这令人着迷。


    ## 总结


    在企业环境中，关于人工智能使用的伦理讨论由三个问题驱动：


    -   设想的用例在伦理上是否可以接受？我们是否应该且想要创建和使用这个 AI 模型？

    -   我们是否按照伦理标准来设计模型？例如，我们是否为了更快获得结果而以不当方式使用数据？

    -   AI 模型本身是否合乎伦理？特别是，模型是否无偏见且公平？


    虽然无偏见的 AI 模型往往与商业目标一致，但其他伦理方面需要平衡伦理上的期望与商业上的必要性——并且制定明确的职责划分程序可以减少团队和个人之间激烈冲突的风险。


    然而，关于人工智能的伦理讨论已经走出了学术界。政策制定者正在积极制定人工智能监管法规。人工智能监管不仅仅关乎伦理。经济方面以及促进创新和全球竞争力也同样重要。然而，伦理因素对人工智能监管有着重大影响。


    数据隐私法已实施多年，但欧盟的《通用数据保护条例》彻底革新了关于我们如何存储、管理、处理和使用数据的法规。布鲁塞尔正在酝酿一项《人工智能法案》，这很可能会影响我们未来开发和部署
    AI 模型的方式。在美国，联邦贸易委员会正在为人工智能的新世界重新解释现有法律。


    例如，联邦贸易委员会要求银行列出导致拒绝信贷的四个关键因素。在基于规则决策的传统世界中，这是一个简单的任务，但如果使用拥有数千个节点和权重的神经网络，这就变成了一个挑战。难怪“可解释人工智能”会成为学术界和大型云服务提供商的热门话题。例如，全局可解释性识别出对整体模型行为最重要的输入因素。另一方面，局部可解释性则关注影响单个预测的最主要因素。观察联邦贸易委员会的要求、学术研究以及大型科技公司
    AI 服务创新如何追求同一个目标——更好地理解基于 AI 模型的决策——真是令人大开眼界。

