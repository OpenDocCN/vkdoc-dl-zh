- fmt: '### Designing (for) and Measuring Service Quality


    You work hard and go the extra mile. Still, your customer, boss, or a friend of
    yours is dissatisfied with the result and expresses his or her emotions brutally
    direct. It is frustrating in private life as well as in a business context. It
    can happen as well with AI teams and their internal customers and stakeholders.
    However, AI managers can reduce the risk of friction when understanding the various
    service quality layers (Figure [5-3](#516372_1_En_5_Chapter.xhtml#Fig3)).


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig3_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig3_HTML.png)


    **Figure 5-3** Designing and Understanding Service Quality


    Customer satisfaction for AI (and non-AI) services depends on the perceived service
    quality regarding:


    *   *what* the service delivers (pivotal elements) and

    *   *how* it is delivered (core and periphery elements)


    Indeed, the **expectations** depend on **objective needs** and requirements, for
    example, to boost sales for a specific mobile subscription. The image and reputation
    of the AI team impact the expectations, so do experiences from previous interactions.
    These are **subjective influence factors**. Customers and users form an expectation,
    based on these various factors, what they expect from the service. They compare
    the *expected* service with the one they *perceive* being delivered. Customer
    satisfaction does not (only) depend on how well the AI team delivers a service
    based on *their* standards and guidelines. It depends on customer expectations
    and customer perception, too.


    On the service delivery side, there are three different **service quality layers**.
    The starting point is the *perception* of customer needs and wishes. The next
    step is to *design* a service that meets these customers’ needs. Then, the designed
    service is implemented and *delivered* by the AI team. Misunderstandings can happen
    in each step, impacting the overall adequacy of the service to meet customer expectations.
    As mentioned before, there is the customer perception of the delivered service,
    too. And, as always, some customers see a half-full glass, others a half-empty
    one.


    The implication of this layered model based on various decades-old research on
    service quality from Grönsroos, Parasuraman, and Philip and Hazlett are threefold:


    1.  A stringent service design and experienced data scientists creating high-performing
    AI models are crucial.

    2.  Excellent PowerPoint slides about how the service works are not sufficient.
    An AI manager, an AI translator, a team lead, or consultants must work together
    with the delivery team to implement the concepts in a working organization. They
    have to check whether the service concept works in reality.

    3.  Managing stakeholder and customer expectations is a crucial part of the job
    for AI managers. Gaps are easier to handle before a project has started and while
    it is in progress than after burning all the budget.


    These three guiding principles sound familiar, trivial, and evident for seasoned
    IT service managers and professionals with an IT or management consulting background.
    However, they help highly technical experts being in a lead role the first time
    and helps them make all painful experiences themselves. Running a service is a
    combination of communication and commitment. Based on my service design experience,
    writing down the key points of the service for potential customers helps. What
    do you do, and what are the limitations? It does not make additional communications
    obsolete. It fosters discussing needs and expectations – and prevents wrong assumptions
    on the customer side.


    ## Managing AI Project Services


    AI projects train AI models and derive actionable insights such as a target list
    of potential buyers for sales or typical buyers’ characteristics for product managers.
    Managing an organization running many such projects requires awareness of the
    distinct workload patterns, understanding cost structures for preparing budgets,
    and communicating the results to the customers. First of all, however, an AI organization
    has to understand the needed capabilities.


    ### The Capabilities Triumvirate for AI Project Services


    The term “capability” comes from enterprise architecture. It helps to express
    what an organizational unit can do. It does not mean that an organizational unit
    has just the theoretical knowledge to take over tasks. Having a capability means
    that skilled staff, tools, process definitions, and methodologies are in place.
    The organizational unit, a team, or the AI organization must be able to perform
    or performs already the tasks successfully today.


    Following the CRISP-DM methodology and going through all the stages for creating
    an AI model (i.e., without the deployment phase that is more an operations and
    less of a project task), we can identify all capabilities an AI project services
    organization needs (Figure [5-4](#516372_1_En_5_Chapter.xhtml#Fig4)).


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig4_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig4_HTML.png)


    **Figure 5-4** Capabilities – A CRISP-DM-Centric Perspective


    The **core capability** is **data science** know-how. It is the base for creating
    an AI model in the “modeling” phase and assessing the AI model quality in the
    “evaluation” phase. It is the most apparent capability for AI organizations. Often
    underestimated are the two additionally needed capabilities of “AI translator”
    and “data engineering,” though they require more time and effort in nearly all
    projects.


    AI organizations need the **data engineering capability** for the “data understanding”
    and “data preparation” phases for performing the following tasks:


    *   Organizational challenges such as getting permissions of data owners to use
    their data

    *   The data transport: users and permissions, network bandwidth, transfer tools

    *   Understanding the data model and the semantics of the data

    *   Analyzing the data quality


    The distinction between data engineering and data science capabilities is essential
    for staffing. Superheroes that can do everything are rare and expensive. Most
    companies have specialists who know `SQL` and one or more of the company’s databases.
    They are highly efficient in preparing data exports. They can take over data cleansing
    and preparation without in-depth math, machine learning, or AI know-how. They
    are helpful in each AI organization, especially if they know data sources well.
    While they need to interact with data scientists to perform their tasks, they
    help the AI organizations by freeing up data scientists so that they can focus
    more on creating and optimizing AI models.


    The third and last **capability** needed for AI projects is the AI translator.
    He understands the business question and formulates an AI task and presents the
    results to and discusses them with the business. He understands the types of insights
    AI models provide and should have a basic understanding for making some rough
    effort estimations. He does not have to be able to create and optimize models.
    The role is similar to business analysts in classic software engineering: understanding
    commercial challenges, asking the right questions when talking with users and
    customers, presenting results to the management, and writing high-level specifications.
    No software project sends its `Java` gurus to the C-level to discuss the strategic
    goals for the software development project. Neither should an AI manager send
    highly skilled and specialized data scientists.'
