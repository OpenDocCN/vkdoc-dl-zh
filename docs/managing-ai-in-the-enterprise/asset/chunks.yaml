    their experiences and from our discussions, giving me fresh and alternative perspectives.
    They were vital for enhancing my methodology repertoire, too.


    A special thanks also to Max Smolaks from AI Business. He published various articles
    from me, which eventually became the foundation for multiple chapters. Without
    his encouragement, I might not have written this book.


    About the Author About the Technical Reviewer


    # 1. Why Organizations Invest in AI


    In some companies, managers seem to have a pact with AI service and software providers
    to treat AI as magic: No one understands what happens, but AI promises to deliver
    exactly what everyone hopes for, even if nobody knows what the result should be.
    Data scientists love such projects. They can do whatever excites them most – at
    least until some higher-level manager pulls the plug and terminates the project.


    Such project failures root in mixing two aspects: first, what gets managers interested
    and, second, which projects deliver value to the company. Getting managers interested
    is simple because they have no other choice. The *Harvard Business Review* ran
    several articles about AI and data-driven organizations, catapulting this topic
    to the board level. CEOs and COOs want and have to transform their organization.
    The challenge is the second part: shaping and delivering a successful AI project.
    Here, the CIO’s role is to build and run the technical foundation, for example,
    AI and data management capabilities. The excellent news for IT is that funding
    is guaranteed under such circumstances. Instead, they face a different challenge:
    identifying the right software products, services, and partners in a fragmented
    market. It feels like an AI gold rush at this very moment. Corporations invest
    and set up programs; startups work hard on innovations; consulting companies readjust
    their business. Vendors rebrand old-fashioned services to sound sexy and appealing
    in the new world.


    A complex market, new requirements, and the pressure to meet the board’s expectations
    are a daunting combination for senior managers. They face a situation similar
    to a giant puzzle with hundreds or thousands of pieces. Randomly selecting a puzzle
    piece and finding matching ones tends to be less successful than investing some
    time to get an overview first. Consequently, this chapter puts AI into the corporate
    context of a data-driven organization by answering the following questions:


    *   What are the specifics of data-driven companies, and how does AI help?


    *   How can projects and initiatives calculate the business value of AI projects
    and services? How can project managers craft a business case?


    *   How do data-driven companies innovate with AI? Typical sales use cases, and
    innovative ideas from the fashion industry illustrate how the business perceives
    AI.


    *   Why might it be a bad idea to broaden the scope of existing data warehousing
    (DWH) and business intelligence (BI) teams to cover also AI services?


    ## The Role of AI in Data-Driven Companies


    Artificial intelligence and data-driven organizations – these are probably the
    two hottest topics for most corporations at the moment. What is unique for each
    of them, what are the commonalities? C-level managers and corporate strategists
    need answers when shaping innovation and transformation programs.


    In short, the term “data-driven organization” covers two aspects – first, the
    more technical need for collecting data systematically throughout the entire company.
    Second, the organizational shift in decision-making, focusing (more) on facts
    and less on seniority. Artificial intelligence helps to make smarter decisions
    by generating insights and identifying correlations in data humans cannot find
    in a manual analysis.


    In our daily life, we use terms such as data, information, knowledge, or insights
    interchangeably. Everybody understands, based on the context, what is actually
    meant. However, precise definitions ease the understanding of data-driven organizations
    and the role of AI (Figure [1-1](#516372_1_En_1_Chapter.xhtml#Fig1)).


    **Data** is the raw form: 1s and 0s on disk, as part of a stream from an IoT device,
    or strings and numbers in databases. On this level, we know nothing more about
    the data. Data itself does not carry any meaning. It might or even might not help
    to understand the physical or digital world.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig1_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig1_HTML.png)


    Figure 1-1


    AI and Data-Driven Companies – The Big Picture


    **Information** is contextualized data. A stream of 1s and 0s becomes a video
    signal from a camera overseeing an assembly line. In a database, a string now
    represents a customer name or order ID. A number becomes the profit per year,
    another the turnover last month. Data becomes information – and has meaning now.


    In the foreseeable future, contextualization is and remains a predominantly human
    task. Automating the identification of employee or customer names or order IDs
    is straightforward. Understanding whether a table stores order IDs of open orders
    or of orders where a customer complained is much more difficult to automate. Only
    humans understand complex data model semantics. They can intellectually penetrate
    all subtleties of similar-looking, yet different-purposes serving data elements
    such as open, delivered, and returned orders.


    **Actionable insights** – also named “knowledge” – represent collections of information
    that guide decision-making. Are there irregularities on the assembly line? Which
    customers return orders most frequently? As the term “actionable insights” suggests,
    someone has to decide whether and which actions to perform – and AI delivers helpful
    or necessary input and options.


    Historically, generating actionable insights is the domain of white-collar office
    workers. Managers and analysts transform large Excel tables full of numbers into
    nice-looking diagrams. This traditional approach has two limitations. First, humans
    can only comprehend and experiment with a limited number of influencing parameters.
    Second, while there are examples for statisticians and mathematicians working
    on core business questions (e.g., actuaries in insurance companies), this is different
    for most other industry sectors. Most managers and analysts have heard about statistical
    significance at university decades ago but never applied the concept in practice.
    Thus, for turning information into actionable insights, artificial intelligence
    is revolutionary. AI models incorporate highly complex correlations, including
    non-linearities; plus, AI development methodologies emphasize robust quality control
    measures.


    As a decades-old research, development, and engineering discipline, AI has many
    facets and three often-mentioned directions or schools of thought:'
