  trans: '

    数据科学、数据工程和 AI 翻译员构成了能力三巨头，在组织使用一次性 AI 模型支持战略决策时不可或缺。图 5-5 将它们置于更广阔的背景下。数据工程与数据提供者和数据源紧密相连，确保
    AI 组织能够整合公司任何数据库中存储的尽可能多的数据。AI 翻译员则与各部门管理者合作，识别哪些战略决策可以从 AI 中受益。换言之，创建哪些 AI 模型有助于通过预测个人或群体行为来分析战略和运营挑战？


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig5_HTML.png](img/516372_1_En_5_Fig5_HTML.png)


    图 5-5


    面向咨询型 AI 服务的 AI 服务团队能力（白色方框：后续其他 AI 服务所需占位符）


    数据科学家与这两者都合作：与 AI 翻译员共同识别哪些 AI 模型对业务有益，与数据工程师协作获取所需数据。实际上，没有外部供应商的参与，这幅图景并不完整。例如，咨询公司可能接管完整的任务或项目；承包商可以扩充内部团队。此外，还有组织用于提升效率的工具供应商（包括公有云提供商）。


    为避免误解：图 5-5 列出了许多能力，但并不意味着 AI 组织应为每种能力招聘 2-3 人。它更像是一份需要分配给团队成员的任务清单。在一个大型 AI 组织中，你和其他五位数据科学家可能在一个专门的数据科学团队中工作。如果
    AI 组织只能资助两名数据科学家或工程师，那么这两人需要共同负责所有事务。因此，任何团队发展战略或招聘新专家的流程，都应综合考虑通常所需的所有能力，以及当前团队的优势和劣势。


    ## 工作负载模式


    当 AI 组织（主要）运行基于 AI 的咨询项目时，工作负载具有特定模式。这对 IT 或管理咨询领域来说很典型，但对具有不同专业背景的 AI 经理和数据科学家而言可能是新概念。处于**项目业务**中意味着要一个接一个地获取和交付项目。公司应该在超市连锁店的哪里开设下一个新分店？在向媒体和新闻界展示新车之前，我们能否最后一次改进发动机？这些项目遵循
    CRISP-DM 方法论。在几天或几个月内，数据科学家创建模型并向客户解释其影响。项目随之结束。数据科学家没有后续任务，也没有额外的项目成本。相反，对业务的好处可能才刚刚开始，例如增加收入或降低成本（图
    5-6，左侧）。当一个项目结束时，数据科学家和工程师就该转向下一个项目了。他们甚至可能使用新的、不同的技术。对于总是寻求新挑战的经验丰富的数据科学家来说，这是完美的工作方式。


    对 AI 经理而言，这意味着需要不断获取新项目。只有新项目才能证明 AI 团队对公司高层管理的重要性，并确保资金支持。一个已完成项目带来的持续节省，不足以让
    AI 组织保持其重要性。如果没有下一个项目，首席信息官可以关闭 AI 组织而不会对组织产生影响。


    一个 AI 组织（或其一部分）通常同时运行少量或大量并行项目，因为总有新项目启动，而旧项目则相继结束。图 5-6（右侧）说明了这一方面。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig6_HTML.png](img/516372_1_En_5_Fig6_HTML.png)


    图 5-6


    支出与回报模式（左侧）以及专注于咨询式 AI 咨询项目的 AI 组织的工作投入结构（右侧）


    ## 预算与成本


    仅凭“AI 主管”等令人印象深刻的头衔，不足以让 AI 经理建立起一个由数据科学家、数据工程师和 AI 翻译员组成的蓬勃发展的 AI 团队。他们需要预算来资助团队，并支付
    AI 项目的工具和基础设施费用。为了制定预算，他们必须了解 AI 项目服务的成本结构。我们首先审视单个 AI 项目的成本结构，然后拓宽视野，关注整个 AI
    组织的成本结构。


    理解两个**基本成本维度**至关重要：不可避免成本与设计成本，以及固定成本与可变成本。不可避免成本是你无法避免的成本。设计成本意味着管理层明确决定在哪些方面投入超出最低限度的资源。例如，为每位数据科学家工作站配备两到三台显示器，而不是一台。


    第二个维度区分了固定成本和可变成本。当你购买用于机器学习的服务器时，这些是固定成本。无论是否进行 AI 模型训练，都必须支付这些费用。相比之下，云中按需付费的虚拟机则是可变成本的例子。


    AI 项目具有以下由四类成本构成的成本结构（如图 5-7 所示）：


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig7_HTML.png](img/516372_1_En_5_Fig7_HTML.png)


    图 5-7


    AI 项目服务的成本结构


    *   员工和承包商的人员成本

    *   基础设施，例如员工工作场所以及用于机器学习训练的计算和存储资源

    *   AI 平台（如 SAP 或 SAS）的许可费用

    *   集中化职能


    当使用内部员工时，**人员成本**对于 AI*组织*来说是固定成本。即使员工工作量不足或无事可做，公司也必须支付他们的工资。然而，在审视*项目*成本时，人员成本是可变的。项目通常仅按内部员工提供支持的程度来支付其费用。项目总体工作量与
    AI 组织可用员工之间的不匹配是一个挑战。工作量过大因资源不足会导致项目延期；工作量不足则可能引发成本削减活动。找到合适的平衡点是 AI 经理的关键任务。应对工作量波动的一种方法是，通过使用可更快速伸缩的承包商来扩充内部员工，从而使部分人员成本变得可变。


    **基础设施成本**（除员工工作场所外）和**许可成本**对于使用云服务的 AI 项目和 AI 组织来说是完全可变的。或者，假设一个 AI 组织为其项目构建自己的
    AI 平台，那么这些成本则属于**集中化服务成本**的一部分。后者还包括用于与客户互动的专用工单系统，或用于存储文档的 SharePoint。因此，以项目为中心的
    AI 组织应谨慎控制集中化服务的成本。如果它们是固定成本，则可能成为财务负担，使得内部服务可能比外部采购的咨询服务更昂贵。

    '
- fmt: '一旦 AI 管理者了解了其成本结构，就必须确保有足够的**资金**。具体细节因公司而异，这可能是一个高度政治化的问题。我只想简要解释两种典型模式：内部服务提供者和**优先排序的赞助者**（图
    [5-8](#516372_1_En_5_Chapter.xhtml#Fig8)）。最后一种是最方便的。由一位（或几位）高级管理者提供资金。其结果是：由他选择
    AI 组织要开展的项目。谁出钱，谁点歌。如果他来自市场部门，AI 组织很可能专注于市场营销和销售主题。如果赞助者是负责潜艇研发部门的负责人，那么 AI 团队将优化与潜艇相关的挑战。图
    [5-8](#516372_1_En_5_Chapter.xhtml#Fig8) 展示了 AI 组织与优先排序的赞助者之间的典型互动。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig8_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig8_HTML.png)


    图 5-8

    具有优先排序赞助者的 AI 组织示意图


    第二种选择是内部**服务提供者预算**模式（图 [5-9](#516372_1_En_5_Chapter.xhtml#Fig9)）。这在共享服务组织中很典型。AI
    管理者必须在组织内部找到能够（至少部分）资助成本的客户。可变的、项目特定的成本很容易收取，而固定成本的融资则可能具有挑战性。在可变成本上增加一定百分比以分摊固定成本是一种典型机制。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig9_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig9_HTML.png)


    图 5-9

    服务提供者预算模式的资金


    通过这个简短的介绍，AI 管理者无需商业学位即可与他们的直线经理和客户讨论成本和资金问题。


    ### 销售成果：数据故事讲述


    触及你的受众对于书籍作者、记者、喜剧演员以及 AI 组织来说至关重要。不幸的是，今天瓜德罗普岛的气压对我们大多数人来说毫无意义。而对于那些少数居住在那里的人来说，他们更关心的是明天下午是温暖晴朗还是炎热多雨伴有雷暴，而不是气压。这是一个完美的例子，说明你能预测的东西（气压）可能对受众没有直接帮助。相反，他们想知道明天他们所在的地方是否会下雨。


    同样，数据科学家也必须了解他们的受众。他们是 AI 和机器学习算法、预测分析和统计学方面的专家，旨在从海量数据集中发现未见过的、意想不到的相关性。然而，项目结果必须满足四个标准，特别是对于帮助制定战略决策的项目：


    1.  **与受众相关**。市场部门对客户洞察和销售感兴趣，而不是优化支持功能。

    2.  **为受众提供新见解**。在 AI 项目展示其结果后，他们知道了什么？有什么新发现？预测明天中午撒哈拉沙漠不会下雪，可能不会被视作开创性的新见解。

    3.  **可操作**。结果应允许进行一些改进、优化或效率提升。显然，收益必须高于项目投资。

    4.  **引人入胜的呈现**。信息必须让受众感到好奇和感兴趣。


    这些任务很好地契合了 CRISP-DM 方法论（图 [5-10](#516372_1_En_5_Chapter.xhtml#Fig10)）。检查主题的相关性是业务理解阶段的一部分，该阶段在规划要做什么时进行，并在评估阶段重复进行。在展示结果之前，AI
    项目团队必须检查他们是否提供了相关的新见解以及这些见解是否可操作。当然，演示和书面文档也应该吸引受众。所有这些活动都极具创造性和分析性。它们是 AI 翻译者的完美任务，他们深入了解客户、用户及其业务背景。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig10_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig10_HTML.png)


    图 5-10

    数据科学家如何让业务部门听到他们的声音


    我想通过一个具体例子来说明这一点，即如何将一个模型变成一个引人入胜的故事。2020 年 7 月，一家瑞士报纸提供了一个完美的例子，展示了如何以枯燥无意义的方式呈现数据。他们报道称，联邦公共卫生办公室（BAG）宣布瑞士和列支敦士登新增
    108 例新冠感染病例。这比前一天增加了一倍多。周一有 43 例新确诊病例，周日有 99 例，周六有 110 例。


    当我们审视这四个标准时，会发现这条新闻满足了第一个标准。这条信息对瑞士的读者来说是相关的。但它提供了新见解吗？没有。读者事后并不知道这些数字是令人欣慰还是令人担忧。他们数周乃至数月来一直听说，不能直接比较每天的数字，因为某些工作日的数据会更高。因此，一条仅仅提供今天数字和过去三天信息的新闻是毫无价值的。上周每个工作日的数据能提供更好的指示。这个周二，我们有
    108 例；一周前，只有 70 例。昨天，我们有 43 例，而前一周是 63 例。虽然这听起来可能不令人担忧，但如果七天移动平均线显示每周增长 12%，情况就不同了。


    尽管如此，这些信息对大多数读者来说仍然过于抽象，无法让他们觉得相关。绝对数字太低了（726 例，对比 800 万人口）。你中欧洲百万彩票（5+1 个号码全中）的可能性都比这大。然而，通俗小报会通过将这些数字与同年三月的第一次创伤性封锁联系起来，使其对瑞士的每个人都具有相关性。那天的每日感染人数是
    1063 例。按照每周 12% 的增长速度，瑞士将在下一个冬季再次达到同样的水平。头版上一个大字标题会是“预计圣诞节前后第二次封锁”。突然间，一个抽象的数字对每个人都变得相关，甚至对政治家来说也是可操作的——这是一个将简单数字转化为吸引所有人注意力的戏剧性故事的完美例子。


    为避免任何误解：这过去和现在都不是一个实际的预测。所依据的数据和使用的统计模型都不充分。这个例子突显了沟通可以（过度）实现什么。当 AI 管理者想要在组织内进行创新时，他们的结果必须引起业务部门的注意并触及他们的受众。利益相关者、（业务）管理者或客户可能没有
    AI 背景。他们可能过于急躁和忙碌，无法自己理解。在这种（典型的）情况下，AI 组织有责任让 AI 翻译者提供帮助，或者确保一些数据科学家拥有出色的沟通技巧。


    ## 管理 AI 运营服务


    当 AI 组织创建模型并将其集成到更大的解决方案中并运行时，AI 组织（这一部分）的设立和工作方式会进一步发展。其能力、财务状况、技能和成本驱动因素与咨询式、以项目为中心的
    AI 组织不同。对于 AI 运营服务，会出现新的主题，例如目标运营模式、与外部的清晰支持接触点或模型管理。AI 组织需要六种能力，而不是仅仅三种。'
  raw: 'Once AI managers understand their cost structure, they have to ensure adequate
    **funding** . Details vary from company to company, and it can be a highly political
    issue. I just want to briefly explain two typical patterns: internal service providers
    and **prioritizing sponsors** (Figure [5-8](#516372_1_En_5_Chapter.xhtml#Fig8)).
    The last one is the most convenient. A senior manager (or some of them) provides
    the funding. The consequence: He selects the projects on which the AI organization
    works. He who pays the piper calls the tune. If he is in marketing, the AI organization
    most probably focuses on marketing and sales topics. If the sponsor is the head
    of an R&D department working on submarines, the AI team will optimize submarine-related
    challenges. Figure [5-8](#516372_1_En_5_Chapter.xhtml#Fig8) illustrates a typical
    interplay between AI organizations and prioritizing sponsors.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig8_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig8_HTML.png)


    Figure 5-8


    Illustration of an AI Organization with a Prioritizing Sponsor


    The second option is the internal **service provider budgeting** pattern (Figure
    [5-9](#516372_1_En_5_Chapter.xhtml#Fig9)). It is typical for shared service organizations.
    The AI managers have to find customers in the organization who fund (at least)
    partially the costs. Variable, project-specific costs are easy to charge, whereas
    financing the fixed costs can be challenging. Adding a certain percentage to the
    variable costs to distribute the fixed costs is a typical mechanism.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig9_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig9_HTML.png)


    Figure 5-9


    Funding for the Service Provider Budgeting Pattern


    With this brief introduction, AI managers can discuss with their line managers
    and with their customers about costs and funding without needing a business degree.


    ### Selling Results: Data Story Telling


    Reaching your audience is vital for book authors, journalists, comedians – and
    AI organizations. Unfortunately, today’s air pressure in Guadeloupe is of no relevance
    for most of us. And for those few who live there, they care less about the air
    pressure and more about whether it will be warm and sunny or hot and rainy with
    thunderstorms tomorrow afternoon. It is the perfect example that what you can
    predict (air pressure) might not be directly helpful for the audience. Instead,
    they want to know whether it rains where they are tomorrow.


    Similarly, data scientists have to know their audience as well. They are experts
    in AI and machine learning algorithms, predictive analytics, and statistics to
    find unseen and unexpected correlations in enormous data collections. However,
    project results must meet four criteria, especially for projects helping with
    strategic decisions:


    1.  **Relevant** for the audience. The marketing department is interested in customer
    insights and sales, not so much in optimizing support functions.


    2.  **New insights** for the audience. What do they know after the AI project
    presented its results? What is new? A prediction that there is no snowfall in
    the Sahara desert tomorrow at noon might not be considered a groundbreaking new
    insight.


    3.  Be **actionable**. The results should allow for some improvements and optimization
    or efficiency gains. Obviously, the benefits must be higher than the investments
    in the project.


    4.  **Compelling presentation**. The message must make the audience curious and
    interested.


    These tasks fit nicely into the CRISP-DM methodology (Figure [5-10](#516372_1_En_5_Chapter.xhtml#Fig10)).
    Checking the relevance of a topic is part of the business understanding phase
    when planning what to do and is repeated in the evaluation phase. Before presenting
    the results, AI project teams must check whether they provide relevant new insights
    and whether they are actionable. Certainly, presentations and written documentation
    should fascinate the audience as well. All these activities are highly creative
    and analytical. They are perfect tasks for AI translators who understand the customers
    and users and their business context in-depth.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig10_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig10_HTML.png)


    Figure 5-10


    How Data Scientists Get Heard by the Business


    I want to illustrate this explanation based on a concrete example of turning a
    model into an awaking story. A Swiss newspaper in July 2020 presented a perfect
    example of how to present data in a dull and meaningless fashion. They reported
    that the Federal Office of Public Health (BAG) announced 108 new Corona infections
    in Switzerland and Liechtenstein. These are more than twice as many as the previous
    day. There were 43 newly confirmed cases on Monday, 99 on Sunday, and 110 on Saturday.


    When going through the four criteria, we see that the news fulfills the first
    criterion. The piece of information is relevant for readers in Switzerland. But
    does it provide new insights? No. Readers do not know afterward whether the numbers
    are comforting or alarming. They heard for weeks and months that the numbers from
    one day to the next could not be compared directly, because they are higher on
    certain weekdays. Thus, a piece of news just providing today’s number and the
    information from three previous days is worthless. The number for each weekday
    from last week gives a much better indication. This Tuesday, we have 108 cases;
    one week ago, only 70\. Yesterday, we had 43, the week before 63\. While this
    might not sound alarming, this is different if the seven-day average indicates
    an increase of 12% per week.


    Still, this information is too abstract for most readers to be relevant for them.
    The absolute numbers are too low (726 out of 8 million). It is more likely that
    you get 5 + 1 correct with the Euromillions lottery. However, the yellow press
    would make it relevant for everyone in Switzerland by connecting the numbers with
    the traumatic first lockdown in March of the same year. The number of daily infections
    on that day was 1063\. With a 12% increase per week, Switzerland would have reached
    the same level again next winter. A catchy headline in big letters for the front
    page would be “2nd lockdown expected around Christmas.” Suddenly, an abstract
    number is relevant for everyone and even actionable for politicians – a perfect
    example of turning simple numbers into a dramatic story catching everyone’s attention.


    To prevent any misunderstandings: This is and was not an actual forecast. The
    underlying data and the statistical models used are inadequate. The example highlights
    what communication can (over)achieve. When AI managers want to innovate the organization,
    their results must catch the attention of the business and reach their audience.
    Stakeholders or (business) managers and customers might have no AI background.
    They can be too impatient and busy to get their own understanding. In such (typical)
    cases, it is up to the AI organization to let AI translators help out or ensure
    that some data scientists have outstanding communication skills.


    ## Managing AI Operations Services


    When AI organizations create models and integrate and run them in larger solutions,
    the set-up and working style of (this part of) the AI organization evolves further.
    Capabilities, financials, skills, and cost-drivers differ from a consulting-style
    project-focused AI organization. For AI operations services, new topics emerge,
    such as target operating models and clear support touchpoints to the outside world
    or model management. The AI organization needs six instead of just three capabilities.'
