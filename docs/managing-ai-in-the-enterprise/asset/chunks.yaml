- fmt: '### Threat Actors


    Script kiddies, professional cybercriminals, and foreign intelligence services:
    a diverse and colorful crowd threatens today’s IT systems and AI environments.
    Threat actors aim for stealing intellectual property, blackmail for ransom, or
    try to crash crucial servers. They threaten AI organizations, AI-related assets,
    and AI-driven business processes and control systems. The threat actors differ
    regarding motivations and capabilities, technical and financial-wise.


    The hurdle for engaging in cyberattacks today is lower than ever. Attack tools
    are widely available, enabling `script kiddies` to pursue not-so-much-recommended
    leisure activities. `Cybercriminals` have more personnel and financial resources
    for attacks. They outsource tasks to criminal service providers when they miss
    specific know-how or run large-scale attacks. Cybercriminals have clear monetary
    motives, such as extracting ransom payments. For example, they encrypt all company
    data, including backups – and decrypt the data only after payment. They are a
    challenge for small and medium enterprises, but even for well-funded IT security
    teams. Even worse are `state-sponsored attackers` and intelligence services. They
    have nearly unlimited resources. Their focus is mainly on critical infrastructure,
    enabling them to bring down another country’s infrastructure. Alternatively, they
    try to steal business and military secrets from governmental offices, the military,
    or highly innovative companies and institutions of strategic interest. AI models
    in antiaircraft systems might be of high interest to rivaling countries. So are
    the newest insights about autonomous cars or biotech innovations.


    There are three more types of external attackers: activists, partners, and competitors.
    `Competitors` are natural threat actors since they benefit directly from illegal
    activities such as stealing intellectual property or harming ongoing operations.
    However, it depends on the business culture of the industry sector and the countries
    in which companies operate, produce, and sell.


    Often overlooked are `partners` as threat actors. Some might have a hidden agenda.
    For example, they might want to shift the contracts’ balance to increase their
    profitability or secretly plan to enter the market as competitors. Then, there
    are the `activists`. They do not aim for financial benefits but fight against
    what is, in their eyes, injustice. They want to expose an organization as unprofessional
    or prove injustice based on the AI models, for example, if the models discriminate
    against society subgroups.


    When organizations mistreat their employees or employees try to make quick money,
    some turn against their employers and harm them. `Criminal employees` with access
    to significant data sources (e.g., data lakes) are particularly dangerous. Without
    logging, forensic experts cannot understand what happened or pursue criminal investigations.
    If everyone can copy large amounts of data, for example, to personal USB sticks,
    this further eases illegal activities.


    Besides the risk of criminal attacks, there is the risk that good-willing `employees`
    make mistakes due to negligence. They might not understand security procedures;
    the procedures might be inconvenient or – from their perspective – not make sense.
    Such situations can result in employees following security procedures halfheartedly,
    potentially resulting in vulnerabilities.


    Which threat actors are relevant for a company? More or less, every company is
    a potential target for script kiddies and cybercriminals. For example, cybercriminals
    often demand “only” five-digit ransom payments. Small and medium enterprises can
    pay such sums – and limited IT defense capabilities make them viable targets,
    especially if attackers can automate attacks. The risk of the other threat actors
    has to be looked at for each company individually. For example, a French corporation
    might come under attack from foreign activists, for example, due to tensions between
    France and Turkey.


    After understanding potential and relevant threat actors, the next step is to
    look at what the attackers might target. In other words: What are the assets of
    an AI organization?


    ### Assets in AI Organizations


    “Asset” is a widely used term. It refers to software, hardware, and data – everything
    needed for information processing. Four asset types are essential for AI organizations:


    *   **AI models**. For example, they help optimize business processes, oversee
    assembly lines, control chemical reactors, or predict stock market prices. AI
    models can be an integral part of the application’s codebase or run on AI runtime
    servers.


    *   **Training data** is essential for data scientists. They need the data to
    create and validate AI models.


    *   **AI runtime servers** are the software and hardware systems on which the
    AI model runs and inference takes place. It can be an `RStudio Server`, the model
    can be part of the actual application code, or the application implements an edge
    intelligence pattern.


    *   The **training areas** on which data scientists create, optimize, and validate
    the AI models, for example, using `Jupyter` notebooks.


    Various additional systems and assets are of relevance for an AI organization
    that aims to work efficiently. They primarily relate to the training environment:


    *   Internal **upstream systems** and their data such as `SAP`, a core banking
    system, or `Salesforce`.


    *   **Pretrained models, libraries**, and reference **data** from the Internet,
    speeding up the training process or helping to get better models.


    *   The **data ingestion and distribution** solution, for example, an `ETL` tool,
    loading data from the data sources into the training data collection and, potentially,
    loading it as well into the training areas.


    *   The **AI repository** storing the model descriptions and training history
    of the models – and the models themselves.


    *   A **data catalog** indexing and describing the data available for training
    models.


    Any AI-related threat or attack relates to one or more of these assets (Figure
    [7-5](#516372_1_En_7_Chapter.xhtml#Fig5)). When successful, attacks compromise
    one (or more) information security CIA triangle properties: confidentiality, integrity,
    availability. Some assets might impact production, others are “only” needed for
    efficient training. Understanding the details is part of the threat analysis.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig5_HTML.jpg](images/516372_1_En_7_Chapter/516372_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    The AI Ecosystem with Its Assets'
