- fmt: '### Classification and Scoring


    The discussion about classification model performance gets another nuance when
    understanding a classification not as a true/false decision but as a **scoring**
    and **ordering** task. A logistic regression typically returns a value between
    0 and 1 for each image. A value over 0.5 means a dog; a lower value indicates
    that it is not a dog. However, we can also work with the original data between
    zero and one and interpret the values as an order for their likelihood to contain
    dogs. To prevent misunderstandings: the values are not percentages or probabilities,
    just scores!


    Figure [3-3](#516372_1_En_3_Chapter.xhtml#Fig3) does exactly such an ordering
    of the images known from Figure [3-2](#516372_1_En_3_Chapter.xhtml#Fig2).


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig3_HTML.png](images/516372_1_En_3_Chapter/516372_1_En_3_Fig3_HTML.png)


    Figure 3-3


    Image Classification as a Continuous Classification Problem Rather Than a Dog/No
    Dog Phenomenon


    An excellent way to understand this ordering is to think about bubbles in champagne.
    If you fill a champagne flute and look at the champagne, the bubbles make it one
    by one to the top – without adding new bubbles. How quickly an AI model moves
    relevant elements to the front is also a performance metric.


    Figure [3-4](#516372_1_En_3_Chapter.xhtml#Fig4) illustrates the process. The set
    of images consist of 6 dog images and 5 other images. When randomly choosing an
    image, we have a roughly 50% chance to select a dog image. If we choose two images,
    we can expect to retrieve one dog image; if we choose four, we expect two. The
    dotted line shows how many dog images we can expect when randomly selecting images.


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig4_HTML.png](images/516372_1_En_3_Chapter/516372_1_En_3_Fig4_HTML.png)


    Figure 3-4


    AI Model (filled cell) vs. Randomly Choosing Images (Dotted Line) When Selecting
    One, Two, Three, or More Images (From Left to Right)


    In contrast, the filled background symbolizes how many dog images we retrieve
    when selecting images based on their score, starting with the highest score. The
    indication for the performance of an AI model is how many “dog” images are over
    the dotted line, which represents the expected performance for randomly selecting
    images.


    In Figure [3-3](#516372_1_En_3_Chapter.xhtml#Fig3), the first three images are
    all dogs – quite an impressive result for the AI model. The probability of getting
    such a good result when randomly choosing images is only 12%.


    ### Additional Performance Metrics


    True positives, false positives, accuracy, precision, recall – these terms and
    concepts work well for binary classifications. Does the picture contain a dog?
    Does the client buy a new white suit if we send him a discount coupon by email?
    We need more varied metrics for other types of insights and AI models with more
    complex outputs. In the following, we look at metrics for three more scenarios:


    *   Linear Regression

    *   Multiclass Classification

    *   Object Detection, that is, which objects are where on a picture


    Suppose you are an AI project manager and run a status meeting. Suddenly, data
    scientists talk about `R`^(`2`), also named *R squared* or *coefficient of determination*.
    A good AI project manager has to figure out quickly how to react. Is it time to
    cheerfully congratulate his team for their breakthrough – or do they need emotional
    support after a bitter defeat against the world of math? `R²` is a metric reflecting
    how well a linear regression model reflects reality or the data items in a training
    data set for prediction problems. So, whereas for classifications, the output
    is “dog” or “cat,” the result for predictions is “We expect 5.7 incoming calls
    per minute in our call center in the next hour.” and not 20.3 and not just 1.


    The calculation of `R²` is simple, but the underlying rationale requires some
    thinking. The first step is calculating the difference between the predicted and
    mean values and squaring the result for all data points. After summing up the
    squares, the result is called the sum of residual squares (`SQR`).


    Second, you calculate the difference between the actual value and the mean value
    and square the results. Again, you sum up the squares over all data points. The
    result is the sum of squares total (`SQT`). Then, `R² = 1 – (SQR / SQT)`.


    What AI project managers should understand is that `R²` is between 0 and 1. The
    closer to 1, the better the model. High values are possible for technical and
    physical processes with clear and known variables; for predicting single persons’
    individual (!) behavior, even 0.1 can be good. However, when looking at larger
    groups of humans (not at the level of a specific individual), values between 0.4
    and 0.8 or even more can be realistic.


    An AI project manager’s (or AI translator’s) task is to put such metrics and numbers
    into a business context. What advice could the data scientists give to the business?
    What should the business, for example, do, and how confident are the data scientists
    that this is the right decision? Increasing sales by 5% might be more than sales
    managers hoped and dreamed of achieving. On the opposite, good predictions and
    models might be useless. Do you know the famous forecast from the stand-up comedian
    George Carlin: “Weather forecast for tonight: dark. Continued dark overnight,
    with widely scattered light by morning.” Sophisticated AI models predicting the
    obvious are useless. If companies invest in complicated AI models, the models
    must be better than a naïve and obvious guess.


    As always, there are more prediction performance metrics. Worth mentioning is
    especially the **Adjusted `R`^(`2`) Metric**. It also considers the complexity
    of the prediction function. The metric punishes, for example, if the prediction
    function is not just linear (`y = ax + b`), but also contains quadratic (`y =
    ax² + bx + c`) or is even a higher-level polynomial. It punishes incorporating
    many input attributes such as `y = ax[0] + bx[1] + cx[2] + dx[3] + ex[4] + f`
    instead of selecting the most relevant ones only, such as `y = ax[0] + bx[3] +
    c`. The rationale is that complex functions improve the prediction quality but
    potentially cause overfitting (the latter is an issue this chapter addresses later).'
