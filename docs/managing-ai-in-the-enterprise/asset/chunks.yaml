    *   How can AI project managers scope their projects to meet the expectations
    of their business stakeholders and sponsors?


    *   AI models are the core deliverable of AI projects. How do, for example, neural
    network or statistics-based AI models look like?


    *   What is a development methodology which works for AI projects? What are vital
    efficiency factors?


    *   How can you integrate AI models in an existing corporate application landscape?


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig1_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig1_HTML.png)


    Figure 2-1


    Structure of the Chapter


    ## The Four Layers of Innovation


    Managing AI projects and teams has some peculiarities. Team members tend to be
    more technology-affine and have a stronger computer science and math background
    but less experience with business problems than legacy application developers.
    There are fewer patterns and established toolchains known from traditional software
    engineering. Thus, AI project managers have to provide more directions to ensure
    delivering concrete business benefits. They have to challenge their data scientists
    constantly to prevent the latter from doing AI research and reinventing the wheel.


    Structuring a technology area in layers and defining a technology stack is a long-known
    and widely practiced approach. When looking at the example of Java, the Java backend
    application runs code in Java VMs. A Java VM runs on a hypervisor, which runs
    on an operating system, with the operating system running on physical hardware.
    There are similar layers in AI (Figure [2-2](#516372_1_En_2_Chapter.xhtml#Fig2)).
    The lowest layer is the **hardware layer**. Neural networks, for example, require
    many, many matrix multiplications. Regular CPUs can perform them, but there are
    faster hardware options: Graphical Processing Units (GPUs), Field Programmable
    Gate Arrays (FPGAs), or Application Specific Integrated Circuits (ASICs). Innovation
    on this layer comes from hardware companies such as AMD or NVIDIA. Companies buying
    such innovative products are server and workstation manufacturers or public cloud
    providers. These customer groups need hardware for their data centers that run
    AI-rich workloads efficiently.


    The **AI frameworks layer** forms the next layer. It represents frameworks for
    machine learning and AI, such as TensorFlow. TensorFlow distributes the workload
    for training massive neural networks on large and heterogeneous server farms,
    thereby taking advantage of their computing power. TensorFlow abstracts for the
    data scientists from the underlying hardware. It parallelizes autonomously computing
    tasks. Data scientists can run the same code and learning algorithms on a single
    laptop or a cluster with hundreds of nodes with hardware tuned for AI and benefit
    from the cluster. Data scientists do not have to change their code for different
    hardware configurations, saving them a lot of work and effort.


    Companies use AI frameworks to develop new AI algorithms and innovative neural
    network designs. Suppose a company wants to develop the next big thing after GPT-3
    or a fundamentally new computer vision algorithm. In that case, their data scientists
    use an AI framework to engineer and test new algorithms. In other words: nearly
    all data scientists do not innovate on this layer but work on top of the existing
    frameworks.


    There are only two scenarios for innovation in this layer: improving an existing
    framework such as TensorFlow or developing a completely new one. These activities
    are usually part of academic research. For companies, it makes sense only if they
    have an outreach to a massive number of data scientists. The latter applies to
    public cloud providers or AI software companies. They need innovation to provide
    “the best” AI framework to lure data scientists into using their AI and/or cloud
    platform.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig2_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig2_HTML.png)


    Figure 2-2


    The AI Technology Stack'
  trans: '

    # 总结


    在本章结尾，我想快速总结一下要点：


    - 数据驱动型公司基于事实和数据而非经验和资历做出决策。人工智能有助于从庞大复杂的数据集中提取可操作的见解。

    - 人工智能的四大优势是：信息性（提供额外信息）、事务性（让事物变得更好或更便宜）、战略性（影响公司或产品在市场中的地位）以及变革性（为未来改进铺平道路）。

    - 人工智能的核心在于创建模型。这些模型对组织具有战术性益处。它们可以预测个体行为，例如某人是否可能购买手机。模型也能提供战略性见解，比如识别典型购买者的特征。

    - 人工智能有助于优化单一任务，如交叉销售和追加销售。此外，人工智能还能推动商业模式的变革，如时尚行业的例子所示。

    - 许多公司拥有数据仓库和商业智能团队，这些团队至少可以接手较为简单的人工智能项目。然而，当服务模式、资金和治理结构不同时，独立的人工智能团队至关重要。


    有了这些知识，我们便可以探讨如何运行人工智能项目并实现创新。但请记住一句古老的谚语：“我们钦佩我们所不理解的事物。”读完下一章后，你将了解数据科学家的工作方式以及如何改进项目。届时，人工智能对你而言将不再那么神秘！


    # 2. 构建与交付人工智能项目


    恭喜，董事会决定推进人工智能项目。高级管理层选定你作为人工智能项目及项目经理。现在是你交付成果的时刻。你曾拥有愿景，如今可以将其变为现实。但别忘了：有些真理适用于所有项目，无论是人工智能项目还是非人工智能项目。企业界期望项目能够以成本高效、及时且可靠的方式交付成果。大多数公司无法也不愿支付十位博士的薪酬并等待八个月来获得一个完美的解决方案。学术界有耐心并投入大量时间和精力，但企业并非如此。作为人工智能项目经理，你的挑战是与两三位
    IT 专业人员合作，在六到八周内交付初步成果。基于这样的背景，本章将为以下人工智能项目管理挑战提供答案（见图 2-1）：


    - 人工智能技术栈中有哪些不同层次，使企业能够通过人工智能进行创新？

    - 人工智能项目经理如何界定项目范围，以满足业务利益相关者和赞助方的期望？

    - 人工智能模型是人工智能项目的核心交付物。例如，基于神经网络或统计学的模型是什么样的？

    - 适用于人工智能项目的开发方法论是什么？关键效率因素有哪些？

    - 如何将人工智能模型集成到现有的企业应用架构中？


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig1_HTML.png](img/516372_1_En_2_Fig1_HTML.png)


    图 2-1 本章结构


    ## 创新的四个层次


    管理人工智能项目和团队有一些特殊性。与传统应用开发者相比，团队成员往往更倾向于技术，拥有更强的计算机科学和数学背景，但在业务问题上的经验较少。传统软件工程中已知的模式和成熟工具链较少。因此，人工智能项目经理需要提供更多指导，以确保交付具体的业务价值。他们必须不断挑战数据科学家，防止后者陷入人工智能研究或重复造轮子。


    将技术领域分层并定义技术栈是一种长期存在且广泛实践的方法。以 Java 为例，Java 后端应用在 Java 虚拟机中运行代码。Java 虚拟机运行在虚拟机监控程序上，后者运行在操作系统上，而操作系统则运行在物理硬件上。人工智能也有类似的层次（图
    2-2）。最底层是**硬件层**。例如，神经网络需要大量矩阵乘法运算。普通 CPU 可以执行这些运算，但存在更快的硬件选项：图形处理器（GPU）、现场可编程门阵列（FPGA）或专用集成电路（ASIC）。这一层的创新来自
    AMD 或 NVIDIA 等硬件公司。购买此类创新产品的客户是服务器和工作站制造商或公有云提供商。这些客户群体需要为其数据中心配备能够高效运行人工智能密集型工作负载的硬件。


    **人工智能框架层**构成了下一层。它代表机器学习和人工智能的框架，例如`TensorFlow`。`TensorFlow`将训练大规模神经网络的工作负载分布到大型异构服务器集群上，从而利用其计算能力。`TensorFlow`为数据科学家屏蔽了底层硬件的复杂性。它自主并行化计算任务。数据科学家可以在单台笔记本电脑上，或在拥有数百个节点且硬件针对人工智能优化的集群上运行相同的代码和学习算法，并受益于集群的性能。数据科学家无需针对不同硬件配置更改代码，从而节省了大量工作与精力。


    公司使用人工智能框架来开发新的人工智能算法和创新的神经网络设计。假设一家公司希望在`GPT-3`之后开发下一个重大突破，或一个全新的计算机视觉算法。在这种情况下，其数据科学家会使用人工智能框架来设计和测试新算法。换句话说：几乎所有数据科学家都不会在这一层进行创新，而是在现有框架之上工作。


    在这一层进行创新只有两种场景：改进现有框架（如`TensorFlow`）或开发一个全新的框架。这些活动通常是学术研究的一部分。对于公司而言，只有当其能够覆盖大量数据科学家时，这样做才有意义。后者适用于公有云提供商或人工智能软件公司。他们需要创新来提供“最佳”人工智能框架，以吸引数据科学家使用其人工智能和/或云平台。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig2_HTML.png](img/516372_1_En_2_Fig2_HTML.png)


    图 2-2 人工智能技术栈

    '
- fmt: '接下来是定制化AI层。在明确了顶层（**AI服务层**）的目的后，其具体细节就很容易理解了。AI服务使软件工程师能够通过调用现成的AI功能，将AI集成到他们的解决方案中。工程师不需要任何AI或数据科学知识。一个例子是`Visua/LogoGrab`。该服务可以检测图像或视频中的品牌标识。例如，它通过检查赞助商品牌在体育赛事电视转播中出现的频率和时长，来衡量营销活动的成功程度。它还能在互联网和电子市场上发现品牌产品的仿冒品和相似品。`LogoGrab`是一个高度专业化AI服务的例子。


    也有一些关注范围更广的现成AI服务，例如来自AI供应商或大型云提供商（如`Microsoft Azure`、`Google Cloud`和`Amazon AWS`）的服务。例子包括`AWS
    Rekognition`或`Amazon Comprehend Medical`。后者分析患者信息，并提取例如患者本人及其医疗状况的数据。`AWS Rekognition`（图[2-3](#516372_1_En_2_Chapter.xhtml#Fig3)）支持多种用例，例如识别图片中特定的通用物体，如汽车或瓶子。你看到更多顾客在喝啤酒、白葡萄酒还是红葡萄酒？营销专家可以将节日照片输入`AWS`服务，让该服务判断图像中的内容，并准备显示结果的统计数据。如果知道80%的节日参与者喝葡萄酒，15%喝香槟，只有5%喝啤酒，这对于一家啤酒厂决定是否赞助这个节日来说可能是一个危险信号。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig3_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig3_HTML.png)


    图2-3：使用标准标签的`AWS Rekognition`。在此示例中，该服务可靠地确定这是一个瓶子。该服务在处理左侧瓶子（它是一个半尺寸瓶子）时遇到困难，并认为它更可能是啤酒而不是葡萄酒。在右侧，该服务甚至检测到这是一个红葡萄酒瓶。


    公司可以通过在现有AI服务（如`LogoGrab`）的基础上进行构建，从而更快地进行创新。他们将此类服务集成到自己的流程和软件解决方案中。他们不需要AI项目或数据科学家。不存在因AI模型问题而导致项目延迟或失败的风险。


    在许多情况下，通用AI服务不足以应对具体场景。如果一位营销专家需要判断图片中是瑞士葡萄酒、其他葡萄酒还是其他饮料，她该怎么办？她需要一个针对其特定细分领域进行定制和训练的神经网络。


    如前所述，`AWS Rekognition`附带了一组该服务可以识别的标准对象类型（例如在图片中）。然而，`AWS Rekognition`更加强大。工程师可以训练他们特定的神经网络，以检测其特定需求的对象类型。工程师必须提供样本图片，例如瑞士葡萄酒瓶的图片。然后，**`AWS
    Rekognition Custom Label`** 会为这些客户特定的对象类别训练一个机器学习模型。


    这个`AWS`服务只是构成**定制化AI层**的服务之一。它们基于客户提供的客户特定训练数据，训练并提供现成的、客户特定的神经网络。在图[2-4](#516372_1_En_2_Chapter.xhtml#Fig4)中，一位瑞士葡萄酒的营销专家可能想了解节日参与者是更喜欢瑞士葡萄酒、其他葡萄酒还是其他饮料。因此，她准备了带有这三种饮料类型标签的训练和测试数据图片。当点击“训练模型”按钮时，`AWS`无需任何进一步输入，也无需任何AI知识，就能生成神经网络。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig4_HTML.jpg](images/516372_1_En_2_Chapter/516372_1_En_2_Fig4_HTML.jpg)


    图2-4：在`AWS Rekognition Custom Label`（控制台视图）中准备训练和测试数据集。数据科学家可以上传图片并为其添加标签。


    定制化AI对于那些希望优化特定业务流程步骤以获得竞争优势的公司来说极具吸引力。得益于定制化AI，他们无需庞大的数据科学团队就能实现这些目标。他们可以使用摄像头在生产线上检查产品是否存在缺陷。因此，他们收集可以发货和不能发货给客户的产品样本图片，让定制化AI服务训练一个神经网络，并将此AI模型应用于来自生产线上方摄像头的图像。所有典型的供应商都提供定制化AI服务：云提供商以及分析和AI软件供应商。


    AI服务、定制化AI、AI框架和AI专用硬件——AI创新有多种形式。对于创新而言，公司和组织主要依赖大学培养的数据科学家。这些数据科学家非常了解AI框架层。然而，这一层更适合学术研究人员，而不是（大多数）公司的关注点。因此，管理者必须清晰地传达他们的战略：公司正在哪个（些）层上进行AI创新？AI服务、定制化AI、AI框架，还是专用硬件？这个四层AI技术栈可以作为任何AI项目和任何AI管理者的沟通工具。


    ## 界定AI项目范围


    清晰的项目范围是任何项目成功的关键因素；这是我管理和重组IT项目的个人经验。这条规则同样适用于AI项目。高级管理人员资助这些项目，是因为他们希望或必须实现特定目标，而AI可能会有所帮助。因此，首先，AI项目经理必须理解这些目标，并交付预期的成果。他们的第二个辅助目标是确保项目团队专注于这些目标，而不将时间和精力花费在可选或不相关的话题上。


    六步AI项目范围界定指南（图[2-5](#516372_1_En_2_Chapter.xhtml#Fig5)）有助于AI项目经理实现这一目标。根据具体情况，项目经理本人（可能连同解决方案架构师和AI专家一起）处理这些主题。或者，根据组织环境，他可能将这些主题委托给传统的业务分析师和架构师角色，或者委托给我们在后续章节中讨论的较新的AI翻译员角色。重要的是对业务主题和AI技术的良好理解，并结合社交技能。一旦项目完成了这六个步骤，技术实施就开始了，即处理模型并集成整体应用架构，希望遵循结构化的方法论。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig5_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig5_HTML.png)


    图2-5：界定AI项目范围的六个步骤——并形成商业案例'
  raw: 'Next is the customized AI layer. Its specifics are easy to understand after
    the purpose of the top layer is clear, the **AI services layer** . AI services
    enable software engineers to incorporate AI into their solution by invoking ready-to-use
    AI functionality. The engineers do not need any AI or data science know-how. One
    example is Visua/LogoGrab. The service detects brand logos in images or video
    footage. It measures the success of marketing campaigns, for example, by checking
    how often and for how long the brand of a sponsor is on TV during a sports event.
    It finds counterfeits and look-alikes of brand products on the Internet and electronic
    marketplaces as well. LogoGrab is an example of a highly specialized AI service.


    There are also ready-to-use AI services with a broader focus, for example, from
    AI vendors or the big cloud providers Microsoft Azure, Google Cloud, and Amazon
    AWS. Examples are AWS Rekognition or Amazon Comprehend Medical. The latter service
    analyzes patient information and extracts, for example, data about the patient
    herself and her medical condition. AWS Rekognition (Figure [2-3](#516372_1_En_2_Chapter.xhtml#Fig3))
    supports use cases such as identifying particular generic objects on pictures
    such as a car or a bottle. Do you see more customers drinking beer, white wine,
    or red wine? Marketing specialists can feed festival pictures to the AWS service,
    let the service judge what is on the image, and prepare statistics showing the
    results. Knowing that 80% of the festival visitors drink wine, 15% champagne,
    and just 5% beer might be a red flag for a brewery when deciding whether to sponsor
    this festival.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig3_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig3_HTML.png)


    Figure 2-3


    AWS Rekognition with Standard Labels. In This Example, the Service Determines
    Reliably That This Is a Bottle. The Service Struggles with the Left One (It Is
    a Half-Size Bottle) and Thinks It Is More Probably Beer Than Wine. On the Right
    Side, the Service Even Detects That This Is a Red Wine Bottle


    Companies can innovate quicker when building on existing AI services such as LogoGrab.
    They integrate such a service into their processes and software solutions. They
    do not need an AI project or data scientists. There is no risk of project delays
    or failure due to issues with the AI model.


    In many cases, generic AI services are not sufficient for concrete scenarios.
    What should a marketing specialist do if she needs to understand whether there
    is Swiss wine on a picture, other wine, or other drinks? She needs a neural network
    tailored and trained for her specific niche.


    As stated, AWS Rekognition comes with a set of standard object types the service
    can identify, for example, on pictures. However, AWS Rekognition is more powerful.
    Engineers can train their specific neural networks to detect object types specific
    to their needs. The engineers have to provide sample pictures, for example, for
    Swiss wine bottles. Then, **AWS Rekognition Custom Label** trains a machine learning
    model for these customer-specific object classes.


    This AWS service is just one example of services forming the **Customized AI layer**
    . They train and provide ready-to-use customer-specific neural networks based
    on customer-delivered customer-specific training data. In Figure [2-4](#516372_1_En_2_Chapter.xhtml#Fig4),
    a marketing specialist for Swiss wine might be interested in understanding whether
    festival visitors prefer Swiss wine, other wine, or other drinks. So, she prepares
    training and test data with pictures labeled for these three types of drinks.
    When pushing the “train model” button, AWS generates the neural network without
    any further input and without requiring any AI knowledge.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig4_HTML.jpg](images/516372_1_En_2_Chapter/516372_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Preparing Training and Test Data Sets in AWS Rekognition Custom Label (Console
    View). Data Scientists Can Upload Pictures and Label Them


    Customized AI is intriguing for companies that want to optimize specific business
    process steps to gain a competitive advantage. Thanks to customized AI, they achieve
    such goals without a large data science team. They can use cameras to check products
    on the assembly line for flaws in the production process. Therefore, they collect
    sample pictures for products that can and cannot be shipped to customers, let
    the customized AI service train a neural network, and apply this AI model to images
    coming from a camera on top of the assembly line. All typical suspects offer customized
    AI services: cloud providers plus analytics and AI software vendors.


    AI Services, Customized AI, AI Frameworks, and AI-specific hardware – AI innovation
    comes in many forms. For innovation, companies and organizations rely primarily
    on university-trained data scientists. These data scientists know the AI frameworks
    layer exceptionally well. However, this layer is more for academic researchers
    but not in the focus of (most) companies. Thus, managers have to communicate their
    strategy clearly: on which layer(s) is the company innovating with AI? AI Services,
    Customized AI, AI Frameworks, or Specialized Hardware? This four-layer AI technology
    stack can act as a communication tool in any AI project and for any AI manager.


    ## Scoping AI Projects


    A clear project scope is a crucial success factor for any project; this is my
    personal experience from managing and restructuring IT projects. This rule applies
    to AI projects as well. Senior managers fund them because they want or have to
    achieve specific goals, and AI might help. Thus, first, AI project managers must
    understand these goals and deliver what is expected. Their second supporting goal
    is to make sure the project team focuses on these goals and does not spend time
    and effort on optional or irrelevant topics.


    The six-step AI project scoping guidelines (Figure [2-5](#516372_1_En_2_Chapter.xhtml#Fig5))
    helps AI project managers to reach this goal. Depending on the setup, the project
    manager works on these topics himself (potentially together with a solutions architect
    and an AI specialist). Alternative and depending on the organizational context,
    he might delegate these topics to the traditional roles of business analysts and
    architects or to the newer role of an AI translator that we discuss in a later
    chapter. What matters are a good understanding of business topics and AI technologies
    combined with social skills. Once the project has completed these six steps, the
    technical implementation starts, that is, working on the model and integrating
    the overall application landscape, hopefully following a structured, methodological
    approach.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig5_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig5_HTML.png)


    Figure 2-5


    Six Steps to Scope an AI Project – and Shape a Business Case'
  trans: '

    接下来是定制化 AI 层。在明确了顶层（**AI 服务层**）的目的后，其具体细节就很容易理解了。AI 服务使软件工程师能够通过调用现成的 AI 功能，将
    AI 集成到他们的解决方案中。工程师不需要任何 AI 或数据科学知识。一个例子是`Visua/LogoGrab`。该服务可以检测图像或视频中的品牌标识。例如，它通过检查赞助商品牌在体育赛事电视转播中出现的频率和时长，来衡量营销活动的成功程度。它还能在互联网和电子市场上发现品牌产品的仿冒品和相似品。`LogoGrab`是一个高度专业化
    AI 服务的例子。


    也有一些关注范围更广的现成 AI 服务，例如来自 AI 供应商或大型云提供商（如`Microsoft Azure`、`Google Cloud`和`Amazon
    AWS`）的服务。例子包括`AWS Rekognition`或`Amazon Comprehend Medical`。后者分析患者信息，并提取例如患者本人及其医疗状况的数据。`AWS
    Rekognition`（图 2-3）支持多种用例，例如识别图片中特定的通用物体，如汽车或瓶子。你看到更多顾客在喝啤酒、白葡萄酒还是红葡萄酒？营销专家可以将节日照片输入`AWS`服务，让该服务判断图像中的内容，并准备显示结果的统计数据。如果知道
    80%的节日参与者喝葡萄酒，15%喝香槟，只有 5%喝啤酒，这对于一家啤酒厂决定是否赞助这个节日来说可能是一个危险信号。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig3_HTML.png](img/516372_1_En_2_Fig3_HTML.png)


    图 2-3：使用标准标签的`AWS Rekognition`。在此示例中，该服务可靠地确定这是一个瓶子。该服务在处理左侧瓶子（它是一个半尺寸瓶子）时遇到困难，并认为它更可能是啤酒而不是葡萄酒。在右侧，该服务甚至检测到这是一个红葡萄酒瓶。


    公司可以通过在现有 AI 服务（如`LogoGrab`）的基础上进行构建，从而更快地进行创新。他们将此类服务集成到自己的流程和软件解决方案中。他们不需要 AI
    项目或数据科学家。不存在因 AI 模型问题而导致项目延迟或失败的风险。


    在许多情况下，通用 AI 服务不足以应对具体场景。如果一位营销专家需要判断图片中是瑞士葡萄酒、其他葡萄酒还是其他饮料，她该怎么办？她需要一个针对其特定细分领域进行定制和训练的神经网络。


    如前所述，`AWS Rekognition`附带了一组该服务可以识别的标准对象类型（例如在图片中）。然而，`AWS Rekognition`更加强大。工程师可以训练他们特定的神经网络，以检测其特定需求的对象类型。工程师必须提供样本图片，例如瑞士葡萄酒瓶的图片。然后，**`AWS
    Rekognition Custom Label`** 会为这些客户特定的对象类别训练一个机器学习模型。


    这个`AWS`服务只是构成**定制化 AI 层**的服务之一。它们基于客户提供的客户特定训练数据，训练并提供现成的、客户特定的神经网络。在图 2-4 中，一位瑞士葡萄酒的营销专家可能想了解节日参与者是更喜欢瑞士葡萄酒、其他葡萄酒还是其他饮料。因此，她准备了带有这三种饮料类型标签的训练和测试数据图片。当点击“训练模型”按钮时，`AWS`无需任何进一步输入，也无需任何
    AI 知识，就能生成神经网络。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig4_HTML.jpg](img/516372_1_En_2_Fig4_HTML.jpg)


    图 2-4：在`AWS Rekognition Custom Label`（控制台视图）中准备训练和测试数据集。数据科学家可以上传图片并为其添加标签。


    定制化 AI 对于那些希望优化特定业务流程步骤以获得竞争优势的公司来说极具吸引力。得益于定制化 AI，他们无需庞大的数据科学团队就能实现这些目标。他们可以使用摄像头在生产线上检查产品是否存在缺陷。因此，他们收集可以发货和不能发货给客户的产品样本图片，让定制化
    AI 服务训练一个神经网络，并将此 AI 模型应用于来自生产线上方摄像头的图像。所有典型的供应商都提供定制化 AI 服务：云提供商以及分析和 AI 软件供应商。


    AI 服务、定制化 AI、AI 框架和 AI 专用硬件——AI 创新有多种形式。对于创新而言，公司和组织主要依赖大学培养的数据科学家。这些数据科学家非常了解
    AI 框架层。然而，这一层更适合学术研究人员，而不是（大多数）公司的关注点。因此，管理者必须清晰地传达他们的战略：公司正在哪个（些）层上进行 AI 创新？AI
    服务、定制化 AI、AI 框架，还是专用硬件？这个四层 AI 技术栈可以作为任何 AI 项目和任何 AI 管理者的沟通工具。


    ## 界定 AI 项目范围


    清晰的项目范围是任何项目成功的关键因素；这是我管理和重组 IT 项目的个人经验。这条规则同样适用于 AI 项目。高级管理人员资助这些项目，是因为他们希望或必须实现特定目标，而
    AI 可能会有所帮助。因此，首先，AI 项目经理必须理解这些目标，并交付预期的成果。他们的第二个辅助目标是确保项目团队专注于这些目标，而不将时间和精力花费在可选或不相关的话题上。


    六步 AI 项目范围界定指南（图 2-5）有助于 AI 项目经理实现这一目标。根据具体情况，项目经理本人（可能连同解决方案架构师和 AI 专家一起）处理这些主题。或者，根据组织环境，他可能将这些主题委托给传统的业务分析师和架构师角色，或者委托给我们在后续章节中讨论的较新的
    AI 翻译员角色。重要的是对业务主题和 AI 技术的良好理解，并结合社交技能。一旦项目完成了这六个步骤，技术实施就开始了，即处理模型并集成整体应用架构，希望遵循结构化的方法论。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig5_HTML.png](img/516372_1_En_2_Fig5_HTML.png)


    图 2-5：界定 AI 项目范围的六个步骤——并形成商业案例

