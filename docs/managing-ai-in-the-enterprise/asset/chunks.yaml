- fmt: '# AI and Classic Data Warehouse Architectures


    Databases and data warehouses are not only helping to store data in AI environments.
    Companies use them already for decades. A pre-AI architecture for data-driven
    companies consists of an operational database layer and a data warehouse layer.


    **Operational databases** serve business applications by storing and processing
    data. For example, they store master data, product descriptions, bank transfers,
    or point of sales records.


    Business users, potentially with the support of database administrators, can submit
    ad-hoc queries against the data. Did our marketing campaign targeting golden-agers
    result in more customers from this age category signing new contracts last month?
    It is an example of an ad-hoc query with a clear analytics focus.


    Querying operational databases comes with two **limitations**. First, there is
    a potential impact on operations. Long-running complex analytical queries can
    impact the database stability and performance and, thereby, the overall system.
    It might not be suitable to submit such a query against the database of an online
    shop. The second limitation is the focus of operational databases. They (typically)
    store only data of one application or one specific domain. Combining data from
    different databases (e.g., one with online shop data and one with retail store
    data) is work-intense for ad-hoc queries and requires high efforts to keep them
    stable over months and years. Opening firewalls or dealing with service accounts
    and certificates are just some sample tasks. Thus, nearly all companies run one
    or more data warehouses to collect and combine data from various operational databases.


    A typical **data warehouse** has three layers: the staging area layer, the consolidated
    data warehouse layer, and the curated data marts layer. The **staging area** is
    an intermediate storage place for copied data arriving from operational databases
    or other data sources during the ETL process. The data warehouse software extracts
    data from operational warehouses, transforms, and loads the data into the consolidated
    data warehouse layer during the ETL process. The transformation also includes
    aggregating data, cleansing the data, and sorting out inconsistencies. The third
    data warehouse layer provides curated **data marts**. They provide main user groups
    such as accounting, sales, or operations reports with the data relevant for them
    in a user-friendly way.


    From an **AI organization’s perspective**, a data warehouse with its data marts
    and the tables in the consolidated layer is a big opportunity. It is a source
    of high-quality training data with company-wide agreed-upon semantics and from
    all areas of a company. Building a similar solution is often a multi-million,
    multi-year endeavor any AI organization should avoid. However, data warehouses
    have two clear limitations. The data is not real-time data. ETL processes typically
    run overnight to minimize the impact on operational databases during office hours.
    Thus, data is at least one day old, but companies might not refresh certain data
    more than once per month. Second, data warehouses are inflexible when it comes
    to adding new data. The rest of the company expects the data warehouse to deliver
    consistent data, requiring an in-depth analysis before adding an attribute – or
    one or multiple tables. Still, data warehouses are an excellent chance for AI
    organizations to kickstart activities in new areas with some initial, high quality,
    and “investment-free” training data.


    In such an ideal scenario, the AI organization builds its solution as a new top
    layer, basing on the data marts or the consolidated data warehouse layer, as illustrated
    in Figure [6-10](#516372_1_En_6_Chapter.xhtml#Fig10). The less the AI organization
    deals directly with operational databases, the more cost-efficient and agile it
    can operate.


    ## Self-Service Business Intelligence


    Naming self-service business intelligence (SSBI) tools the biggest fraud in recent
    data management and analytics history might be a slight overstatement. The problem
    is not their functionality, but what they are sold for to customers. Many vendors
    try to make their customers believe that the tool enables them to perform similar
    analytics as data scientists and AI algorithms can do – and this is not correct.


    As the architecture in Figure [6-10](#516372_1_En_6_Chapter.xhtml#Fig10) illustrates,
    SSBI tools are on top of data warehouses or data marts (as AI components are as
    well). The tools **enable business users** to self-define and create tables and
    views. In contrast to data warehouse views and tables, business users might have
    a very narrow perspective, not looking left or right or whether a similar performance
    indicator already exists. Speed, convenience, no effort are the usual foci of
    business users. Besides all criticism, SSBI tools solve a business need and ease
    the collaboration in corporate functions such as controlling in worldwide organizations.
    When a job is about copying data together from various Excels and cleaning and
    consolidating this information, SSBI tools can greatly help due to their collaboration
    features. However, when AI organizations consider using data from SSBI tools,
    they should be aware that the data quality might be less reliable than data from
    a data warehouse or an operational database.


    SSBI tools become an issue for an AI organization and the company’s innovation
    potential if it **hinders the adaption of AI**. SSBI tools are gold-plated Excel
    alternatives with more features to play around with, but not enabling business
    users to manually generate insights and models on the same level with the result
    of AI projects (and providing AI algorithms without explanation might also not
    result in useful models). The issue with SSBI tools is not their features, but
    if business users insist on “analyzing themselves” AI problems using SSBI tools
    instead of letting a statistical or machine learning algorithm do that much better
    or trying to create AI models without understanding the needed methodologies.
    This is a big risk or disadvantage with SSBI tools, and it might cause issues
    with the standing of an AI organization within the company. AI managers should
    beware.


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig11_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig11_HTML.png)


    Figure 6-11


    Classic AI Architecture with an AI Platform Being the Only “Intelligent” Solution
    (Left), Pantheistic Intelligence in Today’s Landscapes with Various Components
    with AI Capabilities Incorporated (Right)'
  raw: '### AI and Classic Data Warehouse Architectures


    Databases and data warehouses are not only helping to store data in AI environments.
    Companies use them already for decades. A pre-AI architecture for data-driven
    companies consists of an operational database layer and a data warehouse layer.


    **Operational databases** serve business applications by storing and processing
    data. For example, they store master data, product descriptions, bank transfers,
    or point of sales records.


    Business users, potentially with the support of database administrators, can submit
    ad-hoc queries against the data. Did our marketing campaign targeting golden-agers
    result in more customers from this age category signing new contracts last month?
    It is an example of an ad-hoc query with a clear analytics focus.


    Querying operational databases comes with two **limitations**. First, there is
    a potential impact on operations. Long-running complex analytical queries can
    impact the database stability and performance and, thereby, the overall system.
    It might not be suitable to submit such a query against the database of an online
    shop. The second limitation is the focus of operational databases. They (typically)
    store only data of one application or one specific domain. Combining data from
    different databases (e.g., one with online shop data and one with retail store
    data) is work-intense for ad-hoc queries and requires high efforts to keep them
    stable over months and years. Opening firewalls or dealing with service accounts
    and certificates are just some sample tasks. Thus, nearly all companies run one
    or more data warehouses to collect and combine data from various operational databases.


    A typical **data warehouse** has three layers: the staging area layer, the consolidated
    data warehouse layer, and the curated data marts layer. The **staging area** is
    an intermediate storage place for copied data arriving from operational databases
    or other data sources during the ETL process. The data warehouse software extracts
    data from operational warehouses, transforms, and loads the data into the consolidated
    data warehouse layer during the ETL process. The transformation also includes
    aggregating data, cleansing the data, and sorting out inconsistencies. The third
    data warehouse layer provides curated **data marts**. They provide main user groups
    such as accounting, sales, or operations reports with the data relevant for them
    in a user-friendly way.


    From an **AI organization’s perspective**, a data warehouse with its data marts
    and the tables in the consolidated layer is a big opportunity. It is a source
    of high-quality training data with company-wide agreed-upon semantics and from
    all areas of a company. Building a similar solution is often a multi-million,
    multi-year endeavor any AI organization should avoid. However, data warehouses
    have two clear limitations. The data is not real-time data. ETL processes typically
    run overnight to minimize the impact on operational databases during office hours.
    Thus, data is at least one day old, but companies might not refresh certain data
    more than once per month. Second, data warehouses are inflexible when it comes
    to adding new data. The rest of the company expects the data warehouse to deliver
    consistent data, requiring an in-depth analysis before adding an attribute – or
    one or multiple tables. Still, data warehouses are an excellent chance for AI
    organizations to kickstart activities in new areas with some initial, high quality,
    and “investment-free” training data.


    In such an ideal scenario, the AI organization builds its solution as a new top
    layer, basing on the data marts or the consolidated data warehouse layer, as illustrated
    in Figure [6-10](#516372_1_En_6_Chapter.xhtml#Fig10). The less the AI organization
    deals directly with operational databases, the more cost-efficient and agile it
    can operate.


