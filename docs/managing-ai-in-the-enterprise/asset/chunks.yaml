  trans: '

    ### 欧盟《人工智能法案》提案


    2021 年 4 月 21 日，欧盟委员会发布了一项《人工智能法案》提案，旨在促进人工智能应用的同时，应对这项新技术带来的风险。该拟议立法对人工智能算法进行了广泛监管，涵盖从统计方法、基于逻辑或知识的系统（包括专家系统），到监督或无监督学习、深度学习及其他方法论。该人工智能法案适用于欧盟管辖范围内的人工智能系统，以及输出结果在欧盟境内使用的境外系统——并适用于企业、公共机构和政府部门，但军事用途系统除外。违反该法案最高可处以企业全球营收
    6%的罚款，而违反《通用数据保护条例》的罚款"仅"为 4%。


    该提案将人工智能系统分为四类：不可接受风险系统、高风险系统、有限风险系统以及仅具最低风险系统（图 4-4）。


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig4_HTML.png](img/516372_1_En_4_Fig4_HTML.png)


    **图 4-4** 《人工智能法案》风险金字塔


    该拟议人工智能法规列出了被视为不可接受风险的禁止使用案例。首先，是利用潜意识技术或利用特定个体脆弱性，导致对个人或他人造成身心伤害的系统。其次，该法案禁止公共机构或其代表利用不同场景收集的数据进行社会评分，或评分对个人产生不成比例影响的系统。第三，禁止在公共场所使用实时远程生物识别信息系统，除非涉及非常特定的犯罪情形。


    高风险人工智能系统构成第二类。涉及安全与健康的人工智能系统及组件属于此类，例如用于汽车、火车或医疗设备的系统。此外，还包括以下八种用途的人工智能系统：


    *   实时或延迟的生物特征身份识别

    *   管理运营供水等关键基础设施

    *   决定教育机构录取与分派的教育和职业培训场景

    *   招聘流程、晋升或解雇决策、任务分配及员工绩效评估

    *   公共援助福利决策、紧急救援服务的调度与优先级排序，以及信用评分

    *   特定执法场景，如预测个人是否（再次）犯罪，或检测个人情绪状态

    *   移民、庇护和边境管控管理，包括测谎场景、评估个人是否构成安全风险或验证文件真实性

    *   司法与民主进程管理，包括事实与法律研究，以及将法律适用于具体案件事实


    欧盟拟议法规并未禁止高风险系统，而是对其提出了具体要求。企业必须根据预期用途，识别并评估已知和可预见的风险，同时考虑合理可预见的误用情况。在开发或部署此类系统时仅进行一次评估是不够的。企业及其人工智能组织必须在系统生命周期内持续管理这些风险，并考虑模型在生产使用过程中获得的洞察。


    对高风险人工智能系统还有额外详细要求，例如技术文档、关键事件日志记录、系统准确性或稳健性的沟通，以及允许并确保人工监督。


    第三类包含有限风险系统。它们必须遵守特定的透明度要求。与人类交互的人工智能系统必须揭示其非人类属性。当系统包含情绪识别或生物特征分类功能时，必须告知用户。最后，任何操纵图像、音频和视频内容（"深度伪造"）的系统都必须明确说明。


    最低风险人工智能系统构成第四类。据欧盟称，当今大多数应用场景属于此类。该法案不对其进行监管，但建议为其制定行为准则。


    该人工智能法案提案历经三年多进程才得以形成。不过，在法案正式生效前仍可能进行额外修改。此外，欧盟正在制定影响人工智能组织的其他法规，例如与责任问题相关的法规。很可能其他国家在未来几年也会出台类似法律，而欧盟这项人工智能法案提案可能产生重大影响并发挥主导作用。因此，欧盟以外的人工智能组织也有必要理解这些欧盟理念。


    ### 美国联邦贸易委员会的做法


    美国联邦贸易委员会（FTC）依据现有法律对人工智能系统进行监管。该美国机构的职责涵盖执行反垄断法，并通过防止不公平、欺骗性或反竞争行为来促进消费者保护。该机构将人工智能视为自动化决策的新技术手段。因此，FTC
    并不关注算法类型以判断是否为"相关"人工智能系统，而是关注系统是否进行自动化决策。它基于现有的较早期法律监管人工智能系统：《联邦贸易委员会法》（第 5 条）、《公平信用报告法》和《平等信用机会法》。在此基础上，FTC
    制定了针对人工智能系统的规则和指南。其中最相关的包括：


    *   人工智能使用情况的透明度。例如，在未告知客户的情况下模仿人类行为可能违法。

    *   数据收集的透明度，即不得在消费者不知情的情况下秘密或背地里收集数据。

    *   自动化规则是否改变交易条件的透明度，例如根据消费模式自动降低信用额度。

    *   客户有权访问其存储数据并更正错误信息。根据具体情况，企业有义务保存关于客户的最新准确数据。

    *   能够向客户提供导致公司拒绝特定客户请求的最相关影响因素。对于评分，公司必须能够解释基本概念，并列出对个人特定评分影响最大的四个关键因素。

    *   不得歧视美国法律规定的受保护群体：种族、肤色、宗教、国籍、性别、婚姻状况、年龄，或是否接受公共援助。确保模型无歧视需要充分的输入数据，并验证由此产生的人工智能模型。关于人工智能伦理的讨论提供了有用的背景信息。


    并非所有规则都适用于每种客户或合同。然而，它们展示了现有法律如何监管新兴人工智能组织——并且可能构成相当大的挑战。数据科学家可能拥有比银行现有模型更完美的信用评分人工智能模型。但如果他无法列出影响个人信用评分的四个主要因素，银行就不得使用该模型。因此，看到这些规则时，就不难理解为何最近理解和解释人工智能模型工作原理的能力备受关注。描述这一趋势的术语是"可解释性"和"可解释人工智能"。

    '
- fmt: "# Explainable AI\n\nThe need to build explainable AI model for complex prediction\
    \ or classification tasks is a real challenge. Data scientists can build (deep)\
    \ neural networks. Neural networks are black boxes solving difficult prediction\
    \ and classification challenges – but they are black boxes. Trained models consist\
    \ of hundreds or thousands of formulas and parameters. Their behavior is, for\
    \ humans, impossible to comprehend – a not-so-desirable option. Alternatively,\
    \ data scientists can rely on easy-to-understand models such as logistic and linear\
    \ regressions or random forest. However, they do not perform well for complex\
    \ AI tasks – another non-desirable option. The recent and ongoing work on the\
    \ topic of Explainable AI (`XAI`) wants to overcome this catch-22 challenge.\n\
    \n## Scenarios for XAI\n\n`XAI` wants to help with three scenarios:\n\n- The model\
    \ – and not the application of the model on new data – is the deliverable.\n-\
    \ Justifications and documentations of model behavior for ethical and regulatory\
