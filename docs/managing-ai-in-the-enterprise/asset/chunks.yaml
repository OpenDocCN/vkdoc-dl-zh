  trans: '

    ## 计算人工智能的商业价值


    高层承诺成为数据驱动型企业并投资人工智能，为人工智能项目提供了良好的培育环境。然而，构建并建立具体的人工智能服务需要资金，而资金则需要有说服力的商业案例。对于高度创新的项目来说，商业案例可能是一个障碍，因为量化其收益是一项挑战。幸运的是，经济学研究确定了信息技术投资创造价值的四种方式。它们有助于构建具体的商业案例。这四种方式或选项是：


    *   **信息效益**，例如，向决策者提供信息。

    *   **事务效益**，例如，改善日常运营和削减成本。

    *   **战略效益**，例如，改变公司在市场上的竞争方式或其产品的性质。

    *   **转型效益**指的是未来效益，例如，由于新工具的额外功能，员工在熟悉该工具后开始使用它，从而能够优化他们的工作。


    关于效益，有很多轶事证据，但很少有涵盖众多公司的系统性实证研究。一个例外是伊丽莎贝塔·拉古塞奥对法国各种规模公司进行的一项研究。在她的研究中，她关注了大数据技术。这些技术处理和分析以高速和多种格式涌入的海量数据。大数据与数据驱动型企业或人工智能从大量数据中生成洞察的核心目标密切相关，这使得她的研究也与本书相关。


    伊丽莎贝塔发现，在所有考虑的行业领域中，提高员工生产力是最相关的事务效益。降低运营成本位居第二。接下来最相关的战略效益是使信息技术与业务战略保持一致，并能够更快地应对变化。


    在转型效益领域，扩展能力被认为是最重要的。例如，可以通过让新员工快速开始工作并整合额外的数据源来实现这一点。在信息效益领域，他们列出了提供管理数据、提高数据准确性、以更可用的格式提供数据、使数据更易于访问以及使数据访问速度更快。


    在将上述见解应用于你的人工智能项目商业案例时，有两个关键点需要考虑。首先，领域相近，但并不完全相同。拉古塞奥的研究结果是很好的灵感来源，并非金科玉律。其次，公司文化和政治因素会影响哪种效益类型在你的组织和你的管理者中效果最佳：


    *   某些效益**易于量化**——尤其是（但不仅限于）事务效益。项目计算当前成本，并估算实施项目后的潜在节省。这类商业案例非常适合由财务数据驱动、且受财务控制者及类似管理者影响较大的公司。

    *   有些效益**难以量化**。预测分析会使销售额增长 1%还是 10%？商业案例中的计算与实际成本和节省可能存在巨大差异。许多战略效益和转型效益都属于这一类。这类论点能说服有远见和创新驱动的决策者，但无法说服吹毛求疵的人。

    *   信息效益最容易获得资金支持。当管理者认为需要数据时，如果在其预算范围内，她就会资助一个项目或服务。**无需事先量化**任何效益。


    当商业价值明确后，管理层会决定是否投资于转型，以成为数据驱动型组织，并构建和扩展其人工智能能力。在大多数情况下，人工智能计划会从那些成果易于衡量的“低垂果实”开始，例如改进和优化销售。


    ## 用例：销售运营效率


    提高销售效率是实现事务效益的一个例子：更多的销售额，更少的努力。该用例利用数据（和算法）的力量来促进销售并识别可能终止合同的客户。在此类用例中，人工智能会预测，例如，哪些客户可能会购买产品。


    传统上，销售代理或销售管理层会根据直觉筛选客户名单，以了解哪些客户可以致电。过去和现在，他们的职责都是在选择要致电的客户时做出正确的选择。他们对结果负责。


    对于人工智能生成的名单，数据科学家（至少部分地）对销售成功负责。这些名单为销售代理提供了明确的行动指南。如果你想销售办公家具，这些是最有可能购买的客户。给他们打电话！这些客户可能会取消他们的有线电视订阅。采取行动并阻止它！无论谁创建了这样的名单，都要对其质量负责。

    '
- fmt: '### How and Why Up-Selling, Cross-Selling, Churn Use Cases Thrive


    There are convincing reasons why cross-selling and churn AI use cases are widespread.
    First, they are straightforward to implement. AI projects can often rely on the
    data of a single source system such as an ERP system, a CRM system, or a data
    warehouse for creating a good model. The advantage: AI projects do not have to
    bring data from various sources together, which is often a time-consuming task
    or even a project risk. Second, the transactional benefits are apparent and easy
    to validate. The AI project goes in the ring against a seasoned marketing and
    sales professional. Both the marketing professional and the AI choose 50 customers
    each. These 50 each are the customers, the marketing professional, respectively,
    the AI thinks they are the customers most likely buying the product. Then, sales
    reps contact these one hundred customers. They try to close a deal without knowing
    about the experiment. In the end, you count how many customers bought from the
    human-generated list, how many from the AI-provided one. The superiority of the
    AI list should be striking.


    This use case, however, needs the active support of the sales organization. What
    happens if the sales staff opposes the idea? Luckily, data scientists can implement
    a different use case just with data, without requiring help from other teams:
    the churn prediction use case. A churn prediction AI model predicts, for example,
    which customers cancel their mobile phone plan subscription soon. The data scientists
    generate the list – and wait. Maybe a week, perhaps a month. Then, they check
    whether their prediction became a reality and present to their management how
    many customers the company lost because the business ignores AI-generated insights.


    Upselling and churn prediction models base on scoring customers, usually assigning
    values to them between zero and one to customers. The scores indicate how likely
    a customer buys a product or cancels a contract. Organizations prioritize their
    call-center resources to contact customers with a high score. They call a customer
    with a score of `0.57` before reaching out to customers with a score of `0.12`
    (Figure [1-3](#516372_1_En_1_Chapter.xhtml#Fig3)). The input variable columns
    in the table reflect what we know about the customers. Based on these input variables,
    the scoring function, aka the AI model, calculates the customer affinity for a
    golden credit card.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig3_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig3_HTML.png)


    **Figure 1-3** Customer Scoring, a Typical AI Use Case


    The effect of using the scores for prioritization is similar to champagne bubbles.
    “Interesting” customers get to the top of the list as champagne bubbles rise to
    the top in a champagne flute. Figure [1-4](#516372_1_En_1_Chapter.xhtml#Fig4)
    illustrates this, with the left representing contacting customers randomly and,
    on the right, choosing them based on a score.


    Suppose a call center agent calls a potential customer from this list. If he is
    interested, he buys because of the call. If we call a customer that is not interested,
    we “lose” one call.


    The table to the right in Figure [1-4](#516372_1_En_1_Chapter.xhtml#Fig4) contains
    the same names; just the order changed, thanks to AI. More customers who want
    to buy the product are at the top of the list and get called first. In this example,
    the sales agents close only one deal after four calls for the left table. In contrast,
    three of the four approached customers sign with the score-based approach reflected
    in the table to the right. This increase in sales results from the power of AI
    and analytics – and managers can implement the same and calculate the transactional
    benefit for their use cases.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig4_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig4_HTML.png)


    **Figure 1-4** How AI Supports Sales If You Have Limited Resources for Calling
    Potential Customers. Using AI, You Can Increase the Chance to Contact Interested
    Customers


    ### Hurdles and Prerequisites for Success


    Enthusiastic AI evangelists, software vendors, or external consultants sometimes
    forget to mention two strict limitations or prerequisites for the applicability
    of AI for sales. First, AI requires a sufficiently large training data set. AI
    algorithms generalize from this training data and learn and create models. No
    (good) training data means no (good) model.


    There is no historical training data when launching a new product the first time,
    for example, an eco-friendly gold credit card with blinking pink LEDs. Nobody
    bought this product already. Thus, there is no training data. Creating an AI model
    is impossible.


    The second strict limitation is that these AI use cases help only for resource
    shortages, for example, if the sales organization cannot contact all potential
    customers. Resource shortages are common in the retail banking mass market, but
    not in wealth management or when a big European airplane manufacturer sells airplanes
    to airlines. In the latter cases, each customer generates high revenues. The sales
    staff’s costs are low compared to the revenues just one deal generates. Airplane
    manufacturers can afford large sales teams and over-capacity. The implications
    for AI: no shortage means no need to invest in AI. The sales team is in constant
    contact with their customers on the C-level and knows who might buy 20 airplanes
    next year without AI. Potential customers might even approach the airplane manufacturer
    anyhow. There is no shortage in sales capacity per customer AI could optimize.
    The bottleneck is how long the sales team can talk with airlines’ top management.
    CEOs do not have the time to talk hours and hours with one supplier every week.
    Thus, AI can help identify hidden needs and cross-selling options, enabling the
    sales staff to present the right ideas and products. In other words: What are
    the five products and services we should tell a specific customer when we visit
    him next week? It is an AI functionality everybody knows from online shops: “customers
    who buy steak and crisps buy German beer as well.”


    Besides these two strict limitations – need for adequate training data and AI
    being helpful (only) in case of resource shortages requiring optimization – there
    is a third hurdle relating to the business model and company culture. Certain
    industries and business models rely on a close personal relationship between sales
    staff and customers. Examples are the insurance sector or private banking for
    super-wealthy customers. Here, the sales staff might see AI as a direct attack
    on their professional pride, self-conception, and value as an employee. AI (and
    the IT department) claims to understand customers better than their bank advisors,
    who know their wealthy clients for decades and met them in-person. Furthermore,
    the sales staff’s compensation depends on closing deals – and their skill to sell
    the right product to the right customers. If computers do better, client advisors
    fear for their long-term relevance for the organization – and their bonuses and
    commissions.


    Fear for their relevance is a work culture aspect that exemplifies that data scientists
    alone cannot transform the organization into a data-driven company relying on
    AI for more efficiency. A data scientist can and must create a good model. Dealing
    with the skepticism, for example, of sales staff, is a change management task.
    Their managers and the organization’s top management have to handle this topic
    and decide. They can stop the use of AI in their area – this happens in companies.
    However, innovative managers push forward anyhow. They even ignore furious sales
    staff or navigate and circumvent the issues, for example, by initiating a direct
    online sales channel.'
  raw: '### How and Why Up-Selling, Cross-Selling, Churn Use Cases Thrive


    There are convincing reasons why cross-selling and churn AI use cases are widespread.
    First, they are straightforward to implement. AI projects can often rely on the
    data of a single source system such as an ERP system, a CRM system, or a data
    warehouse for creating a good model. The advantage: AI projects do not have to
    bring data from various sources together, which is often a time-consuming task
    or even a project risk. Second, the transactional benefits are apparent and easy
    to validate. The AI project goes in the ring against a seasoned marketing and
    sales professional. Both the marketing professional and the AI choose 50 customers
    each. These 50 each are the customers, the marketing professional, respectively,
    the AI thinks they are the customers most likely buying the product. Then, sales
    reps contact these one hundred customers. They try to close a deal without knowing
    about the experiment. In the end, you count how many customers bought from the
    human-generated list, how many from the AI-provided one. The superiority of the
    AI list should be striking.


    This use case, however, needs the active support of the sales organization. What
    happens if the sales staff opposes the idea? Luckily, data scientists can implement
    a different use case just with data, without requiring help from other teams:
    the churn prediction use case. A churn prediction AI model predicts, for example,
    which customers cancel their mobile phone plan subscription soon. The data scientists
    generate the list – and wait. Maybe a week, perhaps a month. Then, they check
    whether their prediction became a reality and present to their management how
    many customers the company lost because the business ignores AI-generated insights.


    Upselling and churn prediction models base on scoring customers, usually assigning
    values to them between zero and one to customers. The scores indicate how likely
    a customer buys a product or cancels a contract. Organizations prioritize their
    call-center resources to contact customers with a high score. They call a customer
    with a score of 0.57 before reaching out to customers with a score of 0.12 (Figure
    [1-3](#516372_1_En_1_Chapter.xhtml#Fig3)). The input variable columns in the table
    reflect what we know about the customers. Based on these input variables, the
    scoring function, aka the AI model, calculates the customer affinity for a golden
    credit card.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig3_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig3_HTML.png)


    Figure 1-3


    Customer Scoring, a Typical AI Use Case


    The effect of using the scores for prioritization is similar to champagne bubbles.
    “Interesting” customers get to the top of the list as champagne bubbles rise to
    the top in a champagne flute. Figure [1-4](#516372_1_En_1_Chapter.xhtml#Fig4)
    illustrates this, with the left representing contacting customers randomly and,
    on the right, choosing them based on a score.


    Suppose a call center agent calls a potential customer from this list. If he is
    interested, he buys because of the call. If we call a customer that is not interested,
    we “lose” one call.


    The table to the right in Figure [1-4](#516372_1_En_1_Chapter.xhtml#Fig4) contains
    the same names; just the order changed, thanks to AI. More customers who want
    to buy the product are at the top of the list and get called first. In this example,
    the sales agents close only one deal after four calls for the left table. In contrast,
    three of the four approached customers sign with the score-based approach reflected
    in the table to the right. This increase in sales results from the power of AI
    and analytics – and managers can implement the same and calculate the transactional
    benefit for their use cases.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig4_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig4_HTML.png)


    Figure 1-4


    How AI Supports Sales If You Have Limited Resources for Calling Potential Customers.
    Using AI, You Can Increase the Chance to Contact Interested Customers


    ### Hurdles and Prerequisites for Success


    Enthusiastic AI evangelists, software vendors, or external consultants sometimes
    forget to mention two strict **limitations or prerequisites** for the applicability
    of AI for sales. First, AI requires a sufficiently large training data set. AI
    algorithms generalize from this training data and learn and create models. No
    (good) training data means no (good) model.


    There is no *historical* *training data* when launching a new product the first
    time, for example, an eco-friendly gold credit card with blinking pink LEDs. Nobody
    bought this product already. Thus, there is no training data. Creating an AI model
    is impossible.


    The second strict limitation is that these AI use cases help only for **resource
    shortages** , for example, if the sales organization cannot contact all potential
    customers. Resource shortages are common in the retail banking mass market, but
    not in wealth management or when a big European airplane manufacturer sells airplanes
    to airlines. In the latter cases, each customer generates high revenues. The sales
    staff’s costs are low compared to the revenues just one deal generates. Airplane
    manufacturers can afford large sales teams and over-capacity. The implications for
    AI: no shortage means no need to invest in AI. The sales team is in constant contact
    with their customers on the C-level and knows who might buy 20 airplanes next
    year without AI. Potential customers might even approach the airplane manufacturer
    anyhow. There is no shortage in sales capacity per customer AI could optimize.
    The bottleneck is how long the sales team can talk with airlines’ top management.
    CEOs do not have the time to talk hours and hours with one supplier every week.
    Thus, AI can help identify hidden needs and cross-selling options, enabling the
    sales staff to present the right ideas and products. In other words: What are
    the five products and services we should tell a specific customer when we visit
    him next week? It is an AI functionality everybody knows from online shops: “customers
    who buy steak and crisps buy German beer as well.”


    Besides these two strict limitations – need for adequate training data and AI
    being helpful (only) in case of resource shortages requiring optimization – there
    is a third hurdle relating to the business model and company culture. Certain
    industries and business models rely on a close **personal relationship** between
    sales staff and customers. Examples are the insurance sector or private banking
    for super-wealthy customers. Here, the sales staff might see AI as a direct attack
    on their professional pride, self-conception, and value as an employee. AI (and
    the IT department) claims to understand customers better than their bank advisors,
    who know their wealthy clients for decades and met them in-person. Furthermore,
    the sales staff’s compensation depends on closing deals – and their skill to sell
    the right product to the right customers. If computers do better, client advisors
    fear for their long-term relevance for the organization – and their bonuses and
    commissions.


    Fear for their relevance is a work culture aspect that exemplifies that data scientists
    alone cannot transform the organization into a data-driven company relying on
    AI for more efficiency. A data scientist can and must create a good model. Dealing
    with the skepticism, for example, of sales staff, is a change management task.
    Their managers and the organization’s top management have to handle this topic
    and decide. They can stop the use of AI in their area – this happens in companies.
    However, innovative managers push forward anyhow. They even ignore furious sales
    staff or navigate and circumvent the issues, for example, by initiating a direct
    online sales channel.'
  trans: '

    ### 向上销售、交叉销售与客户流失用例为何能蓬勃发展及其运作方式


    交叉销售与客户流失相关的 AI 用例之所以广泛存在，有令人信服的理由。首先，它们实施起来简单直接。AI 项目通常可以依赖单一源系统的数据（例如 ERP 系统、CRM
    系统或数据仓库）来创建良好的模型。其优势在于：AI 项目无需整合来自不同来源的数据，而这往往是一项耗时的任务，甚至可能成为项目风险。其次，交易层面的收益显而易见且易于验证。AI
    项目与经验丰富的市场营销及销售专业人士进行对决。市场营销专家和 AI 各自挑选 50 名客户。这各 50 名客户分别是市场营销专家和 AI 认为最有可能购买产品的客户。然后，销售代表联系这一百名客户。他们尝试达成交易，但并不知道这是一场实验。最后，统计有多少客户从人工生成的列表中购买了产品，又有多少客户从
    AI 提供的列表中购买了产品。AI 列表的优越性应当非常显著。


    然而，这个用例需要销售组织的积极支持。如果销售人员反对这个想法，会发生什么？幸运的是，数据科学家可以仅凭数据实施另一个不同的用例，无需其他团队的帮助：即客户流失预测用例。例如，一个客户流失预测
    AI 模型可以预测哪些客户即将取消他们的手机套餐订阅。数据科学家生成列表——然后等待。也许一周，也许一个月。接着，他们检查自己的预测是否成真，并向管理层展示，由于业务部门忽视了
    AI 生成的洞察，公司流失了多少客户。


    向上销售和客户流失预测模型都基于对客户进行评分，通常为每个客户分配一个介于 0 和 1 之间的数值。这些分数表示客户购买产品或取消合同的可能性有多大。组织会优先安排呼叫中心资源联系得分高的客户。他们会先联系得分为`0.57`的客户，然后再联系得分为`0.12`的客户（图
    1-3）。表格中的输入变量列反映了我们对客户的了解。基于这些输入变量，评分函数（即 AI 模型）会计算出客户对一张金色信用卡的偏好度。


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig3_HTML.png](img/516372_1_En_1_Fig3_HTML.png)


    **图 1-3** 客户评分，一个典型的 AI 用例


    使用评分进行优先级排序的效果类似于香槟气泡。“有趣”的客户会上升到列表顶部，就像香槟气泡在香槟杯中升到顶部一样。图 1-4 说明了这一点，左侧代表随机联系客户，右侧代表根据评分选择客户。


    假设一个呼叫中心客服从这个列表中给一位潜在客户打电话。如果他感兴趣，就会因为这次通话而购买。如果我们给一个不感兴趣的客户打电话，我们就“浪费”了一次通话。


    图 1-4 右侧的表格包含相同的名字；只是顺序因 AI 而改变。更多想要购买产品的客户位于列表顶部，并首先被联系。在这个例子中，对于左侧的表格，销售代理在四次通话后只成交了一笔交易。相比之下，在右侧表格所反映的基于评分的方法中，被联系的四个客户中有三个签约了。这种销售额的增长源于
    AI 和分析的力量——管理者可以实施同样的方法，并为其用例计算交易层面的收益。


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig4_HTML.png](img/516372_1_En_1_Fig4_HTML.png)


    **图 1-4** 当联系潜在客户的资源有限时，AI 如何支持销售。使用 AI，您可以增加联系到有意向客户的机会


    ### 成功的障碍与先决条件


    热情的 AI 布道者、软件供应商或外部顾问有时会忘记提及 AI 在销售领域应用的两个严格限制或先决条件。首先，AI 需要足够大的训练数据集。AI 算法从这些训练数据中进行归纳，学习并创建模型。没有（好的）训练数据就意味着没有（好的）模型。


    当首次推出新产品时，例如一张带有闪烁粉色 LED 灯的环保金色信用卡，就没有历史训练数据。没有人购买过这个产品。因此，没有训练数据。创建一个 AI 模型是不可能的。


    第二个严格的限制是，这些 AI 用例仅在资源短缺时才有帮助，例如，当销售组织无法联系所有潜在客户时。资源短缺在零售银行大众市场很常见，但在财富管理领域或当一家欧洲大型飞机制造商向航空公司销售飞机时则不然。在后一种情况下，每个客户都能带来高额收入。与单笔交易产生的收入相比，销售人员的成本很低。飞机制造商能够负担得起庞大的销售团队和超额产能。这对
    AI 意味着：没有资源短缺就意味着没有必要投资 AI。销售团队与他们的客户在高层保持持续联系，无需 AI 就知道谁明年可能购买 20 架飞机。潜在客户甚至可能主动联系飞机制造商。AI
    能够优化的每个客户的销售能力并不短缺。瓶颈在于销售团队能与航空公司高层管理人员交谈多长时间。CEO 们没有时间每周与一个供应商交谈数小时。因此，AI 可以帮助识别隐藏的需求和交叉销售机会，使销售人员能够提出正确的想法和产品。换句话说：我们下周拜访某个特定客户时，应该向他推荐哪五种产品和服务？这是每个人都从在线商店中了解到的
    AI 功能：“购买牛排和薯片的顾客也会购买德国啤酒。”


    除了这两个严格的限制——需要足够的训练数据以及 AI 仅在需要优化的资源短缺情况下才有帮助——还有第三个障碍，涉及商业模式和公司文化。某些行业和商业模式依赖于销售人员与客户之间密切的个人关系。例如保险业或面向超级富豪客户的私人银行业务。在这些领域，销售人员可能将
    AI 视为对其职业自豪感、自我认知以及作为员工价值的直接攻击。AI（以及 IT 部门）声称比那些认识富裕客户几十年并见过他们本人的银行顾问更了解客户。此外，销售人员的薪酬取决于成交率——以及他们向合适客户销售合适产品的技能。如果电脑做得更好，客户顾问会担心自己在组织中的长期价值——以及他们的奖金和佣金。


    对自身价值的担忧是一个工作文化方面的因素，它表明仅靠数据科学家无法将组织转变为一个依赖 AI 提高效率的数据驱动型公司。数据科学家能够且必须创建一个好的模型。处理（例如）销售人员的怀疑态度，是一项变革管理任务。他们的经理和组织的最高管理层必须处理这个问题并做出决定。他们可以阻止
    AI 在其领域的使用——这种情况在公司中确实存在。然而，创新的管理者无论如何都会推动前进。他们甚至无视愤怒的销售人员，或者通过引导和规避问题，例如通过启动直接的在线销售渠道来应对。

