  trans: '

    ### 存储训练数据


    训练数据摄取模式将数据送入 AI 训练环境，而该环境需要存储这些数据。目前存在多种传统和新兴技术用于数据存储（图 6-4）。AI 组织应做出明智决策，确定在训练环境中使用哪些技术。


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig4_HTML.png](img/516372_1_En_6_Fig4_HTML.png)


    **图 6-4** 训练数据存储选项


    组织、处理和存储结构化表格类数据最流行的形式是`SQL`数据库，其中也包含了`数据仓库`技术。


    数据仓库针对高效执行大规模数据集上的复杂查询（OLAP——在线分析处理）进行了优化。架构师和数据库管理员依赖专门的模式和表结构来实现更高效的查询执行（“星型”和“雪花型”模式）。相比之下，OLTP（在线事务处理）优化型数据库支持更高的事务速率，即读取、写入和更新单行或少数几行。对于大多数
    AI 用例而言，OLTP 优化型与 OLAP 优化型数据库之间的差异不应产生显著影响（至少在没有过于复杂的数据提取查询时）。很可能，大部分数据处理发生在`Jupyter`笔记本中，而非数据库内。


    对于 AI 组织而言，使用`SQL`数据库存储（部分）训练数据是必需的，尽管可能还需要其他技术。`SQL`数据库的相关性基于这样一个事实：大多数（业务和/或企业）数据都以表的形式存储在`SQL`数据库中。表具有
    AI 训练算法所需的输入数据结构。因此，将数据转换为不同结构进行存储通常只会带来成本，而没有任何益处。


    `SQL`数据库还具有其他优势。首先，项目人员配置很容易，因为市场上`SQL`技能非常普及。其次，大多数 IT 部门都有数据库管理员，可以协助解决复杂的技术问题。AI
    组织无需专门的技术知识。最后，AI 组织只需要一个不带高级功能的普通`SQL`数据库。因此，像`Maria DB`这样免许可费用的数据库就完全适用。


    虽然数据库和数据仓库技术源自上个千年，但`No-SQL`（不仅仅是 SQL）数据库的兴起则是 2010 年代的现象。`No-SQL`数据库的世界是多样化的，从关注可扩展性（通过减少事务保证）到读时模式（我们在数据湖中也能看到这一点），再到不同的数据结构。后者是这里的重点：键值存储、文档数据库和图数据库。它们都以不同的方式存储数据。


    **键值存储**的数据模型极其精简——由键和值组成的对，例如`<114.5.82.4, 20.07.2020 09:32>`。检索值（例如，IP 地址上次连接到数据库的时间）需要键（例如，IP
    地址）。AI 组织可以轻松地将此类键值对存储在`SQL`数据库中。这样，他们就能避免建立一个技术动物园。


    **文档数据库**存储的是——没错——文档。文档是半结构化的，最流行的格式是`XML`和`JSON`。文档允许嵌套属性，并且不强制固定的属性结构。一个典型的`JSON`文档如下所示：


    ```

    {

    "article": {

    "title": "Mobile Testing",

    "journal": "ACM SIGSOFT Software Engineering Notes"

    "author": {

    "firstname": "Klaus",

    "lastname": "Haller"

    }

    }

    }

    ```


    即使源数据来自文档数据库，AI 组织也应质疑在其 AI 训练环境中建立一个或多个专用文档数据库的必要性。虽然有很好的替代方案，但`SQL`数据库通常不在其中。由于文档的半结构化特性，具有严格模式的`SQL`数据库通常不太适合。相比之下，数据湖和对象存储是潜在的替代方案，我们将在本节后面讨论。


    **图数据库**使复杂互联主题和关系的建模与查询变得直观。社交网络是一个极佳的应用领域。图由节点和连接节点的边组成。节点可以代表人员或主题等。节点和边都可以拥有属性来存储附加信息。图
    6-5 包含了多种节点类型：个人、一个名为“辣妹组合”的乐队、他们的专辑以及他们的一些歌曲。边代表各种关系，例如成为乐队成员、发行了某张专辑，或者某首歌是专辑的一部分。


    虽然基于图数据库的应用可以检索出令人兴奋的结果和见解，但在技术上并没有要求必须在图数据库而非`SQL`数据库中执行此类分析。图数据库无法存储那些无法放入`SQL`数据库的数据或数据关系。图数据库更像是一种优化。它们简化了针对特定场景编写查询的过程，或者允许更快的查询执行。AI
    组织是否应该在其技术栈中添加图数据库？答案取决于具体情况。AI 组织是否需要自行运行图数据库，还是 IT 部门有专家团队来管理，或者他们可以使用软件即服务的图数据库服务，从而免去安装、维护和打补丁的工作？这些数据是否被广泛使用，并且图数据库是否存储了重要、相关的信息？使用图结构数据训练
    AI 模型的意图是什么？`SQL`数据库中是否存在无法通过其他方式解决的性能问题？图数据库需要一个商业案例来验证，与在 AI 环境中不使用它们相比，它们能带来财务上的收益。


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig5_HTML.png](img/516372_1_En_6_Fig5_HTML.png)


    **图 6-5** 在图数据库中表示辣妹组合


    **数据湖**是存储海量文件数据（甚至达到 PB 级）的合适选择。与简单的文件系统不同，数据湖允许搜索文件内容并聚合信息。例如，统计文件夹结构`2021/07/*`及其子文件夹中“潜在违规”日志条目的数量，以了解是否比上个月有更多事件。数据湖实现了读时模式功能，但其操作（与集成到应用程序中的文档数据库不同）针对的是涵盖来自各种应用程序数据的大规模数据集。无需定义数据结构或模式，只需定义在文件中的何处以及如何查找相关属性。因此，如果未找到该属性，数据湖会继续执行查询而不会抛出异常，这意味着——与`SQL`数据库的情况不同——如果特定属性不存在，不会有直接反馈。


    AI 组织迟早需要处理半结构化或非结构化数据。他们必须将此类数据存储在某个地方，而通常`SQL`数据库并不合适。`Hadoop`数据湖是正确选择吗？它需要投入精力来搭建和维护。如果你是一个大型组织，也许可以。较小的组织可以使用云中的数据湖服务。

    '
- fmt: 'Finally, `object storage` is a storage option worth mentioning as well. Since
    the launch of `AWS S3`, the relevance of object storage is getting bigger and
    bigger. What was a filesystem in the past is object storage technology today:
    the place to put files and documents. It is the “standard storage type” in the
    cloud. In contrast to traditional files, manipulating files is not possible, just
    replacing them, which does not impact the work of an AI organization. However,
    it makes sense to invest some time to elaborate on how to deal with unstructured
    (and semi-structured) data.


    ## Data Lakes vs. Data Warehouses


    Data lakes are a popular choice for AI organizations to capture and store massive
    amounts of data, including text, audio, video, and sensor data from various source
    systems. At the same time, companies also run substantial data warehouses, which
    are especially strong for reporting and analyzing large amounts of (business)
    data. While data lakes and data warehouses might look like redundant concepts,
    they are not. AI organizations benefit from both, though technical processes and
    the commercial aspects differ.


    What `ETL` – Extract, Transform, Load – is for data warehouses is `ELT` – Extract,
    Load, Transform – for data lakes. The steps are the same; their order differs
    (Figure 6-6). Deferring the transformation is a game changer cost-wise. The transformation
    step is the most time-consuming and expensive one. It covers cleansing plus ensuring
    consistency. Ensuring consistency is an analysis-intense, manual task, especially
    if several databases and reports contain similar, but slightly differently defined
    key performance indicators. Discussing with various experts and managers in different
    business teams and achieving a consensus can take several weeks. The benefits:
    A data warehouse has “gold standard” data quality on which engineers and business
    users can rely, and that is why managers fund the data warehouses. Thus, avoiding
    the cost-intensive transformation step before loading data into the data warehouse
    is no option. As a result, adding single attributes is already an investment,
    limiting the option to add data quickly. The management has (always) a say in
    whether and what data the data warehouse teams add.


    In contrast, data lakes store uncleansed raw data. There is no discussion about
    single attributes; there is a decision on which database to add or which folders
    with massive amounts of log files. Adding data incurs no high costs, neither for
    analysis in the project nor for storage afterward. These low costs are the success
    factor for data lakes. Engineers can just add data based on a vague hope someone
    might have some kind of idea somewhere in the future to use the data. This someone,
    then, pays for the transformation, including cleaning and preparation.


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig6_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig6_HTML.png)


    Figure 6-6


    Ingesting Data into Data Warehouses (Top) and Data Lakes (Bottom)


    ## Data Catalogs


    A crucial prerequisite for high-quality AI models is adequate training data. Which
    customers are likely to terminate the contract in the following weeks? Which screws
    on the assembly belt have a defect? Data scientists can answer (nearly) all questions
    of the world if they have access to the necessary data for training their machine
    learning model.


    Data warehouses provide large amounts of well-structured, well-documented consistent
    data. In contrast, data lakes collect a multitude of what data warehouses store,
    but without similar documentation – not what data scientists love, but an integral
    part of any data lake business case, as elaborated some paragraphs earlier. Plus,
    operational databases and other data storage means can contain additional data
    of interest for data scientists. A data catalog contains information about data
    in the various data sources, be it operational databases, data lakes, or other
    data. It helps AI projects finding potentially relevant training data they do
    not know yet. A data catalog makes the difference between a useful data lake and
    a useless data swamp. It is an enabler and speeds up the work of AI projects.


    Data catalogs can provide information on the data attribute and the table level.
    Table level information consists of three elements (Figure [6-7](#516372_1_En_6_Chapter.xhtml#Fig7)).
    First, a data set has a name and a unique identifier. Second, a data set has a
    description of what this table is about, typically enhanced with category information
    based on a company’s classification system and keywords that allow potential data
    users to find data quickly. Third, there is additional meta-data such as publisher,
    when it was published, by whom, data lineage info, etc.


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig7_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig7_HTML.png)


    Figure 6-7


    Data Set Description of a Publicly Available Data Set


    The data set description is the most crucial information in the data catalog.
    It enables data scientists to search for and identify potentially useful data
    sets that help training an AI model they work on currently.


    Data catalogs also provide information on the attribute level, including the technical
    data type (`String` vs. `Integer`) and, ideally, the domain data type (e.g., whether
    a string stores employee names or a passport ID). The data catalog might even
    provide minimum and maximum values for each column. Figure [6-8](#516372_1_En_6_Chapter.xhtml#Fig8)
    illustrates these two levels.


    Domain data types of attributes and data set descriptions reflect one typical
    data catalog use case: Finding all the columns with IBANs, customer name, or patient
    records, which is essential for legal and compliance teams (e.g., in the context
    of GDPR), but not really helpful for data scientists.


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig8_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig8_HTML.png)


    Figure 6-8


    Understanding Data Catalogs


    Data warehouses come with data catalogs and glossaries – and everybody knows that
    they are time-consuming to set up. So, can AI organizations or IT departments
    reduce costs and manual work by automating creating data catalogs data lakes with
    data loss prevention (DLP) tools, for example, with `Symantec` or `Google Cloud
    DLP`?'
