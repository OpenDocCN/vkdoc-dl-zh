- fmt: '# Data Preparation and CRISP-DM Phases


    Data preparation also covers cleansing the data: skipping rows with empty attributes,
    setting empty fields to a default value, or estimating missing values based on
    external information. During this phase, data scientists have to bring such data
    together from various tables and databases. All information about customers must
    be in one table, requiring merging and joining tables from one or multiple databases.
    The core database might provide the account balances. The number of meetings with
    the bank advisor and the customers comes from a table in the customer relationship
    solution. Finally, sometimes the syntax or format of the data has to be changed:
    Boolean values `‘Y’` and `‘Y’` might have to be mapped to the numbers `‘0’` and
    `‘1’`.


    The fourth CRISP-DM phase is **Modeling**. It is the core task and the one data
    scientists love most: creating an AI model. They decide whether to train, for
    example, a neural network or linear regression model. They define how to measure
    and evaluate the model quality and perform this task after the model creation.
    Finally, they document the model accuracy and compare potentially competing models.


    The **Evaluation** phase leads to the final decision of whether the model is ready
    for production usage. The stage covers the quality assurance as well as deciding
    whether the model is good enough for production. In contrast to the modeling phase,
    which looks at the model from an IT/AI perspective, the evaluation phase challenges
    whether the model really helps reaching the business goals. It can even mean applying
    and trying out the model in reality. One bank branch might call customers with
    a high risk of leaving. After one month, the project compares the numbers for
    this branch with those of a similar one that did not put in extra effort to convince
    potentially leaving customers. Such a comparison allows validating the benefit
    of AI.


    The sixth and final phase is **deployment**. The project plans how the model is
    used, elaborates a monitoring strategy to detect a degenerating model, and ensures
    the maintenance of the AI. It covers, furthermore, generating a final project
    report and having a lessons-learned workshop.


    Projects usually do not go linearly and in waterfall-style through these phases
    (see arrows in Figure [2-18](#516372_1_En_2_Chapter.xhtml#Fig18)). Sometimes,
    going back one step allows reaching the final goal quicker and/or better. For
    example, assume an AI project detects that the bank mainly lost German customers
    last quarter. Then, compliance and sales managers might suddenly remember that
    they forced them to leave – and did not tell the AI project team. Another iteration
    becomes necessary. Indeed, the AI project benefits heavily from the data and insights
    in a second iteration.


    In general, in the absence of detailed company-specific data, projects should
    plan three iterations. A second iteration typically needs around 50% and a third
    around 25% of the effort of the first. Also, practical experience indicates that
    the actual creation and training of the AI model takes only 10–20% of the overall
    time budget. It is a small fraction – and the reason why IT organizations try
    to improve their data scientists’ productivity. They want them to work on their
    core tasks and on new models that create business value.


    ## Improving the Productivity of Data Scientists


    Making data scientists work more efficiently is a big topic, though the exact
    motivation differs between organizations. Tech companies and start-ups often cannot
    recruit enough experts with specific technology or domain know-how. Other companies
    – especially in the IT service or consulting sector – face another dilemma. They
    (or the managers of their customers) have great ideas about innovating with AI.
    Most of the time, the data is available. However, my experience from brainstorming
    workshops is that financial gains and savings and the actual project costs often
    do not match. No business managers want to invest CHF 100,000 in an AI project
    to get CHF 30,000 savings per year. AI projects are cool but unfamiliar and, thus,
    “risky.” Hesitating managers might expect bullet-proof business cases. When AI
    organizations can increase their productivity, costs go down, and the business
    value remains the same. AI projects pay off quicker and deliver higher savings
    or returns.


    Going through the CRSIP-DM process is a structured way to identify improvement
    potential (Figure [2-19](#516372_1_En_2_Chapter.xhtml#Fig19)). The first phase
    is “business understanding.” The broad existing literature about **business analysis**
    and requirements analysis covers all methodologies and tools for understanding
    the goals and requirements of users, customers, and managers. Besides this general
    methodology know-how, there are AI-specific chances to optimize the first phase.
    This book elaborated them in the **scoping** section at the beginning of this
    chapter and the business value discussion in the previous chapter.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig19_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig19_HTML.png)


    Figure 2-19


    Optimizing Options for AI Projects


    Scoping and business analysis do not reduce the effort data scientists have for
    cleaning and preparing training data and to train a concrete model. However, a
    good business understanding reduces the risk that data scientists do not fully
    understand the business challenge. An insufficient understanding of the expected
    goals can result – after weeks of intense work – in the verdict that an AI model
    is correct and well-trained, but does not help anyone.


    The second CRISP-DM process phase, “data understanding,” covers data collection
    and acquisition, understanding the actual data, and verifying its quality. Two
    relevant optimization options exist for this phase: managing training data and
    setting up or introducing a data catalog. A **data catalog** compiles information
    about the various data sets stored in the organization’s data lake, databases,
    and data warehouses. It helps data scientists find relevant training data. The
    benefits are twofold. First, data catalogs reduce the time data scientists need
    to identify training data. Second, the AI models get potentially better because
    the data scientists could use a wider variety of available, relevant training
    data. We take a closer look at data catalogs in a later chapter.


    Data catalogs help to find existing training data. Sometimes, data scientists
    work on AI solutions for which no useful training data exists. Suppose an AI-driven
    application should decide based on images whether a steering wheel on an assembly
    belt can be packaged and shipped to the customer. Training such a model requires
    having steering wheel images labeled either as “good quality” or “insufficient
    quality.” Collecting and labeling images are time-consuming, tiring, and expensive
    because training sets have to be large. How long would you need to take 1000 pictures
    of steering wheels on an assembly line? Some have to be suitable for shipment;
    others must not. Regarding the defective steering wheels, you need to take at
    least 20 images for each quality issue.'
