  trans: '

    ### 训练集、验证集与测试集的数据划分


    `训练数据集`的目的是利用特定数据构建并训练机器学习模型。优化和微调 AI 模型的方法有很多，例如尝试不同的数学函数，或改变神经网络的隐藏层数量。数据科学家仅使用训练数据来执行这些优化。相比之下，`验证数据集`的目的是比较多个候选模型并检查过拟合情况。在实际部署模型前的最终测试，则是使用`测试数据集`进行的最终评估。


    数据集的划分取决于具体场景。在预测分析和统计场景中，数据集通常包含几百或几千个数据点。对于这些场景，`训练/验证/测试数据集`的典型划分比例为 60%/20%/20%。而在大数据、机器学习和神经网络领域，数据点往往多达数百万个。此时，采用
    98%/1%/1%的划分比例更为合理，验证集和测试集包含约一万个数据点就足够了。在开始模型训练之前，将现有的历史训练数据划分为这三个子集至关重要。


    ### 使用训练数据集评估 AI 模型


    对新训练的 AI 模型进行的第一项检查，是评估其在训练集上的表现。如果 AI 模型在此阶段就直接失败，那么它们在“现实世界”的生产环境中使用实时数据时，表现也不太可能更好。因此，这是新
    AI 模型的第一个真正的质量保证步骤。


    使用训练数据评估训练模型，意味着将训练数据集输入模型，并检查模型的预测是否正确。模型是否能预测出那些对信用卡产品感兴趣的银行客户？数据科学家会计算分类任务的精确率、召回率和准确率（或预测任务的`R²`），并验证这些数值是否满足业务要求。如果公司需要
    95%的召回率才能让业务案例成功，而模型在训练集上仅达到 85%，那么继续推进这个模型就是在浪费时间和金钱。AI 项目团队必须首先修复并改进该模型。


    图 3-7 中的可视化内容展示了模型失败的可能根本原因。曲线代表 AI 模型，它将区域划分为两个子区域或类别。所有猫的图片位于左上方和中部，所有狗的图片位于下方区域——实现了
    100%的精确率和召回率。在图 3-7(a)中，曲线完全正确地分离了数据集。这是理想情况，但通常图 3-7(b)中描绘的情况更接近现实。该图有助于理解 AI
    模型甚至可能在其自身训练数据上表现不佳的两个原因。


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig7_HTML.png](img/516372_1_En_3_Fig7_HTML.png)


    图 3-7

    分类场景：代表分类函数的曲线将猫（黑色圆圈）与狗（白色圆圈）图像分离得有多好？


    第一个潜在的根本原因是`缺少关键信息`和属性。一张停车场中汽车的照片不足以判断该车辆是否有足够的汽油行驶三十公里。因此，即使理论上可以区分两个类别，如果模型没有掌握所有信息，它也会在特定数据上失败。解决方案显而易见：向训练数据的数据点添加属性，并重新训练模型。


    同一张图也代表了 AI 模型在训练数据上失败的第二个原因：底层的`模型`函数过于`简单`（`欠拟合模型`）。线性回归无法很好地应对复杂的非线性挑战。在我们的图示中，AI
    模型（仅）画了一条直线来分离类别。只有曲线才能正确分离这些区域（图 3-7，c）。如果数学函数与问题不匹配，AI 模型的表现就会很差。数据科学家通过从线性回归转向神经网络，或调整、扩展神经网络，然后重新训练模型来解决此类问题。


    总结：导致 AI 模型在训练数据上质量不足的问题可能有两个根本原因：欠拟合和信息缺失。数据科学家必须深入挖掘并可能进行实验以了解细节。但一旦模型在训练数据上表现良好，就进入了下一个质量保证阶段，该阶段将利用验证数据集。

    '
- fmt: '### Assessing the AI Model with the Validation Dataset


    When the AI model performs well on training data, the next step is testing it
    with the validation dataset. We do precisely the same as in the previous assessment,
    just with different data. This time, we feed the validation data set. The validation
    data is data *not* used for training the model. This measurement aims to detect
    **overfitting** or a **high bias** in the training data. The symptoms are the
    same – good performance (e.g., recall, precision, `R²`) on the training set, poor
    performance on the validation set.


    In the case of **overfitting**, the model does not generalize well. The AI model
    reflects all the oddities of the sample data but does not generalize, which is
    needed to perform well on unknown data. For those with a strong math background:
    If you have a training data set with 1001 data points, you can fit a 1000th-degree
    polynomial as a prediction function. The function works perfectly for the training
    data but is completely erratic everywhere else. Figure [3-7](#516372_1_En_3_Chapter.xhtml#Fig7)
    (d) visualizes this phenomenon. The curve separates the dog and the cat images
    well for the training data. However, the border between the areas is so erratic
    that the model classifies images similar and close to training images differently.


    Figure [3-8](#516372_1_En_3_Chapter.xhtml#Fig8) provides another perspective on
    the underfitting/overfitting challenge. On the left side of the figure, the model
    is underfitted and too simplistic. The model error on the training and the validation
    data set is high. When the model gets more complex, its performance increases,
    that is, the error drops for the training and the validation data. When the model
    gets more complex, the model error gets lower and lower for the training data,
    whereas the model error on the validation data rises. We are overfitting the model.
    The challenge for data scientists is getting close to optimal model complexity,
    the tipping point between under- and overfitting. Regularization is one option
    to ease their work. It means penalizing more complex models when comparing model
    quality.


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig8_HTML.png](images/516372_1_En_3_Chapter/516372_1_En_3_Fig8_HTML.png)


    Figure 3-8


    The Model Complexity vs. Model Error Dilemma


    **Biased data** is the second potential root cause for good model performance
    on training, but not on validation data. Biased data means that training and validation
    data (and potentially the reality) have different data distributions and characteristics.
    In our cat-dog example, one data set might consist of a well-crafted set of dog
    and cat pictures. A second and a third data set might result from crawling the
    Internet and Wikipedia for images related to cats and dogs. Obviously, training
    a model with one of the data sets results in a good performance on this specific
    data set, but not necessarily when testing with any of the other sets. Without
    a budget for manually reviewing images, automatically collected training data
    probably contains images labeled as a cat that contain cat food or litter boxes
    for pets. All three approaches are legitimate to get data for training and validation
    and test data sets. The bias issue emerges when not mixing the images from the
    different data sets, but one becomes the training, the next the validation, and
    the last the test data set. The characteristics of the image sets most likely
    differ too much.


    Figure [3-7](#516372_1_En_3_Chapter.xhtml#Fig7) (e) illustrates the bias issue.
    A vertical line separates the two classes quite well when training a model with
    the circles. However, suppose the distribution of the validation data – symbolized
    with the rhombs – differs. In that case, the model does not classify them correctly.


    Hopefully, your AI project trained one or more candidate AI models which perform
    well on the validation test data set. Then, the AI model is ready for a final
    check with the test data before production deployment.


    ### Assessing the AI Model with the Test Dataset


    The final assessment is with the test dataset. An AI model in this stage passed
    the assessments successfully with the training and validation data. Still, it
    can fail on the test data with poor metrics values. Then, the model is probably
    overfitted to the validation data under the assumption that validation and test
    data sets are similar.


    This explanation might surprise. The purpose of the validation stage is to detect
    overfitting, yet we face this issue in the test stage. The reason is simple: The
    validation stage detects overfitting to training data, not to validation data.
    Since the model is now in the test state, it performed well (also compared to
    other candidates) with validation data. Obviously, an overfitted model has a good
    chance to perform well and to get to the test data stage. How to fix this shortcoming?
    Increase the validation data set to make overfitting less likely, repeat the validation
    test, and choose a different model for the final assessment with test data.


    ## Monitoring AI Models in Production


    With the deployment of an AI model to production, research-oriented textbooks
    stop. What could you expect more than a high-performing model? In practice, the
    business expects a well-performing model not only for a day but for weeks and
    months. If the quality drops, retraining becomes necessary. At deployment time,
    the first question might be whether the model provides the classification and
    prediction quality required for the expected business benefit. Furthermore, the
    business might pose a second question: How can we ensure that the model offers
    improvements and savings over the long term. Even if they do not ask right now,
    they will clearly communicate their expectations if business benefits vanish and
    sales figures plump due to a not-so-good-anymore AI model.


    A forward-looking AI project manager addresses such uncertainties and obvious
    necessity by implementing monitoring functionality as part of the project. It
    is a paradigm shift compared to the traditional QA approach in IT departments.
    The traditional QA strategy tests rigorously before going live. Afterward, the
    rule is: never touch a running system. AI models need a different approach. They
    might degenerate and become outdated within hours, days, weeks, or months. It
    is often a gradual process, but there are clear, measurable indicators:


    - A significant change in the input values, for example, changes in the mean value
    or the distribution of input variables. Do shopping baskets contain 80% swimwear
    instead of 80% products of the winter clothing category?

    - A significant change in the output values of the statistical model. Does the
    distribution of the classification output change, for example, from 30% dog pictures
    to 45%? Will only 20 products be proposed to all customers over one day instead
    of 1000 different products per day previously?

    - Declining forecast quality: Are 20% fewer customers adding the product proposed
    by the AI component to their shopping cart than a month ago?


    Of course, an application must collect these key figures so that business users
    or data analysts can recognize changes or an automatic alarm is possible.


    An (more complex) alternative to monitoring indicators is retraining the actual
    model from time to time or even every night. A new model is generated with the
    then-current data and compared with the previous model. In the event of significant
    deviations, data scientists replace the older model with the new one. How often
    do you generate a new model for control purposes – and whether you can automate
    this model creation – is ultimately a commercial question.'
