- fmt: "### Understanding the Business Goal\n\nThe first step is a rather generic\
    \ project management task: understanding what the business wants to achieve. It\
    \ is a clear sign of trust in AI’s innovation potential when the business spends\
    \ half a million or three million euros on implementing an AI solution. Then,\
    \ they obviously believe that AI helps them run their business better. However,\
    \ to prevent disappointments, a business case must answer the following questions:\n\
    \n- What is the exact goal of the business? Why do they invest money?\n- What\
    \ are the criteria to decide whether the project delivered everything they expected?\n\
    - How does the project relate to strategic and tactical business goals?\n- What\
    \ is the expected timeline?\n- Is there already a budget? How much is it?\n\n\
    The answers to these questions help when writing the actual business case. The\
    \ AI project manager can verify whether the expectations of the management and\
    \ how the actual high-level project planning after the scoping phase match. Do\
    \ the project’s direction, deliverables, and timeline match the senior management’s\
    \ expectations?\n\n### Understand the Insights Category\n\nThe second scoping\
    \ step translates the business problem into an AI problem. Is supervised or unsupervised\
    \ learning the solution? Which subcategory is needed? Clustering, association,\
    \ or dimensionality reduction for unsupervised learning or prediction and classification\
    \ for supervised learning? Does the training data consist of tables, text, audio,\
    \ video, or other data types? Figure [2-6](#516372_1_En_2_Chapter.xhtml#Fig6)\
    \ provides a first overview.\n\n`Supervised` learning algorithms get training\
    \ data with input and the corresponding correct output. It is always a pair such\
    \ as a word in English and the proper German translation: `<red, rot> <hat, Hut>`.\
    \ One subcategory for supervised learning is `classification`. A classification\
    \ algorithm puts data items or objects in one of the defined classes. They work\
    \ similarly to the Sorting Hat in the Harry Potter books and movies. The Sorting\
    \ Hat determines for each new student in which of the four dormitory houses he\
    \ or she fits best in and should live in the following years. A typical classification\
    \ use case is image recognition: Is it a cat in the picture, or is it a dog?\n\
    \n`Prediction` is the second category of supervised learning insights. How much\
    \ sugar and cream should we order to produce enough ice cream tomorrow? What will\
    \ be tomorrow’s ice cream sales based on last year’s numbers, today’s weather,\
    \ and the weather forecast for tomorrow? Supervised learning is often directly\
    \ actionable. Thus, they are beneficial for transforming operational business\
    \ processes in companies and organizations aiming to become data-driven and AI-empowered.\n\
    \n![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig6_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig6_HTML.png)\n\
    \nFigure 2-6  \nInsights Categories – A Quick Overview\n\n`Unsupervised` learning\
    \ structures the input data. A `clustering` algorithm looks at all data points.\
    \ It comes up with, for example, three groups of data points that are pretty close\
    \ together: status-oriented customers, price-sensitive customers, and nouveau-riche\
    \ customers. Clustering provides additional insights to the sales and marketing\
    \ departments and product managers without directly triggering any actions. `Associations`\
    \ identify relationships between data elements, whereas `dimension reduction`\
    \ simplifies complex, high dimensional data, for example, to remove noise from\
    \ images.\n\nIn general, unsupervised learning algorithms unveil hidden structures\
    \ of/in your data, but (often) do not directly tell what to do. While the book\
    \ uses mainly supervised learning algorithms as examples, many of the methodologies\
    \ work for unsupervised learning algorithms as well.\n\nWhen a project has identified\
    \ the needed insights category, the next step is to understand the data types\
    \ used for training the model – and where to source them. `Database` or `CSV/Excel\
    \ tables` are common formats, though the exact format or file type does not matter\
    \ much. What matters is that the machine learning algorithms get structured, table-liken\
    \ input.\n\n`Images and videos` are other types of input data. They help with\
    \ camera images during the production process and check whether the produced items\
    \ have a good quality or video streams from CCTVs to check for persons entering\
    \ restricted areas. `Speech and sound` (e.g., engine noise) or `text` in the form\
    \ of documents or emails are additional options.\n\nThe exact data types do not\
    \ impact whether AI can come up with the solution per se. It is more to make a\
    \ better effort estimation (in short: tables are less work than speech) and elaborate\
    \ the timeline more precisely. Furthermore, the AI project manager can validate\
    \ how experienced the data scientists are with the particular area of AI needed\
    \ for this business question. No project manager wants to realize at halftime\
    \ that his project misses essential skills, that it is unclear whether suitable\
    \ AI code libraries exist, or that they must identify a particular external service\
    \ to build the solution.\n\nHaving answers for the questions addressed in the\
    \ second scoping step brings the project closer to deciding which AI methods and\
    \ algorithms to use. However, this decision still needs clarity regarding the\
    \ explainability question.\n\n### “Prediction Only” vs. “Prediction and Explanation”\n\
    \nTwo similar questions require slightly different approaches and potentially\
    \ different AI learning algorithms. Suppose a TV streaming platform’s sales department\
    \ wants to boost sales. First, they could ask which customers they should call\
    \ to sell as many subscription upgrades as possible within one week. Second, they\
    \ might be interested to understand how their customer base differs from the overall\
    \ population. For example, the product manager could realize her customers are\
    \ mainly in the German-speaking part of Switzerland. Adding a French and an Italian\
    \ language offering might be an option to foster growth in Switzerland.\n\nThe\
    \ first option with lists of potential buyers is operational. The sales managers\
    \ need a list of which clients to call or mail. They do not care whether the list\
    \ comes from a statistical model, a 100-layer neural network nobody understands,\
    \ or from a fortune-teller using a crystal ball. They want a list with accurate\
    \ predictions of who might buy.\n\nThe second question asks about buyers’ characteristics.\
    \ Again, data scientists need a model that predicts who is likely to buy what.\
    \ This time, though, understanding and explaining the model is essential. The\
    \ attributes and their values matter. They help to distinguish buying customers\
    \ from others. A fortune-teller or a 100-layer neural network might be highly\
    \ accurate with predictions, but less accurate statistical models are often better\
    \ for understanding characteristics. “Explainability” is a prominent topic in\
    \ one of the later chapters.\n\nConsequently, AI project managers or data scientists\
    \ can provide a “prediction only” AI model or must deliver a “prediction and explanation”\
    \ one. It is like painting a house white or pink. Both are possible. You should\
    \ just clarify very clearly what your customer expects to prevent surprised reactions\
    \ later."
  raw: '### Understanding the Business Goal


    The first step is a rather generic project management task: understanding what
    the business wants to achieve. It is a clear sign of trust in AI’s innovation
    potential when the business spends half a million or three million euros on implementing
    an AI solution. Then, they obviously believe that AI helps them run their business
    better. However, to prevent disappointments, a business case must answer the following
    questions:


    *   What is the exact goal of the business? Why do they invest money?


    *   What are the criteria to decide whether the project delivered everything they
    expected?


    *   How does the project relate to strategic and tactical business goals?


    *   What is the expected timeline?


    *   Is there already a budget? How much is it?


    The answers to these questions help when writing the actual business case. The
    AI project manager can verify whether the expectations of the management and how
    the actual high-level project planning after the scoping phase match. Do the project’s
    direction, deliverables, and timeline match the senior management’s expectations?


    ### Understand the Insights Category


    The second scoping step translates the business problem into an AI problem. Is
    supervised or unsupervised learning the solution? Which subcategory is needed?
    Clustering, association, or dimensionality reduction for unsupervised learning
    or prediction and classification for supervised learning? Does the training data
    consist of tables, text, audio, video, or other data types? Figure [2-6](#516372_1_En_2_Chapter.xhtml#Fig6)
    provides a first overview.


    **Supervised** learning algorithms get training data with input and the corresponding
    correct output. It is always a pair such as a word in English and the proper German
    translation: <red, rot> <hat, Hut>. One subcategory for supervised learning is
    **classification**. A classification algorithm puts data items or objects in one
    of the defined classes. They work similarly to the Sorting Hat in the Harry Potter
    books and movies. The Sorting Hat determines for each new student in which of
    the four dormitory houses he or she fits best in and should live in the following
    years. A typical classification use case is image recognition: Is it a cat in
    the picture, or is it a dog?


    **Prediction** is the second category of supervised learning insights. How much
    sugar and cream should we order to produce enough ice cream tomorrow? What will
    be tomorrow’s ice cream sales based on last year’s numbers, today’s weather, and
    the weather forecast for tomorrow? Supervised learning is often directly actionable.
    Thus, they are beneficial for transforming operational business processes in companies
    and organizations aiming to become data-driven and AI-empowered.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig6_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig6_HTML.png)


    Figure 2-6


    Insights Categories – A Quick Overview


    **Unsupervised** learning structures the input data. A **clustering** algorithm
    looks at all data points. It comes up with, for example, three groups of data
    points that are pretty close together: status-oriented customers, price-sensitive
    customers, and nouveau-riche customers. Clustering provides additional insights
    to the sales and marketing departments and product managers without directly triggering
    any actions. **Associations** identify relationships between data elements, whereas
    **dimension reduction** simplifies complex, high dimensional data, for example,
    to remove noise from images.


    In general, unsupervised learning algorithms unveil hidden structures of/in your
    data, but (often) do not directly tell what to do. While the book uses mainly
    supervised learning algorithms as examples, many of the methodologies work for
    unsupervised learning algorithms as well.


    When a project has identified the needed insights category, the next step is to
    understand the data types used for training the model – and where to source them.
    **Database** **or** **CSV/Excel tables** are common formats, though the exact
    format or file type does not matter much. What matters is that the machine learning
    algorithms get structured, table-liken input.


    **Images and videos** are other types of input data. They help with camera images
    during the production process and check whether the produced items have a good
    quality or video streams from CCTVs to check for persons entering restricted areas.
    **Speech and sound** (e.g., engine noise) or **text** in the form of documents
    or emails are additional options.


    The exact data types do not impact whether AI can come up with the solution per
    se. It is more to make a better effort estimation (in short: tables are less work
    than speech) and elaborate the timeline more precisely. Furthermore, the AI project
    manager can validate how experienced the data scientists are with the particular
    area of AI needed for this business question. No project manager wants to realize
    at halftime that his project misses essential skills, that it is unclear whether
    suitable AI code libraries exist, or that they must identify a particular external
    service to build the solution.


    Having answers for the questions addressed in the second scoping step brings the
    project closer to deciding which AI methods and algorithms to use. However, this
    decision still needs clarity regarding the explainability question.


    ### “Prediction Only” vs. “Prediction and Explanation”


    Two similar questions require slightly different approaches and potentially different
    AI learning algorithms. Suppose a TV streaming platform’s sales department wants
    to boost sales. First, they could ask which customers they should call to sell
    as many subscription upgrades as possible within one week. Second, they might
    be interested to understand how their customer base differs from the overall population.
    For example, the product manager could realize her customers are mainly in the
    German-speaking part of Switzerland. Adding a French and an Italian language offering
    might be an option to foster growth in Switzerland.


    The first option with lists of potential buyers is operational. The sales managers
    need a list of which clients to call or mail. They do not care whether the list
    comes from a statistical model, a 100-layer neural network nobody understands,
    or from a fortune-teller using a crystal ball. They want a list with accurate
    predictions of who might buy.


    The second question asks about buyers’ characteristics. Again, data scientists
    need a model that predicts who is likely to buy what. This time, though, understanding
    and explaining the model is essential. The attributes and their values matter.
    They help to distinguish buying customers from others. A fortune-teller or a 100-layer
    neural network might be highly accurate with predictions, but less accurate statistical
    models are often better for understanding characteristics. “Explainability” is
    a prominent topic in one of the later chapters.


    Consequently, AI project managers or data scientists can provide a “prediction
    only” AI model or must deliver a “prediction and explanation” one. It is like
    painting a house white or pink. Both are possible. You should just clarify very
    clearly what your customer expects to prevent surprised reactions later.'
  trans: "\n### 理解业务目标\n\n第一步是一项相当通用的项目管理任务：理解业务想要实现什么。当企业投入五十万或三百万欧元来实施 AI 解决方案时，这清楚地表明了对\
    \ AI 创新潜力的信任。显然，他们相信 AI 能帮助他们更好地运营业务。然而，为了避免失望，商业案例必须回答以下问题：\n\n-   业务的具体目标是什么？他们为何投资？\n\
    -   判断项目是否交付了所有预期成果的标准是什么？\n-   该项目与战略性和战术性业务目标有何关联？\n-   预期的项目时间线是怎样的？\n-   是否已有预算？预算金额是多少？\n\
    \n这些问题的答案有助于撰写实际的商业案例。AI 项目经理可以验证管理层的期望与范围界定阶段之后实际的高层项目规划是否匹配。项目的方向、可交付成果和时间线是否符合高级管理层的期望？\n\
    \n### 理解洞察类别\n\n范围界定的第二步是将业务问题转化为 AI 问题。解决方案是监督学习还是无监督学习？需要哪个子类别？无监督学习中的聚类、关联或降维，还是监督学习中的预测和分类？训练数据由表格、文本、音频、视频还是其他数据类型组成？图\
    \ 2-6 提供了一个初步概览。\n\n`监督`学习算法使用包含输入和对应正确输出的训练数据。它总是一个配对，例如一个英文单词及其对应的德语翻译：`<red,\
    \ rot> <hat, Hut>`。监督学习的一个子类别是`分类`。分类算法将数据项或对象归入已定义的类别之一。其工作原理类似于《哈利·波特》书籍和电影中的分院帽。分院帽会为每位新生决定他/她最适合并应在未来几年居住的四个学院之一。一个典型的分类用例是图像识别：图片中是猫还是狗？\n\
    \n`预测`是监督学习洞察的第二个类别。我们应该订购多少糖和奶油才能生产出足够的冰淇淋供明天销售？根据去年的数据、今天的天气以及明天的天气预报，明天的冰淇淋销量会是多少？监督学习通常可以直接采取行动。因此，它们对于旨在成为数据驱动和\
    \ AI 赋能的企业和组织来说，在转变运营业务流程方面非常有益。\n\n![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig6_HTML.png](img/516372_1_En_2_Fig6_HTML.png)\n\
    \n图 2-6  \n洞察类别 – 快速概览\n\n`无监督`学习对输入数据进行结构化处理。`聚类`算法会查看所有数据点。例如，它会得出三个彼此非常接近的数据点组：注重地位的客户、对价格敏感的客户以及暴发户客户。聚类为销售和市场部门以及产品经理提供了额外的洞察，但不会直接触发任何行动。`关联`识别数据元素之间的关系，而`降维`则简化复杂的高维数据，例如去除图像中的噪声。\n\
    \n通常，无监督学习算法会揭示数据中隐藏的结构，但（通常）不会直接告诉你要做什么。虽然本书主要使用监督学习算法作为示例，但许多方法论同样适用于无监督学习算法。\n\
    \n当项目确定了所需的洞察类别后，下一步是理解用于训练模型的数据类型——以及从何处获取这些数据。`数据库`或`CSV/Excel 表格`是常见的格式，尽管具体的格式或文件类型并不重要。重要的是机器学习算法能获得结构化的、类似表格的输入。\n\
    \n`图像和视频`是其他类型的输入数据。它们有助于处理生产过程中的摄像头图像，检查生产出的物品是否质量良好，或处理来自闭路电视的视频流以检查是否有人员进入限制区域。`语音和声音`（例如，发动机噪音）或文档或电子邮件形式的`文本`是其他可选类型。\n\
    \n确切的数据类型本身并不影响 AI 能否提出解决方案。它更多是为了做出更好的工作量估算（简而言之：处理表格比处理语音工作量小）并更精确地规划时间线。此外，AI\
    \ 项目经理可以验证数据科学家在解决此业务问题所需的特定 AI 领域的经验水平。没有项目经理希望在项目中途才发现项目缺少关键技能，不清楚是否存在合适的 AI\
    \ 代码库，或者必须寻找特定的外部服务来构建解决方案。\n\n回答了范围界定第二步中提出的问题，会使项目更接近于决定使用哪些 AI 方法和算法。然而，这个决定仍然需要明确可解释性问题。\n\
    \n### “仅预测” vs. “预测与解释”\n\n两个相似的问题需要略有不同的方法以及可能不同的 AI 学习算法。假设一个电视流媒体平台的销售部门想要提升销售额。首先，他们可以询问应该给哪些客户打电话，以便在一周内尽可能多地销售订阅升级。其次，他们可能有兴趣了解他们的客户群与总体人群有何不同。例如，产品经理可能意识到她的客户主要位于瑞士的德语区。增加法语和意大利语的产品选项可能是促进瑞士业务增长的一个选择。\n\
    \n第一个选项（提供潜在买家名单）是操作性的。销售经理需要一份应该打电话或发邮件的客户名单。他们不关心这份名单是来自统计模型、一个没人能理解的 100 层神经网络，还是来自用水晶球占卜的算命先生。他们需要一份能准确预测谁会购买的名单。\n\
    \n第二个问题询问的是买家的特征。同样，数据科学家需要一个能预测谁可能购买什么的模型。但这次，理解和解释模型至关重要。属性及其值很重要。它们有助于区分购买客户和其他客户。算命先生或\
    \ 100 层神经网络可能在预测上非常准确，但准确性较低的统计模型通常更擅长理解特征。“可解释性”是后面某一章中的一个重要主题。\n\n因此，AI 项目经理或数据科学家可以提供“仅预测”的\
    \ AI 模型，或者必须交付“预测与解释”的模型。这就像把房子刷成白色或粉色。两者皆可。你只需非常清楚地阐明你的客户期望什么，以防止日后出现惊讶的反应。\n"
- fmt: '### The Training Set Challenge


    Training AI models require good training data. The better the training data, the
    better the trained model’s accuracy. The AI training algorithm is undoubtedly
    essential, but – as a rule of thumb – an AI model cannot be better than the quality
    of its input training data. Five top biologists discussing which plant on a particular
    picture can prepare better training data than a drunken monkey doing the same.
    Suppose the idea is to be “better than a human” in the decision-making. There
    are three explanations when and how this can happen:


    * Imitating a better-than-average human expert (“five top biologists”).

    * Automatically derived real-world training data, for example, from shopping baskets
    or server logs.

    * Humans get tired and, thus, make more mistakes, AI components don’t.


    So, automating human judgment, for example, in quality assurance or incident analysis,
    requires a knowledgeable person to prepare the training set.


    For supervised learning, the training data depends on sample input values plus
    the expected, correct output. Training a model for distinguishing between tomatoes
    and cherries requires many sample images with a label stating whether a concrete
    image is a cherry or a tomato. Getting such labeled training data is a challenge
    for many projects.


    In general, there are four main approaches: logs, manual labeling, downloading
    existing training sets from the web, and database exports. **Existing training
    sets** enable researchers to develop better algorithms for common problems such
    as image classification. They often help to validate algorithms for challenges
    for which many solutions exist. Thus, in general, they benefit more academia.
    Companies should check whether already (pre-trained and) ready-to-use models exist.
    Not surprisingly, commercial AI projects often use **logs** (e.g., the shopping
    history of customers or click logs showing how customers navigate a web page)
    or time-consuming **manual data labeling** (e.g., humans mark whether an image
    contains a cherry or a tomato) for building training data sets. Building training
    sets from **database and data warehouse exports** works often for AI scenarios
    in the business or commercial domain such as sales, potential in combination with
    logs.


    ### Model Update and Usage Frequency


    A significant cost block for AI projects is the **integration** of AI components
    in the overall application landscape. It requires considerable time and engineering
    resources to make AI components and existing and new applications work together
    smoothly. Closely related is **automating**, collecting training data from various
    source systems and cleansing and transforming the data to create an AI model.


    AI project managers must understand to which extent their projects need work-intensive
    integration and automation functionality. Key decision parameters are model usage
    and model update frequency. The **model usage frequency** indicates how often
    the AI model, for example, classifies pictures or predicts customer behavior.
    Is the model for a one-time, very specific mailing campaign and never used again?
    Is it for a webshop that calculates daily shopping items to present prominently?
    The more often the model is used, the more beneficial is integrating the AI model
    into the application landscape. Integration reduces manual work by automating
    the transfer of files and data from AI training environments to production systems.
    This technical integration minimizes the operational risks of manual data transfers,
    such as copying wrong files or forgetting to upload new data. The practical implications
    of such mistakes can be severe. A webshop might propose items not matching customer
    needs. Male teenage customers might not spend more money with a webshop that tries
    to sell them expensive pink handbags. Thus, a frequently used model calls for
    a well-tested integration of the AI components with other applications to reduce
    manual work and operational risks.


    Closely related to model usage frequency is the **model update frequency**. It
    refers to how often data scientists retrain the AI model. Retraining means keeping
    the model structure, the data sources, the output data structure, etc., and “just”
    update the model’s parameter values so that they reflect the latest data. The
    retraining frequency depends on how often the real world and its reflection in
    data changes. When a sports fashion shop trained a model for the winter and skiing
    season, the shop should not use the same model next summer when it is super hot,
    and everyone spends the weekends and evenings on the beach or at outdoor pools.
    Suggesting pink skis as an add-on to a pink bikini might get the webshop in the
    press but not generate extra revenues. We observe a similar pattern as for the
    usage frequency: if data scientists have to perform the same process – this time,
    the one for updating the model – frequently, it is time to automate collecting
    the data and preparing it for retraining the model.


    The conclusion for AI project managers is simple. During their project scoping
    phase, they must understand how deep the integration of the AI model and the AI
    training environment has to be with the rest of the IT application landscape.
    The answer heavily influences project costs and timelines.


    ### Identify the Suitable AI Layer


    The last scoping question aims to clarify how much the AI project can build on
    existing external AI solutions and services. This topic relates to our discussion
    of the AI technology stack at the beginning of this chapter. A project can build
    on ready-to-use AI Services. In such a case, the project engineers a solution
    with AI functionality without requiring any AI skills in the project team. Then,
    there is the area of customizing pre-trained AI models. The pre-trained model,
    for example, detects cars, but the project wants it to distinguish a BMW from
    a Citröen. Finally, AI projects can use, for example, `TensorFlow` and architecture
    neural networks best suited to their needs.


    This last scoping question about the AI layer requires more AI knowledge than
    the previous ones. A project might even have to research the market to understand
    whether suitable external services or tools provide the envisioned AI functionality.
    These questions have a massive impact on the project and its business case. They
    determine whether and how many data scientists the project needs.'
