    The “de-luxe” model is the **service boutique** : many interactions and much collaboration
    between the AI department and the customers and users, plus the option to place
    highly individual requests. Generating strategic insights for management advisory
    falls into this category. The top management has enough resources to fund dedicated
    AI projects – and they make sense to support high-impact strategy decisions. Also,
    unique product portfolio enhancement initiatives might request such services from
    the AI department. For example, a medical diagnostics company develops an AI-supported
    solution for diagnosing specific illnesses.


    Besides C-level AI projects, regular AI projects for creating a new (non-trivial)
    AI model fall into the service boutique category. For example, data scientists
    have to analyze every detail when creating the first AI model supporting a marketing
    campaign. However, synergies might emerge later. Data scientists can reuse data
    sources or data preparation and cleaning logic when creating a second, third,
    or fourth model. It is a gradual development. Forward-looking AI managers foster
    and encourage such a trend.


    The **service factory model** fits services for which customers have none or limited
    contact with the AI service organizations and get a standardized service fulfilling
    most needs without much individualization. Typically, an AI organization acts
    as a service factory when running AI models on an AI runtime server. The server
    has to run, the deployed AI models have to be operational, and the interfaces
    to the applications consuming the predictions and classifications must be up.
    However, there is no need for direct personal interaction with customers. Indeed,
    adding, improving, or retraining AI models means that the service switches (temporarily)
    to a service boutique style.


    The category of a **service shop** covers requests with little interaction and
    still very much customer-specific tailoring. Software development projects fall
    into this category, so does designing a company’s IT network infrastructure. However,
    they are less typical for AI organizations with their tendency to require much
    interaction between data scientists and domain or business specialists. When AI
    managers realize that they try to set up and run such a service, they should analyze
    the overall situation. Is it truly a service shop use case – or does a project
    sponsor try to save money by making a project look like a service shop instead
    of a service boutique project? Such ideas save money on paper, but tend to result
    in spectacular failures.


    The **service mall** category provides services with low individualization or
    customization but a high interaction and involvement with the customer. AI departments
    operate in this category if they provide contractor-style internal AI consulting.
    In such a case, the AI organization has a pool of data scientists who help other
    teams with AI-related tasks. These data scientists need excellent social skills
    and the ability to tailor solutions for individual customers. There is much interaction
    with the customer, but the customization is limited. It is like renting a car.
    You can rent a car with two or four doors – you can either get an AI consultant
    with Python or with R know-how, respectively, if your team needs AI support.


    The different models – service factory, service mall, service shop, and service
    boutique – are of particular interest to AI organizations. They have implications
    on which service attributes are essential for concrete AI services.


    ### Understanding Service Attributes


    A well-managed AI organization focuses its efforts on service attributes that
    matter. Philip and Hazlett’s PCP attribute model helps AI organizations for getting
    priorities right. Their model distinguishes three types of service attributes:
    pivotal, core, and peripheral (Figure [5-2](#516372_1_En_5_Chapter.xhtml#Fig2)).


    Most important are the **pivotal service attributes** . Pivotal elements for AI
    services and projects are typically the AI model and its evaluation and usage
    in the customer context. A concrete example is an AI model for churn prediction
    for a phone company, together with a concrete list of customers potentially terminating
    their contract next week. Such deliverables require AI know-how, including statistics
    and machine learning know-how, experience with tools and with bringing together
    all relevant data for superior models.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig2_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig2_HTML.png)


    Figure 5-2


    Philip and Hazlett’s PCP Attribute Model for Services


    **Core service attributes** are essential for long-term customer satisfaction.
    They cover people, processes, and organization and how these elements interact
    and create a service experience. They should ensure a reliable and friendly service.
    For example, how do customer touchpoints look like and how do customers accept
    them? Is there phone support, and can the hotline be reached as announced? Are
    there ticketing tools that are convenient to use and safe money compared to phone
    support? Can the project organization deliver on time? In various IT departments
    in entirely different areas, I observed that failing to manage such core service
    attributes results in escalations and frustration.


    Finally, there are **peripheral service attributes** for the wow-effect. They
    excite customers, managers, and users. For example, are reports and lists designed
    well? Do team members present at conferences and are, thus, interesting to collaborate
    with in a project? Are there community events to foster relationships between
    the AI service team and the customers – and between customers? They excite and
    get you some goodwill when things go wrong once, but they are useless if the AI
    organization fails to deliver pivotal and core attributes adequately.


    Understanding, categorizing, and designing service attributes is an important
    task when setting up an AI service. AI managers must understand and/or define
    them. Staffing, resource allocation, and management attention must reflect the
    importance of the various service attributes.'
  trans: '

    ### 描述 AI 服务类型


    你的人工智能项目和服务组织，是更像快餐店还是高级餐厅的体验？当你去一家高档餐厅时，服务员会与你闲聊几句，了解你偏好的食物类型，并帮你选择菜单。侍酒师会根据你独特的葡萄酒偏好，为你搭配完美的佐餐酒。接着，厨师在准备餐点时，会考虑到你的过敏情况。这与在麦当劳的触摸屏上点一个巨无霸，两分钟后在柜台拿到一个装有餐点的纸袋，是完全不同的体验。这是两种不同的体验，两个不同的细分市场，以及两种不同的价格标签。同样地，任何
    AI 部门都应该清楚他们的客户期望什么，以及管理层资助什么。


    Peppard 的 **IT 服务矩阵**（图 5-1）是一个简单的工具，用于验证客户期望与 AI 组织实际服务主张是否匹配。该矩阵考虑了两个维度，将服务分配到四种服务类型之一：“服务工厂”、“服务商店”、“服务商场”和“服务精品店”。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig1_HTML.png](img/516372_1_En_5_Fig1_HTML.png)


    图 5-1


    包含 AI 服务的 Peppard IT 服务矩阵：平台服务 (PS)、AI 咨询 (CO)、战略咨询 (SA) 和卓越运营支持 (OE)


    第一个区分标准询问不同客户需要多少**定制化**。第二个标准关注服务员工与用户之间的**互动**。为了取得良好效果，他们沟通或协作的频率和时长如何？


    “豪华”模式是**服务精品店**：AI 部门与客户和用户之间互动频繁、协作紧密，并且可以提出高度个性化的需求。为管理咨询生成战略洞察就属于这一类。高层管理人员有足够的资源来资助专门的
    AI 项目——这些项目对于支持高影响力的战略决策是有意义的。此外，独特的产品组合增强计划也可能向 AI 部门提出此类服务请求。例如，一家医疗诊断公司开发了一个
    AI 支持的解决方案，用于诊断特定疾病。


    除了 C 级别的 AI 项目，用于创建新的（非平凡的）AI 模型的常规 AI 项目也属于服务精品店类别。例如，数据科学家在创建支持营销活动的第一个 AI 模型时，必须分析每一个细节。然而，后续可能会产生协同效应。数据科学家在创建第二个、第三个或第四个模型时，可以重用数据源或数据准备和清理逻辑。这是一个渐进的发展过程。有远见的
    AI 管理者会培养和鼓励这种趋势。


    **服务工厂模式**适用于客户与 AI 服务组织没有或只有有限接触的服务，他们获得的是满足大部分需求、无需太多个性化的标准化服务。通常，当 AI 组织在 AI
    运行时服务器上运行 AI 模型时，它就扮演着服务工厂的角色。服务器必须运行，部署的 AI 模型必须可操作，并且供消费预测和分类结果的应用程序使用的接口必须保持在线。然而，不需要与客户进行直接的个人互动。实际上，添加、改进或重新训练
    AI 模型意味着该服务会（暂时）切换到服务精品店风格。


    **服务商店**类别涵盖那些互动较少，但仍然高度针对客户进行定制的请求。软件开发项目属于这一类，设计公司的 IT 网络基础设施也是如此。然而，对于倾向于需要数据科学家与领域或业务专家进行大量互动的
    AI 组织来说，这类服务并不典型。当 AI 管理者意识到他们正试图建立和运行这样的服务时，他们应该分析整体情况。这真的是一个服务商店的用例吗？还是项目赞助者试图通过让项目看起来像服务商店而非服务精品店项目来节省资金？这种想法在纸面上节省了资金，但往往会导致惨痛的失败。


    **服务商场**类别提供的服务个性化或定制化程度低，但与客户的互动和参与度高。如果 AI 部门提供承包商式的内部 AI 咨询，那么它们就在这个类别中运作。在这种情况下，AI
    组织拥有一个数据科学家池，他们帮助其他团队处理与 AI 相关的任务。这些数据科学家需要出色的社交技能，以及为个别客户定制解决方案的能力。与客户的互动很多，但定制化程度有限。这就像租车。你可以租一辆两门或四门的车——如果你的团队需要
    AI 支持，你可以分别聘请一位掌握 `Python` 或 `R` 技能的 AI 顾问。


    不同的模式——服务工厂、服务商场、服务商店和服务精品店——对 AI 组织来说尤其重要。它们影响着哪些服务属性对于具体的 AI 服务至关重要。


    ### 理解服务属性


    一个管理良好的 AI 组织会将其精力集中在重要的服务属性上。Philip 和 Hazlett 的 PCP 属性模型有助于 AI 组织确定正确的优先级。他们的模型区分了三种服务属性：关键属性、核心属性和外围属性（图
    5-2）。


    最重要的是**关键服务属性**。AI 服务和项目的关键要素通常是 AI 模型及其在客户环境中的评估和使用。一个具体的例子是，为一家电话公司构建的用于预测客户流失的
    AI 模型，以及一份可能在下周终止合同的潜在客户名单。此类交付成果需要 AI 专业知识，包括统计学和机器学习知识、工具使用经验，以及整合所有相关数据以构建卓越模型的经验。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig2_HTML.png](img/516372_1_En_5_Fig2_HTML.png)


    图 5-2


    Philip 和 Hazlett 的服务 PCP 属性模型


    **核心服务属性**对于长期客户满意度至关重要。它们涵盖了人员、流程和组织，以及这些要素如何相互作用并创造服务体验。它们应确保可靠和友好的服务。例如，客户接触点是什么样的？客户如何接受它们？是否有电话支持，热线电话是否如宣传的那样可以接通？是否有使用方便且比电话支持更省钱的工单系统？项目组织能否按时交付？在完全不同领域的多个
    IT 部门中，我观察到未能管理好这些核心服务属性会导致问题升级和挫败感。


    最后，还有用于产生“哇”效应的**外围服务属性**。它们能激发客户、管理者和用户的兴趣。例如，报告和列表设计得好吗？团队成员是否在会议上发表演讲，从而在项目中与他们合作变得有趣？是否有社区活动来促进
    AI 服务团队与客户之间，以及客户与客户之间的关系？它们能激发兴趣，并在事情偶尔出错时为你赢得一些好感，但如果 AI 组织未能充分交付关键属性和核心属性，它们就毫无用处。


    在建立 AI 服务时，理解、分类和设计服务属性是一项重要任务。AI 管理者必须理解并/或定义它们。人员配置、资源分配和管理层的关注度必须反映出各种服务属性的重要性。

