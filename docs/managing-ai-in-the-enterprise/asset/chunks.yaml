  trans: '

    ### 威胁行为者


    脚本小子、专业网络犯罪分子以及外国情报机构：形形色色的群体正威胁着当今的 IT 系统和 AI 环境。威胁行为者的目标包括窃取知识产权、勒索赎金，或试图瘫痪关键服务器。他们威胁着
    AI 组织、AI 相关资产，以及由 AI 驱动的业务流程和控制系统。这些威胁行为者在动机、能力、技术和财力方面各不相同。


    如今，发动网络攻击的门槛比以往任何时候都低。攻击工具随处可见，使得`脚本小子`能够从事那些“不太推荐”的休闲活动。`网络犯罪分子`拥有更多的人力和财力资源用于攻击。当他们缺乏特定技术知识或发动大规模攻击时，会将任务外包给犯罪服务提供商。网络犯罪分子有明确的金钱动机，例如勒索赎金。比如，他们会加密公司所有数据（包括备份），只有在收到赎金后才解密数据。这对中小企业来说是个挑战，即便是资金充足的
    IT 安全团队也难以应对。更糟糕的是`国家资助的攻击者`和情报机构。他们拥有近乎无限的资源，主要关注关键基础设施，有能力瘫痪其他国家的关键基础设施。或者，他们试图从政府机构、军方或具有战略意义的高度创新公司和机构窃取商业和军事机密。防空系统中的
    AI 模型可能对敌对国家具有高度吸引力，自动驾驶汽车的最新研究成果或生物技术创新也是如此。


    还有另外三种类型的外部攻击者：活动人士、合作伙伴和竞争对手。`竞争对手`是天然的威胁行为者，因为他们能直接从窃取知识产权或破坏正常运营等非法活动中获益。不过，这取决于行业领域的商业文化以及公司运营、生产和销售所在的国家。


    `合作伙伴`作为威胁行为者往往被忽视。有些人可能怀有不可告人的目的。例如，他们可能想改变合同平衡以增加自身利润，或秘密计划以竞争对手身份进入市场。此外，还有`活动人士`。他们的目标不是经济利益，而是与他们眼中不公正的现象作斗争。他们想揭露某个组织的不专业行为，或证明基于
    AI 模型的不公正，例如，如果模型歧视社会中的某些群体。


    当组织虐待员工或员工试图快速赚钱时，有些人会转而与雇主作对并伤害他们。能够访问大量数据源（例如数据湖）的`犯罪员工`尤其危险。如果没有日志记录，取证专家就无法了解发生了什么或进行刑事调查。如果每个人都可以将大量数据复制到个人
    U 盘上，这进一步助长了非法活动。


    除了犯罪攻击的风险外，还存在善意的`员工`因疏忽而犯错的风险。他们可能不理解安全规程；这些规程可能不方便，或者从他们的角度来看不合理。这种情况可能导致员工敷衍地遵守安全规程，从而可能造成漏洞。


    哪些威胁行为者与公司相关？或多或少，每家公司都是脚本小子和网络犯罪分子的潜在目标。例如，网络犯罪分子通常只要求“五位数”的赎金。中小企业有能力支付这笔钱，而有限的
    IT 防御能力使它们成为可行的目标，尤其是在攻击者可以自动化攻击的情况下。其他威胁行为者的风险需要针对每家公司单独评估。例如，一家法国公司可能会受到外国活动人士的攻击，例如，由于法国和土耳其之间的紧张关系。


    在了解了潜在且相关的威胁行为者之后，下一步是研究攻击者可能针对什么目标。换句话说：AI 组织的资产是什么？


    ### AI 组织中的资产


    “资产”是一个广泛使用的术语。它指软件、硬件和数据——即信息处理所需的一切。对于 AI 组织来说，有四种关键资产类型：


    *   **AI 模型**。例如，它们有助于优化业务流程、监督装配线、控制化学反应器或预测股票市场价格。AI 模型可以是应用程序代码库的组成部分，也可以在
    AI 运行时服务器上运行。


    *   **训练数据**对数据科学家至关重要。他们需要这些数据来创建和验证 AI 模型。


    *   **AI 运行时服务器**是运行 AI 模型并进行推理的软件和硬件系统。它可以是`RStudio Server`，模型可以是实际应用程序代码的一部分，或者应用程序实现了边缘智能模式。


    *   **训练环境**，数据科学家在此创建、优化和验证 AI 模型，例如使用`Jupyter`笔记本。


    对于一个旨在高效工作的 AI 组织来说，各种其他系统和资产也具有重要意义。它们主要与训练环境相关：


    *   内部**上游系统**及其数据，例如`SAP`、核心银行系统或`Salesforce`。


    *   来自互联网的**预训练模型、库**和参考**数据**，用于加速训练过程或帮助获得更好的模型。


    *   **数据摄取与分发**解决方案，例如`ETL`工具，将数据从数据源加载到训练数据集合中，并可能也将其加载到训练环境中。


    *   **AI 存储库**，用于存储模型描述和训练历史记录——以及模型本身。


    *   **数据目录**，用于索引和描述可用于训练模型的数据。


    任何与 AI 相关的威胁或攻击都涉及这些资产中的一个或多个（图 7-5）。攻击一旦成功，就会损害信息安全 CIA 三元组的一个（或多个）属性：机密性、完整性、可用性。某些资产可能影响生产，其他资产“仅”用于高效训练。了解这些细节是威胁分析的一部分。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig5_HTML.jpg](img/516372_1_En_7_Fig5_HTML.jpg)


    图 7-5


    AI 生态系统及其资产

    '
- fmt: '### Confidentiality Threats


    AI-related systems need and work with large amounts of data to generate new insights.
    These systems are of high interest for threat actors trying to steal intellectual
    property, particularly `training data` or `AI models`. They are a gold mine for
    competitors time-wise and money-wise. For example, Waymo, a self-driving car company,
    prides itself on more than 20 million self-driven miles and more than 15 billion
    simulated miles. When competitors get this training data or the AI model built
    with this data, they save millions of investments and years of work. Likewise,
    a stolen underwriting model in the insurance sector enables competitors to lure
    lucrative customers, while staying away from problematic ones.


    Just by looking at Figure [7-5](#516372_1_En_7_Chapter.xhtml#Fig5), it becomes
    obvious where training data resides. Attackers can steal it from the original
    data sources and databases. Still, the most extensive data collection is, in most
    cases, the AI organization’s training data collection/data lake, comprising all
    available data. In contrast, the actual training areas, for example, a single
    Jupyter notebook, provide more limited data. Attacks on the data ingestion and
    distribution component are another way to collect data.


    Besides stealing data, it is also an option to steal the final AI models to use
    them – or to understand how a company acts, for example, on the market and to
    undercut profitable offers. AI runtime server or other production systems, the
    AI model repository, and training areas store or have access to one or many of
    them. The AI model repository is the component storing all AI models, even with
    explanations and documentation. AI runtime servers, if used, contain an extensive
    collection of AI models. Other systems or components, such as the training areas
    or application source code – if AI models are reimplemented and part of the code
    – provide only one or a few AI models. However, for any insurance, the loss of
    even a single model for one large or important customer segment can be already
    catastrophic.


    Loss of intellectual property might not be an issue for all companies. However,
    a second confidentiality threat is relevant for many companies: stealing data
    to extort a ransom. Hospitals store which customers are HIV positive. Insurance
    companies store salary-related data about their customer companies’ employees
    if they handle sickness allowances. No hospital or insurance company wants to
    see such information on the web. Neither do their customers and patients. It is
    the perfect setting for blackmailing all of them if cybercriminals get their hands
    on such sensitive data.


    In the past, stealing files and data required sophisticated attacks – at least
    for data from not-Internet-facing servers. Still, an AI organization would act
    foolishly in ignoring such risks, though there are more severe and more uncomplicated-to-perform
    attacks today.


    With the advent of the public cloud, companies train AI models there. Training
    data and trained models are in the cloud. If the company or AI organization sets
    up the cloud security properly, assets are safe. However, wrong configurations
    happen quicker, and (weakly protected) Internet-facing public cloud environments
    are an invitation for attackers. Many companies had to learn it the hard way in
    the last years.


    The most effortless and potentially most challenging to detect confidentiality
    attacks involve employees. In many organizations, they can transfer easily and
    risk-free any file – including models or training data – out of the company.


    Stealing a model, however, is also possible without access to it, just by probing.
    Suppose an attacker wants to mimic a “VIP identification” service identifying
    stars and starlets on images. The first step is to crawl the web to collect sample
    images (Figure [7-6](#516372_1_En_7_Chapter.xhtml#Fig6), left). At this point,
    it is not clear whether pictures show VIPs. So it is not possible to train an
    AI model with the data. Thus, the second step is to submit these pictures to the
    “VIP identification” web service. This service returns which images contain which
    VIPs (middle). Now, the attacker can build a training set for training his own
    neural network mimicking the original one with this information gained from probing
    and use it in production (right).


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig6_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig6_HTML.png)


    Figure 7-6


    Probing a Model for Recreating It – Trawl the Web for Sample Pictures (Left),
    Let the To-Be-Mimicked-Service Annotate the Images (Middle), Train a Neural Network
    Based on the Newly Annotated Images (Right)


    A final remark about non-financially motivated threat actors: activists can be
    interested in AI models. Their motivation would be to validate whether a model
    discriminates subgroups of the society systematically, for example, by pricing
    them differently than mainstream customers.'
