    4.  **引人入胜的呈现**。信息必须让受众感到好奇和感兴趣。


    这些任务很好地契合了 CRISP-DM 方法论（图 5-10）。检查主题的相关性是业务理解阶段的一部分，该阶段在规划要做什么时进行，并在评估阶段重复进行。在展示结果之前，AI
    项目团队必须检查他们是否提供了相关的新见解以及这些见解是否可操作。当然，演示和书面文档也应该吸引受众。所有这些活动都极具创造性和分析性。它们是 AI 翻译者的完美任务，他们深入了解客户、用户及其业务背景。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig10_HTML.png](img/516372_1_En_5_Fig10_HTML.png)


    图 5-10

    数据科学家如何让业务部门听到他们的声音


    我想通过一个具体例子来说明这一点，即如何将一个模型变成一个引人入胜的故事。2020 年 7 月，一家瑞士报纸提供了一个完美的例子，展示了如何以枯燥无意义的方式呈现数据。他们报道称，联邦公共卫生办公室（BAG）宣布瑞士和列支敦士登新增
    108 例新冠感染病例。这比前一天增加了一倍多。周一有 43 例新确诊病例，周日有 99 例，周六有 110 例。


    当我们审视这四个标准时，会发现这条新闻满足了第一个标准。这条信息对瑞士的读者来说是相关的。但它提供了新见解吗？没有。读者事后并不知道这些数字是令人欣慰还是令人担忧。他们数周乃至数月来一直听说，不能直接比较每天的数字，因为某些工作日的数据会更高。因此，一条仅仅提供今天数字和过去三天信息的新闻是毫无价值的。上周每个工作日的数据能提供更好的指示。这个周二，我们有
    108 例；一周前，只有 70 例。昨天，我们有 43 例，而前一周是 63 例。虽然这听起来可能不令人担忧，但如果七天移动平均线显示每周增长 12%，情况就不同了。


    尽管如此，这些信息对大多数读者来说仍然过于抽象，无法让他们觉得相关。绝对数字太低了（726 例，对比 800 万人口）。你中欧洲百万彩票（5+1 个号码全中）的可能性都比这大。然而，通俗小报会通过将这些数字与同年三月的第一次创伤性封锁联系起来，使其对瑞士的每个人都具有相关性。那天的每日感染人数是
    1063 例。按照每周 12% 的增长速度，瑞士将在下一个冬季再次达到同样的水平。头版上一个大字标题会是“预计圣诞节前后第二次封锁”。突然间，一个抽象的数字对每个人都变得相关，甚至对政治家来说也是可操作的——这是一个将简单数字转化为吸引所有人注意力的戏剧性故事的完美例子。


    为避免任何误解：这过去和现在都不是一个实际的预测。所依据的数据和使用的统计模型都不充分。这个例子突显了沟通可以（过度）实现什么。当 AI 管理者想要在组织内进行创新时，他们的结果必须引起业务部门的注意并触及他们的受众。利益相关者、（业务）管理者或客户可能没有
    AI 背景。他们可能过于急躁和忙碌，无法自己理解。在这种（典型的）情况下，AI 组织有责任让 AI 翻译者提供帮助，或者确保一些数据科学家拥有出色的沟通技巧。


    ## 管理 AI 运营服务


    当 AI 组织创建模型并将其集成到更大的解决方案中并运行时，AI 组织（这一部分）的设立和工作方式会进一步发展。其能力、财务状况、技能和成本驱动因素与咨询式、以项目为中心的
    AI 组织不同。对于 AI 运营服务，会出现新的主题，例如目标运营模式、与外部的清晰支持接触点或模型管理。AI 组织需要六种能力，而不是仅仅三种。

    '
- fmt: '### The Six AI Capabilities


    When looking at the needed capabilities for AI operations services, there are
    core tasks for an operations service – and tasks an AI operations organization
    has to perform, too. Indeed, it has to be able to run at least small-scale AI
    projects, such as creating (less complex) initial AI models and retraining models.
    Thus, an AI operations organization also needs the AI projects capabilities triumvirate:
    data science, data engineering, and AI translator. (Figure [5-11](#516372_1_En_5_Chapter.xhtml#Fig11)).


    When looking at the additional capabilities, especially relevant for AI operations
    organizations is the **integration engineering capability**. It covers installing
    and patching software components and configuring interfaces the AI organization
    takes care of afterward. Integration engineering includes connecting the AI components’
    interfaces with other solutions to enrich traditional business processes with
    AI logic. An excellent example in the AI context is installing software such as
    `RStudio Server` or integrating `RStudio` with `LDAP`, which comprises typical
    **application management** (AM) and **IT operations** tasks: solving issues, installing
    patches, and coordinating releases with other applications and the underlying
    infrastructure. It might also cover integrating the AI components with the IT
    department’s central monitoring solution, which looks for aborted processes or
    errors and warning messages in logs to detect issues, ideally before they impact
    users.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig11_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig11_HTML.png)


    Figure 5-11


    Capabilities for AI Operations Services Organizations


    The **support capability** reflects that components do not always work as expected,
    requiring a support specialist to analyze the situation and fix issues. Thus,
    AI operations implies the need for a support team or at least for clearly defined
    specialists who take over user and customer interactions and ensure prompt reaction.
    They are the face to the users and customers, for example, if users miss a result,
    an interface breaks down, or interface configurations have to be changed. In addition,
    in an AI operations organization, they might perform routine AI tasks, for example,
    in the context of retraining models.


    Involving application management and support specialists in routine AI tasks increases
    the AI organization’s resilience. These specialists demand mature scripts and
    clear documents when they take over a model from AI projects and data scientists.
    The benefit for the organization is obvious: From now on, when a data scientist
    gets sick, not everything breaks apart because he is not the only one anymore
    knowing all the scripts and tricks to run and retrain an essential AI model for
    online sales.


    Based on my experience, one single person can take over support and application
    management in small and focused organizations with not more than a handful of
    user interactions per day and a few components and not-too-complex systems and
    interfaces. Still, these are separate tasks and capabilities. One focuses on reactive
    user interactions and solving easier challenges, including maloperations by end-users
    (support capability). The other, that is, application management, is more proactive
    maintenance and analyzing the trickier issues when the AI components or interfaces
    fail. The combination makes sense due to the similar know-how and social competencies
    needed. Obviously, however, if a role is filled with just one person, deputies
    are mandatory.


    One capability might or might not be needed: **Report Provisioning, Presentation,
    and Visualization**. AI often delivers lists, but – especially when explaining
    models are at the core of a project or an AI organization – more complex visualizations
    help. Also, when the AI organization provides new lists daily or weekly, sending
    these lists out as `CSV` or `Excel` files attached to emails is questionable.
    It is work-intensive. Plus, operational mistakes likely happen over time. The
    AI organization sends out old lists to sales staff, resulting in a drop in revenues.
    Also, someone might send such an email by mistake to persons outside the organization,
    potentially disclosing sensitive data. Thus, a platform for providing reports
    is essential – and the more users, the more important is a stable platform with
    a defined support model. Ideally, an AI organization feeds its results into the
    company standard solution such as a Business Intelligence (BI) solution or an
    Enterprise Resource Planning platform.


    ### Workload Pattern


    Recurring business and flattening the (workload) curve are two slogans on how
    AI service organizations work with support and application maintenance tasks.


    **Recurring business** means that the AI organization provides ongoing services.
    A support organization, software maintenance, and application management are necessary
    for users and customers of AI models or components. The AI model generates business
    benefits or operational efficiencies, but only as long as the AI service organization
    works. If the top management shuts down the AI organizations, the benefits and
    efficiencies are gone from that moment. Figure [5-12](#516372_1_En_5_Chapter.xhtml#Fig12)
    illustrates this spendings and benefits pattern over time.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig12_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig12_HTML.png)


    Figure 5-12


    Understanding Work Effort and Costs vs. Business Benefits for AI Operations Services


    The “flattening the workload curve” slogan reflects that operations services can,
    up to a certain degree, shift workloads to different days, weeks, or even months.
    Application managers and support staff can work for several teams and applications
    in parallel. The example in Figure [5-13](#516372_1_En_5_Chapter.xhtml#Fig13)
    illustrates this. The AI service organization supports and maintains AI models
    and interfaces for three applications. Additionally, they run one project, which
    goes live soon. If there are separate teams for each of them, the App X team requires
    three specialists, App Z three and two for App R and one for Project 13. Altogether,
    the organization has to pay for nine specialists. When sharing, they need four
    – and if they manage to shift one workday from day three to another day, then
    only three. Many maintenance tasks can be moved by a few days or weeks, which
    is the key to flattening the workload curve and the organization’s efficiency.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig13_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig13_HTML.png)


    Figure 5-13


    Workload Planning for Support and Application Management in a Multi-Application
    Setting with One Project'
