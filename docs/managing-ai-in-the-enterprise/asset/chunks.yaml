- fmt: '# Storing AI Models and Model Management


    Storing AI models in a repository together with additional (meta-)data, enforcing
    a rigid deployment process, and monitoring the after-deployment performance of
    models – these are the three pillars of model management. Of course, model management
    is only a sandwich layer between the trendy and hype data science work and the
    glamorous management level. Still, model management is the glue needed for a sustainable
    AI initiative. This glue allows corporations to benefit from AI initiatives for
    years, not only for weeks or a few months. Finally, model management gives future
    data science projects a kick-start with all the model repository information and
    artifacts – reuse cannot get more comfortable.


    ## Organizing an AI Organization


    Congratulations! You shaped your service, analyzed the necessary capabilities,
    prepared a budget, got funding, and hired the right talent. However, to kick-start
    your AI service, your staff has to know how to work on which tasks, how to collaborate
    within the AI organization and the rest of the company, and how to handle and
    complete user and customer requests.


    **AI project services** are forgiving if the AI organization is not super structured
    – they (should) have explicit goals. The AI management just assigns engineers
    and data scientists to projects and clarifies how much time they can spend on
    which project. The `CRISP-DM` methodology structures the daily work of the AI
    experts (Figure [5-19](#516372_1_En_5_Chapter.xhtml#Fig19), left).


    **AI operations services** require a more sophisticated organizational setup.
    Just assume that an online shop AI component suddenly proposes ski equipment to
    customers searching for beachwear. In that case, the AI organization is under
    high pressure to fix the issue – calmly, speedily, professionally.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig19_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig19_HTML.png)


    Figure 5-19


    Topics for Organizing an AI Organization


    The big difference to projects is that most operations organizations serve multiple
    (internal) customers, applications, or services in parallel. They react to incidents
    and dedicated customer requests. Typical tasks are restarting components, fixing
    interfaces problems, or configuring a new interface. They schedule preventive
    maintenance such as installing patches when vendors provide new ones. Such tasks
    keep engineers busy for a few hours or days, not for months or years. To keep
    the support specialists’ work pipeline full, they take care of multiple applications
    and interfaces as illustrated in Figure [5-13](#516372_1_En_5_Chapter.xhtml#Fig13)
    – or they work in the context of one super-complex application.


    The challenge for service organizations: Everybody wants to benefit from the lower
    costs of a shared service, that is, specialists work not only for one interface
    or one small component. Still, everybody expects superior service, even if other
    customers and users have issues simultaneously, and compete for the attention
    of the support organization.


    When preparing an AI operational team for such daily challenges, organizing the
    actual service delivery (such as implementing changes on systems) is just one
    task. Crucial for success is also the **customer touchpoint** as part of the core
    and peripheral service attributes. Here, users, customers, and the AI operations
    organization interact. Answering phone calls from first-time users or sending
    emails forward and backward to get all details for a service request is time-consuming
    and keeps AI operations specialists busy. Having to sit in meetings and workshops
    can be worse. No manager wants to pay 20 hours for a two-hour task due to time-consuming
    workshops, notes being made, and employees exchanging many emails. AI organizations
    have to prevent such situations.


    But costs are just one aspect. Making sure that AI operations experts can focus
    on tasks without being interrupted by customer requests is a second need. Working
    on critical updates requires uninterrupted attention for some time. Flattening
    the workload over time is a third crucial element for cost efficiency. Non-urgent
    tasks are delayed to low times, even if customers think their needs are the company’s
    most important and urgent ones.


    AI managers have to design the customer touchpoint carefully. FAQ pages and good
    documentation reduce the need for reaching out to the AI operations team. A widely
    followed service-design option is to prevent direct contact between AI operations
    specialists or engineers and users from other components. Group mailboxes are
    a starting point; the only long-term solution is request forms or a ticket system
    such as `Jira`. They ensure transparency in which teams required how much support.
    Furthermore, if another team member has to step in due to holidays or sicknesses,
    she can access the information about all incidents. There are cases when users
    and customers need a specific contact person. In that case, this requires additional
    staffing in the AI organization – and someone has to fund such premium service.


    The main challenge for the **service delivery** is to ensure a smooth processing
    and routing of requests and a good collaboration within the AI organization and
    with other teams. All involved specialists must know which activities they are
    carrying out, which interim results they receive from their colleagues, what they
    have to deliver as results themselves. The solution? Clearly defined and agreed-upon
    processes.


    For an AI organization, four processes or process areas are of particular interest:


    *   Incident process: Something that worked before is suddenly not working anymore
    and has to be fixed. An example is an AI runtime server abruptly discontinuing
    to reply to requests.

    *   Change Request: Something that works should be changed or moved to the next
    level. For example, there should be an alarm for model degeneration. In the future,
    the alarming should take place when less than 20% of the customer buy proposed
    items instead of 30% now.

    *   AI Requests: questions, wishes, and requirements related to the actual AI
    models, for example, retraining a model or clarifying questions about the model.

    *   General inquiry: standard input window for other questions and not time-critical
    aspects.


    A **process definition** clarifies who is doing what, when, and using which tools
    and systems. Managers and experts with a strong IT or science background tend
    to define processes that cover all possible cases. This approach is super-expensive,
    identifying every conceivable case is often challenging or impossible, and the
    process definition distracts the users from the core ideas, that is, what operations
    and support specialists should focus on to deliver an excellent service.


    The preferable approach for defining processes is to focus on modeling and training
    “happy flows.” These are the cases where the process goes through smoothly. Only
    frequently occurring error cases are modeled, not every exception. Exceptions
    are seldom an issue in practice for independently acting, well-trained support
    and operations specialists. They find a solution. If the situation is beyond their
    area of expertise and comfort, they contact the management. Just one warning,
    this assumption might not be correct for every company culture and each cultural
    context.'
