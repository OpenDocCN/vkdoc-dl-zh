  trans: '

    ### 六大人工智能能力


    在审视人工智能运维服务所需的能力时，存在运维服务的核心任务——以及人工智能运维组织也必须履行的任务。事实上，它必须能够运行至少小规模的人工智能项目，例如创建（较简单的）初始人工智能模型和重新训练模型。因此，人工智能运维组织也需要人工智能项目能力的“三驾马车”：数据科学、数据工程和人工智能翻译员。（图
    5-11）。


    在审视额外能力时，与人工智能运维组织尤其相关的是**集成工程能力**。它涵盖了安装和修补软件组件，以及配置人工智能组织后续负责维护的接口。集成工程包括将人工智能组件的接口与其他解决方案连接起来，以利用人工智能逻辑丰富传统业务流程。在人工智能语境中，一个很好的例子是安装诸如
    `RStudio Server` 之类的软件，或者将 `RStudio` 与 `LDAP` 集成，这包含了典型的**应用管理**（AM）和**IT 运维**任务：解决问题、安装补丁，以及协调与其他应用程序和底层基础设施的发布。它还可能涵盖将人工智能组件与
    IT 部门的中央监控解决方案集成，该方案会查找中止的进程或日志中的错误和警告消息，以便在问题影响用户之前（理想情况下）发现它们。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig11_HTML.png](img/516372_1_En_5_Fig11_HTML.png)


    图 5-11


    人工智能运维服务组织的能力


    **支持能力**反映了组件并非总能按预期工作，这需要支持专家来分析情况并修复问题。因此，人工智能运维意味着需要一个支持团队，或者至少需要明确定义的专家，他们负责处理用户和客户的互动，并确保快速响应。他们是面向用户和客户的门面，例如，当用户错过某个结果、接口发生故障或接口配置需要更改时。此外，在人工智能运维组织中，他们可能执行常规的人工智能任务，例如在重新训练模型的背景下。


    让应用管理和支持专家参与常规的人工智能任务，能提高人工智能组织的韧性。当这些专家从人工智能项目和数据科学家手中接管模型时，他们需要成熟的脚本和清晰的文档。这对组织的好处显而易见：从现在起，当某位数据科学家生病时，不会因为只有他一个人知道运行和重新训练在线销售关键人工智能模型的所有脚本和技巧而导致一切崩溃。


    根据我的经验，在规模较小且专注的组织中，如果每天只有少量用户互动、少数几个组件以及不太复杂的系统和接口，一个人就可以同时承担支持和应用管理工作。尽管如此，这些仍然是不同的任务和能力。一个侧重于被动响应用户互动和解决较简单的挑战，包括最终用户的误操作（支持能力）。另一个，即应用管理，则更侧重于主动维护，以及在人工智能组件或接口发生故障时分析更棘手的问题。由于需要相似的技能和社交能力，将两者结合起来是合理的。然而，显然，如果一个职位只由一个人担任，那么必须指定副手。


    有一项能力可能需要也可能不需要：**报告提供、演示和可视化**。人工智能通常提供列表，但——尤其是在解释模型是项目或人工智能组织核心时——更复杂的可视化会有所帮助。此外，当人工智能组织每天或每周提供新列表时，将这些列表作为
    `CSV` 或 `Excel` 文件通过电子邮件附件发送出去是有问题的。这工作量大。而且，随着时间的推移，很可能发生操作失误。人工智能组织向销售人员发送了旧列表，导致收入下降。此外，有人可能错误地将此类邮件发送给组织外部人员，从而可能泄露敏感数据。因此，一个用于提供报告的平台至关重要——用户越多，拥有一个具有明确支持模式的稳定平台就越重要。理想情况下，人工智能组织应将其结果输入公司标准解决方案，例如商业智能（BI）解决方案或企业资源规划平台。


    ### 工作负载模式


    “重复性业务”和“拉平（工作负载）曲线”是描述人工智能服务组织如何处理支持和应用维护任务的两句口号。


    **重复性业务**意味着人工智能组织提供持续的服务。对于人工智能模型或组件的用户和客户来说，支持组织、软件维护和应用管理是必要的。人工智能模型能产生业务效益或运营效率，但这只有在人工智能服务组织持续运作的情况下才能实现。如果高层管理关闭了人工智能组织，那么从那一刻起，效益和效率就消失了。图
    5-12 说明了这种支出和效益随时间变化的模式。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig12_HTML.png](img/516372_1_En_5_Fig12_HTML.png)


    图 5-12


    理解人工智能运维服务的工作量与成本 vs. 业务效益


    “拉平工作负载曲线”这句口号反映了运维服务可以在一定程度上将工作负载转移到不同的天、周甚至月。应用管理人员和支持人员可以同时为多个团队和应用程序工作。图 5-13
    中的例子说明了这一点。该人工智能服务组织为三个应用程序支持和维护人工智能模型及接口。此外，他们还运行一个即将上线的项目。如果每个项目都有独立的团队，那么应用
    X 团队需要三名专家，应用 Z 需要三名，应用 R 需要两名，项目 13 需要一名。总共，该组织需要为九名专家支付薪酬。当共享人员时，他们只需要四名——如果他们设法将一个工作日从第三天移到另一天，那么只需要三名。许多维护任务可以推迟几天或几周，这是拉平工作负载曲线和提高组织效率的关键。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig13_HTML.png](img/516372_1_En_5_Fig13_HTML.png)


    图 5-13


    在包含一个项目的多应用环境中，支持和应用管理的工作负载规划

    '
- fmt: '### Understanding and Managing Costs Drivers


    The big challenge for managers of AI operations services is to invest sufficiently
    in preventive measures for stabilizing the solution and in the availability of
    support and engineering staff to handle incidents and support cases. The intentional
    investment into running the service does not generate profits. Not spending enough,
    however, results in service negligence costs and harms the business. Two radical
    approaches illustrate the challenge. The support desk can be one intern reading
    emails and helping with wrongly used GUIs on Monday morning, Wednesday, and Thursday
    afternoon. Alternatively, a 7/24 phone support hotline provides access to three
    senior engineers on call, plus professional monitoring and alarming, making incidents
    even less likely. The costs differ, so does the impact on the rest of the organization.


    The **cost for running the service** is the money the organization (willingly)
    spends for the support capability and ongoing application management. Therefore,
    the first cost domain is **support and problem management** with the following
    three primary cost drivers (Figure [5-14](#516372_1_En_5_Chapter.xhtml#Fig14)):


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig14_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig14_HTML.png)


    Figure 5-14


    Understanding Costs for Continuous Data Science Services


    - **Customer interaction design**. Phone, drop-in service-desk, email, ticketing
    systems, FAQs, one-page documentation leaflets, trainings – there are many ways
    to provide customer and user support. However, the right approach depends on the
    volume and complexity of the requests and impacts the time spent with users and
    customers.

    - **Support and reaction times**. 7/24 support requires more engineers and generates
    higher costs than if the support only works from 9 am to noon on weekdays. Also,
    if tickets have to be answered within five minutes and not within four hours,
    staffing needs and costs explode.

    - **Diversity of the service portfolios**. What technologies are in use, such
    as `Python`, `SAS`, `SAP Analytics`, or `R`? How different are the implementations
    and business aims of the implemented services? Even just helping customers use
    the GUI requires the support staff to understand the technologies. Much more technical
    know-how is needed when having to solve support cases requiring real engineering.
    The underlying question is whether one engineer per shift can handle all requests
    knowledge-wise – or whether there is a need for two or three engineers. It is
    a vital question before adding any new technology to the service portfolio.


    The latter aspect reflects the impact of technology and technologies. The **complexity
    of the IT infrastructure** impacts the service costs as well. First, this covers
    more **integration**-related elements such as the number and stability of the
    interfaces. For example, is a messaging middleware in place, or is the communication
    and interaction self-coded? Are the applications the AI components work together
    stable, or are there always incidents and discussions which solution is the root
    cause for issues? These questions relate to the interplay between production systems.
    However, an AI organization must also maintain its **internal** hardware and software
    **infrastructure** with CI/CD pipelines, especially if integrated into pipelines
    from other software development teams, runtime servers, AI platforms, etc.


    **Business continuity management** and **monitoring** represent additional cost
    blocks. Details depend on whether there is a solution and processes in place by
    the IT organization. So again, they do not help you generate business value; they
    “only” detect problems earlier or reduce the impact of issues.


    All these mentioned costs for support and application management are directly
    visible. Controlling specialists understand precisely the money spent, but not
    the benefits. Such constellations are an invitation for budget cuts during cost-optimization
    initiatives. One person less? You should not see any impact. We could cut one
    engineer without any service impact; why not cut a second position as well? It
    is like the story told about a university. To save money, they reduced the room
    temperature in winter to lower the costs for heating. You can repeat this exercise
    year after year – until your electricity bills explode because your staff brings
    electric radiators once offices were too cold to work. It is similar to application
    management and support costs. They can be cut more or less to zero. The impact
    is severe: negligence costs within the AI organization and business impact outside
    the AI organization.


    **Negligence costs** refer to costs and efforts generated within an AI organization
    because support and application management do not function properly. The first
    impact is a disruption of ongoing AI (project) tasks. Improper, unprofessional
    handling of adequate or even inadequate user and customer requests can result
    in escalations. Escalations are time-consuming for the management, but for data
    scientists and engineers as well. The latter have to collect data, search for
    old email communication, etc. These efforts have to be paid and hinder ongoing
    projects. In case there is no support organization, data scientists answer the
    simplest user questions. In other words: the data scientists get disturbed with
    their project work on new AI models if first-time users do not understand the
    GUI or push the wrong button. Also, if systems stop working, the time pressure
    for patching or reconfigurations is much higher. Thus, more persons have to work
    on the issue than performing measures preventively in a less hectic setting. Furthermore,
    every issue you detected with monitoring before users call or open tickets reduces
    the workload for the support channel.


    Finally, the **business impact** and **potential losses** reflect the non-realized
    business opportunities or savings because an AI is not working. For example, suppose
    the AI component generates upselling and cross-selling recommendations accounting
    for 20% of the revenues of the webshop. In that case, these revenues are gone
    when the AI component is down or starts making bad suggestions. If the business
    managers are not aware, AI managers should bring this on the table in budget discussions
    when senior managers challenge the costs for model quality and service stability.'
  raw: '### Understanding and Managing Costs Drivers


    The big challenge for managers of AI operations services is to invest sufficiently
    in preventive measures for stabilizing the solution and in the availability of
    support and engineering staff to handle incidents and support cases. The intentional
    investment into running the service does not generate profits. Not spending enough,
    however, results in service negligence costs and harms the business. Two radical
    approaches illustrate the challenge. The support desk can be one intern reading
    emails and helping with wrongly used GUIs on Monday morning, Wednesday, and Thursday
    afternoon. Alternatively, a 7/24 phone support hotline provides access to three
    senior engineers on call, plus professional monitoring and alarming, making incidents
    even less likely. The costs differ, so does the impact on the rest of the organization.


    The **cost for running the service** is the money the organization (willingly)
    spends for the support capability and ongoing application management. Therefore,
    the first cost domain is **support and problem management** with the following
