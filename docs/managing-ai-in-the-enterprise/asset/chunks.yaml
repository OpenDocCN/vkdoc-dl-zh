  trans: "\n**泳道流程模型**（图 5-20）是一种直观的流程建模技术，适用于记录 AI 运营流程。每个泳道代表一个部门、团队或特定角色。流程由不同步骤组成，这些步骤在列或泳道中的位置定义了由谁执行任务。如果员工在流程中需使用特定\
    \ IT 系统完成某项任务，则还应明确标注所使用的系统。泳道流程模型（与 UML 状态机等不同）只能可视化不含过多分支或循环的流程。若泳道模型过于复杂，可将其拆分为两到三个子模型，否则该流程可能因过于复杂而难以被团队日常使用。一旦\
    \ AI 组织定义了所有核心流程（例如上文提到的四个流程）并培训了所有团队成员，该组织即可投入运营。\n\n![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig20_HTML.png](img/516372_1_En_5_Fig20_HTML.png)\n\
    \n图 5-20  \n包含五个参与者及额外行（标注参与者所用系统）的泳道流程模型示例\n\nAI 组织在设计和实施流程时的一项指导原则是**与公司其他流程的兼容性**。如果其他团队需要执行特定步骤，这些团队也必须就流程和工具达成一致。在许多情况下，IT\
    \ 部门基于事实标准——**信息技术基础架构库**（**ITIL**）——来定义流程。然而，仅了解标准对 AI 组织帮助不大。IT 部门会对 ITIL 流程进行大幅定制：谁负责审批来自哪个系统的请求？使用哪些表单？不同流程对应哪些工具？这些细节因公司而异，但对\
    \ AI 流程的顺利运行至关重要。\n\n许多 AI 解决方案内置了工作流引擎，可帮助 AI 组织结构化其工作。这是一个便捷选项，但 AI 组织应清楚其局限性：他们可能需同时使用其他系统，并在系统间手动复制工单。假设数据库团队需要导出并移交某些数据，他们会接受\
    \ AI 组织工作流系统分配的任务吗？或许会，但在大型 IT 部门中几乎不可能。当市场团队发现“购买连衣裙的客户也……”功能失效时，他们会选择在公司级的**事件管理**系统中提交工单，让\
    \ IT 部门排查细节吗？还是更愿意自行判断这是 AI 问题还是网店问题，再寻找正确的事件工单系统，并在 AI 组织的特定工具中提交工单？显然不会。AI 组织必须确保其流程和请求工具符合公司标准，否则一旦系统与业务产生关联，便会陷入困境。\n\
    \n尽管流程至关重要，但如今许多组织更关注定义组织运作方式的**（目标）运营模型**（TOM）。TOM 描述的是预期的未来运营模式，而“当前运营模型”则指现状。提供运营服务的\
    \ AI 组织通常需要制定 TOM，其目的并非仅维持运营流程，而是探讨 AI 组织的战略方向、规划组织转型路径，并明确其可能性与局限性。\n\n（目标）运营模型涵盖以下核心方面（图\
    \ 5-21）：\n\n![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig21_HTML.png](img/516372_1_En_5_Fig21_HTML.png)\n\
    \n图 5-21  \nAI 组织的运营模型\n\n*   **服务承诺**与价值主张：此处可参考本章开头介绍的 AI 组织业务价值与服务塑造方法。\n*\
    \   **流程**：哪些活动由谁按何种顺序、使用哪些工具执行？上文已对此进行讨论。\n*   **人员与组织**：承担流程中定义的任务。\n*   **IT**：作为（高效）流程执行的核心“赋能者”，提供基础设施、应用程序及其参数化配置。\n\
    \nAI 管理者可基于本书内容快速明确前三个主题并形成文档。但许多支撑性主题（包括 KPI、IT 资源与人员容量规划、采购策略（如内部员工、承包商、咨询公司））仍需进一步澄清。运营模型的第四个重要方面是所需的\
    \ IT 基础设施，这将是下一章的主题。\n\n## 总结\n\n本章详细阐述了管理 AI 组织（而非 IT 部门内的普通团队）的特定要求，重点涵盖三个主题：塑造\
    \ AI 服务、管理用于创建新 AI 模型的 AI 项目服务，以及确保 AI 模型及其推理运行与维护（基础设施）的可靠运营。\n\n塑造服务的核心在于理解业务部门与\
    \ AI 组织之间的协作模式。这些模式直接影响资金需求，以及 AI 组织如何向潜在内部客户展示其服务以合理管理预期。同时，它指导 AI 管理者明确服务的哪些方面是关键、核心或外围，从而为投资决策奠定基础。\n\
    \n希望开展 AI 项目的 AI 组织需要数据科学专业知识，但也需要数据工程能力以高效利用现有数据，以及 AI 翻译能力以弥合业务需求与 AI 模型应交付的具体需求之间的鸿沟——这便是我们的“能力三要素”。理解成本驱动因素和预算结构是额外要点，而项目导向型资金的主要挑战也需指出：平衡项目获取（以证明组织相关性并确保资金）与执行已获取项目所需的可用资源。\n\
    \n当 AI 组织需要运行和维护 AI 模型时，还需具备额外能力：支持与应用管理、集成工程、报告与可视化。他们必须将 AI 模型管理和模型性能监控作为两项\
    \ AI 特有的运营任务。最后，流程定义和目标运营模型有助于 AI 组织建立结构，确保日常运营顺畅。\n\n这些知识正是 AI 管理者区别于传统 IT 管理者或专注于技术与算法的数据科学家的关键所在。\n\
    \n# 6. AI 与数据管理架构\n\nIT 架构中的 AI 能力远非锦上添花，而是前瞻性、数据驱动型创新企业的核心能力。它虽非全部，但绝非点缀。AI 组织需将其组件集成到企业整体应用架构中——而其自身的系统架构通常也不仅限于几个`Jupyter`笔记本。换言之，本章将探讨任何非单人模式的\
    \ AI 组织都会面临的重大架构问题。\n\n架构挑战涉及三个主题：\n\n*   为模型训练及持续执行与推理设计 AI 环境架构\n*   将 AI 环境集成到企业数据管理架构中\n\
    *   理解公有云对 AI 环境的影响\n"
- fmt: '# Architecting AI Environments


    When it comes to an organization’s efficiency and its capabilities, tooling is
    a central enabling factor. The tooling impacts and determines the services an
    AI organization can deliver and how efficiently they can work.


    We looked already at Jupyter notebooks in an earlier chapter. They help to create
    and optimize AI models. Here, we broaden the perspective and look at the other
    enabling systems an AI organization needs to work efficiently (Figure [6-1](#516372_1_En_6_Chapter.xhtml#Fig1)).


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig1_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig1_HTML.png)


    Figure 6-1


    Application Landscape for AI Organizations


    ## Ingestion Data into AI Environments


    Training AI models and applying them to actual data for inference require adequate
    data. The data might come from operational systems, data warehouses, physical
    sensors, log files, or other data sources. The challenge is to build an architecture
    that delivers all potentially relevant data to the AI training environment or
    to the components performing AI inference in the production system using the trained
    AI models (Figure [6-2](#516372_1_En_6_Chapter.xhtml#Fig2)).


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig2_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig2_HTML.png)


    Figure 6-2


    Data Ingestion Scenarios for AI Organizations


    The training and the inference use cases are similar regarding setup and technical
    solutions, though two nuances differ. For **training data**, the rule of thumb
    is: **more is always better**. More attributes per data point increases the chance
    that more attributes turn out to be relevant for and contribute to the model.
    The model accuracy gets better, no matter whether the model predicts or classifies.
    More rows stabilize the model, and more tables allow for a broader range of use
    cases. If input variables are irrelevant, they simply do not become part of the
    final model.


    **Inference data** serves as input for the trained, ready-to-use AI model. Such
    data describes the current situation for which the AI model makes predictions
    or performs classifications. For example, the data might describe the status of
    a chemical reactor, and the model predicts whether the reactor will blow up within
    the next hour. Such an AI model has a set of input parameters. Data scientists
    or automated tools must provide the current values precisely for all these input
    parameters. More data does not bring a benefit. Suppose the model needs the reactor’s
    pressure five minutes ago. In that case, the prediction does not improve if we
    also know the pressure two days or one minute ago – or even tomorrow’s weather
    forecast for the Sahara desert. The model cannot incorporate such uncalled for
    data into its predictions and classifications.


    While not-asked-for data is useless for inference, architectural flexibility is
    advisable. The next version of the AI model after retraining might have two more
    attributes. Ideally, data scientists have an architecture that allows removing
    attributes or adding new ones from an already connected component with a reconfiguration,
    that is, without changing code.


    A second nuance between training and inference data is the different **data delivery
    frequency**. Model retraining is an activity data scientists perform from time
    to time, for example, every few weeks. Inference takes place more often. For example,
    a marketing department might run an AI solution twice a week that personalizes
    newsletters by predicting which articles and which ads work best for which customer.
    Even real-time inference is possible, for example, when targeting customers with
    specific ads and items while customers browse an online shop.


    The **technical implementation** for the data delivery or data ingestion can build
    on existing data integration patterns (Figure [6-3](#516372_1_En_6_Chapter.xhtml#Fig3)).
    Most companies run one or more suitable system already. The characteristics discussed
    in the next few paragraphs help to communicate the needs to internal data integration
    teams or external vendors and integration partners. Certainly, it helps as well
    if the AI organization has some understanding of the potentially possible patterns.


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig3_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig3_HTML.png)


    Figure 6-3


    Selected Data Integration Patterns'
