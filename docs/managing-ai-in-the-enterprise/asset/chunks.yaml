    # 存储 AI 模型与模型管理


    将 AI 模型与附加（元）数据一同存储在仓库中，强制执行严格的部署流程，并监控模型部署后的性能——这是模型管理的三大支柱。当然，模型管理只是处于时髦热门的**数据科学**工作与光鲜亮丽的**管理层**之间的夹心层。尽管如此，模型管理是可持续
    AI 计划所需的粘合剂。这种粘合剂能让企业从 AI 计划中受益多年，而不仅仅是几周或几个月。最终，模型管理凭借所有模型仓库信息和工件，为未来的数据科学项目提供快速启动支持——复用从未如此便捷。


    ## 组织 AI 团队


    恭喜！你已经塑造了你的服务，分析了必要的能力，准备了预算，获得了资金，并招聘了合适的人才。然而，要启动你的 AI 服务，你的员工必须知道如何处理哪些任务，如何在
    AI 团队及公司其他部门内协作，以及如何处理和完成用户与客户的请求。


    **AI 项目服务**对 AI 团队结构是否超级严谨是宽容的——它们（应该）有明确的目标。AI 管理层只需将工程师和数据科学家分配到项目中，并明确他们在每个项目上可以投入多少时间。`CRISP-DM`方法论规范了
    AI 专家的日常工作（图 5-19，左侧）。


    **AI 运维服务**则需要更复杂的组织架构。试想一下，一个在线商城的 AI 组件突然向搜索沙滩装的顾客推荐滑雪装备。在这种情况下，AI 团队面临着巨大的压力，需要冷静、迅速且专业地解决问题。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig19_HTML.png](img/516372_1_En_5_Fig19_HTML.png)


    图 5-19


    组织 AI 团队的主题


    与项目最大的区别在于，大多数运维组织需要同时为多个（内部）客户、应用或服务提供服务。他们需要响应事件和特定的客户请求。典型任务包括重启组件、修复接口问题或配置新接口。他们还会安排预防性维护，例如在供应商提供新补丁时进行安装。这类任务通常让工程师忙碌几小时或几天，而非几个月或几年。为了保持支持专家的工作管道饱满，他们需要同时处理多个应用和接口，如图
    5-13 所示——或者他们在一个超级复杂的应用背景下工作。


    服务组织面临的挑战是：每个人都想从共享服务的低成本中获益，即专家不只为一个接口或一个小型组件工作。尽管如此，每个人都期望获得卓越的服务，即使其他客户和用户同时遇到问题，并争夺支持组织的注意力。


    在组建 AI 运维团队应对这些日常挑战时，组织实际的服务交付（例如在系统上实施变更）只是其中一项任务。成功的关键还在于作为核心和外围服务属性一部分的**客户接触点**。在这里，用户、客户和
    AI 运维组织进行互动。接听首次使用者的电话，或为了获取服务请求的所有细节而反复发送电子邮件，既耗时又让 AI 运维专家忙碌不堪。更糟的是，可能还需要参加各种会议和研讨会。没有哪个经理愿意为一个两小时的任务，因为耗时的研讨会、做笔记以及员工之间的大量邮件往来而支付
    20 小时的费用。AI 组织必须避免这种情况。


    但成本只是一个方面。确保 AI 运维专家能够专注于任务而不被客户请求打断是第二个需求。处理关键更新需要一段时间内不受干扰的注意力。将工作负载随时间平均分配是实现成本效益的第三个关键要素。非紧急任务会被推迟到低峰期，即使客户认为他们的需求是公司最重要、最紧急的。


    AI 管理者必须精心设计客户接触点。常见问题解答页面和良好的文档可以减少联系 AI 运维团队的需求。一种广泛遵循的服务设计选项是防止 AI 运维专家或工程师与其他组件的用户直接接触。共享邮箱是一个起点；但唯一的长期解决方案是使用请求表单或工单系统，例如`Jira`。它们能确保透明度，了解哪些团队需要多少支持。此外，如果其他团队成员因假期或生病需要接手，她可以访问所有事件的信息。在某些情况下，用户和客户需要特定的联系人。这时，AI
    组织就需要额外的人员配置——并且必须有人为这种高级服务提供资金。


    **服务交付**的主要挑战是确保请求的顺畅处理和路由，以及 AI 团队内部及与其他团队的良好协作。所有涉及到的专家都必须清楚自己正在执行哪些活动，从同事那里接收哪些中间结果，以及自己需要交付哪些成果。解决方案是什么？清晰定义且达成共识的流程。


    对于 AI 组织而言，有四个流程或流程领域尤其值得关注：


    *   **事件流程**：之前正常工作的东西突然无法工作，需要修复。例如，AI 运行时服务器突然停止响应请求。

    *   **变更请求**：对正常工作的内容进行更改或提升到新水平。例如，应该为模型退化设置警报。未来，当购买推荐商品的客户比例低于 20%（目前是 30%）时，就应该触发警报。

    *   **AI 请求**：与具体 AI 模型相关的问题、愿望和需求，例如重新训练模型或澄清关于模型的问题。

    *   **一般咨询**：用于其他问题和非时间关键方面的标准输入窗口。


    **流程定义**明确了谁在何时、使用何种工具和系统做什么。具有深厚 IT 或科学背景的管理者和专家倾向于定义覆盖所有可能情况的流程。这种方法成本极高，识别每一种可能的情况通常很困难甚至不可能，而且流程定义会分散用户对核心思想的注意力，即运维和支持专家应该专注于什么才能提供卓越的服务。


    定义流程更可取的方法是专注于建模和培训“快乐路径”。这些是流程能够顺畅进行的情况。只对频繁发生的错误情况进行建模，而不是每个异常情况。对于独立行动、训练有素的支持和运维专家来说，异常情况在实践中很少成为问题。他们会找到解决方案。如果情况超出了他们的专业领域和舒适区，他们会联系管理层。仅需提醒一点，这个假设可能并非适用于所有公司文化和每种文化背景。

