- fmt: '# The CIA Triangle


    Information security professionals frequently refer to two fundamental principles
    of information security: the need-to-know principle and the CIA triangle or triad.
    CIA is an abbreviation for confidentiality, integrity, and availability (Figure
    [7-2](#516372_1_En_7_Chapter.xhtml#Fig2)). These three terms make it clear: information
    security is more than protecting your network with firewalls and running anti-virus
    software. Thus, they apply to and impact AI organizations and their infrastructure
    and platforms, too.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig2_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig2_HTML.png)


    Figure 7-2


    The CIA Triangle


    **Confidentiality** means keeping secrets secret. Users can only access data and
    systems they need for their work (need-to-know principle). Typically, employees
    get necessary access based on their roles. Other access rights require someone
    to grant access explicitly. A data scientist working for HR needs access to HR-related
    data stored in the data lake. In contrast, a data scientist working on sales topics
    does not have access to HR data.


    The second aspect of the CIA triangle is **integrity**. Integrity means that data
    and information in databases, files, and data lakes are correct. Applications,
    users, and customers can rely on them. For example, training data is highly critical
    for creating a usable AI model. Removing all data from a country or related to
    particular minorities impacts the correctness or quality of the model. Integrity
    does not require making all data manipulations and tampering technically impossible.
    Ensuring integrity requires detecting manipulations, for example, by using and
    validating checksums. Thus, integrity relates closely to non-repudiation. A user
    or engineer can only change data, applications, or configurations after authenticating
    herself. Authentication is a prerequisite for logging who did what. Needless to
    say: It is essential to store these log files tamper-proof.


    The third and final concept of the CIA triangle is **availability**. Data and
    information stored in files, databases, and software solutions deliver only benefits
    if one can access the data. When a building access system relies on an AI component
    to identify employees, the system must be operational 7/24. If the system is not
    available, nobody can enter the building. Typical technical measures for availability
    are backups or redundancy. The architecture must accompany these measures with
    additional protection against denial of service attacks or unintentional application
    shutdowns.


    ## Security-Related Responsibilities


    For technical and AI-focused specialists, security is often just a sideshow. Most
    engineers and architects enjoy putting the various AI-related components and systems
    together. When projects face the issue of who takes over a particular task, there
    is usually a solution within the project team, even if there is a shortage of
    engineering capacity. The challenge is more to keep the systems secure for the
    years they run. Who periodically inspects logs for irregularities? Who checks
    whether vulnerabilities emerge and vendors provide patches – especially for zero-day
    attack vulnerabilities?


    When AI organizations run training environments themselves, they are responsible
    for runtime servers and might have model repositories or data lakes. The AI organization
    must ensure that these systems are secure. It is often unclear which tasks a security
    organization takes over and which ones the AI teams have to organize themselves.
    A particular challenge for AI managers is understanding a typical double role
    of IT security organizations: security services and security governance (Figure
    [7-3](#516372_1_En_7_Chapter.xhtml#Fig3)). Both help a company and an AI organization
    to secure their IT infrastructure and their application landscape. Approach and
    aims, however, differ.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig3_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig3_HTML.png)


    Figure 7-3


    An Organizational Perspective on Security Responsibilities


    The company’s **security governance** function’s core tasks are elaborating policies,
    performing assessments, and managing IT-related operational risk emerging from
    derivations of actual systems implementations and procedures from policies. The
    security governance function is just one governance function. There are others
    such as legal and compliance or data governance impacting AI organizations as
    well, which other chapters address.


    Writing security policies is like writing a wish list for Santa Clause. You write
    them down; the actual delivery and implementation are not your concern. Policies
    contain procedural and technical requirements. One example of a procedural requirement
    is demanding penetration tests before software developers or data scientists make
    a web service available for the rest of the company. An example of a technical
    requirement is demanding to encrypt all network traffic with TLS 1.3. Governance
    specialists elaborate policies often from standards and frameworks such as the
    ISO 27000 family and ISAE 3402 or best practice documents from the software vendors
    or public cloud providers.


    The IT security governance teams do not provide any technical services to other
    teams. They guide the organization to a more secure setup with their policies.
    Plus, they support senior management to understand the company’s overall IT security
    and risk situation. The rest of the organization, including all IT and AI teams,
    act as Santa Clause. They have to fulfill the wishes and needs laid out in policies.
    Each **application owner** must ensure that his application is secure and complies
    with the security policies. AI organizations must fulfill the same requirements
    for their training environments, runtime servers, or model repositories as any
    other application or system handling large amounts of sensitive data. These tasks
    are usually with the AI organization’s application management and operations specialists
    providing internal services for the data scientists, data engineers, and AI translators.
    Figure [7-3](#516372_1_En_7_Chapter.xhtml#Fig3) refers to these components as
    **managed AI platforms and infrastructure**.'
