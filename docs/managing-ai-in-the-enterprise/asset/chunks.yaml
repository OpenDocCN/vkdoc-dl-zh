    本书建立在商业和学术专家在 IT 项目与运营管理、数据库、信息系统及人工智能领域的广博知识基础之上。然而，我之所以能编纂此书，还要感谢过去二十年间我的前任和现任同事、项目与直线经理、主管以及客户。他们指派我参与各种项目，帮助我广泛理解
    IT 组织与具体技术。多年来，我也从他们的经验以及我们的讨论中获益，这些为我提供了新颖且多元的视角。它们对于丰富我的方法论体系也至关重要。


    特别感谢来自《AI Business》的 Max Smolaks。他发表了我的多篇文章，这些文章最终成为了多个章节的基础。没有他的鼓励，我可能不会写出这本书。


    关于作者 关于技术审校


    # 1. 企业为何投资人工智能


    在一些公司，管理者似乎与 AI 服务和软件供应商达成了一种默契，将 AI 视为魔法：没人理解发生了什么，但 AI 承诺能精准实现每个人的期望，即便没人知道结果应该是什么。数据科学家们喜欢这样的项目。他们可以做任何最令他们兴奋的事情——至少，直到某位高层管理者叫停并终止项目为止。


    此类项目失败的根源在于混淆了两个层面：第一，是什么引起了管理者的兴趣；第二，哪些项目能为公司带来价值。引起管理者的兴趣很简单，因为他们别无选择。《哈佛商业评论》曾发表多篇关于
    AI 和数据驱动型组织的文章，将这一话题推至董事会层面。CEO 和 COO 们希望并且必须转型其组织。挑战在于第二部分：塑造并交付一个成功的 AI 项目。在此，CIO
    的角色是构建和运营技术基础，例如 AI 和数据管理能力。对 IT 部门来说，好消息是，在这种情况下资金是有保障的。相反，他们面临一个不同的挑战：在一个碎片化的市场中识别正确的软件产品、服务和合作伙伴。感觉此刻就像一场
    AI 淘金热。企业纷纷投资并设立项目；初创公司致力于创新；咨询公司调整其业务。供应商则对老式服务进行重新包装，使其在新世界中听起来性感且具有吸引力。


    复杂的市场、新的要求以及满足董事会期望的压力，对高级管理者来说是一个令人生畏的组合。他们面临的情况类似于一个拥有成百上千块碎片的巨大拼图。随机挑选一块拼图并寻找匹配的碎片，往往不如先花些时间了解全局来得成功。因此，本章通过回答以下问题，将
    AI 置于数据驱动型企业的背景中：


    *   数据驱动型公司有何特点，AI 如何提供帮助？

    *   项目和计划如何计算 AI 项目及服务的商业价值？项目经理如何构建商业案例？

    *   数据驱动型公司如何利用 AI 进行创新？典型的销售用例以及来自时尚行业的创新理念，说明了业务部门如何看待 AI。

    *   为什么扩大现有数据仓库（DWH）和商业智能（BI）团队的范围以涵盖 AI 服务可能不是一个好主意？


    ## AI 在数据驱动型公司中的角色


    人工智能与数据驱动型组织——这可能是目前大多数公司最热门的两个话题。它们各自有何独特之处，又有何共同点？C 级高管和企业战略家在制定创新和转型计划时需要答案。


    简而言之，“数据驱动型组织”一词涵盖两个方面——首先，是更技术性的需求，即在整个公司内系统地收集数据。其次，是决策方式的组织性转变，即（更多地）关注事实，减少对资历的依赖。人工智能通过生成洞察并识别人类在手动分析中无法发现的数据相关性，帮助做出更明智的决策。


    在我们的日常生活中，我们互换使用数据、信息、知识或洞察等术语。根据上下文，每个人都能理解实际所指。然而，精确的定义有助于理解数据驱动型组织以及 AI 的角色（图
    1-1）。


    **数据**是原始形式：磁盘上的 1 和 0，作为来自物联网设备流的一部分，或数据库中的字符串和数字。在这个层面上，我们对数据一无所知。数据本身不携带任何意义。它可能有助于也可能无助于理解物理或数字世界。


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig1_HTML.png](img/516372_1_En_1_Fig1_HTML.png)


    图 1-1


    AI 与数据驱动型公司 – 全景图


    **信息**是情境化的数据。一串 1 和 0 变成了来自监控生产线的摄像头的视频信号。在数据库中，一个字符串现在代表客户名称或订单 ID。一个数字变成了年利润，另一个数字变成了上个月的营业额。数据变成了信息——并且现在有了意义。


    在可预见的未来，情境化是并且仍将是一项主要由人类完成的任务。自动化识别员工或客户姓名或订单 ID 是直接的。但理解一个表存储的是未结订单的订单 ID 还是客户投诉过的订单的订单
    ID，则要难以自动化得多。只有人类才能理解复杂的数据模型语义。他们能够从智力上洞察那些看似相似但用途不同的数据元素（如未结订单、已交付订单和退货订单）的所有细微差别。


    **可操作的洞察**——也称为“知识”——代表指导决策的信息集合。生产线上是否存在异常？哪些客户退货最频繁？正如“可操作的洞察”一词所暗示的，必须有人决定是否以及执行哪些行动——而
    AI 则提供有用或必要的输入和选项。


    从历史上看，生成可操作的洞察是白领办公人员的领域。管理者和分析师将充满数字的大型 Excel 表格转化为漂亮的图表。这种传统方法有两个局限性。首先，人类只能理解和试验有限数量的影响参数。其次，虽然有统计学家和数学家处理核心业务问题的例子（例如保险公司的精算师），但对于大多数其他行业部门来说，情况并非如此。大多数管理者和分析师几十年前在大学里听说过统计显著性，但从未在实践中应用过这个概念。因此，对于将信息转化为可操作的洞察，人工智能是革命性的。AI
    模型融合了高度复杂的相关性，包括非线性关系；此外，AI 开发方法论强调稳健的质量控制措施。


    作为一项已有数十年历史的研究、开发和工程学科，AI 拥有众多方面，以及三个常被提及的方向或思想流派：

    '
- fmt: '# 人工智能的三种类型


    - **Artificial narrow intelligence**（狭义人工智能）隔离或单独处理高度专业化的任务，这些任务以前只能由人类完成：例如识别图像中的物体或下棋。得益于深度神经网络，狭义人工智能推动了当今的创新，并改变了社会和企业。


    - **Artificial general intelligence**（通用人工智能）旨在构建一个类似人类的智能系统，能够像人类和人类大脑一样学习、理解和行为。


    - **Artificial superintelligence**（超级人工智能）希望构建比人类大脑和智能更优越的“更聪明的大脑”。


    这些概念的影子已经存在于我们的流行文化中。超级人工智能是几年前电影《她》（*HER*）的主题。新一代创新手机配备了`AI`助手。这些`AI`助手在智力上比人类更先进——并最终脱离人类及其有限的智力。图灵测试，一个源自20世纪50年代的学术概念，如今广为人知。要通过图灵测试，`AI`系统必须在聊天中与真实的人类对话伙伴无法区分。这是否已经是通用人工智能？不。构建一个模仿人类的`AI`系统只反映了通用人工智能非常有限的一个方面。此外，图灵测试并不要求任何学习能力。


    当今商业上成功的聊天机器人甚至不会尽可能多地模仿人类的对话风格。它们明确表示自己只是机器人。它们并非设计用来通过图灵测试或达到通用人工智能的水平。它们是狭义人工智能的完美例子。它们通过提供比例如`SQL`命令行界面更人性化的界面，简化了在线客户的购买或预订流程，或查询支持数据库。


    狭义人工智能改进了可操作洞察的生成。基于这些洞察，决策需要某种形式的判断。如果银行职员预计八位客户可能会签约，他应该给十位潜在客户打电话吗？他是否应该给三十位而不是十位客户打电话，以完成十一笔而不是八笔销售？大楼里有入侵者。我们是报警，还是让夜间保安去检查情况？


    狭义人工智能的兴起改变了企业的决策方式。一个`AI`模型击败了拥有20年经验和高级头衔的专家。过去，除了基于资历的决策之外，通常别无选择，大多数专家在其领域拥有多年经验。他们并非以独裁者风格发号施令来证明自己的权力。然而，他们无法与设计良好的`AI`模型抗衡，尽管`AI`并非资深专家的终结。他们仍然对企业至关重要，只是有了新的关注点：在没有专用`AI`模型的领域进行决策，质疑特定`AI`模型是否有利于组织，以及基于`AI`提出的建议做出最终决策。


    总的来说，有三种决策模式值得一提：


    - **基于汇总信息的决策**：领域专家收集所有相关数据，查看相关性和依赖性。他自行决定，或为管理决策准备提案。


    - **将`AI`的力量与人类判断相结合**：`AI`生成洞察，最终决策权仍由人类掌握。这种模式有利于一次性战略决策，例如明年是进入俄罗斯市场还是澳大利亚市场更好。


    - **自主算法**：`AI`模型生成提案并直接触发其执行——无需任何人工干预。这种模式适用于运营性常规决策，尤其是在人类判断成本过高或速度过慢的情况下。投放在线广告就是一个完美的例子。算法必须在几毫秒内选择合适的广告。此外，单个广告产生的收入很低——只有几分钱，有时是几欧元。对于此类用例，人工干预成本太高且速度太慢。


    当考虑数据如何成为信息，信息如何成为可操作洞察，以及不同的决策模式如何运作时，数据驱动和`AI`角色的理念在大局中变得清晰（图[1-2](#516372_1_En_1_Chapter.xhtml#Fig2)）。数据驱动的组织需要数据，因此投资于数据收集及其情境化以获取信息。这是基于事实进行决策的基础。无论是人类还是算法和`AI`将收集到的信息转化为可操作洞察，`AI`对于重复性决策以及从庞大复杂的数据源中筛选出相关参数非常有益。此外，一旦模型训练完成，`AI`模型可以（近乎）实时决策，并且不会为每次决策带来高昂成本。


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig2_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig2_HTML.png)


    图 1-2


    使用`AI`能力的数据驱动组织面临的三大挑战


    当公司变得数据驱动并引入`AI`时，其商业案例不能只涵盖`AI`能力。它们必须包含为实现数据驱动而产生的费用：建立从数据仓库或业务应用、从`IoT`设备、以及从工程或服务部门系统中收集数据的能力——再加上重新设计决策流程的费用（以及时间和资源）（图[1-2](#516372_1_En_1_Chapter.xhtml#Fig2)）。将这三个挑战——数据收集、构建`AI`模型、转变企业决策——作为一个整体来看待，是成功的关键。'
  raw: '*   **Artificial narrow intelligence** isolates or singles out and solves
    highly specialized tasks that only humans could previously perform: identifying
    objects in images or playing chess, for example. Thanks to deep neural networks,
    narrow AI drives innovations today and transforms society and corporations.


    *   **Artificial general intelligence** aims to build a human-like intelligent
    system capable of learning, understanding, and behaving like humans and the human
    brain.


    *   **Artificial superintelligence** wants to build even better brains that surpass
    the human brain and intelligence.


    Reminiscences of these concepts are already part of our popular culture. Artificial
    superintelligence was a topic of the movie HER a few years ago. An innovative
    new mobile phone generation comes with an AI assistant. These AI assistants are
    intellectually more advanced than humans – and eventually depart from them and
    their limited intellect. The Turing test, a 1950s concept from academia, is widely
    known today. For passing the Turing test, an AI system must be indistinguishable
    from a real human conversation partner in a chat. Is this already general AI?
    No. Building an AI system that mimics a human reflects only a very limited aspect
    of general AI. Also, the Turing test does not require any learning capabilities.


    Today’s commercially successful chatbots do not even try to mimic human conversation
    styles as much as possible. They make it clear that they are just bots. They are
    not designed to pass a Turing test or achieve the level of general AI. They are
    perfect examples of narrow AI. They simplify buying or booking processes for online
    customers or querying support databases by providing a more human-friendly interface
    than, for example, an SQL command-line interface.


    Narrow AI improves the creation of actionable insights. Based on these insides,
    decisions require some form of judgment. Should a bank clerk call ten potentially
    interested customers if he can expect that eight might sign a contract? Should
    he better call 30 instead of ten clients to make 11 instead of eight sales? There
    is an intruder in the building. Do we call the police, or should the night security
    guard check the situation?


    The rise of narrow AI changes corporate decision-making. An AI model beats specialists
    with 20 years of experience and a senior title. In the past, there was often no
    other option than seniority-based decision-making, and most experts have years
    of experience in their field. They do not just command in dictator-style to prove
    their power. However, they have no chance against a well-designed AI model, though
    AI is not the end of senior experts. They remain essential for companies, just
    with a new focus: for deciding in areas without a dedicated AI model, for challenging
    whether specific AI models benefit the organization, and for final decisions based
    on proposals from the AI.


    In general, three decision-making patterns are worth mentioning:


    *   **Decisions based on summarized information**: A domain specialist gathers
    all relevant data, looks at correlations and dependencies. He decides himself
    or prepares a proposal for a management decision.


    *   **Combining the power of AI with human judgment**: AI generates the insights,
    the final decision stays with humans. This pattern brings benefits for one-time
    strategic decisions, such as whether to enter the Russian or better the Australian
    market next year.


    *   **Autonomous algorithms** : The AI model generates proposals and directly
    triggers their execution – without any human intervention. This pattern fits operational
    routine decisions, especially when human judgment is too expensive or too slow.
    Placing online ads is the perfect example. Algorithms must choose a suitable ad
    within milliseconds. Plus, a single ad generates only low revenues – a few pennies
    or sometimes Euros. Human intervention is too expensive and too slow for such
    use cases.


    When considering how data becomes information and information actionable insights
    and how the different decision patterns work, the idea of being data-driven and
    the role of AI get evident in the big picture (Figure [1-2](#516372_1_En_1_Chapter.xhtml#Fig2)).
    Data-driven organizations require data and, thus, invest in collecting data and
    its contextualization to derive information. It is the base for deciding on facts.
    Either humans or algorithms and AI turn the gathered information into actionable
    insights, AI is beneficial for repetitive decisions and for filtering out relevant
    parameters from large and complex data sources. Plus, AI models decide in (near)
    real-time once the model is trained and do not induce high costs for each decision.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig2_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig2_HTML.png)


    Figure 1-2


    The Three Challenges for Data-Driven Organizations Using AI Capabilities


    When companies become data-driven and introduce AI, their business cases must
    not cover only the AI capabilities. They must incorporate the expenses for becoming
    data-driven: establishing capabilities for collecting data from data warehouses
    or business applications, from IoT devices, and from systems in engineering or
    service departments – plus expenses (and time and resources) for reengineering
    the decision-making processes (Figure [1-2](#516372_1_En_1_Chapter.xhtml#Fig2)).
    Looking at these three challenges holistically together – data collection, building
    AI models, transforming corporate decision-making – is the key to success.'
  trans: '

    # 人工智能的三种类型


    - **Artificial narrow intelligence**（狭义人工智能）隔离或单独处理高度专业化的任务，这些任务以前只能由人类完成：例如识别图像中的物体或下棋。得益于深度神经网络，狭义人工智能推动了当今的创新，并改变了社会和企业。


    - **Artificial general intelligence**（通用人工智能）旨在构建一个类似人类的智能系统，能够像人类和人类大脑一样学习、理解和行为。


    - **Artificial superintelligence**（超级人工智能）希望构建比人类大脑和智能更优越的“更聪明的大脑”。


    这些概念的影子已经存在于我们的流行文化中。超级人工智能是几年前电影《她》（*HER*）的主题。新一代创新手机配备了`AI`助手。这些`AI`助手在智力上比人类更先进——并最终脱离人类及其有限的智力。图灵测试，一个源自
    20 世纪 50 年代的学术概念，如今广为人知。要通过图灵测试，`AI`系统必须在聊天中与真实的人类对话伙伴无法区分。这是否已经是通用人工智能？不。构建一个模仿人类的`AI`系统只反映了通用人工智能非常有限的一个方面。此外，图灵测试并不要求任何学习能力。


    当今商业上成功的聊天机器人甚至不会尽可能多地模仿人类的对话风格。它们明确表示自己只是机器人。它们并非设计用来通过图灵测试或达到通用人工智能的水平。它们是狭义人工智能的完美例子。它们通过提供比例如`SQL`命令行界面更人性化的界面，简化了在线客户的购买或预订流程，或查询支持数据库。


    狭义人工智能改进了可操作洞察的生成。基于这些洞察，决策需要某种形式的判断。如果银行职员预计八位客户可能会签约，他应该给十位潜在客户打电话吗？他是否应该给三十位而不是十位客户打电话，以完成十一笔而不是八笔销售？大楼里有入侵者。我们是报警，还是让夜间保安去检查情况？


    狭义人工智能的兴起改变了企业的决策方式。一个`AI`模型击败了拥有 20 年经验和高级头衔的专家。过去，除了基于资历的决策之外，通常别无选择，大多数专家在其领域拥有多年经验。他们并非以独裁者风格发号施令来证明自己的权力。然而，他们无法与设计良好的`AI`模型抗衡，尽管`AI`并非资深专家的终结。他们仍然对企业至关重要，只是有了新的关注点：在没有专用`AI`模型的领域进行决策，质疑特定`AI`模型是否有利于组织，以及基于`AI`提出的建议做出最终决策。


    总的来说，有三种决策模式值得一提：


    - **基于汇总信息的决策**：领域专家收集所有相关数据，查看相关性和依赖性。他自行决定，或为管理决策准备提案。


    - **将`AI`的力量与人类判断相结合**：`AI`生成洞察，最终决策权仍由人类掌握。这种模式有利于一次性战略决策，例如明年是进入俄罗斯市场还是澳大利亚市场更好。


    - **自主算法**：`AI`模型生成提案并直接触发其执行——无需任何人工干预。这种模式适用于运营性常规决策，尤其是在人类判断成本过高或速度过慢的情况下。投放在线广告就是一个完美的例子。算法必须在几毫秒内选择合适的广告。此外，单个广告产生的收入很低——只有几分钱，有时是几欧元。对于此类用例，人工干预成本太高且速度太慢。


    当考虑数据如何成为信息，信息如何成为可操作洞察，以及不同的决策模式如何运作时，数据驱动和`AI`角色的理念在大局中变得清晰（图 1-2）。数据驱动的组织需要数据，因此投资于数据收集及其情境化以获取信息。这是基于事实进行决策的基础。无论是人类还是算法和`AI`将收集到的信息转化为可操作洞察，`AI`对于重复性决策以及从庞大复杂的数据源中筛选出相关参数非常有益。此外，一旦模型训练完成，`AI`模型可以（近乎）实时决策，并且不会为每次决策带来高昂成本。


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig2_HTML.png](img/516372_1_En_1_Fig2_HTML.png)


    图 1-2


    使用`AI`能力的数据驱动组织面临的三大挑战


    当公司变得数据驱动并引入`AI`时，其商业案例不能只涵盖`AI`能力。它们必须包含为实现数据驱动而产生的费用：建立从数据仓库或业务应用、从`IoT`设备、以及从工程或服务部门系统中收集数据的能力——再加上重新设计决策流程的费用（以及时间和资源）（图
    1-2）。将这三个挑战——数据收集、构建`AI`模型、转变企业决策——作为一个整体来看待，是成功的关键。

    '
- fmt: '## Calculating the Business Value of AI


    A C-level commitment to become a data-driven company and to invest in AI is a
    nurturing environment for AI projects. Still, building and establishing a concrete
    AI service needs funding, and funding requires a convincing business case. The
    business case can be a hurdle for highly innovative projects because quantifying
    their benefits is a challenge. Luckily, economic research identified four ways
    IT investments generate value. They help to craft a concrete business case. These
    four ways or options are:


    * **Informational benefits**, for example, delivering information to the decision-makers.

    * **Transactional benefits** such as improving daily operation and cutting costs.

    * **Strategic benefits**, for example, changing how the company competes in the
    market or its products’ nature.

    * **Transformational benefits** refer to future benefits, for example, due to
    additional features of a new tool that employees start using once they get acquainted
    with the tool, and that enable them to optimize their work.


    There is a lot of anecdotal evidence for benefits but little systematic empirical
    work covering many companies. One exception is a study Elisabetta Raguseo performed
    on French companies of various sizes. In her research, she looked at Big Data
    technologies. They handle and analyze massive data volumes coming in at high speed
    and in varying formats. Big data relate closely to data-driven companies or the
    guiding aim of AI to generate insights from large amounts of data, making her
    study relevant for this book, too.


    Elisabetta found out that enhancing employee productivity is the most relevant
    transactional benefit in all considered industry sectors. Reducing operating costs
    was second. The subsequent most relevant strategic benefits are aligning IT with
    a business strategy and enabling a quicker response to change.


    In the area of transformational benefits, expanding capabilities is rated as most
    important. It can be achieved, for example, by enabling new employees to start
    quickly working on integrating additional data sources. In the area of informational
    benefits, they list proving management data, improving data accuracy, providing
    data in more useable formats, enabling easier access to data, and enabling faster
    access to data.


    There are two key points to consider when applying the insights for your business
    case for AI projects. First, the area is close, but not the same. Raguseo’s results
    are good inspirations, not god’s word. Second, company culture and politics impact
    which of the benefit types work best in your organization and your managers:


    * Certain benefits are **easy to quantify** – especially (but not only) transactional
    benefits. The project calculates today’s costs and estimates the potential savings
    after implementing the project. Such business cases are perfect for companies
    driven by financial numbers with a strong influence of controllers and like-minded
    managers.

    * There are **vague to quantify** benefits. Will predictive analytics increase
    sales by 1% or 10%? The calculation in the business case and the actual costs
    and savings can differ widely. Many strategic and transformational benefits fall
    into this category. Such arguments convince visionary and innovation-driven decision-makers,
    not nitpickers.

    * The informational benefits are the easiest to fund. When a manager believes
    to need data, she will fund a project or service if within her budget. There is
    **no need to quantify** any benefits beforehand.


    When the business value is clear, the management decides whether to invest in
    the transformation to become a data-driven organization and build and extend its
    AI capabilities. In most cases, AI initiatives start with the low-hanging fruits
    with easy-to-measure results such as improving and optimizing sales.


    ## Use Case: Sales Operations Efficiency


    Improving sales efficiencies is one example for realizing transactional benefits:
    more sales, less effort. The use case takes advantage of the power of data (and
    algorithms) to boost sales and to identify customers potentially terminating their
    contract. In such use cases, the AI predicts, for example, which customers might
    buy a product.


    Traditionally, sales agents or the sales management would filter customer lists
    based on their gut feeling to get an idea which customers they could call. It
    was and is their responsibility to make the right choices when selecting the customers
    to call. They are responsible for the outcome.


    For an AI-generated list, the data scientists are (at least partially) responsible
    for the sales success. The lists are clear guidelines for sales agents on how
    to act. If you want to sell office furniture, these are the customers that most
    likely buy. Call them! These customers might cancel their cable subscriptions.
    Do something and prevent it! Whoever creates such lists is responsible for their
    quality.'
