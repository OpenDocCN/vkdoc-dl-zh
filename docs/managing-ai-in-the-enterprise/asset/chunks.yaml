- fmt: 'A **swim lane process model** (Figure [5-20](#516372_1_En_5_Chapter.xhtml#Fig20))
    is a straightforward process modeling technique useful for documenting AI operational
    processes. Each swim lane represents a department, a team, or a specific role.
    A process consists of different steps. Their placement in a column or swim lane
    defines who is performing the task. If the employees work with a specific IT system
    to fulfill a particular task in the process, the system used should also be specified.
    Swim lane process models (in contrast to, e.g., UML Sate Machines) can only visualize
    processes without too many case distinctions or loops. If a swim lane model gets
    too complex, splitting it into two or three can help. Otherwise, the process is
    probably too complicated for everyday usage by a team. Once an AI organization
    has defined all its core processes (e.g., the four mentioned above) and trained
    all team members, the organization is ready to work.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig20_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig20_HTML.png)


    Figure 5-20


    Example of a Swim Lane Process Model with Five Actors and an Extra Row Indicating
    the Systems Used by the Actors


    A guiding principle for an AI organization designing and implementing its processes
    is **compatibility with the company’s other processes**. If other teams have to
    perform a specific step, these teams must also agree on the processes and tools.
    In many cases, IT departments define their processes based on the de-facto standard,
    the **Information Technology Infrastructure Library** (**ITIL**). However, just
    knowing the standard does not help an AI organization much. IT departments tailor
    ITIL processes heavily. Who is precisely approving requests coming from which
    system using which forms? What are the tools for which procedures? The details
    are company-specific but crucial for working AI processes.


    Many AI solutions come with integrated workflow engines helping an AI organization
    to structure its work. It is a convenient option, but AI organizations should
    clearly understand the limitations: they might have to use, in parallel, other
    systems and copy tickets from one system to another. Suppose a database team should
    export and hand over some data. Will they accept tasks assigned to them by a workflow
    system of the AI organization? Maybe, but for sure not in large IT departments.
    What happens when the marketing team notices that the “customer who buys dresses
    by also …” feature does not work? Will they open a ticket in the company-wide
    **incident management** system and let the IT department figure out the details?
    Or would they love to figure out themselves whether it is an AI or a webshop issue,
    search where the right incident ticketing system is, and open a ticket in this
    specific tool of the AI organization? Apparently not. AI organizations have to
    ensure that their tooling for processes and requests follows the company standard.
    Otherwise, they look for trouble when their systems have any relevance to the
    business.


    While processes are crucial, many organizations nowadays talk about **(target)
    operating models** (TOMs) that define how an organization works. TOMs describe
    an intended future operational model. In contrast, the term “Current Operating
    Model” refers to the current status quo. An AI organization providing operational
    services usually needs a TOM. The purpose is not so much for keeping the operational
    processes up. The real purpose is more to discuss strategic directions for the
    AI organization, elaborate on how to transform the organization, and clarify its
    possibilities and limitations.


    A (target) operating model cover the following core aspects (Figure [5-21](#516372_1_En_5_Chapter.xhtml#Fig21)):


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig21_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig21_HTML.png)


    Figure 5-21


    Operating Models for AI Organizations


    *   **Service pledge** with the value proposition. Here, the AI organization’s
    business value and shaping the service as presented at the beginning of this chapter
    help.

    *   **Processes**: Which activities are processed in which order by whom and using
    which tools? We discussed this a few paragraphs up.

    *   **Staff and organization** taking over the tasks defined in the processes.

    *   **IT** with the infrastructure and applications (and their parameterization)
    as a core “enabler” for (efficient) process execution.


    AI managers can specify the first three topics and write them down quickly based
    on this book’s input. Many supporting topics, including KPIs, capacity planning
    regarding IT resources, staff, or souring strategies (e.g., internal employees,
    contractors, consulting companies) require, for sure, more clarifications. The
    fourth important aspect of an operations model is the needed IT infrastructure.
    It is the topic of the following chapter.


    ## Summary


    This chapter elaborated on the specifics of managing an AI organization and not
    just any team within an IT department. In particular, it covered three topics:
    shaping an AI service, managing the AI project services for creating new AI models,
    and ensuring reliable operations when it comes to running and maintaining (the
    infrastructure) for AI models and inference based on them.


    Shaping a service is about understanding the collaboration patterns between business
    and AI organizations. These patterns directly impact funding needs and how an
    AI organization presents its services to potential internal customers to manage
    their expectations properly. It also guides the AI managers in clarifying which
    aspects of a service are pivotal, core, or more peripheral as a base for investment
    decisions.


    AI organizations that want to run AI projects need data science know-how, but
    also data engineering capabilities to efficiently make use of existing data and
    AI translator capabilities to bridge the gap between business needs and concrete
    requirements what an AI model should deliver – our capabilities triumvirate. Understanding
    the cost drivers and the budget structure were additional aspects, so was pointing
    out the main challenge of project-focused funding: balancing project acquisition
    to prove the organization’s relevance and ensure funding vs. available resources
    to execute the acquired projects.


    When AI organizations want to run and maintain AI models, they need additional
    capabilities: support and application management, integration engineering, and
    reporting and visualization. They have to manage the AI models and monitoring
    the model performance as two additional AI-specific operations tasks. Finally,
    process definitions and target operating models help AI organizations establishing
    a structure and ensuring smooth, day-to-day operations.


    This knowledge is what distinguishes an AI manager from a conventional IT manager
    or a technology- and algorithms-focused data scientist.


    # 6. AI and Data Management Architectures


    The AI capability in an IT landscape is more than just the icing on the cake.
    It is a core capability for forward-thinking, data-driven, innovative companies.
    While not just the icing, it is also not the whole cake. An AI organization has
    to integrate its components into the overall corporate application landscape –
    and its own system landscape typically consists of more than just a few `Jupyter`
    notebooks. In other words: This chapter looks at the big architectural questions
    any AI organization faces that is more than just a one-man show.


    The architectural challenges relate to three topics:


    *   Architecting AI environments for model training and ongoing execution and
    inference

    *   Integrating AI environments into the corporate data management architecture

    *   Understanding the impact of the public cloud on AI environments'
