- fmt: '**Multiclass classification** means that the classification result is not
    just a yes/no, but can be a dog, cat, turtle, or giraffe. In a business setting,
    such an AI model might predict the next best product for a customer. Should the
    bank advisor try to sell the client an equity fund, a mortgage, or a golden credit
    card?


    Multiclass classifications need an expanded confusion matrix, as Table [3-1](#516372_1_En_3_Chapter.xhtml#Tab2)
    illustrates. Each class requires a matching column and row. Again, the matrix
    allows comparing predictions and reality.


    **Table 3-1** Confusion matrix example for multiclass classification


    | | Predicted: Credit Card | Predicted: Mortgage | Predicted: Equity Fund | Predicted:
    Savings Plan |

    |---|---|---|---|---|

    | Actual Bought: Credit Card | 189 | 5 | 8 | 7 |

    | Actual Bought: Mortgage | 12 | 25 | 5 | 4 |

    | Actual Bought: Equity Fund | 12 | 13 | 58 | 24 |

    | Actual Bought: Savings Plan | 7 | 1 | 51 | 125 |


    For multiclass classifications, the metrics definitions change slightly – and
    more metrics variants exist. Here, we explain two: (multiclass) accuracy and balanced
    accuracy. Comparing both gives project managers an idea of what different purposes
    or foci metrics can have.


    **Accuracy for multiclass classifications** is the portion or percentage of correctly
    classified or predicted items. In the example, we divide the sum of the items
    in the diagonal by the sum over all cells:


    ```

    Acc_multiclass = (189 + 25 + 58 + 125) / (189 + 5 + 8 + 7 + 12 + 25 + 5 + 4 +
    12 + 13 + 58 + 24 + 7 + 1 + 51 + 125)

    ```


    The predictions of the frequent classes dominate the result. Suppose some classes
    appear more often than others. In that case, the classification quality for the
    scare classes has a low impact on this metric. For example, different cancer forms
    are illnesses not many have at a defined point in time. An algorithm that predicts
    “no cancer” for each and every patient performs close to 100%. The very few cancer
    patients have (nearly) no impact on multiclass accuracy. Multiclass accuracy is
    worthless for this scenario. A metric that deals better with scare but important
    classes is the **balanced multiclass accuracy** metric. It averages the metrics
    of each class:


    ```

    Acc_balanced = ( (189 / (189 + 5 + 8 + 7)) + (25 / (12 + 25 + 5 + 4)) + (58 /
    (12 + 13 + 58 + 24)) + (125 / (7 + 1 + 51 + 125)) ) / 4

    ```


    In other words: All classes have the same weight in case of this metric, no matter
    how frequent any of them is. The performance on multiple infrequent classes outweighs
    issues on one or two dominant classes for this metric.


    Multiclass and balanced multiclass accuracy are two examples of quality metrics
    for multiclass classifications. None of them is per se better than the other.
    The driving factor is the business question the AI model wants to solve. AI project
    managers must understand which metrics the data scientists use and why. It is
    essential for delivering business value. Choosing inadequate metrics means that
    the created AI model might not deliver the needed business value. However, it
    is not always easy to make the right choice, especially for a complex business
    question. Still, it is a good idea to start with established metrics. There is
    a reason why they are widely used: they are often helpful.


    Measuring the performance of **object detection** goes much further than simple
    multiclass classification. First, images can contain more than one object, for
    example, a glass, a bottle, and a chair (see Figure [3-5](#516372_1_En_3_Chapter.xhtml#Fig5)).
    Second, the AI model also determines bounding boxes for each object. The boxes
    mark the location of the identified objects on the image. Typically, an object
    counts as correctly detected if bounding boxes overlap at least 50%.


    In Figure [3-5](#516372_1_En_3_Chapter.xhtml#Fig5), the AI model identifies the
    bottle, the glass not. While the object class “glass” is correct, the overlap
    of the shapes is too low. Finally, the chair is not detected, and there is no
    car where the algorithm detected one. So, how good is the AI model? One metric
    is defined as dividing one by four, resulting in a value of 25% (Intersection
    over Union).


    To conclude, the examples for performance metrics for predictions, multiclass
    classification, and object detection illustrate the variety of existing metrics
    for the different AI challenges. Some are more complicated than others, but AI
    project managers invest their time wisely when they insist on understanding what
    their data scientists optimize. The AI project success depends on whether the
    metrics the AI model optimizes match the relevant business performance metrics.


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig5_HTML.png](images/516372_1_En_3_Chapter/516372_1_En_3_Fig5_HTML.png)


    **Figure 3-5** Object Detection Illustrative Example with Various Objects. Green
    Bounding Boxes Are the “Correct” Ones, Whereas the Transparent Boxes Are the Limits
    the Model Identified


    ## QA Stages in AI Model Engineering


    When data scientists present their AI project model and the precision and recall
    or `R²` values, should he run to his sponsors and tell them they made it? Is the
    model ready for production deployment?


    The answer is a clear “no.” A single metric is never enough. The project manager
    needs at least two to three metrics and confidence that the training data was
    used adequately to produce the metrics. Figure [3-6](#516372_1_En_3_Chapter.xhtml#Fig6)
    outlines a process of how to structure the quality assurance for AI models. A
    good model is not the lucky result of random parameter or weight changes if the
    metrics are not as good as needed or expected. Getting a good model means starting
    with multiple candidate models. The project drives them through the various QA
    stages. Eventually, the chosen one makes it through all stages because it is the
    first good model getting there or a candidate model superior to all others.


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig6_HTML.png](images/516372_1_En_3_Chapter/516372_1_En_3_Fig6_HTML.png)


    **Figure 3-6** Understanding Quality Assurance in the Process of Turning Data
    into AI Models


    ### Perfect but Worthless Model Metrics


    Projects should avoid worthless metrics, that is, metrics that do not help to
    understand the model performance. Some car manufacturers impressively perfected
    the concept of useless metrics, which turned out to be a bad idea. They optimized
    car engines a little bit too much. All cars met the regulatory emission benchmarks
    because the car adjusted the engine when noticing to be in an emission test. Emissions
    under normal traffic conditions were completely different and much less eco-friendly.
    It was not for the good of the involved managers and engineers. AI projects should
    avoid – even unintentionally – producing too-good-to-be-true metrics as the car
    manufacturers. Such issues happen when mixing up the data for training and for
    assessing an AI model.


    To add a second nuance: Do you know the fastest way to implement a 100% perfect
    model if using the same data for training and quality assurance? Program a component
    that checks whether the model input data corresponds to an entry in the training
    set. If so, take the correct answer from the training set. Otherwise, return a
    random number. Your model achieves 100% for precision and recall on the training
    set – and is entirely useless. The only way to avoid running unintentionally into
    such issues is to split your training data into three data sets: training, validation,
    and test data sets – and to follow a strict quality assurance procedure this chapter
    explains.'
