- fmt: '### On Ethical AI Models


    Most data scientists have to deal with AI ethics when the question emerges whether
    their AI models are ethically adequate. These models impact people’s lives, be
    it a credit scoring solution or a face detection model for automated passport
    controls at airport customs. There is a lot of ongoing research, but two concepts
    stand out for AI organizations in an enterprise context: bias and fairness (Figure
    [4-2](#516372_1_En_4_Chapter.xhtml#Fig2)).


    **Bias** was already a topic in the quality assurance chapter. The concept looks
    at the training data and its distribution. We call training data biased if its
    distribution deviates from the one in reality. If a society consists of roughly
    50% male and 50% female persons, the training data distribution should be similar.
    If the training data for face recognition consists of 99% male pictures, the created
    AI model most probably works well on them. In contrast, the model is most likely
    unreliable for females.


    What makes avoiding bias an easy-to-get-support-for measure is that removing bias
    and raising ethical standards brings a business benefit: the AI model gets better.


    **Fairness** is a concept demanding that the trained AI models behave similarly
    well for all relevant subgroups, even for small ones. Suppose a company has 95%
    female employees. Such a gender imbalance impacts the AI model training. The training
    could optimize the accuracy for female employees and ignore the male ones and
    still achieve high accuracy. When 95% of the employees are female, and the algorithm
    identifies 99.9% of the female population correctly, but only 10% of the remaining
    5% male employees, overall, the AI model identifies 95.4% correct – not bad, at
    least if you are female, not male. However, the ethical concept of fairness rejects
    such a model. It would be unthinkable that every male employee must show a passport
    at the reception, whereas all female employees can use their badge to get in.


    In an enterprise context, fairness and bias have one crucial difference. In contrast
    to bias, fairness causes costs for the business. Fairness means not using the
    best AI model but a model that works equally well for all relevant subgroups,
    for example, by overrepresenting small relevant subgroups in the training set.
    To illustrate this, we extend the example from above. The best AI model might
    identify 99.9% of the female employees but only 10% of the male ones. The best
    fair (!) AI model might have an accuracy of 90% for both male and female employees.
    Such a “small” change of the overall accuracy can be cost-intensive. Using a 95%
    accurate automatic passport controls at an airport requires the customs staff
    to check the passport of one out of 20 travelers. An accuracy of 90% means checking
    10% of the travelers, requiring to double the customs staff.


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig2_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig2_HTML.png)


    Figure 4-2


    Understanding Bias and Fairness


    ### AI Ethics Governance


    AI ethics is a topic with many stakeholders, from data scientists, AI managers
    to business specialists needing AI models and corporate social responsibility
    teams. It is a highly emotional topic, too. Organizations risk bitter fights about
    what is adequate and what is morally acceptable and who decides what if not working
    out crystal-clear who or which board makes which decisions concerning the three
    areas: (un)ethical use cases, (un)ethical engineering practices, and (un)ethical
    AI models.


    The Google/Timnit Gebru controversy illustrates an easy-to-oversee pitfall for
    AI organizations. Gebru’s reputation bases on earlier work where she unveiled
    that IBM’s and Microsoft’s face detection models work well for white men but are
    inaccurate for women of color. In other words: She found flaws in the model caused
    most probably by biased training data. Such flaws are embarrassing, but knowing
    these shortcomings enables data scientists to build better models.


    While with Google, she co-authored a paper that criticized Google’s work on a
    new language model for two reasons. First, Google trained its model with texts
    available online. Such texts are obviously (partially) biased, discriminating,
    or even openly racist. When the training set also contains such texts, the model
    reflects them partly as well. UN’s Autocompletion Truth campaign illustrated this
    in videos. They let Google Search’s autocomplete function suggest which words
    should come next. If “women cannot” results in “women cannot drive,” this reflects
    prejudices in our use of the language. The autocomplete prediction works correctly,
    but the result is questionable. Gebru was and is right: if you use online texts,
    you replicate today’s injustice and unethical tendencies. The underlying demand
    of such criticism is: language models should not reflect our language use today,
    but a better, purified version of ourselves and our language – free from prejudices
    and discrimination.


    This criticism, at the same time, questions the engineering method. Should Google
    use online texts from the web, which do not incur costs and reflect our language,
    or should you start filtering and preparing training texts to exclude potentially
    problematic texts? Suddenly, the criticism impacts the speed of the AI model development
    and the business case due to the potentially high effort needed to filter and
    rework texts used as training data.


    Her second criticism addresses the massive energy consumption of the language
    model. This criticism has nothing to do with the ethical properties of AI models,
    such as bias or fairness. It questions whether Google should develop an AI model
    that the management sees as essential for Google’s future business. Weighting
    business strategy and its impacts on ecology is a valid ethical question, it is
    just more on the business side than at the core of AI ethics. Figure [4-3](#516372_1_En_4_Chapter.xhtml#Fig3)
    illustrates this shift in Gebru’s research.


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig3_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig3_HTML.png)


    Figure 4-3


    Understanding the Google/Gebru Controversy


    Companies and their AI organizations can learn from this controversy. Which manager
    or board decides about which (of the three) ethical aspects in the AI sphere?
    What are the competencies of corporate social responsibility or business ethics
    teams? What does the top management decide?


    AI ethics is essential from a moral perspective, for the corporate culture, and
    for the organization’s reputation – not to speak of the already existing or expected
    to come regulatory demands. Thus, a frictionless integration in the company and
    its corporate culture is necessary right from the beginning.'
