- fmt: '# Summary


    At the end of this first chapter, I want to summarize the main points quickly:


    - Data-driven companies base their decisions on facts and data rather than on
    experience and seniority. AI helps in extracting actionable insights from large
    and complex data sets.

    - The four benefits of AI are informational (providing additional information),
    transactional (making something better or cheaper), strategic (impacting a company’s
    or product’s standing on the market), and transformational (paving the road for
    future improvements).

    - AI is about creating models. These models have a tactical benefit for the organization.
    They can predict individual behavior, for example, whether a person is likely
    to buy a phone. The models provide strategic insights, too, such as identifying
    the characteristics of typical buyers.

    - AI helps in optimizing single tasks such as cross- and upselling. Alternatively,
    AI can enable transformations of business models, such as is illustrated with
    the fashion industry example.

    - Many companies have DWH and BI teams that could take over at least more straightforward
    AI projects. However, separate AI teams are crucial when service models, funding,
    and governance structures differ.


    With this knowledge, we are ready to look at how to run AI projects and deliver
    innovation. Just be warned and remember the old proverb: “We admire what we do
    not understand.” After the next chapter, you understand how data scientists work
    and how you can improve projects. So, AI will be less magical for you afterward!


    # 2. Structuring and Delivering AI Projects


    Congratulations, the board of directors wants to move forward with AI. The senior
    managers chose you as their AI program and project manager. Now it is your time
    to deliver results. You had the vision; now you can make your vision become a
    reality. Just do not forget: some truths apply to all projects, AI or Non-AI ones.
    The corporate world expects projects to deliver results cost-efficiently, timely,
    and reliably. Most companies cannot and do not want to pay ten PhDs and wait for
    eight months to get a perfect solution. Academia is patient and invests so much
    time and effort. Companies, not so much. As an AI project manager, your challenge
    is to work on a solution with two or three IT professionals and deliver the first
    results in six or eight weeks. With such a context in mind, this chapter provides
    answers for the following AI project management challenges (see Figure [2-1](#516372_1_En_2_Chapter.xhtml#Fig1)):


    - What are the different layers on the AI technology stack which enable companies
    to innovate with AI?

    - How can AI project managers scope their projects to meet the expectations of
    their business stakeholders and sponsors?

    - AI models are the core deliverable of AI projects. How do, for example, neural
    network or statistics-based AI models look like?

    - What is a development methodology which works for AI projects? What are vital
    efficiency factors?

    - How can you integrate AI models in an existing corporate application landscape?


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig1_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig1_HTML.png)


    Figure 2-1 Structure of the Chapter


    ## The Four Layers of Innovation


    Managing AI projects and teams has some peculiarities. Team members tend to be
    more technology-affine and have a stronger computer science and math background
    but less experience with business problems than legacy application developers.
    There are fewer patterns and established toolchains known from traditional software
    engineering. Thus, AI project managers have to provide more directions to ensure
    delivering concrete business benefits. They have to challenge their data scientists
    constantly to prevent the latter from doing AI research and reinventing the wheel.


    Structuring a technology area in layers and defining a technology stack is a long-known
    and widely practiced approach. When looking at the example of Java, the Java backend
    application runs code in Java VMs. A Java VM runs on a hypervisor, which runs
    on an operating system, with the operating system running on physical hardware.
    There are similar layers in AI (Figure [2-2](#516372_1_En_2_Chapter.xhtml#Fig2)).
    The lowest layer is the **hardware layer**. Neural networks, for example, require
    many, many matrix multiplications. Regular CPUs can perform them, but there are
    faster hardware options: Graphical Processing Units (GPUs), Field Programmable
    Gate Arrays (FPGAs), or Application Specific Integrated Circuits (ASICs). Innovation
    on this layer comes from hardware companies such as AMD or NVIDIA. Companies buying
    such innovative products are server and workstation manufacturers or public cloud
    providers. These customer groups need hardware for their data centers that run
    AI-rich workloads efficiently.


    The **AI frameworks layer** forms the next layer. It represents frameworks for
    machine learning and AI, such as `TensorFlow`. `TensorFlow` distributes the workload
    for training massive neural networks on large and heterogeneous server farms,
    thereby taking advantage of their computing power. `TensorFlow` abstracts for
    the data scientists from the underlying hardware. It parallelizes autonomously
    computing tasks. Data scientists can run the same code and learning algorithms
    on a single laptop or a cluster with hundreds of nodes with hardware tuned for
    AI and benefit from the cluster. Data scientists do not have to change their code
    for different hardware configurations, saving them a lot of work and effort.


    Companies use AI frameworks to develop new AI algorithms and innovative neural
    network designs. Suppose a company wants to develop the next big thing after `GPT-3`
    or a fundamentally new computer vision algorithm. In that case, their data scientists
    use an AI framework to engineer and test new algorithms. In other words: nearly
    all data scientists do not innovate on this layer but work on top of the existing
    frameworks.


    There are only two scenarios for innovation in this layer: improving an existing
    framework such as `TensorFlow` or developing a completely new one. These activities
    are usually part of academic research. For companies, it makes sense only if they
    have an outreach to a massive number of data scientists. The latter applies to
    public cloud providers or AI software companies. They need innovation to provide
    “the best” AI framework to lure data scientists into using their AI and/or cloud
    platform.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig2_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig2_HTML.png)


    Figure 2-2 The AI Technology Stack'
