    *   Teenagers do not have a credit card.


    *   Adults in low-income households seldom have one.


    *   Retired persons often have no credit card. If they have one, they use it infrequently.


    These insights help product managers to launch product innovations. In this example,
    the bank has unserved customer segments, for example, teenagers to whom the bank
    must not grant loans and adults with high default risk. The product manager needs
    a new product because the existing offering is not suitable for these customer
    segments. We all know the solution: prepaid credit cards. It looks like a credit
    card, but you can only spend as much money as you put on the card beforehand.
    For retired persons skeptical about the risks when paying with a credit card,
    an assurance for cyber fraud is an option. Thus, AI can help with its model to
    shape and develop new products (Figure [1-5](#516372_1_En_1_Chapter.xhtml#Fig5),
    right/B). Another outcome of such an analysis can be that the customer base of
    similar products overlaps. In such a case, product managers might want to restructure
    their product portfolio because the products cannibalize each other and each product
    has fixed- costs.


    An AI model helps as well for a market-development growth strategy. Suppose a
    product manager analyzes the AI model and can characterize potential buyers (e.g.,
    over 30, no kids, no cat, potentially a dog). With this knowledge, he can contact
    market research or direct marketing companies with address databases. They might
    provide lists of persons matching the criteria, making them likely potential new
    customers (Figure [1-5](#516372_1_En_1_Chapter.xhtml#Fig5), right/C).


    Figure [1-6](#516372_1_En_1_Chapter.xhtml#Fig6) illustrates the mechanics of how
    to use an AI model for insights from a procedural side. The idea is to check whether
    a defined product or market strategy and observed customer behavior match. If
    not, this means there is an opportunity for growth when readjusting the product
    and market strategy and checking again.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig6_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig6_HTML.png)


    Figure 1-6


    AI for Strategic Product Management'
  trans: '

    ### 组织影响


    如果人工智能接管了销售和营销领域的客户评分工作，它会对销售组织中的员工产生怎样的影响？首先，评分并非新鲜事物。营销和销售专业人员几十年来一直在做这件事。人工智能革新了评分的计算方式以及任务的执行者。它不再基于营销人员的直觉——比如一位拥有
    30 年经验的专业人士，凭经验“非常、非常确定”35 至 55 岁的男性是理想客户。现代评分形式基于人工智能，整合了尽可能多的信息，例如年龄、性别、购买历史，或用户在网店中对产品和广告的点击情况。


    当人工智能接管评分工作时，这会对销售管理组织产生影响。IT 部门及其软件解决方案将负责创建潜在客户名单，列出接下来需要联系以销售特定产品的人员。销售管理层可以将精力从摆弄
    Excel 表格转移到更高价值的任务上，例如设计营销活动，以及了解应该向谁销售全新的产品和服务。


    对销售人员的影响则取决于具体的商业模式。是否存在深厚的个人关系？这种（耗时的）个人关系能否转化为足够的额外收入？销售代表是否将客户视为“自己的”客户，而这种信念是否得到现实的支持？例如，在（外呼）呼叫中心，人工智能生成的潜在客户名单并不会改变客服人员的工作方式。和以前一样，他们仍然会收到一份需要联系的（潜在）客户名单。唯一的区别是，他们应该能达成更多交易，因为人工智能生成的名单上的客户包含更多有购买意向的客户。因此，他们能创造更高的收入（或者在更短的时间内达到之前的目标）。拥有个人关系的销售人员会看到一些变化，因为人工智能用统计得出的洞察补充了他们对客户的个人理解。尤其是在后一种情况下，成功取决于
    IT、数据科学以及组织变革的结合。


    ## 产品战略洞察


    人工智能不仅能在战术或运营层面为销售组织带来立竿见影的成效。它还能提供战略洞察，例如为产品和服务经理提供支持。我们通过审视人工智能对产品管理和销售的好处及其背后的方法论，来举例说明生成战略洞察的这后一个方面。


    ### 识别业务挑战


    增加收入和利润是每个成功公司的基因。产品经理渴望找到新的方法来促进其产品组合的销售。上一节已经介绍了一个如何推动销售的具体例子。在这里，我们采取一个更广泛、更全面的视角：安索夫矩阵（图
    1-5，左图）。安索夫矩阵涵盖了最知名的增长战略，以增加销售额。市场渗透是最直接的执行策略：向现有客户群销售更多现有产品——这正是上一节关于运营效率部分所介绍的方法（图
    1-5，中图）。


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig5_HTML.png](img/516372_1_En_1_Fig5_HTML.png)


    图 1-5


    安索夫矩阵及各种销售策略的说明。由于多元化战略失败风险高且从人工智能中获益不明显，故未作说明。


    产品开发是另一种增长战略：向现有客户群销售新产品。例如，多年前，银行推出信用卡并向其现有客户群销售。指望人工智能直接产生这样的产品创意并不现实。然而，它可以帮助匹配客户细分市场和产品，以识别利基市场。


    这种方法并非应用人工智能模型来预测谁会申请信用卡。该策略需要分析人工智能模型本身。从模型中可能获得的洞察包括：


    -   青少年没有信用卡。

    -   低收入家庭的成年人很少拥有信用卡。

    -   退休人员通常没有信用卡。即使有，他们也很少使用。


    这些洞察有助于产品经理推出产品创新。在这个例子中，银行存在未被服务的客户细分市场，例如不能向其提供贷款的青少年，以及违约风险高的成年人。产品经理需要一款新产品，因为现有的产品不适合这些客户群体。我们都知道解决方案：预付信用卡。它看起来像信用卡，但你只能花费预先存入卡中的金额。对于担心信用卡支付风险的退休人员，网络欺诈保障是一个可选方案。因此，人工智能可以借助其模型来帮助塑造和开发新产品（图
    1-5，右图/B）。此类分析的另一个结果可能是发现类似产品的客户群存在重叠。在这种情况下，产品经理可能希望重组其产品组合，因为产品之间会相互蚕食，并且每个产品都有固定成本。


    人工智能模型同样有助于市场开发增长战略。假设产品经理分析人工智能模型，能够描绘出潜在购买者的特征（例如，30 岁以上，无子女，无猫，可能有狗）。有了这些信息，他可以联系拥有地址数据库的市场调研或直效营销公司。这些公司可能会提供符合这些标准的人员名单，使他们成为潜在的新客户（图
    1-5，右图/C）。


    图 1-6 从流程角度说明了如何利用人工智能模型获取洞察的机制。其思路是检查既定的产品或市场策略与观察到的客户行为是否匹配。如果不匹配，则意味着在重新调整产品和市场策略并再次检查时，存在增长机会。


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig6_HTML.png](img/516372_1_En_1_Fig6_HTML.png)


    图 1-6


    用于战略产品管理的人工智能

    '
- fmt: '### AI and Analytics vs. Excel


    When AI project managers or data scientists explain to another team the wonderful
    new world of AI that revolutionizes this other team’s work, they must never forget
    one truth: the rest of the organization worked well before the AI professionals
    got involved. Thus, AI professionals might have to explain over and over again
    why AI-generated lists outperform manual Excel-based approaches. I remember vividly
    a statement from a bank’s marketing specialist who told me: an apprentice generates
    a prospects list within two to three days with `Excel`. They do not need AI.


    When looking at product management, comparing sales strategy and sales reality
    is nothing new. However, especially analytical or statistical methods allow for
    an enhanced understanding compared to the traditional manual `Excel` approach.
    `Excel` works for 20 or 30 criteria. It is suitable for manually validating the
    impact of one or two of these criteria such as gender or age, or both. Such simple
    hypotheses for manual validation could be “Only customers under 25 order energy
    drinks” or “Families with children like to buy pink bed linen with unicorns and
    flamingos.”


    `AI` brings two improvements. First, there is **no need for a hypothesis** of
    what might be the most relevant attributes to be validated manually. Instead,
    the AI algorithms look at all provided attributes during the learning and model
    creation and identifies the genuinely relevant attributes. Second, AI algorithms
    work even for **thousands of attributes**, whereas a human working with an `Excel`
    sheet fails when confronted with that level of complexity.


    Especially complex relationships are hard to understand for humans. How long does
    it take with `Excel` to figure out three customer groups? One group consists of
    male customers under 25, one of the wealthy females in the suburbs, aged 30 to
    40, and the third and last group is of seniors over 60 in villages with dogs.
    Such advanced insights help product managers and marketing experts to identify
    and model their **personas**. Personas are groups of (potential) buyers or product
    users sharing similar demographics and, depending on the context, motivations.


    An example from the banking world: A bank wants to understand why customers in
    corporate banking end their relationship. They realize: The bank advisors sold
    a newly launched product quite well to their commercial clients. That is the knowledge
    generated using analytics. Drawing the conclusion, judging, and deciding is the
    task of the bankers. They have to figure out why customers left after buying a
    well-selling product. They learned that the bank advisors pushed the product onto
    their clients whether it was suitable or not. Customers felt tricked and terminated
    their banking relationship. This churn use case example illustrates how data-driven
    companies benefit because they get insights no one could have asked for. And those
    insights help companies move ahead of their competitors. Nobody saw the relationship
    between the well-sold product and customer running away – the AI model made it
    obvious.


    ### Understanding the AI Project Deliverables and Methodology


    How do data scientists and AI projects generate strategic insights for product
    managers, as discussed in the previous section? This challenge has many facets.
    The starting point is always real-world data serving as training to create an
    AI model. For the example of a sales scenario in Figure [1-7](#516372_1_En_1_Chapter.xhtml#Fig7),
    this is the table “Sales Data used for Model Training.” The more data, attributes,
    or parameters, the better. Crucial is the column that contains the expected output
    or prediction. In the example, this is the “Yes/No” column. Who might buy – this
    is the ultimate prediction the model should make.


    The data scientists apply learning algorithms to this training data, aiming for
    creating a predictive model. The model is the base for strategic and tactical
    insights. Tactical insights are customers that might have a high probability of
    buying the product. To this aim, data scientists apply the predictive model to
    customers who have not been contacted by sales reps yet. They get a score for
    each customer – this is table “Lead List” – of how likely they will buy the product
    if approached. The score helps to prioritize whom to call.


    The data scientist looks at the model for getting strategic insights. The AI model
    contains the information that middle-income customers have a strong affiliation
    with the product. Other indicators for potentially product-affine customers are
    being male, having a high income, or paying for a banking bundle.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig7_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig7_HTML.png)


    Figure 1-7


    AI for Sales and Sales Management – The Big Picture'
