  trans: '

    # 数据质量


    考试时抄袭邻座答案的作弊问题很简单：通常，准备最不充分的学生不会坐在最优秀、最聪明的学生旁边。他们的邻座可能也毫无头绪——复制错误答案并在此基础上继续推导，通常不会有好结果。


    数据科学家也面临类似的情况。他们创建 AI 模型时，有时过于天真，假设训练数据质量良好。最近一项研究发现，学术界和研究领域使用的公开训练集中，有 0.15%到
    10.1%的训练集元素存在问题。这些数字应该为数据科学家和 AI 项目经理敲响警钟，让他们在 CRISP-DM 的“数据理解”阶段认真对待这个问题。项目从一开始就关注数据质量会受益匪浅。


    文献中充满了好的想法和框架。实施这些想法并确保良好的数据治理实践往往是一个真正的挑战。幸运的是，这并非数据科学家的责任。他们不是应该参与大规模数据清洗工作的人。然而，他们可能不得不自己做一些有限的改进性数据准备。从
    AI 或数据科学的角度来看，数据科学家和 AI 项目可以将关注点限制在三个主要的数据质量方面（图 3-9）：


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig9_HTML.png](img/516372_1_En_3_Fig9_HTML.png)


    **图 3-9** 数据质量的三个维度


    - 技术正确性

    - 与现实匹配

    - 数据的声誉


    ## 技术正确性


    如果数据与定义的数据模型相匹配，那么从技术角度来看，它就是正确的。必填字段有值，数据集之间存在预期的关系和链接，数据类型与实际数据相匹配。来自数据库领域的
    IT 专家有时会忘记一个事实：并非所有用于 AI 模型智能的训练数据都来自具有严格模式约束（如`NOT NULL`或`UNIQUE`）的表格。日志数据、JSON
    文件或手动填写的 Excel 表格通常格式不那么严格。此外，某些文档因各种原因损坏，或者属性缺失，或者在创建行时未知的情况下用占位符（如`"xxxxxx"`）填充。当表单不符合他们的需求和现实时，人类会变得相当有创造力。


    仅仅跳过——而不是改进——技术上不准确的训练数据可能会产生意想不到的严重副作用。假设你正在为欧盟的客户行为创建一个模型。各种源系统共同为你的训练集提供了 50
    万个数据项。其中 3.5 万个缺少多个属性。数据科学家建议跳过它们。作为承受压力的 AI 项目经理，你应该说什么或做什么？


    从 50 万个数据点中跳过 3.5 万个并不是重大的数量损失。尽管如此，对模型质量的影响可能很严重。假设这 3.5 万个数据点并非均匀分布在数据集中，而是完整的德国市场数据。如果在没有这些德国数据的情况下训练模型，该模型可能在训练数据上表现良好。即使对于验证和测试数据，如果这些数据也来自跳过了不完整行的数据集，指标可能看起来完美。然而，一旦投入生产，该模型对德国客户的表现可能很差。因此，通过删除数据来解决技术数据质量问题需要三思，并且在从数据集中删除行之前至少要进行初步分析。否则，你可能会跳过重要信息。


    ## 数据与现实匹配？


    澳航应用程序向一名乘客显示的仅腿部空间升级费用约为 1 亿澳元。最终，他的信用卡被扣了 70 澳元。这是一个关于两个系统间数据差异的极端例子。在比较训练集与现实中的数据时，可能存在类似但通常不那么严重的差异。


    AI 项目经理和团队无法验证每一个数据项。尽管如此，他们可以通过检查单个数据项或寻找质量问题的线索来验证各个方面。例如，他们可以查看以下内容：


    - 提供的数据（如街道名称或销售数字）是否正确？

    - 数据是否完整且无冗余，例如，每位客户的购买恰好对应一条预订记录——而不是两条或零条？

    - 数据是否一致？例如，如果两个属性存储相同的信息（如税务地点），它们是否始终相同？

    - 训练数据的分布是否反映了现实——或者我们的训练数据中，昂贵汽车的照片是否远多于各种标准入门级汽车？

    - 现实世界中的变化需要多长时间才能导致数据的更新？它是在一小时后出现在训练集中，还是在下个月客户购买时才出现？


    衡量这些客观标准有助于理解何时可以依赖特定的数据源，并检测源是否存在差异以及（时间/延迟导致的）不一致性。


    ## 数据的声誉


    第三个维度与前两个不同。它将人的判断置于前台。数据的接收者（或你的 AI 模型的接收者）对训练数据源的数据质量有何看法？如果他们质疑你的数据源，从而质疑你创建的模型，他们可能短期内没有替代方案。然而，最终他们会找到其他选择——其他团队、用
    Excel“额外”做点什么，或者从外部供应商那里获取服务。我在第一个客户项目中就学到了这一课。我们在一家大型 IT 服务提供商内部有一个咨询任务。我试图绘制一个包含所有存储和处理数据的系统的图表。一个系统负责人自豪地告诉我，他的数据质量最高，并且始终是最新的。然而，其中一个接收数据的团队实施了另一种解决方案，在使用数据之前先进行清洗。


    这位系统负责人既没有撒谎，也没有疏忽。由于需求和用途不同，同一批数据可能从“毫无用处”到“非常优秀”不等。一个`"已售商品"`属性可以统计顾客放入购物车的商品数量——或者已发货且未退回的商品数量。如果你在财务控制部门，你可能更关注数字的准确性，而不是有效的送货地址。数据质量具有接收者特定的主观成分。这方面对
    AI 项目至关重要。如果你使用已知质量良好或已知经常出错的源作为训练数据，它可能会影响 AI 模型的接受度。

    '
- fmt: '# QA for AI-Driven Solutions


    AI models can support one-time strategic (management) decisions – or optimize
    and improve repetitive, operational processes. In the latter case, a good model
    alone is not enough. It must work as part of an AI-driven software solution. Thus,
    quality assurance must cover three areas:


    1. Testing the software solution without the AI component. Is the GUI working?
    Are calculations correct?

    2. Quality assurance of the AI model. Do predictions and classification models
    work?

    3. Verification of the integration of the AI model into the software solution.


    The first point relates to standard software testing. Are all features correctly
    implemented according to the specification? Do the shopping cart feature and the
    payment process work in the fashion shop app? Is the app not crashing? The IT
    literature covers testing broadly. Companies have standards and guidelines and
    established test organizations with experienced testers and test managers. Thus,
    the first point can be assumed to be solved nearly everywhere, whereas the previous
    pages covered the second point, QA for the AI model. This last section focuses
    on the third aspect: potential issues specific to integrating and coupling an
    AI model into a complete software solution. We have the fashion app, and we have
    an AI model recommending items to customers – do they work properly together?


    Quality assurance and testing measures for the integration depend on the chosen
    integration pattern. The previous chapter presented three main patterns. The first
    and most simple is **precalculation**. This pattern does not require any technical
    integration between the AI component and the software solution. Instead, data
    scientists or IT operations specialists feed up-to-date data into the AI model,
    for example, the shopping history of the fashion app customers. Then, the AI model
    predicts for each customer individually the fashion items she is most likely to
    buy. These results are written in a CSV or Excel file. A data scientist or IT
    operations specialist uploads the file, for example, to the CRM tool. The CRM
    tool sends out personalized push messages to the customers. The messages aim to
    make the customers curious to look (and buy) the suggested fashion items.


    The integration itself does not require any testing, just some validation of whether
    the generated files match the format expectation of the CRM tool. Since this is
    a manual process, checklists or a four-eyes principle reduce the operational risks,
    especially for repetitive processes.


    The second integration pattern is **model (re)implementation**. Data scientists
    provide the model, for example, in Python or R. Then, developers of the actual
    software solution take over. They add the code as it is or recode the same logic
    in Java or C#. The model becomes part of the software solution’s source code.
    This pattern requires dedicated test cases to address two concerns.


    The first concern relates to *mistakes in the reimplementation*. Recoding a code
    fragment in a different language poses the risk of mixing up parameters when invoking
    a function. Also, overlooking and forgetting to reimplement single lines of code
    is a risk, so is mixing variable names. Test cases with sample input/output data
    pairs address this risk. An example is to have a test case based on a specific
    dog image. Suppose the output classification value was `0.857` in the AI model
    training environment. In that case, a reimplemented AI model in the software solution
    must produce precisely the same result.


    Also, checksums on configuration, metadata, and weight parameters help when replicating
    neural networks. The sum of all parameter values – a semantically irrelevant number
    – must be the same. More advanced metrics detect swapped parameter values or switched
    rows.


    The second concern relates to the actual connection or *interface*, especially
    regarding the parameter usage. Is the first parameter the last bought product
    ID or the quantity – or is it the other way around? Does `1` mean that the image
    contains a dog – or does `0` represent the dog information? Simple mistakes result
    in a useless software solution and ruin, for example, customer experience and
    sales numbers of the fashion shop app. An AI project manager should double-check
    if the testers of the software solution also address these quality risks.


    The third integration option is an **AI runtime server** such as RStudio Server.
    The idea is to provide one server on which all AI models in the company run. When
    a software solution wants to integrate an AI model, it invokes the specific model
    on the AI runtime server. Potential testing needs are, again, whether the parameters
    are used correctly for service invocations. Then, the model management becomes
    more relevant. Is the correct model invoked or deployed, that is, dog detection,
    and not the model for cats? Is the most recent winter fashion items catalog the
    base for the model in use – or the beachwear fashion catalog from two years ago?
    When implementing this integration pattern, software developers and data scientists
    can work entirely independently and (nearly) without communicating with each other.
    Thus, checking whether the software solution invokes the correct model with the
    proper parameters becomes even more crucial in such settings.


    ## Summary


    AI offers many organizations new optimization opportunities. At the same time,
    there are new challenges for testing and quality assurance. Confusion matrixes
    or the `R²` value – metrics are the base for determining an AI model’s quality.
    They are at the core of any proof-of-readiness assessment. Measuring an AI model’s
    performance against training, validation, and test data provides a structure for
    the model training and enables AI project managers to track the project’s progress.


    In contrast to traditional software with a “never touch a running system” attitude,
    AI models require monitoring. Are they still adequate some weeks or months later,
    or do data scientists have to train a new and improved version? The key for any
    convincing AI model is, however, correct training data. AI projects have to take
    not only the data quantity but also its quality seriously.


    For sure, there are also additional non-functional-requirements-like necessities
    such as regulatory needs, ethics, or explainability. We cover these quality aspects
    in the next chapter.


    # Ethics, Regulations, and Explainability


    The laissez-faire years for big tech companies, innovative start-ups, and companies
    exploiting the benefits of IT innovations are coming to an end – also when it
    comes to AI. Policymakers discuss regulations already for years. But now, they
    take action. AI organizations and companies have to ask themselves – for ethical
    reasons – whether they should create the AI models they work on and whether their
    projects are even legal. They can no longer focus just on developing superior
    AI models, verifying their quality – and ignore everything else.


    While AI ethics sounds like an ivory tower topic, it is not. First, most companies
    fear negative press and public outrage. They avoid reputational risks, especially
    when some experts play around with technology without clear business needs or
    apparent benefits. Second, AI regulations are in flux. Today’s AI ethics discussions
    are the source of tomorrow’s AI regulatory necessities. These discussions allow
    AI organizations to forecast what regulators might demand next. It does not need
    a fortune-teller to foresee that AI regulation will be a dominant topic in the
    2020s.


    Consequently, this chapter discusses regulatory and ethical topics. A third topic
    – explainability – complements these two topics. It is a concept or an AI model
    property helping to meet specific AI ethics and regulatory demands.'
