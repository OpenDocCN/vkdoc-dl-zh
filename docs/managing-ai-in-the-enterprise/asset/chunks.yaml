    algorithmic-centric AI textbooks.


    We focus in the following on two examples: an old-fashioned statistics method
    (some might not even consider it to be AI) and deep learning neural networks.
    For the latter, we present basic neural network concepts and discuss advanced
    topologies. These algorithms require some entry-level math, though understanding
