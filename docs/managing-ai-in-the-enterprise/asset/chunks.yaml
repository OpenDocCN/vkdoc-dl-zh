  raw: '## Explainable AI


    The need to build explainable AI model for complex prediction or classification
    tasks is a real challenge. Data scientists can build (deep) neural networks. Neural
    networks are black boxes solving difficult prediction and classification challenges
    – but they are black boxes. Trained models consist of hundreds or thousands of
    formulas and parameters. Their behavior is, for humans, impossible to comprehend
    – a not-so-desirable option. Alternatively, data scientists can rely on easy-to-understand
    models such as logistic and linear regressions or random forest. However, they
    do not perform well for complex AI tasks – another non-desirable option. The recent
    and ongoing work on the topic of Explainable AI (XAI) wants to overcome this catch-22
    challenge.


    ### Scenarios for XAI


    XAI wants to help with three **scenarios** :


    *   The model – and not the application of the model on new data – is the deliverable.


    *   Justifications and documentations of model behavior for ethical and regulatory
    needs.


    *   Debugging and optimization.


    All these scenarios require to understand how a trained AI model works.


    It is well-known in object detection that neural networks do not always detect
    the actual object in the picture but react to its context. Even competition-winning
    neural networks have or had such flaws. In one case, the neural network did not
    recognize horses on images as everybody assumed. Instead, watermarks triggered
    this classification since only horse images in the training set had them. Suppose
    data scientists know – for example, in object recognition – which regions of a
    concrete image decide which type of object the neural network detects. Then, they
    can **debug and optimize** neural networks more efficiently. They detect more
    flaws similar to the watermark issue before models get into production and hit
    the real world.


    The second XAI usage scenario reflects regulatory and ethical needs elaborated
    earlier in this chapter: checking for fairness and ensuring non-discriminating
    AI models. Customers and society do not accept the outcome of AI models as God’s
    word: always correct and not to be questioned. Companies and organizations have
    to **justify** decisions, even if made by AI. As discussed above, the US Equal
    Credit Opportunity Act demands that banks communicate reasons when rejecting a
    credit. Otherwise, the bank must not use the AI model.


    Third, the **model might be the core deliverable,** not its application on new
    data. A product manager wants to understand the buyers’ and non-buyers’ characteristics.
    The model has to tell him. It is not about applying the model to some customer
    data; it is about understanding what characterizes customers with high buying
    affinity based on the model.


    The fourth, often-mentioned reason for the need for XAI **user trust**. The rationale:
    If humans understand how AI components work, they more likely trust the AI system’s
    output. An XAI system for sentiment analysis could, for example, highlight the
    positive and the negative words and phrases to explain a text’s sentiment rating
    (Figure [4-5](#516372_1_En_4_Chapter.xhtml#Fig5)). While it is intuitively clear
    that such additional information should foster user trust, studies proved the
    opposite. In one study, user confidence dropped when the AI component provided
    insights about its reasoning process, especially and shockingly when the AI component
    was sure to be correct and was actually right.


    The conclusion is not to abandon the idea of boosting user trust with XAI. The
    conclusion is that projects have to validate this assumption empirically with
    real-life users. Humans often behave less rationally than we expect and wish.


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig5_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig5_HTML.png)


    Figure 4-5


    Explainable AI for Sentiment Analysis – Highlighting Positive and Negative Words
    and Phrases in Sample Texts


    XAI is not a challenge for simple models such as linear and logistic regression.
    Everyone can comprehend the following formula and understand the impact of the
    parameters when looking at the estimation formula for monthly apartment rents
    in a specific city:


    ![$$ AppRent=0.5\ast sqm+500\ast NoOfBedrooms+130\ast NoOfBathrooms+500 $$](images/516372_1_En_4_Chapter/516372_1_En_4_Chapter_TeX_Equa.png)


    In contrast, neural networks predict and infer using hundreds or thousands of
    equations and weights. They deliver better results. However, any approach to presenting
    and understanding them in their complete baroque grandeur and complexity must
    fail. Thus, explainable AI chooses one lens to highlight one aspect of the neural
    network’s behavior. Well-known are **two** of such **lenses**: global explainability
    and local explainability.'
  trans: "\n# 可解释人工智能\n\n为复杂的预测或分类任务构建可解释人工智能模型是一项真正的挑战。数据科学家可以构建（深度）神经网络。神经网络是解决困难预测和分类挑战的黑箱——但它们确实是黑箱。训练好的模型由成百上千个公式和参数组成。其行为对人类而言难以理解——这是一个不太理想的选择。或者，数据科学家可以依赖易于理解的模型，如逻辑回归、线性回归或随机森林。然而，这些模型在处理复杂的人工智能任务时表现不佳——这是另一个不理想的选择。近期及正在进行中的关于可解释人工智能（`XAI`）的研究工作，旨在克服这一两难困境。\n\
    \n## XAI 的应用场景\n\n`XAI` 旨在帮助解决三种场景：\n\n- 模型本身（而非模型在新数据上的应用）是交付物。\n- 出于伦理和监管需求，对模型行为进行解释和记录。\n\
    - 调试与优化。\n\n所有这些场景都需要理解训练好的人工智能模型是如何工作的。\n\n在目标检测领域，众所周知神经网络并不总是检测图片中的实际物体，而是对其上下文做出反应。即使是赢得比赛的神经网络也存在或曾经存在此类缺陷。在一个案例中，神经网络并未像大家假设的那样识别出图像中的马。相反，是水印触发了这种分类，因为训练集中只有马的图片带有水印。假设数据科学家知道——例如在物体识别中——具体图像的哪些区域决定了神经网络检测到哪种类型的物体。那么，他们就能更高效地调试和优化神经网络。他们能在模型投入生产并应用于现实世界之前，发现更多类似水印问题的缺陷。\n\
    \n第二个 `XAI` 使用场景反映了本章前面阐述的监管和伦理需求：检查公平性并确保人工智能模型无歧视。客户和社会不会将人工智能模型的结果视为神谕：永远正确且不容置疑。公司和组织必须为其决策提供理由，即使这些决策是由人工智能做出的。如上所述，美国《平等信贷机会法案》要求银行在拒绝信贷时说明原因。否则，银行不得使用该人工智能模型。\n\
    \n第三，模型本身可能是核心交付物，而非其在新数据上的应用。产品经理希望了解购买者与非购买者的特征。模型必须告诉他这些信息。重点不在于将模型应用于某些客户数据；而在于基于模型理解具有高购买倾向的客户的特征。\n\
    \n第四，常被提及的 `XAI` 需求原因是用户信任。其基本原理是：如果人类理解人工智能组件的工作原理，他们就更可能信任人工智能系统的输出。例如，一个用于情感分析的\
    \ `XAI` 系统可以高亮显示正面和负面的词语及短语，以解释文本的情感评级（图 4-5）。虽然直觉上这种额外信息应该能促进用户信任，但研究却证明了相反的结果。在一项研究中，当人工智能组件提供其推理过程的见解时，用户信心反而下降，尤其令人震惊的是，当人工智能组件确信自己正确且实际上也确实正确时，情况更是如此。\n\
    \n结论并非要放弃用 `XAI` 提升用户信任的想法。结论是，项目必须通过真实用户进行实证验证这一假设。人类的行为往往比我们预期和希望的更不理性。\n\n\
    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig5_HTML.png](img/516372_1_En_4_Fig5_HTML.png)\n\
    \n图 4-5  \n用于情感分析的可解释人工智能——在示例文本中高亮显示正面和负面的词语及短语\n\n`XAI` 对于线性回归和逻辑回归等简单模型来说并非挑战。每个人都能理解以下公式，并在查看特定城市月租公寓的估算公式时理解参数的影响：\n\
    \n```\nAppRent = 0.5 * sqm + 500 * NoOfBedrooms + 130 * NoOfBathrooms + 500\n\
    ```\n\n相比之下，神经网络使用成百上千个方程和权重进行预测和推断。它们能提供更好的结果。然而，任何试图以其完整的繁复宏大和复杂性来呈现和理解它们的方法都必然失败。因此，可解释人工智能选择一种视角来突出神经网络行为的某个方面。其中两种著名的视角是：全局可解释性和局部可解释性。\n"
- fmt: '### Local Explainability


    Local explainability aims to understand the parameters which influence a single
    prediction. Why is this house so pricey? Because of the number of bathrooms or
    the garden size, or the pool? Local explainability does not aim to understand
    what – in general – impacts home prices in the market. It seeks to understand
    what influences the price of one single specific home most. One approach for local
    explainability is creating and analyzing a simple(r) and explainable model. This
    model describes the neural network behavior close (!) to the point of interest
    well but ignores the rest.


    In more detail, the starting point is a neural network that approximates reality.
    Data scientists build the model, for example, using a data set with last year’s
    home prices (Figure [4-6](#516372_1_En_4_Chapter.xhtml#Fig6)). The neural network
    might predict house prices well but is not human-comprehensible. When looking
    at the neural network and its weights, we do not understand what impacts the model
    most or whether small size variations matter for homes with 80 or 200 sqm (A and
    B in Figure [4-6](#516372_1_En_4_Chapter.xhtml#Fig6)). Thus, to achieve local
    explainability, data scientists perform three steps for each prediction value
    they aim to understand:


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig6_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig6_HTML.png)


    Figure 4-6


    Local Explainability Based on Approximating Model Behavior with Linear Functions
    Around the Points of Interest


    1. **Probing**. Data scientists need training data for creating an XAI model.
    Thus, they probe the neural network model around the points of interest. In Figure
    [4-6](#516372_1_En_4_Chapter.xhtml#Fig6), they would look for the house prices
    the model predicts, for example, for 79 sqm, 80 sqm, 80.5 sqm, and 82 sqm (case
    A), and for 185 sqm, 203 sqm, and 210 sqm (case B), respectively.


    2. **Constructing an explainable model**. Data scientists use the data probes
    from step 1 to train a new model. This new model estimates the neural network
    behavior around A and B. The core idea is to use now a simple estimation function
    such as linear regression. The prediction quality is lower, but a linear function
    is easy to understand. Thus, in Figure [4-6](#516372_1_En_4_Chapter.xhtml#Fig6),
    data scientists create two separate linear functions for the two points of interest,
    A and B.


    3. **Understanding and explaining**. The linear approximation functions from step
    2 allow understanding the local situations around A and B. Changes in the home
    size impact the price heavily for situation A, but not much for B. For models
    with more input features than just the living space size – garden size, number
    of bathrooms and carports, or whether the house has a balcony or an outdoor pool
    – the explanation gets, obviously, richer.


    A remark for readers with a strong math background: It is essential not to calculate
    just the gradient but to probe around the points of interest. This approach reduces
    the impact of local disturbances and noise precisely at the point of interest
    that might not exist elsewhere in the nearby region (Figure [4-7](#516372_1_En_4_Chapter.xhtml#Fig7)).


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig7_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig7_HTML.png)


    Figure 4-7


    Approximating the Local Behavior Using a Gradient vs. Linear Regression Based
    on Probes in the Area


    To conclude: local explainability identifies – for concrete predictions – which
    parameters to change for changing the prediction outcome most. It helps house
    owners to figure out for their individual houses whether adding a swimming pool
    or a car park increases the home values more.


    ### Global Explainability


    In contrast to local explainability, global explainability does not look at single
    predictions. It aims for the impossible: explaining an inherently too-complex-to-understand
    neural network and its overall behavior to humans. One well-known algorithm is
    permutation importance. Permutation importance determines the impact of the various
    input features on a given model’s predictions.


    The algorithm iterates over all input columns. Each iteration permutes the values
    of one particular column in the table (Figure [4-8](#516372_1_En_4_Chapter.xhtml#Fig8),
    ➌). The more the accuracy drops, the more relevant is the permutated single feature.
    By comparing, for example, the accuracy after shuffling the `sex` and the `zip`
    columns, a data scientist understands that the `sex` has a higher impact on customers’
    shopping habits than the ZIP code (Figure [4-8](#516372_1_En_4_Chapter.xhtml#Fig8),
    ➍).


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig8_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig8_HTML.png)


    Figure 4-8


    Understanding Permutation Importance


    Explainable AI is a highly dynamic field with many new ideas coming up every year.
    However, due to regulatory pressure and societies expecting companies to behave
    ethically, commercial products today implement XAI functionality already as all
    the big cloud providers Google, Microsoft Azure, and Amazon’s AWS proof. It is
    fascinating to see niche research becoming mainstream and relevant for many companies
    so quickly.


    ## Summary


    Three questions drive ethical discourse about AI usage in an enterprise context:


    - Is the envisioned use case ethically acceptable? Should and do we want to do
    create and use this AI model?

    - Do we engineer the model following ethical standards? Or do we, for example,
    use data in a way we should not just to get results faster?

    - Is the AI model ethical? In particular, is the model bias-free and fair?


    While bias-free AI models tend to align with business goals, other ethical aspects
    require balancing the ethical wishful with the commercial necessary – and having
    clear procedures in place about the responsibilities reduces the risk of bitter
    fights between teams and individuals.


    The ethical discourse on AI, however, left the spheres of academia. Policymakers
    are actively working on regulating AI. AI regulation is not just about ethics.
    Economic aspects and fostering innovation and global competitiveness are relevant.
    However, ethical factors heavily influence AI regulation.


    Data privacy laws are in place for years, though the EU’s GDPR revolutionized
    the regulation of how we store, manage, process, and use data. Brussels has an
    AI Act in its pipeline, which will most likely impact how we develop and apply
    AI models in the future. In the US, the FTC reinterprets existing laws for the
    new world of AI.


    The FTC requires, for example, that banks name the four key factors that result
    in declining a credit. A simple task in the traditional world with rule-based
    decision-making becomes a challenge if using neural networks with thousands of
    nodes and weights. It is no surprise that “Explainable AI” is such a hot topic
    with academia and the big cloud providers. Global explainability, for example,
    identifies the most important input factors for the overall model behavior. On
    the other side, local explainability looks at the factors influencing an individual
    prediction most. It is an eye-opener to observe how FTC’s requirements, academic
    research, and big tech AI service innovations aim for the same: understanding
    AI model-based decision-making better.'
