  trans: '

    ### 基于统计的模型


    数学家和统计学家在过去几十年甚至几个世纪里开发了各种算法。其中许多算法非常适合处理基于表格的、类似 Excel 的输入数据，这类数据通常存在于 ERP 或核心银行系统中。我们聚焦于一种算法，并从宏观层面进行审视：线性回归。假设一个二手车在线市场想要加入“公平价格”功能。该功能旨在通过向合同双方建议一个“公平价格”，来促进汽车经销商与客户之间的信任，从而使交易更加顺畅。因此，该市场需要算法来估算，例如，一辆保时捷
    911 3.8 Turbo Cabrio 的市场价格。


    在第一步，模型可能只考虑一个输入参数来进行价格估算：车龄。由于我们使用线性回归，确定汽车价格的数学函数是一个线性函数：


    ![$$ Price\left( Age\; of\kern0.17em the\; Car\right)={a}_1\ast age+{a}_0 $$](img/516372_1_En_2_Chapter_TeX_Equa.png)


    一旦我们知道了两笔汽车销售的价格——例如，一辆 12 个月车龄的汽车售价为 153,900 欧元，一辆 28 个月车龄的汽车售价为 124,150 欧元——我们将这两个数据点放入图表中，并画一条穿过它们的直线。这条直线就是我们汽车价格估算的线性函数（图
    2-8，左侧）。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig8_HTML.png](img/516372_1_En_2_Fig8_HTML.png)


    图 2-8


    使用线性回归进行价格预测


    然而，一个好的定价模型需要成百上千个数据点。图 2-8（右侧）说明了这一点。该示例包含许多数据点，这意味着模型精度应该不错。但是，如果数据点超过两个，要画一条穿过所有数据点的直线是（几乎）不可能的。那么，线性回归如何提供帮助呢？基本上，有两个需求：


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig9_HTML.png](img/516372_1_En_2_Fig9_HTML.png)


    图 2-9


    用两条估算函数（虚线和点划线）说明最小二乘法。算法为每个数据点计算预测值与实际数据之间的偏差（残差）。然后，算法对残差进行平方并求和。虚线的结果是 118，点划线的结果是
    168。因此，虚线是两者中较好的。然而，可能存在更好的函数，需要额外的实验来寻找。


    *   一个误差度量标准，用于衡量函数反映现实的程度。该度量标准使得两个或多个估算函数具有可比性。我们可以衡量哪个函数能更好地估算销售价格。一个广泛用于此目的的度量标准是“最小二乘法”（见图
    2-9）。

    *   一个算法，它系统地或随机地尝试参数的各种值，例如示例中的 `a[0]` 和 `a[1]`。该算法使用误差度量标准来计算特定参数设置的质量。它会重新调整参数并再次计算误差——直到算法决定终止优化，并返回
    `a[0]` 和 `a[1]` 的最佳值。


    我们已经提到了影响模型质量的两个因素：学习算法以及训练数据集的大小和质量。同样重要的是模型包含了哪些属性。在我们的示例中，汽车的公平价格估算函数只考虑了一个属性：车龄（`v[1]`）。即使使用数百万个销售数据点进行训练，该函数也是不充分的。原因在于：其他各种因素也显著影响汽车的价格，例如，行驶里程数（`v[2]`）、车辆是否发生过重大事故（`v[3]`）、是否有空调（`v[4]`）或高端音响系统（`v[5]`）。因此，我们得到一个需要优化的更复杂的价格估算函数：


    ![$$ Price\left({v}_5,{v}_4,{v}_3,{v}_2,{v}_1\right)={a}_5\ast {v}_5+{a}_4\ast
    {v}_4+{a}_3\ast {v}_3+{a}_2\ast {v}_2+{a}_1\ast {v}_1+{a}_0 $$](img/516372_1_En_2_Chapter_TeX_Equb.png)


    这种线性回归函数的基本假设是问题的本质是线性的。然而，二手车价格估算函数**不是线性的**。当汽车经销商首次将汽车卖给客户时，汽车价值会大幅下降。之后价格下降速度会放缓，并且通常销售价格不会变为负数。根据问题的性质，用不同的（更复杂的）数学函数替换线性估算函数会得到更好的估算结果。


    另一个类似于线性回归的算法是**逻辑回归**。逻辑回归有助于分类任务，例如判断特定的信用卡支付是否为欺诈。通常，最后会应用诸如 Sigmoid 函数之类的函数来提供介于
    0 和 1 之间的分类值（见图 2-10，左侧）。如果该值大于或等于 0.5，则可能是“是”，否则为“否”。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig10_HTML.png](img/516372_1_En_2_Fig10_HTML.png)


    图 2-10


    Sigmoid 函数（左侧）和整流器——或 ReLU，修正线性单元——函数（右侧）

    '
- fmt: '### Neural Networks


    Neural networks serve a similar purpose as the statistical regression algorithms.
    They allow for more complex and accurate prediction or classification logic. Thus,
    they are especially beneficial for tasks such as image recognition and natural
    language processing.


    Neural networks date back to the 1950s when Rosenblatt developed the Perceptron
    for detecting patterns in (small) images. Key algorithms are from the 1980s and
    1990s. Their big breakthrough was in the 2010s resulting in their widespread use
    in industry today. Enabling factors have been the explosion of computational power
    and available data such as text, images, audio, or video. The cloud is the most
    recent catalysator for the adoption of neural networks. Cloud providers offer
    highly scalable computing resources and ready-to-use AI services.


    The human brain, with its neurons and synapses, is the inspiration for artificial
    neural networks. Neurons are the processing units. Synapses connect neurons to
    exchange information, which drives the information processing of the neural network.
    A neuron fires and is activated, depending (also) on the activation status of
    the incoming neurons.


    An artificial neural network implements the **reasoning** of a single neuron in
    two steps. First, the neuron calculates the weighted sum of all incoming activations
    from the feedings neurons. In Figure [2-11](#516372_1_En_2_Chapter.xhtml#Fig11),
    the neurons A, B, C, and D propagate their activations `a[A]`, `a[B]`, `a[C]`,
    and `a[D]` to neuron N. Neuron N calculates the weighted sum of these activations
    using the weights `w[AN]`, `w[BN]`, `w[CN]`, and `w[DN]`. So, the calculation
    is: `a[A]*w[AN] + a[B]*w[BN] + a[C]*w[CN] + a[D]*w[DN]`.


    When the weights are positive, a connection supports that neuron N fires. If the
    weight is negative, this suppresses the firing of neuron N. Besides the already
    mentioned weights, a value named "bias" is typically added to the calculation,
    resulting in the following term: `a[A]*w[AN] + a[B]*w[BN] + a[C]*w[CN] + a[D]*w[DN]
    + b[N]`.


    The bias shifts the graph on the x-axes. The purpose of this becomes clear when
    looking at the second processing step of the neuron: the neuron applies an activation
    function on the weighted sum, resulting in the activation of this neuron. A widely
    used activation function is the Rectifier (ReLU) function (see Figure [2-10](#516372_1_En_2_Chapter.xhtml#Fig10),
    right). It returns the weighted sum of the activation sum if positive; otherwise,
    0. This activation is then fed to other neurons, such as neurons X, Y, and Z in
    Figure [2-11](#516372_1_En_2_Chapter.xhtml#Fig11).


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig11_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig11_HTML.png)


    Figure 2-11


    Model of a Neuron


    Neural networks consist of large numbers of neurons grouped into layers (Figure
    [2-12](#516372_1_En_2_Chapter.xhtml#Fig12)). The first layer is the input layer.
    Its neurons represent the outside world, such as pressure sensors'' values in
    a turbine or pixels of a camera. The last layer is the **output layer**, which
    delivers the artificial neural network''s reasoning. It consists of one or more
    neurons, depending on the neural network''s purpose. For binary classification
    problems – does an image contain either a dog or a cat – one neuron is sufficient.
    A value close to 1 indicates a dog, a value close to 0 a cat. Suppose a neural
    network classifies animal pictures, for example, whether the image is a dog, a
    cat, a dolphin, or a manta ray. In that case, the output layer consists of various
    neurons for all the different animals.


    The neural network can have zero, one, or multiple **hidden layers** between the
    input and the output layers. In the most straightforward neural network topology,
    all neurons of one layer feed their activation to all neurons of the following
    layer – a fully connected neural network.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig12_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig12_HTML.png)


    Figure 2-12


    Neural Network Topology with Two Hidden Layers


    When **training a neural network**, the first step is to choose a data item from
    the training set as input. We calculate the neural network''s prediction or classification
    for this item and compare the result of the neural network with the correct output.
    We know the correct result since the data item is from our training set. The difference
    between the correct and the actual result is the input for step 2, which readjusts
    the weights. For this readjustment or learning step, data scientists commonly
    use the backpropagation – a gradient-descent – algorithm. The backpropagation
    algorithm starts with optimizing the output layer''s weights and then works its
    way back layer by layer.


    The weights are parameters of the neural network architecture representing the
    brain or intelligence of the artificial neural network. The parameters that control
    the learning process are called hyper-parameters. The neural network architecture,
    such as the number of layers and neurons, is a hyper-parameter, and so is the
    learning rate. The learning rate influences how much weights are adjusted if the
    actual and the correct output differ for a training data item. A high learning
    rate enables the neural network to learn quickly in the beginning. Over time,
    the learning rate must drop to ensure that the neural network converges to stable
    weights.'
  raw: '### Neural Networks


    Neural networks serve a similar purpose as the statistical regression algorithms.
    They allow for more complex and accurate prediction or classification logic. Thus,
    they are especially beneficial for tasks such as image recognition and natural
    language processing.


    Neural networks date back to the 1950s when Rosenblatt developed the Perceptron
    for detecting patterns in (small) images. Key algorithms are from the 1980s and
    1990s. Their big breakthrough was in the 2010s resulting in their widespread use
    in industry today. Enabling factors have been the explosion of computational power
    and available data such as text, images, audio, or video. The cloud is the most
    recent catalysator for the adoption of neural networks. Cloud providers offer
    highly scalable computing resources and ready-to-use AI services.


    The human brain, with its neurons and synapses, is the inspiration for artificial
    neural networks. Neurons are the processing units. Synapses connect neurons to
    exchange information, which drives the information processing of the neural network.
    A neuron fires and is activated, depending (also) on the activation status of
    the incoming neurons.


    An artificial neural network implements the **reasoning** of a single neuron in
    two steps. First, the neuron calculates the weighted sum of all incoming activations
    from the feedings neurons. In Figure [2-11](#516372_1_En_2_Chapter.xhtml#Fig11),
    the neurons A, B, C, and D propagate their activations *a*[*A*], *a*[*B*], *a*[*C*],
    and *a*[*D*] to neuron N. Neuron N calculates the weighted sum of these activations
    using the weights *w*[*AN*], *w*[*BN*], *w*[*CN*], and *w*[*DN*]. So, the calculation
    is: *a*[*A*]**w*[*AN*] + *a*[*B*]**w*[*BN*] + *a*[*C*]**w*[*CN*] + *a*[*D*]**w*[*DN*].


    When the weights are positive, a connection supports that neuron N fires. If the
    weight is negative, this suppresses the firing of neuron N. Besides the already
    mentioned weights, a value named “bias” is typically added to the calculation,
    resulting in the following term: *a*[*A*]**w*[*AN*] + *a*[*B*]**w*[*BN*] + *a*[*C*]**w*[*CN*]
    + *a*[*D*]**w*[*DN*] + *b*[*N*].


    The bias shifts the graph on the x-axes. The purpose of this becomes clear when
    looking at the second processing step of the neuron: the neuron applies an activation
    function on the weighted sum, resulting in the activation of this neuron. A widely
    used activation function is the Rectifier (ReLU) function (see Figure [2-10](#516372_1_En_2_Chapter.xhtml#Fig10),
    right). It returns the weighted sum of the activation sum if positive; otherwise,
    0\. This activation is then fed to other neurons, such as neurons X, Y, and Z
    in Figure [2-11](#516372_1_En_2_Chapter.xhtml#Fig11).


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig11_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig11_HTML.png)


    Figure 2-11


    Model of a Neuron


    Neural networks consist of large numbers of neurons grouped into layers (Figure
    [2-12](#516372_1_En_2_Chapter.xhtml#Fig12)). The first layer is the input layer.
    Its neurons represent the outside world, such as pressure sensors’ values in a
    turbine or pixels of a camera. The last layer is the **output layer**, which delivers
    the artificial neural network’s reasoning. It consists of one or more neurons,
    depending on the neural network’s purpose. For binary classification problems
    – does an image contain either a dog or a cat – one neuron is sufficient. A value
    close to 1 indicates a dog, a value close to 0 a cat. Suppose a neural network
    classifies animal pictures, for example, whether the image is a dog, a cat, a
    dolphin, or a manta ray. In that case, the output layer consists of various neurons
    for all the different animals.


    The neural network can have zero, one, or multiple **hidden layers** between the
    input and the output layers. In the most straightforward neural network topology,
    all neurons of one layer feed their activation to all neurons of the following
    layer – a fully connected neural network.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig12_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig12_HTML.png)


    Figure 2-12


    Neural Network Topology with Two Hidden Layers


    When **training a neural network**, the first step is to choose a data item from
    the training set as input. We calculate the neural network’s prediction or classification
    for this item and compare the result of the neural network with the correct output.
    We know the correct result since the data item is from our training set. The difference
    between the correct and the actual result is the input for step 2, which readjusts
    the weights. For this readjustment or learning step, data scientists commonly
    use the backpropagation – a gradient-descent – algorithm. The backpropagation
    algorithm starts with optimizing the output layer’s weights and then works its
    way back layer by layer.


    The weights are parameters of the neural network architecture representing the
    brain or intelligence of the artificial neural network. The parameters that control
    the learning process are called hyper-parameters. The neural network architecture,
    such as the number of layers and neurons, is a hyper-parameter, and so is the
    learning rate. The learning rate influences how much weights are adjusted if the
    actual and the correct output differ for a training data item. A high learning
    rate enables the neural network to learn quickly in the beginning. Over time,
    the learning rate must drop to ensure that the neural network converges to stable
    weights.'
  trans: '

    ### 神经网络


    神经网络与统计回归算法的用途相似。它们能够实现更复杂、更精确的预测或分类逻辑，因此在图像识别和自然语言处理等任务中尤为有用。


    神经网络的历史可追溯至 20 世纪 50 年代，当时罗森布拉特开发了感知机，用于检测（小型）图像中的模式。关键算法则诞生于 20 世纪 80 年代和 90
    年代。其重大突破发生在 2010 年代，并由此在当今工业界得到广泛应用。推动其发展的因素包括计算能力的爆发式增长，以及文本、图像、音频或视频等可用数据的激增。云服务是神经网络普及的最新催化剂。云服务提供商提供高度可扩展的计算资源和即用型
    AI 服务。


    人脑及其神经元和突触是人工神经网络的灵感来源。神经元是处理单元，突触则连接神经元以交换信息，从而驱动神经网络的信息处理。一个神经元是否被激活并“触发”，（也）取决于其输入神经元的激活状态。


    人工神经网络通过两个步骤实现单个神经元的**推理**。首先，神经元计算来自所有前馈神经元的激活值的加权和。在图 2-11 中，神经元 A、B、C 和 D 将其激活值`a[A]`、`a[B]`、`a[C]`和`a[D]`传播给神经元
    N。神经元 N 使用权重`w[AN]`、`w[BN]`、`w[CN]`和`w[DN]`计算这些激活值的加权和。因此，计算公式为：`a[A]*w[AN] +
    a[B]*w[BN] + a[C]*w[CN] + a[D]*w[DN]`。


    当权重为正时，连接会促进神经元 N 触发；若权重为负，则会抑制神经元 N 的触发。除了已提及的权重外，通常还会在计算中加入一个称为“偏置”的值，得到如下表达式：`a[A]*w[AN]
    + a[B]*w[BN] + a[C]*w[CN] + a[D]*w[DN] + b[N]`。


    偏置的作用是在 x 轴上平移函数图像。其目的在考察神经元的第二个处理步骤时会变得清晰：神经元对加权和施加一个激活函数，从而得到该神经元的激活值。一种广泛使用的激活函数是整流线性单元（ReLU）函数（见图
    2-10，右侧）。如果加权和为正，它返回该值；否则返回 0。这个激活值随后被馈送给其他神经元，例如图 2-11 中的神经元 X、Y 和 Z。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig11_HTML.png](img/516372_1_En_2_Fig11_HTML.png)


    图 2-11


    神经元模型


    神经网络由大量神经元组成，这些神经元被分组为层（图 2-12）。第一层是输入层，其神经元代表外部世界，例如涡轮机中压力传感器的数值或摄像头的像素。最后一层是**输出层**，它提供人工神经网络的推理结果。根据神经网络的目的，输出层由一个或多个神经元组成。对于二元分类问题——例如图像中是否包含狗或猫——一个神经元就足够了。接近
    1 的值表示狗，接近 0 的值表示猫。假设一个神经网络要对动物图片进行分类，例如判断图像是狗、猫、海豚还是蝠鲼，那么输出层将由对应不同动物的多个神经元组成。


    在输入层和输出层之间，神经网络可以有零个、一个或多个**隐藏层**。在最简单的神经网络拓扑结构中，一层的所有神经元将其激活值馈送给下一层的所有神经元——这就是全连接神经网络。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig12_HTML.png](img/516372_1_En_2_Fig12_HTML.png)


    图 2-12


    具有两个隐藏层的神经网络拓扑结构


    在**训练神经网络**时，第一步是从训练集中选择一个数据项作为输入。我们计算神经网络对该数据项的预测或分类结果，并将神经网络的结果与正确输出进行比较。由于该数据项来自我们的训练集，我们知道正确结果。正确结果与实际结果之间的差异是第二步的输入，用于重新调整权重。对于这种重新调整或学习步骤，数据科学家通常使用反向传播算法——一种梯度下降算法。反向传播算法首先优化输出层的权重，然后逐层向后优化。


    权重是神经网络架构的参数，代表了人工神经网络的“大脑”或智能。控制学习过程的参数称为超参数。神经网络架构（如层数和神经元数量）是一个超参数，学习率也是如此。学习率影响当训练数据项的实际输出与正确输出存在差异时，权重调整的幅度。较高的学习率使神经网络在初期能够快速学习。随着时间的推移，学习率必须降低，以确保神经网络收敛到稳定的权重。

    '
- fmt: "### Advanced Neural Network Topologies\n\nResearch on neural networks made\
    \ significant progress over the last years. Data scientists improved and adjusted\
    \ the neural network architecture for dedicated application areas, such as computer\
    \ vision and image recognition. They relax the topological rule that a neuron\
    \ propagates its activation value to exactly all neurons of the next layer and\
    \ nowhere else. The relaxation is the base for three significant neural network\
    \ topology variants: convolutional neural networks, recurrent neural networks,\
    \ and residual neural networks. A `residual neural network` does not only propagate\
    \ its neurons’ activations to the next layer. It can also feed the activations\
    \ to layers further down. In Figure [2-13](#516372_1_En_2_Chapter.xhtml#Fig13),\
    \ for example, layer 3 forwards its activation not only to layer 4 but also to\
    \ layer 6.\n\n![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig13_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig13_HTML.png)\n\
    \nFigure 2-13  \nResidual Neural Networks\n\n`Convolutional layers` are another\
    \ topological variant. They differ from fully connected neural network layers\
    \ in two ways (2-14). First, neurons of a convolutional layer do not consider\
    \ the activation of all neurons of the previous layer. They consider only specific\
    \ collocated neurons, such as neighboring pixels of an image. For example, only\
    \ a 3x3 matrix of neurons in a layer feed their activations as an input of a specific\
    \ neuron in the next layer. Second, the neurons of a convolutional layer calculate\
    \ their activation differently. They use a filter (named convolutional kernel)\
    \ with weights. The filter is a kind of window moving over the matrix, which has\
    \ the activation values of the previous layer.\n\nIn Figure [2-14](#516372_1_En_2_Chapter.xhtml#Fig14)\
    \ (right), the left upper cell of the kernel has the value “1”. When calculating\
    \ the value of the black cell, the left upper value of the activation matrix with\
    \ the value “0.9” is weighted with the value “1”. Then, “0.7” is multiplied with\
    \ “0” and “-1” with “0.1”. This calculation continues for all other cells of the\
    \ filter matrix. For calculating the value of the grey cell, we start with “0.7”,\
    \ which is multiplied with “1”.\n\nData scientists build on neural network topologies\
    \ with convolutional layers for dedicated AI application areas such as computer\
    \ vision with their complex problems. They consist of twenty or thirty layers,\
    \ a mix of fully connected layers, residual layers, and many convolutional layers.\n\
    \n![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig14_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig14_HTML.png)\n\
    \nFigure 2-14  \nAdvanced Architectural Patterns for Neural Networks: A Convolutional\
    \ Layer/Convolutional Neural Network. The Left Side Illustrates the Topology Aspect,\
    \ That Is, the Wiring of Neurons in Two Layers, the Right a Sample Filter Matrix\n\
    \nIn time series prediction or natural language and speech processing, `recurrent\
    \ neural networks` are a popular neural network topology choice. The topology\
    \ reflects that the ordering of the input is essential. When understanding a text,\
    \ “Heidi kills Peter” and “Peter kills Heidi” have a different meaning. Recurrent\
    \ neural networks connect nodes within one layer to reflect the ordering aspect\
    \ (Figure [2-15](#516372_1_En_2_Chapter.xhtml#Fig15)). Sophisticated recurrent\
    \ neural network topologies base on the well-known neural network architectural\
    \ patterns such as Long Short-Term Memory Units (LSTM) or Gated Recurrent Unit\
    \ (GRU). They introduce the concept of a “memory” for previous state information.\
    \ The relevance of memories is easily understood when thinking about crime stories.\
    \ The book might start with the sentence “Heidi killed Peter.” This sentence contains\
    \ information still relevant two or twenty sentences later when the police arrest\
    \ Heidi.\n\n![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig15_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig15_HTML.png)\n\
    \nFigure 2-15  \nRecurrent Neural Network. The Characteristic Is the Connection\
    \ Between the Neurons in One Layer Represented by the Bold Green Arrows\n\nAI\
    \ project managers benefit from a basic understanding of advanced neural network\
    \ topologies, even though they do not design or optimize the topology. They should\
    \ be aware that various best practice topologies exist. Plus, they should be sparring\
    \ partners for data scientists suggesting designing and optimizing a company-specific\
    \ and use-case-specific neural network topology (and investing months of work)\
