  trans: '

    ### 保密性威胁


    与人工智能相关的系统需要并处理大量数据以生成新的见解。这些系统对试图窃取知识产权（特别是`训练数据`或`AI 模型`）的威胁行为者具有高度吸引力。从时间和金钱角度来看，它们对竞争对手而言无异于一座金矿。例如，自动驾驶汽车公司
    Waymo 以超过 2000 万英里的实际驾驶里程和超过 150 亿英里的模拟驾驶里程为傲。当竞争对手获得这些训练数据或基于这些数据构建的 AI 模型时，他们就能节省数百万的投资和数年的工作。同样，保险行业中被盗的承保模型使竞争对手能够吸引有利可图的客户，同时避开有问题的客户。


    只需查看图 7-5，就能清楚训练数据位于何处。攻击者可以从原始数据源和数据库中窃取它。然而，在大多数情况下，最广泛的数据集合是 AI 组织的训练数据集合/数据湖，它包含了所有可用的数据。相比之下，实际的训练区域（例如单个
    Jupyter notebook）提供的数据则更为有限。攻击数据摄取和分发组件是收集数据的另一种方式。


    除了窃取数据，另一种选择是窃取最终的 AI 模型以供使用——或者了解公司如何运作（例如在市场上的行为），从而压低其盈利报价。AI 运行时服务器或其他生产系统、AI
    模型仓库以及训练区域存储或可以访问一个或多个此类模型。AI 模型仓库是存储所有 AI 模型的组件，甚至包括解释和文档。如果使用了 AI 运行时服务器，它们会包含大量的
    AI 模型集合。其他系统或组件，例如训练区域或应用程序源代码（如果 AI 模型被重新实现并成为代码的一部分），则只提供一个或少数几个 AI 模型。然而，对于任何保险公司来说，即使只为一个大客户群或重要客户群丢失一个模型，也可能已经是灾难性的。


    知识产权损失可能并非对所有公司都是问题。然而，第二个保密性威胁与许多公司相关：窃取数据以勒索赎金。医院存储着哪些客户是 HIV 阳性。保险公司如果处理疾病津贴，则会存储其客户公司员工的薪资相关数据。没有哪家医院或保险公司希望看到此类信息出现在网络上。他们的客户和患者也同样不希望。如果网络犯罪分子获取了此类敏感数据，这便成了敲诈所有人的完美场景。


    在过去，窃取文件和数据需要复杂的攻击手段——至少对于非面向互联网的服务器上的数据而言是如此。尽管如此，如果 AI 组织忽视此类风险，那将是愚蠢的行为，尽管如今存在更严重且更容易实施的攻击。


    随着公有云的出现，公司开始在云端训练 AI 模型。训练数据和训练好的模型都位于云端。如果公司或 AI 组织正确设置了云安全，资产就是安全的。然而，错误配置发生得更快，（防护薄弱的）面向互联网的公有云环境对攻击者来说是一种诱惑。过去几年，许多公司都不得不通过惨痛教训认识到这一点。


    最轻松且可能最难检测的保密性攻击涉及员工。在许多组织中，他们可以轻松且无风险地将任何文件（包括模型或训练数据）转移出公司。


    然而，即使无法访问模型，仅通过探测也能窃取模型。假设一个攻击者想要模仿一个“VIP 识别”服务，该服务用于识别图片中的明星和新星。第一步是爬取网络以收集样本图片（图
    7-6，左侧）。此时，尚不清楚图片中是否包含 VIP。因此，无法用这些数据训练 AI 模型。所以，第二步是将这些图片提交给“VIP 识别”网络服务。该服务会返回哪些图片包含哪些
    VIP（中间）。现在，攻击者可以利用通过探测获得的信息构建一个训练集，来训练他自己的神经网络以模仿原始模型，并将其投入生产使用（右侧）。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig6_HTML.png](img/516372_1_En_7_Fig6_HTML.png)


    图 7-6


    探测模型以重建它——从网络抓取样本图片（左侧），让待模仿的服务标注图片（中间），基于新标注的图片训练神经网络（右侧）


    最后，关于非经济动机威胁行为者的补充说明：活动家可能对 AI 模型感兴趣。他们的动机是验证模型是否系统性地歧视社会中的某些子群体，例如，通过向他们收取与主流客户不同的价格。

    '
- fmt: '### Integrity Threats


    AI-related integrity threats relate, first of all, to the **model quality**. When
    threat actors modify a model or interfere with its training, the model classifies
    images incorrectly or makes unprecise predictions. Consequently, a factory might
    produce unusable parts, an aircraft carrier assumes that a harmless passenger
    jet flies to it and not an enemy bomber, or an insurance company assumes that
    20-year-old potential clients have a 90% probability of dying next year. Thus,
    the insurance stops selling them life insurance policies. Extreme cases of faulty
    models sound frightening, though organizations quickly notice them. More dangerous
    are subtle manipulations. They are much harder to identify. How can the business
    detect a manipulated risk and pricing model that gives customers in southern Germany
    a 7% too low price while rejecting 10% of lucrative long-term customers in Austria?
    Such manipulations are often not apparent, but highly effective. They drive away
    loyal Austrian customers while generating direct financial losses in Germany due
    to unnecessary and unjustified discounts.


    An external threat actor **manipulating** a specific AI model in the AI model
    repository or production systems sounds unlikely, at least for companies not in
    the focus of intelligence services. But even companies not in the spotlight of
    global cybercrime have to be aware of the threats of less-than-perfect AI models
    coming from the inside. Data scientists feeling mistreated (or being approached
    by competitors) can manipulate models much more effortlessly. Plus, even highly
    professional data scientists with goodwill make **mistakes**, resulting in mediocre
    or completely wrong models. Consequently, the internal quality assurance procedures
    for AI are crucial. AI-related quality assurance is often more in a highly agile
    startup mode and less rigid and sophisticated than for traditional software engineering.


    The last remark already shifted the focus from manipulating the model to the overall
    creation and training process. **Lousy training data** implies bad models, no
    matter what quality metrics indicate. What would James Bond do if he does not
    want to be recognized by surveillance cameras? He would ingest a few hundred pictures
    of himself in a training set, tag himself as a bird, and retrain the AI model.
    From now on, surveillance cameras ignore him because he is a bird and not a burglar.


    **Training data mistakes or manipulations** are severe and challenging to detect.
    They can happen at various places: in the original operational databases, in the
    data ingestion scripts, in the training data collection or data lake, and in the
    training area during the model training. If data scientists use external training
    and validation data sets, these are also potential ways for attackers. Who looks
    through millions of pictures to look for wrongly tagged James Bond images? Who
    understands why a command during test data preparation performs a left outer join
    and not a right outer join? Why are some values multiplied by 1.2 instead of 1.20001?
    And why does an upstream system discontinue sending negative values? Is it a mistake,
    sabotage, or improved data cleansing? Creating training data is highly complex,
    even without external threat actors.


    All the threats and attacks discussed yet require access to training environments,
    production systems, AI models, or training data within an organization. Other
    threats do not require any of these. They succeed without touching any asset of
    the targeted organization.


    Data scientists want to move fast and incorporate the newest algorithms of this
    quickly evolving field. They **download** pre-trained models, AI and statistics
    libraries, and publicly available datasets from the Internet. These downloads
    are the basis for building better company-specific models. At the same time, the
    downloads are a backdoor for attackers that can provide manipulated data or models,
    especially for niche models and training data.


    Another attack type not requiring touching any assets are **adversarial attacks**.
    The idea is to manipulate input data so that a human eye does not detect the manipulation,
    but that the AI model produces the wrong result. For example, small changes in
    a picture or some new points on the street as illustrated in Figure [7-7](#516372_1_En_7_Chapter.xhtml#Fig7)
    can result in the AI model not detecting a traffic light or getting a wrong understanding
    of whether to continue on the street to the right or whether to go full throttle
    straight and fall down the slope. Such attacks work only for AI models that are
    complex neural networks, not for simple linear functions.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig7_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig7_HTML.png)


    Figure 7-7


    Understanding Adversarial Attacks – Attackers Change the Input Data Such as Pictures
    in a (Nearly) Invisible Way to Make the Neural Network Make Wrong Decisions. How
    Many Differences Do You See Between the Images?


    ### Availability Threats


    The last threat scenario covers a potential non-availability. First of all, there
    is a risk of an **AI logic in production** or a **training area** outage. In the
    latter case, data scientists cannot work. If production systems are down, this
    impacts business processes. Non-availability is the consequence of attacks against
    **servers**. Typical attacks are crashing the applications with malformed input
    or flooding the server with (distributed) denial of service attacks.


    An aspect with particular relevance for AI is the threat of **losing intermediate
    results or models**. In data science, processes tend to be more informal than
    in traditional software development regarding documentation and version management
    of artifacts. Such laxness can cause availability risks. For example, when a key
    engineer is sick, on holiday, or has left the company, his colleagues might not
    be able to retrain a model. Instead, they have to develop a completely new one,
    which takes a while and incurs costs.'
