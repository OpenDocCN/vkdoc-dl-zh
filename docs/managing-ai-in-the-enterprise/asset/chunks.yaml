    # Introduction


    Artificial intelligence (AI) is what the old west was in the 19th century and
    the moon in the 1960s: the new frontier. It inspires entrepreneurs, business strategists,
    and is the hope of CEOs, CFOs, or COOs. It lures ambitious engineers and experienced
    managers wanting to be part of this big revolution. They all share a passion –
    the passion for finding their unique role and contributing their experience to
    help AI initiatives succeed. This book paves the road for data scientists, CIOs
    and senior managers, agile leaders, and project or program managers to successfully
    run artificial intelligence initiatives. The focus is neither on the glamorous,
    glittery world of corporate business strategies nor on the world of math. It is
    on how to connect these two worlds. The book helps you manage an AI Delivery Organization
    and AI Operations (Machine Learning/ML Ops) with highly specialized data scientists
    such that your organization provides the AI capabilities the top management and
    business strategists need for transforming the organization. It helps to master
    the project and technology management and the organizational challenges of AI.


    The challenge is, against popular belief, not finding qualified data scientists.
    Universities do a great job educating them. The challenge is to form a team and
    an organization that delivers artificial intelligence solutions in a corporate
    setting, to integrate the solutions in the IT application landscape, and to run
    and maintain them. The field is young, so there is a shortage of managers and
    operations engineers in artificial intelligence with five or ten years of corporate
    experience. Today, ambitious IT professionals have an excellent chance to fill
    any of these roles. If you want to deepen your know-how about enterprise AI, that
    is, about all the hard work it takes to make AI work in an organization, this
    book is your key to the new frontier of artificial intelligence in the enterprise.


    It condenses experience from more than 15 years in the financial industries and
    with IT service providers, including roles as a project manager, solutions architect,
    consultant for core banking systems, process engineer, product manager for analytics,
    and information systems in general. It is the outcome of more than one year of
    structuring thoughts and writing them down, many evenings, early mornings, and
    weekends plus a few months of full-time research. The result, the book you read
    right now, provides concrete know-how for the following areas (Figure [1](#516372_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig1)):


    * Looking from a strategic perspective, how do organizations benefit from AI?
    What is the essence of a data-driven company – and how does AI help? (Chapter
    [1](#516372_1_En_1_Chapter.xhtml))

    * How do you successfully deliver AI projects, covering everything from scoping
    to AI models and integrating them into the overall IT landscape? (Chapter [2](#516372_1_En_2_Chapter.xhtml))

    * Which quality assurance measures help validate the AI models’ accuracy and their
    integration in the overall IT landscape? (Chapter [3](#516372_1_En_3_Chapter.xhtml))

    * How do ethical discussions and laws and regulations impact the work of AI specialists?
    (Chapter [4](#516372_1_En_4_Chapter.xhtml))

    * How can you move from projects to a stable service delivery organization and
    a successful team? (Chapter [5](#516372_1_En_5_Chapter.xhtml))


    ![../images/516372_1_En_BookFrontmatter_Fig1_HTML.png](images/516372_1_En_BookFrontmatter_Fig1_HTML.png)


    **Figure 1** The Enterprise AI House Structuring the World of AI – And This Book


    * What are the technical options to store data and deliver the data to the training
    environments for data scientists or the production systems? (Chapter [6](#516372_1_En_6_Chapter.xhtml))

    * How can organizations protect data, information, AI models, and system environments?
    These are all valuable assets. Securing them is essential. (Chapter [7](#516372_1_En_7_Chapter.xhtml))


    Rather than discussing all existing theoretical ideas, academic literature, various
    schools of thought, statistical or mathematical algorithms, and piling footnotes
    and references, this book compiles and presents concepts and best practices, guiding
    managers through the most critical decisions. It helps to structure and to organize
    the work and to guarantee that your initiative stays on track. The aim is always
    to help readers excel in their careers by providing information they do not get
    easily elsewhere.


    At the end of this introduction, I wish you an inspirational read. Congratulations
    on starting your journey to the new frontier of enterprise AI. I look forward
    to your feedback on how your organization and you as a person succeeded and grew
    further based on the know-how I share with you in this book.


    # Acknowledgments


    I want to thank my family for their ongoing support. I could not have written
    this book without the possibility of spending many evenings and weekends preparing
    my material and without being able to retreat for some weeks when finalizing the
    book.


    My editors, Jonathan Gennick and Jill Balzano from Apress, were crucial for turning
    my vision of a book into the concrete book you hold right now in your hands. I
    appreciated Jonathan’s focus on getting an easy-to-read and helpful book. Both
    showed great flexibility when I delivered my book chapters earlier than planned.


    I want to thank Robert Stackowiak for reviewing my book. He provided detailed
    input on where and how to improve the content and helped solve terminology issues.'
