  trans: '

    ### 理解并管理成本驱动因素


    AI 运维服务管理者面临的一大挑战是，要在预防措施上投入足够资金以稳定解决方案，并确保有充足的支持与工程人员来处理事件和支持案例。对服务运行的有意投入并不会产生利润。然而，投入不足则会导致服务疏忽成本，并损害业务。两种极端做法可以说明这一挑战。支持台可以只安排一名实习生，在周一早上、周三和周四下午查看邮件，并帮助解决
    GUI 误操作问题。另一种做法是，提供 7/24 电话支持热线，配备三名随时待命的高级工程师，外加专业的监控和告警系统，从而进一步降低事件发生的可能性。成本不同，对组织其他部门的影响也各异。


    **运行服务的成本**是指组织（自愿）为支持能力和持续应用管理所花费的资金。因此，第一个成本领域是**支持与问题管理**，其包含以下三个主要成本驱动因素（图
    5-14）：


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig14_HTML.png](img/516372_1_En_5_Fig14_HTML.png)


    图 5-14


    理解持续数据科学服务的成本


    - **客户交互设计**。电话、上门服务台、电子邮件、工单系统、常见问题解答、单页文档说明、培训——提供客户和用户支持的方式有很多种。然而，正确的方法取决于请求的数量和复杂性，并会影响与用户和客户沟通所花费的时间。

    - **支持与响应时间**。7/24 支持需要更多工程师，产生的成本也高于仅在工作日上午 9 点到中午提供支持的情况。同样，如果工单必须在五分钟内（而非四小时内）得到回复，人员配置需求和成本将会激增。

    - **服务组合的多样性**。使用了哪些技术，例如 `Python`、`SAS`、`SAP Analytics` 或 `R`？已部署服务的实现方式和业务目标差异有多大？即使是帮助客户使用
    GUI，也需要支持人员理解相关技术。当需要解决涉及真正工程问题的支持案例时，则需要更多的技术知识。根本问题在于，每班一名工程师是否能在知识层面处理所有请求——还是需要两到三名工程师。在向服务组合中添加任何新技术之前，这是一个至关重要的问题。


    后一个方面反映了技术及其影响。**IT 基础设施的复杂性**同样会影响服务成本。首先，这涵盖了更多与**集成**相关的要素，例如接口的数量和稳定性。例如，是否使用了消息中间件，还是通信和交互是自行编码实现的？AI
    组件协同工作的应用程序是否稳定，或者是否总是出现事件和关于哪个解决方案是问题根本原因的讨论？这些问题与生产系统之间的相互作用有关。然而，AI 组织还必须维护其**内部**硬件和软件**基础设施**，包括
    CI/CD 流水线，特别是当这些流水线与其他软件开发团队、运行时服务器、AI 平台等的流水线集成时。


    **业务连续性管理**和**监控**代表了额外的成本模块。具体细节取决于 IT 组织是否已部署相应的解决方案和流程。因此，它们同样不能帮助您创造业务价值；它们“仅仅”能更早地发现问题或减少问题的影响。


    所有这些提到的支持和应用管理成本都是直接可见的。成本控制专家能精确了解所花费的资金，但看不到其收益。这种情形在成本优化举措中很容易成为预算削减的目标。少一个人？你应该看不出任何影响。我们可以削减一名工程师而不影响服务；为什么不连第二个职位也一起砍掉呢？这就像大学里流传的一个故事。为了省钱，他们在冬天降低了室内温度以减少供暖成本。你可以年复一年地重复这种做法——直到你的电费账单暴涨，因为办公室冷得无法工作，员工们带来了电暖器。应用管理和支持成本也是如此。它们可以被削减到几乎为零。其影响是严重的：AI
    组织内部产生疏忽成本，而 AI 组织外部则产生业务影响。


    **疏忽成本**是指由于支持和应用管理未能正常运作，在 AI 组织内部产生的成本和精力。首要影响是中断正在进行的 AI（项目）任务。对合理甚至不合理的用户和客户请求进行不当、不专业的处理，可能导致事态升级。事态升级不仅耗费管理层的时间，也同样耗费数据科学家和工程师的时间。后者必须收集数据、查找旧的电子邮件通信等。这些努力需要付出成本，并阻碍正在进行的项目。如果没有支持组织，数据科学家就得回答最简单的用户问题。换句话说：如果初次使用的用户不理解
    GUI 或按错了按钮，数据科学家就会因项目工作（开发新 AI 模型）而受到干扰。此外，如果系统停止工作，打补丁或重新配置的时间压力会大得多。因此，需要比在较不紧张的环境下采取预防措施时更多的人来处理问题。此外，在用户打电话或开单之前，通过监控发现的每一个问题都能减少支持渠道的工作量。


    最后，**业务影响**和**潜在损失**反映了因 AI 无法正常工作而未能实现的业务机会或节省的成本。例如，假设 AI 组件生成的追加销售和交叉销售推荐占网店收入的
    20%。那么，当该 AI 组件宕机或开始提出糟糕建议时，这些收入就消失了。如果业务经理没有意识到这一点，AI 经理就应该在预算讨论中提出来，尤其是当高级管理人员质疑模型质量和服务稳定性的成本时。

    '
- fmt: '### Model Management


    “It is mine, I tell you. My own. My precious. Yes, my precious.” The famous quote
    from “Lord of the Rings” is a seldom heard expression of care and obsession about
    an artifact. AI organizations do good taking similar care for their AI models
    and treating them as valuable corporate assets and intellectual property. That
    is the task of model management.


    Model management has only limited real IT or AI challenges. Still, it is the most
    technical of all AI operations challenges. It covers three main aspects. The first
    relates to quality assurance during the CRISP-DM model engineering process. The
    second aspect is monitoring and managing the model quality after deployment. The
    third and last aspect is how the organization handles models as artifacts during
    their lifecycle (Figure [5-15](#516372_1_En_5_Chapter.xhtml#Fig15)).


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig15_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig15_HTML.png)


    Figure 5-15


    Topics in Model Management


    A previous chapter was completely dedicated to quality assurance during the model
    creation with some brief remarks about post-deployment quality measures. We highlight
    a different perspective in the following.


    A `reactive approach` is an `automated model scoring` and `KPI monitoring` looking
    for changes (“drift”) in the input data and the derived predictions or classifications
    (Figure [5-16](#516372_1_En_5_Chapter.xhtml#Fig16)). Does the input data distribution
    change, or more concrete, for example, its average or lower and upper values?
    Does the output distribution change over time, or the business impact change as
    a drop in the conversion rate? When the monitoring detects that a KPI drops below
    a threshold, it can generate an alarm for the data scientists such that they are
    prompted to retrain the AI model. The simplest option is to train the same neural
    network architecture with the most up-to-date data (which might still might contain
    older data if still relevant and helpful). The most comprehensive retraining approach
    is to repeat the complete model development process, including feature development
    and hyperparameter optimization.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig16_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig16_HTML.png)


    Figure 5-16


    Analytical Model, Neural Networks, and Drift


    It is a reactive approach since the retraining starts only if a detectable decay
    of a KPI signalizes a need. On the other hand, a `proactive` approach is to retrain
    even if the KPIs still look good. The `champion-challenger pattern` falls into
    this category. The model currently in production is the champion model. Though
    the model (still) meets the quality requirements, data scientists already prepare
    a new model named the challenger model. Data scientists rely on the latest data
    or try more sophisticated optimizations and compare the champion and challenger
    models’ performances. If the challenger model outperforms the champion model,
    the challenger model becomes the new champion model. Otherwise, the data scientists
    discard the challenger model and start working on the next one. Figure [5-17](#516372_1_En_5_Chapter.xhtml#Fig17)
    illustrates this champion-challenger race. In general, the champion-challenger
    pattern is a kind of A/B testing trying to find the best solution.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig17_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig17_HTML.png)


    Figure 5-17


    Champion-Challenger Pattern


    Besides the quality aspect, looking at `models as artifacts` and optimizing their
    handling and, hopefully, smooth progress through corporate processes is another
    model management topic. Data scientists work with them, share them, document them,
    store and archive them, or version them. Many tasks are familiar from software
    engineering; others are new. However, three aspects are especially relevant (Figure
    [5-18](#516372_1_En_5_Chapter.xhtml#Fig18)):


    1.  Tool-based `managed deployment processes` or `pipelines` enforce corporate
    procedures and reduce operational risks and hurdles. Classic IT organizations
    tend to implement sophisticated approval processes for signing off requirements,
    quality assurance, and deployments using tools such as `Jira` or `ServiceNow`.
    This old-world approach focuses on auditability. It is mandatory for many organizations
    and potentially binding for AI organizations and how they create and deploy models.
    The newer trend is that developers and data scientists automate the release building
    and deployment using CI/CD pipelines. They make manual work redundant. They save
    time and reduce the risk of deployment mistakes (wrong environment, wrong model,
    wrong parameters, etc.). AI managers should check whether their processes are
    fully integrated into the company’s change management processes, rely on the same
    tooling, and fulfill the audit requirements.


    2.  `Code conversion` functionality helps data scientists and software developers
    when they work with different technologies. One of the options discussed in previous
    chapters for integrating an AI model into a software solution is to (re)code the
    model in the programming language the solution developers use. Data scientists
    or software engineers can perform this task manually, obviously an error-prone
    activity. Alternatively, code conversion packages automate this step. The more
    development languages and the more different AI tools a company uses, the more
    critical is this aspect.


    3.  Data scientists must store models as valuable corporate assets in a central
    `repository`. A repository guarantees that models do not get lost or deleted by
    mistake, enables collaboration between data scientists, and ensures auditability.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig18_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig18_HTML.png)


    Figure 5-18


    Model Management in a Corporate Context


    The repository needs some additional explanation. AI organizations can, for example,
    use the IT department’s code repository that they set up for software engineering.
    An AI organization would store, obviously, the AI model’s parameters and hyperparameters.
    Furthermore, additional information is vital for the deployment process, for searching
    for models, or for surviving audits. Such potential additional information is:


    *   The data preparation and model training `code`, accompanied by the actual
    `data or a reference to the data`. Only this combination enables data scientists
    to recreate precisely the same model at a later time.


    *   `Data lineage` documenting how the data got from the source to the point it
    became training data. For example, does the financial data come from the enterprise
    data warehouse or an obscure Excel created by a trainee in the housekeeping department
    and copied and modified by five teams afterward?


    *   `Scores` measuring the model performance. They document the rigidness of the
    quality assurance activities and prove the adequacy of the model.


    *   `Audit logs` documenting crucial activities such as who changed the training
    code or data preparation or deployed the model to which environment.


    *   `Tags` storing additional information. Examples are the data scientists that
    worked on the projects, the exact purpose of a model, or why a data scientist
    used a particular hyperparameter value.'
