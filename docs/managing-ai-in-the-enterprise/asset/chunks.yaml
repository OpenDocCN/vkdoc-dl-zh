  trans: '

    ### 从威胁到风险与缓解


    阴谋论者与风险专家的区别在于对概率的考量。例如，美国国家安全局（NSA）可能曾篡改过本书，添加了五句话，并删除了前一页上一只跳舞的粉红大象插图。他们极有可能实施此类攻击。然而，他们为何要投入时间和金钱进行这样的攻击？理解威胁行为者的动机、目标及其技术和财务能力，对于应对高度相关的安全风险并改善整体安全态势至关重要。


    我们讨论的机密性、完整性和可用性威胁是通用性的。在 IT 安全风险评估中，风险评估师和 AI 专家会仔细审视哪些攻击是可能的，并评估攻击发生的可能性及其对具体
    AI 环境的潜在影响。结果便是如图 7-8 所示的风险矩阵。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig8_HTML.jpg](img/516372_1_En_7_Fig8_HTML.jpg)


    **图 7-8** 某 AI 组织的公司特定风险矩阵


    该示例风险矩阵包含两种威胁。图 7-8 中的风险 A 反映了一种可能性：一名心怀不满的员工窃取了包含（匿名化的）过往客户购物行为的训练数据。其财务影响评级为“轻微”，意味着损失在
    5 万到 25 万之间。财务影响有限是因为该公司拥有强大的品牌和独特的物流能力，使得复制其商业模式颇具挑战。此类攻击的发生概率评级为每五年一次。


    基于风险评估和风险矩阵，管理层必须决定接受哪些风险，以及缓解哪些风险。**缓解**意味着投资于组织措施或技术改进。在本章稍后部分，我们将详细讨论一些更复杂的缓解措施。但首先，为了便于理解，我们在此介绍一些
    AI 背景下的典型缓解措施。例如：


    - 确保训练环境和生产系统具备**访问控制和边界安全**。这些措施降低了数据或模型被非预期传输到外部以及遭受非预期篡改的风险。此外，如果 AI 功能部署在公有云中，这些措施至关重要。

    - 执行严格的质量流程和**质量门禁**。在大多数情况下，粗心的数据科学家是导致模型质量低下的最大风险之一。双人复核以及对关键决策的适当记录，能降低将不合格模型部署到生产环境的风险，而拥有结构化和全面的质量保证流程则效果更佳。

    - 确保外部数据、代码库和预训练模型**来自可靠来源**。对这些下载内容进行实验对数据科学家至关重要。然而，当外部下载内容被用于构建部署到生产环境的 AI
    模型时，需要一定的治理流程。


    这三项措施降低了组织的潜在威胁和攻击面。然而，它们并不能取代适当的风险评估。风险评估会仔细审视上述所有威胁场景和威胁。AI 充满乐趣，AI 带来创新。与此同时，组织必须理解并管理其与
    AI 相关的安全风险。只有明确了谁负责管理和应对哪些风险，定义缓解措施才有意义。接下来，我们将仔细审视一些潜在的措施。


    ## 保护 AI 相关系统


    对于 AI 和分析而言，数据之于系统，就如同燃油之于汽车：数据越多，你就能跑得越远、越快。但有一个巨大的区别：你会烧掉燃油，而数据却会留在你的系统中。一个
    AI 团队在短短几个月内就会堆积起海量数据——这堪称一场安全噩梦。一个不择手段的竞争对手只需策反你的一名数据科学家，她就能将你大部分商业数据和知识产权提取并转移给竞争对手。因此，本节只有一个目标：详细阐述如何在不妨碍数据科学家和
    AI 组织日常工作的前提下，降低这种安全风险。


    三项传统措施是成功的关键，同时还有三项需要超越标准 IT 安全进行创新思考的措施。这些措施包括：


    1. 通用系统加固

    2. 治理流程

    3. 分区隔离

    4. 敏感属性的高级技术

    5. 探测检测

    6. 云 AI 风险缓解


    AI 和安全专家将它们应用于各种 AI 组件，如图 7-9 所示。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig9_HTML.png](img/516372_1_En_7_Fig9_HTML.png)


    **图 7-9** AI 组织应用环境的安全措施


    ### 系统加固


    通用系统加固涵盖了传统的 IT 安全措施，例如网络分区和防火墙，集成安全服务（如互联网和访问管理（`IAM`）解决方案或 Web 应用防火墙（`WAF`）），以及安全地配置系统，即限制
    IP 范围。


    这些是“常规”软件中已知的标准活动。它们同样适用于任何 AI 系统或组件，无论是训练区域、存储库、数据湖还是其他任何东西。其目标是：确保未经授权的人员无法访问系统，同时使数据科学家和工程师能够执行他们的工作。

    '
- fmt: '### Governance


    The distinction between adequate and necessary vs. unneeded and risky access to
    training data requires human judgment. The outcome of the judgment should be transparent
    and repeatable. Similar situations should result in similar decisions and requesters
    want to understand who is involved in the decision process and how far the decision-making
    proceeded. Governance processes help – and AI organizations benefit from setting
    up two especially relevant ones for data uploads and for data usage (Figure [7-10](#516372_1_En_7_Chapter.xhtml#Fig10)).
    The data upload governance process verifies whether the data loaded into the training
    environment is adequate. The usage governance process verifies whether the data
    can be used for a particular use case.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig10_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig10_HTML.png)


    Figure 7-10


    Governance Processes for AI Training Environments


    The separation of the two processes is a cost- and throughput-time optimization.
    So, a first project needing telemetry data from a new turbine implements the data
    transfer and preparation and goes through the upload approval process. Ideally,
    ten or twenty later projects can reuse the data. They only need approval for using
    the data for their purposes. They can skip the upload approval and reuse the implemented
    and approved data copy and preparation infrastructure, saving time and money.


    The **data upload governance process** looks, from an approval perspective, whether
    data can and should be copied into an AI training environment. Data owners, data
    privacy officers, legal teams, and IT security typically drive the decision-making.
    Obvious concerns relate to data privacy when AI training environments are in a
    different jurisdiction than the humans whose data the company analyzes. A second
    concern relates to companies in highly competitive and sensitive industry sectors
    or governmental agencies. They might hesitate to put every piece of information
    in every public cloud, no matter how good its AI features are.


    While the data upload governance process has a control function, it also helps
    make training data more valuable by easing (re-)use. This governance process can
    act as a checkpoint for documentation in the data catalog. It can enforce that
    data is only put into the training environment when the metadata is complete.
    This means: Data scientists must describe the content of their data, have assessed
    and documented the data quality, clarified potential usage restrictions, and analyzed
    the data lineage. This governance process is the shortcut to high-quality data
    catalogs for all data sets, at least within the AI training environment.


    However, there is also the option to discuss and implement measures to **make
    data less sensitive**. For example, shopping cart information related to individual
    customers is more problematic than anonymous shopping cart data. Obviously, the
    natural point for anonymization is before the data upload to the training environment.


    Ideally, the usage-related governance process is part of the organization’s management
    and approval processes for new (AI) projects. Following the data upload and before
    an actual use case implementation and AI model training, it focuses on approvals,
    not on enablement. It questions whether the intended data usage or the envisioned
    AI model violates data privacy laws, internal ethics guidelines, or any other
    policy or regulation. Again, data owners, data privacy officers, or legal and
    compliance teams are the natural decision-makers.


    ### Data Compartmentalization and Access Management


    Compartmentalization balances two contrary wishes: the wish for fine-granular
    data access control plus the wish and need for manageability. Achieving both at
    the same time is possible for **repositories** and the AI model training areas.
    If a specialist works on a project, he gets access to the specific training data;
    otherwise, not. Also, figuring out which application has to get models from a
    particular repository is straightforward. The challenge is the access management
    for data lakes or the **data collection** of the AI organization within their
    AI model training environment.


    Access to all data for every data scientist is not an option. Neither is managing
    data access separately for thousands of data sets and data classes. The latter
    might be a surprise. Super fine-granular access rights appeal, at least at first
    glance. However, data scientists and data owners cannot work with them on a daily
    basis. The complexity is too high for the human mind. As a result, they would
    stop following the need-to-know principle to prevent the AI organization from
    being blocked. They move to a “grant access that is not obviously unnecessary”
    model, approving much more data access than needed. So, super fine granular access
    control looks good on paper, but fails in reality.


    Suppose a data owner from the business knows his data and the data model very
    well. He can handle ten or twenty subsets, not one hundred and not thousands.
    AI organizations need a compartmentalization approach to limit the number of data
    access control roles and adjust them to their organization’s actual size and complexity.
    A starting point is following a three-dimensional compartmentalization approach
    (Figure [7-11](#516372_1_En_7_Chapter.xhtml#Fig11)). It works for medium enterprises
    and scales even to the largest corporations of the world.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig11_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig11_HTML.png)


    Figure 7-11


    The Three Dimensions of Compartmentalization


    The first dimension is **sensitivity**, typically categorized based on four levels:
    public, internal, confidential, and secret. Public data is (or could be made)
    available on the web, for example, statistics published by public health organizations
    or product descriptions in marketing brochures. Then, there is internal data.
    It means every employee (with a good reason) can access it. Customer contact information
    is one example. So is a categorization whether a customer is a top or a standard
    customer, or a customer frequently causing trouble. Complex offerings in a B2B
    context or a WHO tender are examples of confidential data. Deal or no deal can
    have a significant impact on the company’s bottom line. And any potential disclosure
    of the offer to competitors might result in losing the deal for sure. Finally,
    there is secret data. Passwords or (master) keys for encryption and signing files
    belong to this category. Information potentially impacting a corporation’s stock
    exchange price might – before disclosure – fall into this category. The latter
    examples also illustrate that data sensitivity can change over time. For example,
    once such stock-price relevant information is out, it becomes public data.'
  raw: '### Governance


    The distinction between adequate and necessary vs. unneeded and risky access to
    training data requires human judgment. The outcome of the judgment should be transparent
    and repeatable. Similar situations should result in similar decisions and requesters
    want to understand who is involved in the decision process and how far the decision-making
    proceeded. Governance processes help – and AI organizations benefit from setting
    up two especially relevant ones for data uploads and for data usage (Figure [7-10](#516372_1_En_7_Chapter.xhtml#Fig10)).
    The data upload governance process verifies whether the data loaded into the training
    environment is adequate. The usage governance process verifies whether the data
    can be used for a particular use case.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig10_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig10_HTML.png)


    Figure 7-10


    Governance Processes for AI Training Environments


    The separation of the two processes is a cost- and throughput-time optimization.
    So, a first project needing telemetry data from a new turbine implements the data
    transfer and preparation and goes through the upload approval process. Ideally,
    ten or twenty later projects can reuse the data. They only need approval for using
    the data for their purposes. They can skip the upload approval and reuse the implemented
    and approved data copy and preparation infrastructure, saving time and money.


    The **data upload governance process** looks, from an approval perspective, whether
    data can and should be copied into an AI training environment. Data owners, data
    privacy officers, legal teams, and IT security typically drive the decision-making.
    Obvious concerns relate to data privacy when AI training environments are in a
    different jurisdiction than the humans whose data the company analyzes. A second
    concern relates to companies in highly competitive and sensitive industry sectors
    or governmental agencies. They might hesitate to put every piece of information
    in every public cloud, no matter how good its AI features are.


    While the data upload governance process has a control function, it also helps
    make training data more valuable by easing (re-)use. This governance process can
    act as a checkpoint for documentation in the data catalog. It can enforce that
    data is only put into the training environment when the metadata is complete.
    This means: Data scientists must describe the content of their data, have assessed
    and documented the data quality, clarified potential usage restrictions, and analyzed
    the data lineage. This governance process is the shortcut to high-quality data
    catalogs for all data sets, at least within the AI training environment.


    However, there is also the option to discuss and implement measures to **make
    data less sensitive**. For example, shopping cart information related to individual
    customers is more problematic than anonymous shopping cart data. Obviously, the
    natural point for anonymization is before the data upload to the training environment.


    Ideally, the usage-related governance process is part of the organization’s management
    and approval processes for new (AI) projects. Following the data upload and before
    an actual use case implementation and AI model training, it focuses on approvals,
    not on enablement. It questions whether the intended data usage or the envisioned
    AI model violates data privacy laws, internal ethics guidelines, or any other
    policy or regulation. Again, data owners, data privacy officers, or legal and
    compliance teams are the natural decision-makers.


    ### Data Compartmentalization and Access Management


    Compartmentalization balances two contrary wishes: the wish for fine-granular
    data access control plus the wish and need for manageability. Achieving both at
    the same time is possible for **repositories** and the AI model training areas.
    If a specialist works on a project, he gets access to the specific training data;
    otherwise, not. Also, figuring out which application has to get models from a
    particular repository is straightforward. The challenge is the access management
    for data lakes or the **data collection** of the AI organization within their
    AI model training environment.


    Access to all data for every data scientist is not an option. Neither is managing
    data access separately for thousands of data sets and data classes. The latter
    might be a surprise. Super fine-granular access rights appeal, at least at first
    glance. However, data scientists and data owners cannot work with them on a daily
    basis. The complexity is too high for the human mind. As a result, they would
    stop following the need-to-know principle to prevent the AI organization from
    being blocked. They move to a “grant access that is not obviously unnecessary”
    model, approving much more data access than needed. So, super fine granular access
    control looks good on paper, but fails in reality.


    Suppose a data owner from the business knows his data and the data model very
    well. He can handle ten or twenty subsets, not one hundred and not thousands.
    AI organizations need a compartmentalization approach to limit the number of data
    access control roles and adjust them to their organization’s actual size and complexity.
    A starting point is following a three-dimensional compartmentalization approach
    (Figure [7-11](#516372_1_En_7_Chapter.xhtml#Fig11)). It works for medium enterprises
    and scales even to the largest corporations of the world.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig11_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig11_HTML.png)


    Figure 7-11


    The Three Dimensions of Compartmentalization


    The first dimension is **sensitivity**, typically categorized based on four levels:
    public, internal, confidential, and secret. Public data is (or could be made)
    available on the web, for example, statistics published by public health organizations
    or product descriptions in marketing brochures. Then, there is internal data.
    It means every employee (with a good reason) can access it. Customer contact information
    is one example. So is a categorization whether a customer is a top or a standard
    customer, or a customer frequently causing trouble. Complex offerings in a B2B
    context or a WHO tender are examples of confidential data. Deal or no deal can
    have a significant impact on the company’s bottom line. And any potential disclosure
    of the offer to competitors might result in losing the deal for sure. Finally,
    there is secret data. Passwords or (master) keys for encryption and signing files
    belong to this category. Information potentially impacting a corporation’s stock
    exchange price might – before disclosure – fall into this category. The latter
    examples also illustrate that data sensitivity can change over time. For example,
    once such stock-price relevant information is out, it becomes public data.'
  trans: '

    ### 治理


    区分对训练数据的访问是充分且必要，还是不必要且有风险，需要人为判断。判断的结果应当透明且可重复。类似的情况应产生相似的决策，而请求者希望了解决策过程中涉及的人员以及决策推进的程度。治理流程对此有所助益——AI
    组织通过建立两个尤其相关的流程（分别针对数据上传和数据使用）而受益（图 7-10）。数据上传治理流程用于验证加载到训练环境中的数据是否充分。使用治理流程则用于验证数据是否可用于特定的用例。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig10_HTML.png](img/516372_1_En_7_Fig10_HTML.png)


    图 7-10


    AI 训练环境的治理流程


    将这两个流程分开是一种成本和周期优化。因此，第一个需要从新型涡轮机获取遥测数据的项目，会实施数据传输和准备，并经历上传审批流程。理想情况下，后续的十个或二十个项目可以复用这些数据。他们只需为使用这些数据用于自身目的而获得批准。他们可以跳过上传审批，直接复用已实施并获批的数据副本和准备基础设施，从而节省时间和金钱。


    **数据上传治理流程**从审批的角度审视，数据是否能够且应当被复制到 AI 训练环境中。数据所有者、数据隐私官、法务团队和 IT 安全部门通常是决策的驱动者。一个明显的担忧涉及数据隐私，即当
    AI 训练环境与公司所分析数据对应的人员处于不同司法管辖区时。第二个担忧涉及处于高度竞争和敏感行业领域的公司或政府机构。他们可能不愿将每一条信息都放入任何公有云中，无论其
    AI 功能多么出色。


    虽然数据上传治理流程具有控制功能，但它也通过简化（复）用，帮助提升训练数据的价值。该治理流程可以作为数据目录中文档记录的检查点。它可以强制要求，只有在元数据完整的情况下，数据才能被放入训练环境。这意味着：数据科学家必须描述其数据的内容，评估并记录数据质量，阐明潜在的使用限制，并分析数据血缘。该治理流程是通往高质量数据目录（至少是在
    AI 训练环境内）的捷径。


    然而，也可以讨论并实施一些措施来**降低数据的敏感性**。例如，与个人客户相关的购物车信息比匿名购物车数据问题更大。显然，匿名的自然时机是在数据上传到训练环境之前。


    理想情况下，与使用相关的治理流程是组织新（AI）项目管理与审批流程的一部分。在数据上传之后、实际用例实施和 AI 模型训练之前，它侧重于审批，而非赋能。它质疑预期的数据使用或设想的
    AI 模型是否违反了数据隐私法、内部道德准则或任何其他政策或法规。同样，数据所有者、数据隐私官或法务与合规团队是自然的决策者。


    ### 数据隔离与访问管理


    隔离平衡了两种相反的愿望：对细粒度数据访问控制的愿望，以及对可管理性的愿望和需求。同时实现这两点对于**存储库**和 AI 模型训练区域是可能的。如果某位专家正在处理一个项目，他就能访问特定的训练数据；否则就不能。此外，确定哪个应用程序需要从特定存储库获取模型也很直接。挑战在于对数据湖或
    AI 组织在其 AI 模型训练环境内的**数据集合**的访问管理。


    让每位数据科学家都能访问所有数据是不可行的。为数千个数据集和数据类别分别管理数据访问同样不可行。后者可能会令人惊讶。超级细粒度的访问权限很有吸引力，至少乍看之下如此。然而，数据科学家和数据所有者无法在日常工作中使用它们。其复杂性对人类思维来说太高了。结果，他们会停止遵循“按需知密”原则，以防止
    AI 组织被阻塞。他们会转向“授予并非明显不必要的访问权限”模式，批准的数据访问远超所需。因此，超级细粒度的访问控制纸上谈兵尚可，但在现实中会失败。


    假设来自业务部门的数据所有者非常了解自己的数据和数据模型。他可以处理十个或二十个子集，但无法处理一百个或数千个。AI 组织需要一种隔离方法来限制数据访问控制角色的数量，并根据其组织的实际规模和复杂性进行调整。一个起点是遵循三维隔离方法（图
    7-11）。它适用于中型企业，并且可以扩展到世界上最大的公司。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig11_HTML.png](img/516372_1_En_7_Fig11_HTML.png)


    图 7-11


    隔离的三个维度


    第一个维度是**敏感性**，通常基于四个级别进行分类：公开、内部、机密和秘密。公开数据是（或可以）在网络上公开获取的，例如公共卫生组织发布的统计数据或营销手册中的产品描述。其次是内部数据。这意味着每位员工（有正当理由时）都可以访问。客户联系信息就是一个例子。客户是顶级客户、标准客户还是经常制造麻烦的客户的分类也是如此。B2B
    背景下的复杂报价或 WHO 招标是机密数据的例子。交易成败可能对公司的利润产生重大影响。而任何向竞争对手泄露报价的行为都可能导致交易必然失败。最后是秘密数据。密码或用于加密和签署文件的（主）密钥属于此类。可能影响公司股票交易所价格的信息——在披露之前——可能属于此类。后者的例子也说明数据敏感性会随时间变化。例如，一旦此类股价相关信息公开，它就变成了公开数据。

    '
- fmt: '# 数据敏感度分类的附加标准与法规


    某些行业领域的数据敏感度分类受到额外标准和法规的影响。例如已提及的`GDPR`、健康保险流通与责任法案（`HIPAA`）或支付卡行业数据安全标准（`PCI-DSS`）。组织可以通过不同方式建模这些影响。监管标准可能影响数据归属于四个类别中的哪一个。例如，新加坡和海峡群岛的银行客户数据属于“机密”，其他客户数据属于“保密”。或者，组织可以在四个敏感度级别之外，为每项标准和法规引入标记。这些标记表明数据是否属于额外的专用类别。例如，一条客户记录可能被标记为“保密类别”和“敏感个人数据（`GDPR`）”。


    第二个维度是**数据或业务领域**。数据属于人力资源、市场营销还是研发相关领域？数据所有者负责一个或多个领域。该领域有助于在治理流程中让合适的人员参与进来。这也是公司规模影响最大的维度。规模决定了审批粒度。人力资源是一个大领域，还是组织在子领域层面工作，区分不同类型的人力资源数据，例如招聘、薪资、保险、绩效管理和培训？大型组织倾向于拥有更细粒度的审批级别。它们有更多员工来处理请求，拥有更多敏感数据，以及更复杂的数据模型。


    第三个维度反映了公司的**组织结构以及公司运营所在且数据可能归属的不同司法管辖区**。不同的子公司可能有不同的内部规则。不同的司法管辖区对数据存储、使用以及人工智能有不同的监管规定。


    总而言之，领域、组织结构和司法管辖区是划分工作、管理访问权限、在治理流程中路由请求以及快速确定适用哪些规则和法规的自然方式。数据敏感度维度允许快速评估一个请求是需要更深入的分析还是可以走捷径。


    ## 敏感属性的高级技术


    某些数据类型在训练数据中尤为突出，因为一旦丢失或暴露，它们会带来高风险。首先，这些是能够识别个人的数据项，例如社会安全号码。其次，存在敏感的个人数据和受保护类别，例如工会会员身份或种族。在此，考虑超越典型访问控制的不同方法是合理的。可选方案包括：


    - **不将其复制到AI环境**。如果受保护类别和敏感个人数据不得用于AI模型训练，为何要复制这些数据？同样适用于标识符。如果不需要，可以在将数据作为训练数据导入AI环境时将其移除。


    - **匿名化数据**意味着完全无法识别数据所属的个人，即使使用额外信息或表格也无法识别。如果你将姓名替换为“XXXX”，结果就是匿名数据（至少在没有其他列（例如ID）的情况下）。如果匿名化是强制性的，AI组织必须详细检查。通常，这个术语也用于第三种选项——遮蔽。


    - **遮蔽数据**，即增加确定数据所属个人的难度和时间成本。它反映了例如一个表包含合成姓名和账号，但最终仍存在一个将合成姓名和号码映射到真实姓名和号码的表（例如，为了便于修复问题）的情况。


    ## 探测检测


    合作伙伴、竞争对手或客户：这些是潜在的攻击者，试图逆向工程或误导自动化评级或决策。一家拥有实体分支机构的传统银行可能想了解一家在线银行的定价模型，以便针对那些未获得“良好”在线报价的客户提供高利润信贷（图[7-12](#516372_1_En_7_Chapter.xhtml#Fig12)，左图）。一家汽车修理厂可能想了解哪种损坏汽车的照片能让保险公司为维修支付最高赔偿。是远景还是特写照片，应该是色彩鲜艳的——还是黑白图像更有利可图（图[7-12](#516372_1_En_7_Chapter.xhtml#Fig12)，右图）？


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig12_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig12_HTML.png)


    图7-12


    探测模型重建（左图）与寻找弱点或最佳点（右图），图片来源：Pixabay


    如果攻击者无法直接访问AI模型，他们可以——如果模型暴露于互联网——对其进行探测，并发送大量具有不同值组合（例如收入、财产、年龄、子女抚养费或我们银行示例中的其他参数）的请求。攻击者收集回复，并使用这些数据训练一个行为类似于银行原始模型的模仿AI模型。攻击者无法访问原始模型，但他们可以分析自己的模仿AI模型。因此，AI组织和IT安全专家必须防止对AI模型的探测——同时不干扰“正常”客户的请求。潜在的方法包括：


    - 限制每个IP地址每小时的请求数量——甚至用错误结果迷惑攻击者。

    - 限制对系统的匿名访问，并在提供任何评估之前要求注册。

    - 使用验证码来至少防止自动化探测。

    - 不直接在线提供评估结果，而仅通过电子邮件、信件或电话提供。


    公司必须在失去潜在客户（例如，客户可能觉得等待信件的过程太不方便）的风险与竞争对手或合作伙伴探测模型的风险之间取得平衡。


    总而言之：将AI模型暴露给公众或合作伙伴（例如作为业务流程的一部分）的公司，应监控流程和请求，以发现异常以及欺诈或间谍活动的迹象。'
  raw: 'Additional standards and regulations impact the data sensitivity classifications
    in certain industry sectors. Examples are the already mentioned GDPR, Health Insurance
    Portability and Accountability Act (HIPAA), or Payment Card Industry Data Security
    Standard (PCI-DSS). Organizations can model the impact in different ways. The
    regulatory standards can influence to which of the four categories data belong.
    For example, Singapore and Channel Island bank customer data are “secret,” other
    customer data are “confidential.” Alternatively, organizations can introduce flags
    for each standard and regulation in addition to the four sensitivity levels. These
    flags state whether data fall into an additional dedicated category. For example,
    a customer record might be tagged as “category confidential” and “sensitive personal
    data (GDPR).”


    The second dimension is the **data or business domain**. Are they HR, marketing,
    or R&D-related data? Data owners are responsible for one or more domains. The
    domain helps to involve the right persons in the governance processes. It is also
    the dimension on which the company size has the most significant impact. The size
    determines the approval granularity. Is HR one big domain, or does an organization
    work on a sub-domain level distinguishing various types of HR data, such as recruiting,
    payroll, insurances, performance management, and training? Larger organizations
    tend to have a more granular approval level. They have more staff to handle requests,
    more sensitive data, and a more complex data model.


    The third dimension reflects the company’s **organizational structure and various
    jurisdictions** in which the company operates and to which data might belong.
    Different subsidiaries might have different internal rules. Different jurisdictions
    regulate data storage and usage and artificial intelligence differently.


    To conclude, domains, organizational structures, and jurisdictions are natural
    ways to divide work, manage access rights, route requests in governance processes,
    and determine quickly which rules and regulations apply. The data sensitivity
    dimension allows for assessing quickly whether a request requires a more profound
    analysis or can take a shortcut.


    ### Advanced Techniques for Sensitive Attributes


    Certain data types stand out from the rest of the training data, because they
    pose a high risk if lost or exposed. First, these are data items allowing to identify
    individuals, such as Social Security Numbers. Second, there are sensitive personal
    and protected classes such as union membership or race. Here, it makes sense to
    consider different approaches beyond typical access control. The options are:


    *   Not copy them to the AI environment. In case protected classes and sensitive
    personal data must not be used for AI model training, why copy such data? The
    same applies to identifiers. If not needed, one can remove them when importing
    the data into the AI environment as training data.


    *   Anonymizing data means making it completely impossible to identify individuals
    to which data belongs, even not using additional information and tables. If you
    replace names with “XXXX,” the result is anonymous data (at least if there are
    no other columns, e.g., with IDs). AI organizations have really to check in detail
    in case anonymization is mandatory. Often, this term is also used for the third
    option, veiling, as well.


    *   Veiling data, that is, making it more challenging and time-consuming to determine
    to which individual the data belong. It reflects situations where, for example,
    a table contains synthetic names and account numbers, but in the end, there is
    still a table for mapping synthetic names and numbers to the real ones, for example,
    to ease fixing issues.


    ### Probing Detection


    Partners, competitors, or customers: these are potential attackers trying to reengineer
    or misguide automated ratings or decision making. A classic bank with brick branch
    offices might want to understand the pricing model of an online bank to target
    customers not getting “good” online offers with high-margin credits (Figure [7-12](#516372_1_En_7_Chapter.xhtml#Fig12),
    left). A car repair shop might want to understand which kind of picture of a damaged
    car lets the insurance pay the highest compensation for the repairs. Is it a long
    shot or a detailed picture, should it be with intense colors – or are black and
    white images more profitable (Figure [7-12](#516372_1_En_7_Chapter.xhtml#Fig12),
    right)?


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig12_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig12_HTML.png)


    Figure 7-12


    Probing for Model Reconstruction (Left) and for Searching for Weaknesses or Sweet-Spots
    (Right), Picture Source: Pixabay


    If attackers cannot directly access an AI model, they can – if exposed to the
    Internet – probe it and send many requests with different value combinations such
    as income, property, age, child support, or other parameters for our bank example.
    The attackers collect the replies and use the data to train a copycat AI model
    behaving similarly to the bank’s original one. The attackers have no access to
    the original model, but they can analyze their copycat AI model instead. Thus,
    AI organizations and IT security specialists have to prevent the probing of an
    AI model – without disturbing “normal” customers’ requests. Potential approaches
    are:


    *   Restrict the number of requests per hour for each IP address – or even confuse
    attackers with wrong results.


    *   Restrict anonymous access to the systems and require registration before providing
    any estimations.


    *   Use Captchas to prevent at least automated probing.


    *   Do not provide the results of the estimation directly online, but only per
    email, letter, or phone call.


    Companies have to balance the risk of losing potential customers that might find,
    for example, the process too inconvenient of having to wait for a letter against
    the risk that competitors or partners probe the model.


    To conclude: Companies exposing AI models to the public or to partners, for example
    as part of the business process, should monitor the processes and requests for
    anomalies and hints for fraud or espionage.'
  trans: '

    # 数据敏感度分类的附加标准与法规


    某些行业领域的数据敏感度分类受到额外标准和法规的影响。例如已提及的`GDPR`、健康保险流通与责任法案（`HIPAA`）或支付卡行业数据安全标准（`PCI-DSS`）。组织可以通过不同方式建模这些影响。监管标准可能影响数据归属于四个类别中的哪一个。例如，新加坡和海峡群岛的银行客户数据属于“机密”，其他客户数据属于“保密”。或者，组织可以在四个敏感度级别之外，为每项标准和法规引入标记。这些标记表明数据是否属于额外的专用类别。例如，一条客户记录可能被标记为“保密类别”和“敏感个人数据（`GDPR`）”。


    第二个维度是**数据或业务领域**。数据属于人力资源、市场营销还是研发相关领域？数据所有者负责一个或多个领域。该领域有助于在治理流程中让合适的人员参与进来。这也是公司规模影响最大的维度。规模决定了审批粒度。人力资源是一个大领域，还是组织在子领域层面工作，区分不同类型的人力资源数据，例如招聘、薪资、保险、绩效管理和培训？大型组织倾向于拥有更细粒度的审批级别。它们有更多员工来处理请求，拥有更多敏感数据，以及更复杂的数据模型。


    第三个维度反映了公司的**组织结构以及公司运营所在且数据可能归属的不同司法管辖区**。不同的子公司可能有不同的内部规则。不同的司法管辖区对数据存储、使用以及人工智能有不同的监管规定。


    总而言之，领域、组织结构和司法管辖区是划分工作、管理访问权限、在治理流程中路由请求以及快速确定适用哪些规则和法规的自然方式。数据敏感度维度允许快速评估一个请求是需要更深入的分析还是可以走捷径。


    ## 敏感属性的高级技术


    某些数据类型在训练数据中尤为突出，因为一旦丢失或暴露，它们会带来高风险。首先，这些是能够识别个人的数据项，例如社会安全号码。其次，存在敏感的个人数据和受保护类别，例如工会会员身份或种族。在此，考虑超越典型访问控制的不同方法是合理的。可选方案包括：


    - **不将其复制到 AI 环境**。如果受保护类别和敏感个人数据不得用于 AI 模型训练，为何要复制这些数据？同样适用于标识符。如果不需要，可以在将数据作为训练数据导入
    AI 环境时将其移除。


    - **匿名化数据**意味着完全无法识别数据所属的个人，即使使用额外信息或表格也无法识别。如果你将姓名替换为“XXXX”，结果就是匿名数据（至少在没有其他列（例如
    ID）的情况下）。如果匿名化是强制性的，AI 组织必须详细检查。通常，这个术语也用于第三种选项——遮蔽。


    - **遮蔽数据**，即增加确定数据所属个人的难度和时间成本。它反映了例如一个表包含合成姓名和账号，但最终仍存在一个将合成姓名和号码映射到真实姓名和号码的表（例如，为了便于修复问题）的情况。


    ## 探测检测


    合作伙伴、竞争对手或客户：这些是潜在的攻击者，试图逆向工程或误导自动化评级或决策。一家拥有实体分支机构的传统银行可能想了解一家在线银行的定价模型，以便针对那些未获得“良好”在线报价的客户提供高利润信贷（图
    7-12，左图）。一家汽车修理厂可能想了解哪种损坏汽车的照片能让保险公司为维修支付最高赔偿。是远景还是特写照片，应该是色彩鲜艳的——还是黑白图像更有利可图（图
    7-12，右图）？


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig12_HTML.png](img/516372_1_En_7_Fig12_HTML.png)


    图 7-12


    探测模型重建（左图）与寻找弱点或最佳点（右图），图片来源：Pixabay


    如果攻击者无法直接访问 AI 模型，他们可以——如果模型暴露于互联网——对其进行探测，并发送大量具有不同值组合（例如收入、财产、年龄、子女抚养费或我们银行示例中的其他参数）的请求。攻击者收集回复，并使用这些数据训练一个行为类似于银行原始模型的模仿
    AI 模型。攻击者无法访问原始模型，但他们可以分析自己的模仿 AI 模型。因此，AI 组织和 IT 安全专家必须防止对 AI 模型的探测——同时不干扰“正常”客户的请求。潜在的方法包括：


    - 限制每个 IP 地址每小时的请求数量——甚至用错误结果迷惑攻击者。

    - 限制对系统的匿名访问，并在提供任何评估之前要求注册。

    - 使用验证码来至少防止自动化探测。

    - 不直接在线提供评估结果，而仅通过电子邮件、信件或电话提供。


    公司必须在失去潜在客户（例如，客户可能觉得等待信件的过程太不方便）的风险与竞争对手或合作伙伴探测模型的风险之间取得平衡。


    总而言之：将 AI 模型暴露给公众或合作伙伴（例如作为业务流程的一部分）的公司，应监控流程和请求，以发现异常以及欺诈或间谍活动的迹象。

