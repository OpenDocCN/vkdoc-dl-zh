  raw: '### Advanced Neural Network Topologies


    Research on neural networks made significant progress over the last years. Data
    scientists improved and adjusted the neural network architecture for dedicated
    application areas, such as computer vision and image recognition. They relax the
    topological rule that a neuron propagates its activation value to exactly all
    neurons of the next layer and nowhere else. The relaxation is the base for three
    significant neural network topology variants: convolutional neural networks, recurrent
    neural networks, and residual neural networks. A **residual neural network** does
    not only propagate its neurons’ activations to the next layer. It can also feed
    the activations to layers further down. In Figure [2-13](#516372_1_En_2_Chapter.xhtml#Fig13),
    for example, layer 3 forwards its activation not only to layer 4 but also to layer
    6.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig13_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig13_HTML.png)


    Figure 2-13


    Residual Neural Networks


    **Convolutional layers** are another topological variant. They differ from fully
    connected neural network layers in two ways (2-14). First, neurons of a convolutional
    layer do not consider the activation of all neurons of the previous layer. They
    consider only specific collocated neurons, such as neighboring pixels of an image.
    For example, only a 3x3 matrix of neurons in a layer feed their activations as
    an input of a specific neuron in the next layer. Second, the neurons of a convolutional
    layer calculate their activation differently. They use a filter (named convolutional
    kernel) with weights. The filter is a kind of window moving over the matrix, which
    has the activation values of the previous layer.


    In Figure [2-14](#516372_1_En_2_Chapter.xhtml#Fig14) (right), the left upper cell
    of the kernel has the value “1”. When calculating the value of the black cell,
    the left upper value of the activation matrix with the value “0.9” is weighted
    with the value “1”. Then, “0.7” is multiplied with “0” and “-1” with “0.1”. This
    calculation continues for all other cells of the filter matrix. For calculating
    the value of the grey cell, we start with “0.7”, which is multiplied with “1”.


    Data scientists build on neural network topologies with convolutional layers for
    dedicated AI application areas such as computer vision with their complex problems.
    They consist of twenty or thirty layers, a mix of fully connected layers, residual
    layers, and many convolutional layers.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig14_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig14_HTML.png)


    Figure 2-14


    Advanced Architectural Patterns for Neural Networks: A Convolutional Layer/Convolutional
    Neural Network. The Left Side Illustrates the Topology Aspect, That Is, the Wiring
    of Neurons in Two Layers, the Right a Sample Filter Matrix


    In time series prediction or natural language and speech processing, **recurrent
    neural networks** are a popular neural network topology choice. The topology reflects
    that the ordering of the input is essential. When understanding a text, “Heidi
    kills Peter” and “Peter kills Heidi” have a different meaning. Recurrent neural
    networks connect nodes within one layer to reflect the ordering aspect (Figure
    [2-15](#516372_1_En_2_Chapter.xhtml#Fig15)). Sophisticated recurrent neural network
    topologies base on the well-known neural network architectural patterns such as
    Long Short-Term Memory Units (LSTM) or Gated Recurrent Unit (GRU). They introduce
    the concept of a “memory” for previous state information. The relevance of memories
    is easily understood when thinking about crime stories. The book might start with
    the sentence “Heidi killed Peter.” This sentence contains information still relevant
    two or twenty sentences later when the police arrest Heidi.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig15_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig15_HTML.png)


    Figure 2-15


    Recurrent Neural Network. The Characteristic Is the Connection Between the Neurons
    in One Layer Represented by the Bold Green Arrows


    AI project managers benefit from a basic understanding of advanced neural network
    topologies, even though they do not design or optimize the topology. They should
    be aware that various best practice topologies exist. Plus, they should be sparring
    partners for data scientists suggesting designing and optimizing a company-specific
    and use-case-specific neural network topology (and investing months of work) instead
    of using best practice topologies.


    The fact that best practice topologies exist impacts project teams. First, it
    is an extra motivation to use existing, well-trained AI models, for example, from
    cloud providers. Second, suppose projects embark on the journey to design and
    implement their own neural network. In that case, the project manager should ensure
    that he has an experienced data scientist in his project team. Ideally, he can
    convince a senior data scientist with know-how in the concrete application area.
    Otherwise, he should try to get at least temporary support from such a person.


    ## Developing AI Models


    The last decades taught the IT industry and IT professionals that unstructured
    and uncoordinated engineering or unsystematic experimentation is the short road.
    Its only drawback: It leads to disaster, not to success. Thus, AI project managers
    should ensure that the engineering of “his” AI models results from a hopefully
    creative and systematic engineering process. In the following, we highlight three
    topics each project manager should know:


    *   Jupyter Notebooks as the most widely used AI tool


    *   CRISP-DM (CRoss Industry Standard Process for Data Mining) as a methodology
    for structuring AI projects from the idea to the delivery


    *   Approaches for improving the efficiency of AI teams'
  trans: "\n### 高级神经网络拓扑结构\n\n近年来，神经网络研究取得了显著进展。数据科学家针对计算机视觉和图像识别等特定应用领域，改进并调整了神经网络架构。他们放宽了“神经元仅将其激活值传播到下一层的所有神经元，而不传播到其他任何地方”这一拓扑规则。这种放宽为三种重要的神经网络拓扑变体奠定了基础：卷积神经网络、循环神经网络和残差神经网络。`残差神经网络`不仅将其神经元的激活值传播到下一层，还可以将这些激活值馈送到更远的层。例如，在图\
    \ 2-13 中，第 3 层不仅将其激活值转发到第 4 层，还转发到第 6 层。\n\n![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig13_HTML.png](img/516372_1_En_2_Fig13_HTML.png)\n\
    \n图 2-13  \n残差神经网络\n\n`卷积层`是另一种拓扑变体。它们与全连接神经网络层在两个方面有所不同（图 2-14）。首先，卷积层的神经元并不考虑前一层所有神经元的激活值。它们只考虑特定的共置神经元，例如图像的相邻像素。例如，只有前一层中一个\
    \ 3x3 的神经元矩阵将其激活值作为下一层特定神经元的输入。其次，卷积层的神经元以不同的方式计算其激活值。它们使用一个带有权重的滤波器（称为卷积核）。该滤波器就像一个在包含前一层激活值的矩阵上移动的窗口。\n\
    \n在图 2-14（右侧）中，卷积核的左上角单元格的值为“1”。在计算黑色单元格的值时，激活矩阵中值为“0.9”的左上角值会与权重“1”相乘。然后，“0.7”与“0”相乘，“-1”与“0.1”相乘。这种计算会持续进行，直到处理完滤波器矩阵中的所有其他单元格。为了计算灰色单元格的值，我们从“0.7”开始，将其与“1”相乘。\n\
    \n数据科学家将带有卷积层的神经网络拓扑结构应用于特定的人工智能应用领域，例如处理复杂问题的计算机视觉。这些网络由二十或三十层组成，是全连接层、残差层和许多卷积层的混合体。\n\
    \n![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig14_HTML.png](img/516372_1_En_2_Fig14_HTML.png)\n\
    \n图 2-14  \n神经网络的高级架构模式：卷积层/卷积神经网络。左侧展示了拓扑方面，即两层中神经元的连接方式，右侧展示了一个示例滤波器矩阵\n\n在时间序列预测或自然语言与语音处理中，`循环神经网络`是一种流行的神经网络拓扑选择。这种拓扑反映了输入的顺序至关重要。在理解文本时，“Heidi\
    \ kills Peter”和“Peter kills Heidi”具有不同的含义。循环神经网络连接同一层内的节点，以反映顺序方面（图 2-15）。复杂的循环神经网络拓扑结构基于众所周知的神经网络架构模式，例如长短期记忆单元（LSTM）或门控循环单元（GRU）。它们引入了用于存储先前状态信息的“记忆”概念。在思考犯罪故事时，记忆的相关性很容易理解。这本书可能以“Heidi\
    \ killed Peter”这句话开头。这句话包含的信息在两句或二十句之后，当警察逮捕 Heidi 时，仍然相关。\n\n![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig15_HTML.png](img/516372_1_En_2_Fig15_HTML.png)\n\
    \n图 2-15  \n循环神经网络。其特点是同一层内神经元之间的连接，由粗体绿色箭头表示\n\n即使不设计或优化拓扑结构，AI 项目经理也能从对高级神经网络拓扑结构的基本理解中受益。他们应该意识到存在各种最佳实践拓扑结构。此外，他们应该成为数据科学家的合作伙伴，而不是建议设计和优化公司特定且用例特定的神经网络拓扑结构（并投入数月的工作）而放弃使用最佳实践拓扑结构。\n\
    \n存在最佳实践拓扑结构这一事实会影响项目团队。首先，这是使用现有的、训练有素的 AI 模型（例如来自云提供商的模型）的额外动力。其次，假设项目踏上了设计和实现自己神经网络的旅程。在这种情况下，项目经理应确保其项目团队中拥有一位经验丰富的数据科学家。理想情况下，他能够说服一位在具体应用领域拥有专业知识的高级数据科学家加入。否则，他应尝试至少从这样的人那里获得临时支持。\n\
    \n## 开发 AI 模型\n\n过去几十年给 IT 行业和 IT 专业人士的教训是，非结构化、不协调的工程或非系统性的实验是一条捷径。它唯一的缺点是：它通向灾难，而非成功。因此，AI\
    \ 项目经理应确保“他的”AI 模型的工程是源于一个富有创造力且系统化的工程过程。接下来，我们重点介绍每位项目经理都应了解的三个主题：\n\n- `Jupyter\
    \ Notebooks` 作为最广泛使用的 AI 工具\n- `CRISP-DM`（跨行业数据挖掘标准流程）作为一种方法论，用于构建从构思到交付的 AI 项目\n\
    - 提高 AI 团队效率的方法\n"
- fmt: '### The Jupyter Notebook Phenomenon


    `Jupyter Notebooks` are a fascinating piece of software. I learned about them
    in my first deep learning and AI courses. I never heard about them in my two decades
    in data management, often with hands-on SQL programming. As `Google Trends` illustrates,
    the interest in `Jupyter` notebooks started to rise from around 2014/2015. It
    almost doubled every year in the beginning and is still increasing today (Figure
    [2-16](#516372_1_En_2_Chapter.xhtml#Fig16)). Every manager in AI will hear data
    scientists mentioning them on a nearly daily basis. If data scientists have issues
    with their `Jupyter Notebooks`, this slows down their work. In general, the primary
    use of `Jupyter` notebooks is developing Python scripts. However, they are not
    simply a kind of TOAD-like tool or `SQL Developer` for Python. They are a new
    way to work with data.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig16_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig16_HTML.png)


    Figure 2-16


    Google Trends Analysis of the Interest in the Topics Project Jupyter and Data
    Science from January 2011 till May 2020


    `Jupyter Notebooks` are an interactive development environment. The commands support,
    for example, downloading data and cleansing or transforming the data, and training
    AI models. As an interactive environment, data scientists can write some lines
    of code and execute them immediately. They can choose whether to rerun the complete
    script or just run new lines of code. This choice is essential. Single commands
    for data preparation or for generating the model can take minutes, hours, or days.
    Rerunning the complete script for testing some new code lines often takes too
    long.


    Besides the interactive mode, the second differentiator is that commenting code
    is fun with `Jupyter Notebooks`. It is different from old-style Java code comments
    and feels more like making notes on a paper notebook. Before (or after) writing
    a new command, adding a comment helps to remember its exact purpose. Otherwise,
    data scientists might not know anymore five or ten commands later the reason and
    actual context of every single line of their code. `Jupyter Notebooks` allow formatting
    comments nicely (e.g., bold, italics) and integrating images and sketches. These
    options indicate that comments are not just an add-on but an integral part of
    the model development process.


    To illustrate the concept of `Jupyter Notebooks` better, Figure [2-17](#516372_1_En_2_Chapter.xhtml#Fig17)
    contains a screenshot. This `Jupyter Notebook` is a script for downloading images
    from the web and storing them in an array for later processing. On the top is
    a cell with comments (“markdown”). Then, there is a cell with code. The first
    commands define and instantiate variables, followed by a `for`-loop for downloading
    images. The last commands write to the console. Below the script with the code,
    there is the output the `Jupyter` notebook wrote to the console when executing
    this script.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig17_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig17_HTML.png)


    Figure 2-17


    Example of Jupyter Notebook


    ### CRISP-DM for Model Development


    With or without `Jupyter` notebooks, unstructured experimenting and uncoordinated
    engineering seldom deliver a successful AI model or a working AI-driven software
    solution. The bigger and more relevant the AI projects get, the more vital are
    methodologies. In AI, the most popular one is the Cross-Industry Standard Process
    for Data Mining (CRISP-DM). Released at the turn of the millennium, it is still
    state of the art with its six phases (Figure [2-18](#516372_1_En_2_Chapter.xhtml#Fig18)).


    The first phase is Business Understanding. What does the business want to achieve
    – and what is the corresponding AI project goal? An example of a business goal
    is to reduce the churn rate by 50%. In other words: 50% fewer customers change
    the bank when they have to renew their mortgage. A matching AI project goal is
    to provide a list of the 1000 customers potentially not prolonging their mortgages
    up for renewal next month. The first phase also covers assessing the resource
    situation. Projects need expertise and adequate staffing, data sources, engineering
    and AI tools, and training and production environments. There might be legal constraints
    to be clarified or implicit critical underlying assumptions never written down.
    Understanding and improving the resource situation is part of the way to elaborate
    a project plan.


    Thus, the first phase of the `CRISP-DM` covers aspects related to the business
    case before the action project starts. We covered such elements in detail with
    the scoping questions earlier in this chapter and the business benefit discussion
    in the previous chapter.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig18_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig18_HTML.png)


    Figure 2-18


    The CRISP-DM Model


    The second phase is Data Understanding. It starts with getting access and potentially
    copying data from the sources identified in the previous phase. It covers tasks
    such as getting accounts, opening firewalls, or initiating file transfers. Data
    scientists describe and work on understanding the data from a high-level perspective.
    They document the meaning of the attributes, their syntax (e.g., string vs. number
    fields), their statistical distribution, and their quality. Typical quality issues
    are, for example, empty fields or tables that contain only partial data (e.g.,
    all customers worldwide, but excluding China or the US).


    In phase three – Data Preparation – data scientists transform and prepare the
    final data set for the subsequent model creation. They identify potentially helpful
    tables and attributes. The rule of thumb is to provide as many attributes as possible
    and let the AI training algorithms determine which attributes improve the AI model
    quality. When trying to understand which customers might decide not to prolong
    their mortgage, everything we know about the customer can help for training the
    model: account balances, number of contacts with a bank advisor, inflow and outflow
    of money – everything that widely relates to the customers, its mortgage, or her
    behavior and actions. Data preparation also covers feature engineering. Not all
    potentially helpful input values exist in a database. A data scientist might have
    to extract all customer contacts from client advisors from the company’s calendar
    solution and determine the number of contacts per customer. The net in- or outflow
    of assets requires summing up the positions today and one year ago.'
