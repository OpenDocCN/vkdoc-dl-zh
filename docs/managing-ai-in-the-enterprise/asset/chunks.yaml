  trans: '

    最后，**对象存储**（`object storage`）也是一种值得提及的存储选项。自`AWS S3`推出以来，对象存储的相关性日益增强。过去是文件系统，如今则是对象存储技术：存放文件和文档的地方。它是云中的“标准存储类型”。与传统文件不同，对象存储无法直接操作文件，只能替换文件，这并不会影响人工智能组织的工作。不过，投入一些时间来详细阐述如何处理非结构化（及半结构化）数据，仍然是很有意义的。


    ## 数据湖与数据仓库


    数据湖是人工智能组织捕获和存储海量数据（包括来自各种源系统的文本、音频、视频和传感器数据）的热门选择。与此同时，企业也运行着庞大的数据仓库，后者在报告和分析大量（业务）数据方面尤为强大。虽然数据湖和数据仓库看起来像是冗余的概念，但事实并非如此。人工智能组织能从两者中受益，尽管其技术流程和商业层面有所不同。


    `ETL`（提取、转换、加载）之于数据仓库，正如`ELT`（提取、加载、转换）之于数据湖。步骤相同，但顺序不同（图 6-6）。延迟转换步骤在成本方面是一个颠覆性的改变。转换步骤是最耗时且最昂贵的环节，涵盖数据清洗和确保一致性。确保一致性是一项分析密集型的、需要人工完成的任务，尤其是在多个数据库和报告包含相似但定义略有不同的关键绩效指标时。与不同业务团队的多位专家和管理人员讨论并达成共识，可能需要数周时间。其好处在于：数据仓库拥有“黄金标准”的数据质量，工程师和业务用户都可以信赖，这也是管理者愿意为数据仓库提供资金的原因。因此，在将数据加载到数据仓库之前，避免成本高昂的转换步骤是不可行的。结果，即使是添加单个属性也需要投入成本，从而限制了快速添加数据的能力。管理层（始终）对数据仓库团队是否添加数据以及添加哪些数据拥有发言权。


    相比之下，数据湖存储的是未经清洗的原始数据。这里没有关于单个属性的讨论，而是决定添加哪个数据库或包含大量日志文件的哪些文件夹。添加数据不会产生高昂的成本，无论是项目中的分析成本还是后续的存储成本。这些低成本正是数据湖的成功因素。工程师可以仅仅基于一种模糊的希望——未来某时某人可能会有某种想法来使用这些数据——就添加数据。然后，这个“某人”再为包括清洗和准备在内的转换步骤付费。


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig6_HTML.png](img/516372_1_En_6_Fig6_HTML.png)


    图 6-6


    将数据摄入数据仓库（上图）和数据湖（下图）


    ## 数据目录


    高质量人工智能模型的一个关键先决条件是充足的训练数据。哪些客户可能在接下来几周内终止合同？装配线上的哪些螺丝有缺陷？如果数据科学家能够访问训练其机器学习模型所需的数据，他们就能回答（几乎）世界上所有的问题。


    数据仓库提供了大量结构良好、文档齐全且一致的数据。相比之下，数据湖收集了数据仓库所存储的大量数据，但缺乏类似的文档——这并非数据科学家所爱，但却是任何数据湖业务案例中不可或缺的一部分，如前文所述。此外，运营数据库和其他数据存储方式可能包含数据科学家感兴趣的其他数据。数据目录包含关于各种数据源（无论是运营数据库、数据湖还是其他数据）中数据的信息。它有助于人工智能项目找到他们尚不了解的、可能相关的训练数据。数据目录是区分有用数据湖和无用数据沼泽的关键。它是一个赋能者，能够加速人工智能项目的工作。


    数据目录可以提供数据属性和表级别的信息。表级别信息包含三个要素（图 6-7）。首先，数据集有一个名称和唯一标识符。其次，数据集有一个描述该表内容的说明，通常还会根据公司的分类系统添加类别信息以及关键词，以便潜在的数据用户能够快速找到数据。第三，还有额外的元数据，例如发布者、发布时间、发布者是谁、数据血缘信息等。


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig7_HTML.png](img/516372_1_En_6_Fig7_HTML.png)


    图 6-7


    一个公开可用数据集的描述


    数据集描述是数据目录中最关键的信息。它使数据科学家能够搜索并识别出可能有助于训练他们当前正在开发的人工智能模型的有用数据集。


    数据目录还提供属性级别的信息，包括技术数据类型（`String` vs. `Integer`），理想情况下还包括领域数据类型（例如，一个字符串是存储员工姓名还是护照
    ID）。数据目录甚至可能提供每列的最小值和最大值。图 6-8 展示了这两个级别。


    属性的领域数据类型和数据集描述反映了一个典型的数据目录用例：查找所有包含 IBAN、客户姓名或患者记录的列，这对于法律和合规团队（例如在 GDPR 背景下）至关重要，但对数据科学家来说帮助不大。


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig8_HTML.png](img/516372_1_En_6_Fig8_HTML.png)


    图 6-8


    理解数据目录


    数据仓库自带数据目录和词汇表——而且大家都知道，建立这些目录和词汇表非常耗时。那么，人工智能组织或 IT 部门能否通过自动化创建数据湖的数据目录（例如，使用数据丢失防护（DLP）工具，如`Symantec`或`Google
    Cloud DLP`）来降低成本和人工工作量呢？

    '
- fmt: '# The Short Answer


    **Legal and compliance** teams benefit, data scientists not. `DLP` tools are great
    for finding domain data types. They identify which tables or files of databases
    and data lakes contain, for example, customer names, patient records, or religious
    affiliation information. Thus, they are perfect for identifying `GDPR`-relevant
    information. They do not help to understand the more sophisticated **semantics**
    of files and tables. Are these all customers with outstanding payments, or are
    these really important Swiss customers? Was the radiation measurement from yesterday
    or a week after the Chernobyl catastrophe? Collecting and compiling such information
    requires human work. Stringent enforcement of maintenance processes is the only
    way to ensure everybody does her tasks in this context. `IT` departments must
    technically prevent any upload of data to a data lake or the `AI` training data
    collection if the uploader does not provide a description with all information
    relevant for data scientists.


    From `Excel` and `MS Access` to dedicated commercial software, `AI` organizations
    and `IT` departments have many options for data catalogs. Reasons for opting for
    sophisticated and more expensive solutions are their integration of crowd-intelligence
    features and their support for **governance processes** – the latter matters,
    especially in times of `GDPR` or with ethical discussions becoming more critical.
    Sophisticated processes and adapters to systems enable specialists to work more
    efficiently, though this is more a compliance than an `AI` topic. **Crowd-intelligence**
    mimics advice from senior experts who help new colleagues. A senior expert would
    direct her younger colleagues to data sets they need for their work. She knows
    where to find the data when the bank clients went to which branch. She knows where
    to find the clients that clicked on the details page for mortgage products in
    the mobile banking portal. Data catalog features mimicking such advice base their
    advice on statistics about frequently used data sets and attributes or typical
    queries submitted in the past. Such advice does not need direct human input. A
    less high-tech approach to crowdsource catalog information is to let data scientists
    (or other data users) rate the relevance and quality of data sets. The latter
    one, for example, is implemented in `Qlik`’s Data Catalog using three maturity
    levels: bronze for raw data, silver for cleansed and somehow prepared data for
    data analysts to work with, and gold for reports directly useful for business
    users. Incorporating crowd-intelligence is still at an infant stage, though potentially
    soon a game-changer for the productivity of junior data scientists or data scientists
    new to a company.


    To sum up: Data catalogs are crucial for benefitting from all data in a data lake
    and from less-known data sources in a company. They are a matter of discipline
    and stringent processes when establishing and maintaining the data catalog. They
    are a big help for compliance and governance issues as well – and the upcoming
    crowd-intelligence functionality is a great chance to increase data scientists’
    productivity.


    ## Model and Code Repositories


    Repositories are a must-have technical capability for `AI` organizations aiming
    for operational smoothness. We introduced them briefly earlier. They reduce the
    risk of having no backup copy of a crucial model or mixing up `AI` model variants
    and versions. Plus, they ease collaboration when multiple data scientists and
    engineers work on the same or similar models.


    Repositories act as a hub for all `AI` models and additional data and store the
    following:


    *   The model’s **purpose**, that is, a description of what the model achieves

    *   The **AI model** itself, for example, a `Jupyter` notebook file, including
    its previous versions

    *   **Other code** with relevance to production usage (interface code from integration
    engineering) or for reproducing the model (data preparation and cleaning scripts)

    *   **Experimentation history** documenting the model quality during the training
    phase, including architectures and (hyper)parameter settings

    *   **Approvals** for production usage, for example, a workflow action like an
    “approval click” or an email uploaded to the tool


    Repositories for `AI` models can have various levels of sophistication, from just
    using `GitHub` to integrated `MLOps` platforms from public cloud providers such
    as the `Microsoft Azure Machine Learning MLOps` or specialized `AI` vendors such
    as `Verta AI` with fancy dashboards and `CI/CD` deployment pipeline integration.
    Since models are business-critical intellectual property, securing and protecting
    the repositories is mandatory.'
  raw: 'The short answer: **legal and compliance** teams benefit, data scientists
    not. DLP tools are great for finding domain data types. They identify which tables
    or files of databases and data lakes contain, for example, customer names, patient
    records, or religious affiliation information. Thus, they are perfect for identifying
    GDPR-relevant information. They do not help to understand the more sophisticated
    **semantics** of files and tables. Are these all customers with outstanding payments,
    or are these really important Swiss customers? Was the radiation measurement from
    yesterday or a week after the Chernobyl catastrophe? Collecting and compiling
    such information requires human work. Stringent enforcement of maintenance processes
    is the only way to ensure everybody does her tasks in this context. IT departments
    must technically prevent any upload of data to a data lake or the AI training
    data collection if the uploader does not provide a description with all information
    relevant for data scientists.


    From Excel and MS Access to dedicated commercial software, AI organizations and
    IT departments have many options for data catalogs. Reasons for opting for sophisticated
    and more expensive solutions are their integration of crowd-intelligence features
    and their support for **governance processes** – the latter matters, especially
    in times of GDPR or with ethical discussions becoming more critical. Sophisticated
    processes and adapters to systems enable specialists to work more efficiently,
    though this is more a compliance than an AI topic. **Crowd-intelligence** mimics
    advice from senior experts who help new colleagues. A senior expert would direct
    her younger colleagues to data sets they need for their work. She knows where
    to find the data when the bank clients went to which branch. She knows where to
    find the clients that clicked on the details page for mortgage products in the
    mobile banking portal. Data catalog features mimicking such advice base their
    advice on statistics about frequently used data sets and attributes or typical
    queries submitted in the past. Such advice does not need direct human input. A
    less high-tech approach to crowdsource catalog information is to let data scientists
    (or other data users) rate the relevance and quality of data sets. The latter
    one, for example, is implemented in Qlik’s Data Catalog using three maturity levels:
    bronze for raw data, silver for cleansed and somehow prepared data for data analysts
    to work with, and gold for reports directly useful for business users. Incorporating
    crowd-intelligence is still at an infant stage, though potentially soon a game-changer
    for the productivity of junior data scientists or data scientists new to a company.


    To sum up: Data catalogs are crucial for benefitting from all data in a data lake and
    from less-known data sources in a company. They are a matter of discipline and
    stringent processes when establishing and maintaining the data catalog. They are
    a big help for compliance and governance issues as well – and the upcoming crowd-intelligence
    functionality is a great chance to increase data scientists’ productivity.


    ### Model and Code Repositories


    Repositories are a must-have technical capability for AI organizations aiming
    for operational smoothness. We introduced them briefly earlier. They reduce the
    risk of having no backup copy of a crucial model or mixing up AI model variants
    and versions. Plus, they ease collaboration when multiple data scientists and
    engineers work on the same or similar models.


    Repositories act as a hub for all AI models and additional data and store the
    following:


    *   The model’s **purpose**, that is, a description of what the model achieves


    *   The **AI model** itself, for example, a Jupyter notebook file, including its
    previous versions


    *   **Other code** with relevance to production usage (interface code from integration
    engineering) or for reproducing the model (data preparation and cleaning scripts)


    *   **Experimentation history** documenting the model quality during the training
    phase, including architectures and (hyper)parameter settings


    *   **Approvals** for production usage, for example, a workflow action like an
    “approval click” or an email uploaded to the tool


    Repositories for AI models can have various levels of sophistication, from just
    using GitHub to integrated MLOps platforms from public cloud providers such as
    the Microsoft Azure Machine Learning MLOps or specialized AI vendors such as Verta AI
    with fancy dashboards and CI/CD deployment pipeline integration. Since models
    are business-critical intellectual property, securing and protecting the repositories
    is mandatory.'
  trans: '

    # 简短回答


    **法律与合规**团队受益，数据科学家则不然。`DLP`工具非常适合查找领域数据类型。它们能识别数据库和数据湖中哪些表或文件包含客户姓名、患者记录或宗教信仰信息等。因此，它们非常适合识别与`GDPR`相关的信息。但它们无助于理解文件和表中更复杂的**语义**。这些是所有有未付款项的客户，还是那些真正重要的瑞士客户？辐射测量值是昨天的，还是切尔诺贝利灾难后一周的？收集和整理此类信息需要人工操作。严格执行维护流程是确保每个人在此背景下完成任务的唯一途径。如果上传者未提供包含数据科学家所需全部信息的描述，`IT`部门必须从技术上阻止任何数据上传至数据湖或`AI`训练数据集合。


    从`Excel`和`MS Access`到专用商业软件，`AI`组织和`IT`部门在数据目录方面有多种选择。选择复杂且更昂贵解决方案的原因在于它们集成了群体智能功能，并支持**治理流程**——后者尤为重要，尤其是在`GDPR`时代或伦理讨论日益关键的背景下。复杂的流程和系统适配器使专家能够更高效地工作，尽管这更多是合规而非`AI`议题。**群体智能**模拟资深专家帮助新同事的建议。资深专家会指导年轻同事找到工作所需的数据集。她知道当银行客户前往哪个分行时，在哪里能找到数据。她知道在哪里能找到在移动银行门户中点击抵押贷款产品详情页面的客户。模拟此类建议的数据目录功能，其建议基于对常用数据集和属性或过去提交的典型查询的统计。此类建议无需直接的人工输入。一种不那么高科技的众包目录信息方法是让数据科学家（或其他数据用户）对数据集的相关性和质量进行评分。例如，后者在`Qlik`的数据目录中通过三个成熟度级别实现：青铜级代表原始数据，白银级代表经过清洗并初步处理、可供数据分析师使用的数据，黄金级代表可直接供业务用户使用的报告。融入群体智能仍处于初级阶段，但可能很快会成为初级数据科学家或新入职公司数据科学家生产力的游戏规则改变者。


    总结：数据目录对于充分利用数据湖中的所有数据以及公司中不太知名的数据源至关重要。在建立和维护数据目录时，这关乎纪律和严格的流程。它们对合规和治理问题也有很大帮助——而即将到来的群体智能功能是提高数据科学家生产力的绝佳机会。


    ## 模型与代码仓库


    仓库是追求运营顺畅的`AI`组织必备的技术能力。我们之前简要介绍过它们。它们降低了关键模型无备份副本或混淆`AI`模型变体与版本的风险。此外，当多位数据科学家和工程师处理相同或相似模型时，它们还能简化协作。


    仓库充当所有`AI`模型及附加数据的中心枢纽，并存储以下内容：


    *   模型的**目的**，即对模型实现功能的描述

    *   **AI 模型**本身，例如一个`Jupyter`笔记本文件，包括其先前版本

    *   与生产使用相关的**其他代码**（来自集成工程的接口代码）或用于复现模型的代码（数据准备和清理脚本）

    *   记录训练阶段模型质量的**实验历史**，包括架构和（超）参数设置

    *   生产使用的**审批**，例如“审批点击”等工作流操作，或上传至工具中的电子邮件


    `AI`模型的仓库可以有各种复杂程度，从仅使用`GitHub`，到来自公有云提供商（如`Microsoft Azure Machine Learning MLOps`）或专业`AI`供应商（如`Verta
    AI`，配备炫酷仪表盘和`CI/CD`部署流水线集成）的集成式`MLOps`平台。由于模型是业务关键型知识产权，因此必须确保仓库的安全和保护。

    '
- fmt: '### Executing AI Models


    Superior AI models are great for improving a company’s operational efficiency
    if integrated into the organization’s operational processes. In other words, applications
    invoke AI models for predictions or classifications. Besides precalculation without
    any integration, we discussed two approaches for technical integration earlier:
    `AI runtime server` and `integrating models into the application’s code-base`
    by reimplementing them. We already discussed these topics from an integration
    engineering and a testing perspective – here, we focus on more architectural aspects.


    Integrating the model by reimplementing them as part of the application code means
    that the architectural responsibility is not within the AI organization. The software
    architect and the software development team are responsible. The same applies
    to running their software solution.


    There are various implementation options for an AI model runtime environment,
    mainly AI platforms from commercial vendors, open-source solutions, and the unique
    setup of edge computing/edge intelligence.


    **Commercial AI Vendor Platforms** such as `SAS` or `Dataiku` or public cloud
    providers have a common and straightforward sales proposition: convenience, user-friendliness,
    and high productivity. They provide AI runtime environments easing not only the
    model training but also deployment and usage. Customers pay for these convenience
    and productivity benefits. Plus, they implicitly accept a vendor-lock-in, for
    example, if data scientists cannot transfer the data preparation and cleansing
    on a new platform.


    One important remark. There are de-facto commercial platforms looking like “free”
    or marketed with providing “open source” components. They might even not charge
    any fees for software or integrated development environments and marketing using
    open-source components and industry standards. Still, they can generate a (cloud)
    vendor lock-in. You might not pay software license fees, but you pay by not being
    able to shift your workload quickly to other (cloud) vendors. When opting for
    “free” or “open-source” technologies in the cloud, AI organizations should check
    this detail because accepting a vendor lock-in opens up many more opportunities
    when choosing an AI platform.


    Architecting an **open source-based AI platform** means putting together various
    open-source components to build an environment tailored to the needs of a concrete
    AI organization. For example, training models in `Jupyter` notebooks, using `GitHub`
    as a repository and pushing the results packaged as a `Docker` container to a
    public cloud provider for scalable execution or to run them on an internal cluster.
    The AI organization (and their internal customers) can discuss who runs and monitors
    the models or whether they become part of the actual code-base.


    Finally, there is **edge intelligence**. Edge intelligence means that inference
    does not occur only in the company’s data center or a cloud data center, but that
    there are edge servers deployed in all regions taking over the AI inference (Figure
    [6-9](#516372_1_En_6_Chapter.xhtml#Fig9)). The physical proximity solves latency
    issues, for example, when devices in the Australian outback invoke a prediction
    service on a server in Iceland.


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig9_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig9_HTML.png)


    Figure 6-9


    Edge Intelligence


    Edge intelligence makes sense for IoT solutions with devices with limited compute
    and storage capacity. The assumption is that these devices cannot run AI interference
    locally. Over time, probably a second use case will gain more importance: protecting
    your AI models as crucial intellectual property. Companies might avoid deploying
    AI models to IoT devices to prevent competitors from getting access to a model
    by buying or stealing a device running AI models on them.


    AI organizations can deploy an edge intelligence pattern themselves. However,
    relying on a cloud provider eases the deployment, primarily when potentially benefitting
    from other features, for example, integrating IoT devices and using the AI or
    data management features. To prevent from getting too naïvely into a cloud provider
    lock-in situation, having a transparent AI and cloud strategy helps – for IoT
    and edge intelligence and your AI platform.


    ## AI and Data Management Architectures


    While the previous section was about AI environments, we look now at how the AI
    environment fits in and benefits from an organization’s overall data management
    architecture – and how AI relates to similar other services. Figure [6-10](#516372_1_En_6_Chapter.xhtml#Fig10)
    provides a high-level overview with all relevant components and concepts, including,
    obviously, data warehouses.


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig10_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig10_HTML.png)


    Figure 6-10


    Architectural Blueprint for Traditional and New Business Intelligence Architectures'
