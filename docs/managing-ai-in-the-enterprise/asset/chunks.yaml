- fmt: '# Summary


    This chapter explained every AI organization’s potentially most apparent and vital
    task: delivering an AI project. It elaborated the various facets and layers of
    AI innovation, scoping AI projects, and how AI models such as statistical or neural
    network models – the core delivery of every AI project – look in practice. Further,
    the chapter elaborated on the development process of AI models and the integration
    in a corporate IT application landscape. With this knowledge, the next big challenge
    for AI project managers is obvious: How can AI project managers validate whether
    an AI model behaves as expected and provides the needed prediction or classification
    quality?


    # 3. Quality Assurance in and for AI


    With AI influencing important decisions in companies, organizations, and our private
    lives, the quality of AI models becomes a concern for managers and citizens alike.
    Sales success depends on targeting customers with personalized and fitting products.
    In the medical area, researchers want to identify Covid-infected persons by letting
    an AI model analyze how persons cough into a microphone. These two simple examples
    prove: AI passed the tipping point from harmless, academic experimentation to
    real-life solutions. The time has come that AI projects require auditable quality
    assurance and testing. Errors can impact financial results severely or threaten
    human lives. Data scientists, test managers, and product owners cannot continue
    treating AI models as magical, always correct black boxes created by brilliant-minded,
    impeccable, and sacrosanct specialists.


    Consequently, this chapter elaborates on how to structure and manage preventive
    quality assurance by taking a closer look at the following topics:


    - **Model Quality Metrics** measuring the quality of AI models and making models
    comparable. They prove or disprove whether the models are as good and valuable
    as the data scientists promise.

    - **QA Stages** defining a structured process when and in which order projects
    must calculate quality metrics based on which data. These stages ensure a smooth
    progression of AI projects towards ready-to-use AI models. They avoid wild, unfocused,
    and untransparent experimentations.

    - **Model Monitoring** continuously checks whether AI models deliver reasonable
    prediction and classification quality weeks and months after the deployment.

    - **Data Quality** reflecting the high impact of good data on the prediction and
    classification quality of the trained AI models.

    - **Integration Testing** looking at whether the AI model and the rest of the
    application landscape interact correctly.


    Figure [3-1](#516372_1_En_3_Chapter.xhtml#Fig1) summarizes and illustrates the
    dependencies of these topics. The following sections look at the respective topic
    boxes in detail.


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig1_HTML.png](images/516372_1_En_3_Chapter/516372_1_En_3_Fig1_HTML.png)


    Figure 3-1 Quality Assurance and Artificial Intelligence – The Big Picture


    ## AI Model Quality Metrics


    A basic understanding of AI quality metrics enables AI project managers to talk
    “data science” with their team members with postgraduate degrees in math, statistics,
    or computer science and give them the impression of understanding them. Does the
    equation `y=67*x[6]+54*x[5]+23*x[4]+54*x[3]-9*x[2]+69*x[1]+42` provide an adequate
    price estimation for used cars? Or should we replace `54` with `53` or with `-8`?
    Just looking at a linear equation or thousands of weights of a neural network
    does not allow us to judge whether an AI model works appropriately in reality.


    ### Performance Metrics for Classification


    The best known and most widely used quality assurance metrics for classifications
    – does a customer buy a bag or is this a cat image – is the **confusion matrix**.
    A confusion matrix allows comparing the quality of models trained with the same
    algorithm, for example, two logistic regressions basing on differently prepared
    data. Also, it enables comparing models trained with different algorithms, for
    example, one with a neural network and one with a logistic regression algorithm.


    Figure [3-2](#516372_1_En_3_Chapter.xhtml#Fig2) illustrates an AI model for classification
    that takes images as input and tries to determine whether an image contains a
    dog. Four of the five images classified as dog images are indeed truly dog images.
    Thus, the confusion matrix has the value four in the *true positives* cell. The
    one image wrongly classified as “true”/“dog” results in the value 1 for *false
    positives* in the confusion matrix. The AI model did classify various images in
    Figure [3-2](#516372_1_En_3_Chapter.xhtml#Fig2) not to be dog images. That is
    correct for four cases (*false positives*) and wrong twice (*false negatives*).


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig2_HTML.png](images/516372_1_En_3_Chapter/516372_1_En_3_Fig2_HTML.png)


    Figure 3-2 Image Classification – Look at an Image and Decide to Which of the
    Two Classes It Belongs, Dog or Cat


    The confusion matrix is the foundation for three advanced metrics:


    - **Accuracy** is the percentage of correctly classified images. Basically, this
    is the number of images with dogs correctly identified as such, plus the number
    of images correctly classified not to contain a dog divided by the overall number
    of images. In the example, the calculation goes as follows:


    `Accuracy = (4 + 4) / (4 + 4 + 1 + 2) = 8 / 11 ≈ 73%`


    - **Precision** reflects how many of the images classified (correctly or incorrectly)
    as dogs are really dogs. In our dog example, the calculation is:


    `Precision = 4 / (4 + 1) = 80%`


    - **Recall** focus on how many of the “true” cases – images with dogs in our example
    – the AI model identifies. In our example, the AI model identifies four out of
    six images with dogs:


    `Recall = 4 / (4 + 2) = 67%`


    Obviously, the higher precision and recall – the lower the number of false negatives
    and false positives, respectively – the better the AI model. Optimizing both,
    precision and recall, is sensible, desirable, and necessary. However, ultimately,
    projects have to decide which of the two is more important. The choice depends
    on the usage scenario. It is often a trade-off once the model reaches a good prediction
    quality and should be improved further.


    Sample scenario one is a credit card company. They process millions of payments
    per day. Their earnings are 0.1% of the transaction volume. So, a CHF 2000 payment
    generates CHF 2 revenue. A fraudulent payment means that the credit card company
    has to write off the total amount. Thus, letting one fraudulent payment slip through
    has a massive impact on revenues. In such a scenario, the credit card company
    prefers a high recall rate and accepts a lower precision rate. They block as many
    potentially fraudulent payments as they can identify. Obviously, there are limitations.
    Blocking too many payments reduces the income, and customers change to competitors
    if they cannot use their cards adequately in their daily lives.


    Scenario two – determining stocks that potentially outperform competitors – is
    an example of optimizing precision. A hedge fund might prefer an AI model that
    identifies five stocks outperforming the market over a model that proposes twenty
    stocks if share prices plunge next week for half of the twenty.


    These two sample scenarios illustrate that project managers need a vision of how
    they position the project in the precision vs. recall continuum. They can even
    provide a formula for the data scientists in an ideal world, for example, five
    false positives are equally harmful as two false negatives. Data scientists feed
    this information as input to the AI model training algorithms.'
