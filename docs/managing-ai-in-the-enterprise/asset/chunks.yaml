- fmt: '### Pantheistic Intelligence


    Pantheistic intelligence reflects that neither data warehousing teams nor AI organizations
    have a monopoly on collecting massive amounts of data and generating additional
    insights with AI methods. Software vendors enhance conventional products with
    AI features, whether they develop core banking systems, building control applications,
    or network management and monitoring solutions (Figure [6-11](#516372_1_En_6_Chapter.xhtml#Fig11)).


    For example, a network team might want to speed up the resolution time for customer
    incidents by identifying a root cause quicker. A typical scenario: a WLAN router
    crashes, causing hundreds of devices being not reachable anymore, and resulting
    in hundreds of incidents from monitoring. This flood of incidents hinders network
    support engineers from identifying the crashed router as the root cause.


    In such a situation, the AI organization could offer help to train a model for
    identifying root causes when there are several “real” incidents causing massive
    amounts of secondary, non-root-cause incidents. AI specialists train a model based
    on very few cases. They get the needed training data from a monitoring team, or
    by creating interfaces to all network and hardware devices. But there is a quicker
    solution: The network management buys a network monitoring and management solution
    that comes with interfaces for devices from all important manufacturers and contains
    an AI component besides the classic network management and monitoring features.
    `Moogsoft` is such a software provider. You have to provide a lot of data and
    do a lot of training, but still, would you go for the ready-to-use standard software
    or choose self-development if you are the head of networking in your organization?


    Pantheistic intelligence is a reality. More and more software vendors incorporate
    AI functionality in their products. Thus, AI organizations might gravitate to
    strategic applications with a direct customer and business impact, for which the
    company wants to integrate data from various sources to build a superior model
    to achieve a competitive advantage.


    ### New Data Categories


    Master data and transactional data, this was what most systems could store some
    years ago. Today, new data categories are standard such as log and behavioral
    data, IoT data, or external data.


    It was a long time ago when online fashion shops just kept your shipping address
    and order history. Companies today are data-hungry and store and analyze behavioral
    data. How do customers navigate in an online fashion shop? Which items do they
    scroll over, and which things make them pause for one – or ten – seconds? Often,
    such data comes from log files. IoT devices deliver sensor data such as pressure
    and temperature information – or pictures and video streams. They are core building
    blocks for digitizing new business sectors such as logistics, manufacturing, or
    production – or the basis for innovating the core products of technology and industry
    companies.


    If companies do not have the needed data internally, they rely more and more on
    external data providers. External data can be “paid for” data, for example, regarding
    customer creditworthiness or validating shipping addresses. Many countries and
    public offices also make their data publicly available for free, for example,
    as part of “open data” initiatives. Such external data often comes in an easy-to-use
    form, such as tables in CSV files. When AI organizations identify such valuable
    external data to be beneficial, they can easily integrate the data. In contrast,
    behavior data, log file data, and IoT data typically require more data preparation
    until an AI organization can integrate the data and use it for training purposes.
    Such investment might not pay off for each small AI case. Still, it is an excellent
    chance for optimizing AI models that have a considerable impact on corporate success,
    be it customer understanding or optimized logistics.


    ## Cloud Services and AI Architecture


    The public cloud providers open a gigantic innovation potential, especially for
    SMEs, to integrate highly innovative, ready-to-use technologies without upfront
    investment. They change how IT organizations work, how they think and approach
    AI, and are the most significant influence factor on AI architectures for the
    2020s.


    Cloud computing builds on three main pillars:


    *   Infrastructure as a Service (IaaS)

    *   Platform as a Service (PaaS)

    *   Software as a Service (SaaS)


    Best known are IaaS and SaaS. Everyone has been using Software-as-a-Service solutions
    already for years: `Google Docs`, `Salesforce`, and `Hotmail` are well-known examples.
    They are convenient for users – and the IT department. SaaS takes away the burden
    of installing, maintaining, and upgrading software. Using an AI solution in the
    web, for example, managed `Jupyter` notebook environments, makes own installations
    obsolete – though the effort for integrating them with other company systems should
    not be underestimated.


    IaaS – Infrastructure-as-a-Service – thrives as well. Many IT departments migrated
    some or all their servers to the cloud. They rent computing and storage capacity
    from a cloud vendor in the cloud provider’s data center. Thus, IT departments
    do not have to buy, install, and run servers anymore – or care about data center
    buildings and electrical installations. IaaS brings major benefits for AI organizations
    because they solve the issue with highly fluctuating processing needs. AI organizations
    do not have to buy hardware with enough capacity for extreme loads for training
    large AI models once a month. Instead, they rent as much as necessary and when
    necessary. They get immediate and unlimited scalability, high reliability, or
    any combination of that.


    IaaS and SaaS revolutionize IT service delivery. Pushing a button gets you a VM.
    Office O365 makes installing software patches on company servers obsolete. Quicker
    and cheaper – but neither IaaS nor SaaS enables you to build revolutionary new
    services and products for your customer. PaaS – Platform-as-a-Service – opens
    up this opportunity. PaaS is a game-changer for fast-paced innovations. Every
    AI department should closely monitor the innovation pipeline of the cloud providers.


    With PaaS, software developers and AI specialists assemble and run applications
    and services with ready-to-use building blocks such as databases, data pipes,
    or tools for development, integration, and deployment without dealing with complex
    installations or IT operations. The real game-changer is the massive investment
    of the big cloud service providers into production-ready AI services from computer
    vision to text extraction, aiming to make state-of-the-art AI technology usable
    by developers without AI background. Plus, they have exotic-obscure offerings
    such as ground station for satellite data or for building augmented reality applications
    – and they allow third party providers to make their software available, hoping
    for a network effect as known from the iStore or the PlayStore.


    These PaaS services also impact AI organizations, and not every data scientist
    might be happy about every change. If a cloud provider offers image recognition,
    there is no need and opportunity to train generic AI models anymore themselves.
    Application developers use these services instead of asking the AI organization
    to train an AI model. For example, they need as much time to integrate AWS’s `Rekognition`
    service as for writing a `printf`-command – and as a result, they know whether
    a person smiles on a picture and whether there are cars on the same image. Commodity
    AI services will come from the cloud. Consequently, AI organizations might have
    to move to more complex, company-specific tasks and build and maintain more extensive
    AI solutions – or lend out engineers with knowledge of, for example, Azure’s AI
    functionality.'
