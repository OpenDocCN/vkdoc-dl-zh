    quality assurance, and deployments using tools such as Jira or ServiceNow. This
    old-world approach focuses on auditability. It is mandatory for many organizations
    and potentially binding for AI organizations and how they create and deploy models.
    The newer trend is that developers and data scientists automate the release building
    and deployment using CI/CD pipelines. They make manual work redundant. They save
    time and reduce the risk of deployment mistakes (wrong environment, wrong model,
    wrong parameters, etc.). AI managers should check whether their processes are
    fully integrated into the company’s change management processes, rely on the same
    tooling, and fulfill the audit requirements.


    2.  **Code conversion** functionality helps data scientists and software developers
    when they work with different technologies. One of the options discussed in previous
    chapters for integrating an AI model into a software solution is to (re)code the
    model in the programming language the solution developers use. Data scientists
    or software engineers can perform this task manually, obviously an error-prone
    activity. Alternatively, code conversion packages automate this step. The more
    development languages and the more different AI tools a company uses, the more
    critical is this aspect.


    3.  Data scientists must store models as valuable corporate assets in a central
    **repository**. A repository guarantees that models do not get lost or deleted
    by mistake, enables collaboration between data scientists, and ensures auditability.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig18_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig18_HTML.png)


    Figure 5-18


    Model Management in a Corporate Context


    The repository needs some additional explanation. AI organizations can, for example,
    use the IT department’s code repository that they set up for software engineering.
    An AI organization would store, obviously, the AI model’s parameters and hyperparameters.
    Furthermore, additional information is vital for the deployment process, for searching
    for models, or for surviving audits. Such potential additional information is:


    *   The data preparation and model training **code**, accompanied by the actual
    **data or a reference to the data**. Only this combination enables data scientists
    to recreate precisely the same model at a later time.


    *   **Data lineage** documenting how the data got from the source to the point
    it became training data. For example, does the financial data come from the enterprise
    data warehouse or an obscure Excel created by a trainee in the housekeeping department
    and copied and modified by five teams afterward?


    *   **Scores** measuring the model performance. They document the rigidness of
    the quality assurance activities and prove the adequacy of the model.


    *   **Audit logs** documenting crucial activities such as who changed the training
    code or data preparation or deployed the model to which environment.


    *   **Tags** storing additional information. Examples are the data scientists
    that worked on the projects, the exact purpose of a model, or why a data scientist
    used a particular hyperparameter value.'
  trans: '

    ### 模型管理


    “它是我的，我告诉你。我自己的。我的宝贝。是的，我的宝贝。”《指环王》中的这句名言，罕见地表达了对一件器物的珍视与痴迷。AI 组织也应如此，像对待宝贵的公司资产和知识产权一样，精心呵护它们的
    AI 模型。这正是模型管理的任务。


    模型管理面临的真正 IT 或 AI 挑战有限。尽管如此，它仍是所有 AI 运维挑战中技术性最强的一个。它涵盖三个主要方面。第一个方面涉及 CRISP-DM
    模型工程过程中的质量保证。第二个方面是部署后模型质量的监控与管理。第三个也是最后一个方面，是组织如何在模型的生命周期内将其作为工件进行管理（图 5-15）。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig15_HTML.png](img/516372_1_En_5_Fig15_HTML.png)


    图 5-15


    模型管理中的主题


    前一章完全致力于模型创建过程中的质量保证，并对部署后的质量度量做了简要说明。下文我们将从一个不同的视角进行阐述。


    `被动方法`是一种`自动化模型评分`和`KPI 监控`，用于检测输入数据以及由此产生的预测或分类中的变化（“漂移”）（图 5-16）。输入数据分布是否发生变化？或者更具体地说，例如，其平均值或上下限值是否发生变化？输出分布是否随时间变化？或者业务影响是否发生变化，例如转化率下降？当监控检测到某个
    KPI 低于阈值时，它可以为数据科学家生成警报，提示他们重新训练 AI 模型。最简单的选择是使用最新的数据（如果旧数据仍然相关且有用，也可能包含旧数据）训练相同的神经网络架构。最全面的重新训练方法是重复完整的模型开发过程，包括特征开发和超参数优化。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig16_HTML.png](img/516372_1_En_5_Fig16_HTML.png)


    图 5-16


    分析模型、神经网络与漂移


    这是一种被动方法，因为只有当可检测到的 KPI 衰减表明需要时，才会启动重新训练。另一方面，`主动`方法则是在 KPI 看起来仍然良好时也进行重新训练。`冠军-挑战者模式`就属于这一类。当前投入生产的模型是冠军模型。尽管该模型（仍然）满足质量要求，但数据科学家已经在准备一个名为挑战者模型的新模型。数据科学家依赖最新数据或尝试更复杂的优化，并比较冠军模型和挑战者模型的性能。如果挑战者模型优于冠军模型，则挑战者模型成为新的冠军模型。否则，数据科学家将丢弃挑战者模型，并开始开发下一个模型。图
    5-17 说明了这种冠军-挑战者竞赛。通常，冠军-挑战者模式是一种试图找到最佳解决方案的 A/B 测试。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig17_HTML.png](img/516372_1_En_5_Fig17_HTML.png)


    图 5-17


    冠军-挑战者模式


    除了质量方面，将`模型视为工件`并优化其处理，以及希望其在公司流程中顺利推进，是模型管理的另一个主题。数据科学家使用它们、共享它们、记录它们、存储和归档它们，或者对它们进行版本控制。许多任务在软件工程中很常见；其他则是新的。然而，有三个方面尤其相关（图
    5-18）：


    1.  基于工具的`托管部署流程`或`管道`强制执行公司规程，并降低运营风险和障碍。传统的 IT 组织倾向于使用诸如 `Jira` 或 `ServiceNow`
    之类的工具，为签署需求、质量保证和部署实施复杂的审批流程。这种旧式方法侧重于可审计性。这对许多组织来说是强制性的，并且可能对 AI 组织及其创建和部署模型的方式具有约束力。较新的趋势是开发人员和数据科学家使用
    CI/CD 管道自动化发布构建和部署。他们使手动工作变得多余。他们节省了时间，并降低了部署错误（错误的环境、错误的模型、错误的参数等）的风险。AI 管理者应检查其流程是否完全整合到公司的变更管理流程中，是否依赖相同的工具，并满足审计要求。


    2.  `代码转换`功能可帮助数据科学家和软件开发人员在使用不同技术时协同工作。前几章讨论的将 AI 模型集成到软件解决方案中的选项之一，是使用解决方案开发人员使用的编程语言（重新）编写模型代码。数据科学家或软件工程师可以手动执行此任务，但这显然容易出错。或者，代码转换包可以自动化此步骤。公司使用的开发语言和不同的
    AI 工具越多，这方面就越关键。


    3.  数据科学家必须将模型作为宝贵的公司资产存储在中央`存储库`中。存储库可确保模型不会丢失或被意外删除，支持数据科学家之间的协作，并确保可审计性。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig18_HTML.png](img/516372_1_En_5_Fig18_HTML.png)


    图 5-18


    企业环境中的模型管理


    存储库需要一些额外的说明。例如，AI 组织可以使用 IT 部门为软件工程设置的代码存储库。显然，AI 组织会存储 AI 模型的参数和超参数。此外，附加信息对于部署过程、搜索模型或通过审计至关重要。这些可能的附加信息包括：


    *   数据准备和模型训练`代码`，以及实际的`数据或对数据的引用`。只有这种组合才能使数据科学家在以后精确地重现相同的模型。


    *   `数据谱系`，记录数据从源头到成为训练数据的整个过程。例如，财务数据是来自企业数据仓库，还是来自一个由后勤部门的实习生创建、随后被五个团队复制和修改的晦涩难懂的
    Excel 文件？


    *   衡量模型性能的`评分`。它们记录了质量保证活动的严谨性，并证明了模型的充分性。


    *   `审计日志`，记录关键活动，例如谁更改了训练代码或数据准备，或者将模型部署到了哪个环境。


    *   `标签`，用于存储附加信息。例如，参与项目的数据科学家、模型的具体用途，或者数据科学家为何使用特定的超参数值。

