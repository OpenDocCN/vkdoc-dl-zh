  trans: '

    # 人工智能与法规


    虽然遵守道德标准是强烈建议的，但并非强制。而遵守法规则是必须的。在法规方面，全球的政策制定者近年来已通过多项法律，并正在准备更多直接影响人工智能组织的法规。这些法规主要有两种形式：


    *   **数据保护法**，规定了公司可以存储哪些数据、如何使用这些数据，以及必须满足哪些附加条件（例如，透明度、被遗忘权）。

    *   **人工智能算法法规**，例如欧盟的《人工智能法案》提案，它影响着算法如何处理数据以及哪些用例是可接受的。


    欧盟针对数据爆炸以及数据利用领域由人工智能驱动的革命，出台了新的法律。下一节将介绍欧盟两项具有里程碑意义的法规：《通用数据保护条例》和欧盟新的《人工智能法案》提案。许多其他国家至少是在《通用数据保护条例》方面效仿了这一模式。


    相比之下，美国的许多相关法规是在人工智能背景下对现有法律和规则的重新诠释。因此，作为第三个例子，我们来看看美国联邦贸易委员会将现有原则应用于人工智能领域的方法。


    在审视这些法规之前，有一点需要说明：读者应牢记，法规不仅反映了学术界关于人工智能伦理的讨论。法规也旨在促进创新，并确保本国经济能在全球范围内竞争。


    ## 数据隐私法：以《通用数据保护条例》为例


    当今全球数据隐私的黄金标准是欧盟于 2018 年 5 月颁布的《通用数据保护条例》。《通用数据保护条例》在全球范围内如此知名（且令人畏惧），是因为它结合了两点：首先，罚款高达
    2000 万欧元或公司全球营业额的 4%；其次，简单来说，只要公司处理欧盟公民的数据，它就具有全球适用性。无论公司的注册地在哪里，也无论他们在何处存储和处理这些数据。


    《通用数据保护条例》定义了数据处理的七项原则——公司及其人工智能组织必须遵守的义务和限制。在人工智能组织或具体软件解决方案的设计阶段就遵循这些原则，是最容易（且成本最低）的实施方式。“**隐私设计**”或“默认隐私”这些术语反映了从一开始就考虑隐私的雄心，而不是试图在后期以某种方式将其塞入代码中。


    七项原则中的第一项要求**合法性、公正性和透明度**。任何数据处理都需要法律依据，例如客户同意、法律义务或必要性。公正性要求不误导用户，例如，不误导用户他们正在与谁联系，或者他们批准和接受了什么。


    第二项原则是**目的限制**。当公司收集数据时，他们必须清楚透明地说明日后处理这些数据的目的。所声明的目的限制并约束了未来为训练人工智能模型而对数据进行处理和使用的行为（除非有其他合法依据）。第三，**数据最小化**要求仅收集和存储实现既定目的所需的数据。**准确性**要求个人数据正确无误且不具误导性——否则应予以更正。**存储限制**涉及数据存储的时长。公司不得在必要时间之后继续存储个人数据。


    **安全原则**（也称为完整性和保密性）要求你保护数据安全。许多公司的 IT 安全部门负责处理此事。此外，后续章节将探讨如何保护训练数据、环境以及训练好的人工智能模型。


    最后是**问责制**原则，它要求你对处理个人数据承担责任。


    人工智能组织必须遵循这些原则，即使这会带来额外的工作。特别是，人工智能组织必须了解数据的来源以及数据科学家可以将其用于何种目的（数据沿袭）。此外，仅仅声明遵守这些原则无异于埋下一颗定时炸弹，即使人工智能组织确实遵守了。他们需要文档作为**审计证据**。


    《通用数据保护条例》还规定了其他义务。例如，公司必须应自然人要求确认是否处理了与其相关的任何数据，并提供所有这些数据的副本。自然人还有权获得额外信息，例如公司存储其数据的时长、数据来源、数据接收方或处理目的（**数据主体访问请求**）。公司需要拥有一个涵盖所有应用程序、处理和外部数据传输的全面**目录**。如果你不知道自己在何处存储了哪些数据，就无法向请求者提供其所有个人数据。对于高风险数据处理，例如涉及人员追踪和监控或敏感个人数据的处理，还需要进行**数据保护影响评估**。因此，人工智能组织必须确保遵循由
    IT 部门、数据保护官或法律与合规团队制定的公司指南，以便为下一次审计——或下一位数据主体的请求——做好准备。

    '
- fmt: '### The EU’s “AI Act” Proposal


    On April 21st in 2021, the European Commission released a proposal for an Artificial
    Intelligence Act to foster the adoption of AI while addressing the risks associated
    with the new technology. The proposed legislation regulates AI algorithms broadly,
    from statistical approaches, over logic or knowledge-based systems, including
    expert systems, to supervised or unsupervised learning, deep learning, and other
    methodologies. The proposed AI act applies to AI systems within the EU’s jurisdiction
    and AI systems outside if their output is used within the EU – and to companies,
    public agencies, and governmental offices, but excluding systems for military
    use. Violations of the AI act can result in fines of up to 6% of a company’s global
    revenues, compared to “only” 4% in the case of GDPR violations.


    The proposed regulation categorizes AI systems into four categories: systems with
    unacceptable risks, with high risks, with limited risks, and systems with minimal
    risks only (Figure [4-4](#516372_1_En_4_Chapter.xhtml#Fig4)).


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig4_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig4_HTML.png)


    **Figure 4-4** The AI Act’s Risk Pyramid


    The planned AI regulation lists forbidden AI use cases considered as unacceptable
    risks. These are, first, systems using subliminal techniques or exploiting specific
    vulnerabilities of individuals resulting in harming the person herself or others
    physically or psychologically. Second, the proposed act forbids AI systems for
    social scoring by or on behalf of public authorities using data collected in different
    contexts or if the scores have a disproportional impact on individuals. Third,
    real-time remote biometric information systems in publicly accessible spaces are
    forbidden unless in the context of very specific crimes.


    High-risk AI systems form the second category. Safety and health-related AI systems
    and components fall into this category, for example, systems for cars and trains
    or for medical devices. Also, AI systems for the following eight usages:


    *   Real-time or deferred biometric-based identification of persons

    *   Managing and operating critical infrastructures such as water supply

    *   Education and vocational training use cases deciding about the admission and
    assignment to educational institutions

    *   Recruitment processes, promotion or termination decisions, task allocation,
    and employee performance evaluation

    *   Decision-making about public assistance benefits, for dispatching and prioritizing
    emergency first response services, and for credit scoring

    *   Certain law enforcement use cases such as predicting whether persons will
    do an offense (again) or detecting the emotional state of a person

    *   Migration, asylum, and border control management, including polygraph use
    cases, assessing whether persons pose security risks or verifying the authenticity
    of documents

    *   Administration of justice and democratic processes with use cases such as
    researching facts and the law plus applying the law to case-specific facts


    The proposed EU regulation does not forbid high-risk systems. Instead, the regulation
    lays out specific requirements for them. Companies have to identify and evaluate
    known and foreseeable risks in accordance with the intended usage purpose, thereby
    taking reasonably foreseeable misuses into account. A one-time assessment when
    developing or setting up such systems is not sufficient. Companies and their AI
    organizations have to continuously manage these risks over the system’s lifecycle,
    considering insights gained during the production usage of the models.


    There are additional detailed requirements for high-risk AI systems such as technical
    documentation, logging critical events, communicating the system’s accuracy or
    robustness, and allowing for and ensuring human oversight.


    The third category contains systems with limited risks. They have to follow specific
    transparency requirements. AI systems interacting with humans must unveil their
    non-human nature. When systems incorporate emotion recognition or biometric categorization
    systems, they have to inform the users. Finally, any system manipulating images,
    audio, and video content (“deep fakes”) must make this transparent.


    The minimal risk AI systems form the final fourth category. According to the EU,
    the majority of today’s use cases fall into this category. The act does not regulate
    them but proposes establishing codes of conduct for them.


    The proposed AI act results from a more than three-year process. Still, additional
    changes are likely until the act comes into force. Furthermore, the EU works on
    additional regulations impacting AI organizations, for example, related to liability
    questions. Most probably, other countries will put similar laws in place in the
    years to come, with this proposed EU AI act potentially having a significant impact
    and acting as a spiritus rector. Thus, AI organizations from outside the EU benefit
    from understanding these EU concepts, too.


    ### The Federal Trade Commission’s Approach in the US


    The Federal Trade Commission (FTC) bases its regulation of AI systems on existing
    laws. The US agency’s responsibility covers enforcing antitrust laws and fostering
    customer protection by preventing unfair, deceptive, or anti-competitive practices.
    The agency understands AI as a new technical approach for automated decision-making.
    So, the FTC does not focus on algorithm types to decide whether it is a “relevant”
    AI system; the FTC focuses on whether a system makes automated decisions. It regulates
    AI systems based on existing, older laws: the Federal Trade Commission Act (Section
    5), the Fair Credit Reporting Act (FCRA), and the Equal Credit Opportunity Act
    (ECOA). Based on them, the FTC developed rules and guidelines for AI systems.
    The most relevant ones are:


    *   Transparency about the use of AI. For example, imitating human behavior without
    telling customers can be illegal.

    *   Transparency about the data collection, that is, no secret or behind-the-customer’s-back
    collection of data without consumers being aware.

    *   Transparency whether automated rules change the deal, for example, by automatically
    lowering credit lines based on spending patterns.

    *   Right of customers to get access to their data stored and correct the wrong
    information. Depending on the exact circumstances, companies are obliged to have
    up-to-date, accurate data about their customers.

    *   Ability to provide customers the most relevant influencing factors resulting
    in the company denying a particular customer a specific request. For scores, a
    company has to be able to explain the underlying concept and to name the four
    key factors that impact an individual’s specific score most.

    *   No discrimination on what represents protected classes in the US: race, color,
    religion, national origin, sex, marital status, age, or whether someone gets public
    assistance. Ensuring non-discriminating models requires adequate input data plus
    verifying the resulting AI model. The discussion on AI ethics provides helpful
    background information.


    Not all of the rules apply to each kind of customer or contract. However, they
    exemplify how existing laws regulate new AI organizations – and can be quite a
    challenge. A data scientist might have the perfect AI model for credit scoring
    beating everything the banks have in place yet. However, if he cannot list the
    four main factors influencing an individual’s credit score, the bank must not
    use the model. Thus, when looking at these rules, it is not surprising that the
    ability to understand and explain how AI models work recently got much attention.
    The terms used for this trend are “explainability” and “explainable AI.”'
