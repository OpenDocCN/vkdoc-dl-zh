  raw: '### From Scoping Questions to Business Cases


    The scoping questions help AI project managers to clarify many details before
    inviting senior data scientists and software architects (or external vendors)
    to work on a high-level project plan.


    A project plan at this stage identifies the main milestones and potential valuable
    intermediate deliverables such as a minimal viable product. It states when which
    milestones can be roughly achieved and lists the needed resources. Resources cover
    how many engineers with specific skills are necessary, potentially highlighting
    internal candidates for critical roles. Resources cover as well the financials
    for external staff, licenses, and computing infrastructure, whether internal servers,
    powerful laptops, or public cloud resources.


    Preparing a project plan and the needed resources is standard for project managers
    for non-AI and AI projects. Often, they have to follow company-specific mandatory
    rules and processes and fill out standard templates.


    A business case just covering a project plan and expenses would be incomplete.
    The management wants to understand the benefits and the potential return of investment
    as well. The previous chapter covered potential benefits of AI projects already
    in more detail.


    Eventually, the big day comes. A senior manager or a management committee decides
    whether you, as an AI project manager, get the funding for the project based on
    your business case. You maximize your chances with a clear scope, a convincing
    high-level project plan, and target-specific elaborated business benefits. If
    you get the funding, the data scientists are happy to prepare for and start working
    on the envisioned AI model, their core project deliverable.


    ## Understanding AI Models


    AI models aim to solve particular, narrow problems. A model might get CCTV footage
    as input and provide as output whether a “moving thing” on the camera is a harmless
    cat or a potential burglar. Over more than half a century, research and engineering
    in AI came up with various approaches to generate such insights. They fall into
    two main categories: computational intelligence and symbolic artificial intelligence.


    Solutions based on **symbolic artificial intelligence** represent knowledge explicitly,
    for example, using first-order logic or a formal language. The systems have formal
    operations or rules that operate on their symbolic knowledge. Such systems were
    popular when I went to university in the late 1990s. Thus, some readers might
    be familiar with the names of some of the concepts and languages in this area,
    such asstate-space, means-end analysis, blocks world, expert systems, or Prolog
    and Lisp.


    An easy-to-understand example is the following Prolog code fragment. The system
    knows some facts about who likes whom in a small group:


    ```

    /* Let''s start with some facts ... */

    likes(peter, john) /* Peter likes John*/

    likes(peter, andrea) /* Peter likes Andrea*/

    likes(peter, sophie) /* Peter likes Sophie*/

    likes(john, peter) /*John likes Peter*/

    ```


    Interference rules generate new knowledge and drive the system’s reasoning. In
    this example, a rule defines being friends as two persons who reciprocally like
    each other.


    ```

    /* A rule to define friendship ... */

    friends(x, y) :- likes (x,y), likes (y,x)

    ```


    Posing a query to Prolog starts the reasoning process. The system tries to prove
    or disprove a statement (Are Andrea and John friends?) or determine values for
    which the query is correct (Who are Peter’s friends?).


    ```

    /* Let''s pose queries to let the system reason a bit ... */

    ?- friends(john, andrea)

    No

    ?- friends(peter, X)

    X = john

    ```


    Today, the second big group of AI methods, **computational intelligence** , is
    much more popular. It approaches knowledge and facts representation and reasoning
    and insights generation entirely differently. Computational intelligence methods
    store information or facts as numbers. There is no explicit knowledge representation.
    Insights generation means multiplying and manipulating big matrixes.


    Figure [2-7](#516372_1_En_2_Chapter.xhtml#Fig7) provides an example. The input
    picture is a big matrix with numbers representing color and brightness. The system
    then implements matrix operations – the reasoning and insights generation. The
    figure contains the very first matrix operation, which averages cell values to
    reduce the matrix size. After some more matrix operations, the system states whether
    the image is a car, truck, boat, or plane.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig7_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig7_HTML.png)


    Figure 2-7


    Computational Intelligence: Image Content Representation by Numbers, Further Processing
    Also Based on Numerical Operations, in This Case by Calculating the Input as the
    First Processing and Reasoning Step. (Picture source: [https://​pixabay.​com/​photos/​vw-beetle-oldtimer-classic-1396111/​](https://pixabay.com/photos/vw-beetle-oldtimer-classic-1396111/))


