  trans: '

    ### 云-AI 风险缓解


    许多 AI 组织在迁移上云方面走在了时代前列，这反而给他们带来了麻烦。海量数据、高度波动的计算需求，以及公有云中现成的先进 AI 框架，促使数据科学家和 AI
    专家迅速采用云服务。而公司其他部门及 IT 安全组织可能仍在云迁移的途中。大多数 AI 组织已经身处云端。因此，与传统的本地部署环境相比，AI 组织不得不承担更多与安全相关的任务。因此，AI
    管理者、数据科学家和工程师若能对主要安全风险有基本了解，将受益匪浅。


    在详细阐述*在*云中的风险之前，我们先来看看迁移*到*云时，特别是迁移到全球大型云服务商时，所面临的独特**合规风险**。首先，公有云提供商提供众多不同的服务，从计算和存储到针对物联网或区块链的非常具体的利基服务。并非每项服务在每个区域都可用——而且，数据科学家和工程师的实际配置甚至决定了数据最终是否位于具有适当**司法管辖权**的数据中心内。配置时点错一次，数据科学家或数据工程师就可能将欧盟数据传输到美国，这通常是个大问题。其次，**《云法案》**意味着美国当局甚至可能访问非美国数据中心的数据。这些数据传输或潜在的数据暴露，对于监管机构来说可能是不可接受的。第三，存在**制裁**风险。在这种情况下，公司可能不得不立即切换到另一个司法管辖区的新的云服务提供商。在本地部署的世界中，当公司受到制裁时，即使安全补丁被扣留，软件仍能继续运行。相比之下，在云中，对所有数据和软件的访问会立即被封锁——这对于经合组织国家中即使是较小的公司和政府机构来说也是一个真实的风险，正如德国萨斯尼茨港的例子所示。该港口每年处理
    220 万吨货物，与鹿特丹港的 4.69 亿吨相比微不足道。它由当地城市和一个德国联邦州共同拥有。经济上无关紧要，所有者背景稳固——却处于一场管道争议的中心，导致美国威胁要制裁该港口。如果这样一家公司的物流，例如，依赖于公有云中的
    AI 框架，会发生什么？


    一旦 AI 组织决定迁移到云，特定的安全风险就会出现并变得具有新的相关性。图 7-13 概述了需要云特定**技术安全措施**的风险领域。如果 AI 组织拥有独立的云或单独的租户，这些措施很重要；但如果与公司其他部门运行在同一个租户中，其重要性则较低。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig13_HTML.png](img/516372_1_En_7_Fig13_HTML.png)


    图 7-13


    AI 组织的云安全风险


    第一个风险领域涉及用户访问。数据科学家和工程师必须连接并登录到云（图 7-10，1）。如果 AI 组织不使用与组织其他部门相同的云环境，他们可能会绕过公司的中央**用户和访问管理**及
    Active Directory。因此，管理新员工、处理离职员工或调岗员工就变成了一个问题。比员工被保安带出大楼更麻烦的事情是：如果这位前员工在接下来的数周甚至数月内仍能访问云，从而有机会进行报复，因为
    Active Directory 已被锁定，但“在外”的云账户却未被禁用。此外，大多数公司强制实施**多因素身份验证**。如今，仅使用用户名和密码登录已不被认可。员工需要
    RSA 密钥或手机上的特殊应用程序。公有云也提供这些功能，但默认情况下并未强制执行。


    **服务账户**是第二个领域，这是一个非常相似的话题（图 7-10，2）。本地部署环境或公司的其他云环境需要与 AI 组织的云租户进行交互：


    *   训练数据必须传输到 AI 环境。

    *   如果运行时环境在本地，或者模型成为应用程序代码的一部分，则可能需要将训练好的 AI 模型移回本地环境。

    *   训练好的模型可能依赖云作为 AI 运行时环境。那么，公司的各种应用程序必须能够调用云上的 AI 模型进行推理。


    服务账户面临的挑战是防止密码或访问密钥被盗用的问题。如果数据工程师离开公司，复制了密码，并在数周甚至数月内持续拥有云访问权限，那将是一场灾难。


    **暴露于互联网的平台即服务**是第三个风险领域（图 7-10，3）——并且这是公有云独有的。数据库或对象存储是 Web 服务。应用程序——以及攻击者——可能从公共互联网访问它们。两者都可以以相同的方式调用
    AI 模型以及更多服务和资源。工程师应将其配置为仅允许来自特定 IP 地址的经过身份验证的用户访问。然而，错误配置可能导致数据公开暴露。大多数云数据泄露都是此类错误配置的结果，而非复杂的攻击。


    需要澄清的是，对于基础设施即服务（如虚拟机）来说，这种风险并不那么突出。意外地将虚拟机开放到互联网，需要比在 PaaS 世界中多得多错误配置。


    第四个主题是云中的**安全运维**。谁负责处理安全事件、检查日志和分析警告？（图 7-10，4）


    这些云风险领域并非 AI 组织所独有。每位工程师都应了解它们。然而，目前大多数公司正处于过渡阶段。AI 组织可能无法获得 IT 安全部门的常规支持。假设 AI
    组织单方面决定建立一个 AI 云。在这种情况下，他们需要负责安全工程和安全运维。他们不能指望 IT 安全组织会帮助他们。AI 管理者可能很快会意识到：审计人员不会同情一个拥有大量数据但缺乏足够
    IT 安全知识的 AI 云。最后，更糟糕的是，审计人员期望 AI 云遵循与组织其他部分相同的规范和标准，例如，包括 ISO 27000 信息安全标准。

