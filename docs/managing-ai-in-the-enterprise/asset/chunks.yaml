- fmt: '# 排版后的内容


    On the other hand, AI services from the public cloud require some governance.
    IT departments and AI organizations should not be too naïve. First, cloud services
    are not free. Business cases are still needed, especially if you are in a low-margin
    market and need to call many expensive cloud services. Second, the market power
    changes. Some companies pressed their smaller IT suppliers for discounts every
    year. Cloud vendors play in a different league. Third, using specific niche services
    – the exotic ones which help you to design unique products and services to beat
    your competitors – result in a cloud vendor lock-in.


    The cloud-vendor lock-in for platform-as-a-service cannot be avoided. Enterprise,
    solutions, and AI architects must manage this unpleasant reality. A simple measure
    is separating solutions and components based on their expected lifetime. “Boring”
    backend components run for decades. IT departments must be able to move them easily
    to a different cloud vendor with little effort. Then, there are innovative, short-lived
    services, mobile apps, or web-frontends. They have a life expectancy of less than
    a decade – plus, every new head of marketing or brand officer demands fundamental
    changes. For such solutions, vendor lock-in is of less concern. You can change
    the technology platform anyhow every few years when developing the next version.


    The implications for an AI organization are crystal clear:


    *   Data preparation and data cleaning activities are probably the artifacts that
    have the most extended lifespan. Being able to reuse them when changing the platform
    is essential.

    *   The platform for “do-it-yourself” AI model development does not matter too
    much. All platforms support linear regression and neural networks. Retraining
    these models is less of an issue if the data preparation works.

    *   PaaS offerings such as labeling support, object detection, or speech recognition
    result in a high vendor locking. They are not standardized; functionality and
    interfaces differ.


    Vendor lock-ins are painful. Some vendors are feared for their creativity to play
    around with licensing and pricing every year. On the other side, organizations
    cannot prevent any form of lock-in, especially if the alternative is missing out
    on the quick wins of AI PaaS services. Being attacked by more innovative competitors
    using the power of PaaS is not a viable alternative. IT departments might ignore
    cost-savings and agility improvements IaaS and SaaS promise, but AI organizations
    should be careful when rejecting AI PaaS services as innovation opportunities.


    ## Summary


    The first architectural challenge for AI organizations is to organize their AI
    environment for training AI models and, potentially, for inference using the trained
    AI models. There are apparent components such as training areas with Jupyter notebooks,
    plus data storage such as databases or data lakes for the training data. However,
    only well-maintained data catalogs actually lift the data treasures in data lakes
    – and without data ingestion and data integration solutions in place, updating
    the training data is a nightmare. Model management helps keep track of the existing
    AI models and their versions, preventing chaos such as losing models or deploying
    outdated ones. AI organizations might also manage AI runtime environments for
    inference – or solutions teams take over the models, integrate them in their code,
    and run the application without the involvement of the AI organization.


    AI organizations can only efficiently operate if they get their hands on the necessary
    data. Thus, it is vital to be aware of the options such as directly exporting
    data from operation databases, IoT devices, data lakes, or external sources. Still,
    the best sources are data warehouses: well-documented, well-maintained, consistent
    data covering many domains. A data warehouse enables AI organizations to create
    AI models for various new areas or business questions quickly.


    In the coming years, more and more AI environments will move to the cloud. Paying
    only for compute resources when training a model is a significant booster for
    resource effectiveness. However, the biggest change to AI organizations is the
    AI PaaS services making training standard services such as plain-vanilla image
    detection obsolete and freeing up data scientists to work on the tough company-specific
    topics.


    # 7. Securing and Protecting AI Environments


    Once upon a time, IT and information security were simple. IT security specialists
    deployed malware agents and set up a firewall – and the organization was safe.
    Today, information security is much more exciting and complex, requiring everyone’s
    contribution. Even data scientists in AI organizations must be aware and contribute
    to security – and AI managers might suddenly get accountable and responsible for
    proper security measures for their organizations’ AI infrastructure. The pressure
    is ubiquitous, but not the necessary know-how – especially not in AI organizations.
    To complicate matters, many senior IT security and risk professionals do not have
    an in-depth understanding of AI methodologies and techniques they assess. A dilemma
    for which this chapter provides the solution by addressing four topics:


    *   The CIA triangle describing the central aims for IT and information security

    *   Collaboration patterns and responsibility distribution between IT security
    and the AI organization

    *   AI-specific security threats and risk scenarios, including potential attackers
    and assets under attack

    *   Concrete technical and procedural measures to mitigate AI-related risks and
    improve the overall level of security


    Figure [7-1](#516372_1_En_7_Chapter.xhtml#Fig1) visualizes their interdependencies.
    The following pages elaborate the topics in detail.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig1_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig1_HTML.png)


    Figure 7-1


    IT Security Risks – The Big Picture'
