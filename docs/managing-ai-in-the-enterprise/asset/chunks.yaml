  trans: '

    # 构建 AI 环境架构


    对于组织的效率和能力而言，工具是核心赋能因素。工具会影响并决定 AI 组织能够交付的服务类型及其工作效率。


    我们在前文章节中已经探讨过 Jupyter Notebook。它有助于创建和优化 AI 模型。在此，我们将拓宽视角，审视 AI 组织高效运作所需的其他赋能系统（图
    6-1）。


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig1_HTML.png](img/516372_1_En_6_Fig1_HTML.png)


    图 6-1


    AI 组织的应用全景


    ## 将数据导入 AI 环境


    训练 AI 模型并将其应用于实际数据进行推理，需要充足的数据。这些数据可能来自运营系统、数据仓库、物理传感器、日志文件或其他数据源。挑战在于构建一种架构，能够将所有潜在相关数据输送至
    AI 训练环境，或输送至生产系统中使用已训练 AI 模型执行推理的组件（图 6-2）。


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig2_HTML.png](img/516372_1_En_6_Fig2_HTML.png)


    图 6-2


    AI 组织的数据导入场景


    训练和推理用例在设置和技术解决方案上相似，但存在两点细微差异。对于**训练数据**，经验法则是：**越多越好**。每个数据点包含更多属性，会增加更多属性被证明与模型相关并对其产生贡献的几率。无论模型是进行预测还是分类，其准确性都会提升。更多行数据能使模型更稳定，更多表则能支持更广泛的用例。如果输入变量不相关，它们最终不会成为模型的一部分。


    **推理数据**作为已训练就绪的 AI 模型的输入。这类数据描述了 AI 模型进行预测或分类的当前情境。例如，数据可能描述化学反应器的状态，模型则预测反应器是否会在接下来一小时内爆炸。此类
    AI 模型拥有一组输入参数。数据科学家或自动化工具必须精确提供所有这些输入参数的当前值。数据更多并无益处。假设模型需要五分钟前的反应器压力，那么即使我们知道两天前或一分钟前的压力——甚至撒哈拉沙漠明天的天气预报——预测结果也不会改善。模型无法将此类非必要数据纳入其预测和分类中。


    虽然非必要数据对推理无用，但架构的灵活性仍是明智之举。重新训练后的 AI 模型下一版本可能会增加两个属性。理想情况下，数据科学家拥有一种架构，允许通过重新配置（即无需修改代码）从已连接的组件中移除属性或添加新属性。


    训练数据与推理数据之间的第二个细微差别在于不同的**数据交付频率**。模型重新训练是数据科学家偶尔进行的活动，例如每隔几周一次。推理则更为频繁。例如，市场部门可能每周运行两次
    AI 解决方案，通过预测哪些文章和广告对哪些客户最有效，来实现新闻通讯的个性化。甚至实时推理也是可能的，例如在客户浏览在线商店时，针对特定广告和商品进行精准推送。


    数据交付或数据导入的**技术实现**可以基于现有的数据集成模式（图 6-3）。大多数公司已经运行着一个或多个合适的系统。接下来几段讨论的特性有助于向内部数据集成团队或外部供应商及集成合作伙伴传达需求。当然，如果
    AI 组织对潜在可行的模式有所了解，也会大有裨益。


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig3_HTML.png](img/516372_1_En_6_Fig3_HTML.png)


    图 6-3


    选定的数据集成模式

    '
- fmt: '# 数据库集成模式


    最著名的数据库相关集成模式可能是**数据库联邦模式**。联邦定义了来自不同数据库的数据库模式如何相互关联。该模式允许查询多个数据库中的表，甚至可以在不知道也不关心它们位于哪个数据库的情况下进行连接。考虑到两个AI数据摄取用例，联邦模式无助于将数据从运营数据库获取到训练环境或用于推理的生产系统。


    **双向模式**保持两个（或多个）系统中的冗余数据一致。例如，一个解决方案在苏黎世有一个数据库，在新加坡有一个数据库，以减少数据访问延迟。两者存储相同的数据。双向更新模式使应用程序和用户能够写入其区域数据库，而不仅仅是写入一个全局主数据库。诸如“同步”或“关联”之类的双向模式，会将一个数据库中的更改传播到另一个数据库并更新那里的数据——对用户和应用程序完全透明。


    用于训练或推理数据的双向模式会迅速将运营数据库中的新数据或更新数据转发到训练和推理环境。然而，它们也会产生不希望的且可能灾难性的后果：假设一位数据科学家在训练环境中删除了包含当月所有付款记录的表。由于每次更新都会同步到另一个数据库，这些数据就会从运营数据库中消失。这不是一个好主意！因此，双向模式不适合数据摄取用例。我们需要一种模式，确保更新和数据从运营数据库（或传感器、数据仓库、日志等）流向AI环境，而不是反向流动。


    三种**单向模式**特别相关。第一种是**一次性复制模式**。数据库管理员或数据科学家手动将数据从源系统复制到训练环境，以训练AI模型并随后运行推理。这种模式避免了在自动化数据复制上的投资，需要手动工作。典型的用例包括概念验证、支持独特战略决策（扩展到拉丁美洲还是太平洋地区？）的AI模型，或者需要不频繁重新训练且源系统可能变化的AI模型。


    第二种单向模式是**提取、转换、加载（ETL）流程模式**。它在数据仓库中广为人知。该模式包含三个步骤：提取、转换和加载。它们分别代表提取源系统的相关数据，转换数据以匹配目标模式（包括数据清洗和整合），以及将数据加载到目标系统。数据科学家或工程师通常使用SQL脚本实现这些步骤。一个编排组件调用并执行它们，确保稳定可靠的执行，例如每周日凌晨2:30执行。


    `ETL`流程模式是批处理的典型示例。你随时间收集数据；然后，系统一次性处理所有收集到的数据。该模式适用于需要数据用于定期重新训练或预计算推理结果的AI用例。举个例子：一家银行想知道客户最可能额外购买的产品。在每个月开始时，银行用最新的客户行为和数据更新训练数据，并重新训练其AI模型。然后，银行（预）计算每个客户的下一个最佳产品。当客户登录其移动应用或联系呼叫中心时，系统或呼叫中心代理向客户推荐该产品。它从预计算的数据中获取信息，不需要任何在线推理。


    `ETL`集成模式可能是对于支持和优化关键业务运营流程与决策的AI组织来说最相关的模式。计算每周或每月哪些客户可能取消电话套餐并不是最具创新性的用例。但是，这些用例确保了众多AI组织的资金，因为它们的商业价值是可清晰衡量的——对于此类用例，`ETL`模式完美适用。


    第三种单向模式是**事件驱动架构模式**。物理或虚拟世界中的变化——一个新的传感器值或客户点击时尚商品——会触发一个事件。事件通过使用诸如`Apache Kafka`等技术互联的应用程序和组件流动。事件路由是业务逻辑的一部分。它决定哪些系统看到并处理哪些事件。与`ETL`流程模式有两个相关区别。第一，（近）实时处理。第二，发布-订阅通信风格。组件将事件放入诸如“客户操作”或“天气传感器CDG”之类的通道。其他组件订阅通道以接收并处理这些事件。它们可能将结果放入另一个通道以触发后续处理。这是一种完全去中心化的计算模型。


    事件驱动架构允许实时处理。以（近）实时方式交付*训练*数据没有好处，因为重新训练不会那么频繁发生。然而，某些用例受益于实时*推理*。


    然而，集成模式和技术选择应经过深思熟虑。切换模式或技术会耗费时间和金钱。对于较大的组织来说，这是一项复杂的任务。因此，AI组织也应考虑生命周期方面。两三年后有哪些集成模式可用？IT部门对`ETL`工具有什么计划？事件驱动架构很少是必需的，但使用它们可以成为保护投资的战略举措，因为IT部门正朝着这个方向发展。理想情况下，AI组织应确保其与IT部门的集成架构保持一致。


    所以，总结一下，单向模式是将训练数据摄取到训练环境以及将数据交付给AI模型进行推理的解决方案。在回答以下三个问题后，为训练和推理数据摄取选择合适的模式就变得轻而易举：


    *   你在训练环境中多久构建或重新训练一次模型？

    *   AI模型是用于实时推理，还是推理活动作为批处理作业执行（例如，在每个月开始时）？

    *   未来几年，集成架构在集成模式和工具方面的路线图是什么？'
  raw: 'The probably best-known database-related integration pattern is the **database
    federation pattern** . A federation defines how database schemata from various
    databases relate to each other. The pattern allows querying tables from multiple
    databases and even joining them without knowing and caring in which database they
    reside. When considering the two AI data ingestion use cases, the federation pattern
    does not help to get data from operational databases to training environments
    or production systems for inference.


    **Bi-directional patterns** keep redundant data in two (or more) systems consistent.
    For example, a solution has one database in Zurich and one in Singapore to reduce
    data access latencies. Both store the same data. Bi-directional update patterns
    enable applications and users to write to their regional databases, not just one
    global master. Bi-directional patterns, such as “synchronization” or “correlation,”
    propagate the changes done in one database to the other database and update the
    data there – entirely transparent for the users and applications.


    Bi-directional patterns for training or inference data would promptly forward
    new or updated data from operational databases to the training and inference environment.
    However, they also have unwanted and potentially catastrophic consequences: Suppose
    a data scientist deletes the table with all payments of the current month in the
    training environment. Since every update is synchronized to the other database,
    the data disappears from the operational database. Not a good idea! Thus, bidirectional
    patterns do not fit the data ingestion use cases. We need a pattern that ensures
    that updates and data flow from the operational databases (or sensors, data warehouses,
    logs, etc.) to the AI environment, not vice versa.


    Three **one-directional patterns** are of particular relevance. The first one
    is the **one-time copy pattern**. A database administrator or a data scientist
    copies data manually from the source systems to the training environment to train
    an AI model and run inference afterward. This pattern avoids investments into
    automating data copies and requires manual work. Typical use cases are a proof-of-concept,
    AI models supporting unique strategic decisions (expand to Latin America or the
    Pacific region?), or AI models requiring infrequent retraining with potentially
    changing source systems.


    The second one-directional pattern is the **Extract, Transform, Load (ETL) process**
    pattern. It is well-known from data warehouses. The pattern has three steps: extract,
    transform, and load. They represent extracting the source system’s relevant data,
    transforming the data to match the target schema, including data cleansing and
    consolidation, and loading the data into the target system. Data scientists or
    engineers implement these steps typically in SQL scripts. An orchestration component
    invokes and executes them, ensuring a stable and reliable execution, for example,
    every Sunday at 2:30 am.


    The ETL process pattern is a typical example of batch processing. You collect
    data over time; then, the system processes all the collected data together at
    once. The pattern fits AI use cases that require data for periodical retraining
    or precalculating inference results. To give an example: A bank wants to know
    the product a client most likely buys additionally. At the beginning of each month,
    the bank updates the training data with the newest customer behavior and data
    and retrains its AI model. Then, the bank (pre-)calculates the next best product
    for each customer. When the customer logs in on his mobile app or contacts the
    call center, the system or the call center agent proposes this product to the
    client. It takes the information from the precalculated data, not requiring any
    online inference.


    The ETL integration pattern is probably the most relevant for an AI organization
    supporting and optimizing business-critical operational processes and decisions.
    Calculating every week or month which customers might cancel phone plans is not
    the most innovative use case. Still, these are the ones ensuring the funding for
    many AI organizations since their business value is clearly measurable – and for
    such use cases, the ETL pattern works perfectly.


    The third one-directional pattern is the **event-driven architecture** pattern.
    Changes in the physical or virtual world – a new sensor value or a customer clicking
    on a fashion item – trigger an event. Events flow through interconnected applications
    and components using technology such as Apache Kafka. The event routing is part
    of the business logic. It determines which systems see and process which events.
    There are two relevant differences to the ETL process pattern. First, the (near)
    real-time processing. Second, the publish-and-subscribe communication style. Components
    put events into channels such as “customer actions” or “weather sensor CDG.” Other
    components subscribe to channels to receive and process these events. Potentially,
    they put the result into another channel to trigger follow-up processing. It is
    an utterly decentralized computing model.


    Event-driven architectures allow for real-time processing. There is no benefit
    in delivering *training* data in (near) real-time since retraining does not occur
    so often. However, some use cases benefit from real-time *inference*.


    The choice of the integration pattern and technology, however, should be well
    thought out. Switching the pattern or technology costs time and money. It is a
    complex undertaking for larger organizations. Thus, the AI organization should
    incorporate the life-cycle aspect as well. Which integration patterns are available
    in two or three years? What does the IT department plan for ETL tools? Event-driven
    architectures are seldom necessary, but using them can be a strategic move to
    protect investments since IT departments move in this direction. Ideally, the
    AI organization ensures it is aligned with the IT department’s integration architecture.


    So, to sum up, one-directional patterns are the solution for ingesting training
    data into training environments and for delivering data for inference to AI models.
    Choosing a fitting pattern for training and inference data ingestion is a child’s
    play after answering three questions:


    *   How often do you build or retrain a model in your training environment?


    *   Is the AI model used for real-time inference, or are the inference activities
    performed as batch jobs, for example, at the beginning of each month?


    *   What is the integration architecture’s roadmap for integration patterns and
    tools over the next years?'
  trans: '

    # 数据库集成模式


    最著名的数据库相关集成模式可能是**数据库联邦模式**。联邦定义了来自不同数据库的数据库模式如何相互关联。该模式允许查询多个数据库中的表，甚至可以在不知道也不关心它们位于哪个数据库的情况下进行连接。考虑到两个
    AI 数据摄取用例，联邦模式无助于将数据从运营数据库获取到训练环境或用于推理的生产系统。


    **双向模式**保持两个（或多个）系统中的冗余数据一致。例如，一个解决方案在苏黎世有一个数据库，在新加坡有一个数据库，以减少数据访问延迟。两者存储相同的数据。双向更新模式使应用程序和用户能够写入其区域数据库，而不仅仅是写入一个全局主数据库。诸如“同步”或“关联”之类的双向模式，会将一个数据库中的更改传播到另一个数据库并更新那里的数据——对用户和应用程序完全透明。


    用于训练或推理数据的双向模式会迅速将运营数据库中的新数据或更新数据转发到训练和推理环境。然而，它们也会产生不希望的且可能灾难性的后果：假设一位数据科学家在训练环境中删除了包含当月所有付款记录的表。由于每次更新都会同步到另一个数据库，这些数据就会从运营数据库中消失。这不是一个好主意！因此，双向模式不适合数据摄取用例。我们需要一种模式，确保更新和数据从运营数据库（或传感器、数据仓库、日志等）流向
    AI 环境，而不是反向流动。


    三种**单向模式**特别相关。第一种是**一次性复制模式**。数据库管理员或数据科学家手动将数据从源系统复制到训练环境，以训练 AI 模型并随后运行推理。这种模式避免了在自动化数据复制上的投资，需要手动工作。典型的用例包括概念验证、支持独特战略决策（扩展到拉丁美洲还是太平洋地区？）的
    AI 模型，或者需要不频繁重新训练且源系统可能变化的 AI 模型。


    第二种单向模式是**提取、转换、加载（ETL）流程模式**。它在数据仓库中广为人知。该模式包含三个步骤：提取、转换和加载。它们分别代表提取源系统的相关数据，转换数据以匹配目标模式（包括数据清洗和整合），以及将数据加载到目标系统。数据科学家或工程师通常使用
    SQL 脚本实现这些步骤。一个编排组件调用并执行它们，确保稳定可靠的执行，例如每周日凌晨 2:30 执行。


    `ETL`流程模式是批处理的典型示例。你随时间收集数据；然后，系统一次性处理所有收集到的数据。该模式适用于需要数据用于定期重新训练或预计算推理结果的 AI
    用例。举个例子：一家银行想知道客户最可能额外购买的产品。在每个月开始时，银行用最新的客户行为和数据更新训练数据，并重新训练其 AI 模型。然后，银行（预）计算每个客户的下一个最佳产品。当客户登录其移动应用或联系呼叫中心时，系统或呼叫中心代理向客户推荐该产品。它从预计算的数据中获取信息，不需要任何在线推理。


    `ETL`集成模式可能是对于支持和优化关键业务运营流程与决策的 AI 组织来说最相关的模式。计算每周或每月哪些客户可能取消电话套餐并不是最具创新性的用例。但是，这些用例确保了众多
    AI 组织的资金，因为它们的商业价值是可清晰衡量的——对于此类用例，`ETL`模式完美适用。


    第三种单向模式是**事件驱动架构模式**。物理或虚拟世界中的变化——一个新的传感器值或客户点击时尚商品——会触发一个事件。事件通过使用诸如`Apache Kafka`等技术互联的应用程序和组件流动。事件路由是业务逻辑的一部分。它决定哪些系统看到并处理哪些事件。与`ETL`流程模式有两个相关区别。第一，（近）实时处理。第二，发布-订阅通信风格。组件将事件放入诸如“客户操作”或“天气传感器
    CDG”之类的通道。其他组件订阅通道以接收并处理这些事件。它们可能将结果放入另一个通道以触发后续处理。这是一种完全去中心化的计算模型。


    事件驱动架构允许实时处理。以（近）实时方式交付*训练*数据没有好处，因为重新训练不会那么频繁发生。然而，某些用例受益于实时*推理*。


    然而，集成模式和技术选择应经过深思熟虑。切换模式或技术会耗费时间和金钱。对于较大的组织来说，这是一项复杂的任务。因此，AI 组织也应考虑生命周期方面。两三年后有哪些集成模式可用？IT
    部门对`ETL`工具有什么计划？事件驱动架构很少是必需的，但使用它们可以成为保护投资的战略举措，因为 IT 部门正朝着这个方向发展。理想情况下，AI 组织应确保其与
    IT 部门的集成架构保持一致。


    所以，总结一下，单向模式是将训练数据摄取到训练环境以及将数据交付给 AI 模型进行推理的解决方案。在回答以下三个问题后，为训练和推理数据摄取选择合适的模式就变得轻而易举：


    *   你在训练环境中多久构建或重新训练一次模型？

    *   AI 模型是用于实时推理，还是推理活动作为批处理作业执行（例如，在每个月开始时）？

    *   未来几年，集成架构在集成模式和工具方面的路线图是什么？

    '
- fmt: '### Storing Training Data


    Training data ingestion patterns deliver data into the AI training environment,
    which has to store this data. A multitude of traditional and new technologies
    exist for storing data (Figure [6-4](#516372_1_En_6_Chapter.xhtml#Fig4)). AI organizations
    should make an informed decision on which ones to use in their training environment.


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig4_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig4_HTML.png)


    **Figure 6-4** Options for Storing Training Data


    The most popular form for organizing, processing, and storing structured, table-like
    data are `SQL` databases, under which we also subsume `data warehouse` technology.


    Data warehouses are optimized for executing complex queries against large data
    sets most efficiently (OLAP – online analytical processing). Architects and database
    administrators rely on specialized schemata and table structures for more efficient
    query execution (“star” and “snowflake” schema). In contrast, OLTP – online transaction
    processing – optimized databases support higher transaction rates, that is, reading,
    writing, and updating one or a few rows. For most AI use cases, the difference
    between OLTP- or OLAP-optimized databases should not have a considerable impact
    (at least if there are not too complex queries for extracting data). Most probably,
    most data processing takes place in `Jupyter` notebooks, not in the database.


    An `SQL` database for storing (some of) the training data is a must for an AI
    organization, though other technologies might be needed as well. The relevance
    of `SQL` databases bases on the fact that most (business and/or corporate) data
    reside in `SQL` databases in tables. Tables have the data structure AI training
    algorithms need as input. Thus, transforming data into a different structure to
    store the data usually causes costs without providing any benefits.


    `SQL` databases have additional advantages. First, staffing projects is easy because
    `SQL` know-how is widely available on the market. Second, most IT departments
    have database administrators that can help with complex technical questions. The
    AI organization does not need specialized know-how. Finally, an AI organization
    needs just a plain-vanilla `SQL` database without advanced features. So, license-cost-free
    databases such as `Maria DB` are perfectly suitable.


    While database and data warehouse technologies are from the last millennium, the
    rise of `No-SQL` – Not only SQL – databases are a phenomenon of the 2010s. The
    world of `No-SQL` databases is heterogeneous from focusing on scalability (by
    reducing on transactional guarantees) over schema-on-read (we see this with data
    lakes as well) up to different data structures. The latter is the focus here:
    key-value stores, document databases, and graph databases. They all store data
    differently.


    The data model of **key-value stores** is truly minimal – pairs of a key and a
    value, such as `<114.5.82.4, 20.07.2020 09:32>`. Retrieving the value (e.g., the
    last time the IP address connected to a database) requires the key (e.g., an IP
    address). AI organizations can store such key-value pairs easily in `SQL` databases.
    Thereby, they prevent setting up a technology zoo.


    **Document databases** store – surprise – documents. Documents are semi-structured,
    with the most popular formats being `XML` and `JSON`. Documents allow nesting
    attributes and do not enforce a fixed attribute structure. A typical `JSON` document
    looks as follows:


    ```

    {

    "article": {

    "title": "Mobile Testing",

    "journal": "ACM SIGSOFT Software Engineering Notes"

    "author": {

    "firstname": "Klaus",

    "lastname": "Haller"

    }

    }

    }

    ```


    An AI organization should challenge the need for setting up one or more dedicated
    document databases in their AI training environment, even if source data comes
    from document databases. There are good alternatives, though `SQL` databases are
    usually none. Due to the semi-structured nature of documents, `SQL` databases
    with strict schemata are generally not a good fit. In contrast, data lakes and
    object stores are potential alternatives we discuss later in this section.


    **Graph databases** make modeling and querying complex interconnected topics and
    relationships intuitive. Social networks are an excellent application area. A
    graph consists of nodes and of edges that connect nodes. Nodes can, for example,
    represent persons or topics. Both nodes and edges can have attributes to store
    additional information. Figure [6-5](#516372_1_En_6_Chapter.xhtml#Fig5) contains
    various node types: individual persons, a band named Spice Girls, their albums,
    and some of their songs. The edges represent the relationships like being part
    of the band, having released a particular album, or a song being part of an album.


    While applications based on graph databases can retrieve exciting results and
    insights, there is no technical requirement to perform such an analysis in a graph
    database rather than an `SQL` database. Graph databases cannot store data or data
    relations you cannot put into an `SQL` database. Graph databases are more an optimization.
    They ease writing queries for specific scenarios or allow for quicker query execution.
    Should an AI organization add a graph database to its technology stack? The answer
    depends on the circumstances. Does the AI organization have to run a graph database
    itself, or does the IT department have an expert team running them, or can they
    use a software-as-a-service graph database service freeing the AI organization
    from installation, maintenance, and patching? Is this data widely worked with,
    and does the graph database store important, relevant information? How is the
    intention to use the graph-structured data for training AI models? Are there performance
    issues in `SQL` databases that cannot be solved otherwise? Graph databases require
    a business case to validate that they bring a financial benefit compared to not
    using them in the AI environment.


    ![../images/516372_1_En_6_Chapter/516372_1_En_6_Fig5_HTML.png](images/516372_1_En_6_Chapter/516372_1_En_6_Fig5_HTML.png)


    **Figure 6-5** Representing the Spice Girls in a Graph Database


    A **data lake** is a suitable choice for massive amounts of data stored in files,
    even petabytes. In contrast to a simple file system, data lakes allow searching
    for the content of files and aggregating information. For example, count the number
    of “Potential Breach” log entries in the folder structure `2021/07/*` and its
    subfolders to understand whether there are more incidents than the month before.
    Data lakes implement a schema-on-read functionality but operate – in contrast
    to document databases incorporated into applications – on massive data sets covering
    data from various applications. There is no need to define a data structure or
    schema, just where and how to look for relevant attributes within a file. Thus,
    the data lake continues executing a query without throwing an exception if not
    finding the attribute, implying that there is no direct feedback if specific attributes
    do not exist – other than in case of `SQL` databases.


    AI organizations earlier or later have to deal with semi- or unstructured data.
    They have to store such data somewhere, and, typically, `SQL` databases are not
    adequate. Is a `Hadoop` data lake the right choice? It requires effort to set
    up and maintain. If you are a big organization, maybe. Smaller organizations can
    use a data lake service in the cloud.'
