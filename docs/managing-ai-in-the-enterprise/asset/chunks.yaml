  trans: '

    **多类分类**意味着分类结果不仅仅是“是/否”，而可以是狗、猫、乌龟或长颈鹿。在商业场景中，此类 AI 模型可能会预测客户的下一个最佳产品。银行顾问应该向客户推销股票基金、抵押贷款还是金卡？


    多类分类需要一个扩展的混淆矩阵，如表 3-1 所示。每个类别都需要对应的行和列。同样，该矩阵允许比较预测结果和实际情况。


    **表 3-1** 多类分类的混淆矩阵示例


    | | 预测：信用卡 | 预测：抵押贷款 | 预测：股票基金 | 预测：储蓄计划 |

    |---|---|---|---|---|

    | 实际购买：信用卡 | 189 | 5 | 8 | 7 |

    | 实际购买：抵押贷款 | 12 | 25 | 5 | 4 |

    | 实际购买：股票基金 | 12 | 13 | 58 | 24 |

    | 实际购买：储蓄计划 | 7 | 1 | 51 | 125 |


    对于多类分类，指标的定义略有变化——并且存在更多指标变体。这里我们解释两种：（多类）准确率和平衡准确率。比较两者可以让项目经理了解不同指标可能具有的不同目的或侧重点。


    **多类分类的准确率**是指正确分类或预测的项目所占的比例或百分比。在示例中，我们将对角线上的项目之和除以所有单元格的总和：


    ```

    Acc_multiclass = (189 + 25 + 58 + 125) / (189 + 5 + 8 + 7 + 12 + 25 + 5 + 4 +
    12 + 13 + 58 + 24 + 7 + 1 + 51 + 125)

    ```


    频繁类别的预测主导了结果。假设某些类别出现的频率高于其他类别，那么对于稀有类别，分类质量对该指标的影响很小。例如，不同的癌症形式在特定时间点并非多数人患有的疾病。一个对每位患者都预测“无癌症”的算法，其准确率接近
    100%。极少数癌症患者对多类准确率（几乎）没有影响。在这种情况下，多类准确率毫无价值。一种能更好地处理稀有但重要类别的指标是**平衡多类准确率**指标。它计算每个类别指标的平均值：


    ```

    Acc_balanced = ( (189 / (189 + 5 + 8 + 7)) + (25 / (12 + 25 + 5 + 4)) + (58 /
    (12 + 13 + 58 + 24)) + (125 / (7 + 1 + 51 + 125)) ) / 4

    ```


    换句话说：对于该指标，所有类别具有相同的权重，无论它们出现的频率如何。在该指标中，多个不常见类别的表现优于一个或两个主导类别的问题。


    多类准确率和平衡多类准确率是多类分类质量指标的两个示例。两者本身并无优劣之分。驱动因素是 AI 模型要解决的业务问题。AI 项目经理必须理解数据科学家使用哪些指标以及为什么使用。这对于交付业务价值至关重要。选择不合适的指标意味着创建的
    AI 模型可能无法交付所需的业务价值。然而，做出正确的选择并不总是那么容易，尤其是对于复杂的业务问题。尽管如此，从成熟的指标入手是个好主意。它们被广泛使用是有原因的：它们通常很有用。


    衡量**目标检测**的性能远比简单的多类分类复杂。首先，图像可能包含多个目标，例如一个玻璃杯、一个瓶子和一把椅子（见图 3-5）。其次，AI 模型还会为每个目标确定边界框。这些框标明了图像中识别出的目标的位置。通常，如果边界框重叠至少
    50%，则目标被视为正确检测到。


    在图 3-5 中，AI 模型识别出了瓶子，但没有识别出玻璃杯。虽然“玻璃杯”这个目标类别是正确的，但形状的重叠度太低。最后，椅子未被检测到，并且算法检测到一辆车的地方实际上并没有车。那么，这个
    AI 模型有多好？一个指标定义为 1 除以 4，得到 25%的值（交并比）。


    总之，预测、多类分类和目标检测的性能指标示例说明了针对不同 AI 挑战的现有指标的多样性。有些指标比其他指标更复杂，但当 AI 项目经理坚持要理解他们的数据科学家在优化什么时，他们是在明智地投入时间。AI
    项目的成功取决于 AI 模型优化的指标是否与相关的业务绩效指标相匹配。


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig5_HTML.png](img/516372_1_En_3_Fig5_HTML.png)


    **图 3-5** 包含各种目标的目标检测示例图。绿色边界框是“正确”的，而透明框是模型识别出的边界。


    ## AI 模型工程中的 QA 阶段


    当数据科学家展示他们的 AI 项目模型以及精确率、召回率或`R²`值时，他是否应该立即跑去告诉赞助商他们成功了？该模型是否已准备好投入生产部署？


    答案显然是“不”。单一指标永远不够。项目经理至少需要两到三个指标，并确信训练数据被恰当地用于生成这些指标。图 3-6 概述了如何构建 AI 模型质量保证的流程。如果指标没有达到预期或期望，一个好的模型并非随机参数或权重变化的幸运结果。获得一个好的模型意味着从多个候选模型开始。项目驱动它们通过各个
    QA 阶段。最终，选定的模型能够通过所有阶段，因为它要么是第一个达到要求的优秀模型，要么是优于所有其他候选模型的模型。


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig6_HTML.png](img/516372_1_En_3_Fig6_HTML.png)


    **图 3-6** 理解将数据转化为 AI 模型过程中的质量保证


    ### 完美但无用的模型指标


    项目应避免无用的指标，即那些无助于理解模型性能的指标。一些汽车制造商令人印象深刻地完善了无用指标的概念，结果证明这是个坏主意。他们过度优化了汽车发动机。所有汽车都符合监管排放基准，因为汽车在检测到处于排放测试时会调整发动机。在正常交通条件下的排放则完全不同，且环保性差得多。这对相关管理层和工程师并无益处。AI
    项目应避免——即使是无意中——像那些汽车制造商一样制造出好得令人难以置信的指标。当混淆用于训练和评估 AI 模型的数据时，就会发生此类问题。


    再补充一点：如果使用相同的数据进行训练和质量保证，你知道实现 100%完美模型的最快方法吗？编写一个组件，检查模型输入数据是否对应于训练集中的条目。如果是，则从训练集中获取正确答案。否则，返回一个随机数。你的模型在训练集上实现了
    100%的精确率和召回率——但完全无用。避免无意中陷入此类问题的唯一方法是将训练数据分成三个数据集：训练集、验证集和测试集——并遵循本章解释的严格质量保证流程。

    '
- fmt: '### The Training, Validation, and Test Data Split


    The purpose of a `training dataset` is to build and train a machine learning model
    with this specific data. There are many ways to optimize and fine-tune AI models,
    such as trying out various mathematical function(s) or changing the number of
    hidden layers for neural networks. Data scientists perform these optimizations
    using the training data (only). In contrast, the purpose of the `validation dataset`
    is to compare multiple candidate models and to check for overfitting. The final
    test before actually deploying a model is a final assessment using the `test dataset`.


    The split of the dataset depends on the context. Datasets often consist of several
    hundred or a few thousand data points for predictive analytics and statistics
    scenarios. The typical split ratio for `training/validation/test datasets` for
    them is 60%/20%/20%. In big data, machine learning, and neural networks, there
    are often millions of data points. Then, a 98%/1%/1% split ratio makes sense.
    Validation and test datasets of around ten thousand data points are sufficient.
    Dividing the existing historical training data into these three subsets is essential
    before starting with the model training.


    ### Assessing the AI Model with the Training Dataset


    The first check of a newly trained AI model is how it performs on the training
    set. If AI models fail directly here, they are unlikely to perform better with
    live data in production in the "real world." So, this is the first real QA step
    for a new AI model.


    Assessing the training model with training data means feeding the training data
    set into the model and check whether the model''s predictions are correct. Does
    the model predict the bank customers to be interested in a credit card that got
    the product? The data scientists calculate the precision, recall, and accuracy
    metrics for classifications (or `R²` for predictions) and verify whether the value
    is acceptable for the business. If the company needs a 95% recall to make a business
    case a success and the model reaches only 85% on the training set, moving forward
    with this model is a waste of time and money. The AI project team has to fix and
    improve the model first.


    The visualizations in Figure [3-7](#516372_1_En_3_Chapter.xhtml#Fig7) illustrates
    potential root causes for failing models. The curve represents the AI model, which
    divides the area into two subareas or classes. All cat images are in the upper
    left and middle part, all dog images in the lower area – 100% precision and recall.
    In Figure [3-7](#516372_1_En_3_Chapter.xhtml#Fig7) (a), the curve separates the
    data set(s) entirely correctly. It is the perfect case, but usually, the situation
    sketched in Figure [3-7](#516372_1_En_3_Chapter.xhtml#Fig7) (b) is closer to reality.
    The illustration helps understanding two reasons why AI models might not even
    perform well on their own training data.


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig7_HTML.png](images/516372_1_En_3_Chapter/516372_1_En_3_Fig7_HTML.png)


    Figure 3-7


    Scenarios for Classifications: How Good Does the Curve Representing the Classification
    Function Separate Cat (Black Circle) from Dog Images (White Circle)?


    The first potential root cause is `missing crucial information` and attributes.
    A picture of a car in a parking lot is not sufficient to determine whether the
    vehicle has enough gas to drive thirty kilometers. Thus, even if a distinction
    of two classes is possible in theory, models fail for specific data if they do
    not have all information. The solution is obvious: add attributes to the data
    points of the training data and retrain the model.


    The same figure also represents a second reason for an AI model failing on training
    data: The underlying `model` function is too `simplistic` (`underfitted model`).
    Linear regression does not work well for complex, non-linear challenges. In our
    illustration, the AI model draws (only) one straight line to separate classes.
    Only a curve can separate the areas correctly (Figure [3-7](#516372_1_En_3_Chapter.xhtml#Fig7),
    c). If the mathematical function does not match the problem, the AI model performs
    poorly. Data scientists fix such issues by moving from linear regression to a
    neural network or adjusting or extending the neural network and then retrain the
    model.


    To conclude: quality issues causing insufficient AI model quality on training
    data can have two root causes, underfitting and missing information. Data scientists
    have to dig deeper and potentially experiment to understand the details. But once
    models work well on the training data, it is time for the next QA stage, which
    takes advantage of the validation data sets.'
