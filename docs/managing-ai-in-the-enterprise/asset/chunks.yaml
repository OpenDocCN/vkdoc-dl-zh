    quality and should be improved further.


    Sample scenario one is a credit card company. They process millions of payments
    per day. Their earnings are 0.1% of the transaction volume. So, a CHF 2000 payment
    generates CHF 2 revenue. A fraudulent payment means that the credit card company
    has to write off the total amount. Thus, letting one fraudulent payment slip through
    has a massive impact on revenues. In such a scenario, the credit card company
    prefers a high recall rate and accepts a lower precision rate. They block as many
    potentially fraudulent payments as they can identify. Obviously, there are limitations.
    Blocking too many payments reduces the income, and customers change to competitors
    if they cannot use their cards adequately in their daily lives.


    Scenario two – determining stocks that potentially outperform competitors – is
    an example of optimizing precision. A hedge fund might prefer an AI model that
    identifies five stocks outperforming the market over a model that proposes twenty
    stocks if share prices plunge next week for half of the twenty.


    These two sample scenarios illustrate that project managers need a vision of how
    they position the project in the precision vs. recall continuum. They can even
    provide a formula for the data scientists in an ideal world, for example, five
    false positives are equally harmful as two false negatives. Data scientists feed
    this information as input to the AI model training algorithms.'
  trans: '

    # 总结


    本章阐述了每个 AI 组织最显而易见且至关重要的任务：交付一个 AI 项目。它详细介绍了 AI 创新的各个方面和层次、AI 项目的范围界定，以及诸如统计模型或神经网络模型（每个
    AI 项目的核心交付物）等 AI 模型在实际中的表现。此外，本章还阐述了 AI 模型的开发流程及其在企业 IT 应用环境中的集成。掌握了这些知识后，AI 项目经理面临的下一个重大挑战显而易见：AI
    项目经理如何验证 AI 模型是否按预期运行，并提供所需的预测或分类质量？


    # 3. AI 中的质量保证


    随着 AI 影响着公司、组织乃至我们私人生活中的重要决策，AI 模型的质量已成为管理者和普通公民共同关心的问题。销售成功取决于能否用个性化和合适的产品来瞄准客户。在医疗领域，研究人员希望通过让
    AI 模型分析人们对着麦克风咳嗽的声音来识别新冠感染者。这两个简单的例子证明：AI 已经跨越了从无害的学术实验到现实解决方案的临界点。现在，AI 项目需要可审计的质量保证和测试。错误可能会严重影响财务结果或威胁人类生命。数据科学家、测试经理和产品负责人不能再将
    AI 模型视为由才华横溢、无可挑剔且神圣不可侵犯的专家创造的、总是正确的神奇黑匣子。


    因此，本章通过深入探讨以下主题，阐述了如何构建和管理预防性质量保证：


    - **模型质量指标**：衡量 AI 模型的质量并使模型具有可比性。它们证明或反驳模型是否像数据科学家承诺的那样好和有价值。

    - **QA 阶段**：定义一个结构化的流程，规定项目何时以及按何种顺序基于哪些数据计算质量指标。这些阶段确保 AI 项目顺利推进，最终形成可用的 AI 模型。它们避免了混乱、无重点且不透明的实验。

    - **模型监控**：持续检查 AI 模型在部署后数周乃至数月内是否仍能提供合理的预测和分类质量。

    - **数据质量**：反映优质数据对训练后的 AI 模型预测和分类质量的巨大影响。

    - **集成测试**：检查 AI 模型与其余应用程序环境是否正确交互。


    图 3-1 总结并说明了这些主题之间的依赖关系。以下各节将详细探讨各个主题框。


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig1_HTML.png](img/516372_1_En_3_Fig1_HTML.png)


    图 3-1 质量保证与人工智能——全景图


    ## AI 模型质量指标


    对 AI 质量指标的基本理解，能使 AI 项目经理与拥有数学、统计学或计算机科学研究生学位的团队成员谈论“数据科学”，并让他们觉得你懂行。方程 `y=67*x[6]+54*x[5]+23*x[4]+54*x[3]-9*x[2]+69*x[1]+42`
    能否为二手车提供合理的价格估算？或者我们是否应该将 `54` 替换为 `53` 或 `-8`？仅仅查看一个线性方程或一个神经网络的数千个权重，并不能让我们判断一个
    AI 模型在现实中是否正常工作。


    ### 分类的性能指标


    最著名且最广泛使用的分类质量保证指标是**混淆矩阵**（例如，判断客户是否购买了一个包，或者这张图片是否是猫）。混淆矩阵可以比较使用相同算法训练的模型的质量，例如，基于不同数据准备的两个逻辑回归模型。同时，它也能比较使用不同算法训练的模型，例如，一个使用神经网络，另一个使用逻辑回归算法。


    图 3-2 展示了一个用于分类的 AI 模型，该模型以图像为输入，并试图判断图像中是否包含狗。在五张被分类为狗的图像中，有四张确实是狗的图像。因此，混淆矩阵中*真正例*单元格的值为
    4。一张被错误分类为“真”/“狗”的图像导致混淆矩阵中*假正例*的值为 1。该 AI 模型将图 3-2 中的各种图像分类为不是狗的图像。这对四种情况是正确的（*真负例*），对两种情况是错误的（*假负例*）。


    ![../images/516372_1_En_3_Chapter/516372_1_En_3_Fig2_HTML.png](img/516372_1_En_3_Fig2_HTML.png)


    图 3-2 图像分类——查看图像并判断它属于两个类别中的哪一个，狗或猫


    混淆矩阵是三个高级指标的基础：


    - **准确率**：正确分类的图像百分比。基本上，这是正确识别为包含狗的图像数量，加上正确分类为不包含狗的图像数量，除以图像总数。在示例中，计算如下：


    `准确率 = (4 + 4) / (4 + 4 + 1 + 2) = 8 / 11 ≈ 73%`


    - **精确率**：反映被分类为狗（无论正确与否）的图像中，真正是狗的比例。在我们的狗示例中，计算如下：


    `精确率 = 4 / (4 + 1) = 80%`


    - **召回率**：关注 AI 模型识别出了多少“真”案例——在我们的示例中即包含狗的图像。在我们的示例中，AI 模型识别出了六张包含狗的图像中的四张：


    `召回率 = 4 / (4 + 2) = 67%`


    显然，精确率和召回率越高——即假负例和假正例的数量越低——AI 模型就越好。同时优化精确率和召回率是明智、可取且必要的。然而，最终项目必须决定两者中哪一个更重要。选择取决于使用场景。一旦模型达到良好的预测质量并需要进一步改进时，这通常是一种权衡。


    场景一示例是一家信用卡公司。他们每天处理数百万笔支付。他们的收入是交易额的 0.1%。因此，一笔 2000 瑞士法郎的支付产生 2 瑞士法郎的收入。一笔欺诈性支付意味着信用卡公司必须核销全部金额。因此，让一笔欺诈性支付溜走会对收入产生巨大影响。在这种情况下，信用卡公司更倾向于高召回率，并接受较低的精确率。他们会尽可能多地拦截他们能识别出的潜在欺诈支付。显然，这存在局限性。拦截过多的支付会减少收入，如果客户在日常生活中无法正常使用他们的卡，他们就会转向竞争对手。


    场景二——确定可能跑赢竞争对手的股票——是优化精确率的一个例子。一只对冲基金可能更倾向于一个能识别出五只跑赢大盘股票的 AI 模型，而不是一个提出二十只股票但其中一半下周股价会暴跌的模型。


    这两个示例场景说明，项目经理需要对其项目在精确率与召回率的权衡中如何定位有一个愿景。在理想情况下，他们甚至可以为数据科学家提供一个公式，例如，五个假正例与两个假负例的危害相同。数据科学家将此信息作为输入提供给
    AI 模型训练算法。

