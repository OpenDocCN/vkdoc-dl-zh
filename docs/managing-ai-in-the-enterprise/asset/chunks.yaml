    results to and discusses them with the business. He understands the types of insights
    AI models provide and should have a basic understanding for making some rough
    effort estimations. He does not have to be able to create and optimize models.
    The role is similar to business analysts in classic software engineering: understanding
    commercial challenges, asking the right questions when talking with users and
    customers, presenting results to the management, and writing high-level specifications.
    No software project sends its Java gurus to the C-level to discuss the strategic
    goals for the software development project. Neither should an AI manager send
    highly skilled and specialized data scientists.'
  trans: '

    ### 设计（并衡量）服务质量


    你努力工作，甚至付出了额外的努力。然而，你的客户、老板或朋友仍然对结果不满意，并直截了当地表达他们的情绪。这在个人生活和商业环境中都令人沮丧。AI 团队及其内部客户和利益相关者也可能遇到这种情况。然而，AI
    管理者在理解不同的服务质量层次时（图 5-3），可以减少摩擦的风险。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig3_HTML.png](img/516372_1_En_5_Fig3_HTML.png)


    **图 5-3** 设计与理解服务质量


    AI（及非 AI）服务的客户满意度取决于对以下方面的感知服务质量：


    *   *服务交付的内容*（关键要素）以及

    *   *服务交付的方式*（核心与外围要素）


    事实上，**期望**取决于**客观需求**和要求，例如，提升某个特定移动套餐的销售额。AI 团队的形象和声誉会影响期望，以往互动的经历也是如此。这些是**主观影响因素**。客户和用户基于这些不同因素形成他们对服务的期望。他们将*期望的*服务与*感知到的*服务进行比较。客户满意度并不仅仅取决于
    AI 团队根据*自身*标准和指南交付服务的质量。它还取决于客户的期望和感知。


    在服务交付方面，存在三个不同的**服务质量层次**。起点是对客户需求和意愿的*感知*。下一步是*设计*满足这些客户需求的服务。然后，由 AI 团队实施并*交付*所设计的服务。每个环节都可能发生误解，从而影响服务满足客户期望的整体适配度。如前所述，还存在客户对已交付服务的感知。而且，一如既往，有些客户看到的是半满的杯子，而另一些则看到的是半空的杯子。


    基于 Grönroos、Parasuraman 以及 Philip 和 Hazlett 数十年来关于服务质量的研究，这一分层模型的含义有三点：


    1.  严谨的服务设计和经验丰富的数据科学家创建高性能 AI 模型至关重要。

    2.  仅有关于服务如何运作的精彩 PPT 是不够的。AI 管理者、AI 翻译员、团队负责人或顾问必须与交付团队合作，将概念落实到实际运作的组织中。他们必须检查服务概念在现实中是否可行。

    3.  管理利益相关者和客户的期望是 AI 管理者工作的重要组成部分。在项目启动前和进行中处理差距，比在耗尽所有预算后再处理要容易得多。


    对于经验丰富的 IT 服务管理者以及具有 IT 或管理咨询背景的专业人士来说，这三条指导原则听起来熟悉、简单且显而易见。然而，它们能帮助首次担任领导角色的高技术专家，避免他们亲身经历所有痛苦的教训。运营一项服务是沟通与承诺的结合。根据我的服务设计经验，为潜在客户写下服务的关键点会有所帮助。你做什么？局限性是什么？这并不会让额外的沟通变得多余。它有助于促进对需求和期望的讨论——并防止客户方产生错误的假设。


    ## 管理 AI 项目服务


    AI 项目训练 AI 模型，并得出可操作的见解，例如面向销售的潜在买家目标列表，或面向产品经理的典型买家特征。管理一个运行众多此类项目的组织，需要了解不同的工作负载模式、理解预算编制的成本结构，并向客户沟通结果。然而，首先，AI
    组织必须理解所需的能力。


    ### AI 项目服务的能力三要素


    “能力”一词源于企业架构。它有助于表达一个组织单元能够做什么。这并不意味着一个组织单元仅仅具备承担任务的理论知识。拥有能力意味着拥有熟练的员工、工具、流程定义和方法论。该组织单元、团队或
    AI 组织必须能够或已经在今天成功执行这些任务。


    遵循 CRISP-DM 方法论，并经历创建 AI 模型的所有阶段（即，不包括部署阶段，该阶段更偏向运维而非项目任务），我们可以识别出 AI 项目服务组织所需的所有能力（图
    5-4）。


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig4_HTML.png](img/516372_1_En_5_Fig4_HTML.png)


    **图 5-4** 能力——以 CRISP-DM 为中心的视角


    **核心能力**是**数据科学**专业知识。它是在“建模”阶段创建 AI 模型以及在“评估”阶段评估 AI 模型质量的基础。这是 AI 组织最显而易见的能力。而另外两项所需的能力——“AI
    翻译员”和“数据工程”——则常常被低估，尽管它们在几乎所有项目中都需要更多的时间和精力。


    AI 组织需要**数据工程能力**来执行“数据理解”和“数据准备”阶段，以完成以下任务：


    *   组织层面的挑战，例如获得数据所有者使用其数据的许可

    *   数据传输：用户与权限、网络带宽、传输工具

    *   理解数据模型和数据的语义

    *   分析数据质量


    区分数据工程和数据科学能力对于人员配置至关重要。无所不能的超级英雄既罕见又昂贵。大多数公司都有熟悉`SQL`以及公司一个或多个数据库的专家。他们在准备数据导出方面效率极高。他们可以承担数据清洗和准备工作，而无需深入的数学、机器学习或
    AI 知识。他们在每个 AI 组织中都很有帮助，尤其是当他们非常了解数据源时。虽然他们需要与数据科学家互动来执行任务，但他们通过解放数据科学家，使其能更专注于创建和优化
    AI 模型，从而帮助了 AI 组织。


    AI 项目所需的第三个也是最后一个**能力**是 AI 翻译员。他理解业务问题，将其转化为 AI 任务，并向业务方展示结果并进行讨论。他理解 AI 模型提供的见解类型，并应具备进行粗略工作量估算的基本知识。他不必能够创建和优化模型。该角色类似于经典软件工程中的业务分析师：理解商业挑战，在与用户和客户交谈时提出正确的问题，向管理层展示结果，并编写高层级规格说明。没有软件项目会派其`Java`专家去
    C-level 讨论软件开发项目的战略目标。AI 管理者同样不应派遣技能高超且专业化的数据科学家去处理此类事务。

    '
- fmt: 'Data science, data engineering, and AI translator form the capabilities triumvirate
    needed to support strategic decisions in an organization with one-time-use AI
    models. Figure [5-5](#516372_1_En_5_Chapter.xhtml#Fig5) puts them in a broader
    context. Data engineering is close to the data providers and data sources. They
    ensure the AI organization can integrate as much of the data stored in any of
    the company’s databases. The AI translators work with managers from various departments
    to identify which strategic decision-making can benefit from AI. In other words,
    creating which AI models could help analyze strategic and operational challenges
    by predicting individual or group behavior?


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig5_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig5_HTML.png)


    Figure 5-5


    Capabilities for AI Service Teams with Focus on AI for Advisory (White Boxes:
    Placeholders Needed Later for Other AI Services)


    Data scientists work with both of them, with AI translators to identify which
    AI models benefit the business and with data engineers to get the data they need.
    Indeed, the picture is not complete without external providers. For example, consulting
    companies might take over complete tasks or projects; contractors can augment
    internal teams. Plus, there are tool vendors (including public cloud providers)
    which the organization uses to improve its efficiency.


    To prevent misunderstandings: Figure [5-5](#516372_1_En_5_Chapter.xhtml#Fig5)
    lists many capabilities but does not imply that AI organizations should hire 2–3
    persons for each of them. It is more like a list of tasks to be assigned to the
    team members. In a big AI organization, you and five other data scientists might
    work in a dedicated data science team. If the AI organization can fund two data
    scientists or engineers, the two together are responsible for everything. So,
    any team development strategy or process for hiring new specialists should consider
    all capabilities needed in general and the current team’s strengths and weaknesses.


    ## Workload Pattern


    When an AI organization runs (mostly) AI-based advisory projects, the workload
    has a specific pattern. It is typical for IT or management consultancy but potentially
    new to AI managers and data scientists with a different professional background.
    Being in the **project business** means acquiring and delivering project after
    project after project. Where should the company open the next new branches of
    a supermarket chain? Can we improve an engine the last time before presenting
    a new car to the press and the media? The projects follow the CRISP-DM methodology.
    Within a few days or months, the data scientists create a model and explain its
    implications to the customers. The project comes to an end. There are no follow-up
    tasks for the data scientists and no additional project costs. Instead, the benefit
    for the business might just start, for example, more revenues or lower costs (Figure
    [5-6](#516372_1_En_5_Chapter.xhtml#Fig6), left). When one project ends, it is
    time for the data scientists and engineers to move to the next. Potentially, they
    might even use new and different technologies. It is the perfect working style
    for experienced data scientists always looking for a new challenge.


    The implications for AI managers are the need to acquire new projects constantly.
    Only new projects prove the AI team’s relevance to the company’s top management
    and ensure funding. Continuous savings due to a finished AI project are not sufficient
    for an AI organization to stay relevant. If there is no next project, the CIO
    can shut down the AI organization without impacting the organization.


    An AI organization (or a part of it) usually has a few or many parallel projects
    because there are always new ones starting, whereas older ones come to an end.
    Figure [5-6](#516372_1_En_5_Chapter.xhtml#Fig6) (right) illustrates this aspect.


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig6_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig6_HTML.png)


    Figure 5-6


    Spending and Return Pattern (Left) and a Work Effort Structure for AI Organizations
    Focusing on Consulting-Style AI-Based Advisory Projects (Right)


    ## Budgets and Costs


    Impressive titles alone, such as Head of AI, are insufficient for AI managers
    to establish a flourishing AI team with data scientists, data engineers, and AI
    translators. They need a budget to fund their team and pay for the tooling and
    infrastructure of their AI projects. For budgeting, they have to understand the
    cost structure of AI project services. We look first at an individual AI project’s
    cost structure. Afterward, we broaden the view to the overall AI organization’s
    one.


    Two **basic cost dimensions** are essential for the understanding: inevitable
    costs vs. costs-by-design and fixed vs. variable costs. Inevitable costs are costs
    you cannot avoid. Costs-by-design means that the management makes an explicit
    decision where the organization invests more than the bare minimum. Two or three
    screens per data scientist workstation instead of one is an illustrative example.


    The second dimension distinguishes fixed and variable costs. When you buy servers
    for machine learning, these are fixed costs. They have to be paid whether or not
    AI model training takes place. In contrast, on-demand-charged VMs in the cloud
    is an example of variable costs.


    AI projects have the following cost structure consisting of four categories (as
    shown in Figure [5-7](#516372_1_En_5_Chapter.xhtml#Fig7)):


    ![../images/516372_1_En_5_Chapter/516372_1_En_5_Fig7_HTML.png](images/516372_1_En_5_Chapter/516372_1_En_5_Fig7_HTML.png)


    Figure 5-7


    Cost Structure for AI Project Services


    *   Staffing costs for employees and contractors

    *   Infrastructure such as workplace for staff and compute and storage for machine
    learning training

    *   License fees for AI platforms such as SAP or SAS

    *   Centralized functions


    When working with internal employees, the **staffing costs** are fixed costs for
    the AI *organization*. The company has to pay their employees even if they have
    not enough work or them. When looking at *project* costs, staffing costs are variable.
    Projects typically only pay internally for employees to the extent they ask for
    their support. A mismatch between the overall work in projects and available staff
    in the AI organization is a challenge. Too much work causes project delays due
    to missing resources. Not enough work can result in cost-cutting activities. Finding
    the right balance is a crucial task for AI managers. One option to deal with workload
    fluctuations is to varabilize parts of the staffing costs by augmenting internal
    employees with contractors that scale up and down more quickly.


    **Infrastructure costs** (besides employee workplaces) and **license costs** are
    fully variable for AI projects and AI organizations if the projects use cloud
    services. Alternatively, suppose an AI organization builds its own AI platform
    for its project. In that case, these costs are part of the **centralized service
    costs**. The latter also covers dedicated ticketing systems for interacting with
    customers or a Sharepoint to store documents. Therefore, project-focused AI organizations
    should carefully control costs for centralized services. If they are fixed costs,
    they can be a financial burden making the internal service potentially more expensive
    than externally sourced consulting services.'
