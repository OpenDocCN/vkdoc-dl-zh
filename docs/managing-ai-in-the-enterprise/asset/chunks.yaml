- fmt: '# Integrating AI Models in IT Solutions


    Online shoppers are familiar with the phenomenon. Webshops offer their customers
    products that perfectly match the contents of the shopping cart: a pair of black
    socks with a black suit? Click! Pink shoes for the customer with the pink handbag?
    Click! AI algorithms run in the background. Their aim? Increase sales! To make
    it work, however, an AI model alone is insufficient. We have to integrate the
    AI model into a “real world” application such as the webshop.


    Data scientists new to big organizations and with a long and extensive academic
    background tend to underestimate the integration challenge. They start experimenting
    with a commercial or free AI software package or cloud-based AI services. They
    want to figure out whether and how to benefit from AI by trying out some use cases.
    At this moment, they do not (yet) require an interface between the AI component
    and one or multiple applications. The situation changes once the benefits are
    evident. The business and the IT management want AI to become an integral part
    of complex software solutions. For example, an online fashion shop has many features
    that have nothing to do with AI. The webshop presents fashion; customers can search
    for items, add them to a shopping cart, and pay. An AI component is simply another
    feature that “only” determines products for each customer that might be of particular
    interest to these customers. The AI component might suggest black socks for customers
    with a suit in their shopping basket and transmit the suggestion to the webshop
    application. The customer then sees black socks in the browser as a product proposal.


    The collaboration between the AI component and the rest of the application is
    the goal. The starting point for AI – and software solutions with AI functionality
    – is historical data. Data scientists need them to create AI models, for example,
    for customer buying behavior. However, it would be a bad idea if data scientists
    perform their work on a production system. When data scientists query large data
    sets and run complex, resource-intensive statements, they potentially interfere
    with daily operations. Thus, decoupling their work by copying or extracting data
    from the production system and putting the data into a training environment with
    sufficient computing power is essential.


    As soon as the AI model is ready, data scientists or IT engineers deploy the model
    in production systems. No model is there for eternity. A newer model will replace
    it after a day or some weeks or months based on more recent data (Figure [2-21](#516372_1_En_2_Chapter.xhtml#Fig21)).


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig21_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig21_HTML.png)


    Figure 2-21


    Understanding Data, Model Creation, and Model Usage


    The exact deployment or integration can follow various patterns. The three primary
    variants are:


    - Precalculation

    - Reimplementation

    - Encapsulated AI component


    For **precalculation**, a data scientist develops and creates the AI model, which,
    for example, determines for each customer the product she most likely buys next.
    Next, the data scientist or an IT engineer uploads this information to the application.
    Now, the application knows which items to suggest to the customers when they visit
    the online shop again later. The application works with the result. It does not
    know the model. There is no need for integration between any AI component or environment
    and the application. Model development and evaluation take place independently
    in the AI training environment, and the evaluation or interference bases always
    on the most up-to-date model (Figure [2-22](#516372_1_En_2_Chapter.xhtml#Fig22)).


    Precalculation has some limitations if the frequency of model updates and the
    “real” world changes do not match. For our webshop example, the webshop continues
    to suggest a neon-green cocktail dress to a customer after she bought one till
    the next data upload. In such a case, the ads do not generate additional sales
    – and let the customer feel that the webshop cannot provide a shopping proposal
    matching her needs.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig22_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig22_HTML.png)


    Figure 2-22


    Precalculation Pattern


    In the second and third variants – the reimplementation pattern and the encapsulated
    AI component variants – the AI component feeds real-time customer shopping data
    to the model and always gets up-to-date suggestions for online shoppers. Suppose
    the data analyst creates the model on April 30 in his AI training environment.
    However, applying the model on user data is deferred to when a customer visits
    the webshop. Then, her up-to-date shopping history is fed into the model to get
    product proposals. If she bought a green dress yesterday and extravagant sunglasses
    an hour ago, the AI component considers this. When a customer visits the webshop
    on May 17 in our example, the application uses the model created on April 30 and
    customer data from May 17.


    The second and the third variant differ regarding the technical implementation.
    The **reimplementation pattern** means to program the code again for the software
    application a second time. Software engineers take the model from the training
    environment and implement the same model now, for example, in `Java`. The engineers
    put the neural network parameters and weights into a configuration file, such
    that parameter updates do not require a code change. Ideally, a CI/CD pipeline
    automates the integration. Such a pipeline automatically collects the various
    sources from all developers and data scientists, creates a deployable software
    component, and installs it on development, testing, and/or production systems.
    Thus, when a customer visits a webshop, the webshop contains the neural network,
    such as any other application feature or code (Figure [2-23](#516372_1_En_2_Chapter.xhtml#Fig23)).


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig23_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig23_HTML.png)


    Figure 2-23


    Reimplementation Pattern


    Alternatively, the application landscape might have a dedicated **AI runtime server**
    in the encapsulated AI component pattern (Figure [2-24](#516372_1_En_2_Chapter.xhtml#Fig24)).
    The latter runs the AI models for all the company’s applications relying on AI
    functionality. `RStudio Server` is such a product. When a customer visits a webshop,
    the webshop invokes the model on AI runtime server, passing this customer’s shopping
    history. The AI runtime server pushes the shopping history data through the neural
    network to get a prediction of the customer preferences. Then, the AI runtime
    server returns this prediction to the webshop, which presents and highlights relevant
    product(s) for this concrete customer.


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig24_HTML.png](images/516372_1_En_2_Chapter/516372_1_En_2_Fig24_HTML.png)


    Figure 2-24


    The Encapsulated Analytics Component Pattern


    For this pattern, the AI team has to set up, run, and maintain an AI runtime server
    to which every data scientist deploys his models.


    As a side remark, “models that continuously optimize themselves” sound obvious
    and visionary at the same time. They are technically feasible. For example, Google’s
    GCP ML Pipeline follows this idea. However, fully self-optimizing and completely
    autonomous models can have harmful side effects. Suppose AI only suggests extravagant
    ties with a high margin since the optimization goal is increasing the margin.
    In that case, the profit might increase in the short term. But at some point,
    the fashion webshop is perceived as a tie shop, and only customers who want a
    tie come. Humans notice such trends better than fully automated optimization processes.
    Even in a world of AI, there is still a need for the human brain.'
