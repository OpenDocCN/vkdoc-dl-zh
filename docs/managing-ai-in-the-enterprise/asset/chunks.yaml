    be able to retrain a model. Instead, they have to develop a completely new one,
    which takes a while and incurs costs.'
  trans: '

    ### 完整性威胁


    与人工智能相关的完整性威胁首先涉及**模型质量**。当威胁行为者修改模型或干扰其训练时，模型会错误分类图像或做出不精确的预测。其后果可能是：工厂生产出无法使用的零件；航空母舰误判一架无害的客机正向其飞来，而非敌方轰炸机；或者保险公司认为
    20 岁的潜在客户有 90%的概率在明年死亡，从而停止向他们出售人寿保险。模型严重出错的极端情况听起来令人恐惧，但组织通常能很快发现。更危险的是那些微妙的操纵，它们更难被识别。企业如何能察觉到一个被操纵的风险与定价模型——该模型给德国南部的客户提供了低
    7%的价格，同时却拒绝了奥地利 10%的有利可图的长期客户？这类操纵往往不明显，但效果显著。它们会赶走忠诚的奥地利客户，同时因在德国给予不必要且不合理的折扣而造成直接经济损失。


    外部威胁行为者在 AI 模型库或生产系统中**操纵**特定 AI 模型，听起来不太可能，至少对于非情报机构关注焦点的公司而言是如此。但即使是不在全球网络犯罪聚光灯下的公司，也必须意识到来自内部的、并非完美无缺的
    AI 模型所带来的威胁。感到被不公正对待（或被竞争对手接触）的数据科学家可以更轻松地操纵模型。此外，即使是怀有善意的、高度专业的数据科学家也会犯**错误**，导致模型平庸或完全错误。因此，针对
    AI 的内部质量保证程序至关重要。与传统的软件工程相比，AI 相关的质量保证通常更像高度敏捷的初创公司模式，不够严谨和成熟。


    最后一点已经将焦点从操纵模型转移到了整体的创建和训练过程。**糟糕的训练数据**意味着糟糕的模型，无论质量指标如何显示。如果詹姆斯·邦德不想被监控摄像头识别出来，他会怎么做？他会将自己几百张照片注入训练集，将其标记为“鸟”，然后重新训练
    AI 模型。从此以后，监控摄像头就会忽略他，因为他是一只鸟，而不是一个窃贼。


    **训练数据错误或操纵**问题严重且难以检测。它们可能发生在多个环节：原始操作数据库、数据摄取脚本、训练数据收集或数据湖，以及模型训练期间的训练区域。如果数据科学家使用外部训练和验证数据集，这些也是攻击者的潜在途径。谁会去检查数百万张图片，寻找被错误标记的詹姆斯·邦德图像？谁能理解为什么测试数据准备过程中的某个命令执行的是左外连接而不是右外连接？为什么某些值要乘以
    1.2 而不是 1.20001？为什么上游系统停止发送负值？这是错误、蓄意破坏，还是改进后的数据清洗？即使没有外部威胁行为者，创建训练数据也极其复杂。


    到目前为止讨论的所有威胁和攻击都需要访问组织内部的训练环境、生产系统、AI 模型或训练数据。而其他威胁则不需要这些。它们可以在不触及目标组织任何资产的情况下成功实施。


    数据科学家希望快速行动，并整合这个快速发展的领域中最新的算法。他们从互联网**下载**预训练模型、AI 和统计学库以及公开可用的数据集。这些下载是构建更好的公司特定模型的基础。同时，这些下载也为攻击者提供了后门，他们可以提供被操纵的数据或模型，尤其是针对小众模型和训练数据。


    另一种无需触及任何资产的攻击类型是**对抗性攻击**。其理念是操纵输入数据，使得人眼无法察觉操纵，但 AI 模型却会产生错误结果。例如，图片中的微小变化，或如图
    7-7 所示道路上的一些新点，都可能导致 AI 模型无法检测到交通信号灯，或者错误理解是应该继续向右行驶，还是应该全速直行然后掉下斜坡。这类攻击仅对作为复杂神经网络的
    AI 模型有效，对简单的线性函数无效。


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig7_HTML.png](img/516372_1_En_7_Fig7_HTML.png)


    图 7-7


    理解对抗性攻击——攻击者以（几乎）不可见的方式改变输入数据（如图片），使神经网络做出错误决策。你看到这两张图片之间有多少处不同？


    ### 可用性威胁


    最后一种威胁场景涉及潜在的不可用性。首先，存在**生产环境中的 AI 逻辑**或**训练区域**宕机的风险。在后一种情况下，数据科学家无法工作。如果生产系统宕机，则会影响业务流程。不可用性是对**服务器**攻击的后果。典型的攻击包括使用格式错误的输入使应用程序崩溃，或通过（分布式）拒绝服务攻击淹没服务器。


    与 AI 特别相关的一个方面是**丢失中间结果或模型**的威胁。在数据科学中，与传统的软件开发相比，流程在工件文档和版本管理方面往往更不正式。这种松散可能导致可用性风险。例如，当一位关键工程师生病、休假或离职时，他的同事可能无法重新训练模型。相反，他们必须开发一个全新的模型，这需要时间并产生成本。

    '
- fmt: '### From Threats to Risks and Mitigation


    The difference between a conspiracist and a risk specialist is the consideration
    of probabilities. For example, the NSA could have manipulated this book by adding
    five sentences and removing an illustration with a dancing pink elephant from
    the previous page. Most probably, they can perform such an attack. However, why
    should they invest time and money in such an attack? Understanding the motivation
    and aims of threat actors and their technical and financial capabilities is crucial
    to address the highly relevant security risks and improve the overall security
    posture.


    The confidentiality, integrity, and availability threats we discussed are generic.
    In an IT security risk assessment, risk assessors and AI experts take a closer
    look at which attacks are possible and rate the likelihood of attacks and their
    potential impact on the concrete AI environment. The result: a risk matrix as
    illustrated in Figure [7-8](#516372_1_En_7_Chapter.xhtml#Fig8).


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig8_HTML.jpg](images/516372_1_En_7_Chapter/516372_1_En_7_Fig8_HTML.jpg)


    **Figure 7-8** Company-specific Risk Matrix for an AI Organization


    The sample risk matrix contains two threats. Risk A in Figure [7-8](#516372_1_En_7_Chapter.xhtml#Fig8)
    reflects the possibility that an unhappy employee steals training data consisting
    of (anonymized) past customer shopping behavior. The financial impact rating is
    “minor,” meaning between 50,000 and 250,000. The limited financial impact is due
    to its strong brand and unique logistics capabilities, making it challenging to
    copy the business model. The likelihood rating for such an attack is once every
    five years.


    Based on the risk assessment and a risk matrix, the management has to decide which
    risks to accept and which to mitigate. **Mitigation** means investing in organizational
    measures or technical improvements. Later in this chapter, we discuss some more
    complex mitigation actions in detail. First, however, we introduce some typical
    mitigation actions in the context of AI for a better understanding already here.
    Examples are:


    - Ensure that **access control and perimeter security** are in place for the training
    environment and production system. These measures reduce the risk of unwanted
    transfer of data or models to the outside and unwanted manipulations. In addition,
    they are essential if AI functionality resides in a public cloud.

    - Enforce stringent quality processes and **quality gates**. The negligent data
    scientists are, in most cases, one of the highest risks for poor models. Four-eyes-checks
    and proper documentation of critical decisions reduce the risk of deploying inadequate
    models to production, though having a structured and comprehensive quality assurance
    process is even better.

    - Ensure that external data, code libraries, and pretrained models come **from
    reliable sources**. Experimentations with such downloads are essential for data
    scientists. Still, some governance process is necessary when external downloads
    contribute to AI models deployed to production.


    These three measures reduce the potential threat and attack surface of organizations.
    However, they do not make a proper risk assessment obsolete. A risk assessment
    takes a closer look at all threat scenarios and threats discussed above. AI is
    fun, and AI brings innovation. At the same time, organizations have to understand
    and manage their AI-related security risks. Defining mitigation actions only helps
    if there is clarity on who manages and addresses which risks. In the following,
    we take a closer look at potential actions.


    ## Securing AI-Related Systems


    For AI and analytics, data is what fuel is for your car: the more you have, the
    further and faster you can go. There is just one big difference: you burn the
    oil, but the data remains in your systems. An AI team piles up massive amounts
    of data within just a few months – a security nightmare. A scrupulous competitor
    has to turn only one data scientist against you – and she can extract and transfer
    most of your commercial data and intellectual property to the competitor. Consequently,
    this section has one ambition: elaborate on reducing this security risk without
    blocking the daily work of the data scientists and the AI organization.


    Three traditional measures are the ticket to success together with three measures
    that require innovative thinking beyond standard IT security. The measures are:


    1. Generic system hardening

    2. Governance Processes

    3. Compartmentalization

    4. Advanced Techniques for Sensitive Attributes

    5. Probing Detection

    6. Cloud-AI Risk Mitigation


    AI and security specialists apply them to the various AI components as Figure
    [7-9](#516372_1_En_7_Chapter.xhtml#Fig9) illustrates.


    ![../images/516372_1_En_7_Chapter/516372_1_En_7_Fig9_HTML.png](images/516372_1_En_7_Chapter/516372_1_En_7_Fig9_HTML.png)


    **Figure 7-9** Security Measures for AI Organizations’ Application Landscapes


    ### System Hardening


    The generic system hardening covers the traditional IT security measures such
    as network zones and firewalls, integrating security services such as Internet
    and access management (`IAM`) solutions or web application firewalls (`WAF`),
    and configuring systems securely, that is, restricting IP ranges.


    These are standard activities known from “normal” software. They apply as well
    for any AI system or component, be it a training area, repositories, data lakes,
    or anything else. The aim: making sure that unauthorized persons do not get access
    to the systems plus enabling data scientists and engineers to perform their work.'
