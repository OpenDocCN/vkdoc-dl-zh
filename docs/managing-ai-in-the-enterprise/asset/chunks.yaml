    **Bias** was already a topic in the quality assurance chapter. The concept looks
    at the training data and its distribution. We call training data biased if its
    distribution deviates from the one in reality. If a society consists of roughly
    50% male and 50% female persons, the training data distribution should be similar.
    If the training data for face recognition consists of 99% male pictures, the created
    AI model most probably works well on them. In contrast, the model is most likely
    unreliable for females.


    What makes avoiding bias an easy-to-get-support-for measure is that removing bias
    and raising ethical standards brings a business benefit: the AI model gets better.


    **Fairness** is a concept demanding that the trained AI models behave similarly
    well for all relevant subgroups, even for small ones. Suppose a company has 95%
    female employees. Such a gender imbalance impacts the AI model training. The training
    could optimize the accuracy for female employees and ignore the male ones and
    still achieve high accuracy. When 95% of the employees are female, and the algorithm
    identifies 99.9% of the female population correctly, but only 10% of the remaining
    5% male employees, overall, the AI model identifies 95.4% correct – not bad, at
    least if you are female, not male. However, the ethical concept of fairness rejects
    such a model. It would be unthinkable that every male employee must show a passport
    at the reception, whereas all female employees can use their badge to get in.


    In an enterprise context, fairness and bias have one crucial difference. In contrast
    to bias, fairness causes costs for the business. Fairness means not using the
    best AI model but a model that works equally well for all relevant subgroups,
    for example, by overrepresenting small relevant subgroups in the training set.
    To illustrate this, we extend the example from above. The best AI model might
    identify 99.9% of the female employees but only 10% of the male ones. The best
    fair (!) AI model might have an accuracy of 90% for both male and female employees.
    Such a “small” change of the overall accuracy can be cost-intensive. Using a 95%
    accurate automatic passport controls at an airport requires the customs staff
    to check the passport of one out of 20 travelers. An accuracy of 90% means checking
    10% of the travelers, requiring to double the customs staff.


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig2_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig2_HTML.png)


    Figure 4-2


    Understanding Bias and Fairness


    ### AI Ethics Governance


    AI ethics is a topic with many stakeholders, from data scientists, AI managers
    to business specialists needing AI models and corporate social responsibility
    teams. It is a highly emotional topic, too. Organizations risk bitter fights about
    what is adequate and what is morally acceptable and who decides what if not working
    out crystal-clear who or which board makes which decisions concerning the three
    areas: (un)ethical use cases, (un)ethical engineering practices, and (un)ethical
    AI models


    The Google/Timnit Gebru controversy illustrates an easy-to-oversee pitfall for
    AI organizations. Gebru’s reputation bases on earlier work where she unveiled
    that IBM’s and Microsoft’s face detection models work well for white men but are
    inaccurate for women of color. In other words: She found flaws in the model caused
    most probably by biased training data. Such flaws are embarrassing, but knowing
    these shortcomings enables data scientists to build better models.


    While with Google, she co-authored a paper that criticized Google’s work on a
    new language model for two reasons. First, Google trained its model with texts
    available online. Such texts are obviously (partially) biased, discriminating,
    or even openly racist. When the training set also contains such texts, the model
    reflects them partly as well. UN’s Autocompletion Truth campaign illustrated this
    in videos. They let Google Search’s autocomplete function suggest which words
    should come next. If “women cannot” results in “women cannot drive,” this reflects
    prejudices in our use of the language. The autocomplete prediction works correctly,
    but the result is questionable. Gebru was and is right: if you use online texts,
    you replicate today’s injustice and unethical tendencies. The underlying demand
    of such criticism is: language models should not reflect our language use today,
    but a better, purified version of ourselves and our language – free from prejudices
    and discrimination.


    This criticism, at the same time, questions the engineering method. Should Google
    use online texts from the web, which do not incur costs and reflect our language,
    or should you start filtering and preparing training texts to exclude potentially
    problematic texts? Suddenly, the criticism impacts the speed of the AI model development
    and the business case due to the potentially high effort needed to filter and
    rework texts used as training data.


    Her second criticism addresses the massive energy consumption of the language
    model. This criticism has nothing to do with the ethical properties of AI models,
    such as bias or fairness. It questions whether Google should develop an AI model
    that the management sees as essential for Google’s future business. Weighting
    business strategy and its impacts on ecology is a valid ethical question, it is
    just more on the business side than at the core of AI ethics. Figure [4-3](#516372_1_En_4_Chapter.xhtml#Fig3)
    illustrates this shift in Gebru’s research.


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig3_HTML.png](images/516372_1_En_4_Chapter/516372_1_En_4_Fig3_HTML.png)


    Figure 4-3


    Understanding the Google/Gebru Controversy


    Companies and their AI organizations can learn from this controversy. Which manager
    or board decides about which (of the three) ethical aspects in the AI sphere?
    What are the competencies of corporate social responsibility or business ethics
    teams? What does the top management decide?


    AI ethics is essential from a moral perspective, for the corporate culture, and
    for the organization’s reputation – not to speak of the already existing or expected
    to come regulatory demands. Thus, a frictionless integration in the company and
    its corporate culture is necessary right from the beginning.'
  trans: '

    ### 关于合乎道德的 AI 模型


    大多数数据科学家在面临其 AI 模型是否符合道德标准的问题时，都必须处理 AI 伦理问题。这些模型影响着人们的生活，无论是信用评分解决方案，还是机场海关用于自动护照检查的人脸检测模型。目前有许多正在进行的研究，但在企业环境中，有两个概念对
    AI 组织来说尤为突出：偏见和公平性（图 4-2）。


    **偏见**在质量保证章节中已经是一个话题。这个概念关注的是训练数据及其分布。如果训练数据的分布与现实情况存在偏差，我们就称其为有偏见的训练数据。如果一个社会大约由
    50%的男性和 50%的女性组成，那么训练数据的分布也应该是相似的。如果用于人脸识别的训练数据由 99%的男性照片组成，那么所创建的 AI 模型很可能对这些照片效果很好。相反，该模型对女性来说很可能不可靠。


    使避免偏见成为一项易于获得支持的举措的原因是，消除偏见并提高道德标准能带来商业利益：AI 模型会变得更好。


    **公平性**是一个概念，它要求训练好的 AI 模型对所有相关的子群体，即使是小群体，都能表现得同样好。假设一家公司有 95%的女性员工。这种性别不平衡会影响
    AI 模型的训练。训练过程可能会优化对女性员工的准确性，而忽略男性员工，但仍然能达到很高的准确率。当 95%的员工是女性，算法正确识别了 99.9%的女性人口，但只正确识别了剩余
    5%男性员工中的 10%时，总体而言，该 AI 模型正确识别了 95.4%——还不错，至少如果你是女性的话是这样，但如果你是男性则不然。然而，公平性的道德概念会拒绝这样的模型。如果每位男性员工都必须在前台出示护照，而所有女性员工都可以使用工卡进入，这是不可想象的。


    在企业环境中，公平性和偏见有一个关键区别。与偏见不同，公平性会给企业带来成本。公平性意味着不使用最好的 AI 模型，而是使用一个对所有相关子群体都同样有效的模型，例如，通过在训练集中过度代表小的相关子群体。为了说明这一点，我们扩展上面的例子。最好的
    AI 模型可能能识别 99.9%的女性员工，但只能识别 10%的男性员工。最好的公平（！）AI 模型可能对男性和女性员工的准确率都达到 90%。这种总体准确率的“微小”变化可能会带来高昂的成本。在机场使用准确率为
    95%的自动护照检查系统，需要海关工作人员检查每 20 名旅客中一人的护照。而准确率为 90%则意味着要检查 10%的旅客，这需要将海关工作人员数量增加一倍。


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig2_HTML.png](img/516372_1_En_4_Fig2_HTML.png)


    图 4-2


    理解偏见与公平性


    ### AI 伦理治理


    AI 伦理是一个涉及众多利益相关者的话题，从数据科学家、AI 经理，到需要 AI 模型的业务专家以及企业社会责任团队。它也是一个高度情绪化的话题。如果不能明确界定由谁或哪个委员会就三个领域（不）道德用例、（不）道德工程实践和（不）道德
    AI 模型做出哪些决策，组织就有可能陷入关于什么是恰当的、什么是道德上可接受的以及由谁来决定这些问题的激烈争论。


    谷歌/蒂姆尼特·格布鲁的争议事件说明了 AI 组织容易忽视的一个陷阱。格布鲁的声誉建立在她早期的工作上，她曾揭露 IBM 和微软的人脸检测模型对白人男性效果良好，但对有色人种女性则不准确。换句话说：她发现了模型中的缺陷，这些缺陷很可能是由有偏见的训练数据造成的。此类缺陷令人尴尬，但了解这些不足能使数据科学家构建出更好的模型。


    在谷歌工作期间，她合著了一篇论文，批评谷歌在一种新语言模型上的工作，原因有二。首先，谷歌使用在线文本训练其模型。这些文本显然（部分地）带有偏见、歧视性，甚至公开的种族主义。当训练集也包含此类文本时，模型也会部分地反映它们。联合国“自动补全真相”活动通过视频展示了这一点。他们让谷歌搜索的自动补全功能建议接下来应该出现哪些词。如果输入“women
    cannot”得到的结果是“women cannot drive”，这反映了我们语言使用中的偏见。自动补全预测功能运行正常，但结果却有问题。格布鲁过去和现在都是对的：如果你使用在线文本，你就是在复制当今的不公正和不道德倾向。这种批评背后的基本要求是：语言模型不应反映我们今天使用的语言，而应反映一个更好、更纯净的我们自身和我们的语言——没有偏见和歧视。


    这种批评同时也质疑了工程方法。谷歌是应该使用来自网络的、不产生成本且反映我们语言的在线文本，还是应该开始过滤和准备训练文本，以排除可能存在问题的文本？突然之间，由于过滤和重写用作训练数据的文本可能需要付出巨大努力，这种批评影响到了
    AI 模型开发的速度和商业案例。


    她的第二个批评针对的是该语言模型的巨大能源消耗。这种批评与 AI 模型的道德属性（如偏见或公平性）无关。它质疑的是谷歌是否应该开发一个管理层认为对其未来业务至关重要的
    AI 模型。权衡商业战略及其对生态的影响是一个有效的伦理问题，只是它更偏向商业层面，而非 AI 伦理的核心。图 4-3 说明了格布鲁研究焦点的这种转变。


    ![../images/516372_1_En_4_Chapter/516372_1_En_4_Fig3_HTML.png](img/516372_1_En_4_Fig3_HTML.png)


    图 4-3


    理解谷歌/格布鲁争议


    公司及其 AI 组织可以从这场争议中吸取教训。哪位经理或董事会决定 AI 领域的哪个（三个中的）伦理方面？企业社会责任或商业伦理团队的职责是什么？高层管理团队决定什么？


    从道德角度、企业文化以及组织声誉来看，AI 伦理都至关重要——更不用说已经存在或预期会出现的监管要求了。因此，从一开始就将其无缝融入公司及其企业文化是必要的。

    '
- fmt: '# AI and Regulations


    Adhering to ethical standards is highly recommended, though optional. Adhering
    to regulations is a must. And when it comes to regulations, policymakers around
    the globe passed laws over the last years and are preparing additional ones that
    impact AI organizations directly. These regulations come in two forms:


    * **Data protection laws** defining which data companies can store, how they can
    use the data, and which additional conditions they have to meet (e.g., transparency,
    right to be forgotten).

    * **AI algorithm regulations**, such as the EU’s AI act proposal, impacting how
    algorithms can work with data and which use cases are acceptable.


    The EU reacted to the explosion of data and the AI-driven revolution in data exploitation
    by introducing new laws. The following section looks at the two EU’s landmark
    regulations: the General Data Protection Regulation (GDPR) and the new EU proposal
    for an AI act. Many other countries follow this model, at least for GDPR.


    In contrast, many relevant regulations in the US are a reinterpretation of existing
    laws and rules in the light of AI. Thus, as a third example, we look at the Federal
    Trade Commission’s approach of applying existing principles for the AI context.


    A remark before looking at the regulations: Readers should keep in mind that regulations
    do not only reflect the academic discourse on AI ethics. Regulations also want
    to foster innovation and ensure that a country’s economy can compete globally.


    ## Data Privacy Laws: The GDPR Example


    Today’s worldwide gold standard for data privacy is the European Union’s General
    Data Protection Regulation (GDPR) from May 2018. The GDPR is so well known (and
    feared) around the globe for combining, first, fines of up to 20 million euros
    or 4% of a company’s global turnover, with, second, its global applicability if
    – simply speaking – companies process EU citizens’ data. It does not matter where
    the company has its domicile or where they store and process such data.


    The GDPR defines seven principles for data processing – obligations and restrictions
    companies and their AI organizations must follow. They are the easiest (and least
    expensive) to implement when adhered to in the design phase for an AI organization
    or concrete software solutions. “**Privacy by design**” or “privacy by default”
    are terms reflecting the ambition to consider privacy right from the beginning
    instead of trying to get it somehow somewhere into the code late.


    The first of the seven principles demands **lawfulness, fairness, and transparency**.
    Any processing requires a legal base such as customer consent, legal obligations,
    or a necessity. Fairness demands not to misguide users, for example, with whom
    they are in contact or what they approve and accept.


    The second principle is **purpose limitation**. When companies collect data, they
    have to be clear and transparent about the purpose they want to process the data
    for later. The stated purpose restricts and limits future data processing and
    usage for training AI models (if there is no other lawful base). Third, **data
    minimization** requires collecting and storing only data needed for the defined
    purpose. **Accuracy** demands personal data to be correct and not misleading –
    and to correct it otherwise. **Storage limitation** is about the duration of the
    data storage. Companies must not store personal data longer than needed.


    The **security principle** (also termed integrity and confidentiality) requires
    that you secure your data. IT security organizations handle this in many companies.
    Furthermore, a later chapter looks at how to secure training data and environments
    and trained AI models.


    Finally, there is the **accountability** principle, which requires you to take
    responsibility for handling personal data.


    AI organizations must follow these principles, even if they generate extra work.
    In particular, AI organizations must understand where data comes from and for
    which purpose data scientists can use it (data lineage). Moreover, just stating
    to adhere to these principles is a time bomb, even if AI organizations really
    do. They need documentation as **evidence for audits**.


    GDPR states further obligations. For example, a company has to confirm to natural
    persons on request whether they process any data relating to them and to provide
    a copy of all this data. Natural persons also have the right to get additional
    information such as how long a company stores their data, where the data comes
    from, plus the recipients of the data, or the purpose of processing (**data subject
    access request**). Companies need to have a comprehensive **catalog** of all applications,
    processing, and external data transfers. You cannot provide a requestor all his
    personal data if you do not know where you store which data. There is also the
    need for **Data Protection Impact Assessments** for high-risk data processing,
    for example, when data processing involves people tracking and surveillance or
    sensitive personal data. Thus AI organizations have to make sure that they follow
    company guidelines laid out by the IT department, the data protection officer,
    or legal & compliance teams to be ready for the next audit – or the next request
    from a data subject.'
