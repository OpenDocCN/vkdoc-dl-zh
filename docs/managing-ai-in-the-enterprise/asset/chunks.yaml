- fmt: '### Organizational Impact


    How does AI impact employees in the sales organization if AI takes over scoring
    customers in and for sales and marketing? First, assigning scores is nothing new.
    Marketing and sales professionals have been doing this for decades. AI revolutionizes
    how to calculate scores and who executes the task. It does not base anymore on
    the gut feeling of a marketing professional, who, based on 30 years of experience,
    really, really knows that men between 35 and 55 are the ideal customers. The modern
    form of scoring bases on AI, incorporating as much information as possible such
    as age, gender, buying history, or clicks on products and ads in the webshop.


    When AI takes over the scoring, this impacts the sales management organization.
    The IT department and its software solutions create the lead lists of whom to
    call to sell a particular product from now on. The sales management can shift
    its focus away from playing around in Excel to higher-value tasks such as designing
    campaigns and understanding to whom to sell brand-new products and services.


    The impact on the sales staff depends on the detailed business model. Is there
    a deep personal relationship? Does the (time-consuming) personal relationship
    translate into adequate extra revenues? Do the sales reps consider customers to
    be "their" customers and is this belief backed by reality? For example, in (outbound)
    call-centers, AI-generated lead lists do not change how agents work. As before,
    they get a list of (potential) clients they have to contact. The only difference
    is that they should close more deals because the customers on the AI-generated
    list contain more customers likely to buy. Thus, they generate higher revenues
    (or reach the previous goals in less time). Sales staff with a personal relationship
    will see some change because AI complements their personal understanding of their
    customer with statistically derived insights. Especially in the latter case, the
    success depends on a combination of IT and data science and an organizational
    transformation.


    ## Insights for Product Strategies


    AI brings not only quick wins for sales organizations on a tactical or operational
    level. It also provides strategic insights, for example, for product and service
    managers. We exemplify the latter aspect of generating strategic insights by looking
    at the benefits of AI for product management and sales and at the methodology
    behind it.


    ### Identifying the Business Challenge


    Increasing revenues and profits is part of the DNA of every successful company.
    Product managers are eager to find new ways to boost sales for their portfolio.
    The previous section already presented one specific example of how to push sales.
    Here, we take a broader, more holistic perspective: the Ansoff Matrix (Figure
    [1-5](#516372_1_En_1_Chapter.xhtml#Fig5), left). The Ansoff Matrix covers the
    best-known growth strategies to increase sales. Market penetration is the most
    straightforward strategy to implement: selling more of the existing products to
    the existing customer base – the approach presented in the previous section about
    operational efficiency (Figure [1-5](#516372_1_En_1_Chapter.xhtml#Fig5), middle).


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig5_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig5_HTML.png)


    Figure 1-5


    Ansoff Matrix with the Illustration of the Various Sales Strategies. The Diversification
    Case Is Not Illustrated Due to Its High Failure Risk and the Less Apparent Benefits
    from AI


    Product development is another growth strategy: selling new products to an existing
    customer base. For example, many years ago, banks launched credit cards and sold
    them to their existing customer base. It is not realistic to get such product
    ideas from AI. However, it can help matching customer segments and products to
    identify niches.


    This approach does not apply an AI model to predict who signs up for a credit
    card. This strategy requires analyzing the AI model itself. Potential insights
    from the model can be:


    - Teenagers do not have a credit card.

    - Adults in low-income households seldom have one.

    - Retired persons often have no credit card. If they have one, they use it infrequently.


    These insights help product managers to launch product innovations. In this example,
    the bank has unserved customer segments, for example, teenagers to whom the bank
    must not grant loans and adults with high default risk. The product manager needs
    a new product because the existing offering is not suitable for these customer
    segments. We all know the solution: prepaid credit cards. It looks like a credit
    card, but you can only spend as much money as you put on the card beforehand.
    For retired persons skeptical about the risks when paying with a credit card,
    an assurance for cyber fraud is an option. Thus, AI can help with its model to
    shape and develop new products (Figure [1-5](#516372_1_En_1_Chapter.xhtml#Fig5),
    right/B). Another outcome of such an analysis can be that the customer base of
    similar products overlaps. In such a case, product managers might want to restructure
    their product portfolio because the products cannibalize each other and each product
    has fixed costs.


    An AI model helps as well for a market-development growth strategy. Suppose a
    product manager analyzes the AI model and can characterize potential buyers (e.g.,
    over 30, no kids, no cat, potentially a dog). With this knowledge, he can contact
    market research or direct marketing companies with address databases. They might
    provide lists of persons matching the criteria, making them likely potential new
    customers (Figure [1-5](#516372_1_En_1_Chapter.xhtml#Fig5), right/C).


    Figure [1-6](#516372_1_En_1_Chapter.xhtml#Fig6) illustrates the mechanics of how
    to use an AI model for insights from a procedural side. The idea is to check whether
    a defined product or market strategy and observed customer behavior match. If
    not, this means there is an opportunity for growth when readjusting the product
    and market strategy and checking again.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig6_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig6_HTML.png)


    Figure 1-6


    AI for Strategic Product Management'
