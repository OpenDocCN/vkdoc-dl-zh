  trans: '

    ### Jupyter Notebook 现象


    `Jupyter Notebooks` 是一款引人入胜的软件。我在第一次学习深度学习和人工智能课程时接触到了它。而在我从事数据管理的二十年里（经常涉及 SQL
    编程实践），却从未听说过它。正如 `Google Trends` 所示，对 `Jupyter` 笔记本的兴趣从 2014/2015 年左右开始上升。起初，这种兴趣几乎每年翻一番，并且至今仍在增长（图
    2-16）。每位人工智能管理者几乎每天都会听到数据科学家提及它们。如果数据科学家的 `Jupyter Notebooks` 出现问题，就会拖慢他们的工作进度。总的来说，`Jupyter`
    笔记本的主要用途是开发 Python 脚本。然而，它们并非简单的类似 TOAD 的工具或 Python 版的 `SQL Developer`。它们是一种处理数据的新方式。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig16_HTML.png](img/516372_1_En_2_Fig16_HTML.png)


    图 2-16


    2011 年 1 月至 2020 年 5 月期间，关于“Project Jupyter”和“数据科学”主题兴趣的 Google 趋势分析


    `Jupyter Notebooks` 是一个交互式开发环境。其命令支持例如下载数据、清洗或转换数据，以及训练人工智能模型。作为一个交互式环境，数据科学家可以编写几行代码并立即执行。他们可以选择是重新运行整个脚本，还是只运行新的代码行。这个选择至关重要。用于数据准备或生成模型的单个命令可能需要几分钟、几小时甚至几天。为了测试一些新代码行而重新运行整个脚本，通常耗时过长。


    除了交互模式，第二个区别在于，使用 `Jupyter Notebooks` 为代码添加注释变得有趣。这与老式的 Java 代码注释不同，感觉更像是在纸质笔记本上做笔记。在编写新命令之前（或之后），添加注释有助于记住其确切目的。否则，数据科学家可能在编写了五条或十条命令之后，就不再记得自己代码中每一行的原因和实际上下文了。`Jupyter
    Notebooks` 允许对注释进行精美的格式化（例如，粗体、斜体），并集成图片和草图。这些选项表明，注释不仅仅是附加品，而是模型开发过程中不可或缺的一部分。


    为了更好地说明 `Jupyter Notebooks` 的概念，图 2-17 包含了一张截图。这个 `Jupyter Notebook` 是一个用于从网络下载图像并将其存储到数组中以便后续处理的脚本。顶部是一个包含注释（“markdown”）的单元格。然后，是一个包含代码的单元格。最初的命令定义并实例化变量，接着是一个用于下载图像的
    `for` 循环。最后的命令用于向控制台输出。在包含代码的脚本下方，是 `Jupyter` 笔记本在执行此脚本时写入控制台的输出。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig17_HTML.png](img/516372_1_En_2_Fig17_HTML.png)


    图 2-17


    Jupyter Notebook 示例


    ### 用于模型开发的 CRISP-DM


    无论是否使用 `Jupyter` 笔记本，无结构的实验和不协调的工程很少能交付成功的人工智能模型或可运行的人工智能驱动软件解决方案。人工智能项目越大、越重要，方法论就越关键。在人工智能领域，最流行的方法是跨行业数据挖掘标准流程（CRISP-DM）。尽管发布于世纪之交，但其六个阶段（图
    2-18）至今仍是行业标准。


    第一阶段是业务理解。业务想要实现什么目标——以及相应的人工智能项目目标是什么？业务目标的一个例子是将客户流失率降低 50%。换句话说：当客户需要续签抵押贷款时，更换银行的客户减少了
    50%。一个匹配的人工智能项目目标是提供一份下个月可能不续签抵押贷款的 1000 名潜在客户名单。第一阶段还涵盖评估资源状况。项目需要专业知识和充足的人员配备、数据源、工程和人工智能工具，以及训练和生产环境。可能存在需要澄清的法律限制，或者从未被记录下来的隐含的关键基本假设。理解并改善资源状况是制定项目计划的一部分。


    因此，`CRISP-DM` 的第一阶段涵盖了在行动项目开始之前与业务案例相关的方面。我们在本章前面的范围界定问题以及上一章的业务收益讨论中详细介绍了这些要素。


    ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig18_HTML.png](img/516372_1_En_2_Fig18_HTML.png)


    图 2-18


    CRISP-DM 模型


    第二阶段是数据理解。它始于获取访问权限，并可能从上一阶段确定的数据源复制数据。它涵盖了诸如获取账户、开放防火墙或启动文件传输等任务。数据科学家从高层视角描述并致力于理解数据。他们记录属性的含义、语法（例如，字符串字段与数字字段）、统计分布以及质量。典型的质量问题包括，例如，空字段或仅包含部分数据的表（例如，全球所有客户，但排除了中国或美国）。


    在第三阶段——数据准备——数据科学家转换并准备最终的数据集，用于后续的模型创建。他们识别出可能有用的表和属性。经验法则是提供尽可能多的属性，让人工智能训练算法自行决定哪些属性能提高人工智能模型的质量。当试图理解哪些客户可能决定不续签抵押贷款时，我们所知道的关于客户的一切信息都有助于训练模型：账户余额、与银行顾问的联系次数、资金流入和流出——任何与客户、其抵押贷款或其行为和行动广泛相关的信息。数据准备也涵盖特征工程。并非所有潜在有用的输入值都存在于数据库中。数据科学家可能必须从公司的日历解决方案中提取客户顾问的所有客户联系记录，并确定每个客户的联系次数。资产的净流入或流出需要汇总当前和一年前的头寸。

