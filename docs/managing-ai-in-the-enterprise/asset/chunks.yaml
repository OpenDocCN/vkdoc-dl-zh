  trans: '

    ### AI 与数据分析 vs. Excel


    当 AI 项目经理或数据科学家向其他团队解释 AI 如何彻底改变该团队工作的美妙新世界时，他们绝不能忘记一个事实：在 AI 专业人士介入之前，组织的其他部分运转良好。因此，AI
    专业人士可能不得不反复解释，为什么 AI 生成的列表优于基于 Excel 的手动方法。我清楚地记得一位银行市场专员对我说过的话：一个实习生用`Excel`在两到三天内就能生成一份潜在客户名单。他们不需要
    AI。


    在产品管理领域，比较销售策略与销售现实并非新鲜事。然而，与传统的`Excel`手动方法相比，尤其是分析或统计方法能够提供更深入的理解。`Excel`适用于
    20 或 30 个标准。它适合手动验证其中一两个标准（如性别或年龄，或两者兼有）的影响。这类用于手动验证的简单假设可能是“只有 25 岁以下的客户才会订购能量饮料”或“有孩子的家庭喜欢购买带有独角兽和火烈鸟图案的粉色床单”。


    `AI`带来了两项改进。首先，**无需假设**哪些属性可能是最相关的并需要手动验证。相反，AI 算法在学习与模型创建过程中会审视所有提供的属性，并识别出真正相关的属性。其次，AI
    算法甚至能处理**数千个属性**，而使用`Excel`表格的人类在面对这种复杂程度时则会束手无策。


    尤其是复杂的关系，人类很难理解。用`Excel`需要多久才能找出三个客户群体？一个群体由 25 岁以下的男性客户组成，一个是居住在郊区、年龄在 30 至 40
    岁之间的富裕女性，第三个也是最后一个群体是居住在乡村、养狗的 60 岁以上老年人。这种高级洞察力有助于产品经理和营销专家识别并构建他们的**用户画像**。用户画像是指具有相似人口统计学特征（以及根据上下文，具有相似动机）的（潜在）购买者或产品用户群体。


    一个来自银行界的例子：一家银行想了解为什么企业银行客户会终止关系。他们意识到：银行顾问向商业客户推销一款新推出的产品，销售情况相当不错。这是通过分析得出的知识。得出结论、进行判断和决策则是银行家们的任务。他们必须弄清楚为什么客户在购买了畅销产品后却离开了。他们了解到，银行顾问不顾产品是否合适，强行向客户推销。客户感到被欺骗，从而终止了银行关系。这个客户流失案例说明了数据驱动型公司如何受益，因为他们获得了无人能预见的洞察力。而这些洞察力帮助公司领先于竞争对手。没有人看到畅销产品与客户流失之间的联系——AI
    模型让这一点变得显而易见。


    ### 理解 AI 项目交付成果与方法论


    如上一节所述，数据科学家和 AI 项目如何为产品经理生成战略洞察？这个挑战涉及多个方面。起点始终是作为训练数据来创建 AI 模型的真实世界数据。对于图 1-7
    中的销售场景示例，这就是“用于模型训练的销售数据”表格。数据、属性或参数越多越好。关键在于包含预期输出或预测的列。在示例中，这就是“是/否”列。谁会购买——这是模型应该做出的最终预测。


    数据科学家对这些训练数据应用学习算法，旨在创建一个预测模型。该模型是战略和战术洞察的基础。战术洞察是指那些购买产品可能性很高的客户。为此，数据科学家将预测模型应用于尚未被销售代表联系过的客户。他们为每位客户打分——这就是“潜在客户名单”表格——以评估如果联系他们，其购买产品的可能性有多大。该分数有助于确定优先联系谁。


    数据科学家通过审视模型来获取战略洞察。AI 模型包含的信息显示，中等收入客户与产品有很强的关联性。其他可能对产品感兴趣的客户指标包括：男性、高收入或购买了银行套餐。


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig7_HTML.png](img/516372_1_En_1_Fig7_HTML.png)


    图 1-7


    AI 在销售与销售管理中的应用——全景图

    '
- fmt: '# AI-Driven Innovation in Fashion


    The typical AI bread-and-butter business is identifying upselling or cross-selling
    opportunities and understanding customer characteristics. However, AI can be cool
    and trendy – or at least data scientists can help others become and stay fashionable
    and stylish. The fashion and especially the fast-fashion business seems to be
    just about finding cheap factories for manufacturing in the Far East and spending
    big on marketing campaigns. However, AI is crucial in fashion and penetrated many
    critical functions than, for example, in the highly digitized world of banking.


    The massive usage of AI comes as no surprise when asking yourself whether you
    would put the same designs and the exact same sizes on stock in the stores in
    North Dakota and your flagship stores in Milan and Paris. Do your customers have
    the same fashion sense everywhere? Should you price your items the same around
    the globe? The questions are provocative – at least if you live in North Dakota
    – but H&M lost much money when shipping similar items to all its stores. They
    failed to sell enough clothes at undiscounted prices as planned, which significantly
    impacted their revenues and margin. Thus, H&M invested in “localization.” AI predicts
    which store’s customers are most interested in which fashion piece and route their
    garments accordingly. The predictions base on point-of-sales data and information
    about their loyalty club members (and where they shop).


    However, the fashion industry’s value chain is longer and more complex, and AI
    can help in various other steps as well (see Figure [1-8](#516372_1_En_1_Chapter.xhtml#Fig8)).
    **Trend scouting** reflects that big brands and fashion retailers have only limited
    influence today. The fashion shows in Paris and Italy do not dictate trends as
    in the 20th century. Influencers and social media curate new trends. Understanding
    these trends either requires manually looking and classifying fashion photos and
    videos found everywhere – or letting AI determine trends by categorizing images,
    for example, for garment style or color. When it comes to designing garments,
    Tommy Hilfiger, together with IBM and the Fashion Institute of Technology College
    in Manhattan, run a joint project. They used AI technology, Tommy Hilfiger’s product
    library, and pictures from runways to enable students to create new fashion designs
    based on the brand’s aesthetic. It is unclear whether they want to incorporate
    such ideas into their fashion design methodology. Still, the example illustrates
    one important point: data and AI can also innovate **creative processes**. Similarly,
    H&M sold a Data Dress. Its design is the result of the person’s life and context,
    such as the weather. These influencing parameters determine the choice of color,
    material, and additional details to make a really customer-specific dress.


    ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig8_HTML.png](images/516372_1_En_1_Chapter/516372_1_En_1_Fig8_HTML.png)


    Figure 1-8 Fast-Fashion and AI


    Next in the value chain is estimating the sales success of products, and **ordering**
    the matching amount of pieces is a typical prediction question for AI. Once it
    is clear which items to assign to which store, the next step is pricing the pieces.
    Which price are customers willing to pay? How many pieces do we estimate to sell
    for which price? H&M reports benefits of using AI – and especially of using a
    combination of AI and final human judgment.


    Finally, there are client-facing functionalities such as apps, emails, or push
    messages. They help implement the already mentioned use cases such as upselling
    and cross-selling or identifying shopper groups and characteristics. While this
    is standard across industries, the AI-based Tommy Hilfiger **brand and shopping
    experience** is an exciting high-tech idea: “see-now-buy-now.” Customers can buy
    fashion directly during a fashion show when models present the garments on the
    runway. Similarly, an app allows customers to identify fashion pieces on camera
    snapshots and provides the opportunity to buy them directly in the online shop.
    It is an inspirational eye-opener even for non-fashionados to see in how many
    ways AI innovates the fashion industry. It should motivate business executives
    and data scientists in other industry sectors to look around with open eyes to
    identify innovative opportunities in their daily work as well.


    ## Business Intelligence and AI


    All the previous examples about sales and product management or fast fashion exemplified
    how AI innovates companies. When managers want to start a similar program, the
    first question is: Who will run the project? Do we have a qualified team with
    relevant experience?


    Most companies have data warehouse (DWH) and business intelligence (BI) teams.
    These teams know the company data very well. They run a platform with at least
    all necessary technical features for the first AI use cases. However, I was first
    surprised when I noticed that many companies – especially medium-sized organizations
    – establish separate AI programs and data science teams instead of enhancing the
    DWH or BI team with data science know-how.


    This phenomenon highlights: just having the best and brightest experts, even if
    they and their software solutions match the business needs, is not enough. Organizational
    compatibility is essential. The following four reasons prove that. They illustrate
    why companies establish AI teams separately in addition to BI and DWH teams:


    1.  BI teams often focus on summary **reports**, not on generating additional
    knowledge and insights (see the discussion about data, information, and knowledge
    reflected in Figure [1-1](#516372_1_En_1_Chapter.xhtml#Fig1)). Not every reporting-focused
    BI team can reinvent itself (and has the funding for that).


    2.  The **sponsors** differ. Often, the funding for a data warehouse comes from
    controlling or marketing and sales. Thus, the teams have to deliver results valuable
    for their sponsors. In contrast to data science teams, they cannot shift many
    engineers to projects outside their sponsor’s interest area.


    3.  Data warehousing teams often focus on developing thoroughly tested and well-specified
    solutions. This cautious approach is necessary, for example, for regulatory reports.
    The expectations in AI differ. Suppose the business needs **quick answers** for
    a one-time-only question that is not asked again. Not all data warehousing teams
    are ready for that.


    4.  Small data warehousing teams are often busy keeping the systems and all feeds
    up and running. They have to ensure a smooth daily, weekly, or monthly delivery
    of business-critical reports. Such teams are strong in **operations** and engineering
    but miss know-how for more advanced and mathematically challenging AI tasks.


    These are four aspects organizations should consider before assigning AI-related
    responsibilities to an existing DWH or BI team. However, as we see in later chapters,
    a data warehouse is an excellent data source for data scientists. An existing
    DWH speeds up many AI projects. Thus, it is essential for an organization that
    BI and DWH teams and data scientists understand that they complement each other.
    They do not compete.'
  raw: '## AI-Driven Innovation in Fashion


    The typical AI bread-and-butter business is identifying upselling or cross-selling
    opportunities and understanding customer characteristics. However, AI can be cool
    and trendy – or at least data scientists can help others become and stay fashionable
    and stylish. The fashion and especially the fast-fashion business seems to be
    just about finding cheap factories for manufacturing in the Far East and spending
    big on marketing campaigns. However, AI is crucial in fashion and penetrated many
    critical functions than, for example, in the highly digitized world of banking.


    The massive usage of AI comes as no surprise when asking yourself whether you
    would put the same designs and the exact same sizes on stock in the stores in
    North Dakota and your flagship stores in Milan and Paris. Do your customers have
    the same fashion sense everywhere? Should you price your items the same around
    the globe? The questions are provocative – at least if you live in North Dakota
    – but H&M lost much money when shipping similar items to all its stores. They
    failed to sell enough clothes at undiscounted prices as planned, which significantly
    impacted their revenues and margin. Thus, H&M invested in “localization.” AI predicts
    which store’s customers are most interested in which fashion piece and route their
    garments accordingly. The predictions base on point-of-sales data and information
    about their loyalty club members (and where they shop).


    However, the fashion industry’s value chain is longer and more complex, and AI
    can help in various other steps as well (see Figure [1-8](#516372_1_En_1_Chapter.xhtml#Fig8)).
    **Trend scouting** reflects that big brands and fashion retailers have only limited
    influence today. The fashion shows in Paris and Italy do not dictate trends as
    in the 20th century. Influencers and social media curate new trends. Understanding
    these trends either requires manually looking and classifying fashion photos and
    videos found everywhere – or letting AI determine trends by categorizing images,
    for example, for garment style or color. When it comes to designing garments,
    Tommy Hilfiger, together with IBM and the Fashion Institute of Technology College
    in Manhattan, run a joint project. They used AI technology, Tommy Hilfiger’s product
    library, and pictures from runways to enable students to create new fashion designs
    based on the brand’s aesthetic. It is unclear whether they want to incorporate
    such ideas into their fashion design methodology. Still, the example illustrates
    one important point: data and AI can also innovate **creative processes**. Similarly,
