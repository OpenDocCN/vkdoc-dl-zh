- '# 在 IT 解决方案中集成 AI 模型


  网购消费者对这一现象并不陌生。网店会向顾客推荐与购物车内容完美匹配的商品：黑西装配黑袜子？点击！粉色手袋的顾客配粉色鞋子？点击！AI 算法在后台运行。其目标是什么？提升销售额！然而，要让这一切奏效，仅靠
  AI 模型是不够的。我们必须将 AI 模型集成到“现实世界”的应用中，例如网店。


  那些刚进入大型组织、拥有深厚学术背景的数据科学家，往往低估了集成挑战。他们开始尝试使用商业或免费的 AI 软件包，或是基于云的 AI 服务。他们想通过尝试一些用例来弄清楚是否以及如何从
  AI 中获益。此时，他们（尚）不需要 AI 组件与一个或多个应用程序之间的接口。一旦收益变得明显，情况就会发生变化。业务部门和 IT 管理层希望 AI 成为复杂软件解决方案中不可或缺的一部分。例如，一家在线时装店拥有许多与
  AI 无关的功能。网店展示时装；顾客可以搜索商品、将其加入购物车并付款。AI 组件只是另一个功能，它“仅仅”为每位顾客确定可能特别感兴趣的商品。AI 组件可能会向购物篮中有西装的顾客推荐黑袜子，并将该推荐信息传输给网店应用程序。然后，顾客就会在浏览器中看到黑袜子作为商品推荐。


  AI 组件与应用程序其余部分之间的协作是目标所在。AI——以及具有 AI 功能的软件解决方案——的起点是历史数据。数据科学家需要这些数据来创建 AI 模型，例如用于分析顾客购买行为的模型。然而，如果数据科学家在生产系统上开展工作，那将是一个糟糕的主意。当数据科学家查询大型数据集并运行复杂、资源密集型的语句时，他们可能会干扰日常运营。因此，通过从生产系统中复制或提取数据，并将数据放入具有足够计算能力的训练环境中，从而将他们的工作解耦，这一点至关重要。


  一旦 AI 模型准备就绪，数据科学家或 IT 工程师就会将模型部署到生产系统中。没有模型是永恒不变的。基于更新的数据，一个更新的模型会在一天、几周或几个月后取代它（图
  2-21）。


  ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig21_HTML.png](img/516372_1_En_2_Fig21_HTML.png)


  图 2-21


  理解数据、模型创建与模型使用


  具体的部署或集成可以遵循多种模式。三种主要变体是：


  - 预计算

  - 重新实现

  - 封装的 AI 组件


  对于**预计算**，数据科学家开发并创建 AI 模型，例如，该模型为每位顾客确定其最可能购买的下一个商品。接着，数据科学家或 IT 工程师将这些信息上传到应用程序。现在，当顾客稍后再次访问在线商店时，应用程序就知道该向他们推荐哪些商品。应用程序直接使用结果，它并不了解模型本身。AI
  组件或环境与应用程序之间无需集成。模型开发和评估在 AI 训练环境中独立进行，而评估或推理始终基于最新的模型（图 2-22）。


  如果模型更新的频率与“现实”世界的变化不匹配，预计算就会有一些局限性。以我们的网店为例，在顾客购买了一件霓虹绿鸡尾酒裙后，网店会继续向她推荐该商品，直到下一次数据上传。在这种情况下，广告不仅无法带来额外销售额，还会让顾客觉得这家网店无法提供符合她需求的购物建议。


  ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig22_HTML.png](img/516372_1_En_2_Fig22_HTML.png)


  图 2-22


  预计算模式


  在第二种和第三种变体——重新实现模式和封装的 AI 组件变体中——AI 组件将实时的顾客购物数据输入模型，并始终为网购消费者提供最新的建议。假设数据分析师在 4
  月 30 日于其 AI 训练环境中创建了模型。然而，将模型应用于用户数据被推迟到顾客访问网店时。届时，她最新的购物历史会被输入模型，以获取商品推荐。如果她昨天买了一条绿裙子，一小时前又买了一副夸张的太阳镜，AI
  组件会考虑到这些信息。在我们的例子中，当顾客在 5 月 17 日访问网店时，应用程序会使用 4 月 30 日创建的模型以及 5 月 17 日的顾客数据。


  第二种和第三种变体在技术实现上有所不同。**重新实现模式**意味着为软件应用程序再次编写代码。软件工程师从训练环境中获取模型，然后用另一种语言（例如`Java`）重新实现相同的模型。工程师将神经网络的参数和权重放入一个配置文件中，这样参数更新就无需更改代码。理想情况下，CI/CD
  流水线可以实现自动集成。这样的流水线会自动收集所有开发人员和数据科学家的各种来源，创建一个可部署的软件组件，并将其安装在开发、测试和/或生产系统上。因此，当顾客访问网店时，网店中就包含了这个神经网络，就像包含任何其他应用程序功能或代码一样（图
  2-23）。


  ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig23_HTML.png](img/516372_1_En_2_Fig23_HTML.png)


  图 2-23


  重新实现模式


  或者，在封装的 AI 组件模式中，应用程序架构可能包含一个专用的**AI 运行时服务器**（图 2-24）。后者为公司所有依赖 AI 功能的应用程序运行 AI
  模型。`RStudio Server`就是这样一个产品。当顾客访问网店时，网店会调用 AI 运行时服务器上的模型，并传入该顾客的购物历史。AI 运行时服务器将购物历史数据输入神经网络，以预测顾客偏好。然后，AI
  运行时服务器将此预测结果返回给网店，网店据此向该特定顾客展示并突出推荐相关商品。


  ![../images/516372_1_En_2_Chapter/516372_1_En_2_Fig24_HTML.png](img/516372_1_En_2_Fig24_HTML.png)


  图 2-24


  封装的 AI 组件模式


  对于这种模式，AI 团队需要搭建、运行并维护一个 AI 运行时服务器，每位数据科学家都将自己的模型部署到该服务器上。


  顺便提一句，“能够持续自我优化的模型”听起来既显而易见又富有远见。它们在技术上是可行的。例如，谷歌的 GCP ML Pipeline 就遵循了这一理念。然而，完全自我优化和完全自主的模型可能会产生有害的副作用。假设
  AI 只推荐利润率高的夸张领带，因为优化目标是提高利润率。那么，短期内利润可能会增加。但到了某个时候，这家时装网店会被视为领带专卖店，只有想买领带的顾客才会来。人类比完全自动化的优化过程更能察觉到这类趋势。即使在
  AI 的世界里，人类大脑仍然是不可或缺的。




