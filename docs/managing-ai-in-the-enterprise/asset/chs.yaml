- '# AI 与经典数据仓库架构


  数据库和数据仓库不仅有助于在 AI 环境中存储数据。企业使用它们已有数十年之久。在 AI 出现之前，数据驱动型企业的架构由操作型数据库层和数据仓库层组成。


  **操作型数据库**通过存储和处理数据来服务于业务应用。例如，它们存储主数据、产品描述、银行转账或销售点记录。


  业务用户（可能在数据库管理员的支持下）可以针对数据提交临时查询。我们针对“银发族”的营销活动是否导致上个月该年龄段的新签合同客户增多？这是一个具有明确分析重点的临时查询示例。


  查询操作型数据库存在两个**局限性**。首先，可能对操作产生影响。长时间运行的复杂分析查询可能会影响数据库的稳定性和性能，进而影响整个系统。针对在线商店的数据库提交此类查询可能并不合适。第二个局限性在于操作型数据库的侧重点。它们（通常）只存储一个应用程序或一个特定领域的数据。合并来自不同数据库（例如，一个包含在线商店数据，另一个包含零售店数据）的数据对于临时查询来说工作量大，并且需要付出巨大努力才能使其在数月乃至数年内保持稳定。打开防火墙或处理服务账户和证书只是其中的一些示例任务。因此，几乎所有公司都会运行一个或多个数据仓库，用于收集和合并来自各种操作型数据库的数据。


  一个典型的**数据仓库**包含三个层级：临时存储区层、整合数据仓库层和精选数据集市层。**临时存储区**是 ETL 过程中从操作型数据库或其他数据源复制而来的数据的中间存储位置。在
  ETL 过程中，数据仓库软件从操作型仓库中提取数据，进行转换，并将其加载到整合数据仓库层。转换过程还包括数据聚合、数据清理以及消除不一致性。第三个数据仓库层提供精选的**数据集市**。它们以用户友好的方式，为会计、销售或运营报告等主要用户群体提供与其相关的数据。


  从**AI 组织的视角**来看，一个拥有数据集市和整合层表的数据仓库是一个巨大的机遇。它是高质量训练数据的来源，这些数据具有公司范围内一致的语义，并涵盖公司的所有领域。构建一个类似的解决方案通常需要数百万美元和数年的努力，这是任何
  AI 组织都应避免的。然而，数据仓库有两个明显的局限性。数据不是实时的。ETL 流程通常在夜间运行，以最大限度地减少对办公时间操作型数据库的影响。因此，数据至少是一天前的，但公司某些数据的刷新频率可能不会超过每月一次。其次，数据仓库在添加新数据方面不够灵活。公司其他部门期望数据仓库提供一致的数据，这要求在添加一个属性（或一个或多个表）之前进行深入分析。尽管如此，对于
  AI 组织来说，数据仓库仍然是一个绝佳的机会，可以利用一些初始的、高质量的、“零投入”的训练数据，在新领域快速启动活动。


  在这种理想情况下，AI 组织将其解决方案构建为一个新的顶层，基于数据集市或整合数据仓库层，如图 6-10 所示。AI 组织越少直接处理操作型数据库，其运营就越具成本效益和敏捷性。


  ## 自助式商业智能


  将自助式商业智能（SSBI）工具称为近期数据管理和分析史上最大的骗局，可能有些言过其实。问题不在于它们的功能，而在于它们被推销给客户的方式。许多供应商试图让客户相信，该工具能让他们执行与数据科学家和
  AI 算法类似的分析——但这并不正确。


  如图 6-10 中的架构所示，SSBI 工具位于数据仓库或数据集市之上（AI 组件也是如此）。这些工具**使业务用户能够**自行定义和创建表及视图。与数据仓库的视图和表相比，业务用户的视角可能非常狭窄，不会左顾右盼，也不会考虑是否已经存在类似的绩效指标。速度、便利性、无需费力通常是业务用户关注的焦点。撇开所有批评不谈，SSBI
  工具解决了业务需求，并促进了企业职能部门（如全球性组织的控制部门）的协作。当工作涉及从各种 Excel 文件中复制数据、清理和整合这些信息时，SSBI 工具因其协作功能而能提供巨大帮助。然而，当
  AI 组织考虑使用来自 SSBI 工具的数据时，他们应该意识到，其数据质量可能不如来自数据仓库或操作型数据库的数据可靠。


  如果 SSBI 工具**阻碍了 AI 的采用**，那么它就会成为 AI 组织和公司创新潜力的一个问题。SSBI 工具是镀金的 Excel 替代品，拥有更多可供摆弄的功能，但并不能让业务用户手动生成与
  AI 项目成果同等水平的洞察和模型（并且提供没有解释的 AI 算法也可能无法产生有用的模型）。SSBI 工具的问题不在于其功能，而在于业务用户是否坚持使用 SSBI
  工具“自己分析”AI 问题，而不是让统计或机器学习算法做得更好，或者试图在不理解所需方法论的情况下创建 AI 模型。这是 SSBI 工具的一个巨大风险或劣势，并且可能导致
  AI 组织在公司内的地位出现问题。AI 管理者应警惕这一点。


