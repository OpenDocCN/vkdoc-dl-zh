- '# 排版后的内容


  另一方面，来自公有云的 AI 服务需要一定的治理。IT 部门和 AI 组织不应过于天真。首先，云服务并非免费。商业案例仍然是必需的，尤其是当你身处低利润市场，并且需要调用大量昂贵的云服务时。其次，市场力量发生了变化。一些公司每年都向其较小的
  IT 供应商施压要求折扣。而云供应商则处于不同的竞争层级。第三，使用特定的利基服务——那些能帮助你设计独特产品和服务以击败竞争对手的“新奇”服务——会导致云供应商锁定。


  平台即服务（PaaS）层面的云供应商锁定是无法避免的。企业架构师、解决方案架构师和 AI 架构师必须管理这一令人不快的现实。一个简单的措施是根据组件的预期生命周期来分离解决方案和组件。“枯燥的”后端组件会运行数十年。IT
  部门必须能够轻松地将它们迁移到不同的云供应商，且工作量很小。此外，还有一些创新的、生命周期较短的服务、移动应用或 Web 前端。它们的预期寿命不到十年——而且，每一位新任的市场总监或品牌官都会要求进行根本性的变革。对于这类解决方案，供应商锁定问题就不那么令人担忧了。反正每隔几年，在开发下一个版本时，你都可以更换技术平台。


  这对 AI 组织的影响是显而易见的：


  *   **数据准备和数据清洗活动**很可能是生命周期最长的产物。在更换平台时能够重用它们至关重要。

  *   **用于“自助式”AI 模型开发的平台**并不那么重要。所有平台都支持线性回归和神经网络。如果数据准备工作到位，重新训练这些模型就不是什么大问题。

  *   **PaaS 产品**，如标注支持、目标检测或语音识别，会导致严重的供应商锁定。它们尚未标准化，功能和接口各不相同。


  供应商锁定是令人痛苦的。一些供应商因其每年在许可和定价上玩弄花样的“创造力”而令人畏惧。另一方面，组织无法完全避免任何形式的锁定，尤其是当替代方案意味着错失 AI
  PaaS 服务带来的快速收益时。被使用 PaaS 力量的更具创新性的竞争对手攻击，并不是一个可行的替代方案。IT 部门可能会忽视 IaaS 和 SaaS 所承诺的成本节约和敏捷性提升，但
  AI 组织在拒绝将 AI PaaS 服务作为创新机会时应谨慎行事。


  ## 总结


  AI 组织面临的第一个架构挑战是组织其 AI 环境，用于训练 AI 模型，并可能用于使用训练好的模型进行推理。这里有明显的组件，例如带有 Jupyter Notebook
  的训练区域，以及用于训练数据的数据库或数据湖等数据存储。然而，只有维护良好的数据目录才能真正挖掘数据湖中的数据宝藏——如果没有到位的数据摄取和数据集成解决方案，更新训练数据将是一场噩梦。模型管理有助于跟踪现有的
  AI 模型及其版本，防止出现模型丢失或部署过时模型等混乱情况。AI 组织可能还需要管理用于推理的 AI 运行时环境——或者由解决方案团队接管模型，将其集成到他们的代码中，并在没有
  AI 组织参与的情况下运行应用程序。


  AI 组织只有掌握了必要的数据，才能高效运作。因此，了解各种选项至关重要，例如直接从运营数据库、物联网设备、数据湖或外部来源导出数据。尽管如此，最好的数据源仍然是数据仓库：文档齐全、维护良好、涵盖多个领域的一致数据。数据仓库使
  AI 组织能够快速为各种新领域或业务问题创建 AI 模型。


  未来几年，越来越多的 AI 环境将迁移到云端。仅在训练模型时为计算资源付费，是提高资源效率的重要推动力。然而，对 AI 组织来说，最大的变化是 AI PaaS
  服务，它使得训练诸如普通图像检测之类的标准服务变得过时，从而解放数据科学家，让他们专注于处理公司特定的棘手问题。


  '
- '# 7. 保护 AI 环境


  曾几何时，IT 和信息安全很简单。IT 安全专家部署恶意软件代理并设置防火墙——组织就安全了。如今，信息安全变得更加激动人心和复杂，需要每个人的贡献。即使是 AI
  组织中的数据科学家也必须了解并致力于安全——而 AI 管理者可能突然需要为其组织的 AI 基础设施的适当安全措施负责并承担责任。压力无处不在，但必要的专业知识却并非如此——尤其是在
  AI 组织中。更复杂的是，许多资深 IT 安全和风险专业人士对他们所评估的 AI 方法论和技术缺乏深入理解。这是一个两难困境，本章通过探讨四个主题来提供解决方案：


  *   **CIA 三角**：描述 IT 和信息安全的核心目标

  *   **协作模式与责任分配**：IT 安全与 AI 组织之间的协作模式与责任分配

  *   **AI 特定的安全威胁与风险场景**：包括潜在的攻击者和受攻击的资产

  *   **具体的技术和流程措施**：用于缓解 AI 相关风险并提高整体安全水平


  图 7-1 展示了它们之间的相互依赖关系。以下页面将详细阐述这些主题。


