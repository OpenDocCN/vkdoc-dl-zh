- '# 总结


  本章阐述了每个 AI 组织最显而易见且至关重要的任务：交付一个 AI 项目。它详细介绍了 AI 创新的各个方面和层次、AI 项目的范围界定，以及诸如统计模型或神经网络模型（每个
  AI 项目的核心交付物）等 AI 模型在实际中的表现。此外，本章还阐述了 AI 模型的开发流程及其在企业 IT 应用环境中的集成。掌握了这些知识后，AI 项目经理面临的下一个重大挑战显而易见：AI
  项目经理如何验证 AI 模型是否按预期运行，并提供所需的预测或分类质量？


