- '# 人工智能驱动的时尚创新


  人工智能的典型主营业务是识别追加销售或交叉销售机会，以及理解客户特征。然而，人工智能也可以很酷、很时尚——或者至少，数据科学家可以帮助他人变得并保持时尚与潮流。时尚行业，尤其是快时尚行业，似乎只关乎在远东寻找廉价工厂进行生产，并在营销活动上投入巨资。然而，人工智能在时尚领域至关重要，并且渗透到了比高度数字化的银行业等更多关键职能中。


  当你问自己，是否会在北达科他州的商店和米兰、巴黎的旗舰店库存中放置相同的设计和完全相同的尺码时，人工智能的广泛应用就不足为奇了。你的客户在世界各地都有相同的时尚感吗？你应该在全球范围内为你的商品统一定价吗？这些问题颇具挑衅性——至少如果你住在北达科他州的话——但
  H&M 在向所有门店配送相似商品时损失惨重。他们未能按计划以非折扣价格售出足够多的服装，这严重影响了他们的收入和利润率。因此，H&M 投资于“本地化”。人工智能预测每家门店的客户对哪些时尚单品最感兴趣，并据此调配服装。这些预测基于销售点数据和其忠诚俱乐部会员（及其购物地点）的信息。


  然而，时尚行业的价值链更长、更复杂，人工智能也可以在众多其他环节提供帮助（见图 1-8）。**趋势侦察**反映出，如今大品牌和时尚零售商的影响力有限。巴黎和意大利的时装秀不再像
  20 世纪那样主导潮流。影响者和社交媒体策划着新趋势。理解这些趋势要么需要人工查看和分类随处可见的时尚照片和视频，要么让人工智能通过分类图像（例如，按服装款式或颜色）来确定趋势。在服装设计方面，Tommy
  Hilfiger 与 IBM 以及曼哈顿的纽约时装技术学院合作开展了一个联合项目。他们利用人工智能技术、Tommy Hilfiger 的产品库以及 T 台走秀图片，使学生能够基于该品牌的美学风格创作新的时装设计。目前尚不清楚他们是否打算将此类创意融入其时装设计方法中。然而，这个例子说明了一个重要观点：数据和人工智能也可以创新**创意流程**。同样，H&M
  还销售过一款“数据连衣裙”。其设计是个人生活和环境（如天气）的产物。这些影响参数决定了颜色、材质和细节的选择，从而打造出真正个性化的连衣裙。


  ![../images/516372_1_En_1_Chapter/516372_1_En_1_Fig8_HTML.png](img/516372_1_En_1_Fig8_HTML.png)


  图 1-8 快时尚与人工智能


  价值链的下一步是评估产品的销售成功率，而**订购**匹配数量的单品是人工智能典型的预测问题。一旦明确了哪些商品分配给哪家门店，下一步就是为这些单品定价。客户愿意支付什么价格？我们预计以每种价格销售多少件？H&M
  报告了使用人工智能——尤其是结合人工智能与最终人工判断——所带来的益处。


  最后，还有面向客户的功能，如应用程序、电子邮件或推送消息。它们有助于实现前面提到的用例，如追加销售和交叉销售，或识别购物者群体及其特征。虽然这在各行业都是标准做法，但基于人工智能的
  Tommy Hilfiger **品牌与购物体验**是一个令人兴奋的高科技理念：“即看即买”。顾客可以在时装秀上模特展示服装时直接购买。同样，一款应用程序允许顾客通过相机快照识别时尚单品，并直接在网店中购买。即使是非时尚爱好者，看到人工智能以如此多的方式创新时尚行业，也会感到启发和眼界大开。这应该能激励其他行业领域的企业高管和数据科学家也睁大眼睛，在日常工作中发现创新的机会。


  ## 商业智能与人工智能


  之前所有关于销售、产品管理或快时尚的例子都展示了人工智能如何为企业带来创新。当管理者想要启动类似项目时，第一个问题是：谁来负责这个项目？我们是否拥有具备相关经验的合格团队？


  大多数公司都设有数据仓库（DWH）和商业智能（BI）团队。这些团队非常了解公司数据。他们运营着一个至少具备首批人工智能用例所需所有技术特性的平台。然而，当我注意到许多公司——尤其是中型企业——会建立独立的人工智能项目和数据科学团队，而不是用数据科学知识来增强数据仓库或商业智能团队时，我起初感到惊讶。


  这一现象突显了：仅仅拥有最优秀、最聪明的专家，即使他们及其软件解决方案符合业务需求，也是不够的。组织兼容性至关重要。以下四个原因证明了这一点。它们说明了为什么公司会在商业智能和数据仓库团队之外，单独建立人工智能团队：


  1.  商业智能团队通常侧重于总结性**报告**，而不是生成额外的知识和洞察（参见图 1-1 中关于数据、信息和知识的讨论）。并非每个专注于报告的商业智能团队都能自我革新（并且有资金支持这样做）。


  2.  **赞助方**不同。通常，数据仓库的资金来自控制部门或市场营销与销售部门。因此，这些团队必须为其赞助方交付有价值的成果。与数据科学团队不同，他们不能将大量工程师转移到赞助方兴趣领域之外的项目上。


  3.  数据仓库团队通常专注于开发经过全面测试和明确定义的解决方案。这种谨慎的方法对于监管报告等来说是必要的。而人工智能的期望则不同。假设业务需要针对一个一次性且不再重复的问题**快速给出答案**。并非所有数据仓库团队都为此做好了准备。


  4.  小型数据仓库团队通常忙于维持系统及其所有数据源的正常运行。他们必须确保每日、每周或每月的关键业务报告能够顺利交付。这类团队在**运维**和工程方面实力雄厚，但缺乏处理更高级、数学上更具挑战性的人工智能任务的专业知识。


  在将人工智能相关职责分配给现有的数据仓库或商业智能团队之前，组织应考虑这四个方面。然而，正如我们在后续章节中看到的，数据仓库是数据科学家的绝佳数据来源。现有的数据仓库可以加速许多人工智能项目。因此，对于一个组织来说，让商业智能和数据仓库团队与数据科学家理解他们是互补的，这一点至关重要。他们并非竞争关系。




