- fmt: '# Understanding People’s Attitudes Toward Data for the Optimization of a Specialist
    Podiatry Service for People with Long-Term Health Conditions


    *The following case study presents a best-practice example of how to listen to
    an audience at scale to understand attitudes, preferences, and digital personas
    concerning an intended technology and its ramifications.*


    More than 77,000 diabetics in England have foot ulcers today.^([^(91)](#fn91))
    The longer ulcers progress, the longer they take to heal. If untreated, ulcers
    can lead to diabetic foot disease (DFD) and amputation. Twenty-five people in
    England have a lower limb (toe/foot/leg) amputated daily; tragically, 85 percent
    of these are preventable. From 2015–2018, 27,465 lower limb diabetes-related amputations
    happened in England (up 18.3 percent from 2011–2014), and 147,067 hospital admissions
    for DFD were recorded with an average 8-day stay totaling 1,826,734 hospital bed
    days at the cost of £376/day.^([^(92)](#fn92))


    The foot check is a chance for potential problems to be identified and assessed
    and preventive action taken. NICE NG19 states people with diabetes should have
    annual foot checks and recommends patients with active foot problems be referred
    to a multidisciplinary team/foot protection service within one working day and
    triaged within another working day.^([^(93)](#fn93)) Yet there is “poor symptom
    recognition by the patient, inaccurate health care assessment, and difficulties
    in accessing specialist services” due to the following:


    - *Delays to exam*: The National Diabetes Foot Audit found 39 percent of people
    waited 14+ days for their first foot ulceration specialist examination.

    - *Lack of testing*: 800,000 patients in England do not get an annual foot check,
    and 80 percent of practice nurses who conduct foot checks need to be more confident
    in performing them, causing variances in care and outcomes.

    - *Training*: 33 percent of NHS commissioners in England do not provide HCPs with
    footcare training, and where training is in place, the quality of the assessment
    could be better.


    There is a drastic need for support to reduce the clinical and economic impact
    of DFD and a massive opportunity for digital health innovation to democratize
    care and outcomes through the following:


    - Reducing time to examination and thus untreated ulceration/DFD

    - Conducting/supporting the foot check itself to support clinical decision-making

    - Providing training/education, resources, and treatment for healthcare professionals
    and patients between annual checks


    There is a significant economic benefit to be realized, too: a 30 percent bed-days
    reduction from reduced ulceration would save the NHS £63.5m/year. That was before
    the COVID-19 pandemic, which saw an increase in urgent foot health problems and
    a decline in face-to-face patient volume and impacted clinicians’ mental health.
    Smartphones provide a vital opportunity to extend care. However, there are very
    few apps supporting ulceration and foot care.


    As well as the technologies themselves, the data they generate is helpful. While
    the exceptional measures implemented in some countries to combat coronavirus may
    prove effective in limiting the spread of the virus, some provoked controversy
    in terms of privacy and other fundamental rights with respect to data, particularly
    when they lack transparency and public consultation. Surprisingly, evidence on
    sharing clinical trial or public health research data is limited while remaining
    a stalwart of many digital systems.


    `FootChecker` is a multiplatform app for healthcare professionals and patients
    to reduce foot ulceration, amputations, recovery time, and associated costs by
    standardizing clinician confidence and ability and providing risk-stratified patient
    education for assessment, advice, and early intervention to patients.


    ## Objective


    Our study aimed to understand the opinions of British people with long-term health
    conditions on the themes of data privacy and security, data ethics, and data misuse.
    It is essential to understand the concerns of people with long-term health conditions
    such as type 2 diabetes and hypertension, as these conditions are key risk factors
    in the progression and prognosis of ulceration. This was confounded during the
    pandemic, as both type 2 diabetes and hypertension are also COVID-19 morbidity
    and mortality risk factors.


    ## Methods


    A web-based survey study was conducted with a mixed-methods design conforming
    to the checklist for reporting results of electronic Internet surveys. People
    18 and older who had joined the `Diabetes.co.uk` community were surveyed. An email
    invitation to participate, which included a web link to the study, was sent to
    11,213 people who had consented to be contacted for research opportunities.


    The survey commenced with one screening question: “Do you consent to participate
    in the study?” Respondents who consented went on to complete the survey. Quantitative
    information (closed and multiple-choice questions) was collected on demographic
    characteristics, clinical diagnoses, and sharing and privacy of pre– and post–COVID-19
    health data. We conducted descriptive data analyses of sample distributions and
    characteristics. `Pearson r` correlation coefficients were used to determine the
    relationship between prior data-sharing behavior and attitudes toward data-sharing
    activity in the context of the COVID-19 pandemic. The data from the open question
    was read and then categorized into themes.'
