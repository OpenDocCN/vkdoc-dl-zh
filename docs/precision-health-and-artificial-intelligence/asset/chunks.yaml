  trans: '

    ### 目标


    本研究旨在评估`Low Carb Program`应用程序在减重方面的可行性和有效性，该应用在我们医院专科（三级）肥胖诊疗服务中应用。鉴于 COVID-19
    疫情对我们肥胖诊疗服务的干扰，我们还比较了在电话远程患者会诊背景下使用`Low Carb Program`应用程序的临床结果与疫情前传统标准护理的结果。


    ### 方法


    在 2020 年 1 月至 2020 年 9 月的 9 个月期间，所有转诊至英国 UHCW 医院专科（三级）肥胖诊疗服务的新患者，在初次医疗咨询时均被提供使用`Low
    Carb Program`应用程序的机会。初次接触由医生进行。医生向患者介绍该应用程序，并指导有意使用者如何下载。我们招募了那些对使用该应用感兴趣的患者，并向每人提供一个唯一代码，该代码可在从
    NHS 应用商店下载时免费激活应用。唯一的排除标准是无法理解英语。对照组数据来自一项评估团体教育课程的既往研究，参与者于 2016 年至 2019 年间接受该服务。对照组的随访时长为
    6 个月。


    在整个研究期间，每位招募的参与者均作为常规护理的一部分，持续接受我们医院专科（三级）肥胖管理团队成员的临床指导和随访。尽管本研究在 COVID-19 疫情前（2020
    年 1 月）构思并启动，但研究的大部分时间与 COVID-19 疫情有显著重叠（研究期间 7 个月中有 5 个月，即 2020 年 3 月至 9 月）。因此，自
    2020 年 3 月起，三级体重管理服务中没有任何患者获得专科饮食指导。患者的临床随访时间各不相同，但大多数患者在预约后 6 个月通过电话接受医生复查。然而，`Low
    Carb Program`应用程序通过每周一邀请参加虚拟聚会来支持每位参与者，为英国"封锁"期间与其他用户建立社交联系提供机会。我们通过教练引导的视频会议进行虚拟聚会，为分享个人经验和建立同伴支持网络提供了非正式空间。


    ### 个性化如何体现？


    出于本研究目的，我们使用了`Low Carb Program`应用程序的精简版本，专门针对社区中的肥胖人群进行个性化设置。个性化示例如下：


    *   患者 A 是一名 60 岁的南亚裔女性，被诊断为病态肥胖并伴有合并症。患者 A 的母语是印地语，且为素食者。在注册该计划时，患者 A 的注册数据会个性化她在应用中的体验。患者
    A 会看到结构化的教育内容，解释肥胖及合并症的生理机制，以及如何自我管理健康体重。患者 A 的体验以印地语提供，传递符合文化需求和期望的信息。患者 A 获得以旁遮普语提供的素食餐计划支持，食材也符合文化期望。如果患者
    A 选择使用该应用的这一功能，她参与的虚拟聚会将由一位讲印地语的教练主持。


    *   患者 B 是一名 52 岁的白种人男性，被诊断为肥胖和糖尿病前期。患者 B 的母语是英语，有吸烟习惯，饮食为标准饮食，且对乳制品过敏。在注册该计划时，患者
    B 的注册数据会个性化他在应用中的体验。患者 B 会看到结构化的教育内容，解释糖尿病前期的生理机制以及如何自我管理糖尿病前期。患者 B 的体验以英语提供。患者
    B 获得排除乳制品并以英语提供的餐计划支持。如果患者 B 选择使用该应用的这一功能，他参与的虚拟聚会将由一位讲英语的教练主持。


    ### 结果


    参与者的平均基线体重为 130.2（标准差 29.2）公斤，平均年龄为 48.8（标准差 12.7）岁，平均`HbA1c`为 48.0（标准差 15.5）mmol/mol。大多数参与者（n=62，59%）为女性。少数参与者（n=38，36.9%）患有糖尿病（1
    型糖尿病：n=5；2 型糖尿病：n=33）。应用使用者的基线表型在基线体重、糖尿病患者比例和基线`HbA1c`方面与回顾性对照组大致相似，但在年龄和性别方面存在显著差异。


    在招募的参与者（n=105）中，所有人都注册了`Low Carb Program`应用程序。总体而言，105 名参与者中有 90 人（86%）完成了`Low
    Carb Program`应用的注册流程并参与了该应用项目。共有 88 名参与者（84%）在过去 30 天内积极使用`Low Carb Program`应用。只有少数参与者（19/105，18%）完成了整个`Low
    Carb Program`应用项目（定义为完成 12 个可用教育模块中的 9 个或以上）。在 105 名招募的参与者中，共有 58 人（55%）自我报告了`Low
    Carb Program`应用的结果。在未自我报告结果的 47 名参与者中，有 29 人（62%）在随访评估时仍在积极使用`Low Carb Program`应用。从基线（注册）到自我报告`HbA1c`和体重的随访检查之间的平均时长为
    5 个月。一半的参与者使用`Low Carb Program`应用的时间在 3 到 7 个月之间（范围 1-12 个月）。接受`Low Carb Program`应用的招募参与者的平均临床随访时长为
    7.4 个月。


    从 48 名`Low Carb Program`应用使用者处获得了体重的配对数据，从 41 名使用者处获得了`HbA1c`的配对数据。配对样本检验分析显示，平均体重显著减轻
    2.7 公斤（P=.001），`HbA1c`改善 3.3 mmol/mol（P=.01）。整个队列的平均体重减轻百分比为 2.5%，其中 48 名患者中有
    10 人（占样本的 20.8%）实现了超过 5%的体重减轻，48 名患者中有 18 人（占样本的 23%）实现了至少 3%的体重减轻。


    `Low Carb Program`应用使用者组与 COVID-19 疫情前回顾性对照组（常规临床护理）之间的数据比较显示，两组在体重减轻和`HbA1c`变化方面相似。对照组的平均体重减轻百分比为
    0.88%，其中 92 名患者中有 15 人（16.3%）实现了超过 5%的体重减轻。这与统计检验结果一致，表明应用组与回顾性对照组之间的体重减轻没有统计学上的显著差异。

