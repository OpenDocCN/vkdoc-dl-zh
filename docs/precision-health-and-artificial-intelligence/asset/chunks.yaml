- fmt: '# 7. Precision Healthcare in Practice


    Though varied in its implementation across fields, precision medicine has raised
    hopes of revolutionary treatments and has spurred the proliferation of novel therapeutics
    and the reconfiguration of healthcare. This chapter will illustrate some of the
    compelling and temporal complexities of precision health analyzed here under its
    emerging rubrics.


    Health technologies must ultimately do no harm. The determination of patient risk
    can hence categorize digital technologies. Systems can improve system efficiencies
    while providing no measurable benefit to patients, inform and provide remote monitoring,
    encourage behavior change and self-management, provide clinical decision and prediction
    support to guide treatment, and provide output from which tools can compute and
    diagnose. However, because regulators’ evidentiary requirements are defined by
    intended use, many digital inventions slip outside of regulation.


    Randomized controlled trials (`RCTs`) are deemed the most powerful and reliable
    form of evidence for assessing the efficacy of a treatment. Evidence demonstrates
    that many factors can influence the reliability of `RCTs`, including methodological
    quality, reporting quality, and source of funding. Real-world evaluation, or the
    power of `N=1` at scale, disrupts traditional hierarchies and approaches. Disruption
    can be beneficial because real-world data, in principle, can capture the experience
    of the majority of people using services rather than the 5–10 percent who take
    part in trials.


    The datafication of the human experience through mobile phones, social media,
    digital communities, health apps, nutrition tracking, wearables, and health IoT
    has empowered patients to become their own evidence base and influence healthcare
    academia and understanding.


    The pandemic catalyzed healthcare providers to reach for digital tools and scalable
    technology. Healthcare providers were observed to have differing acceptance thresholds
    for innovation and could be classified into the typical five archetypes of innovators.
    However, determining the legitimacy and safety of a new solution is a significant
    barrier for end users, whether patients or clinicians. Similarly, innovators need
    to demonstrate benefits and compliance with standards. Unclear end-user expectations,
    evidence requirements, and an ever-changing regulatory environment are only a
    few of the challenges in the precision health ecosystem.


    The purpose of each case study is to showcase real-world demonstrations of intelligent
    precision health systems that are innovative and showcase the power and impact
    of tailored, individualized care.


    Fundamental principles and best practices are highlighted with the following case
    studies:


    - “Delivery of Specialist Multidisciplinary Weight Management to Hospital-Based
    Patients”

    - “Understanding People’s Attitudes Toward Data for the Optimization of a Specialist
    Podiatry Service for People with Long-Term Health Conditions”

    - “Evaluation of a Digital Intervention for the Self-Management of Type 2 Diabetes
    and Prediabetes”

    - “Voice-Based Symptom Monitoring and AI-Based Rehabilitation for Patients with
    Long COVID”

    - “Supporting Children and Young People to Lead Healthier Lives with Family-Based
    Behavioral Change Support”


    ## Delivery of Specialist Multidisciplinary Weight Management to Hospital-Based
    Patients Through a Digital Tool


    *The following case study presents an example of a precision health tool used
    within hospitals to deliver multidisciplinary specialist weight management, remote
    monitoring, and bidirectional communication to facilitate an engaged and collaborative
    patient-centered ecosystem.*


    In the United Kingdom, 27 percent of men and 30 percent of women live with obesity^([^(78)](#fn78))
    and have an increased risk of chronic diseases such as type 2 diabetes (`T2D`),
    mental health problems, particular malignancies, and a reduced life expectancy.^([^(79)](#fn79))
    Moreover, people living with obesity have a greater risk of hospitalization and
    adverse outcomes (including mortality) from COVID-19.^([^(80)](#fn80)) Within
    the United Kingdom alone, the estimated healthcare cost of obesity management
    was £6.1 billion (US $8.5 billion) in 2014—projected to reach £9.7 billion (US
    $13.5 billion) by 2050—with the broader costs to society estimated at £49.9 billion
    (US $69.2 billion) per annum.^([^(81)](#fn81))


    Within the British-based National Health Service (`NHS`), a tiered framework underlies
    the pyramidal structure of obesity management, in which the progressively restricted
    resources and numbers of patients typify upward tier progression. Obesity management
    within a primary care setting (tier 1) consists of promoting healthy lifestyles,
    education, and preventive strategies. Community-based services (tier 2) usually
    comprise dietary advice and optimized physical activity. For people with more
    severe obesity (`BMI > 40 kg/m2` or `BMI > 35 kg/m2` with obesity-related comorbidities),
    there is hospital-based obesity management (tier 3), which usually consists of
    a multidisciplinary team, with specialist dieticians, medical staff, and psychological
    support. Bariatric surgery (tier 4) sits at the top of the structure and as such
    represents a restricted resource (despite representing an excellent treatment
    choice for obesity) available to a very small proportion of the obese population
    who are potentially eligible for this procedure.^([^(82)](#fn82))


    Hospital-based management of obesity (within tiers 3 and 4) is restricted and
    as such does not represent a scalable model applicable to a population level.^([^(83)](#fn83))
    Furthermore, the demand for obesity services including referrals has augmented
    in recent years. We illustrate this with the example of our own hospital-based
    tier 3 and 4 obesity service at University Hospitals Coventry and Warwickshire
    (`UHCW`), United Kingdom, with a greater than sixfold increase in the number of
    referrals over a 5-year period between 2014 (207 new referrals) and 2019 (1,319
    new referrals), and more than 1,800 patients currently accessing our obesity service.
    Despite this surge in new referrals, this number is likely an order of magnitude
    lower than that of local adults who are eligible for referral to our service,
    with an estimated 2 percent of men and 4 percent of women currently living in
    the Coventry and Warwickshire regions who have a `BMI` greater than `40 kg/m2`.^([^(84)](#fn84),)
    ^([^(85)](#fn85),) ^([^(86)](#fn86)) Thus, there is a large unmet need for the
    vast majority of people living with severe obesity in the United Kingdom, for
    whom the current hospital-based tier 3 and 4 services within the `NHS` obesity
    management framework simply fail to deliver. Furthermore, there is often a disjointed
    patient pathway between the various obesity management tiers within primary, community-based,
    and secondary care settings. Unfortunately, the COVID-19 pandemic has stymied
    the effective implementation of obesity management across all tiers, with multiple
    factors implicated including staff redeployments, repurposing of clinical areas,
    restrictions of elective procedures, lockdown measures, remote appointments, and
    patient-based fears that include attendance at healthcare settings.


    Digital tools have a huge potential to transform weight management services. Despite
    the potential utility of various apps for digital and mobile devices within hospital-based
    tier 3 and 4 obesity management settings, to date such an innovation has not occurred.
    There is emerging evidence for the effectiveness of digital tools in the management
    of obesity. Current evidence shows emerging effectiveness of digital health interventions
    for specialist weight loss, yet poor uptake and engagement with digital tools
    remain common challenges with digital health interventions.^([^(87)](#fn87))'
