  trans: '

    ### 可及性与公平性


    数字医疗的一个优势在于其大部分功能都基于云端。让学习者理解通信的云端特性如何促进可及性，将有助于提升患者对健康干预措施的可及性。例如，澳大利亚墨尔本的一位心脏外科医生，可以通过远程通信、机器人技术以及现场辅助人员的支持，为关岛偏远医院的患者进行心脏直视手术。可及性强且效果显著的精准健康解决方案，在促进健康公平、实现健康促进、疾病预防和自我保健方面拥有巨大潜力。


    培训从业人员理解并使用数字健康技术，对于精准健康的成功至关重要。重要的是，培训可以使医疗团队中的技能和知识得到普及。然而，由于目前缺乏正式的培训流程，培训成本高昂。更佳的做法是，将数字健康内容纳入大学课程，这将使学习者能够更全面地掌握数字健康知识，并在毕业时理解其对临床实践的影响，而非采用学习效果有限的“快照式”方法。


    ### 新型培训形式


    人口老龄化、员工发展与留任方面的长期资金不足，以及新冠疫情（包括“大辞职潮”）的影响，使得许多医疗系统面临医护人员短缺的问题。在英国，英国国家医疗服务体系（NHS）已宣布出现人员配置危机，职位空缺超过
    10 万个；美国预计到 2030 年需要额外增加 27.5 万名护士；而澳大利亚预计到同一时间点将面临 12.3 万名护士的短缺。^(⁷⁴,) ^(⁷⁵,)
    ^(⁷⁶) 对训练有素、资质合格的医疗保健和社会工作者的需求从未如此迫切。


    然而，对从事健康和社会护理工作的专业人员进行教育和培训是复杂且微妙的。某些员工群体的培训和专业发展机会本已稀缺，而控制新冠感染率的措施又导致面对面接触各类培训和体验的机会显著减少，这给教育工作者带来了额外的障碍。


    沉浸式技术是一系列界面、应用和软件的集合，它们能够创建增强模拟体验，实现人与技术之间的完美交互。这些技术包括虚拟现实（VR）、增强现实（AR）、混合现实（MR）和
    360°视频。在虚拟现实中，用户的现实被一个完全数字化的沉浸式环境所取代；增强现实（AR）则以物体、视频或数据的形式，将数字或 3D 环境叠加到用户所处的现实环境中；而混合现实（MR）则融合了物理环境和虚拟环境。


    VR 和 AR 应用广泛，但其硬件和开发成本仍然很高。相比之下，混合现实使用更实用的工具来实现，例如 360°视频。顾名思义，360°视频由使用能够同时从
    360 度视角捕捉并合成场景的设备录制的视频组成，可以配合头戴式硬件或在许多移动设备上使用，这极大地提高了可及性和可扩展性。观看者可以通过头部运动在任何阶段控制并改变观看角度。然而，与
    VR 相比，360°视频通常缺乏一定的交互性。


    研究表明，沉浸式技术能够提高学生对学习材料的理解、改善学习体验、增强知识 retention，并能实现教育工作者在传统课堂环境中无法教授的现场虚拟模拟。一项研究发现，与传统的面对面教学相比，沉浸式技术使知识
    retention 提高了 230%。^(⁷⁷) 沉浸式技术非常适合用于患者教育和培训未来的从业人员。重要的是，沉浸式技术提供了宝贵的模拟事件体验，确保了信心、技能和知识的提升。例如，教育工作者可以通过模拟来教导社会工作者如何关爱弱势群体，就像一位有志于成为心脏外科医生的人可以通过虚拟方式置身于手术室中，学习如何应对特定情况下的压力和紧张情绪。沉浸式技术将支持在更短时间内，以更高标准培训更多人，其效果优于面对面学习。该技术还有助于医护人员通过基于模拟的学习以及用于分析个人在模拟中的习惯、行为和反应的数据分析，来减少错误。


    ## 学术界与产业界的合作


    数字健康仍然是一种不断发展且充满挑战的公共卫生实践，其研究方法仍需跟上创新的步伐。数字健康最终用户的参与仍然复杂，需要个性化和适应性干预措施来满足不同人群的需求。由于缺乏有意义的证据以及对数字健康解决方案有效性和质量的了解不足，学术界和产业界被迫开始合作。学术-产业合作（AIC）提供了一种机制，将不同的部门聚集在一起，以缓解数字健康在参与度、覆盖范围、可持续性、传播、评估和公平性方面面临的挑战。


    教育工作者（通常是学术机构或政府附属部门）已经开始与数字健康公司合作，教授数字健康知识，并响应在临床课程之外深入理解数字健康的需求。


    尽管数字健康领域的跨学科合作持续获得支持，但对成功合作的理解仍然有限。在对合作持伦理怀疑态度的背景下，合作的障碍包括关系的建立、维护和维持。在数字健康市场中，学术界与产业界成功合作的案例越来越多。第
    7 章包含了一个医院网络与一家数字治疗提供商成功合作的案例研究。


    ## 总结


    精准健康的未来取决于整合我们面前丰富的技术，以及在临床实践中运用这些技术的知识和技能。随着混合护理变得越来越普遍，不失去人性化关怀的要求也随之提高。合作性的学术研究、临床证据和政策制定必须共同塑造精准医疗保健领域，以确保人类的最大利益得到保护。虽然未来的可能性仅受限于可用的技术、设备和数据，但合乎道德地实施精准医疗保健需要仔细关注验证、数据解释以及数据隐私和安全的保护。


