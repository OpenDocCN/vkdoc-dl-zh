- fmt: '# Preparing the Profession


    The advancement of AI-powered precision health technologies has raised concerns
    about whether these systems will eventually replace doctors. Such situations are
    most likely unfounded. Most, if not all, countries face severe clinician shortages,
    which are expected to worsen over the next decade. For example, a report for the
    Association of American Medical Colleges predicts a physician shortage through
    2030 under every scenario modeled. Rather than posing a threat to clinicians,
    AI-infused precision health tools are critical to improving care efficiency and
    mitigating some of the concerns that will arise due to future shortages of trained
    and experienced clinicians.^([^(67)](#fn67),) ^([^(68)](#fn68)) Further still,
    augmenting clinicians with digital transformation and implementation support would
    propel adoption of AI-powered technologies further.


    The promise of precision health systems to improve care likely will come not from
    replacing clinicians but rather in automating repetitive tasks, thereby freeing
    clinicians time to focus on high-value activities in the patient care and treatment
    process. In this regard, properly designed systems will focus on augmenting the
    skills and experience of highly trained clinicians in keeping with the natural
    workflows of clinical delivery processes.


    # Summary


    As precision health is realized and digital devices, data, and AI play an increasingly
    important part in our day-to-day lives, the most important question will become
    whether and under which conditions precision health can improve patients’ quality
    of life.


    Quality of life is adjudged by patients themselves as being good or as subjectively
    worse due to over-compliance and engagement with the constant behavioral aspects
    of one’s health.


