    # What Is Precision Health?


    Precision health is a holistic healthcare approach that integrates numerous biological
    data points, including longitudinal molecular, cellular, and phenotypic biomarkers
    and individual genome sequences. Excluding the role of genetics, research shows
    four broad factors influence our health.^([^(10)](#fn10))


    * Social and economic environment: 40 percent

    * Health behaviors: 30 percent

    * Clinical care: 20 percent

    * Physical environment: 10 percent


    While the weightings may differ between individuals, the concept of precision
    health is to optimize all aspects of health through a new era of human health,
    which enables us to do the following:


    * **Predict** the risk of disease when it can be controlled and reversed effectively.

    * **Prevent** disease development and their associated risk factors by implementing
    effective, evidence-based interventions at all levels.

    * Provide care with the **participation** of the patient.

    * Provide **personalized** treatments through more specific definitions of disease
    phenotypes that encourage the selection of optimal therapies and new biochemical
    targets for interventions.

    * Provide a precision approach to **population** health. Diverting the typically
    reactive emphasis of medicine to that of a proactive, preventative ecosystem that
    focuses on health before disease enhances the concept of wellness in disease-free
    individuals and those with long-term conditions alike.


    On average, patients typically interact with the healthcare system for 10 hours
    per year.^([^(11)](#fn11)) Attempts to make healthcare more predictive, preventive,
    personalized, participatory, and for the benefit of individuals and populations
    (described as P5 healthcare, as shown in Figure [2-1](#535410_1_En_2_Chapter.xhtml#Fig1))
    will significantly improve health and well-being across the health continuum and
    is a new era for human health.


    ![](images/535410_1_En_2_Chapter/535410_1_En_2_Fig1_HTML.jpg)


    A diagram contains the 5 P health block at the center surrounded by predictive,
    preventive, participatory, and personalized from the clockwise direction that
    benefits the population and individuals.


    **Figure 2-1** Five Ps of precision health


    The precision health era started when scientists sequenced 92 percent of the human
    genome in 2003.^([^(12)](#fn12)) Digital health launched as a concept in 2007
    when the first health and wellness apps were founded.^([^(13)](#fn13)) Alongside
    this, the idea of grid or cloud computing took huge strides forward with the launch
    of Amazon Web Service (`AWS`) and Elastic Compute Cloud (`EC2`) technology, which
    decoupled software development from server hosting and administration for the
    first time.


    The pillars of precision health, or the five Ps, is a concept coined by Leroy
    Hood, the Institute for Systems Biology founder, to reference an emerging model
    of medicine that “focuses on maximizing wellness for each individual, rather than
    merely treating disease.”


    ## The Five Ps of Precision Health


    Precision health has five core pillars.


    * Prediction and prevention

    * Personalization of treatment

    * Participation

    * Population


    Let’s explore each in detail.'
