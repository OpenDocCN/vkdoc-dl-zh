    # 数据驱动的行动范式


    收集数据是为了采取行动。这可以通过“感知、思考、行动”范式来建模。无论是人类、人工智能体还是混合体来执行思考，区分数据价值创造的关键在于如何利用这些方面来交付有意义的价值，从而吸引其生态系统、优化运营，并创造新的效率和机遇。图
    3-4 展示了一种名为“感知、思考、行动”的数字化转型方法。


    ![](img/535410_1_En_3_Fig4_HTML.jpg)


    感知、思考、行动范式的框图。每个环节都附有一个示例。


    图 3-4


    数字化转型的感知、思考、行动范式


    “感知”指从多个来源实时持续收集数据。“思考”指对数据进行聚合、分析，并从中提炼信息和知识。“行动”指在了解执行活动的智能体可获取数据源所构成的上下文环境后，采取相应行动。正是通过这些行动，才能采取措施将信息转化为价值。


    ## 将数据转化为信息、知识和智慧


    IBM 报告称，每天产生的数据超过 1TB，但其中被使用的数据不足 1%。^(⁴⁷) 数据的价值体现在将其转化为信息的能力上，这些信息能够驱动可执行的洞察，进而影响行为和工作流程。数据分析是数据科学中的一个主题，旨在从原始数据源中提取信息。实时分析支持在决策点进行敏捷的洞察发现和分析。


    然而，数据并不等同于知识。要用于决策过程，数据必须经历一个包含六个步骤的转化过程：


    *   收集

    *   组织

    *   处理

    *   集成

    *   报告

    *   利用


    如果解读得当，数据会被转化为能够赋能知识的信息。数据、信息、知识、智慧（DIKW）金字塔是思考数据转化和价值创造的常用模型。图 3-5 是对 DIKW 模型的改编，展示了数据如何与数字化转型相关联。


    ![](img/535410_1_En_3_Fig5_HTML.jpg)


    数据转化为信息、知识和智慧的示意图。左侧是一个金字塔，从下到上依次是数据、信息、知识和智慧。右侧是关于改进方面的价值开发与实现。


    图 3-5


    利用数据赋能信息、知识和智慧


    数据丰富化是将数据转化为信息、知识和智慧的过程。价值开发指的是如何通过应用这些转化来开发某个机会的价值。价值实现则指在产出、产品、服务和成果方面的价值开发。


    随着数据规模和重要性的增加，从数据产生到获得洞察并采取行动之间的时间需要缩短。缩短从检测到事件到自动响应之间的时间具有巨大的经济价值，这可以用于识别欺诈交易、在患者准备出院时立即腾出床位以提高服务能力，以及在灾难发生前发现健康状况恶化的迹象。


    ## 总结


    为了充分实现我们现在能够生成的大数据所蕴含的潜力，我们必须改变工作方式。创建协作网络、共享数据和模型比以往任何时候都更加重要，并且这一过程越来越需要与工程学、计算机科学和行业等非传统协作专业领域建立联系。


    虽然数据收集和分析可以提供重要的洞察，但数字表型分析是评估个体健康状况和研究更广泛的公共卫生趋势的有力工具。


    当利益相关者根据数字系统生成的洞察和知识采取行动时，他们将能够更好地与患者和临床医生互动，提供更好的产品和服务，并开发精准健康的新应用。充分利用大数据将是一个挑战，但潜在的回报则更为显著。在下一章中，我们将探讨人工智能的基础及其在精准健康中的应用。


