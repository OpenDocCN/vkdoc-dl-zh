- fmt: '# Sensors


    Intelligent sensing technologies can provide tremendous value to clinical services
    and insights into an individual’s state of health. Sensors fall into two categories:
    worn or wearables and nonwearable sensors.


    More than 40 percent of U.S. consumers now own a wearable device.^([^(39)](#fn39))
    Wearable technologies are becoming more common, affordable, and sophisticated,
    moving past fashion accessories and activity tracking. Wearable sensors provide
    greater accuracy in geolocation and health signals; however, they are typically
    more intrusive than nonwearable sensors, which are less invasive and can monitor
    activities across environments such as home, work, recreation areas, and transport
    with no interference to an individual’s daily routines.


    As sensors become smaller, embeddable, biodegradable, and constantly connected,
    they play increasingly critical roles in patient care. Their structured data is
    apt for research, machine learning, and analytics, as shown in Figure [3-2](#535410_1_En_3_Chapter.xhtml#Fig2).


    ![](images/535410_1_En_3_Chapter/535410_1_En_3_Fig2_HTML.jpg)


    An illustration explains how the Internet of Things is widely used in precision
    healthcare. At the top, an illustration of a man depicts the wearable sensors.
    At the bottom, examples of IoT are present such as connected home, work, and vehicles.


    **Figure 3-2** Smart sensor usage in precision health


    The ubiquity of 5G communications is enabling smart care to evolve. Sensors within
    the home, workplace, transport, and urban areas can capture and transmit data,
    including behaviors, location, interactions, and communications. While this also
    conjures images of an Orwellian future, the power of using moment-by-moment health
    and behavioral data to optimize a person’s state of wellness is not only revolutionary;
    it’s gradually becoming a reality.


    # Digital Phenotyping


    When available health and behavioral data is combined with social platforms and
    other interactions, a more comprehensive understanding of behavioral and social
    domains is achievable through a data-intense environment that supports precision
    health and the digital phenotype of health and, conversely, disease.


    Because taking photos of food for social media has grown in popularity, dietitians
    can now use pictures of food taken from health apps or social media to understand
    dietary habits more precisely than a food diary or standardized questionnaire.
    Similarly, social platform use has been used to predict the risk of anxiety and
    depression.


    The use of data from nontraditional domains has enabled digital healthcare to
    better understand human health and the impact of behaviors, although is only sometimes
    wholly indicative of the real-time state of health. For example, heart rate variability
    (`HRV`), used as a marker of stress, can be collected by a wearable and used to
    optimize drug intake.


    Digital phenotyping is the process of inferring an individual’s behavior from
    the digital data generated through interactions with electronic hardware and software.^([^(40)](#fn40),)
    ^([^(41)](#fn41)) When determined to be clinically relevant, the power of data
    can provide insights into an individual’s lifestyle, socio-demographics, psychology,
    and environment. This form of digital phenotyping has proven successful in psychiatry
    and type 2 diabetes. Figure [3-3](#535410_1_En_3_Chapter.xhtml#Fig3) provides
    a diagrammatic representation of deep digital phenotyping.


    ![](images/535410_1_En_3_Chapter/535410_1_En_3_Fig3_HTML.jpg)


    A diagram represents the relationship of deep digital phenotyping. At the bottom,
    the process begins with a new patient, classifies into the evaluation of features
    and selection of relevant digital twin, and through generated digital data, and
    then leads to precision health. Digital phenotyping includes wearable devices,
    social media, and digital biomarkers, whereas deep phenotyping includes biological,
    genetics, clinical, and health records.


    **Figure 3-3** Deep digital phenotyping


    # Digital Twin


    Many industries have used simulation and 3D modeling for developing and testing
    new products. Physical crash tests, for example, are rarely performed in the automotive
    industry, as these are now primarily performed in a virtual environment. However,
    it is still common practice in healthcare to work with 2D images that need to
    provide a complete picture of the patient’s situation. Because more data is now
    available digitally, converting the current standard to 3D allows for what works
    well in other industries: digital twins.


    The healthcare industry is adopting digital twins to improve personalized medicine,
    healthcare organization performance, and new medicines and devices. IBM defines
    a digital twin as “a virtual representation of an object or system that spans
    its lifecycle, is updated from real-time data, and uses simulation, machine learning,
    and reasoning to help decision-making.”^([^(42)](#fn42))


    The digital mapping of natural objects and processes allows for the virtual analysis
    of body parts, individual organs, or the entire human body. Today’s digital twins
    can be composed of models based on information from wearable devices, clinical
    data, -omics data, and behaviors to provide patients and clinicians with empowering
    feedback. Furthermore, results can be simulated under the same conditions as the
    tangible counterpart by training the models with actual patient data. While digital
    twins are still a relatively new concept within healthcare, the field of digital
    twins is expanding rapidly with advances in data connectivity, AI, and AR/VR.
    Aware that a one-size-fits-all approach to healthcare is inefficient, there is
    growing support for scaling digital twins from isolated research projects to mass
    personalization, as is familiar with today’s customer data and advertising platforms.


    A digital twin would be a virtual patient with similar or close characteristics
    to a new patient seen during a clinical visit, and for whom the health status,
    risks of complications, and disease progressions are known. In the not-too-distant
    future, each patient will have a digital twin, obtained thanks to deep digital
    phenotyping, represented by the average characteristics of its closest cluster
    group. We are moving away from representing diabetes patients by their `HbA1c`
    and fasting blood glucose levels to real-time data analytics enabling differentiation
    between subclinical types of diabetes. It is not long before we have the deep
    digital phenotype of individuals with millions of data points comprised of clinical,
    biological, genetic, sociological, psychological, communications, and real-world
    data, revolutionizing how we understand health and disease.


    Computer science, behavioral psychology, bioinformatics, and epidemiology are
    core themes. From multi-omics approaches to unsupervised deep learning algorithms,
    along with the proper computational power, we now have the appropriate tools to
    deal with the diversity and quantity of information and move from coarsely stratified
    groups to refined, small groups of individuals defined by numerous features.


    # Data Challenges


    There is a growing number of reliable, practical, and actionable measures of health
    behavior, mental health, patient preferences, and social determinants of health
    available today that could expand the range of valuable data to construct more
    fully informed personalized health treatments.


    Patients and providers can make more co-informed, individualized decisions about
    healthcare options by collecting and rapidly summarizing critical results based
    on these factors. For this to occur, several key inertias still need to be overcome.'
