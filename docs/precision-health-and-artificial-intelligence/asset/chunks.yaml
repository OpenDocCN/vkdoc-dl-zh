    # 4. 精准健康中的人工智能与机器学习


    人工智能指非人类主体展现出的任何认知能力。其五大基本要素为：学习、推理、问题解决、感知和语言理解。在执行学习、视觉和逻辑推理等任务时，人工智能已超越人类能力。^(⁴⁸)
    机器学习是人工智能的一个子集，通过训练计算机模型随时间推移从自身行为和环境中学习以进行改进。算法会适应新数据和发现的呈现，并通过机器学习在无需显式编程的情况下，迭代式地提升任务表现。机器学习是一种能够在最少人工干预下自主适应的人工智能。


    深度学习是机器学习的一个子集，它利用人工神经网络模拟人脑的学习过程。之所以称为*深度学习*，是因为在学习数据时，深度学习函数中会添加额外的层级。函数中的这些层级被称为*神经元*。当深度学习模型学习时，它只是通过优化函数来修改权重（即神经元）。图
    4-1 展示了人工智能的组件分析。


    ![](img/535410_1_En_4_Fig1_HTML.png)


    一个树状图对人工智能的组件进行了分类。它从右到左分支为机器学习、自然语言处理、专家系统、语音、视觉、规划和机器人技术。进一步地，它又细分为深度学习、无监督学习和监督学习、文本生成、问答、上下文提取、分类、机器翻译、语音转文本和文本转语音。


    **图 4-1** 人工智能的组件


    自然语言处理（NLP）是系统分析、理解和生成人类语言（包括语音和文本）的能力。自然语言理解之所以困难，是因为人类语言天生具有歧义性——语言、发音、表达和感知皆是如此。为了分析和理解自然语言，句子的语法结构和词语的含义会被分解成片段，以便在上下文中进行研究和理解。NLP
    将人工智能与计算语言学和计算机科学相结合。


    整合机器学习、深度学习等人工智能方法以及自然语言处理等技术，以应对数据可扩展性和高维度的挑战，并将其转化为可操作的洞见，正成为精准医学的基础。智能手机和可穿戴设备等基于传感器的技术的普及，开启了一个健康人工智能的新时代，能够根据生命体征、环境和行为做出实时决策。然而，人工智能的益处仍需应对尚存的技术、法律和伦理挑战，以确保利益相关者能够实现精准健康生态系统。


    科学中的假设生成方法，最好被视为一种从数据模式中识别和推断意义的补充手段，而不仅仅是简单延续以往的做法。越来越多的人工智能方法允许直接从数据中学习这些模式或趋势，而非由研究人员基于先验知识预先指定。


    ## 人工智能的三种类型


    任何人工智能应用都归属于三种智能类型之一，分类依据是其复制人类特征的能力、实现该目标的技术、应用场景以及心智理论。


    ### 弱人工智能


    迄今为止，人类成功实现的唯一人工智能是弱人工智能（ANI），也称为弱人工智能或狭义人工智能。狭义人工智能擅长执行单一任务。例如语音识别、垃圾邮件过滤器、自动驾驶汽车、电影推荐以及支持面部识别的软件。使用狭义人工智能算法可以在几秒钟内处理大量数据，且不会累积疲劳。


    狭义人工智能有两种类型：反应型和有限记忆型。反应型人工智能没有存储能力，模拟人脑无需先前经验即可对刺激做出反应的能力。相比之下，大多数人工智能解决方案使用有限记忆型人工智能，它具有数据存储和学习能力，使机器能够利用初步数据为未来的决策提供信息。例如，深度学习会根据先前存储的数据来定制未来的经验。


    ### 通用人工智能


    通用人工智能（AGI）或强人工智能，是指一种具有通用智能的类人主体，能够学习并运用其知识和经验来解决问题。这种形式的人工智能以与人类行为无法区分的方式行动、思考和理解。强人工智能围绕心智理论人工智能框架展开，该框架详细阐述了辨别其他智能实体的需求、情感、信念和思维过程的能力。心智理论人工智能并非关于复制或模拟；相反，它是关于教会机器真正理解人类。目前尚无显著的强人工智能实例。


    ### 超级人工智能


    超级人工智能（ASI）目前是一个理论概念，它超越了模仿人类智能和行为。它指的是主体能够自我意识，并超越人类能力和智能的极限。这是否不可避免，通常是一个伦理和道德问题，而非技术问题。


    ## 机器学习简介


    机器学习体现了数据挖掘的原理，但也能推断相关性并从中学习，以应用于新的算法。


    无论人工智能的类型如何，其目标都是模仿人类通过经验学习的能力，并在无需或仅需极少外部帮助的情况下完成指定任务。机器学习任务可以是*监督式*的（基于示例输入开发模型）、*非监督式*的（模型从输入中自行确定结构），以及*半监督式*的（前两者的结合）。

    '
- fmt: '### Framework for Machine Learning


    Regardless of the approach taken, once a problem has been framed, a typical AI
    or machine learning workflow would generally comprise the following:


    - *Data preparation*: Involving data exploration, analysis, insight, and cleaning

    - *Training*: Choosing learning method(s), applying them to create a model, and
    attempting to optimize the models created

    - *Testing*: An objective assessment of the method and results

    - *Dissemination*: Reporting the results of an evaluation to stakeholders and
    ensuring explainability

    - *Deployment*: Releasing the trained machine learning model, monitoring ongoing
    usage and accuracy


    The training phase involves maximizing the performance of an algorithm through
    adjustments to key parameters (or tuning) that alter the algorithm’s behavior.
    A parameter is a variable utilized by the model where the model can estimate the
    value from the dataset. The volume and type of parameters are crucial aspects
    of any algorithm. While there is no data like more data, it’s ultimately of no
    use if the data is trash—additionally, both the time and resources required to
    train a model increase with parameter dimensionality. If training on a small set
    of parameters, models risk missing subtle trends and patterns, while large volumes
    of data can cause algorithms difficulty identifying valuable patterns.


    The testing phase then assesses the tuning of parameters through their performance
    to ensure the model is generalizable, which is the goal of all algorithms. Mathematically,
    one can understand this as attempting to minimize a cost function on training
    and test data so that models perform confidently and can be deployed in the real
    world.


    Table [4-1](#535410_1_En_4_Chapter.xhtml#Tab1) lists some examples of learning
    approaches and algorithms.


    **Table 4-1** Examples of Learning Approaches and Algorithms


    | Supervised | Unsupervised | NLP |

    | --- | --- | --- |

    | • Support vector machines<br>• Naïve Bayes<br>• Gaussian Bayes<br>• K-nearest
    neighbors (KNN)<br>• Logistic regression | • Apriori algorithm<br>• FP-growth
    (also known as frequent pattern growth)<br>• Hidden Markov model<br>• Principal
    component analysis (PCA)<br>• Singular value decomposition (SVD)<br>• K-means<br>•
    Neural networks<br>• Deep learning | • C4.5<br>• K-means<br>• Support vector machines<br>•
    Apriori<br>• EM (expectation–maximization)<br>• PageRank<br>• AdaBoost<br>• kNN<br>•
    Naïve Bayes<br>• Classification and regression trees (CART) |


    High generalization leads to overfitting or underfitting. If a model performs
    better on training datasets than on unseen test sets, then the model is likely
    to be overfitting. Cross-validation is a technique to employ to measure against
    overfitting. Further still, training with more data may help algorithms infer
    hypotheses better.


    Underfitting is simple to detect, as it will have poor performance. Bias represents
    the error the model has from learning from erroneous data. Bias measures how far
    off, in general, these models’ predictions are from the actual correct value or
    true signal. Increasing model complexity to determine subtle signals reduces bias
    but introduces variance, which determines the variability of model predictions
    around a data point. Ensuring model generalizability is a trade-off between bias
    and variance (Figure [4-2](#535410_1_En_4_Chapter.xhtml#Fig2)). Wherever possible,
    it is better to keep it simple than over-engineer and build complex and expensive
    machine learning models that are difficult to explain and disseminate.


    ![](images/535410_1_En_4_Chapter/535410_1_En_4_Fig2_HTML.png)


    A graph of error versus the algo complexity. The dotted line representing the
    variance and bias mutually reciprocate each other. Variance has an upward trend,
    while bias decreases downward.


    **Figure 4-2** Finding optimal algorithmic balance


    ### Software and Toolkits


    It is easier than ever to tap into the power of machine learning with easy-to-implement
    libraries and frameworks. Healthcare providers are moving slowly toward sophisticated
    toolkits to utilize the massive real-time data stream created by patients, driven
    by established healthcare providers, startups, and enterprises, and academia.
    Open-source toolkits support machine learning by providing accessible and ready-to-use
    code for common algorithms. Most are available for Python, the programming language
    favored for developing machine learning algorithms.


    `Scikit-learn` is a Python module containing image processing and machine learning
    techniques built on `SciPy` and enables algorithms for clustering, classification,
    and regression, such as naïve Bayes, decision trees, random forests, k-means,
    and support vector machines. `NLTK`, or Natural Language Toolkit, is a collection
    of libraries used in natural language processing. The `NLTK` enables the foundations
    for expert systems such as tokenization, stemming, tagging, parsing, and classification.
    `Genism` is a library for use on unstructured text, `Scrapy` provides open-source
    data mining, and `TensorFlow` is a popular Alphabet-backed open-source library
    of data computations optimized for deep learning. It enables multilayered neural
    networks and quick training. `Keras` and `PyTorch` are libraries for building
    deep learning algorithms with `TensorFlow`.


    `WEKA` is a software suite written in Java that enables interaction via a graphical
    user interface (GUI) or direct access that provides, similar to `sci-kit-learn`,
    algorithms, visualization tools, and support for a range of machine learning and
    data mining tasks.


    ## Explainable AI


    Initiatives such as the General Data Protection Regulation (GDPR) in the European
    Union, the Health Insurance Portability and Accountability Act (HIPAA) in the
    United States, and the Privacy Act in Australia have pushed the conversation about
    explainable AI in healthcare into the mainstream. While AI systems have been shown
    to outperform humans in various tasks, lack of explainability continues to spark
    criticism. Explainability involves understanding how a particular AI-driven decision
    is made. AI algorithms are sophisticated mathematical models for which the explainability
    of complex optimization processes becomes nontrivial. The benefits of improving
    trust and transparency in AI do not just benefit end users but also support the
    overall accuracy and generalizability of growing systems.


    ## Applications of AI Assisted Precision Health in Practice


    AI-driven precision healthcare technologies promise to improve the quality of
    care and outcomes across the board. As large amounts of diverse data from health
    studies and research are generated, it will become increasingly more challenging
    to differentiate between precision medicine and public health. While we may be
    years away from realizing the full potential of precision healthcare, early efforts
    are addressing significant challenges and demonstrating the critical role that
    AI technology and computational power advances can play across various themes.'
