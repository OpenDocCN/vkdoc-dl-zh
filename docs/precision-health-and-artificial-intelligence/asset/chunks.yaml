    inaccessible environments such as the gastrointestinal (GI) tract. Many areas
    of the body are currently inaccessible. Smart pills enable unobtrusive monitoring
    and a wealth of data that will significantly advance understanding and precision
    health delivery.'
  trans: '

    # 职业准备


    人工智能驱动的精准健康技术的进步引发了人们对于这些系统最终是否会取代医生的担忧。这种情况极有可能是没有根据的。大多数（即便不是全部）国家都面临着严重的临床医生短缺问题，预计在未来十年内这一情况还会加剧。例如，一份提交给美国医学院协会的报告预测，在其模拟的每一种情景下，到
    2030 年都将出现医生短缺。人工智能赋能的精准健康工具非但不会对临床医生构成威胁，反而是提高护理效率、缓解因未来训练有素且经验丰富的临床医生短缺而产生的一些担忧的关键。^(⁶⁷,)
    ^(⁶⁸) 此外，通过数字化转型和实施支持来增强临床医生的能力，将进一步推动人工智能技术的应用。


    精准健康系统改善护理的前景，可能并非来自取代临床医生，而是来自自动化重复性任务，从而解放临床医生的时间，让他们能够专注于患者护理和治疗过程中的高价值活动。在这方面，设计得当的系统将侧重于增强训练有素的临床医生的技能和经验，并与临床诊疗过程的自然工作流程保持一致。


    # 总结


    随着精准健康得以实现，数字设备、数据和人工智能在我们的日常生活中扮演着越来越重要的角色，最重要的问题将变成：精准健康是否以及在何种条件下能够改善患者的生活质量。


    生活质量的好坏由患者自己评判，可能因过度遵从和持续参与自身健康相关的行为方面而感到良好，或主观上感觉更差。


    脚注 1 2 3 4 5 6 7 8 9


    # 6. 精准医疗保健的未来


    数字健康技术和人工智能已经在创造智能化的流程和工作流，使医疗保健服务更便宜、更有效、更个性化、更公平。然而，精准健康的目标远不止于此，它旨在通过更深入地理解人类状况和体验，来改善患者管理和诊断。大部分重点都放在了基于对疾病病理学更深入的理解来开发更好的药物这一潜力上。如今，数据和技术既容易获得又价格低廉，诊断和支持方面的改进使得更好的患者管理成为可能。数据的数量和复杂性反映了患者的基因、环境和生活方式。


    大数据和人工智能技术为识别新的病症和预后指标、提供精准的行为改变支持、康复治疗，或识别出对特定治疗反应更佳的患者提供了巨大潜力。但这并非没有挑战。


    我们对患者的了解越详细，对信息管理、问责制和透明度的要求就越高。当我们对如何提供个性化护理有了更深刻的认识时，我们该如何利用这些知识来降低未来疾病的发生率，并减轻随之而来的技术、临床和伦理问题？精准医学是否应该优先考虑预防而非治疗（而这正是当前医学的主要关注点）？如果某种疾病尚无治疗方法或治愈手段，你是否想知道自己存在患病风险？在处理那些预测未来未知规模和重要性的可能性技术时，有许多问题需要考虑。本章将探讨追求精准健康过程中的重要主题，并提出潜在的影响和后果。


    ## 从出生到死亡的精准护理


    低成本的基因检测提供了人类基因图谱，临床医生可以利用它来了解个体的健康状况和疾病易感性。靶向下一代测序技术能够快速识别常见和罕见的基因变异。检测导致药物疗效或不良反应的变异，对于实施个体化药物治疗和提供支持至关重要。生活方式支持将不再作为一种干预措施来提供，而是从出生起就通过数字疗法与处方药理学干预措施一同提供，未来纳米技术还将为这些干预措施提供支持，以提供治疗、支持和补充身体所需。在自动化技术的支持下，临床医生将实时分析健康状况和疾病风险。随着每个人都能更多地获取关于自身的更丰富、实时、精细的数据，他们将更了解自己，并且如果这些信息被公开，他们也将更了解社区中的其他人。可以预见的是，基于人群层面的基因、生活方式和行为数据，人工智能不仅可能预测疾病和健康不佳，还可能近似地预测出确切的死亡时间。图
    6-1 展示了精准医疗保健工具的输入和输出。


    ![](img/535410_1_En_6_Fig1_HTML.jpg)


    一个框图展示了精准医疗保健工具，它是一个中心模块，周围环绕着输入和输出。输入包括基因组学、人口统计学、偏好、生理学、行为、环境等。输出包括疾病易感性、诊断、预后和治疗反应。


    图 6-1 精准医疗保健工具：输入与输出


    ### 纳米技术


    一纳米是十亿分之一米（`0.000000001 m`），相当于三到五个原子的宽度。目前纳米机器人的直径大约在`0.1–10 微米`之间，因此它们尚未完全达到纳米尺度。然而，纳米机器人可以被用于，例如，精确地对癌细胞进行化疗。纳米机器人递送将减少化疗对健康细胞的负面影响，并改善患者的健康和福祉。


    ### DNA 操作与基因治疗


    基因治疗，即通过操作 DNA 来治疗疾病，是精准健康领域发展最快的领域之一，全球有超过 2000 种疗法正在开发中。人们希望通过精确改变人类基因组，研究人员能够找到治疗传染性和非传染性疾病的方法。然而，人们仍然担心，那些缺乏制造和提供基因治疗基础设施的较贫穷国家，在默认情况下将无法获得此类治疗。


    ### 智能传感器


    可穿戴传感器根据监测对象的不同，可分为生理传感器、生化传感器和复合传感器。可穿戴生化传感器已经可用于追踪唾、泪液和汗液等易获取生物体液中的目标分析物。然而，传感器正变得越来越小，甚至越来越智能。智能药丸就是这样一个例子——一种装有传感器的小型可摄入药丸，在药物依从性以及探索胃肠道等原本无法进入的环境方面发挥作用。目前身体的许多区域是无法进入的。智能药丸能够实现无干扰监测，并提供大量数据，这将极大地促进对精准健康的理解和精准健康服务的提供。

    '
- fmt: '### Bioprinting


    `Bioprinting` will revolutionize medicine as we know it. Not only because delivering
    new organs and live material to where it is needed is time-sensitive and crucial
    but because there needs to be more of them. Additionally, the recipient’s immune
    system can reject donated organs, causing the donor organ to fail.


    `3D` printing is already used to customize body parts such as knee implants. `3D`
    printing creates a three-dimensional object by reading a digital blueprint and
    reproducing successive layers using filament and ultraviolet light. While entire
    organs still haven’t been developed, `bioprinting` has enabled mini-organs on
    a chip, equating to tiny cell samples of tissue that mimic the functions and structures
    of their full-grown counterparts. The laboratory-grown mini organs allow pharmaceutical
    companies to test drugs on versions of human tissue and assess their effectiveness
    or toxicity instead of using unreliable and ethically problematic animal models.


    `Bioprinted` organs further progress precision care as they are made from an individual’s
    tissue, ensuring that they are customized for each body. Customization minimizes
    the chances that the host’s body will reject the organ, meaning the organ will
    last longer and won’t need treatment for complications such as rejection. `Bioprinting`
    will replace dysfunctional biostructures, whether at 6 months or 60 years old.
    Ethical issues surrounding `bioprinting` include equal access to treatment, clinical
    safety complications, and the enhancement of the human body.


    ## Brain Computer Interfacing


    As we age, healthy older adults may have difficulties communicating, concentrating,
    memorizing, talking, walking, or maintaining balance.^([^(69)](#fn69)) These symptoms
    may also be experienced by elderly patients and can lead to the inability to communicate
    with family, climb stairs, remember new information, or drive safely. For example,
    most older people need to use assistive technologies to perform daily-life activities
    better, such as increasing the zoom of a display or using handrails to get upstairs.
    To compound matters, the aging process does not affect people uniformly.


    Many patients with cognitive or physical impairments are now being treated with
    brain-computer interface technology. As a promising and growing technology for
    assisting and improving communication/control, brain-computer interfaces are becoming
    increasingly popular among people with motor paralysis (paraplegia and quadriplegia)
    as a result of stroke, cerebral palsy, and amyotrophic lateral sclerosis (ALS).


    This technology promises to significantly enhance patients’ quality of life by
    considerably improving their autonomy and mobility. It is possible to use a brain-computer
    interface (`BCI`) as an assistive, adaptive, and rehabilitation technology to
    monitor brain activity and translate specific signals that reveal the elderly’s
    intent into commands. `BCI` systems could be helpful for older adults in many
    ways, such as training their motor/cognitive abilities to prevent aging effects,
    controlling home appliances, communicating with others during daily activities,
    and controlling an exoskeleton to enhance the strength of the body’s joints.


    Brain-computer technology has clinical and nonclinical applications in many areas,
    including medicine, entertainment, education, and psychology, to solve many health
    issues, such as cognitive deficits, slowness in processing speed, impaired memory,
    and movement capability decline among older adults, which can affect the quality
    of elderly life and adversely affect mental health.


    ## Smart Habitats


    In recent years, cities worldwide, as well as less urbanized areas and the countryside,
    have begun to become “smart” in many ways due to the Internet of Things (`IoT`)
    and its core and complementary technologies. The `IoT` is made of sensors and
    other components that connect our version of the world made of atoms (i.e., us
    humans, our body systems/health, and our devices, vehicles, roads, buildings,
    plants, animals, etc.) with a digital mirror version made of bits. This link enables
    cities and regions, both urban and rural, to be self-aware and agile in near real
    time, based on changes in populations and environments that are continuously monitored
    and captured by sensors, similar to how a living being’s internal biological systems
    operate and respond to their environment. Big data collected by various `IoT`
    sensors can also be used to forecast the near future with reasonable accuracy,
    allowing for better planned responses/mitigation.


    Sensors embedded into physical environments collecting continuous data in ambient
    intelligent environments can look for changes in health status and provide in-the-home
    health interventions. By gaining real-time access to this information, city services
    can respond promptly to urgent health needs and make decisions to avoid unhealthy
    situations. Depending upon the device used, sensors can collect additional information.
    Many devices have cameras and microphones that provide a dense data source indicative
    of the user’s state and environment. Use of other apps on devices, including phone
    calls and texting, can also be captured.


    Smart homes offer tremendous benefits for health monitoring and intervention;
    however, they remain at risk for cyberattacks. This new type of criminality may
    obtain details about inhabitants’ living patterns, putting the residents’ safety
    at risk. Other forms of security risk may rise even when there is no malicious
    intent. For example, health monitoring devices that do not follow prescribed software
    standards can endanger lives by not providing critical information at the needed
    time.


    The intention is to live healthier and happier lives because of, and within, smart
    habitats. However, the COVID pandemic showed that authorities can use data and
    digital technologies to enforce rules and regimes that may oppose ethical consensus
    or widespread agreement. During the COVID lockdowns in the UAE, for instance,
    people were allowed to visit public places only if they could show proof of vaccination.^([^(70)](#fn70))


    Autonomous technologies will transform cars into more than just a means of transport.
    Apart from the fundamental premise that autonomous vehicles will take over driving
    responsibilities, the more significant leap is that transport will free riders
    to explore the potential to improve their body, mind, and environment. What’s
    more, health and well-being in transportation are required to achieve a zero-accident
    future, for example, through early detection of ailments and assistance in emergencies.
    At its very basic, a connected vehicle can send `SOS` notifications, connect to
    the emergency services in case of an accident, or adjust a seat to accommodate
    the best posture. Location services will provide allergen warnings, and biosensors
    that enable monitoring of blood alcohol, blood pressure, and heart rate could
    provide features such as drunk-driving prevention and an indication of drowsiness.


    Collaboration is the bedrock of change, and this is especially true when it comes
    to realizing precision healthcare. To provide tailored care for everyone, robust
    collaboration and synergistic efforts involving multiple stakeholders are essential.'
