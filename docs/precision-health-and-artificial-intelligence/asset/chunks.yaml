    and the fallout from the COVID-19 pandemic (including the Great Resignation) have
    left many health systems facing healthcare worker shortages. In the United Kingdom,
    the NHS has declared a staffing crisis with more than 100,000 job vacancies, the
    United States is estimated to need 275,000 extra nurses by 2030, and Australia
    is predicted to have a nursing shortage of 123,000 by the same time.^([^(74)](#fn74),)
