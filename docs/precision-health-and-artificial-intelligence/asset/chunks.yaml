- fmt: '### New Treatments, Definitions of Disease, and Points of Intervention


    Vast networks of scientific and patient data will enable researchers to uncover
    new knowledge and essential disease insights, such as novel drug targets that
    can be expected to have a higher probability of success. These biomarkers can
    help characterize patients into subgroups likely to benefit from treatment and
    support the design of better clinical trials where suitable patients are recruited
    to participate and develop treatments for the real world. Large sets of -omics
    data and genomic biomarkers have the potential to uncover novel associations between
    molecular profiles and other clinical variables that would not have been identified
    otherwise, potentially leading to the identification of new clinically relevant
    subtypes in clinical trials. Figure [4-3](#535410_1_En_4_Chapter.xhtml#Fig3) shows
    how precision health can be used to develop better treatments.


    ![](images/535410_1_En_4_Chapter/535410_1_En_4_Fig3_HTML.jpg)


    An illustration distinguishes the current healthcare and future healthcare at
    the top and bottom, respectively. Current healthcare depends on similar therapies
    which result in no effect or adverse effect. On the other hand, future healthcare
    describes personalized diagnostics and treatment which results in better results.


    **Figure 4-3** Precision treatments provide efficacious treatments for all patients


    As data demonstrates previously unseen signals, new disease definitions are being
    defined. For example, behavioral change interventions have been shown to support
    weight loss, improve blood glucose control, and reverse cardiometabolic conditions
    such as type 2 diabetes and prediabetes.^([^(57)](#fn57)) Consequently, the definition
    of type 2 diabetes has changed in many countries, supported by big data, from
    a chronic and progressive disease to a disease that patients can reverse.


    Similarly, researchers can use machine-learning algorithms to predict potential
    future events such as depressive behavior and suicide risk. A model was trained
    by researchers at Vanderbilt University Medical Center using hospital admissions
    data, demographic data, and diagnostic history from just 5,000 patients to accurately
    predict whether an individual would risk taking their life in the proceeding seven
    days in 84 percent of cases and was able to accurately predict whether an individual
    would attempt suicide in the next two years in 80 percent of cases. When detected,
    patients can be escalated to emergency care and supported with intensive behavioral
    and mental health support.


    ### Digital Twins


    Digital twin instances and aggregates allow for the formulation and testing of
    novel hypotheses, in silico experiments and comparisons, and the discovery of
    new knowledge from the small data of one person to the big data of one or several
    populations by ensuring target populations are well represented in the corresponding
    digital twin representations.^([^(58)](#fn58)) Personalized heart models, for
    example, are used to aid clinical treatments for severe heart defects in newborns.
    Many virtual surgeries can be performed under the physician’s supervision using
    digital twins to determine the best approach.


    The characteristics of digital twins, such as digital thread tracing and tracking,
    enable highly personalized treatment pathways, better outcomes, and more explainable
    AI. Similar to the challenges AI and data analytics face, digital twins are affected
    by data availability and quality, data integration and interoperability, data
    sharing, concerns about intellectual property, data privacy and security across
    platforms and systems, AI bias, explainability, and reproducibility.


    AI reproducibility and bias reduction in intelligent digital twins can be achieved
    by ensuring that target populations are fairly represented in their respective
    digital twins and digital twin aggregates.


    ### Health Promoting Chatbots


    Research shows that AI chatbots demonstrate significant usability, feasibility,
    and acceptability worldwide.^([^(59)](#fn59)) With almost 100 percent uptime,
    chatbots are perfect for promoting and maintaining healthy behaviors, whether
    smoking cessation, better nutrition, or medication adherence. Health-promoting
    chatbots overcome digital telehealth limitations, such as unsustainability, low
    adherence, and inflexibility, by providing personalized on-demand support with
    higher levels of interactivity and sustainability.


    Health-promoting chatbots collect data from various sources, including the user,
    analyze it using machine learning and natural language processing techniques,
    and provide the user with data outputs such as information, signposting behavioral
    change support, or escalation to more intensive support. Chatbots that promote
    health are already showing great promise in terms of saving time. Patients, for
    example, can communicate their symptoms via a messenger chat and receive live
    consultations without booking appointments or visiting facilities.'
