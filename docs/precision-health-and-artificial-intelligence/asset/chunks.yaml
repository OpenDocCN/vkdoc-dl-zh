  trans: '

    ### 讨论


    我们的数据证实，通过`Low Carb Program`应用程序提供数字化支持的远程肥胖管理，与疫情前时代实施的传统的院内面对面肥胖管理，在减轻体重方面效果相当。这是一个新颖的见解，对于未来医院肥胖服务的提供和混合数字化具有重要启示。我们的数据佐证了近期一项关于移动应用干预的荟萃分析，该分析显示体重减轻和血糖控制改善的效果相似。^(⁸⁸)
    本研究的临床意义在于数字工具对减重的影响，以及将其纳入英国国家医疗服务体系（NHS）肥胖管理路径的必要性。体重减轻 3%或更多时，可观察到血糖水平和血脂异常的显著改善。^(⁸⁹,)
    ^(⁹⁰) 在我们的队列中，23%（18/48）的患者体重减轻超过 3%，这将转化为血糖以及血脂异常的临床显著改善。此外，我们不应低估任何减重对体重困扰者情绪和心理状态的积极作用。这能产生巨大的激励效果，而且这种减重是“自我驱动”的，没有营养师的任何主动介入，这意味着它还可能提升自尊和自信，进而有助于鼓励长期持续的减重。


    需要强调的是，我们这项研究具有偶然性，其构思和启动是在新冠疫情登上世界舞台之前。尽管最初设计是作为传统标准的院内多学科肥胖管理的补充手段，但由于新冠疫情的阻碍，`Low
    Carb Program`应用程序反而补充了由缩减团队（缺乏专业营养支持）通过电话进行的远程肥胖管理。因此，我们研究的执行，是出于适应和调整临床实践以应对全球大流行的需要，同时结合了一个并未涉及新冠疫情的研究设计。事后看来，`Low
    Carb Program`应用程序似乎更适合补充远程护理模式，而非传统的（疫情前）标准护理模式。此外，在新冠疫情期间，由于 UHCW 的人员重新调配，我们的患者均未获得任何营养支持。因此，我们不能将通过`Low
    Carb Program`应用程序和远程管理观察到的体重和`HbA1c`变化归因于任何营养干预。相反，这些临床结果源于远程医疗和心理支持，以及患者对`Low
    Carb Program`应用程序的参与（包括学习知识、掌握技能以及生活方式和饮食行为的改变）。


    `Low Carb Program`应用程序的注册率很高，所有参与者均完成注册（105/105，100%），随访时的参与率也很高（88/105，83.8%）。总体而言，105
    名参与者中有 15 人（14.3%）未完成注册流程，105 人中有 47 人（44.8%）在激活注册后未报告结果。然而，这组中的大部分人（29/47，61.7%）在随访时仍在积极使用该应用程序。这些结果表明，该干预措施需要进行调整，以充分吸引确诊肥胖的患者参与，并且应用程序的其他功能可能比健康追踪更具吸引力。


    我们的研究存在若干局限性。由于本研究的观察性质及其作为临床创新的设计，我们没有进行随机化，也没有纳入对照组（安慰剂）来与那些使用`Low Carb Program`应用程序并结合远程肥胖管理的参与者进行直接比较。尽管这种组合的临床益处可能完全源于与肥胖团队成员的远程互动，但考虑到明显缺乏来自专业营养师的重点支持，这种可能性似乎不大。更可能的情况是，参与`Low
    Carb Program`应用程序有助于补充远程管理，从而帮助患者实现临床结果。此外，虽然我们没有纳入对照组，但我们确实与一组在疫情前接受传统标准护理的患者进行了回顾性比较。由于本研究评估的是该应用程序的可行性，我们未收集关于用药变化的信息，未来的研究应捕捉这些信息。考虑到`SGLT2`抑制剂和`GLP1`类似物对体重的影响，降糖治疗的变化可能是一个混杂因素。另外，并非所有参与者都能获得`BMI`数据，因此我们未将其纳入这项初步研究。


    ### 结论


    我们的评估为在医院（三级）肥胖服务中实现数字化专科肥胖管理提供了首个概念验证。我们证明了这种方法在减轻体重和改善血糖控制方面的临床有效性。未来的研究应探索如何使该应用程序适应临床肥胖环境中的患者群体，以提高用户参与度和长期效果。最终，该应用程序代表了一种在人群层面既具有可及性又具有可扩展性的管理选择。从预防的角度来看，`Low
    Carb Program`应用程序对普通人群（无论是否肥胖）都具有相关性。


    健康的生活方式对我们所有人都很重要。毕竟，一分预防胜过十分治疗。


    ### 基于我们的证据进行拓展


    由于医院肥胖服务与数字治疗提供商之间的初次合作取得了成功，更广泛的团队共同合作开发了`W8Buddy`，这是首个专门为 NHS 三级体重管理服务开发的数字支持工具。


    `W8Buddy`提供精准的三级体重管理服务（T3WMS），通过实时远程监控能力，支持患者实现其自行选择的健康目标和具有临床意义的体重减轻。


    该服务由考文垂和华威大学医院（UHCW）的整个专科体重管理（肥胖）多学科团队（由 NIHR 糖尿病与内分泌学临床讲师、MBChB、BSc、MRCP、FHEA、PhD
    的 Petra Hanson 博士领导的体重管理营养师、心理学家和医生）、NHS 肥胖临床服务中的患者反馈，以及 NHS 信赖的数字技术提供商 DDM Health
    共同开发。


    该平台提供的功能包括结构化教育、辅导、社区、健康与目标追踪、膳食与食物记录（包括拍摄食物照片）、食谱、根据健身水平定制的按需活动课程，以及实时远程家庭监测。`Gro
    Health`干预措施可通过网页（响应式）、智能手机应用（iOS/Android）和智能助手/电视访问，并提供离线包以支持数字弱势用户。


    视障用户可获得全面符合 WCAG 2.1 标准的支持，兼容所有屏幕阅读器/视觉应用阅读器，提供更大/更粗的字体、纯音频内容、主题编辑（深色模式）以减轻眼睛疲劳、语音激活的
    Alexa/Google 应用，以及将应用投屏到电视的功能。听障用户可获得带字幕/手语翻译的视频、离线学习材料以及配有翻译的辅导。


    该平台已在 T3WMS 中部署。


    此外，该平台正被用于医院内的其他护理领域，包括心脏康复、癌症护理和 1 型糖尿病。

