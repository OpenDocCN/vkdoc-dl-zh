- fmt: '### Discussion


    Our data confirms equivalence of body weight reduction resulting from remote obesity
    management complemented by digitally enabled support through the `Low Carb Program`
    app versus traditional face-to-face hospital-based obesity management implemented
    during the pre–COVID-19 era. This is a novel insight that has important implications
    for the future delivery and hybridized digitalization of hospital-based obesity
    services. Our data corroborates a recent meta-analysis on mobile app interventions,
    showing similar reductions in body weight and improvements in glycemic control.^([^(88)](#fn88))
    The clinical relevance of this study is the impact of digital tools on weight
    loss and the need to incorporate them into the NHS obesity pathways. Meaningful
    improvements in blood glucose levels and dyslipidemia are seen with a weight loss
    of 3 percent or more.^([^(89)](#fn89),) ^([^(90)](#fn90)) In our cohort, 23 percent
    (18/48) had a weight loss of more than 3 percent, and this will translate into
    meaningful clinical improvements in blood glucose, as well as improvements in
    dyslipidemia. Moreover, we should not underestimate the utility of any weight
    loss on the emotional and psychological status of people who struggle with their
    weight. This can have great motivational effects, and the fact that this was “self-induced,”
    without any active input from a dietitian, means it is likely to also improve
    self-esteem and self-confidence, which in turn should help to encourage further
    weight loss over time.


    It is important to highlight the serendipitous nature of our study, with its conception
    and initiation prior to the emergence of COVID-19 onto the world stage. Although
    originally designed as a means to complement the traditional standard of face-to-face,
    multidisciplinary management of obesity delivered within a hospital-based setting,
    use of the `Low Carb Program` app instead complemented the remote delivery of
    obesity management delivered over the telephone by a diminished team (without
    focused dietetic support), due to the obstructive effects of the COVID-19 pandemic.
    Thus, the execution of our study morphed out of a necessity to adapt and align
    our clinical practice in response to a global pandemic, in combination with a
    study design in which COVID-19 did not feature. In retrospect, the `Low Carb Program`
    app seems more apt to complement a remote care model than one of a traditional
    (pre–COVID-19) standard of care. Furthermore, during the COVID-19 pandemic, none
    of our patients received any dietetic support due to staff redeployment at UHCW.
    Therefore, we cannot attribute the changes in body weight and `HbA1c` observed
    with the `Low Carb Program` app and remote management to any dietetic input. Conversely,
    these clinical outcomes stemmed from remote medical and psychological input combined
    with patient engagement with the `Low Carb Program` app (including learned education,
    knowledge, and lifestyle behavioral and dietary changes).


    The `Low Carb Program` app had a high sign-up rate, with all participants signing
    up (105/105, 100 percent), and a high engagement rate at follow-up (88/105, 83.8
    percent). Overall, 15 of the 105 participants (14.3 percent) did not complete
    the registration process, and 47 of the 105 participants (44.8 percent) did not
    report outcomes once they had activated their registration. However, much of this
    group (29/47, 61.7 percent) were actively using the app at follow-up. These results
    suggest that the intervention requires adaptations to fully engage patients diagnosed
    with obesity and that other features of the app may be more engaging than health
    tracking.


    Our study had several limitations. Because of the observational nature of our
    study and its design as a clinical innovation, there was no randomization and
    no inclusion of a control (placebo) group for direct comparison with those participants
    who engaged with the `Low Carb Program` app in combination with remotely delivered
    obesity management. Although it is possible that the clinical benefits of this
    combination stemmed solely from the remote interactions with members of the obesity
    team, this seems unlikely given the notable absence of any focused support from
    specialist dieticians. A much more likely scenario is that engagement with the
    `Low Carb Program` app helped to complement remote management in patients’ achievements
    of clinical outcomes. Furthermore, although we did not include a control group,
    we did make comparisons retrospectively with a group of patients who had received
    a traditional standard of care pre–COVID-19. As this study assessed the feasibility
    of the app, we did not collect information on medication changes that future studies
    should capture. Change in glycemic therapy could be a confounder, given the effects
    of `SGLT2` inhibitors and `GLP1` analogs on body weight. Additionally, data on
    `BMI` was not available for all participants, and therefore we did not include
    it as part of this pilot study.


    ### Conclusion


    Our evaluation provides the first proof of concept for digitalized specialist
    obesity management within a hospital-based (tier 3) obesity service. We demonstrate
    the clinical efficacy of such an approach, both regarding loss of body weight
    and improvement in glycemic control. Future studies should explore how to adapt
    the app to populations seen within the clinical obesity setting to improve user
    engagement and long-term outcomes. Ultimately, the app represents a management
    option that is potentially both accessible and scalable at the population level.
    From a preventive perspective, the `Low Carb Program` app has relevance for the
    general population, regardless of obesity status.


    A healthy lifestyle is important for all of us. After all, an ounce of prevention
    is worth a pound of cure.


    ### Building on Our Evidence


    Because of the success of the initial partnership between the hospital obesity
    service and digital therapeutic provider, the wider team came together to co-develop
    `W8Buddy`, the first digital support tool developed specifically for NHS Tier
    3 Weight Management Services.


    `W8Buddy` provides a precision tier 3 weight management service (T3WMS) to support
    patients to achieve their self-selected health goals and clinically meaningful
    weight loss with real-time remote monitoring capabilities.


    The service was developed by the entire specialist weight management (obesity)
    multidisciplinary team at University Hospital Coventry and Warwickshire (weight
    management dietitians, psychologists, and physicians led by Dr. Petra Hanson,
    NIHR clinical lecturer in diabetes and endocrinology, MBChB, BSc, MRCP, FHEA,
    PhD), feedback from people within the NHS obesity clinical service, and DDM Health,
    providers of NHS-trusted digital technologies.


    The platform provides features including structured education, coaching, community,
    health and goal tracking, meal and food logging (including taking photos of food),
    recipes, on-demand activity classes tailored to fitness level, and real-time remote
    home monitoring. The `Gro Health` intervention is available on the Web (responsive),
    smartphone app (iOS/Android), and smart assistants/TVs with an offline pack supporting
    digitally excluded users.


    Visually impaired users are supported with full WCAG 2.1 compliance, compatibility
    with all screen readers/visual app readers, larger/bolder fonts, audio-only content,
    editing of themes (dark mode) to reduce eye stress, voice-activated Alexa/Google
    app, and ability to cast/AirPlay the app to their TV. Users with hearing impairments
    receive subtitled/BSL-signed videos, offline learning materials, and coaching
    with interpreters.


    The platform has been deployed across the T3WMS.


    Further still, the platform is being utilized in other areas of care within the
    hospital including cardiac rehabilitation, cancer care, and type 1 diabetes.'
