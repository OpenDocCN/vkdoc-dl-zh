- fmt: '# 1. Introduction


    Mobile technology has spread rapidly across the globe and is accomplishing more
    than just connecting people. The humble smartphone is responsible for changing
    the fundamentals of how we live—enabling users with a wealth of features including
    instant communication, Internet browsing, entertainment, games, productivity and
    location mapping.


    As well as being magnitudes more powerful than the computers sitting onboard NASA’s
    Perseverance Rover currently exploring Mars, smartphones are responsible for the
    growing datafication of our lives.^([¹](#fn1)) More than 8 in 10 people around
    the world own a smartphone. And each of these people carries their own private,
    unique data cloud.^([²](#fn2))


    We generate data everywhere: our shopping habits, taxi journeys, music preferences,
    payment habits, social media interactions, DNA test results, food delivery orders,
    and messages all contribute to the 2.5 quintillion bytes of data we produce daily.
    In 2025, this is expected to reach 463 exabytes (2^60 bytes).^([³](#fn3)) Most
    aspects of our day-to-day lives are transferred into data and, from this, create
    an opportunity for making more optimal decisions.


    People carry with them millions of data points that, to some degree of accuracy,
    can be used to define them. Smartphones, the Internet of Things, and the ubiquity
    of connectivity have enabled a moment-by-moment quantification of each person’s
    individual state of being and human experience using data from digital devices
    that they use. As patients, we generate masses of data, collected within our medical
    records, smartphones, and other sources, which detail our prior health history,
    current health status, and, in a growing number of use cases, predisposition to
    future illness.


    Growth in big data generation and its storage has been facilitated through scalable
    and affordable cloud services, and wherever there is data, there is artificial
    intelligence (AI). AI and machine learning have blossomed as disciplines, fueled
    by the data being generated and its availability. Autonomous vehicles, smart speakers,
    chatbots, and marketing are just some examples of how AI is used to empower humans
    to live in a more efficient and individualized way more than 60 years after the
    term was first defined. AI has famously beaten the greatest minds of chess and
    Go in competitions that humans have played for thousands of years.^([⁴](#fn4))
    With the introduction of AI capabilities, the ability to learn from data to make
    better decisions has never been more accessible.


    When applied to healthcare, the mining of data of millions of patients enables
    machine learning to realize its potential and develop powerful AI algorithms to
    help predict disease and provide precise, individualized treatment to each patient.
    The distinction between person and patient is critical as people’s perspectives
    on technology and data sharing vary significantly depending on whether they are
    used for health or any other benefit.


    Developing and interpreting the wealth of data produced by these technological
    and scientific innovations has already profoundly modified the scientific landscape.
    AI applications play an important role in fields like gene-editing CRISPR and
    drug discovery and AI-powered services such as monitoring health status and behavior
    change (or the art of suggesting actions to improve health and well-being). AI
    is demonstrating increasing impact and outcomes through the pervasive use of smartphones,
    biological data, and IoT.


    The data now available, coupled with exponential progress in data storage, computational
    power, and connectivity, means precision health is no longer science fiction;
    it is a real-time reality.


    ## From Personalized Medicine to Precision Health


    Precision health is a medical paradigm that extends evidence-based practice and
    medicine. Precision health provides customized healthcare to the characteristics
    of each patient or group of patients rather than a one-size-fits-all model. Healthcare
    is not just delivered at the point of diagnosis but instead received from birth
    with tailored health and behavioral support.


    Precision medicine and personalized medicine share many similarities. Personalized
    medicine is an older term generally referring to advanced -omics testing or biomarker
    discovery tools that are used to customize medical treatments based on an individual’s
    unique biomarker profile.


    Personalized medicine is entangled with precision health, with both terms now
    generally referring to the same thing. While genomic testing makes a person’s
    DNA available and identifies gene single nucleotide polymorphisms (SNPs, the most
    frequent type of genetic variation among people), precision health accordingly
    facilitates personalized, evidenced-based health treatments. Precision health
    ensures that decisions, treatments, practices, and products are appropriate and
    optimal by using information about a person’s genes, behaviors, and environment
    to provide tailored, patient-centered care. Another term used interchangeably
    with personalized medicine and precision health is 4P medicine, an acronym that
    denotes the principles of precision health.


    This precise approach to medicine is not new. Healthcare professionals have been
    using this clinical approach since the time of Hippocrates. Yet never have humans
    had the power to predict illness and support health quite like today. A person’s
    state of health is the collective product of their genetic makeup, medical history,
    microbiome, diet, lifestyle, and environment. Our body has 30 to 40 trillion cells,
    each with genetic codes compiled of billions of DNA base pairs; and our microbiome
    alone comprises more than 39 trillion microbes that are essential to our health
    and well-being. Each cell has an expression formed of subsets of genes that form
    complex relationships with health and well-being. Every person has a different
    genetic makeup and microbiome, needs a particular diet, and has a unique health
    status and personalized form of health, medicine and behaviors to obtain and maintain
    optimal health.


    The hyper-personalization achievable from the patient genome and its falling cost,
    medical data from health records, wearable technology, and the health IoT, coupled
    with distributed hosting, has made it possible to move to personalized, real-time
    care.


    Precision health is not only about enhanced risk profiling and population stratification,
    but it encompasses how that data is used to improve patient and population-level
    outcomes. Groups of patients, for example, may share common characteristics such
    as the risk of disease, similar to how one drug might not fit everyone’s requirements.


    Examples of precision health include the following:


    *   Biomarker testing to ensure the correct treatment is received. Blood transfusions
    require the blood transfused to match the patient’s own blood type to ensure suitability
    and optimize the chances of recovery.


    *   The use of social media to track disease and communicate health information.
    Digital health was a critical tool in response to the COVID-19 pandemic and maintaining
    healthcare delivery during multiple global lockdowns. Data was used to record
    the spread and progression of the disease and to facilitate education, guidance,
    and support.


    *   Understanding medical options when there is a familial risk of disease to
    receive screening earlier or more often, take medicine or have surgery. For example,
    women with a mutation of the BRCA1 or BRCA2 gene are at higher risk of developing
    breast and ovarian cancer. Identifying such modifications earlier enables patients
    and healthcare teams to take action to prevent the disease or detect it earlier.'
