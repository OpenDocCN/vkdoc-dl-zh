- fmt: '# 排版后的文本


    Continuous glucose monitoring to optimize insulin dosing and behaviors. By using
    real-time data from glucose monitoring sensors, continuous glucose monitoring
    systems provide a range of benefits, including insulin dosing, encouraging positive
    health behaviors, preventing complications, and enabling the sharing of real-time
    health data with clinical teams. Importantly, granular blood glucose data indicates
    a user’s state of health and behaviors more than traditional `HbA1c` tests that
    would typically occur every six months.


    Smartphone applications that provide behavioral change and chronic disease management
    support. Health applications monitor health and behaviors, encourage patients
    to adhere to treatments and behaviors, provide coaching, and prompt patients to
    attend appointments and screenings.


    Precision health converges with Eastern medicine, mainly derived from Chinese
    and Indian cultures, which, like personalized medicine and systems medicine, considers
    human biological systems as a cohesive whole.^([⁵](#fn5)) Eastern medicine views
    the human body as a holistic entity of harmonious organs and approaches health
    from this framework. Figure [1-1](#535410_1_En_1_Chapter.xhtml#Fig1) demonstrates
    how precision health tools are used to provide care at all stages of a disease
    or, conversely, health.


    ![](images/535410_1_En_1_Chapter/535410_1_En_1_Fig1_HTML.jpg)


    An illustration demonstrates the progression of the disease from all stages. The
    precision health timeline starts with the baseline risk susceptibility, then monitors
    progression and defines disease mechanism, further it ends with personalized therapy.


    **Figure 1-1** Progression of disease on a precision health timeline


    Imagine now an ethically and morally utopian society where routine genomic screening
    tests occur once someone is born. You have your genome screened at birth, and
    there is a presentation of biomarkers that place you at higher risk of heart disease.
    Because of your familial and genetic risk of heart disease, you receive a smart
    patch that measures heart rate, blood pressure, and `SpO2`. As you grow older,
    you receive weekly cardiograms as part of a regular opt-in treatment program and
    smart patch replacements. All of your data is sent to a cloud-based ecosystem
    visible to your clinical team and next of kin. The next day, you receive a text
    message from your clinician, who is notified of your deteriorating health in real
    time to invite you for an appointment. You worry about what news you receive.


    At your appointment, you are notified that there is the presence of particular
    electrolytes in your sweat, placing you at risk of heart failure. The activity
    data from your phone is assessed alongside your food diary app to conduct a risk
    assessment based on your health and recent behaviors. Your clinician gives you
    medicine that you take weekly that excretes a compound detected in your urine
    if symptoms of heart failure persist, and you are encouraged to improve your lifestyle.


    To support improvements in activity and nutrition, you are enrolled into a tailored
    behavioral change program facilitated through a health app to encourage and monitor
    your behaviors. Your smart home monitors your temperature and time of sleep, and
    you communicate with a voice-activated assistant who confirms how you are feeling
    and analyzes your voice in real time to detect any potential abnormalities. You
    test your urine once a month using a home testing kit, which gives almost instant
    results and shares outcome data, including requirements for any emergency escalation,
    directly using a private 5G network to your clinical team.


    No part of this scenario mentioned is out of our reach. However, we are still
    pretty far from realizing the promise of precision health, which will require
    interdisciplinary collaboration at an unprecedented scale. The reward? The benefits
    of precision health. Medicine, as currently practiced, is empirical, inadequately
    grounded in evidence, and dependent on the knowledge and experience of individual
    providers, which results in variable care with suboptimal outcomes.


    Precision health enables patient-centered, individualized care tailored to the
    characteristics of patients at scale to provide patient-level and population-level
    health benefits. The goal is a unified approach to match a full range of promotion,
    prevention, diagnostic, and treatment interventions to fundamental and actionable
    determinants of health—to not just address symptoms but directly target genetic,
    biological, environmental, and social and behavioral determinants of health. Figure
    [1-2](#535410_1_En_1_Chapter.xhtml#Fig2) provides a high-level overview of how
    precision health enables better health.


    ![](images/535410_1_En_1_Chapter/535410_1_En_1_Fig2_HTML.jpg)


    An illustration explains the approach of precision health for better health. An
    addition of genes, environment, lifestyle plus innovation, and diversity equals
    better health.


    **Figure 1-2** Enabling better health with a precision health approach


    At its heart, precision health’s objective is to prevent, predict, treat, and
    cure disease precisely.


    That said, there are unprecedented challenges precision health poses that must
    be addressed to ensure precision health and AI safely and beneficially impact
    healthcare.


    ## Why Precision Health? Why Now?


    The world’s population is living longer, unhealthier lives, and the global economy
    is in crisis.


    Healthcare systems are stretched and turning to value-based and incentivized care
    as noncommunicable diseases (NCDs) such as obesity, cardiovascular disease, type
    2 diabetes, and cancers become pandemics in their own right. The causes of these
    NCDs are rooted mainly in lifestyle and environmental factors that are challenging
    to modify, given the nature of modern environments, behaviors, and occupations.
    And that was before COVID-19.'
