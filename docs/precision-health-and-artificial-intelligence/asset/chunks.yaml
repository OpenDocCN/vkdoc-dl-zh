  trans: '

    ### 新疗法、疾病定义与干预切入点


    庞大的科学与患者数据网络将使研究人员能够发现新知识和重要的疾病洞见，例如有望具有更高成功概率的新型药物靶点。这些生物标志物有助于将患者划分为可能从治疗中获益的亚组，并支持设计更优的临床试验，招募合适的患者参与其中，从而开发出适用于现实世界的疗法。大规模的组学数据和基因组生物标志物有潜力揭示分子谱与其他临床变量之间的新型关联，这些关联原本无法通过其他方式识别，进而可能在临床试验中发现新的临床相关亚型。图
    4-3 展示了如何利用精准健康来开发更好的疗法。


    ![](img/535410_1_En_4_Fig3_HTML.jpg)


    一幅示意图分别在上方和下方区分了当前的医疗保健和未来的医疗保健。当前的医疗保健依赖于类似的疗法，导致无效或不良反应。另一方面，未来的医疗保健描述了个性化的诊断和治疗，从而带来更好的结果。


    **图 4-3** 精准治疗为所有患者提供有效的治疗方案


    随着数据揭示出前所未有的信号，新的疾病定义正在被制定。例如，行为改变干预已被证明有助于减肥、改善血糖控制，并逆转诸如 2 型糖尿病和糖尿病前期等心脏代谢疾病。^(⁵⁷)
    因此，在大数据的支持下，许多国家已将 2 型糖尿病的定义从一种慢性、进行性疾病转变为一种患者可以逆转的疾病。


    类似地，研究人员可以利用机器学习算法预测潜在的未来事件，例如抑郁行为和自杀风险。范德比尔特大学医学中心的研究人员利用仅 5000 名患者的入院数据、人口统计数据及诊断史训练了一个模型，该模型能够准确预测个体在未来七天内是否有生命危险，准确率达
    84%；并且能够准确预测个体在未来两年内是否有自杀企图，准确率达 80%。一旦检测到风险，患者可被升级至紧急护理，并获得强化行为与心理健康支持。


    ### 数字孪生


    数字孪生实例及其聚合体能够通过确保目标人群在相应的数字孪生表征中得到充分体现，从而支持新假设的提出与检验、计算机模拟实验与比较，以及从单一个人的小数据到单个或多个群体的大数据中发现新知识。^(⁵⁸)
    例如，个性化心脏模型被用于辅助新生儿严重心脏缺陷的临床治疗。在医生的监督下，可以利用数字孪生进行多次虚拟手术，以确定最佳方案。


    数字孪生的特性，如数字线程追踪与跟踪，能够实现高度个性化的治疗路径、更好的结果以及更具可解释性的人工智能。与人工智能和数据分析面临的挑战类似，数字孪生也受到数据可用性与质量、数据集成与互操作性、数据共享、知识产权顾虑、跨平台与系统的数据隐私与安全、人工智能偏见、可解释性及可重复性等因素的影响。


    通过确保目标人群在其各自的数字孪生及数字孪生聚合体中得到公平代表，可以实现智能数字孪生中的人工智能可重复性与偏见减少。


    ### 健康促进聊天机器人


    研究表明，人工智能聊天机器人在全球范围内展现出显著的可用性、可行性和可接受性。^(⁵⁹) 凭借近乎 100%的正常运行时间，聊天机器人非常适合促进和维持健康行为，无论是戒烟、改善营养还是药物依从性。健康促进聊天机器人通过提供具有更高互动性和可持续性的个性化按需支持，克服了数字远程医疗的局限性，例如不可持续性、低依从性和缺乏灵活性。


    健康促进聊天机器人从包括用户在内的多种来源收集数据，利用机器学习和自然语言处理技术进行分析，并向用户提供数据输出，例如信息、行为改变支持指引，或升级至更密集的支持。在节省时间方面，健康促进聊天机器人已展现出巨大潜力。例如，患者可以通过即时通讯聊天传达症状，无需预约或前往医疗机构即可获得实时咨询。

    '
- fmt: '### Voice Recognition


    The human voice is a rich medium that serves as a primary communication source.
    Virtual/vocal assistants on smartphones or smart home devices such as connected
    speakers are now mainstream and have facilitated the numerous uses of voice-controlled
    search. For a good reason, too—speaking is one of the most natural, energy-efficient
    ways of interacting. As animals, we share insights about our emotions, fears,
    feelings, and excitation by modulating our voice’s tone or pitch. Diseases can
    affect organs such as the heart, lungs, brain, muscles, or vocal folds, altering
    an individual’s voice.


    `Voice-recognition` algorithms process raw sound waves from human speech to recognize
    essential elements of speech; vocal biomarkers such as tempo, pitch, timbre, and
    volume; and more complex speech features such as spoken language, words, and sentences.
    The main applications of speech recognition thus far are voice command and virtual
    assistant systems.


    Although `voice-recognition` algorithms are not yet widely used in clinical diagnostics,
    they have shown great promise in detecting neurological conditions that are often
    difficult to diagnose with traditional clinical tools. Because of its ability
    to reveal information about a person, such as their identity, demographics, ethnicity,
    or even their health status in cases of vocal biomarkers, voice data is considered
    sensitive.


    `Voice recognition` has been used successfully to detect diseases that have a
    noticeable impact on speech, such as chronic pharyngitis, as well as diseases
    that have a less pronounced effect on speech, such as Alzheimer’s disease, Parkinson’s
    disease, major depressive disorder, posttraumatic stress disorder, and coronary
    artery disease. The same general `speech-recognition` strategies are used in these
    clinical applications. Still, the outcome targeted by the final classification
    step is a disease phenotype typically associated with speech characteristics (tone,
    tempo, pitch, and so on) rather than language content. The validation of vocal
    biomarkers against gold standards is mandatory for the safe use of voice to monitor
    health-related outcomes.


    It is also vital to consider language and accent when using voice technologies
    or vocal biomarkers on a large scale. Otherwise, they could result in systemic
    biases toward people from certain regions, with different backgrounds, or with
    various accents and exacerbate the existing digital and socioeconomic divides.
    To limit bias toward under-represented groups of the population, voice technologies
    or vocal biomarkers must rely on algorithms trained on diverse datasets. Researchers
    must also improve the ability to process and understand natural language, relevance,
    and accuracy of voice assistant answers. Figure [4-4](#535410_1_En_4_Chapter.xhtml#Fig4)
    gives examples of how vocal biomarkers can be used in health.


    ![](images/535410_1_En_4_Chapter/535410_1_En_4_Fig4_HTML.png)


    A three-column chart explains vocal biomarkers for the health industry. The column
    headers are integrated in, conditions or symptoms, and application from left to
    right, respectively.


    **Figure 4-4** Overview of the use of vocal biomarkers for health


    From audio to video, the field is moving. Adding images to voice data allows for
    better characterizing patients, emotions, and other health characteristics. The
    use of facial recognition and novel technologies, such as the smartphone camera
    combined with vocal biomarkers, makes remote health monitoring more precise and
    reliable. With the introduction of 5G networks and future updates, as well as
    an increasing number of smartphones and at-home devices with voice assistants,
    large vocal samples will be easier to collect and process.


    As they say, a picture is worth a thousand words; and a video is worth a thousand
    pictures.


    ## Summary


    From the objective and thorough analysis of health data to identifying new long-term
    patterns and risk factors to aid diagnosis, machine learning, as a branch of AI,
    provides a myriad of opportunities to enhance medicine and healthcare. Further
    still, using AI in commercialized health systems offers a solution for patient-centered
    and personalized healthcare and well-being treatments. Nevertheless, machine learning
    applications to digital health have mainly been restricted to narrow domains.
    However, recent advancements in sensors and the Internet of Things mean we can
    now collect more data on users’ broader physical and emotional states than ever.


    As discussed in this chapter, there are many challenges to overcome, including
    significantly improving explainability and transparency, before we can expect
    more widespread adoption of AI in core healthcare services. Nonetheless, continued
    research in AI for digital health will help stimulate the overall drive of digital
    health and AI with substantial value for modern societies.


