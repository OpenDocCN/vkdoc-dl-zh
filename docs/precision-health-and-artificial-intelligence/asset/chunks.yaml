- fmt: '### Objective


    The aim of our study was to assess the feasibility and effectiveness of the `Low
    Carb Program` app for weight loss, applied within our specialist hospital-based
    (tier 3) obesity service. Because of the disrupting effects of the COVID-19 pandemic
    on our obesity service, we also compared the clinical outcomes from the `Low Carb
    Program` app applied in the context of remote patient appointments over the telephone
    with the prepandemic, traditional standard of care.


    ### Methods


    Access to the `Low Carb Program` app was offered to all new patients at their
    initial medical consultation after being referred to our hospital-based (tier
    3) obesity service at UHCW, United Kingdom, over a 9-month period between January
    2020 and September 2020. The initial contact was with a medical doctor. Patients
    were informed about the app, and those who wanted to use the app were given instructions
    on how to download it. We recruited those patients who were interested in using
    the app and provided each of them with a unique code that enabled activation of
    the app free of charge when downloaded from the NHS App Library. The only exclusion
    criterion included the inability to understand English. Control group data was
    collected for a previous study assessing group educational sessions, with the
    participants attending the service between 2016 and 2019. The duration of follow-up
    for the control group was 6 months.


    Each recruited participant had ongoing clinical input and follow-up with members
    of our hospital-based (tier 3) obesity management team as part of usual care throughout
    the study period. Although conceived and commenced within the pre–COVID-19 era
    (January 2020), there was substantial overlap of much of our study with the COVID-19
    pandemic (for five of the seven months of the study period, between March and
    September 2020). As a result, no patient in the tier 3 weight management service
    received specialist dietary input from March 2020 onward. The clinical follow-up
    varied between patients, but most received telephone review by a doctor 6 months
    after the previous appointment. However, the `Low Carb Program` app supported
    each participant with invitations to virtual meetups every Monday to provide an
    opportunity for social connection with other users during the “lockdown” period
    in the United Kingdom. We conducted the virtual meetups through coach-led video
    conferencing sessions that provided an informal space for the sharing of personal
    experiences and establishment of peer support networks.


    ### How Does Personalization Appear?


    For the purposes of our study, we used a streamlined version of the `Low Carb
    Program` app, specifically personalized to people living with obesity within the
    community. An example of personalization is shown here:


    *   Patient A is a 60-year-old South Asian female diagnosed with morbid obesity
    and comorbidities. Patient A speaks Hindi as her first language and is a vegetarian.
    On signing up to the program, Patient A’s registration data personalizes her experience
    of the app. Patient A is presented with structured education that explains the
    physiology of obesity and comorbidities and how to self-manage a healthy weight.
    Patient A’s experience is provided in Hindi, delivering information to meet cultural
    needs and expectations. Patient A is supported with vegetarian meal plans that
    are provided in Punjabi and ingredients that match cultural expectations. Virtual
    meetups that Patient A engages in are facilitated by a Hindi-speaking coach should
    she choose to engage with this component of the app.


    *   Patient B is a 52-year-old Caucasian male diagnosed with obesity and prediabetes.
    Patient B speaks English as his first language, is a smoker, eats a standard diet,
    and is allergic to dairy. On signing up to the program, Patient B’s registration
    data personalizes his experience of the app. Patient B is presented with structured
    education that explains the physiology of prediabetes and how to self-manage prediabetes.
    Patient B’s experience is provided in English. Patient B is supported with meal
    plans that exclude dairy and are provided in English. Virtual meetups that Patient
    B engages in are facilitated by an English-speaking coach should he choose to
    engage with this component of the app.


    ### Results


    Participants exhibited a mean baseline body weight of 130.2 (SD 29.2) kg, a mean
    age of 48.8 (SD 12.7) years, and a mean `HbA1c` of 48.0 (SD 15.5) mmol/mol. The
    majority of participants (n=62, 59 percent) were female. A minority of participants
    (n=38, 36.9 percent) had diabetes mellitus (type 1 diabetes: n=5; T2D: n=33).
    The baseline phenotype of app users was broadly similar to the retrospective control
    group in terms of baseline weight, proportion of patients with diabetes, and baseline
    `HbA1c`, but was significantly different in terms of age and gender.


    Of the recruited participants (n=105), all enrolled in the `Low Carb Program`
    app. Overall, 90 of the 105 participants (86 percent) completed the `Low Carb
    Program` app registration process and engaged with the `Low Carb Program` app
    program. A total of 88 participants (84 percent) actively engaged with the `Low
    Carb Program` app within the previous 30 days. Only a minority of participants
    (19/105, 18 percent) completed the entire `Low Carb Program` app program (defined
    as completing 9 or more of the 12 education modules available). A total of 58
    of the 105 recruited participants (55 percent) self-reported outcomes from the
    `Low Carb Program` app. Of the 47 participants who did not self-report outcomes,
    29 participants (62 percent) were actively using the `Low Carb Program` app at
    follow-up assessments. The mean duration between baseline (registration) and follow-up
    check-in to self-report `HbA1c` and body weight was 5 months. Half of all participants
    engaged with the `Low Carb Program` app between 3 and 7 months (range 1–12 months).
    The mean duration of clinical follow-up for recruited participants who received
    the `Low Carb Program` app was 7.4 months.


    Paired data was available from 48 `Low Carb Program` app users for body weight
    and 41 `Low Carb Program` app users for `HbA1c`. Paired sample test analysis revealed
    a statistically significant mean loss of body weight of 2.7 kg (P=.001) and improvement
    in `HbA1c` of 3.3 mmol/mol (P=.01). The mean percentage weight loss of the whole
    cohort was 2.5 percent, with 10 of 48 patients (20.8 percent of our sample) achieving
    weight loss of more than 5 percent and 18 of 48 patients (23 percent of our sample)
    achieving weight loss of at least 3 percent.


    Data comparisons between the `Low Carb Program` app user group and the pre–COVID-19
    retrospective control group (usual clinical care) revealed similar loss of body
    weight and change in `HbA1c` between the two groups. The mean percentage weight
    loss in the control group was 0.88 percent, with 15 of 92 (16.3 percent) patients
    achieving weight loss of more than 5 percent. This is in keeping with the statistical
    test that showed that there was no statistically significant difference in the
    weight loss between the app group and the retrospective group.'
