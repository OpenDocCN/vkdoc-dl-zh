- fmt: '### Reliability and Safety


    Precision health systems must perform reliably, accurately, and safely. Bodies
    such as the `FDA` in the United States and `MHRA` in the United Kingdom promote
    safety and effectiveness by requiring providers to demonstrate these features.
    When applied to precision health technologies, ensuring outputs are technically
    reliable in that `AI` systems have learned correlations from previously seen data
    and are clinically reliable is paramount.


    Ethicists must also balance patient empowerment against risks such as inconsistent
    oversight of at-home tests, the importance of clinically supervised care, false
    positive and negative results, incorrectly reported data, and unintended consequences.
    `AI` systems augment current care rather than replace it and may sometimes require
    human intervention.


    Imagine an `AI` system trained to triage obese patients into high and low risk
    for heart attack. If the system understood from the data that researchers used
    to train the model that South Asian patients were less likely to die of a heart
    attack, it might recommend that South Asian patients are at low risk. However
    accurate this correlation from the data, the conclusion is a misinterpretation
    that research clinically contradicts. Being of South Asian ethnicity, in reality,
    increases your risk of heart and circulatory disease, type 2 diabetes, and a variety
    of co-morbidities.^([^(60)](#fn60))


    Self-improving `AI` presents another challenge in terms of ensuring reliability
    and safety. Current regulations assume that products should be clinically tested,
    manufactured, marketed, and used in a consistent, unchanging form. This is challenging
    with continuous learning `AI`, which is constantly changing due to the interpretation
    and analysis of currently available data. Because of the dynamic nature of continuous
    learning `AI`, new methods for ensuring the safety and reliability of such systems
    will be required. Continuously learning `AI` requires regulation that provides
    that ostensible improvements the continuous learning system makes to itself do
    not instead introduce errors into the model that could cause harm. At the same
    time, regulation must not require near-constant revalidation of the model.


    As has been demonstrated with Caucasian-focused medical textbooks used to deliver
    healthcare education for generations, the evidence base for most genetic tests
    is limited and needs more data from diverse populations.^([^(61)](#fn61)) Diversity
    and cultural differences play a crucial role in how stakeholders interpret safety
    in precision health. Until data from under-represented communities is collected
    at a representative scale, everyone should question it. Clinical tests are helpful
    only when they provide reliable, actionable information that patients and healthcare
    professionals can use for clinical decision-making, similar to how behavioral
    change interventions are beneficial only when they engage people in adopting and
    maintaining lifestyle behaviors.


    At a population level, the interpretation of multi-omics, clinical, environmental,
    and lifestyle data becomes more complex with inadequate validation of biomarkers
    and insufficient evidence of clinical utility. The lack of scientific evidence
    behind individualized precision health solutions is a challenge to safety. For
    instance, spending money on genomic tests is helpful only if it is beneficial.
    However, we must anticipate that some new tests will fail to meet expectations.
    Similarly, individual risk, which is not calculated bespoke to the patient and
    instead uses established risk prediction models validated on nonrepresentative
    populations, is counterintuitive to the aims of precision health. However, we
    must be mindful that supporting the efficacy and tolerability of novel individualized
    treatments will take time.


    Despite best efforts, `AI` systems cannot provide perfect accuracy due to different
    errors. Naturally, imperfect datasets may record errors or noise, and random errors
    are likely to be false positive and false negative predictions.


    ## General Ethical AI Principles


    General ethical `AI` principles represent principles that are largely unanimous
    and valid across cultures and geographies.


    ### Bias, Inclusivity, and Fairness


    Any tool used within healthcare, precision or not, should treat everyone fairly
    and equitably. `AI` technologies should promote prosperity, preserve solidarity,
    and avoid unfairness. However, in practice, `AI` models are not inherently objective.
    `AI` models learn the biases that influence human decision-making.^([^(62)](#fn62))


    Bias refers to the risk that models may operate in a discriminatory or exclusionary
    way, and bias can be introduced into a system in many ways. Machine bias can result
    from several causes, including a developer’s discrimination of data used to train
    the model. Data bias refers to deviation from expected outcomes. Human bias refers
    to bias exhibited by humans. Without awareness and control, `AI` systems can amplify
    existing biases and unfairness within datasets. For instance, research has found
    that doctors can transmit prejudice under objective descriptions in medical notes.^([^(63)](#fn63))


    Clinicians can use something as harmless as a pair of quotation marks to convey
    bias.^([^(64)](#fn64)) When physicians were characterizing their patients’ symptoms
    or health issues, one team of researchers discovered that Black patients, in particular,
    were quoted in their records more frequently than other patients. Researchers
    found quotation mark patterns that could signify disrespect, used to communicate
    irony or sarcasm to future clinical readers. Among the phrases highlighted by
    the researchers were colloquial language or statements made in Black or ethnic
    slang.


    Ultimately, `AI` systems reflect the biases inherent in data, those who develop
    the systems, and clinicians who implement and interpret them. Figure [5-2](#535410_1_En_5_Chapter.xhtml#Fig2)
    details the three aspects of a fair and bias-free `AI` system.


    ![](images/535410_1_En_5_Chapter/535410_1_En_5_Fig2_HTML.jpg)


    A cyclic diagram illustrates the three aspects of fair and bias-free `AI`. The
    aspects are people diversity, validation diversity, and data diversity labeled
    in a clockwise direction.


    Figure 5-2


    Fair and bias-free `AI`


    Successful outcomes in precision health rely heavily on the availability of high-quality,
    high-fidelity data representative of the target patient population. Poorly representative
    datasets introduce biases, leading to costly misdiagnosis or overdiagnosis scenarios.
    Only recently, researchers found that `AI`-powered skin cancer detection apps
    could better identify events in white patients than patients of other ethnicities.
    We must do better to ensure equity and equality of precision health access and
    outcomes.


    Representative data can still contain bias because they reflect our society’s
    disparities and intolerances, including racial, geographic, or socioeconomic disparities
    in healthcare service access. Reliance on data collected via user-facing apps
    and wearables, for example, may favor socioeconomically advantaged populations
    with greater access to expensive devices. Similarly, genetic testing remains prohibitively
    expensive for many consumers, so `AI` systems that use such genetic datasets may
    favor more economically advantaged consumers.


    Healthcare providers may unfairly implement precision health technologies designed
    to predict health outcomes and decide who receives care to reduce costs. Ensuring
    precision health technologies are developed by diverse people, multistakeholder
    involvement, and discretionary professional judgment will mitigate inequalities
    in patient-centered care and treatment. Diversity provides a spectrum of thinking,
    ethics, and mindsets and promotes inclusion, fairness, and representation.'
