    \n*The following case study presents the design and production of a precision\
    \ health tool to provide child and parent lifestyle and behavioral change health\
    \ and well-being support. Key aspects of the project involve tackling a societal\
    \ problem using a data-driven approach, involving all relevant stakeholders in\
    \ the co-development process, and training staff to deliver the ongoing service.*\n\
    \nBeing overweight and obese presents significant challenges to our local population’s\
    \ current and future health. Data from the National Child Measurement Programme\
    \ (NCMP), which involves the weighing and measuring of Reception (age 4–5) and\
    \ Year 6 (age 10–11) children, highlights that in Cornwall, in 2019/2020, 25.1\
    \ percent of Reception and 31.9 percent of Year 6 children were overweight or\
    \ living with obesity.^([^(137)](#fn137))\n\nBecause of the COVID-19 pandemic,\
    \ in 2020–2021, the NCMP ran a reduced program to collect a nationally representative\
    \ sample of data. This data showed significant increases in the rates of childhood\
    \ overweight and obesity nationally (4.7 and 5.7 percentage point increase for\
    \ Reception and Year 6, respectively); this is the highest annual rise since the\
    \ NCMP began. If these national increases track into Cornwall, we are approaching\
    \ one in three children overweight or obese at Reception age. Some groups of children\
    \ are disproportionately affected by excess weight. Children living in the most\
    \ deprived areas are more than twice as likely to be living with obesity than\
    \ those living in the least deprived areas.^([^(138)](#fn138))\n\nThese trends\
    \ have significant health implications for children in Cornwall. Children who\
    \ are overweight or obese are at a higher risk of physical health problems, including\
    \ liver disease, sleep apnea, diabetes, asthma, and orthopedic problems. In addition\
    \ to physical comorbidities, living with excess weight and obesity is associated\
    \ with poor psychological and emotional health, with many children experiencing\
    \ bullying, low self-esteem, body dissatisfaction, and depressive symptoms. Children\
    \ living with obesity are likely to continue to live with obesity as adults and\
    \ have a higher risk of morbidity, disability, and premature mortality in adulthood.\n\
    \nBefore the COVID-19 pandemic, Healthy Cornwall offered a tier 2 10-week Healthy\
    \ Families Programme consisting of weekly one-and-a-half-hour group-based sessions\
    \ delivered in school settings. However, a program review in 2019 found that the\
    \ service had limited reach, working with around 50 families per year, had poor\
    \ outcomes with only one-third of children achieving results of maintaining or\
    \ reducing their BMI z score, and was expensive and staff intensive to deliver.\n\
    \nThe causes of childhood obesity are complex and multifactorial.^([^(139)](#fn139))\
    \ Tackling childhood obesity requires a whole-systems approach to create an environment\
    \ that supports families to make healthier choices, accompanied by targeted individual-level\
    \ interventions for children who are overweight or obese. Work to address the\
    \ environmental drivers of excess weight is ongoing in Cornwall and will be a\
    \ crucial focus of the new healthy weight strategy.\n\n### Objective\n\nCornwall\
    \ Council sought to commission a provider to work closely with their Healthy Cornwall\
    \ and Public Health groups to lead the development and pilot delivery of a new\
    \ evidence-informed tier 2 lifestyle weight management program for children aged\
    \ 5–12 years old in Cornwall. The program will form the basis of a new tier 2\
    \ healthy weight offer to children and families and will comprise a key component\
    \ of the local healthy weight care pathway.\n\n### Methods\n\nThe project utilized\
    \ the Method for Program Adaptation through Community Engagement (m-PACE) when\
    \ tailoring interventions for new populations. This evidenced-based method provides\
    \ a systematic procedure for obtaining high-quality community feedback and adjudicating\
    \ recommendations on program developments. The m-PACE method is utilized to uncover\
    \ local needs through the following:\n\n*   Engaging with community members, in\
    \ particular focusing on areas where inequalities mean that children are more\
    \ at risk of being overweight and obese\n\n*   Collecting parents’ and children’s\
    \ feedback through individual interviews\n\n*   Conducting focus groups with families\
    \ after 6 weeks of using the program\n\nInterviews and focus groups are used to\
    \ understand barriers and facilitators to engagement with healthy weight services\
    \ and understand local children and families’ requirements of a tier 2 lifestyle\
    \ weight management program. Mixed research methods capture the opinions of more\
    \ and less vocal community members and reduce the influence of social desirability\
    \ bias that might otherwise sway data collection. Community members were recruited\
    \ through multiple channels, including primary care, local media, and offline\
    \ recruitment in community hubs.\n\n### Milestones\n\nThe multidisciplinary team\
    \ broke down the project into the following packages:\n\n*   *Month 1*: Stakeholder\
    \ engagement\n\n    A group of stakeholders will be invited to participate in\
    \ planning and ongoing monitoring meetings.\n\n*   *Months 2–4*: Community engagement\n\
    \n    Community engagement activities will be held, including recruitment of prospective\
    \ service users. Feedback will be collated into a formal report of findings and\
    \ recommendations for program development.\n\n*   *Months 5–6*: Program development\n\
    \n    The development team used feedback from community engagement to develop\
    \ the digital and real-world weight management program (syllabus, contents, materials)\
    \ to ensure suitability for the children and families in Cornwall, resulting in\
    \ a clinically reviewed program ready for a pilot.\n\n*   Months 7–11: Pilot\n\
    \n    Train all staff involved in the delivery of the program. Recruit participants\
    \ to trial the newly developed tier 2 lifestyle weight management program. A pilot\
    \ report will detail participant engagement, feedback from interviews and focus\
    \ groups, and changes in clinical, quality of life, and mental health outcomes.\n\
    \n*   Months 11–12: Program modifications and service mobilization\n\n    Utilizing\
    \ post-pilot insight, integrate the tailored tier 2 lifestyle weight management\
    \ program into the weight management pathways offered across Cornwall."
  trans: "\n### 潜在影响\n\n该项目影响深远，其潜在效益对以下各方意义重大：\n\n- **患者**：标准化长新冠支持服务的获取途径，可减少患者护理和康复结果的差异。\n\
    - **雇主**：长新冠是导致长期缺勤的首要原因。^(¹³⁵) 医护人员受长新冠的影响比例高于普通人群。缩短康复时间有助于人们更快重返工作岗位。雇主将受益于病假减少、员工心理健康改善以及生活质量提升。\n\
    - **保险公司**：在 2021 年，长新冠是团体收入保障保单中，导致早期干预和康复的第二大常见原因。^(¹³⁶) 改善康复效果将减少理赔。\n\n负面影响包括可能减少患者与医疗专业人员之间的面对面诊疗。这将通过研究加以缓解，包括评估对医疗专业人员的负担，并让相关利益攸关方参与应用程序的开发和交付，以确保其适用性。\n\
    \n## 开发数字工具，支持儿童与青少年日常行为改变，迈向更健康的生活\n\n*以下案例研究展示了一款精准健康工具的设计与制作过程，该工具旨在为儿童及家长提供生活方式与行为改变方面的健康福祉支持。项目的关键方面包括：运用数据驱动的方法应对社会问题，让所有相关利益攸关方参与共同开发过程，并培训员工以提供持续服务。*\n\
    \n超重和肥胖对我们当地人口的当前及未来健康构成了重大挑战。来自国家儿童测量计划（NCMP）的数据（该计划涉及对学前班（4-5 岁）和六年级（10-11 岁）儿童进行称重和测量）显示，在康沃尔郡，2019/2020\
    \ 年度，25.1%的学前班儿童和 31.9%的六年级儿童超重或肥胖。^(¹³⁷)\n\n由于新冠疫情，NCMP 在 2020-2021 年缩减了项目规模，仅收集具有全国代表性的样本数据。这些数据显示，全国范围内儿童超重和肥胖率显著上升（学前班和六年级分别上升了\
    \ 4.7 和 5.7 个百分点）；这是自 NCMP 开始以来的最高年度增幅。如果这些全国性的增长趋势在康沃尔郡显现，那么我们将面临近三分之一的学前班儿童超重或肥胖的局面。部分儿童群体受超重影响尤为严重。生活在最贫困地区的儿童肥胖的可能性是生活在最不贫困地区儿童的两倍以上。^(¹³⁸)\n\
    \n这些趋势对康沃尔郡儿童的健康产生了重大影响。超重或肥胖的儿童面临更高的身体健康问题风险，包括肝病、睡眠呼吸暂停、糖尿病、哮喘和骨科问题。除了身体上的并发症，超重和肥胖还与不良的心理和情绪健康有关，许多儿童遭受欺凌、自卑、身体形象不满和抑郁症状。肥胖儿童成年后很可能继续肥胖，并且在成年期患病、残疾和过早死亡的风险更高。\n\
    \n在新冠疫情之前，“健康康沃尔”提供了一项为期 10 周的第二层级“健康家庭计划”，包括每周在学校环境中进行一个半小时的小组课程。然而，2019 年的一项项目审查发现，该服务覆盖面有限，每年仅服务约\
    \ 50 个家庭；效果不佳，只有三分之一的儿童实现了维持或降低其`BMI z score`的结果；并且交付成本高昂且耗费大量人力。\n\n儿童肥胖的原因复杂且多因素。^(¹³⁹)\
    \ 应对儿童肥胖需要采取全系统的方法，创造一个支持家庭做出更健康选择的环境，同时针对超重或肥胖的儿童进行有针对性的个体干预。解决导致超重的环境因素的工作正在康沃尔郡持续进行，这将是新的健康体重战略的关键重点。\n\
    \n### 目标\n\n康沃尔郡议会寻求委托一家供应商，与他们的“健康康沃尔”和公共卫生团队紧密合作，领导开发并试点交付一项新的、基于证据的第二层级生活方式体重管理计划，面向康沃尔郡\
    \ 5-12 岁的儿童。该计划将构成向儿童和家庭提供的新第二层级健康体重服务的基础，并将成为当地健康体重护理路径的关键组成部分。\n\n### 方法\n\n\
    该项目在针对新人群调整干预措施时，采用了“社区参与项目适应方法”（m-PACE）。这种基于证据的方法提供了一个系统化的流程，用于获取高质量的社区反馈，并对项目开发的建议进行裁决。m-PACE\
    \ 方法通过以下方式用于发现本地需求：\n\n-   与社区成员互动，特别关注那些因不平等而导致儿童超重和肥胖风险更高的区域\n-   通过个人访谈收集家长和儿童的反馈\n\
    -   在使用该计划 6 周后，与家庭进行焦点小组讨论\n\n访谈和焦点小组用于了解参与健康体重服务的障碍和促进因素，并了解当地儿童和家庭对第二层级生活方式体重管理计划的需求。混合研究方法能够捕捉到社区中更活跃和更沉默成员的意见，并减少可能影响数据收集的社会期望偏差的影响。社区成员通过多种渠道招募，包括初级保健机构、地方媒体以及在社区中心的线下招募。\n\
    \n### 里程碑\n\n多学科团队将项目分解为以下几个工作包：\n\n- **第 1 个月**：利益攸关方参与  \n  将邀请一组利益攸关方参与规划和持续监测会议。\n\
    - **第 2-4 个月**：社区参与  \n  将举行社区参与活动，包括招募潜在的服务使用者。反馈意见将被整理成一份正式的报告，包含调查结果和对项目开发的建议。\n\
    - **第 5-6 个月**：项目开发  \n  开发团队利用社区参与的反馈，开发数字和现实世界的体重管理计划（大纲、内容、材料），以确保其适合康沃尔郡的儿童和家庭，最终形成一份经过临床审查、可供试点的计划。\n\
    - **第 7-11 个月**：试点  \n  培训所有参与交付该计划的员工。招募参与者试用新开发的第二层级生活方式体重管理计划。试点报告将详细说明参与者参与情况、访谈和焦点小组的反馈，以及临床、生活质量和心理健康结果的变化。\n\
    - **第 11-12 个月**：项目修改与服务启动  \n  利用试点后的洞察，将定制化的第二层级生活方式体重管理计划整合到康沃尔郡各地提供的体重管理路径中。\n"
- fmt: '### Evaluation


    Feedback from participating children and their families is requested in the form
    of structured interviews, surveys using regulatory-compliant software, and focus
    groups. Once analyzed, data will be compiled into a formal report sharing high-quality
    feedback and recommendations to decide on program adaptations. Engagement data
    collected through attendance, in-platform telemetry, and qualitative feedback,
    including structured interviews and focus groups, will be used with quantitative
    feedback and clinical outcomes from all participants to inform continuous improvement.


    ### Impact of the Project


    Data shows a higher than expected engagement with socioeconomically deprived communities
    with a significant proportion sharing health voice symptom data (88 percent).
    Health outcomes are still being analyzed for publication in a peer-reviewed journal.


    ## Summary


    Precision health is a predictive, preventative, personalized, and participative
    approach to improving individual and population health. A precision approach is
    already saving lives, giving medical professionals more options, and keeping families
    healthier for longer. Patients can benefit directly from a precision health approach
    by having access to their data, tailored behavioral and lifestyle change support,
    improved adherence to treatments, and real-time monitoring for changes in health.
    Yet, it will take time to transition from a typical one-size-fits-all strategy
    to a value-based, personalized, data-driven methodology that focuses on prevention
    rather than a reaction to advancing disease.


    The social and behavioral sciences must collaborate with others to advance precision
    health research. The net result is anticipated to be a reduction in the overall
    cost of healthcare. However, research has yet to demonstrate that claim except
    for a few unique items. Innovators must continue to create evidence to support
    the claim that precision health can enhance results while minimizing costs. As
    the case examples in this chapter highlight, the promise of precision medicine
    in better preventing, predicting, and treating disease is becoming a reality.'
