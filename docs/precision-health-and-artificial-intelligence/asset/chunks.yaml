  trans: '

    ### 机器学习框架


    无论采用何种方法，一旦问题被界定，典型的人工智能或机器学习工作流程通常包含以下步骤：


    -   *数据准备*：涉及数据探索、分析、洞察与清洗

    -   *训练*：选择学习方法，应用这些方法创建模型，并尝试优化所创建的模型

    -   *测试*：对方法和结果进行客观评估

    -   *传播*：向利益相关者报告评估结果，并确保可解释性

    -   *部署*：发布训练好的机器学习模型，并监控其持续使用情况与准确性


    训练阶段涉及通过调整改变算法行为的关键参数（即调参）来最大化算法性能。参数是模型使用的变量，模型可以从数据集中估算其值。参数的数量和类型是任何算法的关键方面。虽然数据越多越好，但如果数据质量低劣，最终也毫无用处——此外，训练模型所需的时间和资源会随着参数维度的增加而增加。如果使用少量参数进行训练，模型可能会遗漏微妙的趋势和模式；而大量数据则可能导致算法难以识别有价值的模式。


    测试阶段随后通过参数的性能来评估调参效果，以确保模型具有泛化能力，这是所有算法的目标。从数学角度理解，这可以看作是试图在训练数据和测试数据上最小化成本函数，从而使模型能够自信地执行，并部署到现实世界中。


    表 4-1 列出了一些学习方法与算法的示例。


    **表 4-1** 学习方法与算法示例


    | 监督学习 | 无监督学习 | 自然语言处理 |

    | --- | --- | --- |

    | • 支持向量机<br>• 朴素贝叶斯<br>• 高斯贝叶斯<br>• K-近邻算法<br>• 逻辑回归 | • Apriori 算法<br>• FP-growth（频繁模式增长）<br>•
    隐马尔可夫模型<br>• 主成分分析<br>• 奇异值分解<br>• K-means<br>• 神经网络<br>• 深度学习 | • C4.5<br>• K-means<br>•
    支持向量机<br>• Apriori<br>• EM（期望最大化）<br>• PageRank<br>• AdaBoost<br>• kNN<br>• 朴素贝叶斯<br>•
    分类与回归树 |


    高泛化能力会导致过拟合或欠拟合。如果模型在训练数据集上的表现优于在未见过的测试集上的表现，那么该模型很可能过拟合了。交叉验证是一种用于衡量过拟合程度的技术。此外，使用更多数据进行训练可能有助于算法更好地推断假设。


    欠拟合很容易检测，因为其性能会很差。偏差衡量的是模型因从错误数据中学习而产生的误差。偏差衡量的是这些模型的预测值与实际正确值或真实信号之间的总体偏离程度。增加模型复杂度以确定微妙的信号可以减少偏差，但会引入方差，方差决定了模型预测值围绕某个数据点的变异性。确保模型的泛化能力是在偏差和方差之间进行权衡（图
    4-2）。在任何可能的情况下，保持简单比过度设计、构建复杂且昂贵的、难以解释和传播的机器学习模型要好。


    ![](img/535410_1_En_4_Fig2_HTML.png)


    误差与算法复杂度的关系图。代表方差和虚线的偏差相互呈反比关系。方差呈上升趋势，而偏差呈下降趋势。


    **图 4-2** 寻找最优算法平衡点


    ### 软件与工具包


    借助易于实现的库和框架，利用机器学习的力量比以往任何时候都更加容易。在成熟的医疗保健提供商、初创公司、企业和学术界的推动下，医疗保健提供者正逐步采用复杂的工具包，以利用患者产生的大量实时数据流。开源工具包通过为常见算法提供现成可用的代码来支持机器学习。大多数工具包都适用于
    Python，这是开发机器学习算法最受欢迎的编程语言。


    `Scikit-learn` 是一个 Python 模块，包含基于 `SciPy` 构建的图像处理和机器学习技术，并支持聚类、分类和回归等算法，例如朴素贝叶斯、决策树、随机森林、k-means
    和支持向量机。`NLTK`，即自然语言工具包，是用于自然语言处理的库集合。`NLTK` 为专家系统提供了基础，例如分词、词干提取、词性标注、句法解析和分类。`Genism`
    是一个用于处理非结构化文本的库，`Scrapy` 提供开源数据挖掘功能，而 `TensorFlow` 是一个由 Alphabet 支持的热门开源数据计算库，针对深度学习进行了优化。它支持多层神经网络和快速训练。`Keras`
    和 `PyTorch` 是用于使用 `TensorFlow` 构建深度学习算法的库。


    `WEKA` 是一个用 Java 编写的软件套件，支持通过图形用户界面或直接访问进行交互，类似于 `sci-kit-learn`，它提供算法、可视化工具，并支持一系列机器学习和数据挖掘任务。


    ## 可解释人工智能


    欧盟的《通用数据保护条例》、美国的《健康保险流通与责任法案》以及澳大利亚的《隐私法》等举措，已将关于医疗保健领域可解释人工智能的讨论推向了主流。尽管人工智能系统已被证明在各种任务中优于人类，但缺乏可解释性仍不断引发批评。可解释性涉及理解特定人工智能驱动的决策是如何做出的。人工智能算法是复杂的数学模型，对于这些模型而言，复杂优化过程的可解释性变得不容小觑。提高人工智能的信任度和透明度不仅有益于最终用户，也有助于支持不断发展的系统的整体准确性和泛化能力。


    ## 人工智能辅助精准健康在实践中的应用


    人工智能驱动的精准医疗技术有望全面提高护理质量和结果。随着健康研究和实验中产生大量多样化的数据，区分精准医学和公共卫生将变得越来越具有挑战性。虽然我们可能还需要数年时间才能实现精准医疗的全部潜力，但早期的努力正在应对重大挑战，并展示了人工智能技术和计算能力进步在各个主题中可以发挥的关键作用。

    '
- fmt: '### Clinical Decision Support


    Clinical decision support tools have been used for years. Still, many of them
    have needed to be more stand-alone solutions and adequately integrated into the
    clinical point-of-care devices used by providers. AI-led clinical decision support
    systems can improve the diagnosis, treatment, and prognosis of a particular medical
    condition, by predicting the probability of a medical outcome or the risk for
    a specific disease based on biomedical imaging data. Numerous studies have shown
    that AI and other analytics tools can accurately predict kidney disease, identify
    breast cancer, and forecast leukemia remission rates.^([^(49)](#fn49)) AI systems
    have outperformed state-of-the-art methods and received FDA approval for various
    clinical diagnostics, particularly imaging-based diagnostics.^([^(50)](#fn50))
    The availability of large datasets for training, such as extensive collections
    of annotated medical images or large functional genomics datasets, is driving
    this surge in productivity, along with advances in AI algorithms and the GPU systems
    used to train them.


    With the correct data, integration methods, and team, machine learning has the
    potential to improve the usefulness of clinical decision-support tools and help
    providers deliver optimal care. The biggest challenge in developing algorithms
    is gaining access to large amounts of data required to train models to suggest
    next steps for treatment, flag potential risks, and enhance service efficiency
    and capacity.


    ### Behavioral Change Interventions and Lifestyle Medicine


    Digital therapeutics refers to evidence-based therapeutic interventions for patients
    to prevent, manage, or treat a medical condition or disease. Digital therapeutics
    are typically considered mobile apps, but a growing number are available across
    platforms.^([^(51)](#fn51)) Digital therapeutics are distinguished from more general
    health and fitness apps by their clinical classification, intended audience specificity,
    demonstrated research, and impact. Patient-facing digital health applications
    (apps) provide the opportunity to change how individuals take responsibility for
    their health by enabling more effective delivery of health information, allowing
    better monitoring of health markers, and encouraging lifestyle behavior change.
    Several systematic reviews suggest that app-based interventions can improve diet,
    physical activity, and sedentary behavior.^([^(52)](#fn52)) Controlled trials
    still need to be conducted to confirm whether multicomponent interventions are
    more effective than stand-alone apps.


    With most disease risk coming from modifiable risk factors, precision behavioral
    change and lifestyle interventions delivered through digital therapeutics hold
    enormous potential to contribute to public health prevention efforts to successfully
    and efficiently promote population health, control healthcare costs, and eliminate
    health inequalities. For most people, the key to improved health isn’t a diet
    or exercise program based on specious conclusions from sequencing your genome,
    analyzing your microbiome, or surveilling your smartphone. Instead, it’s figuring
    out how to remain motivated when adopting and maintaining positive health behaviors.


    Precision behavioral change and lifestyle interventions in the form of therapeutic
    intervention, behavioral change coaching, and biomedical data feedback and sensors
    enable wellness to be truly patient-centered, solution-focused, and precise. Importantly,
    precision behavior change interventions have been shown to work.^([^(53)](#fn53),)
    ^([^(54)](#fn54)) Numerous studies show precision health platforms engage people
    across cultures, provide equivalent care to face-to-face care, and improve quality
    of life and weight loss.^([^(55)](#fn55))


    Behavioral change platforms can support learning and adopting healthy habits in
    the real world and the virtual world at all times, using traditional in-platform
    and immersive virtual and augmented experiences to reinforce learning and maintain
    behavioral changes.^([^(56)](#fn56)) People are consistently guided to lead healthy
    lives in a tailored manner that maximizes the chances of reaching health goals
    or target measurements. Most precision health behavior change interventions depend
    on human-led, low-tech personalization and rely on data rules alone; most platforms
    still need to fully consider the interaction between people’s behaviors and social
    and environmental contexts. As behavioral change interventions improve, they will
    increasingly go beyond personalization according to current behaviors and demographics
    and consider individuals’ genetic profiles and social and environmental context
    in real time.


    The highly variable response to obesity therapies justifies treatment strategies
    best suited to individual patients. A precision obesity solution would combine
    genetic testing, environment interactions, epigenetics, metabolomics, microbiome,
    pharmacogenomics, nutrigenetics, nutrigenomics, and deep digital phenotyping with
    a wrap-around behavioral change intervention to support adherence, health optimization,
    and remote monitoring.


    From my own experiences, the most significant inertia in adopting behavior change
    interventions are stakeholders within the decision-making pathway who are critical
    of motivating people to engage with interventions and maintain them. Many healthcare
    providers have tried and often failed incentive programs for cigarette smoking,
    weight loss, and physical activity. Traditional healthcare systems are cynical
    and unaware of how to modify health behaviors. Digital engagement, however, is
    distinct from engagement in health promotional activities. It is relatively straightforward
    to engage people digitally through an understanding of their basic measurements
    such as age, gender, and ethnicity. Through machine learning on large datasets,
    we can understand the behaviors and patterns exhibited by people exhibiting similar
    deep digital phenotypes to maximize the likelihood of engagement and long-term
    adherence from even the most unmotivated groups of people.'
  raw: '### Clinical Decision Support


    Clinical decision support tools have been used for years. Still, many of them
    have needed to be more stand-alone solutions and adequately integrated into the
    clinical point-of-care devices used by providers. AI-led clinical decision support
    systems can improve the diagnosis, treatment, and prognosis of a particular medical
    condition, by predicting the probability of a medical outcome or the risk for
    a specific disease based on biomedical imaging data. Numerous studies have shown
    that AI and other analytics tools can accurately predict kidney disease, identify
    breast cancer, and forecast leukemia remission rates.^([^(49)](#fn49)) AI systems
    have outperformed state-of-the-art methods and received FDA approval for various
    clinical diagnostics, particularly imaging-based diagnostics.^([^(50)](#fn50))
    The availability of large datasets for training, such as extensive collections
    of annotated medical images or large functional genomics datasets, is driving
    this surge in productivity, along with advances in AI algorithms and the GPU systems
    used to train them.


    With the correct data, integration methods, and team, machine learning has the
    potential to improve the usefulness of clinical decision-support tools and help
    providers deliver optimal care. The biggest challenge in developing algorithms
    is gaining access to large amounts of data required to train models to suggest
    next steps for treatment, flag potential risks, and enhance service efficiency
    and capacity.


    ### Behavioral Change Interventions and Lifestyle Medicine


    Digital therapeutics refers to evidence-based therapeutic interventions for patients
    to prevent, manage, or treat a medical condition or disease. Digital therapeutics
    are typically considered mobile apps, but a growing number are available across
    platforms.^([^(51)](#fn51)) Digital therapeutics are distinguished from more general
    health and fitness apps by their clinical classification, intended audience specificity,
    demonstrated research, and impact. Patient-facing digital health applications
