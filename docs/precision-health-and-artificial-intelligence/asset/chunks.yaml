- fmt: '# Digital Health Education


    For some people, the digital transformation that the COVID pandemic brought was
    a blessing; for others, it was very much a curse. More people and environments
    have become digitally connected, with local authorities, charities, and governments
    even providing mobile devices and mobile data for those who need it. Health app
    use rose sharply, too, as patients sought to self-manage their health. Patient
    management grew from health apps to providing remote consultations and digital
    health solutions. While attitudes were primarily influenced by digital literacy,
    accessibility, and training, which appear to be linked with age, whichever way
    the public understood it, there is no doubt this highlighted the need for up-to-date
    digital health education.


    Despite the lack of a formal definition of digital health, acceptable suggestions,
    such as those provided by the Food and Drug Administration, include classifications
    such as health information technology, wearable devices, telehealth and telemedicine,
    personalized medicine, and general wellness. Table [6-1](#535410_1_En_6_Chapter.xhtml#Tab1)
    lists the areas of digital health education.


    **Table 6-1** Areas of Digital Health Education


    | Theme | Description |

    | --- | --- |

    | Digital therapeutics | Software (mobile, web, other) that provides evidence-based
    intervention meeting the definition of a medical device, including precision behavioral
    health intervention. |

    | Telehealth | Telecommunications and digital communication technologies are used
    to deliver and facilitate health and health-related services such as medical treatment,
    provider and patient education, health information services, and self-care. |

    | Wearable devices and sensors | Wearable electronics are devices that can be
    worn or bonded with human skin to continually and carefully monitor a person’s
    actions without interfering with or limiting the user’s movement. |

    | Digital biomarkers | Measurement of physiological data in real time using hardware
    and software for prognostic or diagnostic purposes. |


    In this context, digital health education is specifically designed to transfer
    an understanding of the practical use of digital technologies, including health
    apps, artificial intelligence, and wearables within healthcare systems, to healthcare
    professionals. Digital health education is vital for many reasons, but none more
    so than to bridge the gap between what is expected by patients and the teaching
    of healthcare staff or students to enable implementation and realize the benefits
    of digital healthcare.


    ## Literacy


    A generational shift is underway. The millennial generation is now past, and Generation
    Z is leaving high school and entering higher education. Generation Z is typically
    digitally native, accepting of the use of technology in their lives while not
    necessarily being well-versed in how to use it. Generations X and Y generally
    are less digitally savvy and form a significant part of the health workforce.
    Research has shown that older people usually have more substantial training needs
    regarding digital literacy.^([^(71)](#fn71))


    Digital health education is necessary to ensure digital literacy among new and
    incumbent healthcare workers so that they can fully utilize the tools at their
    disposal. For example, a clinician would not need to know all of the diabetes
    digital therapeutics available for mobile phones but would be able to assess an
    individual patient’s needs, such as clinical history and digital literacy, to
    make an actionable recommendation to patients.


    Clinicians must learn how to work with data-enabled technology applications and
    develop knowledge and skills to use precision health tools in healthcare delivery.
    It becomes impossible for a physician to bear all the data management and analysis
    responsibilities, not to mention patient communications. The application of AI
    in healthcare aims to advise clinicians with better and faster insights to improve
    patients’ lives ultimately. It will be necessary for healthcare professionals
    to be able to use and interpret information from these technologies and be equipped
    to deal with any potential challenges that may arise.


    Healthcare providers are slowly realizing that adopting multiple digital platforms
    is inefficient and costly. Many healthcare networks have invested in digital platforms
    that provide various services or interventions (for instance, virtual wards or
    weight management, cardiac rehabilitation, and diabetes services). Using a single
    or a minimal number of platforms that provides remote patient monitoring and data
    analytics across health areas minimizes the resources required to deploy successful
    technologies. Precision medicine relies on an increasing amount of heterogeneous
    data of molecular genetics, clinical, and biological parameters for each patient,
    with the total number of parameters for medical decision-making on a single patient
    estimated to be up to 10,000. Using as few systems as possible enables providers
    to realize associated benefits such as scalable efficiencies in staff training,
    upskilling, implementation, and deployment costs.


    Improving digital literacy among healthcare workers also enhances their interest
    in digital technologies. While this may not appear to be an essential aspect of
    digital health education, clinician apathy and enthusiasm can directly affect
    patient engagement with digital health technologies. Research has shown that clinical
    apathy toward digital health technologies can affect a patient’s engagement.^([^(72)](#fn72))


    ## Changing Roles


    The paternalistic clinician-patient relationship has been transformed into an
    equal partnership with shared medical decision-making. Digitization of healthcare
    has provided access to big-data information and cognitive insights to caregivers
    and patients, transforming healthcare and clinical workflows. The point of care
    has shifted from the clinic and physician to the patient.


    Experience-based medicine has evolved into evidence-based and patient-centered
    approaches. Clinicians require education on the changing role of healthcare professionals
    and how digital health technologies can support more tailored patient-centered
    care and clinical decision-making and relieve repetitive tasks enabling more focus
    on other aspects of patient care. As we move to the age of precision health, digital
    health education will provide knowledge of information platforms and intelligence
    tools in healthcare and the skills to use them effectively. A testament to this
    is the changing role of pharmacists who now provide management tools, facilitate
    access to care, and provide interventions to extensive populations, including
    patients with hypertension, hyperlipidemia, diabetes, and cancer.


    ## Quality


    Evidence to demonstrate the impact and outcomes of precision health technologies
    is paramount. There are hundreds of thousands of digital health technologies,
    and new technologies will continue to emerge and fade in both research and practice.
    Similarly, most health apps need to reach regulatory standards.^([^(73)](#fn73))
    Digital health education will focus on frameworks for technology selection and
    teach learners to identify and evaluate novel, innovative, impactful technologies.


    ## Ability


    New aspects of clinical care require formal pedagogy. Patient interactions and
    e-professionalism must be taught and evaluated alongside other skills as they
    are fundamental to digital health. Digital health skills include appropriate body
    language and effective patient communication through virtual interactions. Similarly,
    to fulfill the adage of doing no harm, clinicians must be sufficiently trained
    in digital health use, data management, and awareness of technical and clinical
    risks. Hazards include data and automation biases, where data and algorithms may
    mirror human biases in decision-making and lack of decision validation.'
