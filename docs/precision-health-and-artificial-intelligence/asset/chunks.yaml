    ### Methods


    We used a single-arm pre-post-intervention study design. Participants were not
    paid for participation and were given access to the program for free. Participants
    provided informed consent regarding their anonymized data being used for analysis
    and publication.


    Participants were recruited from an NHS primary care setting—Norwood Surgery in
    Southport, United Kingdom—between April 19, 2018, and August 19, 2019\. Patients
    aged 18 years or older with a confirmed diagnosis of type 2 diabetes or prediabetes
    who presented for any reason during the recruitment window were eligible for signposting
    if the consulting healthcare professional felt appropriate.


    Patients who accepted signposting were given a Low Carb Program referral card,
    which patients redeemed on the app or website. To have broad applicability to
    a nonclinical trial setting, the only de facto exclusion criterion was the inability
    to understand English. One hundred referral cards were provided to the NHS general
    practice in Southport. A total of 45 participants signed up, and all were followed
    for 12 months. The characteristics of the 55 participants who declined the referral
    card were not recorded.


    For a baseline, participants recruited to the Low Carb Program input their type
    of diabetes, year of diagnosis, most recent HbA1c test result and date, age, gender,
    socioeconomic status based on household income, and presence of comorbid chronic
    illnesses at sign-up. At 12 months, participants were again asked to report on
    their current HbA1c level and weight.'
  trans: '

    ### 研究发现的影响


    调查结果揭示了公众对数据共享的鲜明态度。因此，为了建立并维护信任、可信度和用户参与度，开发团队最终对数字工具进行了多项改进，具体包括：


    -   采用“按需收集数据”的方法，以免打消用户使用该工具的积极性

    -   向用户提供“简单明了”的条款与条件，确保所有数据共享方面都得到理解

    -   提供一种机制，让用户可以在数字应用内删除其所有数据，这与删除用户个人资料是分开的

    -   在足部检查流程的关键节点提供强化提示信息，反复告知用户数据对谁可见、可见时长以及哪些数据被设为可见

    -   提供关于所有信息的安全性和隐私性的深度说明


    随后，该数字平台完成注册流程的参与者数量增加了 213%。


    ## 针对 2 型糖尿病和糖尿病前期自我管理的数字干预措施评估


    *以下案例研究展示了初级保健提供的精准健康工具所产生的影响。*


    2 型糖尿病是一种代价高昂的慢性非传染性疾病，预计到 2030 年将影响全球 5.52 亿人。^(¹⁰⁷) 全球范围内，2 型糖尿病的负担估计超过 1.3
    万亿美元。^(¹⁰⁸) 在发达国家，患有糖尿病的个体由初级保健团队管理，每年平均医疗咨询时间不足 3 小时。个体在大部分时间里基本上只能靠自己。^(¹⁰⁹)
    由于就诊间隔时间过长，糖尿病护理主要依赖于个人的自我管理，如果管理不当，会增加过早死亡、失明、截肢和肾衰竭的风险。^(¹¹⁰) 实际上，2 型糖尿病的自我管理既不简单也不直接，需要时间、计算能力和读写能力。^(¹¹¹)


    与许多非传染性疾病一样，生活方式是导致糖尿病前期和 2 型糖尿病的主要原因之一，而改善饮食结构、增加体力活动、减少久坐等参数，是降低此类病理发生频率的决定性因素。


    减肥可以带来显著的健康益处，减轻多余体重可以降低患 2 型糖尿病、心脏病、骨关节炎和睡眠呼吸暂停的风险。^(¹¹²) 此外，维持合理的血糖控制对患者有益，糖化血红蛋白（HbA1c）每降低
    1%（6.2 mmol/mol），截肢风险降低 43%，心肌梗死风险降低 14%，微血管并发症风险降低 37%。^(¹¹³)


    最近一项针对已发表和未发表的随机试验数据的系统综述和荟萃分析，评估了在患有 2 型糖尿病的成年人中，低碳水化合物饮食（<130 克/天或低于每日 2000
    千卡饮食的 26%）和极低碳水化合物饮食（碳水化合物供能低于 10%）持续至少 12 周的效果。研究发现，基于中低确定性证据，坚持低碳水化合物饮食六个月的患者的
    2 型糖尿病可能得到缓解，且无不良后果。^(¹¹⁴)


    将数字技术整合到初级保健中可以增加获得护理的机会，改善患者预后，并降低成本。包括智能手机应用在内的数字技术，有可能通过影响生活方式的自我管理支持，来增强和扩展健康服务的覆盖范围。^(¹¹⁵)
    智能手机应用已被证明可以改善 1 型和 2 型糖尿病患者的血糖控制结果。^(¹¹⁶) 尽管存在相反的证据，但在 Schoeppe 等人发表的关于应用改善生活方式功效的系统综述所分析的
    23 项研究中，只有五项研究显示智能手机对饮食习惯产生了有利影响。在九项研究中，它们增加了体力活动。^(¹¹⁷) 尽管最近的系统综述得出结论，互联网和移动干预可以改善生活方式行为，但大多数研究的随访时间最多为
    3 到 6 个月，这强调了进行长期干预研究的必要性。^(¹¹⁸)


    临床证明，提供低碳水化合物或极低碳水化合物计划的干预措施有助于改善体重、血糖和减少用药。^(¹¹⁹,) ^(¹²⁰) 此外，这些饮食还与改善急性和慢性疼痛、抑郁、焦虑和压力有关。^(¹²¹,)
    ^(¹²²,) ^(¹²³)


    关于采用低碳水化合物饮食方法治疗 2 型糖尿病和肥胖症的长期研究有限，尤其是那些通过远程提供和支持的研究。^(¹²⁴)


    ### 目标


    鉴于治疗性碳水化合物限制在改善慢性病症状方面显示出显著益处，本研究旨在评估一项通过数字方式提供的治疗性干预措施在 12 个月内对维持血糖控制的有效性，研究对象为英国绍斯波特
    Norwood Surgery 诊所由英国国家医疗服务体系（NHS）招募的患者。


    ### 方法


    我们采用了单臂干预前后研究设计。参与者无需为参与付费，并可免费使用该计划。参与者就其匿名数据用于分析和发表提供了知情同意。


    参与者于 2018 年 4 月 19 日至 2019 年 8 月 19 日期间，从英国绍斯波特 Norwood Surgery 诊所的 NHS 初级保健环境中招募。年龄在
    18 岁或以上、确诊为 2 型糖尿病或糖尿病前期、且在招募期间因任何原因就诊的患者，如果接诊的医疗专业人员认为合适，则有资格获得转介。


    接受转介的患者会获得一张低碳水化合物计划推荐卡，患者可在应用或网站上兑换该卡。为了广泛适用于非临床试验环境，唯一的事实上的排除标准是无法理解英语。向绍斯波特的
    NHS 全科诊所提供了 100 张推荐卡。共有 45 名参与者注册，所有人都接受了 12 个月的随访。拒绝推荐卡的 55 名参与者的特征未被记录。


    作为基线，招募到低碳水化合物计划的参与者在注册时输入了他们的糖尿病类型、诊断年份、最近的 HbA1c 检测结果和日期、年龄、性别、基于家庭收入的社会经济状况以及共存的慢性疾病。在
    12 个月时，参与者再次被要求报告他们当前的 HbA1c 水平和体重。

    '
- fmt: '### Results


    Of the 45 baseline participants who activated their referral, 37 (82 percent)
    reported outcomes at 12 months. For the remaining eight people (18 percent) lost
    to follow-up, the last recorded data point was carried forward to maintain a conservative
    real-world evaluation.


    Participants with type 2 diabetes who were recruited to the Low Carb Program showed
    a statistically significant change in `HbA1c` from baseline (mean 73.35 `mmol/mol`,
    SD 15.84) to 12-month follow-up (mean 67.2 `mmol/mol`, SD 13.59), equivalent to
    a mean reduction of 6.2 `mmol/mol` (SD 5.75; `t17=4.56`; `P<.001`). Participants
    who completed more than nine lessons of the program showed a statistically significant
    decrease in `HbA1c` from baseline (mean 75.7 `mmol/mol`, SD 14.9) to 12-month
    follow-up (mean 68.7 `mmol/mol`, SD 12.8), a mean reduction in `HbA1c` of 7.01
    `mmol/mol` (SD 6.06; `t13=4.33`; `P<.001`). This is equivalent to an 8.81 percent
    mean reduction in `HbA1c`. Participants with prediabetes who were recruited to
    the Low Carb Program showed a statistically significant mean reduction in `HbA1c`
    of 2.35 `mmol/mol` (SD 1.96; `t26=6.25`; `P<.001`). Those participants who completed
    more than nine of the lessons did even better, reporting a mean `HbA1c` reduction
    of 3.04 `mmol/mol` (SD 1.82) at 12 months (`t17=7.11`; `P<.001`).


    Participants with type 2 diabetes had an average starting weight of 93.53 `kg`
    (SD 17.91) that dropped to an average of 90.83 `kg` (SD 16.84) at the 12-month
    follow-up, which is a statistically significant mean reduction of 2.70 `kg` (SD
    2.21; `t17=5.17`; `P<.001`). Completers reduced their weight by an average of
    3.54 `kg` (SD 1.7; `t17=5.17`; `P<.001`), equivalent to a mean body weight change
    of –3.66 percent (SD 2.8). Participants with prediabetes started the program with
    a mean weight of 86.72 `kg` (SD 9.68) and reported an average weight loss of 2.82
    `kg` (SD 2.90; `t26=5.05`; `P<.001`), equivalent to a mean body weight decrease
    of 3.16 percent (SD 3.11). Participants with prediabetes who completed more than
    nine lessons of the program demonstrated a greater statistically significant change
    in mean body weight of 4.08 `kg` (SD 2.77; `t17=6.25`; `P<.001`), equivalent to
    a mean reduction in overall body weight of 4.57 percent (SD 2.88).


    ### Discussion


    This was not a randomized controlled trial, so we cannot compare the 12-month
    results to a control or standard-of-care group. Therefore, the results of our
    trial should be interpreted cautiously because this small study used convenience
    sampling, an open-label single-arm design, and pre-post self-reported outcomes.
    However, this study demonstrated that signposting patients with type 2 diabetes
    or prediabetes to the Low Carb Program as part of routine general practice care
    can promote weight loss and improve glycemic control. With minimal implementation
    and support, this light-touch intervention was able to augment primary care workflows.
    It demonstrated high uptake, adherence (i.e., completion), and retention (i.e.,
    engagement within the last 30 days) of 45 percent, 64 percent, and 82 percent,
    respectively. There was a low dropout rate (8/45, 18 percent) at 12 months, demonstrating
    high platform engagement. It is one of the few apps to show long-term engagement.
    The platform has been shown to have a high engagement rate and to be noninferior
    to other in-person or online interventions.^([^(125)](#fn125),) ^([^(126)](#fn126),)
    ^([^(127)](#fn127)) Given the brief intervention provided, we achieved high uptake
    within the context of general practice and primary care. Typically, other interventions
    require staff resources and time.


    ### Conclusion


    Although our study design does not support causal conclusions, this real-world
    evaluation suggests that the intervention can be a valuable adjunct for precision
    self-management for adults with type 2 diabetes and prediabetes.


    ### Impact of the Findings


    An independent health economics report conducted by the York Health Economics
    Consortium employed real-world data on the impact of the Low Carb Program to demonstrate
    the significant savings in implementing the Low Carb Program within a public healthcare
    system. For a local area with 3,000 licenses, researchers modeled that the cost
    savings at the end of one year of Low Carb Program implementation would save an
    average of £117.57 per participant in reduced medication. Results have supported
    the national scaling of the digital multiplatform tool.^([^(128)](#fn128))


    ## Voice-Based Symptom Monitoring and AI-Based Rehabilitation for Patients with
    Long COVID


    *The following case study presents an award-winning technical business case for
    a precision health tool that utilizes AI-based symptom monitoring for monitoring
    of Long COVID.*'
