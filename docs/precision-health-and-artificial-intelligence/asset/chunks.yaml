    # 3. 数据与数字表型


    为了在医疗保健连续体的各个阶段改善个体的健康状态，治疗方案必须围绕可用数据，为患者提供尽可能精准的护理。生成、关联和利用的数据集越多，精准护理的准确性就越高。数据收集的范围超越了遗传学，延伸至各种互不关联、碎片化的来源，这些来源通常不被认为与健康和疾病相关。


    数据是实现精准健康愿景的基本要求，可以理解，患者和医疗保健专业人员都对此前景感到兴奋。2022 年对一组超过 4000 名患有长期疾病的患者进行的一项研究发现，三分之一的患者乐意与他们的医疗保健专业人员共享数据。^(³⁶)
    在目前的形式下，精准健康是由大数据和人工智能的巨大潜力驱动的。收集大量带有临床确诊健康状况和诊断结果的数据，能够支持复杂的算法，提高正确诊断的几率，并可能降低成本，这些正是精准健康的关键产出。


    ## 数据的形式与类型


    要完全理解数据的本质，我们必须首先掌握其特性。数据可以通过形式和类型来表征。


    ### 形式


    数据可以采取多种形式，例如字符、文本、词语、数字、图像、声音和视频，并且分为两类：结构化数据和非结构化数据。结构化数据通常指存储在数据库或电子表格中，遵循某种模型或模式结构的数据。


    来自嵌入式传感器、智能手机、智能手表和物联网设备的读数都是结构化数据的形式——无论是提供血糖读数、步数、消耗的卡路里、心率还是血压。非结构化数据则指其他所有数据。病历记录、通讯和社交媒体上的笔记是非结构化数据的一些例子，它们蕴含着巨大的前景。缺乏预定义的模型或模式结构使得数据编译和解释成为一项耗费时间和精力的资源密集型任务。


    尽管如此，将非结构化数据整合到个性化医疗体验中，提供了无限的可能性。每 24 小时内，Twitter 上有超过 6.5664 亿条推文被分享，Facebook
    上有 7.344 亿条评论被发布，WhatsApp 上发送了 1000 亿条消息。^(³⁷) 虽然我们知道社交网络可以通过影响我们的健康行为来促进积极的健康结果，但我们的互动和通讯是一个尚未被完全挖掘的数据挖掘领域。


    ### 类型


    数据有几种类型。大数据是人工智能和医疗保健领域的同义词，指的是用于发现和分析的大量传统和数字数据源的集合。大数据有三个核心关键特征：**体量**、**多样性**和**速度**。换句话说，就是数据量很大。通过大数据分析，人们可以发现隐藏的模式、未知的相关性、趋势、偏好以及其他有助于做出更好、更明智决策的信息。图
    3-1 展示了大数据的三个 V。


    ![](img/535410_1_En_3_Fig1_HTML.jpg)


    一个展示大数据三个特征的同心圆图。它们是通过 XYZ 平面格式区分的**数据多样性**、**数据体量**和**数据速度**。数据体量的数据量从原点开始依次为
    MB、GB、TB 和 PB。数据多样性包括从原点开始的批处理、周期性、近实时和实时。


    **图 3-1**


    数据的三个 V


    机器学习和人工智能提供了许多技术，数据科学家可以将其应用于数据集以实现这一目的。相反，**小数据**指的是 N 等于 1 的数据单元，这些数据是可访问、信息丰富且可操作的。小数据可以包括患者被送入急诊的次数，或者他们是否参加了预定的预约。虽然数据规模可能很小，但并不意味着缺乏价值。过去几年，人们开始转向纳入小数据分析，以改善临床和行政流程，并识别成本节约。精准健康旨在大规模地提供
    N 等于 1 的护理。


    ## 数据来源


    实现个性化护理所需的数据驱动理解来自各种数据集，包括临床资料库、电子健康记录、基因组库、交易数据以及来自结构化和非结构化来源的数据。虽然数据类型会分为异构数据或非结构化数据，但两者都有许多来源。无论来源如何，数据通常属于五种类型之一。


    -   *生物识别数据*：指纹、遗传学、组学、来自应用程序和可穿戴设备的生物标志物

    -   *网络和社交媒体数据*：点击、历史记录、行为、健康论坛

    -   *机器对机器数据*：传感器、可穿戴设备、环境

    -   *人类生成数据*：电子邮件、纸质文档、电子病历、行为

    -   *交易数据*：健康索赔数据、账单数据


    精准健康利用来自各种来源的数据来了解人体的状态。除了组学数据之外，互联网的普及和智能手机的广泛使用增加了丰富的临床和生物学数据，可以显著增强对个体的理解。临床数据得到行为和社会数据的支持。生活方式、环境、病历和医疗保险数据都可以用于实现精准健康。考虑到一名
    2 型糖尿病患者与临床医生相处的时间为 3 小时，其余时间都在自我管理病情，更全面的数据源所带来的潜在机遇是不言而喻的。^(³⁸) 例如，谷歌地图完全有理由（且符合伦理）提供基于避开促进肥胖的餐厅的步行路线，或者向需要体重管理支持或表现出饮食失调的人推送广告。关于纳入新数据源的问题，是道德问题而非相关性问题。


    随着可穿戴设备和传感器技术的不断创新，它们在临床医疗保健中的实施和应用也在不断发展。表 3-1 探讨了一些常见的数据类型和来源。在精准健康中，从可穿戴设备中最大化临床价值的关键在于将其整合到更广泛的数据生态系统中，以及纳入数据的理由。


    **表 3-1**


    常见数据类型和来源


    | 数据类型 | 来源 | 示例 | 特征 |

    | --- | --- | --- | --- |

    | 生物识别 | 基因检测 生物标志物检测 | 家用基因检测 (23andme) | 结构化数据。由患者拥有。 |

    | 网络和社交媒体 | 患者健康、行为和情绪 | 社交媒体 智能手机 网络论坛 社区、患者登记处 健康应用 | 大多数数据是非结构化或半结构化的。 |

    | 机器对机器数据 | 患者健康数据 | 传感器 血糖仪 智能手机 健身追踪器 图像 健康应用 | 由设备报告的结构化数据。软件通常使用标准协议。传感器数据速度高。
    |

    | 人类生成数据 | 临床数据 制药和研发数据 | 电子健康记录 患者登记处 临床数据 血液检测 图像（扫描等） | 本质上是结构化的。由提供者拥有。 |

    | 交易数据 | 事件和交易日志 | 健康信息交换 索赔数据 费用数据 | 本质上是结构化的。可能需要预处理才能成为有用数据。 |

