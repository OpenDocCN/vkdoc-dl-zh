  trans: '

    ### 背景


    长新冠是一种疾病，已影响全球 4.78 亿新冠幸存者中的 40%。^(¹²⁹) NICE 指南建议引导患者使用应用程序进行自我管理。^(¹³⁰) 这种疾病会使人衰弱，并可能影响心理健康、家庭、就业和生活质量。^(¹³¹)
    医护人员中长新冠的患病率更高，NHS 员工因长新冠每年缺勤约 200 万个工作日。^(¹³²) 长新冠是导致长期缺勤的最主要原因。^(¹³³) 长新冠对医护人员的影响不成比例地高于普通人群。^(¹³⁴)
    缩短康复时间将有助于人们更快地重返工作岗位。雇主将受益于更少的病假天数以及员工心理健康和生活质量的改善。近 20%的患者需要 5 至 6 个月的康复，其中大量患者出现与压力相关的问题。


    目前只有少数针对长期疾病的康复应用程序与长新冠相关。例如，NHS 威尔士的专门针对长新冠的自我管理应用程序提供了基本信息，但交互性很差。尽管涵盖了通用的康复原则，但现有应用程序缺乏长新冠的特异性和个性化交互。我们需要以公平的方式接触人群，以管理长新冠并支持有针对性的康复和结果。当前的工具要么是信息性的，要么是图形用户界面的移动应用程序，并且不能通过语音监测症状或提供支持，这排除了
    65 岁以上人群中 60%不使用智能手机的人，而该群体正是长新冠的关键风险群体。


    借助 AI 语音助手，语音可以转化为一种生命体征，从而实现健康评估和基于症状的康复。正如体温指示发烧一样，声音生物标志物能更全面地反映我们的健康状况。


    自动声音分类已广泛应用于各种现实生活场景，例如健康监测、安全监控、环境感知、机器人导航和语音活动。声音分类任务涉及从音频信号中提取声学特征，并随后识别不同的声音类别。广泛的声音分类应用可分为几个领域，包括语音识别、乐器识别、环境声音分类以及用于疾病诊断的医学声音分类。与具有适当高级结构的语音和音乐声音相比，诊断性声音（例如呼吸声、咳嗽声和心音）和环境音频信号的类别往往是非结构化的，包含各种临床和自然声学噪声。此外，由于声音产生机制不同（例如，不同的身体记录位置和设备），使用医学音频片段进行声音分类是一个具有挑战性的问题。现有文献中对此鲜有涉及，特别是关于肺部疾病（例如
    COPD、肺炎、哮喘和支气管扩张）以及使用呼吸、咳嗽和语音音频信号进行 COVID 诊断。由于样本高度不平衡且数量有限，现有研究的性能有待提高。此外，由于人类情感的微妙性以及众所周知的嘈杂、模糊和含混的边界，从音频输入中进行情感识别也很棘手。


    ### 目标


    我们项目的目标是调整 Gro Health 应用程序，使其能够支持多种健康状况，达到/超越平等和多样性目标，并与少数族裔患者群体、退休成年人以及有学习困难的人群保持非常高的互动度。该项目将通过可穿戴设备和语音监测长新冠症状，并通过聊天机器人提供个性化的康复锻炼，该聊天机器人可嵌入到智能设备、车辆和家庭中。


    随着健康服务数字化的加速，找到与数字弱势群体建立联系的途径对于不加剧现有的健康不平等至关重要。减少健康不平等是我们产品要解决的核心问题。这项创新将在智能设备（包括语音助手和智能电视）上全天候可用，以覆盖
    65 岁以上没有智能手机的 60%人群，使其成为没有智能手机的人唯一的居家长新冠支持解决方案。


    该项目面临特定的技术挑战，包括语音捕捉的准确性、数据分析中的潜在噪声、整合不同数据点以提供长新冠的整体评估，以及基于自主原则的多学科自我管理支持。


    所开发的 AI 代理将通过开发新颖的弱监督、零样本（ZSL）和少样本（FSL）学习以及深度学习算法来填补知识空白，以生成有效的音频表示，捕捉显著的判别性时空特征和声学线索，从而为基于音频的疾病和情感分类提供信息。机器学习工程师还将采用不断演进的神经架构生成技术，以产生定制的优化网络，从而更好地处理带有各种噪声数据输入的音频分类。


    ### 实施计划


    该项目是 DDM Health 与伦敦大学皇家霍洛威学院之间的合作项目，包括以下内容：


    *   通过应用程序内的患者语音和症状数据收集数据。

    *   采用混合方法设计，包括访谈、语音日记以及来自 Gro Health 应用程序的数据，并结合数据分析，以捕捉和分析长新冠患者的症状在生理和心理层面的表现。

    *   设计并开发一个交互式 AI 代理，以实现个性化的实时支持和自我管理建议。核心功能包括：通过与可穿戴设备同步数据来监测长新冠症状、通过用户手动输入进行音频录制、从语音中检测情绪，以及通过交互式
    AI 代理提供支持和应对策略。

    *   使用现有数据集和实时输入进行系统评估。

    *   撰写报告并进行成果传播。


    ### 风险


    技术风险包括以下内容：


    *   研究团队可以通过使用大量现有的、涉及不同肺部异常和 COVID 检测的呼吸、咳嗽和语音公共数据集来缓解音频数据不足的问题。

    *   缓慢的训练过程可以通过使用强大的高性能 GPU 计算设施来缓解。

    *   在医学音频分类方面缺乏背景知识的问题，可以通过借鉴先前系统开发项目成功交付的重要经验、进行全面的文献综述以及咨询相关研究人员/NHS 合作伙伴/领域专家来缓解。


    ### 评估


    大学研究人员将通过与现有合作伙伴合作，招募长新冠患者对 AI 代理进行纵向混合方法评估，包括健康数据追踪、问卷调查和访谈，以详细描述用户与 AI 的互动情况及其健康影响，从而对项目进行评估。

