  trans: '

    # 为何多样性对精准健康至关重要


    我踏入精准健康领域的旅程始于 2002 年，当时我在伦敦帝国理工学院攻读人工智能本硕连读学位。


    第一学期末，我的祖父阿努帕姆因心脏病发作突然住院，并接受了紧急四重心脏搭桥手术。出院后，他被诊断出患有 2 型糖尿病，并被嘱咐要遵循健康均衡的饮食。由于不知道如何以适合他孟加拉-印度生活方式的方式来管理病情，祖父向我询问该吃什么。我当然也不知道，他同样如此，于是我们上网搜索。显而易见的是，缺乏适用于像我祖父这样的人，特别是来自少数族裔社区人群的相关内容。他不需要被告知三明治和早餐麦片的替代品，而是需要知道该用什么来替代他的
    roti（印度薄饼）、naan（馕饼）和米饭。正是在这时，我创立了一个面向长期健康问题患者的全球社区。那一刻，一次关于祖父该吃什么来控制新确诊疾病的偶然对话，演变成了一种通过数据驱动、循证的数字健康创新来赋能人们的热情。我的角色让我对长期健康问题患者群体、他们的家人和护理人员，以及其中包含的多元文化和种族有了无与伦比的洞察。截至
    2022 年，少数族裔群体在医疗保健领域被严重忽视。如今，作为 DDM Health 的创始 CEO，我有幸领导一个团队，提供基于证据的精准数字疗法，以 19
    种母语为七个国家的超过 180 万人提供护理，旨在赋能*每一个人*。


    基于我自身及家人的经历，我深受启发，致力于确保未被充分代表的群体能够在数字健康领域被代表、参与其中并从中受益。利用数字技术提供了一个机会，通过根据个人的期望（无论是文化、语言、社会规范还是其他方面）来个性化他们的体验，从而吸引人们参与。通过与临床医生和患者共同参与和合作开发创新，我们开发出了可扩展、有吸引力且有效的解决方案，这些方案为所有背景的人（而不仅仅是少数族裔群体）进行了个性化定制。


    为什么这很重要？因为实现全民精准健康的目标需要持续评估使我们与众不同的因素。多样性在任何地方都值得庆祝，尤其是在医疗保健领域，因为它是实现更具包容性、更公正、更有效的医疗体系的途径。通过人类多样性的背景来理解疾病至关重要，这不仅关乎遗传背景，也关乎不同人群如何应对疾病及其环境。人们的生活经验同样是数据和专业知识，而多样性使我们能够接触和理解其他文化和世界观。这不仅克服了许多偏见——人类偏见、智力偏见、机器偏见和数据偏见——还能激发灵感、推动创新和改善结果，从而自我实现精准健康的目标。如果数字健康服务不能公平地提供，偏见就会内化，坦率地说，这对每个人都是一个问题。同样，很明显，医疗保健服务需要一个伦理和道德框架，我们有责任参与其中——去提供、保护和维护它。


    ## 总结


    精准健康在改善医疗保健的各个方面都拥有巨大潜力。其中一些益处已经以临床决策工具、数字疗法和组学技术的形式得以实现，但一个互联互通的生态系统仍需数十年才能建成。从儿科到姑息治疗，精准、个性化的医疗保健只有在技术、数据集和通信手段无处不在时才能实现。在此之前，精准健康仍将各自为政，并只会赋能特定群体。因此，精准健康需要所有利益相关者积极承担责任并发挥领导作用，以确保其益处能被所有人享有。


    脚注 1 2 3 4 5 6 7 8 9


    # 什么是精准健康？


    精准健康是一种整体性的医疗保健方法，它整合了众多生物数据点，包括纵向的分子、细胞和表型生物标志物以及个体基因组序列。排除遗传因素的作用，研究表明有四大因素影响我们的健康。^(¹⁰)


    * 社会和经济环境：40%

    * 健康行为：30%

    * 临床护理：20%

    * 物理环境：10%


    虽然这些权重在个体之间可能有所不同，但精准健康的概念旨在通过人类健康的新时代来优化健康的各个方面，这使我们能够做到以下几点：


    * **预测** 在疾病可以有效控制和逆转时的风险。

    * **预防** 通过在所有层面实施有效的、基于证据的干预措施来预防疾病发展及其相关风险因素。

    * 在患者**参与**的情况下提供护理。

    * 通过更具体的疾病表型定义来提供**个性化**治疗，从而鼓励选择最佳疗法和新的生化干预靶点。

    * 为**人群**健康提供精准方法。将医学通常被动的重点转向主动的、预防性的生态系统，在疾病发生前关注健康，这增强了无疾病个体和长期患病者的健康理念。


    平均而言，患者每年与医疗保健系统互动的时间约为 10 小时。^(¹¹) 努力使医疗保健更具预测性、预防性、个性化、参与性，并惠及个体和人群（即 P5 医疗保健，如图
    2-1 所示），将显著改善整个健康连续谱上的健康和福祉，这是人类健康的新时代。


    ![](img/535410_1_En_2_Fig1_HTML.jpg)


    一个图表，中心是 5P 健康模块，周围按顺时针方向环绕着预测性、预防性、参与性、个性化，这些共同惠及人群和个体。


    **图 2-1** 精准健康的五个 P


    精准健康时代始于 2003 年科学家们测序了 92%的人类基因组。^(¹²) 数字健康作为一个概念于 2007 年随着首批健康和保健应用程序的推出而诞生。^(¹³)
    与此同时，随着亚马逊网络服务（`AWS`）和弹性计算云（`EC2`）技术的推出，网格或云计算的概念取得了巨大进步，这些技术首次将软件开发与服务器托管和管理分离开来。


    精准健康的支柱，即五个 P，是由系统生物学研究所创始人勒罗伊·胡德提出的一个概念，指的是一种新兴的医学模式，该模式“侧重于最大化每个个体的健康，而不仅仅是治疗疾病。”


    ## 精准健康的五个 P


    精准健康有五个核心支柱。


    * 预测与预防

    * 治疗个性化

    * 参与性

    * 人群


    让我们逐一详细探讨。

    '
- fmt: '### Prediction and Prevention


    It is feasible that, in the future, requiring medical intervention may increasingly
    be seen as a failure of prevention. Precision prevention enables an improved overall
    state of health and better use of healthcare resources through several mechanisms:
    genetic testing, consumer technologies, and data analytics.


    Rather than relying on familial history alone, the use of “-omics” technologies
    provides detailed data about an individual’s genetic makeup, biochemical processes,
    and risk of particular diseases.^([^(14)](#fn14))


    Genetic screening tests are available to determine the risk of inherited breast
    and ovarian cancer syndrome, lynch syndrome, hereditary colon and uterine cancers,
    and familial hypercholesterolemia inherited high cholesterol, among others. Learning
    about potential health risks enables clinicians and patients to follow personalized
    treatments and support behavioral change and clinical guidelines to address identified
    risks.


    These are -omics technologies:


    - *Genomics*: Genes, information on genetic predisposition

    - *Transcriptomics*: RNA, information gene activity/expression

    - *Proteomics*: Proteins, information on key molecules that control cell biology

    - *Metabolomics*: Cellular metabolites, information on enzymatic activities, and
    biochemistry of cells


    The potential of precision prevention is vast, limited only by the data and computational
    power available.


    As “multi-omics” data is embedded within clinical practice and the Internet of
    Everything is realized through connecting more extensive networks of people, processes,
    data, and things, a more comprehensive description of biological systems and health
    states is understood. Monitoring health states will enable prevention to move
    from a one-disease, one-test approach to risk prediction within new therapeutic
    areas. Integrating genomics, phenomics, and behavioral data driven by intelligent,
    connected devices and communications provides a rich mining dataset and enables
    a new age of disease prediction and prevention.


    A significant challenge is integrating data in the context of the complexities
    of biological networks and constructing models of health and wellness that are
    both predictive and actionable, or, in other words, beneficial to both patients
    and clinicians.


    The complexity of integrating data is a challenge best demonstrated in representing
    the predictive factors of obesity, which are multifaceted.


    - Genetic factors such as genes and gene expression

    - Individual lifestyle factors, such as dietary intake, exercise habits, TV viewing
    patterns, and income

    - Environmental factors, such as the distance from grocery stores, walking environment,
    and food advertising

    - School-related factors such as the availability of sugary beverages, distance
    to fast-food outlets, and school health education

    - Industry factors such as portion-size norms in restaurants and packaged foods;
    state policies and regulation of food marketing

    - National food distribution programs and support for various agricultural products

    - Life-course factors such as the history of breastfeeding, maternal health, and
    parental obesity^([^(15)](#fn15))


    Genetic testing at birth will enable humans to optimize their lives by living
    in a way to prevent disease and detect their disposition to any particular disease
    based on available data. Data analysis is required to drive meaningful outcomes
    and provide optimal engagement and behavioral change opportunities. In other words,
    precision health enables data-driven medicine from birth to death.


    Digital phenotyping, or the use of smart devices to collect data from available
    sensors that are received through human interaction with physical hardware and
    software to infer individual behaviors, will become more specific only as big
    datasets turn into vast datasets. Simple social media behaviors have already been
    linked to poor mental health, so using the digital phenotype to understand health
    and wellness in the form of digital indications derived from available data stands
    to unlock a treasure trove of potential.^([^(16)](#fn16))


    ### Personalization of Treatment


    Personalized medicine and health programs can enable tailored treatments, reduce
    disease burden, improve quality of life, increase survival rates, and reduce the
    cost of care. Much of health is already personalized to characteristics, including
    age and gender. However, with genetic, environmental, biomedical, and lifestyle
    data, healthcare will develop a better understanding of the genome, interventions,
    and treatments.


    For instance, most drugs are developed through clinical trials and intended for
    patients classified by disease group, assuming that the groups will have similar
    responses to treatment.^([^(17)](#fn17)) Moving from the conventional classification
    of diseases to using biomarkers to assist in stratifying types and subtypes of
    distinct conditions will enable better-personalized therapies through clinical
    research.


    Personalizing preventative treatment and healthcare according to patient preferences
    such as preferred language, faith, and accessibility needs will significantly
    improve engagement and long-term outcomes for many people. Personalization also
    supports the reduction of health inequalities by addressing some of the vital
    inertia to engaging with healthcare. From providing prescription labels in the
    native language to delivering health programs tailored to accessibility needs,
    personalization can take place across the healthcare spectrum to improve engagement
    and health outcomes.


    Obesity is a significant risk factor for noncommunicable diseases and a cause
    of global economic burden. With value-based healthcare’s approach to wellness,
    diet and nutrition are vital areas where populations can realize the impact of
    precision personalization. The field of nutrigenomics focuses on providing an
    optimal diet for each individual based on genotype supported through a tailored
    eating plan. Patients can use precision behavioral change tools to receive encouragement
    and maintain adherence. Figure [2-2](#535410_1_En_2_Chapter.xhtml#Fig2) gives
    an indication of how individual-level data can be used to enhance the health of
    people.


    ![](images/535410_1_En_2_Chapter/535410_1_En_2_Fig2_HTML.jpg)


    A process diagram begins with sensor connectivity from the bottom, leads to the
    relevant data, understanding of individual and context, and directs to enhanced
    recommendations to enhance the health of people.


    **Figure 2-2** Enhancing the health of people through understanding the individual'
  raw: '### Prediction and Prevention


    It is feasible that, in the future, requiring medical intervention may increasingly
    be seen as a failure of prevention. Precision prevention enables an improved overall
    state of health and better use of healthcare resources through several mechanisms:
    genetic testing, consumer technologies, and data analytics.


    Rather than relying on familial history alone, the use of “-omics” technologies
    provides detailed data about an individual’s genetic makeup, biochemical processes,
    and risk of particular diseases.^([^(14)](#fn14))


    Genetic screening tests are available to determine the risk of inherited breast
    and ovarian cancer syndrome, lynch syndrome, hereditary colon and uterine cancers,
    and familial hypercholesterolemia inherited high cholesterol, among others. Learning
    about potential health risks enables clinicians and patients to follow personalized
    treatments and support behavioral change and clinical guidelines to address identified
    risks.


    These are -omics technologies:


    *   *Genomics*: Genes, information on genetic predisposition


    *   *Transcriptomics*: RNA, information gene activity/expression


    *   *Proteomics*: Proteins, information on key molecules that control cell biology


    *   *Metabolomics*: Cellular metabolites, information on enzymatic activities,
    and biochemistry of cells


    The potential of precision prevention is vast, limited only by the data and computational
    power available.


    As “multi-omics” data is embedded within clinical practice and the Internet of
    Everything is realized through connecting more extensive networks of people, processes,
    data, and things, a more comprehensive description of biological systems and health
    states is understood. Monitoring health states will enable prevention to move
    from a one-disease, one-test approach to risk prediction within new therapeutic
    areas. Integrating genomics, phenomics, and behavioral data driven by intelligent,
    connected devices and communications provides a rich mining dataset and enables
    a new age of disease prediction and prevention.


    A significant challenge is integrating data in the context of the complexities
    of biological networks and constructing models of health and wellness that are
    both predictive and actionable, or, in other words, beneficial to both patients
    and clinicians.


    The complexity of integrating data is a challenge best demonstrated in representing
    the predictive factors of obesity, which are multifaceted.


    *   Genetic factors such as genes and gene expression


    *   Individual lifestyle factors, such as dietary intake, exercise habits, TV
    viewing patterns, and income


    *   Environmental factors, such as the distance from grocery stores, walking environment,
    and food advertising


    *   School-related factors such as the availability of sugary beverages, distance
    to fast-food outlets, and school health education


    *   Industry factors such as portion-size norms in restaurants and packaged foods;
    state policies and regulation of food marketing


    *   National food distribution programs and support for various agricultural products


    *   Life-course factors such as the history of breastfeeding, maternal health,
    and parental obesity^([^(15)](#fn15))


    Genetic testing at birth will enable humans to optimize their lives by living
    in a way to prevent disease and detect their disposition to any particular disease
    based on available data. Data analysis is required to drive meaningful outcomes
    and provide optimal engagement and behavioral change opportunities. In other words,
    precision health enables data-driven medicine from birth to death.


    Digital phenotyping, or the use of smart devices to collect data from available
    sensors that are received through human interaction with physical hardware and
    software to infer individual behaviors, will become more specific only as big
    datasets turn into vast datasets. Simple social media behaviors have already been
    linked to poor mental health, so using the digital phenotype to understand health
    and wellness in the form of digital indications derived from available data stands
    to unlock a treasure trove of potential.^([^(16)](#fn16))


