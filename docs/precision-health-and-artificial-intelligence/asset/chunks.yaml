- fmt: '# 4. Artificial Intelligence and Machine Learning in Precision Health


    Artificial intelligence refers to any cognitive ability exhibited by a nonhuman
    agent. The five fundamental components of artificial intelligence are learning,
    reasoning, problem-solving, perception, and language comprehension. AI has already
    surpassed human ability when it comes to performing tasks such as learning, vision,
    and logical reasoning.^([^(48)](#fn48)) Machine learning is a subset of AI where
    computer models are trained to learn from their actions and environment over time
    to improve. Algorithms adapt to the presentation of new data and discovery and,
    through machine learning, get iteratively better at tasks without having to be
    explicitly programmed to do so. Machine learning is AI that can adapt autonomously
    with minimum human intervention.


    Deep learning is a subset of machine learning that uses artificial neural networks
    to simulate the human brain’s learning process. The process is called *deep learning*
    due to additional layers that are added to a deep learning function when learning
    from data. Layers within the function are called *neurons*. When a deep learning
    model learns, it simply modifies weights, or neurons, using an optimization function.
    Figure [4-1](#535410_1_En_4_Chapter.xhtml#Fig1) shows a component analysis on
    AI.


    ![](images/535410_1_En_4_Chapter/535410_1_En_4_Fig1_HTML.png)


    A tree diagram classifies the components of AI. It branches into machine learning,
    natural language processing, expert systems, speech, vision, planning, and robotics
    from right to left. Further, it divides into deep learning, unsupervised and supervised,
    text generation, question answering, context extraction, classification, machine
    translation, speech to text, and text to speech.


    **Figure 4-1** Components of AI


    Natural language processing (NLP) is the capacity of systems to analyze, comprehend,
    and produce human language, including speech and text. Natural language interpretation
    is difficult because human language is innately ambiguous—language, pronunciation,
    expression, and perception. To analyze and understand natural language, the grammatical
    structure of sentences and the meaning of words are broken down into bits so that
    they may be studied and comprehended in context. NLP blends AI with computational
    linguistics and computer science.


    Integrating AI approaches such as machine learning, deep learning, and techniques
    such as NLP to tackle the challenges of scalability and high dimensionality of
    data into actionable knowledge is becoming the foundation of precision medicine.
    The ubiquity of sensor-based technologies such as smartphones and wearable devices
    enables a new age of health AI where real-time decisions are made based on vital
    signs, environment, and behaviors. However, the benefits of AI still require addressing
    against the technical, legal, and ethical challenges that remain to ensure that
    stakeholders can realize the precision health ecosystem.


    The hypothesis-generating approach to science is best viewed as a complementary
    means of identifying and inferring meaning from data patterns rather than simply
    extending what has always been done. A growing number of AI methods allow these
    patterns or trends to be learned directly from the data rather than being prespecified
    by researchers based on prior knowledge.


    ## The Three Types of AI


    Any AI application falls into one of three types of intelligence based on how
    well they can replicate human characteristics, the technology to achieve this,
    application, and theory of mind.


    ### Artificial Narrow Intelligence


    To date, the only artificial intelligence humans have successfully realized is
    artificial narrow intelligence (ANI), also known as weak or narrow AI. Narrow
    AI excels at performing a single task. Think of speech recognition, spam filters,
    autonomous cars, movie recommendations, and software to support facial recognition.
    Large volumes of data can be processed in seconds using narrow AI algorithms without
    accumulating fatigue.


    There are two types of narrow AI: reactive and memory-limited. Reactive AI has
    no storage capabilities, simulating the human mind’s ability to respond to stimuli
    without prior experience. In contrast, most AI solutions use limited-memory AI,
    which has data storage and learning capabilities that allow machines to use preliminary
    data to inform future decisions. Deep learning, for example, tailors future experiences
    based on previously stored data.


    ### Artificial General Intelligence


    Artificial general intelligence (AGI) or strong AI is the concept of a human-like
    agent with general intelligence that can learn and apply its knowledge and experience
    to solve problems. This form of AI acts, thinks, and understands in a manner indistinguishable
    from human behavior. Strong AI revolves around the theory of mind AI framework,
    which details the ability to discern other intelligent entities’ needs, emotions,
    beliefs, and thought processes. Theory of mind AI is not about replication or
    simulation; instead, it is about teaching machines to understand humans truly.
    There are currently no notable examples of strong AI.


    ### Artificial Superintelligence


    A theoretical concept currently, artificial superintelligence (ASI) goes beyond
    mimicking human intelligence and behavior. It is when agents are aware of themselves
    and exceed the capacity of human ability and intelligence. Whether this is inevitable
    is generally a question of ethics and morality rather than technology.


    ## A Brief Introduction to Machine Learning


    Machine learning exemplifies data mining principles but can also infer correlations
    and learn from them to apply to new algorithms.


    Regardless of the type of AI, the goal is to mimic the ability to learn like a
    human through experience and achieve the assigned task without or with minimal
    external assistance. Machine learning tasks can be *supervised*, where models
    are developed upon example inputs; *unsupervised*, where models determine their
    structure from an input; and *partially supervised*, a combination of the two.'
