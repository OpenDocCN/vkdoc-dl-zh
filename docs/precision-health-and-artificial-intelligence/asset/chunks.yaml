  trans: '

    ### 结果


    在激活转介的 45 名基线参与者中，有 37 人（82%）在 12 个月时报告了结果。对于其余 8 人（18%）因失访而缺失的数据，采用末次观测值结转法，以维持保守的真实世界评估。


    招募至低碳水化合物计划的 2 型糖尿病参与者，其`HbA1c`水平从基线（平均值 73.35 `mmol/mol`，标准差 15.84）到 12 个月随访（平均值
    67.2 `mmol/mol`，标准差 13.59）显示出统计学显著变化，相当于平均降低 6.2 `mmol/mol`（标准差 5.75；`t17=4.56`；`P<.001`）。完成该计划超过九节课的参与者，其`HbA1c`水平从基线（平均值
    75.7 `mmol/mol`，标准差 14.9）到 12 个月随访（平均值 68.7 `mmol/mol`，标准差 12.8）显示出统计学显著下降，平均降低
    7.01 `mmol/mol`（标准差 6.06；`t13=4.33`；`P<.001`）。这相当于`HbA1c`平均降低 8.81%。招募至低碳水化合物计划的前驱糖尿病参与者，其`HbA1c`平均降低
    2.35 `mmol/mol`（标准差 1.96；`t26=6.25`；`P<.001`），具有统计学显著性。那些完成超过九节课的参与者表现更佳，在 12
    个月时报告`HbA1c`平均降低 3.04 `mmol/mol`（标准差 1.82；`t17=7.11`；`P<.001`）。


    2 型糖尿病参与者的平均起始体重为 93.53 `kg`（标准差 17.91），在 12 个月随访时降至平均 90.83 `kg`（标准差 16.84），这是统计学显著的平均降低
    2.70 `kg`（标准差 2.21；`t17=5.17`；`P<.001`）。完成者平均减重 3.54 `kg`（标准差 1.7；`t17=5.17`；`P<.001`），相当于平均体重变化-3.66%（标准差
    2.8）。前驱糖尿病参与者开始计划时的平均体重为 86.72 `kg`（标准差 9.68），报告平均减重 2.82 `kg`（标准差 2.90；`t26=5.05`；`P<.001`），相当于平均体重下降
    3.16%（标准差 3.11）。完成超过九节课的前驱糖尿病参与者，其平均体重变化更大，为 4.08 `kg`（标准差 2.77；`t17=6.25`；`P<.001`），具有统计学显著性，相当于总体重平均降低
    4.57%（标准差 2.88）。


    ### 讨论


    这不是一项随机对照试验，因此我们无法将 12 个月的结果与对照组或标准护理组进行比较。因此，应谨慎解读我们的试验结果，因为这项小型研究采用了便利抽样、开放标签单臂设计以及前后自我报告的结果。然而，这项研究表明，在常规全科诊疗中，将
    2 型糖尿病或前驱糖尿病患者引导至低碳水化合物计划，可以促进体重减轻并改善血糖控制。在最低限度的实施和支持下，这种轻触式干预能够增强初级保健工作流程。它显示出较高的接受率、依从性（即完成率）和留存率（即过去
    30 天内的参与度），分别为 45%、64%和 82%。12 个月时的退出率较低（8/45，18%），表明平台参与度很高。这是少数能显示长期参与度的应用程序之一。该平台已被证明具有高参与率，并且不劣于其他面对面或在线干预措施。^(¹²⁵,)
    ^(¹²⁶,) ^(¹²⁷) 鉴于所提供的简短干预，我们在全科和初级保健背景下实现了高接受率。通常，其他干预措施需要人员资源和时间。


    ### 结论


    尽管我们的研究设计不支持因果结论，但这项真实世界评估表明，该干预措施可作为 2 型糖尿病和前驱糖尿病成人患者进行精准自我管理的有价值辅助手段。


    ### 研究结果的影响


    由约克健康经济学联盟进行的一项独立卫生经济学报告，采用了低碳水化合物计划影响的真实世界数据，以证明在公共医疗保健系统中实施该计划可显著节省成本。对于一个拥有
    3000 个许可证的地区，研究人员模拟得出，实施低碳水化合物计划一年后，每位参与者因减少用药平均可节省 117.57 英镑。这些结果支持了该数字多平台工具在全国范围内的推广。^(¹²⁸)


    ## 基于语音的症状监测与基于人工智能的长期新冠患者康复


    *以下案例研究展示了一个获奖的技术商业案例，该案例涉及一种利用基于人工智能的症状监测来监测长期新冠的精准健康工具。*

    '
- fmt: '### Background


    Long COVID is an illness that has affected 40 percent of the world’s 478 million
    survivors of COVID-19.^([^(129)](#fn129)) NICE guidelines recommend directing
    patients to apps to help with self-management of the condition.^([^(130)](#fn130))
    The condition is debilitating and can impact mental well-being, family, employment,
    and quality of life.^([^(131)](#fn131)) Healthcare workers have a higher prevalence
    of Long COVID, with ~2 million days lost in NHS staff absences due to Long COVID
    annually.^([^(132)](#fn132)) Long COVID is the single most significant cause of
    long-term absence from work.^([^(133)](#fn133)) Long COVID affects healthcare
    workers disproportionately to the general population.^([^(134)](#fn134)) Improving
    rehabilitation times would support people in getting back to work quicker. Employers
    will benefit from fewer sick days and improved mental health and quality of life.
    Almost 20 percent of patients will require rehabilitation for 5 to 6 months, with
    a large volume presenting stress-related problems.


    Only a handful of rehabilitation apps for long-term conditions are relevant to
    Long COVID. For example, NHS Wales’ Long COVID-specific self-management app provides
    essential information with little interactivity. Although covering general rehabilitation
    principles, existing apps lack Long COVID specificity and personalized interactivity.
    We need ways to reach people equitably to manage Long COVID and support focused
    rehabilitation and outcomes. Current tools are either informational or a GUI mobile
    app and do not monitor symptoms or provide support by voice, excluding 60 percent
    of people over 65, a key Long COVID risk group, who do not use a smartphone.


    With AI voice assistants, speech can be transformed into a vital sign, allowing
    health assessment and symptom-based rehabilitation. In the same way that temperature
    indicates fever, vocal biomarkers offer a more complete picture of our health.


    Automatic sound classification has been widely adopted in various real-life applications,
    such as health monitoring, security surveillance, environmental sensing, robot
    navigation, and voice activity. Sound classification tasks involve the extraction
    of acoustic characteristics from the audio signals and the subsequent identification
    of different sound classes. The broad range of sound classification deployments
    can be categorized into several disciplines, including speech recognition, music
    instrument identification, environmental sound classification, and medical sound
    classification for disease diagnosis. Compared with speech and music sounds with
    proper high-level structures, the categories of diagnostic (such as respiratory,
    coughing, and heart) sounds and environmental audio signals tend to be unstructured,
    containing various clinical and natural acoustic noises. Furthermore, because
    of different sound production mechanisms (e.g., different body recording locations
    and equipment), sound classification with medical audio clips is a challenging
    problem. It has been rarely tackled in existing literature, particularly concerning
    lung conditions (e.g., COPD, pneumonia, asthma, and bronchiectasis) and COVID
    diagnosis using respiratory, coughing, and speech audio signals. Because of highly
    imbalanced and limited sample sizes, existing studies need better performances.
    Moreover, owing to the subtlety and notoriously noisy, murky, and fuzzy boundaries
    of human emotions, emotion recognition from audio inputs is also tricky.


    ### Objective


    The objective of our project is to adapt the Gro Health app demonstrated to support
    a variety of health conditions, meet/exceed equality and diversity aims, and have
    very high engagement with ethnic minority patient groups, retired adults, and
    those with learning difficulties. The project will provide personalized rehabilitation
    exercises based on monitoring Long COVID symptoms through wearable and voice delivered
    through a chatbot that providers can embed within smart devices, vehicles, and
    homes.


    As the digitalization of health services accelerates, finding routes to connect
    with the digitally excluded is essential not to exacerbate existing health inequalities.
    Reducing health inequalities is the core problem our product seeks to solve. The
    innovation will be available 24/7 on smart devices, including voice assistants
    and smart TVs, to reach 60 percent of those over 65s without a smartphone, making
    it the only in-home Long COVID support solution for those without a smartphone.


    This project has specific technical challenges, including accuracy of voice capture,
    potential noises in data analysis, integration of different data points to provide
    a holistic evaluation of Long COVID, and multidisciplinary self-management support
    based on autonomic principles.


    The developed AI agent will fill a knowledge gap by developing novel weakly supervised,
    zero-shot (ZSL), and few-shot (FSL) learning and deep learning algorithms to generate
    effective audio representations to capture significant discriminative spatial-temporal
    characteristics and acoustic cues to inform audio-based disease and emotion classification.
    Machine learning engineers will also employ evolving neural architecture generation
    techniques to yield bespoke optimized networks to better tackle audio classification
    with various noisy data inputs.


    ### Implementation Plan


    The project is a collaborative relationship between DDM Health and Royal Holloway,
    University of London, involving the following:


    *   Collection of data through in-app patient voice and symptom data.

    *   Mixed-method design consisting of interviews, a voice diary, and data from
    the Gro Health app with data analysis to capture and analyze how long COVID sufferers’
    symptoms manifest on physiological and psychological levels.

    *   Design and develop an interactive AI agent that enables personalized real-time
    support and self-management recommendations. Core features are monitoring long
    COVID symptoms by data synchronization with wearable devices, audio recording
    through the user’s manual input, emotion detection from speech, and providing
    support and coping strategies via an interactive AI agent.

    *   System evaluation using existing data sets and real-time inputs.

    *   Report writing and dissemination.


    ### Risks


    Technical risks include the following:


    *   The study team can mitigate insufficient audio data by using many existing
    respiratory, coughing, and speech public data sets concerning diverse lung abnormalities
    and COVID detection.

    *   Slow training processes can be mitigated by using powerful high-performance
    GPU computing facilities.

    *   The need for more background knowledge in medical audio classification can
    be mitigated by drawing significant experiences from the successful delivery of
    previous projects on system development, conducting a comprehensive literature
    review, and consulting relevant researchers/NHS partners/domain experts.


    ### Evaluation


    University researchers will evaluate the project by working with existing partners
    to recruit Long COVID patients for a longitudinal mixed-methods evaluation of
    the AI agent, including health data tracking, questionnaires, and interviews to
    detail user AI engagement and health impact.'
