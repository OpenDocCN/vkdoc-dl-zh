    enhance the understanding of an individual. Clinical data is supported with behavioral
    and social data. Lifestyle, environment, medical records, and medical insurance
    data can all be used to enable precision health. Given that a person with type
    2 diabetes spends 3 hours with their clinician and the rest of their time is spent
    self-managing their condition, the potential opportunities enabled by more comprehensive
    data sources are self-evident.^([^(38)](#fn38)) For instance, there is no nonethical
    reason Google Maps could not give walking directions based on avoiding obesogenic-promoting
    restaurants or advertising to people who require weight management support or
    exhibit eating disorders. The question regarding incorporating new data sources
    is of morality rather than relevance.


    As innovation in wearable devices and sensors continues, so does their implementation
    and application within clinical healthcare. Table [3-1](#535410_1_En_3_Chapter.xhtml#Tab1)
    explores some common data types and sources. The key to maximizing clinical value
    from wearables within precision health is their integration into the broader data
    ecosystem and the rationale for data inclusion.


    Table 3-1


    Common Data Types and Sources


    | Data Type | Source | Example | Characteristics |

    | --- | --- | --- | --- |

    | Biometric | Genetic testBiomarker test | Genetic at-home testing (23andme) |
    Structured data.Owned by the patient. |

    | Web and social media | Patient health, behaviors and sentiment | Social media
    Smartphones Web forumsCommunities, patient registriesHealth apps | Most data is
    unstructured or semistructured. |

    | Machine-to-machine data | Patient health data | Sensors Blood glucose metersSmartphones
    Fitness trackers ImagesHealth apps | Structured data reported by devices.Software
    typically utilizes standard protocols. Sensor data is high velocity. |

    | Human-generated data | Clinical dataPharmaceutical and R&D data | Electronic
    health recordPatient registries Clinical data Blood testsImages (scans, etc.)
    | Structured in nature. Owned by providers |

    | Transactional data | Events and transactions logs | Health information exchanges
    Claims data Expenses data | Structured in nature. May require preprocessing to
    become useful data |'
