- fmt: '# 3. Data and the Digital Phenotype


    For treatments to improve an individual’s state of wellness at all points in the
    healthcare continuum, they must center around available data to provide patients
    with as-precise care as possible. The more that datasets are generated, linked,
    and utilized, the higher the accuracy of precision care. Data collection extends
    beyond genetics to various unconnected, fragmented sources that may not typically
    be considered related to health and disease.


    Data is the fundamental requirement to realizing the ambition of precision health,
    and understandably, patients and healthcare professionals alike are excited by
    the prospect. A study conducted with a group of more than 4,000 patients with
    long-term conditions in 2022 found that one in three patients are happy to share
    their data with their healthcare professionals.^([^(36)](#fn36)) In its current
    guise, precision health is driven by the enormous potential of big data and artificial
    intelligence. Collecting large quantities of data with clinical confirmation of
    health status and diagnoses enables sophisticated algorithms, increasing the chances
    of correct diagnoses and potentially lowering costs that underline key outputs
    of precision health.


    ## Data Forms and Types


    To fully understand the nature of data, we must first grasp its nature. Data can
    be characterized by form and type.


    ### Forms


    Data can take many forms such as characters, text, words, numbers, images, sound,
    and video, and it falls into two classifications: structured and unstructured.
    Structured data typically refers to something stored in a database or spreadsheet
    in a structure that follows a model or schema.


    Readings from embedded sensors, smartphones, smartwatches, and IoT devices are
    forms of structured data—whether that be the provision of blood glucose readings,
    steps walked, calories burned, heart rate, or blood pressure. Unstructured data
    refers to everything else. Notes on medical records, communications, and social
    media are a few examples of unstructured data that hold considerable prospects.
    The lack of a predefined model or schema structure makes data compilation and
    interpretation a resource-intensive task concerning time and energy.


    Nevertheless, the incorporation of unstructured data into the personalization
    of the healthcare experience provides a treasure trove of possibilities. More
    than 656,640,000 tweets are shared on Twitter, 734,400,000 comments are posted
    on Facebook, and 100 billion messages are sent on WhatsApp every 24 hours.^([^(37)](#fn37))
    While it is known that our social networks can facilitate positive health outcomes
    by influencing our health behaviors, our interactions and communications are an
    area of data mining yet to be fully realized.


    ### Types


    There are several types of data. Big data is synonymous with AI and healthcare,
    referring to a collection of voluminous, traditional, and digital data sources
    for discovery and analysis. Big data has three core key characteristics: volume,
    variety and velocity. In other words, there’s a lot of it. Through big data analytics,
    one can uncover hidden patterns, unknown correlations, trends, preferences, and
    additional information to help make better and more informed decisions. Figure
    [3-1](#535410_1_En_3_Chapter.xhtml#Fig1) shows the three Vs of big data.


    ![](images/535410_1_En_3_Chapter/535410_1_En_3_Fig1_HTML.jpg)


    A concentric diagram of three characteristics of big data. They are data variety,
    data volume, and data velocity differentiated through the X Y Z plane format.
    The amount of data for data volume is M B, G B, T B, and P D from the origin.
    Data variety includes Barch, periodic, near real-time, and real-time from the
    origin.


    Figure 3-1


    The three Vs of data


    Machine learning and AI provide many techniques that data scientists can apply
    to datasets for this very purpose. Conversely, small data refers to N-equals-1
    units of data that are accessible, informative, and actionable. Small data could
    include how many times a patient has been admitted into emergency care or whether
    they attended a scheduled appointment. While data may be small in size, it does
    not lack value. The last few years have seen a shift toward including small data
    analytics to improve clinical and administrative processes and identify cost savings.
    Precision health seeks to deliver N-equals-1 care at scale.


    ## Sources of Data


    The data-driven understanding required to deliver individualized care is obtained
    from various data sets, including clinical repositories, electronic health records,
    genomic libraries, transactions, and data from structured and unstructured sources.
    While the type of data will fall into heterogeneous or unstructured data, there
    are many sources for both. Regardless of the source, data typically is one of
    five types.


    - *Biometric data*: Fingerprints, genetics, -omics, biomarkers driven from apps
    and wearables

    - *Web and social media data*: Clicks, history, behaviors, health forums

    - *Machine-to-machine data*: Sensors, wearables, environment

    - *Human-generated data*: Email, paper documents, electronic medical records,
    behaviors

    - *Transaction data*: Health claim data, billing data


    Precision health leverages data from various sources to understand the state of
    a human. Beyond -omics data, the ubiquitous use of the Internet and the widespread
    availability of smartphones adds rich clinical and biological data that can significantly
    enhance the understanding of an individual. Clinical data is supported with behavioral
    and social data. Lifestyle, environment, medical records, and medical insurance
    data can all be used to enable precision health. Given that a person with type
    2 diabetes spends 3 hours with their clinician and the rest of their time is spent
    self-managing their condition, the potential opportunities enabled by more comprehensive
    data sources are self-evident.^([^(38)](#fn38)) For instance, there is no nonethical
    reason Google Maps could not give walking directions based on avoiding obesogenic-promoting
    restaurants or advertising to people who require weight management support or
    exhibit eating disorders. The question regarding incorporating new data sources
    is of morality rather than relevance.


    As innovation in wearable devices and sensors continues, so does their implementation
    and application within clinical healthcare. Table [3-1](#535410_1_En_3_Chapter.xhtml#Tab1)
    explores some common data types and sources. The key to maximizing clinical value
    from wearables within precision health is their integration into the broader data
    ecosystem and the rationale for data inclusion.


    Table 3-1


    Common Data Types and Sources


    | Data Type | Source | Example | Characteristics |

    | --- | --- | --- | --- |

    | Biometric | Genetic test Biomarker test | Genetic at-home testing (23andme)
    | Structured data. Owned by the patient. |

    | Web and social media | Patient health, behaviors and sentiment | Social media
    Smartphones Web forums Communities, patient registries Health apps | Most data
    is unstructured or semistructured. |

    | Machine-to-machine data | Patient health data | Sensors Blood glucose meters
    Smartphones Fitness trackers Images Health apps | Structured data reported by
    devices. Software typically utilizes standard protocols. Sensor data is high velocity.
    |

    | Human-generated data | Clinical data Pharmaceutical and R&D data | Electronic
    health record Patient registries Clinical data Blood tests Images (scans, etc.)
    | Structured in nature. Owned by providers |

    | Transactional data | Events and transactions logs | Health information exchanges
    Claims data Expenses data | Structured in nature. May require preprocessing to
    become useful data |'
