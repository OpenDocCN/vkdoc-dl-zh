- fmt: '### Impact of the Findings


    The survey findings provided a stark view of public attitudes toward data sharing.
    Consequentially, to develop and maintain trust, credibility, and engagement, ultimately
    the development team made several enhancements to the digital tool, including
    the following:


    - Using an “as much data as required” approach to data collected so as not to
    dissuade users from engaging with the tool

    - Providing “simple” terms and conditions to users to ensure all data-sharing
    aspects are understood

    - Providing a mechanism for users to delete all of their data from within the
    digital app, separate from deleting their user profile

    - Providing reinforcement messaging at critical points along the foot-checking
    journey to re-iterate to whom data is visible, for how long, and which data is
    made visible

    - In-depth information on the security and privacy of all information


    Subsequently, the digital platform saw an increase in the number of participants
    completing the registration process by 213 percent.


    ## Evaluation of a Digital Intervention for the Self-Management of Type 2 Diabetes
    and Prediabetes


    *The following case study presents the impact of a primary care–delivered precision
    health tool.*


    Type 2 diabetes is a costly, chronic, noncommunicable disease expected to affect
    552 million people globally by 2030.^([^(107)](#fn107)) Globally, the burden of
    type 2 diabetes is estimated to exceed US $1.3 trillion.^([^(108)](#fn108)) In
    the developed world, individuals living with diabetes are managed by primary care
    teams, with medical consultation visits averaging less than 3 hours a year. Individuals
    are essentially on their own most of the time.^([^(109)](#fn109)) Because of this
    enormous gap between appointments, diabetes care is primarily dependent on personal
    self-management, which, if not performed, increases the risk of premature death,
    blindness, amputation, and kidney failure.^([^(110)](#fn110)) In reality, type
    2 diabetes self-management is neither easy nor straightforward and requires time,
    numeracy, and literacy skills.^([^(111)](#fn111))


    As with many noncommunicable diseases, lifestyle is one of the leading causes
    of prediabetes and type 2 diabetes, and improvements in parameters such as dietary
    composition, physical activity, and sedentary lifestyle are determinants for reducing
    the frequency of this type of pathology.


    Losing weight can provide significant health benefits, and losing excess body
    weight reduces the risk of type 2 diabetes, heart disease, osteoarthritis, and
    sleep apnea.^([^(112)](#fn112)) In addition, the maintenance of reasonable blood
    glucose control has benefits for patients, with every 1 percent (6.2 mmol/mol)
    reduction in hemoglobin A1c (HbA1c) contributing to a 43 percent reduction in
    the risk of amputation, 14 percent reduction in risk of myocardial infarction,
    and 37 percent reduction in risk of microvascular complications.^([^(113)](#fn113))


    A recent systematic review and meta-analysis of published and unpublished randomized
    trial data evaluating low-carbohydrate diets (<130 g/day or <26 percent of a 2000
    kcal/day diet) and very low–carbohydrate diets (<10 percent calories from carbohydrates)
    for at least 12 weeks in adults with type 2 diabetes found that based on moderate-
    to low-certainty evidence, patients adhering to a low-carbohydrate diet for six
    months may experience remission of type 2 diabetes without adverse consequences.^([^(114)](#fn114))


    Integrating digital technology into primary care can increase access to care,
    improve patient outcomes, and decrease costs. Digital technology, including smartphone
    apps, can potentially augment and extend the reach of health services through
    self-management support impacting lifestyle behaviors.^([^(115)](#fn115)) Smartphone
    apps have been demonstrated to improve glycemic outcomes in people with type 1
    and type 2 diabetes.^([^(116)](#fn116)) Although there is evidence to the contrary,
    of the 23 studies analyzed in the systematic review published by Schoeppe et al.
    on the efficacy of apps in improving lifestyle, smartphones were seen to have
    a favorable impact on food habits in only five studies. They resulted in increased
    physical activity in nine studies.^([^(117)](#fn117)) Even though recent systematic
    reviews have concluded that Internet and mobile interventions can improve lifestyle
    behaviors, most studies had at most 3 to 6 months of follow-up, which emphasizes
    the need for research in long-term interventions.^([^(118)](#fn118))


    Interventions providing low-carbohydrate or very low–carbohydrate programs have
    been clinically demonstrated to support improvements in weight, blood glucose,
    and demedication.^([^(119)](#fn119),) ^([^(120)](#fn120)) Further still, the diets
    are associated with improvements in acute and chronic pain, depression, anxiety,
    and stress.^([^(121)](#fn121),) ^([^(122)](#fn122),) ^([^(123)](#fn123))


    Long-term studies of low-carbohydrate dietary approaches to treat type 2 diabetes
    and obesity are limited, particularly those delivered and supported remotely.^([^(124)](#fn124))


    ### Objectives


    With therapeutic carbohydrate restriction demonstrating significant benefits in
    improving symptoms of chronic disease, this real-world study was conducted to
    evaluate the effectiveness of a digitally delivered digital therapeutic intervention
    at 12 months on the maintenance of glycemic control for NHS-recruited patients
    at Norwood Surgery in Southport, United Kingdom.


    ### Methods


    We used a single-arm pre-post-intervention study design. Participants were not
    paid for participation and were given access to the program for free. Participants
    provided informed consent regarding their anonymized data being used for analysis
    and publication.


    Participants were recruited from an NHS primary care setting—Norwood Surgery in
    Southport, United Kingdom—between April 19, 2018, and August 19, 2019. Patients
    aged 18 years or older with a confirmed diagnosis of type 2 diabetes or prediabetes
    who presented for any reason during the recruitment window were eligible for signposting
    if the consulting healthcare professional felt appropriate.


    Patients who accepted signposting were given a Low Carb Program referral card,
    which patients redeemed on the app or website. To have broad applicability to
    a nonclinical trial setting, the only de facto exclusion criterion was the inability
    to understand English. One hundred referral cards were provided to the NHS general
    practice in Southport. A total of 45 participants signed up, and all were followed
    for 12 months. The characteristics of the 55 participants who declined the referral
    card were not recorded.


    For a baseline, participants recruited to the Low Carb Program input their type
    of diabetes, year of diagnosis, most recent HbA1c test result and date, age, gender,
    socioeconomic status based on household income, and presence of comorbid chronic
    illnesses at sign-up. At 12 months, participants were again asked to report on
    their current HbA1c level and weight.'
