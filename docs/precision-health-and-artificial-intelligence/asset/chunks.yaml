- fmt: '### Digital Transformation


    Precision health is an ambitious healthcare approach that dynamically connects
    research and practice, medicine, population, and public health. Coordinated efforts
    in developing clinician digital literacy standards, training, upskilling, and
    confidence are required to realize the approach. However, most clinicians are
    already overburdened and experiencing burnout, fueled by the COVID pandemic and
    recovery.^([^(31)](#fn31)) One would theorize that digital transformation is best
    suited to a dedicated team that augments existing clinical deliveries rather than
    adding additional burden to already busy and overworked clinicians whose area
    of expertise is unlikely in the implementation of digital health solutions. A
    dedicated team could comprise nonclinical specialists whose sole activities are
    to augment the digital transformation ambitions. The paradigm is similar to that
    seen in digital health, where digital care practices supplement traditional care
    rather than replace it.


    Multidisciplinary digital transformation teams allow stakeholders to focus on
    their key competencies, reduce unnecessary burdens, and provide a collaborative
    approach to digital health implementation.


    With life expectancy declining, precision health facilitates new ways of living
    well, moving from a reactive to a proactive healthcare model. Table [2-1](#535410_1_En_2_Chapter.xhtml#Tab1)
    highlights core changes in the shift to a proactive precision health approach.


    **Table 2-1** Key Changes in the Shift from a Reactive to a Proactive Precision
    Health Approach


    | Reactive Medicine | Precision Medicine |

    | --- | --- |

    | Symptoms-based response<br>Disease management<br>Few measurements<br>Organ-
    and disease-centric<br>Symptom-focused therapy<br>Clinician led | Proactive and
    preventative, pre-symptom biomarker response<br>Lifestyle health management<br>Multi-measurement,
    holistic<br>Systems-centric<br>Disease mechanism–focused therapy and intervention<br>Collaborative
    relationship |


    As the adoption of precision health technologies rises, so too will improvements
    in health outcomes, costs, and understanding.


    ## Applying Precision Health: The P5H Precision Healthcare Continuum


    The focus of healthcare in a precision health continuum is wellness, an optimal
    state of health, which acts as a core tenet in catalyzing healthcare’s shift from
    volume-based to value-based care. ^([^(32)](#fn32))


    Figure [2-3](#535410_1_En_2_Chapter.xhtml#Fig3) illustrates the P5 healthcare
    continuum (P5H) model, adapted from the P4H model proposed by Sagner et al. to
    provide a population-level approach.^([^(33)](#fn33))


    ![](images/535410_1_En_2_Chapter/535410_1_En_2_Fig3_HTML.jpg)


    A chart classifies the two components of P5H such as intervention level and stage
    of health that focus on wellness. The health stage contains allostasis, allostatic
    load models, and multimorbidity. The intervention level has four levels, namely
    global and national, community-based, individual and family unit, and system specific.
    The shift of healthcare from a reactive model to a proactive model is present
    at the bottom.


    **Figure 2-3** P5 healthcare continuum (P5H) model that seeks to optimize wellness
    (P)


    The two central components of the P5H continuum consist of health stage and intervention
    level, with the primary objective of optimizing patient well-being or wellness.


    The P5H framework focuses on promoting wellness, detecting and reversing disease
    transitions, and maintaining an optimal state of wellness.


    ### Health Stages


    Within the P5H framework, one can understand a person’s state of health through
    the allostasis and allostatic load models. *Allostasis* refers to the ability
    to achieve equilibrium through the change of stress-specific stimuli, essentially
    referring to the process of adapting to daily experiences and achieving homeostasis
    through change.


    Through the allostasis model, the chronic disease pathway and transition from
    states of health to chronic disease can be divided into four categories.


    *Allostatic* load and overload are changes in the mind and body that occur when
    experiencing harmful stress that can cause dysfunction and dysregulation of mediators
    that usually promote homeostasis, ultimately leading to disease. Adverse health
    behaviors such as a sedentary lifestyle and smoking contribute to allostatic load
    and overload.


    Despite advancements in modern medicine, many individuals who exhibit symptoms
    will transition to a confirmed chronic disease diagnosis. Once stage D has been
    reached and a chronic disease diagnosis confirmed, there is usually some degree
    of permanent physiologic damage or dysfunction. For example, a heart attack, stroke,
    cancer, or other long-term diseases will leave permanent damage and dysfunctions
    that typically require lifelong treatment and self-management. However, this is
    not true of all conditions, such as type 2 diabetes, which have been successfully
    reversed or placed into remission after significant long-term dysfunction.


    #### Stage A


    Stage A refers to a healthy individual exhibiting healthy lifestyle characteristics
    such as regular physical activity, no smoking, a nutritious diet, and no alcohol
    misuse, and possessing key health biomarkers such as blood glucose, blood pressure,
    and blood lipids within normal range. As molecular assessments become available
    for a broader population, the definition and characterization of apparent health
    in stage A will become more precise and detailed.


    Moving from allostasis to a pre-chronic disease state (stage B) is often unnoticed
    until the signs of chronic disease risk become imminent.


    Through the accumulation of stressors or allostatic load, a person moves from
    stage A to stage B. The `-omics` technologies are helpful in stage A to determine
    genetic disposition to a disease before signs of allostatic load and clinical
    biomarkers exhibit.


    #### Stage B


    Stressors manifest as noticeable signs or biological expressions of disease. Diagnostic
    testing can detect early disease and biological dysfunction indicators, but the
    individual is often unaware of them. Examples include elevated blood glucose levels
    (i.e., prediabetes), hypertension, and high blood cholesterol. Chronic inflammation
    is an important sign of disease risk. In this approach, lifestyle habits such
    as engaging in below-normal levels of exercise and excess body weight would be
    considered signs of increased chronic disease risk.


    Patients at stage B can benefit from preventive interventions to eliminate stressors
    and return an individual to stage A. In the absence of this, a patient’s health
    will increasingly worsen.


    #### Stage C


    Healthcare delivered today is typically initiated when patients present with disease
    symptoms, or stage C, frequently treating the symptoms of disease rather than
    its underlying causes and dysfunction-causing mechanisms. Volume-based healthcare
    perpetuates this reactive cycle, where symptoms typically worsen without direct
    intervention until the allostatic overload reaches a threshold and chronic disease
    is diagnosed.


    #### Stage D


    At stage D, chronic disease is diagnosed, and treatment ensues. Traditional healthcare
    is delivered and uptitrated with pharmacotherapy, surgery, behavioral change,
    and other interventions used to manage chronic disease. Even at this stage of
    health, patients in a precision health model can improve their prognosis, clinical
    status, and quality of life. Environmental and behavioral factors are modifiable
    risks that directly impact wellness.^([^(34)](#fn34))'
