  trans: '

    # 传感器


    智能传感技术能够为临床服务提供巨大价值，并深入洞察个体的健康状况。传感器分为两类：可穿戴传感器与非可穿戴传感器。


    目前超过 40%的美国消费者拥有可穿戴设备。^(³⁹) 可穿戴技术正变得越来越普及、经济且精密，已超越时尚配饰和活动追踪的范畴。可穿戴传感器在地理定位和健康信号方面具有更高的准确性；然而，它们通常比非可穿戴传感器更具侵入性，后者侵入性较低，且能在家庭、工作、休闲区域和交通等环境中监测活动，而不会干扰个体的日常生活。


    随着传感器变得更小、可植入、可生物降解并保持持续连接，它们在患者护理中扮演着日益关键的角色。其结构化数据非常适合研究、机器学习和分析，如图 3-2 所示。


    ![](img/535410_1_En_3_Fig2_HTML.jpg)


    一幅插图展示了物联网如何在精准医疗中得到广泛应用。顶部是一个佩戴可穿戴传感器的人体示意图。底部展示了物联网的示例，如互联的家庭、工作和车辆。


    **图 3-2** 精准健康中的智能传感器应用


    5G 通信的普及正在推动智能护理的发展。家庭、工作场所、交通和城市区域内的传感器可以捕获并传输数据，包括行为、位置、互动和通信。虽然这也会让人联想到奥威尔式的未来，但利用实时健康和行为数据来优化个人健康状态的力量不仅具有革命性，而且正逐渐成为现实。


    # 数字表型


    当可用的健康和行为数据与社交平台及其他互动相结合时，通过一个支持精准健康以及健康（反之亦然，疾病）数字表型的数据密集型环境，就能更全面地理解行为和社会领域。


    由于为社交媒体上的食物拍照日益流行，营养师现在可以利用来自健康应用或社交媒体的食物图片，比食物日记或标准化问卷更精确地了解饮食习惯。同样，社交平台的使用已被用于预测焦虑和抑郁的风险。


    来自非传统领域的数据使用使数字医疗能够更好地理解人类健康及行为的影响，尽管这些数据有时并不能完全反映实时的健康状况。例如，心率变异性（`HRV`）作为压力的标志，可通过可穿戴设备收集，并用于优化药物摄入。


    数字表型是指通过个体与电子硬件和软件互动所产生的数字数据来推断其行为的过程。^(⁴⁰,) ^(⁴¹) 当被确定为具有临床相关性时，数据的力量可以提供对个体生活方式、社会人口学特征、心理状态和环境的洞察。这种形式的数字表型已在精神病学和
    2 型糖尿病领域被证明是成功的。图 3-3 以图表形式展示了深度数字表型。


    ![](img/535410_1_En_3_Fig3_HTML.jpg)


    该图展示了深度数字表型的关系。底部，过程始于新患者，分为特征评估和选择相关数字孪生，通过生成的数字数据，最终导向精准健康。数字表型包括可穿戴设备、社交媒体和数字生物标志物，而深度表型则包括生物学、遗传学、临床和健康记录。


    **图 3-3** 深度数字表型


    # 数字孪生


    许多行业已使用仿真和 3D 建模来开发和测试新产品。例如，汽车行业很少再进行物理碰撞测试，因为这些测试现在主要在虚拟环境中进行。然而，在医疗保健领域，使用需要提供患者情况完整图像的
    2D 图像仍然是常见做法。由于现在有更多数据以数字形式可用，将当前标准转换为 3D，使得其他行业行之有效的做法得以应用：数字孪生。


    医疗保健行业正在采用数字孪生来改善个性化医疗、医疗机构绩效以及新药和医疗设备。IBM 将数字孪生定义为“一个对象或系统的虚拟表示，它贯穿其生命周期，根据实时数据进行更新，并利用仿真、机器学习和推理来辅助决策。”^(⁴²)


    对自然物体和过程的数字映射允许对身体部位、单个器官或整个人体进行虚拟分析。当今的数字孪生可以由基于可穿戴设备信息、临床数据、组学数据和行为的模型组成，为患者和临床医生提供赋能反馈。此外，通过使用真实患者数据训练模型，可以在与实体对象相同的条件下模拟结果。虽然数字孪生在医疗保健领域仍是一个相对较新的概念，但随着数据连接、人工智能和
    AR/VR 的进步，数字孪生领域正在迅速扩展。意识到“一刀切”的医疗保健方法效率低下，人们越来越支持将数字孪生从孤立的研究项目扩展到大规模个性化，正如当今客户数据和广告平台所熟悉的那样。


    数字孪生将是一个虚拟患者，其与临床就诊时遇到的新患者具有相似或接近的特征，并且其健康状况、并发症风险和疾病进展是已知的。在不久的将来，每位患者都将拥有一个数字孪生，这是通过深度数字表型获得的，由其最接近聚类组的平均特征表示。我们正在从通过`HbA1c`和空腹血糖水平来代表糖尿病患者，转向实时数据分析，从而能够区分糖尿病的亚临床类型。不久之后，我们将拥有个体的深度数字表型，包含数百万个数据点，涵盖临床、生物学、遗传学、社会学、心理学、通信和真实世界数据，这将彻底改变我们理解健康和疾病的方式。


    计算机科学、行为心理学、生物信息学和流行病学是核心主题。从多组学方法到无监督深度学习算法，再加上适当的计算能力，我们现在拥有了合适的工具来处理信息的多样性和数量，并从粗略分层的群体转向由众多特征定义的精细小群体。


    # 数据挑战


    如今，有越来越多可靠、实用且可操作的健康行为、心理健康、患者偏好和健康社会决定因素的衡量标准，这些可以扩展有价值数据的范围，以构建信息更全面的个性化健康治疗方案。


    通过收集并基于这些因素快速总结关键结果，患者和医疗服务提供者可以就医疗保健方案做出更共同知情、更个性化的决策。要实现这一点，仍需克服若干关键障碍。

    '
- fmt: '### Measurement and Completeness


    It is essential to consider the completeness of available data, inaccuracies,
    and imprecisions in self-reported data that can significantly skew results at
    both the individual and population levels. Missing data is a potential entrance
    for bias within a system.


    Additionally, until very recently, patient-reported measures have been regarded
    as unscientific or impractical to use in real-world healthcare. Nonetheless, recent
    research has shown that clinicians can efficiently collect patient-reported health
    behavior, mental health, and preference data with little deviation from clinically
    collected data.^([^(43)](#fn43))


    ### Lack of Data on Social Determinants of Health


    The social determinants of health have a huge impact on whether a patient will
    engage within healthcare. Research has demonstrated that the social determinants
    of health have approximately twice the impact on healthcare access and outcomes
    than medical intervention.^([^(44)](#fn44),) ^([^(45)](#fn45)) As access to healthcare
    data at scale becomes viable, ensuring that data on social and environmental determinants
    of health such as ethnicity, gender, education, co-morbidities, income, employment,
    literacy, and neighborhood is linked to biomedical data will contribute significant
    improvements in healthcare for people and populations.


    Examples of technologies that address social determinants include behavioral change
    platforms and wellness programs that cater to ethnicity, gender, race, religion,
    and language. While positive signs are emerging in addressing social determinants
    of health, the challenge remains the scarcity of available data.


    ### Privacy and Security


    The collection and use of health and nonstandard data, such as point-in-time ecological
    assessments via social media or GPS monitoring, raise serious privacy, security,
    and ethical concerns. Many healthcare services have rapidly digitalized during
    COVID to maintain continuity of care. Data collection and dissemination provided
    critical support for defending against the spread of the novel virus since the
    beginning of the pandemic. However, more needs to be known about public perceptions
    of and attitudes toward data use, privacy, and security.


    A recent study in 2022, which sought to understand better people’s willingness
    to share data, received 4,764 responses showing the public attention on the topic.^([^(46)](#fn46))
    More people are more comfortable sharing anonymized data than personally identifiable
    data. People reported feeling comfortable sharing data that we’re able to benefit
    others; 66 percent would share personally identifiable data if its purpose were
    deemed beneficial for the health of others, and 63.9 percent would consent to
    share personal, sensitive health data with government or health authority organizations.
    Nevertheless, there were serious concerns over data use.


    More than a quarter of respondents stated that they did not trust any organization
    to protect their data, and 54 percent reported concerns about the implications
    of sharing personal information. Alarmingly, just under two-thirds of respondents
    noted concerns about the provisions of appropriate legislation that seeks to prevent
    data misuse and hold organizations accountable in the case of data misuse. Data
    owners (people using services) are increasingly crucial to ethical and regulatory
    aspects regarding data security, privacy, and trust.


    It is challenging to safely aggregate and anonymize data while preserving all
    of the multidimensional statistical properties and relationships that exist within
    it. Regardless, privacy must precede the sharing and exchange of data between
    organizations. Privacy could take the form, for instance, of synthetic or anonymized
    data that researchers can share freely and algorithms that protect individual-level
    identification. Academia, organizations, governments, and regulators have more
    to do to engage the public with ethical and transparent data sharing.


    Transparent research, including informed consent, co-developed patient and clinician
    solutions, and engagement between stakeholders at each step of the product lifecycle,
    is required to build trust as digital phenotyping goes past traditional data sources
    and consumes a variety of big data for large and varied populations. The nascency
    of legal guidance in this area suggests a need for humanitarian guidelines for
    data responsibility during disaster relief operations such as pandemics and for
    involving the public in their development.


    ### Cost


    Precision entails an emphasis on data that is not conventionally tied to health
    and illness, as well as a focus on genetics. However, regardless of the health
    system, resource cost must be considered as a significant variable in precision
    medicine. Health monitoring can quickly become costly, so cost-effective strategies
    must be identified and implemented throughout the care continuum.


    For instance, while there are static biomarkers (e.g., a specific genetic variant),
    others change over time and need to be evaluated periodically. Ideally, many markers
    can predict future health status with high precision; researchers should identify
    a cost-effective set to guarantee the same performance with minimal burden. It
    is reasonable to suggest that there will, at some point in the future, exist sufficient
    data to provide an almost complete picture of precision health for an individual
    without requiring anything more than genetic and lifestyle data. The challenge
    will be to achieve that without exorbitant cost.


    ### Disconnected from Data


    While people may have access to their wearable and device data through services
    such as `Apple Health` or `Google Fit`, they still need to be in control of their
    medical data. Electronic health record systems and data repositories stand isolated
    and do not exploit the benefits of connected care.


    ### Limited Adoption of Common Data Models


    Data harmonization is a massive digital challenge, and future standards must continue
    to promote shared understanding for precision care to be realized. There is a
    requirement for unified structural and semantic representations and data models
    to encourage interoperability and connectivity between health ecosystems. However,
    no such model exists entirely, with a broad range of data models and terminology
    used within nations, vendors, and internationally, with some organizations without
    data standards.


    `OpenEHR` is an excellent example of a standard data model in the nascency of
    being adopted across large-scale healthcare services. The platform provides a
    product and vendor-neutral structured method for defining health data, data content,
    and terminology that enables care participation, coordination, and collaboration.


    ### Expanding Beyond Qualitative Data


    Most developments within precision health have been focused on -omics and device-driven
    historical data that is used to train predictive algorithms. Precision health
    has become synonymous with quantitative research, with very little focus on qualitative
    health data yet to be utilized in precision health research. Excluding qualitative
    data, mainly unstructured data may need to include the most precise and informative
    data on human behaviors, opinions, and details of people, among other contextual
    factors.'
