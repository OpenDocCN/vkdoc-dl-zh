  trans: '

    # 数字健康教育


    对一些人来说，新冠疫情带来的数字化转型是福音；对另一些人而言，这却是个诅咒。越来越多的人和环境实现了数字连接，地方当局、慈善机构和政府甚至为有需要的人提供了移动设备和移动数据。随着患者寻求自我健康管理，健康应用的使用也急剧增加。患者管理从健康应用发展到提供远程咨询和数字健康解决方案。虽然人们的态度主要受数字素养、可及性和培训的影响，而这些因素似乎与年龄相关，但无论公众如何理解，这无疑凸显了对最新数字健康教育的需求。


    尽管数字健康缺乏正式定义，但一些可接受的建议（例如美国食品药品监督管理局提供的）包含了健康信息技术、可穿戴设备、远程医疗和远程医学、个性化医疗以及一般健康等分类。表
    6-1 列出了数字健康教育的领域。


    **表 6-1** 数字健康教育的领域


    | 主题 | 描述 |

    | --- | --- |

    | 数字疗法 | 提供符合医疗器械定义的循证干预措施的软件（移动端、网页端或其他），包括精准行为健康干预。 |

    | 远程医疗 | 使用电信和数字通信技术来提供和促进健康及健康相关服务，例如医疗、提供者和患者教育、健康信息服务以及自我保健。 |

    | 可穿戴设备和传感器 | 可穿戴电子设备是可以佩戴或贴合在人体皮肤上的设备，用于持续、细致地监测人的行为，而不会干扰或限制用户的移动。 |

    | 数字生物标志物 | 使用硬件和软件实时测量生理数据，用于预后或诊断目的。 |


    在此背景下，数字健康教育旨在向医疗保健专业人员传授对数字技术（包括健康应用、人工智能和医疗系统中的可穿戴设备）实际应用的理解。数字健康教育至关重要，原因有很多，但最重要的是弥合患者的期望与医护人员或学生的教学之间的差距，以便能够实施并实现数字医疗的益处。


    ## 素养


    代际转变正在发生。千禧一代已成为过去，Z 世代正离开高中进入高等教育。Z 世代通常是数字原住民，接受技术在生活中使用，但不一定精通如何使用。X 世代和 Y
    世代通常对数字技术不太精通，并且构成了医疗队伍的重要部分。研究表明，老年人在数字素养方面通常有更实质性的培训需求。^(⁷¹)


    数字健康教育对于确保新入职和在职的医疗工作者具备数字素养是必要的，这样他们才能充分利用手头的工具。例如，临床医生不需要知道所有可用于手机的糖尿病数字疗法，但能够评估个体患者的需求，如临床病史和数字素养，从而为患者提出可行的建议。


    临床医生必须学会如何使用数据驱动的技术应用，并发展在医疗服务中运用精准健康工具的知识和技能。医生不可能承担所有的数据管理和分析责任，更不用说与患者的沟通了。人工智能在医疗中的应用旨在为临床医生提供更好、更快的见解，最终改善患者的生活。医疗保健专业人员必须能够使用和解读来自这些技术的信息，并具备应对可能出现的任何潜在挑战的能力。


    医疗保健提供者逐渐意识到，采用多个数字平台效率低下且成本高昂。许多医疗网络已经投资于提供各种服务或干预措施的数字平台（例如，虚拟病房或体重管理、心脏康复和糖尿病服务）。使用单一或最少数量的平台，提供跨健康领域的远程患者监测和数据分析，可以最大限度地减少部署成功技术所需的资源。精准医疗依赖于每个患者日益增长的分子遗传学、临床和生物学参数的异质数据，单个患者的医疗决策参数总数估计高达
    10,000 个。使用尽可能少的系统，使提供者能够实现相关收益，例如在员工培训、技能提升、实施和部署成本方面的可扩展效率。


    提高医疗工作者的数字素养也能增强他们对数字技术的兴趣。虽然这看起来可能不是数字健康教育的一个关键方面，但临床医生的冷漠和热情会直接影响患者对数字健康技术的参与度。研究表明，临床医生对数字健康技术的冷漠会影响患者的参与度。^(⁷²)


    ## 角色转变


    家长式的医患关系已转变为共享医疗决策的平等伙伴关系。医疗保健的数字化为护理人员和患者提供了获取大数据信息和认知洞察的途径，从而改变了医疗保健和临床工作流程。护理点已从诊所和医生转移到患者。


    基于经验的医学已演变为循证和以患者为中心的方法。临床医生需要接受教育，了解医疗保健专业人员角色的变化，以及数字健康技术如何支持更量身定制的以患者为中心的护理和临床决策，并减轻重复性任务，从而能够更专注于患者护理的其他方面。随着我们进入精准健康时代，数字健康教育将提供有关医疗保健信息平台和智能工具的知识，以及有效使用它们的技能。药剂师角色的变化证明了这一点，他们现在提供管理工具，促进获得护理，并为包括高血压、高脂血症、糖尿病和癌症患者在内的广泛人群提供干预措施。


    ## 质量


    证明精准健康技术影响和结果的证据至关重要。有数十万种数字健康技术，新技术将在研究和实践中不断涌现和消失。同样，大多数健康应用都未达到监管标准。^(⁷³) 数字健康教育将侧重于技术选择的框架，并教导学习者识别和评估新颖、创新、有影响力的技术。


    ## 能力


    临床护理的新方面需要正规的教学法。患者互动和电子职业素养必须与其他技能一起教授和评估，因为它们是数字健康的基础。数字健康技能包括通过虚拟互动进行适当的肢体语言和有效的患者沟通。同样，为了践行“不伤害”的格言，临床医生必须在数字健康使用、数据管理以及对技术和临床风险的认识方面接受充分的培训。风险包括数据和自动化偏见，即数据和算法可能在决策中反映人类的偏见，并且缺乏决策验证。

    '
- fmt: '### Accessibility and Equity


    A benefit of digital healthcare is that much of it is cloud-enabled. Enabling
    learners to understand how the cloud-based nature of communication facilitates
    accessibility will promote greater accessibility of health interventions for patients.
    For instance, a cardiac surgeon in Melbourne, Australia, could perform open-heart
    surgery on a patient in a remote hospital in Guam through the use of telecommunications,
    robotics, and the support of a facilitator at the scene. Precision health solutions
    that are accessible and impactful have a tremendous opportunity to foster health
    equity and achieve health promotion, prevention, and self-care.


    Training workforces to understand and use digital health technologies is critical
    to precision health’s success. Importantly, training could democratize skills
    and knowledge among healthcare teams. However, training is costly as no formal
    training processes currently exist. Better still, building digital health into
    university curricula would allow learners to better grasp digital health at large
    and understand the implications for clinical practice on graduation instead of
    a snapshot approach, which is limited in learning.


    ### New Forms of Training


    An aging population, chronic underfunding in staff development and retention,
    and the fallout from the COVID-19 pandemic (including the Great Resignation) have
    left many health systems facing healthcare worker shortages. In the United Kingdom,
    the NHS has declared a staffing crisis with more than 100,000 job vacancies, the
    United States is estimated to need 275,000 extra nurses by 2030, and Australia
    is predicted to have a nursing shortage of 123,000 by the same time.^([^(74)](#fn74),)
    ^([^(75)](#fn75),) ^([^(76)](#fn76)) The need for well-trained and qualified healthcare
    and social workers has never been greater.


    However, educating and training professionals to work in health and social care
    settings is complex and nuanced. Training and professional development for some
    staff groups are already scarce, and measures to control COVID infection rates
    contributed to a significant decline in face-to-face exposure to all aspects of
    training and experiences, creating additional barriers for educators.


    Immersive technology is a set of interfaces, applications, and software that create
    augmented simulations for experiences and perfect interactions between human beings
    and technology. These include virtual reality (VR), augmented reality (AR), mixed
    reality (MR), and 360° videos. In virtual reality, the user’s reality is replaced
    by an immersive, entirely digital environment; augmented reality (AR) overlays
    a digital or 3D environment in the form of objects, video, or data into the user’s
    environment; and mixed reality (MR) blends both physical and virtual environments.


    VR and AR are widespread; however, the hardware and development costs remain high.
    In contrast, mixed reality uses practical tools for realization, such as 360°
    videos. As the name suggests, 360° videos consist of video recordings made with
    a device able to simultaneously capture and combine scenes in a 360°-degree perspective
    and can be used with head-mounted hardware or on many mobile devices, which significantly
    enhances accessibility and scalability. The viewer can control and change the
    viewing angle at any stage through head movement. However, 360° videos typically
    lack some interactivity when compared to VR.


    Immersive technology has been shown to improve students’ understanding of learning
    material, learning experience, and knowledge retention and enable on-location
    virtual simulations that educators cannot teach in a traditional classroom setting.
    One study found a 230 percent improvement in knowledge retention when comparing
    immersive technology to traditional face-to-face teaching.^([^(77)](#fn77)) Immersive
    technologies lend themselves perfectly to educating patients and training future
    workforces. Importantly, immersive technologies provide invaluable experience
    of simulated events, ensuring confidence, skills, and knowledge. For instance,
    educators could teach social workers about caring for vulnerable people through
    simulation, similar to how an aspiring open-heart surgeon could learn to deal
    with the stress and pressure of a situation by being virtually present in the
    same room. Immersive technologies will support the training of more people to
    a better standard than face-to-face learning in a shorter time. The technology
    also helps healthcare workers to make fewer mistakes through simulation-based
    learning and data analytics to analyze one’s habits, behaviors, and responses
    within the simulation.


    ## Collaboration Between Academia and Industry


    Digital health remains a growing and challenging public health practice, and research
    methods still need to catch up with the pace of innovation. Digital health end-user
    engagement remains complex, demanding personalization and adaptive interventions
    that meet the needs of diverse populations. Less meaningful evidence and a lack
    of understanding of the efficacy and quality of digital health solutions have
    coerced academics and industry to partner. Academic-industry collaboration (AIC)
    offers a mechanism to bring disparate sectors together to alleviate digital health
    challenges of engagement, reach, sustainability, dissemination, evaluation, and
    equity.


    Educators, typically academic institutions or government-affiliated departments,
    are already partnering with digital health companies to teach about digital health
    and respond to the requirement for a deep understanding of digital health alongside
    the clinical curriculum.


    Despite the ongoing endorsements for transdisciplinary collaborations in digital
    health, a limited understanding of successful collaborations exists. Among ethical
    skepticism toward collaboration, barriers to collaboration include the initiation,
    maintenance, and sustainment of relationships. There are growing examples of successful
    collaboration between academia and industry in the digital health marketplace.
    Chapter [7](#535410_1_En_7_Chapter.xhtml) contains a case study of a successful
    partnership between a hospital network and a digital therapeutics provider.


    ## Summary


    The future of precision health rests on integrating the abundant technologies
    that lie before us and the knowledge and skills to use them in clinical practice.
    As hybrid care becomes more commonplace, so does the requirement not to lose the
    human touch. Collaborative academic research, clinical evidence, and policymaking
    must shape the domain of precision healthcare to ensure humanity’s best interests
    are protected. While future possibilities are constrained only by the technologies,
    devices, and data available, ethically implementing precision healthcare requires
    careful attention to validation, data interpretation, and protection of data privacy
    and security.


