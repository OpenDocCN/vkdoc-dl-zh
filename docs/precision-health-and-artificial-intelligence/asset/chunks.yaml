  trans: '

    ### 临床决策支持


    临床决策支持工具已应用多年。然而，其中许多工具仍是相对独立的解决方案，未能充分整合到医疗服务提供者所使用的临床护理点设备中。由人工智能主导的临床决策支持系统，能够基于生物医学影像数据预测特定医疗结果的发生概率或特定疾病的风险，从而改善对特定医疗状况的诊断、治疗和预后。大量研究表明，人工智能及其他分析工具能够准确预测肾脏疾病、识别乳腺癌，并预测白血病的缓解率。^(⁴⁹)
    人工智能系统已超越现有最先进的方法，并获得了美国食品药品监督管理局（FDA）对多种临床诊断应用的批准，尤其是基于影像的诊断。^(⁵⁰) 用于训练的大型数据集的可用性（例如大量带注释的医学影像集合或大型功能基因组学数据集），以及人工智能算法和用于训练这些算法的
    GPU 系统的进步，共同推动了这一生产力激增。


    凭借正确的数据、整合方法和团队，机器学习有潜力提升临床决策支持工具的实用性，并帮助医疗服务提供者提供最优的护理。开发算法面临的最大挑战是获取训练模型所需的大量数据，这些模型用于建议后续治疗步骤、标记潜在风险，并提高服务效率和能力。


    ### 行为改变干预与生活方式医学


    数字疗法是指针对患者的、基于证据的治疗性干预措施，用于预防、管理或治疗某种医疗状况或疾病。数字疗法通常被视为移动应用程序，但越来越多的产品可在多个平台上使用。^(⁵¹)
    数字疗法与更通用的健康和健身应用程序的区别在于其临床分类、明确的目标受众、经过验证的研究成果以及实际影响。面向患者的数字健康应用程序通过更有效地传递健康信息、更好地监测健康指标以及鼓励改变生活方式行为，为改变个人承担自身健康责任的方式提供了机会。多项系统综述表明，基于应用程序的干预措施可以改善饮食、增加身体活动并减少久坐行为。^(⁵²)
    然而，仍需进行对照试验来确认多组分干预措施是否比单一应用程序更有效。


    鉴于大多数疾病风险源于可改变的风险因素，通过数字疗法提供的精准行为改变和生活方式干预措施，在促进公共卫生预防工作方面具有巨大潜力，能够成功且高效地提升人群健康水平、控制医疗成本并消除健康不平等。对大多数人而言，改善健康的关键并非基于对你的基因组测序、分析你的微生物组或监控你的智能手机所得出的似是而非的结论而制定的饮食或锻炼计划。相反，关键在于弄清楚如何在采纳和维持积极的健康行为时保持动力。


    以治疗性干预、行为改变指导、生物医学数据反馈和传感器为形式的精准行为改变和生活方式干预，使得健康管理能够真正以患者为中心、聚焦解决方案且精准无误。重要的是，精准行为改变干预措施已被证明是有效的。^(⁵³,)
    ^(⁵⁴) 大量研究表明，精准健康平台能够吸引不同文化背景的人群参与，提供与面对面护理等效的护理服务，并改善生活质量和促进体重减轻。^(⁵⁵)


    行为改变平台可以随时支持人们在现实世界和虚拟世界中学习和养成健康习惯，利用传统的平台内体验以及沉浸式虚拟和增强现实体验来强化学习并维持行为改变。^(⁵⁶)
    平台会以量身定制的方式持续引导人们过上健康的生活，从而最大限度地提高实现健康目标或达到目标测量值的可能性。目前，大多数精准健康行为改变干预措施依赖于人工主导的低技术个性化方法，并且仅依赖数据规则；大多数平台仍未充分考虑人们的行为与社会及环境背景之间的相互作用。随着行为改变干预措施的改进，它们将越来越多地超越仅根据当前行为和人口统计数据进行个性化的范畴，并实时考虑个体的基因图谱、社会及环境背景。


    对肥胖疗法的反应存在高度个体差异，这证明了为个体患者选择最合适的治疗策略是合理的。一个精准的肥胖解决方案将结合基因检测、环境相互作用、表观遗传学、代谢组学、微生物组、药物基因组学、营养遗传学、营养基因组学和深度数字表型分析，并辅以全面的行为改变干预措施，以支持依从性、健康优化和远程监测。


    根据我个人的经验，采纳行为改变干预措施的最大阻力来自于决策路径中的利益相关者，他们对激励人们参与并维持干预措施持批评态度。许多医疗保健提供者曾尝试过针对吸烟、减肥和身体活动的激励计划，但往往以失败告终。传统的医疗保健系统对此持怀疑态度，并且不知道如何改变健康行为。然而，数字参与与健康促进活动的参与是不同的。通过了解人们的基本测量数据（如年龄、性别和种族）来以数字方式吸引他们相对简单。通过对大型数据集进行机器学习，我们可以理解那些表现出相似深度数字表型的人的行为和模式，从而最大限度地提高即使是最缺乏动力的人群的参与度和长期依从性。

