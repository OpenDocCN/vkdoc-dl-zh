- fmt: '### Transparency and Accountability


    AI and technology are already influencing people’s daily lives. Precision health
    system decisions will significantly impact patients’ health and lifestyle as technologies
    become more complex and sophisticated. Therefore, individuals engaging with precision
    health systems must understand how they make decisions. However, transparency
    goes beyond explaining a system’s results. Transparency includes the following:


    - Teaching clinicians and patients how to use the results

    - Understanding system limitations

    - Minimizing undue stress and reliance


    As precision health systems become embedded in the prediction and diagnosis of
    disease and the selection of treatment options, the themes of accountability and
    liability require attention. Clinicians must understand the clinical justifications
    behind recommendations from precision health systems. As highlighted, system outputs
    may be technically relevant but may not always be clinically relevant to a particular
    individual, so clinicians must exercise their professional discretion. Transparency
    and accountability are pillars of reliability, fairness, and safety.


    Developers of precision health systems must bear proportionate accountability
    for how systems operate, and providers that deploy systems in clinical practice
    should exercise consideration when integrating them into clinical practice.


    ### Lawfulness


    Legislation and guidelines already minimize many of the risks associated with
    precision medicine. However, this is an evolving theme. If the benefits of precision
    medicine are realized, the ethical principle of justice would require universal
    access to precision medicine for all people. Improvements in patient education
    must significantly enhance the potential for autonomous patient decisions. In
    any case, clinicians must use the highest possible level of data security and
    communication guidelines to avoid harm from test results. Additionally, providers
    should further examine the cost-effectiveness of precision medicine to prevent
    malinvestment.


    A novel area of lawfulness is the liability of AI systems. Most liability frameworks
    place the onus on the end-user clinician, provider, or another human who caused
    harm. With AI, however, errors may occur without any human input at all. Thus,
    the clinical liability framework requires adjusting accordingly. While providers
    are responsible for utilizing regulated and demonstrated technologies, deficient
    liability policies will ultimately prevent patients from realizing the benefits
    of precision health. Finally, liability for negligence would lie with the person,
    people, or entities who caused the damage or defect or might have foreseen the
    product being used in the way that patients used it. Liability needs to be clarified
    as many parties are involved in AI system development (such as data providers,
    developers, and the AI system itself), making liability even harder for establishing
    when something goes wrong.


    ### Data Privacy and Security


    According to professionals and patients, the collection of health data carries
    a high risk of misuse.^([^(65)](#fn65)) AI-driven precision health systems should
    be safe and secure and respect privacy. Data privacy and sharing are critical
    themes in a precision healthcare model. However, one only has to look at the hacking
    of global institutions such as Opus, Telus, and Babylon to see that privacy cannot
    be guaranteed. The biggest hack in history occurred in 2022, when Optus, the Australian
    communications giant, was compromised by an unsophisticated attack that exposed
    one in three Australians to potential identity theft and fraud. Within hours,
    a sample of the data was made available on the dark net.^([^(66)](#fn66))


    While data confidentiality is realized through technological advances, people
    remain suspicious of whether the people entrusted with confidentiality can guarantee
    data security. Regardless of how intelligent or not systems may be, hackers are
    only getting smarter.


    The willingness to participate in research and provide genetic information, lifestyle,
    environmental, or medical data also varies. It is also significantly affected
    by concerns about data security. Research has shown people are highly willing
    to donate data and participate in real-world and digital trials, but trust in
    professionals, costs, counseling about test results, and privacy persist. The
    primary concern isn’t just hackers; patients and professionals alike are concerned
    that genetic data could find its way into the hands of insurance companies and
    employers, resulting in genetic discrimination. Genetic information must be integrated
    into electronic health records for precision healthcare, making the data even
    more valuable and vulnerable to cybercriminal attacks.


    Data scientists must therefore give data security high priority. Many advise that
    researchers should limit the collection and linking of genetic, environmental,
    or lifestyle data to necessary information. However, regulators will only allay
    stakeholder fears by creating protections for health. Genetic information providers
    can access and ensure that genetic discrimination is outlawed like it is for sex,
    disability, and race. Providing penalties for those compromising systems that
    are proportionate to the acts or crimes committed is vital.


    Data sharing is necessary to advance research and develop new tests and therapies.
    Yet despite its importance, there are many barriers still to overcome. For instance,
    how much data is too much data? Take religion and spirituality in healthcare,
    where little attention has been given to the unique context of religion and spirituality
    and their applicability to precision medicine. Patients’ faith is already recognized
    as a relevant clinical practice consideration to provide more salient and efficacious
    treatment, particularly in mental health, end-of-life care, and organ donation.
    Taking into account religious beliefs and practices will most likely result in
    more effective treatment.


    Data sharing has important implications for individual and group privacy and confidentiality.
    For example, in the context of inherited cancers, is there a clinical duty to
    warn family members who may develop a particular genetic disease? Because genetic
    information is confidential to families rather than individuals, clinicians could
    share information about a genetic disposition with all at-risk family members.
    Current laws and regulations need to provide a clear answer, with arbitrators
    coming to inconsistent conclusions regarding a clinician’s responsibility to transparency.'
