- fmt: '### Health Equality


    Medical care received by a patient in treating a disease plays a minor role in
    someone’s overall health outcomes. Precision healthcare, which lends itself to
    digital tools, enables more accessible solutions that improve accessibility to
    communities that are typically hard to reach. While it can be complex, co-designing
    technologies with service providers and service users is crucial to mitigate inequalities.
    Apps such as `Gro Health` provide patient-centered or citizen-centered, cardiometabolic,
    and mental health interventions in 19 languages, demonstrating higher acceptance
    from ethnic minority communities compared to Caucasian counterparts.^([^(24)](#fn24))


    Digital exclusion is an eminent topic in precision healthcare. People who are
    digitally excluded may lack the skills, confidence, and motivation to use digital
    tools, along with not having access to suitable equipment and connectivity. Digital
    exclusion may occur for many reasons, which stakeholders can identify through
    analysis of the social determinants of health. While inequalities are mitigated
    for people with visual impairments, hearing impairments, accessibility difficulties,
    and non-English-speaking populations, digitally excluded populations represent
    a tenth of the population that often has more costly medical needs.^([^(25)](#fn25))
    Although this population is decreasing slowly, the COVID pandemic pushed almost
    everybody online, and new technologies, such as private 5G networks, enable connected
    device use in rural areas. In many rural areas, initiatives are focused on embedding
    pervasive communications within communities and layering health and social care
    services on top of this.^([^(26)](#fn26))


    ### Unfulfilled Power of Data


    The distributed nature of clinical systems means that patient data is fragmented,
    and there is little coordination between healthcare providers. For instance, patients
    moving from border localities often have to re-register with clinical services
    that do not have access to the same patient information. The unification of patient
    data will take some time to accomplish. Nevertheless, data linkages are seeing
    positive progress with technologies such as `FIHR`, `API`, and `SSO` that facilitate
    protocols and standards for data sharing, storage, and communication.


    Enabling a patient to store and control their own data (that is, any piece of
    data that is about or refers to a patient) is the pinnacle of data governance
    in precision health, putting the patient in control and taking the onus away from
    healthcare providers. Precision health continuously tracks data and actively applies
    it to the current moment to detect disease earlier, further personalize treatment,
    and prevent health deterioration. Availability and understanding of analytics
    to use the insights generated by the data collected will further facilitate service
    optimization and efficiencies.


    While data linkages predominantly focus on structured medical data sources, unstructured
    data such as emails, text messages, WhatsApp messages, audio notes, Facebook posts,
    Twitter tweets, and other social media posts are a treasure trove of information
    and insight that have been demonstrated to be predictors of health status but
    are not currently used within healthcare.^([^(27)](#fn27))


    ## Engagement


    Precision health works only if both clinicians and patients are engaged. While
    the relationship between clinician and patient has become more collaborative and
    patient-centered, clinician engagement remains crucial. Research shows that clinician
    apathy can affect patient engagement in health apps.


    Awareness is a critical piece regarding the benefits of digital and precision
    health. Awareness serves not only the purpose of showcasing technologies and their
    benefits but also the use of data and its potential implications. Training clinical
    teams and patients to use digital technology is required to prevent inadequate
    or incorrect treatments and understand the barriers to accessing support for digitally
    excluded patients, which is vital to provide democratic, accessible services.


    A core tenet of precision health and value-based healthcare is patient-centered
    care, which ultimately serves the patient only if they engage. Engagement is akin
    to how a medication works if patients adhere to their medication regime. Digitally
    delivered behavioral change support has been demonstrated to actively engage and
    maintain patients in positive habits and behaviors such as healthier eating, more
    activity, better sleep, and improved mental health.^([^(28)](#fn28),) ^([^(29)](#fn29))
    A mobile health app co-developed by a clinical hospital obesity team and its patients
    to provide behavioral change support for patients diagnosed with severe and morbid
    obesity showed significant improvements in self-reported health status after 12
    weeks of use. There is a massive demand for health and well-being solutions that
    demonstrate clinical efficacy. However, long-term engagement has been shown only
    in a few applications and requires further long-term research.


    ### High Touch Means High Tech


    Technology and attention are required to make precision healthcare a reality.
    High-touch, high-intensity healthcare has been shown to improve health outcomes
    and lower costs. The use of apps, devices, and wearables to collect data and provide
    behavioral support and real-time clinical and patient decision support mechanisms
    is well demonstrated. A recent peer-reviewed study showed a digital health app
    used by patients with severe obesity within a hospital-based obesity service during
    COVID provided superior care compared to the hospital’s traditional face-to-face
    dietetic supervision when delivered alongside remote appointments. The cost of
    digital interventions is far less than conventional face-to-face care, enabling
    greater scales of impact and economy.^([^(30)](#fn30))


    A high-touch, high-tech approach utilizes advances in technology and data to unlock
    information about healthcare efforts within populations, allowing for better targeting
    of those efforts.


    ### Phenomics


    Phenomics refers to the changes in an organism that result in phenotype variations
    during its life span, or, in other words, a set of phenotypes on a genome-wide
    scale that broadly deals with an organism’s physical and biochemical traits. A
    personalized therapeutic strategy could theoretically suit someone’s biological
    or genetic phenotype. Still, it could fail because of their stress level, dietary
    habits, working or living environment, or cultural background.


    Deep digital phenotyping involves the combination of deep phenotyping (the precise
    and comprehensive analysis of phenotypic abnormalities in which the individual
    components of the phenotype are observed and described) and digital phenotyping
    (the real-time quantification of the particular human phenotype using real-world
    data from digital devices). Deep digital phenotyping achieves the ultimate goal
    of precision health: to match one individual, given their unique profile, with
    their best medical, therapeutic, and preventive strategy to maintain an optimal
    state of wellness, regardless of health status.'
