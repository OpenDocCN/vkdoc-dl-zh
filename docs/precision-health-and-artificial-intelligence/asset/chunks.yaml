    # 排版后的文本


    持续血糖监测以优化胰岛素剂量与行为。通过利用血糖监测传感器的实时数据，持续血糖监测系统带来一系列益处，包括指导胰岛素给药、鼓励积极的健康行为、预防并发症，以及实现与临床团队共享实时健康数据。重要的是，与通常每六个月进行一次的传统`HbA1c`检测相比，精细的血糖数据更能反映用户的健康状况和行为。


    提供行为改变与慢性病管理支持的智能手机应用。健康应用能够监测健康与行为，鼓励患者坚持治疗和健康行为，提供指导，并提醒患者按时就诊和接受筛查。


    精准健康与主要源自中国和印度文化的东方医学相融合，如同个性化医学和系统医学一样，东方医学将人体生物系统视为一个有机整体。^(⁵) 东方医学将人体视为一个器官和谐共存的整体实体，并从这个框架出发看待健康。图
    1-1 展示了如何使用精准健康工具在疾病的所有阶段（或相反地，在健康状态下）提供护理。


    ![](img/535410_1_En_1_Fig1_HTML.jpg)


    一幅插图展示了疾病从所有阶段的进展。精准健康时间线从基线风险易感性开始，然后监测进展并定义疾病机制，最后以个性化治疗结束。


    **图 1-1** 精准健康时间线上的疾病进展


    现在想象一个在伦理和道德上乌托邦式的社会：一旦有人出生，就会进行常规的基因组筛查检测。你在出生时就接受了基因组筛查，结果显示存在某些生物标志物，使你患心脏病的风险更高。由于你家族和遗传性的心脏病风险，你获得了一个智能贴片，用于测量心率、血压和`SpO2`。随着年龄增长，作为定期自愿参与治疗计划的一部分，你每周接受心电图检查，并更换智能贴片。你所有的数据都被发送到一个基于云的生态系统，你的临床团队和近亲都可以看到。第二天，你收到临床医生的短信，他实时得知你的健康状况恶化，邀请你前来就诊。你担心会听到什么消息。


    就诊时，你被告知汗液中存在特定的电解质，这使你面临心力衰竭的风险。你手机上的活动数据会与你的食物日记应用一起被评估，以便根据你的健康和近期行为进行风险评估。你的临床医生给你开了每周服用一次的药，如果心力衰竭症状持续存在，这种药会排泄出一种可在尿液中检测到的化合物，同时你被鼓励改善生活方式。


    为了支持活动和营养方面的改善，你被纳入一个通过健康应用促进的定制化行为改变计划，以鼓励和监测你的行为。你的智能家居监测你的体温和睡眠时间，你与一个语音激活助手交流，它确认你的感受并实时分析你的声音以检测任何潜在异常。你每月使用家用检测套件检测一次尿液，该套件几乎能即时给出结果，并直接通过专用
    5G 网络将结果数据（包括任何紧急升级需求）分享给你的临床团队。


    上述场景中提到的任何部分都并非遥不可及。然而，我们距离实现精准健康的承诺仍然相当遥远，这需要前所未有的跨学科合作。回报是什么？是精准健康带来的益处。目前实践的医学是经验性的，证据基础不足，且依赖于个体医疗提供者的知识和经验，这导致了护理质量参差不齐，结果不尽如人意。


    精准健康能够实现以患者为中心、根据患者特征大规模定制的个性化护理，从而在患者个体和人群层面带来健康益处。其目标是采用统一的方法，将全方位的促进、预防、诊断和治疗干预措施与健康的基本且可改变的决定因素相匹配——不仅要解决症状，还要直接针对健康的遗传、生物、环境、社会和行为决定因素。图
    1-2 从宏观层面概述了精准健康如何实现更好的健康。


    ![](img/535410_1_En_1_Fig2_HTML.jpg)


    一幅插图解释了精准健康方法如何实现更好的健康。基因、环境、生活方式加上创新和多样性，等于更好的健康。


    **图 1-2** 通过精准健康方法实现更好的健康


    精准健康的核心目标是精确地预防、预测、治疗和治愈疾病。


    话虽如此，精准健康也带来了前所未有的挑战，必须加以解决，以确保精准健康和人工智能能够安全、有益地影响医疗保健。


    ## 为何是精准健康？为何是现在？


    世界人口寿命更长，但健康状况更差，全球经济也陷入危机。


    随着肥胖症、心血管疾病、2 型糖尿病和癌症等非传染性疾病本身已成为大流行病，医疗保健系统不堪重负，正转向基于价值和激励的护理模式。这些非传染性疾病的根源主要在于生活方式和环境因素，鉴于现代环境、行为和职业的性质，这些因素很难改变。而这还是在
    COVID-19 疫情之前的情况。

