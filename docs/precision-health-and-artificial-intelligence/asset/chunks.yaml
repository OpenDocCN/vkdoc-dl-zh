  trans: '

    ### 透明度与问责制


    人工智能和技术已经影响着人们的日常生活。随着技术变得日益复杂和精密，精准健康系统的决策将对患者的健康与生活方式产生重大影响。因此，与精准健康系统打交道的个人必须理解这些系统是如何做出决策的。然而，透明度不仅仅在于解释系统的结果，它还包括以下方面：


    - 教导临床医生和患者如何使用结果

    - 理解系统的局限性

    - 尽量减少不必要的压力和依赖


    随着精准健康系统被嵌入疾病预测、诊断以及治疗方案选择中，问责与责任的主题需要得到关注。临床医生必须理解精准健康系统所提建议背后的临床依据。正如上文所强调的，系统输出的结果可能在技术上是相关的，但未必对特定个体具有临床相关性，因此临床医生必须运用其专业判断力。透明度与问责制是可靠性、公平性和安全性的基石。


    精准健康系统的开发者必须对系统的运作方式承担相应的责任，而在临床实践中部署这些系统的医疗机构，在将其整合到临床实践时也应审慎考虑。


    ### 合法性


    现有的立法和指南已经将精准医疗的许多相关风险降至最低。然而，这是一个不断演变的主题。如果精准医疗的益处得以实现，公正的伦理原则将要求所有人都能普遍获得精准医疗服务。患者教育的改进必须显著增强患者自主决策的潜力。无论如何，临床医生必须采用最高水平的数据安全和通信指南，以避免检测结果造成伤害。此外，医疗机构应进一步审视精准医疗的成本效益，以防止投资不当。


    人工智能系统的责任归属是合法性领域的一个新问题。大多数责任框架将责任归于造成伤害的最终用户临床医生、医疗机构或其他人类。然而，对于人工智能而言，错误可能在没有任何人为输入的情况下发生。因此，临床责任框架需要进行相应调整。虽然医疗机构有责任使用经过监管和验证的技术，但存在缺陷的责任政策最终将阻碍患者从精准健康中获益。最后，过失责任将由造成损害或缺陷的个人、群体或实体承担，或者由那些本可预见产品会以患者使用的方式被使用的人承担。由于人工智能系统开发涉及多方（如数据提供者、开发者以及人工智能系统本身），责任归属需要明确，这使得在出现问题时确定责任变得更加困难。


    ### 数据隐私与安全


    根据专业人士和患者的看法，健康数据的收集存在较高的滥用风险。^(⁶⁵) 由人工智能驱动的精准健康系统应当是安全可靠的，并尊重隐私。数据隐私和共享是精准医疗模式中的关键主题。然而，只需看看
    Opus、Telus 和 Babylon 等全球性机构被黑客攻击的事件，就能明白隐私无法得到保证。历史上最大规模的黑客攻击发生在 2022 年，当时澳大利亚通信巨头
    Optus 在一次并不复杂的攻击中沦陷，导致三分之一的澳大利亚人面临身份盗窃和欺诈的风险。数小时内，部分数据样本就在暗网上被公开。^(⁶⁶)


    尽管数据保密性通过技术进步得以实现，但人们仍然怀疑那些被委托保密的人能否保证数据安全。无论系统多么智能，黑客只会越来越聪明。


    人们参与研究以及提供基因信息、生活方式、环境或医疗数据的意愿也各不相同。这种意愿还受到对数据安全担忧的显著影响。研究表明，人们非常愿意捐赠数据并参与真实世界和数字试验，但对专业人士的信任、成本、检测结果的咨询以及隐私问题依然存在。主要的担忧不仅仅是黑客；患者和专业人士同样担心基因数据可能落入保险公司和雇主手中，从而导致基因歧视。为了实现精准医疗，基因信息必须整合到电子健康记录中，这使得数据更具价值，也更容易受到网络犯罪攻击。


    因此，数据科学家必须高度重视数据安全。许多人建议，研究人员应将基因、环境或生活方式数据的收集和关联限制在必要信息范围内。然而，监管机构只有通过制定健康保护措施，才能消除利益相关者的担忧。基因信息提供者应能访问数据，并确保基因歧视像性别、残疾和种族歧视一样被定为非法。对破坏系统的人施加与其行为或罪行相称的惩罚至关重要。


    数据共享对于推进研究、开发新的检测方法和疗法是必要的。然而，尽管其重要性不言而喻，仍有许多障碍有待克服。例如，多少数据才算过多？以医疗保健中的宗教和灵性为例，很少有人关注宗教和灵性的独特背景及其在精准医疗中的适用性。患者的信仰已被视为提供更有效、更具针对性治疗的相关临床实践考量因素，尤其是在心理健康、临终关怀和器官捐赠方面。考虑宗教信仰和实践很可能会带来更有效的治疗。


    数据共享对个人和群体的隐私及保密性具有重要影响。例如，在遗传性癌症的背景下，临床医生是否有责任警告可能患上特定遗传病的家庭成员？由于基因信息对家庭而非个人具有保密性，临床医生可以将遗传易感性的信息分享给所有有风险的家庭成员。当前的法律法规需要给出明确的答案，而仲裁员对于临床医生在透明度方面的责任得出了不一致的结论。

    '
- fmt: '### Human Agency


    Unique ethical issues arise in precision medicine because of the enormous amounts
    of data generated by clinical whole-genome sequencing, lifestyle and behavioral
    data, and the extent of current uncertainties concerning data interpretations
    and disease associations. Among the most ethically challenging issues for clinicians
    are complicated informed consent processes.


    `Informed consent` is an autonomous, typically written authorization with which
    the patient gives a doctor permission to perform a medical act. It is one of the
    most critical safeguards of patients’ autonomy. `Informed consent` is based on
    comprehensive and understandable information about the nature and risks of a medical
    procedure and the absence of interference with the patient’s voluntary decision
    to have the procedure performed. There is currently no ethical consensus on whether
    disclosing the use of an opaque clinical AI algorithm should be a requirement
    of `informed consent`. Failure to disclose the use of an obfuscated AI system
    may jeopardize patients’ autonomy and harm the doctor-patient relationship, threatening
    patients’ trust and violating clinical recommendations.


    Suppose a patient was to find out in hindsight that a clinician’s recommendation
    was derived from an opaque (i.e., nontransparent) AI system. In that case, this
    may not only lead the patient to challenge the advice but might also lead to a
    justified request for an explanation—which the clinician would not be able to
    provide in the case of an opaque system. Opaque medical AI can thus impede the
    provision of accurate information, potentially jeopardizing `informed consent`.
    As a result, appropriate ethical and explainability standards are required to
    protect `informed consent`’s autonomy-preserving function.


    As we adopt AI technologies and accept their decisions, we acceptingly cede segments
    of our decision-making to nonhuman systems. This highlights the balance required
    between autonomy for ourselves and that delegated to artificial agents, affirming
    the principle of independence within AI.


    ### Beneficence


    `Beneficence` encourages the creation of beneficial AI or AI created for humanitarian
    benefit (“do good”). At the same time, `nonmaleficence` refers to AI’s negative
    consequences and risks (“no harm”). `Beneficence` is essential because it ensures
    that the principle of AI technology is to promote well-being, preserve dignity,
    and sustain the planet.


    Generally, AI ethics have been primarily concerned with the principle of `nonmaleficence`;
    negative consequences must be avoided, for example, misclassification. `Beneficence`
    can be understood through evaluating the probability and magnitude of potential
    harms to participants, assessment of risks, and mitigation strategies against
    possible benefits to the individual, people represented by participants, and society.


    ### Redesigning Care and the Patient-Clinician Relationship


    Precision health is changing the way care is delivered and with it the patient-clinician
    relationship. Genomics research and approaches leveraging big data, whether electronic
    medical records or large-scale health tracking, are reorientating the clinical
    experience from prevention through to diagnosis and treatment as an increasingly
    comprehensive vision of personalized medicine is realized.


    Rather than being dichotomously sick or healthy, precision health replaces a taxonomy
    of diseases with a multilayer characterization of individuals.


    Take the example of patients waiting within traditional care when a screening
    test presents an abnormal finding but is uncertain whether and when the individual
    will develop the condition. When diagnosed, patients move to treatment, whereas
    within precision health individuals are closely monitored and given care through
    the continuum. Health data will enable the quantification of risk factors for
    particular diseases, allow for the customization of care, and determine deterioration,
    morbidity, and mortality risks. Care spans past biomarkers and how people biologically
    differ to include how and where people spend their time and the obstacles in making
    health-promoting decisions.


    Hospital care is moving outside of the care ward. Virtual wards provide wrap-around
    care to people in their own homes to reduce the need for a hospital admission.
    For a person with complex health conditions, a virtual community is about better
    self-care, self-awareness, and confidence to handle standard flare-ups at home.
    For doctors caring for complex patients at risk from hospital admissions, the
    virtual ward provides “extra backup” and hands-on support by monitoring patients
    daily to see where the action is required, often saving valuable time and duplication
    for the clinical teams.


    The core virtual ward mimics a typical hospital setup. It includes a ward coordinator,
    a doctor, a district nurse (DN), a community matron, a practice nurse (PN), and
    a practice administrator. Local community support workers (CSW) and advocacy workers
    are also invited to attend. Depending on local health needs, therapists, a community
    geriatrician, or other healthcare professionals could prove invaluable team members.
    Read more about `Gro Health`, a multiplatform system that provides a stellar example
    of a virtual ward implemented to good effect. Figure [5-3](#535410_1_En_5_Chapter.xhtml#Fig3)
    shows an example of a virtual ward.


    ![](images/535410_1_En_5_Chapter/535410_1_En_5_Fig3_HTML.jpg)


    A process chart of the virtual ward. It begins with the virtual ward coordinator
    at the top, divides into the coordination of tasks to other roles, and checks
    daily secondary care requests. Then, it directs to the core team meetings and
    the tasks and ends with the coordination of tasks. On the left is the list of
    tasks in bulleted points.


    **Figure 5-3** A virtual ward


    With healthcare professionals in short supply, it is doubtful that practitioners
    will feel threatened by AI regarding loss of authority and autonomy. Paradoxically,
    the burden of uncertainty innate in a probabilistic diagnosis increases the expectation
    that the supposedly precise diagnosis will empower patients by enabling better-informed
    decisions about future treatments. Depending on socioeconomic status, culture,
    age, and psychological disposition, patients may differ in their ability to manage
    this tension. As the patient-clinician relationship evolves, researchers must
    investigate the impact of precision health and quality of life.


    ### Health Inequalities


    While precision health aims to improve outcomes at both patient and population
    health levels, we must ensure advances in science and technology do not worsen
    health inequalities. Minority communities frequently face discrimination in healthcare
    and receive poor medical treatment across the globe. Outreach to minority communities—especially
    in the research field—has also been characterized by a long history of exploitation,
    abuse, and marginalization.


    Factors contributing to health inequalities include cost, access, and under-representation.
    Cost is a prohibitive factor that makes technologies accessible to those who can
    afford them. Many payers may not reimburse some new services, limiting care provision
    to those who can afford it. Failure to address systemic bias in data provision
    and genetic databases will only worsen disparities.


    ### Theology


    Genetic exploration, whether IVF, genetic engineering, or gene therapy, has raised
    questions of morality for religious and spiritual communities. Within years, human
    brains will interface with computers, nanotechnologies will be embedded within
    human tissue, 3D organs will be printed and transplanted, and people will select
    optimal embryos to minimize the potential of severe or life-limiting diseases
    in their offspring. The theological and philosophical challenges of precision
    health are imperative to developing rigorous clinical practices and associated
    laws.'
