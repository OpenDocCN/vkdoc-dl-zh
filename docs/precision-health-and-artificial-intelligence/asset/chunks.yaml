  trans: '

    # 了解人们对数据的看法，以优化针对长期健康问题患者的足病专科服务


    *以下案例研究提供了一个最佳实践范例，展示了如何大规模倾听受众意见，以了解他们对预期技术及其影响的看法、偏好和数字画像。*


    目前，英格兰有超过 77,000 名糖尿病患者患有足部溃疡。^(⁹¹) 溃疡持续时间越长，愈合所需时间就越长。如果不加治疗，溃疡可能导致糖尿病足病（DFD）和截肢。英格兰每天有
    25 人接受下肢（脚趾/脚/腿）截肢手术；可悲的是，其中 85% 的截肢是可以预防的。从 2015 年到 2018 年，英格兰发生了 27,465 例与糖尿病相关的下肢截肢（比
    2011-2014 年增加了 18.3%），记录了 147,067 例因糖尿病足病住院的病例，平均住院时间为 8 天，总计占用 1,826,734 个住院床位日，每天花费
    376 英镑。^(⁹²)


    足部检查是识别和评估潜在问题并采取预防措施的机会。NICE NG19 指南指出，糖尿病患者应每年接受足部检查，并建议有活动性足部问题的患者在一个工作日内转诊至多学科团队/足部保护服务，并在另一个工作日内完成分诊。^(⁹³)
    然而，由于以下原因，存在“患者对症状认识不足、医疗评估不准确以及难以获得专科服务”的问题：


    - *检查延迟*：国家糖尿病足部审计发现，39% 的患者等待 14 天或更长时间才接受首次足部溃疡专科检查。

    - *缺乏检查*：英格兰有 80 万患者没有接受年度足部检查，而进行足部检查的执业护士中有 80% 对自己的操作信心不足，导致护理和结果存在差异。

    - *培训*：英格兰 33% 的 NHS 专员没有为医疗保健专业人员提供足部护理培训，即使有培训，评估质量也有待提高。


    迫切需要支持来减轻糖尿病足病的临床和经济影响，同时数字健康创新也提供了巨大机遇，可以通过以下方式使护理和结果更加公平：


    - 缩短检查时间，从而减少未经治疗的溃疡/糖尿病足病

    - 进行/支持足部检查本身，以辅助临床决策

    - 在年度检查之间为医疗保健专业人员和患者提供培训/教育、资源和治疗


    此外，还能实现显著的经济效益：因溃疡减少而降低 30% 的住院床位日，每年可为 NHS 节省 6350 万英镑。这还是在新冠疫情之前的情况，疫情导致足部健康问题紧急增加，面对面就诊量下降，并影响了临床医生的心理健康。智能手机为扩展护理提供了重要机会。然而，支持溃疡和足部护理的应用程序非常少。


    除了技术本身，它们产生的数据也很有用。虽然一些国家为抗击新冠病毒而采取的非常措施在限制病毒传播方面可能有效，但有些措施在数据隐私和其他基本权利方面引发了争议，尤其是在缺乏透明度和公众咨询的情况下。令人惊讶的是，关于共享临床试验或公共卫生研究数据的证据仍然有限，而这却是许多数字系统的支柱。


    `FootChecker` 是一款面向医疗保健专业人员和患者的多平台应用程序，旨在通过标准化临床医生的信心和能力，并为患者提供基于风险分层的患者教育（用于评估、建议和早期干预），来减少足部溃疡、截肢、恢复时间及相关成本。


    ## 目标


    我们的研究旨在了解英国长期健康问题患者对数据隐私与安全、数据伦理和数据滥用等主题的看法。了解 2 型糖尿病和高血压等长期健康问题患者的担忧至关重要，因为这些疾病是溃疡发展和预后的关键风险因素。这一点在疫情期间变得更加复杂，因为
    2 型糖尿病和高血压也是 COVID-19 发病率和死亡率的危险因素。


    ## 方法


    我们采用混合方法设计进行了一项基于网络的调查研究，该设计符合报告电子互联网调查结果的检查表。调查对象是 18 岁及以上、已加入 `Diabetes.co.uk`
    社区的人。我们向 11,213 名同意被联系参与研究机会的人发送了包含研究网络链接的电子邮件邀请。


    调查以一个筛选问题开始：“您是否同意参与本研究？” 同意的受访者继续完成调查。我们收集了关于人口统计学特征、临床诊断以及新冠疫情前后健康数据共享和隐私的定量信息（封闭式和多项选择题）。我们对样本分布和特征进行了描述性数据分析。使用
    `Pearson r` 相关系数来确定在新冠疫情背景下，先前的数据共享行为与对数据共享活动的态度之间的关系。对开放式问题的数据进行阅读，然后按主题进行分类。

    '
- fmt: '### Results


    Of 11,213 people who emailed, 10,705 clicked through to the survey; in total,
    4,764 gave their consent and began the study. All respondents completed the survey
    and were included in the analysis. All respondents were located in the United
    Kingdom. In total, 2,287 (48.0 percent) respondents were male, and 3,083 (64.8
    percent) were aged between 55 and 74. 115 (2.8 percent) respondents reported having
    been clinically diagnosed with COVID-19. Most patients (n=4674, 98.1 percent)
    reported a prior clinical diagnosis of at least one health condition (on average,
    three per person). There was a high prevalence of individuals living with type
    2 diabetes (n=2974, 62.7 percent), hypertension (n=2147, 45.2 percent), type 1
    diabetes (n=1299, 27.4), obesity (n=892, 18.8 percent), and depression (n=871,
    18.3 percent).


    Before the COVID-19 pandemic, almost half of the respondents (n=2313, 49.2 percent)
    agreed or strongly agreed that they often consented to the anonymized sharing
    of their private health data. In comparison, only 608 (13 percent) respondents
    often consented to sharing private health data without anonymization. Two-thirds
    of respondents (n=3113, 66.7 percent) disagreed or strongly disagreed with sharing
    their personal health data without anonymization. Similarly, 3,121 (66.3 percent)
    respondents would share their data if it keeps other people healthy; 3,026 (63.9
    percent) respondents agreed or strongly agreed to share private health data with
    the government or health authority; 1,911 (40.7 percent) respondents agreed or
    strongly agreed to share their private health data with services that provide
    health services to the National Health Service (NHS) such as the Low Carb Program
    and PushDoctor. Only 232 (5 percent) participants agreed or strongly agreed to
    share private health data with social media platforms.


    More than a quarter of respondents (n=1297, 27.8 percent) agreed or strongly agreed
    that they did not trust any organization to protect their private health data.
    Just under a quarter of respondents (n=1094, 23.5 percent) agreed or strongly
    agreed that they were not concerned by the implications of sharing private health
    data. Respondents who reported feeling “neutral” in response to the statements
    were excluded.


    More than half (n=3026, 63.9 percent) agreed or strongly agreed to share their
    private data with the government or health authority if asked; 1,911 (40.7 percent)
    respondents would happily consent to share their private data with services that
    provide health services to the NHS such as the Low Carb Program and if asked.
    Only 232 (5 percent) participants agreed or strongly agreed that they would consent
    to share private data with social media if requested.


    Almost half of the respondents (n=2228, 47.1 percent) were concerned or very concerned
    about who would have access to their health data in the context of the COVID-19
    pandemic, and 2,310 (49.1 percent) respondents were concerned or very concerned
    about how their personal health data may be used in the future. Almost two-thirds
    of respondents (n=3054, 65 percent) were concerned or very concerned about the
    legislation regarding data misuse.


    Just over a third of respondents (n=1563, 33.4 percent) would consent to share
    their private data with any organization if it provided essential COVID-19 support
    services, such as supermarkets, pharmacies, and banks.


    ### Discussion


    Our study provides insights into public perception and attitudes toward the use
    of identifiable health data in the context of the COVID-19 pandemic, in particular,
    the perspectives of those living with chronic, long-term health conditions, with
    an average of four health conditions reported per respondent.


    Our study suggests that data sensitivity is highly contextual. Many people felt
    that their attitudes have shifted due to the COVID-19 pandemic. More people reported
    being comfortable with sharing private health data with any organization rather
    than before the COVID-19 pandemic. People appear to trust their data with the
    government and health organizations. There is significant distrust of private
    health data use by social media organizations (e.g., Twitter, Facebook, and Google)
    even though social media is used as a channel for communication by people caught
    up in crises such as emergency relief operations after earthquakes, tsunamis,
    and typhoons, where it provides a trusted and highly salient source of information
    about what is happening and what to do.^([^(94)](#fn94),) ^([^(95)](#fn95))


    This is surprising as although users worldwide report that privacy and use of
    personal data are important issues, most rarely make an effort actively to protect
    this data and often even give it away voluntarily on social media, where even
    innocuous data can reveal sensitive health information when suitably processed.^([^(96)](#fn96),)
    ^([^(97)](#fn97)) People treat data revelation and sharing differently depending
    on the perceived sensitivity of the data, and the sensitivity attached to different
    data types is neither stable nor uniform.


    A key theme emerging from the literature confirmed in this study is the importance
    of trust.^([^(98)](#fn98),) ^([^(99)](#fn99),) ^([^(100)](#fn100)) More than a
    quarter of respondents stated they did not trust any organization to protect their
    data, more than half reported concern about the implications of sharing personal
    information, and almost two-thirds were concerned about data misuse regulation
    not being strict enough. When asked during the pandemic (the United Kingdom’s
    first wave), nearly half of respondents were concerned about who would have access
    to their personal health data, and a similar number were concerned about how their
    personal health data might be used in the future. This is consistent with prior
    research suggesting that public involvement in data policy is crucial to bolstering
    trust and provides support for legislation that is more enforceable.^([^(101)](#fn101))
    Attitudes may have been perturbed by news stories about cybersecurity and privacy
    and by policy announcements (e.g., around Huawei, the Online Harms Bill, etc.).^([^(102)](#fn102),)
    ^([^(103)](#fn103))


    Although there are no directly comparable studies, the results from this study
    complement prior research on public perceptions about COVID-19 and data sharing.
    Data privacy and protection are essential concepts.^([^(104)](#fn104)) Data policy
    tends to address human concerns about privacy by making rules about data protection;
    however, this can lead to category errors since data protection can undermine
    privacy.


    Willingness to share anonymized personal health information varies depending on
    the degree to which the receiving body is trusted and the uses to which the data
    will be put.^([^(105)](#fn105),) ^([^(106)](#fn106)) The more commercial the objectives
    of the receiving institution appear, the fewer respondents are willing to share
    their personal health information. This suggests that anonymization’s disadvantages
    (in terms of confirming data and correlating shared with other data) might be
    offset by better (broader, deeper, and more accurate) sampling, leading to greater
    validity of results. Further evidence comes from the interaction (or correlation)
    between these attitudinal responses and other characteristics, meaning that nonanonymized
    collection might lead to biased results.


    ### Conclusion


    Data sensitivity is highly contextual. More people are comfortable with sharing
    anonymized data than personally identifiable data. Willingness to share data also
    varied depending on the receiving body, highlighting trust as a critical theme,
    who may have access to shared personal health data, and how it may be used in
    the future. The nascency of legal guidance in this area suggests the requirement
    for humanitarian guidelines for data responsibility during disaster relief operations
    such as pandemics and the necessity to involve the public in their development.'
  raw: '### Results


    Of 11,213 people who emailed, 10,705 clicked through to the survey; in total,
    4,764 gave their consent and began the study. All respondents completed the survey
    and were included in the analysis. All respondents were located in the United
    Kingdom. In total, 2,287 (48.0 percent) respondents were male, and 3,083 (64.8
    percent) were aged between 55 and 74\. 115 (2.8 percent) respondents reported
    having been clinically diagnosed with COVID-19\. Most patients (n=4674, 98.1 percent)
    reported a prior clinical diagnosis of at least one health condition (on average,
    three per person). There was a high prevalence of individuals living with type
    2 diabetes (n=2974, 62.7 percent), hypertension (n=2147, 45.2 percent), type 1
    diabetes (n=1299, 27.4), obesity (n=892, 18.8 percent), and depression (n=871,
    18.3 percent).


    Before the COVID-19 pandemic, almost half of the respondents (n=2313, 49.2 percent)
    agreed or strongly agreed that they often consented to the anonymized sharing
    of their private health data. In comparison, only 608 (13 percent) respondents
    often consented to sharing private health data without anonymization. Two-thirds
    of respondents (n=3113, 66.7 percent) disagreed or strongly disagreed with sharing
    their personal health data without anonymization. Similarly, 3,121 (66.3 percent)
    respondents would share their data if it keeps other people healthy; 3,026 (63.9
    percent) respondents agreed or strongly agreed to share private health data with
    the government or health authority; 1,911 (40.7 percent) respondents agreed or
    strongly agreed to share their private health data with services that provide
    health services to the National Health Service (NHS) such as the Low Carb Program
    and PushDoctor. Only 232 (5 percent) participants agreed or strongly agreed to
    share private health data with social media platforms.


    More than a quarter of respondents (n=1297, 27.8 percent) agreed or strongly agreed
    that they did not trust any organization to protect their private health data.
    Just under a quarter of respondents (n=1094, 23.5 percent) agreed or strongly
    agreed that they were not concerned by the implications of sharing private health
    data. Respondents who reported feeling “neutral” in response to the statements
    were excluded.


    More than half (n=3026, 63.9 percent) agreed or strongly agreed to share their
    private data with the government or health authority if asked; 1,911 (40.7 percent)
    respondents would happily consent to share their private data with services that
    provide health services to the NHS such as the Low Carb Program and if asked.
    Only 232 (5 percent) participants agreed or strongly agreed that they would consent
    to share private data with social media if requested.


    Almost half of the respondents (n=2228, 47.1 percent) were concerned or very concerned
    about who would have access to their health data in the context of the COVID-19
    pandemic, and 2,310 (49.1 percent) respondents were concerned or very concerned
    about how their personal health data may be used in the future. Almost two-thirds
    of respondents (n=3054, 65 percent) were concerned or very concerned about the
    legislation regarding data misuse.


    Just over a third of respondents (n=1563, 33.4 percent) would consent to share
    their private data with any organization if it provided essential COVID-19 support
    services, such as supermarkets, pharmacies, and banks.


    ### Discussion


    Our study provides insights into public perception and attitudes toward the use
    of identifiable health data in the context of the COVID-19 pandemic, in particular,
    the perspectives of those living with chronic, long-term health conditions, with
    an average of four health conditions reported per respondent.


    Our study suggests that data sensitivity is highly contextual. Many people felt
    that their attitudes have shifted due to the COVID-19 pandemic. More people reported
    being comfortable with sharing private health data with any organization rather
    than before the COVID-19 pandemic. People appear to trust their data with the
    government and health organizations. There is significant distrust of private
    health data use by social media organizations (e.g., Twitter, Facebook, and Google)
    even though social media is used as a channel for communication by people caught
    up in crises such as emergency relief operations after earthquakes, tsunamis,
    and typhoons, where it provides a trusted and highly salient source of information
    about what is happening and what to do.^([^(94)](#fn94),) ^([^(95)](#fn95))


    This is surprising as although users worldwide report that privacy and use of
    personal data are important issues, most rarely make an effort actively to protect
    this data and often even give it away voluntarily on social media, where even
    innocuous data can reveal sensitive health information when suitably processed.^([^(96)](#fn96),)
    ^([^(97)](#fn97)) People treat data revelation and sharing differently depending
    on the perceived sensitivity of the data, and the sensitivity attached to different
    data types is neither stable nor uniform.


    A key theme emerging from the literature confirmed in this study is the importance
    of trust.^([^(98)](#fn98),) ^([^(99)](#fn99),) ^([^(100)](#fn100)) More than a
    quarter of respondents stated they did not trust any organization to protect their
    data, more than half reported concern about the implications of sharing personal
    information, and almost two-thirds were concerned about data misuse regulation
    not being strict enough. When asked during the pandemic (the United Kingdom’s
    first wave), nearly half of respondents were concerned about who would have access
    to their personal health data, and a similar number were concerned about how their
    personal health data might be used in the future. This is consistent with prior
    research suggesting that public involvement in data policy is crucial to bolstering
    trust and provides support for legislation that is more enforceable.^([^(101)](#fn101))
    Attitudes may have been perturbed by news stories about cybersecurity and privacy
    and by policy announcements (e.g., around Huawei, the Online Harms Bill, etc.).^([^(102)](#fn102),)
    ^([^(103)](#fn103))


    Although there are no directly comparable studies, the results from this study
    complement prior research on public perceptions about COVID-19 and data sharing.
    Data privacy and protection are essential concepts.^([^(104)](#fn104)) Data policy
    tends to address human concerns about privacy by making rules about data protection;
    however, this can lead to category errors since data protection can undermine
    privacy.


    Willingness to share anonymized personal health information varies depending on
    the degree to which the receiving body is trusted and the uses to which the data
    will be put.^([^(105)](#fn105),) ^([^(106)](#fn106)) The more commercial the objectives
    of the receiving institution appear, the fewer respondents are willing to share
    their personal health information. This suggests that anonymization’s disadvantages
    (in terms of confirming data and correlating shared with other data) might be
    offset by better (broader, deeper, and more accurate) sampling, leading to greater
    validity of results. Further evidence comes from the interaction (or correlation)
    between these attitudinal responses and other characteristics, meaning that nonanonymized
    collection might lead to biased results.


    ### Conclusion


    Data sensitivity is highly contextual. More people are comfortable with sharing
    anonymized data than personally identifiable data. Willingness to share data also
    varied depending on the receiving body, highlighting trust as a critical theme,
    who may have access to shared personal health data, and how it may be used in
    the future. The nascency of legal guidance in this area suggests the requirement
    for humanitarian guidelines for data responsibility during disaster relief operations
    such as pandemics and the necessity to involve the public in their development.'
  trans: '

    ### 结果


    在发送电子邮件的 11,213 人中，有 10,705 人点击进入了调查；总计有 4,764 人同意参与并开始了研究。所有受访者均完成了调查并被纳入分析。所有受访者均位于英国。其中，男性受访者为
    2,287 人（占 48.0%），年龄在 55 至 74 岁之间的受访者为 3,083 人（占 64.8%）。有 115 名受访者（占 2.8%）报告曾被临床诊断为
    COVID-19。大多数患者（n=4,674，占 98.1%）报告曾至少被临床诊断出一种健康状况（平均每人三种）。患有 2 型糖尿病（n=2,974，占 62.7%）、高血压（n=2,147，占
    45.2%）、1 型糖尿病（n=1,299，占 27.4%）、肥胖症（n=892，占 18.8%）和抑郁症（n=871，占 18.3%）的人群比例较高。


    在 COVID-19 疫情之前，近半数受访者（n=2,313，占 49.2%）同意或强烈同意他们经常同意匿名共享其私人健康数据。相比之下，只有 608 名受访者（占
    13%）经常同意在非匿名情况下共享私人健康数据。三分之二的受访者（n=3,113，占 66.7%）不同意或强烈不同意在非匿名情况下共享其个人健康数据。同样，有
    3,121 名受访者（占 66.3%）表示，如果共享数据能让他人保持健康，他们会共享数据；3,026 名受访者（占 63.9%）同意或强烈同意与政府或卫生机构共享私人健康数据；1,911
    名受访者（占 40.7%）同意或强烈同意与向英国国家医疗服务体系（NHS）提供健康服务的机构（如低碳计划（Low Carb Program）和 PushDoctor）共享其私人健康数据。只有
    232 名参与者（占 5%）同意或强烈同意与社交媒体平台共享私人健康数据。


    超过四分之一的受访者（n=1,297，占 27.8%）同意或强烈同意他们不信任任何组织能够保护其私人健康数据。略低于四分之一的受访者（n=1,094，占 23.5%）同意或强烈同意他们并不担心共享私人健康数据所带来的影响。对相关陈述表示“中立”的受访者已被排除在外。


    超过半数（n=3,026，占 63.9%）的受访者同意或强烈同意，如果被要求，他们会与政府或卫生机构共享其私人数据；1,911 名受访者（占 40.7%）乐意同意，如果被要求，他们会与向
    NHS 提供健康服务的机构（如低碳计划）共享其私人数据。只有 232 名参与者（占 5%）同意或强烈同意，如果被要求，他们会同意与社交媒体共享私人数据。


    近半数受访者（n=2,228，占 47.1%）担心或非常担心在 COVID-19 疫情期间谁能够访问他们的健康数据，而 2,310 名受访者（占 49.1%）担心或非常担心他们的个人健康数据未来可能被如何使用。近三分之二的受访者（n=3,054，占
    65%）担心或非常担心关于数据滥用的立法。


    略超过三分之一的受访者（n=1,563，占 33.4%）会同意与任何提供基本 COVID-19 支持服务（如超市、药房和银行）的组织共享其私人数据。


    ### 讨论


    我们的研究深入了解了公众在 COVID-19 疫情背景下对使用可识别健康数据的看法和态度，特别是那些患有慢性、长期健康状况的人群的观点，每位受访者平均报告了四种健康状况。


    我们的研究表明，数据敏感性具有高度的情境依赖性。许多人认为他们的态度因 COVID-19 疫情而发生了转变。与疫情前相比，更多人表示愿意与任何组织共享私人健康数据。人们似乎更信任政府和卫生组织掌握其数据。公众对社交媒体组织（例如
    Twitter、Facebook 和 Google）使用私人健康数据存在显著的不信任感，尽管社交媒体被卷入危机（如地震、海啸和台风后的紧急救援行动）的人们用作沟通渠道，在这些情况下，它提供了关于正在发生的事情以及该做什么的可信且高度显著的信息来源。^(⁹⁴,)
    ^(⁹⁵)


    这令人惊讶，因为尽管全球用户报告称隐私和个人数据的使用是重要问题，但大多数人很少主动努力保护这些数据，甚至经常在社交媒体上自愿放弃这些数据，而在社交媒体上，即使是看似无害的数据，在经过适当处理后也可能揭示敏感的健康信息。^(⁹⁶,)
    ^(⁹⁷) 人们根据对数据感知敏感度的不同，以及不同数据类型所附带的敏感度既不稳定也不统一，而对数据披露和共享采取不同的态度。


    本研究中文献所证实的一个关键主题是信任的重要性。^(⁹⁸,) ^(⁹⁹,) ^(¹⁰⁰) 超过四分之一的受访者表示他们不信任任何组织能保护他们的数据，超过半数的人表示担心共享个人信息的影响，近三分之二的人担心数据滥用监管不够严格。当在疫情期间（英国第一波疫情）被问及时，近半数受访者担心谁能够访问他们的个人健康数据，类似数量的人担心他们的个人健康数据未来可能被如何使用。这与先前的研究一致，该研究表明公众参与数据政策对于增强信任至关重要，并为更具可执行性的立法提供了支持。^(¹⁰¹)
    态度可能受到了关于网络安全和隐私的新闻报道以及政策公告（例如，关于华为、在线危害法案等）的影响。^(¹⁰²,) ^(¹⁰³)


    尽管没有直接可比的研究，但本研究的结果补充了先前关于公众对 COVID-19 和数据共享看法的研究。数据隐私和保护是基本概念。^(¹⁰⁴) 数据政策倾向于通过制定数据保护规则来解决人们对隐私的担忧；然而，这可能导致分类错误，因为数据保护可能会损害隐私。


    共享匿名个人健康信息的意愿取决于接收方被信任的程度以及数据将被用于何种目的。^(¹⁰⁵,) ^(¹⁰⁶) 接收机构的目标越具商业性，愿意共享其个人健康信息的受访者就越少。这表明匿名化的缺点（在确认数据以及将共享数据与其他数据关联方面）可能通过更好（更广泛、更深入、更准确）的抽样来弥补，从而提高结果的有效性。进一步的证据来自这些态度反应与其他特征之间的相互作用（或相关性），这意味着非匿名化收集可能导致有偏差的结果。


    ### 结论


    数据敏感性具有高度的情境依赖性。与个人可识别数据相比，更多人愿意共享匿名化数据。共享数据的意愿也因接收方而异，这突显了信任是一个关键主题，即谁可能有权访问共享的个人健康数据，以及这些数据未来可能被如何使用。该领域法律指导的初步性表明，在诸如疫情等救灾行动中，需要制定人道主义数据责任指南，并且有必要让公众参与其制定过程。

