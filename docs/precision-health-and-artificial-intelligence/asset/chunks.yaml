    within AI models to justify the results.


    ![](images/535410_1_En_5_Chapter/535410_1_En_5_Fig1_HTML.jpg)


    A diagram describes the relationship between interpretability and explainability.
    Interpretability on the left includes transparency, an outcome tool, a feature
    analysis, a model tool, a visualization tool, and a prototype analysis.


    Figure 5-1


    Relationship between interpretability and explainability


    Interpretable, explainable AI facilitates patient-centered care by providing clinicians
    and patients with the necessary information for shared decision-making. Meaningful
    conversations about the potential benefits and risks of various courses of action
    can be supported with data and ensure patients receive treatments best suited
    to their situation, values, and priorities. One could argue that black-box AI
    is opposed to the tenets of patient-centered medicine. If clinicians cannot fully
    comprehend the features and calculations that led to a decision, they can’t explain
    how specific outcomes or recommendations were derived.'
  trans: '

    # 负责任开发与伦理 AI 原则


    首先，人类只有以负责任的方式开发和部署系统，才能实现面向全人口的 AI 驱动精准健康。随着 AI 风险持续增长，发布伦理原则以指导 AI 开发与使用的公共及私营组织数量也在增加。许多人认为这是最高效的主动风险缓解策略，但一个关键问题依然存在：究竟以谁的伦理准则为准。


    建立伦理原则有助于组织在提升福祉和公共利益的同时，保护个人权利与自由。伦理学家可以将这些原则转化为组织可遵循的规范与实践，进而实现有效治理。AI 伦理的许多指导原则源自生物医学伦理，包括可靠性与安全性、包容性、无偏见性以及隐私保护。核心
    AI 伦理原则可分为两类。


    *   **认知原则**构成了研究 AI 伦理性的先决条件，代表了使组织能够判断 AI 系统是否符合伦理规范的知识条件。这些原则包括可解释性、可靠性、稳健性和安全性。


    *   **通用 AI 伦理原则**则代表了在多种文化和地域应用中有效的行为准则，指明了 AI 解决方案在特定使用场景中面临道德决策或困境时应如何表现。这些原则包括问责制、数据隐私、合法性、安全性、仁慈性、公平性和人类自主性。


    # 认知原则


    认识论与伦理学都关注评估。伦理学评估行为，而认识论评估信念与认知行为。认知原则代表了使利益相关者能够判断 AI 系统是否符合伦理原则的知识条件。


    ## 可解释性


    当人类能够理解 AI 模型预测和决策背后的推理过程时，该 AI 模型即被视为可解释的。许多传统 AI 模型，如线性回归和决策树，易于理解。换言之，AI 模型的可解释性越强，人们就越容易理解并信任其计算输出。机器学习模型的可解释性指的是其将原因与结果准确关联的能力。模型的可解释性通常受其复杂度影响。例如，包含五个特征的线性回归比包含一百个特征的线性回归可解释性要强得多。


    创建可解释模型的标准方法通常不如黑盒模型表现优异，这导致了模型准确性与可解释性之间的权衡。神经网络便是一种无法解释的算法示例，其输出无法解释反向传播算法计算出的值。在构建
    AI 系统时缺乏认知，或允许无法解释的黑盒存在，将导致问题频发。例如，若发现某个智能体做出错误预测，要合理解释其隐藏且几乎无法发现的单一行为几乎是不可能的。


    相比之下，可解释性则关乎 AI 模型内部所用参数能否证明结果的合理性。


    ![](img/535410_1_En_5_Fig1_HTML.jpg)


    该图描述了可解释性与可解释性之间的关系。左侧的可解释性包括透明度、结果工具、特征分析、模型工具、可视化工具和原型分析。


    **图 5-1** 可解释性与可解释性之间的关系


    可解释、可说明的 AI 通过为临床医生和患者提供共享决策所需的信息，促进了以患者为中心的护理。关于不同行动方案潜在益处与风险的有意义对话，可以借助数据得到支持，并确保患者获得最适合其情况、价值观和优先事项的治疗。有人可能会认为，黑盒
    AI 与以患者为中心的医学原则背道而驰。如果临床医生无法完全理解导致决策的特征和计算过程，他们就无法解释特定结果或建议是如何得出的。

