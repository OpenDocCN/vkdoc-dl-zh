- fmt: '### Shifting Paradigms from Volume to Value


    Current healthcare delivery models are volume-based. Paying providers based on
    the number of services or procedures they provide is known as *volume-based care*
    or *fee-for-service*. While this is an intuitive way to structure reimbursement,
    it does little to ensure systems are necessary or impactful.


    Value-based care focuses on the patient. The quality of care is evaluated through
    the patient experience and outcomes, which continuously shapes how care is given
    and received. Through the integration of technology and medicine, value-based
    care has advanced a plethora of innovation that continues to improve lives. Value-based
    care is a refreshing perspective on healthcare.


    Consider a hospital scenario, where instead of being compensated based on the
    number of patients appointments conducted, a hospital was compensated based on
    the number of patients in good health and the number of free beds available. Provider
    emphasis shifts from the time of hospital admission to forecasting future dangers
    and anticipating them with preventative strategies.


    Value-based healthcare systems are changing the delivery of healthcare:


    - From treating patient illness to managing health and well-being

    - From one-size-fits-all to precision health solutions

    - From a reactive healthcare system to a holistic, predictive healthcare system

    - From length of life to quality of life over a lifetime


    Given the financial strain healthcare systems face, value-based healthcare is
    a much-needed approach. The focus on outcomes requires quality management procedures
    including data generation, measurement, collection, and evaluation, which in turn
    facilitates improvement in care and efficiency.


    As value-based healthcare systems grow, so too do the data they generate. Value-based
    care is facilitated through collaborative clinician-patient relationships in which
    data is shared or linked with consent so that care can be coordinated and reviewed
    across disciplines. Not only does this approach drive better healthcare, but it
    can reduce redundant care and its associated costs. Figure [1-3](#535410_1_En_1_Chapter.xhtml#Fig3)
    shows how a connected health ecosystem could provide precision healthcare.


    ![](images/535410_1_En_1_Chapter/535410_1_En_1_Fig3_HTML.jpg)


    An illustrated flow diagram explains how the patient cloud provides precision
    healthcare. It starts with the patients at all stages, then moves on to health
    engagement such as data analytics and intervention. Further, it directs to the
    learning and adaptation process and then shares health and medical record.


    **Figure 1-3** How the patient cloud supports precision health


    In a value-based healthcare system, a patient at a greater risk of nonalcoholic
    fatty liver disease would be made aware of their risk as soon as possible and
    receive support to encourage positive health behaviors and self-manage their health.
    Help could come in the guise of cooking classes supported by a nutritionist to
    promote and encourage healthier behaviors. Regular diagnostic testing and monitoring
    would determine relevant biomarkers and their progress toward recommended targets.


    Health, wearable, and electronic medical record data is shared between departments
    and organizations to develop a personalized nutrition and activity plan. Patients
    are supported to realize behavioral changes through digitally delivered programs
    that provide education, peer support, coaching, and resources such as recipes
    and on-demand exercise classes. By utilizing a companion-like approach to health,
    the focus becomes preventative care rather than providing reactive, on-presentation
    care.


    With growing pressure on healthcare resources and lifestyle, behavior, and environmental
    factors accounting for 90 percent of disease risk, value-based healthcare underlines
    the role of lifestyle as medicine, making wellness and prevention key pillars.^([⁶](#fn6))


    ### Social Determinants of Health


    Precision health demands an understanding of the social determinants of health,
    which are the circumstances under which individuals are born, develop, live, and
    age. Socioeconomic position, education, neighborhood and physical environment,
    employment, social support, and access to healthcare are all examples of social
    determinants of health. Figure [1-4](#535410_1_En_1_Chapter.xhtml#Fig4) shows
    the social determinants of health.


    ![](images/535410_1_En_1_Chapter/535410_1_En_1_Fig4_HTML.jpg)


    A diagram explains the social determinants of health. An illustration of a human
    being is at the center surrounded by the blocks such as hunger, access to care,
    housing, mental health, transportation, education, income and jobs, isolation,
    and environment and safety from the clockwise direction.


    **Figure 1-4** Social determinants of health


    Research shows that the social determinants of health have a more significant
    impact on a person’s health than medical intervention. Compared to medical services,
    the social determinants of health have twice the responsibility for health outcomes.^([⁷](#fn7))


    Abundant research has shown that when it comes to patient-level care, gender,
    ethnicity, and neighborhood still have the most significant impact on accessing
    healthcare and achieving positive health outcomes. With greater reliance on digital
    tools, there is a risk of increasing health inequalities between those with skills
    and access to digital tools and those without. Precision health and social determinants
    of health entwine in their objective of improving population health, yet they
    are considered distinct concepts.


    As they address all social determinants of health, digital literacy and Internet
    connectivity have been labeled the “super social determinants of health.”^([⁸](#fn8))
    As you will no doubt be familiar, applications for driving, employment, housing,
    or other national or governmental support, each of which can affect an individual’s
    state of health, are increasingly accessible online and often exclusively. During
    COVID lockdowns, many services were available exclusively online. The resource
    and time costs to empower a person to use the Internet is far less than those
    incurred by treating health conditions. Hence, improving digital literacy skills
    and empowering citizens with Internet connectivity can provide valuable tools
    to reduce disparities.


    There are significant gaps in the use of the Internet within rural and socio-economically
    deprived communities alike and older adults. According to research, more than
    60 percent of people older than 65 and 30 percent of those earning less than $30,000
    own a smartphone, and many low-income households share devices, which poses access
    and privacy concerns for data purists.^([⁹](#fn9)) Understanding the complexities
    of healthcare access in the communities that they serve can assist healthcare
    systems in implementing more inclusive policies to guarantee that no patient is
    left behind.


    While it is unclear which social determinants of health best and most strongly
    relate to clinical and community health intervention, AI is seen as a communicator
    between the two constructs. A patient’s social determinants can be merged with
    the patient’s health-specific information and AI used to generate and map treatment
    protocols, with the sum of individual health closer to the nation’s overall population
    health.


    Addressing the social determinants of health is the primary focus for achieving
    equitable health access and outcomes. Health equity is realized when all people,
    regardless of their social position or environment, have the opportunity to attain
    their full health potential.'
