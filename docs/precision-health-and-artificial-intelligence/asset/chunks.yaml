    # 6. Future of Precision Healthcare


    Digital health technologies and AI are already creating intelligent processes
    and workflows that make healthcare delivery cheaper, more effective, personalized,
    and more equitable. Yet precision health seeks to go beyond this and improve patient
    management and diagnoses by understanding the human condition and experience deeper.
    Much of the emphasis has been placed on the potential for developing better medicines
    based on an increased understanding of disease pathology. Now that data and technology
    are readily available and affordable, improvements in diagnostics and support
    are enabling better patient management. The quantity and complexity of data reflect
    a patient’s genetics, environment, and lifestyle.


    Big data and AI technologies provide enormous potential to identify new conditions
    and prognostic indicators, provide precision behavioral change support, and rehabilitation
    or identify patients who will respond better to treatments. Yet this is not without
    its challenges.


    The greater the level of detail with which we understand patients, the greater
    the demand for information management, accountability, and transparency. And while
    we develop more profound knowledge about delivering personalized care, how do
    we use this knowledge to reduce the incidence of future disease and mitigate the
    technical, clinical, and ethical issues that arise? Should precision medicine
    prioritize prevention over cure, which is much the focus of current medicine?
    Do you want to know that you are at risk of developing a disease if there is no
    treatment or cure for it? There are many issues to consider when dealing with
    technologies that predict future possibilities of unknown magnitude and significance.
    This chapter identifies important themes in pursuing precision health and posits
    potential impact and consequence.


    ## Precision Care from Birth to Death


    Low-cost genetic testing provides a human gene map that clinicians can use to
    understand an individual’s health and disposition to disease. Targeted next-generation
    sequencing enables rapid identification of common and rare genetic variations.
    Detecting variants contributing to therapeutic drug response or adverse effects
    is essential for implementing individualized pharmacotherapy and provision of
    support. Rather than behavioral support delivered as an intervention, lifestyle
    support will be provided from birth through digital therapeutics alongside prescribed
    pharmacological interventions that will one day be supported by nanotechnologies
    to offer therapy and support and replenish the body. Clinicians, supported by
    automated technologies, will analyze the state of health and disease risk in real
    time. As each person receives more significant access to richer, real-time, granular
    data about themselves, they will learn more about themselves and, if this information
    is made public, about others in the community. It is feasible that given population-level
    genetic, lifestyle, and behavioral data, AI may not just predict ill health and
    disease but also approximate the exact point of death. Figure [6-1](#535410_1_En_6_Chapter.xhtml#Fig1)
    shows inputs and outputs of a precision healthcare tool.


    ![](images/535410_1_En_6_Chapter/535410_1_En_6_Fig1_HTML.jpg)


    A block diagram illustrates the precision healthcare tool as a central block surrounded
    by inputs and outputs. Inputs are genomics, demographics, preferences, physiology,
    behavior, environment, and others. Outputs are disease susceptibility, diagnosis,
    prognosis, and treatment response.


    Figure 6-1 Precision healthcare tool: inputs and outputs


    ### Nanotechnology


    A nanometer is one-billionth of a meter (`0.000000001 m`), which amounts to the
    width of three to five atoms. Nanobots are currently around `0.1–10 micrometers`
    in diameter, so they are not quite at the nano scale. However, nanobots can be
    used, for instance, to perform chemotherapy precisely on cancer cells. Nanobot
    delivery would decrease the negative effect of chemotherapy on healthy cells and
    improve patient health and well-being.


    ### DNA Manipulation and Gene Therapy


    Gene therapy, the treatment of disease through the manipulation of DNA, is one
    of the fastest-growing areas of precision health, with more than 2,000 therapies
    in development across the world. It is hoped that researchers can find cures for
    infectious and noncommunicable diseases by making precise changes to the human
    genome. Concerns remain, however, that poorer countries lacking infrastructure
    for manufacturing and delivering gene therapy by default lack access to such treatments.


    ### Smart Sensors


    Wearable sensors can be classified into physiological, biochemical, and multiplexed
    sensors according to different monitoring objects. Wearable biochemical sensors
    are already available for tracking target analytes in readily available biological
    fluids (such as saliva, tears, and sweat). However, sensors are becoming smaller
    and even more intelligent. Smart pills are such an example—small ingestible pills
    equipped with sensors that have roles in medication adherence and exploring otherwise
    inaccessible environments such as the gastrointestinal (GI) tract. Many areas
    of the body are currently inaccessible. Smart pills enable unobtrusive monitoring
    and a wealth of data that will significantly advance understanding and precision
    health delivery.'
