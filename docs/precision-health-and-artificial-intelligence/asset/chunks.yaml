    essential information with little interactivity. Although covering general rehabilitation
    principles, existing apps lack Long COVID specificity and personalized interactivity.
    We need ways to reach people equitably to manage Long COVID and support focused
    rehabilitation and outcomes. Current tools are either informational or a GUI mobile
    app and do not monitor symptoms or provide support by voice, excluding 60 percent
    of people over 65, a key Long COVID risk group, who do not use a smartphone.


    With AI voice assistants, speech can be transformed into a vital sign, allowing
    health assessment and symptom-based rehabilitation. In the same way that temperature
    indicates fever, vocal biomarkers offer a more complete picture of our health.


