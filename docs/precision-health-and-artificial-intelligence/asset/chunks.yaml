  trans: '

    ### 测量与完整性


    必须考虑可用数据的完整性、自我报告数据中的不准确和不精确之处，这些因素可能在个体和群体层面显著扭曲结果。数据缺失是系统内偏倚的潜在入口。


    此外，直到最近，患者报告的测量指标在现实医疗中仍被视为不科学或难以实际应用。然而，近期研究表明，临床医生可以高效收集患者报告的健康行为、心理健康和偏好数据，且与临床收集的数据偏差极小。^(⁴³)


    ### 健康社会决定因素数据匮乏


    健康的社会决定因素对患者是否参与医疗保健有着巨大影响。研究表明，健康社会决定因素对医疗可及性和结果的影响大约是医疗干预的两倍。^(⁴⁴,) ^(⁴⁵) 随着大规模医疗健康数据的获取成为可能，确保将健康的社会和环境决定因素（如种族、性别、教育、合并症、收入、就业、识字率和居住社区）的数据与生物医学数据相关联，将显著改善人群和个体的医疗保健水平。


    解决社会决定因素的技术示例包括针对种族、性别、民族、宗教和语言的行为改变平台和健康计划。尽管在解决健康社会决定因素方面出现了积极迹象，但挑战仍然是可用数据的稀缺性。


    ### 隐私与安全


    健康数据及非标准数据（例如通过社交媒体或 GPS 监测进行的即时生态评估）的收集和使用，引发了严重的隐私、安全和伦理问题。疫情期间，许多医疗服务为保持护理连续性而迅速数字化。自疫情开始以来，数据收集和传播为抵御新冠病毒传播提供了关键支持。然而，公众对数据使用、隐私和安全的态度和看法仍需进一步了解。


    2022 年一项旨在更好了解人们分享数据意愿的最新研究收到了 4,764 份回复，显示了公众对该话题的关注。^(⁴⁶) 更多人愿意分享匿名数据而非个人身份信息。人们表示乐于分享能够惠及他人的数据；如果分享个人身份信息的目的被认为有益于他人健康，66%的人愿意分享；63.9%的人同意与政府或卫生当局分享个人敏感健康数据。尽管如此，人们对数据使用仍存在严重担忧。


    超过四分之一的受访者表示不信任任何组织能保护他们的数据，54%的受访者担心分享个人信息的后果。令人担忧的是，近三分之二的受访者担心缺乏旨在防止数据滥用并在数据滥用时追究组织责任的适当立法。数据所有者（服务使用者）在数据安全、隐私和信任相关的伦理与监管方面日益重要。


    在安全地聚合和匿名化数据的同时，保留其中存在的所有多维统计属性和关系是一项挑战。尽管如此，隐私必须优先于组织间的数据共享与交换。隐私可以采取例如合成数据或匿名数据的形式，研究人员可以自由共享这些数据，并采用保护个体身份识别的算法。学术界、组织、政府和监管机构需要做更多工作，让公众参与到合乎伦理且透明的数据共享中来。


    随着数字表型分析超越传统数据源，并为庞大且多样的人群消费各种大数据，需要开展透明的研究，包括知情同意、共同开发患者和临床医生解决方案，以及在产品生命周期的每个阶段让利益相关者参与其中，以建立信任。该领域法律指导的初步性表明，需要在诸如大流行病等救灾行动中制定人道主义数据责任指南，并让公众参与其制定过程。


    ### 成本


    精准医疗强调关注传统上与健康和疾病无关的数据，同时也关注遗传学。然而，无论医疗系统如何，资源成本都必须被视为精准医疗中的一个重要变量。健康监测可能很快变得昂贵，因此必须在整个护理连续过程中确定并实施具有成本效益的策略。


    例如，虽然存在静态生物标志物（如特定的基因变异），但其他标志物会随时间变化，需要定期评估。理想情况下，许多标志物可以高精度预测未来健康状况；研究人员应确定一组具有成本效益的标志物，以最小的负担保证相同的性能。可以合理推测，在未来的某个时间点，将存在足够的数据，仅需遗传和生活方式数据就能提供个体近乎完整的精准健康图景。挑战在于如何在不付出过高成本的情况下实现这一目标。


    ### 与数据脱节


    尽管人们可能通过`Apple Health`或`Google Fit`等服务访问其可穿戴设备和设备数据，但他们仍然无法控制自己的医疗数据。电子健康记录系统和数据仓库相互孤立，未能利用互联护理的优势。


    ### 通用数据模型采用有限


    数据协调是一个巨大的数字挑战，未来的标准必须继续促进共同理解，以实现精准护理。需要统一的结构和语义表示以及数据模型，以促进健康生态系统之间的互操作性和连通性。然而，目前尚不存在完全统一的模型，各国、各供应商和国际上使用了广泛的数据模型和术语，一些组织甚至没有数据标准。


    `OpenEHR`是一个标准数据模型在大型医疗服务中被初步采用的绝佳范例。该平台提供了一种产品和中立于供应商的结构化方法，用于定义健康数据、数据内容和术语，从而支持护理参与、协调和协作。


    ### 超越定性数据


    精准健康领域的大多数发展都集中在组学和设备驱动的历史数据上，这些数据用于训练预测算法。精准健康已成为定量研究的代名词，而定性健康数据在精准健康研究中几乎未被利用。排除定性数据（主要是非结构化数据）可能会遗漏关于人类行为、观点、个体细节以及其他背景因素的最精确和信息最丰富的数据。

    '
- fmt: '# A Paradigm for Acting on Data


    Collecting data is for taking action. This can be modeled using the Sense, Think,
    Act paradigm. Whether a human, artificially intelligent agent, or hybrid conducts
    the thinking, what differentiates data value creation is how these aspects are
    used to deliver meaningful value that engages their ecosystem, optimizes operations,
    and creates new efficiencies and opportunities. Figure [3-4](#535410_1_En_3_Chapter.xhtml#Fig4)
    provides an approach for digital transformation known as Sense, Think, Act.


    ![](images/535410_1_En_3_Chapter/535410_1_En_3_Fig4_HTML.jpg)


    A block diagram of the sense, think, and act paradigm. Each has an example.


    Figure 3-4


    The Sense, Think, Act paradigm of digital transformation


    Sense refers to the continuous collection of data from multiple sources in real
    time. Think refers to the aggregation, analysis, and development of information
    and knowledge from data. Act refers to an action that takes place with an awareness
    of the contextual landscape from data sources available to the agent conducting
    an activity. It is from these actions that measures are taken to transform the
    information into value.


    ## Turning Data into Information, Knowledge, and Wisdom


    IBM reports that more than 1TB of data is created daily, but less than 1 percent
    of the data is being used.^([^(47)](#fn47)) Data’s value is demonstrated in the
    ability to convert it into information that can drive actionable insight to drive
    behaviors and workflows. Data analytics is a theme within data science that seeks
    to draw information from raw data sources. Real-time analytics supports agile
    insight discovery and analysis at the point of decision.


    Data, however, does not equal knowledge. To be used in the decision-making process,
    data must go through a transformation process that involves six steps:


    * Collection

    * Organization

    * Processing

    * Integration

    * Reporting

    * Utilization


    Data is transformed into information that enables knowledge if interpreted correctly.
    The Data, Information, Knowledge, Wisdom (DIKW) pyramid is a common model for
    thinking about data transformation and value creation. Figure [3-5](#535410_1_En_3_Chapter.xhtml#Fig5)
    is an adaptation of the DIKW model, which shows how data is relevant to digital
    transformation.


    ![](images/535410_1_En_3_Chapter/535410_1_En_3_Fig5_HTML.jpg)


    A diagram of the conversion of data into information, knowledge, and wisdom. On
    the left, a pyramid begins with data, then information, knowledge, and wisdom
    from bottom to top. On the right are value development and realization with respect
    to improvements.


    Figure 3-5


    Using data to enable information, knowledge, and wisdom


    Data enrichment is transforming data into information, knowledge, and wisdom.
    Value development refers to how an opportunity’s value is developed by applying
    those transformations. Value realization refers to value development regarding
    outputs, products, services, and outcomes.


    As the scale and importance of data increases, the time between data creation
    to insight and action needs to be reduced. There is substantial economic value
    in reducing the time from a detected event to an automatic response, which can
    identify fraudulent transactions, improve service capacity by freeing up hospital
    beds when patients are immediately ready for discharge, and spot signs of deteriorating
    health before a catastrophe.


    ## Summary


    To fully realize the potential inherent in the big data we can now generate, we
    must change the way we work. Creating collaborative networks and sharing data
    and models are more important than ever, and this process increasingly necessitates
    bridging to less traditional collaborating specialties such as engineering, computer
    science, and industry.


    While data collection and analysis can provide substantial insight, digital phenotyping
    is a powerful tool for assessing individual health conditions and studying wider
    public health trends.


    As stakeholders act on the insights and knowledge generated through digital systems,
    they will produce better engagement with patients and clinicians, better products
    and services, and new applications of precision health. Making the most of big
    data will be a challenge, but the potential rewards are even more remarkable.
    In the next chapter, we will explore the foundations of artificial intelligence
    and its application to precision health.


