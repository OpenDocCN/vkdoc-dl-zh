    # 7. 实践中的精准医疗


    尽管精准医疗在不同领域的实施方式各异，但它已燃起人们对革命性疗法的希望，并推动了新型治疗方法的激增以及医疗保健体系的重新配置。本章将阐述精准健康领域一些引人注目且具有时间复杂性的问题，这些问题将在其新兴的框架下进行分析。


    健康技术最终必须做到无害。因此，对患者风险的判定可以对数字技术进行分类。系统可以在不带给患者可衡量益处的情况下提高系统效率，提供信息并进行远程监控，鼓励行为改变和自我管理，提供临床决策和预测支持以指导治疗，并输出可供工具进行计算和诊断的结果。然而，由于监管机构的证据要求是由预期用途决定的，许多数字发明都游离在监管之外。


    随机对照试验（`RCTs`）被认为是评估治疗效果最有力、最可靠的证据形式。证据表明，许多因素会影响`RCTs`的可靠性，包括方法学质量、报告质量和资金来源。真实世界评估，或者说大规模`N=1`的力量，颠覆了传统的层级结构和方法。这种颠覆可能是有益的，因为原则上，真实世界数据可以捕捉到大多数使用服务的人的经验，而不是仅参与试验的
    5%到 10%的人。


    通过手机、社交媒体、数字社区、健康应用、营养追踪、可穿戴设备和健康物联网，人类体验的数据化使患者能够成为自己的证据基础，并影响医疗保健学术界和认知。


    疫情促使医疗服务提供者转向数字工具和可扩展技术。据观察，医疗服务提供者对创新的接受阈值各不相同，可以归类为典型的五种创新者原型。然而，确定新解决方案的合法性和安全性对最终用户（无论是患者还是临床医生）来说是一个重大障碍。同样，创新者需要证明其益处并符合标准。不明确的最终用户期望、不断变化的证据要求以及不断变化的监管环境，只是精准健康生态系统面临的诸多挑战中的一小部分。


    每个案例研究的目的是展示智能精准健康系统在现实世界中的创新示范，并展示个性化、定制化护理的力量和影响。


    以下案例研究突出了基本原则和最佳实践：


    -   “通过数字工具为住院患者提供专科多学科体重管理”

    -   “了解人们对数据的看法，以优化针对长期健康问题患者的专科足病服务”

    -   “针对 2 型糖尿病和糖尿病前期自我管理的数字干预措施评估”

    -   “基于语音的症状监测和基于人工智能的康复治疗用于长新冠患者”

    -   “通过基于家庭的行为改变支持，帮助儿童和年轻人过上更健康的生活”


    ## 通过数字工具为住院患者提供专科多学科体重管理


    *以下案例研究展示了一个精准健康工具在医院内应用的实例，该工具用于提供多学科专科体重管理、远程监控和双向沟通，以促进一个积极参与、协作的患者中心生态系统。*


    在英国，27%的男性和 30%的女性患有肥胖症^(⁷⁸)，他们患 2 型糖尿病（`T2D`）、心理健康问题、特定恶性肿瘤等慢性疾病的风险更高，且预期寿命缩短。^(⁷⁹)
    此外，肥胖人群因 COVID-19 住院和出现不良后果（包括死亡）的风险更大。^(⁸⁰) 仅在英国，2014 年肥胖管理的预估医疗成本为 61 亿英镑（85
    亿美元），预计到 2050 年将增至 97 亿英镑（135 亿美元），而每年对社会的更广泛成本估计为 499 亿英镑（692 亿美元）。^(⁸¹)


    在英国的国民健康服务体系（`NHS`）内，一个分层框架构成了肥胖管理的金字塔结构，其中资源逐渐受限且患者数量减少是向上层进展的典型特征。初级保健机构（第一层）的肥胖管理包括促进健康生活方式、教育和预防策略。社区服务（第二层）通常包括饮食建议和优化的体育活动。对于更严重肥胖（`BMI
    > 40 kg/m2` 或伴有肥胖相关合并症的 `BMI > 35 kg/m2`）的患者，有医院内的肥胖管理（第三层），通常由一个多学科团队组成，包括专科营养师、医务人员和心理支持。减重手术（第四层）位于该结构的顶端，因此代表了一种受限的资源（尽管它是肥胖症的极佳治疗选择），仅适用于极少数可能符合手术条件的肥胖人群。^(⁸²)


    医院内的肥胖管理（第三层和第四层）是受限的，因此不代表一种可扩展到人群水平的模式。^(⁸³) 此外，近年来对包括转诊在内的肥胖服务的需求有所增加。我们以英国考文垂和华威大学医院（`UHCW`）自身的医院内第三层和第四层肥胖服务为例来说明这一点，在
    2014 年（207 例新转诊）到 2019 年（1319 例新转诊）的 5 年间，转诊数量增加了六倍以上，目前有超过 1800 名患者在使用我们的肥胖服务。尽管新转诊数量激增，但这个数字可能比当地有资格转诊到我们服务的成年人数量低一个数量级，据估计，目前居住在考文垂和华威地区、`BMI`大于`40
    kg/m2`的男性和女性比例分别为 2%和 4%。^(⁸⁴,) ^(⁸⁵,) ^(⁸⁶) 因此，英国绝大多数严重肥胖人群的巨大需求未得到满足，而`NHS`肥胖管理框架内现有的医院内第三层和第四层服务根本无法满足这些需求。此外，在初级、社区和二级保健机构的不同肥胖管理层级之间，患者的诊疗路径常常是脱节的。不幸的是，COVID-19
    疫情阻碍了所有层级肥胖管理的有效实施，涉及多种因素，包括人员重新部署、临床区域功能转换、择期手术限制、封锁措施、远程预约以及患者对前往医疗机构就诊的恐惧等。


    数字工具有着变革体重管理服务的巨大潜力。尽管各种数字和移动设备应用在医院内第三层和第四层肥胖管理环境中具有潜在效用，但迄今为止，这种创新尚未发生。有新的证据表明数字工具在肥胖管理中的有效性。目前的证据显示，数字健康干预措施在专科减重方面初显成效，但数字工具的采用率和参与度低仍然是数字健康干预措施面临的常见挑战。^(⁸⁷)

