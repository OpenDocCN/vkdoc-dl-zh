- fmt: '# Why Diversity Is Essential Within Precision Health


    My journey into precision health started in 2002 when I began an undergraduate
    master’s degree in artificial intelligence at Imperial College, London.


    At the end of my first semester, my grandfather, Anupam, was suddenly admitted
    to the hospital after suffering a heart attack and required an emergency quadruple
    heart bypass. Upon discharge, he was subsequently diagnosed with type 2 diabetes
    and instructed to follow a healthy, balanced diet. Not knowing how to manage his
    condition in a way that suited his Bengali-Indian lifestyle, my grandfather asked
    me for guidance on what to eat. I certainly had no idea, and neither did he, so
    we searched the Internet. What became immediately evident was the lack of content
    applicable to people like my grandfather, particularly to people from ethnic minority
    communities. He didn’t need to be told about alternatives to sandwiches and breakfast
    cereals, but instead what to replace his roti, naan, and rice with. It was at
    this point I founded a global community for people with long-term health conditions.
    At that moment, a chance conversation about what my grandfather should eat to
    manage his newly acquired diagnosis turned into a passion for empowering people
    through data-driven, evidence-based digital health innovation. My role has provided
    unrivaled insight into a population of people with long-term health conditions,
    their families and caregivers, and the multitude of cultures and ethnicities that
    sit within this. As of 2022, ethnic minority communities are grossly misrepresented
    in healthcare. Today, as founding CEO at DDM Health, I am fortunate enough to
    lead a team that provides evidence-based precision digital therapeutics that care
    for more than 1.8 million people across seven countries in 19 native languages,
    existing to empower *everybody*.


    Based on my own experiences and those of my family, I have been inspired to ensure
    under-represented communities are represented in, engaged in, and benefit from
    digital health. Using digital technology has provided an opportunity to engage
    people by personalizing a person’s experience to their expectations, whether that
    is culture, language, social norms, or otherwise. By engaging and co-developing
    innovation with clinicians and patients, we have developed scalable, engaging,
    and effective solutions personalized for people of all heritage and not just those
    from ethnic minority communities.


    Why is this important? Because achieving the goal of precision health for all
    requires the continued evaluation of what makes us different. Diversity is to
    be celebrated everywhere, and particularly within healthcare, as it serves as
    the means to a more inclusive, just, and effective healthcare system. It is crucial
    to understand disease through the context of human diversity, which isn’t just
    about genetic heritage but also about how different people respond to illness
    and their environment. People’s lived experiences are also data and expertise,
    and diversity enables us to engage and understand other cultures and worldviews.
    Not only does this overcome many biases—human bias, intelligence bias, machine
    bias, and data bias—but it also drives inspiration, innovation, and outcomes,
    self-realizing the goals of precision health. If digital health services are not
    provided equitably, bias becomes intrinsic, and quite frankly, that is a problem
    for everyone. Similarly, it is clear that healthcare services require an ethical
    and moral framework that it is our duty to be part of—to deliver, protect, and
    uphold.


    ## Summary


    Precision health holds tremendous promise for improving all aspects of healthcare.
    Some of these benefits have already been realized in the form of clinical decision
    tools, digital therapeutics, and -omics technologies, but a connected ecosystem
    is many decades away. Precise, tailored healthcare, from pediatrics to palliative,
    will be realized only once technologies, datasets, and communications are available
    ubiquitously. Until then, precision health acts in silos and will empower selected
    communities. Thus, precision health requires active responsibility and leadership
    from all stakeholders to ensure its benefits are realized by everyone.


