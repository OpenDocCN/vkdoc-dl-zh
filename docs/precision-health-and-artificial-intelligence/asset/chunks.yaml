- fmt: '### Participation


    `Participation` changes the role of the patient from being a passive recipient
    of care to a responsible, active, and well-informed patient at the center of their
    care. Patients (or carers where patients are unable to provide consent) are involved
    in all aspects of their care, including supported decision-making, self-monitoring,
    self-management of health, goal-setting, and behavioral change. `Participation`
    is a whole-systems approach to engage patients and, more important, support clinicians
    in engaging patients within their health. Clinician apathy has been long demonstrated
    to be a key component in patient engagement with digital tools.^([^(18)](#fn18))
    `Precision health` aims to ensure the right clinical decision is made for each
    patient rather than providing the right treatment at the right time for the right
    patient.


    Examples of enabling patients to become active participants in their care are
    primarily driven by technology. For instance, rather than repeatedly attending
    laboratory testing, by-mail diagnostic testing allows wider groups of patients
    to participate in trials and research studies.


    Community forums and member groups have contributed a significant amount of unstructured
    data. Apps such as `Diabetes.co.uk` provide a platform for patients to discuss
    their health and medications and share personal experiences. Participation in
    communities such as these has encouraged new ways of clinical practice and influenced
    healthcare paradigms. Research has shown that `Diabetes.co.uk` was an early platform
    that collected information and experiences about the benefits of a low carbohydrate
    diet from patients with type 2 diabetes and supported a change in the understanding
    of type 2 diabetes and its potential treatments with clinical and patient communities
    alike.^([^(19)](#fn19),) ^([^(20)](#fn20)) Healthcare providers can use growing
    data pools to define and refine the precision health experience.


    A key aspect of digital participation is the mode of access. Enabling multiplatform
    participation ensures maximum accessibility for diverse and seldom-heard communities.
    For example, 60 percent of people older than 65 in the UK do not own a smartphone,
    meaning digital technologies and health programs require multimodal access and
    digital exclusion support to ensure access and equity. ^([^(21)](#fn21))


    Notwithstanding, smart homes have the potential to move whole communities out
    of digital exclusion and support smart living, healthy aging, and longevity. Smart
    homes are adequate for home healthcare delivery as technologies can enable cost
    improvements and improve independence. It’s not long before a dwelling is controlled
    through a virtual assistant operating the home’s alarm clock, temperature, and
    solar panels and receiving package deliveries by drone. People’s habits and behaviors
    are increasingly tracked to provide data that allows intelligent insights. Bluetooth-enabled
    water bottles, for instance, can confirm how much hydration has been received
    by an older person. As homes become more competent and cheaper to furnish with
    IoT devices, healthcare will naturally involve participants in day-to-day living,
    supporting the optimization of moment-by-moment wellness.


    ### Population


    The fifth P, the population perspective, is required to fulfill the notion of
    precision health. With good reason: precision health enables population health
    to realize its aim of empowering all without disparity. A population perspective
    integrates precision health into the ecologic model of health. The approach applies
    the principles of population screening to preventive medicine and uses evidence-based
    practice to personalize medicine delivery. Treatment is then appropriately delivered
    across the three core functions of public health: health promotion, prevention
    of ill health, and health protection.


    Population health stands to improve by applying complementary individual and public
    health approaches to healthcare and disease prevention. However, this requires
    focusing on health’s social and environmental determinants to address health inequalities.
    Balanced strategies that implement individual and population-level interventions
    can maximize health benefits, minimize harm, and avoid unnecessary healthcare
    costs. With growing awareness of the nuances of population-level data, bias, and
    support in engaging harder-to-reach communities, the potential benefits of five
    P care are limited only by the data available.


    ## Considerations of Precision Health


    While precision health holds great promise, there are several considerations to
    be aware of.


    ### Cost


    The cost of precision health is twofold: money and time. While genome sequencing
    and genetic testing costs are decreasing, the still-prohibitive cost of these
    technologies is a critical barrier to realizing precision health.^([^(22)](#fn22))
    The probability of disease complications also affects the cost-effectiveness of
    precision health interventions. For instance, a patient with late-stage pancreatic
    cancer may benefit from a precision health intervention. However, the cost-effectiveness
    would be lower as the potential benefit, and health outcomes that the patient
    can realize are lower. It is feasible that healthcare providers will conduct testing
    at birth and earlier stages of the disease pathway to make genetic testing cost-effective
    and facilitate early-stage treatments.


    Clinicians delivering precision health and patients receiving precision care must
    understand how to use their respective technologies. All clinical stakeholders
    require training on new technologies, procedures, and policies to deliver precision
    healthcare. Similarly, patients receiving care through digital apps and devices
    need to understand how to use the technologies involved in their care. Healthcare
    providers would expect both types of training from the developers of the precision
    health tool. Additional software licenses and devices also represent pertinent,
    often unconsidered costs.


    The benefits of precision healthcare commercialization include pricing that is
    transparent and nonprohibitive. The misguided incentives of volume-based care
    are replaced with outcomes-based models that re-incentivize providers. For instance,
    digital health companies such as `DDM Health` utilize outcomes-based models in
    large-scale deployments of precision health self-management tools.^([^(23)](#fn23))
    The model is nonprohibitive and enables scalable models that realize the tenets
    of value-based care.


    ### Genes Are Just the Beginning


    Healthcare tailored to a patient’s genetic profile vastly improves health outcomes
    in terms of pharmacogenomics, day-to-day behavioral change, and living well. Genetic
    testing at birth can undoubtedly support these moment-by-moment healthcare optimizations.
    However, the potential consequences of genetic testing, including discrimination,
    distress, and unintended consequences, are largely unexplored.


    The genomics era of healthcare urgently needs a precision public health ethics
    framework that integrates the critical moral commitments and ethical requirements
    of precision medicine and traditional public health.'
