  trans: "\n## 2.3 数据处理与应用设计\n\n### 2.3.1 数据收集过程与数据集描述\n\n在数据收集过程中，我们调研了多种现有数据集，最终选择了最能实现目标可持续发展目标（SDGs）的数据集。该数据集来自\
    \ Kaggle，利用美国国家可再生能源实验室的软件模拟了德克萨斯州某特定区域 2021 年全年的时序数据。\n\n收集的数据主要侧重于获取风力涡轮机系统在一天中不同时间、不同环境条件下的发电量。这些环境条件作为预测变量，包括风速、风向、大气压力和气温，数据按小时采集，时间从凌晨\
    \ 12 点至晚上 11 点。最后，所有数据以 CSV 文件格式记录，并命名为`TexasTurbine.csv`。表 2-1 展示了该 CSV 文件的部分实例。\n\
    \n**表 2-1** `TexasTurbine.csv`\n\n| 时间戳 | 系统发电量/(kW) | 风速/(m/s) | 风向/(deg) | 压力/(atm)\
    \ | 气温/(⁰C) |\n| --- | --- | --- | --- | --- | --- |\n| 1 月 1 日 00:00 | 1766.64\
    \ | 9.926 | 128 | 1.00048 | 18.263 |\n| 1 月 1 日 01:00 | 1433.83 | 9.273 | 135\
    \ | 0.99979 | 18.363 |\n| 1 月 1 日 02:00 | 1167.23 | 8.66 | 142 | 0.999592 | 18.663\
    \ |\n| 1 月 1 日 03:00 | 1524.59 | 9.461 | 148 | 0.998309 | 18.763 |\n| 1 月 1 日\
    \ 04:00 | 1384.28 | 9.184 | 150 | 0.998507 | 18.963 |\n| 1 月 1 日 05:00 | 1293.93\
    \ | 8.996 | 149 | 0.998507 | 19.063 |\n| 1 月 1 日 06:00 | 1301.63 | 9.016 | 151\
    \ | 0.998211 | 19.113 |\n| 1 月 1 日 07:00 | 1308.13 | 9.036 | 154 | 0.997815 |\
    \ 19.163 |\n\n该原始数据集包含了所有相关属性，可用于预测风力涡轮机的发电量（单位：kW）。\n\n### 2.3.2 数据预处理步骤\n\n\
    获取原始数据集后，需对其进行预处理，以便指定的机器学习算法能够处理。数据预处理的主要步骤如下所述。\n\n1.  **检查缺失值并填充。**  \n   \
    \ 数据预处理的第一步是检查数据集中是否存在缺失数据或实例，并为这些数据赋值，或删除缺失值过多的行。然而，所选数据集不包含任何此类值或实例，且格式已完整。\n\
    \n2.  **移除不必要的属性。**  \n    在原始数据集中，移除了时间戳，因为 KNN 机器学习算法不会使用该数据。目标是利用不同的环境属性来预测风力涡轮机的发电量。\n\
    \n3.  **添加新属性。**  \n    由于算法除了预测功率值外，还将执行分类，因此在数据集中新增了一个名为`PowerCategory`的属性。该类别根据发电量的值分配标签，例如高、中、低。\n\
    \n### 2.3.3 风力涡轮机建模\n\n风力发电的分类是通过考虑风速、压力和温度等预测变量来完成的。这可以通过以下公式建模：\n\n![$$ 风力功率=\\\
    frac{1}{2}\\times \\rho \\times A\\times {V}³ $$](img/625524_1_En_2_Chapter_TeX_Equ1.png)\n\
    \n(2.1)\n\n![$$ 其中 $$](img/625524_1_En_2_Chapter_TeX_Equa.png)\n\n![$$ V\\ 是风速，\\\
    rho\\ 是空气密度，由以下公式给出： $$](img/625524_1_En_2_Chapter_TeX_Equb.png)\n\n![$$ \\rho\
    \ =\\frac{压力}{气体常数\\times 气温}，且气体常数=8.314\\frac{\\frac{J}{mol}}{K} $$](img/625524_1_En_2_Chapter_TeX_Equ2.png)\n\
    \n(2.2)\n\n此外，*A* 是扫掠面积，由以下方程给出：\n\n![$$ A=\\pi\\ {\\left(\\frac{D}{2}\\right)}²\
    \ $$](img/625524_1_En_2_Chapter_TeX_Equ3.png)\n\n(2.3)\n\n*其中 D 是涡轮机叶片直径的两倍*。\n\
    \n假设风力涡轮机的半径为 1.5 米，则直径为 3 米。该模型基于风力涡轮机的动能原理，主要由风速定义以提供其相应的机械风力功率。同时，假设涡轮机的损耗可忽略不计，所有机械功率都转换为电功率（Salih\
    \ Mohammed Salih, 2012）。\n\n因此，分类结果如表 2-2 所示（Yiannis A. Katsigiannis, 2013）。\n\
    \n**表 2-2** 功率分类\n\n| 风速 / ms^(-1) | 分类 |\n| --- | --- |\n| 0 – 7.5 | 低 |\n| 7.5\
    \ – 8.5 | 中 |\n| 8.5 及以上 | 高 |\n\n引入类别属性后，新的数据集被保存并用于训练机器学习模型。\n\n最终输入模型的 CSV\
    \ 文件格式如表 2-3 所示。\n\n**表 2-3** 最终 CSV 文件\n\n| 系统功率 | 风速 | 风向 | 压力 | 温度 | 功率类别 |\n\
    | --- | --- | --- | --- | --- | --- |\n| 2036.19 | 10.608 | 136 | 0.984488 | 21.163\
    \ | 高 |\n| 2288.37 | 11.171 | 142 | 0.986561 | 20.563 | 高 |\n| 1762.46 | 9.995\
    \ | 150 | 0.986856 | 21.063 | 中 |\n| 1202.84 | 8.518 | 155 | 0.987152 | 21.563\
    \ | 中 |\n| 461.536 | 6.426 | 159 | 0.992483 | 21.363 | 低 |\n| 530.497 | 6.723\
    \ | 165 | 0.991792 | 21.163 | 低 |\n\n### 2.3.4 程序结构\n\n图 2-1 展示了包含所有 HTML 和 JavaScript\
    \ 文件的整体程序结构。需要注意的是，本章的所有代码均位于本书 GitHub 页面上的`Chapter 2 – Codes`文件夹中。\n\n![](img/625524_1_En_2_Fig1_HTML.png)\n\
    \n**图 2-1** 整体程序结构\n\n**Web 应用程序布局**\n\n图 2-2 展示了包含不同按钮和文本字段的 Web 应用程序布局。\n\n\
    ![](img/625524_1_En_2_Fig2_HTML.jpg)\n\n**图 2-2** 网站布局\n"
- fmt: '### KNN


    The program is based on the KNN machine learning algorithm (where `k=3`), which
    will accept a training dataset, which is the preprocessed CSV file, and will perform
    both classification and regression of the power generated by wind turbines. Classification
    of the power category is more suitable before the establishment of the wind turbines,
    especially during the planning process, and can be helpful in determining what
    size of wind farm can be mounted so that the wind energy is used in the most efficient
    manner possible. On the other hand, regression allows for more accurate predictions
    of the power given an already established wind farm. Figure [2-3](#625524_1_En_2_Chapter.xhtml#Fig3)
    illustrates the program workflow of the model.


    ![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Program workflow, KNN


    Figure [2-4](#625524_1_En_2_Chapter.xhtml#Fig4) gives the program structure of
    the `main.js` file. The program consists of a main JavaScript class called `main.js`,
    which is primarily responsible for the prediction tasks. This class has a main
    method, namely, the `getKNNRegression()` and function, where the latter allows
    prediction of the system power based on the three nearest neighbors.


    The pseudocode in Listing [2-1](#625524_1_En_2_Chapter.xhtml#PC1) provides a broad
    overview of how `main.js` works.


    ![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig4_HTML.png)


    Figure 2-4


    Program structure: `main.js`


