    ### 3.3.4 Web 应用程序布局


    图 3-4 展示了 Web 应用程序的布局。


    ![](img/625524_1_En_3_Fig4_HTML.jpg)


    **图 3-4** Web 应用程序布局


    图 3-5 展示了作物分类的流程图。首先，程序会等待用户选择数据集，该数据集为 CSV 文件格式。利用 `FileReader` 依赖项读取 CSV 文件，并从中提取每一行和每一列。为了提取行和列，使用了名为
    `PapaParse` [18] 的库，因为它能轻松集成 CSV 文件的读取和处理。


    ![](img/625524_1_En_3_Fig5_HTML.jpg)


    **图 3-5** 分类流程图


    文件中的数据会显示在网页上供用户分析。使用 `for` 循环遍历行数，以便将每一列存储到一个数组中。遍历完整个数据集后，会创建一个新数组，按照与 CSV 文件中相同的行顺序存储数据。还会创建另一个数组仅存储标签，这些标签将在后续阶段用于检查机器学习模型的准确性。


    当所有数据通过编程方式设置完成后，应用程序将读取用户从文本字段输入的参数。输入内容包括氮、磷、钾的含量，温度值、湿度值、pH 值和降雨量值。机器学习模型的创建取决于用户选择哪种算法：`knn.js`、`decisiontree.js`、`randomforest.js`
    或 `mlp.js`。输入作为参数传递给机器学习对象，并执行作物分类。获得的结果会显示在网页上。


    用于机器学习模型的库是 [19]。表 3-1 描述了相关的函数和方法。


    **表 3-1** 分类方法汇总


    | 方法 | 描述 |

    | --- | --- |

    | `runBtn.onclick()` | 用户按钮点击的事件监听器 |

    | `radioButton.checked` | 返回布尔值，指示是否选中了某个单选按钮 |

    | `FileReader()` | 创建一个用于读取文件的对象 |

    | `reader.onload(){}` | 文件成功加载的事件监听器 |

    | `Papa.parse()` | 解析 CSV 文件以获取内容 |

    | `array.push()` | 将数据添加到数组中 |

    | `document.createElement("")` | 动态创建 HTML 页面元素 |

    | `container.appendChild("")` | 将元素添加到 HTML 页面 |

    | `ML.KNN()` | 为 KNN 创建模型 |

    | `ML.DecisionTreeClassifier()` | 为决策树分类创建模型 |

    | `ML.RandomForestClassifier()` | 为随机森林分类创建模型 |

    | `model.train()` | 训练模型 |

    | `model.predict()` | 使用模型对输入数据进行分类并给出结果 |

    | `Brain.NeuralNetwork()` | 创建用于分类的神经网络 |

    | `network.train()` | 训练神经网络 |

    | `network.run()` | 将输入传入神经网络以获得预测结果 |


    图 3-6 展示了分析模型准确性的流程图。


    ![](img/625524_1_En_3_Fig6_HTML.jpg)


    **图 3-6** 模型准确性流程图


    为了测试每个模型的准确性，使用 `ML.js` 依赖项本身实现了混淆矩阵。要使用混淆矩阵，需要存储原始的标签集。根据所选算法，创建一个机器学习模型。应用程序将遍历数据集中的每一行，并将字段值作为模型的输入。预测的输出存储在一个新数组中。此过程对数据集的每一行重复进行。最后，将使用模型获得的输出得到一个新的标签数组。使用
    `TensorFlow.js` [20] 和 `d3.js` [21] 创建一个混淆矩阵对象。原始标签和预测标签作为参数传递。通过调用 `getAccuracy`
    方法获得准确性。表 3-2 总结了用于准确性的方法。


    **表 3-2** 准确性方法汇总


    | 方法 | 描述 |

    | --- | --- |

    | `ML.confusionMatrix.fromLabels()` | 创建一个将使用标签的混淆矩阵 |

    | `confusionMatrix.getAccuracy()` | 返回一个双精度值，表示模型的百分比准确性 |


    ## 3.4 应用程序测试与分析


    本节详细阐述了所使用的不同算法及其结果。还进行了批判性分析，以评估它们对可持续发展目标 2、9 和 12 的影响。所实现的四种算法——k-NN、决策树、随机森林和
    MLP——都构建在单个 HTML 页面内，用户可以选择其中一种算法并执行作物分类。各小节描述了每种算法的实验，包括其模型参数、超参数以及使用的不同函数。由于我们处理的是一个分类问题，因此通过使用混淆矩阵来评估机器学习模型。混淆矩阵本质上是一个表格，用于比较预测结果与真实结果之间的相似程度。混淆矩阵能清晰地表明模型对指定作物预测实际结果的百分比准确性。由于我们有
    22 种作物需要分类，因此构建了一个 22 x 22 的矩阵表来确定机器学习技术的性能。我们通过计算正确预测的数量占总预测数量的比例来计算模型的准确性。


