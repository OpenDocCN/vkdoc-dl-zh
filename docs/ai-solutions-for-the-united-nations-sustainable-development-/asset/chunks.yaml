    ### 1.3.2 多项式回归 (PLR)


    `PLR` 将 `SLR` 的概念扩展到预测变量与响应变量之间可能更适合用多项式函数来描述的情况。换句话说，当预测变量与响应变量之间的关系呈曲线时，`PLR`
    是更优的选择。可以通过添加多项式项来修改简单线性回归模型，从而得到如下所示的多项式回归模型 [46]：


    ![$$ y={\beta}_0+{\beta}_1x+{\beta}_2{x}²+{\beta}_3{x}³+\dots +{\beta}_n{x}^k+\varepsilon
    $$](img/625524_1_En_1_Chapter_TeX_Equ7.png)


    (1.7)


    其中，


    - `y` 是因变量。

    - `β[0]` 是 Y 轴截距。

    - `k` 是多项式的阶数（最高次幂）。

    - `β[1]` 至 `β[n]` 是系数 `β[2]`、`β[3]`、……、`β[n]`。

    - `x` 是自变量。

    - `ε` 是误差项。


    回归线可以通过最小二乘法获得，该方法需要求解以下形式的线性方程组 [46]：


    ![$$ \left[N\ {\sum}_{i=1}^N{x}_i\dots {\sum}_{i=1}^N{x_i}^k\ {\sum}_{i=1}^N{x}_i\
    {\sum}_{i=1}^N{x_i}²\dots {\sum}_{i=1}^N{x_i}^{k+1}\vdots \vdots \vdots \vdots
    {\sum}_{i=1}^N{x_i}^k\ {\sum}_{i=1}^N{x_i}^{k+1}\dots {\sum}_{i=1}^N{x_i}^{2k}\
    \right]\left[{\beta}_0\ {\beta}_1\vdots {\beta}_k\ \right]=\left[{\sum}_{i=1}^N{y}_i\
    {\sum}_{i=1}^N{x}_i{y}_i\vdots {\sum}_{i=1}^N{x_i}^k{y}_i\ \right] $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ8.png)


    (1.8)


    将提供两个版本的 `PLR` JavaScript 实现，其中第一个版本允许用户直接在网页上输入值进行预测，而第二个版本允许用户上传数据集进行预测。


