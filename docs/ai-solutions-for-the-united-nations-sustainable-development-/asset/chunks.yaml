    ### 3.2 人工智能在可持续发展目标 2、9 和 12 中的应用案例


    在文献[6]中，该研究提出了一种能够显著影响并支持联合国“零饥饿”可持续发展目标的神经网络设计，例如卷积长短期记忆网络。作者旨在提高用水效率，减少对灌溉的依赖，并降低因干旱和极端天气导致作物损失的风险。他们利用实时传感器数据和地面数据，将机器学习应用于作物分割、土壤分类、归一化植被指数（NDVI）和土壤湿度预测。实验表明，提高农业生产力并减少水等自然资源的浪费，可为农民带来有利的经济效益。研究还证明，将机器学习与地球观测数据结合用于分析和预测，可能有助于预测农业生产力并缓解贫困。


    文献[7]回顾了可持续发展概念及其目标，以及与该领域相关的地球观测方法。特别强调了机器学习方法和算法的贡献，及其在助力实现可持续发展目标方面的潜力和能力。研究认为，从数据中提取和综合特征的能力对性能有显著影响。这项深入分析考察了处理地球观测数据以应对不同可持续发展目标的各种机器学习类别。所有类型的机器学习涵盖了广泛的可持续发展目标和学科领域，其中分类、聚类、回归和降维技术适用于可持续发展目标
    2、9、11、14 和 15。该论文支持了地球观测和机器学习在实现可持续发展目标中的重要性，并总结了支持实现这些目标的策略和战术。


    在文献[8]中，开展了可持续交通规划，以助力实现与交通相关的可持续发展目标 9、11 和 12。研究提出了一种基于机器学习的预测建模方法，用于地铁客流量预测，并考虑了车站周边的建成环境。因此，模型的创建和测试使用了时间序列数据库。研究评估了多种机器学习模型的预测性能，包括岭回归、套索回归、弹性网络、k
    近邻、支持向量回归、决策树、随机森林、极端随机树、自适应增强、梯度提升、极端梯度提升以及堆叠集成学习器。结果显示，决策树在基础学习器中表现最佳，在测试数据集上的`R2`达到
    87.4%。基础学习器中表现第二和第三的模型是`KNN`和`SVR`。特征相关性研究还揭示了每种土地利用密度类型对地铁客流量预测的不同贡献方式。


    文献[9]的作者研究了通过结合纳米技术和机器学习来减少食物浪费并促进负责任的消费，从而助力实现可持续发展目标 2 和 12 的可能性，具体方法是通过确定食物中潜在的污染物。该论文利用了一个小型传感器系统（`S3`），该设备主要包括一个气体传感器，以及温度、湿度和流量传感器，用于有效测量食物污染，即确定所分析食物样本的污染率（细菌、酵母）。使用`S3`设备测量了多个具有不同污染水平的食物样本，收集数据并将其输入到`k-NN`、随机森林和`SVM`等机器学习算法中。结果表明，测试样本中的食物污染物数量被正确识别，并且污染物的微生物组成也被准确预测。


    文献[10]提出了一种创新且新颖的方法，其中考虑了可持续发展目标 7 和 9。作者提出了在农业产业中集成光伏（PV）的方案，这一解决方案将极大地促进清洁能源和产业创新。研究使用了深度
    Q 网络（`DQN`），这是一种强化学习技术，作为人工智能辅助工具，帮助投资者根据预算、成本和能源需求等多种参数，就光伏板的安装做出决策。`DQN`有助于确定农业部门不同农场所需的最佳光伏类型，使投资者能够在区域内高效部署光伏系统。这种强化学习方法通过光伏系统与农业的创新结合，促进了可持续能源的使用，同时提高了利润。


    在文献[11]中，作者回顾了关于机器学习技术在农作物生产中重要性的研究。他们指出，准确及时的作物产量预测对于进出口、定价和营销分配等重要政策决策至关重要。研究概述了多种技术，如人工神经网络、信息模糊网络、决策树、回归、聚类、贝叶斯信念网络、时间序列分析和马尔可夫链模型。研究结果表明，农业中的计算机科学有助于作物预测。基于客观方法进行收获前作物预测是必要的。一个好的模型将比传统的预测方法更具优势。


    在文献[12]中，该论文提出了一种系统，通过部署机器学习进行作物预测，帮助学徒农民指导他们种植和收获最合适的作物。该系统提出使用朴素贝叶斯分类器来计算和预测当前气候下的作物。系统的实现使用了带有湿度传感器的
    Arduino UNO 进行数据收集，以及一个移动应用程序，该应用程序根据用户输入（如温度）来预测作物。通过监督机器学习算法——朴素贝叶斯分类器获得的输出被证明是准确的，并将帮助农民发展可持续作物。


    文献[13]的作者提出了一种新颖的机器学习算法，称为`作物选择方法`（`CSM`），该算法根据作物类型和全年天气状况进行作物分类。通过使用包含每种作物类别往年播种、种植和收获时间段的作物数据集，来高效优化作物产量，以确定整个季节可以种植的最佳作物序列。研究确定了多个序列，`CSM`算法输出其中产量最高的序列。结果表明，当使用`CSM`时，由于全年种植了最多类型的作物并有效产出，每日作物产量更高，从而实现了土地利用最大化。


    此外，文献[14]研究了一种基于土壤养分的作物推荐方法，该方法使用了三种机器学习分类方法：`k-NN`、`SVM`和逻辑回归。这些算法利用了一个现有的土壤数据集，该数据集包含每种作物所需的化学成分，并根据
    pH 值、磷含量和土壤盐度，算法输出适合此类土壤环境的作物。研究还使用了一个土地数据库进行地理分类，模型根据土地的化学特征预测最适合该土地的最佳作物类型。结果显示，作物分类的准确率高达
    98%；其中，`SVM`机器学习模型达到了 92%的模型准确率，`K-NN`和`LR`也取得了相应结果。

