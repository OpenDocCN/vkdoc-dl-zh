    ### 1.3.3 Multiple Linear Regression (MLR)


    MLR is a statistical technique that helps us understand how several independent
    variables influence a dependent variable. It is an extension of simple linear
    regression (SLR), which examines only a single independent variable. By analyzing
    multiple variables, MLR can make more accurate predictions and forecasts. For
    example, MLR may be used to forecast the CO[2] emissions of a car depending on
    its engine size and the number of cylinders available.


    The following are some key characteristics of MLR:


    *   The dependent variable or output (Y) should be a continuous or real value,
    while the independent variables or predictors can take continuous or categorical
    values.


    *   A linear relationship exists between the independent variables and the dependent
    variable.


    *   MLR endeavours to establish a regression line within a multidimensional dataset.


    The multiple linear regression model can be expressed as follows [46]:


    ![$$ Y={\beta}_0+{\beta}_1{X}_1+{\beta}_2{X}_2+\dots +{\beta}_k{X}_k+\varepsilon
    $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ9.png)


    (1.9)


    Where,


    y denotes the dependent variables or output.


    *k* denotes the number of predictors available in the model.


    *X*[*1*]*, X*[*2*]*, …, X*[*k*] represent the independent variables.


    β[0] denotes the y-intercept (constant term) of the regression line.


    β[1], β[2], …, β[k] represent the slope coefficients of each independent variable.


    ε represents the error term in the model that occurs between the predicted value
    of Y and its actual value.


    The primary objective of performing MLR is to determine the coefficients (β[0,]
    β[1], β[2], …, β[k]) that reduce the sum of squared differences between the observed
    values of the dependent variable and the values predicted by the linear equation.
    This approach is known as the least squares method [46]. The model can also be
    written in the following matrix form as follows:


    y= Xβ+ε (1.10)


    Where,


    β={𝛽_0,𝛽_1,…,𝛽_(𝑘−1)}′ .


    The design matrix 𝑋 is built in the following form:


    ![$$ X=\left[1\ {x}_{1,1}\ {x}_{1,2}\dots {x}_{1,k-1}\ 1\ {x}_{2,1}\ {x}_{2,2}\dots
    {x}_{2,k-1}\vdots \vdots \vdots \vdots \vdots 1\ {x}_{n,1}\ {x}_{n,2}\dots {x}_{n,k-1}\
    \right] $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ10.png)


    (1.11)


    Where,


    𝑛 is the total number of observations.


    An estimate of the 𝛽 matrix, ![$$ \hat{\beta} $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_IEq3.png),
    can be obtained using the following equation:


    ![$$ \hat{\beta}={\left({X}^{\prime }X\right)}^{-1}{X}^{\prime }y $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ11.png)


    (1.12)


    Two versions of a JavaScript implementation of MLR will be provided whereby the
    first version allows users to enter values directly on the web page for prediction,
    while the second version allows users to upload a dataset for prediction.


    When the application is run, the user will have to populate the input fields,
    and when the Read Data and Analyse button is clicked, the outputs shown in Figure
    [1-19(a)](#625524_1_En_1_Chapter.xhtml#Fig23) are displayed.


