  trans: '

    ## 5.2 人工智能在可持续发展目标 3、6 和 12 中的应用案例


    目前已实现一种识别系统，用于判定水质、监测水的溢流与利用情况，并检查可饮用水的区域[1]。该系统通过卷积神经网络（`CNN`）和摩洛哥自动抄表（`MR-AMR`）数据集实现。在此背景下，该系统针对**可持续发展目标
    6**和**可持续发展目标 12**，通过分析水的不同用途来评估饮用水范围并监测水的消耗。在测试过程中，该系统达到了约 98%的准确率。**可持续发展目标
    6**还通过应用自适应增强技术对饮用水可饮用性进行了评估[1]。在该示例中，使用了来自 Kaggle 的数据集，其中用于判定水可饮用性的超参数包括氨、铝、砷、钡、氯胺、铜、铅、硝酸盐以及许多其他可能影响水质的化学物质。**可持续发展目标
    6**也是伊拉克一项研究的目标，该研究利用机器学习分析地下自流水的状况[2]。在此背景下，研究人员分析地下水的深度、密度和饱和度，以便以更低的成本精确钻井。


    人工智能还被用于实现可持续发展，系统通过分析水基础设施、预测水的消耗、测试水库和水坝的水质，并预测与水相关的灾害[3]。这种方法针对**可持续发展目标 3、6、11
    和 15**。它详细审查与水相关的疾病，以及因危险化学品污染水而导致的人员死亡和感染数量。此外，它还分析水质，判定其是否适合饮用，并确定保护自然资源的方法。这些可持续发展目标旨在到
    2030 年底减少相关问题。在澳大利亚，实施了一个基于人工智能的水网系统，以满足水的消耗、水处理目的，并分析水库的水质指数。在伊朗，支持向量机（`SVM`）机器学习已被用于检测水质，而在希夫甘加河，多元线性回归被用于类似目的[3]。


    文献[4]探讨了**可持续发展目标 6**，重点关注智能配水系统中水质异常（`WQAD`）的识别。他们对相关文献进行了全面分析，审视了机器学习（`ML`）技术在`WQAD`中的应用，这对于供水的安全与保障至关重要。尽管人们对使用深度学习（`DL`）模型进行`WQAD`的兴趣日益浓厚，但该论文强调，极限学习机（`ELM`）的使用仍在研究之中。为了提高水质异常检测的有效性和精度，他们提出了一种独特的混合`DL-ELM`框架。研究表明，人工智能，特别是所提出的`DL-ELM`混合技术，有可能显著提高发现水质异常的准确性和及时性。这一进展对于确保获得安全清洁的用水至关重要，最终与**可持续发展目标
    6**的目标相协调。该研究还强调了传感器产生的实时数据的重要性，以及识别污染物所需较短响应时间的必要性，这些是当代智慧城市水质管理的关键组成部分。


    文献[5]也探讨了**可持续发展目标 6**。为了有效识别和分类水中的藻类（这是判定水质的关键组成部分），该论文提出使用机器学习技术，特别是改进的 Faster
    `R-CNN`架构。由于藻类体积小且种类多样，人工检测困难且容易出错。研究人员提出了一种新颖的多目标深度学习框架，能够同时处理多项任务，例如属级分类、藻类检测和生物类别识别。他们在包含
    27 种不同藻类分类群的数据集上进行了大量实验，结果令人鼓舞。该框架能够以 74.64%的平均精度均值（`mAP`）识别属级藻类物种，并以更高的 81.17%的`mAP`在生物类别层面对生物进行分类。


    文献[6]探讨了**可持续发展目标 12**。为了最大化资源利用，该论文提出了用于预测供水系统（`WSS`）短期需水量的机器学习方法。有效预测需水量具有挑战性，因为它取决于多个变量，包括历史数据、天气和季节性。研究人员探索了机器学习方法，包括监督学习和无监督学习，以创建精确的预测系统。为了做出更好的预测，他们考虑了历史用水量、温度和降雨发生等因素。该研究通过分析不同时间段（如工作日和周末）对需求模式的影响，为预测技术提供了依据。为了进一步提高准确性，他们提出了一种加权并行预测技术。该技术整合了多种预测方法（每种方法各有优缺点），以创建更准确、更可靠的需水量预测。通过根据模型的表现赋予权重，这种方法减少了误差。总体而言，研究表明基于机器学习的预测优于传统的时间序列分析方法，可为供水系统节省高达
    18%的运营成本。


    针对**可持续发展目标 3、9 和 12**。废物管理是一个关键的全球性问题，影响着发达国家和发展中国家。废物分类的主要问题在于，在清洁过程开始之前很久，露天垃圾箱就已满溢。这种清洁过程涉及由非熟练工人手动分类废物，效率低下、耗时，并且由于产生的废物量巨大，往往不切实际。


    为了解决这个问题，文献[7]的作者提出了一种使用机器学习和深度学习算法的自动化废物分类系统。其目标是收集一个数据集，并将其分为六类：玻璃、纸张、金属、塑料、纸板和一般废物。他们比较了三种机器学习算法，即支持向量机（`SVM`）、随机森林和决策树，以及一种名为卷积神经网络（`CNN`）的深度学习算法。结果显示，`CNN`在废物分类中达到了约
    90%的高准确率。`SVM`在区分各类废物方面也表现出色，分类准确率为 85%，而随机森林和决策树的准确率分别为 55%和 65%。

    '
- fmt: 'In this research, SDG 6 has been mainly addressed. Groundwater (GW) plays
    a crucial role in providing drinking water and supporting irrigation to address
    food insecurity and enhance water access in rural sub-Saharan Africa. Recent modeling
    techniques, specifically machine learning (ML), have proven to be reliable and
    cost-effective tools for assessing GW recharge. The study in [8] employed ML methods
    to predict GW recharge in selected areas of Ghana, aiming to evaluate the sustainability
    of GW resources. Two types of artificial neural network (ANN) models, namely,
    the Feedforward Neural Network with Multilayer Perceptron (`FNN-MLP`) and the
    Extreme Learning Machine (`FNN-ELM`), were employed to forecast GW recharge using
    58 years of GW data spanning from 1960 to 2018. The findings from this study contribute
    to enhancing current GW assessment and development methods, aligning with the
    sustainable development goals, particularly those related to water resources and
    sustainability.


    In the sector of freight transportation, there has been a lot of emphasis lately
    on encouraging sustainable methods. New regulations have been put out by the European
    Commission and the UN with the intention of promoting sustainability in transportation
    operations. SDG 9 is mainly being targeted in this context. The aim of the research
    project in [9] is to develop a model that uses supervised machine learning methods
    and incorporates key performance metrics and intelligent classification algorithms
    for various sustainability-related input data. Different classification algorithms
    were tested and trained in order to do this. The `SVM` technique, which was used
    to analyze the dataset in question, was found to have the best accuracy, obtaining
    a remarkable 98% accuracy rate. This suggests that `SVM` is the most trustworthy
    method in this situation for determining sustainability levels. Testing this approach
    on a European road freight transport firm showed how useful it is in practice.
    This methodology allowed the business to assess its level of sustainability, allowing
    it to develop eco-friendly strategies for promoting sustainable growth.


    Here are some recent examples of the use of machine learning to promote the following
    SDGs:


    - In 2022, to tackle SDG 6, satellite and drone images have been used to analyze
    water bodies. Research has been conducted using machine learning to predict the
    existence of harmful algal blooms and the level of pollution affecting the water
    bodies. An accuracy of 90% has been obtained, which enables prompt intervention
    to ensure the safety of drinking water.

    - In 2022, India conducted research using machine learning models to tackle the
    issue of water-borne diseases, whereby contaminants such as bacteria are being
    detected. This system has been successful in detecting unsafe drinking water.
    This promotes sustainable development toward SDG 3.

    - Additionally, in 2021, Chennai has used machine learning algorithms to forecast
    water quality.


    ## 5.3 Data Processing and Application Design


    In this section, machine learning algorithms are used to classify water quality.
    We briefly discuss the appropriate methodology to implement this approach.


    ### 5.3.1 Data Collection Process and Description of the Datasets


    The dataset used in the `water_potability.csv` file was downloaded from Kaggle.
    The dataset consists of 3,277 values. The dataset comprises the following parameters:


    - **pH value**: The pH value determines whether the water is acidic or alkaline.
    The acceptable range for drinking water is between 6.5 and 9.5.

    - **Hardness**: Hardness determines the amount of calcium and magnesium dissolved
    in water.

    - **Solids**: Total Dissolved Solids (TDS) determines the total concentration
    of dissolved substances present in water. If the TDS threshold is between 50 and
    150, it is considered good for drinking purposes.

    - **Chloramines**: Chloramines are used in water treatment process, where ammonia
    is added to chlorine to treat drinking water.

    - **Sulfate**: The maximum range of sulfate in drinking water is 2250 mg/L. If
    the concentration exceeds the threshold value, it can lead to health issues.

    - **Conductivity**: Conductivity determines the ability to conduct electrical
    current. It determines the amount of minerals dissolved in the water. A higher
    concentration of dissolved minerals illustrates a better conductivity.

    - **Organic carbon**: It is the amount of carbon in the organic compound present
    in water. Organic carbon is generated from the decay of vegetations and the presence
    of organic matter.

    - **Trihalomethanes**: It is an organic compound formed when water is infected
    with chlorine.

    - **Turbidity**: Turbidity determines whether the water is clear or not. It determines
    the presence of suspended or colloidal particles in water.

    - **Potability**: It determines whether the water is safe for drinking by displaying
    0 or 1.


    The first nine parameters are the inputs of the dataset, and the last one (`potability`)
    is the output. 0 illustrates “not potable,” and 1 illustrates “potable.”


    ### 5.3.2 Data Preprocessing Steps


    For the preprocessing step, data cleaning has been performed. That is, the dataset
    has been cleaned by removing rows with empty cells values. Thus, the number of
    data reduces to 2,012 records. Data cleaning is considered as a crucial step to
    process the dataset. Its main purpose is to identify and rectify the errors and
    inaccuracies in the dataset. The following are the key purposes of data preprocessing:


    - Improve data quality by eliminating errors and inconsistencies. This helps in
    obtaining more accurate and reliable results.

    - Help to harmonize inconsistencies in dataset in order to create a uniform and
    stable dataset.

    - Handle missing values as missing data can affect the accuracy of the system.

    - Detect and manage outliers as they can distort the analysis of the machine learning
    algorithm.

    - Ensure that the dataset is in a consistent format for further processing.

    - Improve the performance of the model.

    - Enhance the quality and reliability of dataset for analysis and decision making.


