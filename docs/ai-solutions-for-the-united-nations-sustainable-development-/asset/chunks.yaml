    ### 1.4 Summary


    This chapter gave an overview of the UN SDGs along with their importance in addressing
    several challenges such as climate change, education, renewable energy, economic
    growth, etc. A review of research carried out on the application of AI and machine
    learning techniques to support the implementation of the UN SDGs has also been
    conducted. These techniques can definitely provide a significant boost in achieving
    the SDG targets. Moreover, the fundamental concepts of AI and ML have been introduced
    by providing a clear distinction between the different categories of AI and ML.
    Finally, some basic regression and classification algorithms have been discussed
    along with their JavaScript implementations. These will form the basis of several
    other applications that will be discussed in the subsequent chapters of the book.


