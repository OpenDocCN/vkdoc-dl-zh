  trans: '

    ### 4.4.1 简单线性回归 (SLR)


    简单线性回归 (SLR) 被用作一个基于 Web 的分析工具，用于根据 GDP 年增长率预测 CO[2] 和 GHG 排放量，它使用了 `ml.js` 库中的
    `ML.SimpleLinearRegression`。


    当点击“显示数据和分析”按钮调用 `Upload()` 函数时，将执行预测过程。


    绘制了 CO[2] 排放量与 GDP 以及 GHG 排放量与 GDP 的数据集。使用 `Plotly.js` 库绘制了回归线以及 CO[2] 和 GHG 的预测值。此外，还计算了
    MAPE，并计算了其他气体值，即 GHG 与 CO[2] 排放量之差。最后，添加了一个文本字段，用于指示当 GHG 排放量的预测值超过 25,000 阈值时需要采取的必要措施。


    图 4-4 展示了 SLR 算法的流程图。


    ![](img/625524_1_En_4_Fig4_HTML.jpg)


    图 4-4 流程图，SLR


    代码清单 4-1 展示了 SLR 算法的伪代码 `Upload()` 函数。


    ```

    如果（上传了有效的 CSV 文件）：

    1. 使用 PapaParse 库上传并读取 csv 文件。

    2. 指定要从 csv 文件中读取的行数。

    3. 指定一个目标值，例如 GDP 值。

    4. 将从 csv 文件读取的 CO2、GHG 和 GDP 数据输入到数组中。

    5. 根据基本方程执行回归。

    6. 使用 math.js 计算 CO2 和 GHG 的反射系数 r。

    7. 使用 ML.SimpleLinearRegression 库计算 CO2 和 GHG 的斜率、y 截距和预测值。

    8. 计算 CO2 和 GHG 的 MAPE。

    9. 使用 Plotly.js 生成图表：数据集、回归线和预测点。

    10. 根据预测的 GHG 和 CO2 值计算其他气体。

    否则：

    指定不支持的 CSV 文件

    代码清单 4-1

    伪代码 Upload() 函数：SLR

    ```


    ### 4.4.2 多元线性回归 (MLR)


    MLR 被用作一个预测模型，根据毛里求斯的人口规模和年 GDP 增长率，使用 `ml.js` 库中的 `ML.MultivariateLinearRegression`
    来预测两个环境因素，即 CO[2] 和 GHG 排放量。


    当点击“显示数据和分析”按钮时，会触发 `Upload()` 函数。


    随后，它会计算 CO[2] 和 GHG 预测的 MAPE。此外，它还会计算其他气体值，即 GHG 与 CO[2] 预测值之差。它还使用 `Plotly.js`
    库为原始数据集以及预测的 CO[2] 和 GHG 排放量生成 3D 散点图。最后，添加了一个文本字段，用于指示当 GHG 排放量的预测值超过 25,000
    阈值时需要采取的必要措施。


    图 4-5 展示了 MLR 算法的流程图。


    ![](img/625524_1_En_4_Fig5_HTML.jpg)


    图 4-5 流程图：MLR


    代码清单 4-2 展示了 MLR 算法的伪代码。


    ```

    如果（上传了有效的 CSV 文件）：

    1. 使用 papaparse.js 库读取并解析上传的 CSV 文件。

    2. 根据用户输入从 CSV 文件中提取数据。

    3. 使用 ML.MultivariateLinearRegression.js 对 CO2 和 GHG 排放量执行 MLR。

    4. 根据用户提供的人口规模和 GDP 值预测 CO2 排放量和 GHG 排放量。

    5. 使用 Math.js 计算 CO2 和 GHG 的 MAPE。

    6. 计算其他气体，即 GHG 与 CO2 预测值之差。

    7. 使用 plotly.js 生成 3D 散点图，绘制原始数据点以及预测的 CO2 和 GHG 排放量。

    否则：

    指定不支持的 CSV 文件

    代码清单 4-2

    伪代码 Upload() 函数：MLR

    ```


    ### 4.4.3 k-最近邻 (k-NN)


    用户可以访问一个网页并上传一个包含 GDP、CO[2] 和 GHG 排放量相关信息的 CSV 文件。`ml.js` 库中的 `ML.KNN` 执行 k-NN
    回归，以根据人口和 GDP 预测气体排放量。然后，3D 散点图有助于数据和预测的可视化。


    一旦用户在用户界面上点击“显示数据和分析”按钮，定义的 `Upload()` 函数将被执行。


    最后，使用 `Plotly.js` 库，针对以下变量绘制了两个包含预测值和原始值的 3D 散点图：


    - CO[2] 排放量与人口规模和年 GDP 增长率

    - GHG 排放量与人口规模和年 GDP 增长率


    最后，添加了一个文本字段，用于指示当 GHG 排放量的预测值超过 25,000 阈值时需要采取的必要措施。


    图 4-6 展示了 k-NN 算法的流程图。


    ![](img/625524_1_En_4_Fig6_HTML.jpg)


    图 4-6 流程图：k-NN


    代码清单 4-3 展示了 k-NN 算法的伪代码。


    ```

    如果（上传了有效的 CSV 文件）：

    1. 使用 PapaParse 库上传并读取 csv 文件。

    2. 指定要从 csv 文件中读取的行数。

    3. 输入用于测试数据集的 GDP 和人口目标值。

    4. 使用训练数据集应用 k-NN 回归算法。

    5. 生成 3D 散点图并显示 CO2 和 GHG 的预测值。

    6. 根据预测的 GHG 和 CO2 值计算其他气体。

    否则：

    指定不支持的 CSV 文件

    代码清单 4-3

    伪代码 Upload() 函数：k-NN

    ```


    ## 4.5 应用测试与分析


    ### 4.5.1 简单线性回归 (SLR)


    当执行 `SLR.html` 程序时，它会提示用户输入要从数据集中显示的行数、输入一个用于预测的 GDP 值，并上传一个 CSV 文件。图 4-7 和 4-8
    展示了该程序的工作原理。


    ![](img/625524_1_En_4_Fig8_HTML.jpg)


    图 4-8 SLR：GHG 排放量的预测与绘图


    ![](img/625524_1_En_4_Fig7_HTML.jpg)


    图 4-7 SLR：CO[2] 排放量的预测与绘图


    图 4-7 所示的结果表明，显示了 CSV 数据集中的 10 行数据，并且 GDP 的目标值指定为 8.2。执行了回归分析，得到了关于 CO[2] 的直线方程和相关系数，从而确定预测的
    CO[2] 排放量为 269,826.521 bpt。同样，CO[2] 的 MAPE 为 17.296%，这表明 SLR 模型的准确率为 82.704%。此外，数据集、回归线和预测的
    CO[2] 点被绘制在二维散点图上。


    执行了回归分析，得到了关于 GHG 的直线方程和相关系数，从而确定预测的 GHG 排放量为 281,174.774 bpt，如图 4-8 所示。同样，GHG
    的 MAPE 为 15.883%，这表明该模型的准确率为 84.117%。此外，数据集、回归线和预测的 GHG 点被绘制在二维散点图上。其他气体的值，即 GHG
    与 CO[2] 预测值之差，为 11,348.254 bpt。由于 GHG 排放量的预测值超过了 25,000 bpt 的阈值，因此指定的措施是实施可持续发展战略。

