    Additionally, the `icons` folder contains the necessary SDG icons and a favicon
    for the web page. Once the web page is opened, it awaits the input of the dataset
    through the Browse button. Figure [7-13](#625524_1_En_7_Chapter.xhtml#Fig13) provides
    a general flowchart for this web application.


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig13_HTML.jpg)


    Figure 7-13 Web application general flowchart


    #### Description of Methods and Classes


    After handling the CSV dataset using the `handleFileUpload()` method, the `generateClusters()`
    method is triggered once the user clicks the Generate Clusters button. This method
    acts as the heart of the program, dictating which other methods and classes are
    called, as well as when they are called. A summary of the functionalities of each
    method and class in the `script.js` file is given in Table [7-2](#625524_1_En_7_Chapter.xhtml#Tab2).


    Table 7-2 Description of Methods and Classes


    | Method/Class | Description |

    | --- | --- |

    | `handleFileUpload()` | Handles the file upload event triggered when a user selects
    a CSV file. It reads the uploaded file asynchronously, parses it, and initiates
    the data processing workflow. |

    | `generateClusters()` | Generates clusters from the parsed CSV data using the
    K-means clustering algorithm. It computes centroids, assigns labels to data points,
    and updates the data accordingly. Additionally, it handles the option to download
    the updated CSV file with clustered data. |

    | `ML.KMeans()` | Takes as input the normalized CSV data, as well as the number
    of clusters to perform K-means clustering. |

    | `processData()` | Processes the CSV data by extracting relevant features from
    each row and storing them in an array, which it passes to the `CustomWorldMap`
    object for plotting on the world map. |

    | `CustomWorldMap` | Is a class representing a custom template for creating a
    world map object. It encapsulates the functionality to plot data onto a world
    map using `Plotly.js`, with customizable configurations for the map layout and
    styling. |

    | `dynamicYear()` | Dynamically updates the selected year displayed on the UI
    as the user adjusts the year slider. It provides real-time feedback to the user
    regarding the selected year for data visualization. This helps the user know which
    year is being selected before releasing the slider. |

    | `updateYear()` | Responsible for updating the selected year when the user adjusts
    and releases the year slider. It updates the selected year value on the UI and
    triggers the data processing workflow with the updated year filter. |


    #### K-means Clustering Algorithm


    Next, Figure [7-14](#625524_1_En_7_Chapter.xhtml#Fig14) elaborates upon the steps
    involved in the `generateClusters()` method for the K-means clustering process.


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig14_HTML.jpg)


    Figure 7-14 Flowchart for the K-means clustering process


    The clustering process is handled by the `ml.js` library where it is stopped when
    convergence occurs. This denotes the point where the centroids no longer change
    significantly or after a specified number of iterations. In this application,
    it is the former.


    ## 7.4 Application Testing and Analysis


    With the front-end and back-end built, the web application is ready to be run.
    This section thus concerns snapshots of the application, as well as a discussion
    on the results obtained.


    ### 7.4.1 Application Testing


    Figures [7-15](#625524_1_En_7_Chapter.xhtml#Fig15) to [7-21](#625524_1_En_7_Chapter.xhtml#Fig21)
    demonstrate the choropleth maps for different years as selected using the slider,
    together with a description of the progress of North America, South America, Europe,
    Africa, Asia, and Australia.


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig21_HTML.jpg)


    Figure 7-21 Results for 2020


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig20_HTML.jpg)


    Figure 7-20 Results for 2015


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig19_HTML.jpg)


    Figure 7-19 Results for 2010


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig18_HTML.jpg)


    Figure 7-18 Results for 2005


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig17_HTML.jpg)


    Figure 7-17 Results for 2000


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig16_HTML.jpg)


    Figure 7-16 Results for 1996


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig15_HTML.jpg)


    Figure 7-15 Results for 1980


    ### 7.4.2 Discussions


    This section consists of noteworthy insights inferred from the maps obtained,
    by simply adjusting the slider and observing the trend in worldwide Internet adoption.


    #### Comparison with Historical Trends


    The application’s visualizations offer valuable insights into the progression
    of Internet connectivity over time, enabling comparisons with past trends. An
    in-depth comprehension of the course of global connectivity and its consequences
    can be obtained by analyzing the patterns and fluctuations in Internet penetration.
    Some key observations are given next:


    *   **Early Adoption and Expansion**: The maps illustrate the initial embrace
    of web technology in areas including North America, some parts of Asia, and the
    Nordic countries of Europe. Historical data from the 1990s to the early 2000s
    shows a swift growth of infrastructure and access in these areas, propelled by
    technological progress and rising demand [25]. This is shown in Figure [7-16](#625524_1_En_7_Chapter.xhtml#Fig16)
    where despite the fact that the Internet originated from the United States of
    America, the first “Emerging” countries were Finland, Sweden, and Norway. This
    is due to the smaller population of the Nordic countries.


    *   **Emergence in Developing Regions**: Conversely, underdeveloped regions like
    Africa, certain areas of the Asian continent, and South America demonstrate a
    postponed yet consistent growth in Internet accessibility [26]. The application’s
    visualizations showcase the expansion of Internet infrastructure in these regions
    starting from the early 2000s, indicating a progressive reduction in the digital
    divide. This is highly visible in the case of African countries, which struggled
    from the Underdeveloped state to the Emerging phase in 2010, and a majority of
    Developing countries in 2020.


    *   **Differential Growth Rates**: An examination of past patterns indicates varying
    rates of expansion in Internet usage across different regions and countries. While
    certain countries witnessed rapid and significant growth in their level of connectivity,
    others encountered obstacles such as inadequate infrastructure, economic limitations,
    and regulatory impediments.


    *   **Regional Disparities**: The visualizations highlight the ongoing regional
    differences in Internet access and development. Developed regions possess elevated
    levels of connectivity and sophisticated digital infrastructure, whereas under-resourced
    regions persistently fall behind, intensifying socioeconomic disparities.'
