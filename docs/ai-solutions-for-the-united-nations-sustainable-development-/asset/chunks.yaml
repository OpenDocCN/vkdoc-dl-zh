    the results were encouraging. The framework was able to identify algal species
    at the genus level with a mean average precision (mAP) of 74.64% and classify
    organisms at the biological class level with an even higher mAP of 81.17%.


    SDG 12 is addressed in [6]. To maximize resource usage, the paper proposes machine
    learning approaches for estimating short-term water demand in water supply systems
    (WSS). Predicting water demand effectively is difficult since it depends on a
    number of variables, including historical data, weather, and seasonality. To create
    precise predicting systems, the researchers investigated machine learning approaches,
    including supervised and unsupervised learning. To make better projections, they
    took into account elements like past water usage, temperature, and rainfall occurrence.
    The forecasting technique was informed by the study’s examination of the effects
    of various time periods, such as weekdays and weekends, on demand patterns. A
    weighted parallel forecasting technique was suggested to further improve accuracy.
    It integrates various forecasting methods, each with advantages and disadvantages,
    to create a more accurate and dependable forecast of water demand. This method
    reduces errors by giving models weights based on how well they function. Overall,
    the research shows that machine learning-based forecasting works better than conventional
    time-series analysis techniques, potentially saving up to 18% in operating costs
