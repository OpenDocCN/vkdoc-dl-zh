- fmt: '# 5. Potability Analysis of Water Using Machine Learning


    **Chapter authors:**


    Ramdin Diteesha, `diteesharamdin01@gmail.com`


    Ramjansing Roshwar, `yanishramjansing@gmail.com`


    Soodhoo Leena, `leenasoodhoo@gmail.com`


    The United Nations Sustainable Development Goals (SDGs) stand as a pivotal framework
    in addressing global challenges and enhancing the well-being of both people and
    the planet. In this chapter, the focus is on SDGs 3 (Good Health and Well-being),
    6 (Clean Water and Sanitation), and 12 (Responsible Consumption and Production).
    Utilizing machine learning algorithms including k-nearest neighbors (K-NN), decision
    trees, random forests, and naïve Bayes, we aimed to predict water potability.
    Access to clean drinking water is imperative for ensuring good health, as contaminated
    sources can lead to waterborne diseases. Accurate prediction of water quality
    significantly contributes to achieving SDG 3. Moreover, the chapter directly tackled
    SDG 6 by evaluating water potability. Machine learning played a vital role in
    identifying and monitoring water quality, ensuring the availability of clean and
    safe drinking water, a fundamental requirement for achieving this goal. Additionally,
    under SDG 12, the chapter utilized machine learning to optimize resource utilization,
    specifically by efficiently predicting water potability. This approach fosters
    responsible water consumption and minimizes wastage, aligning seamlessly with
    SDG 12’s objectives. The chapter utilized a dataset sourced from Kaggle, encompassing
    parameters such as pH, hardness, solids, chloramines, sulfate, conductivity, organic
    carbon, trihalomethanes, and turbidity. Rigorous data preprocessing techniques,
    including handling missing values, feature scaling, and categorical variable encoding,
    were employed. Machine learning algorithms (KNN, decision trees, random forests,
    naïve Bayes) were then implemented to achieve accurate predictions of water potability.
    The application of these machine learning algorithms not only ensured precise
    assessments of water potability, thereby guaranteeing the availability of clean
    drinking water (SDG 6), but also contributed significantly to the responsible
    consumption and production (SDG 12) by optimizing resource allocation.


    Machine learning’s advantages, including enhanced accuracy, scalability, and automation,
    were evident in comparison to traditional methods, making it an invaluable tool
    for addressing SDG-related challenges. A key highlight of this research was its
    comprehensive comparison of multiple machine learning algorithms for water potability
    prediction, enhancing transparency and interpretability. Furthermore, the study
    provides practical guidance for selecting the most suitable model, ensuring accessibility
    and usability for a wider audience. While other research endeavors have explored
    machine learning in water quality analysis, this project’s multifaceted approach
    and emphasis on user-friendliness set it apart, making a significant and distinctive
    contribution to the field of water quality assessment and SDG achievement.


    ## 5.1 Introduction


    Generally the UN SDGs promote a world where there is no poverty, no famine issues,
    basic healthcare facilities, access to education, gender equality, access to drinking
    water and hygiene, the use of renewable sources of energy, improvement toward
    economic growth, new innovation and infrastructural development, enhancement toward
    a sustainable city and economy, wise management about the consumption and production
    of goods, mediums to cater for the climatic changes, and life below water and
    on land given the same importance.


    This chapter is mainly focused on SDG 3, SDG 6, and SDG 12. This chapter is based
    on testing the potability of water. It determines whether the water is safe for
    consumption whereby several parameters such as pH, turbidity, conductivity, and
    the presence of other chemicals are being analyzed. Testing water quality is crucial
    to ensure the safety of the public. The principal reason to choose these three
    SDGs are because they provide a guideline toward a sustainable world whereby the
    public has access to safe drinking water. Thus, promoting good health is a wise
    decision to prevent the contamination of water bodies whereby its production and
    consumption are being assessed.


    Machine learning promotes the automation of tasks whereby there is less manual
    intervention. This technique is more effective and less costly. Machine learning
    has the ability to analyze large datasets and perform prediction. It has the ability
    to understand and generate human language by a process known as natural language
    processing. It is beneficial as it empowers businesses and helps in achieving
    various goals by extracting important features from data. This promotes the automation
    of tasks and model prediction and achieves innovation that will shape the future
    of the world. Several ML algorithms have been employed in different research works
    to address SDGs 3, 6, and 12.


    To scrutinize water potability issues, in this chapter, four machine learning
    algorithms have been implemented (naïve Bayes, decision tree, K-nearest neighbor,
    and random forest) to target the three SDGs mentioned. The `water_potability.csv`
    file is used as a dataset, and this dataset has been inserted into the four listed
    machine learning algorithms to check the accuracy obtained. The machine learning
    algorithm with the highest accuracy level is chosen, and its outcome is used as
    the final output to determine whether the water is potable. Based on the results
    obtained, it can be concluded that the naïve Bayes learning algorithm is highly
    suitable for this context as it obtains the highest accuracy level.


    The primary research questions addressed in this report center around the task
    of predicting water potability through the utilization of four distinct machine
    learning algorithms: K-nearest neighbors (KNN), decision trees, random forests,
    and naïve Bayes. These questions encompass the assessment of the predictive accuracy
    of each of these algorithms in determining whether water is potable. Additionally,
    it aims to explore the comparative performance of these algorithms in the context
    of water quality analysis. The research seeks to uncover which algorithms offer
    the most reliable and accurate predictions for water potability, providing valuable
    insights into the suitability of various machine learning techniques for this
    specific domain. The primary novelty in this research lies in its multifaceted
    approach to water potability prediction. By employing multiple machine learning
    algorithms and outputting their respective accuracies, it provides a comprehensive
    comparison, offering a more profound understanding of which algorithms excel in
    this specific task.


    Moreover, the research introduces transparency and interpretability into the analysis,
    particularly through the application of random forest and decision tree algorithms.
    This fosters a deeper understanding of the influential factors behind each prediction.
    Additionally, it extends to the practical guidance it offers for selecting the
    most appropriate machine learning model for water potability prediction, and it
    prioritizes user-friendliness, ensuring that the results are accessible and actionable
    for a broader audience. In summary, this chapter brings together a diverse set
    of machine learning techniques to tackle a critical real-world problem, enriching
    the field with comprehensive insights and guidance for future applications.'
