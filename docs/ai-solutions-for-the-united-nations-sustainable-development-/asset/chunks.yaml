  trans: '

    ### 3.4.4 随机森林


    与前两种分类算法类似，将相同的输入应用于随机森林算法，输出结果如表 3-7 所示。使用了六组已知输出的不同测试数据，并将结果与真实类别进行了比较。


    **表 3-7** 随机森林算法


    | N | P | K | 温度 | 湿度 | pH 值 | 降雨量 | 获得的结果 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 100 | 53 | 41 | 24.52 | 80.94 | 6.35 | 200.1 | 水稻 |

    | 50 | 42 | 20 | 23.44 | 60.54 | 6.89 | 72.44 | 玉米 |

    | 41 | 60 | 75 | 25.56 | 20.22 | 9.0 | 78.55 | 鹰嘴豆 |

    | 5 | 10 | 3 | 9.55 | 100.50 | 8.55 | 120.33 | 橙子 |

    | 95 | 30 | 22 | 26.91 | 50.74 | 7.42 | 140.48 | 咖啡 |


    运行决策树模型后获得的准确率为 0.981。


    可以看出，当将不同作物需求的输入值输入模型时，RF 算法能够准确地推荐出作物。作物分类也与 k-NN 的结果一致，突显了 RF 的准确性。此外，图 3-12
    中的混淆矩阵表明了模型的准确性和性能，RF 算法为每个输入正确推荐了最佳作物，每个类别都达到了 100% 的准确率。随机森林算法非常准确，因为它由一组决策树组成，使得模型能够更好地在数据集上进行泛化，并提供结果的平均值。RF
    对于这个数据集也很高效，因为有七个特征，允许集成决策，与同时考虑所有特征的决策树相比，产生的树深度不会太深。RF 能够在不发生过拟合的情况下对数据进行泛化，产生高度准确的结果，这使其成为作物推荐问题的绝佳选择。


    ![](img/625524_1_En_3_Fig13_HTML.jpg)


    **图 3-12** 随机森林算法的混淆矩阵


    ### 3.4.5 多层感知器


    在本实验中，对多层感知器算法进行了测试，输入特征数量为 7 个，分别是磷、钾、氮的含量、温度、湿度、pH 值和降雨量。隐藏层数量设置为 44，学习率为 0.01，误差阈值为
    0.005。获得的结果已列于表 3-8 中。


    **表 3-8** 迭代次数 = 25 000


    | 迭代次数：25 000 |

    | --- |

    | N | P | K | 温度 | 湿度 | pH 值 | 降雨量 | 获得的结果 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 100 | 53 | 41 | 24.52 | 80.94 | 6.35 | 200.1 | 鹰嘴豆 |

    | 50 | 42 | 20 | 23.44 | 60.54 | 6.89 | 72.44 | 黄麻 |

    | 41 | 60 | 75 | 25.56 | 20.22 | 9.0 | 78.55 | 鹰嘴豆 |

    | 5 | 10 | 3 | 9.55 | 100.50 | 8.55 | 120.33 | 橙子 |

    | 95 | 30 | 22 | 26.91 | 50.74 | 7.42 | 140.48 | 鹰嘴豆 |

    | **模型准确率：77.2 %** |


    迭代次数增加到 50 000，结果如表 3-9 所示。


    **表 3-9** 迭代次数 = 50 000


    | 迭代次数：50 000 |

    | --- |

    | N | P | K | 温度 | 湿度 | pH 值 | 降雨量 | 获得的结果 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 100 | 53 | 41 | 24.52 | 80.94 | 6.35 | 200.1 | 黄麻 |

    | 50 | 42 | 20 | 23.44 | 60.54 | 6.89 | 72.44 | 玉米 |

    | 41 | 60 | 75 | 25.56 | 20.22 | 9.0 | 78.55 | 鹰嘴豆 |

    | 5 | 10 | 3 | 9.55 | 100.50 | 8.55 | 120.33 | 橙子 |

    | 95 | 30 | 22 | 26.91 | 50.74 | 7.42 | 140.48 | 咖啡 |

    | **模型准确率：89.3 %** |


    迭代次数增加到 100 000。表 3-10 显示了获得的结果。


    **表 3-10** 迭代次数 = 100 000


    | 迭代次数：100 000 |

    | --- |

    | N | P | K | 温度 | 湿度 | pH 值 | 降雨量 | 获得的结果 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 100 | 53 | 41 | 24.52 | 80.94 | 6.35 | 200.1 | 黄麻 |

    | 50 | 42 | 20 | 23.44 | 60.54 | 6.89 | 72.44 | 黑绿豆 |

    | 41 | 60 | 75 | 25.56 | 20.22 | 9.0 | 78.55 | 鹰嘴豆 |

    | 5 | 10 | 3 | 9.55 | 100.50 | 8.55 | 120.33 | 橙子 |

    | 95 | 30 | 22 | 26.91 | 50.74 | 7.42 | 140.48 | 咖啡 |

    | **模型准确率：90%** |


    可以观察到，随着迭代次数的增加，模型准确率也随之提高。对于 25,000 次迭代，模型的准确率为 77.2%。基于输入值获得的输出非常不准确，因为对于多个不同的值，模型都将它们分类为鹰嘴豆。当迭代次数增加到
    50,000 时，获得了 89.3% 的更高准确率。预测的标签比之前获得的结果更准确。将迭代次数设置为 100,000 时，模型的准确率略有提高。然而，进一步使用迭代次数等于
    150,000 进行了测试。获得的结果显示模型准确率降至 90% 以下，这可能是由于过拟合造成的。如果模型训练时间过长，它可能会开始记忆训练数据，而不是学习如何泛化到新的、未见过的数据。监控模型在验证数据上的性能，并应用诸如提前停止或正则化等策略，对于减少过拟合至关重要。


    图 3-13 显示了 MLP 获得的混淆矩阵。可以观察到，对于水稻，有 42% 的混淆是与咖啡。椰子也有 24% 的概率与咖啡数据混淆。某些数据值的模糊性可能使得任何模型都难以准确预测它们。在这种情况下，模型同时产生了假阳性和假阴性。


    ![](img/625524_1_En_3_Fig14_HTML.jpg)


    **图 3-13** MLP 的混淆矩阵

