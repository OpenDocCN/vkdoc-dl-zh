    Table 6-3


    `MAPE` values for `SLR` algorithm


    | LocationsAirpollutants | Port Louis | Grand Baie | Quatre Bornes | Beau Bassin
    | Flacq | Average |

    | --- | --- | --- | --- | --- | --- | --- |

    | `O[3]` | 6.64 | 7.00 | 7.08 | 6.89 | 6.43 | 6.81 |

    | `CO` | 9.87 | 10.76 | 11.21 | 11.52 | 11.92 | 11.06 |

    | `PM[10]` | 12.33 | 12.65 | 12.99 | 12.80 | 14.16 | 12.99 |

    | `PM[25]` | 11.54 | 11.78 | 12.22 | 12.37 | 13.44 | 12.27 |


    The `SLR` algorithm was selected as it can still be valuable when the relationship
    between a single predictor and a response variable is linear and well-suited for
    analysis using a simple linear model. However, it may not capture more complex
    relationships that `PLR` and `MLP` can handle. From the results obtained in Table
    [5-1](#625524_1_En_5_Chapter.xhtml#Tab1), it can be observed that the `MAPE` is
    low ranging, from 6.81% to 12.99%. The `MAPE` for the concentration of `O3` is
    the lowest at 6.81%. This could indicate that the concentration of `O3` follows
    a predictable pattern, with low-magnitude fluctuations. For the other variables,
    the `MAPE` was relatively high, which could indicate that the air pollutants vary
    in a random manner, and it is difficult to obtain a line of best fit.


    ### 6.4.4 Performance of PR


    The fifth-degree polynomial regression was used. Figure [6-12](#625524_1_En_6_Chapter.xhtml#Fig12)
    shows the graph of concentration of `PM10` against time for the `PR` algorithm.


    ![](images/625524_1_En_6_Chapter/625524_1_En_6_Fig12_HTML.jpg)


