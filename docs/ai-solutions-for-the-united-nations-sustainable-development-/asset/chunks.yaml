    ### 多项式回归


    由于观察到风速与预测的风力系统功率之间存在非常强的相关性，因此多项式回归是一种可以研究并应用于该数据集的合适技术。多项式的适当次数取决于模型的平均绝对百分比误差
    (MAPE)。


    图 2-6 中的流程图展示了使用此算法的程序工作流程。


    ![](img/625524_1_En_2_Fig6_HTML.png)


    图 2-6


    程序工作流程，多项式回归


    允许用户选择多项式的次数，以获得模型的最大精度。然而，在这种情况下，只考虑单个预测变量。图 2-7 展示了 `poly.js` 文件中包含的函数。


    ![](img/625524_1_En_2_Fig7_HTML.png)


    图 2-7


    `poly.js`


    ### 多元线性回归


    为了研究所有预测变量对因变量的关系，采用了多元线性回归技术，并评估了其相应的精度。该模型将风速、风向、气压和温度作为输入，以预测系统功率。图 2-8 展示了训练该模型所涉及的主要步骤。


    ![](img/625524_1_En_2_Fig8_HTML.png)


    图 2-8


    程序工作流程，MLR


    该程序使用 `ml.min.js` 中提供的多元线性回归库来获取必要的系数和预测值。此外，程序中还引入了一个用于计算 MAPE 的函数，以评估系统的精度。图
    2-9 中所示的 `main3.js` 文件用于实现 MLR 过程。


    ![](img/625524_1_En_2_Fig9_HTML.png)


    图 2-9


    `main3.js`


    ## 2.4 应用测试与分析


    在这一系列实验中，应用并评估了三种不同的回归技术，即多项式回归、K 近邻 (KNN) 回归和多元线性回归，以了解它们在预测目标变量方面的性能。每个实验中的目标变量由平均绝对百分比误差
    (MAPE) 表示，该指标量化了每个回归模型所做预测的准确性。


    对于实验 1，使用从 4 到 14 的次数训练和测试了多项式回归模型。对于实验 2，使用从 2 到 10 的各种 K 值构建并评估了 KNN 回归模型。对于实验
    3，应用了多元线性回归，未指定次数或 K 值。

