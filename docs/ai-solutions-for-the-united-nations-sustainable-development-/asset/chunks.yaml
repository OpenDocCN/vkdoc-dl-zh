- fmt: '### 3.4.6 Discussion


    All four algorithms demonstrated very high accuracy in crop classification methods.
    Each ML method accurately recommends the best adaptable crop, based on the soil
    composition and the amount of rainfall a land is normally subjected to. Each algorithm
    employed is distinct, and each exhibits different working strategies leading to
    the classification results. Table [3-11](#625524_1_En_3_Chapter.xhtml#Tab11) summarizes
    the accuracy obtained for each algorithm implemented.


    **Table 3-11** Accuracy of ML Algorithms Used


    | Algorithm | Accuracy (%) |

    | --- | --- |

    | `k-NN` | 99 |

    | Decision Trees | 98 |

    | Random Forest | 100 |

    | Multilayer Perceptron | 90 |


    Table [3-11](#625524_1_En_3_Chapter.xhtml#Tab11) indicates that random forest
    algorithm showcased the highest accuracy in crop classification. `RF` stands out
    as the best model that can be used in helping toward the SDG goals targeted. The
    four ML models used would help farmers and cultivators as well as the agriculture
    industry to innovatively identify what crop is viable and cultivable on the type
    of soil compositions the land has, which will lead to effective and productive
    crop yield after harvesting. An advantage of the dataset is that it encompasses
    an extended number of features, NPK variants, pH Value, and rainfall entailed
    by the crop type for harvest.


    The results allow the users to plan their crop harvesting throughout the year,
    maximizing crop yield through every season, by knowing the best cultivable crop
    through the ML model. The web application enables industries having expansive
    lands for agriculture over different regions, which are subjected to different
    environmental conditions, to efficiently grow the required crop, pertaining to
    the specific soil nutrients and rainfall, aiding extensively to SDG 9.


    Furthermore, effective, and maximized crop yield contributes massively to responsible
    production and decreases to a large extent the scarcity of food supply throughout
    the market, thus contributing to SDGs 2 and 12. Use of ML for crop recommendation
    diminishes manual computations, inaccuracies, and estimations. Traditional method
    for crop selection involves soil testing, used for historical data for comparison
    and the need for agricultural experts to estimate the crop with highest yield
    rate. These methods have already proven to be inaccurate and are merely estimations,
    due to the decrease in crop yield. The ML algorithms make use of rainfall factor,
    which helps as an adaptation to climate change. Industries and farmers would learn
    which crop adapts efficiently to their climate. Each algorithms has its benefits
    and disadvantages.


    `RF`’s ensemble learning with high accuracy and good generalization over data
    highlights its effectiveness for the crop recommendation system. However, trade-offs
    for such accuracy are extended storage requirements and increased prediction time.
    Use of larger dataset will enhance the model’s performance, with lesser overfitting
    and increased accuracy of predictions.


    One of the major benefits of using the `k-NN` model is its ease of implementation.
    It is also flexible allowing the possibility to fine-tune the model for different
    values of `k`. However, when dealing with large datasets, `k-NN` can become computationally
    expensive. This is because of the calculation of the Euclidean distance. And so,
    this model is inappropriate for real-time applications. With the distance functions,
    `k-NN` can be easily influenced by the presence of noisy data points and outliers
    in the dataset.


    `MLP`s are well suited for a wide range of tasks because they can model complicated,
    nonlinear relationships in data. Increasing the number of hidden layers and neurons,
    `MLP`s can be scaled up making them adaptable for simple and complex datasets.
    When the model learns to memorize the training data instead of generalizing from
    it, `MLP`s, especially deep networks with many parameters, are vulnerable to overfitting.
    To counteract this phenomenon, careful regularization approaches are required.
    An `MLP`’s architecture, including its number of layers, neurons, and activation
    functions, needs to be carefully tuned, which can take some time. When applying
    a different learning rate when training model with this dataset, the application
    would freeze and take a lot of time to output the model.


    ## 3.5 Summary


    The aim of this chapter was to show how machine learning algorithms could be used
    to achieve SDGs 2, 9, and 12. The dataset obtained through research consisted
    of data related to 22 different crops. Essentially, a web application was developed
    that would read the dataset and apply different machine learning algorithms. A
    dependency called `ml.js` was used to implement algorithms such as `k-NN`, decision
    tree, random forest classifier, and multilayer perceptron. Each algorithm was
    tested using different hyperparameters respective to the algorithm.


    The results obtained showed that the random forest classifier gave the highest
    accurate model compared to the other algorithms. The different machine learning
    algorithms applied to the crop dataset helps to reduce manual computations and
    inaccuracies in choosing which crop to plant depending on the different variables.
    This would help in increasing the percentage of crop yield, helping to accomplish
    the sustainable development goals. A typical limitation of this report is the
    use of only one dataset to test the different ML algorithms. More research could
    be performed to find more datasets that can be used to test how the ML algorithms
    perform. Moreover, additional classification algorithms such as `K-Means`, hierarchical
    clustering, and others can be implemented in the application. The main conclusion
    is that ML can help achieve SDGs by performing predictions and classifications
    with higher accuracy than traditional methods of data analysis. An interesting
    future work would be to use more datasets related to crops and analyze how each
    machine-learning algorithm would perform.'
