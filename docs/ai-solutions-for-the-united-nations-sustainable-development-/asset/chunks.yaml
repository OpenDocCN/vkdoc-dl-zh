- fmt: "# 1.1 The UN SDGs and Machine Learning\n\nThe Sustainable Development Goals\
    \ were created in Rio de Janeiro at the United Nations Conference on Sustainable\
    \ Development in 2015 by the UN General Assembly through resolution 70/1 on the\
    \ 2030 Agenda. The UNSDG is a group of 193 states established to provide a better\
    \ future and a better quality of life. The SDGs were developed as a response to\
    \ the pressing global challenges in the environmental, economic, and political\
    \ domains. These goals replaced the Millennium Development Goals (MDGs), which\
    \ were started in 2000 to reduce poverty. The SDGs builds upon the MDGs and addresses\
    \ more urgent global challenges.\n\nThe 17 interconnected goals encompass a wide\
    \ range of issues, where success in one area influences progress in others. The\
    \ 17 SDG goals aim at three significant community development aspects: protecting\
    \ the environment, fostering social diversity, and promoting economic growth.\
    \ These SDGs have been established by governments, academia, and the private sector\
    \ and are one of the most recognized standards to attain sustainable community\
    \ development [1], [2], [3].\n\nFigure [1-1](#625524_1_En_1_Chapter.xhtml#Fig1)\
    \ shows the 17 SDGs.\n\n![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig1_HTML.png)\n\
    \nFigure 1-1\n\nThe UN SDGs\n\nAI and machine learning provide a powerful means\
    \ of achieving the UN SDGs, and several studies have reported their effectiveness.\
    \ The following list is a review of some of the works where AI and ML have been\
    \ employed to SDGs 1, 2, 3, 6, 7, 9, 11, 12, and 13:\n\n* **SDG 1: No Poverty**\n\
    \n  The objective of this SDG is the worldwide eradication of extreme poverty\
    \ by 2030 and to ensure equal rights to economic resources to all people. Extreme\
    \ poverty is characterized by people with a daily wage of less than $1.25 [4].\
    \ According to the Decentralized AI Alliance (DAIA) [5], it is possible to extract\
    \ vital information such as the closest water sources, agricultural fields, and\
    \ marketplaces using AI [6]. Moreover, high-tech satellite-based image analysis\
    \ was used to identify poverty in Nigeria, Tanzania, Uganda, Malawi, and Rwanda\
    \ by a team of researchers at Stanford University using sophisticated machine\
    \ learning algorithms [7].\n\n* **SDG 2: Zero Hunger**\n\n  The primary purpose\
    \ of this SDG is to eradicate hunger, improve nutrition, ensure food security,\
    \ and promote sustainable agriculture [8]. At present, up to half of the world’s\
    \ food is wasted. An increase in poverty will lead to food insecurity and, as\
    \ a consequence, an increase in diseases. AI can be of a major help in dealing\
    \ with food wastage and security issues. Take the case of the TOMRA Sorting Solutions,\
    \ which is powered by AI. It analyzes and categorizes food as either good or bad.\
    \ The algorithm can analyze a tomato and determine if it can be used in a salad.\
    \ If not, it can be better suited for tomato juice [9]. Several machine learning\
    \ algorithms such as decision trees, `k-NN`, multivariate logistic regression,\
    \ and random forest have also been used in crop prediction and classification\
    \ of soil types in countries such as India and Bangladesh [10, 11, 12, 13].\n\n\
    * **SDG 3: Good Health and Well-Being**\n\n  The aim of SDG 3 is to guarantee\
    \ healthy lifestyles and promote well-being for all individuals, regardless of\
    \ their age, race, and religion. This includes a wide range of objectives, such\
    \ as lowering the global maternal mortality rate and putting an end to preventable\
    \ infant and child deaths under five years of age. Moreover, it aims to minimize\
    \ or put an end to AIDS, tuberculosis, malaria, and other communicable disease\
    \ epidemics and to lower premature mortality from non-communicable diseases through\
    \ prevention and treatment, stepping up the prevention and treatment of substance\
    \ abuse, and ensuring universal access to sexual and reproductive health services\
    \ [14]. However, the worldwide threats from pandemics like COVID-19 have emphasized\
    \ the pressing requirement for readiness. The UNDP emphasized the contrasting\
    \ capabilities of nations to cope with the COVID-19 problem. Investments in vital\
    \ public services and health emergency preparation witnessed a turning point in\
    \ the 21st century due to the pandemic.\n\n  The following are some of the targets\
    \ by 2030:\n  * To decrease the global maternal mortality rate to less than 70\
    \ for every 100,000 live births.\n  * To eliminate the death of newborns and children\
    \ younger than 5 years old. The aims of all nations are to lower neonatal mortality\
    \ to at least 12 per 1,000 live births and under-5 mortality to at least 25 per\
    \ 1,000 live births.\n  * To significantly lower the number of fatalities and\
    \ diseases caused by contaminated air, toxic chemicals, water, and soil.\n\n \
    \ With regard to the application of ML to help achieve this SDG, in [15], the\
    \ use of the deep learning approach (DLA) in medical image analysis has emerged\
    \ as a rapidly advancing research domain where DLA is extensively applied in medical\
    \ imaging to discern the presence or absence of diseases. This work focused on\
    \ the evolution of artificial neural networks and conducted an extensive examination\
    \ of DLA, which exhibits promising applications within the realm of medical imaging.\
    \ Moreover, in the work carried out in [16], an approach for distinguishing autism\
    \ traits using machine learning was presented. An existing prediction model was\
    \ enhanced by combining two different algorithms, namely, `CART` and `ID3` within\
    \ random forest.\n\n* **SDG 6: Clean Water and Sanitation**\n\n  SDG 6 holds a\
    \ pivotal role within the United Nation’s 2030 Agenda for Sustainable Development\
    \ [17]. It makes sure that there is a worldwide commitment to ensure that everyone\
    \ has access to safe and affordable drinking water and sanitation by the year\
    \ 2030. SDG 6 addresses several significant challenges. First, it focuses on ensuring\
    \ access to safe and uncontaminated potable water, acknowledging that billions\
    \ of individuals globally still lack this fundamental necessity. Second, it places\
    \ emphasis on sanitation by aiming to eradicate open defecation and ensuring proper\
    \ wastewater treatment to prevent water pollution.\n\n  Machine learning, especially\
    \ `k-Nearest Neighbors` (`k-NN`) can serve as a valuable tool in confronting these\
    \ challenges. `k-NN` is a supervised learning algorithm that can be utilized for\
    \ classification and regression tasks. It has pertinent applications within the\
    \ context of SDG 6:\n  * **Monitoring water quality:** `k-NN` can be employed\
    \ to scrutinize data on water quality collected from various sources such as sensors\
    \ and monitoring stations. This analysis aids in identifying patterns and irregularities\
    \ in water quality, facilitating early detection of contamination or pollution\
    \ incidents.\n  * **Proactive maintenance:** Machine learning algorithms such\
    \ as `k-NN` can predict when maintenance or repair is needed for water infrastructure.\
    \ This proactive approach ensures that there is an interrupted provision of clean\
    \ water.\n\n  In [18] researchers addressed SDG 6 by exploring AI-driven water\
    \ quality anomaly detection (WQAD). They conducted an extensive review of ML and\
    \ deep learning (DL) applications in smart water systems. Additionally, in [19]\
    \ the study contributed to SDG 6 by using machine learning to forecast Escherichia\
    \ coli (E. coli) contamination in Ethiopian drinking water sources. They employed\
    \ risk mapping algorithms like Random Forest (RF) and Extreme Gradient Boosting\
    \ (`XGBoost`), combining geographical and household data. Furthermore, the work\
    \ in [20] employed machine learning, specifically a modified Faster `R-CNN` (convolutional\
    \ neural network), to detect and categorize algae in water, addressing both SDGs\
    \ 6 and 14. Manually identifying diverse, microscopic algae is time-consuming\
    \ and error-prone. In [21], the work indirectly supported SDGs 3 and 6 by using\
    \ machine learning to predict water quality, a critical aspect of ensuring access\
    \ to safe drinking water. It focused on classifying water as potable or nonpotable,\
    \ vital for public health. Effective algorithms like Support Vector Machine (SVM)\
    \ and `k-NN` achieved high `F1`-scores and accuracy.\n\n* **SDG 7 – Affordable\
    \ and Clean Energy**\n\n  Implementing renewable energy options is becoming increasingly\
    \ affordable and reliable and is therefore a prospective solution to ensure sustainability.\
    \ Our heavy dependence on unrenewable sources such as fossil fuels is not only\
    \ harmful to the environment but also leaves future generations with limited options\
    \ to carry out their activities. The main objective of this SDG is to reach accessible,\
    \ eco-friendly, and sustainable energy for all. Despite that energy holds an important\
    \ position in both environmental and economic aspects, one-fifth of the global\
    \ population still did not have access to electricity in 2021 [22]. There are\
    \ several targets that should be met to achieve this SDG and some of them are\
    \ listed here:\n  * **Target 7.1 – To ensure that everyone across the globe is\
    \ able to access state-of-the-art and reliable energy services by 2030.**\n\n\
    \    As stated in [22], 1 out of 10 people do not have access to electricity to\
    \ fulfil basic requirements. It is also stated that around 2.6 billion people\
    \ make use of biomass energy resources such as charcoal, coal and animal waste;\
    \ 80% of countries globally do not have access to green energy. The SDGs can be\
    \ achieved by making use of greener energy alternatives. SDG 7.1 aims at closing\
    \ those energy gaps by 2030.\n\n  * **Target 7.2 – Focus on clean energy technologies\
    \ and energy sources to increase the use of renewable energy for daily purposes\
    \ by 2030.**\n\n    SDG 7.2 aims to encourage more countries in approaching renewable\
    \ energy methods. It is stated in [22] that around 17% of the world’s energy consumption\
    \ comes from renewable sources. Industries across the world have started investing\
    \ in sustainable resources that aim at producing green energy and causing less\
    \ harm to the planet.\n\n  * **Target 7.3 – Increase global energy efficiency\
    \ by twofold and improve international cooperation to facilitate access to renewable\
    \ energy services by 2030.**\n\n    It aims at improving the ratio of the total\
    \ energy output to the energy input into a system producing energy. This can be\
    \ done by minimizing the total amount of waste, by improving the technologies\
    \ involved and by approaching sustainable approaches. Target 7.3 aims at doubling\
    \ the rate at which energy is being now by 2030.\n\n  By employing machine learning\
    \ algorithms on historical turbine data and weather forecasts on a 700 megawatts\
    \ wind power grid, DeepMind and Google could generate 36-hour forecasts of the\
    \ wind power output, thus promoting SDG 7. It was thus possible to optimally plan\
    \ the hourly delivery commitments to the power grid, one day in advance. A 20\
    \ % gain in wind energy management was obtained with this scheme compared to a\
    \ conventional system that does not take into consideration the predicted wind\
    \ power output [23].\n\n* **SDG 9: Industry, Innovation, and Infrastructure**\n\
    \n  This SDG targets the setting up of durable infrastructure, support inclusive\
    \ and sustainable industrialization and foster innovation as per the motto of\
    \ the United Nations [24]. Investment in infrastructure and innovation are essential\
    \ for economic growth and development while also improving and expanding new industries\
    \ and infrastructure, especially in developing countries. Moreover, SDG 9 accounts\
    \ for the advancement of economic growth by creating employment opportunities,\
    \ promoting sustainable development such as energy-efficiency and sustainable\
    \ industries, and investing in scientific research and innovation.\n\n  Some key\
    \ targets and areas of focus are as follows:\n  * Developing reliable, sustainable,\
    \ and resilient infrastructure affordable and accessible to all\n  * Promoting\
    \ inclusive and sustainable industrialization to increase the employment and GDP\
    \ rate\n  * Expanding access to financial resources, particularly for small and\
    \ medium-sized enterprises (SMEs) in developing countries\n  * Upgrading industries\
    \ to employ resilient, sustainable, and environment-friendly resources\n  * Promoting\
    \ research and development, technological advancement, and innovation to drive\
    \ economic growth and find solutions to global challenges [25]\n\n  In [26], the\
    \ impact of digitization to achieve SDGs was studied by focusing on the competitiveness\
    \ of the Ha’il region of Saudi Arabia. An ML technique, a vector auto-regressive\
    \ model, and impulse response functions were used. Results suggested that digitization\
    \ promoted a rise in sustainable development of the Ha’il region, mainly SDG 9,\
    \ which pertains to industry, innovation, and infrastructure. In [27], the opportunities\
    \ offered by the acceleration of the Internet of Things (IoT) and advances in\
    \ AI in reaching SDGs, related to health, energy, and cities have been studied.\
    \ A system model combining IoT and AI to facilitate mobility in cities, thus targeting\
    \ SDGs 9, 11, and 13, was proposed.\n\n* **SDG 11: Sustainable Cities and Communities**\n\
    \n  This SDG aims to build safe, sustainable, inclusive, and resilient cities\
    \ and human habitats [28]. Technological advances are expected to have a major\
    \ impact on smart cities. According to the UN, by 2050, smart cities will accommodate\
    \ nearly 66% of the world’s population [29]. Socio-economic concerns in areas\
    \ such as energy, healthcare, and security are being addressed by countries where\
    \ fast-growing urban areas are being converted into smart cities.\n\n  Real-time\
    \ location, video, and biometric data analysis can be achieved by combining AI\
    \ with the ultra-reliable 5G networks. Self-driving cars are also an outcome of\
    \ the combination of ultra-fast 5G networks with AI. Furthermore, high-resolution\
    \ surveillance cameras can be connected to cloud-based facial recognition systems\
    \ to recognize and spot potential law breakers in real time [30].\n\n* **SDG 12:\
    \ Responsible Consumption and Production**\n\n  SDG 12 promotes the reduction\
    \ of chemical usage and waste generation in industries. This activity relates\
    \ to water treatment and testing processes. By optimizing chemical usage and minimizing\
    \ waste generation, water treatment processes can be carried out more effectively\
    \ and in an environment friendly manner [31].\n\n  In water potability testing,\
    \ the SDG 12 ensures efficient use of water resources by verifying the safety\
    \ of water for consumption purposes. In addition, the water potability testing\
    \ aids in analyzing the environmental impacts of water treatment and ensures that\
    \ these treatments are eco-friendly. Water potability testing can be improvised\
    \ by the use of innovative technologies such as sensor networks, IOT, and machine\
    \ learning. This improves the accuracy and efficiency of testing.\n\n  SDG12 emphasizes\
    \ on managing water resources and assure safe and clean drinking water for the\
    \ public. The purpose of this SDG is to promote a sustainable means of consumption\
    \ and production whereby resources are widely being used. This objective can be\
    \ achieved by minimizing the ecological footprint. This meets the consumption\
    \ needs of people without exploiting the natural resources and without causing\
    \ harm to the environment such as discharge of toxic chemicals in water, air,\
    \ or land.\n\n  Again, machine learning can prove to be very efficient in achieving\
    \ SDG 12. For example, in [32], short-term water demand was predicted, and pumping\
    \ schedules were optimized to reduce electricity costs by optimizing water supply\
    \ systems through machine learning.\n\n* **SDG 13 – Climate Action**\n\n  SDG\
    \ 13 aims to alleviate the impact of climate change by decreasing greenhouse gas\
    \ emissions, improving resilience to climate-related disasters, and promoting\
    \ sustainable practices. SDG 13 recognizes that climate change poses significant\
    \ threats to ecosystems, economies, and communities worldwide, emphasizing the\
    \ need for immediate and coordinated efforts to protect the planet for a sustainable\
    \ and climate-resilient future [1, 2].\n\n  Some of their targets are as follows:\n\
    \  * To increase global adaptability and immunity to climate-related threats and\
    \ natural disasters\n  * To add climate change mitigation actions in national\
    \ planning, strategy, and policies\n  * To increase educational and awareness\
    \ campaigns on climate change, institutional and human capacity for impact reduction,\
    \ early warning, and adaptation\n\nSome ML techniques that have been used for\
    \ SDG 13 include the work in [33] in which the authors proposed a real-time multistep\
    \ multi-output multivariate ML model to forecast the concentrations of the different\
    \ air pollutants in Ho Chi Minh City (HCMC), which is located in Vietnam. The\
    \ model proposed by the authors took as input various parameters, including meteorological\
    \ conditions and air quality data from urban, residential, and industrial areas\
    \ as well as hourly `NO[2]`, `SO[2]`, `O[3]`, and `CO` concentrations. The concentration\
    \ of each air pollutant was predicted using the proposed model, and the results\
    \ demonstrated that the Mean Absolute Percentage Error (MAPE) value obtained,\
    \ when predicting the concentration of each pollutant, ranged from 0.18 to 0.23.\
    \ Moreover, in [34], deprived urban areas in Philippines were monitored over a\
    \ four-year period, following the impact of 2013’s super Typhoon Haiyan. Both\
    \ satellite imagery and ML methods were employed for the purpose. Due to the increase\
    \ in gravity and impact of natural disasters in such areas, effective disaster\
    \ risk mitigation strategies are required. A support vector machine classification\
    \ technique supported by a local binary pattern feature extraction model initially\
    \ detected slum areas in pre- and post-disaster imageries. Afterward, a dense\
    \ conditional random fields model produced final slum areas maps. The developed\
    \ method detected slum areas with high accuracy. The results revealed that the\
    \ city returned to the pre-existing vulnerability level."
