    The Sustainable Development Goals (SDGs) aim at transforming our world by putting
    an end to poverty and inequality, while ensuring the welfare of the inhabitants
    of this planet. Machine learning aims to help achieve these SDGs by offering prediction
    capabilities and patterns identification from large and complex datasets.


    In this chapter, three machine learning algorithms, namely, polynomial regression,
    k-nearest neighbors (k-NN) regression, and multilinear regression are used to
    predict and classify wind power from a dataset found on Kaggle. The JavaScript
    language is used to code the machine learning algorithms and HTML is used to create
    a web page so the user can input the independent variables to obtain the predicted
    wind power for the wind turbines.


    This chapter addresses SDG Targets 7.1, 7.2, and 7.3. SDG Target 7.1 ensures that
    everyone has access to reliable energy sources by 2030. SDG Target 7.2 aims at
    increasing the use of renewable technologies to produce energy, and SDG Target
    7.3 aims at improving the access to renewable energies technologies by 2030. The
    application of machine learning within energy production by making use of wind
    power aims at improving the accuracy of energy generation forecasting and optimizing
    energy distribution within energy production companies compared to traditional
    techniques, which are less accurate and more memory intensive.


    ### 2.1 Introduction


    Machine learning has become an invaluable tool for optimizing the production efficiency
    of green energy. The energy industry has approached clean energy technologies
    in recent years so as to reduce the impact of pollution on the environment and
    human health.


    However, the problem associated with renewable resources is that they generate
    most of their power at a certain time of the day and the generation power is related
    to other environmental factors such as wind, pressure, or temperature. The production
    of renewable energy is also sustainable and eco-friendly and it is the dependence
    on fossil fuels which causes more harm. It also aims at achieving SDG Target 7.1,
    which ensures that everyone has access to reliable energy sources by 2030; SDG
    Target 7.2, which aims at increasing the use of renewable technologies to produce
    energy; and SDG Target 7.3, which aims at improving the access to renewable energy
    technologies by 2030.


    This chapter aims to use different machine learning algorithms to predict wind
    power generated by wind turbines by using the following independent variables:
    wind speed, wind direction, pressure, and air temperature. In the chapter, the
    wind power generated was also classified as low, medium, or high by making use
    of the same independent variables. Polynomial regression, k-nearest neighbors
    (k-NN) regression, k-NN classification, and multilinear regression were used in
    the chapter, and the accuracy of the three machine learning algorithms was then
    compared. A dataset from Kaggle, which contains values for wind direction, wind
    speed, temperature, pressure, and the corresponding power generated, was downloaded
    and used within the program (Esapour et al., 2022).


    The dataset was first preprocessed so that it can be processed by the different
    machine learning algorithms, and a new attribute, which is the category of power
    was also added. JavaScript and HTML were used to build a web page for the user
    to enter the corresponding independent variable, and the predicted value along
    with the accuracy was displayed on the web page. The different machine learning
    algorithms were developed using JavaScript, and the mean absolute percentage error
    (MAPE) was calculated. Some optimization of the hyper-parameters was also made
    to obtain better accuracy.


    Moreover, a classification of wind power prediction, which involves categorizing
    wind power into low, medium, or high levels, has been performed. One of the primary
    benefits of classification models in wind power prediction is their ability to
    provide precise and reliable forecasts of expected wind power output. By categorizing
    wind power into these three levels, energy providers gain valuable insights into
    the availability of energy resources. This information is instrumental in scheduling
    energy production and distribution. For instance, when wind power is predicted
    to be high, energy providers can allocate resources and plan to harness this clean
    and renewable energy source optimally.'
  raw: '### 1.3.4 K-Nearest Neighbor


    K-Nearest Neighbor (k-NN) is a well-known simple supervised learning algorithm
    that may be used for both classification and regression.


    In this technique, k represents the number of nearest neighbors. It categorizes
    an object based on the majority vote of its nearest neighbors. The object is then
    classified into the most common class based on its k closest neighbors, where
    k is a positive integer [46].


    The Euclidean distance is one of the most common distance metrics used to calculate
    the distances between the objects to determine their k nearest neighbors. The
    Euclidean distance between two objects with n features is given as follows:


