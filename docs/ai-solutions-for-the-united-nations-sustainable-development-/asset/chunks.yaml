    图 3-7a 和图 3-7b 展示了用户在文本字段中输入的土壤详细信息。每个字段都已填写，并且还选择了要在表格中显示的行数。用户选择要运行的所需算法，并从单选按钮中选择选项。点击“上传文件”按钮后，通过文件选择器上传数据集。运行算法后，数据集的前
    10 行会显示在“表格预览”容器中。类似地，获得的混淆矩阵会显示在“混淆矩阵”容器中。最终的分类结果显示在“结果”文本字段中。


