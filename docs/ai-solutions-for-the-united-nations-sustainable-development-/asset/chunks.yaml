- fmt: '### 1.3.1 Simple Linear Regression (SLR)


    SLR is a statistical technique that analyzes the relationship between two quantitative
    variables and predicts the value of a dependent variable at a certain value of
    the independent variable. The correlation between the dependent and independent
    variables can be determined by the regression line, which follows a straight line
    of best fit across the dataset. Additionally, regression is utilized to assess
    the relationship between changes in the independent variable and the dependent
    variable.


    The formula for a simple linear regression is as follows [46]:


    ![$$ Y={\beta}_0+{\beta}_1X+\epsilon $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ3.png)


    (1.3)


    Where,


    `Y` is the dependent variable or predicted output.


    `β[0]` is the y-intercept of the regression line.


    `β[1]` is the gradient of the regression line or regression coefficient.


    `X` is the independent variable or targeted input.


    `ϵ` is the error of the estimated value, a measure of the variation between the
    predicted and actual value.


    SLR finds the line of best-fit through the dataset by computing the regression
    coefficient (`β[1]`) and y-intercept (`β[0]`) that minimizes the total error (`ϵ`)
    of the model. Using the least squares method the coefficients are calculated as
    follows:


    ![$$ {\beta}_0={M}_Y-{\beta}_1{M}_X=\frac{1}{N}\left({\sum}_{i=1}^N{Y}_i-{\beta}_1{\sum}_{i=1}^N{X}_i\right)
    $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ4.png)


    (1.4)


    ![$$ {\beta}_1=\frac{SC_{XY}}{SS_X}=\frac{\sum_{i=1}^N\left({Y}_{i-}{M}_Y\right)\left({X}_{i-}{M}_X\right)}{\sum_{i=1}^N{\left({X}_{i-}{M}_X\right)}^2}
    $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ5.png)


    (1.5)


    Where,


    `SC[XY]` is the sum of the co-deviate of XY.


    `SS[X]` is the sum of the squared deviate of X.


    `M[Y]` is the mean of `Y`.


    `M[X]` is the mean of `X`.


    `N` is the total number of values in `X` and `Y`.


    Two versions of a JavaScript implementation of SLR will be provided whereby the
    first version allows users to enter values directly on the web page for prediction
    and the second version allows users to upload a dataset for prediction.


    When the first version of the application is run, the user will have to populate
    the input fields, and when the `Read and Analyse` button is clicked, the outputs
    shown in Figure [1-15(a)](#625524_1_En_1_Chapter.xhtml#Fig15) are displayed.


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig15_HTML.jpg)


    Figure 1-15(a)


    Inputs and outputs for SLR version 1


    The application also outputs the equation of the line, the mean absolute percentage
    error (MAPE), and the graph of the dataset and regression line with the predicted
    point, as shown in Figure [1-15(b)](#625524_1_En_1_Chapter.xhtml#Fig16). The MAPE
    is computed as follows:


    ![$$ MAPE=\frac{\sum_{i=1}^N\frac{\left({Y}_{i-}\underset{\_}{Y_i}\right)}{Y_i}}{N}\
    x\ 100 $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ6.png)


    (1.6)


    Where,


    ![$$ \underset{\_}{Y_i} $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_IEq2.png)
    is the predicted value of `Y[i]`.


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig16_HTML.jpg)


