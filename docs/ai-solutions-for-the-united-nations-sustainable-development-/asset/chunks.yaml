  trans: '

    ### 4.2 可持续发展目标 9 和 13 的应用案例


    本节将回顾其他研究人员进行的、与运用机器学习算法实现联合国可持续发展目标相关的分析。


    文献[7]中介绍了一种“用于实施温室气体减排的机器学习驱动决策支持模型”。Lee 和 Tae 提出使用机器学习技术评估温室气体减排，旨在确定温室气体减排技术的经济和环境效益。他们通过开发用于评估温室气体技术的简单评估方法（SAM）数据库，分析了韩国的
    1,199 个温室气体减排项目。随后，采用了诸如梯度提升回归树（GBRTs）、`SVM` 和深度神经网络（DNN）等机器学习模型，创建了温室气体减排技术评估模型（GRTM）决策支持工具。在三种机器学习模型中，`DNN`
    表现出更好的预测精度。一个实际案例研究证实，通过采用高效照明、太阳能和地热能等最优温室气体减排技术，有潜力减少 111 吨 `CO[2]` 当量排放，纠正了最初
    358 吨的高估。该研究展示了机器学习在评估温室气体减排技术时，如何考虑真实的建筑条件和数据。


    文献[8]的作者进行了一项研究，他们使用回归克里金法开发了一个机器学习模型，用于对地球表面的辐射能通量进行分类。其目标是通过使用太阳能电池板来促进环境可持续性。该研究使用了多个输入因素和数据建模来评估环境可持续性，并进行了多次模拟以评估模型的有效性。结果表明，与其他方法相比，可持续性得到了显著改善。该研究展示了如何利用机器学习模型来推广可持续实践并减少环境影响。


    Piryonesi 和 El-Diraby 在文献[9]中提出了一项关于气候变化对基础设施影响的研究，他们采用机器学习来预测路面状况指数。在从长期路面性能（LTPP）数据库中提取的大量数据集上，测试了多种机器学习算法，包括
    `DT`、`k-NN`、`NB` 分类器、`RF` 和梯度提升树。随后，后三种算法达到了至少 90% 的最高准确率。模型属性被精心选择，以使其与气候压力因素（包括温度范围、蒸发量和冻融循环）相关联，从而使模型能够量化气候变化的影响。


    所提出的工具能够通过输入特定于每种气候情景的属性，来检验不同气候情景的影响。为了说明其实用性，该工具被用于评估两组道路（一组在安大略省，另一组在德克萨斯州）在两种不同气候情景下的劣化情况。分析显示，安大略省的道路劣化程度较低，而德克萨斯州的道路劣化情况加剧。这表明气候变化对道路劣化的影响因地点而异。


    在文献[10]中，Asadikia 等人展示了一种使用机器学习算法，根据可持续发展目标之间的协同特性对其进行优先级排序的技术。本文的主要目标是通过使用提升回归树模型（一种机器学习和数据挖掘技术）来发现可持续发展目标之间的协同作用。他们的研究说明了每个可持续发展目标如何对可持续发展目标指数的形成做出贡献，并进行了“假设”分析以理解这些目标得分的重要性。结果表明，他们的得分均高于
    60%，且可持续发展目标 3、4 和 7 表现出最高的协同性。这些研究发现可以指导决策者通过优先考虑具有高协同性的目标，来实施有效的策略和资源分配。


    文献[11]的作者提出并评估了几种机器学习模型的预测性能，这些模型包括 `DT`、`RF`、`k-NN` 和支持向量回归（SVR），用于预测地铁客流量，以实现可持续交通和环境，同时为可持续发展目标
    9、11、12 和 13 做出贡献。交通部门面临着长期且严重的拥堵，车辆排放的 `CO[2]` 占 25%，这些排放依赖于不可再生能源。可持续交通的创新解决方案需要使用计算技术来评估地铁交通系统，以实现可持续发展，从而减少
    `CO[2]` 排放。使用机器学习对测试数据进行预测的准确率分析如下：使用 `CART` 算法的 `DT` 为 87.4%，`k-NN` 为 84.4%，`SVR`
    为 69.7%。


    在文献[12]中，Rao 等人使用由 2 层神经元组成的机器学习算法 `ANN`，在减轻 `CO[2]` 排放影响的同时推广可再生能源的使用，以实现可持续发展目标
    7 和 13。根据机器学习结果，使用评估指标均方根误差（RMSE）和平均绝对百分比误差（MAPE）来衡量模型的误差。`MAPE` 值为 0.3，以百分比表示为
    30%。因此，预测使用清洁和可再生能源产生的 `CO[2]` 量的人工神经网络（ANN）模型的准确率为 70%。


    Sami 等人的研究[13]细致地比较了卷积神经网络（CNN）、支持向量机（SVM）、`RF` 和 `DT` 等机器学习和深度学习算法在自动化垃圾分类方面的准确性，这可以归类到可持续发展目标
    9 和 12 中的工业废物管理。模型的结果如下：`CNN` 提供了 90% 的高准确率，`SVM` 的准确率为 85%，`DT` 的准确率为 65%，`RF`
    的准确率为 55%。


    Liu 等人在文献[14]中的工作分析了可持续发展目标 8 和可持续发展目标 13 之间的相互联系，即气候行动可能对经济增长和社会就业产生协同效应和权衡取舍。使用
    `RF` 和极限梯度提升（XGB）等机器学习算法来捕捉气候变化对经济的影响。`XGB` 和 `RF` 模型的总体准确率分别确定为 78% 和 72%。


    Gaur 等人[15]评估了亚洲青年实现可持续发展目标的热情。提供了成功使用机器学习算法来突出他们对可持续未来看法的证据。在该研究中，使用了先前研究的构建模块，并对自适应神经模糊推理系统（ANFIS）和
    `RF` 模型在三个类别的可持续发展目标上的预测准确性进行了比较分析。考虑了亚洲和塞尔维亚青年之间对这些类别重要性可能存在的观点差异。数据收集自 425 名青年受访者。`ANFIS`
    比 `RF` 模型能更好地预测可持续发展目标。亚洲和塞尔维亚青年对可持续发展目标的偏好最高的是环境，其次是社会，最后是经济。


    Parvin 等人在文献[16]中研究了传统和智能控制方法，重点介绍了它们的分类、配置、特点、优缺点。研究了适用于能耗、舒适度管理和调度的不同优化目标和约束条件。概述了建筑能源管理中使用的优化算法的不同方法论，并批判性地解释了控制器和优化在可持续发展目标方面的贡献。建筑能源管理系统（BEMS）可以代表一种改善经济增长的可持续模型，与可持续发展目标
    9.1 相关联。此外，BEMS 有助于解决与可持续发展目标 13 相关的环境影响。在 BEMS 中，控制方法可分为传统方法和智能方法。然而，由于其基于设计的学习能力，智能方法更受青睐。在智能方法中，要么使用学习方法，要么使用基于模型的预测控制方法。学习方法包括混合方法、`ANN`
    和模糊系统。


    在 Ghaffarian 和 Emtehani 的研究[17]中，他们利用卫星图像和机器学习方法，对 2013 年菲律宾遭受超级台风海燕影响后，贫困城市地区在
    4 年期间的变化进行了监测。此类地区自然灾害的严重程度和影响显著增加，需要有效的减灾策略，这符合可持续发展目标 13 的要求。一种由局部二值模式特征提取模型支持的
    `SVM` 分类方法，最初在灾前和灾后图像中检测到了贫民窟区域。随后，一个密集条件随机场模型生成了最终的贫民窟区域地图。所开发的方法能够高精度地检测贫民窟区域。结果显示，该城市恢复到了灾前的脆弱性水平。


    文献[15]的研究比较了自适应神经模糊推理系统（ANFIS）和 `RF` 机器学习模型在三个类别的可持续发展目标（环境、社会和经济）上的预测准确性。`ANFIS`
    比 `RF` 模型能更好地预测可持续发展目标。亚洲和塞尔维亚青年对可持续发展目标的偏好最高的是环境支柱。

    '
- fmt: "## 4.3 Data Processing and Application Design\n\n### 4.3.1 Data Collection\
    \ Process and Description of Datasets\n\nWe gathered data from multiple sources\
    \ to create a diverse dataset that would be used to predict the amount of CO[2]\
    \ emissions and GHG emissions caused by the manufacturing sector in Mauritius.\n\
    \n- We gathered data on CO[2] emissions by sector and GHG emissions by sector\
    \ from the Our World in Data website. The dataset includes information for multiple\
    \ countries, sectors such as manufacturing, transportation and others, and years\
    \ from 1990 to 2019 [18] [19].\n- Furthermore, we have integrated population numbers\
    \ and annual GDP growth data in Mauritius from “The World Bank” website from 1990\
    \ to 2019. This step enabled us to understand the correlation between GDP and\
    \ CO[2] emissions, as well as greenhouse gas emissions originating from the manufacturing\
    \ sector in Mauritius [20] [21].\n\nAfter gathering these datasets, we extracted\
    \ information specific to Mauritius while eliminating the missing values and duplicates.\
    \ Subsequently, we merged and standardized the data into a unified dataset. Our\
    \ final dataset consists of 31 records, including population numbers, annual GDP\
    \ growth, CO[2] emissions, and greenhouse gas emissions for the manufacturing\
    \ industries, ranging from 1990 to 2019. The target is to predict the emissions\
    \ of CO[2] and greenhouse gas by manufacturing industries in Mauritius depending\
    \ on factors like the annual GDP growth and the population number.\n\nFigure [4-1](#625524_1_En_4_Chapter.xhtml#Fig1)\
    \ illustrates a snapshot of our dataset consisting of a few data points;\n\n![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1\n\nA few data points from our dataset\n\n### 4.3.2 Data Preprocessing\
    \ Steps\n\nIn the data preprocessing stage, the raw data is prepared and converted\
    \ to a suitable format before sending the data to the ML model. In the data that\
    \ we considered, there were some outliers that were manually removed. Through\
    \ data preprocessing, specific tasks such as data cleaning and manually removing\
    \ some outliers to increase the efficiency of the ML model. Additionally, only\
    \ a specific year range (1990 to 2019) has been considered since the parameters\
    \ seemed to have more coherent values for analysis.\n\nThe data preprocessing\
    \ stage has been split into the following stages.\n\n#### Stages of Data Preprocessing\n\
    \n- **Data cleaning:** In the combined CSV file, information about country, year,\
    \ population, annual GDP growth, amount of CO[2] emitted, and amount of GHG emitted\
    \ is available. Inaccurate, duplicated, or null values were detected a second\
    \ time to improve the quality of our work.\n- **Noisy data:** Noisy data refers\
    \ to unwanted data that in our case is information pertaining to other sectors\
    \ (other than the manufacturing sector). An outlier can also be a source of noisy\
    \ data and consequently has been removed.\n- **Missing data:** For some parameters,\
    \ data was missing. However, most ML algorithms do not handle missing values.\
    \ Among the several approaches available to deal with mission data from the dataset,\
    \ we visually identified the missing data due to the large attribute numerical\
    \ values. The removal of missing values will not largely impact the distribution\
    \ of the dataset. Some attributes had null values. However, we chose not to fill\
    \ missing values since filling missing values affects outliers’ analysis.\n\n\
    There were no structural errors in our dataset, including typos. The reason may\
    \ have been the numerical nature of the data. The data cleaning stage has been\
    \ successfully done manually since the disparities were clearly visible.\n\n####\
    \ Feature Selection and Removal of Attributes\n\nSelection of the most important\
    \ variables (features/attributes) with respect to the prediction variable has\
    \ been made at this stage.\n\nThe selected independent variables were population\
    \ size (million) and annual GDP growth (%), while the dependent variables were\
    \ CO[2] and GHG emissions (billion per tons) pertaining to manufacturing sector.\n\
    \n## 4.4 Program Structure for Analysis\n\nThe program structure of the ML models\
    \ used in this assignment provides a comprehensive exploration of regression techniques\
    \ to understand and predict CO[2] and GHG emissions. In our pursuit of sustainable\
    \ industrialization and climate mitigation concerning SDGs 9 and 13, we deployed\
    \ three distinct methodologies: SLR, MLR, and k-NN. Using HTML, websites were\
    \ displayed that performed tasks such as CSV file uploading, data parsing, regression\
    \ analysis, and data visualization using the following libraries:\n\n- `ml.js`\
    \ [22]\n\n  `ml.js` is a ML library used for ML tasks in JavaScript, providing\
    \ various ML algorithms and tools for data analysis.\n\n- `Papaparse.js` [23]\n\
    \n  `PapaParse` is a powerful multithreaded CSV parsing library that runs on web\
    \ pages that parse files on the local system. It converts it into structured data\
    \ that can be easily used for analysis.\n\n- `Plotly.js` [24]\n\n  `Plotly.js`\
    \ is a high-level, declarative charting library used for creating interactive\
    \ and visually appealing data visualizations such as plots and 2D and 3D charts.\n\
    \n- `Math.js` [25]\n\n  `math.js` is an extensive mathematics library for JavaScript\
    \ that allows you to perform various mathematical operations, including algebra,\
    \ calculus, linear algebra, and matrices.\n\nNote that all the code of this chapter\
    \ is found in the folder `Chapter 4 – Codes` hosted on the GitHub page of this\
    \ book. Figure [4-2](#625524_1_En_4_Chapter.xhtml#Fig2) shows the program structure\
    \ of the HTML files with each ML algorithms functions’ and interconnections’.\n\
    \n![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig2_HTML.jpg)\n\nFigure 4-2\n\
    \nProgram structure\n\nFigure [4-3](#625524_1_En_4_Chapter.xhtml#Fig3) illustrates\
    \ the general layout of the MLR website. The ML algorithms, namely, SLR and k-NN,\
    \ adhere to the same general layout showcased in Figure [4-2](#625524_1_En_4_Chapter.xhtml#Fig2).\n\
    \n![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig3_HTML.jpg)\n\nFigure 4-3\n\
    \nGeneral layout of web application\n\nTable [4-1](#625524_1_En_4_Chapter.xhtml#Tab1)\
    \ describes all the functions and methods for each SLR, MLR, and k-NN regression\
    \ algorithm.\n\nTable 4-1\n\nFunctions and Methods: SLR, MLR, and k-NN Algorithm\n\
    \n| Methods | Description |\n| --- | --- |\n| `FileReader()` | Creates an object\
    \ to read the content of a file |\n| `reader.onload(){}` | Event listener for\
    \ successful loading of file |\n| `Papa.parse()` | Reads the CSV file chosen from\
    \ the local directory |\n| `parseFloat()` | Converts the value in the CSV file\
    \ in floating point numbers |\n| `array.push()` | Extracts the raw data values\
    \ and populates them in arrays |\n| `document.getElementById()` | Returns an element\
    \ object representing the element whose ID matches the specified string |\n| `Math.sqrt()`\
    \ | Uses the `Math.js` library to perform square root operation |\n| `ML.SimpleLinearRegression()`\
    \ | Creates a model for simple linear regression |\n| `regression.predict()` |\
    \ Uses the SLR model to predict the values of CO[2]/GHG based on the user’s provided\
    \ input values |\n| `ML.MultivariateLinearRegression()` | Creates a model for\
    \ multiple linear regression |\n| `mlr.predict()` | Uses the MLR model to predict\
    \ the values of CO[2]/GHG based on the user’s provided input values |\n| `ML.KNN()`\
    \ | Creates a model for k-NN |\n| `knn.predict()` | Uses the k-NN model to predict\
    \ the values of CO[2]/GHG based on the user’s provided input values |\n| `Math.abs()`\
    \ | Returns the absolute value of the MAPE |\n| `Plotly.newPlot()` | Generates\
    \ 3D scatter plots for the original dataset and predicted CO[2] and GHG emissions\
    \ |"
