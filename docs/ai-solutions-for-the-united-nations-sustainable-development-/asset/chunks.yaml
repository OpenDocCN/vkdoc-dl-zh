- fmt: '### 1.3.2 Polynomial Regression (PLR)


    `PLR` extends the concept of `SLR` to situations where predictors may be more
    accurately related to their responses using a polynomial function. In other words,
    `PLR` is preferred when the relationship between the predictor and the response
    are curvilinear. The simple linear regression model may be modified by adding
    polynomial terms to obtain the polynomial regression model as follows [46]:


    ![$$ y={\beta}_0+{\beta}_1x+{\beta}_2{x}^2+{\beta}_3{x}^3+\dots +{\beta}_n{x}^k+\varepsilon
    $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ7.png)


    (1.7)


    Where,


    - `y` is the dependent variable.

    - `β[0]` is the Y-intercept.

    - `k` is the order of the polynomial (highest degree).

    - `β[1]` is the `β[2]`, `β[3]`,…, `β[n]` coefficients.

    - `x` is the independent variable.

    - `ε` is the error.


    The regression line can be obtained using the least square method, which requires
    solving a system of linear equations in the following form [46]:


    ![$$ \left[N\ {\sum}_{i=1}^N{x}_i\dots {\sum}_{i=1}^N{x_i}^k\ {\sum}_{i=1}^N{x}_i\
    {\sum}_{i=1}^N{x_i}^2\dots {\sum}_{i=1}^N{x_i}^{k+1}\vdots \vdots \vdots \vdots
    {\sum}_{i=1}^N{x_i}^k\ {\sum}_{i=1}^N{x_i}^{k+1}\dots {\sum}_{i=1}^N{x_i}^{2k}\
    \right]\left[{\beta}_0\ {\beta}_1\vdots {\beta}_k\ \right]=\left[{\sum}_{i=1}^N{y}_i\
    {\sum}_{i=1}^N{x}_i{y}_i\vdots {\sum}_{i=1}^N{x_i}^k{y}_i\ \right] $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ8.png)


    (1.8)


    Two versions of a JavaScript implementation of `PLR` will be provided whereby
    the first version allows users to enter values directly on the web page for prediction,
    while the second version allows users to upload a dataset for prediction.


    When the application is run, the user will have to populate the input fields,
    and when the `Read Data and Analyse` button is click, the outputs shown in Figure
    [1-17(a)](#625524_1_En_1_Chapter.xhtml#Fig19) are displayed.


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig19_HTML.jpg)


    Figure 1-17(a) Inputs and outputs for PLR version 1


    The regression curve alongside the dataset and predicted point are shown in Figure
    [1-17(b)](#625524_1_En_1_Chapter.xhtml#Fig19).


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig20_HTML.jpg)


    Figure 1-17(b) Regression curve for the PLR version 1


    For the second version of the `PLR` implementation, the dataset is obtained from
    a CSV file named `Regression_Weather.csv`. Part of this dataset is shown in Table
    [1-3](#625524_1_En_1_Chapter.xhtml#Tab3).


    The next listing, i.e., Listing 1-5(b), is similar to Listing 1-3(c), which shows
    the reading of the data from the CSV file. Moreover, Listings 1-5(c) and 1-5(d)
    are equivalent to Listings 1-4(d) and 1-4(e), respectively.


    When the application is run, the user will have to enter the number of rows to
    display from the dataset and browse the CSV file. When the `Display Data and Analyse`
    button is clicked, the outputs shown in Figure [1-18(a)](#625524_1_En_1_Chapter.xhtml#Fig21)
    are displayed.


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig21_HTML.jpg)


    Figure 1-18(a) Inputs and outputs for PLR version 2


    The application also outputs the equation of the line, the `MAPE`, and the graph
    of the dataset and regression line with the predicted point, as shown in Figure
    [1-18(b)](#625524_1_En_1_Chapter.xhtml#Fig21).


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig22_HTML.jpg)


    Figure 1-18(b) MAPE and graph for PLR version 2


    ### 1.3.3 Multiple Linear Regression (MLR)


    `MLR` is a statistical technique that helps us understand how several independent
    variables influence a dependent variable. It is an extension of simple linear
    regression (`SLR`), which examines only a single independent variable. By analyzing
    multiple variables, `MLR` can make more accurate predictions and forecasts. For
    example, `MLR` may be used to forecast the CO[2] emissions of a car depending
    on its engine size and the number of cylinders available.


    The following are some key characteristics of `MLR`:


    - The dependent variable or output (`Y`) should be a continuous or real value,
    while the independent variables or predictors can take continuous or categorical
    values.

    - A linear relationship exists between the independent variables and the dependent
    variable.

    - `MLR` endeavours to establish a regression line within a multidimensional dataset.


    The multiple linear regression model can be expressed as follows [46]:


    ![$$ Y={\beta}_0+{\beta}_1{X}_1+{\beta}_2{X}_2+\dots +{\beta}_k{X}_k+\varepsilon
    $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ9.png)


    (1.9)


    Where,


    - `y` denotes the dependent variables or output.

    - `k` denotes the number of predictors available in the model.

    - `X[1], X[2], …, X[k]` represent the independent variables.

    - `β[0]` denotes the y-intercept (constant term) of the regression line.

    - `β[1], β[2], …, β[k]` represent the slope coefficients of each independent variable.

    - `ε` represents the error term in the model that occurs between the predicted
    value of `Y` and its actual value.


    The primary objective of performing `MLR` is to determine the coefficients (`β[0],
    β[1], β[2], …, β[k]`) that reduce the sum of squared differences between the observed
    values of the dependent variable and the values predicted by the linear equation.
    This approach is known as the least squares method [46]. The model can also be
    written in the following matrix form as follows:


    `y = Xβ + ε` (1.10)


    Where,


    - `β = {β_0, β_1, …, β_(k-1)}''`.


    The design matrix `X` is built in the following form:


    ![$$ X=\left[1\ {x}_{1,1}\ {x}_{1,2}\dots {x}_{1,k-1}\ 1\ {x}_{2,1}\ {x}_{2,2}\dots
    {x}_{2,k-1}\vdots \vdots \vdots \vdots \vdots 1\ {x}_{n,1}\ {x}_{n,2}\dots {x}_{n,k-1}\
    \right] $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ10.png)


    (1.11)


    Where,


    - `n` is the total number of observations.


    An estimate of the `β` matrix, `β̂`, can be obtained using the following equation:


    ![$$ \hat{\beta}={\left({X}^{\prime }X\right)}^{-1}{X}^{\prime }y $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ11.png)


    (1.12)


    Two versions of a JavaScript implementation of `MLR` will be provided whereby
    the first version allows users to enter values directly on the web page for prediction,
    while the second version allows users to upload a dataset for prediction.


    When the application is run, the user will have to populate the input fields,
    and when the `Read Data and Analyse` button is clicked, the outputs shown in Figure
    [1-19(a)](#625524_1_En_1_Chapter.xhtml#Fig23) are displayed.


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig23_HTML.jpg)


    Figure 1-19(a) Inputs and outputs for PLR version 1


    The regression plots are shown in Figure [1-19(b)](#625524_1_En_1_Chapter.xhtml#Fig23).


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig24_HTML.jpg)


    Figure 1-19(b) Regression plots of MLR version 1


