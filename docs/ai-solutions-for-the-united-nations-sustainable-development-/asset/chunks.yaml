- fmt: '### 6.3.4 Implementation of Linear Regression


    The `predLin()` function is used to perform linear regression for each air pollutant.
    It takes as input the dependant variable, which consists of the values of the
    air pollutant, the independent variable that is the recorded timestamps, and the
    prediction time in seconds. The `SimpleLinearRegression()` function from the `ML.js`
    library is used to create the regression model. The `predict()` function is then
    called to obtain the prediction before it is returned. The pseudocode for the
    implementation of the `predLin()` function is shown here:


    ```

    Function predLin (x, y, xtarget)

    Create Linear regression model

    Get prediction from model

    Return prediction

    End

    ```


    The `predLinAll()` function is used to perform linear regression for each air
    pollutant on the entire dataset. The `SimpleLinearRegression()` function is used
    to create the regression model. Each entry in the dataset is predicted using the
    `predict()` function by iterating over the entire dataset. The pseudocode for
    the implementation of the `predLinAll()` function is shown here:


    ```

    Function predLinAll (x, y)

    Create Linear regression model

    For i in range x:

    Get prediction for each entry in dataset

    End

    Return predictions

    End

    ```


    ### 6.3.5 Implementation of Polynomial Regression


    The `predPoly()` function is used to perform polynomial regression. It takes as
    input the dependent variable, independent variable, and prediction time. The 5th-degree
    polynomial regression is used. The regression model is then created using the
    `PolynomialRegression()` function from the `ML.js` library. The prediction at
    the prediction time is obtained using the `predict()` function. The prediction
    is then returned. The pseudocode for the implementation of the `predPoly()` function
    is shown here:


    ```

    Function predPoly (x, y, xtarget)

    Set polynomial degree to 5

    Create polynomial regression model

    Get prediction from model

    Return prediction

    End

    ```


    The `predPolyAll()` function is used to perform polynomial regression on the entire
    dataset. The polynomial degree is set to 5. The `PolynomialRegression()` function
    is then used to create the regression model. Each entry in the dataset is predicted
    using the `predict()` function by iterating over the entire dataset. The predictions
    are then returned as shown by the following pseudocode:


    ```

    Function predPolyAll (x, y)

    Set polynomial degree to 5

    Create polynomial regression model

    For i in range x:

    Get prediction for each entry in dataset

    End

    End

    ```


    ### 6.3.6 Implementation of LSTM/MLP


    ```

    MLP / LSTM Regression Algorithm

    Obtain window size from number of prediction days

    Create Perceptron / LSTM Object from Neataptic library

    Create sliding window for window-sized steps prediction

    Store all normalised input and output data in a 2D array

    Train the model with training data array and parameters

    Obtain prediction and de-normalised value

    Calculate MAPE.

    End

    ```


    ### 6.3.7 Displaying Regression Graphs


    The `plot()` function is used to display the original data, the regression graphs,
    and the predicted value at the prediction time. It takes as input the original
    data, the predicted data points for linear regression, MLR and polynomial regression,
    and the container for the plot. The timestamps are converted to days and shifted
    to begin at 0 days. Traces are created to contain the data points for the original
    data, linear regression, MLR, polynomial regression, and the predicted value at
    the prediction time in the y-axis. In the x-axis, the timestamps in days are used.
    In the layout, the unit and the title are set. The `newPlot()` function from the
    `Plotly.js` library is then used to display the traces in the container. The pseudocode
    for the implementation of the `Plot()` function is shown here:


    ```

    Function Plot()

    Convert timestamps to days and shift to zero

    Create trace for original data

    Create trace for linear regression

    Create trace for polynomial regression

    Create trace for LSTM

    Create trace for MLP

    Create a SimpleLinearRegression / PolynomialRegression 3rd/5th Order Object from
    the ML library.

    Create an LSTM/MLP Object from the ML library

    Set unit and title of layour

    Calculate MAPE.

    End

    ```


