    `隐藏层数量 = 1` `隐藏层节点数 = 24 x 预测天数` |


    图 6-13 展示了 `MLP` 算法中 `PM10` 浓度随时间变化的曲线图。


    ![](img/625524_1_En_6_Fig13_HTML.jpg)


