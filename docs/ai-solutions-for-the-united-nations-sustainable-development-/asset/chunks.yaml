    表 6-6


    `MLP` 算法的 `MAPE` 值


    | 地点/空气污染物 | 路易港 | 大湾 | 卡特勒博尔讷 | 博巴森 | 弗拉克 | 平均值 |

    | --- | --- | --- | --- | --- | --- | --- |

    | `O[3]` | 1.89 | 1.51 | 2.88 | 2.12 | 1.56 | 1.99 |

    | `CO` | 1.33 | 1.19 | 1.71 | 1.84 | 1.32 | 1.48 |

    | `PM[10]` | 2.35 | 1.73 | 2.12 | 2.89 | 2.45 | 2.31 |

    | `PM[25]` | 1.57 | 2.72 | 2.15 | 1.78 | 2.01 | 2.05 |


    选择 `MLP` 算法是因为它能够学习输入和输出变量之间复杂的非线性关系。它也是一个通用逼近器，能够逼近任何连续函数。从表 6-6 获得的结果来看，`MAPE`
    值在 1.48% 到 2.31% 之间变化。`CO` 浓度的 `MAPE` 最低，为 1.48%。


    ### 6.4.6 LSTM 算法的性能


    表 6-7 展示了 `LSTM` 算法的超参数。


    表 6-7


    `LSTM` 算法的超参数


    | 算法 | 超参数 |

    | --- | --- |

    | `LSTM` | `窗口大小 = 24 x 预测天数` `迭代次数 = 500` `学习率 = 0.001` `动量 = 0.9` `误差 = 0.0001`
    `清除 = True` `隐藏层数量 = 1` `隐藏层节点数 = 24 x 预测天数` |


    图 6-14 展示了 `LSTM` 算法中 `PM10` 浓度随时间变化的曲线图。


    ![](img/625524_1_En_6_Fig14_HTML.jpg)


    图 6-14


    `LSTM` 算法的 Web 应用输出


    表 6-8 展示了 `LSTM` 算法获得的 `MAPE` 值。


    表 6-8


    `LSTM` 算法的 `MAPE` 值


    | 地点/空气污染物 | 路易港 | 大湾 | 卡特勒博尔讷 | 博巴森 | 弗拉克 | 平均值 |

    | --- | --- | --- | --- | --- | --- | --- |

    | `O[3]` | 1.67 | 1.50 | 2.32 | 1.55 | 1.78 | 1.76 |

    | `CO` | 1.22 | 0.96 | 0.99 | 1.45 | 1.37 | 1.20 |

    | `PM[10]` | 2.34 | 1.43 | 2.65 | 1.89 | 1.22 | 1.91 |

    | `PM[25]` | 1.67 | 1.58 | 2.04 | 2.22 | 1.83 | 1.87 |


    选择 `LSTM` 算法是因为它非常适合捕捉序列数据中的时间依赖性和模式。在输入数据顺序很重要的回归任务中，例如时间序列数据，`LSTM` 可以对观测值之间的时间关系进行建模。表
    6-8 获得的结果显示，`MAPE` 值在 1.20% 到 1.91% 之间变化。`CO` 浓度的 `MAPE` 最低，为 1.20%。


    ### 6.4.7 分类算法的性能


    通过计算从十个选定地点中选出的五个地点的准确率并取平均值，评估了 `KNN`、决策树和随机森林算法根据空气污染物量预测 `AQI` 的性能。使用的样本量为
    720，相当于 30 天。表 6-9 展示了每种算法获得的准确率。


    表 6-9


    分类算法的准确率


    | 算法 | 准确率 (%) |

    | --- | --- |

    | `KNN` | 84.3 |

    | `DT` | 99.5 |

    | `RF` | 98.9 |


    从表 6-9 获得的结果可以看出，决策树和随机森林的准确率最高，分别为 99.5% 和 98.9%。`KNN` 的表现最差，准确率为 84.3%。决策树和随机森林对噪声数据和异常值更鲁棒，因此在分类
    `AQI` 方面比 `KNN` 更好。此外，`KNN` 更容易过拟合，尤其是在数据集较小的情况下。


    机器学习可用于准确预测空气污染物水平并对 `AQI` 进行分类，这有助于确定工程活动对空气质量的长期影响。这有助于制定新的战略和政策来改善公众的空气质量，为全球实现可持续发展目标
    3 和 13 做出贡献。

