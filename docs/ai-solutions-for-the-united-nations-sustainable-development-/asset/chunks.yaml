    ### 6.4.7 Performance of Classification Algorithms


    The performance of the `KNN`, decision tree, and random forest algorithms for
    predicting the `AQI` based on the amount of air pollutants was evaluated by calculating
    the accuracy for five locations out of the ten selected ones and taking the average
    values. A sample size of 720, which is equivalent to 30 days was used. Table [6-9](#625524_1_En_6_Chapter.xhtml#Tab9)
    shows the accuracy obtained for each algorithm.


    Table 6-9


    Accuracy for Classification Algorithms


    | Algorithm | Accuracy (%) |

    | --- | --- |

    | `KNN` | 84.3 |

    | `DT` | 99.5 |

    | `RF` | 98.9 |


    From the results obtained in Table [6-9](#625524_1_En_6_Chapter.xhtml#Tab9), it
    can be observed that decision tree and random forest have the highest accuracies
    of 99.5% and 98.9%, respectively. `KNN` performed the least with an accuracy of
    84.3%. Decision tree and random forest are more robust to noisy data and outliers,
    making it better at classifying `AQI` than `KNN`. Moreover, `KNN` is more susceptible
    to overfitting especially with small dataset.


    Machine learning can be used to accurately predict air pollutant levels and categorize
    the `AQI`, which can be helpful to determine the long-term impacts of engineering
    activities on air quality. This can help to formulate new strategies and policies
    to improve the air quality for the public, contributing to the global achievements
    of SDGs 3 and 13.'
