    #### Clustering Worldwide Internet Connectivity Development


    This section focuses on the process of clustering global Internet connectivity
    development. The objective of this procedure is to classify countries into five
    separate clusters according to their degree of Internet connectivity. Each cluster
    signifies a distinct phase or level of Internet advancement, which could be in
    the form of Internet access infrastructure, and takes into account both mobile
    and broadband subscriptions. The following are the five tiers of Internet connectivity
    that the application aims to determine:


    1. **Underdeveloped**: Countries categorized in this cluster demonstrate the lowest
    levels of Internet penetration and infrastructure development. They do not have
    extensive availability of the Internet, and its utilization may be restricted
    to urban regions or particular demographic categories.

    2. **Emerging**: This cluster comprises countries where Internet usage is in the
    early stages of becoming mainstream but has not yet achieved widespread adoption.
    These nations might have undergone recent advancements in internet connectivity,
    propelled by factors like economic progress or governmental initiatives.

    3. **Developing**: Nations that have made substantial progress in augmenting Internet
    facilities and accessibility fall in this category. The rates of Internet penetration
    are moderate, and access is increasingly becoming more prevalent.

    4. **Developed**: Developed nations possess robust Internet systems and exhibit
    significant levels access. Internet connectivity is widespread in both urban and
    rural areas, and its usage is deeply ingrained in various facets of everyday life,
    such as education, commerce, and communication.

    5. **Highly Developed**: This cluster represents countries with the most advanced
    Internet connectivity and infrastructure. These countries typically boast high-speed
    broadband networks, widespread access to digital technologies, and a thriving
    digital economy.


    With a world map depicting countries with varying Internet connectivity categories,
    users can analyze the disparities in its adoption and ecosystems across various
    regions. This analysis is beneficial to policy makers, researchers, and stakeholders,
    helping them to identify patterns, obstacles, and prospects for enhancing the
    global reach of the Internet and work toward digital inclusion.


    ### 7.3.5 Application Layout


    For this application, a single window contains all the components that facilitate
    the K-means clustering process, where the dataset is first input using the Browse
    button, before clicking Generate Clusters. The latter starts the process in the
    background before plotting the world map. The user can adjust the slider to select
    the exact year ranging from 1980 to 2020. On doing so, the colour indicators in
    the world map change according to their clustered Internet connectivity development.
    As a result, the user can draw certain conclusions in terms of worldwide Internet
    communications and infrastructure. The completed application is shown in Figure
    [7-11](#625524_1_En_7_Chapter.xhtml#Fig11).


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig11_HTML.jpg)


    **Figure 7-11** Web application layout'
