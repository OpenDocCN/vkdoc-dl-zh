    \ and treatment, stepping up the prevention and treatment of substance abuse,\
    \ and ensuring universal access to sexual and reproductive health services [14].\
    \ However, the worldwide threats from pandemics like COVID-19 have emphasized\
    \ the pressing requirement for readiness. The UNDP emphasized the contrasting\
    \ capabilities of nations to cope with the COVID-19 problem. Investments in vital\
    \ public services and health emergency preparation witnessed a turning point in\
    \ the 21st century due to the pandemic.\n\n    The following are some of the targets\
    \ by 2030:\n    *   To decrease the global maternal mortality rate to less than\
    \ 70 for every 100,000 live births.\n\n    *   To eliminate the death of newborns\
    \ and children younger than 5 years old. The aims of all nations are to lower\
    \ neonatal mortality to at least 12 per 1,000 live births and under-5 mortality\
    \ to at least 25 per 1,000 live births.\n\n    *   To significantly lower the\
    \ number of fatalities and diseases caused by contaminated air, toxic chemicals,\
    \ water, and soil.\n\n    With regard to the application of ML to help achieve\
    \ this SDG, in [15], the use of the deep learning approach (DLA) in medical image\
    \ analysis has emerged as a rapidly advancing research domain where DLA is extensively\
    \ applied in medical imaging to discern the presence or absence of diseases. This\
    \ work focused on the evolution of artificial neural networks and conducted an\
    \ extensive examination of DLA, which exhibits promising applications within the\
    \ realm of medical imaging. Moreover, in the work carried out in [16], an approach\
    \ for distinguishing autism traits using machine learning was presented. An existing\
    \ prediction model was enhanced by combining two different algorithms, namely,\
    \ CART and ID3 within random forest.\n\n*   **SDG 6: Clean Water and Sanitation**\n\
    \n    SDG 6 holds a pivotal role within the United Nation’s 2030 Agenda for Sustainable\
    \ Development [17]. It makes sure that there is a worldwide commitment to ensure\
    \ that everyone has access to safe and affordable drinking water and sanitation\
    \ by the year 2030\\. SDG 6 addresses several significant challenges. First, it\
    \ focuses on ensuring access to safe and uncontaminated potable water, acknowledging\
    \ that billions of individuals globally still lack this fundamental necessity.\
    \ Second, it places emphasis on sanitation by aiming to eradicate open defecation\
    \ and ensuring proper wastewater treatment to prevent water pollution.\n\n   \
    \ Machine learning, especially k-Nearest Neighbors (k-NN) can serve as a valuable\
    \ tool in confronting these challenges. k-NN is a supervised learning algorithm\
    \ that can be utilized for classification and regression tasks. It has pertinent\
    \ applications within the context of SDG 6:\n    *   **Monitoring** **water quality****:**\
    \ k-NN can be employed to scrutinize data on water quality collected from various\
    \ sources such as sensors and monitoring stations. This analysis aids in identifying\
    \ patterns and irregularities in water quality, facilitating early detection of\
    \ contamination or pollution incidents.\n\n    *   **Proactive maintenance:**\
    \ Machine learning algorithms such as k-NN can predict when maintenance or repair\
    \ is needed for water infrastructure. This proactive approach ensures that there\
    \ is an interrupted provision of clean water.\n\n    In [18] researchers addressed\
    \ SDG 6 by exploring AI-driven water quality anomaly detection (WQAD). They conducted\
    \ an extensive review of ML and deep learning (DL) applications in smart water\
    \ systems. Additionally, in [19] the study contributed to SDG 6 by using machine\
    \ learning to forecast Escherichia coli (E. coli) contamination in Ethiopian drinking\
    \ water sources. They employed risk mapping algorithms like Random Forest (RF)\
    \ and Extreme Gradient Boosting (XGBoost), combining geographical and household\
    \ data. Furthermore, the work in [20] employed machine learning, specifically\
    \ a modified Faster R-CNN (convolutional neural network), to detect and categorize\
    \ algae in water, addressing both SDGs 6 and 14\\. Manually identifying diverse,\
    \ microscopic algae is time-consuming and error-prone. In [21], the work indirectly\
    \ supported SDGs 3 and 6 by using machine learning to predict water quality, a\
    \ critical aspect of ensuring access to safe drinking water. It focused on classifying\
    \ water as potable or nonpotable, vital for public health. Effective algorithms\
    \ like Support Vector Machine (SVM) and k-NN achieved high F1-scores and accuracy.\n\
    \n*   **SDG 7 – Affordable and Clean Energy**\n\n    Implementing renewable energy\
    \ options is becoming increasingly affordable and reliable and is therefore a\
    \ prospective solution to ensure sustainability. Our heavy dependence on unrenewable\
    \ sources such as fossil fuels is not only harmful to the environment but also\
    \ leaves future generations with limited options to carry out their activities.\
    \ The main objective of this SDG is to reach accessible, eco-friendly, and sustainable\
    \ energy for all. Despite that energy holds an important position in both environmental\
    \ and economic aspects, one-fifth of the global population still did not have\
    \ access to electricity in 2021 [22]. There are several targets that should be\
    \ met to achieve this SDG and some of them are listed here:\n    *   **Target\
    \ 7.1 – To ensure that everyone across the globe is able to access state-of-the-art\
    \ and reliable energy services by 2030.**\n\n        As stated in [22], 1 out\
    \ of 10 people do not have access to electricity to fulfil basic requirements.\
    \ It is also stated that around 2.6 billion people make use of biomass energy\
    \ resources such as charcoal, coal and animal waste; 80% of countries globally\
    \ do not have access to green energy. The SDGs can be achieved by making use of\
    \ greener energy alternatives. SDG 7.1 aims at closing those energy gaps by 2030.\n\
    \n    *   **Target 7.2 – Focus on** **clean energy technologies** **and energy\
    \ sources to increase the use of renewable energy for daily purposes by 2030.**\n\
    \n        SDG 7.2 aims to encourage more countries in approaching renewable energy\
    \ methods. It is stated in [22] that around 17% of the world’s energy consumption\
    \ comes from renewable sources. Industries across the world have started investing\
    \ in sustainable resources that aim at producing green energy and causing less\
    \ harm to the planet.\n\n    *   **Target 7.3 – Increase** **global energy efficiency**\
    \ **by twofold and improve international cooperation to facilitate access to renewable\
    \ energy services by 2030.**\n\n        It aims at improving the ratio of the\
    \ total energy output to the energy input into a system producing energy. This\
    \ can be done by minimizing the total amount of waste, by improving the technologies\
    \ involved and by approaching sustainable approaches. Target 7.3 aims at doubling\
    \ the rate at which energy is being now by 2030.\n\n    By employing machine learning\
    \ algorithms on historical turbine data and weather forecasts on a 700 megawatts\
    \ wind power grid, DeepMind and Google could generate 36-hour forecasts of the\
    \ wind power output, thus promoting SDG 7\\. It was thus possible to optimally\
    \ plan the hourly delivery commitments to the power grid, one day in advance.\
    \ A 20 % gain in wind energy management was obtained with this scheme compared\
    \ to a conventional system that does not take into consideration the predicted\
    \ wind power output [23].\n\n*   **SDG 9: Industry, Innovation, and Infrastructure**\n\
    \n    This SDG targets the setting up of durable infrastructure, support inclusive\
    \ and sustainable industrialization and foster innovation as per the motto of\
    \ the United Nations [24]. Investment in infrastructure and innovation are essential\
    \ for economic growth and development while also improving and expanding new industries\
    \ and infrastructure, especially in developing countries. Moreover, SDG 9 accounts\
    \ for the advancement of economic growth by creating employment opportunities,\
    \ promoting sustainable development such as energy-efficiency and sustainable\
    \ industries, and investing in scientific research and innovation.\n\n    Some\
    \ key targets and areas of focus are as follows:\n    *   Developing reliable,\
    \ sustainable, and resilient infrastructure affordable and accessible to all\n\
    \n    *   Promoting inclusive and sustainable industrialization to increase the\
    \ employment and GDP rate\n\n    *   Expanding access to financial resources,\
    \ particularly for small and medium-sized enterprises (SMEs) in developing countries\n\
    \n    *   Upgrading industries to employ resilient, sustainable, and environment-friendly\
    \ resources\n\n    *   Promoting research and development, technological advancement,\
    \ and innovation to drive economic growth and find solutions to global challenges\
    \ [25]\n\n    In [26], the impact of digitization to achieve SDGs was studied\
    \ by focusing on the competitiveness of the Ha’il region of Saudi Arabia. An ML\
    \ technique, a vector auto-regressive model, and impulse response functions were\
    \ used. Results suggested that digitization promoted a rise in sustainable development\
    \ of the Ha’il region, mainly SDG 9, which pertains to industry, innovation, and\
    \ infrastructure. In [27], the opportunities offered by the acceleration of the\
    \ Internet of Things (IoT) and advances in AI in reaching SDGs, related to health,\
    \ energy, and cities have been studied. A system model combining IoT and AI to\
    \ facilitate mobility in cities, thus targeting SDGs 9, 11, and 13, was proposed.\n\
    \n*   **SDG 11: Sustainable Cities and Communities**\n\n    This SDG aims to build\
    \ safe, sustainable, inclusive, and resilient cities and human habitats [28].\
    \ Technological advances are expected to have a major impact on smart cities.\
    \ According to the UN, by 2050, smart cities will accommodate nearly 66% of the\
    \ world’s population [29]. Socio-economic concerns in areas such as energy, healthcare,\
    \ and security are being addressed by countries where fast-growing urban areas\
    \ are being converted into smart cities.\n\n    Real-time location, video, and\
    \ biometric data analysis can be achieved by combining AI with the ultra-reliable\
    \ 5G networks. Self-driving cars are also an outcome of the combination of ultra-fast\
    \ 5G networks with AI. Furthermore, high-resolution surveillance cameras can be\
    \ connected to cloud-based facial recognition systems to recognize and spot potential\
    \ law breakers in real time [30].\n\n*   **SDG 12: Responsible Consumption and\
    \ Production**\n\n    SDG 12 promotes the reduction of chemical usage and waste\
    \ generation in industries. This activity relates to water treatment and testing\
    \ processes. By optimizing chemical usage and minimizing waste generation, water\
    \ treatment processes can be carried out more effectively and in an environment\
    \ friendly manner [31].\n\n    In water potability testing, the SDG 12 ensures\
    \ efficient use of water resources by verifying the safety of water for consumption\
    \ purposes. In addition, the water potability testing aids in analyzing the environmental\
    \ impacts of water treatment and ensures that these treatments are eco-friendly.\
    \ Water potability testing can be improvised by the use of innovative technologies\
    \ such as sensor networks, IOT, and machine learning. This improves the accuracy\
    \ and efficiency of testing.\n\n    SDG12 emphasizes on managing water resources\
    \ and assure safe and clean drinking water for the public. The purpose of this\
    \ SDG is to promote a sustainable means of consumption and production whereby\
    \ resources are widely being used. This objective can be achieved by minimizing\
    \ the ecological footprint. This meets the consumption needs of people without\
    \ exploiting the natural resources and without causing harm to the environment\
    \ such as discharge of toxic chemicals in water, air, or land.\n\n    Again, machine\
    \ learning can prove to be very efficient in achieving SDG 12\\. For example,\
    \ in [32], short-term water demand was predicted, and pumping schedules were optimized\
    \ to reduce electricity costs by optimizing water supply systems through machine\
    \ learning.\n\n*   **SDG 13 – Climate Action**\n\n    SDG 13 aims to alleviate\
    \ the impact of climate change by decreasing greenhouse gas emissions, improving\
    \ resilience to climate-related disasters, and promoting sustainable practices.\
    \ SDG 13 recognizes that climate change poses significant threats to ecosystems,\
    \ economies, and communities worldwide, emphasizing the need for immediate and\
    \ coordinated efforts to protect the planet for a sustainable and climate-resilient\
    \ future [1, 2].\n\n    Some of their targets are as follows:\n    *   To increase\
    \ global adaptability and immunity to climate-related threats and natural disasters\n\
    \n    *   To add climate change mitigation actions in national planning, strategy,\
    \ and policies\n\n    *   To increase educational and awareness campaigns on climate\
    \ change, institutional and human capacity for impact reduction, early warning,\
    \ and adaptation\n\nSome ML techniques that have been used for SDG 13 include\
    \ the work in [33] in which the authors proposed a real-time multistep multi-output\
    \ multivariate ML model to forecast the concentrations of the different air pollutants\
    \ in Ho Chi Minh City (HCMC), which is located in Vietnam. The model proposed\
    \ by the authors took as input various parameters, including meteorological conditions\
    \ and air quality data from urban, residential, and industrial areas as well as\
    \ hourly NO[2], SO[2], O[3], and CO concentrations. The concentration of each\
    \ air pollutant was predicted using the proposed model, and the results demonstrated\
    \ that the Mean Absolute Percentage Error (MAPE) value obtained, when predicting\
    \ the concentration of each pollutant, ranged from 0.18 to 0.23\\. Moreover, in\
    \ [34], deprived urban areas in Philippines were monitored over a four-year period,\
    \ following the impact of 2013’s super Typhoon Haiyan. Both satellite imagery\
    \ and ML methods were employed for the purpose. Due to the increase in gravity\
    \ and impact of natural disasters in such areas, effective disaster risk mitigation\
    \ strategies are required. A support vector machine classification technique supported\
    \ by a local binary pattern feature extraction model initially detected slum areas\
    \ in pre- and post-disaster imageries. Afterward, a dense conditional random fields\
    \ model produced final slum areas maps. The developed method detected slum areas\
    \ with high accuracy. The results revealed that the city returned to the pre-existing\
    \ vulnerability level."
  trans: "\n# 1.1 联合国可持续发展目标与机器学习\n\n可持续发展目标（SDGs）由联合国大会于 2015 年在里约热内卢举行的联合国可持续发展会议上通过第\
    \ 70/1 号决议制定，作为《2030 年可持续发展议程》的一部分。联合国可持续发展目标（UNSDG）由 193 个国家组成，旨在创造更美好的未来和更高的生活质量。SDGs\
    \ 的制定是为了应对环境、经济和政治领域紧迫的全球挑战。这些目标取代了 2000 年启动的、旨在减少贫困的千年发展目标（MDGs）。SDGs 在 MDGs\
    \ 的基础上发展而来，并致力于解决更紧迫的全球挑战。\n\n这 17 个相互关联的目标涵盖了广泛的问题，其中一个领域的成功会推动其他领域的进展。17 个 SDG\
    \ 目标旨在实现三个重要的社区发展方面：保护环境、促进社会多样性和推动经济增长。这些 SDGs 由政府、学术界和私营部门共同制定，是实现可持续社区发展最受认可的标准之一[1],\
    \ [2], [3]。\n\n图 1-1 展示了这 17 个 SDGs。\n\n![](img/625524_1_En_1_Fig1_HTML.png)\n\
    \n图 1-1\n\n联合国可持续发展目标\n\n人工智能和机器学习为实现联合国可持续发展目标提供了强有力的手段，多项研究已报告了其有效性。以下列表回顾了将\
    \ AI 和 ML 应用于 SDG 1、2、3、6、7、9、11、12 和 13 的部分工作：\n\n* **SDG 1：无贫穷**\n\n  该 SDG\
    \ 的目标是到 2030 年在全球范围内消除极端贫困，并确保所有人平等享有经济资源的权利。极端贫困的特征是日薪低于 1.25 美元[4]。根据去中心化人工智能联盟（DAIA）[5]的说法，利用\
    \ AI 可以提取关键信息，例如最近的水源、农田和市场[6]。此外，斯坦福大学的一个研究团队使用先进的机器学习算法，通过基于卫星的高科技图像分析来识别尼日利亚、坦桑尼亚、乌干达、马拉维和卢旺达的贫困状况[7]。\n\
    \n* **SDG 2：零饥饿**\n\n  该 SDG 的主要目的是消除饥饿、改善营养、确保粮食安全和促进可持续农业[8]。目前，世界上多达一半的食物被浪费。贫困加剧会导致粮食不安全，进而导致疾病增加。AI\
    \ 可以在处理食物浪费和粮食安全问题方面提供重大帮助。以 TOMRA Sorting Solutions 为例，它由 AI 驱动，分析并将食物分类为“好”或“坏”。该算法可以分析一个西红柿，并确定它是否适合用于沙拉。如果不适合，它可能更适合做番茄汁[9]。在印度和孟加拉国等国家，决策树、`k-NN`、多元逻辑回归和随机森林等多种机器学习算法也已用于作物预测和土壤类型分类[10,\
    \ 11, 12, 13]。\n\n* **SDG 3：良好健康与福祉**\n\n  SDG 3 的目标是保障健康的生活方式，并促进所有个体的福祉，无论其年龄、种族和宗教信仰如何。这包括广泛的目标，例如降低全球孕产妇死亡率，以及杜绝可预防的五岁以下婴幼儿死亡。此外，它旨在通过预防和治疗，最大限度地减少或消除艾滋病、结核病、疟疾和其他传染病疫情，降低非传染性疾病导致的过早死亡率，加强药物滥用的预防和治疗，并确保普遍获得性和生殖健康服务[14]。然而，像\
    \ COVID-19 这样的大流行病带来的全球威胁，凸显了做好准备的迫切需求。联合国开发计划署（UNDP）强调了各国应对 COVID-19 问题的能力差异。由于这场大流行病，对关键公共服务和卫生应急准备的投资在\
    \ 21 世纪迎来了转折点。\n\n  以下是到 2030 年的一些具体目标：\n  * 将全球孕产妇死亡率降至每 10 万例活产低于 70 例。\n  *\
    \ 消除新生儿和五岁以下儿童的死亡。所有国家的目标是将新生儿死亡率降至每 1000 例活产至少 12 例，五岁以下儿童死亡率降至每 1000 例活产至少 25\
    \ 例。\n  * 大幅减少由受污染的空气、有毒化学品、水和土壤造成的死亡和疾病数量。\n\n  关于应用 ML 帮助实现该 SDG，在[15]中，深度学习方法（DLA）在医学图像分析中的应用已发展成为一个快速发展的研究领域，DLA\
    \ 被广泛应用于医学成像中以识别疾病的存在与否。这项工作侧重于人工神经网络的演变，并对 DLA 进行了广泛研究，展示了其在医学成像领域的应用前景。此外，在[16]进行的工作中，提出了一种使用机器学习区分自闭症特征的方法。通过将两种不同的算法，即`CART`和`ID3`，结合到随机森林中，增强了现有的预测模型。\n\
    \n* **SDG 6：清洁饮水和卫生设施**\n\n  SDG 6 在联合国《2030 年可持续发展议程》中扮演着关键角色[17]。它确保全球承诺到 2030\
    \ 年让所有人都能获得安全和负担得起的饮用水和卫生设施。SDG 6 应对了几个重大挑战。首先，它侧重于确保获得安全、未受污染的可饮用水，承认全球仍有数十亿人缺乏这一基本必需品。其次，它强调卫生设施，旨在消除露天排便，并确保适当的废水处理以防止水污染。\n\
    \n  机器学习，特别是`k-最近邻`（`k-NN`），可以作为应对这些挑战的宝贵工具。`k-NN`是一种可用于分类和回归任务的监督学习算法。它在 SDG\
    \ 6 的背景下有相关应用：\n  * **监测水质：** `k-NN`可用于分析从传感器和监测站等各种来源收集的水质数据。这种分析有助于识别水质的模式和异常，便于早期发现污染事件。\n\
    \  * **主动维护：** 像`k-NN`这样的机器学习算法可以预测何时需要对水基础设施进行维护或修理。这种主动方法确保了清洁水的持续供应。\n\n  在[18]中，研究人员通过探索\
    \ AI 驱动的水质异常检测（WQAD）来应对 SDG 6。他们对智能水系统中 ML 和深度学习（DL）的应用进行了广泛回顾。此外，在[19]中，该研究通过使用机器学习预测埃塞俄比亚饮用水源中的大肠杆菌（E.\
    \ coli）污染，为 SDG 6 做出了贡献。他们采用了随机森林（RF）和极限梯度提升（`XGBoost`）等风险映射算法，结合了地理和家庭数据。此外，[20]中的工作采用机器学习，特别是改进的\
    \ Faster `R-CNN`（卷积神经网络），来检测和分类水中的藻类，同时应对 SDG 6 和 14。手动识别多样化的微观藻类既耗时又容易出错。在[21]中，该工作通过使用机器学习预测水质（确保安全饮用水的关键方面），间接支持了\
    \ SDG 3 和 6。它侧重于将水分类为可饮用或不可饮用，这对公共卫生至关重要。支持向量机（SVM）和`k-NN`等有效算法实现了高`F1`分数和准确率。\n\
    \n* **SDG 7：经济适用的清洁能源**\n\n  实施可再生能源方案正变得越来越经济实惠和可靠，因此是确保可持续性的一个前瞻性解决方案。我们对化石燃料等不可再生资源的严重依赖不仅对环境有害，而且使后代在开展活动时选择有限。该\
    \ SDG 的主要目标是实现人人可获得、环保且可持续的能源。尽管能源在环境和经济方面都占有重要地位，但到 2021 年，全球仍有五分之一的人口无法获得电力[22]。要实现这一\
    \ SDG，需要达到几个具体目标，其中一些列举如下：\n  * **目标 7.1 – 到 2030 年，确保全球每个人都能获得先进、可靠的能源服务。**\n\
    \n    如[22]所述，每 10 人中就有 1 人无法获得满足基本需求的电力。报告还指出，约有 26 亿人使用木炭、煤炭和动物粪便等生物质能源；全球 80%的国家无法获得绿色能源。通过使用更绿色的能源替代品可以实现\
    \ SDGs。SDG 7.1 旨在到 2030 年缩小这些能源差距。\n\n  * **目标 7.2 – 到 2030 年，重点关注清洁能源技术和能源来源，以增加可再生能源在日常用途中的使用。**\n\
    \n    SDG 7.2 旨在鼓励更多国家采用可再生能源方法。据[22]所述，全球约 17%的能源消耗来自可再生能源。世界各地的工业已开始投资于旨在生产绿色能源并对地球造成更少危害的可持续资源。\n\
    \n  * **目标 7.3 – 到 2030 年，将全球能源效率提高一倍，并加强国际合作以促进可再生能源服务的获取。**\n\n    它旨在提高能源生产系统的总能量输出与能量输入之比。这可以通过最大限度地减少总废物量、改进相关技术以及采用可持续方法来实现。目标\
    \ 7.3 旨在到 2030 年将目前的能源效率提高一倍。\n\n  通过将机器学习算法应用于历史涡轮机数据和 700 兆瓦风电场的天气预报，DeepMind\
    \ 和谷歌能够生成未来 36 小时的风电输出预测，从而促进了 SDG 7 的实现。因此，可以提前一天优化向电网的每小时供电承诺。与不考虑预测风电输出的传统系统相比，该方案在风能管理方面获得了\
    \ 20%的增益[23]。\n\n* **SDG 9：产业、创新和基础设施**\n\n  该 SDG 的目标是建立持久的基础设施，支持包容和可持续的工业化，并根据联合国的宗旨促进创新[24]。对基础设施和创新的投资对于经济增长和发展至关重要，同时也能改善和扩展新产业和基础设施，特别是在发展中国家。此外，SDG\
    \ 9 通过创造就业机会、促进可持续发展（如能效和可持续工业）以及投资于科学研究和创新，来推动经济增长。\n\n  一些关键目标和重点领域如下：\n  *\
    \ 发展可靠、可持续、有韧性的基础设施，使所有人负担得起且能够使用\n  * 促进包容和可持续的工业化，以提高就业率和 GDP\n  * 扩大获得金融资源的渠道，特别是针对发展中国家的中小企业（SMEs）\n\
    \  * 升级工业，以采用有韧性、可持续和环境友好的资源\n  * 促进研究与开发、技术进步和创新，以推动经济增长并寻找应对全球挑战的解决方案[25]\n\n\
    \  在[26]中，通过关注沙特阿拉伯哈伊勒地区的竞争力，研究了数字化对实现 SDGs 的影响。使用了 ML 技术、向量自回归模型和脉冲响应函数。结果表明，数字化促进了哈伊勒地区可持续发展的提升，主要涉及与产业、创新和基础设施相关的\
    \ SDG 9。在[27]中，研究了物联网（IoT）加速和 AI 进步在实现与健康、能源和城市相关的 SDGs 方面提供的机会。提出了一个结合 IoT 和\
    \ AI 以促进城市交通的系统模型，从而针对 SDG 9、11 和 13。\n\n* **SDG 11：可持续城市和社区**\n\n  该 SDG 旨在建设安全、可持续、包容、有韧性的城市和人类居住区[28]。技术进步预计将对智慧城市产生重大影响。根据联合国的数据，到\
    \ 2050 年，智慧城市将容纳全球近 66%的人口[29]。正在将快速发展的城市地区转变为智慧城市的国家，正在解决能源、医疗保健和安全等领域的 socioeconomic\
    \ 问题。\n\n  通过将 AI 与超可靠的 5G 网络相结合，可以实现实时位置、视频和生物识别数据分析。自动驾驶汽车也是超快 5G 网络与 AI 结合的产物。此外，高分辨率监控摄像头可以连接到基于云的面部识别系统，以实时识别和发现潜在的违法者[30]。\n\
    \n* **SDG 12：负责任消费和生产**\n\n  SDG 12 提倡减少工业中的化学品使用和废物产生。这一活动与水处理和检测过程相关。通过优化化学品使用和最小化废物产生，可以更有效、更环保地进行水处理过程[31]。\n\
    \n  在饮用水检测中，SDG 12 通过验证水的安全性以确保其可饮用，从而确保水资源的有效利用。此外，饮用水检测有助于分析水处理的环境影响，并确保这些处理是环保的。可以通过使用传感器网络、物联网和机器学习等创新技术来改进饮用水检测。这提高了检测的准确性和效率。\n\
    \n  SDG 12 强调管理水资源，并确保公众获得安全清洁的饮用水。该 SDG 的目的是促进可持续的消费和生产方式，使资源得到广泛利用。这一目标可以通过最小化生态足迹来实现。这满足了人们的消费需求，同时不剥削自然资源，也不对环境造成危害，例如向水、空气或土地排放有毒化学品。\n\
    \n  同样，机器学习在实现 SDG 12 方面可以证明非常有效。例如，在[32]中，通过机器学习优化供水系统，预测了短期用水需求，并优化了水泵调度以降低电力成本。\n\
    \n* **SDG 13：气候行动**\n\n  SDG 13 旨在通过减少温室气体排放、提高对气候相关灾害的抵御能力以及推广可持续实践来减轻气候变化的影响。SDG\
    \ 13 认识到气候变化对全球的生态系统、经济和社区构成重大威胁，强调需要立即采取协调一致的努力来保护地球，以实现可持续和气候适应的未来[1, 2]。\n\n\
    \  它们的一些目标如下：\n  * 提高全球对气候相关威胁和自然灾害的适应能力和免疫力\n  * 将气候变化减缓行动纳入国家规划、战略和政策\n  * 加强关于气候变化、减少影响、早期预警和适应的教育和宣传活动，以及机构和人员能力建设\n\
    \n  已用于 SDG 13 的一些 ML 技术包括[33]中的工作，作者提出了一种实时多步多输出多变量 ML 模型，用于预测位于越南胡志明市（HCMC）的不同空气污染物的浓度。作者提出的模型将各种参数作为输入，包括来自城市、住宅和工业区的气象条件和空气质量数据，以及每小时的`NO[2]`、`SO[2]`、`O[3]`和`CO`浓度。使用所提出的模型预测了每种空气污染物的浓度，结果表明，预测每种污染物浓度时获得的平均绝对百分比误差（MAPE）值在\
    \ 0.18 到 0.23 之间。此外，在[34]中，在 2013 年超级台风海燕的影响之后，对菲律宾贫困城市地区进行了为期四年的监测。为此目的采用了卫星图像和\
    \ ML 方法。由于这些地区自然灾害的严重性和影响不断增加，需要有效的灾害风险缓解策略。一种由局部二值模式特征提取模型支持的支持向量机分类技术，最初在灾前和灾后图像中检测贫民窟区域。随后，一个密集条件随机场模型生成了最终的贫民窟区域地图。所开发的方法以高精度检测了贫民窟区域。结果显示，该城市恢复到了原有的脆弱性水平。\n"
- fmt: '# 1.2 AI and Machine Learning Concepts


    In this section, we describe some basic concepts of AI and machine learning.


    ## 1.2.1 Artificial Intelligence


    The discipline of AI was founded by Alan Turing, who defines it as: “AI is the
    science and engineering of making intelligent machines, especially intelligent
    computer programs. It is usually defined as the science of making computers do
    things that require intelligence when done by humans” [35, 36, 37]. AI can be
    classified based on capabilities and functionalities as per Figure [1-2](#625524_1_En_1_Chapter.xhtml#Fig2)
    [38].


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig2_HTML.png)


    Figure 1-2


    AI classifications


    In Figure [1-2](#625524_1_En_1_Chapter.xhtml#Fig2), the shaded boxes represent
    AI capabilities and functionalities that have been developed so far. The others
    are hypothetical and are currently being actively researched by different AI companies
    and researchers [39, 40, 41, 42, 43].


    ## 1.2.2 Machine Learning


    Machine learning is a subfield of artificial intelligence, which allows machines
    to learn from previous data or processes without the need of explicit programming.
    Machine learning is essentially a well-defined process that allows a refined or
    optimized “model” to be derived from data, as shown in Figure [1-3](#625524_1_En_1_Chapter.xhtml#Fig3).


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig3_HTML.png)


    Figure 1-3


    Generic view of the machine learning process


    The data can be structured, semi-structured, or unstructured as will be defined
    in the next subsection. The optimized/trained model can then be used to make predictions,
    perform classification, or even gain more knowledge from new data. The mathematical
    models of ML algorithms are mainly derived from statistics’ theories [44, 45].
    Figure [1-4](#625524_1_En_1_Chapter.xhtml#Fig4) shows the interrelationship between
    AI and the different types of machine learning [46].


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig4_HTML.png)


    Figure 1-4


    Interrelationship between AI and machine learning


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig5_HTML.png)


    Figure 1-5


    Supervised learning


    * **Supervised Learning:** It employs a set of unique labeled data to develop
    the learning model via a training process. The two categories of supervised learning
    are classification and regression.


    The objective of classification analysis is to provide a categorical label to
    each input sample. The main classification algorithms include decision trees (DT),
    naïve Bayes, and k-Nearest Neighbors (k-NN).


    Regression analysis consists of algorithms such as linear, polynomial, and multiple-linear
    regression. Based on the statistical characteristics of the independent and dependent
    data sequences, regression aims at predicting continuous values of the dependent
    variable.


    Supervised learning is also used to train an artificial neural network (ANN) by
    presenting an input vector to the network, which will generate an output vector.
    The difference between this output vector and the target output vector is used
    to produce an error signal. This error signal is then used to adjust the weights
    of the ANN until the actual output is matched with the target output [46,47].


    A generic illustration of supervised learning for classification problems is shown
    in Figure [1-5](#625524_1_En_1_Chapter.xhtml#Fig5) (a) and for the training of
    an ANN in Figure [1-5](#625524_1_En_1_Chapter.xhtml#Fig5) (b).


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig6_HTML.png)


    Figure 1-6


    Unsupervised learning


    * **Unsupervised Learning**


    Unsupervised learning allows the discovery of hidden patterns and the extraction
    of useful features from unlabelled data. It is generally classified into clustering
    and dimensionality reduction techniques. Clustering essentially groups a set of
    samples into distinct clusters based on their similarities, and two of the most
    common algorithms are K-means and hierarchical clustering. A generic illustration
    is given in Figure [1-6](#625524_1_En_1_Chapter.xhtml#Fig6) (a) [44, 45, 46, 47].


    In the case of ANNs, with unsupervised learning, training is performed by combining
    similar input vectors to form clusters. When a new input pattern is applied, then
    the neural network gives an output response indicating the class to which the
    input pattern belongs. There is no feedback from the environment as to what should
    be the desired output and if it is correct or incorrect. Hence, in this type of
    learning, the network itself must discover the patterns and features from the
    input data, and the relation for the input data over the output. Figure [1-6(b)](#625524_1_En_1_Chapter.xhtml#Fig6)
    illustrates this process.


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig7_HTML.png)


    Figure 1-7


    Shallow and deep learning


    * **Shallow Learning**'
