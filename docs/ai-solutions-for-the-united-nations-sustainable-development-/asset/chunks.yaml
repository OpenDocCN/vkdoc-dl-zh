    When `k` is set to 3, the model achieved an accuracy of around 98.90%. This indicates
    that the model can make accurate crop predictions from the input data. Next, when
    `k` is set to 4, the model maintains a high accuracy of approximately 98.27%.
    This confirms the robustness and reliability of the model. At `k = 5`, a high
    accuracy of approximately 98.82% is obtained. The algorithm’s consistency across
    the different values of `k` is observed. This result has a positive impact on
    addressing SDGs 2, 9, and 12. Accurate crop recommendations lead to better agricultural
    practices, which in turn leads to increased crop yields and, eventually, improved
    food security (SDG 2). This model brings an innovative approach to farming. Additionally,
    by choosing an appropriate `k` value and fine-tuning the model, farmers can optimize
    their use of resources such as water and fertilizers. This optimization leads
    to better sustainable agricultural practices (SDG 9). Moreover, by recommending
    the appropriate crop types, resources are more efficiently used and so this encourages
    sustainable consumption and production patterns (SDG 12).


    Figure [3-8](#625524_1_En_3_Chapter.xhtml#Fig9) indicates the confusion matrix
    for the `K-NN` model. This model correctly predicts crops such as chickpea, kidney
    beans, and others with 100% true positives (TP). For class rice, it is correctly
    classified as 92 true positives but incorrectly classified as coffee with 8 false
    negatives. Class coffee is correctly classified 94 times but misclassified as
    rice six times. It is observed that other classes such as maize, mothbeans, mungbean,
    pomegranate, jute, and coffee are also incorrectly classified. Since most classes
    have zero false positives and false negatives, this demonstrates that `k-NN` with
    a `k` value of 3 performs with high precision.


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig9_HTML.jpg)


    Figure 3-8


    Confusion matrix for `k-NN` with `k = 3`


