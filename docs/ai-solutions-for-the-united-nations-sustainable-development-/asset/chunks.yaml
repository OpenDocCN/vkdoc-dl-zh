- fmt: '# 6.5 Summary


    In conclusion, this research focused on the development of a web application for
    predicting air pollutant levels and classifying the Air Quality Index using machine
    learning algorithms. The data collection process involved retrieving hourly historical
    air quality information from 10 selected locations in Mauritius through the `Weatherbit.io`
    Air Quality API. The selected air pollutants for monitoring included `PM[10]`,
    `PM[25]`, `CO`, and `O[3]`.


    The program structure of the web application was organized into different sections,
    including the layout of the website, implementation of linear and polynomial regression,
    as well as the use of `LSTM`/`MLP` algorithms for prediction. Additionally, classification
    algorithms (`k-NN`, decision tree, and random forest) were implemented to classify
    AQI based on air pollutant levels.


    The testing of the web application demonstrated its functionality, providing users
    with accurate predictions of air pollutant concentrations and AQI classification.
    The regression algorithms, including simple linear regression (`SLR`), polynomial
    regression (`PR`), multilayer perceptron (`MLP`), and long short-term memory (`LSTM`),
    were evaluated for performance. Each algorithm exhibited varying levels of accuracy
    in predicting air pollutant concentrations, with the MAPE values indicating the
    effectiveness of the models. The MAPE for `SLR` ranged from 6.81% to 12.99%, while
    for `PR` it varied from 2.35% to 9.36%. The MAPE for `MLP` was between 1.48% and
    2.31%, and for `LSTM`, it spanned from 1.20% to 1.91%. Notably, the `MLP` and
    `LSTM` algorithms demonstrated low MAPE values, suggesting their capability to
    capture complex nonlinear relationships in the data.


    Furthermore, the classification algorithms were assessed for their accuracy in
    predicting AQI levels. Decision tree and random forest algorithms outperformed
    `k-NN`, achieving high accuracy percentages of 99.5% and 98.9%, respectively.


    These results suggest the effectiveness of machine learning models in predicting
    both air pollutant concentrations and AQI levels, which are crucial for assessing
    air quality and making informed decisions for public health and environmental
    management. The findings of this research contribute to the understanding of how
    machine learning can be applied to predict and classify air quality indicators
    accurately. The web application developed in this study serves as a practical
    tool for users to obtain real-time predictions and classifications for air quality
    in Mauritius. This research aligns with the global Sustainable Development Goals,
    particularly SDG 3 (Good Health and Well-Being) and SDG 13 (Climate Action), by
    providing valuable insights for environmental monitoring and public health improvement.


    # 7. Clustering the Development of Worldwide Internet Connectivity for SDGs 7,
    9, and 11


    **Chapter authors:**


    Lavesh Babooram, `lavesh.babooram1@umail.uom.ac.mu`


    Tulsi Pawan Fowdur, `p.fowdur@uom.ac.mu`


    Department of Electrical and Electronic Engineering, University of Mauritius


    This chapter explores the global landscape of Internet connectivity development
    and its implications, with particular focus on Sustainable Development Goals (SDGs)
    7, 9, and 11. These targets and indicators act as a measure for the success of
    the goals laid out by the United Nations (UN), which, in this chapter, revolve
    mainly around the expansion of technological infrastructure and increased access
    to information and communications technology. An interactive application capable
    of processing and visualizing worldwide Internet connectivity trends from 1980
    to 2020 is thus developed using the `K-means` clustering algorithm. With the `HTML`,
    `CSS`, and `JavaScript` languages as the pillars of this web architecture, this
    unsupervised learning model presents users with a choropleth world map representing
    the development states of 187 countries among underdeveloped, emerging, developing,
    developed, and highly developed countries, making up a total of five clusters.


    The components on the user interface allow the input of a dataset containing four
    main variables including cellular subscription, the percentage of Internet users,
    the number of Internet users, and broadband subscription. After data preprocessing
    on this dataset originally obtained from Kaggle, the end user is able to observe
    the digital divide and Internet penetration over the last four decades. The evolution
    of the Internet across the world is demonstrated, shedding light on geographical
    disparities, regions with limited connectivity, and underserved populations. The
    results indicate that by 2020 most countries had achieved either developed or
    highly developed status, with some African and Asian nations still facing an uphill
    battle.


    This application can therefore serve as a tool toward making targeted interventions
    to address digital inequality. Moreover, this study contains discussions that
    delve into the implications of the findings for policymakers, investors, researchers,
    and international collaborators, thereby achieving the SDG targets 7.b, 9, and
    11.c.'
