  trans: '

    ### 1.3.1 简单线性回归 (SLR)


    SLR 是一种统计技术，用于分析两个定量变量之间的关系，并在自变量取特定值时预测因变量的值。因变量与自变量之间的相关性可以通过回归线来确定，该回归线是数据集中最佳拟合的直线。此外，回归分析还用于评估自变量变化与因变量之间的关系。


    简单线性回归的公式如下 [46]：


    ![$$ Y={\beta}_0+{\beta}_1X+\epsilon $$](img/625524_1_En_1_Chapter_TeX_Equ3.png)


    (1.3)


    其中，


    `Y` 是因变量或预测输出。


    `β[0]` 是回归线的 y 轴截距。


    `β[1]` 是回归线的斜率或回归系数。


    `X` 是自变量或目标输入。


    `ϵ` 是估计值的误差，用于衡量预测值与实际值之间的变异程度。


    SLR 通过计算使模型总误差 (`ϵ`) 最小化的回归系数 (`β[1]`) 和 y 轴截距 (`β[0]`)，来找到数据集中最佳拟合的直线。使用最小二乘法，系数计算如下：


    ![$$ {\beta}_0={M}_Y-{\beta}_1{M}_X=\frac{1}{N}\left({\sum}_{i=1}^N{Y}_i-{\beta}_1{\sum}_{i=1}^N{X}_i\right)
    $$](img/625524_1_En_1_Chapter_TeX_Equ4.png)


    (1.4)


    ![$$ {\beta}_1=\frac{SC_{XY}}{SS_X}=\frac{\sum_{i=1}^N\left({Y}_{i-}{M}_Y\right)\left({X}_{i-}{M}_X\right)}{\sum_{i=1}^N{\left({X}_{i-}{M}_X\right)}²}
    $$](img/625524_1_En_1_Chapter_TeX_Equ5.png)


    (1.5)


    其中，


    `SC[XY]` 是 XY 的共偏差平方和。


    `SS[X]` 是 X 的偏差平方和。


    `M[Y]` 是 `Y` 的均值。


    `M[X]` 是 `X` 的均值。


    `N` 是 `X` 和 `Y` 中值的总数。


    将提供两个版本的 SLR JavaScript 实现，其中第一个版本允许用户直接在网页上输入值进行预测，第二个版本允许用户上传数据集进行预测。


    当运行第一个版本的应用程序时，用户需要填充输入字段，当点击 `Read and Analyse` 按钮后，将显示如图 1-15(a) 所示的输出结果。


    ![](img/625524_1_En_1_Fig15_HTML.jpg)


    图 1-15(a)


    SLR 版本 1 的输入与输出


    该应用程序还会输出直线方程、平均绝对百分比误差 (MAPE)，以及数据集和回归线（含预测点）的图表，如图 1-15(b) 所示。MAPE 的计算公式如下：


    ![$$ MAPE=\frac{\sum_{i=1}^N\frac{\left({Y}_{i-}\underset{\_}{Y_i}\right)}{Y_i}}{N}\
    x\ 100 $$](img/625524_1_En_1_Chapter_TeX_Equ6.png)


    (1.6)


    其中，


    ![$$ \underset{\_}{Y_i} $$](img/625524_1_En_1_Chapter_TeX_IEq2.png) 是 `Y[i]` 的预测值。


    ![](img/625524_1_En_1_Fig16_HTML.jpg)


    图 1-15(b)


    SLR 版本 1 的 MAPE 与图表


