  raw: '### 1.3.2 Polynomial Regression (PLR)


    PLR extends the concept of SLR to situations where predictors may be more accurately
    related to their responses using a polynomial function. In other words, PLR is
    preferred when the relationship between the predictor and the response are curvilinear.
    The simple linear regression model may be modified by adding polynomial terms
    to obtain the polynomial regression model as follows [46]:


    ![$$ y={\beta}_0+{\beta}_1x+{\beta}_2{x}^2+{\beta}_3{x}^3+\dots +{\beta}_n{x}^k+\varepsilon
    $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ7.png)


    (1.7)


    Where,


    *y* is the dependent variable.


    *β*[0] is the Y-intercept.


    *k* is the order of the polynomial (highest degree).


    *β*[1] is the *β*[2], *β*[3],…, *β*[*n*] coefficients.


    *x* is the independent variable.


    *ε* is the error.


    The regression line can be obtained using the least square method, which requires
    solving a system of linear equations in the following form [46]:


    ![$$ \left[N\ {\sum}_{i=1}^N{x}_i\dots {\sum}_{i=1}^N{x_i}^k\ {\sum}_{i=1}^N{x}_i\
    {\sum}_{i=1}^N{x_i}^2\dots {\sum}_{i=1}^N{x_i}^{k+1}\vdots \vdots \vdots \vdots
    {\sum}_{i=1}^N{x_i}^k\ {\sum}_{i=1}^N{x_i}^{k+1}\dots {\sum}_{i=1}^N{x_i}^{2k}\
    \right]\left[{\beta}_0\ {\beta}_1\vdots {\beta}_k\ \right]=\left[{\sum}_{i=1}^N{y}_i\
    {\sum}_{i=1}^N{x}_i{y}_i\vdots {\sum}_{i=1}^N{x_i}^k{y}_i\ \right] $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ8.png)


