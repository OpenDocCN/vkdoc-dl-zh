- fmt: '### 3.4.2 K-NN Classification Results


    The effectiveness of the `k-NN` classifier for making precise crop recommendations
    based on multiple input parameters is studied as illustrated in Table [3-3](#625524_1_En_3_Chapter.xhtml#Tab3),
    [3-4](#625524_1_En_3_Chapter.xhtml#Tab4), and [3-5](#625524_1_En_3_Chapter.xhtml#Tab5).


    The value of `k` is set to 3, 4, and 5.


    **For K = 5,**


    Table 3-4


    `k = 4`


    | N | P | K | temperature | humidity | pH | rainfall | Results obtained | encodedlabel
    |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | 100 | 53 | 41 | 24.52 | 80.94 | 6.35 | 200.1 | rice | 0 |

    | 50 | 42 | 20 | 23.44 | 60.54 | 6.89 | 72.44 | maize | 1 |

    | 41 | 60 | 75 | 25.56 | 20.22 | 9.0 | 78.55 | chickpea | 2 |

    | 5 | 10 | 3 | 9.55 | 100.50 | 8.55 | 120.33 | orange | 16 |

    | 95 | 30 | 22 | 26.91 | 50.74 | 7.42 | 140.48 | coffee | 21 |

    | `Accuracy = 0.9827272727272728` |


    **For K = 4,**


    Table 3-3


    `k = 3`


    | N | P | K | temperature | humidity | pH | rainfall | Results obtained | encodedlabel
    |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | 100 | 53 | 41 | 24.52 | 80.94 | 6.35 | 200.1 | rice | 0 |

    | 50 | 42 | 20 | 23.44 | 60.54 | 6.89 | 72.44 | maize | 1 |

