    | 5 | 10 | 3 | 9.55 | 100.50 | 8.55 | 120.33 | Orange |

    | 95 | 30 | 22 | 26.91 | 50.74 | 7.42 | 140.48 | Coffee |

    | **Model Accuracy: 90%** |


    It is observed that when increasing the number of iterations, the model accuracy
    increases. For 25,000 iterations, the accuracy of the model was equal to 77.2%.
    The output obtained based on the values of the inputs was highly inaccurate, as
    for multiple different values, the model was classifying them as chickpea. When
    increasing the number of epochs to 50,000, a higher accuracy of 89.3% was obtained.
    The predicted labels were more accurate than the previous results obtained. Setting
    the number of iterations at 100,000, showed a slightly improvement in the model’s
    accuracy. However, further testing was performed with the number of epochs equal
    to 150,000. The results obtained showed that the model accuracy dropped below
    90%, possibly caused due to overfitting. The model begins to memorize the training
    data if it is trained for an excessively long period of time rather than learning
    to generalize to new, untried data. Monitoring the model’s performance on validation
    data and applying strategies like early halting or regularization are crucial
    for reducing overfitting.


    Figure [3-13](#625524_1_En_3_Chapter.xhtml#Fig14) shows the confusion matrix obtained
    for MLP. It can be observed that for rice, there is 42% confusion with coffee.
    Coconut also gives a probability of 24% while being confused with coffee data.
    The ambiguity of some data values may make it difficult for any model to anticipate
    them with accuracy. In this circumstance, the model generated both false positives
    and false negatives.


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig14_HTML.jpg)


    **Figure 3-13** Confusion matrix for MLP'
