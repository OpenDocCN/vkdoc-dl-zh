    \ the main aspects of data preprocessing.\n\n![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig10_HTML.png)\n\
    \nFigure 1-10\n\nData preprocessing\n\n![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig11_HTML.png)\n\
    \nFigure 1-11\n\nOutlier in a dataset\n\n1.  **Data cleaning:** Also known as\
    \ data cleansing or data scrubbing, this includes the following processes:\n \
    \   1.  **Fill missing values****:** When missing values are present, machine\
    \ learning algorithms typically perform poorly. Decision trees, the naïve Bayes\
    \ classifier, and certain rule-based learners are examples of rare exceptions.\
    \ The reason behind a missing value must be understood. There are numerous potential\
    \ causes for its absence, including random error, systematic error, and sensor\
    \ noise. Multiple approaches exist for handling missing values once the cause\
    \ has been established.\n        *   **Remove the instance:** The few non-relevant\
    \ cases with missing values can be removed if there is enough data.\n\n*   **Remove\
    \ the attribute:** If the majority of values are absent, the values remain constant,\
    \ or if an attribute exhibits a strong correlation with another property, it is\
    \ logical to eliminate that attribute.\n\n*   **Assign a special value N/A:**\
    \ Values may be absent for justifiable reasons, or their acquisition or measurement\
    \ may be impossible.\n\n*   **Take the average attribute value:** Assigning the\
    \ average value of an attribute or the average value over instances that are comparable\
    \ is one way to approximate the missing values.\n\n*   If an attribute has time\
    \ dependencies, predict its value from prior entries.\n\n2.  **Remove outliers****:**\
    \ Values that are outliers in data deviate significantly to the rest of the series\
    \ and have varying degrees of impact on all learning approaches. Confidence intervals\
    \ and thresholds help detect and eliminate such extreme values. Figure [1-11](#625524_1_En_1_Chapter.xhtml#Fig11)\
    \ shows a typical outlier in a dataset.\n\n1.  **Data** **transformation**\n\n\
    By converting the dataset to the format expected by a machine-learning algorithm\
    \ as input, data transformation techniques might potentially accelerate the system’s\
    \ learning process and improve its overall performance.\n\nBy way of example,\
    \ standardization converts the values such that the mean is equal to zero and\
    \ the deviation is equal to one, under the assumption that the data follows a\
    \ Gaussian distribution as per equation ([1.1](#625524_1_En_1_Chapter.xhtml#Equ1)):\n\
    \n1.  **Parsing data****:** Validating the format of a string of data or extracting\
    \ pertinent information is an example of this process.\n\n2.  **Formatting data****:**\
    \ Normalizing the range or temporal scale of the data or encoding it in a standard\
    \ encoding format (e.g., UTF-8 or int32) is an example. Additionally, this entails\
    \ the conversion of data into a standardized data schema. For example, in the\
    \ case of aggregating temperature values from several sensor types, it may be\
    \ desirable for them to possess an identical format.\n\n![$$ {X}_{std}=\\frac{X-\\\
    underset{\\_}{X}}{\\sigma_X} $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ1.png)\n\
    \n(1.1)\n\nWhere,\n\nX is the original dataset.\n\nX[std] is the standardized\
    \ dataset.\n\n![$$ \\underset{\\_}{X} $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_IEq1.png)\
    \ is the mean of the dataset.\n\n*σ*[*X*] is the standard deviation of the dataset.\n\
    \nIn contrast, normalization reduces the magnitudes of attribute values to a narrow,\
    \ predetermined interval, often spanning from zero to one:\n\n![$$ {X}_{norm}=\\\
    frac{X-{X}_{min}}{X_{max}-{X}_{min}} $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ2.png)\n\
    \n(1.2)\n\nWhere,\n\nX[min] and X[max] are the minimum and maximum values in the\
    \ dataset, respectively.\n\n1.  **Data integration**"
  trans: "\n### 1.2.3 数据类型\n\n所有测量值、数字、词语、观察结果、对象描述、照片等统称为*数据*。它们是计算机用于执行任务的数字、字母或符号的表示形式。数据可以作为电脉冲记录、存储和通信在磁性、光学或固态记录介质上。属性-值对的集合是展示数据最流行的方法，例如\
    \ [50]：\n\n```\nBob = {\nheight: 185cm,\neye color: blue,\nBody temperature: 98.6oF\n\
    Grade: A\n}\n```\n\n此类数据可以简单地表示为表格形式的结构化数据，其中行表示特定数据类型，列表示属性或特征，如表 1-1 所示。\n\n\
    **表 1-1** 结构化数据\n\n| 姓名 | 身高 (cm) | 眼睛颜色 | 体温 [^oF] | 成绩 |\n| --- | --- | ---\
    \ | --- | --- |\n| Bob | 185 | 蓝色 | 98.6 | A |\n| Anna | 160 | 棕色 | 97.7 | B |\n\
    \n表 1-1 中所示的不同类型的测量尺度可分类如下：\n\n1. **名义尺度：** 无序且互斥，例如眼睛颜色。\n2. **顺序尺度：** （分类数据。）涉及顺序重要但数值变化不重要的类别，例如学生字母等级、服务质量评级等。\n\
    3. **间隔尺度：** 零的概念不存在，但两个数字之间的差异有意义；即这些变量缺少零值，零值表示相应属性的缺失。例如，`0^oF` 表示一个温度，而不是没有温度。\n\
    4. **比率尺度：** 具备间隔变量的所有特征，并且对零有精确定义，当变量等于零时达到该定义，例如身高 [50]。\n\n数据也可以分类为结构化、非结构化和半结构化。\n\
    \n1. **结构化数据：** 能够像表 1-1 那样以设定格式进行存储、访问和处理的*结构化*数据。虽然这种类型的数据非常便于分析，但当此类数据规模增长到巨大程度（达到数泽字节范围）时，管理起来就会变得困难。\n\
    2. **非结构化数据：** 非结构化数据定义为任何缺乏已知形式或结构的数据类型。非结构化数据数量庞大，并且在尝试从中提取价值时会带来若干处理难题。非结构化数据的一个典型例子是包含简单文本文件、图像、视频等组合的异构数据源，例如谷歌搜索。\n\
    3. **半结构化数据：** 半结构化数据中可以找到两种类型的数据。半结构化数据在外观上可能看起来是结构化的，但它缺乏明确的定义，例如关系数据库管理系统中的表。XML\
    \ 文件中包含的数据是半结构化数据的一个例子，如下所示：\n\n```\nP.JonesMale35\nE.SmithFemale41\n```\n\n###\
    \ 1.2.4 数据预处理步骤\n\n由于并非所有算法都能处理缺失数据、额外属性或非规范化值，因此数据预处理任务的目标是提高数据对机器学习算法的适用性。图\
    \ 1-10 展示了数据预处理的主要方面。\n\n![](img/625524_1_En_1_Fig10_HTML.png)\n\n**图 1-10** 数据预处理\n\
    \n![](img/625524_1_En_1_Fig11_HTML.png)\n\n**图 1-11** 数据集中的异常值\n\n1. **数据清洗：**\
    \ 也称为数据清理或数据擦洗，包括以下过程：\n   1. **填充缺失值：** 当存在缺失值时，机器学习算法通常表现不佳。决策树、朴素贝叶斯分类器和某些基于规则的学习者是少数例外。必须理解缺失值背后的原因。其缺失可能有多种潜在原因，包括随机误差、系统误差和传感器噪声。一旦确定了原因，就有多种处理缺失值的方法。\n\
    \      - **移除实例：** 如果数据充足，可以移除少数不相关的包含缺失值的案例。\n      - **移除属性：** 如果大多数值缺失、值保持不变，或者某个属性与另一个属性表现出强相关性，则删除该属性是合理的。\n\
    \      - **分配特殊值 N/A：** 值可能因合理原因而缺失，或者其获取或测量可能无法实现。\n      - **取属性平均值：** 分配属性的平均值或相似实例的平均值是近似缺失值的一种方法。\n\
    \      - 如果属性具有时间依赖性，则根据先前的条目预测其值。\n   2. **移除异常值：** 数据中的异常值显著偏离序列的其余部分，并对所有学习方法产生不同程度的影响。置信区间和阈值有助于检测和消除此类极端值。图\
    \ 1-11 显示了一个数据集中的典型异常值。\n\n2. **数据变换：** 通过将数据集转换为机器学习算法期望的输入格式，数据变换技术可能加速系统的学习过程并提高其整体性能。例如，标准化转换数值，使得均值为零，标准差为一，前提是假设数据遵循高斯分布，如公式\
    \ (1.1) 所示：\n   1. **解析数据：** 验证数据字符串的格式或提取相关信息是该过程的一个例子。\n   2. **格式化数据：** 规范化数据的范围或时间尺度，或将其编码为标准编码格式（例如\
    \ `UTF-8` 或 `int32`）是一个例子。此外，这还涉及将数据转换为标准化的数据模式。例如，在聚合来自多个传感器类型的温度值时，可能希望它们具有相同的格式。\n\
    \n   ![$$ {X}_{std}=\\frac{X-\\underset{\\_}{X}}{\\sigma_X} $$](img/625524_1_En_1_Chapter_TeX_Equ1.png)\n\
    \n   (1.1)\n\n   其中，\n   - `X` 是原始数据集。\n   - `X[std]` 是标准化后的数据集。\n   - ![$$ \\\
    underset{\\_}{X} $$](img/625524_1_En_1_Chapter_TeX_IEq1.png) 是数据集的均值。\n   - `σ[X]`\
    \ 是数据集的标准差。\n\n   相比之下，归一化将属性值的幅度缩小到一个狭窄的、预定义的区间，通常范围从零到一：\n\n   ![$$ {X}_{norm}=\\\
    frac{X-{X}_{min}}{X_{max}-{X}_{min}} $$](img/625524_1_En_1_Chapter_TeX_Equ2.png)\n\
    \n   (1.2)\n\n   其中，\n   - `X[min]` 和 `X[max]` 分别是数据集中的最小值和最大值。\n\n3. **数据集成**\n"
- fmt: '# Data Integration


    Data integration is the procedure of amalgamating and synchronizing information
    from numerous sources to produce a cohesive and uniform structure suitable for
    a wide range of operational, decision-making, and analytical objectives.


    In the contemporary digital environment, it is generally impossible for enterprises
    to operate without collecting data from several sources, such as databases, applications,
    spreadsheets, cloud services, APIs, and more. Data discrepancies and silos result
    from the fact that this information is typically stored in many locations and
    formats with variable degrees of quality.


    Integrating data from several sources into a uniform format and making it available
    for analysis and decision-making helps solve these problems [51].


    ## Data and Dimensionality Reduction


    Data reduction is concerned with a multitude of instances and attributes. In our
    dataset, the number of dimensions is equivalent to the number of attributes. Aside
    from making a negligible contribution to the entire model, dimensions with low
    prediction power also have a negative impact. For example, a machine learning
    algorithm may detect random patterns introduced by an attribute containing arbitrary
    values. Dimensionality reduction strategies eliminate certain characteristics,
    or, alternatively stated, prioritize the most promising ones, to address this
    issue.


    An excessive number of instances constitutes the second challenge in data reduction.
    These instances may be duplicates or originate from a data stream that is extremely
    frequent.


    Critically, the objective is to choose a subset of examples whose distribution
    closely fits that of the original data and the process being monitored.


    ### Data Preprocessing Program in JavaScript


    In the following example we will look at a JavaScript program that performs data
    cleaning on a dataset shown partially in Table [1-2](#625524_1_En_1_Chapter.xhtml#Tab2).


    **Table 1-2** Temperature Dataset with Outliers


    | Temp | Time |

    | --- | --- |

    | 19.73 | 0 |

    | 20.4 | 1 |

    | 19.71 | 2 |

    | 19.98 | 3 |

    | 20.32 | 4 |

    | 39.74 | 5 |

    | 20.48 | 6 |

    | 19.79 | 7 |

    | 20.09 | 8 |

    | 19.68 | 9 |

    | 20.02 | 10 |

    | 20.46 | 11 |

    | 19.96 | 12 |

    | 20.51 | 13 |

    | 19.98 | 14 |

    | -3.5 | 15 |

    | 19.79 | 16 |


    In this dataset there are two outliers: one with value 39.74 and another one with
    value -3.5. We are now going to perform some pre-processing steps, namely, removing
    the outliers, standardization, and normalization.


    The HTML/JavaScript program for data preprocessing on this dataset is available
    on the GitHub page for this book. It starts with codes for prompting a user to
    browse to the location of the CSV file, which holds this dataset. It then asks
    the user to enter the number of rows to be displayed. The `Display Data and Analyse`
    button will perform basic statistical analysis such as computing the mean, mode,
    median, and standard deviation on the dataset as well as removing the outliers,
    standardization, normalization, and plotting. It uses the `papaparse.min.js` [52]
    and `plotly-latest.min.js` [53] libraries. It is to be noted that all the code
    in this chapter can be found in the folder `Chapter 1 – Codes` hosted on the GitHub
    page for this book.


    The main HTML file of this application is called `DataCollection.html`. The application
    also needs two JavaScript libraries, namely, `papaparse.min` and `ploty-latest.min`,
    which are placed in the same folder as the HTML file. The dataset in this case
    is a CSV file named `Regression_Weather-outliers`.


    When the application is run, the layout shown in Figure [1-12](#625524_1_En_1_Chapter.xhtml#Fig12)
    is displayed. A user first enters the number of rows to be displayed and then
    click the `Browse` button to select the CSV file. Finally, when the `Display Data
    and Analyse` button is clicked, the first five rows of the CSV file are displayed,
    followed by some basic statistics on the `Temperature` attribute. Additionally,
    the graphs in Figures [1-13](#625524_1_En_1_Chapter.xhtml#Fig13) and [1-14](#625524_1_En_1_Chapter.xhtml#Fig14)
    are displayed.


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig12_HTML.jpg)


    **Figure 1-12** Layout of data collection and preprocessing


    Figure [1-13](#625524_1_En_1_Chapter.xhtml#Fig13) shows the graphs of the original
    dataset and the corrected dataset for 50 data samples. It is observed that in
    the corrected dataset the outliers have been replaced by values within the range.


    Figure [1-14](#625524_1_En_1_Chapter.xhtml#Fig14) shows the graphs of the standardized
    and normalized dataset after correcting the outliers.


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig14_HTML.jpg)


    **Figure 1-14** Original temperature dataset versus corrected dataset


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig13_HTML.jpg)


    **Figure 1-13** Original temperature dataset versus corrected dataset


    ## Implementation of ML-Based Prediction and Classification Algorithms in JavaScript


    In this section, we give an overview of some common regression and classification
    algorithms, along with their implementation in JavaScript.'
