- fmt: '### 5.4.4 Random Forest


    The purpose of this section is to analyze and compare the performance of random
    forest classification algorithm for various values of `maxFeatures`. Table [5-3](#625524_1_En_5_Chapter.xhtml#Tab3)
    summarizes the results.


    **Table 5-3** Random Forest Result I


    | maxFeatures | Accuracy |

    | --- | --- |

    | 0.8 | 58.44 |

    | 0.6 | 62.58 |

    | 0.4 | 59.93 |

    | 0.2 | 58.61 |

    | 0.1 | 58.00 |


    `maxFeatures` determines the maximum fraction of features that are considered
    for splitting a node in a decision tree. In this case, 0.8 means that only 80%
    of the features are considered for each split. Randomly selecting a subset of
    features for each split can lead to more diverse and potentially better-performing
    trees. It helps in introducing diversity among the individual decision trees in
    the ensemble, enhancing the overall model’s accuracy and robustness.


    Analyzing the data, it becomes evident that the model attained its highest accuracy
    when `maxFeatures` was set to 0.6, reaching an impressive 62.58%. This finding
    suggests that considering 60% of the available features during each split resulted
    in the most accurate and robust predictions for the given dataset.


    As `maxFeatures` decreased from 0.6 to 0.1, a consistent decline in accuracy was
    observed. This decline highlights the critical role of feature selection in model
    performance. Restricting the number of features considered for each split adversely
    affected the model’s accuracy. Smaller `maxFeatures` values limited the diversity
    of trees within the ensemble, potentially leading to overfitting or the construction
    of less representative models for the underlying data.


    The trend underscores the delicate balance required in feature selection. Too
    few features can yield overly specific trees that struggle to generalize, whereas
    too many features can result in overly complex models. The peak accuracy at `maxFeatures`
    = 0.6 indicates the successful equilibrium achieved for this specific dataset.
    It emphasizes the necessity of fine-tuning `maxFeatures` to optimize the random
    forest model’s accuracy, ensuring that the chosen fraction of features fosters
    diversity, accuracy, and generalizability in the ensemble predictions. See Figure
    [5-11](#625524_1_En_5_Chapter.xhtml#Fig11).


    ![](images/625524_1_En_5_Chapter/625524_1_En_5_Fig11_HTML.jpg)


    **Figure 5-11** Max features versus accuracy plot


    Additionally, we analyzed and compared the performance of random forest classification
    algorithm for various values of `nEstimators`. Table [5-4](#625524_1_En_5_Chapter.xhtml#Tab4)
    summarizes the results.


    **Table 5-4** Random Forest Results II


    | nEstimators | Accuracy |

    | --- | --- |

    | 20 | 58.01 |

    | 25 | 59.78 |

    | 30 | 64.24 |

    | 35 | 60.10 |

    | 40 | 58.77 |


    `nEstimators` defines the number of trees in the random forest ensemble. Each
    tree is built independently and makes its own predictions. The predictions from
    all the trees are then combined (for classification, often by voting, and for
    regression, often by averaging) to produce the final output of the random forest
    model. Having a larger number of trees can improve the model’s accuracy, up to
    a point. However, adding too many trees can lead to overfitting the training data,
    where the model memorizes the training set instead of learning the underlying
    patterns. The optimal number of estimators often depends on the specific dataset
    and problem.


    Starting at 20 estimators, the accuracy stands at 58.01%. With an increase to
    25 estimators, the accuracy improves significantly to 59.78%. Surprisingly, at
    30 estimators, there is a substantial boost, resulting in an impressive accuracy
    of 64.24%. However, this high accuracy isn’t sustained as the number of estimators
    continues to rise. With 35 estimators, the accuracy decreases slightly to 60.10%,
    and at 40 estimators, it further drops to 58.77%.


    The trend suggests an optimal point for this specific dataset, and the problem
    lies around 30 estimators. Beyond this point, increasing the number of estimators
    doesn’t yield proportional improvements in accuracy; instead, it appears to introduce
    noise or overfitting.


    This observation aligns with the concept of diminishing returns in ensemble methods.
    Initially, adding more estimators enhances the model’s predictive power, capturing
    more complex patterns in the data. However, after a certain point, the model becomes
    too specific to the training data, resulting in reduced accuracy on unseen data.
    Therefore, selecting an appropriate number of estimators is crucial, balancing
    computational efficiency with model accuracy. See Figure [5-12](#625524_1_En_5_Chapter.xhtml#Fig12).


    ![](images/625524_1_En_5_Chapter/625524_1_En_5_Fig12_HTML.jpg)


    **Figure 5-12** Max features versus accuracy plot'
