- fmt: "### 2.4.1 Application Testing\n\nThis section summarizes the set of results\
    \ obtained while applying the different machine learning algorithms to the dataset.\
    \ The test values used for the different parameters are as follows:\n\n- **Wind\
    \ Speed** = 10 ms^(-1)\n- **Wind direction** = 120 deg\n- **Pressure** = 1 atm\n\
    - **Temperature** = 25 ⁰C\n\nThe outputs for the best MAPE obtained with each\
    \ model are depicted as under:\n\n![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10 KNN classification\n\n1. **KNN Classification**\n\n   This algorithm\
    \ aims at classifying the category of power that would be generated under the\
    \ previously mentioned conditions. The optimum value of `k` in this case was set\
    \ to 3, as demonstrated in Figure [2-10](#625524_1_En_2_Chapter.xhtml#Fig10).\n\
    \n![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig11_HTML.jpg)\n\nFigure 2-11\
    \ Multilinear regression\n\n2. **Multiple Linear Regression**\n\n   The dataset\
    \ was also tested using the Multiple Linear Regression algorithm to predict the\
    \ system power. A typical output under the chosen weather conditions is shown\
    \ in Figure [2-11](#625524_1_En_2_Chapter.xhtml#Fig11).\n\n![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12 KNN regression\n\n3. **KNN Regression**\n\n   The KNN regression\
    \ model exploits the distance between the nearest neighbors to obtain the predicted\
    \ system power. In this case, the four nearest neighbors provided better accuracy\
    \ than other values of `k`, as shown in Figure [2-12](#625524_1_En_2_Chapter.xhtml#Fig12).\n\
    \n![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig13_HTML.jpg)\n\nFigure 2-13\
    \ Polynomial regression\n\n4. **Polynomial Regression**\n\n   The polynomial regression\
    \ algorithm proved to provide the best accuracy by resulting in a MAPE as low\
    \ as 7.57%, as illustrated in Figure [2-13](#625524_1_En_2_Chapter.xhtml#Fig13).\n\
    \n### 2.4.2 Polynomial Regression Results\n\nFigure [2-14](#625524_1_En_2_Chapter.xhtml#Fig14)\
    \ and Table [2-4](#625524_1_En_2_Chapter.xhtml#Tab4) illustrates the results obtained\
    \ when the polynomial degree is increased. The MAPE values ranged from 7.57% to\
    \ 68.66%, showcasing the variability in model performance. Of particular interest\
    \ was the observation that the relationship between the degree of the polynomial\
    \ and MAPE was nonlinear. Instead, it followed a more intricate trajectory. The\
    \ MAPE values reached their lowest point at degree 9, where the error rate was\
    \ 7.57%, indicating a high level of accuracy and effectiveness in predicting power\
    \ system behavior. This result demonstrated that a polynomial of degree 9 provided\
    \ the most accurate predictions for this dataset. It emphasized the importance\
