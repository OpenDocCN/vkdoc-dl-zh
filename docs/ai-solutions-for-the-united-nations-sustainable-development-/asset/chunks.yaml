- fmt: '## 6.1 Introduction


    The SDG framework is related to various human rights but can be distinguished
    by its focus on people, the planet, prosperity, peace, and partnership [1]. The
    three major pillars are environmental protection, social diversity, and economic
    growth. The significance of machine learning (ML) lies in its capacity to greatly
    impact the attainment of the UN SDGs. ML algorithms are powerful computational
    tools that enable computers to learn and make predictions without being explicitly
    programmed [1].


    These algorithms are designed to analyze and extract patterns from vast amounts
    of data. By leveraging statistical techniques and iterative processes, ML algorithms
    can detect patterns and predict accurate results. Through the ability of ML algorithms
    to analyze vast and complex datasets, ML enhances decision-making, resource allocation,
    and predictive modeling, thus accelerating progress toward the SDGs. By optimizing
    processes, identifying patterns, and providing insights across various sectors,
    ML will contribute substantially to the global achievement of the SDGs by 2030
    [2].


    In this chapter, SDG 3, which aims at ensuring healthy lives and promoting well-being
    for all at all ages, and SDG 13 (climate action), which aims at taking urgent
    action to combat climate change and its impacts, have been targeted. A proposal
    has been put forward that involves a method to predict the level of air pollutants.
    This method aims to analyze how the concentration of air pollutants changes over
    time in real time for 10 different locations in Mauritius.


    To achieve this, several regression algorithms of machine learning (ML) have been
    employed, which include simple linear regression (SLR), multiple linear regression
    (MLR), and polynomial regression (PR). Each of these algorithms provides an estimation
    of the air pollutant concentrations. Moreover, the objective of this work is to
    also assess the relationship between various factors and air pollutant levels,
    allowing for the creation of predictive models that can anticipate pollutant concentrations
    in real time. These models utilize regression algorithms to analyze historical
    data and output a predicted value for the number of days the user has input, thus
    offering valuable insights into air quality dynamics for the specified cities.


    ## 6.2 AI Use Cases for SDGs 3 and 13


    ### 6.2.1 SDG 3: Good Health and Well-Being


    SDG 3 strives to ensure the well-being and good health of people of all ages.
    As a result, ML, a subset of artificial intelligence, has seen growing use in
    this domain to contribute to the attainment of this objective. In [3], some relevant
    literature concerning the use of ML tools and techniques in the field of drug
    discovery has been examined. These methods are employed at various stages of drug
    development to expedite research processes, mitigate risks, and reduce costs associated
    with clinical trials. ML techniques enhance decision-making by analyzing pharmaceutical
    data across different applications, including QSAR analysis, identifying potential
    drug candidates, and creating new drug designs, all with the aim of achieving
    more precise outcomes.


    From [4], the use of deep learning approach (DLA) in medical image analysis has
    emerged as a rapidly advancing research domain where DLA is extensively applied
    in medical imaging to discern the presence or absence of diseases. This paper
    focuses on the evolution of artificial neural networks and conducts an extensive
    examination of DLA, which exhibits promising applications within the realm of
    medical imaging. In the work carried out in [5], an approach for distinguishing
    autism traits using machine learning is presented. An existing prediction model
    was enhanced by combining two different algorithms: CART and ID3 within random
    forest. They tested and evaluated the model using two datasets: one called the
    Autism Spectrum Quotient (AQ10) dataset and the other containing 1,100 real-world
    data samples from individuals with and without autistic traits. The real-world
    dataset was obtained from hospital databases. The results showed an accuracy of
    98% with only 2% false positive cases.


    This study has the potential to reduce the diagnostic time of autism significantly.
    The use of a convolutional neural network (CNN) for the analysis of medical respiratory
    audio data related to obstructive pulmonary detection is presented in [6]. The
    Librosa machine learning library was utilized to analyze various audio features
    like MFCC, MEL-Spectrogram, Chroma, Chroma (Constant-Q), and Chroma CENS. The
    system can also determine the severity of the disease, categorizing it as mild,
    moderate, or severe. The results showed that this deep learning approach was effective
    and had a classification accuracy rate of 93% according to the ICBHI score. In
    [10], support vector machine (SVM) and the RF as conventional ML methods and CNN
    as deep learning (DL) methods were employed in a comparative analysis for the
    prediction and detection of diabetes in patients. RF achieved an accuracy of 83.67%,
    DL 76.81%, and SVM 65.38% in their experiment. In [7], Gabriel et al. applied
    logistic regression, random forest, support vector machine, K-nearest neighbor,
    naïve Bayes classifier, and feed-forward neural network to diagnose chronic kidney
    disease (CKD). A CKD dataset from the University of California Irvine was used.
    Random forest obtained a diagnosis accuracy of 99.75% and outperformed the other
    algorithms. In [8], Gabriel et al. introduced an approach leveraging ML, specifically
    neural networks and random forests. They developed two complementary models with
    the goal of estimating the likelihood of an individual succumbing to COVID-19.
    The training dataset encompassed demographic data and medical histories of two
    groups: one comprising individuals who unfortunately passed away due to COVID-19,
    and the other consisting of those who successfully recovered from the illness
    in Colombia during 2020.'
