    ### 6.4.3 SLR 算法的性能


    图 6-11 展示了 `SLR` 算法中 `PM10` 浓度随时间变化的曲线图。


    ![](img/625524_1_En_6_Fig11_HTML.jpg)


    图 6-11


    `SLR` 算法的 Web 应用输出


    表 6-3 展示了 `SLR` 算法获得的 `MAPE` 值。


    表 6-3


    `SLR` 算法的 `MAPE` 值


    | 地点/空气污染物 | 路易港 | 大湾 | 卡特勒博尔讷 | 博巴森 | 弗拉克 | 平均值 |

    | --- | --- | --- | --- | --- | --- | --- |

    | `O[3]` | 6.64 | 7.00 | 7.08 | 6.89 | 6.43 | 6.81 |

    | `CO` | 9.87 | 10.76 | 11.21 | 11.52 | 11.92 | 11.06 |

    | `PM[10]` | 12.33 | 12.65 | 12.99 | 12.80 | 14.16 | 12.99 |

    | `PM[25]` | 11.54 | 11.78 | 12.22 | 12.37 | 13.44 | 12.27 |


    选择 `SLR` 算法是因为当单个预测变量与响应变量之间的关系呈线性，并且非常适合使用简单线性模型进行分析时，它仍然具有价值。然而，它可能无法捕捉 `PLR`
    和 `MLP` 能够处理的更复杂的关系。从表 5-1 获得的结果可以看出，`MAPE` 值较低，范围从 6.81% 到 12.99%。`O3` 浓度的 `MAPE`
    最低，为 6.81%。这可能表明 `O3` 浓度遵循可预测的模式，波动幅度较小。对于其他变量，`MAPE` 相对较高，这可能表明空气污染物以随机方式变化，难以获得最佳拟合线。


    ### 6.4.4 PR 算法的性能


    使用了五次多项式回归。图 6-12 展示了 `PR` 算法中 `PM10` 浓度随时间变化的曲线图。


    ![](img/625524_1_En_6_Fig12_HTML.jpg)


    图 6-12


    `PR` 算法的 Web 应用输出


    表 6-4 展示了 `PR` 算法获得的 `MAPE` 值。


    表 6-4


    `PR` 算法的 `MAPE` 值


    | 地点/空气污染物 | 路易港 | 大湾 | 卡特勒博尔讷 | 博巴森 | 弗拉克 | 平均值 |

    | --- | --- | --- | --- | --- | --- | --- |

    | `O[3]` | 2.66 | 2.15 | 2.07 | 2.35 | 2.53 | 2.35 |

    | `CO` | 11.75 | 8.39 | 8.67 | 9.96 | 8.04 | 9.36 |

    | `PM[10]` | 9.58 | 9.57 | 9.21 | 9.24 | 7.83 | 9.09 |

    | `PM[25]` | 9.45 | 9.44 | 9.05 | 9.09 | 8.02 | 9.01 |


    选择 `PR` 算法是因为它是将 `SLR` 的概念扩展到预测变量与其响应变量之间可能通过多项式函数更精确关联的情况。观察到预测变量与响应变量之间存在曲线关系。从表
    5-3 获得的结果可以看出，`MAPE` 值较低，范围从 2.35% 到 9.36%。`O3` 浓度的 `MAPE` 最低，为 2.35%。较低的 `MAPE`
    值表明 `PR` 算法能够准确地模拟空气污染物随时间的变化。


    ### 6.4.5 MLP 算法的性能


    表 6-5 展示了 `MLP` 算法使用的超参数。


