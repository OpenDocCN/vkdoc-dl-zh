  trans: '

    # 数据集成


    数据集成是将来自多个来源的信息进行合并与同步的过程，旨在生成一个连贯且统一的结构，以满足运营、决策和分析等广泛目标的需求。


    在当代数字环境中，企业几乎不可能在不从多个来源（如数据库、应用程序、电子表格、云服务、API 等）收集数据的情况下运营。由于这些信息通常以多种格式存储在不同位置，且质量参差不齐，因此会导致数据不一致和孤岛问题。


    将来自多个来源的数据整合为统一格式，并使其可用于分析和决策，有助于解决这些问题[51]。


    ## 数据与降维


    数据缩减涉及大量实例和属性。在我们的数据集中，维度数量等同于属性数量。预测能力低的维度不仅对整个模型的贡献微乎其微，还会产生负面影响。例如，机器学习算法可能会检测到由包含任意值的属性引入的随机模式。降维策略通过剔除某些特征，或者换句话说，优先选择最有前景的特征，来解决这一问题。


    过多的实例构成了数据缩减中的第二个挑战。这些实例可能是重复的，或者来自频率极高的数据流。


    关键在于，目标是选择一个实例子集，使其分布与原始数据及被监控过程的分布高度吻合。


    ### JavaScript 数据预处理程序


    在以下示例中，我们将查看一个 JavaScript 程序，该程序对表 1-2 中部分展示的数据集执行数据清洗。


    **表 1-2** 包含异常值的温度数据集


    | 温度 | 时间 |

    | --- | --- |

    | 19.73 | 0 |

    | 20.4 | 1 |

    | 19.71 | 2 |

    | 19.98 | 3 |

    | 20.32 | 4 |

    | 39.74 | 5 |

    | 20.48 | 6 |

    | 19.79 | 7 |

    | 20.09 | 8 |

    | 19.68 | 9 |

    | 20.02 | 10 |

    | 20.46 | 11 |

    | 19.96 | 12 |

    | 20.51 | 13 |

    | 19.98 | 14 |

    | -3.5 | 15 |

    | 19.79 | 16 |


    该数据集中有两个异常值：一个值为 39.74，另一个值为 -3.5。我们现在将执行一些预处理步骤，即移除异常值、标准化和归一化。


    用于对该数据集进行数据预处理的 HTML/JavaScript 程序可在本书的 GitHub 页面上找到。程序首先会提示用户浏览到包含该数据集的 CSV 文件位置，然后要求用户输入要显示的行数。点击“显示数据并分析”按钮后，程序将对数据集执行基本统计分析（如计算均值、众数、中位数和标准差），并执行移除异常值、标准化、归一化和绘图操作。程序使用了
    `papaparse.min.js` [52] 和 `plotly-latest.min.js` [53] 库。需要注意的是，本章的所有代码都可以在本书 GitHub
    页面的 `Chapter 1 – Codes` 文件夹中找到。


    该应用程序的主 HTML 文件名为 `DataCollection.html`。应用程序还需要两个 JavaScript 库，即 `papaparse.min`
    和 `ploty-latest.min`，它们与 HTML 文件放在同一文件夹中。本例中的数据集是一个名为 `Regression_Weather-outliers`
    的 CSV 文件。


