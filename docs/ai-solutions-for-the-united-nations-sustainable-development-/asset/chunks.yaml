    ### 5.4.4 随机森林


    本节旨在分析并比较随机森林分类算法在不同 `maxFeatures` 取值下的性能表现。表 5-3 汇总了相关结果。


    **表 5-3** 随机森林结果 I


    | maxFeatures | 准确率 |

    | --- | --- |

    | 0.8 | 58.44 |

    | 0.6 | 62.58 |

    | 0.4 | 59.93 |

    | 0.2 | 58.61 |

    | 0.1 | 58.00 |


    `maxFeatures` 决定了在决策树中分割节点时，最多可考虑的特征比例。在本例中，0.8 表示每次分割仅考虑 80% 的特征。为每次分割随机选择特征子集，可以生成更多样化且可能性能更优的树。这有助于在集成中的各个决策树之间引入多样性，从而提升整体模型的准确率和鲁棒性。


    分析数据可知，当 `maxFeatures` 设为 0.6 时，模型达到了最高准确率，高达 62.58%。这一发现表明，在每次分割时考虑 60% 的可用特征，能够针对给定数据集产生最准确且最稳健的预测。


    随着 `maxFeatures` 从 0.6 降至 0.1，准确率持续下降。这种下降凸显了特征选择在模型性能中的关键作用。限制每次分割时考虑的特征数量，会对模型准确率产生不利影响。较小的
    `maxFeatures` 值限制了集成中树的多样性，可能导致过拟合，或构建出对底层数据代表性不足的模型。


    这一趋势强调了特征选择中需要达成的微妙平衡。特征过少可能产生过于特化的树，难以泛化；而特征过多则可能导致模型过于复杂。在 `maxFeatures` = 0.6
    时达到的峰值准确率，表明针对该特定数据集实现了成功的平衡。这强调了微调 `maxFeatures` 以优化随机森林模型准确率的必要性，确保所选的特征比例能在集成预测中促进多样性、准确性和泛化能力。参见图
    5-11。


    ![](img/625524_1_En_5_Fig11_HTML.jpg)


    **图 5-11** 最大特征数与准确率关系图


    此外，我们还分析并比较了随机森林分类算法在不同 `nEstimators` 取值下的性能表现。表 5-4 汇总了相关结果。


    **表 5-4** 随机森林结果 II


    | nEstimators | 准确率 |

    | --- | --- |

    | 20 | 58.01 |

    | 25 | 59.78 |

    | 30 | 64.24 |

    | 35 | 60.10 |

    | 40 | 58.77 |


    `nEstimators` 定义了随机森林集成中树的数量。每棵树独立构建并做出自己的预测。然后，所有树的预测结果被组合起来（对于分类问题，通常通过投票；对于回归问题，通常通过取平均值），以产生随机森林模型的最终输出。在达到某个点之前，拥有更多数量的树可以提高模型的准确率。然而，添加过多的树可能导致对训练数据的过拟合，即模型记忆了训练集，而非学习其底层模式。最优的估计器数量通常取决于具体的数据集和问题。


    从 20 个估计器开始，准确率为 58.01%。当增加到 25 个估计器时，准确率显著提升至 59.78%。令人惊讶的是，在 30 个估计器时，准确率大幅跃升，达到了
    64.24% 的惊人水平。然而，随着估计器数量继续增加，这种高准确率并未持续。当使用 35 个估计器时，准确率略微下降至 60.10%，而在 40 个估计器时，进一步降至
    58.77%。


    这一趋势表明，对于该特定数据集和问题，最优值大约在 30 个估计器附近。超过这个点后，增加估计器数量并不会带来准确率的成比例提升；相反，似乎引入了噪声或导致了过拟合。


    这一观察结果与集成方法中收益递减的概念相符。最初，增加更多估计器能增强模型的预测能力，捕捉数据中更复杂的模式。然而，在某个点之后，模型变得过于针对训练数据，导致在未见数据上的准确率下降。因此，选择合适的估计器数量至关重要，需要在计算效率与模型准确率之间取得平衡。参见图
    5-12。


    ![](img/625524_1_En_5_Fig12_HTML.jpg)


    **图 5-12** 最大特征数与准确率关系图

