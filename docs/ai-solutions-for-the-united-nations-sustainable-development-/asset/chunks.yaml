    | `PM[25]` | 9.45 | 9.44 | 9.05 | 9.09 | 8.02 | 9.01 |


    The `PR` algorithm was selected as it is an extension of the concept of `SLR`
    to cases where predictors may be more accurately related to their responses using
    a polynomial function. The curvilinear relationship between the predictor and
    the response is observed. From the results obtained in Table [5-3](#625524_1_En_5_Chapter.xhtml#Tab3),
    it can be observed that the `MAPE` is low, ranging from 2.35% to 9.36%. The `MAPE`
    for the concentration of `O3` is the lowest at 2.35%. The low values of `MAPE`
    indicate that the `PR` algorithm was able to model the variation of air pollutants
