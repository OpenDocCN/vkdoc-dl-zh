  trans: '

    ### 7.3.6 程序结构


    本节首先介绍 `index.html` 和 `script.js` 文件，然后深入探讨 JavaScript 中实现的方法的功能。图 7-12 给出了程序结构的概览。


    ![](img/625524_1_En_7_Fig12_HTML.jpg)


    图 7-12 Web 应用程序程序结构


    此外，`icons` 文件夹包含必要的 SDG 图标和网页的 favicon。打开网页后，它会等待通过“浏览”按钮输入数据集。图 7-13 提供了此 Web
    应用程序的通用流程图。


    ![](img/625524_1_En_7_Fig13_HTML.jpg)


    图 7-13 Web 应用程序通用流程图


    #### 方法与类的描述


    在使用 `handleFileUpload()` 方法处理 CSV 数据集后，一旦用户点击“生成聚类”按钮，就会触发 `generateClusters()`
    方法。此方法是程序的核心，决定了调用哪些其他方法和类，以及何时调用它们。`script.js` 文件中每个方法和类的功能摘要见表 7-2。


    表 7-2 方法与类的描述


    | 方法/类 | 描述 |

    | --- | --- |

    | `handleFileUpload()` | 处理用户选择 CSV 文件时触发的文件上传事件。它异步读取上传的文件，解析该文件，并启动数据处理工作流。
    |

    | `generateClusters()` | 使用 K-means 聚类算法从解析后的 CSV 数据生成聚类。它计算质心，为数据点分配标签，并相应地更新数据。此外，它还处理下载包含聚类数据的更新后
    CSV 文件的选项。 |

    | `ML.KMeans()` | 将归一化的 CSV 数据以及要执行 K-means 聚类的聚类数作为输入。 |

    | `processData()` | 通过从每一行中提取相关特征并将其存储在一个数组中，来处理 CSV 数据，然后将该数组传递给 `CustomWorldMap`
    对象以在世界地图上绘制。 |

    | `CustomWorldMap` | 是一个类，代表用于创建世界地图对象的自定义模板。它封装了使用 `Plotly.js` 将数据绘制到世界地图上的功能，并提供了地图布局和样式的可自定义配置。
    |

    | `dynamicYear()` | 当用户调整年份滑块时，动态更新 UI 上显示的所选年份。它为用户提供关于数据可视化所选年份的实时反馈。这有助于用户在释放滑块之前知道正在选择哪一年。
    |

    | `updateYear()` | 负责在用户调整并释放年份滑块时更新所选年份。它更新 UI 上的所选年份值，并使用更新后的年份过滤器触发数据处理工作流。
    |


    #### K-means 聚类算法


    接下来，图 7-14 详细说明了 K-means 聚类过程中 `generateClusters()` 方法所涉及的步骤。


    ![](img/625524_1_En_7_Fig14_HTML.jpg)


    图 7-14 K-means 聚类过程流程图


    聚类过程由 `ml.js` 库处理，当收敛发生时停止。这表示质心不再显著变化或达到指定迭代次数的点。在此应用程序中，是前者的情况。


    ## 7.4 应用程序测试与分析


    前端和后端构建完成后，Web 应用程序即可运行。因此，本节涉及应用程序的快照，以及对所获结果的讨论。


    ### 7.4.1 应用程序测试


    图 7-15 至 7-21 展示了使用滑块选择的不同年份的等值区域图，并附带了关于北美洲、南美洲、欧洲、非洲、亚洲和澳大利亚进展的描述。


    ![](img/625524_1_En_7_Fig21_HTML.jpg)


    图 7-21 2020 年结果


    ![](img/625524_1_En_7_Fig20_HTML.jpg)


    图 7-20 2015 年结果


    ![](img/625524_1_En_7_Fig19_HTML.jpg)


    图 7-19 2010 年结果


    ![](img/625524_1_En_7_Fig18_HTML.jpg)


    图 7-18 2005 年结果


    ![](img/625524_1_En_7_Fig17_HTML.jpg)


    图 7-17 2000 年结果


    ![](img/625524_1_En_7_Fig16_HTML.jpg)


    图 7-16 1996 年结果


    ![](img/625524_1_En_7_Fig15_HTML.jpg)


    图 7-15 1980 年结果


    ### 7.4.2 讨论


    本节包含通过简单调整滑块并观察全球互联网普及趋势，从所获地图中推断出的值得注意的见解。


    #### 与历史趋势的比较


    该应用程序的可视化提供了关于互联网连接随时间演变的宝贵见解，从而能够与过去的趋势进行比较。通过分析互联网普及率的模式和波动，可以深入了解全球连接的进程及其后果。接下来给出一些关键观察结果：


    *   **早期采用与扩张**：地图展示了北美、亚洲部分地区以及欧洲北欧国家等地区对网络技术的初步接纳。从 1990 年代到 2000 年代初期的历史数据显示，在技术进步和需求增长的推动下，这些地区的基础设施和接入迅速增长
    [25]。如图 7-16 所示，尽管互联网起源于美国，但首批“新兴”国家是芬兰、瑞典和挪威。这是由于北欧国家人口较少。


    *   **发展中地区的兴起**：相反，非洲、亚洲大陆某些地区以及南美洲等欠发达地区则表现出延迟但持续稳定的互联网接入增长 [26]。该应用程序的可视化展示了这些地区从
    2000 年代初期开始的互联网基础设施扩张，表明数字鸿沟正在逐步缩小。这在非洲国家的情况下非常明显，它们在 2010 年从不发达状态挣扎到新兴阶段，并在 2020
    年大部分成为发展中国家。


    *   **差异化增长率**：对过去模式的分析表明，不同地区和国家的互联网使用增长率各不相同。虽然某些国家的连接水平经历了快速且显著的增长，但其他国家则遇到了基础设施不足、经济限制和监管障碍等障碍。


    *   **区域差异**：可视化突出了互联网接入和发展方面持续存在的区域差异。发达地区拥有高水平的连接性和先进的数字基础设施，而资源不足的地区则持续落后，加剧了社会经济差距。

    '
- fmt: '#### Geographical Disparities


    Through the analysis of disparities in Internet access and its degrees of expansion,
    areas of concern can be identified and treated as high priority for focused interventions.
    Some observations are as follows:


    - **Regional Variations**: Developed regions, such as North America and Europe,
    generally have higher rates of consumption and more sophisticated facilities in
    comparison to developing economies in Africa, Asia, and Latin America. This is
    highly visible in Figure [7-21](#625524_1_En_7_Chapter.xhtml#Fig21), where data
    for 2020 shows the clear demarcation between Africa and Asia, and the rest of
    the world.


    - **Urban-Rural Divide**: Urban areas generally exhibit superior connectivity
    and technology owing to their higher population densities and greater economic
    advancement, whereas rural communities often face challenges in accessing reliable
    Internet services due to inadequate investment in equipment and geographical obstacles.
    This can be seen in the case of India for 2020, in Figure [7-21](#625524_1_En_7_Chapter.xhtml#Fig21)
    where despite having stable Internet infrastructure, rural areas contribute to
    the country being classified as Developing.


    - **Economic Factors**: Economic factors are pivotal in determining regional variations
    in access to the Web. More affluent countries and urban areas typically possess
    greater financial means to allocate toward digital infrastructure and the expansion
    of broadband networks. Conversely, countries with lower income levels and remote
    areas may face difficulties in financing and executing essential infrastructure
    improvements. As shown in Figures [7-18](#625524_1_En_7_Chapter.xhtml#Fig18) and
    [7-19](#625524_1_En_7_Chapter.xhtml#Fig19), from 2005 to 2010, Africa struggled
    to have most of its countries in the Emerging category. By that time, some parts
    of Europe, the United States of America, and Australia were already in the Highly
    Developed stage.


    - **Policy and Regulatory Environment**: Countries that implement favourable policies,
    such as offering incentives for investment from the private sector, establishing
    regulatory frameworks that encourage concurrence, and launching initiatives to
    extend broadband coverage to underprivileged regions, generally achieve superior
    connectivity results.


    ## 7.5 Benefits of Global Internet Connectivity Analysis


    This section highlights the importance of the Internet in driving socio-economic
    development, fostering innovation, and promoting digital inclusion in our interconnected
    world, especially with the recent surge in new trends such as artificial intelligence
    (AI) [27]. These new technologies necessitate the fundamental backbone of the
    Internet for proper functioning, especially with constant client demands for ultra-low
    latencies, owing to the nature of refined applications such as gaming, remote
    medical operations, videoconferencing, and augmented reality use cases. As countries
    aim to use the revolutionary potential of digital technologies, it is crucial
    to have a comprehensive understanding of global Internet connectivity trends.
    This section highlights the various advantages of using ML-based applications,
    as presented in this chapter, for the analysis of worldwide Internet connectivity.
    This application informs strategic decision-making, fosters international collaboration,
    and supports the achievement of the UN SDGs. Some of the benefits are elaborated
    upon next:


    - **Empowering Policy Decision-Makers**: This application provides government
    officials and policymakers with valuable insights to create and enforce effective
    policies that aim to improve Internet accessibility and infrastructure. Decision-makers
    can pinpoint regions or communities that lack sufficient access and allocate resources
    accordingly. For example, they have the ability to allocate funds toward the construction
    of broadband infrastructure in areas that lack adequate service or to carry out
    programmes aimed at reducing the gap in digital access. Instead of using datasets
    that comprise countries at global level, they can simply replace the dataset with
    regional data, such as for districts, or states within a country. Furthermore,
    policymakers can use the data from the application to track the effectiveness
    of their interventions over a period of time. This allows them to make decisions
    based on evidence and ensures that their efforts are focused on the areas that
    require the most attention.


    - **Enabling Strategic Investments**: Businesses and investors may benefit from
    the application’s extensive data on universal online access to identify lucrative
    possibilities for strategic investments. Emerging markets that offer substantial
    opportunities for growth can be identified. This information is extremely valuable
    for making well-informed decisions regarding investments in telecommunications
    infrastructure, technology startups, and e-commerce initiatives. Moreover, businesses
    may use the application’s analytics to customize their advertising approaches
    and product offerings for precise demographics, thus optimizing their return on
    investment.


    - **Supporting Research and Development**: The application functions as a valuable
    tool for researchers and academics who are interested in examining different facets
    of the Internet. The application promotes cooperation and information exchange
    among researchers, fostering interdisciplinary research endeavors focused on tackling
    intricate issues pertaining to Internet connectivity.


    - **Fostering International Collaboration**: Effective resolution of global Internet
    connectivity challenges necessitates partnership among governments, organizations,
    and stakeholders. The application functions as a platform for the dissemination
    of data, optimal methods, and tactics for its global expansion. The application
    promotes collaboration and knowledge sharing allowing stakeholders to use shared
    expertise to overcome obstacles. The adoption of this cooperative approach is
    crucial for the successful implementation of sustainable solutions that can significantly
    contribute to the attainment of universal Internet access.


    - **Addressing Digital Inequality**: By identifying regions with limited or unequal
    access to the Internet, stakeholders can develop focused strategies to enhance
    connectivity and narrow the gap in digital access. For instance, governments and
    organizations may leverage infrastructure improvements, collaborations between
    the public and private sectors, and grassroots campaigns to enhance accessibility
    for communities that currently lack sufficient access. By prioritizing the reduction
    of digital inequality, stakeholders can guarantee that every individual and community
    has equitable access to the advantages of the digital revolution.'
