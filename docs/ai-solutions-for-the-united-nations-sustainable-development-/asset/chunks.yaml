  trans: '

    最后，在多元线性回归领域，我们得到了一个 MAPE 值，为 42.20%。该模型的特点是简单，并为每个预测变量提供了系数。


    多元线性回归的优势在于其简单性和可解释性。它是一个易于理解的直观模型，并为每个预测变量提供了可解释的系数。这种透明性使其在需要理解不同变量对目标变量的个体贡献时，成为一种有价值的工具。


    然而，多元线性回归也并非没有其自身的局限性。该模型的基本假设之一是预测变量与目标变量之间存在线性关系。虽然这一假设在许多情况下是有效的，但它可能无法准确捕捉现实世界数据中存在的复杂非线性关系。因此，当实际关系并非真正的线性关系时，其性能可能并非最优。


    报告的 42.20% 的 MAPE 表明，多元线性回归模型可能无法充分把握数据集的复杂性，尤其是在存在非线性关系的情况下。虽然它可能无法提供与多项式回归或
    KNN 回归相同水平的预测精度，但在那些重视简单性和可解释性而非纯粹预测能力的场景中，它仍然具有相关性和适用性。


    最后，在比较这三种回归技术时，可以明显看出，多项式回归（尤其是 9 次多项式）取得了最佳的预测性能，其 MAPE 最低，为 7.57%。


    ## 2.5 分类在风电预测中的优势


    风电预测中的分类，即将风电功率分为低、中、高三个等级，为有效的能源管理和追求可持续性提供了众多关键优势。


    ### 2.5.1 准确的能源发电预测


    分类模型在风电预测中的主要优势之一，是能够提供对预期风电输出功率的精确可靠预测。通过将风电功率分为这三个等级，能源供应商可以深入了解能源资源的可用性。这些信息对于安排能源生产和分配至关重要。例如，当预测到风电功率较高时，能源供应商可以分配资源并计划以最佳方式利用这种清洁的可再生能源（Verhoef
    等人，2020）。


    ### 2.5.2 优化的能源分配


    将风电功率预测为低、中、高三个等级，使电网运营商能够就电力供需平衡做出明智的决策。电网运营商可以更有效地分配资源，根据预测的风电功率水平调整发电量，并策略性地启动或关闭发电厂，以满足消费者需求，同时避免电网过载或利用不足。这种优化提高了能源分配的整体可靠性和效率（Brázdil
    等人，2019）。


    ### 2.5.3 降低成本


    分类模型在降低能源部门成本方面发挥着关键作用。通过准确预测风电功率水平，能源供应商可以在低风电发电期间最大限度地减少对备用电源（如化石燃料）的依赖。这种减少不仅通过降低燃料费用来节省成本，还降低了与传统发电相关的运营成本。从本质上讲，它促进了更具成本效益和可持续性的能源生产过程（Gupta
    等人，2021）。


    ### 2.5.4 电网稳定性


    由于风速和风向的波动，风电发电本身具有可变性。分类模型为风电输出功率的潜在波动提供了早期预警和见解。掌握了这些信息，电网运营商可以主动管理能源电网，确保稳定一致的能源供应。通过预先应对风电的变化，这些模型有助于防止停电并维持电网稳定，尤其是在天气条件快速变化的时期（Thomas
    等人，2022）。


    ### 2.5.5 增强的能源规划


    基于分类的风电预测显著有利于能源基础设施规划。能源供应商和利益相关者可以就风电场及相关基础设施的建设、扩建和维护做出明智的决策。这种前瞻性确保了能源基础设施能够高效地满足当前和未来的能源需求。通过在正确的时间投资正确的项目，能源供应商可以最大限度地利用风能资源，并增强其运营的整体可持续性（Larson
    等人，2023）。


    ## 2.6 总结


    本章的目标是使用机器学习，利用从 Kaggle 数据集获得的数据来预测风电，同时瞄准 SDG 7，该目标旨在通过在全球范围内采用可持续方法来增加清洁能源的使用。本章使用了多项式回归、KNN
    回归、KNN 分类和多元线性回归，然后比较了这三种机器学习算法的准确性。


    本质上，使用 HTML 和 JavaScript 构建了一个网页，允许用户输入自变量：风速、风向、气压和气温，并在网页上输出预测的功率值和准确性。当使用 9
    次多项式回归时，获得了 7.57% 的 MAPE 值，表明准确性最高。对于 KNN 回归，当使用 `k` 值为 4 时，获得了最低的 MAPE，为 13.288%。对于多元线性回归，获得了
    42.20% 的 MAPE，这表明该模型的预测值对于 KNN 分类来说准确性不高。


    本章的一个局限性是，没有使用 API 获取实时数据来基于时间值进行实时预测。一个有趣的未来工作是使用更多的机器学习算法，例如多层感知器，来比较所用模型的不同准确性。本章的主要结论是，机器学习算法可用于增加绿色技术的使用，以高效地生产能源。机器学习算法可用于能源行业，帮助提高可持续能源系统的效率。同时，也可以得出结论，机器学习算法可用于实现
    SDG 目标，并有助于改善环境状况和社区福祉。

    '
- fmt: '# 3. A Crop Recommendation System Using Machine Learning Algorithms for Achieving
    SDGs 2, 9, and 12


    **Chapter authors:**


    Domah Avishaye, `avishaye.domah@umail.uom.ac.mu`


    Hanumunthadu Vandana, `vandana.hanumunthadu@umail.uom.ac.mu`


    Radjoo Dheeraj, `dheeraj.radjoo@umail.uom.ac.mu`


    The 17 UN SDGs play a pivotal role in providing standards to address global pressing
    challenges. This includes related issues such as poverty, hunger, and more. Machine
    learning is essential for accomplishing the SDGs because of its ability to analyze
    large amounts of data and predict their outcomes. This study focuses on applying
    machine learning to achieve SDGs 2, 9, and 12.


    The algorithms chosen are k-nearest neighbor, decision tree, random forest, and
    multilayer perceptron. The system predicts 22 crop yields based on input parameters
    of nitrogen, phosphorus, potassium, temperature, humidity, pH value of the soil,
    and rainfall. The web application was designed in JavaScript and HTML utilizing
    a crop recommendation dataset from the Kaggle platform. All four models achieved
    high accuracy, with the random forest model at 100% likely due to overfitting.
    This aligns with the targeted SDGs. An increase in the accuracy of the crop recommendation
    leads to better agricultural practices and better food security. Furthermore,
    the models foster innovation and allocate resources more efficiently in the agricultural
    field. In comparison with traditional systems in which historical data comparisons
    and estimations were made, machine learning manages extensive datasets and adapts
    to the scalability of the increasing number of farms. Diverse algorithms improve
    crop yield prediction.


    ## 3.1 Introduction


    This chapter introduces the application of machine learning algorithms on a crop
    dataset to target SDGs 2, 9, and 12. The main goal behind SDG 2 is to eradicate
    hunger, ameliorate nutrition, enable access to nutritious and sufficiently safe
    food, and promote sustainable farming practices. SDG 9 aims to develop robust
    infrastructure, foster inclusive and sustainable industrial growth, and encourage
    innovation. Due to global population growth, the demand for natural resources
    such as land and freshwater is increasing at an alarming rate. SDG 12 ensures
    sustainable patterns of consumption and production. Since agriculture is globally
    considered to be one of the most water-dependent activities, significant changes
    are necessary to fulfill this SDG [1]. Machine learning helps farmers to plant
    the best profitable crops considering environmental factors and also the market
    demand. This helps farmers to increase their profit and also reduce the possibility
    of crop failure [2].


    In [3] five machine learning models predicted the crop yield of mustard based
    on soil analysis. It fulfills SDGs 2, 9, and 12 through the application of machine
    learning for crop prediction and sustainable agricultural practices. [4] uses
    machine learning algorithms to predict soil types and recommend suitable crops
    in the Khulna region of Bangladesh. This aligns with the previously mentioned
    three SDGs. [5] focuses on using machine learning to predict soil qualities. It
    actively contributes to SDG 2 through improved soil fertility and so ensures greater
    crop production, which results in an increase in food security. Also, it achieves
    the other two specified SDGs.


    In this work, a web application is designed that makes use of classification algorithms,
    including KNN, decision tree, random forest, and multilayer perceptron. Our objective
    is to contribute to the achievement of SDGs 2, 9, and 12 focusing on enhancing
    crop yield prediction. The main focus of this work is the performance of these
    classification algorithms on the selected dataset aimed at achieving food security,
    advancing agricultural innovation, and promoting sustainable patterns of consumption
    and production. By utilizing a crop dataset, the main findings of this study demonstrate
    the accuracy of these algorithms. The main novelty, in contrast to previous studies,
    lies in the examination of several machine learning algorithms applied to the
    crop dataset for the prediction of optimal crop yields.'
