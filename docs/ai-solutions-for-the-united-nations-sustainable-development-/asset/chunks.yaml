    #### k-NN


    图 5-3 展示了 KNN 的流程图。


    ![](img/625524_1_En_5_Fig3_HTML.jpg)


    图 5-3


    KNN 流程图


    **JavaScript 库：**


    在 `<head>` 部分，通过 `<script>` 标签引入了几个 JavaScript 库。这些库如下：


    *   `ml.min.js`：一个用于 k-NN 分类的机器学习库

    *   `papaparse.min.js`：一个用于解析 CSV 数据的库


    **用户输入字段：**


    在 `<body>` 部分，提供了各种用户输入字段。这些字段包括：


    *   用于指定从数据集中显示的行数，以及 pH 值、硬度、固体物、氯胺等不同水质参数值的输入字段。

    *   一个用于选择 CSV 数据集文件的文件输入字段（`fileUpload`）。

    *   一个用于触发数据显示和分析的按钮（`upload`）。


    **显示数据：**


    用户选择一个 CSV 数据集文件，然后点击“显示数据并分析”按钮。点击该按钮会调用 JavaScript 函数 `Upload()`。


    **CSV 文件解析：**


    程序会检查所选文件是否为有效的 CSV 文件。如果有效，则使用 PapaParse 库解析 CSV 数据，并假设第一行包含表头。它还会根据用户的输入提取要显示的行数。


    **在 HTML 中显示数据：**


    解析后的数据会以指定行数显示在 HTML 表格（`dvCSV`）中。


    **分类数据准备：**


    程序准备用于 k-NN 分类的数据集和标签。它提取各种水质参数的值并将其存储在数组中。程序会对数据集进行洗牌以避免任何偏差。


    **数据分割：**


    根据指定的分割比例（70% 训练集，30% 验证集），将数据集分割为训练集和验证集。


    **k-NN 分类：**


    程序执行 k-NN 分类，根据用户输入的参数值预测水的可饮用性。


    它通过尝试一系列 k 值并选择在验证集上准确率最高的那个值，来找到最佳的 k 值（邻居数量）。使用最佳的 k 值，创建一个 k-NN 分类器。


    **验证与准确率计算：**


    程序使用训练好的 k-NN 分类器对验证集进行预测。通过将预测结果与实际标签进行比较，计算模型预测的准确率。准确率会显示在一个输入字段中。


    **显示分类结果：**


    程序使用训练好的分类器，根据用户提供的参数值预测水的可饮用性。


    结果（“可饮用”或“不可饮用”）会显示在一个输入字段中。


    #### 决策树与随机森林


    图 5-4 展示了随机森林和决策树的流程图。


    ![](img/625524_1_En_5_Fig4_HTML.jpg)


    图 5-4


    随机森林和决策树流程图


    **读取 CSV 文件：**


    *   `FileReader` 读取上传的 CSV 文件。此任务通过 `reader.readAsText()` 函数执行。


    **处理数据：**


    *   CSV 数据被分割成行和列，并提取特征和类别标签。此任务在 `reader.onload` 事件处理函数中执行。


    **洗牌数据集：**


    *   数据集被随机洗牌，以确保训练过程中的随机性。这是通过 `shuffleDataset()` 函数完成的。


    **分割数据集：**


    *   洗牌后的数据集被分割为训练集和验证集。这是通过数组切片实现的。


    **获取输入值：**


    *   用于预测的输入值从 HTML 输入元素中获取。这是通过访问特定 HTML 输入元素的值完成的。


    **设置分类器选项：**


    *   为决策树分类器定义选项，例如增益函数、最大深度和最小样本数。

    *   为随机森林分类器定义选项，例如随机种子、最大特征数、是否放回以及估计器数量。


    **初始化分类器：**


    *对于决策树：*


    *   使用提供的选项实例化一个新的决策树分类器。这是通过 `new ML.DecisionTreeClassifier(options)` 构造函数完成的。


    *对于随机森林：*


    *   使用提供的选项实例化一个新的随机森林分类器。这是通过 `new ML.RandomForestClassifier(options)` 构造函数完成的。


    **训练模型：**


    *   使用训练数据集训练分类器。这是通过 `classifier1.train()` 函数完成的。


    **验证模型：**


    *   对验证数据集进行预测，并计算准确率。此任务在 `reader.onload` 事件处理函数中执行。


    **显示验证准确率：**


    *   计算出的准确率显示在一个 HTML 输入元素中。这是通过设置特定 HTML 输入元素的值完成的。


    **预测类别：**


    *   使用训练好的模型，根据输入值预测新实例的类别。这是通过 `classifier1.predict()` 函数完成的。


    **显示预测类别：**


    *   预测的类别显示在一个 HTML 输入元素中。这是通过设置特定 HTML 输入元素的值完成的。


    #### 朴素贝叶斯


    朴素贝叶斯是一种概率机器学习技术，主要用于分类目的，其概念广泛基于概率论 [10]。


    图 5-5 说明了朴素贝叶斯算法的工作原理。


    ![](img/625524_1_En_5_Fig5_HTML.jpg)


    图 5-5


    朴素贝叶斯流程图


    对于这种机器学习算法，使用了朴素贝叶斯（NB）分类器。该分类器被称为一种用于分类目的的概率机器学习技术。


    NB 分类器类包含四个构造函数，其中 `this.allUniqueAttributes` 用于存储每个特征的属性值。`this.allAttributesProbabilities`
    数组存储与每个特征相关的概率，`this.uniqueClassValues` 数组存储数据集中找到的标签，`this.classProbabilities`
    数组存储与标签类别相关的概率。


    `fit` 方法将数据值、类别标签和变量名列表作为输入，用于训练朴素贝叶斯分类器，以计算每个类别和属性的概率。在 `fit` 方法内部，使用一个 `for`
    循环遍历数据集中的每个特征，并提取唯一的属性值和唯一的类别值。`count` 属性被初始化为零，用于存储每个类别中属性值出现的次数。


    `predict` 方法接收输入值，并根据朴素贝叶斯模型的训练结果显示最可能的类别。对于每个类别标签，该方法计算输入的概率，并将概率最高的类别分类为预测类别。


    `NBAcc()` 函数用于确定水的可饮用性，`accuracy()` 函数用于确定其准确率。然后，其输出会显示在 Web 应用程序的表格中。


    ## 5.4 应用程序测试与分析

