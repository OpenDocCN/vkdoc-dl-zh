  raw: '### 6.2.2 SDG 13: Climate Action


    In [9], the authors proposed a real-time, multistep, multi-output, multivariate
    ML model to forecast the concentrations of the different air pollutants in Ho
    Chi Minh City (HCMC) in Vietnam. The air pollutants include NO[2], SO[2], O[3],
    and CO. The model proposed by the authors took as input various parameters, including
    meteorological conditions and air quality data from urban, residential, and industrial
    areas as well as hourly NO[2], SO[2], O[3], and CO concentrations.


    Moreover, the proposed ML model used an N-beats neural network with a deep stack
    of fully connected layers with both forward and backward links. Furthermore, the
    authors used data from six air quality monitoring sites in HCMC to generate several
    datasets that contain the concentrations of the pollutants from February 2021
    to August 2022\. The concentration of each air pollutant was predicted using the
    proposed model, and the results demonstrated that the MAPE value obtained, when
    predicting the concentration of each pollutant, ranged from 0.18 to 0.23.


    The authors in [10] developed a robust method to forecast the AQI, crucial for
    industry pollution control and public health. They began by predicting PM2.5 and
    PM10 levels using an ANN. Building upon this, they extended their approach to
    predicting other significant air pollutants essential for estimating the AQI.
    They employed missForest, a machine learning–based technique utilizing the RF
    algorithm to fill in missing entries. RF was applied during the data pre-processing
    phase, enhancing accuracy. Validation in Kuwait’s Al-Jahra city demonstrated an
    impressive 92.41% AQI prediction accuracy, surpassing previous methods.


    In another work [11], various ML techniques were employed, including LR, SDG regression,
    RF, decision tree, SVR, ANN, Gradient Boost, and Ada Boost to predict the AQI
    for pollutants like PM2.5, PM10, CO, NO[2], SO[2], and O[3]. SVR and ANNs emerged
    as the most accurate methods for forecasting air quality in New Delhi, displaying
    lower Mean Squared Error (MSE), Mean Absolute Error (MAE), and higher *R*² values.
    Similarly, in [12], different ML algorithms were used to forecast the level of
    Particulate Matter, which is less than 2.5um in diameter in a specific region
    in Delhi, India. The authors also proposed a new model that combined two deep
    learning algorithms, namely, LSTM and GRU to predict the AQI. Two types of data
    were used; one consisted of different pollutant concentrations, and the other
    consisted of weather data. After preprocessing and feature extraction, the data
    was fed into the various algorithms such as LR, GRU, K-nearest neighbor (KNN),
    SVM, LSTM, and lastly the proposed hybrid model of LSTM-GRU. After evaluating
    all the results, it was found that the proposed model had the best performance
    among all the models with an MAE value of 36.11.


    In [13], a deep learning approach for predicting the AQI in metropolitan cities
    is proposed. The AQI for Chennai city was forecasted by first gathering a dataset
    and performing pre-processing such as replacing missing values and eliminating
    redundant data. The AQI value is based on the level of pollutants such as particulate
    matter, ozone, and sulfur dioxide. The Grey Level Co-occurrence Matrix was used
    to compute statistical measures, namely, the mean, mean square error, and standard
    deviation from the dataset. SVM along with LSTM was used to classify the AQI value
    between six categories ranging from good to severe. The AQI value can be used
    to better plan sustainable metropolitan cities, control air pollution levels,
    encourage the plantation of trees, and convince people to use public transportation.
    Additionally, in [14], it discusses how ML methods have been used in the field
    of climate and numerical weather prediction. This article provides an introductory
    overview of DL and presents a preliminary summary of current methodologies for
    predicting extreme weather. These approaches leverage recurrent neural networks
    (RNNs) to forecast weather patterns and CNNs to predict extreme weather events.
    They automatically extract essential image features related to extreme weather,
    enabling predictions of extreme weather probabilities using a deep learning framework.


    ## 6.3 Data Processing and Application Design


    This section describes the datasets used, the structure of the developed web application,
    and the preprocessing steps. Flowcharts and pseudocodes are also used to describe
    the different processes involved.


    ### 6.3.1 Data Collection Process and Dataset Description


