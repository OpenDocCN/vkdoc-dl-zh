    ## About the Authors


    # 1. Introduction to Machine Learning Applications Development and the UN SDGs


    **Chapter authors:**


    Tulsi Pawan Fowdur, `p.fowdur@uom.ac.mu`


    Lavesh Babooram, `lavesh.babooram1@umail.uom.ac.mu`


    Department of Electrical and Electronic Engineering, University of Mauritius


    The 17 United Nations Sustainable Development Goals (UN SDGs) are a global blueprint
    for addressing social, economic, and environmental challenges. They aim to transform
    our world by providing standards to address pressing global challenges such as
    poverty, hunger, inequality, education, economic growth, and climate change, while
    ensuring the welfare of the inhabitants of this planet.


    Artificial intelligence (AI) and machine learning (ML) aim to help achieve the
    SDGs by harnessing vast amounts of data, making predictions, and uncovering patterns
    from large and complex datasets to enable proactive decision-making and optimizations
    within core systems and distribution channels. ML is indeed a very potent and
    innovative approach in addressing all 17 SDGs.


    In this chapter, we give an overview of the SDGs and the applications of AI and
    ML to achieve these goals. Moreover, we cover some fundamental concepts of the
    most common ML-based prediction and classification algorithms along with the implementation
    details of these algorithms using JavaScript.'
