    # 7.2 人工智能在可持续发展目标 7、9 和 11 中的应用案例


    接下来将介绍研究人员在相关工作中开展的**最新综述**。


    在文献[10]中，Chinn 和 Fairlie 通过对 161 个国家进行**微观分析**，研究了个人电脑和互联网普及率方面全球数字鸿沟的决定因素。评估指标包括经济参数、人口统计指标、基础设施变量以及电话密度和定价等电信指标。


    作者提到，这些特征与年龄依赖结构相结合，与互联网使用和发展的模式相关。通过对互联网普及率的分析，他们发现美国的普及率最高，其次是北欧国家，即瑞典、丹麦、瑞士和挪威。而另一端则是撒哈拉以南非洲的多个国家，报告显示其电脑普及率低于每千人
    2 名用户。实验得出结论，互联网连接的关键决定因素是收入，而收入直接与电脑需求挂钩，进而影响特定国家的电信基础设施。该论文还详细分析了 1999-2001
    年间与互联网普及率相关的报告指标。


    在文献[11]中，Chen 和 Wellman 通过评估社会经济、技术和语言指标，在国际和国家两个层面探讨了全球数字鸿沟。他们首先将数字鸿沟定义为能够享受信息领域便利的个体与不能享受该便利的个体之间的差距。尽管互联网在全球迅速传播，但其普及仍集中在高度发达国家。作者提到，美国占据了互联网用户的主要部分，到
    2001 年，该国总人口的 60%已经使用网络。研究还强调，为了让边缘化社区能够参与信息时代，必须建立相应的电信政策、基础设施和教育体系。研究得出结论，由于高昂的费用、低收入、英语的压倒性普及、相关材料的缺乏以及技术援助不足，弱势群体在使用电脑甚至接入互联网方面面临障碍。


    几年后，White 等人沿着同样的思路，通过一项涉及三个参数的实证研究来评估全球数字鸿沟[12]。文中提到，高度发达国家与欠发达国家之间先前存在的差距已显著扩大。因此，该研究的目标是创建一个反映数字鸿沟现状的全面地图表示，以国家为分析焦点。研究对全球数字鸿沟的现状进行了评估，这为监测变化和开展未来研究提供了起点。作为信息来源，作者使用了国际电信联盟（ITU）的数据集，该数据集包含
    172 个国家近 100 项通信特征的时间序列数据。尽管已有关于每百人个人电脑拥有量和每百人互联网用户数的充足信息，但他们强调了分析互联网接入质量的重要性，并因此引入了第三个指标，即人均国际互联网带宽。用于将国家分为四个层级的分类方法是`K-means`聚类算法，该算法能够清晰界定被分类的国家。实验最终得出一幅代表数字鸿沟的当代地图，可作为进一步研究的基准。


    在文献[13]中，De-Arteaga 等人考察了机器学习领域在现实场景中的应用，特别关注发展中国家。该研究面向全球发展，并提到贫困国家在互联网接入、数据可用性和计算能力方面的不足。作者以南非仍在使用小众语言的小社区为例，提出通过实施自然语言技术、文本转语音功能和自动语音识别技术来弥合互联网连接方面的差距。


    同样，在文献[14]中，Alper 和 Miktus 讨论了撒哈拉以南非洲的数字连接问题，首先通过对 190 个国家的数据集使用无监督机器学习`K-means`聚类算法确认了全球数字鸿沟的存在，从而提供了比较视角。然后，作者使用了一个综合数字连接指数，分析显示撒哈拉以南非洲地区的大多数国家在数字连接方面落后，尤其是在基础设施、互联网接入和领域专业知识等方面。他们还强调，尽管这些国家在信息、通信和技术（ICT）设施上投入巨大，但仍需要数字连接才能赶上技术发展的列车。


    此外，该研究还涉及 100 个独立参数之间的关系，以评估数字鸿沟的权重。这是通过逻辑回归模型完成的，其中一些指标与可持续发展目标相关。在实验结论中，作者强调了监管和商业友好环境、城市化进程加快以及电力供应的重要性。


    此外，Walelgne 等人提出了一种有效方法来解决移动用户数据使用模式相关的问题，该问题最终决定了基于用户流量需求和行为的资源优化分配[15]。研究使用了从
    Netradar（一个基于众包方式收集信息的移动网络测量基础设施）获得的数据集，重点考察用户在使用移动数据时的模式和行为。数据来自五个不同的国家，主要考虑的因素包括用户的移动性、订阅套餐、网络覆盖和网络拥塞。该方法采用`K-means`方法，根据数据消耗、网络接入类型、用户会话次数、吞吐量和移动性等因素对移动用户进行分类。由此产生了一个聚类模型，揭示了芬兰、英国、日本、巴西和德国这五个国家的模式分布并不均匀。在大多数情况下，高数据使用量是由少数消耗大量数据的用户造成的。与普通用户和临时用户相比，重度用户倾向于安装需要更多流量的应用程序。


    然后，使用标记数据集训练了三个分类模型，包括决策树、梯度提升分类器和随机森林。其中，决策树模型提供了最佳性能，准确率约为 80%。

