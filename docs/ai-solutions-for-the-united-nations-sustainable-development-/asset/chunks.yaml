- fmt: "### 1.2.3 Data Types\n\nAll measurements, numbers, words, observations, object\
    \ descriptions, photographs, and so forth are collectively referred to as *data*.\
    \ They are a representation of the numbers, letters, or symbols that a computer\
    \ uses to carry out tasks. On magnetic, optical, or solid-state recording medium,\
    \ data can be recorded, stored, and communicated as electrical impulses. A collection\
    \ of attribute-value pairs is the most popular method for displaying the data,\
    \ for example [50]:\n\n```\nBob = {\nheight: 185cm,\neye color: blue,\nBody temperature:\
    \ 98.6oF\nGrade: A\n}\n```\n\nSuch data can be represented simply as structured\
    \ data in the form of a table, with rows denoting specific data types and columns\
    \ denoting properties or features, as shown in Table [1-1](#625524_1_En_1_Chapter.xhtml#Tab1).\n\
    \n**Table 1-1** Structured Data\n\n| Name | Height (cm) | Eye Color | Body Temperature\
    \ [^oF] | Grade |\n| --- | --- | --- | --- | --- |\n| Bob | 185 | Blue | 98.6\
    \ | A |\n| Anna | 160 | Brown | 97.7 | B |\n\nThe different types of measurement\
    \ scales shown in Table [1-1](#625524_1_En_1_Chapter.xhtml#Tab1) can be categorized\
    \ as follows:\n\n1. **Nominal:** Unordered and mutually exclusive, for example,\
    \ eye color.\n2. **Ordinal:** (Categorical data.) Relates to categories in which\
    \ the order is significant, but not the variation in values, for e.g., student\
    \ letter grade, service quality rating, etc.\n3. **Interval:** Where the idea\
    \ of zero does not exist but the difference between two numbers is meaningful;\
    \ i.e., these variables lack a zero value, which signifies the absence of the\
    \ corresponding attribute. For e.g., `0^oF` represents a temperature rather than\
    \ a lack of temperature.\n4. **Ratio:** Possesses all the characteristics of an\
    \ interval variable and a precise definition of zero, which is reached when the\
    \ variable equals zero, e.g., Height [50].\n\nData can also be classified as structured,\
    \ unstructured, and semi-structured.\n\n1. **Structured data:** Information in\
    \ a set format that is capable of storage, access, and processing as in Table\
    \ [1-1](#625524_1_En_1_Chapter.xhtml#Tab1) is termed *structured* data. While\
    \ this type of data is very convenient to analyze, when the size of such data\
    \ grows to a huge extent, in the range of multiple zettabytes, it becomes difficult\
    \ to manage.\n2. **Unstructured data:** Unstructured data is defined as any type\
    \ of data that lacks a known form or structure. Unstructured data is enormous\
    \ in quantity and presents several processing difficulties when trying to extract\
    \ value from it. A typical example of unstructured data is a heterogeneous data\
    \ source containing a combination of simple text files, images, videos, etc.,\
    \ such as a Google search.\n3. **Semi-structured:** Both types of data can be\
    \ found in semi-structured data. Semi-structured data may appear to be structured\
    \ in appearance, but it lacks explicit definitions such as tables in relational\
    \ database management systems. Data contained in an XML file is an example of\
    \ semi-structured data as given here:\n\n```\nP.JonesMale35\nE.SmithFemale41\n\
    ```\n\n### 1.2.4 Data Preprocessing Steps\n\nBecause not all algorithms can handle\
    \ missing data, extra attributes, or denormalized values, the objective of data\
    \ preprocessing jobs is to enhance the data’s suitability for a machine learning\
    \ algorithm. Figure [1-10](#625524_1_En_1_Chapter.xhtml#Fig10) shows the main\
    \ aspects of data preprocessing.\n\n![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig10_HTML.png)\n\
    \n**Figure 1-10** Data preprocessing\n\n![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig11_HTML.png)\n\
    \n**Figure 1-11** Outlier in a dataset\n\n1. **Data cleaning:** Also known as\
    \ data cleansing or data scrubbing, this includes the following processes:\n \
    \  1. **Fill missing values:** When missing values are present, machine learning\
    \ algorithms typically perform poorly. Decision trees, the naïve Bayes classifier,\
    \ and certain rule-based learners are examples of rare exceptions. The reason\
    \ behind a missing value must be understood. There are numerous potential causes\
    \ for its absence, including random error, systematic error, and sensor noise.\
    \ Multiple approaches exist for handling missing values once the cause has been\
    \ established.\n      - **Remove the instance:** The few non-relevant cases with\
    \ missing values can be removed if there is enough data.\n      - **Remove the\
    \ attribute:** If the majority of values are absent, the values remain constant,\
    \ or if an attribute exhibits a strong correlation with another property, it is\
    \ logical to eliminate that attribute.\n      - **Assign a special value N/A:**\
    \ Values may be absent for justifiable reasons, or their acquisition or measurement\
    \ may be impossible.\n      - **Take the average attribute value:** Assigning\
    \ the average value of an attribute or the average value over instances that are\
    \ comparable is one way to approximate the missing values.\n      - If an attribute\
    \ has time dependencies, predict its value from prior entries.\n   2. **Remove\
    \ outliers:** Values that are outliers in data deviate significantly to the rest\
    \ of the series and have varying degrees of impact on all learning approaches.\
    \ Confidence intervals and thresholds help detect and eliminate such extreme values.\
    \ Figure [1-11](#625524_1_En_1_Chapter.xhtml#Fig11) shows a typical outlier in\
    \ a dataset.\n\n2. **Data transformation:** By converting the dataset to the format\
    \ expected by a machine-learning algorithm as input, data transformation techniques\
    \ might potentially accelerate the system’s learning process and improve its overall\
    \ performance. By way of example, standardization converts the values such that\
    \ the mean is equal to zero and the deviation is equal to one, under the assumption\
    \ that the data follows a Gaussian distribution as per equation ([1.1](#625524_1_En_1_Chapter.xhtml#Equ1)):\n\
    \   1. **Parsing data:** Validating the format of a string of data or extracting\
    \ pertinent information is an example of this process.\n   2. **Formatting data:**\
    \ Normalizing the range or temporal scale of the data or encoding it in a standard\
    \ encoding format (e.g., `UTF-8` or `int32`) is an example. Additionally, this\
    \ entails the conversion of data into a standardized data schema. For example,\
    \ in the case of aggregating temperature values from several sensor types, it\
    \ may be desirable for them to possess an identical format.\n\n   ![$$ {X}_{std}=\\\
    frac{X-\\underset{\\_}{X}}{\\sigma_X} $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ1.png)\n\
    \n   (1.1)\n\n   Where,\n   - `X` is the original dataset.\n   - `X[std]` is the\
    \ standardized dataset.\n   - ![$$ \\underset{\\_}{X} $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_IEq1.png)\
    \ is the mean of the dataset.\n   - `σ[X]` is the standard deviation of the dataset.\n\
    \n   In contrast, normalization reduces the magnitudes of attribute values to\
    \ a narrow, predetermined interval, often spanning from zero to one:\n\n   ![$$\
    \ {X}_{norm}=\\frac{X-{X}_{min}}{X_{max}-{X}_{min}} $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ2.png)\n\
    \n   (1.2)\n\n   Where,\n   - `X[min]` and `X[max]` are the minimum and maximum\
    \ values in the dataset, respectively.\n\n3. **Data integration**"
