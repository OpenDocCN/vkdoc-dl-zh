- fmt: 'In [16], Mathrani et al. presented an analysis of the 2022 UN data report
    on the progress made toward achieving SDGs with respect to economic, social, environmental,
    and institutional factors. Ward’s method was used as the clustering algorithm,
    to comprehend the degree of advancement of 45 Asian nations, together with their
    general patterns in attaining the SDGs. The findings indicated that East Asian
    nations exhibited subpar performance in the economic aspect, whereas certain countries
    in Southeast Asia and Central and West Asia demonstrated comparatively strong
    performance. In terms of social and institutional aspects, the results suggested
    that East and Central Asian nations exhibited comparatively superior performance
    compared to other countries. West and South Asian countries outperformed other
    Asian countries in the environmental dimension. The authors mentioned that policymakers
    can use these findings to track the progress of countries toward achieving SDGs.


    In [17], Singh and Ru stated that the assessment of the SDG 9 targets is primarily
    based on indicators such as Internet and mobile broadband penetration, logistics
    performance index, university excellence and rankings, funding for research and
    development, industrial changes, emission management, and rural connectivity.
    They thus provide a systematic review of advancements, difficulties, and potential
    future outcomes in achieving SDG 9 targets. The paper mentions that the digital
    disparity in sub-Saharan Africa can be attributed to various factors including
    the ripple effect, GDP, income per capita, governance, laws, population, and state
    of the electrical infrastructure in the country.


    It is also stated that the influence of Internet access on income inequality is
    more pronounced in developing regions compared to developed regions in Asia. The
    review indicated studies that demonstrated a decrease in inequality as a result
    of improved Internet penetration. Likewise, there is a correlation between the
    level of industrial activity and the extent to which the Internet is used, and
    these two factors can be used interchangeably. Finally, the authors mention that
    despite many countries having high mobile broadband subscriptions rates, the speed
    of the networks is of equal importance.


    ## 7.3 Data Processing and Application Design


    This section dives into the implementation of the web application for clustering
    countries based on their development state using unsupervised learning. With a
    combination of HTML and CSS as the front end and JavaScript making up the back
    end, the architecture is broken down, together with the involvement of the K-means
    clustering algorithm, whose implementation is facilitated with `ml.js` [18]. As
    a whole, the application can be used on a dataset containing a list of countries
    with their Internet connectivity throughout decades, where a world map is then
    output to the user, showing each country’s development. Moreover, the user can
    scroll through the years using a slider, showing clearly the phases where a country
    faced improvement or lagged behind with respect to other nations.


    ### 7.3.1 Collection and Description of Dataset


    The dataset used in this work is obtained from Kaggle, a well-known source for
    datasets, typically used for ML projects. It can be found at [19] and was gathered
    from multiple sources and merged together, as stated by the author. The license
    attributed to this dataset is the Creative Commons designation CC0 1.0 Universal
    (CC0 1.0) license [20] stating that the work is dedicated to the public domain
    and is thus free of known restrictions under copyright law, allowing this dataset
    to be copied, modified, distributed, and used for commercial purposes.


    With a collection of four columns of data for each country and its corresponding
    year ranging from 1980 to 2020, this dataset provides substantial information
    to extract meaningful insights. In ML terms, it is treated as an unsupervised
    learning problem since there are no labels associated with each row. The dataset
    thus consists of a total of eight columns, as shown in Figure [7-1](#625524_1_En_7_Chapter.xhtml#Fig1)
    where the values are shown for the first country, i.e., Afghanistan.


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Portion of the Internet dataset


    These columns are further described as follows:


    *   **Entity**: The name of the country corresponding to the data entry

    *   **Code**: The ISO 3166-1 alpha-3 country code representing the country

    *   **Year**: The year for which the data is recorded

    *   **Cellular Subscription**: The percentage of the population in the country
    with cellular subscription

    *   **Internet Users (%)**: The percentage of the population in the country using
    the Internet

    *   **No. of Internet Users**: The number of Internet users in the country

    *   **Broadband Subscription**: The percentage of the population in the country
    with broadband subscription


    ### 7.3.2 Data Preprocessing


    Despite already containing the information needed for unsupervised learning when
    downloaded, this dataset consists of certain irregularities, as listed next:


    ![](images/625524_1_En_7_Chapter/625524_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Before handling zero values


    *   **Filtering regions**: The `Code` column contains several regions or collective
    entities such as East Asia and Pacific, Europe and Central Asia, and European
    Union, which were removed from the dataset. These entries do not represent individual
    countries and were thus excluded to focus specifically on country-level data.

    *   **Excluding sparse data**: Certain countries with incomplete data, such as
    American Samoa and Curacao, among a list of 14, were excluded from the dataset.
    Additionally, entities that are not member states of the UN such as Aruba, Bermuda,
    and British Virgin Islands are also removed. These decisions were made to ensure
    data reliability and to prevent potential misinterpretation of the visualization
    due to a large number of missing or misleading information over several years.

    *   **Handling missing values**: In some instances, the values for a particular
    country and corresponding year might contain a zero value. This could arise due
    to some unavailable data rather than an actual zero value. This is addressed by
    replacing the value in question with that from the previous year. Likewise, the
    missing years for some countries are entered manually, by taking the values for
    the previous year. These adjustments help maintain data consistency and accuracy,
    ensuring that the visualization reflects the actual Internet development trends
    over time for each country. One such example before this change is depicted in
    Figure [7-2](#625524_1_En_7_Chapter.xhtml#Fig2). In this case, it is simply assigned
    the value of `0.005139537`.


    After the data preprocessing phase, the dataset contains 187 countries in total,
    out of the 195 member states of the UN, thereby making up a strong dataset.'
