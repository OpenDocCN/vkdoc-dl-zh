    | CO | 11.75 | 8.39 | 8.67 | 9.96 | 8.04 | 9.36 |

    | PM[10] | 9.58 | 9.57 | 9.21 | 9.24 | 7.83 | 9.09 |

    | PM[25] | 9.45 | 9.44 | 9.05 | 9.09 | 8.02 | 9.01 |


    The PR algorithm was selected as it is an extension of the concept of SLR to cases
    where predictors may be more accurately related to their responses using a polynomial
    function. The curvilinear relationship between the predictor and the response
    is observed. From the results obtained in Table [5-3](#625524_1_En_5_Chapter.xhtml#Tab3),
    it can be observed that the MAPE is low, ranging from 2.35% to 9.36%. The MAPE
    for the concentration of O3 is the lowest at 2.35%. The low values of MAPE indicate
    that the PR algorithm was able to model the variation of air pollutants with time
    accurately.


    ### 6.4.5 Performance of MLP


    Table [6-5](#625524_1_En_6_Chapter.xhtml#Tab5) shows the hyper parameters used
    for the MLP algorithm.


    Table 6-5


    Hyper Parameters of MLP Algorithm


    | Algorithm | Hyper Parameters |

    | --- | --- |

    | MLP | Window Size = 24 x prediction dayNumber of Epochs = 500Learning Rate =
    0.001Momentum = 0.9Error = 0.001Number of hidden layers = 1Number of nodes in
    hidden layer = 24 x prediction day |


    Figure [6-13](#625524_1_En_6_Chapter.xhtml#Fig13) shows the graph of concentration
    of PM10 against time for the MLP algorithm.


    ![](images/625524_1_En_6_Chapter/625524_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Web application output for MLP algorithm


    Table [6-6](#625524_1_En_6_Chapter.xhtml#Tab6) shows the MAPE values obtained
    for the MLP algorithm.


    Table 6-6


    MAPE Values for MLP Algorithm


    | LocationsAirpollutants | Port Louis | Grand Baie | Quatre Bornes | Beau Bassin
    | Flacq | Average |

    | --- | --- | --- | --- | --- | --- | --- |

    | O[3] | 1.89 | 1.51 | 2.88 | 2.12 | 1.56 | 1.99 |

    | CO | 1.33 | 1.19 | 1.71 | 1.84 | 1.32 | 1.48 |

    | PM[10] | 2.35 | 1.73 | 2.12 | 2.89 | 2.45 | 2.31 |

    | PM[25] | 1.57 | 2.72 | 2.15 | 1.78 | 2.01 | 2.05 |


    The MLP algorithm was selected as it has the ability to learn complex nonlinear
    relationships between input and output variables. It is also a universal approximator
    capable of approximating any continuous function. From the results obtained in
    Table [6-6](#625524_1_En_6_Chapter.xhtml#Tab6), the MAPE varies from 1.48% to
    2.31%. The MAPE for concentration of CO is the lowest at 1.48%.


    ### 6.4.6 Performance of LSTM


    Table [6-7](#625524_1_En_6_Chapter.xhtml#Tab7) shows the hyper parameters for
    the LSTM algorithm.


    Table 6-7


    Hyper Parameters of LSTM Algorithm


    | Algorithm | Hyper Parameters |

    | --- | --- |

    | LSTM | Window Size = 24 x prediction dayNumber of Epochs = 500Learning Rate
    = 0.001Momentum = 0.9Error = 0.0001Clear = TrueNumber of hidden layers = 1Number
    of nodes in hidden layer = 24 x prediction day |


    Figure [6-14](#625524_1_En_6_Chapter.xhtml#Fig14) shows the graph of concentration
    of PM10 against time for the LSTM algorithm.


    ![](images/625524_1_En_6_Chapter/625524_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Web application output for LSTM algorithm


    Table [6-8](#625524_1_En_6_Chapter.xhtml#Tab8) shows the MAPE values obtained
    for the LSTM algorithm.


    Table 6-8


    MAPE Values for LSTM Algorithm


    | LocationsAirpollutants | Port Louis | Grand Baie | Quatre Bornes | Beau Bassin
    | Flacq | Average |

    | --- | --- | --- | --- | --- | --- | --- |

    | O[3] | 1.67 | 1.50 | 2.32 | 1.55 | 1.78 | 1.76 |

    | CO | 1.22 | 0.96 | 0.99 | 1.45 | 1.37 | 1.20 |

    | PM[10] | 2.34 | 1.43 | 2.65 | 1.89 | 1.22 | 1.91 |

    | PM[25] | 1.67 | 1.58 | 2.04 | 2.22 | 1.83 | 1.87 |


    The LSTM algorithm was selected as it is well suited for capturing temporal dependencies
    and patterns in sequential data. In regression tasks where the order of the input
    data is important such as time-series data, LSTM can model the temporal relationship
    between observations. The results obtained in Table [6-8](#625524_1_En_6_Chapter.xhtml#Tab8)
    shows that the MAPE values varies between 1.20% and 1.91%. The MAPE for the concentration
    of CO is lowest at 1.20%.


    ### 6.4.7 Performance of Classification Algorithms


    The performance of the KNN, decision tree, and random forest algorithms for predicting
    the AQI based on the amount of air pollutants was evaluated by calculating the
    accuracy for five locations out of the ten selected ones and taking the average
    values. A sample size of 720, which is equivalent to 30 days was used. Table [6-9](#625524_1_En_6_Chapter.xhtml#Tab9)
    shows the accuracy obtained for each algorithm.


    Table 6-9


    Accuracy for Classification Algorithms


    | Algorithm | Accuracy (%) |

    | --- | --- |

    | KNN | 84.3 |

    | DT | 99.5 |

    | RF | 98.9 |


    From the results obtained in Table [6-9](#625524_1_En_6_Chapter.xhtml#Tab9), it
    can be observed that decision tree and random forest have the highest accuracies
    of 99.5% and 98.9%, respectively. KNN performed the least with an accuracy of
    84.3%. Decision tree and random forest are more robust to noisy data and outliers,
    making it better at classifying AQI than KNN. Moreover, KNN is more susceptible
    to overfitting especially with small dataset.


    Machine learning can be used to accurately predict air pollutant levels and categorize
    the AQI, which can be helpful to determine the long-term impacts of engineering
    activities on air quality. This can help to formulate new strategies and policies
    to improve the air quality for the public, contributing to the global achievements
    of SDGs 3 and 13.'
