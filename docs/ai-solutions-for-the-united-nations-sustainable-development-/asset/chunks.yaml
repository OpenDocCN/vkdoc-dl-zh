    Figure [5-3](#625524_1_En_5_Chapter.xhtml#Fig3) shows the flowchart of KNN.


    ![](images/625524_1_En_5_Chapter/625524_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Flowchart of KNN


    **JavaScript Libraries:**


    In the `<head>` section, several JavaScript libraries are included using `<script>`
    tags. These libraries are as follows:


    *   `ml.min.js`: A machine learning library for k-NN classification

    *   `papaparse.min.js`: A library for parsing CSV data


    **User Input Fields:**


    Within the `<body>` section, various user input fields are provided. These include
    the following:


    *   Input fields for specifying the number of rows to display from a dataset file
    and values for different water quality parameters like pH, hardness, solids, chloramines,
    etc.

    *   A file input field (`fileUpload`) for selecting a CSV dataset file.

    *   A button (`upload`) for triggering data display and analysis.


    **Display Data:**


    The user selects a CSV dataset file and clicks the Display Data and Analyze button.
    The JavaScript function `Upload()` is called in response to this button click.


    **CSV File Parsing:**


    The program checks if the selected file is a valid CSV file. If valid, it uses
    the PapaParse library to parse the CSV data, assuming the first row contains headers.
    It also extracts the number of rows to display based on the user’s input.


    **Display Data in HTML:**


    The parsed data is displayed in an HTML table (`dvCSV`) with the specified number
    of rows.


    **Data Preparation for Classification:**


    The program prepares the dataset and labels for k-NN classification. It extracts
    values for various water quality parameters and stores them in arrays. It shuffles
    the dataset to avoid any bias.


    **Data Splitting:**


    The dataset is split into training and validation sets based on a specified split
    ratio (70% training, 30% validation).


    **k-NN Classification:**


    The program performs k-NN classification to predict water potability based on
    user-input parameter values.


    It finds the best value of k (number of neighbors) by trying a range of k values
    and selecting the one with the highest accuracy on the validation set. Using the
    best k value, it creates a k-NN classifier.


    **Validation and Accuracy Calculation:**


    The program uses the trained k-NN classifier to make predictions on the validation
    set. It calculates the accuracy of the model’s predictions by comparing them to
    the actual labels. The accuracy is displayed in an input field.


    **Display Classification Result:**


    The program uses the trained classifier to predict water potability based on user-provided
    parameter values.


    The result (either “potable” or “not potable”) is displayed in an input field.


    #### Decision Tree and Random Forest


    Figure [5-4](#625524_1_En_5_Chapter.xhtml#Fig4) shows the flowchart of random
    forest and decision tree.


    ![](images/625524_1_En_5_Chapter/625524_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Flowchart of random forest and decision tree


    **Read CSV File:**


    *   `FileReader` reads the uploaded CSV file. This task is executed using the
    `reader.readAsText()` function.


    **Process Data:**


    *   CSV data is split into rows and columns, and features and class labels are
    extracted. This task is executed within the `reader.onload` event handler function.


    **Shuffle Dataset:**


    *   The dataset is shuffled randomly to ensure randomness in training. This is
    done using the `shuffleDataset()` function.


    **Split Dataset:**


    *   The shuffled dataset is split into training and validation sets. This is achieved
    using array slicing.


    **Fetch Input Values:**


    *   Input values for prediction are fetched from HTML input elements. This is
    done by accessing the values of specific HTML input elements.


    **Set Classifier Options:**


    *   Options for the decision tree classifier are defined, such as the gain function,
    maximum depth, and minimum number of samples.

    *   Options for the random forest classifier are defined, such as seed, maximum
    features, replacement, and number of estimators.


    **Initialize Classifier:**


    *For decision tree:*


    *   A new decision tree classifier is instantiated with the provided options.
    This is done using the `new ML.DecisionTreeClassifier(options)` constructor.


    *For Random Forest:*


    *   A new random forest classifier is instantiated with the provided options.
    This is done using the `new ML.RandomForestClassifier(options)` constructor.


    **Train Model:**


    *   The classifier is trained using the training dataset. This is done using the
    `classifier1.train()` function.


    **Validate Model:**


    *   Predictions are made on the validation dataset, and accuracy is calculated.
    This task is executed within the `reader.onload` event handler function.


    **Display Validation Accuracy:**


    *   The calculated accuracy is displayed in an HTML input element. This is done
    by setting the value of a specific HTML input element.


    **Predict Class:**


    *   The trained model is used to predict the class of a new instance based on
