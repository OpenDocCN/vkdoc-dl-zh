    trees with CART predicted Jute and Mothbeans, respectively. Figure [3-11](#625524_1_En_3_Chapter.xhtml#Fig12)
    illustrates the confusion matrix for the decision trees, and it can be observed
    that the model may confuse outputs for rice and maize, providing a similarity
    value of 80% for rice and 79% for maize. This may be attributed to the decision
    tree algorithm’s inability to detect small variations in datasets for rice, maize,
    and coffee. However, the other outcomes were correctly predicted, similar to the
    `k-NN` outputs. A significantly high accuracy of 98% was obtained for decision
    trees with the CART algorithm.


