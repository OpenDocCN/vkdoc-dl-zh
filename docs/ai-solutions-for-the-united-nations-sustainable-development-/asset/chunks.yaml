- fmt: 'Lastly, in the domain of multilinear regression, we received a single MAPE
    value, which stood at 42.20%. This model is characterized by its simplicity and
    the provision of coefficients for each predictor variable.


    Multilinear regression’s strengths lie in its simplicity and interpretability.
    It is a straightforward model that is easy to comprehend, and it provides interpretable
    coefficients for each predictor variable. This transparency makes it a valuable
    tool when there is a need to understand the individual contributions of different
    variables to the target variable.


    However, multilinear regression is not exempt from its own set of limitations.
    One of the fundamental assumptions of this model is a linear relationship between
    predictors and the target variable. While this assumption can be valid in many
    cases, it may not accurately capture complex, nonlinear relationships that exist
    in real-world data. Therefore, its performance may not be optimal when the actual
    relationship is not genuinely linear.


    The reported MAPE of 42.20% suggests that the multilinear regression model may
    not adequately grasp the intricacies of the dataset, especially if nonlinear relationships
    are at play. While it may not deliver the same level of predictive accuracy as
    polynomial regression or KNN regression, it still holds relevance and applicability
    in scenarios where simplicity and interpretability are valued over sheer predictive
    power.


    Finally, when comparing the three regression techniques, it became evident that
    polynomial regression, particularly with a degree of 9, achieved the best predictive
    performance, with the lowest MAPE of 7.57.


    ## 2.5 Benefits of Classification in Wind Power Prediction


    Classification in wind power prediction, which involves categorizing wind power
    into low, medium, or high levels, offers a multitude of significant advantages
    crucial for effective energy management and the pursuit of sustainability.


    ### 2.5.1 Accurate Energy Generation Forecasting


    One of the primary benefits of classification models in wind power prediction
    is their ability to provide precise and reliable forecasts of expected wind power
    output. By categorizing wind power into these three levels, energy providers gain
    valuable insights into the availability of energy resources. This information
    is instrumental in scheduling energy production and distribution. For instance,
    when wind power is predicted to be high, energy providers can allocate resources
    and plan to harness this clean and renewable energy source optimally (Verhoef
    et al., 2020).


    ### 2.5.2 Optimized Energy Distribution


    Predicting wind power levels in low, medium, or high categories empowers energy
    grid operators to make well-informed decisions regarding the balance of electricity
    supply and demand. Grid operators can allocate resources more efficiently, adjust
    energy generation according to forecasted wind power levels, and strategically
    activate or deactivate power plants to meet consumer needs without overloading
    or underutilizing the grid. This optimization enhances the overall reliability
    and efficiency of energy distribution (Brázdil et al., 2019).


    ### 2.5.3 Cost Reduction


    Classification models play a pivotal role in cost reduction within the energy
    sector. By accurately predicting wind power levels, energy providers can minimize
    their reliance on backup power sources, such as fossil fuels, during low wind
    power generation periods. This reduction not only results in cost savings by reducing
    fuel expenses but also decreases operational costs associated with conventional
    power generation. In essence, it fosters a more cost-effective and sustainable
    energy production process (Gupta et al., 2021).


    ### 2.5.4 Grid Stability


    Wind power generation is inherently variable due to fluctuations in wind speed
    and direction. Classification models offer early warnings and insights into potential
    fluctuations in wind power output. Armed with this information, grid operators
    can proactively manage the energy grid, ensuring a stable and consistent energy
    supply. By preemptively addressing variations in wind power, these models help
    prevent power outages and maintain grid stability, especially during periods of
    rapidly changing weather conditions (Thomas et al., 2022).


    ### 2.5.5 Enhanced Energy Planning


    Classification-based wind power predictions significantly benefit energy infrastructure
    planning. Energy providers and stakeholders can make informed decisions about
    the construction, expansion, and maintenance of wind farms and related infrastructure.
    This level of foresight ensures that energy infrastructure aligns with current
    and future energy demands efficiently. By investing in the right projects at the
    right time, energy providers can maximize the utilization of wind energy resources
    and bolster the overall sustainability of their operations (Larson et al., 2023).


    ## 2.6 Summary


    The aim of this chapter was to use machine learning to predict wind power using
    data obtained from a dataset from Kaggle while targeting SDG 7, which aims at
    increasing the use of clean energy by using sustainable approaches globally. Polynomial
    regression, KNN regression, KNN classification, and multilinear regression were
    used in the chapter, and the accuracy of the three machine learning algorithms
    was then compared.


    Essentially, a web page was built using HTML and JavaScript that will allow the
    user to enter the independent variables: wind speed, wind direction, pressure,
    and air temperature, and the predicted power value and accuracy will be outputted
    on the web page. A MAPE value of 7.57% was obtained when a degree of 9 for polynomial
    regression was used indicating the highest accuracy value. For KNN regression,
    the lowest MAPE which of 13.288% was obtained when a `k` value of 4 was used.
    For multiple linear regression, a MAPE of 42.20% was obtained, which demonstrated
    that the model’s predicted value was not highly accurate for KNN classification.


    A limitation of the chapter is that no API was used to obtain real-time data to
    perform a real-time prediction based on timing values. An interesting future work
    would be to use more machine learning algorithms such as multiple linear perceptron
    to compare the different accuracies of the models used. The main conclusion of
    this chapter is that machine learning algorithms can be used to increase the use
    of green technologies to produce energy efficiently. Machine learning algorithms
    can be used in energy industries to help improve the efficiency of sustainable
    energy systems. While doing so, it can also be concluded that machine learning
    algorithms can be used to achieve SGD target goals and help improve the condition
    of the environment and the welfare of the community.'
