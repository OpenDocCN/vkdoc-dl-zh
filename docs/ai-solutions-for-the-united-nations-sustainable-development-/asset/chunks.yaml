    ### 5.5 Summary


    The primary objectives of the chapter revolve around addressing SDGs 3, 6, and
    12, which encompass good health and well-being, clean water and sanitation, and
    responsible consumption and production, respectively. To accomplish these objectives,
    an in-depth analysis of a dataset available from Kaggle related to water potability
    was conducted. The results highlighted significant variations in the performance
    of the four algorithms employed: decision tree, random forest, k-nearest neighbors
    (KNN) and naïve Bayes. Remarkably.


    Essentially, a web page was designed in JavaScript and HTML whereby the user will
    be asked to enter the value of pH, hardness, solids, chloramines, sulfate, conductivity,
    organic carbon, trihalomethanes, and turbidity. Based on these values entered,
    it will predict whether the water is potable or not. Naïve Bayes emerged as the
    frontrunner with an exceptional accuracy rate of 99.95%. This remarkable performance
    suggests that naïve Bayes can be a robust choice for distinguishing between potable
    and nonpotable water. Decision tree, KNN, and random forest all had an accuracy
    of around 58%.


    ## 6. Air Quality Monitoring: A Case Study for the Application of Machine Learning
    in Meeting SDGs 3 and 13


    **Chapter authors:**


    Aunowar Farhaan Mohammad Jeelany, `farhaanaunowar@gmail.com`


    Munisamy Sodiyen, `munisamysodiyen@gmail.com`


    Ragoo Navish Kumar, `navishragoo@gmail.com`


    Kwok Hin John Darren Johsua, `darrenkwok2000@gmail.com`


    Hawseea Mohammed Fayez, `fayezunknown@gmail.com`


    Appadoo Sarvesh Sanjeevi, `sarvesh.appadoo1@gmail.com`


    Department of Electrical and Electronic Engineering, University of Mauritius


    The United Nations Sustainable Development Goals (SDGs) are dedicated to enhancing
    healthcare and education, reducing inequality, fostering economic growth, and
    addressing the challenges posed by climate change, among other initiatives beneficial
    for the planet and its inhabitants. Machine learning (ML) stands as a potent tool
    for harnessing vast amounts of data, making predictions, and uncovering patterns.
    This capability enables proactive decision-making, facilitating optimizations
    within core systems and distribution channels.


    In this chapter, a web application was meticulously crafted to forecast air quality
    across multiple locations in Mauritius, aligning with the objectives of SDG 3
    (Good Health and Well-Being) and SDG 13 (Climate Action). Leveraging the Weatherbit.io
    API, historical air quality data was procured to predict the Air Quality Index
    (AQI) and concentrations of key air pollutants, namely, O[3], CO, PM10, and PM25.
    Three ML algorithms were employed: simple linear regression (SLR), multilayer
    perceptron (MLP), polynomial regression (PR) and long short-term memory (LSTM).


    Furthermore, various ML classification algorithms, namely, k-nearest neighbor
    (k-NN), decision tree (DT), and random forest (RF) were utilized to effectively
    classify the AQI levels. DT and RF have the highest accuracies of 99.5% and 98.9%,
    respectively. k-NN performed the least with an accuracy of 84.3%. The SLR, MLP,
    PR, and LSTM algorithms showcased varying accuracies in predicting air pollutant
    concentrations and AQI levels. The performance of these algorithms was thoroughly
    assessed using Mean Absolute Percentage Error (MAPE) as a performance metric.
    The MAPE for SLR ranged from 6.81% to 12.99%, while for PR it varied from 2.35%
    to 9.36%. The MAPE for MLP was between 1.48% and 2.31%, and for LSTM, it spanned
    from 1.20% to 1.91%. The MLP and LSTM algorithms stood out for their lower MAPE
    values, showing their ability to capture complex patterns in the data.


    This research highlights the potential of ML methods for predicting air quality
    and improving public health. The web application offers real-time air quality
    predictions and insights for Mauritius, supporting global efforts toward the UN
    SDGs.'
