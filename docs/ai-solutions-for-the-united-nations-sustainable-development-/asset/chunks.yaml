- fmt: '### 3.3.4 Layout of Web Application


    Figure [3-4](#625524_1_En_3_Chapter.xhtml#Fig4) shows the web application layout.


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig4_HTML.jpg)


    **Figure 3-4** Web application layout


    Figure [3-5](#625524_1_En_3_Chapter.xhtml#Fig5) shows the flowchart for the classification
    of crops. First, the program will wait for the user to select the dataset, which
    will be in form of a CSV file. Using the `FileReader` dependency, the CSV file
    is read, and from this object, each row and column can be extracted. To extract
    the rows and columns, a library called `PapaParse` [18] is used as it provides
    easy integration of reading and working with CSV files.


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig5_HTML.jpg)


    **Figure 3-5** Flowchart for classification


    The data from the file is displayed on the web page for users to analyze. A `for`
    loop is used to iterate over the number of rows so that each column can be stored
    in an array. After iterating over the whole dataset, a new array is created to
    store the data in the same row order as they were in the CSV file. Another array
    is created to store the labels only, which will be used to check the accuracy
    of the machine learning model at a later stage.


    When all the data are set programmatically, the application will read the user
    inputs from the text fields. The input consists of the contents of nitrogen, phosphorous,
    potassium, temperature value, humidity value, pH value, and rainfall value. The
    machine learning model is created depending on whether the user chooses the `knn.js`,
    `decisiontree.js`, `randomforest.js`, or `mlp.js` for the algorithm. The input
    is passed as an argument to the machine learning object, and the classification
    of the crop is performed. The obtained result is displayed on the webpage.


    The library used for the machine learning model is [19]. Table [3-1](#625524_1_En_3_Chapter.xhtml#Tab1)
    describes the associated functions and methods.


    **Table 3-1** Summary of Methods for Classification


    | Methods | Description |

    | --- | --- |

    | `runBtn.onclick()` | Event listener for user’s button click |

    | `radioButton.checked` | Returns Boolean value whether a specific radio button
    is selected |

    | `FileReader()` | Creates an object to read a file |

    | `reader.onload(){}` | Event listener for successful loading of the file |

    | `Papa.parse()` | Parse the csv file to obtain the content |

    | `array.push()` | Adds the data to an array |

    | `document.createElement("")` | Creates element for the HTML page dynamically
    |

    | `container.appendChild("")` | Adds the element to the HTML page |

    | `ML.KNN()` | Creates a model for KNN |

    | `ML.DecisionTreeClassifier()` | Creates a model for decision tree classification
    |

    | `ML.RandomForestClassifier()` | Creates a model for random forest classification
    |

    | `model.train()` | Trains the model |

    | `model.predict()` | Uses the model to classify the input data and gives the
    result |

    | `Brain.NeuralNetwork()` | Creates a neural network for classification |

    | `network.train()` | Trains the neural network |

    | `network.run()` | Passes input in the neural network to obtain a prediction
    |


    Figure [3-6](#625524_1_En_3_Chapter.xhtml#Fig6) shows the flowchart to analyze
    the model accuracy.


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig6_HTML.jpg)


    **Figure 3-6** Flowchart for model accuracy


    To test the accuracy of each model, a confusion matrix is implemented using the
    `ML.js` dependency itself. To use the confusion matrix, the original set of labels
    is stored. Depending on the chosen algorithm, a machine learning model is created.
    The application will loop over each row in the dataset and take the values of
    the fields as input for the model. The predicted output is stored in a new array.
    The process is repeated with every row of the dataset. Finally, a new array of
    labels will be obtained with outputs obtained with the model. A confusion matrix
    object is created using `TensorFlow.js` [20] and `d3.js` [21]. The original and
    predicted label are passed as arguments. The accuracy is obtained by calling the
    `getAccuracy` method. Table [3-2](#625524_1_En_3_Chapter.xhtml#Tab2) summarizes
    the methods for accuracy.


    **Table 3-2** Summary of Methods for Accuracy


    | Methods | Description |

    | --- | --- |

    | `ML.confusionMatrix.fromLabels()` | Creates a confusion matrix that will use
    the labels |

    | `confusionMatrix.getAccuracy()` | Returns a double value which represent the
    percentage accuracy of the model |


    ## 3.4 Application Testing and Analysis


    This section illustrates in detail the different algorithms used and their outcomes.
    A critical analysis is also performed to analyze their impact on the SDGs 2, 9,
    and 12. The four algorithms implemented, k-NN, decision trees, random forest,
    and MLP, are built within a single HTML page, whereby the user can select one
    of each algorithm and perform crop classification. The subsections describe the
    experiments for each algorithm, with their model parameters and hyperparameters
    and different functions used. Since we are dealing with a classification problem,
    we evaluated the ML model by using a confusion matrix. It is simply a table comparing
    the similarity level between the predicted and true outcomes. The confusion matrix
    gives a clear indication of what percentage accuracy the model predicts the actual
    outcome for a specified crop. As we have 22 crops to classify, a 22 x 22 matrix
    table was built to determine the performance of the ML technique. We calculated
    the model’s accuracy by computing the number of true predictions over the total
    number of predictions.


