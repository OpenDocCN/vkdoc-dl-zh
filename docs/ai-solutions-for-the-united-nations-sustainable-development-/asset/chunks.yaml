- fmt: '一种土壤肥力技术在文献[15]中进行了分析，该技术将作物产量率分为低、中、高三个等级，其中被归类为低的土壤意味着作物产量差，而高则意味着作物适应性极佳。本文的目标是确定所测试的土壤（土地）是否包含良好作物收获所需的化学成分。土壤肥力类别是根据预定义条件确定的，这些条件将土壤类型分为`L`、`M`或`H`。该论文使用朴素贝叶斯和`k-NN`作为分类机器学习模型，根据所测试土地的化学参数来预测土壤肥力。该方法有助于农民推断土地的收获可行性以及土壤的作物产量能力。


    ## 3.3 数据处理与应用设计


    本节详细描述了用于作物预测的Web应用程序的实现。该系统基于`JavaScript`和`HTML`构建，使用`ML.js`作为依赖项来实现`K-NN`、决策树和随机森林分类。该应用程序旨在为用户提供一个友好的界面，以便根据输入进行预测。


    ### 3.3.1 数据收集过程与数据集描述


    本研究的数据是通过在Kaggle（一个著名的数据科学和机器学习爱好者平台）上进行彻底搜索而收集的。本研究中使用的数据集可在[16]中找到。Kaggle是一个信誉良好的资源库，托管着来自世界各地研究人员、数据科学家和组织贡献的大量数据集。这个特定的数据集提供了与作物推荐相关的宝贵信息，使其成为我们分析和研究目的的合适选择。


    该数据集包含八列，如图[3-1](#625524_1_En_3_Chapter.xhtml#Fig1)所示。


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig1_HTML.jpg)


    图3-1 作物数据集


    各列如下：


    *   **N：** 土壤中的氮含量比

    *   **P：** 土壤中的磷含量比

    *   **K：** 土壤中的钾含量比

    *   **Temperature：** 以摄氏度为单位的大气温度

    *   **Humidity：** 以百分比为单位的相对湿度

    *   **pH：** 土壤的pH值

    *   **rainfall：** 以毫米为单位的降雨量

    *   **label：** 作物名称


    该数据集包含22种作物的2200条数据，每种作物100条数据。涉及的作物包括咖啡、黄麻、棉花、椰子、木瓜、橙子、苹果、甜瓜、西瓜、葡萄、芒果、香蕉、石榴、扁豆、黑豆、绿豆、蛾豆、木豆、芸豆、鹰嘴豆、玉米和水稻。


    ### 3.3.2 数据预处理步骤


    为了执行决策树和随机森林分类，需要对标签进行编码，因为字符串标签会导致`ML.js`依赖项出错。因此，为了预处理数据集，使用了一个名为Pandas的Python库来对标签进行编码。标签编码过程是使用一个名为Google
    Colab的在线集成开发环境完成的。Colab是一个基于云的Jupyter Notebook平台，提供了一种廉价、无需设置的解决方案。它非常适合机器学习建模，提供对图形处理单元（GPU）和张量处理单元（TPU）的访问[17]。数据可以轻松地操作和显示。


    图[3-2](#625524_1_En_3_Chapter.xhtml#Fig2)展示了数据预处理步骤的流程图。首先，导入Pandas的依赖项。Pandas是一个用于数据分析的Python库。由于使用的是Google
    Colab，因此还需要导入数据集。要加载数据集，必须将驱动器存储挂载到Colab应用程序上。加载驱动器后，通过调用Pandas的`read_csv()`方法来读取CSV文件格式的数据集。


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig2_HTML.jpg)


    图3-2 数据预处理流程图


    为了对标签进行编码，定义了一个字典来将标签映射到其对应的值。调用`map()`方法向数据集添加一个包含编码后标签的列。现在，每个标签都将有一个对应的数字来表示它。


    ### 3.3.3 程序结构


    图[3-3](#625524_1_En_3_Chapter.xhtml#Fig3)以框图形式展示了所实现的机器学习分类算法的编程模型。需要注意的是，本章的所有代码都可以在本书GitHub页面上托管的`Chapter
    3 – Codes`文件夹中找到。


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig3_HTML.jpg)


    图3-3 Web应用程序的程序结构


    运行应用程序的主文件是`index.js`文件。它持有一个按钮的事件监听器，该按钮将根据用户的选择运行相应的算法。提供了一个单选按钮组，用户可以在其中选择运行`k-NN`、决策树分类器、随机森林分类器或多层感知器。`index`文件使用`if-else`语句来验证哪个单选按钮被选中，然后调用该算法对应的方法。


    `global_variables.js`文件保存了Web应用程序中使用的所有变量，包括HTML元素（如容器、单选组、文本字段和按钮）以及用于存储从数据集中读取的值的数组。'
  raw: 'A soil fertility technique was analyzed in [15] in which the crop yield rates
    were categorized in terms of three classes, Low, Medium, and High, whereby soil
    categorized as low implies poor crop yielding, while high implies excellent crop
    adaptability. The goal of this paper was to determine whether the soil (land)
    tested comprises the entailed chemical compositions for good crop harvesting.
    The soil fertility categories are determined from predefined conditions that classifies
    the soil type by L, M, or H. The paper used naïve Bayes and k-NN as classification
    ML models to predict the soil fertility based on the chemical parameters of the
    land tested. This method aids farmers in deducing the land’s viability for harvesting
    and the soil’s ability for crop yield.


    ## 3.3 Data Processing and Application Design


    This section provides a thorough description of the implementation of the web
    application used for crop prediction. The system is built on JavaScript and HTML,
    using ML.js as a dependency to implement K-NN, decision trees, and random forest
    classification. The aim of the application is to provide a user-friendly interface
    for users to perform prediction based on the inputs.


    ### 3.3.1 Data Collection Process and Description of the Datasets


    The data for this work was collected by conducting a thorough search on Kaggle,
    a well-known platform for data science and machine learning enthusiasts. The dataset
    used in this study can be found at [16]. Kaggle is a reputable resource that hosts
    a vast array of datasets contributed by researchers, data scientists, and organizations
    from around the world. This particular dataset provides valuable information related
    to crop recommendation, making it a suitable choice for our analysis and research
    purposes.


    The dataset consists of eight columns as shown in Figure [3-1](#625524_1_En_3_Chapter.xhtml#Fig1).


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Crop dataset


    The columns are as follows:


    *   **N:** The nitrogen content ratio in the soil


    *   **P:** The phosphorus content ratio in the soil


    *   **K:** The potassium content ratio in the soil


    *   **Temperature:** The atmospheric temperature in degree Celsius


    *   **Humidity:** The relative humidity in %


    *   **pH:** The pH value of the soil


    *   **rainfall:** The amount of rainfall in mm


    *   **label:** The name of the crop


    The dataset entails of 2,200 data for 22 crops, with 100 data per crops. The crops
    involved are coffee, jute, cotton, coconut, papaya, orange, apple, muskmelon,
    watermelon, grapes, mango, banana, pomegranate, lentil, black gram, mung bean,
    moth beans, pigeon peas, kidney beans, chickpea, maize, and rice.


    ### 3.3.2 Data Preprocessing Steps


    To perform decision tree and random forest classification, the labels should be
    encoded as the string labels would result in errors for the ML.js dependency.
    Therefore, to preprocess the dataset, a Python library known as Pandas was used
    to encode the labels. The process of encoding the label is done using an online
    integrated development environment called Google Colab. Colab is a cloud-based
    Jupyter Notebook platform that provides an inexpensive, no-setup solution. It
    is ideal for machine learning modeling, offering access to graphics processing
    units (GPUs) and tensor processing units (TPUs) [17]. The data can easily be manipulated
    and displayed.


    Figure [3-2](#625524_1_En_3_Chapter.xhtml#Fig2) shows the flowchart for the data
    preprocessing step. First, the dependency for Pandas is imported. Panda is a Python
    library for data analysis. Since Google Colab is being used, the dataset also
    needs to be imported. To load the dataset, the drive storage has to be mounted
    on the Colab application. After loading drive, the dataset. which is in a CSV
    file format, is read by calling panda’s `read_csv()` method.


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Flowchart for data preprocessing


    To encode the labels, a dictionary is defined to map the labels to their corresponding
    values. The `map()` method is called to add a column to the dataset with the encoded
    label. Now each label will have a corresponding number to represent them.


    ### 3.3.3 Program Structure


    Figure [3-3](#625524_1_En_3_Chapter.xhtml#Fig3) shows the programming model as
    block diagrams for the machine learning classifications algorithm implemented.
    It is to be noted that all the code for this chapter can be found in the folder
    `Chapter` [`3`](#625524_1_En_3_Chapter.xhtml) `– Codes` hosted on the GitHub page
    for this book.


    ![](images/625524_1_En_3_Chapter/625524_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Program structure for web application


    The main file that runs the application is the `index.js` file. It holds the event
    listener for a button that would run the algorithms depending on what the user
    chose. A radio button group is available from which user can pick whether to run
    the k-NN, decision tree classifier, random forest classifier, or multilayer perceptron.
    The index file uses an if-else statement to verify which radio button is checked
    and then call the corresponding method for that algorithm.


    The `global_variables.js` files hold all the variables used throughout the web
    application including HTML elements, such as containers, radio group, text fields
    and buttons, and arrays to store the values read from the dataset.'
