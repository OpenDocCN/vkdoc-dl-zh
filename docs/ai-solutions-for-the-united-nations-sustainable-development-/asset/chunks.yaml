  trans: "\n## 4.3 数据处理与应用设计\n\n### 4.3.1 数据收集流程与数据集描述\n\n我们从多个来源收集数据，创建了一个多样化的数据集，用于预测毛里求斯制造业产生的二氧化碳排放量和温室气体排放量。\n\
    \n-   我们从“Our World in Data”网站收集了按行业划分的二氧化碳排放量和按行业划分的温室气体排放量数据。该数据集包含多个国家、制造业和交通运输等行业以及\
    \ 1990 年至 2019 年间的信息 [18] [19]。\n-   此外，我们还整合了“世界银行”网站提供的 1990 年至 2019 年毛里求斯的人口数量和年度\
    \ GDP 增长数据。这一步使我们能够理解 GDP 与毛里求斯制造业产生的二氧化碳排放量及温室气体排放量之间的相关性 [20] [21]。\n\n收集完这些数据集后，我们提取了毛里求斯的具体信息，同时剔除了缺失值和重复值。随后，我们将数据合并并标准化为一个统一的数据集。最终数据集包含\
    \ 31 条记录，包括 1990 年至 2019 年间的人口数量、年度 GDP 增长、二氧化碳排放量以及制造业的温室气体排放量。目标是基于年度 GDP 增长和人口数量等因素，预测毛里求斯制造业的二氧化碳和温室气体排放量。\n\
    \n图 4-1 展示了我们数据集的一个快照，其中包含几个数据点；\n\n![](img/625524_1_En_4_Fig1_HTML.jpg)\n\n图\
    \ 4-1\n\n数据集中的几个数据点\n\n### 4.3.2 数据预处理步骤\n\n在数据预处理阶段，原始数据在被送入机器学习模型之前，会被准备并转换为合适的格式。在我们考虑的数据中，存在一些手动移除的异常值。通过数据预处理，执行了诸如数据清洗和手动移除部分异常值等特定任务，以提高机器学习模型的效率。此外，由于参数在特定年份范围内（1990\
    \ 年至 2019 年）似乎具有更一致的分析价值，因此仅考虑了该年份范围。\n\n数据预处理阶段被分为以下几个阶段。\n\n#### 数据预处理阶段\n\n\
    -   **数据清洗：** 在合并后的 CSV 文件中，包含国家、年份、人口、年度 GDP 增长、二氧化碳排放量和温室气体排放量等信息。为了提高工作质量，我们再次检测了不准确、重复或空值。\n\
    -   **噪声数据：** 噪声数据指的是不必要的数据，在本例中即与其他行业（非制造业）相关的信息。异常值也可能是噪声数据的来源，因此已被移除。\n-  \
    \ **缺失数据：** 某些参数存在数据缺失。然而，大多数机器学习算法无法处理缺失值。在处理数据集缺失数据的几种可用方法中，由于属性数值较大，我们通过目视识别了缺失数据。移除缺失值不会对数据集的分布产生重大影响。某些属性存在空值。但是，我们选择不填充缺失值，因为填充缺失值会影响异常值分析。\n\
    \n我们的数据集中没有结构错误，包括拼写错误。原因可能是数据的数值性质。由于差异清晰可见，数据清洗阶段已成功手动完成。\n\n#### 特征选择与属性移除\n\
    \n在此阶段，针对预测变量选择了最重要的变量（特征/属性）。\n\n选定的自变量是人口规模（百万）和年度 GDP 增长（%），而因变量是与制造业相关的二氧化碳和温室气体排放量（十亿吨）。\n\
    \n## 4.4 分析程序结构\n\n本作业中使用的机器学习模型的程序结构提供了对回归技术的全面探索，以理解和预测二氧化碳和温室气体排放。在我们追求与可持续发展目标\
    \ 9 和 13 相关的可持续工业化和气候缓解的过程中，我们部署了三种不同的方法：简单线性回归、多元线性回归和 k-近邻算法。使用 HTML，展示了执行 CSV\
    \ 文件上传、数据解析、回归分析和数据可视化等任务的网站，使用了以下库：\n\n-   `ml.js` [22]\n\n    `ml.js` 是一个用于\
    \ JavaScript 中机器学习任务的机器学习库，提供各种机器学习算法和数据分析工具。\n\n-   `Papaparse.js` [23]\n\n \
    \   `PapaParse` 是一个强大的多线程 CSV 解析库，可在网页上运行，解析本地系统上的文件。它将其转换为易于用于分析的结构化数据。\n\n-\
    \   `Plotly.js` [24]\n\n    `Plotly.js` 是一个高级声明式图表库，用于创建交互式且视觉上吸引人的数据可视化，例如图表以及二维和三维图表。\n\
    \n-   `Math.js` [25]\n\n    `math.js` 是一个功能强大的 JavaScript 数学库，允许您执行各种数学运算，包括代数、微积分、线性代数和矩阵运算。\n\
    \n请注意，本章的所有代码都位于本书 GitHub 页面上的 `Chapter 4 – Codes` 文件夹中。图 4-2 展示了 HTML 文件的程序结构，以及每个机器学习算法的函数及其相互连接。\n\
    \n![](img/625524_1_En_4_Fig2_HTML.jpg)\n\n图 4-2\n\n程序结构\n\n图 4-3 展示了多元线性回归网站的一般布局。机器学习算法，即简单线性回归和\
    \ k-近邻算法，遵循图 4-2 中展示的相同一般布局。\n\n![](img/625524_1_En_4_Fig3_HTML.jpg)\n\n图 4-3\n\
    \nWeb 应用的一般布局\n\n表 4-1 描述了简单线性回归、多元线性回归和 k-近邻算法各自的函数和方法。\n\n表 4-1\n\n函数与方法：简单线性回归、多元线性回归和\
    \ k-近邻算法\n\n| 方法 | 描述 |\n| --- | --- |\n| `FileReader()` | 创建一个对象以读取文件内容 |\n|\
    \ `reader.onload(){}` | 文件成功加载的事件监听器 |\n| `Papa.parse()` | 读取从本地目录选择的 CSV 文件 |\n\
    | `parseFloat()` | 将 CSV 文件中的值转换为浮点数 |\n| `array.push()` | 提取原始数据值并将其填充到数组中 |\n\
    | `document.getElementById()` | 返回一个元素对象，该对象表示 ID 与指定字符串匹配的元素 |\n| `Math.sqrt()`\
    \ | 使用 `Math.js` 库执行平方根运算 |\n| `ML.SimpleLinearRegression()` | 为简单线性回归创建模型 |\n\
    | `regression.predict()` | 使用简单线性回归模型根据用户提供的输入值预测二氧化碳/温室气体的值 |\n| `ML.MultivariateLinearRegression()`\
    \ | 为多元线性回归创建模型 |\n| `mlr.predict()` | 使用多元线性回归模型根据用户提供的输入值预测二氧化碳/温室气体的值 |\n|\
    \ `ML.KNN()` | 为 k-近邻算法创建模型 |\n| `knn.predict()` | 使用 k-近邻模型根据用户提供的输入值预测二氧化碳/温室气体的值\
    \ |\n| `Math.abs()` | 返回平均绝对百分比误差的绝对值 |\n| `Plotly.newPlot()` | 为原始数据集以及预测的二氧化碳和温室气体排放量生成三维散点图\
    \ |\n"
- fmt: '### 4.4.1 Simple Linear Regression (SLR)


    Simple linear regression (SLR) was used as a web-based analysis tool for CO[2]
    and GHG emissions prediction based on the GDP annual growth using `ML.SimpleLinearRegression`
    from the `ml.js` library.


    The prediction process is performed when the `Upload()` function is called upon
    clicking the Display Data and Analyse button.


    The dataset of CO[2] emissions against GDP and GHG emissions against GDP are plotted.
    The regression line and predicted values of CO[2] and GHG are plotted using the
    `Plotly.js` library. Furthermore, MAPE is also calculated, and an Other Gases
    value is computed as the difference between the GHG and CO[2] emissions. Lastly,
    a text field was added to indicate the necessary actions to be taken whether the
    predicted value of GHG emissions exceeds the threshold of 25,000 or not.


    Figure [4-4](#625524_1_En_4_Chapter.xhtml#Fig4) shows the flowchart of the SLR
    algorithm.


    ![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig4_HTML.jpg)


    Figure 4-4 Flowchart, SLR


