    # 6.5 总结


    总之，本研究聚焦于开发一个利用机器学习算法预测空气污染物浓度并对空气质量指数进行分类的网页应用程序。数据收集过程涉及通过 `Weatherbit.io` 空气质量
    API 检索毛里求斯 10 个选定地点的小时级历史空气质量信息。选定的监测空气污染物包括 `PM[10]`、`PM[25]`、`CO` 和 `O[3]`。


    该网页应用程序的程序结构分为不同部分，包括网站布局、线性回归和多项式回归的实现，以及使用 `LSTM`/`MLP` 算法进行预测。此外，还实现了分类算法（`k-NN`、决策树和随机森林），用于根据空气污染物浓度对
    AQI 进行分类。


    网页应用程序的测试证明了其功能性，能够为用户提供准确的空气污染物浓度预测和 AQI 分类。对回归算法，包括简单线性回归（`SLR`）、多项式回归（`PR`）、多层感知器（`MLP`）和长短期记忆网络（`LSTM`）的性能进行了评估。每种算法在预测空气污染物浓度方面表现出不同的准确度，MAPE
    值表明了模型的有效性。`SLR` 的 MAPE 范围为 6.81% 至 12.99%，而 `PR` 的 MAPE 范围为 2.35% 至 9.36%。`MLP`
    的 MAPE 介于 1.48% 和 2.31% 之间，`LSTM` 的 MAPE 则介于 1.20% 和 1.91% 之间。值得注意的是，`MLP` 和 `LSTM`
    算法表现出较低的 MAPE 值，表明它们能够捕捉数据中复杂的非线性关系。


    此外，还评估了分类算法在预测 AQI 等级方面的准确性。决策树和随机森林算法的表现优于 `k-NN`，分别达到了 99.5% 和 98.9% 的高准确率。


    这些结果表明，机器学习模型在预测空气污染物浓度和 AQI 等级方面是有效的，这对于评估空气质量以及为公共卫生和环境管理做出明智决策至关重要。本研究的发现有助于理解如何应用机器学习来准确预测和分类空气质量指标。本研究开发的网页应用程序可作为用户获取毛里求斯空气质量实时预测和分类的实用工具。这项研究通过为环境监测和公共卫生改善提供宝贵见解，与全球可持续发展目标，特别是
    SDG 3（良好健康与福祉）和 SDG 13（气候行动）保持一致。


    # 7. 针对可持续发展目标 7、9 和 11 的全球互联网连接发展聚类分析


    **本章作者：**


    Lavesh Babooram, `lavesh.babooram1@umail.uom.ac.mu`


    Tulsi Pawan Fowdur, `p.fowdur@uom.ac.mu`


    毛里求斯大学电气与电子工程系


    本章探讨了全球互联网连接发展的格局及其影响，特别关注可持续发展目标（SDGs）7、9 和 11。这些目标和指标作为衡量联合国（UN）所制定目标成功与否的标准，在本章中主要围绕技术基础设施的扩展以及信息和通信技术接入的增加。因此，我们利用
    `K-means` 聚类算法开发了一个交互式应用程序，能够处理和可视化 1980 年至 2020 年全球互联网连接趋势。以 `HTML`、`CSS` 和 `JavaScript`
    语言作为此网络架构的支柱，该无监督学习模型向用户展示了一个等值线世界地图，代表了 187 个国家在欠发达、新兴、发展中、发达和高度发达这五个集群中的发展状态。


    用户界面上的组件允许输入一个包含四个主要变量的数据集，包括蜂窝订阅数、互联网用户百分比、互联网用户数量和宽带订阅数。在对这个最初从 Kaggle 获取的数据集进行数据预处理后，最终用户能够观察到过去四十年的数字鸿沟和互联网普及情况。展示了全球互联网的演变，揭示了地理差异、连接受限的地区以及服务不足的人群。结果表明，到
    2020 年，大多数国家已达到发达或高度发达状态，但一些非洲和亚洲国家仍面临艰巨挑战。


    因此，该应用程序可以作为制定针对性干预措施以解决数字不平等问题的工具。此外，本研究还包含了对研究结果对于政策制定者、投资者、研究人员和国际合作者影响的讨论，从而有助于实现
    SDG 目标 7.b、9 和 11.c。

    '
- fmt: '# 7.1 Introduction


    The swift progress of technology, particularly in the field of machine learning
    (ML), has significantly transformed the approach of analyzing and tackling intricate
    global challenges in recent times. With its ability to sift through vast amounts
    of data and identify patterns, ML is extensively used to address urgent global
    complexities such as the uneven development of Internet connectivity around the
    world today [1]. These disparate levels of communication and connectedness are
    directly linked to socioeconomic growth and opportunities, given that the main
    backbone for instantaneous access to information today remains the colossal seepage
    of the Internet into daily human life.


    The United Nations (UN) Sustainable Development Goals (SDGs) provide a comprehensive
    framework for navigating through labyrinths that surround global challenges, including
    the issue of unequal access to technology, known as the digital divide. As per
    the International Telecommunication Union (ITU), despite the accelerated progress
    in the deployment of Internet facilities around the world, at the end of 2023,
    about one-third of the global population, or 2.6 billion people, remain offline
    [2]. The organization, however, highlighted this enhancement in connectivity since
    it represents further progress toward inclusivity, in turn aligning with the UN
    SDGs, as stressed upon by the ITU Secretary-General Doreen Bogdan-Martin, who
    said that “We won’t rest until we live in a world where meaningful connectivity
    is a lived reality for everyone, everywhere” [3].


    The targets 7.b, 9, and 11.c directly pertain to the need for expanding infrastructure
    and technology, in turn promoting access to all, which would subsequently enhance
    scientific research and particularly help countries facing the uphill battle toward
    development. Target 7.b [4] aims to enhance the availability of cost-effective
    and enduring energy resources for developing countries, which can be partly achieved
    with the use of the Internet. The limited availability of electricity in developing
    regions presents a major obstacle to the adoption of the Internet due to the absence
    of a dependable energy infrastructure. As per the World Bank, sub-Saharan Africa’s
    share of the global population with electricity jumped to 50.6% in 2021 from 46.3%
    in 2018, which still conveys that a major proportion of individuals do not have
    access to electricity, which hampers their capacity to utilize online resources
    and engage in the digital economy. Target 9 [5] seeks to develop resilient facilities
    to encourage a sustainable and equitable industrialization and drive innovation.


    Access to inexpensive and reliable Internet is a prerequisite for promoting economic
    expansion. According to research conducted by the World Economic Forum, raising
    Internet access to 75% of the world’s population would increase the global collective
    GDP by $2 trillion and create 140 million new jobs [6]. Additionally, target 11.c
    [7] underscores the significance of building cities that are inclusive, safe,
    resilient, and sustainable. Access to high-speed Internet in urban areas is key
    for uplifting public services, optimizing communication networks, and promoting
    community involvement. For example, smart city Wi-Fi serves as a means of accessing
    the Internet and can potentially empower city residents to have a say in the advancement
    and enhancement of smart city initiatives, thereby enhancing the overall quality
    of life [8, 9].


    This chapter focuses on the development and implementation of a web-based application
    designed to visualize and analyze the development of Internet connectivity across
    the globe, from 1980 to 2020. Powered with ML, the application uses a combination
    of the K-means algorithm, and an unlabeled dataset for unsupervised learning.
    The dataset was obtained from Kaggle and compiled from several sources across
    the Internet, in turn containing the cellular subscription per 100, Internet users
    per 100, number of Internet users, and broadband subscription per 100.


    Upon data preprocessing, this dataset is fed into the application, which outputs
    five distinct clusters of countries, based on their levels of Internet connectivity
    over the past few decades. By visualizing these clusters on a world map, users
    can clearly identify regions that are highly developed, developed, developing,
    emerging, or underdeveloped in terms of Internet access. These insights can be
    beneficial to policymakers, researchers, and stakeholders who can steer the boat
    toward initiatives and progress. A simple glance at the end result can enable
    them to make well-informed decisions to address the digital divide and promote
    fair access to technology. Through the use of ML and data visualization, the overarching
    objectives of the SDG goals can be attained, with a clearer path toward a more
    interconnected and inclusive global community.'
