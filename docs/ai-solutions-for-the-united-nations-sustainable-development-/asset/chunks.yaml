    ### 4.4.2 Multiple Linear Regression (MLR)


    MLR was used as a predictive model to predict two environmental factors, specifically
    CO[2] and GHG emissions, based on Mauritius’s population size and annual GDP growth
    using `ML.MultivariateLinearRegression` from the `ml.js` library.


    The `Upload()` function is triggered when the Display Data and Analyse button
    is clicked.


    Subsequently, it calculates the MAPE for CO[2] and GHG predictions. Furthermore,
    it calculates the Other Gases value as the difference between GHG and CO[2] predictions.
    It also generates 3D scatter plots for the original dataset and predicted CO[2]
    and GHG emissions using the `Plotly.js` library. Lastly, a text field was added
    to indicate the necessary actions to be taken whether the predicted value of GHG
    emissions exceeds the threshold of 25,000 or not.


    Figure [4-5](#625524_1_En_4_Chapter.xhtml#Fig5) shows the flowchart of the MLR
    algorithm.


    ![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig5_HTML.jpg)


    Figure 4-5 Flowchart: MLR


    Listing [4-2](#625524_1_En_4_Chapter.xhtml#PC2) shows the pseudocode of the MLR
    algorithm.


    ```

    If (valid CSV file uploaded):

    1. Read and parse the uploaded CSV file using the papaparse.js library.

    2. Extract data from the CSV file depending on the user''s input.

    3. Perform MLR for CO2 and GHG emissions using ML.MultivariateLinearRegression.js

    4. Predict CO2 emissions and GHG emissions based on the user’s provided population
    size and GDP values.

    5. Compute the MAPE for CO2 and GHG using Math.js

    6. Calculate Other Gases as the difference between GHG and CO2 predictions

    7. Generate 3D scatter plots to plot the original data points, and predicted CO2
    and GHG emissions using plotly.js.

    else:

    Specify unsupported CSV file

    Listing 4-2

    Pseudocode Upload() Function: MLR

    ```


    ### 4.4.3 k-Nearest Neighbor (k-NN)


    The user accesses a web page and can upload a CSV file that consists of information
    related to the GDP and amount of CO[2] and GHG emissions. `ML.KNN` from the `ml.js`
    library performs k-NN regression to predict the amount of gaseous emissions with
    respect to population and GDP. 3-D scatter plots then ease data and prediction
    visualization.


    The defined `Upload()` function will be executed once the user clicks the Display
    Data and Analyse button on the user interface.


    Finally, using the `Plotly.js` library, two 3D scatter plots consisting of predicted
    and original values were illustrated for the following variables:


    - CO[2] emissions against population size and annual GDP growth

    - GHG emissions against population size and annual GDP growth


    Lastly, a text field was added to indicate the necessary actions to be taken whether
    the predicted value of GHG emissions exceeds the threshold of 25,000.


    Figure [4-6](#625524_1_En_4_Chapter.xhtml#Fig6) shows the flowchart of the k-NN
    algorithm.


    ![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig6_HTML.jpg)


    Figure 4-6 Flowchart: k-NN


    Listing [4-3](#625524_1_En_4_Chapter.xhtml#PC3) shows the pseudocode of the k-NN
    algorithm.


    ```

    If (valid CSV file uploaded):

    1. Upload and read csv file using PapaParse library.

    2. Specify the number of rows to be read from the csv file.

    3. Enter GDP and population target value for testing dataset.

    4. Apply k-NN regression algorithm using training dataset.

    5. Generate 3-D scatter plots and display predicted values for CO2 and GHG.

    6. Compute other gases from predicted GHG and CO2 values.

    else:

    Specify unsupported CSV file

    Listing 4-3

    Pseudocode Upload() Function: k-NN

    ```


    ## 4.5 Application Testing and Analysis


    ### 4.5.1 Simple Linear Regression (SLR)


    When the `SLR.html` program is executed, it prompts the user to enter the number
    of rows to be displayed from the dataset, enter a value of GDP to be predicted
    from, and upload a CSV file. Figures [4-7](#625524_1_En_4_Chapter.xhtml#Fig7)
    and [4-8](#625524_1_En_4_Chapter.xhtml#Fig8) show the working principle of the
    program.


    ![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig8_HTML.jpg)


    Figure 4-8 SLR: Prediction and Plot of GHG emissions


    ![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig7_HTML.jpg)


    Figure 4-7 SLR: Prediction and plot of CO[2] emissions


    The results shown in Figure [4-7](#625524_1_En_4_Chapter.xhtml#Fig7) illustrate
    that 10 rows from the CSV dataset were displayed, and the target value for GDP
    is specified as 8.2. Regression analysis was performed whereby the equation of
    the line and correlation coefficient was obtained with respect to CO[2], which
    determined the value of the predicted CO[2] emissions as 269,826.521 bpt. Likewise,
    the MAPE for CO[2] is 17.296%, which indicates an accuracy of 82.704% of the SLR
    model. Moreover, the dataset, regression line, and predicted CO[2] point were
    plotted on a 2D scatter plot.


    Regression analysis was performed whereby the equation of the line and correlation
    coefficient were obtained with respect to GHG, which determined the value of the
    predicted GHG emissions as 281,174.774 bpt, as shown in Figure [4-8](#625524_1_En_4_Chapter.xhtml#Fig8).
    Likewise, the MAPE for GHG is 15.883%, which indicates an accuracy of 84.117%
    of the model. Moreover, the dataset, regression line and predicted GHG point were
    plotted on a 2D scatter plot. The value of Other Gases, which is the difference
    between the predicted value of GHG and CO[2], is 11,348.254 bpt. Since the predicted
    value of GHG emissions exceeded the threshold of 25000 bpt, the actions taken
    was specified as implementing sustainability strategies.'
