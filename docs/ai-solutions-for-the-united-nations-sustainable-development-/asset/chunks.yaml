    # 5. 基于机器学习的水质可饮用性分析


    **本章作者：**


    Ramdin Diteesha，`diteesharamdin01@gmail.com`


    Ramjansing Roshwar，`yanishramjansing@gmail.com`


    Soodhoo Leena，`leenasoodhoo@gmail.com`


    联合国可持续发展目标（SDGs）是应对全球挑战、增进人类与地球福祉的关键框架。本章重点关注 SDG 3（良好健康与福祉）、SDG 6（清洁饮水和卫生设施）以及
    SDG 12（负责任消费和生产）。我们利用包括 k 近邻（K-NN）、决策树、随机森林和朴素贝叶斯在内的机器学习算法，旨在预测水的可饮用性。获取清洁饮用水对于保障良好健康至关重要，因为受污染的水源可能导致水媒疾病。准确预测水质对实现
    SDG 3 有显著贡献。此外，本章通过评估水的可饮用性直接应对了 SDG 6。机器学习在识别和监测水质方面发挥了关键作用，确保了清洁安全饮用水的供应，这是实现该目标的基本要求。同时，在
    SDG 12 框架下，本章利用机器学习优化资源利用，具体通过高效预测水的可饮用性来实现。这种方法促进了负责任的用水并减少了浪费，与 SDG 12 的目标完美契合。本章使用了来自
    Kaggle 的数据集，包含 pH 值、硬度、固体物、氯胺、硫酸盐、电导率、有机碳、三卤甲烷和浊度等参数。我们采用了严格的数据预处理技术，包括处理缺失值、特征缩放和分类变量编码。随后实施了机器学习算法（KNN、决策树、随机森林、朴素贝叶斯）以实现对水可饮用性的准确预测。这些机器学习算法的应用不仅确保了水可饮用性的精确评估，从而保障了清洁饮用水的供应（SDG
    6），还通过优化资源配置，为负责任消费和生产（SDG 12）做出了重要贡献。


    与传统方法相比，机器学习在准确性、可扩展性和自动化方面的优势显而易见，使其成为应对 SDG 相关挑战的宝贵工具。本研究的一个关键亮点是，它对多种用于水可饮用性预测的机器学习算法进行了全面比较，增强了透明度和可解释性。此外，该研究为选择最合适的模型提供了实用指导，确保了更广泛受众的可及性和易用性。虽然其他研究项目也探索了机器学习在水质分析中的应用，但本项目的多层面方法和对用户友好性的强调使其脱颖而出，为水质评估领域和
    SDG 的实现做出了重要且独特的贡献。


    ## 5.1 引言


    总体而言，联合国可持续发展目标倡导一个没有贫困、没有饥荒、拥有基本医疗设施、教育机会、性别平等、饮用水和卫生设施、使用可再生能源、促进经济增长、推动创新和基础设施发展、建设可持续城市和经济、明智管理商品消费与生产、应对气候变化、以及同等重视水下和陆地生命的世界。


    本章主要聚焦于 SDG 3、SDG 6 和 SDG 12。本章基于对水可饮用性的测试。它通过分析 pH 值、浊度、电导率以及其他化学物质的存在等多个参数，来确定水是否适合饮用。测试水质对于保障公众安全至关重要。选择这三个
    SDG 的主要原因在于，它们为实现一个公众能获得安全饮用水的可持续世界提供了指导方针。因此，促进良好健康是防止水体污染、评估其生产与消费的明智之举。


    机器学习促进了任务的自动化，减少了人工干预。这种技术更有效且成本更低。机器学习能够分析大型数据集并进行预测。它能够通过一种称为自然语言处理的过程来理解和生成人类语言。它的益处在于，通过从数据中提取重要特征，赋能企业并帮助实现各种目标。这促进了任务自动化和模型预测，并实现了将塑造未来世界的创新。在不同的研究工作中，已经采用了多种机器学习算法来应对
    SDG 3、6 和 12。


    为了深入分析水的可饮用性问题，本章实施了四种机器学习算法（朴素贝叶斯、决策树、K 近邻和随机森林），以针对上述三个 SDG。使用了`water_potability.csv`文件作为数据集，并将该数据集输入到所列出的四种机器学习算法中，以检查所获得的准确率。选择准确率最高的机器学习算法，并将其结果作为最终输出，以判断水是否可饮用。基于所获得的结果，可以得出结论，朴素贝叶斯学习算法在此情境下非常适用，因为它获得了最高的准确率。


    本报告所解决的主要研究问题，核心在于通过利用四种不同的机器学习算法：K 近邻（KNN）、决策树、随机森林和朴素贝叶斯，来预测水的可饮用性。这些问题包括评估每种算法在判断水是否可饮用方面的预测准确性。此外，它还旨在探索这些算法在水质分析背景下的性能比较。该研究试图揭示哪些算法能为水的可饮用性提供最可靠、最准确的预测，从而为各种机器学习技术在此特定领域的适用性提供宝贵见解。本研究的主要新颖之处在于其预测水可饮用性的多层面方法。通过使用多种机器学习算法并输出它们各自的准确率，它提供了一个全面的比较，使人们更深入地了解哪些算法在此特定任务中表现出色。


    此外，该研究为分析引入了透明度和可解释性，特别是通过应用随机森林和决策树算法。这促进了对每次预测背后影响因素更深入的理解。同时，它还延伸到为选择最合适的水可饮用性预测机器学习模型提供实用指导，并优先考虑用户友好性，确保结果对更广泛的受众是可访问和可操作的。总之，本章汇集了多种机器学习技术来解决一个关键的现实世界问题，为未来的应用提供了全面的见解和指导，丰富了该领域的研究。

    '
- fmt: '## 5.2 AI Use Cases for SDGs 3, 6, and 12


    A recognition system has been implemented to determine the quality of water, to
    monitor water spillage and utilization, and to check the areas where drinking
    water is available [1]. This system is implemented by using convolutional neural
    network (`CNN`) and a Moroccan Automatic Meter Reading (`MR-AMR`) dataset. In
    this context, `SDG 6` and `SDG 12` is being targeted to analyze the range of drinking
    water and to monitor the consumption of water by analyzing the different usage
    of water. During the testing process, this system achieved an accuracy level around
    98%. `SDG 6` has also been assessed in testing water potability whereby adaptive
    boosting technique has been applied [1]. In this example, a dataset from Kaggle
    was used whereby the hyperparameters used to determine the potability of water
    are ammonia, aluminum, arsenic, barium, chloramine, copper, leads, nitrates, and
    many other chemicals that can affect water quality. `SDG 6` has also been targeted
    for research in Iraq where machine learning has been used to analyze the condition
    of underground artesian water [2]. In this context the depth of underground water,
    the density, and the saturation of water are being analyzed in order to drill
    wells precisely at a lower cost.


    AI has also been implemented to achieve sustainable development whereby the system
    analyzes water infrastructure, forecasts the consumption of water, tests the quality
    of water in reservoirs and dams, and predicts disasters related to water [3].
    This approach targets `SDG 3`, `6`, `11`, and `15`. It scrutinizes water-related
    diseases and the number of deaths and infection caused due to water contamination
    due to hazardous chemicals. Moreover, it analyzes the quality of water and determines
    whether it is safe for drinking and determines ways to safeguard natural resources.
    These SDGs aim to reduce its related issues by the end of 2030. In Australia,
    an AI-based water grid system was implemented to cater for water consumption,
    for water treatment purposes, and to analyze the water quality index of reservoirs.
    In Iran, Support Vector Machine (`SVM`) machine learning has been implemented
    to check the water quality, and in Shivganga River, multiple linear regression
    has been used for a similar purpose [3].


    `SDG 6` is addressed in [4], which focuses on the identification of water quality
    anomalies (`WQAD`) in intelligent water distribution systems. They did a thorough
    analysis of the literature examining the application of machine learning (`ML`)
    techniques for `WQAD`, which is essential for the safety and security of the water
    supply. While there is rising interest in employing deep learning (`DL`) models
    for `WQAD`, the paper emphasizes that the use of extreme learning machines (`ELM`)
    is still being investigated. For the purpose of improving the effectiveness and
    precision of anomaly detection in water quality, they suggest a unique hybrid
    `DL-ELM` framework. According to the research, AI, especially the suggested `DL-ELM`
    hybrid technique, has the potential to considerably increase the accuracy and
    promptness of finding anomalies in water quality. This development is essential
    for guaranteeing access to safe and clean water, ultimately harmonizing with `SDG
    6` goals. The study also highlights the significance of real-time data produced
    by sensors and the requirement for short response times in identifying contaminants,
    which are crucial components of managing water quality in contemporary smart cities.


    `SDG 6` is also tackled in [5]. To effectively identify and categorize algae in
    water, which is a crucial component of determining water quality, the paper proposes
    the use of machine learning techniques, specifically a modified Faster `R-CNN`
    architecture. Based on their small size and diversity, algae are difficult to
    manually detect and are prone to mistakes. A novel multitarget deep learning framework
    was proposed by the researchers that is capable of handling several tasks at once,
    such as genus classification, algal detection, and biological class identification.
    They performed extensive trials on a dataset made up of 27 different algal taxa,
    and the results were encouraging. The framework was able to identify algal species
    at the genus level with a mean average precision (`mAP`) of 74.64% and classify
    organisms at the biological class level with an even higher `mAP` of 81.17%.


    `SDG 12` is addressed in [6]. To maximize resource usage, the paper proposes machine
    learning approaches for estimating short-term water demand in water supply systems
    (`WSS`). Predicting water demand effectively is difficult since it depends on
    a number of variables, including historical data, weather, and seasonality. To
    create precise predicting systems, the researchers investigated machine learning
    approaches, including supervised and unsupervised learning. To make better projections,
    they took into account elements like past water usage, temperature, and rainfall
    occurrence. The forecasting technique was informed by the study’s examination
    of the effects of various time periods, such as weekdays and weekends, on demand
    patterns. A weighted parallel forecasting technique was suggested to further improve
    accuracy. It integrates various forecasting methods, each with advantages and
    disadvantages, to create a more accurate and dependable forecast of water demand.
    This method reduces errors by giving models weights based on how well they function.
    Overall, the research shows that machine learning-based forecasting works better
    than conventional time-series analysis techniques, potentially saving up to 18%
    in operating costs for water supply systems.


    `SDG 3`, `9`, and `12` are being targeted. Waste management is a critical global
    issue, affecting both developed and developing countries. The main problem in
    waste segregation is the overflowing of open bins long before the cleaning process
    begins. This cleaning process involves manually sorting waste by unskilled workers,
    which is inefficient, time-consuming, and often impractical due to the sheer volume
    of waste generated.


    To address this, the author in [7] proposed an automated waste classification
    system using machine learning and deep learning algorithms. The objective is to
    collect a dataset and categorize it into six classes: glass, paper, metal, plastic,
    cardboard, and general waste. Three machine learning algorithms, namely, support
    vector machine (`SVM`), random forest, and decision tree with a deep learning
    algorithm called convolutional neural network (`CNN`), were compared. It was revealed
    that the `CNN` achieved a high level of accuracy in waste classification, approximately
    90%. `SVM` also showed excellent performance in distinguishing various types of
    waste, with an 85% classification accuracy, while random forest and decision tree
    achieved accuracy rates of 55% and 65%, respectively.'
