    // Calculate the Mean Absolute Percentage Error between two arrays

    }

    // Upon a button click, invoke the upload function to read and process the CSV
    file

    // Compute k-NN regression based on user-provided inputs

    // Display the prediction and MAPE on the webpage

    Listing 2-1

    Reading and Processing Selected CSV File to Perform KNN Regression

    ```


    The `main.js` file is embedded within the `index.html` layout. The web page will
    first prompt the user to enter the values of the attributes to be predicted. Additionally,
    the user will be required to upload the appropriate dataset that will be used
    by the model. Once the user gets new environmental data, the latter can perform
    regression, which will be based on conditions such as wind speed, wind direction,
    pressure, and temperature. The same operation is carried out for the classification
    of the power category of the system and is embedded within another class called
    `main2.js`. The structure of `main2.js` is illustrated in Figure [2-5](#625524_1_En_2_Chapter.xhtml#Fig5).


    ![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig5_HTML.png)


    Figure 2-5


    Program structure, `main2.js`


    The pseudocode in Listing [2-2](#625524_1_En_2_Chapter.xhtml#PC2) shows the main
    actions performed by `main2.js`.


    ```

    function processData() {

    // Read CSV file chosen by the user

    // Process the dataset

    }

    function kNNClassification(dataArray, categoriesArray, k, inputValues) {

    // Compute distances between input values and existing data points

    // Find the k nearest neighbors

    // Determine the classification based on the k nearest neighbors

    function calculateAccuracy(predictedArray, actualArray) {

    // Calculate the accuracy between the predicted and actual values

    }

    // Upon clicking a button, invoke the processData function to read and process
    the CSV file

    // Compute k-NN classification based on user-provided inputs

    // Display the prediction and accuracy on the webpage

    Listing 2-2

    Reading and Processing Selected CSV File to Perform KNN Classification

    ```


    ### Polynomial Regression


    Since it is observed that the wind speed has a very strong correlation with the
    predicted wind system power, the polynomial regression is an appropriate technique
    that can be investigated and employed with the dataset. The appropriate degree
    of the polynomial is dependent on the Mean Absolute Percentage Error (MAPE) of
    the model.


    The flowchart in Figure [2-6](#625524_1_En_2_Chapter.xhtml#Fig6) shows the program
    workflow using this algorithm.


    ![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig6_HTML.png)


    Figure 2-6


    Program workflow, polynomial regression


    The user is allowed to choose the degree of the polynomial so that maximum accuracy
    of the model is obtained. However, in this case, only a single predictor is taken
    into consideration. Figure [2-7](#625524_1_En_2_Chapter.xhtml#Fig7) illustrates
    the functions present in the `poly.js` file.


    ![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig7_HTML.png)


    Figure 2-7


    `poly.js`


    ### Multiple Linear Regression


    To investigate the relationship of the all the predictors on the dependent variable,
    the multiple linear regression technique was used, and its corresponding accuracy
    was assessed. The model takes as input the wind speed, wind direction, pressure,
    and temperature to predict the system power. Figure [2-8](#625524_1_En_2_Chapter.xhtml#Fig8)
    shows the main steps involved in the training of this model.


    ![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig8_HTML.png)


    Figure 2-8


    Program workflow, MLR


    The program uses the Multivariate Linear Regression library available in `ml.min.js`
    to obtain the necessary coefficients and predictions. Moreover, a function for
    calculating the MAPE is also introduced in the program to assess the accuracy
    of the system. The file `main3.js` shown in Figure [2-9](#625524_1_En_2_Chapter.xhtml#Fig9)
    is used to implement the process of MLR.


    ![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig9_HTML.png)


    Figure 2-9


    `main3.js`


    ## 2.4 Application Testing and Analysis


    In this series of experiments, three different regression techniques, namely,
    polynomial regression, k-nearest neighbors (KNN) regression, and multilinear regression,
    were applied and evaluated to understand their performance in predicting a target
    variable. The target variable in each experiment is represented by the Mean Absolute
    Percentage Error (MAPE), which quantifies the accuracy of the predictions made
    by each regression model.


    For experiment 1, polynomial regression models were trained and tested using degrees
    ranging from 4 to 14. For experiment 2, KNN regression models were built and evaluated
    using various values of K ranging from 2 to 10. For experiment 3, multilinear
    regression was applied without specifying the degree or K value.'
