  trans: "\n### 2.4.1 应用测试\n\n本节总结了将不同机器学习算法应用于数据集所获得的一系列结果。各参数使用的测试值如下：\n\n- **风速**\
    \ = 10 米/秒\n- **风向** = 120 度\n- **气压** = 1 个标准大气压\n- **温度** = 25 摄氏度\n\n每种模型获得的最佳\
    \ MAPE 输出如下图所示：\n\n![](img/625524_1_En_2_Fig10_HTML.jpg)\n\n图 2-10 KNN 分类\n\n\
    1. **KNN 分类**\n\n   该算法旨在对前述条件下将产生的功率类别进行分类。在此情况下，`k` 的最优值设为 3，如图 2-10 所示。\n\n\
    ![](img/625524_1_En_2_Fig11_HTML.jpg)\n\n图 2-11 多元线性回归\n\n2. **多元线性回归**\n\n  \
    \ 还使用多元线性回归算法对数据集进行了测试，以预测系统功率。在所选天气条件下的典型输出如图 2-11 所示。\n\n![](img/625524_1_En_2_Fig12_HTML.jpg)\n\
    \n图 2-12 KNN 回归\n\n3. **KNN 回归**\n\n   KNN 回归模型利用最近邻之间的距离来获取预测的系统功率。在此情况下，四个最近邻比\
    \ `k` 的其他值提供了更好的精度，如图 2-12 所示。\n\n![](img/625524_1_En_2_Fig13_HTML.jpg)\n\n图 2-13\
    \ 多项式回归\n\n4. **多项式回归**\n\n   多项式回归算法被证明能提供最佳精度，其 MAPE 低至 7.57%，如图 2-13 所示。\n\n\
    ### 2.4.2 多项式回归结果\n\n图 2-14 和表 2-4 展示了多项式次数增加时获得的结果。MAPE 值范围从 7.57% 到 68.66%，显示了模型性能的变异性。特别值得关注的是，观察到多项式次数与\
    \ MAPE 之间的关系是非线性的。相反，它遵循一条更复杂的轨迹。MAPE 值在次数为 9 时达到最低点，误差率为 7.57%，表明在预测电力系统行为方面具有高水平的准确性和有效性。这一结果表明，对于该数据集，9\
    \ 次多项式提供了最准确的预测。它强调了选择合适的多项式次数以在模型复杂性和准确性之间取得平衡的重要性。9 次多项式成为最优选择，通过有效捕捉数据中的潜在模式，提供了卓越的预测。\n\
    \n![](img/625524_1_En_2_Fig14_HTML.png)\n\n图 2-14 MAPE 与多项式次数关系图\n\n表 2-4 多项式回归\n\
    \n| 次数 | MAPE |\n| --- | --- |\n| 2 | 56.36 |\n| 3 | 100.52 |\n| 4 | 20.88 |\n\
    | 5 | 68.66 |\n| 6 | 38.67 |\n| 7 | 43.14 |\n| 8 | 19.03 |\n| 9 | 7.57 |\n| 10\
    \ | 13.31 |\n| 11 | 12.24 |\n| 12 | 12.81 |\n| 13 | 11.05 |\n| 14 | 14.33 |\n\n\
    ### 2.4.3 KNN 回归\n\n结果显示，对于 `K` 从 1 到 10 的不同取值，MAPE 值各不相同。随着 `K` 从 1 增加到 10，MAPE\
    \ 通常会增加，表明随着 `K` 变大，模型性能下降。这种行为在 KNN 回归中很常见。较小的 `K` 值意味着模型严重依赖少数几个最近邻，这可能导致过拟合。随着\
    \ `K` 增加，模型会考虑更多的邻居，这可能导致预测更平滑，但可能精度较低。KNN 回归不像线性回归那样提供明确的系数或方程。相反，它依赖于数据点的相似性。查看我们的结果，`K=4`\
    \ 似乎具有相对较低的 MAPE 值 13.288，表明其预测性能优于 `K=1` 或 `K=10`。参见表 2-5。\n\n![](img/625524_1_En_2_Fig15_HTML.png)\n\
    \n图 2-15 KNN 回归的 K 值与 MAPE 关系图\n\n表 2-5 KNN 回归的 K 值与 MAPE 对照表\n\n| K 值 | MAPE\
    \ |\n| --- | --- |\n| 1 | 0 |\n| 2 | 13.29 |\n| 3 | 16.66 |\n| 4 | 13.29 |\n|\
    \ 5 | 20.25 |\n| 6 | 21.77 |\n| 7 | 22.51 |\n| 8 | 23.11 |\n| 9 | 23.83 |\n| 10\
    \ | 24.28 |\n\n### 2.4.4 多元线性回归\n\n多元线性回归是一种用于建模因变量与多个自变量之间关系的统计方法。它假设预测变量与目标变量之间存在线性关系。在此情况下，MAPE\
    \ 为 42.20 表明，平均而言，模型预测值与真实值之间的绝对百分比误差约为 42.20%。42.20% 的 MAPE 表明，当前配置的多元线性回归模型可能无法为目标变量提供高度准确的预测。相对较高的\
    \ MAPE 值表明模型的预测值与实际值存在显著偏差，这种误差水平对于某些应用来说可能是不可接受的。\n"
- fmt: '### 2.4.5 KNN Classification


    Lastly, for experiment 4, we will analyze the results obtained from KNN classification
    experiments with varying values of `K` (the number of nearest neighbors) and their
    implications for wind power prediction accuracy. The classifications “high,” “medium,”
    and “low” are used to represent the predicted wind power levels. The results from
    our KNN classification experiments are presented in Table [2-6](#625524_1_En_2_Chapter.xhtml#Tab6),
    where `K` ranges from 1 to 10, and the corresponding accuracy percentages are
    recorded as shown in Table [2-6](#625524_1_En_2_Chapter.xhtml#Tab6). When values
    of `K` being larger than 10 were used, the classification remains the same as
    when `K=10`.


    ![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig16_HTML.png)


    **Figure 2-16** Accuracy versus value of `k`


    **Table 2-6** Result-KNN Classification


    | K-value | Accuracy (%) | Classification |

    | --- | --- | --- |

    | 2 | 100 | Medium |

    | 3 | 96.997 | Medium |

    | 4 | 98.19 | Medium |

    | 5 | 95.58 | Medium |

    | 6 | 96.71 | Medium |

    | 7 | 94.77 | Medium |

    | 8 | 95.799 | Medium |

    | 9 | 93.926 | Medium |

    | 10 | 94.63 | Medium |


    As the value of `K` increases, the model’s accuracy remains impressively high,
    with only slight fluctuations. The accuracy percentages associated with various
    values of `K` showcase the model’s ability to categorize wind power levels effectively.
    It is evident that the accuracy is exceptionally high when `K` equals 1 and 2,
    both achieving a perfect accuracy rate of 100%. This indicates that when the model
    considers only the closest neighboring data points, it excels in making precise
    predictions about wind power levels. This level of accuracy is crucial in applications
    where fine-grained predictions are required for immediate decision-making, such
    as managing grid loads during fluctuating wind conditions.


    For `K` values ranging from 3 to 10, the model consistently classifies wind power
    as “medium” and occasionally as “medium.” When values of `K` being larger than
    10 were used, the classification remains the same as when `K=10`. Therefore, it
    has been concluded that best results are obtained when `K=10`. This alignment
    with the high accuracy rates achieved for these `K` values suggests that the model
    is confident in categorizing wind power as “medium” but introduces slight variations
    in classification when considering slightly more distant neighbors.


    With an accuracy rate of 96.997%, `K=3` strikes a balance between precision and
    robustness. It is a strong choice for applications where a slightly broader perspective
    of neighboring data points is acceptable, and a high level of accuracy is still
    required. This level of precision is particularly valuable in scenarios such as
    optimizing the integration of renewable energy sources into the power grid. When
    the goal is to ensure that wind power levels are categorized with the utmost accuracy,
    this setting delivers exceptional results.


    Moving on from `K=4` to `K=10`, these values offer slightly greater adaptability
    to variations in wind power conditions while maintaining high accuracy. They are
    suitable for applications that can tolerate a broader consideration of neighboring
    data points and may encounter more diverse wind power scenarios.


    ### 2.4.6 Comparative Analysis of Regression Models: Polynomial Regression vs.
    KNN Regression vs. Multilinear Regression


    In this comprehensive analysis, we delve into the performance of three distinct
    regression models: polynomial regression, k-nearest neighbors (KNN) regression,
    and multilinear regression, utilizing their respective Mean Absolute Percentage
    Error (MAPE) results as the yardstick. MAPE serves as a vital metric, quantifying
    the accuracy of these regression models in forecasting continuous target variables.
    In this section, we provide a thorough examination of the merits and demerits
    of each model, drawing insights from the furnished results. See Figure [2-17](#625524_1_En_2_Chapter.xhtml#Fig17).


    ![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig17_HTML.png)


    **Figure 2-17** MAPE for KNN, polynomial regression, and MLR


    For polynomial regression, a range of polynomial degrees from 4 to 14 were explored.
    These degrees were associated with varying Mean Absolute Percentage Error (MAPE)
    values, with a noteworthy improvement observed at degree 9, where the MAPE dropped
    to 7.57. Polynomial regression’s strengths lie in its ability to handle complex,
    nonlinear relationships between variables. This makes it particularly well-suited
    for capturing intricate patterns in power system data, which often exhibit nonlinear
    behavior. Additionally, the model offers a considerable degree of flexibility,
    accommodating a wide range of data patterns and variations.


    However, polynomial regression is not without its weaknesses. One of the primary
    concerns is its susceptibility to overfitting, especially when the degree is excessively
    high. Overfitting occurs when the model fits the training data too closely, capturing
    noise and irrelevant fluctuations. Another challenge with this model is the selection
    of the optimal polynomial degree. It requires meticulous consideration to strike
    a balance between model complexity and predictive accuracy. Selecting too high
    a degree can lead to overfitting, while too low a degree might result in underfitting,
    where the model oversimplifies the relationship.


    The experiment conclusively revealed that, among the explored degrees, degree
    9 emerged as the optimal choice. It delivered the lowest MAPE of 7.57%, underscoring
    the importance of fine-tuning the model’s complexity to align with the data’s
    characteristics. This optimal degree struck a balance between capturing the complexity
    of power system behavior and avoiding the pitfalls of overfitting.


    Moving on to KNN regression, our investigation delved into the realm of `K` values,
    ranging from 2 to 10. This exploration brought to light an intriguing trend in
    the model’s behavior regarding the choice of `K` values. Notably, the MAPE exhibited
    a tendency to increase as `K` grew larger. However, what stood out was the model’s
    remarkable achievement of a flawless MAPE of 0 when `K` was set to 1. While this
    result might appear exceptionally promising, it raised a critical concern—overfitting.
    Notably, `K=4` resulted in the lowest MAPE of 13.288, indicating better predictive
    performance.


    KNN regression boasts its strengths in simplicity and intuitiveness. It is straightforward
    to understand and implement, making it an attractive choice for various applications.
    Additionally, KNN operates in a nonparametric manner, meaning it doesn’t require
    assuming a specific functional form for the relationship between variables. This
    flexibility can be advantageous when dealing with data where the underlying relationship
    is not well-defined.


    Nonetheless, KNN regression has its share of weaknesses. One significant limitation
    is its sensitivity to the choice of `K`. The model’s performance can vary significantly
    depending on the selected `K` value, making it crucial to perform cross-validation
    to determine the optimal `K`. Additionally, for larger datasets, KNN can become
    computationally expensive, as it involves calculating distances between data points.'
