  trans: '

    ## 2.2 可持续发展目标 7 的人工智能应用案例


    此前已有若干研究运用机器学习技术来应对可持续发展目标 7（SDG 7），该目标强调了可获取、清洁且可靠能源的重要性。


    例如，在 Liu、Zhang 和 Baziar（2023）的研究中，其目标是弥补 Esapour 等人（2022）最新出版物留下的空白，重点关注智慧城市通信与能源管理领域。具体而言，作者希望克服前述研究的局限性，同时提高预测值和最优解的准确性。为此，他们采用了一种独特的启发式策略来优化解决方案，同时利用机器学习技术带来的优势以提高准确性。该研究旨在改善负责任的消费模式和生产实践，以减少浪费、提升资源效率，并在智慧城市中推动更可持续的消费与生产方式。


    Shahzad 等人（2023）将长短期记忆网络（`LSTM`）、人工神经网络（`ANNs`）、支持向量回归（`SVR`）和多元线性回归（`MLR`）等机器学习技术应用于
    2018 年 1 月至 2021 年 10 月期间天然气期货价格、原油期货价格、碳期货价格以及道琼斯能源商品期货价格的每日数据。该机器学习研究得出了两个主要结论。首先，在建立未来石油价格（原油和取暖油）与碳排放期货定价之间的联系时，非线性框架比线性模型表现更好。其次，机器学习结果显示，碳排放期货价格对石油和天然气价格的剧烈波动呈现非线性响应。理解极端波动的非线性动态有助于制定环境和气候政策，以及重新评估天然气和石油期货。我们讨论了这对可持续发展目标（尤其是
    SDG 7 和 SDG 12）的重要影响。


    Asadikia、Rajabifard 和 Kalantari（2020）进行的研究旨在利用名为`提升回归树`的机器学习和数据挖掘方法，寻找具有协同效应的可持续发展目标。该研究确定了每个可持续发展目标对
    SDG 指数的贡献，并进行了“假设”分析以确定目标得分的重要性。研究结果表明，当得分超过 60%时，SDG 3（优质教育）、SDG 4（良好健康与福祉）和
    SDG 7（经济适用的清洁能源）是最具协同效应的目标。根据这项研究的发现，“良好健康与福祉”是最关键的协同目标之一。历史上曾多次爆发疾病，因其致命性、广泛性和高昂的防控成本，对社会和经济造成了可怕的影响。像
    COVID-19 这样的 SDG 爆发事件，由于试图平衡社会、经济和环境因素，可能会对实现这些目标的可能性产生重大影响。死亡率的上升和对医疗保健的不利影响可能会降低
    SDG 3 的得分。


    Nwokolo、Obiwulu 和 Ogbulezie（2023）的研究表明，作者面临的主要困难在于创建一个结合了 Gumbel 概率函数模型的混合机器学习模型，这一困难内在于数学变换过程，需要大量重复的数学科学知识才能最终生成用于预测太阳能光伏发电潜力的有效变换模型。在所有技术中，仅使用可量化太阳辐射参数的混合模型是对观测到的光伏发电量最准确的表示，其综合决定系数（`R2`）为
    0.9998%，均方根误差（`RMSE`）为 0.0063 千瓦时。为了研究气候变化对各种太阳能光伏系统的潜在影响，使用了最有效的混合模型。这项研究根据联合国的
    SDG 7 和 SDG 13，考察了气候变化对近期（2015-2049 年）、远期（2050-2099 年）、全期（2015-2099 年）、2020 年代（2015-2040
    年）、2050 年代（2041-2070 年）和 2080 年代（2071-2099 年）太阳能光伏发电潜力的影响。使用最佳混合模型（`MLP-CARIMA-GPM`）来研究气候变化对各种太阳能光伏系统的潜在影响。


    此外，该评估还使用了来自澳大利亚社区气候与地球系统模拟器（`ACCESS-CM2`）的能源模拟数据，该模拟器是耦合模型比较计划第六阶段（`CMIP6`）的参与者，基于三种不同的共享社会经济路径（`SSPs`）：`SSP126`、`SSP245`和`SSP585`。


    在 Anastasiadou、Santos 和 Dias（2021）的研究中，作者提出了一个概念性和理论框架，可用于分析那些利用统计或机器学习技术来解决建筑能效问题的文献研究。更具体地说，通过定位和评估最新且合适的机器学习或统计方法作为未来研究的基础，并基于使用`PRISMA`指南的系统性文献综述开发一个概念性和理论框架，这项工作旨在为改善现有建筑的能源性能（`EP`）做出贡献，这是欧盟绿色新政的关键目标之一。欧盟绿色新政与联合国制定的多个可持续发展目标密切相关。


    虽然它特别符合 SDG 13（气候行动），但其影响和目标也对其他几个 SDG 产生影响。通过测量、监测和提高建筑的能源效率（`EE`），也可能实现“将全球能效提升率翻倍”的目标。这将导致在保持甚至改善此类建筑所提供服务质量的同时，减少能源消耗，从而为
    SDG 7 和 SDG 8 做出贡献。


    Chen 等人（2022）进行的研究提供了一种方法，通过结合夜间灯光指数、人口分布数据和统计数据，评估 2000 年至 2020 年咸海盆地 SDG 7 的趋势和主要驱动因素。在这项工作中，选择了两种线性回归方法和三种机器学习方法的最优组合，连同四种灯光指数，来模拟咸海盆地
    GDP 的地理分布。根据研究结果，使用`TNL`的`XGBoost`模型进行的预测优于其他模型。


    从 2000 年到 2020 年，咸海盆地的 GDP 呈现出不均衡的增长模式（+1017.3 亿，+585.5%），下咸海和阿姆河地区的 GDP 分别日益向中咸海和锡尔河流域集中。同时，咸海盆地的
    GDP 与水体面积呈高度负相关。尽管从 2000 年到 2020 年，咸海盆地的得分（+6.57）和排名（+9）略有改善，但到 2030 年实现 SDG 7
    仍具有挑战性。实现 SDG 7 取决于加强流域间能源合作、增加对可再生能源的投资以及提高能源强度。


    Sarkodie 等人（2020）对肯尼亚、塞内加尔和斯威士兰的能源消耗（SDG 7）、气候（SDG 13）、经济增长和人口之间的联系进行了研究。其研究动机源于可持续发展目标及其到
    2030 年的影响力。他们使用了动态普通最小二乘法（`DOLS`）、完全修正普通最小二乘法（`FMOLS`）回归、均值组（`MG`）和混合均值组（`PMG`）估计模型等计量经济学技术，以及核正则化最小二乘法（`KRLS`）机器学习方法。机器学习方法支持规模效应假说，而计量经济学技术则支持收入水平与
    CO[2]排放之间的环境库兹涅茨曲线（`EKC`）假说。研究发现，虽然人口、收入水平和 CO[2]排放都影响能源需求和消耗，但能源消耗和人口动态是经济增长的主要驱动力。这表明收入、人口增长、能源消耗和
    CO[2]排放是相互关联的，需要共同决策才能实现可持续发展目标。


    Boza 和 Evgeniou（2021）文章的目标是考察人工智能在控制可变可再生能源（VRE）并网成本方面所能增加的价值。作者利用文献中关于可变可再生能源并网成本的经济模型，对人工智能如何显著降低并网成本进行了全面评估。他们还讨论了许多使用场景，并探讨了在计算人工智能解决方案将为电力行业增加的价值时所面临的困难。使用人工智能和数据密集型技术来降低可变可再生能源（`VRE`）的并网成本，与开发清洁和可持续能源系统的总体目标相一致，被视为实现
    SDG 7 的关键要素。后者关注的是确保人人都能获得负担得起的、可靠的、可持续的现代能源。


    在 Chen 等人（2021）进行的研究中，基于人工智能的有用评估模型（`AIEM`）被提出作为一种预测可再生能源和能源效率经济影响的工具。这项工作的目标是评估、对比并开发一个使用人工智能和某些对预测可再生能源经济可行性至关重要的经济变量的模型。使用人工智能方法可以实现：最佳地响应客户的品质和愿望、有竞争力的定价、调度和设施管理，以及激励需求响应参与者并给予公平回报。所提出的方法可以将能源效率提高到
    97.32%，并增加可再生能源的使用。人工智能在可再生能源技术中的主要组成部分是能源预测、能源效率和能源可及性。该研究阐述了如何利用人工智能来预测可再生能源并提高能源效率，从而推进
    SDG 7 关于清洁和高效能源来源的目标。


    Chiang 和 Zhang（2016）进行的研究，其出发点是由发展中的物联网带来的广泛新颖问题，以及用现有计算和网络模型解决这些挑战的困难。文章还讨论了对一种新架构的需求，这种架构被称为雾计算、雾网络、雾存储和雾控制，以及它如何能够弥合技术差距并开辟新的商业机会。


    在云到物连续体中，雾是一种新兴的计算、存储、控制和网络架构，它将这些服务分布到更接近最终用户的位置。通过优化更接近数据源的处理和存储，雾计算减少了与数据传输和处理相关的能源消耗，这与
    SDG 7 相符。物联网（`IoT`）在各种与可持续性相关的应用中具有重要性，包括环境监测、智慧农业和能源管理，这支持了 SDG 13，而这一切都得益于雾计算。作为一种架构，它支持越来越多的应用，例如物联网、第五代（`5G`）无线系统和嵌入式人工智能中的应用。

