  trans: '

    # 7.1 引言


    近年来，技术的飞速发展，尤其是在机器学习（ML）领域，显著改变了我们分析和应对复杂全球性挑战的方式。凭借其筛选海量数据并识别模式的能力，机器学习被广泛用于解决当今世界紧迫的全球性复杂问题，例如互联网连接发展不均衡的现状[1]。这些通信与连接水平的差异直接关系到社会经济增长与机遇，因为当今即时获取信息的主要支柱，仍然是互联网对人类日常生活的巨大渗透。


    联合国（UN）可持续发展目标（SDGs）提供了一个全面的框架，用于指引我们穿越围绕全球性挑战的迷宫，其中包括技术获取不平等的问题，即所谓的数字鸿沟。根据国际电信联盟（ITU）的数据，尽管全球互联网设施的部署取得了加速进展，但截至
    2023 年底，仍有约三分之一的世界人口（即 26 亿人）处于离线状态[2]。然而，该组织强调了这种连接性的提升，因为它代表着在包容性方面取得了进一步进展，进而与联合国可持续发展目标保持一致。正如国际电联秘书长多琳·博格丹-马丁所强调的那样：“在我们生活在一个让每个人、每个地方都能真正实现有意义的连接的世界之前，我们不会停歇”[3]。


    目标 7.b、9 和 11.c 直接关系到扩大基础设施和技术的需求，进而促进人人享有，这随后将加强科学研究，并特别有助于那些在发展中面临艰难挑战的国家。目标
    7.b [4]旨在提高发展中国家获得经济实惠且持久的能源资源的可能性，而互联网的使用可以部分实现这一目标。由于缺乏可靠的能源基础设施，发展中地区电力供应的有限性成为采用互联网的主要障碍。根据世界银行的数据，撒哈拉以南非洲地区在全球通电人口中的比例从
    2018 年的 46.3%跃升至 2021 年的 50.6%，但这仍然表明，有很大一部分人无法获得电力，这阻碍了他们利用在线资源和参与数字经济的能力。目标
    9 [5]旨在发展有韧性的基础设施，以鼓励可持续和公平的工业化并推动创新。


    获得廉价且可靠的互联网是促进经济增长的先决条件。根据世界经济论坛的研究，将全球互联网普及率提高到 75%，将使全球 GDP 总额增加 2 万亿美元，并创造
    1.4 亿个新工作岗位[6]。此外，目标 11.c [7]强调了建设包容、安全、有韧性和可持续城市的重要性。在城市地区接入高速互联网对于提升公共服务、优化通信网络和促进社区参与至关重要。例如，智慧城市
    Wi-Fi 作为一种互联网接入手段，有可能使城市居民在智慧城市倡议的推进和改善中拥有发言权，从而提高整体生活质量[8, 9]。


    本章重点介绍一个基于 Web 的应用程序的开发与实施，该应用程序旨在可视化和分析 1980 年至 2020 年间全球互联网连接的发展状况。该应用程序由机器学习驱动，结合使用了
    K-means 算法和一个用于无监督学习的未标记数据集。该数据集来自 Kaggle，并由互联网上的多个来源汇编而成，其中包含每百人蜂窝网络订阅数、每百人互联网用户数、互联网用户总数以及每百人宽带订阅数。


    经过数据预处理后，该数据集被输入应用程序，应用程序根据过去几十年各国的互联网连接水平，输出五个不同的国家集群。通过在世界地图上将这些集群可视化，用户可以清晰地识别出在互联网接入方面高度发达、发达、发展中、新兴或欠发达的地区。这些见解对于政策制定者、研究人员和利益相关者来说可能非常有益，他们可以引导航向，朝着各项倡议和进步前进。只需简单看一眼最终结果，他们就能做出明智的决策，以解决数字鸿沟问题，并促进技术的公平获取。通过利用机器学习和数据可视化，可持续发展目标的总体目标得以实现，从而为建立一个联系更紧密、更具包容性的全球社会铺平了更清晰的道路。

    '
- fmt: '# 7.2 AI Use Cases for SDGs 7, 9, and 11


    A state-of-the-art review concerning related works performed by researchers is
    presented next.


    In [10], Chinn and Fairlie investigated the determinants of the global digital
    divide in personal computer and Internet penetration by putting 161 countries
    under the microscope. The assessment metrics included economic parameters, demographic
    indicators, infrastructure variables, and telecommunications metrics such as telephone
    density and pricing.


    The authors mentioned that these features, coupled with age dependency, pertain
    to patterns in Internet use and development. Through analysis of the Internet
    penetration rates, they revealed that the United States had the highest development
    rate, followed by the Nordic countries, i.e., Sweden, Denmark, Switzerland, and
    Norway. On the other side of the spectrum lies several countries from the sub-Saharan
    Africa, with reports showing computer penetration rates of less than two users
    per 1,000 individuals. The experiment concluded that the key determinant of Internet
    connectivity is income, which is directly tied to the demand for computers, in
    turn affecting the telecommunications infrastructure in a particular country.
    The paper also includes thorough analysis of reported metrics from the 1999–2001
    era pertaining to Internet penetration rate.


    In [11], Chen and Wellman addressed the global digital divide at both the international
    and national levels by evaluating socioeconomic, technological, and linguistic
    indicators. They first define the digital divide as the gap between individuals
    who have the ability to indulge in the information realm and those that do not.
    Although spread quickly across the globe, the prevalence of the Internet was concentrated
    in highly developed countries. The authors mentioned that the United States consisted
    of a major portion of individuals accessing the Internet, whereby in 2001, 60%
    of the country’s total population was already using the Web. It was also stressed
    that for marginalized communities to be able to take part in the information age,
    it is necessary to have telecommunications policies, infrastructures, and education
    in place. The study concluded that disadvantaged communities face obstacles in
    using computers and even having access to the Internet due to the exorbitant expenses,
    low income, the overwhelming prevalence of the English language, the absence of
    pertinent material, and inadequate technological assistance.


    On the same wavelength, a few years later, White et al. set out to assess the
    global digital divide through an empirical study involving three parameters [12].
    It is mentioned that the gap that previously existed between highly developed
    and underdeveloped countries had broadened substantially. As such, the aim of
    the research was to create a comprehensive map representation of the current state
    of the digital divide, with countries being the focal point of analysis. An assessment
    of the current state of the global digital divide was conducted, which serves
    as a starting point for monitoring changes and conducting future research. As
    their information source, the authors used a dataset from the International Telecommunications
    Union (ITU), consisting of time-series data for almost 100 communications characteristics
    for 172 countries. Despite already having ample information regarding personal
    computers per 100 people and Internet users per 100 people, they emphasized the
    importance of also analyzing the quality of Internet access, in turn incorporating
    the third metric, i.e., the international Internet bandwidth per inhabitant. The
    method used to classify the countries among four tiers was the `K-means` clustering
    algorithm, allowing a clear demarcation of classified countries. The experiment
    concluded in the availability of a contemporary map representing the digital divide,
    as a baseline for further research.


    In [13], De-Arteaga et al. examined the adoption of the ML sphere for real-world
    scenarios with particular attention to developing countries. The study is geared
    toward global development and mentions the lack of Internet accessibility, availability
    of data, and computational abilities in poor countries. The authors take the example
    of small communities in South Africa where niche languages are still spoken. They
    thus propose the implementation of natural language technologies, text-to-speech
    functionalities, and automated speech recognition techniques to bridge the gap
    between Internet connectivity.


    Likewise, in [14], Alper and Miktus discussed the digital connectivity in sub-Saharan
    Africa, providing a comparative perspective by firstly confirming the existence
    of the global digital divide using the unsupervised ML `K-means` clustering algorithm
    on a dataset of 190 countries. The authors then used a composite digital connectivity
    index where the analysis revealed that the majority of countries in the sub-Saharan
    Africa region lagged behind in terms of digital connectivity, particularly in
    areas such as infrastructure, Internet access, and domain expertise. They also
    emphasize the fact that despite being heavily invested in information, communications,
    and technology (ICT) facilities, these countries still require a digital linkage
    to hop onto the technological train.


    Additionally, the study also involved the relationship between 100 independent
    parameters to assess the weight of the digital divide. This was performed using
    logistic regression models, with some indicators concerning the SDGs. To conclude
    the experiment, the authors highlighted the significance of regulatory and business-facilitating
    environments, increased urbanization, and the availability of electrical power.


    Further, Walelgne et al. proposed an effective approach to tackle the issue revolving
    around the data utilization patterns of mobile users, which ultimately dictates
    the optimal allocation of resources based on user traffic demand and behavior
    [15]. Using a dataset obtained from Netradar, which is a mobile network measurement
    infrastructure that collects information on a crowdsourcing basis, the study was
    focused on examining the patterns and behavior of users when it comes to using
    mobile data. Data was obtained from five different countries, and the primary
    factors considered were the users’ mobility, subscription plan, network coverage,
    and network congestion. The approach involved the `K-means` method to categorize
    mobile users based on factors such as data consumption, network access type, number
    of user sessions, throughput, and mobility. Thus, a clustering model was produced,
    revealing that the distribution of patterns among the five countries, namely,
    Finland, United Kingdom, Japan, Brazil, and Germany, is not uniform. In most cases,
    the high volume of data usage was due to a minority of users who consume a large
    amount of data. Heavy users have a tendency to install applications that require
    more traffic compared with regular and casual users.


    The labeled dataset was then used to train three classification models including
    decision tree, gradient boosting classifiers, and random forest. The decision
    tree model offered the best performance accuracy of around 80%.'
