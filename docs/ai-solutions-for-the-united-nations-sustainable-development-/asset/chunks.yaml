    and GDP values entered. The predicted value is of 320000 bpt. Furthermore, a 3D
    scatter plot has been generated to illustrate CO[2] emissions against population,
    and GDP values. Both the original data points and the predicted CO[2] emissions
    are as displayed in Figure [4-11](#625524_1_En_4_Chapter.xhtml#Fig11).


    ![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    k-NN: prediction and plot of CO[2] emissions


    Similarly, GHG emissions have been predicted based on the provided population
    and GDP values, as displayed in Figure [4-12](#625524_1_En_4_Chapter.xhtml#Fig12).
    Based on the user’s input of population value of 1,300,000 and GDP value of 8.2,
    the program estimated GHG emissions to be approximately 330000 bpt. Then, a 3D
    scatter plot illustrated the relationship between GHG emissions, population values,
    and GDP values. The program also calculates the Other Gases value as the difference
    between the GHG and CO[2] predictions, yielding a value of 10,000 bpt. Since the
    predicted value of GHG emissions exceeded the threshold of 25000 bpt, the actions
    taken were specified as implementing sustainability strategies.


    ![](images/625524_1_En_4_Chapter/625524_1_En_4_Fig12_HTML.jpg)


    Figure 4-12


    k-NN: prediction and plot of GHG emissions


    ### 4.5.4 Discussion


    Our study aimed to assess whether GHG emissions from the manufacturing sector
    in Mauritius exceed the threshold value set by the U.S Environmental Protection
    Agency (EPA), whereby the guideline states, “Most small businesses would fall
    below the 25,000 metric ton threshold and are not required to report GHG emissions
    to EPA” [26]. If our predicted GHG values exceed the EPA’s established threshold
    of 25,000 metric tons, then it implies that Mauritius needs to intensify its climate
    action efforts, particularly within the manufacturing sector. This evaluation
    aligns with SDG 13, which focuses on climate action. GHGs contribute to ozone
    depletion, allowing cancer-causing UV rays to enter the atmosphere.


    By assessing Mauritius’s compliance with the EPA threshold, we are investigating
    the extent to which manufacturing industries contribute to elevated CO[2] and
    GHG emissions, thereby supporting the objectives of SDG 13. Additionally, SDG
    9, which aims to promote sustainable industrialization and innovation, is relevant.
    Manufacturing industries play a pivotal role in achieving SDG 9 as one of the
    drivers of economic growth and employment. However, the energy consumption and
    production processes significantly contribute to global CO[2] and GHG emissions,
    impacting climate change. Quantifying CO[2] and GHG emissions with the help of
    ML algorithms provides insights into the environmental impact of Mauritius’s manufacturing
    industries, aligning with SDG 9’s goal of fostering sustainable industrialization.


    Moreover, our analysis of Other Gases reveals that manufacturing industries emit
    gases like methane, chlorofluorocarbons, nitrous gases, and other toxic gases.
    These gases contribute significantly to GHG emissions other than CO[2], with equally
    significant environmental consequences. Taking action to mitigate these emissions
    aligns with the objectives of SDG 13, which aims to combat climate change. We
    observed that the MAPE obtained for MLR was lower than for SLR, indicating better
    model accuracy for prediction. Table [4-2](#625524_1_En_4_Chapter.xhtml#Tab2)
    shows an accuracy measure of the ML algorithms used for prediction.


    Table 4-2


    Accuracy of ML Algorithms


    | ML Algorithm | % Accuracy |

    | --- | --- |

    | CO[2] Emissions | GHG Emissions |

    | --- | --- |

    | SLR | 82.704 | 84.117 |

    | MLR | 88.818 | 89.215 |


    It can be noted that MLR has a higher accuracy value for both CO[2] and GHG emissions
    predictions compared to SLR. The 3D scatter plots illustrate the relationship
    between emissions and economic factors, further comprehending the impact of industrial
    activities on emissions.


    In conclusion, our study can serve as a crucial resource for policymakers and
    stakeholders, enabling them to gain insights into emissions generated by the manufacturing
    industries. This information empowers them to take action to mitigate these emissions
    continually. The implemented system will ensure the ongoing monitoring of yearly
    GHG emissions from Mauritius’ manufacturing sector and aligning with environmental
    protection agencies’ predictions. This approach contributes to SDG 9 and SDG 13
    by addressing the impact of manufacturing industries and their role in climate
    action, ultimately advancing sustainable development in Mauritius.'
