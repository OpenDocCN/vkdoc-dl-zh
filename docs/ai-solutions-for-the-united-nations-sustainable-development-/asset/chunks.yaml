  trans: '

    # 4. 利用机器学习算法实现制造业排放与可持续发展目标 9 和 13 的协同


    **本章作者：**


    Mohadeb Sai Maadhavee, `sai.mohadeb@umail.uom.ac.mu`


    Radhakeesoon Aishani, `aishani.radhakeesoon@umail.uom.ac.mu`


    Seeballack Oushna, `oushna.seeballack@umail.uom.ac.mu`


    联合国可持续发展目标（SDGs）是应对社会、经济和环境挑战的全球蓝图。新兴的机器学习（ML）工具为可持续发展提供了创新方法。本章聚焦于 SDG 9（产业、创新和基础设施）和
    SDG 13（气候行动），采用基于回归技术的机器学习算法来预测和量化对目标 SDGs 的影响。研究方法包括选取涵盖毛里求斯制造业的二氧化碳（CO[2]）、温室气体（GHG）排放、国内生产总值（GDP）年增长率和人口数量的多样化数据集。


    我们使用了简单线性回归（SLR）、多元线性回归（MLR）和 k 近邻（k-NN）算法来确定经济因素、人口统计与环境影响之间的关系。机器学习算法的应用通过揭示
    GDP 和人口如何影响制造业的 CO[2]和 GHG 排放，为可持续发展提供了预测和见解。此外，进一步计算了预测的 GHG 与 CO[2]排放量之间的差值，以获取其他导致温室效应的气体的数值，并利用美国环境保护署（EPA）设定的
    25,000 公吨阈值，指出了预测的 GHG 排放量是超过还是低于该阈值所需采取的必要措施。根据所得结果，对于 SLR 算法，CO[2]排放的准确率为 82.704%，GHG
    排放的准确率为 84.117%。


    对于 MLR 算法，CO[2]排放的准确率为 88.818%，GHG 排放的准确率为 89.215%。注意到 MLR 的准确率高于 SLR，这表明该模型在预测方面具有更好的准确性。主要创新点在于使用回归技术来预测制造业的
    GHG 排放及其相关影响和可持续解决方案。因此，所采用的机器学习与产业及气候行动的整合，强调了在实现 SDGs 过程中催化变革性变革的可能性。


    ## 4.1 引言


    SDGs，也称为全球目标，是一项全球性倡议，敦促各国共同努力，到 2030 年消除贫困、保护地球，并确保每个人都能生活在和平、公正与繁荣之中[1]。它们作为《2030
    年可持续发展议程》的组成部分，得到了联合国所有成员国的采纳。共有 17 个 SDGs 和 169 个具体目标，每个目标都有不同的任务和指标[2]。


    本项任务聚焦于其中两个 SDGs：SDG 9 和 SDG 13。SDG 9 侧重于产业、创新和基础设施，而 SDG 13 则关注气候行动[3]。机器学习算法通过为可持续发展提供创新解决方案，在推进这些目标方面发挥着关键作用。将机器学习融入
    SDGs 凸显了其加速迈向更可持续、更公平世界的变革潜力。例如，它可以应用于使用决策树（DT）等分类器来预测住宅区的能源效率。


    此外，还可以利用神经网络和贝叶斯网络模型来创建优化工业设施和产品环境保护的模型。借助各种机器学习算法，如 K 近邻（k-NN）、朴素贝叶斯（NB）、决策树（DT）和支持向量机（SVM），理解可持续发展的优先事项已成为可能[4]。


    在联合国 SDGs 背景下使用机器学习的另一个例子见于文献[5]，其中长短期记忆（LSTM）深度学习算法预测了智能电网中的能源需求，这与关于气候行动的 SDG
    13 相一致。该研究还与其他预测算法（Facebook Prophet、随机森林（RF）和支持向量回归（SVR））进行了结果对比分析。评估了该机器学习算法对实现
    SDG 9、SDG 13 以及额外 SDG 7 的贡献能力[5]。此外，在文献[6]中，考虑了来自南印度五个邦（安得拉邦、卡纳塔克邦、喀拉拉邦、泰米尔纳德邦和特伦甘纳邦）的
    17 个 SDG 数据集（包括 SDG 9 和 13）。用于获取数值结果的机器学习技术包括高斯过程、线性回归、RF 和带有特定精度参数的 REP 树[6]。


    本章的主要焦点是通过预测制造业中的二氧化碳（CO[2]）和温室气体（GHG）排放，并考虑国内生产总值（GDP）年增长率和人口作为影响因素，来分析 SDG 9
    与 SDG 13 之间的关系。采用了一种结合数据驱动分析和回归技术的方法。


    为了预测 CO[2]和 GHG 排放，回归技术的原理建立了自变量（GDP 和人口）与因变量（CO[2]和 GHG 排放）之间的数学关系。简单线性回归（SLR）、多元线性回归（MLR）和
    k 近邻（k-NN）等回归模型提供了宝贵的见解，揭示了 GDP 和人口变化对排放变动的具体影响程度，同时分析了影响因素与 CO[2]及 GHG 预测之间的相关性。


    主要发现揭示了制造业中 GDP、人口与排放之间存在显著关联，即随着 GDP 和人口的增长，CO[2]和 GHG 排放也相应增加。这些发现凸显了经济发展与制造业环境影响之间的复杂联系，强调了将
    SDG 9 促进可持续工业化的目标与 SDG 13 减缓气候变化的优先事项相协调的重要性。


    本章探讨的主要研究问题如下：


    1.  GDP 和人口在多大程度上导致了制造业的 CO[2]和 GHG 排放？

    2.  基于 GDP 和人口数据，SLR 和 MLR 等线性回归模型预测排放的准确度如何？

    3.  k-NN 算法预测排放值的准确度如何？

    4.  如何对预测数据进行进一步分析？


    本章提出的主要创新点在于，利用 SLR、MLR 和 k-NN 等回归技术，从多角度预测制造业相关的 GHG 排放，这为制定更多数据驱动的可持续解决方案以减轻温室效应对气候的影响铺平了道路。

    '
- fmt: '### 4.2 Use Cases for SDGs 9 and 13


    This section will review the analysis conducted by other researchers that are
    related to the application of ML algorithms to achieve UN SDGs.


    A “ML-driven decision support model for implementing greenhouse gas reduction”
    was introduced in [7]. Lee and Tae proposed the use of ML techniques to assess
    greenhouse gas (GHG) reduction, aiming to determine the economic and environmental
    benefits of GHG reduction technologies. They analyzed 1,199 GHG reduction projects
    in Korea by developing the simple assessment method (SAM) database for assessing
    GHG technologies. Subsequently, ML models such as gradient boosted regression
    trees (GBRTs), `SVM`, and deep neural networks (DNNs) were employed to create
    the GHG reduction technology assessment model (GRTM) decision-support tool. Among
    the three ML models, `DNN` demonstrated a better predictive accuracy. A practical
    case study confirmed the potential to reduce 111 tons of `CO[2]`-equivalent emissions
    through optimal GHG reduction technologies like high-efficiency lighting, solar
    power, and geothermal energy, correcting an initial overestimation of 358 tons.
    The study shows the application of ML in assessing GHG reduction technologies
    while considering real-world building conditions and data.


    A study was conducted by authors [8] where they developed a machine-learning model
    using regression-kriging to categorize the radiative energy flux at the earth’s
    surface. The objective was to promote environmental sustainability by using solar
    panels. The study used multiple input factors and data modeling to assess environmental
    sustainability and involved conducting several simulations to evaluate the model’s
    effectiveness. The results demonstrated a significant improvement in sustainability
    when compared to other approaches. The study shows how ML models can be employed
    to promote sustainable practices and reduce environmental impact.


    A study was proposed by Piryonesi and El-Diraby [9] on the impact of climate change
    on infrastructures by employing ML to predict pavement condition index. Various
    machine algorithms including `DT`, `k-NN`, `NB` classifier, `RF`, and gradient-boosted
    trees were tested on a vast dataset extracted from the Long-Term Pavement Performance
    (LTPP) database. Subsequently, the last three algorithms achieved the highest
    accuracy of at least 90%. The attributes for the model were deliberately selected,
    to associate them with the climate stressors including temperature ranges, perspiration,
    and freeze-thaw cycle to allow the models to quantify the impact of climate change.


    The proposed tool enables the examination of the impacts of different climate
    scenarios by inputting attributes specific to each scenario. To illustrate its
    utility, the tool was used to assess the deterioration of two sets of roads, one
    in Ontario and another in Texas, under two different climate scenarios. The analysis
    revealed that the Ontario roads exhibited lower levels of deterioration, while
    the roads in Texas experienced an exacerbation of deterioration. This suggests
    that the effects of climate change on road deterioration vary by location.


    In [10] Asadikia et al. the authors showcased a technique using an ML algorithm
    to prioritize SDGs based on their synergetic properties. The primary goal of this
    paper was to discover synergies among SDGs through the use of the Boosted Regression
    Trees model, which is an ML and data mining technique. Their study illustrates
    how each SDG contributed to the formation of the SDG index, and a “what-if” analysis
    was performed to understand the importance of these goal scores. The results demonstrated
    that their scores were greater than 60%, and SDGs 3, 4, and 7 exhibited the highest
    synergies. These research findings can guide decision-makers in implementing effective
    strategies and resource allocation, by prioritizing goals that have high synergy.


    The authors in [11] proposed and evaluated several ML models for their predictive
    performance considered as `DT`, `RF`, `k-NN`, and Support Vector Regression (SVR)
    to predict metro ridership in line to achieve sustainable transportation and environment
    while contributing to the SDGs 9, 11, 12, and 13. The transportation sector faces
    prolonged and intense congestion, and vehicles contribute to 25% of `CO[2]` emissions,
    which are dependent on non-renewable energy. Innovative solutions for sustainable
    transport necessitated the use of computational technology to evaluate a metro
    transport system for sustainable development in line to reduce `CO[2]` emissions.
    The analysis of the prediction’s accuracy on the test data with the ML used are
    as follows: 87.4% with `DT` using the `CART` algorithm, 84.4% with `k-NN`, and
    69.7% using `SVR`.


    In [12], the use of ML algorithm `ANN` by Rao et al., consisting of 2 layers of
    neurons, promoted the usage of renewable energy sources while mitigating the impact
    of `CO[2]` emissions to achieve SDGs 7 and 13. From the ML results, the error
    of the model was measured using evaluation metrics Root Mean Squared Error (RMSE)
    and Mean Absolute Percentage Error (MAPE). The `MAPE` value was 0.3, which is
    30% as a percentage representation. Thus, the accuracy of the artificial neural
    network (ANN) model, which predicted the amount of `CO[2]` generated by the use
    of clean and renewable energy sources, is 70%.


    The study by Sami et al. [13] meticulously compared the accuracy of machine and
    deep learning algorithms such as convolutional neural network (CNN), support vector
    machine (SVM), `RF`, and `DT` to automate waste classification, which can be categorized
    in SDGs 9 and 12 with industrial waste management. The models’ results are as
    follows; `CNN` provided a high accuracy value of 90%, `SVM` had an accuracy value
    of 85%, `DT` had 65% accuracy, and `RF` was 55% accurate.


    The work of Liu et al. in [14] analyzed the interconnections of SDG 8 and SDG
    13 whereby climate actions can have both synergies and trade-offs for economic
    growth and social employment. ML algorithms such as `RF` and extreme gradient
    boosting (XGB) were used to capture the impacts of climate change on the economy.
    The overall accuracies were determined as 78% and 72% for `XGB` and `RF` models,
    respectively.


    The enthusiasm of the Asian youth for achieving SDGs was evaluated Gaur et al.
    [15]. Evidence of the successful use of ML algorithms to highlight their viewpoints
    about a sustainable future was provided. In the study, building blocks from previous
    research were used, and a comparative analysis of the prediction accuracy of Adaptive
    Neuro-Fuzzy Inference System (ANFIS) and `RF` models for three categories of SDGs
    was made. Possible differences in viewpoints on the importance of the categories
    among both Asian and Serbian youth were considered. Data collection was from 425
    youth respondents. `ANFIS` better predicted SDGs than the `RF` model. The Asian
    and Serbian youth had the greatest SDG preference for the environment, followed
    by the society and, lastly, the economy.


    Conventional and intelligent control methods were studied by Parvin et al. in
    [16] with emphasis on their classification, configuration, features, pros and
    cons. Different optimization objectives and constraints as applicable to energy
    consumption, comfort management, and scheduling were investigated. Different methodological
    approaches to optimization algorithms used in building energy management were
    outlined, and the contributions of controller and optimization in relation to
    SDGs were critically explained. Building Energy Management System (BEMS) can represent
    a sustainable model to improve economic growth, linked to SDG 9.1. Additionally,
    BEMS contribute to addressing environmental impacts, related to SDG 13. In BEMS,
    the control methods can be classified into conventional and intelligent. However,
    the intelligent approach is preferred due to their design based self-learning
    skills. In the intelligent approach, either learning methods are used or model-based
    predictive control methods are used. The learning methods include hybrid methods,
    `ANN`, and fuzzy system.


    In a study by Ghaffarian and Emtehani in [17], the monitoring of deprived urban
    areas over a 4-year period, following the impact of super Typhoon Haiyan, in the
    Philippines, in 2013, has been considered using both satellite imagery and ML
    methods. The severity and impact of natural disasters in such areas has significantly
    increased, requiring effective disaster risk reduction strategies as catered for
    in SDG 13. A `SVM` classification method supported by a local binary pattern feature
    extraction model initially detected slum areas in pre and post disaster imageries.
    Afterward, a dense conditional random fields model produced final slum areas maps.
    The developed method detected slum areas with high accuracy. The results revealed
    that the city returned to the pre-existing vulnerability level.


    The research by [15] the predictive accuracy of the adaptive neuro-fuzzy inference
    system (ANFIS) and `RF` ML models were compared for three categories of SDGs (environmental,
    social, and economic). `ANFIS` better predicted SDGs than the `RF` model. The
    SDG preference among Asian and Serbian youth was found to be highest for the environmental
    pillar.'
