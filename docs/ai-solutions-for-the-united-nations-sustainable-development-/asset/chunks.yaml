    ### 7.3.4 Application System Model


    In this section, the model for the web application is broken down into its components.
    The basic principle revolves around the web page taking as input the CSV dataset
    and performing K-means clustering to yield different levels of Internet connectivity
    development. The end user thus has a dashboard with the following capabilities:


    1. Browse and select a CSV file as the dataset.

    2. Select whether the clustered CSV file is downloaded locally.

    3. Obtain a world map with five levels of worldwide Internet connectivity development.

    4. Select the exact year ranging from 1980 to 2020 with a slider, to dynamically
    change the contents of the world map.


    These functionalities are coded such that the dataset follows the same format
    as depicted in Figure [7-1](#625524_1_En_7_Chapter.xhtml#Fig1). Once clustered,
    the resulting CSV file contains the `Label` and `Category` columns, which correspond
    to the numerical and informational labels, respectively. This application is coded
    with a blend of HTML and CSS as the front-end languages and JavaScript as the
    back-end pillar. Thus, client-side JavaScript allows ML to be performed within
    a few clicks inside of the web browser. It is to be noted that all the code of
    this chapter can be found in the folder `Chapter 7 – Codes` hosted on the GitHub
    page of this book.


    #### Components and Functionalities


    This web application, titled Worldwide Internet Connectivity Development, works
    with the combination of two files, as described next:


    - **`index.html`**: This HTML file defines the structure and content of the user
    interface (UI), which contains several dashboard cards including the selection
    of the dataset, a legend, a slider, icons for the targeted SDGs, and a container
    for the world map. It also consists of a button that triggers the back end, i.e.,
    the JavaScript code.

    - **`script.js`**: This file acts as the logic for the `index.html` file, thereby
    containing the methods called when UI elements are interacted with. As the backend
    file, it handles tasks such as performing the clustering ML operation and updating
    the world map each time the slider is adjusted to select a different year.


    On the same wavelength, the libraries and external frameworks associated with
    the development of this application are given in Table [7-1](#625524_1_En_7_Chapter.xhtml#Tab1).


    **Table 7-1** Description of Libraries and Resources


    | Library/Resource | Purpose | Repository | Download Link | Location |

    | --- | --- | --- | --- | --- |

    | Plotly.js | Provides interactive data visualizations in the web browser. | [21]
    | | `index.html` |

    | Papa Parse | Provides a simple interface for parsing CSV data and converting
    it into arrays or objects. | [22] | | |

    | bootstrap.min.css | Customized Bootstrap stylesheet for organizing row and columns.
    | [23] | [24] | |

    | ml.js | Provides implementations for training and deploying ML algorithms. |
