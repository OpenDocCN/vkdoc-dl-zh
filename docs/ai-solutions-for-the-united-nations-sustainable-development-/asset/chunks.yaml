    Moving on to KNN regression, our investigation delved into the realm of K values,
    ranging from 2 to 10\. This exploration brought to light an intriguing trend in
    the model’s behavior regarding the choice of K values. Notably, the MAPE exhibited
    a tendency to increase as K grew larger. However, what stood out was the model’s
    remarkable achievement of a flawless MAPE of 0 when K was set to 1\. While this
    result might appear exceptionally promising, it raised a critical concern—overfitting.
    Notably, K=4 resulted in the lowest MAPE of 13.288, indicating better predictive
    performance.


    KNN regression boasts its strengths in simplicity and intuitiveness. It is straightforward
    to understand and implement, making it an attractive choice for various applications.
    Additionally, KNN operates in a nonparametric manner, meaning it doesn’t require
    assuming a specific functional form for the relationship between variables. This
    flexibility can be advantageous when dealing with data where the underlying relationship
    is not well-defined.


    Nonetheless, KNN regression has its share of weaknesses. One significant limitation
    is its sensitivity to the choice of K. The model’s performance can vary significantly
    depending on the selected K value, making it crucial to perform cross-validation
    to determine the optimal K. Additionally, for larger datasets, KNN can become
    computationally expensive, as it involves calculating distances between data points.'
  trans: '

    ### 2.4.5 KNN 分类


    最后，在实验四中，我们将分析使用不同 `K` 值（最近邻数量）进行 KNN 分类实验所获得的结果，及其对风电功率预测精度的影响。分类结果使用“高”、“中”、“低”来表示预测的风电功率水平。我们的
    KNN 分类实验结果如表 2-6 所示，其中 `K` 的取值范围为 1 到 10，相应的准确率百分比记录在表 2-6 中。当使用的 `K` 值大于 10 时，分类结果与
    `K=10` 时相同。


    ![](img/625524_1_En_2_Fig16_HTML.png)


    **图 2-16** 准确率与 `k` 值的关系


    **表 2-6** 结果-KNN 分类


    | K 值 | 准确率 (%) | 分类结果 |

    | --- | --- | --- |

    | 2 | 100 | 中 |

    | 3 | 96.997 | 中 |

    | 4 | 98.19 | 中 |

    | 5 | 95.58 | 中 |

    | 6 | 96.71 | 中 |

    | 7 | 94.77 | 中 |

    | 8 | 95.799 | 中 |

    | 9 | 93.926 | 中 |

    | 10 | 94.63 | 中 |


    随着 `K` 值的增加，模型的准确率依然保持惊人的高水平，仅有轻微波动。与不同 `K` 值相关的准确率百分比展示了模型有效分类风电功率水平的能力。显而易见，当
    `K` 等于 1 和 2 时，准确率异常高，均达到了 100% 的完美准确率。这表明，当模型仅考虑最近的相邻数据点时，它在精确预测风电功率水平方面表现出色。这种准确率水平在需要细粒度预测以进行即时决策的应用中至关重要，例如在风力波动的条件下管理电网负荷。


    对于 `K` 值从 3 到 10 的范围，模型始终将风电功率分类为“中”，偶尔也分类为“中”。当使用的 `K` 值大于 10 时，分类结果与 `K=10`
    时相同。因此，可以得出结论，当 `K=10` 时获得最佳结果。这与这些 `K` 值所达到的高准确率相一致，表明模型在将风电功率归类为“中”时很有信心，但在考虑稍远一些的邻居时，分类结果会出现轻微变化。


    凭借 96.997% 的准确率，`K=3` 在精确性和鲁棒性之间取得了平衡。对于可以接受稍广范围的相邻数据点，但仍需高准确率的应用来说，这是一个强有力的选择。这种精确度水平在诸如优化可再生能源并入电网等场景中尤其有价值。当目标是确保以最高准确率对风电功率水平进行分类时，此设置能带来卓越的结果。


    从 `K=4` 到 `K=10`，这些值在保持高准确率的同时，对风电功率条件的变化提供了稍强的适应性。它们适用于那些可以容忍更广泛地考虑相邻数据点，并且可能遇到更多样化风电功率场景的应用。


    ### 2.4.6 回归模型对比分析：多项式回归 vs. KNN 回归 vs. 多元线性回归


    在这项综合分析中，我们深入探讨了三种不同回归模型的性能：多项式回归、K 近邻（KNN）回归和多元线性回归，并以它们各自的平均绝对百分比误差（MAPE）结果作为衡量标准。MAPE
    是一个关键指标，用于量化这些回归模型在预测连续目标变量时的准确性。在本节中，我们根据所提供的结果，对每个模型的优缺点进行了全面审视。参见图 2-17。


    ![](img/625524_1_En_2_Fig17_HTML.png)


    **图 2-17** KNN、多项式回归和 MLR 的 MAPE


    对于多项式回归，我们探索了从 4 到 14 的多项式次数范围。这些次数对应着不同的平均绝对百分比误差（MAPE）值，在次数为 9 时观察到显著改善，MAPE
    降至 7.57。多项式回归的优势在于其处理变量间复杂非线性关系的能力。这使得它特别适合捕捉电力系统数据中通常表现出的非线性行为的复杂模式。此外，该模型提供了相当大的灵活性，能够适应广泛的数据模式和变化。


    然而，多项式回归并非没有缺点。主要问题之一是其容易过拟合，尤其是当次数过高时。过拟合发生在模型过于紧密地拟合训练数据，从而捕捉到噪声和不相关的波动时。该模型的另一个挑战是最优多项式次数的选择。需要在模型复杂度和预测精度之间取得平衡，这需要细致的考量。选择过高的次数可能导致过拟合，而过低的次数则可能导致欠拟合，即模型过度简化了变量间的关系。


    实验最终揭示，在所探索的次数中，次数 9 是最优选择。它实现了最低的 7.57% 的 MAPE，这凸显了微调模型复杂度以匹配数据特征的重要性。这个最优次数在捕捉电力系统行为的复杂性和避免过拟合陷阱之间取得了平衡。


    接下来看 KNN 回归，我们的研究深入探讨了 `K` 值（范围从 2 到 10）的领域。这一探索揭示了模型行为中一个关于 `K` 值选择的引人注目的趋势。值得注意的是，MAPE
    呈现出随着 `K` 值增大而增加的趋势。然而，最突出的是，当 `K` 设置为 1 时，模型取得了完美的 0 MAPE 这一非凡成就。虽然这个结果看起来非常有希望，但它引发了一个关键问题——过拟合。值得注意的是，`K=4`
    产生了最低的 MAPE 值 13.288，表明其预测性能更佳。


    KNN 回归的优势在于其简单性和直观性。它易于理解和实现，使其成为各种应用的有吸引力的选择。此外，KNN 以非参数方式运行，这意味着它不需要假设变量间关系具有特定的函数形式。当处理潜在关系不明确的数据时，这种灵活性可能是有利的。


    尽管如此，KNN 回归也有其缺点。一个显著的局限性是其对 `K` 值选择的敏感性。模型的性能会因所选 `K` 值的不同而发生显著变化，因此进行交叉验证以确定最优
    `K` 值至关重要。此外，对于较大的数据集，KNN 可能会变得计算成本高昂，因为它涉及计算数据点之间的距离。

