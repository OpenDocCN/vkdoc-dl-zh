  trans: '

    ### 4.5.2 多元线性回归 (MLR)


    当执行 `MLR.html` 程序时，它会启动一个用户提示，用户可在其中指定要显示的行数、选择一个有效的 CSV 文件，并输入人口规模和 GDP 值等参数。


    用户请求从所选 CSV 文件中查看 10 行数据，并指定了人口规模为 1,300,000，GDP 值为 8.2。图 4-9 展示了程序根据用户输入成功显示了所请求的
    10 行数据。该程序还执行了回归分析，并生成了以下方程，用于根据提供的人口和 GDP 值预测 CO[2] 的值。使用该方程以及提供的用户输入（人口：1,300,000，GDP：8.2），程序估算出
    CO[2] 排放量约为 417,243.689 bpt，并计算出 MAPE 为 11.182%。该 MAPE 值表明模型对数据的拟合精度相当不错。此外，我们还生成了一个三维散点图，展示了
    CO[2] 排放量与人口和 GDP 值的关系，图中显示了原始数据点、预测的 CO[2] 排放量以及代表模型关系的回归线。


    ![](img/625524_1_En_4_Fig9_HTML.jpg)


    图 4-9


    MLR：CO[2] 排放量的预测与绘图


    类似地，该程序执行了另一次回归分析，并制定了另一个方程，用于根据提供的人口和 GDP 值预测 GHG 排放量，如图 4-10 所示。根据用户的输入（人口：1,300,000，GDP：8.2），程序使用该方程估算出
    GHG 排放量约为 418,083.717 bpt，并得到 MAPE 为 10.785%。此外，我们创建了一个三维散点图，描绘了 GHG 排放量与人口和 GDP
    值的关系。图中显示了原始数据点、预测的 GHG 排放量以及说明模型关系的回归线。程序还将其他气体值计算为 GHG 与 CO[2] 预测值之差，得出值为 849.028
    bpt。由于 GHG 排放量的预测值超过了 25000 bpt 的阈值，因此指定的行动是实施可持续发展战略。


    ![](img/625524_1_En_4_Fig10_HTML.jpg)


    图 4-10


    MLR：GHG 排放量的预测与绘图


    ### 4.5.3 k-最近邻算法 (k-NN)


    当执行 `KNN.html` 程序时，它会启动一个用户提示，允许用户指定要显示的行数并选择一个有效的 CSV 文件。所选 CSV 文件包含与人口和 GDP
    参数相关的数据。


    用户从所选 CSV 文件中输入行数为 10，人口规模为 1,300,000，GDP 值为 8.2。所选的行数 10 如图中所示。根据输入的人口和 GDP 值，显示预测的
    CO[2] 排放量。预测值为 320000 bpt。此外，还生成了一个三维散点图，以说明 CO[2] 排放量与人口和 GDP 值的关系。原始数据点和预测的
    CO[2] 排放量均如图 4-11 所示。


    ![](img/625524_1_En_4_Fig11_HTML.jpg)


    图 4-11


    k-NN：CO[2] 排放量的预测与绘图


    类似地，根据提供的人口和 GDP 值预测了 GHG 排放量，如图 4-12 所示。根据用户输入的人口值 1,300,000 和 GDP 值 8.2，程序估算出
    GHG 排放量约为 330000 bpt。然后，一个三维散点图展示了 GHG 排放量、人口值和 GDP 值之间的关系。程序还将其他气体值计算为 GHG 与
    CO[2] 预测值之差，得出值为 10,000 bpt。由于 GHG 排放量的预测值超过了 25000 bpt 的阈值，因此指定的行动是实施可持续发展战略。


    ![](img/625524_1_En_4_Fig12_HTML.jpg)


    图 4-12


    k-NN：GHG 排放量的预测与绘图


    ### 4.5.4 讨论


    我们的研究旨在评估毛里求斯制造业的 GHG 排放量是否超过了美国环境保护署 (EPA) 设定的阈值，该指南指出，“大多数小型企业的排放量将低于 25,000
    公吨的阈值，无需向 EPA 报告 GHG 排放量”[26]。如果我们的预测 GHG 值超过了 EPA 设定的 25,000 公吨阈值，则意味着毛里求斯需要加强其气候行动力度，特别是在制造业领域。这一评估与专注于气候行动的可持续发展目标
    13 相一致。温室气体导致臭氧层消耗，使致癌的紫外线进入大气层。


    通过评估毛里求斯是否符合 EPA 阈值，我们正在调查制造业在多大程度上导致了 CO[2] 和 GHG 排放量的升高，从而支持可持续发展目标 13 的目标。此外，旨在促进可持续工业化和创新的可持续发展目标
    9 也与此相关。制造业作为经济增长和就业的驱动力之一，在实现可持续发展目标 9 方面发挥着关键作用。然而，其能源消耗和生产过程对全球 CO[2] 和 GHG
    排放量有显著贡献，从而影响气候变化。借助机器学习算法量化 CO[2] 和 GHG 排放量，可以深入了解毛里求斯制造业对环境的影响，这与可持续发展目标 9 促进可持续工业化的目标相一致。


    此外，我们对其他气体的分析表明，制造业会排放甲烷、氯氟烃、氮氧化物和其他有毒气体。这些气体对除 CO[2] 之外的 GHG 排放量贡献显著，并具有同样重大的环境后果。采取行动减少这些排放符合旨在应对气候变化的可持续发展目标
    13 的目标。我们观察到，MLR 获得的 MAPE 低于 SLR，表明其预测的模型精度更高。表 4-2 显示了用于预测的机器学习算法的精度度量。


    表 4-2


    机器学习算法的精度


    | 机器学习算法 | 精度百分比 |

    | --- | --- |

    | CO[2] 排放量 | GHG 排放量 |

    | --- | --- |

    | SLR | 82.704 | 84.117 |

    | MLR | 88.818 | 89.215 |


    可以看出，与 SLR 相比，MLR 在 CO[2] 和 GHG 排放量预测方面都具有更高的精度值。三维散点图说明了排放量与经济因素之间的关系，有助于进一步理解工业活动对排放量的影响。


    总之，我们的研究可以作为政策制定者和利益相关者的关键资源，使他们能够深入了解制造业产生的排放量。这些信息使他们能够采取行动持续减少这些排放。所实施的系统将确保持续监测毛里求斯制造业的年度
    GHG 排放量，并与环境保护机构的预测保持一致。这种方法通过解决制造业的影响及其在气候行动中的作用，有助于实现可持续发展目标 9 和可持续发展目标 13，最终推动毛里求斯的可持续发展。

    '
- fmt: '### 4.6 Recommendations


    Since our whole analysis is solely based on SDG 9 and SDG 13, other SDGs relating
    to other sectors, including agriculture, education, health, among others, could
    have also been studied for better comparative analysis. Additionally, the extent
    to which specific SDGs can be achieved varies from continent to continent. ML
    algorithms can be used to identify SDGs distinct to a specific geographical or
    topological area. For example, United States is the greatest contributor to GHG
    emissions (SDG 13) [27], and there are striking poverty issues in Africa (SDG
    1) [28].


    ### 4.7 Improvements


    - For data preprocessing, a better approach would have been to opt for the binning
    approach whereby the values are first sorted, before being divided into “bins,”
    or rather buckets of the same size. Then, a mean or median is applied to each
    bin for smoothing.

    - When it comes to SLR, the regression analysis could have been used to make informed
    policy recommendations aiming at promoting SDG 9 and SDG 13. The implemented model
    could have been extrapolated to meet other projections.

    - For MLR, the model could have been used to make more distinct policy recommendations
    that account for the several factors leading to SDG 9 and to SDG 13. As such,
    the impact of policy changes on both goals could have been assessed.

    - The k-NN model could have been used with other machine learning models for more
    accurate predictions. Furthermore, the k-NN model lacks interpretable coefficients
    such as linear regression. Consequently, focus can be shifted on prediction accuracy
    and on the use of visualization tools to grasp how the k-NN algorithm makes predictions.


    Finally, since there are ethical implications associated with the use of machine
    learning models in decision-making, it is of paramount importance to involve experts
    and policy makers, if there is room for system commercialization. A confirmation
    is required as to whether the formerly used regression techniques align with the
    SDGs considered for the highest good of the public, of a country/continent, and
    of the environment.


    ### 4.8 Summary


    On a concluding note, all three ML algorithms were considered in this chapter:
    MLR, SLR, and k-NN-regression. For either of the algorithms, historical data related
    to SDG 9 and SDG 13 had to be gathered, with special consideration to the quality,
    consistency, and accuracy of the data. The most relevant predictor variables were
    considered related to the SDGs being analyzed. Through SLR, a correlation has
    been established between CO[2] and GHG as predictor variables and the GDP as a
    target variable.


    Furthermore, for MLR and k-NN, a relationship has been established between CO[2]
    and GHG as predictor variables with population and GDP as a target variable. To
    ease data visualization, scatterplots and regression lines were displayed for
    effective communication of relevant findings. The difference between the predicted
    value of GHG and CO[2] emissions were used to calculate the amount of other gases.
    The Other Gases calculation has been included in the program based on the understanding
    that not only CO[2] contributes to GHG emissions but also gases such as methane,
    chlorofluorocarbons, nitrous gases, and other toxic gases. Lastly, the MAPE calculation
    has been performed only in SLR and MLR to obtain an accuracy of the algorithms
    used.


