    # 7.6 总结


    本章旨在开发一个基于 Web 的应用程序，该程序以包含全球互联网连接信息的 CSV 数据集作为输入，随后执行作为无监督机器学习模型的 K-means 聚类，以生成五个不同的互联网发展水平。利用由联合国
    195 个成员国中 187 个国家组成的未标记且经过预处理的数据集，每个国家被归类为欠发达、新兴、发展中、发达和高度发达。


    这反映了该国互联网设施和接入的程度，随后使用 `Plotly.js` 将其绘制到世界分级统计地图上，并提供了选择 1980 年至 2020 年之间年份的选项。仅通过查看地图，就可以得出关于历史趋势、地理差异、数字不平等以及缩小数字鸿沟努力的多项观察结果。使用
    `ml.js` 框架构建的 K-means 算法，在聚类全球互联网连接方面被证明是有效的，因为这些观察结果与已知的历史事件相符。例如，该应用程序显示，1996
    年芬兰、瑞典和挪威是最早进入互联网时代的国家，而改善互联网设施的进展在 21 世纪初变得明显。北欧国家率先达到高度发达阶段，美国紧随其后。


    到 2020 年，世界上大多数国家已达到发达或高度发达阶段，而非洲和亚洲则处于拥有充足互联网基础设施的边缘。该应用程序充当了政策制定者、投资者、研究人员和基层组织开展合作、创新和集体行动的催化剂，旨在促进可靠的普遍互联网接入。未来，该应用程序的进一步进展和改进显示出发现新知识、产生重大影响以及促进全球可持续发展和数字化转型目标的潜力。

