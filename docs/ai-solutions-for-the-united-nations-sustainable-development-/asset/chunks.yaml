  trans: '

    # 1.2 人工智能与机器学习概念


    在本节中，我们将介绍人工智能和机器学习的一些基本概念。


    ## 1.2.1 人工智能


    人工智能学科由艾伦·图灵创立，他将其定义为：“人工智能是制造智能机器，特别是智能计算机程序的科学与工程。它通常被定义为使计算机能够完成那些由人类完成时需要智能的任务的科学”[35,
    36, 37]。根据能力和功能，人工智能可以按照图 1-2 进行分类[38]。


    ![](img/625524_1_En_1_Fig2_HTML.png)


    图 1-2


    人工智能分类


    在图 1-2 中，阴影框代表目前已开发出的人工智能能力和功能。其他部分则是假设性的，目前正由不同的人工智能公司和研究人员积极研究[39, 40, 41, 42,
    43]。


    ## 1.2.2 机器学习


    机器学习是人工智能的一个子领域，它允许机器从先前的数据或过程中学习，而无需显式编程。机器学习本质上是一个定义明确的过程，可以从数据中推导出一个经过优化或优化的“模型”，如图
    1-3 所示。


    ![](img/625524_1_En_1_Fig3_HTML.png)


    图 1-3


    机器学习过程的通用视图


    数据可以是结构化的、半结构化的或非结构化的，这将在下一小节中定义。优化/训练后的模型随后可用于进行预测、执行分类，甚至从新数据中获取更多知识。机器学习算法的数学模型主要源自统计学理论[44,
    45]。图 1-4 展示了人工智能与不同类型机器学习之间的相互关系[46]。


    ![](img/625524_1_En_1_Fig4_HTML.png)


    图 1-4


    人工智能与机器学习之间的相互关系


    ![](img/625524_1_En_1_Fig5_HTML.png)


    图 1-5


    监督学习


    * **监督学习：** 它使用一组独特的标记数据，通过训练过程来开发学习模型。监督学习的两个类别是分类和回归。


    分类分析的目标是为每个输入样本提供一个分类标签。主要的分类算法包括决策树、朴素贝叶斯和 K 近邻。


    回归分析包括线性回归、多项式回归和多元线性回归等算法。基于自变量和因变量数据序列的统计特征，回归旨在预测因变量的连续值。


    监督学习也用于训练人工神经网络，通过向网络输入一个输入向量，网络将生成一个输出向量。该输出向量与目标输出向量之间的差异用于产生误差信号。然后，该误差信号用于调整人工神经网络的权重，直到实际输出与目标输出匹配[46,47]。


    图 1-5 (a) 展示了分类问题中监督学习的通用示意图，图 1-5 (b) 则展示了人工神经网络训练的通用示意图。


    ![](img/625524_1_En_1_Fig6_HTML.png)


    图 1-6


    无监督学习


    * **无监督学习**


    无监督学习允许从未标记数据中发现隐藏模式并提取有用特征。它通常分为聚类和降维技术。聚类本质上根据样本的相似性将一组样本分组到不同的簇中，两种最常见的算法是
    K 均值和层次聚类。图 1-6 (a) 给出了一个通用示意图[44, 45, 46, 47]。


    对于人工神经网络，在无监督学习中，训练是通过组合相似的输入向量以形成簇来进行的。当应用一个新的输入模式时，神经网络会给出一个输出响应，指示该输入模式所属的类别。环境不会反馈期望的输出是什么，以及输出是否正确。因此，在这种学习类型中，网络本身必须从输入数据中发现模式和特征，以及输入数据相对于输出的关系。图
    1-6(b) 说明了这一过程。


    ![](img/625524_1_En_1_Fig7_HTML.png)


    图 1-7


    浅层学习与深度学习


    * **浅层学习**

    '
- fmt: '# 机器学习范式


    ## 浅层学习


    它是一种机器学习形式，从特征已被预定义的数据中获取知识。在浅层学习中，特征提取需要具备我们所学习数据的领域知识才能执行机器学习。浅层学习算法包括三个主要学习步骤：数据收集、手动特征选择/降维以及分类/回归。图[1-7(a)](#625524_1_En_1_Chapter.xhtml#Fig7)展示了这一过程[46,
    47]。


    ## 深度学习


    它是机器学习的一种专门形式，其中机器通过经验而非人类操作员进行学习。因此，在人类输入极少的情况下，`DL`算法可以轻松应用于问题，并且通常能提供高度准确的性能，有时甚至可能超越人类水平的性能。


    深度学习算法仅包含两个步骤。与浅层学习算法类似，它们需要相同的数据收集步骤，但随后将特征提取/选择与分类/回归步骤合并，如图[1-7(b)](#625524_1_En_1_Chapter.xhtml#Fig7)所示。


    `DL`算法的一个重要类别是卷积神经网络（`CNN`），它主要由卷积层和池化层组成。卷积层主要负责特征提取，而池化层执行数据降维和预处理。在`CNN`中，存在全连接神经元层，其中的神经元与前一层的所有激活函数相连，以执行预测和分类[46,
    47]。


    ## 强化学习


    在强化学习中，学习者不会获得关于要采取何种行动的指令。相反，它们被允许在训练环境中通过自行采取随机行动来训练自己，并在执行正确的预期行动时获得奖励。最终，它们学会能带来最大奖励的最佳行动方案，从而像一个智能系统一样运作。相比之下，监督学习中的反馈为智能体提供了要执行的精确行动序列。这种“答案键”在`RL`中并不存在。智能体独立确定准确执行任务的步骤。与无监督学习相反，`RL`有明确的目标。无监督学习旨在辨别数据项之间的差异或共性。寻找能最大化`RL`智能体总累积奖励的最优行动模型是`RL`的目标。`RL`问题通过智能体在缺乏训练数据集的情况下与环境输入相结合的行动来解决。图[1-8](#625524_1_En_1_Chapter.xhtml#Fig8)展示了典型的强化学习过程[46,
    47, 48]。


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig8_HTML.png)


    **图 1-8** 强化学习


    以下是强化学习的基本组成部分：


    *   **环境：** 计算机应用程序的运行环境。它可以采用真实结构或虚拟结构的形式，例如模拟环境。

    *   **智能体：** 表示在给定环境中充当学习者或决策者的计算机软件。智能体探索环境并与环境互动。

    *   **行动：** 表示智能体在其环境中执行的动作。

    *   **状态：** 智能体在特定时刻的当前状况。每次执行的动作都会导致状态变化。

    *   **奖励：** 智能体针对某项特定活动从其周围环境中获得的反馈。它可以是正向的（用于鼓励期望的结果），也可以是负向的（用于阻止不期望的结果）。

    *   **策略：** 它根据智能体的当前状态指定其下一步应执行的活动，在不同状态或情境与行动之间建立路径或映射。

    *   **价值：** 表示智能体通过代表特定状态的长期收益来评估不同状态或行动吸引力的能力。


    ![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig9_HTML.png)


    **图 1-9** 集成学习


    ## 集成学习


    集成学习本质上涉及结合多个机器学习模型的结果，以增强分类决策或预测值[49]。图[1-9(a)](#625524_1_En_1_Chapter.xhtml#Fig9)展示了这种学习方式用于分类的典型示例，图[1-9(b)](#625524_1_En_1_Chapter.xhtml#Fig9)则展示了用于预测的示例。


    在图[1-9(a)](#625524_1_En_1_Chapter.xhtml#Fig9)中，采用了三种不同的分类器，其配置也称为*提升*（`boosting`），其中一个分类器的结果连同被错误分类的数据被馈送到下一个分类器。最终，所有分类器的输出被组合起来以提供最佳可能的预测。也可以将数据集分割成，例如，三个不同的子集，并使用三个不同的模型进行预测，以获得增强的组合预测，如图[1-9(b)](#625524_1_En_1_Chapter.xhtml#Fig9)所示。这种配置类型也称为*装袋*（`bagging`）[46,
    47]。'
  raw: "It is a form of machine learning in which knowledge is gained from data whose\
    \ characteristics have been predefined. The features extraction in Shallow It\
    \ takes domain knowledge of the data we are learning from perform machine learning.\
    \ Shallow learning algorithms include three main learning steps: data collection,\
    \ manual feature selection/reduction, and classification/regression. Figure [1-7(a)](#625524_1_En_1_Chapter.xhtml#Fig7)\
    \ illustrates this process [46, 47].\n\n*   **Deep Learning**\n\nIt is a specialized\
    \ form of machine learning, in which a machine learns from experience rather than\
    \ through a human operator. Thus, with minimal input from humans, DL algorithms\
    \ can easily be applied to problems, and they generally provide highly accurate\
    \ performances and may sometimes exceed human-level performance.\n\nDeep learning\
    \ algorithms include only two steps. Similar to shallow learning algorithms, they\
    \ require the same data collection step, but then they combine the feature extraction\
    \ /selection and classification/regression steps, as shown in Figure [1-7(b)](#625524_1_En_1_Chapter.xhtml#Fig7).\n\
    \nOne important class of DL algorithm is the convolutional neural network (CNN),\
    \ which consists mainly of convolutional layers and pooling layers. The convolutional\
    \ layers are mainly responsible for feature extraction while the pooling layers\
    \ perform data reduction and preprocessing. In CNNs, there are fully connected\
    \ neuron layers with neurons linked to all activation functions in the previous\
    \ layer to perform predictions and classifications [46, 47].\n\n*   **Reinforcement\
    \ Learning**\n\nIn reinforcement learning, the learner is given no directives\
    \ about the actions to take. Instead, they are allowed to train themselves in\
    \ their training environment by taking random actions on their own and are allocated\
    \ rewards upon performing the correct expected actions. Eventually, they learn\
    \ the best course of action leading to the maximum reward and thus act as an intelligent\
    \ system. In contrast, the feedback in supervised learning furnishes the agent\
    \ with the precise sequence of actions to execute. Such an answer key does not\
    \ exist in RL. The agent independently determines the procedure to execute the\
    \ task accurately. Contrary to unsupervised learning, RL has distinct objectives.\
    \ Unsupervised learning seeks to discern distinctions or commonalities among data\
    \ items. Finding the optimal action model that maximizes the RL agent’s total\
    \ cumulative reward is the objective of RL. The RL problem is resolved through\
    \ the agent’s actions in conjunction with environmental input in the absence of\
    \ a training dataset. Figure [1-8](#625524_1_En_1_Chapter.xhtml#Fig8) illustrates\
    \ the typical reinforcement learning process [46, 47, 48].\n\n![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig8_HTML.png)\n\
    \nFigure 1-8\n\nReinforcement learning\n\nThe following are fundamental components\
    \ of reinforcement learning:\n    *   **Environment:** The operating environment\
    \ of a computer application. This can take the form of a real structure or a virtual\
    \ one, such as a simulation.\n\n*   **Agent:** Denotes the computer software functioning\
    \ as the learner or decision-maker within the given environment. An agent investigates\
    \ and engages with the environment.\n\n*   **Action:** Denotes the actions performed\
    \ by an agent in its environment.\n\n*   **State:** The current conditions of\
    \ the agent at a specific instant in time. A state change results from every action\
    \ performed.\n\n*   **Reward:** The agent obtains feedback from its surroundings\
    \ in response to a certain activity. It can be positive, which serves to encourage\
    \ a desired outcome, or negative, which discourages an undesired one.\n\n*   **Policy****:**\
    \ It specifies the activities the agent should perform next in accordance with\
    \ its present state, establishing a path or mapping between various states or\
    \ situations and actions.\n\n*   **Value****:** Indicates the agency’s ability\
    \ to evaluate the attractiveness of various states or actions by representing\
    \ the long-term benefits of a specific state.\n\n![](images/625524_1_En_1_Chapter/625524_1_En_1_Fig9_HTML.png)\n\
    \nFigure 1-9\n\nEnsemble learning\n\n*   **Ensemble Learning**\n\nEnsemble learning\
    \ essentially involves combining the outcomes of several machine learning models\
    \ to enhance a classification decision or prediction value [49]. Figure [1-9(a)](#625524_1_En_1_Chapter.xhtml#Fig9)\
    \ shows a typical illustration of this type of learning for classification, and\
    \ Figure [1-9(b)](#625524_1_En_1_Chapter.xhtml#Fig9) shows it for prediction.\n\
    \nIn Figure [1-9(a)](#625524_1_En_1_Chapter.xhtml#Fig9), three different classifiers\
    \ have been employed in a configuration also known as *boosting* whereby the outcome\
    \ of one classifier is fed to the next classifier along with misclassified data.\
    \ Eventually, the outputs of all classifiers are combined to provide the best\
    \ possible prediction. It is also possible to split the dataset into, for example,\
    \ three different subsets and perform predictions with three different models\
    \ to obtain an enhanced combined prediction, as shown in Figure [1-9(b)](#625524_1_En_1_Chapter.xhtml#Fig9).\
    \ This type of configuration is also referred to as *bagging* [46. 47]."
