    图 3-3 以框图形式展示了所实现的机器学习分类算法的编程模型。需要注意的是，本章的所有代码都可以在本书 GitHub 页面上托管的`Chapter 3 –
    Codes`文件夹中找到。


    ![](img/625524_1_En_3_Fig3_HTML.jpg)


    图 3-3 Web 应用程序的程序结构


    运行应用程序的主文件是`index.js`文件。它持有一个按钮的事件监听器，该按钮将根据用户的选择运行相应的算法。提供了一个单选按钮组，用户可以在其中选择运行`k-NN`、决策树分类器、随机森林分类器或多层感知器。`index`文件使用`if-else`语句来验证哪个单选按钮被选中，然后调用该算法对应的方法。


    `global_variables.js`文件保存了 Web 应用程序中使用的所有变量，包括 HTML 元素（如容器、单选组、文本字段和按钮）以及用于存储从数据集中读取的值的数组。

