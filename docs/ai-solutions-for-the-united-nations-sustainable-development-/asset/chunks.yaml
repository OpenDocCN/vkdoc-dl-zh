    ### 5.4.2 k-NN


    The purpose of this section is to analyze and compare the performance of the K-nearest
    neighbors (K-NN) classification algorithm for various values of K. The K-NN algorithm
    is widely used for its simplicity and effectiveness in classification tasks. In
    this analysis, we have experimented with different values of K to understand how
    it affects the accuracy of our model.


    **Experimental Setup**


    The program was executed using a standardized dataset, and the accuracy of the
    KNN classifier was recorded for each value of K. The following table summarizes
    the results:


    | K-Value | Accuracy |

    | --- | --- |

    | 1 | 54.23% |

    | 2 | 50.08% |

    | 3 | 53.73% |

    | 4 | 53.40% |

    | 5 | 56.55% |

    | 6 | 54.73% |

    | 7 | 56.72% |

    | 8 | 56.88% |

    | 9 | 57.05% |

    | 10 | 58.37% |

    | 11 | 57.55% |

    | 12 | 56.72 |

    | 13 | 57.55% |


    **Comparative Analysis**


    Figure [5-8](#625524_1_En_5_Chapter.xhtml#Fig8) visually represents the relationship
    between the K-value (number of neighbors) and the corresponding accuracy percentage.


    ![](images/625524_1_En_5_Chapter/625524_1_En_5_Fig8_HTML.jpg)


    Figure 5-8 Accuracy of K-Values


    From the chart, we can make several observations:


    1. **Accuracy trend**: The accuracy generally increases as we move from a low
    K-value (K=1) to a moderate K-value (K=10). This suggests that increasing the
    number of neighbors considered in the classification process has a positive impact
    on accuracy.

    2. **Optimal K-value**: The highest accuracy of 58.37% is achieved when K is set
    to 10, indicating that for this specific dataset, considering 10 nearest neighbors
    leads to the best classification results.

    3. **Stability**: After reaching the peak accuracy at K=10, the accuracy remains
    relatively stable and does not improve significantly as K continues to increase.


    **Model Selection Considerations**


    Selecting the appropriate K-value is crucial for achieving the best results with
    the KNN algorithm. The choice of K depends on the specific characteristics of
    the dataset and the trade-off between bias and variance. Here are some considerations:


    1. **Low K-values (K=1-3)**: These tend to overfit the training data, leading
    to high variance and sensitivity to noise.

    2. **Moderate K-values (K=4-10)**: These strike a balance between bias and variance,
    often resulting in good generalization performance.

    3. **High K-values (K>10)**: These may lead to over-smoothing of the decision
    boundary, causing underfitting and reduced accuracy.


    ### 5.4.3 Decision Tree


    The purpose of this section is to analyze and compare the performance of decision
    tree classification algorithm for various values of `maxDepth`. Table [5-1](#625524_1_En_5_Chapter.xhtml#Tab1)
    summarizes the results.


    Table 5-1 Decision Tree Results 1


    | maxDepth | Accuracy |

    | --- | --- |

    | 10 | 59.92 |

    | 8 | 57.78 |

    | 6 | 56.01 |

    | 4 | 55.09 |

    | 2 | 53.18 |


    1. `maxDepth` represents the maximum depth of the decision tree.

    2. A decision tree expands by making splits at each node based on different features.
    The depth of the tree refers to the length of the longest path from the root node
    to a leaf node.

    3. Setting `maxDepth` to 10 means that the decision tree will continue splitting
    nodes until it reaches a depth of 10. Deeper trees can capture more complex patterns
    in the data, but they also increase the risk of overfitting, especially if the
    dataset is not large enough.


    The results illustrate a notable trend in the accuracy of a decision tree model
    as the `maxDepth` parameter varies. Beginning with a `maxDepth` of 2, the accuracy
    starts at 53.18%. As `maxDepth` increases incrementally to 4, 6, 8, and then 10,
    there is a corresponding rise in accuracy, reaching its peak at 59.92% when `maxDepth`
    is set to 10. This uptick reflects the model’s ability to capture intricate patterns
    and details within the training data, improving accuracy. However, as `maxDepth`
    exceeds 10, the accuracy begins to decline. This downturn occurs because the model,
    at higher depths, starts to overfit the training data, capturing noise and specifics
    that do not generalize well to new data.


    The observed trend underscores the classic trade-off between model complexity
    and generalization. While increasing `maxDepth` enhances the model’s fit to the
    training data, it often leads to reduced accuracy on unseen data, indicating decreased
    generalization. To determine the optimal `maxDepth`, it’s crucial to pinpoint
    the point where accuracy on validation or test data is highest, striking a balance
    between capturing essential patterns and avoiding overfitting. In this scenario,
    the optimal depth seems to be around 10, where accuracy peaks before the decline,
    demonstrating the delicate balance necessary for effective decision tree model
    tuning. See Figure [5-9](#625524_1_En_5_Chapter.xhtml#Fig9).


    ![](images/625524_1_En_5_Chapter/625524_1_En_5_Fig9_HTML.jpg)


    Figure 5-9 Max depth versus accuracy plot


    Additionally, we analyze and compared the performance of decision tree classification
    algorithm for various values of `minNumSamples`. Table [5-2](#625524_1_En_5_Chapter.xhtml#Tab2)
    summarizes the results.


    Table 5-2 Decision Tree Results II


    | minNumSamples | Accuracy |

    | --- | --- |

    | 3 | 61.92 |

    | 6 | 59.60 |

    | 9 | 56.79 |

    | 12 | 61.09 |

    | 15 | 58.28 |


    The data provided reveals an intriguing pattern between the `minNumSamples` parameter
    and the accuracy of a decision tree model. As `minNumSamples` varies, the accuracy
    of the model demonstrates a nonlinear trend. Notably, the accuracy reaches its
    peak at specific intermediate values of `minNumSamples`, specifically at 3 (61.92%)
    and 12 (61.09%). These points represent the configurations where the model performs
    at its best, striking a balance between complexity and accuracy.


    However, the trend takes a downturn as `minNumSamples` increases beyond these
    optimal points, notably at 9 and 15. At higher `minNumSamples`, the accuracy starts
    to decline. This decline occurs because larger `minNumSamples` values restrict
    the tree from making intricate splits, leading to oversimplified models incapable
    of capturing nuanced patterns in the data.


    The observed pattern underscores a delicate balance. Lower `minNumSamples` values
    allow the model to capture fine-grained details in the training data, but if set
    too low, they risk overfitting. Conversely, higher values prevent overfitting
    by simplifying the tree, but if set excessively high, they oversimplify the model,
    leading to a decrease in accuracy.


    In essence, the trend emphasizes the importance of selecting an optimal `minNumSamples`
    value. This value ensures that the decision tree strikes the right equilibrium
    between complexity and generalization, capturing crucial patterns while avoiding
    noise and thereby maximizing accuracy when making predictions on new, unseen data.
    See Figure [5-10](#625524_1_En_5_Chapter.xhtml#Fig10).


    ![](images/625524_1_En_5_Chapter/625524_1_En_5_Fig10_HTML.jpg)


    Figure 5-10 Min num samples versus accuracy plot'
