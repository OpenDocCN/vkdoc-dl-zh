    ### 5.4.1 应用测试


    图 5-6 展示了测试结果。


    ![](img/625524_1_En_5_Fig6_HTML.jpg)


    图 5-6 Web 应用测试


    1. 首先，我们需要为应用中显示的每个元素插入不同的值。

    2. 然后，我们需要选择合适的数据集。

    3. 点击 `Display Data and Analyze` 按钮后，输出结果会以表格形式显示，其中预测了每种算法的准确率。


    ![](img/625524_1_En_5_Fig7_HTML.jpg)


    图 5-7 散点图


    1. 选取准确率最高的算法来确定水质。

    2. 根据所得结果，根据朴素贝叶斯算法（该算法获得了最高准确率），水质被判定为“不可饮用”。

    3. 然后生成一个散点图，如图 5-7 所示。


    ### 5.4.2 k-NN


    本节旨在分析并比较 K 近邻（K-NN）分类算法在不同 K 值下的性能。K-NN 算法因其在分类任务中的简单性和有效性而被广泛使用。在本分析中，我们通过实验不同的
    K 值来了解它如何影响模型的准确率。


    **实验设置**


    程序使用标准化数据集执行，并记录了每个 K 值下 KNN 分类器的准确率。下表总结了结果：


    | K 值 | 准确率 |

    | --- | --- |

    | 1 | 54.23% |

    | 2 | 50.08% |

    | 3 | 53.73% |

    | 4 | 53.40% |

    | 5 | 56.55% |

    | 6 | 54.73% |

    | 7 | 56.72% |

    | 8 | 56.88% |

    | 9 | 57.05% |

    | 10 | 58.37% |

    | 11 | 57.55% |

    | 12 | 56.72% |

    | 13 | 57.55% |


    **对比分析**


    图 5-8 直观地展示了 K 值（邻居数量）与相应准确率百分比之间的关系。


    ![](img/625524_1_En_5_Fig8_HTML.jpg)


    图 5-8 K 值的准确率


    从图表中，我们可以得出以下几点观察：


    1.  **准确率趋势**：准确率通常随着 K 值从低（K=1）增加到中等（K=10）而提高。这表明在分类过程中增加考虑的邻居数量对准确率有积极影响。

    2.  **最佳 K 值**：当 K 设置为 10 时，达到了最高准确率 58.37%，表明对于这个特定数据集，考虑 10 个最近邻能带来最佳的分类结果。

    3.  **稳定性**：在 K=10 达到峰值准确率后，准确率保持相对稳定，并未随着 K 的继续增加而显著提升。


    **模型选择考量**


    选择合适的 K 值对于使用 KNN 算法获得最佳结果至关重要。K 的选择取决于数据集的具体特征以及偏差与方差之间的权衡。以下是一些考量因素：


    1.  **低 K 值（K=1-3）**：这些值容易过拟合训练数据，导致高方差和对噪声敏感。

    2.  **中等 K 值（K=4-10）**：这些值在偏差和方差之间取得了平衡，通常能带来良好的泛化性能。

    3.  **高 K 值（K>10）**：这些值可能导致决策边界过度平滑，引起欠拟合并降低准确率。


    ### 5.4.3 决策树


    本节旨在分析并比较决策树分类算法在不同 `maxDepth` 值下的性能。表 5-1 总结了结果。


    表 5-1 决策树结果 1


    | maxDepth | 准确率 |

    | --- | --- |

    | 10 | 59.92 |

    | 8 | 57.78 |

    | 6 | 56.01 |

    | 4 | 55.09 |

    | 2 | 53.18 |


    1.  `maxDepth` 表示决策树的最大深度。

    2.  决策树通过在每个节点基于不同特征进行分裂来扩展。树的深度指的是从根节点到叶节点的最长路径长度。

    3.  将 `maxDepth` 设置为 10 意味着决策树会持续分裂节点，直到达到深度 10。更深的树可以捕捉数据中更复杂的模式，但也增加了过拟合的风险，尤其是在数据集不够大的情况下。


    结果展示了决策树模型准确率随 `maxDepth` 参数变化的一个显著趋势。从 `maxDepth` 为 2 开始，准确率为 53.18%。随着 `maxDepth`
    逐步增加到 4、6、8 和 10，准确率相应上升，在 `maxDepth` 设置为 10 时达到峰值 59.92%。这种上升反映了模型捕捉训练数据中复杂模式和细节的能力，从而提高了准确率。然而，当
    `maxDepth` 超过 10 后，准确率开始下降。这种下降是因为模型在更高深度时开始过拟合训练数据，捕捉了那些无法很好泛化到新数据的噪声和特定细节。


    观察到的趋势强调了模型复杂度与泛化能力之间的经典权衡。虽然增加 `maxDepth` 增强了模型对训练数据的拟合度，但通常会导致在未见数据上的准确率降低，表明泛化能力下降。为了确定最佳的
    `maxDepth`，关键在于找到验证集或测试集上准确率最高的点，在捕捉关键模式与避免过拟合之间取得平衡。在此场景中，最佳深度似乎约为 10，准确率在下降前达到峰值，这展示了有效调整决策树模型所需的微妙平衡。见图
    5-9。


    ![](img/625524_1_En_5_Fig9_HTML.jpg)


    图 5-9 最大深度与准确率关系图


    此外，我们还分析并比较了决策树分类算法在不同 `minNumSamples` 值下的性能。表 5-2 总结了结果。


    表 5-2 决策树结果 II


    | minNumSamples | 准确率 |

    | --- | --- |

    | 3 | 61.92 |

    | 6 | 59.60 |

    | 9 | 56.79 |

    | 12 | 61.09 |

    | 15 | 58.28 |


    提供的数据揭示了 `minNumSamples` 参数与决策树模型准确率之间一个有趣的模式。随着 `minNumSamples` 的变化，模型的准确率呈现出非线性趋势。值得注意的是，准确率在
    `minNumSamples` 的特定中间值处达到峰值，具体为 3（61.92%）和 12（61.09%）。这些点代表了模型性能最佳的配置，在复杂度和准确率之间取得了平衡。


    然而，当 `minNumSamples` 超过这些最佳点（特别是在 9 和 15 处）时，趋势出现下降。在较高的 `minNumSamples` 值下，准确率开始下降。这种下降是因为较大的
    `minNumSamples` 值限制了树进行复杂的分裂，导致模型过于简化，无法捕捉数据中的细微模式。


    观察到的模式强调了微妙的平衡。较低的 `minNumSamples` 值允许模型捕捉训练数据中的精细细节，但如果设置过低，则存在过拟合的风险。相反，较高的值通过简化树来防止过拟合，但如果设置过高，则会过度简化模型，导致准确率下降。


    本质上，这一趋势强调了选择最佳 `minNumSamples` 值的重要性。这个值能确保决策树在复杂度和泛化能力之间找到正确的平衡点，在捕捉关键模式的同时避免噪声，从而在对新的、未见数据进行预测时最大化准确率。见图
    5-10。


    ![](img/625524_1_En_5_Fig10_HTML.jpg)


    图 5-10 最小样本数与准确率关系图

