    # 3. 一种利用机器学习算法实现可持续发展目标 2、9 和 12 的作物推荐系统


    **本章作者：**


    Domah Avishaye，`avishaye.domah@umail.uom.ac.mu`


    Hanumunthadu Vandana，`vandana.hanumunthadu@umail.uom.ac.mu`


    Radjoo Dheeraj，`dheeraj.radjoo@umail.uom.ac.mu`


    联合国 17 项可持续发展目标在提供应对全球紧迫挑战的标准方面发挥着关键作用。这包括贫困、饥饿等相关问题。机器学习因其分析大量数据并预测结果的能力，对于实现可持续发展目标至关重要。本研究聚焦于应用机器学习来实现可持续发展目标
    2、9 和 12。


    所选算法包括 K 近邻、决策树、随机森林和多层感知器。该系统根据氮、磷、钾、温度、湿度、土壤 pH 值和降雨量等输入参数，预测 22 种作物的产量。该网络应用程序使用
    JavaScript 和 HTML 设计，并利用了来自 Kaggle 平台的作物推荐数据集。所有四个模型都达到了高准确率，其中随机森林模型达到了 100%，这可能是由于过拟合所致。这与目标可持续发展目标相符。作物推荐准确率的提高有助于改善农业实践和粮食安全。此外，这些模型促进了农业领域的创新，并更有效地分配了资源。与依赖历史数据比较和估算的传统系统相比，机器学习能够管理大规模数据集，并适应农场数量不断增长的可扩展性。多样化的算法提高了作物产量预测的准确性。


    ## 3.1 引言


    本章介绍将机器学习算法应用于作物数据集，以针对可持续发展目标 2、9 和 12。可持续发展目标 2 背后的主要目标是消除饥饿、改善营养、确保获得营养充足且足够安全的食物，并推广可持续的农业实践。可持续发展目标
    9 旨在发展稳健的基础设施、促进包容和可持续的工业增长并鼓励创新。由于全球人口增长，对土地和淡水等自然资源的需求正以惊人的速度增加。可持续发展目标 12 旨在确保可持续的消费和生产模式。由于农业在全球范围内被认为是最依赖水资源的活动之一，因此需要做出重大改变才能实现这一可持续发展目标[1]。机器学习帮助农民在考虑环境因素和市场需求的情况下，种植最有利可图的作物。这有助于农民增加利润，并降低作物歉收的可能性[2]。


    在文献[3]中，五个机器学习模型基于土壤分析预测了芥菜的作物产量。它通过应用机器学习进行作物预测和可持续农业实践，实现了可持续发展目标 2、9 和 12。文献[4]使用机器学习算法预测孟加拉国库尔纳地区的土壤类型并推荐合适的作物。这与前面提到的三个可持续发展目标一致。文献[5]侧重于使用机器学习预测土壤质量。它通过改善土壤肥力，从而确保更高的作物产量，积极促进了可持续发展目标
    2 的实现，进而提高了粮食安全。同时，它也实现了另外两个指定的可持续发展目标。


    在本研究中，设计了一个利用分类算法的网络应用程序，这些算法包括 K 近邻、决策树、随机森林和多层感知器。我们的目标是致力于实现可持续发展目标 2、9 和 12，重点关注提高作物产量预测。本研究的主要焦点是这些分类算法在所选数据集上的性能，旨在实现粮食安全、推动农业创新以及促进可持续的消费和生产模式。通过利用作物数据集，本研究的主要发现展示了这些算法的准确性。与以往研究相比，主要的新颖之处在于考察了应用于作物数据集以预测最佳作物产量的多种机器学习算法。

    '
- fmt: '### 3.2 AI Use Cases for SDGs 2, 9, and 12


    In [6], the study offered a neural network design that can significantly affect
    and support the UN Sustainable Development Goal of zero hunger, such as convolutional
    long short-term memory. The authors sought to increase water use efficiency, lessen
    reliance on irrigation, and lessen the risk of crop loss due to drought and extreme
    weather. They used sensor data and ground data in real time to apply machine learning
    to crop segmentation, soil classification, NDVI, and soil moisture prediction.
    The experiment demonstrated that improving agricultural productivity and decreasing
    the waste of natural resources like water might result in favorable economic outcomes
    for the farmer. It was also demonstrated that using ML with earth observation
    data for analytics and forecasting might be useful for predicting agricultural
    productivity and alleviating poverty.


    The sustainable development concept and its objectives were reviewed in [7], along
    with earth observation methods that are pertinent to this area. Special emphasis
    was placed on the contribution of machine learning methods and algorithms, as
    well as their potential and capabilities to aid in the achievement of sustainable
    development goals. Performance is seen to be strongly influenced by the capacity
    to extract and synthesize qualities from data. This in-depth analysis examined
    various ML categories for handling earth observation data to address various SDGs.
    All types of machine learning encompass a wide range of SDGs and disciplines,
    whereby classification, clustering, regression, and dimension reduction techniques
    are suitable for SDGs 2, 9, 11, 14, and 15. The paper supported the importance
    of EO and ML in achieving the sustainable development goals and provided a summary
    of the strategies and tactics that support the attainment of SDGs.


    In [8], sustainable transport planning was performed to contribute to the achievement
    of SDGs 9, 11, and 12 related to transport. A machine-learning-based predictive
    modeling approach was proposed for metro ridership prediction, taking the built
    environment around the stations. Consequently, the creation and testing of the
    model used a time-series database. Ridge regression, lasso regression, elastic
    net, k-nearest neighbor, support vector regression, decision tree, random forest,
    extremely randomized trees, adaptive boosting, gradient boosting, extreme gradient
    boosting, and stacking ensemble learner were among the machine learning (ML) models
    that had their predictive performance assessed. According to the findings, the
    decision tree performed the best among the base learners, with an `R2` of 87.4%
    on the test dataset. The second and third-best models among the base learners
    were `KNN` and `SVR`. The feature relevance investigation also demonstrated how
    each sort of land use density contributes differently to the forecasting of metro
    ridership.


    The authors in [9] investigated the possibility of aiding SDGs 2 and 12 by implementing
    a combination of nanotechnology and ML to decrease food wastage and increase responsible
    consumption by determining potential presence of contaminants in food. The paper
    made use of a small sensor system (`S3`), a device comprising primarily a gas
    sensor, along with temperature, humidity, and flow sensors, that will be used
    to efficiently measure food contamination, i.e., to determine the contamination
    rate (bacteria, yeasts) of the food sample being analyzed. Several food samples
    were measured with different contamination levels using the `S3` device and data
    was collected and fed to ML algorithms like `k-NN`, random forest, and `SVM`.
    Results demonstrated that amount of food contaminants on test samples were correctly
    identified, and the microbiological compositions of the contaminants were also
    accurately predicted.


    An innovative and novel approach was proposed in [10] in which SDGs 7 and 9 were
    considered. The authors put forward the integration of photovoltaic (PV) in the
    agriculture industry, a solution that will massively help promote clean energy
    along with industry innovation. A deep Q-network (`DQN`) is used, which is a reinforcement
    learning technique utilized as an AI assistance to investors on implementation
    of PV panels, which makes decision based on various parameters like budget, costs,
    and energy requirements. `DQN` aids in determining the optimal type of PV required
    for different farms in the agricultural sector, enabling the investors to efficiently
    deploy PV systems within a region. This RL method helped in boosting sustainable
    energy uses with an innovative combination of PV systems and agriculture while
    also yielding increased profits.


    In [11], the authors reviewed the research studies on the importance of machine
    learning techniques in production of agricultural crops. They stated that accurate
    and timely forecast for crop production is significant for important policy choices
    like import-export and pricing marketing distribution. Various techniques such
    as artificial neural network, information fuzzy network, decision tree, regression,
    clustering, Bayesian belief network, time-series analysis, and Markov chain model
    were outlined. The research results demonstrated that computer science in agriculture
    aids in crop forecasting. Building on an objective methodology was necessary for
    pre-harvest crop forecasts. A good model would offer advantages above the conventional
    forecasting approach.


    In [12], the paper proposed a system that would help apprentice farmers by guiding
    them for planting and harvesting the most appropriate crops by deploying machine
    learning for crop prediction. The system proposed use naïve Bayes classifier to
    calculate and predict the crop for the current climate. The implementation of
    the system was done using an Arduino UNO with moisture sensor for data collection
    and also a mobile application that would be used to predict the crop depending
    on the user’s input such as temperature. The output obtained by the supervised
    machine learning algorithm, naïve Bayes classifier, proved to be accurate and
    would help farmers in developing sustainable crops.


    The authors in [13] proposed a novel machine learning algorithm called `crop selection
    method` (`CSM`) that performs crop classification based on the type of crop and
    weather conditions throughout the year. Crop yield rate was optimized efficiently
    by using a crop dataset comprising sowing, plantation, and harvesting time durations
    from previous years for each crop class to establish the best possible sequences
    of crops that can be grown throughout the season. Multiple sequences were determined
    whereby the `CSM` algorithm outputs the sequence with highest yield rate. Results
    illustrated that land use is maximized when `CSM` is used with higher crop yield
    rate per day as maximum crop types are planted and yield effectively throughout
    the year.


    Additionally, a crop recommendation method based on soil nutrients was investigated
    by [14], which used three ML classifications methods: `k-NN`, `SVM`, and logistic
    regression. These algorithms utilized an existing soil dataset consisting the
    chemical compositions required for each crop, and based on pH value, phosphorus,
    and soil salinity, the algorithms output the crop suitable for such soil environments.
    A land database was also used for geographical classification whereby the model
    predicts the best crop type for the land based on its chemical features. The results
    demonstrated a significantly high accuracy of 98% in crop classification; with
    the `SVM` ML model, 92% model accuracy was achieved with `K-NN` and `LR`.'
