- fmt: '## 2.2 AI Use Cases for SDG 7


    Several previous works have used machine learning techniques to address SDG 7,
    which highlights the significance of accessible, clean, and reliable energy.


    For example, in Liu, Zhang, and Baziar (2023), the goal was to close the gap left
    by the most recent publication by Esapour et al. (2022) by focusing on the area
    of smart city communication and energy management. In particular, the authors
    wanted to overcome the restrictions of the aforementioned work and simultaneously
    improved the accuracy of predicting values and optimum solutions. To do this,
    a unique heuristic strategy was employed for optimizing solutions while utilizing
    the benefits that machine learning techniques have to offer in order to increase
    accuracy. The work sought to improve responsible consumption patterns and production
    practices to reduce waste, promote resource efficiency, and foster a more sustainable
    approach to consumption and production in smart cities.


    Shahzad et al. (2023) applied machine learning technologies such as long short-term
    memory (`LSTM`), artificial neural networks (`ANNs`), support vector regression
    (`SVR`), and multiple linear regression (`MLR`) to daily data on natural gas futures
    prices, crude oil futures prices, carbon futures prices, and Dow Jones energy
    commodity futures prices from January 2018 to October 2021. Two major conclusions
    are drawn from the machine learning investigation. To establish links between
    future oil prices (crude oil and heating oil) and the pricing of carbon emission
    futures, nonlinear frameworks perform better than linear models. Second, the machine
    learning results show that carbon emission futures prices respond nonlinearly
    to severe movements in oil and natural gas prices. Understanding the nonlinear
    dynamics of extreme movements can aid in the development of environmental and
    climate policies as well as the revaluation of natural gas and oil futures. We
    talk about significant consequences for the SDGs, especially SDGs 7 and 12.


    The purpose of the research conducted in Asadikia, Rajabifard, and Kalantari (2020)
    was to find synergistic SDGs using the machine learning and data mining approach
    known as `boosted regression trees`. This study identifies the contributions of
    each SDG to the SDG index and does a “what-if” analysis to determine the importance
    of target scores. Findings indicate that SDGs 3, 4, and 7, “Quality education,”
    “Good health and well-being,” and “Affordable and clean energy” are the most synergistic
    objectives when their scores are over 60%. “Good health and well-being” was one
    of the most crucial synergetic aims, according to the findings of this research.
    There have been several disease outbreaks throughout history that have had a terrible
    effect on society and the economy because they were so deadly, broad, and expensive
    to contain. SDG breakouts like COVID-19 could have a significant influence on
    the likelihood of attaining the objectives since they strived to balance social,
    economic, and environmental factors. The SDG 3 score could be lowered by a rise
    in death rates and detrimental effects on healthcare.


    It has been demonstrated in Nwokolo, Obiwulu, and Ogbulezie (2023) that the primary
    difficulties faced by the authors consisted of creating a hybridized machine learning
    with the Gumbel probabilistic functional model, which were inherent in the mathematical
    transformation process and necessitated a significant amount of repeated mathematical
    science knowledge to produce the final transformed and effective model for forecasting
    the potential of solar PV output. The hybrid model using solely the quantifiable
    solar radiation parameter was the most accurate representation of the observed
    PV energy production of all technologies, with a comprehensive coefficient of
    determination (`R2`) of 0.9998% and a root mean square error (`RMSE`) of 0.0063
    kwh. To investigate the possible effects of climate change on the various solar
    PV systems, the most effective hybridized model was utilized. This research examined
    the implications of climate change on the potential for solar PV energy generation
    in the near future (2015–2049), the distant future (2050–2099), the all–future
    (2015–2099), the 2020s (2015–2040), the 2050s (2041–2070), and the 2080s (2071–2099),
    in line with the UN’s SDG 7 and 13. The best hybrid model (`MLP-CARIMA-GPM`) was
    used to investigate the possible effects of climate change on various solar PV
    systems.


    Additionally, the assessment made use of energy simulations from the Australian
    Community Climate and Earth System Simulator (`ACCESS-CM2`), a participant in
    Coupled Model Intercomparison Project Phase 6 (`CMIP6`), based on three different
    shared socioeconomic pathways (`SSPs`): `SSP126`, `SSP245`, and `SSP585`.


    In Anastasiadou, Santos and Dias (2021), the authors’ study presented a conceptual
    and theoretical framework that could be used to analyze literature studies that
    leveraged statistical or machine learning techniques to address the issue of a
    building’s energy performance. More specifically, by locating and assessing the
    most recent and suitable machine learning or statistical techniques as a baseline
    for future research and by developing a conceptual and theoretical framework based
    on a systematic literature review using `PRISMA` guidelines, this work aims to
    contribute to the improvement of the energy performance (`EP`) of existing buildings,
    one of the key objectives of the EU Green Deal. The European Green Deal is closely
    related to several SDGs established by the United Nations.


    While it particularly aligns with SDG 13 (Climate Action), its impact and objectives
    also have implications for several other SDGs. A “double the global rate of improvement
    in EE” might also be achieved by measuring, monitoring, and increasing the energy
    efficiency (`EE`) of buildings. This would result in less energy being spent while
    preserving or even improving the quality of services offered by such buildings,
    hence contributing to SDGs 7 and 8.


    The study carried out by Chen et al. (2022) offered a technique to assess trends
    and major drivers of SDG7 in the Aral Sea Basin from 2000–2020 by combining nighttime
    light indices, population distribution data, and statistics. In this work, the
    optimal combination of two linear regression methods and three machine learning
    methods, together with four light indices, was chosen to mimic the geographical
    distribution of GDP in the Aral Sea Basin. The prediction utilizing the `XGBoost`
    model with `TNL` performed better than other models, according to the findings.


    From 2000 to 2020, the Aral Sea Basin’s GDP demonstrated an uneven pattern of
    growth (+101.73 billion, +585.5%), with the GDP of the lower Aral Sea and the
    Amu Darya River increasingly converging in the middle Aral Sea and Syr Darya River
    basins, respectively. The GDP of the Aral Sea Basin has a high negative association
    with the area of water bodies at the same time. SDG 7 is challenging to accomplish
    by 2030, despite a little improvement in the Aral Sea Basin’s score (+6.57) and
    ranking (+9) from 2000 to 2020. The achievement of SDG 7 depends on strengthening
    inter-basin energy cooperation, boosting investment in renewable energy, and raising
    energy intensity.


    Sarkodie et al. (2020) conducted a study on the connections between energy consumption
    (SDG 7), climate (SDG 13), economic growth, and population in Kenya, Senegal,
    and Eswatini. It is motivated by the SDGs and its influence by 2030. They made
    use of econometric techniques including Dynamic Ordinary Least Squares (`DOLS`),
    Fully Modified Ordinary Least Squares (`FMOLS`) regression, the Mean-Group (`MG`)
    and Pooled Mean-Group (`PMG`) estimation models, as well as the Kernel Regularized
    Least Squares (`KRLS`) machine learning methodology. While the machine learning
    method supported the scale effect hypothesis, econometric techniques support the
    Environmental Kuznets Curve (`EKC`) hypothesis between income level and CO[2]
    emissions. It was discovered that while population, income level, and CO[2] emissions
    all influence energy demand and usage, energy consumption and population dynamics
    were the main forces behind economic growth. It showed how income, population
    growth, energy use, and CO[2] emissions were all interrelated yet need to be decided
    together in order to reach the SDGs.


    The objective in the article by Boza and Evgeniou (2021) was to examine the value
    that AI can add in terms of controlling variable renewable energy sources VRE
    integration expenses. The authors gave a comprehensive evaluation of how AI may
    significantly reduce integration costs using an economic model of variable renewable
    integration cost from the literature. They have also gone over many use scenarios
    and talked about difficulties in calculating the value that AI solutions would
    add to the power industry. The use of AI and data-intensive technologies to reduce
    integration costs for variable renewable energy (`VRE`), in line with the overarching
    objective of developing clean and sustainable energy systems, are considered as
    key elements in achieving SDG 7. The latter is concerned with ensuring that everyone
    has access to affordable, dependable, sustainable, and modern energy.


    In the research conducted by Chen et al. (2021), the artificial intelligence-based
    useful evaluation model (`AIEM`) has been put out as a forecasting tool for the
    economic effects of renewable energy and energy efficiency. The goal of this work
    was to evaluate, contrast, and develop a model using artificial intelligence and
    certain economic variables important for predicting the economic viability of
    renewable energy sources. The best customer to respond to qualities and wishes,
    competitive pricing, scheduling, and facility management, as well as motivating
    demand response participants and fairly rewarding them, may all be accomplished
    using AI methodologies. The suggested approach may increase energy efficiency
    to 97.32% and increase the use of renewable energy sources. The main components
    of artificial intelligence in renewable energy technology are energy forecasting,
    energy efficiency, and energy accessibility. The work explains how artificial
    intelligence may be used to anticipate renewable energy and increase energy efficiency,
    thus advancing SDG 7’s goal of clean and efficient energy sources.


    The wide range of novel issues presented by the developing Internet of Things
    and the difficulty in addressing these challenges with current computing and networking
    models are the starting points of the study conducted in Chiang and Zhang (2016).
    The article also covered the need for a new architecture, which is referred to
    as fog computing, fog networking, fog storage, and fog control and how it may
    close technological gaps and open up new commercial prospects.


    Along the cloud-to-Things continuum, fog is an emergent architecture for computing,
    storage, control, and networking that distributes these services closer to end
    users. By optimizing the processing and storage of data closer to the source,
    fog computing reduces the energy consumption associated with data transmission
    and processing, aligning with SDG 7. The Internet of Things (`IoT`) has its importance
    in a variety of sustainability-related applications, including environmental monitoring,
    smart agriculture, and energy management, and which supports SDG 13, is made possible
    by fog computing. It supports an increasing number of applications as an architecture,
    such as those found on the Internet of Things, Fifth Generation (`5G`) wireless
    systems, and embedded artificial intelligence.'
