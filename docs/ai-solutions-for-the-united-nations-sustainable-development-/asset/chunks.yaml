    ### 3.4.6 讨论


    所有四种算法在作物分类方法中都展现出了极高的准确率。每种机器学习方法都能根据土壤成分和土地通常承受的降雨量，准确推荐最适宜的作物。所采用的每种算法都各具特色，并展现出不同的工作策略，从而得出分类结果。表
    3-11 总结了每种已实现算法所获得的准确率。


    **表 3-11** 所用机器学习算法的准确率


    | 算法 | 准确率 (%) |

    | --- | --- |

    | `k-NN` | 99 |

    | 决策树 | 98 |

    | 随机森林 | 100 |

    | 多层感知器 | 90 |


    表 3-11 表明，随机森林算法在作物分类中展现了最高的准确率。`RF` 脱颖而出，成为可用于帮助实现目标可持续发展目标的最佳模型。所使用的四种机器学习模型将帮助农民、种植者以及农业行业创新性地识别，在土地所具有的特定土壤成分类型上，哪些作物是可存活且可耕种的，这将带来收获后高效且高产的作物产量。该数据集的一个优势在于，它包含了大量的特征、氮磷钾变体、pH
    值以及作物类型收获所需的降雨量。


    这些结果使用户能够通过机器学习模型了解最佳的可耕种作物，从而规划全年的作物收获，在每个季节最大化作物产量。该网络应用程序使在不同地区拥有广阔农业用地（这些地区面临不同的环境条件）的行业，能够根据特定的土壤养分和降雨量，高效地种植所需的作物，从而极大地助力可持续发展目标
    9。


    此外，高效且最大化的作物产量极大地促进了负责任的生产，并在很大程度上减少了整个市场上食品供应的短缺，从而有助于实现可持续发展目标 2 和 12。使用机器学习进行作物推荐减少了人工计算、不准确性和估算。传统的作物选择方法涉及土壤测试，利用历史数据进行对比，并且需要农业专家来估算产量最高的作物。由于作物产量的下降，这些方法已被证明是不准确的，且仅仅是估算。机器学习算法利用了降雨因素，这有助于适应气候变化。行业和农民将了解哪种作物能有效适应其气候。每种算法都有其优点和缺点。


    `RF` 的集成学习具有高准确率和良好的数据泛化能力，凸显了其在作物推荐系统中的有效性。然而，这种高准确率的代价是增加了存储需求和预测时间。使用更大的数据集将提升模型性能，减少过拟合，并提高预测的准确率。


    使用 `k-NN` 模型的主要好处之一是其易于实现。它也很灵活，允许针对不同的 `k` 值对模型进行微调。然而，在处理大型数据集时，`k-NN` 的计算成本可能会很高。这是因为需要计算欧几里得距离。因此，该模型不适用于实时应用。由于距离函数的存在，`k-NN`
    很容易受到数据集中噪声数据点和异常值的影响。


    `MLP` 非常适合广泛的任务，因为它们可以对数据中复杂的非线性关系进行建模。通过增加隐藏层和神经元的数量，`MLP` 可以进行扩展，使其适用于简单和复杂的数据集。当模型学习记忆训练数据而不是从中进行泛化时，`MLP`，尤其是具有许多参数的深度网络，容易出现过拟合。为了应对这种现象，需要仔细的正则化方法。`MLP`
    的架构，包括其层数、神经元数量和激活函数，需要仔细调整，这可能会花费一些时间。当使用此数据集训练模型时，如果应用不同的学习率，应用程序可能会冻结并花费大量时间才能输出模型。


    ## 3.5 总结


    本章的目的是展示如何使用机器学习算法来实现可持续发展目标 2、9 和 12。通过研究获得的数据集包含与 22 种不同作物相关的数据。本质上，开发了一个网络应用程序，用于读取数据集并应用不同的机器学习算法。使用了一个名为
    `ml.js` 的依赖项来实现诸如 `k-NN`、决策树、随机森林分类器和多层感知器等算法。每种算法都使用了各自对应的不同超参数进行了测试。


    获得的结果表明，与其他算法相比，随机森林分类器给出了最准确的模型。应用于作物数据集的不同机器学习算法有助于减少在根据不同变量选择种植哪种作物时的人工计算和不准确性。这将有助于提高作物产量的百分比，从而帮助实现可持续发展目标。本报告的一个典型局限性是仅使用一个数据集来测试不同的机器学习算法。可以进行更多研究以找到更多可用于测试机器学习算法性能的数据集。此外，可以在应用程序中实现其他分类算法，例如
    `K-Means`、层次聚类等。主要结论是，机器学习可以通过以比传统数据分析方法更高的准确率进行预测和分类，来帮助实现可持续发展目标。一个有趣的未来工作是使用更多与作物相关的数据集，并分析每种机器学习算法的表现如何。'
- fmt: '# 4. Aligning Manufacturing Emissions with SDGs 9 and 13 Using Machine Learning
    Algorithms


    **Chapter authors:**


    Mohadeb Sai Maadhavee, `sai.mohadeb@umail.uom.ac.mu`


    Radhakeesoon Aishani, `aishani.radhakeesoon@umail.uom.ac.mu`


    Seeballack Oushna, `oushna.seeballack@umail.uom.ac.mu`


    The UN Sustainable Development Goals (SDGs) are a global blueprint for addressing
    social, economic, and environmental challenges. The emergent tool of machine learning
    (ML) provides an innovative approach for sustainable development. This chapter
    focuses on SDG 9 (Industry, Innovation, and Infrastructure) and SDG 13 (Climate
    Action) by employing ML algorithms using regression techniques to predict and
    quantify the impact on the targeted SDGs. The methodology involves the selection
    of diverse datasets encompassing carbon dioxide (CO[2]), greenhouse gas (GHG)
    emissions, gross domestic product (GDP) annual growth, and population count of
    the manufacturing industry in Mauritius.


    Simple linear regression (SLR), multiple linear regression (MLR), and k-nearest
    neighbors (k-NN) algorithms were used to determine the relationships between economic
    factors, demographics, and environmental impact. The application of ML algorithms
    provides predictions and insights for sustainability by shedding light on how
    GDP and population influence CO[2] and GHG emissions in the manufacturing sector.
    Moreover, the difference between predicted GHG and CO[2] emissions was further
    computed to obtain a numerical value pertaining to other gases contributing to
    the greenhouse effect and by using the threshold value of 25,000 metric tons set
    by the U.S. Environmental Protection Agency (EPA), and necessary measures were
    highlighted on whether the predicted value of GHG emissions exceeds or falls below
    the threshold. Based on the results obtained, for the SLR algorithm the accuracy
    for CO[2] emission was 82.704% and for GHG emission was 84.117%.


    For the MLR algorithm the accuracy for CO[2] emission was 88.818%, and for GHG
    emission was 89.215%. It was noted that the accuracy for MLR was higher than SLR,
    thus indicating better model accuracy for prediction. The main novelty is the
    use of regression techniques to forecast GHG emissions in manufacturing industry
    with its related impacts and sustainable solutions. Thus, the adopted ML integration
    with industry and climate action emphasizes the possibility of catalyzing transformative
    change in achieving the SDGs.


    ## 4.1 Introduction


    The SDGs, also known as global goals, represent a worldwide initiative urging
    collective efforts to alleviate poverty, safeguard the planet, and guarantee that
    every individual lives in peace, justice, and prosperity by 2030 [1]. They were
    embraced by all countries in the United Nations, as an integral component of the
    2030 Agenda for Sustainable Development. There are 17 SDGs with 169 targets, each
    with distinct objectives and indicators [2].


    This assignment targets two of these SDGs: SDGs 9 and 13. SDG 9 centers around
    industry, innovation, and infrastructure, and SDG 13 focuses on climate action
    [3]. Machine learning (ML) algorithms play a crucial role in advancing these goals
    by offering innovative solutions for sustainable development. Integrating ML into
    SDGs highlights its transformative potential to accelerate progress toward a more
    sustainable and equitable world. For instance, it can be applied to forecast the
    energy efficiency of residential areas using classifiers like decision trees (DT).


    Furthermore, neural and Bayesian network models can be used to create models that
    optimize environmental protection for industrial facilities and goods. It has
    become possible to understand the priorities of sustainable development using
    various ML algorithms such as K-nearest neighbors (k-NN), naïve Bayes (NB), decision
    trees (DT), and support vector machine (SVM) [4].


    Another example of ML used in the context of UN SDGs can be found in [5], where
    the long short-term memory (LSTM) deep learning algorithm predicted energy demand
    in a smart power grid, in line with SDG 13 on climate action. There was a comparative
    results analysis with other forecasting algorithms: Facebook Prophet, random forest
    (RF), and support vector regression (SVR). The ability of the ML algorithm to
    contribute to achieving SDG 9, 13, and, additionally, SDG 7 was assessed [5].
    Moreover in [6], 17 SDG datasets (including SDG 9 and 13) from five states of
    South India (Andhra Pradesh, Karnataka, Kerala, Tamil Nadu and Telangana) were
    considered. The ML techniques employed to obtain numerical results included Gaussian
    process, linear regression, RF, and REP tree with specific accuracy parameters
    set [6].


    The primary focus of this chapter is to analyze the relationship between SDG 9
    and SDG 13 by predicting carbon dioxide (CO[2]) and greenhouse gas (GHG) emissions
    in the manufacturing industry, considering gross domestic product (GDP) annual
    growth and population as contributing factors. A methodology that combined data-driven
    analysis and regression techniques was employed.


    For the prediction of CO[2] and GHG emissions, the principles of regression techniques
    established a mathematical relationship between the independent variables (GDP
    and population) and the dependent variables (CO[2] and GHG emissions). The regression
    models such as simple linear regression (SLR), multiple linear regression (MLR),
    and k-nearest neighbors (k-NN) provided valuable insights regarding the extent
    to which changes in GDP and population impact the variations in emissions while
    analyzing the correlation between contributing factors and prediction of CO[2]
    and GHG.


    The main findings revealed significant linkages between GDP, population, and emissions
    in the manufacturing industry whereby as GDP and population grew, there was a
    corresponding increase in CO[2] and GHG emissions. These findings highlighted
    the intricate connection between economic development and the environmental impact
    of the manufacturing industry, emphasizing the importance of aligning SDG 9’s
    goals to foster sustainable industrialization with SDG 13’s priority to mitigate
    climate change.


    The main research questions addressed in this chapter are as follows:


    1. To what extent do GDP and population contribute to CO[2] and GHG emissions
    in the manufacturing industry?


    2. How accurately do linear regression models such as SLR and MLR predict emissions
    based on GDP and population data?


    3. How accurately does the k-NN algorithm predict the emissions values?


    4. How can the predicted data be further analyzed?


    The main novelty proposed in this chapter is the use of regression techniques
    using SLR, MLR, and k-NN to derive multifaceted perspective on the forecast of
    GHG emissions pertaining to the manufacturing industry, which paves the way for
    more data-driven and sustainable solutions to mitigate the impacts of greenhouse
    effect on climate.'
