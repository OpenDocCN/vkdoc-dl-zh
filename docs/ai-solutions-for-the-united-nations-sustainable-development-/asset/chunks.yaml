- fmt: "## 2.3 Data Processing and Application Design\n\n### 2.3.1 Data Collection\
    \ Process and Description of Dataset\n\nDuring the data collection process, various\
    \ existing datasets were investigated, and the one that would achieve the best-targeted\
    \ SDGs was selected. This dataset was retrieved from Kaggle and uses the National\
    \ Renewable Energy Laboratory software to simulate the time-series data of a particular\
    \ region in Texas, for one whole year in 2021.\n\nThe data that was collected\
    \ focused mainly on obtaining the amount of power generated by a wind turbine\
    \ system under varying environmental conditions at different times of the day.\
    \ These environmental conditions, which will act as predictors, include wind speed,\
    \ wind direction, atmospheric pressure, and air temperature and were collected\
    \ on an hourly basis from 12 a.m. to 11 p.m. Finally, all the data was recorded\
    \ in the form of a CSV file and named `TexasTurbine.csv`. Table [2-1](#625524_1_En_2_Chapter.xhtml#Tab1)\
    \ displays a few instances of this CSV file.\n\n**Table 2-1** `TexasTurbine.csv`\n\
    \n| Timestamp | System Power Generated/(kW) | Wind Speed/(m/s) | Wind Direction/(deg)\
    \ | Pressure/(atm) | Air Temperature/(⁰C) |\n| --- | --- | --- | --- | --- | ---\
    \ |\n| Jan 1, 12:00 am | 1766.64 | 9.926 | 128 | 1.00048 | 18.263 |\n| Jan 1,\
    \ 01:00 am | 1433.83 | 9.273 | 135 | 0.99979 | 18.363 |\n| Jan 1, 02:00 am | 1167.23\
    \ | 8.66 | 142 | 0.999592 | 18.663 |\n| Jan 1, 03:00 am | 1524.59 | 9.461 | 148\
    \ | 0.998309 | 18.763 |\n| Jan 1, 04:00 am | 1384.28 | 9.184 | 150 | 0.998507\
    \ | 18.963 |\n| Jan 1, 05:00 am | 1293.93 | 8.996 | 149 | 0.998507 | 19.063 |\n\
    | Jan 1, 06:00 am | 1301.63 | 9.016 | 151 | 0.998211 | 19.113 |\n| Jan 1, 07:00\
    \ am | 1308.13 | 9.036 | 154 | 0.997815 | 19.163 |\n\nThis original dataset contains\
    \ all the relevant attributes that would allow for the prediction of the power\
    \ generated by the wind turbines in kW.\n\n### 2.3.2 Data Preprocessing Steps\n\
    \nOnce the original dataset is obtained, it was prepared so that it can be processed\
    \ by the designated machine learning algorithm. The main steps involved in the\
    \ data preprocessing is hence listed and discussed next.\n\n1. **Checking for\
    \ missing values and filling them if there are any.**  \n   The first step in\
    \ the data preprocessing procedure was to check for any missing data or instances\
    \ in the dataset and assign a value to these data or remove any row which have\
    \ too many missing values. However, the dataset that was chosen did not contain\
    \ any such values or instances and was already in a complete format.\n\n2. **Removing\
    \ unnecessary attributes.**  \n   In the original dataset, the timestamps were\
    \ removed as this data will not be used by the KNN machine learning algorithm.\
    \ The aim is to use the different environmental attributes to be able to predict\
    \ the power generated by the wind turbines.\n\n3. **Adding a new attribute.**\
    \  \n   Since the algorithm will also perform classification in addition to predicting\
    \ a value of the power, a new attribute called `PowerCategory` was inserted in\
    \ the dataset. The category assigns a label such as High, Medium, and Low given\
    \ the value of the generated power.\n\n### 2.3.3 Wind Turbine Modeling\n\nThe\
    \ classification of the wind power was done by considering predictors including\
    \ the wind speed, pressure, and temperature. This can be modeled by the following\
    \ formula:\n\n![$$ Wind\\ Power=\\frac{1}{2}\\times \\rho \\times A\\times {V}^3\
    \ $$](images/625524_1_En_2_Chapter/625524_1_En_2_Chapter_TeX_Equ1.png)\n\n(2.1)\n\
    \n![$$ where $$](images/625524_1_En_2_Chapter/625524_1_En_2_Chapter_TeX_Equa.png)\n\
    \n![$$ V\\ is\\ the\\ wind\\ speed\\ and\\ \\rho\\ is\\ the\\ air\\ density\\\
    \ and\\ is\\ given\\ by\\ the\\ following\\ formula: $$](images/625524_1_En_2_Chapter/625524_1_En_2_Chapter_TeX_Equb.png)\n\
    \n![$$ \\rho =\\frac{Pressure}{Gas\\ Constant\\times Air\\ Temperature}\\ and\\\
    \ the\\ gas\\ constant=8.314\\frac{\\frac{J}{mol}}{K} $$](images/625524_1_En_2_Chapter/625524_1_En_2_Chapter_TeX_Equ2.png)\n\
    \n(2.2)\n\nAlso, *A* is the swept area, which is given by the following equation:\n\
    \n![$$ A=\\pi\\ {\\left(\\frac{D}{2}\\right)}^2 $$](images/625524_1_En_2_Chapter/625524_1_En_2_Chapter_TeX_Equ3.png)\n\
    \n(2.3)\n\n*where D is twice the blade diameter of the turbine*.\n\nThe radius\
    \ of the wind turbine is assumed to be 1.5 m in length, which results in a diameter\
    \ of 3 m. The model is based on the principles of kinetic energy of the wind turbines\
    \ and is mainly defined by the wind speed to provide its corresponding mechanical\
    \ wind power. Also, it is being assumed that the losses to the turbines are negligible,\
    \ such that all the mechanical power gets converted to electrical power (Salih\
    \ Mohammed Salih, 2012).\n\nThe classification is therefore represented as shown\
    \ in Table [2-2](#625524_1_En_2_Chapter.xhtml#Tab2) (Yiannis A. Katsigiannis,\
    \ 2013).\n\n**Table 2-2** Power Classification\n\n| Wind Speed / ms^(-1) | Classification\
    \ |\n| --- | --- |\n| 0 – 7.5 | Low |\n| 7.5 – 8.5 | Medium |\n| 8.5 and above\
    \ | High |\n\nAfter the introduction of the category attribute, the new dataset\
    \ was saved and used for training the machine learning model.\n\nThe final CSV\
    \ file, which will be fed to the model will thus be of the form shown in Table\
    \ [2-3](#625524_1_En_2_Chapter.xhtml#Tab3).\n\n**Table 2-3** Final CSV File\n\n\
    | SystemPower | Windspeed | Wind Direction | Pressure | Temperature | PowerCategory\
    \ |\n| --- | --- | --- | --- | --- | --- |\n| 2036.19 | 10.608 | 136 | 0.984488\
    \ | 21.163 | High |\n| 2288.37 | 11.171 | 142 | 0.986561 | 20.563 | High |\n|\
    \ 1762.46 | 9.995 | 150 | 0.986856 | 21.063 | Medium |\n| 1202.84 | 8.518 | 155\
    \ | 0.987152 | 21.563 | Medium |\n| 461.536 | 6.426 | 159 | 0.992483 | 21.363\
    \ | Low |\n| 530.497 | 6.723 | 165 | 0.991792 | 21.163 | Low |\n\n### 2.3.4 Program\
    \ Structure\n\nFigure [2-1](#625524_1_En_2_Chapter.xhtml#Fig1) shows the overall\
    \ program structure including all the HTML and JavaScript files. It is to be noted\
    \ that all the code of this chapter is found in the folder `Chapter 2 – Codes`\
    \ hosted on the GitHub page for this book.\n\n![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig1_HTML.png)\n\
    \n**Figure 2-1** Overall program structure\n\n**Layout of Web Application**\n\n\
    Figure [2-2](#625524_1_En_2_Chapter.xhtml#Fig2) shows the layout of the web application\
    \ with the different buttons and text fields.\n\n![](images/625524_1_En_2_Chapter/625524_1_En_2_Fig2_HTML.jpg)\n\
    \n**Figure 2-2** Layout of website"
