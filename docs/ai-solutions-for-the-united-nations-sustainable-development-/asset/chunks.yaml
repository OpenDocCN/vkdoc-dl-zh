    API 密钥。响应以包含数据数组的 JSON 对象形式获得。然后使用`extractFields()`方法检索 AQI、`O[3]`、`CO`、`PM[10]`、`PM[25]`的浓度以及测量这些值的时间戳。这些值存储在单独的数组中，用于执行回归。图
