  ### 6.3.7 显示回归图


  `plot()` 函数用于显示原始数据、回归图以及预测时间点的预测值。它接收原始数据、线性回归、MLR 和多项式回归的预测数据点以及绘图容器作为输入。时间戳被转换为天数，并偏移至从
  0 天开始。创建轨迹以包含原始数据、线性回归、MLR、多项式回归的数据点，以及 y 轴上预测时间点的预测值。x 轴使用以天为单位的时间戳。在布局中，设置单位和标题。然后使用
  `Plotly.js` 库中的 `newPlot()` 函数在容器中显示这些轨迹。`Plot()` 函数的实现伪代码如下所示：


