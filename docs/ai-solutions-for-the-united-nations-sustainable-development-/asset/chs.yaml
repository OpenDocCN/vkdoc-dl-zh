  ## 3.4 应用程序测试与分析


  本节详细阐述了所使用的不同算法及其结果。还进行了批判性分析，以评估它们对可持续发展目标 2、9 和 12 的影响。所实现的四种算法——k-NN、决策树、随机森林和
  MLP——都构建在单个 HTML 页面内，用户可以选择其中一种算法并执行作物分类。各小节描述了每种算法的实验，包括其模型参数、超参数以及使用的不同函数。由于我们处理的是一个分类问题，因此通过使用混淆矩阵来评估机器学习模型。混淆矩阵本质上是一个表格，用于比较预测结果与真实结果之间的相似程度。混淆矩阵能清晰地表明模型对指定作物预测实际结果的百分比准确性。由于我们有
  22 种作物需要分类，因此构建了一个 22 x 22 的矩阵表来确定机器学习技术的性能。我们通过计算正确预测的数量占总预测数量的比例来计算模型的准确性。


