  \nk-NN：GHG 排放量的预测与绘图\n\n### 4.5.4 讨论\n\n我们的研究旨在评估毛里求斯制造业的 GHG 排放量是否超过了美国环境保护署 (EPA)\
  \ 设定的阈值，该指南指出，“大多数小型企业的排放量将低于 25,000 公吨的阈值，无需向 EPA 报告 GHG 排放量”[26]。如果我们的预测 GHG 值超过了\
  \ EPA 设定的 25,000 公吨阈值，则意味着毛里求斯需要加强其气候行动力度，特别是在制造业领域。这一评估与专注于气候行动的可持续发展目标 13 相一致。温室气体导致臭氧层消耗，使致癌的紫外线进入大气层。\n\
  \n通过评估毛里求斯是否符合 EPA 阈值，我们正在调查制造业在多大程度上导致了 CO[2] 和 GHG 排放量的升高，从而支持可持续发展目标 13 的目标。此外，旨在促进可持续工业化和创新的可持续发展目标\
  \ 9 也与此相关。制造业作为经济增长和就业的驱动力之一，在实现可持续发展目标 9 方面发挥着关键作用。然而，其能源消耗和生产过程对全球 CO[2] 和 GHG\
  \ 排放量有显著贡献，从而影响气候变化。借助机器学习算法量化 CO[2] 和 GHG 排放量，可以深入了解毛里求斯制造业对环境的影响，这与可持续发展目标 9 促进可持续工业化的目标相一致。\n\
  \n此外，我们对其他气体的分析表明，制造业会排放甲烷、氯氟烃、氮氧化物和其他有毒气体。这些气体对除 CO[2] 之外的 GHG 排放量贡献显著，并具有同样重大的环境后果。采取行动减少这些排放符合旨在应对气候变化的可持续发展目标\
  \ 13 的目标。我们观察到，MLR 获得的 MAPE 低于 SLR，表明其预测的模型精度更高。表 4-2 显示了用于预测的机器学习算法的精度度量。\n\n表\
  \ 4-2\n\n机器学习算法的精度\n\n| 机器学习算法 | 精度百分比 |\n| --- | --- |\n| CO[2] 排放量 | GHG 排放量 |\n\
  | --- | --- |\n| SLR | 82.704 | 84.117 |\n| MLR | 88.818 | 89.215 |\n\n可以看出，与 SLR\
  \ 相比，MLR 在 CO[2] 和 GHG 排放量预测方面都具有更高的精度值。三维散点图说明了排放量与经济因素之间的关系，有助于进一步理解工业活动对排放量的影响。\n\
  \n总之，我们的研究可以作为政策制定者和利益相关者的关键资源，使他们能够深入了解制造业产生的排放量。这些信息使他们能够采取行动持续减少这些排放。所实施的系统将确保持续监测毛里求斯制造业的年度\
  \ GHG 排放量，并与环境保护机构的预测保持一致。这种方法通过解决制造业的影响及其在气候行动中的作用，有助于实现可持续发展目标 9 和可持续发展目标 13，最终推动毛里求斯的可持续发展。\n\
  \n\n\n### 4.6 建议\n\n由于我们的整个分析仅基于可持续发展目标 9 和可持续发展目标 13，因此，为了进行更好的比较分析，本也可以研究涉及其他领域（包括农业、教育、健康等）的其他可持续发展目标。此外，特定可持续发展目标的可实现程度因大洲而异。机器学习算法可用于识别特定地理或拓扑区域独有的可持续发展目标。例如，美国是温室气体排放（可持续发展目标\
  \ 13）的最大贡献者[27]，而非洲则存在严重的贫困问题（可持续发展目标 1）[28]。\n\n### 4.7 改进\n\n-   在数据预处理方面，更好的方法是采用分箱法，即先将数值排序，然后划分到大小相同的“箱子”或桶中。然后，对每个箱子应用均值或中位数进行平滑处理。\n\
  -   对于简单线性回归，本可以利用回归分析来提出旨在促进可持续发展目标 9 和可持续发展目标 13 的明智政策建议。所实施的模型本可以外推以满足其他预测需求。\n\
  -   对于多元线性回归，该模型本可用于提出更明确的政策建议，以考虑导致可持续发展目标 9 和可持续发展目标 13 的多个因素。这样，就可以评估政策变化对这两个目标的影响。\n\
  -   k-近邻模型本可以与其他机器学习模型结合使用，以获得更准确的预测。此外，k-近邻模型缺乏像线性回归那样可解释的系数。因此，可以将重点转移到预测准确性以及使用可视化工具来理解\
  \ k-近邻算法如何进行预测。\n\n最后，由于在决策中使用机器学习模型涉及伦理问题，如果系统有商业化的可能，让专家和政策制定者参与进来至关重要。需要确认先前使用的回归技术是否符合所考虑的可持续发展目标，以实现公众、国家/大洲以及环境的最大利益。\n\
  \n### 4.8 总结\n\n总而言之，本章考虑了所有三种机器学习算法：多元线性回归、简单线性回归和 k-近邻回归。对于任何一种算法，都必须收集与可持续发展目标\
  \ 9 和可持续发展目标 13 相关的历史数据，并特别关注数据的质量、一致性和准确性。考虑了与所分析的可持续发展目标最相关的预测变量。通过简单线性回归，在作为预测变量的二氧化碳和温室气体与作为目标变量的国内生产总值之间建立了相关性。\n\
  \n此外，对于多元线性回归和 k-近邻，在作为预测变量的二氧化碳和温室气体与作为目标变量的人口和国内生产总值之间建立了关系。为了便于数据可视化，展示了散点图和回归线，以便有效传达相关发现。温室气体预测值与二氧化碳排放预测值之间的差值用于计算其他气体的量。其他气体的计算已包含在程序中，这是基于以下理解：不仅二氧化碳会导致温室气体排放，甲烷、氯氟碳化物、氮氧化物和其他有毒气体也会。最后，仅在简单线性回归和多元线性回归中执行了平均绝对百分比误差计算，以获取所用算法的准确性。\n\
