  #### 朴素贝叶斯


  朴素贝叶斯是一种概率机器学习技术，主要用于分类目的，其概念广泛基于概率论 [10]。


  图 5-5 说明了朴素贝叶斯算法的工作原理。


  ![](img/625524_1_En_5_Fig5_HTML.jpg)


  图 5-5


  朴素贝叶斯流程图


  对于这种机器学习算法，使用了朴素贝叶斯（NB）分类器。该分类器被称为一种用于分类目的的概率机器学习技术。


  NB 分类器类包含四个构造函数，其中 `this.allUniqueAttributes` 用于存储每个特征的属性值。`this.allAttributesProbabilities`
  数组存储与每个特征相关的概率，`this.uniqueClassValues` 数组存储数据集中找到的标签，`this.classProbabilities`
  数组存储与标签类别相关的概率。


  `fit` 方法将数据值、类别标签和变量名列表作为输入，用于训练朴素贝叶斯分类器，以计算每个类别和属性的概率。在 `fit` 方法内部，使用一个 `for` 循环遍历数据集中的每个特征，并提取唯一的属性值和唯一的类别值。`count`
  属性被初始化为零，用于存储每个类别中属性值出现的次数。


  `predict` 方法接收输入值，并根据朴素贝叶斯模型的训练结果显示最可能的类别。对于每个类别标签，该方法计算输入的概率，并将概率最高的类别分类为预测类别。


  `NBAcc()` 函数用于确定水的可饮用性，`accuracy()` 函数用于确定其准确率。然后，其输出会显示在 Web 应用程序的表格中。


