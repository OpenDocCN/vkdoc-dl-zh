  ### 6.4.7 分类算法的性能


  通过计算从十个选定地点中选出的五个地点的准确率并取平均值，评估了 `KNN`、决策树和随机森林算法根据空气污染物量预测 `AQI` 的性能。使用的样本量为 720，相当于
  30 天。表 6-9 展示了每种算法获得的准确率。


  表 6-9


  分类算法的准确率


  | 算法 | 准确率 (%) |

  | --- | --- |

  | `KNN` | 84.3 |

  | `DT` | 99.5 |

  | `RF` | 98.9 |


  从表 6-9 获得的结果可以看出，决策树和随机森林的准确率最高，分别为 99.5% 和 98.9%。`KNN` 的表现最差，准确率为 84.3%。决策树和随机森林对噪声数据和异常值更鲁棒，因此在分类
  `AQI` 方面比 `KNN` 更好。此外，`KNN` 更容易过拟合，尤其是在数据集较小的情况下。


  机器学习可用于准确预测空气污染物水平并对 `AQI` 进行分类，这有助于确定工程活动对空气质量的长期影响。这有助于制定新的战略和政策来改善公众的空气质量，为全球实现可持续发展目标
  3 和 13 做出贡献。




  ## 6.5 总结


  总之，本研究聚焦于开发一个利用机器学习算法预测空气污染物浓度并对空气质量指数进行分类的网页应用程序。数据收集过程涉及通过 `Weatherbit.io` 空气质量
  API 检索毛里求斯 10 个选定地点的小时级历史空气质量信息。选定的监测空气污染物包括 `PM[10]`、`PM[25]`、`CO` 和 `O[3]`。


  该网页应用程序的程序结构分为不同部分，包括网站布局、线性回归和多项式回归的实现，以及使用 `LSTM`/`MLP` 算法进行预测。此外，还实现了分类算法（`k-NN`、决策树和随机森林），用于根据空气污染物浓度对
  AQI 进行分类。


  网页应用程序的测试证明了其功能性，能够为用户提供准确的空气污染物浓度预测和 AQI 分类。对回归算法，包括简单线性回归（`SLR`）、多项式回归（`PR`）、多层感知器（`MLP`）和长短期记忆网络（`LSTM`）的性能进行了评估。每种算法在预测空气污染物浓度方面表现出不同的准确度，MAPE
  值表明了模型的有效性。`SLR` 的 MAPE 范围为 6.81% 至 12.99%，而 `PR` 的 MAPE 范围为 2.35% 至 9.36%。`MLP`
  的 MAPE 介于 1.48% 和 2.31% 之间，`LSTM` 的 MAPE 则介于 1.20% 和 1.91% 之间。值得注意的是，`MLP` 和 `LSTM`
  算法表现出较低的 MAPE 值，表明它们能够捕捉数据中复杂的非线性关系。


  此外，还评估了分类算法在预测 AQI 等级方面的准确性。决策树和随机森林算法的表现优于 `k-NN`，分别达到了 99.5% 和 98.9% 的高准确率。


  这些结果表明，机器学习模型在预测空气污染物浓度和 AQI 等级方面是有效的，这对于评估空气质量以及为公共卫生和环境管理做出明智决策至关重要。本研究的发现有助于理解如何应用机器学习来准确预测和分类空气质量指标。本研究开发的网页应用程序可作为用户获取毛里求斯空气质量实时预测和分类的实用工具。这项研究通过为环境监测和公共卫生改善提供宝贵见解，与全球可持续发展目标，特别是
  SDG 3（良好健康与福祉）和 SDG 13（气候行动）保持一致。


