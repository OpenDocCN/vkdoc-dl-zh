  \ 所示。\n\n![](img/625524_1_En_1_Fig22_HTML.jpg)\n\n图 1-18(b) PLR 版本 2 的 MAPE 和图表\n\
  \n### 1.3.3 多元线性回归 (MLR)\n\n`MLR` 是一种统计技术，有助于我们理解多个自变量如何影响一个因变量。它是简单线性回归 (`SLR`)\
  \ 的扩展，后者仅考察单个自变量。通过分析多个变量，`MLR` 可以做出更准确的预测和预报。例如，`MLR` 可用于根据汽车的发动机尺寸和气缸数量来预测其 CO[2]\
  \ 排放量。\n\n以下是 `MLR` 的一些关键特征：\n\n- 因变量或输出 (`Y`) 应为连续值或实数值，而自变量或预测变量可以是连续值或分类值。\n\
  - 自变量与因变量之间存在线性关系。\n- `MLR` 致力于在多维数据集中建立一条回归线。\n\n多元线性回归模型可以表示如下 [46]：\n\n![$$ Y={\\\
  beta}_0+{\\beta}_1{X}_1+{\\beta}_2{X}_2+\\dots +{\\beta}_k{X}_k+\\varepsilon $$](img/625524_1_En_1_Chapter_TeX_Equ9.png)\n\
  \n(1.9)\n\n其中，\n\n- `y` 表示因变量或输出。\n- `k` 表示模型中可用的预测变量数量。\n- `X[1], X[2], …, X[k]`\
  \ 代表自变量。\n- `β[0]` 表示回归线的 y 轴截距（常数项）。\n- `β[1], β[2], …, β[k]` 代表每个自变量的斜率系数。\n-\
  \ `ε` 表示模型中 `Y` 的预测值与其实际值之间出现的误差项。\n\n执行 `MLR` 的主要目标是确定系数 (`β[0], β[1], β[2], …,\
  \ β[k]`)，这些系数能够减少因变量的观测值与线性方程预测值之间的平方差之和。这种方法称为最小二乘法 [46]。该模型也可以用以下矩阵形式表示：\n\n`y\
  \ = Xβ + ε` (1.10)\n\n其中，\n\n- `β = {β_0, β_1, …, β_(k-1)}'`。\n\n设计矩阵 `X` 按以下形式构建：\n\
  \n![$$ X=\\left[1\\ {x}_{1,1}\\ {x}_{1,2}\\dots {x}_{1,k-1}\\ 1\\ {x}_{2,1}\\ {x}_{2,2}\\\
  dots {x}_{2,k-1}\\vdots \\vdots \\vdots \\vdots \\vdots 1\\ {x}_{n,1}\\ {x}_{n,2}\\\
  dots {x}_{n,k-1}\\ \\right] $$](images/625524_1_En_1_Chapter/625524_1_En_1_Chapter_TeX_Equ10.png)\n\
  \n(1.11)\n\n其中，\n\n- `n` 是观测值的总数。\n\n`β` 矩阵的估计值 `β̂` 可以通过以下方程获得：\n\n![$$ \\hat{\\\
  beta}={\\left({X}^{\\prime }X\\right)}^{-1}{X}^{\\prime }y $$](img/625524_1_En_1_Chapter_TeX_Equ11.png)\n\
  \n(1.12)\n\n将提供两个版本的 `MLR` JavaScript 实现，其中第一个版本允许用户直接在网页上输入值进行预测，而第二个版本允许用户上传数据集进行预测。\n\
  \n运行应用程序时，用户需要填写输入字段，当点击 `Read Data and Analyse` 按钮时，将显示图 1-19(a) 所示的输出结果。\n\n![](img/625524_1_En_1_Fig23_HTML.jpg)\n\
  \n图 1-19(a) PLR 版本 1 的输入和输出\n\n回归图如图 1-19(b) 所示。\n\n![](img/625524_1_En_1_Fig24_HTML.jpg)\n\
  \n图 1-19(b) MLR 版本 1 的回归图\n\n对于 `MLR` 实现的第二个版本，数据集来自名为 `Regression_Weather.csv`\
  \ 的 CSV 文件。该数据集的部分内容如表 1-3 所示。\n\n运行应用程序时，用户需要输入要从数据集显示的行数，并浏览 CSV 文件。当点击 `Display\
  \ Data and Analyse` 按钮时，将显示图 1-20(a) 所示的输出结果。\n\n![](img/625524_1_En_1_Fig26_HTML.jpg)\n\
  \n图 1-20(b) MLR 版本 2 的图表\n\n![](img/625524_1_En_1_Fig25_HTML.jpg)\n\n图 1-20(a) MLR\
  \ 版本 2 的输入和输出\n\n图 1-20(b) 显示了回归图以及预测点。\n\n\n\n### 1.3.4 K-近邻算法\n\nK-近邻算法（k-NN）是一种著名的简单监督学习算法，可用于分类和回归任务。\n\
  \n在该技术中，`k` 代表最近邻的数量。它根据其最近邻的多数投票来对对象进行分类。然后，根据其 `k` 个最近邻（`k` 为正整数 [46]），将该对象划分到最常见的类别中。\n\
  \n欧几里得距离是用于计算对象间距离以确定其 `k` 个最近邻的最常用距离度量之一。具有 `n` 个特征的两个对象之间的欧几里得距离公式如下：\n\n![$$\
  \ d\\left(x,y\\right)=\\sqrt{\\sum_{i=1}^n{\\left({x}_i-{y}_i\\right)}²} $$](img/625524_1_En_1_Chapter_TeX_Equ12.png)\n\
  \n(1.13)\n\n我们将使用从 [52] 获取的 `Diabetes.csv` 数据集。该数据集的一部分如表 1-4 所示。\n\n**表 1-4** 糖尿病数据集\
