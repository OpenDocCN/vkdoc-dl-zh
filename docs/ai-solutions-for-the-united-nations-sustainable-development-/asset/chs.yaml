  ### 6.3.4 线性回归的实现


  `predLin()` 函数用于对每种空气污染物执行线性回归。它接收因变量（即空气污染物的值）、自变量（即记录的时间戳）以及预测时间（以秒为单位）作为输入。使用
  `ML.js` 库中的 `SimpleLinearRegression()` 函数来创建回归模型。然后调用 `predict()` 函数获取预测结果并返回。`predLin()`
  函数的实现伪代码如下所示：


  ```

  Function predLin (x, y, xtarget)

  Create Linear regression model

  Get prediction from model

  Return prediction

  End

  ```


  `predLinAll()` 函数用于对整个数据集中的每种空气污染物执行线性回归。使用 `SimpleLinearRegression()` 函数创建回归模型。通过遍历整个数据集，使用
  `predict()` 函数对数据集中的每个条目进行预测。`predLinAll()` 函数的实现伪代码如下所示：


  ```

  Function predLinAll (x, y)

  Create Linear regression model

  For i in range x:

  Get prediction for each entry in dataset

  End

  Return predictions

  End

  ```


  ### 6.3.5 多项式回归的实现


  `predPoly()` 函数用于执行多项式回归。它接收因变量、自变量和预测时间作为输入。使用五次多项式回归。然后使用 `ML.js` 库中的 `PolynomialRegression()`
  函数创建回归模型。使用 `predict()` 函数获取预测时间点的预测值，然后返回该预测值。`predPoly()` 函数的实现伪代码如下所示：


  ```

  Function predPoly (x, y, xtarget)

  Set polynomial degree to 5

  Create polynomial regression model

  Get prediction from model

  Return prediction

  End

  ```


  `predPolyAll()` 函数用于对整个数据集执行多项式回归。多项式次数设置为 5。然后使用 `PolynomialRegression()` 函数创建回归模型。通过遍历整个数据集，使用
  `predict()` 函数对数据集中的每个条目进行预测。预测结果随后返回，如下列伪代码所示：


  ```

  Function predPolyAll (x, y)

