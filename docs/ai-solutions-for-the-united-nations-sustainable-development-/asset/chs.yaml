  该原始数据集包含了所有相关属性，可用于预测风力涡轮机的发电量（单位：kW）。\n\n### 2.3.2 数据预处理步骤\n\n获取原始数据集后，需对其进行预处理，以便指定的机器学习算法能够处理。数据预处理的主要步骤如下所述。\n\
  \n1.  **检查缺失值并填充。**  \n    数据预处理的第一步是检查数据集中是否存在缺失数据或实例，并为这些数据赋值，或删除缺失值过多的行。然而，所选数据集不包含任何此类值或实例，且格式已完整。\n\
  \n2.  **移除不必要的属性。**  \n    在原始数据集中，移除了时间戳，因为 KNN 机器学习算法不会使用该数据。目标是利用不同的环境属性来预测风力涡轮机的发电量。\n\
  \n3.  **添加新属性。**  \n    由于算法除了预测功率值外，还将执行分类，因此在数据集中新增了一个名为`PowerCategory`的属性。该类别根据发电量的值分配标签，例如高、中、低。\n\
  \n### 2.3.3 风力涡轮机建模\n\n风力发电的分类是通过考虑风速、压力和温度等预测变量来完成的。这可以通过以下公式建模：\n\n![$$ 风力功率=\\\
  frac{1}{2}\\times \\rho \\times A\\times {V}³ $$](img/625524_1_En_2_Chapter_TeX_Equ1.png)\n\
  \n(2.1)\n\n![$$ 其中 $$](img/625524_1_En_2_Chapter_TeX_Equa.png)\n\n![$$ V\\ 是风速，\\\
  rho\\ 是空气密度，由以下公式给出： $$](img/625524_1_En_2_Chapter_TeX_Equb.png)\n\n![$$ \\rho =\\\
  frac{压力}{气体常数\\times 气温}，且气体常数=8.314\\frac{\\frac{J}{mol}}{K} $$](img/625524_1_En_2_Chapter_TeX_Equ2.png)\n\
  \n(2.2)\n\n此外，*A* 是扫掠面积，由以下方程给出：\n\n![$$ A=\\pi\\ {\\left(\\frac{D}{2}\\right)}²\
  \ $$](img/625524_1_En_2_Chapter_TeX_Equ3.png)\n\n(2.3)\n\n*其中 D 是涡轮机叶片直径的两倍*。\n\n\
  假设风力涡轮机的半径为 1.5 米，则直径为 3 米。该模型基于风力涡轮机的动能原理，主要由风速定义以提供其相应的机械风力功率。同时，假设涡轮机的损耗可忽略不计，所有机械功率都转换为电功率（Salih\
  \ Mohammed Salih, 2012）。\n\n因此，分类结果如表 2-2 所示（Yiannis A. Katsigiannis, 2013）。\n\n\
