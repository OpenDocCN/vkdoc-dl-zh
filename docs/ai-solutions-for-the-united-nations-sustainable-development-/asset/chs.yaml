  ### 7.3.4 应用系统模型


  在本节中，我们将 Web 应用程序的模型分解为其各个组成部分。其基本原理是，网页将 CSV 数据集作为输入，并执行 K-means 聚类，以得出不同级别的互联网连接发展水平。最终用户因此获得一个具有以下功能的仪表板：


  1.  浏览并选择一个 CSV 文件作为数据集。

  2.  选择是否将聚类后的 CSV 文件下载到本地。

  3.  获取一个显示全球互联网连接发展五个层级的世界地图。

  4.  通过滑块选择 1980 年至 2020 年间的具体年份，以动态更改世界地图的内容。


  这些功能的编码要求数据集遵循与图 7-1 所示相同的格式。聚类完成后，生成的 CSV 文件包含`Label`和`Category`列，它们分别对应数值标签和信息标签。此应用程序使用
  HTML 和 CSS 作为前端语言，JavaScript 作为后端支柱进行编码。因此，客户端 JavaScript 允许用户在 Web 浏览器内通过几次点击即可执行机器学习。需要注意的是，本章的所有代码都可以在本书
  GitHub 页面上的`Chapter 7 – Codes`文件夹中找到。


