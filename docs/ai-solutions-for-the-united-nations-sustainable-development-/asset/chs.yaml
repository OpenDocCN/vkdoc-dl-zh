  \n| 次数 | MAPE |\n| --- | --- |\n| 2 | 56.36 |\n| 3 | 100.52 |\n| 4 | 20.88 |\n|\
  \ 5 | 68.66 |\n| 6 | 38.67 |\n| 7 | 43.14 |\n| 8 | 19.03 |\n| 9 | 7.57 |\n| 10 |\
  \ 13.31 |\n| 11 | 12.24 |\n| 12 | 12.81 |\n| 13 | 11.05 |\n| 14 | 14.33 |\n\n###\
  \ 2.4.3 KNN 回归\n\n结果显示，对于 `K` 从 1 到 10 的不同取值，MAPE 值各不相同。随着 `K` 从 1 增加到 10，MAPE 通常会增加，表明随着\
  \ `K` 变大，模型性能下降。这种行为在 KNN 回归中很常见。较小的 `K` 值意味着模型严重依赖少数几个最近邻，这可能导致过拟合。随着 `K` 增加，模型会考虑更多的邻居，这可能导致预测更平滑，但可能精度较低。KNN\
  \ 回归不像线性回归那样提供明确的系数或方程。相反，它依赖于数据点的相似性。查看我们的结果，`K=4` 似乎具有相对较低的 MAPE 值 13.288，表明其预测性能优于\
  \ `K=1` 或 `K=10`。参见表 2-5。\n\n![](img/625524_1_En_2_Fig15_HTML.png)\n\n图 2-15 KNN\
  \ 回归的 K 值与 MAPE 关系图\n\n表 2-5 KNN 回归的 K 值与 MAPE 对照表\n\n| K 值 | MAPE |\n| --- | ---\
  \ |\n| 1 | 0 |\n| 2 | 13.29 |\n| 3 | 16.66 |\n| 4 | 13.29 |\n| 5 | 20.25 |\n| 6\
  \ | 21.77 |\n| 7 | 22.51 |\n| 8 | 23.11 |\n| 9 | 23.83 |\n| 10 | 24.28 |\n\n###\
  \ 2.4.4 多元线性回归\n\n多元线性回归是一种用于建模因变量与多个自变量之间关系的统计方法。它假设预测变量与目标变量之间存在线性关系。在此情况下，MAPE\
  \ 为 42.20 表明，平均而言，模型预测值与真实值之间的绝对百分比误差约为 42.20%。42.20% 的 MAPE 表明，当前配置的多元线性回归模型可能无法为目标变量提供高度准确的预测。相对较高的\
  \ MAPE 值表明模型的预测值与实际值存在显著偏差，这种误差水平对于某些应用来说可能是不可接受的。\n\n\n\n### 2.4.5 KNN 分类\n\n最后，在实验四中，我们将分析使用不同\
  \ `K` 值（最近邻数量）进行 KNN 分类实验所获得的结果，及其对风电功率预测精度的影响。分类结果使用“高”、“中”、“低”来表示预测的风电功率水平。我们的\
  \ KNN 分类实验结果如表 2-6 所示，其中 `K` 的取值范围为 1 到 10，相应的准确率百分比记录在表 2-6 中。当使用的 `K` 值大于 10 时，分类结果与\
  \ `K=10` 时相同。\n\n![](img/625524_1_En_2_Fig16_HTML.png)\n\n**图 2-16** 准确率与 `k` 值的关系\n\
  \n**表 2-6** 结果-KNN 分类\n\n| K 值 | 准确率 (%) | 分类结果 |\n| --- | --- | --- |\n| 2 | 100\
  \ | 中 |\n| 3 | 96.997 | 中 |\n| 4 | 98.19 | 中 |\n| 5 | 95.58 | 中 |\n| 6 | 96.71 |\
  \ 中 |\n| 7 | 94.77 | 中 |\n| 8 | 95.799 | 中 |\n| 9 | 93.926 | 中 |\n| 10 | 94.63 |\
  \ 中 |\n\n随着 `K` 值的增加，模型的准确率依然保持惊人的高水平，仅有轻微波动。与不同 `K` 值相关的准确率百分比展示了模型有效分类风电功率水平的能力。显而易见，当\
  \ `K` 等于 1 和 2 时，准确率异常高，均达到了 100% 的完美准确率。这表明，当模型仅考虑最近的相邻数据点时，它在精确预测风电功率水平方面表现出色。这种准确率水平在需要细粒度预测以进行即时决策的应用中至关重要，例如在风力波动的条件下管理电网负荷。\n\
  \n对于 `K` 值从 3 到 10 的范围，模型始终将风电功率分类为“中”，偶尔也分类为“中”。当使用的 `K` 值大于 10 时，分类结果与 `K=10`\
  \ 时相同。因此，可以得出结论，当 `K=10` 时获得最佳结果。这与这些 `K` 值所达到的高准确率相一致，表明模型在将风电功率归类为“中”时很有信心，但在考虑稍远一些的邻居时，分类结果会出现轻微变化。\n\
  \n凭借 96.997% 的准确率，`K=3` 在精确性和鲁棒性之间取得了平衡。对于可以接受稍广范围的相邻数据点，但仍需高准确率的应用来说，这是一个强有力的选择。这种精确度水平在诸如优化可再生能源并入电网等场景中尤其有价值。当目标是确保以最高准确率对风电功率水平进行分类时，此设置能带来卓越的结果。\n\
  \n从 `K=4` 到 `K=10`，这些值在保持高准确率的同时，对风电功率条件的变化提供了稍强的适应性。它们适用于那些可以容忍更广泛地考虑相邻数据点，并且可能遇到更多样化风电功率场景的应用。\n\
  \n### 2.4.6 回归模型对比分析：多项式回归 vs. KNN 回归 vs. 多元线性回归\n\n在这项综合分析中，我们深入探讨了三种不同回归模型的性能：多项式回归、K\
  \ 近邻（KNN）回归和多元线性回归，并以它们各自的平均绝对百分比误差（MAPE）结果作为衡量标准。MAPE 是一个关键指标，用于量化这些回归模型在预测连续目标变量时的准确性。在本节中，我们根据所提供的结果，对每个模型的优缺点进行了全面审视。参见图\
  \ 2-17。\n\n![](img/625524_1_En_2_Fig17_HTML.png)\n\n**图 2-17** KNN、多项式回归和 MLR 的\
  \ MAPE\n\n对于多项式回归，我们探索了从 4 到 14 的多项式次数范围。这些次数对应着不同的平均绝对百分比误差（MAPE）值，在次数为 9 时观察到显著改善，MAPE\
  \ 降至 7.57。多项式回归的优势在于其处理变量间复杂非线性关系的能力。这使得它特别适合捕捉电力系统数据中通常表现出的非线性行为的复杂模式。此外，该模型提供了相当大的灵活性，能够适应广泛的数据模式和变化。\n\
  \n然而，多项式回归并非没有缺点。主要问题之一是其容易过拟合，尤其是当次数过高时。过拟合发生在模型过于紧密地拟合训练数据，从而捕捉到噪声和不相关的波动时。该模型的另一个挑战是最优多项式次数的选择。需要在模型复杂度和预测精度之间取得平衡，这需要细致的考量。选择过高的次数可能导致过拟合，而过低的次数则可能导致欠拟合，即模型过度简化了变量间的关系。\n\
  \n实验最终揭示，在所探索的次数中，次数 9 是最优选择。它实现了最低的 7.57% 的 MAPE，这凸显了微调模型复杂度以匹配数据特征的重要性。这个最优次数在捕捉电力系统行为的复杂性和避免过拟合陷阱之间取得了平衡。\n\
  \n接下来看 KNN 回归，我们的研究深入探讨了 `K` 值（范围从 2 到 10）的领域。这一探索揭示了模型行为中一个关于 `K` 值选择的引人注目的趋势。值得注意的是，MAPE\
  \ 呈现出随着 `K` 值增大而增加的趋势。然而，最突出的是，当 `K` 设置为 1 时，模型取得了完美的 0 MAPE 这一非凡成就。虽然这个结果看起来非常有希望，但它引发了一个关键问题——过拟合。值得注意的是，`K=4`\
  \ 产生了最低的 MAPE 值 13.288，表明其预测性能更佳。\n\nKNN 回归的优势在于其简单性和直观性。它易于理解和实现，使其成为各种应用的有吸引力的选择。此外，KNN\
  \ 以非参数方式运行，这意味着它不需要假设变量间关系具有特定的函数形式。当处理潜在关系不明确的数据时，这种灵活性可能是有利的。\n\n尽管如此，KNN 回归也有其缺点。一个显著的局限性是其对\
  \ `K` 值选择的敏感性。模型的性能会因所选 `K` 值的不同而发生显著变化，因此进行交叉验证以确定最优 `K` 值至关重要。此外，对于较大的数据集，KNN\
  \ 可能会变得计算成本高昂，因为它涉及计算数据点之间的距离。\n\n\n\n最后，在多元线性回归领域，我们得到了一个 MAPE 值，为 42.20%。该模型的特点是简单，并为每个预测变量提供了系数。\n\
  \n多元线性回归的优势在于其简单性和可解释性。它是一个易于理解的直观模型，并为每个预测变量提供了可解释的系数。这种透明性使其在需要理解不同变量对目标变量的个体贡献时，成为一种有价值的工具。\n\
  \n然而，多元线性回归也并非没有其自身的局限性。该模型的基本假设之一是预测变量与目标变量之间存在线性关系。虽然这一假设在许多情况下是有效的，但它可能无法准确捕捉现实世界数据中存在的复杂非线性关系。因此，当实际关系并非真正的线性关系时，其性能可能并非最优。\n\
  \n报告的 42.20% 的 MAPE 表明，多元线性回归模型可能无法充分把握数据集的复杂性，尤其是在存在非线性关系的情况下。虽然它可能无法提供与多项式回归或\
  \ KNN 回归相同水平的预测精度，但在那些重视简单性和可解释性而非纯粹预测能力的场景中，它仍然具有相关性和适用性。\n\n最后，在比较这三种回归技术时，可以明显看出，多项式回归（尤其是\
  \ 9 次多项式）取得了最佳的预测性能，其 MAPE 最低，为 7.57%。\n\n## 2.5 分类在风电预测中的优势\n\n风电预测中的分类，即将风电功率分为低、中、高三个等级，为有效的能源管理和追求可持续性提供了众多关键优势。\n\
  \n### 2.5.1 准确的能源发电预测\n\n分类模型在风电预测中的主要优势之一，是能够提供对预期风电输出功率的精确可靠预测。通过将风电功率分为这三个等级，能源供应商可以深入了解能源资源的可用性。这些信息对于安排能源生产和分配至关重要。例如，当预测到风电功率较高时，能源供应商可以分配资源并计划以最佳方式利用这种清洁的可再生能源（Verhoef\
  \ 等人，2020）。\n\n### 2.5.2 优化的能源分配\n\n将风电功率预测为低、中、高三个等级，使电网运营商能够就电力供需平衡做出明智的决策。电网运营商可以更有效地分配资源，根据预测的风电功率水平调整发电量，并策略性地启动或关闭发电厂，以满足消费者需求，同时避免电网过载或利用不足。这种优化提高了能源分配的整体可靠性和效率（Brázdil\
  \ 等人，2019）。\n\n### 2.5.3 降低成本\n\n分类模型在降低能源部门成本方面发挥着关键作用。通过准确预测风电功率水平，能源供应商可以在低风电发电期间最大限度地减少对备用电源（如化石燃料）的依赖。这种减少不仅通过降低燃料费用来节省成本，还降低了与传统发电相关的运营成本。从本质上讲，它促进了更具成本效益和可持续性的能源生产过程（Gupta\
  \ 等人，2021）。\n\n### 2.5.4 电网稳定性\n\n由于风速和风向的波动，风电发电本身具有可变性。分类模型为风电输出功率的潜在波动提供了早期预警和见解。掌握了这些信息，电网运营商可以主动管理能源电网，确保稳定一致的能源供应。通过预先应对风电的变化，这些模型有助于防止停电并维持电网稳定，尤其是在天气条件快速变化的时期（Thomas\
  \ 等人，2022）。\n\n### 2.5.5 增强的能源规划\n\n基于分类的风电预测显著有利于能源基础设施规划。能源供应商和利益相关者可以就风电场及相关基础设施的建设、扩建和维护做出明智的决策。这种前瞻性确保了能源基础设施能够高效地满足当前和未来的能源需求。通过在正确的时间投资正确的项目，能源供应商可以最大限度地利用风能资源，并增强其运营的整体可持续性（Larson\
  \ 等人，2023）。\n\n## 2.6 总结\n\n本章的目标是使用机器学习，利用从 Kaggle 数据集获得的数据来预测风电，同时瞄准 SDG 7，该目标旨在通过在全球范围内采用可持续方法来增加清洁能源的使用。本章使用了多项式回归、KNN\
  \ 回归、KNN 分类和多元线性回归，然后比较了这三种机器学习算法的准确性。\n\n本质上，使用 HTML 和 JavaScript 构建了一个网页，允许用户输入自变量：风速、风向、气压和气温，并在网页上输出预测的功率值和准确性。当使用\
  \ 9 次多项式回归时，获得了 7.57% 的 MAPE 值，表明准确性最高。对于 KNN 回归，当使用 `k` 值为 4 时，获得了最低的 MAPE，为 13.288%。对于多元线性回归，获得了\
  \ 42.20% 的 MAPE，这表明该模型的预测值对于 KNN 分类来说准确性不高。\n\n本章的一个局限性是，没有使用 API 获取实时数据来基于时间值进行实时预测。一个有趣的未来工作是使用更多的机器学习算法，例如多层感知器，来比较所用模型的不同准确性。本章的主要结论是，机器学习算法可用于增加绿色技术的使用，以高效地生产能源。机器学习算法可用于能源行业，帮助提高可持续能源系统的效率。同时，也可以得出结论，机器学习算法可用于实现\
  \ SDG 目标，并有助于改善环境状况和社区福祉。\n\n\n\n"
- '# 3. 一种利用机器学习算法实现可持续发展目标 2、9 和 12 的作物推荐系统


  **本章作者：**


  Domah Avishaye，`avishaye.domah@umail.uom.ac.mu`


  Hanumunthadu Vandana，`vandana.hanumunthadu@umail.uom.ac.mu`


  Radjoo Dheeraj，`dheeraj.radjoo@umail.uom.ac.mu`


  联合国 17 项可持续发展目标在提供应对全球紧迫挑战的标准方面发挥着关键作用。这包括贫困、饥饿等相关问题。机器学习因其分析大量数据并预测结果的能力，对于实现可持续发展目标至关重要。本研究聚焦于应用机器学习来实现可持续发展目标
  2、9 和 12。


  所选算法包括 K 近邻、决策树、随机森林和多层感知器。该系统根据氮、磷、钾、温度、湿度、土壤 pH 值和降雨量等输入参数，预测 22 种作物的产量。该网络应用程序使用
  JavaScript 和 HTML 设计，并利用了来自 Kaggle 平台的作物推荐数据集。所有四个模型都达到了高准确率，其中随机森林模型达到了 100%，这可能是由于过拟合所致。这与目标可持续发展目标相符。作物推荐准确率的提高有助于改善农业实践和粮食安全。此外，这些模型促进了农业领域的创新，并更有效地分配了资源。与依赖历史数据比较和估算的传统系统相比，机器学习能够管理大规模数据集，并适应农场数量不断增长的可扩展性。多样化的算法提高了作物产量预测的准确性。


  ## 3.1 引言


  本章介绍将机器学习算法应用于作物数据集，以针对可持续发展目标 2、9 和 12。可持续发展目标 2 背后的主要目标是消除饥饿、改善营养、确保获得营养充足且足够安全的食物，并推广可持续的农业实践。可持续发展目标
  9 旨在发展稳健的基础设施、促进包容和可持续的工业增长并鼓励创新。由于全球人口增长，对土地和淡水等自然资源的需求正以惊人的速度增加。可持续发展目标 12 旨在确保可持续的消费和生产模式。由于农业在全球范围内被认为是最依赖水资源的活动之一，因此需要做出重大改变才能实现这一可持续发展目标[1]。机器学习帮助农民在考虑环境因素和市场需求的情况下，种植最有利可图的作物。这有助于农民增加利润，并降低作物歉收的可能性[2]。


  在文献[3]中，五个机器学习模型基于土壤分析预测了芥菜的作物产量。它通过应用机器学习进行作物预测和可持续农业实践，实现了可持续发展目标 2、9 和 12。文献[4]使用机器学习算法预测孟加拉国库尔纳地区的土壤类型并推荐合适的作物。这与前面提到的三个可持续发展目标一致。文献[5]侧重于使用机器学习预测土壤质量。它通过改善土壤肥力，从而确保更高的作物产量，积极促进了可持续发展目标
  2 的实现，进而提高了粮食安全。同时，它也实现了另外两个指定的可持续发展目标。


  在本研究中，设计了一个利用分类算法的网络应用程序，这些算法包括 K 近邻、决策树、随机森林和多层感知器。我们的目标是致力于实现可持续发展目标 2、9 和 12，重点关注提高作物产量预测。本研究的主要焦点是这些分类算法在所选数据集上的性能，旨在实现粮食安全、推动农业创新以及促进可持续的消费和生产模式。通过利用作物数据集，本研究的主要发现展示了这些算法的准确性。与以往研究相比，主要的新颖之处在于考察了应用于作物数据集以预测最佳作物产量的多种机器学习算法。




  ### 3.2 人工智能在可持续发展目标 2、9 和 12 中的应用案例


  在文献[6]中，该研究提出了一种能够显著影响并支持联合国“零饥饿”可持续发展目标的神经网络设计，例如卷积长短期记忆网络。作者旨在提高用水效率，减少对灌溉的依赖，并降低因干旱和极端天气导致作物损失的风险。他们利用实时传感器数据和地面数据，将机器学习应用于作物分割、土壤分类、归一化植被指数（NDVI）和土壤湿度预测。实验表明，提高农业生产力并减少水等自然资源的浪费，可为农民带来有利的经济效益。研究还证明，将机器学习与地球观测数据结合用于分析和预测，可能有助于预测农业生产力并缓解贫困。


  文献[7]回顾了可持续发展概念及其目标，以及与该领域相关的地球观测方法。特别强调了机器学习方法和算法的贡献，及其在助力实现可持续发展目标方面的潜力和能力。研究认为，从数据中提取和综合特征的能力对性能有显著影响。这项深入分析考察了处理地球观测数据以应对不同可持续发展目标的各种机器学习类别。所有类型的机器学习涵盖了广泛的可持续发展目标和学科领域，其中分类、聚类、回归和降维技术适用于可持续发展目标
  2、9、11、14 和 15。该论文支持了地球观测和机器学习在实现可持续发展目标中的重要性，并总结了支持实现这些目标的策略和战术。


  在文献[8]中，开展了可持续交通规划，以助力实现与交通相关的可持续发展目标 9、11 和 12。研究提出了一种基于机器学习的预测建模方法，用于地铁客流量预测，并考虑了车站周边的建成环境。因此，模型的创建和测试使用了时间序列数据库。研究评估了多种机器学习模型的预测性能，包括岭回归、套索回归、弹性网络、k
  近邻、支持向量回归、决策树、随机森林、极端随机树、自适应增强、梯度提升、极端梯度提升以及堆叠集成学习器。结果显示，决策树在基础学习器中表现最佳，在测试数据集上的`R2`达到
  87.4%。基础学习器中表现第二和第三的模型是`KNN`和`SVR`。特征相关性研究还揭示了每种土地利用密度类型对地铁客流量预测的不同贡献方式。


  文献[9]的作者研究了通过结合纳米技术和机器学习来减少食物浪费并促进负责任的消费，从而助力实现可持续发展目标 2 和 12 的可能性，具体方法是通过确定食物中潜在的污染物。该论文利用了一个小型传感器系统（`S3`），该设备主要包括一个气体传感器，以及温度、湿度和流量传感器，用于有效测量食物污染，即确定所分析食物样本的污染率（细菌、酵母）。使用`S3`设备测量了多个具有不同污染水平的食物样本，收集数据并将其输入到`k-NN`、随机森林和`SVM`等机器学习算法中。结果表明，测试样本中的食物污染物数量被正确识别，并且污染物的微生物组成也被准确预测。


  文献[10]提出了一种创新且新颖的方法，其中考虑了可持续发展目标 7 和 9。作者提出了在农业产业中集成光伏（PV）的方案，这一解决方案将极大地促进清洁能源和产业创新。研究使用了深度
  Q 网络（`DQN`），这是一种强化学习技术，作为人工智能辅助工具，帮助投资者根据预算、成本和能源需求等多种参数，就光伏板的安装做出决策。`DQN`有助于确定农业部门不同农场所需的最佳光伏类型，使投资者能够在区域内高效部署光伏系统。这种强化学习方法通过光伏系统与农业的创新结合，促进了可持续能源的使用，同时提高了利润。


  在文献[11]中，作者回顾了关于机器学习技术在农作物生产中重要性的研究。他们指出，准确及时的作物产量预测对于进出口、定价和营销分配等重要政策决策至关重要。研究概述了多种技术，如人工神经网络、信息模糊网络、决策树、回归、聚类、贝叶斯信念网络、时间序列分析和马尔可夫链模型。研究结果表明，农业中的计算机科学有助于作物预测。基于客观方法进行收获前作物预测是必要的。一个好的模型将比传统的预测方法更具优势。


  在文献[12]中，该论文提出了一种系统，通过部署机器学习进行作物预测，帮助学徒农民指导他们种植和收获最合适的作物。该系统提出使用朴素贝叶斯分类器来计算和预测当前气候下的作物。系统的实现使用了带有湿度传感器的
  Arduino UNO 进行数据收集，以及一个移动应用程序，该应用程序根据用户输入（如温度）来预测作物。通过监督机器学习算法——朴素贝叶斯分类器获得的输出被证明是准确的，并将帮助农民发展可持续作物。


  文献[13]的作者提出了一种新颖的机器学习算法，称为`作物选择方法`（`CSM`），该算法根据作物类型和全年天气状况进行作物分类。通过使用包含每种作物类别往年播种、种植和收获时间段的作物数据集，来高效优化作物产量，以确定整个季节可以种植的最佳作物序列。研究确定了多个序列，`CSM`算法输出其中产量最高的序列。结果表明，当使用`CSM`时，由于全年种植了最多类型的作物并有效产出，每日作物产量更高，从而实现了土地利用最大化。


  此外，文献[14]研究了一种基于土壤养分的作物推荐方法，该方法使用了三种机器学习分类方法：`k-NN`、`SVM`和逻辑回归。这些算法利用了一个现有的土壤数据集，该数据集包含每种作物所需的化学成分，并根据
  pH 值、磷含量和土壤盐度，算法输出适合此类土壤环境的作物。研究还使用了一个土地数据库进行地理分类，模型根据土地的化学特征预测最适合该土地的最佳作物类型。结果显示，作物分类的准确率高达
  98%；其中，`SVM`机器学习模型达到了 92%的模型准确率，`K-NN`和`LR`也取得了相应结果。




  一种土壤肥力技术在文献[15]中进行了分析，该技术将作物产量率分为低、中、高三个等级，其中被归类为低的土壤意味着作物产量差，而高则意味着作物适应性极佳。本文的目标是确定所测试的土壤（土地）是否包含良好作物收获所需的化学成分。土壤肥力类别是根据预定义条件确定的，这些条件将土壤类型分为`L`、`M`或`H`。该论文使用朴素贝叶斯和`k-NN`作为分类机器学习模型，根据所测试土地的化学参数来预测土壤肥力。该方法有助于农民推断土地的收获可行性以及土壤的作物产量能力。


  ## 3.3 数据处理与应用设计


  本节详细描述了用于作物预测的 Web 应用程序的实现。该系统基于`JavaScript`和`HTML`构建，使用`ML.js`作为依赖项来实现`K-NN`、决策树和随机森林分类。该应用程序旨在为用户提供一个友好的界面，以便根据输入进行预测。


  ### 3.3.1 数据收集过程与数据集描述


  本研究的数据是通过在 Kaggle（一个著名的数据科学和机器学习爱好者平台）上进行彻底搜索而收集的。本研究中使用的数据集可在[16]中找到。Kaggle 是一个信誉良好的资源库，托管着来自世界各地研究人员、数据科学家和组织贡献的大量数据集。这个特定的数据集提供了与作物推荐相关的宝贵信息，使其成为我们分析和研究目的的合适选择。


  该数据集包含八列，如图 3-1 所示。


  ![](img/625524_1_En_3_Fig1_HTML.jpg)


  图 3-1 作物数据集


  各列如下：


  *   **N：** 土壤中的氮含量比

  *   **P：** 土壤中的磷含量比

  *   **K：** 土壤中的钾含量比

  *   **Temperature：** 以摄氏度为单位的大气温度

  *   **Humidity：** 以百分比为单位的相对湿度

  *   **pH：** 土壤的 pH 值

  *   **rainfall：** 以毫米为单位的降雨量

  *   **label：** 作物名称


  该数据集包含 22 种作物的 2200 条数据，每种作物 100 条数据。涉及的作物包括咖啡、黄麻、棉花、椰子、木瓜、橙子、苹果、甜瓜、西瓜、葡萄、芒果、香蕉、石榴、扁豆、黑豆、绿豆、蛾豆、木豆、芸豆、鹰嘴豆、玉米和水稻。


  ### 3.3.2 数据预处理步骤


  为了执行决策树和随机森林分类，需要对标签进行编码，因为字符串标签会导致`ML.js`依赖项出错。因此，为了预处理数据集，使用了一个名为 Pandas 的 Python
  库来对标签进行编码。标签编码过程是使用一个名为 Google Colab 的在线集成开发环境完成的。Colab 是一个基于云的 Jupyter Notebook
  平台，提供了一种廉价、无需设置的解决方案。它非常适合机器学习建模，提供对图形处理单元（GPU）和张量处理单元（TPU）的访问[17]。数据可以轻松地操作和显示。


  图 3-2 展示了数据预处理步骤的流程图。首先，导入 Pandas 的依赖项。Pandas 是一个用于数据分析的 Python 库。由于使用的是 Google
  Colab，因此还需要导入数据集。要加载数据集，必须将驱动器存储挂载到 Colab 应用程序上。加载驱动器后，通过调用 Pandas 的`read_csv()`方法来读取
  CSV 文件格式的数据集。


  ![](img/625524_1_En_3_Fig2_HTML.jpg)


  图 3-2 数据预处理流程图


  为了对标签进行编码，定义了一个字典来将标签映射到其对应的值。调用`map()`方法向数据集添加一个包含编码后标签的列。现在，每个标签都将有一个对应的数字来表示它。


  ### 3.3.3 程序结构


  图 3-3 以框图形式展示了所实现的机器学习分类算法的编程模型。需要注意的是，本章的所有代码都可以在本书 GitHub 页面上托管的`Chapter 3 – Codes`文件夹中找到。


  ![](img/625524_1_En_3_Fig3_HTML.jpg)


  图 3-3 Web 应用程序的程序结构


  运行应用程序的主文件是`index.js`文件。它持有一个按钮的事件监听器，该按钮将根据用户的选择运行相应的算法。提供了一个单选按钮组，用户可以在其中选择运行`k-NN`、决策树分类器、随机森林分类器或多层感知器。`index`文件使用`if-else`语句来验证哪个单选按钮被选中，然后调用该算法对应的方法。


  `global_variables.js`文件保存了 Web 应用程序中使用的所有变量，包括 HTML 元素（如容器、单选组、文本字段和按钮）以及用于存储从数据集中读取的值的数组。




