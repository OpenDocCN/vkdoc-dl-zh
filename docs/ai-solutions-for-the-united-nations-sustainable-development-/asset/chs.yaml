  \ 的准确率高于 SLR，这表明该模型在预测方面具有更好的准确性。主要创新点在于使用回归技术来预测制造业的 GHG 排放及其相关影响和可持续解决方案。因此，所采用的机器学习与产业及气候行动的整合，强调了在实现\
  \ SDGs 过程中催化变革性变革的可能性。\n\n## 4.1 引言\n\nSDGs，也称为全球目标，是一项全球性倡议，敦促各国共同努力，到 2030 年消除贫困、保护地球，并确保每个人都能生活在和平、公正与繁荣之中[1]。它们作为《2030\
  \ 年可持续发展议程》的组成部分，得到了联合国所有成员国的采纳。共有 17 个 SDGs 和 169 个具体目标，每个目标都有不同的任务和指标[2]。\n\n\
  本项任务聚焦于其中两个 SDGs：SDG 9 和 SDG 13。SDG 9 侧重于产业、创新和基础设施，而 SDG 13 则关注气候行动[3]。机器学习算法通过为可持续发展提供创新解决方案，在推进这些目标方面发挥着关键作用。将机器学习融入\
  \ SDGs 凸显了其加速迈向更可持续、更公平世界的变革潜力。例如，它可以应用于使用决策树（DT）等分类器来预测住宅区的能源效率。\n\n此外，还可以利用神经网络和贝叶斯网络模型来创建优化工业设施和产品环境保护的模型。借助各种机器学习算法，如\
  \ K 近邻（k-NN）、朴素贝叶斯（NB）、决策树（DT）和支持向量机（SVM），理解可持续发展的优先事项已成为可能[4]。\n\n在联合国 SDGs 背景下使用机器学习的另一个例子见于文献[5]，其中长短期记忆（LSTM）深度学习算法预测了智能电网中的能源需求，这与关于气候行动的\
  \ SDG 13 相一致。该研究还与其他预测算法（Facebook Prophet、随机森林（RF）和支持向量回归（SVR））进行了结果对比分析。评估了该机器学习算法对实现\
  \ SDG 9、SDG 13 以及额外 SDG 7 的贡献能力[5]。此外，在文献[6]中，考虑了来自南印度五个邦（安得拉邦、卡纳塔克邦、喀拉拉邦、泰米尔纳德邦和特伦甘纳邦）的\
  \ 17 个 SDG 数据集（包括 SDG 9 和 13）。用于获取数值结果的机器学习技术包括高斯过程、线性回归、RF 和带有特定精度参数的 REP 树[6]。\n\
  \n本章的主要焦点是通过预测制造业中的二氧化碳（CO[2]）和温室气体（GHG）排放，并考虑国内生产总值（GDP）年增长率和人口作为影响因素，来分析 SDG 9\
  \ 与 SDG 13 之间的关系。采用了一种结合数据驱动分析和回归技术的方法。\n\n为了预测 CO[2]和 GHG 排放，回归技术的原理建立了自变量（GDP\
  \ 和人口）与因变量（CO[2]和 GHG 排放）之间的数学关系。简单线性回归（SLR）、多元线性回归（MLR）和 k 近邻（k-NN）等回归模型提供了宝贵的见解，揭示了\
  \ GDP 和人口变化对排放变动的具体影响程度，同时分析了影响因素与 CO[2]及 GHG 预测之间的相关性。\n\n主要发现揭示了制造业中 GDP、人口与排放之间存在显著关联，即随着\
  \ GDP 和人口的增长，CO[2]和 GHG 排放也相应增加。这些发现凸显了经济发展与制造业环境影响之间的复杂联系，强调了将 SDG 9 促进可持续工业化的目标与\
  \ SDG 13 减缓气候变化的优先事项相协调的重要性。\n\n本章探讨的主要研究问题如下：\n\n1.  GDP 和人口在多大程度上导致了制造业的 CO[2]和\
  \ GHG 排放？\n2.  基于 GDP 和人口数据，SLR 和 MLR 等线性回归模型预测排放的准确度如何？\n3.  k-NN 算法预测排放值的准确度如何？\n\
  4.  如何对预测数据进行进一步分析？\n\n本章提出的主要创新点在于，利用 SLR、MLR 和 k-NN 等回归技术，从多角度预测制造业相关的 GHG 排放，这为制定更多数据驱动的可持续解决方案以减轻温室效应对气候的影响铺平了道路。\n\
  \n\n\n### 4.2 可持续发展目标 9 和 13 的应用案例\n\n本节将回顾其他研究人员进行的、与运用机器学习算法实现联合国可持续发展目标相关的分析。\n\
  \n文献[7]中介绍了一种“用于实施温室气体减排的机器学习驱动决策支持模型”。Lee 和 Tae 提出使用机器学习技术评估温室气体减排，旨在确定温室气体减排技术的经济和环境效益。他们通过开发用于评估温室气体技术的简单评估方法（SAM）数据库，分析了韩国的\
  \ 1,199 个温室气体减排项目。随后，采用了诸如梯度提升回归树（GBRTs）、`SVM` 和深度神经网络（DNN）等机器学习模型，创建了温室气体减排技术评估模型（GRTM）决策支持工具。在三种机器学习模型中，`DNN`\
  \ 表现出更好的预测精度。一个实际案例研究证实，通过采用高效照明、太阳能和地热能等最优温室气体减排技术，有潜力减少 111 吨 `CO[2]` 当量排放，纠正了最初\
  \ 358 吨的高估。该研究展示了机器学习在评估温室气体减排技术时，如何考虑真实的建筑条件和数据。\n\n文献[8]的作者进行了一项研究，他们使用回归克里金法开发了一个机器学习模型，用于对地球表面的辐射能通量进行分类。其目标是通过使用太阳能电池板来促进环境可持续性。该研究使用了多个输入因素和数据建模来评估环境可持续性，并进行了多次模拟以评估模型的有效性。结果表明，与其他方法相比，可持续性得到了显著改善。该研究展示了如何利用机器学习模型来推广可持续实践并减少环境影响。\n\
  \nPiryonesi 和 El-Diraby 在文献[9]中提出了一项关于气候变化对基础设施影响的研究，他们采用机器学习来预测路面状况指数。在从长期路面性能（LTPP）数据库中提取的大量数据集上，测试了多种机器学习算法，包括\
  \ `DT`、`k-NN`、`NB` 分类器、`RF` 和梯度提升树。随后，后三种算法达到了至少 90% 的最高准确率。模型属性被精心选择，以使其与气候压力因素（包括温度范围、蒸发量和冻融循环）相关联，从而使模型能够量化气候变化的影响。\n\
  \n所提出的工具能够通过输入特定于每种气候情景的属性，来检验不同气候情景的影响。为了说明其实用性，该工具被用于评估两组道路（一组在安大略省，另一组在德克萨斯州）在两种不同气候情景下的劣化情况。分析显示，安大略省的道路劣化程度较低，而德克萨斯州的道路劣化情况加剧。这表明气候变化对道路劣化的影响因地点而异。\n\
  \n在文献[10]中，Asadikia 等人展示了一种使用机器学习算法，根据可持续发展目标之间的协同特性对其进行优先级排序的技术。本文的主要目标是通过使用提升回归树模型（一种机器学习和数据挖掘技术）来发现可持续发展目标之间的协同作用。他们的研究说明了每个可持续发展目标如何对可持续发展目标指数的形成做出贡献，并进行了“假设”分析以理解这些目标得分的重要性。结果表明，他们的得分均高于\
  \ 60%，且可持续发展目标 3、4 和 7 表现出最高的协同性。这些研究发现可以指导决策者通过优先考虑具有高协同性的目标，来实施有效的策略和资源分配。\n\n\
  文献[11]的作者提出并评估了几种机器学习模型的预测性能，这些模型包括 `DT`、`RF`、`k-NN` 和支持向量回归（SVR），用于预测地铁客流量，以实现可持续交通和环境，同时为可持续发展目标\
  \ 9、11、12 和 13 做出贡献。交通部门面临着长期且严重的拥堵，车辆排放的 `CO[2]` 占 25%，这些排放依赖于不可再生能源。可持续交通的创新解决方案需要使用计算技术来评估地铁交通系统，以实现可持续发展，从而减少\
  \ `CO[2]` 排放。使用机器学习对测试数据进行预测的准确率分析如下：使用 `CART` 算法的 `DT` 为 87.4%，`k-NN` 为 84.4%，`SVR`\
  \ 为 69.7%。\n\n在文献[12]中，Rao 等人使用由 2 层神经元组成的机器学习算法 `ANN`，在减轻 `CO[2]` 排放影响的同时推广可再生能源的使用，以实现可持续发展目标\
  \ 7 和 13。根据机器学习结果，使用评估指标均方根误差（RMSE）和平均绝对百分比误差（MAPE）来衡量模型的误差。`MAPE` 值为 0.3，以百分比表示为\
  \ 30%。因此，预测使用清洁和可再生能源产生的 `CO[2]` 量的人工神经网络（ANN）模型的准确率为 70%。\n\nSami 等人的研究[13]细致地比较了卷积神经网络（CNN）、支持向量机（SVM）、`RF`\
  \ 和 `DT` 等机器学习和深度学习算法在自动化垃圾分类方面的准确性，这可以归类到可持续发展目标 9 和 12 中的工业废物管理。模型的结果如下：`CNN`\
  \ 提供了 90% 的高准确率，`SVM` 的准确率为 85%，`DT` 的准确率为 65%，`RF` 的准确率为 55%。\n\nLiu 等人在文献[14]中的工作分析了可持续发展目标\
  \ 8 和可持续发展目标 13 之间的相互联系，即气候行动可能对经济增长和社会就业产生协同效应和权衡取舍。使用 `RF` 和极限梯度提升（XGB）等机器学习算法来捕捉气候变化对经济的影响。`XGB`\
  \ 和 `RF` 模型的总体准确率分别确定为 78% 和 72%。\n\nGaur 等人[15]评估了亚洲青年实现可持续发展目标的热情。提供了成功使用机器学习算法来突出他们对可持续未来看法的证据。在该研究中，使用了先前研究的构建模块，并对自适应神经模糊推理系统（ANFIS）和\
  \ `RF` 模型在三个类别的可持续发展目标上的预测准确性进行了比较分析。考虑了亚洲和塞尔维亚青年之间对这些类别重要性可能存在的观点差异。数据收集自 425 名青年受访者。`ANFIS`\
  \ 比 `RF` 模型能更好地预测可持续发展目标。亚洲和塞尔维亚青年对可持续发展目标的偏好最高的是环境，其次是社会，最后是经济。\n\nParvin 等人在文献[16]中研究了传统和智能控制方法，重点介绍了它们的分类、配置、特点、优缺点。研究了适用于能耗、舒适度管理和调度的不同优化目标和约束条件。概述了建筑能源管理中使用的优化算法的不同方法论，并批判性地解释了控制器和优化在可持续发展目标方面的贡献。建筑能源管理系统（BEMS）可以代表一种改善经济增长的可持续模型，与可持续发展目标\
  \ 9.1 相关联。此外，BEMS 有助于解决与可持续发展目标 13 相关的环境影响。在 BEMS 中，控制方法可分为传统方法和智能方法。然而，由于其基于设计的学习能力，智能方法更受青睐。在智能方法中，要么使用学习方法，要么使用基于模型的预测控制方法。学习方法包括混合方法、`ANN`\
  \ 和模糊系统。\n\n在 Ghaffarian 和 Emtehani 的研究[17]中，他们利用卫星图像和机器学习方法，对 2013 年菲律宾遭受超级台风海燕影响后，贫困城市地区在\
  \ 4 年期间的变化进行了监测。此类地区自然灾害的严重程度和影响显著增加，需要有效的减灾策略，这符合可持续发展目标 13 的要求。一种由局部二值模式特征提取模型支持的\
  \ `SVM` 分类方法，最初在灾前和灾后图像中检测到了贫民窟区域。随后，一个密集条件随机场模型生成了最终的贫民窟区域地图。所开发的方法能够高精度地检测贫民窟区域。结果显示，该城市恢复到了灾前的脆弱性水平。\n\
  \n文献[15]的研究比较了自适应神经模糊推理系统（ANFIS）和 `RF` 机器学习模型在三个类别的可持续发展目标（环境、社会和经济）上的预测准确性。`ANFIS`\
  \ 比 `RF` 模型能更好地预测可持续发展目标。亚洲和塞尔维亚青年对可持续发展目标的偏好最高的是环境支柱。\n\n\n\n## 4.3 数据处理与应用设计\n\
  \n### 4.3.1 数据收集流程与数据集描述\n\n我们从多个来源收集数据，创建了一个多样化的数据集，用于预测毛里求斯制造业产生的二氧化碳排放量和温室气体排放量。\n\
  \n-   我们从“Our World in Data”网站收集了按行业划分的二氧化碳排放量和按行业划分的温室气体排放量数据。该数据集包含多个国家、制造业和交通运输等行业以及\
  \ 1990 年至 2019 年间的信息 [18] [19]。\n-   此外，我们还整合了“世界银行”网站提供的 1990 年至 2019 年毛里求斯的人口数量和年度\
  \ GDP 增长数据。这一步使我们能够理解 GDP 与毛里求斯制造业产生的二氧化碳排放量及温室气体排放量之间的相关性 [20] [21]。\n\n收集完这些数据集后，我们提取了毛里求斯的具体信息，同时剔除了缺失值和重复值。随后，我们将数据合并并标准化为一个统一的数据集。最终数据集包含\
  \ 31 条记录，包括 1990 年至 2019 年间的人口数量、年度 GDP 增长、二氧化碳排放量以及制造业的温室气体排放量。目标是基于年度 GDP 增长和人口数量等因素，预测毛里求斯制造业的二氧化碳和温室气体排放量。\n\
  \n图 4-1 展示了我们数据集的一个快照，其中包含几个数据点；\n\n![](img/625524_1_En_4_Fig1_HTML.jpg)\n\n图 4-1\n\
  \n数据集中的几个数据点\n\n### 4.3.2 数据预处理步骤\n\n在数据预处理阶段，原始数据在被送入机器学习模型之前，会被准备并转换为合适的格式。在我们考虑的数据中，存在一些手动移除的异常值。通过数据预处理，执行了诸如数据清洗和手动移除部分异常值等特定任务，以提高机器学习模型的效率。此外，由于参数在特定年份范围内（1990\
  \ 年至 2019 年）似乎具有更一致的分析价值，因此仅考虑了该年份范围。\n\n数据预处理阶段被分为以下几个阶段。\n\n#### 数据预处理阶段\n\n-\
  \   **数据清洗：** 在合并后的 CSV 文件中，包含国家、年份、人口、年度 GDP 增长、二氧化碳排放量和温室气体排放量等信息。为了提高工作质量，我们再次检测了不准确、重复或空值。\n\
  -   **噪声数据：** 噪声数据指的是不必要的数据，在本例中即与其他行业（非制造业）相关的信息。异常值也可能是噪声数据的来源，因此已被移除。\n-   **缺失数据：**\
  \ 某些参数存在数据缺失。然而，大多数机器学习算法无法处理缺失值。在处理数据集缺失数据的几种可用方法中，由于属性数值较大，我们通过目视识别了缺失数据。移除缺失值不会对数据集的分布产生重大影响。某些属性存在空值。但是，我们选择不填充缺失值，因为填充缺失值会影响异常值分析。\n\
  \n我们的数据集中没有结构错误，包括拼写错误。原因可能是数据的数值性质。由于差异清晰可见，数据清洗阶段已成功手动完成。\n\n#### 特征选择与属性移除\n\n\
  在此阶段，针对预测变量选择了最重要的变量（特征/属性）。\n\n选定的自变量是人口规模（百万）和年度 GDP 增长（%），而因变量是与制造业相关的二氧化碳和温室气体排放量（十亿吨）。\n\
  \n## 4.4 分析程序结构\n\n本作业中使用的机器学习模型的程序结构提供了对回归技术的全面探索，以理解和预测二氧化碳和温室气体排放。在我们追求与可持续发展目标\
  \ 9 和 13 相关的可持续工业化和气候缓解的过程中，我们部署了三种不同的方法：简单线性回归、多元线性回归和 k-近邻算法。使用 HTML，展示了执行 CSV\
  \ 文件上传、数据解析、回归分析和数据可视化等任务的网站，使用了以下库：\n\n-   `ml.js` [22]\n\n    `ml.js` 是一个用于 JavaScript\
  \ 中机器学习任务的机器学习库，提供各种机器学习算法和数据分析工具。\n\n-   `Papaparse.js` [23]\n\n    `PapaParse`\
  \ 是一个强大的多线程 CSV 解析库，可在网页上运行，解析本地系统上的文件。它将其转换为易于用于分析的结构化数据。\n\n-   `Plotly.js` [24]\n\
  \n    `Plotly.js` 是一个高级声明式图表库，用于创建交互式且视觉上吸引人的数据可视化，例如图表以及二维和三维图表。\n\n-   `Math.js`\
  \ [25]\n\n    `math.js` 是一个功能强大的 JavaScript 数学库，允许您执行各种数学运算，包括代数、微积分、线性代数和矩阵运算。\n\
  \n请注意，本章的所有代码都位于本书 GitHub 页面上的 `Chapter 4 – Codes` 文件夹中。图 4-2 展示了 HTML 文件的程序结构，以及每个机器学习算法的函数及其相互连接。\n\
  \n![](img/625524_1_En_4_Fig2_HTML.jpg)\n\n图 4-2\n\n程序结构\n\n图 4-3 展示了多元线性回归网站的一般布局。机器学习算法，即简单线性回归和\
