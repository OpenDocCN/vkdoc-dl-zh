  \n**图 1-13** 原始温度数据集与修正后数据集对比\n\n## 在 JavaScript 中实现基于机器学习的预测与分类算法\n\n在本节中，我们将概述一些常见的回归和分类算法，以及它们在\
  \ JavaScript 中的实现。\n\n\n\n### 1.3.1 简单线性回归 (SLR)\n\nSLR 是一种统计技术，用于分析两个定量变量之间的关系，并在自变量取特定值时预测因变量的值。因变量与自变量之间的相关性可以通过回归线来确定，该回归线是数据集中最佳拟合的直线。此外，回归分析还用于评估自变量变化与因变量之间的关系。\n\
  \n简单线性回归的公式如下 [46]：\n\n![$$ Y={\\beta}_0+{\\beta}_1X+\\epsilon $$](img/625524_1_En_1_Chapter_TeX_Equ3.png)\n\
  \n(1.3)\n\n其中，\n\n`Y` 是因变量或预测输出。\n\n`β[0]` 是回归线的 y 轴截距。\n\n`β[1]` 是回归线的斜率或回归系数。\n\
  \n`X` 是自变量或目标输入。\n\n`ϵ` 是估计值的误差，用于衡量预测值与实际值之间的变异程度。\n\nSLR 通过计算使模型总误差 (`ϵ`) 最小化的回归系数\
  \ (`β[1]`) 和 y 轴截距 (`β[0]`)，来找到数据集中最佳拟合的直线。使用最小二乘法，系数计算如下：\n\n![$$ {\\beta}_0={M}_Y-{\\\
  beta}_1{M}_X=\\frac{1}{N}\\left({\\sum}_{i=1}^N{Y}_i-{\\beta}_1{\\sum}_{i=1}^N{X}_i\\\
  right) $$](img/625524_1_En_1_Chapter_TeX_Equ4.png)\n\n(1.4)\n\n![$$ {\\beta}_1=\\\
  frac{SC_{XY}}{SS_X}=\\frac{\\sum_{i=1}^N\\left({Y}_{i-}{M}_Y\\right)\\left({X}_{i-}{M}_X\\\
  right)}{\\sum_{i=1}^N{\\left({X}_{i-}{M}_X\\right)}²} $$](img/625524_1_En_1_Chapter_TeX_Equ5.png)\n\
  \n(1.5)\n\n其中，\n\n`SC[XY]` 是 XY 的共偏差平方和。\n\n`SS[X]` 是 X 的偏差平方和。\n\n`M[Y]` 是 `Y`\
  \ 的均值。\n\n`M[X]` 是 `X` 的均值。\n\n`N` 是 `X` 和 `Y` 中值的总数。\n\n将提供两个版本的 SLR JavaScript\
  \ 实现，其中第一个版本允许用户直接在网页上输入值进行预测，第二个版本允许用户上传数据集进行预测。\n\n当运行第一个版本的应用程序时，用户需要填充输入字段，当点击\
  \ `Read and Analyse` 按钮后，将显示如图 1-15(a) 所示的输出结果。\n\n![](img/625524_1_En_1_Fig15_HTML.jpg)\n\
  \n图 1-15(a)\n\nSLR 版本 1 的输入与输出\n\n该应用程序还会输出直线方程、平均绝对百分比误差 (MAPE)，以及数据集和回归线（含预测点）的图表，如图\
  \ 1-15(b) 所示。MAPE 的计算公式如下：\n\n![$$ MAPE=\\frac{\\sum_{i=1}^N\\frac{\\left({Y}_{i-}\\\
  underset{\\_}{Y_i}\\right)}{Y_i}}{N}\\ x\\ 100 $$](img/625524_1_En_1_Chapter_TeX_Equ6.png)\n\
  \n(1.6)\n\n其中，\n\n![$$ \\underset{\\_}{Y_i} $$](img/625524_1_En_1_Chapter_TeX_IEq2.png)\
  \ 是 `Y[i]` 的预测值。\n\n![](img/625524_1_En_1_Fig16_HTML.jpg)\n\n图 1-15(b)\n\nSLR 版本\
  \ 1 的 MAPE 与图表\n\n对于 SLR 实现的第二个版本，数据集来自一个名为 `Regression_Weather.csv` 的 CSV 文件。该数据集的部分内容如表\
