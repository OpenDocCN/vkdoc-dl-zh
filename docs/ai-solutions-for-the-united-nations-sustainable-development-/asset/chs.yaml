- '# 6. 空气质量监测：机器学习在实现可持续发展目标 3 和 13 中的应用案例研究


  **本章作者：**


  Aunowar Farhaan Mohammad Jeelany，`farhaanaunowar@gmail.com`


  Munisamy Sodiyen，`munisamysodiyen@gmail.com`


  Ragoo Navish Kumar，`navishragoo@gmail.com`


  Kwok Hin John Darren Johsua，`darrenkwok2000@gmail.com`


  Hawseea Mohammed Fayez，`fayezunknown@gmail.com`


  Appadoo Sarvesh Sanjeevi，`sarvesh.appadoo1@gmail.com`


  毛里求斯大学电气与电子工程系


  联合国可持续发展目标（SDG）致力于改善医疗保健和教育、减少不平等、促进经济增长以及应对气候变化带来的挑战等有益于地球及其居民的举措。机器学习（ML）是处理海量数据、进行预测和发现模式的强大工具。这种能力使得主动决策成为可能，从而促进核心系统和分销渠道内的优化。


  在本章中，我们精心构建了一个 Web 应用程序，用于预测毛里求斯多个地点的空气质量，这与可持续发展目标 3（良好健康与福祉）和可持续发展目标 13（气候行动）的目标相一致。利用
  Weatherbit.io API，获取了历史空气质量数据，以预测空气质量指数（AQI）以及主要空气污染物（即 O[3]、CO、PM10 和 PM25）的浓度。采用了三种
  ML 算法：简单线性回归（SLR）、多层感知器（MLP）、多项式回归（PR）和长短期记忆网络（LSTM）。


  此外，还使用了多种 ML 分类算法，即 K 近邻（k-NN）、决策树（DT）和随机森林（RF），来有效分类 AQI 水平。DT 和 RF 的准确率最高，分别为
  99.5% 和 98.9%。k-NN 的表现最差，准确率为 84.3%。SLR、MLP、PR 和 LSTM 算法在预测空气污染物浓度和 AQI 水平方面显示出不同的准确率。使用平均绝对百分比误差（MAPE）作为性能指标，对这些算法的性能进行了全面评估。SLR
  的 MAPE 范围为 6.81% 至 12.99%，而 PR 的 MAPE 范围为 2.35% 至 9.36%。MLP 的 MAPE 介于 1.48% 和 2.31%
  之间，LSTM 的 MAPE 介于 1.20% 和 1.91% 之间。MLP 和 LSTM 算法因其较低的 MAPE 值而脱颖而出，显示出它们捕捉数据中复杂模式的能力。


  这项研究突显了 ML 方法在预测空气质量和改善公共健康方面的潜力。该 Web 应用程序为毛里求斯提供实时的空气质量预测和见解，支持全球为实现联合国可持续发展目标所做的努力。




  ## 6.1 引言


  可持续发展目标（SDG）框架与各项人权相关，但其独特之处在于聚焦于人类、地球、繁荣、和平与伙伴关系[1]。其三大支柱是环境保护、社会多样性和经济增长。机器学习（ML）的重要性在于其能够极大地影响联合国可持续发展目标的实现。机器学习算法是强大的计算工具，使计算机能够无需显式编程即可学习和做出预测[1]。


  这些算法旨在从海量数据中分析和提取模式。通过利用统计技术和迭代过程，机器学习算法能够检测模式并预测准确结果。凭借分析庞大复杂数据集的能力，机器学习增强了决策制定、资源分配和预测建模，从而加速了可持续发展目标的实现。通过优化流程、识别模式并在各个领域提供洞察，机器学习将为到
  2030 年全球实现可持续发展目标做出重大贡献[2]。


  本章重点关注可持续发展目标 3（确保健康的生活方式、促进各年龄段所有人的福祉）和可持续发展目标 13（气候行动，即采取紧急行动应对气候变化及其影响）。我们提出了一项方案，涉及一种预测空气污染物水平的方法。该方法旨在实时分析毛里求斯
  10 个不同地点空气污染物浓度随时间的变化情况。


  为此，我们采用了多种机器学习回归算法，包括简单线性回归（SLR）、多元线性回归（MLR）和多项式回归（PR）。每种算法都能对空气污染物浓度进行估算。此外，本工作的目标还包括评估各种因素与空气污染物水平之间的关系，从而创建能够实时预测污染物浓度的预测模型。这些模型利用回归算法分析历史数据，并输出用户输入天数对应的预测值，从而为指定城市的空气质量动态提供有价值的见解。


  ## 6.2 人工智能在可持续发展目标 3 和 13 中的应用案例


  ### 6.2.1 可持续发展目标 3：良好健康与福祉


  可持续发展目标 3 致力于确保各年龄段人群的福祉和良好健康。因此，作为人工智能子集的机器学习在该领域的应用日益增多，以助力实现这一目标。文献[3]审视了关于在药物发现领域使用机器学习工具和技术的相关文献。这些方法被应用于药物开发的各个阶段，以加快研究进程、降低风险并减少与临床试验相关的成本。机器学习技术通过分析不同应用场景下的制药数据来增强决策，包括定量构效关系（QSAR）分析、识别潜在候选药物以及创建新药设计，所有这些都旨在获得更精确的结果。


  根据文献[4]，深度学习方法（DLA）在医学图像分析中的应用已成为一个快速发展的研究领域，DLA 被广泛应用于医学成像中以辨别疾病的存在与否。本文聚焦于人工神经网络的演变，并对
  DLA 进行了广泛研究，展示了其在医学成像领域内具有前景的应用。在文献[5]的工作中，提出了一种利用机器学习区分自闭症特征的方法。通过将两种不同的算法（CART
  和 ID3）结合到随机森林中，对现有的预测模型进行了改进。他们使用两个数据集对模型进行了测试和评估：一个名为自闭症谱系商数（AQ10）数据集，另一个包含来自有和没有自闭症特征的个体的
  1100 个真实世界数据样本。真实世界数据集来自医院数据库。结果显示准确率达到 98%，假阳性病例仅为 2%。


  这项研究有可能显著缩短自闭症的诊断时间。文献[6]介绍了使用卷积神经网络（CNN）分析与阻塞性肺病检测相关的医学呼吸音频数据。利用 Librosa 机器学习库分析了各种音频特征，如
  MFCC、MEL 频谱图、色度、色度（恒定 Q 变换）和色度 CENS。该系统还能确定疾病的严重程度，将其分类为轻度、中度或重度。结果显示，这种深度学习方法效果显著，根据
  ICBHI 评分，分类准确率达到 93%。在文献[10]中，采用支持向量机（SVM）和随机森林（RF）作为传统机器学习方法，以及 CNN 作为深度学习方法，对患者糖尿病的预测和检测进行了比较分析。在他们的实验中，RF
  的准确率达到 83.67%，深度学习为 76.81%，SVM 为 65.38%。在文献[7]中，Gabriel 等人应用逻辑回归、随机森林、支持向量机、K 近邻、朴素贝叶斯分类器和前馈神经网络来诊断慢性肾病（CKD）。使用了来自加州大学欧文分校的
  CKD 数据集。随机森林的诊断准确率达到 99.75%，优于其他算法。在文献[8]中，Gabriel 等人介绍了一种利用机器学习（特别是神经网络和随机森林）的方法。他们开发了两个互补模型，旨在估算个体死于
  COVID-19 的可能性。训练数据集包含两组人群的人口统计数据及病史：一组是 2020 年哥伦比亚因 COVID-19 不幸去世的个体，另一组是成功康复的个体。




  ### 6.2.2 可持续发展目标 13：气候行动


  在[9]中，作者提出了一种实时、多步、多输出、多变量的机器学习模型，用于预测越南胡志明市（HCMC）不同空气污染物的浓度。这些空气污染物包括`NO[2]`、`SO[2]`、`O[3]`和`CO`。作者提出的模型将各种参数作为输入，包括气象条件、来自城市、住宅和工业区的空气质量数据，以及每小时的`NO[2]`、`SO[2]`、`O[3]`和`CO`浓度。


  此外，所提出的机器学习模型使用了`N-beats`神经网络，该网络具有深度堆叠的全连接层，并包含前向和后向链接。作者使用了来自胡志明市六个空气质量监测站的数据，生成了多个包含
  2021 年 2 月至 2022 年 8 月污染物浓度的数据集。使用所提出的模型预测了每种空气污染物的浓度，结果表明，预测每种污染物浓度时获得的`MAPE`值范围在
  0.18 到 0.23 之间。


  [10]中的作者开发了一种稳健的方法来预测空气质量指数（AQI），这对工业污染控制和公共健康至关重要。他们首先使用人工神经网络（ANN）预测`PM2.5`和`PM10`水平。在此基础上，他们扩展了方法，预测了估算
  AQI 所需的其他重要空气污染物。他们采用了`missForest`，这是一种基于机器学习的技术，利用随机森林（RF）算法填充缺失条目。在数据预处理阶段应用了
  RF，提高了准确性。在科威特 Al-Jahra 市的验证显示，AQI 预测准确率高达 92.41%，超过了以往的方法。


  在另一项工作[11]中，采用了多种机器学习技术，包括逻辑回归（LR）、随机梯度下降（SDG）回归、RF、决策树、支持向量回归（SVR）、ANN、梯度提升和 Ada
  Boost，来预测`PM2.5`、`PM10`、`CO`、`NO[2]`、`SO[2]`和`O[3]`等污染物的 AQI。`SVR`和`ANN`成为预测新德里空气质量最准确的方法，显示出较低的均方误差（MSE）、平均绝对误差（MAE）和较高的`R²`值。类似地，在[12]中，使用了不同的机器学习算法来预测印度德里特定区域直径小于
  2.5 微米的颗粒物水平。作者还提出了一种新模型，该模型结合了两种深度学习算法，即长短期记忆网络（LSTM）和门控循环单元（GRU）来预测 AQI。使用了两种类型的数据：一种包含不同的污染物浓度，另一种包含天气数据。经过预处理和特征提取后，数据被输入到各种算法中，如`LR`、`GRU`、K
  近邻（KNN）、支持向量机（SVM）、`LSTM`，以及最后提出的`LSTM-GRU`混合模型。评估所有结果后发现，所提出的模型在所有模型中表现最佳，其`MAE`值为
  36.11。


  在[13]中，提出了一种用于预测大都市 AQI 的深度学习方法。首先收集数据集并进行预处理，例如替换缺失值和消除冗余数据，从而预测金奈市的 AQI。AQI 值基于颗粒物、臭氧和二氧化硫等污染物的水平。使用灰度共生矩阵从数据集中计算统计度量，即均值、均方误差和标准差。`SVM`与`LSTM`一起用于将
  AQI 值分为从良好到严重的六个类别。AQI 值可用于更好地规划可持续的大都市、控制空气污染水平、鼓励植树造林以及说服人们使用公共交通。此外，[14]讨论了机器学习方法如何在气候和数值天气预报领域得到应用。本文提供了深度学习的入门概述，并初步总结了当前预测极端天气的方法。这些方法利用循环神经网络（RNN）预测天气模式，利用卷积神经网络（CNN）预测极端天气事件。它们自动提取与极端天气相关的基本图像特征，从而能够使用深度学习框架预测极端天气的概率。


  ## 6.3 数据处理与应用设计


  本节描述了所使用的数据集、所开发的 Web 应用程序的结构以及预处理步骤。流程图和伪代码也用于描述所涉及的不同过程。


