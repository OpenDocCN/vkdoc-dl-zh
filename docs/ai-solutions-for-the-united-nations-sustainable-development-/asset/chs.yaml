  图 2-9\n\n`main3.js`\n\n## 2.4 应用测试与分析\n\n在这一系列实验中，应用并评估了三种不同的回归技术，即多项式回归、K 近邻 (KNN)\
  \ 回归和多元线性回归，以了解它们在预测目标变量方面的性能。每个实验中的目标变量由平均绝对百分比误差 (MAPE) 表示，该指标量化了每个回归模型所做预测的准确性。\n\
  \n对于实验 1，使用从 4 到 14 的次数训练和测试了多项式回归模型。对于实验 2，使用从 2 到 10 的各种 K 值构建并评估了 KNN 回归模型。对于实验\
  \ 3，应用了多元线性回归，未指定次数或 K 值。\n\n\n\n### 2.4.1 应用测试\n\n本节总结了将不同机器学习算法应用于数据集所获得的一系列结果。各参数使用的测试值如下：\n\
  \n- **风速** = 10 米/秒\n- **风向** = 120 度\n- **气压** = 1 个标准大气压\n- **温度** = 25 摄氏度\n\n\
  每种模型获得的最佳 MAPE 输出如下图所示：\n\n![](img/625524_1_En_2_Fig10_HTML.jpg)\n\n图 2-10 KNN 分类\n\
  \n1. **KNN 分类**\n\n   该算法旨在对前述条件下将产生的功率类别进行分类。在此情况下，`k` 的最优值设为 3，如图 2-10 所示。\n\n\
  ![](img/625524_1_En_2_Fig11_HTML.jpg)\n\n图 2-11 多元线性回归\n\n2. **多元线性回归**\n\n   还使用多元线性回归算法对数据集进行了测试，以预测系统功率。在所选天气条件下的典型输出如图\
  \ 2-11 所示。\n\n![](img/625524_1_En_2_Fig12_HTML.jpg)\n\n图 2-12 KNN 回归\n\n3. **KNN\
  \ 回归**\n\n   KNN 回归模型利用最近邻之间的距离来获取预测的系统功率。在此情况下，四个最近邻比 `k` 的其他值提供了更好的精度，如图 2-12\
