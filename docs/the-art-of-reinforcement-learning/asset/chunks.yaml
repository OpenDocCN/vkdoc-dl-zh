    # 基于双 Q 学习的 DQN 算法


    DQN（深度 Q 网络）是一种深度强化学习算法，在解决复杂决策问题方面取得了巨大成功。对标准 DQN 智能体的一种改进是采用双 Q 学习方法，该方法由 Hado
    Hasselt（2010）的研究证明是有效的[1]。


    双 Q 学习是一种涉及学习两个状态-动作值函数`Q1`和`Q2`的方法，并使用略有不同的符号来计算 TD 目标。智能体随时间推移平等地学习这两个函数，并使用从一个
    Q 网络（例如`Q1`）得出的最佳动作，从另一个 Q 网络（例如`Q2`）中选择后续状态-动作对的值。公式（8.1）展示了在表格情况下，当我们想要更新`Q1`时，双
    Q 学习如何计算 TD 目标，其中它使用最佳动作`a''`作为选择器，从`Q2`中为后续状态`s_{t+1}`选取值。


    ```

    TD_target = r_t + γ * Q2(s_{t+1}, argmax_{a''} Q1(s_{t+1}, a''))

    ```


    (8.1)


    然而，在 DQN 的情况下，我们已经有一个参数为`θ`的标准 Q 网络和一个参数为`θ^-`的目标网络。我们可以将这个目标网络`θ^-`用作第二个状态-动作值函数`Q2`，并对
    TD 目标计算公式进行一些修改，以得到在 DQN 中使用双 Q 学习时的值更新规则。


    然后，我们可以对公式（8.1）进行一些修改，得到在使用神经网络`θ, θ^-`作为`Q1, Q2`时如何计算 TD 目标的公式：


    ```

    TD_target = r_t + γ * Q̂(s_{t+1}, argmax_{a''} Q̂(s_{t+1}, a''; θ); θ^-)

    ```


    (8.2)


    我们可以将使用神经网络`θ`和`θ^-`进行双 Q 学习的目标函数定义为 TD 目标与估计的状态-动作值之间的平方差。


    ```

    J(θ) = (r_t + γ * Q̂(s_{t+1}, argmax_{a''} Q̂(s_{t+1}, a''; θ); θ^-) - Q̂(s_t,
    a_t; θ))²

    ```


    (8.3)


    由于标准 DQN 智能体会定期从标准 Q 网络更新目标网络的参数，使得`θ^- = θ`。我们实际上可以跳过像表格情况那样花费 50%的时间来学习第二个状态-动作值函数`Q2`的过程。现在我们可以介绍由
    Hasselt 等人开发的基于双 Q 学习的 DQN 算法[2]。与标准 DQN 算法相比，整体流程相同；唯一的区别在于我们如何使用目标网络`θ^-`来计算
    TD 目标。根据强化学习问题的不同，我们可能还需要增加`C`，即更新目标网络的间隔（例如，标准 DQN 设置的 2 到 3 倍）。


    **算法 1：基于双 Q 学习、经验回放和ε-贪婪探索策略的 DQN 算法**


    该算法初始化神经网络的`i`、`θ`、`θ^-`以及容量为`N`的回放缓冲区。然后采样动作、执行动作并存储经验。如果`D`的长度大于`m`和`b`，则采样大小为`b`的小批量转移样本，计算
    TD 目标和损失以更新目标网络。


    图 8.1 展示了基于双 Q 学习的 DQN 智能体与标准 DQN 智能体在 Atari River Raid 游戏上的性能。结果显示了平均回合回报（总未折扣奖励）和
    95%置信区间。为了评估智能体的性能，我们在一个独立的测试环境中，使用ε-贪婪策略和固定的探索ε（`ε = 0.05`），在每个训练迭代（包含 250,000
    个训练步或 100 万帧）结束时运行了 200,000 个评估步，其中评估环境未应用奖励裁剪或生命损失的软终止。结果取五次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    **图 8.1** 基于双 Q 学习的 DQN 与标准 DQN 在 Atari 游戏 River Raid 上的对比。结果显示了平均回合回报（总未折扣奖励）和
    95%置信区间。结果取五次独立运行的平均值，然后使用窗口大小为 5 的移动平均进一步平滑处理


    本次实验我们使用学习率 0.00025、折扣率 0.99、批次大小 32 和回放容量 100,000。我们将`C`设置为 5000，即更新目标网络的间隔。图
    8.1 展示了这两个智能体的回合回报（五次独立运行的平均值）。我们可以看到，使用基于双 Q 学习的 DQN 在收敛速度和训练稳定性方面获得了更好的性能。

    '
- fmt: "# 8.2 Prioritized Experience Replay\n\nThe next improvement to the standard\
    \ DQN agent comes from how to sample transitions from the experience replay buffer.\
    \ The current practice is for the DQN agent to sample a mini-batch of transitions\
    \ randomly from the *N* most recent transitions. However, it’s reasonable to think\
    \ that some transitions in the replay buffer are more valuable than others. For\
    \ example, a transition could contain a state that the agent has never encountered\
    \ before, or it could have a higher reward signal. In both cases, we want the\
    \ agent to spend more time learning those valuable transitions or prioritize them\
    \ over others. But how do we define a specific transition as more valuable than\
    \ others?\n\nOne approach to assigning priority is to use the sample frequency\
    \ of a transition. Transitions that have been sampled less will have a higher\
    \ priority compared to others, and those that have never been sampled will have\
    \ the highest priority. The intuition behind this approach is that we should pay\
    \ more attention to transitions that have not been used to update the network\
    \ parameters. However, this method has its limitations since simply counting the\
    \ usage of these transitions does not always reflect their importance or priority.\
    \ For example, the agent may overuse newly generated transitions, even if it has\
    \ already learned enough knowledge regarding similar or identical situations.\
    \ We want the agent to spend less time learning familiar transitions and instead\
    \ focus on those that are unfamiliar and more interesting.\n\nA systematic way\
    \ to determine the priority of a transition is by using the TD error `δ`, as proposed\
    \ by Schaul et al. [3]. The goal of training a neural network is to minimize these\
    \ errors, which are typically squared. Transitions with larger TD errors should\
    \ have higher priorities than those with smaller TD errors. As a reminder, the\
    \ TD error is defined as the difference between the TD target and the current\
    \ estimate, as discussed in Chap. 5. For DQN with a target network `θ⁻`, we can\
    \ define `δ` for a transition tuple `(s_t, a_t, r_t, s_{t+1})` as follows:\n\n\
    ```\nδ = TD_target - Q̂(s_t, a_t; θ)\n  = r_t + γ * max_{a'} Q̂(s_{t+1}, a'; θ⁻)\
    \ - Q̂(s_t, a_t; θ)\n```\n\n(8.4)\n\nIf we use DQN with double Q-learning, we\
    \ can then define the TD error `δ` as:\n\n```\nδ = TD_target - Q̂(s_t, a_t; θ)\n\
    \  = r_t + γ * Q̂(s_{t+1}, argmax_{a'} Q̂(s_{t+1}, a'; θ); θ⁻) - Q̂(s_t, a_t;\
    \ θ)\n```\n\n(8.5)\n\nWhen the agent samples a mini-batch of transitions from\
    \ the replay buffer to update the parameters `θ`, it computes the TD errors for\
    \ each transition in the mini-batch and updates their priorities in the replay\
    \ buffer accordingly.\n\nHowever, using this method with experience replay for\
    \ learning raises an important issue. Some transitions in the replay buffer may\
    \ have been generated by a worse performing agent a long time ago, since DQN is\
    \ off-policy learning and we’re saving a large amount of historical transitions\
    \ in the replay buffer, resulting in larger TD errors due to the influence of\
    \ the behavior policy at that time. Meanwhile, newly generated transitions tend\
    \ to have smaller TD errors as the agent becomes better at predicting the values\
    \ for different state-action pairs. If the agent samples transitions based solely\
    \ on their priority, it may favor using the older transitions with larger TD errors,\
    \ which could lead to overfitting.\n\nTo address this issue, Schaul et al. [3]\
    \ suggest to introduce some noise into the sampling process. One approach is to\
    \ use proportional prioritization, where the probability of sampling the *i*th\
    \ transition is based on the priority of the transition, denoted by `p_i`, raised\
    \ to the power of a variable `β`. Setting `β = 0` corresponds to uniform random\
    \ sampling, where all transitions have an equal chance of being sampled. The probability\
    \ of sampling the *i*th transition is given by:\n\n```\nP(i) = p_i^β / Σ_k p_k^β\n\
    ```\n\n(8.6)\n\nHowever, since we have introduced noise into the sampling process,\
    \ we need to correct for it when updating the network parameters using the sampled\
    \ mini-batch. One way to do this is to use some method to re-weight the TD error\
    \ term. For prioritized replay, the sampling weight for the *i*th transition is\
    \ computed using the following equation:\n\n```\nw_i = ( (1/N) * (1/P(i)) )^η\n\
    ```\n\n(8.7)\n\nHere, *N* is the total number of transitions in the replay buffer,\
    \ and `η` is a variable that controls how much we want to correct the TD error\
    \ term. A value of `η = 1` means we want to fully correct it, while `η = 0` means\
    \ no correction at all. We can use some linear method to anneal `η` as the learning\
    \ progresses, such as linear annealing from 0.4 to 1.0 as used in the original\
    \ paper.\n\nAnd the sampling weight vector `w` is just a column vector with *n*\
    \ entries, where *n* is the mini-batch size.\n\n```\nw = [ ( (1/N) * (1/P(0))\
    \ )^η ]\n    [ ( (1/N) * (1/P(1)) )^η ]\n    [         ...            ]\n    [\
    \ ( (1/N) * (1/P(n)) )^η ]\n```\n\n(8.8)\n\nIn practice, normalizing the sampling\
    \ weights `w` is often necessary to achieve stable training progress. This is\
    \ achieved by dividing the weights by the maximum weight value among all samples.\
    \ This normalization is represented in Eq. (8.9):\n\n```\nw / max_i w_i\n```\n\
    \n(8.9)"
  raw: '## 8.2 Prioritized Experience Replay


    The next improvement to the standard DQN agent comes from how to sample transitions
    from the experience replay buffer. The current practice is for the DQN agent to
    sample a mini-batch of transitions randomly from the *N* most recent transitions.
    However, it’s reasonable to think that some transitions in the replay buffer are
    more valuable than others. For example, a transition could contain a state that
    the agent has never encountered before, or it could have a higher reward signal.
    In both cases, we want the agent to spend more time learning those valuable transitions
    or prioritize them over others. But how do we define a specific transition as
    more valuable than others?


    One approach to assigning priority is to use the sample frequency of a transition.
    Transitions that have been sampled less will have a higher priority compared to
    others, and those that have never been sampled will have the highest priority.
    The intuition behind this approach is that we should pay more attention to transitions
    that have not been used to update the network parameters. However, this method
    has its limitations since simply counting the usage of these transitions does
    not always reflect their importance or priority. For example, the agent may overuse
    newly generated transitions, even if it has already learned enough knowledge regarding
    similar or identical situations. We want the agent to spend less time learning
    familiar transitions and instead focus on those that are unfamiliar and more interesting.


    A systematic way to determine the priority of a transition is by using the TD
    error ![$$\delta $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq22.png)
    , as proposed by Schaul et al. [[3](#605748_1_En_8_Chapter.xhtml#CR3)]. The goal
    of training a neural network is to minimize these errors, which are typically
    squared. Transitions with larger TD errors should have higher priorities than
    those with smaller TD errors. As a reminder, the TD error is defined as the difference
    between the TD target and the current estimate, as discussed in Chap. [5](#605748_1_En_5_Chapter.xhtml).
    For DQN with a target network ![$$\boldsymbol {\theta }^-$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq23.png)
    , we can define ![$$\delta $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq24.png)
    for a transition tuple ![$$(s_t, a_t, r_t, s_{t+1})$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq25.png)
    as follows:


    ![$$\displaystyle \begin{aligned} \delta &amp; = TD_{target} - \hat{Q}(s_t, a_t;
    \boldsymbol{\theta}) \notag \\ &amp; = r_t + {\gamma} \max_{a''} \hat{Q}(s_{t+1},
    a''; \boldsymbol{\theta}^-) - \hat{Q}(s_t, a_t; \boldsymbol{\theta}) {} \end{aligned}
    $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_Equ4.png)


    (8.4)


    If we use DQN with double Q-learning, we can then define the TD error ![$$\delta
    $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq26.png) as


    ![$$\displaystyle \begin{aligned} \delta &amp; = TD_{target} - \hat{Q}(s_t, a_t;
    \boldsymbol{\theta}) \notag \\ &amp; = r_t + {\gamma} \hat{Q}\Bigl(s_{t+1}, \mathop{\text{argmax}}_{a''}\hat{Q}(s_{t+1},
    a''; \boldsymbol{\theta}); \boldsymbol{\theta}^- \Bigr) - \hat{Q}(s_t, a_t; \boldsymbol{\theta})
    \end{aligned} $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_Equ5.png)


    (8.5)


    When the agent samples a mini-batch of transitions from the replay buffer to update
    the parameters ![$$\boldsymbol {\theta }$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq27.png)
    , it computes the TD errors for each transition in the mini-batch and updates
    their priorities in the replay buffer accordingly.


    However, using this method with experience replay for learning raises an important
    issue. Some transitions in the replay buffer may have been generated by a worse
    performing agent a long time ago, since DQN is off-policy learning and we’re saving
    a large amount of historical transitions in the replay buffer, resulting in larger
    TD errors due to the influence of the behavior policy at that time. Meanwhile,
    newly generated transitions tend to have smaller TD errors as the agent becomes
    better at predicting the values for different state-action pairs. If the agent
    samples transitions based solely on their priority, it may favor using the older
    transitions with larger TD errors, which could lead to overfitting.


    To address this issue, Schaul et al. [[3](#605748_1_En_8_Chapter.xhtml#CR3)] suggest
    to introduce some noise into the sampling process. One approach is to use proportional
    prioritization, where the probability of sampling the *i*th transition is based
    on the priority of the transition, denoted by ![$$p_i$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq28.png)
    , raised to the power of a variable ![$$\beta $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq29.png)
    . Setting ![$$\beta =0$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq30.png)
    corresponds to uniform random sampling, where all transitions have an equal chance
    of being sampled. The probability of sampling the *i*th transition is given by


    ![$$\displaystyle \begin{aligned} P(i) = \frac{p_i^\beta}{\sum_k p_i^\beta} {}
    \end{aligned} $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_Equ6.png)


    (8.6)


    However, since we have introduced noise into the sampling process, we need to
    correct for it when updating the network parameters using the sampled mini-batch.
    One way to do this is to use some method to re-weight the TD error term. For prioritized
    replay, the sampling weight for the *i*th transition is computed using the following
    equation:


    ![$$\displaystyle \begin{aligned} w_i = \left( \frac{1}{N} \cdot \frac{1}{P(i)}
    \right)^\eta {} \end{aligned} $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_Equ7.png)


    (8.7)


    Here, *N* is the total number of transitions in the replay buffer, and ![$$\eta
    $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq31.png) is a variable
    that controls how much we want to correct the TD error term. A value of ![$$\eta
    =1$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq32.png) means
    we want to fully correct it, while ![$$\eta =0$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq33.png)
    means no correction at all. We can use some linear method to anneal ![$$\eta $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq34.png)
    as the learning progresses, such as linear annealing from 0.4 to 1.0 as used in
    the original paper.


    And the sampling weight vector ![$$\boldsymbol {w}$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq35.png)
    is just a column vector with *n* entries, where *n* is the mini-batch size.


    ![$$\displaystyle \begin{aligned} \boldsymbol{w} = \begin{pmatrix} \displaystyle
    \left( \frac{1}{N} \cdot \frac{1}{P(0)} \right)^{\eta} \\[1em] \displaystyle \left(
    \frac{1}{N} \cdot \frac{1}{P(1)} \right)^{\eta} \\[1em] \displaystyle \vdots \\[1em]
    \displaystyle \left( \frac{1}{N} \cdot \frac{1}{P(n)} \right)^{\eta} \\[1em] \end{pmatrix}
    {} \end{aligned} $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_Equ8.png)


    (8.8)


    In practice, normalizing the sampling weights ![$$\boldsymbol {w}$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq36.png)
    is often necessary to achieve stable training progress. This is achieved by dividing
    the weights by the maximum weight value among all samples. This normalization
    is represented in Eq. ([8.9](#605748_1_En_8_Chapter.xhtml#Equ9))


    ![$$\displaystyle \begin{aligned} \frac{\boldsymbol{w}}{\displaystyle \max_i w_i}
    {} \end{aligned} $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_Equ9.png)


    (8.9)'
  trans: "\n# 8.2 优先经验回放\n\n对标准 DQN 智能体的下一个改进来自如何从经验回放缓冲区中采样转换。当前的做法是，DQN 智能体从最近的\
    \ *N* 个转换中随机采样一个小批量的转换。然而，有理由认为回放缓冲区中的某些转换比其他转换更有价值。例如，一个转换可能包含智能体从未遇到过的状态，或者它可能具有更高的奖励信号。在这两种情况下，我们都希望智能体花更多时间学习这些有价值的转换，或者优先处理它们。但如何定义一个特定的转换比其他转换更有价值呢？\n\
    \n一种分配优先级的方法是使用转换的采样频率。采样次数较少的转换将比其他转换具有更高的优先级，而那些从未被采样过的转换将具有最高的优先级。这种方法背后的直觉是，我们应该更多地关注那些尚未用于更新网络参数的转换。然而，这种方法有其局限性，因为仅仅计算这些转换的使用次数并不总能反映它们的重要性或优先级。例如，智能体可能会过度使用新生成的转换，即使它已经学习了足够多的关于相似或相同情况的知识。我们希望智能体花更少的时间学习熟悉的转换，而将重点放在那些不熟悉且更有趣的转换上。\n\
    \n一种系统性地确定转换优先级的方法是使用 TD 误差 `δ`，如 Schaul 等人 [3] 所提出的。训练神经网络的目标是最小化这些误差，通常是平方误差。具有较大\
    \ TD 误差的转换应比具有较小 TD 误差的转换具有更高的优先级。提醒一下，如第 5 章所述，TD 误差定义为 TD 目标与当前估计值之间的差值。对于带有目标网络\
    \ `θ⁻` 的 DQN，我们可以为转换元组 `(s_t, a_t, r_t, s_{t+1})` 定义 `δ` 如下：\n\n```\nδ = TD_target\
    \ - Q̂(s_t, a_t; θ)\n  = r_t + γ * max_{a'} Q̂(s_{t+1}, a'; θ⁻) - Q̂(s_t, a_t;\
    \ θ)\n```\n\n(8.4)\n\n如果我们使用带有双重 Q 学习的 DQN，那么我们可以将 TD 误差 `δ` 定义为：\n\n```\nδ =\
    \ TD_target - Q̂(s_t, a_t; θ)\n  = r_t + γ * Q̂(s_{t+1}, argmax_{a'} Q̂(s_{t+1},\
    \ a'; θ); θ⁻) - Q̂(s_t, a_t; θ)\n```\n\n(8.5)\n\n当智能体从回放缓冲区采样一个小批量转换来更新参数 `θ`\
    \ 时，它会计算小批量中每个转换的 TD 误差，并相应地更新它们在回放缓冲区中的优先级。\n\n然而，将这种方法与经验回放结合用于学习会引发一个重要问题。回放缓冲区中的某些转换可能很久以前由一个表现较差的智能体生成，因为\
    \ DQN 是离策略学习，并且我们在回放缓冲区中保存了大量历史转换，由于当时行为策略的影响，导致这些转换的 TD 误差较大。与此同时，随着智能体在预测不同状态-动作对的值方面变得更好，新生成的转换往往具有较小的\
    \ TD 误差。如果智能体仅根据优先级采样转换，它可能会倾向于使用具有较大 TD 误差的较旧转换，这可能导致过拟合。\n\n为了解决这个问题，Schaul\
    \ 等人 [3] 建议在采样过程中引入一些噪声。一种方法是使用比例优先级，其中采样第 *i* 个转换的概率基于该转换的优先级，记为 `p_i`，并乘以一个变量\
    \ `β` 的幂次。设置 `β = 0` 对应于均匀随机采样，所有转换被采样的机会均等。采样第 *i* 个转换的概率由下式给出：\n\n```\nP(i)\
    \ = p_i^β / Σ_k p_k^β\n```\n\n(8.6)\n\n然而，由于我们在采样过程中引入了噪声，在使用采样的小批量更新网络参数时，我们需要对此进行修正。一种方法是使用某种方法对\
    \ TD 误差项进行重新加权。对于优先回放，第 *i* 个转换的采样权重使用以下公式计算：\n\n```\nw_i = ( (1/N) * (1/P(i))\
    \ )^η\n```\n\n(8.7)\n\n这里，*N* 是回放缓冲区中的总转换数，`η` 是一个控制我们想要修正 TD 误差项程度的变量。`η = 1`\
    \ 表示我们希望完全修正它，而 `η = 0` 表示完全不修正。我们可以使用某种线性方法随着学习的进行来退火 `η`，例如原始论文中使用的从 0.4 到 1.0\
    \ 的线性退火。\n\n而采样权重向量 `w` 只是一个具有 *n* 个条目的列向量，其中 *n* 是小批量大小。\n\n```\nw = [ ( (1/N)\
    \ * (1/P(0)) )^η ]\n    [ ( (1/N) * (1/P(1)) )^η ]\n    [         ...        \
    \    ]\n    [ ( (1/N) * (1/P(n)) )^η ]\n```\n\n(8.8)\n\n在实践中，通常需要对采样权重 `w` 进行归一化，以实现稳定的训练过程。这是通过将权重除以所有样本中的最大权重值来实现的。这种归一化在公式\
    \ (8.9) 中表示：\n\n```\nw / max_i w_i\n```\n\n(8.9)\n"
- fmt: 'When a new transition is generated, we need to determine its priority. While
    we could compute the priority using the same approach as before, it’s more common
    to assign a predefined priority, such as `1.0`, to every new transition. Alternatively,
    we could assign the maximum priority the agent has encountered so far during training.
    We do this because we are still biased toward newly generated transitions and
    want the agent to use them for training. However, if a transition has a low priority
    (i.e., TD error), it will be sampled less frequently in the future. Additionally,
    assigning a maximum priority to all new transitions can save computational resources
    since agents typically generate millions of transitions.


    We now introduce the proportional prioritization for the DQN with double Q-learning
    algorithm, originally developed by Schaul et al. [[3](#605748_1_En_8_Chapter.xhtml#CR3)].
    This algorithm builds upon the DQN with double Q-learning algorithm that we introduced
    earlier in this chapter. The main difference is that when the agent stores a single
    transition in the replay buffer, it assigns a priority value to it. By default,
    this priority value is set to the maximum value of the priorities seen so far.


    Figure [8.2](#605748_1_En_8_Chapter.xhtml#Fig2) shows the performance of the prioritized
    double DQN and the standard DQN agent on the Atari River Raid game. The results
    display the average episode return (total undiscounted rewards) and a 95% confidence
    interval. To evaluate the agent’s performance, we ran 200,000 evaluation steps
    on a separate testing environment with an `ε`-greedy policy and a fixed exploration
    epsilon (`ε = 0.05`) at the end of each training iteration, which consisted of
    250,000 training steps or 1 million frames, where no reward clipping or soft termination
    on loss of life is applied to the evaluation environment. The results were averaged
    over five independent runs and smoothed using a moving average with a window size
    of five.


