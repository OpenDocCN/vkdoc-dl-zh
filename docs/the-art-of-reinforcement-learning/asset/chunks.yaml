  trans: '

    # 7.2 训练神经网络


    训练神经网络是指教导神经网络学习输入数据与输出数据之间映射关系的过程。在训练过程中，神经网络会接收一组输入-输出对，并通过调整其参数（如权重和偏置）来最小化预测输出与实际目标之间的差异，例如在监督学习中的情况。


    使用随机梯度下降法通过样本梯度来更新神经网络参数的基本思路仍然适用。然而，挑战在于如何计算神经网络中不同权重和偏置对应的梯度。由于神经网络通常包含多个层，且每层可能使用不同的激活函数，因此各层权重和偏置的导数也会有所不同。这意味着我们不能像上一章介绍的线性方法那样，使用单一的更新规则来更新这些不同层的参数。


    虽然仍然可以手动推导每一层的方程，但对于不熟悉微积分的人来说，这种方法颇具挑战性。此外，深度神经网络往往有数十层甚至数百层，使得手动推导变得不切实际。如果对神经网络架构进行更改（例如添加或删除层、更换激活函数），大部分工作都需要重新进行。


    幸运的是，反向传播算法为神经网络中梯度计算的挑战提供了一种简单而优雅的解决方案。该算法利用计算图来表示复杂的可微函数，然后运用微积分中的链式法则来计算图中每个节点的梯度。计算图中的每个节点仅执行非常基本的运算，例如加法、乘法、除法，或像激活函数这样的组合运算。由于我们已经知道这些基本运算的导数，因此推导出这些节点中变量的导数相对容易。


    图 7.9 展示了一个全连接层计算图的简化版本。在此图中，每个节点执行特定的计算，例如两个变量之间的点积、加法，或像激活函数 `σ` 这样的组合运算。请注意，节点
    `z₁` 表示输入数据 `x` 与该线性层中所有单元的每个权重向量 `w` 之间的点积。节点 `z₂` 类似，但将来自所有单元的偏置项加到了 `z₁` 的结果上。


    使用反向传播算法不仅简化了梯度的计算，还使神经网络更加灵活。如果对神经网络架构进行更改，该算法可以轻松调整以适应这些变化，而无需完全重做工作。


    在我们使用目标函数计算神经网络预测结果 `y` 与真实目标 `y*` 之间的损失后，就可以利用反向传播算法计算网络参数的梯度，然后使用这些梯度来更新网络参数。反向传播算法在计算图中反向工作，计算每个节点处局部参数对应的梯度（有时也称为局部梯度），然后将这些梯度传播回上一个节点。它利用微积分中的链式法则来实现这一点，从而能够计算局部参数的梯度以及来自前一个节点的上游梯度。这不仅适用于全连接神经网络，也适用于任何其他类型的神经网络，包括卷积神经网络和循环神经网络。


    ![](img/605748_1_En_7_Fig9_HTML.png)


    一个包含 6 个节点 `x`、点积 `z₁`、加法 `z₂`、`σ`、`w` 和 `b` 的示意图。


    **图 7.9** 全连接层计算图的简化示例


    让我们看一个非常简单的全连接神经网络，它包含一个隐藏层和一个输出层。我们对隐藏层使用 sigmoid 激活函数，对输出层不使用激活函数。我们使用平方误差损失作为目标函数，该函数衡量预测值与真实目标值之间的差异。图
    7.10 展示了反向传播如何为每一层计算梯度。在通过神经网络前向传播计算出预测值 `y` 后，我们使用真实目标 `y*` 来计算损失。然后反向传播算法开始反向工作，从图中最后一个节点
    `l`（即损失输出的位置）开始。对于每个节点，它利用上游梯度和局部梯度来计算该特定计算节点的梯度，直到到达第一个隐藏层。在实践中，我们只关心这些不同层的权重
    `W` 和偏置 `b` 对应的梯度。


    在知道神经网络不同层的权重和偏置对应的梯度后，我们就可以开始使用随机梯度下降算法来更新参数。


    随着神经网络层数的增加，跟踪每一层的权重和偏置变得困难。因此，我们通常使用 `θ` 来表示神经网络的所有参数，其中 `θ` 是一个包含单个神经网络所有参数（权重和偏置）的向量。总而言之，训练神经网络通常包括以下主要步骤：


    - 将输入数据 `x` 馈送到由 `θ` 参数化的神经网络中，得到预测值 `y`。

    - 使用目标函数，根据上一步得到的 `y` 和真实目标 `y*` 计算损失。

    - 使用反向传播算法，根据上一步的损失计算 `θ` 的梯度。

    '
- fmt: '*   使用随机梯度下降算法，根据上一步的梯度更新`θ`。


    幸运的是，现代深度学习框架（如`PyTorch`和`TensorFlow`）内置了自动微分功能，可以自动为我们执行反向传播。这些工具还内置了优化器，可以根据参数的梯度更新神经网络的参数。自动微分和反向传播帮助我们计算神经网络参数的梯度。优化器是使用梯度来更新网络参数的算法。因此，我们只需关注神经网络的架构并定义目标函数（损失函数），这些工具将自动为我们处理其余工作。


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig10_HTML.png)


    该图概述了神经网络中的前向和反向传播过程，包括训练期间梯度的计算和参数的更新。


    **图 7.10** 反向传播如何为一个简单的全连接神经网络计算梯度的示例，该网络包含一个隐藏层和一个输出层，其中隐藏层使用`sigmoid`激活函数，输出层不使用激活函数。


    在下面的示例中，我们演示如何使用`PyTorch`深度学习框架训练一个神经网络。首先，我们创建一个神经网络实例和一个优化器（本例中为随机梯度下降，即`SGD`），用于在训练期间更新网络参数。我们将网络参数和学习率作为参数传递给优化器，以便它知道要更新哪些参数以及更新步长的大小。


    在训练期间，我们将训练集中的输入数据输入网络，计算预测输出。然后，我们计算损失，这是衡量预测输出与训练集中真实目标值之间差距的指标。在本例中，我们使用均方误差（`MSE`）损失作为目标函数。


    计算损失后，我们使用反向传播自动计算网络不同参数的梯度。这些梯度告诉我们每个参数对损失的贡献程度，我们可以利用它们执行随机梯度下降步骤来更新网络参数。我们对每一批训练数据重复此过程，直到网络学会准确预测目标值。


    以下是带有额外注释的代码，解释了每一行的作用：


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Figaaa_HTML.gif) 一种基于神经网络的`Q`学习算法，使用ε-贪婪动作选择、更新`Q`网络，并在`K`步内衰减ε，以逼近最优状态-动作值函数`Q`。


    值得注意的是，本示例中使用的一些术语和概念对于`PyTorch`或深度学习的初学者来说可能不熟悉。例如，神经网络是一系列相互连接的节点，可以学习将输入数据映射到输出数据；优化器是一种更新网络参数以最小化损失函数的算法。反向传播是一种计算损失函数相对于网络参数梯度的方法，梯度告诉我们每个参数对损失的贡献程度。通过理解这些概念，我们可以创建和训练神经网络来解决广泛的问题。


    虽然框架和工具使训练深度神经网络变得更加容易，但在训练深度神经网络时也可能出现其他挑战。其中一个挑战是梯度消失或爆炸问题。当靠近输入层（如第一个隐藏层）的梯度变得过小或过大时，就会出现此问题。这个问题通常出现在非常深的神经网络中。为了解决这一挑战，研究人员提出了使用跳跃连接架构（如`He`等人提出的`ResNet`架构[[1]](#605748_1_En_7_Chapter.xhtml#CR1)）来构建神经网络。这些架构使我们能够训练具有数百层的深度神经网络，同时避免梯度消失问题。


    另一个挑战是过拟合问题，当神经网络中的参数数量远大于训练数据数量时，就会发生这种情况。这可能导致神经网络过于复杂，并且过于紧密地拟合训练数据，从而导致在新数据上表现不佳。正则化方法，如`L2`和`L1`正则化，以及使用`Dropout`，可用于解决过拟合问题。`L2`和`L1`正则化向损失函数添加一个惩罚项，通过减小权重的幅度来帮助防止模型过拟合。而`Dropout`则在训练期间随机丢弃一定比例的神经元，有助于防止网络过度依赖任何一个或一组神经元。


    在训练深度神经网络的背景下，权重初始化起着至关重要的作用。典型的初始化方法包括随机初始化、`Xavier`初始化[[2]](#605748_1_En_7_Chapter.xhtml#CR2)和`He`初始化[[3]](#605748_1_En_7_Chapter.xhtml#CR3)。随机初始化缺乏指导，而`Xavier`初始化考虑了层连接，`He`初始化则针对`ReLU`激活函数进行了调整。初始化方法的选择取决于网络架构和所使用的特定激活函数。不良的初始化会阻碍收敛并导致次优解，而适当的初始化则会加速学习并提高性能。


    虽然深度学习框架使训练神经网络变得更加容易，但用户必须意识到使用这些模型时可能出现的挑战。通过理解这些问题，读者可以更好地评估其模型的性能，并就如何应对这些挑战做出更明智的决策。


    要更详细地了解这些主题，读者可以探索许多在线资源，包括学术论文、教程和讨论论坛。通过将理论与实践相结合，我们可以更深入地理解如何训练神经网络及其背后的数学原理。'
  raw: '*   Use the stochastic gradient descent algorithm to update ![$$\boldsymbol
    {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq62.png)
    with respect to the gradients from the preceding step.


    Luckily, modern deep learning frameworks, like PyTorch and TensorFlow, have built-in
    automatic differentiation capabilities that can perform backpropagation for us
    automatically. These tools also have built-in optimizers that can update the parameters
    of a neural network with respect to the gradients of these parameters. Automatic
    differentiation and backpropagation help us to compute the gradients with respect
    to the parameters of a neural network. Optimizers are algorithms that use the
    gradients to update the parameters of the network. So we only need to focus on
    the architecture of the neural network and define an objective function (loss
    function), and these tools will handle the rest of the work for us automatically.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig10_HTML.png)


    An illustration outlines the forward and backward passes in a neural network,
    including calculations of gradients and updates to parameters during training.


    Fig. 7.10


    Example of how backpropagation computes gradients for a simple fully connected
    neural network with one hidden layer and one output layer, where we use a sigmoid
    activation function for the hidden layer and no activation function for the output
    layer


    In the following example, we demonstrate how to use the PyTorch deep learning
    framework to train a neural network. First, we create an instance of a neural
    network and an optimizer (in this case, stochastic gradient descent, or SGD) for
    updating the network parameters during training. We pass in the network parameters
    and a learning rate as arguments to the optimizer, so it knows which parameters
    to update and how big of an update step to take.


    During training, we feed input data from the training set into the network to
    compute a predicted output. We then compute the loss, which is a measure of how
    far off the predicted output is from the true target value in the training set.
    In this example, we use mean squared error (MSE) loss as our objective function.


    Once we’ve computed the loss, we use backpropagation to automatically compute
    the gradients for the different parameters of the network. These gradients tell
    us how much each parameter contributes to the loss, and we can use them to perform
    a stochastic gradient descent step to update the network parameters. We repeat
    this process for each batch of training data until the network has learned to
    accurately predict the target values.


    Here is the code with additional comments that explain what each line does:


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Figaaa_HTML.gif) An algorithm for
    Q-learning with neural networks uses epsilon-greedy action selection, updating
    the Q-network, and decaying epsilon over K steps to approximate the optimal state-action
    value function Q.


    It’s worth noting that some of the terms and concepts used in this example may
    be unfamiliar to those who are new to PyTorch or deep learning. For example, a
    neural network is a series of interconnected nodes that can learn to map input
    data to output data, and an optimizer is an algorithm that updates the network’s
    parameters to minimize the loss function. Backpropagation is a method for computing
    the gradients of the loss function with respect to the network’s parameters, and
    gradients tell us how much each parameter contributes to the loss. By understanding
    these concepts, we can create and train neural networks to solve a wide range
    of problems.


    While the framework and tools have made training deep neural networks easier,
    there are also other challenges that can arise when training deep neural networks.
    One such challenge is the problem of gradient vanishing or explosion. This issue
    occurs when the gradients become too small or too large for layers close to the
    input layer, such as the first hidden layer. This problem often arises with very
    deep neural networks. To address this challenge, researchers have proposed solutions
    such as using skip-connection architectures, like ResNet architecture proposed
    by He et al. [[1](#605748_1_En_7_Chapter.xhtml#CR1)], to build the neural network.
    These architectures allow us to train deep neural networks with hundreds of layers,
    while avoiding the gradient vanishing problem.


    Another challenge is the problem of overfitting, which occurs when the number
    of parameters in a neural network is much larger than the number of training data.
    This can lead to a neural network that is overly complex and has learned to fit
    the training data too closely, resulting in poor performance on new, unseen data.
    Regularization methods, such as L2 and L1 regularization, as well as using dropout,
    can be used to address the overfitting issue. L2 and L1 regularization add a penalty
    term to the loss function, which helps to prevent the model from overfitting by
    reducing the magnitude of the weights. Dropout, on the other hand, randomly drops
    out a percentage of neurons during training, which helps to prevent the network
    from relying too heavily on any one neuron or set of neurons.


    In the context of training deep neural networks, weight initialization plays a
    crucial role. Typical initialization methods include random initialization, Xavier
    initialization [[2](#605748_1_En_7_Chapter.xhtml#CR2)], and He initialization
    [[3](#605748_1_En_7_Chapter.xhtml#CR3)]. Random initialization lacks guidance,
    while Xavier initialization takes into account layer connections, and He initialization
    adjusts for ReLU activation. The choice of initialization method depends on the
    network architecture and the specific activation functions being used. Poor initialization
    can hinder convergence and lead to suboptimal solutions, whereas appropriate initialization
    accelerates learning and improves performance.


    While deep learning frameworks have made it easier to train neural networks, it
    is important for users to be aware of the challenges that can arise when working
    with these models. By understanding these issues, readers can better evaluate
    the performance of their models and make more informed decisions about how to
    address these challenges.


    To learn more about these topics in greater detail, readers may want to explore
    the many resources available online, including academic papers, tutorials, and
    discussion forums. By combining theory with hands-on practice, we can develop
    a deeper understanding of how to train neural networks and its underlying mathematical
    principles.'
