- fmt: "### Transition Matrix for Markov Chain\n\nThe transition matrix `P` is a convenient\
    \ way to represent the dynamics function (or transition model) of a Markov chain.\
    \ It lists all the possible state transitions in a single matrix, where each row\
    \ represents a current state `s`, and each column represents a successor state\
    \ `s'`. The transition probability for transitioning from state `s` to state `s'`\
    \ is denoted by `P(s'|s)`. Since we are talking about probability, the sum of\
    \ each row is always equal to 1.0. Here, we list the transition matrix for our\
    \ service dog Markov chain:\n\n![](images/605748_1_En_2_Chapter/605748_1_En_2_Figa_HTML.png)\n\
    \nA transition matrix for service dog Markov chain. The columns and rows for room\
    \ 1, room 2, room 3, outside, found item, and end indicate states.\n\n![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig4_HTML.png)\n\
    \nA transition diagram for service dog Markov chain. Room 1 leads to room 2 followed\
    \ by room 3 and found item with arrows for `p` equals 0.8, `p` equals 0.4, and\
    \ `p` equals 0.8. Outside connects to room 2 via `p` equals 0.4 and 0.2. Found\
    \ item leads to end via `p` equals 1.0.\n\n**Fig. 2.4** Service dog Markov chain\n\
    \nWith access to the dynamics function of the environment, we can sample some\
    \ state transition sequences `S0, S1, S2, ...` from the environment. For example:\n\
    \n- Episode 1: (Room 1, Room 2, Room 3, Found item, End)\n- Episode 2: (Room 3,\
    \ Found item, End)\n- Episode 3: (Room 2, Outside, Room 2, Room 3, Found item,\
    \ End)\n- Episode 4: (Outside, Outside, Outside, …)\n\nWe now have a basic understanding\
    \ about the state transition in the environment; let’s move on to add rewards\
    \ into the process.\n\n## 2.4 Markov Reward Process\n\nAs we’ve said before, the\
    \ goal of a reinforcement learning agent is to maximize rewards, so the next natural\
    \ step is to add rewards to the Markov chain process. The Markov reward process\
    \ (MRP) is an extension of the Markov chain, where rewards are added to the process.\
    \ In a Markov reward process, the agent not only observes state transitions but\
    \ also receives a reward signal along the way. Note, there are still no actions\
    \ involved in the MRPs. We can define the Markov reward process as a tuple `(S,\
    \ P, R)`, where:\n\n- `S` is a finite set of states called the state space.\n\
    - `P` is the dynamics function (or transition model) of the environment, where\
    \ `P(s'|s) = P[S_{t+1}=s' | S_t=s]` specifies the probability of environment transition\
    \ into successor state `s'` when in current state `s`.\n- `R` is a reward function\
    \ of the environment. `R(s) = E[R_t | S_t=s]` is the reward signal provided by\
    \ the environment when the agent is in state `s`.\n\nAs shown in Fig. 2.5, we\
    \ added a reward signal to each state in our service dog example. As we’ve talked\
    \ briefly in Chap. 1, we want the reward signals to align with our desired goal,\
    \ which is to find the object, so we decided to use the highest reward signal\
    \ for the state *Found item*. For the state *Outside*, the reward signal is +1,\
    \ because being outside playing might be more enjoyable for the agent compared\
    \ to wandering between different rooms.\n\n![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig5_HTML.png)\n\
    \nA transition diagram for service dog MRP with reward signals. Room 1 leads to\
    \ room 2 followed by room 3 with `r` equals -1, and found item with `r` equals\
    \ +10, via arrows labeled `p` equals 0.8, `p` equals 0.4, and `p` equals 0.8.\
    \ Outside has `r` equals +1 and end has `r` equals 0.\n\n**Fig. 2.5** Service\
    \ dog MRP\n\nWith reward signals, we can compute the total rewards the agent could\
    \ get for these different sample sequences, where the total rewards are calculated\
    \ for the entire sequence:\n\n- Episode 1: (Room 1, Room 2, Room 3, Found item,\
    \ End)\n  - **Total rewards** `= -1 - 1 - 1 + 10 + 0 = 7.0`\n- Episode 2: (Room\
    \ 3, Found item, End)\n  - **Total rewards** `= -1 + 10 = 9.0`\n- Episode 3: (Room\
    \ 2, Outside, Room 2, Room 3, Found item, End)\n  - **Total rewards** `= -1 +\
    \ 1 - 1 - 1 + 10 + 0 = 8.0`\n- Episode 4: (Outside, Outside, Outside, …)\n  -\
    \ **Total rewards** `= 1 + 1 + ... = ∞`"
