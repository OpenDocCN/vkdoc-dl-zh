  trans: '

    ### 雅达利


    雅达利 2600 是雅达利互动公司在 20 世纪 70 年代开发的一款家用电子游戏机。它拥有一系列标志性的电子游戏。这些游戏，如`Pong`、`Breakout`、`Space
    Invaders`和`Pac-Man`，已成为早期电子游戏文化的经典范例。在这个平台上，玩家可以使用摇杆控制器与这些经典游戏进行互动。


    雅达利游戏的突破性进展发生在 2015 年，当时 DeepMind 的 Mnih 等人[1]开发了一个名为`DQN`的人工智能代理，用于玩一系列雅达利电子游戏，其中一些游戏的表现甚至超越了人类。


    `DQN`代理之所以影响深远，在于其训练玩游戏的方式。与人类玩家类似，该代理仅将屏幕的原始像素图像作为输入，如图 1.1 所示，它必须自行摸索游戏规则，并决定在游戏过程中如何行动以最大化得分。该代理没有获得任何人类专家知识，例如预定义的规则或人类玩家的游戏样本。


    `DQN`代理是一种强化学习代理，它通过与环境的交互并接收奖励信号来学习。在雅达利游戏的案例中，`DQN`代理每执行一个动作都会获得一个分数。


    Mnih 等人[1]在 57 款雅达利电子游戏上训练并测试了他们的`DQN`代理。他们为每款雅达利游戏训练一个`DQN`代理，每个代理只玩它被训练的那款游戏；训练过程涉及数百万帧画面。如
    Mnih 等人[1]所示，`DQN`代理能够在一半的游戏（57 款中的 30 款）中达到或超越人类玩家的水平。这意味着该代理能够学习并制定出比人类玩家所能想到的更好的策略。


    自那时起，各种组织和研究人员对`DQN`代理进行了改进，融入了多项新技术。雅达利电子游戏已成为评估强化学习代理和算法性能最常用的测试平台之一。街机学习环境（`ALE`）[2]提供了数百种雅达利
    2600 游戏环境的接口，研究人员普遍使用它来训练和测试强化学习代理。


    总而言之，雅达利电子游戏已成为早期电子游戏文化的经典范例，而雅达利 2600 平台为强化学习领域的代理训练提供了丰富的环境。DeepMind 的`DQN`代理在
    57 款雅达利电子游戏上训练和测试所取得的突破，展示了人工智能代理通过与经典游戏的试错互动来学习和决策的能力。这一突破推动了强化学习领域的诸多改进和进步，雅达利游戏也已成为评估强化学习算法性能的热门测试平台。


    ### 围棋


    围棋是一种古老的中国策略棋盘游戏，由两名玩家轮流在 19x19 的棋盘上落子，目标是围出比对手更多的领地。每位玩家持有一组黑色或白色棋子，游戏开始时棋盘为空。玩家轮流在棋盘上放置棋子，执黑者先行。


    ![](img/605748_1_En_1_Fig2_HTML.png)


    围棋游戏示意图展示了一个 19x19 的网格，行从底部起标记为 1 到 19，列标记为 A 到 T。网格单元格中填充着深色和浅色的圆圈，上面标有 3 位、2
    位或 1 位数字。深色圆圈代表一方，浅色圆圈代表另一方。


    图 1.2


    依田纪基（黑）对阵铁谷清成（白），2018 年第 66 届 NHK 杯围棋赛。白棋以 0.5 目获胜。棋谱来自 CWI [4]


    棋子放置在棋盘上线条的交点上，而非方格内。一旦棋子落在棋盘上，就不能移动，但如果它被对手的棋子完全包围，则可以被吃掉。被包围并吃掉的棋子将从棋盘上移除。


    游戏继续进行，直到双方都选择停手，此时计算棋盘上的领地。一方的领地是指被其棋子完全包围的空交叉点集合，加上任何被吃掉的棋子。领地较大的一方获胜。以图 1.2
    所示的最终棋盘局面为例，白棋以 0.5 目获胜。


    尽管游戏规则相对简单，但游戏本身极其复杂。例如，与国际象棋相比，围棋中合法的棋盘局面数量极其庞大。根据 Tromp 和 Farnebäck [3]的研究，围棋中合法棋盘局面的数量约为`2.1
    × 10¹⁷⁰`，这远远超过了宇宙中原子的数量。


    这种复杂性对试图下围棋的人工智能（AI）代理构成了重大挑战。2016 年 3 月，由 DeepMind 的 Silver 等人[5]开发的人工智能代理`AlphaGo`创造了历史，在围棋比赛中以
    4 比 1 的比分击败了传奇韩国棋手李世石。李世石是 18 个世界冠军头衔的获得者，被认为是过去十年中最伟大的围棋选手之一。`AlphaGo`的胜利意义非凡，因为它结合了深度神经网络、树搜索算法以及强化学习技术。


    `AlphaGo`的训练结合了基于人类专家棋局的监督学习和基于自我对弈棋局的强化学习。这种训练使该代理能够开发出创造性和创新性的着法，令李世石和围棋界都感到惊讶。


    `AlphaGo`的成功重新激发了人们对强化学习领域的兴趣，并展示了人工智能解决曾被视作人类智能专属领域的复杂问题的潜力。一年后，DeepMind 的 Silver
    等人[6]推出了一个更强大的新代理——`AlphaGo Zero`。`AlphaGo Zero`完全通过纯自我对弈进行训练，训练过程中未使用任何人类专家的着法，达到了比之前的`AlphaGo`代理更高的棋艺水平。他们还进行了其他改进，例如简化了训练流程。


    为了评估新代理的性能，他们让其与 2016 年击败世界冠军李世石的同一个`AlphaGo`代理对弈，结果新的`AlphaGo Zero`以 100 比 0
    的比分击败了`AlphaGo`。

    '
- fmt: '# 1.1 AlphaZero: A General Reinforcement Learning Algorithm


    In the following year, Schrittwieser et al. [[7](#605748_1_En_1_Chapter.xhtml#CR7)]
    from DeepMind generalized the `AlphaGo Zero` agent to play not only Go but also
    other board games like Chess and Shogi (Japanese chess), and they called this
    generalized agent `AlphaZero`. `AlphaZero` is a more general reinforcement learning
    algorithm that can be applied to a variety of board games, not just Go, Chess,
    and Shogi.


    Reinforcement learning is a type of machine learning in which an agent learns
    to make decisions based on the feedback it receives from its environment. Both
    `DQN` and `AlphaGo` (and its successor) agents use this technique, and their achievements
    are very impressive. Although these agents are designed to play games, this does
    not mean that reinforcement learning is only capable of playing games. In fact,
    there are many more challenging problems in the real world, such as navigating
    a robot, driving an autonomous car, and automating web advertising. Games are
    relatively easy to simulate and implement compared to these other real-world problems,
    but reinforcement learning has the potential to be applied to a wide range of
    complex challenges beyond game playing.


    ## 1.2 What Is Reinforcement Learning


    In computer science, reinforcement learning is a subfield of machine learning
    that focuses on learning how to act in a world or an environment. The goal of
    reinforcement learning is for an agent to learn from interacting with the environment
    in order to make a sequence of decisions that maximize accumulated reward in the
    long run. This process is known as *goal-directed learning*.


    Unlike other machine learning approaches like supervised learning, reinforcement
    learning does not rely on labeled data to learn from. Instead, the agent must
    learn through trial and error, without being directly told the rules of the environment
    or what action to take at any given moment. This makes reinforcement learning
    a powerful tool for modeling and solving real-world problems where the rules and
    optimal actions may not be known or easily determined.


    Reinforcement learning is not limited to computer science, however. Similar ideas
    are studied in other fields under different names, such as operations research
    and optimal control in engineering. While the specific methods and details may
    vary, the underlying principles of goal-directed learning and decision-making
    are the same.


    Examples of reinforcement learning in the real world are all around us. Human
    beings, for example, are naturally good at learning from interacting with the
    world around us. From learning to walk as a baby to learning to speak our native
    language to learning to drive a car, we learn through trial and error and by receiving
    feedback from the environment. Similarly, animals can also be trained to perform
    a variety of tasks through a process similar to reinforcement learning. For instance,
    service dogs can be trained to assist individuals in wheelchairs, while police
    dogs can be trained to help search for missing people.


    One vivid example that illustrates the idea of reinforcement learning is a video
    of a dog with a big stick in its mouth trying to cross a narrow bridge.^([¹](#fn1))
    The video shows the dog attempting to pass the bridge, but failing multiple times.
    However, after some trial and error, the dog eventually discovers that by tilting
    its head, it can pass the bridge with its favorite stick. This simple example
    demonstrates the power of reinforcement learning in solving complex problems by
    learning from the environment through trial and error.


    ## 1.3 Agent-Environment in Reinforcement Learning


    Reinforcement learning is a type of machine learning that focuses on how an agent
    can learn to make optimal decisions by interacting with an environment. The agent-environment
    loop is the core of reinforcement learning, as shown in Fig. [1.3](#605748_1_En_1_Chapter.xhtml#Fig3).
    In this loop, the agent observes the state of the environment and a reward signal,
    takes an action, and receives a new state and reward signal from the environment.
    This process continues iteratively, with the agent learning from the rewards it
    receives and adjusting its actions to maximize future rewards.


    ### Environment


    The environment is the world in which the agent operates. It can be a physical
    system, such as a robot navigating a maze, or a virtual environment, such as a
    game or a simulation. The environment provides the agent with two pieces of information:
    the state of the environment and a reward signal. The state describes the relevant
    information about the environment that the agent needs to make a decision, such
    as the position of the robot or the cards in a poker game. The reward signal is
    a scalar value that indicates how well the agent is doing in its task. The agent’s
    objective is to maximize its cumulative reward over time.


    ![](images/605748_1_En_1_Chapter/605748_1_En_1_Fig3_HTML.png)


    A 2-part flowchart. The cyclic chart at the top flows through an agent, action,
    environment, observation, and reward. The flowchart on the bottom displays four
    distinct panels of Atari’s Breakout game, each pointing to the other via action.


    Fig. 1.3


    Top: Agent-environment in reinforcement learning in a loop. Bottom: The loop unrolled
    by time


    The environment has its own set of rules, which determine how the state and reward
    signal change based on the agent’s actions. These rules are often called the dynamics
    of the environment. In many cases, the agent does not have access to the underlying
    dynamics of the environment and must learn them through trial and error. This
    is similar to how we humans interact with the physical world every day, normally
    we have a pretty good sense of what’s going on around us, but it’s difficult to
    fully understand the dynamics of the universe.


    Game environments are a popular choice for reinforcement learning because they
    provide a clear objective and well-defined rules. For example, a reinforcement
    learning agent could learn to play the game of Pong by observing the screen and
    receiving a reward signal based on whether it wins or loses the game.


    In a robotic environment, the agent is a robot that must learn to navigate a physical
    space or perform a task. For example, a reinforcement learning agent could learn
    to navigate a maze by using sensors to detect its surroundings and receiving a
    reward signal based on how quickly it reaches the end of the maze.'
