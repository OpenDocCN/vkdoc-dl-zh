- fmt: '### Atari


    The Atari 2600 is a home video game console developed by Atari Interactive, Inc.
    in the 1970s. It features a collection of iconic video games. These games, such
    as `Pong`, `Breakout`, `Space Invaders`, and `Pac-Man`, have become classic examples
    of early video gaming culture. In this platform, players can interact with these
    classic games using a joystick controller.


    The breakthrough in Atari games came in 2015 when Mnih et al. [[1](#605748_1_En_1_Chapter.xhtml#CR1)]
    from DeepMind developed an AI agent called `DQN` to play a list of Atari video
    games, some even better than humans.


    What makes the `DQN` agent so influential is how it was trained to play the game.
    Similar to a human player, the agent was only given the raw pixel image of the
    screen as inputs, as illustrated in Fig. [1.1](#605748_1_En_1_Chapter.xhtml#Fig1),
    and it has to figure out the rules of the game all by itself and decide what to
    do during the game to maximize the score. No human expert knowledge, such as predefined
    rules or sample games of human play, was given to the agent.


    The `DQN` agent is a type of reinforcement learning agent that learns by interacting
    with an environment and receiving a reward signal. In the case of Atari games,
    the `DQN` agent receives a score for each action it takes.


    Mnih et al. [[1](#605748_1_En_1_Chapter.xhtml#CR1)] trained and tested their `DQN`
    agents on 57 Atari video games. They trained one `DQN` agent for one Atari game,
    with each agent playing only the game it was trained on; the training was over
    millions of frames. The `DQN` agent can play half of the games (30 of 57 games)
    at or better than a human player, as shown by Mnih et al. [[1](#605748_1_En_1_Chapter.xhtml#CR1)].
    This means that the agent was able to learn and develop strategies that were better
    than what a human player could come up with.


    Since then, various organizations and researchers have made improvements to the
    `DQN` agent, incorporating several new techniques. The Atari video games have
    become one of the most used test beds for evaluating the performance of reinforcement
    learning agents and algorithms. The Arcade Learning Environment (`ALE`) [[2](#605748_1_En_1_Chapter.xhtml#CR2)],
    which provides an interface to hundreds of Atari 2600 game environments, is commonly
    used by researchers for training and testing reinforcement learning agents.


    In summary, the Atari video games have become a classic example of early video
    gaming culture, and the Atari 2600 platform provides a rich environment for training
    agents in the field of reinforcement learning. The breakthrough of DeepMind’s
    `DQN` agent, trained and tested on 57 Atari video games, demonstrated the capability
    of an AI agent to learn and make decisions through trial-and-error interactions
    with classic games. This breakthrough has spurred many improvements and advancements
    in the field of reinforcement learning, and the Atari games have become a popular
    test bed for evaluating the performance of reinforcement learning algorithms.


    ### Go


    Go is an ancient Chinese strategy board game played by two players, who take turns
    laying pieces of stones on a 19x19 board with the goal of surrounding more territory
    than the opponent. Each player has a set of black or white stones, and the game
    begins with an empty board. Players alternate placing stones on the board, with
    the black player going first.


    ![](images/605748_1_En_1_Chapter/605748_1_En_1_Fig2_HTML.png)


    An illustration of the Go game displays a 19-cross-19 grid with the rows labeled
    1 to 19 from the bottom and the columns labeled A to T. The grid cells are filled
    with dark and bright circles labeled with either 3, 2, or 1-digit numbers. The
    dark circle represents a team, and the bright circle represents the other team.


    Fig. 1.2


    Yoda Norimoto (black) vs. Kiyonari Tetsuya (white), Go game from the 66th NHK
    Cup, 2018. White won by 0.5 points. Game record from CWI [[4](#605748_1_En_1_Chapter.xhtml#CR4)]


    The stones are placed on the intersections of the lines on the board, rather than
    in the squares. Once a stone is placed on the board, it cannot be moved, but it
    can be captured by the opponent if it is completely surrounded by their stones.
    Stones that are surrounded and captured are removed from the board.


    The game continues until both players pass, at which point the territory on the
    board is counted. A player’s territory is the set of empty intersections that
    are completely surrounded by their stones, plus any captured stones. The player
    with the larger territory wins the game. In the case of the final board position
    shown in Fig. [1.2](#605748_1_En_1_Chapter.xhtml#Fig2), the white won by 0.5 points.


    Although the rules of the game are relatively simple, the game is extremely complex.
    For instance, the number of legal board positions in Go is enormously large compared
    to Chess. According to research by Tromp and Farnebäck [[3](#605748_1_En_1_Chapter.xhtml#CR3)],
    the number of legal board positions in Go is approximately `2.1 × 10^170`, which
    is vastly greater than the number of atoms in the universe.


    This complexity presents a significant challenge for artificial intelligence (AI)
    agents that attempt to play Go. In March 2016, an AI agent called `AlphaGo` developed
    by Silver et al. [[5](#605748_1_En_1_Chapter.xhtml#CR5)] from DeepMind made history
    by beating the legendary Korean player Lee Sedol with a score of 4-1 in Go. Lee
    Sedol is a winner of 18 world titles and is considered one of the greatest Go
    player of the past decade. `AlphaGo`’s victory was remarkable because it used
    a combination of deep neural networks and tree search algorithms, as well as the
    technique of reinforcement learning.


    `AlphaGo` was trained using a combination of supervised learning from human expert
    games and reinforcement learning from games of self-play. This training enabled
    the agent to develop creative and innovative moves that surprised both Lee Sedol
    and the Go community.


    The success of `AlphaGo` has sparked renewed interest in the field of reinforcement
    learning and has demonstrated the potential for AI to solve complex problems that
    were once thought to be the exclusive domain of human intelligence. One year later,
    Silver et al. [[6](#605748_1_En_1_Chapter.xhtml#CR6)] from DeepMind introduced
    a new and more powerful agent, `AlphaGo Zero`. `AlphaGo Zero` was trained using
    pure self-play, without any human expert moves in its training, achieving a higher
    level of play than the previous `AlphaGo` agent. They also made other improvements
    like simplifying the training processes.


    To evaluate the performance of the new agent, they set it to play games against
    the exact same `AlphaGo` agent that beat the world champion Lee Sedol in 2016,
    and this time the new `AlphaGo Zero` beats `AlphaGo` with score 100-0.'
