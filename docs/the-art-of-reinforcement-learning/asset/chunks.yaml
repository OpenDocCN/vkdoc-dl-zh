  trans: '

    总之，蒙特卡洛策略评估是一种无模型方法，它通过收集大量样本回合并计算对应环境状态的平均回报，来估计给定策略的状态价值函数。智能体从自身经验中学习，无需环境模型或贝尔曼方程来估计状态价值。然而，该算法通常需要大量回合才能准确估计`V_π`，因为智能体在单个回合中可能只访问少数几个状态。蒙特卡洛策略评估通常用于解决回合制强化学习问题，即过程在有限步数后终止。


    ### 首次访问蒙特卡洛策略评估


    在上一节中，我们讨论了蒙特卡洛策略评估的基本思想：通过遵循策略`π`生成大量样本回合，并利用这些回合来估计状态价值函数`V_π(s)`。


    首次访问蒙特卡洛策略评估算法（如算法 1 所示）是该思想的一种具体实现。对于每个回合，我们计算该回合中每个时间步`t = 0, 1, 2, ..., T-1`的回报`G_0,
    G_1, G_2, ..., G_{T-1}`，其中`T`是回合终止的时间步。然后，我们遍历该回合中的状态`S_0, S_1, S_2, ..., S_{T-1}`，并更新每个状态的状态价值函数估计值。


    为了更新状态`S_t`的估计值，我们检查这是否是当前回合中首次访问该状态（因此得名“首次访问”蒙特卡洛）。如果是，我们更新两个量：总回报`G(S_t)`，即所有回合中访问`S_t`时的回报`G_t`之和；以及访问计数`N(S_t)`，即所有回合中访问`S_t`的次数。然后，我们可以计算状态`S_t`的平均回报为`Ḡ(S_t)
    = G(S_t) / N(S_t)`。


    在每个回合结束时，我们通过计算所有访问过该状态的回合中观察到的回报的平均值，来更新每个状态的状态价值函数估计值。此过程持续固定数量的回合。该方法的一个缺点是，我们必须手动选择要运行的回合数，如果数量太少，估计值可能不准确。


    算法 1：`V[π]`的首次访问蒙特卡洛策略评估


    ![](img/605748_1_En_4_Figaaa_HTML.gif) 一个 9 行算法，标题为`V_π`的首次访问蒙特卡洛策略评估，输入如下，输出为输入策略`π`的估计状态价值函数`V_π`。待评估的策略`π`，折扣率`γ`，以及回合数`K`。


    总之，首次访问蒙特卡洛策略评估算法通过生成大量样本回合并利用它们计算每个状态的平均回报，提供了一种估计给定策略状态价值函数的方法。虽然该方法存在一些局限性，但它是理解强化学习算法行为的有用工具，并可应用于广泛的问题。


    ### 首次访问与每次访问


    蒙特卡洛策略评估是一种利用模拟经验估计给定策略状态价值函数的算法。实现该算法时必须做出的一个重要决定是采用首次访问还是每次访问方法。


    在蒙特卡洛策略评估的背景下，“访问”一词指的是智能体在回合中进入某个状态的时刻。由于一个回合可能多次访问同一状态，因此在评估过程中如何处理这些重复访问至关重要。


    在首次访问蒙特卡洛策略评估中，算法在计算状态价值时仅考虑回合中首次访问该状态的情况。当前回合中对该状态的所有后续访问均被忽略。例如，假设一个智能体在迷宫环境中导航，并在一个回合中多次访问状态`s`。首次访问方法只会考虑首次访问状态`s`后获得的回报，而忽略当前回合中对该状态`s`的所有后续访问。


    另一方面，每次访问蒙特卡洛策略评估会在回合中每次访问某个状态时更新其价值。继续迷宫示例，如果智能体在一个回合中访问状态`s`十次，每次访问方法将使用每次访问后获得的回报来更新该状态的价值函数。


    这两种方法之间存在一些重要差异。首次访问方法是无偏的，这意味着随着回合数趋近于无穷大，估计状态价值函数的期望值会收敛到真实值。然而，每次访问方法可能具有更低的方差，这意味着估计值不太可能远离真实值。


    在实践中，选择首次访问还是每次访问方法将取决于所解决的具体问题以及偏差与方差之间的期望权衡。在某些情况下，可能需要采用结合两种方法的混合方法。


    总体而言，首次访问与每次访问蒙特卡洛策略评估的选择取决于具体问题以及偏差与方差之间的期望权衡。首次访问方法无偏但方差可能更高，而每次访问方法方差可能更低但可能存在偏差。结合两种方法的混合方法可用于在偏差和方差之间取得平衡。

    '
- fmt: '### Worked Example


    To better understand the difference between first-visit Monte Carlo policy evaluation
    and every-visit Monte Carlo policy evaluation, let’s look at an example using
    the service dog MDP we introduced in Chap. [2](#605748_1_En_2_Chapter.xhtml).
    Recall the diagram for the service dog MDP shown in Fig. [4.2](#605748_1_En_4_Chapter.xhtml#Fig2).


    Let’s say the agent is following some policy `π` and generated an episode sequence
    in the form of `S0, R0, S1, R1, ..., S_{T-1}, R_{T-1}`. For example, we might
    have an episode as follows:


    ```

    episode = {Room 1, -1, Room 2, -1, Room 3, -2, Room 2, -1, Room 3, 10}

    ```


    To evaluate the policy for this episode, we need to compute the returns `Gt` for
    each time step `t` in the episode. We use no discount `γ = 1.0`. The returns `Gt`
    are computed as the sum of the rewards from time step `t` to the end of the episode,
    with no discounting applied. For example, for the preceding episode, the returns
    `Gt` are:


    ```

    returns = {5.0, 6.0, 7.0, 9.0, 10.0}

    ```


    A nodal map for the service dog MDP flows through rooms 1, 2, and 3 to reach the
    found item. Room 3 reverts to room 2 and room 2 reverts to room 1. Room 2 also
    points to outside via `r = 0` and outside reverts to room 2 via `r = 0`. Outside
    circles back to itself via `r = -1`.


    **Fig. 4.2** Service dog MDP


    Let’s focus on state *Room 2*. We can see that it’s been visited twice in this
    single episode, once at `t=1` and another at `t=3`. Suppose our previous estimated
    value for state *Room 2* is the sample average of returns observed from state
    *Room 2*, which is `Vπ(Room 2) = 0.0`. Additionally, the agent has never visited
    state *Room 2* before in this policy, so the number of visits to this state is
    `N(Room 2) = 0`.


    If we use first-visit Monte Carlo policy evaluation, then the new value for state
    *Room 2* should be `6/1 = 6`. This is because the algorithm will ignore the second
    time state *Room 2* is visited in this episode and only update the value of the
    state based on the first visit. In contrast, if we use every-visit Monte Carlo
    policy evaluation, then the value for state *Room 2* will first be updated to
    `6/1 = 6`, and then it will be updated to `(6+9)/2 = 7.5`. This is because every-visit
    Monte Carlo policy evaluation updates the value of a state on every visit in an
    episode.


    In summary, first-visit Monte Carlo policy evaluation updates the value of a state
    only on its first visit in an episode, while every-visit Monte Carlo policy evaluation
    updates the value of a state on every visit in an episode. The difference between
    these two approaches can be important for accurately estimating the value of states
    in an MDP.


    ### Every-Visit Monte Carlo Policy Evaluation


    It’s fairly easy to extend the first-visit Monte Carlo policy evaluation to the
    every-visit case; we just need to remove the conditional check inside the `for`
    loop, and everything else stays exactly the same, as shown in Algorithm 2.


    **Algorithm 2:** Every-visit Monte Carlo policy evaluation for `V[π]`


    An 8-line algorithm titled every-visit Monte Carlo policy evaluation for `Vπ`
    takes the following inputs to give an estimated state value function `V` for the
    input policy `π` as the output: policy `π` to be evaluated, discount rate `γ`,
    and number of episodes `K`.


    **Table 4.1** State values computed using first-visit and every-visit Monte Carlo
    policy evaluation, for the same random policy for the service dog MDP. Results
    were averaged over 100 independent runs; each run is over 2000 episodes; the last
    row contains true state values computed using DP policy evaluation. We use the
    same discount `γ = 0.9` in this experiment.


    | | Room 1 | Room 2 | Room 3 | Outside | Found item |

    |---|---|---|---|---|---|

    | First-visit MC | −2.67 | −1.85 | 3.16 | −3.32 | 0 |

    | Every-visit MC | −2.63 | −1.81 | 3.2 | −3.3 | 0 |

    | DP | −2.66 | −1.85 | 3.17 | −3.33 | 0 |


    We used first-visit and every-visit Monte Carlo policy evaluation algorithms to
    estimate the state values of a random policy `π` for our service dog MDP. Table
    [4.1](#605748_1_En_4_Chapter.xhtml#Tab1) shows the results. Since Monte Carlo
    methods involve randomness, we averaged the results over 100 independent runs,
    with each run consisting of 2000 episodes. For all runs, we set the discount factor
    `γ` to 0.9. The values computed using Monte Carlo policy evaluation algorithms
    are very close to the true values computed using dynamic programming policy evaluation
    (as shown in the last row of Table [4.1](#605748_1_En_4_Chapter.xhtml#Tab1)).'
