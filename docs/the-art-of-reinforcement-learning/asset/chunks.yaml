    ### 策略梯度定理


    由 Sutton 等人提出的策略梯度定理[2]是强化学习中的一项基础性成果，它提供了一种计算性能目标相对于策略参数梯度的方法。该定理是优化强化学习问题中策略的关键工具，尤其在深度强化学习领域。


    策略梯度定理指出：对于任意可微策略`π(a|s; θ)`，性能目标`J(θ)`关于`θ`的梯度（无折扣情况下）由下式给出：


    ```

    ∇_θ J(θ) = E_π_θ [ Q_π_θ (s_t, a_t) ∇_θ log π(a_t|s_t; θ) ]

    ```


    (9.13) 其中`Q_π_θ(s, a)`是策略`π_θ`的状态-动作值函数，`∇_θ log π(a|s; θ)`是策略的得分函数。得分函数本质上是策略对数关于策略参数的导数：


    ```

    ∇_θ log π(a|s; θ) = ∇_θ π(a|s; θ) / π(a|s; θ)

    ```


    (9.14)


    公式(9.13)的正式证明比公式(9.11)的推导更为复杂（可参考 Sutton 和 Barto 所著《强化学习导论》第 13.2 章[3]）。不过，我们可以将策略梯度定理视为公式(9.11)的广义版本，其中我们将样本回报`G_t`替换为状态-动作值函数`Q_π_θ(s_t,
    a_t)`。这种替换之所以可行，是因为本质上`G_t`和`Q_π_θ(s_t, a_t)`衡量的是同一件事：期望回报。


    对于情节式和连续式强化学习问题，我们可以将性能目标定义为：


    ```

    ∇_θ J(θ) = E_π_θ [ Σ_{t=0}^{∞} γ^t Q_π_θ (s_t, a_t) ∇_θ log π(a_t|s_t; θ) ]

    ```


    (9.15)


    请注意，公式(9.13)和(9.15)是非常强大的结果，因为它们允许我们直接使用基于梯度的优化方法来优化策略。在实践中，我们通过与环境交互收集样本，并利用蒙特卡洛方法等技术来估计策略梯度。


    ## 9.3 REINFORCE 算法


    在本节中，我们将介绍 REINFORCE 算法，这是为解决强化学习问题而开发的最早的策略梯度算法之一。该算法最初由 Williams 于 1992 年提出[4]。


    REINFORCE 是一种用于解决情节式问题的同策略、无模型、离线学习算法。该算法采用蒙特卡洛方法生成样本情节序列。在每个情节结束时，算法使用公式(9.16)给出的规则更新策略参数：


    ```

    θ ← θ + α γ^t G_t ∇_θ log π(a_t|s_t; θ)

    ```


    (9.16)


    值得注意的是，与基于值的方法不同，在 REINFORCE 中我们不需要使用`ε`-贪婪策略来鼓励探索。在训练过程中，智能体根据动作空间中每个动作的概率，按照`a
    ~ π_θ`采样动作，而不是遵循`ε`-贪婪策略来做决策。这种随机采样方法作为一种探索形式，使智能体能够学习哪些动作最有效。随着训练的进行，智能体更频繁地采样最佳动作，而较少采样最差动作。训练完成后，可以通过始终选择概率最高的动作，让训练好的智能体以确定性方式行动。但这应取决于具体问题，因为真正的最优策略可能是随机的。


    **算法 1：REINFORCE 算法**


    ![](img/605748_1_En_9_Figaaa_HTML.gif) 一个名为 REINFORCE 的 6 行算法，接收以下输入，输出近似最优策略`π_θ`。折扣率`γ`，学习率`α`，情节数`K`。


    在实践中，如果我们使用神经网络来近似策略，并利用深度学习软件执行随机梯度上升步骤，那么我们需要做的就是计算策略梯度损失，即样本回报`G_t`与动作概率对数似然`log
    π(a_t|s_t; θ)`的乘积，然后将该损失输入到某个神经网络优化器（如 SGD 或 Adam）中以更新参数。值得一提的是，默认情况下，大多数优化器被设计为最小化某个目标函数（如最小化
    MSE 或平方误差），因此在实际操作中，我们通常为策略梯度计算*负*对数似然`-log π(a_t|s_t; θ)`，这样当我们使用这些工具更新神经网络参数时，实际上执行的是梯度上升（因为`y
    = x - (-b) = x + b`），而非梯度下降。


    图 9.2 展示了一个简单的策略网络神经网络架构。该架构由多个全连接层组成，每个层后接一个非线性激活函数。神经网络的最终输出是动作空间中所有动作的预测概率。


    '
- fmt: '# Note


    Note, this example is designed for very simple reinforcement learning problems.
    In practice, the architecture can be more complex, with multiple layers, skip
    connections, and other advanced techniques to improve the performance of the RL
    agent. Therefore, the choice of an appropriate architecture for the policy network
    should be carefully considered based on the specific requirements of the problem
    and the available resources.


    ![](images/605748_1_En_9_Chapter/605748_1_En_9_Fig2_HTML.png)


    A flowchart for a neural network architecture runs as follows. Input data, 64
    units, 64 units via `ReLU` link, 64 units via `ReLU` link, `N` units via `ReLU`
    link, and action probabilities via `Softmax`.


    **Fig. 9.2** A simple example of a neural network architecture for the policy
    network


    ## 9.4 REINFORCE with Baseline


    The REINFORCE algorithm we introduced in the last section can suffer from high
    variance during training, which can make it slow and inefficient. Variance arises
    because the algorithm uses Monte Carlo methods to estimate returns, which can
    vary significantly between episodes. To address this issue, we can introduce a
    baseline value `b(s)` that’s subtracted from the estimated returns to reduce variance.


    The baseline value `b(s)` can be any function that doesn’t depend on the actions.
    For example, we can use a constant value or a function of the state `s`. By subtracting
    the baseline value from the estimated returns, we can reduce the impact of random
    fluctuations in the reward signal.


    The parameter update rule for the REINFORCE algorithm with a baseline function
    `b(s)` is


    ```

    θ = θ + α γ^t ( G_t - b(s_t) ) ∇_θ log π(a_t|s_t; θ)

    ```


    (9.17)


    This equation is also known as the parameter update rule for the *vanilla policy
    gradient algorithm*. We can replace `b(s_t)` with any function that’s suitable
    for reducing variance.


    One common choice for the baseline function is the state value function `V_{π_θ}(s_t)`,
    which measures the expected return starting from the state `s_t` when following
    policy `π_θ`. In practice, we often use the value function approximation method
    introduced in Part II of this book to learn an estimate of `V_{π_θ}(s_t)`. This
    involves minimizing the squared error loss between the sample return and the estimated
    value, using a function approximator such as a neural network. Using the state
    value function as a baseline can help reduce variance because it captures the
    expected return from the current state.


    It’s important to note that using a baseline value is not a panacea and can sometimes
    lead to biased estimates. This is because we’re subtracting a fixed value from
    the estimated returns, which can introduce a systematic error if the baseline
    value is not well chosen. Therefore, it’s important to choose a baseline function
    that’s appropriate for the problem at hand and to evaluate its effectiveness carefully.


    In summary, introducing a baseline value in the REINFORCE algorithm can help reduce
    noise and variance during training, which makes the algorithm more efficient and
    effective. By choosing the right baseline function, we can further improve the
    performance of the algorithm. However, using a baseline value requires careful
    consideration and experimentation to ensure that it doesn’t introduce bias or
    other issues.'
