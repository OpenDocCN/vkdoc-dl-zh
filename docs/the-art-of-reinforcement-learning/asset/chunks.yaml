  trans: '

    ### 数据效率低下


    标准策略梯度方法的另一个问题是数据效率低下。这是因为像 Actor-Critic 这样的策略梯度方法属于**同策略**学习方法。同策略方法使用当前策略生成的轨迹来更新策略参数，这可能导致收敛缓慢和样本效率低下。


    此外，策略梯度算法需要大量轨迹才能准确估计梯度。在数据获取成本高昂或耗时较长的环境中，这可能会成为问题，因为它会导致样本效率低下。例如，在机器人技术等实际应用中，由于机器人的物理限制，获取大量轨迹可能成本高昂或耗时较长。


    一种可能的解决方案是使用**重要性采样比率**来解决这个问题。重要性采样权重是当前策略下采取某个动作的概率，与样本抽取时所依据的分布（旧策略）下采取相同动作的概率之比。


    重要性采样比率可以通过以下公式计算：


    ```

    \displaystyle \begin{aligned} \rho_t & = \frac{\pi''(a_t|s_t)}{\pi(a_t|s_t)} \end{aligned}

    ```


    (11.1) 其中 `\pi ''` 是新策略，`\pi` 是用于生成样本的旧策略。


    尽管重要性采样看似有用，但它可能会引入其他问题，例如重要性采样权重的**爆炸**或**消失**。这是因为当样本抽取的分布对当前策略所采取的动作赋予较低概率时，重要性采样权重会变得非常大，导致策略梯度不稳定且收敛缓慢。同样，当该分布对当前策略所采取的动作赋予较高概率时，重要性采样权重会变得非常小，导致梯度消失。


    例如，考虑一个简单的强化学习问题，其中智能体可以以相等的概率采取两个动作 `a_1` 和 `a_2`。采取动作 `a_1` 的奖励为 1，采取动作 `a_2`
    的奖励为 `-1`。智能体的策略是以概率 *p* 采取动作 `a_1`，以概率 `1-p` 采取动作 `a_2`。假设我们想使用重要性采样来估计期望奖励相对于
    *p* 的梯度。我们可以从一个均匀分布中采样，该分布对两个动作都赋予 0.5 的概率。


    动作 `a_1` 的重要性采样权重为


    ```

    \displaystyle \begin{aligned} w_1 = \frac{p}{0.5} = 2p\end{aligned}

    ```


    动作 `a_2` 的重要性采样权重为


    ```

    \displaystyle \begin{aligned} w_2 = \frac{1-p}{0.5} = 2(1-p)\end{aligned}

    ```


    然而，如果智能体的策略对采取动作 `a_1` 赋予较低概率，例如 `p=0.1`，那么动作 `a_1` 的重要性采样权重会变得非常小：


    ```

    \displaystyle \begin{aligned} w_1 = 2(0.1) = 0.2\end{aligned}

    ```


    同样，如果智能体的策略对采取动作 `a_1` 赋予较高概率，例如 `p=0.9`，那么动作 `a_1` 的重要性采样权重会变得非常大：


    ```

    \displaystyle \begin{aligned} w_{1} = 2(0.9) = 1.8\end{aligned}

    ```


    在这两种情况下，重要性采样权重都不稳定，可能导致策略梯度收敛缓慢。这种不稳定性被称为**高方差问题**。如果我们使用较大的步长来更新策略参数，这个问题可能会变得更糟。

    '
- fmt: "# 11.2 Policy Performance Bounds\n\nWe want to find a way to ensure that the\
    \ updated policy is not too far from the current policy, thereby avoiding large\
    \ updates that can cause instability, but not compromising the training speed,\
    \ or avoiding getting stuck in local optima like what we could face when using\
    \ smaller step size.\n\nWe first introduce the relative policy performance equation,\
    \ as shown in Eq. (11.2). Essentially, the equation states that for any two policies\
    \ `π'` and `π`, for example, `π'` could be the new policy, and `π` being the current\
    \ policy, then the performance difference between these policies can be expressed\
    \ as\n\n```\nJ(π') - J(π) = \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]\n\
    ```\n\n(11.2)\n\nEquation (11.2) is known as the policy improvement theorem in\
    \ reinforcement learning, first introduced by Russell and Norvig [1]. The left-hand\
    \ side of the equation, `J(π') - J(π)`, represents the difference in expected\
    \ cumulative reward between the new policy `π'` and the old policy `π`. This is\
    \ the quantity we want to maximize as we update our policy.\n\nThe right-hand\
    \ side of the equation, `\U0001D53C_{τ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]`,\
    \ is the expected value of the sum of the advantages under the new policy `π'`,\
    \ where `τ` is a trajectory of states, actions, and rewards collected following\
    \ the new policy `π'`, and `Â_π(s_t, a_t)` is the advantage function at time step\
    \ `t`. The advantage function measures how much better an action is compared to\
    \ the average action under the current policy `π`, in terms of expected cumulative\
    \ reward.\n\nThe advantage function is defined as `Â_π(s, a) = Q_π(s, a) - V_π(s)`,\
    \ where `Q_π(s, a)` is the state-action value function under policy `π`, and `V_π(s)`\
    \ is the state value function under policy `π`. The state-action value function\
    \ represents the expected cumulative reward of taking action `a` in state `s`\
    \ and following policy `π` thereafter, while the state value function represents\
    \ the expected cumulative reward starting from state `s` and following policy\
    \ `π` thereafter.\n\nThe proof for Eq. (11.2) is shown here:\n\n```\nJ(π') - J(π)\
    \ = \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]\n             = \U0001D53C\
    _{τ ~ π'}[∑_{t=0}^{∞} γ^t (R(s_t, a_t) + γ V_π(s_{t+1}) - V_π(s_t))]\n       \
    \      = J(π') + \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞} γ^{t+1} V_π(s_{t+1}) - ∑_{t=0}^{∞}\
    \ γ^t V_π(s)]\n             = J(π') + \U0001D53C_{τ ~ π'}[∑_{t=1}^{∞} γ^t V_π(s)\
    \ - ∑_{t=0}^{∞} γ^t V_π(s)]\n             = J(π') - \U0001D53C_{τ ~ π'}[V_π(s_0)]\n\
    \             = J(π') - J(π)\n```\n\nEquation (11.2) suggests we can rewrite the\
    \ objective for optimizing the new policy `π'`, with respect to the current or\
    \ old policy `π`, such that\n\n```\nmax_{π'} J(π') = max_{π'} J(π') - J(π)\n \
    \              = max_{π'} J(π') \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]\n\
    ```\n\n(11.3)\n\nHowever, in the equation, we still need the trajectories sampled\
    \ when following the new policy `π'`; this requirement makes it impossible to\
    \ compute.\n\nBut let's rewrite Eq. (11.2) in terms of the discounted future state\
    \ distribution `d_π` and use the property that the sum of an infinite geometric\
    \ series with common ratio `γ` is `1 / (1 - γ)`, such as\n\n```\nJ(π') - J(π)\
    \ = \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]\n             = 1/(1 -\
    \ γ) \U0001D53C_{s ~ d_{π'}, a ~ π'}[Â_π(s, a)]\n             = 1/(1 - γ) \U0001D53C\
    _{s ~ d_{π'}, a ~ π}[π'(a|s)/π(a|s) Â_π(s, a)]\n```\n\n(11.4)\n\nwhere `d_π` is\
    \ the expected discounted frequency of visiting a state `s` under the policy `π`,\
    \ and `d_π` is defined as\n\n```\nd_π = (1 - γ) ∑_{t=0}^{∞} γ^t P(s_t = s|π)\n\
    ```\n\nIf the discounted future state distributions `d_{π'}` and `d_π` are close,\
    \ that is, `d_{π'} ≈ d_π`, then we can approximate Eq. (11.4) using `d_π`, such\
    \ as"
