  trans: '

    ### 4.2 增量更新


    增量更新的概念是强化学习算法中广泛使用的一种技术，在蒙特卡洛策略评估中尤其有用。增量更新的核心思想是逐步更新估计值，而非一次性完成更新。这具有若干优势，包括更快的收敛速度、更好的内存效率，以及能够在新数据可用时实时更新估计值。


    增量更新公式可表示如下：


    ![$$\displaystyle \begin{aligned} \mbox{新估计值}=\mbox{旧估计值} + \mbox{步长} \Big[\mbox{目标值}
    - \mbox{旧估计值} \Big] \end{aligned}$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_Equc.png)


    其中 `OldEstimate` 是之前的估计值，`StepSize` 是一个决定更新幅度的小正数常量，`Target` 是一个新的样本值。`Target
    - OldEstimate` 这一项通常被称为估计误差，它代表了新样本值与先前估计值之间的差异。


    在蒙特卡洛策略评估中，增量更新可用于估计某个状态的价值函数。具体来说，我们可以利用从特定幕中获得的样本回报 `G_t` 来更新状态 `S_t` 的估计价值函数：


    ![$$\displaystyle \begin{aligned} V_\pi(S_t) = V_\pi(S_t) + \frac{1}{N(S_t)} \Big(
    G_t - V_\pi(S_t) \Big) {} \end{aligned} $$](img/605748_1_En_4_Chapter_TeX_Equ2.png)


    (4.2)


    其中 `V_π(S_t)` 是状态 `S_t` 的估计价值函数，`N(S_t)` 是状态 `S_t` 被访问的次数。公式 (4.2) 中的更新公式代表了一种增量更新，即根据样本回报与先前估计值之差成比例的小步长来更新估计价值函数。


    首次访问情况下的增量蒙特卡洛策略评估算法如算法 3 所示。在每一幕中，对于该幕中的每个时间步 `t`，我们首先检查状态 `S_t` 是否为首次被访问，然后更新该幕的回报和
    `S_t` 的访问次数，此过程持续进行直到达到终止状态。最后，我们使用公式 (4.2) 中的增量更新方程更新每个被访问状态的估计价值函数。每次访问情况只需移除
    for 循环内的条件检查即可轻松实现。


    算法 3：针对 `V[π]` 的首次访问蒙特卡洛策略评估（含增量更新）


    ![](img/605748_1_En_4_Figaac_HTML.gif) 一个 8 行算法，标题为“针对 `V[π]` 的首次访问蒙特卡洛策略评估（含增量更新）”，该算法接收以下输入，并输出针对输入策略
    `π` 的估计状态价值函数 `V[π]`。待评估的策略 `π`、折扣率 `γ` 以及幕数 `K`。


    表 4.2 展示了分别使用首次访问蒙特卡洛策略评估和首次访问蒙特卡洛策略评估（含增量更新方法）计算出的状态价值，两者均针对服务犬 MDP 的同一随机策略。与表
    4.1 所示的实验类似，结果是在 100 次独立运行中取平均值，每次运行包含 2000 幕；本实验中使用相同的折扣率 `γ = 0.9`。

    '
- fmt: '### Monte Carlo Policy Evaluation for `Q_π`


    We can use Monte Carlo policy evaluation to estimate the state-action value function
    `Q_π` for a policy `π`. The state-action value function `Q_π(s, a)` measures the
    expected return starting in state `s`, taking action `a`, then following policy
    `π`.


    Monte Carlo policy evaluation estimates `Q_π` by generating many episodes of the
    Markov decision process (MDP) under the policy `π`, then computing the average
    return for each state-action pair. Specifically, for each episode, the agent starts
    in an initial state `s0` and takes actions according to the policy `π` until it
    reaches a terminal state. At each time step `t`, the agent observes the current
    state `S_t`, takes an action `A_t` according to the policy `π`, and receives a
    reward `R_t`. The agent continues to take actions and receive rewards until it
    reaches a terminal state, where the episode ends.


    **Table 4.2** State values computed using first-visit Monte Carlo policy evaluation
    and first-visit Monte Carlo policy evaluation with incremental update, for the
    same random policy for the service dog MDP. Results were averaged over 100 independent
    runs; each run is over 2000 episodes; the last row contains true state values
    computed using DP policy evaluation. We use the same discount `γ = 0.9` in this
    experiment.


    | | Room 1 | Room 2 | Room 3 | Outside | Found item |

    | --- | --- | --- | --- | --- | --- |

    | First-visit MC | −2.67 | −1.85 | 3.17 | −3.33 | 0 |

    | Incr. first-visit MC | −2.65 | −1.84 | 3.16 | −3.34 | 0 |

    | DP | −2.66 | −1.85 | 3.17 | −3.33 | 0 |


    After generating multiple episodes, Monte Carlo policy evaluation computes the
    average return `G_t` for each state-action pair `(s, a)` that has been visited
    during the episodes. This is done by averaging the returns obtained after each
    visit to the pair `(s, a)`, where the return is the sum of discounted rewards
    from that time step until the end of the episode:


    ```

    G_t = R_t + γ R_{t+1} + γ^2 R_{t+2} + ... + γ^{T-1-t} R_{T-1}

    ```


    (4.3)


    Here, `T` is the time step at which the episode ends, and `γ` is the discount
    factor that determines the importance of future rewards relative to immediate
    rewards.


    Once we have computed the average return `G_t` for each state-action pair `(s,
    a)`, we can update the estimate of `Q_π(s, a)` using the incremental update rule:


    ```

    Q_π(S_t, A_t) = Q_π(S_t, A_t) + (1 / N(S_t, A_t)) * (G_t - Q_π(S_t, A_t))

    ```


    (4.4)


    Here, `N(S_t, A_t)` is the number of times the state-action pair `(S_t, A_t)`
    has been visited during the episodes.


    The first-visit Monte Carlo policy evaluation is one way to implement Monte Carlo
    policy evaluation for estimating `Q_π`, which estimates the value of each state-action
    pair by averaging the returns obtained after the first visit to that pair. The
    algorithm is as follows:


    **Algorithm 4:** First-visit Monte Carlo policy evaluation with incremental update
    for `Q[π]`


    An 8-line algorithm titled first-visit Monte Carlo policy evaluation with incremental
    update for `Q_π` takes the following input and gives an estimated state value
    function `Q_π` for the input policy `π` as the output. Policy `π` to be evaluated,
    discount rate `γ`, and number of episodes `K`.


    Figure 4.3 shows the state-action values we’ve computed using Algorithm 4 for
    a random policy `π` for the service dog MDP. As usual, the results were averaged
    over 100 independent runs; each run is over 2000 episodes. Notice the state values
    were computed using DP policy evaluation. And we use discount `γ = 0.9` in this
    experiment.


    We can verify the results by computing the state values using these state-action
    values. Recall that the state value is just the weighted sum over all state-action
    values for this state.


    ```

    V_π(s) = Σ_{a ∈ A} π(a|s) Q_π(s, a)

    ```


    (4.5)


    A nodal map runs as follows. Negative 2.7, negative 1.8 via `Q_π = -2.65`, 3.0
    via `Q_π = 1.86`, and 0.0 via `Q_π = 10.0`. 3.0 reverts to negative 1.8 via `Q_π
    = -3.65`. Negative 1.8 reverts to negative 2.7 and points to negative 3.4 via
    `Q_π = -4.38` and `-2.99`.


    **Fig. 4.3** State-action values computed using first-visit Monte Carlo policy
    evaluation with incremental update of a random policy for the service dog MDP.
    Results were averaged over 100 runs; each run is over 2000 episodes. Notice the
    state values were computed using DP policy evaluation. We use the same discount
    `γ = 0.9` in this experiment.


    If we look at state *Room 2*, the state-action values for actions *Go to room1*,
    *Go to room3*, *Go outside* are `-4.38`, `1.86`, `-2.99`. And if we weight each
    by the probability of selecting the action which is all `0.33`, we get `-4.38
    * 0.33 + 1.86 * 0.33 - 2.99 * 0.33 = -1.82`, which is very close to the true value
    of `-1.85` computed using DP. The same process could be applied to state *Room
    3*, where we get the value `-3.65 * 0.5 + 10 * 0.5 = 3.175`, which is very close
    to the true value of `3.17`.'
  raw: '### Monte Carlo Policy Evaluation for ![$$Q_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq61.png)


