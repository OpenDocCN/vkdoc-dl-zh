- fmt: '### Policy Gradient Theorem


    The policy gradient theorem developed by Sutton et al. [[2](#605748_1_En_9_Chapter.xhtml#CR2)]
    is a fundamental result in reinforcement learning that provides a way to compute
    the gradient of the performance objective with respect to the policy parameters.
    It is a key tool for optimizing policies in reinforcement learning problems, especially
    in the context of deep reinforcement learning.


    The policy gradient theorem states that for any differentiable policy `π(a|s;
    θ)`, the gradient of the performance objective `J(θ)` with respect to `θ` is given
    by (without discount):


    ```

    ∇_θ J(θ) = E_π_θ [ Q_π_θ (s_t, a_t) ∇_θ log π(a_t|s_t; θ) ]

    ```


    (9.13) where `Q_π_θ(s, a)` is the state-action value function for the policy `π_θ`,
    and `∇_θ log π(a|s; θ)` is the score function for the policy. The score function
    is simply the derivative of the logarithm of the policy with respect to the policy
    parameters:


    ```

    ∇_θ log π(a|s; θ) = ∇_θ π(a|s; θ) / π(a|s; θ)

    ```


    (9.14)


    The official proof of Eq. (9.13) is more involved than the derivation of Eq. (9.11)
    (refer to Chapter 13.2 of *Reinforcement Learning: An Introduction* by Sutton
    and Barto [[3](#605748_1_En_9_Chapter.xhtml#CR3)]). However, we can think of the
    policy gradient theorem as a generalized version of Eq. (9.11), where we replace
    the sample return `G_t` with the state-action value function `Q_π_θ(s_t, a_t)`.
    This is possible since, in essence, `G_t` and `Q_π_θ(s_t, a_t)` measure the same
    thing: the expected returns.


    We can define the performance objective for both episodic and continuous reinforcement
    learning problems as:


    ```

    ∇_θ J(θ) = E_π_θ [ Σ_{t=0}^{∞} γ^t Q_π_θ (s_t, a_t) ∇_θ log π(a_t|s_t; θ) ]

    ```


    (9.15)


    Note that Eqs. (9.13) and (9.15) are powerful results, as they allow us to optimize
    a policy directly using gradient-based optimization methods. In practice, we estimate
    the policy gradient using samples collected by interacting with the environment,
    using techniques such as Monte Carlo method.


    ## 9.3 REINFORCE


    In this section, we’ll introduce the REINFORCE algorithm, one of the earliest
    policy gradient algorithms developed to solving reinforcement learning problems.
    The algorithm was originally proposed by Williams in 1992 [[4](#605748_1_En_9_Chapter.xhtml#CR4)].


    REINFORCE is an on-policy, model-free, and offline learning algorithm designed
    to solve episodic problems. The algorithm employs the Monte Carlo method to generate
    sample episode sequences. At the end of each episode, the algorithm updates the
    parameters of the policy using the rule given by Eq. (9.16):


    ```

    θ ← θ + α γ^t G_t ∇_θ log π(a_t|s_t; θ)

    ```


    (9.16)


    It is important to note that, unlike value-based methods, we do not need to use
    an `ε`-greedy policy to encourage exploration in REINFORCE. During training, the
    agent samples an action `a ~ π_θ` according to the probabilities of each action
    in the action space, rather than following an `ε`-greedy policy to make decisions.
    This random sampling method serves as a form of exploration, allowing the agent
    to learn which actions are most effective. As training progresses, the agent samples
    the best actions more frequently and the worst actions less frequently. After
    training is complete, it is possible to let the trained agent act deterministically
    by always choosing the action with the highest probability. However, this should
    depend on the specific problem, since the true optimal policy may be stochastic.


    **Algorithm 1: REINFORCE**


    ![](images/605748_1_En_9_Chapter/605748_1_En_9_Figaaa_HTML.gif) A 6-line algorithm
    titled reinforce takes in the following inputs to give an approximated optimal
    policy `π_θ` as the output. Discount rate `γ`, learning rate `α`, and number of
    episodes `K`.


    In practice, if we’re using neural networks to approximate the policy and using
    the deep learning software to perform the stochastic gradient ascent step, then
    all we need to do is to compute policy gradient loss, which is the product between
    the sample return `G_t` and the log-likelihood of the action probability `log
    π(a_t|s_t; θ)`, then plug in the loss into some neural network optimizer (like
    SGD or Adam) to update the parameters. One thing that’s worth to mention is that
    by default, most of these optimizer are designed to minimize some objective function
    (like minimize MSE or squared error), in practice we often compute the *negative*
    log-likelihood `-log π(a_t|s_t; θ)` for policy gradient, so that when we use these
    tools to update the parameters of the neural network, it’s actually doing gradient
    ascent (because `y = x - (-b) = x + b`), not gradient descent.


    A simple neural network architecture for the policy network is shown in Fig. 9.2.
    The architecture consists of multiple fully connected layers, with each layer
    followed by a nonlinear activation function. The final output of the neural network
    is the predicted action probabilities for all the actions in the action space.'
