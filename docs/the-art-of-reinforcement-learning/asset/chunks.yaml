    # 9.2 策略梯度


    在强化学习中，神经网络可用于近似值函数和策略。然而，基于值的方法使用贝尔曼方程来定义给定策略下值函数的更新规则，但对于由`θ`参数化的策略，并没有类似的等价方法。这意味着，为了使用梯度方法寻找策略的最优参数，我们首先需要定义一个衡量其性能的目标函数。本节受艾玛·布伦希尔教授在其全面的强化学习课程中的杰出工作启发，推导策略梯度的方程
    [[1]](#605748_1_En_9_Chapter.xhtml#CR1)。


    在情节式强化学习设定中，我们可以通过从初始状态`s0`开始的期望总回报来衡量策略`π_θ`的性能。我们可以将由`θ`参数化的策略值定义为`V_π_θ(s0)`。我们的目标是找到最大化该值的参数`θ`，因此可以将目标函数定义为


    ```

    J(θ) = V_π_θ = V_π_θ(s0)

    ```


    (9.3)


    现在，我们的任务变成了一个标准的优化问题：我们需要找到使`J(θ)`最大化的`θ`。我们可以使用梯度上升法来实现这一点。与用于最小化某个目标函数的梯度下降不同，梯度上升是沿着函数最陡上升方向迈步。在这种情况下，我们沿着`J(θ)`的梯度方向迈出步长为`α`的一步：


    ```

    θ = θ + α ∇_θ J(θ)

    ```


    (9.4)


    梯度`∇_θ J(θ)`告诉我们，为了增加目标函数的值，需要调整每个参数`θ_i`的程度。通过使用公式 (9.4) 反复更新参数，我们可以收敛到最大化期望总回报的最优策略参数。


    为了比较不同策略的性能，我们可以使用状态值函数`V_π(s)`，它衡量的是从状态`s`开始并遵循策略`π`时的期望总回报。对于任意两个策略`π`和`π''`，如果对于所有状态`s`，都有`V_π''(s)
    ≥ V_π(s)`，我们就说`π''`与`π`一样好或更好。通过仅关注初始状态`s0`，这个概念可以扩展到情节设定中。


    让我们展开策略`π_θ`的值函数。我们知道，状态值`s0`就是从初始状态`s0`开始并遵循策略`π_θ`直到达到终止状态`s_T`时的期望回报`G_t`（其中`t=0`）（我们只关注情节式情况）。因此，`π_θ`的值可以写为


    ```

    V_π_θ = V_π_θ(s0) = E_π_θ[ G_t | s_t = s0 ]

    ```


    (9.5)


    我们知道，一个情节序列`τ`的回报是折扣奖励的总和`G(τ) = r0 + γ r1 + γ² r2 + ... + γ^(T-1) r_(T-1)`（针对情节式情况）。公式
    (9.5) 中的期望符号提醒我们，智能体在环境中行动时的行为以及环境的动态特性将极大地影响智能体在一个情节序列过程中所能获得的总奖励。这意味着任意情节序列的回报`G(τ)`受两个因素影响：智能体遵循的策略`π_θ`以及环境的动态特性。为简单起见，我们用`τ`表示单个情节的状态、动作和奖励序列，其中


    ```

    τ = s0, a0, r0, s1, a1, r1, ..., s_(T-1), a_(T-1), r_(T-1), s_T

    ```


    然后我们用`G(τ)`表示整个情节序列`τ`的折扣奖励总和，其中

    '
- fmt: '![$\displaystyle \begin{aligned} G(\tau) = \sum_{t=0}^{T-1} {\gamma}^t r_t
    \end{aligned}$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equb.png)


    We use `$P(\tau ; \boldsymbol {\theta })$` to denote the probability of the agent
    obtaining an arbitrary episode sequence `$\tau $` when following the policy `$\pi
    _{\boldsymbol {\theta }}$`. Specifically, `$P(\tau ; \boldsymbol {\theta })$`
    is the product of the probability of selecting actions under the policy, `$\pi
    (a_t|s_t; \boldsymbol {\theta })$`, and the probability of transitioning between
    states, `$P(s_{t+1}|s_t, a_t)$`, for each time step *t* in the sequence. The probability
    of the sequence is obtained by multiplying these probabilities across all time
    steps, as well as the probability of starting in a particular initial state `$s_0$`,
    which we represent as `$\mu (s_0)$`. Thus, we can rewrite the equation for the
    value of a policy `$\pi _{\boldsymbol {\theta }}$` using `$P(\tau ; \boldsymbol
    {\theta })$` and the sum of discounted rewards for the entire episode sequence,
    `$G(\tau )$`, as shown in Eq. (9.6):


    ![$\displaystyle \begin{aligned} V_{\pi_{\boldsymbol{\theta}}} = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \right] = \sum_{\tau} P(\tau; \boldsymbol{\theta}) G(\tau) {} \end{aligned}
    $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ6.png)


    (9.6)


    Here, `$G(\tau )$` is the sum of discounted rewards for the entire episode sequence,
    and `$G(\tau ) = \sum _{t=0}^{T-1} {\gamma }^t r_t$` as defined earlier. This
    equation is important because it allows us to compute the value of a policy, which
    is a key concept in reinforcement learning.


    The objective function `$J(\boldsymbol {\theta })$` for the policy can then be
    written using the terms in Eq. (9.6). Specifically, `$J(\boldsymbol {\theta })$`
    represents the expected return of the policy `$\pi _{\boldsymbol {\theta }}$`,
    which we want to maximize in order to find the best policy. To compute the gradients
    with respect to `$\boldsymbol {\theta }$`, we use the likelihood ratio trick,
    which is a well-known result in probability theory that is often used in reinforcement
    learning. Specifically, we have


    ![$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    &amp; = \nabla_{\boldsymbol{\theta}} \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \right]\notag \\ &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \nabla_{\boldsymbol{\theta}} G(\tau) \right]\notag \\ &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \frac{P(\tau; \boldsymbol{\theta})}{P(\tau; \boldsymbol{\theta})} \nabla_{\boldsymbol{\theta}}
    G(\tau) \right]\notag \\ &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \frac{\nabla_{\boldsymbol{\theta}}P(\tau; \boldsymbol{\theta})}{P(\tau;
    \boldsymbol{\theta})} \right] \end{aligned} $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ7.png)


    (Likelihood ratio)


    ![$\displaystyle \begin{aligned} &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \nabla_{\boldsymbol{\theta}} \log P(\tau; \boldsymbol{\theta}) \right]
    {} \end{aligned} $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ8.png)


    (9.7)


    Equation (9.7) shows that to compute the gradients with respect to `$\boldsymbol
    {\theta }$`, we just need to find the derivatives for `$\log P(\tau ; \boldsymbol
    {\theta })$`. However, it’s important to note that the probability of starting
    in a particular state `$s_0$` is often unknown and must be estimated from data.
    This is why we use `$\mu (s_0)$` to represent the probability distribution for
    the initial state `$s_0$`.


    We can then expand `$P(\tau ; \boldsymbol {\theta })$` as follows:


    ![$\displaystyle \begin{aligned} P(\tau; \boldsymbol{\theta}) = \mu(s_0) \cdot
    \prod_{t=0}^{T-1} \pi (a_t|s_t; \boldsymbol{\theta}) \cdot \prod_{t=0}^{T-1} P(s_{t+1}|s_t,
    a_t) {} \end{aligned} $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ9.png)


    (9.8)


    In model-free reinforcement learning, the agent does not have access to the distribution
    `$\mu (s_0)$` for the initial state or the dynamics of the environment `$P(s_{t+1}|s_t,
    a_t)$`. This raises the question of how we can compute the gradients with respect
    to `$\boldsymbol {\theta }$`. Fortunately, we can use the laws of logarithms to
    overcome this issue.


    Specifically, we can apply the logarithmic identity that states that the sum of
    the logarithms of two numbers is equal to the logarithm of their product. By applying
    this identity twice, we can split Eq. (9.8) into sums of products and then obtain
    Eq. (9.9). This allows us to compute the gradients without having access to `$\mu
    (s_0)$` or `$P(s_{t+1}|s_t, a_t)$`.'
