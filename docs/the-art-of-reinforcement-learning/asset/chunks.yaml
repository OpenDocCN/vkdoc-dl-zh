    The transition matrix ![$$\mathcal {P}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq52.png)
    is a convenient way to represent the dynamics function (or transition model) of
    a Markov chain. It lists all the possible state transitions in a single matrix,
    where each row represents a current state *s*, and each column represents a successor
    state ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq53.png)
    . The transition probability for transitioning from state *s* to state ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq54.png)
    is denoted by ![$$P(s''|s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq55.png)
    . Since we are talking about probability, the sum of each row is always equal
    to 1.0. Here, we list the transition matrix for our service dog Markov chain:


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Figa_HTML.png)


    A transition matrix for service dog Markov chain. The columns and rows for room
    1, room 2, room 3, outside, found item, and end indicate states.


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig4_HTML.png)


    A transition diagram for service dog Markov chain. Room 1 leads to room 2 followed
    by room 3 and found item with arrows for p equals 0.8, p equals 0.4, and p equals
    0.8\. Outside connects to room 2 via p equals 0.4 and 0.2\. Found item leads to
    end via p equals 1.0.


    Fig. 2.4


    Service dog Markov chain


    With access to the dynamics function of the environment, we can sample some state
    transition sequences ![$$S_0, S_1, S_2, \cdot \cdot \cdot $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq56.png)
    from the environment. For example:


    *   Episode 1: (Room 1, Room 2, Room 3, Found item, End)


    *   Episode 2: (Room 3, Found item, End)


    *   Episode 3: (Room 2, Outside, Room 2, Room 3, Found item, End)


    *   Episode 4: (Outside, Outside, Outside, …)


    We now have a basic understanding about the state transition in the environment;
    let’s move on to add rewards into the process.


    ## 2.4 Markov Reward Process


    As we’ve said before, the goal of a reinforcement learning agent is to maximize
    rewards, so the next natural step is to add rewards to the Markov chain process.
    The Markov reward process (MRP) is an extension of the Markov chain, where rewards
    are added to the process. In a Markov reward process, the agent not only observes
    state transitions but also receives a reward signal along the way. Note, there
    are still no actions involved in the MRPs. We can define the Markov reward process
    as a tuple ![$$(\mathcal {S}, \mathcal {P}, \mathcal {R})$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq57.png)
    , where


    *   ![$$\mathcal {S}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq58.png)
    is a finite set of states called the state space.


    *   ![$$\mathcal {P}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq59.png)
    is the dynamics function (or transition model) of the environment, where ![$$P(s''|s)=P\Bigl
    [ S_{t+1}=s'' \;\Big |\; S_t=s \Bigr ]$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq60.png)
    specify the probability of environment transition into successor state ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq61.png)
    when in current state *s*.


    *   ![$$\mathcal {R}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq62.png)
    is a reward function of the environment. ![$$R(s)=\mathbb {E}_{\,\!\!}\left [R_t
    \;\Big |\; S_t=s\right ]$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq63.png)
    is the reward signal provided by the environment when the agent is in state *s*.


    As shown in Fig. [2.5](#605748_1_En_2_Chapter.xhtml#Fig5), we added a reward signal
    to each state in our service dog example. As we’ve talked briefly in Chap. [1](#605748_1_En_1_Chapter.xhtml),
    we want the reward signals to align with our desired goal, which is to find the
    object, so we decided to use the highest reward signal for the state *Found item*.
    For the state *Outside*, the reward signal is +1, because being outside playing
    might be more enjoyable for the agent compared to wandering between different
    rooms.


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig5_HTML.png)


