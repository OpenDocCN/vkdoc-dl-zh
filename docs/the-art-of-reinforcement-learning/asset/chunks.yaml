    # 7.4 朴素深度 Q 学习


    在强化学习中，Q 学习是一种离轨策略学习算法，它直接学习最优状态-动作值函数（`Q*`）。为了计算估计目标，Q 学习使用即时奖励和最佳后继状态-动作对的折扣值作为
    TD 目标。当使用神经网络来近似最优状态-动作值函数时，我们的 Q 学习目标函数可以表示为


    ```

    J(θ) = (r_t + γ max_{a''} Q̂(s_{t+1}, a''; θ) - Q̂(s_t, a_t; θ))²

    ```


    (7.8)


    ![一个流程图，标注了 s、theta 以及 Q 函数（a = 1 到 n）的矩阵格式。](img/605748_1_En_7_Fig11_HTML.png)


    **图 7.11** 使用神经网络近似状态-动作值函数 `Q_π` 的概念，其中我们仅将状态 `s` 输入神经网络，神经网络的输出是一个向量，包含给定状态下每个动作的值


    这里，`θ` 代表神经网络的参数。


    在前面的章节中，我们经常使用表格法和线性方法来计算特定状态-动作对 `(s, a)` 的值。然而，如果我们想找出对于任意状态 `s`，哪个动作能产生最大值
    `max_a Q_π(s, a)`，我们必须逐一枚举所有（合法）动作。这意味着我们需要将同一个状态 `s` 多次输入神经网络，如果动作空间很大，这会损害性能。在使用神经网络时，我们希望避免这些顺序操作，并利用并行计算能力，尤其是在使用像
    GPU 这样的加速硬件时。


    为了解决这个问题，我们可以对使用神经网络计算任意状态的动作值的方式进行一个小改动。我们不再将状态-动作对 `(s, a)` 输入神经网络，而是仅将状态 `s`
    作为输入，并一次性计算出每个动作的值，如图 7.11 所示。神经网络的输出是一个向量，其中每个标量分量对应相应动作的估计值。这种方法避免了重复将同一状态输入神经网络（这可能会消耗大量计算资源），也使我们能够轻松地找出给定状态下具有最大值的动作。


    我们现在介绍朴素深度 Q 学习算法，它使用（深度）神经网络来近似最优状态-动作值函数 `Q*`。其整体流程与使用线性方法近似 `Q*` 相同。区别在于如何计算梯度以及更新参数。如果我们使用像
    PyTorch 这样的深度学习框架软件，我们无需手动计算梯度，然后更新神经网络不同层的权重或偏置。相反，我们依赖这些工具（如使用反向传播和优化器）来自动为我们完成工作。我们只需要使用预测值和
    TD（时序差分）目标来计算损失，该损失衡量了预测值与智能体实际获得的奖励之间的差异。值得注意的是，这与 DeepMind 用于玩不同 Atari 游戏的 DQN
    智能体并非同一算法。要开发出相同的 DQN 智能体，我们需要对朴素深度 Q 学习算法进行一些改进。


    **算法 1：使用 ε-贪婪策略进行探索的朴素深度 Q 学习**


    ![一个算法，管理一个容量为 N 的回放缓冲区，允许向缓冲区添加和随机采样转换，并在必要时进行替换。](img/605748_1_En_7_Figaab_HTML.gif)


    我们在经典的推车杆任务上评估了朴素深度 Q 学习智能体的性能。结果如图 7.12 所示。为了评估智能体的性能，我们在每 20,000 个训练环境步骤后，在一个独立的评估环境中运行了
    20,000 个评估环境步骤（约 40 个回合），评估时的探索 epsilon 为 0.05。结果取五次独立运行的平均值，然后使用窗口大小为 5 的移动平均进行平滑处理。


    ![一个折线图绘制了评估回合回报与训练环境步骤的关系。一条线从 200 开始上升，并在 300 到 400 之间持续波动。](img/605748_1_En_7_Fig12_HTML.png)


    **图 7.12** 朴素深度 Q 学习智能体在推车杆任务上的性能。为了评估智能体的性能，我们在每 20,000 个训练环境步骤后，在一个独立的评估环境中运行了
    20,000 个评估环境步骤（约 40 个回合），评估时的探索 epsilon 为 0.05。结果取五次独立运行的平均值，然后使用窗口大小为 5 的移动平均进行平滑处理。我们在训练期间使用折扣
    `γ = 0.99`，学习率 `α = 0.00025`，并将探索率 `ε` 从 1.0 衰减到 0.1，衰减过程持续 100,000 个环境步骤


    结果表明，朴素深度 Q 学习智能体的整体性能比使用线性方法近似值函数更差。此外，该智能体在评估期间未能达到最大回合回报。有人可能会期望，如果我们尝试微调超参数（如学习率和探索率）会得到更好的结果，但朴素深度
    Q 学习智能体存在一些潜在问题，我们需要解决这些问题才能使其成为一个强大的智能体。

    '
- fmt: '# 7.5 Deep Q-Learning with Experience Replay and Target Network


    In machine learning, particularly in deep learning, we often rely on training
    data that is independent and identically distributed (IID). However, in reinforcement
    learning, consecutive states and reward signals in a sequence are often correlated.
    This is because an agent’s choice of action can affect future states and rewards,
    resulting in a non-IID dataset. Additionally, the naive deep Q-learning algorithm
    only uses each transition `(s, a, r, s'')` once to update the network parameters,
    leading to poor data efficiency.


    To address these issues, we can use a technique called experience replay, where
    we store the most recent *N* transitions `(s, a, r, s'')` in a ring buffer structure
    and randomly sample a mini-batch of transitions from the buffer during training.
    This allows the algorithm to reuse the same transitions multiple times, improving
    data efficiency. Moreover, by randomly sampling from a large pool of transitions,
    we break the correlations between consecutive states and rewards.


    However, using experience replay introduces a new challenge. Since the data in
    the buffer may come from a long time ago, the network parameters may have changed
    significantly since the data was collected. This can lead to training on samples
    generated under a different behavior policy, which is not ideal for on-policy
    learning algorithms like SARSA. Therefore, it is crucial to use an off-policy
    learning algorithm like Q-learning with experience replay.


    Implementing experience replay is straightforward. We need to allocate space for
    *N* transitions and add methods to add new transitions and randomly sample mini-batches
    from the buffer.


    **Algorithm 2: Uniform random experience replay**


    An algorithm performs Deep Q-Network training with experience replay, updating
    neural networks parameters using transitions from a replay buffer, and periodically
    updating a target network.


    However, experience replay is not the only technique used to improve deep Q-learning.
    Another key technique is the use of a target network. The target network is a
    separate copy of the Q-network that is periodically updated to match the Q-network’s
    parameters. This is done to prevent the algorithm from getting stuck in a feedback
    loop, where the Q-network’s estimates are used to update itself, leading to instability.
    By using a separate network for target values, we can reduce the variance in the
    target estimates and stabilize the learning process.


    In summary, experience replay and target network are two key techniques used to
    improve the performance and stability of deep Q-learning. By storing and reusing
    transitions in a buffer and using a separate network for target values, we can
    achieve better data efficiency and stability in our training process.


    To ensure the stability of training deep neural networks for Q-learning, a separate
    target network can be used to compute the TD target. The target network calculates
    the value of the next state-action pair and updates its parameters after a certain
    number of updates to the standard Q-network. This helps avoid the problem of using
    values from the standard Q-network as the TD target that are getting updated very
    frequently.


    The objective function for deep Q-learning with a target network is:


    ```

    J(θ) = (r_t + γ * max_{a''} Q̂(s_{t+1}, a''; θ^-) - Q̂(s_t, a_t; θ))^2

    ```


    Here, `θ` represents the parameters for the standard Q-network, and `θ^-` represents
    the parameters for the target network. Initially, the two networks have the same
    parameters. After every *C* number of updates to `θ`, `θ^-` is updated to `θ`.


    The DQN agent is a modified deep Q-learning algorithm with experience replay and
    target network. It starts by initializing the standard Q-network `θ` and the target
    network `θ^-` with the same parameters. A replay buffer *D* with a capacity of
    *N* is also initialized to store most recent N transitions.


    During training, the agent interacts with the environment using an `ε`-greedy
    policy with respect to the standard Q-network `θ`. Instead of computing the loss
    and performing stochastic gradient descent on the transition data, the agent stores
    the data in the replay buffer *D*. When the number of samples in the buffer *D*
    reaches a certain threshold *m* (where `m ≥ b`), the agent samples a mini-batch
    of transitions from *D* and uses them to compute the TD target and squared error
    loss. The loss is then optimized using stochastic gradient descent to update the
    parameters `θ` of the standard Q-network. The agent continues to interact with
    the environment using the updated `θ`, generating better quality training data.
    The agent then samples another mini-batch of transitions from *D* to continue
    learning. After every *C* updates to `θ`, `θ^-` is updated to `θ`.


    Although both experience replay and target network improve the performance of
    Q-learning, experience replay is generally more important. However, in practice,
    both techniques are usually used together when training deep Q-learning models.


    **Algorithm 3: [DQN] Deep Q-learning with experience replay and target network,
    using *ε*-greedy policy for Exploration**


    In episodic reinforcement learning problems, such as playing Atari games, terminal
    states represent the end of an episode sequence, after which the environment is
    reset to the initial state. One key consideration is how to handle mini-batch
    transitions that may contain one or more terminal states, since the value of a
    terminal state is always zero. When randomly sampling from the replay buffer during
    training, it is possible to select a mini-batch that includes one or more terminal
    states. To address this, there are different strategies that can be used.


    A diagram depicts a U-shaped curve illustrating the path of a bus as it progresses
    toward its destination.


    **Fig. 7.13**'
  raw: '## 7.5 Deep Q-Learning with Experience Replay and Target Network


    In machine learning, particularly in deep learning, we often rely on training
    data that is independent and identically distributed (IID). However, in reinforcement
    learning, consecutive states and reward signals in a sequence are often correlated.
    This is because an agent’s choice of action can affect future states and rewards,
    resulting in a non-IID dataset. Additionally, the naive deep Q-learning algorithm
    only uses each transition ![$$(s, a, r, s'')$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq96.png)
    once to update the network parameters, leading to poor data efficiency.


    To address these issues, we can use a technique called experience replay, where
    we store the most recent *N* transitions ![$$(s, a, r, s'')$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq97.png)
    in a ring buffer structure and randomly sample a mini-batch of transitions from
    the buffer during training. This allows the algorithm to reuse the same transitions
    multiple times, improving data efficiency. Moreover, by randomly sampling from
    a large pool of transitions, we break the correlations between consecutive states
    and rewards.


    However, using experience replay introduces a new challenge. Since the data in
    the buffer may come from a long time ago, the network parameters may have changed
    significantly since the data was collected. This can lead to training on samples
    generated under a different behavior policy, which is not ideal for on-policy
    learning algorithms like SARSA. Therefore, it is crucial to use an off-policy
    learning algorithm like Q-learning with experience replay.


    Implementing experience replay is straightforward. We need to allocate space for
    *N* transitions and add methods to add new transitions and randomly sample mini-batches
    from the buffer.


    Algorithm 2: Uniform random experience replay


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Figaac_HTML.gif) An algorithm performs
    Deep Q-Network training with experience replay, updating neural networks parameters
    using transitions from a replay buffer, and periodically updating a target network.


    However, experience replay is not the only technique used to improve deep Q-learning.
    Another key technique is the use of a target network. The target network is a
    separate copy of the Q-network that is periodically updated to match the Q-network’s
    parameters. This is done to prevent the algorithm from getting stuck in a feedback
    loop, where the Q-network’s estimates are used to update itself, leading to instability.
    By using a separate network for target values, we can reduce the variance in the
    target estimates and stabilize the learning process.


    In summary, experience replay and target network are two key techniques used to
    improve the performance and stability of deep Q-learning. By storing and reusing
    transitions in a buffer and using a separate network for target values, we can
    achieve better data efficiency and stability in our training process.


    To ensure the stability of training deep neural networks for Q-learning, a separate
    target network can be used to compute the TD target. The target network calculates
    the value of the next state-action pair and updates its parameters after a certain
    number of updates to the standard Q-network. This helps avoid the problem of using
    values from the standard Q-network as the TD target that are getting updated very
    frequently.


    The objective function for deep Q-learning with a target network is


    ![$$\displaystyle \begin{aligned} J(\boldsymbol{\theta}) = \Bigl( r_t + {\gamma}
    \max_{a''}\hat{Q}(s_{t+1}, a''; \boldsymbol{\theta}^-) - \hat{Q}(s_t, a_t; \boldsymbol{\theta})
    \Bigr)^2 {} \end{aligned} $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_Equ9.png)


    (7.9)


    Here, ![$$\boldsymbol {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq98.png)
    represents the parameters for the standard Q-network, and ![$$\boldsymbol {\theta
    }^-$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq99.png) represents
    the parameters for the target network. Initially, the two networks have the same
    parameters. After every *C* number of updates to ![$$\boldsymbol {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq100.png)
    , ![$$\boldsymbol {\theta }^-$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq101.png)
    is updated to ![$$\boldsymbol {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq102.png)
    .


    The DQN agent is a modified deep Q-learning algorithm with experience replay and
    target network. It starts by initializing the standard Q-network ![$$\boldsymbol
    {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq103.png)
    and the target network ![$$\boldsymbol {\theta }^-$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq104.png)
    with the same parameters. A replay buffer *D* with a capacity of *N* is also initialized
    to store most recent N transitions.


    During training, the agent interacts with the environment using an ![$$\epsilon
    $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq105.png) -greedy
    policy with respect to the standard Q-network ![$$\boldsymbol {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq106.png)
    . Instead of computing the loss and performing stochastic gradient descent on
    the transition data, the agent stores the data in the replay buffer *D*. When
    the number of samples in the buffer *D* reaches a certain threshold *m* (where
    ![$$m \geq b$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq107.png)
    ), the agent samples a mini-batch of transitions from *D* and uses them to compute
    the TD target and squared error loss. The loss is then optimized using stochastic
    gradient descent to update the parameters ![$$\boldsymbol {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq108.png)
    of the standard Q-network. The agent continues to interact with the environment
    using the updated ![$$\boldsymbol {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq109.png)
    , generating better quality training data. The agent then samples another mini-batch
    of transitions from *D* to continue learning. After every *C* updates to ![$$\boldsymbol
    {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq110.png)
    , ![$$\boldsymbol {\theta }^-$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq111.png)
    is updated to ![$$\boldsymbol {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq112.png)
    .


    Although both experience replay and target network improve the performance of
    Q-learning, experience replay is generally more important. However, in practice,
