    \ 3.33 | 0 |\n\n### Temporal Difference Policy Evaluation for State-Action Value\
    \ Function\n\nIn this section, we describe how to extend the `TD(0)` algorithm\
    \ to estimate the state-action value function `Q_π`. This is important because\
    \ we need `Q_π` to make better decisions using policy improvement, just like we\
    \ did with the Monte Carlo methods.\n\nRecall the Bellman expectation equation\
    \ for `Q_π`:\n\n```\nQ_π(s, a) = E_π[G_t | S_t=s, A_t=a]\n          = E_π[R_t\
    \ + γ R_{t+1} + γ^2 R_{t+2} + ... | S_t=s, A_t=a]\n          = E_π[R_t + γ G_{t+1}\
    \ | S_t=s, A_t=a]\n          = E_π[R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t=s, A_t=a]\n\
    ```\n\nHere, we use `R_t + γ Q_π(S_{t+1}, A_{t+1})` to replace the return `G_t`.\
    \ To estimate `Q_π`, we need to collect a tuple of `(s, a, r, s', a')` and update\
    \ the value based on the state-action pair `(s, a)`. The equation for updating\
    \ estimated values is\n\n```\nQ_π(S_t, A_t) = Q_π(S_t, A_t) + α( [R_t + γ Q_π(S_{t+1},\
    \ A_{t+1})] - Q_π(S_t, A_t) )\n```\n\nThe overall process is very similar to `TD(0)`\
    \ policy evaluation for `V_π`, but there are some key differences:\n\n*   We need\
    \ to collect tuples of `(s, a, r, s', a')` instead of `(s, a, r, s')` to estimate\
    \ `Q_π`.\n*   The value update is based on the state-action pair `(s, a)`.\n\n\
    By estimating the state-action value function `Q_π`, we can make better decisions\
    \ using policy improvement. `Q_π` tells us the expected value of taking a particular\
    \ action in a given state, which is important information for choosing actions\
    \ that lead to higher rewards. Moreover, `Q_π` is related to the value function\
    \ `V_π`, which tells us the expected value of being in a given state and taking\
    \ actions according to a given policy `π`. Specifically, `V_π` can be expressed\
    \ as the expected value of `Q_π` over all possible actions, weighted by the probability\
    \ of taking each action under the policy `π`."
