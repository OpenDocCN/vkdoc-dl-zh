    是子节点 *j* 被访问的次数。*C* 是一个常数，用于控制搜索过程中的探索程度。如果多个子节点具有相同的最大值，通常通过随机选择其中一个节点来打破平局。与`UCB1`一样，当![$$n_j=0$$](img/605748_1_En_14_Chapter_TeX_IEq30.png)时，`UCB`值变为![$$\infty
    $$](img/605748_1_En_14_Chapter_TeX_IEq31.png)。这确保了在进一步扩展之前，一个节点的所有子节点至少被访问一次。


    为了理解`UCT`在实践中如何工作，让我们考虑一个游戏，其中玩家在棋盘上移动一个棋子。玩家每回合可以从几个可能的移动中选择，但不知道哪个移动是最好的。目标是找到导致最佳结果（例如，赢得游戏）的移动序列。


    在搜索过程中，`UCT`算法维护一个游戏状态和可能移动的树，每个节点代表一个游戏状态，每条边代表一个可能的移动。搜索从根节点开始，根节点代表游戏的当前状态。在每一步，算法根据`UCB`分数选择一个子节点进行扩展，并持续进行直到到达叶节点。


    一旦到达叶节点，就会执行一次模拟或推演，直到游戏达到终止状态。然后，模拟结果值会沿着所经过的路径反向传播回树中，更新路径上每个节点的`UCB`分数。这使得算法能够逐步改进对每个可能移动价值的估计，并更彻底地探索有希望的移动。


    使用`UCT`算法选择最佳子节点的伪代码如算法 2 所示，其中![$$\nu $$](img/605748_1_En_14_Chapter_TeX_IEq32.png)是树中的一个节点，![$$\nu
    ''$$](img/605748_1_En_14_Chapter_TeX_IEq33.png)是节点![$$\nu $$](img/605748_1_En_14_Chapter_TeX_IEq34.png)的一个子节点，*c*
    是如公式(14.2)所示的一个常数。


    **算法 2: UCT—最佳子节点**


    ![](img/605748_1_En_14_Figaab_HTML.gif) 一个用于`UCT`最佳子节点的搜索算法，包含`bestChild`函数。`nu`和`c`是要传递的参数。


    然后，我们可以将上述`UCT`算法插入到通用的`MCTS`算法中，这为我们提供了一个强大的框架，用于在强化学习问题中平衡探索和利用。通过使用这些算法，智能体可以通过探索新动作，同时利用已被证明有效的动作，逐步提高其性能。


    ### 双人零和游戏的 MCTS


    前面讨论的通用`MCTS`算法适用于智能体做出所有动作的单人游戏。然而，对于像国际象棋或围棋这样的双人零和游戏，情况变得更加复杂。这是因为在反向传播模拟结果![$$\Delta
    $$](img/605748_1_En_14_Chapter_TeX_IEq35.png)时，我们需要考虑两个玩家的视角。


    在双人零和游戏中，游戏的结果总是零和结果，这意味着一个玩家获胜，另一个玩家必须失败。因此，我们需要分别计算每个玩家的奖励。例如，在一盘国际象棋中，如果我们使用`MCTS`为黑方玩家规划下一步，并且模拟结果导致黑方获胜，那么我们应该为搜索树遍历路径中代表黑方回合的所有边分配+1
    的奖励。然而，对于白方，奖励应为-1，因为这个结果代表白方失败。


    一种解决方案是为对手玩家切换![$$\Delta $$](img/605748_1_En_14_Chapter_TeX_IEq38.png)的符号，以准确反映游戏的性质。这是因为在双人零和游戏中，一个玩家的胜利总是另一个玩家的失败。因此，对两个玩家使用相同的![$$\Delta
    $$](img/605748_1_En_14_Chapter_TeX_IEq39.png)无法准确表示游戏的结果。


    图 14.5 展示了一个基于玩具游戏井字棋的`MCTS`如何反向传播模拟结果的示例。在这个游戏中，两个玩家轮流在一个三乘三的网格上落子。一个玩家下 X，另一个玩家下
    O。第一个在水平、垂直或对角线上连成三子的玩家获胜。如果棋盘填满且没有玩家连成三子，则游戏为平局。


    ![](img/605748_1_En_14_Fig5_HTML.png)


    基于玩具游戏井字棋的双人零和游戏的十张图示，包含四个层级，分别是 X 移动、O 移动、X 移动和 O 移动。


    **图 14.5** 基于玩具游戏井字棋的通用`MCTS`如何为双人零和游戏反向传播模拟结果的示例


    为简单起见，我们只关注如何从导致终止状态的节点（即图 14.5 中标有游戏获胜者的节点）反向传播结果，并忽略搜索树中的所有中间节点。


    用于双人零和游戏反向传播的一个简单伪代码如算法 3 所示，其中我们在每次使用模拟结果![$$\Delta $$](img/605748_1_En_14_Chapter_TeX_IEq40.png)更新搜索树统计信息时，都会切换其符号。


    **算法 3: 双人零和游戏的 MCTS 反向传播**


    ![](img/605748_1_En_14_Figaac_HTML.gif) 一个用于双人零和游戏的`MCTS`反向传播的搜索算法，包含`backup`函数。`nu`和`delta`是要传递的参数。


    一旦我们计算了遍历路径中节点的值，考虑如何计算双人零和游戏的均值就很重要了。与单人游戏中搜索树中的所有节点都为同一玩家存储值不同，在双人游戏中，子节点的高值可能并不代表父节点的最佳利益。这是因为双人游戏中节点的值取决于轮到哪个玩家。


    例如，考虑井字棋游戏。假设当前玩家是 X，搜索算法正在评估一个潜在的移动，该移动会导致 X 有两子连成一线而 O 有一子连成一线的位置。从 X 的角度来看，这是一个好位置，应该具有高值。然而，从
    O 的角度来看，这个位置很糟糕，应该具有低值。因此，在计算该节点的均值时，我们需要考虑轮到谁，以及节点的值是如何基于该视角计算的。


    总之，当使用`MCTS`进行双人零和游戏时，仔细考虑如何更新搜索树中节点的统计信息以及计算其子节点的均值至关重要。这是因为每个节点的值代表了玩家如果选择该节点并最优地玩下去所能获得的预期奖励。

    '
- fmt: '# 14.3 AlphaZero


    In October 2015, DeepMind’s AI agent `AlphaGo` made history by beating the European
    champion Fan Hui in a five-game Go match. `AlphaGo` won all five games, becoming
    the first computer Go program to beat a professional human player on a full-sized
    board without handicap. In March 2016, another version of `AlphaGo`, called `AlphaGo
    Lee`, defeated the legendary Korean player Lee Sedol with a score of 4-1 in a
    five-game Go match.


    `AlphaGo` was trained using a combination of deep neural networks, supervised
    learning, reinforcement learning, and Monte Carlo Tree Search (`MCTS`) for search
    and planning. During actual gameplay, `AlphaGo` also uses `MCTS` for online planning.


    The training process for `AlphaGo` can be divided into two phases:


    - **Phase one**: Trains a policy network `P_s` and a value network `V_s` using
    30 million positions from the KGS Go Server. This phase uses pure supervised learning,
    with classification used to train `P_s` and regression used to train `V_s`. The
    policy network `P_s` outputs the action probability for a given board position,
    and the value network `V_s` outputs the evaluation of the board from the current
    player’s perspective. Additionally, a smaller but faster policy network `P_rollout`
    is trained. This faster policy network has much lower accuracy compared to `P_s`
    and is only used in phase two during self-play (as the rollout policy for `MCTS`
    simulation). Phase one continues until the networks `P_s` and `V_s` can correctly
    predict the human expert moves in a separate test set to a certain threshold (e.g.,
    55%).


    - **Phase two**: Trains the policy network `P` and value network `V` using reinforcement
    learning over millions of self-play games. Initially, `P = P_s` and `V = V_s`,
    and multiple actors run in parallel to generate self-play games, the policy network
    `P` is used during the `MCTS` search when these games are generated. In addition,
    the faster sample policy network `P_rollout` from phase one is also used to sample
    actions during the `MCTS` simulation phase.


    In 2017, DeepMind developed a new agent called `AlphaGo Zero`, which is an enhancement
    to `AlphaGo` and is much stronger than its predecessor. `AlphaGo Zero` achieves
    stronger play in Go than its predecessor, while it is trained using only reinforcement
    learning and moves from pure self-play games. It also simplifies the training
    process by eliminating supervised learning and uses a much simpler neural network
    architecture (a single neural network with shared weights and multiple heads,
    instead of separate networks).


    In late 2017, DeepMind developed a new agent called `AlphaZero`, which is a single
    system that taught itself from scratch how to master the games of Chess, Shogi,
    and Go, beating a world-champion computer program in each case. This new `AlphaZero`
    agent is a generalization of its predecessor, `AlphaGo Zero`, which can only play
    the game of Go.


    To summarize, `AlphaZero` is considered a state of the art for challenging two-player
    zero-sum games such as Go, Chess, and Shogi. It is trained using only reinforcement
    learning and moves from pure self-play games, without any human supervision other
    than the basic rules of the game. During actual gameplay, `AlphaZero` also uses
    `MCTS` for online planning. The training process involves millions of self-play
    games. The policy network outputs the action probability for a given board position,
    and the value network outputs the evaluation of the board from the current player’s
    perspective.


    In the upcoming sections of this chapter, our attention will be directed toward
    the intricacies of the `AlphaZero` agent and its corresponding paper. However,
    it is important to acknowledge that specific components, such as the neural network
    structure and the `MCTS` search algorithm, were originally introduced and extensively
    examined in the `AlphaGo Zero` paper.'
