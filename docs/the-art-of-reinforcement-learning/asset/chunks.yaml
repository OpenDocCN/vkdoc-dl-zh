    # 将熵纳入基于策略的方法


    为了将熵纳入基于策略的方法算法中，它被作为一项额外的项添加到训练期间优化的目标函数中。该目标函数通常包含用于最大化期望累积奖励的策略梯度项，而熵项则会对低熵策略进行惩罚。这些项的相对权重可以通过系数
    `w` 来控制，以平衡探索与利用，如公式 (9.30) 所示，其中 `H(π(s_t; θ))` 是使用公式 (9.29) 针对特定状态 `s_t` 相对于策略
    `π_θ` 计算出的熵。


    ```

    ∇_θ J(θ) = Σ_{t=0}^{N} γ^t (G_t - V_π(s_t)) ∇_θ log π(a_t|s_t; θ) + w H(π(s_t;
    θ))

    ```


    (9.30)


    熵项中熵系数 `w` 的值取决于具体问题，需要通过实验来找到最优值。该系数决定了策略中探索与利用之间的平衡，较大的熵系数会鼓励更多的探索。


    熵系数的一个良好起点大约在 0.01 到 0.1 之间，我们可以根据算法的性能逐渐增大或减小该值。如果熵系数太小，智能体可能探索不足；如果太大，智能体可能过度探索而无法收敛到最优策略。


    在实践中，有时也可以对熵系数采用衰减计划，即熵系数初始值较高，然后随着智能体学习到更好的策略而逐渐降低。这种方法有助于智能体在学习初期进行更多探索，并在后期收敛到更优的策略。


    使用熵损失来鼓励探索的 Actor-Critic 算法训练过程，与算法 4 中展示的标准 Actor-Critic 算法几乎相同。唯一的区别在于，计算策略梯度时，我们需要使用公式
    (9.30) 添加熵损失。更准确地说，我们将使用以下更新规则来累积关于 `θ` 的策略梯度：


    ```

    g_π ← g_π + α δ_j ∇_θ log π(a_j|s_j; θ) + w H(π(s_j; θ))

    ```


    图 9.6 展示了 Actor-Critic 智能体在 Atari 视觉复杂游戏 Pong 上的性能。结果显示了平均回合回报（总未折扣奖励）和 95% 的置信区间。为了评估智能体的性能，我们在每次训练迭代结束时，在一个独立的测试环境中使用贪婪策略运行了
    200,000 个评估步骤，每次训练迭代包含 250,000 个训练步骤或 100 万帧画面。评估环境中未应用奖励裁剪或生命损失时的软终止。结果取三次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    一张评估回合回报相对于训练环境帧数的折线图。它绘制了一条水平延伸并呈下凹递增曲线的线。估计值分别为（1000 万，-20）、（2000 万，0）和（3000
    万，15）。


    **图 9.6** 在 Atari 视频游戏 Pong 上的 Actor-Critic 算法。结果显示了平均回合回报（总未折扣奖励）和 95% 的置信区间。结果取三次独立运行的平均值，然后使用窗口大小为
    5 的移动平均进行平滑处理。


    我们使用了与 DQN 类似的神经网络架构；不过，我们采用的是共享神经网络架构。该网络有两个输出头：一个用于动作概率，一个用于状态值。我们使用折扣率 `γ =
    0.99`、学习率 `α = 0.00025`、熵权重 0.025 以及序列长度 128。


    我们使用与 DQN 相同的环境处理方式，包括将帧调整为 `84 × 84` 并将其转换为灰度图。我们还应用了跳跃动作技术，即每四帧只处理一帧，并堆叠最后四帧以创建大小为
    `84 × 84 × 4` 的最终状态图像。


    此外，我们将奖励值裁剪到 `-1` 到 1 的范围内，并将失去一条命视为软终止状态。


    ## 熵损失的优势


    当环境复杂时，熵损失在提升强化学习智能体性能方面尤其有用。在此类场景中，智能体可能难以探索并发现最优策略，因为奖励信号不足以引导智能体走向目标。


    在这种情况下，使用熵损失作为正则化项可以鼓励智能体进行更广泛的探索、采取更多样化的动作，并学习到更鲁棒的策略。这种探索对于发现对实现最终目标至关重要的状态空间区域特别有用。


    此外，当最优策略是随机的或需要一定程度的随机性才能有效时，熵损失尤其有用。在这些情况下，强制高熵可以帮助智能体学习到更优的策略，该策略会考虑到环境固有的随机性。

