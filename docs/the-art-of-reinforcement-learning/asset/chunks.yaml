    `S_{t+1}` 选择具有最高 Q 值的动作，记为 `max_a'' Q(S_{t+1}, a'')`，而 SARSA 则从策略中采样一个动作。这是因为
    Q-learning 是一种离策略算法，它基于最佳可能动作更新 Q 值，而 SARSA 是一种在策略算法，它基于实际采取的动作更新 Q 值。


    Q-learning 算法的伪代码如算法 7 所示。与 SARSA 一样，Q-learning 对超参数敏感，例如步长 `α` 和 `ε`-贪心策略的探索率
    `ε`。步长决定了算法更新 Q 值的速度，而探索率决定了算法探索新动作（而非利用当前最佳动作）的频率。


    **算法 7：** 带 `ε`-贪心探索的 Q-learning


    [图：一个 10 行算法，标题为“带 epsilon 减贪心探索的 Q-learning”，输入为折扣率 gamma、初始探索率 epsilon、步长 alpha
    和步数 K，输出为估计的最优状态-动作值函数 Q。]

    '
- fmt: "### Worked Example\n\nLet’s look at an example of how Q-learning would update\
    \ the value for a state-action pair `(s, a)`. Again, we will be using the service\
    \ dog MDP. But in this case, we use the state-action values for a random policy\
    \ computed using TD(0) policy evaluation from Fig. 5.2. We only focus on how the\
    \ algorithm would compute the value for state *Room 1* and action *Go to room2*\
    \ (Fig. 5.6).\n\n![](images/605748_1_En_5_Chapter/605748_1_En_5_Fig6_HTML.png)\n\
    \nA flowchart for the computation of state-action values by Q-learning flows through\
    \ rooms 1, 2, and 3 to reach the found item. Room 3 reverts to room 2 and room\
    \ 2 reverts to room 1. Room 2 points to outside via `r = 0`, `q pie = negative\
    \ 2.94`. Outside reverts to room 2 via `r = 0`. Outside circles back to itself\
    \ via `r = negative 1`.\n\n**Fig. 5.6** Example of how Q-learning computes state-action\
    \ values for the service dog MDP. The values for actions in state *Room 2* are\
    \ borrowed from Fig. 5.2.\n\nSuppose the agent took action *Go to room2* when\
    \ in state *Room 1* and received a reward signal of `-1` and successor state *Room\
    \ 2* from the environment. We use the following variables and parameters:\n\n\
    - `Q(s, a)`: The value of state-action pair `(s, a)`\n- `α = 0.1`: The step size\n\
    - `γ = 0.9`: The discount factor\n\nThe estimated state-action values for state\
    \ *Room 2* and actions *Go to room1*, *Go to room3*, *Go outside* are `-4.32`,\
    \ `1.98`, `-2.94`. The initial estimated value for state-action pair *Room 1*\
    \ and *Go to room2* is `0`.\n\nHow would the Q-learning algorithm estimate the\
    \ (optimal) value for state-action pair *Room 1* and *Go to room2*? We can plug\
    \ in those numbers directly into Eq. (5.15). The only thing we need to specify\
    \ is the value for the successor state-action pair. In Q-learning, we look for\
    \ the maximum value over all actions for the successor state. In this case, this\
    \ value is `1.98` for action *Go to room3*. We can compute the value for state-action\
    \ pair *Room 1* and *Go to room2* as follows:\n\n```\nQ(Room 1, Go to room2) =\
    \ 0 + 0.1 * (-1 + 0.9 * 1.98 - 0) \n                       = 0.078\n```\n\nWe\
    \ conducted experiments to evaluate the performance of the Q-learning algorithm\
    \ on our service dog MDP, using the same experimental setup as our previous experiments\
    \ with SARSA. The goal of these experiments was to compare the performance of\
    \ Q-learning and SARSA on this particular MDP.\n\nWe used the following variables\
    \ and parameters in our experiments:\n\n- `α = 0.01`: The step size used in the\
    \ Q-learning algorithm\n- `γ = 0.9`: The discount factor applied to future rewards\n\
    - `ε = 1.0`: The exploration rate that determines the probability of choosing\
    \ a random action\n\nTo reduce the exploration rate over the course of the learning\
    \ process, we applied a linear decay schedule that reduced the rate from its initial\
    \ value of `1.0` to a final value of `0.01`.\n\nAs shown in Table 5.3, the Q-learning\
    \ algorithm found the optimal policy after 500 updates to the value function.\
    \ It also found the optimal value function `V*` after about 20,000 updates, which\
    \ is much faster than SARSA’s 50,000 updates as shown in Table 5.2. However, it\
    \ is important to note that the optimal value function found by SARSA still did\
    \ not perfectly match the true optimal value function, despite running more updates.\
    \ This suggests that Q-learning can converge more quickly than SARSA, and produces\
    \ better results.\n\n## 5.7 Double Q-Learning\n\nDouble Q-learning is a method\
    \ that addresses a small issue with Q-learning, where the estimated optimal state-action\
    \ value `Q*` could be biased. This is due to the nature of the value update process,\
    \ which always uses the action that yields the maximum value for the successor\
    \ state `s'`. In some stochastic environments, this approach can lead to problems,\
    \ as explained in detail by Hado Hasselt [4].\n\n![](images/605748_1_En_5_Chapter/605748_1_En_5_Fig7_HTML.png)\n\
    \nA flowchart for the Casino slot machine MDP starts with the center hall pointing\
    \ to the left and right areas. The left area points to A-L, B-L, and C-L via `r\
    \ = 0, 0.1`. The right area points to A-R, B-R, and C-R via `r = negative 1, 5`.\n\
    \n**Fig. 5.7** Casino slot machines MDP, only showing three slot machines from\
    \ each side\n\n**Table 5.3** Optimal state value for the service dog MDP after\
    \ running the Q-learning algorithm for different numbers of updates, `γ = 0.9,\
    \ α = 0.01`, decay `ε` from `1.0` to `0.01`. The last row contains true `V*` computed\
    \ using DP policy iteration.\n\n| Number of updates | Room 1 | Room 2 | Room 3\
    \ | Outside | Found item |\n| --- | --- | --- | --- | --- | --- |\n| 100 | −0.12\
    \ | 0.0 | 0.45 | 0.0 | 0 |\n| 1000 | 0.95 | 4.09 | 8.25 | 0.22 | 0 |\n| 10,000\
    \ | 6.2 | 8.0 | 10.0 | 7.05 | 0 |\n| 20,000 | 6.2 | 8.0 | 10.0 | 7.2 | 0 |\n|\
    \ 50,000 | 6.2 | 8.0 | 10.0 | 7.2 | 0 |\n| DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |"
