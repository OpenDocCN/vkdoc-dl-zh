  trans: '

    ### 环境预处理


    雅达利游戏是一类确定性的、情节式的强化学习问题。屏幕图像（即帧）被用作环境状态，情节序列的时间步长由游戏的不同帧来衡量。然而，这种方法存在一个问题：单帧图像不具备马尔可夫性质。为了理解这个问题，我们来看一下《打砖块》视频游戏中的一帧，如图
    7.16 所示。从这一帧中，很难判断球（屏幕左中部的小红块）的运动方向。它可能正在向上移动，因为智能体刚刚用球拍击中了球；也可能是在撞到右侧墙壁后，从右角落下落。问题在于，这一帧包含的信息不足以完整描述球的运动方向或轨迹。


    马尔可夫性质（在第 2 章中介绍）指出，后继状态 `s_{t+1}` 仅依赖于当前状态 `s_t` 和动作 `a_t`，而不依赖于所有先前的状态和动作 `(s_0,
    a_0, s_1, a_1, ..., s_t, a_t)`。然而，在这种情况下（如图 7.16 所示），后继状态 `s_{t+1}` 依赖于过去的信息。例如，如果球正从右角落向下移动，而智能体选择将球拍向右移动，它可能会错过球，这将导致负面后果（失去一条命）。但是，如果球正在向上移动，而智能体同样将球拍向右移动，智能体则可能获得一些奖励，因为球很可能会击中顶部墙壁。对于相同的单帧和动作，智能体可能会得到不同的后继状态和奖励。


    解决这个问题的一个方法是将过去的帧叠加起来。图 7.17 展示了一个示例，通过叠加过去的 28 帧来构建一张图像。现在，我们可以判断出球在击中右侧墙壁后正朝向屏幕底部移动。


    ![](img/605748_1_En_7_Fig16_HTML.png)


    一幅插图展示了一个视频游戏，顶部有一组方块，一个小球在方块上随机移动，最终落到底部的一条水平面上。


    图 7.16 《打砖块》视频游戏单帧示例


    然而，将所有历史帧都叠加起来对空间和计算效率并不友好，因为大多数雅达利游戏可能持续数百万帧。这些游戏大多每秒生成 30 到 60 帧，且游戏中的运动非常简单，因此连续两帧之间的变化非常微小，我们几乎无法分辨它们是否不同。DQN
    使用一种称为“动作重复”（有时也称为跳帧）的技术来解决这个问题。通过这种技术，智能体在与环境交互时，会将同一个动作重复执行 `k` 次（默认 `k=4`）。在每个情节开始时，智能体根据网络
    `theta` 的 `epsilon`-贪心策略选择某个动作 `a`，然后在与环境交互的过程中将同一个动作 `a` 重复执行 `k` 次（终止状态除外，该状态不需要重复动作）。在第
    `k+1` 帧时，智能体选择另一个动作 `a''`，并将 `a''` 重复执行 `k` 次。这个过程不断重复，直到情节终止。结果，智能体只看到来自环境的每第
    `k` 帧，从而高效地跳过了 `(k-1)/k` 百分比的帧处理。仅这一项简单的技术就能为智能体节省大量的空间和计算时间。


    图 7.18 展示了一个 `k=4` 的动作重复示例，其中灰色显示的帧代表通过重复相同动作而跳过的帧。


    最后，为了确保环境状态具有马尔可夫性质，同时节省计算和空间，DQN 使用了最近四帧的历史记录（在应用了动作重复和跳帧之后）。这四帧被叠加在一起，如图 7.19
    所示，以构建一张代表环境状态的图像。在输入神经网络之前，图像从 `160 x 210 x 3`（雅达利帧的默认尺寸）缩小到 `84 x 84 x 3`，然后转换为灰度图以节省额外的计算。这种缩小尺寸和灰度转换有助于通过减小输入数据的大小来加速训练过程。最后，输入数据通过除以
    255 进行归一化，使得数据范围在 [0, 1] 之间，然后再传递给神经网络进行处理。


    ![](img/605748_1_En_7_Fig17_HTML.png)


    一张带有叠加帧的视频游戏图像。顶部呈现了从底部碎裂的俄罗斯方块。下半部分展示了一个向下移动的小球，朝向底部的一个小水平面。


    图 7.17 将过去 28 帧叠加在一起，为《打砖块》视频游戏构建单张图像的示例


    总之，DQN 为雅达利游戏使用的预处理步骤包括：动作重复、跳帧、帧叠加、尺寸缩小、灰度转换和归一化。这些步骤有助于减轻处理数百万帧的计算负担，并使神经网络能够从输入数据中高效学习。


    图 7.19 展示了在《打砖块》视频游戏中，使用动作重复（跳帧）为 4 后，叠加最后四帧的示例。

    '
- fmt: 'There are various modifications we can apply to the standard Atari game environment
    to improve the learning progress of the `DQN` agent. For example, we can treat
    the loss of a life as a soft-terminal state, which means that we only use the
    reward as the TD target, without bootstrapping by using the discounted value from
    the successor state. In a soft-terminal state, the game environment does not reset.
    Another method is to randomize the initial state of each episode by applying some
    no-ops action for some steps can also be effective in improving the agent’s learning
    progress. Additionally, clipping the rewards in the range of `[-1, 1]` is often
    necessary, especially for games with very large reward signals. For instance,
    some games may have rewards in the hundreds or thousands, which can overwhelm
    the learning process and make it difficult for the agent to converge to an optimal
    policy.


    ![15 set of game illustration where 4 game panels are active other are disabled.](images/605748_1_En_7_Chapter/605748_1_En_7_Fig18_HTML.png)


    **Fig. 7.18** Example of action repeat `k=4` for the Breakout video game; grayed-out
    frames represent the frames that are skipped by the agent


    ### Convolutional Neural Network


    The `DQN` agent uses a very simple convolutional neural network. It consists of
    three convolutional layers; the input data to the neural network is an `84 × 84
    × 4` image. The first hidden convolutional layer has 32 filters with kernel size
    `8 × 8` and stride 4. This means the output feature maps will have 32 channels
    for the first hidden layer. The second hidden convolutional layer has 64 filters
    with kernel size `4 × 4` and stride 2. And the third hidden convolutional layer
    has 64 filters with kernel size `3 × 3` and stride 1. We apply a `ReLU` activation
    function after each of these three convolutional layers. The feature maps from
    the last convolutional layer are then flattened and fed into a fully connected
    layer with 512 units; after that, we apply a `ReLU` activation function. The output
    from the fully connected layer is then fed into the output layer which has `N`
    units and no activation function. Here, `N` is the number of valid actions for
    the individual Atari game, which can vary between 4 and 18 depending on the game.
    Figure [7.20](#605748_1_En_7_Chapter.xhtml#Fig20) illustrates the network architecture.
    Notice we only take the environment state `s` as input to the neural network,
    which is a `84 × 84 × 4` image and output a vector contains state-action values
    for each valid action, for the input state `s`.


    Why don’t we use an activation function for the final output layer? Most activation
    functions will transform the value in some form. But the value for an arbitrary
    state-action pair could be any real number `(s, a) ∈ ℝ`. And the limits for the
    minimum or maximum value for these different Atari games are not the same. To
    reuse the same neural network for these games, it’s best to not transform the
    values from the output layer.


    ![An illustration depicts a video game with a set of blocks at the top layer,
    where 4 tiny ball moves linear over the blocks, occasionally overlapping them
    in a line and eventually drops down to a flat surface at the bottom line.](images/605748_1_En_7_Chapter/605748_1_En_7_Fig19_HTML.png)


    **Fig. 7.19** Example of stacking last four frames after action repeat `k=4` for
    the Breakout video game'
