- fmt: "一旦智能体为每个状态计算出了新的价值估计，它就会使用这些更新后的值开始新一轮迭代。虽然估计值最终会收敛到策略`π`的真实值，但在实践中，我们必须在此之前决定何时停止算法。为了判断算法何时收敛到价值函数的精确估计，我们比较每个状态`s`的更新值`V_π(s)`与先前估计值之间的绝对差值，并记录每次迭代中所有状态的最大绝对差值。在完成对所有状态的一轮完整迭代后，我们将最大绝对差值与一个小的阈值`ε`进行比较。如果这个最大绝对差值小于`ε`，我们就认为算法已经收敛并终止循环。\n\
    \n将所有状态的估计值存储在一个数组中，可以加速评估过程，因为它允许我们原地更新这些值。这意味着我们可以更新某个特定状态的价值函数估计，然后立即在后续计算中使用更新后的值，而无需将其复制到新的数据结构中。\n\
    \n相反，如果我们将每个状态的估计值存储在单独的数据结构中，那么每次更新都需要将更新后的值从一个数据结构复制到另一个。这种复制操作在计算上可能非常昂贵，尤其是在状态数量很多的情况下。\n\
    \n此外，将所有状态的值存储在一个数组中，还可以使代码更简单、更易读。遍历单个数组比跟踪每个状态的多个数据结构要容易得多。\n\n总的来说，将所有状态的估计值存储在一个数组中，是一种实用的优化方法，既能提高代码速度，也能提升代码清晰度。\n\
    \n### 工作示例\n\n让我们使用策略评估算法，为服务犬MDP的一个（固定的）随机策略`π`估计状态价值函数`V_π`。图3.2中显示的值是使用折扣因子0.9和阈值`1e-5`计算得出的。\n\
    \n值得注意的是，无论输入策略是最优的还是随机的，终止状态的价值始终为零。这是因为状态价值函数衡量的是从状态`s`开始，遵循策略`π`的期望回报。由于环境到达终止状态后没有即时奖励或后续状态，其价值始终为零。\n\
    \n## 3.3 策略改进\n\n强化学习的最终目标是找到最优策略`π*`，该策略能最大化整个状态空间中所有状态的期望回报。然而，对于具有大规模状态和动作空间的MDP，逐一搜索整个策略空间以找到`π*`是不可行的。幸运的是，有一种更高效的方法来改进给定策略，这被称为策略改进。\n\
    \n策略改进背后的思想很简单。我们不是一次性寻找最优策略，而是通过修改当前策略，使其相对于当前策略的估计状态-动作价值函数`Q_π`变得更贪婪，从而迭代地对当前策略进行微小且渐进的改进。如果修改后的策略至少对一个状态有更高的期望回报，那么它一定优于原始策略。这是策略改进背后的关键概念，并基于以下定理：\n\
    \n图3.2 服务犬MDP随机策略`π`的状态价值，`γ=0.9`且`ε=1e-5`\n\n对于任意两个确定性策略`π`和`π'`，`π'`至少与`π`一样好，当且仅当对于所有状态`s\
    \ ∈ S`，有`V_π'(s) ≥ V_π(s)`。\n\n这里，`V_π(s)`是状态`s`在策略`π`下的估计值。换句话说，如果一个修改后的策略至少对一个状态增加了期望回报，那么它就优于原始策略。\n\
    \n这就是我们需要使用状态-动作价值函数`Q_π(s, a)`的地方，因为状态价值函数`V_π(s)`无法告诉我们，当智能体处于状态`s`并遵循策略`π`时，哪个动作更好。我们已经在第2章中介绍了`Q_π`的贝尔曼方程。以下是快速回顾。\n\
    \n```\nQ_π(s, a) = R(s, a) + γ E_π[Q_π(s', a') | S_{t+1}=s', A_{t+1}=a']\n   \
    \       = R(s, a) + γ Σ_{s'∈S} P(s'|s, a) Σ_{a'∈A} π(a'|s') Q_π(s', a'), 对于所有\
    \ s∈S, a∈A\n```\n(3.3)"
  raw: 'Once the agent has computed new estimates for the value of each state, it
    begins a new iteration with these updated values. While the estimated values will
    converge to the true values for the policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq54.png)
    in the limit, in practice we must decide when to stop the algorithm before this
    point. To determine when the algorithm has converged to an accurate estimate of
    the value function, we compare the absolute difference between the updated value
    ![$$V_\pi (s)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq55.png)
    and the previous estimate for each state *s* and keep track of the maximum absolute
    difference across all states in each iteration. After completing one full iteration
    over all states, we compare the maximum absolute difference to a small threshold
    ![$$\epsilon $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq56.png)
    . If this maximum absolute difference is smaller than ![$$\epsilon $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq57.png)
    , we consider the algorithm to have converged and terminate the loop.


    Storing the estimated values for all states in a single array can speed up the
    evaluation process because it allows us to update the values in place. This means
    that we can update the estimate of the value function for a particular state and
    then immediately use the updated estimate in subsequent calculations without having
    to copy it to a new data structure.


    In contrast, if we stored the estimated values for each state in a separate data
    structure, we would need to copy the updated value from one data structure to
    another for each update. This copying operation could be computationally expensive,
    especially if we have a large number of states.


    In addition, storing the values for all states in a single array can also make
    the code simpler and easier to read. It is easier to iterate over a single array
    than to keep track of multiple data structures for each state.


    Overall, storing the estimated values for all states in a single array can be
    a practical optimization that improves both the speed and clarity of the code.


    ### Worked Example


    Let’s use the policy evaluation algorithm to estimate the state value function
    ![$$V_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq58.png)
    for a (fixed) random policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq59.png)
    for the service dog MDP. The values shown in Fig. [3.2](#605748_1_En_3_Chapter.xhtml#Fig2)
    were computed using a discount factor of 0.9 and a threshold of ![$$1e-5$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq60.png)
    .


    It’s worth noting that the value for the terminal state is always zero, regardless
    of whether the input policy is optimal or random. This is because the state value
    function measures the expected return starting from state *s* under policy ![$$\pi
    $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq61.png) . As there
    are no immediate rewards or successor states after the environment reaches the
    terminal state, its value is always zero.


    ## 3.3 Policy Improvement


    The ultimate goal of reinforcement learning is to find the optimal policy ![$$\pi
    _{\ast }$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq62.png)
    that maximizes the expected return for all states in the entire state space. However,
    searching the entire policy space one by one to find ![$$\pi _{\ast }$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq63.png)
    is infeasible for MDPs with large state and action spaces. Fortunately, there
    is a more efficient way to improve a given policy, which is called policy improvement.


    The idea behind policy improvement is simple. Instead of searching for the optimal
    policy in one go, we iteratively make small and incremental improvements to the
    current policy by modifying the policy to be greedier with respect to the estimated
    state-action value function ![$$Q_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq64.png)
    for the current policy. If a modified policy has higher expected returns for at
    least one state, it is guaranteed to be better than the original policy. This
    is the key concept behind policy improvement, and it is based on the following
    theorem:


    ![](images/605748_1_En_3_Chapter/605748_1_En_3_Fig2_HTML.png)


    A nodal map for the state value runs as follows. Negative 2.7, negative 1.9 via
    r = negative 1, 3.2 via r = negative 1, and 0.0 via r = 10\. Negative 1.9 points
    to negative 3.3 via r = 0\. Negative 3.3 points to negative 1.9 and circles back
    to itself via r = 0 and r = negative 1, respectively.


    Fig. 3.2


    State value for random policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq65.png)
    for the service dog MDP, ![$${\gamma }=0.9$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq66.png)
    and ![$$\epsilon =1e-5$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq67.png)


    For any two deterministic policies ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq68.png)
    and ![$$\pi ''$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq69.png)
    , ![$$\pi ''$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq70.png)
    is at least as good as ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq71.png)
    if and only if ![$$V_{\pi ''}(s) \geq V_\pi (s)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq72.png)
    for all states ![$$s \in \mathcal {S}$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq73.png)
    .


    Here, ![$$V_\pi (s)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq74.png)
    is the estimated value of state *s* under policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq75.png)
    . In other words, a modified policy is better than the original policy if it increases
    the expected return for at least one state.


    This is where we need to use the state-action value function ![$$Q_\pi (s, a)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq76.png)
    , because the state value function ![$$V_\pi (s)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq77.png)
    doesn’t tell us which action is better when the agent is in state *s* and following
    policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq78.png)
    . We’ve already introduced the Bellman equation for ![$$Q_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq79.png)
    in Chap. [2](#605748_1_En_2_Chapter.xhtml). Here’s a quick review.


    ![$$\displaystyle \begin{aligned} Q_\pi(s, a) &amp; =R(s, a) + {\gamma} \mathbb{E}_{\pi\!\!}\left[Q_\pi(s'',
    a'') \;\Big|\; S_{t+1}=s'', A_{t+1}=a''\right] \notag \\ &amp; =R(s, a) + {\gamma}
    \sum_{s'' \in \mathcal{S}}P(s''|s, a) \sum_{a'' \in A} \pi(a''|s'') Q_\pi(s'',
    a''), \quad \mbox{for all}\; s \in \mathcal{S}, a \in A {} \end{aligned} $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_Equ3.png)


    (3.3)'
  trans: "\n一旦智能体为每个状态计算出了新的价值估计，它就会使用这些更新后的值开始新一轮迭代。虽然估计值最终会收敛到策略`π`的真实值，但在实践中，我们必须在此之前决定何时停止算法。为了判断算法何时收敛到价值函数的精确估计，我们比较每个状态`s`的更新值`V_π(s)`与先前估计值之间的绝对差值，并记录每次迭代中所有状态的最大绝对差值。在完成对所有状态的一轮完整迭代后，我们将最大绝对差值与一个小的阈值`ε`进行比较。如果这个最大绝对差值小于`ε`，我们就认为算法已经收敛并终止循环。\n\
    \n将所有状态的估计值存储在一个数组中，可以加速评估过程，因为它允许我们原地更新这些值。这意味着我们可以更新某个特定状态的价值函数估计，然后立即在后续计算中使用更新后的值，而无需将其复制到新的数据结构中。\n\
    \n相反，如果我们将每个状态的估计值存储在单独的数据结构中，那么每次更新都需要将更新后的值从一个数据结构复制到另一个。这种复制操作在计算上可能非常昂贵，尤其是在状态数量很多的情况下。\n\
    \n此外，将所有状态的值存储在一个数组中，还可以使代码更简单、更易读。遍历单个数组比跟踪每个状态的多个数据结构要容易得多。\n\n总的来说，将所有状态的估计值存储在一个数组中，是一种实用的优化方法，既能提高代码速度，也能提升代码清晰度。\n\
    \n### 工作示例\n\n让我们使用策略评估算法，为服务犬 MDP 的一个（固定的）随机策略`π`估计状态价值函数`V_π`。图 3.2 中显示的值是使用折扣因子\
    \ 0.9 和阈值`1e-5`计算得出的。\n\n值得注意的是，无论输入策略是最优的还是随机的，终止状态的价值始终为零。这是因为状态价值函数衡量的是从状态`s`开始，遵循策略`π`的期望回报。由于环境到达终止状态后没有即时奖励或后续状态，其价值始终为零。\n\
    \n## 3.3 策略改进\n\n强化学习的最终目标是找到最优策略`π*`，该策略能最大化整个状态空间中所有状态的期望回报。然而，对于具有大规模状态和动作空间的\
    \ MDP，逐一搜索整个策略空间以找到`π*`是不可行的。幸运的是，有一种更高效的方法来改进给定策略，这被称为策略改进。\n\n策略改进背后的思想很简单。我们不是一次性寻找最优策略，而是通过修改当前策略，使其相对于当前策略的估计状态-动作价值函数`Q_π`变得更贪婪，从而迭代地对当前策略进行微小且渐进的改进。如果修改后的策略至少对一个状态有更高的期望回报，那么它一定优于原始策略。这是策略改进背后的关键概念，并基于以下定理：\n\
    \n图 3.2 服务犬 MDP 随机策略`π`的状态价值，`γ=0.9`且`ε=1e-5`\n\n对于任意两个确定性策略`π`和`π'`，`π'`至少与`π`一样好，当且仅当对于所有状态`s\
    \ ∈ S`，有`V_π'(s) ≥ V_π(s)`。\n\n这里，`V_π(s)`是状态`s`在策略`π`下的估计值。换句话说，如果一个修改后的策略至少对一个状态增加了期望回报，那么它就优于原始策略。\n\
    \n这就是我们需要使用状态-动作价值函数`Q_π(s, a)`的地方，因为状态价值函数`V_π(s)`无法告诉我们，当智能体处于状态`s`并遵循策略`π`时，哪个动作更好。我们已经在第\
    \ 2 章中介绍了`Q_π`的贝尔曼方程。以下是快速回顾。\n\n```\nQ_π(s, a) = R(s, a) + γ E_π[Q_π(s', a')\
    \ | S_{t+1}=s', A_{t+1}=a']\n          = R(s, a) + γ Σ_{s'∈S} P(s'|s, a) Σ_{a'∈A}\
    \ π(a'|s') Q_π(s', a'), 对于所有 s∈S, a∈A\n```\n(3.3)\n"
- fmt: 'Equation ([3.3](#605748_1_En_3_Chapter.xhtml#Equ3)) tells us how to update
    values for a state-action pair `(s, a)` using `Q_π`, but we don’t have an accurate
    estimate of `Q_π` yet. Luckily, there’s a relationship between `Q_π` and `V_π`,
    where `V_π(s) = Σ_{a ∈ A} π(a|s) Q_π(s, a)`. We’ve already know how to use the
    policy evaluation algorithm to compute the state value function `V_π` for a policy
    `π`. And we can simply plug `V_π` into Eq. ([3.4](#605748_1_En_3_Chapter.xhtml#Equ4))
    which will help us finish the value update rule for estimated state-action value
    function `Q_π`.


    ```

    Q_π(s, a) = R(s, a) + γ Σ_{s'' ∈ S} P(s''|s, a) V_π(s''), for all s ∈ S, a ∈ A

    ```


    (3.4)


    This equation tells us that the value of taking action `a` in state `s` and then
    following policy `π` is the expected reward `R_t` plus the discounted value of
    the next state `S_{t+1}`, which is given by the state value function `V_π(S_{t+1})`.
    We can compute `Q_π` for all state-action pairs using the policy evaluation algorithm.


    Once we have an estimate of the state-action value function `Q_π`, we can perform
    policy iteration, which involves improving the policy by making it greedier with
    respect to `Q_π`. Specifically, we can construct a new policy `π''` by selecting
    the action that maximizes the state-action value function at each state.


    We now introduce the *policy improvement* algorithm as shown in Algorithm 3. It
    takes in the estimated state value function `V_π` for an arbitrary policy `π`
    (which is coming from policy evaluation algorithm). It then sweeps over all the
    states in the state space; for each state, it goes through all (legal) actions
    in this state to compute state-action value function `Q_π` based on the model
    of the environment and `V_π`. After the sweep is done, it then uses `Q_π` to compute
    a better, improved deterministic policy `π''`. It does this by going through all
    the states in the state space; for every state, it updates the policy probability
    distribution for each action, so that the probability of choosing the action with
    the highest estimated value `Q_π(s, a)` is 1, and the probability of choosing
    other actions is 0.


    Algorithm 3: Policy improvement, iterative algorithm


    ![](images/605748_1_En_3_Chapter/605748_1_En_3_Figaac_HTML.gif) A 10-line algorithm
    titled policy improvement, iterative algorithm takes in the following inputs to
    give improved deterministic policy `π''` as the output. Estimated state value
    function `V_π` for `π` and discount rate `γ`.


    The policy improvement algorithm consists of two steps: the first step is to use
    Eq. ([3.3](#605748_1_En_3_Chapter.xhtml#Equ3)) and the model of the environment
    to compute the estimated state-action value function `Q_π` for the current policy
    `π`; the second step is to improve the policy `π` by constructing a new, better
    deterministic policy `π''` based on `Q_π`. Unlike the policy evaluation algorithm,
    the policy improvement algorithm does not run forever. It only goes through these
    two steps once. This makes sense as we now have a new, better policy `π''`; the
    old state value function `V_π` does not represent the values of this new policy
    anymore because the policy has changed.


    To implement Algorithm 3, we could use a 2D matrix with the shape of (size of
    state space, size of action space) to represent the state-action value function
    `Q_π`. One thing to pay attention to is during the construction of the improved
    policy, we should only consider the legal actions for the specific state; legal
    actions are those that are available in the current state. Excluding illegal actions
    is important because it ensures that the action selection process is performed
    correctly and does not lead to suboptimal or even dangerous behavior.


    In reinforcement learning, excluding illegal actions is particularly important
    when constructing a policy based on the estimated state-action value function.
    Without excluding illegal actions, the policy may select suboptimal or even illegal
    actions leading to poor performance or failure to achieve the desired goal. By
    considering only legal actions in the action selection process, the policy can
    ensure that it selects the best action possible for the given state while still
    satisfying any constraints or safety requirements.


    For example, consider a robot in a factory environment with certain safety constraints,
    such as not colliding with other robots or objects. If the robot’s action selection
    process includes illegal actions, such as moving in a direction that would result
    in a collision, it could cause damage to itself, other robots, or the factory
    environment.


    Another concrete example is this: let’s say the values for the legal actions are
    all negative `Q_π(s, a) < 0` for some state `s`; if we don’t exclude the illegal
    actions, then a standard `argmax` will always choose one of the illegal actions,
    since zero is greater than negative values.'
