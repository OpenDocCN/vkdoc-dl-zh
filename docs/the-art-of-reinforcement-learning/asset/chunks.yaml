- fmt: "### Surrogate Objective Function\n\nBy using this approximation of `L_π(π')\
    \ ≈ J(π') - J(π)`, we can rearrange our initial relative policy performance equation\
    \ as:\n\n```\nL_π(π') = 1/(1-γ) * E_{s~d_π, a~π} [π'(a|s)/π(a|s) * Â_π(s, a)]\n\
    \        = E_{τ~π} [Σ_{t=0}^∞ γ^t * π'(a|s)/π(a|s) * Â_π(s, a)]\n```\n\n(11.10)\n\
    \nEquation (11.10) is often referred to as the surrogate objective function for\
    \ policy gradient methods. This is something we can compute and optimize using\
    \ trajectories sampled from the old policy `π`. The probability ratio term in\
    \ the equation is the importance sampling, but because it only depends on the\
    \ current time step and not preceding history, it does not suffer the vanish or\
    \ explode weights problems as we’ve discussed at the beginning of this chapter.\n\
    \nWith Eq. (11.10), our objective is then to find the new policy `π'`, which maximizes\
    \ the relative performance difference between the new policy `π'` and old policy\
    \ `π`, such as:\n\n```\nargmax_{π'} J(π') = argmax_{π'} J(π') - J(π)\n       \
    \           = argmax_{π'} E_{τ~π} [Σ_{t=0}^∞ γ^t * π'(a|s)/π(a|s) * Â_π(s, a)]\n\
    ```\n\n(11.11)\n\nHowever, since in Eq. (11.10) we’re using an approximation solution\
    \ `L_π(π')`, where we use the trajectories generated from the old policy `π` instead\
    \ of the new policy `π'`, this only works if the new policy and old policy are\
    \ close, as shown in the monotonic improvement theory.\n\nThis makes the surrogate\
    \ objective function a constrained optimization problem:\n\n```\nargmax_{π'} L_π(π')\
    \ = argmax_{π'} E_{τ~π} [Σ_{t=0}^∞ γ^t * π'(a|s)/π(a|s) * Â_π(s, a)]\nsubject\
    \ to: max_{s∈S} D_KL(π' || π) ≤ δ\n```\n\n(11.12) where the constraint is defined\
    \ as the maximum distance `D_KL` divergence between the new policy `π'` and old\
    \ policy `π`, and `D_KL(π' || π) ≤ δ`.\n\nOne solution to this constrained optimization\
    \ problem as defined in Eq. (11.12) is to adapt the trust region optimization\
    \ methods. Figure 11.1 illustrates the concept of trust region methods, where\
    \ the current (old) policy `π` is at the central point. A trust region is then\
    \ defined around the current policy, which can be defined as the `D_KL` divergence.\
    \ The trust region method would then find a step size and direction to update\
    \ the policy within the constraint of this trust region.\n\n![](images/605748_1_En_11_Chapter/605748_1_En_11_Fig1_HTML.png)\n\
    \nA schematic diagram comprises a dashed circle with a curved arrow labeled trust\
    \ region. A dot at the center is labeled current policy. Another dot near the\
    \ top right periphery of the circle is labeled proposed policy. An arrow from\
    \ current policy labeled step direction points to proposed policy.\n\n**Fig. 11.1**\
    \ The concept of trust region methods\n\nSeveral algorithms have been developed\
    \ to solve the surrogate objective function in the context of policy optimization\
    \ in reinforcement learning, such as Natural Policy Gradient by Kakade, Sham M\
    \ [3], and Trust Region Policy Optimization (TRPO) proposed by Schulman et al.\
    \ [4]. However, these algorithms require additional approximations for `L_π(π')`\
    \ and `D_KL(π' || π)`, respectively. This introduces additional complexity, such\
    \ as the inability to use stochastic gradient ascent to optimize the policy parameters.\
    \ Instead, other methods must be used to compute the gradients, which are required\
    \ to update the parameters. This also reduces computation efficiency, as more\
    \ resources are required to update the policy at each iteration.\n\nFortunately,\
    \ there is a simpler and more efficient algorithm available: Proximal Policy Optimization\
    \ (PPO). PPO avoids the additional complexity of other algorithms and provides\
    \ a straightforward approach to optimizing the surrogate objective function.\n\
    \n## 11.3 Proximal Policy Optimization\n\nProximal Policy Optimization (PPO),\
    \ proposed by Schulman et al. [5], is a state-of-the-art policy gradient algorithm\
    \ that improves upon the stability and data efficiency of previous policy gradient\
    \ methods, such as Actor-Critic [6] algorithms, while maintaining a simple implementation.\
    \ PPO has been successfully applied to various reinforcement learning problems\
    \ and can be scaled to handle large, complex environments that require more complex\
    \ neural network architectures.\n\nOne of the key benefits of PPO is its use of\
    \ stochastic gradient ascent to optimize the policy, eliminating the need for\
    \ complex gradient computation process and search for suitable optimization directions,\
    \ which was required in its predecessor TRPO. This approach results in faster\
    \ convergence and better performance in practice.\n\nPPO is a powerful and versatile\
    \ algorithm that has proven to be a reliable and effective choice for many reinforcement\
    \ learning tasks, offering a simpler implementation compared to previous methods\
    \ while still achieving state-of-the-art performance.^(11)"
  raw: '### Surrogate Objective Function


    By using this approximation of ![$$\mathcal {L}_{\pi }(\pi '') \approx J(\pi '')
    - J(\pi )$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq94.png)
    , we can rearrange our initial relative policy performance equation as


    ![$$\displaystyle \begin{aligned} \mathcal{L}_{\pi}(\pi'') &amp; = \frac{1}{1
    - {\gamma}}\mathbb{E}_{\substack{s \sim d_{\pi} \notag \\ a \sim \pi}\!\!}\left[\frac{\pi''(a|s)}{\pi(a|s)}
    \hat{A}_{\pi}(s, a)\right] \\ &amp; =\mathbb{E}_{\tau \sim \pi\!\!}\left[\sum_{t=0}^{\infty}
    {\gamma}^t \frac{\pi''(a|s)}{\pi(a|s)} \hat{A}_{\pi}(s, a)\right] {} \end{aligned}
    $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ11.png)


    (11.10)


    Equation ([11.10](#605748_1_En_11_Chapter.xhtml#Equ11)) is often referred to as
    the surrogate objective function for policy gradient methods. This is something
    we can compute and optimize using trajectories sampled from the old policy ![$$\pi
    $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq95.png) . The
    probability ratio term in the equation is the importance sampling, but because
    it only depends on the current time step and not preceding history, it does not
    suffer the vanish or explode weights problems as we’ve discussed at the beginning
    of this chapter.


    With Eq. ([11.10](#605748_1_En_11_Chapter.xhtml#Equ11)), our objective is then
    to find the new policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq96.png)
    , which maximizes the relative performance difference between the new policy ![$$\pi
    ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq97.png) and
    old policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq98.png)
    , such as


    ![$$\displaystyle \begin{aligned} \mathop{\text{argmax}}_{\pi''}J(\pi'') &amp;
    = \mathop{\text{argmax}}_{\pi''}J(\pi'') - J(\pi) \notag \\ &amp; = \mathop{\text{argmax}}_{\pi''}
    \mathbb{E}_{\tau \sim \pi\!\!}\left[ \sum_{t=0}^{\infty} {\gamma}^t \frac{\pi''(a|s)}{\pi(a|s)}
    \hat{A}_{\pi}(s, a) \right] \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ12.png)


    (11.11)


    However, since in Eq. ([11.10](#605748_1_En_11_Chapter.xhtml#Equ11)) we’re using
    an approximation solution ![$$\mathcal {L}_{\pi }(\pi '')$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq99.png)
    , where we use the trajectories generated from the old policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq100.png)
    instead of the new policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq101.png)
    , this only works if the new policy and old policy are close, as shown in the
    monotonic improvement theory.


    This makes the surrogate objective function a constrained optimization problem:


    ![$$\displaystyle \begin{aligned} \mathop{\text{argmax}}_{\pi''}\mathcal{L}_{\pi}(\pi'')
    &amp; = \mathop{\text{argmax}}_{\pi''} \mathbb{E}_{\tau \sim \pi\!\!}\left[ \sum_{t=0}^{\infty}
    {\gamma}^t \frac{\pi''(a|s)}{\pi(a|s)} \hat{A}_{\pi}(s, a) \right] {} \\ &amp;
    \text{subject to} \quad \max_{s \in \mathcal{S}} D_{KL}(\pi''||\pi) \leq \delta
    \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ13.png)


    (11.12) where the constraint is defined as the maximum distance ![$$D_{KL}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq102.png)
    divergence between the new policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq103.png)
    and old policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq104.png)
    , and ![$$D_{KL}(\pi ''||\pi ) \leq \delta $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq105.png)
    .


    One solution to this constrained optimization problem as defined in Eq. ([11.12](#605748_1_En_11_Chapter.xhtml#Equ13))
    is to adapt the trust region optimization methods. Figure [11.1](#605748_1_En_11_Chapter.xhtml#Fig1)
    illustrates the concept of trust region methods, where the current (old) policy
    ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq106.png)
    is at the central point. A trust region is then defined around the current policy,
    which can be defined as the ![$$D_{KL}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq107.png)
    divergence. The trust region method would then find a step size and direction
    to update the policy within the constraint of this trust region.


    ![](images/605748_1_En_11_Chapter/605748_1_En_11_Fig1_HTML.png)


    A schematic diagram comprises a dashed circle with a curved arrow labeled trust
    region. A dot at the center is labeled current policy. Another dot near the top
    right periphery of the circle is labeled proposed policy. An arrow from current
    policy labeled step direction points to proposed policy.


    Fig. 11.1


    The concept of trust region methods


    Several algorithms have been developed to solve the surrogate objective function
    in the context of policy optimization in reinforcement learning, such as Natural
    Policy Gradient by Kakade, Sham M [[3](#605748_1_En_11_Chapter.xhtml#CR3)], and
    Trust Region Policy Optimization (TRPO) proposed by Schulman et al. [[4](#605748_1_En_11_Chapter.xhtml#CR4)].
    However, these algorithms require additional approximations for ![$$\mathcal {L}_{\pi
    }(\pi '')$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq108.png)
    and ![$$D_{KL}(\pi ''||\pi )$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq109.png)
    , respectively. This introduces additional complexity, such as the inability to
    use stochastic gradient ascent to optimize the policy parameters. Instead, other
    methods must be used to compute the gradients, which are required to update the
    parameters. This also reduces computation efficiency, as more resources are required
    to update the policy at each iteration.


    Fortunately, there is a simpler and more efficient algorithm available: Proximal
    Policy Optimization (PPO). PPO avoids the additional complexity of other algorithms
    and provides a straightforward approach to optimizing the surrogate objective
    function.


    ## 11.3 Proximal Policy Optimization


    Proximal Policy Optimization (PPO), proposed by Schulman et al. [[5](#605748_1_En_11_Chapter.xhtml#CR5)],
    is a state-of-the-art policy gradient algorithm that improves upon the stability
    and data efficiency of previous policy gradient methods, such as Actor-Critic
    [[6](#605748_1_En_11_Chapter.xhtml#CR6)] algorithms, while maintaining a simple
    implementation. PPO has been successfully applied to various reinforcement learning
    problems and can be scaled to handle large, complex environments that require
    more complex neural network architectures.


    One of the key benefits of PPO is its use of stochastic gradient ascent to optimize
    the policy, eliminating the need for complex gradient computation process and
    search for suitable optimization directions, which was required in its predecessor
    TRPO. This approach results in faster convergence and better performance in practice.


    PPO is a powerful and versatile algorithm that has proven to be a reliable and
    effective choice for many reinforcement learning tasks, offering a simpler implementation
    compared to previous methods while still achieving state-of-the-art performance.^([^(11)](#fn11))'
  trans: "\n### 替代目标函数\n\n通过使用 `L_π(π') ≈ J(π') - J(π)` 这一近似，我们可以将初始的相对策略性能方程重新整理为：\n\
    \n```\nL_π(π') = 1/(1-γ) * E_{s~d_π, a~π} [π'(a|s)/π(a|s) * Â_π(s, a)]\n    \
    \    = E_{τ~π} [Σ_{t=0}^∞ γ^t * π'(a|s)/π(a|s) * Â_π(s, a)]\n```\n\n(11.10)\n\
    \n方程 (11.10) 通常被称为策略梯度方法的**替代目标函数**。我们可以利用从旧策略 `π` 采样的轨迹来计算并优化该函数。方程中的概率比项是重要性采样，但由于它仅依赖于当前时间步，而非历史序列，因此不会出现本章开头讨论的权重消失或爆炸问题。\n\
    \n利用方程 (11.10)，我们的目标是找到新策略 `π'`，使其与旧策略 `π` 之间的相对性能差异最大化，即：\n\n```\nargmax_{π'}\
    \ J(π') = argmax_{π'} J(π') - J(π)\n                  = argmax_{π'} E_{τ~π} [Σ_{t=0}^∞\
    \ γ^t * π'(a|s)/π(a|s) * Â_π(s, a)]\n```\n\n(11.11)\n\n然而，由于在方程 (11.10) 中我们使用了近似解\
    \ `L_π(π')`，即使用从旧策略 `π` 而非新策略 `π'` 生成的轨迹，这仅在**新策略与旧策略相近**时才有效，正如单调改进理论所示。\n\n\
    这使得替代目标函数成为一个**约束优化问题**：\n\n```\nargmax_{π'} L_π(π') = argmax_{π'} E_{τ~π} [Σ_{t=0}^∞\
    \ γ^t * π'(a|s)/π(a|s) * Â_π(s, a)]\nsubject to: max_{s∈S} D_KL(π' || π) ≤ δ\n\
    ```\n\n(11.12) 其中约束条件定义为新策略 `π'` 与旧策略 `π` 之间的最大 `D_KL` 散度距离，且 `D_KL(π' || π) ≤\
    \ δ`。\n\n针对方程 (11.12) 所定义的约束优化问题，一种解决方案是采用**信任区域优化方法**。图 11.1 展示了信任区域方法的概念：当前（旧）策略\
    \ `π` 位于中心点。围绕当前策略定义一个信任区域，该区域可由 `D_KL` 散度来界定。信任区域方法会在该信任区域的约束内，寻找合适的步长和方向来更新策略。\n\
    \n![](img/605748_1_En_11_Fig1_HTML.png)\n\n示意图包含一个带有弯曲箭头的虚线圆圈，箭头标记为“信任区域”。圆心处的一个点标记为“当前策略”。圆圈右上边缘附近的另一个点标记为“提议策略”。从当前策略指向提议策略的箭头标记为“步进方向”。\n\
    \n**图 11.1** 信任区域方法的概念\n\n在强化学习的策略优化背景下，已经开发出多种算法来解决替代目标函数问题，例如 Kakade, Sham M\
    \ [3] 提出的**自然策略梯度**，以及 Schulman 等人 [4] 提出的**信任区域策略优化**（TRPO）。然而，这些算法需要分别对 `L_π(π')`\
    \ 和 `D_KL(π' || π)` 进行额外的近似。这引入了额外的复杂性，例如无法使用随机梯度上升来优化策略参数，而必须使用其他方法来计算更新参数所需的梯度。这也降低了计算效率，因为每次迭代更新策略需要更多的资源。\n\
    \n幸运的是，有一种更简单、更高效的算法可用：**近端策略优化**（PPO）。PPO 避免了其他算法的额外复杂性，并提供了一种直接的方法来优化替代目标函数。\n\
    \n## 11.3 近端策略优化\n\n由 Schulman 等人 [5] 提出的**近端策略优化**（PPO）是一种先进的策略梯度算法，它在保持实现简单的同时，改进了先前策略梯度方法（如\
    \ Actor-Critic [6] 算法）的稳定性和数据效率。PPO 已成功应用于各种强化学习问题，并且可以扩展到处理需要更复杂神经网络架构的大型复杂环境。\n\
    \nPPO 的一个关键优势在于它使用随机梯度上升来优化策略，从而消除了其前身 TRPO 所需的复杂梯度计算过程和寻找合适优化方向的需求。这种方法在实践中能实现更快的收敛和更好的性能。\n\
    \nPPO 是一种强大且通用的算法，已被证明是许多强化学习任务中可靠且有效的选择。与先前的方法相比，它提供了更简单的实现，同时仍能达到最先进的性能。¹¹\n"
- fmt: '### Clipped Surrogate Objective Function


    PPO builds on the idea of the surrogate objective function as shown in Eq. (11.12).
    However, it does not require the computation of the KL divergence `D_{KL}` directly.
    To understand why this is possible, let’s examine the relationship between the
    probability ratio and the KL divergence.


    Recall that given two policies `π''` and `π`, the KL divergence between them for
    a given state `s` can be computed using the equation:


    ```

    D_{KL}(π''||π)[s] = Σ_{a ∈ A} π''(a|s) log(π''(a|s) / π(a|s))

    ```


    The KL divergence measures the log difference between the probability distributions
    of the old policy `π` and the new policy `π''`. If the new policy is the same
    as the old policy, that is, `π'' = π`, then the probability ratio is 1.0. As the
    new policy moves away from the old policy, this ratio can change dramatically.
    However, what is the relationship between this ratio and the KL divergence?


    As an example, consider a simple Markov decision process (MDP) with a single state
    `s` and two actions `a1` and `a2`. Suppose we have a new policy `π''` and an old
    policy `π`, where the probabilities of choosing actions `a1` and `a2` in state
    `s` under the old policy are both 0.5, that is, `π(a1|s) = 0.5` and `π(a2|s) =
    0.5`.


    We can calculate the probability ratio of `π''` and `π` as `π''(a|s) / π(a|s)`
    for each action `a1, a2` in state `s`. Table 11.1 shows the probability ratios
    and the corresponding KL divergences for different new policies.


    **Table 11.1** Example of the probability ratio and KL divergence between different
    new policies `π''` and the old policy `π`


    | `π''(·|s)` | `π(·|s)` | `π''(a1|s) / π(a1|s)` | `π''(a2|s) / π(a2|s)` | `D_{KL}(π''||π)[s]`
    |

    | --- | --- | --- | --- | --- |

    | [0.1, 0.9] | [0.5, 0.5] | 0.2 | 1.8 | 0.37 |

    | [0.2, 0.8] | [0.5, 0.5] | 0.4 | 1.6 | 0.19 |

    | [0.3, 0.7] | [0.5, 0.5] | 0.6 | 1.4 | 0.08 |

    | [0.4, 0.6] | [0.5, 0.5] | 0.8 | 1.2 | 0.02 |

    | [0.5, 0.5] | [0.5, 0.5] | 1.0 | 1.0 | 0.0 |

    | [0.6, 0.4] | [0.5, 0.5] | 1.2 | 0.8 | 0.02 |

    | [0.7, 0.3] | [0.5, 0.5] | 1.4 | 0.6 | 0.08 |

    | [0.8, 0.2] | [0.5, 0.5] | 1.6 | 0.4 | 0.19 |

    | [0.9, 0.1] | [0.5, 0.5] | 1.8 | 0.2 | 0.37 |


    The results show some very interesting pattern, that is, as two policies `π''`
    and `π` move further apart, meaning their probability ratio deviates more from
    1.0, the KL divergence also increases.


    This gives us an idea that instead of computing the KL divergence, maybe we can
    directly apply the constraint on the probability ratio to keep the ratio close
    to 1.0, like shown in Eq. (11.13), where `ε` is a small variable that controls
    the amount of constraint we want to apply to the probability ratio.


    ```

    clip(π''(a|s) / π(a|s), 1 - ε, 1 + ε) * Â_t

    ```


    (11.13)


    However, in some cases, using the clipped probability ratio can lead to an overestimation
    of the advantage function, resulting in a policy that is too conservative and
    fails to explore new actions that could be better than those chosen by the old
    policy. To understand why, let’s consider a simple example.


    Suppose the old policy assigns a probability of 0.8 to taking action `a` at state
    `s`, and the advantage estimate is 0.5. The new policy assigns a probability of
    0.3 to taking action `a` at state `s`. And we use `ε = 0.2`, so the clipping range
    should be [0.8, 1.2].


    Using the clipped ratio would result in a ratio of `0.3 / 0.8 = 0.375`, which
    is less than the lower bound of the clipping range. Therefore, the clipped ratio
    would be 0.8, and the objective function would evaluate to `0.8 * 0.5 = 0.4`.


    However, if we use the original unclipped probability ratio, the objective function
    evaluates to `0.375 * 0.5 = 0.1875`. In this case, the clipped probability ratio
    results in a much higher estimate of the advantage function than using the unclipped
    ratio. This can lead to a policy that overestimates the values of some action,
    while in reality ignoring other actions that yield better expected return chosen
    by the old policy.'
