- fmt: '尽管强化学习在较简单的任务中已展现出令人印象深刻的表现，但当前算法在应对围棋的复杂性和策略性方面仍面临重大挑战。赢得这项游戏需要高级规划和策略性思维，而随机探索无法提供这些能力。因此，有必要开发一种能够高水平下围棋的新算法。


    为了让我们的强化学习智能体具备像人类专业棋手一样的规划和策略性思维能力，专门针对围棋定制的算法已被开发出来。这些算法依赖于一个能够辅助智能体进行规划和策略决策的模型。


    环境模型由两个部分组成：动力学函数（也称为状态转移函数）和奖励函数。动力学函数描述了游戏状态如何根据智能体及其对手所采取的行动而变化。奖励函数则根据游戏状态和在该状态下采取的行动，为玩家分配一个数值。通过使用这些函数，智能体可以模拟可能的未来情景，评估潜在结果，并根据其策略和目标选择最佳落子。


    在像围棋或国际象棋这样的两人零和游戏中，由于游戏是确定性的，我们可以创建一个精确的模型。如果玩家落子，我们确切知道后续状态会是什么，因此我们可以开发出一个近乎完美的动力学函数（尽管对于围棋这样的游戏，它实际上相当复杂）。由于除了最终状态外，奖励始终为零，并且游戏的计分规则众所周知，我们也可以为游戏创建一个精确的奖励函数。此外，由于棋盘配置是完全可观测的，每个游戏状态下可能的合法落子信息也是现成的。


    假设我们拥有一个完美的游戏模型，我们如何利用该模型使强化学习智能体像人类专业棋手一样进行规划呢？对于两人零和游戏，一种传统方法是使用某种搜索算法来进行规划，例如由约翰·冯·诺依曼和奥斯卡·摩根斯特恩提出的`Minimax`算法[[3](#605748_1_En_14_Chapter.xhtml#CR3)]。该算法创建了一个由节点和边组成的树形数据结构，节点代表游戏的不同状态，连接各个节点的边代表导致后续节点或状态的合法落子或行动。搜索过程的目标是发现能在每个状态下最小化对手最大收益的落子，或者最小化潜在损失以迫使平局。


    IBM的`Deep Blue`[[4](#605748_1_En_14_Chapter.xhtml#CR4)]是利用`Minimax`搜索算法在国际象棋中达到大师级水平的例子。`Deep
    Blue`采用启发式评估函数和`alpha-beta`搜索算法（对标准`Minimax`搜索算法的改进），并结合并行计算，进行多步规划以确定每种棋盘配置下的最佳落子。启发式评估函数对`Deep
    Blue`的成功至关重要，它是基于国际象棋大师和计算机科学家定义的规则和模式创建的。


    然而，由于围棋的动态特性和更大的分支因子，为其创建或学习一个精确的启发式评估函数要困难得多。人们曾尝试使用神经网络和监督学习来评估局势，例如，M. Enzenberger[[5](#605748_1_En_14_Chapter.xhtml#CR5)]提出使用神经网络和时间差分学习[[6](#605748_1_En_14_Chapter.xhtml#CR6)]来预测游戏过程中的领地。然而，这些工作仅达到了较弱或中等水平的棋力。因此，我们需要确定一种更适合围棋的更强大的搜索算法。


    ## 14.2 蒙特卡洛树搜索


    蒙特卡洛树搜索（MCTS）是一种广泛使用的搜索算法，用于在游戏和其他决策领域寻找最优行动。它结合了树搜索与蒙特卡洛随机采样，以估计状态和行动的价值，并利用这些估计做出更好的决策。


    MCTS的工作原理是：从当前状态开始迭代构建一棵搜索树，选择有希望的节点进行探索，用新节点扩展树，从这些新节点出发使用蒙特卡洛采样模拟游戏结果，并用结果更新树结构。MCTS的一个主要优点是，它进行搜索几乎不需要或完全不需要领域知识，这使其成为在复杂领域（如围棋）中进行规划的热门选择。


    MCTS的关键优势之一是其处理各种领域中复杂决策问题的能力。与其他搜索算法不同，MCTS不需要特定领域的评估函数或启发式方法来指导搜索。相反，它依赖蒙特卡洛采样来探索搜索空间并评估潜在行动，使其成为一种灵活且通用的算法。


    MCTS的成功在围棋中最为显著，基于MCTS的AI程序已能在小棋盘上达到人类大师级水平。例如，2006年，Sylvain Gelly和Yizao Wang[[7](#605748_1_En_14_Chapter.xhtml#CR7)]实现了首批使用MCTS的计算机程序。此后，MCTS在计算机围棋领域迅速得到应用。2008年，Sylvain
    Gelly和David Silver[[8](#605748_1_En_14_Chapter.xhtml#CR8)]提出了一个名为`MoGo`的计算机程序（它使用了MCTS和其他技术），该程序能在`9×9`棋盘上达到人类大师级水平。MCTS也已成功应用于其他游戏，如扑克、国际象棋和将棋。


    总之，蒙特卡洛树搜索是一种强大且通用的算法，适用于复杂领域的决策。随着持续的开发和完善，它很可能仍然是解决具有挑战性的决策问题的宝贵工具。'
  raw: 'Although reinforcement learning has demonstrated impressive performance in
    simpler tasks, current algorithms face significant challenges in tackling the
    complexity and strategic nature of Go. Winning at this game requires advanced
    planning and strategic thinking, which random exploration cannot provide. Consequently,
    a new algorithm that can play Go at a high level is necessary.


    To equip our reinforcement learning agent with the ability to plan and think strategically
    like a professional human player, specialized algorithms tailored specifically
    for Go have been developed. These algorithms rely on a model that can assist the
    agent in its planning and strategic decision-making.


    A model of the environment consists of two components: the dynamics function (also
    known as the state transition function) and the reward function. The dynamics
    function describes how the state of the game changes in response to actions taken
    by the agent and its opponent. The reward function assigns a numerical value to
    the player, based on the game state and the action taken in that state. By using
    these functions, the agent can simulate possible future scenarios, evaluate potential
    outcomes, and select the best possible move based on its strategy and goals.


    In the case of two-player zero-sum games like Go or Chess, we can create an accurate
    model because the games are deterministic. We know exactly what the succeeding
    state will be if a player makes a move, so we can develop an almost perfect dynamics
    function (although it’s actually quite complex for games like Go). Since the rewards
    are always zero, except for the final state, and the game’s scoring rules are
    well known, we can also create an accurate reward function for the game. Furthermore,
    information about possible legal moves for every game state is readily available
    since the board configuration is fully observable.


    Assuming we have access to a perfect model of the game, how can we utilize the
    model to enable the reinforcement learning agent to plan like professional human
    players? One traditional method for two-player zero-sum games is to use some search
    algorithm to do the planning, like the Minimax algorithm proposed by JOhn von
    Neumann and Osakar Morgenstern [[3](#605748_1_En_14_Chapter.xhtml#CR3)]. This
    algorithm creates a tree data structure comprising nodes and edges, with nodes
    representing the different states of the game and edges linking the various nodes
    representing the legal moves or actions that lead to subsequent nodes or states.
    The search process’s objective is to discover the move that minimizes the opponent’s
    maximum reward in every state or minimizes the potential loss to force a draw.


    IBM’s Deep Blue [[4](#605748_1_En_14_Chapter.xhtml#CR4)] is an example of utilizing
    the Minimax search algorithm for playing Chess at the master level. Deep Blue
    employs a heuristic evaluation function and an alpha-beta search algorithm (an
    improvement to the standard Minimax search algorithm), in addition to parallel
    computing, to conduct multiple steps of planning to determine the best moves in
    every board configuration. The heuristic evaluation function is crucial to Deep
    Blue’s success, and it was created based on rules and patterns defined by chess
    masters and computer scientists.


    However, creating or learning an accurate heuristic evaluation function for Go
    is considerably more difficult due to the game’s dynamic nature and larger branching
    factor. People have tried using neural networks and supervised learning to evaluate
    the position, for example, M. Enzenberger [[5](#605748_1_En_14_Chapter.xhtml#CR5)]
    proposed to use neural networks and temporal difference learning [[6](#605748_1_En_14_Chapter.xhtml#CR6)]
    to predict the territory during the gameplay. However, these work only achieved
    a weak or medium level of play. As a result, we need to identify a more robust
    search algorithm suitable for Go.


    ## 14.2 Monte Carlo Tree Search


    Monte Carlo Tree Search (MCTS) is a widely used search algorithm for finding optimal
    moves in games and other decision-making domains. It combines tree search with
    Monte Carlo random sampling to estimate the value of states and actions and uses
    these estimates to make better decisions.


    MCTS works by iteratively building a search tree from the current state, selecting
    promising nodes to explore, expanding the tree with new nodes, simulating game
    outcomes from these new nodes using Monte Carlo sampling, and updating the tree
    structure with the results. One major advantage of MCTS is that it requires little
    or no domain knowledge to conduct the search, making it a popular choice for planning
    in complex domains, such as game of Go.


    One of the key advantages of MCTS is its ability to handle complex decision-making
    problems in a variety of domains. Unlike other search algorithms, MCTS does not
    require domain-specific evaluation functions or heuristics to guide the search.
    Instead, it relies on Monte Carlo sampling to explore the search space and evaluate
    potential moves, making it a flexible and general-purpose algorithm.


    The success of MCTS has been most notable in the game of Go, where MCTS-based
    AI programs have achieved human master level play on small board sizes. For example,
    in 2006, the first computer programs using MCTS were implemented by Sylvain Gelly
    and Yizao Wang [[7](#605748_1_En_14_Chapter.xhtml#CR7)]. Since then, MCTS has
    been rapidly adapted in the computer Go. In 2008, Sylvain Gelly and David Silver
    [[8](#605748_1_En_14_Chapter.xhtml#CR8)] proposed a computer program called MoGo
    (which uses MCTS and other techniques) which can play the Go at human master level
    on ![$$9 \times 9$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq7.png)
    board. MCTS has also been used successfully in other games, such as poker, chess,
    and shogi.


    In summary, Monte Carlo Tree Search is a powerful and versatile algorithm for
    decision-making in complex domains. With continued development and refinement,
    it is likely to remain a valuable tool for solving challenging decision-making
    problems.'
