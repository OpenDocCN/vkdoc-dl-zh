  trans: '

    # 3.4 策略迭代


    策略迭代是一种在马尔可夫决策过程（MDP）中寻找最优策略的算法。该算法包含两个主要步骤：策略评估和策略改进，通过迭代应用这两个步骤来优化策略，直至其收敛到最优策略。


    策略迭代背后的核心思想是利用价值函数贪婪地选择更优的动作，然后根据新策略更新价值函数。算法从一个初始策略开始（通常随机选择），然后通过估计价值函数并选择更优的动作来迭代改进策略。


    策略迭代算法在循环中迭代执行这两个步骤。在每次迭代中，我们首先使用策略评估算法，为当前策略 `π^i` 估计状态价值函数 `V_π^i`。该价值函数表示从给定状态出发，遵循该策略所能获得的期望累积奖励。


    ```

    π⁰ → (评估) V_π⁰ → (改进) π¹ → (评估) V_π¹ → (改进) π² → ... → (改进) π_*

    ```


    一旦我们估计出价值函数，就通过运行策略改进算法来利用它选择更优的动作。策略改进算法基于估计出的价值函数，贪婪地选择能使期望累积奖励最大化的动作。这个新策略记为
    `π^(i+1)`，是对前一个策略 `π^i` 的改进。


    我们重复这两个步骤——策略评估和策略改进——直到收敛。当旧策略 `π^i` 与 `π^(i+1)` 在状态空间中的每一个状态上都相同时，即表示无法再做出任何改进，此时达到收敛。


    策略迭代算法总结于算法 4 中。请注意，该算法计算量可能很大，尤其对于大型 MDP 而言，但它保证能收敛到最优策略。


    **算法 4：策略迭代，迭代算法**


    一个名为“策略迭代，迭代算法”的 6 行算法，接收以下输入，输出最优策略 `π*` 以及最优价值函数 `V*`、`Q*` 作为结果。折扣率 `γ`，一个决定估计精度的小阈值
    `ε`。


    针对服务犬 MDP 的最优策略 `π` 的节点图突出了以下路径：从房间 1 到房间 2，`r = -1`。从房间 2 到房间 3，`r = -1`。房间 3
    = 找到物品，`r = 10`。从室外到房间 2，`r = 0`。


    **图 3.3** 服务犬 MDP 的最优策略 `π_*`


    总的来说，策略迭代是在 MDP 中寻找最优策略的一种强大算法。通过迭代地改进策略并更新价值函数，我们可以收敛到最优策略。然而，务必注意，策略迭代算法可能不适用于大型
    MDP，因为其计算量可能很大。在这种情况下，其他算法如值迭代（我们将在本章后面介绍）可能更为合适。


    ## 工作示例


    我们可以使用策略迭代算法来解决我们的服务犬 MDP 问题。计算出的该 MDP 的最优策略 `π_*` 如图 3.3 所示。与最优策略一起，我们还能得到最优价值函数
    `V_*` 和 `Q_*`，分别如图 3.4 和图 3.5 所示。这些值是在折扣因子 `γ = 0.9` 下计算得出的。


    **表 3.1** 不同折扣因子 `γ` 下服务犬 MDP 的最优状态价值


    | 折扣因子 | 房间 1 | 房间 2 | 房间 3 | 室外 | 找到物品 |

    |----------|--------|--------|--------|---------|------------|

    | `γ = 0.0` | -1.0 | -1.0 | 10.0 | 0.0 | 0 |

    | `γ = 0.3` | -0.4 | 2.0 | 10.0 | 0.6 | 0 |

    | `γ = 0.5` | 1.0 | 4.0 | 10.0 | 2.0 | 0 |

    | `γ = 0.7` | 3.2 | 6.0 | 10.0 | 4.2 | 0 |

    | `γ = 0.9` | 6.2 | 8.0 | 10.0 | 7.2 | 0 |

    | `γ = 1.0` | 8.0 | 9.0 | 10.0 | 9.0 | 0 |


    针对服务犬 MDP 的最优状态-动作价值函数 `Q*` 的节点图运行如下：从 6.2 到 8.2，`Q* = 6.2`。从 8.2 到 10.0，`Q* =
    8.0`。从 10.0 到 0.0，`Q* = 10`。从 8.2 到 7.2，`Q* = 6.5`。7.2 返回到 8.2，`Q* = 7.2`。7.2
    自循环，`Q* = 4.8`。


    **图 3.5** 服务犬 MDP 的最优状态-动作价值函数 `Q_*`，`γ = 0.9`


    针对服务犬 MDP 的最优状态价值函数 `V*` 的节点图运行如下：从 6.2 到 8.2，`r = -1`。从 8.2 到 10.0，`r = -1`。从
    10.0 到 0.0，`r = 10`。从 8.2 到 7.2，`r = 0`。7.2 返回到 8.2，`r = 0`。7.2 自循环，`r = -1`。


    **图 3.4** 服务犬 MDP 的最优状态价值函数 `V_*`，`γ = 0.9`


    通过使用不同的折扣因子 `γ` 运行策略迭代算法，我们可以观察到折扣因子如何影响状态价值，如表 3.1 所示。值得注意的是，终止状态的价值始终为零。

