  trans: "\n然而，要将离策略 TD(0) 策略评估算法扩展到估计针对 `π` 的状态-动作价值函数 `Q_π`，情况会稍有不同。由于我们是在估计状态-动作对\
    \ `(s, a)` 的价值，因此行为策略（或目标策略）在状态 `s` 下选择动作 `a` 的概率是多少并不重要，因为状态-动作价值函数衡量的是在状态 `s`\
    \ 下采取动作 `a`，然后之后遵循策略 `π` 所获得的期望回报。我们只关心接下来会发生什么。所以，为了计算一个元组 `(S_t, A_t, R_t, S_{t+1},\
    \ A_{t+1})` 的重要性采样，我们会从第二步 `t+1` 开始，计算在后续状态 `S_{t+1}` 中选择动作 `A_{t+1}` 的概率，并跳过第一步\
    \ `t`，即在状态 `S_t` 中选择动作 `A_t` 的概率。\n\n为了更好地理解这一点，让我们看一个离策略强化学习如何估计状态-动作价值函数 `Q_π`\
    \ 的例子，如图 5.4 所示。请记住，我们是在估计一个状态-动作对的价值，而不仅仅是状态的价值。更具体地说，我们只关心状态 `s` 下动作 `a` 的价值。行为策略\
    \ `μ` 或目标策略 `π` 选择 `a` 的概率是多少并不重要，因为我们一定会更新这个特定动作 `a` 的价值。如果我们看这个图，路径的一部分（从 `s`\
    \ 到 `a`）总是相同的，所以在计算重要性采样比率时无需包含它。真正重要的是，在环境转移到后续状态 `s'` 之后，行为策略和目标策略在状态 `s'` 下选择动作\
    \ `a'` 的概率。\n\n![](img/605748_1_En_5_Fig4_HTML.png)\n\n一个用于离策略强化学习的树状图，从一个 `s`\
    \ 节点开始，分支到 3 个节点。左侧和右侧节点及其分支未标记。中间标记为 `a`、`r` 的节点分支到一个 `s'` 节点和一个未标记节点。`s'` 节点分支到一个\
    \ `a'` 节点和一个双撇节点。\n\n**图 5.4** 离策略强化学习示例，用于在利用由不同行为策略 `μ` 生成的数据的同时，估计目标策略 `π`\
    \ 的状态-动作价值函数 `Q_π`\n\n当使用离策略强化学习和 TD 策略评估来计算 `Q_π` 时，我们可以使用以下公式来计算单个转移元组 `(S_t,\
    \ A_t, R_t, S_{t+1}, A_{t+1})` 的重要性采样比率：\n\n```\nρ_{t+1} = π(A_{t+1}|S_{t+1})\
    \ p(S_{t+1}|S_t, A_t) / μ(A_{t+1}|S_{t+1}) p(S_{t+1}|S_t, A_t)\n        = π(A_{t+1}|S_{t+1})\
    \ / μ(A_{t+1}|S_{t+1})\n```\n(5.10)\n\n这里，`ρ_{t+1}` 表示从时间步 `t+1` 开始的重要性采样比率，它用于修正行为策略与目标策略之间的概率差异。具体来说，`π`\
    \ 代表目标策略，而 `μ` 代表行为策略。\n\n公式 (5.11) 展示了在使用 TD(0) 和离策略强化学习时，针对 `Q_π` 调整后的价值更新规则：\n\
    \n```\nQ_π(S_t, A_t) = Q_π(S_t, A_t) + α * π(A_{t+1}|S_{t+1}) / μ(A_{t+1}|S_{t+1})\
    \ * ( [R_t + γ Q_π(S_{t+1}, A_{t+1})] - Q_π(S_t, A_t) )\n```\n(5.11)\n\n该公式利用由不同行为策略\
    \ `μ` 生成的转移数据，更新了针对目标策略 `π` 的状态-动作价值函数 `Q_π` 的估计值。重要性采样比率用于修正行为策略与目标策略之间的概率差异。具体来说，我们使用比率\
    \ `π(A_{t+1}|S_{t+1}) / μ(A_{t+1}|S_{t+1})` 来调整更新，以便将目标策略与行为策略之间的差异考虑在内。该更新基于时序差分误差，即当前状态-动作对的估计\
    \ Q 值与下一状态-动作对的估计 Q 值之间的差值，再加上在当前状态-动作对获得的奖励。学习率 `α` 控制着更新的大小。\n\n现在，我们介绍针对给定策略\
    \ `π` 的 `Q_π` 的离策略 TD(0) 策略评估算法。\n\n**算法 6：离策略时序差分 [TD(0)] 策略评估用于 `Q[π]`**\n\n\
    ![](img/605748_1_En_5_Figaaf_HTML.gif) 一个 11 行的算法，用于计算离策略时序差分 TD(0) 和 `Q_π` 的策略评估，它接收以下输入，为目标策略\
    \ `π` 给出估计的状态-动作价值函数 `Q_π`。待评估的目标策略 `π`、折扣率 `γ`、步长 `α` 以及步数 `K`。\n"
- fmt: "在上一章中，我们介绍了用于学习动作价值的蒙特卡洛方法，并且可以将这些方法扩展到离策略学习。然而，重要性采样比率会变得更加复杂，因为我们需要包含直到情节结束的动作选择概率和状态转移概率。计算重要性采样比率`ρ_{t:T-1}`的公式包含了诸如`π(a|s)`和`μ(a|s)`这样的项，它们分别表示在目标策略和行为策略下，在状态`s`中选择动作`a`的概率。需要注意的是，如果在转移序列中的任何一点，这些概率中的任何一个变为零，那么重要性采样比率也会变为零。这意味着该序列的价值也将变为零并被丢弃。\n\
    \n```\nρ_{t:T-1} = (π(A_t|S_t) p(S_{t+1}|S_t, A_t) π(A_{t+1}|S_{t+1}) ... p(S_T|S_{T-1},\
    \ A_{T-1})) / (μ(A_t|S_t) p(S_{t+1}|S_t, A_t) μ(A_{t+1}|S_{t+1}) ... p(S_T|S_{T-1},\
    \ A_{T-1}))\n          = (π(A_t|S_t) π(A_{t+1}|S_{t+1}) ... π(A_{T-1}|S_{T-1}))\
    \ / (μ(A_t|S_t) μ(A_{t+1}|S_{t+1}) ... μ(A_{T-1}|S_{T-1}))\n```\n\n(5.12)\n\n\
    在实践中，经常使用带有离策略学习的时序差分学习，例如我们将在下一节介绍的`Q-learning`算法。然而，在以下情况下，使用蒙特卡洛方法的离策略学习可能比其他方法更受青睐：\n\
    \n*   生成数据的行为策略与智能体当前遵循的目标策略存在显著差异。在这种情况下，使用其他方法（如时序差分学习）在目标策略下学习时，由行为策略收集的数据可能用处不大。另一方面，蒙特卡洛方法仍然可以用于估计状态或动作的价值，因为它们依赖于完整的情节序列，而不是单个转移。\n\
    *   智能体需要学习罕见或不频繁动作的价值。在某些环境中，某些动作可能很少见，或者行为策略很少选择它们。时序差分学习可能无法提供这些动作价值的准确估计，因为它依赖于单个转移来更新估计。相比之下，蒙特卡洛方法可以提供对罕见或不频繁动作价值更准确的估计，因为它们依赖于完整的情节序列。\n\
    *   智能体需要学习一个既不同于行为策略也不同于目标策略的策略的价值。在这种情况下，可以使用蒙特卡洛方法来估计所需策略的价值，而无需智能体在数据收集期间实际遵循该策略。\n\
    \n## 5.6 Q-Learning\n\n`Q-learning`是一种在线、离策略学习算法，由Watkins和Peter开发。它是一种无模型的强化学习方法，也使用时序差分学习，这意味着`Q-learning`支持情节式和持续式强化学习问题。它可能是现实世界中用于解决强化学习问题最常用的算法之一。由DeepMind构建的、能够以人类水平玩Atari视频游戏的著名`DQN`智能体，就是基于`Q-learning`（`DQN`智能体使用深度神经网络来近似状态-动作价值函数，我们将在本书第二部分介绍）。\n\
    \n我们之前介绍的`SARSA`算法被认为是通用策略迭代算法家族的一员。它估计策略`π`的状态-动作价值函数`Q_π`，并使用`ε`-贪婪策略来计算一个新的、更好的策略`π'`。尽管我们使用了一个更简单的`ε`-贪婪策略版本，跳过了计算更好确定性策略的步骤，但策略迭代的总体思想仍然适用于`SARSA`。\n\
    \n然而，如果我们还记得，我们在第3章中介绍了另一种动态规划算法，称为价值迭代。与通用策略迭代算法估计策略`π`的价值函数不同，价值迭代算法首先尝试基于`V_*`的贝尔曼最优方程来估计最优状态价值函数`V_*`：\n\
    \n```\nV_*(s) = max_a E[R_t + γ V_*(S_{t+1}) | S_t = s, A_t = a]\n       = max_a\
    \ [R(s, a) + γ Σ_{s'∈S} P(s'|s, a) V_*(s')], 对于所有 s∈S\n```\n\n(5.13)\n\n`Q-learning`采用了与价值迭代类似的思想，但它不是估计最优状态价值函数`V_*`，而是估计最优状态-动作价值函数`Q_*`。回顾`Q_*`的贝尔曼最优方程：\n\
    \n```\nQ_*(s, a) = E[R_t + γ max_{a'} Q_*(S_{t+1}, a') | S_t=s, A_t=a]\n```\n\n\
    (5.14)\n\n`Q-learning`使用公式(5.14)和时序差分学习的增量更新方法思想作为价值更新规则，其更新规则如下：\n\n```\nQ(S_t,\
    \ A_t) = Q(S_t, A_t) + α ( [R_t + γ max_{a'} Q(S_{t+1}, a')] - Q(S_t, A_t) )\n\
    ```\n\n(5.15)\n\n`Q-learning`是一种离策略学习算法，它避免了其他离策略学习算法中通常使用的重要性采样。重要性采样可能在计算上代价高昂并引入偏差，这使得`Q-learning`成为估计最优状态-动作价值函数的一种更高效、更可靠的方法。"
  raw: 'In the previous chapter, we introduced Monte Carlo methods for learning action
    values, and we can extend these methods to off-policy learning. However, the importance
    sampling ratio becomes more complex, as we need to include the action selection
    probability and state transition probability until the end of the episode. The
    equation for computing the importance sampling ratio, ![$$\rho _{t:T-1}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq259.png)
    , includes terms such as ![$$\pi (a|s)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq260.png)
    and ![$$\mu (a|s)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq261.png)
    , which represent the probability of selecting action *a* in state *s* under the
    target policy and behavior policy, respectively. It’s important to note that if
    either of these probabilities becomes zero at any point in the sequence of transitions,
    the importance sampling ratio becomes zero as well. This means that the value
    of the sequence will also become zero and be discarded.


    ![$$\displaystyle \begin{aligned} \rho_{t:T-1} &amp; = \frac{\pi(A_t|S_t) p(S_{t+1}|S_t,
    A_t) \pi(A_{t+1}|S_{t+1}) \cdots p(S_T|S_{T-1}, A_{T-1})}{\mu(A_t|S_t) p(S_{t+1}|S_t,
    A_t) \mu(A_{t+1}|S_{t+1}) \cdots p(S_T|S_{T-1}, A_{T-1})} \\ &amp; = \frac{\pi(A_t|S_t)\pi(A_{t+1}|S_{t+1})
    \cdots \pi(A_{T-1}|S_{T-1})}{\mu(A_t|S_t)\mu(A_{t+1}|S_{t+1}) \cdots \mu(A_{T-1}|S_{T-1})}
    {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ12.png)


    (5.12)


    In practice, TD learning with off-policy learning is often used, such as the Q-learning
    algorithm which we’ll introduce in the next section. However, off-policy learning
    using Monte Carlo methods might be preferred over other methods in situations
    where


    *   The behavior policy that generated the data is significantly different from
    the target policy that the agent is currently following. In this case, the data
    collected by the behavior policy may not be very useful for learning under the
    target policy using other methods, such as TD learning. Monte Carlo methods, on
    the other hand, can still be used to estimate the value of states or actions,
    as they rely on complete episode sequences rather than individual transitions.


    *   The agent needs to learn the value of rare or infrequent actions. In some
    environments, certain actions may be rare or infrequently selected by the behavior
    policy. TD learning might not provide accurate estimates of the value of these
    actions, as it relies on individual transitions to update the estimates. In contrast,
    Monte Carlo methods can provide more accurate estimates of the value of rare or
    infrequent actions, as they rely on complete episode sequences.


    *   The agent needs to learn the value of a policy that is different from both
    the behavior policy and the target policy. In this case, Monte Carlo methods can
    be used to estimate the value of the desired policy, without requiring the agent
    to actually follow that policy during data collection.


    ## 5.6 Q-Learning


    Q-learning is an online, off-policy learning algorithm, developed by Watkins and
    Peter [[3](#605748_1_En_5_Chapter.xhtml#CR3)]. It is a model-free reinforcement
    learning method that also uses TD learning, which means Q-learning supports episodic
    and continuing reinforcement learning problems. It is probably one of the most
    used algorithms in the real world to solve reinforcement learning problems. The
    famous DQN agent built by DeepMind, which can play Atari video games at human
    level, is based on Q-learning (DQN agent uses deep neural networks to approximate
    the state-action value function, which we will introduce in Part II of this book).


    The SARSA algorithm we introduced before is considered a family of general policy
    iteration algorithms. It estimates the state-action value function ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq262.png)
    for a policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq263.png)
    and uses the ![$$\epsilon $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq264.png)
    -greedy policy to compute a new, better policy ![$$\pi ''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq265.png)
    . Although we use a much simpler version of the ![$$\epsilon $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq266.png)
    -greedy policy that skips the step to compute a better deterministic policy, the
    general idea of policy iteration still applies to SARSA.


    However, if we remember, there is another DP algorithm we introduced in Chap.
    [3](#605748_1_En_3_Chapter.xhtml) called value iteration. Instead of estimating
    the value function of a policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq267.png)
    like the general policy iteration algorithm does, the value iteration algorithm
    first tries to estimate the optimal state value function ![$$V_*$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq268.png)
    , based on the Bellman optimality equation for ![$$V_*$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq269.png)
    :


    ![$$\displaystyle \begin{aligned} \begin{array}{rl} V_*(s) &amp; = \max_{a}\mathbb{E}_{\,\!\!}\left[R_t
    + {\gamma} V_*(S_{t+1}) \; \Big| \; S_t = s, A_t = a\right] \\ &amp; =\max_{a}
    \left[R(s, a) + {\gamma} \sum_{s'' \in \mathcal{S}} P(s''|s, a) V_*(s'') \right],
    \quad \mbox{for all}\; s \in \mathcal{S} \end{array} {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ13.png)


    (5.13)


    Q-learning adopts the similar idea as value iteration, but instead of estimating
    the optimal state value function ![$$V_*$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq270.png)
    , it estimates the optimal state-action value function ![$$Q_*$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq271.png)
    . Recall the Bellman optimality equation for ![$$Q_*$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq272.png)
    :


    ![$$\displaystyle \begin{aligned} Q_*(s, a) =\mathbb{E}_{\,\!\!}\left[R_t + {\gamma}
    \max_{a''}Q_*(S_{t+1}, a'') \;\Big|\; S_t=s, A_t=a\right] {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ14.png)


    (5.14)


    Q-learning uses Eq. ([5.14](#605748_1_En_5_Chapter.xhtml#Equ14)) and the idea
    of increment update methods for TD learning as the value update rule, which is
    given by the following update rule:


    ![$$\displaystyle \begin{aligned} Q(S_t, A_t) = Q(S_t, A_t) + \alpha \left( \Big[R_t
    + {\gamma} \max_{a''}Q(S_{t+1}, a'') \Big] - Q(S_t, A_t) \right) {} \end{aligned}
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ15.png)


    (5.15)


    Q-learning is an off-policy learning algorithm that avoids the need for importance
    sampling, which is typically used in other off-policy learning algorithms. Importance
    sampling can be computationally expensive and introduce bias, which makes Q-learning
    a more efficient and reliable method for estimating the optimal state-action value
    function.'
  trans: "\n在上一章中，我们介绍了用于学习动作价值的蒙特卡洛方法，并且可以将这些方法扩展到离策略学习。然而，重要性采样比率会变得更加复杂，因为我们需要包含直到情节结束的动作选择概率和状态转移概率。计算重要性采样比率`ρ_{t:T-1}`的公式包含了诸如`π(a|s)`和`μ(a|s)`这样的项，它们分别表示在目标策略和行为策略下，在状态`s`中选择动作`a`的概率。需要注意的是，如果在转移序列中的任何一点，这些概率中的任何一个变为零，那么重要性采样比率也会变为零。这意味着该序列的价值也将变为零并被丢弃。\n\
    \n```\nρ_{t:T-1} = (π(A_t|S_t) p(S_{t+1}|S_t, A_t) π(A_{t+1}|S_{t+1}) ... p(S_T|S_{T-1},\
    \ A_{T-1})) / (μ(A_t|S_t) p(S_{t+1}|S_t, A_t) μ(A_{t+1}|S_{t+1}) ... p(S_T|S_{T-1},\
    \ A_{T-1}))\n          = (π(A_t|S_t) π(A_{t+1}|S_{t+1}) ... π(A_{T-1}|S_{T-1}))\
    \ / (μ(A_t|S_t) μ(A_{t+1}|S_{t+1}) ... μ(A_{T-1}|S_{T-1}))\n```\n\n(5.12)\n\n\
    在实践中，经常使用带有离策略学习的时序差分学习，例如我们将在下一节介绍的`Q-learning`算法。然而，在以下情况下，使用蒙特卡洛方法的离策略学习可能比其他方法更受青睐：\n\
    \n*   生成数据的行为策略与智能体当前遵循的目标策略存在显著差异。在这种情况下，使用其他方法（如时序差分学习）在目标策略下学习时，由行为策略收集的数据可能用处不大。另一方面，蒙特卡洛方法仍然可以用于估计状态或动作的价值，因为它们依赖于完整的情节序列，而不是单个转移。\n\
    *   智能体需要学习罕见或不频繁动作的价值。在某些环境中，某些动作可能很少见，或者行为策略很少选择它们。时序差分学习可能无法提供这些动作价值的准确估计，因为它依赖于单个转移来更新估计。相比之下，蒙特卡洛方法可以提供对罕见或不频繁动作价值更准确的估计，因为它们依赖于完整的情节序列。\n\
    *   智能体需要学习一个既不同于行为策略也不同于目标策略的策略的价值。在这种情况下，可以使用蒙特卡洛方法来估计所需策略的价值，而无需智能体在数据收集期间实际遵循该策略。\n\
    \n## 5.6 Q-Learning\n\n`Q-learning`是一种在线、离策略学习算法，由 Watkins 和 Peter 开发。它是一种无模型的强化学习方法，也使用时序差分学习，这意味着`Q-learning`支持情节式和持续式强化学习问题。它可能是现实世界中用于解决强化学习问题最常用的算法之一。由\
    \ DeepMind 构建的、能够以人类水平玩 Atari 视频游戏的著名`DQN`智能体，就是基于`Q-learning`（`DQN`智能体使用深度神经网络来近似状态-动作价值函数，我们将在本书第二部分介绍）。\n\
    \n我们之前介绍的`SARSA`算法被认为是通用策略迭代算法家族的一员。它估计策略`π`的状态-动作价值函数`Q_π`，并使用`ε`-贪婪策略来计算一个新的、更好的策略`π'`。尽管我们使用了一个更简单的`ε`-贪婪策略版本，跳过了计算更好确定性策略的步骤，但策略迭代的总体思想仍然适用于`SARSA`。\n\
    \n然而，如果我们还记得，我们在第 3 章中介绍了另一种动态规划算法，称为价值迭代。与通用策略迭代算法估计策略`π`的价值函数不同，价值迭代算法首先尝试基于`V_*`的贝尔曼最优方程来估计最优状态价值函数`V_*`：\n\
    \n```\nV_*(s) = max_a E[R_t + γ V_*(S_{t+1}) | S_t = s, A_t = a]\n       = max_a\
    \ [R(s, a) + γ Σ_{s'∈S} P(s'|s, a) V_*(s')], 对于所有 s∈S\n```\n\n(5.13)\n\n`Q-learning`采用了与价值迭代类似的思想，但它不是估计最优状态价值函数`V_*`，而是估计最优状态-动作价值函数`Q_*`。回顾`Q_*`的贝尔曼最优方程：\n\
    \n```\nQ_*(s, a) = E[R_t + γ max_{a'} Q_*(S_{t+1}, a') | S_t=s, A_t=a]\n```\n\n\
    (5.14)\n\n`Q-learning`使用公式(5.14)和时序差分学习的增量更新方法思想作为价值更新规则，其更新规则如下：\n\n```\nQ(S_t,\
    \ A_t) = Q(S_t, A_t) + α ( [R_t + γ max_{a'} Q(S_{t+1}, a')] - Q(S_t, A_t) )\n\
    ```\n\n(5.15)\n\n`Q-learning`是一种离策略学习算法，它避免了其他离策略学习算法中通常使用的重要性采样。重要性采样可能在计算上代价高昂并引入偏差，这使得`Q-learning`成为估计最优状态-动作价值函数的一种更高效、更可靠的方法。\n"
- fmt: 'Q-learning 的一个优势是，它总是使用后继状态 `s''` 所有有效动作中的最大 Q 值 `max_a'' Q(S_{t+1}, a'')`
    进行更新，无论行为策略选择了哪个动作。对于 Q-learning，由于目标策略总是为后继状态选择具有最大 Q 值的动作，因此重要性采样比率简化为：在行为策略下选择最大
    Q 值动作的概率除以在目标策略下选择最大 Q 值动作的概率。该比率始终等于 1，与行为策略无关，因为在值更新过程中并未使用行为策略选择的动作。相比之下，其他离策略学习算法可能需要重要性采样来纠正行为策略与目标策略之间的差异。


    图 5.5 展示了一个 Q-learning 为目标策略 `π` 估计最优状态-动作值函数 `Q*` 的示例。如图所示，无论智能体在遵循行为策略 `μ` 进入后继状态
    `s''` 时选择了哪个动作，用于值更新的遍历路径始终相同。然而，在某些特殊情况下，例如使用依赖于行为策略选择动作的 N 步回报时，我们仍需使用重要性采样。


    [图：一个离策略 Q-learning 的树状图，从节点 s 开始，分支到 3 个节点。左右节点及其分支未标记。中间节点标记为 a, r，分支到一个 s''
    节点和一个未标记节点。s'' 节点分支到一个 a'' 节点和一个 a'''' 节点。]


    **图 5.5** 离策略 Q-learning 为目标策略 `π` 估计最优状态-动作值函数 `Q*` 的示例


    为了更新 Q-learning 中的 Q 值，我们使用目标策略来评估动作 `a'' = max_a'' Q(S_{t+1}, a'')`，同时使用评估值来学习同一个目标策略。这意味着
    Q-learning 的重要性采样比率简化为 1，因为分子和分母相同。具体来说，重要性采样比率可以表示为：


    ```

    ρ_{t+1} = (π(A_{t+1}|S_{t+1}) * p(S_{t+1}|S_t, A_t)) / (π(A_{t+1}|S_{t+1}) * p(S_{t+1}|S_t,
    A_t)) = 1

    ```


    (5.16)


    通过避免对重要性采样的需求，Q-learning 在计算上更高效，并且可以更准确地估计最优状态-动作值函数。例如，假设我们有一个使用 Q-learning
    的智能体，它已经为某个状态 `s` 和动作 `a` 估计了状态-动作值 `Q(s, a) = 10`。现在，智能体执行动作 `a` 并转移到新状态 `s''`，其中最大
    Q 值为 `Q(s'', a'') = 15`。然而，用于在状态 `s''` 中选择动作的行为策略与用于更新 Q 值的目标策略不同。在这种情况下，更新 `Q(s,
    a)` 的重要性采样比率涉及在行为策略和目标策略下选择 `a` 和 `a''` 的概率之比。但由于 Q-learning 总是使用下一个状态的最大 Q 值，我们无需考虑选择导致该最大值的动作的概率。这简化了更新过程，并使
    Q-learning 比其他需要重要性采样的离策略学习算法更高效。


    Q-learning 是一种无模型强化学习算法，与 SARSA 类似，它需要平衡探索和利用以学习最优策略。在强化学习中，探索指的是尝试新动作以发现潜在更优的策略，而利用指的是利用已知策略以最大化奖励。为此，我们可以采用
    `ε`-贪心策略，该策略以概率 `1 - ε` 选择最佳动作，以概率 `ε` 选择随机动作。


    Q-learning 和 SARSA 具有相似的结构和流程，都使用时序差分（TD）学习方法。然而，在 Q 值更新过程中，Q-learning 总是为后继状态
    `S_{t+1}` 选择具有最高 Q 值的动作，记为 `max_a'' Q(S_{t+1}, a'')`，而 SARSA 则从策略中采样一个动作。这是因为
    Q-learning 是一种离策略算法，它基于最佳可能动作更新 Q 值，而 SARSA 是一种在策略算法，它基于实际采取的动作更新 Q 值。


    Q-learning 算法的伪代码如算法 7 所示。与 SARSA 一样，Q-learning 对超参数敏感，例如步长 `α` 和 `ε`-贪心策略的探索率
    `ε`。步长决定了算法更新 Q 值的速度，而探索率决定了算法探索新动作（而非利用当前最佳动作）的频率。


    **算法 7：** 带 `ε`-贪心探索的 Q-learning


    [图：一个 10 行算法，标题为“带 epsilon 减贪心探索的 Q-learning”，输入为折扣率 gamma、初始探索率 epsilon、步长 alpha
    和步数 K，输出为估计的最优状态-动作值函数 Q。]'
  raw: 'One advantage of Q-learning is that it always uses the maximum value ![$$Q(S_{t+1},
    a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq273.png) across
    all valid actions for the successor state ![$$s''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq274.png)
    , regardless of which action is chosen by the behavior policy. For Q-learning,
    since the target policy always selects the action with the maximum Q-value for
    the successor state, the importance sampling ratio simplifies to the probability
    of selecting the maximum Q-value action under the behavior policy divided by the
    probability of selecting the maximum Q-value action under the target policy. This
    ratio is always equal to 1, regardless of the behavior policy, because it does
    not use the action chose by the behavior policy during the value update. In contrast,
    other off-policy learning algorithms may require importance sampling to correct
    for the differences between the behavior policy and the target policy.


    Figure [5.5](#605748_1_En_5_Chapter.xhtml#Fig5) shows an example of Q-learning
    estimating the optimal state-action value function ![$$Q_*$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq275.png)
    for target policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq276.png)
    . As the diagram shows, the traversed path for value update is always the same,
    regardless of the action the agent chooses when following the behavior policy
    ![$$\mu $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq277.png)
    in the successor state ![$$s''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq278.png)
    . However, there are special cases where we are required to use importance sampling,
    such as when using N-step returns, which rely on the behavior policy to select
    actions.


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Fig5_HTML.png)


    A tree chart for off-policy Q-learning learning starts with node s and branches
    off to 3 nodes. The left and right nodes along with their branches are unlabeled.
    The middle node labeled a, r branches off to an s prime and an unlabeled node.
    The S prime node branches off to a prime node and a double prime node.


    Fig. 5.5


    Example of off-policy Q-learning estimating the optimal state-action value function
    ![$$Q_*$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq279.png)
    for target policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq280.png)


    To update the Q-values in Q-learning, we use the target policy to evaluate the
    action ![$$a'' = \max _{a''}Q(S_{t+1}, a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq281.png)
    while at the same time using the evaluated value to learn the same target policy.
    This means that the importance sampling ratio for Q-learning simplifies to 1,
    as the numerator and denominator are the same. Specifically, the importance sampling
    ratio can be expressed as


    ![$$\displaystyle \begin{aligned} \rho_{t+1} &amp; = \frac{\pi(A_{t+1}|S_{t+1})
    p(S_{t+1}|S_t, A_t)}{\pi(A_{t+1}|S_{t+1}) p(S_{t+1}|S_t, A_t)} \\ &amp; = 1 {}
    \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ16.png)


    (5.16)


    By avoiding the need for importance sampling, Q-learning is computationally efficient
    and can estimate the optimal state-action value function more accurately. For
    example, suppose we have an agent using Q-learning, and it has already estimated
    the state-action values for some state *s* and action *a* as ![$$Q(s,a) = 10$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq282.png)
    . Now, the agent takes action *a* and transitions to a new state ![$$s''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq283.png)
    , where the maximum Q-value is ![$$Q(s'',a'') = 15$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq284.png)
    . However, the behavior policy used to select the action in state ![$$s''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq285.png)
    is different from the target policy used to update the Q-value. In this case,
    the importance sampling ratio for updating ![$$Q(s,a)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq286.png)
    involves the ratio of probabilities of selecting *a* and ![$$a''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq287.png)
    under the behavior policy and the target policy, but because Q-learning always
    uses the maximum Q-value for the next state, we do not need to consider the probability
    of selecting the action that led to that maximum value. This simplifies the update
    process and makes Q-learning more efficient than other off-policy learning algorithms
    that require importance sampling.


    Q-learning is a model-free reinforcement learning algorithm, similar to SARSA,
    that requires balancing exploration and exploitation to learn an optimal policy.
    In reinforcement learning, exploration refers to trying out new actions to discover
    potentially better strategies, while exploitation refers to exploiting known strategies
    to maximize rewards. To accomplish this, we can employ the ![$$\epsilon $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq288.png)
    -greedy policy, which selects the best action with probability ![$$1-\epsilon
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq289.png) and a random
    action with probability ![$$\epsilon $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq290.png)
    .


    Q-learning and SARSA share a similar structure and procedure, both using a temporal
    difference (TD) learning approach. However, during the Q-value update, Q-learning
    always chooses the action with the highest Q-value for the successor state ![$$S_{t+1}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq291.png)
    , denoted as ![$$\max _{a''}Q(S_{t+1}, a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq292.png)
    , whereas SARSA samples an action from the policy. This is because Q-learning
    is an off-policy algorithm that updates the Q-values based on the best possible
    action, whereas SARSA is an on-policy algorithm that updates the Q-values based
    on the action actually taken.


    The pseudocode for the Q-learning algorithm is shown in Algorithm 7. As with SARSA,
    Q-learning is sensitive to hyperparameters such as the step size ![$$\alpha $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq293.png)
    and the exploration rate ![$$\epsilon $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq294.png)
    of the ![$$\epsilon $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq295.png)
    -greedy policy. The step size determines how quickly the algorithm updates the
    Q-values, while the exploration rate determines how often the algorithm explores
    new actions instead of exploiting the current best action.


    Algorithm 7: Q-learning with *𝜖*-greedy exploration


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Figaag_HTML.gif) A 10-line algorithm
    titled Q-learning with epsilon minus greedy exploration takes in the following
    inputs to give an estimated optimal state-action value function Q as the output.
    Discount rate gamma, initial exploration rate epsilon, step size alpha, and number
    of steps K.'
