- fmt: '### The N-Step Update Rule for Q-Learning


    In standard Q-learning, the best action is always used to evaluate the successor
    state. However, when using N-step returns, the incremental update rule becomes
    more complex. The update rule involves taking the sum of rewards for the next
    N steps and then bootstrapping from the value of the state N steps ahead. Bootstrapping
    refers to using an estimate of the value function to update the estimate of the
    value function. This allows the agent to learn from a longer sequence of experiences
    and make better decisions.


    Here’s the equation for the update rule:


    ![$$\displaystyle \begin{aligned} Q_\pi(S_t, A_t) ={} &amp; Q_\pi(S_t, A_t) +
    \alpha \bigg( \Big[ R_t + {\gamma} R_{t+1} + \cdots + {\gamma}^{n-1}R_{t+n-1}
    \\ &amp; + {\gamma}^{n} \max_{a''}Q_\pi(S_{t+n}, a'') \Big] - Q_\pi(S_t, A_t)
    \bigg) {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ25.png)


    (5.25)


    In this equation, `Q(S_t, A_t)` is the estimated value of taking action `A_t`
    in state `S_t`, `α` is the step size parameter, `R_t` is the reward received after
    taking action `A_t` in state `S_t`, `γ` is the discount factor, and `n` is the
    number of steps used for the return. Each variable in the equation has a specific
    meaning, as explained in the comments following the equation.


    ### N-Step Q-Learning and Importance Sampling


    In Q-learning, which is an off-policy reinforcement learning algorithm, it estimates
    the value of a policy different from the policy that is being followed. When using
    standard Q-learning with `N=1`, it is not necessary to use importance sampling
    to weight the TD target. However, when using N-step with `N ≥ 2`, importance sampling
    is needed because the N-step rewards are generated by the behavior policy `μ`,
    which could potentially be different from the target policy `π`.


    For example, if we use `N=2` as shown in Fig. 5.12, we can see that the trajectory
    after the agent takes action `a` in state `s` over the course of N-step could
    be completely different between the behavior and target policies. The behavior
    policy is more exploratory, meaning it might not choose the best action which
    is what the target policy would choose. Thus, the path could diverge. This might
    not be a big issue if we use a relatively small value for `N`, but the issue might
    become more significant if the value of `N` becomes very large.


    To compute the importance sampling ratio for N-step Q-learning, we can skip both
    the first step `t` and last step (`t+n`); the reason for skipping the first step
    is since we’re estimating the value for a state-action pair `(s, a)`, it does
    not matter what the probability is that the behavior policy (or target policy)
    will select action `a` when in state `s`, because it has already happened. The
    reason for the last step (`t+n`) is because Q-learning always uses the maximum
    value `Q(s'', a'')` across all valid actions for the successor state `S_{t+n}`,
    regardless of which action is chosen by the behavior policy, regardless of the
    behavior policy, which makes the importance sampling ratio for the last step `t+n`
    always equal to 1.


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Fig12_HTML.png)


    A tree chart of sampling for N-step Q learning starts with node S which gives
    a node labeled a, r. Node a, r branches off to 2 nodes. The left node and its
    branches are unlabeled. The right node labeled s prime branches off to a prime
    and s prime. Both a prime and s prime give an s double prime node each.


    **Fig. 5.12** Why we should use importance sampling for N-step Q-learning (for
    the case where `n=2`), where `π` is the target policy and `μ` is the behavior
    policy


    In other words, we can compute the importance sampling ratio for the remaining
    steps `t+1, t+2, …, t+n-1`. This simplifies the computation of the importance
    sampling ratio and reduces the variance of the estimates.'
