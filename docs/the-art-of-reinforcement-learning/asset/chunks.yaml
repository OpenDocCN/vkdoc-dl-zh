    # 算法 1：带基线的 REINFORCE 算法（线性值函数逼近）


    算法 1 给出了以状态值函数为基线的 REINFORCE 算法的伪代码，其中我们使用线性值函数逼近来近似基线函数。在训练过程中，智能体同时学习参数化的策略函数和参数化的值函数。需要注意的是，为这两个任务使用不同的学习率是有益的，因为它们的本质截然不同。因此，我们为策略使用独立的学习率`α`，为基线函数使用独立的学习率`β`。


    **算法 2：带基线的 REINFORCE 算法 [线性-VFA]**


    ![](img/605748_1_En_9_Figaab_HTML.gif)


    一个 8 行算法接收以下输入，输出近似最优策略`θ*`：折扣率`γ`、策略学习率`α`、基线函数学习率`β`以及回合数`K`。


    在实际应用中，我们通常使用神经网络来近似策略和基线函数。这里，我们用`θ`表示策略的参数，用`ψ`表示基线函数的参数。在这种情况下，我们计算样本回报`G_t`与基线网络估计值之间的平方误差损失`(G_t
    - V̂(s_t; ψ))²`，以及策略网络的负对数似然损失`-log π(a_t|s_t; θ)`。需要注意的是，当使用神经网络时，应在多个时间步上累积梯度，而不是逐步更新参数。然后，我们可以使用神经网络优化器（如随机梯度下降或
    Adam）基于累积的梯度来更新参数。


    总体而言，使用参数化的策略和值函数，并借助神经网络对其进行近似，可以带来更高效、更有效的强化学习算法。


    图 9.3 展示了在车杆经典控制任务上，带基线与不带基线的 REINFORCE 算法的性能表现。性能通过获得的平均奖励来衡量。为了评估智能体的性能，我们在每次训练迭代（包含
    20,000 个训练步）结束时，在一个独立的测试环境中运行了 20,000 个评估步。结果取五次独立运行的平均值，并使用窗口大小为 5 的移动平均进行平滑处理。


    ![](img/605748_1_En_9_Fig3_HTML.png)


    一张评估回合回报相对于训练环境步数的折线图。图中绘制了 REINFORCE 和带基线的 REINFORCE 算法呈下凸增长且带有小幅波动的曲线。一条平行于横轴的直线表示最大值，该值从纵轴上的
    500 开始。


    **图 9.3** 车杆控制任务中带基线与不带基线的 REINFORCE 算法对比。结果取五次独立运行的平均值。我们对这两个智能体使用相同的折扣率`γ =
    0.99`、策略神经网络学习率`α = 0.0002`，以及基线网络学习率`β = 0.0005`。


    **算法 3：带基线的 REINFORCE 算法 [使用神经网络]**


    ![](img/605748_1_En_9_Figaac_HTML.gif)


    一个标题为“带基线的 REINFORCE 算法”的 10 行算法接收以下输入，输出近似最优策略`θ*`：折扣率`γ`、策略学习率`α`、基线函数学习率`β`以及回合数`K`。


    在本实验中，我们使用了一个非常简单的神经网络架构，由两个隐藏层的全连接神经网络组成。每个隐藏层有 64 个单元，并跟随一个 ReLU 激活函数。每个隐藏层的输出随后被送入最终输出层，其中策略网络使用
    softmax 激活函数，基线网络不使用激活函数。选择这种简单架构是为了将重点放在强化学习算法上，并降低计算需求。


    对于两个智能体，我们使用相同的折扣率`γ = 0.99`和策略神经网络学习率`α = 0.0002`。我们还为基线网络使用了学习率`β = 0.0005`。我们使用
    Adam 优化器训练神经网络。


    这些超参数的值是基于先前的实验选择的，可能并非针对特定任务的最佳值。

    '
- fmt: "# 9.5 Actor-Critic\n\nOne drawback of the `REINFORCE` algorithm and its variant\
    \ using a baseline function is that it’s an offline learning algorithm. This is\
    \ because the agent has to wait until the end of an episode to update the policy\
    \ parameters. As a result, this algorithm is only capable of solving episodic\
    \ reinforcement learning problems. In this section, we introduce a new family\
    \ of algorithms called *Actor-Critic*, originally proposed by Sutton and Barto.\
    \ It is a model-free, online, on-policy learning algorithm. With Actor-Critic,\
    \ the agent doesn’t have to wait until the end of the episode to update the policy\
    \ parameters, which means we can use it to solve both episodic and continuing\
    \ reinforcement learning problems. In Actor-Critic, we call the learned policy\
    \ the *Actor* and the baseline function the *Critic*. The agent only acts according\
    \ to the learned policy, but during training, the baseline function is also used\
    \ to help reduce variance. In this chapter, we’ll focus on using Actor-Critic\
    \ algorithms to solve episodic reinforcement learning problems with discrete action\
    \ spaces.\n\nLet’s first review the Bellman equation for the state value function\
    \ `V_π` for an MDP. We can write it recursively using the immediate reward `r_t`\
    \ and the discounted value of the successor state `γ V_π(s_{t+1})` as shown in\
    \ Eq. (9.18):\n\n```\nV_π(s) = E_π[ G_t | s_t = s ]\n       = E_π[ r_t + γ V_π(s_{t+1})\
    \ | s_t = s ]\n```\n\n(9.18)\n\nThis means we can use `r_t + γ V_π(s_{t+1})` to\
    \ replace the return `G_t` in the equation for policy gradients with respect to\
    \ the policy parameters `θ`. Note that the following equation covers both episodic\
    \ and continuing problems, so we use time steps `t = 0, 1, ..., ∞`, which is why\
    \ the upper limit in the summation is `∞` in Eq. (9.19).\n\n```\n∇_θ J(θ) = E_{π_θ}[\
    \ Σ_{t=0}^{∞} γ^t G_t ∇_θ log π(a_t | s_t; θ) ]\n```\n\n(9.19)\n\n```\n      \
    \   = E_{π_θ}[ Σ_{t=0}^{∞} γ^t ( r_t + γ V_π(s_{t+1}) ) ∇_θ log π(a_t | s_t; θ)\
    \ ]\n```\n\n(9.20)\n\nWith Eq. (9.20), the algorithm now becomes fully online,\
    \ as we only need a single transition `(s, a, r, s')` to update the policy parameters.\
    \ To help reduce variance, we can also include the baseline term, just like in\
    \ `REINFORCE` with baseline. In this case, the baseline function is just the same\
    \ state value function `V_π` we use to compute the return `G_t`, so Eq. (9.20)\
    \ can be written as follows:\n\n```\n∇_θ J(θ) = E_{π_θ}[ Σ_{t=0}^{∞} γ^t ( G_t\
    \ - V_π(s_t) ) ∇_θ log π(a_t | s_t; θ) ]\n```\n\n(9.21)\n\n```\n         = E_{π_θ}[\
    \ Σ_{t=0}^{∞} γ^t ( r_t + γ V_π(s_{t+1}) - V_π(s_t) ) ∇_θ log π(a_t | s_t; θ)\
    \ ]\n```\n\n(9.22)\n\nWe can also write the policy gradient using the advantage\
    \ function, in the case of using the state value function `V_π` as the baseline\
    \ function, and using state-action value function `Q_π` to estimate the return\
    \ `G_t`, as shown:\n\n```\n∇_θ J(θ) ≈ E_{π_θ}[ Σ_{t=0}^{∞} γ^t ( Q_π(s_t, a_t)\
    \ - V_π(s_t) ) ∇_θ log π(a_t | s_t) ]\n         ≈ E_{π_θ}[ Σ_{t=0}^{∞} γ^t Â_π(s_t,\
    \ a_t) ∇_θ log π(a_t | s_t) ]\n```\n\n(9.23)\n\nwhere `Â_π` is the advantage\
    \ function, and `Â_π(s, a) = Q_π(s, a) - V_π(s)`.\n\nThis is possible because\n\
    \n```\nQ_π(s, a) = r_t + γ Σ_{s' ∈ S} P(s' | s, a) V_π(s')\n          ≈ r_t +\
    \ γ V_π(s')\n```\n\n(9.24)\n\nOverall, the Actor-Critic algorithm is a powerful\
    \ tool for solving reinforcement learning problems. It provides a way to learn\
    \ a policy online, without waiting for the end of an episode, while also reducing\
    \ variance using a baseline function. The estimated advantage function helps measure\
    \ the advantage of taking actions in a given state, which can improve the performance\
    \ of the algorithm.\n\nWhen using neural networks `θ` and `ψ` to approximate the\
    \ policy `π` and state value function `V_π`, respectively, we can express Eq.\
    \ (9.20) as follows:"
  raw: '## 9.5 Actor-Critic


    One drawback of the REINFORCE algorithm and its variant using a baseline function
    is that it’s an offline learning algorithm. This is because the agent has to wait
    until the end of an episode to update the policy parameters. As a result, this
    algorithm is only capable of solving episodic reinforcement learning problems.
    In this section, we introduce a new family of algorithms called *Actor-Critic*,
    originally proposed by Sutton and Barto [[5](#605748_1_En_9_Chapter.xhtml#CR5)].
    It is a model-free, online, on-policy learning algorithm. With Actor-Critic, the
    agent doesn’t have to wait until the end of the episode to update the policy parameters,
    which means we can use it to solve both episodic and continuing reinforcement
    learning problems. In Actor-Critic, we call the learned policy the *Actor* and
    the baseline function the *Critic*. The agent only acts according to the learned
    policy, but during training, the baseline function is also used to help reduce
    variance. In this chapter, we’ll focus on using Actor-Critic algorithms to solve
    episodic reinforcement learning problems with discrete action spaces.


    Let’s first review the Bellman equation for the state value function ![$$V_\pi
    $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq126.png) for an
    MDP. We can write it recursively using the immediate reward ![$$r_t$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq127.png)
    and the discounted value of the successor state ![$${\gamma } V_\pi (s_{t+1})$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq128.png)
    as shown in Eq. ([9.18](#605748_1_En_9_Chapter.xhtml#Equ19)):


    ![$$\displaystyle \begin{aligned} V_\pi(s) &amp; =\mathbb{E}_{\pi\!\!}\left[G_t
    \;\Big|\; s_t=s\right] \notag \\ &amp; =\mathbb{E}_{\pi\!\!}\left[r_t + {\gamma}
    V_\pi(s_{t+1}) \;\Big|\; s_t=s\right] {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ19.png)


    (9.18)


    This means we can use ![$$r_t + {\gamma } V_\pi (s_{t+1})$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq129.png)
    to replace the return ![$$G_t$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq130.png)
    in the equation for policy gradients with respect to the policy parameters ![$$\boldsymbol
    {\theta }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq131.png)
    . Note that the following equation covers both episodic and continuing problems,
    so we use time steps ![$$t=0, 1, \cdots , \infty $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq132.png)
    , which is why the upper limit in the summation is ![$$\infty $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq133.png)
    in Eq. ([9.19](#605748_1_En_9_Chapter.xhtml#Equ20)).


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{\infty} {\gamma}^t
    G_t \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta}) \right]
    {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ20.png)


    (9.19)


    ![$$\displaystyle \begin{aligned} &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \sum_{t=0}^{\infty} {\gamma}^t \Bigl( r_t + {\gamma} V_\pi(s_{t+1}) \Bigr) \nabla_{\boldsymbol{\theta}}
    \log \pi (a_t|s_t; \boldsymbol{\theta}) \right] {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ21.png)


    (9.20)


    With Eq. ([9.20](#605748_1_En_9_Chapter.xhtml#Equ21)), the algorithm now becomes
    fully online, as we only need a single transition ![$$(s, a, r, s'')$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq134.png)
    to update the policy parameters. To help reduce variance, we can also include
    the baseline term, just like in REINFORCE with baseline. In this case, the baseline
    function is just the same state value function ![$$V_\pi $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq135.png)
    we use to compute the return ![$$G_t$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq136.png)
    , so Eq. ([9.20](#605748_1_En_9_Chapter.xhtml#Equ21)) can be written as follows:


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{\infty} {\gamma}^t
    \Bigl( G_t - V_\pi(s_t)\Bigr) \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t;
    \boldsymbol{\theta}) \right] {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ22.png)


    (9.21)


    ![$$\displaystyle \begin{aligned} &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \sum_{t=0}^{\infty} {\gamma}^t \Bigl( r_t + {\gamma} V_\pi(s_{t+1}) - V_\pi(s_t)\Bigr)
    \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta}) \right] {}
    \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ23.png)


    (9.22)


    We can also write the policy gradient using the advantage function, in the case
    of using the state value function ![$$V_{\pi }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq137.png)
    as the baseline function, and using state-action value function ![$$Q_{\pi }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq138.png)
    to estimate the return ![$$G_t$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq139.png)
    , as shown:


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    &amp; \approx \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{\infty}
    {\gamma}^t \bigl( Q_{\pi}(s_t, a_t) - V_{\pi}(s_t) \bigr) \nabla_{\boldsymbol{\theta}}
    \log \pi (a_t|s_t) \right] \notag \\ &amp; \approx \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \sum_{t=0}^{\infty} {\gamma}^t \hat{A}_{\pi}(s_t, a_t) \nabla_{\boldsymbol{\theta}}
    \log \pi (a_t|s_t) \right] \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ24.png)


    (9.23)


    where ![$$\hat {A}_{\pi }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq140.png)
    is the advantage function, and ![$$\hat {A}_{\pi }(s, a) = Q_{\pi }(s, a) - V_{\pi
    }(s)$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq141.png) .


    This is possible because


    ![$$\displaystyle \begin{aligned} Q_\pi(s, a) &amp; = r_t + {\gamma} \sum_{s''
    \in \mathcal{S}}P(s'' \mid s, a)V_\pi(s'') \notag \\ &amp; \approx r_t + {\gamma}
    V_\pi(s'') {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ25.png)


    (9.24)


    Overall, the Actor-Critic algorithm is a powerful tool for solving reinforcement
    learning problems. It provides a way to learn a policy online, without waiting
    for the end of an episode, while also reducing variance using a baseline function.
    The estimated advantage function helps measure the advantage of taking actions
    in a given state, which can improve the performance of the algorithm.


    When using neural networks ![$$\boldsymbol {\theta }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq142.png)
    and ![$$\boldsymbol {\psi }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq143.png)
    to approximate the policy ![$$\pi $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq144.png)
    and state value function ![$$V_\pi $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq145.png)
    , respectively, we can express Eq. ([9.20](#605748_1_En_9_Chapter.xhtml#Equ21))
    as follows:'
  trans: "\n# 9.5 演员-评论家算法\n\n`REINFORCE`算法及其使用基线函数的变体有一个缺点：它是一种离线学习算法。这是因为智能体必须等待一个回合结束才能更新策略参数。因此，该算法只能解决回合制强化学习问题。在本节中，我们将介绍一类名为*演员-评论家*的新算法，该算法最初由萨顿和巴托提出。它是一种无模型、在线、同策略的学习算法。使用演员-评论家算法，智能体无需等待回合结束即可更新策略参数，这意味着我们可以用它来解决回合制和持续性强化学习问题。在演员-评论家算法中，我们将学习到的策略称为*演员*，将基线函数称为*评论家*。智能体仅根据学习到的策略行动，但在训练过程中，也会使用基线函数来帮助减少方差。在本章中，我们将重点介绍如何使用演员-评论家算法来解决具有离散动作空间的回合制强化学习问题。\n\
    \n首先，我们回顾一下 MDP 中状态价值函数`V_π`的贝尔曼方程。我们可以使用即时奖励`r_t`和后继状态的折扣价值`γ V_π(s_{t+1})`递归地写出该方程，如公式(9.18)所示：\n\
    \n```\nV_π(s) = E_π[ G_t | s_t = s ]\n       = E_π[ r_t + γ V_π(s_{t+1}) | s_t\
    \ = s ]\n```\n\n(9.18)\n\n这意味着我们可以用`r_t + γ V_π(s_{t+1})`来替换策略梯度方程中关于策略参数`θ`的回报`G_t`。请注意，以下方程同时涵盖了回合制和持续性问题，因此我们使用时间步`t\
    \ = 0, 1, ..., ∞`，这就是公式(9.19)中求和上限为`∞`的原因。\n\n```\n∇_θ J(θ) = E_{π_θ}[ Σ_{t=0}^{∞}\
    \ γ^t G_t ∇_θ log π(a_t | s_t; θ) ]\n```\n\n(9.19)\n\n```\n         = E_{π_θ}[\
    \ Σ_{t=0}^{∞} γ^t ( r_t + γ V_π(s_{t+1}) ) ∇_θ log π(a_t | s_t; θ) ]\n```\n\n\
    (9.20)\n\n通过公式(9.20)，该算法现在完全变为在线形式，因为我们只需要一个单步转移`(s, a, r, s')`即可更新策略参数。为了帮助减少方差，我们还可以像带基线的`REINFORCE`算法那样加入基线项。在这种情况下，基线函数正是我们用来计算回报`G_t`的同一个状态价值函数`V_π`，因此公式(9.20)可以写成如下形式：\n\
    \n```\n∇_θ J(θ) = E_{π_θ}[ Σ_{t=0}^{∞} γ^t ( G_t - V_π(s_t) ) ∇_θ log π(a_t |\
    \ s_t; θ) ]\n```\n\n(9.21)\n\n```\n         = E_{π_θ}[ Σ_{t=0}^{∞} γ^t ( r_t +\
    \ γ V_π(s_{t+1}) - V_π(s_t) ) ∇_θ log π(a_t | s_t; θ) ]\n```\n\n(9.22)\n\n我们也可以使用优势函数来写出策略梯度，在这种情况下，使用状态价值函数`V_π`作为基线函数，并使用状态-动作价值函数`Q_π`来估计回报`G_t`，如下所示：\n\
    \n```\n∇_θ J(θ) ≈ E_{π_θ}[ Σ_{t=0}^{∞} γ^t ( Q_π(s_t, a_t) - V_π(s_t) ) ∇_θ log\
    \ π(a_t | s_t) ]\n         ≈ E_{π_θ}[ Σ_{t=0}^{∞} γ^t Â_π(s_t, a_t) ∇_θ log π(a_t\
    \ | s_t) ]\n```\n\n(9.23)\n\n其中`Â_π`是优势函数，且`Â_π(s, a) = Q_π(s, a) - V_π(s)`。\n\
    \n这是可行的，因为\n\n```\nQ_π(s, a) = r_t + γ Σ_{s' ∈ S} P(s' | s, a) V_π(s')\n     \
    \     ≈ r_t + γ V_π(s')\n```\n\n(9.24)\n\n总的来说，演员-评论家算法是解决强化学习问题的一个强大工具。它提供了一种在线学习策略的方法，无需等待回合结束，同时通过使用基线函数来减少方差。估计的优势函数有助于衡量在给定状态下采取动作的优势，这可以提高算法的性能。\n\
    \n当使用神经网络`θ`和`ψ`分别近似策略`π`和状态价值函数`V_π`时，我们可以将公式(9.20)表示如下：\n"
- fmt: '![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{\infty} {\gamma}^t
    \Bigl( r_t + {\gamma} \hat{V}(s_{t+1}; \boldsymbol{\psi}) - \hat{V}(s_t; \boldsymbol{\psi})
    \Bigr) \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta}) \right]
    {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ26.png)


    (9.25)


    In practice, we often simplify this equation by removing the summation, which
    gives us a much simpler equation:


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \Bigl( r_t + {\gamma} \hat{V}(s_{t+1};
    \boldsymbol{\psi}) - \hat{V}(s_t; \boldsymbol{\psi}) \Bigr) \nabla_{\boldsymbol{\theta}}
    \log \pi (a_t|s_t; \boldsymbol{\theta}) \right] {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ27.png)


    (9.26)


    When using neural networks to approximate the policy in reinforcement learning,
    updating the policy parameters on a step-by-step basis may not be ideal. One solution
    is to wait until the agent has collected a sequence of transitions before updating
