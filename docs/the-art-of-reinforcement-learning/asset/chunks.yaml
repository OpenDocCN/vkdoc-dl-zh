  trans: '

    # 5.5 同策略学习 vs. 异策略学习


    强化学习是一种机器学习方法，智能体通过与环境交互学习如何采取行动，以最大化累积奖励信号。在本章及前几章中，我们介绍了几种同策略强化学习算法。但在深入探讨这些算法之前，我们先来定义什么是同策略算法。


    在强化学习中，区分行为策略和目标策略非常重要。行为策略（用 `μ` 表示）是智能体在与环境交互生成样本经验时所遵循的策略，而目标策略（用 `π` 表示）是智能体试图学习的策略。同策略强化学习算法是指行为策略与目标策略相同的算法，即
    `π = μ`。


    另一方面，异策略强化学习算法是指行为策略与目标策略不同的算法，即 `π ≠ μ`。异策略算法的一个例子是 Q-learning，我们将在本章后面介绍，它能够学习最优动作价值函数
    `Q*`，而无需依赖行为策略。


    例如，蒙特卡洛和 TD(0) 学习算法（如 SARSA）通过遵循同一策略 `μ` 与环境交互生成的经验，来学习行为策略 `μ` 的状态-动作价值函数。这类同策略强化学习算法相对简单，但当行为策略的探索性低于目标策略时，其效率可能较低。


    异策略强化学习算法通常更强大，因为它们可以利用不同行为策略生成的经验，而该行为策略可能比目标策略更具探索性。异策略强化学习中常用的一种技术是重要性采样。


    重要性采样是一种利用不同分布下生成的样本来计算随机变量期望值的方法。例如，假设我们有一个行为策略 `μ` 和一个目标策略 `π`，其中 `μ ≠ π`，并且我们希望估计目标策略
    `π` 的状态价值函数 `Vπ`。当智能体处于某个状态 `s` 并遵循行为策略 `μ` 时，它需要选择一个动作，而在状态 `s` 下选择某个动作 `a` 的概率定义为
    `μ(a|s)`。智能体在环境中执行动作 `a` 后，环境可能转移到某个后续状态 `s''`，状态转移概率由环境动态特性决定，记为 `p(s''|s, a)`。当智能体当前处于状态
    `s` 并遵循策略 `μ` 时，它最终到达后续状态 `s''` 的概率定义为 `μ(a|s) p(s''|s, a)`。


    然而，如果智能体遵循目标策略 `π`，则它当前处于状态 `s` 并最终到达后续状态 `s''` 的概率定义为 `π(a|s) p(s''|s, a)`。由于
    `μ ≠ π`，这两条轨迹很可能不同。为了纠正这种差异，我们使用重要性采样。


    重要性采样通过将行为策略 `μ` 生成的每个样本的回报乘以 `μ` 和 `π` 所选动作概率的比值来进行加权。这样，我们就可以利用行为策略 `μ` 生成的样本来估计目标策略
    `π` 的期望回报。


    当使用异策略强化学习和 TD 策略评估来估计 `Vπ` 时，我们需要计算单个转移元组 `(St, At, Rt, St+1)` 的重要性采样比率。重要性采样比率是目标策略
    `π` 下采取某个动作的概率与行为策略 `μ` 下该概率的比值。该比率用于纠正智能体的经验可能由与被评估策略不同的策略生成这一事实（图 5.3）。


    ![](img/605748_1_En_5_Fig3_HTML.png)

    '
- fmt: "# Off-Policy Reinforcement Learning\n\nA tree chart for off-policy reinforcement\
    \ learning starts with node `s`. `S` branches off to 3 nodes. The first node and\
    \ its branches are unlabeled. The second node labeled `a2`, branches off to a\
    \ `s'` and an unlabeled node. The third node labeled `a3`, branches off to a `s''`\
    \ and an unlabeled node.\n\n**Fig. 5.3** Example of off-policy reinforcement learning\
    \ to estimate the state value function `V_π` for target policy `π` while using\
    \ data generated from a different behavior policy `μ`. The red path represents\
    \ the transition from state `s` to `s'` when following `μ`, and blue path for\
    \ `π`.\n\nThe importance sampling ratio can be computed using the following equations:\n\
    \n```\nρ_t = π(A_t|S_t) p(S_{t+1}|S_t, A_t) / μ(A_t|S_t) p(S_{t+1}|S_t, A_t)\n\
    \    = π(A_t|S_t) / μ(A_t|S_t)\n```\n\n(5.8)\n\nwhere `π` is the target policy\
    \ and `μ` is the behavior policy.\n\nNote that the dynamics of the environment\
    \ `p(S_{t+1}|S_t, A_t)` is often unknown to the agent, but it doesn’t matter in\
    \ this case since it appears in both the numerator and the denominator of the\
    \ ratio and can be canceled out.\n\nIn general, off-policy reinforcement learning\
    \ requires that if `π(a|s) > 0`, then `μ(a|s) > 0`. This means that if the target\
    \ policy `π` is to take some actions, we require the behavior policy `μ` to have\
    \ at least a non-negative probability of taking these same actions. In most cases,\
    \ the behavior policy will be a more exploratory policy than the target policy,\
    \ such as an `ε`-greedy policy with `ε > 0`. This ensures that the probability\
    \ of each action being selected is always greater than zero.\n\nThere is a special\
    \ case when the denominator in Eq. (5.8) is zero, which occurs when the behavior\
    \ policy `μ` selects an action that the target policy `π` would not have selected.\
    \ In this case, the importance sampling ratio becomes zero, which means that this\
    \ transition tuple is ignored when updating the value function.\n\n## Off-Policy\
    \ TD Policy Evaluation\n\nIn off-policy reinforcement learning algorithms, the\
    \ agent learns from experience generated by a behavior policy that is different\
    \ from the target policy. To account for this, we can use the importance sampling\
    \ ratio to adjust the TD error during value updates. Specifically, the TD target\
    \ is weighted by the ratio of the probabilities of taking the action selected\
    \ by the target policy and the behavior policy in a given state.\n\nThe value\
    \ update rule for off-policy TD(0) policy evaluation for the state value function\
    \ `V_π` is shown in Eq. (5.9):\n\n```\nV_π(S_t) = V_π(S_t) + α * π(A_t|S_t)/μ(A_t|S_t)\
    \ * ( [R_t + γ V_π(S_{t+1})] - V_π(S_t) )\n```\n\n(5.9)\n\nHere, `π(A_t|S_t)`\
    \ and `μ(A_t|S_t)` represent the probabilities of selecting action `A_t` in state\
    \ `S_t` under the target policy and behavior policy, respectively.\n\nOff-policy\
    \ TD(0) learning is a popular method for prediction in reinforcement learning.\
    \ TD(0) is a method for updating the value function using one-step bootstrapping,\
    \ where the TD target is the immediate reward plus the estimated value of the\
    \ next state. The overall procedure for off-policy TD(0) is similar to regular\
    \ TD(0) policy evaluation, but we use a different behavior policy `μ ≠ π` to generate\
    \ sample experiences. During the value update, the TD target is weighted by the\
    \ importance sampling ratio, which accounts for the difference between the target\
    \ policy and the behavior policy. This ratio can help improve the accuracy of\
    \ the value function estimates by ensuring that the agent assigns more weight\
    \ to the experience that is relevant to the target policy. For example, if the\
    \ target policy selects actions that are unlikely under the behavior policy, the\
    \ importance sampling ratio will be high, and the TD target will be correspondingly\
    \ weighted more heavily.\n\nThe pseudocode for the off-policy TD(0) policy evaluation\
    \ algorithm for the state value function `V_π` is shown in Algorithm 5.\n\n**Algorithm\
    \ 5:** Off-policy temporal difference [TD(0)] policy evaluation for `V_π`\n\n\
    A 10-line algorithm to compute off-policy temporal difference TD(0) and policy\
    \ evaluation for `V_π` takes the following inputs to give an estimated state value\
    \ function `V_π` for the target policy `π` as an output: target policy `π` to\
    \ be evaluated, discount rate `γ`, step size `α`, and number of steps `K`."
