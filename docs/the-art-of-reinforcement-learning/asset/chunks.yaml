    \ 3.33 | 0 |\n\n### 状态-动作价值函数的时序差分策略评估\n\n在本节中，我们将描述如何扩展`TD(0)`算法来估计状态-动作价值函数`Q_π`。这一点很重要，因为我们需要`Q_π`来通过策略改进做出更好的决策，就像我们在蒙特卡洛方法中所做的那样。\n\
    \n回顾`Q_π`的贝尔曼期望方程：\n\n```\nQ_π(s, a) = E_π[G_t | S_t=s, A_t=a]\n          = E_π[R_t\
    \ + γ R_{t+1} + γ² R_{t+2} + ... | S_t=s, A_t=a]\n          = E_π[R_t + γ G_{t+1}\
    \ | S_t=s, A_t=a]\n          = E_π[R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t=s, A_t=a]\n\
    ```\n\n这里，我们使用`R_t + γ Q_π(S_{t+1}, A_{t+1})`来替代回报`G_t`。为了估计`Q_π`，我们需要收集一个`(s,\
    \ a, r, s', a')`元组，并基于状态-动作对`(s, a)`更新价值。更新估计值的公式为：\n\n```\nQ_π(S_t, A_t) = Q_π(S_t,\
    \ A_t) + α( [R_t + γ Q_π(S_{t+1}, A_{t+1})] - Q_π(S_t, A_t) )\n```\n\n整个过程与`V_π`的`TD(0)`策略评估非常相似，但存在一些关键区别：\n\
    \n*   我们需要收集`(s, a, r, s', a')`元组，而不是`(s, a, r, s')`，来估计`Q_π`。\n*   价值更新基于状态-动作对`(s,\
    \ a)`。\n\n通过估计状态-动作价值函数`Q_π`，我们可以利用策略改进做出更好的决策。`Q_π`告诉我们，在给定状态下采取特定动作的期望价值，这对于选择能带来更高回报的动作而言是重要的信息。此外，`Q_π`与价值函数`V_π`相关，后者告诉我们处于给定状态并根据给定策略`π`采取动作的期望价值。具体来说，`V_π`可以表示为`Q_π`在所有可能动作上的期望值，并按策略`π`下采取每个动作的概率进行加权。\n"
- fmt: "# TD(0) Policy Evaluation\n\nThe `TD(0)` policy evaluation algorithm is a\
    \ way to estimate the state-action value function `Q_π` for a fixed policy `π`.\
    \ Algorithm 2 shows the pseudocode for the algorithm.\n\n**Algorithm 2:** Temporal\
    \ difference [TD(0)] policy evaluation for `Q[π]`\n\n![](images/605748_1_En_5_Chapter/605748_1_En_5_Figaab_HTML.gif)\n\
    \nA 10-line algorithm to compute the temporal difference `TD(0)` and policy evaluation\
    \ for `Q_π` takes the following inputs to give an estimated state-action value\
    \ function `Q_π` for the input policy `π` as the output: policy `π` to be evaluated,\
    \ discount rate `γ`, step size `α`, and number of steps `K`.\n\nIn this algorithm,\
    \ we initialize the state-action value function `Q_π` to 0 for all state-action\
    \ pairs. Then, we run episodes using the policy `π` and update the state-action\
    \ value function based on the rewards received and the expected future rewards.\
    \ We repeat this process until the algorithm converges.\n\nFigure 5.2 shows the\
    \ computed state-action values for a random policy for the service dog MDP. The\
    \ results were averaged over 100 independent runs; each run is over 20,000 updates.\
    \ We use discount `γ = 0.9`, step size `α = 0.01`. The values are very close to\
    \ the ones we computed back in Chap. 4 using Monte Carlo policy evaluation as\
    \ shown in Fig. 4.3.\n\n![](images/605748_1_En_5_Chapter/605748_1_En_5_Fig2_HTML.png)\n\
    \nA flowchart computes the state-action values for the service dog MDP. It flows\
    \ through rooms 1, 2, and 3 to reach the found item. Room 3 reverts to room 2\
    \ and room 2 reverts to room 1. Room 2 points to outside via `r = 0` and outside\
    \ reverts to room 2 via `r = 0`. Outside reverts to itself via `r = -1`. The discount\
    \ rate `γ = 0.9`.\n\n**Fig. 5.2** State-action values computed using `TD(0)` policy\
    \ evaluation of a random policy for the service dog MDP. Results were averaged\
    \ over 100 runs; each run is over 2000 updates. We use the discount `γ = 0.9`\
    \ and step size `α = 0.01` in this experiment.\n\n## 5.3 Simplified `ε`-Greedy\
    \ Policy for Exploration\n\nAfter performing TD policy evaluation, the next step\
    \ is to extend the algorithm to TD control (or policy improvement). TD learning,\
    \ like Monte Carlo methods, is a model-free reinforcement learning method that\
    \ faces the challenge of balancing exploration vs. exploitation. In Chap. 4, we\
    \ introduced the `ε`-greedy policy to help the agent explore when using Monte\
    \ Carlo methods. We can also use the same `ε`-greedy policy for TD learning methods\
    \ by updating the policy probability distribution for the different actions using\
    \ Eq. (5.6).\n\n```\nπ(a|s) = \n  case\n    a = argmax_a Q_π(s, a):  1 - ε + ε\
    \ / |A(s)|\n    a ≠ argmax_a Q_π(s, a):  ε / |A(s)|\n```\n\n(5.6)\n\nRecall that\
    \ the `ε`-greedy policy is derived from the state-action value function `Q_π`,\
    \ and it uses Eq. (5.6) to update the policy probability distribution for the\
    \ different actions. The `ε`-greedy policy is essentially a combination of a random\
    \ policy and a deterministic policy. With probability `ε`, the policy acts randomly,\
    \ while with probability `1 - ε`, it acts greedily according to `Q_π`.\n\nIt is\
    \ worth noting that the values of `Q_π` are constantly updated in TD policy evaluation,\
    \ that is, updated every single time step. Therefore, the \"deterministic policy\"\
    \ part of the `ε`-greedy policy is also updated from time to time. However, in\
    \ practice, we often use a simpler and more efficient way to create the `ε`-greedy\
    \ policy, which does not require updating the policy probability distribution\
    \ of `π`."
