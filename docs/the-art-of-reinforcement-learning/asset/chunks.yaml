    图 2.15 展示了公式 (2.27) 的备份图。类似地，这里只考虑能为后继状态 `s''` 产生最高价值的动作。


    在实践中，我们更关心最优状态-动作价值函数 `Q*`。原因很简单：如果我们有了 `Q*`，就可以像公式 (2.29) 所示那样，基于 `Q*` 轻松构建一个最优策略。在这种情况下，我们总是（以概率
    1.0）选择具有最大 `Q*(s, a)` 值的动作，那么 MDP 问题就解决了。


    ```

    π*(a|s) = { 1, if a = argmax_{a∈A} Q*(s, a); 0, otherwise }

    ```


