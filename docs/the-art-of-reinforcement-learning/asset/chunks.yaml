  trans: '

    当生成新的转移时，我们需要确定其优先级。虽然我们可以使用与之前相同的方法计算优先级，但更常见的做法是为每个新转移分配一个预定义的优先级，例如 `1.0`。或者，我们也可以分配智能体在训练过程中迄今为止遇到的最大优先级。我们这样做是因为我们仍然偏向于新生成的转移，并希望智能体使用它们进行训练。然而，如果某个转移的优先级较低（即
    TD 误差），它未来被采样的频率就会降低。此外，为所有新转移分配最大优先级可以节省计算资源，因为智能体通常会生成数百万个转移。


    我们现在介绍针对双 Q 学习算法的 DQN 的比例优先级方法，该方法最初由 Schaul 等人提出 [3]。该算法基于我们本章前面介绍的双 Q 学习算法的
    DQN。主要区别在于，当智能体在回放缓冲区中存储单个转移时，它会为其分配一个优先级值。默认情况下，此优先级值设置为迄今为止所见优先级中的最大值。


    图 8.2 展示了优先级双 DQN 和标准 DQN 智能体在 Atari 游戏 River Raid 上的性能。结果显示了平均回合回报（总未折扣奖励）和 95%
    置信区间。为了评估智能体的性能，我们在一个独立的测试环境中运行了 200,000 个评估步骤，该环境使用 `ε`-贪婪策略，并在每次训练迭代（包含 250,000
    个训练步骤或 100 万帧）结束时使用固定的探索 epsilon（`ε = 0.05`），评估环境中不应用奖励裁剪或生命损失时的软终止。结果在五次独立运行中取平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    ![](img/605748_1_En_8_Fig2_HTML.png)


    一张图表绘制了评估回合回报与训练环境帧数的关系。图表呈现了两条上升趋势线，分别标注为 DQN 和优先级双 DQN。标注为优先级双 DQN 的线条呈现出更高的峰值。


    **图 8.2** 在 Atari 游戏 River Raid 上，优先级双 DQN 与 DQN 的对比。结果显示了平均回合回报（总未折扣奖励）和 95%
    置信区间。结果在五次独立运行中取平均值，然后使用窗口大小为 5 的移动平均进一步平滑。


