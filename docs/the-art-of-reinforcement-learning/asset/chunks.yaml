    coefficient, where the entropy coefficient starts high and gradually decreases
    over time as the agent learns a better policy. This approach can help the agent
    explore more in the early stages of learning and converge to a more optimal policy
    later on.


    The training of the Actor-Critic algorithm with entropy loss to encourage exploration
    is almost the same as the standard Actor-Critic algorithm shown in Algorithm 4\.
    The only difference is that when we compute the policy gradient we’ll have to
    add the entropy loss by using Eq. ([9.30](#605748_1_En_9_Chapter.xhtml#Equ31)).
    More precisely, we would use the following update rule to accumulate gradients
    with respect to ![$$\boldsymbol {\theta }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq191.png)
    for policy:


    ![$$\displaystyle \begin{aligned} g_{\pi} \leftarrow g_{\pi} + \alpha \delta_j
    \nabla_{\boldsymbol{\theta}} \log \pi (a_j|s_j; \boldsymbol{\theta}) + w H \bigl(\pi(s_j;
    \boldsymbol{\theta})\bigr) \end{aligned}$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equd.png)


    Figure [9.6](#605748_1_En_9_Chapter.xhtml#Fig6) shows the performance of the Actor-Critic
    agent on the Atari visual complex game Pong. The results display the average episode
    return (total undiscounted rewards) and a 95% confidence interval. To evaluate
    the agent’s performance, we ran 200,000 evaluation steps on a separate testing
    environment with a greedy policy at the end of each training iteration, which
    consisted of 250,000 training steps or 1 million frames, where no reward clipping
    or soft termination on loss of life is applied to the evaluation environment.
    The results were averaged over three independent runs and smoothed using a moving
    average with a window size of five.


    ![](images/605748_1_En_9_Chapter/605748_1_En_9_Fig6_HTML.png)


    A line graph of evaluation episode return versus training environment frames.
    It plots a horizontal line that extends as a concave-down increasing curve. The
    estimated values are (10 million, negative 20), (20 million, 0), and (30 million,
    15).


    Fig. 9.6


    Actor-Critic on the Atari video game Pong. The results display the average episode
    return (total undiscounted rewards) and a 95% confidence interval. The results
    were averaged over three independent runs and then smoothed using a moving average
    with a window size of five


    We use a neural network architecture similar to DQN; however, we use the shared
    neural network architecture. The network has two output heads: one for the action
    probability and one for state value. We use discount rate ![$${\gamma }=0.99$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq192.png)
    , learning rate ![$$\alpha =0.00025$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq193.png)
    , entropy weights 0.025, and sequence length 128.


    We use the same environment processing as DQN, which involves resizing the frame
    to ![$$84 \times 84$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq194.png)
    and converting it to grayscale. We also apply the skip action technique, where
    we only process every fourth frame, and we stack the last four frames to create
    a final state image of size ![$$84 \times 84 \times 4$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq195.png)
    .


    Additionally, we clip the reward values to the range of ![$$-1$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq196.png)
    to 1, and we treat the loss of a life as a soft-terminal state.


    Entropy loss is particularly useful in improving the performance of a reinforcement
    learning agent when the environment is complex. In such scenarios, the agent may
    struggle to explore and discover the optimal policy because the reward signal
    is not informative enough to guide the agent toward the goal.


    In such situations, using entropy loss as a regularization term can encourage
    the agent to explore more widely, take more diverse actions, and learn a more
    robust policy. This exploration can be particularly useful for discovering regions
    of the state space that are critical for achieving the ultimate goal.


    Moreover, entropy loss can be particularly useful in situations where the optimal
    policy is stochastic or requires a certain level of randomness to be effective.
    In these cases, enforcing high entropy can help the agent learn a more optimal
    policy that takes into account the inherent randomness of the environment.'
