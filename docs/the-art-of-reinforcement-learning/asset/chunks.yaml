    ## 4.5 本章小结


    本章介绍了蒙特卡洛方法，这是一种用于基于经验估计价值函数并改进策略的强化学习算法。与动态规划不同，蒙特卡洛方法无需模型，且不需要了解环境的奖励函数和动态函数。


    本章清晰阐述了蒙特卡洛策略评估，这是一种通过平均访问状态后观测到的回报来估计状态价值的方法。本章通过具体示例说明了首次访问蒙特卡洛与每次访问蒙特卡洛之间的区别。此外，本章还介绍了增量更新技术，该技术允许在每一幕结束后高效更新价值函数。


    本章还强调了强化学习中探索-利用困境的重要性，以及蒙特卡洛方法如何通过平衡探索新状态和动作与利用现有知识来解决这一问题。蒙特卡洛控制作为一种改进策略的方法被引入，其原理是在当前策略下估计每个状态的价值，并根据估计值更新策略使其趋于贪婪。


    # 5. 时序差分学习


    在上一章（第 4 章）中，我们介绍了用于强化学习的蒙特卡洛（MC）方法，该方法使智能体无需依赖环境模型即可从自身经验中学习。然而，MC 方法仅限于情节式强化学习问题，即智能体以离散情节的形式与环境交互。在本章中，我们将介绍时序差分（TD）学习，这是一类将
    MC 方法推广到支持情节式和连续式强化学习问题的算法。TD 学习基于这样一种思想：结合当前奖励和估计的未来奖励来更新价值估计，这使得它比 MC 方法对于许多类型的强化学习问题更加通用和高效。本章将探讨各种
    TD 学习算法的理论和实现。


    ## 5.1 时序差分学习


    在第 4 章中，我们介绍了用于解决情节式强化学习问题的蒙特卡洛方法，该方法使智能体无需访问环境模型即可从自身经验中学习。然而，蒙特卡洛方法有两个局限性，使其不适合解决连续式强化学习问题。第一个主要问题是，它们不支持没有自然任务结束点的连续式强化学习问题；在情节式问题中，存在一个终止状态标志着情节的结束，而在连续式问题中，智能体无限期地与环境交互。第二个次要问题是，智能体必须等到一幕结束才能计算和更新估计值，因为蒙特卡洛方法要求智能体在更新估计值之前经历完整的一幕。对于像我们的服务犬
    MDP 示例这样情节非常短的小型强化学习问题，这可能不是问题。但对于情节较长（可能涉及数千或数百万个时间步）的问题，这种等待会减慢学习过程。


    由 Sutton 提出的时序差分（TD）学习[1, 2]是一种克服了这些局限性的无模型强化学习方法。它被称为 TD 学习，是因为智能体根据其在每个状态中预测奖励与实际接收奖励之间的差异来更新其估计值。更准确地说，智能体在从环境中接收到即时奖励`r`和后续状态`s''`（即一个由`(s,
    a, r, s'')`组成的元组，通常称为转移）后，立即更新特定状态`s`的估计值。这种*单步前瞻*使得智能体能够基于即时奖励和下一状态的估计值来更新其估计，而无需等待一幕结束。


    理解 TD 学习的一种方式是，智能体根据新获得的信息持续调整其对每个状态价值的估计。这与蒙特卡洛方法形成对比，后者仅在每一幕结束时更新估计值。


    TD 学习广泛应用于现实世界，并且是解决强化学习问题的核心。它是一种高效且灵活的算法，允许智能体以连续和增量的方式进行学习，使其适用于现实应用。其他无模型强化学习算法，如
    Q 学习和 SARSA（我们将在本章后面介绍），都建立在这一概念之上。


    总而言之，TD 学习是解决强化学习问题的一种强大方法，其“单步前瞻”方法使智能体能够快速且连续地更新其估计值。

    '
- fmt: "# 5.2 Temporal Difference Policy Evaluation\n\nAs always, we follow the general\
    \ policy iteration template introduced in Chap. [3](#605748_1_En_3_Chapter.xhtml).\
    \ The first step is to do policy evaluation, which involves estimating the state\
    \ value function `V_π` (or state-action value function `Q_π`) for a given (fixed)\
    \ policy `π`. Since TD learning is a model-free reinforcement learning method,\
    \ the agent will use experience generated when following policy `π` to learn these\
    \ value functions.\n\nTo estimate the state value function using TD learning,\
    \ we start with the equation for `V_π(s)`, which represents the expected return\
    \ when starting in state `s` and following policy `π`. The Monte Carlo method\
    \ uses a sum of discounted rewards to estimate this return for a complete episode\
    \ sequence. Alternatively, the equation can be rewritten in a recursive way, as\
    \ shown in Eq. ([5.2](#605748_1_En_5_Chapter.xhtml#Equ2)), which gives us a clue\
    \ how the TD learning method works. The TD learning method updates the estimated\
    \ value for a particular state using a tuple of `(s, a, r, s')`, which is exactly\
    \ what we need to complete Eq. ([5.2](#605748_1_En_5_Chapter.xhtml#Equ2)).\n\n\
    ```\nV_π(s) = E_π[G_t | S_t = s]\n       = E_π[R_t + γ R_{t+1} + γ^2 R_{t+2} +\
    \ ... | S_t = s]\n       = E_π[R_t + γ G_{t+1} | S_t = s]\n```\n\n(5.1)\n\n```\n\
    \       = E_π[R_t + γ V_π(S_{t+1}) | S_t = s]\n```\n\n(5.2)\n\nAs we introduced\
    \ earlier in this chapter, the TD learning method only requires a tuple of `(s,\
    \ a, r, s')` to update the value for the state `s`. This is exactly what we need\
    \ to complete Eq. ([5.2](#605748_1_En_5_Chapter.xhtml#Equ2)). The expectation\
    \ sign reminds us that we need to collect a large amount of samples to compute\
    \ the expected return when starting in state `s` and following policy `π`.\n\n\
    Next, we need to bring in the incremental update method. The general form for\
    \ the incremental update method is\n\n```\nNewEstimate = OldEstimate + StepSize\
    \ [Target - OldEstimate]\n```\n\nHere, the \"StepSize\" represents the learning\
    \ rate, and \"Target\" represents the TD target. To update the value estimate\
    \ for state `s`, we use the incremental update method with the TD target `R_t\
    \ + γ V(S_{t+1})`, which represents the estimated return from the current state.\
    \ The difference between the TD target and the current estimated value `V(S_t)`\
    \ is called the TD error, which is also used to update the value function estimate.\
    \ The update rule for TD learning is shown in Eq. ([5.3](#605748_1_En_5_Chapter.xhtml#Equ3)):\n\
    \n```\nV_π(S_t) = V_π(S_t) + α (G_t - V_π(S_t))\n         = V_π(S_t) + α ([R_t\
    \ + γ V_π(S_{t+1})] - V_π(S_t))\n```\n\n(5.3)\n\nHere, `α` is the learning rate\
    \ for TD learning. The TD error is `R_t + γ V_π(S_{t+1}) - V_π(S_t)`, where `R_t\
    \ + γ V_π(S_{t+1})` represents the estimated return for state `S_t`. By using\
    \ this update rule, we can iteratively improve our estimates of the state values\
    \ based on the observed immediate reward and the discounted (estimated) value\
    \ of successor state.\n\nIn TD learning, the agent does not keep a record of the\
    \ total number of visits for states, so we cannot use `1/N(S_t)` as the step size.\
    \ Instead, we need to set the value for step size `α` manually. The choice of\
    \ `α` can have a significant impact on the learning performance and stability,\
    \ and there are various heuristics and methods to set it appropriately.\n\nNow\
    \ that we have the equation for the update rule, we can introduce the TD learning\
    \ algorithm for policy evaluation, as shown in Algorithm 1. Sometimes people also\
    \ refer to it as the TD(0) policy evaluation algorithm, as it estimates the value\
    \ using the immediate reward and discounted value of its successor state, without\
    \ taking additional steps into the future. The general idea is similar to the\
    \ Monte Carlo policy evaluation, which involves the agent collecting a sample\
    \ transition while following the policy `π`. However, instead of a complete episode\
    \ sequence, here we only need a tuple of `(s, a, r, s')`. This is why TD methods\
    \ also work for continuing reinforcement learning problems.\n\nIn Monte Carlo,\
    \ we run the algorithm based on the number of sample episodes the agent needs\
    \ to complete. But TD learning can also apply to continuing reinforcement learning\
    \ problems where measuring the number of episodes is impossible. One simple solution\
    \ is to count the total number of time steps (or environment steps) to run. In\
    \ general, this solution is also better than simply counting the number of episodes\
    \ for the episodic environment since the total number of steps on an episode-to-episode\
    \ basis can vary.\n\n**Algorithm 1: Temporal difference [TD(0)] policy evaluation\
    \ for `V_π`**\n\nA 9-line algorithm for temporal difference TD(0) and policy evaluation\
    \ for `V_π` takes the following inputs to give the estimated state value function\
    \ `V_π` for the input policy `π` as the output: policy `π` to be evaluated, discount\
    \ rate `γ`, step size `α`, and number of steps `K`.\n\n![A flowchart for the service\
    \ dog MDP flows through rooms 1, 2, and 3 to reach the found item. Room 3 reverts\
    \ to room 2 and room 2 reverts to room 1. Room 2 points to outside via r = 0 and\
    \ outside reverts to room 2 via r = 0. Outside reverts to itself via r = -1.](images/605748_1_En_5_Chapter/605748_1_En_5_Fig1_HTML.png)\n\
    \n**Fig. 5.1** Service dog MDP"
  raw: '## 5.2 Temporal Difference Policy Evaluation


    As always, we follow the general policy iteration template introduced in Chap.
    [3](#605748_1_En_3_Chapter.xhtml). The first step is to do policy evaluation,
    which involves estimating the state value function ![$$V_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq3.png)
    (or state-action value function ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq4.png)
    ) for a given (fixed) policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq5.png)
    . Since TD learning is a model-free reinforcement learning method, the agent will
    use experience generated when following policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq6.png)
    to learn these value functions.


    To estimate the state value function using TD learning, we start with the equation
    for ![$$V_\pi (s)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq7.png)
    , which represents the expected return when starting in state *s* and following
    policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq8.png)
    . The Monte Carlo method uses a sum of discounted rewards to estimate this return
    for a complete episode sequence. Alternatively, the equation can be rewritten
    in a recursive way, as shown in Eq. ([5.2](#605748_1_En_5_Chapter.xhtml#Equ2)),
    which gives us a clue how the TD learning method works. The TD learning method
    updates the estimated value for a particular state using a tuple of ![$$(s, a,
    r, s'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq9.png) ,
    which is exactly what we need to complete Eq. ([5.2](#605748_1_En_5_Chapter.xhtml#Equ2)).


    ![$$\displaystyle \begin{aligned} V_\pi(s) &amp; =\mathbb{E}_{\pi\!\!}\left[G_t
    \;\Big|\; S_t=s\right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t + {\gamma} R_{t+1}
    + {\gamma}^2 R_{t+2} + \cdots \;\Big|\; S_t=s\right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} G_{t+1} \;\Big|\;S_t=s\right] {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ1.png)


    (5.1)


    ![$$\displaystyle \begin{aligned} &amp; =\mathbb{E}_{\pi\!\!}\left[R_t + {\gamma}
    V_\pi(S_{t+1}) \;\Big|\; S_t=s\right] {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ2.png)


    (5.2)


    As we introduced earlier in this chapter, the TD learning method only requires
    a tuple of ![$$(s, a, r, s'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq10.png)
    to update the value for the state *s*. This is exactly what we need to complete
    Eq. ([5.2](#605748_1_En_5_Chapter.xhtml#Equ2)). The expectation sign reminds us
    that we need to collect a large amount of samples to compute the expected return
    when starting in state *s* and following policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq11.png)
    .


    Next, we need to bring in the incremental update method. The general form for
    the incremental update method is


    ![$$\displaystyle \begin{aligned} \mbox{NewEstimate}=\mbox{OldEstimate} + \mbox{StepSize}
    \Big[\mbox{Target} - \mbox{OldEstimate} \Big] \end{aligned}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equa.png)


    Here, the “StepSize” represents the learning rate, and “Target” represents the
    TD target. To update the value estimate for state *s*, we use the incremental
    update method with the TD target ![$$R_t + {\gamma } V(S_{t+1})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq12.png)
    , which represents the estimated return from the current state. The difference
    between the TD target and the current estimated value ![$$V(S_t)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq13.png)
    is called the TD error, which is also used to update the value function estimate.
    The update rule for TD learning is shown in Eq. ([5.3](#605748_1_En_5_Chapter.xhtml#Equ3)):


    ![$$\displaystyle \begin{aligned} \begin{array}{rl} V_\pi(S_t) &amp; = V_\pi(S_t)
    + \alpha \Big( G_t - V_\pi(S_t) \Big) \\ &amp; =V_\pi(S_t) + \alpha \bigg( \Big[
    R_t + {\gamma} V_\pi(S_{t+1})\Big] - V_\pi(S_t) \bigg) {} \end{array} \end{aligned}
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ3.png)


    (5.3)


    Here, ![$$\alpha $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq14.png)
    is the learning rate for TD learning. The TD error is ![$$R_t + \gamma V_\pi (S_{t+1})
    - V_\pi (S_t)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq15.png)
    , where ![$$R_t + \gamma V_\pi (S_{t+1})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq16.png)
    represents the estimated return for state ![$$S_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq17.png)
    . By using this update rule, we can iteratively improve our estimates of the state
    values based on the observed immediate reward and the discounted (estimated) value
    of successor state.


    In TD learning, the agent does not keep a record of the total number of visits
    for states, so we cannot use ![$$\frac {1}{N(S_t)}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq18.png)
    as the step size. Instead, we need to set the value for step size ![$$\alpha $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq19.png)
    manually. The choice of ![$$\alpha $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq20.png)
    can have a significant impact on the learning performance and stability, and there
    are various heuristics and methods to set it appropriately.


    Now that we have the equation for the update rule, we can introduce the TD learning
    algorithm for policy evaluation, as shown in Algorithm 1\. Sometimes people also
    refer to it as the TD(0) policy evaluation algorithm, as it estimates the value
    using the immediate reward and discounted value of its successor state, without
    taking additional steps into the future. The general idea is similar to the Monte
    Carlo policy evaluation, which involves the agent collecting a sample transition
    while following the policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq21.png)
    . However, instead of a complete episode sequence, here we only need a tuple of
    ![$$(s, a, r, s'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq22.png)
    . This is why TD methods also work for continuing reinforcement learning problems.


    In Monte Carlo, we run the algorithm based on the number of sample episodes the
    agent needs to complete. But TD learning can also apply to continuing reinforcement
    learning problems where measuring the number of episodes is impossible. One simple
    solution is to count the total number of time steps (or environment steps) to
    run. In general, this solution is also better than simply counting the number
    of episodes for the episodic environment since the total number of steps on an
    episode-to-episode basis can vary.


    Algorithm 1: Temporal difference [TD(0)] policy evaluation for *V*[*π*]


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Figaaa_HTML.gif) A 9-line algorithm
