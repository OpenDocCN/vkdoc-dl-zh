    By using a linear combination of features, we constructed a linear function that
    can estimate the value function. This approach offers simplicity and interpretability,
    making it a popular choice in various simple reinforcement learning applications.


    While linear value function approximation is a valuable technique, it has inherent
    limitations when it comes to approximating complex value functions accurately.
    Additionally, it requires the manual crafting of feature vectors, which can pose
    challenges for certain problems. To address this issue, the subsequent chapter
    will explore nonlinear methods, particularly neural networks, for approximating
    value functions. These nonlinear methods can capture more intricate relationships
    and enable more precise value function approximation in complex domains.


    Footnotes [1](#605748_1_En_6_Chapter.xhtml#Fn1_source)   [2](#605748_1_En_6_Chapter.xhtml#Fn2_source)


    # 7. Nonlinear Value Function Approximation


    In this chapter, we will explore the use of nonlinear methods to approximate value
    functions in reinforcement learning. Value functions play a crucial role in reinforcement
    learning as they estimate the expected reward an agent can obtain in a given state
    and follow the policy afterwards. In the previous chapter, we discussed linear
    methods that rely on constructing a feature vector and computing a weighted combination
    of features as the state or state-action value. However, these methods have limitations
    when applied to complex and challenging domains. In such cases, a simple linear
    combination may fail to capture all the relevant features and information. Additionally,
    determining the appropriate features that capture the necessary information for
    the task at hand requires substantial domain knowledge and experience.


    To overcome these limitations, we can leverage nonlinear methods, specifically
    neural networks, to approximate value functions in reinforcement learning. Neural
    networks are a type of machine learning model that can learn from data to make
    predictions or decisions. In reinforcement learning, neural networks can learn
    to approximate value functions by taking the environment state as input data and
    predicting the expected return from that state when following some policy.


    The power of neural networks lies in their ability to automatically learn complex
    and nonlinear relationships between inputs and outputs. In other words, instead
    of manually specifying a set of features to represent the state, we can directly
    feed the raw state information into the neural network, which will then learn
    to extract the relevant information by adjusting the weights and biases of its
    layers of neurons. This process is known as feature learning, and it enables the
    neural network to learn representations that are more suited to the task at hand.


    Neural networks have several benefits over linear methods for approximating value
    functions in reinforcement learning:


    *   Nonlinearity: Neural networks are nonlinear function approximators, which
    means they can model complex, nonlinear relationships between inputs and outputs.
    This is important because many real-world problems involve nonlinearities, and
    linear methods may not be able to capture these complex relationships. In contrast,
    neural networks can learn to approximate complex value functions with high accuracy.


    *   Generalization: Neural networks can generalize well to new, unseen data. This
    means that they can learn to approximate value functions based on a limited amount
    of data and then apply this knowledge to new situations. This is important in
    reinforcement learning because the agent needs to be able to generalize its knowledge
    to new states and actions in order to make effective decisions in the environment.


    *   Feature learning: Neural networks can learn to extract relevant features from
    the raw input data, which can improve their accuracy in approximating value functions.
    In contrast, linear methods require hand-engineered features, which can be time-consuming
    and may not capture all relevant information.


    *   Flexibility: Neural networks are highly flexible and can be easily adapted
    to different types of value functions and reinforcement learning problems. They
    can be used to approximate both state value functions and action-value functions
    and can be used with a variety of reinforcement learning algorithms.


    Overall, the benefits of using neural networks over linear methods for approximating
    value functions in reinforcement learning include their ability to capture nonlinear
    relationships, generalize to new situations, learn relevant features from raw
    input data, and adapt to different types of reinforcement learning problems. Readers
    that are familiar with neural networks and have experience on how to train a deep
    neural network can skip [7.1](#605748_1_En_7_Chapter.xhtml#Sec1) and [7.2](#605748_1_En_7_Chapter.xhtml#Sec5).'
