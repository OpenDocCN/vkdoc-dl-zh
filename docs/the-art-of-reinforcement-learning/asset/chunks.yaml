    to navigate a maze to reach a goal. At the start of training, the agent has no
    knowledge of the environment, so it needs to explore to learn about the maze layout
    and the effects of different actions. We might set ![$$\epsilon $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq111.png)
