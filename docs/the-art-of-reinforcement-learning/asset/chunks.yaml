- fmt: "Here, `π(a|s)` is the probability of taking action `a` in state `s` when following\
    \ policy `π`.\n\nWith this concept in mind, we can define the Bellman equations\
    \ for `V_π` and `Q_π`. Equation (2.12) is called the Bellman expectation equation\
    \ for `V_π`; in this equation, we use the immediate reward `R_t` and the discounted\
    \ value of successor state(s) `γ V_π(S_{t+1})` to compute the value of a state\
    \ `V_π(s)` under some policy `π`.\n\n```\nV_π(s) = E_π[ G_t | S_t = s ]\n    \
    \   = E_π[ R_t + γ R_{t+1} + γ^2 R_{t+2} + ... | S_t = s ]\n       = E_π[ R_t\
    \ + γ ( R_{t+1} + γ R_{t+2} + ... ) | S_t = s ]\n       = E_π[ R_t + γ G_{t+1}\
    \ | S_t = s ]\n       = E_π[ R_t + γ V_π(S_{t+1}) | S_t = s ]\n```\n\n(2.12)\n\
    \n```\n     = Σ_{a ∈ A} π(a|s) [ R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) V_π(s') ],\
    \ for all s ∈ S\n```\n\n(2.13)\n\nEquation (2.13) further expands the Bellman\
    \ expectation equation for `V_π` by weighting probability of taking action `a`\
    \ when in state `s` under the policy `π`; it also weights the value of each successor\
    \ state `V_π(s')` by using the probability of transitioning into that particular\
    \ successor state when the agent is in state `s` and taking action `a`. This equation\
    \ is also called the Bellman equation for `V_π`.\n\nSimilarly, Eq. (2.14) is the\
    \ Bellman expectation equation for `Q_π`, and Eq. (2.16) is the Bellman equation\
    \ for `Q_π`. Note that Eq. (2.16) involves conditioning on the value of the next\
    \ state-action pair, whereas the other equations do not. This may seem strange\
    \ at first, but it is necessary because the next state and action are random variables,\
    \ and the Bellman equation needs to express the expected value of the state-action\
    \ pair, taking into account all possible outcomes. Specifically, Eq. (2.16) involves\
    \ a new expectation over the value of the successor state-action pair `(s', a')`,\
    \ because this pair depends on the agent’s policy.\n\n```\nQ_π(s, a) = E_π[ G_t\
    \ | S_t = s, A_t = a ]\n          = E_π[ R_t + γ R_{t+1} + γ^2 R_{t+2} + ... |\
    \ S_t = s, A_t = a ]\n          = E_π[ R_t + γ G_{t+1} | S_t = s, A_t = a ]\n\
    \          = E_π[ R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t = s, A_t = a ]\n```\n\n\
    (2.14)\n\n```\n     = R(s, a) + γ E_π[ Q_π(s', a') | S_{t+1} = s', A_{t+1} = a'\
    \ ]\n```\n\n(2.15)\n\n```\n     = R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) Σ_{a' ∈ A}\
    \ π(a'|s') Q_π(s', a'), for all s ∈ S, a ∈ A\n```\n\n(2.16)\n\nBecause of the\
    \ relationship between `V_π` and `Q_π` as shown in Eq. (2.11), we can also rewrite\
    \ the Bellman equation for `Q_π` as\n\n```\nQ_π(s, a) = R(s, a) + γ Σ_{s' ∈ S}\
    \ P(s'|s, a) V_π(s'), for all s ∈ S, a ∈ A\n```\n\n(2.17)\n\nA backup diagram\
    \ for V pi with two levels. The root node has state s with average that splits\
    \ into 2 actions with arc angle pi. The two actions have arc angles p and have\
    \ 2 state transitions each. Action a, r leads to state s prime.\n\n**Fig. 2.9**\
    \ Backup diagram for `V_π`\n\nThe additional step to derive Eq. (2.17) is necessary\
    \ because in some cases, we don’t have an accurate estimate of `Q_π(s, a)` as\
    \ we’ll see later in the book when we introduce dynamic programming algorithms.\n\
    \nThe Bellman equations are at the core of solving `V_π` and `Q_π`. That means\
    \ they are also at the core of solving reinforcement learning problems if we are\
    \ using value function methods, which estimate the value of states or state-action\
    \ pairs. For example, the Bellman equation for `V_π` says that the value of a\
    \ state can be decomposed into two parts: the immediate reward `R(s, a)` and the\
    \ discounted value of the successor states `γ Σ_{s' ∈ S} P(s'|s, a) V_π(s')`,\
    \ which are the states that can be reached from `s` under policy `π`. In some\
    \ environment, there could be multiple successor states `s'`, and we compute the\
    \ expected value over all of them. The similar concept also applies to `Q_π`,\
    \ which estimates the value of taking action `a` in state `s` and following policy\
    \ `π` thereafter."
