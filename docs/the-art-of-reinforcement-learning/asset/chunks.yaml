    more challenging.


    We can also use neural works to approximate the state-action value function for
    some policy ![$$\pi $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq76.png)
    , denoted as ![$$\hat {Q}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq77.png)
    . The objective function for TD(0) policy evaluation for ![$$\hat {Q}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq78.png)
    with respect to the parameters ![$$\boldsymbol {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq79.png)
    becomes


    ![$$\displaystyle \begin{aligned} J(\boldsymbol{\theta}) = \Bigl( r_t + {\gamma}
    \hat{Q}(s_{t+1}, a_{t+1}; \boldsymbol{\theta}) - \hat{Q}(s_t, a_t; \boldsymbol{\theta})
    \Bigr)^2 {} \end{aligned} $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_Equ7.png)


    (7.7) where ![$$r_t$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq80.png)
    represents the reward signal, ![$${\gamma }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq81.png)
    is a discount factor that determines the relative importance of future rewards,
    and ![$$\boldsymbol {\theta }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq82.png)
    represents the parameters of the neural network. By minimizing this objective
    function, we can update the neural network’s parameters to better approximate
    the true state-action value function ![$$Q_\pi $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq83.png)
    for some policy ![$$\pi $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq84.png)
    .'
  trans: '

    # 7.3 使用神经网络进行策略评估


    在本节中，我们将探讨在强化学习中利用神经网络进行策略评估。其目标是使用参数为 `θ` 的神经网络来近似任意策略 `π` 的状态价值函数 `V_π`。我们假设已知该策略的真实状态价值函数
    `V_π`，而我们的目标是找到能够最小化真实值与神经网络预测值之间平方误差的参数 `θ`。


    我们从目标函数开始：


    ```

    J(θ) = E_π[(V_π(S) - V̂(S; θ))²]

    ```


    (7.3)


    其中 `V̂(S; θ)` 是神经网络对状态 `S` 的预测值。我们可以使用随机梯度下降法，通过利用小批量经验数据计算出的样本梯度来更新参数 `θ`，从而得到针对给定小批量的简化目标函数：


    ```

    J(θ) = (V_π(S) - V̂(S; θ))²

    ```


    (7.4)


    为了在实践中使用这种方法进行策略评估，我们放宽了已知真实状态价值函数 `V_π` 的假设，转而使用来自蒙特卡洛或时序差分学习的样本回报作为目标。对于蒙特卡洛策略评估，目标函数变为


    ```

    J(θ) = (G_t - V̂(s_t; θ))²

    ```


    (7.5) 其中 `G_t` 是从状态 `s_t` 获得的总回报。


    对于 TD(0) 策略评估，我们使用即时奖励 `r_t` 和后续状态的折扣价值 `γ V̂(s_{t+1}; θ)` 作为目标，目标函数变为


    ```

    J(θ) = (r_t + γ V̂(s_{t+1}; θ) - V̂(s_t; θ))²

    ```


    (7.6)


    通过使用这些目标函数，并应用带有反向传播的随机梯度下降法，我们可以更新神经网络参数 `θ`，以更好地近似状态价值函数，从而改进强化学习算法中的策略评估。


    强化学习与监督学习的区别在于，它使用蒙特卡洛或时序差分学习来估计目标函数中的目标。蒙特卡洛和时序差分学习利用奖励信号和后续状态的价值来估计目标，该目标会随时间变化，这与监督学习中固定的目标不同，这也使得训练神经网络来近似价值函数更具挑战性。


    我们还可以使用神经网络来近似某个策略 `π` 的状态-动作价值函数，记为 `Q̂`。针对参数 `θ` 的 `Q̂` 的 TD(0) 策略评估目标函数变为


    ```

    J(θ) = (r_t + γ Q̂(s_{t+1}, a_{t+1}; θ) - Q̂(s_t, a_t; θ))²

    ```


    (7.7) 其中 `r_t` 表示奖励信号，`γ` 是决定未来奖励相对重要性的折扣因子，`θ` 表示神经网络的参数。通过最小化这个目标函数，我们可以更新神经网络的参数，以更好地近似某个策略
    `π` 的真实状态-动作价值函数 `Q_π`。

    '
- fmt: '# 7.4 Naive Deep Q-Learning


    In reinforcement learning, Q-learning is an off-policy learning algorithm that
    directly learns the optimal state-action value function (`Q*`). To compute the
    estimated target, Q-learning uses the immediate reward and discounted value of
    the best successor state-action pair as the TD target. When using neural networks
    to approximate the optimal state-action value function, our objective function
    for Q-learning can be expressed as


    ```

    J(θ) = (r_t + γ max_{a''} Q̂(s_{t+1}, a''; θ) - Q̂(s_t, a_t; θ))^2

    ```


    (7.8)


    ![A flow diagram labeled s, theta and matric format of Q functions a = 1 to n.](images/605748_1_En_7_Chapter/605748_1_En_7_Fig11_HTML.png)


    **Fig. 7.11** The concept of using neural networks to approximating state-action
    value function `Q_π`, where we only feed state `s` to the neural network, and
    the output from the neural network is a vector that contains values for every
    action for the given state


    Here, `θ` represents the parameters of the neural network.


    In the previous chapters, we often computed the value for a specific state-action
    pair `(s, a)` using tabular and linear methods. However, if we want to find out
    which action yields the maximum value `max_a Q_π(s, a)` for an arbitrary state
    `s`, we have to enumerate all the (legal) actions one by one. This means that
    we have to feed the same state `s` into a neural network multiple times, which
    can hurt performance if the action space is quite large. When working with neural
    networks, we want to avoid these sequential operations and take advantage of parallel
    computing capabilities especially when working with accelerated hardware like
    GPUs.


    To address this issue, we can make a small change to how we compute the action
    values for an arbitrary state when using neural networks. Instead of feeding a
    state-action pair `(s, a)` into the neural network, we only use state `s` as input,
    and we compute the values for each action in one go, as shown in Fig. 7.11. The
    output of the neural network is a vector, where each scalar component corresponds
    to the estimated value for the corresponding action. This approach avoids repeatedly
    feeding the same state into the neural network, which can be computationally expensive.
    It also allows us to easily find which action has the maximum value for a given
    state.


    We now introduce the naive deep Q-learning algorithm, which uses a (deep) neural
    network to approximate the optimal state-action value function `Q*`. The overall
    procedure is the same compared to using linear methods to approximate `Q*`. The
    difference is how to compute the gradients and update the parameters. If we use
    some deep learning framework software like PyTorch, we don''t need to manually
    compute the gradients and then update the weights or bias of different layers
    of the neural network. Instead, we rely on these tools (like using backpropagation
    and optimizer) to do the work automatically for us. We only need to compute the
    loss using the predicted values and the TD (temporal difference) target, which
    is a measure of the difference between the predicted value and the actual reward
    received by the agent. It is worth noting that this is not the same DQN agent
    that DeepMind used to play different Atari games. To develop the same DQN agent,
    we would need to make some improvements to the naive deep Q-learning algorithm.


    **Algorithm 1: Naive deep Q-learning with ε-greedy policy for Exploration**


    ![An algorithm manages a replay buffer with capacity N, allowing for adding and
    randomly sampling transitions from the buffer while ensuring replacement when
    necessary.](images/605748_1_En_7_Chapter/605748_1_En_7_Figaab_HTML.gif)


    We evaluated the performance of the naive deep Q-learning agent on the classic
    cart pole task. The results are displayed in Fig. 7.12. To evaluate the performance
    of the agent, we ran 20,000 evaluation environment steps (approximately 40 episodes)
    on a separate evaluation environment with an exploration epsilon of 0.05 after
    every 20,000 training environment steps. The results were averaged over five independent
    runs and then smoothed using a moving average with a window size of five.


    ![A line graph plots evaluation episode return versus training environment steps.
    A line increases from 200 and fluctuates constantly between 300 to 400.](images/605748_1_En_7_Chapter/605748_1_En_7_Fig12_HTML.png)


    **Fig. 7.12** Performance of the naive deep Q-learning agent on cart pole. To
    evaluate the performance of the agents, we run 20,000 evaluation environment steps
    (about 40 episodes) on a separate evaluation environment with exploration epsilon
    0.05 after every 20,000 training environment steps. The results were averaged
    over five independent runs and then smoothed using a moving average with a window
    size of five. We use discount `γ = 0.99`, learning rate `α = 0.00025`, and decay
    exploration rate `ε` from 1.0 to 0.1 over 100,000 environment steps during training


    The results indicate that the overall performance of the naive deep Q-learning
    agent is worse than using linear methods to approximate the value functions. Furthermore,
    the agent failed to reach the maximum episode returns during the evaluations.
    One might expect better results if we try to fine-tune the hyper-parameters like
    learning rate and exploration rate, but there are some underlying issues with
    the naive deep Q-learning agent which we need to address in order to make it a
    strong agent.'
