  trans: '

    让我们考虑一个策略评估的例子，其中我们希望针对一个固定策略 `π` 来估计状态价值。我们假设已知该策略 `π` 的真实状态价值函数 `Vπ`。由于已知真实状态价值，我们可以通过单个状态
    `s` 的平方误差 `(Vπ(s) - V̂(s; w))²` 来衡量近似值与真实值之间的差异。这也意味着我们可以衡量权重 `w` 的性能，因为在这种情况下，状态
    `s` 及其真实状态价值 `Vπ(s)` 是恒定的。唯一会影响近似函数估计值的因素就是权重 `w`。


    ```

    (Vπ(s) - V̂(s; w))²

    ```


    (6.1)


    值得注意的是，智能体在遵循策略 `π` 与环境交互时，可能会遇到大量状态，而这些状态通常是随机的，尤其是在环境或策略具有随机性的情况下。因此，以一种独立于特定时间步的方式，来衡量近似函数相对于权重的准确性就显得非常重要。为了实现这一点，我们在公式
    (6.2) 中使用了期望符号 `Eπ`。在公式 (6.2) 中，我们使用不带下标 `t` 的 `S` 来表示状态，以强调性能的衡量应独立于特定时间步。我们也可以将公式中的
    `S` 视为整个状态空间。


    ```

    Eπ[(Vπ(S) - V̂(S; w))²]

    ```


    (6.2)


    现在，我们可以为使用 `V̂` 来近似真实状态价值函数 `Vπ` 的情况定义一个精确的目标。这个目标是必要的，以便找到能够最小化平方误差 `(Vπ(S) -
    V̂(S; w))²` 的权重 `w`，该误差针对的是智能体在遵循策略 `π` 与环境交互时可能遇到的所有状态。这个想法与监督学习问题非常相似；在这种情况下，真实标签是
    `Vπ(S)`，预测标签是 `V̂(S; w)`。在本书中，我们通常使用更简短的术语 `J(w)` 来表示这个目标。


    ```

    J(w) = Eπ[(Vπ(S) - V̂(S; w))²]

    ```


    (6.3)


    类似地，如果我们知道策略 `π` 的真实状态-动作价值函数 `Qπ`，我们也可以为近似 `Q̂` 定义目标。在实践中，我们对状态-动作价值函数更感兴趣；毕竟，我们需要
    `Qπ` 来进行控制（即寻找最优策略）。同样的概念在此仍然适用，我们希望找到能够最小化平方误差 `(Qπ(S, A) - Q̂(S, A; w))²` 的权重
    `w`。


    ```

    J(w) = Eπ[(Qπ(S, A) - Q̂(S, A; w))²]

    ```


    (6.4)


    现在我们已经为 `V̂` 和 `Q̂` 定义了目标函数；这意味着我们可以使用任何合适的优化方法来最小化公式 (6.3) 和 (6.4) 中相对于其权重 `w`
    的项。在本书中，我们重点介绍一种在机器学习中被广泛采用的流行方法，称为随机梯度下降。

    '
- fmt: '# 6.3 Stochastic Gradient Descent


    In optimization, the goal is to find the parameters that minimize or maximize
    a given mathematical function. The term *gradient descent* refers to using an
    iterative optimization method to find a *local minimum* of a *differentiable*
    function. A differentiable function is a mathematical function that has a well-defined
    derivative at every point in its domain. In other words, the derivative of the
    function exists and can be calculated for any input value in the function’s domain.
    Geometrically, the derivative of a differentiable function represents the slope
    of the tangent line to the function’s graph at a given point.


    A local minimum of a function is a point in the function’s domain where the function
    takes on its smallest value within a small surrounding neighborhood of the point,
    but not necessarily the smallest value over the entire domain of the function.
    In other words, it is a point where the function is lower than nearby points,
    but there may be other points further away that have even lower values. Local
    minima are important in optimization because they represent candidate solutions
    to optimization problems, but they are not guaranteed to be the global minimum
    (i.e., the absolute minimum over the entire domain of the function).


    The concept of differentiability is important in optimization because it allows
    us to calculate the gradient of a function with respect to its inputs, which is
    essential in many optimization algorithms, such as gradient descent. Given a differentiable
    function `J(w)` with respect to weights `w`, the goal is to find `w` so that it
    minimizes `J(w)`.


    The algorithm for gradient descent begins by finding the gradients of `J(w)` with
    respect to `w`. It then updates the weights `w` by taking a step in the direction
    of the negative gradient `∇_w J(w)`.


    ```

    w = w - α ∇_w J(w)

    ```


    (6.5)


    The parameter `α` is a step size (often called the learning rate) that controls
    how far a step should be when updating the weights `w`. The algorithm repeats
    this process over a large number of steps in an iterative manner until it finds
    a good local minimum.


    The intuition behind the update rule is that by taking a step in the direction
    of the negative gradient, we are effectively moving toward the direction of steepest
    descent of the objective function. This means that at each step, we are moving
    toward the direction where the function decreases the most. By repeating this
    process over a large number of steps, we hope to eventually reach a minimum of
    the function. To see why this makes sense, imagine standing at the top of a hill
    and wanting to get to the bottom. The fastest way to descend would be to move
    in the direction of the steepest slope, which is the direction of the direction
    to the bottom of the hill. Similarly, in optimization, the negative gradient points
    in the direction of the steepest descent of the objective function, so moving
    in the direction of the negative gradient will help us reach a minimum more quickly
    than moving in any other direction.


    The learning rate `α` controls the step size of the update, so it determines how
    far we move in the direction of the negative gradient at each step. A small learning
    rate means that we take smaller steps, which may help us avoid overshooting the
    minimum, while a larger learning rate means that we take larger steps, which may
    help us converge more quickly. However, if the learning rate is too small, we
    may converge very slowly, while if it is too large, we may overshoot the minimum
    and oscillate around it or even diverge from it. Therefore, it is important to
    choose an appropriate learning rate for the optimization problem at hand.


    The gradient for `J(w)` with respect to weights `w` is a (column) vector that
    contains the partial derivatives with respect to each of the weights `w_1, w_2,
    ..., w_n` in `w` and has the same dimensionality as the weight vector `w`. The
    gradient `∇_w J(w)` is calculated by taking the partial derivative of the function
    with respect to each weight. It is common to use *stochastic gradient descent*
    (SGD) in practice, which randomly selects a subset of the data (called a *mini-batch*)
    at each iteration to calculate an estimate of the gradient.


    ```

    ∇_w J(w) = ( ∂J(w)/∂w_1, ∂J(w)/∂w_2, ..., ∂J(w)/∂w_n )^T

    ```


    (6.6)


    In summary, stochastic gradient descent is an iterative optimization algorithm
    that uses the gradient of a differentiable function to update its weights in the
    direction of steepest descent, with the goal of finding a local minimum of the
    objective function. The learning rate controls the step size of the update, and
    it is important to choose an appropriate learning rate for the optimization problem
    at hand. Stochastic gradient descent is commonly used in practice, and it is often
    implemented using mini-batches to estimate the gradient.'
