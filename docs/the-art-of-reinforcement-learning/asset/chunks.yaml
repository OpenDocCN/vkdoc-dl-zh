    We use step size ![$$\alpha =0.02$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq358.png)
    , no discount ![$${\gamma }=1.0$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq359.png)
    , and fixed exploration rate ![$$\epsilon =0.1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq360.png)
    throughout the experiment


    The results, shown in Fig. [5.8](#605748_1_En_5_Chapter.xhtml#Fig8), were averaged
    over 1000 independent runs, each consisting of 500 episodes. The optimal policy
    is to choose *Go right* with a probability of 5% (since we are using a fixed ![$$\epsilon
    =0.1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq361.png) , the
    agent will act randomly with a probability of 10%, and when acting randomly and
    choosing between *Go left* and *Go right*, the agent should choose *Go right*
    with a probability of 0.5 * 10%). We observed that the standard Q-learning agent
    chose *Go right* more often than the optimal policy during the first 200 episodes.
    However, the double Q-learning agent quickly discovered the optimal policy after
    only 50 episodes.'
  trans: '

    类似地，如果智能体要更新 `Q2`，它使用相同的逻辑，但将 `Q1` 和 `Q2` 互换：


    ```

    Q2(S_t, A_t)=Q2(S_t, A_t) + α ( R_t + γ Q1(S_{t+1}, argmax_{a''}Q2(S_{t+1}, a'')
    ) - Q2(S_t, A_t) )

    ```


    举个例子，假设一个智能体正在学习玩一个需要穿越迷宫到达目标的游戏。在某些情况下，智能体可能会高估某些动作的价值，从而导致次优策略。使用双 Q 学习，智能体学习两个独立的
    Q 函数，在学习过程中，它交替更新 `Q1` 和 `Q2` 的值。在选择动作时，智能体使用来自 `Q1` 的最佳动作来选择来自 `Q2` 的值，反之亦然。这个过程有助于减少高估，并能带来更准确的价值估计，从而产生更好的策略。


    在赌场 MDP 示例的背景下，同一个动作在 `Q1` 和 `Q2` 中同时具有最大值的概率要低得多，这缓解了最大化偏差问题。


    现在我们正式介绍使用 `ε`-贪心策略进行探索的双 Q 学习算法。整体流程与标准 Q 学习相同。我们需要做的一个小改动是，当智能体需要在环境中行动时，它使用合并后的状态-动作价值函数
    `Q1` 和 `Q2` 作为单个状态-动作价值函数 `Q` 来执行 `ε`-贪心策略。`ε`-贪心策略以概率 `1-ε` 从 `Q` 中选择价值最高的动作，并以概率
    `ε` 选择一个随机动作。


    **算法 8：带 `ε`-贪心探索的双 Q 学习**


    一个 15 行的算法，标题为“带 epsilon 减贪心探索的双 Q 学习”，接收以下输入，并输出最优状态-动作价值函数 `Q`：折扣率 `gamma`、初始探索率
    `epsilon`、步长 `alpha` 和步数 `K`。


    我们使用标准 Q 学习和双 Q 学习进行了一项实验，以找到我们赌场 MDP 的最优策略。在整个实验中，我们使用了固定的探索率 `ε=0.1`、相同的步长 `α=0.1`，并且没有折扣（`γ=1.0`）。实验的目标是衡量智能体在处于*中央大厅*状态时选择*向右走*动作的频率。


    一张频率图显示了“在中央大厅选择向右走的百分比”与“回合数”的关系：Q 学习呈现一条向下凹的递减曲线，双 Q 学习呈现一条向上凸的递减曲线，以及一条从纵轴
    5% 处开始的平行于横轴的直线。该值为估计值。


    **图 5.8** 在赌场 MDP 中，处于*中央大厅*状态时选择*向右走*的百分比。结果在 1000 次独立运行中取平均值；每次运行包含 500 个回合。在整个实验中，我们使用步长
    `α=0.02`，无折扣 `γ=1.0`，以及固定的探索率 `ε=0.1`。


    结果如图 5.8 所示，在 1000 次独立运行中取平均值，每次运行包含 500 个回合。最优策略是以 5% 的概率选择*向右走*（因为我们使用了固定的 `ε=0.1`，智能体有
    10% 的概率会随机行动，而在随机行动时，在*向左走*和*向右走*之间选择，智能体应以 0.5 * 10% 的概率选择*向右走*）。我们观察到，在前 200
    个回合中，标准 Q 学习智能体选择*向右走*的频率高于最优策略。然而，双 Q 学习智能体在仅 50 个回合后就迅速发现了最优策略。

