- fmt: '# 13.3 Random Network Distillation


    Random Network Distillation (RND) is a reinforcement learning algorithm designed
    to encourage exploration in learning agents. This algorithm was introduced by
    Burda et al. [[2](#605748_1_En_13_Chapter.xhtml#CR2)] and is based on the idea
    of computing an intrinsic reward based on the novelty of the agent’s experience.
    In other words, the algorithm rewards the agent for encountering new and unexpected
    experiences.


    RND uses two neural networks: a fixed and randomly initialized target network,
    denoted by `f`, and a predictor network, denoted by `\hat{f}`, which is trained
    on data collected by the agent. The weights of the fixed network `f` remain constant
    during the training session, while the weights of the predictor network `\hat{f}`
    are updated using supervised learning based on the prediction error.


    The intrinsic reward signal `r_t^{I}` for state `s_t` at time step `t` is computed
    as


    ```

    \displaystyle \begin{aligned} r_t^{I} = \lvert f(s_t) - \hat{f}(s) \lvert^2 \end{aligned}

    ```


    (13.1)


    More precisely, the RND algorithm can be described in the following steps:


    - The fixed network `f` takes a state `s_t` as input and outputs an embedding
    feature vector `\tau_t`.

    - The predictor network takes the same state `s_t` as input and outputs its own
    embedding feature vector `\hat{\tau}_t`.

    - The difference between the predictions of the predictor network `\hat{f}` and
    the fixed network `f` is then used to compute the intrinsic reward, which is `\lvert
    \hat{\tau}_t - \tau_t \rvert^2`.

    - The predictor network is then trained to minimize the prediction error `\lvert
    \hat{\tau}_t - \tau_t \rvert^2`, which is done by using supervised learning methods.


    And Fig. [13.1](#605748_1_En_13_Chapter.xhtml#Fig1) shows how the RND works.


    ![](images/605748_1_En_13_Chapter/605748_1_En_13_Fig1_HTML.png)


    A flowchart for computing the intrinsic reward and updates by RND starts with
    environment state `s_t`. It flows through fixed network `f(s_t)`, predictor network
    `\hat{f}(s_t)`, and prediction error. It ends at intrinsic reward `r_t^{I}`. The
    prediction error reverts to the predictor network via an update predictor network.


    **Fig. 13.1** How RND computes the intrinsic reward and updates the predictor
    network. Adapted from Burda et al. [[2](#605748_1_En_13_Chapter.xhtml#CR2)]


    The intrinsic reward is combined with the reward signal from the environment,
    resulting in a total reward `r_t = r_t^{E} + r_t^{I}`, where `r_t^{E}` is the
    reward provided by the environment at time step `t`, and `r_t^{I}` is the exploration
    bonus (intrinsic reward) associated with the transition at time step `t`. This
    total reward can be plugged into any of the existing reinforcement learning algorithms,
    like DQN, Actor-Critic, or even PPO.


    To understand the intuition behind RND, let’s look at a simple example. Suppose
    we’re trying to train an agent to navigate a maze, the environment only provides
    positive reward +1 to the agent when it successfully reaches a goal position,
    and zero reward otherwise. In such case, the agent might have trouble making adequate
    decisions and explore the environment, since no meaningful reward is provided
    unless it reaches the goal.


    To encourage the agent to explore more, we can use RND. The fixed network `f`
    is randomly initialized and doesn’t change throughout the training session. It
    takes in the agent’s current state in the maze and outputs a unique embedding
    feature vector `\tau_t` that represents the state. Meanwhile, the predictor network
    `\hat{f}` takes in the same state and tries to predict the embedding feature vector
    `\tau_t` from the fixed network.


    As the agent explores the maze, the predictor network `\hat{f}` predicts the embedding
    feature vector `\hat{\tau}_t` for the current state `s_t`, and the fixed network
    `f` also generates its own embedding feature vector `\tau_t` for `s_t`. The intrinsic
    reward is then calculated based on the squared Euclidean distance between these
    two predicted vectors: `\lvert \hat{\tau}_t - \tau_t \rvert^2`. If the agent encounters
    a new state that is significantly different from any previously seen states, the
    distance between the predicted vectors will be large, resulting in a high intrinsic
    reward. On the other hand, if the agent repeatedly visits the same states, the
    distance between the predicted vectors will be small, resulting in a low intrinsic
    reward.


    This intrinsic reward is then combined with the environment reward, and the total
    reward is used to update the agent’s policy. By encouraging the agent to explore
    new states and experiences, RND can help the agent learn more effectively and
    navigate the maze more efficiently.


    The neural network architecture of the RND module for Atari games is depicted
    in Fig. [13.2](#605748_1_En_13_Chapter.xhtml#Fig2). The module comprises a target
    network on the left, initialized randomly, with its parameters kept fixed during
    the training process. On the right is the predictor network, which is similar
    to the target network but consists of two additional fully connected layers. Both
    networks receive a normalized `84 \times 84 \times 1` single frame as input and
    output an embedding vector. The objective of the predictor network is to accurately
    predict the embedding vector generated by the fixed target network.


    ![](images/605748_1_En_13_Chapter/605748_1_En_13_Fig2_HTML.png)


    Two bottom-up flowcharts for the RND neural network architecture labeled target
    and predictor. Both target and filter start with 32 filters, kernel size 8 times
    8, and stride 4 and end at embeddings post 512 units. Target and predictor have
    4 stages with leaky ReLU links and 6 stages with ReLU links, respectively.


    **Fig. 13.2** RND neural network architecture proposed by Burda et al. [[2](#605748_1_En_13_Chapter.xhtml#CR2)]
    for the Atari video game, where the left side shows the randomly initialized target
    network and the right side shows the predictor network'
  raw: '## 13.3 Random Network Distillation


    Random Network Distillation (RND) is a reinforcement learning algorithm designed
