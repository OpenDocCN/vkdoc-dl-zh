  trans: '

    ### Q 学习的 N 步更新规则


    在标准 Q 学习中，总是使用最优动作来评估后继状态。然而，当使用 N 步回报时，增量更新规则会变得更加复杂。该更新规则涉及计算接下来 N 步的奖励总和，然后从
    N 步后的状态值进行自举。自举是指使用价值函数的估计值来更新价值函数的估计值。这使得智能体能够从更长的经验序列中学习，并做出更优决策。


    以下是该更新规则的公式：


    ![$$\displaystyle \begin{aligned} Q_\pi(S_t, A_t) ={} &amp; Q_\pi(S_t, A_t) +
    \alpha \bigg( \Big[ R_t + {\gamma} R_{t+1} + \cdots + {\gamma}^{n-1}R_{t+n-1}
    \\ &amp; + {\gamma}^{n} \max_{a''}Q_\pi(S_{t+n}, a'') \Big] - Q_\pi(S_t, A_t)
    \bigg) {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ25.png)


    (5.25)


    在此公式中，`Q(S_t, A_t)` 是在状态 `S_t` 下采取动作 `A_t` 的估计价值，`α` 是步长参数，`R_t` 是在状态 `S_t` 下采取动作
    `A_t` 后获得的奖励，`γ` 是折扣因子，`n` 是用于计算回报的步数。公式中的每个变量都有特定含义，如公式后的注释所述。


    ### N 步 Q 学习与重要性采样


    在 Q 学习（一种离策略强化学习算法）中，它估计的是与当前遵循策略不同的另一个策略的价值。当使用 `N=1` 的标准 Q 学习时，无需使用重要性采样来加权
    TD 目标。然而，当使用 `N ≥ 2` 的 N 步 Q 学习时，则需要重要性采样，因为 N 步奖励是由行为策略 `μ` 生成的，而该策略可能与目标策略 `π`
    不同。


    例如，如果我们使用如图 5.12 所示的 `N=2`，可以看到智能体在状态 `s` 下采取动作 `a` 后，在 N 步过程中的轨迹在行为策略和目标策略下可能完全不同。行为策略更具探索性，这意味着它可能不会选择目标策略会选出的最优动作。因此，路径可能会产生分歧。如果我们使用相对较小的
    `N` 值，这可能不是大问题，但如果 `N` 值变得非常大，这个问题可能会变得更加显著。


    为了计算 N 步 Q 学习的重要性采样比率，我们可以跳过第一步 `t` 和最后一步（`t+n`）；跳过第一步的原因是，我们正在估计状态-动作对 `(s, a)`
    的价值，因此行为策略（或目标策略）在状态 `s` 下选择动作 `a` 的概率是多少并不重要，因为该动作已经发生。跳过最后一步（`t+n`）的原因是，Q 学习总是使用后继状态
    `S_{t+n}` 下所有有效动作中的最大值 `Q(s'', a'')`，无论行为策略选择了哪个动作，这使得最后一步 `t+n` 的重要性采样比率始终等于
    1。


    ![](img/605748_1_En_5_Fig12_HTML.png)


    N 步 Q 学习采样的树状图从节点 S 开始，该节点衍生出一个标记为 a, r 的节点。节点 a, r 分支为两个节点。左侧节点及其分支未标记。右侧节点标记为
    s''，并分支为 a''和 s''。a''和 s''各自衍生出一个 s''''节点。


    **图 5.12** 为什么我们应该对 N 步 Q 学习使用重要性采样（针对 `n=2` 的情况），其中 `π` 是目标策略，`μ` 是行为策略


    换句话说，我们可以计算剩余步骤 `t+1, t+2, …, t+n-1` 的重要性采样比率。这简化了重要性采样比率的计算，并降低了估计值的方差。

    '
- fmt: '![$$\displaystyle \begin{aligned} \rho_{t+1:t+n-1} &amp; = \frac{\pi(A_{t+1}|S_{t+1})
    p(S_{t+2}|S_{t+1}, A_{t+1}) \cdots p(S_{t+n}|S_{t+n-1}, A_{t+n-1})}{\mu(A_{t+1}|S_{t+1})
    p(S_{t+2}|S_{t+1}, A_{t+1}) \cdots p(S_{t+n}|S_{t+n-1}, A_{t+n-1})} \\ &amp; =
    \frac{\pi(A_{t+1}|S_{t+1})\pi(A_{t+2}|S_{t+2}) \cdots \pi(A_{t+n-1}|S_{t+n-1})}{\mu(A_{t+1}|S_{t+1})\mu(A_{t+2}|S_{t+2})
    \cdots \mu(A_{t+n-1}|S_{t+n-1})} {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ26.png)


    (5.26)


    To compute the probabilities for the target policy, we note that the target policy
    is a deterministic (or greedy) policy that always chooses the action with the
    highest Q-value for a given state. Thus, the probability of selecting action `a`
    in state `s` is 1 if and only if `a = argmax_a Q(s, a)`; otherwise, it is 0. This
    can be expressed as


    ![$$\displaystyle \begin{aligned} \pi(a|s) = \begin{cases} 1, &amp; \text{if}
    \quad \displaystyle a=\mathop{\text{argmax}}_a Q(s, a) \\ 0, &amp; \text{if} \quad
    \displaystyle a \neq \mathop{\text{argmax}}_a Q(s, a) \end{cases} {} \end{aligned}
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ27.png)


    (5.27)


    Intuitively, importance sampling adjusts the update rule to account for the difference
    between the behavior and target policies. This is necessary because the behavior
    policy might choose suboptimal actions, which could lead to biased estimates of
    the value function. Importance sampling allows the agent to adjust for this bias
    and learn more efficiently and accurately.


    To adapt N-step Q-learning, the agent must store the probabilities of selecting
    each action `mu(A_t|S_t)` chosen by the agent over the course of the N-step sequence.
    During the update step, we compute the probability of the target policy selecting
    these actions in the corresponding states using Eq. (5.27). This equation calculates
    the expected return under the target policy given the current state and is used
    to update the Q-values for each state-action pair.


    The importance sampling ratio is the ratio of the probabilities of selecting the
    action under the target policy and the behavior policy. It adjusts for the fact
    that the behavior policy may have selected actions that are suboptimal according
    to the target policy. By using this ratio, we can update the Q-values to better
    reflect the optimal policy.


    N-step Q-learning is a variant of Q-learning that updates the Q-values based on
    the returns observed over a sequence of N time steps. By incorporating a longer
    sequence of experiences, N-step Q-learning can lead to more efficient learning
    and better performance in some environments. By using importance sampling, we
    can adjust for the difference between the behavior and target policies, allowing
    us to learn more efficiently and accurately. The pseudocode is shown in Algorithm
    10.


    **Algorithm 10: N-step Q-learning with importance sampling**


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Figaaj_HTML.gif) A 9-line algorithm
    titled N-step Q-learning with importance sampling takes the following inputs to
    give an optimal state-action value function `Q` as output. Discount rate `gamma`,
    initial exploration rate `epsilon`, step size `alpha`, N-step `N` where `N` is
    greater than equal to 1, and number of steps `K`.


    Adapting N-step Q-learning can be more challenging than standard Q-learning. It
    involves storing a longer sequence of experiences, which can be more computationally
    demanding. Additionally, the behavior policy may select suboptimal actions that
    the target policy would not select. This can cause the N-step rewards to be different
    between the two policies, which can become a significant issue if the number of
    steps `N` is large.


    When we use importance sampling for off-policy N-step Q-learning, we need to keep
    in mind that the values may not get updated that often. It’s very likely that
    in a sequence of N-step transitions, the behavior policy will select some exploratory
    action that’s not the best action according to the target policy. This means the
    importance sampling ratio will get close to zero, in the extreme case where the
    policies are deterministic, and the whole TD error term could also becomes zero.
    Thus, the value update during learning becomes `Q(S_t, A_t) = Q(S_t, A_t)`, which
    may potentially cause slower convergence in off-policy learning compared to on-policy
    learning.


    In practice, some successful N-step Q-learning algorithms, such as the Rainbow
    agent proposed by Hessel et al. [6], avoid this issue by using a relatively small
    N-step (`n=5`) and not using importance sampling at all to keep things simple.
    However, it’s hard to justify the contribution of N-step bootstrap to the success
    of the Rainbow algorithm, since it also involves lots other technics and improvements
    over the standard DQN agent.


    ## 5.9 Summary


    In the final chapter of Part I, we delved into the powerful framework of temporal
    difference (TD) learning. TD learning builds upon the ideas from Monte Carlo methods,
    offering a more efficient approach to reinforcement learning (RL) by updating
    value estimates based on immediate time step transitions instead of complete episode
    sequence.


    The chapter began with an exploration of TD learning, which forms the foundation
    of the subsequent sections. TD allows us to update value estimates incrementally,
    using the difference between successive value estimates as a basis for learning.
    We then moved on to TD policy evaluation, a technique that enables us to estimate
    the value function for a given policy. By iteratively updating value estimates
    using TD updates, we can approximate the true value function without requiring
    complete episodes.


    The chapter continued with a discussion of TD control using the SARSA algorithm.
    SARSA combines TD learning with an on-policy approach, where the agent’s policy
    is improved while it interacts with the environment. We also explored the differences
    between on-policy and off-policy learning, highlighting the trade-offs and considerations
    associated with each approach.


    Next, we introduced Q-learning, an off-policy TD control algorithm and core to
    the famous DQN agent, which we will introduce in Part II of the book. Q-learning
    maximizes the expected return by updating action-value estimates based on the
    maximum estimated future rewards. We examined how Q-learning overcomes the limitations
    of on-policy methods and its impact on RL performance.


    In order to mitigate the issue of overoptimistic value estimates, we explored
    double Q-learning. This technique employs two sets of action-value functions to
    reduce the overestimation bias, enhancing the stability and accuracy of the learning
    process.


    Finally, the chapter concluded with a discussion on N-step bootstrapping, a method
    that bridges the gap between TD learning and Monte Carlo methods. N-step bootstrapping
    enables us to leverage information from multiple steps into the future to update
    value estimates.


    With the completion of this chapter, we wrap up Part I of the book, which focused
    on the fundamentals of RL and using tabular methods to solve small-scale Markov
    decision processes (MDPs). In Part II, we will shift our focus to value function
    approximation, exploring techniques that enable RL algorithms to scale up to larger
    and more complex problems.


