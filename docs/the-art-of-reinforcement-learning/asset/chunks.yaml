    dimensions. If we only have 10 hidden units in the first layer, the network still
    requires ![$$7.2 \times 10^6$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq30.png)
    parameters for that layer alone. This number grows even larger when we have more
    hidden layers or units, making it difficult to scale up to larger images.


    To address these challenges, we often use convolutional neural networks (CNNs)
    to process images. A convolution operation is a mathematical process that involves
    applying a filter (or kernel) to an input image or feature map to extract relevant
    features. In deep learning, convolution is used in convolutional neural networks
    (CNNs) to analyze visual imagery, and it is a key component in many state-of-the-art
    computer vision models.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig4_HTML.png)


    A flow illustration portrays a 6 multiple 5 multiple 1 grid of square boxes. Among
    the 35 total boxes, four are shaded and then transformed into linear boxes. Specifically,
    the 8th, 14th, 15th, and 20th boxes are shaded accordingly.


    Fig. 7.4


    Example of flattenning a grayscale image to a vector


    Convolution works by taking a small matrix of values (called filter or kernel)
    and sliding it across the input image or feature map, computing the dot product
    between the filter and the local patch of the image or feature map at each position.
    The result of this operation is a new matrix called the output feature map, which
    captures the most important features of the input.


    The use of convolution in deep learning has many advantages, including the ability
    to capture spatial dependencies in visual data, reduce the number of parameters
    required for a model, and enable the reuse of learned features across different
    parts of an image. These properties make convolution an effective tool for analyzing
    visual data and have led to its widespread use in a variety of computer vision
    applications.


    CNNs consist of one or more convolutional layers, which take the image data directly
    without flattening it. This preserves the region of interest and pixel correlations
    in the original image. Additionally, convolutional layers have a fixed number
    of parameters that is independent of the input image size, which makes it easy
    to scale up to larger images.


    At the core of a convolutional layer is a filter that performs convolution on
    the input data. A convolutional layer usually consists of several filters, each
    with its own set of parameters: weights ![$$\boldsymbol {W}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq31.png)
    and bias *b*. The weights ![$$\boldsymbol {W}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq32.png)
    is a matrix with dimensions of kernel size x input channels. The kernel size is
    a configurable variable that determines the size of the working area, or receptive
    field, when the filter is convolving the image. The filter moves across the image
    with a configurable variable called stride (default 1) to perform the convolution
    operation. The stride controls how far the filter moves for each convolution operation,
    such as moving one pixel at a time, until it reaches the right edge of the image.


    Figure [7.5](#605748_1_En_7_Chapter.xhtml#Fig5) illustrates the operation of a
    single filter in a convolutional layer of a convolutional neural network. The
    input data on the left has one channel (e.g., a grayscale image), and the single
    filter in the middle has a ![$$3 \times 3$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq33.png)
    kernel size. The weight matrix ![$$\boldsymbol {W}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq34.png)
    for this filter has the dimensions of ![$$3 \times 3 \times 1$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq35.png)
    , since the input data has only one channel.'
  trans: '

    # 卷积神经网络


    卷积神经网络（CNN）是一种专门为处理和分析具有网格状结构的数据（如图像或视频）而设计的神经网络。CNN 的灵感来源于动物视觉皮层的组织方式和功能，视觉皮层中具有专门对视野中特定特征做出反应的神经元。


    在 CNN 中，输入数据通常是一张图像，它被表示为一个像素网格。网络由多个层组成，每一层对输入数据执行不同类型的处理。第一层通常是卷积层，它对输入图像应用一组滤波器，每个滤波器在图像中寻找特定的模式或特征。这些滤波器在图像上移动，计算滤波器与图像之间的点积，从而生成一个特征图。


    第一层的输出随后被传递到下一层，下一层可能是另一个卷积层、池化层或全连接层。池化层通过计算特征图中相邻区域的最大值或平均值来对上一层的输出进行下采样。全连接层接收上一层的扁平化输出，并对其应用一组权重，从而生成对输入图像的预测或分类。


    全连接神经网络在处理数值数据时很有效，但并不适合处理图像数据，因为图像数据通常具有三个维度：宽度、高度和颜色通道。使用全连接神经网络时，我们需要将图像像素展平以创建一个向量；将图像像素展平为向量会导致我们丢失感兴趣区域以及像素之间的相关性，从而难以识别物体，如图
    7.4 所示。此外，在处理图像时，全连接神经网络中的参数数量可能会变得非常庞大。


    ![](img/605748_1_En_7_Fig3_HTML.png)


    4 条折线图描绘了 Sigmoid、Tanh、ReLU 和 Leaky ReLU 激活函数在一定输入值范围内的特征行为及输出范围。给定 `y = 1 / (1
    + e^(-x))`、`y = tanh(x)`、`y = max(0, x)` 以及当 `x < 0` 和 `x > 0` 时的 `y = a * x`。


    图 7.3


    不同的激活函数。左上角是 Sigmoid 激活函数的示例；右上角是 Tanh 激活函数的示例；左下角是 ReLU 激活函数的示例；右下角是 Leaky ReLU
    激活函数的示例。


    这种方法存在两个主要问题。首先，图像中的物体通常跨越多个像素，并且每个像素与其周围像素相关。将图像展平为向量会使识别物体变得更加困难；想象一下，我们正在训练一个强化学习智能体进行自动驾驶，未能成功识别行人可能意味着致命的错误和悲剧。其次，在处理图像时，全连接神经网络中的参数数量可能会变得非常庞大。例如，一张尺寸为
    `600 × 400 × 3` 的中等大小图像会生成一个包含 `7.2 × 10⁵` 个元素的向量。当输入到全连接神经网络时，第一个隐藏层的输入数据就有 `7.2
    × 10⁵` 个维度。即使第一层只有 10 个隐藏单元，该网络仅这一层就需要 `7.2 × 10⁶` 个参数。当我们有更多隐藏层或隐藏单元时，这个数字会变得更大，从而难以扩展到更大的图像。


    为了解决这些挑战，我们通常使用卷积神经网络（CNN）来处理图像。卷积运算是一个数学过程，涉及将滤波器（或卷积核）应用于输入图像或特征图，以提取相关特征。在深度学习中，卷积被用于卷积神经网络（CNN）来分析视觉图像，并且它是许多最先进的计算机视觉模型中的关键组成部分。


    ![](img/605748_1_En_7_Fig4_HTML.png)


    一个流程示意图描绘了一个 6 × 5 × 1 的方格网格。在总共 35 个方格中，有四个方格被着色，然后被转换为线性框。具体来说，第 8、14、15 和 20
    个方格被相应地着色。


    图 7.4


    将灰度图像展平为向量的示例。


    卷积的工作原理是：取一个小的数值矩阵（称为滤波器或卷积核），将其在输入图像或特征图上滑动，在每个位置计算滤波器与图像或特征图局部区域之间的点积。此操作的结果是一个新的矩阵，称为输出特征图，它捕获了输入中最重要的特征。


    在深度学习中应用卷积有许多优势，包括能够捕获视觉数据中的空间依赖性、减少模型所需的参数数量，以及能够跨图像的不同区域重用学习到的特征。这些特性使卷积成为分析视觉数据的有效工具，并使其广泛应用于各种计算机视觉应用中。


    CNN 由一个或多个卷积层组成，这些卷积层直接接收图像数据，而无需将其展平。这保留了原始图像中的感兴趣区域和像素相关性。此外，卷积层具有固定的参数数量，与输入图像大小无关，这使得它易于扩展到更大的图像。


    卷积层的核心是一个对输入数据执行卷积运算的滤波器。一个卷积层通常由多个滤波器组成，每个滤波器都有自己的参数集：权重 `W` 和偏置 `b`。权重 `W` 是一个维度为卷积核大小
    × 输入通道数的矩阵。卷积核大小是一个可配置的变量，它决定了滤波器对图像进行卷积时工作区域（即感受野）的大小。滤波器以一个称为步长（默认值为 1）的可配置变量在图像上移动，以执行卷积运算。步长控制每次卷积运算时滤波器移动的距离，例如一次移动一个像素，直到到达图像的右边缘。


    图 7.5 展示了卷积神经网络中一个卷积层内单个滤波器的运算过程。左侧的输入数据有一个通道（例如，一张灰度图像），中间的单个滤波器的卷积核大小为 `3 ×
    3`。由于输入数据只有一个通道，该滤波器的权重矩阵 `W` 的维度为 `3 × 3 × 1`。

    '
- fmt: '为了从与滤波器卷积的输入数据的感受野中提取特征，在感受野`X`和权重矩阵`W`之间使用点积符号`X · W`计算点积。感受野是与滤波器卷积的输入数据区域，其宽度和高度与核大小相同，如图7.5中的橙色部分所示。


    ![图7.6：单个卷积滤波器如何工作的示例（针对最后一个感受野）。数字是随机生成的。](images/605748_1_En_7_Chapter/605748_1_En_7_Fig6_HTML.png)


    图7.6展示了单个卷积滤波器的工作原理。它描绘了一个6x7表格中的输入数据，其中右下角有一个3x3的表格被高亮显示并连接到滤波器。滤波器呈现一个高亮的3x3表格。特征图呈现一个在右下角高亮显示的、标记为`X·W`的块。


    ![图7.5：单个卷积滤波器如何工作的示例。数字是随机生成的。](images/605748_1_En_7_Chapter/605748_1_En_7_Fig5_HTML.png)


    图7.5展示了单个卷积滤波器的工作原理。它描绘了一个6x7表格中的输入数据，其中左上角有一个3x3的表格被高亮显示并连接到滤波器。滤波器呈现一个高亮的3x3表格。特征图呈现一个在左上角高亮显示的、标记为`X·W`的块。


    点积结果使用加法运算符与偏置`b`（一个标量参数）相加，得到一个标量值，该值成为输出特征图的一部分。输出特征图使用公式`y = X · W + b`计算。


    由于滤波器的核大小通常远小于输入图像或来自先前卷积层的特征图，因此它需要通过滑动整个图像来重复执行相同的过程。每次，滤波器都会重用其参数，包括权重和偏置。图7.6展示了滤波器如何针对最后一个感受野工作。


    在实践中，单个卷积层会有多个滤波器，每个滤波器负责检测特定的特征。关于卷积层的一个有趣事实是，输出特征图中的通道数完全由该层中的滤波器数量决定，并且与输入数据中的通道数无关。例如，如图7.7所示，如果输入数据只有一个通道，但卷积层有四个滤波器（用不同颜色表示），则输出特征图将有四个通道。


    ![图7.8：单个卷积滤波器如何工作的示例，其中输入数据有三个通道且我们有一个滤波器。数字是随机生成的。](images/605748_1_En_7_Chapter/605748_1_En_7_Fig8_HTML.png)


    图7.8展示了单个卷积滤波器的工作原理。它描绘了3个通道的输入数据（6x7表格），其中左上角有一个3x3的部分被高亮显示并连接到一个具有3个通道的滤波器。特征图呈现一个在左上角高亮显示的、标记为`X·W`的块。


    ![图7.7：多个卷积滤波器如何工作的示例；输出特征图中的通道数仅取决于滤波器的数量。数字是随机生成的。](images/605748_1_En_7_Chapter/605748_1_En_7_Fig7_HTML.png)


    图7.7展示了多个卷积滤波器的工作原理。它描绘了一个6x7表格中的输入数据，其中左上角有一个3x3的表格被高亮显示并连接到多个滤波器。滤波器呈现高亮的3x3表格。特征图呈现一个在左上角高亮显示的、标记为`X·W`的块。


    前面的示例仅考虑了具有一个通道的输入数据，但在实践中，输入数据通常有多个通道。例如，RGB图像有三个颜色通道，或者来自先前隐藏层的特征图可能有多个通道。在这些情况下，卷积层中每个滤波器的权重`W`将具有与输入数据相同数量的通道。例如，如图7.8所示，如果输入数据有三个通道，则该层中每个滤波器的权重`W`也将有三个通道。输出特征图将只是对应通道之间组合点积的结果：`∑ᵢ
    Xᵢ · Wᵢ`。然而，由于我们讨论的是单个滤波器，输出特征图将只有一个通道。


    关于卷积神经网络（CNN）的架构，有几个重要的细节值得注意，例如控制步长和填充，以及使用池化层来缩小图像尺寸。然而，本书主要关注强化学习的理论和数学原理。感兴趣的读者可以在其他地方找到其他资源来了解更多关于这些神经网络架构的信息。


    在处理图像时，CNN相比全连接神经网络具有显著优势。例如，考虑一个尺寸为`600 × 400 × 3`的输入图像。对于第一个隐藏层，使用100个核大小为`3
    × 3`的滤波器，仅产生2700个参数（不包括偏置项）。这远小于全连接层中十个单元所需的`7.2 × 10⁶`个参数。此外，CNN被设计为与输入图像尺寸无关，这使得它们在图像处理任务中更加通用。'
  raw: 'To extract features from the receptive field of the input data that is being
    convolved with the filter, the dot product is computed between the receptive field
    ![$$\boldsymbol {X}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq36.png)
    and the weight matrix ![$$\boldsymbol {W}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq37.png)
    using the dot product notation ![$$\boldsymbol {X} \cdot \boldsymbol {W}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq38.png)
    . The receptive field is the region of the input data being convolved with the
    filter, and its width and height are identical to the kernel size, as shown by
    the orange color in Fig. [7.5](#605748_1_En_7_Chapter.xhtml#Fig5).


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig6_HTML.png)


    An illustration of a single convolutional filter. It depicts input data in a 6
    by 7 table with a 3 by 3 table highlighted on the bottom right and connected to
    the filter. The filter presents a highlighted 3 by 3 table. The feature map presents
    a block labeled X W highlighted on the bottom right.


    Fig. 7.6


    Example of how a single convolutional filter works for the last receptive field.
    The numbers are generated randomly


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig5_HTML.png)


    An illustration titled input data, filter, and feature map. It depicts input data
    in a 6 by 7 table with a 3 by 3 table highlighted on the top left and connected
    to the filter. The filter presents a highlighted 3 by 3 table. The feature map
    presents a block labeled X W highlighted on the top left.


    Fig. 7.5


    Example of how a single convolutional filter works. The numbers are generated
    randomly


    The dot product result is added to the bias *b*, which is a scalar parameter,
    using the addition operator, resulting in a scalar value that becomes part of
    the output feature map. The output feature map is computed using the equation
    ![$$y = \boldsymbol {X} \cdot \boldsymbol {W} + b$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq39.png)
    .


    Since a filter’s kernel size is often much smaller than the input image or feature
    maps from previous convolutional layers, it needs to perform the same process
    repeatedly by swiping over the entire image. Each time, the filter reuses its
    parameters, which include weights and bias. Figure [7.6](#605748_1_En_7_Chapter.xhtml#Fig6)
    shows how the filter works for the last receptive field.


    In practice, a single convolutional layer will have multiple filters, and each
    filter is responsible for detecting specific features. One interesting fact about
    convolutional layers is that the number of channels in the output feature maps
    is determined solely by the number of filters in the layer and is independent
    of the channels in the input data. For example, as shown in Fig. [7.7](#605748_1_En_7_Chapter.xhtml#Fig7),
    if the input data has a single channel but the convolutional layer has four filters
    (indicated by different colors), the output feature maps will have four channels.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig8_HTML.png)


    An illustration of a single convolutional filters. It depicts 3 channels of input
    data in 6 by 7 tables with 3 by 3 section highlighted on the top left and connected
    to a filter with 3 channels. The feature map presents a table with a block labeled
    X W highlighted on the top left.


    Fig. 7.8


    Example of how a single convolutional filter works, where the input data have
    three channels and we have a single filter. The numbers are generated randomly


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig7_HTML.png)


    An illustration of a multiple convolutional filters. It depicts input data in
    a 6 by 7 table with a 3 by 3 table highlighted on the top left and connected to
    multiple filters. The filters present highlighted 3 by 3 tables. The feature maps
    present a block labeled X W highlighted on the top left.


    Fig. 7.7


    Example of how multiple convolutional filters work; the number of channels in
    the output feature maps is only dependent on the number of filters. The numbers
    are generated randomly


    The preceding example only considers input data with one channel, but in practice,
    the input data often has multiple channels. For instance, an RGB image has three
    color channels, or the feature maps coming from previous hidden layers may have
    multiple channels. In these cases, the weights ![$$\boldsymbol {W}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq40.png)
    for each filter in the convolutional layer will have the same number of channels
    as the input data. For example, as shown in Fig. [7.8](#605748_1_En_7_Chapter.xhtml#Fig8),
    if the input data has three channels, the weights ![$$\boldsymbol {W}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq41.png)
    of each filter in the layer will also have three channels. The output feature
    maps will just be the combined dot products between the corresponding channels:
    ![$$\sum _i \boldsymbol {X}_{i} \cdot \boldsymbol {W}_{i}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq42.png)
    . However, since we are talking about a single filter, the output feature map
    will have only one channel.


    There are several important details worth noting about the architecture of convolutional
    neural networks (CNNs), such as controlling the stride and padding and using pooling
    layers to downscale images. However, this book primarily focuses on the theory
    and mathematics of reinforcement learning. Interested readers can find additional
    resources elsewhere to learn more about these neural network architecture.


    When it comes to processing images, CNNs offer a significant advantage over fully
    connected neural networks. For example, consider an input image with dimensions
    of ![$$600 \times 400 \times 3$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq43.png)
    . Using 100 filters with a kernel size of ![$$3 \times 3$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq44.png)
    for the first hidden layer yields only 2700 parameters (not including bias terms).
    This is much smaller than the ![$$7.2 \times 10^6$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq45.png)
    parameters required for ten units in a fully connected layer. Furthermore, CNNs
    are designed to be independent of the input image size, making them more versatile
    for image processing tasks.'
  trans: '

    为了从与滤波器卷积的输入数据的感受野中提取特征，在感受野`X`和权重矩阵`W`之间使用点积符号`X · W`计算点积。感受野是与滤波器卷积的输入数据区域，其宽度和高度与核大小相同，如图
    7.5 中的橙色部分所示。


    ![图 7.6：单个卷积滤波器如何工作的示例（针对最后一个感受野）。数字是随机生成的。](img/605748_1_En_7_Fig6_HTML.png)


    图 7.6 展示了单个卷积滤波器的工作原理。它描绘了一个 6x7 表格中的输入数据，其中右下角有一个 3x3 的表格被高亮显示并连接到滤波器。滤波器呈现一个高亮的
    3x3 表格。特征图呈现一个在右下角高亮显示的、标记为`X·W`的块。


    ![图 7.5：单个卷积滤波器如何工作的示例。数字是随机生成的。](img/605748_1_En_7_Fig5_HTML.png)


    图 7.5 展示了单个卷积滤波器的工作原理。它描绘了一个 6x7 表格中的输入数据，其中左上角有一个 3x3 的表格被高亮显示并连接到滤波器。滤波器呈现一个高亮的
    3x3 表格。特征图呈现一个在左上角高亮显示的、标记为`X·W`的块。


    点积结果使用加法运算符与偏置`b`（一个标量参数）相加，得到一个标量值，该值成为输出特征图的一部分。输出特征图使用公式`y = X · W + b`计算。


    由于滤波器的核大小通常远小于输入图像或来自先前卷积层的特征图，因此它需要通过滑动整个图像来重复执行相同的过程。每次，滤波器都会重用其参数，包括权重和偏置。图
    7.6 展示了滤波器如何针对最后一个感受野工作。


    在实践中，单个卷积层会有多个滤波器，每个滤波器负责检测特定的特征。关于卷积层的一个有趣事实是，输出特征图中的通道数完全由该层中的滤波器数量决定，并且与输入数据中的通道数无关。例如，如图
    7.7 所示，如果输入数据只有一个通道，但卷积层有四个滤波器（用不同颜色表示），则输出特征图将有四个通道。


    ![图 7.8：单个卷积滤波器如何工作的示例，其中输入数据有三个通道且我们有一个滤波器。数字是随机生成的。](img/605748_1_En_7_Fig8_HTML.png)


    图 7.8 展示了单个卷积滤波器的工作原理。它描绘了 3 个通道的输入数据（6x7 表格），其中左上角有一个 3x3 的部分被高亮显示并连接到一个具有 3
    个通道的滤波器。特征图呈现一个在左上角高亮显示的、标记为`X·W`的块。


    ![图 7.7：多个卷积滤波器如何工作的示例；输出特征图中的通道数仅取决于滤波器的数量。数字是随机生成的。](img/605748_1_En_7_Fig7_HTML.png)


    图 7.7 展示了多个卷积滤波器的工作原理。它描绘了一个 6x7 表格中的输入数据，其中左上角有一个 3x3 的表格被高亮显示并连接到多个滤波器。滤波器呈现高亮的
    3x3 表格。特征图呈现一个在左上角高亮显示的、标记为`X·W`的块。


    前面的示例仅考虑了具有一个通道的输入数据，但在实践中，输入数据通常有多个通道。例如，RGB 图像有三个颜色通道，或者来自先前隐藏层的特征图可能有多个通道。在这些情况下，卷积层中每个滤波器的权重`W`将具有与输入数据相同数量的通道。例如，如图
    7.8 所示，如果输入数据有三个通道，则该层中每个滤波器的权重`W`也将有三个通道。输出特征图将只是对应通道之间组合点积的结果：`∑ᵢ Xᵢ · Wᵢ`。然而，由于我们讨论的是单个滤波器，输出特征图将只有一个通道。


    关于卷积神经网络（CNN）的架构，有几个重要的细节值得注意，例如控制步长和填充，以及使用池化层来缩小图像尺寸。然而，本书主要关注强化学习的理论和数学原理。感兴趣的读者可以在其他地方找到其他资源来了解更多关于这些神经网络架构的信息。


    在处理图像时，CNN 相比全连接神经网络具有显著优势。例如，考虑一个尺寸为`600 × 400 × 3`的输入图像。对于第一个隐藏层，使用 100 个核大小为`3
    × 3`的滤波器，仅产生 2700 个参数（不包括偏置项）。这远小于全连接层中十个单元所需的`7.2 × 10⁶`个参数。此外，CNN 被设计为与输入图像尺寸无关，这使得它们在图像处理任务中更加通用。

    '
- fmt: '# 7.2 Training Neural Networks


    Training neural networks refers to the process of teaching a neural network to
    learn a mapping between input data and output data. During training, the neural
    network is presented with a set of input-output pairs, and the network adjusts
    its parameters, such as weights and biases, to minimize the difference between
    the predicted output and the actual target, such as in the case of supervised
    learning.


    The idea of using stochastic gradient descent (SGD) to update the parameters of
    a neural network using sample gradients still applies. However, the challenge
    lies in how to compute the gradients with respect to the different weights and
    biases in a neural network. Since neural networks often have multiple layers,
    and each layer can have different activation functions, the derivatives with respect
    to the weights and biases can differ from layer to layer. This means we can’t
    use a single update rule to update the parameters for these different layers,
    such as the cases we’ve introduced in the previous chapter for the linear methods.


    It is still possible to manually derive the equations for each layer, but this
    method can be challenging for people not familiar with calculus. Additionally,
    deep neural networks can often have dozens or even hundreds of layers, making
    manual derivation impractical. If changes are made to the architecture of the
    neural network, such as adding or removing layers or changing activation functions,
    most of the work will need to be redone.


    Luckily, the backpropagation algorithm offers a simple but elegant solution to
    the challenges of computing gradients in neural networks. The algorithm uses a
    computation graph to represent a complex differentiable function and then uses
    the chain rule of calculus to compute the gradients for each node in the graph.
    Each node in the computation graph performs only very basic operations, such as
    addition, multiplication, division, or grouped operations like an activation function.
    Since we already know the derivatives of these basic operations, it is relatively
    easy to derive the derivatives with respect to the variables in those nodes.


    Figure [7.9](#605748_1_En_7_Chapter.xhtml#Fig9) shows a simplified version of
    a computation graph for a fully connected layer. Here, each node in the graph
    performs a specific computation such as the dot product between two variables,
    addition, or grouped operations like an activation function `σ`. Note that node
    `z₁` represents the dot product between the input data `x` and each weight vector
    `w` for all units in this linear layer. Node `z₂` is similar, but adds the bias
    terms from all units to the results coming from `z₁`.


    Using the backpropagation algorithm not only simplifies the computation of gradients
    but also makes neural networks more flexible. If changes are made to the architecture
    of the neural network, the algorithm can be easily adjusted to accommodate those
    changes, without requiring a complete redo of the work.


    After we use the objective function to compute the loss with respect to the predicted
    outcome `y` from the neural network and true target `y*`, we can use the backpropagation
    algorithm to compute the gradients with respect to the parameters of the network,
    and then using these gradients to update the network’s parameters. The backpropagation
    algorithm works backward through the computation graph, computing the gradients
    (sometimes also called local gradients) with respect to the local parameters at
    each node and then propagating these gradients back to the node prior to the last
    node. It does this using the chain rule of calculus, which allows it to compute
    the gradients with respect to the local parameters and the upstream gradients
    coming from the previous node. This works not only for fully connected neural
    networks but any other type of neural network, including convolutional neural
    networks (CNNs) and recurrent neural networks (RNNs).


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig9_HTML.png)


    An illustration of 6 nodes `x`, dot product `z₁`, addition `z₂`, `σ`, `w` and
    `b`.


    **Fig. 7.9** A simplified example of a computation graph for a fully connected
    layer


    Let’s look at a very simple fully connected neural network with one hidden layer
    and one output layer. We use the sigmoid activation function for the hidden layer
    and no activation function for the output layer. We use the squared error loss
    as our objective function, which measures the difference between the predicted
    value and the true target value. Figure [7.10](#605748_1_En_7_Chapter.xhtml#Fig10)
    shows an example of how backpropagation computes gradients for each layer. After
    the forward pass through the neural network to compute the predicted value `y`,
    we use the true target `y*` to compute the loss. Then the backpropagation algorithm
    works backward, starting with the last node `l` in the graph, which is where the
    loss comes out. For each node, it uses the upstream gradients and the local gradients
    to compute the gradients for the specific computation node, until it reaches the
    first hidden layer. In practice, we are only interested in the gradients with
    respect to the weights `W` and bias `b` for these different layers.


    After we know the gradients with respect to the weights and bias for these different
    layers of a neural network, we can start to update the parameters using the stochastic
    gradient descent algorithm.


    As the number of layers in a neural network increases, it’s hard to keep track
    of the weights and bias for each layer. So we often use `θ` to represent all the
    parameters of the neural network, where `θ` is a vector that contains all the
    parameters (weights and biases) for a single neural network. To sum it up, in
    general, training a neural network consists of these major steps:


    - Feed input data `x` to the neural network parameterized by `θ` to get predicted
    value `y`.

    - Compute the loss using the objective function with respect to `y` from the preceding
    step and the true target `y*`.

    - Use backpropagation to compute gradients for `θ` with respect to the loss from
    the preceding step.'
