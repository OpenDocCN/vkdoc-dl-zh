- fmt: '### Adaptive KL Penalty


    The adaptive KL penalty is a variation of the Proximal Policy Optimization (PPO)
    algorithm that aims to prevent excessively large policy updates that could result
    in instability. In the standard clipped version of PPO, the probability ratio
    between the new and old policies is clipped within a certain range. This approach
    constrains the surrogate objective function and has the same effect as applying
    the KL divergence as a constraint.


    In contrast, the adaptive KL divergence penalty approach proposes adding the KL
    divergence as a penalty to the surrogate objective function instead of using it
    as a constraint. Furthermore, the adaptive KL divergence penalty adjusts the penalty
    based on the magnitude of the policy update.


    The surrogate objective function with the KL divergence as a penalty can be written
    as


    ![$$\displaystyle \begin{aligned} \mathop{\text{argmax}}_{\pi''}\mathcal{L}_{\pi}(\pi'')
    - \beta \bar{D}_{KL}(\pi''||\pi) \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ20.png)


    (11.19) where ![$$\beta $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq151.png)
    controls the level of penalty, and ![$$\bar {D}_{KL}(\pi ''||\pi )$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq152.png)
    is the estimated mean KL divergence between the new and old policies.


    Unlike the clipped version, the KL divergence is not used as a constraint on the
    surrogate objective function. Instead, it’s used as a penalty controlled by the
    parameter ![$$\beta $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq153.png).
    If the KL divergence is high, the penalty term will also be high. Here, ![$$\beta
    $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq154.png) is adjusted
    on every iteration during the learning session, making it an adaptive KL penalty.
    Additionally, a target KL divergence ![$$\delta $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq155.png)
    can be used to adjust ![$$\beta $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq156.png).


    To estimate the mean KL divergence between the new policy and the old policy,
    an approximation is used. This approximation is necessary because computing the
    exact KL divergence is often infeasible due to the large state space of some environments.
    The target KL divergence ![$$\delta $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq157.png)
    can be used to adjust the ![$$\beta $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq158.png)
    parameter, making it an adaptive KL penalty.


    Algorithm 2 shows the pseudocode for the PPO algorithm with the adaptive KL divergence
    penalty:


    **Algorithm 2:** Proximal Policy Optimization algorithms with adaptive KL penalty


    ![](images/605748_1_En_11_Chapter/605748_1_En_11_Figaab_HTML.gif) A box lists
    the algorithm 2 proximal policy optimization algorithms with adaptive K L penalty.
    The input includes discount rate `gamma`, learning rate `alpha`, and `beta`, sequence
    length, divergence `delta`, number of update epochs `M`, number of environment
    steps `K`. Output is approximated optimized policy `Pi` subscript `theta`.


    While both versions of PPO can work well, the clipped surrogate objective function
    is generally preferred in practice due to its simplicity and stability.


    Simplicity refers to the fact that the clipped surrogate objective function is
    easier to implement and tune compared to the KL penalty version. The KL penalty
    version requires tuning an additional hyperparameter for the penalty term, which
    can be time-consuming and difficult to optimize.


    Improved stability refers to the fact that the clipped surrogate objective function
    is less prone to instability or divergence during training compared to the KL
    penalty version. The KL penalty version is more sensitive to the choice of the
    penalty coefficient and can lead to unstable training when the coefficient is
    set incorrectly. The clipped surrogate objective function directly limits the
    size of the policy update, preventing large changes that could destabilize the
    training process.


    In summary, while both versions of PPO’s surrogate objective function can be effective,
    the clipped surrogate objective function is generally preferred in practice due
    to its simplicity and stability.


    Figure [11.2](#605748_1_En_11_Chapter.xhtml#Fig2) shows the performance between
    the PPO agent with clipped surrogate objective function and the Actor-Critic agent
    on the Atari video game Pong. Performance is measured in terms of the average
    reward obtained. To evaluate the agent’s performance, we ran 200,000 evaluation
    steps on a separate testing environment with a greedy policy at the end of each
    training iteration, which consisted of 250,000 training steps or 1 million frames,
    where no reward clipping or soft termination on loss of life is applied to the
    evaluation environment. The results were averaged over three independent runs
    and smoothed using a moving average with a window size of five.


    ![](images/605748_1_En_11_Chapter/605748_1_En_11_Fig2_HTML.png)


    A line graph plots episode return versus training environment frames curves for
