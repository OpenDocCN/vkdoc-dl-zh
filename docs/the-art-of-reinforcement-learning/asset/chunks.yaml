  trans: '

    ## 9.1 基于策略的方法


    到目前为止，本书仅介绍了基于价值的强化学习算法。这些算法旨在通过蒙特卡洛方法或时序差分学习方法，学习最优策略 `π*` 的最优状态-动作价值函数 `Q*`。然后，我们可以基于学习到的最优状态-动作价值函数构建一个确定性或贪婪策略。然而，最终目标是学习最优策略
    `π*`，这正是智能体在与环境交互时做出决策所需要的。智能体能否在不先学习价值函数的情况下，直接学习最优策略呢？


    答案是肯定的。基于策略的方法允许我们学习一个参数化的策略，该策略由一组通过训练优化的参数表示，而非显式定义。在本节中，我们将探讨如何使用策略梯度方法来学习这样的策略。


    在深入探讨策略近似和策略梯度方法之前，我们先来看看直接学习参数化策略，而非从学习到的价值函数中推导策略的一些优势：


    - **更好的收敛性**：对于某些问题，基于价值的强化学习方法在训练过程中可能会发生振荡，而基于策略的方法通常具有更平滑的学习曲线，从而带来更好的收敛特性。


    - **随机策略**：学习到的策略可以是随机的，这意味着它可以输出一个关于可用动作的概率分布。这与基于价值的方法不同，后者通常会产生一个总是选择最高价值动作的确定性策略。虽然可以通过使用
    `ε`-贪婪策略等方法为确定性策略增加随机性，但这与学习一个具有动作比例分布的随机策略并不相同。学习到的随机策略在最优策略涉及以不同概率采取不同动作的情况下尤其有用，例如当智能体面对随机或部分可观测的环境时。


    - **探索**：无需显式使用 `ε`-贪婪策略进行探索，因为随机策略的本质已经实现了这一点。学习到的随机策略可以引导智能体采取一系列动作，包括次优动作，并帮助智能体发现最优策略。


    - **高效处理大型动作空间**：基于策略的方法更适合处理具有大型动作空间的问题，甚至是连续动作空间。基于价值的方法需要找到价值最高的动作，而在大量动作上计算这个最大值操作可能计算成本高昂。当动作空间无限时（例如连续动作空间的问题），这尤其麻烦。


    在强化学习中，基于策略的方法相比基于价值的方法具有若干优势，例如能够学习一个为动作分配概率而非总是选择最高价值动作的随机策略。这在最优策略可能涉及以不同概率采取不同动作的情况下特别有用，例如当动作结果存在不确定性或最优策略随时间变化时。在存在多个最优策略或智能体需要考虑其他智能体行为的问题中，随机策略也很有价值。


    例如，在存在隐藏信息或虚张声势的游戏中，如扑克或其他纸牌游戏，随机策略特别有用，因为智能体无法看到对手的牌。在这种情况下，最优策略可能涉及为不同动作分配不同概率，而不是始终遵循确定性策略。同样，在围棋等游戏中，最优策略可能取决于对手的策略或意图，而这些可能是不确定或随时间变化的，此时随机策略就具有优势。


    此外，基于策略的方法更适合连续动作空间，因为它们可以学习输出一个关于动作空间的概率分布，而不是试图找到单个最高价值的动作。这在具有大型或无限动作空间的问题中更容易处理，因为智能体可以根据策略输出的概率分布来探索和选择动作。另一方面，基于价值的方法可能难以找到无限动作空间的最大值，或者难以高效地探索大型动作空间。此外，基于价值的方法通常依赖于对动作空间进行离散化，这可能导致信息丢失并降低算法的有效性。基于策略的方法可以通过直接参数化策略来避免这个问题，从而能够考虑智能体可用的全部动作范围。


    然而，值得注意的是，基于策略的方法也有一些缺点。例如，它们可能比基于价值的方法计算成本更高，并且可能在处理高维状态空间时遇到困难。此外，基于策略的方法可能更难训练，并且可能需要更多数据才能收敛到最优策略。


    总之，基于策略的方法相比基于价值的方法具有若干优势，包括能够学习随机策略，这在存在多个最优策略、随机或部分可观测环境、或连续或大型动作空间的问题中特别有用。尽管如此，基于策略和基于价值的方法各有优缺点，选择哪种方法将取决于具体问题。'
- fmt: '### Policy Approximation


    In reinforcement learning, a policy is a function that maps a state to a probability
    distribution over the entire action space. Like value function approximation,
    we can use parameterized functions to approximate policies. By doing so, we can
    learn a policy that performs well in a given environment, without needing to explicitly
    learn the optimal value functions first.


    To represent a policy using a parameterized function, we can use linear or nonlinear
    functions with parameters `θ`. However, since the output of the policy must be
    a probability distribution, we need to ensure that it satisfies the properties
    of a probability distribution, that is, non-negativity.


    One common solution to ensure that the output of the policy is a valid probability
    distribution is to use the softmax function. For reinforcement learning problems
    with discrete action spaces, the softmax function can be used to obtain a probability
    distribution over the valid actions. The softmax function is defined as follows:


    ```

    π(a|s; θ) = exp(φ(s,a)ᵀθ) / Σ_{a'' ∈ A} exp(φ(s,a'')ᵀθ)   (9.1)

    ```


    Here, `φ(s,a)` is a feature vector or function that maps states and actions to
    real-valued features. The softmax function takes the preference of each action
    in the current state, `φ(s,a)ᵀθ`, and exponentiates it to obtain a positive value.
    The resulting values are then normalized by the sum of the exponentiated preference
    values for all valid actions, ensuring that the output of the softmax function
    is a probability distribution that is non-negative.


    For example, consider a robot trying to navigate through a maze. The robot’s current
    state is its current location in the maze, and its possible actions are moving
    up, down, left, or right. The robot’s policy is a function that maps its current
    location to a probability distribution over these four actions. By using the softmax
    function with a parameterized feature function `φ(s,a)`, we can learn a policy
    that allows the robot to navigate the maze efficiently.


    For reinforcement learning problems with continuous action spaces, the Gaussian
    function can be used to obtain a probability distribution over the action space.
    The Gaussian function is defined as follows:


    ```

    π(a|s; θ) = (1 / (√(2π)σ(s))) * exp(-(a - μ(s,θ))² / (2σ²(s)))   (9.2)

    ```


    Here, `μ(s,θ)` is the mean of the Gaussian distribution, `σ(s)` is the standard
    deviation, and `a` is some action. The Gaussian function takes the mean and standard
    deviation of the distribution as input and produces a probability density function
    (PDF) over the action space. To obtain a probability distribution, we can integrate
    the PDF over the valid action space to obtain a total probability of 1.


    For example, consider a drone trying to fly to a specific location in a 3D space.
    The drone’s current state is its current position and velocity, and its possible
    actions are changing its velocity in three dimensions. The drone’s policy is a
    function that maps its current state to a probability distribution over these
    continuous actions. By using the Gaussian function with a parameterized mean function
    `μ(s,θ)` and standard deviation function `σ(s)`, we can learn a policy that allows
    the drone to navigate through the 3D space smoothly and reach its destination
    efficiently.


    Similarly, we can also use neural networks to approximate a policy. As shown in
    Fig. 9.1, the network takes in the environment state and outputs an action probability
    distribution for all valid actions.


    In summary, policy approximation is an important technique in reinforcement learning
    that allows us to learn a policy that performs well in a given environment, without
    needing to explicitly learn the optimal value function. By using parameterized
    functions to represent policies, we can use the softmax or Gaussian functions
    to ensure that the output of the policy is a valid probability distribution. These
    functions are particularly useful in problems with discrete or continuous action
    spaces, respectively, and can be applied to a wide range of real-world problems,
    from maze navigation to drone flight.'
