- fmt: '# 14.5 Training AlphaZero on a 13×13 Gomoku Board


    For readers who find Go too complex, either because they struggle with understanding
    its rules (which are indeed quite complex) or lack the computational resources
    to experiment with it, there is an alternative: training AlphaZero on simpler
    games like Gomoku. Gomoku, also known as Five in a Row, is a straightforward board
    game that shares some similarities with Go. In Gomoku, players take turns placing
    their stones on a 15×15 board, without strict restrictions on stone placement
    like in Go. The objective is simple: the first player to get five stones of the
    same color in a row, horizontally, vertically, or diagonally, wins the game. If
    the board is filled with stones and no player achieves a five-stone row, the game
    is a draw. Unlike Go, Gomoku does not involve pass or resign moves. The combination
    of similarities to Go and simpler rules makes Gomoku an ideal problem for testing
    and validating the AlphaZero agent. To put it simply, in the context of reinforcement
    learning, if Go were equivalent to Atari games, then Gomoku would be akin to the
    cart pole problem.


    Gomoku can also be played on smaller boards, such as 9×9 and 13×13. However, on
    smaller boards, like 9×9, the game often ends in a draw if both players consistently
    make optimal moves. This is not the case on larger boards, where the first player
    (black) has an advantage and can always win if they make the best moves throughout
    the game. Therefore, it is not surprising to see games on larger boards typically
    concluding in around 20–30 moves when the black player is highly skilled, unless
    the game is played with additional specific rules. For instance, some variations
    of the game state that having more than five connected stones does not result
    in an automatic win, and certain positions may be restricted during the opening
    moves.


    There’s an interesting fact about Gomoku: the standard AlphaZero agent performs
    quite well in normal cases. However, there is a particular scenario where the
    opponent attempts to win by connecting five stones at the edge of the board, especially
    during opening moves. Surprisingly, we have discovered that the agent fails to
    block the opponent in such cases, despite its overall strong gameplay, as shown
    in Fig. 14.15. This shortsighted behavior can be attributed to the agent’s lack
    of exposure to such games during training. After all, it is highly unlikely for
    the self-play agents to engage in these specific moves.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig15_HTML.png)


    Two representations of the Gomoku strategic board game on a 13 by 13 grid.


    **Fig. 14.15** Example of an edge case problem for a standard AlphaZero agent
    on a 13×13 Gomoku board, where the opponent (black) is trying to quickly win the
    game by connecting five stones on the edge of the board. In such cases, the agent
    (white) often fails to block the opponent. This issue persists even when the agent
    is trained for extended periods and exposed to a greater number of self-play games
    during training.


    To address this issue, we have opted for a slightly modified neural network architecture
    tailored to the unique nature of the Gomoku game, as mentioned earlier. In our
    experiments, we have found that employing a padding of three, rather than the
    usual one, for the initial convolutional block effectively resolves this edge
    problem in Gomoku.


    In our experiment, we trained an AlphaZero agent to play freestyle Gomoku on a
    13×13 board. Freestyle Gomoku means no additional strict rules; a string of same
    colored stones equal to or greater than five is considered a win.


    We followed a similar configuration as outlined in the previous section, where
    we discussed training the AlphaZero agent on a 9×9 Go board. However, we made
    the following changes:


    - Our neural network consists of 14 blocks, including 1 initial convolutional
    block and 13 residual blocks. We used 40 convolutional filters for all convolutional
    layers and 80 hidden units for the value head.

    - To address edge case problems in Gomoku, we used a padding of three instead
    of one for the initial convolutional block in the neural network.

    - Due to the larger action space on a 13×13 board, we increased the number of
    simulations per Monte Carlo Tree Search (MCTS) to 400 for both self-play and evaluation
    games.

    - We trained the neural network using only the most recent 150,000 self-play games,
    with a batch size of 256. And the first checkpoint was created after 5000 self-play
    games.

    - Since Gomoku does not have a resign move, we did not include a resignation mechanism
    in the self-play games.

    - Instead of using human play games to evaluate the neural network’s prediction
    accuracy, we relied solely on Elo ratings computed from evaluation games between
    the latest model and the model from the previous checkpoint. This decision was
    made due to the limited availability of quality Gomoku game records.


    Apart from the mentioned changes, the settings remained the same. The training
    was performed on a single server with 128 CPUs and 8 GPUs. We collected 5000 games
    per checkpoint and generated a checkpoint every 1000 training steps. The training
    process involved one million self-play games and took 16 hours to complete 200,000
    training steps.


    Figure 14.16 shows the training losses of the neural network. As training progresses,
    it becomes evident that both the policy and value losses exhibit a consistent
    decrease. This behavior closely resembles that observed during training on a 9×9
    Go board.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig16_HTML.png)


    Two graphs of cross-entropy loss and MSE loss versus training steps, respectively.
    The plotted trends descend with fluctuations from (0, 5.1) to (220, 2.7) and (0,
    1) to (220, 1), respectively. Values are estimated.


    **Fig. 14.16** The policy cross-entropy loss (left) and value MSE loss (right)
    during training of the AlphaZero agent on a 13×13 Gomoku board.'
