    approximately 28,000 training steps, the agent exhibits the ability to block the
    opponent’s moves in simple scenarios. Around 68,000 training steps, a notable
    breakthrough occurs as the agent discovers an effective strategy of winning the
    game by connecting stones diagonally. Furthermore, it swiftly learns to counter
    the opponent’s attempts at achieving a diagonal victory. The agent’s prowess continues
    to improve, evident around the 148,000 training step mark, where it consistently
    displays strong play. In fact, the agent becomes virtually unbeatable, demonstrating
    optimal moves that render white’s best efforts futile. Even with further training,
    the agent consistently exhibits this exceptional behavior.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig18_HTML.png)


    Six illustrations of the Gomoku strategic board game on a 13 by 13 grid at different
    stages.


    Fig. 14.18


    Evaluation games to show the different stages of the agent during training on
    a ![$$13 \times 13$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq200.png)
    Gomoku board, where we use the latest model (black) to play against the model
    (white) from the last checkpoint. This provides evidence of the agent’s acquisition
    of diverse winning strategies over the course of the training sessions. Ultimately,
    the agent reaches a strong level of play, demonstrated by its ability to make
    moves that render white incapable of winning, despite white’s best efforts to
    block the opponent’s progress'
