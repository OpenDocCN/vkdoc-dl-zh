- fmt: '# 使用线性函数逼近的 SARSA 算法


    到目前为止，将 TD 学习算法适配为使用线性函数 `\hat{Q}` 来逼近真实的状态-动作值函数 `Q_\pi` 是相当容易的。算法 6 展示了基于这种线性方法的
    SARSA 算法。


    **算法 6：使用 *ε*-贪心策略进行探索的 SARSA 线性 VFA**


    ```

    （此处为算法流程图，内容为：一种使用 ε-贪心策略进行探索的 SARSA 线性 VFA 算法）

    ```


    最后但同样重要的是，我们将介绍如何使用线性函数 `\hat{Q}` 来逼近 Q-learning 的真实最优状态-动作值函数 `Q_*`。回顾一下，Q-learning
    直接学习最优状态-动作值函数；它通过使用即时奖励和最佳后继状态-动作对的折扣值作为 TD 目标来实现这一点：


    ```

    TD_target = R_t + γ * max_{a''} Q(S_{t+1}, a'')

    ```


    (6.18)


    然后，当使用线性值函数逼近进行 Q-learning 时，我们可以调整权重更新规则：


    ```

    w = w + α * ( R_t + γ * max_{a''} x(S_{t+1}, a'')^T * w - x(S_t, A_t)^T * w )
    * x(S_t, A_t)

    ```


    (6.19)


    接着，我们正式介绍 Q-learning 算法，该算法使用线性函数 `\hat{Q}` 来逼近真实的最优状态-动作值函数 `Q_*`，并基于 `ε`-贪心策略进行探索，如算法
    7 所示。


    **算法 7：使用 *ε*-贪心策略进行探索的 Q-learning 线性 VFA**


    ```

    （此处为算法流程图，内容为：一种使用 ε-贪心策略进行探索的 Q-learning 线性 VFA 算法）

    ```


    # N 步自举法


    将我们在第 [5](#605748_1_En_5_Chapter.xhtml) 章介绍的 N 步自举法与值函数逼近相结合也是可行的。整体结构保持不变；我们只需要更改权重更新规则。以下展示了
    N 步 Q-learning 权重更新规则（不使用重要性采样）的一个示例，其中 `N=3`：


    ```

    w = w + α * ( R_t + γ * R_{t+1} + γ^2 * R_{t+2} + γ^3 * max_{a''} x(S_{t+3}, a'')^T
    * w - x(S_t, A_t)^T * w ) * x(S_t, A_t)

    ```


    (6.20)


    # 评估学习进度


    对于像 cart pole 这样的大规模 MDP，由于状态空间太大，无法测量所有状态的最优状态值。我们如何评估智能体的学习进度或性能？对于情节式问题，一种简单的方法是测量智能体与环境交互以生成样本转换时，一个情节的总奖励（通常不打折）。在实践中，我们经常使用一个独立的模拟环境来运行评估过程，通常使用不同的探索率
    `ε` 和随机种子。另一种可以用来衡量学习进度的方法是目标函数 `J(w)` 或损失函数；这适用于情节式和持续性问题。


    然而，重要的是不要仅仅依赖训练损失作为衡量 RL 智能体性能的指标。与训练样本固定的监督学习设置不同，RL 智能体通过与环境的交互生成自己的训练样本。因此，智能体的行为可能与训练损失所指示的显著不同。例如，损失函数可能在某个水平上发散，但
    RL 智能体在其整体任务上可能仍然表现良好。因此，有必要考虑其他评估指标，如总奖励、成功率或特定的领域特定指标，以全面了解智能体的性能。


    # 实验结果


    ```

    （此处为多线图，内容为：训练情节回报 vs 训练环境步数。使用线性 VFA 的蒙特卡洛和 Q-learning 是从原点上升的曲线。最大值是一条水平线。）

    ```


    **图 6.8** 在 cart pole 任务上，使用线性值函数逼近的每次访问蒙特卡洛控制智能体和 Q-learning 智能体的平均情节回报及 95%
    置信区间。结果在五次独立运行中取平均值，然后使用窗口大小为 5 的移动平均进行平滑处理。我们使用 tile coding 来构建特征向量 `x`（8 个 tilings，每个
    tiling 16 个 tiles），折扣率 `γ = 0.99`，学习率 `α = 0.0025`，初始探索率 `ε = 1.0`，并在 100,000
    个环境步数内衰减至 0.05。


    为了解决 cart pole 强化学习问题，我们使用由 Sutton 和 Barto [[1](#605748_1_En_6_Chapter.xhtml#CR1)]^([⁶](#fn6))
    开发的开源 tile coding 库来构建特征向量 `x`。在实验中，我们对每次访问蒙特卡洛和 Q-learning 都使用线性值函数逼近。图 [6.8](#605748_1_En_6_Chapter.xhtml#Fig8)
    中显示的结果在五次独立运行中取平均值。我们在此实验中使用相同的学习率、折扣率和探索率。该图已使用窗口大小为 5 的移动平均进行平滑处理。我们可以看到，在此特定任务上，蒙特卡洛智能体往往比
    Q-learning 智能体具有更高的方差。


    我们使用来自 OpenAI Gym [[2](#605748_1_En_6_Chapter.xhtml#CR2)] 的预构建 cart pole 环境进行此实验。^([⁷](#fn7))'
  raw: 'To this point, it’s fairly easy to adapt TD learning algorithms to use linear
    function ![$$\hat {Q}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq205.png)
    to approximate the true state-action value function ![$$Q_\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq206.png)
    . Algorithm 6 shows the SARSA algorithm based on such linear methods.


    Algorithm 6: SARSA linear-VFA with *𝜖*-greedy policy for Exploration


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Figaaf_HTML.gif) An algorithm of
    S A R S A linear V F A with is an element of greedy policy for exploration.


    Last but not least, we’ll cover how to use linear function ![$$\hat {Q}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq207.png)
    to approximate the true optimal state-action value function ![$$Q_*$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq208.png)
    for Q-learning. Recall that Q-learning learns the optimal state-action value function
    directly; it does this by using the immediate reward and discounted value of the
    best successor state-action pair as the TD target:


    ![$$\displaystyle \begin{aligned} TD_{target} = R_t + {\gamma} \max_{a''}Q(S_{t+1},
    a'') {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ18.png)


    (6.18)


    We can then adapt the weights update rule when using linear value function approximation
    for Q-learning:


    ![$$\displaystyle \begin{aligned} \boldsymbol{w} = \boldsymbol{w} + \alpha \Big(
    R_t + {\gamma} \max_{a''} \boldsymbol{x}(S_{t+1}, a'')^T \boldsymbol{w} - \boldsymbol{x}(S_t,
    A_t)^T \boldsymbol{w} \Big) \boldsymbol{x}(S_t, A_t) {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ19.png)


    (6.19)


    We then formally introduce the Q-learning algorithm which uses linear function
    ![$$\hat {Q}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq209.png)
    to approximate the true optimal state-action value function ![$$Q_*$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq210.png)
    , based on ![$$\epsilon $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq211.png)
    -greedy policy for exploration, as shown in Algorithm 7.


    Algorithm 7: Q-learning linear-VFA with *𝜖*-greedy policy for Exploration


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Figaag_HTML.gif) An algorithm of
    Q learning linear V F A with is an element of greedy policy for exploration.


    It’s also possible to adapt the N-step bootstrapping method which we introduced
    in Chap. [5](#605748_1_En_5_Chapter.xhtml) together with value function approximation.
    The overall structure stays the same; we only need to change the weights update
    rule. The following shows an example for the N-step Q-learning weights update
    rule (without using importance sampling), where N=3:


    ![$$\displaystyle \begin{aligned} \boldsymbol{w} = {} &amp; \boldsymbol{w} + \alpha
    \Big( R_t + {\gamma} R_{t+1} + {\gamma}^{2} R_{t+2} \\ &amp; + {\gamma}^{3} \max_{a''}
    \boldsymbol{x}(S_{t+3}, a'')^T \boldsymbol{w} - \boldsymbol{x}(S_t, A_t)^T \boldsymbol{w}
    \Big) \boldsymbol{x}(S_t, A_t) {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ20.png)


    (6.20)


    For large-scale MDPs like the cart pole, it’s impossible to measure the optimal
    state values for all the states since the state space is too large. How can we
    assess the learning progress or performance of the agent? One simple method for
    the episodic problems is to measure the total rewards (often nondiscounted) of
    an episode when the agent is interacting with the environment to generate the
    sample transitions. In practice, we often use a separate simulation environment
    to run the evaluation process, often with different exploration rate ![$$\epsilon
    $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq212.png) and seed.
    Another method we can use to measure the learning progress is the objective function
    ![$$J(\boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq213.png)
    or loss function; this is suitable for both episodic and continuing problems.


    However, it is important not to rely solely on the training loss as a metric for
    measuring the performance of an RL agent. Unlike supervised learning settings
    where the training samples are fixed, RL agents generate their own training samples
    through interactions with the environment. As a result, the behavior of the agent
    may differ significantly from what is indicated by the training loss. For example,
    the loss function may diverge at a certain level, but the RL agent could still
    be performing well in terms of its overall task. Therefore, it is necessary to
    consider other evaluation metrics such as total rewards, success rate, or specific
    domain-specific metrics to get a comprehensive understanding of the agent’s performance.


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig8_HTML.png)


    A multi-line graph plots training episode return versus training environment steps.
    Monte Carlo with linear V F A and Q learning with linear V F A is a rising curve
    from the origin. Maximum is a horizontal line.


    Fig. 6.8


    Mean episode returns and 95% confidence interval for the every-visit Monte Carlo
    control agent and Q-learning agent with linear value function approximation on
    the cart pole task. The results were averaged over five independent runs and then
    smoothed using a moving average with a window size of five. We use tile coding
    to construct the feature vector ![$$ \boldsymbol {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq214.png)
    (8 tilings and 16 tiles for each tiling), discount rate ![$${\gamma }= 0.99$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq215.png)
    , learning rate ![$$\alpha = 0.0025$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq216.png)
    , and initial exploration rate ![$$\epsilon = 1.0$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq217.png)
    and decay to 0.05 over 100,000 environment steps


    To solve the cart pole reinforcement learning problem, we use an open source tile
    coding library developed by Sutton and Barto [[1](#605748_1_En_6_Chapter.xhtml#CR1)]^([⁶](#fn6))
    to construct the feature vector ![$$\boldsymbol {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq218.png)
    . We use linear value function approximation for both every-visit Monte Carlo
    and Q-learning in the experiment. The results shown in Fig. [6.8](#605748_1_En_6_Chapter.xhtml#Fig8)
    were averaged over five independent runs. We use the same learning rate, discount,
    and exploration rate for this experiment. The plot has been smoothed using a moving
    average with a window size of five. We can see that the Monte Carlo agent tends
    to have high variances compared to the Q-learning agent on this particular task.


    We use a prebuilt cart pole environment from the OpenAI Gym [[2](#605748_1_En_6_Chapter.xhtml#CR2)]
    for this experiment.^([⁷](#fn7))'
