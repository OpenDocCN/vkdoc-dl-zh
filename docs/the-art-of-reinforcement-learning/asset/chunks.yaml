- fmt: '# 6. Linear Value Function Approximation


    Part I of this book focuses on using tabular methods to represent the value functions
    of Markov decision processes (MDPs). However, this approach is limited to small-scale
    MDPs. In many real-world problems, the state space is too large for a table-based
    approach to be practical. There are two main reasons for this: first, the sheer
    number of states may require a large amount of memory to store the values; second,
    the learned value functions may not generalize well to new states.


    To overcome these constraints, Part II of this book shifts its focus toward employing
    value function approximation (VFA) to estimate the value functions for an MDP.
    VFA uses a function to estimate the value of a state or state-action pair, rather
    than storing the value directly in a table. In this chapter, we will focus on
    the concept of VFA, with emphasis on linear VFA—a popular method that employs
    a linear combination of features to approximate the value functions. We will explore
    how to apply linear VFA to estimate the value functions for an MDP.


    ## 6.1 The Challenge of Large-Scale MDPs


    Using tables to represent value functions can be very effective for small-scale
    MDPs, where the state space is relatively small and can be fully enumerated. However,
    there are several challenges and limitations when using tables to represent value
    functions in larger and more complex MDPs:


    - **Memory requirements**: As the number of states in an MDP increases, the size
    of the value function table grows exponentially, making it impractical to store
    the values in memory.

    - **Generalization**: Even if we have a small number of states, it’s often difficult
    to visit every state-action pair during the learning process. This means that
    we may not have an accurate estimate of the value function for every state-action
    pair, making generalization to new, unseen states challenging.

    - **Curse of dimensionality**: As the number of state variables (or dimensions)
    increases, the size of the state space grows exponentially, making it difficult
    to explore and learn an accurate value function in a reasonable amount of time.

    - **Discretization**: In some cases, continuous state variables may need to be
    discretized into a finite number of bins in order to represent them in a table.
    However, this can lead to a loss of information and can make it difficult to learn
    an accurate value function.


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig1_HTML.png)


    A schematic of the cart pole with a pole at the top of the cart.


    **Fig. 6.1** Cart pole; the problem was introduced in the *Reinforcement Learning:
    An Introduction* book by Richard S. Sutton and Andrew G. Barto


    Value function approximation techniques, such as linear function approximation
    and neural networks, can help overcome these challenges by allowing us to estimate
    the value function using a smaller number of parameters while also providing better
    generalization to new states.


    To better understand these challenges, let’s look at a classic control task called
    the cart pole task, which was introduced by Richard S. Sutton and Andrew G. Barto.


    ### The Cart Pole Task


    The goal of the cart pole task [[1](#605748_1_En_6_Chapter.xhtml#CR1)] is to keep
    the pole hinged to the cart from falling over by applying forces to the cart as
    shown in Fig. [6.1](#605748_1_En_6_Chapter.xhtml#Fig1). The task is considered
    failed if the pole falls to a certain vertical angle or the cart runs off the
    track, and the pole is reset to the vertical position if the task is failed. The
    agent can choose to apply forces to the cart to push it to the left or right.
    The reward signal is `+1` for every step when the pole does not fall.


    What makes this task different from the examples we’ve covered so far is the size
    of its state space. The state of the cart pole task is four-dimensional and contains
    the numerical values for the position and velocity of the cart, as well as the
    angle and angular velocity of the pole. All of these dimensions are continuous
    numerical values, and although some have limits like minimum and maximum values,
    such as the position being in the range of `[-4.8, 4.8]` and the pole angle being
    in the range of `[-0.418, 0.418]` (in radians), the specific values of the state
    can be anything in between.


    The large state space of the cart pole task presents a significant challenge for
    reinforcement learning. Because the state space is continuous, the traditional
    tabular methods for representing value functions are not applicable. Additionally,
    the agent is unlikely to encounter every possible state during training, which
    makes it difficult to learn an accurate value function for the task.


    In our previous examples, we often used discrete numbers like `0, 1, 2, ...` to
    represent different states, which allowed us to use a single vector to store the
    values for these different states. However, in cases where the possible combinations
    of states are very large, this tabular method is not applicable. For example,
    in the cart pole example, the state is defined by four continuous values: the
    position and velocity of the cart and the angle and angular velocity of the pole.
    This makes the state space infinite and continuous, which cannot be represented
    by a single vector.


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig2_HTML.png)


    A graph used for tile coding plots pole angle versus cart velocity. The cart velocity
    ranges from negative 10 to 10, and the pole angle ranges from negative 0.3 to
    0.3.


    **Fig. 6.2** Example of tiling the cart velocity and the pole angle


    One solution to this problem is to try to make the infinite state finite. For
    example, if we only look at the cart velocity, we can bin the values into corresponding
    subsets, which will make the cart velocity dimension discrete. Similarly, we can
    also extend this method by considering the pole angle, where the bins become tiles.
    This approach is often called tile coding and works well for small problems. There
    are open source libraries available that can do this work for us (Fig. [6.2](#605748_1_En_6_Chapter.xhtml#Fig2)).


    However, one major downside of this method is that we have to manually choose
    the number of bins or tiles to use. For example, if we only use two bins for the
    cart position, it won’t be very useful since the ranges are too wide. On the other
    hand, if we use too many bins, we might run into the issue of overfitting. Selecting
    the optimal number of bins requires a lot of human knowledge about the problem
    at hand.


    The other major issue with this method is that it does not scale well for cases
    where the state of the environment has a very large dimension, such as image-based
    environments like the Atari video games. In these cases, the state space can contain
    large number of dimensions, which makes the use of tile coding infeasible. In
    such cases, other methods like neural networks are often used to address the scalability
    issue, which we will introduce in the next chapter.'
