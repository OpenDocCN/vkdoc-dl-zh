    diagram, open circles represent states, and black dots represent actions. At the
    root is a state node *s*, and in state *s*, there may be multiple actions that
    the agent can choose from (we only show two actions). The exact action *a* that
    is chosen will depend on the policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq215.png)
    that the agent is following. From each action *a*, the environment could transition
    into one of several successor states ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq216.png)
    (we show two such successor states), with a transition probability *p* that depends
    on ![$$(s, a)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq217.png)
    . The Bellman equation takes the expectation (as indicated by the little arc under
    the root state node *s* and action node *a*) over all possible outcomes, weighted
    by the probability of their occurrence. The term ![$$\sum _{a \in A} \pi (a|s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq218.png)
    represents the expectation over all actions for state *s*, weighted by the probability
    of each action being selected according to the policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq219.png)
    . The term ![$$\sum _{s'' \in \mathcal {S}} P(s''|s, a)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq220.png)
    represents the expectation over all possible successor states ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq221.png)
    , weighted by the state transition probability from the environment.


    We can also draw a backup diagram for Eq. ([2.16](#605748_1_En_2_Chapter.xhtml#Equ16)).
    The idea of taking an expectation over all possible outcomes, which we explained
    when introducing the Bellman equation for ![$$V_\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq222.png)
    , also applies here. As we can see from Fig. [2.10](#605748_1_En_2_Chapter.xhtml#Fig10),
    we start from the first action node, which represents the action *a* taken by
    the agent. When the agent takes action *a* in state *s* (not necessarily following
    policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq223.png)
    when taking the action), the environment could transition into one of several
    successor states ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq224.png)
    (we show two such successor states), with a transition probability *p* that depends
    on ![$$(s, a)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq225.png)
    . In each of the successor states ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq226.png)
    , there may be multiple actions that the agent can choose from (we only show two
    actions). The exact action ![$$a''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq227.png)
    chosen will depend on the policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq228.png)
    that the agent is following. The Bellman equation takes the expectation (as indicated
    by the little arc under the successor state ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq229.png)
    ) over all possible outcomes, weighted by the probability of their occurrence.


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig10_HTML.png)


    A backup diagram for Q pi with two levels. The root node has action a, r with
    average that splits into 2 states with arc angle p. The two states have arc angles
    pi and have 2 actions each. Action a, r leads to state s prime, which in turn
    leads to action a prime.


    Fig. 2.10


    Backup diagram for ![$$Q_\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq230.png)'
