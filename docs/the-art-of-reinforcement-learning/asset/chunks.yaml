  trans: '

    ### 评估智能体


    要在训练期间或训练后评估 AlphaZero 智能体的性能，主要有两种选择。


    第一种选择是让 AlphaZero 智能体与各种对手对弈，例如（职业）人类棋手或其他 AI 智能体，包括使用先前训练迭代中获得的神经网络权重的自身。我们将在这些评估对局中使用标准的
    **Elo 等级分**来评定智能体的表现。AlphaZero 智能体使用 MCTS 搜索来为每个局面寻找最佳着法；这有时被称为在线规划，因为智能体在对弈过程中会主动使用模型来搜索最佳着法。整个过程类似于应用
    MCTS 生成自我对弈棋局，但不同之处在于，它不使用狄利克雷噪声进行探索，并且始终在每个局面中选择最佳着法——即 MCTS 搜索树根节点访问次数最多的子节点；此外，我们通常可能会让
    MCTS 搜索运行更多的模拟次数。然而，至关重要的一点是，如果我们在训练期间评估智能体的性能，必须确保这些评估对局不属于训练数据的一部分。


    第二种选择是使用训练好的神经网络来预测历史（职业）人类对局中的着法和比赛结果。这涉及使用（职业）人类棋手的历史对局来构建一个评估数据集。然后，使用 AlphaZero
    智能体的神经网络来预测着法和实际比赛结果。


    在实践中，这两种方法会结合起来评估智能体，尤其是在训练期间，正如原始 AlphaZero 智能体所做的那样。这种双重评估机制能让我们对智能体的实际实力更有信心。这是因为，如果我们仅仅通过让智能体与某个对手（例如，某个在线玩家或之前的模型）对弈来评估它，很难断定对手的真实实力。这会成为一个问题，因为
    Elo 等级分系统假设我们对两位棋手的等级分都有良好的估计，才能得出准确的等级分。例如，如果智能体与某个比它弱的业余玩家下了 100 局并全部获胜，那么它可能会获得一个非常高的等级分；这可能会给我们一种错误的印象，认为智能体表现相当出色，而事实并非如此。


    另一方面，如果我们使用历史人类对局来评估智能体的表现，历史（职业）人类对局的质量也会影响评估结果。例如，如果我们只有业余人类玩家下的对局，那么预测准确率可能会非常高；这也可能给我们一种错误的印象，认为智能体已经达到了很强的水平。另一方面，如果（职业）人类对局是由高段位职业棋手下的，那么智能体可能无法准确预测人类棋手的着法和比赛结果，尤其是在训练初期。这可能会让我们对智能体的表现产生怀疑。重要的是，我们要使用来自不同水平和棋手的多样化对局来构建评估数据集，这样才能更准确地估计智能体的性能。


    ## 14.4 在 `9 x 9` 围棋棋盘上训练 AlphaZero


    需要认识到，训练 AlphaZero 智能体是一项耗时的工作，即使在强大的 GPU 上，在 `19 x 19` 的围棋棋盘上也需要数周甚至数月的时间。DeepMind
    的原始论文提到，他们使用数千台服务器和 TPU 来训练 AlphaZero 智能体。尽管拥有如此巨大的计算资源，训练 20 个残差块的 AlphaZero
    版本仍然需要 72 小时，而 40 个残差块的版本则需要 40 天。不幸的是，我们无法获得同等水平的计算资源和预算来进行类似的实验。


    考虑到我们的目标不是创造能够击败世界冠军的最强智能体，我们对方法进行了一些调整。这些调整包括使用缩小的设置，例如更小的神经网络、更少的自我对弈角色和更少的对局数，来训练
    AlphaZero 智能体。具体来说，我们专注于 `9 x 9` 棋盘大小的围棋，这需要更少的计算资源，因此训练智能体的时间也更短。在中等硬件上经过 50
    小时的训练后，我们的智能体已经达到了很强的水平。我们最好的模型有时可以击败业余 1 段水平的对手。^(¹⁴)


    ### 分布式训练


    我们在训练过程中采用了分布式强化学习架构，使用了大约 120 个角色（actor）、1 个学习器（learner）和 1 个负责评估智能体性能的额外进程。所有这些组件都在一台配备
    128 个 CPU 和 8 个 GPU 的服务器上运行；每个 GPU 拥有 24 GB 的显存。该程序仅使用了 Python 的 `multiprocessing`
    模块，没有依赖任何用于分布式计算的第三方工具或库。

    '
- fmt: '### Neural Network Architecture and State Representation


    Our neural network architecture and state representation were closely aligned
    with the approach described in the AlphaGo Zero and AlphaZero papers. To construct
    the state, we utilized the last eight board configurations, resulting in a final
    state represented as a `9 × 9 × 17` image. While we largely adhered to the AlphaZero
    neural network architecture, we made some modifications by employing fewer blocks
    and convolutional filters, since a `9 × 9` board is much simpler than a `19 ×
    19` board.


    In our initial experiment, we began with a version comprising 20 blocks, but with
    only 64 convolutional filters for the convolutional layers and 64 hidden units
    for the value head. This particular neural network consisted of 1,434,493 parameters.
    However, after 24 hours of training, we observed that the agent exhibited a high
    frequency of pass moves, which abruptly ended games within approximately 20 steps.
    This behavior was observed in both self-play actors and the evaluation process.
    We speculated that the 20-block version might be excessively powerful for the
    `9 × 9` problem, despite our attempt to scale it down by reducing the number of
    convolutional filters and hidden units. Consequently, we made the decision to
    halt the training session and explore alternative approaches.


    Following the unsuccessful initial experiment, we tried different variants of
    neural network architectures. These included a 10-block version with 64 filters
    and hidden units, as well as a 15-block version with the same number of filters
    and hidden units. However, none of these configurations yielded satisfactory results
    after 24 hours of training. Eventually, we settled on an architecture consisting
    of 12 blocks, which included 1 initial convolutional block and 11 residual blocks,
    with 64 convolutional filters and 64 hidden units for the value head. We decided
    to train this revised neural network for over 40 hours to assess its progress.
    The 12-block version had a total of 842,621 parameters and showed improved performance
    compared to our previous attempts. However, when tested against strong opponents
    like other computer engines, it failed to consistently score wins.


    In our final experiment, we decided to use a more powerful neural network architecture,
    which consists of 11 blocks (1 initial convolutional block and 10 residual blocks).
    In this configuration, we increased the number of convolutional filters, with
    each block utilizing 128 filters for the convolutional layers and 128 hidden units
    for the value head. This neural network had a total of 2,998,461 parameters. The
    results of our final experiment revealed that this more powerful neural network
    architecture achieved significantly stronger play than the 12-block version. As
    a result, we will focus our further discussions on the model with the 11-block
    version.


    ### Self-Play


    Our approach closely follows the methodology described in the AlphaGo Zero and
    AlphaZero papers. However, due to the relative simplicity of the `9 × 9` problem
    and its smaller action space, we limit the number of simulations to 200 per Monte
    Carlo Tree Search (MCTS) during each game. To distribute the workload for position
    evaluation during MCTS, we evenly utilize the available GPUs on the server.


    To optimize computational resources, we have set the maximum game length to 162
    moves (`9 × 9 × 2`). Once a game reaches this length, no further moves are allowed,
    and we compute estimated scores for both players to determine the winner. Similar
    to the AlphaGo Zero paper, we employ a resignation mechanism. We initialize the
    resignation threshold at `-0.85`, dynamically adjusting it to maintain a resignation
    false positive rate below 5%. To measure the false positive rate, we disable resign
    moves for 10% of the self-play games and let the agent play until natural termination
    (both players have passed in two consecutive moves or reaching the maximum game
    length). To avoid premature resignations, we only allow the agent to consider
    resigning after a certain number of steps into the game, such as 30 or 40 steps.
    Additionally, we disable resignation for the first 50,000 self-play games, as
    the neural network’s predictions are less accurate in the early stages.


    After the game concludes, we score the games using a simplified version of the
    Tromp-Taylor method, incorporating a komi of 7.5 for the white player. It is important
    to note that these scores are estimates, as the Tromp-Taylor rules require players
    to capture the stones they believe to be dead before calculating the final scores.
    Failure to capture these stones results in scoring them as if they were alive.
    However, accurately detecting such dead stones at the end of a game is a challenging
    task for computer programs. For instance, in Fig. 14.9, dead stones in a Go game
    are marked with a small square and should be removed from the board before calculating
    the final score. Nonetheless, accurately detecting these dead stones is difficult
    due to the absence of explicit logic. This is why additional techniques such as
    simulation or neural network prediction are often employed to estimate scores.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig9_HTML.png)


    Two diagrams of the Go strategic board game on a 9 by 9 grid.


    **Fig. 14.9** Example of dead stones at the final state of a `9 × 9` Go game.
    In the left chart, the white stones at E2, F3, and G3 are considered dead because
    they have been completely surrounded by the opponent’s stones, regardless of whether
    they have been captured. The right chart presents another example where dead stones
    are present from both players. The white stones at C6 and D6 are dead, as well
    as the black stone at G5.'
  raw: '### Neural Network Architecture and State Representation


    Our neural network architecture and state representation were closely aligned
    with the approach described in the AlphaGo Zero and AlphaZero papers. To construct
    the state, we utilized the last eight board configurations, resulting in a final
    state represented as a ![$$9 \times 9 \times 17$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq163.png)
    image. While we largely adhered to the AlphaZero neural network architecture,
    we made some modifications by employing fewer blocks and convolutional filters,
    since a ![$$9 \times 9$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq164.png)
    board is much simpler than a ![$$19 \times 19$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq165.png)
    board.


    In our initial experiment, we began with a version comprising 20 blocks, but with
    only 64 convolutional filters for the convolutional layers and 64 hidden units
    for the value head. This particular neural network consisted of 1,434,493 parameters.
    However, after 24 hours of training, we observed that the agent exhibited a high
    frequency of pass moves, which abruptly ended games within approximately 20 steps.
    This behavior was observed in both self-play actors and the evaluation process.
    We speculated that the 20-block version might be excessively powerful for the
    ![$$9 \times 9$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq166.png)
    problem, despite our attempt to scale it down by reducing the number of convolutional
    filters and hidden units. Consequently, we made the decision to halt the training
    session and explore alternative approaches.


    Following the unsuccessful initial experiment, we tried different variants of
    neural network architectures. These included a 10-block version with 64 filters
    and hidden units, as well as a 15-block version with the same number of filters
    and hidden units. However, none of these configurations yielded satisfactory results
    after 24 hours of training. Eventually, we settled on an architecture consisting
    of 12 blocks, which included 1 initial convolutional block and 11 residual blocks,
    with 64 convolutional filters and 64 hidden units for the value head. We decided
    to train this revised neural network for over 40 hours to assess its progress.
    The 12-block version had a total of 842,621 parameters and showed improved performance
    compared to our previous attempts. However, when tested against strong opponents
    like other computer engines, it failed to consistently score wins.


    In our final experiment, we decided to use a more powerful neural network architecture,
    which consists of 11 blocks (1 initial convolutional block and 10 residual blocks).
    In this configuration, we increased the number of convolutional filters, with
    each block utilizing 128 filters for the convolutional layers and 128 hidden units
    for the value head. This neural network had a total of 2,998,461 parameters. The
    results of our final experiment revealed that this more powerful neural network
    architecture achieved significantly stronger play than the 12-block version. As
    a result, we will focus our further discussions on the model with the 11-block
    version.


    ### Self-Play


    Our approach closely follows the methodology described in the AlphaGo Zero and
    AlphaZero papers. However, due to the relative simplicity of the ![$$9 \times
    9$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq167.png) problem
    and its smaller action space, we limit the number of simulations to 200 per Monte
    Carlo Tree Search (MCTS) during each game. To distribute the workload for position
    evaluation during MCTS, we evenly utilize the available GPUs on the server.


    To optimize computational resources, we have set the maximum game length to 162
    moves ( ![$$9 \times 9 \times 2$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq168.png)
    ). Once a game reaches this length, no further moves are allowed, and we compute
    estimated scores for both players to determine the winner. Similar to the AlphaGo
    Zero paper, we employ a resignation mechanism. We initialize the resignation threshold
    at ![$${-}0.85$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq169.png)
    , dynamically adjusting it to maintain a resignation false positive rate below
    5%. To measure the false positive rate, we disable resign moves for 10% of the
    self-play games and let the agent play until natural termination (both players
    have passed in two consecutive moves or reaching the maximum game length). To
    avoid premature resignations, we only allow the agent to consider resigning after
    a certain number of steps into the game, such as 30 or 40 steps. Additionally,
    we disable resignation for the first 50,000 self-play games, as the neural network’s
    predictions are less accurate in the early stages.


    After the game concludes, we score the games using a simplified version of the
    Tromp-Taylor method, incorporating a komi of 7.5 for the white player. It is important
    to note that these scores are estimates, as the Tromp-Taylor rules require players
    to capture the stones they believe to be dead before calculating the final scores.
    Failure to capture these stones results in scoring them as if they were alive.
    However, accurately detecting such dead stones at the end of a game is a challenging
    task for computer programs. For instance, in Fig. [14.9](#605748_1_En_14_Chapter.xhtml#Fig9),
    dead stones in a Go game are marked with a small square and should be removed
    from the board before calculating the final score. Nonetheless, accurately detecting
    these dead stones is difficult due to the absence of explicit logic. This is why
    additional techniques such as simulation or neural network prediction are often
    employed to estimate scores.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig9_HTML.png)


    Two diagrams of the Go strategic board game on a 9 by 9 grid.


    Fig. 14.9


    Example of dead stones at the final state of a ![$$9 \times 9$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq170.png)
    Go game. In the left chart, the white stones at E2, F3, and G3 are considered
    dead because they have been completely surrounded by the opponent’s stones, regardless
    of whether they have been captured. The right chart presents another example where
    dead stones are present from both players. The white stones at C6 and D6 are dead,
    as well as the black stone at G5'
  trans: '

    ### 神经网络架构与状态表示


    我们的神经网络架构和状态表示与 AlphaGo Zero 及 AlphaZero 论文中描述的方法高度一致。为了构建状态，我们利用了最近八次棋盘配置，最终状态被表示为一个
    `9 × 9 × 17` 的图像。虽然我们大体上遵循了 AlphaZero 的神经网络架构，但由于 `9 × 9` 棋盘比 `19 × 19` 棋盘简单得多，我们进行了一些修改，使用了更少的模块和卷积滤波器。


    在最初的实验中，我们从包含 20 个模块的版本开始，但卷积层仅使用 64 个卷积滤波器，价值网络（value head）仅使用 64 个隐藏单元。这个特定的神经网络包含
    1,434,493 个参数。然而，经过 24 小时的训练后，我们观察到智能体（agent）频繁下出虚手（pass moves），导致对局在大约 20 步内就突然结束。这种行为在自我对弈（self-play）的棋手和评估过程中均有出现。我们推测，尽管我们尝试通过减少卷积滤波器和隐藏单元的数量来缩小规模，但
    20 模块版本对于 `9 × 9` 的问题来说可能仍然过于强大。因此，我们决定停止该训练会话，并探索其他方法。


    在首次实验失败后，我们尝试了不同变体的神经网络架构。这些包括一个 10 模块版本（64 个滤波器和隐藏单元），以及一个 15 模块版本（相同数量的滤波器和隐藏单元）。然而，在
    24 小时的训练后，这些配置均未产生令人满意的结果。最终，我们确定了一个由 12 个模块组成的架构，其中包括 1 个初始卷积模块和 11 个残差模块，卷积滤波器为
    64 个，价值网络隐藏单元为 64 个。我们决定对这个修订后的神经网络进行超过 40 小时的训练，以评估其进展。这个 12 模块版本共有 842,621 个参数，并且与我们之前的尝试相比，性能有所提升。然而，当与其他计算机引擎等强对手对战时，它未能持续获胜。


    在我们的最终实验中，我们决定使用一个更强大的神经网络架构，它由 11 个模块组成（1 个初始卷积模块和 10 个残差模块）。在此配置中，我们增加了卷积滤波器的数量，每个模块的卷积层使用
    128 个滤波器，价值网络使用 128 个隐藏单元。这个神经网络共有 2,998,461 个参数。我们最终实验的结果表明，这个更强大的神经网络架构实现了比
    12 模块版本显著更强的棋力。因此，我们后续的讨论将集中在 11 模块版本的模型上。


    ### 自我对弈


    我们的方法紧密遵循 AlphaGo Zero 和 AlphaZero 论文中描述的方法论。然而，由于 `9 × 9` 问题相对简单且动作空间较小，我们在每局游戏中将每次蒙特卡洛树搜索（MCTS）的模拟次数限制为
    200 次。为了在 MCTS 期间分配局面评估的工作负载，我们均匀地利用服务器上可用的 GPU。


    为了优化计算资源，我们将最大对局长度设置为 162 步（`9 × 9 × 2`）。一旦对局达到此长度，将不允许再下子，我们会计算双方棋手的估算得分以确定胜者。与
    AlphaGo Zero 论文类似，我们采用了一种认输机制。我们将认输阈值初始化为 `-0.85`，并动态调整它，以保持认输误报率低于 5%。为了测量误报率，我们在
    10% 的自我对弈对局中禁用认输动作，让智能体一直下到自然终止（双方连续两步都下虚手或达到最大对局长度）。为了避免过早认输，我们只允许智能体在游戏进行到一定步数（例如
    30 或 40 步）后才考虑认输。此外，我们在前 50,000 局自我对弈中禁用了认输功能，因为神经网络在早期阶段的预测不够准确。


    对局结束后，我们使用简化版的 Tromp-Taylor 计分法进行计分，并为白棋设置了 7.5 目的贴目。需要注意的是，这些得分是估算值，因为 Tromp-Taylor
    规则要求棋手在计算最终得分前，先提走他们认为已死的棋子。如果未能提走这些棋子，它们将被视为活棋计入得分。然而，对于计算机程序来说，在对局结束时准确检测此类死子是一项艰巨的任务。例如，在图
    14.9 中，围棋对局中的死子用小方块标记，应在计算最终得分前从棋盘上移除。尽管如此，由于缺乏明确的逻辑，准确检测这些死子仍然很困难。这就是为什么通常采用模拟或神经网络预测等额外技术来估算得分的原因。


    ![](img/605748_1_En_14_Fig9_HTML.png)


    9x9 网格上的围棋战略棋盘游戏的两个示意图。


    **图 14.9** `9 × 9` 围棋对局最终状态下的死子示例。在左侧图中，位于 E2、F3 和 G3 的白子被视为死子，因为它们已被对手的棋子完全包围，无论它们是否已被提走。右侧图展示了另一个双方都有死子的例子。位于
    C6 和 D6 的白子是死子，位于 G5 的黑子也是死子。

    '
- fmt: '### MCTS Search


    We have implemented the MCTS (Monte Carlo Tree Search) algorithm described in
    the AlphaGo Zero and AlphaZero papers, using identical configuration and hyperparameters.
    Our implementation involves 200 simulations per search, which proves sufficient
    for a `9 x 9` board. The exploration parameters, denoted as `c_base` and `c_init`,
    are set to 19652 and 1.25, respectively. We introduce Dirichlet noise to the root
    node at each step, with `epsilon = 0.25` and `eta = 0.03`, as specified in the
    AlphaZero paper. During self-play games, we adjust the temperature in Eq. (14.5)
    to 1.0 for the initial 16 steps and 0.1 for subsequent steps. To enhance the efficiency
    of the search process, we utilize parallel MCTS search with eight parallel leaves,
    incorporating virtual loss as outlined in [15]. Furthermore, we reuse the subtree
    for the remaining steps within the same game.


    However, it’s important to note that in evaluation games, where the current model
    plays against the previous model, we don’t add Dirichlet noise to the root node,
    and we do not reuse the subtree. This decision is based on the fact that the two
    players are distinct, and thus they are likely to produce different predictions
    when presented with the same state.


    ### Training


    We strictly follow the standard procedure and mechanisms outlined in the AlphaGo
    Zero and AlphaZero papers to train our agent. Our training approach is based on
    pure self-play games collected from dedicated self-play actors, with no involvement
    of human-generated games or other compute engines or AI programs to bootstrap
    the learning process.


    Given that we have 120 actors, we employ a single learner agent for the neural
    network update, which is a reasonable choice. To optimize our training, we utilize
    the `SGD` optimizer from `PyTorch`, setting the initial learning rate to 0.01,
    momentum to 0.9, and applying an L2 regularization of 0.0001. The learning rate
    follows a staircase pattern, progressively decreasing to 0.001 and 0.0001 at 200,000
    and 400,000 training steps, respectively.


    During each training step, the program randomly samples a batch of 1024 examples
    from the most recent 250,000 self-play games. To enhance the training process,
    we incorporate data augmentation techniques such as random rotation and flipping,
    which are the approach used in training the original AlphaGo agent. Additionally,
    we generate a checkpoint every 1000 training steps.


    As `9 x 9` Go presents a smaller problem space compared to `19 x 19`, we adjust
    our approach accordingly. For each checkpoint, we play a total of 5000 self-play
    games instead of 25,000 and limit the training data to the most recent 250,000
    self-play games instead of 500,000. We create the initial checkpoint after the
    actors have played a total of 20,000 games, ensuring a diverse range of game states
    are explored before we start the learning process (e.g., update the neural network).
    During the entire training session, a total of one million self-play games were
    used for training the neural network.


    ### Evaluation


    During the training process, we assess the agent’s performance at each new checkpoint.
    We employ the latest model to play against the previous checkpoint’s model, similar
    to self-play. However, there are some distinctions: the two players are not identical
    (black represents the latest model, while white represents the previous model),
    and we do not require the agents to engage in additional exploration (no noise
    is added to the root node of the search tree). After every Monte Carlo Tree Search
    (MCTS), we always select the best move (the child node with the highest visit
    count). The Elo ratings are computed using a simplified implementation. Specifically,
    we adopt the equation from the original AlphaGo Zero paper to estimate the probability
    that player *a* will defeat player *b*. This equation is represented as `P(a defeats
    b) = 1 / (1 + exp(c_elo * (e(b) - e(a))))`, where the standard constant `c_elo`
    is equal to `1/400`. Additionally, we utilize a variant of the k factor depending
    on the player’s current ratings. If the current ratings are below 2100, the k
    factor is set to 32. For ratings between 2100 and 2400, the k factor is 24, and
    for ratings above 2400, the k factor is 16.


    We also evaluate the model’s accuracy in predicting human gameplay using an evaluation
    dataset consisting of a total of 10,000 games and 620,000 positions. One challenge
    we encountered when evaluating `9 x 9` Go is the limited availability of games
    played by professional human players (professional dan ranks) on such a small
    board. In fact, our evaluation dataset comprises less than 3% of games played
    by Japanese professional Go players ranging from 1p to 9p. As a result, we had
    to collect the remaining games from the Internet, predominantly from the CGOS
    server. It is worth mentioning that while we refer to the evaluation dataset as
    human play games, it is highly likely that a substantial portion of the games
    were played by computer engines or AI programs rather than actual humans.


    To ensure the high quality of the evaluation dataset, we only include games in
    which both players have an Elo rating of at least 2100. This is because an Elo
    rating of 2100 is approximately equivalent to the level of an amateur 1 dan [16].
    Furthermore, although we filter games based on Elo ratings, it is still possible
    that the initial ratings were not accurate. Additionally, to ensure a diverse
    dataset, we limit the inclusion of games from the same player to a maximum of
    200. Moreover, we only include unique games in the evaluation dataset. Two games
    are considered duplicates if they were played by the same two players, lasted
    the same number of steps, and ended with the same outcome (i.e., the same winner
    and the same points for the winner).'
