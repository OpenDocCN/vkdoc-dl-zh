- fmt: '### State


    在强化学习中，环境状态（environment state）或简称为状态，是环境提供的用于表示其当前状态的统计数据。状态可以是离散的或连续的。例如，在驾驶手动挡汽车时，车速是一个连续变量，而当前档位是一个离散变量。


    理想情况下，环境状态应包含智能体做出决策所需的所有相关信息。例如，在像《打砖块》这样的单人视频游戏中，游戏帧的像素包含了智能体做出决策所需的全部信息。同样，在自动驾驶场景中，来自车载摄像头、激光雷达和其他传感器的数据提供了关于周围环境的相关信息。


    然而，在实践中，可用信息可能取决于任务和领域。例如，在像围棋这样的双人棋盘游戏中，尽管我们拥有关于棋盘位置的完美信息，但我们并不完全了解对手，例如他们脑海中的想法或下一步行动。这使得在这种场景下的状态表示更具挑战性。


    此外，环境状态可能还包含噪声数据。例如，一个驾驶自动驾驶汽车的强化学习智能体可能使用多个不同角度的摄像头来捕捉周围区域的图像。假设汽车在一个有风的日子正行驶在公园附近。在这种情况下，车载摄像头也可能捕捉到公园里一些随风摇摆的树木的图像。由于这些树木的运动不应影响智能体的驾驶能力（因为树木在公园内，不在道路上或道路附近），我们可以将这些树木的运动视为对自动驾驶智能体的噪声。然而，从捕捉到的图像中忽略它们可能具有挑战性。为了解决这个问题，研究人员可能会使用各种技术，如滤波和平滑，来消除噪声数据，从而获得更清晰的环境状态表示。


    ### Reward


    在强化学习中，奖励信号是环境在智能体执行某个动作后提供给智能体的一个数值。奖励可以是任何数值，正数、负数或零。然而，在实践中，奖励函数通常因任务而异，我们需要仔细设计一个针对我们强化学习问题的特定奖励函数。


    设计一个合适的奖励函数对于智能体的成功至关重要。奖励函数的设计应鼓励智能体采取最终能实现我们期望目标的行动。例如，在围棋游戏中，游戏结束前的每一步奖励都是0，如果智能体获胜则奖励为`+1`，如果失败则奖励为`-1`。这种设计激励智能体去赢得比赛，而无需明确告诉它如何获胜。


    同样，在《打砖块》游戏中，如果智能体摧毁了一些砖块，奖励可以是正数；如果智能体未能接住球，奖励为负数；其他情况下奖励为零。这种设计激励智能体在避免丢球的同时尽可能多地摧毁砖块，而无需明确告诉它如何获得高分。


    奖励函数在强化学习过程中起着至关重要的作用。智能体的目标是最大化随时间累积的奖励。通过优化奖励函数，我们可以引导智能体学习一个能实现我们期望目标的策略。如果没有奖励信号，智能体将不知道目标是什么，也无法有效学习。


    总之，奖励信号是强化学习中的一个关键组成部分，它激励智能体采取最终能实现期望目标的行动。通过仔细设计奖励函数，我们可以引导智能体学习最优策略。


    ### Agent


    在强化学习中，智能体是一个实体，它通过基于从环境接收到的状态和奖励信号做出决策来与环境交互。智能体的目标是长期最大化其累积奖励。智能体必须通过试错来学习做出最佳决策，这包括探索不同的动作并观察由此产生的奖励。


    除了与外部的环境交互外，智能体还可能拥有其内部状态，这代表了它对世界的认知。这个内部状态可以包括诸如过去经验的记忆和已学习的策略等内容。


    区分智能体的内部状态和环境状态非常重要。环境状态表示智能体试图通过其行动影响的当前世界状态。然而，智能体对环境状态没有直接控制权。它只能通过采取行动并观察环境中的相应变化来影响环境状态。例如，如果智能体正在玩一个游戏，环境状态可能包括游戏棋子的当前位置，而智能体的内部状态可能包括对过去走法的记忆以及它已学习的策略。


    在本书中，我们通常使用术语“状态”来指代环境状态。然而，牢记智能体内部状态与环境状态之间的区别很重要。通过理解智能体的角色及其与环境的交互，我们可以更好地理解强化学习算法背后的原理。值得注意的是，在本书中，尤其是在后续章节中，术语“智能体”和“算法”经常互换使用。


    ### Action


    在强化学习中，智能体通过选择影响环境状态的动作来与环境交互。动作是从一个预定义的可能集合中选择的，该集合针对每个问题都是特定的。例如，在《打砖块》游戏中，智能体可以选择将球拍向左或向右移动，或者不采取任何动作。它不能执行跳跃或翻滚等动作。相比之下，在《乓》游戏中，智能体可以选择将球拍向上或向下移动，但不能向左或向右移动。


    所选动作会影响环境的未来状态。智能体的当前动作可能具有长期后果，这意味着它不仅会影响过程的下一即时阶段，还会影响未来许多时间步的环境状态和奖励。


    动作可以是离散的或连续的。在离散动作问题中，可能的动作集合是有限且定义明确的。此类问题的例子包括雅达利游戏和围棋棋盘游戏。相比之下，连续动作问题具有无限的可能动作集合，通常在一个连续的数值范围内。连续动作问题的一个例子是机器人控制，其中机器人手臂的角度移动程度通常是一个连续动作。


    具有离散动作的强化学习问题通常比具有连续动作的问题更容易解决。因此，本书将重点解决具有离散动作的强化学习问题。然而，本书讨论的许多概念和技术也可以应用于具有连续动作的问题。'
  raw: '### State


    In reinforcement learning, an environment state or simply state is the statistical
    data provided by the environment to represent the current state of the environment.
    The state can be discrete or continuous. For instance, when driving a stick shift
    car, the speed of the car is a continuous variable, while the current gear is
    a discrete variable.


    Ideally, the environment state should contain all relevant information that’s
    necessary for the agent to make decisions. For example, in a single-player video
    game like Breakout, the pixels of frames of the game contain all the information
    necessary for the agent to make a decision. Similarly, in an autonomous driving
    scenario, the sensor data from the car’s cameras, lidar, and other sensors provide
    relevant information about the surrounding environment.


    However, in practice, the available information may depend on the task and domain.
    In a two-player board game like Go, for instance, although we have perfect information
    about the board position, we don’t have perfect knowledge about the opponent player,
    such as what they are thinking in their head or what their next move will be.
    This makes the state representation more challenging in such scenarios.


    Furthermore, the environment state might also include noisy data. For example,
    a reinforcement learning agent driving an autonomous car might use multiple cameras
    at different angles to capture images of the surrounding area. Suppose the car
    is driving near a park on a windy day. In that case, the onboard cameras could
    also capture images of some trees in the park that are swaying in the wind. Since
    the movement of these trees should not affect the agent’s ability to drive, because
    the trees are inside the park and not on the road or near the road, we can consider
    these movements of the trees as noise to the self-driving agent. However, it can
    be challenging to ignore them from the captured images. To tackle this problem,
    researchers might use various techniques such as filtering and smoothing to eliminate
    the noisy data and obtain a cleaner representation of the environment state.


    ### Reward


    In reinforcement learning, the reward signal is a numerical value that the environment
    provides to the agent after the agent takes some action. The reward can be any
    numerical value, positive, negative, or zero. However, in practice, the reward
    function often varies from task to task, and we need to carefully design a reward
    function that is specific to our reinforcement learning problem.


    Designing an appropriate reward function is crucial for the success of the agent.
    The reward function should be designed to encourage the agent to take actions
    that will ultimately lead to achieving our desired goal. For example, in the game
    of Go, the reward is 0 at every step before the game is over, and +1 or ![$$-1$$](images/605748_1_En_1_Chapter/605748_1_En_1_Chapter_TeX_IEq2.png)
    if the agent wins or loses the game, respectively. This design incentivizes the
    agent to win the game, without explicitly telling it how to win.


    Similarly, in the game of Breakout, the reward can be a positive number if the
    agent destroys some bricks negative number if the agent failed to catch the ball,
    and zero reward otherwise. This design incentivizes the agent to destroy as many
    bricks as possible while avoiding losing the ball, without explicitly telling
    it how to achieve a high score.


    The reward function plays a crucial role in the reinforcement learning process.
    The goal of the agent is to maximize the accumulated rewards over time. By optimizing
    the reward function, we can guide the agent to learn a policy that will achieve
    our desired goal. Without the reward signal, the agent would not know what the
    goal is and would not be able to learn effectively.


    In summary, the reward signal is a key component of reinforcement learning that
    incentivizes the agent to take actions that ultimately lead to achieving the desired
    goal. By carefully designing the reward function, we can guide the agent to learn
    an optimal policy.


    ### Agent


    In reinforcement learning, an agent is an entity that interacts with an environment
    by making decisions based on the received state and reward signal from the environment.
    The agent’s goal is to maximize its cumulative reward in the long run. The agent
    must learn to make the best decisions by trial and error, which involves exploring
    different actions and observing the resulting rewards.


    In addition to the external interactions with the environment, the agent may also
    has its internal state represents its knowledge about the world. This internal
    state can include things like memory of past experiences and learned strategies.


    It’s important to distinguish the agent’s internal state from the environment
    state. The environment state represents the current state of the world that the
    agent is trying to influence through its actions. The agent, however, has no direct
    control over the environment state. It can only affect the environment state by
    taking actions and observing the resulting changes in the environment. For example,
    if the agent is playing a game, the environment state might include the current
    positions of game pieces, while the agent’s internal state might include the memory
    of past moves and the strategies it has learned.


    In this book, we will typically use the term “state” to refer to the environment
    state. However, it’s important to keep in mind the distinction between the agent’s
    internal state and the environment state. By understanding the role of the agent
    and its interactions with the environment, we can better understand the principles
    behind reinforcement learning algorithms. It is worth noting that the terms “agent”
    and “algorithm” are frequently used interchangeably in this book, particularly
    in later chapters.


    ### Action


    In reinforcement learning, the agent interacts with an environment by selecting
    actions that affect the state of the environment. Actions are chosen from a predefined
    set of possibilities, which are specific to each problem. For example, in the
    game of Breakout, the agent can choose to move the paddle to the left or right
    or take no action. It cannot perform actions like jumping or rolling over. In
    contrast, in the game of Pong, the agent can choose to move the paddle up or down
    but not left or right.


    The chosen action affects the future state of the environment. The agent’s current
    action may have long-term consequences, meaning that it will affect the environment’s
    states and rewards for many future time steps, not just the next immediate stage
    of the process.


    Actions can be either discrete or continuous. In problems with discrete actions,
    the set of possible actions is finite and well defined. Examples of such problems
    include Atari and Go board games. In contrast, problems with continuous actions
    have an infinite set of possible actions, often within a continuous range of values.
    An example of a problem with continuous actions is robotic control, where the
    degree of angle movement of a robot arm is often a continuous action.


    Reinforcement learning problems with discrete actions are generally easier to
    solve than those with continuous actions. Therefore, this book will focus on solving
    reinforcement learning problems with discrete actions. However, many of the concepts
    and techniques discussed in this book can be applied to problems with continuous
    actions as well.'
  trans: '

    ### 状态


    在强化学习中，环境状态（environment state）或简称为状态，是环境提供的用于表示其当前状态的统计数据。状态可以是离散的或连续的。例如，在驾驶手动挡汽车时，车速是一个连续变量，而当前档位是一个离散变量。


    理想情况下，环境状态应包含智能体做出决策所需的所有相关信息。例如，在像《打砖块》这样的单人视频游戏中，游戏帧的像素包含了智能体做出决策所需的全部信息。同样，在自动驾驶场景中，来自车载摄像头、激光雷达和其他传感器的数据提供了关于周围环境的相关信息。


    然而，在实践中，可用信息可能取决于任务和领域。例如，在像围棋这样的双人棋盘游戏中，尽管我们拥有关于棋盘位置的完美信息，但我们并不完全了解对手，例如他们脑海中的想法或下一步行动。这使得在这种场景下的状态表示更具挑战性。


    此外，环境状态可能还包含噪声数据。例如，一个驾驶自动驾驶汽车的强化学习智能体可能使用多个不同角度的摄像头来捕捉周围区域的图像。假设汽车在一个有风的日子正行驶在公园附近。在这种情况下，车载摄像头也可能捕捉到公园里一些随风摇摆的树木的图像。由于这些树木的运动不应影响智能体的驾驶能力（因为树木在公园内，不在道路上或道路附近），我们可以将这些树木的运动视为对自动驾驶智能体的噪声。然而，从捕捉到的图像中忽略它们可能具有挑战性。为了解决这个问题，研究人员可能会使用各种技术，如滤波和平滑，来消除噪声数据，从而获得更清晰的环境状态表示。


    ### 奖励


    在强化学习中，奖励信号是环境在智能体执行某个动作后提供给智能体的一个数值。奖励可以是任何数值，正数、负数或零。然而，在实践中，奖励函数通常因任务而异，我们需要仔细设计一个针对我们强化学习问题的特定奖励函数。


    设计一个合适的奖励函数对于智能体的成功至关重要。奖励函数的设计应鼓励智能体采取最终能实现我们期望目标的行动。例如，在围棋游戏中，游戏结束前的每一步奖励都是
    0，如果智能体获胜则奖励为`+1`，如果失败则奖励为`-1`。这种设计激励智能体去赢得比赛，而无需明确告诉它如何获胜。


    同样，在《打砖块》游戏中，如果智能体摧毁了一些砖块，奖励可以是正数；如果智能体未能接住球，奖励为负数；其他情况下奖励为零。这种设计激励智能体在避免丢球的同时尽可能多地摧毁砖块，而无需明确告诉它如何获得高分。


    奖励函数在强化学习过程中起着至关重要的作用。智能体的目标是最大化随时间累积的奖励。通过优化奖励函数，我们可以引导智能体学习一个能实现我们期望目标的策略。如果没有奖励信号，智能体将不知道目标是什么，也无法有效学习。


    总之，奖励信号是强化学习中的一个关键组成部分，它激励智能体采取最终能实现期望目标的行动。通过仔细设计奖励函数，我们可以引导智能体学习最优策略。


    ### 智能体


    在强化学习中，智能体是一个实体，它通过基于从环境接收到的状态和奖励信号做出决策来与环境交互。智能体的目标是长期最大化其累积奖励。智能体必须通过试错来学习做出最佳决策，这包括探索不同的动作并观察由此产生的奖励。


    除了与外部的环境交互外，智能体还可能拥有其内部状态，这代表了它对世界的认知。这个内部状态可以包括诸如过去经验的记忆和已学习的策略等内容。


    区分智能体的内部状态和环境状态非常重要。环境状态表示智能体试图通过其行动影响的当前世界状态。然而，智能体对环境状态没有直接控制权。它只能通过采取行动并观察环境中的相应变化来影响环境状态。例如，如果智能体正在玩一个游戏，环境状态可能包括游戏棋子的当前位置，而智能体的内部状态可能包括对过去走法的记忆以及它已学习的策略。


    在本书中，我们通常使用术语“状态”来指代环境状态。然而，牢记智能体内部状态与环境状态之间的区别很重要。通过理解智能体的角色及其与环境的交互，我们可以更好地理解强化学习算法背后的原理。值得注意的是，在本书中，尤其是在后续章节中，术语“智能体”和“算法”经常互换使用。


    ### 动作


    在强化学习中，智能体通过选择影响环境状态的动作来与环境交互。动作是从一个预定义的可能集合中选择的，该集合针对每个问题都是特定的。例如，在《打砖块》游戏中，智能体可以选择将球拍向左或向右移动，或者不采取任何动作。它不能执行跳跃或翻滚等动作。相比之下，在《乓》游戏中，智能体可以选择将球拍向上或向下移动，但不能向左或向右移动。


    所选动作会影响环境的未来状态。智能体的当前动作可能具有长期后果，这意味着它不仅会影响过程的下一即时阶段，还会影响未来许多时间步的环境状态和奖励。


    动作可以是离散的或连续的。在离散动作问题中，可能的动作集合是有限且定义明确的。此类问题的例子包括雅达利游戏和围棋棋盘游戏。相比之下，连续动作问题具有无限的可能动作集合，通常在一个连续的数值范围内。连续动作问题的一个例子是机器人控制，其中机器人手臂的角度移动程度通常是一个连续动作。


    具有离散动作的强化学习问题通常比具有连续动作的问题更容易解决。因此，本书将重点解决具有离散动作的强化学习问题。然而，本书讨论的许多概念和技术也可以应用于具有连续动作的问题。

    '
- fmt: '### Policy


    A policy is a key concept in reinforcement learning that defines the behavior
    of an agent. In particular, it maps each possible state in the environment to
    the probabilities of choosing different actions. By specifying how the agent should
    behave, a policy guides the agent to interact with its environment and maximize
    its cumulative reward. We will delve into the details of policies and how they
    interact with the MDP framework in Chap. [2](#605748_1_En_2_Chapter.xhtml).


    For example, suppose an agent is navigating a grid-world environment. A simple
    policy might dictate that the agent should always move to the right until it reaches
    the goal location. Alternatively, a more sophisticated policy could specify that
    the agent should choose its actions based on its current position and the probabilities
    of moving to different neighboring states.


    ### Model


    In reinforcement learning, a model refers to a mathematical description of the
    dynamics function and reward function of the environment. The dynamics function
    describes how the environment evolves from one state to another, while the reward
    function specifies the reward that the agent receives for taking certain actions
    in certain states.


    In many cases, the agent does not have access to a perfect model of the environment.
    This makes learning a good policy challenging, since the agent must learn from
    experience how to interact with the environment to maximize its reward. However,
    there are some cases where a perfect model is available. For example, if the agent
    is playing a game with fixed rules and known outcomes, the agent can use this
    knowledge to select its actions strategically. We will explore this scenario in
    detail in Chap. [2](#605748_1_En_2_Chapter.xhtml).


    In reinforcement learning, the agent-environment boundary can be ambiguous. Despite
    a house cleaning robot appearing to be a single agent, the agent’s direct control
    typically defines its boundary, while the remaining components comprise the environment.
    In this case, the robot’s wheels and other hardware are considered to be part
    of the environment since they aren’t directly controlled by the agent. We can
    think of the robot as a complex system composed of several parts, such as hardware,
    software, and the reinforcement learning agent, which can control the robot’s
    movement by signaling the software interface, which then communicates with microchips
    to manage the wheel movement.


    ## 1.4 Examples of Reinforcement Learning


    Reinforcement learning is a versatile technique that can be applied to a variety
    of real-world problems. While its success in playing games is well known, there
    are many other areas where it can be used as an effective solution. In this section,
    we explore a few examples of how reinforcement learning can be applied to real-world
    problems.


    ### Autonomous Driving


    Reinforcement learning can be used to train autonomous vehicles to navigate complex
    and unpredictable environments. The goal for the agent is to safely and efficiently
    drive the vehicle to a desired location while adhering to traffic rules and regulations.
    The reward signal could be a positive number for successful arrival at the destination
    within a specified time frame and a negative number for any accidents or violations
    of traffic rules. The environment state could contain information about the vehicle’s
    location, velocity, and orientation, as well as sensory data such as camera feeds
    and radar readings. Additionally, the state could include the current traffic
    conditions and weather, which would help the agent to make better decisions while
    driving.


    ### Navigating Robots in a Factory Floor


    One practical application of reinforcement learning is to train robots to navigate
    a factory floor. The goal for the agent is to safely and efficiently transport
    goods from one point to another without disrupting the work of human employees
    or other robots. In this case, the reward signal could be a positive number for
    successful delivery within a specified time frame and a negative number for any
    accidents or damages caused. The environment state could contain information about
    the robot’s location, the weight and size of the goods being transported, the
    location of other robots, and sensory data such as camera feeds and battery level.
    Additionally, the state could include information about the production schedule,
    which would help the agent to prioritize its tasks.


    ### Automating Web Advertising


    Another application of reinforcement learning is to automate web advertising.
    The goal for the agent is to select the most effective type of ad to display to
    a user, based on their browsing history and profile. The reward signal could be
    a positive number for when the user clicks on the ad, and zero otherwise. The
    environment state could contain information such as the user’s search history,
    demographics, and current trends on the Internet. Additionally, the state could
    include information about the context of the web page, which would help the agent
    to choose the most relevant ad.


    ### Video Compression


    Reinforcement learning can also be used to improve video compression. DeepMind’s
    MuZero agent has been adapted to optimize video compression for some YouTube videos.
    In this case, the goal for the agent is to compress the video as much as possible
    without compromising the quality. The reward signal could be a positive number
    for high-quality compression and a negative number for low-quality compression.
    The environment state could contain information such as the video’s resolution,
    bit rate, frame rate, and the complexity of the scenes. Additionally, the state
    could include information about the viewing device, which would help the agent
    to optimize the compression for the specific device.


    Overall, reinforcement learning has enormous potential for solving real-world
    problems in various industries. The key to successful implementation is to carefully
    design the reward signal and the environment state to reflect the specific goals
    and constraints of the problem. Additionally, it is important to continually monitor
    and evaluate the performance of the agent to ensure that it is making the best
    decisions.


    ## 1.5 Common Terms in Reinforcement Learning'
