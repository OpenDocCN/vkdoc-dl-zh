    based on the model of the environment and ![$$V_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq101.png)
    . After the sweep is done, it then uses ![$$Q_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq102.png)
    to compute a better, improved deterministic policy ![$$\pi ''$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq103.png)
    . It does this by going through all the states in the state space; for every state,
    it updates the policy probability distribution for each action, so that the probability
    of choosing the action with the highest estimated value ![$$Q_\pi (s, a)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq104.png)
    is 1, and the probability of choosing other actions is 0.


    Algorithm 3: Policy improvement, iterative algorithm


    ![](images/605748_1_En_3_Chapter/605748_1_En_3_Figaac_HTML.gif) A 10-line algorithm
    titled policy improvement, iterative algorithm takes in the following inputs to
    give improved deterministic policy pie prime as the output. Estimated state value
    function V pie for pie and discount rate gamma.


    The policy improvement algorithm consists of two steps: the first step is to use
    Eq. ([3.3](#605748_1_En_3_Chapter.xhtml#Equ3)) and the model of the environment
    to compute the estimated state-action value function ![$$Q_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq105.png)
    for the current policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq106.png)
    ; the second step is to improve the policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq107.png)
    by constructing a new, better deterministic policy ![$$\pi ''$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq108.png)
    based on ![$$Q_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq109.png)
    . Unlike the policy evaluation algorithm, the policy improvement algorithm does
    not run forever. It only goes through these two steps once. This makes sense as
    we now have a new, better policy ![$$\pi ''$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq110.png)
    ; the old state value function ![$$V_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq111.png)
    does not represent the values of this new policy anymore because the policy has
    changed.


    To implement Algorithm 3, we could use a 2D matrix with the shape of (size of
    state space, size of action space) to represent the state-action value function
    ![$$Q_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq112.png)
    . One thing to pay attention to is during the construction of the improved policy,
    we should only consider the legal actions for the specific state; legal actions
    are those that are available in the current state. Excluding illegal actions is
    important because it ensures that the action selection process is performed correctly
    and does not lead to suboptimal or even dangerous behavior.


    In reinforcement learning, excluding illegal actions is particularly important
    when constructing a policy based on the estimated state-action value function.
    Without excluding illegal actions, the policy may select suboptimal or even illegal
    actions leading to poor performance or failure to achieve the desired goal. By
    considering only legal actions in the action selection process, the policy can
    ensure that it selects the best action possible for the given state while still
    satisfying any constraints or safety requirements.


    For example, consider a robot in a factory environment with certain safety constraints,
    such as not colliding with other robots or objects. If the robot’s action selection
    process includes illegal actions, such as moving in a direction that would result
    in a collision, it could cause damage to itself, other robots, or the factory
    environment.


    Another concrete example is this: let’s say the values for the legal actions are
    all negative ![$$Q_\pi (s, a) &lt; 0$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq113.png)
    for some state *s*; if we don’t exclude the illegal actions, then a standard ![$$\mathop{\text{argmax}}
    $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq114.png) will always
    choose one of the illegal actions, since zero is greater than negative values.'
