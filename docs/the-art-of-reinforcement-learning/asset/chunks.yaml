  trans: '

    ### 无模型强化学习 vs. 基于模型的强化学习


    在强化学习中，环境是智能体为了达成目标而与之交互的系统。模型是环境动态特性和奖励函数的数学表示。无模型强化学习意味着智能体不使用环境模型来辅助决策。这可能是因为智能体无法获取准确的环境模型，或者该模型过于复杂而无法在决策过程中使用。


    在无模型强化学习中，智能体基于其对环境的经验来学习采取行动，而无需显式模拟未来结果。无模型强化学习方法的示例包括 `Q-learning`、`SARSA`（状态-动作-奖励-状态-动作）以及深度强化学习算法（如
    `DQN`），我们将在本书后面介绍这些内容。


    另一方面，在基于模型的强化学习中，智能体使用环境模型来模拟未来结果并据此规划其行动。这可能涉及构建环境的完整模型，或使用仅捕捉环境动态特性中最关键方面的简化模型。在某些场景下，尤其是在环境相对简单且模型准确时，基于模型的强化学习可能比无模型方法更具样本效率。基于模型的强化学习方法的示例包括动态规划算法（如值迭代和策略迭代）以及概率规划方法（如
    `AlphaZero` 智能体中的蒙特卡洛树搜索），我们将在本书后面介绍这些内容。


    总之，无模型和基于模型的强化学习是解决同一问题（即在环境中最大化奖励）的两种不同方法。选择哪种方法取决于环境的特性、可用数据以及计算资源。


    ## 为什么要学习强化学习


    机器学习是一个广阔且快速发展的领域，包含许多不同的方法和技术。因此，从业者可能难以确定针对特定问题应使用哪种机器学习方法。通过讨论机器学习不同分支的优势和局限性，我们可以更好地理解哪种方法最适合特定任务。这有助于我们在开发机器学习解决方案时做出更明智的决策，并最终构建更有效、更高效的系统。


    机器学习有三个分支。在现实世界中最流行且应用最广泛的分支之一是监督学习，它被用于图像识别、语音识别和文本分类等领域。监督学习的思想非常简单：给定一组训练数据及其对应的标签，目标是让系统能够泛化，并为训练数据集中未出现的数据预测标签。这些训练标签通常由某些监督者（例如人类）提供。因此，我们称之为监督学习。


    机器学习的另一个分支是无监督学习。在无监督学习中，目标是在不提供任何标签的情况下发现训练数据的隐藏结构或特征。这在图像聚类等领域非常有用，我们希望系统将相似的图像分组在一起，而无需事先知道哪些图像属于哪个组。无监督学习的另一个应用是降维，我们希望将高维数据表示到低维空间中，同时尽可能多地保留信息。


    强化学习是一种机器学习类型，其中智能体学习在环境中采取行动，以最大化奖励信号。它在那些没有明确“正确”输出概念的领域特别有用，例如机器人技术或游戏博弈。强化学习在机器人技术、医疗保健和金融等领域具有潜在应用。


    监督学习已广泛应用于计算机视觉和自然语言处理。例如，ImageNet 分类挑战赛是一项年度计算机视觉竞赛，深度卷积神经网络（CNN）在其中占据主导地位。该挑战赛提供了一个包含
    120 万张图像（涵盖 1000 个类别）并带有标签的训练数据集，目标是预测一个包含约 10 万张图像的独立评估数据集的标签。2012 年，Krizhevsky
    等人 [8] 开发了 `AlexNet`，这是首个用于该挑战赛的深度 CNN 系统。与之前最先进的方法相比，`AlexNet` 的准确率提高了 18%，这标志着计算机视觉领域的一项重大突破。


    自 `AlexNet` 问世以来，几乎所有 ImageNet 挑战赛的领先解决方案都基于深度 CNN。另一个突破发生在 2015 年，当时微软的研究人员 He
    等人 [9] 开发了 `ResNet`，这是一种旨在改进具有数百层的极深 CNN 训练的新架构。由于梯度消失问题，训练深度 CNN 颇具挑战性，这使得在反向传播过程中难以将梯度通过网络向后传播。`ResNet`
    通过引入跳跃连接解决了这一挑战，该连接允许网络在前向传播过程中跳过一个或多个层，从而减少了梯度需要传播的网络深度。


    虽然监督学习能够从数据中发现隐藏的模式和特征，但它存在局限性，即它仅仅模仿训练中被告知要做的事情，无法与世界交互并从自身经验中学习。监督学习的一个局限性是需要标记过程的每一个可能阶段。例如，如果我们想使用监督学习来训练一个智能体下围棋，那么我们需要收集每一种可能棋盘位置的标签，但由于可能的组合数量巨大，这是不可能的。同样，在
    Atari 视频游戏中，单个像素的变化就需要重新标记，这使得监督学习在这些情况下不适用。然而，监督学习在语言翻译和图像分类等许多其他应用中已经取得了成功。


    无监督学习试图在没有标签的情况下发现隐藏的模式或特征，但其目标与强化学习完全不同，强化学习的目标是最大化累积的奖励信号。人类和动物通过与环境互动来学习，这正是强化学习的用武之地。在强化学习中，智能体不会被直接告知哪个动作好或坏，而是必须通过试错自行发现。这种试错搜索过程是强化学习独有的。然而，强化学习也面临其他独特的挑战，例如处理延迟后果以及平衡探索与利用。


    虽然强化学习是机器学习的一个独特分支，但它与其他分支（如监督学习和无监督学习）有一些共同点。例如，监督学习和深度卷积神经网络的改进已被应用于 DeepMind
    的 `DQN`、`AlphaGo` 及其他强化学习智能体。同样，无监督学习可用于预训练强化学习智能体的权重，以提高其性能。此外，强化学习中使用的许多数学概念，如优化以及如何训练神经网络，与其他机器学习分支是共享的。因此，尽管强化学习有其独特的挑战和应用，但它也受益于并促进了其他机器学习分支的发展。

    '
- fmt: '# 1.7 The Challenges in Reinforcement Learning


    Reinforcement learning (`RL`) is a type of machine learning in which an agent
    learns to interact with an environment to maximize some notion of cumulative reward.
    While `RL` has shown great promise in a variety of applications, it also comes
    with several common challenges, as discussed in the following sections:


    ## Exploration vs. Exploitation Dilemma


    The exploration-exploitation dilemma refers to the fundamental challenge in reinforcement
    learning of balancing the need to explore the environment to learn more about
    it with the need to exploit previous knowledge to maximize cumulative reward.
    The agent must continually search for new actions that may yield greater rewards
    while also taking advantage of actions that have already proven successful.


    In the initial exploration phase, the agent is uncertain about the environment
    and must try out a variety of actions to gather information about how the environment
    responds. This is similar to how humans might learn to play a new video game by
    trying different button combinations to see what happens. However, as the agent
    learns more about the environment, it becomes increasingly important to focus
    on exploiting the knowledge it has gained in order to maximize cumulative reward.
    This is similar to how a human might learn to play a game more effectively by
    focusing on the actions that have already produced high scores.


    There are many strategies for addressing the exploration-exploitation trade-off,
    ranging from simple heuristics to more sophisticated algorithms. One common approach
    is to use an `ε`-greedy policy, in which the agent selects the action with the
    highest estimated value with probability `1-ε` and selects a random action with
    probability `ε` in order to encourage further exploration. Another approach is
    to use a Thompson sampling algorithm, which balances exploration and exploitation
    by selecting actions based on a probabilistic estimate of their expected value.


    It is important to note that the exploration-exploitation trade-off is not a simple
    problem to solve, and the optimal balance between exploration and exploitation
    will depend on many factors, including the complexity of the environment and the
    agent’s prior knowledge. As a result, there is ongoing research in the field of
    reinforcement learning aimed at developing more effective strategies for addressing
    this challenge.


    ## Credit Assignment Problem


    In reinforcement learning (`RL`), the credit assignment problem refers to the
    challenge of determining which actions an agent took that led to a particular
    reward. This is a fundamental problem in `RL` because the agent must learn from
    its own experiences in order to improve its performance.


    To illustrate this challenge, let’s consider the game of Tic-Tac-Toe, where two
    players take turns placing `X`s and `O`s on a 3×3 grid until one player gets three
    in a row. Suppose the agent is trying to learn to play Tic-Tac-Toe using `RL`,
    and the reward is `+1` for a win, `-1` for a loss, and `0` for a draw. The agent’s
    goal is to learn a policy that maximizes its cumulative reward.


    Now, suppose the agent wins a game of Tic-Tac-Toe. How can the agent assign credit
    to the actions that led to the win? This can be a difficult problem to solve,
    especially if the agent is playing against another `RL` agent that is also learning
    and adapting its strategies.


    To tackle the credit assignment problem in `RL`, there are various techniques
    that can be used, such as Monte Carlo methods or temporal difference learning.
    These methods use statistical analysis to estimate the value of each action taken
    by the agent, based on the rewards received and the states visited. By using these
    methods, the agent can gradually learn to assign credit to the actions that contribute
    to its success and adjust its policy accordingly.


    In summary, credit assignment is a key challenge in reinforcement learning, and
    it is essential to develop effective techniques for solving this problem in order
    to achieve optimal performance.


    ## Reward Engineering Problem


    The reward engineering problem refers to the process of designing a good reward
    function that encourages the desired behavior in a reinforcement learning (`RL`)
    agent. The reward function determines what the agent is trying to optimize, so
    it is crucial to make sure it reflects the desired goal we want the agent to achieve.


    An example of good reward engineering is in the game of Atari Breakout, where
    the goal of the agent is to clear all the bricks at the top of the screen by bouncing
    a ball off a paddle. One way to design a reward function for this game is to give
    the agent a positive reward for each brick it clears and a negative reward for
    each time the ball passes the paddle and goes out of bounds. However, this reward
    function alone may not lead to optimal behavior, as the agent may learn to exploit
    a loophole by simply bouncing the ball back and forth on the same side of the
    screen without actually clearing any bricks.


    To address this challenge, the reward function can be designed to encourage more
    desirable behavior. For example, the reward function can be modified to give the
    agent a larger positive reward for clearing multiple bricks in a row or for clearing
    the bricks on the edges of the screen first. This can encourage the agent to take
    more strategic shots and aim for areas of the screen that will clear more bricks
    at once.


    An example of bad reward engineering is the CoastRunners video game in Atari;
    it’s a very simple boat racing game. The goal of the game is to finish the boat
    race as quickly as possible. But there’s one small issue with the game, the player
    can earn higher scores by hitting some targets laid out along the route. There’s
    a video that shows that a reinforcement learning agent plays the game by repeatedly
    hitting the targets instead of finishing the race.^([²](#fn2)) This example should
    not be viewed as the failure of the reinforcement learning agent, but rather humans
    failed to design and use the correct reward function.


    Overall, reward engineering is a crucial part of designing an effective `RL` agent.
    A well-designed reward function can encourage the desired behavior and lead to
    optimal performance, while a poorly designed reward function can lead to suboptimal
    behavior and may even encourage undesired behavior.'
