    ### 3.1 使用动态规划求解马尔可夫奖励过程问题


    为了开始学习动态规划算法，我们首先关注马尔可夫奖励过程（MRP）的情况。它比马尔可夫决策过程（MDP）简单得多，因为过程中不涉及任何动作。我们仍然聚焦于在第
    2 章中介绍的服务犬 MRP 问题。


    在马尔可夫奖励过程（MRP）中，状态值函数的贝尔曼方程表示为：


    ![$$\displaystyle \begin{aligned} V(s)=R(s) + {\gamma} \sum_{s'' \in \mathcal{S}}
    P(s''|s) V(s''), \quad \mbox{for all}\; s \in \mathcal{S} \end{aligned} $$](img/605748_1_En_3_Chapter_TeX_Equa.png)


    这里，`γ` 是折扣率；`R(s)` 是从环境获得的奖励；`P(s'' | s)` 是环境的动态函数，它指定了从状态 `s` 转移到 `s''` 的概率；`V(s'')`
    是后继状态的值。


    如果我们能够访问 MRP 的真实模型，就可以使用动态规划方法来计算 MRP 不同状态的状态值。动态规划算法的工作原理是：在每次迭代中遍历 MRP 的整个状态空间，利用后继状态的奖励和折扣值来计算并更新每个状态的状态值。这个过程会重复大量迭代，直到获得真实的状态值。该算法的伪代码如算法
    1 所示，这正是我们在第 2 章中用于计算服务犬 MRP 状态值的算法，如图 2.7 所示。


    算法 1：动态规划计算 MRP 的状态值函数


    ![](img/605748_1_En_3_Figaaa_HTML.gif) 一段三行代码，标题为“DP compute state value function
    for MRP”，以折扣率 `gamma` 作为输入，输出 MRP 的状态值函数 `V`。


    但强化学习主要关注的是求解马尔可夫决策过程（MDP），这涉及智能体在学习过程中做出决策。在本章的剩余部分，我们将重点讨论如何使用动态规划算法来求解 MDP。


    ### 3.2 策略评估


    求解强化学习或 MDP 问题的目标是找到最优策略 `π*`。然而，在开始搜索最优策略之前，我们先考虑一个更简单的问题：给定两个不同的策略 `π` 和 `π''`，我们如何判断哪个更好？


    为了回答这个问题，我们可以使用状态值函数 `Vπ`。值函数通过衡量从某个状态开始并遵循策略 `π` 所获得的期望回报，来评估智能体处于该状态的好坏程度。如果我们对策略
    `π` 和 `π''` 各自的状态值函数有准确的估计，就可以衡量这两个策略之间的差异。当对于状态空间中的所有状态 `s`，期望回报 `Vπ''(s)` 大于或等于
    `Vπ(s)` 时，我们就说策略 `π''` 与策略 `π` 一样好或更好：


    ![$$\displaystyle \begin{aligned} \pi'' \ge \pi \quad \mbox{if}\; V_{\pi''}(s)
    \ge V_\pi(s), \quad \mbox{for all}\; s \in \mathcal{S} \end{aligned}$$](img/605748_1_En_3_Chapter_TeX_Equb.png)


    我们可以利用 `Vπ` 的贝尔曼方程和环境模型来估计策略 `π` 下单个状态 `s` 的值。为了计算状态空间中每个状态的值，我们可以通过迭代地使用 `Vπ`
    的贝尔曼方程和环境模型来计算状态空间中每个状态的值，从而推广这一过程。这个过程被称为*策略评估*。该算法估计任意策略 `π` 的状态值函数 `Vπ`。策略评估也被称为预测，因为它预测了策略
    `π` 的状态值函数。


    策略评估算法的核心是 `Vπ` 的贝尔曼方程：


    ![$$\displaystyle \begin{aligned} V_\pi(s) &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} V_\pi(S_{t+1}) \;\Big|\;S_t=s\right] \\ &amp; =\sum_{a \in A} \pi(a|s)
    \Big[R(s, a) + {\gamma} \sum_{s'' \in \mathcal{S}} P(s''|s, a) V_\pi(s'') \Big],
    \quad \mbox{for all}\; s \in \mathcal{S} {} \end{aligned} $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_Equ1.png)


    (3.1)

    '
- fmt: '该算法使用贝尔曼方程作为更新规则，并在值更新过程中使用环境模型（动力学函数和奖励函数）。理论上，如果我们无限运行该算法，计算出的值将收敛到策略`π`的真实值。需要注意的是，只要算法满足特定条件（例如运行无限次迭代且折扣因子小于1），就能保证收敛。收敛速度取决于策略和问题实例。


    例如，考虑一个简单的网格世界，其中包含一个目标状态和一个陷阱状态，如图3.1所示。智能体到达目标状态获得+1奖励，掉入陷阱状态获得-1奖励。所有其他状态转移的奖励为0。智能体在每个状态有四个可用动作：上、下、左、右。假设我们有一个任意策略，该策略始终向上移动，但在目标状态停止。我们可以使用策略评估来估计该策略的值函数，然后与其他策略进行比较。通过对网格世界中的每个状态重复贝尔曼更新方程，我们可以估计给定策略下每个状态的值。这个过程可以迭代重复，直到收敛。最终的状态值函数可以帮助我们衡量策略的质量，并识别可以改进策略的区域。例如，在网格世界问题中，如果发现陷阱正上方状态的值高于陷阱正下方状态的值，我们可以推断在该特定状态下向下移动比向上移动更好，以避免陷阱。


    总体而言，策略评估是强化学习中的重要算法，因为它允许我们估计给定策略的值函数，这是解决强化学习问题的关键步骤。值得注意的是，还有其他方法（如蒙特卡洛和时间差分学习）可用于估计值函数，但策略评估是一种基础方法，构成了许多其他强化学习算法的基础。


    该算法接受一个任意策略`π`、一个折扣因子`γ`和一个决定停止标准的小阈值`ε`。算法从所有状态的初始估计值为零开始，然后迭代，直到估计值收敛到输入策略`π`的真实状态值。具体来说，算法通过使用当前策略`π`选择下一个动作，对下一时间步获得的即时奖励和下一状态的估计值进行加权平均，来更新每个状态的估计值，这体现在公式(3.2)中。


    ```

    V_π^{k+1}(s) ← Σ_{a ∈ A} π(a|s) [R(s, a) + γ Σ_{s'' ∈ S} P(s''|s, a) V_π^k(s'')]

    ```


    (3.2) 其中`V_π^k(s)`是状态`s`在第`k`次迭代的估计值，`π(a|s)`是在策略`π`下在状态`s`中选择动作`a`的概率，`P(s''|s,
    a)`是转移到后继状态`s''`的概率，`R(s, a)`是智能体在状态`s`采取动作`a`时环境提供的奖励。算法对所有状态重复此更新，直到所有状态的更新值与先前估计值之间的差异小于`ε`。该阈值决定了停止标准，并确保算法在估计值收敛到真实值时终止。


    ![一个6x8的网格，第二行第七个单元格标记为+1，第五行第四个单元格标记为-1。](images/605748_1_En_3_Chapter/605748_1_En_3_Fig1_HTML.png)


    图3.1 网格世界示例


    算法2：策略评估，迭代算法


    ![一个标题为“策略评估，迭代算法”的算法，输入为待评估的策略π、折扣率γ和决定估计精度的小阈值ε，输出为输入策略π的估计状态值函数V_π。](images/605748_1_En_3_Chapter/605748_1_En_3_Figaab_HTML.gif)


    在策略评估算法的每次迭代中，智能体遍历状态空间中的所有状态。对于每个状态，智能体可以选择多个动作，每个动作根据策略`π`有不同的选择概率。从每个动作`a`开始，环境可能转移到多个后继状态`s''`之一，转移概率`p`取决于当前状态`s`和智能体采取的动作`a`。这是可能的，因为智能体可以访问环境的真实模型，即每个状态-动作对的奖励信号`R(s,a)`和转移概率`P(s''|s,a)`。该算法使用公式(3.1)作为备份规则，该规则对所有可能的结果进行平均，并按各自的概率加权。'
  raw: 'The algorithm uses the Bellman equation as an update rule and also uses the
    model (dynamics function and reward function) of the environment during the value
    update. In theory, the computed values will converge to the true values for the
    policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq36.png)
    if we run the algorithm forever. It is important to note that the convergence
    is guaranteed as long as the algorithm satisfies certain conditions, such as being
    run for an infinite number of iterations and the discount factor being less than
    one. The convergence rate can depend on the policy and the problem instance.


    For example, consider a simple grid world with a goal state and a pitfall state,
    as shown in Fig. [3.1](#605748_1_En_3_Chapter.xhtml#Fig1). The agent receives
    a reward of +1 for reaching the goal state and a reward of ![$$-1$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq37.png)
    for falling into the pitfall state. All other state transitions have a reward
    of 0\. The agent has four actions available in each state: up, down, left, and
    right. Suppose we have an arbitrary policy that always moves up, except in the
    goal state where it stops. We can use policy evaluation to estimate the value
    function for this policy and then compare it with other policies. By repeating
    the Bellman update equation for each state in the grid world, we can estimate
    the value of each state for the given policy. This process can be repeated iteratively
    until convergence is achieved. The resulting state value function can help us
    to measure the quality of the policy and identify areas where the policy can be
    improved. For example, in the grid world problem, if we find that the value of
    the state immediately above the pitfall is higher than the value of the state
    immediately below it, we can infer that it would be better to move down instead
    of up in this particular state, to avoid the pitfall.


    Overall, policy evaluation is an important algorithm in reinforcement learning
    as it allows us to estimate the value function of a given policy, which is a crucial
    step in solving reinforcement learning problems. It is worth noting that there
    are other methods, such as Monte Carlo and temporal difference learning, that
    can be used to estimate the value function, but policy evaluation is a fundamental
    approach that forms the basis of many other reinforcement learning algorithms.


    The algorithm takes an arbitrary policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq38.png)
    , a discount factor ![$${\gamma }$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq39.png)
    , and a small threshold ![$$\epsilon $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq40.png)
    which determines the stopping criterion. The algorithm starts with an initial
    estimated value of zero for all states and then iterates until the estimated values
    converge to the true state value for the input policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq41.png)
    . Specifically, the algorithm updates the estimated value of each state by taking
    a weighted average of the immediate reward obtained in the next time step and
    the estimated value of the next state, using the current policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq42.png)
    to select the next action, which is captured in Eq. ([3.2](#605748_1_En_3_Chapter.xhtml#Equ2)).


    ![$$\displaystyle \begin{aligned} V_\pi^{k+1}(s) \leftarrow \sum_{a \in A} \pi(a|s)
    \Bigl[R(s, a) + {\gamma} \sum_{s'' \in \mathcal{S}} P(s''|s, a) V_\pi^k(s'') \Bigr]
    {} \end{aligned} $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_Equ2.png)


    (3.2) where ![$$V_\pi ^k(s)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq43.png)
    is the estimated value of state *s* at iteration *k*, ![$$\pi (a|s)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq44.png)
    is the probability of selecting action *a* in state *s* under policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq45.png)
    , ![$$P(s''|s, a)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq46.png)
    is the probability of transitioning to successor state ![$$s''$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq47.png)
    , and ![$$R(s, a)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq48.png)
    is the reward provided by the environment when the agent takes action *a* in state
    *s*. The algorithm repeats this update for all states until the difference between
    the updated and previous estimated values for all states is less than ![$$\epsilon
    $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq49.png) . This threshold
    determines the stopping criterion and ensures that the algorithm terminates when
    the estimates have converged to the true values.


    ![](images/605748_1_En_3_Chapter/605748_1_En_3_Fig1_HTML.png)


    A 6-cross-8 grid is labeled + 1 in the seventh cell of the second row and negative
    1 in the fourth cell of the fifth row.


    Fig. 3.1


    Example of a grid world


    Algorithm 2: Policy evaluation, iterative algorithm


    ![](images/605748_1_En_3_Chapter/605748_1_En_3_Figaab_HTML.gif) An algorithm titled
    policy evaluation, iterative algorithm takes in the following inputs to give an
    estimated state value function V pie for the input policy pie as the output. Policy
    pie to be evaluated, discount rate gamma, and a small threshold epsilon determining
    the accuracy of the estimation.


    For each iteration of the policy evaluation algorithm, the agent sweeps over all
    states in the state space. For each state, the agent may choose from multiple
    actions, each with a different probability of being selected according to the
    policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq50.png)
    . From each action *a*, the environment may transition to one of several successor
    states ![$$s''$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq51.png)
    , with a transition probability *p* that depends on the current state *s* and
    the action *a* taken by the agent. This is possible since the agent has access
    to the true model of the environment, that’s the reward signal ![$$R(s,a)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq52.png)
    and transition probability ![$$P(s''|s,a)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq53.png)
    for each state-action pair. The algorithm uses Eq. ([3.1](#605748_1_En_3_Chapter.xhtml#Equ1))
    as a backup rule, which takes the average over all possible outcomes, weighted
    by their respective probabilities.'
