    # 3. Dynamic Programming


    The ultimate goal of modeling a reinforcement learning problem using Markov decision
    processes (MDPs) is that we can use the Bellman equations to find an optimal policy
    ![$$\pi _*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq3.png)
    that maximizes the expected cumulative reward. However, finding such a policy
    is not always straightforward. In this chapter, we’ll introduce dynamic programming
    (DP) algorithms as a way to find the optimal policy ![$$\pi _*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq4.png)
    when we have access to a perfect model of the environment.


    Dynamic programming (DP) is a mathematical optimization method developed by Richard
    Bellman in the 1950s [[1](#605748_1_En_3_Chapter.xhtml#CR1)]. The core idea of
    dynamic programming is to break down a complex problem into simpler subproblems
    and solve them in a recursive manner. This approach is particularly useful for
    problems that exhibit overlapping subproblems and optimal substructure, meaning
    that the solution to a subproblem can be used to solve the overall problem.


    In the context of reinforcement learning, dynamic programming algorithms can help
    an agent find the optimal value functions ![$$V_*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq5.png)
    and ![$$Q_*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq6.png)
    .


    The Bellman equations, which we introduced in Chap. [2](#605748_1_En_2_Chapter.xhtml),
    provide a recursive way to compute the value functions ![$$V_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq7.png)
    and ![$$Q_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq8.png)
    . Specifically, the Bellman equations express the value of a state or state-action
    pair in terms of the expected immediate reward and the expected value of the next
    state or state-action pair under the current policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq9.png)
    . This recursive formulation allows us to compute the value functions iteratively,
    starting with an initial guess and updating the values until convergence to ![$$V_*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq10.png)
    and ![$$Q_*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq11.png)
    .


    However, to find the true optimal value functions using DP algorithms, the agent
    needs to have access to the perfect model of the environment, which means that
    DP algorithms are model-based reinforcement learning methods.


    Additionally, DP algorithms can be computationally expensive, especially for problems
    with large state and action spaces. As a result, other RL methods, such as Monte
    Carlo methods and temporal difference learning which we’ll introduce later in
    this book, have been developed to overcome these limitations.


    Overall, DP algorithms provide a powerful framework for solving reinforcement
    learning problems when a perfect model of the environment is available. By breaking
    down the problem into simpler subproblems and using the Bellman equations to compute
    the value functions, we can find the optimal policy ![$$\pi _*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq12.png)
    that maximizes the expected cumulative reward.'
