    ![$$\epsilon $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq116.png)
    is multiplied by a decay factor after each episode or time step.


    In summary, the ![$$\epsilon $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq117.png)
    -greedy policy is a simple yet effective way to balance exploration and exploitation
