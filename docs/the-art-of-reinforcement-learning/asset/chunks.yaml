    Monte Carlo policy evaluation estimates ![$$Q_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq66.png)
    by generating many episodes of the Markov decision process (MDP) under the policy
    ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq67.png)
    , then computing the average return for each state-action pair. Specifically,
    for each episode, the agent starts in an initial state ![$$s_0$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq68.png)
    and takes actions according to the policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq69.png)
    until it reaches a terminal state. At each time step *t*, the agent observes the
    current state ![$$S_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq70.png)
    , takes an action ![$$A_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq71.png)
    according to the policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq72.png)
    , and receives a reward ![$$R_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq73.png)
    . The agent continues to take actions and receive rewards until it reaches a terminal
    state, where the episode ends.


    Table 4.2


    State values computed using first-visit Monte Carlo policy evaluation and first-visit
    Monte Carlo policy evaluation with incremental update, for the same random policy
    for the service dog MDP. Results were averaged over 100 independent runs; each
    run is over 2000 episodes; the last row contains true state values computed using
    DP policy evaluation. We use the same discount ![$${\gamma }=0.9$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq74.png)
    in this experiment


    |   | Room 1 | Room 2 | Room 3 | Outside | Found item |

    | --- | --- | --- | --- | --- | --- |

    | First-visit MC | − 2.67 | − 1.85 | 3.17 | − 3.33 | 0 |

    | Incr. first-visit MC | − 2.65 | − 1.84 | 3.16 | − 3.34 | 0 |

    | DP | − 2.66 | − 1.85 | 3.17 | − 3.33 | 0 |


    After generating multiple episodes, Monte Carlo policy evaluation computes the
    average return ![$$G_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq75.png)
    for each state-action pair ![$$(s, a)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq76.png)
    that has been visited during the episodes. This is done by averaging the returns
    obtained after each visit to the pair ![$$(s, a)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq77.png)
    , where the return is the sum of discounted rewards from that time step until
    the end of the episode:


    ![$$\displaystyle \begin{aligned} G_t = R_t + {\gamma} R_{t+1} + {\gamma}^2 R_{t+2}
    + \cdots + {\gamma}^{T-1-t} R_{T-1} {} \end{aligned} $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_Equ3.png)


    (4.3)


    Here, *T* is the time step at which the episode ends, and ![$${\gamma }$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq78.png)
    is the discount factor that determines the importance of future rewards relative
    to immediate rewards.


    Once we have computed the average return ![$$G_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq79.png)
    for each state-action pair ![$$(s, a)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq80.png)
    , we can update the estimate of ![$$Q_\pi (s, a)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq81.png)
    using the incremental update rule:


    ![$$\displaystyle \begin{aligned} Q_\pi(S_t, A_t) = Q_\pi(S_t, A_t) + \frac{1}{N(S_t,
    A_t)} \Big( G_t - Q_\pi(S_t, A_t) \Big) {} \end{aligned} $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_Equ4.png)


    (4.4)


    Here, ![$$N(S_t, A_t)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq82.png)
    is the number of times the state-action pair ![$$(S_t, A_t)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq83.png)
    has been visited during the episodes.


    The first-visit Monte Carlo policy evaluation is one way to implement Monte Carlo
    policy evaluation for estimating ![$$Q_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq84.png)
    , which estimates the value of each state-action pair by averaging the returns
    obtained after the first visit to that pair. The algorithm is as follows:


    Algorithm 4: First-visit Monte Carlo policy evaluation with incremental update
    for *Q*[*π*]


    ![](images/605748_1_En_4_Chapter/605748_1_En_4_Figaad_HTML.gif) An 8-line algorithm
    titled first-visit Monte Carlo policy evaluation with incremental update for Q
    pie takes the following input and gives an estimated state value function Q pie
    for the input policy pie as the output. Policy pie to be evaluated, discount rate
    gamma, and number of episodes K.


    Figure [4.3](#605748_1_En_4_Chapter.xhtml#Fig3) shows the state-action values
    we’ve computed using Algorithm 4 for a random policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq85.png)
    for the service dog MDP. As usual, the results were averaged over 100 independent
    runs; each run is over 2000 episodes. Notice the state values were computed using
    DP policy evaluation. And we use discount ![$${\gamma }=0.9$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq86.png)
    in this experiment.


    We can verify the results by computing the state values using these state-action
    values. Recall that the state value is just the weighted sum over all state-action
    values for this state.


    ![$$\displaystyle \begin{aligned} V_\pi(s)=\sum_{a \in A} \pi(a|s) Q_\pi(s, a)
    {} \end{aligned} $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_Equ5.png)


    (4.5)


    ![](images/605748_1_En_4_Chapter/605748_1_En_4_Fig3_HTML.png)


    A nodal map runs as follows. Negative 2.7, negative 1.8 via q pie = negative 2.65,
    3.0 via q pie = 1.86, and 0.0 via q pie = 10.0\. 3.0 reverts to negative 1.8 via
