    \mathcal{S}}P(s''|s, a) \Bigl[ R(s, a, s'') + {\gamma} \sum_{a'' \in A} \pi(a''|s'')
    Q_\pi(s'', a'') \Bigr], \quad \mbox{for all}\; s \in \mathcal{S}, a \in A {} \end{aligned}
    $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ19.png)


