    It’s fairly easy to extend the N-step bootstrapping method for state-action value
    function ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq385.png)
    . In this case, we update values based on state-action pairs, and for the last
    successor state ![$$S_{t+n}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq386.png)
    , we also need the action ![$$A_{t+n}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq387.png)
    :


    ![$$\displaystyle \begin{aligned} Q_\pi(S_t, A_t) ={} &amp; Q_\pi(S_t, A_t) +
    \alpha \bigg( \Big[ R_t + {\gamma} R_{t+1} + \cdots + {\gamma}^{n-1}R_{t+n-1}
    \\ &amp; + {\gamma}^n Q_\pi(S_{t+n}, A_{t+n}) \Big] - Q_\pi(S_t, A_t) \bigg) {}
    \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ24.png)


    (5.24)


    Here, ![$$\alpha $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq388.png)
    is the step size parameter, ![$${\gamma }$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq389.png)
    is the discount factor, and *t* is the current time step.


    We now introduce the N-step SARSA on-policy learning algorithm, which builds on
    the basic structure of SARSA. However, to compute returns for an arbitrary number
    of N-step, we need to make some changes. This means the values are not updated
    immediately when the agent makes a decision in the environment. Instead, it has
    to continue acting in the environment for *N* steps before it collects the required
    sample transitions for the N-step return.


    To store the necessary sample transitions, we choose to use a list ![$$\tau $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq390.png)
    that stores tuples of the form ![$$(s, a, r, s'', a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq391.png)
    , where *s* and ![$$s''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq392.png)
    are the current and next states, respectively; *a* and ![$$a''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq393.png)
    are the current and next actions, respectively; and *r* is the reward received
    for taking action *a* in state *s*. The maximum length of ![$$\tau $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq394.png)
    is *N*. We use ![$$(s, a, r, s'', a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq395.png)
    instead of ![$$(s, a, r, s'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq396.png)
    because we also need the action ![$$A_{t+n}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq397.png)
    for the last successor state ![$$S_{t+n}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq398.png)
    to complete Eq. ([5.24](#605748_1_En_5_Chapter.xhtml#Equ24)).


    The agent only updates the value for the first state-action pair in ![$$\tau $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq399.png)
    if the length of ![$$\tau $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq400.png)
    reaches the maximum length, or if it’s at the end of an episode, as is the case
    for episodic reinforcement learning problems. This is because the subsequent state-action
    pairs in ![$$\tau $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq401.png)
    are used to compute the N-step return for the first state-action pair, and the
    value update is only performed after the N-step return has been computed.


    Algorithm 9: N-step on-policy SARSA with *𝜖*-greedy policy for exploration


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Figaai_HTML.gif) A 7-line algorithm
    titled N-step on-policy S A R S A with epsilon minus greedy for exploration takes
    in the following inputs to give an optimal state-action value function Q pie as
    the output. Discount rate gamma, initial exploration rate epsilon, step size alpha,
    N step n where N is greater than equal to 1, and number of steps K.


    We applied the N-step SARSA algorithm to our service dog Markov decision process
    (MDP) and obtained results that were averaged over 100 independent runs, each
    consisting of 1000 updates. The algorithm used a step size of ![$$\alpha =0.01$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq402.png)
    , a discount rate of ![$${\gamma }=0.9$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq403.png)
    , and a decayed exploration rate ![$$\epsilon $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq404.png)
    that started at 1.0 and decreased to 0.01 over the course of 1000 updates. The
    results are shown in Table [5.4](#605748_1_En_5_Chapter.xhtml#Tab4). Increasing
    the N-step value from 1 to 2 and 3 resulted in state values for *Room 1* and *Room
    2* that were closer to the true state values computed using DP policy iteration
    (as shown in the last row of Table [5.4](#605748_1_En_5_Chapter.xhtml#Tab4)).
    However, the values for state *Room 3* and *Outside* did not improve significantly.
    This is because our service dog MDP is a very simple problem, and under the optimal
    policy, the length of an episode sequence is only 3\. Therefore, using an N-step
    value greater than 3 does not improve the results.


    ### N-Step Q-Learning


    N-step Q-learning is a variant of the traditional Q-learning algorithm that updates
    the Q-values based on the returns observed over a sequence of N time steps. By
    incorporating a longer sequence of experiences, N-step Q-learning can lead to
    more efficient learning and better performance in some environments. For example,
    in environments where rewards are sparse or delayed, using a longer sequence of
    experiences can help the agent learn faster and make better decisions. Returns
    refer to the total discounted reward accumulated by the agent over time.


    Table 5.4


    Optimal state value for the service dog MDP after running the N-step SARSA algorithm
    for different *N*. Results were averaged over 100 independent runs; each run is
    only over 1000 updates. We use discount ![$${\gamma }=0.9$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq405.png)
    , step size ![$$\alpha =0.01$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq406.png)
    , and decay ![$$\epsilon $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq407.png)
    from 1.0 to 0.01 over the course of 1000 updates. The last row contains true ![$$V_*$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq408.png)
    computed using DP policy iteration


    | N-steps | Room 1 | Room 2 | Room 3 | Outside | Found item |

    | --- | --- | --- | --- | --- | --- |

    | 1 | 0.28 | 3.49 | 8.17 | 0.0 | 0 |

    | 2 | 2.07 | 6.26 | 8.58 | 0.16 | 0 |

    | 3 | 3.86 | 6.25 | 8.6 | 1.06 | 0 |

    | 4 | 3.8 | 6.45 | 8.59 | 0.94 | 0 |

    | 5 | 4.14 | 6.41 | 8.59 | 1.25 | 0 |

    | DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |


    However, N-step Q-learning is more complex than standard Q-learning and requires
    the use of importance sampling to adjust for differences between the behavior
    and target policies.'
  trans: '

    ### N 步 SARSA


    将 N 步自举法扩展到状态-动作价值函数 `Q_pi` 相当简单。在这种情况下，我们基于状态-动作对来更新值，并且对于最后一个后继状态 `S_{t+n}`，我们还需要动作
    `A_{t+n}`：


    ```

    Q_pi(S_t, A_t) = Q_pi(S_t, A_t) + alpha * ( [R_t + gamma * R_{t+1} + ... + gamma^{n-1}
    * R_{t+n-1} + gamma^n * Q_pi(S_{t+n}, A_{t+n})] - Q_pi(S_t, A_t) )

    ```


    (5.24)


    这里，`alpha` 是步长参数，`gamma` 是折扣因子，`t` 是当前时间步。


    我们现在介绍 N 步 SARSA 同策略学习算法，它建立在 SARSA 的基本结构之上。然而，为了计算任意 N 步的回报，我们需要做一些改动。这意味着当智能体在环境中做出决策时，值不会立即更新。相反，它必须在环境中持续行动
    `N` 步，才能收集到计算 N 步回报所需的样本转移。


    为了存储必要的样本转移，我们选择使用一个列表 `tau`，它存储形式为 `(s, a, r, s'', a'')` 的元组，其中 `s` 和 `s''` 分别是当前状态和下一状态；`a`
    和 `a''` 分别是当前动作和下一动作；`r` 是在状态 `s` 下采取动作 `a` 获得的奖励。`tau` 的最大长度为 `N`。我们使用 `(s, a,
    r, s'', a'')` 而不是 `(s, a, r, s'')`，因为对于最后一个后继状态 `S_{t+n}`，我们还需要动作 `A_{t+n}` 来完成公式
    (5.24)。


    只有当 `tau` 的长度达到最大长度，或者智能体处于一个回合的末尾时（对于情节式强化学习问题而言），智能体才会更新 `tau` 中第一个状态-动作对的值。这是因为
    `tau` 中后续的状态-动作对被用来计算第一个状态-动作对的 N 步回报，并且只有在计算出 N 步回报之后才会执行值更新。


    **算法 9：使用 epsilon-贪婪策略进行探索的 N 步同策略 SARSA**


    一个名为“使用 epsilon-贪婪进行探索的 N 步同策略 SARSA”的 7 行算法，接收以下输入，并输出最优状态-动作价值函数 `Q_pi`：折扣率
    `gamma`，初始探索率 `epsilon`，步长 `alpha`，N 步 `n`（其中 `N >= 1`），以及步数 `K`。


    我们将 N 步 SARSA 算法应用于我们的服务犬马尔可夫决策过程（MDP），并获得了在 100 次独立运行中平均的结果，每次运行包含 1000 次更新。该算法使用的步长为
    `alpha = 0.01`，折扣率为 `gamma = 0.9`，以及一个衰减的探索率 `epsilon`，该值从 1.0 开始，在 1000 次更新过程中逐渐减小到
    0.01。结果如表 5.4 所示。将 N 步值从 1 增加到 2 和 3，使得*房间 1*和*房间 2*的状态值更接近使用 DP 策略迭代计算出的真实状态值（如表
    5.4 最后一行所示）。然而，状态*房间 3*和*室外*的值并没有显著改善。这是因为我们的服务犬 MDP 是一个非常简单的问题，在最优策略下，一个回合序列的长度仅为
    3。因此，使用大于 3 的 N 步值并不会改善结果。


    ### N 步 Q 学习


    N 步 Q 学习是传统 Q 学习算法的一种变体，它基于在 N 个时间步序列上观察到的回报来更新 Q 值。通过整合更长的经验序列，N 步 Q 学习可以在某些环境中带来更高效的学习和更好的性能。例如，在奖励稀疏或延迟的环境中，使用更长的经验序列可以帮助智能体更快地学习并做出更好的决策。回报指的是智能体随时间累积的总折扣奖励。


    **表 5.4** 针对不同 `N` 值运行 N 步 SARSA 算法后，服务犬 MDP 的最优状态值。结果是在 100 次独立运行中平均得到的；每次运行仅包含
    1000 次更新。我们使用折扣率 `gamma = 0.9`，步长 `alpha = 0.01`，以及 `epsilon` 在 1000 次更新过程中从 1.0
    衰减到 0.01。最后一行包含使用 DP 策略迭代计算出的真实 `V_*` 值。


    | N 步 | 房间 1 | 房间 2 | 房间 3 | 室外 | 找到物品 |

    | --- | --- | --- | --- | --- | --- |

    | 1 | 0.28 | 3.49 | 8.17 | 0.0 | 0 |

    | 2 | 2.07 | 6.26 | 8.58 | 0.16 | 0 |

    | 3 | 3.86 | 6.25 | 8.6 | 1.06 | 0 |

    | 4 | 3.8 | 6.45 | 8.59 | 0.94 | 0 |

    | 5 | 4.14 | 6.41 | 8.59 | 1.25 | 0 |

    | DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |


    然而，N 步 Q 学习比标准 Q 学习更复杂，并且需要使用重要性采样来调整行为策略和目标策略之间的差异。

