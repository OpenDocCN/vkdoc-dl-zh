  trans: "\n# 5.2 时序差分策略评估\n\n一如既往，我们遵循第 3 章介绍的一般策略迭代模板。第一步是进行策略评估，即针对给定的（固定）策略 `π`，估计其状态价值函数\
    \ `V_π`（或状态-动作价值函数 `Q_π`）。由于 TD 学习是一种无模型强化学习方法，智能体将利用遵循策略 `π` 时生成的经历来学习这些价值函数。\n\
    \n为了使用 TD 学习估计状态价值函数，我们从 `V_π(s)` 的方程入手，该方程表示从状态 `s` 出发并遵循策略 `π` 时的期望回报。蒙特卡洛方法使用折扣奖励的总和来估计整个回合序列的回报。或者，该方程可以用递归方式重写，如公式\
    \ (5.2) 所示，这为我们揭示了 TD 学习方法的工作原理。TD 学习方法使用一个 `(s, a, r, s')` 元组来更新特定状态的估计值，这正是完成公式\
    \ (5.2) 所需的。\n\n```\nV_π(s) = E_π[G_t | S_t = s]\n       = E_π[R_t + γ R_{t+1}\
    \ + γ² R_{t+2} + ... | S_t = s]\n       = E_π[R_t + γ G_{t+1} | S_t = s]\n```\n\
    \n(5.1)\n\n```\n       = E_π[R_t + γ V_π(S_{t+1}) | S_t = s]\n```\n\n(5.2)\n\n\
    正如本章前面所介绍的，TD 学习方法只需要一个 `(s, a, r, s')` 元组来更新状态 `s` 的价值。这正是完成公式 (5.2) 所需的。期望符号提醒我们，需要收集大量样本来计算从状态\
    \ `s` 出发并遵循策略 `π` 时的期望回报。\n\n接下来，我们需要引入增量更新方法。增量更新方法的一般形式是：\n\n```\n新估计值 = 旧估计值\
    \ + 步长 [目标值 - 旧估计值]\n```\n\n这里，“步长”代表学习率，“目标值”代表 TD 目标。为了更新状态 `s` 的价值估计，我们使用增量更新方法，其中\
    \ TD 目标为 `R_t + γ V(S_{t+1})`，它代表从当前状态出发的估计回报。TD 目标与当前估计值 `V(S_t)` 之间的差值称为 TD\
    \ 误差，它也用于更新价值函数估计。TD 学习的更新规则如公式 (5.3) 所示：\n\n```\nV_π(S_t) = V_π(S_t) + α (G_t\
    \ - V_π(S_t))\n         = V_π(S_t) + α ([R_t + γ V_π(S_{t+1})] - V_π(S_t))\n```\n\
    \n(5.3)\n\n这里，`α` 是 TD 学习的学习率。TD 误差为 `R_t + γ V_π(S_{t+1}) - V_π(S_t)`，其中 `R_t\
    \ + γ V_π(S_{t+1})` 代表状态 `S_t` 的估计回报。通过使用这个更新规则，我们可以基于观察到的即时奖励和后续状态的折扣（估计）价值，迭代地改进对状态价值的估计。\n\
    \n在 TD 学习中，智能体不会记录状态的总访问次数，因此我们不能使用 `1/N(S_t)` 作为步长。相反，我们需要手动设置步长 `α` 的值。`α` 的选择会对学习性能和稳定性产生显著影响，并且有多种启发式方法和策略来适当地设置它。\n\
    \n现在我们有了更新规则的公式，可以介绍用于策略评估的 TD 学习算法，如算法 1 所示。有时人们也将其称为 TD(0) 策略评估算法，因为它使用即时奖励和后续状态的折扣价值来估计价值，而不需要向未来额外步进。其总体思路类似于蒙特卡洛策略评估，即智能体在遵循策略\
    \ `π` 的同时收集一个样本转移。然而，这里我们只需要一个 `(s, a, r, s')` 元组，而不是完整的回合序列。这就是 TD 方法也适用于持续强化学习问题的原因。\n\
    \n在蒙特卡洛方法中，我们根据智能体需要完成的样本回合数来运行算法。但 TD 学习也可以应用于无法衡量回合数的持续强化学习问题。一个简单的解决方案是统计运行的总时间步数（或环境步数）。通常，对于回合制环境，这个方案也比单纯统计回合数更好，因为每个回合的总步数可能不同。\n\
    \n**算法 1：针对 `V_π` 的时序差分 [TD(0)] 策略评估**\n\n一个用于时序差分 TD(0) 和 `V_π` 策略评估的 9 行算法，接收以下输入，并输出针对输入策略\
    \ `π` 的估计状态价值函数 `V_π`：待评估的策略 `π`、折扣率 `γ`、步长 `α` 以及步数 `K`。\n\n![服务犬 MDP 的流程图，流程经过房间\
    \ 1、2 和 3 以到达找到的物品。房间 3 返回房间 2，房间 2 返回房间 1。房间 2 通过 r = 0 指向室外，室外通过 r = 0 返回房间\
    \ 2。室外通过 r = -1 返回自身。](img/605748_1_En_5_Fig1_HTML.png)\n\n**图 5.1** 服务犬 MDP\n"
- fmt: "### Worked Example\n\nTo better understand how the TD policy evaluation algorithm\
    \ works, let’s look at an example using the service dog MDP that we introduced\
    \ in Chap. [2](#605748_1_En_2_Chapter.xhtml). Recall the diagram for the service\
    \ dog MDP shown in Fig. [5.1](#605748_1_En_5_Chapter.xhtml#Fig1).\n\nAssuming\
    \ that the agent is following a (fixed) random policy `π`, we use a step size\
    \ of `α = 0.01` and no discount (`γ = 1.0`) in this experiment. We start with\
    \ an initial estimated value of 0 for all states. Since TD is a model-free reinforcement\
    \ learning method, the agent doesn’t know beforehand the reward signal it will\
    \ receive when taking any action, nor does it know the successor state. We want\
    \ to see how the algorithm updates the estimated values for the different states.\n\
    \nSuppose we’re looking at the first time step `t = 0` of the first episode, where\
    \ the current state of the environment is `S_t = Room 2`, and the agent chooses\
    \ action `A_t = Go to room 3` according to policy `π`. It receives an immediate\
    \ reward of `R_t = -1` and the successor state `S_{t+1} = Room 3` from the environment.\
    \ We now have the tuple `(S_t, A_t, R_t, S_{t+1})`, which is what we need to update\
    \ the estimated value for state `S_t = Room 2`. Here’s how we update it:\n\n```\n\
    Vπ(Room 2) = Vπ(Room 2) + α [ R_t + γ Vπ(Room 3) - Vπ(Room 2) ]\n           =\
    \ 0 + 0.01 * (-1 + 0 - 0)\n           = -0.01\n```\n\nAfter the update, the agent\
    \ continues to act in the environment following policy `π`. The current state\
    \ of the environment becomes `S_t = Room 3`, the agent chooses action `A_t = Search`\
    \ according to policy `π`, and it receives an immediate reward of `R_t = 10`.\
    \ The successor state `S_{t+1} = Found item` is also a terminal state, so the\
    \ current episode is over. We now have the tuple `(S_t, A_t, R_t, S_{t+1})` to\
    \ update the estimated value for state `S_t = Room 3`. Here’s how we do it:\n\n\
    ```\nVπ(Room 3) = Vπ(Room 3) + α [ R_t + γ Vπ(Found item) - Vπ(Room 3) ]\n   \
    \        = 0 + 0.01 * (10 + 0 - 0)\n           = 0.1\n```\n\nIn a new episode,\
    \ if the agent is again in environment state `S_t = Room 2` and chooses action\
    \ `A_t = Go to room 3` according to policy `π`, it receives an immediate reward\
    \ of `R_t` and the successor state `S_{t+1} = Room 3` from the environment. We\
    \ can update the estimated value for `Vπ(Room 2)` as follows:\n\n```\nVπ(Room\
    \ 2) = Vπ(Room 2) + α [ R_t + γ Vπ(Room 3) - Vπ(Room 2) ]\n           = -0.01\
    \ + 0.01 * [ -1 + 0.1 - (-0.01) ]\n           = -0.019\n```\n\nWe can repeat this\
    \ process over and over. Table [5.1](#605748_1_En_5_Chapter.xhtml#Tab1) shows\
    \ the state values for the random policy after running the TD(0) policy evaluation\
    \ algorithm with different numbers of updates. The results are averaged over 100\
    \ independent runs, and we also include the true state values computed using DP\
    \ policy evaluation (last row). After 10,000 updates, the estimated state values\
    \ are getting very close to the true state values.\n\nThe key takeaway from these\
    \ results is that the TD(0) algorithm can learn accurate estimates of state values\
    \ for some policy without knowing the MDP’s transition probabilities and reward\
    \ function. However, the estimates converge more slowly compared to DP policy\
    \ evaluation when the number of states is large. Nevertheless, TD(0) is an important\
    \ algorithm for model-free reinforcement learning and can handle continuous state\
    \ and action spaces, which makes it useful in many practical applications.\n\n\
    **Table 5.1** State value of the same random policy for the service dog MDP, after\
    \ running the TD(0) policy evaluation algorithm with different numbers of updates.\
    \ Results were averaged over 100 independent runs; we use discount `γ = 0.9` and\
    \ step size `α = 0.01` in this experiment. The last row contains true state values\
    \ computed using DP policy iteration."
  raw: '### Worked Example


    To better understand how the TD policy evaluation algorithm works, let’s look
    at an example using the service dog MDP that we introduced in Chap. [2](#605748_1_En_2_Chapter.xhtml).
    Recall the diagram for the service dog MDP shown in Fig. [5.1](#605748_1_En_5_Chapter.xhtml#Fig1).


    Assuming that the agent is following a (fixed) random policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq23.png)
    , we use a step size of ![$$\alpha =0.01$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq24.png)
    and no discount ( ![$${\gamma }=1.0$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq25.png)
    ) in this experiment. We start with an initial estimated value of 0 for all states.
    Since TD is a model-free reinforcement learning method, the agent doesn’t know
    beforehand the reward signal it will receive when taking any action, nor does
    it know the successor state. We want to see how the algorithm updates the estimated
    values for the different states.


    Suppose we’re looking at the first time step ![$$t=0$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq26.png)
    of the first episode, where the current state of the environment is ![$$S_t=\mathit
    {Room}\ \mathit {2}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq27.png)
    , and the agent chooses action ![$$A_t=\mathit {Go}\ \mathit {to}\ \mathit {room}\
    \mathit {3}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq28.png)
    according to policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq29.png)
    . It receives an immediate reward of ![$$R_t=-1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq30.png)
    and the successor state ![$$S_{t+1}=\mathit {Room}\ \mathit {3}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq31.png)
    from the environment. We now have the tuple ![$$(S_t, A_t, R_t, S_{t+1})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq32.png)
    , which is what we need to update the estimated value for state ![$$S_t=\mathit
    {Room}\ \mathit {2}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq33.png)
    . Here’s how we update it:


    ![$$\displaystyle \begin{aligned} V_\pi(\mathit{Room}\ \mathit{2}) &amp; =V_\pi(\mathit{Room}\
    \mathit{2}) + \alpha \Big[ R_t + {\gamma} V_\pi(\mathit{Room}\ \mathit{3}) - V_\pi(\mathit{Room}\
    \mathit{2}) \Big] \\ &amp; =0 + 0.01 * (-1 + 0 - 0) \\ &amp; =-0.01 \end{aligned}
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equb.png)


    After the update, the agent continues to act in the environment following policy
    ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq34.png)
    . The current state of the environment becomes ![$$S_t=\mathit {Room}\ \mathit
    {3}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq35.png) , the
    agent chooses action ![$$A_t=\mathit {Search}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq36.png)
    according to policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq37.png)
    , and it receives an immediate reward of ![$$R_t=10$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq38.png)
    . The successor state ![$$S_{t+1}=\mathit {Found}\ \mathit {item}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq39.png)
    is also a terminal state, so the current episode is over. We now have the tuple
    ![$$(S_t, A_t, R_t, S_{t+1})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq40.png)
    to update the estimated value for state ![$$S_t=\mathit {Room}\ \mathit {3}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq41.png)
    . Here’s how we do it:


    ![$$\displaystyle \begin{aligned} V_\pi(\mathit{Room}\ \mathit{3}) &amp; =V_\pi(\mathit{Room}\
    \mathit{3}) + \alpha \Big[ R_t + {\gamma} V_\pi(\mathit{Found}\ \mathit{item})
    - V_\pi(\mathit{Room}\ \mathit{3}) \Big] \\ &amp; =0 + 0.01 * (10 + 0 - 0) \\
    &amp; =0.1 \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equc.png)


    In a new episode, if the agent is again in environment state ![$$S_t=\mathit {Room}\
    \mathit {2}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq42.png)
    and chooses action ![$$A_t=\mathit {Go}\ \mathit {to}\ \mathit {room}\ \mathit
    {3}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq43.png) according
    to policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq44.png)
    , it receives an immediate reward of ![$$R_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq45.png)
    and the successor state ![$$S_{t+1}=\mathit {Room}\ \mathit {3}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq46.png)
    from the environment. We can update the estimated value for ![$$V_\pi (\mathit
    {Room}\ \mathit {2})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq47.png)
    as follows:


    ![$$\displaystyle \begin{aligned} V_\pi(\mathit{Room}\ \mathit{2}) &amp; =V_\pi(\mathit{Room}\
    \mathit{2}) + \alpha \Big[ R_t + {\gamma} V_\pi(\mathit{Room}\ \mathit{3}) - V_\pi(\mathit{Room}\
    \mathit{2}) \Big] \\ &amp; =-0.01 + 0.01 * \Big[ -1 + 0.1 - (-0.01) \Big] \\ &amp;
    =-0.019 \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equd.png)


    We can repeat this process over and over. Table [5.1](#605748_1_En_5_Chapter.xhtml#Tab1)
    shows the state values for the random policy after running the TD(0) policy evaluation
    algorithm with different numbers of updates. The results are averaged over 100
    independent runs, and we also include the true state values computed using DP
    policy evaluation (last row). After 10,000 updates, the estimated state values
    are getting very close to the true state values.


    The key takeaway from these results is that the TD(0) algorithm can learn accurate
    estimates of state values for some policy without knowing the MDP’s transition
    probabilities and reward function. However, the estimates converge more slowly
    compared to DP policy evaluation when the number of states is large. Nevertheless,
    TD(0) is an important algorithm for model-free reinforcement learning and can
    handle continuous state and action spaces, which makes it useful in many practical
    applications.


    Table 5.1


    State value of the same random policy for the service dog MDP, after running the
    TD(0) policy evaluation algorithm with different numbers of updates. Results were
    averaged over 100 independent runs; we use discount ![$${\gamma }=0.9$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq48.png)
    and step size ![$$\alpha =0.01$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq49.png)
    in this experiment. The last row contains true state values computed using DP
    policy iteration'
  trans: "\n### 工作示例\n\n为了更好地理解时序差分策略评估算法的工作原理，让我们通过一个示例来观察，该示例使用了我们在第 2 章中介绍的服务犬\
    \ MDP。回顾图 5.1 中所示的服务犬 MDP 示意图。\n\n假设智能体遵循一个（固定的）随机策略`π`，在本实验中我们使用步长`α = 0.01`且无折扣（`γ\
    \ = 1.0`）。我们从所有状态的初始估计值为 0 开始。由于 TD 是一种无模型强化学习方法，智能体事先既不知道执行任何动作时会收到何种奖励信号，也不知道后续状态。我们想观察算法如何更新不同状态的估计值。\n\
    \n假设我们正在观察第一个回合的第一个时间步`t = 0`，此时环境的当前状态为`S_t = 房间 2`，智能体根据策略`π`选择了动作`A_t = 前往房间\
    \ 3`。它从环境中获得即时奖励`R_t = -1`和后续状态`S_{t+1} = 房间 3`。现在我们有了元组`(S_t, A_t, R_t, S_{t+1})`，这正是更新状态`S_t\
    \ = 房间 2`的估计值所需的信息。更新过程如下：\n\n```\nVπ(房间 2) = Vπ(房间 2) + α [ R_t + γ Vπ(房间 3)\
    \ - Vπ(房间 2) ]\n           = 0 + 0.01 * (-1 + 0 - 0)\n           = -0.01\n```\n\
    \n更新后，智能体继续按照策略`π`在环境中行动。环境的当前状态变为`S_t = 房间 3`，智能体根据策略`π`选择了动作`A_t = 搜索`，并获得即时奖励`R_t\
    \ = 10`。后续状态`S_{t+1} = 找到物品`也是一个终止状态，因此当前回合结束。现在我们有了元组`(S_t, A_t, R_t, S_{t+1})`来更新状态`S_t\
    \ = 房间 3`的估计值。更新过程如下：\n\n```\nVπ(房间 3) = Vπ(房间 3) + α [ R_t + γ Vπ(找到物品) - Vπ(房间\
    \ 3) ]\n           = 0 + 0.01 * (10 + 0 - 0)\n           = 0.1\n```\n\n在新的回合中，如果智能体再次处于环境状态`S_t\
    \ = 房间 2`，并根据策略`π`选择了动作`A_t = 前往房间 3`，它会从环境中获得即时奖励`R_t`和后续状态`S_{t+1} = 房间 3`。我们可以如下更新`Vπ(房间\
    \ 2)`的估计值：\n\n```\nVπ(房间 2) = Vπ(房间 2) + α [ R_t + γ Vπ(房间 3) - Vπ(房间 2) ]\n \
    \          = -0.01 + 0.01 * [ -1 + 0.1 - (-0.01) ]\n           = -0.019\n```\n\
    \n我们可以反复重复这个过程。表 5.1 展示了在运行不同更新次数的 TD(0)策略评估算法后，随机策略的状态值。结果是在 100 次独立运行中取平均值得到的，同时我们还列出了使用\
    \ DP 策略评估计算出的真实状态值（最后一行）。经过 10,000 次更新后，估计的状态值已非常接近真实状态值。\n\n这些结果的关键启示是：TD(0)算法可以在不了解\
    \ MDP 转移概率和奖励函数的情况下，为某个策略学习到准确的状态值估计。然而，当状态数量较多时，其估计值的收敛速度比 DP 策略评估要慢。尽管如此，TD(0)仍是无模型强化学习中的一项重要算法，并且能够处理连续的状态和动作空间，这使得它在许多实际应用中非常有用。\n\
    \n**表 5.1** 服务犬 MDP 中相同随机策略的状态值，在运行不同更新次数的 TD(0)策略评估算法后得到。结果是在 100 次独立运行中取平均值；本实验中使用折扣`γ\
    \ = 0.9`和步长`α = 0.01`。最后一行包含使用 DP 策略迭代计算出的真实状态值。\n"
