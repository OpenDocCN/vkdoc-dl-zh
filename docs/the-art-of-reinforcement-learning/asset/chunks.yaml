- fmt: '# 9.7 Summary


    In this chapter, we delved into policy-based methods for solving RL problems.
    Contrasting the value-based approaches covered earlier in the book, policy-based
    methods offer distinct advantages. They allow us to learn stochastic policies
    and effectively handle problems with large action spaces.


    We began with a brief introduction to policy-based methods, highlighting their
    advantages over value-based methods. Next, we explored the concept of approximation
    methods for representing policies. Subsequently, we delved into the theory behind
    policy gradient methods, which forms the foundation for using approximation methods
    in policy representation. Specifically, we examined the `REINFORCE` algorithm,
    a prominent policy gradient approach that utilizes Monte Carlo sampling to update
    the learned policy. Moreover, we investigated the integration of a baseline function
    to alleviate bias and variance issues associated with the standard `REINFORCE`
    algorithm.


    Furthermore, we introduced the Actor-Critic algorithm, a powerful technique that
    combines policy-based methods with value-based methods. This hybrid approach has
    demonstrated its significance in solving real-world RL problems.


    To conclude the chapter, we discussed the incorporation of entropy as a mechanism
    to encourage exploration in policy-based methods like Actor-Critic. In the subsequent
    chapter, we will delve into the application of policy-based methods to solve RL
    problems with continuous action spaces, with a specific focus on tasks involving
    robotic control.


    # 10. Problems with Continuous Action Space


    In the previous chapters, we covered reinforcement learning problems with discrete
    action spaces, where actions are typically represented using discrete numbers,
    such as integers. However, in the real world, many problems require continuous
    actions that cannot be represented by integers. Continuous action spaces are common
    in real-world applications such as robotics, where precise and continuous control
    is essential.


    This chapter focuses on using policy-based methods to solve reinforcement learning
    problems with continuous action spaces. We will explore classic robotic control
    problems that can be solved using reinforcement learning, such as controlling
    the position and orientation of a robotic ant and balancing a simple human-like
    robot. We will see how policy-based methods can be used to achieve precise and
    continuous control in these systems.


    By the end of this chapter, you will have a good understanding of how to use policy-based
    methods to solve reinforcement learning problems with continuous action spaces.
    Additionally, you will have learned how these methods can be applied to solve
    classic robotic control problems.


    ## 10.1 The Challenges of Problems with Continuous Action Space


    In many real-world reinforcement learning problems, the action space is continuous,
    which means that the actions are represented by continuous values instead of discrete
    numbers. For example, in the case of controlling the angle movement of a robotic
    arm, we cannot use integers to represent the actions since the angle movement
    is often a continuous value. This presents unique challenges that require different
    approaches from those used for problems with discrete action space.


    One of the main challenges of problems with continuous action space is that the
    action space is typically infinite, which makes it difficult to apply value-based
    methods such as Q-learning, since these methods require discretizing the action
    space. Discretization of the action space can result in a large loss of information
    and can make it difficult to learn the optimal policy. In addition, discretization
    of continuous action space often leads to enormous number of possible actions,
    which can make the learning process computationally infeasible.


    Policy gradient methods are a class of reinforcement learning algorithms that
    are well suited for problems with continuous action space. Instead of learning
    an explicit action-value function, policy gradient methods learns a parameterized
    policy that maps from states to actions. This policy can be a neural network,
    for example, with the weights serving as the parameters to be learned.


    Policy gradient methods are able to learn a policy that can output continuous
    actions directly, without the need for discretization of the action space. This
    allows for more fine-grained control and better performance. However, policy gradient
    methods can be more difficult to train than value-based methods, and convergence
    to the optimal policy can be slower. In addition, the variance in the gradient
    estimate can be high, which can make the learning process unstable. To address
    these challenges, various techniques such as baselines and variance reduction
    have been developed.


    To better understand the challenges of problems with continuous action space,
    let’s consider a simplified locomotion task. In this task, the goal is for the
    robotic arm to pick up objects laying on the table. The robot has multiple moving
    parts or joints, each with its own range of motion. All joints can and often need
    to be controlled simultaneously, requiring a high degree of coordination and precise
    control of the robot’s movements. This is analogous to the movement of a human
    arm. To successfully complete the task of picking up an object, the robot has
    to coordinate the movement of its joints precisely at every time step.


    Designing a suitable reward function for problems with continuous action space
    can be challenging as well. In the locomotion task, moving different joints will
    often have different results, which makes it more challenging to define a suitable
    reward function. The reward function needs to be carefully designed to encourage
    the robot to perform the desired actions while avoiding undesired actions. For
    example, the reward function could reward the robot for picking up the object
    while penalizing it for knocking over other objects on the table.


    In summary, problems with continuous action space pose unique challenges that
    require different approaches from those used for problems with discrete action
    space. Policy gradient methods are suitable for continuous action spaces since
    they can learn a policy that can output continuous actions directly. However,
    designing a suitable reward function and coordinating the movement of joints precisely
    remains a challenge. By understanding these challenges and using appropriate techniques,
    we can develop effective reinforcement learning solutions for problems with continuous
    action space.


    ## 10.2 MuJoCo Environments


    Building a robotic control environment from scratch can be a challenging and time-consuming
    task, requiring extensive knowledge of physics, mechanics, and robotics. Fortunately,
    prebuild simulation environments based on open-source software available that
    can help researchers and developers test their reinforcement learning algorithms
    without the need for extensive domain knowledge or expensive hardware.


    One such tool is the Multi-Joint Dynamics with Contact (`MuJoCo`) physics engine,
    developed by Todorov et al. [[1](#605748_1_En_10_Chapter.xhtml#CR1)]. `MuJoCo`
    provides a fast and accurate simulation environment for a wide range of robotic
    systems, including manipulators and humanoid robots. `MuJoCo` is particularly
    useful for problems with continuous action spaces, which are difficult to simulate
    accurately using traditional physics engines.


    By using prebuild simulation environments such as those available in `MuJoCo`
    and `OpenAI Gym` [[2](#605748_1_En_10_Chapter.xhtml#CR2)], researchers and developers
    can focus on developing and testing their algorithms without the need for extensive
    domain knowledge or expensive hardware. This can help accelerate the pace of research
    in reinforcement learning and bring us closer to developing intelligent systems
    that can operate in complex real-world environments.'
