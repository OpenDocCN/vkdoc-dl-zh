    ; this process is often referred to as *feature engineering* or *feature extraction*
    in traditional machine learning. The number of scalar components in ![$$\boldsymbol
    {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq109.png) can
    be much larger (or smaller) than the dimension of the environment state, depending
    on the reinforcement learning problem. We can think of the feature vector ![$$\boldsymbol
    {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq110.png) as a
    collection of functions ![$$\boldsymbol {x}_1, \boldsymbol {x}_2, \cdots $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq111.png)
    that transform the raw environment state (or state-action pair ![$$(s, a)$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq112.png)
    ) into corresponding scalar components:


    ![$$\displaystyle \begin{aligned} \boldsymbol{x}(s) = \begin{pmatrix} \displaystyle
    \boldsymbol{x}_1(s) \\[1em] \displaystyle \boldsymbol{x}_2(s) \\[1em] \displaystyle
    \vdots \\[1em] \displaystyle \boldsymbol{x}_n(s) \end{pmatrix} {} \end{aligned}
    $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ10.png)


    (6.10)


    The intuition behind the feature vector ![$$\boldsymbol {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq113.png)
    is that by carefully crafting these features, we hope to find a weight vector
    ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq114.png)
    , so the value for a particular state (or state-action pair) is just the weighted
    sum over all these feature; this is why we call ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq115.png)
    the weights, because it weights the corresponding features in ![$$\boldsymbol
    {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq116.png) . Mathematically
    speaking, we take the inner product of ![$$\boldsymbol {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq117.png)
    and ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq118.png)
    (assume both ![$$\boldsymbol {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq119.png)
    and ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq120.png)
    are column vectors, and ![$$\boldsymbol {w}, \boldsymbol {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq121.png)
    have the same number of elements), which can be expressed as


    ![$$\displaystyle \begin{aligned} \hat{V}(s; \boldsymbol{w}) = \boldsymbol{x}(s)^T
    \boldsymbol{w} = \sum_{j=1}^{n}\boldsymbol{x}_j(s) \boldsymbol{w}_j {} \end{aligned}
    $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ11.png)


    (6.11) where ![$$\hat {V}(s; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq122.png)
    is the estimated value of state *s* using weight vector ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq123.png)
    , ![$$\boldsymbol {x}(s)^T$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq124.png)
    is the transpose of the feature vector for state *s*, and ![$$\sum _{j=1}^{n}\boldsymbol
    {x}_j(s) \boldsymbol {w}_j$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq125.png)
    is the weighted sum of the features.


    The feature vector ![$$\boldsymbol {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq126.png)
    is often handcrafted based on human knowledge or past experience of the reinforcement
    learning problem. For some simple problems, this process may be as simple as encoding
    the raw environment state into numerical values, but for more complex problems,
    it often involves some form of transformation like polynomial functions.


    One of the simplest ways to construct the feature vector is to partition the state
    space into subsets (similar to the bin or tile cases shown in Fig. [6.2](#605748_1_En_6_Chapter.xhtml#Fig2))
    such that any single state *s* only belongs to one subset. We can then construct
    the feature vector ![$$\boldsymbol {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq127.png)
    using the one-hot encoding method, where the subset to which the state *s* belongs
    is represented by a value of one and all other subsets are represented by a value
    of zero. This is also known as the state aggregation method. Finite MDPs can be
    treated as a special case of this method, where we have *N* subsets, here *N*
    is the number of sates in the state space, and each subset only has one state.


    For example, in the service dog MDP, we can label each state using index values
    *Room 1 = 0, Room 2 = 1, Room 3 = 2, Outside = 3, Found item = 4*. Then, we can
    construct the feature vector ![$$\boldsymbol {x}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq128.png)
    for state *Room 2* as a one-hot encoded vector ![$$\boldsymbol {x}=[0, 1, 0, 0,
    0]^{T}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq129.png) .
    It’s also possible to use neural networks to extract the features automatically,
    which is a topic we’ll cover in the next chapter.


    Now that we have a basic idea of how the linear approximation function computes
    state values, let’s finalize how to use stochastic gradient descent to update
    the weight vector ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq130.png)
    . We can first define the partial derivatives ![$$\nabla _{\boldsymbol {w}} \hat
    {V}(s; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq131.png)
    with respect to ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq132.png)
    for Eq. ([6.11](#605748_1_En_6_Chapter.xhtml#Equ11)). Since it’s a linear system
    and we’re taking the derivative with respect to ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq133.png)
    , ![$$\nabla _{\boldsymbol {w}} \hat {V}(s; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq134.png)
    can be simplified to ![$$\boldsymbol {x}(s)$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq135.png)
    . This gives us Eq. ([6.12](#605748_1_En_6_Chapter.xhtml#Equ12)) for updating
    the weights ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq136.png)
    when using a linear function to approximate the state value function ![$$V_\pi
    $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq137.png) :'
  trans: "\n# 6.4 线性价值函数近似\n\n到目前为止，我们还没有讨论近似函数 `V̂` 或 `Q̂` 具体如何接收原始环境状态（或状态-动作对）作为输入，并输出估计价值。现在我们重点讨论如何使用线性方法，根据权重向量\
    \ `w` 来计算这些价值。\n\n首先，这涉及将原始环境状态 `s`（或状态-动作对 `(s, a)`）映射到特征向量 `x` 的过程；在传统机器学习中，这一过程通常被称为*特征工程*或*特征提取*。`x`\
    \ 中标量分量的数量可以远大于（或远小于）环境状态的维度，具体取决于强化学习问题。我们可以将特征向量 `x` 视为一组函数 `x₁, x₂, …` 的集合，这些函数将原始环境状态（或状态-动作对\
    \ `(s, a)`）转换为相应的标量分量：\n\n```\nx(s) = ( x₁(s) )\n       ( x₂(s) )\n       (  ⋮\
    \   )\n       ( xₙ(s) )\n```\n\n(6.10)\n\n特征向量 `x` 背后的直觉是，通过精心设计这些特征，我们希望找到一个权重向量\
    \ `w`，使得特定状态（或状态-动作对）的价值就是所有这些特征的加权和；这就是为什么我们将 `w` 称为权重，因为它对 `x` 中相应的特征进行加权。从数学上讲，我们取\
    \ `x` 和 `w` 的内积（假设 `x` 和 `w` 都是列向量，且 `w` 和 `x` 的元素数量相同），可以表示为：\n\n```\nV̂(s; w)\
    \ = x(s)ᵀ w = Σⱼ₌₁ⁿ xⱼ(s) wⱼ\n```\n\n(6.11)\n\n其中 `V̂(s; w)` 是使用权重向量 `w` 对状态 `s`\
    \ 的估计价值，`x(s)ᵀ` 是状态 `s` 特征向量的转置，`Σⱼ₌₁ⁿ xⱼ(s) wⱼ` 是特征的加权和。\n\n特征向量 `x` 通常基于人类知识或对强化学习问题的过往经验进行手工设计。对于某些简单问题，这个过程可能简单到只需将原始环境状态编码为数值，但对于更复杂的问题，它通常涉及某种形式的变换，例如多项式函数。\n\
    \n构建特征向量最简单的方法之一是将状态空间划分为若干子集（类似于图 6.2 中所示的区间或瓦片情况），使得任意单个状态 `s` 仅属于一个子集。然后，我们可以使用独热编码方法构建特征向量\
    \ `x`，其中状态 `s` 所属的子集用值 1 表示，所有其他子集用值 0 表示。这也被称为状态聚合方法。有限 MDP 可以视为该方法的一个特例，其中我们有\
    \ `N` 个子集，这里的 `N` 是状态空间中的状态数量，且每个子集仅包含一个状态。\n\n例如，在服务犬 MDP 中，我们可以使用索引值标记每个状态：`房间\
    \ 1 = 0`，`房间 2 = 1`，`房间 3 = 2`，`室外 = 3`，`找到物品 = 4`。然后，我们可以为状态 `房间 2` 构建特征向量 `x`，作为独热编码向量\
    \ `x = [0, 1, 0, 0, 0]ᵀ`。也可以使用神经网络自动提取特征，这将是下一章讨论的主题。\n\n现在，我们对线性近似函数如何计算状态价值有了基本了解，接下来让我们最终确定如何使用随机梯度下降来更新权重向量\
    \ `w`。我们可以先定义式 (6.11) 关于 `w` 的偏导数 `∇_w V̂(s; w)`。由于这是一个线性系统，且我们对 `w` 求导，`∇_w V̂(s;\
    \ w)` 可以简化为 `x(s)`。由此得到式 (6.12)，用于在使用线性函数近似状态价值函数 `V_π` 时更新权重 `w`：\n"
- fmt: '![$$\displaystyle \begin{aligned} \boldsymbol{w} &amp; = \boldsymbol{w} +
    \alpha \Biggl[ \Big( V_\pi(s) - \hat{V}(s; \boldsymbol{w}) \Big) \boldsymbol{x}(s)
    \Biggr] \\ &amp; = \boldsymbol{w} + \alpha \Biggl[ \Big( V_\pi(s) - \boldsymbol{x}(s)^T\boldsymbol{w}
    \Big) \boldsymbol{x}(s) \Biggr] {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ12.png)


    (6.12)


    Here, `w` represents the weights of the linear approximation function; `α` represents
    the step size or learning rate, which determines how much to adjust the weights
    in each step; `x(s)` is the feature vector for state `s`; and `Vπ(s)` is the expected
    value of state `s`.


    Now we know exactly how to update the weights `w` for a linear function. The only
    thing that’s unknown to us in Eq. (6.12) is the true state value function `Vπ`.
    We’ll start to look at examples of how to use existing methods like Monte Carlo
    and TD learning to estimate the true state value `Vπ`, which can then be used
    to update the weights in the preceding equation.


    ### Linear Value Function Approximation for Policy Evaluation


    Assuming we have access to the true state value function `Vπ` for the policy `π`,
    we can use Eq. (6.12) to update the weights `w` for a linear approximation function.
    A linear approximation function is a mathematical function that maps the feature
    vector for a state to an estimate of its value.


    However, in most real-world reinforcement learning problems, we don’t know `Vπ`.
    So, how can we update the weights in this case?


    In Monte Carlo policy evaluation, the agent generates a complete sample episode
    by following the policy `π` and computes the returns `G0, G1, G2, ...` for each
    state in the sequence. Here, the returns are the sum of rewards received after
    visiting a state `t` until the end of the episode. We can still use this idea
    and replace `Vπ(s)` in Eq. (6.12) with the Monte Carlo sample return `Gt` as the
    true target. Therefore, the weights update rule for using linear methods to approximate
    the state value function with Monte Carlo policy evaluation can be adapted as
    follows:


    ![$$\displaystyle \begin{aligned} \boldsymbol{w} &amp; = \boldsymbol{w} + \alpha
    \Biggl[ \Big( G_t - \hat{V}(S_t; \boldsymbol{w}) \Big) \boldsymbol{x}(S_t) \Biggr]
    \\ &amp; = \boldsymbol{w} + \alpha \Biggl[ \Big( G_t - \boldsymbol{x}(S_t)^T\boldsymbol{w}
    \Big) \boldsymbol{x}(S_t) \Biggr] {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ13.png)


    (6.13)


    Here, `w` represents the weights of the linear approximation function, `α` is
    the learning rate, `Gt` is the Monte Carlo sample return, `x(St)` is the feature
    vector for state `St`, and `V̂(St; w)` is the predicted value of state `St` using
    the linear approximation function.


    We now introduce the every-visit Monte Carlo policy evaluation algorithm based
    on linear value function approximation, which is shown in Algorithm 1. In the
    context of large-scale MDPs where almost all states are unique, the every-visit
    version is often preferred over the first-visit version. This is because counting
    how many times a state (or state-action pair) has been visited may not provide
    meaningful information due to the lack of state or action redundancy. By considering
    every visit to each state (or state-action pair) in an episode, the every-visit
    algorithm ensures that all interactions contribute to the value function estimation.
    Thus, it is better suited for scenarios where state or action redundancy is minimal
    and counting visits is not informative.'
