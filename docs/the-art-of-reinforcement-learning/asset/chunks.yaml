  trans: '

    ### 训练流程的其他改动


    在训练 DQN 智能体玩 Atari 游戏时，我们对训练流程进行了一些小的改动。其中一个特别的改动是，智能体从经验回放中采样小批量转换数据以执行学习步骤（我们将参数
    `θ` 的一次更新计为一个学习步骤）的频率。在算法 3 中，只要缓冲区有足够的样本，智能体就会在每个时间步采样一个小批量。然而，由于 Atari 游戏可能持续数百万步（帧），从计算效率的角度来看，每一步都进行学习可能不是一个好主意；这也可能影响智能体的性能，因为它生成更多转换数据的时间更少了，这还可能导致神经网络对已有的经验数据过拟合。因此，DQN
    智能体实际上采用了一种略有不同的学习计划：智能体每选择四个动作后，才执行一次学习步骤。这相当于每 16 帧学习一次，因为每个动作会重复执行四次。


    图 7.21 展示了 DQN 智能体在 Atari 游戏 Pong 上的性能，这是 Atari 测试平台中最简单的游戏之一。结果显示了平均回合回报（总未折扣奖励）和
    95% 的置信区间。为了评估智能体的性能，我们在一个独立的测试环境中运行了 200,000 个评估步骤，该环境使用 `ε`-贪婪策略，并在每次训练迭代（包含
    250,000 个训练步骤或 100 万帧）结束时使用固定的探索 epsilon（`ε = 0.05`）。在评估环境中，不应用奖励裁剪或生命损失时的软终止。结果取五次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    ![](img/605748_1_En_7_Fig20_HTML.png)


    一个表示神经网络架构的流程图，包含各种层，包括具有不同滤波器大小和 ReLU 激活函数的卷积层，设计用于处理尺寸为 84 × 84 × 4 的输入数据，其后是全连接层。


    **图 7.20** DQN 智能体的卷积神经网络架构


    注意，对于 Pong 游戏，最大回合回报是 21。我们可以观察到，智能体在 1000 万个训练环境帧（对应于跳帧后智能体实际看到的 250 万帧）后收敛到最优策略。


    图 7.22 展示了 DQN 智能体在 Atari 游戏 Breakout 上的性能，这是一款比 Pong 稍具挑战性的游戏。我们使用了与 Pong 实验相同的设置和超参数。


    图 7.23 展示了 DQN 智能体在 Atari 游戏 River Raid 上的性能，这是一款比 Pong 和 Breakout 更具挑战性的游戏。我们使用了与
    Pong 实验相同的设置和超参数。我们可以看到，性能在前 2000 万帧内持续提升，然后在 2000 万到 3000 万帧之间趋于平稳。


    ![](img/605748_1_En_7_Fig22_HTML.png)


    一个折线图，展示了评估回合回报随训练环境帧数的变化，描绘了回报值在超过 2000 万帧内增加的趋势。


    **图 7.22** DQN 智能体在 Atari Breakout 上的表现。结果显示了平均回合回报（总未折扣奖励）和 95% 的置信区间。结果取五次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    ![](img/605748_1_En_7_Fig21_HTML.png)


    一个折线图，展示了评估回合回报随训练环境帧数的变化，描绘了回报值在超过 2000 万帧内增加的趋势。


    **图 7.21** DQN 智能体在 Atari Pong 上的表现。结果显示了平均回合回报（总未折扣奖励）和 95% 的置信区间。结果取五次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    对于上述实验，我们使用了 DQN Nature 论文中列出的标准设置，如表 7.1 所示。

