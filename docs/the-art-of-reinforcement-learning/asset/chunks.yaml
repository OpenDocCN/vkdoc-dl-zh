    ## 8.3 Advantage function and Dueling Network Architecture


    The advantage function and dueling network architecture proposed by Wang et al.
    [[4](#605748_1_En_8_Chapter.xhtml#CR4)] is another improvement to the standard
    DQN algorithm.


    In reinforcement learning, the state-action value function, denoted as `Q_π`,
    for a given policy `π` is used to determine the best action to take in a given
    state. The best action is chosen by selecting the action that yields the highest
    state-action value, that is, `argmax_a Q_π(s, a)`. However, this does not provide
    information on how much better one action is compared to others. To address this
    issue, the advantage function was introduced by Baird in 1993. The advantage function
    measures the gain or advantage that an agent would receive by taking a particular
    action `a` in a given state `s`. The advantage function is calculated by subtracting
    the state value `V_π(s)` from the state-action value `Q_π(s, a)`, as shown in
    Eq. ([8.10](#605748_1_En_8_Chapter.xhtml#Equ10)).


    ```

    A_π(s, a) = Q_π(s, a) - V_π(s)   (8.10)

    ```


    The advantage function helps us measure how much better or worse an action is
    compared to other actions. This is useful because the state value function `V_π`
    and state-action value function `Q_π` may be interested in different features
    based on the given state `s`. Since `V_π` takes the average over all actions,
    while `Q_π` is only interested in one specific action, we can rewrite the state-action
    value function using the advantage function as shown in Eq. ([8.11](#605748_1_En_8_Chapter.xhtml#Equ11)).


    ```

    Q_π(s, a) = V_π(s) + A_π(s, a)   (8.11)

    ```


    When using neural networks to approximate `Q_π` or `V_π`, Equation ([8.11](#605748_1_En_8_Chapter.xhtml#Equ11))
    can be rewritten as Eq. ([8.12](#605748_1_En_8_Chapter.xhtml#Equ12)), where `β,
    δ` represent the parameters of the approximation functions `V̂, Â`.


    ```

    Q̂(s, a; β, δ) = V̂(s; β) + Â(s, a; δ)   (8.12)

    ```'
