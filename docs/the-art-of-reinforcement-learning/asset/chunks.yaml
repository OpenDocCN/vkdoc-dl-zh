    ### Linear Value Function Approximation for Policy Evaluation


    Assuming we have access to the true state value function ![$$V_\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq145.png)
    for the policy ![$$\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq146.png)
    , we can use Eq. ([6.12](#605748_1_En_6_Chapter.xhtml#Equ12)) to update the weights
    ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq147.png)
    for a linear approximation function. A linear approximation function is a mathematical
    function that maps the feature vector for a state to an estimate of its value.


    However, in most real-world reinforcement learning problems, we don’t know ![$$V_\pi
    $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq148.png) . So, how
    can we update the weights in this case?


    In Monte Carlo policy evaluation, the agent generates a complete sample episode
    by following the policy ![$$\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq149.png)
    and computes the returns ![$$G_0, G_1, G_2, \cdots $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq150.png)
    for each state in the sequence. Here, the returns are the sum of rewards received
    after visiting a state *t* until the end of the episode. We can still use this
    idea and replace ![$$V_\pi (s)$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq151.png)
    in Eq. ([6.12](#605748_1_En_6_Chapter.xhtml#Equ12)) with the Monte Carlo sample
    return ![$$G_t$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq152.png)
    as the true target. Therefore, the weights update rule for using linear methods
    to approximate the state value function with Monte Carlo policy evaluation can
    be adapted as follows:


    ![$$\displaystyle \begin{aligned} \boldsymbol{w} &amp; = \boldsymbol{w} + \alpha
    \Biggl[ \Big( G_t - \hat{V}(S_t; \boldsymbol{w}) \Big) \boldsymbol{x}(S_t) \Biggr]
    \\ &amp; = \boldsymbol{w} + \alpha \Biggl[ \Big( G_t - \boldsymbol{x}(S_t)^T\boldsymbol{w}
    \Big) \boldsymbol{x}(S_t) \Biggr] {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ13.png)


    (6.13)


    Here, ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq153.png)
    represents the weights of the linear approximation function, ![$$\alpha $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq154.png)
    is the learning rate, ![$$G_t$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq155.png)
    is the Monte Carlo sample return, ![$$\boldsymbol {x}(S_t)$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq156.png)
    is the feature vector for state ![$$S_t$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq157.png)
    , and ![$$\hat {V}(S_t; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq158.png)
    is the predicted value of state ![$$S_t$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq159.png)
    using the linear approximation function.


    We now introduce the every-visit Monte Carlo policy evaluation algorithm based
    on linear value function approximation, which is shown in Algorithm 1\. In the
    context of large-scale MDPs where almost all states are unique, the every-visit
    version is often preferred over the first-visit version. This is because counting
    how many times a state (or state-action pair) has been visited may not provide
    meaningful information due to the lack of state or action redundancy. By considering
    every visit to each state (or state-action pair) in an episode, the every-visit
    algorithm ensures that all interactions contribute to the value function estimation.
    Thus, it is better suited for scenarios where state or action redundancy is minimal
    and counting visits is not informative.'
  trans: '

    ![$$\displaystyle \begin{aligned} \boldsymbol{w} &amp; = \boldsymbol{w} + \alpha
    \Biggl[ \Big( V_\pi(s) - \hat{V}(s; \boldsymbol{w}) \Big) \boldsymbol{x}(s) \Biggr]
    \\ &amp; = \boldsymbol{w} + \alpha \Biggl[ \Big( V_\pi(s) - \boldsymbol{x}(s)^T\boldsymbol{w}
    \Big) \boldsymbol{x}(s) \Biggr] {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ12.png)


    (6.12)


    这里，`w` 表示线性近似函数的权重；`α` 表示步长或学习率，决定了每一步调整权重的幅度；`x(s)` 是状态 `s` 的特征向量；`Vπ(s)` 是状态
    `s` 的期望值。


    现在我们确切知道了如何更新线性函数的权重 `w`。在公式 (6.12) 中，唯一未知的是真实状态价值函数 `Vπ`。接下来我们将开始探讨如何利用现有方法（如蒙特卡洛和时序差分学习）来估计真实状态价值
    `Vπ`，进而用其更新上述公式中的权重。


    ### 用于策略评估的线性价值函数近似


    假设我们可以获取策略 `π` 的真实状态价值函数 `Vπ`，那么就可以使用公式 (6.12) 来更新线性近似函数的权重 `w`。线性近似函数是一种数学函数，它将状态的特征向量映射为该状态价值的估计值。


    然而，在大多数现实世界的强化学习问题中，我们并不知道 `Vπ`。那么在这种情况下，我们该如何更新权重呢？


    在蒙特卡洛策略评估中，智能体通过遵循策略 `π` 生成一个完整的样本回合，并计算序列中每个状态的回报 `G0, G1, G2, ...`。这里的回报是指从访问状态
    `t` 开始到回合结束所获得的奖励总和。我们可以沿用这一思路，用蒙特卡洛样本回报 `Gt` 替换公式 (6.12) 中的 `Vπ(s)` 作为真实目标。因此，使用线性方法结合蒙特卡洛策略评估来近似状态价值函数的权重更新规则可以改写如下：


    ![$$\displaystyle \begin{aligned} \boldsymbol{w} &amp; = \boldsymbol{w} + \alpha
    \Biggl[ \Big( G_t - \hat{V}(S_t; \boldsymbol{w}) \Big) \boldsymbol{x}(S_t) \Biggr]
    \\ &amp; = \boldsymbol{w} + \alpha \Biggl[ \Big( G_t - \boldsymbol{x}(S_t)^T\boldsymbol{w}
    \Big) \boldsymbol{x}(S_t) \Biggr] {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ13.png)


    (6.13)


    这里，`w` 表示线性近似函数的权重，`α` 是学习率，`Gt` 是蒙特卡洛样本回报，`x(St)` 是状态 `St` 的特征向量，`V̂(St; w)`
    是使用线性近似函数对状态 `St` 的预测价值。


    现在我们介绍基于线性价值函数近似的每次访问蒙特卡洛策略评估算法，如算法 1 所示。在几乎所有状态都唯一的大规模 MDP 中，每次访问版本通常比首次访问版本更受青睐。这是因为由于缺乏状态或动作的冗余性，统计某个状态（或状态-动作对）被访问的次数可能无法提供有意义的信息。通过考虑回合中每个状态（或状态-动作对）的每次访问，每次访问算法确保了所有交互都对价值函数估计有所贡献。因此，它更适用于状态或动作冗余性极小、访问次数统计无信息量的场景。

