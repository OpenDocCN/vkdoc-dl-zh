    We’re now ready to introduce the Actor-Critic algorithm which uses neural networks
    to approximate the policy and state value function. The training of the policy
    network (Actor) and the value network (Critic) is similar to that of the REINFORCE
    with baseline. Specifically, we aim to minimize the squared error loss for the
    estimated state values coming from the value network and maximize the log-likelihood
    for the policy gradient of the specific action taken by the agent, weighted by
    the advantage of taking the action. However, in Actor-Critic, we update the parameters
    based on a sequence of `N` transitions rather than a complete episode sequence.
    This allows the algorithm to learn more efficiently and update its parameters
    in a more timely manner.


    Actor-Critic is a popular family of reinforcement learning algorithms that combine
    the advantages of value-based and policy-based methods. The Critic learns the
    value function, which estimates the expected cumulative reward given the current
    state and action. The Actor then leverages this information to select actions
    that are more likely to lead to higher rewards. The combination of these two components
    allows the agent to learn both the value function and the policy simultaneously.


    The choice of neural network architecture for Actor-Critic depends on the complexity
    of the problem. In practice, we can use separate networks for the policy and value
    functions, or we can use a shared weights architecture.


    Using two separate neural networks allows for greater flexibility in terms of
    applying different optimization techniques or step sizes for learning the policy
    and value functions respectively. It also allows for more specialized architectures
    tailored to each function and may perform better in scenarios where the state
    space is not high-dimensional. However, using two separate networks can be computationally
    demanding, as both networks must take in the same input data. It can also be more
    difficult to train and maintain due to the need for two separate networks.


    Using a single neural network with two separate heads can be more computationally
    efficient since the network only needs to take in the input data once. It can
    also be easier to train and maintain since there is only one network to work with
    and may perform better in scenarios where the state space is visually complex.
    However, it may not allow for as much flexibility in terms of specialized architectures
    for each function and may not perform as well as using separate networks in scenarios
    where the policy and value functions have very different requirements.


