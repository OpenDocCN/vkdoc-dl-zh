  trans: "\n# 2.6 价值函数的替代贝尔曼方程\n\n式(2.13)的一个局限性在于，我们假设环境产生的奖励信号仅取决于当前环境状态`s`和智能体采取的动作`a`。然而，在某些情况下，奖励函数还取决于后续状态`s'`，例如`R(s,\
    \ a, s')`，此时`V_π`的贝尔曼方程需要重写以支持这种场景，如式(2.18)所示：\n\n```\nV_π(s) = E_π[ R_t + γ V_π(S_{t+1})\
    \ | S_t=s ]\n       = Σ_{a∈A} π(a|s) [ Σ_{s'∈S} P(s'|s,a) R(s,a,s') + γ Σ_{s'∈S}\
    \ P(s'|s,a) V_π(s') ]\n       = Σ_{a∈A} π(a|s) Σ_{s'∈S} P(s'|s,a) [ R(s,a,s')\
    \ + γ V_π(s') ], 对于所有 s∈S\n```\n\n(2.18)\n\n类似地，对于奖励函数取决于后续状态`s'`的情况，我们可以重写`Q_π`的贝尔曼方程，如式(2.19)所示：\n\
    \n```\nQ_π(s,a) = E_π[ R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t=s, A_t=a ]\n      \
    \   = Σ_{s'∈S} P(s'|s,a) R(s,a,s') + γ E_π[ Q_π(s',a') | S_{t+1}=s', A_{t+1}=a'\
    \ ]\n         = Σ_{s'∈S} P(s'|s,a) R(s,a,s') + γ Σ_{s'∈S} P(s'|s,a) Σ_{a'∈A} π(a'|s')\
    \ Q_π(s',a')\n         = Σ_{s'∈S} P(s'|s,a) [ R(s,a,s') + γ Σ_{a'∈A} π(a'|s')\
    \ Q_π(s',a') ], 对于所有 s∈S, a∈A\n```\n\n(2.19)\n\n然而，这两个方程都假设环境奖励是确定性的。这意味着相同的`(s,\
    \ a)`或`(s, a, s')`总会产生相同的奖励信号。但在某些情况下，奖励也可能是随机的。此时，这些方程将无法捕捉这种随机性。\n\n在他们著名的著作《*强化学习导论*》[2]中，Sutton\
    \ 和 Barto 使用式(2.20)来涵盖这种场景。他们将动态函数`P`和奖励函数`R`合并为一个四参数函数`P(s', r|s, a)`，该函数同时解决了奖励可能取决于后续状态`s'`或奖励可能是随机的问题。\n\
    \n```\nV_π(s) = E_π[ R_t + γ V_π(S_{t+1}) | S_t=s ]\n       = Σ_{a∈A} π(a|s) Σ_{s'}\
    \ Σ_{r} P(s', r|s, a) [ r + γ V_π(s') ]\n       = Σ_{a∈A} π(a|s) Σ_{s', r} P(s',\
    \ r|s, a) [ r + γ V_π(s') ], 对于所有 s∈S\n```\n\n(2.20)\n\n同样在这种情况下，`Q_π`的贝尔曼方程变为\n\
    \n```\nQ_π(s,a) = E_π[ R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t=s, A_t=a ]\n      \
    \   = Σ_{s'} Σ_{r} P(s', r|s, a) [ r + γ E_π[ Q_π(s',a') | S_{t+1}=s', A_{t+1}=a'\
    \ ] ]\n         = Σ_{s', r} P(s', r|s, a) [ r + γ Σ_{a'∈A} π(a'|s') Q_π(s',a')\
    \ ], 对于所有 s∈S, a∈A\n```\n\n(2.21)\n\n虽然式(2.20)和(2.21)更具通用性，但它们可能更难完全理解。为简单起见，本书将坚持使用贝尔曼方程(2.13)、(2.16)和(2.17)。\n"
- fmt: "## 2.7 Optimal Policy and Optimal Value Functions\n\nThe goal of using reinforcement\
    \ learning to solve a problem is to find an optimal policy. If we can find a policy\
    \ that yields the highest return for every single state in the entire state space,\
    \ then we can consider the MDP is solved. This makes sense, because the only way\
    \ the agent can get these maximum returns is by choosing the best actions in every\
    \ single state. Formally, the optimal policy `π*` is defined as the policy (or\
    \ policies) which has the maximum state value `Vπ` over all other policies, for\
    \ all states in the state space, as shown in Eq. (2.22).\n\n```\nπ*(s) = argmaxπ\
    \ Vπ(s), for all s ∈ S\n```\n\n(2.22)\n\nIn theory, for every MDP there is an\
    \ optimal policy `π*` that is better than or equal to other policies. It’s possible\
    \ for the MDP to have multiple optimal policies. For example, if in a state, there\
    \ are two or more actions that lead to the same successor state, and the rewards\
    \ for these different actions are the same. Figure 2.13 is a small example MDP\
    \ to illustrate this case. In this small example, the agent needs to drive a toy\
    \ car from state A to state C. But the only way to get to state C is through state\
    \ B. There are two possible actions (routes) that the agent can choose in state\
    \ A; both actions will lead to state B. The rewards for these two actions are\
    \ the same, so the agent can choose any one of these actions.\n\nWe should not\
    \ confuse optimal policy with a deterministic policy. A deterministic policy always\
    \ chooses the same action in the same state, but that doesn’t mean the chosen\
    \ action is the best action. But the optimal policy will always choose the best\
    \ action.\n\nThe optimal policy (or policies) `π*` of an MDP shares the same optimal\
    \ state value function `V*`:\n\n```\nV*(s) = maxπ Vπ(s), for all s ∈ S\n```\n\n\
    (2.23)\n\nSimilarly, the optimal policy (or policies) `π*` of an MDP shares the\
    \ same optimal state-action value function `Q*`:\n\n```\nQ*(s, a) = maxπ Qπ(s,\
    \ a), for all s ∈ S, a ∈ A\n```\n\n(2.24)\n\nA state transition diagram for toy\
    \ car MDP. State A leads to state B via arrows for left with r equals 0, and right\
    \ with r equals 0. B leads to C via forward with r equals 1.\n\n**Fig. 2.13**\
    \ Example of a toy car MDP with multiple optimal policies\n\nThere’s a nice relationship\
    \ between the optimal state value function `V*` and the optimal state-action value\
    \ function `Q*`. It says the optimal value of a state `V*(s)` is equal to `Q*(s,\
    \ a)` where `a` is the action that has the maximum state-action value over all\
    \ other actions in this state `s`. This should make sense, because if the agent\
    \ is following the optimal policy, then there’s a 1.0 probability it will select\
    \ the best action and a 0 probability of selecting nonbest actions (at least for\
    \ the case of deterministic policy).\n\n```\nV*(s) = maxa∈A Q*(s, a)\n```\n\n\
    (2.25)\n\nLike the regular value functions, we can also rewrite Eq. (2.23) in\
    \ a recursive manner. Here, we only care about the action that has the maximum\
    \ immediate reward and the discount value of successor states. Equation (2.26)\
    \ is the Bellman optimality equation for `V*`:\n\n```\nV*(s) = maxa∈A Q*(s, a)\n\
    \      = maxa E[Rt + γ Gt+1 | St = s, At = a]\n      = maxa E[Rt + γ V*(St+1)\
    \ | St = s, At = a]\n      = maxa [R(s, a) + γ Σs'∈S P(s'|s, a) V*(s')], for all\
    \ s ∈ S\n```\n\n(2.26)\n\nAnd similarly, we can also derive the Bellman optimality\
    \ equation for `Q*`, as shown in Eq. (2.27):\n\n```\nQ*(s, a) = E[Rt + γ maxa'\
    \ Q*(St+1, a') | St=s, At=a]\n         = R(s, a) + γ Σs'∈S P(s'|s, a) maxa'∈A\
    \ Q*(s', a'), for all s ∈ S, a ∈ A(s)\n```\n\n(2.27)\n\nSince `V*(s) = maxa Q*(s,\
    \ a)`, we can also rewrite the Bellman optimality equation for `Q*` using `V*`:\n\
    \n```\nQ*(s, a) = E[Rt + γ V*(St+1) | St=s, At=a]\n         = R(s, a) + γ Σs'∈S\
    \ P(s'|s, a) V*(s')\n```\n\n(2.28)\n\nWe can draw the backup diagram for Bellman\
    \ optimality equation. Instead of averaging over all the actions, the Bellman\
    \ optimality equation for `V*` only considers the action with the highest value,\
    \ as shown in Fig. 2.14. Notice here it still averages over all the possible successor\
    \ states `s'`; however, these averaged values from different action nodes (two\
    \ are shown here) are not summed together."
  raw: '## 2.7 Optimal Policy and Optimal Value Functions


    The goal of using reinforcement learning to solve a problem is to find an optimal
    policy. If we can find a policy that yields the highest return for every single
    state in the entire state space, then we can consider the MDP is solved. This
    makes sense, because the only way the agent can get these maximum returns is by
    choosing the best actions in every single state. Formally, the optimal policy
    ![$$\pi _*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq268.png)
    is defined as the policy (or policies) which has the maximum state value ![$$V_\pi
    $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq269.png) over all
    other policies, for all states in the state space, as shown in Eq. ([2.22](#605748_1_En_2_Chapter.xhtml#Equ22)).


    ![$$\displaystyle \begin{aligned} \pi_*(s)=\mathop{\text{argmax}}_{\pi}V_\pi(s),
    \quad \mbox{for all}\; s \in \mathcal{S} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ22.png)


    (2.22)


    In theory, for every MDP there is an optimal policy ![$$\pi _*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq270.png)
    that is better than or equal to other policies. It’s possible for the MDP to have
    multiple optimal policies. For example, if in a state, there are two or more actions
    that lead to the same successor state, and the rewards for these different actions
    are the same. Figure [2.13](#605748_1_En_2_Chapter.xhtml#Fig13) is a small example
    MDP to illustrate this case. In this small example, the agent needs to drive a
    toy car from state A to state C. But the only way to get to state C is through
    state B. There are two possible actions (routes) that the agent can choose in
    state A; both actions will lead to state B. The rewards for these two actions
    are the same, so the agent can choose any one of these actions.


    We should not confuse optimal policy with a deterministic policy. A deterministic
    policy always chooses the same action in the same state, but that doesn’t mean
    the chosen action is the best action. But the optimal policy will always choose
    the best action.


    The optimal policy (or policies) ![$$\pi _*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq271.png)
    of an MDP shares the same optimal state value function ![$$V_*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq272.png)
    :


    ![$$\displaystyle \begin{aligned} V_*(s)=\max_{\pi} V_\pi(s), \quad \mbox{for
    all}\; s \in \mathcal{S} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ23.png)


    (2.23)


    Similarly, the optimal policy (or policies) ![$$\pi _*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq273.png)
    of an MDP shares the same optimal state-action value function ![$$Q_*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq274.png)
    :


    ![$$\displaystyle \begin{aligned} Q_*(s, a)=\max_{\pi} Q_\pi(s, a), \quad \mbox{for
    all}\; s \in \mathcal{S}, a \in \mathcal{A} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ24.png)


    (2.24)


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig13_HTML.png)


    A state transition diagram for toy car M D P. State A leads to state B via arrows
    for left with r equals 0, and right with r equals 0\. B leads to C via forward
    with r equals 1.


    Fig. 2.13


    Example of a toy car MDP with multiple optimal policies


    There’s a nice relationship between the optimal state value function ![$$V_*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq275.png)
    and the optimal state-action value function ![$$Q_*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq276.png)
    . It says the optimal value of a state ![$$V_*(s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq277.png)
    is equal to ![$$Q_*(s, a)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq278.png)
    where *a* is the action that has the maximum state-action value over all other
    actions in this state *s*. This should make sense, because if the agent is following
    the optimal policy, then there’s a 1.0 probability it will select the best action
    and a 0 probability of selecting nonbest actions (at least for the case of deterministic
    policy).


    ![$$\displaystyle \begin{aligned} V_*(s)=\max_{a \in A} Q_*(s, a) \end{aligned}
    $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ25.png)


    (2.25)


    Like the regular value functions, we can also rewrite Eq. ([2.23](#605748_1_En_2_Chapter.xhtml#Equ23))
    in a recursive manner. Here, we only care about the action that has the maximum
    immediate reward and the discount value of successor states. Equation ([2.26](#605748_1_En_2_Chapter.xhtml#Equ26))
    is the Bellman optimality equation for ![$$V_*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq279.png)
    :


    ![$$\displaystyle \begin{aligned} V_*(s) &amp; = \max_{a \in A} Q_*(s, a) \notag
    \\ &amp; = \max_{a}\mathbb{E}_{\,\!\!}\left[R_t + {\gamma} G_{t+1} \; \Big| \;
    S_t = s, A_t = a\right] \notag \\ &amp; = \max_{a}\mathbb{E}_{\,\!\!}\left[R_t
    + {\gamma} V_*(S_{t+1}) \; \Big| \; S_t = s, A_t = a\right] \notag \\ &amp; =\max_{a}
    \left[R(s, a) + {\gamma} \sum_{s'' \in \mathcal{S}} P(s''|s, a) V_*(s'') \right],
    \quad \mbox{for all}\; s \in \mathcal{S} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ26.png)


    (2.26)


    And similarly, we can also derive the Bellman optimality equation for ![$$Q_*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq280.png)
    , as shown in Eq. ([2.27](#605748_1_En_2_Chapter.xhtml#Equ27)):


    ![$$\displaystyle \begin{aligned} Q_*(s, a) &amp; =\mathbb{E}_{\,\!\!}\left[R_t
    + {\gamma} \max_{a''}Q_*(S_{t+1}, a'') \;\Big|\; S_t=s, A_t=a\right] \notag \\
    &amp; =R(s, a) + {\gamma} \sum_{s'' \in \mathcal{S}} P(s''|s, a) \max_{a'' \in
    A}Q_*(s'', a''), \quad \mbox{for all}\; s \in \mathcal{S}, a \in A(s) {} \end{aligned}
    $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ27.png)


    (2.27)


    Since ![$$V_*(s)=\max _{a} Q_*(s, a)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq281.png)
    , we can also rewrite the Bellman optimality equation for ![$$Q_*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq282.png)
    using ![$$V_*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq283.png)
    :


    ![$$\displaystyle \begin{aligned} Q_*(s, a) &amp; = \mathbb{E}_{\,\!\!}\left[R_t
    + {\gamma} V_*(S_{t+1}) \;\Big|\; S_t=s, A_t=a\right] \notag \\ &amp; =R(s, a)
    + {\gamma} \sum_{s'' \in \mathcal{S}} P(s''|s, a) V_*(s'') {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ28.png)


    (2.28)


    We can draw the backup diagram for Bellman optimality equation. Instead of averaging
    over all the actions, the Bellman optimality equation for ![$$V_*$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq284.png)
    only considers the action with the highest value, as shown in Fig. [2.14](#605748_1_En_2_Chapter.xhtml#Fig14).
    Notice here it still averages over all the possible successor states ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq285.png)
    ; however, these averaged values from different action nodes (two are shown here)
    are not summed together.'
  trans: "\n## 2.7 最优策略与最优价值函数\n\n使用强化学习解决问题的目标是找到最优策略。如果能在整个状态空间中为每一个状态都找到能获得最高回报的策略，那么就可以认为该马尔可夫决策过程（MDP）已得到解决。这很合理，因为智能体获得这些最大回报的唯一方式就是在每个状态都选择最佳动作。正式地，最优策略\
    \ `π*` 被定义为：在状态空间的所有状态上，其状态价值 `Vπ` 均高于其他所有策略的策略（或策略集合），如公式 (2.22) 所示。\n\n```\n\
    π*(s) = argmaxπ Vπ(s), 对所有 s ∈ S\n```\n\n(2.22)\n\n理论上，每个 MDP 都存在一个优于或等于其他策略的最优策略\
    \ `π*`。MDP 可能存在多个最优策略。例如，在某个状态下，有两个或更多动作会导向相同的后继状态，并且这些不同动作的奖励相同。图 2.13 是一个小型\
    \ MDP 示例，用于说明这种情况。在这个小例子中，智能体需要驾驶一辆玩具车从状态 A 到达状态 C。但到达状态 C 的唯一途径是通过状态 B。在状态 A\
    \ 中，智能体可以选择两个可能的动作（路线）；这两个动作都会导向状态 B。这两个动作的奖励相同，因此智能体可以选择其中任意一个动作。\n\n我们不应将最优策略与确定性策略混淆。确定性策略在相同状态下总是选择相同的动作，但这并不意味着所选动作就是最佳动作。而最优策略则始终会选择最佳动作。\n\
    \nMDP 的最优策略（或策略集合）`π*` 共享相同的最优状态价值函数 `V*`：\n\n```\nV*(s) = maxπ Vπ(s), 对所有 s ∈\
    \ S\n```\n\n(2.23)\n\n类似地，MDP 的最优策略（或策略集合）`π*` 共享相同的最优状态-动作价值函数 `Q*`：\n\n```\n\
    Q*(s, a) = maxπ Qπ(s, a), 对所有 s ∈ S, a ∈ A\n```\n\n(2.24)\n\n玩具车 MDP 的状态转移图。状态\
    \ A 通过向左箭头（r=0）和向右箭头（r=0）导向状态 B。状态 B 通过向前箭头（r=1）导向状态 C。\n\n**图 2.13** 具有多个最优策略的玩具车\
    \ MDP 示例\n\n最优状态价值函数 `V*` 与最优状态-动作价值函数 `Q*` 之间存在一个很好的关系。即，状态的最优价值 `V*(s)` 等于 `Q*(s,\
    \ a)`，其中 `a` 是在该状态 `s` 下所有动作中具有最大状态-动作价值的动作。这很合理，因为如果智能体遵循最优策略，那么它选择最佳动作的概率为 1.0，选择非最佳动作的概率为\
    \ 0（至少在确定性策略的情况下如此）。\n\n```\nV*(s) = maxa∈A Q*(s, a)\n```\n\n(2.25)\n\n与常规价值函数类似，我们也可以将公式\
    \ (2.23) 以递归方式重写。这里，我们只关心具有最大即时奖励和后继状态折扣价值的动作。公式 (2.26) 是 `V*` 的贝尔曼最优方程：\n\n```\n\
    V*(s) = maxa∈A Q*(s, a)\n      = maxa E[Rt + γ Gt+1 | St = s, At = a]\n      =\
    \ maxa E[Rt + γ V*(St+1) | St = s, At = a]\n      = maxa [R(s, a) + γ Σs'∈S P(s'|s,\
    \ a) V*(s')], 对所有 s ∈ S\n```\n\n(2.26)\n\n类似地，我们也可以推导出 `Q*` 的贝尔曼最优方程，如公式 (2.27)\
    \ 所示：\n\n```\nQ*(s, a) = E[Rt + γ maxa' Q*(St+1, a') | St=s, At=a]\n         =\
    \ R(s, a) + γ Σs'∈S P(s'|s, a) maxa'∈A Q*(s', a'), 对所有 s ∈ S, a ∈ A(s)\n```\n\n\
    (2.27)\n\n由于 `V*(s) = maxa Q*(s, a)`，我们也可以使用 `V*` 重写 `Q*` 的贝尔曼最优方程：\n\n```\nQ*(s,\
    \ a) = E[Rt + γ V*(St+1) | St=s, At=a]\n         = R(s, a) + γ Σs'∈S P(s'|s, a)\
    \ V*(s')\n```\n\n(2.28)\n\n我们可以绘制贝尔曼最优方程的备份图。与对所有动作取平均不同，`V*` 的贝尔曼最优方程只考虑具有最高价值的动作，如图\
    \ 2.14 所示。注意，它仍然对所有可能的后续状态 `s'` 取平均；然而，来自不同动作节点（此处显示了两个）的这些平均值并不会被加总在一起。\n"
- fmt: 'And Fig. [2.15](#605748_1_En_2_Chapter.xhtml#Fig15) shows the backup diagram
    for Eq. ([2.27](#605748_1_En_2_Chapter.xhtml#Equ27)). Similarly, here it only
    considers the action that yields the highest value for the successor state `s''`.


    In practice, we are more interested in the optimal state-action value function
    `Q*`. The reason is very simple; if we have `Q*`, we can easily construct an optimal
    policy based on `Q*` like shown in Eq. ([2.29](#605748_1_En_2_Chapter.xhtml#Equ29)).
    In this case, we always choose (with probability 1.0) the action that has the
    maximum `Q*(s, a)` value, then the MDP is solved.


    ```

    π*(a|s) = { 1, if a = argmax_{a∈A} Q*(s, a); 0, otherwise }

    ```


    (2.29)


    A backup diagram for `Q*` with two levels. The root node has action `a`, `r` with
    average that splits into 2 states with arc angle `p`. The two states have arc
    angles `π` and have 2 actions each with max. Action `a`, `r` leads to state `s''`,
