    By plugging in the preceding results into Eq. ([9.7](#605748_1_En_9_Chapter.xhtml#Equ8)),
    we obtain the final equation to compute the gradients (for the episode case) with
    respect to ![$$\boldsymbol {\theta }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq84.png)
    :


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ G(\tau) \nabla_{\boldsymbol{\theta}}
    \log P(\tau; \boldsymbol{\theta}) \right]\notag \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \sum_{t=0}^{T-1} \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta})
    \right] \notag \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{T-1}
    G(\tau) \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta}) \right]
    \notag \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{T-1}
    \left( \sum_{k=0}^{T-1} {\gamma}^k r_k \right) \nabla_{\boldsymbol{\theta}} \log
    \pi (a_t|s_t; \boldsymbol{\theta}) \right] \notag \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \sum_{t=0}^{T-1} \left( {\gamma}^t \sum_{k=t}^{T-1} {\gamma}^{k-t} r_k \right)
    \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta}) \right] \notag
    \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{T-1} {\gamma}^t
    G_t \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta}) \right]
    {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ12.png)


    (9.11)


    The intuition behind the policy gradient as shown in Eq. ([9.11](#605748_1_En_9_Chapter.xhtml#Equ12))
    is that we want to increase the probability (or log-likelihood) of ![$$\pi (a_t|s_t;
    \boldsymbol {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq85.png)
    in proportion to how well that action actually performed (i.e., how much reward
    the agent received after taking the action).


    To get rid of the expectation sign in Eq. ([9.11](#605748_1_En_9_Chapter.xhtml#Equ12)),
    we can use stochastic gradient ascent methods to compute sample gradients over
    episode sequences generated using Monte Carlo methods. Then, Eq. ([9.11](#605748_1_En_9_Chapter.xhtml#Equ12))
    is something we can compute analytically.


    For example, if we’re using linear methods to construct the action preference
    ![$$\phi (s, a)^T \boldsymbol {\theta }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq86.png)
    for a softmax policy distribution (as shown in Eq. ([9.1](#605748_1_En_9_Chapter.xhtml#Equ1))),
    then the policy gradients ![$$\nabla _{\boldsymbol {\theta }} \log \pi (a|s; \boldsymbol
    {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq87.png)
    become


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}} \log \pi (a|s;
    \boldsymbol{\theta}) &amp; = \nabla_{\boldsymbol{\theta}} \log e^{\phi(s, a)^T
    \boldsymbol{\theta}} - \nabla_{\boldsymbol{\theta}} \log \left( \sum_{b \in \mathcal{A}(s)}
    e^{\phi(s, b)^T \boldsymbol{\theta}} \right) \notag \\ &amp; = \nabla_{\boldsymbol{\theta}}
    \Bigl( \phi(s, a)^T \boldsymbol{\theta} \Bigr) - \frac{\nabla_{\boldsymbol{\theta}}
    \sum_b e^{\phi(s, b)^T \boldsymbol{\theta}}}{\sum_b e^{\phi(s, b)^T \boldsymbol{\theta}}
    }\notag \\ &amp; = \phi(s, a) - \frac{\sum_b \phi(s, b) e^{\phi(s, b)^T \boldsymbol{\theta}}}{\sum_b
    e^{\phi(s, b)^T \boldsymbol{\theta}} } \notag \\ &amp; = \phi(s, a) - \sum_b \pi(b|s;
    \boldsymbol{\theta}) \phi(s, b) {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ13.png)


    (9.12)'
