    , and ![$$\hat {A}{\pi }(s_t, a_t)$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq50.png)
    is the advantage function at time step *t*. The advantage function measures how
    much better an action is compared to the average action under the current policy
    ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq51.png)
    , in terms of expected cumulative reward.


    The advantage function is defined as ![$$\hat {A}_{\pi }(s, a) = Q_{\pi }(s,a)
    - V_{\pi }(s)$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq52.png)
    , where ![$$Q_{\pi }(s,a)$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq53.png)
    is the state-action value function under policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq54.png)
    , and ![$$V_{\pi }(s)$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq55.png)
    is the state value function under policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq56.png)
    . The state-action value function represents the expected cumulative reward of
    taking action *a* in state *s* and following policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq57.png)
    thereafter, while the state value function represents the expected cumulative
    reward starting from state *s* and following policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq58.png)
    thereafter.


    The proof for Eq. ([11.2](#605748_1_En_11_Chapter.xhtml#Equ2)) is shown here:


    ![$$\displaystyle \begin{aligned} J(\pi'') - J(\pi) &amp; = \mathbb{E}_{\tau \sim
    \pi''\!\!}\left[\sum_{t=0}^{\infty} {\gamma}^t \hat{A}_{\pi}(s_t, a_t) \right]
    \notag \\ &amp; = \mathbb{E}_{\tau \sim \pi''\!\!}\left[\sum_{t=0}^{\infty} {\gamma}^t
    \left( R(s_t, a_t) + {\gamma} V_{\pi}(s_{t+1}) - V_{\pi}(s_t) \right)\right] \notag
    \\ &amp; = J(\pi'') + \mathbb{E}_{\tau \sim \pi''\!\!}\left[\sum_{t=0}^{\infty}
    {\gamma}^{t+1} V_{\pi}(s_{t+1}) - \sum_{t=0}^{\infty} {\gamma}^t V_{\pi}(s) \right]
    \notag \\ &amp; = J(\pi'') + \mathbb{E}_{\tau \sim \pi''\!\!}\left[\sum_{t=1}^{\infty}
    {\gamma}^t V_{\pi}(s) -\sum_{t=0}^{\infty} {\gamma}^t V_{\pi}(s) \right] \notag
    \\ &amp; = J(\pi'') - \mathbb{E}_{\tau \sim \pi''\!\!}\left[V_{\pi}(s_0)\right]
    \notag \\ &amp; = J(\pi'') - J(\pi) \notag \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equh.png)


    Equation ([11.2](#605748_1_En_11_Chapter.xhtml#Equ2)) suggests we can rewrite
    the objective for optimizing the new policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq59.png)
    , with respect to the current or old policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq60.png)
    , such that


    ![$$\displaystyle \begin{aligned} \max_{\pi''}J(\pi'') &amp; = \max_{\pi''}J(\pi'')
    - J(\pi) \notag \\ &amp; = \max_{\pi''}J(\pi'') \mathbb{E}_{\tau \sim \pi''\!\!}\left[\sum_{t=0}^{\infty}
    {\gamma}^t \hat{A}_{\pi}(s_t, a_t) \right] {} \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ3.png)


    (11.3)


    However, in the equation, we still need the trajectories sampled when following
    the new policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq61.png)
    ; this requirement makes it impossible to compute.


    But let’s rewrite Eq. ([11.2](#605748_1_En_11_Chapter.xhtml#Equ2)) in terms of
    the discounted future state distribution ![$$d_{\pi }$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq62.png)
    and use the property that the sum of an infinite geometric series with common
    ratio ![$${\gamma }$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq63.png)
    is ![$$\frac {1}{1 - {\gamma }}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq64.png)
    , such as


    ![$$\displaystyle \begin{aligned} J(\pi'') - J(\pi) &amp; = \mathbb{E}_{\tau \sim
    \pi''\!\!}\left[\sum_{t=0}^{\infty} {\gamma}^t \hat{A}_{\pi}(s_t, a_t) \right]
    \notag \\ &amp; =\frac{1}{1 - {\gamma}} \mathbb{E}_{\substack{s \sim d_{\pi''}
    \\ a \sim \pi''}\!\!}\left[\hat{A}_{\pi}(s, a)\right] \notag \\ &amp; =\frac{1}{1
    - {\gamma}}\mathbb{E}_{\substack{s \sim d_{\pi''} \\ a \sim \pi}\!\!}\left[\frac{\pi''(a|s)}{\pi(a|s)}
    \hat{A}_{\pi}(s, a)\right] {} \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ4.png)


    (11.4) where ![$$d_{\pi }$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq65.png)
    is the expected discounted frequency of visiting a state *s* under the policy
    ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq66.png)
    , and ![$$d_{\pi }$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq67.png)
    is defined as


    ![$$\displaystyle \begin{aligned} d_{\pi} = (1 - {\gamma}) \sum_{t=0}^{\infty}
    {\gamma}^t P(s_t = s|\pi) \notag \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ5.png)


    If the discounted future state distributions ![$$d_{\pi ''}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq68.png)
    and ![$$d_{\pi }$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq69.png)
    are close, that is, ![$$d_{\pi ''} \approx d_{\pi }$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq70.png)
    , then we can approximate Eq. ([11.4](#605748_1_En_11_Chapter.xhtml#Equ4)) using
    ![$$d_{\pi }$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq71.png)
    , such as'
  trans: "\n# 11.2 策略性能边界\n\n我们希望找到一种方法，确保更新后的策略与当前策略不会相差太远，从而避免可能导致不稳定的巨大更新，同时又不影响训练速度，或避免像使用较小步长时可能陷入局部最优的情况。\n\
    \n我们首先引入相对策略性能方程，如式(11.2)所示。本质上，该方程表明，对于任意两个策略 `π'` 和 `π`，例如，`π'` 可以是新策略，`π` 是当前策略，那么这两个策略之间的性能差异可以表示为\n\
    \n```\nJ(π') - J(π) = \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]\n```\n\
    \n(11.2)\n\n式(11.2)被称为强化学习中的策略改进定理，由 Russell 和 Norvig [1] 首次提出。方程左侧 `J(π') - J(π)`\
    \ 表示新策略 `π'` 与旧策略 `π` 之间期望累积奖励的差值。这是我们更新策略时希望最大化的量。\n\n方程右侧 `\U0001D53C_{τ ~ π'}[∑_{t=0}^{∞}\
    \ γ^t Â_π(s_t, a_t)]` 是在新策略 `π'` 下优势函数之和的期望值，其中 `τ` 是按照新策略 `π'` 收集的状态、动作和奖励的轨迹，`Â_π(s_t,\
    \ a_t)` 是时间步 `t` 的优势函数。优势函数衡量的是，在期望累积奖励方面，某个动作相对于当前策略 `π` 下的平均动作有多好。\n\n优势函数定义为\
    \ `Â_π(s, a) = Q_π(s, a) - V_π(s)`，其中 `Q_π(s, a)` 是策略 `π` 下的状态-动作值函数，`V_π(s)`\
    \ 是策略 `π` 下的状态值函数。状态-动作值函数表示在状态 `s` 下采取动作 `a` 并随后遵循策略 `π` 所能获得的期望累积奖励，而状态值函数表示从状态\
    \ `s` 开始并遵循策略 `π` 所能获得的期望累积奖励。\n\n式(11.2)的证明如下：\n\n```\nJ(π') - J(π) = \U0001D53C\
    _{τ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]\n             = \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞}\
    \ γ^t (R(s_t, a_t) + γ V_π(s_{t+1}) - V_π(s_t))]\n             = J(π') + \U0001D53C\
    _{τ ~ π'}[∑_{t=0}^{∞} γ^{t+1} V_π(s_{t+1}) - ∑_{t=0}^{∞} γ^t V_π(s)]\n       \
    \      = J(π') + \U0001D53C_{τ ~ π'}[∑_{t=1}^{∞} γ^t V_π(s) - ∑_{t=0}^{∞} γ^t\
    \ V_π(s)]\n             = J(π') - \U0001D53C_{τ ~ π'}[V_π(s_0)]\n            \
    \ = J(π') - J(π)\n```\n\n式(11.2)表明，我们可以相对于当前或旧策略 `π`，重写优化新策略 `π'` 的目标函数，如下所示：\n\
    \n```\nmax_{π'} J(π') = max_{π'} J(π') - J(π)\n               = max_{π'} J(π')\
    \ \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]\n```\n\n(11.3)\n\n然而，在该方程中，我们仍然需要按照新策略\
    \ `π'` 采样得到的轨迹；这一要求使其无法计算。\n\n但让我们用折扣未来状态分布 `d_π` 来重写式(11.2)，并利用公比为 `γ` 的无穷等比级数之和为\
    \ `1 / (1 - γ)` 的性质，例如：\n\n```\nJ(π') - J(π) = \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞}\
    \ γ^t Â_π(s_t, a_t)]\n             = 1/(1 - γ) \U0001D53C_{s ~ d_{π'}, a ~ π'}[Â_π(s,\
    \ a)]\n             = 1/(1 - γ) \U0001D53C_{s ~ d_{π'}, a ~ π}[π'(a|s)/π(a|s)\
    \ Â_π(s, a)]\n```\n\n(11.4)\n\n其中 `d_π` 是在策略 `π` 下访问状态 `s` 的期望折扣频率，`d_π` 定义为\n\
    \n```\nd_π = (1 - γ) ∑_{t=0}^{∞} γ^t P(s_t = s|π)\n```\n\n如果折扣未来状态分布 `d_{π'}`\
    \ 和 `d_π` 接近，即 `d_{π'} ≈ d_π`，那么我们可以使用 `d_π` 来近似式(11.4)，例如：\n"
- fmt: '![$$\displaystyle \begin{aligned} J(\pi'') - J(\pi) & \approx \frac{1}{1 -
    {\gamma}}\mathbb{E}_{\substack{s \sim d_{\pi} \\ a \sim \pi}\!\!}\left[\frac{\pi''(a|s)}{\pi(a|s)}
    \hat{A}_{\pi}(s, a)\right] \\ & \doteq \mathcal{L}_{\pi}(\pi'') \notag \end{aligned}
    $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ6.png)


    (11.5)


    It turns out this approximation of ![$$\mathcal {L}_{\pi }(\pi '') \approx J(\pi
    '') - J(\pi )$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq72.png)
    produces really good results, as proved by Achiam et al. [[2](#605748_1_En_11_Chapter.xhtml#CR2)],
    it has a performance bound, if the new policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq73.png)
    and old policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq74.png)
    are close in the policy space.


    ![$$\displaystyle \begin{aligned} \lvert J(\pi'') - \left( J(\pi) + \mathcal{L}_{\pi}(\pi'')
    \right) \rvert \le C\sqrt{\mathbb{E}_{s \sim d_{\pi}\!\!}\left[D_{KL}(\pi''||\pi)[s]\right]}
    {} \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ7.png)


    (11.6) where ![$$D_{KL}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq75.png)
    is the Kullback-Leibler (KL) divergence, which measures the distance between two
    probability distributions. For example, given two probability distributions `P`
    and `Q` over some random variable, the KL divergence is computed using the following
    equation:


    ![$$\displaystyle \begin{aligned} D_{KL}(P||Q) = \sum_x P(x) \log \frac{P(x)}{Q(x)}
    \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ8.png)


    (11.7)


    Note the KL divergence distance is zero if the two probability distributions are
    the same, that is, ![$$D_{KL}(P||Q) = 0$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq76.png)
    , if ![$$P = Q$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq77.png)
    .


    Specifically, in the context of reinforcement learning, given two policies ![$$\pi
    ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq78.png) and
    ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq79.png)
    , the KL divergence between them for a given state `s` can be computed using the
    equation:


    ![$$\displaystyle \begin{aligned} D_{KL}(\pi''||\pi)[s] = \sum_{a \in \mathcal{A}}
    \pi''(a|s) \log \frac{\pi''(a|s)}{\pi(a|s)} \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ9.png)


    (11.8)


    ### Monotonic Improvement Theory


    We can rearrange Eq. ([11.6](#605748_1_En_11_Chapter.xhtml#Equ7)) as


    ![$$\displaystyle \begin{aligned} J(\pi'') - J(\pi) \ge \mathcal{L}_{\pi}(\pi'')
    - C\sqrt{\mathbb{E}_{s \sim d_{\pi}\!\!}\left[D_{KL}(\pi''||\pi)[s]\right]} {}
    \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ10.png)


    (11.9)


    This equation is known as the performance improvement bound in reinforcement learning.
    On the left-hand side of the equation, ![$$J(\pi '') - J(\pi )$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq80.png)
    represents the difference in expected cumulative reward between the new policy
    ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq81.png)
    and the old policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq82.png)
    . This is the quantity we want to improve as we update our policy.


    On the right-hand side of the equation, ![$$\mathcal {L}_{\pi }(\pi '') - C\sqrt
    {\mathbb {E}_{s \sim d_{\pi }\!\!}\left [D_{KL}(\pi ''||\pi )[s]\right ]}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq83.png)
    is the surrogate objective function, where ![$$\mathcal {L}_{\pi }(\pi '')$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq84.png)
    is the advantage function of the policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq85.png)
    , and `C` is a hyperparameter that balances the trade-off between the expected
    improvement and the KL divergence penalty.


    The first term, ![$$\mathcal {L}_{\pi }(\pi '')$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq86.png)
    , measures how much better the new policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq87.png)
    is than the old policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq88.png)
    in terms of expected reward, based on the advantage function. The advantage function
    represents how much better each action is compared to the average action under
    the current policy and is often used to estimate the policy gradient.


    The second term, ![$$C\sqrt {\mathbb {E}_{s \sim d_{\pi }\!\!}\left [D_{KL}(\pi
    ''||\pi )[s]\right ]}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq89.png)
    , penalizes the KL divergence between the new policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq90.png)
    and the old policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq91.png)
    , weighted by the constant `C`. This term ensures that the new policy is not too
    different from the old policy, to avoid making large and potentially harmful changes.


    The performance improvement bound provides a theoretical guarantee that by optimizing
    the surrogate objective function, we can improve the expected cumulative reward
    of the policy. It also gives us a nice property such that if we can maximize the
    terms on the right side, then we’re guaranteed that the new policy ![$$\pi ''$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq92.png)
    is an improvement over the old policy ![$$\pi $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq93.png)
    .'
