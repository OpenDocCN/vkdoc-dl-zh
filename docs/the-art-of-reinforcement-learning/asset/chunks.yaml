    # 12.2 通用分布式强化学习架构


    分布式强化学习是一种强大的训练架构，能够高效利用机器学习中的资源。在此架构中，涉及两类智能体：环境智能体（或称执行者智能体），负责通过与环境的交互生成样本转换；以及学习智能体，负责学习，例如通过神经网络近似学习最优策略或价值函数。


    通过分离这些智能体，该架构能够更高效地利用计算资源。学习智能体可以专注于更新神经网络，而无需与环境交互，从而减少计算负载并加速学习过程。这是因为，通常情况下，加速硬件无法显著提升与环境交互的速度，而使用加速硬件解决方案则有利于训练深度神经网络。此外，该架构可扩展至更复杂、更具挑战性的问题。我们可以按需增加智能体的数量，从而解决那些原本计算成本过高的问题。


    通用分布式强化学习架构旨在加速训练样本的生成和训练过程。多个执行者（有时也称为观察者或工作者）与环境交互，并将其转换数据发送至中央服务器。然后，学习器从中央服务器采样一小批转换数据，基于这些转换计算损失，并使用随机梯度下降更新神经网络的参数。更新后的参数随后被发送回中央服务器，以便分发给各个执行者。


    该架构既适用于同策略方法，也适用于异策略方法，但对同策略方法尤为有用。同策略方法是指在学习最优策略的同时遵循当前策略的强化学习算法。同策略方法的一个例子是近端策略优化（`PPO`）。相比之下，异策略方法在学习最优策略时遵循的是另一种策略。异策略方法的一个例子是深度
    Q 网络（`DQN`），它使用经验回放来存储和重用最近的样本转换。


    需要注意的是，分布式强化学习与多智能体强化学习并不相同。在多智能体强化学习中，所有智能体以同步方式同时作用于同一环境，而每个智能体可能拥有自己的策略和目标函数。相比之下，在分布式强化学习中，智能体各自作用于其独立的环境副本，这些副本通常不同步。


    以下示例有助于更好地理解该架构的工作原理。假设我们有一个训练智能体玩电子游戏的任务。多个执行者与游戏环境交互并生成转换（`状态`、`动作`、`奖励`）。这些转换被发送至中央服务器。学习器从中央服务器采样一小批转换，基于这些转换计算损失，并更新神经网络的参数。更新后的参数随后被发送回中央服务器，以便分发给各个执行者。随着训练的进行，学习器的神经网络不断改进，执行者也能生成更好的转换。这一迭代过程持续进行，直到智能体学会有效玩游戏。


    以下是图 12.1 所示通用分布式强化学习训练架构的简化说明。


    ![](img/605748_1_En_12_Fig1_HTML.png)


    一个框图展示了强化学习系统中的多个环境、执行者和神经网络。它描绘了转换、`N N` 参数、中央服务器以及学习过程步骤，例如拉取转换、计算损失、梯度和更新 `N
    N` 参数。


    **图 12.1** 用于说明使用多个执行者和单个学习智能体进行分布式强化学习思想的简单示意图


    在分布式强化学习中，我们有多个智能体（称为执行者），它们各自与自己的环境交互。每个智能体都拥有自己的一份神经网络副本，用于根据环境状态做出决策。我们还有一个学习智能体，它拥有一份神经网络副本，但没有与之关联的环境。中央服务器充当执行者和学习智能体之间的协调者，负责收集新生成的经历，并将最新的神经网络参数分发给执行者。


    该架构旨在通过将工作负载分布到多个处理器或机器上，使训练更加高效。执行者可以在 CPU 等中等硬件上运行，而学习器则在 GPU 等更强大的硬件上运行。


    在训练过程中，执行者的行为可能不同，尤其是在策略更具随机性的早期阶段。这种探索有助于为强化学习智能体发现新的、更好的策略。中央服务器还可以存储训练日志和统计数据，用于监控和分析。


    例如，假设我们有一个需要学习如何玩视频游戏的强化学习智能体。与其让一个智能体玩游戏并从其经历中学习，我们可以使用多个智能体，每个智能体以略有不同的策略玩游戏。中央服务器收集这些经历，并将最新的策略分发给每个智能体。这样，智能体可以相互学习，并行探索不同的策略，从而实现更快、更好的学习。


    例如，通用分布式强化学习的伪代码如算法 1 所示。


    **算法 1：** 通用分布式强化学习


    ![](img/605748_1_En_12_Figaaa_HTML.gif) 一个算法初始化学习器和执行者的神经网络参数，收集转换并使用随机梯度下降更新参数直至收敛，并定期与中央服务器通信。


    在强化学习中使用多个智能体时，需要解决一些挑战。其中一个挑战是确保智能体生成多样化且有用的训练样本。为了解决这个问题，一种技术是随机初始化执行者与之交互的环境。这种方法有助于鼓励探索状态-动作空间的不同区域，从而可能为智能体发现新的、更好的策略。


    最后，还有其他挑战，例如如何处理跨不同机器或智能体的通信开销。尽管存在这些挑战，分布式强化学习训练架构仍然是训练强化学习智能体的一种强大方法。通过并行运行多个执行者，该架构加速了训练样本的生成过程，并鼓励探索状态-动作空间的不同区域，从而为智能体发现新的、更好的策略。

    '
- fmt: '# Applications of Distributed Reinforcement Learning


    Two popular distributed reinforcement learning architectures are `Ape-X` and `IMPALA`.
    `Ape-X` was proposed by Horgan et al. [[1](#605748_1_En_12_Chapter.xhtml#CR1)],
    which is based on value-based methods similar to the `DQN`. It uses multiple actors
    to generate environment transitions, while a single central agent, called the
    learner, is responsible for learning. The central agent updates the parameters
    of the neural network based on a prioritized replay buffer, without any environment
    interactions because the samples are generated by the actors, allowing it to focus
    on learning. `IMPALA` was proposed by Espeholt et al. [[2](#605748_1_En_12_Chapter.xhtml#CR2)];
    it’s a policy-based method. It also uses multiple actors to generate environment
    transitions, while a single learner updates the neural network parameters. Both
    `Ape-X` and `IMPALA` can scale to large numbers of agents and can be used for
    on-policy and off-policy reinforcement learning.


    Another example of distributed reinforcement learning is `AlphaGo` developed by
    Silver et al. [[3](#605748_1_En_12_Chapter.xhtml#CR3)], which uses multiple self-play
    actors across hundreds of servers to generate self-play games, while multiple
    agents run on multiple servers to update the neural network parameters. This approach
    allows for efficient exploration of the game tree and effective learning.


    # Distributed Reinforcement Learning for On-Policy vs. Off-Policy Learning


    When designing distributed reinforcement learning algorithms, it’s important to
    distinguish whether they use on-policy or off-policy learning. On-policy learning
    agents learn the optimal policy or value function based on the experiences generated
    by following its own policy, while off-policy learning agents use data collected
    from other policies.


    For off-policy learning agents, such as `DQN`, large amounts of historical data
    can be used for learning. This allows actors and learner agents to work in parallel,
    with actors generating samples without needing to use the latest policy. For example,
    `DQN` uses experience replay to learn from a buffer of transitions that are stored
    and sampled independently of the current policy. Actors can use a policy that’s
    a few iterations behind the latest policy, with parameters synchronized every
    few hundred environment steps to reduce communication overhead.


    On the other hand, for on-policy learning agents, such as `Actor-Critic` or `PPO`,
    it’s crucial for all actors to use the latest policy to make decisions. This can
    be challenging in a distributed computing architecture, requiring proper synchronization
    mechanisms between agents to ensure that all actors use the latest policy. One
    common approach is to use parameter servers to store and update policy parameters
    that actors and learner agents can access. Alternatively, a message passing scheme
    can be used to synchronize policies in real time. However, these approaches may
    introduce additional communication overhead and computational costs.


    In summary, understanding the differences between on-policy and off-policy learning
    agents is essential for designing effective distributed reinforcement learning
    algorithms. By carefully considering these factors and designing appropriate algorithms
    and architectures, we can enable efficient and scalable distributed reinforcement
    learning in a wide range of applications.


    # Exploration with Distributed Reinforcement Learning


    Reinforcement learning agents need to explore the environment in order to learn
    an optimal policy. For policy-based agents, like `Actor-Critic` or `PPO`, the
    nature of the policy already encourages exploration. But we can also use the concept
    of entropy to encourage the agent to try new actions. This applies to both single-agent
    and distributed settings.


    For value-based agents, like `DQN`, a common strategy to encourage exploration
    is to use an `ε`-greedy policy. With this approach, the agent chooses the best
    action with probability `1-ε` and acts randomly with probability `ε`. By gradually
    reducing `ε` over time, we can shift the agent’s focus from exploration to exploitation.


    In distributed settings, each actor is given its own exploration rate, `ε_i`,
    using an equation that depends on the number of actors and a tuning parameter.
    Such solution is also implemented in `Ape-X`. The equation is `ε_i = ε^(1 + (i/(N-1))
    * a)`, where `ε` is the initial exploration rate, `N` is the total number of actors,
    `i` is the index of the current actor, and `a` controls how quickly the exploration
    rate decays as `i` increases. By adjusting the value of `a`, we can control the
    distribution of exploration rates across actors and find a balance between exploration
    and exploitation that works well for the problem at hand.


    For example, if we have four actors and set `ε = 0.4` and `a = 1`, the exploration
    rates for each actor would be `[0.4, 0.04716, 0.00556, 0.00066]`. This means that
    the first actor will explore much more than the others, while the last actor will
    hardly explore at all.'
