    # 13.3 随机网络蒸馏


    随机网络蒸馏（RND）是一种旨在鼓励学习智能体进行探索的强化学习算法。该算法由 Burda 等人提出 [2]，其核心思想是基于智能体体验的新颖性来计算内在奖励。换句话说，该算法会奖励智能体遇到新的、未曾预料到的体验。


    RND 使用两个神经网络：一个固定且随机初始化的目标网络，记为 `f`；以及一个预测器网络，记为 `\hat{f}`，该网络使用智能体收集的数据进行训练。在训练过程中，固定网络
    `f` 的权重保持不变，而预测器网络 `\hat{f}` 的权重则通过基于预测误差的监督学习进行更新。


    在时间步 `t` 时，状态 `s_t` 的内在奖励信号 `r_t^{I}` 计算如下：


    ```

    \displaystyle \begin{aligned} r_t^{I} = \lvert f(s_t) - \hat{f}(s) \lvert² \end{aligned}

    ```


    (13.1)


    更精确地说，RND 算法可以通过以下步骤描述：


    -   固定网络 `f` 将状态 `s_t` 作为输入，并输出一个嵌入特征向量 `\tau_t`。

    -   预测器网络将相同的状态 `s_t` 作为输入，并输出其自身的嵌入特征向量 `\hat{\tau}_t`。

    -   然后，预测器网络 `\hat{f}` 的预测与固定网络 `f` 之间的差异被用来计算内在奖励，即 `\lvert \hat{\tau}_t - \tau_t
    \rvert²`。

    -   随后，预测器网络被训练以最小化预测误差 `\lvert \hat{\tau}_t - \tau_t \rvert²`，这是通过使用监督学习方法完成的。


    图 13.1 展示了 RND 的工作原理。


    ![](img/605748_1_En_13_Fig1_HTML.png)


    RND 计算内在奖励和更新的流程图从环境状态 `s_t` 开始。它流经固定网络 `f(s_t)`、预测器网络 `\hat{f}(s_t)` 和预测误差。最终得到内在奖励
    `r_t^{I}`。预测误差通过更新预测器网络反馈给预测器网络。


    **图 13.1** RND 如何计算内在奖励并更新预测器网络。改编自 Burda 等人 [2]


    内在奖励与环境提供的奖励信号相结合，得到总奖励 `r_t = r_t^{E} + r_t^{I}`，其中 `r_t^{E}` 是环境在时间步 `t` 提供的奖励，`r_t^{I}`
    是与时间步 `t` 的转移相关的探索奖励（内在奖励）。这个总奖励可以接入任何现有的强化学习算法中，例如 DQN、Actor-Critic，甚至是 PPO。


    为了理解 RND 背后的直觉，让我们看一个简单的例子。假设我们试图训练一个智能体在迷宫中导航，环境只在智能体成功到达目标位置时提供 +1 的正奖励，否则奖励为零。在这种情况下，智能体可能难以做出适当的决策并探索环境，因为在到达目标之前没有提供有意义的奖励。


    为了鼓励智能体更多地探索，我们可以使用 RND。固定网络 `f` 是随机初始化的，并且在训练过程中保持不变。它接收智能体在迷宫中的当前状态，并输出一个代表该状态的唯一嵌入特征向量
    `\tau_t`。同时，预测器网络 `\hat{f}` 接收相同的状态，并尝试预测来自固定网络的嵌入特征向量 `\tau_t`。


    当智能体探索迷宫时，预测器网络 `\hat{f}` 为当前状态 `s_t` 预测嵌入特征向量 `\hat{\tau}_t`，固定网络 `f` 也为 `s_t`
    生成其自身的嵌入特征向量 `\tau_t`。然后，基于这两个预测向量之间的平方欧几里得距离来计算内在奖励：`\lvert \hat{\tau}_t - \tau_t
    \rvert²`。如果智能体遇到一个与之前见过的任何状态都显著不同的新状态，那么预测向量之间的距离将会很大，从而产生较高的内在奖励。另一方面，如果智能体重复访问相同的状态，预测向量之间的距离将会很小，从而产生较低的内在奖励。


    这个内在奖励随后与环境奖励相结合，总奖励用于更新智能体的策略。通过鼓励智能体探索新的状态和体验，RND 可以帮助智能体更有效地学习，并更高效地在迷宫中导航。


    用于 Atari 游戏的 RND 模块的神经网络架构如图 13.2 所示。该模块包含左侧的目标网络，它是随机初始化的，其参数在训练过程中保持固定。右侧是预测器网络，它与目标网络相似，但包含两个额外的全连接层。两个网络都接收一个归一化的
    `84 \times 84 \times 1` 单帧作为输入，并输出一个嵌入向量。预测器网络的目标是准确预测由固定目标网络生成的嵌入向量。


    ![](img/605748_1_En_13_Fig2_HTML.png)


    两个自下而上的流程图，分别标注为目标网络和预测器网络，展示了 RND 神经网络架构。目标网络和预测器网络都以 32 个滤波器、内核大小 8x8 和步长 4
    开始，并以 512 个单元的嵌入层结束。目标网络和预测器网络分别有 4 个带有 leaky ReLU 连接的阶段和 6 个带有 ReLU 连接的阶段。


    **图 13.2** Burda 等人 [2] 为 Atari 视频游戏提出的 RND 神经网络架构，其中左侧显示随机初始化的目标网络，右侧显示预测器网络

