    ### 4.4 蒙特卡洛控制（策略改进）


    现在，我们准备开始使用蒙特卡洛方法进行策略改进。在动态规划（DP）中，策略改进算法包含两个步骤。第一步是利用估计的状态价值函数 `V_π` 和环境模型来计算状态-动作价值函数
    `Q_π`。第二步是基于 `Q_π` 计算出一个更优的确定性策略 `π''`。


    在蒙特卡洛策略评估中，我们可以直接估计状态-动作价值函数 `Q_π`，而无需先估计状态价值函数。算法 4 展示了这一过程。该算法通过模拟与环境的完整情节交互来工作，其中情节是从初始状态开始到终止状态结束的一系列状态-动作-奖励转换序列。我们使用首次访问法来估计
    `Q_π`，这意味着在计算平均回报时，我们只考虑每个情节中状态-动作对的首次出现。这确保了估计是无偏的。


    利用 `Q_π` 的估计值，我们可以计算出一个更优的策略 `π''`。一种方法是使用 `ε`-贪心策略，这是一种在学习过程中平衡探索与利用的方法。`ε`-贪心策略以概率
    `1-ε` 选择具有最高估计状态-动作价值的动作，并以概率 `ε` 随机选择一个动作。`ε` 的值决定了探索的程度；`ε` 值越大，探索越多。


    蒙特卡洛策略改进的 `ε`-贪心策略工作方式如下：对于每个状态，我们以概率 `1-ε` 选择具有最高估计状态-动作价值的动作，并以概率 `ε/K` 随机选择一个动作，其中
    `K` 是该状态下可用的动作数量。这确保了每个动作被选中的概率非零，这对于收敛到最优策略是必要的。然后，新策略 `π''` 被计算为相对于 `Q_π` 的贪心策略，即对于每个状态，我们选择具有最高估计状态-动作价值的动作。


    **算法 5：蒙特卡洛策略改进示例，采用 `ε`-贪心探索**


    ![](img/605748_1_En_4_Figaaf_HTML.gif) 一个 7 行算法，标题为蒙特卡洛策略改进示例，接收以下输入，输出一个改进后的策略。针对策略
    `π` 的估计状态-动作价值函数 `Q_π` 和探索率 `ε`。


    总之，蒙特卡洛策略改进允许我们直接估计状态-动作价值函数 `Q_π`，并利用它来改进策略，而无需像动态规划那样先估计状态价值函数。通过使用 `ε`-贪心策略进行探索，我们可以在学习过程中平衡探索与利用，并收敛到最优策略。


    我们将第 3 章中介绍的一般策略迭代模板应用于蒙特卡洛控制，即通过学习价值函数来找到最优策略。但我们需要做一些修改。第一个修改是，在蒙特卡洛策略评估期间，我们需要估计策略
    `π` 的状态-动作价值函数 `Q_π`，而不是 `V_π`。第二个修改是何时停止运行算法。与动态规划一样，当上一轮迭代的策略与当前迭代的策略相同时，即表示无法再改进，我们就停止。但在蒙特卡洛中，整个策略评估过程基于样本情节的数量，因此我们通常根据希望智能体收集的样本情节数量来定义停止条件。最后一个可选的修改是，由于我们现在使用
    `ε`-贪心策略进行探索，我们可能希望降低探索率 `ε`，例如在每次迭代之后。


    我们现在介绍采用增量更新方法的首次访问蒙特卡洛控制算法，如算法 6 所示。我们只需在策略评估过程中移除条件检查，即可轻松将其扩展到每次访问的情况。


    **算法 6：采用增量更新和 `ε`-贪心探索的首次访问蒙特卡洛控制**


    ![](img/605748_1_En_4_Figaag_HTML.gif) 一个 14 行算法，采用增量更新和 `ε`-贪心探索的首次访问蒙特卡洛控制，接收以下输入，以找到最优策略
    `π` 及其状态-动作价值函数 `Q_π`。折扣率 `γ`、初始探索率 `ε` 和情节数量 `K`。


    我们可以运行算法 6 来为我们的服务犬 MDP 找到最优策略。令人惊讶的是，在十个情节之后，它找到了最优策略，尽管这些值并不十分接近真实的最优状态价值函数
    `V_*`。


    我们还可以从表 4.3 中看到，随着情节数量的增加，这些值越来越接近真实的最优状态价值 `V_*`。一个有趣的现象是，对于状态 `Outside`，其值从未接近真实值；这可能是因为智能体在学习过程中很少访问该状态。因此，该值没有频繁更新。


