    ### 泛化问题


    在强化学习中，泛化问题指的是智能体将其所学应用于新的、未曾见过的情况的能力。为了理解这一概念，可以以自动驾驶汽车为例。假设智能体正试图学习如何通过一个设有交通信号灯和人行横道的特定路口。智能体因快速安全地到达目的地而获得奖励，但它也必须遵守交通法规，并避免与其他车辆和行人发生碰撞。


    在训练过程中，智能体会接触到该路口的各种情况，例如不同的交通模式和天气条件。它会学会将某些动作与更高的奖励关联起来，比如在黄灯时减速，在红灯时停车。随着时间的推移，智能体在通过该路口时会变得更加熟练，并获得更高的累积奖励。


    然而，当智能体面对一个具有不同交通模式和天气条件的新路口时，它可能难以应用所学到的知识。这就是泛化发挥作用的地方。如果智能体成功泛化了其知识，它将能够基于过去的经验来通过这个新路口，即使它之前从未见过这个完全相同的路口。例如，它可能会在黄灯时减速，即使黄灯的时间与之前所见略有不同；或者它可能会识别出有行人正在过马路并停车，即使人行横道的外观略有不同。


    如果智能体未能成功泛化其知识，它可能难以通过新路口，并可能犯下导致累积奖励降低的错误。例如，它可能会错过红灯，或者未能识别出正在过马路的行人，因为它只学会了在特定情境下识别这些情况。


    因此，泛化是强化学习的一个关键方面，它使智能体能够将其过去的经验应用于新的、未曾见过的情况，这可以提高其整体性能，并使其对环境变化更具鲁棒性。


    ### 样本效率问题


    强化学习中的样本效率问题指的是强化学习智能体在与环境进行有限次交互的情况下，学习到最优策略的能力。这可能具有挑战性，尤其是在复杂环境中，智能体可能需要探索巨大的状态空间或执行大量动作才能学习到最优策略。


    为了更好地理解样本效率，让我们考虑一个强化学习智能体玩《超级马里奥兄弟》游戏的例子。在这个游戏中，智能体必须引导马里奥通过一系列关卡，同时避开敌人和障碍物，收集金币，并到达每个关卡终点的旗杆。


    为了学习如何玩《超级马里奥兄弟》，智能体必须与环境进行交互，执行诸如向左或向右移动、跳跃以及发射火球等动作。每个动作都会导致环境进入一个新状态，智能体根据其动作和结果状态获得奖励。


    例如，智能体可能因收集金币或到达旗杆而获得奖励，并因与敌人碰撞或掉入坑中而受到惩罚。通过从这些奖励中学习，智能体可以更新其策略，以选择那些能随时间推移带来更高累积奖励的动作。


    然而，在《超级马里奥兄弟》中学习最优策略可能具有挑战性，因为状态空间巨大，且输入数据维度很高，包括马里奥的位置、敌人以及屏幕上的障碍物。


    为了应对样本效率的挑战，智能体可以使用多种技术来从与环境有限次数的交互中学习。例如，智能体可以使用函数逼近法，基于一小部分训练样本来估计价值函数或策略函数。智能体还可以使用离策略学习，即从由不同于正在优化的策略所收集的数据中进行学习。


    总的来说，样本效率是强化学习中一个重要的挑战，尤其是在复杂环境中。函数逼近、离策略学习等技术可以帮助应对这一挑战，使强化学习智能体能够通过与环境的有限次交互来学习最优策略。


    ## 1.8 总结


    在本书的第一章中，读者了解了强化学习的概念及其应用。本章首先讨论了人工智能在游戏领域的突破，展示了强化学习在围棋等复杂游戏中的成功。接着，本章概述了构成强化学习基础的智能体-环境交互，包括环境、智能体、奖励、状态、动作和策略等关键概念。本章还介绍了几个强化学习的例子，包括雅达利视频游戏、棋盘游戏围棋以及机器人控制任务。


    此外，本章介绍了强化学习中常用的术语，包括情节式任务与持续性任务、确定性任务与随机性任务，以及无模型强化学习与基于模型的强化学习。随后讨论了研究强化学习的重要性，包括其解决复杂问题的潜力及其与现实世界应用的相关性。本章还探讨了强化学习面临的挑战，例如探索-利用困境、信用分配问题和泛化问题。


    本书的下一章将重点介绍马尔可夫决策过程，这是用于建模强化学习问题的正式框架。


    脚注 1 2


    # 2. 马尔可夫决策过程


    马尔可夫决策过程为处理强化学习中的序列决策问题提供了一个强大的框架。其应用涵盖机器人学、金融和最优控制等多个领域。


    在本章中，我们概述了马尔可夫决策过程的关键组成部分，并演示了如何使用马尔可夫决策过程框架来表述一个基本的强化学习问题。我们深入探讨了策略和价值函数的概念，研究了贝尔曼方程，并说明了如何利用它们来更新状态或状态-动作对的价值。我们只关注有限马尔可夫决策过程，即状态空间和动作空间都是有限的情况。虽然我们主要假设一个确定性的问题设定，但我们也会讨论适用于随机问题的数学方面。


    如果要选择整本书中最重要的一章，那么这一章无疑会排在我们列表的首位。其概念和数学方程至关重要，以至于在整本书中都会不断地被引用和使用。

    '
- fmt: '# 2.1 Overview of MDP


    At a high level, a Markov decision process (MDP) is a mathematical framework for
    modeling sequential decision-making problems under uncertainty. The main idea
    is to represent the problem in terms of states, actions, a transition model, and
    a reward function and then use this representation to find an optimal policy that
    maximizes the expected sum of rewards over time.


    To be more specific, an MDP consists of the following components:


    - **States** (`S`): The set of all possible configurations or observations of
    the environment that the agent can be in. For example, in a game of chess, the
    state might be the current board configuration, while in a financial portfolio
    management problem, the state might be the current prices of various stocks. Other
    examples of states include the position and velocity of a robot, the location
    and orientation of a vehicle, or the amount of inventory in a supply chain.


    - **Actions** (`A`): The set of all possible actions that the agent can take.
    In a game of chess, this might include moving a piece, while in a financial portfolio
    management problem, this might include buying or selling a particular stock. Other
    examples of actions include accelerating or decelerating a robot, turning a vehicle,
    or restocking inventory in a supply chain.


    - **Transition model or dynamics function** (`P`): A function that defines the
    probability of transitioning to a new state `s''` given the current state `s`
    and the action taken `a`. In other words, it models how the environment responds
    to the agent’s actions. For example, in a game of chess, the transition model
    might be determined by the rules of the game and the player’s move. In a finance
    problem, the transition model could be the result of a stock price fluctuation.
    Other examples of transition models include the physics of a robot’s motion, the
    dynamics of a vehicle’s movement, or the demand and supply dynamics of a supply
    chain.


    - **Reward function** (`R`): A function that specifies the reward or cost associated
    with taking an action in a given state. In other words, it models the goal of
    the agent’s task. For example, in a game of chess, the reward function might assign
    a positive value to winning the game and a negative value to losing, while in
    a finance problem, the reward function might be based on maximizing profit or
    minimizing risk. Other examples of reward functions include the energy efficiency
    of a robot’s motion, the fuel efficiency of a vehicle’s movement, or the profit
    margins of a supply chain.


    ## Why Are MDPs Useful?


    MDPs provide a powerful framework for modeling decision-making problems because
    they allow us to use mathematical concepts to model real-world problems. For example,
    MDPs can be used to:


    - Model robot navigation problems, where the robot must decide which actions to
    take in order to reach a particular goal while avoiding obstacles. For example,
    the state might include its current position and the obstacles in its environment,
    and the actions might include moving in different directions. The transition model
    could be determined by the physics of the robot’s motion, and the reward function
    could be based on reaching the goal as quickly as possible while avoiding collisions
    with obstacles.


    - Optimize portfolio management strategies, where the agent must decide which
    stocks to buy or sell in order to maximize profits while minimizing risk. For
    example, the state might include the current prices of different stocks and the
    agent’s portfolio holdings, and the actions might include buying or selling stocks.
    The transition model could be the result of stock price fluctuations, and the
    reward function could be based on the agent’s profits or risk-adjusted returns.


    - Design personalized recommendation systems, where the agent must decide which
    items to recommend to a particular user based on their past behavior. For example,
    the state might include the user’s past purchases and the agent’s current recommendations,
    and the actions might include recommending different items. The transition model
    could be the user’s response to the recommendations, and the reward function could
    be based on how much the user likes the recommended items or makes a purchase.


    - Solve many other decision-making problems in various domains, such as traffic
    control, resource allocation, and game playing. In each case, the MDP framework
    provides a way to model the problem in terms of states, actions, transition probabilities,
    and rewards and then solve it by finding a policy that maximizes the expected
    sum of rewards over time.


    Our goal of modeling a problem using MDP is to eventually solve the MDP problem.
    To solve an MDP, we must find a policy `π` that maps states to actions in a way
    that maximizes the expected sum of rewards over time. In other words, the policy
    tells the agent what action to take in each state to achieve its goal. One way
    to find the optimal policy is to use the value iteration algorithm or the policy
    iteration algorithm, which iteratively updates the values of the state (or state-action
    pair) based on the Bellman equations, until the optimal policy is found. These
    fundamental concepts will be explored in this chapter and the subsequent chapters.


    In summary, MDPs provide a flexible and powerful way to model decision-making
    problems in various domains. By formulating a problem as an MDP, we can use mathematical
    concepts to analyze the problem and find an optimal policy that maximizes the
    expected sum of rewards over time. The key components of an MDP are the states,
    actions, dynamics function, and reward function, which can be customized to fit
    the specific problem at hand.'
