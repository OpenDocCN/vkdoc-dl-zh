    the output layer which has *N* units and no activation function. Here, *N* is
    the number of valid actions for the individual Atari game, which can vary between
    4 and 18 depending on the game. Figure [7.20](#605748_1_En_7_Chapter.xhtml#Fig20)
    illustrates the network architecture. Notice we only take the environment state
    *s* as input to the neural network, which is a ![$$84\times 84 \times 4$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq155.png)
    image and output a vector contains state-action values for each valid action,
    for the input state *s*.


    Why don’t we use an activation function for the final output layer? Most activation
    functions will transform the value in some form. But the value for an arbitrary
    state-action pair could be any real number ![$$(s, a) \in \mathbb {R}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq156.png)
    . And the limits for the minimum or maximum value for these different Atari games
    are not the same. To reuse the same neural network for these games, it’s best
    to not transform the values from the output layer.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig19_HTML.png)


    An illustration depicts a video game with a set of blocks at the top layer, where
    4 tiny ball moves linear over the blocks, occasionally overlapping them in a line
    and eventually drops down to a flat surface at the bottom line.


    Fig. 7.19


    Example of stacking last four frames after action repeat ![$$k=4$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq157.png)
    for the Breakout video game'
  trans: '

    我们可以对标准 Atari 游戏环境进行多种修改，以提升 `DQN` 智能体的学习进度。例如，我们可以将失去一条命视为软终止状态，这意味着我们仅将奖励作为
    TD 目标，而不通过使用后继状态的折现值进行自举。在软终止状态下，游戏环境不会重置。另一种方法是通过对每个回合的初始状态进行随机化处理，例如执行若干步无操作动作，这也能有效改善智能体的学习进度。此外，通常需要将奖励裁剪到
    `[-1, 1]` 范围内，尤其是对于那些奖励信号非常大的游戏。例如，某些游戏的奖励可能高达数百或数千，这会压倒学习过程，使智能体难以收敛到最优策略。


    ![一组游戏插图，其中 4 个游戏面板处于激活状态，其余面板处于禁用状态。](img/605748_1_En_7_Fig18_HTML.png)


    **图 7.18**  Breakout 视频游戏中动作重复 `k=4` 的示例；灰色帧表示被智能体跳过的帧


    ### 卷积神经网络


    `DQN` 智能体使用一个非常简单的卷积神经网络。它由三个卷积层组成；神经网络的输入数据是一张 `84 × 84 × 4` 的图像。第一个隐藏卷积层有 32
    个滤波器，内核大小为 `8 × 8`，步长为 4。这意味着第一个隐藏层的输出特征图将有 32 个通道。第二个隐藏卷积层有 64 个滤波器，内核大小为 `4
    × 4`，步长为 2。第三个隐藏卷积层有 64 个滤波器，内核大小为 `3 × 3`，步长为 1。我们在每个卷积层之后应用 `ReLU` 激活函数。然后，最后一个卷积层的特征图被展平并输入到一个包含
    512 个单元的全连接层；之后，我们应用 `ReLU` 激活函数。全连接层的输出随后被输入到输出层，该层有 `N` 个单元且没有激活函数。这里，`N` 是特定
    Atari 游戏的有效动作数量，根据游戏不同，其值在 4 到 18 之间变化。图 7.20 展示了该网络架构。请注意，我们仅将环境状态 `s` 作为神经网络的输入，即一张
    `84 × 84 × 4` 的图像，并输出一个向量，其中包含针对输入状态 `s` 的每个有效动作的状态-动作值。


    为什么我们不在最终输出层使用激活函数？大多数激活函数会以某种形式转换数值。但任意状态-动作对的值可以是任何实数 `(s, a) ∈ ℝ`。而且，这些不同 Atari
    游戏的最小值或最大值的限制并不相同。为了在这些游戏中复用同一个神经网络，最好不要对输出层的值进行转换。


    ![一幅插图描绘了一个视频游戏，顶部有一组方块，4 个小球在线性移动，偶尔重叠成一条线，最终掉落到底部的一条平坦表面上。](img/605748_1_En_7_Fig19_HTML.png)


    **图 7.19**  Breakout 视频游戏中，在动作重复 `k=4` 后堆叠最后四帧的示例

    '
- fmt: '### Other Changes to the Training Procedure


    There are some small changes made to the training procedure when we train the
    DQN agent to play Atari games. One particular change is how often the agent should
    sample a mini-batch of transitions from the experience replay to do a learning
    step (where we count one update to the parameters `θ` as a learning step). In
    Algorithm 3, the agent would sample a mini-batch at every time step as long as
    the buffers have enough samples. However, since Atari games can last over millions
    of steps (frames), learning at every step might not be a good idea from a computation
    efficiency point of view; it might also affect the performance of the agent since
    it has lesser time to generate more transitions, this might also cause the neural
    network to overfitting existing experience data. So the DQN agent actually adapts
    a slightly different learning schedule, where it will only do one learning step
    after the agent selects every four actions. That’s every 16 frames, because one
    action is repeated over four times.


    Figure 7.21 shows the performance of the DQN agent on the Atari game Pong, which
    is one of the easiest games in the Atari test bed. The results display the average
    episode return (total undiscounted rewards) and a 95% confidence interval. To
    evaluate the agent’s performance, we ran 200,000 evaluation steps on a separate
    testing environment with an `ε`-greedy policy and a fixed exploration epsilon
    (`ε = 0.05`) at the end of each training iteration, which consisted of 250,000
    training steps or 1 million frames, where no reward clipping or soft termination
    on loss of life is applied to the evaluation environment. The results were averaged
    over five independent runs and smoothed using a moving average with a window size
    of five.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig20_HTML.png)


    A flow chart representing a neural network architecture with various layers, including
    convolutional layers with different filter sizes and ReLU activation functions,
    designed for input data of size 84 × 84 × 4, followed by fully connected layers.


    **Fig. 7.20** Convolutional neural network architecture for the DQN agent


    Note that for the game of Pong, the maximum episode return is 21. We can observe
    that the agent converges to an optimal policy after 10 million training environment
    frames (corresponding to 2.5 million frames that the agent has actually seen after
    frame skipping).


    Figure 7.22 shows the performance of the DQN agent on the Atari game Breakout,
    which is a slightly more challenging game than Pong. We use the same settings
    and hyperparameters as for the experiment on Pong.


    Figure 7.23 shows the performance of the DQN agent on the Atari game River Raid,
    which is a much challenging game than Pong and Breakout. We use the same settings
    and hyperparameters as for the experiment on Pong. We can see the performance
    is improving for the first 20 million frames and then plateaus at 20–30 million
    frames.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig22_HTML.png)


    A line graph illustrating the evaluation episode return plotted against the training
    environment frames depicting the return values increasing over 20 million frames.


    **Fig. 7.22** DQN agent on Atari Breakout. The results display the average episode
    return (total undiscounted rewards) and a 95% confidence interval. The results
    were averaged over five independent runs and then smoothed using a moving average
    with a window size of five


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig21_HTML.png)


    A line graph illustrating the evaluation episode return plotted against the training
    environment frames depicting the return values increasing over 20 million frames.


    **Fig. 7.21** DQN agent on Atari Pong. The results display the average episode
    return (total undiscounted rewards) and a 95% confidence interval. The results
    were averaged over five independent runs and then smoothed using a moving average
    with a window size of five


    We use standard settings from the DQN Nature paper as listed in Table 7.1 for
    the preceding experiments.'
