  trans: '

    ### 分布式 PPO


    以算法 2 中的伪代码为例，它展示了一个高级分布式 PPO 算法，其中多个执行者`k=0, 1, ...`并行运行以生成转移序列，并由一个学习智能体更新神经网络参数。对于每个执行者，一旦序列达到预定义长度`N`，我们就使用第
    10 章描述的相同机制计算有限时域回报`G_t`和估计优势`A_t`，并将这些转移序列存储在中央服务器中。与此同时，学习器会持续运行若干轮次来更新神经网络参数。之后，最新的神经网络参数会被发送到中央服务器，执行者会定期更新其自身的神经网络副本，并使用更新后的网络进行决策。


    **算法 2：分布式近端策略优化**


    该算法为学习器和执行者初始化神经网络参数，与环境进行交互，计算回报和优势，并在与中央服务器通信的同时迭代更新策略和基线参数。


    图 12.2 展示了在 Ant 机器人控制任务上，不同执行者数量的分布式 PPO 算法的性能对比。结果显示了平均回合回报（总未折扣奖励）及 95%置信区间。为了评估智能体的性能，我们汇总了每次训练迭代（包含
    100,000 个训练步）结束时的平均回合回报。结果基于三次独立运行的平均值，并使用窗口大小为 5 的移动平均进行平滑处理。


    折线图展示了训练回合回报随训练环境步数（以百万计）的变化趋势，分别对应 1 个、4 个、8 个和 16 个执行者的 PPO 配置，趋势线呈上升态势。


    **图 12.2** 在 Ant 机器人控制任务上，不同执行者数量的分布式 PPO 算法性能对比。结果显示了平均回合回报（总未折扣奖励）及 95%置信区间。结果基于三次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    我们在不同运行中使用相同的神经网络架构和超参数。具体而言，我们使用折扣率`γ = 0.99`，执行者学习率`0.0002`，评论家学习率`0.0003`，序列长度`2048`，GAE
    lambda`0.95`，以及`4`次更新轮次。我们还使用熵来鼓励探索，熵权重为`0.1`。神经网络使用 Adam 优化器进行训练。


    从图表中可以看出，与执行者数量较少的情况相比，增加执行者数量带来的性能提升非常显著。并且智能体收敛到最优策略的速度也快得多。然而，我们不应将更快的收敛与更少的训练样本混淆，因为该图仅显示了每个执行者智能体的训练环境步数，而非所有执行者的步数总和。


    图 12.3 展示了在更具挑战性的 Humanoid 机器人控制任务上的实验结果。


    折线图展示了训练回合回报随训练环境步数（以百万计）的变化趋势，分别对应 1 个、4 个、8 个和 16 个执行者的 PPO 配置，趋势线呈上升态势。


    **图 12.3** 在 Humanoid 机器人控制任务上，不同执行者数量的分布式 PPO 算法性能对比。结果显示了平均回合回报（总未折扣奖励）及 95%置信区间。结果基于三次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    ### 12.3 分布式强化学习的数据并行


    图 12.1 所示的分布式强化学习架构是一个强大的工具，使我们能够解决大规模或更复杂的强化学习问题；它通过使用多个并行运行的执行者来提高智能体的训练速度。然而，如果一个问题需要成百上千个执行者全部并行运行，那么仅依赖一个学习智能体来更新神经网络就可能成为瓶颈。为了解决这个问题，我们可以使用一种在深度学习中常用的技术——数据并行。


    数据并行涉及将大型数据集划分为较小的批次，并将这些批次分布到多个处理器或机器上。每个处理器或机器在其数据批次上训练模型，然后将得到的梯度合并，生成最终的梯度集。这些梯度随后用于更新模型参数（图
    12.4）。


    流程图展示了多处理器系统中的数据流，处理器 1 至 5 分别连接到各自的模型 1 至 5。梯度被聚合后用于更新参数 D。


    **图 12.4** 用于说明深度学习中数据并行概念的简单示意图，其中多个处理器为其自身的模型副本计算梯度，并由一个最终处理器执行梯度聚合和参数更新。


    例如，为了训练由 Devlin 等人[4]开发的 Google BERT 语言模型或由 Brown 等人[5]开发的 OpenAI GPT-3，数百个处理器被并行使用来划分数据并训练模型。


    在分布式强化学习中，我们可以使用多个并行的学习智能体，每个智能体在本地计算损失和梯度，但不更新神经网络参数。相反，它们将本地梯度发送到一个中央参数服务器，该服务器收集并聚合梯度（例如，通过取平均值），然后执行参数更新。这确保了参数更新仅在一个中心位置发生。


    一旦参数服务器更新了神经网络参数，它会将最新参数广播给所有执行者智能体，而不仅仅是学习智能体。这种架构对于大规模和复杂的强化学习问题特别有用，例如训练世界级的围棋选手[3,
    6, 7]，其中多个并行学习器可以显著减少训练时间。


    图 12.5 展示了一个简单的示意图来说明这一想法。


    示意图展示了一个分布式学习系统，其中多个执行者与其环境交互，计算梯度，并通过中央服务器和学习器更新参数。


    **图 12.5** 用于说明具有多个学习智能体计算梯度以及一个中央参数服务器进行梯度聚合和参数更新的分布式强化学习思想的简单示意图。


    然而，这种方法也存在挑战。学习智能体之间的通信开销可能成为瓶颈，并且需要适当的梯度聚合技术才能使其有效工作。

