    We used first-visit and every-visit Monte Carlo policy evaluation algorithms to
    estimate the state values of a random policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq46.png)
    for our service dog MDP. Table [4.1](#605748_1_En_4_Chapter.xhtml#Tab1) shows
    the results. Since Monte Carlo methods involve randomness, we averaged the results
    over 100 independent runs, with each run consisting of 2000 episodes. For all
    runs, we set the discount factor ![$${\gamma }$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq47.png)
    to 0.9\. The values computed using Monte Carlo policy evaluation algorithms are
    very close to the true values computed using dynamic programming policy evaluation
    (as shown in the last row of Table [4.1](#605748_1_En_4_Chapter.xhtml#Tab1)).'
  trans: '

    ### 工作示例


    为了更好地理解首次访问蒙特卡洛策略评估与每次访问蒙特卡洛策略评估之间的区别，让我们看一个例子，该例子使用了我们在第 2 章中介绍的导盲犬 MDP。回顾图 4.2
    中所示的导盲犬 MDP 示意图。


    假设智能体遵循某个策略`π`，并生成了一个形式为`S0, R0, S1, R1, ..., S_{T-1}, R_{T-1}`的情节序列。例如，我们可能得到如下情节：


    ```

    episode = {房间 1, -1, 房间 2, -1, 房间 3, -2, 房间 2, -1, 房间 3, 10}

    ```


    为了评估该情节的策略，我们需要计算情节中每个时间步`t`的回报`Gt`。我们使用无折扣`γ = 1.0`。回报`Gt`计算为从时间步`t`到情节结束的奖励总和，不应用折扣。例如，对于上述情节，回报`Gt`为：


    ```

    returns = {5.0, 6.0, 7.0, 9.0, 10.0}

    ```


    导盲犬 MDP 的节点图流经房间 1、2 和 3，最终到达找到物品。房间 3 回到房间 2，房间 2 回到房间 1。房间 2 也通过`r = 0`指向室外，室外通过`r
    = 0`回到房间 2。室外通过`r = -1`自循环。


    **图 4.2** 导盲犬 MDP


    让我们关注状态*房间 2*。我们可以看到，它在单个情节中被访问了两次，一次在`t=1`，另一次在`t=3`。假设我们之前对状态*房间 2*的估计值是从状态*房间
    2*观察到的回报的样本平均值，即`Vπ(房间 2) = 0.0`。此外，智能体在此策略下之前从未访问过状态*房间 2*，因此该状态的访问次数为`N(房间 2)
    = 0`。


    如果我们使用首次访问蒙特卡洛策略评估，那么状态*房间 2*的新值应为`6/1 = 6`。这是因为算法会忽略该情节中第二次访问状态*房间 2*的情况，仅基于首次访问来更新该状态的值。相比之下，如果我们使用每次访问蒙特卡洛策略评估，那么状态*房间
    2*的值将首先更新为`6/1 = 6`，然后更新为`(6+9)/2 = 7.5`。这是因为每次访问蒙特卡洛策略评估会在情节中每次访问状态时都更新其值。


    总结来说，首次访问蒙特卡洛策略评估仅在情节中首次访问状态时更新其值，而每次访问蒙特卡洛策略评估则在情节中每次访问状态时都更新其值。这两种方法之间的差异对于准确估计
    MDP 中状态的值可能很重要。


    ### 每次访问蒙特卡洛策略评估


    将首次访问蒙特卡洛策略评估扩展到每次访问的情况相当容易；我们只需移除`for`循环内的条件检查，其他所有内容保持不变，如算法 2 所示。


    **算法 2：** 针对`V[π]`的每次访问蒙特卡洛策略评估


    一个名为“针对`Vπ`的每次访问蒙特卡洛策略评估”的 8 行算法，接受以下输入，输出输入策略`π`的估计状态值函数`V`：待评估的策略`π`、折扣率`γ`以及情节数量`K`。


    **表 4.1** 针对导盲犬 MDP 的相同随机策略，使用首次访问和每次访问蒙特卡洛策略评估计算的状态值。结果在 100 次独立运行中取平均值；每次运行包含
    2000 个情节；最后一行包含使用动态规划策略评估计算的真实状态值。在此实验中，我们使用相同的折扣`γ = 0.9`。


    | | 房间 1 | 房间 2 | 房间 3 | 室外 | 找到物品 |

    |---|---|---|---|---|---|

    | 首次访问 MC | −2.67 | −1.85 | 3.16 | −3.32 | 0 |

    | 每次访问 MC | −2.63 | −1.81 | 3.2 | −3.3 | 0 |

    | DP | −2.66 | −1.85 | 3.17 | −3.33 | 0 |


    我们使用首次访问和每次访问蒙特卡洛策略评估算法来估计导盲犬 MDP 中随机策略`π`的状态值。表 4.1 显示了结果。由于蒙特卡洛方法涉及随机性，我们在 100
    次独立运行中取平均值，每次运行包含 2000 个情节。对于所有运行，我们将折扣因子`γ`设置为 0.9。使用蒙特卡洛策略评估算法计算的值非常接近使用动态规划策略评估计算的真实值（如表
    4.1 最后一行所示）。

    '
- fmt: '### 4.2 Incremental Update


    The concept of incremental update is a widely used technique in reinforcement
    learning algorithms and is particularly useful in Monte Carlo policy evaluation.
    The idea behind incremental updates is to update an estimate in small steps, rather
    than updating it all at once. This has several advantages, including faster convergence,
    better memory efficiency, and the ability to update estimates in real time as
    new data becomes available.


    The incremental update formula can be expressed as follows:


    ![$$\displaystyle \begin{aligned} \mbox{NewEstimate}=\mbox{OldEstimate} + \mbox{StepSize}
    \Big[\mbox{Target} - \mbox{OldEstimate} \Big] \end{aligned}$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_Equc.png)


    where `OldEstimate` is the previous estimate, `StepSize` is a small positive constant
    that determines the size of the update, and `Target` is a new sample value. The
    term `Target - OldEstimate` is often referred to as the estimate error and represents
    the difference between the new sample value and the previous estimate.


    In Monte Carlo policy evaluation, incremental updates can be used to estimate
    the value function for a state. Specifically, we can update the estimated value
    function for a state `S_t` using the sample return `G_t` obtained from a specific
    episode:


    ![$$\displaystyle \begin{aligned} V_\pi(S_t) = V_\pi(S_t) + \frac{1}{N(S_t)} \Big(
    G_t - V_\pi(S_t) \Big) {} \end{aligned} $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_Equ2.png)


    (4.2)


    where `V_π(S_t)` is the estimated value function for state `S_t`, and `N(S_t)`
    is the number of times the state `S_t` has been visited. The update formula in
    Eq. (4.2) represents an incremental update, where the estimated value function
    is updated based on a small step proportional to the difference between the sample
    return and the previous estimate.


    The incremental Monte Carlo policy evaluation algorithm for the first-visit case
    is shown in Algorithm 3. In each episode, for each time step `t` in the episode,
    we first check if it’s the first time the state `S_t` is visited, we then update
    the episode returns and the visited number for `S_t`, the process continues until
    a terminal state is reached. Finally, we update the estimated value function for
    each visited state using the incremental update equation in Eq. (4.2). The every-visit
    case can be easily implemented by removing the condition check inside the for
    loop.


    Algorithm 3: First-visit Monte Carlo policy evaluation with incremental update
    for `V[π]`


    ![](images/605748_1_En_4_Chapter/605748_1_En_4_Figaac_HTML.gif) An 8-line algorithm
    titled first-visit Monte Carlo policy evaluation with incremental update for `V[π]`
    takes the following input and gives an estimated state value function `V[π]` for
    the input policy `π` as the output. Policy `π` to be evaluated, discount rate
    `γ`, and number of episodes `K`.


    Table 4.2 shows the state values computed using first-visit Monte Carlo policy
    evaluation and first-visit Monte Carlo policy evaluation with the incremental
    update method, all for the same random policy for the service dog MDP. Similarly
    to the experiment shown in Table 4.1, the results were averaged over 100 independent
    runs, and each run is over 2000 episodes; we use the same discount `γ = 0.9` in
    this experiment.'
