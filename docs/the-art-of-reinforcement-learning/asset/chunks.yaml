    off to 3 nodes. The first node and its branches are unlabeled. The second node
    labeled a 2, branches off to a s prime and an unlabeled node. The third node labeled
    a 3, branches off to a s double prime and an unlabeled node.


    Fig. 5.3


    Example of off-policy reinforcement learning to estimate the state value function
    ![$$V_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq202.png)
    for target policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq203.png)
    while using data generated from a different behavior policy ![$$\mu $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq204.png)
    . The red path represents the transition from state *s* to ![$$s''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq205.png)
    when following ![$$\mu $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq206.png)
    , and blue path for ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq207.png)


    The importance sampling ratio can be computed using the following equations:


    ![$$\displaystyle \begin{aligned} \rho_t &amp; = \frac{\pi(A_t|S_t) p(S_{t+1}|S_t,
    A_t)}{\mu(A_t|S_t) p(S_{t+1}|S_t, A_t)} \\ &amp; = \frac{\pi(A_t|S_t)}{\mu(A_t|S_t)}
    {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ8.png)


    (5.8)


    where ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq208.png)
    is the target policy and ![$$\mu $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq209.png)
    is the behavior policy.


    Note that the dynamics of the environment ![$$p(S_{t+1}|S_t, A_t)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq210.png)
    is often unknown to the agent, but it doesn’t matter in this case since it appears
    in both the numerator and the denominator of the ratio and can be canceled out.


    In general, off-policy reinforcement learning requires that if ![$$\pi (a|s) &gt;
    0$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq211.png) , then
    ![$$\mu (a|s) &gt; 0$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq212.png)
    . This means that if the target policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq213.png)
    is to take some actions, we require the behavior policy ![$$\mu $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq214.png)
    to have at least a non-negative probability of taking these same actions. In most
    cases, the behavior policy will be a more exploratory policy than the target policy,
    such as an ![$$\epsilon $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq215.png)
    -greedy policy with ![$$\epsilon &gt; 0$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq216.png)
    . This ensures that the probability of each action being selected is always greater
    than zero.


    There is a special case when the denominator in Eq. ([5.8](#605748_1_En_5_Chapter.xhtml#Equ8))
    is zero, which occurs when the behavior policy ![$$\mu $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq217.png)
    selects an action that the target policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq218.png)
    would not have selected. In this case, the importance sampling ratio becomes zero,
    which means that this transition tuple is ignored when updating the value function.


    ### Off-Policy TD Policy Evaluation


    In off-policy reinforcement learning algorithms, the agent learns from experience
    generated by a behavior policy that is different from the target policy. To account
    for this, we can use the importance sampling ratio to adjust the TD error during
    value updates. Specifically, the TD target is weighted by the ratio of the probabilities
    of taking the action selected by the target policy and the behavior policy in
    a given state.


    The value update rule for off-policy TD(0) policy evaluation for the state value
    function ![$$V_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq219.png)
    is shown in Eq. ([5.9](#605748_1_En_5_Chapter.xhtml#Equ9)):


    ![$$\displaystyle \begin{aligned} V_\pi(S_t) =V_\pi(S_t) + \alpha \frac{\pi(A_t|S_t)}{\mu(A_t|S_t)}
    \bigg( \Big[ R_t + {\gamma} V_\pi(S_{t+1})\Big] - V_\pi(S_t) \bigg) {} \end{aligned}
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ9.png)


    (5.9)


    Here, ![$$\pi (A_t|S_t)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq220.png)
    and ![$$\mu (A_t|S_t)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq221.png)
    represent the probabilities of selecting action ![$$A_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq222.png)
    in state ![$$S_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq223.png)
    under the target policy and behavior policy, respectively.


    Off-policy TD(0) learning is a popular method for prediction in reinforcement
    learning. TD(0) is a method for updating the value function using one-step bootstrapping,
    where the TD target is the immediate reward plus the estimated value of the next
    state. The overall procedure for off-policy TD(0) is similar to regular TD(0)
    policy evaluation, but we use a different behavior policy ![$$\mu \neq \pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq224.png)
    to generate sample experiences. During the value update, the TD target is weighted
    by the importance sampling ratio, which accounts for the difference between the
    target policy and the behavior policy. This ratio can help improve the accuracy
    of the value function estimates by ensuring that the agent assigns more weight
    to the experience that is relevant to the target policy. For example, if the target
    policy selects actions that are unlikely under the behavior policy, the importance
    sampling ratio will be high, and the TD target will be correspondingly weighted
    more heavily.


    The pseudocode for the off-policy TD(0) policy evaluation algorithm for the state
    value function ![$$V_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq225.png)
    is shown in Algorithm 5.


    Algorithm 5: Off-policy temporal difference [TD(0)] policy evaluation for *V*[*π*]


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Figaae_HTML.gif) A 10-line algorithm
    to compute off policy temporal difference T D 0 and policy evaluation for V pie
    takes the following inputs to give an estimated state value function V pie for
    the target policy pie as an output. Target policy pie to be evaluated, discount
    rate gamma, step size alpha, and number of steps K.'
  trans: "\n# 离策略强化学习\n\n离策略强化学习的树状图从节点 `s` 开始。`S` 分支为 3 个节点。第一个节点及其分支未标记。第二个节点标记为\
    \ `a2`，分支为 `s'` 和一个未标记节点。第三个节点标记为 `a3`，分支为 `s''` 和一个未标记节点。\n\n**图 5.3** 离策略强化学习示例，用于在利用来自不同行为策略\
    \ `μ` 生成的数据时，估计目标策略 `π` 的状态价值函数 `V_π`。红色路径表示遵循 `μ` 时从状态 `s` 到 `s'` 的转移，蓝色路径表示遵循\
    \ `π` 时的转移。\n\n重要性采样比率可使用以下公式计算：\n\n```\nρ_t = π(A_t|S_t) p(S_{t+1}|S_t, A_t)\
    \ / μ(A_t|S_t) p(S_{t+1}|S_t, A_t)\n    = π(A_t|S_t) / μ(A_t|S_t)\n```\n\n(5.8)\n\
    \n其中 `π` 是目标策略，`μ` 是行为策略。\n\n请注意，环境动态 `p(S_{t+1}|S_t, A_t)` 通常对智能体是未知的，但在此情况下无关紧要，因为它同时出现在比率的分子和分母中，可以相互抵消。\n\
    \n通常，离策略强化学习要求：如果 `π(a|s) > 0`，则 `μ(a|s) > 0`。这意味着，如果目标策略 `π` 要采取某些动作，我们要求行为策略\
    \ `μ` 至少有一个非负概率来采取这些相同的动作。在大多数情况下，行为策略会比目标策略更具探索性，例如 `ε > 0` 的 `ε`-贪心策略。这确保了每个动作被选中的概率始终大于零。\n\
    \n存在一种特殊情况，即当公式 (5.8) 中的分母为零时，这发生在行为策略 `μ` 选择了目标策略 `π` 本不会选择的动作时。在这种情况下，重要性采样比率变为零，这意味着在更新价值函数时会忽略此转移元组。\n\
    \n## 离策略时序差分策略评估\n\n在离策略强化学习算法中，智能体从由不同于目标策略的行为策略生成的经历中学习。为了解决这个问题，我们可以在价值更新期间使用重要性采样比率来调整时序差分误差。具体来说，时序差分目标通过目标策略和行为策略在给定状态下选择该动作的概率之比进行加权。\n\
    \n用于状态价值函数 `V_π` 的离策略 TD(0) 策略评估的价值更新规则如公式 (5.9) 所示：\n\n```\nV_π(S_t) = V_π(S_t)\
    \ + α * π(A_t|S_t)/μ(A_t|S_t) * ( [R_t + γ V_π(S_{t+1})] - V_π(S_t) )\n```\n\n\
    (5.9)\n\n这里，`π(A_t|S_t)` 和 `μ(A_t|S_t)` 分别表示在目标策略和行为策略下，在状态 `S_t` 中选择动作 `A_t`\
    \ 的概率。\n\n离策略 TD(0) 学习是强化学习中一种流行的预测方法。TD(0) 是一种使用单步自举法更新价值函数的方法，其中时序差分目标是即时奖励加上下一状态的估计价值。离策略\
    \ TD(0) 的整体过程类似于常规的 TD(0) 策略评估，但我们使用不同的行为策略 `μ ≠ π` 来生成样本经历。在价值更新期间，时序差分目标通过重要性采样比率进行加权，该比率考虑了目标策略与行为策略之间的差异。这个比率有助于提高价值函数估计的准确性，确保智能体将更多权重分配给与目标策略相关的经历。例如，如果目标策略选择了在行为策略下不太可能出现的动作，那么重要性采样比率会很高，时序差分目标也会相应地获得更高的权重。\n\
    \n用于状态价值函数 `V_π` 的离策略 TD(0) 策略评估算法的伪代码如算法 5 所示。\n\n**算法 5：** 用于 `V_π` 的离策略时序差分\
    \ [TD(0)] 策略评估\n\n一个用于计算离策略时序差分 TD(0) 和 `V_π` 策略评估的 10 行算法，接收以下输入，并输出目标策略 `π`\
    \ 的估计状态价值函数 `V_π`：待评估的目标策略 `π`、折扣率 `γ`、步长 `α` 和步数 `K`。\n"
- fmt: "However, to extend the off-policy TD(0) policy evaluation algorithm to estimate\
    \ the state-action value function `Q_π` for `π`, it is a little bit different.\
    \ Since we are estimating the value for a state-action pair `(s, a)`, it does\
    \ not matter what the probability is that the behavior policy (or target policy)\
    \ will select action `a` when in state `s`, because the state-action value function\
    \ measures the expected return when in state `s`, taken action `a`, and then following\
    \ the policy `π` afterwards. We only care about what will happen next. So, to\
    \ compute the importance sampling for a tuple of `(S_t, A_t, R_t, S_{t+1}, A_{t+1})`,\
    \ we would start with the second step `t+1` for the probability of selecting action\
    \ `A_{t+1}` in the successor state `S_{t+1}` and skip the first step `t`, which\
    \ is the probability of selecting action `A_t` in state `S_t`.\n\nTo better understand\
    \ this, let’s look at an example of how off-policy reinforcement learning estimates\
    \ the state-action value function `Q_π`, as shown in Fig. 5.4. Remember, we are\
    \ estimating the value for a state-action pair, not just a state. More specifically,\
    \ we are only interested in the value for action `a` in state `s`. It does not\
    \ matter what the probability is for selecting `a` under the behavior policy `μ`\
    \ or target policy `π`, because we will update the value for this specific action\
    \ `a` with certainty. If we look at the diagram, part of the path (from `s` to\
    \ `a`) is always the same, so there is no need to include it when we compute the\
    \ importance sampling ratio. What truly matters are the probabilities of the behavior\
    \ and target policies selecting the action `a'` in state `s'` after the environment\
    \ has transitioned into a successor state `s'`.\n\n![](images/605748_1_En_5_Chapter/605748_1_En_5_Fig4_HTML.png)\n\
    \nA tree chart for off-policy reinforcement learning starts with an `s` node and\
    \ branches off to 3 nodes. The left and right nodes along with their branches\
    \ are unlabeled. The middle node labeled `a`, `r` branches off to an `s'` and\
    \ an unlabeled node. The `s'` node branches off to an `a'` node and a double prime\
    \ node.\n\n**Fig. 5.4** Example of off-policy reinforcement learning to estimate\
    \ the state-action value function `Q_π` for target policy `π` while using data\
    \ generated from a different behavior policy `μ`\n\nWhen using off-policy reinforcement\
    \ learning and TD policy evaluation for `Q_π`, we can use the following equation\
    \ to compute the importance sampling ratio for a single transition tuple `(S_t,\
    \ A_t, R_t, S_{t+1}, A_{t+1})`:\n\n```\nρ_{t+1} = π(A_{t+1}|S_{t+1}) p(S_{t+1}|S_t,\
    \ A_t) / μ(A_{t+1}|S_{t+1}) p(S_{t+1}|S_t, A_t)\n        = π(A_{t+1}|S_{t+1})\
    \ / μ(A_{t+1}|S_{t+1})\n```\n(5.10)\n\nHere, `ρ_{t+1}` represents the importance\
    \ sampling ratio starting from time step `t+1`, which corrects for the difference\
    \ in probability between the behavior policy and the target policy. Specifically,\
    \ `π` represents the target policy, while `μ` represents the behavior policy.\n\
    \nEq. (5.11) shows the adjusted value update rule for `Q_π` when using TD(0) and\
    \ off-policy reinforcement learning:\n\n```\nQ_π(S_t, A_t) = Q_π(S_t, A_t) + α\
    \ * π(A_{t+1}|S_{t+1}) / μ(A_{t+1}|S_{t+1}) * ( [R_t + γ Q_π(S_{t+1}, A_{t+1})]\
    \ - Q_π(S_t, A_t) )\n```\n(5.11)\n\nThis equation updates the state-action value\
    \ function `Q_π` estimate for the target policy `π`, using transitions that were\
    \ generated by a different behavior policy `μ`. The importance sampling ratio\
    \ is used to correct for the difference in probability between the behavior policy\
    \ and the target policy. Specifically, we use the ratio `π(A_{t+1}|S_{t+1}) /\
    \ μ(A_{t+1}|S_{t+1})` to adjust the update, so that it takes into account the\
    \ difference between the target policy and the behavior policy. The update is\
    \ based on the temporal difference error, which is the difference between the\
    \ estimated Q-value for the current state-action pair and the estimated Q-value\
    \ for the next state-action pair, plus the reward received at the current state-action\
    \ pair. The learning rate `α` controls the size of the update.\n\nNow we introduce\
    \ the off-policy TD(0) policy evaluation algorithm for `Q_π` for some given policy\
    \ `π`.\n\n**Algorithm 6: Off-policy temporal difference [TD(0)] policy evaluation\
    \ for `Q[π]`**\n\n![](images/605748_1_En_5_Chapter/605748_1_En_5_Figaaf_HTML.gif)\
    \ A 11-line algorithm to compute the off-policy temporal difference TD(0) and\
    \ policy evaluation for `Q_π` takes in the following inputs to give an estimated\
    \ state-action value function `Q_π` for the target policy `π`. Target policy `π`\
    \ to be evaluated, discount rate `γ`, step size `α`, and number of steps `K`."
