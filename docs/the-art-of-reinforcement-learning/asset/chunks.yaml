  trans: '

    # 2.1 马尔可夫决策过程概述


    从高层次来看，马尔可夫决策过程（MDP）是一个用于在不确定性下对序贯决策问题进行建模的数学框架。其主要思想是用状态、动作、转移模型和奖励函数来表示问题，然后利用这种表示来寻找一个最优策略，该策略能最大化随时间累积的期望总奖励。


    更具体地说，一个 MDP 包含以下组成部分：


    - **状态**（`S`）：智能体可能处于的所有环境配置或观测结果的集合。例如，在国际象棋游戏中，状态可能是当前的棋盘布局；而在金融投资组合管理问题中，状态可能是各种股票的当前价格。状态的其他示例包括机器人的位置和速度、车辆的位置和方向，或供应链中的库存量。


    - **动作**（`A`）：智能体可以采取的所有可能动作的集合。在国际象棋游戏中，这可能包括移动棋子；而在金融投资组合管理问题中，这可能包括买入或卖出某只特定股票。动作的其他示例包括加速或减速机器人、转动车辆，或补充供应链中的库存。


    - **转移模型或动力学函数**（`P`）：一个函数，定义了在给定当前状态`s`和所采取的动作`a`的情况下，转移到新状态`s''`的概率。换句话说，它模拟了环境如何响应智能体的动作。例如，在国际象棋游戏中，转移模型可能由游戏规则和玩家的走法决定。在金融问题中，转移模型可能是股票价格波动的结果。转移模型的其他示例包括机器人运动的物理规律、车辆运动的动力学，或供应链中的供需动态。


    - **奖励函数**（`R`）：一个函数，指定了在给定状态下采取某个动作所获得的奖励或付出的代价。换句话说，它模拟了智能体任务的目标。例如，在国际象棋游戏中，奖励函数可能为获胜赋予正值，为失败赋予负值；而在金融问题中，奖励函数可能基于最大化利润或最小化风险。奖励函数的其他示例包括机器人运动的能效、车辆运动的燃油效率，或供应链的利润率。


    ## 为什么 MDP 有用？


    MDP 为决策问题建模提供了一个强大的框架，因为它们允许我们使用数学概念来模拟现实世界的问题。例如，MDP 可用于：


    - 对机器人导航问题进行建模，其中机器人必须决定采取哪些动作才能到达特定目标并避开障碍物。例如，状态可能包括其当前位置和环境中的障碍物，动作可能包括向不同方向移动。转移模型可由机器人运动的物理规律决定，奖励函数可基于尽快到达目标同时避免与障碍物碰撞。


    - 优化投资组合管理策略，其中智能体必须决定买入或卖出哪些股票，以在最小化风险的同时最大化利润。例如，状态可能包括不同股票的当前价格和智能体的投资组合持有量，动作可能包括买入或卖出股票。转移模型可能是股票价格波动的结果，奖励函数可基于智能体的利润或风险调整后的收益。


    - 设计个性化推荐系统，其中智能体必须根据用户过去的行为决定向特定用户推荐哪些物品。例如，状态可能包括用户过去的购买记录和智能体当前的推荐内容，动作可能包括推荐不同的物品。转移模型可能是用户对推荐的反应，奖励函数可基于用户对推荐物品的喜爱程度或是否进行了购买。


    - 解决各个领域的许多其他决策问题，例如交通控制、资源分配和游戏博弈。在每种情况下，MDP 框架都提供了一种方法，用状态、动作、转移概率和奖励来对问题进行建模，然后通过寻找一个能最大化随时间累积的期望总奖励的策略来求解。


    我们使用 MDP 对问题进行建模的目标，最终是为了求解 MDP 问题。要求解一个 MDP，我们必须找到一个策略`π`，该策略将状态映射到动作，从而最大化随时间累积的期望总奖励。换句话说，该策略告诉智能体在每个状态下应采取什么动作来实现其目标。寻找最优策略的一种方法是使用值迭代算法或策略迭代算法，这些算法基于贝尔曼方程迭代更新状态（或状态-动作对）的值，直到找到最优策略。这些基本概念将在本章及后续章节中探讨。


    总之，MDP 为在各个领域对决策问题进行建模提供了一种灵活而强大的方式。通过将问题表述为 MDP，我们可以利用数学概念来分析问题，并找到一个能最大化随时间累积的期望总奖励的最优策略。MDP
    的关键组成部分是状态、动作、动力学函数和奖励函数，它们可以根据具体问题进行定制。

    '
- fmt: '## 2.2 Model Reinforcement Learning Problem Using MDP


    A Markov decision process (MDP) models a sequence of states, actions, and rewards
    in a way that is useful for studying reinforcement learning. For example, a robot
    navigating a maze can be modeled as an MDP, where the states represent the robot’s
    location in the maze, the actions represent the robot’s movement choices, and
    the rewards represent the robot’s progress toward the goal.


    In this context, we use a subscript `t` to index the different stages of the process
    (or so-called time step of the sequence), where `t` could be any discrete value
    like `t = 0, 1, 2, ...`. Note that the time step is not a regular time interval
    like seconds or minutes but refers to the different stages of the process. For
    example, in this book `S_t`, `A_t`, and `R_t` often mean the state, action, and
    reward at the current time step `t` (or current stage of the process).


    It’s worth noting that the agent may take a considerable amount of time before
    deciding to take action `A_t` when it observes the environment state `S_t`. As
    long as the agent does not violate the rules of the environment, it has the flexibility
    to take action at its own pace. Therefore, a regular time interval is not applicable
    in this case.


    In this book, we adapt the mathematical notation employed by Professor Emma Brunskill
    in her remarkable course on reinforcement learning [1]. We generally assume that
    the reward only depends on the state `S_t` and the action `A_t` taken by the agent.
    To keep things simple, we use the same index `t` for the reward, which is expressed
    as `R_t = R(S_t, A_t)`, while some may prefer to use `R_{t+1} = R(S_t, A_t, S_{t+1})`
    instead of `R_t` to emphasize that a reward also depends on the successor state
    `S_{t+1}`, as Sutton and Barto discussed in their book.³ However, this alternative
    expression can sometimes lead to confusion, particularly in simple cases like
    the ones we present in this book, where the reward does not depend on the successor
    state.


    It is important to remember that in practical implementation, the reward is typically
    received one time step later, along with the successor state, as illustrated in
    Fig. 2.1.


    We use upper case in `S_t`, `A_t`, `R_t` because these are random variables, and
    the actual outcome of these random variables could vary. When we are talking about
    the specific outcome of these random variables, we often use the lower case `s`,
    `a`, `r`.


    Taken together, the state space, action space, transition model, and reward function
    provide a complete description of the environment and the agent’s interactions
    with it. In the following sections, we’ll explore how these elements interact
    to form the foundation for solving reinforcement learning problems.


    To better understand the interactions between the agent and the environment, we
    can unroll the interaction loop as follows, as shown in Fig. 2.2:


    - The agent observes the state `S_0` from the environment.

    - The agent takes action `A_0` in the environment.

    - The environment transition into a new state `S_1` and also generate a reward
    signal `R_0`, where `R_0` is conditioned on `S_0` and `A_0`.

    - The agent receives reward `R_0` along with the successor state `S_1` from the
    environment.

    - The agent decides to take action `A_1`.

    - The interaction continues to the next stage until the process reaches the terminal
    state `S_T`. Once it reaches terminal state, no further action is taken and a
    new episode can be started from the initial state `S_0`.


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig2_HTML.png)


    A state transition diagram of the unrolled agent environment iteration loop. State
    S 0 leads to state S 1 with action A 0. State S 1 has reward R 0, and in turn
    leads to subsequent states, that end with state S T and reward R T minus 1.


    Fig. 2.2 Example of the agent-environment iteration loop unrolled by time for
    episodic problem


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig1_HTML.png)


    A cycle diagram of agent environment interaction. An arrow labeled action points
    from agent to environment. An arrow labeled observation and reward point from
    environment to agent.


    Fig. 2.1 Agent-environment interaction


    The reason why there is no reward when the agent observes the first environment
    state `S_0` is due to the fact that the agent has not yet interacted with the
    environment. As mentioned earlier, in this book, we assume that the reward function
    `R_t = R(S_t, A_t)` is conditioned on the current state of the environment `S_t`
    and the action `A_t` taken by the agent. Since no action is taken in state `S_0`,
    there is no reward signal associated with the initial state. However, in practice,
    it can sometimes be convenient to include a “fake” initial reward, such as using
    0, to simplify the code.


    In summary, the MDP provides a framework for modeling reinforcement learning problems,
    where the agent interacts with the environment by taking actions based on the
    current state and receives rewards that are conditioned on the current state and
    action. By understanding the interactions between the agent and environment, we
    can develop algorithms that learn to make good decisions and maximize the cumulative
    reward over time.'
