    ## 10.4 Summary


    In this chapter, we delved into the application of policy-based methods to tackle
    RL problems with continuous action spaces. While previous examples primarily focused
    on RL problems with discrete action spaces, certain tasks such as robotic control
    necessitate specialized considerations.


    We started with a brief exploration of the challenges posed by continuous action
    spaces, highlighting why traditional value-based methods like Q-learning are ill-suited
    for addressing such problems. Subsequently, we introduced MuJoCo, a test bed equipped
    with prebuilt, straightforward robotic control tasks that serve as suitable environments
    for testing a variety of RL algorithms.


    Next, we shifted our focus to discussing the necessary modifications required
    for standard policy-based methods like Actor-Critic in order to effectively train
    RL agents for robotic control tasks. The key alteration involves constructing
    neural networks capable of accurately predicting the policy’s distribution and
    enabling the sampling of actions from this policy. Our examination of policy gradient
    methods will continue in the subsequent chapter, where we will introduce a highly
    effective algorithm called Proximal Policy Optimization (PPO), known for its state-of-the-art
    performance in real-world scenarios.


