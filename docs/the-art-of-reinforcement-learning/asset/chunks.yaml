  trans: "\n### 使用 ε-贪心策略进行探索\n\n强化学习中的一个基本挑战是找到探索与利用之间的平衡。探索是指尝试新动作以了解更多环境信息的过程，而利用则是利用当前知识在每个状态下采取最佳可能动作。ε-贪心策略是一种简单有效的方法，既能鼓励探索，又能同时利用当前知识。\n\
    \nε-贪心策略的工作原理是：以概率 ε 选择一个随机动作，以概率 1 - ε 根据当前状态-动作价值函数选择已知的最佳动作。参数 ε 控制探索程度，取值范围为\
    \ 0 ≤ ε ≤ 1。当 ε 较高时，智能体更倾向于通过随机动作探索环境。随着 ε 降低，智能体将更多地依赖当前知识，更频繁地选择已知的最佳动作。这种从探索到利用的渐进转变，通常是智能体在强化学习任务中取得良好性能的必要条件。\n\
    \n形式上，ε-贪心策略定义为\n\n```\nπ(a|s) = \n  情况 1 - ε + ε/|A(s)|   如果 a = argmax_a Q_π(s,\
    \ a)\n  情况 ε/|A(s)|           如果 a ≠ argmax_a Q_π(s, a)\n```\n\n其中 `Q(s, a)` 是状态-动作价值函数，`|A(s)|`\
    \ 是状态 s 下的合法动作数量。该策略以概率 1 - ε + ε/|A(s)| 选择已知最佳动作，以概率 ε/|A(s)| 选择随机动作。\n\n例如，假设我们正在训练一个智能体玩一个简单的游戏，它需要穿越迷宫到达目标。训练开始时，智能体对环境一无所知，因此需要探索以了解迷宫布局和不同动作的效果。我们可以将\
    \ ε 设置为 0.9 这样的高值，以便智能体更频繁地探索。随着智能体对迷宫了解更多，对状态-动作价值的估计更加准确，我们可以逐渐降低 ε，以鼓励更多地利用当前知识。\n\
    \n安排 ε 衰减的常见方法是使用随时间递减的函数。例如，我们可以使用线性调度，从较高的 ε 值开始，每经过一定数量的回合或时间步，将其减少固定量，直到达到最小值。或者，我们也可以使用指数衰减调度，每经过一个回合或时间步，将\
    \ ε 乘以一个衰减因子。\n\n总之，ε-贪心策略是一种简单而有效的方法，用于在强化学习中平衡探索与利用。参数 ε 使我们能够控制探索程度，并且随着智能体对环境知识的增加，我们可以随时间逐渐降低它。衰减调度和\
    \ ε 最小值的选择取决于具体应用，可能需要通过一些试错来找到最优值。\n"
- fmt: '### 4.4 Monte Carlo Control (Policy Improvement)


    Now we are ready to start using Monte Carlo methods for policy improvement. In
    dynamic programming (DP), which is a class of algorithms used for solving Markov
    decision processes (MDPs), the policy improvement algorithm consists of two steps.
    The first step is to use the estimated state value function `V_π` and the model
    of the environment to compute the state-action value function `Q_π`. The second
    step is to compute a better deterministic policy `π''` based on `Q_π`.


    In Monte Carlo policy evaluation, we can directly estimate the state-action value
    function `Q_π` without having to first estimate the state value function. This
    is shown in Algorithm 4. The algorithm works by simulating complete episodes of
    interaction with the environment, where an episode is a sequence of state-action-reward
    transitions that start from an initial state and end in a terminal state. We use
    the first-visit method to estimate `Q_π`, which means that we only consider the
    first occurrence of a state-action pair in each episode when calculating the average
    return. This ensures that the estimates are unbiased.


    Using the estimates of `Q_π`, we can compute a better policy `π''`. One way to
    do this is to use an `ε`-greedy policy, which is a way to balance exploration
    and exploitation during learning. An `ε`-greedy policy chooses the action with
    the highest estimated state-action value with probability `1-ε` and a random action
    with probability `ε`. The value of `ε` determines the amount of exploration; a
    larger value of `ε` leads to more exploration.


    The `ε`-greedy policy for Monte Carlo policy improvement works as follows: for
    each state, we choose the action with the highest estimated state-action value
    with probability `1-ε` and a random action with probability `ε/K`, where `K` is
    the number of actions available in that state. This ensures that every action
    is chosen with nonzero probability, which is necessary for convergence to the
    optimal policy. The new policy `π''` is then computed as the greedy policy with
    respect to `Q_π`, that is, for each state we choose the action with the highest
    estimated state-action value.


    **Algorithm 5: Example of Monte Carlo policy improvement, with `ε`-greedy exploration**


    ![](images/605748_1_En_4_Chapter/605748_1_En_4_Figaaf_HTML.gif) A 7-line algorithm
    titled example of Monte Carlo policy improvement takes the following inputs to
    give an improved policy as the output. Estimated state value function `Q_π` for
    `π` and exploration rate `ε`.


    In summary, Monte Carlo policy improvement allows us to directly estimate the
    state-action value function `Q_π` and use it to improve the policy, without having
    to first estimate the state value function as in DP. Using an `ε`-greedy policy
    for exploration, we can balance exploration and exploitation during learning and
    converge to the optimal policy.


    We adapt the general policy iteration template introduced in Chap. 3 for Monte
    Carlo control, which is to find the optimal policy by learning its value function.
    But there are some changes we need to make. The first change is, during Monte
    Carlo policy evaluation, we need to estimate the state-action value function `Q_π`
    instead of `V_π` for the policy `π`. The second change is when to stop running
    the algorithm. As in DP, we stop when the policy from the previous iteration is
    the same as the current iteration, meaning no improvement can be made. But in
    Monte Carlo, the whole process of policy evaluation is based on the number of
    sample episodes, so we often define the stop condition based on the number of
    sample episodes we want the agent to collect. One last optional change, since
    we’re now using `ε`-greedy policy for exploration, we may want to decrease the
    exploration rate `ε`, for example, after every iteration.


    We now introduce the first-visit Monte Carlo control algorithm with the incremental
    update method, as shown in Algorithm 6. We can easily extend this into the every-visit
    case by simply removing the condition check during the policy evaluation process.


    **Algorithm 6: First-visit Monte Carlo control with incremental update and `ε`-greedy
    exploration**


    ![](images/605748_1_En_4_Chapter/605748_1_En_4_Figaag_HTML.gif) A 14-line algorithm
    of first-visit Monte Carlo control with incremental update and `ε`-greedy exploration
    takes the following inputs to find an optimal policy `π` and its state-action
    value function `Q_π`. Discount rate `γ`, initial exploration rate `ε`, and number
    of episodes `K`.


    We can run Algorithm 6 to find the optimal policy for our service dog MDP. And
    amazingly after ten episodes, it found the optimal policy, although the values
    are not quite close to the true optimal state value function `V_*`.


    We can also see from Table 4.3, as we increase the number of episodes, the values
    are getting closer to the true optimal state value `V_*`. One interesting fact
    is for the state `Outside`, the values are never getting closer to the true value;
    this might be because the agent has never visited the state that often during
    the learning process. So the value is not getting updated that often.


    **Table 4.3**'
