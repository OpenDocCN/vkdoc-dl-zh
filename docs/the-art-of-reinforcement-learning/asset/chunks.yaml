    现在，我们准备介绍 Actor-Critic 算法，该算法使用神经网络来近似策略和状态价值函数。策略网络（Actor）和价值网络（Critic）的训练方式与带基线的
    REINFORCE 算法类似。具体来说，我们的目标是最小化来自价值网络的估计状态值的均方误差损失，并最大化由智能体采取特定动作的策略梯度的对数似然，该对数似然以采取该动作的优势函数为权重。然而，在
    Actor-Critic 中，我们基于一个包含 `N` 个转移的序列来更新参数，而不是基于完整的回合序列。这使得算法能够更高效地学习，并更及时地更新其参数。


    Actor-Critic 是一类流行的强化学习算法，它结合了基于价值和基于策略方法的优势。Critic 学习价值函数，用于估计在当前状态和动作下预期的累积奖励。然后，Actor
    利用这些信息来选择更有可能获得更高奖励的动作。这两个组件的结合使得智能体能够同时学习价值函数和策略。


    Actor-Critic 的神经网络架构选择取决于问题的复杂度。在实践中，我们可以为策略和价值函数使用独立的网络，也可以使用共享权重的架构。


    使用两个独立的神经网络可以带来更大的灵活性，例如可以分别对策略和价值函数应用不同的优化技术或步长。它还可以针对每个函数采用更专门的架构，并且在状态空间维度不高的情况下可能表现更好。然而，使用两个独立的网络计算量较大，因为两个网络都必须接收相同的输入数据。同时，由于需要维护两个独立的网络，训练和调优的难度也更高。


    使用一个具有两个独立输出头的单一神经网络计算效率更高，因为网络只需接收一次输入数据。由于只有一个网络需要处理，训练和维护也更容易，并且在状态空间视觉上复杂的情况下可能表现更好。然而，这种方法可能无法为每个函数提供足够的架构定制灵活性，并且在策略和价值函数需求差异很大的情况下，其性能可能不如使用独立网络。


    ## 算法 4：Actor-Critic


    ![](img/605748_1_En_9_Figaad_HTML.gif) 一个名为 actor-critic 的 11 行算法，接收以下输入，输出一个近似最优策略
    `π_θ`。输入包括：折扣率 `γ`，策略学习率 `α`，价值函数学习率 `β`，序列长度 `N`，以及环境步数 `K`。


    图 9.4 展示了一个共享权重架构的简单示例。这里，使用几个共享层来计算隐藏特征或嵌入，然后将这些特征分别输入到两个输出头中，用于计算价值和策略。请注意，这两个输出头不共享任何权重。


    ![](img/605748_1_En_9_Fig4_HTML.png)


    神经网络架构的流程图如下所示。输入数据，经过 64 个单元，再经过 64 个单元（通过 ReLU 连接），再经过 64 个单元（通过 ReLU 连接），最后分别连接到
    1 个单元和 N 个单元（通过 ReLU 连接）。1 个单元最终输出状态价值。N 个单元进一步通过 Softmax 输出动作概率。


    **图 9.4** 用于 Actor-Critic 算法的共享权重神经网络架构的简单示例


    图 9.5 展示了在车杆经典控制任务上，Actor-Critic 与带基线的 REINFORCE 算法的性能对比。性能通过获得的平均奖励来衡量。为了评估智能体的性能，我们在每次训练迭代（包含
    20,000 个训练步）结束时，在一个独立的测试环境中运行了 20,000 个评估步。结果取五次独立运行的平均值，并使用窗口大小为 5 的移动平均进行平滑处理。


    ![](img/605748_1_En_9_Fig5_HTML.png)


    评估回合回报与训练环境步数的折线图。图中绘制了带基线的 REINFORCE 和 Actor-Critic 的凹向下递增曲线，伴有小幅波动。一条平行于横轴的线表示最大值，从纵轴上的
    500 开始。


    **图 9.5** 在车杆控制任务上 Actor-Critic 与带基线的 REINFORCE 的对比。结果取五次独立运行的平均值。我们对这两个智能体使用相同的折扣率
    `γ = 0.99`，策略神经网络学习率 `α = 0.0002`，以及基线网络学习率 `β = 0.0005`。对于 Actor-Critic，我们使用序列长度
    `N = 64`。


    我们对这些智能体使用相同的神经网络架构和学习率，并为 Actor-Critic 智能体使用两个独立的神经网络。对于 Actor-Critic，我们让智能体在更新策略和基线网络参数之前收集
    64 个转移。我们使用 Adam 优化器训练神经网络。


    我们可以看到，Actor-Critic 智能体的性能几乎与带基线的 REINFORCE 智能体相当。

    '
- fmt: '# 9.6 Using Entropy to Encourage Exploration


    Entropy is a concept from information theory and statistics that measures the
    randomness or uncertainty of a probability distribution. In general, entropy is
    defined as the average amount of information needed to describe the outcomes of
    a random variable.


    For example, consider a coin flip with two possible outcomes: heads or tails.
    If the coin is fair, then the probability of heads is 0.5 and the probability
    of tails is also 0.5. The entropy of this distribution is 1 bit, which means that
    on average, 1 bit of information is needed to describe the outcome of a single
    coin flip.


    In policy-based algorithms for reinforcement learning, the policy is typically
    represented by a neural network that outputs a probability distribution over actions
    given a state. The entropy of this distribution can be used as a measure of the
    policy’s uncertainty or randomness.


    The ideal of using entropy to encourage exploration was first proposed by Williams,
    R. J. [[4](#605748_1_En_9_Chapter.xhtml#CR4)]. In such case, the policy is encouraged
    to explore more and take more diverse actions, which can be useful for learning
    a robust policy that performs well in a variety of situations. On the other hand,
    low entropy means that the policy is more deterministic and less exploratory,
    which can lead to suboptimal policies that get stuck in local optimal.


    To encourage exploration in policy gradient algorithms, a negative entropy term
    can be added to the policy gradient loss. This encourages the policy to take more
    diverse actions while still favoring actions with higher expected returns.


    For reinforcement learning problems with discrete action space, we can use Eq.
    ([9.29](#605748_1_En_9_Chapter.xhtml#Equ30)) to compute the entropy `H` for some
    policy `π`, where `N` is the number of actions in the action space, and `π(a_t|s_t)`
    is the probability of taking action `a_t` in state `s_t` when following policy
    `π`.


    ```

    H = -∑_{k=1}^{N} π(a_k|s_t) log π(a_k|s_t)

    ```


    (9.29)


    To understand why using entropy can help encourage the agent to do exploration,
    let’s look at a simple experiment. Suppose for a particular state `s`, there are
    four actions the agent can choose from. And we have three completely different
    policies: `π_1`, `π_2`, and `π_3`. Policy `π_1` is a optimal deterministic policy,
    which means when in state `s` it will always choose the best action (assume it’s
    the first action), so the probability distribution for the different actions under
    policy `π_1` will be something like `[1, 0, 0, 0]`. The second policy `π_2` is
    a stochastic policy with different probability distributions under policy `π_2`,
    and the probability distribution is something like `[0.6, 0.4, 0, 0]`. The third
    policy `π_3` is a uniform random policy, which means the probability is evenly
    distributed over all available actions `[0.25, 0.25, 0.25, 0.25]`. We can then
    use Eq. ([9.29](#605748_1_En_9_Chapter.xhtml#Equ30)) to compute the entropy for
    these different policies for state `s`.


    The entropy for these different policies is shown as follows:


    - The entropy for `π_1` is `H_{π_1} = -(1.0 * log(1.0)) = 0`

    - The entropy for `π_2` is `H_{π_2} = -(0.6 * log(0.6) + 0.4 * log(0.4)) = 0.67`

    - The entropy for `π_3` is `H_{π_3} = -(0.25 * log(0.25) * 4) = 1.39`


    We can see that for the deterministic policy `π_1`, the entropy is 0, since it
    will always choose the best action, so there’s no randomness in the decision process.
    For stochastic policy `π_2`, the entropy is 0.67. And for the uniform random policy
    `π_3`, the entropy is 1.39. From this example, we can clearly see that the more
    randomness we have in the process, the higher the entropy.'
