    # Preface


    Reinforcement learning (RL) is a highly promising yet challenging subfield of
    artificial intelligence (AI) that plays a crucial role in shaping the future of
    intelligent systems. From robotics and autonomous agents to recommendation systems
    and strategic decision-making, RL enables machines to learn and adapt through
    interactions with their environment. Its remarkable success stories include RL
    agents achieving human-level performance in video games and even surpassing world
    champions in strategic board games like Go. These achievements highlight the immense
    potential of RL in solving complex problems and pushing the boundaries of AI.


    What sets RL apart from other AI subfields is its fundamental approach: agents
    learn by interacting with the environment, mirroring how humans acquire knowledge.
    However, RL poses challenges that distinguish it from other AI disciplines. Unlike
    methods that rely on precollected training data, RL agents generate their own
    training samples. These agents are not explicitly instructed on how to achieve
    a goal; instead, they receive state representations of the environment and a reward
    signal, forcing them to explore and discover optimal strategies on their own.
    Moreover, RL involves complex mathematics that underpin the formulation and solution
    of RL problems.


    While numerous books on RL exist, they typically fall into two categories. The
    first category emphasizes the fundamentals and mathematics of RL, serving as reference
    material for researchers and university students. However, these books often lack
    implementation details. The second category focuses on practical hands-on coding
    of RL algorithms, neglecting the underlying theory and mathematics. This apparent
    gap between theory and implementation prompted us to create this book, aiming
    to strike a balance by equally emphasizing fundamentals, mathematics, and the
    implementation of successful RL algorithms.


    This book is designed to be accessible and informative for a diverse audience.
    It is targeted toward researchers, university students, and practitioners seeking
    a comprehensive understanding of RL. By following a structured approach, the book
    equips readers with the necessary knowledge and tools to apply RL techniques effectively
    in various domains.


    The book is divided into four parts, each building upon the previous one. Part
    I focuses on the fundamentals and mathematics of RL, which form the foundation
    for almost all discussed algorithms. We begin by solving simple RL problems using
    tabular methods. Chapter [2](#605748_1_En_2_Chapter.xhtml), the cornerstone of
    this part, explores Markov decision processes (MDPs) and the associated value
    functions, which are recurring concepts throughout the book. Chapters [3](#605748_1_En_3_Chapter.xhtml)
    to [5](#605748_1_En_5_Chapter.xhtml) delve deeper into these fundamental concepts
    by discussing how to use dynamic programming (DP), Monte Carlo methods, and temporal
    difference (TD) learning methods to solve small MDPs.


    Part II tackles the challenge of solving large-scale RL problems that render tabular
    methods infeasible due to their complexity (e.g., large or infinite state spaces).
    Here, we shift our focus to value function approximation, with particular emphasis
    on leveraging (deep) neural networks. Chapter [6](#605748_1_En_6_Chapter.xhtml)
    provides a brief introduction to linear value function approximation, while Chap.
    [7](#605748_1_En_7_Chapter.xhtml) delves into the renowned Deep Q-Network (DQN)
    algorithm. In Chap. [8](#605748_1_En_8_Chapter.xhtml), we discuss enhancements
    to the DQN algorithm.


    Part III explores policy-based methods as an alternative approach to solving RL
    problems. While Parts I and [II](https://doi.org/10.1007/978-1-4842-9606-6_II)
    primarily focus on value-based methods (learning the value function), Part III
    concentrates on learning the policy directly. We delve into the theory behind
    policy gradient methods and the REINFORCE algorithm in Chap. [9](#605748_1_En_9_Chapter.xhtml).
    Additionally, we explore Actor-Critic algorithms, which combine policy-based and
    value-based approaches, in Chap. [10](#605748_1_En_10_Chapter.xhtml). Furthermore,
    Chap. [11](#605748_1_En_11_Chapter.xhtml) covers advanced policy-based algorithms,
    including surrogate objective functions and the renowned Proximal Policy Optimization
    (PPO) algorithm.


    The final part of the book addresses advanced RL topics. Chapter [12](#605748_1_En_12_Chapter.xhtml)
    discusses how distributed RL can enhance agent performance, while Chap. [13](#605748_1_En_13_Chapter.xhtml)
    explores the challenges of hard-to-explore RL problems and presents curiosity-driven
    exploration as a potential solution. In the concluding chapter, Chap. [14](#605748_1_En_14_Chapter.xhtml),
    we delve into model-based RL by providing a comprehensive examination of the famous
    AlphaZero algorithm.


    Unlike a typical hands-on coding handbook, this book does not primarily focus
    on coding exercises. Instead, we dedicate our resources and time to explaining
    the fundamentals and core ideas behind each algorithm. Nevertheless, we provide
    complete source code for all examples and algorithms discussed in the book. Our
    code implementations are done from scratch, without relying on third-party RL
    libraries, except for essential tools like `Python`, `OpenAI Gym`, `Numpy`, and
    the `PyTorch` deep learning framework. While third-party RL libraries expedite
    the implementation process in real-world scenarios, we believe coding each algorithm
    independently is the best approach for learning RL fundamentals and mastering
    the various RL algorithms.'
