  trans: "\n### `V_π` 的运算示例\n\n为了更好地理解如何计算策略 `π` 下某个状态的价值，我们来看一个使用服务犬 MDP 的例子。我们选择了随机策略\
    \ `π`，这意味着选择每个动作的概率在所有（合法）动作之间均匀分布。在此例中，我们将重点计算状态 *房间 2* 的价值。在该状态下，智能体有三个合法动作可供选择：*前往房间\
    \ 1*、*前往房间 3*、*前往室外*。我们对每个后续状态的初始猜测价值分别为 `V_π(房间 1) = 1.0`、`V_π(房间 3) = 10.0`、`V_π(室外)\
    \ = 5.0`。假设我们已知环境模型，并使用折扣率 `γ = 0.9`，那么对于这个随机策略 `π`，我们该如何计算状态 *房间 2* 的价值呢？\n\n\
    根据环境模型，我们知道每个合法动作的即时奖励分别为 `-2`、`-1`、`0`，并且对于所有合法动作，从当前状态转移到后续状态的状态转移概率始终为 `1.0`。同时，我们也知道智能体选择每个合法动作的概率分别为\
    \ `0.33`、`0.33`、`0.33`。最后，我们已知（猜测）不同后续状态 `s'` 的价值。因此，我们只需将这些数值代入公式 (2.13)，即可计算出状态\
    \ *房间 2* 的价值：\n\n```\nV_π(房间 2) = 0.33 * (-2 + 0.9 * 1.0) + 0.33 * (-1 + 0.9 *\
    \ 10.0) + 0.33 * (0 + 0.9 * 5.0)\n            = 0.33 * -1.1 + 0.33 * 8 + 0.33\
    \ * 4.5\n            = 3.76\n```\n\n上述结果如图 2.11 所示。当然，与 MRP 的运算示例类似，状态 *房间 2*\
    \ 的估计价值并不精确。但如果我们将状态空间中的所有状态都纳入考虑，并重复该过程大量次数，最终估计值将非常接近真实值。这一思想本质上就是动态规划算法所做的事情，我们将在第\
    \ 3 章中介绍。\n\n一个用于计算房间 2 状态价值的状态转移图，其中 gamma 等于 0.9。房间 1、2、3 以及终点的状态价值分别为 1.0、3.8、10.0\
    \ 和 0.0。价值为 3.8 的房间 2 具有以下动作：前往房间 1（r 等于 -2）、前往室外（r 等于 0）以及前往房间 3（r 等于 -1）。\n\n\
    **图 2.11** 针对服务犬 MDP，在随机策略 `π`、`γ = 0.9` 下，如何计算状态 *房间 2* 价值的示例；初始状态价值为随机选取。\n\n\
    ### `Q_π` 的运算示例\n\n让我们来看一个使用服务犬 MDP 计算状态-动作价值 `Q_π(s, a)` 的示例。条件与计算 `V_π(房间 2)`\
    \ 的运算示例几乎相同。但在此例中，我们要计算状态 *房间 2* 下所有合法动作的状态-动作价值。\n\n我们仍然使用随机策略 `π`，这意味着选择每个动作的概率在所有（合法）动作之间均匀分布。我们对每个状态的初始猜测价值分别为\
    \ `V_π(房间 1) = 1.0`、`V_π(房间 3) = 10.0`、`V_π(室外) = 5.0`。假设我们已知环境模型，并使用折扣率 `γ =\
    \ 0.9`，那么对于这个随机策略，我们该如何计算状态 *房间 2* 下每个（合法）动作的状态-动作价值呢？\n\n根据环境模型，我们知道每个合法动作的即时奖励分别为\
    \ `-2`、`-1`、`0`，并且对于每个状态-动作对 `(s, a)`，从当前状态转移到后续状态的状态转移概率始终为 `1.0`。同时，我们已知（猜测）不同后续状态\
    \ `s'` 的价值。因此，我们只需将这些数值代入公式 (2.17)，即可计算出每个动作的价值：\n\n```\nQ_π(房间 2, 前往房间 1) = -2\
    \ + 0.9 * 1.0 = -1.1\nQ_π(房间 2, 前往房间 3) = -1 + 0.9 * 10.0 = 8.0\nQ_π(房间 2, 前往室外)\
    \  = 0 + 0.9 * 5.0 = 4.5\n```\n\n一个用于计算状态-动作价值的示意图。价值为 3.8 的房间 2 具有以下动作：前往房间 1（r\
    \ 等于 -2，q π 等于 -1.1）、前往室外（r 等于 0，q π 等于 4.5）以及前往房间 3（r 等于 -1，q π 等于 8.0）。\n\n\
    **图 2.12** 针对服务犬 MDP 的随机策略，如何计算状态 *房间 2* 下所有合法动作的状态-动作价值的示例。`γ = 0.9`；初始状态价值为随机选取。\n\
    \n我们可以使用公式 (2.11) 来计算在此随机策略 `π` 下状态 *房间 2* 的价值；其结果与我们之前使用公式 (2.13) 计算的结果完全相同：\n\
    \n```\nV_π(房间 2) = 0.33 * -1.1 + 0.33 * 8 + 0.33 * 4.5 = 3.76\n```\n\n上述结果如图 2.12\
    \ 所示。一旦我们获得了策略 `π` 下 `Q_π` 的准确估计，就可以很容易地利用它来帮助智能体做出更好的决策。智能体所需要做的就是在状态空间中的所有状态下，选择具有最高状态-动作价值的动作\
    \ `argmax_a Q_π(s, a)`。它不再需要进行单步前瞻了。\n"
- fmt: "# 2.6 Alternative Bellman Equations for Value Functions\n\nOne limitation\
    \ Eq. (2.13) has is that we assume the reward signal from the environment is only\
    \ conditioned on the current environment state `s` and the action `a` taken by\
    \ the agent. However, there are cases the reward function is also conditioned\
    \ on the successor state `s'`, like `R(s, a, s')`, then the Bellman equation for\
    \ `V_π` needs to be rewritten to support this scenario as shown in Eq. (2.18):\n\
    \n```\nV_π(s) = E_π[ R_t + γ V_π(S_{t+1}) | S_t=s ]\n       = Σ_{a∈A} π(a|s) [\
    \ Σ_{s'∈S} P(s'|s,a) R(s,a,s') + γ Σ_{s'∈S} P(s'|s,a) V_π(s') ]\n       = Σ_{a∈A}\
    \ π(a|s) Σ_{s'∈S} P(s'|s,a) [ R(s,a,s') + γ V_π(s') ], for all s∈S\n```\n\n(2.18)\n\
    \nSimilarly, we can rewrite the Bellman equation for `Q_π` for the case where\
    \ the reward function is conditioned on the successor state `s'` like shown in\
    \ Eq. (2.19):\n\n```\nQ_π(s,a) = E_π[ R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t=s, A_t=a\
    \ ]\n         = Σ_{s'∈S} P(s'|s,a) R(s,a,s') + γ E_π[ Q_π(s',a') | S_{t+1}=s',\
    \ A_{t+1}=a' ]\n         = Σ_{s'∈S} P(s'|s,a) R(s,a,s') + γ Σ_{s'∈S} P(s'|s,a)\
    \ Σ_{a'∈A} π(a'|s') Q_π(s',a')\n         = Σ_{s'∈S} P(s'|s,a) [ R(s,a,s') + γ\
    \ Σ_{a'∈A} π(a'|s') Q_π(s',a') ], for all s∈S, a∈A\n```\n\n(2.19)\n\nHowever,\
    \ both of these equations assume the reward of the environment is deterministic.\
    \ That means the same `(s, a)` or `(s, a, s')` will always yield the same reward\
    \ signal. But there are cases the reward could also be stochastic. Then in that\
    \ case, they will fail to capture this randomness.\n\nIn their famous book *Reinforcement\
    \ Learning: An Introduction* [2], Sutton and Barto used Eq. (2.20) to cover this\
    \ scenario. They consolidated the dynamics function `P` and the reward function\
    \ `R` into a single four-parameter function `P(s', r|s, a)`, which covers the\
    \ problem where the reward could be conditioned on the successor state `s'`, or\
    \ the reward could be stochastic all at the same time.\n\n```\nV_π(s) = E_π[ R_t\
    \ + γ V_π(S_{t+1}) | S_t=s ]\n       = Σ_{a∈A} π(a|s) Σ_{s'} Σ_{r} P(s', r|s,\
    \ a) [ r + γ V_π(s') ]\n       = Σ_{a∈A} π(a|s) Σ_{s', r} P(s', r|s, a) [ r +\
    \ γ V_π(s') ], for all s∈S\n```\n\n(2.20)\n\nAnd similarly in this case, the Bellman\
    \ equation for `Q_π` becomes\n\n```\nQ_π(s,a) = E_π[ R_t + γ Q_π(S_{t+1}, A_{t+1})\
    \ | S_t=s, A_t=a ]\n         = Σ_{s'} Σ_{r} P(s', r|s, a) [ r + γ E_π[ Q_π(s',a')\
    \ | S_{t+1}=s', A_{t+1}=a' ] ]\n         = Σ_{s', r} P(s', r|s, a) [ r + γ Σ_{a'∈A}\
    \ π(a'|s') Q_π(s',a') ], for all s∈S, a∈A\n```\n\n(2.21)\n\nWhile Eqs. (2.20)\
    \ and (2.21) are more general, they might be much harder to fully understand.\
    \ To keep things simple, we will stick to the Bellman equations (2.13), (2.16),\
    \ and (2.17) in this book."
  raw: '## 2.6 Alternative Bellman Equations for Value Functions


    One limitation Eq. ([2.13](#605748_1_En_2_Chapter.xhtml#Equ13)) has is that we
    assume the reward signal from the environment is only conditioned on the current
    environment state *s* and the action *a* taken by the agent. However, there are
    cases the reward function is also conditioned on the successor state ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq256.png)
    , like ![$$R(s, a, s'')$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq257.png)
    , then the Bellman equation for ![$$V_\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq258.png)
    needs to be rewritten to support this scenario as shown in Eq. ([2.18](#605748_1_En_2_Chapter.xhtml#Equ18)):


    ![$$\displaystyle \begin{aligned} V_\pi(s) &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} V_\pi(S_{t+1}) \;\Big|\; S_t=s\right] \notag \\ &amp; =\sum_{a \in
    A} \pi(a|s) \left[\sum_{s'' \in \mathcal{S}} P(s''|s, a) R(s, a, s'') + {\gamma}
    \sum_{s'' \in \mathcal{S}} P(s''|s, a) V_\pi(s'') \right] \notag \\ &amp; =\sum_{a
    \in A} \pi(a|s) \sum_{s'' \in \mathcal{S}} P(s''|s, a) \Bigl[R(s, a, s'') + {\gamma}
    V_\pi(s'') \Bigr], \quad \mbox{for all}\; s \in \mathcal{S} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ18.png)


    (2.18)


    Similarly, we can rewrite the Bellman equation for ![$$Q_\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq259.png)
    for the case where the reward function is conditioned on the successor state ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq260.png)
    like shown in Eq. ([2.19](#605748_1_En_2_Chapter.xhtml#Equ19)):


    ![$$\displaystyle \begin{aligned} Q_\pi(s, a) &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} Q_\pi(S_{t+1}, A_{t+1}) \;\Big|\; S_t=s, A_t=a\right] \notag \\ &amp;
    =\sum_{s'' \in \mathcal{S}}P(s''|s, a)R(s, a, s'') + {\gamma} \mathbb{E}_{\pi\!\!}\left[Q_\pi(s'',
    a'') \;\Big|\; S_{t+1}=s'', A_{t+1}=a''\right] \notag \\ &amp; =\sum_{s'' \in
    \mathcal{S}}P(s''|s, a)R(s, a, s'') + {\gamma} \sum_{s'' \in \mathcal{S}}P(s''|s,
