    reinforcement learning problems, as we mentioned in Chap. [1](#605748_1_En_1_Chapter.xhtml).
    To adapt the DQN algorithm to the Atari games, we need to make some changes to
    the training pipeline. Specifically, we’ll need to prepare the environment state,
