- fmt: "### Worked Example for `V_π`\n\nTo better understand how to compute the value\
    \ for a state under policy `π`, let’s look at an example using our service dog\
    \ MDP. We chose the random policy `π`, which means the probability of selecting\
    \ each action was evenly distributed across all (legal) actions. In this case,\
    \ we’re going to focus on computing the value for state *Room 2*. There are three\
    \ legal actions *Go to room1*, *Go to room3*, *Go outside* the agent can choose\
    \ in this state. And our initial guessed values for each of the successor states\
    \ are `V_π(Room 1) = 1.0`, `V_π(Room 3) = 10.0`, `V_π(Outside) = 5.0`. Assuming\
    \ we know the model of the environment and we use discount `γ = 0.9`, how might\
    \ we compute the value for state *Room 2* for this random policy `π`?\n\nWe know\
    \ from the model of the environment the immediate reward for each of the legal\
    \ actions is `-2`, `-1`, `0`, and the state transition probability from the current\
    \ state to its successor states is always `1.0` for all legal actions. And we\
    \ also know the probability of the agent selecting each of the legal actions is\
    \ `0.33`, `0.33`, `0.33`. Finally, we know (guessed) the value for the different\
    \ successor states `s'`. So we just need to plug those numbers into Eq. (2.13),\
    \ and we can compute the values for state *Room 2* as\n\n```\nV_π(Room 2) = 0.33\
    \ * (-2 + 0.9 * 1.0) + 0.33 * (-1 + 0.9 * 10.0) + 0.33 * (0 + 0.9 * 5.0)\n   \
    \         = 0.33 * -1.1 + 0.33 * 8 + 0.33 * 4.5\n            = 3.76\n```\n\nThe\
    \ above results are shown in Fig. 2.11. Of cause, the estimated value for state\
    \ *Room 2* is not accurate, just like the worked example for MRP. But if we include\
    \ all the states in the state space and repeat the process over a large number\
    \ of times, in the end the estimated values would be very close to the true values.\
    \ This idea is essentially what the dynamic programming algorithms do, which we’ll\
    \ introduce in Chap. 3.\n\nA state transition diagram to compute the state value\
    \ of room 2 for gamma equals 0.9. States of rooms 1, 2, 3, and end have values\
    \ 1.0, 3.8, 10.0, and 0.0. Room 2 with 3.8 has actions go to room 1 with r equals\
    \ negative 2, go outside with r equals 0, and go to room 3 with r equals negative\
    \ 1.\n\n**Fig. 2.11** Example of how to compute the value of state *Room 2* for\
    \ the service dog MDP, for a random policy `π`, `γ = 0.9`; the initial state values\
    \ are chosen randomly.\n\n### Worked Example for `Q_π`\n\nLet’s look at an example\
    \ of how to compute the state-action values `Q_π(s, a)` using our service dog\
    \ MDP. The conditions were almost identical to the worked example where we compute\
    \ the value for `V_π(Room 2)`. But in this case, we want to compute the state-action\
    \ value for all legal actions in state *Room 2*.\n\nWe still use the random policy\
    \ `π`, which means the probability of selecting each action was evenly distributed\
    \ across all (legal) actions. Our initial guessed values for each of the states\
    \ are `V_π(Room 1) = 1.0`, `V_π(Room 3) = 10.0`, `V_π(Outside) = 5.0`. Assuming\
    \ we know the model of the environment and we use discount `γ = 0.9`, how might\
    \ we compute the state-action value for each of the (legal) actions in state *Room\
    \ 2* for this random policy?\n\nWe know from the model of the environment the\
    \ immediate reward for each of the legal actions is `-2`, `-1`, `0`, and the state\
    \ transition probability from the current state to its successor state is always\
    \ `1.0` for each state-action pair `(s, a)`. And we know (guessed) the value for\
    \ the different successor states `s'`. So we just need to plug those numbers into\
    \ Eq. (2.17), and we can compute the values for each action as\n\n```\nQ_π(Room\
    \ 2, Go to room1) = -2 + 0.9 * 1.0 = -1.1\nQ_π(Room 2, Go to room3) = -1 + 0.9\
    \ * 10.0 = 8.0\nQ_π(Room 2, Go outside)  = 0 + 0.9 * 5.0 = 4.5\n```\n\nAn illustration\
    \ to compute the state-action values. room 2 with 3.8 has actions go to room 1\
    \ with r equals negative 2 and q pi equals negative 1.1, go outside with r equals\
    \ 0 and q pi equals 4.5, and go to room 3 with r equals negative 1 and q pi equals\
    \ 8.0.\n\n**Fig. 2.12** Example of how to compute state-action values for all\
    \ legal actions in state *Room2*, for a random policy to the service dog MDP.\
    \ `γ = 0.9`; the initial state values are chosen randomly.\n\nWe can use Eq. (2.11)\
    \ to compute the value for state *Room 2* under this random policy `π`; the outcome\
    \ is exactly the same as we’ve done before using Eq. (2.13):\n\n```\nV_π(Room\
    \ 2) = 0.33 * -1.1 + 0.33 * 8 + 0.33 * 4.5 = 3.76\n```\n\nThe above results are\
    \ shown in Fig. 2.12. Once we have an accurate estimate of `Q_π` for the policy\
    \ `π`, then it’s fairly easy to use it to help the agent to make better decisions.\
    \ All the agent needs to do is select the action that has the highest state-action\
    \ value `argmax_a Q_π(s, a)` for all states in the state space. And it doesn’t\
    \ need to do a one-step look-ahead anymore."
