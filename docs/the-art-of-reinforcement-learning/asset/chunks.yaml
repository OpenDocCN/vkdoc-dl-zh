    ### 马尔可夫性质


    并非所有问题都能用 MDP 框架建模。**马尔可夫性质**是 MDP 框架适用必须满足的关键假设。该性质指出，系统的未来状态在给定当前状态的情况下与过去状态无关。更具体地说，后继状态`S_{t+1}`仅取决于当前状态`S_t`和动作`A_t`，而不取决于任何先前的状态或动作。


    换句话说，马尔可夫性质是对环境状态的一种限制，该状态必须包含足够的历史信息以预测未来状态。具体而言，当前状态必须包含足够的信息来预测下一个状态，而无需了解过去状态和动作的完整历史。


    ```

    P(S_{t+1} | S_t, A_t) = P(S_{t+1} | S_t, A_t, S_{t-1}, A_{t-1}, ..., S_1, A_1,
    S_0, A_0)

    ```


    (2.1)


    例如，一个试图在房间内导航的机器人，只有在满足马尔可夫性质时才能使用 MDP 框架建模。如果机器人的移动取决于其完整历史（包括其过去的位置和动作），那么马尔可夫性质将被违反，MDP
    框架将不再适用。这是因为机器人的当前位置将不包含足够的信息来预测其下一个位置，从而难以对环境进行建模并基于该模型做出决策。


    ### 服务犬示例


    在此示例中，我们设想训练一只服务犬为主人取回物品。训练在一栋有三个房间的房屋内进行，其中一个房间内放有个人物品，狗必须取回该物品并交给主人或训练员。该任务属于**情节式强化学习**问题类别，因为一旦狗取回物品，任务即被视为完成。为简化任务，我们始终将物品放置在相同（或几乎相同）的位置，并随机初始化起始状态。此外，其中一个房间通向可以自由玩耍的前院。此场景如图
    2.3 所示。


    在本书中，我们将使用这个服务犬示例来演示如何将强化学习问题建模为 MDP（马尔可夫决策过程），解释环境的动态函数，并构建策略。随后，我们将介绍具体的算法，如动态规划、蒙特卡洛方法和时序差分方法，来解决服务犬的强化学习问题。


    ## 2.3 马尔可夫过程或马尔可夫链


    在开始讨论马尔可夫决策过程（MDP）之前，我们首先定义什么是马尔可夫过程（马尔可夫链）。马尔可夫过程是一种无记忆的随机过程，其中转移到新状态的概率仅取决于当前状态，而不取决于任何过去的状态或动作。它是
    MDP 中最简单的研究情况，因为它只涉及一系列状态，不包含任何奖励或动作。尽管看似基础，但研究马尔可夫链非常重要，因为它们提供了关于序列中状态如何相互影响的基本见解。这种理解在处理更复杂的
    MDP 时会很有帮助。


    一个房屋平面布局图，包含相邻的房间 1、2 和 3。目标位于房间 3 内。房间 2 有一扇门通向一个标有“室外”的阴影不规则区域。


    **图 2.3** 用于说明服务犬示例的简单示意图


    马尔可夫链可以定义为一个元组`(S, P)`，其中`S`是一个有限的状态集合，称为状态空间；`P`是环境的动态函数（或转移模型），它指定了从当前状态`s`转移到后继状态`s''`的概率。由于马尔可夫链中没有动作，我们在动态函数`P`中省略了动作。从状态`s`转移到状态`s''`的概率记为`P(s''|s)`。


    例如，我们可以用图来建模一个马尔可夫链，其中每个节点代表一个状态，每条边代表从一个状态到另一个状态的可能转移，每条边都关联一个转移概率。这有助于我们理解序列中的状态如何相互影响。我们将服务犬示例建模为马尔可夫链，如图
    2.4 所示。空心圆代表非终止状态，方框代表终止状态。直线和曲线代表从当前状态`s`到其后继状态`s''`的转移，每条可能的转移都关联一个转移概率`P(s''|s)`。例如，如果智能体当前处于*房间
    1*状态，则环境有 0.8 的概率转移到后继状态*房间 2*，有 0.2 的概率停留在同一状态*房间 1*。请注意，这些概率是随机选择的，用以说明环境动态函数的概念。

