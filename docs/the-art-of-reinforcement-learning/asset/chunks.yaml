    \end{aligned}$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equb.png)


    We use ![$$P(\tau ; \boldsymbol {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq49.png)
    to denote the probability of the agent obtaining an arbitrary episode sequence
    ![$$\tau $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq50.png)
    when following the policy ![$$\pi _{\boldsymbol {\theta }}$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq51.png)
    . Specifically, ![$$P(\tau ; \boldsymbol {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq52.png)
    is the product of the probability of selecting actions under the policy, ![$$\pi
    (a_t|s_t; \boldsymbol {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq53.png)
    , and the probability of transitioning between states, ![$$P(s_{t+1}|s_t, a_t)$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq54.png)
    , for each time step *t* in the sequence. The probability of the sequence is obtained
    by multiplying these probabilities across all time steps, as well as the probability
    of starting in a particular initial state ![$$s_0$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq55.png)
    , which we represent as ![$$\mu (s_0)$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq56.png)
    . Thus, we can rewrite the equation for the value of a policy ![$$\pi _{\boldsymbol
    {\theta }}$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq57.png)
    using ![$$P(\tau ; \boldsymbol {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq58.png)
    and the sum of discounted rewards for the entire episode sequence, ![$$G(\tau
    )$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq59.png) , as shown
    in Eq. ([9.6](#605748_1_En_9_Chapter.xhtml#Equ6)):


    ![$$\displaystyle \begin{aligned} V_{\pi_{\boldsymbol{\theta}}} = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \right] = \sum_{\tau} P(\tau; \boldsymbol{\theta}) G(\tau) {} \end{aligned}
    $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ6.png)


    (9.6)


    Here, ![$$G(\tau )$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq60.png)
    is the sum of discounted rewards for the entire episode sequence, and ![$$G(\tau
    ) = \sum _{t=0}^{T-1} {\gamma }^t r_t$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq61.png)
    as defined earlier. This equation is important because it allows us to compute
    the value of a policy, which is a key concept in reinforcement learning.


    The objective function ![$$J(\boldsymbol {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq62.png)
    for the policy can then be written using the terms in Eq. ([9.6](#605748_1_En_9_Chapter.xhtml#Equ6)).
    Specifically, ![$$J(\boldsymbol {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq63.png)
    represents the expected return of the policy ![$$\pi _{\boldsymbol {\theta }}$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq64.png)
    , which we want to maximize in order to find the best policy. To compute the gradients
    with respect to ![$$\boldsymbol {\theta }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq65.png)
    , we use the likelihood ratio trick, which is a well-known result in probability
    theory that is often used in reinforcement learning. Specifically, we have


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    &amp; = \nabla_{\boldsymbol{\theta}} \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \right]\notag \\ &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \nabla_{\boldsymbol{\theta}} G(\tau) \right]\notag \\ &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \frac{P(\tau; \boldsymbol{\theta})}{P(\tau; \boldsymbol{\theta})} \nabla_{\boldsymbol{\theta}}
    G(\tau) \right]\notag \\ &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \frac{\nabla_{\boldsymbol{\theta}}P(\tau; \boldsymbol{\theta})}{P(\tau;
    \boldsymbol{\theta})} \right] \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ7.png)


    (Likelihood ratio)


    ![$$\displaystyle \begin{aligned} &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \nabla_{\boldsymbol{\theta}} \log P(\tau; \boldsymbol{\theta}) \right]
    {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ8.png)


    (9.7)


    Equation ([9.7](#605748_1_En_9_Chapter.xhtml#Equ8)) shows that to compute the
    gradients with respect to ![$$\boldsymbol {\theta }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq66.png)
    , we just need to find the derivatives for ![$$\log P(\tau ; \boldsymbol {\theta
    })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq67.png) . However,
    it’s important to note that the probability of starting in a particular state
    ![$$s_0$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq68.png) is
    often unknown and must be estimated from data. This is why we use ![$$\mu (s_0)$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq69.png)
    to represent the probability distribution for the initial state ![$$s_0$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq70.png)
    .


    We can then expand ![$$P(\tau ; \boldsymbol {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq71.png)
    as follows:


    ![$$\displaystyle \begin{aligned} P(\tau; \boldsymbol{\theta}) = \mu(s_0) \cdot
    \prod_{t=0}^{T-1} \pi (a_t|s_t; \boldsymbol{\theta}) \cdot \prod_{t=0}^{T-1} P(s_{t+1}|s_t,
    a_t) {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ9.png)


