    # 7.1 神经网络


    神经网络是一种机器学习模型，其灵感来源于人脑中生物神经元的结构与功能。它由多层相互连接的节点（即人工神经元）构成，这些节点通过一系列数学运算来处理信息。


    神经网络的基本构建模块是人工神经元（或称节点）。每个节点接收一个或多个输入，对这些输入执行简单计算，并产生一个输出。每个节点的输出随后作为输入传递给下一层节点。


    用数学术语来说，神经网络是一种由一系列线性和非线性函数构成的数学结构。在抽象层面上，我们可以将其表示为一系列（参数化的）线性函数与（可微的）非线性函数的链式组合。例如，我们可以将简单神经网络表示为公式(7.1)所示，其中`f1`和`f2`是各自带有参数或权重的线性函数，而`σ1`和`σ2`则是可微的非线性函数。第一个线性函数`f1(x)`的输出成为第一个非线性函数`σ1`的输入，`σ1`的输出随后被送入第二个线性函数`f2`，以此类推。


    ```

    H(x) = σ2( f2( σ1( f1(x) ) ) )

    ```


    (7.1)


    更精确地说，我们可以将线性函数`f`表示为输入数据`x`及其权重`W`的函数，如公式(7.2)所示。其中，`W`是一个维度为`m` x `n`的权重矩阵，`b`是一个包含`m`个分量的偏置向量。线性函数的输出是一个包含`m`个标量分量的向量。在对此输出向量应用非线性函数`σ`后，我们将其送入下一个线性函数，以此类推。


    ```

    f(x) = x^T W + b

    ```


    (7.2)


    在强化学习领域，神经网络是近似价值函数甚至策略的强大工具，我们将在本书第三部分详细讨论。通过利用经验数据训练神经网络的权重，我们可以学会从已观测的状态和动作泛化到未观测的情况。将神经网络抽象表示为一系列线性和非线性函数，为近似那些关联状态、动作与价值的复杂函数提供了灵活的框架。


    ## 前馈神经网络


    前馈神经网络，也称为多层感知机（MLP），是一种信息单向流动的神经网络：从输入层开始，经过一个或多个隐藏层，最终到达输出层。在前馈神经网络中，一层的输出作为下一层的输入，层与层之间不存在循环。


    前馈神经网络的典型架构包括一个输入层、一个或多个隐藏层以及一个输出层。输入层接收原始输入数据，数据随后经过隐藏层进行信息变换与处理，最后交由输出层处理。网络中的每一层都由一组神经元组成，这些神经元与相邻层的神经元相连接。每一层中的神经元会计算来自上一层输入的加权和，对结果应用激活函数，并将结果输出到下一层。

    '
- fmt: '### Fully Connected Neural Networks


    A fully connected neural network, also known as a dense neural network, is a type
    of neural network in which each neuron in one layer is connected to every neuron
    in the next layer. This means that all the neurons in each layer are connected
    to all the neurons in the adjacent layer. A fully connected neural network can
    have any number of layers, but typically has one or more hidden layers between
    the input and output layers.


    In practice, a fully connected neural network is often a specific implementation
    of a feedforward neural network, where each layer is fully connected to the adjacent
    layers. The terms feedforward neural network and fully connected neural network
    are often used interchangeably. However, the term feedforward neural network is
    often used more generally to refer to any neural network in which the information
    flows in one direction, regardless of the type of connections between the layers.


    Let’s illustrate the idea of fully connected neural networks graphically, as shown
    in Fig. [7.1](#605748_1_En_7_Chapter.xhtml#Fig1). Each layer in this example network
    is a combination of a linear transformation and a pointwise nonlinear activation
    function. The number of computation units in each layer can vary, as illustrated
    in Fig. [7.1](#605748_1_En_7_Chapter.xhtml#Fig1). The input layer is an abstraction
    layer that transforms the raw input data into a format that can be processed by
    the subsequent layers. It has the same number of units as the dimension of the
    input data, and no weights or activation functions are associated with its units.
    The output layer has the same number of units as the desired output, and its computation
    units are responsible for producing the final output of the network.


    The layers between the input and output layers are called hidden layers. In this
    example, two hidden layers are shown, but in practice neural networks can have
    a large number of hidden layers, leading to what are called deep neural networks.
    The term deep learning often refers to the use of deep neural networks to solve
    specific task, such as classification or prediction. The idea behind hidden layers
    is to allow the network to learn complex representations of the input data by
    gradually combining simpler features learned by the previous layers. Each hidden
    layer consists of a set of computation units that apply a nonlinear transformation
    to the output of the previous layer, followed by a linear transformation to produce
    the input to the next layer. The nonlinear transformation is usually a pointwise
    function such as the `sigmoid`, `ReLU`, or `tanh` function, which introduces nonlinearity
    and enables the network to model more complex input-output relationships.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig2_HTML.png)


    A diagram illustrates single neuron labeled X 1 to X n inputs W 1 to W n. A circle
    labeled z j = summation i = 1 to n, x i w i + b and sigma of z j.


    Fig. 7.2 Example of how a single neuron works


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig1_HTML.png)


    A flow diagram illustrates X 1 to X 4 input layer, first hidden layer, second
    hidden layer and output layer.


    Fig. 7.1 Example of a simple fully connected neural network with two hidden layers,
    each consisting of six units, and an output layer, consisting of a single unit


    We can see in Fig. [7.1](#605748_1_En_7_Chapter.xhtml#Fig1) that each unit in
    the previous layer is connected to all the units in the successor layer (except
    the input layer). This type of architecture is called a fully connected layer,
    and if a neural network only consists of fully connected layers, we call it a
    fully connected network. Each layer (except the input layer, which has no activation
    function) can have its own differentiable nonlinear function `σ`, which is often
    referred to as an activation function.


    Each unit (or neuron) in a fully connected layer has its own set of parameters
    (except units in the input layer). Figure [7.2](#605748_1_En_7_Chapter.xhtml#Fig2)
    shows the computation of the `j`-th neuron in a fully connected layer. The neuron
    takes in a vector `x` as input data, where `x` can be the output from the previous
    layer or the input data if this neuron is in the first hidden layer. It first
    computes the inner product between the input vector `x` and the weight vector
    `w` (which represents the strength of the connections between the neurons), denoted
    as `z_j = x^T w`. The neuron then adds a scalar parameter `b`, known as the bias,
    to the results `z_j`. The bias is an additional parameter that can shift the results
    `z_j`. After that, the neuron applies an activation function `σ` to `z_j`, and
    the output of the activation function is passed as input to the next layer (or
    the output layer if the neuron is in the last layer).


    It’s worth noting that the weight vector `w` is learned through the training process.
    During training, the neural network adjusts the values of `w` and `b` so that
    the network can better approximate the desired output.


    Activation functions play a critical role in neural networks by adding nonlinearity
    to the system. Without them, a neural network would be reduced to a linear function
    with many parameters, which would be unable to capture complex relationships between
    inputs and outputs.


    The idea behind deep neural networks is that by applying a series of nonlinear
    transformations, we can extract a rich set of features from the input data. These
    features often have a hidden hierarchy, where lower-level features are combined
    to form higher-level ones. Activation functions help to create this hierarchy
    by enabling each layer to extract different features from the input data.


    Some of the most common activation functions include `ReLU` (rectified linear
    unit), `sigmoid`, and `tanh` as shown in Fig. [7.3](#605748_1_En_7_Chapter.xhtml#Fig3).
    `ReLU` is probably the most popular activation function due to its simplicity
    and effectiveness, but other functions such as `LeakyReLU` and `ELU` are also
    worth considering. The choice of activation function can have a significant impact
    on the performance of a neural network, and it is often a matter of trial and
    error to determine the best one for a particular task.


    For example, `ReLU` is known to work well for most applications, but it can cause
    the “dying ReLU” problem, where some neurons get stuck in a state of zero activation
    and stop learning. `LeakyReLU` and its variants can help to mitigate this problem
    by allowing a small, nonzero gradient for negative inputs. `Sigmoid` and `tanh`
    functions are also useful for specific applications, such as binary classification
    or image generation.


    In summary, choosing the right activation function is an important step in designing
    a neural network. It requires understanding the strengths and weaknesses of different
    functions and experimenting with different combinations to find the one that works
    best for a particular task.'
  raw: '### Fully Connected Neural Networks


    A fully connected neural network, also known as a dense neural network, is a type
    of neural network in which each neuron in one layer is connected to every neuron
    in the next layer. This means that all the neurons in each layer are connected
    to all the neurons in the adjacent layer. A fully connected neural network can
    have any number of layers, but typically has one or more hidden layers between
    the input and output layers.


    In practice, a fully connected neural network is often a specific implementation
    of a feedforward neural network, where each layer is fully connected to the adjacent
    layers. The terms feedforward neural network and fully connected neural network
    are often used interchangeably. However, the term feedforward neural network is
    often used more generally to refer to any neural network in which the information
    flows in one direction, regardless of the type of connections between the layers.


    Let’s illustrate the idea of fully connected neural networks graphically, as shown
    in Fig. [7.1](#605748_1_En_7_Chapter.xhtml#Fig1). Each layer in this example network
    is a combination of a linear transformation and a pointwise nonlinear activation
    function. The number of computation units in each layer can vary, as illustrated
    in Fig. [7.1](#605748_1_En_7_Chapter.xhtml#Fig1). The input layer is an abstraction
    layer that transforms the raw input data into a format that can be processed by
    the subsequent layers. It has the same number of units as the dimension of the
    input data, and no weights or activation functions are associated with its units.
    The output layer has the same number of units as the desired output, and its computation
    units are responsible for producing the final output of the network.


    The layers between the input and output layers are called hidden layers. In this
    example, two hidden layers are shown, but in practice neural networks can have
    a large number of hidden layers, leading to what are called deep neural networks.
    The term deep learning often refers to the use of deep neural networks to solve
    specific task, such as classification or prediction. The idea behind hidden layers
    is to allow the network to learn complex representations of the input data by
    gradually combining simpler features learned by the previous layers. Each hidden
    layer consists of a set of computation units that apply a nonlinear transformation
    to the output of the previous layer, followed by a linear transformation to produce
    the input to the next layer. The nonlinear transformation is usually a pointwise
    function such as the sigmoid, ReLU, or tanh function, which introduces nonlinearity
    and enables the network to model more complex input-output relationships.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig2_HTML.png)


    A diagram illustrates single neuron labeled X 1 to X n inputs W 1 to W n. A circle
    labeled z j = summation i = 1 to n, x i w i + b and sigma of z j.


    Fig. 7.2


    Example of how a single neuron works


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig1_HTML.png)


    A flow diagram illustrates X 1 to X 4 input layer, first hidden layer, second
    hidden layer and output layer.


    Fig. 7.1


    Example of a simple fully connected neural network with two hidden layers, each
    consisting of six units, and an output layer, consisting of a single unit


    We can see in Fig. [7.1](#605748_1_En_7_Chapter.xhtml#Fig1) that each unit in
    the previous layer is connected to all the units in the successor layer (except
    the input layer). This type of architecture is called a *fully connected layer*,
    and if a neural network only consists of fully connected layers, we call it a
    fully connected network. Each layer (except the input layer, which has no activation
    function) can have its own differentiable nonlinear function ![$$\sigma $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq14.png)
    , which is often referred to as an activation function.


    Each unit (or neuron) in a fully connected layer has its own set of parameters
    (except units in the input layer). Figure [7.2](#605748_1_En_7_Chapter.xhtml#Fig2)
    shows the computation of the ![$$j\mbox{th}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq15.png)
    neuron in a fully connected layer. The neuron takes in a vector ![$$\boldsymbol
    {x}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq16.png) as input
    data, where ![$$\boldsymbol {x}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq17.png)
    can be the output from the previous layer or the input data if this neuron is
    in the first hidden layer. It first computes the inner product between the input
    vector ![$$\boldsymbol {x}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq18.png)
    and the weight vector ![$$\boldsymbol {w}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq19.png)
    (which represents the strength of the connections between the neurons), denoted
    as ![$$z_j=\boldsymbol {x}^T \boldsymbol {w}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq20.png)
    . The neuron then adds a scalar parameter *b*, known as the bias, to the results
    ![$$z_j$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq21.png) .
    The bias is an additional parameter that can shift the results ![$$z_j$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq22.png)
    . After that, the neuron applies an activation function ![$$\sigma $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq23.png)
    to ![$$z_j$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq24.png)
    , and the output of the activation function is passed as input to the next layer
    (or the output layer if the neuron is in the last layer).


    It’s worth noting that the weight vector ![$$\boldsymbol {w}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq25.png)
    is learned through the training process. During training, the neural network adjusts
    the values of ![$$\boldsymbol {w}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq26.png)
    and *b* so that the network can better approximate the desired output.


    Activation functions play a critical role in neural networks by adding nonlinearity
    to the system. Without them, a neural network would be reduced to a linear function
    with many parameters, which would be unable to capture complex relationships between
    inputs and outputs.


    The idea behind deep neural networks is that by applying a series of nonlinear
    transformations, we can extract a rich set of features from the input data. These
    features often have a hidden hierarchy, where lower-level features are combined
    to form higher-level ones. Activation functions help to create this hierarchy
    by enabling each layer to extract different features from the input data.


    Some of the most common activation functions include ReLU (rectified linear unit),
    sigmoid, and tanh as shown in Fig. [7.3](#605748_1_En_7_Chapter.xhtml#Fig3). ReLU
    is probably the most popular activation function due to its simplicity and effectiveness,
    but other functions such as LeakyReLU and ELU are also worth considering. The
    choice of activation function can have a significant impact on the performance
    of a neural network, and it is often a matter of trial and error to determine
    the best one for a particular task.


    For example, ReLU is known to work well for most applications, but it can cause
    the “dying ReLU” problem, where some neurons get stuck in a state of zero activation
    and stop learning. LeakyReLU and its variants can help to mitigate this problem
    by allowing a small, nonzero gradient for negative inputs. Sigmoid and tanh functions
    are also useful for specific applications, such as binary classification or image
    generation.


    In summary, choosing the right activation function is an important step in designing
    a neural network. It requires understanding the strengths and weaknesses of different
    functions and experimenting with different combinations to find the one that works
    best for a particular task.'
  trans: '

    ### 全连接神经网络


    全连接神经网络，也称为密集神经网络，是一种神经网络类型，其中一层的每个神经元都与下一层的每个神经元相连。这意味着每一层中的所有神经元都与相邻层中的所有神经元相连。全连接神经网络可以有任意数量的层，但通常在输入层和输出层之间有一个或多个隐藏层。


    在实践中，全连接神经网络通常是前馈神经网络的一种特定实现，其中每一层都与相邻层全连接。术语“前馈神经网络”和“全连接神经网络”经常互换使用。然而，“前馈神经网络”这个术语通常更广泛地用于指代任何信息单向流动的神经网络，无论层之间的连接类型如何。


    让我们用图形方式说明全连接神经网络的概念，如图 7.1 所示。此示例网络中的每一层都是线性变换和逐点非线性激活函数的组合。每层中的计算单元数量可以不同，如图
    7.1 所示。输入层是一个抽象层，它将原始输入数据转换为后续层可以处理的格式。其单元数量与输入数据的维度相同，并且其单元没有关联的权重或激活函数。输出层的单元数量与期望输出相同，其计算单元负责生成网络的最终输出。


    输入层和输出层之间的层称为隐藏层。在此示例中，显示了两个隐藏层，但在实践中，神经网络可以有大量的隐藏层，从而形成所谓的深度神经网络。术语“深度学习”通常指使用深度神经网络来解决特定任务，例如分类或预测。隐藏层背后的思想是，通过逐步组合前一层学习到的更简单特征，使网络能够学习输入数据的复杂表示。每个隐藏层由一组计算单元组成，这些计算单元对前一层的输出应用非线性变换，然后进行线性变换以生成下一层的输入。非线性变换通常是一个逐点函数，例如
    `sigmoid`、`ReLU` 或 `tanh` 函数，它引入非线性，使网络能够建模更复杂的输入-输出关系。


    ![](img/605748_1_En_7_Fig2_HTML.png)


    一个图示说明了单个神经元，标记为 X 1 到 X n 的输入，W 1 到 W n。一个圆圈标记为 z j = 求和 i = 1 到 n，x i w i +
    b 以及 sigma of z j。


    图 7.2 单个神经元工作方式示例


    ![](img/605748_1_En_7_Fig1_HTML.png)


    一个流程图说明了 X 1 到 X 4 输入层、第一隐藏层、第二隐藏层和输出层。


    图 7.1 一个简单的全连接神经网络示例，包含两个隐藏层（每层由六个单元组成）和一个输出层（由一个单元组成）


    我们可以在图 7.1 中看到，前一层中的每个单元都与后一层中的所有单元相连（输入层除外）。这种类型的架构称为全连接层，如果一个神经网络仅由全连接层组成，我们称之为全连接网络。每一层（没有激活函数的输入层除外）都可以有自己的可微非线性函数
    `σ`，该函数通常被称为激活函数。


    全连接层中的每个单元（或神经元）都有自己的参数集（输入层中的单元除外）。图 7.2 展示了全连接层中第 `j` 个神经元的计算过程。该神经元接收一个向量 `x`
    作为输入数据，其中 `x` 可以是前一层的输出，或者如果该神经元位于第一个隐藏层，则 `x` 是输入数据。它首先计算输入向量 `x` 与权重向量 `w`（表示神经元之间连接的强度）的内积，记为
    `z_j = x^T w`。然后，神经元向结果 `z_j` 添加一个标量参数 `b`，称为偏置。偏置是一个额外的参数，可以偏移结果 `z_j`。之后，神经元对
    `z_j` 应用激活函数 `σ`，激活函数的输出作为输入传递到下一层（如果该神经元位于最后一层，则传递到输出层）。


    值得注意的是，权重向量 `w` 是通过训练过程学习得到的。在训练期间，神经网络会调整 `w` 和 `b` 的值，以便网络能够更好地逼近期望的输出。


    激活函数通过向系统添加非线性，在神经网络中发挥着关键作用。没有它们，神经网络将退化为一个具有许多参数的线性函数，无法捕捉输入和输出之间的复杂关系。


    深度神经网络背后的思想是，通过应用一系列非线性变换，我们可以从输入数据中提取丰富的特征集。这些特征通常具有隐藏的层次结构，其中较低级别的特征被组合成较高级别的特征。激活函数通过使每一层能够从输入数据中提取不同的特征，有助于创建这种层次结构。


    一些最常见的激活函数包括 `ReLU`（修正线性单元）、`sigmoid` 和 `tanh`，如图 7.3 所示。`ReLU` 可能是最流行的激活函数，因为它简单有效，但其他函数如
    `LeakyReLU` 和 `ELU` 也值得考虑。激活函数的选择会对神经网络的性能产生重大影响，并且通常需要通过反复试验来确定最适合特定任务的函数。


    例如，`ReLU` 已知在大多数应用中表现良好，但它可能导致“死亡 ReLU”问题，即某些神经元陷入零激活状态并停止学习。`LeakyReLU` 及其变体通过允许负输入有一个小的非零梯度，有助于缓解这个问题。`Sigmoid`
    和 `tanh` 函数对于特定应用（如二分类或图像生成）也很有用。


    总之，选择合适的激活函数是设计神经网络的重要一步。它需要理解不同函数的优缺点，并尝试不同的组合，以找到最适合特定任务的函数。

    '
- fmt: '# Convolutional Neural Networks


    A convolutional neural network (CNN) is a type of neural network that is specifically
    designed for processing and analyzing data with a grid-like structure, such as
    images or videos. CNNs are inspired by the organization and function of the visual
    cortex in animals, which has specialized neurons that respond to specific features
    in the visual field.


    In a CNN, the input data is typically an image, which is represented as a grid
    of pixels. The network consists of multiple layers, with each layer performing
    a different type of processing on the input data. The first layer is typically
    a convolutional layer, which applies a set of filters to the input image, each
    filter looking for a specific pattern or feature in the image. These filters move
    across the image, computing a dot product between the filter and the image, producing
    a feature map.


    The output of the first layer is then passed to the next layer, which may be another
    convolutional layer, a pooling layer, or a fully connected layer. The pooling
    layer downsamples the output of the previous layer by computing the maximum or
    average value of adjacent regions of the feature map. The fully connected layer
    takes the flattened output of the previous layer and applies a set of weights
    to it, producing a prediction or classification of the input image.


    Fully connected neural networks are effective for processing numerical data, but
    they are not well suited for image data, which typically has three dimensions:
    width, height, and color channels. When using fully connected neural networks,
    we would need to flatten the image pixels to create a vector; flattening the image
    pixels into a vector causes us to lose a region of interest and the correlations
    between pixels, making it difficult to recognize objects, as shown in Fig. [7.4](#605748_1_En_7_Chapter.xhtml#Fig4).
    Additionally, the number of parameters in a fully connected neural network can
    become very large when processing images.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig3_HTML.png)


    4 line graphs depict the activation functions Sigmoid, Tanh, ReLU, and Leaky ReLU
    over a range of input values, depicting their characteristic behavior and output
    ranges. Given `y = 1 / (1 + e^(-x))`, `y = tanh(x)`, `y = max(0, x)`, and `y =
    a * x` where `x < 0` and `x > 0`.


    Fig. 7.3


    Different activation functions. Top left is an example of a sigmoid activation
    function; top right is an example of a Tanh activation function; bottom left is
    an example of a ReLU activation function; and bottom right is an example of a
    Leaky ReLU activation function.


    There are two main issues with this approach. First, objects in an image often
    span multiple pixels, and each pixel is correlated with its surroundings. Flattening
    the image into a vector would make it more difficult to recognize objects; imagine
    we are training a reinforcement learning agent to do autonomous driving, the failure
    to successfully recognize pedestrians could mean fatal error and tragedy. Second,
    the number of parameters in a fully connected neural network can become very large
    when processing images. For example, a medium-sized image with dimensions of `600
    × 400 × 3` results in a vector with `7.2 × 10^5` elements. When fed into a fully
    connected neural network, the input data for the first hidden layer has `7.2 ×
    10^5` dimensions. If we only have 10 hidden units in the first layer, the network
    still requires `7.2 × 10^6` parameters for that layer alone. This number grows
    even larger when we have more hidden layers or units, making it difficult to scale
    up to larger images.


    To address these challenges, we often use convolutional neural networks (CNNs)
    to process images. A convolution operation is a mathematical process that involves
    applying a filter (or kernel) to an input image or feature map to extract relevant
    features. In deep learning, convolution is used in convolutional neural networks
    (CNNs) to analyze visual imagery, and it is a key component in many state-of-the-art
    computer vision models.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig4_HTML.png)


    A flow illustration portrays a 6 × 5 × 1 grid of square boxes. Among the 35 total
    boxes, four are shaded and then transformed into linear boxes. Specifically, the
    8th, 14th, 15th, and 20th boxes are shaded accordingly.


    Fig. 7.4


    Example of flattening a grayscale image to a vector.


    Convolution works by taking a small matrix of values (called filter or kernel)
    and sliding it across the input image or feature map, computing the dot product
    between the filter and the local patch of the image or feature map at each position.
    The result of this operation is a new matrix called the output feature map, which
    captures the most important features of the input.


    The use of convolution in deep learning has many advantages, including the ability
    to capture spatial dependencies in visual data, reduce the number of parameters
    required for a model, and enable the reuse of learned features across different
    parts of an image. These properties make convolution an effective tool for analyzing
    visual data and have led to its widespread use in a variety of computer vision
    applications.


    CNNs consist of one or more convolutional layers, which take the image data directly
    without flattening it. This preserves the region of interest and pixel correlations
    in the original image. Additionally, convolutional layers have a fixed number
    of parameters that is independent of the input image size, which makes it easy
    to scale up to larger images.


    At the core of a convolutional layer is a filter that performs convolution on
    the input data. A convolutional layer usually consists of several filters, each
    with its own set of parameters: weights `W` and bias `b`. The weights `W` is a
    matrix with dimensions of kernel size × input channels. The kernel size is a configurable
    variable that determines the size of the working area, or receptive field, when
    the filter is convolving the image. The filter moves across the image with a configurable
    variable called stride (default 1) to perform the convolution operation. The stride
    controls how far the filter moves for each convolution operation, such as moving
    one pixel at a time, until it reaches the right edge of the image.


    Figure [7.5](#605748_1_En_7_Chapter.xhtml#Fig5) illustrates the operation of a
    single filter in a convolutional layer of a convolutional neural network. The
    input data on the left has one channel (e.g., a grayscale image), and the single
    filter in the middle has a `3 × 3` kernel size. The weight matrix `W` for this
    filter has the dimensions of `3 × 3 × 1`, since the input data has only one channel.'
