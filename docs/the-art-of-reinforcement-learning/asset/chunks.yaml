- fmt: '### Montezuma’s Revenge


    The Atari video game `Montezuma’s Revenge` is considered to be both a hard-to-explore
    problem and a sparse reward problem.


    In this game, the player must navigate a labyrinthine temple to collect treasures
    and defeat enemies^([^(12)](#fn12)). The ultimate goal of the game is to reach
    the treasure chamber and collect the coveted “Treasure of Montezuma.”


    The game’s high level of difficulty is due to numerous obstacles, enemies, and
    traps, such as spike pits and disappearing floors, that must be avoided or defeated.
    Additionally, the game’s large state space (e.g., the game has multiple rooms
    and each room has different layout) requires the player to execute specific actions
    in the correct order to access various areas or rooms, making it a hard-to-explore
    problem.


    Furthermore, the game only rewards the player for discovering secret rooms and
    hidden treasures, which makes it a sparse reward problem. For instance, in the
    first room, the player must first collect the key to unlock the next room and
    receive a reward.


    Overall, `Montezuma’s Revenge` poses a challenging problem for reinforcement learning
    agents due to its complex environment and sparse rewards. It requires the agent
    to be curious, explore the environment thoroughly, and plan long-term strategies
    to successfully complete the game.


    ## 13.2 Curiosity-Driven Exploration


    Curiosity-driven exploration is a powerful technique used in reinforcement learning
    to encourage exploration and learning in complex or sparse reward problems. The
    idea was first proposed by Pathak et al. [[1](#605748_1_En_13_Chapter.xhtml#CR1)].
    In traditional RL methods, agents are motivated to take actions that result in
    a maximum reward provided by the environment. However, this can lead to short-sighted
    behavior and a lack of exploration, which can cause the agent to miss out on valuable
    information.


    Curiosity-driven exploration takes a different approach by encouraging agents
    to explore the environment based on intrinsic motivation rather than extrinsic
    rewards. The idea is to promote intrinsic motivation by adding a curiosity bonus
    to the reward signal. This bonus is calculated based on how much the agent’s prediction
    of the outcome of an action differs from the actual outcome. As a result, the
    agent is incentivized to explore actions that lead to new and surprising experiences,
    even if they do not result in immediate rewards from the environment.


    This approach differs from traditional extrinsic rewards, which are provided by
    the environment and are directly tied to achieving specific goals or desirable
    actions. Intrinsic rewards, on the other hand, are generated internally by the
    agent and incentivize exploration and discovery of new things in the environment.


    For example, consider a robot trained to navigate a room to find a target object
    in the shortest time. Traditional RL algorithms would encourage the robot to take
    the shortest path to the target, even if there are other paths that may have useful
    information. However, with curiosity-driven exploration, the robot is also motivated
    to explore different paths and learn more about the environment to maximize its
    curiosity bonus.


    Intrinsic reward is given to the agent for exploring and discovering new things
    in the environment, rather than for achieving a specific goal or performing a
    desirable action. This reward is generated internally by the agent itself and
    incentivizes the agent to try out new behaviors or visit new states that it has
    not seen before.


    Previous research has shown the effectiveness of curiosity-driven exploration
    in various RL tasks, such as playing Atari games, navigating mazes, and solving
    the Rubik’s Cube. OpenAI even trained a humanoid robot to learn a diverse set
    of skills through curiosity-driven exploration, solely by exploring its environment
    and seeking novelty.


    In this chapter, we’ll focus on one innovative and widely adapted solution called
    “Exploration by Random Network Distillation” by Burda et al. [[2](#605748_1_En_13_Chapter.xhtml#CR2)],
    which uses a random network to generate the curiosity bonus. This approach can
    lead to more efficient computation and effective learning in complex tasks, making
    curiosity-driven exploration a promising technique in RL.'
