  trans: '

    # N 步自举法


    N 步自举法将`TD(0)`与蒙特卡洛方法混合在一起（适用于情节式任务）。当`N=1`时，我们得到标准的`TD(0)`，例如`SARSA`。如果`N=T`，其中`T`是情节的长度，我们就得到蒙特卡洛方法。这种方法有时被称为“多步前瞻”，因为智能体利用未来多个时间步的信息来计算价值估计（图
    5.9）。


    `N`的选择是在偏差与方差之间进行权衡。如果`N`较小，估计值偏差更大，因为它依赖的未来奖励样本更少，但更新更频繁，这可以降低方差。如果`N`较大，估计值偏差更小，因为它使用了更多样本，但更新频率较低，且可能具有更高的方差。


    对于情节式强化学习问题中接近终止时间步`T`的状态，例如`S_{T-3}`、`S_{T-2}`、`S_{T-1}`，该如何处理？为了计算这些时间步的 N 步回报，我们只需忽略缺失的时间步。有时，我们也可以在情节序列末尾添加抽象序列（奖励值和状态值均为
    0），这样会得到与直接忽略缺失时间步相同的结果（图 5.10）。


    ```

    一个流程图。流程通过 A_{T-2}、A_{T-1}和 0 链接，线性地经过 S_{T-2}、S_{T-1}、S_T、0、0 和 0 节点。每个节点通过 R_{T-2}、R_{T-1}和
    0 链接指向其后继节点。下方是 V_π(S_T)、V_π(S_{T-1})和 V_π(S_{T-2})的公式。

    ```


    **图 5.10** N 步自举法如何处理情节序列的末尾，其中`n=3`


    ```

    N 步回报思想的示意图，其中 n 等于 3。一个线性节点图通过 A_1、A_1、A_2、A_3 和 A_4 变量，流经 S_0、S_1、S_2、S_3、S_4
    和 S_5 节点。每个节点通过 R 变量指向其后继节点。下方是 V(S_2)、V(S_1)和 V(S_0)的公式。

    ```


    **图 5.9** N 步回报的思想，其中`n=3`


    N 步自举法是一种强大的技术，可应用于多种场景。以下是两个实际应用示例：


    - 在游戏环境中，智能体通常需要基于随时间发生的一系列事件做出决策。例如，在第一人称射击游戏中，智能体可以使用 N 步自举法，通过考虑未来 N 个时间步将获得的奖励来估计给定状态的价值。这有助于智能体在游戏中做出更准确的行动决策。


    - 在机器人控制中，智能体必须基于传感器和其他环境因素的反馈做出决策。例如，控制机械臂的智能体可以使用 N 步自举法，通过考虑未来 N 个时间步将获得的奖励来估计给定状态的价值。这有助于智能体更准确地决定如何移动机械臂以实现期望的结果。


    要应用 N 步自举法，需要遵循几个具体步骤。首先，我们必须为当前问题选择一个合适的`N`值。这取决于时间跨度长度和环境变化速率等因素。接下来，智能体使用 N
    步自举法，基于未来 N 个时间步将获得的奖励来估计每个状态的价值。这有助于智能体通过考虑每个行动的长期后果来做出更准确的决策。


    然而，正如迪米特里·P·伯特塞卡斯教授[5]的研究所述，N 步自举法存在一些潜在问题。例如，在某些情况下，算法配置不当可能导致次优行为。为了说明这一点，请考虑以下玩具示例
    MDP（见图 5.11）。在这个情节式任务中，新情节总是从最左侧节点（起点）开始，并在最右侧节点（终点）结束。除了初始起始状态外，智能体在所有状态下只能选择一个使其持续前进的动作；而在起始状态，有两个动作可将智能体引向上方或下方路径。每个状态-动作对关联的奖励信号由节点之间的边标出。最优路径是下方路径，因为接近终止状态时有一个高奖励信号（`r=10`）。


    ```

    一个关于 N 步自举法陷阱的流程图，其中 n=3 设置错误。上方流程如下：起点，R=0，r=1，r=2，r=1，终点。下方流程如下：起点，R=0，r=2，r=0，r=10，终点。

    ```


    **图 5.11** N 步自举法的陷阱，当`n=3`设置错误时，算法可能最初选择次优路径（上方路径）而非最优路径（下方路径）


    然而，在配置错误的情况下，例如`N=3`，算法最初会选择上方路径，尤其是在价值估计不准确时。为避免此类问题，建议尽可能使用最大的`N`值，尽管这可能受到计算资源的限制。

    '
- fmt: '### N-Step SARSA


    It’s fairly easy to extend the N-step bootstrapping method for state-action value
    function `Q_pi`. In this case, we update values based on state-action pairs, and
    for the last successor state `S_{t+n}`, we also need the action `A_{t+n}`:


    ```

    Q_pi(S_t, A_t) = Q_pi(S_t, A_t) + alpha * ( [R_t + gamma * R_{t+1} + ... + gamma^{n-1}
    * R_{t+n-1} + gamma^n * Q_pi(S_{t+n}, A_{t+n})] - Q_pi(S_t, A_t) )

    ```


    (5.24)


    Here, `alpha` is the step size parameter, `gamma` is the discount factor, and
    `t` is the current time step.


    We now introduce the N-step SARSA on-policy learning algorithm, which builds on
    the basic structure of SARSA. However, to compute returns for an arbitrary number
    of N-step, we need to make some changes. This means the values are not updated
    immediately when the agent makes a decision in the environment. Instead, it has
    to continue acting in the environment for `N` steps before it collects the required
    sample transitions for the N-step return.


    To store the necessary sample transitions, we choose to use a list `tau` that
    stores tuples of the form `(s, a, r, s'', a'')`, where `s` and `s''` are the current
    and next states, respectively; `a` and `a''` are the current and next actions,
    respectively; and `r` is the reward received for taking action `a` in state `s`.
    The maximum length of `tau` is `N`. We use `(s, a, r, s'', a'')` instead of `(s,
    a, r, s'')` because we also need the action `A_{t+n}` for the last successor state
    `S_{t+n}` to complete Eq. (5.24).


    The agent only updates the value for the first state-action pair in `tau` if the
    length of `tau` reaches the maximum length, or if it’s at the end of an episode,
    as is the case for episodic reinforcement learning problems. This is because the
    subsequent state-action pairs in `tau` are used to compute the N-step return for
    the first state-action pair, and the value update is only performed after the
    N-step return has been computed.


    **Algorithm 9: N-step on-policy SARSA with epsilon-greedy policy for exploration**


    A 7-line algorithm titled N-step on-policy SARSA with epsilon-greedy for exploration
    takes in the following inputs to give an optimal state-action value function `Q_pi`
    as the output: discount rate `gamma`, initial exploration rate `epsilon`, step
    size `alpha`, N step `n` where `N >= 1`, and number of steps `K`.


    We applied the N-step SARSA algorithm to our service dog Markov decision process
    (MDP) and obtained results that were averaged over 100 independent runs, each
    consisting of 1000 updates. The algorithm used a step size of `alpha = 0.01`,
    a discount rate of `gamma = 0.9`, and a decayed exploration rate `epsilon` that
    started at 1.0 and decreased to 0.01 over the course of 1000 updates. The results
    are shown in Table 5.4. Increasing the N-step value from 1 to 2 and 3 resulted
    in state values for *Room 1* and *Room 2* that were closer to the true state values
    computed using DP policy iteration (as shown in the last row of Table 5.4). However,
    the values for state *Room 3* and *Outside* did not improve significantly. This
    is because our service dog MDP is a very simple problem, and under the optimal
    policy, the length of an episode sequence is only 3. Therefore, using an N-step
    value greater than 3 does not improve the results.


    ### N-Step Q-Learning


    N-step Q-learning is a variant of the traditional Q-learning algorithm that updates
    the Q-values based on the returns observed over a sequence of N time steps. By
    incorporating a longer sequence of experiences, N-step Q-learning can lead to
    more efficient learning and better performance in some environments. For example,
    in environments where rewards are sparse or delayed, using a longer sequence of
    experiences can help the agent learn faster and make better decisions. Returns
    refer to the total discounted reward accumulated by the agent over time.


    **Table 5.4** Optimal state value for the service dog MDP after running the N-step
    SARSA algorithm for different `N`. Results were averaged over 100 independent
    runs; each run is only over 1000 updates. We use discount `gamma = 0.9`, step
    size `alpha = 0.01`, and decay `epsilon` from 1.0 to 0.01 over the course of 1000
    updates. The last row contains true `V_*` computed using DP policy iteration.


    | N-steps | Room 1 | Room 2 | Room 3 | Outside | Found item |

    | --- | --- | --- | --- | --- | --- |

    | 1 | 0.28 | 3.49 | 8.17 | 0.0 | 0 |

    | 2 | 2.07 | 6.26 | 8.58 | 0.16 | 0 |

    | 3 | 3.86 | 6.25 | 8.6 | 1.06 | 0 |

    | 4 | 3.8 | 6.45 | 8.59 | 0.94 | 0 |

    | 5 | 4.14 | 6.41 | 8.59 | 1.25 | 0 |

    | DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |


    However, N-step Q-learning is more complex than standard Q-learning and requires
    the use of importance sampling to adjust for differences between the behavior
    and target policies.'
