    ![$\displaystyle \begin{aligned} G(\tau) = \sum_{t=0}^{T-1} {\gamma}^t r_t \end{aligned}$](img/605748_1_En_9_Chapter_TeX_Equb.png)


    我们使用 `$P(\tau ; \boldsymbol {\theta })$` 来表示智能体在遵循策略 `$\pi _{\boldsymbol {\theta
    }}$` 时获得任意情节序列 `$\tau $` 的概率。具体来说，`$P(\tau ; \boldsymbol {\theta })$` 是序列中每个时间步
    *t* 下，在策略下选择动作的概率 `$\pi (a_t|s_t; \boldsymbol {\theta })$` 与状态转移概率 `$P(s_{t+1}|s_t,
    a_t)$` 的乘积。该序列的概率是通过将所有时间步的这些概率相乘，并乘以特定初始状态 `$s_0$` 的起始概率（我们将其表示为 `$\mu (s_0)$`）得到的。因此，我们可以利用
    `$P(\tau ; \boldsymbol {\theta })$` 和整个情节序列的折扣奖励总和 `$G(\tau )$`，将策略 `$\pi _{\boldsymbol
    {\theta }}$` 的价值方程重写为公式 (9.6) 所示：


    ![$\displaystyle \begin{aligned} V_{\pi_{\boldsymbol{\theta}}} = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \right] = \sum_{\tau} P(\tau; \boldsymbol{\theta}) G(\tau) {} \end{aligned}
    $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ6.png)


    (9.6)


    这里，`$G(\tau )$` 是整个情节序列的折扣奖励总和，如前所述，`$G(\tau ) = \sum _{t=0}^{T-1} {\gamma }^t
    r_t$`。这个公式很重要，因为它使我们能够计算策略的价值，这是强化学习中的一个关键概念。


    然后，策略的目标函数 `$J(\boldsymbol {\theta })$` 可以使用公式 (9.6) 中的项来写出。具体来说，`$J(\boldsymbol
    {\theta })$` 表示策略 `$\pi _{\boldsymbol {\theta }}$` 的期望回报，我们希望通过最大化它来找到最佳策略。为了计算关于
    `$\boldsymbol {\theta }$` 的梯度，我们使用了似然比技巧，这是概率论中一个著名的结果，在强化学习中经常被使用。具体来说，我们有


    ![$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    &amp; = \nabla_{\boldsymbol{\theta}} \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \right]\notag \\ &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \nabla_{\boldsymbol{\theta}} G(\tau) \right]\notag \\ &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \frac{P(\tau; \boldsymbol{\theta})}{P(\tau; \boldsymbol{\theta})} \nabla_{\boldsymbol{\theta}}
    G(\tau) \right]\notag \\ &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \frac{\nabla_{\boldsymbol{\theta}}P(\tau; \boldsymbol{\theta})}{P(\tau;
    \boldsymbol{\theta})} \right] \end{aligned} $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ7.png)


    (似然比)


    ![$\displaystyle \begin{aligned} &amp; =\mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \nabla_{\boldsymbol{\theta}} \log P(\tau; \boldsymbol{\theta}) \right]
    {} \end{aligned} $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ8.png)


    (9.7)


    公式 (9.7) 表明，要计算关于 `$\boldsymbol {\theta }$` 的梯度，我们只需要找到 `$\log P(\tau ; \boldsymbol
    {\theta })$` 的导数。然而，需要注意的是，从特定状态 `$s_0$` 开始的概率通常是未知的，必须从数据中估计。这就是为什么我们使用 `$\mu
    (s_0)$` 来表示初始状态 `$s_0$` 的概率分布。


    然后，我们可以将 `$P(\tau ; \boldsymbol {\theta })$` 展开如下：


    ![$\displaystyle \begin{aligned} P(\tau; \boldsymbol{\theta}) = \mu(s_0) \cdot
    \prod_{t=0}^{T-1} \pi (a_t|s_t; \boldsymbol{\theta}) \cdot \prod_{t=0}^{T-1} P(s_{t+1}|s_t,
    a_t) {} \end{aligned} $](img/605748_1_En_9_Chapter_TeX_Equ9.png)


    (9.8)


    在无模型强化学习中，智能体无法获取初始状态的分布 `$\mu (s_0)$` 或环境动态 `$P(s_{t+1}|s_t, a_t)$`。这就引出了一个问题：我们如何计算关于
    `$\boldsymbol {\theta }$` 的梯度？幸运的是，我们可以利用对数运算法则来解决这个问题。


    具体来说，我们可以应用对数恒等式，即两个数的对数之和等于它们乘积的对数。通过两次应用这个恒等式，我们可以将公式 (9.8) 拆解为乘积之和，然后得到公式 (9.9)。这使得我们无需访问
    `$\mu (s_0)$` 或 `$P(s_{t+1}|s_t, a_t)$` 即可计算梯度。

    '
- fmt: '![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}} \log P(\tau;
    \boldsymbol{\theta}) &amp; = \nabla_{\boldsymbol{\theta}} \log \left[ \mu(s_0)
    \cdot \prod_{t=0}^{T-1} \pi (a_t|s_t; \boldsymbol{\theta}) \cdot \prod_{t=0}^{T-1}
    P(s_{t+1}|s_t, a_t)\right]\notag \\ &amp; = \nabla_{\boldsymbol{\theta}} \log
    \mu(s_0) + \nabla_{\boldsymbol{\theta}} \log \prod_{t=0}^{T-1} \pi (a_t|s_t; \boldsymbol{\theta})
    + \nabla_{\boldsymbol{\theta}} \log \prod_{t=0}^{T-1} P(s_{t+1}|s_t, a_t) \notag
    \\ &amp; = \nabla_{\boldsymbol{\theta}} \log \mu(s_0) + \sum_{t=0}^{T-1} \nabla_{\boldsymbol{\theta}}
    \log \pi (a_t|s_t; \boldsymbol{\theta}) + \sum_{t=0}^{T-1} \nabla_{\boldsymbol{\theta}}
    \log P(s_{t+1}|s_t, a_t) {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ10.png)


    (9.9)


    在式(9.9)中，我们可以看到第一项`∇_θ log μ(s0)`不依赖于`θ`。这允许我们将其视为常数。因此，根据基础微积分，我们知道对常数的梯度为零。类似地，最后一项`∑_{t=0}^{T-1}
    ∇_θ log P(s_{t+1}|s_t, a_t)`也独立于`θ`，因为环境的动态不受`θ`变化的影响。因此，我们可以将`∇_θ log P(τ; θ)`关于`θ`的梯度简化为：


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}} \log P(\tau; \boldsymbol{\theta})
    = \sum_{t=0}^{T-1} \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta})
    {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ11.png)


    (9.10)


    总之，我们可以通过将第一项和最后一项视为常数来简化式(9.9)中的梯度。这得到了式(9.10)中所示的简化梯度。


    将上述结果代入式(9.7)，我们得到关于`θ`计算梯度（针对回合情况）的最终方程：


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}}J(\boldsymbol{\theta})
    &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ G(\tau) \nabla_{\boldsymbol{\theta}}
    \log P(\tau; \boldsymbol{\theta}) \right]\notag \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    G(\tau) \sum_{t=0}^{T-1} \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta})
    \right] \notag \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{T-1}
    G(\tau) \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta}) \right]
    \notag \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{T-1}
    \left( \sum_{k=0}^{T-1} {\gamma}^k r_k \right) \nabla_{\boldsymbol{\theta}} \log
    \pi (a_t|s_t; \boldsymbol{\theta}) \right] \notag \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[
    \sum_{t=0}^{T-1} \left( {\gamma}^t \sum_{k=t}^{T-1} {\gamma}^{k-t} r_k \right)
    \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta}) \right] \notag
    \\ &amp; = \mathbb{E}_{\pi_{\boldsymbol{\theta}}\!\!}\left[ \sum_{t=0}^{T-1} {\gamma}^t
    G_t \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t; \boldsymbol{\theta}) \right]
    {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ12.png)


    (9.11)


    式(9.11)中策略梯度背后的直觉是，我们希望增加`π(a_t|s_t; θ)`的概率（或对数似然），其增加比例与该动作的实际表现（即智能体在执行该动作后获得的奖励大小）成正比。


    为了去掉式(9.11)中的期望符号，我们可以使用随机梯度上升方法，对通过蒙特卡洛方法生成的回合序列计算样本梯度。这样，式(9.11)就变成了我们可以解析计算的形式。


    例如，如果我们使用线性方法来构建softmax策略分布（如式(9.1)所示）的动作偏好`φ(s, a)^T θ`，那么策略梯度`∇_θ log π(a|s;
    θ)`变为：


    ![$$\displaystyle \begin{aligned} \nabla_{\boldsymbol{\theta}} \log \pi (a|s;
    \boldsymbol{\theta}) &amp; = \nabla_{\boldsymbol{\theta}} \log e^{\phi(s, a)^T
    \boldsymbol{\theta}} - \nabla_{\boldsymbol{\theta}} \log \left( \sum_{b \in \mathcal{A}(s)}
    e^{\phi(s, b)^T \boldsymbol{\theta}} \right) \notag \\ &amp; = \nabla_{\boldsymbol{\theta}}
    \Bigl( \phi(s, a)^T \boldsymbol{\theta} \Bigr) - \frac{\nabla_{\boldsymbol{\theta}}
    \sum_b e^{\phi(s, b)^T \boldsymbol{\theta}}}{\sum_b e^{\phi(s, b)^T \boldsymbol{\theta}}
    }\notag \\ &amp; = \phi(s, a) - \frac{\sum_b \phi(s, b) e^{\phi(s, b)^T \boldsymbol{\theta}}}{\sum_b
    e^{\phi(s, b)^T \boldsymbol{\theta}} } \notag \\ &amp; = \phi(s, a) - \sum_b \pi(b|s;
    \boldsymbol{\theta}) \phi(s, b) {} \end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ13.png)


    (9.12)'
