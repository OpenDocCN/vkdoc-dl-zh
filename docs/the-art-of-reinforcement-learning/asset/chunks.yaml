  trans: '

    ### 备份


    在最终的备份阶段，来自神经网络的数值 `v` 会被备份到每个时间步 `t ≤ L`。在此阶段，状态-动作对 `(s_t, a_t)` 的访问计数 `N(s_t,
    a_t)` 会更新为 `N(s_t, a_t) = N(s_t, a_t) + 1`。总状态-动作价值 `W(s_t, a_t)` 也会更新为 `W(s_t,
    a_t) = W(s_t, a_t) + v`，其中 `v` 代表正在被备份的数值。此外，平均状态-动作价值 `Q(s_t, a_t)` 的计算方式为 `Q(s_t,
    a_t) = W(s_t, a_t) / N(s_t, a_t)`。


    由于我们处理的是双人零和博弈，被备份的数值 `v` 有时会取反。例如，如果当前玩家是最大化玩家，那么备份的数值 `v` 将被取反，以表示对手的效用。


    完成这三个阶段后，一次搜索迭代即视为完成。算法随后进入下一次迭代，此过程持续进行，直到达到某个限制条件，例如时间约束或最大迭代次数。


    ### AlphaZero MCTS 如何构建搜索树


    由于 AlphaZero 会展开所有子节点而非仅一个子节点，其搜索树的构建方式与通用 MCTS 略有不同。图 14.8 展示了一个简单示例。


    该图展示了 AlphaZero 的 MCTS 搜索算法构建搜索树的过程。它呈现了从第 1 次到第 4 次迭代的节点图。每次迭代中，树的层级都会增加。


    **图 14.8** 一个说明 AlphaZero 的 MCTS 搜索算法如何构建搜索树的简单示例


    总结来说，AlphaZero 对标准 MCTS 算法进行了若干修改，我们在此重点说明：


    -   搜索到达叶节点后，不再进行随机模拟（rollout）。相反，AlphaZero 使用神经网络评估棋盘局面，并将其作为估计的游戏结果来更新搜索树中的统计信息。

    -   在展开叶节点时，所有子节点会在单次操作中一次性展开，而非像标准 MCTS 那样每次只展开一个子节点。这意味着节点展开后，该叶节点会立即变为完全展开状态。

    -   AlphaZero 在选择阶段使用了一种略有不同的 UCT 算法来选择最佳子节点，该算法结合了神经网络输出的先验动作概率 `p`。


    DeepMind 还采用了其他技术来进一步加速 MCTS 搜索过程，例如使用并行树搜索和重用子树。这些是锦上添花的高级特性，但实现起来要复杂得多，并且很大程度上取决于我们如何实现算法（例如，使用哪种编程语言）。然而，对于让
    AlphaZero 智能体正常工作而言，这些特性并非必需。感兴趣的读者可以在原始的 AlphaGo Zero 和 AlphaZero 论文中找到关于这些主题的更多信息。


    ### 自我对弈


    为了生成高质量的训练数据来训练神经网络，AlphaZero 采用了一种结合蒙特卡洛树搜索（MCTS）的自我对弈方法。


    在每局自我对弈游戏中，对于每个非终止时间步 `0 ≤ t ≤ T`，都会使用最新的神经网络参数执行一次 MCTS 搜索，该搜索通常包含数千次迭代。搜索完成后，会为当前游戏状态
    `s_t` 计算出一个更强的搜索策略 `π_t`。该策略与根节点子节点的指数化访问计数成正比，并使用温度参数 `τ` 控制探索程度：


    ```

    π(a|s_0) = N(s_0, a)^(1/τ) / Σ_b N(s_0, b)^(1/τ)

    ```


    (14.5) 其中 `N(s_0, a)` 表示在状态 `s_0` 下采取动作 `a` 所得到的子节点的访问计数。策略 `π_t` 比神经网络输出的原始向量
    `P_t` 更强，可被视为一个强大的策略改进算子。为了进行游戏，会根据策略 `π_t` 选择一个动作 `a`，游戏进入下一个状态，并开始一个新的 MCTS
    搜索过程。该策略在训练神经网络时也会成为目标。


    然后从 `π_t` 中采样一个动作 `a_t`，用于在游戏状态 `s_t` 下执行。在每局自我对弈游戏的前 30 步中，softmax 函数（定义为 `softmax(x_i)
    = exp(x_i / τ) / Σ_j exp(x_j / τ)`）的温度设置为 `τ = 1`。这会根据 MCTS 搜索树根节点中子节点的访问计数按比例选择动作。在游戏的剩余部分，则使用接近零的温度（`τ
    → 0`），这对应于始终选择 MCTS 搜索树根节点中访问次数最多的子节点。


    #### 探索


    为了鼓励进一步探索，会在根节点 `s_0` 的先验概率 `P(s, a)` 中添加少量狄利克雷噪声。具体来说，`P(s, a) = (1 - ε) P_a
    + ε η_a`，其中 `η ~ Dir(0.03)` 且 `ε = 0.25`。每次 MCTS 搜索都会执行此操作。

    '
- fmt: '### Resign on Losing Games


    During self-play, AlphaZero uses a resign mechanism to avoid wasting computation
    resources on clearly losing games. The algorithm achieves this by checking the
    evaluated game results and choosing to resign on those games where the player
    is clearly losing. This happens after running Monte Carlo Tree Search (MCTS) for
    800 iterations. If the mean state-action value of the root node of the MCTS search
    tree is lesser than a certain threshold, for example, `-0.9`, the player would
    choose to resign instead of continuing to play the game.


    It is important to note that the automated resign mechanism only happens after
    a game has reached a certain number of moves, for example, each player has made
    10 or 20 moves. It makes no sense to voluntarily resign at the beginning of a
    game.


    However, in order to measure the false positive rate of the resigned games, AlphaZero
    intentionally disables the resign move for 10% of the self-play games. In such
    cases, the agent would play the game until reaching the final state. The resign
    mechanism is a crucial part of the AlphaZero algorithm, as it helps the algorithm
    focus its computation resources on games where it has a better chance of winning.
    This, in turn, helps the algorithm learn faster and achieve better results in
    the long run.


    ### Samples for Training


    The goal of generating these self-play games is to collect samples for training
    the neural network. Specifically, for every self-play game, we collect the transition
    tuple `(s_t, π_t, z_t)` for time steps `0 ≤ t ≤ T`. Here, `s_t` is the game state
    at time step `t`, which is a stacked binary feature plane with the dimensions
    `19 × 19 × 17` for the game of Go. `π_t` is the stronger MCTS search policy from
    time step `t`, and `z_t` is the Monte Carlo sample return `G_t = R_t + R_{t+1}
    + R_{t+2} + ... + R_{T-1}` with no discount. Since all the rewards are zero for
    non-terminal states, this reduces to `G_t = R_{T-1}`, which is the actual game
    result, a value of -1 for a loss, 0 for a draw, and +1 for a win.


    This mechanism of assigning the final game outcome to every move helps to address
    the credit assignment issue. So all the decision made by the agent gets assigned
    the equal amount of credit, depending on the final outcome of the self-play game.


    All `(s_t, π_t, z_t)` are represented from the perspective of the player at time
    step `t`. For example, if the self-play game ends up with black winning, then
    for every time step `t = 0, 1, 2, ..., T`, if it’s black’s turn to move at time
    step `t`, we set `z_t = +1`; conversely, if it’s white’s turn to move at time
    step `t`, then `z_t = -1`. The same applies to `s_t` and `π_t`.


    AlphaZero then stores millions of most recent self-play games into an experience
    replay buffer, much like the DQN algorithm does. These self-play games are then
    used to train the neural network. And the self-play actors would periodically
    switch to the latest neural network to generate more sample games.'
