- fmt: '# Mountain Car Task


    The goal of the mountain car task is to drive an underpowered car to reach a predefined
    goal position. The problem was originally introduced by Sutton and Barto [[4](#605748_1_En_7_Chapter.xhtml#CR4)].


    One possible solution is to store a discount rate ![$${\gamma }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq113.png)
    together with each transition in the replay buffer, such as ![$$(s_t, a_t, r_t,
    s_{t+1}, {\gamma })$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq114.png).
    In this case, when ![$$s_{t+1}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq115.png)
    is a terminal state, ![$${\gamma }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq116.png)
    is set to zero. During learning, the stored discount rate is used to compute the
    temporal difference (TD) target for the transitions.


    Another solution is to include a boolean indicator along with each transition
    in the replay buffer, such as ![$$(s_t, a_t, r_t, s_{t+1}, done)$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq117.png),
    where the indicator is set to `true` when ![$$s_{t+1}$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq118.png)
    represents a terminal state. This way, during learning, the discount can be set
    to zero when `done` is `true`, which in turn sets the value of the successor state
    to zero.


    By handling terminal states appropriately, the agent can learn more efficiently
    and effectively. For example, when the discount rate is set to zero for a terminal
    state, the neural network will not try to learn anything about the value of that
    state. Providing proper treatment of terminal states is important in ensuring
    the robustness of a reinforcement learning algorithm.


    ## Mountain Car Task


    We now use another classic control task called *mountain car* to demonstrate the
    performance improvement of using experience replay and target network. The goal
    of the mountain car task is to drive an underpowered car to reach a predefined
    goal position as shown in Fig. [7.13](#605748_1_En_7_Chapter.xhtml#Fig13). What
    makes this task difficult is the mountain is too steep to climb for the underpowered
    car. The only solution is to first drive the car in the opposite direction of
    the goal and using the gravity as an additional force to build enough velocity
    to eventually reach the goal.


    The environment state contains only two continuing variables: the position ![$$x
    \in [-1.2, 0.5]$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq119.png)
    and velocity ![$$\dot {x} \in [-0.07, 0.07]$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq120.png)
    of the car. The reward for the task is a ![$$-1$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq121.png)
    for every step until the car reaches the goal position. There are three actions
    the agent can choose from: accelerate forward (to the right), accelerate reverse
    (to the left), and no acceleration. The dynamics of the environment is defined
    by a simplified physics model, where the position of the car is updated by the
    following equation:


    ![$$\displaystyle \begin{aligned} x_{t+1} = \text{bound}(x_t + \dot{x}_{t+1})
    \end{aligned} $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_Equa.png)


    where ![$$\text{bound}(x)$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq122.png)
    is a function that returns *x* if it is within the bounds ![$$[-1.2, 0.5]$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq123.png)
    and the nearest bound if it is outside this range. The velocity of the car is
    updated by the following equation:


    ![$$\displaystyle \begin{aligned} \dot{x}_{t+1} = \text{bound}\left(\dot{x}_t
    + 0.001 \cdot a_t - 0.0025 \cdot \cos{}(3x_t)\right) \notag \end{aligned} $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_Equ10.png)


    where ![$$a_t$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq124.png)
    is the chosen acceleration at time *t*.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig14_HTML.png)


    A line graph plots evaluation episode return versus training environment steps.
    4 lines naive deep Q, deep Q with target net, deep Q with replay and D Q N where
    target net and D Q N have linear line across 200 and naive deep Q and replay have
    increasing trendline.


    **Fig. 7.14** Evaluation episode return for different Q-learning agents on the
    mountain car task. The results were averaged over five independent runs and then
    smoothed using a moving average with a window size of five.


    If the car reaches the left top mountain (position left bound), the velocity of
    the car is reset to zero, so it does not run out of the valley. Each episode starts
    from a random position ![$$x_0 \in [-0.6,-0.4)$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq125.png)
    and zero velocity. To avoid running the task in an infinite loop, we can limit
    the maximum number of steps per episode.


    The following experiment evaluates the performance of different Q-learning agents
    on the mountain car task, using a prebuilt mountain car environment^([⁸](#fn8))
    from the OpenAI Gym [[5](#605748_1_En_7_Chapter.xhtml#CR5)]. The experiment settings
    are:


    *   Maximum episode step: 200

    *   Learning rate ( ![$$\alpha $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq126.png)
    ): 0.0005

    *   Discount rate ( ![$${\gamma }$$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq127.png)
    ): 0.99

    *   Batch size: 32

    *   Replay capacity: 50,000

    *   Exploration rate ( ![$$\epsilon $$](images/605748_1_En_7_Chapter/605748_1_En_7_Chapter_TeX_IEq128.png)
    ) decay: From 1.0 to 0.05 over 100,000 updates

    *   Target network update interval (*C*): 200'
