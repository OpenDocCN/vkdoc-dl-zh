- fmt: "# 5.8 N-Step Bootstrapping\n\nIn reinforcement learning, the goal is for an\
    \ agent to learn a policy that maximizes its expected cumulative reward over time.\
    \ One approach to learning such a policy is to estimate the value of each state,\
    \ which is the expected cumulative reward that an agent can obtain by following\
    \ its policy from that state onward.\n\nIn TD(0) policy evaluation, we estimate\
    \ the return `G_t` using the TD target `R_t + γ V_π(S_{t+1})`, which is the immediate\
    \ reward `R_t` plus the discounted value of the successor state `γ V_π(S_{t+1})`.\
    \ However, one concern with this method is that if the estimated value for the\
    \ successor state `S_{t+1}` is biased, then the updated values `V_π(S_t)` will\
    \ also be biased. This can lead to suboptimal performance, which means the agent\
    \ may need to spend more time learning the state values.\n\nMonte Carlo methods\
    \ don't have this issue because the agent always uses the actual return computed\
    \ from a complete episode. However, we prefer to use TD methods over Monte Carlo\
    \ because we want to support continuing reinforcement learning problems, and we\
    \ want to avoid waiting until the episode is over to update the values. So, is\
    \ there a way we can estimate the return more accurately while still using TD\
    \ methods?\n\nTo answer this question, let's look at the mathematical equations\
    \ for the value functions. The state value function `V_π` can be written recursively\
    \ as\n\n```\nV_π(s) = E_π[ G_t | S_t = s ]\n       = E_π[ R_t + γ R_{t+1} + γ^2\
    \ R_{t+2} + γ^3 R_{t+3} + ... | S_t = s ]\n       = E_π[ R_t + γ ( R_{t+1} + γ\
    \ R_{t+2} + γ^2 R_{t+2} + ... ) | S_t = s ]\n       = E_π[ R_t + γ G_{t+1} | S_t\
    \ = s ]\n       = E_π[ R_t + γ V_π(S_{t+1}) | S_t = s ]\n```\n\n(5.17)\n\nIn TD(0)\
    \ policy evaluation, we use `R_t + γ V_π(S_{t+1})` (from Eq. 5.17) to replace\
    \ `G_t` with the incremental update methods:\n\n```\nV_π(S_t) = V_π(S_t) + α (\
    \ G_t - V_π(S_t) )\n         = V_π(S_t) + α ( [ R_t + γ V_π(S_{t+1}) ] - V_π(S_t)\
    \ )\n```\n\n(5.18)\n\nTo estimate the return more accurately, we can use a method\
    \ called N-step bootstrapping, which rearranges the return `G_t` in a different\
    \ way that uses multiple rewards received into the future from the current time\
    \ step `t`, plus the discounted value of the successor state after the last reward.\
    \ This is shown in Eqs. (5.19), (5.20), and (5.21):\n\n```\nG_t = R_t + γ R_{t+1}\
    \ + γ^2 R_{t+2} + γ^3 R_{t+3} + γ^4 R_{t+4} + ...\n    = R_t + γ R_{t+1} + γ^2\
    \ ( R_{t+2} + γ R_{t+3} + γ^2 R_{t+4} + ... )\n    = R_t + γ R_{t+1} + γ^2 G_{t+2}\n\
    ```\n\n(5.19)\n\n```\nG_t = R_t + γ R_{t+1} + γ^2 R_{t+2} + γ^3 R_{t+3} + γ^4\
    \ R_{t+4} + ...\n    = R_t + γ R_{t+1} + γ^2 R_{t+2} + γ^3 ( R_{t+3} + γ R_{t+4}\
    \ + ... )\n    = R_t + γ R_{t+1} + γ^2 R_{t+2} + γ^3 G_{t+3}\n```\n\n(5.20)\n\n\
    ```\nG_t = R_t + γ R_{t+1} + γ^2 R_{t+2} + ... + γ^{n-1} R_{t+n-1} + γ^n G_{t+n}\n\
    ```\n\n(5.21)\n\nInspired by Eq. (5.17), we can rewrite Eq. (5.21) recursively\
    \ using the state value function `V_π`, where we use `γ^n V_π(S_{t+n})` as an\
    \ estimator (or bootstrapping) for the missing rewards for time steps `t+n+1,\
    \ t+n+2, ...`. This gives us the *N-step* return or *N-step* bootstrapping, as\
    \ shown in Eq. (5.22):\n\n```\nG_t = R_t + γ R_{t+1} + γ^2 R_{t+2} + ... + γ^{n-1}\
    \ R_{t+n-1} + γ^n V_π(S_{t+n})\n```\n\n(5.22)\n\nWe can adapt Eq. (5.22) as part\
    \ of the incremental value update rule, where we use the N-step returns as the\
    \ estimated return `G_t`:\n\n```\nV_π(S_t) = V_π(S_t) + α ( [ R_t + γ R_{t+1}\
    \ + ... + γ^{n-1} R_{t+n-1}\n           + γ^n V_π(S_{t+n}) ] - V_π(S_t) )\n```\n\
    \n(5.23)\n\nHere, `α` is the step size parameter that determines the magnitude\
    \ of the update. The update rule is incremental, meaning that the estimated value\
    \ of a state is updated after each time step based on the observed reward and\
    \ the estimated value of the next state.\n\nUsing N-step bootstrapping is a way\
    \ to estimate the return more accurately while still using TD methods. By breaking\
    \ the return down into multiple rewards, we can use the value function to estimate\
    \ the missing rewards that occur after the N time steps. This approach helps mitigate\
    \ the bias introduced by using a biased estimate of the successor state value.\n\
    \nOne advantage of N-step bootstrapping over Monte Carlo methods is that it can\
    \ be used for continuing reinforcement learning problems, where episodes do not\
    \ have a fixed length. Monte Carlo methods can still be used by truncating episodes,\
    \ but N-step bootstrapping can update the value function after N time steps, making\
    \ it more efficient."
  raw: '## 5.8 N-Step Bootstrapping


    In reinforcement learning, the goal is for an agent to learn a policy that maximizes
    its expected cumulative reward over time. One approach to learning such a policy
    is to estimate the value of each state, which is the expected cumulative reward
    that an agent can obtain by following its policy from that state onward.


    In TD(0) policy evaluation, we estimate the return ![$$G_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq362.png)
    using the TD target ![$$R_t + {\gamma } V_\pi (S_{t+1})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq363.png)
    , which is the immediate reward ![$$R_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq364.png)
    plus the discounted value of the successor state ![$${\gamma } V_\pi (S_{t+1})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq365.png)
    . However, one concern with this method is that if the estimated value for the
    successor state ![$$S_{t+1}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq366.png)
    is biased, then the updated values ![$$V_\pi (S_t)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq367.png)
    will also be biased. This can lead to suboptimal performance, which means the
    agent may need to spend more time learning the state values.


    Monte Carlo methods don’t have this issue because the agent always uses the actual
    return computed from a complete episode. However, we prefer to use TD methods
    over Monte Carlo because we want to support continuing reinforcement learning
    problems, and we want to avoid waiting until the episode is over to update the
    values. So, is there a way we can estimate the return more accurately while still
    using TD methods?


    To answer this question, let’s look at the mathematical equations for the value
    functions. The state value function ![$$V_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq368.png)
    can be written recursively as


    ![$$\displaystyle \begin{aligned} V_\pi(s) &amp; =\mathbb{E}_{\pi\!\!}\left[G_t
    \;\Big|\; S_t=s\right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t + {\gamma} R_{t+1}
    + {\gamma}^2 R_{t+2} + {\gamma}^3 R_{t+3} + \cdots \;\Big|\; S_t=s\right] \\ &amp;
    =\mathbb{E}_{\pi\!\!}\left[R_t + {\gamma} \bigl( R_{t+1} + {\gamma} R_{t+2} +
    {\gamma}^2 R_{t+2} + \cdots \bigr) \;\Big|\; S_t=s \right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} G_{t+1} \;\Big|\;S_t=s\right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} V_\pi(S_{t+1}) \;\Big|\; S_t=s\right] {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ17.png)


    (5.17)


    In TD(0) policy evaluation, we use ![$$R_t + {\gamma } V_\pi (S_{t+1})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq369.png)
    (from Eq. [5.17](#605748_1_En_5_Chapter.xhtml#Equ17)) to replace ![$$G_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq370.png)
    with the incremental update methods:


    ![$$\displaystyle \begin{aligned} \begin{array}{rl} V_\pi(S_t) &amp; =V_\pi(S_t)
    + \alpha \Big( G_t - V_\pi(S_t) \Big) \\ &amp; =V_\pi(S_t) + \alpha \bigg( \Big[
    R_t + {\gamma} V_\pi(S_{t+1})\Big] - V_\pi(S_t) \bigg) \end{array} {} \end{aligned}
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ18.png)


    (5.18)


    To estimate the return more accurately, we can use a method called N-step bootstrapping,
    which rearranges the return ![$$G_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq371.png)
    in a different way that uses multiple rewards received into the future from the
    current time step *t*, plus the discounted value of the successor state after
    the last reward. This is shown in Eqs. ([5.19](#605748_1_En_5_Chapter.xhtml#Equ19)),
    ([5.20](#605748_1_En_5_Chapter.xhtml#Equ20)), and ([5.21](#605748_1_En_5_Chapter.xhtml#Equ21)):


    ![$$\displaystyle \begin{aligned} \begin{array}{rl} G_t &amp; =R_t + {\gamma}
    R_{t+1} + {\gamma}^2 R_{t+2} + {\gamma}^3 R_{t+3} + {\gamma}^4 R_{t+4} +\cdots
    \\ &amp; =R_t + {\gamma} R_{t+1} + {\gamma}^2 \bigl( R_{t+2} + {\gamma} R_{t+3}
    + {\gamma}^2 R_{t+4} + \cdots \bigr) \\ &amp; =R_t + {\gamma} R_{t+1} + {\gamma}^2
    G_{t+2} \end{array} {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ19.png)


    (5.19)


    ![$$\displaystyle \begin{aligned} \begin{array}{rl} G_t &amp; =R_t + {\gamma}
    R_{t+1} + {\gamma}^2 R_{t+2} + {\gamma}^3 R_{t+3} + {\gamma}^4 R_{t+4} +\cdots
    \\ &amp; =R_t + {\gamma} R_{t+1} + {\gamma}^2R_{t+2} + {\gamma}^3 \bigl( R_{t+3}
    + {\gamma} R_{t+4} + \cdots \bigr) \\ &amp; =R_t + {\gamma} R_{t+1} + {\gamma}^2R_{t+2}
    + {\gamma}^3 G_{t+3} \end{array} {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ20.png)


    (5.20)


    ![$$\displaystyle \begin{aligned} G_t=R_t + {\gamma} R_{t+1} + {\gamma}^2 R_{t+2}
    + \cdots + {\gamma}^{n-1}R_{t+n-1} + {\gamma}^{n} G_{t+n} {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ21.png)


    (5.21)


    Inspired by Eq. ([5.17](#605748_1_En_5_Chapter.xhtml#Equ17)), we can rewrite Eq.
    ([5.21](#605748_1_En_5_Chapter.xhtml#Equ21)) recursively using the state value
    function ![$$V_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq372.png)
    , where we use ![$${\gamma }^{n} V_\pi (S_{t+n})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq373.png)
    as an estimator (or bootstrapping) for the missing rewards for time steps ![$$t+n+1,
    t+n+2, \cdots $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq374.png)
    . This gives us the *N-step* return or *N-step* bootstrapping, as shown in Eq.
    ([5.22](#605748_1_En_5_Chapter.xhtml#Equ22)):


    ![$$\displaystyle \begin{aligned} G_t=R_t + {\gamma} R_{t+1} + {\gamma}^2 R_{t+2}
    + \cdots + {\gamma}^{n-1}R_{t+n-1} + {\gamma}^{n} V_\pi(S_{t+n}) {} \end{aligned}
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ22.png)


    (5.22)


    We can adapt Eq. ([5.22](#605748_1_En_5_Chapter.xhtml#Equ22)) as part of the incremental
    value update rule, where we use the N-step returns as the estimated return ![$$G_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq375.png)
    :


    ![$$\displaystyle \begin{aligned} V_\pi(S_t) ={} &amp; V_\pi(S_t) + \alpha \bigg(
    \Big[ R_t + {\gamma} R_{t+1} + \cdots + {\gamma}^{n-1}R_{t+n-1} \\ &amp; + {\gamma}^{n}
    V_\pi(S_{t+n}) \Big] - V_\pi(S_t) \bigg) {} \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ23.png)


    (5.23)


    Here, ![$$\alpha $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq376.png)
    is the step size parameter that determines the magnitude of the update. The update
    rule is incremental, meaning that the estimated value of a state is updated after
    each time step based on the observed reward and the estimated value of the next
    state.


    Using N-step bootstrapping is a way to estimate the return more accurately while
    still using TD methods. By breaking the return down into multiple rewards, we
    can use the value function to estimate the missing rewards that occur after the
    N time steps. This approach helps mitigate the bias introduced by using a biased
    estimate of the successor state value.


    One advantage of N-step bootstrapping over Monte Carlo methods is that it can
    be used for continuing reinforcement learning problems, where episodes do not
    have a fixed length. Monte Carlo methods can still be used by truncating episodes,
    but N-step bootstrapping can update the value function after N time steps, making
    it more efficient.'
  trans: "\n# 5.8 N 步自举法\n\n在强化学习中，智能体的目标是学习一种策略，以最大化其随时间累积的期望奖励。学习此类策略的一种方法是估计每个状态的价值，即智能体从该状态开始遵循其策略所能获得的期望累积奖励。\n\
    \n在 TD(0)策略评估中，我们使用 TD 目标`R_t + γ V_π(S_{t+1})`来估计回报`G_t`，该目标由即时奖励`R_t`加上后续状态的折扣价值`γ\
    \ V_π(S_{t+1})`组成。然而，这种方法的一个问题是，如果后续状态`S_{t+1}`的估计价值存在偏差，那么更新后的价值`V_π(S_t)`也会存在偏差。这可能导致次优性能，意味着智能体可能需要花费更多时间来学习状态价值。\n\
    \n蒙特卡洛方法不存在这个问题，因为智能体始终使用从完整回合中计算出的实际回报。然而，我们更倾向于使用 TD 方法而非蒙特卡洛方法，因为我们希望支持持续进行的强化学习问题，并且希望避免等到回合结束才更新价值。那么，有没有一种方法可以在仍使用\
    \ TD 方法的同时，更准确地估计回报呢？\n\n为了回答这个问题，让我们来看价值函数的数学公式。状态价值函数`V_π`可以递归地写为：\n\n```\n\
    V_π(s) = E_π[ G_t | S_t = s ]\n       = E_π[ R_t + γ R_{t+1} + γ² R_{t+2} + γ³\
    \ R_{t+3} + ... | S_t = s ]\n       = E_π[ R_t + γ ( R_{t+1} + γ R_{t+2} + γ²\
    \ R_{t+2} + ... ) | S_t = s ]\n       = E_π[ R_t + γ G_{t+1} | S_t = s ]\n   \
    \    = E_π[ R_t + γ V_π(S_{t+1}) | S_t = s ]\n```\n\n(5.17)\n\n在 TD(0)策略评估中，我们使用`R_t\
    \ + γ V_π(S_{t+1})`（来自公式 5.17）通过增量更新方法替换`G_t`：\n\n```\nV_π(S_t) = V_π(S_t) + α\
    \ ( G_t - V_π(S_t) )\n         = V_π(S_t) + α ( [ R_t + γ V_π(S_{t+1}) ] - V_π(S_t)\
    \ )\n```\n\n(5.18)\n\n为了更准确地估计回报，我们可以使用一种称为 N 步自举法的方法，该方法以不同的方式重新排列回报`G_t`，使用从当前时间步`t`开始未来多个时间步的奖励，加上最后一个奖励之后后续状态的折扣价值。这如公式(5.19)、(5.20)和(5.21)所示：\n\
    \n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2} + γ³ R_{t+3} + γ⁴ R_{t+4} + ...\n  \
    \  = R_t + γ R_{t+1} + γ² ( R_{t+2} + γ R_{t+3} + γ² R_{t+4} + ... )\n    = R_t\
    \ + γ R_{t+1} + γ² G_{t+2}\n```\n\n(5.19)\n\n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2}\
    \ + γ³ R_{t+3} + γ⁴ R_{t+4} + ...\n    = R_t + γ R_{t+1} + γ² R_{t+2} + γ³ ( R_{t+3}\
    \ + γ R_{t+4} + ... )\n    = R_t + γ R_{t+1} + γ² R_{t+2} + γ³ G_{t+3}\n```\n\n\
    (5.20)\n\n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2} + ... + γ^{n-1} R_{t+n-1} +\
    \ γ^n G_{t+n}\n```\n\n(5.21)\n\n受公式(5.17)启发，我们可以使用状态价值函数`V_π`递归地重写公式(5.21)，其中我们使用`γ^n\
    \ V_π(S_{t+n})`作为对时间步`t+n+1, t+n+2, ...`缺失奖励的估计器（或自举）。这便得到了*N 步*回报或*N 步*自举法，如公式(5.22)所示：\n\
    \n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2} + ... + γ^{n-1} R_{t+n-1} + γ^n V_π(S_{t+n})\n\
    ```\n\n(5.22)\n\n我们可以将公式(5.22)作为增量价值更新规则的一部分，其中我们使用 N 步回报作为估计回报`G_t`：\n\n```\n\
    V_π(S_t) = V_π(S_t) + α ( [ R_t + γ R_{t+1} + ... + γ^{n-1} R_{t+n-1}\n      \
    \     + γ^n V_π(S_{t+n}) ] - V_π(S_t) )\n```\n\n(5.23)\n\n这里，`α`是步长参数，决定了更新的幅度。该更新规则是增量的，意味着每个状态的价值会在每个时间步后根据观察到的奖励和下一个状态的估计价值进行更新。\n\
    \n使用 N 步自举法是一种在仍使用 TD 方法的同时更准确估计回报的方式。通过将回报分解为多个奖励，我们可以利用价值函数来估计 N 个时间步之后发生的缺失奖励。这种方法有助于减轻因使用有偏的后续状态价值估计而引入的偏差。\n\
    \n与蒙特卡洛方法相比，N 步自举法的一个优势是它可以用于持续进行的强化学习问题，即回合没有固定长度的问题。蒙特卡洛方法虽然可以通过截断回合来使用，但 N\
    \ 步自举法可以在 N 个时间步后更新价值函数，从而使其更加高效。\n"
- fmt: '# N-Step Bootstrapping


    The N-step bootstrapping method mixes `TD(0)` and Monte Carlo methods together
    (for episodic cases). When `N=1`, we get the standard `TD(0)` like `SARSA`. If
    `N=T`, where `T` is the length of the episode, we get Monte Carlo methods. This
    approach is sometimes called “multi-step look-ahead,” because the agent uses information
    from multiple time steps ahead to compute the value estimates (Fig. 5.9).


    The choice of `N` is a trade-off between bias and variance. If `N` is small, the
    estimate is more biased because it relies on fewer samples of future rewards,
    but it is updated more frequently, which can reduce variance. If `N` is large,
    the estimate is less biased because it uses more samples, but it is updated less
    frequently and can have higher variance.


    What about the states close to the terminal time step `T` for the episodic reinforcement
    learning problems, like `S_{T-3}`, `S_{T-2}`, `S_{T-1}`? To compute the N-step
    return for these time steps, we simply ignore the missing time steps. Sometimes,
    we can also add abstract sequences (both reward and state values are 0) to the
    end of the episode sequences, which will give us the same results as simply ignoring
    the missing time steps (Fig. 5.10).


    ```

    A flowchart. It flows through S T minus 2, S T minus 1, S T, 0, 0, and 0 nodes
    linearly via A T minus 2, A T minus 1, and 0 links. Each node points to the node
    followed by its next via R T minus 2, R T minus 1, and 0 links. Below are equations
    for V pie S T, V pie S T minus 1, and V pie S T minus 2.

    ```


    **Fig. 5.10** How N-step bootstrapping deal with end of episodic sequence, where
    `n=3`


    ```

    A schematic of the idea of N-step returns where n equals 3. A linear nodal map
    flows through S 0, S 1, S 2, S 3, S 4, and S 5 nodes via A 1, A 1, A 2, A 3, and
    A 4 variables. Each node points to the node followed by its next via R variables.
    Below are equations for V S 2, V S 1, and V S 0.

    ```


    **Fig. 5.9** The idea of N-step returns, where `n=3`


    N-step bootstrapping is a powerful technique that can be applied in a variety
    of settings. Here are two examples of how it can be used in practice:


    - In gaming environments, agents often need to make decisions based on a sequence
    of events that occur over time. For example, in a first-person shooter game, an
    agent might use N-step bootstrapping to estimate the value of a given state by
    considering the rewards that will be received over the next N time steps. This
    can help the agent make more accurate decisions about what actions to take in
    the game.


    - In robotic control, agents must make decisions based on feedback from sensors
    and other environmental factors. For example, an agent controlling a robot arm
    might use N-step bootstrapping to estimate the value of a given state by considering
    the rewards that will be received over the next N time steps. This can help the
    agent make more accurate decisions about how to move the robot arm in order to
    achieve a desired outcome.


    To apply N-step bootstrapping, there are a few specific steps that should be followed.
    First, we must select an appropriate value for `N` that is appropriate for the
    problem at hand. This will depend on factors such as the length of the time horizon
    and the rate of change in the environment. Next, the agent uses N-step bootstrapping
    to estimate the value of each state based on the rewards that will be received
    over the next N time steps. This can help the agent make more accurate decisions
    by taking into account the long-term consequences of each action.


    However, there are some potential issues with N-step bootstrapping as mentioned
    in the work by Professor Dimitri P. Bertsekas [5]. For example, in some cases,
    an incorrect configuration of the algorithm can lead to suboptimal behavior. To
    illustrate this, consider the following toy example MDP (see Fig. 5.11). In this
    episodic task, a new episode always starts from the leftmost node (Start), and
    the episode ends at the rightmost node (End). The agent can only choose one action
    that keeps it moving forward for all states, except in the initial starting state,
    where there are two actions that lead the agent to the upper or lower path. The
    reward signals associated with each state-action pair are outlined with the edges
    between the nodes. The optimal path is the lower path, since there is a high reward
    signal (`r=10`) toward the terminal state.


    ```

    A flowchart for the pitfalls of N-step bootstrapping where an incorrect n = 3.
    The flow on the top runs as follows. Start, R = 0, r = 1, r = 2, and r = 1 end.
    The flow on the bottom runs as follows. Start, R = 0, r = 2, r = 0, r = 10, and
    end.

    ```


    **Fig. 5.11** Pitfalls of N-step bootstrapping, where with an incorrect `n=3`,
    the algorithm might initially choose the suboptimal path (upper path) instead
    of the optimal one (lower path)


    However, with an incorrect configuration, such as `N=3`, the algorithm would initially
    choose the upper path, especially when the value estimates are not accurate. To
    avoid such issues, it is recommended to use the largest value possible for `N`,
    although this can be limited by computational constraints.'
