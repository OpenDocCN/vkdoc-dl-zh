  trans: '

    # 14.5 在 13×13 棋盘上训练 AlphaZero 玩五子棋


    对于觉得围棋过于复杂的读者，无论是难以理解其规则（确实相当复杂），还是缺乏进行实验的计算资源，这里有一个替代方案：在像五子棋这样更简单的游戏中训练 AlphaZero。五子棋，也称为“连五子”，是一种简单的棋盘游戏，与围棋有一些相似之处。在五子棋中，玩家轮流在
    15×15 的棋盘上落子，不像围棋那样对落子位置有严格限制。目标很简单：第一个在水平、垂直或对角线上将五颗同色棋子连成一条线的玩家获胜。如果棋盘被棋子填满，且没有玩家达成五子连线，则游戏为平局。与围棋不同，五子棋没有“虚手”或“认输”的走法。与围棋的相似性以及更简单的规则，使得五子棋成为测试和验证
    AlphaZero 智能体的理想问题。简单来说，在强化学习的背景下，如果围棋相当于 Atari 游戏，那么五子棋就类似于“车杆”问题。


    五子棋也可以在更小的棋盘上进行，例如 9×9 和 13×13。然而，在较小的棋盘上，比如 9×9，如果双方都持续做出最优走法，游戏往往会以平局告终。但在较大的棋盘上情况并非如此，先手方（黑棋）拥有优势，如果他们在整场游戏中都走出最佳着法，则总能获胜。因此，当黑棋玩家水平很高时，在较大的棋盘上游戏通常在
    20-30 步左右结束，这并不奇怪，除非游戏采用了额外的特定规则。例如，某些变体规则规定，连成超过五颗棋子并不自动获胜，并且在开局阶段某些位置可能受到限制。


    关于五子棋有一个有趣的事实：标准的 AlphaZero 智能体在正常情况下表现相当不错。然而，存在一种特殊情况，即对手试图通过在棋盘边缘连成五子来获胜，尤其是在开局阶段。令人惊讶的是，我们发现智能体在这种情况下无法阻挡对手，尽管其整体游戏能力很强，如图
    14.15 所示。这种短视行为可归因于智能体在训练期间缺乏接触此类对局。毕竟，自我对弈的智能体极不可能走出这些特定的着法。


    ![](img/605748_1_En_14_Fig15_HTML.png)


    13×13 网格上五子棋策略棋盘游戏的两种表示。


    **图 14.15** 标准 AlphaZero 智能体在 13×13 五子棋棋盘上出现边缘情况问题的示例，其中对手（黑棋）试图通过在棋盘边缘连成五子来快速获胜。在这种情况下，智能体（白棋）常常无法阻挡对手。即使智能体经过长时间训练并在训练中接触到更多自我对弈对局，这个问题仍然存在。


    为了解决这个问题，如前所述，我们选择了一种针对五子棋游戏独特性质稍作修改的神经网络架构。在我们的实验中，我们发现对初始卷积块使用填充值 3（而非通常的 1）能有效解决五子棋中的这个边缘问题。


    在我们的实验中，我们训练了一个 AlphaZero 智能体在 13×13 棋盘上玩自由式五子棋。自由式五子棋意味着没有额外的严格规则；同色棋子连成等于或大于五颗即算获胜。


    我们遵循了上一节中概述的类似配置，其中我们讨论了在 9×9 围棋棋盘上训练 AlphaZero 智能体。但是，我们做了以下更改：


    -   我们的神经网络由 14 个块组成，包括 1 个初始卷积块和 13 个残差块。我们对所有卷积层使用了 40 个卷积滤波器，对价值头使用了 80 个隐藏单元。

    -   为了解决五子棋中的边缘情况问题，我们对神经网络中的初始卷积块使用了填充值 3，而不是 1。

    -   由于 13×13 棋盘上的动作空间更大，我们将自我对弈和评估对局中每次蒙特卡洛树搜索（MCTS）的模拟次数增加到 400 次。

    -   我们仅使用最近的 150,000 局自我对弈对局来训练神经网络，批量大小为 256。第一个检查点是在 5,000 局自我对弈对局后创建的。

    -   由于五子棋没有认输走法，我们在自我对弈对局中没有包含认输机制。

    -   我们没有使用人类对局来评估神经网络的预测准确率，而是完全依赖基于最新模型与上一检查点模型之间评估对局计算出的 Elo 评分。做出这个决定是因为高质量的五子棋对局记录有限。


    除了提到的更改，其他设置保持不变。训练在一台拥有 128 个 CPU 和 8 个 GPU 的服务器上进行。我们每 5,000 局对局收集一个检查点，并每 1,000
    个训练步骤生成一个检查点。训练过程涉及一百万局自我对弈对局，完成 200,000 个训练步骤耗时 16 小时。


    图 14.16 显示了神经网络的训练损失。随着训练的进行，策略损失和价值损失都呈现出持续下降的趋势，这一点很明显。这种行为与在 9×9 围棋棋盘上训练时观察到的非常相似。


    ![](img/605748_1_En_14_Fig16_HTML.png)


    两张图分别展示了交叉熵损失和均方误差损失随训练步骤的变化。绘制的趋势线从 (0, 5.1) 下降到 (220, 2.7)，以及从 (0, 1) 下降到 (220,
    1)，并伴有波动。数值为估计值。


    **图 14.16** 在 13×13 五子棋棋盘上训练 AlphaZero 智能体期间的策略交叉熵损失（左）和价值均方误差损失（右）。

    '
- fmt: 'Figure [14.17](#605748_1_En_14_Chapter.xhtml#Fig17) shows the Elo ratings
    of the agent computed during evaluation games, where the latest model plays against
    the model from the last checkpoint. The agent consistently achieves remarkably
    high Elo ratings, confirming our previous explanation. In Gomoku, particularly
    on larger board sizes, the black player holds a significant advantage as it can
    secure a win by consistently playing the best move. Alongside the Elo ratings,
    we also provide valuable insights into the length of the evaluation games, which
    serves as an additional metric for evaluating the agent’s performance. For Gomoku,
    the duration of the evaluation games becomes a crucial factor to consider. Typically,
    if the agent lacks the ability to effectively block its opponent, the game concludes
    within approximately ten moves, especially during the initial training phase.
    However, as the agent’s learning progresses, it acquires the skill to successfully
    block the opponent’s moves, which often means longer and more engaging games.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig17_HTML.png)


    Two graphs of Elo rating and evaluation game length versus training steps, respectively.
    The former plots an ascending trend from (0, 0) to (220, 2450). In the latter,
    the trend fluctuates between (0, 55) and (220, 23). Values are estimated.


    **Fig. 14.17** Performance of the AlphaZero agent on a `13 x 13` Gomoku board.
    Left: Elo ratings were computed from evaluation games between the current (latest)
    model and the model from the previous checkpoint. Right: Length of the evaluation
    games


    Nevertheless, it is important to note that the results significantly differ on
    smaller board sizes, such as `9 x 9`. In such cases, the Elo ratings tend to plateau
    after a certain period of training. Additionally, the length of the evaluation
    games often extends up to `9 x 9 = 81` moves. This phenomenon occurs because,
    on a smaller board, the first mover (black) is constrained by limited space and
    cannot execute intricate moves. Consequently, the game often concludes with a
    fully occupied board before either player can secure a victory.


    Figure [14.18](#605748_1_En_14_Chapter.xhtml#Fig18) illustrates the training progress
    of the agent on a `13 x 13` Gomoku board, showcasing its performance in evaluation
    games. Remarkably, the agent demonstrates significant learning within a short
    span of 18,000 training steps, successfully connecting five stones horizontally
    to secure a victory. By approximately 28,000 training steps, the agent exhibits
    the ability to block the opponent’s moves in simple scenarios. Around 68,000 training
    steps, a notable breakthrough occurs as the agent discovers an effective strategy
    of winning the game by connecting stones diagonally. Furthermore, it swiftly learns
    to counter the opponent’s attempts at achieving a diagonal victory. The agent’s
    prowess continues to improve, evident around the 148,000 training step mark, where
    it consistently displays strong play. In fact, the agent becomes virtually unbeatable,
    demonstrating optimal moves that render white’s best efforts futile. Even with
    further training, the agent consistently exhibits this exceptional behavior.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig18_HTML.png)


    Six illustrations of the Gomoku strategic board game on a 13 by 13 grid at different
    stages.


    **Fig. 14.18** Evaluation games to show the different stages of the agent during
    training on a `13 x 13` Gomoku board, where we use the latest model (black) to
    play against the model (white) from the last checkpoint. This provides evidence
    of the agent’s acquisition of diverse winning strategies over the course of the
    training sessions. Ultimately, the agent reaches a strong level of play, demonstrated
    by its ability to make moves that render white incapable of winning, despite white’s
    best efforts to block the opponent’s progress'
