- fmt: 'In practice, the neural network architecture can be designed so that `\hat{V}`
    and `\hat{A}` share the same weights `\boldsymbol{\theta}` to some extent, while
    `\hat{V}` and `\hat{A}` still have their own weights `\beta, \delta`. The equation
    can be written in the following form:


    ```

    \hat{Q}(s, a; \boldsymbol{\theta}, \beta, \delta) = \hat{V}(s; \boldsymbol{\theta},
    \beta) + \hat{A}(s, a; \boldsymbol{\theta}, \delta)

    ```


    (8.13)


    However, when adapting Eq. (8.11) with DQN, there is no guarantee that the state
    value `\hat{V}` will be accurate since it is not reflected in the objective function
    of Q-learning. To address this problem, the original dueling DQN paper proposed
    a solution to force the agent to learn the state value function. The resulting
    equation is shown in Eq. (8.14):


    ```

    \hat{Q}(s, a; \boldsymbol{\theta}, \beta, \delta) = \hat{V}(s; \boldsymbol{\theta},
    \beta) + \Bigl( \hat{A}(s, a; \boldsymbol{\theta}, \delta) - \max_{a \in \cal{A}}
    \hat{A}(s, a; \boldsymbol{\theta}, \delta) \Bigr)

    ```


    (8.14)


    More precisely, for the best action `a_*` where `a_* = \mathop{\text{argmax}}_{a
    \in \cal{A}} \hat{A}(s, a; \boldsymbol{\theta}, \delta)`, the advantage term `\hat{A}(s,
    a; \boldsymbol{\theta}, \delta) - \max_{a \in \cal{A}} \hat{A}(s, a; \boldsymbol{\theta},
    \delta)` in Eq. (8.14) becomes zero; thus, we get `\hat{Q}(s, a_*; \boldsymbol{\theta},
    \beta, \delta) = \hat{V}(s; \boldsymbol{\theta}, \beta)`.


    But in practice, we adapt a slightly different version where we use the average
    instead of maximum value in the advantage term as shown in Eq. (8.15), which achieves
    much better stability during training.


    ```

    \hat{Q}(s, a; \boldsymbol{\theta}, \beta, \delta) = \hat{V}(s; \boldsymbol{\theta},
    \beta) + \Biggl( \hat{A}(s, a; \boldsymbol{\theta}, \delta) - \frac{1}{|\cal{A}|}
    \sum_{a \in \cal{A}} \hat{A}(s, a; \boldsymbol{\theta}, \delta) \Biggr)

    ```


    (8.15)


    The dueling network architecture proposed by Wang et al. [4] is a modification
    of the Deep Q-Network (DQN) that improves its ability to estimate state-action
    values for reinforcement learning problems. In the standard DQN, the neural network
    takes an image of the game screen as input and outputs the estimated state-action
    values for all possible actions. The dueling network architecture splits this
    network into two separate heads, one for estimating the state value and the other
    for estimating the advantage values for each action.


    Figure 8.3 shows the architecture of the dueling network. The network takes a
    state `s`, which is an `84 \times 84 \times 4` image, as input. The first three
    layers of the network are convolutional layers, and the parameters of these layers
    are shared (corresponding to `\boldsymbol{\theta}` in Eq. (8.15)). The feature
    maps from the last hidden layer are then fed into two separate fully connected
    layers: one for estimating the state value function `\hat{V}` and the other for
    estimating the advantage function `\hat{A}`.


    ![](images/605748_1_En_8_Chapter/605748_1_En_8_Fig3_HTML.png)


    A diagram for D Q N neural network is as follows. Input data, 32 filters, R e
    L U, 64 filters, R e L U, 64 filters, R e L U, 512 units, R e L U, 1 unit state
    value head and 18 unit advantage head. Compute Q cap, using V cap, and A cap,
    and state-action values.


    **Fig. 8.3** Dueling architecture for the DQN neural network


    The state value function head consists of a fully connected layer with one unit
    and no activation function to produce the estimated state value. The advantage
    function head consists of a fully connected layer with 18 units (the number of
    possible actions) and no activation function to produce the estimated advantage
    values for each action.


    The final estimated state-action value is computed using a simple mathematical
    operation that combines the estimated state value and advantage values as shown
    in Eq. (8.15). This computation is indicated by the red box in Fig. 8.3.


    The dueling network architecture can be used with the standard DQN or double DQN
    algorithm to sample mini-batches of transitions and update the network parameters
    during training. It can also be used with prioritized experience replay, which
    prioritizes transitions based on their estimated temporal difference error to
    improve the learning efficiency.


    Figure 8.4 shows the performance of dueling double DQN and DQN agents on the Atari
    River Raid game. The results display the average episode return (total undiscounted
    rewards) and a 95% confidence interval. To evaluate the agent’s performance, we
    ran 200,000 evaluation steps on a separate testing environment with an `\epsilon`-greedy
    policy and a fixed exploration epsilon (`\epsilon = 0.05`) at the end of each
    training iteration, which consisted of 250,000 training steps or 1 million frames,
    where no reward clipping or soft termination on loss of life is applied to the
    evaluation environment. The results were averaged over five independent runs and
    smoothed using a moving average with a window size of five.


    ![](images/605748_1_En_8_Chapter/605748_1_En_8_Fig4_HTML.png)


    A graph plots evaluation episode return versus training environment frames. It
    presents 2 increasing trends titled D Q N and dueling double D Q N. The line titled
    dueling double D Q N presents a higher peak.


    **Fig. 8.4** Dueling double DQN vs. DQN on the Atari game River Raid. The results
    display the average episode return (total undiscounted rewards) and a 95% confidence
    interval. The results were averaged over five independent runs, then further smoothed
    using a moving average with a window size of five


    Similar to the preceding experiment, we use learning rate `\alpha = 0.00025`,
    discount rate `\gamma = 0.99`, batch size 32, and replay capacity 100,000 in this
    experiment. We update the target network every 5000 updates.'
