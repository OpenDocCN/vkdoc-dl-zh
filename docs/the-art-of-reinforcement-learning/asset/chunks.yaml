    正态分布的概率密度函数呈钟形曲线，如图 10.1 所示。正态分布是许多现实世界分布的良好近似，因为它描述了围绕单个均值聚集的实值随机变量。理论上，对于正态分布，68%的总体或样本将落在总体或样本均值`μ`加减一个标准差`σ`的范围内，95%的总体或样本将落在均值两侧加减两个标准差（精确为
    1.96）的范围内。对于连续随机变量，获得任何特定值的概率始终为零，因为存在无限多个可能的值。


    在强化学习的背景下，我们知道策略`π(a|s)`只是从状态`s`到采取动作`a`的概率的映射。为了基于公式（10.1）构建连续动作的策略，我们需要考虑状态`s`和动作`a`。我们可以将公式（10.1）中的`x`替换为动作`a`。接下来，我们使用参数化函数`σ(s,
    θ_σ)`和`μ(s, θ_μ)`来近似均值`μ`和标准差`σ`。参数`θ_σ`和`θ_μ`在训练过程中学习，它们代表了策略基于观测状态生成动作的能力。这样一个策略的完整公式如下所示：

    '
- fmt: '![$$\displaystyle \begin{aligned} \pi(a|s, \boldsymbol{\theta}_{\sigma}, \boldsymbol{\theta}_{\mu})
    = \frac{1}{\sigma(s, \boldsymbol{\theta}_{\sigma}) \sqrt{2\pi}} \exp{- \frac{(a
    - \mu(s, \boldsymbol{\theta}_{\mu}))^2}{2\sigma(s, \boldsymbol{\theta}_{\sigma})^2}}
    {} \end{aligned} $$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_Equ2.png)


    (10.2)


    ![](images/605748_1_En_10_Chapter/605748_1_En_10_Fig1_HTML.png)


    A line graph for the Gaussian probability density function plots two normal distributions
    for `mu = 2`, `sigma a = 0.75` and `mu = 2`, `sigma = 1.5`. The peaks are approximately
    at 0.55 and 0.25 respectively.


    **Fig. 10.1** Example of a Gaussian probability density function with different
    mean `μ` and standard deviation `σ`


    Equation (10.2) represents a Gaussian distribution centered around the mean `μ(s,
    θ_μ)` and with a standard deviation of `σ(s, θ_σ)`. If we know the mean and standard
    deviation for the policy, we can then sample actions from this distribution.


    We can use any of the approximation methods introduced in Part II of the book
    (such as linear or nonlinear methods) to construct the mean `μ(s, θ_μ)` and standard
    deviation `σ(s, θ_σ)` of a normal distribution. It is important to keep in mind
    that the standard deviation must always be positive, so in practice we often take
    the exponential after the approximation. In this book, we focus specifically on
    using neural networks to approximate `μ` and `σ`.


    In practice, it is also possible to use a single neural network with partially
    shared weights and two separate heads to approximate `μ` and `σ`, as shown on
    the left side of Fig. 10.2. By sharing some of the network parameters, we can
    reduce the overall number of parameters in the network, thus save computation,
    this could also improve the convergence speed for some tasks as we have lesser
    parameters to optimize. Here, `N` represents the dimension of the action space
    in the task, such as the number of joints in a robotic arm.


    In some cases, the standard deviation is not directly connected to any of the
    hidden layers of the policy network, as shown on the right side of Fig. 10.2.
    Instead, it is usually treated as a separate output that is computed independent
    of the output of the hidden layers of the network.


    ![](images/605748_1_En_10_Chapter/605748_1_En_10_Fig2_HTML.png)


    Two flowcharts of the neural network architecture to approximate the mean micron
    and standard deviation sigma for a Gaussian distribution. Both flows start with
    input data, flow through 64 hidden units via `Tanh` links, and end with compute
    Gaussian distribution. On the right, `N` units pointing to sigma are not linked
    with the flow.


    **Fig. 10.2** Examples of neural network architecture to approximate the mean
    `μ` and standard deviation `σ` for a Gaussian distribution


    One reason for this design choice is that the standard deviation is typically
    modeled as a non-negative scalar value, which can be more easily handled as a
    separate output rather than being incorporated into the activations of the hidden
    layers. Additionally, by separating the standard deviation from the hidden layers,
    the policy network can learn to adjust the level of stochasticity in the output
    actions without affecting the underlying structure of the network’s hidden layers.


    Another advantage of this approach is that it can allow for more efficient computation
    during training and inference. By decoupling the standard deviation from the hidden
    layers, the network can generate different levels of stochasticity without having
    to recompute the hidden layers for each level of variance.


    For many locomotion tasks, we often use the Hyperbolic Tangent (`Tanh`) as the
    activation function instead of the rectified linear unit (`ReLU`), because `Tanh`
    has a more symmetric range that covers both positive and negative values, as shown
    in Fig. 10.3.


    ![](images/605748_1_En_10_Chapter/605748_1_En_10_Fig3_HTML.png)


    Two 4-quadrant plots for `ReLU` and `Tanh` between `y` and `x`. `ReLU` has `y
    = max(0, x)` and the line follows the horizontal axis in quadrant 2 and rises
    linearly in quadrant 1. `Tanh` has `y = tanh(x)` and has a logistic growth curve
    passing through (0, 0).


    **Fig. 10.3** Example of `ReLU` vs. `Tanh` activation function


    As mentioned in the previous chapter, using entropy as a regularization term can
    encourage the agent to explore more, which is especially beneficial for complex
    problems, such as those involving continuous action spaces.


    Entropy is a measure of the uncertainty or randomness in a probability distribution.
    By adding entropy to the objective function of a reinforcement learning algorithm,
    we can encourage the agent to take actions that are less predictable and explore
    more of the state space.


    For a continuous action space, the agent samples actions from a learned Gaussian
    distribution, where the learned network outputs the mean and standard deviation
    of the Gaussian distribution for each continuous action. The entropy of the Gaussian
    distribution is calculated using the following formula:


    ![$$\displaystyle \begin{aligned} H = \frac{1}{2} \sum_{i=1}^{n} \left(\log(2\pi
    e \sigma_i^2) \right) \end{aligned} $$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_Equ3.png)


    (10.3) where `n` is the dimension of the continuous action space, and `σ_i` is
    the standard deviation of the action at `i` dimension. This formula reflects the
    fact that the entropy of a Gaussian distribution increases as its variance increases,
    which encourages exploration in the policy.


    In theory, these are the only changes we need to make in order to use policy-based
    methods to solve reinforcement learning problems with continuous action space
    when compared to using the policy-based methods to solve reinforcement learning
    problems with discrete action space. The overall training procedure is the same
    when compared to the cases for discrete action space. However, the training hyperparameters
    like learning rate might need to be fine-tuned for the continuous case. In practice,
    we may also want to do some additional work, such as normalize the environment
    state before feeding it into the neural network and normalize the reward signal.'
