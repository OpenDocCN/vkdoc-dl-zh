- fmt: '### Unstable Policy Updates


    Policy gradient methods are a class of reinforcement learning algorithms that
    optimize a parameterized policy directly to maximize the expected return, which
    is the sum of discounted rewards received from the environment. One common issue
    with policy gradient methods is that they can be unstable and converge slowly,
    especially in high-dimensional or complex environments. In this context, “converge
    slowly” means that it can take a lot of iterations or training steps before the
    policy gradient method finds a good policy, which can lead to long training times
    or even failure to converge.


    The main reason behind this issue is because the policy gradient method uses stochastic
    gradient ascent methods to update the parameters of the policy, where it uses
    a step size `α` to adjust the parameters:


    ```

    θ = θ + α ∇_θ J(θ)

    ```


    And choosing a good step size for the update is not very easy. If the step is
    too large, performance collapse is possible, where the policy becomes worse than
    the initial policy, and the optimization fails to converge to a good solution.
    This happens because the policy can move too far away from the optimal policy,
    resulting in a lower expected return. One good example of a too large step size
    is when the policy can oscillate around the optimal policy, never converging to
    a stable solution.


    This is because in reinforcement learning, bad policy means bad training samples.
    This is especially fatal for on-policy learning methods such as standard policy
    gradient methods. Because once the agent starts to following some really bad policy
    to act in the environment, it may not be able to recover from a bad choice and
    collapse in performance.


    Using a smaller step size in the policy optimization process is a common solution
    to address the stability issue. However, this approach also has its drawbacks.
    When using a smaller step size, the update to the policy is slower and requires
    more iterations to converge to the optimal solution. This results in a longer
    training time and increased computational resources. In addition, using a small
    step size can also slow down the convergence rate, making it more difficult to
    find the optimal policy.


    Furthermore, using a small step size may also prevent the policy from exploring
    the state and action spaces effectively. If the step size is too small, the policy
    may get stuck in a local optima and fail to find the global optima. This can result
    in suboptimal policies that do not perform well in the given environment.


    In short, using a smaller step size can reduce the risk of performance divergence,
    but it also slows down the learning process and can lead to suboptimal policies.
    A trade-off must be made between stability and efficiency in the policy optimization
    process.


    However, the issue is not just about the right step size. The reason is the distance
    between two policies in policy space, defined by the space of possible policies,
    may not correspond to the distance between the corresponding policy parameters
    in parameter space. Or simply put, small changes to the policy parameters could
    result into very large change in the action probability.


    To illustrate this problem, consider a parameterized policy `π(a|θ)` where `θ`
    is just a single scalar. The policy is defined as follows:


    ```

    π(a=1|θ) = 1 / (1 + e^{-θ})

    ```


    ```

    π(a=0|θ) = 1 - π(a=1|θ)

    ```


    Now, let’s evaluate the policy at two different parameter values, `θ_1 = 0` and
    `θ_2 = 1`. At `θ_1`, the policy selects action `a=0` with probability `π(a=0|θ_1)
    = 1/2` and action `a=1` with probability `π(a=1|θ_1) = 1/2`.


    At `θ_2`, the policy selects action `a=1` with probability `π(a=1|θ_2) ≈ 0.73`
    and action `a=0` with probability `π(a=0|θ_2) ≈ 0.27`.


    We can see that a small change in the policy parameter from `θ_1` to `θ_2` results
    in a large change in the action probability. In fact, the probability of selecting
    action `a=1` has increased by more than 45% from `θ_1` to `θ_2`. This highlights
    the sensitivity of the policy to small changes in the policy parameters and underscores
    the importance of careful selection of optimization methods and step sizes in
    policy gradient algorithms.'
