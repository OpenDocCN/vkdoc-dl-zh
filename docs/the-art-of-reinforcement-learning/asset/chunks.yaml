  trans: "\n这里，`π(a|s)` 表示在遵循策略 `π` 时，在状态 `s` 下采取行动 `a` 的概率。\n\n有了这个概念，我们可以定义 `V_π`\
    \ 和 `Q_π` 的贝尔曼方程。方程 (2.12) 被称为 `V_π` 的贝尔曼期望方程；在该方程中，我们使用即时奖励 `R_t` 和后继状态的折现值 `γ\
    \ V_π(S_{t+1})` 来计算在某个策略 `π` 下状态 `s` 的价值 `V_π(s)`。\n\n```\nV_π(s) = E_π[ G_t |\
    \ S_t = s ]\n       = E_π[ R_t + γ R_{t+1} + γ² R_{t+2} + ... | S_t = s ]\n  \
    \     = E_π[ R_t + γ ( R_{t+1} + γ R_{t+2} + ... ) | S_t = s ]\n       = E_π[\
    \ R_t + γ G_{t+1} | S_t = s ]\n       = E_π[ R_t + γ V_π(S_{t+1}) | S_t = s ]\n\
    ```\n\n(2.12)\n\n```\n     = Σ_{a ∈ A} π(a|s) [ R(s, a) + γ Σ_{s' ∈ S} P(s'|s,\
    \ a) V_π(s') ], 对于所有 s ∈ S\n```\n\n(2.13)\n\n方程 (2.13) 通过加权在策略 `π` 下处于状态 `s` 时采取行动\
    \ `a` 的概率，进一步扩展了 `V_π` 的贝尔曼期望方程；它还通过使用当智能体处于状态 `s` 并采取行动 `a` 时转移到特定后继状态的概率，来加权每个后继状态\
    \ `V_π(s')` 的价值。该方程也称为 `V_π` 的贝尔曼方程。\n\n类似地，方程 (2.14) 是 `Q_π` 的贝尔曼期望方程，而方程 (2.16)\
    \ 是 `Q_π` 的贝尔曼方程。请注意，方程 (2.16) 涉及对下一个状态-行动对价值的条件化，而其他方程则没有。这初看起来可能有些奇怪，但这是必要的，因为下一个状态和行动是随机变量，贝尔曼方程需要表达状态-行动对的期望值，并考虑所有可能的结果。具体来说，方程\
    \ (2.16) 涉及对后继状态-行动对 `(s', a')` 价值的一个新期望，因为该对依赖于智能体的策略。\n\n```\nQ_π(s, a) = E_π[\
    \ G_t | S_t = s, A_t = a ]\n          = E_π[ R_t + γ R_{t+1} + γ² R_{t+2} + ...\
    \ | S_t = s, A_t = a ]\n          = E_π[ R_t + γ G_{t+1} | S_t = s, A_t = a ]\n\
    \          = E_π[ R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t = s, A_t = a ]\n```\n\n\
    (2.14)\n\n```\n     = R(s, a) + γ E_π[ Q_π(s', a') | S_{t+1} = s', A_{t+1} = a'\
    \ ]\n```\n\n(2.15)\n\n```\n     = R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) Σ_{a' ∈ A}\
    \ π(a'|s') Q_π(s', a'), 对于所有 s ∈ S, a ∈ A\n```\n\n(2.16)\n\n由于 `V_π` 和 `Q_π` 之间存在如方程\
    \ (2.11) 所示的关系，我们也可以将 `Q_π` 的贝尔曼方程重写为\n\n```\nQ_π(s, a) = R(s, a) + γ Σ_{s' ∈\
    \ S} P(s'|s, a) V_π(s'), 对于所有 s ∈ S, a ∈ A\n```\n\n(2.17)\n\n一个两层的 V pi 备份图。根节点是状态\
    \ s，其平均值分裂为两个行动，弧角为 pi。这两个行动具有弧角 p，并且每个都有两个状态转移。行动 a, r 导向状态 s'。\n\n**图 2.9**\
    \ `V_π` 的备份图\n\n推导方程 (2.17) 所需的额外步骤是必要的，因为在某些情况下，我们没有对 `Q_π(s, a)` 的准确估计，正如我们稍后在书中介绍动态规划算法时会看到的那样。\n\
    \n贝尔曼方程是求解 `V_π` 和 `Q_π` 的核心。这意味着，如果我们使用价值函数方法（即估计状态或状态-行动对的价值），它们也是解决强化学习问题的核心。例如，`V_π`\
    \ 的贝尔曼方程表明，一个状态的价值可以分解为两部分：即时奖励 `R(s, a)` 和后继状态的折现值 `γ Σ_{s' ∈ S} P(s'|s, a) V_π(s')`，这些后继状态是在策略\
    \ `π` 下可以从 `s` 到达的状态。在某些环境中，可能存在多个后继状态 `s'`，我们计算所有后继状态的期望值。类似的概念也适用于 `Q_π`，它估计在状态\
    \ `s` 下采取行动 `a` 并随后遵循策略 `π` 的价值。\n"
- fmt: 'Bellman equations form the basis for a series of algorithms we will introduce
    later in the book to compute or approximate `V_π` and `Q_π`, which are at the
    core of so-called value-based methods for reinforcement learning. The Bellman
    equations help us define the rules for transferring value back to a state from
    its successor states, which we often call the update or backup operation. Sometimes,
    we also call them the update (backup) rule for the value functions `V_π` and `Q_π`.
    Value function methods are one class of reinforcement learning algorithms, and
    there are many others we will discuss later in the book.


    Figure 2.9 is a backup diagram that can help us better understand Eq. (2.13).
    In this diagram, open circles represent states, and black dots represent actions.
    At the root is a state node `s`, and in state `s`, there may be multiple actions
    that the agent can choose from (we only show two actions). The exact action `a`
    that is chosen will depend on the policy `π` that the agent is following. From
    each action `a`, the environment could transition into one of several successor
    states `s''` (we show two such successor states), with a transition probability
    `p` that depends on `(s, a)`. The Bellman equation takes the expectation (as indicated
    by the little arc under the root state node `s` and action node `a`) over all
    possible outcomes, weighted by the probability of their occurrence. The term `∑_{a
    ∈ A} π(a|s)` represents the expectation over all actions for state `s`, weighted
    by the probability of each action being selected according to the policy `π`.
    The term `∑_{s'' ∈ S} P(s''|s, a)` represents the expectation over all possible
    successor states `s''`, weighted by the state transition probability from the
    environment.


    We can also draw a backup diagram for Eq. (2.16). The idea of taking an expectation
    over all possible outcomes, which we explained when introducing the Bellman equation
    for `V_π`, also applies here. As we can see from Fig. 2.10, we start from the
    first action node, which represents the action `a` taken by the agent. When the
    agent takes action `a` in state `s` (not necessarily following policy `π` when
    taking the action), the environment could transition into one of several successor
    states `s''` (we show two such successor states), with a transition probability
    `p` that depends on `(s, a)`. In each of the successor states `s''`, there may
    be multiple actions that the agent can choose from (we only show two actions).
    The exact action `a''` chosen will depend on the policy `π` that the agent is
    following. The Bellman equation takes the expectation (as indicated by the little
    arc under the successor state `s''`) over all possible outcomes, weighted by the
    probability of their occurrence.


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig10_HTML.png)


    A backup diagram for `Q_π` with two levels. The root node has action `a`, `r`
    with average that splits into 2 states with arc angle `p`. The two states have
    arc angles `π` and have 2 actions each. Action `a`, `r` leads to state `s''`,
    which in turn leads to action `a''`.


    Fig. 2.10


    Backup diagram for `Q_π`'
