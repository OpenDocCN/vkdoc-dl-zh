    ## 4.5 Summary


    The chapter introduced Monte Carlo methods, a type of reinforcement learning algorithm
    used to estimate value functions and improve policies based on experience. Unlike
    dynamic programming, Monte Carlo methods are model-free and do not require knowledge
    of the environment’s reward and dynamics functions.


    The chapter provided a clear explanation of Monte Carlo policy evaluation, a method
    used to estimate the value of states by averaging the observed returns after visiting
    them. The chapter used concrete examples to illustrate the difference between
    first-visit Monte Carlo and every-visit Monte Carlo. Additionally, the chapter
    covered the incremental update technique, which allows for efficient updating
    of the value function after each episode.


    The chapter also highlighted the importance of the exploration-exploitation dilemma
    in reinforcement learning and how Monte Carlo methods address this issue by balancing
    the need to explore new states and actions with exploiting existing knowledge.
    Monte Carlo control was introduced as a method for improving policies by estimating
    the value of each state under the current policy and updating the policy to be
    greedy with respect to the estimated values.


    # 5. Temporal Difference Learning


    In the previous chapter (Chap. [4](#605748_1_En_4_Chapter.xhtml)), we introduced
    Monte Carlo (MC) methods for reinforcement learning, which allow an agent to learn
    from its own experience without relying on a model of the environment. However,
    MC methods are limited to episodic reinforcement learning problems, where the
    agent interacts with the environment in discrete episodes. In this chapter, we
    introduce temporal difference (TD) learning, a class of algorithms that generalize
    MC methods to support both episodic and continuing reinforcement learning problems.
    TD learning is based on the idea of updating value estimates using a combination
    of current rewards and estimated future rewards, making it a more versatile and
    efficient approach than MC methods for many types of reinforcement learning problems.
    We’ll explore the theory and implementation of various TD learning algorithms
    in this chapter.


    ## 5.1 Temporal Difference Learning


    In Chap. [4](#605748_1_En_4_Chapter.xhtml), we introduced Monte Carlo methods
    to solve episodic reinforcement learning problems, where the agent can learn from
    its own experience without requiring access to the model of the environment. However,
    Monte Carlo methods have two limitations that make them unsuitable for solving
    continuing reinforcement learning problems. The first major issue is that they
    do not support continuing reinforcement learning problems where there is no natural
    ending of the task, as in episodic problems, there is a terminal state that marks
    the end of the episode, whereas in continuing problems, the agent interacts with
    the environment indefinitely. The second minor issue is that the agent has to
    wait until the end of an episode to compute and update the estimated values, because
    Monte Carlo methods require the agent to experience a full episode before updating
    the estimated values. This may not be a problem for small reinforcement learning
    problems with very short episodes, such as our service dog MDP example. But for
    problems with long episodes, potentially thousands or millions of time steps,
    this waiting can slow down the learning process.


    Temporal difference (TD) learning proposed by Sutton [[1](#605748_1_En_5_Chapter.xhtml#CR1),
    [2](#605748_1_En_5_Chapter.xhtml#CR2)] is a model-free reinforcement learning
    method that overcomes these limitations. It’s called TD learning because the agent
    updates its estimates based on the difference between the predicted and actual
    rewards received by the agent in each state. More precisely, the agent updates
    the estimated value for a particular state `s` right after it receives the immediate
    reward `r` and the successor state `s''` from the environment, which is a tuple
    of `(s, a, r, s'')` (often called a transition). This *one-step look-ahead* allows
    the agent to update its estimates based on the immediate reward and the estimated
    value of the next state, without waiting for the end of an episode.


    One way to think of TD learning is that the agent is continuously adjusting its
    estimates of the value of each state based on new information as it becomes available.
    This is in contrast to Monte Carlo methods, which only update estimates at the
    end of each episode.


    TD learning is widely used in real-world applications and is central to solving
    reinforcement learning problems. It’s an efficient and flexible algorithm that
    allows agents to learn in a continuous and incremental manner, making it suitable
    for real-world applications. Other model-free reinforcement learning algorithms,
    such as Q-learning and SARSA (which we will introduce later in this chapter),
    build on top of this concept.


    To summarize, TD learning is a powerful method for solving reinforcement learning
    problems, and its “one-step look-ahead” approach allows agents to update their
    estimates quickly and continuously.'
