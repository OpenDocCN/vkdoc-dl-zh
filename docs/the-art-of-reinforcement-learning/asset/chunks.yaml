    方程（3.3）告诉我们如何使用 `Q_π` 更新状态-动作对 `(s, a)` 的值，但我们目前还没有 `Q_π` 的精确估计。幸运的是，`Q_π` 与 `V_π`
    之间存在关系，其中 `V_π(s) = Σ_{a ∈ A} π(a|s) Q_π(s, a)`。我们已经知道如何使用策略评估算法来计算策略 `π` 的状态价值函数
    `V_π`。并且我们可以简单地将 `V_π` 代入方程（3.4），这将帮助我们完成估计的状态-动作价值函数 `Q_π` 的值更新规则。


    ```

    Q_π(s, a) = R(s, a) + γ Σ_{s'' ∈ S} P(s''|s, a) V_π(s''), 对于所有 s ∈ S, a ∈ A

    ```


    (3.4)


    这个方程告诉我们，在状态 `s` 下采取动作 `a` 并随后遵循策略 `π` 的价值，等于期望奖励 `R_t` 加上下一状态 `S_{t+1}` 的折扣价值，而下一状态的价值由状态价值函数
    `V_π(S_{t+1})` 给出。我们可以使用策略评估算法计算所有状态-动作对的 `Q_π`。


    一旦我们有了状态-动作价值函数 `Q_π` 的估计，就可以执行策略迭代，这包括通过使策略相对于 `Q_π` 变得更贪婪来改进策略。具体来说，我们可以通过在每个状态下选择最大化状态-动作价值函数的动作来构建一个新策略
    `π''`。


    我们现在介绍*策略改进*算法，如算法 3 所示。该算法接收任意策略 `π`（来自策略评估算法）的估计状态价值函数 `V_π` 作为输入。然后它遍历状态空间中的所有状态；对于每个状态，它遍历该状态下的所有（合法）动作，基于环境模型和
    `V_π` 计算状态-动作价值函数 `Q_π`。遍历完成后，它使用 `Q_π` 计算一个更好、改进后的确定性策略 `π''`。具体做法是遍历状态空间中的所有状态；对于每个状态，它更新每个动作的策略概率分布，使得选择具有最高估计价值
    `Q_π(s, a)` 的动作的概率为 1，而选择其他动作的概率为 0。


    算法 3：策略改进，迭代算法


    ![](img/605748_1_En_3_Figaac_HTML.gif) 一个名为“策略改进，迭代算法”的 10 行算法，接收以下输入，输出改进后的确定性策略
    `π''`。输入包括：策略 `π` 的估计状态价值函数 `V_π` 和折扣率 `γ`。


    策略改进算法包含两个步骤：第一步是使用方程（3.3）和环境模型，为当前策略 `π` 计算估计的状态-动作价值函数 `Q_π`；第二步是基于 `Q_π` 构建一个新的、更好的确定性策略
    `π''`，从而改进策略 `π`。与策略评估算法不同，策略改进算法不会无限运行。它只执行这两个步骤一次。这是合理的，因为现在我们有了一个新的、更好的策略 `π''`；由于策略已经改变，旧的状态价值函数
    `V_π` 不再代表这个新策略的价值。


    为了实现算法 3，我们可以使用一个形状为（状态空间大小，动作空间大小）的二维矩阵来表示状态-动作价值函数 `Q_π`。需要注意的一点是，在构建改进策略的过程中，我们只应考虑特定状态下的合法动作；合法动作是指当前状态下可用的动作。排除非法动作很重要，因为这能确保动作选择过程正确执行，并且不会导致次优甚至危险的行为。


    在强化学习中，当基于估计的状态-动作价值函数构建策略时，排除非法动作尤为重要。如果不排除非法动作，策略可能会选择次优甚至非法的动作，从而导致性能不佳或无法达到预期目标。通过在动作选择过程中仅考虑合法动作，策略可以确保在给定状态下选择可能的最佳动作，同时仍然满足任何约束或安全要求。


    例如，考虑一个在工厂环境中运行的机器人，它受到某些安全约束，例如不能与其他机器人或物体碰撞。如果机器人的动作选择过程包含非法动作，例如向会导致碰撞的方向移动，则可能对自身、其他机器人或工厂环境造成损害。


    另一个具体例子如下：假设对于某个状态 `s`，所有合法动作的价值都是负数 `Q_π(s, a) < 0`；如果我们不排除非法动作，那么标准的 `argmax`
    将总是选择其中一个非法动作，因为零大于负数。

