  trans: "\n### 马尔可夫链的转移矩阵\n\n转移矩阵 `P` 是表示马尔可夫链动力学函数（或转移模型）的一种便捷方式。它将所有可能的状态转移列在一个矩阵中，其中每一行代表当前状态\
    \ `s`，每一列代表后继状态 `s'`。从状态 `s` 转移到状态 `s'` 的转移概率记为 `P(s'|s)`。由于我们讨论的是概率，因此每一行的总和始终等于\
    \ 1.0。下面，我们列出服务犬马尔可夫链的转移矩阵：\n\n![](img/605748_1_En_2_Figa_HTML.png)\n\n服务犬马尔可夫链的转移矩阵。房间\
    \ 1、房间 2、房间 3、室外、找到物品和结束对应的列和行表示状态。\n\n![](img/605748_1_En_2_Fig4_HTML.png)\n\n\
    服务犬马尔可夫链的转移图。房间 1 通向房间 2，接着是房间 3 和找到物品，箭头分别对应 `p` 等于 0.8、`p` 等于 0.4 和 `p` 等于 0.8。室外通过\
    \ `p` 等于 0.4 和 0.2 连接到房间 2。找到物品通过 `p` 等于 1.0 通向结束。\n\n**图 2.4** 服务犬马尔可夫链\n\n有了环境的动力学函数，我们可以从环境中采样一些状态转移序列\
    \ `S0, S1, S2, ...`。例如：\n\n- 片段 1：（房间 1，房间 2，房间 3，找到物品，结束）\n- 片段 2：（房间 3，找到物品，结束）\n\
    - 片段 3：（房间 2，室外，房间 2，房间 3，找到物品，结束）\n- 片段 4：（室外，室外，室外，……）\n\n我们现在对环境中的状态转移有了基本了解；接下来，让我们在过程中加入奖励。\n\
    \n## 2.4 马尔可夫奖励过程\n\n如前所述，强化学习智能体的目标是最大化奖励，因此下一步自然是在马尔可夫链过程中加入奖励。马尔可夫奖励过程（MRP）是马尔可夫链的扩展，其中在过程中加入了奖励。在马尔可夫奖励过程中，智能体不仅观察状态转移，还会在此过程中接收奖励信号。注意，MRP\
    \ 中仍然不涉及动作。我们可以将马尔可夫奖励过程定义为一个元组 `(S, P, R)`，其中：\n\n- `S` 是一个有限的状态集合，称为状态空间。\n\
    - `P` 是环境的动力学函数（或转移模型），其中 `P(s'|s) = P[S_{t+1}=s' | S_t=s]` 指定了在当前状态 `s` 下，环境转移到后继状态\
    \ `s'` 的概率。\n- `R` 是环境的奖励函数。`R(s) = E[R_t | S_t=s]` 是当智能体处于状态 `s` 时，环境提供的奖励信号。\n\
    \n如图 2.5 所示，我们在服务犬示例中为每个状态添加了一个奖励信号。正如我们在第 1 章中简要讨论过的，我们希望奖励信号与我们的目标（即找到物品）一致，因此我们决定对*找到物品*状态使用最高的奖励信号。对于*室外*状态，奖励信号为\
    \ +1，因为与在不同房间之间徘徊相比，在室外玩耍可能对智能体来说更愉快。\n\n![](img/605748_1_En_2_Fig5_HTML.png)\n\
    \n带有奖励信号的服务犬 MRP 转移图。房间 1 通向房间 2，接着是房间 3（`r` 等于 -1）和找到物品（`r` 等于 +10），通过标记为 `p`\
    \ 等于 0.8、`p` 等于 0.4 和 `p` 等于 0.8 的箭头。室外具有 `r` 等于 +1，结束具有 `r` 等于 0。\n\n**图 2.5**\
    \ 服务犬 MRP\n\n有了奖励信号，我们可以计算智能体在这些不同样本序列中可能获得的总奖励，其中总奖励是针对整个序列计算的：\n\n- 片段 1：（房间\
    \ 1，房间 2，房间 3，找到物品，结束）\n  - **总奖励** `= -1 - 1 - 1 + 10 + 0 = 7.0`\n- 片段 2：（房间\
    \ 3，找到物品，结束）\n  - **总奖励** `= -1 + 10 = 9.0`\n- 片段 3：（房间 2，室外，房间 2，房间 3，找到物品，结束）\n\
    \  - **总奖励** `= -1 + 1 - 1 - 1 + 10 + 0 = 8.0`\n- 片段 4：（室外，室外，室外，……）\n  - **总奖励**\
    \ `= 1 + 1 + ... = ∞`\n"
- fmt: "### Return\n\nTo quantify the total rewards the agent can get in a sequence\
    \ of states, we use a different term called *return*. The return `G_t` is simply\
    \ the sum of rewards from time step `t` to the end of the sequence and is defined\
    \ by the mathematical equation in Eq. (2.2), where `T` is the terminal time step\
    \ for episodic reinforcement learning problems.\n\n```\nG_t = R_t + R_{t+1} +\
    \ R_{t+2} + ... + R_{T-1}\n```\n\n(2.2)\n\nOne issue with Eq. (2.2) is that the\
    \ return `G_t` could become infinite in cases where there are recursion or loops\
    \ in the process, such as in our sample sequence episode 4. For continuing reinforcement\
    \ learning problems, where there is no natural end to the task, the return `G_t`\
    \ could also easily become infinite. To resolve this issue, we introduce the discount\
    \ factor.\n\nThe discount factor `γ` is a parameter, where `0 ≤ γ ≤ 1`, that helps\
    \ us to solve the infinite return problem. By discounting rewards received at\
    \ future time steps, we can avoid the return becoming infinite. When we add the\
    \ discount factor to the regular return in Eq. (2.2), the return becomes the *discounted\
    \ sum of rewards* from time step `t` to a horizon `H`, which can be the length\
    \ of the episode or even infinity for continuing reinforcement learning problems.\
    \ We’ll be using Eq. (2.3) as the definition of return for the rest of the book.\
    \ Notice that we omit the discount `γ` for the immediate reward `R_t`, since `γ^0\
    \ = 1`.\n\n```\nG_t = R_t + γ R_{t+1} + γ^2 R_{t+2} + ... + γ^{H-1-t} R_{H-1}\n\
    ```\n\n(2.3)\n\nWe want to emphasize that the discount factor `γ` not only helps\
    \ us to solve the infinite return problem, but it can also influence the behavior\
    \ of the agent (which will make more sense when we later talk about value functions\
    \ and policy). For example, when `γ = 0`, the agent only cares about the immediate\
    \ reward, and as `γ` gets closer to 1, future rewards become as important as immediate\
    \ rewards. Although there are methods that do not use discount, the mathematical\
    \ complexity of such methods is beyond the scope of this book.\n\nThere is a useful\
    \ property about the return `G_t` in reinforcement learning: the return `G_t`\
    \ is the sum of the immediate reward `R_t` and the discounted return of the next\
    \ time step `γ G_{t+1}`. We can rewrite it recursively as shown in Eq. (2.4).\
    \ This recursive property is important in MRPs, MDPs and reinforcement learning\
    \ because it forms the foundation for a series of essential mathematical equations\
    \ and algorithms, which we will introduce later in this chapter and in the next\
    \ few chapters.\n\n```\nG_t = R_t + γ R_{t+1} + γ^2 R_{t+2} + γ^3 R_{t+3} + ...\n\
    \    = R_t + γ (R_{t+1} + γ R_{t+2} + γ^2 R_{t+3} + ...)\n    = R_t + γ G_{t+1}\n\
    ```\n\n(2.4)\n\nWe can compute the return `G_t` for the sample sequences of a\
    \ particular MRP or even MDP. The following shows the returns for some sample\
    \ episodes in our service dog example, where we use discount factor `γ = 0.9`:\n\
    \n- Episode 1: (Room 1, Room 2, Room 3, Found item, End)\n  - `G_0 = -1 -1 * 0.9\
    \ -1 * 0.9^2 + 10 * 0.9^3 = 4.6`\n- Episode 2: (Room 3, Found item, End)\n  -\
    \ `G_0 = -1 + 10 * 0.9 = 8.0`\n- Episode 3: (Room 2, Outside, Room 2, Room 3,\
    \ Found item, End)\n  - `G_0 = -1 + 1 * 0.9 -1 * 0.9^2 -1 * 0.9^3 + 10 * 0.9^4\
    \ = 4.9`\n- Episode 4: (Outside, Outside, Outside, …)\n  - `G_0 = 1 + 1 * 0.9\
    \ + 1 * 0.9^2 + ... = 10.0`\n\nAs long as the discount factor is not 1, we won’t\
    \ have the infinite return problem even if there’s a loop in the MRP process.\
    \ Comparing the return for these different sample sequences, we can see that episode\
    \ 4 has the highest return value. However, if the agent gets stuck in a loop staying\
    \ in the same state *Outside*, it has no way to achieve the goal, which is to\
    \ find the object in *Room 3*. This does not necessarily mean that the reward\
    \ function is flawed. To prove this, we need to use the value function, which\
    \ we will explain in detail in the upcoming sections."
  raw: '### Return


    To quantify the total rewards the agent can get in a sequence of states, we use
    a different term called *return*. The return ![$$G_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq68.png)
    is simply the sum of rewards from time step *t* to the end of the sequence and
    is defined by the mathematical equation in Eq. ([2.2](#605748_1_En_2_Chapter.xhtml#Equ2)),
    where *T* is the terminal time step for episodic reinforcement learning problems.^([⁴](#fn4))


    ![$$\displaystyle \begin{aligned} G_t=R_t + R_{t+1} + R_{t+2} + \cdot\cdot\cdot
    + R_{T-1} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ2.png)


    (2.2)


    One issue with Eq. ([2.2](#605748_1_En_2_Chapter.xhtml#Equ2)) is that the return
    ![$$G_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq78.png) could
    become infinite in cases where there are recursion or loops in the process, such
    as in our sample sequence episode 4\. For continuing reinforcement learning problems,
    where there is no natural end to the task, the return ![$$G_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq79.png)
    could also easily become infinite. To resolve this issue, we introduce the discount
    factor.


    The discount factor ![$${\gamma }$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq80.png)
    is a parameter, where ![$$0 \leq {\gamma } \leq 1$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq81.png)
    , that helps us to solve the infinite return problem. By discounting rewards received
    at future time steps, we can avoid the return becoming infinite. When we add the
    discount factor to the regular return in Eq. ([2.2](#605748_1_En_2_Chapter.xhtml#Equ2)),
    the return becomes the *discounted sum of rewards* from time step *t* to a horizon
    *H*, which can be the length of the episode or even infinity for continuing reinforcement
    learning problems. We’ll be using Eq. ([2.3](#605748_1_En_2_Chapter.xhtml#Equ3))
    as the definition of return for the rest of the book. Notice that we omit the
    discount ![$${\gamma }$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq82.png)
    for the immediate reward ![$$R_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq83.png)
    , since ![$${\gamma }^0=1$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq84.png)
    .


    ![$$\displaystyle \begin{aligned} G_t=R_t + {\gamma} R_{t+1} + {\gamma}^2 R_{t+2}
    + \cdot\cdot\cdot + \gamma^{H-1-t} R_{H-1} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ3.png)


    (2.3)


    We want to emphasize that the discount factor ![$${\gamma }$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq85.png)
    not only helps us to solve the infinite return problem, but it can also influence
    the behavior of the agent (which will make more sense when we later talk about
    value functions and policy). For example, when ![$${\gamma }=0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq86.png)
    , the agent only cares about the immediate reward, and as ![$${\gamma }$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq87.png)
    gets closer to 1, future rewards become as important as immediate rewards. Although
    there are methods that do not use discount, the mathematical complexity of such
    methods is beyond the scope of this book.


    There is a useful property about the return ![$$G_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq88.png)
    in reinforcement learning: the return ![$$G_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq89.png)
    is the sum of the immediate reward ![$$R_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq90.png)
    and the discounted return of the next time step ![$${\gamma } G_{t+1}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq91.png)
    . We can rewrite it recursively as shown in Eq. ([2.4](#605748_1_En_2_Chapter.xhtml#Equ4)).
    This recursive property is important in MRPs, MDPs and reinforcement learning
    because it forms the foundation for a series of essential mathematical equations
    and algorithms, which we will introduce later in this chapter and in the next
    few chapters.


    ![$$\displaystyle \begin{aligned} \begin{aligned}[b] G_t &amp; =R_t + {\gamma}
    R_{t+1} + {\gamma}^2 R_{t+2} + {\gamma}^3 R_{t+3} + \cdot\cdot\cdot \\ &amp; =R_t
    + {\gamma} \bigl( R_{t+1} + {\gamma} R_{t+2} + {\gamma}^2 R_{t+3} + \cdot\cdot\cdot
    \bigr) \\ &amp; =R_t + {\gamma} G_{t+1} \end{aligned} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ4.png)


    (2.4)


    We can compute the return ![$$G_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq92.png)
    for the sample sequences of a particular MRP or even MDP. The following shows
    the returns for some sample episodes in our service dog example, where we use
    discount factor ![$${\gamma }=0.9$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq93.png)
    :


    *   Episode 1: (Room 1, Room 2, Room 3, Found item, End)


    *   ![$$G_0=-1 -1 * 0.9 -1 * 0.9^2 + 10 * 0.9 ^3=4.6$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq94.png)


    *   Episode 2: (Room 3, Found item, End)


    *   ![$$G_0=-1 + 10 * 0.9=8.0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq95.png)


    *   Episode 3: (Room 2, Outside, Room 2, Room 3, Found item, End)


    *   ![$$G_0=-1 + 1 * 0.9 -1 * 0.9^2 -1 * 0.9^3 + 10 * 0.9^4=4.9$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq96.png)


    *   Episode 4: (Outside, Outside, Outside, …)


    *   ![$$G_0=1 + 1 * 0.9 +1 * 0.9^2 + \cdot \cdot \cdot =10.0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq97.png)


    As long as the discount factor is not 1, we won’t have the infinite return problem
    even if there’s a loop in the MRP process. Comparing the return for these different
    sample sequences, we can see that episode 4 has the highest return value. However,
    if the agent gets stuck in a loop staying in the same state *Outside*, it has
    no way to achieve the goal, which is to find the object in *Room 3*. This does
    not necessarily mean that the reward function is flawed. To prove this, we need
    to use the value function, which we will explain in detail in the upcoming sections.'
  trans: "\n### 回报\n\n为了量化智能体在一系列状态中能获得的总奖励，我们使用一个不同的术语——*回报*。回报 `G_t` 就是从时间步 `t`\
    \ 到序列结束时的奖励总和，其数学定义如公式 (2.2) 所示，其中 `T` 是情节式强化学习问题的终止时间步。\n\n```\nG_t = R_t + R_{t+1}\
    \ + R_{t+2} + ... + R_{T-1}\n```\n\n(2.2)\n\n公式 (2.2) 的一个问题是，当过程中存在递归或循环时（例如我们示例序列中的情节\
    \ 4），回报 `G_t` 可能会变成无穷大。对于持续式强化学习问题（任务没有自然终点），回报 `G_t` 也很容易变成无穷大。为了解决这个问题，我们引入了折扣因子。\n\
    \n折扣因子 `γ` 是一个参数，满足 `0 ≤ γ ≤ 1`，它帮助我们解决无限回报问题。通过对未来时间步收到的奖励进行折扣，我们可以避免回报变成无穷大。当我们将折扣因子加入公式\
    \ (2.2) 的常规回报中时，回报就变成了从时间步 `t` 到某个视界 `H` 的*折扣奖励总和*，其中 `H` 可以是情节的长度，对于持续式强化学习问题甚至可以是无穷大。在本书的剩余部分，我们将使用公式\
    \ (2.3) 作为回报的定义。请注意，我们省略了即时奖励 `R_t` 的折扣 `γ`，因为 `γ⁰ = 1`。\n\n```\nG_t = R_t + γ\
    \ R_{t+1} + γ² R_{t+2} + ... + γ^{H-1-t} R_{H-1}\n```\n\n(2.3)\n\n我们想强调的是，折扣因子\
    \ `γ` 不仅帮助我们解决无限回报问题，还能影响智能体的行为（当我们稍后讨论价值函数和策略时，这一点会更清楚）。例如，当 `γ = 0` 时，智能体只关心即时奖励；而当\
    \ `γ` 接近 1 时，未来奖励与即时奖励变得同等重要。虽然存在不使用折扣的方法，但这些方法的数学复杂性超出了本书的范围。\n\n强化学习中回报 `G_t`\
    \ 有一个有用的性质：回报 `G_t` 等于即时奖励 `R_t` 与下一时间步的折扣回报 `γ G_{t+1}` 之和。我们可以将其递归地重写，如公式 (2.4)\
    \ 所示。这个递归性质在 MRP、MDP 和强化学习中非常重要，因为它构成了一系列关键数学方程和算法的基础，我们将在本章及后续几章中介绍这些内容。\n\n\
    ```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2} + γ³ R_{t+3} + ...\n    = R_t + γ (R_{t+1}\
    \ + γ R_{t+2} + γ² R_{t+3} + ...)\n    = R_t + γ G_{t+1}\n```\n\n(2.4)\n\n我们可以计算特定\
    \ MRP 甚至 MDP 的示例序列的回报 `G_t`。以下展示了我们服务犬示例中一些样本情节的回报，其中我们使用折扣因子 `γ = 0.9`：\n\n-\
    \ 情节 1：（房间 1，房间 2，房间 3，找到物品，结束）\n  - `G_0 = -1 -1 * 0.9 -1 * 0.9² + 10 * 0.9³\
    \ = 4.6`\n- 情节 2：（房间 3，找到物品，结束）\n  - `G_0 = -1 + 10 * 0.9 = 8.0`\n- 情节 3：（房间 2，室外，房间\
    \ 2，房间 3，找到物品，结束）\n  - `G_0 = -1 + 1 * 0.9 -1 * 0.9² -1 * 0.9³ + 10 * 0.9⁴ = 4.9`\n\
    - 情节 4：（室外，室外，室外，……）\n  - `G_0 = 1 + 1 * 0.9 + 1 * 0.9² + ... = 10.0`\n\n只要折扣因子不为\
    \ 1，即使 MRP 过程中存在循环，我们也不会遇到无限回报问题。比较这些不同样本序列的回报，我们可以看到情节 4 的回报值最高。然而，如果智能体陷入循环，一直停留在*室外*状态，它就无法实现目标（即在*房间\
    \ 3* 中找到物品）。这并不一定意味着奖励函数有缺陷。要证明这一点，我们需要使用价值函数，我们将在接下来的章节中详细解释。\n"
- fmt: "### Value Function for MRPs\n\nIn Markov reward processes (MRPs), the return\
    \ `G_t` measures the total future reward from time step `t` to the end of the\
    \ episode. However, comparing returns for different sample sequences alone has\
    \ its limits, as it only measures returns starting from a particular time step.\
    \ This is not very helpful for an agent in a specific environment state who needs\
    \ to make a decision. The value function can help us overcome this problem.\n\n\
    Formally, the state value function `V(s)` for MRP measures the *expected return*\
    \ starting from state `s` and to a horizon `H`. We call it the expected return\
    \ because the trajectory starting from state `s` to a horizon `H` is often a random\
    \ variable. In simple words, `V(s)` measures the average return starting from\
    \ state `s` and up to a horizon `H`. For episodic problems, the horizon is just\
    \ the terminal time step, that is, `H=T`.\n\n```\nV(s) = E[G_t | S_t = s]\n```\n\
    \n(2.5)\n\nThe state value function `V(s)` for MRPs also shares the recursive\
    \ property as shown in Eq. (2.6). Equation (2.6) is also called the Bellman expectation\
    \ equation for `V(s)` (for MRPs). We call it the Bellman expectation equation\
    \ because it’s written in a recursive manner but still has the expectation sign\
    \ `E` attached to it.\n\n```\nV(s) = E[G_t | S_t = s]\n     = E[R_t + γ R_{t+1}\
    \ + γ^2 R_{t+2} + ... | S_t = s]\n     = E[R_t + γ (R_{t+1} + γ R_{t+2} + ...)\
    \ | S_t = s]\n     = E[R_t + γ G_{t+1} | S_t = s]\n     = E[R_t + γ V(S_{t+1})\
    \ | S_t = s]\n```\n\n(2.6)\n\n```\n= R(s) + γ Σ_{s' ∈ S} P(s'|s) V(s'), for all\
    \ s ∈ S\n```\n\n(2.7)\n\nEquation (2.7) is called the Bellman equation for `V(s)`\
    \ (for MRPs). We can see how the step from Eqs. (2.6) to (2.7) removed the expectation\
    \ sign `E` from the equation, by considering the values of all the possible successor\
    \ states `s'` and weighting each by the state transition probability `P(s'|s)`\
    \ from the environment for the MRPs.\n\n### Worked Example\n\nAs an example, we\
    \ can use Eq. (2.7) to compute the expected return for a particular state. Let’s\
    \ say our initial values for state *Room 2* are 5.0 and for state *Found item*\
    \ are 10.0, as shown in Fig. 2.6 (these initial values were chosen randomly),\
    \ and we use no discount `γ=1.0`. Now let’s compute the expected return for state\
    \ *Room 3*. Since we already know the model (dynamics function and reward function)\
    \ of the Markov reward process (MRP), we know the immediate reward is `-1` no\
    \ matter what successor state `s'` will be. There’s a 0.8 probability the environment\
    \ will transition to successor state *Found item*, and the value for this successor\
    \ state is `V(Found item)=10.0`. And there’s also a 0.2 probability the environment\
    \ will transition to successor state *Room 2*, and the value for this successor\
    \ state is `V(Room 2)=5.0`. So we can use the Bellman equation to compute our\
    \ estimated value for state `V(Room 3)` as follows:\n\n```\nV(Room 3) = -1 + 0.8\
    \ * 10.0 + 0.2 * 5.0 = 8.0\n```\n\nOf course, this estimated value for state *Room\
    \ 3* is not accurate, since we started with randomly guessed values, and we didn’t\
    \ include other states. But if we include all the states in the state space and\
    \ repeat the process over a large number of times, in the end, the estimated values\
    \ would be very close to the true values.\n\nA state transition diagram to compute\
    \ the expected return of room 3 for `γ=1.0`. 4 states with values 0.0, 5.0, 8.0,\
    \ and 10.0 from left to right connect via arrows. Room 3 has a value of 8.0 and\
    \ a reward of negative 1, and leads to room 2 via `p=0.2`, and to found state\
    \ via `p=0.8`.\n\n**Fig. 2.6** Example of how to compute the value of a state\
    \ for the service dog MRP, `γ=1.0`; the numbers are chosen randomly\n\nFigure\
    \ 2.7 shows the true values of the states for our service dog MRP. The values\
    \ are computed using Eq. (2.7) and dynamic programming, which is an iterative\
    \ method and can be used to solve MDP. We will introduce dynamic programming methods\
    \ in the next chapter. For this experiment, we use a discount factor of `γ=0.9`.\
    \ We can see that the state *Found item* has the highest value among all states.\n\
    \nWhy do we want to estimate the state values? Because it can help the agent make\
    \ better decisions. If the agent knows which state is better (in terms of expected\
    \ returns), it can choose actions that may lead it to those better states. For\
    \ example, in Fig. 2.7, if the current state is *Room 2*, then the best successor\
    \ state is *Room 3* since it has the highest state value of 7.0 among all the\
    \ possible successor states for *Room 2*. By selecting actions that lead to high-value\
    \ states, the agent can maximize its long-term expected return."
  raw: '### Value Function for MRPs


    In Markov reward processes (MRPs), the return ![$$G_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq98.png)
    measures the total future reward from time step *t* to the end of the episode.
    However, comparing returns for different sample sequences alone has its limits,
    as it only measures returns starting from a particular time step. This is not
    very helpful for an agent in a specific environment state who needs to make a
    decision. The value function can help us overcome this problem.


    Formally, the state value function ![$$V(s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq99.png)
    for MRP measures the *expected return* starting from state *s* and to a horizon
    *H*. We call it the expected return because the trajectory starting from state
    *s* to a horizon *H* is often a random variable. In simple words, ![$$V(s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq100.png)
    measures the average return starting from state *s* and up to a horizon *H*. For
    episodic problems, the horizon is just the terminal time step, that is, ![$$H=T$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq101.png)
    .


    ![$$\displaystyle \begin{aligned} V(s)=\mathbb{E}_{\,\!\!}\left[G_t \;\Big|\;
    S_t=s\right] {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ5.png)


    (2.5)


    The state value function ![$$V(s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq102.png)
    for MRPs also shares the recursive property as shown in Eq. ([2.6](#605748_1_En_2_Chapter.xhtml#Equ6)).
    Equation ([2.6](#605748_1_En_2_Chapter.xhtml#Equ6)) is also called the Bellman
    expectation equation for ![$$V(s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq103.png)
    (for MRPs). We call it the Bellman expectation equation because it’s written in
    a recursive manner but still has the expectation sign ![$$\mathbb {E}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq104.png)
    attached to it.


    ![$$\displaystyle \begin{aligned} V(s) &amp; =\mathbb{E}_{\,\!\!}\left[G_t \;\Big|\;
    S_t=s\right] \notag \\ &amp; =\mathbb{E}_{\,\!\!}\left[R_t + {\gamma} R_{t+1}
    + {\gamma}^2 R_{t+2} + \cdot\cdot\cdot\;\Big|\; S_t=s\right] \notag \\ &amp; =\mathbb{E}_{\,\!\!}\left[R_t
    + {\gamma} \bigl( R_{t+1} + {\gamma} R_{t+2} + \cdot\cdot\cdot\bigr)\;\Big|\;
    S_t=s \right] \notag \\ &amp; =\mathbb{E}_{\,\!\!}\left[R_t + {\gamma} G_{t+1}
    \;\Big|\;S_t=s\right] \notag \\ &amp; =\mathbb{E}_{\,\!\!}\left[R_t + {\gamma}
    V(S_{t+1}) \;\Big|\;S_t=s\right] {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ6.png)


    (2.6)


    ![$$\displaystyle \begin{aligned} &amp; =R(s) + {\gamma} \sum_{s'' \in \mathcal{S}}
    P(s''|s) V(s''), \quad \mbox{for all}\; s \in \mathcal{S} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ7.png)


    (2.7)


    Equation ([2.7](#605748_1_En_2_Chapter.xhtml#Equ7)) is called the Bellman equation
    for ![$$V(s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq105.png)
    (for MRPs). We can see how the step from Eqs. ([2.6](#605748_1_En_2_Chapter.xhtml#Equ6))
    to ([2.7](#605748_1_En_2_Chapter.xhtml#Equ7)) removed the expectation sign ![$$\mathbb
    {E}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq106.png) from
    the equation, by considering the values of all the possible successor states ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq107.png)
    and weighting each by the state transition probability ![$$P(s''|s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq108.png)
    from the environment for the MRPs.


    ### Worked Example


    As an example, we can use Eq. ([2.7](#605748_1_En_2_Chapter.xhtml#Equ7)) to compute
    the expected return for a particular state. Let’s say our initial values for state
    *Room 2* are 5.0 and for state *Found item* are 10.0, as shown in Fig. [2.6](#605748_1_En_2_Chapter.xhtml#Fig6)
    (these initial values were chosen randomly), and we use no discount ![$${\gamma
    }=1.0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq109.png) .
    Now let’s compute the expected return for state *Room 3*. Since we already know
    the model (dynamics function and reward function) of the Markov reward process
    (MRP), we know the immediate reward is ![$$-1$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq110.png)
    no matter what successor state ![$$s''$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq111.png)
    will be. There’s a 0.8 probability the environment will transition to successor
    state *Found item*, and the value for this successor state is *V* (*Found item*)
    ![$$=10.0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq112.png)
    . And there’s also a 0.2 probability the environment will transition to successor
    state *Room 2*, and the value for this successor state is *V* (*Room 2*) ![$$=5.0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq113.png)
    . So we can use the Bellman equation to compute our estimated value for state
    *V* (*Room 3*) as follows:


    ![$$\displaystyle \begin{aligned} V({{Room\ 3}})=-1 + 0.8 * 10.0 + 0.2 * 5.0=8.0
    \end{aligned}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equb.png)


    Of course, this estimated value for state *Room 3* is not accurate, since we started
    with randomly guessed values, and we didn’t include other states. But if we include
    all the states in the state space and repeat the process over a large number of
    times, in the end, the estimated values would be very close to the true values.


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig6_HTML.png)


    A state transition diagram to compute the expected return of room 3 for gamma
    = 1.0\. 4 states with values 0.0, 5.0, 8.0, and 10.0 from left to right connect
    via arrows. Room 3 has a value of 8.0 and a reward of negative 1, and leads to
    room 2 via p equals 0.2, and to found state via p equals 0.8.


    Fig. 2.6


    Example of how to compute the value of a state for the service dog MRP, ![$${\gamma
    }=1.0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq114.png) ;
    the numbers are chosen randomly


    Figure [2.7](#605748_1_En_2_Chapter.xhtml#Fig7) shows the true values of the states
    for our service dog MRP. The values are computed using Eq. ([2.7](#605748_1_En_2_Chapter.xhtml#Equ7))
    and dynamic programming, which is an iterative method and can be used to solve
    MDP. We will introduce dynamic programming methods in the next chapter. For this
    experiment, we use a discount factor of ![$${\gamma }=0.9$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq115.png)
    . We can see that the state *Found item* has the highest value among all states.


    Why do we want to estimate the state values? Because it can help the agent make
    better decisions. If the agent knows which state is better (in terms of expected
    returns), it can choose actions that may lead it to those better states. For example,
    in Fig. [2.7](#605748_1_En_2_Chapter.xhtml#Fig7), if the current state is *Room
    2*, then the best successor state is *Room 3* since it has the highest state value
    of 7.0 among all the possible successor states for *Room 2*. By selecting actions
    that lead to high-value states, the agent can maximize its long-term expected
    return.'
  trans: "\n### MRP 的价值函数\n\n在马尔可夫奖励过程（MRP）中，回报 `G_t` 衡量的是从时间步 `t` 到回合结束所获得的总未来奖励。然而，仅比较不同样本序列的回报有其局限性，因为它只衡量从特定时间步开始的回报。这对于处于特定环境状态并需要做出决策的智能体来说帮助不大。价值函数可以帮助我们克服这个问题。\n\
    \n形式上，MRP 的状态价值函数 `V(s)` 衡量的是从状态 `s` 开始到时间范围 `H` 的*期望回报*。我们称之为期望回报，是因为从状态 `s`\
    \ 到时间范围 `H` 的轨迹通常是一个随机变量。简单来说，`V(s)` 衡量的是从状态 `s` 开始到时间范围 `H` 的平均回报。对于回合制问题，时间范围就是终止时间步，即\
    \ `H=T`。\n\n```\nV(s) = E[G_t | S_t = s]\n```\n\n(2.5)\n\nMRP 的状态价值函数 `V(s)` 也具有递归性质，如公式\
    \ (2.6) 所示。公式 (2.6) 也被称为 `V(s)`（针对 MRP）的贝尔曼期望方程。我们称之为贝尔曼期望方程，是因为它以递归方式书写，但仍然带有期望符号\
    \ `E`。\n\n```\nV(s) = E[G_t | S_t = s]\n     = E[R_t + γ R_{t+1} + γ² R_{t+2}\
    \ + ... | S_t = s]\n     = E[R_t + γ (R_{t+1} + γ R_{t+2} + ...) | S_t = s]\n\
    \     = E[R_t + γ G_{t+1} | S_t = s]\n     = E[R_t + γ V(S_{t+1}) | S_t = s]\n\
    ```\n\n(2.6)\n\n```\n= R(s) + γ Σ_{s' ∈ S} P(s'|s) V(s'), 对于所有 s ∈ S\n```\n\n\
    (2.7)\n\n公式 (2.7) 被称为 `V(s)`（针对 MRP）的贝尔曼方程。我们可以看到，从公式 (2.6) 到公式 (2.7) 的步骤是如何通过考虑所有可能的后继状态\
    \ `s'` 的值，并根据 MRP 环境中状态转移概率 `P(s'|s)` 对每个值进行加权，从而去掉了方程中的期望符号 `E`。\n\n### 计算示例\n\
    \n作为示例，我们可以使用公式 (2.7) 来计算特定状态的期望回报。假设状态 *房间 2* 的初始值为 5.0，状态 *找到物品* 的初始值为 10.0，如图\
    \ 2.6 所示（这些初始值是随机选择的），并且我们使用无折扣 `γ=1.0`。现在让我们计算状态 *房间 3* 的期望回报。由于我们已经知道马尔可夫奖励过程（MRP）的模型（动态函数和奖励函数），我们知道无论后继状态\
    \ `s'` 是什么，即时奖励都是 `-1`。环境有 0.8 的概率转移到后继状态 *找到物品*，该后继状态的价值为 `V(找到物品)=10.0`。还有 0.2\
    \ 的概率环境会转移到后继状态 *房间 2*，该后继状态的价值为 `V(房间 2)=5.0`。因此，我们可以使用贝尔曼方程来计算状态 `V(房间 3)` 的估计值，如下所示：\n\
    \n```\nV(房间 3) = -1 + 0.8 * 10.0 + 0.2 * 5.0 = 8.0\n```\n\n当然，这个状态 *房间 3* 的估计值并不准确，因为我们是从随机猜测的值开始的，并且没有包含其他状态。但是，如果我们包含状态空间中的所有状态，并重复该过程大量次数，最终估计值将非常接近真实值。\n\
    \n一个用于计算 `γ=1.0` 时房间 3 期望回报的状态转移图。从左到右，4 个状态的值分别为 0.0、5.0、8.0 和 10.0，通过箭头连接。房间\
    \ 3 的值为 8.0，奖励为负 1，并通过 `p=0.2` 连接到房间 2，通过 `p=0.8` 连接到已找到状态。\n\n**图 2.6** 如何为服务犬\
    \ MRP 计算状态值的示例，`γ=1.0`；数字是随机选择的\n\n图 2.7 显示了服务犬 MRP 各状态的真实值。这些值是使用公式 (2.7) 和动态规划计算得出的，动态规划是一种迭代方法，可用于求解\
    \ MDP。我们将在下一章介绍动态规划方法。在本实验中，我们使用折扣因子 `γ=0.9`。我们可以看到，状态 *找到物品* 在所有状态中具有最高的价值。\n\
    \n我们为什么要估计状态价值？因为它可以帮助智能体做出更好的决策。如果智能体知道哪个状态更好（就期望回报而言），它就可以选择可能引导它进入这些更好状态的动作。例如，在图\
    \ 2.7 中，如果当前状态是 *房间 2*，那么最佳后继状态是 *房间 3*，因为它在 *房间 2* 所有可能的后继状态中具有最高的状态价值 7.0。通过选择能导向高价值状态的动作，智能体可以最大化其长期期望回报。\n"
- fmt: '## 2.5 Markov Decision Process


    Now we’re ready to discuss the details of the MDP. Similar to how the MRP extends
    the Markov chain, the Markov decision process (MDP) extends the MRP by including
    actions and policy into the process. The MDP contains all the necessary components,
    including states, rewards, actions, and policy. We can define the MDP as a tuple
    `(S, A, P, R)`:


    - `S` is a finite set of states called the state space.

    - `A` is a finite set of actions called the action space.

    - `P` is the dynamics function (or transition model) of the environment, where
    `P(s'' | s, a) = P[S_{t+1} = s'' | S_t = s, A_t = a]` specifies the probability
    of environment transition into successor state `s''` when in current state `s`
    and take action `a`.

    - `R` is a reward function of the environment; `R(s, a) = E[R_t | S_t = s, A_t
    = a]` is the reward signal provided by the environment when the agent is in state
    `s` and taking action `a`.


    A state transition diagram for service dog MRP with gamma equals 0.9. Room 1,
    room 2, room 3, and found item have state values of 2.5, 4.2, 7.0, and 10.0, and
    connect via weighted arrows with reward signals. End has a state value of 0.0.
    Outside has a state value of 6.3.


    **Fig. 2.7** State values for the service dog MRP, `γ = 0.9`


    Note that the dynamics function `P` and reward function `R` are now conditioned
    on the action `A_t` chosen by the agent at time step `t`.


    In Fig. 2.8, we have modeled our service dog example using an MDP. Before we move
    on, we want to explain the small changes we’ve made to Fig. 2.8. First, we have
    merged states *Found item* and *End* into a single terminal state *Found item*.
    This makes sense because the reward is now conditioned on `(s, a)`, and there
    are no additional meaningful states after the agent has reached the state *Found
    item*. Second, the straight and curly lines in Fig. 2.8 represent valid actions
    that the agent can choose in a state, rather than state transition probabilities.
    Finally, the reward now depends on the action chosen by the agent, and the reward
    values are slightly different.


    In fact, our service dog example is now modeled as a deterministic (stationary)
    reinforcement learning environment. This means that if the agent takes the same
    action `a` in the same state `s`, the successor state `s''` and reward `r` will
    always be the same, regardless of whether we repeat it 100 times or 1 million
    times. The transition to the successor state `s''` is guaranteed to happen with
    1.0 probability. For example, if the agent is in state *Room 2* and chooses to
    *Go outside*, the successor state will always be *Outside*; there is zero chance
    that the successor state will be *Room 3* or *Room 1*.


    A state transition diagram for service dog MDP. Rooms 1 and 2 have arrows for
    go to room 1 with r equals negative 2 and go to room 2 with r equals negative
    1. Rooms 2 and 3 have go to room 3 and go to room 2. Room 2 and outside have go
    outside and go inside. Room 3 leads to found item via search.


    **Fig. 2.8** Service dog MDP


    We can list all the elements in the set of `S, A, R` for our service dog MDP;
    notice that not all actions are available (or legal) in each state:


    - `S` = {Room 1, Room 2, Room 3, Outside, Found item}

    - `A` = {Go to room1, Go to room2, Go to room3, Go outside, Go inside, Search}

    - `R` = {-1, -2, +1, 0, +10}


    As we have explained before, our service dog MDP is a deterministic (stationary)
    reinforcement learning environment. The dynamics function is slightly different
    compared to our previous example. For MDPs, the transition from the current state
    `s` to its successor state `s''` depends on the current state `s` and the action
    `a` chosen by the agent. For a deterministic environment, the transition probability
    is always 1.0 for legal actions `a ∈ A(s)`, and 0 for illegal actions `a ∉ A(s)`,
    which are actions not allowed in the environment. Illegal actions should never
    be chosen by the agent, since most environments have enforced checks at some level.
    For example, in the game of Go, if a player makes an illegal move, they automatically
    lose the game.


    We can still construct a single matrix for the dynamics function for our service
    dog MDP, but this time it needs to be a 3D matrix. Since it’s not easy for us
    to draw a 3D matrix, we chose to use a 2D plane to explain the concept for a single
    state. Assume the current state of the environment is *Room 2*, each row of the
    plane represents an action, and each column of the plane represents a successor
    state `s''`. For consistency purposes, we set the transition probability to 1.0
    for the successor state *Room 2*, for all illegal actions (*Go to room2*, *Go
    inside*, *Search*). This just means that these illegal actions won’t affect the
    state of the environment.


    A transition matrix for dynamics function of service dog MDP. The columns are
    room 1, room 2, room 3, outside, and found item. The rows are go to room 1, go
    to room 2, go to room 3, go outside, go inside, and search.


    For illustration purposes, let’s imagine our service dog MDP is not deterministic
    but a stochastic reinforcement learning environment. For example, every legal
    action could also lead to the successor state *Outside* randomly. In this case,
    the transition matrix for the stochastic environment would be something like this:


    A transition matrix for service dog MDP with a stochastic environment. The columns
    are room 1, room 2, room 3, outside, and found item and the rows are go to room
    1, go to room 2, go to room 3, go outside, go inside, and search.'
