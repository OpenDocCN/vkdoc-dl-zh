  trans: '

    ## 2.5 马尔可夫决策过程


    现在我们来讨论 MDP 的细节。与 MRP 扩展马尔可夫链的方式类似，马尔可夫决策过程（MDP）通过将动作和策略纳入过程来扩展 MRP。MDP 包含所有必要的组成部分，包括状态、奖励、动作和策略。我们可以将
    MDP 定义为一个元组 `(S, A, P, R)`：


    - `S` 是有限的状态集合，称为状态空间。

    - `A` 是有限的动作集合，称为动作空间。

    - `P` 是环境的动态函数（或转移模型），其中 `P(s'' | s, a) = P[S_{t+1} = s'' | S_t = s, A_t = a]`
    指定了在当前状态 `s` 下采取动作 `a` 时，环境转移到后继状态 `s''` 的概率。

    - `R` 是环境的奖励函数；`R(s, a) = E[R_t | S_t = s, A_t = a]` 是当智能体处于状态 `s` 并采取动作 `a` 时，环境提供的奖励信号。


    服务犬 MRP 的状态转移图，其中 gamma 等于 0.9。房间 1、房间 2、房间 3 和已找到物品的状态值分别为 2.5、4.2、7.0 和 10.0，并通过带有奖励信号的加权箭头连接。结束的状态值为
    0.0。外面的状态值为 6.3。


    **图 2.7** 服务犬 MRP 的状态值，`γ = 0.9`


    请注意，动态函数 `P` 和奖励函数 `R` 现在取决于智能体在时间步 `t` 选择的动作 `A_t`。


    在图 2.8 中，我们使用 MDP 对服务犬示例进行了建模。在继续之前，我们想解释一下对图 2.8 所做的一些小改动。首先，我们将状态*已找到物品*和*结束*合并为一个终止状态*已找到物品*。这样做是合理的，因为奖励现在取决于
    `(s, a)`，并且在智能体到达*已找到物品*状态后，没有其他有意义的状态。其次，图 2.8 中的直线和曲线表示智能体在某个状态下可以选择的有效动作，而不是状态转移概率。最后，奖励现在取决于智能体选择的动作，并且奖励值略有不同。


    实际上，我们的服务犬示例现在被建模为一个确定性（平稳）的强化学习环境。这意味着，如果智能体在相同状态 `s` 下采取相同动作 `a`，那么后继状态 `s''`
    和奖励 `r` 将始终相同，无论我们重复 100 次还是 100 万次。转移到后继状态 `s''` 的概率保证为 1.0。例如，如果智能体处于*房间 2*
    状态并选择*去外面*，那么后继状态将始终是*外面*；后继状态是*房间 3* 或*房间 1* 的概率为零。


    服务犬 MDP 的状态转移图。房间 1 和房间 2 有指向房间 1 的箭头（r 等于 -2）和指向房间 2 的箭头（r 等于 -1）。房间 2 和房间 3
    有指向房间 3 和房间 2 的箭头。房间 2 和外面有指向外面和里面的箭头。房间 3 通过搜索指向已找到物品。


    **图 2.8** 服务犬 MDP


    我们可以列出服务犬 MDP 的 `S, A, R` 集合中的所有元素；请注意，并非所有动作在每个状态下都是可用（或合法）的：


    - `S` = {房间 1, 房间 2, 房间 3, 外面, 已找到物品}

    - `A` = {去房间 1, 去房间 2, 去房间 3, 去外面, 去里面, 搜索}

    - `R` = {-1, -2, +1, 0, +10}


    正如我们之前解释的，我们的服务犬 MDP 是一个确定性（平稳）的强化学习环境。动态函数与我们之前的示例略有不同。对于 MDP，从当前状态 `s` 到其后继状态
    `s''` 的转移取决于当前状态 `s` 和智能体选择的动作 `a`。对于确定性环境，合法动作 `a ∈ A(s)` 的转移概率始终为 1.0，而非法动作
    `a ∉ A(s)`（即环境中不允许的动作）的转移概率为 0。智能体绝不应选择非法动作，因为大多数环境在某种程度上都强制执行检查。例如，在围棋游戏中，如果玩家走出非法一步，他们将自动输掉比赛。


    我们仍然可以为服务犬 MDP 的动态函数构建一个单一矩阵，但这次它需要是一个 3D 矩阵。由于绘制 3D 矩阵并不容易，我们选择使用 2D 平面来解释单个状态的概念。假设环境的当前状态是*房间
    2*，平面的每一行代表一个动作，每一列代表一个后继状态 `s''`。为了保持一致性，我们将所有非法动作（*去房间 2*、*去里面*、*搜索*）转移到后继状态*房间
    2* 的概率设置为 1.0。这仅仅意味着这些非法动作不会影响环境的状态。


    服务犬 MDP 动态函数的转移矩阵。列是房间 1、房间 2、房间 3、外面和已找到物品。行是去房间 1、去房间 2、去房间 3、去外面、去里面和搜索。


    为了说明起见，让我们假设我们的服务犬 MDP 不是确定性的，而是一个随机强化学习环境。例如，每个合法动作也可能随机导致后继状态*外面*。在这种情况下，随机环境的转移矩阵将如下所示：


    随机环境下服务犬 MDP 的转移矩阵。列是房间 1、房间 2、房间 3、外面和已找到物品，行是去房间 1、去房间 2、去房间 3、去外面、去里面和搜索。

    '
- fmt: '### Policy


    在强化学习和马尔可夫决策过程（MDP）中，智能体有能力决定如何在环境中行动，但在给定状态下如何选择动作或使用什么规则进行决策并不总是明确的。为了解决这个问题，我们引入了策略（`policy`）的概念。


    形式上，策略`π`是一个函数，它将每个状态`s`映射到该状态`s`下所有可能动作集合上的概率分布。策略可以是确定性的，意味着对于给定状态总是选择相同的动作；也可以是随机性的，意味着根据概率分布选择动作。例如，如果某个特定状态有四个动作`a1`、`a2`、`a3`和`a4`，其中`a1`在奖励方面是最佳动作，`a4`是最差动作，`a2`优于`a3`，那么确定性策略会始终选择`a1`，而随机性策略可能以60%的概率选择`a1`，20%的概率选择`a2`，15%的概率选择`a3`，5%的概率选择`a4`。


    从数学上讲，我们可以将策略表示为一组函数的集合，每个函数将特定的环境状态`s`映射到所有动作`a ∈ A(s)`上的概率分布。这可以写成：


    ```

    π(a|s) = P[A_t = a | S_t = s], 对于所有 s ∈ S, a ∈ A

    ```


    (2.8)


    对于任何状态`s`，所有可能动作的概率之和必须等于1：


    ```

    ∑_{a ∈ A} π(a|s) = 1.0

    ```


    有限MDP的可能确定性策略数量为`N(A)^(N(S))`，其中`N(S)`是状态空间的大小，`N(A)`是动作空间的大小。对于我们的服务犬MDP，这个数字将是`6^5
    = 7776`。然而，这个估计包含了每个状态下的非法动作，因此仅包含合法动作的更准确估计是`3^5 = 243`。


    ### MDP的价值函数


    使用MDP建模强化学习问题的目标是找到最优策略，以便智能体在与环境交互时获得最大奖励。在MDP的框架内，我们可以通过使用价值函数来实现这一点。


    价值函数衡量在遵循某个策略时的期望回报。MDP有两种不同的价值函数：状态价值函数`Vπ`和状态-动作价值函数`Qπ`。


    MDP的状态价值函数`Vπ`衡量从状态`s`开始，然后遵循策略`π`直到某个时间范围`H`的期望回报，其中`H`可以是回合的长度，对于持续性问题也可以是无穷大；而策略`π`的状态-动作价值函数`Qπ`衡量从状态`s`开始，采取动作`a`，*然后*遵循策略`π`的期望回报。


    公式(2.9)是状态价值函数`Vπ`的定义，它看起来与公式(2.5)几乎相同，只是现在附加了一个小下标`π`，这意味着这些值是针对特定策略衡量的。这应该是有道理的，因为智能体获得的奖励将取决于它在环境中的行为方式，而智能体依赖策略`π`在环境中行动。即使对于相同的状态`s`，不同的策略通常也会有不同的价值。


    ```

    Vπ(s) = Eπ[G_t | S_t = s], 对于所有 s ∈ S

    ```


    (2.9)


    公式(2.10)是策略`π`的状态-动作价值函数`Qπ`的定义。


    ```

    Qπ(s, a) = Eπ[G_t | S_t = s, A_t = a], 对于所有 s ∈ S, a ∈ A

    ```


    (2.10)


    `Vπ(s)`和`Qπ(s, a)`之间存在一个很好的关系。在策略`π`下，状态`s`的价值只是所有可能动作`a ∈ A`的状态-动作价值`Qπ(s, a)`的加权和，如公式(2.11)所示。


    ```

    Vπ(s) = ∑_{a ∈ A} π(a|s) Qπ(s, a)

    ```


    (2.11)'
  raw: '### Policy


    In reinforcement learning and MDPs, the agent has the ability to decide how to
    act in the environment, but it is not always clear how to choose an action in
    a given state or what rules to use for making decisions. To address this problem,
    we introduce the concept of a policy.


    Formally, a policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq141.png)
    is a function that maps each state *s* to a probability distribution over the
    set of all possible actions in that state *s*. A policy can be deterministic,
    meaning that it always chooses the same action for a given state, or it can be
    stochastic, meaning that it chooses actions according to a probability distribution.
    For example, if a particular state has four actions ![$$a_1, a_2, a_3,$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq142.png)
    and ![$$a_4$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq143.png)
    , with ![$$a_1$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq144.png)
    being the best action in terms of rewards, ![$$a_4$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq145.png)
    being the worst action, and ![$$a_2$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq146.png)
    being better than ![$$a_3$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq147.png)
    , a deterministic policy would always choose ![$$a_1$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq148.png)
    , while a stochastic policy might choose ![$$a_1$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq149.png)
    60% of the time, ![$$a_2$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq150.png)
    20% of the time, ![$$a_3$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq151.png)
    15% of the time, and ![$$a_4$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq152.png)
    5% of the time.


    Mathematically, we can represent a policy as a collection of functions, each of
    which maps a specific environment state *s* to a probability distribution over
    all actions ![$$a \in \mathcal {A}(s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq153.png)
    . This can be written as


    ![$$\displaystyle \begin{aligned} \pi(a|s)=P\left[A_t=a \;\Big|\; S_t=s\right],
    \quad \mbox{for all}\; s \in \mathcal{S}, a \in \mathcal{A} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ8.png)


    (2.8)


    For any state *s*, the sum of probabilities over all possible actions must equal
    1:


    ![$$\displaystyle \begin{aligned} \sum_{a \in A}\pi(a|s) = 1.0 \end{aligned}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Eque.png)


    The number of possible deterministic policies for a finite MDP is ![$$N(\mathcal
    {A})^{N(\mathcal {S})}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq154.png)
    , where ![$$N(\mathcal {S})$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq155.png)
    is the size of the state space, and ![$$N(\mathcal {A})$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq156.png)
    is the size of the action space. For our service dog MDP, this number would be
    ![$$6^5=7776$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq157.png)
    . However, this estimate includes illegal actions for each state, so a more accurate
    estimate that only includes legal actions is ![$$3^5=243$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq158.png)
    .


    ### Value Functions for MDPs


    The goal of modeling the reinforcement learning problem using MDPs is that we
    want to find an optimal policy so that the agent can get maximum rewards when
    interacting with the environment. The way we can do that within the context of
    MDP is by using the value functions.


    A value function measures the expected return when following some policy. There
    are two different value functions for an MDP: the state value function ![$$V_\pi
    $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq159.png) and state-action
    value function ![$$Q_\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq160.png)
    .


    The state value function ![$$V_\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq161.png)
    for MDP measures the expected return starting in state *s*, then following policy
    ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq162.png)
    afterward to a horizon *H*, where *H* could be the length of an episode, or it
    could be infinite for the continuing problems, while the state-action value function
    ![$$Q_\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq163.png)
    for a policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq164.png)
    measures the expected return starting from state *s*, taking action *a*, *then*
    following policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq165.png)
    .


    Equation ([2.9](#605748_1_En_2_Chapter.xhtml#Equ9)) is the definition for the
    state value function ![$$V_\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq166.png)
    , which looks almost identical to Eq. ([2.5](#605748_1_En_2_Chapter.xhtml#Equ5)),
    except it now has a small subscript ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq167.png)
    attached to it, which means the values are measured for a specific policy. This
    should make sense since the rewards the agent receives will depend on how it acts
    in the environment, and the agent relies on the policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq168.png)
    to act in the environment. Even for the same state *s*, different policies often
    will have different values.


    ![$$\displaystyle \begin{aligned} V_\pi(s)=\mathbb{E}_{\pi\!\!}\left[G_t \;\Big|\;
    S_t=s\right], \quad \mbox{for all}\; s \in \mathcal{S} {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ9.png)


    (2.9)


    Equation ([2.10](#605748_1_En_2_Chapter.xhtml#Equ10)) is the definition of state-action
    value function ![$$Q_\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq169.png)
    for a policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq170.png)
    .


    ![$$\displaystyle \begin{aligned} Q_\pi(s, a)=\mathbb{E}_{\pi\!\!}\left[G_t \;\Big|\;
    S_t=s, A_t=a\right], \quad \mbox{for all}\; s \in \mathcal{S}, a \in A {} \end{aligned}
    $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ10.png)


    (2.10)


    There is a nice relationship between the ![$$V_\pi (s)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq171.png)
    and ![$$Q_\pi (s, a)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq172.png)
    . The value of a state *s* under a policy ![$$\pi $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq173.png)
    is just the weighted sum over all state-action values ![$$Q_\pi (s, a)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq174.png)
    for all possible actions ![$$a \in A$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq175.png)
    , as shown in Eq. ([2.11](#605748_1_En_2_Chapter.xhtml#Equ11)).


    ![$$\displaystyle \begin{aligned} V_\pi(s)=\sum_{a \in A} \pi(a|s) Q_\pi(s, a)
    {} \end{aligned} $$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_Equ11.png)


    (2.11)'
