- fmt: 'SARSA has some advantages over Monte Carlo methods. It can learn online, which
    means it can update the estimate of the state-action value function `Q_pi` and
    the policy after every time step, making it more suitable for applications where
    real-time interaction with the environment is required. SARSA is also an on-policy
    method, we’ll discuss what’s on-policy later in this chapter. However, SARSA can
    suffer from high variance and bias in the estimated state-action value function,
    especially when the exploration rate is low.


    ## Algorithm 4: SARSA


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Figaad_HTML.gif) A 11-line algorithm
    takes the following inputs to give an estimated optimal state-action value function
    `Q_pi` almost equal to `Q_star`. Discount rate `gamma`, initial exploration rate
    `epsilon`, step size `alpha`, and number of steps `K`.


    The SARSA algorithm has few parameters that will require additional attention
    (or as we call it, it’s sensitive to these parameters). The first is the step
    size `alpha`. In Monte Carlo methods, we use the `1 / N(s, a)` as the step size,
    but here in SARSA, we update the state-action values based on the difference between
    the current estimate and the next estimate. Therefore, we don’t keep count of
    how many times the agent has visited a particular state-action pair `(s, a)`.
    As a result, we often need to set the step size manually.


    The second parameter is the exploration rate `epsilon` for the `epsilon`-greedy
    policy. We can choose to use a fixed value for `epsilon`, but in practice, a common
    practice is to use a large initial value for `epsilon` (like 1.0) and decay `epsilon`
    linearly over the first half of the learning process to a small fixed value (like
    0.01). Deciding how often to decay the value of `epsilon` is a difficult question
    without a clear answer. Decaying it too fast may lead to the agent not exploring
    enough before `epsilon` becomes too small, halting exploration altogether. However,
    decaying it too slowly may cause the agent to take longer to learn as it continues
    to act randomly even when it is no longer necessary. In practice, this parameter
    requires multiple trials to find a good fit.


    ## Table 5.2


    Optimal state value for the service dog MDP after running the SARSA algorithm
    for different numbers of updates. Results were averaged over 100 independent runs.
    We use discount `gamma = 0.9` and step size `alpha = 0.01`, use initial exploration
    rate `epsilon = 1.0`, and decay it from 1.0 to 0.01. The last row contains true
    optimal state values `V_*` computed using DP policy iteration.


    | Number of updates | Room 1 | Room 2 | Room 3 | Outside | Found item |

    | --- | --- | --- | --- | --- | --- |

    | 100 | − 0.12 | 0.0 | 0.47 | 0.0 | 0 |

    | 1000 | 0.28 | 3.49 | 8.17 | -0.01 | 0 |

    | 10,000 | 5.83 | 7.85 | 10.0 | 4.25 | 0 |

    | 20,000 | 6.02 | 7.93 | 10.0 | 5.53 | 0 |

    | 50,000 | 6.12 | 7.97 | 10.0 | 6.38 | 0 |

    | DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |


    Like Monte Carlo policy iteration, SARSA will only converge to the true optimal
    state-action value in the limit, but in practice, we often terminate the algorithm
    after a fixed number of iterations or when the change in the state-action values
    falls below a certain threshold. Therefore, the outcome from the SARSA algorithm
    may not be the true optimal state-action values if we terminate the learning process
    too soon.


    We ran the SARSA algorithm on our server dog MDP to find the optimal policy and
    optimal value functions. The optimal policy is the one that maximizes the expected
    total reward over all time steps, and the optimal value functions are the expected
    total reward from each state under the optimal policy. We computed the true optimal
    values using dynamic programming (DP), which is guaranteed to converge to the
    optimal values in a finite number of iterations. The results shown in Table 5.2
    were averaged over 100 independent runs, using a discount factor `gamma = 0.9`
    and a step size `alpha = 0.01`. We set the initial exploration rate `epsilon =
    1.0` and decayed it linearly over the first half of the learning process to 0.01.
    Surprisingly, the algorithm found the optimal policy after 500 updates made to
    the state-action values, but the estimated state values were not quite close to
    the true `V_*` computed using DP (last row). As we increased the number of updates,
    the estimated values for the states became very close to the true values.'
