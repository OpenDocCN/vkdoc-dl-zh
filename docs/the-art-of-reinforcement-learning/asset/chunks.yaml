    # 6.5 本章小结


    在本章中，我们深入探讨了价值函数逼近的概念，并研究了使用线性方法来逼近马尔可夫决策过程（MDP）的价值函数。我们首先解决了处理大规模 MDP 时面临的挑战，即使用表格法表示价值函数在计算上变得不可行。


    为了克服这一挑战，我们引入了价值函数逼近的概念，它使我们能够基于一组特征来估计价值函数。通过将价值函数表示为这些特征的线性组合，我们可以有效地逼近价值函数，而无需为每个状态显式存储值。


    本章接着讨论了随机梯度下降技术，该技术在更新线性价值函数逼近的权重中起着关键作用。随机梯度下降使我们能够根据观察到的奖励以及预测值与实际值之间的差异，迭代地调整权重。


    此外，我们深入探讨了线性价值函数逼近的核心主题。通过使用特征的线性组合，我们构建了一个可以估计价值函数的线性函数。这种方法具有简单性和可解释性，使其成为各种简单强化学习应用中的热门选择。


    虽然线性价值函数逼近是一种有价值的技术，但在准确逼近复杂价值函数方面存在固有的局限性。此外，它需要手动构建特征向量，这可能会给某些问题带来挑战。为了解决这个问题，下一章将探讨用于逼近价值函数的非线性方法，特别是神经网络。这些非线性方法可以捕捉更复杂的关系，并在复杂领域中实现更精确的价值函数逼近。


    脚注 1 2


    # 7. 非线性价值函数逼近


    在本章中，我们将探讨使用非线性方法来逼近强化学习中的价值函数。价值函数在强化学习中起着至关重要的作用，因为它们估计智能体在给定状态下并随后遵循策略所能获得的预期奖励。在上一章中，我们讨论了依赖于构建特征向量并计算特征加权组合作为状态值或状态-动作值的线性方法。然而，这些方法在应用于复杂且具有挑战性的领域时存在局限性。在这种情况下，简单的线性组合可能无法捕捉所有相关的特征和信息。此外，确定能够捕捉手头任务所需信息的适当特征需要大量的领域知识和经验。


    为了克服这些局限性，我们可以利用非线性方法，特别是神经网络，来逼近强化学习中的价值函数。神经网络是一种机器学习模型，可以从数据中学习以进行预测或决策。在强化学习中，神经网络可以通过将环境状态作为输入数据，并预测在遵循某个策略时从该状态获得的预期回报，来学习逼近价值函数。


    神经网络的力量在于它们能够自动学习输入和输出之间复杂的非线性关系。换句话说，我们无需手动指定一组特征来表示状态，而是可以直接将原始状态信息输入神经网络，然后网络将通过调整其各层神经元的权重和偏置来学习提取相关信息。这个过程被称为特征学习，它使神经网络能够学习到更适合手头任务的表示。


    与线性方法相比，神经网络在逼近强化学习中的价值函数方面具有以下几个优点：


    - **非线性**：神经网络是非线性函数逼近器，这意味着它们可以对输入和输出之间复杂的非线性关系进行建模。这一点很重要，因为许多现实世界的问题都涉及非线性，而线性方法可能无法捕捉这些复杂的关系。相比之下，神经网络可以学习以高精度逼近复杂的价值函数。


    - **泛化能力**：神经网络可以很好地泛化到新的、未见过的数据。这意味着它们可以基于有限的数据学习逼近价值函数，然后将这种知识应用于新的情况。这在强化学习中很重要，因为智能体需要能够将其知识泛化到新的状态和动作，以便在环境中做出有效的决策。


    - **特征学习**：神经网络可以学习从原始输入数据中提取相关特征，这可以提高它们逼近价值函数的准确性。相比之下，线性方法需要手工设计的特征，这可能很耗时，并且可能无法捕捉所有相关信息。


    - **灵活性**：神经网络具有高度的灵活性，可以轻松适应不同类型的价值函数和强化学习问题。它们可用于逼近状态价值函数和动作价值函数，并可与各种强化学习算法一起使用。


    总的来说，与线性方法相比，使用神经网络逼近强化学习中的价值函数的好处包括：它们能够捕捉非线性关系、泛化到新情况、从原始输入数据中学习相关特征，以及适应不同类型的强化学习问题。熟悉神经网络并有训练深度神经网络经验的读者可以跳过
    7.1 和 7.2 节。

    '
- fmt: '# 7.1 Neural Networks


    A neural network is a type of machine learning model that is inspired by the structure
    and function of biological neurons in the human brain. It is composed of layers
    of interconnected nodes, or artificial neurons, that process information through
    a series of mathematical operations.


    The basic building block of a neural network is the artificial neuron, or node.
    Each node receives one or more inputs, performs a simple computation on those
    inputs, and produces an output. The output of each node is then passed on as input
    to the next layer of nodes.


    In mathematics’s term, a neural network is a mathematical construct that consists
    of a series of linear and nonlinear functions. At an abstract level, we can represent
    it as a chain of (parameterized) linear functions and (differentiable) nonlinear
    functions. For example, we can represent a simple neural network as shown in Eq.
    (7.1), where `f1` and `f2` are linear functions with their own sets of parameters
    or weights. Similarly, `σ1` and `σ2` are nonlinear functions that are differentiable.
    The output from the first linear function `f1(x)` becomes the input to the first
    nonlinear function `σ1`. The output of `σ1` is then fed into the second linear
    function `f2`, and so on.


    ```

    H(x) = σ2( f2( σ1( f1(x) ) ) )

    ```


    (7.1)


    More precisely, we can represent a linear function `f` as a function of its input
    data `x` and its weights `W`, as shown in Eq. (7.2). Here, `W` is a weight matrix
    with dimensions `m` x `n`, and `b` is a bias vector with `m` components. The output
    of the linear function is a vector with `m` scalar components. After we apply
    the nonlinear function `σ` to this output vector, we then feed it to the next
    linear function, and so on.


    ```

    f(x) = x^T W + b

    ```


    (7.2)


    In the context of reinforcement learning, neural networks are a powerful tool
    for approximating value functions or even the policy, as we’ll cover in Part III
    of the book. By training the weights of the neural network using experience data,
    we can learn to generalize from observed states and actions to unseen ones. The
    abstract representation of a neural network as a series of linear and nonlinear
    functions provides a flexible framework for approximating complex functions that
    relate states and actions to values.


    ## Feedforward Neural Networks


    A feedforward neural network, also known as a multilayer perceptron (MLP), is
    a type of neural network in which the information flows in one direction, from
    the input layer, through one or more hidden layers, to the output layer. In a
    feedforward neural network, the output of one layer serves as the input to the
    next layer, with no loops between the layers.


    The architecture of a feedforward neural network typically consists of an input
    layer, one or more hidden layers, and an output layer. The input layer receives
    the raw input data, which is then passed through the hidden layers, where the
    information is transformed and processed, before being processed by the output
    layer. Each layer in the network consists of a set of neurons, which are connected
    to neurons in the adjacent layers. Each neuron in a layer takes the weighted sum
    of the inputs from the previous layer, applies an activation function to the result,
    and outputs the result to the next layer.'
