  trans: '

    ### 策略近似


    在强化学习中，策略是一个将状态映射到整个动作空间上概率分布的函数。与价值函数近似类似，我们可以使用参数化函数来近似策略。通过这样做，我们可以在无需先显式学习最优价值函数的情况下，学习到一个在给定环境中表现良好的策略。


    为了使用参数化函数表示策略，我们可以使用带有参数 `θ` 的线性或非线性函数。然而，由于策略的输出必须是一个概率分布，我们需要确保它满足概率分布的性质，即非负性。


    确保策略输出为有效概率分布的一种常见解决方案是使用 softmax 函数。对于具有离散动作空间的强化学习问题，可以使用 softmax 函数来获得有效动作上的概率分布。softmax
    函数的定义如下：


    ```

    π(a|s; θ) = exp(φ(s,a)ᵀθ) / Σ_{a'' ∈ A} exp(φ(s,a'')ᵀθ)   (9.1)

    ```


    这里，`φ(s,a)` 是一个特征向量或函数，它将状态和动作映射到实值特征。softmax 函数获取当前状态下每个动作的偏好值 `φ(s,a)ᵀθ`，并对其取指数以获得正值。然后，将得到的值除以所有有效动作的指数化偏好值之和进行归一化，从而确保
    softmax 函数的输出是一个非负的概率分布。


    例如，考虑一个试图在迷宫中导航的机器人。机器人的当前状态是它在迷宫中的当前位置，其可能的动作是向上、向下、向左或向右移动。机器人的策略是一个函数，将其当前位置映射到这四种动作上的概率分布。通过使用带有参数化特征函数
    `φ(s,a)` 的 softmax 函数，我们可以学习到一个使机器人能够高效导航迷宫的策略。


    对于具有连续动作空间的强化学习问题，可以使用高斯函数来获得动作空间上的概率分布。高斯函数的定义如下：


    ```

    π(a|s; θ) = (1 / (√(2π)σ(s))) * exp(-(a - μ(s,θ))² / (2σ²(s)))   (9.2)

    ```


    这里，`μ(s,θ)` 是高斯分布的均值，`σ(s)` 是标准差，`a` 是某个动作。高斯函数将分布的均值和标准差作为输入，并生成一个动作空间上的概率密度函数（PDF）。为了获得概率分布，我们可以对有效动作空间上的概率密度函数进行积分，使得总概率为
    1。


    例如，考虑一个试图在三维空间中飞到特定位置的无人机。无人机的当前状态是其当前位置和速度，其可能的动作是在三个维度上改变速度。无人机的策略是一个函数，将其当前状态映射到这些连续动作上的概率分布。通过使用带有参数化均值函数
    `μ(s,θ)` 和标准差函数 `σ(s)` 的高斯函数，我们可以学习到一个使无人机能够平稳地在三维空间中导航并高效到达目的地的策略。


    类似地，我们也可以使用神经网络来近似策略。如图 9.1 所示，网络接收环境状态作为输入，并为所有有效动作输出一个动作概率分布。


    总之，策略近似是强化学习中的一项重要技术，它使我们能够在无需先显式学习最优价值函数的情况下，学习到一个在给定环境中表现良好的策略。通过使用参数化函数来表示策略，我们可以利用
    softmax 或高斯函数来确保策略的输出是一个有效的概率分布。这些函数分别特别适用于离散或连续动作空间的问题，并且可以应用于从迷宫导航到无人机飞行的广泛现实世界问题。

    '
- fmt: '# 9.2 Policy Gradient


    In reinforcement learning, neural networks can be used to approximate both value
    functions and policies. However, while value-based methods use the Bellman equations
    to define the value update rules to the value function for a given policy, there
    is no such equivalent for policies parameterized by `θ`. This means that in order
    to use gradient methods to find the best parameters for a policy, we first need
    to define an objective function that measures its performance. This section derives
    the equations for the policy gradient, drawing inspiration from the remarkable
    work of Professor Emma Brunskill in her comprehensive course on reinforcement
    learning [[1]](#605748_1_En_9_Chapter.xhtml#CR1).


    In the episodic reinforcement learning setting, we can measure the performance
    of a policy `π_θ` by its expected total reward starting from the initial state
    `s0`. We can define the value of a policy parameterized by `θ` as `V_π_θ(s0)`.
    Our goal is to find the parameters `θ` that maximize this value, so we can define
    our objective function as


    ```

    J(θ) = V_π_θ = V_π_θ(s0)

    ```


    (9.3)


    Our task now becomes a standard optimization problem: we need to find the `θ`
    that maximizes `J(θ)`. We can use the gradient ascent method to achieve this.
    Unlike gradient descent, which is used to minimize some objective function, gradient
    ascent involves taking steps in the direction of the steepest ascent of the function.
    In this case, we take a step in the direction of the gradient of `J(θ)`, with
    a step size of `α`:


    ```

    θ = θ + α ∇_θ J(θ)

    ```


    (9.4)


    The gradient `∇_θ J(θ)` tells us how much we need to adjust each parameter `θ_i`
    in order to increase the value of the objective function. By repeatedly updating
    the parameters using Eq. (9.4), we can converge to the optimal policy parameters
    that maximize the expected total reward.


    To compare the performance of different policies, we can use the state value function
    `V_π(s)`, which measures the expected total reward starting from state `s` when
    following policy `π`. For any two policies `π` and `π''`, we say that `π''` is
    as good as or better than `π`, if `V_π''(s) ≥ V_π(s)` for all states `s`. This
    concept can be extended to the episode setting by focusing solely on the initial
    state `s0`.


    Let’s expand the value function for policy `π_θ`. We know that the state value
    `s0` is just the expected return `G_t` (where `t=0`) when starting from the initial
    state `s0` and following policy `π_θ` until reaching the terminal state `s_T`
    (we’re only focusing on episodic cases). So the value of `π_θ` can be written
    as


    ```

    V_π_θ = V_π_θ(s0) = E_π_θ[ G_t | s_t = s0 ]

    ```


    (9.5)


    We know the return for an episode sequence `τ` is the sum of discounted rewards
    `G(τ) = r0 + γ r1 + γ^2 r2 + ... + γ^(T-1) r_(T-1)` (for the episodic case). The
    expectation sign in Eq. (9.5) is a reminder that the agent’s behavior when acting
    in the environment and the dynamics of the environment will greatly impact the
    total rewards the agent can receive over the course of an episode sequence. This
    means the return `G(τ)` of an arbitrary episode sequence is influenced by two
    factors: the policy `π_θ` the agent is following and the dynamics of the environment.
    To keep things simple, we use `τ` to denote a sequence of states, actions, and
    rewards for a single episode, where


    ```

    τ = s0, a0, r0, s1, a1, r1, ..., s_(T-1), a_(T-1), r_(T-1), s_T

    ```


    We then use `G(τ)` to denote the sum of discounted rewards for the entire episode
    sequence `τ`, where'
