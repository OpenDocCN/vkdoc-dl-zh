    # 11. Advanced Policy Gradient Methods


    One of the primary challenges associated with policy gradient methods is their
    instability and sensitivity to hyperparameters, such as the learning rate. This
    can lead to oscillations in the agent’s performance, resulting in slow convergence
    or even divergence. Furthermore, these methods often suffer from high variance
    in gradient estimates, which hampers convergence speed. Moreover, standard policy
    gradient methods exhibit poor sample efficiency, as they only use the generated
    sample transitions once to train the policy.


    To address these issues, this chapter explores advanced policy gradient methods,
    specifically focusing on the concept of surrogate objective functions. We will
    delve into the underlying principles of the Proximal Policy Optimization (PPO)
    algorithm, an exceptional state-of-the-art method that demonstrates remarkable
    efficiency in solving a wide range of problems. PPO incorporates the idea of a
    trust region to ensure stable updates and employs a surrogate objective function
    to reduce variance in gradient estimation, resulting in faster convergence and
    improved sample efficiency.


    ## 11.1 Problems with the Standard Policy Gradient Methods'
