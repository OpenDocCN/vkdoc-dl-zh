- fmt: '# 7.3 Policy Evaluation with Neural Networks


    In this section, we explore the use of neural networks for policy evaluation in
    reinforcement learning. The goal is to approximate the state value function `V_π`
    for an arbitrary policy `π` using a neural network with parameters `θ`. We assume
    that we know the true state value function `V_π` of the policy, and our objective
    is to find the parameters `θ` that minimize the squared error between the true
    values and the neural network predictions.


    We start with the objective function:


    ```

    J(θ) = E_π[(V_π(S) - V̂(S; θ))^2]

    ```


    (7.3)


    where `V̂(S; θ)` is the neural network’s predicted value for state `S`. We can
    use stochastic gradient descent to update the parameters `θ` using the sample
    gradients computed using mini-batch of experience data, which gives us a simplified
    objective function for the given mini-batch:


    ```

    J(θ) = (V_π(S) - V̂(S; θ))^2

    ```


    (7.4)


    To use this approach for policy evaluation in practice, we relax the assumption
    that we know the true state value function `V_π` and use sample returns from Monte
    Carlo or TD learning as the target. For Monte Carlo policy evaluation, the objective
    function becomes


    ```

    J(θ) = (G_t - V̂(s_t; θ))^2

    ```


    (7.5) where `G_t` is the total return obtained from state `s_t`.


    For TD(0) policy evaluation, we use the immediate reward `r_t` and the discounted
    value of the successor state `γ V̂(s_{t+1}; θ)` as the target, and the objective
    function becomes


    ```

    J(θ) = (r_t + γ V̂(s_{t+1}; θ) - V̂(s_t; θ))^2

    ```


    (7.6)


    By using these objective functions and applying stochastic gradient descent with
    backpropagation, we can update the neural network parameters `θ` to better approximate
    the state value function and improve the policy evaluation in our reinforcement
    learning algorithm.


    Reinforcement learning distinguishes itself from supervised learning by using
    Monte Carlo or TD learning to estimate the target in the objective function. Monte
    Carlo and TD learning use reward signals and the value of successor states to
    estimate the target, which changes over time, unlike the fixed target in supervised
    learning, this also makes training neural network to approximate value functions
    more challenging.


    We can also use neural networks to approximate the state-action value function
    for some policy `π`, denoted as `Q̂`. The objective function for TD(0) policy
    evaluation for `Q̂` with respect to the parameters `θ` becomes


    ```

    J(θ) = (r_t + γ Q̂(s_{t+1}, a_{t+1}; θ) - Q̂(s_t, a_t; θ))^2

    ```


    (7.7) where `r_t` represents the reward signal, `γ` is a discount factor that
    determines the relative importance of future rewards, and `θ` represents the parameters
    of the neural network. By minimizing this objective function, we can update the
    neural network’s parameters to better approximate the true state-action value
    function `Q_π` for some policy `π`.'
