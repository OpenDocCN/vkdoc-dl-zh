  trans: '

    ### MCTS 搜索


    我们实现了 AlphaGo Zero 和 AlphaZero 论文中描述的 MCTS（蒙特卡洛树搜索）算法，使用了相同的配置和超参数。我们的实现每次搜索执行
    200 次模拟，这对于 `9 x 9` 的棋盘来说已经足够。探索参数 `c_base` 和 `c_init` 分别设置为 19652 和 1.25。我们按照
    AlphaZero 论文中的规定，在每一步向根节点添加狄利克雷噪声，其中 `epsilon = 0.25`，`eta = 0.03`。在自我对弈过程中，我们将公式
    (14.5) 中的温度在前 16 步设置为 1.0，后续步骤设置为 0.1。为了提高搜索过程的效率，我们使用了具有八个并行叶节点的并行 MCTS 搜索，并引入了文献
    [15] 中概述的虚拟损失。此外，在同一局游戏中，我们会在后续步骤中重用子树。


    然而，需要注意的是，在评估对局中（当前模型与先前模型对弈），我们不会向根节点添加狄利克雷噪声，也不会重用子树。这一决定基于以下事实：两个玩家是不同的，因此他们在面对相同状态时可能会产生不同的预测。


    ### 训练


    我们严格遵循 AlphaGo Zero 和 AlphaZero 论文中概述的标准流程和机制来训练我们的智能体。我们的训练方法完全基于从专用自我对弈角色收集的纯自我对弈对局，不涉及人类生成的对局或其他计算引擎或
    AI 程序来引导学习过程。


    鉴于我们有 120 个角色，我们使用单个学习器智能体来更新神经网络，这是一个合理的选择。为了优化训练，我们使用了 `PyTorch` 中的 `SGD` 优化器，将初始学习率设置为
    0.01，动量设置为 0.9，并应用 0.0001 的 L2 正则化。学习率遵循阶梯模式，分别在 200,000 和 400,000 训练步时逐步降低至 0.001
    和 0.0001。


    在每个训练步骤中，程序从最近的 250,000 局自我对弈对局中随机抽取一批 1024 个样本。为了增强训练过程，我们采用了数据增强技术，例如随机旋转和翻转，这是训练原始
    AlphaGo 智能体时使用的方法。此外，我们每 1000 个训练步生成一个检查点。


    由于 `9 x 9` 围棋相比 `19 x 19` 问题空间更小，我们相应地调整了方法。对于每个检查点，我们总共进行 5000 局自我对弈对局，而不是 25,000
    局，并将训练数据限制为最近的 250,000 局自我对弈对局，而不是 500,000 局。我们在角色总共进行了 20,000 局对弈后创建初始检查点，以确保在开始学习过程（例如，更新神经网络）之前探索了多样化的游戏状态。在整个训练过程中，总共使用了一百万局自我对弈对局来训练神经网络。


    ### 评估


    在训练过程中，我们在每个新检查点评估智能体的性能。我们使用最新模型与先前检查点的模型对弈，类似于自我对弈。然而，存在一些区别：两个玩家并不相同（黑棋代表最新模型，白棋代表先前模型），并且我们不需要智能体进行额外的探索（搜索树的根节点不添加噪声）。在每次蒙特卡洛树搜索（MCTS）之后，我们总是选择最佳落子（访问次数最多的子节点）。Elo
    评分使用简化的实现进行计算。具体来说，我们采用原始 AlphaGo Zero 论文中的公式来估计玩家 *a* 击败玩家 *b* 的概率。该公式表示为 `P(a
    击败 b) = 1 / (1 + exp(c_elo * (e(b) - e(a))))`，其中标准常数 `c_elo` 等于 `1/400`。此外，我们根据玩家当前的评分使用
    k 因子的变体。如果当前评分低于 2100，k 因子设置为 32。对于 2100 到 2400 之间的评分，k 因子为 24，对于 2400 以上的评分，k
    因子为 16。


    我们还使用一个包含总共 10,000 局对弈和 620,000 个棋位的评估数据集来评估模型预测人类对弈的准确性。在评估 `9 x 9` 围棋时，我们遇到的一个挑战是，职业人类棋手（职业段位）在这种小棋盘上的对局数量有限。事实上，我们的评估数据集包含的日本职业围棋棋手（从
    1p 到 9p）对局不到 3%。因此，我们不得不从互联网上收集剩余的对局，主要来自 CGOS 服务器。值得一提的是，虽然我们将评估数据集称为人类对弈对局，但其中很大一部分对局很可能是由计算机引擎或
    AI 程序而非真实人类进行的。


    为了确保评估数据集的高质量，我们只包含双方棋手 Elo 评分均至少为 2100 的对局。这是因为 Elo 评分 2100 大约相当于业余 1 段的水平 [16]。此外，尽管我们根据
    Elo 评分过滤了对局，但初始评分仍有可能不准确。另外，为了确保数据集的多样性，我们将来自同一棋手的对局数量限制在最多 200 局。此外，我们只将唯一的对局包含在评估数据集中。如果两局对弈由相同的两位棋手进行，持续相同的步数，并以相同的结果结束（即相同的胜者和相同的胜者点数），则视为重复对局。

    '
- fmt: '### Results


    We now present the training results of our experiment on a ![$$9 \times 9$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq182.png)
    Go board. As mentioned earlier, we utilized a neural network architecture consisting
    of 11 blocks for training. The training process took place on a single server
    equipped with 128 CPUs and 8 GPUs. The agent was trained for 200,000 steps, which
    required approximately 50 hours.


    Figure [14.10](#605748_1_En_14_Chapter.xhtml#Fig10) shows the training losses
    of the neural network. Both the cross-entropy loss for the policy and the MSE
    loss for the value show convergence as the training progresses. This is expected
    behavior, as for the AlphaZero algorithm, the training objective is solely focused
    on minimizing these losses, as the policy is improved through the MCTS search
    operator. Notably, the cross-entropy loss converges at a much faster rate, indicating
    that accurately predicting the game outcome is a considerably more challenging
    task.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig10_HTML.png)


    Two graphs plot cross-entropy loss and MSE loss versus training steps, respectively.
    These plot descending trends from (0, 4.3) to (220, 1.3) and (0, 0.9) to (220,
    0.19), respectively. The trends fluctuate vigorously. Values are estimated.


    **Fig. 14.10** The policy cross-entropy loss (left) and value MSE loss (right)
    during training of the AlphaZero agent on a ![$$9 \times 9$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq183.png)
    Go board


    Figures [14.11](#605748_1_En_14_Chapter.xhtml#Fig11) and [14.12](#605748_1_En_14_Chapter.xhtml#Fig12)
    illustrate the model’s prediction accuracy based on an evaluation dataset containing
    10,000 games and 620,000 positions. The creation of this evaluation dataset was
    previously described. Notably, after 100,000 training steps, the model achieves
    a 40% prediction rate for moves within the evaluation dataset. Moreover, we observe
    an enhancement in the model’s ability to accurately predict human game outcomes.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig12_HTML.png)


    A graph of MSE of human game outcomes versus training steps. The plotted trend
    descends with fluctuations from (0, 0.93) to (220, 0.67). Values are estimated.


    **Fig. 14.12** MSE of the neural network’s prediction on human game outcomes.
    It shows unscaled error between the value from neural network’s prediction and
    the actual game outcome


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig11_HTML.png)


    A graph plots prediction accuracy on human moves in percent versus training steps.
    It plots a fluctuating trend that ascends in a concave downward manner from (0,
    4) to (220, 48). Values are estimated.


    **Fig. 14.11** Accuracy of the neural network’s prediction on human moves. It
    measures the percentage of top 1 prediction accuracy, which is the ones with highest
    probability matching the actual human moves


    Figure [14.13](#605748_1_En_14_Chapter.xhtml#Fig13) shows the Elo ratings of the
    agent during training. These ratings were computed from evaluation games, where
    the latest model played as the black player against the model from the previous
    checkpoint as the white player. The results indicate that the agent’s performance
    peaked at around 150,000 training steps. As training progressed, the performance
    began to diverge and did not recover. We suspect that the primary reason for this
    issue is the large learning rate. In our experiments, the initial learning rate
    was set to 0.01 and scheduled to decrease in a staircase manner to 0.001 and 0.0001
    at training steps 200,000 and 400,000, respectively. However, since the agent
    likely reached a certain level of proficiency after 100,000 training steps, it
    may be more appropriate to reduce the learning rate earlier, such as decreasing
    it to 0.001 and 0.0001 at training steps 100,000 and 200,000, respectively.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig13_HTML.png)


    A graph of Elo rating versus training steps. It plots a fluctuating trend that
    ascends from (0, 10) to (220, 220). Values are estimated.


    **Fig. 14.13** Performance of the AlphaZero agent on a ![$$9 \times 9$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq184.png)
    Go board. Elo ratings were computed from evaluation games between the current
    (latest) model and the model from the previous checkpoint


    To assess the true strength of our agent, we conducted a series of matches against
    a computer program known as CrazyStone [[17](#605748_1_En_14_Chapter.xhtml#CR17)].
    Utilizing deep neural networks for move prediction, CrazyStone proved to be a
    formidable opponent. Our most advanced models (11-block version from training
    steps 154,000) displayed remarkable performance, winning 16 out of 20 games against
    the amateur 1 dan level opponent of CrazyStone. This outcome undeniably attests
    to the significant level of strength achieved by our agent, despite its comparatively
    low Elo ratings in the self-play evaluation games. However, it should be noted
    that our agent did not consistently secure victories when pitted against the 2
    dan level CrazyStone opponent. We find this outcome satisfactory, given the agent’s
    relatively short training duration and limited exposure to a small number of games.
    It is important to highlight that we have not conducted extensive fine-tuning
    on the agent’s training methods or hyperparameters.


    In Fig. [14.14](#605748_1_En_14_Chapter.xhtml#Fig14), we present the final state
    of the first 12 games played against the CrazyStone amateur 1 dan level opponent.
    Our agent played as white, while CrazyStone played as black. The scores were determined
    using the Chinese rules, with a komi of 7.5 for white.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig14_HTML.png)


    A set of 12 charts of Go games with different outcomes played against the Crazy
    Stone amateur 1 dan level opponent.


    **Fig. 14.14** In these games, our agent (playing as white) is against CrazyStone
    (playing as black). We used the 11-block model version and carefully selected
    the best model produced after 154,000 training steps. To provide a suitable challenge,
    CrazyStone was set at an amateur 1 dan level. The games were scored using the
    Chinese rules, with a komi of 7.5 points to white'
