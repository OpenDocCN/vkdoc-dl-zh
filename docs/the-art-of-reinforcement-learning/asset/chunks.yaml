    ''$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq33.png)是节点![$$\nu
    $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq34.png)的一个子节点，*c*
    是如公式(14.2)所示的一个常数。


    **算法 2: UCT—最佳子节点**


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Figaab_HTML.gif) 一个用于`UCT`最佳子节点的搜索算法，包含`bestChild`函数。`nu`和`c`是要传递的参数。


    然后，我们可以将上述`UCT`算法插入到通用的`MCTS`算法中，这为我们提供了一个强大的框架，用于在强化学习问题中平衡探索和利用。通过使用这些算法，智能体可以通过探索新动作，同时利用已被证明有效的动作，逐步提高其性能。


    ### 双人零和游戏的 MCTS


    前面讨论的通用`MCTS`算法适用于智能体做出所有动作的单人游戏。然而，对于像国际象棋或围棋这样的双人零和游戏，情况变得更加复杂。这是因为在反向传播模拟结果![$$\Delta
    $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq35.png)时，我们需要考虑两个玩家的视角。


    在双人零和游戏中，游戏的结果总是零和结果，这意味着一个玩家获胜，另一个玩家必须失败。因此，我们需要分别计算每个玩家的奖励。例如，在一盘国际象棋中，如果我们使用`MCTS`为黑方玩家规划下一步，并且模拟结果导致黑方获胜，那么我们应该为搜索树遍历路径中代表黑方回合的所有边分配+1的奖励。然而，对于白方，奖励应为-1，因为这个结果代表白方失败。


    一种解决方案是为对手玩家切换![$$\Delta $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq38.png)的符号，以准确反映游戏的性质。这是因为在双人零和游戏中，一个玩家的胜利总是另一个玩家的失败。因此，对两个玩家使用相同的![$$\Delta
    $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq39.png)无法准确表示游戏的结果。


    图14.5展示了一个基于玩具游戏井字棋的`MCTS`如何反向传播模拟结果的示例。在这个游戏中，两个玩家轮流在一个三乘三的网格上落子。一个玩家下X，另一个玩家下O。第一个在水平、垂直或对角线上连成三子的玩家获胜。如果棋盘填满且没有玩家连成三子，则游戏为平局。


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig5_HTML.png)


    基于玩具游戏井字棋的双人零和游戏的十张图示，包含四个层级，分别是X移动、O移动、X移动和O移动。


    **图 14.5** 基于玩具游戏井字棋的通用`MCTS`如何为双人零和游戏反向传播模拟结果的示例


    为简单起见，我们只关注如何从导致终止状态的节点（即图14.5中标有游戏获胜者的节点）反向传播结果，并忽略搜索树中的所有中间节点。


    用于双人零和游戏反向传播的一个简单伪代码如算法3所示，其中我们在每次使用模拟结果![$$\Delta $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq40.png)更新搜索树统计信息时，都会切换其符号。


    **算法 3: 双人零和游戏的 MCTS 反向传播**


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Figaac_HTML.gif) 一个用于双人零和游戏的`MCTS`反向传播的搜索算法，包含`backup`函数。`nu`和`delta`是要传递的参数。


    一旦我们计算了遍历路径中节点的值，考虑如何计算双人零和游戏的均值就很重要了。与单人游戏中搜索树中的所有节点都为同一玩家存储值不同，在双人游戏中，子节点的高值可能并不代表父节点的最佳利益。这是因为双人游戏中节点的值取决于轮到哪个玩家。


    例如，考虑井字棋游戏。假设当前玩家是X，搜索算法正在评估一个潜在的移动，该移动会导致X有两子连成一线而O有一子连成一线的位置。从X的角度来看，这是一个好位置，应该具有高值。然而，从O的角度来看，这个位置很糟糕，应该具有低值。因此，在计算该节点的均值时，我们需要考虑轮到谁，以及节点的值是如何基于该视角计算的。


    总之，当使用`MCTS`进行双人零和游戏时，仔细考虑如何更新搜索树中节点的统计信息以及计算其子节点的均值至关重要。这是因为每个节点的值代表了玩家如果选择该节点并最优地玩下去所能获得的预期奖励。'
  raw: '(14.2) where *N* is the number of times the current node’s parent has been
    visited, and ![$$n_j$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq29.png)
    is the number of times child *j* has been visited. *C* is a constant that controls
    the amount of exploration during the search. If multiple child nodes have the
    same maximal value, the tie is usually broken by randomly selecting one of those
    nodes. As with UCB1, when ![$$n_j=0$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq30.png)
    , the UCB value becomes ![$$\infty $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq31.png)
    . This ensures that all children of a node are visited at least once before any
    further expansion takes place.


    To see how UCT works in practice, let’s consider a game where a player moves a
    pawn on a chessboard. The player can choose from several possible moves on each
    turn, but doesn’t know which move is the best. The goal is to find the sequence
    of moves that leads to the best outcome (e.g., winning the game).


    During the search, the UCT algorithm maintains a tree of game states and possible
    moves, with each node representing a game state and each edge representing a possible
    move. The search starts from the root node, which represents the current state
    of the game. At each step, the algorithm selects a child node to expand based
    on the UCB score and continues until it reaches a leaf node.


    Once a leaf node is reached, a simulation or rollout is executed until the game
    reaches the terminal state. The simulation result value is then backpropagated
    up the tree, updating the UCB scores of each node along the path that was taken.
    This allows the algorithm to gradually improve its estimate of the value of each
    possible move and to explore promising moves more thoroughly.


    The pseudocode for using the UCT algorithm to select the best child is shown in
    Algorithm 2, where ![$$\nu $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq32.png)
    is a node in the tree, ![$$\nu ''$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq33.png)
    is a child of node ![$$\nu $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq34.png)
    , and *c* is some constant as shown in Eq. ([14.2](#605748_1_En_14_Chapter.xhtml#Equ2)).


    Algorithm 2: UCT—best child


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Figaab_HTML.gif) A search algorithm
    for U C T best child with best child function. nu and c are parameters to be passed.


    We can then plug in the preceding UCT algorithm to the general MCTS algorithm,
    which gives us a powerful framework for balancing exploration and exploitation
    in reinforcement learning problems. By using these algorithms, agents can gradually
    improve their performance over time by exploring new actions while also exploiting
    actions that have proven to be effective in the past.


    ### MCTS for Two-Player Zero-Sum Games


    The general MCTS algorithm discussed earlier is for single-player games where
    the agent makes all the moves. However, for two-player zero-sum games like chess
    or Go, the situation becomes more complex. This is because we need to consider
    the perspective of both players when backing up the simulation results ![$$\Delta
    $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq35.png) .


    In two-player zero-sum games, the outcome of the game is always a zero-sum result,
    meaning that for one player to win, the other player must lose. Therefore, we
    need to calculate the reward for each player separately. For example, in a game
    of chess, if we use MCTS to plan the next move for the black player, and the simulation
    results in a win for black, then we should assign a reward of ![$$+$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq36.png)
    1 to all the edges representing black’s turn to move in the traversed path of
    the search tree. However, for white, the reward should be ![$$-$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq37.png)
    1, as this outcome represents a loss for them.


    One solution is to switch the sign of ![$$\Delta $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq38.png)
    for the opponent player to accurately reflect the nature of the game. This is
    because in two-player zero-sum games, one player’s win is always another player’s
    loss. Therefore, using the same ![$$\Delta $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq39.png)
    for both players would not accurately represent the outcome of the game.


    Figure [14.5](#605748_1_En_14_Chapter.xhtml#Fig5) shows an example of how MCTS
    backs up the simulation results based on the toy game Tic-Tac-Toe. In this game,
    two players take turns playing on a three-by-three grid. One player plays Xs and
    the other plays Os. The first player to get three marks in a row (horizontally,
    vertically, or diagonally) wins the game. If the board fills up and neither player
    has three in a row, then the game is a draw.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig5_HTML.png)


    Ten illustrations of a two-player zero-sum game based on the toy game Tic-Tac-Toe
    with four levels namely X to move, O to move, X to move, and O to move.


    Fig. 14.5


    Example of how general MCTS backs up simulation results for a two-player zero-sum
    game based on the toy game Tic-Tac-Toe


    To keep things simple, we focus only on how to back up the results from the node
    that leads to a terminal state, which is the one labeled with the winner of the
    game in Fig. [14.5](#605748_1_En_14_Chapter.xhtml#Fig5), and we ignore all the
    intermediate nodes in the search tree.


    A simple pseudocode for the backup for two-player zero-sum games is shown in Algorithm
    3, where we are switching the sign for the simulation results ![$$\Delta $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq40.png)
    every time we’ve used it to update the search tree statistics.


    Algorithm 3: MCTS backup for two-player zero-sum games


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Figaac_HTML.gif) A search algorithm
    for M C T S backup for two-player zero-sum games with backup function. nu and
    delta are parameters to be passed.


    Once we have computed the values of the nodes in the traversed path, it is important
    to consider how we calculate mean values for two-player zero-sum games. Unlike
    in single-player games, where the nodes in the search tree all store values for
    the same player, in two-player games, a high value of a child node may not necessarily
    represent the best interest of the parent node. This is because the value of a
    node in a two-player game depends on the perspective of the player whose turn
    it is.


    For example, consider the game of Tic-Tac-Toe. Suppose the current player is X
    and the search algorithm is evaluating a potential move that leads to a position
    where X has two in a row and O has one in a row. From X’s perspective, this is
    a good position and should have a high value. However, from O’s perspective, this
    position is bad and should have a low value. Therefore, when computing the mean
    value of this node, we need to take into account whose turn it is and how the
    value of the node is computed based on that perspective.


    In summary, when using MCTS for two-player zero-sum games, it is crucial to carefully
    consider how to update the statistics of nodes in the search tree and compute
    the mean values of their children nodes. This is because the values of each node
    represent the expected reward that a player can obtain if they select that node
    and play optimally.'
