  trans: '

    ### 裁剪替代目标函数


    PPO 建立在公式 (11.12) 所示的替代目标函数思想之上。然而，它不需要直接计算 KL 散度 `D_{KL}`。为了理解为何可行，让我们考察概率比与
    KL 散度之间的关系。


    回顾一下，给定两个策略 `π''` 和 `π`，它们在给定状态 `s` 下的 KL 散度可通过以下公式计算：


    ```

    D_{KL}(π''||π)[s] = Σ_{a ∈ A} π''(a|s) log(π''(a|s) / π(a|s))

    ```


    KL 散度衡量的是旧策略 `π` 与新策略 `π''` 概率分布之间的对数差异。如果新策略与旧策略相同，即 `π'' = π`，那么概率比为 1.0。随着新策略偏离旧策略，这个比值会发生剧烈变化。然而，这个比值与
    KL 散度之间是什么关系呢？


    举个例子，考虑一个简单的马尔可夫决策过程（MDP），它只有一个状态 `s` 和两个动作 `a1` 和 `a2`。假设我们有一个新策略 `π''` 和一个旧策略
    `π`，在旧策略下，状态 `s` 中选择动作 `a1` 和 `a2` 的概率均为 0.5，即 `π(a1|s) = 0.5` 且 `π(a2|s) = 0.5`。


    我们可以计算在状态 `s` 下，对于每个动作 `a1, a2`，`π''` 和 `π` 的概率比 `π''(a|s) / π(a|s)`。表 11.1 展示了不同新策略对应的概率比和
    KL 散度。


    **表 11.1** 不同新策略 `π''` 与旧策略 `π` 之间的概率比和 KL 散度示例


    | `π''(·|s)` | `π(·|s)` | `π''(a1|s) / π(a1|s)` | `π''(a2|s) / π(a2|s)` | `D_{KL}(π''||π)[s]`
    |

    | --- | --- | --- | --- | --- |

    | [0.1, 0.9] | [0.5, 0.5] | 0.2 | 1.8 | 0.37 |

    | [0.2, 0.8] | [0.5, 0.5] | 0.4 | 1.6 | 0.19 |

    | [0.3, 0.7] | [0.5, 0.5] | 0.6 | 1.4 | 0.08 |

    | [0.4, 0.6] | [0.5, 0.5] | 0.8 | 1.2 | 0.02 |

    | [0.5, 0.5] | [0.5, 0.5] | 1.0 | 1.0 | 0.0 |

    | [0.6, 0.4] | [0.5, 0.5] | 1.2 | 0.8 | 0.02 |

    | [0.7, 0.3] | [0.5, 0.5] | 1.4 | 0.6 | 0.08 |

    | [0.8, 0.2] | [0.5, 0.5] | 1.6 | 0.4 | 0.19 |

    | [0.9, 0.1] | [0.5, 0.5] | 1.8 | 0.2 | 0.37 |


    结果展示了一个非常有趣的模式：随着两个策略 `π''` 和 `π` 偏离程度增大，即它们的概率比偏离 1.0 越远，KL 散度也随之增加。


    这给了我们一个启示：也许我们可以不计算 KL 散度，而是直接对概率比施加约束，使其接近 1.0，如公式 (11.13) 所示，其中 `ε` 是一个小变量，用于控制我们希望对概率比施加的约束程度。


    ```

    clip(π''(a|s) / π(a|s), 1 - ε, 1 + ε) * Â_t

    ```


    (11.13)


    然而，在某些情况下，使用裁剪后的概率比可能导致对优势函数的高估，从而产生过于保守的策略，无法探索可能比旧策略所选动作更优的新动作。为了理解原因，让我们考虑一个简单的例子。


    假设旧策略在状态 `s` 下选择动作 `a` 的概率为 0.8，优势估计值为 0.5。新策略在状态 `s` 下选择动作 `a` 的概率为 0.3。我们使用
    `ε = 0.2`，因此裁剪范围应为 [0.8, 1.2]。


    使用裁剪后的比值会得到 `0.3 / 0.8 = 0.375`，这小于裁剪范围的下限。因此，裁剪后的比值将为 0.8，目标函数计算结果为 `0.8 * 0.5
    = 0.4`。


    然而，如果我们使用原始的未裁剪概率比，目标函数计算结果为 `0.375 * 0.5 = 0.1875`。在这种情况下，裁剪后的概率比导致对优势函数的估计远高于未裁剪的比值。这可能导致策略高估某些动作的价值，而实际上忽略了旧策略选择的、能产生更好期望回报的其他动作。

    '
- fmt: '# PPO 中的裁剪代理目标函数


    为了解决这个问题，PPO 还对裁剪目标和非裁剪目标逐元素取最小值，以缓解高估问题。这有助于缓解高估问题，并允许更好地探索新动作。通过使用两个目标的最小值，在裁剪比率会导致高估的区域，更新将更加保守，但在未裁剪比率会导致策略发生显著变化的区域，仍允许进行探索。


    PPO 的最终裁剪代理目标函数 `L_pi_CLIP(pi'')` 如公式 (11.14) 所示。


    ```

    \displaystyle \begin{aligned} \mathop{\text{argmax}}_{\pi''}\mathcal{L}_{\pi}^{CLIP}(\pi'')
    & = \mathop{\text{argmax}}_{\pi''} \mathbb{E}_{\tau \sim \pi\!\!}\left[ \min \Biggl(
    \frac{\pi''(a|s)}{\pi(a|s)} \hat{A}_t, \; clip \left( \frac{\pi''(a|s)}{\pi(a|s)},
    1-\epsilon, 1+\epsilon \right)\hat{A}_t \Biggr)\right] {} \end{aligned}

    ```


    (11.14)


    有了这个裁剪代理目标函数，我们可以像使用标准策略梯度方法（如 Actor-Critic）一样，使用随机梯度上升方法来训练策略网络。无需像 TRPO 等其他算法那样手动计算梯度然后寻找优化方向。


    ## 广义优势估计


    PPO 使用 Schulman 等人提出的广义优势估计（GAE）方法来计算优势，该方法用于估计预期未来奖励以及在给定状态下采取特定动作的优势。GAE 通过将
    N 步回报与价值函数的自举估计相结合，提供了更稳定、方差更低的优势函数估计。这种方法使 PPO 能够处理不同长度的任务，因为它可以在固定时间范围内估计优势函数，并且可以适应任务的长度。


    优势函数衡量采取某个特定动作相对于其他动作有多好，是 PPO 等策略梯度方法中的关键量。优势函数通常使用观察到的奖励与当前策略下的预期奖励之间的差值来估计。


    优势函数使用有限时间范围回报方法的截断版本进行计算，如公式 (11.15) 所示，其中 `lambda` 是一个参数，用于控制优势函数估计中偏差和方差之间的权衡。当
    `lambda = 1` 时，GAE 退化为标准的 N 步 TD 方法。


    ```

    \displaystyle \begin{aligned} \hat{A}_t = \delta_t + ({\gamma} \lambda) \delta_{t+1}
    + ({\gamma} \lambda)^2 \delta_{t+2} + \cdots + ({\gamma} \lambda)^{T-t-1} \delta_{T-1}
    {} \end{aligned}

    ```


    (11.15)


    这里，`delta_t` 是时序差分误差，即奖励总和与当前状态估计值及后继状态估计值之间的差值，如公式 (11.16) 所示。


    ```

    \displaystyle \begin{aligned} \delta_t = r_t + {\gamma} V_\pi(s_{t+1}) - V_\pi(s_t)
    {} \end{aligned}

    ```


    (11.16)


    要恢复序列中特定状态的回报，我们可以使用 GAE 优势加上估计的状态价值，如公式 (11.17) 所示。


    ```

    \displaystyle \begin{aligned} G_t = \hat{A}_t + V_\pi(s_t) {} \end{aligned}

    ```


    (11.17)


    GAE 方法已被证明可以提高 PPO 的稳定性和收敛性，同时在优势函数估计中保持偏差和方差之间的良好平衡。它是一个强大的工具，可用于在各种强化学习环境中估计回报和优势。


    ## 对数概率比


    在实践中，我们经常在裁剪代理目标函数中使用对数概率比而不是概率比 `pi''(a|s) / pi(a|s)`，这可以带来更稳定和高效的优化，尤其是在处理很小或很大的概率比时。原因之一是取概率比的对数有助于缩小可能值的范围。在实践中，概率比有时会取非常小或非常大的值，这可能导致数值不稳定或下溢/上溢错误。通过取对数，我们可以将这些值转换到更易于管理的范围。


    对数概率比可以重写为：


    ```

    \displaystyle \begin{aligned} \frac{\pi''(a|s)}{\pi(a|s)} = \exp(\log \pi''(a|s)
    - \log \pi(a|s)) \end{aligned}

    ```


    (11.18)


    然后，PPO 执行 `M` 个 epoch 的参数更新，每次更新重用相同的转移序列；因此，它实现了更好的数据效率。在每次更新期间，策略参数被优化以最大化裁剪代理目标函数，而状态价值函数的参数被优化以最小化平方误差。裁剪
    epsilon `epsilon` 是一个超参数，用于控制概率比被裁剪的程度，以防止策略更新过大。`epsilon` 的常见值是 0.1 或 0.2。通过裁剪概率比，PPO
    可以防止可能破坏训练过程稳定性的过大策略更新。


    **算法 1：使用裁剪代理目标的近端策略优化算法**


    一个方框列出了算法 1（使用裁剪代理目标的近端策略优化算法）的输入、初始化和输出细节。该算法的步骤 1 到 9 被提及。


    在算法 1 中，更新是针对序列中的所有转移一次性完成的。然而，在实践中，一次使用一小批转移进行更新效率更高。这是因为计算资源限制，例如 GPU 内存有限，有时很难一次性处理所有转移。


    此外，PPO 还可以在裁剪代理策略梯度目标函数中包含一个熵项。这可以通过鼓励策略选择具有更多不确定性的动作来促进探索。此外，PPO 可以在训练过程中衰减裁剪
    epsilon `epsilon`。例如，一种常见的策略是使用 0.2 作为 `epsilon` 的初始值，然后将其衰减到某个固定的较小值，例如在训练过程中线性退火到
    0.02。这是因为当智能体开始训练时，它可能会随机执行动作，因此使用更大的参数更新信任区域是必要的。然而，随着智能体进步并变得更加自信，较小的信任区域更可取，以防止可能破坏已学习策略的过大策略更新。'
  raw: 'To address this issue, PPO also takes the element-wise minimum of the clipped
    objective and nonclipped objective to mitigate the problem of overestimation.
    This helps to mitigate the problem of overestimation and allows for better exploration
    of new actions. By using the minimum of the two objectives, the update will be
    more conservative in regions where the clipped ratio would have resulted in an
    overestimate, but will still allow for exploration in regions where the unclipped
    ratio would have resulted in a significant change in the policy.


    The final clipped surrogate objective function ![$$\mathcal {L}_{\pi }^{CLIP}(\pi
    '')$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq142.png) for
    PPO is shown in Eq. ([11.14](#605748_1_En_11_Chapter.xhtml#Equ15)).


    ![$$\displaystyle \begin{aligned} \mathop{\text{argmax}}_{\pi''}\mathcal{L}_{\pi}^{CLIP}(\pi'')
    &amp; = \mathop{\text{argmax}}_{\pi''} \mathbb{E}_{\tau \sim \pi\!\!}\left[ \min
    \Biggl( \frac{\pi''(a|s)}{\pi(a|s)} \hat{A}_t, \; clip \left( \frac{\pi''(a|s)}{\pi(a|s)},
    1-\epsilon, 1+\epsilon \right)\hat{A}_t \Biggr)\right] {} \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ15.png)


    (11.14)


    With this clipped surrogate objective function, we can use stochastic gradient
    ascent methods to train the policy network as we’d do for standard policy gradient
    methods like Actor-Critic. There’s no need to manually compute gradients and then
    searching for the optimization direction, as required by other algorithms like
    TRPO.


    ### Generalized Advantage Estimation


    PPO uses the generalized advantage estimation (GAE) method proposed by Schulman
    et al. [[10](#605748_1_En_11_Chapter.xhtml#CR10)] to compute the advantages, which
    is used to estimate the expected future rewards and the advantage of taking a
    particular action in a given state. GAE provides a more stable and low-variance
    estimate of the advantage function by combining the N-step returns with a bootstrapped
    estimate of the value function. This approach allows PPO to handle tasks with
    varying length, as it can estimate the advantage function over a fixed horizon,
    which can be adapted to the length of the task.


    The advantage function measures how much better to take certain action instead
    of other actions, and is a key quantity in policy gradient methods like PPO. The
    advantage function is usually estimated using the difference between the observed
    rewards and the expected rewards under the current policy.


    The advantage function is calculated using a truncated version of the finite horizon
    return method, as shown in Eq. ([11.15](#605748_1_En_11_Chapter.xhtml#Equ16)),
    where ![$$\lambda $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq143.png)
    is a parameter that controls the trade-off between bias and variance in the estimation
    of the advantage function. When ![$$\lambda =1$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq144.png)
    , GAE reduces to the standard N-step TD methods.


    ![$$\displaystyle \begin{aligned} \hat{A}_t = \delta_t + ({\gamma} \lambda) \delta_{t+1}
    + ({\gamma} \lambda)^2 \delta_{t+2} + \cdots + ({\gamma} \lambda)^{T-t-1} \delta_{T-1}
    {} \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ16.png)


    (11.15)


    Here, ![$$\delta _t$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq145.png)
    is the temporal difference error, which is the difference between the sum of the
    rewards and the estimated value of the current state and the estimated value of
    the successor state, as shown in Eq. ([11.16](#605748_1_En_11_Chapter.xhtml#Equ17)).


    ![$$\displaystyle \begin{aligned} \delta_t = r_t + {\gamma} V_\pi(s_{t+1}) - V_\pi(s_t)
    {} \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ17.png)


    (11.16)


    To recover the returns for a specific state in the sequence, we can use the GAE
    advantages plus the estimated state value, as shown in Eq. ([11.17](#605748_1_En_11_Chapter.xhtml#Equ18)).


    ![$$\displaystyle \begin{aligned} G_t = \hat{A}_t + V_\pi(s_t) {} \end{aligned}
    $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ18.png)


    (11.17)


    The GAE method has been shown to improve the stability and convergence of PPO
    while maintaining a good balance between bias and variance in the estimation of
    the advantage function. It is a powerful tool that can be used to estimate returns
    and advantages in a variety of reinforcement learning settings.


    ### Log Probability Ratio


    In practice, we often use the log probability ratio instead of the probability
    ratio ![$$\frac {\pi ''(a|s)}{\pi (a|s)}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq146.png)
    in the clipped surrogate objective function, which can lead to more stable and
    efficient optimization, especially when dealing with small or large probability
    ratios. One reason for this is that taking the logarithm of the probability ratio
    can help to reduce the range of possible values. In practice, the probability
    ratio can sometimes take on very small or very large values, which can cause numerical
    instability or underflow/overflow errors. By taking the logarithm, we can transform
    these values into a more manageable range.


    The log probability ratio can be rewritten as


    ![$$\displaystyle \begin{aligned} \frac{\pi''(a|s)}{\pi(a|s)} = \exp(\log \pi''(a|s)
    - \log \pi(a|s)) \end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ19.png)


    (11.18)


    PPO then performs *M* epoch parameter updates, reusing the same sequence of transitions
    for each update; thus, it achieves much better data efficiency. During each update,
    the policy parameters are optimized to maximize the clipped surrogate objective
    function, while the parameters of the state value function is optimized to minimize
    the squared error. The clip epsilon ![$$\epsilon $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq147.png)
    is a hyperparameter that controls the extent to which the probability ratio is
    clipped to prevent large policy updates. A common value for ![$$\epsilon $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq148.png)
    is 0.1 or 0.2\. By clipping the probability ratio, PPO can prevent large policy
    updates that may destabilize the training process.


    Algorithm 1: Proximal Policy Optimization algorithms with clipped surrogate objective


    ![](images/605748_1_En_11_Chapter/605748_1_En_11_Figaaa_HTML.gif) A box lists
    the input, initialize, and output details of algorithm 1, proximal policy optimization
    algorithms with clipped surrogate objectives. The steps 1 to 9 of the algorithm
    are mentioned.


    In the Algorithm 1, the updates are performed in one go for all the transitions
    in the sequence. However, in practice, it is more efficient to perform updates
    using a small mini-batch of transitions at a time. This is because due to computation
    resource limitations, sometimes it’s hard to processing all the transitions in
    one go, for example due to limited GPU memory.


    In addition, PPO can also include an entropy term in the clipped surrogate policy
    gradient objective function. This can help promote exploration by encouraging
    the policy to choose actions with more uncertainty. Moreover, PPO can decay the
    clip epsilon ![$$\epsilon $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq149.png)
    over the training session. For example, a common strategy is to use 0.2 as the
    initial value for ![$$\epsilon $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq150.png)
    , then decay it to some fixed small value, for example annealing it linearly to
    0.02 over the course of the training process. This is because when the agent starts
    training, it might perform randomly, so using a larger trust region for the parameter
    updates is necessary. However, as the agent progresses and becomes more confident,
    smaller trust regions are preferable to prevent overly large policy updates that
    may disrupt the learned policy.'
  trans: '

    # PPO 中的裁剪代理目标函数


    为了解决这个问题，PPO 还对裁剪目标和非裁剪目标逐元素取最小值，以缓解高估问题。这有助于缓解高估问题，并允许更好地探索新动作。通过使用两个目标的最小值，在裁剪比率会导致高估的区域，更新将更加保守，但在未裁剪比率会导致策略发生显著变化的区域，仍允许进行探索。


    PPO 的最终裁剪代理目标函数 `L_pi_CLIP(pi'')` 如公式 (11.14) 所示。


    ```

    \displaystyle \begin{aligned} \mathop{\text{argmax}}_{\pi''}\mathcal{L}_{\pi}^{CLIP}(\pi'')
    & = \mathop{\text{argmax}}_{\pi''} \mathbb{E}_{\tau \sim \pi\!\!}\left[ \min \Biggl(
    \frac{\pi''(a|s)}{\pi(a|s)} \hat{A}_t, \; clip \left( \frac{\pi''(a|s)}{\pi(a|s)},
    1-\epsilon, 1+\epsilon \right)\hat{A}_t \Biggr)\right] {} \end{aligned}

    ```


    (11.14)


    有了这个裁剪代理目标函数，我们可以像使用标准策略梯度方法（如 Actor-Critic）一样，使用随机梯度上升方法来训练策略网络。无需像 TRPO 等其他算法那样手动计算梯度然后寻找优化方向。


    ## 广义优势估计


    PPO 使用 Schulman 等人提出的广义优势估计（GAE）方法来计算优势，该方法用于估计预期未来奖励以及在给定状态下采取特定动作的优势。GAE 通过将
    N 步回报与价值函数的自举估计相结合，提供了更稳定、方差更低的优势函数估计。这种方法使 PPO 能够处理不同长度的任务，因为它可以在固定时间范围内估计优势函数，并且可以适应任务的长度。


    优势函数衡量采取某个特定动作相对于其他动作有多好，是 PPO 等策略梯度方法中的关键量。优势函数通常使用观察到的奖励与当前策略下的预期奖励之间的差值来估计。


    优势函数使用有限时间范围回报方法的截断版本进行计算，如公式 (11.15) 所示，其中 `lambda` 是一个参数，用于控制优势函数估计中偏差和方差之间的权衡。当
    `lambda = 1` 时，GAE 退化为标准的 N 步 TD 方法。


    ```

    \displaystyle \begin{aligned} \hat{A}_t = \delta_t + ({\gamma} \lambda) \delta_{t+1}
    + ({\gamma} \lambda)² \delta_{t+2} + \cdots + ({\gamma} \lambda)^{T-t-1} \delta_{T-1}
    {} \end{aligned}

    ```


    (11.15)


    这里，`delta_t` 是时序差分误差，即奖励总和与当前状态估计值及后继状态估计值之间的差值，如公式 (11.16) 所示。


    ```

    \displaystyle \begin{aligned} \delta_t = r_t + {\gamma} V_\pi(s_{t+1}) - V_\pi(s_t)
    {} \end{aligned}

    ```


    (11.16)


    要恢复序列中特定状态的回报，我们可以使用 GAE 优势加上估计的状态价值，如公式 (11.17) 所示。


    ```

    \displaystyle \begin{aligned} G_t = \hat{A}_t + V_\pi(s_t) {} \end{aligned}

    ```


    (11.17)


    GAE 方法已被证明可以提高 PPO 的稳定性和收敛性，同时在优势函数估计中保持偏差和方差之间的良好平衡。它是一个强大的工具，可用于在各种强化学习环境中估计回报和优势。


    ## 对数概率比


    在实践中，我们经常在裁剪代理目标函数中使用对数概率比而不是概率比 `pi''(a|s) / pi(a|s)`，这可以带来更稳定和高效的优化，尤其是在处理很小或很大的概率比时。原因之一是取概率比的对数有助于缩小可能值的范围。在实践中，概率比有时会取非常小或非常大的值，这可能导致数值不稳定或下溢/上溢错误。通过取对数，我们可以将这些值转换到更易于管理的范围。


    对数概率比可以重写为：


    ```

    \displaystyle \begin{aligned} \frac{\pi''(a|s)}{\pi(a|s)} = \exp(\log \pi''(a|s)
    - \log \pi(a|s)) \end{aligned}

    ```


    (11.18)


    然后，PPO 执行 `M` 个 epoch 的参数更新，每次更新重用相同的转移序列；因此，它实现了更好的数据效率。在每次更新期间，策略参数被优化以最大化裁剪代理目标函数，而状态价值函数的参数被优化以最小化平方误差。裁剪
    epsilon `epsilon` 是一个超参数，用于控制概率比被裁剪的程度，以防止策略更新过大。`epsilon` 的常见值是 0.1 或 0.2。通过裁剪概率比，PPO
    可以防止可能破坏训练过程稳定性的过大策略更新。


    **算法 1：使用裁剪代理目标的近端策略优化算法**


    一个方框列出了算法 1（使用裁剪代理目标的近端策略优化算法）的输入、初始化和输出细节。该算法的步骤 1 到 9 被提及。


    在算法 1 中，更新是针对序列中的所有转移一次性完成的。然而，在实践中，一次使用一小批转移进行更新效率更高。这是因为计算资源限制，例如 GPU 内存有限，有时很难一次性处理所有转移。


    此外，PPO 还可以在裁剪代理策略梯度目标函数中包含一个熵项。这可以通过鼓励策略选择具有更多不确定性的动作来促进探索。此外，PPO 可以在训练过程中衰减裁剪
    epsilon `epsilon`。例如，一种常见的策略是使用 0.2 作为 `epsilon` 的初始值，然后将其衰减到某个固定的较小值，例如在训练过程中线性退火到
    0.02。这是因为当智能体开始训练时，它可能会随机执行动作，因此使用更大的参数更新信任区域是必要的。然而，随着智能体进步并变得更加自信，较小的信任区域更可取，以防止可能破坏已学习策略的过大策略更新。

