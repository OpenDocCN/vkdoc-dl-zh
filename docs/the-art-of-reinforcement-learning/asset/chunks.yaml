- fmt: '# 14. Planning with a Model: AlphaZero


    Throughout this book, we have discussed various model-free reinforcement learning
    algorithms that have proven effective in solving simple reinforcement learning
    problems such as classic control tasks and Atari video games. However, for more
    complex problems, these algorithms may not perform well, even with the application
    of advanced techniques like distributed training and curiosity-driven exploration.
    Therefore, in this final chapter, we will explore how to use model-based reinforcement
    learning to tackle more challenging tasks.


    We’ll focus on employing an accurate model of the game environment and advanced
    search algorithms such as Monte Carlo Tree Search (`MCTS`) for planning. Specifically,
    we’ll examine how the `AlphaZero` algorithm works for complex two-player zero-sum
    games like Chess and Go.


    This chapter will showcase the power of model-based reinforcement learning as
    a tool for solving complex games, along with the use of advanced search algorithms
    like `MCTS` to enhance the planning process.


    ## 14.1 Why We Need to Plan in Reinforcement Learning


    Reinforcement learning has demonstrated impressive performance in solving simple
    problems such as classic control tasks and Atari video games. However, its potential
    for solving practical and challenging real-world tasks is of greater interest.
    One of these challenging tasks is the game of Go, which is considered one of the
    most complex board games.


    Go is a strategic board game played on a ![$$19 \times 19$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq1.png)
    grid. Two players participate, each using black or white stones as their representatives.
    The main goal of the game is to either capture the opponent’s stones or establish
    territories on the board. The game concludes when all possible moves have been
    made, typically when both players mutually agree that no further advantageous
    moves remain. At the end, the player with the highest score, determined by applying
    standard scoring rules, is declared the winner. Additionally, if a player believes
    they have no chance of winning, the player may choose to resign, resulting in
    a victory for the opponent.


    Go is a zero-sum, perfect information, deterministic, and strategy game, similar
    to other well-known games like chess and checkers. Despite its simple rules, Go’s
    practical strategy is extremely complex, emphasizing the importance of balance
    on multiple levels.


    Go is an incredibly complex game, with an astonishing ![$$2.1 \times 10^{170}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq2.png)
    possible board positions [[2](#605748_1_En_14_Chapter.xhtml#CR2)], making it the
    most challenging board game in the world. In comparison, the number of legal positions
    in chess is estimated to be between ![$$10^{43}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq3.png)
    and ![$$10^{50}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq4.png).


    In addition to its astonishing number of possible board positions, Go and other
    two-player zero-sum games also face the credit assignment issue. Rewards are zero
    during intermediate steps until reaching a terminal state at time step `T`, at
    which point a reward of ![$$+1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq5.png)
    or ![$$-1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq6.png)
    is given depending on the game’s outcome. In some cases, such as Chess, the outcome
    can also be a draw, where neither player wins or loses, and the final reward is
    zero.


    Unlike most capture-based games like chess or checkers, where the game’s complexity
    decreases as pieces are removed, the game of Go becomes increasingly intricate
    with every move as a new piece is placed on the board, as shown in Fig. [14.1](#605748_1_En_14_Chapter.xhtml#Fig1).


    Playing Go requires a high degree of strategic thinking and planning, which cannot
    be achieved by simply exploring the game randomly. Beginners often find themselves
    losing to experienced players who possess the ability to create effective formations.
    Professional players use complex strategy to simulate possible moves and anticipate
    their opponent’s next move, evaluating potential outcomes to select the best move.
    This simulation and planning process can involve thinking many moves ahead and
    relies on the player’s experience, expertise, and intuition.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig1_HTML.png)


    A representation of the Go strategic board game on a 19 by 19 grid.


    Fig. 14.1


    The game of Go becomes increasingly intricate with every move as a new piece is
    placed on the board. Shida Tatsuya (black) vs. Suzuki Shinji (white), Go game
    from the 66th NHK Cup, 2018. White won by 2.5 points. Game record from CWI [[1](#605748_1_En_14_Chapter.xhtml#CR1)]'
