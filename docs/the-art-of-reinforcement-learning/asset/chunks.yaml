    update the network parameters during training |

    | Replay buffer capacity | 1,000,000 | Store most recent N transitions into the
    experience replay |


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig23_HTML.png)


    A line graph illustrating the evaluation episode return plotted against the training
    environment frames depicting the return values increasing over 50 million frames.


    Fig. 7.23


    DQN agent on Atari River Raid. The results display the average episode return
    (total undiscounted rewards) and a 95% confidence interval. The results were averaged
    over five independent runs and then smoothed using a moving average with a window
    size of five


    We began by exploring the architecture and components of neural networks, highlighting
    their remarkable ability to model nonlinear relationships. Neural networks, with
    their capacity to learn from data, present an exciting avenue for RL algorithms.
    We then delved into the training process of neural networks, covering topics such
    as gradient descent and backpropagation. Additionally, we provided a minimal example
    of training a neural network using the PyTorch deep learning framework. Understanding
    these training mechanisms is crucial for effectively training neural networks
    in RL settings.


    Next, we shifted our focus to policy evaluation using neural networks. We investigated
    how neural networks can be utilized to estimate the value function when a fixed
    policy is given. Additionally, we introduced the concept of naive deep Q-learning,
    discussing how neural networks can be integrated into the Q-learning algorithm
    to approximate the action-value function. This approach equips RL agents to handle
    complex environments and acquire more sophisticated strategies.


    Furthermore, we presented an important enhancement to the naive deep Q-learning
    algorithm. We examined the incorporation of experience replay and target networks,
    which serve to stabilize and improve learning. Experience replay allows the agent
    to learn from past experiences, reducing the correlation between consecutive updates.
    On the other hand, target networks provide a fixed target for Q-value estimation,
    resulting in more stable and reliable learning.


    Finally, we explored the application of Deep Q-Networks (DQN) to Atari games.
    We showcased the impressive success achieved by combining neural networks with
    reinforcement learning in solving visually rich and complex environments. Particularly,
    we highlighted the remarkable accomplishments of the DQN algorithm in surpassing
    human-level performance in numerous Atari games.


    In conclusion, this chapter extensively explored the powerful capabilities of
    neural networks as nonlinear value function approximators in reinforcement learning.
    From understanding their architecture and training procedures to their applications
    in value function approximation, neural networks offer an exciting pathway for
    advancing RL algorithms. The subsequent chapter will further delve into enhancements
    to the standard DQN algorithm, paving the way for even more effective and efficient
    RL agents.


    Footnotes [1](#605748_1_En_7_Chapter.xhtml#Fn1_source)


    # 8. Improvements to DQN


    The success story of the DQN agent, which achieved human-level performance in
    playing Atari games, marked a major breakthrough in the field of artificial intelligence
    and reinforcement learning. Since then, extensive research and development efforts
    have been dedicated to building upon the foundations of DQN. Notably, these endeavors
    have focused on enhancing the network architecture and refining techniques for
    optimal utilization of experience replay samples.


    This chapter delves into three classic improvements to the standard DQN algorithm
    that have significantly advanced the field of reinforcement learning. These enhancements
    have played a pivotal role in elevating the performance and robustness of the
    DQN algorithm. By thoroughly examining these improvements, our goal is to gain
    a profound understanding of the fundamental principles that have rendered the
    DQN agent such a formidable asset in the realm of reinforcement learning.'
  trans: '

    # 7.7 本章小结


    在本章中，我们基于上一章关于线性值函数逼近的讨论，深入探讨了神经网络作为强化学习（RL）中非线性值函数逼近器的应用。我们的重点是使用更具表达力的函数逼近器，这些逼近器能够有效捕捉复杂关系并处理高维状态空间。


    **表 7.1** 训练 DQN 智能体的参数


    | 超参数 | 值 | 描述 |

    | --- | --- | --- |

    | 帧宽度 | 84 | 游戏环境帧宽度 |

    | 帧高度 | 84 | 游戏环境帧高度 |

    | 灰度化 | 是 | 游戏环境帧使用灰度而非 RGB |

    | 裁剪奖励 | 是 | 将环境奖励裁剪至 `[-1, 1]` 区间 |

    | 失去生命即终止 | 是 | 将失去一条生命视为软终止状态；注意这并不会实际重置环境 |

    | 最大无操作动作数 | 30 | 每个回合开始时执行的最大无操作（不做任何动作）次数 |

    | 帧跳过 | 4 | 我们通过重复执行相同动作 k 次，确保智能体只看到游戏中的每第 k 帧 |

    | 帧堆叠 | 4 | 堆叠最近的 k 帧 |

    | 更新频率 | 4 | 从经验回放中采样并更新网络参数的频率，以智能体执行的动作选择次数衡量（如果不计算帧跳过，则为每 `4 × 4` 帧） |

    | 目标网络更新频率 | 2500 | 更新目标网络参数的频率，以标准网络的参数更新次数衡量（算法中的参数 `C`） |

    | 学习率 | 0.00025 | Adam 神经网络优化器的学习率 |

    | 折扣率 | 0.99 | 折扣率 |

    | 初始探索率 | 1 | 训练开始时的探索率 `ε` |

    | 最小探索率 | 0.1 | 经过一定步数衰减后的最终（最小）探索率 `ε`；该最终值在训练过程中保持不变 |

    | `ε` 衰减步数 | 1,000,000 | 探索率 `ε` 从初始值到最小值线性衰减所经历的步数或帧数 |

    | 批量大小 | 32 | 训练期间从经验回放中采样用于更新网络参数的转换样本数量 |

    | 回放缓冲区容量 | 1,000,000 | 将最近的 N 个转换样本存储到经验回放中 |


    ![](img/605748_1_En_7_Fig23_HTML.png)


    一条折线图，展示了评估回合回报随训练环境帧数的变化，描绘了回报值在超过 5000 万帧过程中的增长趋势。


    **图 7.23** 在 Atari 游戏《河内突袭》上的 DQN 智能体。结果显示了平均回合回报（总未折扣奖励）及 95% 置信区间。结果基于五次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    我们首先探讨了神经网络的架构和组成部分，强调了它们在建模非线性关系方面的卓越能力。神经网络凭借其从数据中学习的能力，为强化学习算法提供了一条令人兴奋的途径。接着，我们深入研究了神经网络的训练过程，涵盖了梯度下降和反向传播等主题。此外，我们还提供了一个使用
    PyTorch 深度学习框架训练神经网络的最小示例。理解这些训练机制对于在强化学习环境中有效训练神经网络至关重要。


    接下来，我们将重点转向使用神经网络进行策略评估。我们研究了在给定固定策略的情况下，如何利用神经网络来估计值函数。同时，我们引入了朴素深度 Q 学习的概念，讨论了如何将神经网络集成到
    Q 学习算法中以逼近动作值函数。这种方法使强化学习智能体能够应对复杂环境并习得更复杂的策略。


    此外，我们还介绍了对朴素深度 Q 学习算法的一项重要改进。我们研究了经验回放和目标网络的整合，这两者有助于稳定并改善学习过程。经验回放允许智能体从过去的经验中学习，减少了连续更新之间的相关性。另一方面，目标网络为
    Q 值估计提供了一个固定目标，从而实现了更稳定、更可靠的学习。


    最后，我们探讨了深度 Q 网络（DQN）在 Atari 游戏中的应用。我们展示了将神经网络与强化学习相结合，在解决视觉丰富且复杂的环境方面所取得的令人瞩目的成功。特别地，我们强调了
    DQN 算法在众多 Atari 游戏中超越人类水平表现所取得的卓越成就。


    总之，本章广泛探讨了神经网络作为强化学习中非线性值函数逼近器的强大能力。从理解其架构和训练过程，到其在值函数逼近中的应用，神经网络为推进强化学习算法提供了一条激动人心的路径。下一章将进一步深入探讨对标准
    DQN 算法的改进，为构建更高效、更强大的强化学习智能体铺平道路。


    脚注 1


    # 8. DQN 的改进


    DQN 智能体在玩 Atari 游戏时达到人类水平表现的成功故事，标志着人工智能和强化学习领域的重大突破。自那时起，大量的研究和开发工作致力于在 DQN 的基础上进行改进。值得注意的是，这些努力主要集中在增强网络架构和优化利用经验回放样本的技术上。


    本章深入探讨了对标准 DQN 算法的三项经典改进，这些改进显著推动了强化学习领域的发展。这些增强在提升 DQN 算法的性能和鲁棒性方面发挥了关键作用。通过仔细审视这些改进，我们的目标是深刻理解那些使
    DQN 智能体成为强化学习领域强大工具的基本原则。

    '
- fmt: '# DQN with Double Q-Learning


    DQN (Deep Q-Network) is a type of deep reinforcement learning algorithm that has
    shown great success in solving complex decision-making problems. One of the improvements
    that can be made to the standard DQN agent is to adapt the double Q-learning method,
    which has been proven to be effective by the work of Hado Hasselt (2010) [[1](#605748_1_En_8_Chapter.xhtml#CR1)]


    Double Q-learning is a method that involves learning two state-action value functions,
    `Q1` and `Q2`, and using a slightly different notation to compute the TD target.
    The agent learns these two functions equally over time and uses the best action
    derived from one Q-network (for example `Q1`) to select the value for the successor
    state-action pair from the other Q-network (for example `Q2`). Equation (8.1)
    shows how double Q-learning would compute the TD target for the tabular case when
    we want to update `Q1`, where it''s using the best action `a''` as a selector
    to pick the value for successor state `s_{t+1}` from `Q2`.


    ```

    TD_target = r_t + γ * Q2(s_{t+1}, argmax_{a''} Q1(s_{t+1}, a''))

    ```


    (8.1)


    However, in the case of DQN, we already have a standard Q-network with parameters
    `θ` and a target network with parameters `θ^-`. We can use this target network
    `θ^-` as the second state-action value function `Q2` and make some changes to
    the TD target computation equation to get the value update rule when using double
    Q-learning with DQN.


    We can then make some changes to Eq. (8.1) to get the equation for how to compute
    the TD target when using neural networks `θ, θ^-` for `Q1, Q2`:


    ```

    TD_target = r_t + γ * Q̂(s_{t+1}, argmax_{a''} Q̂(s_{t+1}, a''; θ); θ^-)

    ```


    (8.2)


    We can define the objective function for using double Q-learning with neural networks
    `θ` and `θ^-` as a squared difference between the TD target and the estimated
    state-action value.


    ```

    J(θ) = (r_t + γ * Q̂(s_{t+1}, argmax_{a''} Q̂(s_{t+1}, a''; θ); θ^-) - Q̂(s_t,
    a_t; θ))^2

    ```


    (8.3)


    Since the standard DQN agent will periodically update the parameters of the target
    network from the standard Q-network, so that `θ^- = θ`. We can actually skip the
    process of spending 50% of the time to learn the second state-action value function
    `Q2` as done in the tabular case. We can now introduce the DQN with double Q-learning
    algorithm developed by Hasselt et al. [[2](#605748_1_En_8_Chapter.xhtml#CR2)].
    The overall is the same when compared to the standard DQN algorithm; the only
    difference is how we use the target network `θ^-` to compute the TD target. Depending
    on the reinforcement learning problem, we might also want to increase `C` which
    is the interval to update the target network (e.g., 2x–3x of standard DQN settings).


    **Algorithm 1: DQN with double Q-learning and experience replay and ε-greedy policy
    for Exploration**


    An algorithm that initializes `i`, `θ`, `θ^-` of the neural networks and replay
    buffer to capacity `N`. It then samples action, takes action, and stores experience.
    If length of `D` is greater than `m` and `b`, mini-batch of `b` transitions is
    sampled, and TD target and loss are computed to update the target network.


    Figure 8.1 shows the performance of DQN with double Q-learning and standard DQN
    agent on the Atari River Raid game. The results display the average episode return
    (total undiscounted rewards) and a 95% confidence interval. To evaluate the agent''s
    performance, we ran 200,000 evaluation steps on a separate testing environment
    with an `ε`-greedy policy and a fixed exploration epsilon (`ε = 0.05`) at the
    end of each training iteration, which consisted of 250,000 training steps or 1
    million frames, where no reward clipping or soft termination on loss of life is
    applied to the evaluation environment. The results were averaged over five independent
    runs and smoothed using a moving average with a window size of five.


    **Fig. 8.1** DQN with double Q-learning vs. standard DQN on the Atari game River
    Raid. The results display the average episode return (total undiscounted rewards)
    and a 95% confidence interval. The results were averaged over five independent
    runs, then further smoothed using a moving average with a window size of five


    We use learning rate 0.00025, discount rate 0.99, batch size 32, and replay capacity
    100,000 for this experiment. We set `C` to 5000 which is the interval to update
    the target network. Figure 8.1 shows the episode return (averaged over five independent
    runs) for these two agents. We can see that using DQN with double Q-learning DQN
    gains better performance in terms of speed of convergence and training stability.'
