    ![$$\displaystyle \begin{aligned} \hat{Q}(s, a; \boldsymbol{\theta}, \beta, \delta)
    = \hat{V}(s; \boldsymbol{\theta}, \beta) + \Bigl( \hat{A}(s, a; \boldsymbol{\theta},
    \delta) - \max_{a \in \cal{A}} \hat{A}(s, a; \boldsymbol{\theta}, \delta) \Bigr)
    {} \end{aligned} $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_Equ14.png)


    (8.14)


    More precisely, for the best action ![$$a_*$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq58.png)
    where ![$$a_* = \mathop{\text{argmax}} _{a \in \cal {A}} \hat {A}(s, a; \boldsymbol
    {\theta }, \delta )$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq59.png)
    , the advantage term ![$$\hat {A}(s, a; \boldsymbol {\theta }, \delta ) - \max
    _{a \in \cal {A}} \hat {A}(s, a; \boldsymbol {\theta }, \delta )$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq60.png)
    in Eq. ([8.14](#605748_1_En_8_Chapter.xhtml#Equ14)) becomes zero; thus, we get
    ![$$\hat {Q}(s, a_*; \boldsymbol {\theta }, \beta , \delta ) = \hat {V}(s; \boldsymbol
    {\theta }, \beta )$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq61.png)
    .


    But in practice, we adapt a slightly different version where we use the average
    instead of maximum value in the advantage term as shown in Eq. ([8.15](#605748_1_En_8_Chapter.xhtml#Equ15)),
    which achieves much better stability during training.


    ![$$\displaystyle \begin{aligned} \hat{Q}(s, a; \boldsymbol{\theta}, \beta, \delta)
    = \hat{V}(s; \boldsymbol{\theta}, \beta) + \Biggl( \hat{A}(s, a; \boldsymbol{\theta},
    \delta) - \frac{1}{|\cal{A}|} \sum_{a \in \cal{A}} \hat{A}(s, a; \boldsymbol{\theta},
    \delta) \Biggr) {} \end{aligned} $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_Equ15.png)


    (8.15)


    The dueling network architecture proposed by Wang et al. [[4](#605748_1_En_8_Chapter.xhtml#CR4)]
    is a modification of the Deep Q-Network (DQN) that improves its ability to estimate
    state-action values for reinforcement learning problems. In the standard DQN,
    the neural network takes an image of the game screen as input and outputs the
    estimated state-action values for all possible actions. The dueling network architecture
    splits this network into two separate heads, one for estimating the state value
    and the other for estimating the advantage values for each action.


    Figure [8.3](#605748_1_En_8_Chapter.xhtml#Fig3) shows the architecture of the
    dueling network. The network takes a state *s*, which is an ![$$84 \times 84 \times
    4$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq62.png) image,
    as input. The first three layers of the network are convolutional layers, and
    the parameters of these layers are shared (corresponding to ![$$\boldsymbol {\theta
    }$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq63.png) in Eq.
    ([8.15](#605748_1_En_8_Chapter.xhtml#Equ15))). The feature maps from the last
    hidden layer are then fed into two separate fully connected layers: one for estimating
    the state value function ![$$\hat {V}$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq64.png)
    and the other for estimating the advantage function ![$$\hat {A}$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq65.png)
    .


    ![](images/605748_1_En_8_Chapter/605748_1_En_8_Fig3_HTML.png)


    A diagram for D Q N neural network is as follows. Input data, 32 filters, R e
    L U, 64 filters, R e L U, 64 filters, R e L U, 512 units, R e L U, 1 unit state
    value head and 18 unit advantage head. Compute Q cap, using V cap, and A cap,
    and state-action values.


    Fig. 8.3


    Dueling architecture for the DQN neural network


    The state value function head consists of a fully connected layer with one unit
    and no activation function to produce the estimated state value. The advantage
    function head consists of a fully connected layer with 18 units (the number of
    possible actions) and no activation function to produce the estimated advantage
    values for each action.


    The final estimated state-action value is computed using a simple mathematical
    operation that combines the estimated state value and advantage values as shown
    in Eq. ([8.15](#605748_1_En_8_Chapter.xhtml#Equ15)). This computation is indicated
    by the red box in Fig. [8.3](#605748_1_En_8_Chapter.xhtml#Fig3).


    The dueling network architecture can be used with the standard DQN or double DQN
    algorithm to sample mini-batches of transitions and update the network parameters
    during training. It can also be used with prioritized experience replay, which
    prioritizes transitions based on their estimated temporal difference error to
    improve the learning efficiency.


    Figure [8.4](#605748_1_En_8_Chapter.xhtml#Fig4) shows the performance of dueling
    double DQN and DQN agents on the Atari River Raid game. The results display the
    average episode return (total undiscounted rewards) and a 95% confidence interval.
    To evaluate the agent’s performance, we ran 200,000 evaluation steps on a separate
    testing environment with an ![$$\epsilon $$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq66.png)
    -greedy policy and a fixed exploration epsilon ( ![$$\epsilon =0.05$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq67.png)
    ) at the end of each training iteration, which consisted of 250,000 training steps
    or 1 million frames, where no reward clipping or soft termination on loss of life
    is applied to the evaluation environment. The results were averaged over five
    independent runs and smoothed using a moving average with a window size of five.


    ![](images/605748_1_En_8_Chapter/605748_1_En_8_Fig4_HTML.png)


    A graph plots evaluation episode return versus training environment frames. It
    presents 2 increasing trends titled D Q N and dueling double D Q N. The line titled
    dueling double D Q N presents a higher peak.


    Fig. 8.4


    Dueling double DQN vs. DQN on the Atari game River Raid. The results display the
    average episode return (total undiscounted rewards) and a 95% confidence interval.
    The results were averaged over five independent runs, then further smoothed using
    a moving average with a window size of five


    Similar to the preceding experiment, we use learning rate ![$$\alpha =0.00025$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq68.png)
    , discount rate ![$${\gamma }=0.99$$](images/605748_1_En_8_Chapter/605748_1_En_8_Chapter_TeX_IEq69.png)
    , batch size 32, and replay capacity 100,000 in this experiment. We update the
    target network every 5000 updates.'
  trans: '

    在实践中，神经网络架构可以设计为让 `\hat{V}` 和 `\hat{A}` 在一定程度上共享相同的权重 `\boldsymbol{\theta}`，同时
    `\hat{V}` 和 `\hat{A}` 仍保留各自的权重 `\beta, \delta`。该方程可以写成如下形式：


    ```

    \hat{Q}(s, a; \boldsymbol{\theta}, \beta, \delta) = \hat{V}(s; \boldsymbol{\theta},
    \beta) + \hat{A}(s, a; \boldsymbol{\theta}, \delta)

    ```


    (8.13)


    然而，当使用 DQN 适配公式 (8.11) 时，无法保证状态值 `\hat{V}` 的准确性，因为它并未反映在 Q 学习的目标函数中。为解决此问题，原始的决斗
    DQN 论文提出了一种强制智能体学习状态值函数的解决方案。由此得到的方程如公式 (8.14) 所示：


    ```

    \hat{Q}(s, a; \boldsymbol{\theta}, \beta, \delta) = \hat{V}(s; \boldsymbol{\theta},
    \beta) + \Bigl( \hat{A}(s, a; \boldsymbol{\theta}, \delta) - \max_{a \in \cal{A}}
    \hat{A}(s, a; \boldsymbol{\theta}, \delta) \Bigr)

    ```


    (8.14)


    更准确地说，对于最优动作 `a_*`（其中 `a_* = \mathop{\text{argmax}}_{a \in \cal{A}} \hat{A}(s,
    a; \boldsymbol{\theta}, \delta)`），公式 (8.14) 中的优势项 `\hat{A}(s, a; \boldsymbol{\theta},
    \delta) - \max_{a \in \cal{A}} \hat{A}(s, a; \boldsymbol{\theta}, \delta)` 变为零；因此，我们得到
    `\hat{Q}(s, a_*; \boldsymbol{\theta}, \beta, \delta) = \hat{V}(s; \boldsymbol{\theta},
    \beta)`。


    但在实践中，我们采用了一个略有不同的版本，即在优势项中使用平均值而非最大值，如公式 (8.15) 所示，这在训练过程中实现了更好的稳定性。


    ```

    \hat{Q}(s, a; \boldsymbol{\theta}, \beta, \delta) = \hat{V}(s; \boldsymbol{\theta},
    \beta) + \Biggl( \hat{A}(s, a; \boldsymbol{\theta}, \delta) - \frac{1}{|\cal{A}|}
    \sum_{a \in \cal{A}} \hat{A}(s, a; \boldsymbol{\theta}, \delta) \Biggr)

    ```


    (8.15)


    Wang 等人 [4] 提出的决斗网络架构是对深度 Q 网络（DQN）的改进，旨在提升其在强化学习问题中估计状态-动作值的能力。在标准 DQN 中，神经网络以游戏画面图像作为输入，并输出所有可能动作的估计状态-动作值。决斗网络架构将该网络拆分为两个独立的头部，一个用于估计状态值，另一个用于估计每个动作的优势值。


    图 8.3 展示了决斗网络的架构。该网络以状态 `s`（一个 `84 \times 84 \times 4` 的图像）作为输入。网络的前三层是卷积层，这些层的参数是共享的（对应公式
    (8.15) 中的 `\boldsymbol{\theta}`）。来自最后一个隐藏层的特征图随后被输入到两个独立的全连接层：一个用于估计状态值函数 `\hat{V}`，另一个用于估计优势函数
    `\hat{A}`。


    ![](img/605748_1_En_8_Fig3_HTML.png)


    DQN 神经网络的示意图如下：输入数据，32 个滤波器，ReLU，64 个滤波器，ReLU，64 个滤波器，ReLU，512 个单元，ReLU，1 个单元的状态值头部和
    18 个单元的优势头部。使用 `\hat{V}` 和 `\hat{A}` 计算 `\hat{Q}` 以及状态-动作值。


    **图 8.3** DQN 神经网络的决斗架构


    状态值函数头部由一个包含一个单元且无激活函数的全连接层组成，用于生成估计的状态值。优势函数头部由一个包含 18 个单元（即可能的动作数量）且无激活函数的全连接层组成，用于生成每个动作的估计优势值。


    最终的估计状态-动作值通过一个简单的数学运算计算得出，该运算将估计的状态值和优势值结合起来，如公式 (8.15) 所示。此计算由图 8.3 中的红色方框标出。


    决斗网络架构可以与标准 DQN 或双 DQN 算法结合使用，以在训练过程中采样小批量转换并更新网络参数。它也可以与优先经验回放结合使用，后者根据转换的估计时序差分误差对其进行优先级排序，以提高学习效率。


    图 8.4 展示了决斗双 DQN 和 DQN 智能体在 Atari 游戏《河攻》上的性能。结果显示了平均回合回报（总未折扣奖励）和 95% 的置信区间。为了评估智能体的性能，我们在一个独立的测试环境中，使用
    `\epsilon`-贪心策略和固定的探索 epsilon（`\epsilon = 0.05`），在每个训练迭代（包含 250,000 个训练步骤或 100
    万帧）结束时运行了 200,000 个评估步骤。评估环境中未应用奖励裁剪或生命损失时的软终止。结果取五次独立运行的平均值，并使用窗口大小为 5 的移动平均进行平滑处理。


    ![](img/605748_1_En_8_Fig4_HTML.png)


    一张图表绘制了评估回合回报与训练环境帧数的关系。它呈现了两条上升趋势线，分别标注为 DQN 和决斗双 DQN。标注为决斗双 DQN 的线条峰值更高。


    **图 8.4** 决斗双 DQN 与 DQN 在 Atari 游戏《河攻》上的对比。结果显示了平均回合回报（总未折扣奖励）和 95% 的置信区间。结果取五次独立运行的平均值，然后使用窗口大小为
    5 的移动平均进行进一步平滑处理


    与前述实验类似，本实验中使用学习率 `\alpha = 0.00025`、折扣率 `\gamma = 0.99`、批次大小 32 以及回放容量 100,000。我们每
    5000 次更新更新一次目标网络。

    '
- fmt: '# 8.4 Summary


    In this chapter, we explored several enhancements to the standard `DQN` agent
    to address its limitations. While the `DQN` agent has achieved human-level performance
    in Atari games, it faces challenges with more complex and difficult games. By
    incorporating these enhancements, researchers have demonstrated significant improvements
    in the overall performance of the agent.


    We began by introducing double Q-learning for `DQN`, a straightforward and simple
    adaptation. Double Q-learning, originally proposed by Hado Hasselt [[1](#605748_1_En_8_Chapter.xhtml#CR1)],
    and later adapted for `DQN` [[2](#605748_1_En_8_Chapter.xhtml#CR2)], helps mitigate
    the maximization bias associated with Q-learning. By integrating double Q-learning
    into the `DQN` agent, we observed notable performance enhancements.


    Next, we delved into the concept of prioritized experience replay proposed by
    Schaul et al. [[3](#605748_1_En_8_Chapter.xhtml#CR3)], a technique that emphasizes
    training the agent using more important transitions rather than uniformly sampling
    experiences. This approach prioritizes urgent transitions and contributes to improved
    learning.


    Furthermore, we discussed the advantage function and its incorporation into the
    neural network architecture of the standard `DQN` agent. This led us to the discussion
    of the dueling network architecture for the `DQN` agent, which exhibits remarkable
    performance improvements, an idea originally proposed by Wang et al. [[4](#605748_1_En_8_Chapter.xhtml#CR4)].


    In practice, all the discussed improvements in this chapter are combined to create
    a significantly more robust agent. It is worth noting that, apart from the enhancements
    mentioned here, numerous other improvements exist. For instance, the adaptation
    of the N-step return (bootstrapping) method [[5](#605748_1_En_8_Chapter.xhtml#CR5)],
    as well as the exploration of using neural networks to predict the distribution
    of state-action values instead of single values [[6](#605748_1_En_8_Chapter.xhtml#CR6),
    [7](#605748_1_En_8_Chapter.xhtml#CR7)], has also brought people’s attention.


    This chapter concludes Part II of the book, where we focused on value function
    approximation, particularly nonlinear value function approximation using neural
    networks. While both Parts I and [II](https://doi.org/10.1007/978-1-4842-9606-6_II)
    emphasized value-based methods (such as learning the state-action value function),
    the subsequent chapter will shift our focus to policy-based methods, an equally
    powerful technique for solving RL problems.


    # Part III: Policy Approximation


    # 9. Policy Gradient Methods


    In this chapter, we will explore policy-based methods, which is another category
    of family of reinforcement learning algorithms. In previous chapters, we focused
    on value-based methods, which estimate the optimal state-action value function.
    Value-based methods can become computationally expensive for large state or action
    spaces, and they can struggle with environments where the dynamics of the environment
    are stochastic.


    Policy-based methods, on the other hand, directly learn the optimal policy without
    estimating the state-action value function. We often use approximation techniques
    to parameterize the policy, such as a neural network, and use policy gradients
    to update the parameters. Policy gradients measure how much the expected return
    changes with respect to changes in the policy parameters. By optimizing the policy
    parameters to increase the expected return, policy-based methods learn to take
    actions that maximize the reward.


    Policy-based methods have several advantages over value-based methods. First,
    they can handle continuous and high-dimensional action spaces, which value-based
    methods may struggle with. Second, they can learn stochastic policies, which can
    be useful in environments where there is uncertainty or multiple good actions.


    In summary, policy-based methods provide an alternative approach to reinforcement
    learning that can handle large, continuous action spaces. Policy gradient algorithms
    like `REINFORCE` and Actor-Critic offer powerful ways to learn optimal policies
    directly from experience and can be combined with other methods to further improve
    performance.'
