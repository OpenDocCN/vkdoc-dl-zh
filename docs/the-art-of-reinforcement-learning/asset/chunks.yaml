    {\theta }}(s)$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq158.png)
    represents the output of the neural network given a state *s*, and *c* is a hyperparameter
    that controls the level of L2 weight regularization to prevent the network from
    overfitting.


    Note that in AlphaZero, the MSE loss for the state value is given the same weight
    as the cross-entropy loss for the policy, which differs from the traditional Actor-Critic
    algorithm that employs a coefficient to weight the loss of the state value function,
    in case we approximate the policy and value functions using a single neural network
    with shared weights.


    To train the agent, a batch of 4096 transitions is randomly sampled from the recent
    500,000 self-play games. The neural network is then optimized using the stochastic
    gradient descent (SGD) method. The initial learning rate is set to 0.01, momentum
    to 0.9, and L2 regularization to ![$$10^{-4}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq159.png)
    . Moreover, the algorithm decays the learning rate using a staircase method at
    400,000, and 600,000 training steps, respectively, with a decay weight of 0.1
    during the course of training. The training typically lasts over 700,000 training
    steps, with a total of 21 million self-play games for Go, 44 million for Chess,
    and 24 million for Shogi.


    Not surprisingly, the AlphaZero was trained using a distributed reinforcement
    learning architecture, where thousands of self-play actors generate millions of
    self-play games. And multiple learner agents work in parallel to update the parameters
    of the neural network.


    During training, 5000 tensor processing units (TPUs) were used to generate self-play
    games. TPU is a special acceleration hardware developed by Google to accelerate
    the numerical computation, especially for neural networks. This means hundreds
    or even thousands of machines were used to generate self-play games during training.
    In addition, 16 second-generation TPUs were used to train the neural network.
    DeepMind trained separate instances of AlphaZero for Chess, Shogi, and Go, respectively,
    and the training lasted for 9 hours in Chess, 12 hours in Shogi, and 13 days in
    Go approximately.'
  trans: '

    ### 训练


    AlphaZero 的训练目标是学习一种策略，以最大化特定游戏（如围棋）的期望回报。具体来说，AlphaZero 旨在最大化从给定状态出发的游戏期望回报，该回报通过一个价值网络进行估计。


    尽管 AlphaZero 使用神经网络来近似最优策略（这通常是基于策略的方法所做的），但它与我们书中讨论的任何基于策略的强化学习算法（如 `REINFORCE`
    或 `Actor-Critic`）并不相同。对于 AlphaZero 而言，用于优化策略的目标函数与策略梯度方法不同。该神经网络通过一种称为交叉熵损失的监督学习形式进行训练，以最大化神经网络落子概率
    `p_t` 与蒙特卡洛树搜索（MCTS）搜索概率 `π_t` 的相似度。这种方法常用于多分类问题。


    AlphaZero 策略网络的训练目标可以写成：


    ```

    L_policy = - Σ_a π(a|s) log p(a|s)

    ```


    (14.6) 其中 `p(a|s)` 是策略网络在状态 `s` 下选择动作 `a` 的预测概率，而 `π(a|s)` 是从自我对弈游戏中获得的、在状态 `s`
    下选择动作 `a` 的目标概率。


    因此，AlphaZero 的策略目标函数可以看作是一种最大似然估计。在最大似然估计中，我们寻求找到统计模型的参数，以最大化观测数据的似然。在 AlphaZero
    的情况下，策略网络是一个统计模型，用于预测给定状态下动作的概率分布。自我对弈游戏为我们提供了网络在每个状态下所采取的观测动作。


    尽管交叉熵常用于监督学习，但我们不应将 AlphaZero 归类为监督学习，因为该智能体并未使用任何形式的监督者（例如人类）提供的数据。相反，神经网络是通过一种称为自我对弈的强化学习变体进行训练的，智能体通过与自己博弈并根据这些游戏的结果调整其权重，来学习提升自身表现。这个过程类似于人类通过试错学习，并以奖励或惩罚的形式接收反馈。


    在训练过程中，AlphaZero 通过反复与自己博弈、评估每局游戏的结果，并调整其神经网络权重来提升表现。AlphaZero 的神经网络结合了自我对弈和蒙特卡洛树搜索（MCTS）进行训练，以提升其游戏能力。


    MCTS 在 AlphaZero 中扮演着关键角色，它使智能体能够评估并选择每个游戏状态下的最佳落子。这个过程是迭代的，并随着系统从自身经验中学习并逐步提升游戏能力，从而带来策略改进。


    AlphaZero 的神经网络还经过训练，以最小化预测状态值 `v_t` 与自我对弈游戏结果 `z_t` 之间的误差，这通常被称为均方误差（MSE），如下式所示：


    ```

    L_value = (v - z)²

    ```


    (14.7)


    由于我们使用一个共享权重的单一神经网络来表示策略和价值函数，AlphaZero 的最终目标函数是策略目标 `L_policy` 和价值目标 `L_value`
    的组合，可以使用矩阵形式表示，如下式所示：


    ```

    l = (z - v)² - π^T log p + c ||θ||²

    ```


    (14.8) 其中 `z` 是游戏的真实结果，`v` 是游戏的预测结果，`π` 是策略向量，`p` 是预测的策略向量，`θ` 是神经网络的参数向量，`(p,
    v) = f_θ(s)` 表示给定状态 `s` 时神经网络的输出，`c` 是一个超参数，用于控制 L2 权重正则化的程度，以防止网络过拟合。


    请注意，在 AlphaZero 中，状态价值的 MSE 损失与策略的交叉熵损失被赋予了相同的权重，这与传统的 `Actor-Critic` 算法不同，后者在使用共享权重的单一神经网络近似策略和价值函数时，会使用一个系数来加权状态价值函数的损失。


    为了训练智能体，会从最近 500,000 局自我对弈游戏中随机抽取一批 4096 个转移样本。然后使用随机梯度下降（SGD）方法对神经网络进行优化。初始学习率设置为
    0.01，动量设置为 0.9，L2 正则化设置为 `10^-4`。此外，算法在训练步数达到 400,000 和 600,000 时，分别采用阶梯法衰减学习率，衰减权重为
    0.1。训练通常持续超过 700,000 步，围棋总共进行了 2100 万局自我对弈游戏，国际象棋 4400 万局，日本将棋 2400 万局。


    毫不意外，AlphaZero 是使用分布式强化学习架构进行训练的，其中数千个自我对弈角色生成了数百万局自我对弈游戏。多个学习器并行工作，以更新神经网络的参数。


    在训练过程中，使用了 5000 个张量处理单元（TPU）来生成自我对弈游戏。TPU 是谷歌开发的专用加速硬件，用于加速数值计算，尤其是神经网络计算。这意味着训练期间有数百甚至数千台机器用于生成自我对弈游戏。此外，还使用了
    16 个第二代 TPU 来训练神经网络。DeepMind 分别为国际象棋、日本将棋和围棋训练了独立的 AlphaZero 实例，训练时长分别约为国际象棋 9
    小时、日本将棋 12 小时和围棋 13 天。

    '
- fmt: '### Evaluate Agent


    To evaluate the performance of the AlphaZero agent during or after training, there
    are two main options available.


    The first option is to let the AlphaZero agent play against various opponents,
    such as a (professional) human player or other AI agents, including itself with
    the weights of the neural network obtained from previous training iterations.
    We would rate the performance of the agent using the standard Elo rating during
    these evaluation games. The AlphaZero agent uses MCTS search to find the best
    move for each position; this is sometimes called online planning, as the agent
    is actively using the model to search for the best move during the gameplay. The
    overall process is similar to how MCTS is applied to generate self-play games,
    but without using Dirichlet noise for exploration, and it always chooses the best
    move in every position—the most visited child of the root node of the MCTS search
    tree; additionally, it’s often the case we might let the MCTS search run with
    more simulations. However, it’s crucial to ensure that these evaluation games
    are not part of the training data if we’re evaluating the performance of the agent
    during training.


    The second option is to use the trained neural network to predict moves and game
    outcomes from historical (professional) human gameplay. This involves building
    an evaluation dataset using historical games played by (professional) human players.
    The AlphaZero agent’s neural network is then used to predict the moves and actual
    game outcomes.


    In practice, both methods are combined together to evaluate the agent, especially
    during training as is the case for the original AlphaZero agent. This dual evaluation
    mechanism can give us more confidence on the actual strength of the agent. This
    is because if we only evaluate the agent by setting it up to play against some
    opponent, for example, some online player or the previous model, it’s hard to
    assert the opponent’s true strength. This will be a problem since the Elo rating
    assumes we have good estimate about the rating for both players to produce some
    accurate ratings. For instance, if the agent plays 100 games all against some
    amateur player that’s weaker than the agent, then the agent might get a very high
    rating after winning all these games; thus, it might give us a false impression
    that the agent is doing pretty well, even though it’s not the case.


    On the other hand, if we use historical human games to evaluate the agent’s performance,
    the quality of the historical (professional) human game also will impact the results
    of evaluation. For example, if we only have games that are played by amateur human
    players, then the prediction accuracy might be very high; this might also give
    us a false impression that the agent has achieved a strong play. On the other
    hand, if the (professional) human games are played by high-ranking professional
    players, then the agent might not be able to accurately predict the human moves
    and game outcomes, especially at the beginning of the training session. This might
    cause us to have doubt about the performance of the agent. It’s important we use
    a variety of games from different levels and players to build the evaluation dataset,
    so we can get a more accurate estimate of the performance of the agent.


    ## 14.4 Training AlphaZero on a `9 x 9` Go Board


    It is important to recognize that training an AlphaZero agent is a time-consuming
    endeavor, taking weeks or even months on a `19 x 19` Go board, even with powerful
    GPUs. DeepMind’s original paper mentioned that they trained the AlphaZero agent
    using thousands of servers and TPUs. Despite such significant computational resources,
    it still took 72 hours to train the 20-block version of AlphaZero and 40 days
    for the 40-block version. Unfortunately, we lack access to a comparable level
    of computational resources and budget to conduct similar experiments.


    Considering that our objective is not to create the strongest agent capable of
    defeating the world champion, we have made certain adjustments to our approach.
    These adjustments include using scaled-down settings, such as a smaller neural
    network, fewer self-play actors, and fewer games played, to train the AlphaZero
    agent. Specifically, we are focusing on Go with a `9 x 9` board size, which requires
    less computational resources and therefore less time to train the agent. After
    50 hours of training on moderate hardware, our agent has achieved a strong level
    of play. Our best model can sometimes defeat an amateur 1d level opponent.^([^(14)](#fn14))


    ### Distributed Training


    We employed a distributed RL architecture for our training process, utilizing
    approximately 120 actors, 1 learner, and 1 additional process responsible for
    evaluating the agent’s performance. All of these components were executed on a
    single server equipped with 128 CPUs and 8 GPUs; each GPU has 24 GB of vRAM. The
    program utilized only the `multiprocessing` module from Python, without relying
    on any third-party tools or libraries for distributed computing.'
