    # 前言


    强化学习（RL）是人工智能（AI）中一个极具前景但又充满挑战的子领域，在塑造智能系统的未来方面扮演着至关重要的角色。从机器人技术和自主智能体到推荐系统和战略决策，强化学习使机器能够通过与环境的交互来学习和适应。其显著的成功案例包括：强化学习智能体在电子游戏中达到人类水平的表现，甚至在围棋等策略棋盘游戏中超越世界冠军。这些成就凸显了强化学习在解决复杂问题和推动人工智能发展方面的巨大潜力。


    强化学习与其他人工智能子领域的区别在于其基本方法：智能体通过与环境的交互来学习，这模仿了人类获取知识的方式。然而，强化学习也带来了使其区别于其他人工智能学科的挑战。与依赖预先收集的训练数据的方法不同，强化学习智能体自行生成训练样本。这些智能体并未被明确告知如何实现目标；相反，它们接收环境的状态表示和一个奖励信号，这迫使它们自行探索并发现最优策略。此外，强化学习涉及支撑其问题表述和求解的复杂数学。


    虽然关于强化学习的书籍众多，但它们通常分为两类。第一类侧重于强化学习的基础知识和数学原理，作为研究人员和高校学生的参考材料。然而，这类书籍往往缺乏实现细节。第二类侧重于强化学习算法的实践编码，却忽略了其背后的理论和数学原理。理论与实现之间的这种明显差距促使我们创作了本书，旨在通过同等强调基础理论、数学原理以及成功强化学习算法的实现来达到平衡。


    本书旨在面向多元化的读者群体，使其易于理解且信息丰富。它面向寻求全面理解强化学习的研究人员、高校学生以及从业者。通过遵循结构化的方法，本书为读者提供了在各个领域有效应用强化学习技术所需的知识和工具。


    本书分为四个部分，每一部分都建立在前一部分的基础上。第一部分侧重于强化学习的基础知识和数学原理，这构成了几乎所有讨论算法的基石。我们首先使用表格法解决简单的强化学习问题。第
    2 章是本部分的基石，探讨了马尔可夫决策过程（MDP）及其相关的价值函数，这些概念贯穿全书。第 3 章至第 5 章通过讨论如何使用动态规划（DP）、蒙特卡洛方法和时序差分（TD）学习方法来求解小型
    MDP，深入探讨了这些基本概念。


    第二部分应对解决大规模强化学习问题的挑战，这类问题因其复杂性（例如，大规模或无限的状态空间）使得表格法不可行。在此，我们将重点转向价值函数近似，特别强调利用（深度）神经网络。第
    6 章简要介绍了线性价值函数近似，而第 7 章则深入探讨了著名的深度 Q 网络（DQN）算法。在第 8 章中，我们讨论了 DQN 算法的改进。


    第三部分探讨了基于策略的方法，作为解决强化学习问题的另一种途径。虽然第一部分和[第二部分](https://doi.org/10.1007/978-1-4842-9606-6_II)主要关注基于价值的方法（学习价值函数），但第三部分则侧重于直接学习策略。我们在第
    9 章中深入探讨了策略梯度方法和 REINFORCE 算法背后的理论。此外，我们在第 10 章中探讨了结合基于策略和基于价值方法的 Actor-Critic
    算法。更进一步，第 11 章涵盖了先进的基于策略的算法，包括替代目标函数和著名的近端策略优化（PPO）算法。


    本书的最后一部分探讨了高级强化学习主题。第 12 章讨论了分布式强化学习如何提升智能体性能，而第 13 章则探讨了难以探索的强化学习问题带来的挑战，并提出了将好奇心驱动的探索作为一种潜在的解决方案。在最后一章，即第
    14 章中，我们通过全面审视著名的 AlphaZero 算法，深入探讨了基于模型的强化学习。


    与典型的实践编码手册不同，本书并非主要侧重于编码练习。相反，我们将资源和时间用于解释每种算法的基础知识和核心思想。尽管如此，我们为书中讨论的所有示例和算法提供了完整的源代码。我们的代码实现是从零开始的，没有依赖第三方强化学习库，除了像`Python`、`OpenAI
    Gym`、`Numpy`和`PyTorch`深度学习框架这样的必要工具。虽然在现实场景中，第三方强化学习库可以加快实现过程，但我们相信，独立编写每种算法是学习强化学习基础知识和掌握各种强化学习算法的最佳途径。

    '
- fmt: '# Part I: Foundation


    ## 1. Introduction


    Artificial intelligence has made impressive progress in recent years, with breakthroughs
    achieved in areas such as image recognition, natural language processing, and
    playing games. In particular, reinforcement learning, a type of machine learning
    that focuses on learning by interacting with an environment, has led to remarkable
    achievements in the field.


    In this book, we focus on the combination of reinforcement learning and deep neural
    networks, which have become central to the success of agents that can master complex
    games such as board game Go and Atari video games.


    This first chapter provides an overview of reinforcement learning, including key
    concepts such as states, rewards, policies, and the common terms used in reinforcement
    learning, like the difference between episodic and continuing reinforcement learning
    problems, model-free vs. model-based methods.


    Despite the impressive progress in the field, reinforcement learning still faces
    significant challenges. For example, it can be difficult to learn from sparse
    rewards, and the methods can suffer from instability. Additionally, scaling to
    large state and action spaces can be a challenge.


    Throughout this book, we will explore these concepts in greater detail and discuss
    state-of-the-art techniques used to address these challenges. By the end of this
    book, you will have a comprehensive understanding of the principles of reinforcement
    learning and how they can be applied to real-world problems.


    We hope this introduction has sparked your curiosity about the potential of reinforcement
    learning, and we invite you to join us on this journey of discovery.


    ![](images/605748_1_En_1_Chapter/605748_1_En_1_Fig1_HTML.png)


    A 4-panel illustration of Atari’s Breakout game displays 4 rectangular panels
    with asymmetrical blockages on a horizontal platform on the top and a tiny ball
    in mid-air at distinct positions in the 4 panels. A horizontal line-like cursor
    controls the movements of the ball.


    **Fig. 1.1** A DQN agent learning to play Atari’s Breakout. The goal of the game
    is to use a paddle to bounce a ball up and break through a wall of bricks. The
    agent only takes in the raw pixels from the screen, and it has to figure out what’s
    the right action to take in order to maximize the score. Idea adapted from Mnih
    et al. [[1](#605748_1_En_1_Chapter.xhtml#CR1)]. Game owned by Atari Interactive,
    Inc.


    ### 1.1 AI Breakthrough in Games'
  raw: 'Throughout the book, we employ mathematical notations and equations, which
    some readers may perceive as heavy. However, we prioritize intuition over rigorous
    proofs, making the material accessible to a broader audience. A foundational understanding
    of calculus at a basic college level, minimal familiarity with linear algebra,
    and elementary knowledge of probability and statistics are sufficient to embark
    on this journey. We strive to ensure that interested readers from diverse backgrounds
    can benefit from the book’s content.


    We assume that readers have programming experience in Python since all the source
    code is written in this language. While we briefly cover the basics of deep learning
    in Chap. [7](#605748_1_En_7_Chapter.xhtml), including neural networks and their
    workings, we recommend some prior familiarity with machine learning, specifically
    deep learning concepts such as training a deep neural network. However, beyond
    the introductory coverage, readers can explore additional resources and materials
    to expand their knowledge of deep learning.


    This book draws inspiration from Reinforcement Learning: An Introduction by Richard
    S. Sutton and Andrew G. Barto, a renowned RL publication. Additionally, it is
    influenced by prestigious university RL courses, particularly the mathematical
    style and notation derived from Professor Emma Brunskill’s RL course at Stanford
    University. Although our approach may differ slightly from Sutton and Barto’s
    work, we strive to provide simpler explanations. Additionally, we have derived
    some examples from Professor David Silver’s RL course at University College London,
    which offers a comprehensive resource for understanding the fundamentals presented
    in Part I. We would like to express our gratitude to Professor Dimitri P. Bertsekas
    for his invaluable guidance and inspiration in the field of optimal control and
    reinforcement learning. Furthermore, the content of this book incorporates valuable
    insights from research papers published by various organizations and individual
    researchers.


    In conclusion, this book aims to bridge the gap between the fundamental concepts,
    mathematics, and practical implementation of RL algorithms. By striking a balance
    between theory and implementation, we provide readers with a comprehensive understanding
    of RL, empowering them to apply these techniques in various domains. We present
    the necessary mathematics and offer complete source code for implementation to
    help readers gain a deep understanding of RL principles. We hope this book serves
    as a valuable resource for readers seeking to explore the fundamentals, mathematics,
    and practical aspects of RL algorithms. We must acknowledge that despite careful
    editing from our editors and multiple round of reviews, we cannot guarantee the
    book’s content is error free. Your feedback and corrections are invaluable to
    us. Please do not hesitate to contact us with any concerns or suggestions for
    improvement.


    **Source Code**


    You can download the source code used in this book from [github.​com/​apress/​art-of-reinforcement-lear
    ning](http://www.github.com/apress/art-of-reinforcement-learning).


    Michael Hu


    About the Author About the Technical Reviewer


    # Part IFoundation


    # 1. Introduction


    Artificial intelligence has made impressive progress in recent years, with breakthroughs
    achieved in areas such as image recognition, natural language processing, and
    playing games. In particular, reinforcement learning, a type of machine learning
    that focuses on learning by interacting with an environment, has led to remarkable
    achievements in the field.


    In this book, we focus on the combination of reinforcement learning and deep neural
    networks, which have become central to the success of agents that can master complex
    games such as board game Go and Atari video games.


    This first chapter provides an overview of reinforcement learning, including key
    concepts such as states, rewards, policies, and the common terms used in reinforcement
    learning, like the difference between episodic and continuing reinforcement learning
    problems, model-free vs. model-based methods.


    Despite the impressive progress in the field, reinforcement learning still faces
    significant challenges. For example, it can be difficult to learn from sparse
    rewards, and the methods can suffer from instability. Additionally, scaling to
    large state and action spaces can be a challenge.


    Throughout this book, we will explore these concepts in greater detail and discuss
    state-of-the-art techniques used to address these challenges. By the end of this
    book, you will have a comprehensive understanding of the principles of reinforcement
    learning and how they can be applied to real-world problems.


    We hope this introduction has sparked your curiosity about the potential of reinforcement
    learning, and we invite you to join us on this journey of discovery.


    ![](images/605748_1_En_1_Chapter/605748_1_En_1_Fig1_HTML.png)


    A 4-panel illustration of Atari’s Breakout game displays 4 rectangular panels
    with asymmetrical blockages on a horizontal platform on the top and a tiny ball
    in mid-air at distinct positions in the 4 panels. A horizontal line-like cursor
    controls the movements of the ball.


    Fig. 1.1


    A DQN agent learning to play Atari’s Breakout. The goal of the game is to use
    a paddle to bounce a ball up and break through a wall of bricks. The agent only
    takes in the raw pixels from the screen, and it has to figure out what’s the right
    action to take in order to maximize the score. Idea adapted from Mnih et al. [[1](#605748_1_En_1_Chapter.xhtml#CR1)].
    Game owned by Atari Interactive, Inc.


    ## 1.1 AI Breakthrough in Games'
  trans: '

    # 第一部分：基础


    ## 1. 引言


    近年来，人工智能取得了令人瞩目的进展，在图像识别、自然语言处理和游戏博弈等领域均实现了突破。其中，强化学习作为一种通过与环境交互进行学习的机器学习方法，在该领域取得了卓越成就。


    本书聚焦于强化学习与深度神经网络的结合，这一组合已成为智能体掌握复杂游戏（如棋盘游戏围棋和 Atari 视频游戏）的核心技术。


    第一章概述了强化学习的基本概念，包括状态、奖励、策略等关键要素，以及强化学习中常用的术语，例如回合制与持续型强化学习问题的区别、无模型方法与基于模型方法的差异。


    尽管该领域取得了显著进展，强化学习仍面临重大挑战。例如，从稀疏奖励中学习可能较为困难，且方法可能存在不稳定性问题。此外，扩展到大规模状态和动作空间也是一项挑战。


    在本书中，我们将深入探讨这些概念，并讨论用于应对这些挑战的最新技术。通过阅读本书，您将全面理解强化学习的原理及其在现实问题中的应用。


    我们希望这篇引言能激发您对强化学习潜力的好奇心，并邀请您加入我们的探索之旅。


    ![](img/605748_1_En_1_Fig1_HTML.png)


    一幅由四块面板组成的 Atari《打砖块》游戏示意图，展示了四个矩形面板，顶部水平平台上分布着不对称的障碍物，四个面板中分别有一个小球悬浮在半空中的不同位置。一条水平线状光标控制着球的运动。


    **图 1.1** 一个 DQN 智能体正在学习玩 Atari《打砖块》游戏。游戏目标是用球拍将球弹起，击碎一堵砖墙。智能体仅从屏幕获取原始像素，并需自行判断应采取何种正确动作以最大化得分。创意改编自
    Mnih 等人[1]。游戏版权归 Atari Interactive, Inc.所有。


    ### 1.1 游戏领域的人工智能突破

