    }{ c_{base} } \right) + c_{init} \end{aligned} $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_Equ4.png)


    (14.4)


    It is important to note that the computation method for the exploration rate ![$$C(s)$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq93.png)
    described here is not mentioned in the original AlphaGo Zero or AlphaZero papers.
    This approach is exclusively discussed in the MuZero paper [[14](#605748_1_En_14_Chapter.xhtml#CR14)],
    which was published subsequent to the AlphaZero algorithm.


    The values assigned to the parameters ![$$c_{base}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq94.png)
    and ![$$c_{init}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq95.png)
    are typically set as 19652 and 1.25, respectively.


    #### Expansion and Evaluation


    When the search process reaches a leaf node in the search tree, the game state
    ![$$s_t$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq96.png)
    corresponding to this leaf node is used as the input to the neural network ![$$\boldsymbol
    {\theta }$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq97.png)
    to obtain the corresponding output ![$$(\boldsymbol {p}, v)$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq98.png)
    . Recall that the network outputs a vector ![$$\boldsymbol {p}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq99.png)
    containing action probabilities for all actions, as well as an evaluated value
    *v* for the current board, all from the current player’s perspective. All children
    of the leaf node are then expanded simultaneously in a single operation, since
    we have the action probabilities for all potential actions. The statistics for
    the edges to this leaf node are initialized as ![$${N(s,a)=0, W(s,a)=0, Q(s,a)=0,
    P(s,a)=p_a}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq100.png)
    , where ![$$p_a$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq101.png)
    is the probability of selecting action *a* in state *s*, derived from the action
    probabilities in ![$$\boldsymbol {p}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq102.png)
    . In AlphaZero, the evaluation value *v* replaces the results of random simulation
    (or rollout) used in traditional MCTS, so there is no simulation phase; thus,
    we don’t need to train a rollout policy network.


    In practice, it is often unnecessary to create nodes that represent illegal moves,
    since an agent should never choose them. This is particularly true in later stages
    of the game when much of the board is non-empty or when certain moves are prohibited
    by the game’s rules. Limiting the creation of nodes to only those that represent
    legal moves can significantly reduce memory usage and speed up the expansion process,
    which can be particularly important when performing large amount of iterations.'
  trans: '

    ### MCTS 搜索算法


    AlphaZero 使用了一种更为简洁的 MCTS 搜索算法。与传统 MCTS 不同，它在搜索过程中不进行模拟（rollout）。相反，神经网络直接评估局面，这使得更快的
    rollout 策略网络变得不再必要。整体搜索过程如图 14.7 所示。


    ![](img/605748_1_En_14_Fig7_HTML.png)


    三个搜索树，在不同层级上有多个高亮节点，分别标记为选择、扩展与评估、以及回溯。扩展与评估以及回溯对应的树有 4 个层级。


    **图 14.7** AlphaZero 的 MCTS 搜索算法


    与通常情况一样，搜索树中的每个节点 `s` 代表一个特定的棋盘配置或状态。每个节点包含针对所有合法动作 `a ∈ A(s)` 的边 `(s, a)`，其中
    `A(s)` 是状态 `s` 下所有合法动作的集合。每条边存储以下统计信息：


    - `N(s, a)`：访问次数

    - `W(s, a)`：总状态-动作价值

    - `Q(s, a)`：平均状态-动作价值，其中 `Q(s, a) = W(s, a) / N(s, a)`

    - `P(s, a)`：在状态 `s` 中选择动作 `a` 的先验概率，该概率从神经网络的输出向量 `p` 中获得


    **算法 4：AlphaZero 的 MCTS 算法**


    ![](img/605748_1_En_14_Figaad_HTML.gif) 用于 AlphaZero 的 MCTS 搜索算法，包含函数 `MCTSSearch`、`SelectLeaf`、`Expand`
    和 `Backup`。


    原始的 AlphaZero 算法每次 MCTS 搜索执行 800 次迭代，这是 AlphaGo 算法所用迭代次数的一半。值得注意的是，在提及 AlphaZero
    时，“模拟”一词有时会被误用，因为它并不像其他算法那样使用 rollout。然而，该术语在文献中仍被广泛使用。


    #### 选择


    在 AlphaZero 使用的 MCTS 算法中，搜索从选择阶段开始。在每次搜索迭代中，算法从搜索树的根节点开始，迭代地选择动作，直到在时间步 `L` 到达一个叶节点。对于时间步
    `0 < t < L`，使用应用于树的置信上界（UCT）算法的一个变体，结合时间步 `t` 时的合法动作集，来选择动作 `a_t`，以防止违反游戏的基本规则。UCT
    算法平衡了利用与探索。具体来说，算法选择使平均状态-动作价值 `Q(s_t, a)` 与探索项 `U(s_t, a)` 之和最大化的动作：


    ```

    a_t = argmax_a { Q(s_t, a) + U(s_t, a) }

    ```


    这里，`Q(s_t, a)` 是状态-动作对的平均值，而 `U(s_t, a)` 使用以下公式计算：


    ```

    U(s, a) = C(s) * p(s, a) * sqrt( N(s) / (1 + N(s, a)) )

    ```


    (14.3) 其中 `N(s)` 是父节点的访问次数，`N(s, a)` 是状态-动作对的访问次数，`p(s, a)` 是选择该动作的概率，`C(s)` 是一个随搜索时间缓慢增长的探索率。具体来说，`C(s)`
    由以下公式给出：


    ```

    C(s) = log( (1 + N(s) + c_base) / c_base ) + c_init

    ```


    (14.4)


    需要注意的是，此处描述的探索率 `C(s)` 的计算方法并未在原始的 AlphaGo Zero 或 AlphaZero 论文中提及。这种方法仅在随后的 MuZero
    论文 [14] 中进行了专门讨论。


    参数 `c_base` 和 `c_init` 的值通常分别设置为 19652 和 1.25。


    #### 扩展与评估


    当搜索过程到达搜索树中的一个叶节点时，该叶节点对应的游戏状态 `s_t` 被用作神经网络 `θ` 的输入，以获得相应的输出 `(p, v)`。回顾一下，网络输出一个包含所有动作概率的向量
    `p`，以及一个从当前玩家视角评估的当前棋盘价值 `v`。由于我们拥有所有潜在动作的动作概率，叶节点的所有子节点随后会在一次操作中同时被扩展。通向该叶节点的边的统计信息被初始化为
    `{N(s, a) = 0, W(s, a) = 0, Q(s, a) = 0, P(s, a) = p_a}`，其中 `p_a` 是从 `p` 中的动作概率推导出的、在状态
    `s` 中选择动作 `a` 的概率。在 AlphaZero 中，评估值 `v` 取代了传统 MCTS 中使用的随机模拟（或 rollout）的结果，因此没有模拟阶段；这样，我们就不需要训练一个
    rollout 策略网络。


    在实践中，通常没有必要创建代表非法移动的节点，因为智能体永远不应该选择它们。这在游戏后期棋盘大部分非空，或某些移动被游戏规则禁止时尤其如此。将节点的创建限制为仅代表合法移动，可以显著减少内存使用并加快扩展过程，这在执行大量迭代时可能尤为重要。

    '
- fmt: '### Backup


    In the final backup phase, the value `v`, which is coming from the neural network,
    is backed up for each time step `t ≤ L`. During this phase, the visit count `N(s_t,
    a_t)` for the state-action pair `(s_t, a_t)` is updated as `N(s_t, a_t) = N(s_t,
    a_t) + 1`. The total state-action value `W(s_t, a_t)` is also updated as `W(s_t,
    a_t) = W(s_t, a_t) + v`, where `v` represents the value that is being backed up.
    Moreover, the mean state-action value `Q(s_t, a_t)` is computed as `Q(s_t, a_t)
    = W(s_t, a_t) / N(s_t, a_t)`.


    Since we’re dealing with two-player zero-sum games, the value `v` that is being
    backed up is occasionally flipped. For example, if the current player is the maximizing
    player, the backed-up value `v` will be negated to represent the opponent’s utility.


    After completion of the three phases, one search iteration is considered complete.
    The algorithm then proceeds to the next iteration, and this process continues
    until a limit is reached, such as a time constraint or the maximum number of iterations.


    ### How AlphaZero MCTS Builds Search Tree


    Since AlphaZero would expand all children nodes instead of one child, the search
    tree is built slightly different compared to the general MCTS. A simple example
    is shown in Fig. 14.8.


    An illustration of the process involved in building the search tree for AlphaZero’s
    MCTS search algorithm. It presents node diagrams for iterations 1 to 4. On each
    iteration, the levels increase.


    **Fig. 14.8** A simple example to illustrate how the search tree is built for
    AlphaZero’s MCTS search algorithm


    To summarize, several modifications have been made to the standard MCTS algorithm
    for AlphaZero, and we highlight them here:


    - After the search reaches a leaf node, there is no rollout. Instead, AlphaZero
    uses the neural network to evaluate the board position and uses that as an estimated
    game result to update the statistics in the search tree.

    - When expanding a leaf node, all children are expanded in a single operation,
    rather than the standard MCTS, which expands one child at a time. This means that
    after node expansion, a leaf node immediately becomes fully expanded.

    - AlphaZero uses a slightly different UCT algorithm to select the best child during
    the selection phase, which incorporates the prior action probabilities `p` from
    the output of the neural network.


    There are additional techniques that DeepMind adapted to further speed up the
    MCTS search process, such as using parallel tree search and reusing subtrees.
    These are advanced features that are nice to have but are much more complex and
    strongly depend on how we implement the algorithms (e.g., in which programming
    language). However, these are nice to have but not mandatory in order to make
    the AlphaZero agent work. Interested readers could find more information on these
    topics in the original AlphaGo Zero and AlphaZero papers.


    ### Self-Play


    To generate high-quality training data to train the neural network, AlphaZero
    uses a self-play approach with Monte Carlo Tree Search (MCTS).


    During each self-play game, for each non-terminal time step `0 ≤ t ≤ T`, an MCTS
    search is conducted using the latest neural network parameters, which typically
    consists of thousands of iterations. After the search is complete, a stronger
    search policy `π_t` is computed for the current game state `s_t`. This policy
    is proportional to the exponential visit count of the children based on the root
    node, with a temperature parameter `τ` controlling the level of exploration:


    ```

    π(a|s_0) = N(s_0, a)^(1/τ) / Σ_b N(s_0, b)^(1/τ)

    ```


    (14.5) where `N(s_0, a)` represents the visit count of the child node resulting
    from taking action `a` in state `s_0`. The policy `π_t` is stronger than the raw
    output vector `P_t` from the neural network and can be viewed as a powerful policy
    improvement operator. To play the game, a move `a` is selected based on the policy
    `π_t`, and the game transitions to the next state, starting a new MCTS search
    process. This policy also becomes the target when training the neural network.


    A move `a_t` is then sampled from `π_t` to play at game state `s_t`. For the first
    30 moves of each self-play game, the temperature in the softmax function (defined
    as `softmax(x_i) = exp(x_i / τ) / Σ_j exp(x_j / τ)`) is set to `τ = 1`. This selects
    moves proportionally to the visit count of the children in the root node of the
    MCTS search tree. For the remainder of the game, a temperature close to zero is
    used (`τ → 0`), which corresponds to always selecting the most visited child of
    the root node of the MCTS search tree.


    #### Exploration


    To encourage further exploration, a small amount of Dirichlet noise is added to
    the prior probabilities `P(s, a)` in the root node `s_0`. Specifically, `P(s,
    a) = (1 - ε) P_a + ε η_a`, where `η ~ Dir(0.03)` and `ε = 0.25`. This is done
    for each MCTS search.'
