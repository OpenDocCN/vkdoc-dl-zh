  trans: '

    # 9.6 利用熵促进探索


    熵是信息论和统计学中的一个概念，用于衡量概率分布的随机性或不确定性。通常，熵被定义为描述随机变量结果所需的平均信息量。


    例如，考虑一次抛硬币，有两种可能结果：正面或反面。如果硬币是均匀的，那么正面的概率为 0.5，反面的概率也为 0.5。该分布的熵为 1 比特，这意味着平均需要
    1 比特的信息来描述单次抛硬币的结果。


    在基于策略的强化学习算法中，策略通常由一个神经网络表示，该网络根据给定状态输出动作的概率分布。该分布的熵可作为衡量策略不确定性或随机性的指标。


    利用熵来鼓励探索的想法最早由 Williams, R. J. [4] 提出。在这种情况下，策略被鼓励进行更多探索并采取更多样化的动作，这有助于学习一个能在多种情况下表现良好的稳健策略。另一方面，低熵意味着策略更具确定性，探索性较弱，这可能导致策略陷入局部最优，表现欠佳。


    为了在策略梯度算法中鼓励探索，可以在策略梯度损失中添加一个负熵项。这鼓励策略在仍倾向于选择预期回报较高的动作的同时，采取更多样化的动作。


    对于具有离散动作空间的强化学习问题，我们可以使用公式（9.29）来计算某个策略 `π` 的熵 `H`，其中 `N` 是动作空间中的动作数量，`π(a_t|s_t)`
    是在遵循策略 `π` 时，在状态 `s_t` 下采取动作 `a_t` 的概率。


    ```

    H = -∑_{k=1}^{N} π(a_k|s_t) log π(a_k|s_t)

    ```


    (9.29)


    为了理解为什么使用熵有助于鼓励智能体进行探索，让我们看一个简单的实验。假设对于某个特定状态 `s`，智能体有四个动作可选。我们有三种完全不同的策略：`π_1`、`π_2`
    和 `π_3`。策略 `π_1` 是一个最优确定性策略，这意味着在状态 `s` 时，它总是会选择最佳动作（假设是第一个动作），因此在策略 `π_1` 下，不同动作的概率分布类似于
    `[1, 0, 0, 0]`。第二个策略 `π_2` 是一个随机策略，在策略 `π_2` 下具有不同的概率分布，其概率分布类似于 `[0.6, 0.4, 0,
    0]`。第三个策略 `π_3` 是一个均匀随机策略，这意味着概率均匀分布在所有可用动作上，即 `[0.25, 0.25, 0.25, 0.25]`。然后我们可以使用公式（9.29）来计算这些不同策略在状态
    `s` 下的熵。


    这些不同策略的熵如下所示：


    - 策略 `π_1` 的熵为 `H_{π_1} = -(1.0 * log(1.0)) = 0`

    - 策略 `π_2` 的熵为 `H_{π_2} = -(0.6 * log(0.6) + 0.4 * log(0.4)) = 0.67`

    - 策略 `π_3` 的熵为 `H_{π_3} = -(0.25 * log(0.25) * 4) = 1.39`


    我们可以看到，对于确定性策略 `π_1`，熵为 0，因为它总是会选择最佳动作，所以决策过程中没有随机性。对于随机策略 `π_2`，熵为 0.67。而对于均匀随机策略
    `π_3`，熵为 1.39。从这个例子中，我们可以清楚地看到，过程中的随机性越大，熵就越高。

    '
- fmt: '# Incorporating Entropy into Policy-Based Methods


    To incorporate entropy into the policy-based method algorithm, it is added as
    an additional term to the objective function that is optimized during training.
    The objective function typically includes the policy gradient term that maximizes
    the expected cumulative reward, and the entropy term penalizes policies with low
    entropy. The relative weighting of these terms can be controlled through a coefficient
    `w` to balance exploration and exploitation, as shown in Eq. (9.30), where `H(π(s_t;
    θ))` is the entropy computed using Eq. (9.29) for a particular state `s_t` with
    respect to the policy `π_θ`.


    ```

    ∇_θ J(θ) = Σ_{t=0}^{N} γ^t (G_t - V_π(s_t)) ∇_θ log π(a_t|s_t; θ) + w H(π(s_t;
    θ))

    ```


    (9.30)


    The value of the entropy coefficient `w` in the entropy term depends on the specific
    problem at hand and requires experimentation to find the optimal value. The entropy
    coefficient determines the balance between exploration and exploitation in the
    policy, and a larger entropy coefficient encourages more exploration.


    A good starting point for the entropy coefficient could be around 0.01–0.1, and
    we could gradually increase or decrease the value based on the performance of
    the algorithm. If the entropy coefficient is too small, the agent may not explore
    enough, and if it is too large, the agent may explore too much and not converge
    to an optimal policy.


    In practice, sometimes it’s also possible to use a decay schedule for the entropy
    coefficient, where the entropy coefficient starts high and gradually decreases
    over time as the agent learns a better policy. This approach can help the agent
    explore more in the early stages of learning and converge to a more optimal policy
    later on.


    The training of the Actor-Critic algorithm with entropy loss to encourage exploration
    is almost the same as the standard Actor-Critic algorithm shown in Algorithm 4.
    The only difference is that when we compute the policy gradient we’ll have to
    add the entropy loss by using Eq. (9.30). More precisely, we would use the following
    update rule to accumulate gradients with respect to `θ` for policy:


    ```

    g_π ← g_π + α δ_j ∇_θ log π(a_j|s_j; θ) + w H(π(s_j; θ))

    ```


    Figure 9.6 shows the performance of the Actor-Critic agent on the Atari visual
    complex game Pong. The results display the average episode return (total undiscounted
    rewards) and a 95% confidence interval. To evaluate the agent’s performance, we
    ran 200,000 evaluation steps on a separate testing environment with a greedy policy
    at the end of each training iteration, which consisted of 250,000 training steps
    or 1 million frames, where no reward clipping or soft termination on loss of life
    is applied to the evaluation environment. The results were averaged over three
    independent runs and smoothed using a moving average with a window size of five.


    A line graph of evaluation episode return versus training environment frames.
    It plots a horizontal line that extends as a concave-down increasing curve. The
    estimated values are (10 million, negative 20), (20 million, 0), and (30 million,
    15).


    **Fig. 9.6** Actor-Critic on the Atari video game Pong. The results display the
    average episode return (total undiscounted rewards) and a 95% confidence interval.
    The results were averaged over three independent runs and then smoothed using
    a moving average with a window size of five.


    We use a neural network architecture similar to DQN; however, we use the shared
    neural network architecture. The network has two output heads: one for the action
    probability and one for state value. We use discount rate `γ = 0.99`, learning
    rate `α = 0.00025`, entropy weights 0.025, and sequence length 128.


    We use the same environment processing as DQN, which involves resizing the frame
    to `84 × 84` and converting it to grayscale. We also apply the skip action technique,
    where we only process every fourth frame, and we stack the last four frames to
    create a final state image of size `84 × 84 × 4`.


    Additionally, we clip the reward values to the range of `-1` to 1, and we treat
    the loss of a life as a soft-terminal state.


    ## Benefits of Entropy Loss


    Entropy loss is particularly useful in improving the performance of a reinforcement
    learning agent when the environment is complex. In such scenarios, the agent may
    struggle to explore and discover the optimal policy because the reward signal
    is not informative enough to guide the agent toward the goal.


    In such situations, using entropy loss as a regularization term can encourage
    the agent to explore more widely, take more diverse actions, and learn a more
    robust policy. This exploration can be particularly useful for discovering regions
    of the state space that are critical for achieving the ultimate goal.


    Moreover, entropy loss can be particularly useful in situations where the optimal
    policy is stochastic or requires a certain level of randomness to be effective.
    In these cases, enforcing high entropy can help the agent learn a more optimal
    policy that takes into account the inherent randomness of the environment.'
