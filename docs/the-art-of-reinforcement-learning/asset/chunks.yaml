  trans: '

    ### 回合制任务 vs. 连续性任务


    在强化学习中，问题或任务的类型根据其是否具有自然终点，被划分为回合制或连续性。自然终点指的是任务或问题中一个可以合理认为任务或问题已完成的时间点。


    回合制问题具有一个自然的终止点或终止状态，到达该点时任务结束，并开始一个新的回合。新回合与之前的回合相互独立。回合制问题的例子包括玩雅达利视频游戏，当智能体失去所有生命或赢得游戏时，游戏结束；而无论智能体上一局是赢是输，当我们重置环境时，新的一局总是会开始。回合制问题的其他例子还包括井字棋、国际象棋或围棋游戏，其中每一局游戏都与前一局游戏相互独立。


    另一方面，连续性问题没有自然的终点，其过程可以无限持续下去。连续性问题的例子包括个性化广告或推荐系统，智能体的目标是在无限长的时间内最大化用户的满意度或点击率。另一个连续性问题的例子是自动化股票交易，智能体希望通过买卖股票来最大化其在股票市场中的利润。在这种场景下，智能体的行为，例如其购买的股票和交易时机，会影响未来的价格，从而影响其未来的利润。智能体的目标是通过持续交易来最大化其长期利润，而股票价格在未来会持续波动。因此，智能体过去的交易会影响其未来的决策，并且该问题没有自然的终止点。


    可以通过使用时间约束的方法，将某些连续性的强化学习问题设计成回合制问题。例如，当市场收盘时，一个回合可以结束。然而，在本书中，我们只考虑自然的回合制问题，即那些具有自然终止点的问题。


    理解回合制与连续性问题之间的差异，对于为各种应用设计有效的强化学习算法至关重要。例如，由于终止条件的不同，回合制问题可能需要与连续性问题不同的算法方法。此外，在现实场景中，区分回合制与连续性问题有助于确定针对特定任务或问题最合适的强化学习方法。


    ### 确定性任务 vs. 随机性任务


    在强化学习中，区分确定性问题和随机性问题非常重要。如果智能体在相同的环境状态下采取相同的行动，其结果总是相同的，那么该问题就是确定性的。例如，雅达利视频游戏或围棋游戏就是确定性问题。在这些游戏中，游戏规则是固定的；当智能体在相同的环境条件（状态）下重复采取相同的行动时，其结果（奖励信号和下一个状态）总是相同的。


    这些游戏被认为是确定性的，原因在于环境的动态特性和奖励函数不会随时间改变。游戏规则是固定的，对于一组给定的行动和状态，环境总是以相同的方式运行。这使得智能体能够通过简单地观察其行动的结果，来学习一个能最大化期望奖励的策略。


    另一方面，如果智能体在相同的环境状态下采取相同的行动，其结果并不总是相同，那么该问题就是随机性的。随机性环境的一个例子是玩扑克。某一手牌的结局并非完全由玩家的行动决定。牌桌上的其他玩家也可以采取影响这手牌结局的行动。此外，发给每位玩家的牌是由一副洗过的牌决定的，这为游戏引入了偶然性因素。


    例如，假设在德州扑克游戏中，一位玩家拿到了一对 A。该玩家可能会决定加注，希望能赢下一个大底池。然而，牌桌上的其他玩家也有他们自己的手牌，并且可以根据自己手中的牌和其他玩家的行动做出自己的决定。


    如果另一位玩家有一对 K，他们也可能决定加注，希望能赢下底池。如果第三位玩家有一对 2，他们可能会决定弃牌，因为他们的手牌不太可能赢。这手牌的结局不仅取决于拿到一对
    A 的玩家的行动，还取决于牌桌上其他玩家的行动，以及发到他们手中的牌。


    这种不确定性和复杂性使得扑克成为一个随机性问题。虽然可以使用各种策略来提高在扑克中获胜的几率，但任何一手牌的结局都绝非确定，一个熟练的玩家必须能够根据其他玩家的行动和发出的牌来调整自己的策略。


    随机性环境的另一个例子是股票市场。股票市场是一个随机性环境，因为在相同的环境状态下采取相同的行动，投资的结果并不总是相同。有许多因素可以影响股票价格，例如公司业绩、经济状况、地缘政治事件和投资者情绪。这些因素不断变化且难以预测，使得无法确切知道一项投资的结果会是什么。


    例如，假设你决定投资某只特定股票，因为你认为该公司被低估且具有强劲的增长前景。你以每股 145.0 美元的价格购买了 100 股。然而，第二天，该公司宣布失去了一位重要客户，并且下一季度的收入预期低于预期。股价跌至每股
    135.0 美元，你的投资损失了 1000 美元。这很可能是环境的随机性导致了亏损的结果，而不是你的行动（购买 100 股）所致。


    虽然可以使用统计分析和其他工具来尝试预测股票价格走势，但投资股票市场总是存在一定程度的不确定性和风险。这种不确定性和风险正是股票市场成为随机性环境的原因，也是在做出投资决策时使用适当风险管理技术的重要性所在。


    在本书中，我们专注于确定性的强化学习问题。通过理解确定性强化学习的基础知识，读者将能够很好地应对未来更复杂、更具挑战性的问题。

    '
- fmt: '### Model-Free vs. Model-Based Reinforcement Learning


    In reinforcement learning, an environment is a system in which an agent interacts
    with in order to achieve a goal. A model is a mathematical representation of the
    environment’s dynamics and reward functions. Model-free reinforcement learning
    means the agent does not use the model of the environment to help it make decisions.
    This may occur because either the agent lacks access to the accurate model of
    the environment or the model is too complex to use during decision-making.


    In model-free reinforcement learning, the agent learns to take actions based on
    its experiences of the environment without explicitly simulating future outcomes.
    Examples of model-free reinforcement learning methods include `Q-learning`, `SARSA`
    (State-Action-Reward-State-Action), and deep reinforcement learning algorithms
    such as `DQN`, which we’ll introduce later in the book.


    On the other hand, in model-based reinforcement learning, the agent uses a model
    of the environment to simulate future outcomes and plan its actions accordingly.
    This may involve constructing a complete model of the environment or using a simplified
    model that captures only the most essential aspects of the environment’s dynamics.
    Model-based reinforcement learning can be more sample-efficient than model-free
    methods in certain scenarios, especially when the environment is relatively simple
    and the model is accurate. Examples of model-based reinforcement learning methods
    include dynamic programming algorithms, such as value iteration and policy iteration,
    and probabilistic planning methods, such as Monte Carlo Tree Search in `AlphaZero`
    agent, which we’ll introduce later in the book.


    In summary, model-free and model-based reinforcement learning are two different
    approaches to solving the same problem of maximizing rewards in an environment.
    The choice between these approaches depends on the properties of the environment,
    the available data, and the computational resources.


    ## Why Study Reinforcement Learning


    Machine learning is a vast and rapidly evolving field, with many different approaches
    and techniques. As such, it can be challenging for practitioners to know which
    type of machine learning to use for a given problem. By discussing the strengths
    and limitations of different branches of machine learning, we can better understand
    which approach might be best suited to a particular task. This can help us make
    more informed decisions when developing machine learning solutions and ultimately
    lead to more effective and efficient systems.


    There are three branches of machine learning. One of the most popular and widely
    adopted in the real world is supervised learning, which is used in domains like
    image recognition, speech recognition, and text classification. The idea of supervised
    learning is very simple: given a set of training data and the corresponding labels,
    the objective is for the system to generalize and predict the label for data that’s
    not present in the training dataset. These training labels are typically provided
    by some supervisors (e.g., humans). Hence, we’ve got the name supervised learning.


    Another branch of machine learning is unsupervised learning. In unsupervised learning,
    the objective is to discover the hidden structures or features of the training
    data without being provided with any labels. This can be useful in domains such
    as image clustering, where we want the system to group similar images together
    without knowing ahead of time which images belong to which group. Another application
    of unsupervised learning is in dimensionality reduction, where we want to represent
    high-dimensional data in a lower-dimensional space while preserving as much information
    as possible.


    Reinforcement learning is a type of machine learning in which an agent learns
    to take actions in an environment in order to maximize a reward signal. It’s particularly
    useful in domains where there is no clear notion of “correct” output, such as
    in robotics or game playing. Reinforcement learning has potential applications
    in areas like robotics, healthcare, and finance.


    Supervised learning has already been widely used in computer vision and natural
    language processing. For example, the ImageNet classification challenge is an
    annual computer vision competition where deep convolutional neural networks (CNNs)
    dominate. The challenge provides a training dataset with labels for 1.2 million
    images across 1000 categories, and the goal is to predict the labels for a separate
    evaluation dataset of about 100,000 images. In 2012, Krizhevsky et al. [[8](#605748_1_En_1_Chapter.xhtml#CR8)]
    developed `AlexNet`, the first deep CNN system used in this challenge. `AlexNet`
    achieved an 18% improvement in accuracy compared to previous state-of-the-art
    methods, which marked a major breakthrough in computer vision.


    Since the advent of `AlexNet`, almost all leading solutions to the ImageNet challenge
    have been based on deep CNNs. Another breakthrough came in 2015 when researchers
    He et al. [[9](#605748_1_En_1_Chapter.xhtml#CR9)] from Microsoft developed `ResNet`,
    a new architecture designed to improve the training of very deep CNNs with hundreds
    of layers. Training deep CNNs is challenging due to vanishing gradients, which
    makes it difficult to propagate the gradients backward through the network during
    backpropagation. `ResNet` addressed this challenge by introducing skip connections,
    which allowed the network to bypass one or more layers during forward propagation,
    thereby reducing the depth of the network that the gradients have to propagate
    through.


    While supervised learning is capable of discovering hidden patterns and features
    from data, it is limited in that it merely mimics what it is told to do during
    training and cannot interact with the world and learn from its own experience.
    One limitation of supervised learning is the need to label every possible stage
    of the process. For example, if we want to use supervised learning to train an
    agent to play Go, then we would need to collect the labels for every possible
    board position, which is impossible due to the enormous number of possible combinations.
    Similarly, in Atari video games, a single pixel change would require relabeling,
    making supervised learning inapplicable in these cases. However, supervised learning
    has been successful in many other applications, such as language translation and
    image classification.


    Unsupervised learning tries to discover hidden patterns or features without labels,
    but its objective is completely different from that of RL, which is to maximize
    accumulated reward signals. Humans and animals learn by interacting with their
    environment, and this is where reinforcement learning (RL) comes in. In RL, the
    agent is not told which action is good or bad, but rather it must discover that
    for itself through trial and error. This trial-and-error search process is unique
    to RL. However, there are other challenges that are unique to RL, such as dealing
    with delayed consequences and balancing exploration and exploitation.


    While RL is a distinct branch of machine learning, it shares some commonalities
    with other branches, such as supervised and unsupervised learning. For example,
    improvements in supervised learning and deep convolutional neural networks (CNNs)
    have been adapted to DeepMind’s `DQN`, `AlphaGo`, and other RL agents. Similarly,
    unsupervised learning can be used to pretrain the weights of RL agents to improve
    their performance. Furthermore, many of the mathematical concepts used in RL,
    such as optimization and how to train a neural network, are shared with other
    branches of machine learning. Therefore, while RL has unique challenges and applications,
    it also benefits from and contributes to the development of other branches of
    machine learning.'
  raw: '### Model-Free vs. Model-Based Reinforcement Learning


    In reinforcement learning, an environment is a system in which an agent interacts
    with in order to achieve a goal. A model is a mathematical representation of the
    environment’s dynamics and reward functions. Model-free reinforcement learning
    means the agent does not use the model of the environment to help it make decisions.
    This may occur because either the agent lacks access to the accurate model of
    the environment or the model is too complex to use during decision-making.


    In model-free reinforcement learning, the agent learns to take actions based on
    its experiences of the environment without explicitly simulating future outcomes.
    Examples of model-free reinforcement learning methods include Q-learning, SARSA
    (State-Action-Reward-State-Action), and deep reinforcement learning algorithms
    such as DQN, which we’ll introduce later in the book.


    On the other hand, in model-based reinforcement learning, the agent uses a model
    of the environment to simulate future outcomes and plan its actions accordingly.
    This may involve constructing a complete model of the environment or using a simplified
    model that captures only the most essential aspects of the environment’s dynamics.
    Model-based reinforcement learning can be more sample-efficient than model-free
    methods in certain scenarios, especially when the environment is relatively simple
    and the model is accurate. Examples of model-based reinforcement learning methods
    include dynamic programming algorithms, such as value iteration and policy iteration,
    and probabilistic planning methods, such as Monte Carlo Tree Search in AlphaZero
    agent, which we’ll introduce later in the book.


    In summary, model-free and model-based reinforcement learning are two different
    approaches to solving the same problem of maximizing rewards in an environment.
    The choice between these approaches depends on the properties of the environment,
    the available data, and the computational resources.


    ## 1.6 Why Study Reinforcement Learning


    Machine learning is a vast and rapidly evolving field, with many different approaches
    and techniques. As such, it can be challenging for practitioners to know which
    type of machine learning to use for a given problem. By discussing the strengths
    and limitations of different branches of machine learning, we can better understand
    which approach might be best suited to a particular task. This can help us make
    more informed decisions when developing machine learning solutions and ultimately
    lead to more effective and efficient systems.


    There are three branches of machine learning. One of the most popular and widely
    adopted in the real world is supervised learning, which is used in domains like
    image recognition, speech recognition, and text classification. The idea of supervised
    learning is very simple: given a set of training data and the corresponding labels,
    the objective is for the system to generalize and predict the label for data that’s
    not present in the training dataset. These training labels are typically provided
    by some supervisors (e.g., humans). Hence, we’ve got the name supervised learning.


    Another branch of machine learning is unsupervised learning. In unsupervised learning,
    the objective is to discover the hidden structures or features of the training
    data without being provided with any labels. This can be useful in domains such
    as image clustering, where we want the system to group similar images together
    without knowing ahead of time which images belong to which group. Another application
