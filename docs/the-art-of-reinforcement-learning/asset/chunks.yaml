    is the visit count of the state-action pair, ![$$\boldsymbol {p}(s,a)$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq90.png)
    is the probability of selecting the action, and ![$$C(s)$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq91.png)
