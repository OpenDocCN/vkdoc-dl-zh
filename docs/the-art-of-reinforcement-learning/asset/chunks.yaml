    rule for ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq251.png)
    when using TD(0) and off-policy reinforcement learning:


    ![$$\displaystyle \begin{aligned} Q_\pi(S_t, A_t)={} &amp; Q_\pi(S_t, A_t) + \alpha
    \frac{\pi(A_{t+1}|S_{t+1})}{\mu(A_{t+1}|S_{t+1})} \bigg( \Big[ R_t + {\gamma}
    Q_\pi(S_{t+1}, A_{t+1}) \Big] \\ &amp; - Q_\pi(S_t, A_t) \bigg) {} \end{aligned}
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ11.png)


    (5.11)


    This equation updates the state-action value function ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq252.png)
    estimate for the target policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq253.png)
    , using transitions that were generated by a different behavior policy ![$$\mu
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq254.png) . The importance
    sampling ratio is used to correct for the difference in probability between the
    behavior policy and the target policy. Specifically, we use the ratio ![$$\frac
    {\pi (A_{t+1}|S_{t+1})}{\mu (A_{t+1}|S_{t+1})}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq255.png)
    to adjust the update, so that it takes into account the difference between the
    target policy and the behavior policy. The update is based on the temporal difference
    error, which is the difference between the estimated Q-value for the current state-action
    pair and the estimated Q-value for the next state-action pair, plus the reward
    received at the current state-action pair. The learning rate ![$$\alpha $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq256.png)
    controls the size of the update.


    Now we introduce the off-policy TD(0) policy evaluation algorithm for ![$$Q_\pi
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq257.png) for some
    given policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq258.png)
    .


    Algorithm 6: Off-policy temporal difference [TD(0)] policy evaluation for *Q*[*π*]


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Figaaf_HTML.gif) A 11-line algorithm
    to compute the off-policy temporal difference T D 0 and policy evaluation for
