    构建的 ![$$\epsilon $$](img/605748_1_En_6_Chapter_TeX_IEq197.png)-贪心策略行动的，其中 ![$$\hat
    {Q}$$](img/605748_1_En_6_Chapter_TeX_IEq199.png) 由 ![$$\boldsymbol {w}$$](img/605748_1_En_6_Chapter_TeX_IEq200.png)
    参数化。


    **算法 5：** 使用线性 VFA 的每次访问蒙特卡洛控制，采用 *𝜖*-贪心策略进行探索


    ![](img/605748_1_En_6_Figaae_HTML.gif) 使用线性 V F A 的每次访问蒙特卡洛控制算法，该算法采用属于贪心策略的元素进行探索。


