    much simpler neural network architecture (a single neural network with shared
    weights and multiple heads, instead of separate networks).


    In late 2017, DeepMind developed a new agent called AlphaZero [[13](#605748_1_En_14_Chapter.xhtml#CR13)],
    which is a single system that taught itself from scratch how to master the games
    of Chess, Shogi, and Go, beating a world-champion computer program in each case.^([^(13)](#fn13))
    This new AlphaZero agent is a generalization of its predecessor, AlphaGo Zero,
    which can only play the game of Go.


    To summarize, AlphaZero is considered a state of the art for challenging two-player
    zero-sum games such as Go, Chess, and Shogi. It is trained using only reinforcement
    learning and moves from pure self-play games, without any human supervision other
    than the basic rules of the game. During actual gameplay, AlphaZero also uses
    MCTS for online planning. The training process involves millions of self-play
    games. The policy network outputs the action probability for a given board position,
    and the value network outputs the evaluation of the board from the current player’s
    perspective.


    In the upcoming sections of this chapter, our attention will be directed toward
    the intricacies of the AlphaZero agent and its corresponding paper [[13](#605748_1_En_14_Chapter.xhtml#CR13)].
    However, it is important to acknowledge that specific components, such as the
    neural network structure and the MCTS search algorithm, were originally introduced
    and extensively examined in the AlphaGo Zero paper [[12](#605748_1_En_14_Chapter.xhtml#CR12)].'
  trans: '

    # 14.3 AlphaZero


    2015 年 10 月，DeepMind 的人工智能体`AlphaGo`在五局围棋比赛中击败欧洲冠军樊麾，创造了历史。`AlphaGo`赢得了全部五局比赛，成为首个在无让子的全尺寸棋盘上击败职业人类棋手的计算机围棋程序。2016
    年 3 月，另一版本的`AlphaGo`（名为`AlphaGo Lee`）在五局围棋比赛中以 4 比 1 的比分击败了传奇韩国棋手李世石。


    `AlphaGo`通过结合深度神经网络、监督学习、强化学习以及用于搜索和规划的蒙特卡洛树搜索（`MCTS`）进行训练。在实际对弈过程中，`AlphaGo`也使用`MCTS`进行在线规划。


    `AlphaGo`的训练过程可分为两个阶段：


    - **第一阶段**：使用来自 KGS 围棋服务器的 3000 万个棋局位置训练策略网络`P_s`和价值网络`V_s`。此阶段采用纯监督学习，通过分类任务训练`P_s`，通过回归任务训练`V_s`。策略网络`P_s`针对给定棋盘位置输出落子概率，价值网络`V_s`则从当前棋手视角输出对棋盘的评估。此外，还训练了一个更小但速度更快的策略网络`P_rollout`。该快速策略网络的准确率远低于`P_s`，仅在第二阶段的自对弈中用于`MCTS`模拟（作为走子策略）。第一阶段持续进行，直到网络`P_s`和`V_s`能在独立测试集中以特定阈值（例如
    55%）正确预测人类专家棋手的落子。


    - **第二阶段**：通过数百万局自对弈游戏，使用强化学习训练策略网络`P`和价值网络`V`。初始时`P = P_s`且`V = V_s`，多个智能体并行运行以生成自对弈棋局，生成这些棋局时，在`MCTS`搜索中使用策略网络`P`。此外，第一阶段训练的快速采样策略网络`P_rollout`也用于`MCTS`模拟阶段的动作采样。


    2017 年，DeepMind 开发了名为`AlphaGo Zero`的新智能体，这是对`AlphaGo`的增强版本，实力远超其前身。`AlphaGo Zero`在围棋对弈中表现更强，且仅使用强化学习和纯自对弈棋局中的落子进行训练。它还通过消除监督学习简化了训练过程，并采用了更简单的神经网络架构（使用共享权重和多头的单一神经网络，而非多个独立网络）。


    2017 年末，DeepMind 开发了名为`AlphaZero`的新智能体，这是一个从零开始自学掌握国际象棋、将棋和围棋的单一系统，并在每个领域击败了世界冠军级别的计算机程序。这个新的`AlphaZero`智能体是其前身`AlphaGo
    Zero`的泛化版本，后者仅能进行围棋对弈。


    总结而言，`AlphaZero`被认为是挑战围棋、国际象棋和将棋等双人零和博弈的顶尖技术。它仅使用强化学习和纯自对弈棋局中的落子进行训练，除游戏基本规则外无需任何人类监督。在实际对弈过程中，`AlphaZero`也使用`MCTS`进行在线规划。训练过程涉及数百万局自对弈。策略网络针对给定棋盘位置输出落子概率，价值网络则从当前棋手视角输出对棋盘的评估。


    在本章后续部分，我们将重点关注`AlphaZero`智能体及其对应论文的细节。但需要指出的是，某些特定组件（如神经网络结构和`MCTS`搜索算法）最初是在`AlphaGo
    Zero`论文中引入并得到深入研究的。

    '
- fmt: '### Neural Network Architectures and State Representation


    AlphaZero uses a neural network architecture that employs convolutional neural
    networks (CNNs) to identify patterns in the board positions of games like Go,
    Chess, and Shogi. `CNN` has a proven history in tasks like classification and
    object detection in the domain of computer vision. These patterns are essential
    for effective decision-making in these games. Professional human players are adept
    at identifying these patterns during gameplay, and we want our reinforcement learning
    agent to do the same. For the game of Go, the board is a `19 × 19` grid. We can
    represent the board as a `19 × 19 × 1` binary feature plane where `1`s represent
    intersections with stones and `0`s represent empty intersections.


    However, the standard representation of the Go board as a `19 × 19 × 1` binary
    feature plane has limitations. It doesn’t distinguish between black and white
    stones, nor does it provide enough information for decision-making or the Markov
    property. To overcome these limitations, we use separate binary feature planes
    for black and white stones, and we stack `N` history of board positions together.


    The final state `s_t` is a `19 × 19 × 17` image that contains 17 binary feature
    planes. Eight of these planes `X_t` represent the current player’s stones, with
    a binary value of `1` if a stone is present and `0` if the intersection is empty
    or contains an opponent stone. Similarly, the other eight planes `Y_t` represent
    the opponent’s stones. The additional plane `C` called the color-to-play indicates
    which player’s turn it is and takes into account the fact that the best move may
    differ for the two players in the same board position. Additionally, it provides
    the information on who plays first (default black plays first), which often has
    some advantages.


    To ensure the Markov property holds, we stack up to `N=8` previous board positions
    for each player together, including the current one, creating a 3D image of the
    board. We concatenate the planes into a single input using the following format:


    ```

    s_t = [ X_t, Y_t, X_{t-1}, Y_{t-1}, ..., X_{t-7}, Y_{t-7}, C ]

    ```


    AlphaZero uses a single neural network consisting of many residual blocks of convolutional
    layers and rectifier nonlinear activations (ReLU). Unlike AlphaGo, AlphaZero does
    not use a separate rollout policy network. We’ll discuss the reason for this later
    when we describe AlphaZero’s Monte Carlo Tree Search algorithm. The input features
    `s_t` first get processed by a convolution layer of 256 filters of kernel size
    `3 × 3`, with stride `1`, then followed by a batch normalization layer and a rectifier
    nonlinearity (ReLU) activation. This is followed by 19 (or 39) residual blocks,
    and the output from the last residual block is then fed into two separate heads
    for computing the policy and value, respectively.


    Each residual block applies the following layers sequentially:


    - A convolution of 256 filters of kernel size `3 × 3`, with stride `1`

    - Batch normalization

    - A rectifier nonlinearity (ReLU) activation

    - A convolution of 256 filters of kernel size `3 × 3`, with stride `1`

    - Batch normalization

    - A skip connection that adds the input to the block

    - A rectifier nonlinearity (ReLU) activation


    The policy head applies the following layers sequentially:


    - A convolution of two filters of kernel size `1 × 1`, with stride `1`

    - Batch normalization

    - A rectifier nonlinearity (ReLU) activation

    - A fully connected linear layer that outputs a vector of size `19 × 19 + 1 =
    362`, which corresponds to the action probabilities for all actions, including
    the pass move


    The value head applies the following layers sequentially:


    - A convolution of one filter of kernel size `1 × 1`, with stride `1`

    - Batch normalization

    - A rectifier nonlinearity (ReLU) activation

    - A fully connected linear layer with 256 hidden units

    - A rectifier nonlinearity (ReLU) activation

    - A fully connected linear layer that outputs a scalar value

    - A tanh nonlinearity (Tanh) activation that transforms the scalar value in the
    range `[-1, 1]`


    Figure 14.6 shows the AlphaZero neural network architecture for the game of Go,
    which utilizes 19 residual blocks. A similar architecture is used for other games
    such as Chess or Shogi. However, the input data for the neural network is slightly
    different for each game. For Chess, the input data is an `8 × 8 × 73` stack of
    planes, while for Shogi, it is a `9 × 9 × 139` stack of planes. Additionally,
    DeepMind employs a slightly different representation mechanism when stacking feature
    planes to construct the current state `s_t` for Chess and Shogi.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig6_HTML.png)


    A flowchart of the alpha zero neural network architecture with 19 residual blocks.
    The flowchart starts at input data 19 by 19 by 17 and has three outputs namely
    action probabilities, scalar value from negative 1 to 1, and R e L U.


    **Fig. 14.6** Neural network architecture for the AlphaZero agent for the game
    of Go


    This architecture allows AlphaZero to process a complete board position as a single
    input and to identify complex patterns and features that are crucial for effective
    gameplay.'
  raw: '### Neural Network Architectures and State Representation


    AlphaZero uses a neural network architecture that employs convolutional neural
    networks (CNNs) to identify patterns in the board positions of games like Go,
    Chess, and Shogi. CNN has a proven history in tasks like classification and object
    detection in the domain of computer vision. These patterns are essential for effective
    decision-making in these games. Professional human players are adept at identifying
    these patterns during gameplay, and we want our reinforcement learning agent to
    do the same. For the game of Go, the board is a ![$$19 \times 19$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq54.png)
    grid. We can represent the board as a ![$$19 \times 19 \times 1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq55.png)
    binary feature plane where 1s represent intersections with stones and 0s represent
    empty intersections.


    However, the standard representation of the Go board as a ![$$19 \times 19 \times
    1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq56.png) binary
    feature plane has limitations. It doesn’t distinguish between black and white
    stones, nor does it provide enough information for decision-making or the Markov
    property. To overcome these limitations, we use separate binary feature planes
    for black and white stones, and we stack N history of board positions together.


    The final state ![$$s_t$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq57.png)
    is a ![$$19 \times 19 \times 17$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq58.png)
    image that contains 17 binary feature planes. Eight of these planes ![$$X_t$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq59.png)
    represent the current player’s stones, with a binary value of 1 if a stone is
    present and 0 if the intersection is empty or contains an opponent stone. Similarly,
    the other eight planes ![$$Y_t$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq60.png)
    represent the opponent’s stones. The additional plane *C* called the color-to-play
    indicates which player’s turn it is and takes into account the fact that the best
    move may differ for the two players in the same board position. Additionally,
    it provides the information on who plays first (default black plays first), which
    often has some advantages.


    To ensure the Markov property holds, we stack up to ![$$N=8$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq61.png)
    previous board positions for each player together, including the current one,
    creating a 3D image of the board. We concatenate the planes into a single input
    using the following format:


    ![$$\displaystyle \begin{aligned} s_t = \left[ X_t, Y_t, X_{t-1}, Y_{t-1}, ...,
    X_{t-7}, Y_{t-7}, C \right] \end{aligned}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_Equa.png)


    AlphaZero uses a single neural network consisting of many residual blocks of convolutional
    layers and rectifier nonlinear activations (ReLU). Unlike AlphaGo, AlphaZero does
    not use a separate rollout policy network. We’ll discuss the reason for this later
    when we describe AlphaZero’s Monte Carlo Tree Search algorithm. The input features
    ![$$s_t$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq62.png)
    first get processed by a convolution layer of 256 filters of kernel size ![$$3
    \times 3$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq63.png)
    , with stride 1, then followed by a batch normalization layer and a rectifier
    nonlinearity (ReLU) activation. This is followed by 19 (or 39) residual blocks,
    and the output from the last residual block is then fed into two separate heads
    for computing the policy and value, respectively.


    Each residual block applies the following layers sequentially:


    *   A convolution of 256 filters of kernel size ![$$3 \times 3$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq64.png)
    , with stride 1


    *   Batch normalization


    *   A rectifier nonlinearity (ReLU) activation


    *   A convolution of 256 filters of kernel size ![$$3 \times 3$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq65.png)
    , with stride 1


    *   Batch normalization


    *   A skip connection that adds the input to the block


    *   A rectifier nonlinearity (ReLU) activation


    The policy head applies the following layers sequentially:


    *   A convolution of two filters of kernel size ![$$1 \times 1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq66.png)
    , with stride 1


    *   Batch normalization


    *   A rectifier nonlinearity (ReLU) activation


    *   A fully connected linear layer that outputs a vector of size ![$$19 \times
    19 + 1 = 362$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq67.png)
    , which corresponds to the action probabilities for all actions, including the
    pass move


    The value head applies the following layers sequentially:


    *   A convolution of one filter of kernel size ![$$1 \times 1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq68.png)
    , with stride 1


    *   Batch normalization


    *   A rectifier nonlinearity (ReLU) activation


    *   A fully connected linear layer with 256 hidden units


    *   A rectifier nonlinearity (ReLU) activation


    *   A fully connected linear layer that outputs a scalar value


    *   A tanh nonlinearity (Tanh) activation that transforms the scalar value in
    the range [ ![$$-1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq69.png)
    , 1]


    Figure [14.6](#605748_1_En_14_Chapter.xhtml#Fig6) shows the AlphaZero neural network
    architecture for the game of Go, which utilizes 19 residual blocks. A similar
    architecture is used for other games such as Chess or Shogi. However, the input
    data for the neural network is slightly different for each game. For Chess, the
    input data is an ![$$8 \times 8 \times 73$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq70.png)
    stack of planes, while for Shogi, it is a ![$$9 \times 9 \times 139$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq71.png)
    stack of planes. Additionally, DeepMind employs a slightly different representation
    mechanism when stacking feature planes to construct the current state ![$$s_t$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq72.png)
    for Chess and Shogi.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig6_HTML.png)


    A flowchart of the alpha zero neural network architecture with 19 residual blocks.
    The flowchart starts at input data 19 by 19 by 17 and has three outputs namely
    action probabilities, scalar value from negative 1 to 1, and R e L U.


    Fig. 14.6


    Neural network architecture for the AlphaZero agent for the game of Go


    This architecture allows AlphaZero to process a complete board position as a single
    input and to identify complex patterns and features that are crucial for effective
    gameplay.'
  trans: '

    ### 神经网络架构与状态表示


    AlphaZero 采用了一种基于卷积神经网络（CNN）的架构，用于识别围棋、国际象棋和将棋等游戏中棋盘布局的模式。`CNN` 在计算机视觉领域的分类和物体检测等任务中有着成熟的应用历史。这些模式对于在这些游戏中做出有效决策至关重要。职业人类玩家擅长在游戏过程中识别这些模式，而我们希望强化学习智能体也能做到这一点。对于围棋来说，棋盘是一个
    `19 × 19` 的网格。我们可以将棋盘表示为一个 `19 × 19 × 1` 的二进制特征平面，其中 `1` 表示有棋子的交叉点，`0` 表示空交叉点。


    然而，将围棋棋盘标准表示为 `19 × 19 × 1` 的二进制特征平面存在局限性。它无法区分黑子和白子，也无法为决策或马尔可夫性质提供足够的信息。为了克服这些限制，我们为黑子和白子分别使用独立的二进制特征平面，并堆叠
    `N` 个历史棋盘位置。


    最终状态 `s_t` 是一个 `19 × 19 × 17` 的图像，包含 17 个二进制特征平面。其中八个平面 `X_t` 表示当前玩家的棋子，如果存在棋子则二进制值为
    `1`，如果交叉点为空或包含对手棋子则为 `0`。类似地，另外八个平面 `Y_t` 表示对手的棋子。额外的平面 `C` 称为“轮到谁下”，它指示当前轮到哪位玩家，并考虑到在相同棋盘位置上，两位玩家的最佳着法可能不同这一事实。此外，它还提供了谁先手的信息（默认黑棋先手），这通常具有一些优势。


    为了确保马尔可夫性质成立，我们为每位玩家堆叠最多 `N=8` 个之前的棋盘位置（包括当前棋盘位置），从而创建一个三维棋盘图像。我们使用以下格式将这些平面连接成一个单一输入：


    ```

    s_t = [ X_t, Y_t, X_{t-1}, Y_{t-1}, ..., X_{t-7}, Y_{t-7}, C ]

    ```


    AlphaZero 使用一个由多个卷积层和整流非线性激活函数（ReLU）的残差块组成的单一神经网络。与 AlphaGo 不同，AlphaZero 不使用独立的
    rollout 策略网络。我们稍后在描述 AlphaZero 的蒙特卡洛树搜索算法时会讨论其原因。输入特征 `s_t` 首先经过一个卷积层处理，该层有 256
    个卷积核，大小为 `3 × 3`，步长为 `1`，然后是一个批归一化层和一个整流非线性（ReLU）激活函数。接着是 19 个（或 39 个）残差块，最后一个残差块的输出随后被送入两个独立的头部分别计算策略和价值。


    每个残差块按顺序应用以下层：


    -   一个卷积层，有 256 个卷积核，大小为 `3 × 3`，步长为 `1`

    -   批归一化

    -   一个整流非线性（ReLU）激活函数

    -   一个卷积层，有 256 个卷积核，大小为 `3 × 3`，步长为 `1`

    -   批归一化

    -   一个跳跃连接，将块的输入相加

    -   一个整流非线性（ReLU）激活函数


    策略头按顺序应用以下层：


    -   一个卷积层，有 2 个卷积核，大小为 `1 × 1`，步长为 `1`

    -   批归一化

    -   一个整流非线性（ReLU）激活函数

    -   一个全连接线性层，输出大小为 `19 × 19 + 1 = 362` 的向量，对应于所有动作（包括“虚手”着法）的动作概率


    价值头按顺序应用以下层：


    -   一个卷积层，有 1 个卷积核，大小为 `1 × 1`，步长为 `1`

    -   批归一化

    -   一个整流非线性（ReLU）激活函数

    -   一个具有 256 个隐藏单元的全连接线性层

    -   一个整流非线性（ReLU）激活函数

    -   一个输出标量值的全连接线性层

    -   一个双曲正切非线性（Tanh）激活函数，将标量值变换到 `[-1, 1]` 范围内


    图 14.6 展示了用于围棋游戏的 AlphaZero 神经网络架构，该架构使用了 19 个残差块。类似的架构也用于国际象棋或将棋等其他游戏。然而，每种游戏的神经网络输入数据略有不同。对于国际象棋，输入数据是一个
    `8 × 8 × 73` 的平面堆叠，而对于将棋，则是一个 `9 × 9 × 139` 的平面堆叠。此外，DeepMind 在为国际象棋和将棋构建当前状态
    `s_t` 而堆叠特征平面时，采用了略微不同的表示机制。


    ![](img/605748_1_En_14_Fig6_HTML.png)


    一个包含 19 个残差块的 AlphaZero 神经网络架构流程图。流程图从输入数据 19×19×17 开始，有三个输出，分别是动作概率、范围从 -1 到
    1 的标量值以及 ReLU。


    **图 14.6** 用于围棋游戏的 AlphaZero 智能体的神经网络架构


    这种架构使 AlphaZero 能够将完整的棋盘位置作为单一输入进行处理，并识别出对有效游戏至关重要的复杂模式和特征。

    '
- fmt: '### MCTS Search Algorithm


    AlphaZero uses a much simpler MCTS search algorithm. Unlike traditional MCTS,
    there is no simulation (rollout) during the search. Instead, the neural network
    evaluates the position, making the faster rollout policy network unnecessary.
    The overall search process is shown in Fig. [14.7](#605748_1_En_14_Chapter.xhtml#Fig7).


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig7_HTML.png)


    Three search trees with multiple highlighted nodes at different levels labeled
    selection, expansion and evaluation, and backup. The trees under expansion and
    evaluation and backup have 4 levels.


    **Fig. 14.7** The MCTS search algorithm for AlphaZero


    As usual, each node `s` in the search tree represents a specific board configuration
    or state. Each node contains edges `(s, a)` for all legal actions `a ∈ A(s)`,
    where `A(s)` is the set of all legal actions in state `s`. Each edge stores the
    following statistics:


    - `N(s, a)`: The visit count

    - `W(s, a)`: The total state-action value

    - `Q(s, a)`: The average state-action value, where `Q(s, a) = W(s, a) / N(s, a)`

    - `P(s, a)`: The prior probability of selecting action `a` in `s`, which is obtained
    from the neural network’s output vector `p`


    **Algorithm 4: MCTS for AlphaZero**


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Figaad_HTML.gif) A search algorithm
    for MCTS for AlphaZero with functions `MCTSSearch`, `SelectLeaf`, `Expand`, and
    `Backup`.


    The original AlphaZero algorithm uses 800 iterations per MCTS search, which is
    half the number used by the AlphaGo algorithm. It’s worth noting that the term
    “simulation” is sometimes abused when referring to AlphaZero, as it does not use
    rollouts in the same way that other algorithms might. However, the term is still
    widely used in the literature.


    #### Selection


    In the MCTS algorithm used by AlphaZero, the search starts with the selection
    phase. At each search iteration, the algorithm begins at the root of the search
    tree and iteratively selects actions until it reaches a leaf node at time step
    `L`. For time steps `0 < t < L`, an action `a_t` is selected using a variant of
    the Upper Confidence Bound applied to Trees (UCT) algorithm, along with the set
    of legal actions at time step `t` to prevent it violating the basic rules of the
    game. The UCT algorithm balances exploitation and exploration. Specifically, the
    algorithm selects the action that maximizes the sum of the average state-action
    value `Q(s_t, a)` and an exploration term `U(s_t, a)`:


    ```

    a_t = argmax_a { Q(s_t, a) + U(s_t, a) }

    ```


    Here, `Q(s_t, a)` is the average value of the state-action pair, and `U(s_t, a)`
    is computed using the following equation:


    ```

    U(s, a) = C(s) * p(s, a) * sqrt( N(s) / (1 + N(s, a)) )

    ```


    (14.3) where `N(s)` is the visit count of the parent node, `N(s, a)` is the visit
    count of the state-action pair, `p(s, a)` is the probability of selecting the
    action, and `C(s)` is an exploration rate that grows slowly with search time.
    Specifically, `C(s)` is given by the following equation:


    ```

    C(s) = log( (1 + N(s) + c_base) / c_base ) + c_init

    ```


    (14.4)


    It is important to note that the computation method for the exploration rate `C(s)`
    described here is not mentioned in the original AlphaGo Zero or AlphaZero papers.
    This approach is exclusively discussed in the MuZero paper [[14](#605748_1_En_14_Chapter.xhtml#CR14)],
    which was published subsequent to the AlphaZero algorithm.


    The values assigned to the parameters `c_base` and `c_init` are typically set
    as 19652 and 1.25, respectively.


    #### Expansion and Evaluation


    When the search process reaches a leaf node in the search tree, the game state
    `s_t` corresponding to this leaf node is used as the input to the neural network
    `θ` to obtain the corresponding output `(p, v)`. Recall that the network outputs
    a vector `p` containing action probabilities for all actions, as well as an evaluated
    value `v` for the current board, all from the current player’s perspective. All
    children of the leaf node are then expanded simultaneously in a single operation,
    since we have the action probabilities for all potential actions. The statistics
    for the edges to this leaf node are initialized as `{N(s, a) = 0, W(s, a) = 0,
    Q(s, a) = 0, P(s, a) = p_a}`, where `p_a` is the probability of selecting action
    `a` in state `s`, derived from the action probabilities in `p`. In AlphaZero,
    the evaluation value `v` replaces the results of random simulation (or rollout)
    used in traditional MCTS, so there is no simulation phase; thus, we don’t need
    to train a rollout policy network.


    In practice, it is often unnecessary to create nodes that represent illegal moves,
    since an agent should never choose them. This is particularly true in later stages
    of the game when much of the board is non-empty or when certain moves are prohibited
    by the game’s rules. Limiting the creation of nodes to only those that represent
    legal moves can significantly reduce memory usage and speed up the expansion process,
    which can be particularly important when performing large amount of iterations.'
