- fmt: "# 3.5 General Policy Iteration\n\nThe policy iteration algorithm is a widely\
    \ used and effective method in reinforcement learning. It is characterized by\
    \ running policy evaluation and policy improvement processes concurrently. All\
    \ policy iteration algorithms share this basic structure and concept, but we have\
    \ the flexibility to modify the specific implementations of the policy evaluation\
    \ and policy improvement steps.\n\nIn policy iteration, we start with an initial\
    \ policy, which is a mapping from states to actions. We then perform policy evaluation\
    \ to estimate the value function for the policy. This involves iterating over\
    \ the state space, computing the expected value of each state under the policy,\
    \ and updating the value function accordingly. After policy evaluation, we perform\
    \ policy improvement by constructing a new policy that is greedier than the old\
    \ policy with respect to the value function. This new policy is obtained by choosing\
    \ the action that maximizes the expected value of the next state, starting from\
    \ the current state, and repeating this process until the end of the episode.\
    \ The new policy is then used for the next round of policy evaluation, and the\
    \ process is repeated until convergence.\n\nAlgorithm 5: General policy iteration\n\
    \n![](images/605748_1_En_3_Chapter/605748_1_En_3_Figaae_HTML.gif) A 4-line algorithm\
    \ titled general policy iteration takes in the following inputs to give an optimal\
    \ policy `pie` after the search as the output. `I = 0` and random policy `pie`\
    \ to the zeroth power.\n\nAlthough dynamic programming is generally considered\
    \ a model-based reinforcement learning method, policy iteration can be used for\
    \ both model-based and model-free methods in practice. For model-based methods,\
    \ the policy evaluation step involves computing the state transition probabilities\
    \ and rewards from the model, while for model-free methods, these values are estimated\
    \ from experience using Monte Carlo or TD methods, which we’ll discuss later in\
    \ the book.\n\n## 3.6 Value Iteration\n\nValue iteration is a powerful algorithm\
    \ for finding the optimal policy in reinforcement learning. While policy iteration\
    \ is effective, one downside is that it requires multiple iterations of policy\
    \ evaluation and policy improvement to find the optimal policy `π*`, which can\
    \ be time-consuming and computationally expensive. Value iteration addresses this\
    \ issue by combining policy evaluation and policy improvement into one step.\n\
    \nTo find the optimal policy, the value iteration algorithm computes the optimal\
    \ state value function `V*` directly instead of the estimated state value function\
    \ `Vπ` for an arbitrary policy `π`. The optimal state value function `V*` is the\
    \ one that has the highest state values across the entire policy space.\n\nThe\
    \ value iteration algorithm uses the Bellman optimality equation for `V*` as an\
    \ update rule to update the values for different states. The equation computes\
    \ the expected value of the reward plus the discounted value of the next state,\
    \ given the current state and action. The maximum value of this expression over\
    \ all possible actions is used to update the value of the current state. This\
    \ process is repeated until the values of all states converge to their optimal\
    \ values.\n\n```\nV*(s) = max_a E[R_t + γ V*(S_{t+1}) | S_t = s, A_t = a]\n  \
    \    = max_a [R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) V*(s')], for all s ∈ S\n```\n\n\
    (3.5)\n\nHere, `s` represents the current state, `a` is an action, `R_t` is the\
    \ reward at time `t`, `γ` is the discount factor, `S_{t+1}` is the next state,\
    \ `P(s'|s, a)` is the probability of transitioning to state `s'` from state `s`\
    \ under action `a`, and `V*(s')` is the optimal value of the next state.\n\nThe\
    \ value iteration algorithm sweeps over all states in the state space, and for\
    \ each state, it uses Eq. (3.5) as an update rule to compute the estimated optimal\
    \ value for this state. This is done using the model (reward function and dynamics\
    \ function) of the environment. Once the current sweep is complete, the algorithm\
    \ repeats this process for all states until convergence to the true optimal state\
    \ value function `V*`.\n\nOnce we have `V*`, we can easily compute an optimal\
    \ policy `π*`. For each state in the state space, we select the action that yields\
    \ the highest value of its successor state. We then set the probability of selecting\
    \ this action to one and zero for all other actions. This process results in a\
    \ deterministic policy that will always select the action that leads to the highest\
    \ expected reward.\n\nIn summary, value iteration is an efficient algorithm for\
    \ finding the optimal policy in reinforcement learning. It combines policy evaluation\
    \ and policy improvement into a single step by computing the optimal state value\
    \ function directly using the Bellman optimality equation. Once the optimal state\
    \ value function is computed, it’s easy to determine the optimal policy by selecting\
    \ the action that leads to the highest expected reward for each state in the state\
    \ space.\n\nAlgorithm 6 shows the pseudocode for the value iteration algorithm,\
    \ which uses Eq. (3.5) as the value update rule. To illustrate the application\
    \ of the value iteration algorithm, we can use the example of the service dog\
    \ MDP. Applying the value iteration algorithm to the service dog MDP should yield\
    \ the same result as shown in Figs. 3.3 and 3.4. However, it should be noted that\
    \ the speedup of the value iteration algorithm over the policy iteration algorithm\
    \ may not be noticeable for this simple example. This could be due to the relatively\
    \ small number of states and actions in the problem or because the computational\
    \ complexity of the two algorithms is similar for this particular problem.\n\n\
    Algorithm 6: Value iteration, iterative algorithm\n\n![](images/605748_1_En_3_Chapter/605748_1_En_3_Figaaf_HTML.gif)\
    \ A 15-line algorithm titled value iteration, iterative algorithm takes in the\
    \ following inputs to give an optimal policy `π*` and optimal state value function\
    \ `V*` as the output. Discount rate `γ` and a small threshold `ε` determining\
    \ the accuracy of the estimation.\n\nDynamic programming is an effective approach\
    \ for solving MDPs when the state and action spaces are small enough to compute\
    \ the value function or the policy explicitly. However, for larger problems, other\
    \ methods such as Monte Carlo methods and temporal difference learning are more\
    \ practical."
  raw: '## 3.5 General Policy Iteration


    The policy iteration algorithm is a widely used and effective method in reinforcement
    learning. It is characterized by running policy evaluation and policy improvement
    processes concurrently. All policy iteration algorithms share this basic structure
    and concept, but we have the flexibility to modify the specific implementations
    of the policy evaluation and policy improvement steps.


    In policy iteration, we start with an initial policy, which is a mapping from
    states to actions. We then perform policy evaluation to estimate the value function
    for the policy. This involves iterating over the state space, computing the expected
    value of each state under the policy, and updating the value function accordingly.
    After policy evaluation, we perform policy improvement by constructing a new policy
    that is greedier than the old policy with respect to the value function. This
    new policy is obtained by choosing the action that maximizes the expected value
    of the next state, starting from the current state, and repeating this process
    until the end of the episode. The new policy is then used for the next round of
    policy evaluation, and the process is repeated until convergence.


    Algorithm 5: General policy iteration


    ![](images/605748_1_En_3_Chapter/605748_1_En_3_Figaae_HTML.gif) A 4-line algorithm
    titled general policy iteration takes in the following inputs to give an optimal
    policy pie after the search as the output. I = 0 and random policy pie to the
    zeroth power.


    Although dynamic programming is generally considered a model-based reinforcement
    learning method, policy iteration can be used for both model-based and model-free
    methods in practice. For model-based methods, the policy evaluation step involves
    computing the state transition probabilities and rewards from the model, while
    for model-free methods, these values are estimated from experience using Monte
    Carlo or TD methods, which we’ll discuss later in the book.


    ## 3.6 Value Iteration


    Value iteration is a powerful algorithm for finding the optimal policy in reinforcement
    learning. While policy iteration is effective, one downside is that it requires
    multiple iterations of policy evaluation and policy improvement to find the optimal
    policy ![$$\pi _*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq138.png)
    , which can be time-consuming and computationally expensive. Value iteration addresses
    this issue by combining policy evaluation and policy improvement into one step.


    To find the optimal policy, the value iteration algorithm computes the optimal
    state value function ![$$V_*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq139.png)
    directly instead of the estimated state value function ![$$V_\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq140.png)
    for an arbitrary policy ![$$\pi $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq141.png)
    . The optimal state value function ![$$V_*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq142.png)
    is the one that has the highest state values across the entire policy space.


    The value iteration algorithm uses the Bellman optimality equation for ![$$V_*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq143.png)
    as an update rule to update the values for different states. The equation computes
    the expected value of the reward plus the discounted value of the next state,
    given the current state and action. The maximum value of this expression over
    all possible actions is used to update the value of the current state. This process
    is repeated until the values of all states converge to their optimal values.


    ![$$\displaystyle \begin{aligned} V_*(s) &amp; =\max_{a}\mathbb{E}_{\,\!\!}\left[R_t
    + {\gamma} V_*(S_{t+1}) \;\Big|\; S_t=s, A_t=a\right] \notag \\ &amp; =\max_{a}
    \left[R(s, a) + {\gamma} \sum_{s'' \in \mathcal{S}} P(s''|s, a) V_*(s'') \right],
    \quad \mbox{for all}\; s \in \mathcal{S} {} \end{aligned} $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_Equ5.png)


    (3.5)


    Here, *s* represents the current state, *a* is an action, ![$$R_t$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq144.png)
    is the reward at time *t*, ![$${\gamma }$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq145.png)
    is the discount factor, ![$$S_{t+1}$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq146.png)
    is the next state, ![$$P(s''|s, a)$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq147.png)
    is the probability of transitioning to state ![$$s''$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq148.png)
    from state *s* under action *a*, and ![$$V_*(s'')$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq149.png)
    is the optimal value of the next state.


    The value iteration algorithm sweeps over all states in the state space, and for
    each state, it uses Eq. ([3.5](#605748_1_En_3_Chapter.xhtml#Equ5)) as an update
    rule to compute the estimated optimal value for this state. This is done using
    the model (reward function and dynamics function) of the environment. Once the
    current sweep is complete, the algorithm repeats this process for all states until
    convergence to the true optimal state value function ![$$V_*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq150.png)
    .


    Once we have ![$$V_*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq151.png)
    , we can easily compute an optimal policy ![$$\pi _*$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_IEq152.png)
    . For each state in the state space, we select the action that yields the highest
    value of its successor state. We then set the probability of selecting this action
    to one and zero for all other actions. This process results in a deterministic
    policy that will always select the action that leads to the highest expected reward.


    In summary, value iteration is an efficient algorithm for finding the optimal
    policy in reinforcement learning. It combines policy evaluation and policy improvement
    into a single step by computing the optimal state value function directly using
    the Bellman optimality equation. Once the optimal state value function is computed,
    it’s easy to determine the optimal policy by selecting the action that leads to
    the highest expected reward for each state in the state space.


    Algorithm 6 shows the pseudocode for the value iteration algorithm, which uses
    Eq. ([3.5](#605748_1_En_3_Chapter.xhtml#Equ5)) as the value update rule. To illustrate
    the application of the value iteration algorithm, we can use the example of the
    service dog MDP. Applying the value iteration algorithm to the service dog MDP
    should yield the same result as shown in Figs. [3.3](#605748_1_En_3_Chapter.xhtml#Fig3)
    and [3.4](#605748_1_En_3_Chapter.xhtml#Fig4). However, it should be noted that
    the speedup of the value iteration algorithm over the policy iteration algorithm
    may not be noticeable for this simple example. This could be due to the relatively
    small number of states and actions in the problem or because the computational
    complexity of the two algorithms is similar for this particular problem.


    Algorithm 6: Value iteration, iterative algorithm


    ![](images/605748_1_En_3_Chapter/605748_1_En_3_Figaaf_HTML.gif) A 15-line algorithm
    titled value iteration, iterative algorithm takes in the following inputs to give
    an optimal policy pie asterisk and optimal state value function V star as the
    output. Discount rate gamma and a small threshold epsilon determining the accuracy
    of the estimation.


    Dynamic programming is an effective approach for solving MDPs when the state and
    action spaces are small enough to compute the value function or the policy explicitly.
    However, for larger problems, other methods such as Monte Carlo methods and temporal
    difference learning are more practical.'
  trans: "\n# 3.5 通用策略迭代\n\n策略迭代算法是强化学习中一种广泛使用且有效的方法。其特点在于同时运行策略评估和策略改进过程。所有策略迭代算法都共享这一基本结构和概念，但我们可以灵活地修改策略评估和策略改进步骤的具体实现方式。\n\
    \n在策略迭代中，我们从一个初始策略开始，该策略是从状态到动作的映射。然后，我们执行策略评估来估计该策略的价值函数。这涉及遍历状态空间，计算每个状态在该策略下的期望价值，并相应地更新价值函数。策略评估之后，我们通过构建一个相对于价值函数比旧策略更贪婪的新策略来执行策略改进。这个新策略是通过选择能够最大化下一状态期望价值的动作获得的，从当前状态开始，并重复此过程直到回合结束。然后，新策略被用于下一轮策略评估，并重复此过程直至收敛。\n\
    \n算法 5：通用策略迭代\n\n![](img/605748_1_En_3_Figaae_HTML.gif) 一个 4 行算法，标题为通用策略迭代，接收以下输入，在搜索后输出最优策略\
    \ `pie`。`I = 0` 和随机策略 `pie` 的零次方。\n\n尽管动态规划通常被认为是一种基于模型的强化学习方法，但策略迭代在实践中既可用于基于模型的方法，也可用于无模型的方法。对于基于模型的方法，策略评估步骤涉及从模型中计算状态转移概率和奖励；而对于无模型的方法，这些值则通过蒙特卡洛或时序差分方法从经验中估计得出，我们将在本书后面讨论这些方法。\n\
    \n## 3.6 价值迭代\n\n价值迭代是一种在强化学习中寻找最优策略的强大算法。虽然策略迭代很有效，但其一个缺点是，要找到最优策略 `π*`，需要多次迭代策略评估和策略改进，这可能既耗时又计算成本高昂。价值迭代通过将策略评估和策略改进合并为一步来解决这个问题。\n\
    \n为了找到最优策略，价值迭代算法直接计算最优状态价值函数 `V*`，而不是针对任意策略 `π` 估计其状态价值函数 `Vπ`。最优状态价值函数 `V*`\
    \ 是在整个策略空间中具有最高状态价值的函数。\n\n价值迭代算法使用 `V*` 的贝尔曼最优方程作为更新规则来更新不同状态的价值。该方程计算在当前状态和动作下，奖励的期望值加上下一状态的折扣价值。在所有可能动作中，该表达式的最大值被用来更新当前状态的价值。重复此过程，直到所有状态的价值收敛到其最优值。\n\
    \n```\nV*(s) = max_a E[R_t + γ V*(S_{t+1}) | S_t = s, A_t = a]\n      = max_a\
    \ [R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) V*(s')], 对于所有 s ∈ S\n```\n\n(3.5)\n\n这里，`s`\
    \ 表示当前状态，`a` 是一个动作，`R_t` 是时间 `t` 的奖励，`γ` 是折扣因子，`S_{t+1}` 是下一状态，`P(s'|s, a)` 是在动作\
    \ `a` 下从状态 `s` 转移到状态 `s'` 的概率，`V*(s')` 是下一状态的最优价值。\n\n价值迭代算法扫描状态空间中的所有状态，对于每个状态，它使用公式\
    \ (3.5) 作为更新规则来计算该状态的估计最优价值。这是利用环境的模型（奖励函数和动态函数）完成的。一旦当前扫描完成，算法对所有状态重复此过程，直到收敛到真正的最优状态价值函数\
    \ `V*`。\n\n一旦我们有了 `V*`，就可以轻松计算出最优策略 `π*`。对于状态空间中的每个状态，我们选择能使其后继状态价值最高的动作。然后，我们将选择此动作的概率设为\
    \ 1，所有其他动作的概率设为 0。这个过程产生一个确定性策略，该策略将始终选择能带来最高期望奖励的动作。\n\n总之，价值迭代是一种在强化学习中寻找最优策略的高效算法。它通过直接使用贝尔曼最优方程计算最优状态价值函数，将策略评估和策略改进合并为一步。一旦计算出最优状态价值函数，通过为状态空间中的每个状态选择能带来最高期望奖励的动作，就可以很容易地确定最优策略。\n\
    \n算法 6 展示了价值迭代算法的伪代码，该算法使用公式 (3.5) 作为价值更新规则。为了说明价值迭代算法的应用，我们可以使用服务犬 MDP 的例子。将价值迭代算法应用于服务犬\
    \ MDP，应该会得到与图 3.3 和图 3.4 相同的结果。然而，需要注意的是，对于这个简单的例子，价值迭代算法相对于策略迭代算法的加速效果可能并不明显。这可能是由于问题中的状态和动作数量相对较少，或者因为对于这个特定问题，两种算法的计算复杂度相似。\n\
    \n算法 6：价值迭代，迭代算法\n\n![](img/605748_1_En_3_Figaaf_HTML.gif) 一个 15 行算法，标题为价值迭代，迭代算法，接收以下输入，输出最优策略\
    \ `π*` 和最优状态价值函数 `V*`。折扣率 `γ` 和决定估计精度的小阈值 `ε`。\n\n当状态和动作空间足够小，可以显式计算价值函数或策略时，动态规划是解决\
    \ MDP 的有效方法。然而，对于更大的问题，其他方法如蒙特卡洛方法和时序差分学习则更为实用。\n"
- fmt: "## 3.7 Summary\n\nThis chapter provided an overview of dynamic programming\
    \ (DP), a class of algorithms used to solve Markov decision processes (MDPs) by\
    \ decomposing complex problems into smaller subproblems that can be solved recursively.\
    \ We began by discussing how DP can be used to solve Markov reward processes (MRPs),\
    \ which involve computing the value function representing the expected cumulative\
    \ reward from a given state.\n\nNext, we focused on using DP to solve MDPs, covering\
    \ two fundamental steps: policy evaluation and policy improvement. Policy evaluation\
    \ computes the value function for a given policy, while policy improvement finds\
    \ a better policy based on the current value function. The policy iteration algorithm\
    \ alternates between these steps until convergence, but it can be computationally\
    \ expensive due to multiple iterations of both steps. The general policy iteration\
    \ algorithm is a more flexible version that allows for varying levels of effort\
    \ between policy evaluation and policy improvement, making it more practical.\n\
    \nWe then introduced the value iteration algorithm, which combines policy evaluation\
    \ and policy improvement into a single step. Value iteration is computationally\
    \ efficient and can converge to the optimal policy in a finite number of iterations.\n\
    \nIn the next chapter, we will introduce Monte Carlo methods as an alternative\
    \ approach to solving MDPs, which does not require explicit knowledge of the model\
    \ (reward function and dynamics function) of the environment.\n\n# 4. Monte Carlo\
    \ Methods\n\nIn Chap. [3](#605748_1_En_3_Chapter.xhtml), we introduced dynamic\
    \ programming (DP) algorithms [[1](#605748_1_En_4_Chapter.xhtml#CR1)] that can\
    \ help the agent find the optimal value functions `V_*` and `Q_*` for small MDPs;\
    \ that’s when the state and action spaces are small enough to compute the value\
    \ function or the policy explicitly. DP algorithms assume the agent has access\
    \ to the perfect model (reward function and dynamics function) of the environment,\
    \ making them model-based reinforcement learning methods. However, in most real-world\
    \ reinforcement learning problems, the true model of the environment is unknown\
    \ to the agent, and the state or action spaces might be very big. In this chapter,\
    \ we will introduce Monte Carlo methods [[2](#605748_1_En_4_Chapter.xhtml#CR2)],\
    \ which are model-free reinforcement learning algorithms that use the agent’s\
    \ experience to estimate value functions.\n\nThe term Monte Carlo refers to the\
    \ method of using experience to estimate value functions by averaging sample returns.\
    \ Monte Carlo methods utilize sequences of state-action-reward samples, and the\
    \ agent often interacts with a simulated environment to generate these samples\
    \ (or it can use historical samples). The environment only needs to support basic\
    \ interactions, such as generating successor states and reward signals when the\
    \ agent takes an action in the environment. Unlike DP methods, Monte Carlo methods\
    \ do not require the environment to provide all possible successor states and\
    \ state transition probabilities. However, Monte Carlo methods can only be used\
    \ to solve episodic reinforcement learning problems since they average returns\
    \ based on complete episode sequences. The general policy iteration algorithm\
    \ we introduced in Chap. [3](#605748_1_En_3_Chapter.xhtml) also applies to Monte\
    \ Carlo methods.\n\nIn summary, this chapter will introduce Monte Carlo methods\
    \ for model-free reinforcement learning. These methods use the agent’s experience\
    \ to estimate value functions without requiring a model of the environment. While\
    \ they do not assume the Markov property, Monte Carlo methods can only be used\
    \ to solve episodic reinforcement learning problems.\n\n![](images/605748_1_En_4_Chapter/605748_1_En_4_Fig1_HTML.png)\n\
    \nA nodal map flows as follows. `S0`, `S1` via `A0`, `S2` via `A1`, `S_T-1`, and\
    \ `S_T` via `A_T-1`. `S1`, `S2`, `S_T-1`, and `S_T` nodes are labeled `R0`, `R1`,\
    \ `R_T-2`, and `R_T-1`, respectively. All the nodes are also labeled with their\
    \ `G` value equations.\n\n**Fig. 4.1** The idea of Monte Carlo policy evaluation\
    \ that estimates state values for a single episode sequence\n\n## 4.1 Monte Carlo\
    \ Policy Evaluation\n\nAs a reminder, policy evaluation aims to estimate the state\
    \ value function for a given policy `π`. Like in dynamic programming, we start\
    \ with Monte Carlo policy evaluation (prediction). However, since Monte Carlo\
    \ is a model-free reinforcement learning method, we cannot use the model of the\
    \ environment and the Bellman equation as an update rule to iteratively compute\
    \ the values. So, how can we compute the state values when using the Monte Carlo\
    \ method?\n\nLet’s revisit the definition of the state value function `V_π`, which\
    \ measures the expected return starting from state `s`, then following the policy\
    \ `π`, as shown in Eq. ([4.1](#605748_1_En_4_Chapter.xhtml#Equ1)).\n\n```\nV_π(s)\
    \ = E_π[G_t | S_t = s]\n       = E_π[R_t + γ R_{t+1} + γ^2 R_{t+2} + ... | S_t\
    \ = s]\n       = E_π[R_t + γ G_{t+1} | S_t = s]\n```\n\n(4.1)\n\nGiven a sequence\
    \ of state-action-reward pairs `S0, A0, R0, S1, A1, R1, ..., S_{T-1}, A_{T-1},\
    \ R_{T-1}, S_T` generated by an agent following policy `π`, we can compute the\
    \ discounted cumulative reward from any time step `t` to the end of the episode\
    \ using the formula `G_t = R_t + γ G_{t+1}` as shown in Fig. [4.1](#605748_1_En_4_Chapter.xhtml#Fig1).\
    \ The expected value of this sequence starting from state `s` can be estimated\
    \ using Monte Carlo policy evaluation, which involves averaging the returns from\
    \ a large number of sample episodes. This yields an estimate of the state value\
    \ function `V_π`.\n\nIn Monte Carlo policy evaluation, the agent learns from its\
    \ own experience. It collects a large number of sample episodes while following\
    \ the policy `π` and averages the returns for the corresponding environment states\
    \ in these sample episodes. As the number of samples increases, the averaged values\
    \ will converge to the true state value `V_π`. However, it’s often the case that\
    \ the agent only visits a few states in a single episode when following the policy\
    \ `π`. Therefore, we often need to run the algorithm over a large number of episodes\
    \ to obtain an accurate estimate of `V_π`. By the law of large numbers, as the\
    \ total visits to a particular state `s` become infinite, the estimated state\
    \ value `V_π(s)` also converges to the true value when following policy `π`. But\
    \ in practice, we often need to stop the evaluation process in a much shorter\
    \ time frame."
  raw: '## 3.7 Summary


    This chapter provided an overview of dynamic programming (DP), a class of algorithms
    used to solve Markov decision processes (MDPs) by decomposing complex problems
    into smaller subproblems that can be solved recursively. We began by discussing
    how DP can be used to solve Markov reward processes (MRPs), which involve computing
    the value function representing the expected cumulative reward from a given state.


    Next, we focused on using DP to solve MDPs, covering two fundamental steps: policy
    evaluation and policy improvement. Policy evaluation computes the value function
    for a given policy, while policy improvement finds a better policy based on the
    current value function. The policy iteration algorithm alternates between these
    steps until convergence, but it can be computationally expensive due to multiple
    iterations of both steps. The general policy iteration algorithm is a more flexible
    version that allows for varying levels of effort between policy evaluation and
    policy improvement, making it more practical.


    We then introduced the value iteration algorithm, which combines policy evaluation
    and policy improvement into a single step. Value iteration is computationally
    efficient and can converge to the optimal policy in a finite number of iterations.


    In the next chapter, we will introduce Monte Carlo methods as an alternative approach
    to solving MDPs, which does not require explicit knowledge of the model (reward
    function and dynamics function) of the environment.


    # 4. Monte Carlo Methods


    In Chap. [3](#605748_1_En_3_Chapter.xhtml), we introduced dynamic programming
    (DP) algorithms [[1](#605748_1_En_4_Chapter.xhtml#CR1)] that can help the agent
    find the optimal value functions ![$$V_*$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq3.png)
    and ![$$Q_*$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq4.png)
    for small MDPs; that’s when the state and action spaces are small enough to compute
    the value function or the policy explicitly. DP algorithms assume the agent has
    access to the perfect model (reward function and dynamics function) of the environment,
    making them model-based reinforcement learning methods. However, in most real-world
    reinforcement learning problems, the true model of the environment is unknown
    to the agent, and the state or action spaces might be very big. In this chapter,
    we will introduce Monte Carlo methods [[2](#605748_1_En_4_Chapter.xhtml#CR2)],
    which are model-free reinforcement learning algorithms that use the agent’s experience
    to estimate value functions.


    The term Monte Carlo refers to the method of using experience to estimate value
    functions by averaging sample returns. Monte Carlo methods utilize sequences of
    state-action-reward samples, and the agent often interacts with a simulated environment
    to generate these samples (or it can use historical samples). The environment
    only needs to support basic interactions, such as generating successor states
    and reward signals when the agent takes an action in the environment. Unlike DP
    methods, Monte Carlo methods do not require the environment to provide all possible
    successor states and state transition probabilities. However, Monte Carlo methods
    can only be used to solve episodic reinforcement learning problems since they
    average returns based on complete episode sequences. The general policy iteration
    algorithm we introduced in Chap. [3](#605748_1_En_3_Chapter.xhtml) also applies
    to Monte Carlo methods.


    In summary, this chapter will introduce Monte Carlo methods for model-free reinforcement
    learning. These methods use the agent’s experience to estimate value functions
    without requiring a model of the environment. While they do not assume the Markov
    property, Monte Carlo methods can only be used to solve episodic reinforcement
    learning problems.


    ![](images/605748_1_En_4_Chapter/605748_1_En_4_Fig1_HTML.png)


    A nodal map flows as follows. S 0, S 1 via A 0, S 2 via A 1, S T minus 1, and
    S T via A T minus 1\. S 1, S 2, S T minus 1, and S T nodes are labeled R 0, R
    1, R T minus 2, and R T minus 1, respectively. All the nodes are also labeled
    with their G value equations.


    Fig. 4.1


    The idea of Monte Carlo policy evaluation that estimates state values for a single
    episode sequence


    ## 4.1 Monte Carlo Policy Evaluation


    As a reminder, policy evaluation aims to estimate the state value function for
    a given policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq5.png)
    . Like in dynamic programming, we start with Monte Carlo policy evaluation (prediction).
    However, since Monte Carlo is a model-free reinforcement learning method, we cannot
    use the model of the environment and the Bellman equation as an update rule to
    iteratively compute the values. So, how can we compute the state values when using
    the Monte Carlo method?


    Let’s revisit the definition of the state value function ![$$V_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq6.png)
    , which measures the expected return starting from state *s*, then following the
    policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq7.png)
    , as shown in Eq. ([4.1](#605748_1_En_4_Chapter.xhtml#Equ1)).


    ![$$\displaystyle \begin{aligned} \begin{aligned}[b] V_\pi(s) &amp; =\mathbb{E}_{\pi\!\!}\left[G_t
    \;\Big|\; S_t=s\right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t + {\gamma} R_{t+1}
    + {\gamma}^2 R_{t+2} + \cdots\;\Big|\; S_t=s\right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} G_{t+1} \;\Big|\; S_t=s\right] \end{aligned} {} \end{aligned} $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_Equ1.png)


    (4.1)


    Given a sequence of state-action-reward pairs ![$$S_0, A_0, R_0, S_1, A_1, R_1,
    \cdots , S_{T-1}, A_{T-1}, R_{T-1}, S_T$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq8.png)
    generated by an agent following policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq9.png)
    , we can compute the discounted cumulative reward from any time step *t* to the
    end of the episode using the formula ![$$G_t=R_t + {\gamma } G_{t+1}$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq10.png)
    as shown in Fig. [4.1](#605748_1_En_4_Chapter.xhtml#Fig1). The expected value
    of this sequence starting from state *s* can be estimated using Monte Carlo policy
    evaluation, which involves averaging the returns from a large number of sample
    episodes. This yields an estimate of the state value function ![$$V_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq11.png)
    .


    In Monte Carlo policy evaluation, the agent learns from its own experience. It
    collects a large number of sample episodes while following the policy ![$$\pi
    $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq12.png) and averages
    the returns for the corresponding environment states in these sample episodes.
    As the number of samples increases, the averaged values will converge to the true
    state value ![$$V_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq13.png)
    . However, it’s often the case that the agent only visits a few states in a single
    episode when following the policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq14.png)
    . Therefore, we often need to run the algorithm over a large number of episodes
    to obtain an accurate estimate of ![$$V_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq15.png)
    . By the law of large numbers, as the total visits to a particular state *s* become
    infinite, the estimated state value ![$$V_\pi (s)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq16.png)
    also converges to the true value when following policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq17.png)
    . But in practice, we often need to stop the evaluation process in a much shorter
    time frame.'
  trans: "\n## 3.7 本章小结\n\n本章概述了动态规划（DP），这是一类通过将复杂问题分解为可递归求解的较小子问题来解决马尔可夫决策过程（MDP）的算法。我们首先讨论了如何利用动态规划求解马尔可夫奖励过程（MRP），这涉及计算表示从给定状态出发的期望累积奖励的价值函数。\n\
    \n接着，我们重点讨论了如何利用动态规划求解 MDP，涵盖了策略评估和策略改进这两个基本步骤。策略评估计算给定策略下的价值函数，而策略改进则基于当前价值函数寻找更优的策略。策略迭代算法在这两个步骤之间交替进行直至收敛，但由于两个步骤都需要多次迭代，计算成本可能很高。通用策略迭代算法是一种更灵活的版本，允许在策略评估和策略改进之间投入不同程度的精力，因此更具实用性。\n\
    \n随后，我们介绍了价值迭代算法，它将策略评估和策略改进合并为单一步骤。价值迭代计算效率高，并且能在有限次迭代内收敛到最优策略。\n\n在下一章中，我们将介绍蒙特卡洛方法，作为求解\
    \ MDP 的另一种方法，它不需要显式了解环境模型（奖励函数和动态函数）。\n\n# 4. 蒙特卡洛方法\n\n在第 3 章中，我们介绍了动态规划（DP）算法[1]，这些算法能帮助智能体为小型\
    \ MDP 找到最优价值函数`V_*`和`Q_*`；这适用于状态空间和动作空间足够小，可以显式计算价值函数或策略的情况。DP 算法假设智能体能够访问环境的完美模型（奖励函数和动态函数），因此它们属于基于模型的强化学习方法。然而，在大多数现实世界的强化学习问题中，环境的真实模型对智能体来说是未知的，并且状态或动作空间可能非常大。在本章中，我们将介绍蒙特卡洛方法[2]，这是一种无模型的强化学习算法，它利用智能体的经验来估计价值函数。\n\
    \n术语“蒙特卡洛”指的是通过平均样本回报来利用经验估计价值函数的方法。蒙特卡洛方法利用状态-动作-奖励样本序列，智能体通常通过与模拟环境交互来生成这些样本（也可以使用历史样本）。环境只需支持基本交互，例如当智能体在环境中执行动作时，生成后续状态和奖励信号。与\
    \ DP 方法不同，蒙特卡洛方法不要求环境提供所有可能的后续状态和状态转移概率。然而，蒙特卡洛方法只能用于解决回合制强化学习问题，因为它基于完整的回合序列来平均回报。我们在第\
    \ 3 章中介绍的通用策略迭代算法同样适用于蒙特卡洛方法。\n\n总之，本章将介绍用于无模型强化学习的蒙特卡洛方法。这些方法利用智能体的经验来估计价值函数，无需环境模型。虽然它们不假设马尔可夫性质，但蒙特卡洛方法只能用于解决回合制强化学习问题。\n\
    \n![](img/605748_1_En_4_Fig1_HTML.png)\n\n一个节点图流程如下：`S0`，`S1`通过`A0`，`S2`通过`A1`，`S_T-1`，以及`S_T`通过`A_T-1`。`S1`、`S2`、`S_T-1`和`S_T`节点分别标记为`R0`、`R1`、`R_T-2`和`R_T-1`。所有节点还标有其`G`值方程。\n\
    \n**图 4.1** 蒙特卡洛策略评估的思想，用于估计单个回合序列的状态价值\n\n## 4.1 蒙特卡洛策略评估\n\n提醒一下，策略评估的目标是估计给定策略`π`下的状态价值函数。与动态规划类似，我们从蒙特卡洛策略评估（预测）开始。然而，由于蒙特卡洛是一种无模型的强化学习方法，我们无法使用环境模型和贝尔曼方程作为更新规则来迭代计算价值。那么，在使用蒙特卡洛方法时，我们如何计算状态价值呢？\n\
    \n让我们重新审视状态价值函数`V_π`的定义，它衡量从状态`s`出发，然后遵循策略`π`的期望回报，如公式（4.1）所示。\n\n```\nV_π(s)\
    \ = E_π[G_t | S_t = s]\n       = E_π[R_t + γ R_{t+1} + γ² R_{t+2} + ... | S_t\
    \ = s]\n       = E_π[R_t + γ G_{t+1} | S_t = s]\n```\n\n(4.1)\n\n给定一个由遵循策略`π`的智能体生成的状态-动作-奖励序列`S0,\
    \ A0, R0, S1, A1, R1, ..., S_{T-1}, A_{T-1}, R_{T-1}, S_T`，我们可以使用公式`G_t = R_t\
    \ + γ G_{t+1}`计算从任意时间步`t`到回合结束的折现累积奖励，如图 4.1 所示。从状态`s`开始的该序列的期望值可以通过蒙特卡洛策略评估来估计，这涉及对大量样本回合的回报进行平均。这便得到了状态价值函数`V_π`的估计值。\n\
    \n在蒙特卡洛策略评估中，智能体从自身的经验中学习。它在遵循策略`π`的同时收集大量样本回合，并对这些样本回合中相应环境状态的回报进行平均。随着样本数量的增加，平均后的价值将收敛到真实的状态价值`V_π`。然而，在遵循策略`π`时，智能体在单个回合中通常只访问少数几个状态。因此，我们通常需要运行算法大量回合，才能获得`V_π`的准确估计。根据大数定律，当对特定状态`s`的总访问次数趋于无穷时，遵循策略`π`下的估计状态价值`V_π(s)`也会收敛到真实值。但在实践中，我们通常需要在更短的时间内停止评估过程。\n"
- fmt: 'In summary, Monte Carlo policy evaluation is a model-free method that estimates
    the state value function for a given policy by collecting a large number of sample
    episodes and averaging the returns for the corresponding environment states. The
    agent learns from its own experience and does not require a model of the environment
    or the Bellman equation to estimate the state values. However, the algorithm often
    requires a large number of episodes to get an accurate estimate of `V_π` since
    the agent may only visit a few states in a single episode. Monte Carlo policy
    evaluation is typically used to solve episodic reinforcement learning problems,
    where the process terminates after a finite number of steps.


    ### First-Visit Monte Carlo Policy Evaluation


    In the previous section, we discussed the basic idea behind Monte Carlo policy
    evaluation: we generate a large number of sample episodes by following the policy
    `π` and use these episodes to estimate the state value function `V_π(s)`.


    The first-visit Monte Carlo policy evaluation algorithm, shown in Algorithm 1,
    is a specific implementation of this idea. For each episode, we compute the returns
    `G_0, G_1, G_2, ..., G_{T-1}` for every time step `t = 0, 1, 2, ..., T-1` of the
    episode, where `T` is the time step at which the episode terminates. We then go
    through the states `S_0, S_1, S_2, ..., S_{T-1}` in the episode and update our
    estimates of the state value function for each state.


    To update our estimate for a state `S_t`, we check whether this is the first time
    we have visited this state in the current episode (hence the name "first-visit"
    Monte Carlo). If it is, we update two quantities: the total return `G(S_t)`, which
    is the sum of the returns `G_t` for all visits to `S_t` across episodes, and the
    visit count `N(S_t)`, which is the number of times we have visited `S_t` across
    episodes. We can then compute the average return for state `S_t` as `Ḡ(S_t) =
    G(S_t) / N(S_t)`.


    At the end of each episode, we update our estimate of the state value function
    for each state by taking the average of the returns we have observed in all episodes
    that have visited that state. This process continues for a fixed number of episodes.
    One drawback of this method is that we must manually choose the number of episodes
    to run, and the estimates may not be accurate if the number is too small.


    Algorithm 1: First-visit Monte Carlo policy evaluation for `V[π]`


    ![](images/605748_1_En_4_Chapter/605748_1_En_4_Figaaa_HTML.gif) A 9-line algorithm
    titled first-visit Monte Carlo policy evaluation for `V_π` takes the following
    inputs and gives an estimated state value function `V_π` for the input policy
    `π` as the output. Policy `π` to be evaluated, discount rate `γ`, and number of
    episodes `K`.


    In summary, the first-visit Monte Carlo policy evaluation algorithm provides a
    way to estimate the state value function for a given policy by generating a large
    number of sample episodes and using them to compute average returns for each state.
    While this method has some limitations, it is a useful tool for understanding
    the behavior of reinforcement learning algorithms and can be applied to a wide
    range of problems.


    ### First-Visit vs. Every-Visit


    Monte Carlo policy evaluation is an algorithm for estimating the state value function
    for a given policy using simulated experience. One important decision that must
    be made when implementing this algorithm is whether to use a first-visit or every-visit
    approach.


    In the context of Monte Carlo policy evaluation, the term "visit" refers to a
    time when the agent enters a state during an episode. Since an episode can involve
    multiple visits to the same state, it is important to decide how to handle these
    repeated visits in the evaluation process.


    In first-visit Monte Carlo policy evaluation, the algorithm considers only the
    first time a state is visited during an episode when calculating the state''s
    value. All subsequent visits to the same state in the current episode are ignored.
    For example, suppose an agent navigates through a maze environment and visits
    state `s` multiple times during an episode. The first-visit approach would only
    consider the return obtained after the first visit to state `s` while ignoring
    all subsequent visits to the same state `s` in the current episode.


    On the other hand, every-visit Monte Carlo policy evaluation updates the value
    of a state every time it is visited during an episode. Continuing with the maze
    example, if the agent visits state `s` ten times during an episode, the every-visit
    approach would update the state''s value function with the returns obtained after
    each of the ten visits.


    There are some important differences between the two approaches. The first-visit
    approach is unbiased, meaning that the expected value of the estimated state value
    function converges to the true value as the number of episodes approaches infinity.
    However, the every-visit approach can have lower variance, meaning that the estimated
    values are less likely to be far from the true values.


    In practice, the choice of whether to use a first-visit or every-visit approach
    will depend on the specific problem being solved and the desired trade-off between
    bias and variance. In some cases, it may be necessary to use a hybrid approach
    that combines both methods.


    Overall, the choice between first-visit and every-visit Monte Carlo policy evaluation
    depends on the specific problem and the desired trade-off between bias and variance.
    The first-visit approach is unbiased but can have higher variance, while the every-visit
    approach can have lower variance but may be biased. Hybrid approaches that combine
    both methods can be used to strike a balance between bias and variance.'
  raw: 'In summary, Monte Carlo policy evaluation is a model-free method that estimates
    the state value function for a given policy by collecting a large number of sample
    episodes and averaging the returns for the corresponding environment states. The
    agent learns from its own experience and does not require a model of the environment
    or the Bellman equation to estimate the state values. However, the algorithm often
    requires a large number of episodes to get an accurate estimate of ![$$V_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq18.png)
    since the agent may only visit a few states in a single episode. Monte Carlo policy
    evaluation is typically used to solve episodic reinforcement learning problems,
    where the process terminates after a finite number of steps.


    ### First-Visit Monte Carlo Policy Evaluation


    In the previous section, we discussed the basic idea behind Monte Carlo policy
    evaluation: we generate a large number of sample episodes by following the policy
    ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq19.png)
    and use these episodes to estimate the state value function ![$$V_\pi (s)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq20.png)
    .


    The first-visit Monte Carlo policy evaluation algorithm, shown in Algorithm 1,
    is a specific implementation of this idea. For each episode, we compute the returns
    ![$$G_0, G_1, G_2, \ldots , G_{T-1}$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq21.png)
    for every time step ![$$t=0, 1, 2, \ldots , T-1$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq22.png)
    of the episode, where *T* is the time step at which the episode terminates. We
    then go through the states ![$$S_0, S_1, S_2, \ldots , S_{T-1}$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq23.png)
    in the episode and update our estimates of the state value function for each state.


    To update our estimate for a state ![$$S_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq24.png)
    , we check whether this is the first time we have visited this state in the current
    episode (hence the name “first-visit” Monte Carlo). If it is, we update two quantities:
    the total return ![$$G(S_t)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq25.png)
    , which is the sum of the returns ![$$G_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq26.png)
    for all visits to ![$$S_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq27.png)
    across episodes, and the visit count ![$$N(S_t)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq28.png)
    , which is the number of times we have visited ![$$S_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq29.png)
    across episodes. We can then compute the average return for state ![$$S_t$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq30.png)
    as ![$$\overline {G}(S_t) = G(S_t) / N(S_t)$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq31.png)
    .


