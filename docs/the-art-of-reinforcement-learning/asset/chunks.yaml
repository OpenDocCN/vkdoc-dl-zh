    # 注意


    请注意，本示例针对非常简单的强化学习问题而设计。在实践中，架构可以更加复杂，包含多层结构、跳跃连接以及其他先进技术，以提升强化学习智能体的性能。因此，应根据问题的具体需求和可用资源，仔细考虑为策略网络选择合适的架构。


    ![](img/605748_1_En_9_Fig2_HTML.png)


    神经网络架构的流程图如下所示：输入数据，经过 64 个单元，再通过`ReLU`连接至 64 个单元，再通过`ReLU`连接至 64 个单元，再通过`ReLU`连接至`N`个单元，最后通过`Softmax`输出动作概率。


    **图 9.2** 策略网络神经网络架构的简单示例


    ## 9.4 带基线的 REINFORCE 算法


    我们在上一节介绍的 REINFORCE 算法在训练过程中可能存在高方差问题，这会导致算法运行缓慢且效率低下。方差产生的原因是算法使用蒙特卡洛方法来估计回报，而不同回合之间的回报可能差异显著。为了解决这个问题，我们可以引入一个基线值
    `b(s)`，将其从估计回报中减去，以降低方差。


    基线值 `b(s)` 可以是任何不依赖于动作的函数。例如，我们可以使用一个常数或状态 `s` 的函数。通过从估计回报中减去基线值，我们可以减少奖励信号中随机波动的影响。


    带基线函数 `b(s)` 的 REINFORCE 算法的参数更新规则为：


    ```

    θ = θ + α γ^t ( G_t - b(s_t) ) ∇_θ log π(a_t|s_t; θ)

    ```


    (9.17)


    该公式也被称为*原始策略梯度算法*的参数更新规则。我们可以用任何适合降低方差的函数来替换 `b(s_t)`。


    基线函数的一个常见选择是状态价值函数 `V_{π_θ}(s_t)`，它衡量的是从状态 `s_t` 出发，遵循策略 `π_θ` 时的期望回报。在实践中，我们通常使用本书第二部分介绍的价值函数近似方法来学习
    `V_{π_θ}(s_t)` 的估计值。这涉及使用函数逼近器（如神经网络）来最小化样本回报与估计值之间的平方误差损失。使用状态价值函数作为基线有助于降低方差，因为它捕捉了当前状态的期望回报。


    需要注意的是，使用基线值并非万能之策，有时可能导致有偏估计。这是因为我们从估计回报中减去的是一个固定值，如果基线值选择不当，可能会引入系统性误差。因此，必须针对当前问题选择合适的基线函数，并仔细评估其有效性。


    总之，在 REINFORCE 算法中引入基线值有助于降低训练过程中的噪声和方差，从而使算法更加高效和有效。通过选择合适的基线函数，我们可以进一步提升算法的性能。然而，使用基线值需要仔细斟酌和实验，以确保不会引入偏差或其他问题。

    '
- fmt: '# Algorithm 1: REINFORCE with Baseline (Linear VFA)


    Algorithm 1 presents the pseudocode for the REINFORCE algorithm with a state value
    function as the baseline, where we use linear value function approximation for
    the baseline function. During training, the agent learns a parameterized policy
    function and a parameterized value function simultaneously. It is important to
    note that using different learning rates for these two tasks is beneficial, as
    their natures are fundamentally different. Therefore, we use separate learning
    rates `α` for the policy and `β` for the baseline function.


    **Algorithm 2: REINFORCE with baseline [linear-VFA]**


    ![](images/605748_1_En_9_Chapter/605748_1_En_9_Figaab_HTML.gif)


    An 8-line algorithm takes in the following inputs to give an approximated optimal
    policy `θ*` as the output: discount rate `γ`, learning rate `α` for policy, learning
    rate `β` for baseline function, and number of episodes `K`.


    In practical applications, we often use neural networks to approximate the policy
    and baseline functions. Here, we use `θ` to denote the parameters of the policy
    and use `ψ` to denote the parameters for the baseline function. In this case,
    we compute the squared error loss `(G_t - V̂(s_t; ψ))²` between the sample return
    `G_t` and the estimated value for the baseline network, and the negative log-likelihood
    loss `-log π(a_t|s_t; θ)` for the policy network. It is important to accumulate
    gradients over a sequence of time steps when using neural networks, rather than
    updating the parameters on a step-by-step basis. We can then use a neural network
    optimizer, such as stochastic gradient descent (SGD) or Adam, to update the parameters
    based on the accumulated gradients.


    Overall, using a parameterized policy and value function and leveraging neural
    networks to approximate them can lead to more efficient and effective reinforcement
    learning algorithms.


    Figure 9.3 shows the performance of the REINFORCE algorithm with and without baseline
    on the cart pole classic control task. Performance is measured in terms of the
    average reward obtained. To evaluate the agent’s performance, we ran 20,000 evaluation
    steps on a separate testing environment at the end of each training iteration,
    which consisted of 20,000 training steps. The results were averaged over five
    independent runs and smoothed using a moving average with a window size of five.


    ![](images/605748_1_En_9_Chapter/605748_1_En_9_Fig3_HTML.png)


    A line graph of evaluation episode return versus training environment steps. It
    plots concave-down increasing curves with minor fluctuations for REINFORCE and
    REINFORCE with baseline. A line is parallel to the horizontal axis for maximum
    that starts from 500 on the vertical axis.


    **Fig. 9.3** REINFORCE with and without baseline on the cart pole control task.
    The results were averaged over five independent runs. We use the same discount
    rate `γ = 0.99`, learning rate `α = 0.0002` for the policy neural network for
    these two agents, and `β = 0.0005` for the baseline network.


    **Algorithm 3: REINFORCE with baseline [using neural networks]**


    ![](images/605748_1_En_9_Chapter/605748_1_En_9_Figaac_HTML.gif)


    A 10-line algorithm titled "REINFORCE with baseline" takes in the following inputs
    to give an approximated optimal policy `θ*` as the output: discount rate `γ`,
    learning rate `α` for policy, learning rate `β` for baseline function, and number
    of episodes `K`.


    In this experiment, we used a very simple neural network architecture consisting
    of fully connected neural networks with two hidden layers. Each hidden layer has
    64 units and is followed by a ReLU activation function. The output of each hidden
    layer is then fed to the final output layer, where we use a softmax activation
    function for policy and no activation function for baseline. This simple architecture
    was chosen to keep the focus on the reinforcement learning algorithm and to reduce
    computational requirements.


    For both agents, we use the same discount rate of `γ = 0.99` and a learning rate
    of `α = 0.0002` for the policy neural network. We also use a learning rate of
    `β = 0.0005` for the baseline network. We trained the neural networks using the
    Adam optimizer.


    The values for these hyper-parameters were chosen based on prior experiments and
    may not represent the best ones for the specific tasks.'
