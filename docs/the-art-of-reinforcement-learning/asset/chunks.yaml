  trans: "\n# TD(0)策略评估\n\n`TD(0)`策略评估算法是一种用于估计固定策略`π`的状态-动作价值函数`Q_π`的方法。算法 2 展示了该算法的伪代码。\n\
    \n**算法 2：** 针对`Q[π]`的时序差分[TD(0)]策略评估\n\n![](img/605748_1_En_5_Figaab_HTML.gif)\n\
    \n一个用于计算时序差分`TD(0)`及`Q_π`策略评估的 10 行算法，接收以下输入，输出针对输入策略`π`的估计状态-动作价值函数`Q_π`：待评估的策略`π`、折扣率`γ`、步长`α`以及步数`K`。\n\
    \n在该算法中，我们将所有状态-动作对的状态-动作价值函数`Q_π`初始化为 0。然后，我们使用策略`π`运行回合，并根据获得的奖励和预期的未来奖励更新状态-动作价值函数。我们重复此过程，直到算法收敛。\n\
    \n图 5.2 展示了针对服务犬 MDP 的随机策略计算出的状态-动作价值。结果基于 100 次独立运行的平均值；每次运行包含 20,000 次更新。我们使用折扣率`γ\
    \ = 0.9`，步长`α = 0.01`。这些值与我们在第 4 章中使用蒙特卡洛策略评估计算出的值非常接近，如图 4.3 所示。\n\n![](img/605748_1_En_5_Fig2_HTML.png)\n\
    \n一个流程图计算了服务犬 MDP 的状态-动作价值。流程经过房间 1、2 和 3，最终到达已找到物品。房间 3 返回房间 2，房间 2 返回房间 1。房间\
    \ 2 通过`r = 0`指向外部，外部通过`r = 0`返回房间 2。外部通过`r = -1`指向自身。折扣率`γ = 0.9`。\n\n**图 5.2**\
    \ 使用`TD(0)`策略评估针对服务犬 MDP 的随机策略计算出的状态-动作价值。结果基于 100 次运行的平均值；每次运行包含 2000 次更新。在此实验中，我们使用折扣率`γ\
    \ = 0.9`和步长`α = 0.01`。\n\n## 5.3 用于探索的简化`ε`-贪心策略\n\n在执行 TD 策略评估之后，下一步是将算法扩展到 TD\
    \ 控制（或策略改进）。与蒙特卡洛方法一样，TD 学习是一种无模型强化学习方法，面临着平衡探索与利用的挑战。在第 4 章中，我们引入了`ε`-贪心策略，以帮助智能体在使用蒙特卡洛方法时进行探索。我们也可以将相同的`ε`-贪心策略用于\
    \ TD 学习方法，通过使用公式(5.6)更新不同动作的策略概率分布。\n\n```\nπ(a|s) = \n  case\n    a = argmax_a\
    \ Q_π(s, a):  1 - ε + ε / |A(s)|\n    a ≠ argmax_a Q_π(s, a):  ε / |A(s)|\n```\n\
    \n(5.6)\n\n回顾一下，`ε`-贪心策略源自状态-动作价值函数`Q_π`，并使用公式(5.6)更新不同动作的策略概率分布。`ε`-贪心策略本质上是随机策略和确定性策略的组合。以概率`ε`，策略随机行动；而以概率`1\
    \ - ε`，策略根据`Q_π`贪心地行动。\n\n值得注意的是，`Q_π`的值在 TD 策略评估中会不断更新，即每个时间步都会更新。因此，`ε`-贪心策略中的“确定性策略”部分也会不时更新。然而，在实践中，我们通常使用一种更简单、更高效的方法来创建`ε`-贪心策略，该方法无需更新`π`的策略概率分布。\n"
- fmt: 'Instead, we can create a proxy function over `Q_π` to construct the `ε`-greedy
    policy. When the agent follows this `ε`-greedy policy and needs to make a decision
    in the environment, with probability `ε`, this proxy function returns an action
    that is sampled uniformly for the specific state, and with probability `1-ε`,
    it returns the best action according to `Q_π` for this state. This simplified
    version of the `ε`-greedy policy is more robust, especially when dealing with
    large-scale MDPs, as we will discuss in Part II of this book.


    To do so, we create a proxy function over `Q_π` to construct the `ε`-greedy policy,
    as shown in Algorithm 3. When the agent follows this `ε`-greedy policy and needs
    to make a decision in the environment, with probability `ε`, this proxy function
    returns an action that is sampled uniformly for the specific state, and with probability
    `1-ε`, it returns the best action according to `Q_π` for this state.


    Algorithm 3: A simplified *ε*-greedy policy over *Q*[*π*]


    ```

    An 8-line algorithm to compute a simplified epsilon minus greedy policy over Q
    pie uses the if else statements and returns a, P a. The algorithm takes the following
    inputs. Q state-action value function, epsilon exploration rate, S t environment
    state.

    ```


    Thus, there is no need for the additional step to specifically improve the policy,
    because there is no such policy anymore, as we can see from the sample code. All
    we need to do is use this simplified version of the `ε`-greedy policy when the
    agent needs to choose an action while interacting with the environment.


    In summary, the `ε`-greedy policy is a useful tool for balancing exploration vs.
    exploitation in TD control. While it was originally derived from the state-action
    value function `Q_π`, and since `Q_π` is being constantly updated when using TD
    methods, we can use a simplified version of the `ε`-greedy policy that does not
    require updating the policy probability distribution of `π`.


    ## 5.4 TD Control—SARSA


    State-Action-Reward-State-Action (SARSA) is the first TD control algorithm we
    want to introduce. It is an online, on-policy, and model-free reinforcement learning
    algorithm based on TD learning. SARSA can handle both episodic and continuing
    reinforcement learning problems and uses the general policy iteration template
    to find the optimal policy. However, SARSA simplifies the exploration part by
    using an `ε`-greedy policy. The `ε`-greedy policy selects the action that maximizes
    the estimated state-action value function `Q_π` with probability `1-ε` (exploitation)
    and selects a random action with probability `ε` (exploration).


    In SARSA, we use policy evaluation to estimate the state-action value function
    `Q_π` instead of `V_π`, which is the case for Monte Carlo policy evaluation. The
    SARSA algorithm updates the estimated state-action value function `Q_π` using
    the Bellman equation:


    ```

    Q_π(S_t, A_t) ← Q_π(S_t, A_t) + α (R_t + γ Q_π(S_{t+1}, A_{t+1}) - Q_π(S_t, A_t))

    ```


    (5.7)


    where `S_t` and `A_t` denote the current state and action, `R_t` is the immediate
    reward received after taking action `A_t` in state `S_t`, `S_{t+1}` and `A_{t+1}`
    denote the next state and action, `γ` is the discount factor, and `α` is the step
    size parameter.


    The SARSA algorithm uses the estimated state-action value function `Q_π` to update
    the policy in an online manner. The policy is updated using a simplified version
    of `ε`-greedy policy. Specifically, the policy selects the action that maximizes
    the estimated state-action value function `Q_π` with probability `1-ε` (exploitation)
    and selects a random action with probability `ε` (exploration). Since the policy
    is updated in an online manner, we do not need to perform a separate policy improvement
    step.'
