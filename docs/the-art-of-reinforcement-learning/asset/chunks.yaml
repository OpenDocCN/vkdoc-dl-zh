    Sutton and Barto used Eq. ([2.20](#605748_1_En_2_Chapter.xhtml#Equ20)) to cover
    this scenario. They consolidated the dynamics function ![$$\mathcal {P}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq263.png)
