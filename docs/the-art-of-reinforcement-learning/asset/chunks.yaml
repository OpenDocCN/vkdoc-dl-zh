- fmt: '### Four Phases of MCTS


    As illustrated in Fig. [14.2](#605748_1_En_14_Chapter.xhtml#Fig2), the general
    MCTS process could be summarized into the following four phases:


    - **Selection**: Starting from the root node, some predefined child selection
    rule or policy is recursively applied to descend through the tree to select the
    most promising child node (e.g., the child node with the highest value or highest
    Upper Confidence Bound (UCB) score), until the process reaches an expandable node.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig2_HTML.png)


    Four search tree diagrams, namely selection, expansion, simulation, and backup
    from left to right with multiple nodes at different levels.


    **Fig. 14.2** How the general MCTS search algorithm works. The concept was derived
    from the work by Browne et al. [[9](#605748_1_En_14_Chapter.xhtml#CR9)]


    - **Expansion**: The search tree is expanded by adding one or more child nodes
    to it, according to the available moves (or actions).


    - **Simulation**: Starting from the newly added node(s), a simulation is run according
    to some rollout policy, which determines the sequence of actions taken from the
    current state until a terminal state is reached.


    - **Backup**: The results from the simulation (e.g., reward signal) are backed
    up to the traversed path in the search tree, and the statistics (e.g., average
    reward and UCB score) are updated.


    Here, we discuss some of the common terms in MCTS. A root node is the node that
    represents the root of the search tree, corresponding to the current game (non-terminal)
    state. A node is expandable if it represents a non-terminal state and has unvisited
    (or unexplored) children, meaning there are still moves that have not been tried
    in the state. A node is fully expanded if all its children have been visited at
    least once. A leaf node is a node that represents a non-terminal state and does
    not have any children, meaning no move has been tried yet. The leaf node could
    be the root node when the MCTS process is just getting started, or it could be
    some fully unexpanded node in the search tree.


    While the tree shown in the selection phase in Fig. [14.2](#605748_1_En_14_Chapter.xhtml#Fig2)
    has multiple nodes at different levels, the tree starts with just a single root
    node and is built from iteration to iteration in an incremental and asymmetric
    manner, with each iteration starting from the root of the tree. Figure [14.3](#605748_1_En_14_Chapter.xhtml#Fig3)
    shows a simplified example to illustrate the process. In this simple case, we
    show a game in which there are only three possible moves for every game state.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig3_HTML.png)


    An illustration of the building process of the search tree with multiple iterations
    labeled 1, 2, 3, 4, 5, 6, 7, and 8. The denseness of the tree increases with iterations.


    **Fig. 14.3** Example of how the general MCTS search algorithm builds the search
    tree over multiple iterations


    When the search process is just getting started (first iteration in the figure),
    the search tree is completely empty. Given that the tree is completely empty,
    there is no applicable child node selection phase. A root node is created and
    added to the tree, and this newly added root node is also the leaf node. A simulation
    is run to the end of the game from the leaf node, using some rollout policy (such
    as a uniform random policy), and the reward signal is used to update the statistics
    of the traversed nodes during the backup phase. For example, if the simulation
    results in a win with reward signal `r=1`, then the statistics for the root node
    would be `N=1, W=1`, where `N` represents the total number of visit count, and
    `W` represents the total action values.


    At the second iteration, the root node is still expandable because it has unexplored
    moves, so there is no selection phase. According to the standard MCTS procedure,
    the tree is expanded by creating and adding a new child node (corresponding to
    a previously unexplored move) to the root node. This newly added child node becomes
    the current node and is also a leaf node. Again, a simulation is run to the end
    of the game from this leaf node, and the results from the simulation are backed
    up all the way up to the root node (as indicated by the heavy weighted edges and
    nodes in the figure). Let’s assume that the simulation results in a loss with
    reward signal `r=-1`, then the statistics for the newly added child node should
    be `N=1, W=-1`, and the statistics for the root node become `N=2, W=0`. Similar
    processes happen in the third and fourth iterations, but during the backup phase,
    only the traversed path (indicated by the heavy weighted nodes and edges) will
    be updated.


    Starting with the fifth iteration, all four phases of MCTS are carried out since
    the root node is now fully expanded (all moves have been tried). The search process
    selects a (best) child node starting from the root node, according to some tree
    policy. Let’s assume the tree policy selects the middle child node as shown in
    the figure, and it becomes the current node. Since the current node is expandable,
    a new child node (leaf node) is created and added to the tree. A simulation is
    run to the end of the game from this newly added node, and the statistics of the
    traversed path are updated according to the simulation results once the simulation
    reaches a terminal state.


    As the search continues with more iterations, often hundreds or thousands of iterations,
    more and more nodes will be added to the search tree, and the statistics of these
    nodes will be updated according to the simulation results and the traversed path
    from these different iterations.


    After all the search iterations are completed, a child is selected from the root
    node of the tree according to some predefined rules (such as selecting the most
    visited child), and the move corresponding to the selected child is played in
    the actual game. It’s important to note that there may be other predefined rules
    for selecting a move to play, and these can be tailored to specific games or applications.


    One of the key strengths of the MCTS algorithm is its ability to select the most
    promising nodes in the search tree, leading to an asymmetric tree over time.


    In MCTS, the algorithm builds a search tree by iteratively selecting nodes to
    expand and evaluate. The selection of nodes is guided by a tree selection policy,
    which balances exploration of unexplored regions of the search space with exploitation
    of promising regions. With the right tree selection policy, MCTS tends to favor
    more promising nodes without allowing the selection probability of the other nodes
    to converge to zero, which leads to an asymmetric tree over time.


    This asymmetry is beneficial as it allows the algorithm to focus its search on
    the most promising and important regions of the search space while still maintaining
    some exploration (Fig. [14.4](#605748_1_En_14_Chapter.xhtml#Fig4)). This property
    makes MCTS highly efficient even when dealing with very large search spaces, such
    as the game of Go.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig4_HTML.png)


    An illustration of an asymmetric search tree with multiple nodes at different
    levels.


    **Fig. 14.4**'
  raw: '### Four Phases of MCTS


    As illustrated in Fig. [14.2](#605748_1_En_14_Chapter.xhtml#Fig2), the general
    MCTS process could be summarized into the following four phases:


    *   Selection: Starting from the root node, some predefined child selection rule
    or policy is recursively applied to descend through the tree to select the most
    promising child node (e.g., the child node with the highest value or highest Upper
    Confidence Bound (UCB) score), until the process reaches an expandable node.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig2_HTML.png)


    Four search tree diagrams, namely selection, expansion, simulation, and backup
    from left to right with multiple nodes at different levels.


    Fig. 14.2


    How the general MCTS search algorithm works. The concept was derived from the
    work by Browne et al. [[9](#605748_1_En_14_Chapter.xhtml#CR9)]


    *   Expansion: The search tree is expanded by adding one or more child nodes to
    it, according to the available moves (or actions).


    *   Simulation: Starting from the newly added node(s), a simulation is run according
    to some rollout policy, which determines the sequence of actions taken from the
    current state until a terminal state is reached.


    *   Backup: The results from the simulation (e.g., reward signal) are backed up
    to the traversed path in the search tree, and the statistics (e.g., average reward
    and UCB score) are updated.


    Here, we discuss some of the common terms in MCTS. A root node is the node that
    represents the root of the search tree, corresponding to the current game (non-terminal)
    state. A node is expandable if it represents a non-terminal state and has unvisited
    (or unexplored) children, meaning there are still moves that have not been tried
    in the state. A node is fully expanded if all its children have been visited at
    least once. A leaf node is a node that represents a non-terminal state and does
    not have any children, meaning no move has been tried yet. The leaf node could
    be the root node when the MCTS process is just getting started, or it could be
    some fully unexpanded node in the search tree.


    While the tree shown in the selection phase in Fig. [14.2](#605748_1_En_14_Chapter.xhtml#Fig2)
    has multiple nodes at different levels, the tree starts with just a single root
    node and is built from iteration to iteration in an incremental and asymmetric
    manner, with each iteration starting from the root of the tree. Figure [14.3](#605748_1_En_14_Chapter.xhtml#Fig3)
    shows a simplified example to illustrate the process. In this simple case, we
    show a game in which there are only three possible moves for every game state.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig3_HTML.png)


    An illustration of the building process of the search tree with multiple iterations
    labeled 1, 2, 3, 4, 5, 6, 7, and 8\. The denseness of the tree increases with
    iterations.


    Fig. 14.3


    Example of how the general MCTS search algorithm builds the search tree over multiple
    iterations


    When the search process is just getting started (first iteration in the figure),
    the search tree is completely empty. Given that the tree is completely empty,
    there is no applicable child node selection phase. A root node is created and
    added to the tree, and this newly added root node is also the leaf node. A simulation
    is run to the end of the game from the leaf node, using some rollout policy (such
    as a uniform random policy), and the reward signal is used to update the statistics
    of the traversed nodes during the backup phase. For example, if the simulation
    results in a win with reward signal ![$$r=1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq8.png)
    , then the statistics for the root node would be ![$$N=1, W=1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq9.png)
    , where *N* represents the total number of visit count, and *W* represents the
    total action values.


    At the second iteration, the root node is still expandable because it has unexplored
    moves, so there is no selection phase. According to the standard MCTS procedure,
    the tree is expanded by creating and adding a new child node (corresponding to
    a previously unexplored move) to the root node. This newly added child node becomes
    the current node and is also a leaf node. Again, a simulation is run to the end
    of the game from this leaf node, and the results from the simulation are backed
    up all the way up to the root node (as indicated by the heavy weighted edges and
    nodes in the figure). Let’s assume that the simulation results in a loss with
    reward signal ![$$r=-1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq10.png)
    , then the statistics for the newly added child node should be ![$$N=1, W=-1$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq11.png)
    , and the statistics for the root node become ![$$N=2, W=0$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq12.png)
    . Similar processes happen in the third and fourth iterations, but during the
    backup phase, only the traversed path (indicated by the heavy weighted nodes and
    edges) will be updated.


    Starting with the fifth iteration, all four phases of MCTS are carried out since
    the root node is now fully expanded (all moves have been tried). The search process
    selects a (best) child node starting from the root node, according to some tree
    policy. Let’s assume the tree policy selects the middle child node as shown in
    the figure, and it becomes the current node. Since the current node is expandable,
    a new child node (leaf node) is created and added to the tree. A simulation is
    run to the end of the game from this newly added node, and the statistics of the
    traversed path are updated according to the simulation results once the simulation
    reaches a terminal state.


    As the search continues with more iterations, often hundreds or thousands of iterations,
    more and more nodes will be added to the search tree, and the statistics of these
    nodes will be updated according to the simulation results and the traversed path
    from these different iterations.


    After all the search iterations are completed, a child is selected from the root
    node of the tree according to some predefined rules (such as selecting the most
    visited child), and the move corresponding to the selected child is played in
    the actual game. It’s important to note that there may be other predefined rules
    for selecting a move to play, and these can be tailored to specific games or applications.


    One of the key strengths of the MCTS algorithm is its ability to select the most
    promising nodes in the search tree, leading to an asymmetric tree over time.


    In MCTS, the algorithm builds a search tree by iteratively selecting nodes to
    expand and evaluate. The selection of nodes is guided by a tree selection policy,
    which balances exploration of unexplored regions of the search space with exploitation
    of promising regions. With the right tree selection policy, MCTS tends to favor
    more promising nodes without allowing the selection probability of the other nodes
    to converge to zero, which leads to an asymmetric tree over time.


    This asymmetry is beneficial as it allows the algorithm to focus its search on
    the most promising and important regions of the search space while still maintaining
    some exploration (Fig. [14.4](#605748_1_En_14_Chapter.xhtml#Fig4)). This property
    makes MCTS highly efficient even when dealing with very large search spaces, such
    as the game of Go.


    ![](images/605748_1_En_14_Chapter/605748_1_En_14_Fig4_HTML.png)


    An illustration of an asymmetric search tree with multiple nodes at different
    levels.


    Fig. 14.4'
  trans: '

    ### MCTS 的四个阶段


    如图 14.2 所示，通用的 MCTS 过程可概括为以下四个阶段：


    - **选择**：从根节点开始，递归地应用某种预定义的子节点选择规则或策略，沿着树向下遍历，以选出最有潜力的子节点（例如，具有最高值或最高置信上界（UCB）得分的子节点），直到过程到达一个可扩展节点。


    ![](img/605748_1_En_14_Fig2_HTML.png)


    四个搜索树示意图，从左到右依次为选择、扩展、模拟和回传，包含不同层级的多个节点。


    **图 14.2** 通用 MCTS 搜索算法的工作原理。该概念源自 Browne 等人的工作 [9]


    - **扩展**：根据可用的移动（或动作），通过向搜索树中添加一个或多个子节点来扩展该树。


    - **模拟**：从新添加的节点开始，根据某种回滚策略运行一次模拟，该策略决定了从当前状态到达到终止状态所采取的动作序列。


    - **回传**：模拟的结果（例如，奖励信号）被回传到搜索树中遍历过的路径上，并更新相应的统计信息（例如，平均奖励和 UCB 得分）。


    在此，我们讨论 MCTS 中的一些常见术语。根节点是代表搜索树根部的节点，对应于当前的游戏（非终止）状态。如果一个节点代表非终止状态，并且拥有未访问（或未探索）的子节点，即在该状态下仍有尚未尝试过的移动，则该节点是可扩展的。如果一个节点的所有子节点都至少被访问过一次，则该节点是完全扩展的。叶节点是代表非终止状态且没有任何子节点的节点，意味着尚未尝试任何移动。当
    MCTS 过程刚开始时，叶节点可能是根节点，也可能是搜索树中某个完全未扩展的节点。


    虽然图 14.2 选择阶段所示的树在不同层级有多个节点，但该树最初仅从一个根节点开始，并以增量且不对称的方式，通过一次次迭代逐步构建，每次迭代都从树的根节点开始。图
    14.3 展示了一个简化示例来说明此过程。在这个简单案例中，我们展示了一个游戏，其中每个游戏状态都只有三种可能的移动。


    ![](img/605748_1_En_14_Fig3_HTML.png)


    搜索树构建过程的示意图，标注了 1、2、3、4、5、6、7 和 8 多次迭代。树的密度随迭代次数增加而增加。


    **图 14.3** 通用 MCTS 搜索算法如何通过多次迭代构建搜索树的示例


    当搜索过程刚开始时（图中的第一次迭代），搜索树完全是空的。由于树完全是空的，因此没有适用的子节点选择阶段。创建一个根节点并将其添加到树中，这个新添加的根节点同时也是叶节点。从该叶节点开始，使用某种回滚策略（例如均匀随机策略）运行一次模拟，直到游戏结束，并在回传阶段使用奖励信号来更新遍历过的节点的统计信息。例如，如果模拟结果获胜，奖励信号为
    `r=1`，那么根节点的统计信息将是 `N=1, W=1`，其中 `N` 代表总访问次数，`W` 代表总动作价值。


    在第二次迭代时，根节点仍然是可扩展的，因为它有未探索的移动，所以没有选择阶段。根据标准的 MCTS 流程，通过创建一个新的子节点（对应于之前未探索的移动）并将其添加到根节点来扩展树。这个新添加的子节点成为当前节点，同时也是一个叶节点。再次，从该叶节点运行一次模拟直到游戏结束，并将模拟结果一路回传到根节点（如图中粗权重边和节点所示）。假设模拟结果失败，奖励信号为
    `r=-1`，那么新添加的子节点的统计信息应为 `N=1, W=-1`，而根节点的统计信息变为 `N=2, W=0`。第三次和第四次迭代也发生类似的过程，但在回传阶段，只有遍历过的路径（由粗权重节点和边指示）会被更新。


    从第五次迭代开始，MCTS 的所有四个阶段都会执行，因为此时根节点已经完全扩展（所有移动都已被尝试过）。搜索过程根据某种树策略，从根节点开始选择一个（最佳）子节点。假设树策略选择了图中所示的中间子节点，它成为当前节点。由于当前节点是可扩展的，因此创建一个新的子节点（叶节点）并将其添加到树中。从这个新添加的节点运行一次模拟直到游戏结束，一旦模拟达到终止状态，便根据模拟结果更新遍历路径上的统计信息。


    随着搜索继续进行更多次迭代（通常成百上千次），越来越多的节点将被添加到搜索树中，这些节点的统计信息将根据模拟结果以及来自这些不同迭代的遍历路径进行更新。


    在所有搜索迭代完成后，根据某些预定义的规则（例如选择访问次数最多的子节点）从树的根节点中选择一个子节点，并在实际游戏中执行与该选定子节点对应的移动。需要注意的是，可能存在其他预定义的规则用于选择要执行的移动，这些规则可以根据特定的游戏或应用进行定制。


    MCTS 算法的关键优势之一在于它能够选择搜索树中最有潜力的节点，从而随着时间的推移形成一棵不对称的树。


    在 MCTS 中，算法通过迭代地选择要扩展和评估的节点来构建搜索树。节点的选择由树选择策略引导，该策略平衡了对搜索空间中未探索区域的探索与对有潜力区域的利用。有了正确的树选择策略，MCTS
    倾向于更青睐有潜力的节点，同时不让其他节点的选择概率收敛到零，这导致随着时间的推移形成一棵不对称的树。


    这种不对称性是有益的，因为它允许算法将搜索重点放在搜索空间中最有潜力和最重要的区域，同时仍保持一定的探索（图 14.4）。这一特性使得 MCTS 即使在处理非常大的搜索空间（例如围棋游戏）时也极其高效。


    ![](img/605748_1_En_14_Fig4_HTML.png)


    一棵不对称搜索树的示意图，包含不同层级的多个节点。


    **图 14.4**

