    }} \log P(\tau ; \boldsymbol {\theta })$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq82.png)
    with respect to ![$$\boldsymbol {\theta }$$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_IEq83.png)
