  trans: "\n### 工作示例\n\n让我们来看一个 Q-learning 如何更新状态-动作对 `(s, a)` 值的例子。我们仍将使用服务犬 MDP。但这次，我们采用图\
    \ 5.2 中通过 TD(0)策略评估计算出的随机策略的状态-动作值。我们只关注算法如何计算状态*房间 1*和动作*前往房间 2*的值（图 5.6）。\n\n\
    ![](img/605748_1_En_5_Fig6_HTML.png)\n\nQ-learning 计算状态-动作值的流程图，流程经过房间 1、2、3，最终到达已找到物品。房间\
    \ 3 返回房间 2，房间 2 返回房间 1。房间 2 通过 `r = 0`、`q pie = -2.94` 指向外部。外部通过 `r = 0` 返回房间\
    \ 2。外部通过 `r = -1` 自循环。\n\n**图 5.6** Q-learning 如何为服务犬 MDP 计算状态-动作值的示例。状态*房间 2*中各动作的值取自图\
    \ 5.2。\n\n假设智能体在状态*房间 1*时采取了动作*前往房间 2*，并从环境中获得了奖励信号 `-1` 和后续状态*房间 2*。我们使用以下变量和参数：\n\
    \n- `Q(s, a)`：状态-动作对 `(s, a)` 的值\n- `α = 0.1`：步长\n- `γ = 0.9`：折扣因子\n\n状态*房间 2*中动作*前往房间\
    \ 1*、*前往房间 3*、*前往外部*的估计状态-动作值分别为 `-4.32`、`1.98`、`-2.94`。状态-动作对*房间 1*和*前往房间 2*的初始估计值为\
    \ `0`。\n\nQ-learning 算法将如何估计状态-动作对*房间 1*和*前往房间 2*的（最优）值？我们可以直接将这些数值代入公式(5.15)。唯一需要指定的是后续状态-动作对的值。在\
    \ Q-learning 中，我们寻找后续状态所有动作中的最大值。在本例中，动作*前往房间 3*的值为 `1.98`。我们可以按如下方式计算状态-动作对*房间\
    \ 1*和*前往房间 2*的值：\n\n```\nQ(房间 1, 前往房间 2) = 0 + 0.1 * (-1 + 0.9 * 1.98 - 0) \n\
    \                       = 0.078\n```\n\n我们进行了实验，以评估 Q-learning 算法在服务犬 MDP 上的性能，实验设置与我们之前使用\
    \ SARSA 的实验相同。这些实验的目标是在这个特定的 MDP 上比较 Q-learning 和 SARSA 的性能。\n\n我们在实验中使用了以下变量和参数：\n\
    \n- `α = 0.01`：Q-learning 算法中使用的步长\n- `γ = 0.9`：应用于未来奖励的折扣因子\n- `ε = 1.0`：决定选择随机动作概率的探索率\n\
    \n为了在学习过程中降低探索率，我们应用了一个线性衰减计划，将探索率从初始值 `1.0` 降低到最终值 `0.01`。\n\n如表 5.3 所示，Q-learning\
    \ 算法在对值函数进行 500 次更新后找到了最优策略。它还在大约 20,000 次更新后找到了最优值函数 `V*`，这比表 5.2 中 SARSA 的 50,000\
    \ 次更新快得多。然而，值得注意的是，尽管运行了更多次更新，SARSA 找到的最优值函数仍然没有完美匹配真实的最优值函数。这表明 Q-learning 比\
    \ SARSA 收敛更快，并且能产生更好的结果。\n\n## 5.7 双 Q 学习\n\n双 Q 学习是一种解决 Q-learning 小问题的方法，即估计的最优状态-动作值\
    \ `Q*` 可能存在偏差。这是由于值更新过程的性质决定的，该过程总是使用能为后续状态 `s'` 产生最大值的动作。在某些随机环境中，这种方法可能会导致问题，Hado\
    \ Hasselt [4] 对此进行了详细解释。\n\n![](img/605748_1_En_5_Fig7_HTML.png)\n\n赌场老虎机 MDP\
    \ 的流程图，从中央大厅开始，指向左侧和右侧区域。左侧区域通过 `r = 0, 0.1` 指向 A-L、B-L 和 C-L。右侧区域通过 `r = -1,\
    \ 5` 指向 A-R、B-R 和 C-R。\n\n**图 5.7** 赌场老虎机 MDP，仅显示每侧的三台老虎机\n\n**表 5.3** 在运行 Q-learning\
    \ 算法不同更新次数后，服务犬 MDP 的最优状态值，`γ = 0.9, α = 0.01`，`ε` 从 `1.0` 衰减到 `0.01`。最后一行包含使用\
    \ DP 策略迭代计算出的真实 `V*`。\n\n| 更新次数 | 房间 1 | 房间 2 | 房间 3 | 外部 | 已找到物品 |\n| --- | ---\
    \ | --- | --- | --- | --- |\n| 100 | −0.12 | 0.0 | 0.45 | 0.0 | 0 |\n| 1000 |\
    \ 0.95 | 4.09 | 8.25 | 0.22 | 0 |\n| 10,000 | 6.2 | 8.0 | 10.0 | 7.05 | 0 |\n\
    | 20,000 | 6.2 | 8.0 | 10.0 | 7.2 | 0 |\n| 50,000 | 6.2 | 8.0 | 10.0 | 7.2 | 0\
    \ |\n| DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |\n"
- fmt: "### Casino Example\n\nTo illustrate the issue of maximization bias, let’s\
    \ consider a simple example derived from Sutton and Barto [[2](#605748_1_En_5_Chapter.xhtml#CR2)].\
    \ Imagine we’re at a casino and we want to play some slot machines just for fun.\
    \ We can model the example as shown in Fig. [5.7](#605748_1_En_5_Chapter.xhtml#Fig7),\
    \ where the center of the casino playground is the center hall, and there are\
    \ two play areas (left, right) located around the center hall. On each side, there\
    \ are ten slot machines to choose from, though we’ve only shown three on each\
    \ side in the figure.\n\nHowever, there’s a hidden secret about this casino. The\
    \ slot machines on the left all share the same reward distribution of mean 0 and\
    \ standard deviation 0.1. This means that if we choose to play any slot machine\
    \ on the left, we may get a reward between [ -0.1, 0.1]. If we play 1000 rounds,\
    \ we’ll break even, since the mean reward is 0.\n\nThe slot machines on the right\
    \ share a totally different reward distribution, with a mean of -1.0 and standard\
    \ deviation of 5.0. When we play any slot machine on the right, we may get a reward\
    \ between [ -6.0, 4.0]. If we play 1000 rounds, we’re guaranteed to lose money\
    \ (on average, -1 dollar per round). So the obvious choice is to play with the\
    \ slot machines on the left.\n\nThis example demonstrates the potential pitfalls\
    \ of relying solely on the maximum value estimate in Q-learning and highlights\
    \ the need for alternative methods like double Q-learning.\n\nWe model the problem\
    \ as an episodic reinforcement learning problem, in which an agent learns to maximize\
    \ its rewards over time by interacting with a stochastic environment. After each\
    \ action, the agent receives a reward that is a random variable with an unknown\
    \ distribution to the agent. The episode always starts with the state *Center\
    \ Hall*, from which the agent can choose to *Go left* or *Go right* to transition\
    \ to the corresponding successor state *Left area* or *Right area*. In each area,\
    \ the agent can choose to play one of several slot machines, each with a different\
    \ probability distribution for the rewards it can generate. The episode terminates\
    \ when the agent chooses to play one of the slot machines, regardless of which\
    \ area it is in. The next episode starts independently of how the previous episode\
    \ ended, assuming that the agent has an unlimited amount of money to play.\n\n\
    If we use standard Q-learning with no discount factor ( `γ = 1` ), what are the\
    \ estimated values for the actions *Go left* and *Go right* when the agent is\
    \ in state *Center Hall*? Let’s follow the update rule in Eq. ([5.15](#605748_1_En_5_Chapter.xhtml#Equ15))\
    \ to find out. Assuming that the initial Q-values for both actions are 0, the\
    \ step size is `α = 1`. The update rule can be simplified as `Q(S_t, A_t) = R_t\
    \ + max_{a'}Q(S_{t+1}, a')`, where `R_t` is the immediate reward and `max_{a'}Q(S_{t+1},\
    \ a')` is the maximum Q-value of the successor state `S_{t+1}`.\n\nIn state *Left\
    \ area*, the highest reward we can get from any of the slot machines is 0.1 (ignoring\
    \ outliers), so the estimated Q-value for *Center Hall* and *Go left* is `0 +\
    \ 0.1 = 0.1`. However, in state *Right area*, the highest reward we can get from\
    \ any of the slot machines is 4.0, which leads to an estimated Q-value of `0 +\
    \ 4.0 = 4.0` for *Center Hall* and *Go right*. Note that this overestimates the\
    \ true value of the action due to the high variance in the rewards. In practice,\
    \ the agent would need to try each action enough times to estimate its true value,\
    \ which is costly in this example.\n\nDouble Q-learning is an extension to the\
    \ standard Q-learning algorithm that mitigates the problem of overestimation that\
    \ can occur with the latter. In Q-learning, the agent estimates the optimal state-action\
    \ value function Q and uses it to select actions. However, in certain situations\
    \ such as the casino machine MDP example, Q-learning can overestimate the value\
    \ of actions, which can lead to suboptimal policies.\n\nThe idea behind double\
    \ Q-learning is to learn two independent Q-functions, `Q1` and `Q2`, and use them\
    \ to select actions. During the learning process, in half of the time the algorithm\
    \ updates the values of `Q1`, and in the other half, it updates the values of\
    \ `Q2`. The key contribution of double Q-learning is how to choose which Q-value\
    \ to use when estimating the value of successor state-action pair.\n\nIn the standard\
    \ Q-learning algorithm, we can use the following equation to compute the TD target:\n\
    \n```\nTD_target = R_t + γ max_{a'}Q(S_{t+1}, a')\n          = R_t + γ Q( S_{t+1},\
    \ argmax_{a'}Q(S_{t+1}, a') )\n```\n\nWith double Q-learning, we modify the preceding\
    \ equation for updating `Q1` to:\n\n```\nTD_target = R_t + γ max_{a'}Q(S_{t+1},\
    \ a')\n          = R_t + γ Q2( S_{t+1}, argmax_{a'}Q1(S_{t+1}, a') )\n```\n\n\
    Suppose the agent is going to update `Q1` and has collected a tuple of `(S_t,\
    \ A_t, R_t, S_{t+1})`. The agent uses `Q1` to select the best action `a' = argmax_{a'}Q1(S_{t+1},\
    \ a')`, which yields the maximum value in the successor state `S_{t+1}`. However,\
    \ instead of using the value `Q1(S_{t+1}, a')` directly, the agent uses this best\
    \ action `a'` to select the value from `Q2`, which is `Q2(S_{t+1}, a')`. This\
    \ process helps reduce overestimation and leads to more accurate value estimates."
  raw: '### Casino Example


    To illustrate the issue of maximization bias, let’s consider a simple example
    derived from Sutton and Barto [[2](#605748_1_En_5_Chapter.xhtml#CR2)]. Imagine
    we’re at a casino and we want to play some slot machines just for fun. We can
    model the example as shown in Fig. [5.7](#605748_1_En_5_Chapter.xhtml#Fig7), where
    the center of the casino playground is the center hall, and there are two play
    areas (left, right) located around the center hall. On each side, there are ten
    slot machines to choose from, though we’ve only shown three on each side in the
    figure.


    However, there’s a hidden secret about this casino. The slot machines on the left
    all share the same reward distribution of mean 0 and standard deviation 0.1\.
    This means that if we choose to play any slot machine on the left, we may get
    a reward between [ ![$$-$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq313.png)
    0.1, 0.1]. If we play 1000 rounds, we’ll break even, since the mean reward is
    0.


    The slot machines on the right share a totally different reward distribution,
    with a mean of ![$$-$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq314.png)
    1.0 and standard deviation of 5.0\. When we play any slot machine on the right,
    we may get a reward between [ ![$$-$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq315.png)
    6.0, 4.0]. If we play 1000 rounds, we’re guaranteed to lose money (on average,
    ![$$-1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq316.png) dollar
    per round). So the obvious choice is to play with the slot machines on the left.


    This example demonstrates the potential pitfalls of relying solely on the maximum
    value estimate in Q-learning and highlights the need for alternative methods like
    double Q-learning.


    We model the problem as an episodic reinforcement learning problem, in which an
    agent learns to maximize its rewards over time by interacting with a stochastic
    environment. After each action, the agent receives a reward that is a random variable
    with an unknown distribution to the agent. The episode always starts with the
    state *Center Hall*, from which the agent can choose to *Go left* or *Go right*
    to transition to the corresponding successor state *Left area* or *Right area*.
    In each area, the agent can choose to play one of several slot machines, each
    with a different probability distribution for the rewards it can generate. The
    episode terminates when the agent chooses to play one of the slot machines, regardless
    of which area it is in. The next episode starts independently of how the previous
    episode ended, assuming that the agent has an unlimited amount of money to play.


    If we use standard Q-learning with no discount factor ( ![$${\gamma }=1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq317.png)
    ), what are the estimated values for the actions *Go left* and *Go right* when
    the agent is in state *Center Hall*? Let’s follow the update rule in Eq. ([5.15](#605748_1_En_5_Chapter.xhtml#Equ15))
    to find out. Assuming that the initial Q-values for both actions are 0, the step
    size is ![$$\alpha =1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq318.png)
    . The update rule can be simplified as ![$$Q(S_t, A_t) = R_t + \max _{a''}Q(S_{t+1},
    a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq319.png) , where
    ![$$R_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq320.png)
    is the immediate reward and ![$$\max _{a''}Q(S_{t+1}, a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq321.png)
    is the maximum Q-value of the successor state ![$$S_{t+1}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq322.png)
    .


    In state *Left area*, the highest reward we can get from any of the slot machines
    is 0.1 (ignoring outliers), so the estimated Q-value for *Center Hall* and *Go
    left* is ![$$0 + 0.1 = 0.1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq323.png)
    . However, in state *Right area*, the highest reward we can get from any of the
    slot machines is 4.0, which leads to an estimated Q-value of ![$$0 + 4.0 = 4.0$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq324.png)
    for *Center Hall* and *Go right*. Note that this overestimates the true value
    of the action due to the high variance in the rewards. In practice, the agent
    would need to try each action enough times to estimate its true value, which is
    costly in this example.


    Double Q-learning is an extension to the standard Q-learning algorithm that mitigates
    the problem of overestimation that can occur with the latter. In Q-learning, the
    agent estimates the optimal state-action value function Q and uses it to select
    actions. However, in certain situations such as the casino machine MDP example,
    Q-learning can overestimate the value of actions, which can lead to suboptimal
    policies.


    The idea behind double Q-learning is to learn two independent Q-functions, ![$$Q_1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq325.png)
    and ![$$Q_2$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq326.png)
    , and use them to select actions. During the learning process, in half of the
    time the algorithm updates the values of ![$$Q_1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq327.png)
    , and in the other half, it updates the values of ![$$Q_2$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq328.png)
    . The key contribution of double Q-learning is how to choose which Q-value to
    use when estimating the value of successor state-action pair.


    In the standard Q-learning algorithm, we can use the following equation to compute
    the TD target:


    ![$$\displaystyle \begin{aligned} TD_{target} &amp; = R_t + {\gamma} \max_{a''}Q(S_{t+1},
    a'') \\ &amp; = R_t + {\gamma} Q\Big( S_{t+1}, \mathop{\text{argmax}}_{a''}Q(S_{t+1},
    a'') \Big) \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equf.png)


    With double Q-learning, we modify the preceding equation for updating ![$$Q_1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq329.png)
    to


    ![$$\displaystyle \begin{aligned} TD_{target} &amp; = R_t + {\gamma} \max_{a''}Q(S_{t+1},
    a'') \\ &amp; = R_t + {\gamma} Q_2\Big( S_{t+1}, \mathop{\text{argmax}}_{a''}Q_1(S_{t+1},
    a'') \Big) \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equg.png)


    Suppose the agent is going to update ![$$Q_1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq330.png)
    and has collected a tuple of ![$$(S_t, A_t, R_t, S_{t+1})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq331.png)
    . The agent uses ![$$Q_1$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq332.png)
    to select the best action ![$$a''=\mathop{\text{argmax}} _{a''}Q_1(S_{t+1}, a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq333.png)
    , which yields the maximum value in the successor state ![$$S_{t+1}$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq334.png)
    . However, instead of using the value ![$$Q_1(S_{t+1}, a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq335.png)
    directly, the agent uses this best action ![$$a''$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq336.png)
    to select the value from ![$$Q_2$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq337.png)
    , which is ![$$Q_2(S_{t+1}, a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq338.png)
    . This process helps reduce overestimation and leads to more accurate value estimates.'
  trans: "\n### 赌场示例\n\n为了说明最大化偏差的问题，我们来看一个源自萨顿和巴托的简单示例[2]。假设我们在赌场里，想玩几台老虎机娱乐一下。我们可以将这个示例建模为图\
    \ 5.7 所示，其中赌场游乐区的中心是中央大厅，大厅周围有两个游乐区（左侧、右侧）。每侧都有十台老虎机可供选择，不过图中每侧只画了三台。\n\n然而，这家赌场隐藏着一个秘密。左侧的所有老虎机共享相同的奖励分布，均值为\
    \ 0，标准差为 0.1。这意味着如果我们选择玩左侧的任何一台老虎机，获得的奖励可能在[-0.1, 0.1]之间。如果玩 1000 轮，我们会收支平衡，因为平均奖励为\
    \ 0。\n\n右侧的老虎机则有着完全不同的奖励分布，均值为-1.0，标准差为 5.0。当我们玩右侧的任何一台老虎机时，获得的奖励可能在[-6.0, 4.0]之间。如果玩\
    \ 1000 轮，我们肯定会输钱（平均每轮输 1 美元）。所以显而易见的选择是玩左侧的老虎机。\n\n这个示例展示了在 Q 学习中仅依赖最大值估计的潜在陷阱，并凸显了使用双\
    \ Q 学习等替代方法的必要性。\n\n我们将该问题建模为一个回合制强化学习问题，智能体通过与随机环境交互，学习随时间最大化其累积奖励。每次动作后，智能体都会获得一个奖励，该奖励是一个随机变量，其分布对智能体来说是未知的。每个回合总是从*中央大厅*状态开始，智能体可以选择*向左走*或*向右走*，从而转移到相应的后续状态*左侧区域*或*右侧区域*。在每个区域中，智能体可以选择玩多台老虎机中的一台，每台老虎机产生的奖励具有不同的概率分布。当智能体选择玩某台老虎机时，无论它位于哪个区域，该回合即告结束。下一个回合独立于上一个回合的结束方式开始，假设智能体拥有无限的资金可以继续玩。\n\
    \n如果我们使用无折扣因子的标准 Q 学习（`γ = 1`），当智能体处于*中央大厅*状态时，*向左走*和*向右走*这两个动作的估计值是多少？让我们按照公式(5.15)中的更新规则来找出答案。假设两个动作的初始\
    \ Q 值均为 0，步长为`α = 1`。更新规则可以简化为`Q(S_t, A_t) = R_t + max_{a'}Q(S_{t+1}, a')`，其中`R_t`是即时奖励，`max_{a'}Q(S_{t+1},\
    \ a')`是后续状态`S_{t+1}`的最大 Q 值。\n\n在*左侧区域*状态中，我们从任何一台老虎机中能获得的最高奖励是 0.1（忽略异常值），因此*中央大厅*和*向左走*的估计\
    \ Q 值为`0 + 0.1 = 0.1`。然而，在*右侧区域*状态中，我们从任何一台老虎机中能获得的最高奖励是 4.0，这导致*中央大厅*和*向右走*的估计\
    \ Q 值为`0 + 4.0 = 4.0`。请注意，由于奖励的高方差，这高估了该动作的真实价值。在实践中，智能体需要多次尝试每个动作才能估计出其真实价值，在这个示例中代价很高。\n\
    \n双 Q 学习是标准 Q 学习算法的一种扩展，旨在缓解后者可能出现的过高估计问题。在 Q 学习中，智能体估计最优状态-动作值函数 Q，并用它来选择动作。然而，在某些情况下，例如赌场老虎机\
    \ MDP 示例，Q 学习可能会高估动作的价值，从而导致次优策略。\n\n双 Q 学习背后的思想是学习两个独立的 Q 函数，`Q1`和`Q2`，并用它们来选择动作。在学习过程中，一半时间算法更新`Q1`的值，另一半时间更新`Q2`的值。双\
    \ Q 学习的关键贡献在于，在估计后续状态-动作对的价值时，如何选择使用哪个 Q 值。\n\n在标准 Q 学习算法中，我们可以使用以下公式计算 TD 目标：\n\
    \n```\nTD_target = R_t + γ max_{a'}Q(S_{t+1}, a')\n          = R_t + γ Q( S_{t+1},\
    \ argmax_{a'}Q(S_{t+1}, a') )\n```\n\n使用双 Q 学习时，我们将上述用于更新`Q1`的公式修改为：\n\n```\n\
    TD_target = R_t + γ max_{a'}Q(S_{t+1}, a')\n          = R_t + γ Q2( S_{t+1}, argmax_{a'}Q1(S_{t+1},\
    \ a') )\n```\n\n假设智能体即将更新`Q1`，并且已经收集了一个元组`(S_t, A_t, R_t, S_{t+1})`。智能体使用`Q1`来选择最佳动作`a'\
    \ = argmax_{a'}Q1(S_{t+1}, a')`，该动作在后续状态`S_{t+1}`中产生最大值。然而，智能体并不直接使用`Q1(S_{t+1},\
    \ a')`的值，而是使用这个最佳动作`a'`从`Q2`中选择值，即`Q2(S_{t+1}, a')`。这个过程有助于减少过高估计，并得到更准确的价值估计。\n"
- fmt: 'Similarly, if the agent is going to update `Q2`, it uses the same logic, but
    with `Q1` and `Q2` swapped:


    ```

    Q2(S_t, A_t)=Q2(S_t, A_t) + α ( R_t + γ Q1(S_{t+1}, argmax_{a''}Q2(S_{t+1}, a'')
    ) - Q2(S_t, A_t) )

    ```


    As an example, suppose an agent is learning to play a game where it needs to navigate
    through a maze to reach a goal. In some situations, the agent may overestimate
    the value of certain actions, leading to suboptimal policies. With double Q-learning,
    the agent learns two independent Q-functions, and during the learning process,
    it alternates between updating the values of `Q1` and `Q2`. When selecting actions,
    the agent uses the best action from `Q1` to select the value from `Q2`, or vice
    versa. This process helps reduce overestimation and can lead to more accurate
    value estimates, resulting in better policies.


    In the context of the casino MDP example, the probability of the same action having
    the maximum value in both `Q1` and `Q2` is much lower, which mitigates the maximization
    bias issue.


    We now formally introduce the double Q-learning algorithm with `ε`-greedy policy
    for exploration. The overall procedure is the same compared to standard Q-learning.
    One small change we need to make is when it comes to the time for the agent to
    act in the environment, it uses the merged state-action value functions `Q1` and
    `Q2` as a single state-action value function `Q` for the `ε`-greedy policy. The
    `ε`-greedy policy selects the action with the highest value from `Q` with probability
    `1-ε` and selects a random action with probability `ε`.


    **Algorithm 8: Double Q-learning with `ε`-greedy exploration**


    A 15-line algorithm titled double Q-learning with epsilon minus greedy exploration
    takes in the following inputs to give an optimal state-action value function `Q`
    as the output. Discount rate `gamma`, initial exploration rate `epsilon`, step
    size `alpha`, and number of steps `K`.


    We conducted an experiment using standard Q-learning and double Q-learning to
    find the optimal policy for our casino MDP. We used a fixed exploration rate of
    `ε=0.1`, the same step size of `α=0.1`, and no discount (`γ=1.0`) throughout the
    experiment. The goal of the experiment was to measure how often the agent chose
    the action *Go right* when in state *Center Hall*.


    A frequency graph of % of go right in center hall versus episodes plots a concave-down
    decreasing line for Q-learning, a concave-up decreasing curve for double Q-learning,
    and a line parallel to the horizontal axis from 5% on the vertical axis. The value
    is estimated.


    **Fig. 5.8** The percentage of choosing *Go right* when in state *Center Hall*
    on the casino MDP. Results were averaged over 1000 independent runs; each run
    is over 500 episodes. We use step size `α=0.02`, no discount `γ=1.0`, and fixed
    exploration rate `ε=0.1` throughout the experiment.


    The results, shown in Fig. 5.8, were averaged over 1000 independent runs, each
    consisting of 500 episodes. The optimal policy is to choose *Go right* with a
    probability of 5% (since we are using a fixed `ε=0.1`, the agent will act randomly
    with a probability of 10%, and when acting randomly and choosing between *Go left*
    and *Go right*, the agent should choose *Go right* with a probability of 0.5 *
    10%). We observed that the standard Q-learning agent chose *Go right* more often
    than the optimal policy during the first 200 episodes. However, the double Q-learning
    agent quickly discovered the optimal policy after only 50 episodes.'
  raw: 'Similarly, if the agent is going to update ![$$Q_2$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq339.png)
