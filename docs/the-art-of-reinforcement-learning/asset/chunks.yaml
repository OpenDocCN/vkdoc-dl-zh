    &amp; = \nabla_{\boldsymbol{\theta}} \log \left[ \mu(s_0) \cdot \prod_{t=0}^{T-1}
    \pi (a_t|s_t; \boldsymbol{\theta}) \cdot \prod_{t=0}^{T-1} P(s_{t+1}|s_t, a_t)\right]\notag
    \\ &amp; = \nabla_{\boldsymbol{\theta}} \log \mu(s_0) + \nabla_{\boldsymbol{\theta}}
    \log \prod_{t=0}^{T-1} \pi (a_t|s_t; \boldsymbol{\theta}) + \nabla_{\boldsymbol{\theta}}
    \log \prod_{t=0}^{T-1} P(s_{t+1}|s_t, a_t) \notag \\ &amp; = \nabla_{\boldsymbol{\theta}}
    \log \mu(s_0) + \sum_{t=0}^{T-1} \nabla_{\boldsymbol{\theta}} \log \pi (a_t|s_t;
    \boldsymbol{\theta}) + \sum_{t=0}^{T-1} \nabla_{\boldsymbol{\theta}} \log P(s_{t+1}|s_t,
