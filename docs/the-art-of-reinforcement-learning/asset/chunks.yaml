  trans: '

    ### 针对 `Q_π` 的蒙特卡洛策略评估


    我们可以使用蒙特卡洛策略评估来估计策略 `π` 的状态-动作价值函数 `Q_π`。状态-动作价值函数 `Q_π(s, a)` 衡量的是从状态 `s` 开始，采取动作
    `a`，然后遵循策略 `π` 所能获得的期望回报。


    蒙特卡洛策略评估通过生成许多在策略 `π` 下的马尔可夫决策过程（MDP）的幕（episode），然后计算每个状态-动作对的平均回报来估计 `Q_π`。具体来说，对于每一幕，智能体从一个初始状态
    `s0` 开始，并根据策略 `π` 采取动作，直到到达一个终止状态。在每个时间步 `t`，智能体观察当前状态 `S_t`，根据策略 `π` 采取动作 `A_t`，并接收奖励
    `R_t`。智能体持续采取动作并接收奖励，直到到达终止状态，此时该幕结束。


    **表 4.2** 针对服务犬 MDP 的相同随机策略，使用首次访问蒙特卡洛策略评估和带增量更新的首次访问蒙特卡洛策略评估计算出的状态价值。结果在 100
    次独立运行中取平均；每次运行包含 2000 幕；最后一行包含使用 DP 策略评估计算出的真实状态价值。本实验中使用相同的折扣率 `γ = 0.9`。


    | | 房间 1 | 房间 2 | 房间 3 | 室外 | 找到物品 |

    | --- | --- | --- | --- | --- | --- |

    | 首次访问 MC | −2.67 | −1.85 | 3.17 | −3.33 | 0 |

    | 增量首次访问 MC | −2.65 | −1.84 | 3.16 | −3.34 | 0 |

    | DP | −2.66 | −1.85 | 3.17 | −3.33 | 0 |


    在生成多幕之后，蒙特卡洛策略评估会计算在幕中被访问过的每个状态-动作对 `(s, a)` 的平均回报 `G_t`。这是通过平均每次访问该对 `(s, a)`
    后获得的回报来实现的，其中回报是从该时间步到该幕结束时的折扣奖励之和：


    ```

    G_t = R_t + γ R_{t+1} + γ² R_{t+2} + ... + γ^{T-1-t} R_{T-1}

    ```


    (4.3)


    这里，`T` 是该幕结束的时间步，`γ` 是折扣因子，它决定了未来奖励相对于即时奖励的重要性。


    一旦我们计算出了每个状态-动作对 `(s, a)` 的平均回报 `G_t`，我们就可以使用增量更新规则来更新 `Q_π(s, a)` 的估计值：


    ```

    Q_π(S_t, A_t) = Q_π(S_t, A_t) + (1 / N(S_t, A_t)) * (G_t - Q_π(S_t, A_t))

    ```


    (4.4)


    这里，`N(S_t, A_t)` 是状态-动作对 `(S_t, A_t)` 在幕中被访问的次数。


    首次访问蒙特卡洛策略评估是实现蒙特卡洛策略评估以估计 `Q_π` 的一种方法，它通过对该状态-动作对首次访问后获得的回报取平均来估计每个状态-动作对的价值。算法如下：


    **算法 4：** 针对 `Q[π]` 的带增量更新的首次访问蒙特卡洛策略评估


    一个标题为“针对 `Q_π` 的带增量更新的首次访问蒙特卡洛策略评估”的 8 行算法，接收以下输入，并输出输入策略 `π` 的估计状态价值函数 `Q_π`。待评估的策略
    `π`、折扣率 `γ` 以及幕数 `K`。


    图 4.3 展示了我们使用算法 4 为服务犬 MDP 的随机策略 `π` 计算出的状态-动作价值。和往常一样，结果在 100 次独立运行中取平均；每次运行包含
    2000 幕。请注意，状态价值是使用 DP 策略评估计算得出的。本实验中使用折扣率 `γ = 0.9`。


    我们可以通过使用这些状态-动作价值来计算状态价值来验证结果。回想一下，状态价值就是该状态所有状态-动作价值的加权和。


    ```

    V_π(s) = Σ_{a ∈ A} π(a|s) Q_π(s, a)

    ```


    (4.5)


    节点图运行如下。负 2.7，通过 `Q_π = -2.65` 得到负 1.8，通过 `Q_π = 1.86` 得到 3.0，通过 `Q_π = 10.0`
    得到 0.0。3.0 通过 `Q_π = -3.65` 回到负 1.8。负 1.8 回到负 2.7，并通过 `Q_π = -4.38` 和 `-2.99`
    指向负 3.4。


    **图 4.3** 使用带增量更新的首次访问蒙特卡洛策略评估为服务犬 MDP 的随机策略计算出的状态-动作价值。结果在 100 次运行中取平均；每次运行包含
    2000 幕。请注意，状态价值是使用 DP 策略评估计算得出的。本实验中使用相同的折扣率 `γ = 0.9`。


    如果我们观察状态 *房间 2*，动作 *去房间 1*、*去房间 3*、*去室外* 的状态-动作价值分别为 `-4.38`、`1.86`、`-2.99`。如果我们用选择每个动作的概率（均为
    `0.33`）进行加权，我们得到 `-4.38 * 0.33 + 1.86 * 0.33 - 2.99 * 0.33 = -1.82`，这非常接近使用 DP
    计算出的真实值 `-1.85`。同样的过程可以应用于状态 *房间 3*，我们得到价值 `-3.65 * 0.5 + 10 * 0.5 = 3.175`，这非常接近真实值
    `3.17`。

    '
- fmt: "### 4.3 Exploration vs. Exploitation\n\nIn reinforcement learning, the exploration-exploitation\
    \ trade-off arises when an agent must decide between taking actions that it already\
    \ knows to be good (exploitation) and taking actions that it has not yet tried,\
    \ in the hope of finding even better ones (exploration). The goal is to balance\
    \ the benefits of exploiting known actions with the potential rewards of exploring\
    \ new options.\n\nFor instance, consider a game of chess. A chess-playing agent\
    \ must explore new moves in order to improve its chances of winning. However,\
    \ it must also exploit the strategies it has already learned in order to maximize\
    \ its chances of success. This balance is critical to the agent’s overall performance,\
    \ as it cannot win by simply repeating the same moves over and over again, nor\
    \ can it win by making completely random moves.\n\nAnother example is a recommender\
    \ system that suggests products or services to users based on their past behavior.\
    \ The system must balance exploiting what it already knows about the user’s preferences\
    \ while exploring new products that the user may like. If the system only recommends\
    \ products that the user has already purchased or viewed, it may miss out on opportunities\
    \ to suggest new, interesting products that the user may enjoy.\n\nIn model-free\
    \ reinforcement learning methods that rely on value functions (such as Monte Carlo\
    \ methods), the exploration-exploitation trade-off is particularly important.\
    \ The agent must learn the value of each action by experiencing the rewards it\
    \ receives when taking that action in different states. However, it also needs\
    \ to explore new actions in order to discover whether there are even better actions\
    \ to take.\n\nIn contrast, in dynamic programming (DP), the agent assumes that\
    \ it has access to the model of the environment (i.e., the dynamics function and\
    \ reward function) and can therefore consider all possible outcomes when updating\
    \ its value function. This allows DP to avoid the exploration-exploitation trade-off.\n\
    \nTo better understand the issue of exploration vs. exploitation, let’s take a\
    \ look at the Bellman equations for the value function `V_π`, as shown in Eq.\
    \ (4.6):\n\n```\nV_π(s) = E_π[ R_t + γ V_π(S_{t+1}) | S_t = s ]\n       = Σ_{a\
    \ ∈ A} π(a|s) [ R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) V_π(s') ], for all s ∈ S\n```\n\
    \n(4.6)\n\nThe Bellman equation shows how the value of a state is related to the\
    \ values of its successor states, weighted by the probabilities of transitioning\
    \ to those states and the rewards received in those states. In DP, this equation\
    \ can be used to compute the value of each state, assuming that the agent has\
    \ access to the model of the environment.\n\nA 3-line code to compute state-action\
    \ value function using estimated state value function by DP policy improvement.\n\
    \nIn contrast, in model-free reinforcement learning, the agent must estimate the\
    \ value function by sampling the environment, which can be difficult when exploring\
    \ new actions. For example, imagine a robot that is trying to learn how to walk.\
    \ If it always chooses the same actions, it may not be able to discover the best\
    \ way to walk, because it has not explored enough of the state space. On the other\
    \ hand, if it always takes random actions, it may never make any progress, because\
    \ it is not exploiting the knowledge it has already gained.\n\nTo address this\
    \ issue, various exploration strategies have been proposed, such as `ε`-greedy,\
    \ where the agent takes a random action with probability `ε`, otherwise takes\
    \ the best known action with probability `1 - ε`. Other strategies include Upper\
    \ Confidence Bound (UCB), Thompson sampling can also be used to address the issue.\
    \ These strategies aim to balance exploration and exploitation by encouraging\
    \ the agent to try new actions while also exploiting the knowledge it has already\
    \ gained.\n\nIn summary, exploration vs. exploitation is a fundamental challenge\
    \ in reinforcement learning and is particularly important in model-free methods\
    \ that rely on value functions. Dynamic programming can avoid this challenge by\
    \ assuming access to the model of the environment, but this is not always possible\
    \ in practice. Various exploration strategies have been proposed to address this\
    \ issue, but finding the optimal balance between exploration and exploitation\
    \ remains an active area of research in reinforcement learning."
  raw: '## 4.3 Exploration vs. Exploitation


    In reinforcement learning, the exploration-exploitation trade-off arises when
    an agent must decide between taking actions that it already knows to be good (exploitation)
    and taking actions that it has not yet tried, in the hope of finding even better
    ones (exploration). The goal is to balance the benefits of exploiting known actions
    with the potential rewards of exploring new options.


    For instance, consider a game of chess. A chess-playing agent must explore new
    moves in order to improve its chances of winning. However, it must also exploit
    the strategies it has already learned in order to maximize its chances of success.
    This balance is critical to the agent’s overall performance, as it cannot win
    by simply repeating the same moves over and over again, nor can it win by making
    completely random moves.


    Another example is a recommender system that suggests products or services to
    users based on their past behavior. The system must balance exploiting what it
    already knows about the user’s preferences while exploring new products that the
    user may like. If the system only recommends products that the user has already
    purchased or viewed, it may miss out on opportunities to suggest new, interesting
    products that the user may enjoy.


    In model-free reinforcement learning methods that rely on value functions (such
    as Monte Carlo methods), the exploration-exploitation trade-off is particularly
    important. The agent must learn the value of each action by experiencing the rewards
    it receives when taking that action in different states. However, it also needs
    to explore new actions in order to discover whether there are even better actions
    to take.


    In contrast, in dynamic programming (DP), the agent assumes that it has access
    to the model of the environment (i.e., the dynamics function and reward function)
    and can therefore consider all possible outcomes when updating its value function.
    This allows DP to avoid the exploration-exploitation trade-off.


    To better understand the issue of exploration vs. exploitation, let’s take a look
    at the Bellman equations for the value function ![$$V_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq93.png)
    , as shown in Eq. ([4.6](#605748_1_En_4_Chapter.xhtml#Equ6)):


    ![$$\displaystyle \begin{aligned} \begin{aligned}[b] V_\pi(s) &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} V_\pi(S_{t+1}) \;\Big|\;S_t=s\right] \\ &amp; =\sum_{a \in A} \pi(a|s)
    \Big[R(s, a) + {\gamma} \sum_{s'' \in \mathcal{S}} P(s''|s, a) V_\pi(s'') \Big],
    \quad \mbox{for all}\; s \in \mathcal{S} \end{aligned} {} \end{aligned} $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_Equ6.png)


    (4.6)


    The Bellman equation shows how the value of a state is related to the values of
    its successor states, weighted by the probabilities of transitioning to those
    states and the rewards received in those states. In DP, this equation can be used
    to compute the value of each state, assuming that the agent has access to the
    model of the environment.


    ![](images/605748_1_En_4_Chapter/605748_1_En_4_Figaae_HTML.gif) A 3-line code
    to compute state-action value function using estimated state value function by
    D P policy improvement.


    In contrast, in model-free reinforcement learning, the agent must estimate the
    value function by sampling the environment, which can be difficult when exploring
    new actions. For example, imagine a robot that is trying to learn how to walk.
    If it always chooses the same actions, it may not be able to discover the best
    way to walk, because it has not explored enough of the state space. On the other
    hand, if it always takes random actions, it may never make any progress, because
    it is not exploiting the knowledge it has already gained.


    To address this issue, various exploration strategies have been proposed, such
    as ![$$\epsilon $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq94.png)
    -greedy, where the agent takes a random action with probability ![$$\epsilon $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq95.png)
    otherwise takes the best known action with probability ![$$1 - \epsilon $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq96.png)
    . Other strategies include Upper Confidence Bound (UCB), Thompson sampling can
    also be used to address the issue. These strategies aim to balance exploration
    and exploitation by encouraging the agent to try new actions while also exploiting
    the knowledge it has already gained.


    In summary, exploration vs. exploitation is a fundamental challenge in reinforcement
    learning and is particularly important in model-free methods that rely on value
    functions. Dynamic programming can avoid this challenge by assuming access to
    the model of the environment, but this is not always possible in practice. Various
    exploration strategies have been proposed to address this issue, but finding the
    optimal balance between exploration and exploitation remains an active area of
    research in reinforcement learning.'
  trans: "\n### 4.3 探索与利用\n\n在强化学习中，当智能体必须在执行已知的有利动作（利用）与尝试未执行过的动作以期望发现更优动作（探索）之间做出决策时，便产生了探索与利用的权衡问题。其目标是在利用已知动作的收益与探索新选项的潜在回报之间取得平衡。\n\
    \n例如，考虑一局国际象棋。一个下棋智能体必须探索新走法以提高获胜几率。但同时，它也必须利用已学会的策略来最大化成功概率。这种平衡对智能体的整体性能至关重要，因为仅仅重复相同走法无法获胜，而完全随机走棋同样无法取胜。\n\
    \n另一个例子是基于用户过往行为推荐产品或服务的推荐系统。该系统必须在利用已知的用户偏好与探索用户可能喜欢的新产品之间取得平衡。如果系统只推荐用户已购买或浏览过的产品，就可能错失推荐用户可能感兴趣的新颖产品的机会。\n\
    \n在依赖价值函数的无模型强化学习方法（如蒙特卡洛方法）中，探索与利用的权衡尤为重要。智能体必须通过在不同状态下执行动作所获得的奖励来学习每个动作的价值。然而，它也需要探索新动作，以发现是否存在更优的动作。\n\
    \n相比之下，在动态规划中，智能体假设可以访问环境模型（即动力学函数和奖励函数），因此在更新价值函数时能够考虑所有可能的结果。这使得动态规划能够避免探索与利用的权衡问题。\n\
    \n为了更好地理解探索与利用的问题，我们来看一下价值函数 `V_π` 的贝尔曼方程，如公式 (4.6) 所示：\n\n```\nV_π(s) = E_π[\
    \ R_t + γ V_π(S_{t+1}) | S_t = s ]\n       = Σ_{a ∈ A} π(a|s) [ R(s, a) + γ Σ_{s'\
    \ ∈ S} P(s'|s, a) V_π(s') ], 对于所有 s ∈ S\n```\n\n(4.6)\n\n贝尔曼方程展示了状态的价值如何与其后续状态的价值相关联，并通过转移到这些状态的概率以及在这些状态中获得的奖励进行加权。在动态规划中，假设智能体可以访问环境模型，该方程可用于计算每个状态的价值。\n\
    \n以下是一个通过动态规划策略改进，利用估计的状态价值函数计算状态-动作价值函数的三行代码。\n\n相比之下，在无模型强化学习中，智能体必须通过对环境进行采样来估计价值函数，这在探索新动作时可能很困难。例如，想象一个试图学习走路的机器人。如果它总是选择相同的动作，可能无法发现最佳的走路方式，因为它没有充分探索状态空间。另一方面，如果它总是采取随机动作，可能永远无法取得进展，因为它没有利用已获得的知识。\n\
    \n为了解决这个问题，研究者提出了多种探索策略，例如 `ε`-贪心策略，智能体以概率 `ε` 采取随机动作，否则以概率 `1 - ε` 采取已知的最佳动作。其他策略包括上置信界算法、汤普森采样也可用于解决该问题。这些策略旨在通过鼓励智能体尝试新动作，同时利用已获得的知识，来平衡探索与利用。\n\
    \n总之，探索与利用是强化学习中的一个基本挑战，在依赖价值函数的无模型方法中尤为重要。动态规划可以通过假设能访问环境模型来避免这一挑战，但在实践中这并非总是可行。研究者已提出多种探索策略来解决该问题，但寻找探索与利用之间的最优平衡仍是强化学习中一个活跃的研究领域。\n"
- fmt: "### Exploration with ε-Greedy Policy\n\nOne of the fundamental challenges\
    \ in reinforcement learning is finding a balance between exploration and exploitation.\
    \ Exploration is the process of trying out new actions to learn more about the\
    \ environment, while exploitation involves using the current knowledge to take\
    \ the best possible action in each state. The ε-greedy policy is a simple and\
    \ effective way to encourage exploration while still exploiting the current knowledge.\n\
    \nThe ε-greedy policy works by selecting a random action with probability ε and\
    \ with probability 1 - ε, it selects the best known action according to the current\
    \ state-action value function. The parameter ε controls the level of exploration,\
    \ where 0 ≤ ε ≤ 1. When ε is high, the agent will be more likely to explore the\
    \ environment by taking random actions. As ε decreases, the agent will rely more\
    \ on the current knowledge and choose the best known actions more frequently.\
    \ This gradual shift from exploration to exploitation is often necessary for the\
    \ agent to achieve good performance in a reinforcement learning task.\n\nFormally,\
    \ the ε-greedy policy is defined as\n\n```\nπ(a|s) = \n  case 1 - ε + ε/|A(s)|\
    \   if a = argmax_a Q_π(s, a)\n  case ε/|A(s)|           if a ≠ argmax_a Q_π(s,\
    \ a)\n```\n\nwhere `Q(s, a)` is the state-action value function, and `|A(s)|`\
    \ is the number of legal actions in state s. The policy selects the best known\
    \ action with probability 1 - ε + ε/|A(s)| and a random action with probability\
    \ ε/|A(s)|.\n\nFor example, suppose we are training an agent to play a simple\
    \ game where it needs to navigate a maze to reach a goal. At the start of training,\
    \ the agent has no knowledge of the environment, so it needs to explore to learn\
    \ about the maze layout and the effects of different actions. We might set ε to\
    \ a high value like 0.9 so that the agent explores more often. As the agent learns\
    \ more about the maze and gains more accurate estimates of the state-action values,\
    \ we can gradually decrease ε to encourage more exploitation of the current knowledge.\n\
    \nA common approach for scheduling the decay of ε is to use a decreasing function\
    \ over time. For example, we might use a linear schedule where we start with a\
    \ high value of ε and decrease it by a fixed amount of episodes or time steps\
    \ until it reaches a minimum value. Alternatively, we might use an exponential\
    \ decay schedule where ε is multiplied by a decay factor after each episode or\
    \ time step.\n\nIn summary, the ε-greedy policy is a simple yet effective way\
    \ to balance exploration and exploitation in reinforcement learning. The parameter\
    \ ε allows us to control the level of exploration, and we can gradually decrease\
    \ it over time as the agent gains more knowledge about the environment. The choice\
    \ of decay schedule and minimum value for ε depend on the specific application\
    \ and may require some trial and error to find the optimal values."
