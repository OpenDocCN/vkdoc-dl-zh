- fmt: '# 原始RND论文中的探索机制


    在原始RND论文中，Burda等人[[2]](#605748_1_En_13_Chapter.xhtml#CR2)发现，强化学习中的预测误差可能由多种因素引起，包括训练数据量、随机性、模型错误设定以及学习动态。为了利用这些信息进行探索，RND方法使用预测误差作为探索奖励。


    然而，RND中使用的固定目标网络使得训练预测器网络比学习最优策略容易得多。因此，随着预测器网络在预测结果方面变得更好，探索奖励的有效性可能会降低。为了解决这个问题，Burda等人[[2]](#605748_1_En_13_Chapter.xhtml#CR2)提出，当参与者数量非常大时，有意限制用于训练预测器网络的训练数据量。具体来说，他们建议根据公式`min(1,
    32/N)`使用可用样本的一部分，其中`N`是并行运行以生成训练样本的参与者数量。


    使用预测误差作为探索奖励的一个主要挑战是，不同环境和时间步之间的奖励尺度可能变化很大。为了保持奖励尺度一致，内在奖励通常会被归一化，例如通过使用内在回报的标准差的运行估计进行除法。


    RND方法的另一个问题是如何处理两个RND神经网络的输入数据。当使用固定目标网络时，观测归一化至关重要，因为参数无法适应不同数据集的尺度。如果没有归一化，输入的方差可能会变得非常高。RND方法通过使用一种观测归一化方案来解决这个问题，该方案类似于连续控制问题中使用的方案，即通过减去运行均值然后除以运行标准差来对每个维度进行白化处理。归一化后的观测值被裁剪到-5到5之间。运行均值和标准差通过在开始优化之前让随机智能体在环境中执行少量步数来初始化。相同的观测归一化同时用于预测器网络和目标网络，但不用于策略网络。


    通常，RND模块仅在训练期间使用，而不在智能体与环境交互期间使用。然而，在某些情况下，它可以集成到智能体的决策过程中。例如，Badia等人[[3]](#605748_1_En_13_Chapter.xhtml#CR3)开发的`Agent57`算法是`DQN`方法的进阶版本，它使用来自RND模块的内在奖励作为神经网络的输入数据，该神经网络近似最优状态-动作值函数，从而使智能体能够做出更明智的决策。


    本章将重点介绍将RND模块与近端策略优化（PPO）算法结合使用，PPO是一种流行的基于策略的方法。通过引入内在奖励，我们希望提高智能体的学习效率，并在复杂环境中实现更好的性能。


    ## RND与PPO结合


    近端策略优化（PPO）是一种流行的强化学习算法，它使用替代目标函数来更新策略。该替代目标函数最大化采取能够改进策略的动作的概率，同时确保策略不会偏离之前的策略太远。


    回顾一下，PPO使用以下裁剪后的替代目标函数：


    ```

    argmax_{π''} L_π^{CLIP}(π'') = argmax_{π''} E_{τ ~ π}[ min( (π''(a|s)/π(a|s))
    * Â_t, clip(π''(a|s)/π(a|s), 1-ε, 1+ε) * Â_t ) ]

    ```


    (13.2)


    优势函数使用广义优势估计（GAE）方法计算：


    ```

    Â_t = δ_t + (γλ)δ_{t+1} + (γλ)^2δ_{t+2} + ... + (γλ)^{T-t-1}δ_{T-1}

    ```


    (13.3)


    这里，`δ_t`是时序差分误差，即奖励总和与当前状态估计值及后继状态估计值之间的差值：


    ```

    其中 δ_t = r_t + γV_π(s_{t+1}) - V_π(s_t)

    ```


    (13.4)


    为了在PPO算法中使用RND产生的内在奖励，我们需要对现有的PPO算法进行一些修改。更准确地说，我们希望将外在和内在的估计优势合并为单一的优势估计。这意味着我们还必须估计内在状态值和优势。


    ```

    Â_t = Â_t^E + Â_t^I

    ```


    为了估计内在优势`Â_t^I`，我们需要估计的内在状态值；这就是为什么我们还需要使用神经网络（评论家）来预测内在状态值。这个神经网络可以与预测策略和外在状态值的网络同时训练，其目标与外在状态值的情况类似，即我们希望最小化预测误差。


    在实践中，我们可以将用于预测内在状态值的神经网络的权重与预测策略和外在状态值的网络共享。这有助于降低训练的计算成本，并使算法更高效。我们还使用了一个稍微复杂的神经网络架构，其中包含跳跃连接，这是从`ResNet`借鉴的概念，如图13.3所示。


    ![神经网络架构图](images/605748_1_En_13_Chapter/605748_1_En_13_Fig3_HTML.png)


    *PPO神经网络架构的自底向上流程图：从32个滤波器开始，内核大小为8x8，步长为4，通过ReLU连接分流到两组448个单元。左侧组通过SoftMax输出动作概率。右侧组输出外在和内在状态值。*


    **图13.3** Burda等人[[2]](#605748_1_En_13_Chapter.xhtml#CR2)为Atari视频游戏提出的结合RND的PPO神经网络架构，该网络具有三个输出头：用于预测动作概率的策略头、用于预测外在状态值的外在状态值头以及用于预测内在状态值的内在状态值头。


    作为示例，RND与PPO算法结合的伪代码如算法1所示。'
  raw: 'In the original RND paper, Burda et al. [[2](#605748_1_En_13_Chapter.xhtml#CR2)]
    found that prediction errors in reinforcement learning can be caused by a number
    of factors, including the amount of training data, stochasticity, model misspecification,
    and learning dynamics. To leverage this information for exploration, the RND approach
    uses prediction error as an exploration bonus.


    However, the fixed target network used in RND makes training the predictor network
    much easier than learning the optimal policy. As a result, the exploration bonus
    can become less effective as the predictor network becomes better at predicting
    outcomes. To address this, Burda et al. [[2](#605748_1_En_13_Chapter.xhtml#CR2)]
    proposed deliberately limiting the amount of training data used to train the predictor
    network, when the number of actors is very large. Specifically, they suggest using
    portion of the available samples according to this formula ![$$\min (1, \frac
    {32}{N})$$](images/605748_1_En_13_Chapter/605748_1_En_13_Chapter_TeX_IEq26.png)
    , where *N* is the number of actors running in parallel to generate training samples.


    A major challenge of using prediction error as an exploration bonus is that the
    scale of the reward can vary greatly between different environments and time steps.
    To keep the rewards on a consistent scale, the intrinsic reward is often normalized,
    for example by dividing it using the running estimate of the standard deviation
    of the intrinsic returns.


    Another issue with the RND approach is how to deal with input data for the two
    RND neural networks. Observation normalization is crucial when using a fixed target
    network since the parameters cannot adjust to the scale of different datasets.
    Without normalization, the variance of the inputs can become very high. The RND
    approach addresses this issue by using an observation normalization scheme, similar
    to that used in continuous control problems, whereby each dimension is whitened
    by subtracting the running mean and then dividing by the running standard deviation.
    The normalized observations are then clipped to be between -5 and 5\. The running
    mean and standard deviation are initialized by stepping a random agent in the
    environment for a small number of steps before beginning optimization. The same
    observation normalization is used for both predictor and target networks, but
    not for the policy network.


    Typically, the RND module is only used during training and not during the agent’s
    interaction with the environment. However, in certain cases, it can be integrated
    into the agent’s decision-making process. For instance, the Agent57 algorithm
    developed by Badia et al. [[3](#605748_1_En_13_Chapter.xhtml#CR3)] is an advanced
    version of the DQN method, which uses intrinsic rewards from the RND module as
    input data for the neural network, which approximates the optimal state-action
    value function, allowing the agent to make more informed decisions.


    This chapter will focus on using the RND module in conjunction with the Proximal
    Policy Optimization (PPO) algorithm, which is a popular policy-based method. By
    incorporating intrinsic rewards, we hope to improve the agent’s learning efficiency
    and achieve better performance in complex environments.


    ### RND with PPO


    Proximal Policy Optimization (PPO) is a popular reinforcement learning algorithm
    that uses a surrogate objective function to update the policy. The surrogate objective
    function maximizes the probability of taking actions that improve the policy while
    also ensuring that the policy doesn’t deviate too much from the previous policy.


    Recall that PPO uses this clipped surrogate objective function:


    ![$$\displaystyle \begin{aligned} \mathop{\text{argmax}}_{\pi''}\mathcal{L}_{\pi}^{CLIP}(\pi'')
    &amp; = \mathop{\text{argmax}}_{\pi''} \mathbb{E}_{\tau \sim \pi\!\!}\left[ \min
    \Biggl( \frac{\pi''(a|s)}{\pi(a|s)} \hat{A}_t, \; clip \left( \frac{\pi''(a|s)}{\pi(a|s)},
    1-\epsilon, 1+\epsilon \right)\hat{A}_t \Biggr)\right]\\ \end{aligned} $$](images/605748_1_En_13_Chapter/605748_1_En_13_Chapter_TeX_Equ2.png)


    (13.2)


    The advantage function is calculated using the generalized advantage estimation
    (GAE) method:


    ![$$\displaystyle \begin{aligned} \hat{A}_t = \delta_t + ({\gamma} \lambda) \delta_{t+1}
    + ({\gamma} \lambda)^2 \delta_{t+2} + \cdots + (\gamma \lambda)^{T-t-1} \delta_{T-1}
    \end{aligned} $$](images/605748_1_En_13_Chapter/605748_1_En_13_Chapter_TeX_Equ3.png)


    (13.3)


    Here, ![$$\delta _t$$](images/605748_1_En_13_Chapter/605748_1_En_13_Chapter_TeX_IEq27.png)
    is the temporal difference error, which is the difference between the sum of the
    rewards and the estimated value of the current state and the estimated value of
    the successor state:


    ![$$\displaystyle \begin{aligned} \text{where} \; \delta_t = r_t + {\gamma} V_\pi(s_{t+1})
    - V_\pi(s_t) \end{aligned} $$](images/605748_1_En_13_Chapter/605748_1_En_13_Chapter_TeX_Equ4.png)


    (13.4)


    In order to use the intrinsic rewards produced by RND in the PPO algorithm, we
    need to make some modifications to the existing PPO algorithm. More precisely,
    we want to combine the extrinsic and intrinsic estimated advantages as a single
    advantage estimation. This means that we also have to estimate the intrinsic state
    values and advantages.


    ![$$\displaystyle \begin{aligned} \hat{A}_t = \hat{A}_t^{E} + \hat{A}_t^{I} \end{aligned}
    $$](images/605748_1_En_13_Chapter/605748_1_En_13_Chapter_TeX_Equa.png)


    To estimate the intrinsic advantages ![$$\hat {A}_t^{I}$$](images/605748_1_En_13_Chapter/605748_1_En_13_Chapter_TeX_IEq28.png)
    , we need the estimated intrinsic state values; that’s why we also need to use
    the neural network (Critic) to predict the intrinsic state values. This neural
    network can be trained simultaneously with the network that predicts the policy
    and extrinsic state values, and the objective is similar to the extrinsic state
    value case, where we want to minimize the prediction error.


    In practice, we can share the weights of the neural network used to predict the
    intrinsic state values with the network that predicts the policy and extrinsic
    state values. This can help to reduce the computational cost of training and make
    the algorithm more efficient. We also use a slightly more complex neural network
    architecture, which involves skip connection, as a concept borrowed from ResNet,
    as shown in Fig. [13.3](#605748_1_En_13_Chapter.xhtml#Fig3).


    ![](images/605748_1_En_13_Chapter/605748_1_En_13_Fig3_HTML.png)


    A bottom-up flowchart for the P P O neural network architecture starts with 32
    filters, kernel size 8 times 8, stride 4 and flows through R e L u links to segment
    into two sets of 448 units. The left set ends with action probabilities post N
    units via SoftMax. The right set ends with extrinsic and intrinsic state values.


    Fig. 13.3


    The neural network architecture for PPO with RND proposed by Burda et al. [[2](#605748_1_En_13_Chapter.xhtml#CR2)]
    for the Atari video game, where the network has three output heads: the policy
    head to predict the action probabilities, the extrinsic state value head to predict
    the extrinsic state value, and intrinsic state value head to predict the intrinsic
    state value


    As an example, the pseudocode for the RND combined with the PPO algorithm is shown
    in Algorithm 1.'
  trans: '

    # 原始 RND 论文中的探索机制


    在原始 RND 论文中，Burda 等人[[2]](#605748_1_En_13_Chapter.xhtml#CR2)发现，强化学习中的预测误差可能由多种因素引起，包括训练数据量、随机性、模型错误设定以及学习动态。为了利用这些信息进行探索，RND
    方法使用预测误差作为探索奖励。


    然而，RND 中使用的固定目标网络使得训练预测器网络比学习最优策略容易得多。因此，随着预测器网络在预测结果方面变得更好，探索奖励的有效性可能会降低。为了解决这个问题，Burda
    等人[[2]](#605748_1_En_13_Chapter.xhtml#CR2)提出，当参与者数量非常大时，有意限制用于训练预测器网络的训练数据量。具体来说，他们建议根据公式`min(1,
    32/N)`使用可用样本的一部分，其中`N`是并行运行以生成训练样本的参与者数量。


    使用预测误差作为探索奖励的一个主要挑战是，不同环境和时间步之间的奖励尺度可能变化很大。为了保持奖励尺度一致，内在奖励通常会被归一化，例如通过使用内在回报的标准差的运行估计进行除法。


    RND 方法的另一个问题是如何处理两个 RND 神经网络的输入数据。当使用固定目标网络时，观测归一化至关重要，因为参数无法适应不同数据集的尺度。如果没有归一化，输入的方差可能会变得非常高。RND
    方法通过使用一种观测归一化方案来解决这个问题，该方案类似于连续控制问题中使用的方案，即通过减去运行均值然后除以运行标准差来对每个维度进行白化处理。归一化后的观测值被裁剪到-5
    到 5 之间。运行均值和标准差通过在开始优化之前让随机智能体在环境中执行少量步数来初始化。相同的观测归一化同时用于预测器网络和目标网络，但不用于策略网络。


    通常，RND 模块仅在训练期间使用，而不在智能体与环境交互期间使用。然而，在某些情况下，它可以集成到智能体的决策过程中。例如，Badia 等人[[3]](#605748_1_En_13_Chapter.xhtml#CR3)开发的`Agent57`算法是`DQN`方法的进阶版本，它使用来自
    RND 模块的内在奖励作为神经网络的输入数据，该神经网络近似最优状态-动作值函数，从而使智能体能够做出更明智的决策。


    本章将重点介绍将 RND 模块与近端策略优化（PPO）算法结合使用，PPO 是一种流行的基于策略的方法。通过引入内在奖励，我们希望提高智能体的学习效率，并在复杂环境中实现更好的性能。


    ## RND 与 PPO 结合


    近端策略优化（PPO）是一种流行的强化学习算法，它使用替代目标函数来更新策略。该替代目标函数最大化采取能够改进策略的动作的概率，同时确保策略不会偏离之前的策略太远。


    回顾一下，PPO 使用以下裁剪后的替代目标函数：


    ```

    argmax_{π''} L_π^{CLIP}(π'') = argmax_{π''} E_{τ ~ π}[ min( (π''(a|s)/π(a|s))
    * Â_t, clip(π''(a|s)/π(a|s), 1-ε, 1+ε) * Â_t ) ]

    ```


    (13.2)


    优势函数使用广义优势估计（GAE）方法计算：


    ```

    Â_t = δ_t + (γλ)δ_{t+1} + (γλ)²δ_{t+2} + ... + (γλ)^{T-t-1}δ_{T-1}

    ```


    (13.3)


    这里，`δ_t`是时序差分误差，即奖励总和与当前状态估计值及后继状态估计值之间的差值：


    ```

    其中 δ_t = r_t + γV_π(s_{t+1}) - V_π(s_t)

    ```


    (13.4)


    为了在 PPO 算法中使用 RND 产生的内在奖励，我们需要对现有的 PPO 算法进行一些修改。更准确地说，我们希望将外在和内在的估计优势合并为单一的优势估计。这意味着我们还必须估计内在状态值和优势。


    ```

    Â_t = Â_t^E + Â_t^I

    ```


    为了估计内在优势`Â_t^I`，我们需要估计的内在状态值；这就是为什么我们还需要使用神经网络（评论家）来预测内在状态值。这个神经网络可以与预测策略和外在状态值的网络同时训练，其目标与外在状态值的情况类似，即我们希望最小化预测误差。


    在实践中，我们可以将用于预测内在状态值的神经网络的权重与预测策略和外在状态值的网络共享。这有助于降低训练的计算成本，并使算法更高效。我们还使用了一个稍微复杂的神经网络架构，其中包含跳跃连接，这是从`ResNet`借鉴的概念，如图
    13.3 所示。


    ![神经网络架构图](img/605748_1_En_13_Fig3_HTML.png)


    *PPO 神经网络架构的自底向上流程图：从 32 个滤波器开始，内核大小为 8x8，步长为 4，通过 ReLU 连接分流到两组 448 个单元。左侧组通过
    SoftMax 输出动作概率。右侧组输出外在和内在状态值。*


    **图 13.3** Burda 等人[[2]](#605748_1_En_13_Chapter.xhtml#CR2)为 Atari 视频游戏提出的结合 RND
    的 PPO 神经网络架构，该网络具有三个输出头：用于预测动作概率的策略头、用于预测外在状态值的外在状态值头以及用于预测内在状态值的内在状态值头。


    作为示例，RND 与 PPO 算法结合的伪代码如算法 1 所示。

    '
- fmt: '# Algorithm 1: RND and Proximal Policy Optimization


    ![](images/605748_1_En_13_Chapter/605748_1_En_13_Figaaa_HTML.gif) An 18-line algorithm
    for `RND` and proximal policy optimization with the following inputs which give
    the approximated optimized policy `pie_theta` as the output. `Gamma`, `alpha`,
    `beta`, `N`, `epsilon`, `M`, `L`, and `K`.


    Figure [13.4](#605748_1_En_13_Chapter.xhtml#Fig4) shows the performance of the
    `PPO` (clipped version) agent with the `RND` module on the Atari video game Montezuma’s
    Revenge.


    ![](images/605748_1_En_13_Chapter/605748_1_En_13_Fig4_HTML.png)


    A line graph of evaluation episode return versus training environment frames.
    It plots a rising trend with minor fluctuations. Some of the estimated values
    are as follows. (10 million, 3800), (15 million, 6500), and (20 million, 7000).


    **Fig. 13.4** PPO with the `RND` module on the Atari video game Montezuma’s Revenge.
    The results display the average episode return (total undiscounted rewards) and
    a 95% confidence interval. The results were averaged over three independent runs
    and then smoothed using a moving average with a window size of five.


    We use a distributed reinforcement learning architecture, where we run 32 actors
    in parallel to collect sample sequences, and a single learner agent to perform
    parameter updates. We use the same neural network architecture as explained earlier
    in this chapter for both `PPO` and `RND`. Specifically, we use different discount
    rates for extrinsic (environment) and intrinsic (curiosity bonus) rewards, with
    0.999 for the extrinsic reward and 0.99 for the intrinsic reward. We use a learning
    rate of 0.0001 for both `PPO` policy and `RND` predictor networks, `GAE` lambda
    of 0.95 for the advantages, sequence length of 128, and four update epochs. We
    also use entropy to encourage exploration, with an entropy weight of 0.001. The
    neural networks were trained using the `Adam` optimizer.


    We use a similar environment processing as `DQN`, which involves resizing the
    frame to `84 x 84` and converting it to grayscale. We also apply the skip action
    technique, where we only process every fourth frame, and we stack the last four
    frames to create a final state image of size `84 x 84 x 4`. For `RND` networks,
    we only take the last frame as input, which is an `84 x 84 x 1` image.


    Additionally, we clip the reward values to the range of `-1` to 1, and we set
    the maximum episode length to 18,000, which is 4500 steps after applying a skip
    action and frame skip.


    Performance is measured in terms of the average reward obtained. To evaluate the
    agent’s performance, we ran 100,000 evaluation steps on a separate testing environment
    with a greedy policy at the end of each training iteration, which consisted of
    `128 x 500 x 4` frames from each actor, where no reward clipping or soft termination
    on loss of life is applied to the evaluation environment. The results were averaged
    over three independent runs and smoothed using a moving average with a window
    size of five.


    Figure [13.5](#605748_1_En_13_Chapter.xhtml#Fig5) also shows the average number
    of rooms found by the agent per evaluation game. Visiting more rooms indicates
    that the agent has explored more states of the game, which often results in finding
    hidden treasures and earning large rewards.


    ![](images/605748_1_En_13_Chapter/605748_1_En_13_Fig5_HTML.png)


    A line graph of evaluation episode number of rooms found versus training environment
    frames plots a rising trend with minor fluctuations. Some of the estimated values
    are as follows. (10 million, 7), (15 million, 10), and (20 million, 11.5).


    **Fig. 13.5** PPO with the `RND` module on the Atari video game Montezuma’s Revenge.
    The results display the average number of rooms found by the agent and a 95% confidence
    interval. The results were averaged over three independent runs and then smoothed
    using a moving average with a window size of five.


    It is important to note that the x-axis in the preceding plots represents the
    number of training environment frames per actor only. To obtain the total number
    of training environment frames, we need to multiply this value by the number of
    actors involved in the training process. In our case, the total number of training
    environment frames is 0.64 billion, which was obtained by multiplying 20 million
    by 32, the number of actors involved in the training process.


    The results of the experiment appear promising at first glance, but upon closer
    inspection of the recorded gameplay, it is evident that the agent did not truly
    master the game. For instance, in the first room, after collecting the key, the
    agent failed to use the ladders to ascend to the top of the room, which would
    have been the reverse of the sequence it used to reach the key. Instead, it opted
    to jump off a high wall, resulting in a loss of life.


    In another example, in some of the rooms, the agent missed the opportunity to
    descend the ladder to move to the next room, and, instead, it chose to fight with
    a devil character, which was impossible to defeat and led to the loss of another
    life.


    These and other similar suboptimal actions throughout the gameplay reveal that
    while curiosity-driven exploration can encourage an agent to tackle complex and
    challenging problems, it does not guarantee that the learned policy will always
    be optimal. This is because the objective of curiosity-driven exploration is fundamentally
    different from the goal of the policy. Consequently, this issue has spurred active
    research into safe exploration for reinforcement learning [[4](#605748_1_En_13_Chapter.xhtml#CR4),
    [5](#605748_1_En_13_Chapter.xhtml#CR5)].


    ## 13.4 Summary


    This chapter delved into the challenges posed by hard-to-explore problems and
    sparse reward problems in reinforcement learning. We explored the fundamental
    difficulties faced by RL agents when navigating these types of problems, where
    exploration and the scarcity of reward signals hinder learning progress.


    To address these challenges, we introduced the concept of curiosity-driven exploration.
    This technique empowers agents to construct their intrinsic rewarding system,
    which aids in overcoming complex RL problems. We presented a particularly intriguing
    and practical approach known as Random Network Distillation (`RND`). We delved
    into the inner workings of `RND` and its underlying intuition. By combining `RND`
    with the Proximal Policy Optimization (`PPO`) algorithm, we demonstrated the remarkable
    performance achieved by agents in Montezuma’s Revenge, one of the most demanding
    Atari video games.


    Importantly, curiosity-driven exploration encourages agents to seek out novel
    and interesting experiences to enhance their knowledge and skills, while the policy
    remains focused on optimizing the agent’s performance in accomplishing specific
    tasks or goals. It is worth noting that while curiosity-driven exploration can
    greatly enhance an agent’s overall learning capabilities, it may not necessarily
    guarantee optimal performance in all scenarios.


    Looking ahead, the next chapter will shift our focus to model-based learning.
    Specifically, we will explore the renowned `AlphaZero` agent, which has surpassed
    human mastery in games such as Go, Chess, and Shogi.


    **Footnotes** [1](#605748_1_En_13_Chapter.xhtml#Fn1_source)'
