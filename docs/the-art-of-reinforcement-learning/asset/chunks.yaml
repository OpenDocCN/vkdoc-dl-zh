    ### 自适应 KL 惩罚


    自适应 KL 惩罚是近端策略优化（PPO）算法的一种变体，旨在防止可能导致不稳定的过大策略更新。在标准的裁剪版 PPO 中，新旧策略之间的概率比被裁剪在特定范围内。这种方法约束了替代目标函数，其效果与将
    KL 散度作为约束条件相同。


    相比之下，自适应 KL 散度惩罚方法提出将 KL 散度作为惩罚项添加到替代目标函数中，而不是将其用作约束条件。此外，自适应 KL 散度惩罚会根据策略更新的幅度来调整惩罚力度。


    将 KL 散度作为惩罚项的替代目标函数可以写为：


    ![$$\displaystyle \begin{aligned} \mathop{\text{argmax}}_{\pi''}\mathcal{L}_{\pi}(\pi'')
    - \beta \bar{D}_{KL}(\pi''||\pi) \end{aligned} $$](img/605748_1_En_11_Chapter_TeX_Equ20.png)


    (11.19) 其中 ![$$\beta $$](img/605748_1_En_11_Chapter_TeX_IEq151.png) 控制惩罚的强度，而
    ![$$\bar {D}_{KL}(\pi ''||\pi )$$](img/605748_1_En_11_Chapter_TeX_IEq152.png)
    是新旧策略之间估计的平均 KL 散度。


    与裁剪版本不同，KL 散度在此不作为替代目标函数的约束条件。相反，它被用作由参数 ![$$\beta $$](img/605748_1_En_11_Chapter_TeX_IEq153.png)
    控制的惩罚项。如果 KL 散度很高，惩罚项也会很高。这里，![$$\beta $$](img/605748_1_En_11_Chapter_TeX_IEq154.png)
    在学习过程中的每次迭代都会进行调整，使其成为一种自适应 KL 惩罚。此外，还可以使用目标 KL 散度 ![$$\delta $$](img/605748_1_En_11_Chapter_TeX_IEq155.png)
    来调整 ![$$\beta $$](img/605748_1_En_11_Chapter_TeX_IEq156.png)。


    为了估计新策略与旧策略之间的平均 KL 散度，我们使用了一种近似方法。这种近似是必要的，因为由于某些环境的状态空间很大，计算精确的 KL 散度通常是不可行的。目标
    KL 散度 ![$$\delta $$](img/605748_1_En_11_Chapter_TeX_IEq157.png) 可用于调整 ![$$\beta
    $$](img/605748_1_En_11_Chapter_TeX_IEq158.png) 参数，使其成为自适应 KL 惩罚。


    算法 2 展示了采用自适应 KL 散度惩罚的 PPO 算法的伪代码：


    **算法 2：** 具有自适应 KL 惩罚的近端策略优化算法


    ![](img/605748_1_En_11_Figaab_HTML.gif) 一个方框列出了算法 2，即具有自适应 KL 惩罚的近端策略优化算法。输入包括折扣率
    `gamma`、学习率 `alpha` 和 `beta`、序列长度、散度 `delta`、更新轮数 `M`、环境步数 `K`。输出是近似最优策略 `Pi`
    下标 `theta`。


    虽然 PPO 的两种版本都能很好地工作，但在实践中，由于裁剪替代目标函数更简单、更稳定，因此通常更受青睐。


    简单性指的是，与 KL 惩罚版本相比，裁剪替代目标函数更容易实现和调参。KL 惩罚版本需要为惩罚项调整一个额外的超参数，这可能既耗时又难以优化。


    稳定性提升指的是，与 KL 惩罚版本相比，裁剪替代目标函数在训练过程中更不容易出现不稳定或发散的情况。KL 惩罚版本对惩罚系数的选择更为敏感，当系数设置不正确时，可能导致训练不稳定。裁剪替代目标函数直接限制了策略更新的幅度，防止了可能破坏训练稳定性的过大变化。


    总之，虽然 PPO 替代目标函数的两种版本都可能有效，但在实践中，由于裁剪替代目标函数更简单、更稳定，因此通常更受青睐。


    图 11.2 展示了在 Atari 视频游戏 Pong 上，使用裁剪替代目标函数的 PPO 智能体与 Actor-Critic 智能体之间的性能对比。性能通过获得的平均奖励来衡量。为了评估智能体的性能，我们在一个独立的测试环境中运行了
    200,000 个评估步骤，该环境在每个训练迭代结束时使用贪婪策略，每个训练迭代包含 250,000 个训练步骤或 100 万帧，评估环境中未应用奖励裁剪或生命丢失的软终止。结果取三次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    ![](img/605748_1_En_11_Fig2_HTML.png)


    一个折线图绘制了 PPO 和 Actor-Critic 的每集回报与训练环境帧数的关系曲线。数据如下。PPO：(1000 万, 8), (2000 万, 18),
    (3000 万, 19)。Actor-Critic：(-21, 1000 万), (2000 万, 0), (3000 万, 15)。数值为估计值。


    **图 11.2** PPO 与 Actor-Critic 在 Atari Pong 上的对比。结果显示了平均每集回报（总未折扣奖励）和 95% 置信区间。结果取三次独立运行的平均值，然后使用窗口大小为
    5 的移动平均进行平滑处理


    我们对 PPO 和 Actor-Critic 智能体使用相同的神经网络架构和超参数。具体来说，我们使用折扣率 ![$${\gamma }=0.99$$](img/605748_1_En_11_Chapter_TeX_IEq159.png)、学习率
    0.00025 和序列长度 128，对于 PPO，我们重复使用相同的转移序列在 4 个轮次上更新策略参数。我们还使用熵来鼓励探索，熵权重为 0.025。为了保持设置相似，我们对两个智能体都使用了如公式
    (11.15) 中介绍的广义优势估计，并使用 GAE lambda 0.95。神经网络使用 Adam 优化器进行训练。


    我们使用与 DQN 相同的环境处理方式，包括将帧大小调整为 ![$$84 \times 84$$](img/605748_1_En_11_Chapter_TeX_IEq160.png)
    并将其转换为灰度图。我们还应用了“跳帧”技术，即每四帧只处理一帧，并堆叠最后四帧以创建大小为 ![$$84 \times 84 \times 4$$](img/605748_1_En_11_Chapter_TeX_IEq161.png)
    的最终状态图像。


    此外，我们将奖励值裁剪到 ![$$-1$$](img/605748_1_En_11_Chapter_TeX_IEq162.png) 到 1 的范围内，并将失去一条命视为“软终止”状态。


    我们可以看到，PPO 智能体显然具有其优势。

