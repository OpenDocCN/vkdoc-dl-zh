    ### Temporal Difference Policy Evaluation for State-Action Value Function


    In this section, we describe how to extend the TD(0) algorithm to estimate the
    state-action value function ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq68.png)
    . This is important because we need ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq69.png)
    to make better decisions using policy improvement, just like we did with the Monte
    Carlo methods.


    Recall the Bellman expectation equation for ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq70.png)
    :


    ![$$\displaystyle \begin{aligned} Q_\pi(s, a) &amp; =\mathbb{E}_{\pi\!\!}\left[G_t
    \;\Big|\; S_t=s, A_t=a\right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t + {\gamma}
    R_{t+1} + {\gamma}^2 R_{t+2} + \cdots \;\Big|\; S_t=s, A_t=a\right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} G_{t+1} \;\Big|\; S_t=s, A_t=a\right] \\ &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} Q_\pi(S_{t+1}, A_{t+1}) \;\Big|\; S_t=s, A_t=a\right] {} \end{aligned}
    $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ4.png)


    (5.4)


    Here, we use ![$$R_t + {\gamma } Q_\pi (S_{t+1}, A_{t+1})$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq71.png)
    to replace the return ![$$G_t$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq72.png)
    . To estimate ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq73.png)
    , we need to collect a tuple of ![$$(s, a, r, s'', a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq74.png)
    and update the value based on the state-action pair ![$$(s, a)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq75.png)
    . The equation for updating estimated values is


    ![$$\displaystyle \begin{aligned} Q_\pi(S_t, A_t)=Q_\pi(S_t, A_t) + \alpha \bigg(
    \Big[ R_t + {\gamma} Q_\pi(S_{t+1}, A_{t+1}) \Big] - Q_\pi(S_t, A_t) \bigg) {}
    \end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ5.png)


    (5.5)


    The overall process is very similar to TD(0) policy evaluation for ![$$V_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq76.png)
    , but there are some key differences:


    *   We need to collect tuples of ![$$(s, a, r, s'', a'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq77.png)
    instead of ![$$(s, a, r, s'')$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq78.png)
    to estimate ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq79.png)
    .


    *   The value update is based on the state-action pair ![$$(s, a)$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq80.png)
    .


    By estimating the state-action value function ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq81.png)
    , we can make better decisions using policy improvement. ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq82.png)
    tells us the expected value of taking a particular action in a given state, which
    is important information for choosing actions that lead to higher rewards. Moreover,
    ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq83.png)
    is related to the value function ![$$V_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq84.png)
    , which tells us the expected value of being in a given state and taking actions
    according to a given policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq85.png)
    . Specifically, ![$$V_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq86.png)
    can be expressed as the expected value of ![$$Q_\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq87.png)
    over all possible actions, weighted by the probability of taking each action under
    the policy ![$$\pi $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq88.png)
    .'
