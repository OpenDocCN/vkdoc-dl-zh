    ## 8.3 优势函数与决斗网络架构


    由 Wang 等人 [4] 提出的优势函数和决斗网络架构是对标准 DQN 算法的另一项改进。


    在强化学习中，对于给定策略 `π`，状态-动作值函数（记为 `Q_π`）用于确定在给定状态下应采取的最佳动作。最佳动作通过选择产生最高状态-动作值的动作来确定，即
    `argmax_a Q_π(s, a)`。然而，这并不能提供某个动作相比其他动作好多少的信息。为了解决这个问题，Baird 于 1993 年引入了优势函数。优势函数衡量智能体在给定状态
    `s` 下采取特定动作 `a` 所获得的增益或优势。优势函数通过从状态-动作值 `Q_π(s, a)` 中减去状态值 `V_π(s)` 来计算，如公式 (8.10)
    所示。


    ```

    A_π(s, a) = Q_π(s, a) - V_π(s)   (8.10)

    ```


    优势函数帮助我们衡量一个动作相比其他动作是好多少还是差多少。这很有用，因为状态值函数 `V_π` 和状态-动作值函数 `Q_π` 可能基于给定状态 `s`
    关注不同的特征。由于 `V_π` 对所有动作取平均值，而 `Q_π` 只关注一个特定动作，我们可以使用优势函数重写状态-动作值函数，如公式 (8.11) 所示。


    ```

    Q_π(s, a) = V_π(s) + A_π(s, a)   (8.11)

    ```


    当使用神经网络来近似 `Q_π` 或 `V_π` 时，公式 (8.11) 可以重写为公式 (8.12)，其中 `β, δ` 表示近似函数 `V̂, Â`
    的参数。


    ```

    Q̂(s, a; β, δ) = V̂(s; β) + Â(s, a; δ)   (8.12)

    ```

