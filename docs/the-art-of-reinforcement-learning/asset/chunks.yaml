    inputs to give the estimated state value function V pie for the input policy pie
    as the output. Policy pie to be evaluated, discount rate gamma, step size alpha,
    and number of steps K.


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Fig1_HTML.png)


    A flowchart for the service dog M D P flows through rooms 1, 2, and 3 to reach
