  trans: '

    ### 在必败对局中认输


    在自我对弈过程中，AlphaZero 使用一种认输机制，以避免在明显必败的对局中浪费计算资源。该算法通过检查评估后的对局结果，并在玩家明显处于劣势时选择认输来实现这一点。这一过程发生在运行
    800 次蒙特卡洛树搜索（MCTS）迭代之后。如果 MCTS 搜索树根节点的平均状态-动作值低于某个阈值，例如 `-0.9`，玩家就会选择认输，而不是继续对局。


    需要注意的是，自动认输机制仅在对局达到一定步数后才会触发，例如，每位玩家已下 10 或 20 步。在对局开始时主动认输是没有意义的。


    然而，为了衡量认输对局的误报率，AlphaZero 有意在 10% 的自我对弈中禁用认输操作。在这种情况下，智能体将一直对弈直到终局。认输机制是 AlphaZero
    算法的一个关键部分，因为它有助于算法将计算资源集中在更有机会获胜的对局上。这反过来又帮助算法更快地学习，并从长远来看取得更好的结果。


    ### 用于训练的训练样本


    生成这些自我对弈对局的目的是收集用于训练神经网络的样本。具体来说，对于每一场自我对弈，我们收集时间步 `0 ≤ t ≤ T` 的转换元组 `(s_t, π_t,
    z_t)`。其中，`s_t` 是时间步 `t` 时的游戏状态，对于围棋来说，它是一个维度为 `19 × 19 × 17` 的堆叠二进制特征平面。`π_t`
    是来自时间步 `t` 的更强的 MCTS 搜索策略，而 `z_t` 是蒙特卡洛样本回报 `G_t = R_t + R_{t+1} + R_{t+2} + ...
    + R_{T-1}`，无折扣。由于非终局状态的所有奖励均为零，这简化为 `G_t = R_{T-1}`，即实际对局结果：输为 -1，平局为 0，赢为 +1。


    这种将最终对局结果分配给每一步的机制有助于解决信用分配问题。因此，智能体做出的所有决策都根据自我对弈的最终结果获得等量的信用。


    所有 `(s_t, π_t, z_t)` 都从时间步 `t` 时当前玩家的视角来表示。例如，如果自我对弈以黑棋获胜结束，那么对于每个时间步 `t = 0,
    1, 2, ..., T`，如果在时间步 `t` 轮到黑棋走，我们设置 `z_t = +1`；相反，如果在时间步 `t` 轮到白棋走，则 `z_t = -1`。`s_t`
    和 `π_t` 也同理。


    然后，AlphaZero 将数百万个最近的自我对弈对局存储到一个经验回放缓冲区中，这与 DQN 算法的做法非常相似。这些自我对弈对局随后被用于训练神经网络。而自我对弈的参与者会定期切换到最新的神经网络，以生成更多的样本对局。

    '
- fmt: '### Training


    The objective of training the AlphaZero is to learn a policy that maximizes the
    expected return of a particular game, such as Go. Specifically, AlphaZero aims
    to maximize the expected return of the game from a given state, which is estimated
    using a value network.


    Although AlphaZero uses a neural network to approximate the optimal policy, which
    is typically what policy-based methods do, it is not the same as any of the policy-based
    reinforcement learning algorithms such as `REINFORCE` or `Actor-Critic` we’ve
    discussed in the book. For AlphaZero, the objective function to optimize the policy
    is different from the policy gradient methods. The neural network is trained to
    maximize the similarity of the neural network’s move probabilities `p_t` to the
    MCTS search probabilities `π_t` using a form of supervised learning known as cross-entropy
    loss. This method is often used in the case of multiclass classification.


    The objective for training the policy network for AlphaZero can be written as:


    ```

    L_policy = - Σ_a π(a|s) log p(a|s)

    ```


    (14.6) where `p(a|s)` is the predicted probability of selecting action `a` in
    state `s` by the policy network, and `π(a|s)` is the target probability of selecting
    action `a` in state `s` obtained from the self-play games.


    Thus, the policy objective function for AlphaZero can be seen as a form of maximum
    likelihood estimation. In maximum likelihood estimation, we seek to find the parameters
    of a statistical model that maximize the likelihood of the observed data. In the
    case of AlphaZero, the policy network is a statistical model that predicts the
    probability distribution over actions for a given state. The self-play game provides
    us with observed actions taken by the network in each state.


    Although cross-entropy is often used in supervised learning, we should not categorize
    the AlphaZero as supervised learning, since the agent does not use any data provided
    by any form of supervisors (humans, for example). Instead, the neural network
    is trained using a variant of reinforcement learning called self-play, where the
    agent learns to improve its performance by playing against itself and adjusting
    its weights based on the outcomes of those games. This process is similar to how
    humans learn through trial and error, receiving feedback in the form of rewards
    or punishments.


    During training, AlphaZero learns by playing against itself repeatedly, evaluating
    the outcomes of each game, and adjusting its neural network weights to improve
    performance. AlphaZero’s neural network is trained using a combination of self-play
    and Monte Carlo Tree Search (MCTS) to improve its game-playing ability.


    MCTS plays a crucial role in AlphaZero by enabling the agent to evaluate and select
    the best move in each game state. This process is iterative and leads to policy
    improvement as the system learns from its experiences and gradually improves its
    game-playing ability.


    The neural network for AlphaZero is also trained to minimize the error between
    the predicted state value `v_t` and the game outcome `z_t` from self-play, which
    is often called the mean-squared error (MSE), as shown in the following equation:


    ```

    L_value = (v - z)^2

    ```


    (14.7)


    Since we’re using a single neural network with shared weights to represent the
    policy and value function, the final objective function for AlphaZero is the combined
    policy objective `L_policy` and value objective `L_value`, which can be written
    using matrix forms, as shown in the following equation:


    ```

    l = (z - v)^2 - π^T log p + c ||θ||^2

    ```


    (14.8) where `z` is the true outcome of the game, `v` is the predicted outcome
    of the game, `π` is the policy vector, `p` is the predicted policy vector, `θ`
    is the parameter vector of the neural network, `(p, v) = f_θ(s)` represents the
    output of the neural network given a state `s`, and `c` is a hyperparameter that
    controls the level of L2 weight regularization to prevent the network from overfitting.


    Note that in AlphaZero, the MSE loss for the state value is given the same weight
    as the cross-entropy loss for the policy, which differs from the traditional `Actor-Critic`
    algorithm that employs a coefficient to weight the loss of the state value function,
    in case we approximate the policy and value functions using a single neural network
    with shared weights.


    To train the agent, a batch of 4096 transitions is randomly sampled from the recent
    500,000 self-play games. The neural network is then optimized using the stochastic
    gradient descent (SGD) method. The initial learning rate is set to 0.01, momentum
    to 0.9, and L2 regularization to `10^-4`. Moreover, the algorithm decays the learning
    rate using a staircase method at 400,000 and 600,000 training steps, respectively,
    with a decay weight of 0.1 during the course of training. The training typically
    lasts over 700,000 training steps, with a total of 21 million self-play games
    for Go, 44 million for Chess, and 24 million for Shogi.


    Not surprisingly, the AlphaZero was trained using a distributed reinforcement
    learning architecture, where thousands of self-play actors generate millions of
    self-play games. And multiple learner agents work in parallel to update the parameters
    of the neural network.


    During training, 5000 tensor processing units (TPUs) were used to generate self-play
    games. TPU is a special acceleration hardware developed by Google to accelerate
    the numerical computation, especially for neural networks. This means hundreds
    or even thousands of machines were used to generate self-play games during training.
    In addition, 16 second-generation TPUs were used to train the neural network.
    DeepMind trained separate instances of AlphaZero for Chess, Shogi, and Go, respectively,
    and the training lasted for 9 hours in Chess, 12 hours in Shogi, and 13 days in
    Go approximately.'
