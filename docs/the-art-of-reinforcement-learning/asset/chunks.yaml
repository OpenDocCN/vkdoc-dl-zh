  trans: '

    # 分布式强化学习的应用


    两种流行的分布式强化学习架构是 `Ape-X` 和 `IMPALA`。`Ape-X` 由 Horgan 等人提出 [1]，它基于类似 `DQN` 的价值方法。该架构使用多个执行者（actor）生成环境转换，而单个中央智能体（称为学习者）负责学习。中央智能体基于优先回放缓冲区更新神经网络参数，由于样本由执行者生成，因此无需与环境交互，从而可以专注于学习。`IMPALA`
    由 Espeholt 等人提出 [2]，它是一种基于策略的方法。它也使用多个执行者生成环境转换，而单个学习者更新神经网络参数。`Ape-X` 和 `IMPALA`
    都可以扩展到大量智能体，并可用于同策略和异策略强化学习。


    分布式强化学习的另一个例子是由 Silver 等人开发的 `AlphaGo` [3]，它使用数百台服务器上的多个自我对弈执行者生成自我对弈棋局，同时多个智能体在多台服务器上运行以更新神经网络参数。这种方法能够高效探索博弈树并进行有效学习。


    # 同策略与异策略学习的分布式强化学习


    在设计分布式强化学习算法时，区分它们使用的是同策略学习还是异策略学习非常重要。同策略学习智能体根据遵循自身策略生成的经历来学习最优策略或价值函数，而异策略学习智能体则使用从其他策略收集的数据进行学习。


    对于异策略学习智能体（例如 `DQN`），可以使用大量历史数据进行学习。这使得执行者和学习者智能体能够并行工作，执行者生成样本时无需使用最新策略。例如，`DQN`
    使用经验回放，从存储的转换缓冲区中学习，这些转换的存储和采样独立于当前策略。执行者可以使用比最新策略落后几个迭代的策略，每几百个环境步骤同步一次参数，以减少通信开销。


    另一方面，对于同策略学习智能体（例如 `Actor-Critic` 或 `PPO`），所有执行者都必须使用最新策略做出决策，这一点至关重要。这在分布式计算架构中可能具有挑战性，需要在智能体之间建立适当的同步机制，以确保所有执行者都使用最新策略。一种常见的方法是使用参数服务器来存储和更新执行者与学习者智能体可以访问的策略参数。或者，可以使用消息传递方案来实时同步策略。然而，这些方法可能会引入额外的通信开销和计算成本。


    总之，理解同策略与异策略学习智能体之间的差异对于设计有效的分布式强化学习算法至关重要。通过仔细考虑这些因素并设计合适的算法和架构，我们可以在广泛的应用中实现高效且可扩展的分布式强化学习。


    # 分布式强化学习中的探索


    强化学习智能体需要探索环境以学习最优策略。对于基于策略的智能体（如 `Actor-Critic` 或 `PPO`），策略本身的性质已经鼓励了探索。但我们也可以利用熵的概念来鼓励智能体尝试新动作。这既适用于单智能体设置，也适用于分布式设置。


    对于基于价值的智能体（如 `DQN`），一种常见的鼓励探索的策略是使用 `ε`-贪心策略。通过这种方法，智能体以概率 `1-ε` 选择最佳动作，以概率 `ε`
    随机行动。通过随时间逐渐减小 `ε`，我们可以将智能体的重点从探索转向利用。


    在分布式设置中，每个执行者都有自己的探索率 `ε_i`，该值通过一个依赖于执行者数量和调优参数的公式计算得出。这种解决方案也在 `Ape-X` 中实现。公式为
    `ε_i = ε^(1 + (i/(N-1)) * a)`，其中 `ε` 是初始探索率，`N` 是执行者总数，`i` 是当前执行者的索引，`a` 控制探索率随
    `i` 增加而衰减的速度。通过调整 `a` 的值，我们可以控制各执行者之间探索率的分布，并找到适合当前问题的探索与利用之间的平衡。


    例如，如果我们有四个执行者，并设置 `ε = 0.4` 和 `a = 1`，那么每个执行者的探索率将为 `[0.4, 0.04716, 0.00556, 0.00066]`。这意味着第一个执行者的探索程度将远高于其他执行者，而最后一个执行者几乎不进行探索。

    '
- fmt: '### Distributed PPO


    As an example, the pseudocode in Algorithm 2 presents a high-level distributed
    PPO algorithm where we have multiple actors `k=0, 1, ...` running in parallel
    to generate transitions and one learner agent to update the parameters of the
    neural network. For each actor, once the sequence reaches a predefined length
    `N`, we compute the finite horizon returns `G_t` and estimated advantages `A_t`
    using the same mechanism described in Chap. 10 and store these transition sequences
    in the central server. In the meantime, the learner will constantly run some epochs
    to update the parameters of the neural network. After that, the latest neural
    network parameters are sent to the central server, and the actors will periodically
    update its own copy of the neural network, and use this updated network to make
    decisions.


    **Algorithm 2: Distributed Proximal Policy Optimization**


    An algorithm initializes neural network parameters for a learner and actors, performs
    interactions with the environment, computes returns and advantages, and updates
    policy and baseline parameters iteratively while communicating with the central
    server.


    Figure 12.2 shows the performance comparison of the distributed PPO algorithm
    with different numbers of actors on the Ant robotic control task. The results
    display the average episode return (total undiscounted rewards) and a 95% confidence
    interval. To evaluate the agent’s performance, we aggregate the average episode
    return at the end of each training iteration, which consisted of 100,000 training
    steps. The results were averaged over three independent runs and smoothed using
    a moving average with a window size of five.


    A line graph depicts training episode return versus training environment steps
    in millions for three PPO configurations: 1 actor, 4 actors, 8 actors, and 16
    actors in increasing trendline.


    **Fig. 12.2** The performance comparison of a distributed PPO algorithm with different
    numbers of actors on the Ant robotic control task. The results display the average
    episode return (total undiscounted rewards) and a 95% confidence interval. The
    results were averaged over three independent runs and then smoothed using a moving
    average with a window size of five.


    We use the same neural network architecture and hyperparameters for different
    runs. Specifically, we use discount rate `γ = 0.99`, learning rate `0.0002` for
    actor and `0.0003` for critic, sequence length `2048`, GAE lambda `0.95`, and
    `4` update epochs. We also use entropy to encourage exploration, with an entropy
    weight of `0.1`. The neural networks were trained using the Adam optimizer.


    As we can see from the chart, the performance gain with more actors is significant
    when compared to lesser actors. And the agent tends to converge to the optimal
    policy much faster. However, we should not confuse faster convergence with lesser
    training samples, as the figure only shows the training environment steps per
    actor agent, not the sum of steps across the actors.


    Figure 12.3 shows the experiment results in the more challenging Humanoid robotic
    control task.


    A line graph depicts training episode return versus training environment steps
    in millions for three PPO configurations: 1 actor, 4 actors, 8 actors, and 16
    actors in increasing trendline.


    **Fig. 12.3** The performance comparison of a distributed PPO algorithm with different
    numbers of actors on the Humanoid robotic control task. The results display the
    average episode return (total undiscounted rewards) and a 95% confidence interval.
    The results were averaged over three independent runs and then smoothed using
    a moving average with a window size of five.


    ### 12.3 Data Parallelism for Distributed Reinforcement Learning


    The distributed reinforcement learning architecture shown in Fig. 12.1 is a powerful
    tool that allows us to tackle large-scale or more complex reinforcement learning
    problems; it can improve the training speed of the agent by using multiple actors
    running in parallel. However, if we have a problem that requires hundreds or even
    thousands of actors all running in parallel, then relying on just one learner
    agent to update the neural network can become a bottleneck. To overcome this issue,
    we can use a technique called data parallelism, which is commonly used in deep
    learning.


    Data parallelism involves dividing a large dataset into smaller batches and distributing
    these batches across multiple processors or machines. Each processor or machine
    trains a model on its batch of data, and the resulting gradients are combined
    to produce a final set of gradients. These gradients are then used to update the
    model parameters (Fig. 12.4).


    A flow diagram illustrates the data flow in a multi-processor system, with processors
    1 to 5 each connected to their respective models 1 to 5. Gradients are aggregated
    and used to update parameters D.


    **Fig. 12.4** Simple diagram to illustrate the concept of data parallelism in
    deep learning, where we have multiple processors compute the gradients for its
    own copy of the model and a final processor to perform the gradient aggregation
    and parameter update.


    For example, to train Google’s BERT language model developed by Devlin et al.
    [4] or OpenAI’s GPT-3 developed by Brown et al. [5], hundreds of processors were
    used in parallel to divide the data and train the models.


    In distributed reinforcement learning, we can use multiple parallel learner agents,
    each computing the loss and gradients locally, but not updating the parameters
    of the neural network. Instead, they send their local gradients to a central parameter
    server, which collects and aggregates the gradients (e.g., by taking the mean)
    before performing the parameter update. This ensures that the parameter update
    only happens in a central place.


    Once the parameter server updates the parameters of the neural network, it broadcasts
    the newest parameters to all the actor agents, not just the learner agents. This
    kind of architecture is particularly useful for large-scale and complex reinforcement
    learning problems, such as training world-class Go players [3, 6, 7], where multiple
    parallel learners can significantly reduce training time.


    A simple diagram to illustrate the idea is shown in Fig. 12.5.


    A diagram represents a distributed learning system with multiple actors interacting
    with their environments, computing gradients, and updating parameters through
    central servers and learners.


    **Fig. 12.5** Simple diagram to illustrate the idea of distributed reinforcement
    learning with multiple learner agents to compute gradients and a central parameter
    server to do gradient aggregation and parameter update.


    However, there are challenges with this approach. Communication overhead between
    the learner agents can become a bottleneck, and proper gradient aggregation techniques
    are required to make it work effectively.'
