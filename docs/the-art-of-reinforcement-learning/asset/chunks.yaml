- fmt: '# Example of Asymmetric Tree Growth for MCTS


    Example of asymmetric tree growth for MCTS, where the algorithm prioritizes exploration
    of the most promising nodes rather than exhaustively traversing all possible nodes
    and moves. This selective expansion strategy allows MCTS to efficiently explore
    large and complex game trees. Concept derived from the work by Browne et al. [[9](#605748_1_En_14_Chapter.xhtml#CR9)]


    The pseudocode for general MCTS is shown in Algorithm 1, adapted from the work
    by Browne et al. [[9](#605748_1_En_14_Chapter.xhtml#CR9)]. The search process
    continues for a fixed computation budget, either in terms of time or number of
    iterations. Each iteration begins at the root node of the tree, denoted by `v0`.
    The tree policy is applied iteratively to traverse the tree until the most promising
    leaf node `vl` is found. At this point, the leaf node is expanded and simulated
    to obtain the results `Δ`. These results are then backed up all the way to the
    root node. After the computation budget has been reached, the best child is selected
    from the root node, and the corresponding action is taken in the actual game.
    Note that the only unknown part of the pseudocode is the function `BestChild`,
    which we will discuss in the next section.


    ## Algorithm 1: General MCTS


    ```

    A search algorithm for general MCTS with functions MCTS search, tree policy, expand,
    best child, default policy, and backup.

    ```


    Here, `ν` is a node of the search tree, `s(ν)` is the corresponding environment
    state for node `ν`, `N(ν)` is the visit count for node `ν`, and `W(ν)` is the
    total values.


    ## Upper Confidence Bounds for Trees


    We will now discuss how MCTS selects the best child during the search, which is
    a crucial component of the tree policy. In MCTS, the search tree is constructed
    based on how nodes are chosen in the tree, so selecting the best child is critical
    to the success of MCTS. One naive implementation is to always choose the child
    node with the highest mean reward, which is the estimated state-action value.
    However, this approach has a fundamental flaw: it does not explore other actions
    that may lead to a better overall strategy. This is essentially the exploration-exploitation
    problem we introduced in Part I of the book, which is an important topic in the
    context of reinforcement learning.


    Before we delve into how MCTS selects the best child, let’s first examine another
    algorithm called Upper Confidence Bounds (UCB). The UCB algorithm was originally
    developed to solve bandit problems, which is a special case of reinforcement learning
    tasks in which the agent takes only one action, and the environment immediately
    transitions into a terminal state, just like the bandit machines in a casino.
    In this case, there are no sequences of states or actions in a single episode,
    just a single state and a single action. As the name suggests, the algorithm computes
    an Upper Confidence Bound for each of the available actions and tries to select
    the action that can maximize the UCB score.


    The UCB algorithm is a widely used approach for solving the multi-armed bandit
    problem, which involves selecting actions to maximize a reward over time. The
    simplest version of UCB is called UCB1, which was proposed by Auer, Cesa-Bianchi,
    and Fischer in their paper “Finite-time Analysis of the Multiarmed Bandit Problem”
    [[10](#605748_1_En_14_Chapter.xhtml#CR10)].


    The UCB1 algorithm selects the action that maximizes the UCB1 score, which is
    computed using Eq. (14.1):


    ```

    UCB1 = X̄_j + √(2 ln N / n_j)

    ```


    (14.1) where `X̄_j` is the average value (or mean state-action value) for action
    `j`, and `n_j` is the number of times action `j` has been played. `N` is the total
    number of times the game (episodes) has been played so far in the context of bandit
    problems.


    The first term of the UCB1 score, `X̄_j`, encourages the agent to select the action
    with the highest value, which is known as exploitation. The second term, `√(2
    ln N / n_j)`, encourages the agent to explore other actions that may have higher
    potential reward, as it depends on the number of times an action has been played.
    As `n_j = 0`, the UCB1 value becomes `∞`, so unvisited actions are assigned the
    largest value.


    We can adapt the UCB1 algorithm to select the best child node for Monte Carlo
    Tree Search (MCTS). This modified algorithm is often called Upper Confidence Bounds
    for Trees (UCT). The basic idea is to select the child node that maximizes the
    UCB score, which is computed using Eq. (14.2):


    ```

    UCB = X̄_j + 2C √(2 ln N / n_j)

    ```'
