    **Fig. 2.15** Backup diagram for `Q*`


    A backup diagram for `V*` with two levels. The root node has state `s` with max
    that splits into 2 actions with arc angle `π`. The two actions have arc angles
    `p` and have 2 state transitions each. Action `a`, `r` leads to state `s''`.


    **Fig. 2.14** Backup diagram for `V*`


    The situation becomes a little bit more complex if we only know the optimal state
    value function `V*`. Because the values are averaged over all actions, we need
    to do a one-step look-ahead to decide which action is the best one. And we’ll
    need to use the model of the environment to do that.


    ```

    π*(a|s) = { 1, if a = argmax_{a∈A} Σ_{s''∈S} [R(s, a) + γ V*(s'')]; 0, otherwise
    }

    ```


    (2.30)


    ## 2.8 Summary


    This chapter provided a comprehensive introduction to Markov decision processes
    (MDPs) which form the foundation of reinforcement learning. The chapter began
    with an overview of MDPs, followed by an explanation of how they can be used to
    model the RL problem. This chapter holds significant importance as it laid the
    groundwork for the subsequent content in the book. The concepts and mathematical
    equations presented here are so crucial that they are extensively utilized throughout
    the rest of the book, making it a key chapter deserving of our highest recognition.


    The chapter delved into the details of Markov processes, Markov reward processes,
    and Markov decision processes, providing a clear understanding of the components
    that make up an MDP. The state value function and state-action value function
    for MDPs were examined, along with their computation utilizing the powerful Bellman
    equations. Furthermore, alternative Bellman equations for value functions were
    explored, fostering a more profound insight into the calculation of these essential
    functions for more complex problems.


    Finally, the chapter covered optimal policies and optimal value functions, discussing
    how they can be derived using various methods. Overall, this chapter provided
    a solid foundation for understanding MDPs and their role in RL.


    The next chapter of the book will focus on using dynamic programming (DP) methods
    to solve tabular RL problems. By leveraging the knowledge gained in this chapter,
    readers will be able to better understand the DP methods and their applications
    in RL.


