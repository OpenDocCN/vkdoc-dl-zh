  trans: '

    # 6. 线性价值函数近似


    本书第一部分重点介绍使用表格法来表示马尔可夫决策过程（MDP）的价值函数。然而，这种方法仅限于小规模 MDP。在许多现实世界的问题中，状态空间过大，导致基于表格的方法不切实际。这主要有两个原因：首先，庞大的状态数量可能需要大量内存来存储价值；其次，学习到的价值函数可能无法很好地泛化到新状态。


    为了克服这些限制，本书第二部分将重点转向使用价值函数近似（VFA）来估计 MDP 的价值函数。VFA 使用一个函数来估计状态或状态-动作对的价值，而不是直接将价值存储在表格中。在本章中，我们将重点介绍
    VFA 的概念，特别是线性 VFA——一种使用特征的线性组合来近似价值函数的流行方法。我们将探讨如何应用线性 VFA 来估计 MDP 的价值函数。


    ## 6.1 大规模 MDP 的挑战


    对于状态空间相对较小且可以完全枚举的小规模 MDP，使用表格来表示价值函数可能非常有效。然而，在更大、更复杂的 MDP 中使用表格来表示价值函数时，会面临一些挑战和限制：


    - **内存需求**：随着 MDP 中状态数量的增加，价值函数表格的大小呈指数级增长，使得在内存中存储这些价值变得不切实际。

    - **泛化能力**：即使状态数量较少，在学习过程中也常常难以访问每一个状态-动作对。这意味着我们可能无法对每个状态-动作对的价值函数都有准确的估计，从而使得泛化到新的、未见过的状态变得困难。

    - **维度灾难**：随着状态变量（或维度）数量的增加，状态空间的大小呈指数级增长，这使得在合理时间内探索并学习到准确的价值函数变得困难。

    - **离散化**：在某些情况下，连续的状态变量可能需要被离散化为有限数量的区间才能存储在表格中。然而，这可能导致信息丢失，并使得学习准确的价值函数变得困难。


    ![](img/605748_1_En_6_Fig1_HTML.png)


    小车顶部有一根杆的小车-杆系统示意图。


    **图 6.1** 小车-杆系统；该问题由 Richard S. Sutton 和 Andrew G. Barto 在《强化学习导论》一书中引入。


    价值函数近似技术，如线性函数近似和神经网络，可以通过使用较少的参数来估计价值函数，同时提供更好的泛化能力到新状态，从而帮助克服这些挑战。


    为了更好地理解这些挑战，让我们看一个经典的控制任务，称为小车-杆任务，该任务由 Richard S. Sutton 和 Andrew G. Barto 引入。


    ### 小车-杆任务


    小车-杆任务 [1] 的目标是通过对小车施加力，如图 6.1 所示，防止铰接在小车上的杆子倒下。如果杆子倾斜到一定角度或小车跑出轨道，则认为任务失败；如果任务失败，杆子会重置到垂直位置。智能体可以选择向左或向右推动小车。奖励信号是：只要杆子没有倒下，每一步都获得
    `+1`。


    这个任务与我们之前介绍的例子不同之处在于其状态空间的大小。小车-杆任务的状态是四维的，包含小车的位置和速度的数值，以及杆子的角度和角速度的数值。所有这些维度都是连续的数值，尽管有些维度有最小值和最大值等限制，例如位置在
    `[-4.8, 4.8]` 范围内，杆子角度在 `[-0.418, 0.418]`（弧度）范围内，但状态的具体值可以是这些范围内的任何值。


    小车-杆任务的大状态空间对强化学习提出了重大挑战。由于状态空间是连续的，传统的表格法表示价值函数不再适用。此外，智能体在训练过程中不太可能遇到所有可能的状态，这使得学习该任务的准确价值函数变得困难。


    在我们之前的例子中，我们经常使用像 `0, 1, 2, ...` 这样的离散数字来表示不同的状态，这使我们能够使用单个向量来存储这些不同状态的价值。然而，在状态的可能组合非常多的情况下，这种表格法并不适用。例如，在小车-杆例子中，状态由四个连续值定义：小车的位置和速度，以及杆子的角度和角速度。这使得状态空间是无限且连续的，无法用单个向量来表示。


    ![](img/605748_1_En_6_Fig2_HTML.png)


    用于瓦片编码的图表，绘制了杆子角度与小车速度的关系。小车速度范围从负 10 到 10，杆子角度范围从负 0.3 到 0.3。


    **图 6.2** 小车速度和杆子角度的瓦片化示例


    解决这个问题的一种方法是尝试将无限状态变为有限。例如，如果我们只看小车速度，我们可以将这些值分箱到相应的子集中，这将使小车速度维度离散化。类似地，我们也可以扩展这种方法，考虑杆子角度，此时这些分箱就变成了瓦片。这种方法通常被称为瓦片编码，对于小问题效果很好。有一些开源库可以为我们完成这项工作（图
    6.2）。


    然而，这种方法的一个主要缺点是必须手动选择要使用的分箱或瓦片数量。例如，如果我们只对小车位置使用两个分箱，那将没什么用，因为范围太宽了。另一方面，如果我们使用太多分箱，可能会遇到过拟合的问题。选择最佳的分箱数量需要对当前问题有大量的人工知识。


    这种方法的另一个主要问题是，对于环境状态具有非常大维度的情况，例如像 Atari 视频游戏这样基于图像的环境，它的扩展性不好。在这些情况下，状态空间可能包含大量维度，这使得使用瓦片编码变得不可行。在这种情况下，通常会使用其他方法，如神经网络，来解决可扩展性问题，我们将在下一章中介绍。

    '
- fmt: '# 6.2 Value Function Approximation


    Function approximation is the process of finding an approximate function that
    can closely match the behavior of an unknown target function. In reinforcement
    learning, we can use function approximation to estimate the state value or state-action
    value functions, which are typically too large to represent explicitly as tables.
    Instead, we can use a parameterized function that can take in the state or state-action
    as input and output an estimate of its value.


    As an example, consider Fig. [6.3](#605748_1_En_6_Chapter.xhtml#Fig3), which illustrates
    the idea of function approximation. We have a set of sample data generated by
    a target function `g`, which we do not know. Our goal is to find an approximate
    function `H` from a set of possible functions that can closely approximate the
    true target function, such that `H(x) ≈ g(x)`. In this example, the green dots
    represent the sample data generated by the target function, and the red line represents
    a function that approximates the true target function.


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig3_HTML.png)


    A scatterplot plots y versus x. The plots are scarcely scattered around a parabolic
    curve. Values are estimated. Curve (negative 10, 170), (3, 10), and (16, 170).


    Fig. 6.3 Example to illustrate the concept of function approximation, where the
    green dots are sample points generated from a target function `g`, and the red
    line is the function `H` to approximate this target function


    The use of value function approximation (VFA) in reinforcement learning has several
    benefits. First, the number of parameters associated with the approximation function
    is much smaller than the number of states or state-action pairs in the MDP, making
    it feasible to represent the value functions for large-scale problems. Second,
    the approximation function can generalize to unseen states or state-action pairs
    when we only have limited sample transitions, which helps to reduce the amount
    of data needed for learning. Finally, the space and time required to solve the
    large-scale MDP can be greatly reduced compared to tabular methods.


    However, there are also drawbacks to using VFA. Because we are using a parametric
    function to estimate the value functions, we may never learn the exact true values
    for all states or state-action pairs. Instead, we must settle for an approximation
    that is close enough for practical purposes. This is because any change to the
    parameters of the function will affect all states or state-action pairs, and it
    is not possible to optimize the function for one specific state or state-action
    pair without sacrificing accuracy for others.


    To represent the approximate value functions, we use `V̂(s; w)` to denote the
    function that approximates the true state value function `Vπ` for an arbitrary
    policy `π`. Here, `w` represents the parameters or weights that are used to compute
    the estimate. Similarly, we use `Q̂(s, a; w)` to denote the function that approximates
    the true state-action value function `Qπ` for an arbitrary policy `π`, and we
    want to find the weights `w` that minimize the difference between the approximate
    value function and the true value function. The process of updating or tuning
    the parameters `w` is called training.


    In summary, value function approximation is a powerful technique for representing
    and estimating the value functions in reinforcement learning. It enables us to
    solve large-scale MDPs within a limited time frame and computational budget. However,
    it is important to keep in mind the limitations of this approach and the trade-offs
    involved in finding a good approximation.


    Figure [6.4](#605748_1_En_6_Chapter.xhtml#Fig4) illustrates the basic idea of
    value function approximation, which is a way of estimating the value of each state
    in a reinforcement learning problem. In value function approximation, we use `V̂(s;
    w)` and `Q̂(s, a; w)` to represent the estimated values for a state or state-action
    pair, respectively, based on their weights `w`. These functions take in the environment
    state or state-action pair, and after some computation with respect to their weights
    `w`, they produce the estimated values as output.


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig4_HTML.png)


    A schematic of the estimation of state values. The function on the top is `V̂π(s,
    w)`. The function on the bottom is `Q̂π(s, a, w)`.


    Fig. 6.4 Idea of value function approximation


    We will discuss in more detail later in this chapter how to use linear methods
    to compute the values, but for now, we are more concerned with how to update the
    weights `w` of the approximate function. In order to improve an approximation
    function, we need to be able to measure its performance. However, it may not always
    be immediately clear how to do this for functions with respect to their parameters.'
  raw: '## 6.2 Value Function Approximation


    Function approximation is the process of finding an approximate function that
    can closely match the behavior of an unknown target function. In reinforcement
    learning, we can use function approximation to estimate the state value or state-action
    value functions, which are typically too large to represent explicitly as tables.
    Instead, we can use a parameterized function that can take in the state or state-action
    as input and output an estimate of its value.


    As an example, consider Fig. [6.3](#605748_1_En_6_Chapter.xhtml#Fig3), which illustrates
    the idea of function approximation. We have a set of sample data generated by
    a target function *g*, which we do not know. Our goal is to find an approximate
    function *H* from a set of possible functions that can closely approximate the
    true target function, such that ![$$H(x) \approx g(x)$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq5.png)
    . In this example, the green dots represent the sample data generated by the target
    function, and the red line represents a function that approximates the true target
    function.


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig3_HTML.png)


    A scatterplot plots y versus x. The plots are scarcely scattered around a parabolic
    curve. Values are estimated. Curve (negative 10, 170), (3, 10), and (16, 170).


    Fig. 6.3


    Example to illustrate the concept of function approximation, where the green dots
    are sample points generated from a target function *g*, and the red line is the
    function *H* to approximate this target function


    The use of value function approximation (VFA) in reinforcement learning has several
    benefits. First, the number of parameters associated with the approximation function
    is much smaller than the number of states or state-action pairs in the MDP, making
    it feasible to represent the value functions for large-scale problems. Second,
    the approximation function can generalize to unseen states or state-action pairs
    when we only have limited sample transitions, which helps to reduce the amount
    of data needed for learning. Finally, the space and time required to solve the
    large-scale MDP can be greatly reduced compared to tabular methods.


    However, there are also drawbacks to using VFA. Because we are using a parametric
    function to estimate the value functions, we may never learn the exact true values
    for all states or state-action pairs. Instead, we must settle for an approximation
    that is close enough for practical purposes. This is because any change to the
    parameters of the function will affect all states or state-action pairs, and it
    is not possible to optimize the function for one specific state or state-action
    pair without sacrificing accuracy for others.


    To represent the approximate value functions, we use ![$$\hat {V}(s; \boldsymbol
    {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq6.png) to denote
    the function that approximates the true state value function ![$$V_\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq7.png)
    for an arbitrary policy ![$$\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq8.png)
    . Here, ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq9.png)
    represents the parameters or weights that are used to compute the estimate. Similarly,
    we use ![$$\hat {Q}(s, a; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq10.png)
    to denote the function that approximates the true state-action value function
    ![$$Q_\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq11.png)
    for an arbitrary policy ![$$\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq12.png)
    , and we want to find the weights ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq13.png)
    that minimize the difference between the approximate value function and the true
    value function. The process of updating or tuning the parameters ![$$\boldsymbol
    {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq14.png) is called
    training.


    In summary, value function approximation is a powerful technique for representing
    and estimating the value functions in reinforcement learning. It enables us to
    solve large-scale MDPs within a limited time frame and computational budget. However,
    it is important to keep in mind the limitations of this approach and the trade-offs
    involved in finding a good approximation.


    Figure [6.4](#605748_1_En_6_Chapter.xhtml#Fig4) illustrates the basic idea of
    value function approximation, which is a way of estimating the value of each state
    in a reinforcement learning problem. In value function approximation, we use ![$$\hat
    {V}(s; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq15.png)
    and ![$$\hat {Q}(s, a; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq16.png)
    to represent the estimated values for a state or state-action pair, respectively,
    based on their weights ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq17.png)
    . These functions take in the environment state or state-action pair, and after
    some computation with respect to their weights ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq18.png)
    , they produce the estimated values as output.


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig4_HTML.png)


    A schematic of the estimation of state values. The function on the top is V hat
    pi left parenthesis s, w right parenthesis. The function on the bottom is Q hat
    pi left parenthesis s, a, w right parenthesis.


    Fig. 6.4


    Idea of value function approximation


    We will discuss in more detail later in this chapter how to use linear methods
    to compute the values, but for now, we are more concerned with how to update the
    weights ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq19.png)
    of the approximate function. In order to improve an approximation function, we
    need to be able to measure its performance. However, it may not always be immediately
    clear how to do this for functions with respect to their parameters.'
  trans: '

    # 6.2 价值函数近似


    函数近似是指寻找一个近似函数，使其能够紧密匹配未知目标函数行为的过程。在强化学习中，我们可以利用函数近似来估计状态价值函数或状态-动作价值函数，这些函数通常规模过大，无法以表格形式显式表示。取而代之，我们可以使用一个参数化函数，将状态或状态-动作作为输入，并输出其价值的估计值。


    举例来说，考虑图 6.3，该图展示了函数近似的概念。我们有一组由未知目标函数 `g` 生成的样本数据。我们的目标是从一组可能的函数中找到一个近似函数 `H`，使其能够紧密逼近真实的目标函数，即
    `H(x) ≈ g(x)`。在此示例中，绿色点代表目标函数生成的样本数据，红色线代表逼近真实目标函数的函数。


    ![](img/605748_1_En_6_Fig3_HTML.png)


    一张散点图绘制了 y 与 x 的关系。散点稀疏地分布在一个抛物线曲线周围。数值为估计值。曲线经过点 (-10, 170)、(3, 10) 和 (16, 170)。


    图 6.3 用于说明函数近似概念的示例，其中绿色点是由目标函数 `g` 生成的样本点，红色线是用于逼近该目标函数的函数 `H`


    在强化学习中使用价值函数近似（VFA）具有若干优势。首先，近似函数相关的参数数量远小于 MDP 中的状态或状态-动作对数量，这使得在大规模问题中表示价值函数成为可能。其次，当我们仅有有限的样本转移时，近似函数能够泛化到未见过的状态或状态-动作对，这有助于减少学习所需的数据量。最后，与表格方法相比，求解大规模
    MDP 所需的空间和时间可以大幅减少。


    然而，使用 VFA 也存在缺点。由于我们使用参数化函数来估计价值函数，可能永远无法学习到所有状态或状态-动作对的精确真实值。相反，我们必须满足于一个在实际应用中足够接近的近似值。这是因为对函数参数的任何更改都会影响所有状态或状态-动作对，并且不可能在不牺牲其他状态或状态-动作对准确性的情况下，针对某个特定状态或状态-动作对优化该函数。


    为了表示近似的价值函数，我们使用 `V̂(s; w)` 来表示逼近任意策略 `π` 的真实状态价值函数 `Vπ` 的函数。这里，`w` 代表用于计算估计值的参数或权重。类似地，我们使用
    `Q̂(s, a; w)` 来表示逼近任意策略 `π` 的真实状态-动作价值函数 `Qπ` 的函数，并且我们希望找到能够最小化近似价值函数与真实价值函数之间差异的权重
    `w`。更新或调整参数 `w` 的过程称为训练。


    总之，价值函数近似是在强化学习中表示和估计价值函数的一种强大技术。它使我们能够在有限的时间范围和计算预算内求解大规模 MDP。然而，务必牢记这种方法的局限性以及寻找良好近似所涉及的权衡。


    图 6.4 展示了价值函数近似的基本思想，这是一种在强化学习问题中估计每个状态价值的方法。在价值函数近似中，我们分别使用 `V̂(s; w)` 和 `Q̂(s,
    a; w)` 来表示基于其权重 `w` 对状态或状态-动作对的估计值。这些函数接收环境状态或状态-动作对作为输入，并基于其权重 `w` 进行一些计算后，输出估计值。


    ![](img/605748_1_En_6_Fig4_HTML.png)


    状态价值估计的示意图。上方的函数是 `V̂π(s, w)`。下方的函数是 `Q̂π(s, a, w)`。


    图 6.4 价值函数近似的思想


    我们将在本章后续部分更详细地讨论如何使用线性方法计算这些值，但目前，我们更关心如何更新近似函数的权重 `w`。为了改进近似函数，我们需要能够衡量其性能。然而，对于涉及参数的函数而言，如何做到这一点并不总是显而易见的。

    '
- fmt: 'Let’s consider an example of policy evaluation, where we want to estimate
    the state values for a fixed policy `π`. We assume we know the true state value
    function `Vπ` for `π`. Since we know the true state value, we can measure the
    difference between the approximated value and true value by using the squared
    error `(Vπ(s) - V̂(s; w))²` for a single state `s`. This also means we can measure
    the performance of the weights `w`, because, in this case, the state `s` and its
    true state value `Vπ(s)` are constant. The only thing that will affect the estimated
    value from the approximate function is the weights `w`.


    ```

    (Vπ(s) - V̂(s; w))²

    ```


    (6.1)


    It’s worth noting that the agent might encounter a large number of states when
    following policy `π` to act in the environment, and often these states are random,
    especially if the environment or policy is stochastic. Therefore, it is important
    to measure the accuracy of the approximate function with respect to the weights
    in a way that is independent of a specific time step. To achieve this, we use
    the expectation sign `Eπ` in Eq. (6.2). We use `S` without a subscript `t` for
    the state in Eq. (6.2) to emphasize that the measurement of the performance should
    be independent of a specific time step. We can also think of `S` as the entire
    state space in the equation.


    ```

    Eπ[(Vπ(S) - V̂(S; w))²]

    ```


    (6.2)


    We can now define a precise objective for the case where we use `V̂` to approximate
    the true state value function `Vπ`, this objective is required in order to find
    weights `w` that minimize the squared error `(Vπ(S) - V̂(S; w))²` for all possible
    states the agent would encounter when it’s following policy `π` to act in the
    environment. This idea is very similar to a supervised learning problem; in this
    case, the true label is `Vπ(S)`, and the predicted label is `V̂(S; w)`. In this
    book, we often use a shorter term `J(w)` to denote the objective.


    ```

    J(w) = Eπ[(Vπ(S) - V̂(S; w))²]

    ```


    (6.3)


    Similarly, if we know the true state-action value function `Qπ` for the policy
    `π`, we can also define the objective for approximating `Q̂`. In practice, we’re
    more interested in the state-action value function; after all, we need `Qπ` to
    do control (which is to find the optimal policy). The same concept still applies
    here, where we would like to find the weights `w` which can minimize the squared
    error `(Qπ(S, A) - Q̂(S, A; w))²`.


    ```

    J(w) = Eπ[(Qπ(S, A) - Q̂(S, A; w))²]

    ```


    (6.4)


    We now have defined the objective functions for `V̂` and `Q̂`; this means we can
    use any optimization methods that’s suitable to minimize the term in Eqs. (6.3)
    and (6.4) with respect to their weights `w`. In this book, we focus on one particular
    popular method called stochastic gradient descent, which is widely adapted in
    machine learning.'
