    an Upper Confidence Bound for each of the available actions and tries to select
    the action that can maximize the UCB score.


    The UCB algorithm is a widely used approach for solving the multi-armed bandit
    problem, which involves selecting actions to maximize a reward over time. The
    simplest version of UCB is called UCB1, which was proposed by Auer, Cesa-Bianchi,
    and Fischer in their paper “Finite-time Analysis of the Multiarmed Bandit Problem”
    [[10](#605748_1_En_14_Chapter.xhtml#CR10)].


    The UCB1 algorithm selects the action that maximizes the UCB1 score, which is
    computed using Eq. ([14.1](#605748_1_En_14_Chapter.xhtml#Equ1)):


    ![$$\displaystyle \begin{aligned} UCB1 = \overline{X}_j + \sqrt{\frac{2 \ln N}{n_j}}
    {} \end{aligned} $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_Equ1.png)


    (14.1) where ![$$\overline {X}_j$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq23.png)
    is the average value (or mean state-action value) for action *j*, and ![$$n_j$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq24.png)
    is the number of times action *j* has been played. *N* is the total number of
    times the game (episodes) has been played so far in the context of bandit problems.


    The first term of the UCB1 score, ![$$\overline {X}_j$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq25.png)
    , encourages the agent to select the action with the highest value, which is known
    as exploitation. The second term, ![$$\sqrt {\frac {2 \ln N}{n_j}}$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq26.png)
    , encourages the agent to explore other actions that may have higher potential
    reward, as it depends on the number of times an action has been played. As ![$$n_j
    = 0$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq27.png) , the
    UCB1 value becomes ![$$\infty $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq28.png)
    , so unvisited actions are assigned the largest value.


    We can adapt the UCB1 algorithm to select the best child node for Monte Carlo
    Tree Search (MCTS). This modified algorithm is often called Upper Confidence Bounds
    for Trees (UCT). The basic idea is to select the child node that maximizes the
    UCB score, which is computed using Eq. ([14.2](#605748_1_En_14_Chapter.xhtml#Equ2)):


    ![$$\displaystyle \begin{aligned} UCB = \overline{X}_j + 2C \sqrt{\frac{2 \ln
    N}{n_j}} {} \end{aligned} $$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_Equ2.png)'
