  trans: '

    # 6.3 随机梯度下降


    在优化问题中，目标是找到能够最小化或最大化给定数学函数的参数。术语*梯度下降*指的是使用一种迭代优化方法来寻找*可微*函数的*局部最小值*。可微函数是一种在其定义域内每一点都具有明确定义导数的数学函数。换句话说，该函数的导数存在，并且可以针对函数定义域内的任何输入值进行计算。从几何角度看，可微函数的导数表示函数图像在给定点处切线的斜率。


    函数的局部最小值是函数定义域内的一个点，在该点的一个小邻域内，函数取得最小值，但不一定是整个函数定义域内的最小值。换句话说，这是一个函数值低于附近点的点，但可能在其他更远的点处存在更低的函数值。局部最小值在优化中很重要，因为它们代表了优化问题的候选解，但不能保证是全局最小值（即函数在整个定义域内的绝对最小值）。


    可微性概念在优化中很重要，因为它允许我们计算函数相对于其输入的梯度，这对于许多优化算法（如梯度下降）至关重要。给定一个关于权重 `w` 的可微函数 `J(w)`，目标是找到使
    `J(w)` 最小化的 `w`。


    梯度下降算法首先计算 `J(w)` 关于 `w` 的梯度。然后，它沿着负梯度 `∇_w J(w)` 的方向更新权重 `w`。


    ```

    w = w - α ∇_w J(w)

    ```


    (6.5)


    参数 `α` 是步长（通常称为学习率），它控制在更新权重 `w` 时每一步应该移动多远。该算法以迭代方式重复此过程，经过大量步骤，直到找到一个良好的局部最小值。


    该更新规则背后的直觉是，通过沿着负梯度方向迈出一步，我们实际上是在朝着目标函数的最陡下降方向移动。这意味着在每一步，我们都朝着函数下降最快的方向移动。通过重复此过程大量步骤，我们希望最终能到达函数的一个最小值。为了理解这为何合理，想象一下站在山顶想要到达山底。最快的下降方式是沿着最陡峭的斜坡方向移动，也就是指向山底的方向。类似地，在优化中，负梯度指向目标函数的最陡下降方向，因此沿着负梯度方向移动将帮助我们比任何其他方向更快地达到最小值。


    学习率 `α` 控制更新的步长，因此它决定了我们在每一步沿着负梯度方向移动多远。较小的学习率意味着我们采取较小的步长，这有助于避免越过最小值，而较大的学习率意味着我们采取较大的步长，这有助于更快地收敛。然而，如果学习率太小，我们可能收敛得非常慢；而如果学习率太大，我们可能会越过最小值并在其附近振荡，甚至发散。因此，为手头的优化问题选择合适的学习率非常重要。


    `J(w)` 关于权重 `w` 的梯度是一个（列）向量，包含关于 `w` 中每个权重 `w_1, w_2, ..., w_n` 的偏导数，并且与权重向量 `w`
    具有相同的维度。梯度 `∇_w J(w)` 通过计算函数关于每个权重的偏导数得到。在实践中，通常使用*随机梯度下降*（SGD），它在每次迭代中随机选择数据的一个子集（称为*小批量*）来估计梯度。


    ```

    ∇_w J(w) = ( ∂J(w)/∂w_1, ∂J(w)/∂w_2, ..., ∂J(w)/∂w_n )^T

    ```


    (6.6)


    总之，随机梯度下降是一种迭代优化算法，它利用可微函数的梯度，沿着最陡下降方向更新权重，目标是找到目标函数的局部最小值。学习率控制更新的步长，为手头的优化问题选择合适的学习率非常重要。随机梯度下降在实践中被广泛使用，并且通常通过使用小批量来估计梯度。

    '
- fmt: "为了理解梯度下降的工作原理，我们首先来看最简单的情况：假设`w`只有一个标量分量`x`，如图6.5所示。我们有一些样本点以及每个样本点的梯度（斜率）。可以看到，点`x3`具有正斜率（梯度），如果按照公式(6.1)沿负梯度方向迈出一步，那么`x`的值将会减小。点`x2`的斜率比点`x3`的斜率更平缓，这意味着点`x2`的梯度小于点`x3`的梯度。这很合理，因为点`x2`更接近目标函数的最小值。对于样本点`x1`，斜率为负，这意味着如果应用公式(6.1)，`x`的值将会增加。如果重复这个过程很多步，理论上，它会找到一个局部最小值。\n\
    \n在实践中，权重向量`w`通常有多个标量分量，如图6.6所示。这意味着当梯度下降算法使用公式(6.1)更新权重时，它会根据每个分量的偏梯度更新`w`中的每一个分量。然而，在多个分量的情况下，`w`的更新规则稍微复杂一些，因为它们涉及多元微积分。\n\
    \n具体来说，更新规则中使用的偏导数必须针对`w`的每个分量进行计算。这些偏导数被组合成一个梯度向量，可以将其视为导数在多维情况下的推广。梯度向量指向被优化函数最陡峭增加的方向，而更新规则则沿着与梯度向量相反的方向修改`w`，以最小化目标函数。\n\
    \n![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig6_HTML.png)\n\n一个三维图绘制了`J`与`w1`和`w2`的关系。值为估计值。(0,\
    \ 0)、(0.5, -1.5)和(2.5, 0)。\n\n**图 6.6** 梯度下降的思想，其中`w`是一个具有两个标量分量`w1`和`w2`的向量\n\
    \n![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig5_HTML.png)\n\n一条抛物线绘制了`y`与`x`的关系。曲线的端点标记为`y\
    \ = f, x`。在`x`轴上有三条垂直线，一条在曲线左侧，两条在右侧，分别对应`x1`、`x2`和`x3`。\n\n**图 6.5** 梯度下降的思想\n\
    \n总的来说，虽然多分量更新规则背后的数学涉及多元微积分，但梯度下降的基本直觉保持不变：迭代地沿最陡下降方向更新权重以最小化目标函数。\n\n梯度下降中的步长（学习率）是一个关键参数。直观地说，小步长需要梯度下降算法采取更多步（就权重更新而言）才能找到能够最小化目标函数`J(w)`的权重`w`。而适当的大步长则需要更少的步数。然而，如果步长过大，可能会导致算法在局部最小值附近振荡但永远无法到达（如图6.7右侧所示）。在实践中，人们通常在学习过程开始时使用相对较大的步长，然后在整个学习过程中逐渐减小步长（如图6.7左侧所示）。步长的确切值通常是一门艺术而非科学，因为通常需要多次尝试才能为不同问题找到合适的值。\n\
    \n![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig7_HTML.png)\n\n两组抛物线绘制了`y`与`x`的关系。曲线的端点标记为`y\
    \ = f, x`。\n\n**图 6.7** 步长在梯度下降中的影响。左侧展示了我们从相对较大的步长开始，然后随时间衰减步长的情况。右侧展示了步长过大可能导致算法在局部最小值附近振荡但永远无法到达的情况\n\
    \n在本章中，我们在VFA的情况下对梯度下降公式进行了轻微修改，在公式(6.7)中的步长`α`前面添加了`1/2`。引入这个修改是为了简化最终方程，如公式(6.8)所示。\n\
    \n```\nw = w - 1/2 α ∇_w J(w) \n```\n(6.7)\n\n```\n= w - 1/2 α ∇_w E_π[ (V_π(S)\
    \ - V̂(S; w))² ]\n= w - 1/2 α ( -2 E_π[ (V_π(S) - V̂(S; w)) ∇_w V̂(S; w) ] )\n\
    = w + α E_π[ (V_π(S) - V̂(S; w)) ∇_w V̂(S; w) ]\n```\n(6.8)\n\n其中`w`是权重向量，即我们想要优化的状态值函数的可学习参数。`α`是步长，是一个超参数，决定了算法每次迭代中权重参数更新的幅度。`∇_w`表示函数关于权重`w`的偏导数向量。"
  raw: 'To understand how gradient descent works, let’s first look at the simplest
    case where we assume ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq64.png)
    only has a single scalar component *x*, as shown in Fig. [6.5](#605748_1_En_6_Chapter.xhtml#Fig5).
    We have some sample points and the gradient (slope) for each of these sample points.
    We can see that the point ![$$x_3$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq65.png)
    has a positive slope (gradient), and if we take a step in the direction of the
    negative gradient by following Eq. ([6.1](#605748_1_En_6_Chapter.xhtml#Equ1)),
    then it will decrease the value of *x*. The slope of point ![$$x_2$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq66.png)
    is less steep than that of point ![$$x_3$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq67.png)
    , which means the gradient for point ![$$x_2$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq68.png)
    is smaller than the gradient for point ![$$x_3$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq69.png)
    . This makes sense since point ![$$x_2$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq70.png)
    is much closer to the minimum of the objective function. For sample point ![$$x_1$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq71.png)
    , the slope is negative, which means that if we apply Eq. ([6.1](#605748_1_En_6_Chapter.xhtml#Equ1)),
    then it will increase the value of *x*. If we repeat the process over a large
    number of steps, then, in theory, it will find a local minimum.


    In practice, the weight vector ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq72.png)
    often has multiple scalar components, as shown in Fig. [6.6](#605748_1_En_6_Chapter.xhtml#Fig6).
    This means that when the gradient descent algorithm updates the weights using
    Eq. ([6.1](#605748_1_En_6_Chapter.xhtml#Equ1)), it will update every component
    in ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq73.png)
    with respect to the partial gradients of each component. However, in the case
    of multiple components, the update rules for ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq74.png)
    are slightly more complex, as they involve multivariable calculus.


    In particular, the partial derivatives used in the update rule must be computed
    with respect to each component of ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq75.png)
    . These partial derivatives are combined into a gradient vector, which can be
    thought of as a generalization of the derivative to the multidimensional case.
    The gradient vector points in the direction of the steepest increase of the function
    being optimized, and the update rule modifies ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq76.png)
    in the direction opposite to the gradient vector to minimize the objective function.


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig6_HTML.png)


    A 3 D graph plots J and w 1 versus w 2\. Values are estimated. (0, 0), (0.5, negative
    1.5), and (2.5, 0).


    Fig. 6.6


    Idea of gradient descent where ![$$ \boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq77.png)
    is a vector with two scalar components ![$$ \boldsymbol {w}_1$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq78.png)
    and ![$$ \boldsymbol {w}_2$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq79.png)


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig5_HTML.png)


    A parabolic curve plots y versus x. The endpoint of the curve is labeled y = f,
    x. Three vertical lines are on the x axis, one on the left and two on the right
    side of the curve, namely, x 1, x 2, and x 3.


    Fig. 6.5


    Idea of gradient descent


    Overall, while the mathematics behind the update rules for multiple components
    involves multivariable calculus, the underlying intuition of gradient descent
    remains the same: iteratively updating the weights in the direction of steepest
    descent to minimize the objective function.


    The step size (learning rate) in gradient descent is a crucial parameter. Intuitively,
    a small step size requires the gradient descent algorithm to take more steps (in
    terms of weight updates) to find the weights ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq80.png)
    that can minimize the objective function ![$$J(\boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq81.png)
    . An appropriate large step size, however, will require fewer steps. However,
    if the step size is too large, it may cause the algorithm to oscillate around
    the local minimum but never reach it (as shown on the right side of Fig. [6.7](#605748_1_En_6_Chapter.xhtml#Fig7)).
    In practice, people often use a relatively large step size at the beginning of
    the learning process and then diminish it throughout the learning process (as
    shown on the left side of Fig. [6.7](#605748_1_En_6_Chapter.xhtml#Fig7)). The
    exact value for the step size is often a matter of art rather than science because
    it often requires multiple trials to find a good fit for different problems.


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Fig7_HTML.png)


    Two sets of parabolic curve plots y versus x. The endpoint of the curve is labeled
    y = f, x.


    Fig. 6.7


    Impact of step size in gradient descent. The left side shows the case where we
    start with relatively large step size and then decay it over time. The right side
    shows the case where a too large step size can cause the algorithm to oscillate
    around the local minimum but never reach it


    In this chapter, we use a slightly modified equation for gradient descent in the
    case of VFA, which adds ![$$\frac {1}{2}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq82.png)
    in front of the step size ![$$\alpha $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq83.png)
    in Eq. ([6.7](#605748_1_En_6_Chapter.xhtml#Equ7)). This was introduced to simplify
    the final equation as shown in Eq. ([6.8](#605748_1_En_6_Chapter.xhtml#Equ8)).


    ![$$\displaystyle \begin{aligned} \boldsymbol{w} &amp; = \boldsymbol{w} - \frac{1}{2}
    \alpha \nabla_{\boldsymbol{w}} J(\boldsymbol{w}) {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ7.png)


    (6.7)


    ![$$\displaystyle \begin{aligned} &amp; = \boldsymbol{w} - \frac{1}{2} \alpha
    \nabla_{\boldsymbol{w}} \mathbb{E}_{\pi\!\!}\left[\Big(V_\pi(S) - \hat{V}(S; \boldsymbol{w})
    \Big)^2\right] \\ &amp; = \boldsymbol{w} - \frac{1}{2} \alpha \Biggl( -2 \mathbb{E}_{\pi\!\!}\left[
    \Big(V_\pi(S) - \hat{V}(S; \boldsymbol{w}) \Big) \nabla_{\boldsymbol{w}} \hat{V}(S;
    \boldsymbol{w}) \right] \Biggr) \\ &amp; = \boldsymbol{w} + \alpha \mathbb{E}_{\pi\!\!}\left[
    \Big( V_\pi(S) - \hat{V}(S; \boldsymbol{w})\Big) \nabla_{\boldsymbol{w}} \hat{V}(S;
    \boldsymbol{w}) \right] {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ8.png)


    (6.8) where ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq84.png)
    is the weight vector, which is the learnable parameter of the state value function
    that we want to optimize. ![$$\alpha $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq85.png)
    is the step size, which is a hyperparameter that determines the size of the updates
    to the weight parameters during each iteration of the algorithm. ![$$\nabla _{\boldsymbol
    {w}}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq86.png) represents
    the vector of partial derivatives of a function with respect to the weights ![$$\boldsymbol
    {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq87.png) .'
  trans: "\n为了理解梯度下降的工作原理，我们首先来看最简单的情况：假设`w`只有一个标量分量`x`，如图 6.5 所示。我们有一些样本点以及每个样本点的梯度（斜率）。可以看到，点`x3`具有正斜率（梯度），如果按照公式(6.1)沿负梯度方向迈出一步，那么`x`的值将会减小。点`x2`的斜率比点`x3`的斜率更平缓，这意味着点`x2`的梯度小于点`x3`的梯度。这很合理，因为点`x2`更接近目标函数的最小值。对于样本点`x1`，斜率为负，这意味着如果应用公式(6.1)，`x`的值将会增加。如果重复这个过程很多步，理论上，它会找到一个局部最小值。\n\
    \n在实践中，权重向量`w`通常有多个标量分量，如图 6.6 所示。这意味着当梯度下降算法使用公式(6.1)更新权重时，它会根据每个分量的偏梯度更新`w`中的每一个分量。然而，在多个分量的情况下，`w`的更新规则稍微复杂一些，因为它们涉及多元微积分。\n\
    \n具体来说，更新规则中使用的偏导数必须针对`w`的每个分量进行计算。这些偏导数被组合成一个梯度向量，可以将其视为导数在多维情况下的推广。梯度向量指向被优化函数最陡峭增加的方向，而更新规则则沿着与梯度向量相反的方向修改`w`，以最小化目标函数。\n\
    \n![](img/605748_1_En_6_Fig6_HTML.png)\n\n一个三维图绘制了`J`与`w1`和`w2`的关系。值为估计值。(0, 0)、(0.5,\
    \ -1.5)和(2.5, 0)。\n\n**图 6.6** 梯度下降的思想，其中`w`是一个具有两个标量分量`w1`和`w2`的向量\n\n![](img/605748_1_En_6_Fig5_HTML.png)\n\
    \n一条抛物线绘制了`y`与`x`的关系。曲线的端点标记为`y = f, x`。在`x`轴上有三条垂直线，一条在曲线左侧，两条在右侧，分别对应`x1`、`x2`和`x3`。\n\
    \n**图 6.5** 梯度下降的思想\n\n总的来说，虽然多分量更新规则背后的数学涉及多元微积分，但梯度下降的基本直觉保持不变：迭代地沿最陡下降方向更新权重以最小化目标函数。\n\
    \n梯度下降中的步长（学习率）是一个关键参数。直观地说，小步长需要梯度下降算法采取更多步（就权重更新而言）才能找到能够最小化目标函数`J(w)`的权重`w`。而适当的大步长则需要更少的步数。然而，如果步长过大，可能会导致算法在局部最小值附近振荡但永远无法到达（如图\
    \ 6.7 右侧所示）。在实践中，人们通常在学习过程开始时使用相对较大的步长，然后在整个学习过程中逐渐减小步长（如图 6.7 左侧所示）。步长的确切值通常是一门艺术而非科学，因为通常需要多次尝试才能为不同问题找到合适的值。\n\
    \n![](img/605748_1_En_6_Fig7_HTML.png)\n\n两组抛物线绘制了`y`与`x`的关系。曲线的端点标记为`y = f, x`。\n\
    \n**图 6.7** 步长在梯度下降中的影响。左侧展示了我们从相对较大的步长开始，然后随时间衰减步长的情况。右侧展示了步长过大可能导致算法在局部最小值附近振荡但永远无法到达的情况\n\
    \n在本章中，我们在 VFA 的情况下对梯度下降公式进行了轻微修改，在公式(6.7)中的步长`α`前面添加了`1/2`。引入这个修改是为了简化最终方程，如公式(6.8)所示。\n\
    \n```\nw = w - 1/2 α ∇_w J(w) \n```\n(6.7)\n\n```\n= w - 1/2 α ∇_w E_π[ (V_π(S)\
    \ - V̂(S; w))² ]\n= w - 1/2 α ( -2 E_π[ (V_π(S) - V̂(S; w)) ∇_w V̂(S; w) ] )\n\
    = w + α E_π[ (V_π(S) - V̂(S; w)) ∇_w V̂(S; w) ]\n```\n(6.8)\n\n其中`w`是权重向量，即我们想要优化的状态值函数的可学习参数。`α`是步长，是一个超参数，决定了算法每次迭代中权重参数更新的幅度。`∇_w`表示函数关于权重`w`的偏导数向量。\n"
- fmt: '为了应用梯度下降，我们使用公式（[6.3](#605748_1_En_6_Chapter.xhtml#Equ3)）作为目标函数`J(w)`。然后，我们使用微积分中的链式法则来推导导数，从而得到公式（[6.8](#605748_1_En_6_Chapter.xhtml#Equ8)）。之所以使用链式法则来推导导数，是因为目标函数`J(w)`依赖于价值函数的预测值`V̂(S;
    w)`，而该预测值又通过函数`V̂(S; w)`依赖于参数`w`。这使我们能够计算目标函数关于参数`w`的梯度。


    该公式背后的直觉是，沿着真实价值`Vπ(S)`与当前预测价值`V̂(S; w)`之间平方误差的相反方向调整参数`w`，而调整的幅度由每个参数的偏梯度`∇w
    V̂(S; w)`和步长`α`决定。期望符号`Eπ`表示我们正在计算期望值上的梯度。这意味着我们需要对智能体在环境中遵循策略`π`时可能遇到的所有状态求偏导数。


    当使用表格方法时，我们会运行算法收集大量转移样本并计算平均回报。然而，当使用梯度下降方法时，我们可以使用随机梯度下降（SGD）。SGD是机器学习中广泛采用的方法，尤其适用于训练深度神经网络。SGD背后的思想是使用一个（或一小批）样本转移来计算梯度，然后更新权重`w`。这种方法在计算上比使用所有转移样本更高效，原因在于计算效率，同时也因为智能体在与环境交互时，通常不可能遇到整个状态空间中的所有状态。


    我们可以将公式（[6.8](#605748_1_En_6_Chapter.xhtml#Equ8)）重写为公式（[6.9](#605748_1_En_6_Chapter.xhtml#Equ9)），以展示如何使用SGD更新权重`w`。在该公式中，我们使用一个（或一小批）样本转移来计算梯度并更新权重。在机器学习中，小批量是训练数据的一个子集，用于在随机梯度下降（SGD）优化过程中计算梯度更新。当在大型数据集上训练模型时，在每次迭代中计算整个数据集的梯度通常在计算上不可行。相反，使用从数据集中随机选择的一小批样本来估计梯度，然后用该梯度更新模型的参数。


    ```

    w = w + α [ ( Vπ(S) - V̂(S; w) ) ∇w V̂(S; w) ]

    ```


    (6.9)


    小批量的大小是一个超参数，通常根据数据集的大小和可用计算资源来选择。较大的小批量大小可以带来更准确的梯度估计，但需要更多的内存和计算资源。较小的批量大小可以减少内存使用，但可能导致收敛速度变慢，且梯度估计的方差通常更高。


    在SGD中使用小批量可以在大型数据集上更高效地训练机器学习模型，因为它减少了计算整个数据集梯度的计算负担和内存需求。


    现在，让我们将注意力转向用于近似状态（或状态-动作）价值相对于权重`w`的方法。通常，有线性方法和非线性方法来近似价值函数。在本章中，我们专注于更简单的线性方法。在下一章中，我们将讨论非线性方法，特别是使用神经网络来近似价值函数。线性方法有其优点和缺点，我们将在下一节中进一步探讨。'
  raw: 'To apply gradient descent, we use Eq. ([6.3](#605748_1_En_6_Chapter.xhtml#Equ3))
    as the objective function ![$$J(\boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq88.png)
    . Then, we use the chain rule of calculus to derive the derivatives, which leads
    to Eq. ([6.8](#605748_1_En_6_Chapter.xhtml#Equ8)). The chain rule of calculus
    is used to derive the derivatives because the objective function ![$$J(\boldsymbol
    {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq89.png) depends
    on the predicted values of the value function ![$$\hat {V}(S; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq90.png)
    , which in turn depend on the parameters ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq91.png)
    through the function ![$$\hat {V}(S; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq92.png)
    . This allows us to compute the gradient of the objective function with respect
    to the parameters ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq93.png)
    .


    The intuition behind this equation is to adjust the parameters ![$$\boldsymbol
    {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq94.png) in the
    opposite direction of the squared error between the true value ![$$V_\pi (S)$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq95.png)
    and the current predicted value ![$$\hat {V}(S; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq96.png)
    , while the magnitude of change is determined by the partial gradients of each
    parameter ![$$\nabla _{\boldsymbol {w}} \hat {V}(S; \boldsymbol {w})$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq97.png)
    and the step size ![$$\alpha $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq98.png)
    . The expectation sign ![$$\mathbb {E}_{\pi }$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq99.png)
    means that we are computing the gradients over expected values. This means that
    we need to take partial derivatives regarding all states that the agent could
    encounter when following the policy ![$$\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq100.png)
    in the environment.


    When using tabular methods, we would run the algorithm to collect a large amount
    of transitions and compute the averaging returns. However, when using gradient
    descent methods, we can use stochastic gradient descent (SGD). SGD is a widely
    adapted method in machine learning, especially for training deep neural networks.
    The idea behind SGD is to use one (or a mini-batch of) sample transition to compute
    the gradients and then update the weights ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq101.png)
    . This approach is computationally more efficient than using all the transitions
    due the computation efficient reasons, also because often the cases, it’s impossible
    for the agent to encounter all the states in the entire state space when interacting
    with the environment.


    We can rewrite Eq. ([6.8](#605748_1_En_6_Chapter.xhtml#Equ8)) as Eq. ([6.9](#605748_1_En_6_Chapter.xhtml#Equ9))
    to show how to update the weights ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq102.png)
    using SGD. In this equation, we use one (or a mini-batch of) sample transition
    to compute the gradients and update the weights. In machine learning, a mini-batch
    is a subset of the training data that is used to compute the gradient descent
    update during stochastic gradient descent (SGD) optimization. When training a
    model on large datasets, it is often computationally infeasible to compute the
    gradient over the entire dataset in each iteration. Instead, a mini-batch of randomly
    selected samples from the dataset is used to estimate the gradient, which is then
    used to update the model’s parameters.


    ![$$\displaystyle \begin{aligned} \boldsymbol{w} = \boldsymbol{w} + \alpha \Biggl[
    \Big( V_\pi(S) - \hat{V}(S; \boldsymbol{w}) \Big) \nabla_{\boldsymbol{w}} \hat{V}(S;
    \boldsymbol{w}) \Biggr] {} \end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ9.png)


    (6.9)


    The size of the mini-batch is a hyperparameter that is typically chosen based
    on the size of the dataset and the available computing resources. A larger mini-batch
    size can lead to more accurate gradient estimates, but requires more memory and
    computational resources. A smaller mini-batch size can result in less memory usage,
    but may cause slower convergence, often with higher variance in the gradient estimates.


    Using mini-batches in SGD allows for more efficient training of machine learning
    models on large datasets, as it reduces the computational burden and memory requirements
    of computing the gradient over the entire dataset.


    Now, let’s turn our attention to the methods used to approximate the state (or
    state-action) values with respect to the weights ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq103.png)
    . In general, there are linear and nonlinear methods to approximate the value
    functions. In this chapter, we focus on the simpler linear method. In the next
    chapter, we will discuss nonlinear methods, specifically using neural networks
    to approximate the value functions. The linear method has its advantages and disadvantages,
    which we will explore further in the next section.'
  trans: '

    为了应用梯度下降，我们使用公式（6.3）作为目标函数`J(w)`。然后，我们使用微积分中的链式法则来推导导数，从而得到公式（6.8）。之所以使用链式法则来推导导数，是因为目标函数`J(w)`依赖于价值函数的预测值`V̂(S;
    w)`，而该预测值又通过函数`V̂(S; w)`依赖于参数`w`。这使我们能够计算目标函数关于参数`w`的梯度。


    该公式背后的直觉是，沿着真实价值`Vπ(S)`与当前预测价值`V̂(S; w)`之间平方误差的相反方向调整参数`w`，而调整的幅度由每个参数的偏梯度`∇w
    V̂(S; w)`和步长`α`决定。期望符号`Eπ`表示我们正在计算期望值上的梯度。这意味着我们需要对智能体在环境中遵循策略`π`时可能遇到的所有状态求偏导数。


    当使用表格方法时，我们会运行算法收集大量转移样本并计算平均回报。然而，当使用梯度下降方法时，我们可以使用随机梯度下降（SGD）。SGD 是机器学习中广泛采用的方法，尤其适用于训练深度神经网络。SGD
    背后的思想是使用一个（或一小批）样本转移来计算梯度，然后更新权重`w`。这种方法在计算上比使用所有转移样本更高效，原因在于计算效率，同时也因为智能体在与环境交互时，通常不可能遇到整个状态空间中的所有状态。


    我们可以将公式（6.8）重写为公式（6.9），以展示如何使用 SGD 更新权重`w`。在该公式中，我们使用一个（或一小批）样本转移来计算梯度并更新权重。在机器学习中，小批量是训练数据的一个子集，用于在随机梯度下降（SGD）优化过程中计算梯度更新。当在大型数据集上训练模型时，在每次迭代中计算整个数据集的梯度通常在计算上不可行。相反，使用从数据集中随机选择的一小批样本来估计梯度，然后用该梯度更新模型的参数。


    ```

    w = w + α [ ( Vπ(S) - V̂(S; w) ) ∇w V̂(S; w) ]

    ```


    (6.9)


    小批量的大小是一个超参数，通常根据数据集的大小和可用计算资源来选择。较大的小批量大小可以带来更准确的梯度估计，但需要更多的内存和计算资源。较小的批量大小可以减少内存使用，但可能导致收敛速度变慢，且梯度估计的方差通常更高。


    在 SGD 中使用小批量可以在大型数据集上更高效地训练机器学习模型，因为它减少了计算整个数据集梯度的计算负担和内存需求。


    现在，让我们将注意力转向用于近似状态（或状态-动作）价值相对于权重`w`的方法。通常，有线性方法和非线性方法来近似价值函数。在本章中，我们专注于更简单的线性方法。在下一章中，我们将讨论非线性方法，特别是使用神经网络来近似价值函数。线性方法有其优点和缺点，我们将在下一节中进一步探讨。

    '
- fmt: "# 6.4 Linear Value Function Approximation\n\nSo far, we haven’t talked about\
    \ how exactly the approximate function `V̂` or `Q̂`, which takes in a raw environment\
    \ state (or state-action pair) as input, will output the estimated value. We now\
    \ focus on how to use linear methods to compute these values with respect to the\
    \ weight vector `w`.\n\nTo get started, it involves the process of mapping raw\
    \ environment state `s` (or state-action pair `(s, a)`) to a feature vector `x`;\
    \ this process is often referred to as *feature engineering* or *feature extraction*\
    \ in traditional machine learning. The number of scalar components in `x` can\
    \ be much larger (or smaller) than the dimension of the environment state, depending\
    \ on the reinforcement learning problem. We can think of the feature vector `x`\
    \ as a collection of functions `x₁, x₂, …` that transform the raw environment\
    \ state (or state-action pair `(s, a)`) into corresponding scalar components:\n\
    \n```\nx(s) = ( x₁(s) )\n       ( x₂(s) )\n       (  ⋮   )\n       ( xₙ(s) )\n\
    ```\n\n(6.10)\n\nThe intuition behind the feature vector `x` is that by carefully\
    \ crafting these features, we hope to find a weight vector `w`, so the value for\
    \ a particular state (or state-action pair) is just the weighted sum over all\
    \ these features; this is why we call `w` the weights, because it weights the\
    \ corresponding features in `x`. Mathematically speaking, we take the inner product\
    \ of `x` and `w` (assume both `x` and `w` are column vectors, and `w`, `x` have\
    \ the same number of elements), which can be expressed as\n\n```\nV̂(s; w) = x(s)ᵀ\
    \ w = Σⱼ₌₁ⁿ xⱼ(s) wⱼ\n```\n\n(6.11)\n\nwhere `V̂(s; w)` is the estimated value\
    \ of state `s` using weight vector `w`, `x(s)ᵀ` is the transpose of the feature\
    \ vector for state `s`, and `Σⱼ₌₁ⁿ xⱼ(s) wⱼ` is the weighted sum of the features.\n\
    \nThe feature vector `x` is often handcrafted based on human knowledge or past\
    \ experience of the reinforcement learning problem. For some simple problems,\
    \ this process may be as simple as encoding the raw environment state into numerical\
    \ values, but for more complex problems, it often involves some form of transformation\
    \ like polynomial functions.\n\nOne of the simplest ways to construct the feature\
    \ vector is to partition the state space into subsets (similar to the bin or tile\
    \ cases shown in Fig. 6.2) such that any single state `s` only belongs to one\
    \ subset. We can then construct the feature vector `x` using the one-hot encoding\
    \ method, where the subset to which the state `s` belongs is represented by a\
    \ value of one and all other subsets are represented by a value of zero. This\
    \ is also known as the state aggregation method. Finite MDPs can be treated as\
    \ a special case of this method, where we have `N` subsets, here `N` is the number\
    \ of states in the state space, and each subset only has one state.\n\nFor example,\
    \ in the service dog MDP, we can label each state using index values `Room 1 =\
    \ 0`, `Room 2 = 1`, `Room 3 = 2`, `Outside = 3`, `Found item = 4`. Then, we can\
    \ construct the feature vector `x` for state `Room 2` as a one-hot encoded vector\
    \ `x = [0, 1, 0, 0, 0]ᵀ`. It’s also possible to use neural networks to extract\
    \ the features automatically, which is a topic we’ll cover in the next chapter.\n\
    \nNow that we have a basic idea of how the linear approximation function computes\
    \ state values, let’s finalize how to use stochastic gradient descent to update\
    \ the weight vector `w`. We can first define the partial derivatives `∇_w V̂(s;\
    \ w)` with respect to `w` for Eq. (6.11). Since it’s a linear system and we’re\
    \ taking the derivative with respect to `w`, `∇_w V̂(s; w)` can be simplified\
    \ to `x(s)`. This gives us Eq. (6.12) for updating the weights `w` when using\
    \ a linear function to approximate the state value function `V_π`:"
  raw: '## 6.4 Linear Value Function Approximation


