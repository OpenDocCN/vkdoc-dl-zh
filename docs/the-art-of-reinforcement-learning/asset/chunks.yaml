    and decayed it linearly over the first half of the learning process to 0.01. Surprisingly,
    the algorithm found the optimal policy after 500 updates made to the state-action
    values, but the estimated state values were not quite close to the true ![$$V_*$$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_IEq169.png)
    computed using DP (last row). As we increased the number of updates, the estimated
    values for the states became very close to the true values.'
  trans: '

    SARSA 相比蒙特卡洛方法有一些优势。它可以进行在线学习，这意味着它可以在每个时间步之后更新状态-动作价值函数 `Q_pi` 的估计值和策略，使其更适合需要与环境实时交互的应用场景。SARSA
    也是一种同策略方法，我们将在本章后面讨论什么是同策略。然而，SARSA 在估计的状态-动作价值函数中可能存在高方差和偏差，尤其是在探索率较低时。


    ## 算法 4：SARSA


    ![](img/605748_1_En_5_Figaad_HTML.gif) 一个 11 行的算法，接收以下输入，以给出一个几乎等于 `Q_star` 的估计最优状态-动作价值函数
    `Q_pi`。折扣率 `gamma`、初始探索率 `epsilon`、步长 `alpha` 和步数 `K`。


    SARSA 算法有少数几个需要额外关注的参数（或者我们称之为，它对这几个参数很敏感）。第一个是步长 `alpha`。在蒙特卡洛方法中，我们使用 `1 / N(s,
    a)` 作为步长，但在 SARSA 中，我们根据当前估计值与下一个估计值之间的差异来更新状态-动作价值。因此，我们不会记录智能体访问特定状态-动作对 `(s,
    a)` 的次数。结果，我们通常需要手动设置步长。


    第二个参数是用于 `epsilon`-贪婪策略的探索率 `epsilon`。我们可以选择为 `epsilon` 使用一个固定值，但在实践中，常见的做法是使用一个较大的初始
    `epsilon` 值（如 1.0），并在学习过程的前半段将 `epsilon` 线性衰减到一个较小的固定值（如 0.01）。决定以多快的频率衰减 `epsilon`
    值是一个没有明确答案的难题。衰减过快可能导致智能体在 `epsilon` 变得过小之前探索不足，从而完全停止探索。然而，衰减过慢可能导致智能体学习时间更长，因为它即使在不再需要时仍会继续随机行动。在实践中，这个参数需要多次试验才能找到合适的值。


    ## 表 5.2


    在服务犬 MDP 上运行 SARSA 算法不同更新次数后的最优状态价值。结果在 100 次独立运行中取平均值。我们使用折扣率 `gamma = 0.9` 和步长
    `alpha = 0.01`，初始探索率 `epsilon = 1.0`，并将其从 1.0 衰减到 0.01。最后一行包含使用 DP 策略迭代计算出的真实最优状态价值
    `V_*`。


    | 更新次数 | 房间 1 | 房间 2 | 房间 3 | 室外 | 找到物品 |

    | --- | --- | --- | --- | --- | --- |

    | 100 | − 0.12 | 0.0 | 0.47 | 0.0 | 0 |

    | 1000 | 0.28 | 3.49 | 8.17 | -0.01 | 0 |

    | 10,000 | 5.83 | 7.85 | 10.0 | 4.25 | 0 |

    | 20,000 | 6.02 | 7.93 | 10.0 | 5.53 | 0 |

    | 50,000 | 6.12 | 7.97 | 10.0 | 6.38 | 0 |

    | DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |


    与蒙特卡洛策略迭代类似，SARSA 最终只会收敛到真正的最优状态-动作价值，但在实践中，我们通常在固定迭代次数后，或者当状态-动作价值的变化低于某个阈值时终止算法。因此，如果我们过早终止学习过程，SARSA
    算法的结果可能并非真正的最优状态-动作价值。


    我们在服务犬 MDP 上运行了 SARSA 算法，以找到最优策略和最优价值函数。最优策略是能在所有时间步上最大化期望总回报的策略，而最优价值函数是在最优策略下从每个状态出发的期望总回报。我们使用动态规划（DP）计算了真实的最优价值，该方法保证在有限次迭代内收敛到最优值。表
    5.2 中显示的结果是在 100 次独立运行中取平均值得到的，使用了折扣因子 `gamma = 0.9` 和步长 `alpha = 0.01`。我们将初始探索率设为
    `epsilon = 1.0`，并在学习过程的前半段将其线性衰减到 0.01。令人惊讶的是，算法在对状态-动作价值进行 500 次更新后就找到了最优策略，但估计的状态价值与使用
    DP 计算出的真实 `V_*`（最后一行）并不十分接近。随着我们增加更新次数，状态估计价值变得非常接近真实价值。

