    ### 不稳定的策略更新


    策略梯度方法是一类强化学习算法，它直接优化参数化的策略，以最大化期望回报，即从环境中获得的折扣奖励总和。策略梯度方法的一个常见问题是它们可能不稳定且收敛缓慢，尤其是在高维或复杂环境中。在此背景下，“收敛缓慢”意味着策略梯度方法可能需要大量迭代或训练步骤才能找到好的策略，这可能导致训练时间过长，甚至无法收敛。


    这个问题的主要原因在于，策略梯度方法使用随机梯度上升法来更新策略参数，其中使用步长 `α` 来调整参数：


    ```

    θ = θ + α ∇_θ J(θ)

    ```


    而为更新选择一个合适的步长并不容易。如果步长过大，可能导致性能崩溃，即策略变得比初始策略更差，优化过程无法收敛到好的解。这是因为策略可能偏离最优策略过远，导致期望回报降低。步长过大的一个典型例子是，策略可能在最优策略附近振荡，永远无法收敛到稳定的解。


    这是因为在强化学习中，糟糕的策略意味着糟糕的训练样本。这对于标准策略梯度方法等在线策略学习方法尤其致命。因为一旦智能体开始遵循某个非常糟糕的策略在环境中行动，它可能无法从错误选择中恢复，从而导致性能崩溃。


    在策略优化过程中使用较小的步长是解决稳定性问题的常见方法。然而，这种方法也有其缺点。使用较小的步长时，策略的更新速度较慢，需要更多迭代才能收敛到最优解。这会导致训练时间延长和计算资源增加。此外，使用小步长还可能减慢收敛速度，使找到最优策略变得更加困难。


    而且，使用小步长还可能阻碍策略有效探索状态和动作空间。如果步长过小，策略可能会陷入局部最优，而无法找到全局最优。这可能导致策略次优，在给定环境中表现不佳。


    简而言之，使用较小的步长可以降低性能发散的风险，但也会减慢学习过程，并可能导致次优策略。在策略优化过程中，必须在稳定性和效率之间做出权衡。


    然而，问题并不仅仅在于选择合适的步长。原因在于，策略空间中两个策略之间的距离（由所有可能策略构成的空间定义）可能与参数空间中相应策略参数之间的距离不对应。或者简单地说，策略参数的微小变化可能导致动作概率发生巨大变化。


    为了说明这个问题，考虑一个参数化策略 `π(a|θ)`，其中 `θ` 只是一个标量。该策略定义如下：


    ```

    π(a=1|θ) = 1 / (1 + e^{-θ})

    ```


    ```

    π(a=0|θ) = 1 - π(a=1|θ)

    ```


    现在，让我们在两个不同的参数值 `θ_1 = 0` 和 `θ_2 = 1` 下评估该策略。在 `θ_1` 处，策略选择动作 `a=0` 的概率为 `π(a=0|θ_1)
    = 1/2`，选择动作 `a=1` 的概率为 `π(a=1|θ_1) = 1/2`。


    在 `θ_2` 处，策略选择动作 `a=1` 的概率为 `π(a=1|θ_2) ≈ 0.73`，选择动作 `a=0` 的概率为 `π(a=0|θ_2) ≈
    0.27`。


    我们可以看到，策略参数从 `θ_1` 到 `θ_2` 的微小变化导致了动作概率的巨大变化。事实上，选择动作 `a=1` 的概率从 `θ_1` 到 `θ_2`
    增加了超过 45%。这凸显了策略对参数微小变化的敏感性，并强调了在策略梯度算法中谨慎选择优化方法和步长的重要性。

    '
- fmt: '### Poor Data Efficiency


    Another problem with the standard policy gradient methods is that it has poor
    data efficiency. This is because policy gradient methods like Actor-Critic are
    on-policy learning methods. On-policy methods update the policy parameters using
    trajectories generated by the current policy, which can lead to slow convergence
    and poor sample efficiency.


    Furthermore, policy gradient algorithms require a large number of trajectories
    to estimate the gradient accurately. This can be problematic in environments where
    data is expensive or time-consuming to obtain, as it can lead to poor sample efficiency.
    For example, in real-world applications such as robotics, it may be expensive
    or time-consuming to obtain a large number of trajectories due to the physical
    constraints of the robot.


    One possible solution is to use the importance sampling ratio to address this
    issue. The importance sampling weight is the ratio of the probability of taking
    an action under the current policy to the probability of taking the same action
    under the distribution from which the sample was drawn (old policy).


    The importance sampling ratio can be computed using the following equations:


    ```

    \displaystyle \begin{aligned} \rho_t & = \frac{\pi''(a_t|s_t)}{\pi(a_t|s_t)} \end{aligned}

    ```


    (11.1) where `\pi ''` is the new policy and `\pi` is the old policy used to generate
    the samples.


    Although importance sampling seems to be useful, they might introduce other issues
    like exploding or vanishing importance sampling weights. This is because when
    the distribution from which the sample was drawn assigns a low probability to
    the action taken by the current policy, the importance sampling weight can become
    very large, leading to instability and slow convergence of the policy gradient.
    Similarly, when the distribution assigns a high probability to the action taken
    by the current policy, the importance sampling weight can become very small, leading
    to a vanishing gradient.


    For example, consider a simple reinforcement learning problem where the agent
    can take two actions, `a_1` and `a_2`, with equal probability. The reward for
    taking action `a_1` is 1, and the reward for taking action `a_2` is `-1`. The
    agent’s policy is to take action `a_1` with probability *p* and action `a_2` with
    probability `1-p`. Let’s assume that we want to estimate the gradient of the expected
    reward with respect to *p* using importance sampling. We can sample from a uniform
    distribution, which assigns a probability of 0.5 to both actions.


    The importance sampling weight for action `a_1` is


    ```

    \displaystyle \begin{aligned} w_1 = \frac{p}{0.5} = 2p\end{aligned}

    ```


    The importance sampling weight for action `a_2` is


    ```

    \displaystyle \begin{aligned} w_2 = \frac{1-p}{0.5} = 2(1-p)\end{aligned}

    ```


    However, if the agent’s policy assigns a low probability to taking action `a_1`,
    say `p=0.1`, then the importance sampling weight for action `a_1` becomes very
    small:


    ```

    \displaystyle \begin{aligned} w_1 = 2(0.1) = 0.2\end{aligned}

    ```


    Similarly, if the agent’s policy assigns a high probability to taking action `a_1`,
    say `p=0.9`, then the importance sampling weight for action `a_1` becomes very
    large:


    ```

    \displaystyle \begin{aligned} w_{1} = 2(0.9) = 1.8\end{aligned}

    ```


    In both cases, the importance sampling weight is not stable and can lead to slow
    convergence of the policy gradient. This instability is known as the high variance
    problem. The problem can get worse if we use a large step size to update the policy
    parameters.'
