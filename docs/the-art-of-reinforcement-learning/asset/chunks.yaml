    ### Linear Value Function Approximation for Control


    Once we know how to estimate the state-action values by using the policy evaluation
    algorithm introduced earlier using linear function approximation, we can start
    to improve the policy (do control). To do this, we need to deal with the exploration
    problem, which we can use the ![$$\epsilon $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq191.png)-greedy
    policy introduced in Chap. 5. Briefly, the ![$$\epsilon $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq192.png)-greedy
    policy selects the action with the highest estimated value with probability ![$$1-\epsilon
    $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq193.png) and a random
    action with probability ![$$\epsilon $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq194.png).
    This allows the agent to explore less-visited states with some probability while
    still exploiting its current knowledge of the value function.


    We can use the Monte Carlo policy iteration algorithm to improve the policy, which
    uses a linear function ![$$\hat {Q}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq195.png)
    to approximate the true state-action value function ![$$Q_\pi $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq196.png).


    Algorithm 5 is very similar to Algorithm 3; the difference between these two is
    that the agent is acting according to the ![$$\epsilon $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq197.png)-greedy
    policy, which was build upon the linear function ![$$\hat {Q}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq198.png),
    where ![$$\hat {Q}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq199.png)
    is parameterized by ![$$\boldsymbol {w}$$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_IEq200.png).


    **Algorithm 5:** Every-visit Monte Carlo control with linear-VFA *𝜖*-greedy policy
    for Exploration


    ![](images/605748_1_En_6_Chapter/605748_1_En_6_Figaae_HTML.gif) An algorithm of
    every visit Monte Carlo control with linear V F A is an element of greedy policy
    for exploration.


