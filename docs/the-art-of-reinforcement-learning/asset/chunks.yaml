- fmt: '### 3.1 Use DP to Solve MRP Problem


    To get us started with DP algorithms, let’s first focus on the Markov reward process
    (MRP) case, which is much simpler than MDP as it does not involve any actions
    in the process. We still focus on our service dog MRP problem, which we’ve introduced
    in Chap. [2](#605748_1_En_2_Chapter.xhtml).


    The Bellman equation for the state value function in the case of Markov reward
    processes (MRPs) is expressed as


    ![$$\displaystyle \begin{aligned} V(s)=R(s) + {\gamma} \sum_{s'' \in \mathcal{S}}
    P(s''|s) V(s''), \quad \mbox{for all}\; s \in \mathcal{S} \end{aligned} $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_Equa.png)


    Here, `γ` is the discount rate; `R(s)` is the reward obtained from the environment;
    `P(s'' | s)` is the dynamics function of the environment, which specifies the
    probability of transitioning from state `s` to `s''`; and `V(s'')` is the value
    of the successor state.


    If we have access to the true model of the MRP, we can use the DP method to compute
    the state values for the different states of MRP. The DP algorithm works by sweeping
    over the entire state space of the MRP in each iteration, computing and updating
    the state value for each state using the reward and discounted values of the successor
    state. This process is repeated for a large number of iterations until the true
    state values are obtained. The pseudocode for the algorithm is shown in Algorithm
    1, which is the algorithm we used to compute the state values for our service
    dog MRP back in Chap. [2](#605748_1_En_2_Chapter.xhtml) as shown in Fig. [2.7](#605748_1_En_2_Chapter.xhtml#Fig7).


    Algorithm 1: DP compute state value function for MRP


    ![](images/605748_1_En_3_Chapter/605748_1_En_3_Figaaa_HTML.gif) A 3-line code
    titled `DP compute state value function for MRP` takes the discount rate `gamma`
    as the input to give the state value function `V` for an MRP as the output.


    But reinforcement learning is primarily concerned with solving Markov decision
    processes (MDPs), which involve agents making decisions during the learning process.
    In the remainder of this chapter, we will focus on the use of DP algorithms to
    solve MDPs.


    ### 3.2 Policy Evaluation


    The goal of solving a reinforcement learning or MDP problem is to find the optimal
    policy `π*`. However, before we start searching for the optimal policy, let’s
    first consider a simpler problem: given two different policies `π` and `π''`,
    how can we tell which one is better?


    To answer this question, we can use the state value function `Vπ`. The value function
    measures how good or bad it is for the agent to be in a state by measuring the
    expected return starting from that state and following a policy `π`. If we have
    an accurate estimate of the state value function for each of these policies `π`
    and `π''`, we can then measure the difference between these two policies. We say
    a policy `π''` is as good as or better than policy `π` when the expected return
    `Vπ''(s)` is greater than or equal to `Vπ(s)`, for all states `s` in the state
    space:


    ![$$\displaystyle \begin{aligned} \pi'' \ge \pi \quad \mbox{if}\; V_{\pi''}(s)
    \ge V_\pi(s), \quad \mbox{for all}\; s \in \mathcal{S} \end{aligned}$$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_Equb.png)


    We can estimate the value of a single state `s` for a policy `π` using the Bellman
    equation for `Vπ` and the model of the environment. To compute the value of each
    state in the state space, we can generalize this process by iteratively computing
    the value of each state in the state space using the Bellman equation for `Vπ`
    and the model of the environment. This process is known as *policy evaluation*.
    The algorithm estimates the state value function `Vπ` for an arbitrary policy
    `π`. Policy evaluation is also known as prediction, as it predicts the state value
    function for a policy `π`.


    The core of the policy evaluation algorithm is the Bellman equation for `Vπ`:


    ![$$\displaystyle \begin{aligned} V_\pi(s) &amp; =\mathbb{E}_{\pi\!\!}\left[R_t
    + {\gamma} V_\pi(S_{t+1}) \;\Big|\;S_t=s\right] \\ &amp; =\sum_{a \in A} \pi(a|s)
    \Big[R(s, a) + {\gamma} \sum_{s'' \in \mathcal{S}} P(s''|s, a) V_\pi(s'') \Big],
    \quad \mbox{for all}\; s \in \mathcal{S} {} \end{aligned} $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_Equ1.png)


    (3.1)'
