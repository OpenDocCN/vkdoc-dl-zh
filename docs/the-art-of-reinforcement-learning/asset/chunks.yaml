    图 14.17 展示了在评估对局中计算出的智能体 Elo 等级分，其中最新模型与上一检查点的模型进行对弈。该智能体始终获得极高的 Elo 等级分，证实了我们之前的解释。在五子棋中，尤其是在较大的棋盘上，执黑方拥有显著优势，因为它可以通过持续走出最佳着法来确保胜利。除了
    Elo 等级分，我们还提供了关于评估对局时长的宝贵见解，这作为评估智能体性能的另一个指标。对于五子棋而言，评估对局的持续时间成为一个关键考量因素。通常，如果智能体缺乏有效阻挡对手的能力，对局会在大约十步内结束，尤其是在初始训练阶段。然而，随着智能体学习的深入，它掌握了成功阻挡对手着法的技巧，这通常意味着更长且更具挑战性的对局。


    ![](img/605748_1_En_14_Fig17_HTML.png)


    两张图分别展示了 Elo 等级分和评估对局时长随训练步数的变化。前者呈现从 (0, 0) 到 (220, 2450) 的上升趋势。后者趋势在 (0, 55)
    到 (220, 23) 之间波动。数值为估算值。


    **图 14.17** AlphaZero 智能体在 `13 x 13` 五子棋棋盘上的表现。左图：根据当前（最新）模型与上一检查点模型之间的评估对局计算出的
    Elo 等级分。右图：评估对局的时长


    然而，值得注意的是，在较小的棋盘（例如 `9 x 9`）上，结果会有显著差异。在这种情况下，经过一定时间的训练后，Elo 等级分往往会趋于平稳。此外，评估对局的时长通常会延长至
    `9 x 9 = 81` 步。出现这种现象是因为在较小的棋盘上，先手方（黑方）受到空间限制，无法执行复杂的着法。因此，对局往往在任一方获胜之前就以棋盘完全占满而告终。


    图 14.18 展示了智能体在 `13 x 13` 五子棋棋盘上的训练进程，并展示了其在评估对局中的表现。值得注意的是，智能体在短短 18,000 个训练步内就展现出显著的学习成果，成功通过水平连成五子取得胜利。大约在
    28,000 个训练步时，智能体展现出在简单场景中阻挡对手着法的能力。大约在 68,000 个训练步时，出现了一个显著的突破，智能体发现了一种有效的获胜策略——通过斜向连子取胜。此外，它迅速学会了应对对手试图斜向获胜的尝试。智能体的能力持续提升，在大约
    148,000 个训练步时尤为明显，它始终展现出强劲的棋力。事实上，智能体变得几乎不可战胜，其最优着法使得白方的最佳努力也徒劳无功。即使经过进一步训练，智能体也始终展现出这种卓越的表现。


    ![](img/605748_1_En_14_Fig18_HTML.png)


    六幅在 13x13 网格上不同阶段五子棋策略棋盘游戏的示意图。


    **图 14.18** 用于展示智能体在 `13 x 13` 五子棋棋盘上训练不同阶段的评估对局，我们使用最新模型（黑方）与上一检查点的模型（白方）对弈。这为智能体在训练过程中习得多种获胜策略提供了证据。最终，智能体达到了强大的棋力水平，其着法使得白方尽管尽力阻挡对手的进展，也无法获胜。

    '
- fmt: '# 14.6 Summary


    In the final chapter of this book, we delved into the renowned AlphaZero algorithm,
    which has achieved remarkable success in reinforcement learning (RL) by defeating
    world champions in complex and challenging strategic games.


    We began by explaining why model-free reinforcement learning falls short in solving
    such difficult problems and why a model-based approach is necessary for effective
    planning. Subsequently, we explored the limitations of traditional search algorithms
    when confronted with games like Go, which have enormous search trees.


    A significant portion of the chapter was dedicated to elucidating the Monte Carlo
    Tree Search (MCTS) algorithm, which lies at the core of the AlphaZero agent. We
    provided an overview of the general MCTS algorithm and described its different
    phases during a search session. Furthermore, we demonstrated how the MCTS algorithm
    can be applied to two-player zero-sum games.


    Having established a solid understanding of the MCTS algorithm, we proceeded to
    explain the AlphaZero algorithm. Our focus remained exclusively on AlphaZero due
    to its generality, power, and relatively straightforward implementation compared
    to its successors. We elucidated the state representation for the game of Go and
    outlined the architecture of the neural network employed in AlphaZero.


    Next, we introduced the modified MCTS algorithm used by AlphaZero. Unlike the
    general MCTS algorithm, AlphaZero does not simulate the game until the end during
    rollout; instead, it employs the neural network’s predictions as estimated game
    outcomes. This approach significantly speeds up the process compared to full simulation.


    In conclusion, we presented the results of our experiments training the AlphaZero
    agent on a ![$$9 \times 9$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq201.png)
    Go board, which requires fewer computational resources and a smaller budget compared
    to the traditional ![$$19 \times 19$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq202.png)
    Go board. Remarkably, our trained agent achieved an amateur 1 dan level of play
    despite only 50 hours of training, one million games, and no fine-tuning of the
    training process or hyperparameters.


    For individuals who may not have access to the necessary resources or those who
    may not be interested in Go, we have additionally conducted a comparable experiment
    utilizing a ![$$13 \times 13$$](images/605748_1_En_14_Chapter/605748_1_En_14_Chapter_TeX_IEq203.png)
    Gomoku board. Although Gomoku is a less complex game compared to Go, this experiment
    unveils interesting insights into the agent’s performance. It sheds light on the
    difficulties encountered by conventional neural network architectures when dealing
    with edge cases in Gomoku while also showcasing how a simple modification to the
    neural network architectures can rectify this issue.


    By conducting extensive experiments and analyses, we have drawn our final conclusions.
    However, we humbly acknowledge that our understanding may not be complete, and
    there may be areas we have not fully explored. Like an iceberg, the depths of
    RL are vast, and this book represents only a fraction of what lies beneath the
    surface.


    For example, as we near the completion of this book, an exciting development has
    emerged from DeepMind’s recent publication. They have unveiled a new RL agent
    called AlphaDev [[18](#605748_1_En_14_Chapter.xhtml#CR18)], which is a modified
    version of the AlphaZero agent discussed in this chapter. According to their claims,
    the AlphaDev agent has made significant breakthroughs in discovering faster sorting
    algorithms. This announcement has generated tremendous enthusiasm, as it holds
    the promise of transforming our understanding of computation and coding. Furthermore,
    it provides compelling evidence that RL and the AlphaZero approach can be successfully
    employed to tackle real-world challenges.


    As we reach the end of this book, we would like to extend our deepest gratitude
    for your unwavering interest and express our hope that this comprehensive exploration
    of reinforcement learning (RL) fundamentals, mathematics, and algorithms has proven
    to be both enlightening and enjoyable for you.


    Throughout our journey, we humbly acknowledge that we may have faced challenges
    and made mistakes along the way. We are committed to continuous improvement and
    value your feedback to help us refine and enhance the content. Please don’t hesitate
    to reach out with any concerns or corrections.


    We encourage you to continue your exploration of the ever-expanding field of RL.
    May your continued journey lead you to new insights and groundbreaking discoveries
    as you delve deeper into this thrilling realm of research. Above all, we sincerely
    hope that this book has provided you with a solid foundation and has served as
    an inspiration for your future endeavors.'
