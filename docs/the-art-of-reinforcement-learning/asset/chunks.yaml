- fmt: '# 3.4 Policy Iteration


    Policy iteration is an algorithm for finding the optimal policy in a Markov decision
    process (MDP). The algorithm consists of two main steps, policy evaluation and
    policy improvement, which are iteratively applied to refine the policy until it
    converges to the optimal policy.


    The key idea behind policy iteration is to use the value function to greedily
    select better actions and then update the value function using the new policy.
    The algorithm starts with an initial policy, which is typically chosen randomly,
    and then iteratively improves the policy by estimating the value function and
    selecting better actions.


    The policy iteration algorithm runs these two steps iteratively in a loop. At
    each iteration, we first estimate the state value function `V_π^i` for the current
    policy `π^i`, using the policy evaluation algorithm. The value function represents
    the expected cumulative reward that can be obtained by following the policy from
    a given state.


    ```

    π^0 → (evaluation) V_π^0 → (improvement) π^1 → (evaluation) V_π^1 → (improvement)
    π^2 → ... → (improvement) π_*

    ```


    Once we have estimated the value function, we use it to select better actions
    by running the policy improvement algorithm. The policy improvement algorithm
    greedily selects the action that maximizes the expected cumulative reward, based
    on the estimated value function. This new policy is denoted by `π^(i+1)` and is
    an improvement over the previous policy `π^i`.


    We repeat these two steps, policy evaluation and policy improvement, until convergence.
    Convergence is achieved when the old policy `π^i` is the same as `π^(i+1)` for
    every state in the state space, meaning there''s no improvement that can be made
    anymore.


    The policy iteration algorithm is summarized in Algorithm 4. Note that this algorithm
    can be computationally expensive, especially for large MDPs, but it is guaranteed
    to converge to the optimal policy.


    **Algorithm 4: Policy iteration, iterative algorithm**


    A 6-line algorithm titled policy iteration, iterative algorithm takes in the following
    inputs to give optimal policy `π*` and the optimal value function `V*`, `Q*` as
    the result. Discount rate `γ`, a small threshold `ε` determining the accuracy
    of the estimation.


    A nodal map for optimal policy `π` for the service dog MDP highlights the following
    paths: Room 1 to Room 2 via `r = -1`. Room 2 to Room 3 via `r = -1`. Room 3 =
    found item via `r = 10`. Outside to Room 2 via `r = 0`.


    **Fig. 3.3** Optimal policy `π_*` for the service dog MDP


    Overall, policy iteration is a powerful algorithm for finding the optimal policy
    in an MDP. By iteratively refining the policy and updating the value function,
    we can converge to the optimal policy. However, it is important to note that the
    policy iteration algorithm may not be suitable for large MDPs, as it can be computationally
    expensive. In such cases, other algorithms such as value iteration (which we will
    introduce later in this chapter) may be more appropriate.


    ## Worked Example


    We can use the policy iteration algorithm to solve our service dog MDP. The computed
    optimal policy `π_*` for the MDP is shown in Fig. 3.3. Along with the optimal
    policy, we obtain the optimal value functions `V_*` and `Q_*`, which are shown
    in Figs. 3.4 and 3.5, respectively. These values were computed using a discount
    factor of `γ = 0.9`.


    **Table 3.1** Optimal state value for the service dog MDP, with different discount
    factors `γ`


    | Discount | Room 1 | Room 2 | Room 3 | Outside | Found item |

    |----------|--------|--------|--------|---------|------------|

    | `γ = 0.0` | -1.0 | -1.0 | 10.0 | 0.0 | 0 |

    | `γ = 0.3` | -0.4 | 2.0 | 10.0 | 0.6 | 0 |

    | `γ = 0.5` | 1.0 | 4.0 | 10.0 | 2.0 | 0 |

    | `γ = 0.7` | 3.2 | 6.0 | 10.0 | 4.2 | 0 |

    | `γ = 0.9` | 6.2 | 8.0 | 10.0 | 7.2 | 0 |

    | `γ = 1.0` | 8.0 | 9.0 | 10.0 | 9.0 | 0 |


    A nodal map for optimal state-action value function `Q*` for the service dog MDP
    runs as follows: 6.2 to 8.2 via `Q* = 6.2`. 8.2 to 10.0 via `Q* = 8.0`. 10.0 to
    0.0 via `Q* = 10`. 8.2 to 7.2 via `Q* = 6.5`. 7.2 reverts to 8.2 via `Q* = 7.2`.
    7.2 circles back to itself via `Q* = 4.8`.


    **Fig. 3.5** Optimal state-action value function `Q_*` for the service dog MDP,
    `γ = 0.9`


    A nodal map for optimal state value function `V*` for the service dog MDP runs
    as follows: 6.2 to 8.2 via `r = -1`. 8.2 to 10.0 via `r = -1`. 10.0 to 0.0 via
    `r = 10`. 8.2 to 7.2 via `r = 0`. 7.2 reverts to 8.2 via `r = 0`. 7.2 circles
    back to itself via `r = -1`.


    **Fig. 3.4** Optimal state value function `V_*` for the service dog MDP, `γ =
    0.9`


    By running the policy iteration algorithm with different discount factors `γ`,
    we can observe how the discount affects the state values, as shown in Table 3.1.
    Notably, the value of the terminal state is always zero.'
