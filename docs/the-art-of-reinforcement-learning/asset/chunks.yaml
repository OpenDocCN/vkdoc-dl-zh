- fmt: '# 5.5 On-Policy vs. Off-Policy


    Reinforcement learning is a type of machine learning where an agent learns to
    take actions in an environment to maximize a cumulative reward signal. In this
    chapter and previous chapters, we have introduced several on-policy reinforcement
    learning algorithms. However, before we delve further into these algorithms, let’s
    first define what an on-policy algorithm is.


    In reinforcement learning, it is important to distinguish between the behavior
    policy and the target policy. The behavior policy, denoted by `μ`, is the policy
    that the agent follows when interacting with the environment to generate sample
    experience, while the target policy, denoted by `π`, is the policy that the agent
    is trying to learn. An on-policy reinforcement learning algorithm is one where
    the behavior policy and the target policy are the same policy, that is, `π = μ`.


    On the other hand, an off-policy reinforcement learning algorithm is one where
    the behavior policy and the target policy are different, that is, `π ≠ μ`. One
    example of an off-policy algorithm is Q-learning, which we’ll cover later in this
    chapter, which learns the optimal action-value function, `Q*`, regardless of the
    behavior policy.


    For example, Monte Carlo and TD(0) learning algorithms such as SARSA learn the
    state-action value function for the behavior policy, `μ`, using the experiences
    generated by following the same policy, `μ`, to interact with the environment.
    These kinds of on-policy reinforcement learning algorithms are relatively simple,
    but they can be less efficient when the behavior policy is less exploratory than
    the target policy.


    Off-policy reinforcement learning algorithms are often more powerful because they
    can use experience generated by a different behavior policy, which may be more
    exploratory than the target policy. A commonly used technique in off-policy reinforcement
    learning is importance sampling.


    Importance sampling is a method for computing the expected value of a random variable
    using samples generated under a different distribution. For example, suppose we
    have a behavior policy `μ` and a target policy `π`, where `μ ≠ π`, and we want
    to estimate the state value function, `Vπ`, for the target policy, `π`. When the
    agent is in some state `s` and following the behavior policy `μ`, it needs to
    choose an action, and the probability of selecting some action `a` when in state
    `s` is defined as `μ(a|s)`. After the agent takes action `a` in the environment,
    the environment could transition to some successor state `s''`, and the state
    transition probability is defined by the dynamics of the environment, denoted
    by `p(s''|s, a)`. The probability that the agent will end up in a successor state
    `s''` while it is currently in state `s` and following the policy `μ` is defined
    as `μ(a|s) p(s''|s, a)`.


    However, if the agent is following the target policy `π`, the probability of it
    ending up in a successor state `s''` while it is currently in state `s` is defined
    as `π(a|s) p(s''|s, a)`. Since `μ ≠ π`, it is likely that these two trajectories
    will be different. To correct for this difference, we use importance sampling.


    Importance sampling involves weighting the return of each sample generated by
    the behavior policy `μ` by the ratio of the probabilities of the actions selected
    by `μ` and `π`. This way, we can estimate the expected return for the target policy
    `π` using the samples generated by the behavior policy `μ`.


    When using off-policy reinforcement learning and TD policy evaluation for `Vπ`,
    we need to compute the importance sampling ratio for a single transition tuple
    `(St, At, Rt, St+1)`. The importance sampling ratio is a ratio of the probabilities
    of taking an action under the target policy `π` vs. the behavior policy `μ`. This
    ratio is used to correct for the fact that the agent’s experience may have been
    generated by a different policy than the one being evaluated (Fig. 5.3).


    ![](images/605748_1_En_5_Chapter/605748_1_En_5_Fig3_HTML.png)'
