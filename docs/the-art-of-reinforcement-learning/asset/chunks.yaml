    give an improved policy as the output. Estimated state value function Q pie for
    pie and exploration rate epsilon.


    In summary, Monte Carlo policy improvement allows us to directly estimate the
    state-action value function ![$$Q_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq139.png)
    and use it to improve the policy, without having to first estimate the state value
    function as in DP. Using an ![$$\epsilon $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq140.png)
    -greedy policy for exploration, we can balance exploration and exploitation during
    learning and converge to the optimal policy.


    We adapt the general policy iteration template introduced in Chap. [3](#605748_1_En_3_Chapter.xhtml)
    for Monte Carlo control, which is to find the optimal policy by learning its value
    function. But there are some changes we need to make. The first change is, during
    Monte Carlo policy evaluation, we need to estimate the state-action value function
    ![$$Q_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq141.png)
    instead of ![$$V_\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq142.png)
    for the policy ![$$\pi $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq143.png)
    . The second change is when to stop running the algorithm. As in DP, we stop when
    the policy from the previous iteration is the same as the current iteration, meaning
    no improvement can be made. But in Monte Carlo, the whole process of policy evaluation
    is based on the number of sample episodes, so we often define the stop condition
    based on the number of sample episodes we want the agent to collect. One last
    optional change, since we’re now using ![$$\epsilon $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq144.png)
    -greedy policy for exploration, we may want to decrease the exploration rate ![$$\epsilon
    $$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq145.png) , for example,
    after every iteration.


    We now introduce the first-visit Monte Carlo control algorithm with the incremental
    update method, as shown in Algorithm 6\. We can easily extend this into the every-visit
    case by simply removing the condition check during the policy evaluation process.


    Algorithm 6: First-visit Monte Carlo control with incremental update and *𝜖*-greedy
    exploration


    ![](images/605748_1_En_4_Chapter/605748_1_En_4_Figaag_HTML.gif) A 14-line algorithm
    of first-visit Monte Carlo control with incremental update and epsilon minus greedy
    exploration takes the following inputs to find an optimal policy pie and its scale-action
    value function Q pie. Discount rate gamma, initial exploration rate epsilon, and
    number of episodes K.


    We can run Algorithm 6 to find the optimal policy for our service dog MDP. And
    amazingly after ten episodes, it found the optimal policy, although the values
    are not quite close to the true optimal state value function ![$$V_*$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq146.png)
    .


    We can also see from Table [4.3](#605748_1_En_4_Chapter.xhtml#Tab3), as we increase
    the number of episodes, the values are getting closer to the true optimal state
    value ![$$V_*$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_IEq147.png)
    . One interesting fact is for the state *Outside*, the values are never getting
    closer to the true value; this might be because the agent has never visited the
    state that often during the learning process. So the value is not getting updated
    that often.


