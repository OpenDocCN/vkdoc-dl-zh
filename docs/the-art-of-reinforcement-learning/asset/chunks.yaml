  trans: '

    ### 实验结果


    我们现在展示在 ![$$9 \times 9$$](img/605748_1_En_14_Chapter_TeX_IEq182.png) 围棋棋盘上进行的实验训练结果。如前所述，我们采用了包含
    11 个模块的神经网络架构进行训练。训练过程在一台配备 128 个 CPU 和 8 个 GPU 的服务器上进行。智能体共训练了 200,000 步，耗时约
    50 小时。


    图 14.10 展示了神经网络的训练损失。随着训练的进行，策略的交叉熵损失和价值的均方误差（MSE）损失均呈现收敛趋势。这是符合预期的行为，因为对于 AlphaZero
    算法而言，训练目标仅专注于最小化这些损失，而策略则通过 MCTS 搜索算子得到改进。值得注意的是，交叉熵损失的收敛速度要快得多，这表明准确预测对弈结果是一项更具挑战性的任务。


    ![](img/605748_1_En_14_Fig10_HTML.png)


    两张图分别绘制了交叉熵损失和均方误差损失随训练步数的变化。它们分别呈现从 (0, 4.3) 到 (220, 1.3) 和从 (0, 0.9) 到 (220,
    0.19) 的下降趋势。趋势波动剧烈。数值为估计值。


    **图 14.10** AlphaZero 智能体在 ![$$9 \times 9$$](img/605748_1_En_14_Chapter_TeX_IEq183.png)
    围棋棋盘上训练期间的策略交叉熵损失（左）和价值均方误差损失（右）


    图 14.11 和 14.12 展示了模型基于一个包含 10,000 局对弈和 620,000 个棋局位置的评估数据集的预测准确率。该评估数据集的创建方法已在前面描述。值得注意的是，在训练
    100,000 步后，模型对评估数据集中落子位置的预测率达到 40%。此外，我们观察到模型准确预测人类对弈结果的能力有所提升。


    ![](img/605748_1_En_14_Fig12_HTML.png)


    一张人类对弈结果均方误差随训练步数变化的图。绘制的趋势从 (0, 0.93) 到 (220, 0.67) 呈波动下降。数值为估计值。


    **图 14.12** 神经网络对人类对弈结果预测的均方误差。它显示了神经网络预测的价值与实际对弈结果之间的未缩放误差。


    ![](img/605748_1_En_14_Fig11_HTML.png)


    一张图绘制了人类落子预测准确率（百分比）随训练步数的变化。它呈现一条波动趋势，从 (0, 4) 到 (220, 48) 呈凹形上升。数值为估计值。


    **图 14.11** 神经网络对人类落子预测的准确率。它衡量了 top-1 预测准确率的百分比，即概率最高的预测与实际人类落子相匹配的比例。


    图 14.13 展示了训练过程中智能体的 Elo 等级分。这些等级分是根据评估对局计算得出的，其中最新模型执黑，与上一检查点的模型（执白）对弈。结果表明，智能体的性能在大约
    150,000 训练步时达到峰值。随着训练的继续，性能开始出现分化且未能恢复。我们怀疑这个问题的主要原因是学习率过大。在我们的实验中，初始学习率设置为 0.01，并计划在训练步数达到
    200,000 和 400,000 时，分别以阶梯方式降低至 0.001 和 0.0001。然而，由于智能体可能在 100,000 训练步后已达到一定水平，更合适的做法是更早地降低学习率，例如在训练步数达到
    100,000 和 200,000 时，分别降低至 0.001 和 0.0001。


    ![](img/605748_1_En_14_Fig13_HTML.png)


    一张 Elo 等级分随训练步数变化的图。它绘制了一条从 (0, 10) 到 (220, 220) 呈波动上升的趋势。数值为估计值。


    **图 14.13** AlphaZero 智能体在 ![$$9 \times 9$$](img/605748_1_En_14_Chapter_TeX_IEq184.png)
    围棋棋盘上的性能。Elo 等级分是根据当前（最新）模型与上一检查点模型之间的评估对局计算得出的。


    为了评估我们智能体的真实实力，我们与一个名为 CrazyStone [17] 的计算机程序进行了一系列比赛。CrazyStone 利用深度神经网络进行落子预测，被证明是一个强大的对手。我们最先进的模型（来自训练步数
    154,000 的 11 模块版本）表现出了卓越的性能，在与 CrazyStone 业余 1 段水平的对弈中，20 局赢了 16 局。这一结果无疑证明了我们的智能体达到了相当高的水平，尽管其在自我对弈评估对局中的
    Elo 等级分相对较低。然而，需要注意的是，当我们的智能体与 CrazyStone 的 2 段水平对手对弈时，并未能持续获胜。考虑到智能体训练时间相对较短且接触的对局数量有限，我们认为这个结果是令人满意的。需要强调的是，我们并未对智能体的训练方法或超参数进行广泛的微调。


    在图 14.14 中，我们展示了与 CrazyStone 业余 1 段水平对手进行的前 12 局对弈的终局状态。我们的智能体执白，CrazyStone 执黑。胜负判定采用中国规则，贴目为
    7.5 目（白方）。


    ![](img/605748_1_En_14_Fig14_HTML.png)


    一组 12 张与 CrazyStone 业余 1 段水平对手对弈的围棋棋局图，展示了不同的对弈结果。


    **图 14.14** 在这些对局中，我们的智能体（执白）对阵 CrazyStone（执黑）。我们使用了 11 模块模型版本，并精心挑选了在 154,000
    训练步后产生的最佳模型。为了提供合适的挑战，CrazyStone 被设置为业余 1 段水平。对局采用中国规则计分，白方贴 7.5 目。

