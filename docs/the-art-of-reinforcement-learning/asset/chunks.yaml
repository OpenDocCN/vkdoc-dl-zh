- fmt: '### Humanoid


    `Humanoid`环境^([⁹](#fn9))来自OpenAI Gym和MuJoCo，是一个用于评估强化学习算法的标准基准，这些算法旨在控制一个模拟人类的3D双足机器人。任务是协调机器人17个铰接关节的运动，使其能够尽可能快地向前行走而不摔倒。


    智能体执行的每个动作代表施加在人体关节上的扭矩，观测值由人体不同部位的位置值和速度值组成。躯干有一对腿和手臂，每条腿和手臂由两个连杆组成。


    `Humanoid`环境的奖励函数由四个部分组成。智能体在每个时间步，只要人体保持存活，就会获得一个固定值的奖励，称为“健康奖励”。它还会因向前行走而获得奖励，该奖励使用预定义规则衡量，称为“向前奖励”。然而，智能体会因使用过多扭矩控制关节而受到惩罚，称为“控制成本”，以及因承受过大的外部接触力而受到惩罚，称为“接触成本”。


    智能体的总奖励计算为健康奖励、向前奖励之和减去控制成本和接触成本，由公式`reward = healthy reward + forward reward
    - control cost - contact cost`给出。通过最大化这个总奖励，智能体学会协调人体关节的运动，以实现向前行走而不摔倒的目标。


    ### Ant


    `Ant`^([^(10)](#fn10))是另一个用于OpenAI Gym和MuJoCo中简单运动任务的3D机器人。它由一个躯干（一个自由旋转体）和连接在其上的四条腿组成。每条腿有两个连杆，共有八个铰链将每条腿的两个连杆连接到躯干。`Ant`任务的目标是通过对这八个铰链施加扭矩，协调腿部使蚂蚁向前移动。


    `Ant`任务的动作空间由施加在铰接关节上的扭矩组成。观测空间由蚂蚁不同部位的位置值和速度值组成。


    `Ant`任务的最终奖励计算为四个部分的总和：健康奖励、向前奖励，减去控制成本和接触成本。健康奖励鼓励蚂蚁保持稳定，向前奖励鼓励蚂蚁向前移动，控制成本惩罚控制输入的大小，接触成本惩罚与环境发生的碰撞。


    MuJoCo提供了多种机器人控制环境，我们可以用来研究和测试解决持续强化学习问题的算法。除了本书将重点关注的这两个环境外，MuJoCo环境的其他示例包括：


    *   `Walker2d`：一个设计用于用两条腿行走和跑步的双足机器人

    *   `Hopper`：一个设计用于跳跃和单腿跳的单腿机器人

    *   `HalfCheetah`：一个设计用于快速奔跑和冲刺的四足机器人

    *   `Swimmer`：一个设计用于游泳和在水中移动的机器人


    这些环境为我们的强化学习算法提供了多样化的挑战，使我们能够在各种场景下测试其鲁棒性和有效性。


    ## 10.3 连续动作空间问题的策略梯度


    现在我们将专注于能够解决之前介绍的经典机器人控制问题的算法。到目前为止，本书已经涵盖了两类算法：基于值的强化学习和基于策略的强化学习。虽然我们可以使用这两类算法来解决具有离散动作空间的强化学习问题，但对于具有连续动作空间的问题，我们通常使用基于策略的强化学习方法，因为正如本章前面所述，它们更有效。


    本质上，对于连续动作空间的问题，我们需要学习一个正态（或高斯）分布，因为动作是实数，而不仅仅是整数。正态分布的概率密度函数（PDF）如公式（10.1）所示，其中`μ`和`σ`是正态分布的均值和标准差，`π
    ≈ 3.1415926`是一个常数。


    ```

    p(x|μ, σ) = (1 / (σ * sqrt(2π))) * exp(- (x - μ)^2 / (2σ^2))

    ```


    (10.1)


    正态分布的概率密度函数呈钟形曲线，如图10.1所示。正态分布是许多现实世界分布的良好近似，因为它描述了围绕单个均值聚集的实值随机变量。理论上，对于正态分布，68%的总体或样本将落在总体或样本均值`μ`加减一个标准差`σ`的范围内，95%的总体或样本将落在均值两侧加减两个标准差（精确为1.96）的范围内。对于连续随机变量，获得任何特定值的概率始终为零，因为存在无限多个可能的值。


    在强化学习的背景下，我们知道策略`π(a|s)`只是从状态`s`到采取动作`a`的概率的映射。为了基于公式（10.1）构建连续动作的策略，我们需要考虑状态`s`和动作`a`。我们可以将公式（10.1）中的`x`替换为动作`a`。接下来，我们使用参数化函数`σ(s,
    θ_σ)`和`μ(s, θ_μ)`来近似均值`μ`和标准差`σ`。参数`θ_σ`和`θ_μ`在训练过程中学习，它们代表了策略基于观测状态生成动作的能力。这样一个策略的完整公式如下所示：'
  raw: '### Humanoid


    The Humanoid environment^([⁹](#fn9)) from the OpenAI Gym and MuJoCo is a standard
    benchmark for evaluating reinforcement learning algorithms that can control a
    3D bipedal robot designed to simulate a human. The task is to coordinate the motion
    of the robot’s 17 hinge joints so that it can walk forward as fast as possible
    without falling over.


    Each action taken by the agent represents the torques applied to the joints of
    the humanoid, and the observations consist of positional values and velocities
    for different body parts of the humanoid. The torso has a pair of legs and arms,
    with each leg and arm consisting of two links.


    The reward function for the Humanoid environment is composed of four components.
    The agent receives a fixed value reward every time step that the humanoid is alive,
    known as the “healthy reward.” It also receives a reward for walking forward,
    measured using predefined rules, known as the “forward reward.” However, the agent
    is penalized for using too much torque to control the joints, known as the “control
    cost,” and for experiencing too much external contact force, known as the “contact
    cost.”


    The total reward for the agent is calculated as the sum of the healthy reward,
    forward reward, minus the control cost and the contact cost, given by reward ![$$=$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq1.png)
    healthy reward ![$$+$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq2.png)
    forward reward ![$$-$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq3.png)
    control cost ![$$-$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq4.png)
    contact cost. By maximizing this total reward, the agent learns to coordinate
    the motion of the humanoid’s joints to achieve the goal of walking forward without
    falling over.


    ### Ant


    The Ant^([^(10)](#fn10)) is another 3D robot designed for simple locomotion tasks
    in OpenAI Gym and MuJoCo. It consists of one torso, which is a free rotational
    body, with four legs attached to it. Each leg has two links, and there are eight
    hinges connecting the two links of each leg to the torso. The goal of the Ant
    task is to coordinate the legs to move the ant forward by applying torques on
    these eight hinges.


    The action space of the Ant task consists of the torques applied to the hinge
    joints. The observation space consists of positional values and velocities for
    different body parts of the ant.


    The final reward for the Ant task is computed as the sum of four components: healthy
    reward, forward reward, minus the control cost and contact cost. The healthy reward
    encourages the ant to maintain its stability, the forward reward encourages the
    ant to move forward, the control cost penalizes the magnitude of the control inputs,
    and the contact cost penalizes collisions with the environment.


    MuJoCo offers a wide variety of robotic control environments that we can use to
    study and test our algorithms for solving continuing reinforcement learning problems.
    In addition to the two environments we will focus on in this book, some other
    examples of MuJoCo environments include


    *   Walker2d: A bipedal robot designed to walk and run on two legs


    *   Hopper: A one-legged robot designed to jump and hop


    *   HalfCheetah: A quadrupedal robot designed to run and sprint quickly


    *   Swimmer: A robot designed to swim and move through water


    These environments provide a diverse set of challenges for our reinforcement learning
    algorithms, allowing us to test their robustness and effectiveness in a variety
    of scenarios.


    ## 10.3 Policy Gradient for Problems with Continuous Action Space


    We’re now going to focus on the algorithms that can solve the classic robotic
    control problem we introduced earlier. So far in this book, we’ve covered two
    families of algorithms: value-based reinforcement learning and policy-based reinforcement
    learning. While we can use these two families of algorithms to solve reinforcement
    learning problems with discrete action spaces, for problems with continuous action
    spaces, we often use policy-based reinforcement learning methods because they
    are more effective as explained earlier in this chapter.


    In essence, for problems with continuous action spaces, we need to learn a normal
    (or Gaussian) distribution, as the actions are real numbers, not just integers.
    The probability density function (PDF) for the normal distribution is shown in
    Eq. ([10.1](#605748_1_En_10_Chapter.xhtml#Equ1)), where ![$$\mu $$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq5.png)
    and ![$$\sigma $$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq6.png)
    are the mean and standard deviation of the normal distribution, and ![$$\pi \approx
    3.1415926$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq7.png)
    is a constant.


    ![$$\displaystyle \begin{aligned} p(x|\mu, \sigma) = \frac{1}{\sigma \sqrt{2\pi}}
    \exp{- \frac{(x - \mu)^2}{2\sigma^2}} {} \end{aligned} $$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_Equ1.png)


    (10.1)


    The probability density function for a normal distribution has a bell-shaped curve,
    like the ones shown in Fig. [10.1](#605748_1_En_10_Chapter.xhtml#Fig1). The normal
    distribution is a good approximation for many real-world distributions because
    it describes real-valued random variables that cluster around a single mean value.
    In theory, for a normal distribution, 68% of the population or samples will be
    plus or minus one standard deviation ![$$\sigma $$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq8.png)
    from the population or sample mean ![$$\mu $$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq9.png)
    , and 95% of the population or samples will stretch out between plus and minus
    two standard deviations (precisely 1.96) on either side of the mean. For a continuous
    random variable, the probability of obtaining exactly any particular value is
    always zero because there are an infinite number of possible values.


    In the context of reinforcement learning, we know that a policy ![$$\pi (a|s)$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq10.png)
    is just a mapping from a state *s* to the probability of taking action *a*. To
    construct a policy for continuous actions based on Eq. ([10.1](#605748_1_En_10_Chapter.xhtml#Equ1)),
    we need to take into consideration the state *s* and action *a*. We can replace
    the *x* in Eq. ([10.1](#605748_1_En_10_Chapter.xhtml#Equ1)) with the action *a*.
    Next, we use parametric functions ![$$\sigma (s, \boldsymbol {\theta }_{\sigma
    })$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq11.png) and
    ![$$\mu (s, \boldsymbol {\theta }_{\mu })$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq12.png)
    to approximate the mean ![$$\mu $$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq13.png)
    and standard deviation ![$$\sigma $$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq14.png)
    . The parameters ![$$\boldsymbol {\theta }_{\sigma }$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq15.png)
    and ![$$\boldsymbol {\theta }_{\mu }$$](images/605748_1_En_10_Chapter/605748_1_En_10_Chapter_TeX_IEq16.png)
    are learned during the training process, and they represent the policy’s ability
    to generate actions based on the observed states. The complete equation for such
    a policy is then shown as follows:'
