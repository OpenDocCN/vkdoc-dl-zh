  trans: '

    相反，我们可以基于 `Q_π` 创建一个代理函数来构建 `ε`-贪婪策略。当智能体遵循此 `ε`-贪婪策略并需要在环境中做出决策时，该代理函数以概率 `ε`
    返回一个针对特定状态均匀采样的动作，并以概率 `1-ε` 返回根据 `Q_π` 对该状态的最佳动作。这种简化版的 `ε`-贪婪策略更加稳健，尤其是在处理大规模
    MDP 时，我们将在本书第二部分讨论这一点。


    为此，我们基于 `Q_π` 创建一个代理函数来构建 `ε`-贪婪策略，如算法 3 所示。当智能体遵循此 `ε`-贪婪策略并需要在环境中做出决策时，该代理函数以概率
    `ε` 返回一个针对特定状态均匀采样的动作，并以概率 `1-ε` 返回根据 `Q_π` 对该状态的最佳动作。


    算法 3：基于 *Q*[*π*] 的简化 *ε*-贪婪策略


    ```

    一个 8 行算法，用于计算基于 Q π 的简化 epsilon 减贪婪策略，使用 if else 语句并返回 a, P a。该算法接受以下输入：Q 状态-动作值函数，epsilon
    探索率，S t 环境状态。

    ```


    因此，无需额外步骤来专门改进策略，因为从示例代码可以看出，这种策略已不复存在。我们只需在智能体与环境交互需要选择动作时，使用这种简化版的 `ε`-贪婪策略即可。


    总之，`ε`-贪婪策略是 TD 控制中平衡探索与利用的有用工具。虽然它最初源自状态-动作值函数 `Q_π`，并且由于在使用 TD 方法时 `Q_π` 会不断更新，我们可以使用一种简化版的
    `ε`-贪婪策略，该策略无需更新 `π` 的策略概率分布。


    ## 5.4 TD 控制——SARSA


    状态-动作-奖励-状态-动作（SARSA）是我们想介绍的第一个 TD 控制算法。它是一种基于 TD 学习的在线、同策略、无模型强化学习算法。SARSA 可以处理情节式和连续式强化学习问题，并使用通用策略迭代模板来寻找最优策略。然而，SARSA
    通过使用 `ε`-贪婪策略简化了探索部分。`ε`-贪婪策略以概率 `1-ε` 选择使估计的状态-动作值函数 `Q_π` 最大化的动作（利用），并以概率 `ε`
    选择一个随机动作（探索）。


    在 SARSA 中，我们使用策略评估来估计状态-动作值函数 `Q_π`，而不是像蒙特卡洛策略评估那样估计 `V_π`。SARSA 算法使用贝尔曼方程更新估计的状态-动作值函数
    `Q_π`：


    ```

    Q_π(S_t, A_t) ← Q_π(S_t, A_t) + α (R_t + γ Q_π(S_{t+1}, A_{t+1}) - Q_π(S_t, A_t))

    ```


    (5.7)


    其中 `S_t` 和 `A_t` 表示当前状态和动作，`R_t` 是在状态 `S_t` 下执行动作 `A_t` 后获得的即时奖励，`S_{t+1}` 和 `A_{t+1}`
    表示下一个状态和动作，`γ` 是折扣因子，`α` 是步长参数。


    SARSA 算法使用估计的状态-动作值函数 `Q_π` 以在线方式更新策略。策略使用简化版的 `ε`-贪婪策略进行更新。具体来说，该策略以概率 `1-ε`
    选择使估计的状态-动作值函数 `Q_π` 最大化的动作（利用），并以概率 `ε` 选择一个随机动作（探索）。由于策略是以在线方式更新的，我们无需执行单独的策略改进步骤。

