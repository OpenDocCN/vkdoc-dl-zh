    # Part IIIPolicy Approximation


    # 9. Policy Gradient Methods


    In this chapter, we will explore policy-based methods, which is another category
    of family of reinforcement learning algorithms. In previous chapters, we focused
    on value-based methods, which estimate the optimal state-action value function.
    Value-based methods can become computationally expensive for large state or action
    spaces, and they can struggle with environments where the dynamics of the environment
    are stochastic.


    Policy-based methods, on the other hand, directly learn the optimal policy without
    estimating the state-action value function. We often use approximation techniques
    to parameterize the policy, such as a neural network, and use policy gradients
    to update the parameters. Policy gradients measure how much the expected return
    changes with respect to changes in the policy parameters. By optimizing the policy
    parameters to increase the expected return, policy-based methods learn to take
    actions that maximize the reward.


    Policy-based methods have several advantages over value-based methods. First,
    they can handle continuous and high-dimensional action spaces, which value-based
    methods may struggle with. Second, they can learn stochastic policies, which can
    be useful in environments where there is uncertainty or multiple good actions.


    In summary, policy-based methods provide an alternative approach to reinforcement
    learning that can handle large, continuous action spaces. Policy gradient algorithms
    like REINFORCE and Actor-Critic offer powerful ways to learn optimal policies
    directly from experience and can be combined with other methods to further improve
    performance.'
  trans: '

    # 8.4 小结


    在本章中，我们探讨了对标准 `DQN` 智能体的若干改进，以解决其局限性。尽管 `DQN` 智能体在雅达利游戏中达到了人类水平的表现，但在面对更复杂、更困难的游戏时仍面临挑战。通过融入这些改进，研究人员证明了智能体整体性能的显著提升。


    我们首先介绍了针对 `DQN` 的双 Q 学习，这是一种直接且简单的改进方法。双 Q 学习最初由 Hado Hasselt [1] 提出，后来被应用于 `DQN`
    [2]，有助于减轻与 Q 学习相关的最大化偏差。通过将双 Q 学习集成到 `DQN` 智能体中，我们观察到了显著的性能提升。


    接下来，我们深入探讨了 Schaul 等人 [3] 提出的优先经验回放概念。该技术强调使用更重要的转换来训练智能体，而非均匀采样经验。这种方法优先处理紧急的转换，有助于改善学习效果。


    此外，我们还讨论了优势函数及其在标准 `DQN` 智能体神经网络架构中的整合。这引出了对 `DQN` 智能体决斗网络架构的讨论，该架构展现出卓越的性能提升，这一想法最初由
    Wang 等人 [4] 提出。


    在实践中，本章讨论的所有改进方法被结合起来，以创建一个显著更强大的智能体。值得注意的是，除了这里提到的改进之外，还存在许多其他改进。例如，N 步回报（自举）方法
    [5] 的改编，以及使用神经网络预测状态-动作值分布而非单一值 [6, 7] 的探索，也引起了人们的关注。


    本章结束了本书的第二部分，该部分我们专注于值函数逼近，特别是使用神经网络进行非线性值函数逼近。虽然第一部分和[第二部分](https://doi.org/10.1007/978-1-4842-9606-6_II)都强调了基于值的方法（例如学习状态-动作值函数），但下一章将把我们的焦点转向基于策略的方法，这是解决强化学习问题的另一种同样强大的技术。


    # 第三部分：策略逼近


    # 9. 策略梯度方法


    在本章中，我们将探讨基于策略的方法，这是强化学习算法家族中的另一类。在前面的章节中，我们专注于基于值的方法，这些方法估计最优状态-动作值函数。对于大型状态或动作空间，基于值的方法在计算上可能变得昂贵，并且在环境动态具有随机性的环境中可能难以应对。


    另一方面，基于策略的方法直接学习最优策略，而无需估计状态-动作值函数。我们通常使用近似技术来参数化策略，例如神经网络，并使用策略梯度来更新参数。策略梯度衡量期望回报随策略参数变化的变化程度。通过优化策略参数以增加期望回报，基于策略的方法学会采取能最大化奖励的动作。


    基于策略的方法相比基于值的方法有几个优势。首先，它们可以处理连续且高维的动作空间，而基于值的方法可能难以应对。其次，它们可以学习随机策略，这在存在不确定性或多种良好动作的环境中非常有用。


    总之，基于策略的方法为强化学习提供了一种替代途径，能够处理大型、连续的动作空间。像 `REINFORCE` 和 Actor-Critic 这样的策略梯度算法提供了直接从经验中学习最优策略的强大方法，并且可以与其他方法结合以进一步提高性能。

    '
- fmt: '## 9.1 Policy-Based Methods


    Thus far, we have only introduced value-based reinforcement learning algorithms
    in this book. These algorithms aim to learn the optimal state-action value function
    `Q*` for the optimal policy `π*`, using either Monte Carlo methods or TD learning
    methods. We can then construct a deterministic or greedy policy based on the learned
    optimal state-action value function. However, the final goal is to learn the optimal
    policy `π*`, which is what the agent needs in order to make decisions when interacting
    with an environment. Is it possible for the agent to learn an optimal policy directly
    without first learning the value functions?


    The answer is yes. Policy-based methods allow us to learn a parameterized policy,
    which is represented by a set of parameters optimized through training, rather
    than being defined explicitly. In this section, we will explore how to use policy
    gradient methods to learn such a policy.


    Before we delve into policy approximation and policy gradient methods, let’s take
    a look at some of the advantages of learning a parameterized policy directly,
    rather than deriving a policy from the learned value functions:


    - **Better convergence properties**: Value-based reinforcement learning methods
    may oscillate during the training process for some problems, while policy-based
    methods tend to have a smoother learning curve, leading to better convergence
    properties.


    - **Stochastic policies**: The learned policy can be stochastic, meaning that
    it can output a probability distribution over the available actions. This is different
    from value-based methods, which typically result in a deterministic policy that
    always selects the action with the highest value. While it is possible to add
    randomness to a deterministic policy such as using the `ε`-greedy policy approach,
    this is not the same as learning a stochastic policy with a proportional distribution
    over actions. A learned stochastic policy can be especially useful in situations
    where the optimal policy involves taking different actions with different probabilities,
    such as when the agent is facing stochastic or partially observable environments.


    - **Exploration**: There is no need to use an `ε`-greedy policy to do exploration
    explicitly, as the nature of the stochastic policy already accomplishes this.
    A learned stochastic policy can guide the agent to take a range of actions, including
    suboptimal ones, and help the agent discover the optimal policy.


    - **Efficient handling of large action spaces**: Policy-based methods are better
    suited for problems with large action spaces, even continuous action spaces. Value-based
    methods need to find the action with the highest value, and computing this max
    operation over a large number of actions can be computationally expensive. This
    is especially troublesome when the action space is infinite, such as problems
    with continuous action spaces.


    Policy-based methods offer several advantages over value-based methods in reinforcement
    learning, such as the ability to learn a stochastic policy that assigns probabilities
    to actions rather than always selecting the action with the highest value. This
    can be particularly useful in situations where the optimal policy may involve
    taking different actions with different probabilities, such as when there is uncertainty
    in the outcome of actions or when the optimal policy changes over time. A stochastic
    policy can also be valuable in problems where there are multiple optimal policies
    or where the agent needs to take into account the behavior of other agents.


    For example, in games with hidden information or bluffing, such as poker or other
    card games, a stochastic policy can be particularly useful, as the agent cannot
    see the opponent’s cards, in such cases the optimal policy may involve assigning
    different probabilities to different actions, rather than always following a deterministic
    policy. Similarly, in games like Go, where the optimal policy may depend on the
    opponent’s strategy or intentions, which may be uncertain or changing over time,
    a stochastic policy can be advantageous.


    Furthermore, policy-based methods are better suited to continuous action spaces
    because they can learn to output a probability distribution over the action space,
    rather than trying to find the single action with the highest value. This can
    be easier to work with in problems with a large or infinite action space, as the
    agent can explore and select actions based on the probability distribution output
    by the policy. On the other hand, value-based methods may struggle to find the
    maximum value of an infinite action space or may have difficulty exploring a large
    action space efficiently. Additionally, value-based methods often rely on discretizing
    the action space, which can lead to loss of information and reduce the effectiveness
    of the algorithm. Policy-based methods can avoid this issue by directly parameterizing
    the policy, which can take into account the full range of actions available to
    the agent.


    However, it is worth noting that policy-based methods have some disadvantages
    as well. For instance, they can be more computationally expensive than value-based
    methods, and they may struggle with high-dimensional state spaces. Moreover, policy-based
    methods can be more difficult to train and may require more data to converge to
    an optimal policy.


    In summary, policy-based methods have several advantages over value-based methods,
    including the ability to learn a stochastic policy, which can be particularly
    useful in problems with multiple optimal policies, stochastic or partially observable
    environments, or continuous or large action spaces. Nonetheless, both policy-based
    and value-based methods have their strengths and weaknesses, and the choice between
    them will depend on the specific problem at hand.'
