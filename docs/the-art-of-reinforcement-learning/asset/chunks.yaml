    ### 用于控制的线性值函数近似


    一旦我们知道了如何使用前面介绍的线性函数近似策略评估算法来估计状态-动作值，我们就可以开始改进策略（进行控制）。为此，我们需要处理探索问题，可以使用第 5
    章介绍的 ![$$\epsilon $$](img/605748_1_En_6_Chapter_TeX_IEq191.png)-贪心策略。简而言之，![$$\epsilon
    $$](img/605748_1_En_6_Chapter_TeX_IEq192.png)-贪心策略以概率 ![$$1-\epsilon $$](img/605748_1_En_6_Chapter_TeX_IEq193.png)
    选择估计值最高的动作，并以概率 ![$$\epsilon $$](img/605748_1_En_6_Chapter_TeX_IEq194.png) 随机选择一个动作。这使得智能体能够以一定概率探索较少访问的状态，同时仍然利用其对值函数的当前知识。


    我们可以使用蒙特卡洛策略迭代算法来改进策略，该算法使用线性函数 ![$$\hat {Q}$$](img/605748_1_En_6_Chapter_TeX_IEq195.png)
    来近似真实的状态-动作值函数 ![$$Q_\pi $$](img/605748_1_En_6_Chapter_TeX_IEq196.png)。


