  trans: '

    图 7.14 展示了朴素深度 Q 学习、仅使用目标网络的 DQN，以及同时使用经验回放和目标网络的 DQN 的性能表现。为了评估智能体的性能，我们在一个独立的评估环境中，每经过
    20,000 步训练环境步数后，以 0.05 的探索率运行 20,000 步评估环境步数（约 40 个回合）。结果取五次独立运行的平均值，然后使用窗口大小为五的移动平均进行平滑处理。


    ![](img/605748_1_En_7_Fig15_HTML.png)


    折线图绘制了评估回合回报与训练环境步数的关系。五条线分别代表朴素深度 Q 学习、带目标网络的深度 Q 学习、带经验回放的深度 Q 学习以及 DQN，其最大值在
    200 到 500 之间波动。


    **图 7.15** 不同 Q 学习智能体在推车杆任务上的评估回合回报。结果取五次独立运行的平均值，然后使用窗口大小为五的移动平均进行平滑处理


    在本实验中，我们使用学习率 `(α) = 0.00025`，折扣率 `(γ) = 0.99`，批量大小 `= 32`，以及回放容量 `= 50,000`。我们在
    100,000 步环境步数内将探索率（`ε`）从 1.0 衰减到 0.1，并每 200 次更新后更新目标网络（如果存在）。


    本实验突显了经验回放在 Mnih 等人 [6] 开发的深度 Q 网络（DQN）算法成功中的关键作用。结果表明，朴素深度 Q 学习和带目标网络的深度 Q 学习表现与随机智能体相似。相比之下，带经验回放的深度
    Q 学习展现出更平滑的学习曲线。虽然使用额外的目标网络可能会根据问题的复杂性和目标网络更新的频率而减慢学习速度，但总体上会带来更平滑的学习进程。


    我们也可以从另一个评估不同 Q 学习智能体在推车杆任务上性能的实验中观察到类似的结果，如图 7.15 所示。


    ## 7.6 用于 Atari 游戏的 DQN


    到目前为止，我们只考虑了像推车杆和爬山车这样的玩具问题，我们可以使用线性方法而非神经网络来近似价值函数。然而，对于更复杂和更具挑战性的强化学习问题，神经网络是必不可少的。一个例子是
    Atari 视频游戏测试平台，这是一系列由 Atari Interactive, Inc. 拥有的游戏集合，需要先进的 AI 技术才能玩得好。


    在本节中，我们将详细介绍如何训练一个 DQN 智能体来玩部分 Atari 游戏。正如我们在第 1 章中提到的，DQN 智能体是一种基于神经网络的方法，用于解决强化学习问题。为了将
    DQN 算法应用于 Atari 游戏，我们需要对训练流程进行一些修改。具体来说，我们需要准备环境状态、定义神经网络架构，并修改训练细节。这些修改基于 Mnih
    等人 [7] 和 [6] 的工作，我们将严格遵循这些工作。


    ### 使用 Atari 游戏环境的局限性与挑战


    尽管 Atari 游戏环境已被证明是测试和开发深度强化学习算法的宝贵工具，但它并非没有局限性和挑战。Atari 环境的主要局限性之一在于它是现实世界的简化模拟，这意味着智能体在
    Atari 环境中学到的技能和策略不一定能迁移到现实世界的应用中。换句话说，Atari 环境可能过于人工化，无法捕捉现实世界环境的全部复杂性和多变性。


    Atari 环境的第二个局限性在于它是一个相对低维且离散的环境，这意味着它可能不适合测试和开发需要高维且连续状态和动作空间的深度强化学习算法。一些现实世界的应用，如机器人技术和自动驾驶，其状态和动作空间比
    Atari 环境中的要复杂和连续得多。


    Atari 环境的另一个局限性在于它是一个静态环境，这意味着它不会随时间变化。另一方面，现实世界环境是动态且不断变化的，这给深度强化学习算法带来了额外的挑战。例如，自动驾驶智能体必须能够实时适应变化的交通状况和道路条件，这比玩《太空侵略者》游戏要困难得多。


    尽管存在这些局限性，研究人员仍在积极开发更真实、更复杂的环境，用于测试和开发深度强化学习算法。其中一些环境包括模拟机器人任务、交通模拟，以及具有更真实物理和图形的视频游戏环境。这些环境可以为深度强化学习算法提供更具挑战性和更真实的测试平台，并有助于弥合模拟环境与现实世界应用之间的差距。

    '
- fmt: '### Environment Preprocessing


    Atari games are a type of deterministic, episodic reinforcement learning problem.
    The screen image, or frame, is used as the environment state, with the time step
    of an episode sequence measured by the different frames of the game. However,
    there is one problem with this approach: a single frame does not have the Markov
    property. To understand this problem, let’s look at a single frame from the Breakout
    video game, as shown in Fig. [7.16](#605748_1_En_7_Chapter.xhtml#Fig16). From
    this single frame, it is hard to tell which direction the ball (small red block
    in the middle left of the screen) is moving. It could be moving up because the
    agent just hit the ball with the paddle, or it could be falling from the right
    corner after hitting the wall on the right side. The problem is that this single
    frame does not contain enough information to fully describe the direction or movement
    of the ball.


    The Markov property (introduced in Chap. [2](#605748_1_En_2_Chapter.xhtml)) says
    that the successor state `s_{t+1}` only depends on the current state `s_t` and
    action `a_t`, not all previous states and actions `(s_0, a_0, s_1, a_1, ..., s_t,
    a_t)`. However, in this case (as shown in Fig. [7.16](#605748_1_En_7_Chapter.xhtml#Fig16)),
    the successor state `s_{t+1}` depends on the past. For example, if the ball is
    moving down from the right corner and the agent chooses to move the paddle to
    the right, it might miss the ball, which will have a negative consequence (loss
    of a life). However, if the ball is moving up, and the agent also moves the paddle
    to the right, the agent may get some rewards since it is likely the ball will
    hit the top wall. For the same single frame and action, the agent may get different
    successor states and rewards.


    One solution to this problem is to add the past frames together. Figure [7.17](#605748_1_En_7_Chapter.xhtml#Fig17)
    shows an example of this by stacking the past 28 frames to construct a single
    image. Now, we can tell that the ball is moving toward the bottom of the screen
    after hitting the right-side wall.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig16_HTML.png)


    An illustration depicts a video game featuring a set of blocks at the top layer
    and a tiny ball moving randomly over the blocks, eventually dropping down to a
    flat surface at the bottom line.


    Fig. 7.16 Example of a single frame of the Breakout video game


    However, stacking all the historical frames is not good for space and computation
    efficiency since most Atari games can last for millions of frames. Most of these
    games generate 30–60 frames per second, and the movements in these games are very
    simple, so the changes over two consecutive frames are so small that we can barely
    tell if they are different or not. DQN uses a technique called “action repeat”
    (sometimes called skip frame) to address this issue. With this technique, the
    agent repeats the same action `k` times (default `k=4`) when interacting with
    the environment. At the beginning of any episode, the agent selects some action
    `a` by following the `epsilon`-greedy policy with respect to the network `theta`,
    then repeats the same action `a` over `k` times while interacting with the environment
    (except for the terminal state, which does not require the action to be repeated).
    At the `k+1` frame, the agent selects another action `a''` and repeats `a''` over
    `k` times. This process is repeated until the episode is terminated. As a result,
    the agent only sees every `k`th frame from the environment, and it efficiently
    skips processing `(k-1)/k` percent of the frames. This simple technique alone
    can save a lot of space and computation time for the agent.


    Figure [7.18](#605748_1_En_7_Chapter.xhtml#Fig18) shows an example of action repeat
    with `k=4`, where the grayed-out frames represent the skipped frames by repeating
    the same action.


    Finally, to ensure that the environment state has the Markov property while at
    the same time save computation and space, DQN uses a history of the most recent
    four frames (after applying the action repeat and frame skip). These four frames
    are stacked together, as shown in Fig. [7.19](#605748_1_En_7_Chapter.xhtml#Fig19),
    to construct a single image that represents the environment state. Before being
    fed into the neural network, the image is downsized from `160 x 210 x 3` (the
    default size of Atari frames) to `84 x 84 x 3` and then converted to grayscale
    to save additional computation. This downsizing and grayscale conversion helps
    to speed up the training process by reducing the size of the input data. Finally,
    the input data is normalized by dividing by 255, so that the data is in the range
    of [0, 1], before being passed to the neural network for processing.


    ![](images/605748_1_En_7_Chapter/605748_1_En_7_Fig17_HTML.png)


    An image of a video game with stacked frames. It presents tetris blocks at the
    top fragmented from the bottom. The lower part presents a ball that moves downward
    to a small flat surface at the bottom.


    Fig. 7.17 Example of stacking the past 28 frames together to construct a single
    image for the Breakout video game


    In summary, the preprocessing steps used by DQN for Atari games involve action
    repeat, frame skipping, frame stacking, downsizing, grayscale conversion, and
    normalization. These steps help to reduce the computational burden of processing
    millions of frames and enable the neural network to learn efficiently from the
    input data.


    Figure [7.19](#605748_1_En_7_Chapter.xhtml#Fig19) shows an example of stacking
    the last four frames, after using action repeat (frame skip) of four in the Breakout
    video game.'
