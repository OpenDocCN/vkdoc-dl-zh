    # 算法 1：RND 与近端策略优化


    ![](img/605748_1_En_13_Figaaa_HTML.gif) 一个 18 行的`RND`与近端策略优化算法，输入以下参数，输出近似最优策略`pie_theta`。参数包括：`Gamma`、`alpha`、`beta`、`N`、`epsilon`、`M`、`L`和`K`。


    图 13.4 展示了带有`RND`模块的`PPO`（裁剪版本）智能体在 Atari 游戏《蒙特祖玛的复仇》中的表现。


    ![](img/605748_1_En_13_Fig4_HTML.png)


    一张评估回合回报与训练环境帧数的折线图。图中呈现上升趋势，伴有小幅波动。部分估计值如下：(1000 万, 3800)、(1500 万, 6500)、(2000
    万, 7000)。


    **图 13.4** 带有`RND`模块的`PPO`在 Atari 游戏《蒙特祖玛的复仇》中的表现。结果展示了平均回合回报（未折扣总奖励）及 95%置信区间。结果基于三次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    我们采用分布式强化学习架构，并行运行 32 个演员（actor）收集样本序列，并由一个学习者（learner）智能体执行参数更新。我们使用本章前面介绍的相同神经网络架构，同时用于`PPO`和`RND`。具体来说，我们对外部（环境）奖励和内部（好奇心奖励）奖励使用不同的折扣率，外部奖励为
    0.999，内部奖励为 0.99。`PPO`策略网络和`RND`预测器网络的学习率均为 0.0001，优势函数的`GAE` lambda 值为 0.95，序列长度为
    128，更新轮次为 4 轮。我们还使用熵来鼓励探索，熵权重为 0.001。神经网络使用`Adam`优化器进行训练。


    我们采用与`DQN`类似的环境处理方式，包括将帧调整为`84 x 84`并转换为灰度图。我们还应用了跳跃动作技术，即每四帧只处理一帧，并将最后四帧堆叠起来，形成大小为`84
    x 84 x 4`的最终状态图像。对于`RND`网络，我们只将最后一帧作为输入，即一张`84 x 84 x 1`的图像。


    此外，我们将奖励值裁剪到`-1`到 1 的范围内，并将最大回合长度设置为 18,000，即在应用跳跃动作和帧跳过后的 4500 步。


    性能通过获得的平均奖励来衡量。为了评估智能体的性能，我们在每次训练迭代结束时，在一个独立的测试环境中使用贪婪策略运行了 100,000 个评估步骤，该测试环境包含来自每个演员的`128
    x 500 x 4`帧，评估环境中不应用奖励裁剪或生命损失时的软终止。结果基于三次独立运行的平均值，并使用窗口大小为 5 的移动平均进行平滑处理。


    图 13.5 还展示了智能体每场评估游戏平均找到的房间数量。访问更多房间表明智能体探索了游戏中的更多状态，这通常会导致发现隐藏宝藏并获得大量奖励。


    ![](img/605748_1_En_13_Fig5_HTML.png)


    一张评估回合中找到的房间数量与训练环境帧数的折线图，呈现上升趋势，伴有小幅波动。部分估计值如下：(1000 万, 7)、(1500 万, 10)、(2000
    万, 11.5)。


    **图 13.5** 带有`RND`模块的`PPO`在 Atari 游戏《蒙特祖玛的复仇》中的表现。结果展示了智能体平均找到的房间数量及 95%置信区间。结果基于三次独立运行的平均值，并使用窗口大小为
    5 的移动平均进行平滑处理。


    需要注意的是，上述图表中的 x 轴仅代表每个演员的训练环境帧数。要获得总的训练环境帧数，我们需要将该值乘以训练过程中涉及的演员数量。在我们的案例中，总的训练环境帧数为
    6.4 亿，这是通过将 2000 万乘以 32（训练过程中涉及的演员数量）得到的。


    实验结果乍看之下令人鼓舞，但仔细审视录制的游戏过程后，很明显智能体并未真正掌握游戏。例如，在第一个房间中，拿到钥匙后，智能体未能利用梯子爬到房间顶部——这本应是它到达钥匙所用路径的逆序操作。相反，它选择从一堵高墙上跳下，导致损失一条命。


    另一个例子是，在某些房间中，智能体错过了沿梯子下行进入下一个房间的机会，反而选择与一个恶魔角色战斗，而这是不可能获胜的，导致又损失一条命。


    这些以及游戏过程中其他类似的次优行为表明，虽然好奇心驱动的探索可以鼓励智能体应对复杂且具有挑战性的问题，但它并不能保证学到的策略始终是最优的。这是因为好奇心驱动探索的目标与策略的目标根本不同。因此，这个问题激发了关于强化学习安全探索的积极研究[4,
    5]。


    ## 13.4 总结


    本章深入探讨了强化学习中难以探索问题和稀疏奖励问题所带来的挑战。我们探讨了强化学习智能体在应对这类问题时面临的基本困难，其中探索和奖励信号的稀缺阻碍了学习进程。


    为了应对这些挑战，我们引入了好奇心驱动探索的概念。这种技术使智能体能够构建自己的内部奖励系统，从而帮助解决复杂的强化学习问题。我们介绍了一种特别有趣且实用的方法，称为随机网络蒸馏（`RND`）。我们深入探讨了`RND`的内部工作原理及其背后的直觉。通过将`RND`与近端策略优化（`PPO`）算法相结合，我们展示了智能体在《蒙特祖玛的复仇》（最具挑战性的
    Atari 游戏之一）中取得的卓越表现。


    重要的是，好奇心驱动的探索鼓励智能体寻找新颖有趣的体验，以增强其知识和技能，而策略则专注于优化智能体在完成特定任务或目标时的表现。值得注意的是，虽然好奇心驱动的探索可以极大地增强智能体的整体学习能力，但它并不一定能保证在所有场景下都达到最优性能。


    展望未来，下一章将把重点转向基于模型的强化学习。具体来说，我们将探索著名的`AlphaZero`智能体，它在围棋、国际象棋和将棋等游戏中已经超越了人类大师的水平。


    **脚注** 1

