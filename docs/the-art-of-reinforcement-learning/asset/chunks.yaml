    . As long as the agent does not violate the rules of the environment, it has the
    flexibility to take action at its own pace. Therefore, a regular time interval
    is not applicable in this case.


    In this book, we adapt the mathematical notation employed by Professor Emma Brunskill
    in her remarkable course on reinforcement learning [[1](#605748_1_En_2_Chapter.xhtml#CR1)].
    We generally assume that the reward only depends on the state ![$$S_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq13.png)
    and the action ![$$A_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq14.png)
    taken by the agent. To keep things simple, we use the same index *t* for the reward,
    which is expressed as ![$$R_t = R(S_t, A_t)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq15.png)
    , while some may prefer to use ![$$R_{t+1} = R(S_t, A_t, S_{t+1})$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq16.png)
    instead of ![$$R_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq17.png)
    to emphasize that a reward also depends on the successor state ![$$S_{t+1}$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq18.png)
    , as Sutton and Barto discussed in their book.^([³](#fn3)) However, this alternative
    expression can sometimes lead to confusion, particularly in simple cases like
    the ones we present in this book, where the reward does not depend on the successor
    state.


    It is important to remember that in practical implementation, the reward is typically
    received one time step later, along with the successor state, as illustrated in
    Fig. [2.1](#605748_1_En_2_Chapter.xhtml#Fig1).


    We use upper case in ![$$S_t, A_t, R_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq21.png)
    because these are random variables, and the actual outcome of these random variables
    could vary. When we are talking about the specific outcome of these random variables,
    we often use the lower case ![$$s, a, r$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq22.png)
    .


    Taken together, the state space, action space, transition model, and reward function
    provide a complete description of the environment and the agent’s interactions
    with it. In the following sections, we’ll explore how these elements interact
    to form the foundation for solving reinforcement learning problems.


    To better understand the interactions between the agent and the environment, we
    can unroll the interaction loop as follows, as shown in Fig. [2.2](#605748_1_En_2_Chapter.xhtml#Fig2):


    *   The agent observes the state ![$$S_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq23.png)
    from the environment.


    *   The agent takes action ![$$A_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq24.png)
    in the environment.


    *   The environment transition into a new state ![$$S_1$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq25.png)
    and also generate a reward signal ![$$R_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq26.png)
    , where ![$$R_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq27.png)
    is conditioned on ![$$S_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq28.png)
    and ![$$A_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq29.png)
    .


    *   The agent receives reward ![$$R_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq30.png)
    along with the successor state ![$$S_1$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq31.png)
    from the environment.


    *   The agent decides to take action ![$$A_1$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq32.png)
    .


    *   The interaction continues to the next stage until the process reaches the
    terminal state ![$$S_T$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq33.png)
    . Once it reaches terminal state, no further action is taken and a new episode
    can be started from the initial state ![$$S_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq34.png)
    .


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig2_HTML.png)


    A state transition diagram of the unrolled agent environment iteration loop. State
    S 0 leads to state S 1 with action A 0\. State S 1 has reward R 0, and in turn
    leads to subsequent states, that end with state S T and reward R T minus 1.


    Fig. 2.2


    Example of the agent-environment iteration loop unrolled by time for episodic
    problem


    ![](images/605748_1_En_2_Chapter/605748_1_En_2_Fig1_HTML.png)


    A cycle diagram of agent environment interaction. An arrow labeled action points
    from agent to environment. An arrow labeled observation and reward point from
    environment to agent.


    Fig. 2.1


    Agent-environment interaction


    The reason why there is no reward when the agent observes the first environment
    state ![$$S_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq35.png)
    is due to the fact that the agent has not yet interacted with the environment.
    As mentioned earlier, in this book, we assume that the reward function ![$$R_t
    = R(S_t, A_t)$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq36.png)
    is conditioned on the current state of the environment ![$$S_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq37.png)
    and the action ![$$A_t$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq38.png)
    taken by the agent. Since no action is taken in state ![$$S_0$$](images/605748_1_En_2_Chapter/605748_1_En_2_Chapter_TeX_IEq39.png)
    , there is no reward signal associated with the initial state. However, in practice,
    it can sometimes be convenient to include a “fake” initial reward, such as using
    0, to simplify the code.


    In summary, the MDP provides a framework for modeling reinforcement learning problems,
    where the agent interacts with the environment by taking actions based on the
    current state and receives rewards that are conditioned on the current state and
    action. By understanding the interactions between the agent and environment, we
    can develop algorithms that learn to make good decisions and maximize the cumulative
    reward over time.'
  trans: '

    ## 2.2 使用 MDP 建模强化学习问题


    马尔可夫决策过程（MDP）以对研究强化学习有用的方式，对状态、动作和奖励的序列进行建模。例如，一个在迷宫中导航的机器人可以被建模为一个 MDP，其中状态表示机器人在迷宫中的位置，动作表示机器人的移动选择，奖励表示机器人向目标前进的进度。


    在此背景下，我们使用下标 `t` 来索引过程的不同阶段（即序列的时间步），其中 `t` 可以是任何离散值，例如 `t = 0, 1, 2, ...`。请注意，时间步并非像秒或分钟那样的常规时间间隔，而是指过程的不同阶段。例如，在本书中，`S_t`、`A_t`
    和 `R_t` 通常表示当前时间步 `t`（或过程的当前阶段）的状态、动作和奖励。


    值得注意的是，智能体在观察到环境状态 `S_t` 后，可能需要花费相当长的时间才能决定采取动作 `A_t`。只要智能体不违反环境规则，它就可以按照自己的节奏灵活地采取行动。因此，常规的时间间隔在这种情况下并不适用。


    在本书中，我们采用了艾玛·布伦希尔教授在其出色的强化学习课程[1]中所使用的数学符号。我们通常假设奖励仅取决于状态 `S_t` 和智能体采取的动作 `A_t`。为简单起见，我们对奖励使用相同的索引
    `t`，表示为 `R_t = R(S_t, A_t)`，而有些人可能更倾向于使用 `R_{t+1} = R(S_t, A_t, S_{t+1})` 而不是
    `R_t`，以强调奖励也取决于后续状态 `S_{t+1}`，正如萨顿和巴托在他们的书中所讨论的那样。³ 然而，这种替代表达有时会导致混淆，尤其是在像本书中介绍的这种简单情况下，奖励并不依赖于后续状态。


    重要的是要记住，在实际实现中，奖励通常会在一个时间步之后与后续状态一起被接收，如图 2.1 所示。


    我们在 `S_t`、`A_t`、`R_t` 中使用大写字母，因为这些是随机变量，并且这些随机变量的实际结果可能会有所不同。当我们谈论这些随机变量的具体结果时，我们通常使用小写字母
    `s`、`a`、`r`。


    综上所述，状态空间、动作空间、转移模型和奖励函数共同提供了对环境以及智能体与其交互的完整描述。在接下来的章节中，我们将探讨这些元素如何相互作用，从而为解决强化学习问题奠定基础。


    为了更好地理解智能体与环境之间的交互，我们可以将交互循环展开如下，如图 2.2 所示：


    - 智能体从环境中观察状态 `S_0`。

    - 智能体在环境中采取动作 `A_0`。

    - 环境转移到一个新状态 `S_1`，并产生一个奖励信号 `R_0`，其中 `R_0` 以 `S_0` 和 `A_0` 为条件。

    - 智能体从环境中接收奖励 `R_0` 以及后续状态 `S_1`。

    - 智能体决定采取动作 `A_1`。

    - 交互继续进入下一阶段，直到过程达到终止状态 `S_T`。一旦达到终止状态，不再采取进一步动作，并且可以从初始状态 `S_0` 开始一个新的回合。


    ![](img/605748_1_En_2_Fig2_HTML.png)


    展开的智能体-环境迭代循环的状态转移图。状态 S 0 通过动作 A 0 导致状态 S 1。状态 S 1 具有奖励 R 0，并进而导致后续状态，最终以状态 S
    T 和奖励 R T 减 1 结束。


    图 2.2 针对回合制问题按时间展开的智能体-环境迭代循环示例


    ![](img/605748_1_En_2_Fig1_HTML.png)


    智能体-环境交互的循环图。标有“动作”的箭头从智能体指向环境。标有“观察和奖励”的箭头从环境指向智能体。


    图 2.1 智能体-环境交互


    当智能体观察到第一个环境状态 `S_0` 时没有奖励，这是因为智能体尚未与环境进行交互。如前所述，在本书中，我们假设奖励函数 `R_t = R(S_t, A_t)`
    以环境的当前状态 `S_t` 和智能体采取的动作 `A_t` 为条件。由于在状态 `S_0` 中没有采取任何动作，因此没有与初始状态相关的奖励信号。然而，在实践中，有时为了方便，可以包含一个“虚假的”初始奖励，例如使用
    0，以简化代码。


    总之，MDP 为建模强化学习问题提供了一个框架，其中智能体通过基于当前状态采取动作与环境交互，并接收以当前状态和动作为条件的奖励。通过理解智能体与环境之间的交互，我们可以开发出能够学习做出良好决策并随时间推移最大化累积奖励的算法。

    '
- fmt: '### Markov Property


    Not every problem can be modeled using the MDP framework. The Markov property
    is a crucial assumption that must hold for the MDP framework to be applicable.
    This property states that the future state of the system is independent of the
    past given the present. More specifically, the successor state `S_{t+1}` depends
    only on the current state `S_t` and action `A_t`, and not on any previous states
    or actions.


    In other words, the Markov property is a restriction on the environment state,
    which must contain sufficient information about the history to predict the future
    state. Specifically, the current state must contain enough information to make
    predictions about the next state, without needing to know the complete history
    of past states and actions.


    ```

    P(S_{t+1} | S_t, A_t) = P(S_{t+1} | S_t, A_t, S_{t-1}, A_{t-1}, ..., S_1, A_1,
    S_0, A_0)

    ```


    (2.1)


    For example, a robot trying to navigate a room can be modeled using the MDP framework
    only if it satisfies the Markov property. If the robot’s movement depends on its
    entire history, including its past positions and actions, the Markov property
    will be violated, and the MDP framework will no longer be applicable. This is
    because the robot’s current position would not contain sufficient information
    to predict its next position, making it difficult to model the environment and
    make decisions based on that model.


    ### Service Dog Example


    In this example, we imagine training a service dog to retrieve an object for its
    owner. The training is conducted in a house with three rooms, one of which contains
    a personal object that the dog must retrieve and bring to its owner or trainer.
    The task falls into the episodic reinforcement learning problem category, as the
    task is considered finished once the dog retrieves the object. To simplify the
    task, we keep placing the object in the same (or almost the same) location and
    initialize the starting state randomly. Additionally, one of the rooms leads to
    the front yard, where the dog can play freely. This scenario is illustrated in
    Fig. [2.3](#605748_1_En_2_Chapter.xhtml#Fig3).


    We will use this service dog example in this book to demonstrate how to model
    a reinforcement learning problem as an MDP (Markov decision process), explain
    the dynamics function of the environment, and construct a policy. We will then
    introduce specific algorithms, such as dynamic programming, Monte Carlo methods,
    and temporal difference methods, to solve the service dog reinforcement learning
    problem.


    ## 2.3 Markov Process or Markov Chain


    To start our discussion on Markov decision processes (MDPs), let’s first define
    what a Markov process (Markov chain) is. A Markov process is a memoryless random
    process where the probability of transitioning to a new state only depends on
    the current state and not on any past states or actions. It is the simplest case
    to study in MDPs, as it involves only a sequence of states without any rewards
    or actions. Although it may seem basic, studying Markov chains is important as
    they provide fundamental insights into how states in a sequence can influence
    one another. This understanding can be beneficial when dealing with more complex
    MDPs.


    A plan layout of a house with adjacent rooms 1, 2, and 3. The goal is located
    in room 3. Room 2 has a door that leads to a shaded irregular area labeled outside.


    **Fig. 2.3** Simple drawing to illustrate the service dog example


    A Markov chain can be defined as a tuple of `(S, P)`, where `S` is a finite set
    of states called the state space, and `P` is the dynamics function (or transition
    model) of the environment, which specifies the probability of transitioning from
    a current state `s` to a successor state `s''`. Since there are no actions in
    a Markov chain, we omit actions in the dynamics function `P`. The probability
    of transitioning from state `s` to state `s''` is denoted by `P(s''|s)`.


    For example, we could model a Markov chain with a graph, where each node represents
    a state, and each edge represents a possible transition from one state to another,
    with a transition probability associated with each edge. This can help us understand
    how states in a sequence can affect one another. We’ve modeled our service dog
    example as a Markov chain, as shown in Fig. [2.4](#605748_1_En_2_Chapter.xhtml#Fig4).
    The open circle represents a non-terminal state, while the square box represents
    the terminal state. The straight and curved lines represent the transitions from
    the current state `s` to its successor state `s''`, with a transition probability
    `P(s''|s)` associated with each possible transition. For example, if the agent
    is currently in state *Room 1*, there is a 0.8 probability that the environment
    will transition to its successor state *Room 2* and a 0.2 probability of staying
    in the same state *Room 1*. Note that these probabilities are chosen randomly
    to illustrate the idea of the dynamics function of the environment.'
