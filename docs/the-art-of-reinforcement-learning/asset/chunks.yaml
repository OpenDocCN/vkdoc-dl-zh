- fmt: '### Episodic vs. Continuing Tasks


    In reinforcement learning, the type of problem or task is categorized as episodic
    or continuing depending on whether it has a natural ending. Natural ending refers
    to a point in a task or problem where it is reasonable to consider the task or
    problem is completed.


    Episodic problems have a natural termination point or terminal state, at which
    point the task is over, and a new episode starts. A new episode is independent
    of previous episodes. Examples of episodic problems include playing an Atari video
    game, where the game is over when the agent loses all lives or won the game, and
    a new episode always starts when we reset the environment, regardless of whether
    the agent won or lost the previous game. Other examples of episodic problems include
    Tic-Tac-Toe, chess, or Go games, where each game is independent of the previous
    game.


    On the other hand, continuing problems do not have a natural endpoint, and the
    process could go on indefinitely. Examples of continuing problems include personalized
    advertising or recommendation systems, where the agent’s goal is to maximize a
    user’s satisfaction or click-through rate over an indefinite period. Another example
    of a continuing problem is automated stock trading, where the agent wants to maximize
    their profits in the stock market by buying and selling stocks. In this scenario,
    the agent’s actions, such as the stocks they buy and the timing of their trades,
    can influence the future prices and thus affect their future profits. The agent’s
    goal is to maximize their long-term profits by making trades continuously, and
    the stock prices will continue to fluctuate in the future. Thus, the agent’s past
    trades will affect their future decisions, and there is no natural termination
    point for the problem.


    It is possible to design some continuing reinforcement learning problems as episodic
    by using a time-constrained approach. For example, the episode could be over when
    the market is closed. However, in this book, we only consider natural episodic
    problems that is, the problems with natural termination.


    Understanding the differences between episodic and continuing problems is crucial
    for designing effective reinforcement learning algorithms for various applications.
    For example, episodic problems may require a different algorithmic approach than
    continuing problems due to the differences in their termination conditions. Furthermore,
    in real-world scenarios, distinguishing between episodic and continuing problems
    can help identify the most appropriate reinforcement learning approach to use
    for a particular task or problem.


    ### Deterministic vs. Stochastic Tasks


    In reinforcement learning, it is important to distinguish between deterministic
    and stochastic problems. A problem is deterministic if the outcome is always the
    same when the agent takes the same action in the same environment state. For example,
    Atari video game or a game of Go is a deterministic problem. In these games, the
    rules of the game are fixed; when the agent repeatedly takes the same action under
    the same environment condition (state), the outcome (reward signal and next state)
    is always the same.


    The reason that these games are considered deterministic is that the environment’s
    dynamics and reward functions do not change over time. The rules of the game are
    fixed, and the environment always behaves in the same way for a given set of actions
    and states. This allows the agent to learn a policy that maximizes the expected
    reward by simply observing the outcomes of its actions.


    On the other hand, a problem is stochastic if the outcome is not always the same
    when the agent takes the same action in the same environment state. One example
    of a stochastic environment is playing poker. The outcome of a particular hand
    is not entirely determined by the actions of the player. Other players at the
    table can also take actions that influence the outcome of the hand. Additionally,
    the cards dealt to each player are determined by a shuffled deck, which introduces
    an element of chance into the game.


    For example, let’s say a player is dealt a pair of aces in a game of Texas hold’em.
    The player might decide to raise the bet, hoping to win a large pot. However,
    the other players at the table also have their own sets of cards and can make
    their own decisions based on the cards they hold and the actions of the other
    players.


    If another player has a pair of kings, they might also decide to raise the bet,
    hoping to win the pot. If a third player has a pair of twos, they might decide
    to fold, as their hand is unlikely to win. The outcome of the hand depends not
    only on the actions of the player with the pair of aces but also on the actions
    of the other players at the table, as well as the cards dealt to them.


    This uncertainty and complexity make poker a stochastic problem. While it is possible
    to use various strategies to improve one’s chances of winning in poker, the outcome
    of any given hand is never certain, and a skilled player must be able to adjust
    their strategy based on the actions of the other players and the cards dealt.


    Another example of stochastic environment is the stock market. The stock market
    is a stochastic environment because the outcome of an investment is not always
    the same when the same action is taken in the same environment state. There are
    many factors that can influence the price of a stock, such as company performance,
    economic conditions, geopolitical events, and investor sentiment. These factors
    are constantly changing and can be difficult to predict, making it impossible
    to know with certainty what the outcome of an investment will be.


    For example, let’s say you decide to invest in a particular stock because you
    believe that the company is undervalued and has strong growth prospects. You buy
    100 shares at a price of $145.0 per share. However, the next day, the company
    announces that it has lost a major customer and its revenue projections for the
    next quarter are lower than expected. The stock price drops to $135.0 per share,
    and you have lost $1000 on your investment. It’s most likely the stochastic nature
    of the environment led to the loss outcome other than the action (buying 100 shares).


    While it is possible to use statistical analysis and other tools to try to predict
    stock price movements, there is always a level of uncertainty and risk involved
    in investing in the stock market. This uncertainty and risk are what make the
    stock market a stochastic environment, and why it is important to use appropriate
    risk management techniques when making investment decisions.


    In this book, we focus on deterministic reinforcement learning problems. By understanding
    the fundamentals of deterministic reinforcement learning, readers will be well
    equipped to tackle more complex and challenging problems in the future.'
