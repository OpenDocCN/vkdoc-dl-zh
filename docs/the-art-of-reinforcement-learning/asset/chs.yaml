  #### 原始 RND 论文中的探索机制


  在原始 RND 论文中，Burda 等人[[2]](#605748_1_En_13_Chapter.xhtml#CR2)发现，强化学习中的预测误差可能由多种因素引起，包括训练数据量、随机性、模型错误设定以及学习动态。为了利用这些信息进行探索，RND
  方法使用预测误差作为探索奖励。


  然而，RND 中使用的固定目标网络使得训练预测器网络比学习最优策略容易得多。因此，随着预测器网络在预测结果方面变得更好，探索奖励的有效性可能会降低。为了解决这个问题，Burda
  等人[[2]](#605748_1_En_13_Chapter.xhtml#CR2)提出，当参与者数量非常大时，有意限制用于训练预测器网络的训练数据量。具体来说，他们建议根据公式`min(1,
  32/N)`使用可用样本的一部分，其中`N`是并行运行以生成训练样本的参与者数量。


  使用预测误差作为探索奖励的一个主要挑战是，不同环境和时间步之间的奖励尺度可能变化很大。为了保持奖励尺度一致，内在奖励通常会被归一化，例如通过使用内在回报的标准差的运行估计进行除法。


  RND 方法的另一个问题是如何处理两个 RND 神经网络的输入数据。当使用固定目标网络时，观测归一化至关重要，因为参数无法适应不同数据集的尺度。如果没有归一化，输入的方差可能会变得非常高。RND
  方法通过使用一种观测归一化方案来解决这个问题，该方案类似于连续控制问题中使用的方案，即通过减去运行均值然后除以运行标准差来对每个维度进行白化处理。归一化后的观测值被裁剪到-5
  到 5 之间。运行均值和标准差通过在开始优化之前让随机智能体在环境中执行少量步数来初始化。相同的观测归一化同时用于预测器网络和目标网络，但不用于策略网络。


  通常，RND 模块仅在训练期间使用，而不在智能体与环境交互期间使用。然而，在某些情况下，它可以集成到智能体的决策过程中。例如，Badia 等人[[3]](#605748_1_En_13_Chapter.xhtml#CR3)开发的`Agent57`算法是`DQN`方法的进阶版本，它使用来自
  RND 模块的内在奖励作为神经网络的输入数据，该神经网络近似最优状态-动作值函数，从而使智能体能够做出更明智的决策。


  本章将重点介绍将 RND 模块与近端策略优化（PPO）算法结合使用，PPO 是一种流行的基于策略的方法。通过引入内在奖励，我们希望提高智能体的学习效率，并在复杂环境中实现更好的性能。


  ##### RND 与 PPO 结合


  近端策略优化（PPO）是一种流行的强化学习算法，它使用替代目标函数来更新策略。该替代目标函数最大化采取能够改进策略的动作的概率，同时确保策略不会偏离之前的策略太远。


  回顾一下，PPO 使用以下裁剪后的替代目标函数：


  ```

  argmax_{π''} L_π^{CLIP}(π'') = argmax_{π''} E_{τ ~ π}[ min( (π''(a|s)/π(a|s)) *
  Â_t, clip(π''(a|s)/π(a|s), 1-ε, 1+ε) * Â_t ) ]

  ```


  (13.2)


  优势函数使用广义优势估计（GAE）方法计算：


  ```

  Â_t = δ_t + (γλ)δ_{t+1} + (γλ)²δ_{t+2} + ... + (γλ)^{T-t-1}δ_{T-1}

  ```


  (13.3)


  这里，`δ_t`是时序差分误差，即奖励总和与当前状态估计值及后继状态估计值之间的差值：


  ```

  其中 δ_t = r_t + γV_π(s_{t+1}) - V_π(s_t)

  ```


  (13.4)


  为了在 PPO 算法中使用 RND 产生的内在奖励，我们需要对现有的 PPO 算法进行一些修改。更准确地说，我们希望将外在和内在的估计优势合并为单一的优势估计。这意味着我们还必须估计内在状态值和优势。


  ```

  Â_t = Â_t^E + Â_t^I

  ```


  为了估计内在优势`Â_t^I`，我们需要估计的内在状态值；这就是为什么我们还需要使用神经网络（评论家）来预测内在状态值。这个神经网络可以与预测策略和外在状态值的网络同时训练，其目标与外在状态值的情况类似，即我们希望最小化预测误差。


  在实践中，我们可以将用于预测内在状态值的神经网络的权重与预测策略和外在状态值的网络共享。这有助于降低训练的计算成本，并使算法更高效。我们还使用了一个稍微复杂的神经网络架构，其中包含跳跃连接，这是从`ResNet`借鉴的概念，如图
  13.3 所示。


  ![神经网络架构图](img/605748_1_En_13_Fig3_HTML.png)


