  图 14.17 展示了在评估对局中计算出的智能体 Elo 等级分，其中最新模型与上一检查点的模型进行对弈。该智能体始终获得极高的 Elo 等级分，证实了我们之前的解释。在五子棋中，尤其是在较大的棋盘上，执黑方拥有显著优势，因为它可以通过持续走出最佳着法来确保胜利。除了
  Elo 等级分，我们还提供了关于评估对局时长的宝贵见解，这作为评估智能体性能的另一个指标。对于五子棋而言，评估对局的持续时间成为一个关键考量因素。通常，如果智能体缺乏有效阻挡对手的能力，对局会在大约十步内结束，尤其是在初始训练阶段。然而，随着智能体学习的深入，它掌握了成功阻挡对手着法的技巧，这通常意味着更长且更具挑战性的对局。


