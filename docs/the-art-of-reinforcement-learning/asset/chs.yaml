  \ `γ = 0.9`。\n\n如果我们观察状态 *房间 2*，动作 *去房间 1*、*去房间 3*、*去室外* 的状态-动作价值分别为 `-4.38`、`1.86`、`-2.99`。如果我们用选择每个动作的概率（均为\
