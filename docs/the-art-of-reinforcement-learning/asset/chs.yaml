  #### 山地车任务


  山地车任务的目标是驾驶一辆动力不足的汽车到达预定的目标位置。该问题最初由萨顿和巴托提出 [4]。


  一种可能的解决方案是在回放缓冲区中为每次转移存储一个折扣率 ![$${\gamma }$$](img/605748_1_En_7_Chapter_TeX_IEq113.png)，例如
  ![$$(s_t, a_t, r_t, s_{t+1}, {\gamma })$$](img/605748_1_En_7_Chapter_TeX_IEq114.png)。在这种情况下，当
  ![$$s_{t+1}$$](img/605748_1_En_7_Chapter_TeX_IEq115.png) 是终止状态时，![$${\gamma }$$](img/605748_1_En_7_Chapter_TeX_IEq116.png)
  被设置为零。在学习过程中，使用存储的折扣率来计算转移的时间差分（TD）目标。


  另一种解决方案是在回放缓冲区中为每次转移包含一个布尔指示器，例如 ![$$(s_t, a_t, r_t, s_{t+1}, done)$$](img/605748_1_En_7_Chapter_TeX_IEq117.png)，当
  ![$$s_{t+1}$$](img/605748_1_En_7_Chapter_TeX_IEq118.png) 表示终止状态时，该指示器被设置为 `true`。这样，在学习过程中，当
  `done` 为 `true` 时，折扣可以设置为零，从而将后续状态的值设为零。


  通过适当处理终止状态，智能体可以更高效、更有效地学习。例如，当终止状态的折扣率设置为零时，神经网络将不会尝试学习该状态的值。对终止状态进行适当处理对于确保强化学习算法的鲁棒性非常重要。


