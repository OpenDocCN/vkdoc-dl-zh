  **算法 3: 双人零和游戏的 MCTS 反向传播**


  ![](img/605748_1_En_14_Figaac_HTML.gif) 一个用于双人零和游戏的`MCTS`反向传播的搜索算法，包含`backup`函数。`nu`和`delta`是要传递的参数。


  一旦我们计算了遍历路径中节点的值，考虑如何计算双人零和游戏的均值就很重要了。与单人游戏中搜索树中的所有节点都为同一玩家存储值不同，在双人游戏中，子节点的高值可能并不代表父节点的最佳利益。这是因为双人游戏中节点的值取决于轮到哪个玩家。


  例如，考虑井字棋游戏。假设当前玩家是 X，搜索算法正在评估一个潜在的移动，该移动会导致 X 有两子连成一线而 O 有一子连成一线的位置。从 X 的角度来看，这是一个好位置，应该具有高值。然而，从
  O 的角度来看，这个位置很糟糕，应该具有低值。因此，在计算该节点的均值时，我们需要考虑轮到谁，以及节点的值是如何基于该视角计算的。


  总之，当使用`MCTS`进行双人零和游戏时，仔细考虑如何更新搜索树中节点的统计信息以及计算其子节点的均值至关重要。这是因为每个节点的值代表了玩家如果选择该节点并最优地玩下去所能获得的预期奖励。




  ### 14.3 AlphaZero


  2015 年 10 月，DeepMind 的人工智能体`AlphaGo`在五局围棋比赛中击败欧洲冠军樊麾，创造了历史。`AlphaGo`赢得了全部五局比赛，成为首个在无让子的全尺寸棋盘上击败职业人类棋手的计算机围棋程序。2016
  年 3 月，另一版本的`AlphaGo`（名为`AlphaGo Lee`）在五局围棋比赛中以 4 比 1 的比分击败了传奇韩国棋手李世石。


  `AlphaGo`通过结合深度神经网络、监督学习、强化学习以及用于搜索和规划的蒙特卡洛树搜索（`MCTS`）进行训练。在实际对弈过程中，`AlphaGo`也使用`MCTS`进行在线规划。


  `AlphaGo`的训练过程可分为两个阶段：


  - **第一阶段**：使用来自 KGS 围棋服务器的 3000 万个棋局位置训练策略网络`P_s`和价值网络`V_s`。此阶段采用纯监督学习，通过分类任务训练`P_s`，通过回归任务训练`V_s`。策略网络`P_s`针对给定棋盘位置输出落子概率，价值网络`V_s`则从当前棋手视角输出对棋盘的评估。此外，还训练了一个更小但速度更快的策略网络`P_rollout`。该快速策略网络的准确率远低于`P_s`，仅在第二阶段的自对弈中用于`MCTS`模拟（作为走子策略）。第一阶段持续进行，直到网络`P_s`和`V_s`能在独立测试集中以特定阈值（例如
  55%）正确预测人类专家棋手的落子。


  - **第二阶段**：通过数百万局自对弈游戏，使用强化学习训练策略网络`P`和价值网络`V`。初始时`P = P_s`且`V = V_s`，多个智能体并行运行以生成自对弈棋局，生成这些棋局时，在`MCTS`搜索中使用策略网络`P`。此外，第一阶段训练的快速采样策略网络`P_rollout`也用于`MCTS`模拟阶段的动作采样。


  2017 年，DeepMind 开发了名为`AlphaGo Zero`的新智能体，这是对`AlphaGo`的增强版本，实力远超其前身。`AlphaGo Zero`在围棋对弈中表现更强，且仅使用强化学习和纯自对弈棋局中的落子进行训练。它还通过消除监督学习简化了训练过程，并采用了更简单的神经网络架构（使用共享权重和多头的单一神经网络，而非多个独立网络）。


  2017 年末，DeepMind 开发了名为`AlphaZero`的新智能体，这是一个从零开始自学掌握国际象棋、将棋和围棋的单一系统，并在每个领域击败了世界冠军级别的计算机程序。这个新的`AlphaZero`智能体是其前身`AlphaGo
  Zero`的泛化版本，后者仅能进行围棋对弈。


  总结而言，`AlphaZero`被认为是挑战围棋、国际象棋和将棋等双人零和博弈的顶尖技术。它仅使用强化学习和纯自对弈棋局中的落子进行训练，除游戏基本规则外无需任何人类监督。在实际对弈过程中，`AlphaZero`也使用`MCTS`进行在线规划。训练过程涉及数百万局自对弈。策略网络针对给定棋盘位置输出落子概率，价值网络则从当前棋手视角输出对棋盘的评估。


  在本章后续部分，我们将重点关注`AlphaZero`智能体及其对应论文的细节。但需要指出的是，某些特定组件（如神经网络结构和`MCTS`搜索算法）最初是在`AlphaGo
  Zero`论文中引入并得到深入研究的。




  #### 神经网络架构与状态表示


  AlphaZero 采用了一种基于卷积神经网络（CNN）的架构，用于识别围棋、国际象棋和将棋等游戏中棋盘布局的模式。`CNN` 在计算机视觉领域的分类和物体检测等任务中有着成熟的应用历史。这些模式对于在这些游戏中做出有效决策至关重要。职业人类玩家擅长在游戏过程中识别这些模式，而我们希望强化学习智能体也能做到这一点。对于围棋来说，棋盘是一个
  `19 × 19` 的网格。我们可以将棋盘表示为一个 `19 × 19 × 1` 的二进制特征平面，其中 `1` 表示有棋子的交叉点，`0` 表示空交叉点。


  然而，将围棋棋盘标准表示为 `19 × 19 × 1` 的二进制特征平面存在局限性。它无法区分黑子和白子，也无法为决策或马尔可夫性质提供足够的信息。为了克服这些限制，我们为黑子和白子分别使用独立的二进制特征平面，并堆叠
  `N` 个历史棋盘位置。


  最终状态 `s_t` 是一个 `19 × 19 × 17` 的图像，包含 17 个二进制特征平面。其中八个平面 `X_t` 表示当前玩家的棋子，如果存在棋子则二进制值为
  `1`，如果交叉点为空或包含对手棋子则为 `0`。类似地，另外八个平面 `Y_t` 表示对手的棋子。额外的平面 `C` 称为“轮到谁下”，它指示当前轮到哪位玩家，并考虑到在相同棋盘位置上，两位玩家的最佳着法可能不同这一事实。此外，它还提供了谁先手的信息（默认黑棋先手），这通常具有一些优势。


  为了确保马尔可夫性质成立，我们为每位玩家堆叠最多 `N=8` 个之前的棋盘位置（包括当前棋盘位置），从而创建一个三维棋盘图像。我们使用以下格式将这些平面连接成一个单一输入：


  ```

  s_t = [ X_t, Y_t, X_{t-1}, Y_{t-1}, ..., X_{t-7}, Y_{t-7}, C ]

  ```


  AlphaZero 使用一个由多个卷积层和整流非线性激活函数（ReLU）的残差块组成的单一神经网络。与 AlphaGo 不同，AlphaZero 不使用独立的
  rollout 策略网络。我们稍后在描述 AlphaZero 的蒙特卡洛树搜索算法时会讨论其原因。输入特征 `s_t` 首先经过一个卷积层处理，该层有 256
  个卷积核，大小为 `3 × 3`，步长为 `1`，然后是一个批归一化层和一个整流非线性（ReLU）激活函数。接着是 19 个（或 39 个）残差块，最后一个残差块的输出随后被送入两个独立的头部分别计算策略和价值。


  每个残差块按顺序应用以下层：


  -   一个卷积层，有 256 个卷积核，大小为 `3 × 3`，步长为 `1`

  -   批归一化

  -   一个整流非线性（ReLU）激活函数

  -   一个卷积层，有 256 个卷积核，大小为 `3 × 3`，步长为 `1`

  -   批归一化

  -   一个跳跃连接，将块的输入相加

  -   一个整流非线性（ReLU）激活函数


  策略头按顺序应用以下层：


  -   一个卷积层，有 2 个卷积核，大小为 `1 × 1`，步长为 `1`

  -   批归一化

  -   一个整流非线性（ReLU）激活函数

  -   一个全连接线性层，输出大小为 `19 × 19 + 1 = 362` 的向量，对应于所有动作（包括“虚手”着法）的动作概率


  价值头按顺序应用以下层：


  -   一个卷积层，有 1 个卷积核，大小为 `1 × 1`，步长为 `1`

  -   批归一化

  -   一个整流非线性（ReLU）激活函数

  -   一个具有 256 个隐藏单元的全连接线性层

  -   一个整流非线性（ReLU）激活函数

  -   一个输出标量值的全连接线性层

  -   一个双曲正切非线性（Tanh）激活函数，将标量值变换到 `[-1, 1]` 范围内


  图 14.6 展示了用于围棋游戏的 AlphaZero 神经网络架构，该架构使用了 19 个残差块。类似的架构也用于国际象棋或将棋等其他游戏。然而，每种游戏的神经网络输入数据略有不同。对于国际象棋，输入数据是一个
  `8 × 8 × 73` 的平面堆叠，而对于将棋，则是一个 `9 × 9 × 139` 的平面堆叠。此外，DeepMind 在为国际象棋和将棋构建当前状态 `s_t`
  而堆叠特征平面时，采用了略微不同的表示机制。


  ![](img/605748_1_En_14_Fig6_HTML.png)


  一个包含 19 个残差块的 AlphaZero 神经网络架构流程图。流程图从输入数据 19×19×17 开始，有三个输出，分别是动作概率、范围从 -1 到 1
  的标量值以及 ReLU。


  **图 14.6** 用于围棋游戏的 AlphaZero 智能体的神经网络架构


  这种架构使 AlphaZero 能够将完整的棋盘位置作为单一输入进行处理，并识别出对有效游戏至关重要的复杂模式和特征。




  #### MCTS 搜索算法


  AlphaZero 使用了一种更为简洁的 MCTS 搜索算法。与传统 MCTS 不同，它在搜索过程中不进行模拟（rollout）。相反，神经网络直接评估局面，这使得更快的
  rollout 策略网络变得不再必要。整体搜索过程如图 14.7 所示。


  ![](img/605748_1_En_14_Fig7_HTML.png)


  三个搜索树，在不同层级上有多个高亮节点，分别标记为选择、扩展与评估、以及回溯。扩展与评估以及回溯对应的树有 4 个层级。


  **图 14.7** AlphaZero 的 MCTS 搜索算法


  与通常情况一样，搜索树中的每个节点 `s` 代表一个特定的棋盘配置或状态。每个节点包含针对所有合法动作 `a ∈ A(s)` 的边 `(s, a)`，其中 `A(s)`
  是状态 `s` 下所有合法动作的集合。每条边存储以下统计信息：


  - `N(s, a)`：访问次数

  - `W(s, a)`：总状态-动作价值

  - `Q(s, a)`：平均状态-动作价值，其中 `Q(s, a) = W(s, a) / N(s, a)`

  - `P(s, a)`：在状态 `s` 中选择动作 `a` 的先验概率，该概率从神经网络的输出向量 `p` 中获得


  **算法 4：AlphaZero 的 MCTS 算法**


  ![](img/605748_1_En_14_Figaad_HTML.gif) 用于 AlphaZero 的 MCTS 搜索算法，包含函数 `MCTSSearch`、`SelectLeaf`、`Expand`
  和 `Backup`。


  原始的 AlphaZero 算法每次 MCTS 搜索执行 800 次迭代，这是 AlphaGo 算法所用迭代次数的一半。值得注意的是，在提及 AlphaZero
  时，“模拟”一词有时会被误用，因为它并不像其他算法那样使用 rollout。然而，该术语在文献中仍被广泛使用。


  ##### 选择


  在 AlphaZero 使用的 MCTS 算法中，搜索从选择阶段开始。在每次搜索迭代中，算法从搜索树的根节点开始，迭代地选择动作，直到在时间步 `L` 到达一个叶节点。对于时间步
  `0 < t < L`，使用应用于树的置信上界（UCT）算法的一个变体，结合时间步 `t` 时的合法动作集，来选择动作 `a_t`，以防止违反游戏的基本规则。UCT
  算法平衡了利用与探索。具体来说，算法选择使平均状态-动作价值 `Q(s_t, a)` 与探索项 `U(s_t, a)` 之和最大化的动作：


  ```

  a_t = argmax_a { Q(s_t, a) + U(s_t, a) }

  ```


  这里，`Q(s_t, a)` 是状态-动作对的平均值，而 `U(s_t, a)` 使用以下公式计算：


  ```

  U(s, a) = C(s) * p(s, a) * sqrt( N(s) / (1 + N(s, a)) )

  ```


  (14.3) 其中 `N(s)` 是父节点的访问次数，`N(s, a)` 是状态-动作对的访问次数，`p(s, a)` 是选择该动作的概率，`C(s)` 是一个随搜索时间缓慢增长的探索率。具体来说，`C(s)`
  由以下公式给出：


  ```

  C(s) = log( (1 + N(s) + c_base) / c_base ) + c_init

  ```


  (14.4)


  需要注意的是，此处描述的探索率 `C(s)` 的计算方法并未在原始的 AlphaGo Zero 或 AlphaZero 论文中提及。这种方法仅在随后的 MuZero
  论文 [14] 中进行了专门讨论。


  参数 `c_base` 和 `c_init` 的值通常分别设置为 19652 和 1.25。


  ##### 扩展与评估


  当搜索过程到达搜索树中的一个叶节点时，该叶节点对应的游戏状态 `s_t` 被用作神经网络 `θ` 的输入，以获得相应的输出 `(p, v)`。回顾一下，网络输出一个包含所有动作概率的向量
  `p`，以及一个从当前玩家视角评估的当前棋盘价值 `v`。由于我们拥有所有潜在动作的动作概率，叶节点的所有子节点随后会在一次操作中同时被扩展。通向该叶节点的边的统计信息被初始化为
  `{N(s, a) = 0, W(s, a) = 0, Q(s, a) = 0, P(s, a) = p_a}`，其中 `p_a` 是从 `p` 中的动作概率推导出的、在状态
  `s` 中选择动作 `a` 的概率。在 AlphaZero 中，评估值 `v` 取代了传统 MCTS 中使用的随机模拟（或 rollout）的结果，因此没有模拟阶段；这样，我们就不需要训练一个
  rollout 策略网络。


  在实践中，通常没有必要创建代表非法移动的节点，因为智能体永远不应该选择它们。这在游戏后期棋盘大部分非空，或某些移动被游戏规则禁止时尤其如此。将节点的创建限制为仅代表合法移动，可以显著减少内存使用并加快扩展过程，这在执行大量迭代时可能尤为重要。




  ##### 备份


  在最终的备份阶段，来自神经网络的数值 `v` 会被备份到每个时间步 `t ≤ L`。在此阶段，状态-动作对 `(s_t, a_t)` 的访问计数 `N(s_t,
  a_t)` 会更新为 `N(s_t, a_t) = N(s_t, a_t) + 1`。总状态-动作价值 `W(s_t, a_t)` 也会更新为 `W(s_t,
  a_t) = W(s_t, a_t) + v`，其中 `v` 代表正在被备份的数值。此外，平均状态-动作价值 `Q(s_t, a_t)` 的计算方式为 `Q(s_t,
  a_t) = W(s_t, a_t) / N(s_t, a_t)`。


  由于我们处理的是双人零和博弈，被备份的数值 `v` 有时会取反。例如，如果当前玩家是最大化玩家，那么备份的数值 `v` 将被取反，以表示对手的效用。


  完成这三个阶段后，一次搜索迭代即视为完成。算法随后进入下一次迭代，此过程持续进行，直到达到某个限制条件，例如时间约束或最大迭代次数。


  #### AlphaZero MCTS 如何构建搜索树


  由于 AlphaZero 会展开所有子节点而非仅一个子节点，其搜索树的构建方式与通用 MCTS 略有不同。图 14.8 展示了一个简单示例。


  该图展示了 AlphaZero 的 MCTS 搜索算法构建搜索树的过程。它呈现了从第 1 次到第 4 次迭代的节点图。每次迭代中，树的层级都会增加。


  **图 14.8** 一个说明 AlphaZero 的 MCTS 搜索算法如何构建搜索树的简单示例


  总结来说，AlphaZero 对标准 MCTS 算法进行了若干修改，我们在此重点说明：


  -   搜索到达叶节点后，不再进行随机模拟（rollout）。相反，AlphaZero 使用神经网络评估棋盘局面，并将其作为估计的游戏结果来更新搜索树中的统计信息。

  -   在展开叶节点时，所有子节点会在单次操作中一次性展开，而非像标准 MCTS 那样每次只展开一个子节点。这意味着节点展开后，该叶节点会立即变为完全展开状态。

  -   AlphaZero 在选择阶段使用了一种略有不同的 UCT 算法来选择最佳子节点，该算法结合了神经网络输出的先验动作概率 `p`。


  DeepMind 还采用了其他技术来进一步加速 MCTS 搜索过程，例如使用并行树搜索和重用子树。这些是锦上添花的高级特性，但实现起来要复杂得多，并且很大程度上取决于我们如何实现算法（例如，使用哪种编程语言）。然而，对于让
  AlphaZero 智能体正常工作而言，这些特性并非必需。感兴趣的读者可以在原始的 AlphaGo Zero 和 AlphaZero 论文中找到关于这些主题的更多信息。


  #### 自我对弈


  为了生成高质量的训练数据来训练神经网络，AlphaZero 采用了一种结合蒙特卡洛树搜索（MCTS）的自我对弈方法。


  在每局自我对弈游戏中，对于每个非终止时间步 `0 ≤ t ≤ T`，都会使用最新的神经网络参数执行一次 MCTS 搜索，该搜索通常包含数千次迭代。搜索完成后，会为当前游戏状态
  `s_t` 计算出一个更强的搜索策略 `π_t`。该策略与根节点子节点的指数化访问计数成正比，并使用温度参数 `τ` 控制探索程度：


  ```

  π(a|s_0) = N(s_0, a)^(1/τ) / Σ_b N(s_0, b)^(1/τ)

  ```


  (14.5) 其中 `N(s_0, a)` 表示在状态 `s_0` 下采取动作 `a` 所得到的子节点的访问计数。策略 `π_t` 比神经网络输出的原始向量 `P_t`
  更强，可被视为一个强大的策略改进算子。为了进行游戏，会根据策略 `π_t` 选择一个动作 `a`，游戏进入下一个状态，并开始一个新的 MCTS 搜索过程。该策略在训练神经网络时也会成为目标。


  然后从 `π_t` 中采样一个动作 `a_t`，用于在游戏状态 `s_t` 下执行。在每局自我对弈游戏的前 30 步中，softmax 函数（定义为 `softmax(x_i)
  = exp(x_i / τ) / Σ_j exp(x_j / τ)`）的温度设置为 `τ = 1`。这会根据 MCTS 搜索树根节点中子节点的访问计数按比例选择动作。在游戏的剩余部分，则使用接近零的温度（`τ
  → 0`），这对应于始终选择 MCTS 搜索树根节点中访问次数最多的子节点。


  ##### 探索


  为了鼓励进一步探索，会在根节点 `s_0` 的先验概率 `P(s, a)` 中添加少量狄利克雷噪声。具体来说，`P(s, a) = (1 - ε) P_a +
  ε η_a`，其中 `η ~ Dir(0.03)` 且 `ε = 0.25`。每次 MCTS 搜索都会执行此操作。




  ##### 在必败对局中认输


  在自我对弈过程中，AlphaZero 使用一种认输机制，以避免在明显必败的对局中浪费计算资源。该算法通过检查评估后的对局结果，并在玩家明显处于劣势时选择认输来实现这一点。这一过程发生在运行
  800 次蒙特卡洛树搜索（MCTS）迭代之后。如果 MCTS 搜索树根节点的平均状态-动作值低于某个阈值，例如 `-0.9`，玩家就会选择认输，而不是继续对局。


  需要注意的是，自动认输机制仅在对局达到一定步数后才会触发，例如，每位玩家已下 10 或 20 步。在对局开始时主动认输是没有意义的。


  然而，为了衡量认输对局的误报率，AlphaZero 有意在 10% 的自我对弈中禁用认输操作。在这种情况下，智能体将一直对弈直到终局。认输机制是 AlphaZero
  算法的一个关键部分，因为它有助于算法将计算资源集中在更有机会获胜的对局上。这反过来又帮助算法更快地学习，并从长远来看取得更好的结果。


  #### 用于训练的训练样本


  生成这些自我对弈对局的目的是收集用于训练神经网络的样本。具体来说，对于每一场自我对弈，我们收集时间步 `0 ≤ t ≤ T` 的转换元组 `(s_t, π_t,
  z_t)`。其中，`s_t` 是时间步 `t` 时的游戏状态，对于围棋来说，它是一个维度为 `19 × 19 × 17` 的堆叠二进制特征平面。`π_t` 是来自时间步
  `t` 的更强的 MCTS 搜索策略，而 `z_t` 是蒙特卡洛样本回报 `G_t = R_t + R_{t+1} + R_{t+2} + ... + R_{T-1}`，无折扣。由于非终局状态的所有奖励均为零，这简化为
  `G_t = R_{T-1}`，即实际对局结果：输为 -1，平局为 0，赢为 +1。


  这种将最终对局结果分配给每一步的机制有助于解决信用分配问题。因此，智能体做出的所有决策都根据自我对弈的最终结果获得等量的信用。


  所有 `(s_t, π_t, z_t)` 都从时间步 `t` 时当前玩家的视角来表示。例如，如果自我对弈以黑棋获胜结束，那么对于每个时间步 `t = 0, 1,
  2, ..., T`，如果在时间步 `t` 轮到黑棋走，我们设置 `z_t = +1`；相反，如果在时间步 `t` 轮到白棋走，则 `z_t = -1`。`s_t`
  和 `π_t` 也同理。


  然后，AlphaZero 将数百万个最近的自我对弈对局存储到一个经验回放缓冲区中，这与 DQN 算法的做法非常相似。这些自我对弈对局随后被用于训练神经网络。而自我对弈的参与者会定期切换到最新的神经网络，以生成更多的样本对局。




  #### 训练


  AlphaZero 的训练目标是学习一种策略，以最大化特定游戏（如围棋）的期望回报。具体来说，AlphaZero 旨在最大化从给定状态出发的游戏期望回报，该回报通过一个价值网络进行估计。


  尽管 AlphaZero 使用神经网络来近似最优策略（这通常是基于策略的方法所做的），但它与我们书中讨论的任何基于策略的强化学习算法（如 `REINFORCE`
  或 `Actor-Critic`）并不相同。对于 AlphaZero 而言，用于优化策略的目标函数与策略梯度方法不同。该神经网络通过一种称为交叉熵损失的监督学习形式进行训练，以最大化神经网络落子概率
  `p_t` 与蒙特卡洛树搜索（MCTS）搜索概率 `π_t` 的相似度。这种方法常用于多分类问题。


  AlphaZero 策略网络的训练目标可以写成：


  ```

  L_policy = - Σ_a π(a|s) log p(a|s)

  ```


  (14.6) 其中 `p(a|s)` 是策略网络在状态 `s` 下选择动作 `a` 的预测概率，而 `π(a|s)` 是从自我对弈游戏中获得的、在状态 `s`
  下选择动作 `a` 的目标概率。


  因此，AlphaZero 的策略目标函数可以看作是一种最大似然估计。在最大似然估计中，我们寻求找到统计模型的参数，以最大化观测数据的似然。在 AlphaZero
  的情况下，策略网络是一个统计模型，用于预测给定状态下动作的概率分布。自我对弈游戏为我们提供了网络在每个状态下所采取的观测动作。


  尽管交叉熵常用于监督学习，但我们不应将 AlphaZero 归类为监督学习，因为该智能体并未使用任何形式的监督者（例如人类）提供的数据。相反，神经网络是通过一种称为自我对弈的强化学习变体进行训练的，智能体通过与自己博弈并根据这些游戏的结果调整其权重，来学习提升自身表现。这个过程类似于人类通过试错学习，并以奖励或惩罚的形式接收反馈。


  在训练过程中，AlphaZero 通过反复与自己博弈、评估每局游戏的结果，并调整其神经网络权重来提升表现。AlphaZero 的神经网络结合了自我对弈和蒙特卡洛树搜索（MCTS）进行训练，以提升其游戏能力。


  MCTS 在 AlphaZero 中扮演着关键角色，它使智能体能够评估并选择每个游戏状态下的最佳落子。这个过程是迭代的，并随着系统从自身经验中学习并逐步提升游戏能力，从而带来策略改进。


  AlphaZero 的神经网络还经过训练，以最小化预测状态值 `v_t` 与自我对弈游戏结果 `z_t` 之间的误差，这通常被称为均方误差（MSE），如下式所示：


  ```

  L_value = (v - z)²

  ```


  (14.7)


  由于我们使用一个共享权重的单一神经网络来表示策略和价值函数，AlphaZero 的最终目标函数是策略目标 `L_policy` 和价值目标 `L_value`
  的组合，可以使用矩阵形式表示，如下式所示：


  ```

  l = (z - v)² - π^T log p + c ||θ||²

  ```


  (14.8) 其中 `z` 是游戏的真实结果，`v` 是游戏的预测结果，`π` 是策略向量，`p` 是预测的策略向量，`θ` 是神经网络的参数向量，`(p, v)
  = f_θ(s)` 表示给定状态 `s` 时神经网络的输出，`c` 是一个超参数，用于控制 L2 权重正则化的程度，以防止网络过拟合。


  请注意，在 AlphaZero 中，状态价值的 MSE 损失与策略的交叉熵损失被赋予了相同的权重，这与传统的 `Actor-Critic` 算法不同，后者在使用共享权重的单一神经网络近似策略和价值函数时，会使用一个系数来加权状态价值函数的损失。


  为了训练智能体，会从最近 500,000 局自我对弈游戏中随机抽取一批 4096 个转移样本。然后使用随机梯度下降（SGD）方法对神经网络进行优化。初始学习率设置为
  0.01，动量设置为 0.9，L2 正则化设置为 `10^-4`。此外，算法在训练步数达到 400,000 和 600,000 时，分别采用阶梯法衰减学习率，衰减权重为
  0.1。训练通常持续超过 700,000 步，围棋总共进行了 2100 万局自我对弈游戏，国际象棋 4400 万局，日本将棋 2400 万局。


  毫不意外，AlphaZero 是使用分布式强化学习架构进行训练的，其中数千个自我对弈角色生成了数百万局自我对弈游戏。多个学习器并行工作，以更新神经网络的参数。


  在训练过程中，使用了 5000 个张量处理单元（TPU）来生成自我对弈游戏。TPU 是谷歌开发的专用加速硬件，用于加速数值计算，尤其是神经网络计算。这意味着训练期间有数百甚至数千台机器用于生成自我对弈游戏。此外，还使用了
  16 个第二代 TPU 来训练神经网络。DeepMind 分别为国际象棋、日本将棋和围棋训练了独立的 AlphaZero 实例，训练时长分别约为国际象棋 9 小时、日本将棋
  12 小时和围棋 13 天。




  #### 评估智能体


  要在训练期间或训练后评估 AlphaZero 智能体的性能，主要有两种选择。


  第一种选择是让 AlphaZero 智能体与各种对手对弈，例如（职业）人类棋手或其他 AI 智能体，包括使用先前训练迭代中获得的神经网络权重的自身。我们将在这些评估对局中使用标准的
  **Elo 等级分**来评定智能体的表现。AlphaZero 智能体使用 MCTS 搜索来为每个局面寻找最佳着法；这有时被称为在线规划，因为智能体在对弈过程中会主动使用模型来搜索最佳着法。整个过程类似于应用
  MCTS 生成自我对弈棋局，但不同之处在于，它不使用狄利克雷噪声进行探索，并且始终在每个局面中选择最佳着法——即 MCTS 搜索树根节点访问次数最多的子节点；此外，我们通常可能会让
  MCTS 搜索运行更多的模拟次数。然而，至关重要的一点是，如果我们在训练期间评估智能体的性能，必须确保这些评估对局不属于训练数据的一部分。


  第二种选择是使用训练好的神经网络来预测历史（职业）人类对局中的着法和比赛结果。这涉及使用（职业）人类棋手的历史对局来构建一个评估数据集。然后，使用 AlphaZero
  智能体的神经网络来预测着法和实际比赛结果。


  在实践中，这两种方法会结合起来评估智能体，尤其是在训练期间，正如原始 AlphaZero 智能体所做的那样。这种双重评估机制能让我们对智能体的实际实力更有信心。这是因为，如果我们仅仅通过让智能体与某个对手（例如，某个在线玩家或之前的模型）对弈来评估它，很难断定对手的真实实力。这会成为一个问题，因为
  Elo 等级分系统假设我们对两位棋手的等级分都有良好的估计，才能得出准确的等级分。例如，如果智能体与某个比它弱的业余玩家下了 100 局并全部获胜，那么它可能会获得一个非常高的等级分；这可能会给我们一种错误的印象，认为智能体表现相当出色，而事实并非如此。


  另一方面，如果我们使用历史人类对局来评估智能体的表现，历史（职业）人类对局的质量也会影响评估结果。例如，如果我们只有业余人类玩家下的对局，那么预测准确率可能会非常高；这也可能给我们一种错误的印象，认为智能体已经达到了很强的水平。另一方面，如果（职业）人类对局是由高段位职业棋手下的，那么智能体可能无法准确预测人类棋手的着法和比赛结果，尤其是在训练初期。这可能会让我们对智能体的表现产生怀疑。重要的是，我们要使用来自不同水平和棋手的多样化对局来构建评估数据集，这样才能更准确地估计智能体的性能。


  ## 14.4 在 `9 x 9` 围棋棋盘上训练 AlphaZero


  需要认识到，训练 AlphaZero 智能体是一项耗时的工作，即使在强大的 GPU 上，在 `19 x 19` 的围棋棋盘上也需要数周甚至数月的时间。DeepMind
  的原始论文提到，他们使用数千台服务器和 TPU 来训练 AlphaZero 智能体。尽管拥有如此巨大的计算资源，训练 20 个残差块的 AlphaZero 版本仍然需要
  72 小时，而 40 个残差块的版本则需要 40 天。不幸的是，我们无法获得同等水平的计算资源和预算来进行类似的实验。


  考虑到我们的目标不是创造能够击败世界冠军的最强智能体，我们对方法进行了一些调整。这些调整包括使用缩小的设置，例如更小的神经网络、更少的自我对弈角色和更少的对局数，来训练
  AlphaZero 智能体。具体来说，我们专注于 `9 x 9` 棋盘大小的围棋，这需要更少的计算资源，因此训练智能体的时间也更短。在中等硬件上经过 50 小时的训练后，我们的智能体已经达到了很强的水平。我们最好的模型有时可以击败业余
  1 段水平的对手。^(¹⁴)


  #### 分布式训练


  我们在训练过程中采用了分布式强化学习架构，使用了大约 120 个角色（actor）、1 个学习器（learner）和 1 个负责评估智能体性能的额外进程。所有这些组件都在一台配备
  128 个 CPU 和 8 个 GPU 的服务器上运行；每个 GPU 拥有 24 GB 的显存。该程序仅使用了 Python 的 `multiprocessing`
  模块，没有依赖任何用于分布式计算的第三方工具或库。




  #### 神经网络架构与状态表示


  我们的神经网络架构和状态表示与 AlphaGo Zero 及 AlphaZero 论文中描述的方法高度一致。为了构建状态，我们利用了最近八次棋盘配置，最终状态被表示为一个
  `9 × 9 × 17` 的图像。虽然我们大体上遵循了 AlphaZero 的神经网络架构，但由于 `9 × 9` 棋盘比 `19 × 19` 棋盘简单得多，我们进行了一些修改，使用了更少的模块和卷积滤波器。


  在最初的实验中，我们从包含 20 个模块的版本开始，但卷积层仅使用 64 个卷积滤波器，价值网络（value head）仅使用 64 个隐藏单元。这个特定的神经网络包含
  1,434,493 个参数。然而，经过 24 小时的训练后，我们观察到智能体（agent）频繁下出虚手（pass moves），导致对局在大约 20 步内就突然结束。这种行为在自我对弈（self-play）的棋手和评估过程中均有出现。我们推测，尽管我们尝试通过减少卷积滤波器和隐藏单元的数量来缩小规模，但
  20 模块版本对于 `9 × 9` 的问题来说可能仍然过于强大。因此，我们决定停止该训练会话，并探索其他方法。


  在首次实验失败后，我们尝试了不同变体的神经网络架构。这些包括一个 10 模块版本（64 个滤波器和隐藏单元），以及一个 15 模块版本（相同数量的滤波器和隐藏单元）。然而，在
  24 小时的训练后，这些配置均未产生令人满意的结果。最终，我们确定了一个由 12 个模块组成的架构，其中包括 1 个初始卷积模块和 11 个残差模块，卷积滤波器为
  64 个，价值网络隐藏单元为 64 个。我们决定对这个修订后的神经网络进行超过 40 小时的训练，以评估其进展。这个 12 模块版本共有 842,621 个参数，并且与我们之前的尝试相比，性能有所提升。然而，当与其他计算机引擎等强对手对战时，它未能持续获胜。


  在我们的最终实验中，我们决定使用一个更强大的神经网络架构，它由 11 个模块组成（1 个初始卷积模块和 10 个残差模块）。在此配置中，我们增加了卷积滤波器的数量，每个模块的卷积层使用
  128 个滤波器，价值网络使用 128 个隐藏单元。这个神经网络共有 2,998,461 个参数。我们最终实验的结果表明，这个更强大的神经网络架构实现了比 12
  模块版本显著更强的棋力。因此，我们后续的讨论将集中在 11 模块版本的模型上。


  #### 自我对弈


  我们的方法紧密遵循 AlphaGo Zero 和 AlphaZero 论文中描述的方法论。然而，由于 `9 × 9` 问题相对简单且动作空间较小，我们在每局游戏中将每次蒙特卡洛树搜索（MCTS）的模拟次数限制为
  200 次。为了在 MCTS 期间分配局面评估的工作负载，我们均匀地利用服务器上可用的 GPU。


  为了优化计算资源，我们将最大对局长度设置为 162 步（`9 × 9 × 2`）。一旦对局达到此长度，将不允许再下子，我们会计算双方棋手的估算得分以确定胜者。与
  AlphaGo Zero 论文类似，我们采用了一种认输机制。我们将认输阈值初始化为 `-0.85`，并动态调整它，以保持认输误报率低于 5%。为了测量误报率，我们在
  10% 的自我对弈对局中禁用认输动作，让智能体一直下到自然终止（双方连续两步都下虚手或达到最大对局长度）。为了避免过早认输，我们只允许智能体在游戏进行到一定步数（例如
  30 或 40 步）后才考虑认输。此外，我们在前 50,000 局自我对弈中禁用了认输功能，因为神经网络在早期阶段的预测不够准确。


  对局结束后，我们使用简化版的 Tromp-Taylor 计分法进行计分，并为白棋设置了 7.5 目的贴目。需要注意的是，这些得分是估算值，因为 Tromp-Taylor
  规则要求棋手在计算最终得分前，先提走他们认为已死的棋子。如果未能提走这些棋子，它们将被视为活棋计入得分。然而，对于计算机程序来说，在对局结束时准确检测此类死子是一项艰巨的任务。例如，在图
  14.9 中，围棋对局中的死子用小方块标记，应在计算最终得分前从棋盘上移除。尽管如此，由于缺乏明确的逻辑，准确检测这些死子仍然很困难。这就是为什么通常采用模拟或神经网络预测等额外技术来估算得分的原因。


  ![](img/605748_1_En_14_Fig9_HTML.png)


  9x9 网格上的围棋战略棋盘游戏的两个示意图。


  **图 14.9** `9 × 9` 围棋对局最终状态下的死子示例。在左侧图中，位于 E2、F3 和 G3 的白子被视为死子，因为它们已被对手的棋子完全包围，无论它们是否已被提走。右侧图展示了另一个双方都有死子的例子。位于
  C6 和 D6 的白子是死子，位于 G5 的黑子也是死子。




  #### MCTS 搜索


  我们实现了 AlphaGo Zero 和 AlphaZero 论文中描述的 MCTS（蒙特卡洛树搜索）算法，使用了相同的配置和超参数。我们的实现每次搜索执行 200
  次模拟，这对于 `9 x 9` 的棋盘来说已经足够。探索参数 `c_base` 和 `c_init` 分别设置为 19652 和 1.25。我们按照 AlphaZero
  论文中的规定，在每一步向根节点添加狄利克雷噪声，其中 `epsilon = 0.25`，`eta = 0.03`。在自我对弈过程中，我们将公式 (14.5) 中的温度在前
  16 步设置为 1.0，后续步骤设置为 0.1。为了提高搜索过程的效率，我们使用了具有八个并行叶节点的并行 MCTS 搜索，并引入了文献 [15] 中概述的虚拟损失。此外，在同一局游戏中，我们会在后续步骤中重用子树。


  然而，需要注意的是，在评估对局中（当前模型与先前模型对弈），我们不会向根节点添加狄利克雷噪声，也不会重用子树。这一决定基于以下事实：两个玩家是不同的，因此他们在面对相同状态时可能会产生不同的预测。


  #### 训练


  我们严格遵循 AlphaGo Zero 和 AlphaZero 论文中概述的标准流程和机制来训练我们的智能体。我们的训练方法完全基于从专用自我对弈角色收集的纯自我对弈对局，不涉及人类生成的对局或其他计算引擎或
  AI 程序来引导学习过程。


  鉴于我们有 120 个角色，我们使用单个学习器智能体来更新神经网络，这是一个合理的选择。为了优化训练，我们使用了 `PyTorch` 中的 `SGD` 优化器，将初始学习率设置为
  0.01，动量设置为 0.9，并应用 0.0001 的 L2 正则化。学习率遵循阶梯模式，分别在 200,000 和 400,000 训练步时逐步降低至 0.001
  和 0.0001。


  在每个训练步骤中，程序从最近的 250,000 局自我对弈对局中随机抽取一批 1024 个样本。为了增强训练过程，我们采用了数据增强技术，例如随机旋转和翻转，这是训练原始
  AlphaGo 智能体时使用的方法。此外，我们每 1000 个训练步生成一个检查点。


  由于 `9 x 9` 围棋相比 `19 x 19` 问题空间更小，我们相应地调整了方法。对于每个检查点，我们总共进行 5000 局自我对弈对局，而不是 25,000
  局，并将训练数据限制为最近的 250,000 局自我对弈对局，而不是 500,000 局。我们在角色总共进行了 20,000 局对弈后创建初始检查点，以确保在开始学习过程（例如，更新神经网络）之前探索了多样化的游戏状态。在整个训练过程中，总共使用了一百万局自我对弈对局来训练神经网络。


  #### 评估


  在训练过程中，我们在每个新检查点评估智能体的性能。我们使用最新模型与先前检查点的模型对弈，类似于自我对弈。然而，存在一些区别：两个玩家并不相同（黑棋代表最新模型，白棋代表先前模型），并且我们不需要智能体进行额外的探索（搜索树的根节点不添加噪声）。在每次蒙特卡洛树搜索（MCTS）之后，我们总是选择最佳落子（访问次数最多的子节点）。Elo
  评分使用简化的实现进行计算。具体来说，我们采用原始 AlphaGo Zero 论文中的公式来估计玩家 *a* 击败玩家 *b* 的概率。该公式表示为 `P(a
  击败 b) = 1 / (1 + exp(c_elo * (e(b) - e(a))))`，其中标准常数 `c_elo` 等于 `1/400`。此外，我们根据玩家当前的评分使用
  k 因子的变体。如果当前评分低于 2100，k 因子设置为 32。对于 2100 到 2400 之间的评分，k 因子为 24，对于 2400 以上的评分，k 因子为
  16。


  我们还使用一个包含总共 10,000 局对弈和 620,000 个棋位的评估数据集来评估模型预测人类对弈的准确性。在评估 `9 x 9` 围棋时，我们遇到的一个挑战是，职业人类棋手（职业段位）在这种小棋盘上的对局数量有限。事实上，我们的评估数据集包含的日本职业围棋棋手（从
  1p 到 9p）对局不到 3%。因此，我们不得不从互联网上收集剩余的对局，主要来自 CGOS 服务器。值得一提的是，虽然我们将评估数据集称为人类对弈对局，但其中很大一部分对局很可能是由计算机引擎或
  AI 程序而非真实人类进行的。


  为了确保评估数据集的高质量，我们只包含双方棋手 Elo 评分均至少为 2100 的对局。这是因为 Elo 评分 2100 大约相当于业余 1 段的水平 [16]。此外，尽管我们根据
  Elo 评分过滤了对局，但初始评分仍有可能不准确。另外，为了确保数据集的多样性，我们将来自同一棋手的对局数量限制在最多 200 局。此外，我们只将唯一的对局包含在评估数据集中。如果两局对弈由相同的两位棋手进行，持续相同的步数，并以相同的结果结束（即相同的胜者和相同的胜者点数），则视为重复对局。




