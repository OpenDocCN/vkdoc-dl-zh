  \ PPO 算法的性能与 Actor-Critic 等标准策略梯度方法进行了比较。\n\n本章标志着我们对基于策略的方法探索的结束。我们已经讨论了策略梯度背后的理论以及在此基础上构建的各种算法。在接下来的章节中，我们将深入探讨强化学习中更高级的主题。\n\
