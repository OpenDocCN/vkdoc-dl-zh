  \ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]\n             = \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞}\
  \ γ^t (R(s_t, a_t) + γ V_π(s_{t+1}) - V_π(s_t))]\n             = J(π') + \U0001D53C\
  _{τ ~ π'}[∑_{t=0}^{∞} γ^{t+1} V_π(s_{t+1}) - ∑_{t=0}^{∞} γ^t V_π(s)]\n         \
  \    = J(π') + \U0001D53C_{τ ~ π'}[∑_{t=1}^{∞} γ^t V_π(s) - ∑_{t=0}^{∞} γ^t V_π(s)]\n\
  \             = J(π') - \U0001D53C_{τ ~ π'}[V_π(s_0)]\n             = J(π') - J(π)\n\
  ```\n\n式(11.2)表明，我们可以相对于当前或旧策略 `π`，重写优化新策略 `π'` 的目标函数，如下所示：\n\n```\nmax_{π'} J(π')\
  \ = max_{π'} J(π') - J(π)\n               = max_{π'} J(π') \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞}\
  \ γ^t Â_π(s_t, a_t)]\n```\n\n(11.3)\n\n然而，在该方程中，我们仍然需要按照新策略 `π'` 采样得到的轨迹；这一要求使其无法计算。\n\
  \n但让我们用折扣未来状态分布 `d_π` 来重写式(11.2)，并利用公比为 `γ` 的无穷等比级数之和为 `1 / (1 - γ)` 的性质，例如：\n\n\
  ```\nJ(π') - J(π) = \U0001D53C_{τ ~ π'}[∑_{t=0}^{∞} γ^t Â_π(s_t, a_t)]\n       \
  \      = 1/(1 - γ) \U0001D53C_{s ~ d_{π'}, a ~ π'}[Â_π(s, a)]\n             = 1/(1\
  \ - γ) \U0001D53C_{s ~ d_{π'}, a ~ π}[π'(a|s)/π(a|s) Â_π(s, a)]\n```\n\n(11.4)\n\
  \n其中 `d_π` 是在策略 `π` 下访问状态 `s` 的期望折扣频率，`d_π` 定义为\n\n```\nd_π = (1 - γ) ∑_{t=0}^{∞}\
  \ γ^t P(s_t = s|π)\n```\n\n如果折扣未来状态分布 `d_{π'}` 和 `d_π` 接近，即 `d_{π'} ≈ d_π`，那么我们可以使用\
  \ `d_π` 来近似式(11.4)，例如：\n\n\n\n![$$\\displaystyle \\begin{aligned} J(\\pi') - J(\\\
  pi) & \\approx \\frac{1}{1 - {\\gamma}}\\mathbb{E}_{\\substack{s \\sim d_{\\pi}\
  \ \\\\ a \\sim \\pi}\\!\\!}\\left[\\frac{\\pi'(a|s)}{\\pi(a|s)} \\hat{A}_{\\pi}(s,\
  \ a)\\right] \\\\ & \\doteq \\mathcal{L}_{\\pi}(\\pi') \\notag \\end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ6.png)\n\
  \n(11.5)\n\n事实证明，这种近似 ![$$\\mathcal {L}_{\\pi }(\\pi ') \\approx J(\\pi ') - J(\\\
  pi )$$](img/605748_1_En_11_Chapter_TeX_IEq72.png) 能产生非常好的结果。正如 Achiam 等人 [2] 所证明的，它存在一个性能边界，前提是新策略\
  \ ![$$\\pi '$$](img/605748_1_En_11_Chapter_TeX_IEq73.png) 和旧策略 ![$$\\pi $$](img/605748_1_En_11_Chapter_TeX_IEq74.png)\
  \ 在策略空间中足够接近。\n\n![$$\\displaystyle \\begin{aligned} \\lvert J(\\pi') - \\left(\
  \ J(\\pi) + \\mathcal{L}_{\\pi}(\\pi') \\right) \\rvert \\le C\\sqrt{\\mathbb{E}_{s\
  \ \\sim d_{\\pi}\\!\\!}\\left[D_{KL}(\\pi'||\\pi)[s]\\right]} {} \\end{aligned}\
  \ $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ7.png)\n\n(11.6)\
  \ 其中 ![$$D_{KL}$$](img/605748_1_En_11_Chapter_TeX_IEq75.png) 是 Kullback-Leibler\
  \ (KL) 散度，用于衡量两个概率分布之间的距离。例如，给定某个随机变量上的两个概率分布 `P` 和 `Q`，KL 散度通过以下公式计算：\n\n![$$\\\
  displaystyle \\begin{aligned} D_{KL}(P||Q) = \\sum_x P(x) \\log \\frac{P(x)}{Q(x)}\
  \ \\end{aligned} $$](img/605748_1_En_11_Chapter_TeX_Equ8.png)\n\n(11.7)\n\n注意，如果两个概率分布相同，即当\
  \ ![$$P = Q$$](img/605748_1_En_11_Chapter_TeX_IEq77.png) 时，KL 散度距离为零，即 ![$$D_{KL}(P||Q)\
  \ = 0$$](img/605748_1_En_11_Chapter_TeX_IEq76.png)。\n\n具体来说，在强化学习的背景下，给定两个策略 ![$$\\\
  pi '$$](img/605748_1_En_11_Chapter_TeX_IEq78.png) 和 ![$$\\pi $$](img/605748_1_En_11_Chapter_TeX_IEq79.png)，对于给定状态\
  \ `s`，它们之间的 KL 散度可以通过以下公式计算：\n\n![$$\\displaystyle \\begin{aligned} D_{KL}(\\pi'||\\\
  pi)[s] = \\sum_{a \\in \\mathcal{A}} \\pi'(a|s) \\log \\frac{\\pi'(a|s)}{\\pi(a|s)}\
  \ \\end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ9.png)\n\
  \n(11.8)\n\n#### 单调提升理论\n\n我们可以将公式 (11.6) 重新整理为\n\n![$$\\displaystyle \\begin{aligned}\
  \ J(\\pi') - J(\\pi) \\ge \\mathcal{L}_{\\pi}(\\pi') - C\\sqrt{\\mathbb{E}_{s \\\
  sim d_{\\pi}\\!\\!}\\left[D_{KL}(\\pi'||\\pi)[s]\\right]} {} \\end{aligned} $$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_Equ10.png)\n\
  \n(11.9)\n\n这个公式被称为强化学习中的性能提升边界。在公式的左侧，![$$J(\\pi ') - J(\\pi )$$](img/605748_1_En_11_Chapter_TeX_IEq80.png)\
  \ 表示新策略 ![$$\\pi '$$](img/605748_1_En_11_Chapter_TeX_IEq81.png) 与旧策略 ![$$\\pi $$](img/605748_1_En_11_Chapter_TeX_IEq82.png)\
  \ 之间期望累积奖励的差值。这正是我们在更新策略时希望提升的量。\n\n在公式的右侧，![$$\\mathcal {L}_{\\pi }(\\pi ') - C\\\
  sqrt {\\mathbb {E}_{s \\sim d_{\\pi }\\!\\!}\\left [D_{KL}(\\pi '||\\pi )[s]\\right\
  \ ]}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq83.png) 是替代目标函数，其中\
  \ ![$$\\mathcal {L}_{\\pi }(\\pi ')$$](img/605748_1_En_11_Chapter_TeX_IEq84.png)\
  \ 是策略 ![$$\\pi '$$](img/605748_1_En_11_Chapter_TeX_IEq85.png) 的优势函数，而 `C` 是一个超参数，用于平衡期望提升与\
  \ KL 散度惩罚之间的权衡。\n\n第一项 ![$$\\mathcal {L}_{\\pi }(\\pi ')$$](img/605748_1_En_11_Chapter_TeX_IEq86.png)\
  \ 基于优势函数，衡量新策略 ![$$\\pi '$$](img/605748_1_En_11_Chapter_TeX_IEq87.png) 在期望奖励方面比旧策略\
  \ ![$$\\pi $$](img/605748_1_En_11_Chapter_TeX_IEq88.png) 好多少。优势函数表示在当前策略下，每个动作相对于平均动作的优越程度，常用于估计策略梯度。\n\
  \n第二项 ![$$C\\sqrt {\\mathbb {E}_{s \\sim d_{\\pi }\\!\\!}\\left [D_{KL}(\\pi '||\\\
  pi )[s]\\right ]}$$](images/605748_1_En_11_Chapter/605748_1_En_11_Chapter_TeX_IEq89.png)\
  \ 对新策略 ![$$\\pi '$$](img/605748_1_En_11_Chapter_TeX_IEq90.png) 与旧策略 ![$$\\pi $$](img/605748_1_En_11_Chapter_TeX_IEq91.png)\
  \ 之间的 KL 散度进行惩罚，并由常数 `C` 加权。这一项确保新策略与旧策略不会差异过大，从而避免做出可能有害的大幅改动。\n\n性能提升边界提供了一个理论保证：通过优化替代目标函数，我们可以提升策略的期望累积奖励。它还赋予我们一个优良特性：如果我们能够最大化右侧的各项，那么就能保证新策略\
  \ ![$$\\pi '$$](img/605748_1_En_11_Chapter_TeX_IEq92.png) 相对于旧策略 ![$$\\pi $$](img/605748_1_En_11_Chapter_TeX_IEq93.png)\
  \ 有所提升。\n\n\n\n#### 替代目标函数\n\n通过使用 `L_π(π') ≈ J(π') - J(π)` 这一近似，我们可以将初始的相对策略性能方程重新整理为：\n\
  \n```\nL_π(π') = 1/(1-γ) * E_{s~d_π, a~π} [π'(a|s)/π(a|s) * Â_π(s, a)]\n      \
  \  = E_{τ~π} [Σ_{t=0}^∞ γ^t * π'(a|s)/π(a|s) * Â_π(s, a)]\n```\n\n(11.10)\n\n方程\
  \ (11.10) 通常被称为策略梯度方法的**替代目标函数**。我们可以利用从旧策略 `π` 采样的轨迹来计算并优化该函数。方程中的概率比项是重要性采样，但由于它仅依赖于当前时间步，而非历史序列，因此不会出现本章开头讨论的权重消失或爆炸问题。\n\
  \n利用方程 (11.10)，我们的目标是找到新策略 `π'`，使其与旧策略 `π` 之间的相对性能差异最大化，即：\n\n```\nargmax_{π'} J(π')\
  \ = argmax_{π'} J(π') - J(π)\n                  = argmax_{π'} E_{τ~π} [Σ_{t=0}^∞\
  \ γ^t * π'(a|s)/π(a|s) * Â_π(s, a)]\n```\n\n(11.11)\n\n然而，由于在方程 (11.10) 中我们使用了近似解\
  \ `L_π(π')`，即使用从旧策略 `π` 而非新策略 `π'` 生成的轨迹，这仅在**新策略与旧策略相近**时才有效，正如单调改进理论所示。\n\n这使得替代目标函数成为一个**约束优化问题**：\n\
  \n```\nargmax_{π'} L_π(π') = argmax_{π'} E_{τ~π} [Σ_{t=0}^∞ γ^t * π'(a|s)/π(a|s)\
  \ * Â_π(s, a)]\nsubject to: max_{s∈S} D_KL(π' || π) ≤ δ\n```\n\n(11.12) 其中约束条件定义为新策略\
  \ `π'` 与旧策略 `π` 之间的最大 `D_KL` 散度距离，且 `D_KL(π' || π) ≤ δ`。\n\n针对方程 (11.12) 所定义的约束优化问题，一种解决方案是采用**信任区域优化方法**。图\
  \ 11.1 展示了信任区域方法的概念：当前（旧）策略 `π` 位于中心点。围绕当前策略定义一个信任区域，该区域可由 `D_KL` 散度来界定。信任区域方法会在该信任区域的约束内，寻找合适的步长和方向来更新策略。\n\
  \n![](img/605748_1_En_11_Fig1_HTML.png)\n\n示意图包含一个带有弯曲箭头的虚线圆圈，箭头标记为“信任区域”。圆心处的一个点标记为“当前策略”。圆圈右上边缘附近的另一个点标记为“提议策略”。从当前策略指向提议策略的箭头标记为“步进方向”。\n\
  \n**图 11.1** 信任区域方法的概念\n\n在强化学习的策略优化背景下，已经开发出多种算法来解决替代目标函数问题，例如 Kakade, Sham M [3]\
  \ 提出的**自然策略梯度**，以及 Schulman 等人 [4] 提出的**信任区域策略优化**（TRPO）。然而，这些算法需要分别对 `L_π(π')`\
  \ 和 `D_KL(π' || π)` 进行额外的近似。这引入了额外的复杂性，例如无法使用随机梯度上升来优化策略参数，而必须使用其他方法来计算更新参数所需的梯度。这也降低了计算效率，因为每次迭代更新策略需要更多的资源。\n\
  \n幸运的是，有一种更简单、更高效的算法可用：**近端策略优化**（PPO）。PPO 避免了其他算法的额外复杂性，并提供了一种直接的方法来优化替代目标函数。\n\
  \n### 11.3 近端策略优化\n\n由 Schulman 等人 [5] 提出的**近端策略优化**（PPO）是一种先进的策略梯度算法，它在保持实现简单的同时，改进了先前策略梯度方法（如\
  \ Actor-Critic [6] 算法）的稳定性和数据效率。PPO 已成功应用于各种强化学习问题，并且可以扩展到处理需要更复杂神经网络架构的大型复杂环境。\n\
  \nPPO 的一个关键优势在于它使用随机梯度上升来优化策略，从而消除了其前身 TRPO 所需的复杂梯度计算过程和寻找合适优化方向的需求。这种方法在实践中能实现更快的收敛和更好的性能。\n\
  \nPPO 是一种强大且通用的算法，已被证明是许多强化学习任务中可靠且有效的选择。与先前的方法相比，它提供了更简单的实现，同时仍能达到最先进的性能。¹¹\n\n\
  \n\n#### 裁剪替代目标函数\n\nPPO 建立在公式 (11.12) 所示的替代目标函数思想之上。然而，它不需要直接计算 KL 散度 `D_{KL}`。为了理解为何可行，让我们考察概率比与\
  \ KL 散度之间的关系。\n\n回顾一下，给定两个策略 `π'` 和 `π`，它们在给定状态 `s` 下的 KL 散度可通过以下公式计算：\n\n```\n\
  D_{KL}(π'||π)[s] = Σ_{a ∈ A} π'(a|s) log(π'(a|s) / π(a|s))\n```\n\nKL 散度衡量的是旧策略\
  \ `π` 与新策略 `π'` 概率分布之间的对数差异。如果新策略与旧策略相同，即 `π' = π`，那么概率比为 1.0。随着新策略偏离旧策略，这个比值会发生剧烈变化。然而，这个比值与\
  \ KL 散度之间是什么关系呢？\n\n举个例子，考虑一个简单的马尔可夫决策过程（MDP），它只有一个状态 `s` 和两个动作 `a1` 和 `a2`。假设我们有一个新策略\
  \ `π'` 和一个旧策略 `π`，在旧策略下，状态 `s` 中选择动作 `a1` 和 `a2` 的概率均为 0.5，即 `π(a1|s) = 0.5` 且 `π(a2|s)\
  \ = 0.5`。\n\n我们可以计算在状态 `s` 下，对于每个动作 `a1, a2`，`π'` 和 `π` 的概率比 `π'(a|s) / π(a|s)`。表\
  \ 11.1 展示了不同新策略对应的概率比和 KL 散度。\n\n**表 11.1** 不同新策略 `π'` 与旧策略 `π` 之间的概率比和 KL 散度示例\n\
  \n| `π'(·|s)` | `π(·|s)` | `π'(a1|s) / π(a1|s)` | `π'(a2|s) / π(a2|s)` | `D_{KL}(π'||π)[s]`\
  \ |\n| --- | --- | --- | --- | --- |\n| [0.1, 0.9] | [0.5, 0.5] | 0.2 | 1.8 | 0.37\
  \ |\n| [0.2, 0.8] | [0.5, 0.5] | 0.4 | 1.6 | 0.19 |\n| [0.3, 0.7] | [0.5, 0.5] |\
  \ 0.6 | 1.4 | 0.08 |\n| [0.4, 0.6] | [0.5, 0.5] | 0.8 | 1.2 | 0.02 |\n| [0.5, 0.5]\
  \ | [0.5, 0.5] | 1.0 | 1.0 | 0.0 |\n| [0.6, 0.4] | [0.5, 0.5] | 1.2 | 0.8 | 0.02\
  \ |\n| [0.7, 0.3] | [0.5, 0.5] | 1.4 | 0.6 | 0.08 |\n| [0.8, 0.2] | [0.5, 0.5] |\
  \ 1.6 | 0.4 | 0.19 |\n| [0.9, 0.1] | [0.5, 0.5] | 1.8 | 0.2 | 0.37 |\n\n结果展示了一个非常有趣的模式：随着两个策略\
  \ `π'` 和 `π` 偏离程度增大，即它们的概率比偏离 1.0 越远，KL 散度也随之增加。\n\n这给了我们一个启示：也许我们可以不计算 KL 散度，而是直接对概率比施加约束，使其接近\
  \ 1.0，如公式 (11.13) 所示，其中 `ε` 是一个小变量，用于控制我们希望对概率比施加的约束程度。\n\n```\nclip(π'(a|s) / π(a|s),\
  \ 1 - ε, 1 + ε) * Â_t\n```\n\n(11.13)\n\n然而，在某些情况下，使用裁剪后的概率比可能导致对优势函数的高估，从而产生过于保守的策略，无法探索可能比旧策略所选动作更优的新动作。为了理解原因，让我们考虑一个简单的例子。\n\
  \n假设旧策略在状态 `s` 下选择动作 `a` 的概率为 0.8，优势估计值为 0.5。新策略在状态 `s` 下选择动作 `a` 的概率为 0.3。我们使用\
  \ `ε = 0.2`，因此裁剪范围应为 [0.8, 1.2]。\n\n使用裁剪后的比值会得到 `0.3 / 0.8 = 0.375`，这小于裁剪范围的下限。因此，裁剪后的比值将为\
  \ 0.8，目标函数计算结果为 `0.8 * 0.5 = 0.4`。\n\n然而，如果我们使用原始的未裁剪概率比，目标函数计算结果为 `0.375 * 0.5\
  \ = 0.1875`。在这种情况下，裁剪后的概率比导致对优势函数的估计远高于未裁剪的比值。这可能导致策略高估某些动作的价值，而实际上忽略了旧策略选择的、能产生更好期望回报的其他动作。\n\
  \n\n\n##### PPO 中的裁剪代理目标函数\n\n为了解决这个问题，PPO 还对裁剪目标和非裁剪目标逐元素取最小值，以缓解高估问题。这有助于缓解高估问题，并允许更好地探索新动作。通过使用两个目标的最小值，在裁剪比率会导致高估的区域，更新将更加保守，但在未裁剪比率会导致策略发生显著变化的区域，仍允许进行探索。\n\
  \nPPO 的最终裁剪代理目标函数 `L_pi_CLIP(pi')` 如公式 (11.14) 所示。\n\n```\n\\displaystyle \\begin{aligned}\
  \ \\mathop{\\text{argmax}}_{\\pi'}\\mathcal{L}_{\\pi}^{CLIP}(\\pi') & = \\mathop{\\\
  text{argmax}}_{\\pi'} \\mathbb{E}_{\\tau \\sim \\pi\\!\\!}\\left[ \\min \\Biggl(\
  \ \\frac{\\pi'(a|s)}{\\pi(a|s)} \\hat{A}_t, \\; clip \\left( \\frac{\\pi'(a|s)}{\\\
  pi(a|s)}, 1-\\epsilon, 1+\\epsilon \\right)\\hat{A}_t \\Biggr)\\right] {} \\end{aligned}\n\
  ```\n\n(11.14)\n\n有了这个裁剪代理目标函数，我们可以像使用标准策略梯度方法（如 Actor-Critic）一样，使用随机梯度上升方法来训练策略网络。无需像\
  \ TRPO 等其他算法那样手动计算梯度然后寻找优化方向。\n\n#### 广义优势估计\n\nPPO 使用 Schulman 等人提出的广义优势估计（GAE）方法来计算优势，该方法用于估计预期未来奖励以及在给定状态下采取特定动作的优势。GAE\
  \ 通过将 N 步回报与价值函数的自举估计相结合，提供了更稳定、方差更低的优势函数估计。这种方法使 PPO 能够处理不同长度的任务，因为它可以在固定时间范围内估计优势函数，并且可以适应任务的长度。\n\
  \n优势函数衡量采取某个特定动作相对于其他动作有多好，是 PPO 等策略梯度方法中的关键量。优势函数通常使用观察到的奖励与当前策略下的预期奖励之间的差值来估计。\n\
  \n优势函数使用有限时间范围回报方法的截断版本进行计算，如公式 (11.15) 所示，其中 `lambda` 是一个参数，用于控制优势函数估计中偏差和方差之间的权衡。当\
  \ `lambda = 1` 时，GAE 退化为标准的 N 步 TD 方法。\n\n```\n\\displaystyle \\begin{aligned} \\\
  hat{A}_t = \\delta_t + ({\\gamma} \\lambda) \\delta_{t+1} + ({\\gamma} \\lambda)²\
  \ \\delta_{t+2} + \\cdots + ({\\gamma} \\lambda)^{T-t-1} \\delta_{T-1} {} \\end{aligned}\n\
  ```\n\n(11.15)\n\n这里，`delta_t` 是时序差分误差，即奖励总和与当前状态估计值及后继状态估计值之间的差值，如公式 (11.16) 所示。\n\
  \n```\n\\displaystyle \\begin{aligned} \\delta_t = r_t + {\\gamma} V_\\pi(s_{t+1})\
  \ - V_\\pi(s_t) {} \\end{aligned}\n```\n\n(11.16)\n\n要恢复序列中特定状态的回报，我们可以使用 GAE 优势加上估计的状态价值，如公式\
  \ (11.17) 所示。\n\n```\n\\displaystyle \\begin{aligned} G_t = \\hat{A}_t + V_\\pi(s_t)\
  \ {} \\end{aligned}\n```\n\n(11.17)\n\nGAE 方法已被证明可以提高 PPO 的稳定性和收敛性，同时在优势函数估计中保持偏差和方差之间的良好平衡。它是一个强大的工具，可用于在各种强化学习环境中估计回报和优势。\n\
  \n#### 对数概率比\n\n在实践中，我们经常在裁剪代理目标函数中使用对数概率比而不是概率比 `pi'(a|s) / pi(a|s)`，这可以带来更稳定和高效的优化，尤其是在处理很小或很大的概率比时。原因之一是取概率比的对数有助于缩小可能值的范围。在实践中，概率比有时会取非常小或非常大的值，这可能导致数值不稳定或下溢/上溢错误。通过取对数，我们可以将这些值转换到更易于管理的范围。\n\
  \n对数概率比可以重写为：\n\n```\n\\displaystyle \\begin{aligned} \\frac{\\pi'(a|s)}{\\pi(a|s)}\
  \ = \\exp(\\log \\pi'(a|s) - \\log \\pi(a|s)) \\end{aligned}\n```\n\n(11.18)\n\n\
  然后，PPO 执行 `M` 个 epoch 的参数更新，每次更新重用相同的转移序列；因此，它实现了更好的数据效率。在每次更新期间，策略参数被优化以最大化裁剪代理目标函数，而状态价值函数的参数被优化以最小化平方误差。裁剪\
  \ epsilon `epsilon` 是一个超参数，用于控制概率比被裁剪的程度，以防止策略更新过大。`epsilon` 的常见值是 0.1 或 0.2。通过裁剪概率比，PPO\
  \ 可以防止可能破坏训练过程稳定性的过大策略更新。\n\n**算法 1：使用裁剪代理目标的近端策略优化算法**\n\n一个方框列出了算法 1（使用裁剪代理目标的近端策略优化算法）的输入、初始化和输出细节。该算法的步骤\
  \ 1 到 9 被提及。\n\n在算法 1 中，更新是针对序列中的所有转移一次性完成的。然而，在实践中，一次使用一小批转移进行更新效率更高。这是因为计算资源限制，例如\
  \ GPU 内存有限，有时很难一次性处理所有转移。\n\n此外，PPO 还可以在裁剪代理策略梯度目标函数中包含一个熵项。这可以通过鼓励策略选择具有更多不确定性的动作来促进探索。此外，PPO\
  \ 可以在训练过程中衰减裁剪 epsilon `epsilon`。例如，一种常见的策略是使用 0.2 作为 `epsilon` 的初始值，然后将其衰减到某个固定的较小值，例如在训练过程中线性退火到\
  \ 0.02。这是因为当智能体开始训练时，它可能会随机执行动作，因此使用更大的参数更新信任区域是必要的。然而，随着智能体进步并变得更加自信，较小的信任区域更可取，以防止可能破坏已学习策略的过大策略更新。\n\
  \n\n\n#### 自适应 KL 惩罚\n\n自适应 KL 惩罚是近端策略优化（PPO）算法的一种变体，旨在防止可能导致不稳定的过大策略更新。在标准的裁剪版\
  \ PPO 中，新旧策略之间的概率比被裁剪在特定范围内。这种方法约束了替代目标函数，其效果与将 KL 散度作为约束条件相同。\n\n相比之下，自适应 KL 散度惩罚方法提出将\
  \ KL 散度作为惩罚项添加到替代目标函数中，而不是将其用作约束条件。此外，自适应 KL 散度惩罚会根据策略更新的幅度来调整惩罚力度。\n\n将 KL 散度作为惩罚项的替代目标函数可以写为：\n\
  \n![$$\\displaystyle \\begin{aligned} \\mathop{\\text{argmax}}_{\\pi'}\\mathcal{L}_{\\\
  pi}(\\pi') - \\beta \\bar{D}_{KL}(\\pi'||\\pi) \\end{aligned} $$](img/605748_1_En_11_Chapter_TeX_Equ20.png)\n\
  \n(11.19) 其中 ![$$\\beta $$](img/605748_1_En_11_Chapter_TeX_IEq151.png) 控制惩罚的强度，而\
  \ ![$$\\bar {D}_{KL}(\\pi '||\\pi )$$](img/605748_1_En_11_Chapter_TeX_IEq152.png)\
  \ 是新旧策略之间估计的平均 KL 散度。\n\n与裁剪版本不同，KL 散度在此不作为替代目标函数的约束条件。相反，它被用作由参数 ![$$\\beta $$](img/605748_1_En_11_Chapter_TeX_IEq153.png)\
  \ 控制的惩罚项。如果 KL 散度很高，惩罚项也会很高。这里，![$$\\beta $$](img/605748_1_En_11_Chapter_TeX_IEq154.png)\
  \ 在学习过程中的每次迭代都会进行调整，使其成为一种自适应 KL 惩罚。此外，还可以使用目标 KL 散度 ![$$\\delta $$](img/605748_1_En_11_Chapter_TeX_IEq155.png)\
  \ 来调整 ![$$\\beta $$](img/605748_1_En_11_Chapter_TeX_IEq156.png)。\n\n为了估计新策略与旧策略之间的平均\
  \ KL 散度，我们使用了一种近似方法。这种近似是必要的，因为由于某些环境的状态空间很大，计算精确的 KL 散度通常是不可行的。目标 KL 散度 ![$$\\\
  delta $$](img/605748_1_En_11_Chapter_TeX_IEq157.png) 可用于调整 ![$$\\beta $$](img/605748_1_En_11_Chapter_TeX_IEq158.png)\
  \ 参数，使其成为自适应 KL 惩罚。\n\n算法 2 展示了采用自适应 KL 散度惩罚的 PPO 算法的伪代码：\n\n**算法 2：** 具有自适应 KL\
  \ 惩罚的近端策略优化算法\n\n![](img/605748_1_En_11_Figaab_HTML.gif) 一个方框列出了算法 2，即具有自适应 KL 惩罚的近端策略优化算法。输入包括折扣率\
  \ `gamma`、学习率 `alpha` 和 `beta`、序列长度、散度 `delta`、更新轮数 `M`、环境步数 `K`。输出是近似最优策略 `Pi`\
  \ 下标 `theta`。\n\n虽然 PPO 的两种版本都能很好地工作，但在实践中，由于裁剪替代目标函数更简单、更稳定，因此通常更受青睐。\n\n简单性指的是，与\
  \ KL 惩罚版本相比，裁剪替代目标函数更容易实现和调参。KL 惩罚版本需要为惩罚项调整一个额外的超参数，这可能既耗时又难以优化。\n\n稳定性提升指的是，与\
  \ KL 惩罚版本相比，裁剪替代目标函数在训练过程中更不容易出现不稳定或发散的情况。KL 惩罚版本对惩罚系数的选择更为敏感，当系数设置不正确时，可能导致训练不稳定。裁剪替代目标函数直接限制了策略更新的幅度，防止了可能破坏训练稳定性的过大变化。\n\
  \n总之，虽然 PPO 替代目标函数的两种版本都可能有效，但在实践中，由于裁剪替代目标函数更简单、更稳定，因此通常更受青睐。\n\n图 11.2 展示了在 Atari\
