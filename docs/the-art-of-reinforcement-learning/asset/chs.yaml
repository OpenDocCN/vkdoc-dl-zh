  \ pie = -2.94` 指向外部。外部通过 `r = 0` 返回房间 2。外部通过 `r = -1` 自循环。\n\n**图 5.6** Q-learning\
  \ 如何为服务犬 MDP 计算状态-动作值的示例。状态*房间 2*中各动作的值取自图 5.2。\n\n假设智能体在状态*房间 1*时采取了动作*前往房间 2*，并从环境中获得了奖励信号\
  \ `-1` 和后续状态*房间 2*。我们使用以下变量和参数：\n\n- `Q(s, a)`：状态-动作对 `(s, a)` 的值\n- `α = 0.1`：步长\n\
  - `γ = 0.9`：折扣因子\n\n状态*房间 2*中动作*前往房间 1*、*前往房间 3*、*前往外部*的估计状态-动作值分别为 `-4.32`、`1.98`、`-2.94`。状态-动作对*房间\
