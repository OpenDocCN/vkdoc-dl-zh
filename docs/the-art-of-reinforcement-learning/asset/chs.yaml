  \ `V[π]`。待评估的策略 `π`、折扣率 `γ` 以及幕数 `K`。\n\n表 4.2 展示了分别使用首次访问蒙特卡洛策略评估和首次访问蒙特卡洛策略评估（含增量更新方法）计算出的状态价值，两者均针对服务犬\
