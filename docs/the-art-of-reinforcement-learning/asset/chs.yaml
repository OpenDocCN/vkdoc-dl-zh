  \ 计算出的真实值 `-1.85`。同样的过程可以应用于状态 *房间 3*，我们得到价值 `-3.65 * 0.5 + 10 * 0.5 = 3.175`，这非常接近真实值\
  \ `3.17`。\n\n\n\n### 4.3 探索与利用\n\n在强化学习中，当智能体必须在执行已知的有利动作（利用）与尝试未执行过的动作以期望发现更优动作（探索）之间做出决策时，便产生了探索与利用的权衡问题。其目标是在利用已知动作的收益与探索新选项的潜在回报之间取得平衡。\n\
  \n例如，考虑一局国际象棋。一个下棋智能体必须探索新走法以提高获胜几率。但同时，它也必须利用已学会的策略来最大化成功概率。这种平衡对智能体的整体性能至关重要，因为仅仅重复相同走法无法获胜，而完全随机走棋同样无法取胜。\n\
  \n另一个例子是基于用户过往行为推荐产品或服务的推荐系统。该系统必须在利用已知的用户偏好与探索用户可能喜欢的新产品之间取得平衡。如果系统只推荐用户已购买或浏览过的产品，就可能错失推荐用户可能感兴趣的新颖产品的机会。\n\
  \n在依赖价值函数的无模型强化学习方法（如蒙特卡洛方法）中，探索与利用的权衡尤为重要。智能体必须通过在不同状态下执行动作所获得的奖励来学习每个动作的价值。然而，它也需要探索新动作，以发现是否存在更优的动作。\n\
  \n相比之下，在动态规划中，智能体假设可以访问环境模型（即动力学函数和奖励函数），因此在更新价值函数时能够考虑所有可能的结果。这使得动态规划能够避免探索与利用的权衡问题。\n\
  \n为了更好地理解探索与利用的问题，我们来看一下价值函数 `V_π` 的贝尔曼方程，如公式 (4.6) 所示：\n\n```\nV_π(s) = E_π[ R_t\
  \ + γ V_π(S_{t+1}) | S_t = s ]\n       = Σ_{a ∈ A} π(a|s) [ R(s, a) + γ Σ_{s' ∈\
  \ S} P(s'|s, a) V_π(s') ], 对于所有 s ∈ S\n```\n\n(4.6)\n\n贝尔曼方程展示了状态的价值如何与其后续状态的价值相关联，并通过转移到这些状态的概率以及在这些状态中获得的奖励进行加权。在动态规划中，假设智能体可以访问环境模型，该方程可用于计算每个状态的价值。\n\
  \n以下是一个通过动态规划策略改进，利用估计的状态价值函数计算状态-动作价值函数的三行代码。\n\n相比之下，在无模型强化学习中，智能体必须通过对环境进行采样来估计价值函数，这在探索新动作时可能很困难。例如，想象一个试图学习走路的机器人。如果它总是选择相同的动作，可能无法发现最佳的走路方式，因为它没有充分探索状态空间。另一方面，如果它总是采取随机动作，可能永远无法取得进展，因为它没有利用已获得的知识。\n\
  \n为了解决这个问题，研究者提出了多种探索策略，例如 `ε`-贪心策略，智能体以概率 `ε` 采取随机动作，否则以概率 `1 - ε` 采取已知的最佳动作。其他策略包括上置信界算法、汤普森采样也可用于解决该问题。这些策略旨在通过鼓励智能体尝试新动作，同时利用已获得的知识，来平衡探索与利用。\n\
  \n总之，探索与利用是强化学习中的一个基本挑战，在依赖价值函数的无模型方法中尤为重要。动态规划可以通过假设能访问环境模型来避免这一挑战，但在实践中这并非总是可行。研究者已提出多种探索策略来解决该问题，但寻找探索与利用之间的最优平衡仍是强化学习中一个活跃的研究领域。\n\
  \n\n\n#### 使用 ε-贪心策略进行探索\n\n强化学习中的一个基本挑战是找到探索与利用之间的平衡。探索是指尝试新动作以了解更多环境信息的过程，而利用则是利用当前知识在每个状态下采取最佳可能动作。ε-贪心策略是一种简单有效的方法，既能鼓励探索，又能同时利用当前知识。\n\
  \nε-贪心策略的工作原理是：以概率 ε 选择一个随机动作，以概率 1 - ε 根据当前状态-动作价值函数选择已知的最佳动作。参数 ε 控制探索程度，取值范围为\
  \ 0 ≤ ε ≤ 1。当 ε 较高时，智能体更倾向于通过随机动作探索环境。随着 ε 降低，智能体将更多地依赖当前知识，更频繁地选择已知的最佳动作。这种从探索到利用的渐进转变，通常是智能体在强化学习任务中取得良好性能的必要条件。\n\
  \n形式上，ε-贪心策略定义为\n\n```\nπ(a|s) = \n  情况 1 - ε + ε/|A(s)|   如果 a = argmax_a Q_π(s,\
  \ a)\n  情况 ε/|A(s)|           如果 a ≠ argmax_a Q_π(s, a)\n```\n\n其中 `Q(s, a)` 是状态-动作价值函数，`|A(s)|`\
  \ 是状态 s 下的合法动作数量。该策略以概率 1 - ε + ε/|A(s)| 选择已知最佳动作，以概率 ε/|A(s)| 选择随机动作。\n\n例如，假设我们正在训练一个智能体玩一个简单的游戏，它需要穿越迷宫到达目标。训练开始时，智能体对环境一无所知，因此需要探索以了解迷宫布局和不同动作的效果。我们可以将\
  \ ε 设置为 0.9 这样的高值，以便智能体更频繁地探索。随着智能体对迷宫了解更多，对状态-动作价值的估计更加准确，我们可以逐渐降低 ε，以鼓励更多地利用当前知识。\n\
  \n安排 ε 衰减的常见方法是使用随时间递减的函数。例如，我们可以使用线性调度，从较高的 ε 值开始，每经过一定数量的回合或时间步，将其减少固定量，直到达到最小值。或者，我们也可以使用指数衰减调度，每经过一个回合或时间步，将\
  \ ε 乘以一个衰减因子。\n\n总之，ε-贪心策略是一种简单而有效的方法，用于在强化学习中平衡探索与利用。参数 ε 使我们能够控制探索程度，并且随着智能体对环境知识的增加，我们可以随时间逐渐降低它。衰减调度和\
  \ ε 最小值的选择取决于具体应用，可能需要通过一些试错来找到最优值。\n\n\n\n### 4.4 蒙特卡洛控制（策略改进）\n\n现在，我们准备开始使用蒙特卡洛方法进行策略改进。在动态规划（DP）中，策略改进算法包含两个步骤。第一步是利用估计的状态价值函数\
  \ `V_π` 和环境模型来计算状态-动作价值函数 `Q_π`。第二步是基于 `Q_π` 计算出一个更优的确定性策略 `π'`。\n\n在蒙特卡洛策略评估中，我们可以直接估计状态-动作价值函数\
  \ `Q_π`，而无需先估计状态价值函数。算法 4 展示了这一过程。该算法通过模拟与环境的完整情节交互来工作，其中情节是从初始状态开始到终止状态结束的一系列状态-动作-奖励转换序列。我们使用首次访问法来估计\
  \ `Q_π`，这意味着在计算平均回报时，我们只考虑每个情节中状态-动作对的首次出现。这确保了估计是无偏的。\n\n利用 `Q_π` 的估计值，我们可以计算出一个更优的策略\
  \ `π'`。一种方法是使用 `ε`-贪心策略，这是一种在学习过程中平衡探索与利用的方法。`ε`-贪心策略以概率 `1-ε` 选择具有最高估计状态-动作价值的动作，并以概率\
  \ `ε` 随机选择一个动作。`ε` 的值决定了探索的程度；`ε` 值越大，探索越多。\n\n蒙特卡洛策略改进的 `ε`-贪心策略工作方式如下：对于每个状态，我们以概率\
  \ `1-ε` 选择具有最高估计状态-动作价值的动作，并以概率 `ε/K` 随机选择一个动作，其中 `K` 是该状态下可用的动作数量。这确保了每个动作被选中的概率非零，这对于收敛到最优策略是必要的。然后，新策略\
  \ `π'` 被计算为相对于 `Q_π` 的贪心策略，即对于每个状态，我们选择具有最高估计状态-动作价值的动作。\n\n**算法 5：蒙特卡洛策略改进示例，采用\
  \ `ε`-贪心探索**\n\n![](img/605748_1_En_4_Figaaf_HTML.gif) 一个 7 行算法，标题为蒙特卡洛策略改进示例，接收以下输入，输出一个改进后的策略。针对策略\
  \ `π` 的估计状态-动作价值函数 `Q_π` 和探索率 `ε`。\n\n总之，蒙特卡洛策略改进允许我们直接估计状态-动作价值函数 `Q_π`，并利用它来改进策略，而无需像动态规划那样先估计状态价值函数。通过使用\
  \ `ε`-贪心策略进行探索，我们可以在学习过程中平衡探索与利用，并收敛到最优策略。\n\n我们将第 3 章中介绍的一般策略迭代模板应用于蒙特卡洛控制，即通过学习价值函数来找到最优策略。但我们需要做一些修改。第一个修改是，在蒙特卡洛策略评估期间，我们需要估计策略\
  \ `π` 的状态-动作价值函数 `Q_π`，而不是 `V_π`。第二个修改是何时停止运行算法。与动态规划一样，当上一轮迭代的策略与当前迭代的策略相同时，即表示无法再改进，我们就停止。但在蒙特卡洛中，整个策略评估过程基于样本情节的数量，因此我们通常根据希望智能体收集的样本情节数量来定义停止条件。最后一个可选的修改是，由于我们现在使用\
  \ `ε`-贪心策略进行探索，我们可能希望降低探索率 `ε`，例如在每次迭代之后。\n\n我们现在介绍采用增量更新方法的首次访问蒙特卡洛控制算法，如算法 6 所示。我们只需在策略评估过程中移除条件检查，即可轻松将其扩展到每次访问的情况。\n\
  \n**算法 6：采用增量更新和 `ε`-贪心探索的首次访问蒙特卡洛控制**\n\n![](img/605748_1_En_4_Figaag_HTML.gif)\
