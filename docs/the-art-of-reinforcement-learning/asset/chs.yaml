- "# 2. 马尔可夫决策过程\n\n马尔可夫决策过程为处理强化学习中的序列决策问题提供了一个强大的框架。其应用涵盖机器人学、金融和最优控制等多个领域。\n\n\
  在本章中，我们概述了马尔可夫决策过程的关键组成部分，并演示了如何使用马尔可夫决策过程框架来表述一个基本的强化学习问题。我们深入探讨了策略和价值函数的概念，研究了贝尔曼方程，并说明了如何利用它们来更新状态或状态-动作对的价值。我们只关注有限马尔可夫决策过程，即状态空间和动作空间都是有限的情况。虽然我们主要假设一个确定性的问题设定，但我们也会讨论适用于随机问题的数学方面。\n\
  \n如果要选择整本书中最重要的一章，那么这一章无疑会排在我们列表的首位。其概念和数学方程至关重要，以至于在整本书中都会不断地被引用和使用。\n\n\n\n###\
  \ 2.1 马尔可夫决策过程概述\n\n从高层次来看，马尔可夫决策过程（MDP）是一个用于在不确定性下对序贯决策问题进行建模的数学框架。其主要思想是用状态、动作、转移模型和奖励函数来表示问题，然后利用这种表示来寻找一个最优策略，该策略能最大化随时间累积的期望总奖励。\n\
  \n更具体地说，一个 MDP 包含以下组成部分：\n\n- **状态**（`S`）：智能体可能处于的所有环境配置或观测结果的集合。例如，在国际象棋游戏中，状态可能是当前的棋盘布局；而在金融投资组合管理问题中，状态可能是各种股票的当前价格。状态的其他示例包括机器人的位置和速度、车辆的位置和方向，或供应链中的库存量。\n\
  \n- **动作**（`A`）：智能体可以采取的所有可能动作的集合。在国际象棋游戏中，这可能包括移动棋子；而在金融投资组合管理问题中，这可能包括买入或卖出某只特定股票。动作的其他示例包括加速或减速机器人、转动车辆，或补充供应链中的库存。\n\
  \n- **转移模型或动力学函数**（`P`）：一个函数，定义了在给定当前状态`s`和所采取的动作`a`的情况下，转移到新状态`s'`的概率。换句话说，它模拟了环境如何响应智能体的动作。例如，在国际象棋游戏中，转移模型可能由游戏规则和玩家的走法决定。在金融问题中，转移模型可能是股票价格波动的结果。转移模型的其他示例包括机器人运动的物理规律、车辆运动的动力学，或供应链中的供需动态。\n\
  \n- **奖励函数**（`R`）：一个函数，指定了在给定状态下采取某个动作所获得的奖励或付出的代价。换句话说，它模拟了智能体任务的目标。例如，在国际象棋游戏中，奖励函数可能为获胜赋予正值，为失败赋予负值；而在金融问题中，奖励函数可能基于最大化利润或最小化风险。奖励函数的其他示例包括机器人运动的能效、车辆运动的燃油效率，或供应链的利润率。\n\
  \n#### 为什么 MDP 有用？\n\nMDP 为决策问题建模提供了一个强大的框架，因为它们允许我们使用数学概念来模拟现实世界的问题。例如，MDP 可用于：\n\
  \n- 对机器人导航问题进行建模，其中机器人必须决定采取哪些动作才能到达特定目标并避开障碍物。例如，状态可能包括其当前位置和环境中的障碍物，动作可能包括向不同方向移动。转移模型可由机器人运动的物理规律决定，奖励函数可基于尽快到达目标同时避免与障碍物碰撞。\n\
  \n- 优化投资组合管理策略，其中智能体必须决定买入或卖出哪些股票，以在最小化风险的同时最大化利润。例如，状态可能包括不同股票的当前价格和智能体的投资组合持有量，动作可能包括买入或卖出股票。转移模型可能是股票价格波动的结果，奖励函数可基于智能体的利润或风险调整后的收益。\n\
  \n- 设计个性化推荐系统，其中智能体必须根据用户过去的行为决定向特定用户推荐哪些物品。例如，状态可能包括用户过去的购买记录和智能体当前的推荐内容，动作可能包括推荐不同的物品。转移模型可能是用户对推荐的反应，奖励函数可基于用户对推荐物品的喜爱程度或是否进行了购买。\n\
  \n- 解决各个领域的许多其他决策问题，例如交通控制、资源分配和游戏博弈。在每种情况下，MDP 框架都提供了一种方法，用状态、动作、转移概率和奖励来对问题进行建模，然后通过寻找一个能最大化随时间累积的期望总奖励的策略来求解。\n\
  \n我们使用 MDP 对问题进行建模的目标，最终是为了求解 MDP 问题。要求解一个 MDP，我们必须找到一个策略`π`，该策略将状态映射到动作，从而最大化随时间累积的期望总奖励。换句话说，该策略告诉智能体在每个状态下应采取什么动作来实现其目标。寻找最优策略的一种方法是使用值迭代算法或策略迭代算法，这些算法基于贝尔曼方程迭代更新状态（或状态-动作对）的值，直到找到最优策略。这些基本概念将在本章及后续章节中探讨。\n\
  \n总之，MDP 为在各个领域对决策问题进行建模提供了一种灵活而强大的方式。通过将问题表述为 MDP，我们可以利用数学概念来分析问题，并找到一个能最大化随时间累积的期望总奖励的最优策略。MDP\
  \ 的关键组成部分是状态、动作、动力学函数和奖励函数，它们可以根据具体问题进行定制。\n\n\n\n### 2.2 使用 MDP 建模强化学习问题\n\n马尔可夫决策过程（MDP）以对研究强化学习有用的方式，对状态、动作和奖励的序列进行建模。例如，一个在迷宫中导航的机器人可以被建模为一个\
  \ MDP，其中状态表示机器人在迷宫中的位置，动作表示机器人的移动选择，奖励表示机器人向目标前进的进度。\n\n在此背景下，我们使用下标 `t` 来索引过程的不同阶段（即序列的时间步），其中\
  \ `t` 可以是任何离散值，例如 `t = 0, 1, 2, ...`。请注意，时间步并非像秒或分钟那样的常规时间间隔，而是指过程的不同阶段。例如，在本书中，`S_t`、`A_t`\
  \ 和 `R_t` 通常表示当前时间步 `t`（或过程的当前阶段）的状态、动作和奖励。\n\n值得注意的是，智能体在观察到环境状态 `S_t` 后，可能需要花费相当长的时间才能决定采取动作\
  \ `A_t`。只要智能体不违反环境规则，它就可以按照自己的节奏灵活地采取行动。因此，常规的时间间隔在这种情况下并不适用。\n\n在本书中，我们采用了艾玛·布伦希尔教授在其出色的强化学习课程[1]中所使用的数学符号。我们通常假设奖励仅取决于状态\
  \ `S_t` 和智能体采取的动作 `A_t`。为简单起见，我们对奖励使用相同的索引 `t`，表示为 `R_t = R(S_t, A_t)`，而有些人可能更倾向于使用\
  \ `R_{t+1} = R(S_t, A_t, S_{t+1})` 而不是 `R_t`，以强调奖励也取决于后续状态 `S_{t+1}`，正如萨顿和巴托在他们的书中所讨论的那样。³\
  \ 然而，这种替代表达有时会导致混淆，尤其是在像本书中介绍的这种简单情况下，奖励并不依赖于后续状态。\n\n重要的是要记住，在实际实现中，奖励通常会在一个时间步之后与后续状态一起被接收，如图\
  \ 2.1 所示。\n\n我们在 `S_t`、`A_t`、`R_t` 中使用大写字母，因为这些是随机变量，并且这些随机变量的实际结果可能会有所不同。当我们谈论这些随机变量的具体结果时，我们通常使用小写字母\
  \ `s`、`a`、`r`。\n\n综上所述，状态空间、动作空间、转移模型和奖励函数共同提供了对环境以及智能体与其交互的完整描述。在接下来的章节中，我们将探讨这些元素如何相互作用，从而为解决强化学习问题奠定基础。\n\
  \n为了更好地理解智能体与环境之间的交互，我们可以将交互循环展开如下，如图 2.2 所示：\n\n- 智能体从环境中观察状态 `S_0`。\n- 智能体在环境中采取动作\
  \ `A_0`。\n- 环境转移到一个新状态 `S_1`，并产生一个奖励信号 `R_0`，其中 `R_0` 以 `S_0` 和 `A_0` 为条件。\n- 智能体从环境中接收奖励\
  \ `R_0` 以及后续状态 `S_1`。\n- 智能体决定采取动作 `A_1`。\n- 交互继续进入下一阶段，直到过程达到终止状态 `S_T`。一旦达到终止状态，不再采取进一步动作，并且可以从初始状态\
  \ `S_0` 开始一个新的回合。\n\n![](img/605748_1_En_2_Fig2_HTML.png)\n\n展开的智能体-环境迭代循环的状态转移图。状态\
  \ S 0 通过动作 A 0 导致状态 S 1。状态 S 1 具有奖励 R 0，并进而导致后续状态，最终以状态 S T 和奖励 R T 减 1 结束。\n\n\
  图 2.2 针对回合制问题按时间展开的智能体-环境迭代循环示例\n\n![](img/605748_1_En_2_Fig1_HTML.png)\n\n智能体-环境交互的循环图。标有“动作”的箭头从智能体指向环境。标有“观察和奖励”的箭头从环境指向智能体。\n\
  \n图 2.1 智能体-环境交互\n\n当智能体观察到第一个环境状态 `S_0` 时没有奖励，这是因为智能体尚未与环境进行交互。如前所述，在本书中，我们假设奖励函数\
  \ `R_t = R(S_t, A_t)` 以环境的当前状态 `S_t` 和智能体采取的动作 `A_t` 为条件。由于在状态 `S_0` 中没有采取任何动作，因此没有与初始状态相关的奖励信号。然而，在实践中，有时为了方便，可以包含一个“虚假的”初始奖励，例如使用\
  \ 0，以简化代码。\n\n总之，MDP 为建模强化学习问题提供了一个框架，其中智能体通过基于当前状态采取动作与环境交互，并接收以当前状态和动作为条件的奖励。通过理解智能体与环境之间的交互，我们可以开发出能够学习做出良好决策并随时间推移最大化累积奖励的算法。\n\
  \n\n\n#### 马尔可夫性质\n\n并非所有问题都能用 MDP 框架建模。**马尔可夫性质**是 MDP 框架适用必须满足的关键假设。该性质指出，系统的未来状态在给定当前状态的情况下与过去状态无关。更具体地说，后继状态`S_{t+1}`仅取决于当前状态`S_t`和动作`A_t`，而不取决于任何先前的状态或动作。\n\
  \n换句话说，马尔可夫性质是对环境状态的一种限制，该状态必须包含足够的历史信息以预测未来状态。具体而言，当前状态必须包含足够的信息来预测下一个状态，而无需了解过去状态和动作的完整历史。\n\
  \n```\nP(S_{t+1} | S_t, A_t) = P(S_{t+1} | S_t, A_t, S_{t-1}, A_{t-1}, ..., S_1,\
  \ A_1, S_0, A_0)\n```\n\n(2.1)\n\n例如，一个试图在房间内导航的机器人，只有在满足马尔可夫性质时才能使用 MDP 框架建模。如果机器人的移动取决于其完整历史（包括其过去的位置和动作），那么马尔可夫性质将被违反，MDP\
  \ 框架将不再适用。这是因为机器人的当前位置将不包含足够的信息来预测其下一个位置，从而难以对环境进行建模并基于该模型做出决策。\n\n#### 服务犬示例\n\n\
  在此示例中，我们设想训练一只服务犬为主人取回物品。训练在一栋有三个房间的房屋内进行，其中一个房间内放有个人物品，狗必须取回该物品并交给主人或训练员。该任务属于**情节式强化学习**问题类别，因为一旦狗取回物品，任务即被视为完成。为简化任务，我们始终将物品放置在相同（或几乎相同）的位置，并随机初始化起始状态。此外，其中一个房间通向可以自由玩耍的前院。此场景如图\
  \ 2.3 所示。\n\n在本书中，我们将使用这个服务犬示例来演示如何将强化学习问题建模为 MDP（马尔可夫决策过程），解释环境的动态函数，并构建策略。随后，我们将介绍具体的算法，如动态规划、蒙特卡洛方法和时序差分方法，来解决服务犬的强化学习问题。\n\
  \n### 2.3 马尔可夫过程或马尔可夫链\n\n在开始讨论马尔可夫决策过程（MDP）之前，我们首先定义什么是马尔可夫过程（马尔可夫链）。马尔可夫过程是一种无记忆的随机过程，其中转移到新状态的概率仅取决于当前状态，而不取决于任何过去的状态或动作。它是\
  \ MDP 中最简单的研究情况，因为它只涉及一系列状态，不包含任何奖励或动作。尽管看似基础，但研究马尔可夫链非常重要，因为它们提供了关于序列中状态如何相互影响的基本见解。这种理解在处理更复杂的\
  \ MDP 时会很有帮助。\n\n一个房屋平面布局图，包含相邻的房间 1、2 和 3。目标位于房间 3 内。房间 2 有一扇门通向一个标有“室外”的阴影不规则区域。\n\
  \n**图 2.3** 用于说明服务犬示例的简单示意图\n\n马尔可夫链可以定义为一个元组`(S, P)`，其中`S`是一个有限的状态集合，称为状态空间；`P`是环境的动态函数（或转移模型），它指定了从当前状态`s`转移到后继状态`s'`的概率。由于马尔可夫链中没有动作，我们在动态函数`P`中省略了动作。从状态`s`转移到状态`s'`的概率记为`P(s'|s)`。\n\
  \n例如，我们可以用图来建模一个马尔可夫链，其中每个节点代表一个状态，每条边代表从一个状态到另一个状态的可能转移，每条边都关联一个转移概率。这有助于我们理解序列中的状态如何相互影响。我们将服务犬示例建模为马尔可夫链，如图\
  \ 2.4 所示。空心圆代表非终止状态，方框代表终止状态。直线和曲线代表从当前状态`s`到其后继状态`s'`的转移，每条可能的转移都关联一个转移概率`P(s'|s)`。例如，如果智能体当前处于*房间\
  \ 1*状态，则环境有 0.8 的概率转移到后继状态*房间 2*，有 0.2 的概率停留在同一状态*房间 1*。请注意，这些概率是随机选择的，用以说明环境动态函数的概念。\n\
  \n\n\n#### 马尔可夫链的转移矩阵\n\n转移矩阵 `P` 是表示马尔可夫链动力学函数（或转移模型）的一种便捷方式。它将所有可能的状态转移列在一个矩阵中，其中每一行代表当前状态\
  \ `s`，每一列代表后继状态 `s'`。从状态 `s` 转移到状态 `s'` 的转移概率记为 `P(s'|s)`。由于我们讨论的是概率，因此每一行的总和始终等于\
  \ 1.0。下面，我们列出服务犬马尔可夫链的转移矩阵：\n\n![](img/605748_1_En_2_Figa_HTML.png)\n\n服务犬马尔可夫链的转移矩阵。房间\
  \ 1、房间 2、房间 3、室外、找到物品和结束对应的列和行表示状态。\n\n![](img/605748_1_En_2_Fig4_HTML.png)\n\n\
  服务犬马尔可夫链的转移图。房间 1 通向房间 2，接着是房间 3 和找到物品，箭头分别对应 `p` 等于 0.8、`p` 等于 0.4 和 `p` 等于 0.8。室外通过\
  \ `p` 等于 0.4 和 0.2 连接到房间 2。找到物品通过 `p` 等于 1.0 通向结束。\n\n**图 2.4** 服务犬马尔可夫链\n\n有了环境的动力学函数，我们可以从环境中采样一些状态转移序列\
  \ `S0, S1, S2, ...`。例如：\n\n- 片段 1：（房间 1，房间 2，房间 3，找到物品，结束）\n- 片段 2：（房间 3，找到物品，结束）\n\
  - 片段 3：（房间 2，室外，房间 2，房间 3，找到物品，结束）\n- 片段 4：（室外，室外，室外，……）\n\n我们现在对环境中的状态转移有了基本了解；接下来，让我们在过程中加入奖励。\n\
  \n### 2.4 马尔可夫奖励过程\n\n如前所述，强化学习智能体的目标是最大化奖励，因此下一步自然是在马尔可夫链过程中加入奖励。马尔可夫奖励过程（MRP）是马尔可夫链的扩展，其中在过程中加入了奖励。在马尔可夫奖励过程中，智能体不仅观察状态转移，还会在此过程中接收奖励信号。注意，MRP\
  \ 中仍然不涉及动作。我们可以将马尔可夫奖励过程定义为一个元组 `(S, P, R)`，其中：\n\n- `S` 是一个有限的状态集合，称为状态空间。\n- `P`\
  \ 是环境的动力学函数（或转移模型），其中 `P(s'|s) = P[S_{t+1}=s' | S_t=s]` 指定了在当前状态 `s` 下，环境转移到后继状态\
  \ `s'` 的概率。\n- `R` 是环境的奖励函数。`R(s) = E[R_t | S_t=s]` 是当智能体处于状态 `s` 时，环境提供的奖励信号。\n\
  \n如图 2.5 所示，我们在服务犬示例中为每个状态添加了一个奖励信号。正如我们在第 1 章中简要讨论过的，我们希望奖励信号与我们的目标（即找到物品）一致，因此我们决定对*找到物品*状态使用最高的奖励信号。对于*室外*状态，奖励信号为\
  \ +1，因为与在不同房间之间徘徊相比，在室外玩耍可能对智能体来说更愉快。\n\n![](img/605748_1_En_2_Fig5_HTML.png)\n\n\
  带有奖励信号的服务犬 MRP 转移图。房间 1 通向房间 2，接着是房间 3（`r` 等于 -1）和找到物品（`r` 等于 +10），通过标记为 `p` 等于\
  \ 0.8、`p` 等于 0.4 和 `p` 等于 0.8 的箭头。室外具有 `r` 等于 +1，结束具有 `r` 等于 0。\n\n**图 2.5** 服务犬\
  \ MRP\n\n有了奖励信号，我们可以计算智能体在这些不同样本序列中可能获得的总奖励，其中总奖励是针对整个序列计算的：\n\n- 片段 1：（房间 1，房间\
  \ 2，房间 3，找到物品，结束）\n  - **总奖励** `= -1 - 1 - 1 + 10 + 0 = 7.0`\n- 片段 2：（房间 3，找到物品，结束）\n\
  \  - **总奖励** `= -1 + 10 = 9.0`\n- 片段 3：（房间 2，室外，房间 2，房间 3，找到物品，结束）\n  - **总奖励**\
  \ `= -1 + 1 - 1 - 1 + 10 + 0 = 8.0`\n- 片段 4：（室外，室外，室外，……）\n  - **总奖励** `= 1 + 1\
  \ + ... = ∞`\n\n\n\n#### 回报\n\n为了量化智能体在一系列状态中能获得的总奖励，我们使用一个不同的术语——*回报*。回报 `G_t`\
  \ 就是从时间步 `t` 到序列结束时的奖励总和，其数学定义如公式 (2.2) 所示，其中 `T` 是情节式强化学习问题的终止时间步。\n\n```\nG_t\
  \ = R_t + R_{t+1} + R_{t+2} + ... + R_{T-1}\n```\n\n(2.2)\n\n公式 (2.2) 的一个问题是，当过程中存在递归或循环时（例如我们示例序列中的情节\
  \ 4），回报 `G_t` 可能会变成无穷大。对于持续式强化学习问题（任务没有自然终点），回报 `G_t` 也很容易变成无穷大。为了解决这个问题，我们引入了折扣因子。\n\
  \n折扣因子 `γ` 是一个参数，满足 `0 ≤ γ ≤ 1`，它帮助我们解决无限回报问题。通过对未来时间步收到的奖励进行折扣，我们可以避免回报变成无穷大。当我们将折扣因子加入公式\
  \ (2.2) 的常规回报中时，回报就变成了从时间步 `t` 到某个视界 `H` 的*折扣奖励总和*，其中 `H` 可以是情节的长度，对于持续式强化学习问题甚至可以是无穷大。在本书的剩余部分，我们将使用公式\
  \ (2.3) 作为回报的定义。请注意，我们省略了即时奖励 `R_t` 的折扣 `γ`，因为 `γ⁰ = 1`。\n\n```\nG_t = R_t + γ R_{t+1}\
  \ + γ² R_{t+2} + ... + γ^{H-1-t} R_{H-1}\n```\n\n(2.3)\n\n我们想强调的是，折扣因子 `γ` 不仅帮助我们解决无限回报问题，还能影响智能体的行为（当我们稍后讨论价值函数和策略时，这一点会更清楚）。例如，当\
  \ `γ = 0` 时，智能体只关心即时奖励；而当 `γ` 接近 1 时，未来奖励与即时奖励变得同等重要。虽然存在不使用折扣的方法，但这些方法的数学复杂性超出了本书的范围。\n\
  \n强化学习中回报 `G_t` 有一个有用的性质：回报 `G_t` 等于即时奖励 `R_t` 与下一时间步的折扣回报 `γ G_{t+1}` 之和。我们可以将其递归地重写，如公式\
  \ (2.4) 所示。这个递归性质在 MRP、MDP 和强化学习中非常重要，因为它构成了一系列关键数学方程和算法的基础，我们将在本章及后续几章中介绍这些内容。\n\
  \n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2} + γ³ R_{t+3} + ...\n    = R_t + γ (R_{t+1}\
  \ + γ R_{t+2} + γ² R_{t+3} + ...)\n    = R_t + γ G_{t+1}\n```\n\n(2.4)\n\n我们可以计算特定\
  \ MRP 甚至 MDP 的示例序列的回报 `G_t`。以下展示了我们服务犬示例中一些样本情节的回报，其中我们使用折扣因子 `γ = 0.9`：\n\n- 情节\
  \ 1：（房间 1，房间 2，房间 3，找到物品，结束）\n  - `G_0 = -1 -1 * 0.9 -1 * 0.9² + 10 * 0.9³ = 4.6`\n\
  - 情节 2：（房间 3，找到物品，结束）\n  - `G_0 = -1 + 10 * 0.9 = 8.0`\n- 情节 3：（房间 2，室外，房间 2，房间\
  \ 3，找到物品，结束）\n  - `G_0 = -1 + 1 * 0.9 -1 * 0.9² -1 * 0.9³ + 10 * 0.9⁴ = 4.9`\n-\
  \ 情节 4：（室外，室外，室外，……）\n  - `G_0 = 1 + 1 * 0.9 + 1 * 0.9² + ... = 10.0`\n\n只要折扣因子不为\
  \ 1，即使 MRP 过程中存在循环，我们也不会遇到无限回报问题。比较这些不同样本序列的回报，我们可以看到情节 4 的回报值最高。然而，如果智能体陷入循环，一直停留在*室外*状态，它就无法实现目标（即在*房间\
  \ 3* 中找到物品）。这并不一定意味着奖励函数有缺陷。要证明这一点，我们需要使用价值函数，我们将在接下来的章节中详细解释。\n\n\n\n#### MRP 的价值函数\n\
  \n在马尔可夫奖励过程（MRP）中，回报 `G_t` 衡量的是从时间步 `t` 到回合结束所获得的总未来奖励。然而，仅比较不同样本序列的回报有其局限性，因为它只衡量从特定时间步开始的回报。这对于处于特定环境状态并需要做出决策的智能体来说帮助不大。价值函数可以帮助我们克服这个问题。\n\
  \n形式上，MRP 的状态价值函数 `V(s)` 衡量的是从状态 `s` 开始到时间范围 `H` 的*期望回报*。我们称之为期望回报，是因为从状态 `s` 到时间范围\
  \ `H` 的轨迹通常是一个随机变量。简单来说，`V(s)` 衡量的是从状态 `s` 开始到时间范围 `H` 的平均回报。对于回合制问题，时间范围就是终止时间步，即\
  \ `H=T`。\n\n```\nV(s) = E[G_t | S_t = s]\n```\n\n(2.5)\n\nMRP 的状态价值函数 `V(s)` 也具有递归性质，如公式\
  \ (2.6) 所示。公式 (2.6) 也被称为 `V(s)`（针对 MRP）的贝尔曼期望方程。我们称之为贝尔曼期望方程，是因为它以递归方式书写，但仍然带有期望符号\
  \ `E`。\n\n```\nV(s) = E[G_t | S_t = s]\n     = E[R_t + γ R_{t+1} + γ² R_{t+2} +\
  \ ... | S_t = s]\n     = E[R_t + γ (R_{t+1} + γ R_{t+2} + ...) | S_t = s]\n    \
  \ = E[R_t + γ G_{t+1} | S_t = s]\n     = E[R_t + γ V(S_{t+1}) | S_t = s]\n```\n\n\
  (2.6)\n\n```\n= R(s) + γ Σ_{s' ∈ S} P(s'|s) V(s'), 对于所有 s ∈ S\n```\n\n(2.7)\n\n\
  公式 (2.7) 被称为 `V(s)`（针对 MRP）的贝尔曼方程。我们可以看到，从公式 (2.6) 到公式 (2.7) 的步骤是如何通过考虑所有可能的后继状态\
  \ `s'` 的值，并根据 MRP 环境中状态转移概率 `P(s'|s)` 对每个值进行加权，从而去掉了方程中的期望符号 `E`。\n\n#### 计算示例\n\
  \n作为示例，我们可以使用公式 (2.7) 来计算特定状态的期望回报。假设状态 *房间 2* 的初始值为 5.0，状态 *找到物品* 的初始值为 10.0，如图\
  \ 2.6 所示（这些初始值是随机选择的），并且我们使用无折扣 `γ=1.0`。现在让我们计算状态 *房间 3* 的期望回报。由于我们已经知道马尔可夫奖励过程（MRP）的模型（动态函数和奖励函数），我们知道无论后继状态\
  \ `s'` 是什么，即时奖励都是 `-1`。环境有 0.8 的概率转移到后继状态 *找到物品*，该后继状态的价值为 `V(找到物品)=10.0`。还有 0.2\
  \ 的概率环境会转移到后继状态 *房间 2*，该后继状态的价值为 `V(房间 2)=5.0`。因此，我们可以使用贝尔曼方程来计算状态 `V(房间 3)` 的估计值，如下所示：\n\
  \n```\nV(房间 3) = -1 + 0.8 * 10.0 + 0.2 * 5.0 = 8.0\n```\n\n当然，这个状态 *房间 3* 的估计值并不准确，因为我们是从随机猜测的值开始的，并且没有包含其他状态。但是，如果我们包含状态空间中的所有状态，并重复该过程大量次数，最终估计值将非常接近真实值。\n\
  \n一个用于计算 `γ=1.0` 时房间 3 期望回报的状态转移图。从左到右，4 个状态的值分别为 0.0、5.0、8.0 和 10.0，通过箭头连接。房间 3\
  \ 的值为 8.0，奖励为负 1，并通过 `p=0.2` 连接到房间 2，通过 `p=0.8` 连接到已找到状态。\n\n**图 2.6** 如何为服务犬 MRP\
  \ 计算状态值的示例，`γ=1.0`；数字是随机选择的\n\n图 2.7 显示了服务犬 MRP 各状态的真实值。这些值是使用公式 (2.7) 和动态规划计算得出的，动态规划是一种迭代方法，可用于求解\
  \ MDP。我们将在下一章介绍动态规划方法。在本实验中，我们使用折扣因子 `γ=0.9`。我们可以看到，状态 *找到物品* 在所有状态中具有最高的价值。\n\n\
  我们为什么要估计状态价值？因为它可以帮助智能体做出更好的决策。如果智能体知道哪个状态更好（就期望回报而言），它就可以选择可能引导它进入这些更好状态的动作。例如，在图\
  \ 2.7 中，如果当前状态是 *房间 2*，那么最佳后继状态是 *房间 3*，因为它在 *房间 2* 所有可能的后继状态中具有最高的状态价值 7.0。通过选择能导向高价值状态的动作，智能体可以最大化其长期期望回报。\n\
  \n\n\n### 2.5 马尔可夫决策过程\n\n现在我们来讨论 MDP 的细节。与 MRP 扩展马尔可夫链的方式类似，马尔可夫决策过程（MDP）通过将动作和策略纳入过程来扩展\
  \ MRP。MDP 包含所有必要的组成部分，包括状态、奖励、动作和策略。我们可以将 MDP 定义为一个元组 `(S, A, P, R)`：\n\n- `S` 是有限的状态集合，称为状态空间。\n\
  - `A` 是有限的动作集合，称为动作空间。\n- `P` 是环境的动态函数（或转移模型），其中 `P(s' | s, a) = P[S_{t+1} = s'\
  \ | S_t = s, A_t = a]` 指定了在当前状态 `s` 下采取动作 `a` 时，环境转移到后继状态 `s'` 的概率。\n- `R` 是环境的奖励函数；`R(s,\
  \ a) = E[R_t | S_t = s, A_t = a]` 是当智能体处于状态 `s` 并采取动作 `a` 时，环境提供的奖励信号。\n\n服务犬 MRP\
  \ 的状态转移图，其中 gamma 等于 0.9。房间 1、房间 2、房间 3 和已找到物品的状态值分别为 2.5、4.2、7.0 和 10.0，并通过带有奖励信号的加权箭头连接。结束的状态值为\
  \ 0.0。外面的状态值为 6.3。\n\n**图 2.7** 服务犬 MRP 的状态值，`γ = 0.9`\n\n请注意，动态函数 `P` 和奖励函数 `R`\
  \ 现在取决于智能体在时间步 `t` 选择的动作 `A_t`。\n\n在图 2.8 中，我们使用 MDP 对服务犬示例进行了建模。在继续之前，我们想解释一下对图\
  \ 2.8 所做的一些小改动。首先，我们将状态*已找到物品*和*结束*合并为一个终止状态*已找到物品*。这样做是合理的，因为奖励现在取决于 `(s, a)`，并且在智能体到达*已找到物品*状态后，没有其他有意义的状态。其次，图\
  \ 2.8 中的直线和曲线表示智能体在某个状态下可以选择的有效动作，而不是状态转移概率。最后，奖励现在取决于智能体选择的动作，并且奖励值略有不同。\n\n实际上，我们的服务犬示例现在被建模为一个确定性（平稳）的强化学习环境。这意味着，如果智能体在相同状态\
  \ `s` 下采取相同动作 `a`，那么后继状态 `s'` 和奖励 `r` 将始终相同，无论我们重复 100 次还是 100 万次。转移到后继状态 `s'` 的概率保证为\
  \ 1.0。例如，如果智能体处于*房间 2* 状态并选择*去外面*，那么后继状态将始终是*外面*；后继状态是*房间 3* 或*房间 1* 的概率为零。\n\n\
  服务犬 MDP 的状态转移图。房间 1 和房间 2 有指向房间 1 的箭头（r 等于 -2）和指向房间 2 的箭头（r 等于 -1）。房间 2 和房间 3 有指向房间\
  \ 3 和房间 2 的箭头。房间 2 和外面有指向外面和里面的箭头。房间 3 通过搜索指向已找到物品。\n\n**图 2.8** 服务犬 MDP\n\n我们可以列出服务犬\
  \ MDP 的 `S, A, R` 集合中的所有元素；请注意，并非所有动作在每个状态下都是可用（或合法）的：\n\n- `S` = {房间 1, 房间 2, 房间\
  \ 3, 外面, 已找到物品}\n- `A` = {去房间 1, 去房间 2, 去房间 3, 去外面, 去里面, 搜索}\n- `R` = {-1, -2, +1,\
  \ 0, +10}\n\n正如我们之前解释的，我们的服务犬 MDP 是一个确定性（平稳）的强化学习环境。动态函数与我们之前的示例略有不同。对于 MDP，从当前状态\
  \ `s` 到其后继状态 `s'` 的转移取决于当前状态 `s` 和智能体选择的动作 `a`。对于确定性环境，合法动作 `a ∈ A(s)` 的转移概率始终为\
  \ 1.0，而非法动作 `a ∉ A(s)`（即环境中不允许的动作）的转移概率为 0。智能体绝不应选择非法动作，因为大多数环境在某种程度上都强制执行检查。例如，在围棋游戏中，如果玩家走出非法一步，他们将自动输掉比赛。\n\
  \n我们仍然可以为服务犬 MDP 的动态函数构建一个单一矩阵，但这次它需要是一个 3D 矩阵。由于绘制 3D 矩阵并不容易，我们选择使用 2D 平面来解释单个状态的概念。假设环境的当前状态是*房间\
  \ 2*，平面的每一行代表一个动作，每一列代表一个后继状态 `s'`。为了保持一致性，我们将所有非法动作（*去房间 2*、*去里面*、*搜索*）转移到后继状态*房间\
  \ 2* 的概率设置为 1.0。这仅仅意味着这些非法动作不会影响环境的状态。\n\n服务犬 MDP 动态函数的转移矩阵。列是房间 1、房间 2、房间 3、外面和已找到物品。行是去房间\
  \ 1、去房间 2、去房间 3、去外面、去里面和搜索。\n\n为了说明起见，让我们假设我们的服务犬 MDP 不是确定性的，而是一个随机强化学习环境。例如，每个合法动作也可能随机导致后继状态*外面*。在这种情况下，随机环境的转移矩阵将如下所示：\n\
  \n随机环境下服务犬 MDP 的转移矩阵。列是房间 1、房间 2、房间 3、外面和已找到物品，行是去房间 1、去房间 2、去房间 3、去外面、去里面和搜索。\n\
  \n\n\n#### 策略\n\n在强化学习和马尔可夫决策过程（MDP）中，智能体有能力决定如何在环境中行动，但在给定状态下如何选择动作或使用什么规则进行决策并不总是明确的。为了解决这个问题，我们引入了策略（`policy`）的概念。\n\
  \n形式上，策略`π`是一个函数，它将每个状态`s`映射到该状态`s`下所有可能动作集合上的概率分布。策略可以是确定性的，意味着对于给定状态总是选择相同的动作；也可以是随机性的，意味着根据概率分布选择动作。例如，如果某个特定状态有四个动作`a1`、`a2`、`a3`和`a4`，其中`a1`在奖励方面是最佳动作，`a4`是最差动作，`a2`优于`a3`，那么确定性策略会始终选择`a1`，而随机性策略可能以\
  \ 60%的概率选择`a1`，20%的概率选择`a2`，15%的概率选择`a3`，5%的概率选择`a4`。\n\n从数学上讲，我们可以将策略表示为一组函数的集合，每个函数将特定的环境状态`s`映射到所有动作`a\
  \ ∈ A(s)`上的概率分布。这可以写成：\n\n```\nπ(a|s) = P[A_t = a | S_t = s], 对于所有 s ∈ S, a ∈ A\n\
  ```\n\n(2.8)\n\n对于任何状态`s`，所有可能动作的概率之和必须等于 1：\n\n```\n∑_{a ∈ A} π(a|s) = 1.0\n```\n\
  \n有限 MDP 的可能确定性策略数量为`N(A)^(N(S))`，其中`N(S)`是状态空间的大小，`N(A)`是动作空间的大小。对于我们的服务犬 MDP，这个数字将是`6⁵\
  \ = 7776`。然而，这个估计包含了每个状态下的非法动作，因此仅包含合法动作的更准确估计是`3⁵ = 243`。\n\n#### MDP 的价值函数\n\n\
  使用 MDP 建模强化学习问题的目标是找到最优策略，以便智能体在与环境交互时获得最大奖励。在 MDP 的框架内，我们可以通过使用价值函数来实现这一点。\n\n\
  价值函数衡量在遵循某个策略时的期望回报。MDP 有两种不同的价值函数：状态价值函数`Vπ`和状态-动作价值函数`Qπ`。\n\nMDP 的状态价值函数`Vπ`衡量从状态`s`开始，然后遵循策略`π`直到某个时间范围`H`的期望回报，其中`H`可以是回合的长度，对于持续性问题也可以是无穷大；而策略`π`的状态-动作价值函数`Qπ`衡量从状态`s`开始，采取动作`a`，*然后*遵循策略`π`的期望回报。\n\
  \n公式(2.9)是状态价值函数`Vπ`的定义，它看起来与公式(2.5)几乎相同，只是现在附加了一个小下标`π`，这意味着这些值是针对特定策略衡量的。这应该是有道理的，因为智能体获得的奖励将取决于它在环境中的行为方式，而智能体依赖策略`π`在环境中行动。即使对于相同的状态`s`，不同的策略通常也会有不同的价值。\n\
  \n```\nVπ(s) = Eπ[G_t | S_t = s], 对于所有 s ∈ S\n```\n\n(2.9)\n\n公式(2.10)是策略`π`的状态-动作价值函数`Qπ`的定义。\n\
  \n```\nQπ(s, a) = Eπ[G_t | S_t = s, A_t = a], 对于所有 s ∈ S, a ∈ A\n```\n\n(2.10)\n\
  \n`Vπ(s)`和`Qπ(s, a)`之间存在一个很好的关系。在策略`π`下，状态`s`的价值只是所有可能动作`a ∈ A`的状态-动作价值`Qπ(s, a)`的加权和，如公式(2.11)所示。\n\
  \n```\nVπ(s) = ∑_{a ∈ A} π(a|s) Qπ(s, a)\n```\n\n(2.11)\n\n\n\n这里，`π(a|s)` 表示在遵循策略\
  \ `π` 时，在状态 `s` 下采取行动 `a` 的概率。\n\n有了这个概念，我们可以定义 `V_π` 和 `Q_π` 的贝尔曼方程。方程 (2.12) 被称为\
  \ `V_π` 的贝尔曼期望方程；在该方程中，我们使用即时奖励 `R_t` 和后继状态的折现值 `γ V_π(S_{t+1})` 来计算在某个策略 `π` 下状态\
  \ `s` 的价值 `V_π(s)`。\n\n```\nV_π(s) = E_π[ G_t | S_t = s ]\n       = E_π[ R_t + γ\
  \ R_{t+1} + γ² R_{t+2} + ... | S_t = s ]\n       = E_π[ R_t + γ ( R_{t+1} + γ R_{t+2}\
  \ + ... ) | S_t = s ]\n       = E_π[ R_t + γ G_{t+1} | S_t = s ]\n       = E_π[\
  \ R_t + γ V_π(S_{t+1}) | S_t = s ]\n```\n\n(2.12)\n\n```\n     = Σ_{a ∈ A} π(a|s)\
  \ [ R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) V_π(s') ], 对于所有 s ∈ S\n```\n\n(2.13)\n\n方程\
  \ (2.13) 通过加权在策略 `π` 下处于状态 `s` 时采取行动 `a` 的概率，进一步扩展了 `V_π` 的贝尔曼期望方程；它还通过使用当智能体处于状态\
  \ `s` 并采取行动 `a` 时转移到特定后继状态的概率，来加权每个后继状态 `V_π(s')` 的价值。该方程也称为 `V_π` 的贝尔曼方程。\n\n类似地，方程\
  \ (2.14) 是 `Q_π` 的贝尔曼期望方程，而方程 (2.16) 是 `Q_π` 的贝尔曼方程。请注意，方程 (2.16) 涉及对下一个状态-行动对价值的条件化，而其他方程则没有。这初看起来可能有些奇怪，但这是必要的，因为下一个状态和行动是随机变量，贝尔曼方程需要表达状态-行动对的期望值，并考虑所有可能的结果。具体来说，方程\
  \ (2.16) 涉及对后继状态-行动对 `(s', a')` 价值的一个新期望，因为该对依赖于智能体的策略。\n\n```\nQ_π(s, a) = E_π[\
  \ G_t | S_t = s, A_t = a ]\n          = E_π[ R_t + γ R_{t+1} + γ² R_{t+2} + ...\
  \ | S_t = s, A_t = a ]\n          = E_π[ R_t + γ G_{t+1} | S_t = s, A_t = a ]\n\
  \          = E_π[ R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t = s, A_t = a ]\n```\n\n(2.14)\n\
  \n```\n     = R(s, a) + γ E_π[ Q_π(s', a') | S_{t+1} = s', A_{t+1} = a' ]\n```\n\
  \n(2.15)\n\n```\n     = R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) Σ_{a' ∈ A} π(a'|s') Q_π(s',\
  \ a'), 对于所有 s ∈ S, a ∈ A\n```\n\n(2.16)\n\n由于 `V_π` 和 `Q_π` 之间存在如方程 (2.11) 所示的关系，我们也可以将\
  \ `Q_π` 的贝尔曼方程重写为\n\n```\nQ_π(s, a) = R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) V_π(s'),\
  \ 对于所有 s ∈ S, a ∈ A\n```\n\n(2.17)\n\n一个两层的 V pi 备份图。根节点是状态 s，其平均值分裂为两个行动，弧角为 pi。这两个行动具有弧角\
  \ p，并且每个都有两个状态转移。行动 a, r 导向状态 s'。\n\n**图 2.9** `V_π` 的备份图\n\n推导方程 (2.17) 所需的额外步骤是必要的，因为在某些情况下，我们没有对\
  \ `Q_π(s, a)` 的准确估计，正如我们稍后在书中介绍动态规划算法时会看到的那样。\n\n贝尔曼方程是求解 `V_π` 和 `Q_π` 的核心。这意味着，如果我们使用价值函数方法（即估计状态或状态-行动对的价值），它们也是解决强化学习问题的核心。例如，`V_π`\
  \ 的贝尔曼方程表明，一个状态的价值可以分解为两部分：即时奖励 `R(s, a)` 和后继状态的折现值 `γ Σ_{s' ∈ S} P(s'|s, a) V_π(s')`，这些后继状态是在策略\
  \ `π` 下可以从 `s` 到达的状态。在某些环境中，可能存在多个后继状态 `s'`，我们计算所有后继状态的期望值。类似的概念也适用于 `Q_π`，它估计在状态\
  \ `s` 下采取行动 `a` 并随后遵循策略 `π` 的价值。\n\n\n\n贝尔曼方程构成了本书后续将介绍的一系列算法的基础，这些算法用于计算或近似`V_π`和`Q_π`，而这两者是所谓基于价值的强化学习方法的核心。贝尔曼方程帮助我们定义了将价值从后继状态传递回当前状态的规则，我们通常称之为更新或回溯操作。有时，我们也将其称为价值函数`V_π`和`Q_π`的更新（回溯）规则。价值函数方法是强化学习算法中的一类，本书后续还将讨论许多其他方法。\n\
  \n图 2.9 是一个回溯图，可以帮助我们更好地理解公式(2.13)。在该图中，空心圆代表状态，实心点代表动作。根节点是一个状态节点`s`，在状态`s`中，智能体可能有多个动作可供选择（我们只展示了两个动作）。具体选择哪个动作`a`将取决于智能体所遵循的策略`π`。对于每个动作`a`，环境可能会转移到多个后继状态`s'`之一（我们展示了两个这样的后继状态），其转移概率`p`取决于`(s,\
  \ a)`。贝尔曼方程对所有可能的结果取期望（如根节点状态`s`和动作节点`a`下方的小弧线所示），并按结果发生的概率进行加权。项`∑_{a ∈ A} π(a|s)`表示对状态`s`下所有动作的期望，按策略`π`选择每个动作的概率进行加权。项`∑_{s'\
  \ ∈ S} P(s'|s, a)`表示对所有可能的后继状态`s'`的期望，按环境的状态转移概率进行加权。\n\n我们也可以为公式(2.16)绘制一个回溯图。在介绍`V_π`的贝尔曼方程时解释过的对所有可能结果取期望的思想，在此同样适用。从图\
  \ 2.10 中可以看出，我们从第一个动作节点开始，该节点代表智能体采取的动作`a`。当智能体在状态`s`中采取动作`a`时（采取该动作时不一定遵循策略`π`），环境可能会转移到多个后继状态`s'`之一（我们展示了两个这样的后继状态），其转移概率`p`取决于`(s,\
  \ a)`。在每个后继状态`s'`中，智能体可能有多个动作可供选择（我们只展示了两个动作）。具体选择哪个动作`a'`将取决于智能体所遵循的策略`π`。贝尔曼方程对所有可能的结果取期望（如后继状态`s'`下方的小弧线所示），并按结果发生的概率进行加权。\n\
  \n![](img/605748_1_En_2_Fig10_HTML.png)\n\n一个包含两层的`Q_π`回溯图。根节点有动作`a`和`r`，平均值分叉为两个状态，带有弧角`p`。这两个状态带有弧角`π`，每个状态有两个动作。动作`a`和`r`导向状态`s'`，状态`s'`又导向动作`a'`。\n\
  \n图 2.10\n`Q_π`的回溯图\n\n\n\n### `V_π` 的运算示例\n\n为了更好地理解如何计算策略 `π` 下某个状态的价值，我们来看一个使用服务犬\
  \ MDP 的例子。我们选择了随机策略 `π`，这意味着选择每个动作的概率在所有（合法）动作之间均匀分布。在此例中，我们将重点计算状态 *房间 2* 的价值。在该状态下，智能体有三个合法动作可供选择：*前往房间\
  \ 1*、*前往房间 3*、*前往室外*。我们对每个后续状态的初始猜测价值分别为 `V_π(房间 1) = 1.0`、`V_π(房间 3) = 10.0`、`V_π(室外)\
  \ = 5.0`。假设我们已知环境模型，并使用折扣率 `γ = 0.9`，那么对于这个随机策略 `π`，我们该如何计算状态 *房间 2* 的价值呢？\n\n根据环境模型，我们知道每个合法动作的即时奖励分别为\
  \ `-2`、`-1`、`0`，并且对于所有合法动作，从当前状态转移到后续状态的状态转移概率始终为 `1.0`。同时，我们也知道智能体选择每个合法动作的概率分别为\
  \ `0.33`、`0.33`、`0.33`。最后，我们已知（猜测）不同后续状态 `s'` 的价值。因此，我们只需将这些数值代入公式 (2.13)，即可计算出状态\
  \ *房间 2* 的价值：\n\n```\nV_π(房间 2) = 0.33 * (-2 + 0.9 * 1.0) + 0.33 * (-1 + 0.9 * 10.0)\
  \ + 0.33 * (0 + 0.9 * 5.0)\n            = 0.33 * -1.1 + 0.33 * 8 + 0.33 * 4.5\n\
  \            = 3.76\n```\n\n上述结果如图 2.11 所示。当然，与 MRP 的运算示例类似，状态 *房间 2* 的估计价值并不精确。但如果我们将状态空间中的所有状态都纳入考虑，并重复该过程大量次数，最终估计值将非常接近真实值。这一思想本质上就是动态规划算法所做的事情，我们将在第\
  \ 3 章中介绍。\n\n一个用于计算房间 2 状态价值的状态转移图，其中 gamma 等于 0.9。房间 1、2、3 以及终点的状态价值分别为 1.0、3.8、10.0\
  \ 和 0.0。价值为 3.8 的房间 2 具有以下动作：前往房间 1（r 等于 -2）、前往室外（r 等于 0）以及前往房间 3（r 等于 -1）。\n\n\
  **图 2.11** 针对服务犬 MDP，在随机策略 `π`、`γ = 0.9` 下，如何计算状态 *房间 2* 价值的示例；初始状态价值为随机选取。\n\n\
  ### `Q_π` 的运算示例\n\n让我们来看一个使用服务犬 MDP 计算状态-动作价值 `Q_π(s, a)` 的示例。条件与计算 `V_π(房间 2)`\
  \ 的运算示例几乎相同。但在此例中，我们要计算状态 *房间 2* 下所有合法动作的状态-动作价值。\n\n我们仍然使用随机策略 `π`，这意味着选择每个动作的概率在所有（合法）动作之间均匀分布。我们对每个状态的初始猜测价值分别为\
  \ `V_π(房间 1) = 1.0`、`V_π(房间 3) = 10.0`、`V_π(室外) = 5.0`。假设我们已知环境模型，并使用折扣率 `γ = 0.9`，那么对于这个随机策略，我们该如何计算状态\
  \ *房间 2* 下每个（合法）动作的状态-动作价值呢？\n\n根据环境模型，我们知道每个合法动作的即时奖励分别为 `-2`、`-1`、`0`，并且对于每个状态-动作对\
  \ `(s, a)`，从当前状态转移到后续状态的状态转移概率始终为 `1.0`。同时，我们已知（猜测）不同后续状态 `s'` 的价值。因此，我们只需将这些数值代入公式\
  \ (2.17)，即可计算出每个动作的价值：\n\n```\nQ_π(房间 2, 前往房间 1) = -2 + 0.9 * 1.0 = -1.1\nQ_π(房间\
  \ 2, 前往房间 3) = -1 + 0.9 * 10.0 = 8.0\nQ_π(房间 2, 前往室外)  = 0 + 0.9 * 5.0 = 4.5\n```\n\
  \n一个用于计算状态-动作价值的示意图。价值为 3.8 的房间 2 具有以下动作：前往房间 1（r 等于 -2，q π 等于 -1.1）、前往室外（r 等于 0，q\
  \ π 等于 4.5）以及前往房间 3（r 等于 -1，q π 等于 8.0）。\n\n**图 2.12** 针对服务犬 MDP 的随机策略，如何计算状态 *房间\
  \ 2* 下所有合法动作的状态-动作价值的示例。`γ = 0.9`；初始状态价值为随机选取。\n\n我们可以使用公式 (2.11) 来计算在此随机策略 `π`\
  \ 下状态 *房间 2* 的价值；其结果与我们之前使用公式 (2.13) 计算的结果完全相同：\n\n```\nV_π(房间 2) = 0.33 * -1.1\
  \ + 0.33 * 8 + 0.33 * 4.5 = 3.76\n```\n\n上述结果如图 2.12 所示。一旦我们获得了策略 `π` 下 `Q_π` 的准确估计，就可以很容易地利用它来帮助智能体做出更好的决策。智能体所需要做的就是在状态空间中的所有状态下，选择具有最高状态-动作价值的动作\
  \ `argmax_a Q_π(s, a)`。它不再需要进行单步前瞻了。\n\n\n\n### 2.6 价值函数的替代贝尔曼方程\n\n式(2.13)的一个局限性在于，我们假设环境产生的奖励信号仅取决于当前环境状态`s`和智能体采取的动作`a`。然而，在某些情况下，奖励函数还取决于后续状态`s'`，例如`R(s,\
  \ a, s')`，此时`V_π`的贝尔曼方程需要重写以支持这种场景，如式(2.18)所示：\n\n```\nV_π(s) = E_π[ R_t + γ V_π(S_{t+1})\
  \ | S_t=s ]\n       = Σ_{a∈A} π(a|s) [ Σ_{s'∈S} P(s'|s,a) R(s,a,s') + γ Σ_{s'∈S}\
  \ P(s'|s,a) V_π(s') ]\n       = Σ_{a∈A} π(a|s) Σ_{s'∈S} P(s'|s,a) [ R(s,a,s') +\
  \ γ V_π(s') ], 对于所有 s∈S\n```\n\n(2.18)\n\n类似地，对于奖励函数取决于后续状态`s'`的情况，我们可以重写`Q_π`的贝尔曼方程，如式(2.19)所示：\n\
  \n```\nQ_π(s,a) = E_π[ R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t=s, A_t=a ]\n        \
  \ = Σ_{s'∈S} P(s'|s,a) R(s,a,s') + γ E_π[ Q_π(s',a') | S_{t+1}=s', A_{t+1}=a' ]\n\
  \         = Σ_{s'∈S} P(s'|s,a) R(s,a,s') + γ Σ_{s'∈S} P(s'|s,a) Σ_{a'∈A} π(a'|s')\
  \ Q_π(s',a')\n         = Σ_{s'∈S} P(s'|s,a) [ R(s,a,s') + γ Σ_{a'∈A} π(a'|s') Q_π(s',a')\
  \ ], 对于所有 s∈S, a∈A\n```\n\n(2.19)\n\n然而，这两个方程都假设环境奖励是确定性的。这意味着相同的`(s, a)`或`(s, a,\
  \ s')`总会产生相同的奖励信号。但在某些情况下，奖励也可能是随机的。此时，这些方程将无法捕捉这种随机性。\n\n在他们著名的著作《*强化学习导论*》[2]中，Sutton\
  \ 和 Barto 使用式(2.20)来涵盖这种场景。他们将动态函数`P`和奖励函数`R`合并为一个四参数函数`P(s', r|s, a)`，该函数同时解决了奖励可能取决于后续状态`s'`或奖励可能是随机的问题。\n\
  \n```\nV_π(s) = E_π[ R_t + γ V_π(S_{t+1}) | S_t=s ]\n       = Σ_{a∈A} π(a|s) Σ_{s'}\
  \ Σ_{r} P(s', r|s, a) [ r + γ V_π(s') ]\n       = Σ_{a∈A} π(a|s) Σ_{s', r} P(s',\
  \ r|s, a) [ r + γ V_π(s') ], 对于所有 s∈S\n```\n\n(2.20)\n\n同样在这种情况下，`Q_π`的贝尔曼方程变为\n\
  \n```\nQ_π(s,a) = E_π[ R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t=s, A_t=a ]\n        \
  \ = Σ_{s'} Σ_{r} P(s', r|s, a) [ r + γ E_π[ Q_π(s',a') | S_{t+1}=s', A_{t+1}=a'\
  \ ] ]\n         = Σ_{s', r} P(s', r|s, a) [ r + γ Σ_{a'∈A} π(a'|s') Q_π(s',a') ],\
  \ 对于所有 s∈S, a∈A\n```\n\n(2.21)\n\n虽然式(2.20)和(2.21)更具通用性，但它们可能更难完全理解。为简单起见，本书将坚持使用贝尔曼方程(2.13)、(2.16)和(2.17)。\n\
  \n\n\n### 2.7 最优策略与最优价值函数\n\n使用强化学习解决问题的目标是找到最优策略。如果能在整个状态空间中为每一个状态都找到能获得最高回报的策略，那么就可以认为该马尔可夫决策过程（MDP）已得到解决。这很合理，因为智能体获得这些最大回报的唯一方式就是在每个状态都选择最佳动作。正式地，最优策略\
  \ `π*` 被定义为：在状态空间的所有状态上，其状态价值 `Vπ` 均高于其他所有策略的策略（或策略集合），如公式 (2.22) 所示。\n\n```\nπ*(s)\
  \ = argmaxπ Vπ(s), 对所有 s ∈ S\n```\n\n(2.22)\n\n理论上，每个 MDP 都存在一个优于或等于其他策略的最优策略 `π*`。MDP\
  \ 可能存在多个最优策略。例如，在某个状态下，有两个或更多动作会导向相同的后继状态，并且这些不同动作的奖励相同。图 2.13 是一个小型 MDP 示例，用于说明这种情况。在这个小例子中，智能体需要驾驶一辆玩具车从状态\
  \ A 到达状态 C。但到达状态 C 的唯一途径是通过状态 B。在状态 A 中，智能体可以选择两个可能的动作（路线）；这两个动作都会导向状态 B。这两个动作的奖励相同，因此智能体可以选择其中任意一个动作。\n\
  \n我们不应将最优策略与确定性策略混淆。确定性策略在相同状态下总是选择相同的动作，但这并不意味着所选动作就是最佳动作。而最优策略则始终会选择最佳动作。\n\n\
  MDP 的最优策略（或策略集合）`π*` 共享相同的最优状态价值函数 `V*`：\n\n```\nV*(s) = maxπ Vπ(s), 对所有 s ∈ S\n\
  ```\n\n(2.23)\n\n类似地，MDP 的最优策略（或策略集合）`π*` 共享相同的最优状态-动作价值函数 `Q*`：\n\n```\nQ*(s, a)\
  \ = maxπ Qπ(s, a), 对所有 s ∈ S, a ∈ A\n```\n\n(2.24)\n\n玩具车 MDP 的状态转移图。状态 A 通过向左箭头（r=0）和向右箭头（r=0）导向状态\
  \ B。状态 B 通过向前箭头（r=1）导向状态 C。\n\n**图 2.13** 具有多个最优策略的玩具车 MDP 示例\n\n最优状态价值函数 `V*` 与最优状态-动作价值函数\
  \ `Q*` 之间存在一个很好的关系。即，状态的最优价值 `V*(s)` 等于 `Q*(s, a)`，其中 `a` 是在该状态 `s` 下所有动作中具有最大状态-动作价值的动作。这很合理，因为如果智能体遵循最优策略，那么它选择最佳动作的概率为\
  \ 1.0，选择非最佳动作的概率为 0（至少在确定性策略的情况下如此）。\n\n```\nV*(s) = maxa∈A Q*(s, a)\n```\n\n(2.25)\n\
  \n与常规价值函数类似，我们也可以将公式 (2.23) 以递归方式重写。这里，我们只关心具有最大即时奖励和后继状态折扣价值的动作。公式 (2.26) 是 `V*`\
  \ 的贝尔曼最优方程：\n\n```\nV*(s) = maxa∈A Q*(s, a)\n      = maxa E[Rt + γ Gt+1 | St = s,\
  \ At = a]\n      = maxa E[Rt + γ V*(St+1) | St = s, At = a]\n      = maxa [R(s,\
  \ a) + γ Σs'∈S P(s'|s, a) V*(s')], 对所有 s ∈ S\n```\n\n(2.26)\n\n类似地，我们也可以推导出 `Q*`\
  \ 的贝尔曼最优方程，如公式 (2.27) 所示：\n\n```\nQ*(s, a) = E[Rt + γ maxa' Q*(St+1, a') | St=s,\
  \ At=a]\n         = R(s, a) + γ Σs'∈S P(s'|s, a) maxa'∈A Q*(s', a'), 对所有 s ∈ S,\
  \ a ∈ A(s)\n```\n\n(2.27)\n\n由于 `V*(s) = maxa Q*(s, a)`，我们也可以使用 `V*` 重写 `Q*` 的贝尔曼最优方程：\n\
  \n```\nQ*(s, a) = E[Rt + γ V*(St+1) | St=s, At=a]\n         = R(s, a) + γ Σs'∈S\
  \ P(s'|s, a) V*(s')\n```\n\n(2.28)\n\n我们可以绘制贝尔曼最优方程的备份图。与对所有动作取平均不同，`V*` 的贝尔曼最优方程只考虑具有最高价值的动作，如图\
  \ 2.14 所示。注意，它仍然对所有可能的后续状态 `s'` 取平均；然而，来自不同动作节点（此处显示了两个）的这些平均值并不会被加总在一起。\n\n\n\n\
  图 2.15 展示了公式 (2.27) 的备份图。类似地，这里只考虑能为后继状态 `s'` 产生最高价值的动作。\n\n在实践中，我们更关心最优状态-动作价值函数\
  \ `Q*`。原因很简单：如果我们有了 `Q*`，就可以像公式 (2.29) 所示那样，基于 `Q*` 轻松构建一个最优策略。在这种情况下，我们总是（以概率 1.0）选择具有最大\
  \ `Q*(s, a)` 值的动作，那么 MDP 问题就解决了。\n\n```\nπ*(a|s) = { 1, if a = argmax_{a∈A} Q*(s,\
  \ a); 0, otherwise }\n```\n\n(2.29)\n\n一个两层 `Q*` 的备份图。根节点包含动作 `a` 和奖励 `r`，其平均值分裂为两个状态，弧角为\
  \ `p`。这两个状态的弧角为 `π`，每个状态有两个动作，并取最大值。动作 `a` 和奖励 `r` 导向状态 `s'`，而状态 `s'` 又导向动作 `a'`。\n\
  \n**图 2.15** `Q*` 的备份图\n\n一个两层 `V*` 的备份图。根节点包含状态 `s`，其最大值分裂为两个动作，弧角为 `π`。这两个动作的弧角为\
  \ `p`，每个动作有两个状态转移。动作 `a` 和奖励 `r` 导向状态 `s'`。\n\n**图 2.14** `V*` 的备份图\n\n如果我们只知道最优状态价值函数\
  \ `V*`，情况会变得稍微复杂一些。因为价值是对所有动作取平均，所以我们需要进行一步前瞻来确定哪个动作是最优的。为此，我们需要使用环境模型。\n\n```\n\
  π*(a|s) = { 1, if a = argmax_{a∈A} Σ_{s'∈S} [R(s, a) + γ V*(s')]; 0, otherwise }\n\
  ```\n\n(2.30)\n\n### 2.8 本章小结\n\n本章全面介绍了马尔可夫决策过程（MDP），它是强化学习的基础。本章首先概述了 MDP，然后解释了如何利用\
  \ MDP 对强化学习问题进行建模。本章具有重要意义，因为它为本书后续内容奠定了基础。这里介绍的概念和数学公式至关重要，将在本书其余部分广泛使用，因此本章是一个值得高度关注的关键章节。\n\
  \n本章深入探讨了马尔可夫过程、马尔可夫奖励过程和马尔可夫决策过程的细节，清晰阐述了构成 MDP 的各个组成部分。我们研究了 MDP 的状态价值函数和状态-动作价值函数，以及如何利用强大的贝尔曼方程进行计算。此外，还探讨了价值函数的其他贝尔曼方程形式，从而更深入地理解这些关键函数在更复杂问题中的计算方法。\n\
  \n最后，本章涵盖了最优策略和最优价值函数，讨论了如何通过各种方法推导出它们。总体而言，本章为理解 MDP 及其在强化学习中的作用奠定了坚实基础。\n\n本书下一章将重点介绍如何使用动态规划（DP）方法解决表格型强化学习问题。通过运用本章所学知识，读者将能更好地理解\
  \ DP 方法及其在强化学习中的应用。\n\n脚注 1 2 3\n\n"
- "# 3. 动态规划\n\n使用马尔可夫决策过程（MDP）对强化学习问题进行建模的最终目标是，我们可以利用贝尔曼方程找到最优策略 `π*`，从而最大化期望累积奖励。然而，找到这样的策略并非总是轻而易举。在本章中，我们将介绍动态规划（DP）算法，作为在拥有完美环境模型时寻找最优策略\
  \ `π*` 的一种方法。\n\n动态规划（DP）是理查德·贝尔曼在 20 世纪 50 年代提出的一种数学优化方法 [1]。动态规划的核心思想是将复杂问题分解为更简单的子问题，并以递归方式求解。这种方法对于具有重叠子问题和最优子结构性质的问题特别有用，这意味着子问题的解可用于求解整体问题。\n\
  \n在强化学习的背景下，动态规划算法可以帮助智能体找到最优价值函数 `V*` 和 `Q*`。\n\n我们在第 2 章中介绍的贝尔曼方程提供了一种递归计算价值函数\
  \ `Vπ` 和 `Qπ` 的方法。具体来说，贝尔曼方程将状态或状态-动作对的价值表示为在当前策略 `π` 下的期望即时奖励与下一状态或状态-动作对的期望价值之和。这种递归形式允许我们迭代地计算价值函数，从初始猜测开始，不断更新数值直至收敛到\
  \ `V*` 和 `Q*`。\n\n然而，要使用 DP 算法找到真正的最优价值函数，智能体需要拥有完美的环境模型，这意味着 DP 算法是基于模型的强化学习方法。\n\
  \n此外，DP 算法的计算成本可能很高，尤其是在状态和动作空间较大的问题中。因此，本书后续将介绍的蒙特卡洛方法和时序差分学习等其他强化学习方法，已被开发出来以克服这些局限性。\n\
  \n总体而言，当拥有完美的环境模型时，DP 算法为解决强化学习问题提供了一个强大的框架。通过将问题分解为更简单的子问题，并利用贝尔曼方程计算价值函数，我们可以找到最大化期望累积奖励的最优策略\
  \ `π*`。\n\n\n\n### 3.1 使用动态规划求解马尔可夫奖励过程问题\n\n为了开始学习动态规划算法，我们首先关注马尔可夫奖励过程（MRP）的情况。它比马尔可夫决策过程（MDP）简单得多，因为过程中不涉及任何动作。我们仍然聚焦于在第\
  \ 2 章中介绍的服务犬 MRP 问题。\n\n在马尔可夫奖励过程（MRP）中，状态值函数的贝尔曼方程表示为：\n\n![$$\\displaystyle \\\
  begin{aligned} V(s)=R(s) + {\\gamma} \\sum_{s' \\in \\mathcal{S}} P(s'|s) V(s'),\
  \ \\quad \\mbox{for all}\\; s \\in \\mathcal{S} \\end{aligned} $$](img/605748_1_En_3_Chapter_TeX_Equa.png)\n\
  \n这里，`γ` 是折扣率；`R(s)` 是从环境获得的奖励；`P(s' | s)` 是环境的动态函数，它指定了从状态 `s` 转移到 `s'` 的概率；`V(s')`\
  \ 是后继状态的值。\n\n如果我们能够访问 MRP 的真实模型，就可以使用动态规划方法来计算 MRP 不同状态的状态值。动态规划算法的工作原理是：在每次迭代中遍历\
  \ MRP 的整个状态空间，利用后继状态的奖励和折扣值来计算并更新每个状态的状态值。这个过程会重复大量迭代，直到获得真实的状态值。该算法的伪代码如算法 1 所示，这正是我们在第\
  \ 2 章中用于计算服务犬 MRP 状态值的算法，如图 2.7 所示。\n\n算法 1：动态规划计算 MRP 的状态值函数\n\n![](img/605748_1_En_3_Figaaa_HTML.gif)\
  \ 一段三行代码，标题为“DP compute state value function for MRP”，以折扣率 `gamma` 作为输入，输出 MRP 的状态值函数\
  \ `V`。\n\n但强化学习主要关注的是求解马尔可夫决策过程（MDP），这涉及智能体在学习过程中做出决策。在本章的剩余部分，我们将重点讨论如何使用动态规划算法来求解\
  \ MDP。\n\n### 3.2 策略评估\n\n求解强化学习或 MDP 问题的目标是找到最优策略 `π*`。然而，在开始搜索最优策略之前，我们先考虑一个更简单的问题：给定两个不同的策略\
  \ `π` 和 `π'`，我们如何判断哪个更好？\n\n为了回答这个问题，我们可以使用状态值函数 `Vπ`。值函数通过衡量从某个状态开始并遵循策略 `π` 所获得的期望回报，来评估智能体处于该状态的好坏程度。如果我们对策略\
  \ `π` 和 `π'` 各自的状态值函数有准确的估计，就可以衡量这两个策略之间的差异。当对于状态空间中的所有状态 `s`，期望回报 `Vπ'(s)` 大于或等于\
  \ `Vπ(s)` 时，我们就说策略 `π'` 与策略 `π` 一样好或更好：\n\n![$$\\displaystyle \\begin{aligned} \\\
  pi' \\ge \\pi \\quad \\mbox{if}\\; V_{\\pi'}(s) \\ge V_\\pi(s), \\quad \\mbox{for\
  \ all}\\; s \\in \\mathcal{S} \\end{aligned}$$](img/605748_1_En_3_Chapter_TeX_Equb.png)\n\
  \n我们可以利用 `Vπ` 的贝尔曼方程和环境模型来估计策略 `π` 下单个状态 `s` 的值。为了计算状态空间中每个状态的值，我们可以通过迭代地使用 `Vπ`\
  \ 的贝尔曼方程和环境模型来计算状态空间中每个状态的值，从而推广这一过程。这个过程被称为*策略评估*。该算法估计任意策略 `π` 的状态值函数 `Vπ`。策略评估也被称为预测，因为它预测了策略\
  \ `π` 的状态值函数。\n\n策略评估算法的核心是 `Vπ` 的贝尔曼方程：\n\n![$$\\displaystyle \\begin{aligned}\
  \ V_\\pi(s) &amp; =\\mathbb{E}_{\\pi\\!\\!}\\left[R_t + {\\gamma} V_\\pi(S_{t+1})\
  \ \\;\\Big|\\;S_t=s\\right] \\\\ &amp; =\\sum_{a \\in A} \\pi(a|s) \\Big[R(s, a)\
  \ + {\\gamma} \\sum_{s' \\in \\mathcal{S}} P(s'|s, a) V_\\pi(s') \\Big], \\quad\
  \ \\mbox{for all}\\; s \\in \\mathcal{S} {} \\end{aligned} $$](images/605748_1_En_3_Chapter/605748_1_En_3_Chapter_TeX_Equ1.png)\n\
  \n(3.1)\n\n\n\n该算法使用贝尔曼方程作为更新规则，并在值更新过程中使用环境模型（动力学函数和奖励函数）。理论上，如果我们无限运行该算法，计算出的值将收敛到策略`π`的真实值。需要注意的是，只要算法满足特定条件（例如运行无限次迭代且折扣因子小于\
  \ 1），就能保证收敛。收敛速度取决于策略和问题实例。\n\n例如，考虑一个简单的网格世界，其中包含一个目标状态和一个陷阱状态，如图 3.1 所示。智能体到达目标状态获得+1\
  \ 奖励，掉入陷阱状态获得-1 奖励。所有其他状态转移的奖励为 0。智能体在每个状态有四个可用动作：上、下、左、右。假设我们有一个任意策略，该策略始终向上移动，但在目标状态停止。我们可以使用策略评估来估计该策略的值函数，然后与其他策略进行比较。通过对网格世界中的每个状态重复贝尔曼更新方程，我们可以估计给定策略下每个状态的值。这个过程可以迭代重复，直到收敛。最终的状态值函数可以帮助我们衡量策略的质量，并识别可以改进策略的区域。例如，在网格世界问题中，如果发现陷阱正上方状态的值高于陷阱正下方状态的值，我们可以推断在该特定状态下向下移动比向上移动更好，以避免陷阱。\n\
  \n总体而言，策略评估是强化学习中的重要算法，因为它允许我们估计给定策略的值函数，这是解决强化学习问题的关键步骤。值得注意的是，还有其他方法（如蒙特卡洛和时间差分学习）可用于估计值函数，但策略评估是一种基础方法，构成了许多其他强化学习算法的基础。\n\
  \n该算法接受一个任意策略`π`、一个折扣因子`γ`和一个决定停止标准的小阈值`ε`。算法从所有状态的初始估计值为零开始，然后迭代，直到估计值收敛到输入策略`π`的真实状态值。具体来说，算法通过使用当前策略`π`选择下一个动作，对下一时间步获得的即时奖励和下一状态的估计值进行加权平均，来更新每个状态的估计值，这体现在公式(3.2)中。\n\
  \n```\nV_π^{k+1}(s) ← Σ_{a ∈ A} π(a|s) [R(s, a) + γ Σ_{s' ∈ S} P(s'|s, a) V_π^k(s')]\n\
  ```\n\n(3.2) 其中`V_π^k(s)`是状态`s`在第`k`次迭代的估计值，`π(a|s)`是在策略`π`下在状态`s`中选择动作`a`的概率，`P(s'|s,\
  \ a)`是转移到后继状态`s'`的概率，`R(s, a)`是智能体在状态`s`采取动作`a`时环境提供的奖励。算法对所有状态重复此更新，直到所有状态的更新值与先前估计值之间的差异小于`ε`。该阈值决定了停止标准，并确保算法在估计值收敛到真实值时终止。\n\
  \n![一个 6x8 的网格，第二行第七个单元格标记为+1，第五行第四个单元格标记为-1。](img/605748_1_En_3_Fig1_HTML.png)\n\
  \n图 3.1 网格世界示例\n\n算法 2：策略评估，迭代算法\n\n![一个标题为“策略评估，迭代算法”的算法，输入为待评估的策略π、折扣率γ和决定估计精度的小阈值ε，输出为输入策略π的估计状态值函数\
  \ V_π。](img/605748_1_En_3_Figaab_HTML.gif)\n\n在策略评估算法的每次迭代中，智能体遍历状态空间中的所有状态。对于每个状态，智能体可以选择多个动作，每个动作根据策略`π`有不同的选择概率。从每个动作`a`开始，环境可能转移到多个后继状态`s'`之一，转移概率`p`取决于当前状态`s`和智能体采取的动作`a`。这是可能的，因为智能体可以访问环境的真实模型，即每个状态-动作对的奖励信号`R(s,a)`和转移概率`P(s'|s,a)`。该算法使用公式(3.1)作为备份规则，该规则对所有可能的结果进行平均，并按各自的概率加权。\n\
  \n\n\n一旦智能体为每个状态计算出了新的价值估计，它就会使用这些更新后的值开始新一轮迭代。虽然估计值最终会收敛到策略`π`的真实值，但在实践中，我们必须在此之前决定何时停止算法。为了判断算法何时收敛到价值函数的精确估计，我们比较每个状态`s`的更新值`V_π(s)`与先前估计值之间的绝对差值，并记录每次迭代中所有状态的最大绝对差值。在完成对所有状态的一轮完整迭代后，我们将最大绝对差值与一个小的阈值`ε`进行比较。如果这个最大绝对差值小于`ε`，我们就认为算法已经收敛并终止循环。\n\
  \n将所有状态的估计值存储在一个数组中，可以加速评估过程，因为它允许我们原地更新这些值。这意味着我们可以更新某个特定状态的价值函数估计，然后立即在后续计算中使用更新后的值，而无需将其复制到新的数据结构中。\n\
  \n相反，如果我们将每个状态的估计值存储在单独的数据结构中，那么每次更新都需要将更新后的值从一个数据结构复制到另一个。这种复制操作在计算上可能非常昂贵，尤其是在状态数量很多的情况下。\n\
  \n此外，将所有状态的值存储在一个数组中，还可以使代码更简单、更易读。遍历单个数组比跟踪每个状态的多个数据结构要容易得多。\n\n总的来说，将所有状态的估计值存储在一个数组中，是一种实用的优化方法，既能提高代码速度，也能提升代码清晰度。\n\
  \n#### 工作示例\n\n让我们使用策略评估算法，为服务犬 MDP 的一个（固定的）随机策略`π`估计状态价值函数`V_π`。图 3.2 中显示的值是使用折扣因子\
  \ 0.9 和阈值`1e-5`计算得出的。\n\n值得注意的是，无论输入策略是最优的还是随机的，终止状态的价值始终为零。这是因为状态价值函数衡量的是从状态`s`开始，遵循策略`π`的期望回报。由于环境到达终止状态后没有即时奖励或后续状态，其价值始终为零。\n\
  \n### 3.3 策略改进\n\n强化学习的最终目标是找到最优策略`π*`，该策略能最大化整个状态空间中所有状态的期望回报。然而，对于具有大规模状态和动作空间的\
  \ MDP，逐一搜索整个策略空间以找到`π*`是不可行的。幸运的是，有一种更高效的方法来改进给定策略，这被称为策略改进。\n\n策略改进背后的思想很简单。我们不是一次性寻找最优策略，而是通过修改当前策略，使其相对于当前策略的估计状态-动作价值函数`Q_π`变得更贪婪，从而迭代地对当前策略进行微小且渐进的改进。如果修改后的策略至少对一个状态有更高的期望回报，那么它一定优于原始策略。这是策略改进背后的关键概念，并基于以下定理：\n\
  \n图 3.2 服务犬 MDP 随机策略`π`的状态价值，`γ=0.9`且`ε=1e-5`\n\n对于任意两个确定性策略`π`和`π'`，`π'`至少与`π`一样好，当且仅当对于所有状态`s\
  \ ∈ S`，有`V_π'(s) ≥ V_π(s)`。\n\n这里，`V_π(s)`是状态`s`在策略`π`下的估计值。换句话说，如果一个修改后的策略至少对一个状态增加了期望回报，那么它就优于原始策略。\n\
  \n这就是我们需要使用状态-动作价值函数`Q_π(s, a)`的地方，因为状态价值函数`V_π(s)`无法告诉我们，当智能体处于状态`s`并遵循策略`π`时，哪个动作更好。我们已经在第\
  \ 2 章中介绍了`Q_π`的贝尔曼方程。以下是快速回顾。\n\n```\nQ_π(s, a) = R(s, a) + γ E_π[Q_π(s', a') |\
  \ S_{t+1}=s', A_{t+1}=a']\n          = R(s, a) + γ Σ_{s'∈S} P(s'|s, a) Σ_{a'∈A}\
  \ π(a'|s') Q_π(s', a'), 对于所有 s∈S, a∈A\n```\n(3.3)\n\n\n\n方程（3.3）告诉我们如何使用 `Q_π` 更新状态-动作对\
  \ `(s, a)` 的值，但我们目前还没有 `Q_π` 的精确估计。幸运的是，`Q_π` 与 `V_π` 之间存在关系，其中 `V_π(s) = Σ_{a ∈\
  \ A} π(a|s) Q_π(s, a)`。我们已经知道如何使用策略评估算法来计算策略 `π` 的状态价值函数 `V_π`。并且我们可以简单地将 `V_π`\
  \ 代入方程（3.4），这将帮助我们完成估计的状态-动作价值函数 `Q_π` 的值更新规则。\n\n```\nQ_π(s, a) = R(s, a) + γ Σ_{s'\
  \ ∈ S} P(s'|s, a) V_π(s'), 对于所有 s ∈ S, a ∈ A\n```\n\n(3.4)\n\n这个方程告诉我们，在状态 `s` 下采取动作\
  \ `a` 并随后遵循策略 `π` 的价值，等于期望奖励 `R_t` 加上下一状态 `S_{t+1}` 的折扣价值，而下一状态的价值由状态价值函数 `V_π(S_{t+1})`\
  \ 给出。我们可以使用策略评估算法计算所有状态-动作对的 `Q_π`。\n\n一旦我们有了状态-动作价值函数 `Q_π` 的估计，就可以执行策略迭代，这包括通过使策略相对于\
  \ `Q_π` 变得更贪婪来改进策略。具体来说，我们可以通过在每个状态下选择最大化状态-动作价值函数的动作来构建一个新策略 `π'`。\n\n我们现在介绍*策略改进*算法，如算法\
  \ 3 所示。该算法接收任意策略 `π`（来自策略评估算法）的估计状态价值函数 `V_π` 作为输入。然后它遍历状态空间中的所有状态；对于每个状态，它遍历该状态下的所有（合法）动作，基于环境模型和\
  \ `V_π` 计算状态-动作价值函数 `Q_π`。遍历完成后，它使用 `Q_π` 计算一个更好、改进后的确定性策略 `π'`。具体做法是遍历状态空间中的所有状态；对于每个状态，它更新每个动作的策略概率分布，使得选择具有最高估计价值\
  \ `Q_π(s, a)` 的动作的概率为 1，而选择其他动作的概率为 0。\n\n算法 3：策略改进，迭代算法\n\n![](img/605748_1_En_3_Figaac_HTML.gif)\
  \ 一个名为“策略改进，迭代算法”的 10 行算法，接收以下输入，输出改进后的确定性策略 `π'`。输入包括：策略 `π` 的估计状态价值函数 `V_π` 和折扣率\
  \ `γ`。\n\n策略改进算法包含两个步骤：第一步是使用方程（3.3）和环境模型，为当前策略 `π` 计算估计的状态-动作价值函数 `Q_π`；第二步是基于\
  \ `Q_π` 构建一个新的、更好的确定性策略 `π'`，从而改进策略 `π`。与策略评估算法不同，策略改进算法不会无限运行。它只执行这两个步骤一次。这是合理的，因为现在我们有了一个新的、更好的策略\
  \ `π'`；由于策略已经改变，旧的状态价值函数 `V_π` 不再代表这个新策略的价值。\n\n为了实现算法 3，我们可以使用一个形状为（状态空间大小，动作空间大小）的二维矩阵来表示状态-动作价值函数\
  \ `Q_π`。需要注意的一点是，在构建改进策略的过程中，我们只应考虑特定状态下的合法动作；合法动作是指当前状态下可用的动作。排除非法动作很重要，因为这能确保动作选择过程正确执行，并且不会导致次优甚至危险的行为。\n\
  \n在强化学习中，当基于估计的状态-动作价值函数构建策略时，排除非法动作尤为重要。如果不排除非法动作，策略可能会选择次优甚至非法的动作，从而导致性能不佳或无法达到预期目标。通过在动作选择过程中仅考虑合法动作，策略可以确保在给定状态下选择可能的最佳动作，同时仍然满足任何约束或安全要求。\n\
  \n例如，考虑一个在工厂环境中运行的机器人，它受到某些安全约束，例如不能与其他机器人或物体碰撞。如果机器人的动作选择过程包含非法动作，例如向会导致碰撞的方向移动，则可能对自身、其他机器人或工厂环境造成损害。\n\
  \n另一个具体例子如下：假设对于某个状态 `s`，所有合法动作的价值都是负数 `Q_π(s, a) < 0`；如果我们不排除非法动作，那么标准的 `argmax`\
  \ 将总是选择其中一个非法动作，因为零大于负数。\n\n\n\n### 3.4 策略迭代\n\n策略迭代是一种在马尔可夫决策过程（MDP）中寻找最优策略的算法。该算法包含两个主要步骤：策略评估和策略改进，通过迭代应用这两个步骤来优化策略，直至其收敛到最优策略。\n\
  \n策略迭代背后的核心思想是利用价值函数贪婪地选择更优的动作，然后根据新策略更新价值函数。算法从一个初始策略开始（通常随机选择），然后通过估计价值函数并选择更优的动作来迭代改进策略。\n\
  \n策略迭代算法在循环中迭代执行这两个步骤。在每次迭代中，我们首先使用策略评估算法，为当前策略 `π^i` 估计状态价值函数 `V_π^i`。该价值函数表示从给定状态出发，遵循该策略所能获得的期望累积奖励。\n\
  \n```\nπ⁰ → (评估) V_π⁰ → (改进) π¹ → (评估) V_π¹ → (改进) π² → ... → (改进) π_*\n```\n\n\
  一旦我们估计出价值函数，就通过运行策略改进算法来利用它选择更优的动作。策略改进算法基于估计出的价值函数，贪婪地选择能使期望累积奖励最大化的动作。这个新策略记为\
  \ `π^(i+1)`，是对前一个策略 `π^i` 的改进。\n\n我们重复这两个步骤——策略评估和策略改进——直到收敛。当旧策略 `π^i` 与 `π^(i+1)`\
  \ 在状态空间中的每一个状态上都相同时，即表示无法再做出任何改进，此时达到收敛。\n\n策略迭代算法总结于算法 4 中。请注意，该算法计算量可能很大，尤其对于大型\
  \ MDP 而言，但它保证能收敛到最优策略。\n\n**算法 4：策略迭代，迭代算法**\n\n一个名为“策略迭代，迭代算法”的 6 行算法，接收以下输入，输出最优策略\
  \ `π*` 以及最优价值函数 `V*`、`Q*` 作为结果。折扣率 `γ`，一个决定估计精度的小阈值 `ε`。\n\n针对服务犬 MDP 的最优策略 `π`\
  \ 的节点图突出了以下路径：从房间 1 到房间 2，`r = -1`。从房间 2 到房间 3，`r = -1`。房间 3 = 找到物品，`r = 10`。从室外到房间\
  \ 2，`r = 0`。\n\n**图 3.3** 服务犬 MDP 的最优策略 `π_*`\n\n总的来说，策略迭代是在 MDP 中寻找最优策略的一种强大算法。通过迭代地改进策略并更新价值函数，我们可以收敛到最优策略。然而，务必注意，策略迭代算法可能不适用于大型\
  \ MDP，因为其计算量可能很大。在这种情况下，其他算法如值迭代（我们将在本章后面介绍）可能更为合适。\n\n#### 工作示例\n\n我们可以使用策略迭代算法来解决我们的服务犬\
  \ MDP 问题。计算出的该 MDP 的最优策略 `π_*` 如图 3.3 所示。与最优策略一起，我们还能得到最优价值函数 `V_*` 和 `Q_*`，分别如图\
  \ 3.4 和图 3.5 所示。这些值是在折扣因子 `γ = 0.9` 下计算得出的。\n\n**表 3.1** 不同折扣因子 `γ` 下服务犬 MDP 的最优状态价值\n\
  \n| 折扣因子 | 房间 1 | 房间 2 | 房间 3 | 室外 | 找到物品 |\n|----------|--------|--------|--------|---------|------------|\n\
  | `γ = 0.0` | -1.0 | -1.0 | 10.0 | 0.0 | 0 |\n| `γ = 0.3` | -0.4 | 2.0 | 10.0 |\
  \ 0.6 | 0 |\n| `γ = 0.5` | 1.0 | 4.0 | 10.0 | 2.0 | 0 |\n| `γ = 0.7` | 3.2 | 6.0\
  \ | 10.0 | 4.2 | 0 |\n| `γ = 0.9` | 6.2 | 8.0 | 10.0 | 7.2 | 0 |\n| `γ = 1.0` |\
  \ 8.0 | 9.0 | 10.0 | 9.0 | 0 |\n\n针对服务犬 MDP 的最优状态-动作价值函数 `Q*` 的节点图运行如下：从 6.2 到 8.2，`Q*\
  \ = 6.2`。从 8.2 到 10.0，`Q* = 8.0`。从 10.0 到 0.0，`Q* = 10`。从 8.2 到 7.2，`Q* = 6.5`。7.2\
  \ 返回到 8.2，`Q* = 7.2`。7.2 自循环，`Q* = 4.8`。\n\n**图 3.5** 服务犬 MDP 的最优状态-动作价值函数 `Q_*`，`γ\
  \ = 0.9`\n\n针对服务犬 MDP 的最优状态价值函数 `V*` 的节点图运行如下：从 6.2 到 8.2，`r = -1`。从 8.2 到 10.0，`r\
  \ = -1`。从 10.0 到 0.0，`r = 10`。从 8.2 到 7.2，`r = 0`。7.2 返回到 8.2，`r = 0`。7.2 自循环，`r\
  \ = -1`。\n\n**图 3.4** 服务犬 MDP 的最优状态价值函数 `V_*`，`γ = 0.9`\n\n通过使用不同的折扣因子 `γ` 运行策略迭代算法，我们可以观察到折扣因子如何影响状态价值，如表\
  \ 3.1 所示。值得注意的是，终止状态的价值始终为零。\n\n\n\n### 3.5 通用策略迭代\n\n策略迭代算法是强化学习中一种广泛使用且有效的方法。其特点在于同时运行策略评估和策略改进过程。所有策略迭代算法都共享这一基本结构和概念，但我们可以灵活地修改策略评估和策略改进步骤的具体实现方式。\n\
  \n在策略迭代中，我们从一个初始策略开始，该策略是从状态到动作的映射。然后，我们执行策略评估来估计该策略的价值函数。这涉及遍历状态空间，计算每个状态在该策略下的期望价值，并相应地更新价值函数。策略评估之后，我们通过构建一个相对于价值函数比旧策略更贪婪的新策略来执行策略改进。这个新策略是通过选择能够最大化下一状态期望价值的动作获得的，从当前状态开始，并重复此过程直到回合结束。然后，新策略被用于下一轮策略评估，并重复此过程直至收敛。\n\
  \n算法 5：通用策略迭代\n\n![](img/605748_1_En_3_Figaae_HTML.gif) 一个 4 行算法，标题为通用策略迭代，接收以下输入，在搜索后输出最优策略\
  \ `pie`。`I = 0` 和随机策略 `pie` 的零次方。\n\n尽管动态规划通常被认为是一种基于模型的强化学习方法，但策略迭代在实践中既可用于基于模型的方法，也可用于无模型的方法。对于基于模型的方法，策略评估步骤涉及从模型中计算状态转移概率和奖励；而对于无模型的方法，这些值则通过蒙特卡洛或时序差分方法从经验中估计得出，我们将在本书后面讨论这些方法。\n\
  \n### 3.6 价值迭代\n\n价值迭代是一种在强化学习中寻找最优策略的强大算法。虽然策略迭代很有效，但其一个缺点是，要找到最优策略 `π*`，需要多次迭代策略评估和策略改进，这可能既耗时又计算成本高昂。价值迭代通过将策略评估和策略改进合并为一步来解决这个问题。\n\
  \n为了找到最优策略，价值迭代算法直接计算最优状态价值函数 `V*`，而不是针对任意策略 `π` 估计其状态价值函数 `Vπ`。最优状态价值函数 `V*` 是在整个策略空间中具有最高状态价值的函数。\n\
  \n价值迭代算法使用 `V*` 的贝尔曼最优方程作为更新规则来更新不同状态的价值。该方程计算在当前状态和动作下，奖励的期望值加上下一状态的折扣价值。在所有可能动作中，该表达式的最大值被用来更新当前状态的价值。重复此过程，直到所有状态的价值收敛到其最优值。\n\
  \n```\nV*(s) = max_a E[R_t + γ V*(S_{t+1}) | S_t = s, A_t = a]\n      = max_a [R(s,\
  \ a) + γ Σ_{s' ∈ S} P(s'|s, a) V*(s')], 对于所有 s ∈ S\n```\n\n(3.5)\n\n这里，`s` 表示当前状态，`a`\
  \ 是一个动作，`R_t` 是时间 `t` 的奖励，`γ` 是折扣因子，`S_{t+1}` 是下一状态，`P(s'|s, a)` 是在动作 `a` 下从状态 `s`\
  \ 转移到状态 `s'` 的概率，`V*(s')` 是下一状态的最优价值。\n\n价值迭代算法扫描状态空间中的所有状态，对于每个状态，它使用公式 (3.5) 作为更新规则来计算该状态的估计最优价值。这是利用环境的模型（奖励函数和动态函数）完成的。一旦当前扫描完成，算法对所有状态重复此过程，直到收敛到真正的最优状态价值函数\
  \ `V*`。\n\n一旦我们有了 `V*`，就可以轻松计算出最优策略 `π*`。对于状态空间中的每个状态，我们选择能使其后继状态价值最高的动作。然后，我们将选择此动作的概率设为\
  \ 1，所有其他动作的概率设为 0。这个过程产生一个确定性策略，该策略将始终选择能带来最高期望奖励的动作。\n\n总之，价值迭代是一种在强化学习中寻找最优策略的高效算法。它通过直接使用贝尔曼最优方程计算最优状态价值函数，将策略评估和策略改进合并为一步。一旦计算出最优状态价值函数，通过为状态空间中的每个状态选择能带来最高期望奖励的动作，就可以很容易地确定最优策略。\n\
  \n算法 6 展示了价值迭代算法的伪代码，该算法使用公式 (3.5) 作为价值更新规则。为了说明价值迭代算法的应用，我们可以使用服务犬 MDP 的例子。将价值迭代算法应用于服务犬\
  \ MDP，应该会得到与图 3.3 和图 3.4 相同的结果。然而，需要注意的是，对于这个简单的例子，价值迭代算法相对于策略迭代算法的加速效果可能并不明显。这可能是由于问题中的状态和动作数量相对较少，或者因为对于这个特定问题，两种算法的计算复杂度相似。\n\
  \n算法 6：价值迭代，迭代算法\n\n![](img/605748_1_En_3_Figaaf_HTML.gif) 一个 15 行算法，标题为价值迭代，迭代算法，接收以下输入，输出最优策略\
  \ `π*` 和最优状态价值函数 `V*`。折扣率 `γ` 和决定估计精度的小阈值 `ε`。\n\n当状态和动作空间足够小，可以显式计算价值函数或策略时，动态规划是解决\
  \ MDP 的有效方法。然而，对于更大的问题，其他方法如蒙特卡洛方法和时序差分学习则更为实用。\n\n\n\n### 3.7 本章小结\n\n本章概述了动态规划（DP），这是一类通过将复杂问题分解为可递归求解的较小子问题来解决马尔可夫决策过程（MDP）的算法。我们首先讨论了如何利用动态规划求解马尔可夫奖励过程（MRP），这涉及计算表示从给定状态出发的期望累积奖励的价值函数。\n\
  \n接着，我们重点讨论了如何利用动态规划求解 MDP，涵盖了策略评估和策略改进这两个基本步骤。策略评估计算给定策略下的价值函数，而策略改进则基于当前价值函数寻找更优的策略。策略迭代算法在这两个步骤之间交替进行直至收敛，但由于两个步骤都需要多次迭代，计算成本可能很高。通用策略迭代算法是一种更灵活的版本，允许在策略评估和策略改进之间投入不同程度的精力，因此更具实用性。\n\
  \n随后，我们介绍了价值迭代算法，它将策略评估和策略改进合并为单一步骤。价值迭代计算效率高，并且能在有限次迭代内收敛到最优策略。\n\n在下一章中，我们将介绍蒙特卡洛方法，作为求解\
  \ MDP 的另一种方法，它不需要显式了解环境模型（奖励函数和动态函数）。\n\n"
- "# 4. 蒙特卡洛方法\n\n在第 3 章中，我们介绍了动态规划（DP）算法[1]，这些算法能帮助智能体为小型 MDP 找到最优价值函数`V_*`和`Q_*`；这适用于状态空间和动作空间足够小，可以显式计算价值函数或策略的情况。DP\
  \ 算法假设智能体能够访问环境的完美模型（奖励函数和动态函数），因此它们属于基于模型的强化学习方法。然而，在大多数现实世界的强化学习问题中，环境的真实模型对智能体来说是未知的，并且状态或动作空间可能非常大。在本章中，我们将介绍蒙特卡洛方法[2]，这是一种无模型的强化学习算法，它利用智能体的经验来估计价值函数。\n\
  \n术语“蒙特卡洛”指的是通过平均样本回报来利用经验估计价值函数的方法。蒙特卡洛方法利用状态-动作-奖励样本序列，智能体通常通过与模拟环境交互来生成这些样本（也可以使用历史样本）。环境只需支持基本交互，例如当智能体在环境中执行动作时，生成后续状态和奖励信号。与\
  \ DP 方法不同，蒙特卡洛方法不要求环境提供所有可能的后续状态和状态转移概率。然而，蒙特卡洛方法只能用于解决回合制强化学习问题，因为它基于完整的回合序列来平均回报。我们在第\
  \ 3 章中介绍的通用策略迭代算法同样适用于蒙特卡洛方法。\n\n总之，本章将介绍用于无模型强化学习的蒙特卡洛方法。这些方法利用智能体的经验来估计价值函数，无需环境模型。虽然它们不假设马尔可夫性质，但蒙特卡洛方法只能用于解决回合制强化学习问题。\n\
  \n![](img/605748_1_En_4_Fig1_HTML.png)\n\n一个节点图流程如下：`S0`，`S1`通过`A0`，`S2`通过`A1`，`S_T-1`，以及`S_T`通过`A_T-1`。`S1`、`S2`、`S_T-1`和`S_T`节点分别标记为`R0`、`R1`、`R_T-2`和`R_T-1`。所有节点还标有其`G`值方程。\n\
  \n**图 4.1** 蒙特卡洛策略评估的思想，用于估计单个回合序列的状态价值\n\n### 4.1 蒙特卡洛策略评估\n\n提醒一下，策略评估的目标是估计给定策略`π`下的状态价值函数。与动态规划类似，我们从蒙特卡洛策略评估（预测）开始。然而，由于蒙特卡洛是一种无模型的强化学习方法，我们无法使用环境模型和贝尔曼方程作为更新规则来迭代计算价值。那么，在使用蒙特卡洛方法时，我们如何计算状态价值呢？\n\
  \n让我们重新审视状态价值函数`V_π`的定义，它衡量从状态`s`出发，然后遵循策略`π`的期望回报，如公式（4.1）所示。\n\n```\nV_π(s) =\
  \ E_π[G_t | S_t = s]\n       = E_π[R_t + γ R_{t+1} + γ² R_{t+2} + ... | S_t = s]\n\
  \       = E_π[R_t + γ G_{t+1} | S_t = s]\n```\n\n(4.1)\n\n给定一个由遵循策略`π`的智能体生成的状态-动作-奖励序列`S0,\
  \ A0, R0, S1, A1, R1, ..., S_{T-1}, A_{T-1}, R_{T-1}, S_T`，我们可以使用公式`G_t = R_t +\
  \ γ G_{t+1}`计算从任意时间步`t`到回合结束的折现累积奖励，如图 4.1 所示。从状态`s`开始的该序列的期望值可以通过蒙特卡洛策略评估来估计，这涉及对大量样本回合的回报进行平均。这便得到了状态价值函数`V_π`的估计值。\n\
  \n在蒙特卡洛策略评估中，智能体从自身的经验中学习。它在遵循策略`π`的同时收集大量样本回合，并对这些样本回合中相应环境状态的回报进行平均。随着样本数量的增加，平均后的价值将收敛到真实的状态价值`V_π`。然而，在遵循策略`π`时，智能体在单个回合中通常只访问少数几个状态。因此，我们通常需要运行算法大量回合，才能获得`V_π`的准确估计。根据大数定律，当对特定状态`s`的总访问次数趋于无穷时，遵循策略`π`下的估计状态价值`V_π(s)`也会收敛到真实值。但在实践中，我们通常需要在更短的时间内停止评估过程。\n\
  \n\n\n总之，蒙特卡洛策略评估是一种无模型方法，它通过收集大量样本回合并计算对应环境状态的平均回报，来估计给定策略的状态价值函数。智能体从自身经验中学习，无需环境模型或贝尔曼方程来估计状态价值。然而，该算法通常需要大量回合才能准确估计`V_π`，因为智能体在单个回合中可能只访问少数几个状态。蒙特卡洛策略评估通常用于解决回合制强化学习问题，即过程在有限步数后终止。\n\
  \n#### 首次访问蒙特卡洛策略评估\n\n在上一节中，我们讨论了蒙特卡洛策略评估的基本思想：通过遵循策略`π`生成大量样本回合，并利用这些回合来估计状态价值函数`V_π(s)`。\n\
  \n首次访问蒙特卡洛策略评估算法（如算法 1 所示）是该思想的一种具体实现。对于每个回合，我们计算该回合中每个时间步`t = 0, 1, 2, ..., T-1`的回报`G_0,\
  \ G_1, G_2, ..., G_{T-1}`，其中`T`是回合终止的时间步。然后，我们遍历该回合中的状态`S_0, S_1, S_2, ..., S_{T-1}`，并更新每个状态的状态价值函数估计值。\n\
  \n为了更新状态`S_t`的估计值，我们检查这是否是当前回合中首次访问该状态（因此得名“首次访问”蒙特卡洛）。如果是，我们更新两个量：总回报`G(S_t)`，即所有回合中访问`S_t`时的回报`G_t`之和；以及访问计数`N(S_t)`，即所有回合中访问`S_t`的次数。然后，我们可以计算状态`S_t`的平均回报为`Ḡ(S_t)\
  \ = G(S_t) / N(S_t)`。\n\n在每个回合结束时，我们通过计算所有访问过该状态的回合中观察到的回报的平均值，来更新每个状态的状态价值函数估计值。此过程持续固定数量的回合。该方法的一个缺点是，我们必须手动选择要运行的回合数，如果数量太少，估计值可能不准确。\n\
  \n算法 1：`V[π]`的首次访问蒙特卡洛策略评估\n\n![](img/605748_1_En_4_Figaaa_HTML.gif) 一个 9 行算法，标题为`V_π`的首次访问蒙特卡洛策略评估，输入如下，输出为输入策略`π`的估计状态价值函数`V_π`。待评估的策略`π`，折扣率`γ`，以及回合数`K`。\n\
  \n总之，首次访问蒙特卡洛策略评估算法通过生成大量样本回合并利用它们计算每个状态的平均回报，提供了一种估计给定策略状态价值函数的方法。虽然该方法存在一些局限性，但它是理解强化学习算法行为的有用工具，并可应用于广泛的问题。\n\
  \n#### 首次访问与每次访问\n\n蒙特卡洛策略评估是一种利用模拟经验估计给定策略状态价值函数的算法。实现该算法时必须做出的一个重要决定是采用首次访问还是每次访问方法。\n\
  \n在蒙特卡洛策略评估的背景下，“访问”一词指的是智能体在回合中进入某个状态的时刻。由于一个回合可能多次访问同一状态，因此在评估过程中如何处理这些重复访问至关重要。\n\
  \n在首次访问蒙特卡洛策略评估中，算法在计算状态价值时仅考虑回合中首次访问该状态的情况。当前回合中对该状态的所有后续访问均被忽略。例如，假设一个智能体在迷宫环境中导航，并在一个回合中多次访问状态`s`。首次访问方法只会考虑首次访问状态`s`后获得的回报，而忽略当前回合中对该状态`s`的所有后续访问。\n\
  \n另一方面，每次访问蒙特卡洛策略评估会在回合中每次访问某个状态时更新其价值。继续迷宫示例，如果智能体在一个回合中访问状态`s`十次，每次访问方法将使用每次访问后获得的回报来更新该状态的价值函数。\n\
  \n这两种方法之间存在一些重要差异。首次访问方法是无偏的，这意味着随着回合数趋近于无穷大，估计状态价值函数的期望值会收敛到真实值。然而，每次访问方法可能具有更低的方差，这意味着估计值不太可能远离真实值。\n\
  \n在实践中，选择首次访问还是每次访问方法将取决于所解决的具体问题以及偏差与方差之间的期望权衡。在某些情况下，可能需要采用结合两种方法的混合方法。\n\n总体而言，首次访问与每次访问蒙特卡洛策略评估的选择取决于具体问题以及偏差与方差之间的期望权衡。首次访问方法无偏但方差可能更高，而每次访问方法方差可能更低但可能存在偏差。结合两种方法的混合方法可用于在偏差和方差之间取得平衡。\n\
  \n\n\n#### 工作示例\n\n为了更好地理解首次访问蒙特卡洛策略评估与每次访问蒙特卡洛策略评估之间的区别，让我们看一个例子，该例子使用了我们在第 2 章中介绍的导盲犬\
  \ MDP。回顾图 4.2 中所示的导盲犬 MDP 示意图。\n\n假设智能体遵循某个策略`π`，并生成了一个形式为`S0, R0, S1, R1, ...,\
  \ S_{T-1}, R_{T-1}`的情节序列。例如，我们可能得到如下情节：\n\n```\nepisode = {房间 1, -1, 房间 2, -1, 房间\
  \ 3, -2, 房间 2, -1, 房间 3, 10}\n```\n\n为了评估该情节的策略，我们需要计算情节中每个时间步`t`的回报`Gt`。我们使用无折扣`γ\
  \ = 1.0`。回报`Gt`计算为从时间步`t`到情节结束的奖励总和，不应用折扣。例如，对于上述情节，回报`Gt`为：\n\n```\nreturns = {5.0,\
  \ 6.0, 7.0, 9.0, 10.0}\n```\n\n导盲犬 MDP 的节点图流经房间 1、2 和 3，最终到达找到物品。房间 3 回到房间 2，房间\
  \ 2 回到房间 1。房间 2 也通过`r = 0`指向室外，室外通过`r = 0`回到房间 2。室外通过`r = -1`自循环。\n\n**图 4.2** 导盲犬\
  \ MDP\n\n让我们关注状态*房间 2*。我们可以看到，它在单个情节中被访问了两次，一次在`t=1`，另一次在`t=3`。假设我们之前对状态*房间 2*的估计值是从状态*房间\
  \ 2*观察到的回报的样本平均值，即`Vπ(房间 2) = 0.0`。此外，智能体在此策略下之前从未访问过状态*房间 2*，因此该状态的访问次数为`N(房间 2)\
  \ = 0`。\n\n如果我们使用首次访问蒙特卡洛策略评估，那么状态*房间 2*的新值应为`6/1 = 6`。这是因为算法会忽略该情节中第二次访问状态*房间 2*的情况，仅基于首次访问来更新该状态的值。相比之下，如果我们使用每次访问蒙特卡洛策略评估，那么状态*房间\
  \ 2*的值将首先更新为`6/1 = 6`，然后更新为`(6+9)/2 = 7.5`。这是因为每次访问蒙特卡洛策略评估会在情节中每次访问状态时都更新其值。\n\n\
  总结来说，首次访问蒙特卡洛策略评估仅在情节中首次访问状态时更新其值，而每次访问蒙特卡洛策略评估则在情节中每次访问状态时都更新其值。这两种方法之间的差异对于准确估计\
  \ MDP 中状态的值可能很重要。\n\n#### 每次访问蒙特卡洛策略评估\n\n将首次访问蒙特卡洛策略评估扩展到每次访问的情况相当容易；我们只需移除`for`循环内的条件检查，其他所有内容保持不变，如算法\
  \ 2 所示。\n\n**算法 2：** 针对`V[π]`的每次访问蒙特卡洛策略评估\n\n一个名为“针对`Vπ`的每次访问蒙特卡洛策略评估”的 8 行算法，接受以下输入，输出输入策略`π`的估计状态值函数`V`：待评估的策略`π`、折扣率`γ`以及情节数量`K`。\n\
  \n**表 4.1** 针对导盲犬 MDP 的相同随机策略，使用首次访问和每次访问蒙特卡洛策略评估计算的状态值。结果在 100 次独立运行中取平均值；每次运行包含\
  \ 2000 个情节；最后一行包含使用动态规划策略评估计算的真实状态值。在此实验中，我们使用相同的折扣`γ = 0.9`。\n\n| | 房间 1 | 房间 2\
  \ | 房间 3 | 室外 | 找到物品 |\n|---|---|---|---|---|---|\n| 首次访问 MC | −2.67 | −1.85 | 3.16\
  \ | −3.32 | 0 |\n| 每次访问 MC | −2.63 | −1.81 | 3.2 | −3.3 | 0 |\n| DP | −2.66 | −1.85\
  \ | 3.17 | −3.33 | 0 |\n\n我们使用首次访问和每次访问蒙特卡洛策略评估算法来估计导盲犬 MDP 中随机策略`π`的状态值。表 4.1 显示了结果。由于蒙特卡洛方法涉及随机性，我们在\
  \ 100 次独立运行中取平均值，每次运行包含 2000 个情节。对于所有运行，我们将折扣因子`γ`设置为 0.9。使用蒙特卡洛策略评估算法计算的值非常接近使用动态规划策略评估计算的真实值（如表\
  \ 4.1 最后一行所示）。\n\n\n\n### 4.2 增量更新\n\n增量更新的概念是强化学习算法中广泛使用的一种技术，在蒙特卡洛策略评估中尤其有用。增量更新的核心思想是逐步更新估计值，而非一次性完成更新。这具有若干优势，包括更快的收敛速度、更好的内存效率，以及能够在新数据可用时实时更新估计值。\n\
  \n增量更新公式可表示如下：\n\n![$$\\displaystyle \\begin{aligned} \\mbox{新估计值}=\\mbox{旧估计值}\
  \ + \\mbox{步长} \\Big[\\mbox{目标值} - \\mbox{旧估计值} \\Big] \\end{aligned}$$](images/605748_1_En_4_Chapter/605748_1_En_4_Chapter_TeX_Equc.png)\n\
  \n其中 `OldEstimate` 是之前的估计值，`StepSize` 是一个决定更新幅度的小正数常量，`Target` 是一个新的样本值。`Target\
  \ - OldEstimate` 这一项通常被称为估计误差，它代表了新样本值与先前估计值之间的差异。\n\n在蒙特卡洛策略评估中，增量更新可用于估计某个状态的价值函数。具体来说，我们可以利用从特定幕中获得的样本回报\
  \ `G_t` 来更新状态 `S_t` 的估计价值函数：\n\n![$$\\displaystyle \\begin{aligned} V_\\pi(S_t)\
  \ = V_\\pi(S_t) + \\frac{1}{N(S_t)} \\Big( G_t - V_\\pi(S_t) \\Big) {} \\end{aligned}\
  \ $$](img/605748_1_En_4_Chapter_TeX_Equ2.png)\n\n(4.2)\n\n其中 `V_π(S_t)` 是状态 `S_t`\
  \ 的估计价值函数，`N(S_t)` 是状态 `S_t` 被访问的次数。公式 (4.2) 中的更新公式代表了一种增量更新，即根据样本回报与先前估计值之差成比例的小步长来更新估计价值函数。\n\
  \n首次访问情况下的增量蒙特卡洛策略评估算法如算法 3 所示。在每一幕中，对于该幕中的每个时间步 `t`，我们首先检查状态 `S_t` 是否为首次被访问，然后更新该幕的回报和\
  \ `S_t` 的访问次数，此过程持续进行直到达到终止状态。最后，我们使用公式 (4.2) 中的增量更新方程更新每个被访问状态的估计价值函数。每次访问情况只需移除\
  \ for 循环内的条件检查即可轻松实现。\n\n算法 3：针对 `V[π]` 的首次访问蒙特卡洛策略评估（含增量更新）\n\n![](img/605748_1_En_4_Figaac_HTML.gif)\
