  \ Q-learning 中，我们寻找后续状态所有动作中的最大值。在本例中，动作*前往房间 3*的值为 `1.98`。我们可以按如下方式计算状态-动作对*房间\
  \ 1*和*前往房间 2*的值：\n\n```\nQ(房间 1, 前往房间 2) = 0 + 0.1 * (-1 + 0.9 * 1.98 - 0) \n  \
  \                     = 0.078\n```\n\n我们进行了实验，以评估 Q-learning 算法在服务犬 MDP 上的性能，实验设置与我们之前使用\
  \ SARSA 的实验相同。这些实验的目标是在这个特定的 MDP 上比较 Q-learning 和 SARSA 的性能。\n\n我们在实验中使用了以下变量和参数：\n\
  \n- `α = 0.01`：Q-learning 算法中使用的步长\n- `γ = 0.9`：应用于未来奖励的折扣因子\n- `ε = 1.0`：决定选择随机动作概率的探索率\n\
  \n为了在学习过程中降低探索率，我们应用了一个线性衰减计划，将探索率从初始值 `1.0` 降低到最终值 `0.01`。\n\n如表 5.3 所示，Q-learning\
  \ 算法在对值函数进行 500 次更新后找到了最优策略。它还在大约 20,000 次更新后找到了最优值函数 `V*`，这比表 5.2 中 SARSA 的 50,000\
  \ 次更新快得多。然而，值得注意的是，尽管运行了更多次更新，SARSA 找到的最优值函数仍然没有完美匹配真实的最优值函数。这表明 Q-learning 比 SARSA\
  \ 收敛更快，并且能产生更好的结果。\n\n### 5.7 双 Q 学习\n\n双 Q 学习是一种解决 Q-learning 小问题的方法，即估计的最优状态-动作值\
  \ `Q*` 可能存在偏差。这是由于值更新过程的性质决定的，该过程总是使用能为后续状态 `s'` 产生最大值的动作。在某些随机环境中，这种方法可能会导致问题，Hado\
  \ Hasselt [4] 对此进行了详细解释。\n\n![](img/605748_1_En_5_Fig7_HTML.png)\n\n赌场老虎机 MDP 的流程图，从中央大厅开始，指向左侧和右侧区域。左侧区域通过\
  \ `r = 0, 0.1` 指向 A-L、B-L 和 C-L。右侧区域通过 `r = -1, 5` 指向 A-R、B-R 和 C-R。\n\n**图 5.7**\
  \ 赌场老虎机 MDP，仅显示每侧的三台老虎机\n\n**表 5.3** 在运行 Q-learning 算法不同更新次数后，服务犬 MDP 的最优状态值，`γ\
  \ = 0.9, α = 0.01`，`ε` 从 `1.0` 衰减到 `0.01`。最后一行包含使用 DP 策略迭代计算出的真实 `V*`。\n\n| 更新次数\
  \ | 房间 1 | 房间 2 | 房间 3 | 外部 | 已找到物品 |\n| --- | --- | --- | --- | --- | --- |\n|\
  \ 100 | −0.12 | 0.0 | 0.45 | 0.0 | 0 |\n| 1000 | 0.95 | 4.09 | 8.25 | 0.22 | 0 |\n\
  | 10,000 | 6.2 | 8.0 | 10.0 | 7.05 | 0 |\n| 20,000 | 6.2 | 8.0 | 10.0 | 7.2 | 0\
  \ |\n| 50,000 | 6.2 | 8.0 | 10.0 | 7.2 | 0 |\n| DP | 6.2 | 8.0 | 10.0 | 7.2 | 0\
  \ |\n\n\n\n#### 赌场示例\n\n为了说明最大化偏差的问题，我们来看一个源自萨顿和巴托的简单示例[2]。假设我们在赌场里，想玩几台老虎机娱乐一下。我们可以将这个示例建模为图\
  \ 5.7 所示，其中赌场游乐区的中心是中央大厅，大厅周围有两个游乐区（左侧、右侧）。每侧都有十台老虎机可供选择，不过图中每侧只画了三台。\n\n然而，这家赌场隐藏着一个秘密。左侧的所有老虎机共享相同的奖励分布，均值为\
  \ 0，标准差为 0.1。这意味着如果我们选择玩左侧的任何一台老虎机，获得的奖励可能在[-0.1, 0.1]之间。如果玩 1000 轮，我们会收支平衡，因为平均奖励为\
  \ 0。\n\n右侧的老虎机则有着完全不同的奖励分布，均值为-1.0，标准差为 5.0。当我们玩右侧的任何一台老虎机时，获得的奖励可能在[-6.0, 4.0]之间。如果玩\
  \ 1000 轮，我们肯定会输钱（平均每轮输 1 美元）。所以显而易见的选择是玩左侧的老虎机。\n\n这个示例展示了在 Q 学习中仅依赖最大值估计的潜在陷阱，并凸显了使用双\
  \ Q 学习等替代方法的必要性。\n\n我们将该问题建模为一个回合制强化学习问题，智能体通过与随机环境交互，学习随时间最大化其累积奖励。每次动作后，智能体都会获得一个奖励，该奖励是一个随机变量，其分布对智能体来说是未知的。每个回合总是从*中央大厅*状态开始，智能体可以选择*向左走*或*向右走*，从而转移到相应的后续状态*左侧区域*或*右侧区域*。在每个区域中，智能体可以选择玩多台老虎机中的一台，每台老虎机产生的奖励具有不同的概率分布。当智能体选择玩某台老虎机时，无论它位于哪个区域，该回合即告结束。下一个回合独立于上一个回合的结束方式开始，假设智能体拥有无限的资金可以继续玩。\n\
  \n如果我们使用无折扣因子的标准 Q 学习（`γ = 1`），当智能体处于*中央大厅*状态时，*向左走*和*向右走*这两个动作的估计值是多少？让我们按照公式(5.15)中的更新规则来找出答案。假设两个动作的初始\
  \ Q 值均为 0，步长为`α = 1`。更新规则可以简化为`Q(S_t, A_t) = R_t + max_{a'}Q(S_{t+1}, a')`，其中`R_t`是即时奖励，`max_{a'}Q(S_{t+1},\
  \ a')`是后续状态`S_{t+1}`的最大 Q 值。\n\n在*左侧区域*状态中，我们从任何一台老虎机中能获得的最高奖励是 0.1（忽略异常值），因此*中央大厅*和*向左走*的估计\
  \ Q 值为`0 + 0.1 = 0.1`。然而，在*右侧区域*状态中，我们从任何一台老虎机中能获得的最高奖励是 4.0，这导致*中央大厅*和*向右走*的估计\
  \ Q 值为`0 + 4.0 = 4.0`。请注意，由于奖励的高方差，这高估了该动作的真实价值。在实践中，智能体需要多次尝试每个动作才能估计出其真实价值，在这个示例中代价很高。\n\
  \n双 Q 学习是标准 Q 学习算法的一种扩展，旨在缓解后者可能出现的过高估计问题。在 Q 学习中，智能体估计最优状态-动作值函数 Q，并用它来选择动作。然而，在某些情况下，例如赌场老虎机\
  \ MDP 示例，Q 学习可能会高估动作的价值，从而导致次优策略。\n\n双 Q 学习背后的思想是学习两个独立的 Q 函数，`Q1`和`Q2`，并用它们来选择动作。在学习过程中，一半时间算法更新`Q1`的值，另一半时间更新`Q2`的值。双\
  \ Q 学习的关键贡献在于，在估计后续状态-动作对的价值时，如何选择使用哪个 Q 值。\n\n在标准 Q 学习算法中，我们可以使用以下公式计算 TD 目标：\n\
  \n```\nTD_target = R_t + γ max_{a'}Q(S_{t+1}, a')\n          = R_t + γ Q( S_{t+1},\
  \ argmax_{a'}Q(S_{t+1}, a') )\n```\n\n使用双 Q 学习时，我们将上述用于更新`Q1`的公式修改为：\n\n```\nTD_target\
  \ = R_t + γ max_{a'}Q(S_{t+1}, a')\n          = R_t + γ Q2( S_{t+1}, argmax_{a'}Q1(S_{t+1},\
  \ a') )\n```\n\n假设智能体即将更新`Q1`，并且已经收集了一个元组`(S_t, A_t, R_t, S_{t+1})`。智能体使用`Q1`来选择最佳动作`a'\
  \ = argmax_{a'}Q1(S_{t+1}, a')`，该动作在后续状态`S_{t+1}`中产生最大值。然而，智能体并不直接使用`Q1(S_{t+1},\
  \ a')`的值，而是使用这个最佳动作`a'`从`Q2`中选择值，即`Q2(S_{t+1}, a')`。这个过程有助于减少过高估计，并得到更准确的价值估计。\n\
  \n\n\n类似地，如果智能体要更新 `Q2`，它使用相同的逻辑，但将 `Q1` 和 `Q2` 互换：\n\n```\nQ2(S_t, A_t)=Q2(S_t,\
  \ A_t) + α ( R_t + γ Q1(S_{t+1}, argmax_{a'}Q2(S_{t+1}, a') ) - Q2(S_t, A_t) )\n\
  ```\n\n举个例子，假设一个智能体正在学习玩一个需要穿越迷宫到达目标的游戏。在某些情况下，智能体可能会高估某些动作的价值，从而导致次优策略。使用双 Q 学习，智能体学习两个独立的\
  \ Q 函数，在学习过程中，它交替更新 `Q1` 和 `Q2` 的值。在选择动作时，智能体使用来自 `Q1` 的最佳动作来选择来自 `Q2` 的值，反之亦然。这个过程有助于减少高估，并能带来更准确的价值估计，从而产生更好的策略。\n\
  \n在赌场 MDP 示例的背景下，同一个动作在 `Q1` 和 `Q2` 中同时具有最大值的概率要低得多，这缓解了最大化偏差问题。\n\n现在我们正式介绍使用 `ε`-贪心策略进行探索的双\
  \ Q 学习算法。整体流程与标准 Q 学习相同。我们需要做的一个小改动是，当智能体需要在环境中行动时，它使用合并后的状态-动作价值函数 `Q1` 和 `Q2`\
  \ 作为单个状态-动作价值函数 `Q` 来执行 `ε`-贪心策略。`ε`-贪心策略以概率 `1-ε` 从 `Q` 中选择价值最高的动作，并以概率 `ε` 选择一个随机动作。\n\
  \n**算法 8：带 `ε`-贪心探索的双 Q 学习**\n\n一个 15 行的算法，标题为“带 epsilon 减贪心探索的双 Q 学习”，接收以下输入，并输出最优状态-动作价值函数\
  \ `Q`：折扣率 `gamma`、初始探索率 `epsilon`、步长 `alpha` 和步数 `K`。\n\n我们使用标准 Q 学习和双 Q 学习进行了一项实验，以找到我们赌场\
  \ MDP 的最优策略。在整个实验中，我们使用了固定的探索率 `ε=0.1`、相同的步长 `α=0.1`，并且没有折扣（`γ=1.0`）。实验的目标是衡量智能体在处于*中央大厅*状态时选择*向右走*动作的频率。\n\
  \n一张频率图显示了“在中央大厅选择向右走的百分比”与“回合数”的关系：Q 学习呈现一条向下凹的递减曲线，双 Q 学习呈现一条向上凸的递减曲线，以及一条从纵轴\
  \ 5% 处开始的平行于横轴的直线。该值为估计值。\n\n**图 5.8** 在赌场 MDP 中，处于*中央大厅*状态时选择*向右走*的百分比。结果在 1000\
  \ 次独立运行中取平均值；每次运行包含 500 个回合。在整个实验中，我们使用步长 `α=0.02`，无折扣 `γ=1.0`，以及固定的探索率 `ε=0.1`。\n\
  \n结果如图 5.8 所示，在 1000 次独立运行中取平均值，每次运行包含 500 个回合。最优策略是以 5% 的概率选择*向右走*（因为我们使用了固定的 `ε=0.1`，智能体有\
  \ 10% 的概率会随机行动，而在随机行动时，在*向左走*和*向右走*之间选择，智能体应以 0.5 * 10% 的概率选择*向右走*）。我们观察到，在前 200\
  \ 个回合中，标准 Q 学习智能体选择*向右走*的频率高于最优策略。然而，双 Q 学习智能体在仅 50 个回合后就迅速发现了最优策略。\n\n\n\n### 5.8\
  \ N 步自举法\n\n在强化学习中，智能体的目标是学习一种策略，以最大化其随时间累积的期望奖励。学习此类策略的一种方法是估计每个状态的价值，即智能体从该状态开始遵循其策略所能获得的期望累积奖励。\n\
  \n在 TD(0)策略评估中，我们使用 TD 目标`R_t + γ V_π(S_{t+1})`来估计回报`G_t`，该目标由即时奖励`R_t`加上后续状态的折扣价值`γ\
  \ V_π(S_{t+1})`组成。然而，这种方法的一个问题是，如果后续状态`S_{t+1}`的估计价值存在偏差，那么更新后的价值`V_π(S_t)`也会存在偏差。这可能导致次优性能，意味着智能体可能需要花费更多时间来学习状态价值。\n\
  \n蒙特卡洛方法不存在这个问题，因为智能体始终使用从完整回合中计算出的实际回报。然而，我们更倾向于使用 TD 方法而非蒙特卡洛方法，因为我们希望支持持续进行的强化学习问题，并且希望避免等到回合结束才更新价值。那么，有没有一种方法可以在仍使用\
  \ TD 方法的同时，更准确地估计回报呢？\n\n为了回答这个问题，让我们来看价值函数的数学公式。状态价值函数`V_π`可以递归地写为：\n\n```\nV_π(s)\
  \ = E_π[ G_t | S_t = s ]\n       = E_π[ R_t + γ R_{t+1} + γ² R_{t+2} + γ³ R_{t+3}\
  \ + ... | S_t = s ]\n       = E_π[ R_t + γ ( R_{t+1} + γ R_{t+2} + γ² R_{t+2} +\
  \ ... ) | S_t = s ]\n       = E_π[ R_t + γ G_{t+1} | S_t = s ]\n       = E_π[ R_t\
  \ + γ V_π(S_{t+1}) | S_t = s ]\n```\n\n(5.17)\n\n在 TD(0)策略评估中，我们使用`R_t + γ V_π(S_{t+1})`（来自公式\
  \ 5.17）通过增量更新方法替换`G_t`：\n\n```\nV_π(S_t) = V_π(S_t) + α ( G_t - V_π(S_t) )\n   \
  \      = V_π(S_t) + α ( [ R_t + γ V_π(S_{t+1}) ] - V_π(S_t) )\n```\n\n(5.18)\n\n\
  为了更准确地估计回报，我们可以使用一种称为 N 步自举法的方法，该方法以不同的方式重新排列回报`G_t`，使用从当前时间步`t`开始未来多个时间步的奖励，加上最后一个奖励之后后续状态的折扣价值。这如公式(5.19)、(5.20)和(5.21)所示：\n\
  \n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2} + γ³ R_{t+3} + γ⁴ R_{t+4} + ...\n    =\
  \ R_t + γ R_{t+1} + γ² ( R_{t+2} + γ R_{t+3} + γ² R_{t+4} + ... )\n    = R_t + γ\
  \ R_{t+1} + γ² G_{t+2}\n```\n\n(5.19)\n\n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2}\
  \ + γ³ R_{t+3} + γ⁴ R_{t+4} + ...\n    = R_t + γ R_{t+1} + γ² R_{t+2} + γ³ ( R_{t+3}\
  \ + γ R_{t+4} + ... )\n    = R_t + γ R_{t+1} + γ² R_{t+2} + γ³ G_{t+3}\n```\n\n\
  (5.20)\n\n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2} + ... + γ^{n-1} R_{t+n-1} + γ^n\
  \ G_{t+n}\n```\n\n(5.21)\n\n受公式(5.17)启发，我们可以使用状态价值函数`V_π`递归地重写公式(5.21)，其中我们使用`γ^n\
  \ V_π(S_{t+n})`作为对时间步`t+n+1, t+n+2, ...`缺失奖励的估计器（或自举）。这便得到了*N 步*回报或*N 步*自举法，如公式(5.22)所示：\n\
  \n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2} + ... + γ^{n-1} R_{t+n-1} + γ^n V_π(S_{t+n})\n\
  ```\n\n(5.22)\n\n我们可以将公式(5.22)作为增量价值更新规则的一部分，其中我们使用 N 步回报作为估计回报`G_t`：\n\n```\nV_π(S_t)\
  \ = V_π(S_t) + α ( [ R_t + γ R_{t+1} + ... + γ^{n-1} R_{t+n-1}\n           + γ^n\
  \ V_π(S_{t+n}) ] - V_π(S_t) )\n```\n\n(5.23)\n\n这里，`α`是步长参数，决定了更新的幅度。该更新规则是增量的，意味着每个状态的价值会在每个时间步后根据观察到的奖励和下一个状态的估计价值进行更新。\n\
  \n使用 N 步自举法是一种在仍使用 TD 方法的同时更准确估计回报的方式。通过将回报分解为多个奖励，我们可以利用价值函数来估计 N 个时间步之后发生的缺失奖励。这种方法有助于减轻因使用有偏的后续状态价值估计而引入的偏差。\n\
  \n与蒙特卡洛方法相比，N 步自举法的一个优势是它可以用于持续进行的强化学习问题，即回合没有固定长度的问题。蒙特卡洛方法虽然可以通过截断回合来使用，但 N 步自举法可以在\
  \ N 个时间步后更新价值函数，从而使其更加高效。\n\n\n\n##### N 步自举法\n\nN 步自举法将`TD(0)`与蒙特卡洛方法混合在一起（适用于情节式任务）。当`N=1`时，我们得到标准的`TD(0)`，例如`SARSA`。如果`N=T`，其中`T`是情节的长度，我们就得到蒙特卡洛方法。这种方法有时被称为“多步前瞻”，因为智能体利用未来多个时间步的信息来计算价值估计（图\
  \ 5.9）。\n\n`N`的选择是在偏差与方差之间进行权衡。如果`N`较小，估计值偏差更大，因为它依赖的未来奖励样本更少，但更新更频繁，这可以降低方差。如果`N`较大，估计值偏差更小，因为它使用了更多样本，但更新频率较低，且可能具有更高的方差。\n\
  \n对于情节式强化学习问题中接近终止时间步`T`的状态，例如`S_{T-3}`、`S_{T-2}`、`S_{T-1}`，该如何处理？为了计算这些时间步的 N 步回报，我们只需忽略缺失的时间步。有时，我们也可以在情节序列末尾添加抽象序列（奖励值和状态值均为\
  \ 0），这样会得到与直接忽略缺失时间步相同的结果（图 5.10）。\n\n```\n一个流程图。流程通过 A_{T-2}、A_{T-1}和 0 链接，线性地经过\
  \ S_{T-2}、S_{T-1}、S_T、0、0 和 0 节点。每个节点通过 R_{T-2}、R_{T-1}和 0 链接指向其后继节点。下方是 V_π(S_T)、V_π(S_{T-1})和\
  \ V_π(S_{T-2})的公式。\n```\n\n**图 5.10** N 步自举法如何处理情节序列的末尾，其中`n=3`\n\n```\nN 步回报思想的示意图，其中\
  \ n 等于 3。一个线性节点图通过 A_1、A_1、A_2、A_3 和 A_4 变量，流经 S_0、S_1、S_2、S_3、S_4 和 S_5 节点。每个节点通过\
  \ R 变量指向其后继节点。下方是 V(S_2)、V(S_1)和 V(S_0)的公式。\n```\n\n**图 5.9** N 步回报的思想，其中`n=3`\n\
  \nN 步自举法是一种强大的技术，可应用于多种场景。以下是两个实际应用示例：\n\n- 在游戏环境中，智能体通常需要基于随时间发生的一系列事件做出决策。例如，在第一人称射击游戏中，智能体可以使用\
  \ N 步自举法，通过考虑未来 N 个时间步将获得的奖励来估计给定状态的价值。这有助于智能体在游戏中做出更准确的行动决策。\n\n- 在机器人控制中，智能体必须基于传感器和其他环境因素的反馈做出决策。例如，控制机械臂的智能体可以使用\
  \ N 步自举法，通过考虑未来 N 个时间步将获得的奖励来估计给定状态的价值。这有助于智能体更准确地决定如何移动机械臂以实现期望的结果。\n\n要应用 N 步自举法，需要遵循几个具体步骤。首先，我们必须为当前问题选择一个合适的`N`值。这取决于时间跨度长度和环境变化速率等因素。接下来，智能体使用\
  \ N 步自举法，基于未来 N 个时间步将获得的奖励来估计每个状态的价值。这有助于智能体通过考虑每个行动的长期后果来做出更准确的决策。\n\n然而，正如迪米特里·P·伯特塞卡斯教授[5]的研究所述，N\
  \ 步自举法存在一些潜在问题。例如，在某些情况下，算法配置不当可能导致次优行为。为了说明这一点，请考虑以下玩具示例 MDP（见图 5.11）。在这个情节式任务中，新情节总是从最左侧节点（起点）开始，并在最右侧节点（终点）结束。除了初始起始状态外，智能体在所有状态下只能选择一个使其持续前进的动作；而在起始状态，有两个动作可将智能体引向上方或下方路径。每个状态-动作对关联的奖励信号由节点之间的边标出。最优路径是下方路径，因为接近终止状态时有一个高奖励信号（`r=10`）。\n\
  \n```\n一个关于 N 步自举法陷阱的流程图，其中 n=3 设置错误。上方流程如下：起点，R=0，r=1，r=2，r=1，终点。下方流程如下：起点，R=0，r=2，r=0，r=10，终点。\n\
  ```\n\n**图 5.11** N 步自举法的陷阱，当`n=3`设置错误时，算法可能最初选择次优路径（上方路径）而非最优路径（下方路径）\n\n然而，在配置错误的情况下，例如`N=3`，算法最初会选择上方路径，尤其是在价值估计不准确时。为避免此类问题，建议尽可能使用最大的`N`值，尽管这可能受到计算资源的限制。\n\
  \n\n\n#### N 步 SARSA\n\n将 N 步自举法扩展到状态-动作价值函数 `Q_pi` 相当简单。在这种情况下，我们基于状态-动作对来更新值，并且对于最后一个后继状态\
  \ `S_{t+n}`，我们还需要动作 `A_{t+n}`：\n\n```\nQ_pi(S_t, A_t) = Q_pi(S_t, A_t) + alpha *\
  \ ( [R_t + gamma * R_{t+1} + ... + gamma^{n-1} * R_{t+n-1} + gamma^n * Q_pi(S_{t+n},\
  \ A_{t+n})] - Q_pi(S_t, A_t) )\n```\n\n(5.24)\n\n这里，`alpha` 是步长参数，`gamma` 是折扣因子，`t`\
  \ 是当前时间步。\n\n我们现在介绍 N 步 SARSA 同策略学习算法，它建立在 SARSA 的基本结构之上。然而，为了计算任意 N 步的回报，我们需要做一些改动。这意味着当智能体在环境中做出决策时，值不会立即更新。相反，它必须在环境中持续行动\
  \ `N` 步，才能收集到计算 N 步回报所需的样本转移。\n\n为了存储必要的样本转移，我们选择使用一个列表 `tau`，它存储形式为 `(s, a, r,\
  \ s', a')` 的元组，其中 `s` 和 `s'` 分别是当前状态和下一状态；`a` 和 `a'` 分别是当前动作和下一动作；`r` 是在状态 `s` 下采取动作\
  \ `a` 获得的奖励。`tau` 的最大长度为 `N`。我们使用 `(s, a, r, s', a')` 而不是 `(s, a, r, s')`，因为对于最后一个后继状态\
  \ `S_{t+n}`，我们还需要动作 `A_{t+n}` 来完成公式 (5.24)。\n\n只有当 `tau` 的长度达到最大长度，或者智能体处于一个回合的末尾时（对于情节式强化学习问题而言），智能体才会更新\
  \ `tau` 中第一个状态-动作对的值。这是因为 `tau` 中后续的状态-动作对被用来计算第一个状态-动作对的 N 步回报，并且只有在计算出 N 步回报之后才会执行值更新。\n\
  \n**算法 9：使用 epsilon-贪婪策略进行探索的 N 步同策略 SARSA**\n\n一个名为“使用 epsilon-贪婪进行探索的 N 步同策略 SARSA”的\
  \ 7 行算法，接收以下输入，并输出最优状态-动作价值函数 `Q_pi`：折扣率 `gamma`，初始探索率 `epsilon`，步长 `alpha`，N 步\
  \ `n`（其中 `N >= 1`），以及步数 `K`。\n\n我们将 N 步 SARSA 算法应用于我们的服务犬马尔可夫决策过程（MDP），并获得了在 100\
  \ 次独立运行中平均的结果，每次运行包含 1000 次更新。该算法使用的步长为 `alpha = 0.01`，折扣率为 `gamma = 0.9`，以及一个衰减的探索率\
  \ `epsilon`，该值从 1.0 开始，在 1000 次更新过程中逐渐减小到 0.01。结果如表 5.4 所示。将 N 步值从 1 增加到 2 和 3，使得*房间\
  \ 1*和*房间 2*的状态值更接近使用 DP 策略迭代计算出的真实状态值（如表 5.4 最后一行所示）。然而，状态*房间 3*和*室外*的值并没有显著改善。这是因为我们的服务犬\
  \ MDP 是一个非常简单的问题，在最优策略下，一个回合序列的长度仅为 3。因此，使用大于 3 的 N 步值并不会改善结果。\n\n#### N 步 Q 学习\n\
  \nN 步 Q 学习是传统 Q 学习算法的一种变体，它基于在 N 个时间步序列上观察到的回报来更新 Q 值。通过整合更长的经验序列，N 步 Q 学习可以在某些环境中带来更高效的学习和更好的性能。例如，在奖励稀疏或延迟的环境中，使用更长的经验序列可以帮助智能体更快地学习并做出更好的决策。回报指的是智能体随时间累积的总折扣奖励。\n\
  \n**表 5.4** 针对不同 `N` 值运行 N 步 SARSA 算法后，服务犬 MDP 的最优状态值。结果是在 100 次独立运行中平均得到的；每次运行仅包含\
  \ 1000 次更新。我们使用折扣率 `gamma = 0.9`，步长 `alpha = 0.01`，以及 `epsilon` 在 1000 次更新过程中从 1.0\
  \ 衰减到 0.01。最后一行包含使用 DP 策略迭代计算出的真实 `V_*` 值。\n\n| N 步 | 房间 1 | 房间 2 | 房间 3 | 室外 |\
  \ 找到物品 |\n| --- | --- | --- | --- | --- | --- |\n| 1 | 0.28 | 3.49 | 8.17 | 0.0\
  \ | 0 |\n| 2 | 2.07 | 6.26 | 8.58 | 0.16 | 0 |\n| 3 | 3.86 | 6.25 | 8.6 | 1.06 |\
  \ 0 |\n| 4 | 3.8 | 6.45 | 8.59 | 0.94 | 0 |\n| 5 | 4.14 | 6.41 | 8.59 | 1.25 | 0\
  \ |\n| DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |\n\n然而，N 步 Q 学习比标准 Q 学习更复杂，并且需要使用重要性采样来调整行为策略和目标策略之间的差异。\n\
  \n\n\n##### Q 学习的 N 步更新规则\n\n在标准 Q 学习中，总是使用最优动作来评估后继状态。然而，当使用 N 步回报时，增量更新规则会变得更加复杂。该更新规则涉及计算接下来\
  \ N 步的奖励总和，然后从 N 步后的状态值进行自举。自举是指使用价值函数的估计值来更新价值函数的估计值。这使得智能体能够从更长的经验序列中学习，并做出更优决策。\n\
  \n以下是该更新规则的公式：\n\n![$$\\displaystyle \\begin{aligned} Q_\\pi(S_t, A_t) ={} &amp;\
  \ Q_\\pi(S_t, A_t) + \\alpha \\bigg( \\Big[ R_t + {\\gamma} R_{t+1} + \\cdots +\
  \ {\\gamma}^{n-1}R_{t+n-1} \\\\ &amp; + {\\gamma}^{n} \\max_{a'}Q_\\pi(S_{t+n},\
  \ a') \\Big] - Q_\\pi(S_t, A_t) \\bigg) {} \\end{aligned} $$](images/605748_1_En_5_Chapter/605748_1_En_5_Chapter_TeX_Equ25.png)\n\
  \n(5.25)\n\n在此公式中，`Q(S_t, A_t)` 是在状态 `S_t` 下采取动作 `A_t` 的估计价值，`α` 是步长参数，`R_t` 是在状态\
  \ `S_t` 下采取动作 `A_t` 后获得的奖励，`γ` 是折扣因子，`n` 是用于计算回报的步数。公式中的每个变量都有特定含义，如公式后的注释所述。\n\n\
  ##### N 步 Q 学习与重要性采样\n\n在 Q 学习（一种离策略强化学习算法）中，它估计的是与当前遵循策略不同的另一个策略的价值。当使用 `N=1` 的标准\
  \ Q 学习时，无需使用重要性采样来加权 TD 目标。然而，当使用 `N ≥ 2` 的 N 步 Q 学习时，则需要重要性采样，因为 N 步奖励是由行为策略 `μ`\
  \ 生成的，而该策略可能与目标策略 `π` 不同。\n\n例如，如果我们使用如图 5.12 所示的 `N=2`，可以看到智能体在状态 `s` 下采取动作 `a`\
  \ 后，在 N 步过程中的轨迹在行为策略和目标策略下可能完全不同。行为策略更具探索性，这意味着它可能不会选择目标策略会选出的最优动作。因此，路径可能会产生分歧。如果我们使用相对较小的\
  \ `N` 值，这可能不是大问题，但如果 `N` 值变得非常大，这个问题可能会变得更加显著。\n\n为了计算 N 步 Q 学习的重要性采样比率，我们可以跳过第一步\
  \ `t` 和最后一步（`t+n`）；跳过第一步的原因是，我们正在估计状态-动作对 `(s, a)` 的价值，因此行为策略（或目标策略）在状态 `s` 下选择动作\
  \ `a` 的概率是多少并不重要，因为该动作已经发生。跳过最后一步（`t+n`）的原因是，Q 学习总是使用后继状态 `S_{t+n}` 下所有有效动作中的最大值\
  \ `Q(s', a')`，无论行为策略选择了哪个动作，这使得最后一步 `t+n` 的重要性采样比率始终等于 1。\n\n![](img/605748_1_En_5_Fig12_HTML.png)\n\
  \nN 步 Q 学习采样的树状图从节点 S 开始，该节点衍生出一个标记为 a, r 的节点。节点 a, r 分支为两个节点。左侧节点及其分支未标记。右侧节点标记为\
  \ s'，并分支为 a'和 s'。a'和 s'各自衍生出一个 s''节点。\n\n**图 5.12** 为什么我们应该对 N 步 Q 学习使用重要性采样（针对\
  \ `n=2` 的情况），其中 `π` 是目标策略，`μ` 是行为策略\n\n换句话说，我们可以计算剩余步骤 `t+1, t+2, …, t+n-1` 的重要性采样比率。这简化了重要性采样比率的计算，并降低了估计值的方差。\n\
  \n\n\n![$$\\displaystyle \\begin{aligned} \\rho_{t+1:t+n-1} &amp; = \\frac{\\pi(A_{t+1}|S_{t+1})\
  \ p(S_{t+2}|S_{t+1}, A_{t+1}) \\cdots p(S_{t+n}|S_{t+n-1}, A_{t+n-1})}{\\mu(A_{t+1}|S_{t+1})\
  \ p(S_{t+2}|S_{t+1}, A_{t+1}) \\cdots p(S_{t+n}|S_{t+n-1}, A_{t+n-1})} \\\\ &amp;\
  \ = \\frac{\\pi(A_{t+1}|S_{t+1})\\pi(A_{t+2}|S_{t+2}) \\cdots \\pi(A_{t+n-1}|S_{t+n-1})}{\\\
  mu(A_{t+1}|S_{t+1})\\mu(A_{t+2}|S_{t+2}) \\cdots \\mu(A_{t+n-1}|S_{t+n-1})} {} \\\
  end{aligned} $$](img/605748_1_En_5_Chapter_TeX_Equ26.png)\n\n(5.26)\n\n为了计算目标策略的概率，我们注意到目标策略是一个确定性（或贪婪）策略，它总是为给定状态选择具有最高\
  \ Q 值的动作。因此，在状态`s`中选择动作`a`的概率为 1，当且仅当`a = argmax_a Q(s, a)`；否则为 0。这可以表示为\n\n![$$\\\
  displaystyle \\begin{aligned} \\pi(a|s) = \\begin{cases} 1, &amp; \\text{if} \\\
  quad \\displaystyle a=\\mathop{\\text{argmax}}_a Q(s, a) \\\\ 0, &amp; \\text{if}\
  \ \\quad \\displaystyle a \\neq \\mathop{\\text{argmax}}_a Q(s, a) \\end{cases}\
  \ {} \\end{aligned} $$](img/605748_1_En_5_Chapter_TeX_Equ27.png)\n\n(5.27)\n\n直观地说，重要性采样调整了更新规则，以考虑行为策略与目标策略之间的差异。这是必要的，因为行为策略可能会选择次优动作，从而导致价值函数估计出现偏差。重要性采样使智能体能够调整这种偏差，从而更高效、更准确地学习。\n\
  \n为了适配 N 步 Q 学习，智能体必须存储其在 N 步序列过程中选择的每个动作`mu(A_t|S_t)`的概率。在更新步骤中，我们使用公式(5.27)计算目标策略在相应状态下选择这些动作的概率。该公式计算了在当前状态下目标策略的期望回报，并用于更新每个状态-动作对的\
  \ Q 值。\n\n重要性采样比率是目标策略与行为策略下选择动作的概率之比。它用于调整行为策略可能选择了目标策略认为次优的动作这一事实。通过使用这个比率，我们可以更新\
  \ Q 值，使其更好地反映最优策略。\n\nN 步 Q 学习是 Q 学习的一种变体，它基于在 N 个时间步序列中观察到的回报来更新 Q 值。通过纳入更长的经验序列，N\
  \ 步 Q 学习可以在某些环境中实现更高效的学习和更好的性能。通过使用重要性采样，我们可以调整行为策略与目标策略之间的差异，从而更高效、更准确地学习。伪代码如算法\
  \ 10 所示。\n\n**算法 10：带重要性采样的 N 步 Q 学习**\n\n![](img/605748_1_En_5_Figaaj_HTML.gif)\
  \ 一个名为“带重要性采样的 N 步 Q 学习”的 9 行算法，接收以下输入，并输出最优状态-动作价值函数`Q`。折扣率`gamma`、初始探索率`epsilon`、步长`alpha`、N\
  \ 步`N`（其中`N`大于等于 1）以及步数`K`。\n\n适配 N 步 Q 学习可能比标准 Q 学习更具挑战性。它涉及存储更长的经验序列，这可能会带来更高的计算需求。此外，行为策略可能会选择目标策略不会选择的次优动作。这可能导致两个策略下的\
  \ N 步奖励不同，如果步数`N`很大，这可能成为一个重大问题。\n\n当我们对离策略 N 步 Q 学习使用重要性采样时，需要记住，值可能不会频繁更新。在 N\
  \ 步转移序列中，行为策略很可能会选择一些探索性动作，而这些动作并非目标策略下的最佳动作。这意味着重要性采样比率会趋近于零，在策略均为确定性的极端情况下，整个\
  \ TD 误差项也可能变为零。因此，学习过程中的值更新变为`Q(S_t, A_t) = Q(S_t, A_t)`，这可能导致离策略学习相比在策略学习收敛速度更慢。\n\
  \n在实践中，一些成功的 N 步 Q 学习算法，例如 Hessel 等人[6]提出的 Rainbow 智能体，通过使用相对较小的 N 步（`n=5`）并且完全不使用重要性采样来保持简单，从而避免了这个问题。然而，很难证明\
  \ N 步自举对 Rainbow 算法成功的贡献，因为它还涉及许多其他技术以及对标准 DQN 智能体的改进。\n\n### 5.9 总结\n\n在第一部分的最后一章中，我们深入探讨了时序差分（TD）学习这一强大框架。TD\
  \ 学习建立在蒙特卡洛方法的思想之上，通过基于即时时间步的转移而非完整的情节序列来更新价值估计，为强化学习（RL）提供了一种更高效的方法。\n\n本章首先探讨了\
  \ TD 学习，这构成了后续章节的基础。TD 使我们能够增量地更新价值估计，利用连续价值估计之间的差异作为学习的基础。接着，我们转向 TD 策略评估，这是一种能够估计给定策略价值函数的技术。通过使用\
  \ TD 更新迭代地更新价值估计，我们可以在不需要完整情节的情况下逼近真实的价值函数。\n\n本章继续讨论了使用 SARSA 算法的 TD 控制。SARSA 将\
  \ TD 学习与在策略方法相结合，智能体在与环境交互的同时改进其策略。我们还探讨了在策略学习与离策略学习之间的差异，强调了每种方法相关的权衡和考量。\n\n接下来，我们介绍了\
  \ Q 学习，这是一种离策略 TD 控制算法，也是著名的 DQN 智能体的核心，我们将在本书第二部分中介绍它。Q 学习通过基于最大估计未来奖励来更新动作价值估计，从而最大化期望回报。我们研究了\
  \ Q 学习如何克服在策略方法的局限性，以及它对 RL 性能的影响。\n\n为了缓解价值估计过于乐观的问题，我们探讨了双 Q 学习。该技术使用两组动作价值函数来减少过高估计偏差，从而增强学习过程的稳定性和准确性。\n\
  \n最后，本章以对 N 步自举的讨论作为结尾，这是一种弥合 TD 学习与蒙特卡洛方法之间差距的方法。N 步自举使我们能够利用来自未来多个步骤的信息来更新价值估计。\n\
  \n随着本章的完成，我们结束了本书的第一部分，该部分聚焦于 RL 的基础知识以及使用表格方法解决小规模马尔可夫决策过程（MDP）。在第二部分中，我们将把重点转向价值函数近似，探索使\
  \ RL 算法能够扩展到更大、更复杂问题的技术。\n\n"
- '# 第二部分 价值函数近似




  '
- "# 6. 线性价值函数近似\n\n本书第一部分重点介绍使用表格法来表示马尔可夫决策过程（MDP）的价值函数。然而，这种方法仅限于小规模 MDP。在许多现实世界的问题中，状态空间过大，导致基于表格的方法不切实际。这主要有两个原因：首先，庞大的状态数量可能需要大量内存来存储价值；其次，学习到的价值函数可能无法很好地泛化到新状态。\n\
  \n为了克服这些限制，本书第二部分将重点转向使用价值函数近似（VFA）来估计 MDP 的价值函数。VFA 使用一个函数来估计状态或状态-动作对的价值，而不是直接将价值存储在表格中。在本章中，我们将重点介绍\
  \ VFA 的概念，特别是线性 VFA——一种使用特征的线性组合来近似价值函数的流行方法。我们将探讨如何应用线性 VFA 来估计 MDP 的价值函数。\n\n\
  ### 6.1 大规模 MDP 的挑战\n\n对于状态空间相对较小且可以完全枚举的小规模 MDP，使用表格来表示价值函数可能非常有效。然而，在更大、更复杂的 MDP\
  \ 中使用表格来表示价值函数时，会面临一些挑战和限制：\n\n- **内存需求**：随着 MDP 中状态数量的增加，价值函数表格的大小呈指数级增长，使得在内存中存储这些价值变得不切实际。\n\
  - **泛化能力**：即使状态数量较少，在学习过程中也常常难以访问每一个状态-动作对。这意味着我们可能无法对每个状态-动作对的价值函数都有准确的估计，从而使得泛化到新的、未见过的状态变得困难。\n\
  - **维度灾难**：随着状态变量（或维度）数量的增加，状态空间的大小呈指数级增长，这使得在合理时间内探索并学习到准确的价值函数变得困难。\n- **离散化**：在某些情况下，连续的状态变量可能需要被离散化为有限数量的区间才能存储在表格中。然而，这可能导致信息丢失，并使得学习准确的价值函数变得困难。\n\
  \n![](img/605748_1_En_6_Fig1_HTML.png)\n\n小车顶部有一根杆的小车-杆系统示意图。\n\n**图 6.1** 小车-杆系统；该问题由\
  \ Richard S. Sutton 和 Andrew G. Barto 在《强化学习导论》一书中引入。\n\n价值函数近似技术，如线性函数近似和神经网络，可以通过使用较少的参数来估计价值函数，同时提供更好的泛化能力到新状态，从而帮助克服这些挑战。\n\
  \n为了更好地理解这些挑战，让我们看一个经典的控制任务，称为小车-杆任务，该任务由 Richard S. Sutton 和 Andrew G. Barto 引入。\n\
  \n#### 小车-杆任务\n\n小车-杆任务 [1] 的目标是通过对小车施加力，如图 6.1 所示，防止铰接在小车上的杆子倒下。如果杆子倾斜到一定角度或小车跑出轨道，则认为任务失败；如果任务失败，杆子会重置到垂直位置。智能体可以选择向左或向右推动小车。奖励信号是：只要杆子没有倒下，每一步都获得\
  \ `+1`。\n\n这个任务与我们之前介绍的例子不同之处在于其状态空间的大小。小车-杆任务的状态是四维的，包含小车的位置和速度的数值，以及杆子的角度和角速度的数值。所有这些维度都是连续的数值，尽管有些维度有最小值和最大值等限制，例如位置在\
  \ `[-4.8, 4.8]` 范围内，杆子角度在 `[-0.418, 0.418]`（弧度）范围内，但状态的具体值可以是这些范围内的任何值。\n\n小车-杆任务的大状态空间对强化学习提出了重大挑战。由于状态空间是连续的，传统的表格法表示价值函数不再适用。此外，智能体在训练过程中不太可能遇到所有可能的状态，这使得学习该任务的准确价值函数变得困难。\n\
  \n在我们之前的例子中，我们经常使用像 `0, 1, 2, ...` 这样的离散数字来表示不同的状态，这使我们能够使用单个向量来存储这些不同状态的价值。然而，在状态的可能组合非常多的情况下，这种表格法并不适用。例如，在小车-杆例子中，状态由四个连续值定义：小车的位置和速度，以及杆子的角度和角速度。这使得状态空间是无限且连续的，无法用单个向量来表示。\n\
  \n![](img/605748_1_En_6_Fig2_HTML.png)\n\n用于瓦片编码的图表，绘制了杆子角度与小车速度的关系。小车速度范围从负 10\
  \ 到 10，杆子角度范围从负 0.3 到 0.3。\n\n**图 6.2** 小车速度和杆子角度的瓦片化示例\n\n解决这个问题的一种方法是尝试将无限状态变为有限。例如，如果我们只看小车速度，我们可以将这些值分箱到相应的子集中，这将使小车速度维度离散化。类似地，我们也可以扩展这种方法，考虑杆子角度，此时这些分箱就变成了瓦片。这种方法通常被称为瓦片编码，对于小问题效果很好。有一些开源库可以为我们完成这项工作（图\
  \ 6.2）。\n\n然而，这种方法的一个主要缺点是必须手动选择要使用的分箱或瓦片数量。例如，如果我们只对小车位置使用两个分箱，那将没什么用，因为范围太宽了。另一方面，如果我们使用太多分箱，可能会遇到过拟合的问题。选择最佳的分箱数量需要对当前问题有大量的人工知识。\n\
  \n这种方法的另一个主要问题是，对于环境状态具有非常大维度的情况，例如像 Atari 视频游戏这样基于图像的环境，它的扩展性不好。在这些情况下，状态空间可能包含大量维度，这使得使用瓦片编码变得不可行。在这种情况下，通常会使用其他方法，如神经网络，来解决可扩展性问题，我们将在下一章中介绍。\n\
  \n\n\n### 6.2 价值函数近似\n\n函数近似是指寻找一个近似函数，使其能够紧密匹配未知目标函数行为的过程。在强化学习中，我们可以利用函数近似来估计状态价值函数或状态-动作价值函数，这些函数通常规模过大，无法以表格形式显式表示。取而代之，我们可以使用一个参数化函数，将状态或状态-动作作为输入，并输出其价值的估计值。\n\
  \n举例来说，考虑图 6.3，该图展示了函数近似的概念。我们有一组由未知目标函数 `g` 生成的样本数据。我们的目标是从一组可能的函数中找到一个近似函数 `H`，使其能够紧密逼近真实的目标函数，即\
  \ `H(x) ≈ g(x)`。在此示例中，绿色点代表目标函数生成的样本数据，红色线代表逼近真实目标函数的函数。\n\n![](img/605748_1_En_6_Fig3_HTML.png)\n\
  \n一张散点图绘制了 y 与 x 的关系。散点稀疏地分布在一个抛物线曲线周围。数值为估计值。曲线经过点 (-10, 170)、(3, 10) 和 (16, 170)。\n\
  \n图 6.3 用于说明函数近似概念的示例，其中绿色点是由目标函数 `g` 生成的样本点，红色线是用于逼近该目标函数的函数 `H`\n\n在强化学习中使用价值函数近似（VFA）具有若干优势。首先，近似函数相关的参数数量远小于\
  \ MDP 中的状态或状态-动作对数量，这使得在大规模问题中表示价值函数成为可能。其次，当我们仅有有限的样本转移时，近似函数能够泛化到未见过的状态或状态-动作对，这有助于减少学习所需的数据量。最后，与表格方法相比，求解大规模\
  \ MDP 所需的空间和时间可以大幅减少。\n\n然而，使用 VFA 也存在缺点。由于我们使用参数化函数来估计价值函数，可能永远无法学习到所有状态或状态-动作对的精确真实值。相反，我们必须满足于一个在实际应用中足够接近的近似值。这是因为对函数参数的任何更改都会影响所有状态或状态-动作对，并且不可能在不牺牲其他状态或状态-动作对准确性的情况下，针对某个特定状态或状态-动作对优化该函数。\n\
  \n为了表示近似的价值函数，我们使用 `V̂(s; w)` 来表示逼近任意策略 `π` 的真实状态价值函数 `Vπ` 的函数。这里，`w` 代表用于计算估计值的参数或权重。类似地，我们使用\
  \ `Q̂(s, a; w)` 来表示逼近任意策略 `π` 的真实状态-动作价值函数 `Qπ` 的函数，并且我们希望找到能够最小化近似价值函数与真实价值函数之间差异的权重\
  \ `w`。更新或调整参数 `w` 的过程称为训练。\n\n总之，价值函数近似是在强化学习中表示和估计价值函数的一种强大技术。它使我们能够在有限的时间范围和计算预算内求解大规模\
  \ MDP。然而，务必牢记这种方法的局限性以及寻找良好近似所涉及的权衡。\n\n图 6.4 展示了价值函数近似的基本思想，这是一种在强化学习问题中估计每个状态价值的方法。在价值函数近似中，我们分别使用\
  \ `V̂(s; w)` 和 `Q̂(s, a; w)` 来表示基于其权重 `w` 对状态或状态-动作对的估计值。这些函数接收环境状态或状态-动作对作为输入，并基于其权重\
  \ `w` 进行一些计算后，输出估计值。\n\n![](img/605748_1_En_6_Fig4_HTML.png)\n\n状态价值估计的示意图。上方的函数是\
  \ `V̂π(s, w)`。下方的函数是 `Q̂π(s, a, w)`。\n\n图 6.4 价值函数近似的思想\n\n我们将在本章后续部分更详细地讨论如何使用线性方法计算这些值，但目前，我们更关心如何更新近似函数的权重\
  \ `w`。为了改进近似函数，我们需要能够衡量其性能。然而，对于涉及参数的函数而言，如何做到这一点并不总是显而易见的。\n\n\n\n让我们考虑一个策略评估的例子，其中我们希望针对一个固定策略\
  \ `π` 来估计状态价值。我们假设已知该策略 `π` 的真实状态价值函数 `Vπ`。由于已知真实状态价值，我们可以通过单个状态 `s` 的平方误差 `(Vπ(s)\
  \ - V̂(s; w))²` 来衡量近似值与真实值之间的差异。这也意味着我们可以衡量权重 `w` 的性能，因为在这种情况下，状态 `s` 及其真实状态价值 `Vπ(s)`\
  \ 是恒定的。唯一会影响近似函数估计值的因素就是权重 `w`。\n\n```\n(Vπ(s) - V̂(s; w))²\n```\n\n(6.1)\n\n值得注意的是，智能体在遵循策略\
  \ `π` 与环境交互时，可能会遇到大量状态，而这些状态通常是随机的，尤其是在环境或策略具有随机性的情况下。因此，以一种独立于特定时间步的方式，来衡量近似函数相对于权重的准确性就显得非常重要。为了实现这一点，我们在公式\
  \ (6.2) 中使用了期望符号 `Eπ`。在公式 (6.2) 中，我们使用不带下标 `t` 的 `S` 来表示状态，以强调性能的衡量应独立于特定时间步。我们也可以将公式中的\
  \ `S` 视为整个状态空间。\n\n```\nEπ[(Vπ(S) - V̂(S; w))²]\n```\n\n(6.2)\n\n现在，我们可以为使用 `V̂`\
  \ 来近似真实状态价值函数 `Vπ` 的情况定义一个精确的目标。这个目标是必要的，以便找到能够最小化平方误差 `(Vπ(S) - V̂(S; w))²` 的权重\
  \ `w`，该误差针对的是智能体在遵循策略 `π` 与环境交互时可能遇到的所有状态。这个想法与监督学习问题非常相似；在这种情况下，真实标签是 `Vπ(S)`，预测标签是\
  \ `V̂(S; w)`。在本书中，我们通常使用更简短的术语 `J(w)` 来表示这个目标。\n\n```\nJ(w) = Eπ[(Vπ(S) - V̂(S;\
  \ w))²]\n```\n\n(6.3)\n\n类似地，如果我们知道策略 `π` 的真实状态-动作价值函数 `Qπ`，我们也可以为近似 `Q̂` 定义目标。在实践中，我们对状态-动作价值函数更感兴趣；毕竟，我们需要\
  \ `Qπ` 来进行控制（即寻找最优策略）。同样的概念在此仍然适用，我们希望找到能够最小化平方误差 `(Qπ(S, A) - Q̂(S, A; w))²` 的权重\
  \ `w`。\n\n```\nJ(w) = Eπ[(Qπ(S, A) - Q̂(S, A; w))²]\n```\n\n(6.4)\n\n现在我们已经为 `V̂`\
  \ 和 `Q̂` 定义了目标函数；这意味着我们可以使用任何合适的优化方法来最小化公式 (6.3) 和 (6.4) 中相对于其权重 `w` 的项。在本书中，我们重点介绍一种在机器学习中被广泛采用的流行方法，称为随机梯度下降。\n\
  \n\n\n### 6.3 随机梯度下降\n\n在优化问题中，目标是找到能够最小化或最大化给定数学函数的参数。术语*梯度下降*指的是使用一种迭代优化方法来寻找*可微*函数的*局部最小值*。可微函数是一种在其定义域内每一点都具有明确定义导数的数学函数。换句话说，该函数的导数存在，并且可以针对函数定义域内的任何输入值进行计算。从几何角度看，可微函数的导数表示函数图像在给定点处切线的斜率。\n\
  \n函数的局部最小值是函数定义域内的一个点，在该点的一个小邻域内，函数取得最小值，但不一定是整个函数定义域内的最小值。换句话说，这是一个函数值低于附近点的点，但可能在其他更远的点处存在更低的函数值。局部最小值在优化中很重要，因为它们代表了优化问题的候选解，但不能保证是全局最小值（即函数在整个定义域内的绝对最小值）。\n\
  \n可微性概念在优化中很重要，因为它允许我们计算函数相对于其输入的梯度，这对于许多优化算法（如梯度下降）至关重要。给定一个关于权重 `w` 的可微函数 `J(w)`，目标是找到使\
  \ `J(w)` 最小化的 `w`。\n\n梯度下降算法首先计算 `J(w)` 关于 `w` 的梯度。然后，它沿着负梯度 `∇_w J(w)` 的方向更新权重\
  \ `w`。\n\n```\nw = w - α ∇_w J(w)\n```\n\n(6.5)\n\n参数 `α` 是步长（通常称为学习率），它控制在更新权重\
  \ `w` 时每一步应该移动多远。该算法以迭代方式重复此过程，经过大量步骤，直到找到一个良好的局部最小值。\n\n该更新规则背后的直觉是，通过沿着负梯度方向迈出一步，我们实际上是在朝着目标函数的最陡下降方向移动。这意味着在每一步，我们都朝着函数下降最快的方向移动。通过重复此过程大量步骤，我们希望最终能到达函数的一个最小值。为了理解这为何合理，想象一下站在山顶想要到达山底。最快的下降方式是沿着最陡峭的斜坡方向移动，也就是指向山底的方向。类似地，在优化中，负梯度指向目标函数的最陡下降方向，因此沿着负梯度方向移动将帮助我们比任何其他方向更快地达到最小值。\n\
  \n学习率 `α` 控制更新的步长，因此它决定了我们在每一步沿着负梯度方向移动多远。较小的学习率意味着我们采取较小的步长，这有助于避免越过最小值，而较大的学习率意味着我们采取较大的步长，这有助于更快地收敛。然而，如果学习率太小，我们可能收敛得非常慢；而如果学习率太大，我们可能会越过最小值并在其附近振荡，甚至发散。因此，为手头的优化问题选择合适的学习率非常重要。\n\
  \n`J(w)` 关于权重 `w` 的梯度是一个（列）向量，包含关于 `w` 中每个权重 `w_1, w_2, ..., w_n` 的偏导数，并且与权重向量 `w`\
  \ 具有相同的维度。梯度 `∇_w J(w)` 通过计算函数关于每个权重的偏导数得到。在实践中，通常使用*随机梯度下降*（SGD），它在每次迭代中随机选择数据的一个子集（称为*小批量*）来估计梯度。\n\
  \n```\n∇_w J(w) = ( ∂J(w)/∂w_1, ∂J(w)/∂w_2, ..., ∂J(w)/∂w_n )^T\n```\n\n(6.6)\n\n\
  总之，随机梯度下降是一种迭代优化算法，它利用可微函数的梯度，沿着最陡下降方向更新权重，目标是找到目标函数的局部最小值。学习率控制更新的步长，为手头的优化问题选择合适的学习率非常重要。随机梯度下降在实践中被广泛使用，并且通常通过使用小批量来估计梯度。\n\
  \n\n\n为了理解梯度下降的工作原理，我们首先来看最简单的情况：假设`w`只有一个标量分量`x`，如图 6.5 所示。我们有一些样本点以及每个样本点的梯度（斜率）。可以看到，点`x3`具有正斜率（梯度），如果按照公式(6.1)沿负梯度方向迈出一步，那么`x`的值将会减小。点`x2`的斜率比点`x3`的斜率更平缓，这意味着点`x2`的梯度小于点`x3`的梯度。这很合理，因为点`x2`更接近目标函数的最小值。对于样本点`x1`，斜率为负，这意味着如果应用公式(6.1)，`x`的值将会增加。如果重复这个过程很多步，理论上，它会找到一个局部最小值。\n\
  \n在实践中，权重向量`w`通常有多个标量分量，如图 6.6 所示。这意味着当梯度下降算法使用公式(6.1)更新权重时，它会根据每个分量的偏梯度更新`w`中的每一个分量。然而，在多个分量的情况下，`w`的更新规则稍微复杂一些，因为它们涉及多元微积分。\n\
  \n具体来说，更新规则中使用的偏导数必须针对`w`的每个分量进行计算。这些偏导数被组合成一个梯度向量，可以将其视为导数在多维情况下的推广。梯度向量指向被优化函数最陡峭增加的方向，而更新规则则沿着与梯度向量相反的方向修改`w`，以最小化目标函数。\n\
  \n![](img/605748_1_En_6_Fig6_HTML.png)\n\n一个三维图绘制了`J`与`w1`和`w2`的关系。值为估计值。(0, 0)、(0.5,\
  \ -1.5)和(2.5, 0)。\n\n**图 6.6** 梯度下降的思想，其中`w`是一个具有两个标量分量`w1`和`w2`的向量\n\n![](img/605748_1_En_6_Fig5_HTML.png)\n\
  \n一条抛物线绘制了`y`与`x`的关系。曲线的端点标记为`y = f, x`。在`x`轴上有三条垂直线，一条在曲线左侧，两条在右侧，分别对应`x1`、`x2`和`x3`。\n\
  \n**图 6.5** 梯度下降的思想\n\n总的来说，虽然多分量更新规则背后的数学涉及多元微积分，但梯度下降的基本直觉保持不变：迭代地沿最陡下降方向更新权重以最小化目标函数。\n\
  \n梯度下降中的步长（学习率）是一个关键参数。直观地说，小步长需要梯度下降算法采取更多步（就权重更新而言）才能找到能够最小化目标函数`J(w)`的权重`w`。而适当的大步长则需要更少的步数。然而，如果步长过大，可能会导致算法在局部最小值附近振荡但永远无法到达（如图\
  \ 6.7 右侧所示）。在实践中，人们通常在学习过程开始时使用相对较大的步长，然后在整个学习过程中逐渐减小步长（如图 6.7 左侧所示）。步长的确切值通常是一门艺术而非科学，因为通常需要多次尝试才能为不同问题找到合适的值。\n\
  \n![](img/605748_1_En_6_Fig7_HTML.png)\n\n两组抛物线绘制了`y`与`x`的关系。曲线的端点标记为`y = f, x`。\n\
  \n**图 6.7** 步长在梯度下降中的影响。左侧展示了我们从相对较大的步长开始，然后随时间衰减步长的情况。右侧展示了步长过大可能导致算法在局部最小值附近振荡但永远无法到达的情况\n\
  \n在本章中，我们在 VFA 的情况下对梯度下降公式进行了轻微修改，在公式(6.7)中的步长`α`前面添加了`1/2`。引入这个修改是为了简化最终方程，如公式(6.8)所示。\n\
  \n```\nw = w - 1/2 α ∇_w J(w) \n```\n(6.7)\n\n```\n= w - 1/2 α ∇_w E_π[ (V_π(S)\
  \ - V̂(S; w))² ]\n= w - 1/2 α ( -2 E_π[ (V_π(S) - V̂(S; w)) ∇_w V̂(S; w) ] )\n=\
  \ w + α E_π[ (V_π(S) - V̂(S; w)) ∇_w V̂(S; w) ]\n```\n(6.8)\n\n其中`w`是权重向量，即我们想要优化的状态值函数的可学习参数。`α`是步长，是一个超参数，决定了算法每次迭代中权重参数更新的幅度。`∇_w`表示函数关于权重`w`的偏导数向量。\n\
  \n\n\n为了应用梯度下降，我们使用公式（6.3）作为目标函数`J(w)`。然后，我们使用微积分中的链式法则来推导导数，从而得到公式（6.8）。之所以使用链式法则来推导导数，是因为目标函数`J(w)`依赖于价值函数的预测值`V̂(S;\
  \ w)`，而该预测值又通过函数`V̂(S; w)`依赖于参数`w`。这使我们能够计算目标函数关于参数`w`的梯度。\n\n该公式背后的直觉是，沿着真实价值`Vπ(S)`与当前预测价值`V̂(S;\
  \ w)`之间平方误差的相反方向调整参数`w`，而调整的幅度由每个参数的偏梯度`∇w V̂(S; w)`和步长`α`决定。期望符号`Eπ`表示我们正在计算期望值上的梯度。这意味着我们需要对智能体在环境中遵循策略`π`时可能遇到的所有状态求偏导数。\n\
  \n当使用表格方法时，我们会运行算法收集大量转移样本并计算平均回报。然而，当使用梯度下降方法时，我们可以使用随机梯度下降（SGD）。SGD 是机器学习中广泛采用的方法，尤其适用于训练深度神经网络。SGD\
  \ 背后的思想是使用一个（或一小批）样本转移来计算梯度，然后更新权重`w`。这种方法在计算上比使用所有转移样本更高效，原因在于计算效率，同时也因为智能体在与环境交互时，通常不可能遇到整个状态空间中的所有状态。\n\
  \n我们可以将公式（6.8）重写为公式（6.9），以展示如何使用 SGD 更新权重`w`。在该公式中，我们使用一个（或一小批）样本转移来计算梯度并更新权重。在机器学习中，小批量是训练数据的一个子集，用于在随机梯度下降（SGD）优化过程中计算梯度更新。当在大型数据集上训练模型时，在每次迭代中计算整个数据集的梯度通常在计算上不可行。相反，使用从数据集中随机选择的一小批样本来估计梯度，然后用该梯度更新模型的参数。\n\
  \n```\nw = w + α [ ( Vπ(S) - V̂(S; w) ) ∇w V̂(S; w) ]\n```\n\n(6.9)\n\n小批量的大小是一个超参数，通常根据数据集的大小和可用计算资源来选择。较大的小批量大小可以带来更准确的梯度估计，但需要更多的内存和计算资源。较小的批量大小可以减少内存使用，但可能导致收敛速度变慢，且梯度估计的方差通常更高。\n\
  \n在 SGD 中使用小批量可以在大型数据集上更高效地训练机器学习模型，因为它减少了计算整个数据集梯度的计算负担和内存需求。\n\n现在，让我们将注意力转向用于近似状态（或状态-动作）价值相对于权重`w`的方法。通常，有线性方法和非线性方法来近似价值函数。在本章中，我们专注于更简单的线性方法。在下一章中，我们将讨论非线性方法，特别是使用神经网络来近似价值函数。线性方法有其优点和缺点，我们将在下一节中进一步探讨。\n\
  \n\n\n### 6.4 线性价值函数近似\n\n到目前为止，我们还没有讨论近似函数 `V̂` 或 `Q̂` 具体如何接收原始环境状态（或状态-动作对）作为输入，并输出估计价值。现在我们重点讨论如何使用线性方法，根据权重向量\
  \ `w` 来计算这些价值。\n\n首先，这涉及将原始环境状态 `s`（或状态-动作对 `(s, a)`）映射到特征向量 `x` 的过程；在传统机器学习中，这一过程通常被称为*特征工程*或*特征提取*。`x`\
  \ 中标量分量的数量可以远大于（或远小于）环境状态的维度，具体取决于强化学习问题。我们可以将特征向量 `x` 视为一组函数 `x₁, x₂, …` 的集合，这些函数将原始环境状态（或状态-动作对\
  \ `(s, a)`）转换为相应的标量分量：\n\n```\nx(s) = ( x₁(s) )\n       ( x₂(s) )\n       (  ⋮ \
  \  )\n       ( xₙ(s) )\n```\n\n(6.10)\n\n特征向量 `x` 背后的直觉是，通过精心设计这些特征，我们希望找到一个权重向量\
  \ `w`，使得特定状态（或状态-动作对）的价值就是所有这些特征的加权和；这就是为什么我们将 `w` 称为权重，因为它对 `x` 中相应的特征进行加权。从数学上讲，我们取\
  \ `x` 和 `w` 的内积（假设 `x` 和 `w` 都是列向量，且 `w` 和 `x` 的元素数量相同），可以表示为：\n\n```\nV̂(s; w)\
  \ = x(s)ᵀ w = Σⱼ₌₁ⁿ xⱼ(s) wⱼ\n```\n\n(6.11)\n\n其中 `V̂(s; w)` 是使用权重向量 `w` 对状态 `s`\
  \ 的估计价值，`x(s)ᵀ` 是状态 `s` 特征向量的转置，`Σⱼ₌₁ⁿ xⱼ(s) wⱼ` 是特征的加权和。\n\n特征向量 `x` 通常基于人类知识或对强化学习问题的过往经验进行手工设计。对于某些简单问题，这个过程可能简单到只需将原始环境状态编码为数值，但对于更复杂的问题，它通常涉及某种形式的变换，例如多项式函数。\n\
  \n构建特征向量最简单的方法之一是将状态空间划分为若干子集（类似于图 6.2 中所示的区间或瓦片情况），使得任意单个状态 `s` 仅属于一个子集。然后，我们可以使用独热编码方法构建特征向量\
  \ `x`，其中状态 `s` 所属的子集用值 1 表示，所有其他子集用值 0 表示。这也被称为状态聚合方法。有限 MDP 可以视为该方法的一个特例，其中我们有\
  \ `N` 个子集，这里的 `N` 是状态空间中的状态数量，且每个子集仅包含一个状态。\n\n例如，在服务犬 MDP 中，我们可以使用索引值标记每个状态：`房间\
  \ 1 = 0`，`房间 2 = 1`，`房间 3 = 2`，`室外 = 3`，`找到物品 = 4`。然后，我们可以为状态 `房间 2` 构建特征向量 `x`，作为独热编码向量\
  \ `x = [0, 1, 0, 0, 0]ᵀ`。也可以使用神经网络自动提取特征，这将是下一章讨论的主题。\n\n现在，我们对线性近似函数如何计算状态价值有了基本了解，接下来让我们最终确定如何使用随机梯度下降来更新权重向量\
  \ `w`。我们可以先定义式 (6.11) 关于 `w` 的偏导数 `∇_w V̂(s; w)`。由于这是一个线性系统，且我们对 `w` 求导，`∇_w V̂(s;\
  \ w)` 可以简化为 `x(s)`。由此得到式 (6.12)，用于在使用线性函数近似状态价值函数 `V_π` 时更新权重 `w`：\n\n\n\n![$$\\\
  displaystyle \\begin{aligned} \\boldsymbol{w} &amp; = \\boldsymbol{w} + \\alpha\
  \ \\Biggl[ \\Big( V_\\pi(s) - \\hat{V}(s; \\boldsymbol{w}) \\Big) \\boldsymbol{x}(s)\
  \ \\Biggr] \\\\ &amp; = \\boldsymbol{w} + \\alpha \\Biggl[ \\Big( V_\\pi(s) - \\\
  boldsymbol{x}(s)^T\\boldsymbol{w} \\Big) \\boldsymbol{x}(s) \\Biggr] {} \\end{aligned}\
  \ $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ12.png)\n\n(6.12)\n\
  \n这里，`w` 表示线性近似函数的权重；`α` 表示步长或学习率，决定了每一步调整权重的幅度；`x(s)` 是状态 `s` 的特征向量；`Vπ(s)` 是状态\
  \ `s` 的期望值。\n\n现在我们确切知道了如何更新线性函数的权重 `w`。在公式 (6.12) 中，唯一未知的是真实状态价值函数 `Vπ`。接下来我们将开始探讨如何利用现有方法（如蒙特卡洛和时序差分学习）来估计真实状态价值\
  \ `Vπ`，进而用其更新上述公式中的权重。\n\n#### 用于策略评估的线性价值函数近似\n\n假设我们可以获取策略 `π` 的真实状态价值函数 `Vπ`，那么就可以使用公式\
  \ (6.12) 来更新线性近似函数的权重 `w`。线性近似函数是一种数学函数，它将状态的特征向量映射为该状态价值的估计值。\n\n然而，在大多数现实世界的强化学习问题中，我们并不知道\
  \ `Vπ`。那么在这种情况下，我们该如何更新权重呢？\n\n在蒙特卡洛策略评估中，智能体通过遵循策略 `π` 生成一个完整的样本回合，并计算序列中每个状态的回报\
  \ `G0, G1, G2, ...`。这里的回报是指从访问状态 `t` 开始到回合结束所获得的奖励总和。我们可以沿用这一思路，用蒙特卡洛样本回报 `Gt` 替换公式\
  \ (6.12) 中的 `Vπ(s)` 作为真实目标。因此，使用线性方法结合蒙特卡洛策略评估来近似状态价值函数的权重更新规则可以改写如下：\n\n![$$\\\
  displaystyle \\begin{aligned} \\boldsymbol{w} &amp; = \\boldsymbol{w} + \\alpha\
  \ \\Biggl[ \\Big( G_t - \\hat{V}(S_t; \\boldsymbol{w}) \\Big) \\boldsymbol{x}(S_t)\
  \ \\Biggr] \\\\ &amp; = \\boldsymbol{w} + \\alpha \\Biggl[ \\Big( G_t - \\boldsymbol{x}(S_t)^T\\\
  boldsymbol{w} \\Big) \\boldsymbol{x}(S_t) \\Biggr] {} \\end{aligned} $$](images/605748_1_En_6_Chapter/605748_1_En_6_Chapter_TeX_Equ13.png)\n\
  \n(6.13)\n\n这里，`w` 表示线性近似函数的权重，`α` 是学习率，`Gt` 是蒙特卡洛样本回报，`x(St)` 是状态 `St` 的特征向量，`V̂(St;\
  \ w)` 是使用线性近似函数对状态 `St` 的预测价值。\n\n现在我们介绍基于线性价值函数近似的每次访问蒙特卡洛策略评估算法，如算法 1 所示。在几乎所有状态都唯一的大规模\
  \ MDP 中，每次访问版本通常比首次访问版本更受青睐。这是因为由于缺乏状态或动作的冗余性，统计某个状态（或状态-动作对）被访问的次数可能无法提供有意义的信息。通过考虑回合中每个状态（或状态-动作对）的每次访问，每次访问算法确保了所有交互都对价值函数估计有所贡献。因此，它更适用于状态或动作冗余性极小、访问次数统计无信息量的场景。\n\
  \n\n\n该算法接收任意策略`π`以及其他参数（如折扣率和学习率）。为获得更佳性能，我们通常将权重`w`随机初始化为`[-1, 1]`范围内的值。随机初始化有助于防止权重陷入局部最小值，并允许学习算法探索不同的权重配置。\n\
  \n算法 1：每次访问蒙特卡洛线性 VFA 策略评估\n\n```\n（此处为算法 1 的图片描述：每次访问蒙特卡洛线性 VFA 策略评估算法）\n```\n\n\
  该算法通过遵循输入策略生成一个样本片段，计算每个时间步的回报，并使用蒙特卡洛更新规则更新用于近似真实状态值函数的线性函数的权重。此过程重复固定数量的片段。\n\n\
  无论权重参数的初始值如何，蒙特卡洛更新规则都保证随着片段数量趋近于无穷大而收敛到真实值函数。\n\n类似地，我们可以调整 TD 学习以使用线性值函数近似。在 TD(0)策略评估中，它将回报估计为即时奖励`R_t`与后继状态折扣值`γ\
  \ V_π(S_{t+1})`之和。这里，我们可以使用相同的思路，用线性函数预测的后继状态值（即`x(S_{t+1})^T w`）替换`V_π(S_{t+1})`。因此，TD(0)策略评估的权重更新规则变为：\n\
  \n```\nw = w + α [ ( R_t + γ V̂(S_{t+1}; w) - V̂(S_t; w) ) x(S_t) ]\n  = w + α [\
  \ ( R_t + γ x(S_{t+1})^T w - x(S_t)^T w ) x(S_t) ]\n```\n\n(6.14)\n\n使用线性值函数近似的\
  \ TD(0)策略评估的完整算法如算法 2 所示。与蒙特卡洛策略评估算法类似，这里我们也随机初始化权重`w`为`[-1, 1]`范围内的值，这允许算法探索不同的权重配置并避免陷入局部最小值。我们没有具体说明如何构造特征向量`x`，因为最优特征取决于具体的强化学习问题。\n\
  \n算法 2：TD(0)线性 VFA 策略评估\n\n```\n（此处为算法 2 的图片描述：TD(0)线性 VFA 策略评估算法）\n```\n\n到目前为止，我们仅使用线性函数来近似状态值函数`V_π`，但在实践中，为了进行控制（寻找最优策略），我们需要学习状态-动作值函数`Q_π`。使用`Q̂`近似`Q_π`的整体概念和过程与使用`V̂`近似`V_π`相同。主要区别在于，现在我们需要考虑具体动作`a`。这包括构造特征向量`x`时，需要针对状态-动作对`(s,\
  \ a)`进行。\n\n```\nx(s, a) = [ x_1(s, a) ]\n          [ x_2(s, a) ]\n          [ \
  \  ...     ]\n          [ x_n(s, a) ]\n```\n\n(6.15)\n\n对于状态空间和动作空间较小的有限 MDP 的最简单情况，我们可以先为状态`s`和动作`a`分别创建独热向量，然后将这两个独热向量拼接起来构造特征向量`x`。对于相同的服务犬\
