  #### 状态-动作价值函数的时序差分策略评估\n\n在本节中，我们将描述如何扩展`TD(0)`算法来估计状态-动作价值函数`Q_π`。这一点很重要，因为我们需要`Q_π`来通过策略改进做出更好的决策，就像我们在蒙特卡洛方法中所做的那样。\n\
  \n回顾`Q_π`的贝尔曼期望方程：\n\n```\nQ_π(s, a) = E_π[G_t | S_t=s, A_t=a]\n          = E_π[R_t\
  \ + γ R_{t+1} + γ² R_{t+2} + ... | S_t=s, A_t=a]\n          = E_π[R_t + γ G_{t+1}\
  \ | S_t=s, A_t=a]\n          = E_π[R_t + γ Q_π(S_{t+1}, A_{t+1}) | S_t=s, A_t=a]\n\
  ```\n\n这里，我们使用`R_t + γ Q_π(S_{t+1}, A_{t+1})`来替代回报`G_t`。为了估计`Q_π`，我们需要收集一个`(s, a,\
  \ r, s', a')`元组，并基于状态-动作对`(s, a)`更新价值。更新估计值的公式为：\n\n```\nQ_π(S_t, A_t) = Q_π(S_t,\
  \ A_t) + α( [R_t + γ Q_π(S_{t+1}, A_{t+1})] - Q_π(S_t, A_t) )\n```\n\n整个过程与`V_π`的`TD(0)`策略评估非常相似，但存在一些关键区别：\n\
  \n*   我们需要收集`(s, a, r, s', a')`元组，而不是`(s, a, r, s')`，来估计`Q_π`。\n*   价值更新基于状态-动作对`(s,\
  \ a)`。\n\n通过估计状态-动作价值函数`Q_π`，我们可以利用策略改进做出更好的决策。`Q_π`告诉我们，在给定状态下采取特定动作的期望价值，这对于选择能带来更高回报的动作而言是重要的信息。此外，`Q_π`与价值函数`V_π`相关，后者告诉我们处于给定状态并根据给定策略`π`采取动作的期望价值。具体来说，`V_π`可以表示为`Q_π`在所有可能动作上的期望值，并按策略`π`下采取每个动作的概率进行加权。\n\
  \n\n\n##### TD(0)策略评估\n\n`TD(0)`策略评估算法是一种用于估计固定策略`π`的状态-动作价值函数`Q_π`的方法。算法 2 展示了该算法的伪代码。\n\
  \n**算法 2：** 针对`Q[π]`的时序差分[TD(0)]策略评估\n\n![](img/605748_1_En_5_Figaab_HTML.gif)\n\
  \n一个用于计算时序差分`TD(0)`及`Q_π`策略评估的 10 行算法，接收以下输入，输出针对输入策略`π`的估计状态-动作价值函数`Q_π`：待评估的策略`π`、折扣率`γ`、步长`α`以及步数`K`。\n\
  \n在该算法中，我们将所有状态-动作对的状态-动作价值函数`Q_π`初始化为 0。然后，我们使用策略`π`运行回合，并根据获得的奖励和预期的未来奖励更新状态-动作价值函数。我们重复此过程，直到算法收敛。\n\
  \n图 5.2 展示了针对服务犬 MDP 的随机策略计算出的状态-动作价值。结果基于 100 次独立运行的平均值；每次运行包含 20,000 次更新。我们使用折扣率`γ\
  \ = 0.9`，步长`α = 0.01`。这些值与我们在第 4 章中使用蒙特卡洛策略评估计算出的值非常接近，如图 4.3 所示。\n\n![](img/605748_1_En_5_Fig2_HTML.png)\n\
  \n一个流程图计算了服务犬 MDP 的状态-动作价值。流程经过房间 1、2 和 3，最终到达已找到物品。房间 3 返回房间 2，房间 2 返回房间 1。房间 2\
  \ 通过`r = 0`指向外部，外部通过`r = 0`返回房间 2。外部通过`r = -1`指向自身。折扣率`γ = 0.9`。\n\n**图 5.2** 使用`TD(0)`策略评估针对服务犬\
  \ MDP 的随机策略计算出的状态-动作价值。结果基于 100 次运行的平均值；每次运行包含 2000 次更新。在此实验中，我们使用折扣率`γ = 0.9`和步长`α\
  \ = 0.01`。\n\n## 5.3 用于探索的简化`ε`-贪心策略\n\n在执行 TD 策略评估之后，下一步是将算法扩展到 TD 控制（或策略改进）。与蒙特卡洛方法一样，TD\
  \ 学习是一种无模型强化学习方法，面临着平衡探索与利用的挑战。在第 4 章中，我们引入了`ε`-贪心策略，以帮助智能体在使用蒙特卡洛方法时进行探索。我们也可以将相同的`ε`-贪心策略用于\
  \ TD 学习方法，通过使用公式(5.6)更新不同动作的策略概率分布。\n\n```\nπ(a|s) = \n  case\n    a = argmax_a\
  \ Q_π(s, a):  1 - ε + ε / |A(s)|\n    a ≠ argmax_a Q_π(s, a):  ε / |A(s)|\n```\n\
  \n(5.6)\n\n回顾一下，`ε`-贪心策略源自状态-动作价值函数`Q_π`，并使用公式(5.6)更新不同动作的策略概率分布。`ε`-贪心策略本质上是随机策略和确定性策略的组合。以概率`ε`，策略随机行动；而以概率`1\
  \ - ε`，策略根据`Q_π`贪心地行动。\n\n值得注意的是，`Q_π`的值在 TD 策略评估中会不断更新，即每个时间步都会更新。因此，`ε`-贪心策略中的“确定性策略”部分也会不时更新。然而，在实践中，我们通常使用一种更简单、更高效的方法来创建`ε`-贪心策略，该方法无需更新`π`的策略概率分布。\n\
  \n\n\n相反，我们可以基于 `Q_π` 创建一个代理函数来构建 `ε`-贪婪策略。当智能体遵循此 `ε`-贪婪策略并需要在环境中做出决策时，该代理函数以概率\
  \ `ε` 返回一个针对特定状态均匀采样的动作，并以概率 `1-ε` 返回根据 `Q_π` 对该状态的最佳动作。这种简化版的 `ε`-贪婪策略更加稳健，尤其是在处理大规模\
  \ MDP 时，我们将在本书第二部分讨论这一点。\n\n为此，我们基于 `Q_π` 创建一个代理函数来构建 `ε`-贪婪策略，如算法 3 所示。当智能体遵循此\
  \ `ε`-贪婪策略并需要在环境中做出决策时，该代理函数以概率 `ε` 返回一个针对特定状态均匀采样的动作，并以概率 `1-ε` 返回根据 `Q_π` 对该状态的最佳动作。\n\
  \n算法 3：基于 *Q*[*π*] 的简化 *ε*-贪婪策略\n\n```\n一个 8 行算法，用于计算基于 Q π 的简化 epsilon 减贪婪策略，使用\
  \ if else 语句并返回 a, P a。该算法接受以下输入：Q 状态-动作值函数，epsilon 探索率，S t 环境状态。\n```\n\n因此，无需额外步骤来专门改进策略，因为从示例代码可以看出，这种策略已不复存在。我们只需在智能体与环境交互需要选择动作时，使用这种简化版的\
  \ `ε`-贪婪策略即可。\n\n总之，`ε`-贪婪策略是 TD 控制中平衡探索与利用的有用工具。虽然它最初源自状态-动作值函数 `Q_π`，并且由于在使用 TD\
  \ 方法时 `Q_π` 会不断更新，我们可以使用一种简化版的 `ε`-贪婪策略，该策略无需更新 `π` 的策略概率分布。\n\n### 5.4 TD 控制——SARSA\n\
  \n状态-动作-奖励-状态-动作（SARSA）是我们想介绍的第一个 TD 控制算法。它是一种基于 TD 学习的在线、同策略、无模型强化学习算法。SARSA 可以处理情节式和连续式强化学习问题，并使用通用策略迭代模板来寻找最优策略。然而，SARSA\
  \ 通过使用 `ε`-贪婪策略简化了探索部分。`ε`-贪婪策略以概率 `1-ε` 选择使估计的状态-动作值函数 `Q_π` 最大化的动作（利用），并以概率 `ε`\
  \ 选择一个随机动作（探索）。\n\n在 SARSA 中，我们使用策略评估来估计状态-动作值函数 `Q_π`，而不是像蒙特卡洛策略评估那样估计 `V_π`。SARSA\
  \ 算法使用贝尔曼方程更新估计的状态-动作值函数 `Q_π`：\n\n```\nQ_π(S_t, A_t) ← Q_π(S_t, A_t) + α (R_t +\
  \ γ Q_π(S_{t+1}, A_{t+1}) - Q_π(S_t, A_t))\n```\n\n(5.7)\n\n其中 `S_t` 和 `A_t` 表示当前状态和动作，`R_t`\
  \ 是在状态 `S_t` 下执行动作 `A_t` 后获得的即时奖励，`S_{t+1}` 和 `A_{t+1}` 表示下一个状态和动作，`γ` 是折扣因子，`α`\
  \ 是步长参数。\n\nSARSA 算法使用估计的状态-动作值函数 `Q_π` 以在线方式更新策略。策略使用简化版的 `ε`-贪婪策略进行更新。具体来说，该策略以概率\
  \ `1-ε` 选择使估计的状态-动作值函数 `Q_π` 最大化的动作（利用），并以概率 `ε` 选择一个随机动作（探索）。由于策略是以在线方式更新的，我们无需执行单独的策略改进步骤。\n\
  \n\n\nSARSA 相比蒙特卡洛方法有一些优势。它可以进行在线学习，这意味着它可以在每个时间步之后更新状态-动作价值函数 `Q_pi` 的估计值和策略，使其更适合需要与环境实时交互的应用场景。SARSA\
  \ 也是一种同策略方法，我们将在本章后面讨论什么是同策略。然而，SARSA 在估计的状态-动作价值函数中可能存在高方差和偏差，尤其是在探索率较低时。\n\n####\
  \ 算法 4：SARSA\n\n![](img/605748_1_En_5_Figaad_HTML.gif) 一个 11 行的算法，接收以下输入，以给出一个几乎等于\
  \ `Q_star` 的估计最优状态-动作价值函数 `Q_pi`。折扣率 `gamma`、初始探索率 `epsilon`、步长 `alpha` 和步数 `K`。\n\
  \nSARSA 算法有少数几个需要额外关注的参数（或者我们称之为，它对这几个参数很敏感）。第一个是步长 `alpha`。在蒙特卡洛方法中，我们使用 `1 / N(s,\
  \ a)` 作为步长，但在 SARSA 中，我们根据当前估计值与下一个估计值之间的差异来更新状态-动作价值。因此，我们不会记录智能体访问特定状态-动作对 `(s,\
  \ a)` 的次数。结果，我们通常需要手动设置步长。\n\n第二个参数是用于 `epsilon`-贪婪策略的探索率 `epsilon`。我们可以选择为 `epsilon`\
  \ 使用一个固定值，但在实践中，常见的做法是使用一个较大的初始 `epsilon` 值（如 1.0），并在学习过程的前半段将 `epsilon` 线性衰减到一个较小的固定值（如\
  \ 0.01）。决定以多快的频率衰减 `epsilon` 值是一个没有明确答案的难题。衰减过快可能导致智能体在 `epsilon` 变得过小之前探索不足，从而完全停止探索。然而，衰减过慢可能导致智能体学习时间更长，因为它即使在不再需要时仍会继续随机行动。在实践中，这个参数需要多次试验才能找到合适的值。\n\
  \n#### 表 5.2\n\n在服务犬 MDP 上运行 SARSA 算法不同更新次数后的最优状态价值。结果在 100 次独立运行中取平均值。我们使用折扣率 `gamma\
  \ = 0.9` 和步长 `alpha = 0.01`，初始探索率 `epsilon = 1.0`，并将其从 1.0 衰减到 0.01。最后一行包含使用 DP\
  \ 策略迭代计算出的真实最优状态价值 `V_*`。\n\n| 更新次数 | 房间 1 | 房间 2 | 房间 3 | 室外 | 找到物品 |\n| --- |\
  \ --- | --- | --- | --- | --- |\n| 100 | − 0.12 | 0.0 | 0.47 | 0.0 | 0 |\n| 1000\
  \ | 0.28 | 3.49 | 8.17 | -0.01 | 0 |\n| 10,000 | 5.83 | 7.85 | 10.0 | 4.25 | 0 |\n\
  | 20,000 | 6.02 | 7.93 | 10.0 | 5.53 | 0 |\n| 50,000 | 6.12 | 7.97 | 10.0 | 6.38\
  \ | 0 |\n| DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |\n\n与蒙特卡洛策略迭代类似，SARSA 最终只会收敛到真正的最优状态-动作价值，但在实践中，我们通常在固定迭代次数后，或者当状态-动作价值的变化低于某个阈值时终止算法。因此，如果我们过早终止学习过程，SARSA\
  \ 算法的结果可能并非真正的最优状态-动作价值。\n\n我们在服务犬 MDP 上运行了 SARSA 算法，以找到最优策略和最优价值函数。最优策略是能在所有时间步上最大化期望总回报的策略，而最优价值函数是在最优策略下从每个状态出发的期望总回报。我们使用动态规划（DP）计算了真实的最优价值，该方法保证在有限次迭代内收敛到最优值。表\
  \ 5.2 中显示的结果是在 100 次独立运行中取平均值得到的，使用了折扣因子 `gamma = 0.9` 和步长 `alpha = 0.01`。我们将初始探索率设为\
  \ `epsilon = 1.0`，并在学习过程的前半段将其线性衰减到 0.01。令人惊讶的是，算法在对状态-动作价值进行 500 次更新后就找到了最优策略，但估计的状态价值与使用\
  \ DP 计算出的真实 `V_*`（最后一行）并不十分接近。随着我们增加更新次数，状态估计价值变得非常接近真实价值。\n\n\n\n### 5.5 同策略学习\
  \ vs. 异策略学习\n\n强化学习是一种机器学习方法，智能体通过与环境交互学习如何采取行动，以最大化累积奖励信号。在本章及前几章中，我们介绍了几种同策略强化学习算法。但在深入探讨这些算法之前，我们先来定义什么是同策略算法。\n\
  \n在强化学习中，区分行为策略和目标策略非常重要。行为策略（用 `μ` 表示）是智能体在与环境交互生成样本经验时所遵循的策略，而目标策略（用 `π` 表示）是智能体试图学习的策略。同策略强化学习算法是指行为策略与目标策略相同的算法，即\
  \ `π = μ`。\n\n另一方面，异策略强化学习算法是指行为策略与目标策略不同的算法，即 `π ≠ μ`。异策略算法的一个例子是 Q-learning，我们将在本章后面介绍，它能够学习最优动作价值函数\
  \ `Q*`，而无需依赖行为策略。\n\n例如，蒙特卡洛和 TD(0) 学习算法（如 SARSA）通过遵循同一策略 `μ` 与环境交互生成的经验，来学习行为策略\
  \ `μ` 的状态-动作价值函数。这类同策略强化学习算法相对简单，但当行为策略的探索性低于目标策略时，其效率可能较低。\n\n异策略强化学习算法通常更强大，因为它们可以利用不同行为策略生成的经验，而该行为策略可能比目标策略更具探索性。异策略强化学习中常用的一种技术是重要性采样。\n\
  \n重要性采样是一种利用不同分布下生成的样本来计算随机变量期望值的方法。例如，假设我们有一个行为策略 `μ` 和一个目标策略 `π`，其中 `μ ≠ π`，并且我们希望估计目标策略\
  \ `π` 的状态价值函数 `Vπ`。当智能体处于某个状态 `s` 并遵循行为策略 `μ` 时，它需要选择一个动作，而在状态 `s` 下选择某个动作 `a` 的概率定义为\
  \ `μ(a|s)`。智能体在环境中执行动作 `a` 后，环境可能转移到某个后续状态 `s'`，状态转移概率由环境动态特性决定，记为 `p(s'|s, a)`。当智能体当前处于状态\
  \ `s` 并遵循策略 `μ` 时，它最终到达后续状态 `s'` 的概率定义为 `μ(a|s) p(s'|s, a)`。\n\n然而，如果智能体遵循目标策略 `π`，则它当前处于状态\
  \ `s` 并最终到达后续状态 `s'` 的概率定义为 `π(a|s) p(s'|s, a)`。由于 `μ ≠ π`，这两条轨迹很可能不同。为了纠正这种差异，我们使用重要性采样。\n\
  \n重要性采样通过将行为策略 `μ` 生成的每个样本的回报乘以 `μ` 和 `π` 所选动作概率的比值来进行加权。这样，我们就可以利用行为策略 `μ` 生成的样本来估计目标策略\
  \ `π` 的期望回报。\n\n当使用异策略强化学习和 TD 策略评估来估计 `Vπ` 时，我们需要计算单个转移元组 `(St, At, Rt, St+1)`\
  \ 的重要性采样比率。重要性采样比率是目标策略 `π` 下采取某个动作的概率与行为策略 `μ` 下该概率的比值。该比率用于纠正智能体的经验可能由与被评估策略不同的策略生成这一事实（图\
  \ 5.3）。\n\n![](img/605748_1_En_5_Fig3_HTML.png)\n\n\n\n#### 离策略强化学习\n\n离策略强化学习的树状图从节点\
  \ `s` 开始。`S` 分支为 3 个节点。第一个节点及其分支未标记。第二个节点标记为 `a2`，分支为 `s'` 和一个未标记节点。第三个节点标记为 `a3`，分支为\
  \ `s''` 和一个未标记节点。\n\n**图 5.3** 离策略强化学习示例，用于在利用来自不同行为策略 `μ` 生成的数据时，估计目标策略 `π` 的状态价值函数\
  \ `V_π`。红色路径表示遵循 `μ` 时从状态 `s` 到 `s'` 的转移，蓝色路径表示遵循 `π` 时的转移。\n\n重要性采样比率可使用以下公式计算：\n\
  \n```\nρ_t = π(A_t|S_t) p(S_{t+1}|S_t, A_t) / μ(A_t|S_t) p(S_{t+1}|S_t, A_t)\n \
  \   = π(A_t|S_t) / μ(A_t|S_t)\n```\n\n(5.8)\n\n其中 `π` 是目标策略，`μ` 是行为策略。\n\n请注意，环境动态\
  \ `p(S_{t+1}|S_t, A_t)` 通常对智能体是未知的，但在此情况下无关紧要，因为它同时出现在比率的分子和分母中，可以相互抵消。\n\n通常，离策略强化学习要求：如果\
  \ `π(a|s) > 0`，则 `μ(a|s) > 0`。这意味着，如果目标策略 `π` 要采取某些动作，我们要求行为策略 `μ` 至少有一个非负概率来采取这些相同的动作。在大多数情况下，行为策略会比目标策略更具探索性，例如\
  \ `ε > 0` 的 `ε`-贪心策略。这确保了每个动作被选中的概率始终大于零。\n\n存在一种特殊情况，即当公式 (5.8) 中的分母为零时，这发生在行为策略\
  \ `μ` 选择了目标策略 `π` 本不会选择的动作时。在这种情况下，重要性采样比率变为零，这意味着在更新价值函数时会忽略此转移元组。\n\n#### 离策略时序差分策略评估\n\
  \n在离策略强化学习算法中，智能体从由不同于目标策略的行为策略生成的经历中学习。为了解决这个问题，我们可以在价值更新期间使用重要性采样比率来调整时序差分误差。具体来说，时序差分目标通过目标策略和行为策略在给定状态下选择该动作的概率之比进行加权。\n\
  \n用于状态价值函数 `V_π` 的离策略 TD(0) 策略评估的价值更新规则如公式 (5.9) 所示：\n\n```\nV_π(S_t) = V_π(S_t)\
  \ + α * π(A_t|S_t)/μ(A_t|S_t) * ( [R_t + γ V_π(S_{t+1})] - V_π(S_t) )\n```\n\n(5.9)\n\
  \n这里，`π(A_t|S_t)` 和 `μ(A_t|S_t)` 分别表示在目标策略和行为策略下，在状态 `S_t` 中选择动作 `A_t` 的概率。\n\n\
  离策略 TD(0) 学习是强化学习中一种流行的预测方法。TD(0) 是一种使用单步自举法更新价值函数的方法，其中时序差分目标是即时奖励加上下一状态的估计价值。离策略\
  \ TD(0) 的整体过程类似于常规的 TD(0) 策略评估，但我们使用不同的行为策略 `μ ≠ π` 来生成样本经历。在价值更新期间，时序差分目标通过重要性采样比率进行加权，该比率考虑了目标策略与行为策略之间的差异。这个比率有助于提高价值函数估计的准确性，确保智能体将更多权重分配给与目标策略相关的经历。例如，如果目标策略选择了在行为策略下不太可能出现的动作，那么重要性采样比率会很高，时序差分目标也会相应地获得更高的权重。\n\
  \n用于状态价值函数 `V_π` 的离策略 TD(0) 策略评估算法的伪代码如算法 5 所示。\n\n**算法 5：** 用于 `V_π` 的离策略时序差分 [TD(0)]\
  \ 策略评估\n\n一个用于计算离策略时序差分 TD(0) 和 `V_π` 策略评估的 10 行算法，接收以下输入，并输出目标策略 `π` 的估计状态价值函数\
  \ `V_π`：待评估的目标策略 `π`、折扣率 `γ`、步长 `α` 和步数 `K`。\n\n\n\n然而，要将离策略 TD(0) 策略评估算法扩展到估计针对\
  \ `π` 的状态-动作价值函数 `Q_π`，情况会稍有不同。由于我们是在估计状态-动作对 `(s, a)` 的价值，因此行为策略（或目标策略）在状态 `s`\
  \ 下选择动作 `a` 的概率是多少并不重要，因为状态-动作价值函数衡量的是在状态 `s` 下采取动作 `a`，然后之后遵循策略 `π` 所获得的期望回报。我们只关心接下来会发生什么。所以，为了计算一个元组\
  \ `(S_t, A_t, R_t, S_{t+1}, A_{t+1})` 的重要性采样，我们会从第二步 `t+1` 开始，计算在后续状态 `S_{t+1}`\
  \ 中选择动作 `A_{t+1}` 的概率，并跳过第一步 `t`，即在状态 `S_t` 中选择动作 `A_t` 的概率。\n\n为了更好地理解这一点，让我们看一个离策略强化学习如何估计状态-动作价值函数\
  \ `Q_π` 的例子，如图 5.4 所示。请记住，我们是在估计一个状态-动作对的价值，而不仅仅是状态的价值。更具体地说，我们只关心状态 `s` 下动作 `a`\
  \ 的价值。行为策略 `μ` 或目标策略 `π` 选择 `a` 的概率是多少并不重要，因为我们一定会更新这个特定动作 `a` 的价值。如果我们看这个图，路径的一部分（从\
  \ `s` 到 `a`）总是相同的，所以在计算重要性采样比率时无需包含它。真正重要的是，在环境转移到后续状态 `s'` 之后，行为策略和目标策略在状态 `s'`\
  \ 下选择动作 `a'` 的概率。\n\n![](img/605748_1_En_5_Fig4_HTML.png)\n\n一个用于离策略强化学习的树状图，从一个\
  \ `s` 节点开始，分支到 3 个节点。左侧和右侧节点及其分支未标记。中间标记为 `a`、`r` 的节点分支到一个 `s'` 节点和一个未标记节点。`s'`\
  \ 节点分支到一个 `a'` 节点和一个双撇节点。\n\n**图 5.4** 离策略强化学习示例，用于在利用由不同行为策略 `μ` 生成的数据的同时，估计目标策略\
  \ `π` 的状态-动作价值函数 `Q_π`\n\n当使用离策略强化学习和 TD 策略评估来计算 `Q_π` 时，我们可以使用以下公式来计算单个转移元组 `(S_t,\
  \ A_t, R_t, S_{t+1}, A_{t+1})` 的重要性采样比率：\n\n```\nρ_{t+1} = π(A_{t+1}|S_{t+1}) p(S_{t+1}|S_t,\
  \ A_t) / μ(A_{t+1}|S_{t+1}) p(S_{t+1}|S_t, A_t)\n        = π(A_{t+1}|S_{t+1}) /\
  \ μ(A_{t+1}|S_{t+1})\n```\n(5.10)\n\n这里，`ρ_{t+1}` 表示从时间步 `t+1` 开始的重要性采样比率，它用于修正行为策略与目标策略之间的概率差异。具体来说，`π`\
  \ 代表目标策略，而 `μ` 代表行为策略。\n\n公式 (5.11) 展示了在使用 TD(0) 和离策略强化学习时，针对 `Q_π` 调整后的价值更新规则：\n\
  \n```\nQ_π(S_t, A_t) = Q_π(S_t, A_t) + α * π(A_{t+1}|S_{t+1}) / μ(A_{t+1}|S_{t+1})\
  \ * ( [R_t + γ Q_π(S_{t+1}, A_{t+1})] - Q_π(S_t, A_t) )\n```\n(5.11)\n\n该公式利用由不同行为策略\
  \ `μ` 生成的转移数据，更新了针对目标策略 `π` 的状态-动作价值函数 `Q_π` 的估计值。重要性采样比率用于修正行为策略与目标策略之间的概率差异。具体来说，我们使用比率\
  \ `π(A_{t+1}|S_{t+1}) / μ(A_{t+1}|S_{t+1})` 来调整更新，以便将目标策略与行为策略之间的差异考虑在内。该更新基于时序差分误差，即当前状态-动作对的估计\
  \ Q 值与下一状态-动作对的估计 Q 值之间的差值，再加上在当前状态-动作对获得的奖励。学习率 `α` 控制着更新的大小。\n\n现在，我们介绍针对给定策略\
  \ `π` 的 `Q_π` 的离策略 TD(0) 策略评估算法。\n\n**算法 6：离策略时序差分 [TD(0)] 策略评估用于 `Q[π]`**\n\n![](img/605748_1_En_5_Figaaf_HTML.gif)\
  \ 一个 11 行的算法，用于计算离策略时序差分 TD(0) 和 `Q_π` 的策略评估，它接收以下输入，为目标策略 `π` 给出估计的状态-动作价值函数 `Q_π`。待评估的目标策略\
  \ `π`、折扣率 `γ`、步长 `α` 以及步数 `K`。\n\n\n\n在上一章中，我们介绍了用于学习动作价值的蒙特卡洛方法，并且可以将这些方法扩展到离策略学习。然而，重要性采样比率会变得更加复杂，因为我们需要包含直到情节结束的动作选择概率和状态转移概率。计算重要性采样比率`ρ_{t:T-1}`的公式包含了诸如`π(a|s)`和`μ(a|s)`这样的项，它们分别表示在目标策略和行为策略下，在状态`s`中选择动作`a`的概率。需要注意的是，如果在转移序列中的任何一点，这些概率中的任何一个变为零，那么重要性采样比率也会变为零。这意味着该序列的价值也将变为零并被丢弃。\n\
  \n```\nρ_{t:T-1} = (π(A_t|S_t) p(S_{t+1}|S_t, A_t) π(A_{t+1}|S_{t+1}) ... p(S_T|S_{T-1},\
  \ A_{T-1})) / (μ(A_t|S_t) p(S_{t+1}|S_t, A_t) μ(A_{t+1}|S_{t+1}) ... p(S_T|S_{T-1},\
  \ A_{T-1}))\n          = (π(A_t|S_t) π(A_{t+1}|S_{t+1}) ... π(A_{T-1}|S_{T-1}))\
  \ / (μ(A_t|S_t) μ(A_{t+1}|S_{t+1}) ... μ(A_{T-1}|S_{T-1}))\n```\n\n(5.12)\n\n在实践中，经常使用带有离策略学习的时序差分学习，例如我们将在下一节介绍的`Q-learning`算法。然而，在以下情况下，使用蒙特卡洛方法的离策略学习可能比其他方法更受青睐：\n\
  \n*   生成数据的行为策略与智能体当前遵循的目标策略存在显著差异。在这种情况下，使用其他方法（如时序差分学习）在目标策略下学习时，由行为策略收集的数据可能用处不大。另一方面，蒙特卡洛方法仍然可以用于估计状态或动作的价值，因为它们依赖于完整的情节序列，而不是单个转移。\n\
  *   智能体需要学习罕见或不频繁动作的价值。在某些环境中，某些动作可能很少见，或者行为策略很少选择它们。时序差分学习可能无法提供这些动作价值的准确估计，因为它依赖于单个转移来更新估计。相比之下，蒙特卡洛方法可以提供对罕见或不频繁动作价值更准确的估计，因为它们依赖于完整的情节序列。\n\
  *   智能体需要学习一个既不同于行为策略也不同于目标策略的策略的价值。在这种情况下，可以使用蒙特卡洛方法来估计所需策略的价值，而无需智能体在数据收集期间实际遵循该策略。\n\
  \n### 5.6 Q-Learning\n\n`Q-learning`是一种在线、离策略学习算法，由 Watkins 和 Peter 开发。它是一种无模型的强化学习方法，也使用时序差分学习，这意味着`Q-learning`支持情节式和持续式强化学习问题。它可能是现实世界中用于解决强化学习问题最常用的算法之一。由\
  \ DeepMind 构建的、能够以人类水平玩 Atari 视频游戏的著名`DQN`智能体，就是基于`Q-learning`（`DQN`智能体使用深度神经网络来近似状态-动作价值函数，我们将在本书第二部分介绍）。\n\
  \n我们之前介绍的`SARSA`算法被认为是通用策略迭代算法家族的一员。它估计策略`π`的状态-动作价值函数`Q_π`，并使用`ε`-贪婪策略来计算一个新的、更好的策略`π'`。尽管我们使用了一个更简单的`ε`-贪婪策略版本，跳过了计算更好确定性策略的步骤，但策略迭代的总体思想仍然适用于`SARSA`。\n\
  \n然而，如果我们还记得，我们在第 3 章中介绍了另一种动态规划算法，称为价值迭代。与通用策略迭代算法估计策略`π`的价值函数不同，价值迭代算法首先尝试基于`V_*`的贝尔曼最优方程来估计最优状态价值函数`V_*`：\n\
  \n```\nV_*(s) = max_a E[R_t + γ V_*(S_{t+1}) | S_t = s, A_t = a]\n       = max_a\
  \ [R(s, a) + γ Σ_{s'∈S} P(s'|s, a) V_*(s')], 对于所有 s∈S\n```\n\n(5.13)\n\n`Q-learning`采用了与价值迭代类似的思想，但它不是估计最优状态价值函数`V_*`，而是估计最优状态-动作价值函数`Q_*`。回顾`Q_*`的贝尔曼最优方程：\n\
  \n```\nQ_*(s, a) = E[R_t + γ max_{a'} Q_*(S_{t+1}, a') | S_t=s, A_t=a]\n```\n\n\
  (5.14)\n\n`Q-learning`使用公式(5.14)和时序差分学习的增量更新方法思想作为价值更新规则，其更新规则如下：\n\n```\nQ(S_t,\
  \ A_t) = Q(S_t, A_t) + α ( [R_t + γ max_{a'} Q(S_{t+1}, a')] - Q(S_t, A_t) )\n```\n\
  \n(5.15)\n\n`Q-learning`是一种离策略学习算法，它避免了其他离策略学习算法中通常使用的重要性采样。重要性采样可能在计算上代价高昂并引入偏差，这使得`Q-learning`成为估计最优状态-动作价值函数的一种更高效、更可靠的方法。\n\
  \n\n\nQ-learning 的一个优势是，它总是使用后继状态 `s'` 所有有效动作中的最大 Q 值 `max_a' Q(S_{t+1}, a')` 进行更新，无论行为策略选择了哪个动作。对于\
  \ Q-learning，由于目标策略总是为后继状态选择具有最大 Q 值的动作，因此重要性采样比率简化为：在行为策略下选择最大 Q 值动作的概率除以在目标策略下选择最大\
  \ Q 值动作的概率。该比率始终等于 1，与行为策略无关，因为在值更新过程中并未使用行为策略选择的动作。相比之下，其他离策略学习算法可能需要重要性采样来纠正行为策略与目标策略之间的差异。\n\
  \n图 5.5 展示了一个 Q-learning 为目标策略 `π` 估计最优状态-动作值函数 `Q*` 的示例。如图所示，无论智能体在遵循行为策略 `μ` 进入后继状态\
  \ `s'` 时选择了哪个动作，用于值更新的遍历路径始终相同。然而，在某些特殊情况下，例如使用依赖于行为策略选择动作的 N 步回报时，我们仍需使用重要性采样。\n\
  \n[图：一个离策略 Q-learning 的树状图，从节点 s 开始，分支到 3 个节点。左右节点及其分支未标记。中间节点标记为 a, r，分支到一个 s'\
  \ 节点和一个未标记节点。s' 节点分支到一个 a' 节点和一个 a'' 节点。]\n\n**图 5.5** 离策略 Q-learning 为目标策略 `π`\
  \ 估计最优状态-动作值函数 `Q*` 的示例\n\n为了更新 Q-learning 中的 Q 值，我们使用目标策略来评估动作 `a' = max_a' Q(S_{t+1},\
  \ a')`，同时使用评估值来学习同一个目标策略。这意味着 Q-learning 的重要性采样比率简化为 1，因为分子和分母相同。具体来说，重要性采样比率可以表示为：\n\
  \n```\nρ_{t+1} = (π(A_{t+1}|S_{t+1}) * p(S_{t+1}|S_t, A_t)) / (π(A_{t+1}|S_{t+1})\
  \ * p(S_{t+1}|S_t, A_t)) = 1\n```\n\n(5.16)\n\n通过避免对重要性采样的需求，Q-learning 在计算上更高效，并且可以更准确地估计最优状态-动作值函数。例如，假设我们有一个使用\
  \ Q-learning 的智能体，它已经为某个状态 `s` 和动作 `a` 估计了状态-动作值 `Q(s, a) = 10`。现在，智能体执行动作 `a` 并转移到新状态\
  \ `s'`，其中最大 Q 值为 `Q(s', a') = 15`。然而，用于在状态 `s'` 中选择动作的行为策略与用于更新 Q 值的目标策略不同。在这种情况下，更新\
  \ `Q(s, a)` 的重要性采样比率涉及在行为策略和目标策略下选择 `a` 和 `a'` 的概率之比。但由于 Q-learning 总是使用下一个状态的最大\
  \ Q 值，我们无需考虑选择导致该最大值的动作的概率。这简化了更新过程，并使 Q-learning 比其他需要重要性采样的离策略学习算法更高效。\n\nQ-learning\
  \ 是一种无模型强化学习算法，与 SARSA 类似，它需要平衡探索和利用以学习最优策略。在强化学习中，探索指的是尝试新动作以发现潜在更优的策略，而利用指的是利用已知策略以最大化奖励。为此，我们可以采用\
  \ `ε`-贪心策略，该策略以概率 `1 - ε` 选择最佳动作，以概率 `ε` 选择随机动作。\n\nQ-learning 和 SARSA 具有相似的结构和流程，都使用时序差分（TD）学习方法。然而，在\
  \ Q 值更新过程中，Q-learning 总是为后继状态 `S_{t+1}` 选择具有最高 Q 值的动作，记为 `max_a' Q(S_{t+1}, a')`，而\
  \ SARSA 则从策略中采样一个动作。这是因为 Q-learning 是一种离策略算法，它基于最佳可能动作更新 Q 值，而 SARSA 是一种在策略算法，它基于实际采取的动作更新\
  \ Q 值。\n\nQ-learning 算法的伪代码如算法 7 所示。与 SARSA 一样，Q-learning 对超参数敏感，例如步长 `α` 和 `ε`-贪心策略的探索率\
  \ `ε`。步长决定了算法更新 Q 值的速度，而探索率决定了算法探索新动作（而非利用当前最佳动作）的频率。\n\n**算法 7：** 带 `ε`-贪心探索的 Q-learning\n\
  \n[图：一个 10 行算法，标题为“带 epsilon 减贪心探索的 Q-learning”，输入为折扣率 gamma、初始探索率 epsilon、步长 alpha\
  \ 和步数 K，输出为估计的最优状态-动作值函数 Q。]\n\n\n\n#### 工作示例\n\n让我们来看一个 Q-learning 如何更新状态-动作对 `(s,\
  \ a)` 值的例子。我们仍将使用服务犬 MDP。但这次，我们采用图 5.2 中通过 TD(0)策略评估计算出的随机策略的状态-动作值。我们只关注算法如何计算状态*房间\
  \ 1*和动作*前往房间 2*的值（图 5.6）。\n\n![](img/605748_1_En_5_Fig6_HTML.png)\n\nQ-learning\
