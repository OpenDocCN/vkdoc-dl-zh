  \ Q 网络和一个参数为`θ^-`的目标网络。我们可以将这个目标网络`θ^-`用作第二个状态-动作值函数`Q2`，并对 TD 目标计算公式进行一些修改，以得到在\
  \ DQN 中使用双 Q 学习时的值更新规则。\n\n然后，我们可以对公式（8.1）进行一些修改，得到在使用神经网络`θ, θ^-`作为`Q1, Q2`时如何计算\
  \ TD 目标的公式：\n\n```\nTD_target = r_t + γ * Q̂(s_{t+1}, argmax_{a'} Q̂(s_{t+1}, a';\
  \ θ); θ^-)\n```\n\n(8.2)\n\n我们可以将使用神经网络`θ`和`θ^-`进行双 Q 学习的目标函数定义为 TD 目标与估计的状态-动作值之间的平方差。\n\
  \n```\nJ(θ) = (r_t + γ * Q̂(s_{t+1}, argmax_{a'} Q̂(s_{t+1}, a'; θ); θ^-) - Q̂(s_t,\
  \ a_t; θ))²\n```\n\n(8.3)\n\n由于标准 DQN 智能体会定期从标准 Q 网络更新目标网络的参数，使得`θ^- = θ`。我们实际上可以跳过像表格情况那样花费\
  \ 50%的时间来学习第二个状态-动作值函数`Q2`的过程。现在我们可以介绍由 Hasselt 等人开发的基于双 Q 学习的 DQN 算法[2]。与标准 DQN\
  \ 算法相比，整体流程相同；唯一的区别在于我们如何使用目标网络`θ^-`来计算 TD 目标。根据强化学习问题的不同，我们可能还需要增加`C`，即更新目标网络的间隔（例如，标准\
  \ DQN 设置的 2 到 3 倍）。\n\n**算法 1：基于双 Q 学习、经验回放和ε-贪婪探索策略的 DQN 算法**\n\n该算法初始化神经网络的`i`、`θ`、`θ^-`以及容量为`N`的回放缓冲区。然后采样动作、执行动作并存储经验。如果`D`的长度大于`m`和`b`，则采样大小为`b`的小批量转移样本，计算\
  \ TD 目标和损失以更新目标网络。\n\n图 8.1 展示了基于双 Q 学习的 DQN 智能体与标准 DQN 智能体在 Atari River Raid 游戏上的性能。结果显示了平均回合回报（总未折扣奖励）和\
  \ 95%置信区间。为了评估智能体的性能，我们在一个独立的测试环境中，使用ε-贪婪策略和固定的探索ε（`ε = 0.05`），在每个训练迭代（包含 250,000\
  \ 个训练步或 100 万帧）结束时运行了 200,000 个评估步，其中评估环境未应用奖励裁剪或生命损失的软终止。结果取五次独立运行的平均值，并使用窗口大小为\
  \ 5 的移动平均进行平滑处理。\n\n**图 8.1** 基于双 Q 学习的 DQN 与标准 DQN 在 Atari 游戏 River Raid 上的对比。结果显示了平均回合回报（总未折扣奖励）和\
  \ 95%置信区间。结果取五次独立运行的平均值，然后使用窗口大小为 5 的移动平均进一步平滑处理\n\n本次实验我们使用学习率 0.00025、折扣率 0.99、批次大小\
  \ 32 和回放容量 100,000。我们将`C`设置为 5000，即更新目标网络的间隔。图 8.1 展示了这两个智能体的回合回报（五次独立运行的平均值）。我们可以看到，使用基于双\
  \ Q 学习的 DQN 在收敛速度和训练稳定性方面获得了更好的性能。\n\n\n\n### 8.2 优先经验回放\n\n对标准 DQN 智能体的下一个改进来自如何从经验回放缓冲区中采样转换。当前的做法是，DQN\
  \ 智能体从最近的 *N* 个转换中随机采样一个小批量的转换。然而，有理由认为回放缓冲区中的某些转换比其他转换更有价值。例如，一个转换可能包含智能体从未遇到过的状态，或者它可能具有更高的奖励信号。在这两种情况下，我们都希望智能体花更多时间学习这些有价值的转换，或者优先处理它们。但如何定义一个特定的转换比其他转换更有价值呢？\n\
  \n一种分配优先级的方法是使用转换的采样频率。采样次数较少的转换将比其他转换具有更高的优先级，而那些从未被采样过的转换将具有最高的优先级。这种方法背后的直觉是，我们应该更多地关注那些尚未用于更新网络参数的转换。然而，这种方法有其局限性，因为仅仅计算这些转换的使用次数并不总能反映它们的重要性或优先级。例如，智能体可能会过度使用新生成的转换，即使它已经学习了足够多的关于相似或相同情况的知识。我们希望智能体花更少的时间学习熟悉的转换，而将重点放在那些不熟悉且更有趣的转换上。\n\
  \n一种系统性地确定转换优先级的方法是使用 TD 误差 `δ`，如 Schaul 等人 [3] 所提出的。训练神经网络的目标是最小化这些误差，通常是平方误差。具有较大\
  \ TD 误差的转换应比具有较小 TD 误差的转换具有更高的优先级。提醒一下，如第 5 章所述，TD 误差定义为 TD 目标与当前估计值之间的差值。对于带有目标网络\
  \ `θ⁻` 的 DQN，我们可以为转换元组 `(s_t, a_t, r_t, s_{t+1})` 定义 `δ` 如下：\n\n```\nδ = TD_target\
  \ - Q̂(s_t, a_t; θ)\n  = r_t + γ * max_{a'} Q̂(s_{t+1}, a'; θ⁻) - Q̂(s_t, a_t; θ)\n\
  ```\n\n(8.4)\n\n如果我们使用带有双重 Q 学习的 DQN，那么我们可以将 TD 误差 `δ` 定义为：\n\n```\nδ = TD_target\
  \ - Q̂(s_t, a_t; θ)\n  = r_t + γ * Q̂(s_{t+1}, argmax_{a'} Q̂(s_{t+1}, a'; θ); θ⁻)\
  \ - Q̂(s_t, a_t; θ)\n```\n\n(8.5)\n\n当智能体从回放缓冲区采样一个小批量转换来更新参数 `θ` 时，它会计算小批量中每个转换的\
  \ TD 误差，并相应地更新它们在回放缓冲区中的优先级。\n\n然而，将这种方法与经验回放结合用于学习会引发一个重要问题。回放缓冲区中的某些转换可能很久以前由一个表现较差的智能体生成，因为\
  \ DQN 是离策略学习，并且我们在回放缓冲区中保存了大量历史转换，由于当时行为策略的影响，导致这些转换的 TD 误差较大。与此同时，随着智能体在预测不同状态-动作对的值方面变得更好，新生成的转换往往具有较小的\
  \ TD 误差。如果智能体仅根据优先级采样转换，它可能会倾向于使用具有较大 TD 误差的较旧转换，这可能导致过拟合。\n\n为了解决这个问题，Schaul 等人\
  \ [3] 建议在采样过程中引入一些噪声。一种方法是使用比例优先级，其中采样第 *i* 个转换的概率基于该转换的优先级，记为 `p_i`，并乘以一个变量 `β`\
  \ 的幂次。设置 `β = 0` 对应于均匀随机采样，所有转换被采样的机会均等。采样第 *i* 个转换的概率由下式给出：\n\n```\nP(i) = p_i^β\
  \ / Σ_k p_k^β\n```\n\n(8.6)\n\n然而，由于我们在采样过程中引入了噪声，在使用采样的小批量更新网络参数时，我们需要对此进行修正。一种方法是使用某种方法对\
  \ TD 误差项进行重新加权。对于优先回放，第 *i* 个转换的采样权重使用以下公式计算：\n\n```\nw_i = ( (1/N) * (1/P(i)) )^η\n\
  ```\n\n(8.7)\n\n这里，*N* 是回放缓冲区中的总转换数，`η` 是一个控制我们想要修正 TD 误差项程度的变量。`η = 1` 表示我们希望完全修正它，而\
  \ `η = 0` 表示完全不修正。我们可以使用某种线性方法随着学习的进行来退火 `η`，例如原始论文中使用的从 0.4 到 1.0 的线性退火。\n\n而采样权重向量\
  \ `w` 只是一个具有 *n* 个条目的列向量，其中 *n* 是小批量大小。\n\n```\nw = [ ( (1/N) * (1/P(0)) )^η ]\n\
  \    [ ( (1/N) * (1/P(1)) )^η ]\n    [         ...            ]\n    [ ( (1/N) *\
  \ (1/P(n)) )^η ]\n```\n\n(8.8)\n\n在实践中，通常需要对采样权重 `w` 进行归一化，以实现稳定的训练过程。这是通过将权重除以所有样本中的最大权重值来实现的。这种归一化在公式\
  \ (8.9) 中表示：\n\n```\nw / max_i w_i\n```\n\n(8.9)\n\n\n\n当生成新的转移时，我们需要确定其优先级。虽然我们可以使用与之前相同的方法计算优先级，但更常见的做法是为每个新转移分配一个预定义的优先级，例如\
  \ `1.0`。或者，我们也可以分配智能体在训练过程中迄今为止遇到的最大优先级。我们这样做是因为我们仍然偏向于新生成的转移，并希望智能体使用它们进行训练。然而，如果某个转移的优先级较低（即\
  \ TD 误差），它未来被采样的频率就会降低。此外，为所有新转移分配最大优先级可以节省计算资源，因为智能体通常会生成数百万个转移。\n\n我们现在介绍针对双 Q\
  \ 学习算法的 DQN 的比例优先级方法，该方法最初由 Schaul 等人提出 [3]。该算法基于我们本章前面介绍的双 Q 学习算法的 DQN。主要区别在于，当智能体在回放缓冲区中存储单个转移时，它会为其分配一个优先级值。默认情况下，此优先级值设置为迄今为止所见优先级中的最大值。\n\
  \n图 8.2 展示了优先级双 DQN 和标准 DQN 智能体在 Atari 游戏 River Raid 上的性能。结果显示了平均回合回报（总未折扣奖励）和 95%\
  \ 置信区间。为了评估智能体的性能，我们在一个独立的测试环境中运行了 200,000 个评估步骤，该环境使用 `ε`-贪婪策略，并在每次训练迭代（包含 250,000\
  \ 个训练步骤或 100 万帧）结束时使用固定的探索 epsilon（`ε = 0.05`），评估环境中不应用奖励裁剪或生命损失时的软终止。结果在五次独立运行中取平均值，并使用窗口大小为\
  \ 5 的移动平均进行平滑处理。\n\n![](img/605748_1_En_8_Fig2_HTML.png)\n\n一张图表绘制了评估回合回报与训练环境帧数的关系。图表呈现了两条上升趋势线，分别标注为\
  \ DQN 和优先级双 DQN。标注为优先级双 DQN 的线条呈现出更高的峰值。\n\n**图 8.2** 在 Atari 游戏 River Raid 上，优先级双\
  \ DQN 与 DQN 的对比。结果显示了平均回合回报（总未折扣奖励）和 95% 置信区间。结果在五次独立运行中取平均值，然后使用窗口大小为 5 的移动平均进一步平滑。\n\
  \n**算法 2：** 使用优先级经验回放的双 DQN，采用 `ε`-贪婪策略进行探索\n\n![](img/605748_1_En_8_Figaab_HTML.gif)\
  \ 一种算法，初始化神经网络的 `i`、`theta`、`theta minus` 以及容量为 `N` 的回放缓冲区。然后采样动作、执行动作并存储经验。如果 `D`\
  \ 的长度大于 `m` 和 `b`，则采样包含 `b` 个转移的小批量，并计算 TD 目标、误差和采样权重以更新目标网络。\n\n与双 DQN 实验类似，我们在本实验中使用学习率\
  \ `0.00025`、折扣率 `0.99`、批量大小 `32` 和回放容量 `100,000`。我们每 `5000` 次更新更新一次目标网络。\n\n###\
  \ 8.3 优势函数与决斗网络架构\n\n由 Wang 等人 [4] 提出的优势函数和决斗网络架构是对标准 DQN 算法的另一项改进。\n\n在强化学习中，对于给定策略\
  \ `π`，状态-动作值函数（记为 `Q_π`）用于确定在给定状态下应采取的最佳动作。最佳动作通过选择产生最高状态-动作值的动作来确定，即 `argmax_a\
  \ Q_π(s, a)`。然而，这并不能提供某个动作相比其他动作好多少的信息。为了解决这个问题，Baird 于 1993 年引入了优势函数。优势函数衡量智能体在给定状态\
  \ `s` 下采取特定动作 `a` 所获得的增益或优势。优势函数通过从状态-动作值 `Q_π(s, a)` 中减去状态值 `V_π(s)` 来计算，如公式 (8.10)\
  \ 所示。\n\n```\nA_π(s, a) = Q_π(s, a) - V_π(s)   (8.10)\n```\n\n优势函数帮助我们衡量一个动作相比其他动作是好多少还是差多少。这很有用，因为状态值函数\
  \ `V_π` 和状态-动作值函数 `Q_π` 可能基于给定状态 `s` 关注不同的特征。由于 `V_π` 对所有动作取平均值，而 `Q_π` 只关注一个特定动作，我们可以使用优势函数重写状态-动作值函数，如公式\
  \ (8.11) 所示。\n\n```\nQ_π(s, a) = V_π(s) + A_π(s, a)   (8.11)\n```\n\n当使用神经网络来近似\
  \ `Q_π` 或 `V_π` 时，公式 (8.11) 可以重写为公式 (8.12)，其中 `β, δ` 表示近似函数 `V̂, Â` 的参数。\n\n```\n\
  Q̂(s, a; β, δ) = V̂(s; β) + Â(s, a; δ)   (8.12)\n```\n\n\n\n在实践中，神经网络架构可以设计为让 `\\\
  hat{V}` 和 `\\hat{A}` 在一定程度上共享相同的权重 `\\boldsymbol{\\theta}`，同时 `\\hat{V}` 和 `\\hat{A}`\
  \ 仍保留各自的权重 `\\beta, \\delta`。该方程可以写成如下形式：\n\n```\n\\hat{Q}(s, a; \\boldsymbol{\\\
  theta}, \\beta, \\delta) = \\hat{V}(s; \\boldsymbol{\\theta}, \\beta) + \\hat{A}(s,\
  \ a; \\boldsymbol{\\theta}, \\delta)\n```\n\n(8.13)\n\n然而，当使用 DQN 适配公式 (8.11) 时，无法保证状态值\
  \ `\\hat{V}` 的准确性，因为它并未反映在 Q 学习的目标函数中。为解决此问题，原始的决斗 DQN 论文提出了一种强制智能体学习状态值函数的解决方案。由此得到的方程如公式\
  \ (8.14) 所示：\n\n```\n\\hat{Q}(s, a; \\boldsymbol{\\theta}, \\beta, \\delta) = \\\
  hat{V}(s; \\boldsymbol{\\theta}, \\beta) + \\Bigl( \\hat{A}(s, a; \\boldsymbol{\\\
  theta}, \\delta) - \\max_{a \\in \\cal{A}} \\hat{A}(s, a; \\boldsymbol{\\theta},\
  \ \\delta) \\Bigr)\n```\n\n(8.14)\n\n更准确地说，对于最优动作 `a_*`（其中 `a_* = \\mathop{\\text{argmax}}_{a\
  \ \\in \\cal{A}} \\hat{A}(s, a; \\boldsymbol{\\theta}, \\delta)`），公式 (8.14) 中的优势项\
  \ `\\hat{A}(s, a; \\boldsymbol{\\theta}, \\delta) - \\max_{a \\in \\cal{A}} \\hat{A}(s,\
  \ a; \\boldsymbol{\\theta}, \\delta)` 变为零；因此，我们得到 `\\hat{Q}(s, a_*; \\boldsymbol{\\\
  theta}, \\beta, \\delta) = \\hat{V}(s; \\boldsymbol{\\theta}, \\beta)`。\n\n但在实践中，我们采用了一个略有不同的版本，即在优势项中使用平均值而非最大值，如公式\
  \ (8.15) 所示，这在训练过程中实现了更好的稳定性。\n\n```\n\\hat{Q}(s, a; \\boldsymbol{\\theta}, \\beta,\
  \ \\delta) = \\hat{V}(s; \\boldsymbol{\\theta}, \\beta) + \\Biggl( \\hat{A}(s, a;\
  \ \\boldsymbol{\\theta}, \\delta) - \\frac{1}{|\\cal{A}|} \\sum_{a \\in \\cal{A}}\
  \ \\hat{A}(s, a; \\boldsymbol{\\theta}, \\delta) \\Biggr)\n```\n\n(8.15)\n\nWang\
  \ 等人 [4] 提出的决斗网络架构是对深度 Q 网络（DQN）的改进，旨在提升其在强化学习问题中估计状态-动作值的能力。在标准 DQN 中，神经网络以游戏画面图像作为输入，并输出所有可能动作的估计状态-动作值。决斗网络架构将该网络拆分为两个独立的头部，一个用于估计状态值，另一个用于估计每个动作的优势值。\n\
  \n图 8.3 展示了决斗网络的架构。该网络以状态 `s`（一个 `84 \\times 84 \\times 4` 的图像）作为输入。网络的前三层是卷积层，这些层的参数是共享的（对应公式\
  \ (8.15) 中的 `\\boldsymbol{\\theta}`）。来自最后一个隐藏层的特征图随后被输入到两个独立的全连接层：一个用于估计状态值函数 `\\\
  hat{V}`，另一个用于估计优势函数 `\\hat{A}`。\n\n![](img/605748_1_En_8_Fig3_HTML.png)\n\nDQN 神经网络的示意图如下：输入数据，32\
  \ 个滤波器，ReLU，64 个滤波器，ReLU，64 个滤波器，ReLU，512 个单元，ReLU，1 个单元的状态值头部和 18 个单元的优势头部。使用 `\\\
  hat{V}` 和 `\\hat{A}` 计算 `\\hat{Q}` 以及状态-动作值。\n\n**图 8.3** DQN 神经网络的决斗架构\n\n状态值函数头部由一个包含一个单元且无激活函数的全连接层组成，用于生成估计的状态值。优势函数头部由一个包含\
  \ 18 个单元（即可能的动作数量）且无激活函数的全连接层组成，用于生成每个动作的估计优势值。\n\n最终的估计状态-动作值通过一个简单的数学运算计算得出，该运算将估计的状态值和优势值结合起来，如公式\
  \ (8.15) 所示。此计算由图 8.3 中的红色方框标出。\n\n决斗网络架构可以与标准 DQN 或双 DQN 算法结合使用，以在训练过程中采样小批量转换并更新网络参数。它也可以与优先经验回放结合使用，后者根据转换的估计时序差分误差对其进行优先级排序，以提高学习效率。\n\
  \n图 8.4 展示了决斗双 DQN 和 DQN 智能体在 Atari 游戏《河攻》上的性能。结果显示了平均回合回报（总未折扣奖励）和 95% 的置信区间。为了评估智能体的性能，我们在一个独立的测试环境中，使用\
  \ `\\epsilon`-贪心策略和固定的探索 epsilon（`\\epsilon = 0.05`），在每个训练迭代（包含 250,000 个训练步骤或 100\
  \ 万帧）结束时运行了 200,000 个评估步骤。评估环境中未应用奖励裁剪或生命损失时的软终止。结果取五次独立运行的平均值，并使用窗口大小为 5 的移动平均进行平滑处理。\n\
  \n![](img/605748_1_En_8_Fig4_HTML.png)\n\n一张图表绘制了评估回合回报与训练环境帧数的关系。它呈现了两条上升趋势线，分别标注为\
  \ DQN 和决斗双 DQN。标注为决斗双 DQN 的线条峰值更高。\n\n**图 8.4** 决斗双 DQN 与 DQN 在 Atari 游戏《河攻》上的对比。结果显示了平均回合回报（总未折扣奖励）和\
  \ 95% 的置信区间。结果取五次独立运行的平均值，然后使用窗口大小为 5 的移动平均进行进一步平滑处理\n\n与前述实验类似，本实验中使用学习率 `\\alpha\
  \ = 0.00025`、折扣率 `\\gamma = 0.99`、批次大小 32 以及回放容量 100,000。我们每 5000 次更新更新一次目标网络。\n\
  \n\n\n### 8.4 小结\n\n在本章中，我们探讨了对标准 `DQN` 智能体的若干改进，以解决其局限性。尽管 `DQN` 智能体在雅达利游戏中达到了人类水平的表现，但在面对更复杂、更困难的游戏时仍面临挑战。通过融入这些改进，研究人员证明了智能体整体性能的显著提升。\n\
  \n我们首先介绍了针对 `DQN` 的双 Q 学习，这是一种直接且简单的改进方法。双 Q 学习最初由 Hado Hasselt [1] 提出，后来被应用于 `DQN`\
  \ [2]，有助于减轻与 Q 学习相关的最大化偏差。通过将双 Q 学习集成到 `DQN` 智能体中，我们观察到了显著的性能提升。\n\n接下来，我们深入探讨了\
  \ Schaul 等人 [3] 提出的优先经验回放概念。该技术强调使用更重要的转换来训练智能体，而非均匀采样经验。这种方法优先处理紧急的转换，有助于改善学习效果。\n\
  \n此外，我们还讨论了优势函数及其在标准 `DQN` 智能体神经网络架构中的整合。这引出了对 `DQN` 智能体决斗网络架构的讨论，该架构展现出卓越的性能提升，这一想法最初由\
  \ Wang 等人 [4] 提出。\n\n在实践中，本章讨论的所有改进方法被结合起来，以创建一个显著更强大的智能体。值得注意的是，除了这里提到的改进之外，还存在许多其他改进。例如，N\
  \ 步回报（自举）方法 [5] 的改编，以及使用神经网络预测状态-动作值分布而非单一值 [6, 7] 的探索，也引起了人们的关注。\n\n本章结束了本书的第二部分，该部分我们专注于值函数逼近，特别是使用神经网络进行非线性值函数逼近。虽然第一部分和[第二部分](https://doi.org/10.1007/978-1-4842-9606-6_II)都强调了基于值的方法（例如学习状态-动作值函数），但下一章将把我们的焦点转向基于策略的方法，这是解决强化学习问题的另一种同样强大的技术。\n\
  \n"
- '# 第三部分：策略逼近


  '
- "# 9. 策略梯度方法\n\n在本章中，我们将探讨基于策略的方法，这是强化学习算法家族中的另一类。在前面的章节中，我们专注于基于值的方法，这些方法估计最优状态-动作值函数。对于大型状态或动作空间，基于值的方法在计算上可能变得昂贵，并且在环境动态具有随机性的环境中可能难以应对。\n\
  \n另一方面，基于策略的方法直接学习最优策略，而无需估计状态-动作值函数。我们通常使用近似技术来参数化策略，例如神经网络，并使用策略梯度来更新参数。策略梯度衡量期望回报随策略参数变化的变化程度。通过优化策略参数以增加期望回报，基于策略的方法学会采取能最大化奖励的动作。\n\
  \n基于策略的方法相比基于值的方法有几个优势。首先，它们可以处理连续且高维的动作空间，而基于值的方法可能难以应对。其次，它们可以学习随机策略，这在存在不确定性或多种良好动作的环境中非常有用。\n\
  \n总之，基于策略的方法为强化学习提供了一种替代途径，能够处理大型、连续的动作空间。像 `REINFORCE` 和 Actor-Critic 这样的策略梯度算法提供了直接从经验中学习最优策略的强大方法，并且可以与其他方法结合以进一步提高性能。\n\
  \n\n\n### 9.1 基于策略的方法\n\n到目前为止，本书仅介绍了基于价值的强化学习算法。这些算法旨在通过蒙特卡洛方法或时序差分学习方法，学习最优策略\
  \ `π*` 的最优状态-动作价值函数 `Q*`。然后，我们可以基于学习到的最优状态-动作价值函数构建一个确定性或贪婪策略。然而，最终目标是学习最优策略 `π*`，这正是智能体在与环境交互时做出决策所需要的。智能体能否在不先学习价值函数的情况下，直接学习最优策略呢？\n\
  \n答案是肯定的。基于策略的方法允许我们学习一个参数化的策略，该策略由一组通过训练优化的参数表示，而非显式定义。在本节中，我们将探讨如何使用策略梯度方法来学习这样的策略。\n\
  \n在深入探讨策略近似和策略梯度方法之前，我们先来看看直接学习参数化策略，而非从学习到的价值函数中推导策略的一些优势：\n\n- **更好的收敛性**：对于某些问题，基于价值的强化学习方法在训练过程中可能会发生振荡，而基于策略的方法通常具有更平滑的学习曲线，从而带来更好的收敛特性。\n\
  \n- **随机策略**：学习到的策略可以是随机的，这意味着它可以输出一个关于可用动作的概率分布。这与基于价值的方法不同，后者通常会产生一个总是选择最高价值动作的确定性策略。虽然可以通过使用\
  \ `ε`-贪婪策略等方法为确定性策略增加随机性，但这与学习一个具有动作比例分布的随机策略并不相同。学习到的随机策略在最优策略涉及以不同概率采取不同动作的情况下尤其有用，例如当智能体面对随机或部分可观测的环境时。\n\
  \n- **探索**：无需显式使用 `ε`-贪婪策略进行探索，因为随机策略的本质已经实现了这一点。学习到的随机策略可以引导智能体采取一系列动作，包括次优动作，并帮助智能体发现最优策略。\n\
  \n- **高效处理大型动作空间**：基于策略的方法更适合处理具有大型动作空间的问题，甚至是连续动作空间。基于价值的方法需要找到价值最高的动作，而在大量动作上计算这个最大值操作可能计算成本高昂。当动作空间无限时（例如连续动作空间的问题），这尤其麻烦。\n\
  \n在强化学习中，基于策略的方法相比基于价值的方法具有若干优势，例如能够学习一个为动作分配概率而非总是选择最高价值动作的随机策略。这在最优策略可能涉及以不同概率采取不同动作的情况下特别有用，例如当动作结果存在不确定性或最优策略随时间变化时。在存在多个最优策略或智能体需要考虑其他智能体行为的问题中，随机策略也很有价值。\n\
  \n例如，在存在隐藏信息或虚张声势的游戏中，如扑克或其他纸牌游戏，随机策略特别有用，因为智能体无法看到对手的牌。在这种情况下，最优策略可能涉及为不同动作分配不同概率，而不是始终遵循确定性策略。同样，在围棋等游戏中，最优策略可能取决于对手的策略或意图，而这些可能是不确定或随时间变化的，此时随机策略就具有优势。\n\
  \n此外，基于策略的方法更适合连续动作空间，因为它们可以学习输出一个关于动作空间的概率分布，而不是试图找到单个最高价值的动作。这在具有大型或无限动作空间的问题中更容易处理，因为智能体可以根据策略输出的概率分布来探索和选择动作。另一方面，基于价值的方法可能难以找到无限动作空间的最大值，或者难以高效地探索大型动作空间。此外，基于价值的方法通常依赖于对动作空间进行离散化，这可能导致信息丢失并降低算法的有效性。基于策略的方法可以通过直接参数化策略来避免这个问题，从而能够考虑智能体可用的全部动作范围。\n\
  \n然而，值得注意的是，基于策略的方法也有一些缺点。例如，它们可能比基于价值的方法计算成本更高，并且可能在处理高维状态空间时遇到困难。此外，基于策略的方法可能更难训练，并且可能需要更多数据才能收敛到最优策略。\n\
  \n总之，基于策略的方法相比基于价值的方法具有若干优势，包括能够学习随机策略，这在存在多个最优策略、随机或部分可观测环境、或连续或大型动作空间的问题中特别有用。尽管如此，基于策略和基于价值的方法各有优缺点，选择哪种方法将取决于具体问题。\n\
  \n\n#### 策略近似\n\n在强化学习中，策略是一个将状态映射到整个动作空间上概率分布的函数。与价值函数近似类似，我们可以使用参数化函数来近似策略。通过这样做，我们可以在无需先显式学习最优价值函数的情况下，学习到一个在给定环境中表现良好的策略。\n\
  \n为了使用参数化函数表示策略，我们可以使用带有参数 `θ` 的线性或非线性函数。然而，由于策略的输出必须是一个概率分布，我们需要确保它满足概率分布的性质，即非负性。\n\
  \n确保策略输出为有效概率分布的一种常见解决方案是使用 softmax 函数。对于具有离散动作空间的强化学习问题，可以使用 softmax 函数来获得有效动作上的概率分布。softmax\
  \ 函数的定义如下：\n\n```\nπ(a|s; θ) = exp(φ(s,a)ᵀθ) / Σ_{a' ∈ A} exp(φ(s,a')ᵀθ)   (9.1)\n\
  ```\n\n这里，`φ(s,a)` 是一个特征向量或函数，它将状态和动作映射到实值特征。softmax 函数获取当前状态下每个动作的偏好值 `φ(s,a)ᵀθ`，并对其取指数以获得正值。然后，将得到的值除以所有有效动作的指数化偏好值之和进行归一化，从而确保\
  \ softmax 函数的输出是一个非负的概率分布。\n\n例如，考虑一个试图在迷宫中导航的机器人。机器人的当前状态是它在迷宫中的当前位置，其可能的动作是向上、向下、向左或向右移动。机器人的策略是一个函数，将其当前位置映射到这四种动作上的概率分布。通过使用带有参数化特征函数\
  \ `φ(s,a)` 的 softmax 函数，我们可以学习到一个使机器人能够高效导航迷宫的策略。\n\n对于具有连续动作空间的强化学习问题，可以使用高斯函数来获得动作空间上的概率分布。高斯函数的定义如下：\n\
  \n```\nπ(a|s; θ) = (1 / (√(2π)σ(s))) * exp(-(a - μ(s,θ))² / (2σ²(s)))   (9.2)\n\
  ```\n\n这里，`μ(s,θ)` 是高斯分布的均值，`σ(s)` 是标准差，`a` 是某个动作。高斯函数将分布的均值和标准差作为输入，并生成一个动作空间上的概率密度函数（PDF）。为了获得概率分布，我们可以对有效动作空间上的概率密度函数进行积分，使得总概率为\
  \ 1。\n\n例如，考虑一个试图在三维空间中飞到特定位置的无人机。无人机的当前状态是其当前位置和速度，其可能的动作是在三个维度上改变速度。无人机的策略是一个函数，将其当前状态映射到这些连续动作上的概率分布。通过使用带有参数化均值函数\
  \ `μ(s,θ)` 和标准差函数 `σ(s)` 的高斯函数，我们可以学习到一个使无人机能够平稳地在三维空间中导航并高效到达目的地的策略。\n\n类似地，我们也可以使用神经网络来近似策略。如图\
  \ 9.1 所示，网络接收环境状态作为输入，并为所有有效动作输出一个动作概率分布。\n\n总之，策略近似是强化学习中的一项重要技术，它使我们能够在无需先显式学习最优价值函数的情况下，学习到一个在给定环境中表现良好的策略。通过使用参数化函数来表示策略，我们可以利用\
  \ softmax 或高斯函数来确保策略的输出是一个有效的概率分布。这些函数分别特别适用于离散或连续动作空间的问题，并且可以应用于从迷宫导航到无人机飞行的广泛现实世界问题。\n\
  \n\n\n### 9.2 策略梯度\n\n在强化学习中，神经网络可用于近似值函数和策略。然而，基于值的方法使用贝尔曼方程来定义给定策略下值函数的更新规则，但对于由`θ`参数化的策略，并没有类似的等价方法。这意味着，为了使用梯度方法寻找策略的最优参数，我们首先需要定义一个衡量其性能的目标函数。本节受艾玛·布伦希尔教授在其全面的强化学习课程中的杰出工作启发，推导策略梯度的方程\
  \ [[1]](#605748_1_En_9_Chapter.xhtml#CR1)。\n\n在情节式强化学习设定中，我们可以通过从初始状态`s0`开始的期望总回报来衡量策略`π_θ`的性能。我们可以将由`θ`参数化的策略值定义为`V_π_θ(s0)`。我们的目标是找到最大化该值的参数`θ`，因此可以将目标函数定义为\n\
  \n```\nJ(θ) = V_π_θ = V_π_θ(s0)\n```\n\n(9.3)\n\n现在，我们的任务变成了一个标准的优化问题：我们需要找到使`J(θ)`最大化的`θ`。我们可以使用梯度上升法来实现这一点。与用于最小化某个目标函数的梯度下降不同，梯度上升是沿着函数最陡上升方向迈步。在这种情况下，我们沿着`J(θ)`的梯度方向迈出步长为`α`的一步：\n\
  \n```\nθ = θ + α ∇_θ J(θ)\n```\n\n(9.4)\n\n梯度`∇_θ J(θ)`告诉我们，为了增加目标函数的值，需要调整每个参数`θ_i`的程度。通过使用公式\
  \ (9.4) 反复更新参数，我们可以收敛到最大化期望总回报的最优策略参数。\n\n为了比较不同策略的性能，我们可以使用状态值函数`V_π(s)`，它衡量的是从状态`s`开始并遵循策略`π`时的期望总回报。对于任意两个策略`π`和`π'`，如果对于所有状态`s`，都有`V_π'(s)\
  \ ≥ V_π(s)`，我们就说`π'`与`π`一样好或更好。通过仅关注初始状态`s0`，这个概念可以扩展到情节设定中。\n\n让我们展开策略`π_θ`的值函数。我们知道，状态值`s0`就是从初始状态`s0`开始并遵循策略`π_θ`直到达到终止状态`s_T`时的期望回报`G_t`（其中`t=0`）（我们只关注情节式情况）。因此，`π_θ`的值可以写为\n\
  \n```\nV_π_θ = V_π_θ(s0) = E_π_θ[ G_t | s_t = s0 ]\n```\n\n(9.5)\n\n我们知道，一个情节序列`τ`的回报是折扣奖励的总和`G(τ)\
  \ = r0 + γ r1 + γ² r2 + ... + γ^(T-1) r_(T-1)`（针对情节式情况）。公式 (9.5) 中的期望符号提醒我们，智能体在环境中行动时的行为以及环境的动态特性将极大地影响智能体在一个情节序列过程中所能获得的总奖励。这意味着任意情节序列的回报`G(τ)`受两个因素影响：智能体遵循的策略`π_θ`以及环境的动态特性。为简单起见，我们用`τ`表示单个情节的状态、动作和奖励序列，其中\n\
  \n```\nτ = s0, a0, r0, s1, a1, r1, ..., s_(T-1), a_(T-1), r_(T-1), s_T\n```\n\n\
  然后我们用`G(τ)`表示整个情节序列`τ`的折扣奖励总和，其中\n\n\n\n![$\\displaystyle \\begin{aligned} G(\\\
  tau) = \\sum_{t=0}^{T-1} {\\gamma}^t r_t \\end{aligned}$](img/605748_1_En_9_Chapter_TeX_Equb.png)\n\
  \n我们使用 `$P(\\tau ; \\boldsymbol {\\theta })$` 来表示智能体在遵循策略 `$\\pi _{\\boldsymbol\
  \ {\\theta }}$` 时获得任意情节序列 `$\\tau $` 的概率。具体来说，`$P(\\tau ; \\boldsymbol {\\theta\
  \ })$` 是序列中每个时间步 *t* 下，在策略下选择动作的概率 `$\\pi (a_t|s_t; \\boldsymbol {\\theta })$` 与状态转移概率\
  \ `$P(s_{t+1}|s_t, a_t)$` 的乘积。该序列的概率是通过将所有时间步的这些概率相乘，并乘以特定初始状态 `$s_0$` 的起始概率（我们将其表示为\
  \ `$\\mu (s_0)$`）得到的。因此，我们可以利用 `$P(\\tau ; \\boldsymbol {\\theta })$` 和整个情节序列的折扣奖励总和\
  \ `$G(\\tau )$`，将策略 `$\\pi _{\\boldsymbol {\\theta }}$` 的价值方程重写为公式 (9.6) 所示：\n\n\
  ![$\\displaystyle \\begin{aligned} V_{\\pi_{\\boldsymbol{\\theta}}} = \\mathbb{E}_{\\\
  pi_{\\boldsymbol{\\theta}}\\!\\!}\\left[ G(\\tau) \\right] = \\sum_{\\tau} P(\\\
  tau; \\boldsymbol{\\theta}) G(\\tau) {} \\end{aligned} $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ6.png)\n\
  \n(9.6)\n\n这里，`$G(\\tau )$` 是整个情节序列的折扣奖励总和，如前所述，`$G(\\tau ) = \\sum _{t=0}^{T-1}\
  \ {\\gamma }^t r_t$`。这个公式很重要，因为它使我们能够计算策略的价值，这是强化学习中的一个关键概念。\n\n然后，策略的目标函数 `$J(\\\
  boldsymbol {\\theta })$` 可以使用公式 (9.6) 中的项来写出。具体来说，`$J(\\boldsymbol {\\theta })$`\
  \ 表示策略 `$\\pi _{\\boldsymbol {\\theta }}$` 的期望回报，我们希望通过最大化它来找到最佳策略。为了计算关于 `$\\boldsymbol\
  \ {\\theta }$` 的梯度，我们使用了似然比技巧，这是概率论中一个著名的结果，在强化学习中经常被使用。具体来说，我们有\n\n![$\\displaystyle\
  \ \\begin{aligned} \\nabla_{\\boldsymbol{\\theta}}J(\\boldsymbol{\\theta}) &amp;\
  \ = \\nabla_{\\boldsymbol{\\theta}} \\mathbb{E}_{\\pi_{\\boldsymbol{\\theta}}\\\
  !\\!}\\left[ G(\\tau) \\right]\\notag \\\\ &amp; =\\mathbb{E}_{\\pi_{\\boldsymbol{\\\
  theta}}\\!\\!}\\left[ \\nabla_{\\boldsymbol{\\theta}} G(\\tau) \\right]\\notag \\\
  \\ &amp; =\\mathbb{E}_{\\pi_{\\boldsymbol{\\theta}}\\!\\!}\\left[ \\frac{P(\\tau;\
  \ \\boldsymbol{\\theta})}{P(\\tau; \\boldsymbol{\\theta})} \\nabla_{\\boldsymbol{\\\
  theta}} G(\\tau) \\right]\\notag \\\\ &amp; =\\mathbb{E}_{\\pi_{\\boldsymbol{\\\
  theta}}\\!\\!}\\left[ G(\\tau) \\frac{\\nabla_{\\boldsymbol{\\theta}}P(\\tau; \\\
  boldsymbol{\\theta})}{P(\\tau; \\boldsymbol{\\theta})} \\right] \\end{aligned} $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ7.png)\n\
  \n(似然比)\n\n![$\\displaystyle \\begin{aligned} &amp; =\\mathbb{E}_{\\pi_{\\boldsymbol{\\\
  theta}}\\!\\!}\\left[ G(\\tau) \\nabla_{\\boldsymbol{\\theta}} \\log P(\\tau; \\\
  boldsymbol{\\theta}) \\right] {} \\end{aligned} $](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ8.png)\n\
  \n(9.7)\n\n公式 (9.7) 表明，要计算关于 `$\\boldsymbol {\\theta }$` 的梯度，我们只需要找到 `$\\log P(\\\
  tau ; \\boldsymbol {\\theta })$` 的导数。然而，需要注意的是，从特定状态 `$s_0$` 开始的概率通常是未知的，必须从数据中估计。这就是为什么我们使用\
  \ `$\\mu (s_0)$` 来表示初始状态 `$s_0$` 的概率分布。\n\n然后，我们可以将 `$P(\\tau ; \\boldsymbol {\\\
  theta })$` 展开如下：\n\n![$\\displaystyle \\begin{aligned} P(\\tau; \\boldsymbol{\\\
  theta}) = \\mu(s_0) \\cdot \\prod_{t=0}^{T-1} \\pi (a_t|s_t; \\boldsymbol{\\theta})\
  \ \\cdot \\prod_{t=0}^{T-1} P(s_{t+1}|s_t, a_t) {} \\end{aligned} $](img/605748_1_En_9_Chapter_TeX_Equ9.png)\n\
  \n(9.8)\n\n在无模型强化学习中，智能体无法获取初始状态的分布 `$\\mu (s_0)$` 或环境动态 `$P(s_{t+1}|s_t, a_t)$`。这就引出了一个问题：我们如何计算关于\
  \ `$\\boldsymbol {\\theta }$` 的梯度？幸运的是，我们可以利用对数运算法则来解决这个问题。\n\n具体来说，我们可以应用对数恒等式，即两个数的对数之和等于它们乘积的对数。通过两次应用这个恒等式，我们可以将公式\
  \ (9.8) 拆解为乘积之和，然后得到公式 (9.9)。这使得我们无需访问 `$\\mu (s_0)$` 或 `$P(s_{t+1}|s_t, a_t)$`\
  \ 即可计算梯度。\n\n\n\n![$$\\displaystyle \\begin{aligned} \\nabla_{\\boldsymbol{\\theta}}\
  \ \\log P(\\tau; \\boldsymbol{\\theta}) &amp; = \\nabla_{\\boldsymbol{\\theta}}\
  \ \\log \\left[ \\mu(s_0) \\cdot \\prod_{t=0}^{T-1} \\pi (a_t|s_t; \\boldsymbol{\\\
  theta}) \\cdot \\prod_{t=0}^{T-1} P(s_{t+1}|s_t, a_t)\\right]\\notag \\\\ &amp;\
  \ = \\nabla_{\\boldsymbol{\\theta}} \\log \\mu(s_0) + \\nabla_{\\boldsymbol{\\theta}}\
  \ \\log \\prod_{t=0}^{T-1} \\pi (a_t|s_t; \\boldsymbol{\\theta}) + \\nabla_{\\boldsymbol{\\\
  theta}} \\log \\prod_{t=0}^{T-1} P(s_{t+1}|s_t, a_t) \\notag \\\\ &amp; = \\nabla_{\\\
  boldsymbol{\\theta}} \\log \\mu(s_0) + \\sum_{t=0}^{T-1} \\nabla_{\\boldsymbol{\\\
  theta}} \\log \\pi (a_t|s_t; \\boldsymbol{\\theta}) + \\sum_{t=0}^{T-1} \\nabla_{\\\
  boldsymbol{\\theta}} \\log P(s_{t+1}|s_t, a_t) {} \\end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ10.png)\n\
  \n(9.9)\n\n在式(9.9)中，我们可以看到第一项`∇_θ log μ(s0)`不依赖于`θ`。这允许我们将其视为常数。因此，根据基础微积分，我们知道对常数的梯度为零。类似地，最后一项`∑_{t=0}^{T-1}\
  \ ∇_θ log P(s_{t+1}|s_t, a_t)`也独立于`θ`，因为环境的动态不受`θ`变化的影响。因此，我们可以将`∇_θ log P(τ; θ)`关于`θ`的梯度简化为：\n\
  \n![$$\\displaystyle \\begin{aligned} \\nabla_{\\boldsymbol{\\theta}} \\log P(\\\
  tau; \\boldsymbol{\\theta}) = \\sum_{t=0}^{T-1} \\nabla_{\\boldsymbol{\\theta}}\
  \ \\log \\pi (a_t|s_t; \\boldsymbol{\\theta}) {} \\end{aligned} $$](img/605748_1_En_9_Chapter_TeX_Equ11.png)\n\
  \n(9.10)\n\n总之，我们可以通过将第一项和最后一项视为常数来简化式(9.9)中的梯度。这得到了式(9.10)中所示的简化梯度。\n\n将上述结果代入式(9.7)，我们得到关于`θ`计算梯度（针对回合情况）的最终方程：\n\
  \n![$$\\displaystyle \\begin{aligned} \\nabla_{\\boldsymbol{\\theta}}J(\\boldsymbol{\\\
  theta}) &amp; = \\mathbb{E}_{\\pi_{\\boldsymbol{\\theta}}\\!\\!}\\left[ G(\\tau)\
  \ \\nabla_{\\boldsymbol{\\theta}} \\log P(\\tau; \\boldsymbol{\\theta}) \\right]\\\
  notag \\\\ &amp; = \\mathbb{E}_{\\pi_{\\boldsymbol{\\theta}}\\!\\!}\\left[ G(\\\
  tau) \\sum_{t=0}^{T-1} \\nabla_{\\boldsymbol{\\theta}} \\log \\pi (a_t|s_t; \\boldsymbol{\\\
  theta}) \\right] \\notag \\\\ &amp; = \\mathbb{E}_{\\pi_{\\boldsymbol{\\theta}}\\\
  !\\!}\\left[ \\sum_{t=0}^{T-1} G(\\tau) \\nabla_{\\boldsymbol{\\theta}} \\log \\\
  pi (a_t|s_t; \\boldsymbol{\\theta}) \\right] \\notag \\\\ &amp; = \\mathbb{E}_{\\\
  pi_{\\boldsymbol{\\theta}}\\!\\!}\\left[ \\sum_{t=0}^{T-1} \\left( \\sum_{k=0}^{T-1}\
  \ {\\gamma}^k r_k \\right) \\nabla_{\\boldsymbol{\\theta}} \\log \\pi (a_t|s_t;\
  \ \\boldsymbol{\\theta}) \\right] \\notag \\\\ &amp; = \\mathbb{E}_{\\pi_{\\boldsymbol{\\\
  theta}}\\!\\!}\\left[ \\sum_{t=0}^{T-1} \\left( {\\gamma}^t \\sum_{k=t}^{T-1} {\\\
  gamma}^{k-t} r_k \\right) \\nabla_{\\boldsymbol{\\theta}} \\log \\pi (a_t|s_t; \\\
  boldsymbol{\\theta}) \\right] \\notag \\\\ &amp; = \\mathbb{E}_{\\pi_{\\boldsymbol{\\\
  theta}}\\!\\!}\\left[ \\sum_{t=0}^{T-1} {\\gamma}^t G_t \\nabla_{\\boldsymbol{\\\
  theta}} \\log \\pi (a_t|s_t; \\boldsymbol{\\theta}) \\right] {} \\end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ12.png)\n\
  \n(9.11)\n\n式(9.11)中策略梯度背后的直觉是，我们希望增加`π(a_t|s_t; θ)`的概率（或对数似然），其增加比例与该动作的实际表现（即智能体在执行该动作后获得的奖励大小）成正比。\n\
  \n为了去掉式(9.11)中的期望符号，我们可以使用随机梯度上升方法，对通过蒙特卡洛方法生成的回合序列计算样本梯度。这样，式(9.11)就变成了我们可以解析计算的形式。\n\
  \n例如，如果我们使用线性方法来构建 softmax 策略分布（如式(9.1)所示）的动作偏好`φ(s, a)^T θ`，那么策略梯度`∇_θ log π(a|s;\
  \ θ)`变为：\n\n![$$\\displaystyle \\begin{aligned} \\nabla_{\\boldsymbol{\\theta}}\
  \ \\log \\pi (a|s; \\boldsymbol{\\theta}) &amp; = \\nabla_{\\boldsymbol{\\theta}}\
  \ \\log e^{\\phi(s, a)^T \\boldsymbol{\\theta}} - \\nabla_{\\boldsymbol{\\theta}}\
  \ \\log \\left( \\sum_{b \\in \\mathcal{A}(s)} e^{\\phi(s, b)^T \\boldsymbol{\\\
  theta}} \\right) \\notag \\\\ &amp; = \\nabla_{\\boldsymbol{\\theta}} \\Bigl( \\\
  phi(s, a)^T \\boldsymbol{\\theta} \\Bigr) - \\frac{\\nabla_{\\boldsymbol{\\theta}}\
  \ \\sum_b e^{\\phi(s, b)^T \\boldsymbol{\\theta}}}{\\sum_b e^{\\phi(s, b)^T \\boldsymbol{\\\
  theta}} }\\notag \\\\ &amp; = \\phi(s, a) - \\frac{\\sum_b \\phi(s, b) e^{\\phi(s,\
  \ b)^T \\boldsymbol{\\theta}}}{\\sum_b e^{\\phi(s, b)^T \\boldsymbol{\\theta}} }\
  \ \\notag \\\\ &amp; = \\phi(s, a) - \\sum_b \\pi(b|s; \\boldsymbol{\\theta}) \\\
  phi(s, b) {} \\end{aligned} $$](img/605748_1_En_9_Chapter_TeX_Equ13.png)\n\n(9.12)\n\
  \n\n\n#### 策略梯度定理\n\n由 Sutton 等人提出的策略梯度定理[2]是强化学习中的一项基础性成果，它提供了一种计算性能目标相对于策略参数梯度的方法。该定理是优化强化学习问题中策略的关键工具，尤其在深度强化学习领域。\n\
  \n策略梯度定理指出：对于任意可微策略`π(a|s; θ)`，性能目标`J(θ)`关于`θ`的梯度（无折扣情况下）由下式给出：\n\n```\n∇_θ J(θ)\
  \ = E_π_θ [ Q_π_θ (s_t, a_t) ∇_θ log π(a_t|s_t; θ) ]\n```\n\n(9.13) 其中`Q_π_θ(s,\
  \ a)`是策略`π_θ`的状态-动作值函数，`∇_θ log π(a|s; θ)`是策略的得分函数。得分函数本质上是策略对数关于策略参数的导数：\n\n```\n\
  ∇_θ log π(a|s; θ) = ∇_θ π(a|s; θ) / π(a|s; θ)\n```\n\n(9.14)\n\n公式(9.13)的正式证明比公式(9.11)的推导更为复杂（可参考\
  \ Sutton 和 Barto 所著《强化学习导论》第 13.2 章[3]）。不过，我们可以将策略梯度定理视为公式(9.11)的广义版本，其中我们将样本回报`G_t`替换为状态-动作值函数`Q_π_θ(s_t,\
  \ a_t)`。这种替换之所以可行，是因为本质上`G_t`和`Q_π_θ(s_t, a_t)`衡量的是同一件事：期望回报。\n\n对于情节式和连续式强化学习问题，我们可以将性能目标定义为：\n\
  \n```\n∇_θ J(θ) = E_π_θ [ Σ_{t=0}^{∞} γ^t Q_π_θ (s_t, a_t) ∇_θ log π(a_t|s_t; θ)\
  \ ]\n```\n\n(9.15)\n\n请注意，公式(9.13)和(9.15)是非常强大的结果，因为它们允许我们直接使用基于梯度的优化方法来优化策略。在实践中，我们通过与环境交互收集样本，并利用蒙特卡洛方法等技术来估计策略梯度。\n\
  \n### 9.3 REINFORCE 算法\n\n在本节中，我们将介绍 REINFORCE 算法，这是为解决强化学习问题而开发的最早的策略梯度算法之一。该算法最初由\
  \ Williams 于 1992 年提出[4]。\n\nREINFORCE 是一种用于解决情节式问题的同策略、无模型、离线学习算法。该算法采用蒙特卡洛方法生成样本情节序列。在每个情节结束时，算法使用公式(9.16)给出的规则更新策略参数：\n\
  \n```\nθ ← θ + α γ^t G_t ∇_θ log π(a_t|s_t; θ)\n```\n\n(9.16)\n\n值得注意的是，与基于值的方法不同，在\
  \ REINFORCE 中我们不需要使用`ε`-贪婪策略来鼓励探索。在训练过程中，智能体根据动作空间中每个动作的概率，按照`a ~ π_θ`采样动作，而不是遵循`ε`-贪婪策略来做决策。这种随机采样方法作为一种探索形式，使智能体能够学习哪些动作最有效。随着训练的进行，智能体更频繁地采样最佳动作，而较少采样最差动作。训练完成后，可以通过始终选择概率最高的动作，让训练好的智能体以确定性方式行动。但这应取决于具体问题，因为真正的最优策略可能是随机的。\n\
  \n**算法 1：REINFORCE 算法**\n\n![](img/605748_1_En_9_Figaaa_HTML.gif) 一个名为 REINFORCE\
  \ 的 6 行算法，接收以下输入，输出近似最优策略`π_θ`。折扣率`γ`，学习率`α`，情节数`K`。\n\n在实践中，如果我们使用神经网络来近似策略，并利用深度学习软件执行随机梯度上升步骤，那么我们需要做的就是计算策略梯度损失，即样本回报`G_t`与动作概率对数似然`log\
  \ π(a_t|s_t; θ)`的乘积，然后将该损失输入到某个神经网络优化器（如 SGD 或 Adam）中以更新参数。值得一提的是，默认情况下，大多数优化器被设计为最小化某个目标函数（如最小化\
  \ MSE 或平方误差），因此在实际操作中，我们通常为策略梯度计算*负*对数似然`-log π(a_t|s_t; θ)`，这样当我们使用这些工具更新神经网络参数时，实际上执行的是梯度上升（因为`y\
  \ = x - (-b) = x + b`），而非梯度下降。\n\n图 9.2 展示了一个简单的策略网络神经网络架构。该架构由多个全连接层组成，每个层后接一个非线性激活函数。神经网络的最终输出是动作空间中所有动作的预测概率。\n\
  \n\n\n\n#### 注意\n\n请注意，本示例针对非常简单的强化学习问题而设计。在实践中，架构可以更加复杂，包含多层结构、跳跃连接以及其他先进技术，以提升强化学习智能体的性能。因此，应根据问题的具体需求和可用资源，仔细考虑为策略网络选择合适的架构。\n\
  \n![](img/605748_1_En_9_Fig2_HTML.png)\n\n神经网络架构的流程图如下所示：输入数据，经过 64 个单元，再通过`ReLU`连接至\
  \ 64 个单元，再通过`ReLU`连接至 64 个单元，再通过`ReLU`连接至`N`个单元，最后通过`Softmax`输出动作概率。\n\n**图 9.2**\
  \ 策略网络神经网络架构的简单示例\n\n### 9.4 带基线的 REINFORCE 算法\n\n我们在上一节介绍的 REINFORCE 算法在训练过程中可能存在高方差问题，这会导致算法运行缓慢且效率低下。方差产生的原因是算法使用蒙特卡洛方法来估计回报，而不同回合之间的回报可能差异显著。为了解决这个问题，我们可以引入一个基线值\
  \ `b(s)`，将其从估计回报中减去，以降低方差。\n\n基线值 `b(s)` 可以是任何不依赖于动作的函数。例如，我们可以使用一个常数或状态 `s` 的函数。通过从估计回报中减去基线值，我们可以减少奖励信号中随机波动的影响。\n\
  \n带基线函数 `b(s)` 的 REINFORCE 算法的参数更新规则为：\n\n```\nθ = θ + α γ^t ( G_t - b(s_t) ) ∇_θ\
  \ log π(a_t|s_t; θ)\n```\n\n(9.17)\n\n该公式也被称为*原始策略梯度算法*的参数更新规则。我们可以用任何适合降低方差的函数来替换\
  \ `b(s_t)`。\n\n基线函数的一个常见选择是状态价值函数 `V_{π_θ}(s_t)`，它衡量的是从状态 `s_t` 出发，遵循策略 `π_θ` 时的期望回报。在实践中，我们通常使用本书第二部分介绍的价值函数近似方法来学习\
  \ `V_{π_θ}(s_t)` 的估计值。这涉及使用函数逼近器（如神经网络）来最小化样本回报与估计值之间的平方误差损失。使用状态价值函数作为基线有助于降低方差，因为它捕捉了当前状态的期望回报。\n\
  \n需要注意的是，使用基线值并非万能之策，有时可能导致有偏估计。这是因为我们从估计回报中减去的是一个固定值，如果基线值选择不当，可能会引入系统性误差。因此，必须针对当前问题选择合适的基线函数，并仔细评估其有效性。\n\
  \n总之，在 REINFORCE 算法中引入基线值有助于降低训练过程中的噪声和方差，从而使算法更加高效和有效。通过选择合适的基线函数，我们可以进一步提升算法的性能。然而，使用基线值需要仔细斟酌和实验，以确保不会引入偏差或其他问题。\n\
  \n\n\n#### 算法 1：带基线的 REINFORCE 算法（线性值函数逼近）\n\n算法 1 给出了以状态值函数为基线的 REINFORCE 算法的伪代码，其中我们使用线性值函数逼近来近似基线函数。在训练过程中，智能体同时学习参数化的策略函数和参数化的值函数。需要注意的是，为这两个任务使用不同的学习率是有益的，因为它们的本质截然不同。因此，我们为策略使用独立的学习率`α`，为基线函数使用独立的学习率`β`。\n\
  \n**算法 2：带基线的 REINFORCE 算法 [线性-VFA]**\n\n![](img/605748_1_En_9_Figaab_HTML.gif)\n\
  \n一个 8 行算法接收以下输入，输出近似最优策略`θ*`：折扣率`γ`、策略学习率`α`、基线函数学习率`β`以及回合数`K`。\n\n在实际应用中，我们通常使用神经网络来近似策略和基线函数。这里，我们用`θ`表示策略的参数，用`ψ`表示基线函数的参数。在这种情况下，我们计算样本回报`G_t`与基线网络估计值之间的平方误差损失`(G_t\
  \ - V̂(s_t; ψ))²`，以及策略网络的负对数似然损失`-log π(a_t|s_t; θ)`。需要注意的是，当使用神经网络时，应在多个时间步上累积梯度，而不是逐步更新参数。然后，我们可以使用神经网络优化器（如随机梯度下降或\
  \ Adam）基于累积的梯度来更新参数。\n\n总体而言，使用参数化的策略和值函数，并借助神经网络对其进行近似，可以带来更高效、更有效的强化学习算法。\n\n\
  图 9.3 展示了在车杆经典控制任务上，带基线与不带基线的 REINFORCE 算法的性能表现。性能通过获得的平均奖励来衡量。为了评估智能体的性能，我们在每次训练迭代（包含\
  \ 20,000 个训练步）结束时，在一个独立的测试环境中运行了 20,000 个评估步。结果取五次独立运行的平均值，并使用窗口大小为 5 的移动平均进行平滑处理。\n\
  \n![](img/605748_1_En_9_Fig3_HTML.png)\n\n一张评估回合回报相对于训练环境步数的折线图。图中绘制了 REINFORCE\
  \ 和带基线的 REINFORCE 算法呈下凸增长且带有小幅波动的曲线。一条平行于横轴的直线表示最大值，该值从纵轴上的 500 开始。\n\n**图 9.3**\
  \ 车杆控制任务中带基线与不带基线的 REINFORCE 算法对比。结果取五次独立运行的平均值。我们对这两个智能体使用相同的折扣率`γ = 0.99`、策略神经网络学习率`α\
  \ = 0.0002`，以及基线网络学习率`β = 0.0005`。\n\n**算法 3：带基线的 REINFORCE 算法 [使用神经网络]**\n\n![](img/605748_1_En_9_Figaac_HTML.gif)\n\
  \n一个标题为“带基线的 REINFORCE 算法”的 10 行算法接收以下输入，输出近似最优策略`θ*`：折扣率`γ`、策略学习率`α`、基线函数学习率`β`以及回合数`K`。\n\
  \n在本实验中，我们使用了一个非常简单的神经网络架构，由两个隐藏层的全连接神经网络组成。每个隐藏层有 64 个单元，并跟随一个 ReLU 激活函数。每个隐藏层的输出随后被送入最终输出层，其中策略网络使用\
  \ softmax 激活函数，基线网络不使用激活函数。选择这种简单架构是为了将重点放在强化学习算法上，并降低计算需求。\n\n对于两个智能体，我们使用相同的折扣率`γ\
  \ = 0.99`和策略神经网络学习率`α = 0.0002`。我们还为基线网络使用了学习率`β = 0.0005`。我们使用 Adam 优化器训练神经网络。\n\
  \n这些超参数的值是基于先前的实验选择的，可能并非针对特定任务的最佳值。\n\n\n\n### 9.5 演员-评论家算法\n\n`REINFORCE`算法及其使用基线函数的变体有一个缺点：它是一种离线学习算法。这是因为智能体必须等待一个回合结束才能更新策略参数。因此，该算法只能解决回合制强化学习问题。在本节中，我们将介绍一类名为*演员-评论家*的新算法，该算法最初由萨顿和巴托提出。它是一种无模型、在线、同策略的学习算法。使用演员-评论家算法，智能体无需等待回合结束即可更新策略参数，这意味着我们可以用它来解决回合制和持续性强化学习问题。在演员-评论家算法中，我们将学习到的策略称为*演员*，将基线函数称为*评论家*。智能体仅根据学习到的策略行动，但在训练过程中，也会使用基线函数来帮助减少方差。在本章中，我们将重点介绍如何使用演员-评论家算法来解决具有离散动作空间的回合制强化学习问题。\n\
  \n首先，我们回顾一下 MDP 中状态价值函数`V_π`的贝尔曼方程。我们可以使用即时奖励`r_t`和后继状态的折扣价值`γ V_π(s_{t+1})`递归地写出该方程，如公式(9.18)所示：\n\
  \n```\nV_π(s) = E_π[ G_t | s_t = s ]\n       = E_π[ r_t + γ V_π(s_{t+1}) | s_t =\
  \ s ]\n```\n\n(9.18)\n\n这意味着我们可以用`r_t + γ V_π(s_{t+1})`来替换策略梯度方程中关于策略参数`θ`的回报`G_t`。请注意，以下方程同时涵盖了回合制和持续性问题，因此我们使用时间步`t\
  \ = 0, 1, ..., ∞`，这就是公式(9.19)中求和上限为`∞`的原因。\n\n```\n∇_θ J(θ) = E_{π_θ}[ Σ_{t=0}^{∞}\
  \ γ^t G_t ∇_θ log π(a_t | s_t; θ) ]\n```\n\n(9.19)\n\n```\n         = E_{π_θ}[ Σ_{t=0}^{∞}\
  \ γ^t ( r_t + γ V_π(s_{t+1}) ) ∇_θ log π(a_t | s_t; θ) ]\n```\n\n(9.20)\n\n通过公式(9.20)，该算法现在完全变为在线形式，因为我们只需要一个单步转移`(s,\
  \ a, r, s')`即可更新策略参数。为了帮助减少方差，我们还可以像带基线的`REINFORCE`算法那样加入基线项。在这种情况下，基线函数正是我们用来计算回报`G_t`的同一个状态价值函数`V_π`，因此公式(9.20)可以写成如下形式：\n\
  \n```\n∇_θ J(θ) = E_{π_θ}[ Σ_{t=0}^{∞} γ^t ( G_t - V_π(s_t) ) ∇_θ log π(a_t | s_t;\
  \ θ) ]\n```\n\n(9.21)\n\n```\n         = E_{π_θ}[ Σ_{t=0}^{∞} γ^t ( r_t + γ V_π(s_{t+1})\
  \ - V_π(s_t) ) ∇_θ log π(a_t | s_t; θ) ]\n```\n\n(9.22)\n\n我们也可以使用优势函数来写出策略梯度，在这种情况下，使用状态价值函数`V_π`作为基线函数，并使用状态-动作价值函数`Q_π`来估计回报`G_t`，如下所示：\n\
  \n```\n∇_θ J(θ) ≈ E_{π_θ}[ Σ_{t=0}^{∞} γ^t ( Q_π(s_t, a_t) - V_π(s_t) ) ∇_θ log\
  \ π(a_t | s_t) ]\n         ≈ E_{π_θ}[ Σ_{t=0}^{∞} γ^t Â_π(s_t, a_t) ∇_θ log π(a_t\
  \ | s_t) ]\n```\n\n(9.23)\n\n其中`Â_π`是优势函数，且`Â_π(s, a) = Q_π(s, a) - V_π(s)`。\n\
  \n这是可行的，因为\n\n```\nQ_π(s, a) = r_t + γ Σ_{s' ∈ S} P(s' | s, a) V_π(s')\n       \
  \   ≈ r_t + γ V_π(s')\n```\n\n(9.24)\n\n总的来说，演员-评论家算法是解决强化学习问题的一个强大工具。它提供了一种在线学习策略的方法，无需等待回合结束，同时通过使用基线函数来减少方差。估计的优势函数有助于衡量在给定状态下采取动作的优势，这可以提高算法的性能。\n\
  \n当使用神经网络`θ`和`ψ`分别近似策略`π`和状态价值函数`V_π`时，我们可以将公式(9.20)表示如下：\n\n\n\n![$$\\displaystyle\
  \ \\begin{aligned} \\nabla_{\\boldsymbol{\\theta}}J(\\boldsymbol{\\theta}) = \\\
  mathbb{E}_{\\pi_{\\boldsymbol{\\theta}}\\!\\!}\\left[ \\sum_{t=0}^{\\infty} {\\\
  gamma}^t \\Bigl( r_t + {\\gamma} \\hat{V}(s_{t+1}; \\boldsymbol{\\psi}) - \\hat{V}(s_t;\
  \ \\boldsymbol{\\psi}) \\Bigr) \\nabla_{\\boldsymbol{\\theta}} \\log \\pi (a_t|s_t;\
  \ \\boldsymbol{\\theta}) \\right] {} \\end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ26.png)\n\
  \n(9.25)\n\n在实际应用中，我们常通过移除求和符号来简化该方程，从而得到一个更简洁的方程：\n\n![$$\\displaystyle \\begin{aligned}\
  \ \\nabla_{\\boldsymbol{\\theta}}J(\\boldsymbol{\\theta}) = \\mathbb{E}_{\\pi_{\\\
  boldsymbol{\\theta}}\\!\\!}\\left[ \\Bigl( r_t + {\\gamma} \\hat{V}(s_{t+1}; \\\
  boldsymbol{\\psi}) - \\hat{V}(s_t; \\boldsymbol{\\psi}) \\Bigr) \\nabla_{\\boldsymbol{\\\
  theta}} \\log \\pi (a_t|s_t; \\boldsymbol{\\theta}) \\right] {} \\end{aligned} $$](images/605748_1_En_9_Chapter/605748_1_En_9_Chapter_TeX_Equ27.png)\n\
  \n(9.26)\n\n在强化学习中使用神经网络来近似策略时，逐步更新策略参数可能并非理想方案。一种解决方法是等待智能体收集到一段连续的转移序列后，再更新策略参数。实践中，我们通常遵循策略\
  \ `π_θ`，在时间步 `t, t+1, t+2, ..., t+N` 上收集固定长度为 `N` 的转移序列，其中 `t` 是当前序列的起始时间步。\n\n\
  该转移序列表示为：\n\n![$$\\displaystyle \\begin{aligned} s_{t}, a_{t}, r_{t}, s_{t+1}, a_{t+1},\
  \ r_{t+1}, \\cdots, s_{t+N-1}, a_{t+N-1}, r_{t+N-1}, s_{t+N} \\end{aligned}$$](img/605748_1_En_9_Chapter_TeX_Equc.png)\n\
  \n当智能体收集到包含 `N` 个转移的序列后，我们利用序列中的奖励 `r_t, r_{t+1}, ..., r_{t+N-1}`，为序列中每个时间步 `t=0,\
  \ 1, ..., N` 计算回报 `G_t`。例如，可采用 TD(0) 方法或 N 步方法，其中使用后继状态的折扣价值进行自举。\n\n对于包含 `N` 个转移的序列，我们可以为序列中的每个转移计算回报\
  \ `G_t`，如公式 (9.27) 所示：\n\n![$$\\displaystyle \\begin{aligned} G_t = r_t + \\gamma\
  \ r_{t+1} + \\cdots + \\gamma^{N-1}r_{t+N-1} + \\gamma^{N} \\hat{V}(s_{t+N}; \\\
  boldsymbol{\\psi}) {} \\end{aligned} $$](img/605748_1_En_9_Chapter_TeX_Equ28.png)\n\
  \n(9.27)\n\n其中，`G_t` 是时间步 `t` 的有限视界回报，`r_t` 是时间步 `t` 的奖励，`γ` 是折扣因子，`N` 是转移数量，`V̂(s_{t+N};\
  \ ψ)` 是使用参数 `ψ` 对状态 `s_{t+N}` 的估计价值函数。\n\n为了更新策略参数，我们遵循与带基线的 REINFORCE 算法类似的流程。我们在序列中的这\
  \ `N` 个转移上累积梯度，策略梯度可通过公式 (9.28) 计算，该公式由公式 (9.21) 推导而来。\n\n\n\n![$$\\displaystyle\
  \ \\begin{aligned} \\nabla_{\\boldsymbol{\\theta}}J(\\boldsymbol{\\theta}) = \\\
  sum_{t=0}^{N} {\\gamma}^t \\Bigl( G_t - V_\\pi(s_t)\\Bigr) \\nabla_{\\boldsymbol{\\\
  theta}} \\log \\pi (a_t|s_t; \\boldsymbol{\\theta}) {} \\end{aligned} $$](img/605748_1_En_9_Chapter_TeX_Equ29.png)\n\
  \n(9.28)\n\n价值网络的目标函数也与带基线的 REINFORCE 算法类似，即最小化估计回报与预测状态值之间的均方误差损失，即 ![$$\\bigl\
  \ (G_t - \\hat {V}(s_t; \\boldsymbol {\\psi }) \\bigr )²$$](img/605748_1_En_9_Chapter_TeX_IEq158.png)。\n\
  \n现在，我们准备介绍 Actor-Critic 算法，该算法使用神经网络来近似策略和状态价值函数。策略网络（Actor）和价值网络（Critic）的训练方式与带基线的\
  \ REINFORCE 算法类似。具体来说，我们的目标是最小化来自价值网络的估计状态值的均方误差损失，并最大化由智能体采取特定动作的策略梯度的对数似然，该对数似然以采取该动作的优势函数为权重。然而，在\
  \ Actor-Critic 中，我们基于一个包含 `N` 个转移的序列来更新参数，而不是基于完整的回合序列。这使得算法能够更高效地学习，并更及时地更新其参数。\n\
  \nActor-Critic 是一类流行的强化学习算法，它结合了基于价值和基于策略方法的优势。Critic 学习价值函数，用于估计在当前状态和动作下预期的累积奖励。然后，Actor\
  \ 利用这些信息来选择更有可能获得更高奖励的动作。这两个组件的结合使得智能体能够同时学习价值函数和策略。\n\nActor-Critic 的神经网络架构选择取决于问题的复杂度。在实践中，我们可以为策略和价值函数使用独立的网络，也可以使用共享权重的架构。\n\
  \n使用两个独立的神经网络可以带来更大的灵活性，例如可以分别对策略和价值函数应用不同的优化技术或步长。它还可以针对每个函数采用更专门的架构，并且在状态空间维度不高的情况下可能表现更好。然而，使用两个独立的网络计算量较大，因为两个网络都必须接收相同的输入数据。同时，由于需要维护两个独立的网络，训练和调优的难度也更高。\n\
  \n使用一个具有两个独立输出头的单一神经网络计算效率更高，因为网络只需接收一次输入数据。由于只有一个网络需要处理，训练和维护也更容易，并且在状态空间视觉上复杂的情况下可能表现更好。然而，这种方法可能无法为每个函数提供足够的架构定制灵活性，并且在策略和价值函数需求差异很大的情况下，其性能可能不如使用独立网络。\n\
  \n#### 算法 4：Actor-Critic\n\n![](img/605748_1_En_9_Figaad_HTML.gif) 一个名为 actor-critic\
  \ 的 11 行算法，接收以下输入，输出一个近似最优策略 `π_θ`。输入包括：折扣率 `γ`，策略学习率 `α`，价值函数学习率 `β`，序列长度 `N`，以及环境步数\
  \ `K`。\n\n图 9.4 展示了一个共享权重架构的简单示例。这里，使用几个共享层来计算隐藏特征或嵌入，然后将这些特征分别输入到两个输出头中，用于计算价值和策略。请注意，这两个输出头不共享任何权重。\n\
  \n![](img/605748_1_En_9_Fig4_HTML.png)\n\n神经网络架构的流程图如下所示。输入数据，经过 64 个单元，再经过 64 个单元（通过\
  \ ReLU 连接），再经过 64 个单元（通过 ReLU 连接），最后分别连接到 1 个单元和 N 个单元（通过 ReLU 连接）。1 个单元最终输出状态价值。N\
  \ 个单元进一步通过 Softmax 输出动作概率。\n\n**图 9.4** 用于 Actor-Critic 算法的共享权重神经网络架构的简单示例\n\n图\
  \ 9.5 展示了在车杆经典控制任务上，Actor-Critic 与带基线的 REINFORCE 算法的性能对比。性能通过获得的平均奖励来衡量。为了评估智能体的性能，我们在每次训练迭代（包含\
  \ 20,000 个训练步）结束时，在一个独立的测试环境中运行了 20,000 个评估步。结果取五次独立运行的平均值，并使用窗口大小为 5 的移动平均进行平滑处理。\n\
  \n![](img/605748_1_En_9_Fig5_HTML.png)\n\n评估回合回报与训练环境步数的折线图。图中绘制了带基线的 REINFORCE\
  \ 和 Actor-Critic 的凹向下递增曲线，伴有小幅波动。一条平行于横轴的线表示最大值，从纵轴上的 500 开始。\n\n**图 9.5** 在车杆控制任务上\
  \ Actor-Critic 与带基线的 REINFORCE 的对比。结果取五次独立运行的平均值。我们对这两个智能体使用相同的折扣率 `γ = 0.99`，策略神经网络学习率\
  \ `α = 0.0002`，以及基线网络学习率 `β = 0.0005`。对于 Actor-Critic，我们使用序列长度 `N = 64`。\n\n我们对这些智能体使用相同的神经网络架构和学习率，并为\
  \ Actor-Critic 智能体使用两个独立的神经网络。对于 Actor-Critic，我们让智能体在更新策略和基线网络参数之前收集 64 个转移。我们使用\
  \ Adam 优化器训练神经网络。\n\n我们可以看到，Actor-Critic 智能体的性能几乎与带基线的 REINFORCE 智能体相当。\n\n\n\n\
  ### 9.6 利用熵促进探索\n\n熵是信息论和统计学中的一个概念，用于衡量概率分布的随机性或不确定性。通常，熵被定义为描述随机变量结果所需的平均信息量。\n\
  \n例如，考虑一次抛硬币，有两种可能结果：正面或反面。如果硬币是均匀的，那么正面的概率为 0.5，反面的概率也为 0.5。该分布的熵为 1 比特，这意味着平均需要\
  \ 1 比特的信息来描述单次抛硬币的结果。\n\n在基于策略的强化学习算法中，策略通常由一个神经网络表示，该网络根据给定状态输出动作的概率分布。该分布的熵可作为衡量策略不确定性或随机性的指标。\n\
  \n利用熵来鼓励探索的想法最早由 Williams, R. J. [4] 提出。在这种情况下，策略被鼓励进行更多探索并采取更多样化的动作，这有助于学习一个能在多种情况下表现良好的稳健策略。另一方面，低熵意味着策略更具确定性，探索性较弱，这可能导致策略陷入局部最优，表现欠佳。\n\
  \n为了在策略梯度算法中鼓励探索，可以在策略梯度损失中添加一个负熵项。这鼓励策略在仍倾向于选择预期回报较高的动作的同时，采取更多样化的动作。\n\n对于具有离散动作空间的强化学习问题，我们可以使用公式（9.29）来计算某个策略\
  \ `π` 的熵 `H`，其中 `N` 是动作空间中的动作数量，`π(a_t|s_t)` 是在遵循策略 `π` 时，在状态 `s_t` 下采取动作 `a_t`\
  \ 的概率。\n\n```\nH = -∑_{k=1}^{N} π(a_k|s_t) log π(a_k|s_t)\n```\n\n(9.29)\n\n为了理解为什么使用熵有助于鼓励智能体进行探索，让我们看一个简单的实验。假设对于某个特定状态\
  \ `s`，智能体有四个动作可选。我们有三种完全不同的策略：`π_1`、`π_2` 和 `π_3`。策略 `π_1` 是一个最优确定性策略，这意味着在状态 `s`\
  \ 时，它总是会选择最佳动作（假设是第一个动作），因此在策略 `π_1` 下，不同动作的概率分布类似于 `[1, 0, 0, 0]`。第二个策略 `π_2` 是一个随机策略，在策略\
  \ `π_2` 下具有不同的概率分布，其概率分布类似于 `[0.6, 0.4, 0, 0]`。第三个策略 `π_3` 是一个均匀随机策略，这意味着概率均匀分布在所有可用动作上，即\
  \ `[0.25, 0.25, 0.25, 0.25]`。然后我们可以使用公式（9.29）来计算这些不同策略在状态 `s` 下的熵。\n\n这些不同策略的熵如下所示：\n\
  \n- 策略 `π_1` 的熵为 `H_{π_1} = -(1.0 * log(1.0)) = 0`\n- 策略 `π_2` 的熵为 `H_{π_2} = -(0.6\
  \ * log(0.6) + 0.4 * log(0.4)) = 0.67`\n- 策略 `π_3` 的熵为 `H_{π_3} = -(0.25 * log(0.25)\
  \ * 4) = 1.39`\n\n我们可以看到，对于确定性策略 `π_1`，熵为 0，因为它总是会选择最佳动作，所以决策过程中没有随机性。对于随机策略 `π_2`，熵为\
  \ 0.67。而对于均匀随机策略 `π_3`，熵为 1.39。从这个例子中，我们可以清楚地看到，过程中的随机性越大，熵就越高。\n\n\n\n#### 将熵纳入基于策略的方法\n\
  \n为了将熵纳入基于策略的方法算法中，它被作为一项额外的项添加到训练期间优化的目标函数中。该目标函数通常包含用于最大化期望累积奖励的策略梯度项，而熵项则会对低熵策略进行惩罚。这些项的相对权重可以通过系数\
  \ `w` 来控制，以平衡探索与利用，如公式 (9.30) 所示，其中 `H(π(s_t; θ))` 是使用公式 (9.29) 针对特定状态 `s_t` 相对于策略\
  \ `π_θ` 计算出的熵。\n\n```\n∇_θ J(θ) = Σ_{t=0}^{N} γ^t (G_t - V_π(s_t)) ∇_θ log π(a_t|s_t;\
  \ θ) + w H(π(s_t; θ))\n```\n\n(9.30)\n\n熵项中熵系数 `w` 的值取决于具体问题，需要通过实验来找到最优值。该系数决定了策略中探索与利用之间的平衡，较大的熵系数会鼓励更多的探索。\n\
  \n熵系数的一个良好起点大约在 0.01 到 0.1 之间，我们可以根据算法的性能逐渐增大或减小该值。如果熵系数太小，智能体可能探索不足；如果太大，智能体可能过度探索而无法收敛到最优策略。\n\
  \n在实践中，有时也可以对熵系数采用衰减计划，即熵系数初始值较高，然后随着智能体学习到更好的策略而逐渐降低。这种方法有助于智能体在学习初期进行更多探索，并在后期收敛到更优的策略。\n\
  \n使用熵损失来鼓励探索的 Actor-Critic 算法训练过程，与算法 4 中展示的标准 Actor-Critic 算法几乎相同。唯一的区别在于，计算策略梯度时，我们需要使用公式\
  \ (9.30) 添加熵损失。更准确地说，我们将使用以下更新规则来累积关于 `θ` 的策略梯度：\n\n```\ng_π ← g_π + α δ_j ∇_θ log\
  \ π(a_j|s_j; θ) + w H(π(s_j; θ))\n```\n\n图 9.6 展示了 Actor-Critic 智能体在 Atari 视觉复杂游戏\
  \ Pong 上的性能。结果显示了平均回合回报（总未折扣奖励）和 95% 的置信区间。为了评估智能体的性能，我们在每次训练迭代结束时，在一个独立的测试环境中使用贪婪策略运行了\
  \ 200,000 个评估步骤，每次训练迭代包含 250,000 个训练步骤或 100 万帧画面。评估环境中未应用奖励裁剪或生命损失时的软终止。结果取三次独立运行的平均值，并使用窗口大小为\
  \ 5 的移动平均进行平滑处理。\n\n一张评估回合回报相对于训练环境帧数的折线图。它绘制了一条水平延伸并呈下凹递增曲线的线。估计值分别为（1000 万，-20）、（2000\
  \ 万，0）和（3000 万，15）。\n\n**图 9.6** 在 Atari 视频游戏 Pong 上的 Actor-Critic 算法。结果显示了平均回合回报（总未折扣奖励）和\
  \ 95% 的置信区间。结果取三次独立运行的平均值，然后使用窗口大小为 5 的移动平均进行平滑处理。\n\n我们使用了与 DQN 类似的神经网络架构；不过，我们采用的是共享神经网络架构。该网络有两个输出头：一个用于动作概率，一个用于状态值。我们使用折扣率\
  \ `γ = 0.99`、学习率 `α = 0.00025`、熵权重 0.025 以及序列长度 128。\n\n我们使用与 DQN 相同的环境处理方式，包括将帧调整为\
  \ `84 × 84` 并将其转换为灰度图。我们还应用了跳跃动作技术，即每四帧只处理一帧，并堆叠最后四帧以创建大小为 `84 × 84 × 4` 的最终状态图像。\n\
  \n此外，我们将奖励值裁剪到 `-1` 到 1 的范围内，并将失去一条命视为软终止状态。\n\n##### 熵损失的优势\n\n当环境复杂时，熵损失在提升强化学习智能体性能方面尤其有用。在此类场景中，智能体可能难以探索并发现最优策略，因为奖励信号不足以引导智能体走向目标。\n\
  \n在这种情况下，使用熵损失作为正则化项可以鼓励智能体进行更广泛的探索、采取更多样化的动作，并学习到更鲁棒的策略。这种探索对于发现对实现最终目标至关重要的状态空间区域特别有用。\n\
  \n此外，当最优策略是随机的或需要一定程度的随机性才能有效时，熵损失尤其有用。在这些情况下，强制高熵可以帮助智能体学习到更优的策略，该策略会考虑到环境固有的随机性。\n\
  \n\n\n### 9.7 小结\n\n在本章中，我们深入探讨了用于解决强化学习问题的基于策略的方法。与本书前面介绍的基于价值的方法相比，基于策略的方法具有独特的优势。它们使我们能够学习随机策略，并有效处理具有大型动作空间的问题。\n\
  \n我们首先简要介绍了基于策略的方法，强调了它们相对于基于价值的方法的优势。接着，我们探讨了用于表示策略的近似方法的概念。随后，我们深入研究了策略梯度方法背后的理论，这为在策略表示中使用近似方法奠定了基础。具体来说，我们研究了\
  \ `REINFORCE` 算法，这是一种著名的策略梯度方法，它利用蒙特卡洛采样来更新所学策略。此外，我们还探讨了如何集成基线函数，以减轻与标准 `REINFORCE`\
  \ 算法相关的偏差和方差问题。\n\n此外，我们介绍了演员-评论家算法，这是一种将基于策略的方法与基于价值的方法相结合的强大技术。这种混合方法在解决现实世界的强化学习问题中已显示出其重要性。\n\
  \n在本章的最后，我们讨论了将熵作为一种机制纳入其中，以鼓励在诸如演员-评论家等基于策略的方法中进行探索。在下一章中，我们将深入探讨如何应用基于策略的方法来解决具有连续动作空间的强化学习问题，并特别关注涉及机器人控制的任务。\n\
  \n"
- '# 10. 连续动作空间的问题


  在前面的章节中，我们介绍了具有离散动作空间的强化学习问题，其中动作通常使用离散数字（例如整数）来表示。然而，在现实世界中，许多问题需要连续的动作，这些动作无法用整数表示。连续动作空间在机器人技术等现实应用中很常见，在这些应用中，精确且连续的控制至关重要。


  本章重点介绍如何使用基于策略的方法来解决具有连续动作空间的强化学习问题。我们将探索可以通过强化学习解决的经典机器人控制问题，例如控制机器蚂蚁的位置和方向，以及平衡一个简单的人形机器人。我们将看到如何使用基于策略的方法在这些系统中实现精确且连续的控制。


  在本章结束时，你将很好地理解如何使用基于策略的方法来解决具有连续动作空间的强化学习问题。此外，你还将学习如何将这些方法应用于解决经典的机器人控制问题。


  ### 10.1 连续动作空间问题的挑战


  在许多现实世界的强化学习问题中，动作空间是连续的，这意味着动作由连续值而非离散数字表示。例如，在控制机械臂角度移动的情况下，我们不能使用整数来表示动作，因为角度移动通常是一个连续值。这带来了独特的挑战，需要采用与离散动作空间问题不同的方法。


  连续动作空间问题的主要挑战之一是动作空间通常是无限的，这使得应用诸如 Q-learning 之类的基于价值的方法变得困难，因为这些方法需要对动作空间进行离散化。动作空间的离散化可能导致大量信息丢失，并使学习最优策略变得困难。此外，连续动作空间的离散化通常会导致可能的动作数量极其庞大，这可能使学习过程在计算上不可行。


  策略梯度方法是一类非常适合处理连续动作空间问题的强化学习算法。策略梯度方法不是学习一个显式的动作价值函数，而是学习一个参数化的策略，该策略将状态映射到动作。例如，这个策略可以是一个神经网络，其权重作为待学习的参数。


  策略梯度方法能够学习一个可以直接输出连续动作的策略，而无需对动作空间进行离散化。这允许更精细的控制和更好的性能。然而，策略梯度方法可能比基于价值的方法更难训练，并且收敛到最优策略的速度可能更慢。此外，梯度估计的方差可能很高，这可能导致学习过程不稳定。为了应对这些挑战，人们开发了各种技术，例如基线和方差缩减。


  为了更好地理解连续动作空间问题的挑战，让我们考虑一个简化的运动任务。在这个任务中，目标是让机械臂拾取放在桌子上的物体。机器人有多个活动部件或关节，每个关节都有自己的运动范围。所有关节通常需要同时控制，这要求对机器人的运动进行高度协调和精确控制。这类似于人类手臂的运动。为了成功完成拾取物体的任务，机器人必须在每个时间步精确地协调其关节的运动。


  为连续动作空间问题设计合适的奖励函数也可能具有挑战性。在运动任务中，移动不同的关节通常会产生不同的结果，这使得定义合适的奖励函数更具挑战性。奖励函数需要精心设计，以鼓励机器人执行期望的动作，同时避免不期望的动作。例如，奖励函数可以奖励机器人拾取物体，同时惩罚它撞倒桌子上的其他物体。


  总之，连续动作空间问题带来了独特的挑战，需要采用与离散动作空间问题不同的方法。策略梯度方法适用于连续动作空间，因为它们可以学习一个能够直接输出连续动作的策略。然而，设计合适的奖励函数和精确协调关节的运动仍然是一个挑战。通过理解这些挑战并使用适当的技术，我们可以为连续动作空间问题开发有效的强化学习解决方案。


  ### 10.2 MuJoCo 环境


  从头开始构建机器人控制环境可能是一项具有挑战性且耗时的任务，需要广泛的物理学、力学和机器人学知识。幸运的是，基于开源软件的预构建仿真环境可以帮助研究人员和开发人员测试他们的强化学习算法，而无需广泛的领域知识或昂贵的硬件。


  其中一个工具是由 Todorov 等人开发的带接触的多关节动力学（`MuJoCo`）物理引擎 [1]。`MuJoCo` 为各种机器人系统（包括机械臂和人形机器人）提供了快速且准确的仿真环境。`MuJoCo`
  对于连续动作空间问题特别有用，因为使用传统物理引擎难以准确模拟这些问题。


  通过使用诸如 `MuJoCo` 和 `OpenAI Gym` [2] 中提供的预构建仿真环境，研究人员和开发人员可以专注于开发和测试他们的算法，而无需广泛的领域知识或昂贵的硬件。这有助于加速强化学习研究的步伐，并使我们更接近于开发能够在复杂现实环境中运行的智能系统。




  #### Humanoid


  `Humanoid`环境^(⁹)来自 OpenAI Gym 和 MuJoCo，是一个用于评估强化学习算法的标准基准，这些算法旨在控制一个模拟人类的 3D 双足机器人。任务是协调机器人
  17 个铰接关节的运动，使其能够尽可能快地向前行走而不摔倒。


  智能体执行的每个动作代表施加在人体关节上的扭矩，观测值由人体不同部位的位置值和速度值组成。躯干有一对腿和手臂，每条腿和手臂由两个连杆组成。


  `Humanoid`环境的奖励函数由四个部分组成。智能体在每个时间步，只要人体保持存活，就会获得一个固定值的奖励，称为“健康奖励”。它还会因向前行走而获得奖励，该奖励使用预定义规则衡量，称为“向前奖励”。然而，智能体会因使用过多扭矩控制关节而受到惩罚，称为“控制成本”，以及因承受过大的外部接触力而受到惩罚，称为“接触成本”。


  智能体的总奖励计算为健康奖励、向前奖励之和减去控制成本和接触成本，由公式`reward = healthy reward + forward reward -
  control cost - contact cost`给出。通过最大化这个总奖励，智能体学会协调人体关节的运动，以实现向前行走而不摔倒的目标。


  #### Ant


  `Ant`^(¹⁰)是另一个用于 OpenAI Gym 和 MuJoCo 中简单运动任务的 3D 机器人。它由一个躯干（一个自由旋转体）和连接在其上的四条腿组成。每条腿有两个连杆，共有八个铰链将每条腿的两个连杆连接到躯干。`Ant`任务的目标是通过对这八个铰链施加扭矩，协调腿部使蚂蚁向前移动。


  `Ant`任务的动作空间由施加在铰接关节上的扭矩组成。观测空间由蚂蚁不同部位的位置值和速度值组成。


  `Ant`任务的最终奖励计算为四个部分的总和：健康奖励、向前奖励，减去控制成本和接触成本。健康奖励鼓励蚂蚁保持稳定，向前奖励鼓励蚂蚁向前移动，控制成本惩罚控制输入的大小，接触成本惩罚与环境发生的碰撞。


  MuJoCo 提供了多种机器人控制环境，我们可以用来研究和测试解决持续强化学习问题的算法。除了本书将重点关注的这两个环境外，MuJoCo 环境的其他示例包括：


  *   `Walker2d`：一个设计用于用两条腿行走和跑步的双足机器人

  *   `Hopper`：一个设计用于跳跃和单腿跳的单腿机器人

  *   `HalfCheetah`：一个设计用于快速奔跑和冲刺的四足机器人

  *   `Swimmer`：一个设计用于游泳和在水中移动的机器人


  这些环境为我们的强化学习算法提供了多样化的挑战，使我们能够在各种场景下测试其鲁棒性和有效性。


  ### 10.3 连续动作空间问题的策略梯度


  现在我们将专注于能够解决之前介绍的经典机器人控制问题的算法。到目前为止，本书已经涵盖了两类算法：基于值的强化学习和基于策略的强化学习。虽然我们可以使用这两类算法来解决具有离散动作空间的强化学习问题，但对于具有连续动作空间的问题，我们通常使用基于策略的强化学习方法，因为正如本章前面所述，它们更有效。


  本质上，对于连续动作空间的问题，我们需要学习一个正态（或高斯）分布，因为动作是实数，而不仅仅是整数。正态分布的概率密度函数（PDF）如公式（10.1）所示，其中`μ`和`σ`是正态分布的均值和标准差，`π
  ≈ 3.1415926`是一个常数。


  ```

  p(x|μ, σ) = (1 / (σ * sqrt(2π))) * exp(- (x - μ)² / (2σ²))

  ```


  (10.1)


  正态分布的概率密度函数呈钟形曲线，如图 10.1 所示。正态分布是许多现实世界分布的良好近似，因为它描述了围绕单个均值聚集的实值随机变量。理论上，对于正态分布，68%的总体或样本将落在总体或样本均值`μ`加减一个标准差`σ`的范围内，95%的总体或样本将落在均值两侧加减两个标准差（精确为
  1.96）的范围内。对于连续随机变量，获得任何特定值的概率始终为零，因为存在无限多个可能的值。


  在强化学习的背景下，我们知道策略`π(a|s)`只是从状态`s`到采取动作`a`的概率的映射。为了基于公式（10.1）构建连续动作的策略，我们需要考虑状态`s`和动作`a`。我们可以将公式（10.1）中的`x`替换为动作`a`。接下来，我们使用参数化函数`σ(s,
  θ_σ)`和`μ(s, θ_μ)`来近似均值`μ`和标准差`σ`。参数`θ_σ`和`θ_μ`在训练过程中学习，它们代表了策略基于观测状态生成动作的能力。这样一个策略的完整公式如下所示：




  ![$$\displaystyle \begin{aligned} \pi(a|s, \boldsymbol{\theta}_{\sigma}, \boldsymbol{\theta}_{\mu})
  = \frac{1}{\sigma(s, \boldsymbol{\theta}_{\sigma}) \sqrt{2\pi}} \exp{- \frac{(a
  - \mu(s, \boldsymbol{\theta}_{\mu}))²}{2\sigma(s, \boldsymbol{\theta}_{\sigma})²}}
  {} \end{aligned} $$](img/605748_1_En_10_Chapter_TeX_Equ2.png)


  (10.2)


  ![](img/605748_1_En_10_Fig1_HTML.png)


  高斯概率密度函数的折线图绘制了两个正态分布，参数分别为 `mu = 2`、`sigma a = 0.75` 和 `mu = 2`、`sigma = 1.5`。其峰值分别约在
  0.55 和 0.25 处。


  **图 10.1** 具有不同均值 `μ` 和标准差 `σ` 的高斯概率密度函数示例


  方程 (10.2) 表示一个以均值 `μ(s, θ_μ)` 为中心、标准差为 `σ(s, θ_σ)` 的高斯分布。如果我们知道策略的均值和标准差，就可以从这个分布中采样动作。


  我们可以使用本书第二部分介绍的任何近似方法（如线性或非线性方法）来构建正态分布的均值 `μ(s, θ_μ)` 和标准差 `σ(s, θ_σ)`。需要牢记的是，标准差必须始终为正，因此在实际操作中，我们通常在近似之后取指数。在本书中，我们专门关注使用神经网络来近似
  `μ` 和 `σ`。


  在实践中，也可以使用一个具有部分共享权重和两个独立输出头的单一神经网络来近似 `μ` 和 `σ`，如图 10.2 左侧所示。通过共享部分网络参数，我们可以减少网络中的总参数数量，从而节省计算量；同时，由于需要优化的参数更少，这也能提高某些任务的收敛速度。此处，`N`
  表示任务中动作空间的维度，例如机械臂的关节数量。


  在某些情况下，标准差并不直接与策略网络的任何隐藏层相连，如图 10.2 右侧所示。相反，它通常被当作一个独立的输出，其计算独立于网络隐藏层的输出。


  ![](img/605748_1_En_10_Fig2_HTML.png)


  用于近似高斯分布均值 μ 和标准差 σ 的神经网络架构的两个流程图。两个流程均从输入数据开始，通过 `Tanh` 链接流经 64 个隐藏单元，最后计算高斯分布。在右侧，指向
  σ 的 `N` 个单元与流程没有连接。


  **图 10.2** 用于近似高斯分布均值 `μ` 和标准差 `σ` 的神经网络架构示例


  这种设计选择的一个原因是，标准差通常被建模为一个非负标量值，将其作为独立输出处理比将其融入隐藏层的激活函数更容易。此外，通过将标准差与隐藏层分离，策略网络可以学习调整输出动作的随机性程度，而不会影响网络隐藏层的底层结构。


  这种方法的另一个优点是，它可以在训练和推理期间实现更高效的计算。通过将标准差与隐藏层解耦，网络可以生成不同水平的随机性，而无需为每个方差水平重新计算隐藏层。


  对于许多运动控制任务，我们通常使用双曲正切（`Tanh`）作为激活函数，而不是修正线性单元（`ReLU`），因为 `Tanh` 具有更对称的范围，覆盖正负两个方向的值，如图
  10.3 所示。


  ![](img/605748_1_En_10_Fig3_HTML.png)


  `ReLU` 和 `Tanh` 在 `y` 与 `x` 之间的两个四象限图。`ReLU` 的 `y = max(0, x)`，其线条在第二象限沿水平轴延伸，在第一象限线性上升。`Tanh`
  的 `y = tanh(x)`，其逻辑增长曲线经过点 (0, 0)。


  **图 10.3** `ReLU` 与 `Tanh` 激活函数示例


  如前一章所述，使用熵作为正则化项可以鼓励智能体进行更多探索，这对于复杂问题（例如涉及连续动作空间的问题）尤其有益。


  熵是衡量概率分布不确定性或随机性的指标。通过将熵添加到强化学习算法的目标函数中，我们可以鼓励智能体采取更不可预测的动作，并探索更多的状态空间。


  对于连续动作空间，智能体从学习到的高斯分布中采样动作，其中学习到的网络输出每个连续动作对应的高斯分布的均值和标准差。高斯分布的熵使用以下公式计算：


  ![$$\displaystyle \begin{aligned} H = \frac{1}{2} \sum_{i=1}^{n} \left(\log(2\pi
  e \sigma_i²) \right) \end{aligned} $$](img/605748_1_En_10_Chapter_TeX_Equ3.png)


  (10.3) 其中 `n` 是连续动作空间的维度，`σ_i` 是第 `i` 维动作的标准差。该公式反映了高斯分布的熵随其方差增大而增加的事实，这有助于在策略中鼓励探索。


  理论上，与使用基于策略的方法解决离散动作空间的强化学习问题相比，要使用基于策略的方法解决连续动作空间的强化学习问题，我们只需要做出这些改变。整体训练流程与离散动作空间的情况相同。然而，训练超参数（如学习率）可能需要针对连续情况进行微调。在实践中，我们可能还需要做一些额外的工作，例如在将环境状态输入神经网络之前对其进行归一化，以及对奖励信号进行归一化。




