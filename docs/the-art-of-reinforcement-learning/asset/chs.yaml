- '# 7. 非线性价值函数逼近


  在本章中，我们将探讨使用非线性方法来逼近强化学习中的价值函数。价值函数在强化学习中起着至关重要的作用，因为它们估计智能体在给定状态下并随后遵循策略所能获得的预期奖励。在上一章中，我们讨论了依赖于构建特征向量并计算特征加权组合作为状态值或状态-动作值的线性方法。然而，这些方法在应用于复杂且具有挑战性的领域时存在局限性。在这种情况下，简单的线性组合可能无法捕捉所有相关的特征和信息。此外，确定能够捕捉手头任务所需信息的适当特征需要大量的领域知识和经验。


  为了克服这些局限性，我们可以利用非线性方法，特别是神经网络，来逼近强化学习中的价值函数。神经网络是一种机器学习模型，可以从数据中学习以进行预测或决策。在强化学习中，神经网络可以通过将环境状态作为输入数据，并预测在遵循某个策略时从该状态获得的预期回报，来学习逼近价值函数。


  神经网络的力量在于它们能够自动学习输入和输出之间复杂的非线性关系。换句话说，我们无需手动指定一组特征来表示状态，而是可以直接将原始状态信息输入神经网络，然后网络将通过调整其各层神经元的权重和偏置来学习提取相关信息。这个过程被称为特征学习，它使神经网络能够学习到更适合手头任务的表示。


  与线性方法相比，神经网络在逼近强化学习中的价值函数方面具有以下几个优点：


  - **非线性**：神经网络是非线性函数逼近器，这意味着它们可以对输入和输出之间复杂的非线性关系进行建模。这一点很重要，因为许多现实世界的问题都涉及非线性，而线性方法可能无法捕捉这些复杂的关系。相比之下，神经网络可以学习以高精度逼近复杂的价值函数。


  - **泛化能力**：神经网络可以很好地泛化到新的、未见过的数据。这意味着它们可以基于有限的数据学习逼近价值函数，然后将这种知识应用于新的情况。这在强化学习中很重要，因为智能体需要能够将其知识泛化到新的状态和动作，以便在环境中做出有效的决策。


  - **特征学习**：神经网络可以学习从原始输入数据中提取相关特征，这可以提高它们逼近价值函数的准确性。相比之下，线性方法需要手工设计的特征，这可能很耗时，并且可能无法捕捉所有相关信息。


  - **灵活性**：神经网络具有高度的灵活性，可以轻松适应不同类型的价值函数和强化学习问题。它们可用于逼近状态价值函数和动作价值函数，并可与各种强化学习算法一起使用。


  总的来说，与线性方法相比，使用神经网络逼近强化学习中的价值函数的好处包括：它们能够捕捉非线性关系、泛化到新情况、从原始输入数据中学习相关特征，以及适应不同类型的强化学习问题。熟悉神经网络并有训练深度神经网络经验的读者可以跳过
  7.1 和 7.2 节。




  ### 7.1 神经网络


  神经网络是一种机器学习模型，其灵感来源于人脑中生物神经元的结构与功能。它由多层相互连接的节点（即人工神经元）构成，这些节点通过一系列数学运算来处理信息。


  神经网络的基本构建模块是人工神经元（或称节点）。每个节点接收一个或多个输入，对这些输入执行简单计算，并产生一个输出。每个节点的输出随后作为输入传递给下一层节点。


  用数学术语来说，神经网络是一种由一系列线性和非线性函数构成的数学结构。在抽象层面上，我们可以将其表示为一系列（参数化的）线性函数与（可微的）非线性函数的链式组合。例如，我们可以将简单神经网络表示为公式(7.1)所示，其中`f1`和`f2`是各自带有参数或权重的线性函数，而`σ1`和`σ2`则是可微的非线性函数。第一个线性函数`f1(x)`的输出成为第一个非线性函数`σ1`的输入，`σ1`的输出随后被送入第二个线性函数`f2`，以此类推。


  ```

  H(x) = σ2( f2( σ1( f1(x) ) ) )

  ```


  (7.1)


  更精确地说，我们可以将线性函数`f`表示为输入数据`x`及其权重`W`的函数，如公式(7.2)所示。其中，`W`是一个维度为`m` x `n`的权重矩阵，`b`是一个包含`m`个分量的偏置向量。线性函数的输出是一个包含`m`个标量分量的向量。在对此输出向量应用非线性函数`σ`后，我们将其送入下一个线性函数，以此类推。


  ```

  f(x) = x^T W + b

  ```


  (7.2)


  在强化学习领域，神经网络是近似价值函数甚至策略的强大工具，我们将在本书第三部分详细讨论。通过利用经验数据训练神经网络的权重，我们可以学会从已观测的状态和动作泛化到未观测的情况。将神经网络抽象表示为一系列线性和非线性函数，为近似那些关联状态、动作与价值的复杂函数提供了灵活的框架。


  #### 前馈神经网络


  前馈神经网络，也称为多层感知机（MLP），是一种信息单向流动的神经网络：从输入层开始，经过一个或多个隐藏层，最终到达输出层。在前馈神经网络中，一层的输出作为下一层的输入，层与层之间不存在循环。


  前馈神经网络的典型架构包括一个输入层、一个或多个隐藏层以及一个输出层。输入层接收原始输入数据，数据随后经过隐藏层进行信息变换与处理，最后交由输出层处理。网络中的每一层都由一组神经元组成，这些神经元与相邻层的神经元相连接。每一层中的神经元会计算来自上一层输入的加权和，对结果应用激活函数，并将结果输出到下一层。




  ##### 全连接神经网络


  全连接神经网络，也称为密集神经网络，是一种神经网络类型，其中一层的每个神经元都与下一层的每个神经元相连。这意味着每一层中的所有神经元都与相邻层中的所有神经元相连。全连接神经网络可以有任意数量的层，但通常在输入层和输出层之间有一个或多个隐藏层。


  在实践中，全连接神经网络通常是前馈神经网络的一种特定实现，其中每一层都与相邻层全连接。术语“前馈神经网络”和“全连接神经网络”经常互换使用。然而，“前馈神经网络”这个术语通常更广泛地用于指代任何信息单向流动的神经网络，无论层之间的连接类型如何。


  让我们用图形方式说明全连接神经网络的概念，如图 7.1 所示。此示例网络中的每一层都是线性变换和逐点非线性激活函数的组合。每层中的计算单元数量可以不同，如图 7.1
  所示。输入层是一个抽象层，它将原始输入数据转换为后续层可以处理的格式。其单元数量与输入数据的维度相同，并且其单元没有关联的权重或激活函数。输出层的单元数量与期望输出相同，其计算单元负责生成网络的最终输出。


  输入层和输出层之间的层称为隐藏层。在此示例中，显示了两个隐藏层，但在实践中，神经网络可以有大量的隐藏层，从而形成所谓的深度神经网络。术语“深度学习”通常指使用深度神经网络来解决特定任务，例如分类或预测。隐藏层背后的思想是，通过逐步组合前一层学习到的更简单特征，使网络能够学习输入数据的复杂表示。每个隐藏层由一组计算单元组成，这些计算单元对前一层的输出应用非线性变换，然后进行线性变换以生成下一层的输入。非线性变换通常是一个逐点函数，例如
  `sigmoid`、`ReLU` 或 `tanh` 函数，它引入非线性，使网络能够建模更复杂的输入-输出关系。


  ![](img/605748_1_En_7_Fig2_HTML.png)


  一个图示说明了单个神经元，标记为 X 1 到 X n 的输入，W 1 到 W n。一个圆圈标记为 z j = 求和 i = 1 到 n，x i w i + b
  以及 sigma of z j。


  图 7.2 单个神经元工作方式示例


  ![](img/605748_1_En_7_Fig1_HTML.png)


  一个流程图说明了 X 1 到 X 4 输入层、第一隐藏层、第二隐藏层和输出层。


  图 7.1 一个简单的全连接神经网络示例，包含两个隐藏层（每层由六个单元组成）和一个输出层（由一个单元组成）


  我们可以在图 7.1 中看到，前一层中的每个单元都与后一层中的所有单元相连（输入层除外）。这种类型的架构称为全连接层，如果一个神经网络仅由全连接层组成，我们称之为全连接网络。每一层（没有激活函数的输入层除外）都可以有自己的可微非线性函数
  `σ`，该函数通常被称为激活函数。


  全连接层中的每个单元（或神经元）都有自己的参数集（输入层中的单元除外）。图 7.2 展示了全连接层中第 `j` 个神经元的计算过程。该神经元接收一个向量 `x`
  作为输入数据，其中 `x` 可以是前一层的输出，或者如果该神经元位于第一个隐藏层，则 `x` 是输入数据。它首先计算输入向量 `x` 与权重向量 `w`（表示神经元之间连接的强度）的内积，记为
  `z_j = x^T w`。然后，神经元向结果 `z_j` 添加一个标量参数 `b`，称为偏置。偏置是一个额外的参数，可以偏移结果 `z_j`。之后，神经元对
  `z_j` 应用激活函数 `σ`，激活函数的输出作为输入传递到下一层（如果该神经元位于最后一层，则传递到输出层）。


  值得注意的是，权重向量 `w` 是通过训练过程学习得到的。在训练期间，神经网络会调整 `w` 和 `b` 的值，以便网络能够更好地逼近期望的输出。


  激活函数通过向系统添加非线性，在神经网络中发挥着关键作用。没有它们，神经网络将退化为一个具有许多参数的线性函数，无法捕捉输入和输出之间的复杂关系。


  深度神经网络背后的思想是，通过应用一系列非线性变换，我们可以从输入数据中提取丰富的特征集。这些特征通常具有隐藏的层次结构，其中较低级别的特征被组合成较高级别的特征。激活函数通过使每一层能够从输入数据中提取不同的特征，有助于创建这种层次结构。


  一些最常见的激活函数包括 `ReLU`（修正线性单元）、`sigmoid` 和 `tanh`，如图 7.3 所示。`ReLU` 可能是最流行的激活函数，因为它简单有效，但其他函数如
  `LeakyReLU` 和 `ELU` 也值得考虑。激活函数的选择会对神经网络的性能产生重大影响，并且通常需要通过反复试验来确定最适合特定任务的函数。


  例如，`ReLU` 已知在大多数应用中表现良好，但它可能导致“死亡 ReLU”问题，即某些神经元陷入零激活状态并停止学习。`LeakyReLU` 及其变体通过允许负输入有一个小的非零梯度，有助于缓解这个问题。`Sigmoid`
  和 `tanh` 函数对于特定应用（如二分类或图像生成）也很有用。


  总之，选择合适的激活函数是设计神经网络的重要一步。它需要理解不同函数的优缺点，并尝试不同的组合，以找到最适合特定任务的函数。




  #### 卷积神经网络


  卷积神经网络（CNN）是一种专门为处理和分析具有网格状结构的数据（如图像或视频）而设计的神经网络。CNN 的灵感来源于动物视觉皮层的组织方式和功能，视觉皮层中具有专门对视野中特定特征做出反应的神经元。


  在 CNN 中，输入数据通常是一张图像，它被表示为一个像素网格。网络由多个层组成，每一层对输入数据执行不同类型的处理。第一层通常是卷积层，它对输入图像应用一组滤波器，每个滤波器在图像中寻找特定的模式或特征。这些滤波器在图像上移动，计算滤波器与图像之间的点积，从而生成一个特征图。


  第一层的输出随后被传递到下一层，下一层可能是另一个卷积层、池化层或全连接层。池化层通过计算特征图中相邻区域的最大值或平均值来对上一层的输出进行下采样。全连接层接收上一层的扁平化输出，并对其应用一组权重，从而生成对输入图像的预测或分类。


  全连接神经网络在处理数值数据时很有效，但并不适合处理图像数据，因为图像数据通常具有三个维度：宽度、高度和颜色通道。使用全连接神经网络时，我们需要将图像像素展平以创建一个向量；将图像像素展平为向量会导致我们丢失感兴趣区域以及像素之间的相关性，从而难以识别物体，如图
  7.4 所示。此外，在处理图像时，全连接神经网络中的参数数量可能会变得非常庞大。


  ![](img/605748_1_En_7_Fig3_HTML.png)


  4 条折线图描绘了 Sigmoid、Tanh、ReLU 和 Leaky ReLU 激活函数在一定输入值范围内的特征行为及输出范围。给定 `y = 1 / (1
  + e^(-x))`、`y = tanh(x)`、`y = max(0, x)` 以及当 `x < 0` 和 `x > 0` 时的 `y = a * x`。


  图 7.3


  不同的激活函数。左上角是 Sigmoid 激活函数的示例；右上角是 Tanh 激活函数的示例；左下角是 ReLU 激活函数的示例；右下角是 Leaky ReLU
  激活函数的示例。


  这种方法存在两个主要问题。首先，图像中的物体通常跨越多个像素，并且每个像素与其周围像素相关。将图像展平为向量会使识别物体变得更加困难；想象一下，我们正在训练一个强化学习智能体进行自动驾驶，未能成功识别行人可能意味着致命的错误和悲剧。其次，在处理图像时，全连接神经网络中的参数数量可能会变得非常庞大。例如，一张尺寸为
  `600 × 400 × 3` 的中等大小图像会生成一个包含 `7.2 × 10⁵` 个元素的向量。当输入到全连接神经网络时，第一个隐藏层的输入数据就有 `7.2
  × 10⁵` 个维度。即使第一层只有 10 个隐藏单元，该网络仅这一层就需要 `7.2 × 10⁶` 个参数。当我们有更多隐藏层或隐藏单元时，这个数字会变得更大，从而难以扩展到更大的图像。


  为了解决这些挑战，我们通常使用卷积神经网络（CNN）来处理图像。卷积运算是一个数学过程，涉及将滤波器（或卷积核）应用于输入图像或特征图，以提取相关特征。在深度学习中，卷积被用于卷积神经网络（CNN）来分析视觉图像，并且它是许多最先进的计算机视觉模型中的关键组成部分。


  ![](img/605748_1_En_7_Fig4_HTML.png)


  一个流程示意图描绘了一个 6 × 5 × 1 的方格网格。在总共 35 个方格中，有四个方格被着色，然后被转换为线性框。具体来说，第 8、14、15 和 20
  个方格被相应地着色。


  图 7.4


  将灰度图像展平为向量的示例。


  卷积的工作原理是：取一个小的数值矩阵（称为滤波器或卷积核），将其在输入图像或特征图上滑动，在每个位置计算滤波器与图像或特征图局部区域之间的点积。此操作的结果是一个新的矩阵，称为输出特征图，它捕获了输入中最重要的特征。


  在深度学习中应用卷积有许多优势，包括能够捕获视觉数据中的空间依赖性、减少模型所需的参数数量，以及能够跨图像的不同区域重用学习到的特征。这些特性使卷积成为分析视觉数据的有效工具，并使其广泛应用于各种计算机视觉应用中。


  CNN 由一个或多个卷积层组成，这些卷积层直接接收图像数据，而无需将其展平。这保留了原始图像中的感兴趣区域和像素相关性。此外，卷积层具有固定的参数数量，与输入图像大小无关，这使得它易于扩展到更大的图像。


  卷积层的核心是一个对输入数据执行卷积运算的滤波器。一个卷积层通常由多个滤波器组成，每个滤波器都有自己的参数集：权重 `W` 和偏置 `b`。权重 `W` 是一个维度为卷积核大小
  × 输入通道数的矩阵。卷积核大小是一个可配置的变量，它决定了滤波器对图像进行卷积时工作区域（即感受野）的大小。滤波器以一个称为步长（默认值为 1）的可配置变量在图像上移动，以执行卷积运算。步长控制每次卷积运算时滤波器移动的距离，例如一次移动一个像素，直到到达图像的右边缘。


  图 7.5 展示了卷积神经网络中一个卷积层内单个滤波器的运算过程。左侧的输入数据有一个通道（例如，一张灰度图像），中间的单个滤波器的卷积核大小为 `3 × 3`。由于输入数据只有一个通道，该滤波器的权重矩阵
  `W` 的维度为 `3 × 3 × 1`。




  为了从与滤波器卷积的输入数据的感受野中提取特征，在感受野`X`和权重矩阵`W`之间使用点积符号`X · W`计算点积。感受野是与滤波器卷积的输入数据区域，其宽度和高度与核大小相同，如图
  7.5 中的橙色部分所示。


  ![图 7.6：单个卷积滤波器如何工作的示例（针对最后一个感受野）。数字是随机生成的。](img/605748_1_En_7_Fig6_HTML.png)


  图 7.6 展示了单个卷积滤波器的工作原理。它描绘了一个 6x7 表格中的输入数据，其中右下角有一个 3x3 的表格被高亮显示并连接到滤波器。滤波器呈现一个高亮的
  3x3 表格。特征图呈现一个在右下角高亮显示的、标记为`X·W`的块。


  ![图 7.5：单个卷积滤波器如何工作的示例。数字是随机生成的。](img/605748_1_En_7_Fig5_HTML.png)


  图 7.5 展示了单个卷积滤波器的工作原理。它描绘了一个 6x7 表格中的输入数据，其中左上角有一个 3x3 的表格被高亮显示并连接到滤波器。滤波器呈现一个高亮的
  3x3 表格。特征图呈现一个在左上角高亮显示的、标记为`X·W`的块。


  点积结果使用加法运算符与偏置`b`（一个标量参数）相加，得到一个标量值，该值成为输出特征图的一部分。输出特征图使用公式`y = X · W + b`计算。


  由于滤波器的核大小通常远小于输入图像或来自先前卷积层的特征图，因此它需要通过滑动整个图像来重复执行相同的过程。每次，滤波器都会重用其参数，包括权重和偏置。图 7.6
  展示了滤波器如何针对最后一个感受野工作。


  在实践中，单个卷积层会有多个滤波器，每个滤波器负责检测特定的特征。关于卷积层的一个有趣事实是，输出特征图中的通道数完全由该层中的滤波器数量决定，并且与输入数据中的通道数无关。例如，如图
  7.7 所示，如果输入数据只有一个通道，但卷积层有四个滤波器（用不同颜色表示），则输出特征图将有四个通道。


  ![图 7.8：单个卷积滤波器如何工作的示例，其中输入数据有三个通道且我们有一个滤波器。数字是随机生成的。](img/605748_1_En_7_Fig8_HTML.png)


  图 7.8 展示了单个卷积滤波器的工作原理。它描绘了 3 个通道的输入数据（6x7 表格），其中左上角有一个 3x3 的部分被高亮显示并连接到一个具有 3 个通道的滤波器。特征图呈现一个在左上角高亮显示的、标记为`X·W`的块。


  ![图 7.7：多个卷积滤波器如何工作的示例；输出特征图中的通道数仅取决于滤波器的数量。数字是随机生成的。](img/605748_1_En_7_Fig7_HTML.png)


  图 7.7 展示了多个卷积滤波器的工作原理。它描绘了一个 6x7 表格中的输入数据，其中左上角有一个 3x3 的表格被高亮显示并连接到多个滤波器。滤波器呈现高亮的
  3x3 表格。特征图呈现一个在左上角高亮显示的、标记为`X·W`的块。


  前面的示例仅考虑了具有一个通道的输入数据，但在实践中，输入数据通常有多个通道。例如，RGB 图像有三个颜色通道，或者来自先前隐藏层的特征图可能有多个通道。在这些情况下，卷积层中每个滤波器的权重`W`将具有与输入数据相同数量的通道。例如，如图
  7.8 所示，如果输入数据有三个通道，则该层中每个滤波器的权重`W`也将有三个通道。输出特征图将只是对应通道之间组合点积的结果：`∑ᵢ Xᵢ · Wᵢ`。然而，由于我们讨论的是单个滤波器，输出特征图将只有一个通道。


  关于卷积神经网络（CNN）的架构，有几个重要的细节值得注意，例如控制步长和填充，以及使用池化层来缩小图像尺寸。然而，本书主要关注强化学习的理论和数学原理。感兴趣的读者可以在其他地方找到其他资源来了解更多关于这些神经网络架构的信息。


  在处理图像时，CNN 相比全连接神经网络具有显著优势。例如，考虑一个尺寸为`600 × 400 × 3`的输入图像。对于第一个隐藏层，使用 100 个核大小为`3
  × 3`的滤波器，仅产生 2700 个参数（不包括偏置项）。这远小于全连接层中十个单元所需的`7.2 × 10⁶`个参数。此外，CNN 被设计为与输入图像尺寸无关，这使得它们在图像处理任务中更加通用。




  ### 7.2 训练神经网络


  训练神经网络是指教导神经网络学习输入数据与输出数据之间映射关系的过程。在训练过程中，神经网络会接收一组输入-输出对，并通过调整其参数（如权重和偏置）来最小化预测输出与实际目标之间的差异，例如在监督学习中的情况。


  使用随机梯度下降法通过样本梯度来更新神经网络参数的基本思路仍然适用。然而，挑战在于如何计算神经网络中不同权重和偏置对应的梯度。由于神经网络通常包含多个层，且每层可能使用不同的激活函数，因此各层权重和偏置的导数也会有所不同。这意味着我们不能像上一章介绍的线性方法那样，使用单一的更新规则来更新这些不同层的参数。


  虽然仍然可以手动推导每一层的方程，但对于不熟悉微积分的人来说，这种方法颇具挑战性。此外，深度神经网络往往有数十层甚至数百层，使得手动推导变得不切实际。如果对神经网络架构进行更改（例如添加或删除层、更换激活函数），大部分工作都需要重新进行。


  幸运的是，反向传播算法为神经网络中梯度计算的挑战提供了一种简单而优雅的解决方案。该算法利用计算图来表示复杂的可微函数，然后运用微积分中的链式法则来计算图中每个节点的梯度。计算图中的每个节点仅执行非常基本的运算，例如加法、乘法、除法，或像激活函数这样的组合运算。由于我们已经知道这些基本运算的导数，因此推导出这些节点中变量的导数相对容易。


  图 7.9 展示了一个全连接层计算图的简化版本。在此图中，每个节点执行特定的计算，例如两个变量之间的点积、加法，或像激活函数 `σ` 这样的组合运算。请注意，节点
  `z₁` 表示输入数据 `x` 与该线性层中所有单元的每个权重向量 `w` 之间的点积。节点 `z₂` 类似，但将来自所有单元的偏置项加到了 `z₁` 的结果上。


  使用反向传播算法不仅简化了梯度的计算，还使神经网络更加灵活。如果对神经网络架构进行更改，该算法可以轻松调整以适应这些变化，而无需完全重做工作。


  在我们使用目标函数计算神经网络预测结果 `y` 与真实目标 `y*` 之间的损失后，就可以利用反向传播算法计算网络参数的梯度，然后使用这些梯度来更新网络参数。反向传播算法在计算图中反向工作，计算每个节点处局部参数对应的梯度（有时也称为局部梯度），然后将这些梯度传播回上一个节点。它利用微积分中的链式法则来实现这一点，从而能够计算局部参数的梯度以及来自前一个节点的上游梯度。这不仅适用于全连接神经网络，也适用于任何其他类型的神经网络，包括卷积神经网络和循环神经网络。


  ![](img/605748_1_En_7_Fig9_HTML.png)


  一个包含 6 个节点 `x`、点积 `z₁`、加法 `z₂`、`σ`、`w` 和 `b` 的示意图。


  **图 7.9** 全连接层计算图的简化示例


  让我们看一个非常简单的全连接神经网络，它包含一个隐藏层和一个输出层。我们对隐藏层使用 sigmoid 激活函数，对输出层不使用激活函数。我们使用平方误差损失作为目标函数，该函数衡量预测值与真实目标值之间的差异。图
  7.10 展示了反向传播如何为每一层计算梯度。在通过神经网络前向传播计算出预测值 `y` 后，我们使用真实目标 `y*` 来计算损失。然后反向传播算法开始反向工作，从图中最后一个节点
  `l`（即损失输出的位置）开始。对于每个节点，它利用上游梯度和局部梯度来计算该特定计算节点的梯度，直到到达第一个隐藏层。在实践中，我们只关心这些不同层的权重 `W`
  和偏置 `b` 对应的梯度。


  在知道神经网络不同层的权重和偏置对应的梯度后，我们就可以开始使用随机梯度下降算法来更新参数。


  随着神经网络层数的增加，跟踪每一层的权重和偏置变得困难。因此，我们通常使用 `θ` 来表示神经网络的所有参数，其中 `θ` 是一个包含单个神经网络所有参数（权重和偏置）的向量。总而言之，训练神经网络通常包括以下主要步骤：


  - 将输入数据 `x` 馈送到由 `θ` 参数化的神经网络中，得到预测值 `y`。

  - 使用目标函数，根据上一步得到的 `y` 和真实目标 `y*` 计算损失。

  - 使用反向传播算法，根据上一步的损失计算 `θ` 的梯度。




  *   使用随机梯度下降算法，根据上一步的梯度更新`θ`。


  幸运的是，现代深度学习框架（如`PyTorch`和`TensorFlow`）内置了自动微分功能，可以自动为我们执行反向传播。这些工具还内置了优化器，可以根据参数的梯度更新神经网络的参数。自动微分和反向传播帮助我们计算神经网络参数的梯度。优化器是使用梯度来更新网络参数的算法。因此，我们只需关注神经网络的架构并定义目标函数（损失函数），这些工具将自动为我们处理其余工作。


  ![](img/605748_1_En_7_Fig10_HTML.png)


  该图概述了神经网络中的前向和反向传播过程，包括训练期间梯度的计算和参数的更新。


  **图 7.10** 反向传播如何为一个简单的全连接神经网络计算梯度的示例，该网络包含一个隐藏层和一个输出层，其中隐藏层使用`sigmoid`激活函数，输出层不使用激活函数。


  在下面的示例中，我们演示如何使用`PyTorch`深度学习框架训练一个神经网络。首先，我们创建一个神经网络实例和一个优化器（本例中为随机梯度下降，即`SGD`），用于在训练期间更新网络参数。我们将网络参数和学习率作为参数传递给优化器，以便它知道要更新哪些参数以及更新步长的大小。


  在训练期间，我们将训练集中的输入数据输入网络，计算预测输出。然后，我们计算损失，这是衡量预测输出与训练集中真实目标值之间差距的指标。在本例中，我们使用均方误差（`MSE`）损失作为目标函数。


  计算损失后，我们使用反向传播自动计算网络不同参数的梯度。这些梯度告诉我们每个参数对损失的贡献程度，我们可以利用它们执行随机梯度下降步骤来更新网络参数。我们对每一批训练数据重复此过程，直到网络学会准确预测目标值。


