  #### 树的置信上界


  我们现在将讨论 MCTS 如何在搜索过程中选择最佳子节点，这是树策略的关键组成部分。在 MCTS 中，搜索树是基于节点在树中的选择方式构建的，因此选择最佳子节点对
  MCTS 的成功至关重要。一种简单的实现是始终选择平均奖励最高的子节点，即估计的状态-动作价值。然而，这种方法有一个根本缺陷：它不会探索其他可能带来更好整体策略的动作。这本质上就是我们在本书第一部分介绍的探索-利用问题，这是强化学习中的一个重要主题。


  在深入探讨 MCTS 如何选择最佳子节点之前，我们先来了解另一种称为置信上界（UCB）的算法。UCB 算法最初是为了解决赌博机问题而开发的，这是强化学习任务的一个特例，其中智能体只执行一个动作，环境立即进入终止状态，就像赌场里的老虎机一样。在这种情况下，单个回合中没有状态或动作的序列，只有一个状态和一个动作。顾名思义，该算法为每个可用动作计算一个置信上界，并尝试选择能够最大化
  UCB 分数的动作。


  UCB 算法是解决多臂赌博机问题的一种广泛使用的方法，该问题涉及选择动作以随时间最大化奖励。最简单的 UCB 版本称为 UCB1，由 Auer、Cesa-Bianchi
  和 Fischer 在他们的论文《多臂赌博机问题的有限时间分析》[10] 中提出。


  UCB1 算法选择能够最大化 UCB1 分数的动作，该分数使用公式 (14.1) 计算：


  ```

  UCB1 = X̄_j + √(2 ln N / n_j)

  ```


  (14.1) 其中 `X̄_j` 是动作 `j` 的平均价值（或平均状态-动作价值），`n_j` 是动作 `j` 被执行的次数。`N` 是到目前为止在赌博机问题背景下游戏（回合）的总执行次数。


  UCB1 分数的第一项 `X̄_j` 鼓励智能体选择价值最高的动作，这被称为利用。第二项 `√(2 ln N / n_j)` 鼓励智能体探索其他可能具有更高潜在奖励的动作，因为它取决于动作被执行的次数。当
  `n_j = 0` 时，UCB1 值变为 `∞`，因此未访问过的动作被赋予最大值。


  我们可以调整 UCB1 算法，用于在蒙特卡洛树搜索（MCTS）中选择最佳子节点。这种修改后的算法通常被称为树的置信上界（UCT）。其基本思想是选择能够最大化 UCB
  分数的子节点，该分数使用公式 (14.2) 计算：


  ```

  UCB = X̄_j + 2C √(2 ln N / n_j)

  ```




  (14.2) 其中 *N* 是当前节点的父节点被访问的次数，![$$n_j$$](img/605748_1_En_14_Chapter_TeX_IEq29.png)
  是子节点 *j* 被访问的次数。*C* 是一个常数，用于控制搜索过程中的探索程度。如果多个子节点具有相同的最大值，通常通过随机选择其中一个节点来打破平局。与`UCB1`一样，当![$$n_j=0$$](img/605748_1_En_14_Chapter_TeX_IEq30.png)时，`UCB`值变为![$$\infty
  $$](img/605748_1_En_14_Chapter_TeX_IEq31.png)。这确保了在进一步扩展之前，一个节点的所有子节点至少被访问一次。


  为了理解`UCT`在实践中如何工作，让我们考虑一个游戏，其中玩家在棋盘上移动一个棋子。玩家每回合可以从几个可能的移动中选择，但不知道哪个移动是最好的。目标是找到导致最佳结果（例如，赢得游戏）的移动序列。


  在搜索过程中，`UCT`算法维护一个游戏状态和可能移动的树，每个节点代表一个游戏状态，每条边代表一个可能的移动。搜索从根节点开始，根节点代表游戏的当前状态。在每一步，算法根据`UCB`分数选择一个子节点进行扩展，并持续进行直到到达叶节点。


  一旦到达叶节点，就会执行一次模拟或推演，直到游戏达到终止状态。然后，模拟结果值会沿着所经过的路径反向传播回树中，更新路径上每个节点的`UCB`分数。这使得算法能够逐步改进对每个可能移动价值的估计，并更彻底地探索有希望的移动。


  使用`UCT`算法选择最佳子节点的伪代码如算法 2 所示，其中![$$\nu $$](img/605748_1_En_14_Chapter_TeX_IEq32.png)是树中的一个节点，![$$\nu
  ''$$](img/605748_1_En_14_Chapter_TeX_IEq33.png)是节点![$$\nu $$](img/605748_1_En_14_Chapter_TeX_IEq34.png)的一个子节点，*c*
  是如公式(14.2)所示的一个常数。


  **算法 2: UCT—最佳子节点**


  ![](img/605748_1_En_14_Figaab_HTML.gif) 一个用于`UCT`最佳子节点的搜索算法，包含`bestChild`函数。`nu`和`c`是要传递的参数。


  然后，我们可以将上述`UCT`算法插入到通用的`MCTS`算法中，这为我们提供了一个强大的框架，用于在强化学习问题中平衡探索和利用。通过使用这些算法，智能体可以通过探索新动作，同时利用已被证明有效的动作，逐步提高其性能。


  #### 双人零和游戏的 MCTS


  前面讨论的通用`MCTS`算法适用于智能体做出所有动作的单人游戏。然而，对于像国际象棋或围棋这样的双人零和游戏，情况变得更加复杂。这是因为在反向传播模拟结果![$$\Delta
  $$](img/605748_1_En_14_Chapter_TeX_IEq35.png)时，我们需要考虑两个玩家的视角。


  在双人零和游戏中，游戏的结果总是零和结果，这意味着一个玩家获胜，另一个玩家必须失败。因此，我们需要分别计算每个玩家的奖励。例如，在一盘国际象棋中，如果我们使用`MCTS`为黑方玩家规划下一步，并且模拟结果导致黑方获胜，那么我们应该为搜索树遍历路径中代表黑方回合的所有边分配+1
  的奖励。然而，对于白方，奖励应为-1，因为这个结果代表白方失败。


  一种解决方案是为对手玩家切换![$$\Delta $$](img/605748_1_En_14_Chapter_TeX_IEq38.png)的符号，以准确反映游戏的性质。这是因为在双人零和游戏中，一个玩家的胜利总是另一个玩家的失败。因此，对两个玩家使用相同的![$$\Delta
  $$](img/605748_1_En_14_Chapter_TeX_IEq39.png)无法准确表示游戏的结果。


  图 14.5 展示了一个基于玩具游戏井字棋的`MCTS`如何反向传播模拟结果的示例。在这个游戏中，两个玩家轮流在一个三乘三的网格上落子。一个玩家下 X，另一个玩家下
  O。第一个在水平、垂直或对角线上连成三子的玩家获胜。如果棋盘填满且没有玩家连成三子，则游戏为平局。


  ![](img/605748_1_En_14_Fig5_HTML.png)


  基于玩具游戏井字棋的双人零和游戏的十张图示，包含四个层级，分别是 X 移动、O 移动、X 移动和 O 移动。


  **图 14.5** 基于玩具游戏井字棋的通用`MCTS`如何为双人零和游戏反向传播模拟结果的示例


  为简单起见，我们只关注如何从导致终止状态的节点（即图 14.5 中标有游戏获胜者的节点）反向传播结果，并忽略搜索树中的所有中间节点。


