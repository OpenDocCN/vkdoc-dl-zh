  (220, 23) 之间波动。数值为估算值。


  **图 14.17** AlphaZero 智能体在 `13 x 13` 五子棋棋盘上的表现。左图：根据当前（最新）模型与上一检查点模型之间的评估对局计算出的
  Elo 等级分。右图：评估对局的时长


  然而，值得注意的是，在较小的棋盘（例如 `9 x 9`）上，结果会有显著差异。在这种情况下，经过一定时间的训练后，Elo 等级分往往会趋于平稳。此外，评估对局的时长通常会延长至
  `9 x 9 = 81` 步。出现这种现象是因为在较小的棋盘上，先手方（黑方）受到空间限制，无法执行复杂的着法。因此，对局往往在任一方获胜之前就以棋盘完全占满而告终。


