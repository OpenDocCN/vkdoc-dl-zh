  \ `γ`、初始探索率 `ε` 和情节数量 `K`。\n\n我们可以运行算法 6 来为我们的服务犬 MDP 找到最优策略。令人惊讶的是，在十个情节之后，它找到了最优策略，尽管这些值并不十分接近真实的最优状态价值函数\
  \ `V_*`。\n\n我们还可以从表 4.3 中看到，随着情节数量的增加，这些值越来越接近真实的最优状态价值 `V_*`。一个有趣的现象是，对于状态 `Outside`，其值从未接近真实值；这可能是因为智能体在学习过程中很少访问该状态。因此，该值没有频繁更新。\n\
