  \ 0.9`。\n\n\n\n### 针对 `Q_π` 的蒙特卡洛策略评估\n\n我们可以使用蒙特卡洛策略评估来估计策略 `π` 的状态-动作价值函数 `Q_π`。状态-动作价值函数\
  \ `Q_π(s, a)` 衡量的是从状态 `s` 开始，采取动作 `a`，然后遵循策略 `π` 所能获得的期望回报。\n\n蒙特卡洛策略评估通过生成许多在策略\
  \ `π` 下的马尔可夫决策过程（MDP）的幕（episode），然后计算每个状态-动作对的平均回报来估计 `Q_π`。具体来说，对于每一幕，智能体从一个初始状态\
  \ `s0` 开始，并根据策略 `π` 采取动作，直到到达一个终止状态。在每个时间步 `t`，智能体观察当前状态 `S_t`，根据策略 `π` 采取动作 `A_t`，并接收奖励\
  \ `R_t`。智能体持续采取动作并接收奖励，直到到达终止状态，此时该幕结束。\n\n**表 4.2** 针对服务犬 MDP 的相同随机策略，使用首次访问蒙特卡洛策略评估和带增量更新的首次访问蒙特卡洛策略评估计算出的状态价值。结果在\
  \ 100 次独立运行中取平均；每次运行包含 2000 幕；最后一行包含使用 DP 策略评估计算出的真实状态价值。本实验中使用相同的折扣率 `γ = 0.9`。\n\
  \n| | 房间 1 | 房间 2 | 房间 3 | 室外 | 找到物品 |\n| --- | --- | --- | --- | --- | --- |\n\
  | 首次访问 MC | −2.67 | −1.85 | 3.17 | −3.33 | 0 |\n| 增量首次访问 MC | −2.65 | −1.84 | 3.16\
  \ | −3.34 | 0 |\n| DP | −2.66 | −1.85 | 3.17 | −3.33 | 0 |\n\n在生成多幕之后，蒙特卡洛策略评估会计算在幕中被访问过的每个状态-动作对\
  \ `(s, a)` 的平均回报 `G_t`。这是通过平均每次访问该对 `(s, a)` 后获得的回报来实现的，其中回报是从该时间步到该幕结束时的折扣奖励之和：\n\
  \n```\nG_t = R_t + γ R_{t+1} + γ² R_{t+2} + ... + γ^{T-1-t} R_{T-1}\n```\n\n(4.3)\n\
  \n这里，`T` 是该幕结束的时间步，`γ` 是折扣因子，它决定了未来奖励相对于即时奖励的重要性。\n\n一旦我们计算出了每个状态-动作对 `(s, a)` 的平均回报\
  \ `G_t`，我们就可以使用增量更新规则来更新 `Q_π(s, a)` 的估计值：\n\n```\nQ_π(S_t, A_t) = Q_π(S_t, A_t)\
  \ + (1 / N(S_t, A_t)) * (G_t - Q_π(S_t, A_t))\n```\n\n(4.4)\n\n这里，`N(S_t, A_t)`\
  \ 是状态-动作对 `(S_t, A_t)` 在幕中被访问的次数。\n\n首次访问蒙特卡洛策略评估是实现蒙特卡洛策略评估以估计 `Q_π` 的一种方法，它通过对该状态-动作对首次访问后获得的回报取平均来估计每个状态-动作对的价值。算法如下：\n\
  \n**算法 4：** 针对 `Q[π]` 的带增量更新的首次访问蒙特卡洛策略评估\n\n一个标题为“针对 `Q_π` 的带增量更新的首次访问蒙特卡洛策略评估”的\
  \ 8 行算法，接收以下输入，并输出输入策略 `π` 的估计状态价值函数 `Q_π`。待评估的策略 `π`、折扣率 `γ` 以及幕数 `K`。\n\n图 4.3\
  \ 展示了我们使用算法 4 为服务犬 MDP 的随机策略 `π` 计算出的状态-动作价值。和往常一样，结果在 100 次独立运行中取平均；每次运行包含 2000\
  \ 幕。请注意，状态价值是使用 DP 策略评估计算得出的。本实验中使用折扣率 `γ = 0.9`。\n\n我们可以通过使用这些状态-动作价值来计算状态价值来验证结果。回想一下，状态价值就是该状态所有状态-动作价值的加权和。\n\
