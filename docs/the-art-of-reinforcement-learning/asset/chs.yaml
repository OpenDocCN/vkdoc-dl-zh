  ### 14.6 总结


  在本书的最后一章中，我们深入探讨了著名的 AlphaZero 算法，该算法通过在复杂且极具挑战性的策略游戏中击败世界冠军，在强化学习领域取得了卓越成就。


  我们首先解释了为何无模型强化学习在解决此类难题时力不从心，以及为何需要基于模型的方法来进行有效规划。随后，我们探讨了传统搜索算法在面对像围棋这样拥有巨大搜索树的游戏时所存在的局限性。


  本章用大量篇幅阐述了蒙特卡洛树搜索（MCTS）算法，该算法是 AlphaZero 智能体的核心。我们概述了通用 MCTS 算法，并描述了其在一次搜索会话中的不同阶段。此外，我们还演示了如何将
  MCTS 算法应用于双人零和博弈。


  在扎实理解 MCTS 算法的基础上，我们接着解释了 AlphaZero 算法。我们之所以只专注于 AlphaZero，是因为与其后继者相比，它更具通用性、更强大，且实现相对简单。我们阐明了围棋游戏的状态表示，并概述了
  AlphaZero 所采用的神经网络架构。


  接下来，我们介绍了 AlphaZero 所使用的改进版 MCTS 算法。与通用 MCTS 算法不同，AlphaZero 在模拟展开阶段并不会一直模拟到游戏结束；相反，它利用神经网络的预测作为估计的游戏结果。与完整模拟相比，这种方法显著加快了处理速度。


  最后，我们展示了在 ![$$9 \times 9$$](img/605748_1_En_14_Chapter_TeX_IEq201.png) 围棋棋盘上训练 AlphaZero
  智能体的实验结果。与传统的 ![$$19 \times 19$$](img/605748_1_En_14_Chapter_TeX_IEq202.png) 围棋棋盘相比，这需要更少的计算资源和更小的预算。值得注意的是，尽管仅经过
  50 小时的训练、一百万局对弈，且未对训练过程或超参数进行任何微调，我们训练出的智能体仍达到了业余 1 段的水平。


  对于那些可能没有所需资源或对围棋不感兴趣的读者，我们还额外进行了一项对比实验，使用了 ![$$13 \times 13$$](img/605748_1_En_14_Chapter_TeX_IEq203.png)
  的五子棋棋盘。尽管五子棋比围棋简单，但这项实验揭示了智能体性能方面一些有趣的见解。它揭示了传统神经网络架构在处理五子棋边缘情况时遇到的困难，同时也展示了如何通过对神经网络架构进行简单修改来纠正这一问题。


  通过进行大量的实验和分析，我们得出了最终结论。然而，我们谦逊地承认，我们的理解可能并不完整，可能还有一些我们尚未充分探索的领域。就像冰山一样，强化学习的深度是巨大的，而本书仅代表了冰山一角。


  例如，就在本书即将完成之际，DeepMind 最近发表的一篇论文中涌现了一项激动人心的进展。他们公布了一个名为 AlphaDev [18] 的新强化学习智能体，它是本章讨论的
  AlphaZero 智能体的一个改进版本。据他们声称，AlphaDev 智能体在发现更快的排序算法方面取得了重大突破。这一宣布引发了巨大的热情，因为它有望改变我们对计算和编码的理解。此外，它还提供了令人信服的证据，表明强化学习和
  AlphaZero 方法可以成功应用于解决现实世界的挑战。


  在本书的结尾，我们想对您始终如一的兴趣表示最深切的感谢，并希望这本对强化学习基础、数学和算法的全面探索，对您而言既富有启发性又充满乐趣。


  在我们的旅程中，我们谦逊地承认，我们可能遇到过挑战，也犯过错误。我们致力于持续改进，并珍视您的反馈，以帮助我们完善和提升内容。如有任何疑问或更正，请随时联系我们。


  我们鼓励您继续探索这个不断扩展的强化学习领域。愿您在深入这个激动人心的研究领域时，您的持续旅程能为您带来新的见解和突破性的发现。最重要的是，我们衷心希望本书能为您打下坚实的基础，并成为您未来努力的灵感源泉。




