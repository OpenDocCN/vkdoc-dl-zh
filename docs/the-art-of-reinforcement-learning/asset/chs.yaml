  ### 7.6 用于 Atari 游戏的 DQN


  到目前为止，我们只考虑了像推车杆和爬山车这样的玩具问题，我们可以使用线性方法而非神经网络来近似价值函数。然而，对于更复杂和更具挑战性的强化学习问题，神经网络是必不可少的。一个例子是
  Atari 视频游戏测试平台，这是一系列由 Atari Interactive, Inc. 拥有的游戏集合，需要先进的 AI 技术才能玩得好。


  在本节中，我们将详细介绍如何训练一个 DQN 智能体来玩部分 Atari 游戏。正如我们在第 1 章中提到的，DQN 智能体是一种基于神经网络的方法，用于解决强化学习问题。为了将
  DQN 算法应用于 Atari 游戏，我们需要对训练流程进行一些修改。具体来说，我们需要准备环境状态、定义神经网络架构，并修改训练细节。这些修改基于 Mnih
  等人 [7] 和 [6] 的工作，我们将严格遵循这些工作。


  #### 使用 Atari 游戏环境的局限性与挑战


  尽管 Atari 游戏环境已被证明是测试和开发深度强化学习算法的宝贵工具，但它并非没有局限性和挑战。Atari 环境的主要局限性之一在于它是现实世界的简化模拟，这意味着智能体在
  Atari 环境中学到的技能和策略不一定能迁移到现实世界的应用中。换句话说，Atari 环境可能过于人工化，无法捕捉现实世界环境的全部复杂性和多变性。


  Atari 环境的第二个局限性在于它是一个相对低维且离散的环境，这意味着它可能不适合测试和开发需要高维且连续状态和动作空间的深度强化学习算法。一些现实世界的应用，如机器人技术和自动驾驶，其状态和动作空间比
  Atari 环境中的要复杂和连续得多。


  Atari 环境的另一个局限性在于它是一个静态环境，这意味着它不会随时间变化。另一方面，现实世界环境是动态且不断变化的，这给深度强化学习算法带来了额外的挑战。例如，自动驾驶智能体必须能够实时适应变化的交通状况和道路条件，这比玩《太空侵略者》游戏要困难得多。


  尽管存在这些局限性，研究人员仍在积极开发更真实、更复杂的环境，用于测试和开发深度强化学习算法。其中一些环境包括模拟机器人任务、交通模拟，以及具有更真实物理和图形的视频游戏环境。这些环境可以为深度强化学习算法提供更具挑战性和更真实的测试平台，并有助于弥合模拟环境与现实世界应用之间的差距。




  #### 环境预处理


  雅达利游戏是一类确定性的、情节式的强化学习问题。屏幕图像（即帧）被用作环境状态，情节序列的时间步长由游戏的不同帧来衡量。然而，这种方法存在一个问题：单帧图像不具备马尔可夫性质。为了理解这个问题，我们来看一下《打砖块》视频游戏中的一帧，如图
  7.16 所示。从这一帧中，很难判断球（屏幕左中部的小红块）的运动方向。它可能正在向上移动，因为智能体刚刚用球拍击中了球；也可能是在撞到右侧墙壁后，从右角落下落。问题在于，这一帧包含的信息不足以完整描述球的运动方向或轨迹。


  马尔可夫性质（在第 2 章中介绍）指出，后继状态 `s_{t+1}` 仅依赖于当前状态 `s_t` 和动作 `a_t`，而不依赖于所有先前的状态和动作 `(s_0,
  a_0, s_1, a_1, ..., s_t, a_t)`。然而，在这种情况下（如图 7.16 所示），后继状态 `s_{t+1}` 依赖于过去的信息。例如，如果球正从右角落向下移动，而智能体选择将球拍向右移动，它可能会错过球，这将导致负面后果（失去一条命）。但是，如果球正在向上移动，而智能体同样将球拍向右移动，智能体则可能获得一些奖励，因为球很可能会击中顶部墙壁。对于相同的单帧和动作，智能体可能会得到不同的后继状态和奖励。


  解决这个问题的一个方法是将过去的帧叠加起来。图 7.17 展示了一个示例，通过叠加过去的 28 帧来构建一张图像。现在，我们可以判断出球在击中右侧墙壁后正朝向屏幕底部移动。


  ![](img/605748_1_En_7_Fig16_HTML.png)


  一幅插图展示了一个视频游戏，顶部有一组方块，一个小球在方块上随机移动，最终落到底部的一条水平面上。


  图 7.16 《打砖块》视频游戏单帧示例


  然而，将所有历史帧都叠加起来对空间和计算效率并不友好，因为大多数雅达利游戏可能持续数百万帧。这些游戏大多每秒生成 30 到 60 帧，且游戏中的运动非常简单，因此连续两帧之间的变化非常微小，我们几乎无法分辨它们是否不同。DQN
  使用一种称为“动作重复”（有时也称为跳帧）的技术来解决这个问题。通过这种技术，智能体在与环境交互时，会将同一个动作重复执行 `k` 次（默认 `k=4`）。在每个情节开始时，智能体根据网络
  `theta` 的 `epsilon`-贪心策略选择某个动作 `a`，然后在与环境交互的过程中将同一个动作 `a` 重复执行 `k` 次（终止状态除外，该状态不需要重复动作）。在第
  `k+1` 帧时，智能体选择另一个动作 `a''`，并将 `a''` 重复执行 `k` 次。这个过程不断重复，直到情节终止。结果，智能体只看到来自环境的每第 `k`
  帧，从而高效地跳过了 `(k-1)/k` 百分比的帧处理。仅这一项简单的技术就能为智能体节省大量的空间和计算时间。


  图 7.18 展示了一个 `k=4` 的动作重复示例，其中灰色显示的帧代表通过重复相同动作而跳过的帧。


  最后，为了确保环境状态具有马尔可夫性质，同时节省计算和空间，DQN 使用了最近四帧的历史记录（在应用了动作重复和跳帧之后）。这四帧被叠加在一起，如图 7.19
  所示，以构建一张代表环境状态的图像。在输入神经网络之前，图像从 `160 x 210 x 3`（雅达利帧的默认尺寸）缩小到 `84 x 84 x 3`，然后转换为灰度图以节省额外的计算。这种缩小尺寸和灰度转换有助于通过减小输入数据的大小来加速训练过程。最后，输入数据通过除以
  255 进行归一化，使得数据范围在 [0, 1] 之间，然后再传递给神经网络进行处理。


  ![](img/605748_1_En_7_Fig17_HTML.png)


  一张带有叠加帧的视频游戏图像。顶部呈现了从底部碎裂的俄罗斯方块。下半部分展示了一个向下移动的小球，朝向底部的一个小水平面。


  图 7.17 将过去 28 帧叠加在一起，为《打砖块》视频游戏构建单张图像的示例


  总之，DQN 为雅达利游戏使用的预处理步骤包括：动作重复、跳帧、帧叠加、尺寸缩小、灰度转换和归一化。这些步骤有助于减轻处理数百万帧的计算负担，并使神经网络能够从输入数据中高效学习。


  图 7.19 展示了在《打砖块》视频游戏中，使用动作重复（跳帧）为 4 后，叠加最后四帧的示例。




  我们可以对标准 Atari 游戏环境进行多种修改，以提升 `DQN` 智能体的学习进度。例如，我们可以将失去一条命视为软终止状态，这意味着我们仅将奖励作为 TD
  目标，而不通过使用后继状态的折现值进行自举。在软终止状态下，游戏环境不会重置。另一种方法是通过对每个回合的初始状态进行随机化处理，例如执行若干步无操作动作，这也能有效改善智能体的学习进度。此外，通常需要将奖励裁剪到
  `[-1, 1]` 范围内，尤其是对于那些奖励信号非常大的游戏。例如，某些游戏的奖励可能高达数百或数千，这会压倒学习过程，使智能体难以收敛到最优策略。


  ![一组游戏插图，其中 4 个游戏面板处于激活状态，其余面板处于禁用状态。](img/605748_1_En_7_Fig18_HTML.png)


  **图 7.18**  Breakout 视频游戏中动作重复 `k=4` 的示例；灰色帧表示被智能体跳过的帧


  #### 卷积神经网络


  `DQN` 智能体使用一个非常简单的卷积神经网络。它由三个卷积层组成；神经网络的输入数据是一张 `84 × 84 × 4` 的图像。第一个隐藏卷积层有 32 个滤波器，内核大小为
  `8 × 8`，步长为 4。这意味着第一个隐藏层的输出特征图将有 32 个通道。第二个隐藏卷积层有 64 个滤波器，内核大小为 `4 × 4`，步长为 2。第三个隐藏卷积层有
  64 个滤波器，内核大小为 `3 × 3`，步长为 1。我们在每个卷积层之后应用 `ReLU` 激活函数。然后，最后一个卷积层的特征图被展平并输入到一个包含 512
  个单元的全连接层；之后，我们应用 `ReLU` 激活函数。全连接层的输出随后被输入到输出层，该层有 `N` 个单元且没有激活函数。这里，`N` 是特定 Atari
  游戏的有效动作数量，根据游戏不同，其值在 4 到 18 之间变化。图 7.20 展示了该网络架构。请注意，我们仅将环境状态 `s` 作为神经网络的输入，即一张
  `84 × 84 × 4` 的图像，并输出一个向量，其中包含针对输入状态 `s` 的每个有效动作的状态-动作值。


  为什么我们不在最终输出层使用激活函数？大多数激活函数会以某种形式转换数值。但任意状态-动作对的值可以是任何实数 `(s, a) ∈ ℝ`。而且，这些不同 Atari
  游戏的最小值或最大值的限制并不相同。为了在这些游戏中复用同一个神经网络，最好不要对输出层的值进行转换。


  ![一幅插图描绘了一个视频游戏，顶部有一组方块，4 个小球在线性移动，偶尔重叠成一条线，最终掉落到底部的一条平坦表面上。](img/605748_1_En_7_Fig19_HTML.png)


  **图 7.19**  Breakout 视频游戏中，在动作重复 `k=4` 后堆叠最后四帧的示例




  #### 训练流程的其他改动


  在训练 DQN 智能体玩 Atari 游戏时，我们对训练流程进行了一些小的改动。其中一个特别的改动是，智能体从经验回放中采样小批量转换数据以执行学习步骤（我们将参数
  `θ` 的一次更新计为一个学习步骤）的频率。在算法 3 中，只要缓冲区有足够的样本，智能体就会在每个时间步采样一个小批量。然而，由于 Atari 游戏可能持续数百万步（帧），从计算效率的角度来看，每一步都进行学习可能不是一个好主意；这也可能影响智能体的性能，因为它生成更多转换数据的时间更少了，这还可能导致神经网络对已有的经验数据过拟合。因此，DQN
  智能体实际上采用了一种略有不同的学习计划：智能体每选择四个动作后，才执行一次学习步骤。这相当于每 16 帧学习一次，因为每个动作会重复执行四次。


  图 7.21 展示了 DQN 智能体在 Atari 游戏 Pong 上的性能，这是 Atari 测试平台中最简单的游戏之一。结果显示了平均回合回报（总未折扣奖励）和
  95% 的置信区间。为了评估智能体的性能，我们在一个独立的测试环境中运行了 200,000 个评估步骤，该环境使用 `ε`-贪婪策略，并在每次训练迭代（包含 250,000
  个训练步骤或 100 万帧）结束时使用固定的探索 epsilon（`ε = 0.05`）。在评估环境中，不应用奖励裁剪或生命损失时的软终止。结果取五次独立运行的平均值，并使用窗口大小为
  5 的移动平均进行平滑处理。


