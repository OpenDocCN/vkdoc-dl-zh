  Q 学习智能体存在一些潜在问题，我们需要解决这些问题才能使其成为一个强大的智能体。




  ### 7.5 具有经验回放与目标网络的深度 Q 学习


  在机器学习，特别是深度学习中，我们通常依赖独立同分布（IID）的训练数据。然而，在强化学习中，序列中连续的状态和奖励信号往往是相关的。这是因为智能体选择的动作会影响未来的状态和奖励，从而导致数据集非独立同分布。此外，朴素的深度
  Q 学习算法仅使用每个转移 `(s, a, r, s'')` 一次来更新网络参数，导致数据效率低下。


  为了解决这些问题，我们可以使用一种称为经验回放的技术。我们将最近的 *N* 个转移 `(s, a, r, s'')` 存储在一个环形缓冲区结构中，并在训练期间从缓冲区中随机采样一个小批量的转移。这使得算法能够多次重复使用相同的转移，从而提高数据效率。此外，通过从大量转移中随机采样，我们打破了连续状态和奖励之间的相关性。


  然而，使用经验回放也带来了新的挑战。由于缓冲区中的数据可能来自很久以前，自数据收集以来网络参数可能已经发生了显著变化。这可能导致在由不同行为策略生成的样本上进行训练，这对于像
  SARSA 这样的在线策略学习算法来说并不理想。因此，使用像 Q 学习这样的离线策略学习算法与经验回放相结合至关重要。


  实现经验回放很简单。我们需要为 *N* 个转移分配空间，并添加添加新转移以及从缓冲区中随机采样小批量的方法。


  **算法 2：均匀随机经验回放**


  一种算法，通过使用来自回放缓冲区的转移来更新神经网络参数，并定期更新目标网络，从而执行具有经验回放的深度 Q 网络训练。


  然而，经验回放并非改进深度 Q 学习的唯一技术。另一个关键技术是使用目标网络。目标网络是 Q 网络的一个独立副本，它会定期更新以匹配 Q 网络的参数。这样做是为了防止算法陷入反馈循环，即
  Q 网络的估计值被用来更新自身，从而导致不稳定性。通过使用一个独立的网络来计算目标值，我们可以降低目标估计的方差，并稳定学习过程。


  总之，经验回放和目标网络是用于提高深度 Q 学习性能和稳定性的两项关键技术。通过在缓冲区中存储和重用转移，并使用独立的网络计算目标值，我们可以在训练过程中实现更好的数据效率和稳定性。


  为了确保用于 Q 学习的深度神经网络训练的稳定性，可以使用一个独立的目标网络来计算 TD 目标。目标网络计算下一个状态-动作对的值，并在标准 Q 网络进行一定次数的更新后更新其参数。这有助于避免使用频繁更新的标准
  Q 网络的值作为 TD 目标所带来的问题。


  带有目标网络的深度 Q 学习的目标函数为：


  ```

  J(θ) = (r_t + γ * max_{a''} Q̂(s_{t+1}, a''; θ^-) - Q̂(s_t, a_t; θ))²

  ```


  这里，`θ` 代表标准 Q 网络的参数，`θ^-` 代表目标网络的参数。初始时，两个网络具有相同的参数。每当 `θ` 更新 *C* 次后，`θ^-` 就会被更新为
  `θ`。


  DQN 智能体是一种经过改进的深度 Q 学习算法，它结合了经验回放和目标网络。它首先用相同的参数初始化标准 Q 网络 `θ` 和目标网络 `θ^-`。同时，初始化一个容量为
  *N* 的回放缓冲区 *D*，用于存储最近的 N 个转移。


  在训练过程中，智能体使用相对于标准 Q 网络 `θ` 的 `ε`-贪心策略与环境交互。智能体不会立即计算损失并对转移数据执行随机梯度下降，而是将数据存储在回放缓冲区
  *D* 中。当缓冲区 *D* 中的样本数量达到某个阈值 *m*（其中 `m ≥ b`）时，智能体从 *D* 中采样一个小批量的转移，并使用它们计算 TD 目标和平方误差损失。然后，通过随机梯度下降优化该损失，以更新标准
  Q 网络的参数 `θ`。智能体继续使用更新后的 `θ` 与环境交互，生成更高质量的训练数据。接着，智能体从 *D* 中采样另一个小批量的转移以继续学习。每当 `θ`
  更新 *C* 次后，`θ^-` 就会被更新为 `θ`。


  尽管经验回放和目标网络都能提高 Q 学习的性能，但经验回放通常更为重要。然而，在实践中，训练深度 Q 学习模型时，这两种技术通常一起使用。


  **算法 3：[DQN] 具有经验回放和目标网络的深度 Q 学习，使用 *ε*-贪心策略进行探索**


  在情节式强化学习问题中，例如玩 Atari 游戏，终止状态代表一个情节序列的结束，之后环境会重置为初始状态。一个关键的考虑因素是如何处理可能包含一个或多个终止状态的小批量转移，因为终止状态的值始终为零。在训练期间从回放缓冲区随机采样时，有可能选到包含一个或多个终止状态的小批量。为了解决这个问题，可以采用不同的策略。


