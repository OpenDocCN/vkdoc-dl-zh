  \ 0 |\n| DP | 6.2 | 8.0 | 10.0 | 7.2 | 0 |\n\n## 4.5 本章小结\n\n本章介绍了蒙特卡洛方法，这是一种用于基于经验估计价值函数并改进策略的强化学习算法。与动态规划不同，蒙特卡洛方法无需模型，且不需要了解环境的奖励函数和动态函数。\n\
  \n本章清晰阐述了蒙特卡洛策略评估，这是一种通过平均访问状态后观测到的回报来估计状态价值的方法。本章通过具体示例说明了首次访问蒙特卡洛与每次访问蒙特卡洛之间的区别。此外，本章还介绍了增量更新技术，该技术允许在每一幕结束后高效更新价值函数。\n\
  \n本章还强调了强化学习中探索-利用困境的重要性，以及蒙特卡洛方法如何通过平衡探索新状态和动作与利用现有知识来解决这一问题。蒙特卡洛控制作为一种改进策略的方法被引入，其原理是在当前策略下估计每个状态的价值，并根据估计值更新策略使其趋于贪婪。\n\
  \n"
- "# 5. 时序差分学习\n\n在上一章（第 4 章）中，我们介绍了用于强化学习的蒙特卡洛（MC）方法，该方法使智能体无需依赖环境模型即可从自身经验中学习。然而，MC\
  \ 方法仅限于情节式强化学习问题，即智能体以离散情节的形式与环境交互。在本章中，我们将介绍时序差分（TD）学习，这是一类将 MC 方法推广到支持情节式和连续式强化学习问题的算法。TD\
  \ 学习基于这样一种思想：结合当前奖励和估计的未来奖励来更新价值估计，这使得它比 MC 方法对于许多类型的强化学习问题更加通用和高效。本章将探讨各种 TD 学习算法的理论和实现。\n\
  \n### 5.1 时序差分学习\n\n在第 4 章中，我们介绍了用于解决情节式强化学习问题的蒙特卡洛方法，该方法使智能体无需访问环境模型即可从自身经验中学习。然而，蒙特卡洛方法有两个局限性，使其不适合解决连续式强化学习问题。第一个主要问题是，它们不支持没有自然任务结束点的连续式强化学习问题；在情节式问题中，存在一个终止状态标志着情节的结束，而在连续式问题中，智能体无限期地与环境交互。第二个次要问题是，智能体必须等到一幕结束才能计算和更新估计值，因为蒙特卡洛方法要求智能体在更新估计值之前经历完整的一幕。对于像我们的服务犬\
  \ MDP 示例这样情节非常短的小型强化学习问题，这可能不是问题。但对于情节较长（可能涉及数千或数百万个时间步）的问题，这种等待会减慢学习过程。\n\n由 Sutton\
  \ 提出的时序差分（TD）学习[1, 2]是一种克服了这些局限性的无模型强化学习方法。它被称为 TD 学习，是因为智能体根据其在每个状态中预测奖励与实际接收奖励之间的差异来更新其估计值。更准确地说，智能体在从环境中接收到即时奖励`r`和后续状态`s'`（即一个由`(s,\
  \ a, r, s')`组成的元组，通常称为转移）后，立即更新特定状态`s`的估计值。这种*单步前瞻*使得智能体能够基于即时奖励和下一状态的估计值来更新其估计，而无需等待一幕结束。\n\
  \n理解 TD 学习的一种方式是，智能体根据新获得的信息持续调整其对每个状态价值的估计。这与蒙特卡洛方法形成对比，后者仅在每一幕结束时更新估计值。\n\nTD\
  \ 学习广泛应用于现实世界，并且是解决强化学习问题的核心。它是一种高效且灵活的算法，允许智能体以连续和增量的方式进行学习，使其适用于现实应用。其他无模型强化学习算法，如\
  \ Q 学习和 SARSA（我们将在本章后面介绍），都建立在这一概念之上。\n\n总而言之，TD 学习是解决强化学习问题的一种强大方法，其“单步前瞻”方法使智能体能够快速且连续地更新其估计值。\n\
  \n\n\n### 5.2 时序差分策略评估\n\n一如既往，我们遵循第 3 章介绍的一般策略迭代模板。第一步是进行策略评估，即针对给定的（固定）策略 `π`，估计其状态价值函数\
  \ `V_π`（或状态-动作价值函数 `Q_π`）。由于 TD 学习是一种无模型强化学习方法，智能体将利用遵循策略 `π` 时生成的经历来学习这些价值函数。\n\
  \n为了使用 TD 学习估计状态价值函数，我们从 `V_π(s)` 的方程入手，该方程表示从状态 `s` 出发并遵循策略 `π` 时的期望回报。蒙特卡洛方法使用折扣奖励的总和来估计整个回合序列的回报。或者，该方程可以用递归方式重写，如公式\
  \ (5.2) 所示，这为我们揭示了 TD 学习方法的工作原理。TD 学习方法使用一个 `(s, a, r, s')` 元组来更新特定状态的估计值，这正是完成公式\
  \ (5.2) 所需的。\n\n```\nV_π(s) = E_π[G_t | S_t = s]\n       = E_π[R_t + γ R_{t+1} +\
  \ γ² R_{t+2} + ... | S_t = s]\n       = E_π[R_t + γ G_{t+1} | S_t = s]\n```\n\n\
  (5.1)\n\n```\n       = E_π[R_t + γ V_π(S_{t+1}) | S_t = s]\n```\n\n(5.2)\n\n正如本章前面所介绍的，TD\
  \ 学习方法只需要一个 `(s, a, r, s')` 元组来更新状态 `s` 的价值。这正是完成公式 (5.2) 所需的。期望符号提醒我们，需要收集大量样本来计算从状态\
  \ `s` 出发并遵循策略 `π` 时的期望回报。\n\n接下来，我们需要引入增量更新方法。增量更新方法的一般形式是：\n\n```\n新估计值 = 旧估计值\
  \ + 步长 [目标值 - 旧估计值]\n```\n\n这里，“步长”代表学习率，“目标值”代表 TD 目标。为了更新状态 `s` 的价值估计，我们使用增量更新方法，其中\
  \ TD 目标为 `R_t + γ V(S_{t+1})`，它代表从当前状态出发的估计回报。TD 目标与当前估计值 `V(S_t)` 之间的差值称为 TD 误差，它也用于更新价值函数估计。TD\
  \ 学习的更新规则如公式 (5.3) 所示：\n\n```\nV_π(S_t) = V_π(S_t) + α (G_t - V_π(S_t))\n      \
  \   = V_π(S_t) + α ([R_t + γ V_π(S_{t+1})] - V_π(S_t))\n```\n\n(5.3)\n\n这里，`α` 是\
  \ TD 学习的学习率。TD 误差为 `R_t + γ V_π(S_{t+1}) - V_π(S_t)`，其中 `R_t + γ V_π(S_{t+1})` 代表状态\
  \ `S_t` 的估计回报。通过使用这个更新规则，我们可以基于观察到的即时奖励和后续状态的折扣（估计）价值，迭代地改进对状态价值的估计。\n\n在 TD 学习中，智能体不会记录状态的总访问次数，因此我们不能使用\
  \ `1/N(S_t)` 作为步长。相反，我们需要手动设置步长 `α` 的值。`α` 的选择会对学习性能和稳定性产生显著影响，并且有多种启发式方法和策略来适当地设置它。\n\
  \n现在我们有了更新规则的公式，可以介绍用于策略评估的 TD 学习算法，如算法 1 所示。有时人们也将其称为 TD(0) 策略评估算法，因为它使用即时奖励和后续状态的折扣价值来估计价值，而不需要向未来额外步进。其总体思路类似于蒙特卡洛策略评估，即智能体在遵循策略\
  \ `π` 的同时收集一个样本转移。然而，这里我们只需要一个 `(s, a, r, s')` 元组，而不是完整的回合序列。这就是 TD 方法也适用于持续强化学习问题的原因。\n\
  \n在蒙特卡洛方法中，我们根据智能体需要完成的样本回合数来运行算法。但 TD 学习也可以应用于无法衡量回合数的持续强化学习问题。一个简单的解决方案是统计运行的总时间步数（或环境步数）。通常，对于回合制环境，这个方案也比单纯统计回合数更好，因为每个回合的总步数可能不同。\n\
  \n**算法 1：针对 `V_π` 的时序差分 [TD(0)] 策略评估**\n\n一个用于时序差分 TD(0) 和 `V_π` 策略评估的 9 行算法，接收以下输入，并输出针对输入策略\
  \ `π` 的估计状态价值函数 `V_π`：待评估的策略 `π`、折扣率 `γ`、步长 `α` 以及步数 `K`。\n\n![服务犬 MDP 的流程图，流程经过房间\
  \ 1、2 和 3 以到达找到的物品。房间 3 返回房间 2，房间 2 返回房间 1。房间 2 通过 r = 0 指向室外，室外通过 r = 0 返回房间 2。室外通过\
  \ r = -1 返回自身。](img/605748_1_En_5_Fig1_HTML.png)\n\n**图 5.1** 服务犬 MDP\n\n\n\n####\
  \ 工作示例\n\n为了更好地理解时序差分策略评估算法的工作原理，让我们通过一个示例来观察，该示例使用了我们在第 2 章中介绍的服务犬 MDP。回顾图 5.1\
  \ 中所示的服务犬 MDP 示意图。\n\n假设智能体遵循一个（固定的）随机策略`π`，在本实验中我们使用步长`α = 0.01`且无折扣（`γ = 1.0`）。我们从所有状态的初始估计值为\
  \ 0 开始。由于 TD 是一种无模型强化学习方法，智能体事先既不知道执行任何动作时会收到何种奖励信号，也不知道后续状态。我们想观察算法如何更新不同状态的估计值。\n\
  \n假设我们正在观察第一个回合的第一个时间步`t = 0`，此时环境的当前状态为`S_t = 房间 2`，智能体根据策略`π`选择了动作`A_t = 前往房间\
  \ 3`。它从环境中获得即时奖励`R_t = -1`和后续状态`S_{t+1} = 房间 3`。现在我们有了元组`(S_t, A_t, R_t, S_{t+1})`，这正是更新状态`S_t\
  \ = 房间 2`的估计值所需的信息。更新过程如下：\n\n```\nVπ(房间 2) = Vπ(房间 2) + α [ R_t + γ Vπ(房间 3) -\
  \ Vπ(房间 2) ]\n           = 0 + 0.01 * (-1 + 0 - 0)\n           = -0.01\n```\n\n\
  更新后，智能体继续按照策略`π`在环境中行动。环境的当前状态变为`S_t = 房间 3`，智能体根据策略`π`选择了动作`A_t = 搜索`，并获得即时奖励`R_t\
  \ = 10`。后续状态`S_{t+1} = 找到物品`也是一个终止状态，因此当前回合结束。现在我们有了元组`(S_t, A_t, R_t, S_{t+1})`来更新状态`S_t\
  \ = 房间 3`的估计值。更新过程如下：\n\n```\nVπ(房间 3) = Vπ(房间 3) + α [ R_t + γ Vπ(找到物品) - Vπ(房间\
  \ 3) ]\n           = 0 + 0.01 * (10 + 0 - 0)\n           = 0.1\n```\n\n在新的回合中，如果智能体再次处于环境状态`S_t\
  \ = 房间 2`，并根据策略`π`选择了动作`A_t = 前往房间 3`，它会从环境中获得即时奖励`R_t`和后续状态`S_{t+1} = 房间 3`。我们可以如下更新`Vπ(房间\
  \ 2)`的估计值：\n\n```\nVπ(房间 2) = Vπ(房间 2) + α [ R_t + γ Vπ(房间 3) - Vπ(房间 2) ]\n   \
  \        = -0.01 + 0.01 * [ -1 + 0.1 - (-0.01) ]\n           = -0.019\n```\n\n我们可以反复重复这个过程。表\
  \ 5.1 展示了在运行不同更新次数的 TD(0)策略评估算法后，随机策略的状态值。结果是在 100 次独立运行中取平均值得到的，同时我们还列出了使用 DP 策略评估计算出的真实状态值（最后一行）。经过\
  \ 10,000 次更新后，估计的状态值已非常接近真实状态值。\n\n这些结果的关键启示是：TD(0)算法可以在不了解 MDP 转移概率和奖励函数的情况下，为某个策略学习到准确的状态值估计。然而，当状态数量较多时，其估计值的收敛速度比\
  \ DP 策略评估要慢。尽管如此，TD(0)仍是无模型强化学习中的一项重要算法，并且能够处理连续的状态和动作空间，这使得它在许多实际应用中非常有用。\n\n**表\
  \ 5.1** 服务犬 MDP 中相同随机策略的状态值，在运行不同更新次数的 TD(0)策略评估算法后得到。结果是在 100 次独立运行中取平均值；本实验中使用折扣`γ\
  \ = 0.9`和步长`α = 0.01`。最后一行包含使用 DP 策略迭代计算出的真实状态值。\n\n\n\n| 更新次数 | 房间 1 | 房间 2 | 房间\
