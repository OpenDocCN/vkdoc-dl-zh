  分类与回归树 |


  高泛化能力会导致过拟合或欠拟合。如果模型在训练数据集上的表现优于在未见过的测试集上的表现，那么该模型很可能存在过拟合。交叉验证是一种用于衡量过拟合程度的技术。此外，使用更多数据进行训练可能有助于算法更好地推断假设。


  欠拟合很容易检测，因为其性能会很差。偏差衡量的是模型因从错误数据中学习而产生的误差。偏差衡量的是这些模型的预测值与实际正确值或真实信号之间的总体偏离程度。增加模型复杂度以确定微妙的信号可以减少偏差，但会引入方差，方差决定了模型预测值围绕某个数据点的变异性。确保模型泛化能力是在偏差和方差之间进行权衡（图
  4-2）。在任何可能的情况下，保持简单比过度设计、构建复杂且昂贵的、难以解释和传播的机器学习模型要好。


