- '# 6. 精准医疗的未来


  数字健康技术和人工智能已经在创造智能化的流程和工作流，使医疗服务的提供更便宜、更有效、更个性化、更公平。然而，精准健康的目标远不止于此，它旨在通过更深入地理解人类状况和体验来改善患者管理和诊断。大部分重点一直放在基于对疾病病理学更深入的理解来开发更好的药物这一潜力上。如今，数据和技术既容易获得又价格低廉，诊断和支持方面的改进使得更好的患者管理成为可能。数据的数量和复杂性反映了患者的基因、环境和生活方式。


  大数据和人工智能技术为识别新的病症和预后指标、提供精准的行为改变支持、康复治疗，或识别出对特定治疗反应更佳的患者提供了巨大潜力。但这并非没有挑战。


  我们对患者的了解越详细，对信息管理、问责制和透明度的要求就越高。在我们发展关于提供个性化护理的更深刻知识的同时，我们如何利用这些知识来减少未来疾病的发生，并缓解随之而来的技术、临床和伦理问题？精准医学是否应该优先考虑预防而非治疗（而治疗是当前医学的主要焦点）？如果某种疾病尚无治疗方法或治愈手段，你是否想知道自己存在患病风险？在处理那些预测未来未知规模和重要性的技术时，有许多问题需要考虑。本章指出了追求精准健康过程中的重要主题，并提出了潜在的影响和后果。


  ## 从出生到死亡的精准护理


  低成本的基因检测提供了人类基因图谱，临床医生可以利用它来了解个体的健康状况和疾病易感性。靶向下一代测序技术能够快速识别常见和罕见的基因变异。检测导致药物疗效或不良反应的变异，对于实施个体化药物治疗和提供支持至关重要。生活方式支持将不再作为一种干预措施来提供，而是从出生起就通过数字疗法与处方药理学干预措施一同提供，未来这些干预措施还将得到纳米技术的支持，以提供治疗、支持和补充身体所需。在自动化技术的支持下，临床医生将实时分析健康状况和疾病风险。随着每个人都能更多地获取关于自身的更丰富、实时、精细的数据，他们将更了解自己，并且如果这些信息被公开，他们也将更了解社区中的其他人。可以预见的是，有了人群层面的基因、生活方式和行为数据，人工智能不仅可能预测健康不佳和疾病，还可能近似地预测出确切的死亡时间。图
  6-1 展示了精准医疗工具的输入和输出。


  ![](img/535410_1_En_6_Fig1_HTML.jpg)


  一个框图展示了精准医疗工具，它是一个中心模块，周围环绕着输入和输出。输入包括基因组学、人口统计学、偏好、生理学、行为、环境等。输出包括疾病易感性、诊断、预后和治疗反应。


