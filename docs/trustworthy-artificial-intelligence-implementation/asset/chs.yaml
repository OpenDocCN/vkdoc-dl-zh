- '# 4. 精准健康中的人工智能与机器学习


  人工智能指非人类主体展现出的任何认知能力。其五大基本要素为：学习、推理、问题解决、感知和语言理解。在执行学习、视觉和逻辑推理等任务时，人工智能已超越人类能力。^(⁴⁸)
  机器学习是人工智能的一个子集，通过训练计算机模型随时间推移从自身行为和环境中学习以进行改进。算法会适应新数据和发现的呈现，并通过机器学习在无需显式编程的情况下，迭代式地提升任务表现。机器学习是一种能够在最少人工干预下自主适应的人工智能。


  深度学习是机器学习的子集，它利用人工神经网络模拟人脑的学习过程。由于在学习数据时会向深度学习函数中添加额外层级，该过程被称为*深度学习*。函数中的层级被称为*神经元*。当深度学习模型学习时，它只是通过优化函数来修改权重（即神经元）。图
  4-1 展示了人工智能的组件分析。


  ![](img/535410_1_En_4_Fig1_HTML.png)


  一个树状图对人工智能的组件进行了分类。它从右向左分支为机器学习、自然语言处理、专家系统、语音、视觉、规划和机器人技术。进一步，它又细分为深度学习、无监督学习和监督学习、文本生成、问答、上下文提取、分类、机器翻译、语音转文本以及文本转语音。


  **图 4-1** 人工智能的组件


  自然语言处理（NLP）是系统分析、理解和生成人类语言（包括语音和文本）的能力。自然语言理解之所以困难，是因为人类语言天生具有歧义性——语言、发音、表达和感知皆是如此。为了分析和理解自然语言，句子的语法结构和词语的含义会被分解成片段，以便在上下文中进行研究和理解。NLP
  将人工智能与计算语言学和计算机科学相结合。


  整合人工智能方法（如机器学习、深度学习）和技术（如 NLP），以应对数据可扩展性和高维度的挑战，并将其转化为可操作的知识，正成为精准医学的基础。智能手机和可穿戴设备等基于传感器的技术的普及，开启了一个健康人工智能的新时代，能够根据生命体征、环境和行为做出实时决策。然而，人工智能的优势仍需应对技术、法律和伦理方面的挑战，以确保利益相关者能够实现精准健康生态系统。


  科学中的假设生成方法，最好被视为一种从数据模式中识别和推断意义的补充手段，而不仅仅是简单延续以往的做法。越来越多的 AI 方法允许直接从数据中学习这些模式或趋势，而非由研究人员基于先验知识预先指定。


  ## 人工智能的三种类型


  任何人工智能应用都归属于三种智能类型之一，分类依据是其对人类特征的复制程度、实现技术、应用场景以及心智理论。


  ### 弱人工智能


  迄今为止，人类成功实现的唯一人工智能是弱人工智能（ANI），也称为弱 AI 或窄 AI。窄 AI 擅长执行单一任务，例如语音识别、垃圾邮件过滤、自动驾驶汽车、电影推荐以及支持面部识别的软件。使用窄
  AI 算法可以在几秒钟内处理大量数据，且不会累积疲劳。


  窄 AI 有两种类型：反应型和有限记忆型。反应型 AI 没有存储能力，模拟人脑无需先前经验即可对刺激做出反应的能力。相比之下，大多数 AI 解决方案使用有限记忆型
  AI，它具备数据存储和学习能力，使机器能够利用初步数据为未来的决策提供信息。例如，深度学习会根据先前存储的数据来定制未来的经验。


  ### 通用人工智能


  通用人工智能（AGI）或强人工智能，是指一种具有通用智能的类人主体，能够学习并运用其知识和经验来解决问题。这种形式的人工智能在行为、思维和理解方式上与人类行为难以区分。强人工智能围绕心智理论
  AI 框架展开，该框架详细阐述了辨别其他智能实体的需求、情感、信念和思维过程的能力。心智理论 AI 并非关于复制或模拟，而是关于教会机器真正理解人类。目前尚无显著的强人工智能实例。


  ### 超级人工智能


  超级人工智能（ASI）目前是一个理论概念，它超越了模仿人类智能和行为的范畴。当主体具有自我意识，并超越人类能力和智能的极限时，便达到了这一阶段。这是否不可避免，通常是一个伦理和道德问题，而非技术问题。


  ## 机器学习简介


  机器学习体现了数据挖掘的原理，但也能推断相关性并从中学习，以应用于新的算法。


  无论人工智能的类型如何，其目标都是模仿人类通过经验学习的能力，并在无需或仅需极少外部辅助的情况下完成指定任务。机器学习任务可以是*监督学习*（基于示例输入开发模型）、*无监督学习*（模型从输入中自行确定结构）以及*半监督学习*（前两者的结合）。




  ### 机器学习框架


  无论采用何种方法，一旦问题被界定，典型的人工智能或机器学习工作流程通常包含以下步骤：


  -   *数据准备*：包括数据探索、分析、洞察与清洗

  -   *训练*：选择学习方法，应用这些方法创建模型，并尝试优化所创建的模型

  -   *测试*：对方法和结果进行客观评估

  -   *传播*：向利益相关者报告评估结果，并确保可解释性

  -   *部署*：发布训练好的机器学习模型，监控其持续使用情况和准确性


  训练阶段涉及通过调整改变算法行为的关键参数（即调参）来最大化算法性能。参数是模型使用的变量，模型可以从数据集中估算其值。参数的数量和类型是任何算法的关键方面。虽然没有什么数据能比得上更多数据，但如果数据是垃圾，那最终也毫无用处——此外，训练模型所需的时间和资源都会随着参数维度的增加而增加。如果基于少量参数进行训练，模型可能会遗漏微妙的趋势和模式；而大量数据则可能使算法难以识别有价值的模式。


  测试阶段随后通过参数的性能来评估调参效果，以确保模型具有泛化能力，这是所有算法的目标。从数学角度理解，这可以看作是试图在训练数据和测试数据上最小化成本函数，从而使模型能够自信地执行，并部署到现实世界中。


  表 4-1 列出了一些学习方法与算法的示例。


  **表 4-1** 学习方法与算法示例


  | 监督学习 | 无监督学习 | 自然语言处理 |

  | --- | --- | --- |

  | • 支持向量机<br>• 朴素贝叶斯<br>• 高斯贝叶斯<br>• K-近邻算法<br>• 逻辑回归 | • Apriori 算法<br>• FP-growth（频繁模式增长）<br>•
