  \ 5%到 10%的人。\n\n通过手机、社交媒体、数字社区、健康应用、营养追踪、可穿戴设备和健康物联网，人类体验的数据化使患者能够成为自己的证据基础，并影响医疗保健学术界和认知。\n\
  \n疫情促使医疗服务提供者转向数字工具和可扩展技术。据观察，医疗服务提供者对创新的接受阈值各不相同，可以归类为典型的五种创新者原型。然而，确定新解决方案的合法性和安全性对最终用户（无论是患者还是临床医生）来说是一个重大障碍。同样，创新者需要证明其益处并符合标准。不明确的最终用户期望、不断变化的证据要求以及不断变化的监管环境，仅仅是精准健康生态系统面临的挑战中的一小部分。\n\
  \n每个案例研究的目的是展示智能精准健康系统在现实世界中的创新示范，并展示个性化、定制化护理的力量和影响。\n\n以下案例研究突出了基本原则和最佳实践：\n\n\
  *   “通过数字工具为住院患者提供专科多学科体重管理”\n*   “了解人们对数据的看法，以优化针对长期健康问题患者的专科足病服务”\n*   “针对 2 型糖尿病和糖尿病前期自我管理的数字干预措施评估”\n\
  *   “基于语音的症状监测和基于人工智能的康复治疗用于长新冠患者”\n*   “通过基于家庭的行为改变支持，帮助儿童和年轻人过上更健康的生活”\n\n## 通过数字工具为住院患者提供专科多学科体重管理\n\
  \n*以下案例研究展示了一个在医院内使用的精准健康工具示例，该工具用于提供多学科专科体重管理、远程监测和双向沟通，以促进一个积极参与、协作的患者中心生态系统。*\n\
  \n在英国，27%的男性和 30%的女性患有肥胖症^(⁷⁸)，他们患 2 型糖尿病（`T2D`）、心理健康问题、特定恶性肿瘤等慢性疾病的风险更高，预期寿命也更短。^(⁷⁹)\
  \ 此外，肥胖症患者因 COVID-19 住院和出现不良后果（包括死亡）的风险更大。^(⁸⁰) 仅在英国，2014 年肥胖管理的预估医疗成本为 61 亿英镑（85\
  \ 亿美元），预计到 2050 年将达到 97 亿英镑（135 亿美元），而每年对社会的更广泛成本估计为 499 亿英镑（692 亿美元）。^(⁸¹)\n\n\
  在英国的国民健康服务体系（`NHS`）内，一个分层框架构成了肥胖管理的金字塔结构基础，其中逐渐受限的资源和患者数量是向上层进展的典型特征。初级保健环境（第一层）中的肥胖管理包括促进健康生活方式、教育和预防策略。社区服务（第二层）通常包括饮食建议和优化的体育活动。对于更严重肥胖（`BMI\
  \ > 40 kg/m2` 或 `BMI > 35 kg/m2` 且伴有肥胖相关合并症）的患者，有医院肥胖管理（第三层），通常由一个多学科团队组成，包括专科营养师、医务人员和心理支持。减重手术（第四层）位于该结构的顶端，因此代表了一种受限的资源（尽管它是肥胖症的极佳治疗选择），仅适用于极少数可能符合手术条件的肥胖人群。^(⁸²)\n\
  \n医院肥胖管理（第三层和第四层）是受限的，因此不代表一种可扩展到人群水平的模式。^(⁸³) 此外，近年来对包括转诊在内的肥胖服务的需求有所增加。我们以英国考文垂和华威大学医院（`UHCW`）自身的医院第三层和第四层肥胖服务为例来说明这一点，在\
  \ 2014 年（207 例新转诊）到 2019 年（1319 例新转诊）的 5 年期间，转诊数量增加了六倍多，目前有超过 1800 名患者在使用我们的肥胖服务。尽管新转诊数量激增，但这个数字可能比当地有资格转诊到我们服务的成年人数量低一个数量级，据估计，目前居住在考文垂和华威地区、`BMI`大于`40\
  \ kg/m2`的男性和女性比例分别为 2%和 4%。^(⁸⁴,) ^(⁸⁵,) ^(⁸⁶) 因此，英国绝大多数患有严重肥胖症的人存在巨大的未满足需求，而`NHS`肥胖管理框架内当前的医院第三层和第四层服务根本无法满足这些需求。此外，在初级、社区和二级医疗环境中的各个肥胖管理层级之间，患者的诊疗路径常常是脱节的。不幸的是，COVID-19\
  \ 疫情阻碍了所有层级肥胖管理的有效实施，涉及多种因素，包括人员重新部署、临床区域功能改造、择期手术限制、封锁措施、远程预约以及患者对前往医疗机构就诊的恐惧等。\n\
  \n数字工具有着变革体重管理服务的巨大潜力。尽管各种数字和移动设备应用在医院第三层和第四层肥胖管理环境中具有潜在效用，但迄今为止，这种创新尚未发生。有新的证据表明数字工具在肥胖管理中的有效性。当前证据显示，数字健康干预措施在专科减重方面初显成效，然而，数字工具的采用率低和参与度不高仍然是数字健康干预措施面临的常见挑战。^(⁸⁷)\n\
  \n\n\n### 目标\n\n本研究旨在评估`Low Carb Program`应用程序在基于医院（三级）肥胖专科服务中用于减重的可行性和有效性。鉴于 COVID-19\
  \ 疫情对我们肥胖专科服务的干扰，我们还比较了在电话远程患者咨询背景下使用`Low Carb Program`应用程序的临床结果，与疫情前传统标准护理模式进行了对比。\n\
  \n### 方法\n\n2020 年 1 月至 2020 年 9 月期间，所有转诊至英国 UHCW 医院（三级）肥胖专科服务的新患者在初次医疗咨询时均获得了`Low\
  \ Carb Program`应用程序的使用权限。初次接触由医生完成。医生向患者介绍该应用程序，有意使用者会收到下载说明。我们招募了有兴趣使用该应用程序的患者，并向每人提供一个唯一代码，以便从\
  \ NHS 应用商店下载后免费激活。唯一的排除标准是无法理解英语。对照组数据来自一项评估团体教育课程的既往研究，参与者于 2016 年至 2019 年间接受该服务。对照组的随访时长为\
  \ 6 个月。\n\n在整个研究期间，每位招募的参与者均作为常规护理的一部分，持续接受我院（三级）肥胖管理团队成员的临床指导和随访。尽管本研究在 COVID-19\
  \ 疫情前（2020 年 1 月）构思并启动，但研究的大部分时间与 COVID-19 疫情高度重叠（研究期 7 个月中有 5 个月，即 2020 年 3 月至\
  \ 9 月）。因此，自 2020 年 3 月起，三级体重管理服务中再无患者获得专业饮食指导。患者的临床随访时间各不相同，但大多数患者在预约后 6 个月接受了医生的电话复诊。然而，`Low\
  \ Carb Program`应用程序通过每周一邀请参加虚拟聚会来支持每位参与者，为英国\"封锁\"期间的用户提供与其他用户社交联系的机会。我们通过教练引导的视频会议进行虚拟聚会，为分享个人经验和建立同伴支持网络提供了非正式空间。\n\
  \n### 个性化如何体现？\n\n出于本研究目的，我们使用了`Low Carb Program`应用程序的精简版本，专门针对社区中的肥胖人群进行个性化设置。个性化示例如下：\n\
  \n- 患者 A 是一位 60 岁的南亚裔女性，被诊断为病态肥胖并伴有合并症。患者 A 的母语是印地语，且为素食者。注册该计划时，患者 A 的注册数据使其应用程序体验个性化。患者\
  \ A 会看到结构化的教育内容，解释肥胖及合并症的生理机制，以及如何自我管理健康体重。患者 A 的体验以印地语提供，传递符合文化需求和期望的信息。患者 A 获得以旁遮普语提供的素食餐计划支持，食材符合文化期望。如果患者\
  \ A 选择使用该应用程序的此功能，她参与的虚拟聚会将由一位讲印地语的教练主持。\n\n- 患者 B 是一位 52 岁的白种人男性，被诊断为肥胖和糖尿病前期。患者\
  \ B 的母语是英语，吸烟，饮食标准，且对乳制品过敏。注册该计划时，患者 B 的注册数据使其应用程序体验个性化。患者 B 会看到结构化的教育内容，解释糖尿病前期的生理机制以及如何自我管理糖尿病前期。患者\
  \ B 的体验以英语提供。患者 B 获得排除乳制品并以英语提供的餐计划支持。如果患者 B 选择使用该应用程序的此功能，他参与的虚拟聚会将由一位讲英语的教练主持。\n\
  \n### 结果\n\n参与者的平均基线体重为 130.2（标准差 29.2）公斤，平均年龄为 48.8（标准差 12.7）岁，平均`HbA1c`为 48.0（标准差\
  \ 15.5）mmol/mol。大多数参与者（n=62，59%）为女性。少数参与者（n=38，36.9%）患有糖尿病（1 型糖尿病：n=5；2 型糖尿病：n=33）。应用程序用户的基线表型在基线体重、糖尿病患者比例和基线`HbA1c`方面与回顾性对照组大致相似，但在年龄和性别方面存在显著差异。\n\
  \n在招募的参与者（n=105）中，所有人都注册了`Low Carb Program`应用程序。总体而言，105 名参与者中有 90 人（86%）完成了`Low\
  \ Carb Program`应用程序的注册流程并参与了该计划。共有 88 名参与者（84%）在过去 30 天内积极使用`Low Carb Program`应用程序。只有少数参与者（19/105，18%）完成了整个`Low\
  \ Carb Program`应用程序计划（定义为完成 12 个可用教育模块中的 9 个或以上）。105 名招募参与者中共有 58 人（55%）自我报告了`Low\
  \ Carb Program`应用程序的结果。在未自我报告结果的 47 名参与者中，有 29 人（62%）在随访评估时仍在积极使用`Low Carb Program`应用程序。从基线（注册）到随访自我报告`HbA1c`和体重的平均间隔时间为\
  \ 5 个月。所有参与者中有一半使用`Low Carb Program`应用程序的时间在 3 到 7 个月之间（范围 1-12 个月）。接受`Low Carb\
  \ Program`应用程序的招募参与者的平均临床随访时长为 7.4 个月。\n\n来自 48 名`Low Carb Program`应用程序用户的体重数据和\
  \ 41 名用户的`HbA1c`数据提供了配对数据。配对样本检验分析显示，平均体重显著下降 2.7 公斤（P=.001），`HbA1c`改善 3.3 mmol/mol（P=.01）。整个队列的平均体重下降百分比为\
  \ 2.5%，其中 48 名患者中有 10 人（占样本的 20.8%）实现了超过 5%的体重下降，48 名患者中有 18 人（占样本的 23%）实现了至少 3%的体重下降。\n\
  \n`Low Carb Program`应用程序用户组与 COVID-19 疫情前回顾性对照组（常规临床护理）的数据比较显示，两组在体重下降和`HbA1c`变化方面相似。对照组的平均体重下降百分比为\
  \ 0.88%，92 名患者中有 15 人（16.3%）实现了超过 5%的体重下降。这与统计检验结果一致，表明应用程序组与回顾性对照组之间的体重下降无统计学显著差异。\n\
  \n\n\n### 讨论\n\n我们的数据证实，通过`Low Carb Program`应用程序提供数字化支持的远程肥胖管理，与疫情前时代实施的传统的院内面对面肥胖管理，在减轻体重方面效果相当。这是一个新颖的见解，对于未来医院肥胖服务的提供和混合数字化具有重要启示。我们的数据证实了近期一项关于移动应用程序干预的荟萃分析，该分析显示体重减轻和血糖控制改善的效果相似。^(⁸⁸)\
  \ 本研究的临床意义在于数字工具对减重的影响，以及将其纳入 NHS 肥胖管理路径的必要性。当体重减轻 3%或更多时，可观察到血糖水平和血脂异常的显著改善。^(⁸⁹,)\
  \ ^(⁹⁰) 在我们的队列中，23%（18/48）的患者体重减轻超过 3%，这将转化为血糖以及血脂异常的临床显著改善。此外，我们不应低估任何减重对体重困扰者情绪和心理状态的积极作用。这能产生巨大的激励效果，而且这种减重是“自我诱导”的，没有任何营养师的主动介入，这意味着它也可能提升自尊和自信，进而有助于鼓励随着时间的推移进一步减重。\n\
  \n需要强调的是，我们研究的偶然性，其构思和启动是在新冠疫情登上世界舞台之前。尽管最初设计是作为传统标准的院内多学科肥胖管理的补充手段，但由于新冠疫情的阻碍，`Low\
  \ Carb Program`应用程序反而补充了由缩减团队（缺乏专门的营养支持）通过电话进行的远程肥胖管理。因此，我们研究的执行，是出于适应和调整临床实践以应对全球大流行的需要，同时结合了一个未涉及新冠疫情的研究设计。事后看来，`Low\
  \ Carb Program`应用程序似乎更适合补充远程护理模式，而非传统的（疫情前）标准护理模式。此外，在新冠疫情期间，由于 UHCW 的人员重新部署，我们的患者均未获得任何营养支持。因此，我们不能将使用`Low\
  \ Carb Program`应用程序和远程管理所观察到的体重和`HbA1c`变化归因于任何营养干预。相反，这些临床结果源于远程医疗和心理支持，以及患者对`Low\
  \ Carb Program`应用程序的参与（包括学习知识、生活方式行为及饮食改变）。\n\n`Low Carb Program`应用程序的注册率很高，所有参与者均完成注册（105/105，100%），随访时的参与率也很高（88/105，83.8%）。总体而言，105\
  \ 名参与者中有 15 人（14.3%）未完成注册流程，105 人中有 47 人（44.8%）在激活注册后未报告结果。然而，这组中的大部分人（29/47，61.7%）在随访时仍在积极使用该应用程序。这些结果表明，该干预措施需要进行调整，以充分吸引确诊肥胖的患者参与，并且应用程序的其他功能可能比健康追踪更具吸引力。\n\
  \n我们的研究存在若干局限性。由于本研究的观察性质及其作为临床创新的设计，我们没有进行随机化，也没有纳入对照组（安慰剂）来与那些使用`Low Carb Program`应用程序并结合远程肥胖管理的参与者进行直接比较。尽管这种组合的临床益处可能完全源于与肥胖团队成员的远程互动，但考虑到明显缺乏来自专业营养师的针对性支持，这种情况似乎不太可能。更可能的情况是，参与`Low\
  \ Carb Program`应用程序有助于补充远程管理，帮助患者实现临床结果。此外，虽然我们没有纳入对照组，但我们确实与一组在疫情前接受传统标准护理的患者进行了回顾性比较。由于本研究评估的是应用程序的可行性，我们没有收集关于药物变化的信息，未来的研究应捕捉这些信息。考虑到`SGLT2`抑制剂和`GLP1`类似物对体重的影响，降糖治疗的变化可能是一个混杂因素。此外，并非所有参与者都能获得`BMI`数据，因此我们未将其纳入这项初步研究。\n\
  \n### 结论\n\n我们的评估为在医院（三级）肥胖服务中实现数字化专科肥胖管理提供了首个概念验证。我们证明了这种方法在减轻体重和改善血糖控制方面的临床有效性。未来的研究应探索如何使该应用程序适应临床肥胖环境中的患者群体，以提高用户参与度和长期效果。最终，该应用程序代表了一种在人群层面既具有可及性又具有可扩展性的管理选择。从预防的角度来看，`Low\
  \ Carb Program`应用程序对普通人群具有相关性，无论其肥胖状况如何。\n\n健康的生活方式对我们所有人都很重要。毕竟，一分预防胜过十分治疗。\n\n\
  ### 基于我们的证据进行拓展\n\n由于医院肥胖服务与数字治疗提供者之间的初步合作取得了成功，更广泛的团队共同开发了`W8Buddy`，这是首个专门为 NHS\
  \ 三级体重管理服务开发的数字支持工具。\n\n`W8Buddy`提供精准的三级体重管理服务（T3WMS），通过实时远程监控能力，支持患者实现其自行选择的健康目标和具有临床意义的减重。\n\
  \n该服务由考文垂和华威大学医院（UHCW）的整个专科体重管理（肥胖）多学科团队（由 NIHR 糖尿病与内分泌学临床讲师 Petra Hanson 博士领导的体重管理营养师、心理学家和医生，MBChB,\
  \ BSc, MRCP, FHEA, PhD）、NHS 肥胖临床服务中患者的反馈，以及 NHS 信赖的数字技术提供商 DDM Health 共同开发。\n\n\
  该平台提供的功能包括结构化教育、辅导、社区、健康和目标追踪、膳食和食物记录（包括拍摄食物照片）、食谱、根据健身水平定制的按需活动课程，以及实时远程家庭监测。`Gro\
  \ Health`干预措施可通过网页（响应式）、智能手机应用程序（iOS/Android）和智能助手/电视访问，并配有离线包以支持数字弱势用户。\n\n视障用户可获得完全符合\
  \ WCAG 2.1 标准的支持，兼容所有屏幕阅读器/视觉应用阅读器、更大/更粗的字体、纯音频内容、主题编辑（深色模式）以减少眼睛疲劳、语音激活的 Alexa/Google\
  \ 应用，以及将应用投屏到电视的功能。听障用户可获得带字幕/手语翻译的视频、离线学习材料以及配有翻译的辅导。\n\n该平台已部署在 T3WMS 中。\n\n此外，该平台正被用于医院内的其他护理领域，包括心脏康复、癌症护理和\
  \ 1 型糖尿病。\n\n\n\n## 了解人们对数据的看法，以优化针对长期健康问题患者的专科足病服务\n\n*以下案例研究提供了一个最佳实践范例，展示了如何大规模倾听受众意见，以了解他们对预期技术及其影响的态度、偏好和数字画像。*\n\
  \n目前，英格兰有超过 77,000 名糖尿病患者患有足部溃疡。^(⁹¹) 溃疡持续时间越长，愈合所需时间就越长。如果不加治疗，溃疡可能导致糖尿病足病（DFD）和截肢。英格兰每天有\
  \ 25 人接受下肢（脚趾/脚/腿）截肢手术；可悲的是，其中 85%的截肢是可以预防的。从 2015 年到 2018 年，英格兰发生了 27,465 例与糖尿病相关的下肢截肢（比\
  \ 2011-2014 年增加了 18.3%），记录了 147,067 例因糖尿病足病住院的病例，平均住院时间为 8 天，总计占用 1,826,734 个住院床位日，每天花费\
  \ 376 英镑。^(⁹²)\n\n足部检查是识别和评估潜在问题并采取预防措施的机会。`NICE NG19`指出，糖尿病患者应每年接受足部检查，并建议有活动性足部问题的患者在一个工作日内转诊至多学科团队/足部保护服务，并在另一个工作日内完成分诊。^(⁹³)\
  \ 然而，由于以下原因，存在“患者对症状认识不足、医疗评估不准确以及难以获得专科服务”的问题：\n\n*   *检查延迟*：国家糖尿病足部审计发现，39%的患者等待了\
  \ 14 天或更长时间才接受首次足部溃疡专科检查。\n*   *缺乏检查*：英格兰有 80 万名患者没有接受年度足部检查，80%进行足部检查的执业护士对自己执行检查的能力缺乏信心，导致护理和结果存在差异。\n\
  *   *培训*：英格兰 33%的 NHS 专员不为医疗保健提供者提供足部护理培训，即使提供了培训，评估质量也有待提高。\n\n迫切需要支持来减轻糖尿病足病的临床和经济影响，同时数字健康创新也提供了巨大机遇，可以通过以下方式使护理和结果民主化：\n\
  \n*   缩短检查时间，从而减少未经治疗的溃疡/糖尿病足病\n*   进行/支持足部检查本身，以支持临床决策\n*   在年度检查之间为医疗保健专业人员和患者提供培训/教育、资源和治疗\n\
  \n此外，还能实现显著的经济效益：因溃疡减少而降低 30%的住院天数，每年可为 NHS 节省 6350 万英镑。这还是在新冠疫情之前的情况，疫情导致紧急足部健康问题增加，面对面就诊量下降，并影响了临床医生的心理健康。智能手机为扩展护理提供了重要机会。然而，支持溃疡和足部护理的应用程序非常少。\n\
  \n除了技术本身，它们产生的数据也很有用。虽然一些国家为抗击冠状病毒而实施的非常措施在限制病毒传播方面可能有效，但有些措施在数据隐私和其他基本权利方面引发了争议，尤其是在缺乏透明度和公众咨询的情况下。令人惊讶的是，关于共享临床试验或公共卫生研究数据的证据有限，而这却是许多数字系统的支柱。\n\
  \n`FootChecker` 是一个面向医疗保健专业人员和患者的多平台应用程序，旨在通过标准化临床医生的信心和能力，并为患者提供基于风险分层的教育，以进行评估、建议和早期干预，从而减少足部溃疡、截肢、恢复时间及相关成本。\n\
  \n### 目标\n\n我们的研究旨在了解患有长期健康问题的英国人对数据隐私与安全、数据伦理和数据滥用等主题的看法。了解患有 2 型糖尿病和高血压等长期健康问题的人的担忧至关重要，因为这些疾病是溃疡发展和预后的关键风险因素。这一点在疫情期间变得更加复杂，因为\
  \ 2 型糖尿病和高血压也是 COVID-19 发病率和死亡率的危险因素。\n\n### 方法\n\n我们进行了一项基于网络的调查研究，采用混合方法设计，符合电子互联网调查结果报告的检查清单。我们对加入`Diabetes.co.uk`社区的\
  \ 18 岁及以上人群进行了调查。我们向 11,213 名同意被联系以参与研究机会的人发送了包含研究网络链接的电子邮件邀请。\n\n调查以一个筛选问题开始：“您是否同意参与本研究？”同意的受访者继续完成调查。我们收集了关于人口统计学特征、临床诊断以及\
  \ COVID-19 前后健康数据共享和隐私的定量信息（封闭式和多项选择题）。我们对样本分布和特征进行了描述性数据分析。使用`Pearson r`相关系数来确定在\
  \ COVID-19 大流行背景下，先前的数据共享行为与对数据共享活动的态度之间的关系。对开放式问题的数据进行阅读，然后分类归纳为主题。\n\n\n\n###\
  \ 结果\n\n在发送电子邮件的 11,213 人中，有 10,705 人点击进入了调查问卷；总计有 4,764 人同意参与并开始了研究。所有受访者均完成了调查问卷，并被纳入分析。所有受访者均位于英国。其中，男性受访者为\
  \ 2,287 人（占 48.0%），年龄在 55 岁至 74 岁之间的受访者为 3,083 人（占 64.8%）。有 115 名受访者（占 2.8%）报告曾被临床诊断为\
  \ COVID-19。大多数患者（n=4674，占 98.1%）报告曾至少被临床诊断出一种健康状况（平均每人三种）。患有 2 型糖尿病（n=2974，占 62.7%）、高血压（n=2147，占\
  \ 45.2%）、1 型糖尿病（n=1299，占 27.4%）、肥胖症（n=892，占 18.8%）和抑郁症（n=871，占 18.3%）的人群比例较高。\n\n\
  在 COVID-19 大流行之前，近半数受访者（n=2313，占 49.2%）同意或强烈同意他们经常同意匿名共享其私人健康数据。相比之下，只有 608 名受访者（占\
  \ 13%）经常同意共享未经匿名化的私人健康数据。三分之二的受访者（n=3113，占 66.7%）不同意或强烈不同意共享未经匿名化的个人健康数据。同样，有 3,121\
  \ 名受访者（占 66.3%）表示，如果共享数据能让他人保持健康，他们会共享数据；3,026 名受访者（占 63.9%）同意或强烈同意与政府或卫生部门共享私人健康数据；1,911\
  \ 名受访者（占 40.7%）同意或强烈同意与向英国国家医疗服务体系（NHS）提供健康服务的机构（如低碳计划（Low Carb Program）和 PushDoctor）共享其私人健康数据。只有\
  \ 232 名参与者（占 5%）同意或强烈同意与社交媒体平台共享私人健康数据。\n\n超过四分之一的受访者（n=1297，占 27.8%）同意或强烈同意他们不信任任何组织能够保护其私人健康数据。略低于四分之一的受访者（n=1094，占\
  \ 23.5%）同意或强烈同意他们并不担心共享私人健康数据所带来的影响。对相关陈述表示“中立”的受访者被排除在外。\n\n超过半数（n=3026，占 63.9%）的受访者同意或强烈同意，如果被要求，他们会与政府或卫生部门共享其私人数据；1,911\
  \ 名受访者（占 40.7%）愿意同意与向 NHS 提供健康服务的机构（如低碳计划）共享其私人数据（如果被要求）。只有 232 名参与者（占 5%）同意或强烈同意，如果被要求，他们会同意与社交媒体共享私人数据。\n\
  \n近半数受访者（n=2228，占 47.1%）对在 COVID-19 大流行背景下谁可以访问其健康数据表示担忧或非常担忧，而 2,310 名受访者（占 49.1%）对将来其个人健康数据可能被如何使用表示担忧或非常担忧。近三分之二的受访者（n=3054，占\
  \ 65%）对有关数据滥用的立法表示担忧或非常担忧。\n\n略超过三分之一的受访者（n=1563，占 33.4%）表示，如果任何组织提供基本的 COVID-19\
  \ 支持服务（如超市、药房和银行），他们会同意与其共享私人数据。\n\n### 讨论\n\n我们的研究深入了解了公众在 COVID-19 大流行背景下对使用可识别健康数据的看法和态度，特别是那些患有慢性、长期健康状况的人群的观点，每位受访者平均报告了四种健康状况。\n\
  \n我们的研究表明，数据敏感性具有高度的情境依赖性。许多人认为他们的态度因 COVID-19 大流行而发生了转变。与 COVID-19 大流行之前相比，更多人表示愿意与任何组织共享私人健康数据。人们似乎更信任政府和卫生组织掌握其数据。人们对社交媒体组织（例如\
  \ Twitter、Facebook 和 Google）使用私人健康数据存在显著的不信任，尽管社交媒体被卷入危机（如地震、海啸和台风后的紧急救援行动）的人们用作沟通渠道，在这些情况下，它提供了关于正在发生的事情以及该做什么的可信且高度显著的信息来源。^(⁹⁴,)\
  \ ^(⁹⁵)\n\n这令人惊讶，因为尽管全球用户报告称隐私和个人数据的使用是重要问题，但大多数人很少主动努力保护这些数据，甚至经常在社交媒体上自愿放弃这些数据，而在社交媒体上，即使是看似无害的数据，在经过适当处理后也可能揭示敏感的健康信息。^(⁹⁶,)\
  \ ^(⁹⁷) 人们根据对数据感知敏感性的不同，以及不同数据类型所附带的敏感性既不稳定也不统一，而对数据披露和共享采取不同的态度。\n\n本研究中得到证实的文献中出现的一个关键主题是信任的重要性。^(⁹⁸,)\
  \ ^(⁹⁹,) ^(¹⁰⁰) 超过四分之一的受访者表示他们不信任任何组织能保护他们的数据，超过半数的人对共享个人信息的影响表示担忧，近三分之二的人担心数据滥用监管不够严格。当在大流行期间（英国第一波疫情）被问及时，近半数受访者担心谁可以访问他们的个人健康数据，类似数量的人担心他们的个人健康数据将来可能被如何使用。这与先前的研究一致，该研究表明公众参与数据政策对于增强信任至关重要，并为更具可执行性的立法提供了支持。^(¹⁰¹)\
  \ 态度可能受到关于网络安全和隐私的新闻报道以及政策公告（例如，关于华为、《在线危害法案》等）的影响。^(¹⁰²,) ^(¹⁰³)\n\n尽管没有直接可比的研究，但本研究的结果补充了先前关于公众对\
  \ COVID-19 和数据共享看法的研究。数据隐私和保护是基本概念。^(¹⁰⁴) 数据政策倾向于通过制定数据保护规则来解决人类对隐私的担忧；然而，这可能导致范畴错误，因为数据保护可能会损害隐私。\n\
  \n共享匿名化个人健康信息的意愿取决于接收机构被信任的程度以及数据将被用于何种目的。^(¹⁰⁵,) ^(¹⁰⁶) 接收机构的目标越具商业性，愿意共享其个人健康信息的受访者就越少。这表明匿名化的缺点（在确认数据以及将共享数据与其他数据关联方面）可能通过更好（更广泛、更深入、更准确）的抽样来弥补，从而提高结果的有效性。进一步的证据来自这些态度反应与其他特征之间的相互作用（或相关性），这意味着非匿名化的收集可能导致有偏差的结果。\n\
  \n### 结论\n\n数据敏感性具有高度的情境依赖性。与个人可识别数据相比，更多人愿意共享匿名化数据。共享数据的意愿也因接收机构而异，这突显了信任是一个关键主题，即谁可能访问共享的个人健康数据，以及这些数据将来可能被如何使用。该领域法律指导的初步性表明，在大流行等救灾行动期间，需要制定人道主义数据责任指南，并且有必要让公众参与其制定过程。\n\
  \n\n\n### 研究发现的影响\n\n调查结果揭示了公众对数据共享的鲜明态度。因此，为了建立并维护信任、可信度和用户参与度，开发团队最终对数字工具进行了多项改进，具体包括：\n\
  \n-   对所收集的数据采用“按需获取”的方法，以免打消用户使用该工具的积极性\n-   向用户提供“简单”的条款与条件，确保所有数据共享方面都得到理解\n\
  -   提供一种机制，让用户可以在数字应用内删除其所有数据，这与删除用户个人资料是分开的\n-   在足部检查流程的关键节点提供强化提示信息，反复告知用户数据对谁可见、可见时长以及哪些数据被设为可见\n\
  -   提供关于所有信息的安全性和隐私性的深度信息\n\n随后，该数字平台完成注册流程的参与者数量增加了 213%。\n\n## 针对 2 型糖尿病和糖尿病前期自我管理的数字干预措施评估\n\
  \n*以下案例研究展示了初级保健提供的精准健康工具的影响。*\n\n2 型糖尿病是一种代价高昂的慢性非传染性疾病，预计到 2030 年将影响全球 5.52 亿人。^(¹⁰⁷)\
  \ 在全球范围内，2 型糖尿病的负担估计超过 1.3 万亿美元。^(¹⁰⁸) 在发达国家，患有糖尿病的个体由初级保健团队管理，每年平均医疗咨询时间不足 3 小时。个体在大部分时间里基本上只能靠自己。^(¹⁰⁹)\
  \ 由于就诊间隔时间过长，糖尿病护理主要依赖于个人的自我管理，如果管理不当，会增加过早死亡、失明、截肢和肾衰竭的风险。^(¹¹⁰) 实际上，2 型糖尿病的自我管理既不简单也不直接，需要时间、计算能力和读写能力。^(¹¹¹)\n\
  \n与许多非传染性疾病一样，生活方式是导致糖尿病前期和 2 型糖尿病的主要原因之一，而改善饮食结构、增加体力活动、减少久坐等参数是降低此类病理发生频率的决定性因素。\n\
  \n减肥可以带来显著的健康益处，减轻多余体重可以降低患 2 型糖尿病、心脏病、骨关节炎和睡眠呼吸暂停的风险。^(¹¹²) 此外，维持合理的血糖控制对患者有益，糖化血红蛋白（HbA1c）每降低\
  \ 1%（6.2 mmol/mol），截肢风险降低 43%，心肌梗死风险降低 14%，微血管并发症风险降低 37%。^(¹¹³)\n\n最近一项针对已发表和未发表的随机试验数据的系统综述和荟萃分析，评估了在患有\
  \ 2 型糖尿病的成年人中，低碳水化合物饮食（<130 克/天或<2000 千卡/天饮食的 26%）和极低碳水化合物饮食（碳水化合物供能<10%）持续至少 12\
  \ 周的效果。结果发现，基于中低确定性证据，坚持低碳水化合物饮食六个月的患者可能实现 2 型糖尿病的缓解，且无不良后果。^(¹¹⁴)\n\n将数字技术整合到初级保健中可以增加获得护理的机会，改善患者预后，并降低成本。包括智能手机应用在内的数字技术，有可能通过影响生活方式的自我管理支持，来增强和扩展健康服务的覆盖范围。^(¹¹⁵)\
  \ 智能手机应用已被证明可以改善 1 型和 2 型糖尿病患者的血糖控制结果。^(¹¹⁶) 尽管有相反的证据，但在 Schoeppe 等人发表的关于应用改善生活方式功效的系统综述所分析的\
  \ 23 项研究中，只有五项研究显示智能手机对饮食习惯有积极影响。在九项研究中，它们导致了体力活动的增加。^(¹¹⁷) 尽管最近的系统综述得出结论，互联网和移动干预可以改善生活方式行为，但大多数研究的随访时间最多为\
  \ 3 到 6 个月，这强调了进行长期干预研究的必要性。^(¹¹⁸)\n\n提供低碳水化合物或极低碳水化合物计划的干预措施已在临床上被证明有助于改善体重、血糖和减少用药。^(¹¹⁹,)\
  \ ^(¹²⁰) 此外，这些饮食还与改善急性和慢性疼痛、抑郁、焦虑和压力有关。^(¹²¹,) ^(¹²²,) ^(¹²³)\n\n关于采用低碳水化合物饮食方法治疗\
  \ 2 型糖尿病和肥胖症的长期研究有限，尤其是那些通过远程方式提供和支持的研究。^(¹²⁴)\n\n### 目标\n\n鉴于治疗性碳水化合物限制在改善慢性病症状方面显示出显著益处，本研究旨在评估一项通过数字方式提供的治疗性干预措施在\
  \ 12 个月时对维持英国绍斯波特 Norwood Surgery NHS 招募患者的血糖控制的有效性。\n\n### 方法\n\n我们采用了单臂干预前后研究设计。参与者无需为参与付费，并可免费使用该计划。参与者就其匿名数据用于分析和发表提供了知情同意。\n\
  \n参与者于 2018 年 4 月 19 日至 2019 年 8 月 19 日期间从英国 NHS 初级保健机构——绍斯波特的 Norwood Surgery 招募。在招募窗口期内因任何原因就诊、年龄在\
  \ 18 岁或以上、确诊为 2 型糖尿病或糖尿病前期的患者，如果接诊的医疗专业人员认为合适，则有资格获得转介。\n\n接受转介的患者会获得一张低碳水化合物计划推荐卡，患者可在应用或网站上兑换该卡。为了广泛适用于非临床试验环境，唯一的事实上的排除标准是无法理解英语。向绍斯波特的\
  \ NHS 全科诊所提供了 100 张推荐卡。共有 45 名参与者注册，所有人都接受了 12 个月的随访。拒绝推荐卡的 55 名参与者的特征未被记录。\n\n\
  作为基线，招募到低碳水化合物计划的参与者在注册时需输入其糖尿病类型、诊断年份、最近的 HbA1c 检测结果和日期、年龄、性别、基于家庭收入的社会经济状况以及共存的慢性疾病。在\
  \ 12 个月时，参与者再次被要求报告他们当前的 HbA1c 水平和体重。\n\n\n\n### 结果\n\n在激活转诊的 45 名基线参与者中，有 37 人（82%）在\
  \ 12 个月时报告了结果。对于其余 8 名（18%）失访者，采用最后一次记录的数据点进行结转，以保持保守的真实世界评估。\n\n招募至低碳水化合物计划的 2\
  \ 型糖尿病参与者的`HbA1c`水平从基线（平均值 73.35 `mmol/mol`，标准差 15.84）到 12 个月随访（平均值 67.2 `mmol/mol`，标准差\
  \ 13.59）显示出统计学显著变化，相当于平均降低 6.2 `mmol/mol`（标准差 5.75；`t17=4.56`；`P<.001`）。完成该计划超过九节课的参与者的`HbA1c`水平从基线（平均值\
  \ 75.7 `mmol/mol`，标准差 14.9）到 12 个月随访（平均值 68.7 `mmol/mol`，标准差 12.8）显示出统计学显著下降，`HbA1c`平均降低\
  \ 7.01 `mmol/mol`（标准差 6.06；`t13=4.33`；`P<.001`）。这相当于`HbA1c`平均降低 8.81%。招募至低碳水化合物计划的前驱糖尿病参与者的`HbA1c`平均降低\
  \ 2.35 `mmol/mol`（标准差 1.96；`t26=6.25`；`P<.001`），具有统计学显著性。那些完成超过九节课的参与者表现更佳，在 12\
  \ 个月时报告`HbA1c`平均降低 3.04 `mmol/mol`（标准差 1.82；`t17=7.11`；`P<.001`）。\n\n2 型糖尿病参与者的平均起始体重为\
  \ 93.53 `kg`（标准差 17.91），在 12 个月随访时降至平均 90.83 `kg`（标准差 16.84），这是统计学显著的平均降低 2.70 `kg`（标准差\
  \ 2.21；`t17=5.17`；`P<.001`）。完成者的体重平均降低 3.54 `kg`（标准差 1.7；`t17=5.17`；`P<.001`），相当于平均体重变化为–3.66%（标准差\
  \ 2.8）。前驱糖尿病参与者开始计划时的平均体重为 86.72 `kg`（标准差 9.68），报告平均减重 2.82 `kg`（标准差 2.90；`t26=5.05`；`P<.001`），相当于平均体重下降\
  \ 3.16%（标准差 3.11）。完成该计划超过九节课的前驱糖尿病参与者表现出更大的统计学显著平均体重变化，为 4.08 `kg`（标准差 2.77；`t17=6.25`；`P<.001`），相当于总体重平均降低\
  \ 4.57%（标准差 2.88）。\n\n### 讨论\n\n这不是一项随机对照试验，因此我们无法将 12 个月的结果与对照组或标准护理组进行比较。因此，应谨慎解读我们的试验结果，因为这项小型研究采用了便利抽样、开放标签单臂设计以及前后自我报告的结果。然而，这项研究表明，在常规全科医疗实践中，将\
  \ 2 型糖尿病或前驱糖尿病患者引导至低碳水化合物计划，可以促进体重减轻并改善血糖控制。在最低限度的实施和支持下，这种轻触式干预能够增强初级保健工作流程。它显示出较高的接受率、依从性（即完成率）和留存率（即过去\
  \ 30 天内的参与度），分别为 45%、64%和 82%。12 个月时脱落率较低（8/45，18%），表明平台参与度很高。它是少数能显示长期参与度的应用程序之一。该平台已被证明具有高参与率，并且不劣于其他面对面或在线干预措施。^(¹²⁵,)\
  \ ^(¹²⁶,) ^(¹²⁷) 鉴于所提供的简短干预，我们在全科和初级保健背景下实现了高接受率。通常，其他干预措施需要人员资源和时间。\n\n### 结论\n\
  \n尽管我们的研究设计不支持因果结论，但这项真实世界评估表明，该干预措施可作为 2 型糖尿病和前驱糖尿病成人患者精准自我管理的有价值辅助手段。\n\n### 研究结果的影响\n\
  \n由约克健康经济学联盟进行的一项独立健康经济学报告，采用了低碳水化合物计划对真实世界影响的数据，以证明在公共医疗保健系统中实施该计划可带来显著的成本节约。对于一个拥有\
  \ 3000 个许可证的地区，研究人员模拟得出，实施低碳水化合物计划一年后，每位参与者的药物费用平均可节省 117.57 英镑。这些结果支持了该数字多平台工具在全国范围内的推广。^(¹²⁸)\n\
  \n## 基于语音的症状监测与基于人工智能的长期新冠患者康复\n\n*以下案例研究展示了一个获奖的技术商业案例，该案例涉及一种利用基于人工智能的症状监测来监测长期新冠的精准健康工具。*\n\
  \n\n\n### 背景\n\n长新冠是一种疾病，已影响全球 4.78 亿新冠幸存者中的 40%。^(¹²⁹) NICE 指南建议引导患者使用应用程序进行自我管理。^(¹³⁰)\
  \ 这种疾病会使人衰弱，并可能影响心理健康、家庭、就业和生活质量。^(¹³¹) 医护人员中长新冠的患病率更高，每年因长新冠导致的 NHS 员工缺勤天数约达 200\
  \ 万天。^(¹³²) 长新冠是导致长期缺勤的最主要原因。^(¹³³) 长新冠对医护人员的影响不成比例地高于普通人群。^(¹³⁴) 缩短康复时间将有助于人们更快地重返工作岗位。雇主将因病假减少以及员工心理健康和生活质量的改善而受益。近\
  \ 20%的患者需要 5 至 6 个月的康复治疗，其中大量患者出现与压力相关的问题。\n\n目前，仅有少数针对长期疾病的康复应用程序与长新冠相关。例如，NHS\
  \ 威尔士专为长新冠设计的自我管理应用程序提供了基本信息，但交互性较差。现有应用程序虽然涵盖了通用的康复原则，但缺乏长新冠的特异性和个性化交互。我们需要找到公平触达人群的方法来管理长新冠，并支持有针对性的康复和疗效。目前的工具要么是信息性的，要么是图形用户界面的移动应用程序，无法通过语音监测症状或提供支持，这排除了\
  \ 65 岁以上人群中 60%不使用智能手机的关键长新冠风险群体。\n\n借助 AI 语音助手，语音可以转化为一项重要的生命体征，从而实现健康评估和基于症状的康复。正如体温指示发烧一样，声音生物标志物能更全面地反映我们的健康状况。\n\
  \n自动声音分类已广泛应用于各种现实场景，例如健康监测、安全监控、环境感知、机器人导航和语音活动。声音分类任务涉及从音频信号中提取声学特征，并随后识别不同的声音类别。广泛的声音分类应用可分为几个领域，包括语音识别、乐器识别、环境声音分类以及用于疾病诊断的医学声音分类。与具有适当高级结构的语音和音乐声音相比，诊断性声音（如呼吸声、咳嗽声和心音）和环境音频信号的类别往往是非结构化的，包含各种临床和自然声学噪声。此外，由于声音产生机制不同（例如，不同的身体记录位置和设备），使用医学音频片段进行声音分类是一个具有挑战性的问题。现有文献中对此鲜有涉及，特别是关于肺部疾病（如慢阻肺、肺炎、哮喘和支气管扩张）以及使用呼吸、咳嗽和语音音频信号进行新冠诊断。由于样本高度不平衡且数量有限，现有研究的性能有待提高。此外，由于人类情感的微妙性以及众所周知的嘈杂、模糊和含混的边界，从音频输入中进行情感识别也颇具难度。\n\
  \n### 目标\n\n我们项目的目标是调整 Gro Health 应用程序，使其能够支持多种健康状况，达到/超越平等和多样性目标，并与少数族裔患者群体、退休成年人以及有学习困难的人群保持高度互动。该项目将通过可穿戴设备和语音监测长新冠症状，并通过聊天机器人提供个性化的康复训练，供应商可将该聊天机器人嵌入智能设备、车辆和家庭中。\n\
  \n随着健康服务数字化的加速，找到与数字排斥人群建立联系的途径对于避免加剧现有的健康不平等至关重要。减少健康不平等是我们产品试图解决的核心问题。这项创新将在智能设备（包括语音助手和智能电视）上全天候可用，以覆盖\
  \ 65 岁以上没有智能手机的 60%人群，使其成为没有智能手机的人唯一可用的居家长新冠支持解决方案。\n\n该项目面临特定的技术挑战，包括语音捕捉的准确性、数据分析中的潜在噪声、整合不同数据点以提供长新冠的整体评估，以及基于自主原则的多学科自我管理支持。\n\
  \n所开发的 AI 智能体将通过开发新颖的弱监督、零样本（ZSL）和少样本（FSL）学习以及深度学习算法来填补知识空白，以生成有效的音频表示，捕捉显著的判别性时空特征和声学线索，从而为基于音频的疾病和情感分类提供信息。机器学习工程师还将采用不断演进的神经架构生成技术，以产生定制的优化网络，从而更好地处理带有各种噪声数据输入的音频分类。\n\
  \n### 实施计划\n\n该项目是 DDM Health 与伦敦大学皇家霍洛威学院之间的合作项目，包括以下内容：\n\n*   通过应用程序内的患者语音和症状数据收集数据。\n\
  *   采用混合方法设计，包括访谈、语音日记以及来自 Gro Health 应用程序的数据，并结合数据分析来捕捉和分析长新冠患者的症状在生理和心理层面的表现。\n\
  *   设计并开发一个交互式 AI 智能体，以实现个性化的实时支持和自我管理建议。核心功能包括：通过与可穿戴设备的数据同步来监测长新冠症状、通过用户手动输入进行音频录制、从语音中检测情绪，以及通过交互式\
  \ AI 智能体提供支持和应对策略。\n*   使用现有数据集和实时输入进行系统评估。\n*   撰写报告并进行成果传播。\n\n### 风险\n\n技术风险包括以下内容：\n\
  \n*   研究团队可以通过使用大量现有的、涉及不同肺部异常和新冠检测的呼吸、咳嗽和语音公共数据集来缓解音频数据不足的问题。\n*   可以通过使用强大的高性能\
  \ GPU 计算设施来缓解训练过程缓慢的问题。\n*   可以通过借鉴以往系统开发项目成功交付的重要经验、进行全面的文献综述以及咨询相关研究人员/NHS 合作伙伴/领域专家，来弥补在医学音频分类方面背景知识不足的需求。\n\
  \n### 评估\n\n大学研究人员将与现有合作伙伴合作，招募长新冠患者对 AI 智能体进行纵向混合方法评估，包括健康数据追踪、问卷调查和访谈，以详细描述用户与\
  \ AI 的互动情况及其健康影响。\n\n\n\n### 潜在影响\n\n该项目影响深远，其潜在效益对以下各方意义重大：\n\n-   **患者**：标准化长新冠支持服务的获取途径，可减少患者护理和康复结果的差异。\n\
  -   **雇主**：长新冠是导致长期缺勤的首要原因。^(¹³⁵) 长新冠对医护人员的影响尤为严重。缩短康复时间有助于人们更快地重返工作岗位。雇主将受益于病假减少、员工心理健康改善以及生活质量提升。\n\
  -   **保险公司**：在 2021 年，长新冠是团体收入保障保单中导致早期干预和康复的第二大常见原因。^(¹³⁶) 改善康复效果将减少理赔。\n\n负面影响包括可能减少患者与医疗专业人员之间的面对面诊疗。这将通过研究加以缓解，包括评估对医疗专业人员的负担，并让相关利益攸关方参与应用程序的开发和交付，以确保其适用性。\n\
  \n## 开发数字工具，支持儿童与青少年日常行为改变，迈向更健康的生活\n\n*以下案例研究展示了一款精准健康工具的设计与制作过程，该工具旨在为儿童及家长提供生活方式与行为改变方面的健康福祉支持。项目的关键方面包括：运用数据驱动的方法应对社会问题，让所有相关利益攸关方参与共同开发过程，并培训员工以提供持续服务。*\n\
  \n超重和肥胖对我们当地人口的当前及未来健康构成了重大挑战。来自国家儿童测量计划（NCMP）的数据（该计划对学前班（4-5 岁）和六年级（10-11 岁）儿童进行身高体重测量）显示，在康沃尔郡，2019/2020\
  \ 年度，25.1%的学前班儿童和 31.9%的六年级儿童超重或肥胖。^(¹³⁷)\n\n由于新冠疫情，NCMP 在 2020-2021 年缩减了项目规模，仅收集具有全国代表性的样本数据。这些数据显示，全国范围内儿童超重和肥胖率显著上升（学前班和六年级分别上升了\
  \ 4.7 和 5.7 个百分点）；这是自 NCMP 开始以来的最高年度增幅。如果这些全国性的增长趋势在康沃尔郡显现，那么我们将面临近三分之一的学前班儿童超重或肥胖的局面。部分儿童群体受超重影响尤为严重。生活在最贫困地区的儿童肥胖的可能性是生活在最不贫困地区儿童的两倍多。^(¹³⁸)\n\
  \n这些趋势对康沃尔郡儿童的健康产生了重大影响。超重或肥胖的儿童面临更高的身体健康问题风险，包括肝病、睡眠呼吸暂停、糖尿病、哮喘和骨科问题。除了身体上的并发症，超重和肥胖还与不良的心理和情绪健康相关，许多儿童遭受欺凌、自卑、身体形象不满和抑郁症状。肥胖儿童成年后很可能继续肥胖，并且在成年期面临更高的发病率、残疾和过早死亡风险。\n\
  \n在新冠疫情之前，“健康康沃尔”项目提供了一个二级 10 周“健康家庭计划”，包括每周在学校环境中进行一个半小时的小组课程。然而，2019 年的一项项目审查发现，该服务覆盖面有限，每年仅服务约\
  \ 50 个家庭；效果不佳，只有三分之一的儿童实现了维持或降低其 BMI z 分数的结果；并且交付成本高昂且耗费大量人力。\n\n儿童肥胖的原因复杂且多因素。^(¹³⁹)\
  \ 应对儿童肥胖需要采取全系统方法，创造一个支持家庭做出更健康选择的环境，同时针对超重或肥胖儿童进行个体层面的干预。解决导致超重的环境因素的工作正在康沃尔郡持续进行，这将是新健康体重战略的关键重点。\n\
  \n### 目标\n\n康沃尔郡议会寻求委托一家供应商，与他们的“健康康沃尔”和公共卫生部门紧密合作，领导开发并试点交付一项新的、基于证据的二级生活方式体重管理计划，面向康沃尔郡\
  \ 5-12 岁儿童。该计划将构成面向儿童和家庭的新的二级健康体重服务的基础，并成为当地健康体重护理路径的关键组成部分。\n\n### 方法\n\n该项目在针对新人群调整干预措施时，采用了“社区参与项目调整方法”（m-PACE）。这种基于证据的方法提供了一个系统化的流程，用于获取高质量的社区反馈，并对项目开发的建议进行裁决。m-PACE\
  \ 方法通过以下方式揭示当地需求：\n\n-   与社区成员互动，特别关注那些因不平等而导致儿童超重和肥胖风险更高的区域\n-   通过个人访谈收集家长和儿童的反馈\n\
  -   在家庭使用该计划 6 周后，进行焦点小组讨论\n\n访谈和焦点小组用于了解参与健康体重服务的障碍和促进因素，并了解当地儿童和家庭对二级生活方式体重管理计划的需求。混合研究方法能够捕捉到更多和更少发声的社区成员的意见，并减少可能影响数据收集的社会期望偏差的影响。社区成员通过多种渠道招募，包括初级保健机构、当地媒体以及社区中心的线下招募。\n\
  \n### 里程碑\n\n多学科团队将项目分解为以下几个工作包：\n\n-   **第 1 个月**：利益攸关方参与\n    将邀请一组利益攸关方参与规划和持续监测会议。\n\
  -   **第 2-4 个月**：社区参与\n    将举行社区参与活动，包括招募潜在的服务使用者。反馈意见将被整理成一份正式报告，包含调查结果和对项目开发的建议。\n\
  -   **第 5-6 个月**：项目开发\n    开发团队利用社区参与的反馈，开发数字和现实世界中的体重管理计划（教学大纲、内容、材料），以确保其适合康沃尔郡的儿童和家庭，最终形成一份经过临床审查、可供试点的计划。\n\
  -   **第 7-11 个月**：试点\n    培训所有参与交付该计划的员工。招募参与者试用新开发的二级生活方式体重管理计划。试点报告将详细说明参与者参与情况、访谈和焦点小组的反馈，以及临床、生活质量和心理健康结果的变化。\n\
  -   **第 11-12 个月**：项目修改与服务启动\n    利用试点后的洞察，将定制化的二级生活方式体重管理计划整合到康沃尔郡提供的体重管理路径中。\n\
  \n\n\n### 评估\n\n我们通过结构化访谈、使用符合监管要求的软件进行的调查以及焦点小组，收集参与儿童及其家庭的反馈。数据分析完成后，将汇编成一份正式报告，分享高质量的反馈和建议，以决定项目的调整方案。通过出勤率、平台内遥测数据以及定性反馈（包括结构化访谈和焦点小组）收集的参与度数据，将与所有参与者的定量反馈和临床结果一同用于指导持续改进。\n\
  \n### 项目影响\n\n数据显示，社会经济弱势群体的参与度高于预期，其中很大一部分人分享了健康语音症状数据（88%）。健康结果仍在分析中，将发表在同行评审期刊上。\n\
  \n## 总结\n\n精准健康是一种预测性、预防性、个性化和参与性的方法，旨在改善个人和群体健康。精准方法已在拯救生命、为医疗专业人员提供更多选择，以及让家庭更长久地保持健康方面发挥作用。患者可以直接从精准健康方法中受益，包括获取自身数据、获得量身定制的行为与生活方式改变支持、提高治疗依从性，以及实时监测健康状况变化。然而，从典型的一刀切策略过渡到以价值为基础、个性化、数据驱动且注重预防而非被动应对疾病进展的方法，仍需时日。\n\
  \n社会与行为科学必须与其他学科合作，以推进精准健康研究。其最终结果预计将降低医疗保健的总体成本。然而，除少数特例外，研究尚未能证实这一论断。创新者必须继续创造证据，以支持精准健康能够在降低成本的同时提升效果的论点。正如本章中的案例所强调的，精准医学在更好地预防、预测和治疗疾病方面的前景正逐渐成为现实。\n\
