  trans: '

    ### 市场营销与销售


    大规模营销活动的时代已经一去不复返。在这个日益数字化的世界里，吸引注意力的最佳方式是个性化。人工智能使我们能够提供个性化的服务、广告和互动。我们已经看到成功的个性化在零售业产生的影响。例如，零售商不仅利用客户共享的数据，还利用网络上可获得的大量各类数据，开发出可驻留在我们智能手机上的忠诚度应用程序。根据我们的位置、一天中的时间以及距离大型商场或零售店的远近，该忠诚度应用可以推送超个性化的优惠供我们实时使用。


    在销售和营销领域，人工智能可以提供增强智能的能力，将数百万个单独的数据点与一般消费趋势的信息相关联，然后构建一个实时营销系统，该系统有可能实时提供数千个定制化优惠。这是一项复杂的任务，今天的营销人员可能需要一周时间才能完成。


    “最佳下一步推荐”位于客户需求与公司产品目录的交汇点。关键在于理解客户真正想要什么（明确说出的和未言明的），与公司的产品进行匹配，并达成令客户和公司都满意的交易。就保险行业而言，这意味着要构建一个能够反映客户在人生不同阶段需求的模型。该模型将利用复杂的算法，处理超过
    1000 个静态和动态变量，包括人口统计数据、过往保单、过往代理互动、经济状况、其他客户的分群情况，从而匹配这位客户及其已购买的产品。结果如何？有可能显著提升交叉销售。保险公司还可以利用该模型来反思其代理人的表现，从而设计培训计划，提升未达标代理人的技能。


    这些例子说明了丰富且具有针对性的客户数据的重要性。如果你有一个定义明确的问题陈述和数据，通常可以在四到六周内验证概念验证，然后为数据基础设施和全面推广所需的资源制定详细计划。


    ### 研究与开发


    研发是一个迷人的领域，该领域的问题通常很复杂。它们需要深厚的领域和技术专长，并且通常由许多实验周期驱动。研发领域的人工智能解决方案可以加快实验周期，通常通过模拟数百万个数据点来预测结果。


    例如，在工业制造业中，人工智能可以将来自机器的实时传感器数据与过去的维护数据和 OEM 基准数据相关联，以预测机器何时会发生故障。


    研发领域的问题是数据可用性不足。希望改进产品设计的公司需要将机器运行数据数字化。消费电子行业需要更多地关注 3D 设计数据和用户体验数据。制药和医疗保健行业则需要关注临床试验数据和药物疗效数据。鉴于为研发领域专门构建人工智能解决方案所需的知识和专业知识，公司必须聘请领域专家来系统地整理数据并帮助提高预测能力。


    ### 运营


    运营实践和流程拥有标准操作程序，能产生大量数据，并且每项任务都有可衡量的产出。很自然地，运营任务非常适合人工智能辅助。快速发展的技术正在改变各个领域，制造业也不例外。随着行业竞争日益激烈，成本压力不断上升。像化工、电力和热力这样投资回报周期长、回报率慢的重工业，不仅面临来自行业内部的冲击，也受到快速变化的外部因素的影响。例如，曾经容易获得且廉价的劳动力现在变得难以获取。


    制造业趋势本身也在发生变化；按订单生产是新的方式。准时制、精益生产要求更少的库存和更实时的运营。那么，制造商如何适应并拥抱这种转变呢？答案在于通过人工智能变得更智能、更出色。


    人工智能可以应用于制造的整个生命周期，从问题识别到问题沟通，再到问题解决。自动化对于简化重复性任务（如排程和重新排程、规划和数据跟踪）是必要的。


    预测以预防运营中的异常情况，对于及时发现偏差并避免重大灾难大有裨益！这种由人工智能驱动的系统必须应用于材料、机器和设备的更新，并扩展到它们所交互的系统，例如客户订单和供应采购。

    '
- fmt: '### Procurement and Supply Chain Management


    The rise of AI in optimizing procurement function is astounding. Organizations
    today don’t just measure what they spend, they are pushing the traditional approach
    of spend analysis to measure total value contribution to the business, taking
    advantage of both conventional and newly accessible data sources. How have they
    done this?


    Artificial intelligence is adept at automating even complex tasks. From identifying
    new markets and tracking exchange rate volatility to managing risks and assessing
    the best suppliers, procurement as a corporate function is leveraging AI to streamline
    processes and improve decision-making. Spend analytics along with contract analytics
    have already gone through significant automation activities (processes of collecting,
    cleaning, classifying and analyzing an organization’s expenditure data). As a
    result, the low hanging fruits of identifying areas where savings can be made
    and point to paths of greater efficiency have already been achieved, but this
    is only scratching the surface of the transformative powers of AI in procurement.


    AI can bring in advanced strategic reasoning and strategic sourcing in to the
    mix. AI supplements such as cognitive procurement advisors (CPAs) and virtual
    personal assistants (VPAs) that use natural-language processing (NLP) and natural-language
    generation can further increase automation and efficiency in procurement. By facilitating
    creation of requisitions from free-form data like that contained in an email or
    PDFs (not just data entered into a requisition interface), AI can help bring more
    purchases under direct control. Speech recognition (such as Siri and Alexa) can
    change the requisition and approval process for busy and off-site workers. Also,
    using image recognition technology, employees may opt to send a picture of an
    item they wish to order or reorder, again simplifying the requisition process
    and making it likely that more spend is being actively managed. AI can play a
    significant role in reviewing and even generating and monitoring supplier contracts,
    automating a typically labor-intensive set of tasks. In addition, AI technologies
    can look for cost/price discrepancies, unusual order quantities or frequencies,
    compare contract data to orders and invoices, and a whole host of other patterns
    that will help companies detect potential fraud or errors, detect and predict
    purchasing patterns, and identify the top-performing trading partners.


    Lastly, artificial intelligence is capable of “learning” your sourcing patterns
    and behaviors and making best supplier recommendations for a specific project
    or spend. It can even be used to predict market prices, identify and analyze new
    potential vendors, and help you evaluate the success of your relationships with
    existing suppliers.


    If AI is to transform supply chain, it should be driven by issues that affect
    operations today. So, the first question to ask is “What needs to be improved
    in supply chains right now?” For example, typical retail/CPG supply chains carry
    60-75 days of inventory, the average service level in the store is about 96%,
    with promoted item service levels much lower at the 80% range. The restaurant
    and casual dining industry, on the other hand, carries around 12-15 days of inventory
    with relatively high waste and high cost of goods sold.


    The following are few challenges in SCM that AI can effectively address:


    - **Hard to plan for demand**: Requires multiple iterations to arrive at a plan.

    - **Excessive safety stocks and bullwhip effect**: Complex integrations and calculations
    at each step in the process and at each node in the supply chain network.

    - **Supplier unreliability and transport network unpredictability**: Huge opportunities
    hidden in the network because they are locally sub-optimized.


    In different shapes and forms, AI can help with all these problems. However for
    AI to offer optimal value in supply chain, it is important to ensure the following:


    - **Access to real-time data**: The most important business imperative in SCM
    is to improve legacy batch oriented planning systems, but for that to happen we
    must eliminate the stale data problem. Most supply chains today attempt to execute
    plans using data that is days old, which results in poor decision-making that
    sub-optimizes the supply chain planning and requires frequent manual user intervention
    to stay current. Without real-time information, an AI supplement is just going
    to make bad decisions faster.

    - **Access to varied data**: Unless the AI supplement can see all relevant constraints
    and bottlenecks due to external influence in the supply chain, the results will
    be no better than a traditional planning system. Hence, having access to all touch
    points related data, including external data, will help improve visibility into
    supply chain processes and inter-dependencies.

    - **Last mile visibility and user engagement**: SCM goes through a number of process
    areas that are not integrated. The end consumer is the only consumer of your finished
    goods products. During the supply chain process, each function has their own goals
    and objectives, which one way or other stay aloof of the last mile impact. Hence,
    the primary goal of the AI engine must be to improve consumer service level at
    lowest possible cost but taking into account the entire supply chain touch points.


    Data in a multi-party real-time network is always on a fast moving lane. In addition
    data variability and high latency are recurring problems. Hence, the AI engine
    can’t afford to stay on a batch mode; it must be looking at the problems continuously
    and should learn as it goes on how to best set its own performance parameters
    to fine tune its abilities.


    Significant value can only be achieved if the algorithm can make intelligent decisions
    and execute them. Furthermore, the algorithms need to execute not just within
    the enterprise but where appropriate, across the ecosystem of partners. This requires
    your AI system and the underlying execution systems to support multi-party execution
    workflows and, to a large extent, those workflows need to be automated.


    Lastly, AI should not operate as a “black box.” Users must get visibility to decision
    criteria, propagation impact, and they should also get a view of the issues that
    the AI system cannot solve. The users, regardless of type, should play an active
    role in monitoring and providing additional input to override AI decisions when
    necessary.


    ### Shared Services Functions


    Shared services functions in the corporate world are seen as cost centers, hence
    there is a natural tendency to partially outsource the support activities to drive
    cost optimization. Beyond the cost optimization, the service organizations need
    to shift focus to embed intelligence and automation in processes in order to offer
    higher-value services and improve service levels.


    Many service organizations are starting to recognize the benefits of combining
    AI with robotic processing automation (RPA). They are using rules-based software
    bots to replace repetitive manual human activities adding flexibility, intelligence,
    and learning via AI. This approach combines the rapid payback of RPA and the more
    advanced potential of AI.'
