- fmt: '# Singularity


    How do we manage artificial super intelligent systems?


    Human evolution is almost entirely due to our intelligence and our ability to
    adapt to changing conditions. However, in our zest to invent more and more artificially
    super intelligent systems, we may get into a scenario where the machines are the
    most intelligent beings on earth, far superior than humans! This state is called
    “singularity”.


    The ethical question before us is, even if it is far fetching, someday a sufficiently
    advanced machine may come to life, and this machine will be able to anticipate
    what we are anticipating, so how do we stay a step ahead?


    # Machine Rights


    How do we define a legal framework for AI?


    We have seen how mechanisms of reward and aversion play a decisive factor in human
    lives. Reinforcement learning in particular applies a virtual risk and reward
    mechanism to let AI agents learn and become adaptive to the environment.


    The ethical question before us is, once machines as entities attain sufficient
    maturity levels to see, sense, think, and act autonomously, they will demand a
    legal framework to protect and manage their share of rights. Should the intelligent
    machines be treated like humans? Should they have a parallel legal and grievances
    system? When an AI agent is penalized for wrong doing, how do we provide a support
    system to make it understand its mistakes and stay motivated to do well in the
    future? How do we resolve situations where the machine is doing all the right
    things but the human-in-the-loop is in the way?


    # The Board and CEO’s Roles in Ethical AI


    AI’s predictive measures are meant to provide intended outcomes. Out in the real
    world, this is the only side that matters. However, just as humans are imperfect,
    subjective, and prone to corruption, machines are too. In other words, despite
    established laws and protocols, dubious actors in our society find a way to game
    the system. Similarly, AI’s usefulness is open for people to use it for malicious
    or self-serving purposes. The stakes are getting higher.


    Hence, companies, especially those with access to vast pools of data and that
    develop and deploy AI products and services, should not only demand more responsible
    work ethic from engineers, entrepreneurs, and executives, but should also establish
    more assertive boards and committees to make ethical AI their top strategic priority.


    ## The Board’s Role


    Companies in traditional industries turn to decades of laws, regulations, and
    litigation for guidance while defining corporate ethics. However, for something
    as transformative and disruptive as AI, there is no prior knowledge. Norms and
    standards are still emerging; laws, regulations, and legal precedent are scarce.
    That is why it is important for boards to become aggressive proponents of corporate
    ethics for AI, making it a top priority alongside other concerns such as growth,
    profitability, M&A targets, and succession planning.


    Boards should hold CEOs accountable to making AI ethics an enterprise priority.
    For example, directors should not take it on face value that the company’s AI
    offerings and initiatives do not inadvertently promote biases. Instead, board
    members should stipulate that AI offerings and initiatives should be continuously
    be subjected to stress tests to uncover AI biases and take remedial actions.


    ## The CEO’s Role: Governance Excellence on AI Ethics


    CEOs can build their AI ethics and governance prudence in three ways.


    First, CEOs should strengthen and expand their own knowledge, covering issues
    ranging from AI bias to best practice in transparency and accountability. They
    should also be deeply aware of the implications of their company’s AI products
    and services, including data sources and nature/type of algorithms. CEOs should
    also set up a dedicated think-tank to collect industry wide information about
    AI ethics-related litigation and concerns raised by customers and views of policymakers.
    This will help CEOs conduct management briefings across the enterprise and raise
    awareness levels.


    Secondly, CEOs should include senior advisors into their think-tank who can bring
    in additional perspectives regarding implications of AI to the boardroom. For
    example, if your company is offering HR-related AI products and services, it is
    crucial to bring in a senior advisor to critically review whether biases related
    to diversity, inclusion, labor, and civil rights regulations are adequately marginalized.


    Third, CEOs must realize that ethical AI can’t be an afterthought. Enough checks
    and balances should be built right into the core of AI systems development process
    to ensure that technologists don’t get carried away in developing AI systems without
    paying attention to making AI transparent. We cannot ignore the risks of deploying
    AI systems that work exceptionally well on the one hand, but are not fully explainable
    on the other. Hence, CEOs must ensure that the enterprise is equipped with the
    right tools, methodologies, and review mechanisms.


    ## The Technologist’s Role


    Technologists and AI experts must pay attention to the purpose and goals of the
    AI system. It is easier to say that the algorithm is highly sophisticated but
    the data is biased. Real-world data will be always biased, because it is situational.
    It is the responsibility of AI experts to fully understand the context behind
    the data and then design algorithms to support human values.


    # Conclusion


    It is important to decouple the pursuit of fairness in AI from commercial interests
    and create room for fair and transparent AI solutions. To that end, making AI
    explainable is of paramount importance.


    Companies building their business strategy based on AI’s disruptive power are
    caught midway: What are the costs and benefits of making their AI transparent?
    How do they protect their IP and competitive advantage?


    Admittedly, there are rules of thumb or best practices right now. Perhaps, for
    every AI system, if we can detail the kind of data used, details of data sources,
    parameters used in the prediction model development, accuracy levels achieved,
    and statistics about false-positive and false-negatives, we may achieve a generally
    agreeable transparency level that may further lead to establishing a commonly
    acceptable set of standards for ethical AI.


    In this chapter, we discussed several ethical related viewpoints of the consequences
    of AI. In the next chapter, we bring together all the lessons from previous chapters
    and try to establish certain approaches to building a human-machine collaborative
    ecosystem.'
