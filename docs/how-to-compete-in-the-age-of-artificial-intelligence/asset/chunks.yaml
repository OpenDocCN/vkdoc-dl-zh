    AI 战略家，这最终将有助于 AI 战略家表现得更好。


    按照这个速度，认为有一天 AI 战略家会变得足够聪明以超越人类战略家并非荒谬之谈。那肯定会是很有趣的一天。


    ### 精心设计的无界面


    AI 战略家必须能够将其发现和建议传达给人类；反之，人类应该能够理解、检查并验证这些建议，并向 AI 战略家提供反馈。


    人类能够跳出固有思维模式，并执行推理、验证和重新定义框架等更高阶的任务，因为我们能够有效沟通。如果 AI 战略家像一个黑盒一样运作，并产生难以理解的输出，它就失去了价值。人类无法解释这些输出，因此无法通过连续的重新定义框架来建立更深入、更丰富的洞察。为了避免这种情况在开始时发生，AI
    战略家必须被设计成透明且具有对话性。

    '
- fmt: '### How Important Are Cost, Quality, and Time?


    AI as a discipline has progressed rapidly. It has emerged out of the labs and
    is already making dramatic changes to our day to day life. Some AI applications
    have even reached human-level performance in many aspects of vision, conversational
    speech, and problem-solving. As a result, every industry is actively considering
    AI initiatives within its enterprise. However, since we are in the midst of such
    unprecedented disruptions, there is no methodology or prior use cases one can
    follow. Important questions include: How much does it cost? How do you define
    ROI? How do you measure the quality? How much time should it take? There are many
    more related questions, including what will happen to our jobs!


    No doubt, with today’s robust AI technologies, we are transforming the way we
    have been working. In many sectors, we have automated activities that are repetitive
    and mostly back-office operational tasks. Interestingly, AI has also started to
    lend its intelligence to fields that require less repetitive manual labor and
    once seemed immune to automation, such as law, education, journalism, etc. In
    short, AI has started augmenting human minds, not just muscles.


    In the midst of all these happenings, it is important to acknowledge that there’s
    no shortage of work that can be done only by humans (refer to Chapter [1](#467925_1_En_1_Chapter.xhtml)—human
    judgment becomes invaluable). The challenge that organizations need to address
    is not a “world without human involvement” but a “world with rapidly changing
    human labor-related skills”.


    Certainly costs and quality parameters are important for any business to stay
    competitive and meet customer expectations, but the AI development lifecycle needs
    to be looked at differently compared to other business application development
    lifecycles. The initial AI development cost may appear to be expensive, but once
    it’s developed and the AI system starts running in the environment, it can scale
    to accommodate enormous workloads without a fuss. The other important advantage
    is that AI systems continuously learn from data as well as from the human-interactions,
    thus making the ongoing run and maintenance costs negligible, if not zero. For
    example, once you have developed an AI system to analyze the lab reports and report
    findings, you can scale it to do the same analysis for millions of lab reports
    at minimal incremental cost. This aspect of AI paves the way for organizations
    to replace or increase productivity of expensive knowledge workers as AI automates
    many tasks. The result? An opportunity to reexamine currently expensive bottlenecks
    and see how AI can overcome them.


    With machines, we can expect execution discipline, precision, and consistent results.
    Your AI radiologist will deliver the same output every time, all the time. With
    this consistency in place, organizations can incrementally refine and improve
    quality over time.


    While reducing costs and improving quality are important, AI also addresses a
    fundamental business goal—faster time to market. For example, the current loan
    approval processes typically take 10-30 days. Getting a loan, even a pre-approval,
    doesn’t happen overnight. With data increasingly available to support all the
    information that goes into a loan processing application, AI can dramatically
    reduce the time required to process the loan. If you find a house to your liking
    in the morning, there is no reason why your loan application will need a month
    to be processed. Ideally you should be getting the keys to that house by the afternoon.
    Loan approving officers (if they continue to exist) will simply need to be able
    to swipe your credit card to close the transaction.


    Lawsuits are at the other end of the extreme. They can take considerable amount
    of time to resolve. Some of the time is in gathering data and preparing the case,
    some is in delays due to court congestion, yet more is due to deliberation and
    settlement. This entire process, with multiple bottlenecks and dependencies, could
    be shortened by applying an AI solution that can research and prepare the case
    along with references to past judgments and then provide an early indication of
    how much time it would take to arrive at the outcome. Certainly, it will help
    people from just going round and round in circles, wasting time and money, if
    they are provided with enough factual information about where their case stands!


    Medical diagnoses are another example of cumbersome processes. Many times the
    delay happens because of non-availability of past medical history. Secondly, even
    if you have the past medical history, you are dependent on availability of the
    right physician in your insurance covered healthcare provider network. What if
    you need a simple diagnosis to understand how bad your condition is? AI can shorten
    the lag time considerably by analyzing your past medical history and matching
    your current symptoms with a vast library of diagnosis results. The potential
    for faster preliminary diagnosis can certainly help hospitals and clinics and
    at the same time improve health outcomes through earlier detection of conditions
    that require quick medical attention.


    As AI’s usefulness begins to outweigh its uncertainties, what do organizations
    need to watch out for?


    #### Too Fast to Manage


    We are fortunate that the slow pace of our current processes allows us time for
    monitoring and management. If (when!) something doesn’t work as expected, we usually
    have time to perform root cause analysis, find any bottlenecks, instigate fixes,
    or perform course corrections. However, when machines run our processes, we may
    not have time to step in and manage the situation, because everything will be
    running at a machine pace. We may not get the opportunity to intervene before
    the money is gone from a risky loan, the guilty walk away, or the patient suffers
    from an incorrect treatment. In the race to optimal speed, the machine pace (extreme
    automation) may lead to risky outcomes.


    #### Too Fast to React


    Besides many other reasons like improved productivity and improved responsiveness,
    one of the key reasons for expediency is to stay ahead of your competitors. With
    AI you can create stiff entry barriers for your competition. However, it won’t
    likely work out that way. Just like you are seriously thinking about AI, your
    competitors are as well. The result? When everybody wants to stay one-up, it creates
    a huge amount of instability in the ecosystem. You no longer have the luxury of
    market leadership or competitive advantage; it suddenly has become a level playing
    field.


    #### Too Fast to Learn


    AI solutions are data hungry. The more data there is and the more varied it is,
    the better the AI outcomes. In a bid to outweigh competition, if every enterprise
    seriously acquires as much data as they can, suddenly you end up in a situation
    where there is no longer any differentiation due to data. The other issue is that
    the value of data may decay quickly. The rate of decay may exceed the rate of
    availability. The Netflix prize is a classic example: the company offered a prize
    for a substantial improvement in its algorithm that recommends movies based on
    historical customer viewing behavior (DVD-by-mail rentals). After awarding the
    prize, Netflix found that the algorithm was not useful on the new data (video
    streaming behavior). When AI depends on data, the rapid decay of the data’s value
    may actually render the algorithm less useful.'
