  trans: '

    # 数字孪生


    现代制造企业正利用物联网平台从机器及其他来源采集数据，以创建"数字孪生"——即真实物理对象的数字模型（见图 7-3）。数字孪生使我们能够可视化机器在实际运行中的各项指标。机器上的传感器将数据传输至其数字副本，模拟物理机器的运行状态，随后机器学习算法分析这些数字传输的数据，以优化产品性能，并为物理系统推荐下一步最佳操作。借助数字孪生，我们能够预测物理世界的场景、优化资产性能、降低维护成本、减少停机时间服务等级协议，并探索数据变现及构建新服务产品的机遇。


    ![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig3_HTML.jpg](img/467925_1_En_7_Fig3_HTML.jpg)


    图 7-3


    数字孪生的概念视图


    本质上，数字孪生是物理系统、数字镜像以及连接两者的底层数据的融合体。


    ## 数字孪生如何带来变革性的业务成果？


    首先，数字孪生——更确切地说是物联网、云和人工智能的融合技术——为优化流程以及有效利用机器和资源提供了可能。虽然这些解决方案主要旨在降低生产成本，但客户期望最终产品能包含增值服务，例如仪表盘、使用模式、维护警报等。


    其次，智能设备会获取关于产品在客户现场实际使用情况的广泛数据。当您分析整个装机基础中的这些宝贵数据时，您不仅能推断出单个客户的装机基础模式，还能获得全局视角：其他客户如何使用该产品、他们的成功程度、面临的挑战，以及是否存在以溢价推出新产品或增值服务的空白市场机会。


    第三，由于您现在销售的不仅仅是机器，而是"机器即服务"，您可以改变整个商业模式——如果您能保证客户产品和服务的质量，他们就不会介意支付溢价保险费。借助数字孪生，您可以衡量机器的健康状况和性能。您能够远程管理这些机器的使用情况，并预测可能的故障。您能够监控机器利用率，并推荐更好的产能规划和生产计划等。所有这些洞察意味着您实际上可以在客户的业务成果中扮演更重要的角色，如果您能承诺减少停机时间服务等级协议，客户当然愿意向您支付溢价。


    ## 如何为您的业务制定盈利的数字孪生战略？


    如果您是一家纯粹的工业制造企业，您有三个选择：


    *   **成为赋能者**：开始开发并将物联网技术（如端点网络、边缘计算和云基础设施）嵌入到您的产品和解决方案中。这将使您能够向客户交叉销售数字孪生组件，从而获得市场份额。而您的客户则需要借助外部帮助来构建内部能力，以设计适合他们的数字孪生架构。但需要注意的是，这个市场将被少数能够以极低成本提供完整技术栈的全球巨头所主导。


    *   **成为参与者**：除了制造配备传感器和计算能力的世界级产品外，您还可以涉足为客户设计、创建、集成和交付增值服务。增值服务可能包括添加实时仪表盘、历史机器性能趋势、基于阈值的警报通知等。这些产品可能不会给您带来显著优势，因为传统软件公司专精于提供此类能力；然而，通过为物理机器提供数字服务，您无疑能够加深与客户的亲密关系。


    *   **成为增强者**：此处的目标是提供丰富的最终用户互动，并利用客户自身及第三方来源的数据提供新服务。这正是数字孪生、数据变现和新收入模式发挥作用的地方。增值产品需要针对特定机器和特定行业，以提高其他企业复制的门槛。

    '
- fmt: "# What Is Your Intelligence of Things Strategy?\n\nThe use cases involving\
    \ AI and IoT convergence are evolving so rapidly that in a short span of time,\
    \ almost all “dumb” devices will have to become intelligent.\n\nHere are a few\
    \ considerations to keep in mind for your intelligence of things architecture:\n\
    \n- There will be an ensemble of many IoT devices and they need to communicate\
    \ and work together throughout the organization. Depending on the product and\
    \ services, this ensemble may be with a person (with wearables or personal devices),\
    \ a house, a vehicle, a project, or a factory.\n- The number of devices and the\
    \ number of manufacturers will proliferate. Consequently, there will be no standard\
    \ way to achieve machine-to-machine communication. Hence, choosing the right cloud\
    \ partner will be crucial so that the devices can work together in a roundabout\
    \ way of machine-to-cloud-to-machine. There will be a need to establish “APIfication”\
    \ of devices as well.\n- An integrated view of data across IoT and other enterprise\
    \ data sources, as well as external data such as weather patterns, is required\
    \ to achieve the full potential of prediction and autonomous decision.\n\nSimilarly,\
    \ here are a few considerations to keep in mind for identifying the opportunities\
    \ for innovation with IoT, the cloud, and AI:\n\n- **Customer experience**: Identify\
    \ possible innovation on the customer experience side by reimagining how a customer\
    \ uses a product or service and how the ultimate value to the customer is created,\
    \ distributed, consumed, and serviced. Is there an opportunity for a better customer\
    \ journey by collecting new data, adding to the mix of existing processes data\
    \ and creating new processes and partnerships?\n- **Product and services**: Identify\
    \ possible opportunities for a product to provide more value for users by leveraging\
    \ a combination of IoT, the cloud, and AI (with the mix of infrastructure, processes,\
    \ policies and people). Imagine new features to the product or enhance current\
    \ features to perform better. This is more about the function and form factor,\
    \ and not about the enabling technology.\n\n    On the services side, identify\
    \ the opportunities on the service and the ultimate consumption by customers,\
    \ i.e., how, what, and when a service is offered and consumed. Imagine if a product\
    \ were to be transformed into a service.\n\n- **Enabling technology**: Innovation\
    \ on the enabling technology is not necessarily specific to a product or service,\
    \ but it’s more about the adoption of technology to deliver on the reimagined\
    \ customer experience, product, or service and business model. This is where the\
    \ mix of IoT, AI, and the cloud and its adoption for your specific business needs\
    \ to be carefully evaluated.\n- **Business model**: Identify the opportunity to\
    \ enhance the current business model to create and deliver value to existing customers\
    \ (or entirely new customer base), by putting it all together. Imagine a new customer\
    \ experience with new or enhanced products and services created by adopting and\
    \ enabling a technology mix of IoT, the cloud, and AI.\n\nFigure [7-4](#467925_1_En_7_Chapter.xhtml#Fig4)\
    \ shows AI and IoT convergence use cases across industries.\n\n![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig4_HTML.png](images/467925_1_En_7_Chapter/467925_1_En_7_Fig4_HTML.png)\n\
    \nFigure 7-4\n\nIoT analytics value chain\n\nHere are a few more industry-specific\
    \ examples.\n\n- **Aircraft**: For airlines, zero downtime means higher revenues.\
    \ Today, aircraft engine manufacturers are fitting millions of sensors, and the\
    \ main goal is to not only understand how the aircraft is performing during each\
    \ flight but also to become predictive about engine wear and tear. The result?\
    \ Higher safety and fewer downtimes.\n- **Oil rigs**: The machines deployed for\
    \ drilling are capital intensive, thus the oil companies must keep improving on\
    \ their operating costs. When these machines break down, companies incur huge\
    \ losses, but it’s not economically viable to keep expensive machines on standby.\
    \ The solution? Make the machines smart so that their utilization, performance,\
    \ and conditions can be continuously monitored and analyzed. Predictive maintenance\
    \ and conditions based monitoring significantly reduces operating costs.\n- **Manufacturing**:\
    \ Manufacturers are investing to make their factories and plants smart so that\
    \ their machinery and assembly lines can lead to the creation of autonomous factories\
    \ in the future.\n\nWhile at one end, the convergence of IoT, AI, and the cloud\
    \ enables businesses with stronger value propositions, both in the B2B and B2B2C\
    \ space, there are several challenges that businesses need to be aware of, especially\
    \ in the context of managing the volume, velocity, and variety of data. Every\
    \ disruption establishes newer opportunities and markets that did not previously\
    \ exist; however, instead of taking the plunge, you need to assess what is relevant\
    \ to your industry and define your own intelligent of things strategy.\n\n## Best\
    \ Practices to Develop Your Intelligence of Things Strategy\n\n### Develop and\
    \ Articulate Your Own Value Proposition\n\nIoT and AI, combined, present a broad\
    \ range of transformative opportunities. However, you need to carefully evaluate\
    \ use cases before succumbing to the lure of putting sensors in everything and\
    \ expecting magic to happen. IoT as a technology is still maturing; there are\
    \ issues in connectivity all the time, and sensors may get damaged or malfunction\
    \ due to harsh weather conditions. They may also just stop responding due to power\
    \ fluctuations, hence success of your IoT initiatives depends on how well you\
    \ have evaluated the whitespaces, complementary technologies available in the\
    \ market, and the problems you are going after.\n\nYou need to develop a good\
    \ understanding of the megatrends and competitive forces at play in your industry.\
    \ What are the analysts saying about the application of IoT in your industry?\
    \ At which point in the value chain are the customers getting frustrated? What\
    \ additional data or which events, if made responsive, will significantly improve\
    \ customer experience? Taking these data points, you need to develop your own\
    \ SWOT analysis and business cases for your IoT initiatives.\n\n### Evaluate Customer\
    \ Needs\n\nFor any business, it is crucial to get as many details about customer\
    \ needs (explicit or implicit) as you can. In case of IoT, being an unchartered\
    \ territory and novel, you need to go beyond the typical customer survey type\
    \ of approaches and adopt a wide range of techniques, such as customer personas\
    \ and customer journeys, to develop a roadmap of offerings and services that will\
    \ be well accepted in the market.\n\n### Conduct Value-Chain Analysis and Profitability\
    \ Analysis\n\nThe next step is to create a value-chain analysis and profitability\
    \ analysis of your industry. Instead of taking a narrow constraints based view\
    \ of your business, you should take a broad view of the industry. In some cases,\
    \ this may result in diversifying to create a completely new line of business,\
    \ but that is the key to come up with a competitive edge and differentiations.\n\
    \n### Collaborate to Partner\n\nIt would be foolish to think and act as if you\
    \ will have the wherewithal to do everything on your own. The technology is evolving\
    \ at a rapid pace, customer needs are changing every day, and the market trends\
    \ have significant implications. It is important to understand the solutions providers\
    \ in your market and monitor their progress and challenges. This map will provide\
    \ you with enough clarity to collaborate and partner in scenarios where you can\
    \ gain speed to market with less cost."
