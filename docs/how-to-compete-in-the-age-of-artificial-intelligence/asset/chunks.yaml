- fmt: '### Establish Change-Management Programs


    Intelligent automation will change the way we have worked so far. For sure, many
    traditional jobs will lose its relevance and understandably there will be resistance
    from employees. Change-management programs are critical to address several challenges:


    - Managers need to be trained to oversee processes in which robots and human work
    together.

    - Employees need to be trained to adopt Agile methods, especially when they have
    to match the speed of machines.

    - Executives need to be trained to establish clear guidelines around segregation
    of responsibility between human and machines.

    - The company at an overall level needs to establish new communication channels
    to manage the employees’ concerns around job loss and launch new programs to introduce
    new jobs (EQ skills, new technology skills).


    Intelligent process automation is a gift and a riddle. It’s a gift because it
    ensures fast payback if properly implemented, and it’s a riddle because there
    are no such guidelines or precedents of how to successfully manage machines and
    humans that are working in tandem in the same environment. Next, we have made
    an attempt to outline how you would approach your intelligent automation journey.
    These are some of the best practices to help you define your own journey.


    ## Your IPA journey: The First 100 Days


    **Days 1 to 30: Raise awareness, align functions, and mobilize, including strong
    top-down sponsorship:** The first 30 days is all about engaging with your business
    executives and IT leaders and aligning expectations. Success of IPA initiatives
    is less about robustness of the technology solution. It is more about establishing
    a strong change-management plan and raising awareness across business and IT functions
    of how IPA will bring efficiencies into the organization. You must have a master
    plan that details the initiatives, the timelines, the extent of disruption or
    impacts expected, the change-management plans against each initiative, who is
    in charge of each initiatives, and so on. If your IPA roadmap is organized around
    the complete end-to-end process (starting from loan origination to final loan
    disbursement), instead of being organized around tasks (for example, a loan approval
    task), it will give you a holistic picture of how much automation you can achieve,
    where you still need human involvement, and what business outcome you will be
    delivering.


    **Days 30 to 60: Assess opportunities and conduct proof of concepts:** Every organization
    is under pressure to deliver strong margins and introduce efficiency levers into
    their operations. Hence, it won’t be surprising to see every business function
    clamoring with lists of processes they want to automate. If you ask them to prioritize,
    they might vociferously declare that each one of their initiatives is a top priority.
    Hence, you need to quickly decide on a methodology (from assessment to deployment)
    that will work in your organization. You need to create an objective-based framework
    for assessing and prioritizing automation opportunities. This will not only help
    you manage the mad rush for automation effectively, but will also help you identify
    quick-wins that can deliver business value early in your IPA journey. Beyond the
    high-level process automation maps, you must go down a few steps deeper to conduct
    proof of concepts to assess the complexity and usefulness of automation for a
    few of the identified automation opportunities. This will help you get a feel
    of the tentative timelines and any other technology you need or functional gaps
    you have. Most importantly the proof of concepts will give you a good enough opportunity
    to socialize the findings with business executives and IT leaders about the progress
    of your IPA journey.


    **Days 60 to 100: Establish governance model and begin development at scale:**
    Once you are through with your proof of concepts and have a good enough sense
    of which product, tools, and processes you will go with, you need to fire on all
    cylinders to progress in your automation journey. At any point in time, you will
    probably have different processes at different lifecycles. Some will be at the
    requirement stage, some at the development stage, and some at the change-management
    stage. It is critical to have a governance model in place to address dependencies,
    bottlenecks, escalations, course corrections, etc. Infrastructure requirements
    will become a critical element to move into production at scale, beyond the first
    100-day period. You need to define and start building an IPA CoE that will provide
    critical guidance around infrastructure planning, standards, best practices, technical
    and functional reviews, etc.


    Your IPA journey does end with deploying bots into production. In fact, the journey
    starts after deployment. You need to track and monitor the effectiveness of your
    bots are determine whether they are delivering the business objectives. The success
    of the first few deployments needs to be spread across your organization so that
    the rest of the fence-sitters will get motivated to be part of the IPA journey.
    You will need “automation evangelists” to champion the IPA objectives.


    Now, if your CEO is asking you to come up with an operating model to put the company
    on the IPA journey, keep in mind that the operating model needs to be anchored
    around a few key elements that will allow the successful completion of tasks by
    the key stakeholders. These elements are critical in designing a flexible, yet
    robust IA program.'
