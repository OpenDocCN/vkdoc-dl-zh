- fmt: '# 4. Inside the Black Box: Understanding AI Decision Making


    AI’s ability to keep improving its predictive capabilities just by learning from
    the data and without significant involvement from humans to explain exactly how
    to accomplish the tasks is a big deal. Why?


    Two reasons. First, we have a lot going in our brains but we can’t explain exactly
    how we’re able to reason, differentiate, adapt to changing environments, and use
    experience to solve problems we have never encountered before. Until AI, our attempt
    to come closer to human-level thinking involved complex “If-then-else” style of
    programs to solve problems. This approach is neither scalable nor adaptive to
    changing conditions.


    Second, AI systems are excellent learners. They learn from data, they learn from
    validations done by humans, and they learn when they are penalized for wrong predictions.
    There is very little coding involved to give AI these kind of learning capabilities.


    The term artificial intelligence (AI) implies a machine that can reason. A more
    complete list of AI characteristics is:


    - *Reasoning*: The ability to solve problems through logical deduction

    - *Knowledge*: The ability to represent knowledge about the world

    - *Planning*: The ability to set and achieve goals

    - *Communication*: The ability to understand written and spoken language.

    - *Perception*: The ability to engage with the world through vision, sound, and
    other sensory inputs


    There are three major classes of AI based on their problem-solving capabilities.


    ## Artificial Narrow Intelligence (ANI)


    Also known as “weak AI” because the problem definition is narrow. The AI that
    beat the world chess champion is an example of ANI. It is very good at playing
    chess, but that’s the only thing it does. If you asked the AI specialist in chess
    to give you driving directions from point A to point B, it would look at you blankly.
    There could be another AI specialist to help you with driving directions, but
    it can’t help you with chess.


    You can imagine that ANI has a specific purpose and has intelligence that is confined
    to one area, and mostly one or a few specific goals. Intelligence here is more
    often defined by the ability to work alone rather than (current/gradual) self-improvement.


    At the moment, we use hundreds narrow AIs in real life. Siri, Google, Facebook,
    self-parking and self-driving cars are more sophisticated (intelligent) narrow
    AIs in action. You can also find weaker AIs, like watches that can change time
    zones based on your location or automatic temperature control in your house based
    on weather conditions outside.


    Here are a few more examples of ANIs in our daily lives:


    - Modern cars are full of ANI systems, from the automatic anti-skid mechanism
    to alerting you about sudden loss of tire pressure to giving you an indication
    that there is another vehicle in your blind spot. Self-driving cars, on the other
    hand, is an example of sophisticated ANI system that not only engages with all
    the mechanics of a car and drives the car for you but also interacts with the
    outside environment to make decisions on your behalf—when to stop, when to maintain
    a safe distance, when to change lanes, etc.


    - Your smart phone consists of a lot of weak ANI solutions, from a shopping app
    that recommends purchases to real-time driving directions from point A to point
    B, to getting weather updates, to listening to your preferred music list, to engaging
    in a conversation with your phone, and many more apps that organize your everyday
    activities.


    - Microsoft outlook or Google’s Gmail are intelligent ANIs. They come pre-built
    specialized in classifying what’s spam and what’s not. They are continuously working
    in the background observing your actions and preferences to classify what you
    consider as important, junk, and spam.


    - Amazon’s “People who bought this also bought…” recommendation system is a continuously
    learning ANI system that gathers information from the buying patterns of millions
    of customers and then personalizes that information to influence you to buy more
    things.


    - Google offerings like search, Google translate, and Google news are examples
    of sophisticated ANI systems specializing on content. The same goes for Facebook’s
    newsfeed.


    - There are a few more examples of ANI systems even though they specialize in
    solving only one problem but they go really deep into that domain. Security systems,
    automated manufacturing, algorithmic trading in capital markets, expert systems
    to help doctors make diagnoses, and, most famously, IBM’s Watson, which contained
    enough curated information to beat the most prolific *Jeopardy* champions.


    ## Artificial General Intelligence (AGI)


    Also known as “strong AI,” this is an AI system that can perform any intellectual
    task that a human being can. We are far from creating AGI systems because intelligence
    is a complex thing and it largely involves reasoning, ability to adapt, and mental
    capability. Thus, if AGI has to exist, it has to do everything that humans do—use
    strategy and make judgments under uncertainty, concentrate knowledge, including
    common sense, plan, learn, communicate in natural language, and then combine all
    these higher-order skills to solve problems and attain goals. This is a tough
    ask!


    ## Artificial Superintelligence (ASI)


    Everything that goes beyond AGI is ASI. The ASI systems are smarter than the best
    human brains in practically every field, including scientific discovery, creativity,
    general knowledge, and social interaction.


    As of now, we have only reached the lowest class of AI. The road from ANI to AGI
    to ASI will require tremendous amounts of technology evolution. For sure, it will
    be an exciting journey, but a journey that will challenge the very existence of
    humans.


    ## Categories of Learners


    Machine learning algorithms “learn” to make predictions. The approach they take
    to learn is solely driven by the type of problem you want to solve.


    ### Supervised Learning


    You have a target or a class to predict. For instance, let’s say you want to predict
    “who is going to attrite?”. Then your model will be trained on historical data,
    where you have labeled attrition status against each customer. The algorithm looks
    at various patterns hidden in the data to map to the customer status (attrition
    = yes or no). This process of mathematical abstraction of learning from data to
    arrive at the desired outcome is called *supervised learning,* because it knows
    what to learn.


    The key principles to know are:


    - The training data set contains the predictors and the output you want to predict.

    - The learner will use the training data set to determine a map between the predictors
    and the output.

    - Once the learner learns the map, it can then be used on new data with some accuracy.


    Here are a few examples:


    - Input (Voice Recording) – Output (Transcript) – Application (Speech Recognition)

    - Input (Photograph) – Output (Caption) – Application (Image Tagging)

    - Input (Store Transaction Details) – Output (Is the Transaction Fraud?) – Application
    (Fraud Detection)

    - Input (Recipe Ingredients) – Output (Customer Reviews) – Application (Food Recommendations)

    - Input (Past Purchase Data) – Output (Future Purchase Behavior) – Application
    (Recommendation System)

    - Input (Vehicle Location and Speed) – Output (Traffic Flow) – Application (Traffic
    Management)'
