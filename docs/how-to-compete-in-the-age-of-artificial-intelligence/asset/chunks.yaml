  trans: '

    ## 你的 AIOps 策略是什么？


    IT 运维始终需要确保 IT 性能管理中的稳定性和可用性。这导致了对机器学习（`ML`）等前沿技术的谨慎采用。通常，供应商会通过针对特定用例的工具来实现这些技术。


    大多数 IT 部门都未能制定出全面的、企业级的分析和机器学习策略。在工具、知识和专业技能方面面临的挑战过于艰巨，而且还有太多其他更紧迫的需求。在数字化转型中，IT
    即业务。IT 需要平衡性能管理的传统需求与创新业务的需求。为此，IT 必须打通 IT 与业务数据孤岛，并利用机器辅助来管理不断变化的客户需求和技术变革。


    移动性、客户期望的“消费化”、弹性云基础设施、快速变化的应用程序技术以及持续交付，都对 IT 提出了新的要求，而这些要求无法用旧方法满足。大数据已经足够成熟和商品化，能够支持所需的海量且不断增长的实时数据处理。API
    和开放数据平台的普遍采用，使得过去被封锁在工具和数据库中的关键信息得以共享。机器学习在我们的技术和文化中已经成熟且无处不在。


    Gartner 估计，到 2020 年，50% 的企业将积极使用 AIOps 平台来洞察业务执行和 IT 运维。IT 不一定需要改变他们所做的工作；他们只需要在更广泛、更复杂的生态系统中，以更少的人工干预，更快地完成这些工作。


    以下部分讨论了我们推荐的策略。


    ### 建立工具和流程以实现系统拓扑的自组织


    随着运维各个领域随时间推移发生变化，部署能够持续监控和发现整个 IT 系统拓扑及其关系，并保持集成拓扑视图更新的工具至关重要。这种依赖关系视图和知识是加快发现速度、加快根本原因分析以及更好地评估
    IT 系统格局中热点/瓶颈的关键。


    ### 建立实时数据探索与报告


    服务台工单工具通常为管理层和高管提供报告功能。大多数实现都附带一组开箱即用的标准报告，允许管理员构建新的自定义报告，并且允许个别报告用户更改视图和参数以满足其需求。现在，大多数工具还提供调度功能，以及从报告查询中生成可共享演示文稿的能力。如果你的组织有纪律进行定期评审，每个人都将报告带到会议上，并且你可以花时间进行关联、核实、审查、讨论，并带着可衡量的行动计划离开，那么这就足够了。如果你的业务、市场和竞争需求不允许你这样使用时间和资源，那么它的效用就会大大降低。更好的方法是，将所有必要的数据放在一个易于使用的探索工具中，该工具可供组织中的每个人使用，并实时更新。这允许所有利益相关者查看顶层（高管）视图，并动态地共同调查有趣的趋势、异常或问题，而无需整理报告或运行新报告。


    ### 利用自然语言处理（NLP）消除人工分类


    报告和事件管理依赖于分类这一基本组织原则。每个工单都根据来源、流程等分配了结构化属性。路由、所有权以及最终的报告都依赖于用户、系统或分类人员分配的类别，这些类别通常反映了“描述”或“问题”等自由文本字段中的内容。


    在 IT 领域，这种分类模型存在缺陷是一个众所周知但很少讨论的事实。用户没有耐心、纪律或知识来准确地自行分配分类和优先级。分类代表了由内而外的业务视角：IT
    认为重要的是处理问题，而不是用户认为重要的是如何描述问题。IT 部门会一次性构建类别层次结构，并随着时间的推移对其进行迭代，而不会进行合理化或精简选项。任何足够成熟的
    IT 部门都会有成百上千种可能的分类，其中包含过于宽泛、过于狭窄、无意义或不相关的条目。顶层类别永远是“其他”。此外，无论是用户还是系统分配的静态分类，都无法捕捉到新出现的情况。因此，使用分类进行报告或智能路由实际上是不可能的。最常用的补救措施是简单的蛮力重新分类：员工或承包商资源阅读工单描述以纠正或添加分类。这既不必要地昂贵、不一致且效率低下。


    解决这个问题的现代分析方法将使用由机器学习支持的自然语言处理（`NLP`）来处理工单的自由文本。可以应用分类，但更有效的方法是完全绕过分类，根据环境中实际发生的情况，动态更新和更改问题聚类。自然语言处理无处不在。从移动设备上的预测输入和文字处理程序中的语法检查等简单应用，到
    Google 搜索中的自动更正和去重或 Taleo 中的简历处理等复杂实现，都是其应用。聊天机器人作为人工智能的下一个“日常”实现，依赖于 `NLP` 才能工作。`NLP`
    需要成为每个 IT 工单和事件管理策略的支柱。


    ### 在企业范围内实施机器学习


    机器学习（`ML`）是一种人工智能（`AI`），它赋予计算机无需明确编程即可学习的能力。换句话说，`ML` 是计算机系统无需直接人工干预即可从数据和计算结果中学习的能力。这样理解的话，`ML`
    并不是要创造或生成全新的东西。它是在领域知识和实践的基础上，在该背景下实现自动适应。在 IT 领域，我们希望使用 `ML` 来模仿我们最优秀的领域从业者所做的事情，但速度更快、更一致，同时将这些从业者解放出来从事更高价值的工作。以上一策略中的
    `NLP` 为例。如果我们在自由文本字段的 `NLP` 处理上使用机器学习，我们不会期望系统在没有语言词典和语法，也没有可忽略单词列表（例如“或”、“的”等）的情况下进行学习。通过编程输入这些信息，系统就可以开始从数据中学习哪些单词出现最频繁以及以何种组合出现，同一事物的不同变体如何表达，甚至通过上下文来确定单词何时拼写错误。


    这些都是人类可以做到的事情。在 IT 环境中实施 `ML` 应以自动化涉及学习的人类任务为目标。这些任务通常是具体且集中的：监控活动并发出警报/通知、分类、路由、可能原因调查、容量建模和预测等。鉴于当前的技术和
    IT 领域知识水平，实施 `ML` 来接管这些任务是可行的。这样做将释放你的人力资本，用于其他增值活动。

    '
- fmt: '### Bridge Data Silos and Disciplines to Unlock Hidden Insights


    Previously, we talked about the virtues in moving from static reporting to dynamic
    data exploration. The greater amount and diversity of data that can be included,
    the more powerful and meaningful discovery and analysis becomes. It is important
    to not just bridge IT data silos (service management and operations), but also
    to bring together data from IT and business.


    Fundamental to this approach is creating an integrated and collaborative relationship
    between incident management and IT operations. Operations has its own challenges
    in bridging the divide between performance management tools, but the need to connect
    the real user experience captured in service tickets with performance metrics
    and events can’t be overlooked.


    The two levers IT has to pull as ticket volumes and complexity increase are to
    a) get faster or b) prevent issues in the first place. Traditional strategies,
    analytics, and tools are typically focused on a. This is necessary, but still
    reactive. A few IT shops have an effective problem management practice. Lack of
    staffing, expertise, resources, or insights, exacerbated by organizational silos
    with different incentives, means robust problem management is rare. See Figure
    [8-2](#467925_1_En_8_Chapter.xhtml#Fig2).


    ![../images/467925_1_En_8_Chapter/467925_1_En_8_Fig2_HTML.png](images/467925_1_En_8_Chapter/467925_1_En_8_Fig2_HTML.png)


    **Figure 8-2** Illustrative roadmap for AIOps implementation approach


    The strategies discussed will help create shared understanding and collaboration
    that will dramatically improve your organization’s ability to respond. That, however,
    will not be enough to deal with the scale, speed, and unpredictability of digital
    transformation. IT must leverage these strategies to actively engage in proactive
    problem identification and remediation. Machine learning and cross-pillar analytics
    will reveal common problems driving incidents and create the space for organizations
    to engage in preventive automation and process improvement. This must be part
    of any incident management analytics initiative.


    ## Conclusion


    There are no quick, easy solutions to enable a business to match the pace of digital
    transformation, let alone be successful at it. Tasked to keep the lights on, IT
    operations has always been a conservative practice, because the primary business
    expectation is that the IT operations team should only support the business—nothing
    more, nothing less. However, if a business is to digitally transform, the IT team
    must transform as well.


    The IT operations teams must learn more about their environment, the new technologies,
    and their implications. The learning mindset will encourage IT operations professionals
    to move away from a “support” only task to an Agile participant. The potential
    of automated and machine-assisted collection and interpretation of data are foundational
    capabilities of AIOps that can deliver results that far exceed what the IT operations
    team working on their own could achieve.


    The application and service environments are converging as end users demand faster
    and more reliable user experience. The IT operations personnel should see their
    roles as facilitators of business and AIOps becomes an invaluable platform for
    enabling new methods of ensuring efficient support operations.


    All forms of AI and analytics require a consistent, unified, and quality assured
    data set. The data to become useful must cross the systems and application silos
    and integrate a variety of sources from across the network. If it is not, the
    data collected will not be representative of the network’s condition, and the
    resulting analytics, suggestions, and actions will be incomplete. The effectiveness
    of AIOps will be highly dependent on quality and completeness of data. If systems
    and network data are arranged in siloes, or multiple tools are used to collect
    the data, it will be an uphill task that limits collaboration, hinders communication,
    and slows down responses from the IT operations team.


    In this chapter we discussed the conflict that exists between the innovation requirements
    and the support requirements and how AI can transform the traditional IT operations
    approach to a highly responsive and integrated AIOps. In the next chapter, we
    discuss an interesting concept—algorithmic companies and decentralized autonomous
    organization (DAO).


    # 9. Decentralized Autonomous Organizations = Blockchain + AI + IoT


    Blockchain, AI, and IoT are all technology disruptions: Blockchain promotes decentralized
    applications in an open-data environment, AI provides intelligence through a centralized
    data and analytics platform, and IoT enables devices/machines to be connected
    via a centralized cloud storage and processing service.


    In the previous chapters, we discussed AI and its influence and the potentially
    explosive value generation if combined with IoT, RPA, and IT operations. In this
    chapter, we discuss another aspect of AI in a highly decentralized environment
    and how, if combined with blockchain technology and IoT, it can deliver far-reaching
    and amplified outcomes.


    First, let’s have a quick overview of blockchain.'
