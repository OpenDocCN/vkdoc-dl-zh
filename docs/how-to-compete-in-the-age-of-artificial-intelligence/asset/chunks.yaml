    # 奇点


    我们该如何管理超级人工智能系统？


    人类的进化几乎完全归功于我们的智慧以及适应不断变化的环境的能力。然而，在我们热衷于发明越来越多超级人工智能系统时，可能会陷入这样一种局面：机器成为地球上最智能的生命体，远超人类！这种状态被称为“奇点”。


    我们面临的伦理问题是，即便这还很遥远，但总有一天，一台足够先进的机器可能会获得生命，而这台机器将能够预知我们的预判，那么我们该如何保持领先一步呢？


    # 机器权利


    我们该如何为人工智能定义法律框架？


    我们已经看到，奖励与厌恶机制如何在人类生活中扮演决定性角色。强化学习尤其应用了一种虚拟的风险与奖励机制，让人工智能体学习并适应环境。


    我们面临的伦理问题是，一旦机器作为实体达到足够的成熟度，能够自主地看、感知、思考和行动，它们就会要求建立法律框架来保护和管理其应享有的权利。智能机器应该被像人类一样对待吗？它们应该拥有平行的法律和申诉系统吗？当人工智能体因不当行为受到惩罚时，我们该如何提供支持系统，使其理解错误并保持在未来做得更好的动力？当机器做对了所有事情，而“人在回路中”却成为障碍时，我们又该如何解决？


    # 董事会与 CEO 在伦理人工智能中的角色


    人工智能的预测措施旨在提供预期的结果。在现实世界中，这是唯一重要的方面。然而，正如人类不完美、主观且易腐败一样，机器也是如此。换句话说，尽管有既定的法律和协议，我们社会中的不良行为者总能找到操纵系统的方法。同样，人工智能的实用性也容易被人们用于恶意或自私的目的。风险正越来越高。


    因此，公司，尤其是那些拥有海量数据访问权限并开发和部署人工智能产品与服务的公司，不仅应要求工程师、企业家和高管具备更负责任的工作伦理，还应建立更具决断力的董事会和委员会，将伦理人工智能作为其首要战略重点。


    ## 董事会的角色


    传统行业的公司在定义企业伦理时，会参考数十年的法律、法规和诉讼案例来寻求指导。然而，对于像人工智能这样具有变革性和颠覆性的事物，并没有先例可循。规范和标准仍在形成中；法律、法规和判例都很少。这就是为什么董事会必须成为人工智能企业伦理的积极倡导者，将其与增长、盈利能力、并购目标和继任规划等其他关切事项并列为首要任务。


    董事会应要求 CEO 将人工智能伦理作为企业优先事项。例如，董事们不应仅凭表面陈述就相信公司的人工智能产品与举措不会无意中助长偏见。相反，董事会成员应规定，人工智能产品与举措必须持续接受压力测试，以发现人工智能偏见并采取补救措施。


    ## CEO 的角色：人工智能伦理的卓越治理


    CEO 可以通过三种方式建立其人工智能伦理与治理的审慎性。


    首先，CEO 应加强并扩展自身知识，涵盖从人工智能偏见到透明度和问责制最佳实践等议题。他们还应对公司人工智能产品与服务的影响有深刻认识，包括数据来源以及算法的性质/类型。CEO
    还应设立专门的智库，收集全行业关于人工智能伦理相关诉讼、客户提出的关切以及政策制定者观点的信息。这将有助于 CEO 在整个企业内进行管理层简报，并提高认知水平。


    其次，CEO 应在其智库中纳入高级顾问，他们能就人工智能对董事会的影响带来额外视角。例如，如果你的公司提供与人力资源相关的人工智能产品与服务，那么引入一位高级顾问来严格审查与多样性、包容性、劳工和民权法规相关的偏见是否得到充分消除，这一点至关重要。


    第三，CEO 必须认识到，伦理人工智能不能是事后才考虑的事情。应在人工智能系统开发过程的核心中内置足够的制衡机制，以确保技术专家不会在开发人工智能系统时忘乎所以，而忽视了让人工智能变得透明。我们不能忽视部署那些一方面表现异常出色，但另一方面却无法完全解释的人工智能系统所带来的风险。因此，CEO
    必须确保企业配备了正确的工具、方法和审查机制。


    ## 技术专家的角色


    技术专家和人工智能专家必须关注人工智能系统的目的和目标。说“算法非常复杂，但数据有偏见”很容易。现实世界的数据总是有偏见的，因为它具有情境性。人工智能专家的责任是充分理解数据背后的背景，然后设计出支持人类价值观的算法。


    # 结论


    将追求人工智能的公平性与商业利益脱钩，并为公平、透明的人工智能解决方案创造空间，这一点至关重要。为此，让人工智能具有可解释性至关重要。


    那些基于人工智能颠覆性力量构建商业战略的公司正陷入两难境地：让它们的人工智能透明化，成本和收益是什么？它们如何保护自己的知识产权和竞争优势？


    诚然，目前存在一些经验法则或最佳实践。或许，对于每个人工智能系统，如果我们能详细说明所使用的数据类型、数据来源的细节、预测模型开发中使用的参数、达到的准确率以及关于假阳性和假阴性的统计数据，我们或许能达到一个普遍认可的透明度水平，这进而可能为伦理人工智能建立一套普遍可接受的标准。


    在本章中，我们讨论了人工智能后果的几个相关伦理观点。在下一章中，我们将汇集前几章的所有经验教训，并尝试确立构建人机协作生态系统的某些方法。

    '
- fmt: '# 11. Putting It All Together: Toward a Human-Machine Collaborative Ecosystem


    British botanist Arthur Tansley in the 1930s developed the concept of the ecosystem,
    inspired by how a localized community of living organisms interact with each other
    and use the environment to sustain, thrive, and even adapt to changes in the environment.


    In 1993, James Moore extended the concept to modern business, where companies
    co-evolve capabilities, work cooperatively and competitively to support new products
    and satisfy customer needs, and eventually fuel the next round of innovations.


    Earlier we discussed how the economy has moved beyond large “self-contained” corporations
    to network based companies, enabled largely by digital technologies, abundance
    of data, massively increased connectivity, and cloud computing, Apple Inc. explicitly
    designed its products and services as an ecosystem that would provide customers
    with a seamless experience; eBay recognized the emphasis it had to place on deliberately
    building its “sharing ecosystem”. Value creation (wealth creation) have taken
    altogether a different meaning; denser and richer networks where the producers
    and consumers collaborate to magnify the outcomes for both. For example, who would
    have thought that platforms to help us connect to our own tribes (Facebook, Twitter,
    and WhatsApp) would yield significant business values, after all, these are just
    people connecting with people systems.


    Our needs have always driven the means. We were concerned about our wellness,
    which drove us to find the means like medical practices, physicians, hospitals,
    pharmacies, etc. Similarly, we wanted to find sources of energy beyond human muscles
    and trained animals, so we figured out a way to derive energy from fossil fuels,
    electricity, coal, and nuclear fusion. Innovations like nuclear power, airplanes,
    automobiles, the personal computer, radio, Internet, etc. disrupted well established
    business ecosystems and the societal way of functioning, and each of these innovations
    can be referred to as *black swans*.^([⁸](#fn8)) These breakthroughs were not
    breakthroughs at the time of their discoveries. They took years in the labs and
    then got to the mainstream only after they became cheap enough for general consumption.
    AI strategy alone might mislead just as much as they inform. We think AI technology
    is another black swan in the immediate horizon and, therefore, if are to truly
    leverage the transformative power of AI, we have no other option but to establish
    and leverage a new ecosystem that is based on human-machine symbiosis.


    ## Human Machine Symbiosis


    In 2011, IBM Watson won the *Jeopardy* game show. That was a watershed moment
    not because the machine beat humans at their own game, but because the possibilities
    opened up our eyes. What followed was a series of striking breakthroughs in AI—image
    recognition, speech recognition, and many more—all possible through a technique
    known as *deep learning*.


    On the other hand, machines becoming smarter than humans has also created considerable
    uncertainty and speculations about our future relationship with machines. Elon
    Musk described AI as “our biggest existential threat”.^([⁹](#fn9)) Stephen Hawking
    warned that “the development of full artificial intelligence could spell the end
    of the human race”.^([^(10)](#fn10)) The philosopher Nick Bostrom, in his book
    *Superintelligence,*^([^(11)](#fn11)) touched upon technological “singularity,”
    at which point machines will surpass the general cognitive abilities of humans.


    All of these debates and speculations are based on a tacit assumption that, because
    machines can see, listen, and act and are continuously learning, they will outperform
    humans at various tasks (although in narrow domains as of today) and by the same
    argument they will soon be able to “outthink” us more generally.


    The important question is, instead of competing with each other, is there a way
    we can orchestrate a mechanism whereby machine intelligence and human intelligence
    complement one another? The ultimate goal would be to build machines that can
    think like humans and design machines that help humans think better.


    Just like any new technology evolution, AI also has gone through quite a few evolutionary
    phases. It is important to understand how it all started and how the very original
    intent was redefined many times.


    In the summer of 1955, a conference was convened by John McCarthy at Dartmouth
    University. The conference was attended by the who’s who of AI pioneers. Popularly
    known as “The Dartmouth Conference Declaration,” the original proposal stated:
    “every aspect of learning or any other feature of intelligence can in principle
    be so precisely described that a machine can be made to simulate it.”^([^(12)](#fn12))


    General intelligence (also known as the `g` factor) refers to the existence of
    a broad mental capacity that enables an individual to perform different cognitive
    tasks, for example, an individual’s performance on one type of cognitive task
    (say, the ability to draw nature and sceneries) tends to be comparable to the
    same person’s performance on other kinds of cognitive tasks (say, the ability
    to draw architectural diagrams). This particular general intelligence capability
    we don’t see in today’s AI applications. An algorithm designed to play chess would
    be completely at sea if it were asked to give product recommendations. In short,
    the `g` factor of today’s AI agents is confined to a narrow type of intelligence.


    In addition, terms like “neural networks” and “deep learning” are falsifying the
    claim that we are on the verge of creating machines that “think like humans do”.
    While the neural net is inspired by the human brain, in reality it is regarded
    as a generalization of statistical regression models. Similarly, “deep” refers
    not to psychological depth, but the addition of structure (“hidden layers”) that
    enables a model to capture complex, nonlinear patterns. “Learning” refers to numerically
    estimating large numbers of model parameters in regression models.


    In short, the astounding success of AI so far has been founded on statistical
    inference, not on an approximation or simulation of what we believe human intelligence
    to be.'
