    # 最终思考


    将人工智能融入企业的四项要务如今或许显得不切实际，但这一进程不可避免。随着 AI 能力的持续进步，更严格的监管将带来更深入的洞察，软件将不断学习，并被视为负责任的智能体，而非冰冷的代码。然而，首席执行官、董事会成员和高级管理人员将扮演关键角色——他们必须密切监控算法，并通过模拟来界定技术的边界。此外，商业领袖应谨慎避免过早开展过多
    AI 主导的活动，因为这可能对责任与问责制产生不可预见的影响。他们必须确保在遵从、授权与方向指引上保持清晰。


    在本书中，我们逐章探讨了 AI 在组织流程、战略、优势与后果中的诸多方面，以及它对身处任何角色的个人意味着什么。在禅宗中，“公案”只是通往终极目标的工具或基石。同样，我们衷心希望本书能成为指引您、帮助您解决所面临问题的工具。


    现在，让我们进入本书第一章，了解 AI 的经济学，包括什么定义了 AI，以及为何其应用如此困难！


    # 致谢


    在本书写作过程中，我们很幸运地得到了众多祝福者、同事和家人的支持。他们扮演了多重角色——合著者、教练，甚至是严厉的批评者——给予了我们巨大的帮助与支持。没有他们的帮助，这本书不可能完成。


    我们还要感谢许多客户、分析师和陌生人，他们耐心倾听我们漫无边际的絮叨、看似愚蠢的问题和疯狂的想法，在不知不觉中为本书做出了贡献。有时他们坦率地承认某些内容不合逻辑，有时他们热烈赞同并鼓励我们继续研究和写作。


    如果没有 Apress 团队（Shiva、Rita 和 Laura）的持续指导，我们撰写本书的努力将付诸东流。衷心感谢你们在整个项目中的支持。


    特别感谢 Apress 的 Rita Fernando Kim 在审阅工作中的辛勤付出，以及确保我们按时推进。


    我深深感激我挚爱的家人——Snigdha、Pratik、Pratyush 和 Rexie。没有他们的爱、关怀和支持，我无法在疯狂的企业世界中生存，更不用说写书了。


    > ——Soumendra Mohanty


    我感谢 Soum（Soumendra Mohanty）给我机会与他合作完成这本书。这是他的创意和他的书，我很高兴能以某种方式做出贡献。对于我的“第一本书”项目来说，没有比这更好的机会了！我还要感谢我的妻子
    Shweta，在我所有的事业中（包括这次）给予的耐心和支持。


    > ——Sachin Vyas


    ## 关于作者


    # 1. 人工智能的经济学


    当三种颠覆性力量（一种新能源、一种新型交通、一种新型通信）协同汇聚时，戏剧性的事情就会发生。商品成本下降，供需平衡被打破，新的商业机会涌现，社会整体受益，我们发现自己正处于一场经济革命的边缘。上一次经济革命由石油（新能源）、汽车（新型交通）和电信（新型通信方式）驱动。同样，如今正在兴起的新经济可归因于数据（新石油）、自动驾驶汽车和数字通信的融合。


    这场新经济的本质具有巨大的颠覆性，因为它正将我们当前基于稀缺性的经济状态（拥有资源者说了算）转向基于共享性的经济状态（能调动资源者说了算）。这主要得益于技术的指数级进步。例如，Facebook——可以说是世界上最大的媒体公司——没有记者或内容生产者。AirBnB——这家酒店公司——不拥有任何房地产。Uber——这家出租车公司——没有汽车。加密货币——充当银行角色——没有分支机构。所有这些公司都有一个共同点：它们都是基于网络的公司，是软件驱动的实体。


    共享富足的经济学核心在于创造机会，使生产额外产品或提供新服务的成本急剧下降，几乎趋近于零。在稀缺经济中成长起来的一代人注重囤积和所有权，而共享经济则基于对信息和服务的访问权，而非所有权。


    换个角度看，如果生产、分销和服务的成本趋于零，这不仅会带来富足感，也会产生相对的稀缺感。为什么？我们可以将这种相对稀缺类比为信息过载的问题。例如，过多的媒体内容（如视频、音乐、文章等），如果能够按需提供，通过你偏好的消费渠道，在你选择的设备上，以极低的成本获取，就可能导致注意力的稀缺。简而言之，新共享经济世界中的相对稀缺通常表现为降低我们的认知能力——人类无法处理从生活各个角度向我们抛来的海量新信息。


    我们最大的挑战和最大的机遇在于如何有效且迅速地完成从稀缺经济到共享经济的过渡。这就是为什么 AI（人工智能）是其中的关键要素。在旧经济中，可负担性促使人们购买车辆，但这造成了基础设施和道路准备的稀缺（进而导致难以忍受的交通拥堵）。现在，在由
    AI 驱动的新经济中，你将更高效地使用车辆（如 Uber），并且会看到更少的车辆所有权。这是因为拥有车辆并忍受交通拥堵已不再合理；人们更愿意选择按需用车。


    让我们看看其他几个场景，了解 AI 的影响如何在共享经济中发挥关键作用。


    ## 自然资源


    自然资源通常受政府监管，政府通过向企业授予资源开采权来获取收入。有法律程序和合同义务来规定和监督企业如何开发这些自然资源。这些评估方法非常原始，并因腐败行为而进一步恶化。AI
    以及物联网和区块链等其他技术可以发挥重要作用，不仅能确保资源消耗和补偿得到追踪，还能在出现欺诈活动时实时生成警报。此外，所有金融交易都可以记录在防篡改的公共账本上，并在消费时强制执行，以消除任何腐败的可能性。


    ## 合作型企业


    在理想的经济环境中，商品和服务的生产者与商品和服务的协调者或分销者应有一个机制来获得合理补偿，即使不能实现利润均分。然而，现实中价值链极不平衡，负责协调的一方获得的利润往往远高于提供实际商品和服务的一方。AI
    无疑可以在恢复某种平衡方面发挥重要作用，它为协调提供平台，并为终端消费者提供分销能力，从而将价值向商品和服务的生产者端转移。

