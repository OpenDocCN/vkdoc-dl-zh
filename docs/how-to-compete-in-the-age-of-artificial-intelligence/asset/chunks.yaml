  trans: "\n# 长短期记忆网络（LSTM）\n\n我们无时无刻不在进行优先级排序，当获得新信息时，我们会立即判断其重要性，然后开始重新调整优先级。事实证明，传统的**前馈神经网络**并不具备这种能力。当加入新信息时，它们会通过重新调整权重来彻底改变现有信息。因此，整个信息都会被修改。总的来说，它们不会区分“重要的”新信息和“不那么重要的”新信息。\n\
    \n在许多现实世界的问题中，记住事件序列对于得出最终预测至关重要。LSTM 是一种新型的神经网络，旨在有选择地记忆或遗忘事物。\n\nLSTM 网络使用称为*记忆单元*的内存块。这些记忆块负责记住信息。对记忆的更新是通过应用不同的机制（称为*门控*）来完成的。\n\
    \n## 遗忘门\n\n遗忘门对细胞状态应用过滤器，以移除学习过程中 LSTM 不再需要的过去信息，或忽略学习过程中重要性较低的新信息。\n\n## 输入门\n\
    \n输入门负责向细胞状态添加信息。这基本上通过一个三步过程完成。\n\n1.  创建一个包含细胞状态所有可能值的输入向量。\n2.  通过调用 sigmoid\
    \ 函数作为过滤器，控制哪些值需要被添加到细胞状态中。\n3.  将过滤器的值与输入向量相乘，并触发激活操作以完成输入操作。\n\n这个三步过程确保了只有重要且非冗余的信息被添加到细胞状态中。\n\
    \n## 输出门\n\n输出门也遵循一个三步过程：\n\n1.  在对细胞状态应用激活函数后，创建一个输出向量。\n2.  通过调用过滤器函数，控制哪些值有资格被视为输出。\n\
    3.  将过滤器的值与输出向量相乘，并触发激活函数以完成输出操作，从而使输出传递到下一层。\n\n# 面向管理者的 NLP 入门\n\n自然语言处理（NLP）是一个专业领域，位于计算机科学、人工智能和计算语言学的交叉点。\n\
    \n通过利用 NLP，我们可以分析文本数据并执行众多任务，例如自动摘要、命名实体识别、关系抽取、情感分析、主题分割等。\n\n从广义上讲，NLP 包含两个具体任务：\n\
    \n-   自然语言理解\n-   自然语言生成\n\n## 自然语言理解\n\nNLU 是理解给定文本含义的过程。它试图通过解决各种歧义来全面理解文本中词语的性质和结构：\n\
    \n-   *词汇歧义*：词语有多种含义\n-   *句法歧义*：句子有多个解析树\n-   *语义歧义*：句子有多种含义\n-   *指代歧义*：先前提到过的短语或词语具有不同的含义\n\
    \n一旦歧义被解决，NLU 会尝试通过使用词典（词汇表）和一套语法规则来推导每个词语的含义，以解决不同词语具有相似含义（同义词）以及词语具有不止一种含义（多义词）的问题。\n\
    \n## 自然语言生成\n\nNLG 是以可读格式自动生成包含有意义短语和句子的文本的过程。\n\n自然语言生成包含三个关键任务：\n\n-   *文本规划*：对内容进行排序以赋予其结构。\n\
    -   *句子规划*：对词语和句子进行排序以体现文本的流畅性。\n-   *实现*：对句子进行语法修正，以表达文本的预期含义。\n\n以下是 NLP 如何应用于文本的一些示例。\n\
    \n-   *句子分割*：识别句子边界，即一个句子结束和另一个句子开始的位置。长句子通常用逗号等标点符号分隔。例如，“I met a friend after\
    \ a long time, we had coffee together.” 可以拆分为两个句子。句子 1 是 “I met a friend after\
    \ a long time”，句子 2 是 “We had coffee together”。\n\n-   *分词*：识别文本中不同的词语、数字和其他标点符号。例如，“My\
    \ car keeps giving me alerts, as the doors are not properly closed.” 可以被分词为 `[My]\
    \ [car] [keeps] [giving] [me] [alerts] [,] [as] [the] [doors] [are] [not] [properly]\
    \ [closed] [.]`\n\n-   *词干提取*：将每个单词的屈折形式简化为一个共同的词基或词根。例如，“Give, Gave, Giving”\
    \ 可以简化为词根 “Give”。\n\n-   *词性标注*：为句子中的每个单词分配一个词性标签，例如名词或动词。例如，“If you build it\
    \ they will come.” 可以被词性标注为：\n    -   `IN`：介词和从属连词：“If”\n    -   `PRP`：人称代词：“you”\n\
    \    -   `VBP`：动词：“build”\n    -   `PR`：人称代词：“they”\n    -   `MD`：情态动词：“will”\n\
    \    -   `VB`：动词原形：“come”\n\n-   *句法分析*：涉及将给定的文本划分为不同的类别。例如，“Soum and Sachin went\
    \ into a bar.” 可以被解析为 `(S(NP(NP Soum) and (NP(Sachin)) (VP(went (PP into (NP a\
    \ bar)))))`\n\n-   *命名实体识别*：识别文本中的人物、地点和时间等实体。例如，“Sachin is traveling to the US\
    \ on Sunday.” 可以被识别为 `[person = Sachin]`、`[location = US]` 和 `[Time = Sunday]`。\n\
    \n-   *共指消解*：找出所有指向同一实体的表述。例如，“Sachin bought a phone. He thinks it is worth the\
    \ money.” 可以被共指为 `[Sachin, He]` 和 `[Phone, it]`。\n\n表 4-1 提供了一份实现常见 NLP 任务的深度学习算法列表。\n\
    \n**表 4-1** 深度学习算法与常见 NLP 任务\n\n| 深度学习算法 | NLP 任务 |\n| --- | --- |\n| 前馈神经网络 |\
    \ • 词性标注 • 分词 • 命名实体识别 • 意图提取 |\n| 循环神经网络（RNN） | • 机器翻译 • 问答系统 • 图像描述 |\n| 递归神经网络\
    \ | • 句子解析 • 情感分析 • 释义检测 • 关系分类 • 目标检测 |\n| 卷积神经网络（CNN） | • 句子/文本分类 • 关系抽取与分类\
    \ • 垃圾邮件检测 • 搜索查询分类 • 语义关系抽取 |\n\n## 文本预处理\n\n在所有可用数据中，文本是最非结构化的形式。在将 NLP 技术应用于文本数据之前，我们必须确保文本已经过预处理。如何做呢？\n\
    \n对文本数据应用三个关键的中间步骤，使其准备好进行分析（见图 4-3）。\n\n![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig3_HTML.png](img/467925_1_En_4_Fig3_HTML.png)\n\
    \n**图 4-3** 说明文本预处理步骤\n\n### 噪声去除\n\n任何与句子上下文无关的文本片段都可以被视为噪声。噪声实体的示例包括语言停用词（`is`、`am`、`the`、`of`、`in`\
    \ 等）、URL 或链接、社交媒体实体（提及、话题标签）、标点符号等。\n\n一种去除噪声的方法是：a) 对整个文本进行分词，b) 参考一个噪声实体词典，c)\
    \ 消除出现在噪声词典中的那些标记。另一种方法是在处理特殊的噪声模式时使用正则表达式。\n"
- fmt: '# Lexicon Normalization


    The occurrence of multiple representations of the same word in a sentence can
    cause noise as well. For example, “eat,” “eating,” and “ate” all are different
    variations of the root word “eat”. Although they demonstrate different meanings
    purely from a grammar perspective, the root word is the same. Lexicon normalization
    converts all the disparities of a word in a sentence into a normalized form (also
    known as a *lemma*).


    The most common lexicon normalization practices are as follows:


    - *Stemming*: Stemming is a rule-based approach to stripping the suffixes that
    we normally add to a root word to convey a specific meaning. Examples are “ing,”
    “ly,” “es,” “s,” etc.

    - *Lemmatization*: Lemmatization is the process of reducing a word to its root
    form.


    # Object Standardization


    This process is based on the general fact that we often use words or phrases that
    are neither grammatically correct nor confirm to any standard lexical dictionaries.
    Some of the examples are acronyms, hashtags with attached words, and colloquial
    slangs. With the help of regular expressions and manually prepared data dictionaries,
    this type of noise can be fixed.


    # Text to Features (Feature Engineering on Text Data)


    Just like we do feature engineering on structured data to identify the important
    attributes that can then be used to develop ML models, we need to do similar activities
    on the preprocessed text data to determine text features. There are several techniques
    to construct useful text features, discussed next.


    *Syntactic parsing*: Syntactical parsing analyzes the words in the sentence for
    grammar and their relationship among the other words.


    *Dependency trees*: Sentences are composed of words following a particular order
    to convey the meaning. The relationship among the words in a sentence is determined
    by the dependency grammar. For example, consider the sentence: “Recommendations
    on BCCI operations and functioning were submitted by Lodha Committee.” The relationship
    among the words can be observed in the form of a tree representation, as shown
    in Figure [4-4](#467925_1_En_4_Chapter.xhtml#Fig4)*.*


    ![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig4_HTML.png](images/467925_1_En_4_Chapter/467925_1_En_4_Fig4_HTML.png)


    Figure 4-4


    Illustrating the tree structure for sentence parsing


    The tree shows that “submitted” is the root word of this sentence, and is linked
    by two sub-trees. Each sub-tree has another sub-tree with dependency and relations.
    The dependency tree helps identify text features.


    *Part of speech tagging*: The POS tags help us understand the structure of the
    sentence. POS tagging is used for many important purposes in NLP, for example,
    in these two sentences:


    - “Book my tickets.”

    - “This is a good book.”


    “Book” is used in a different context in both the sentences. In the first sentence
    the word “book” is a verb instructing to purchase tickets, while in the second
    sentence it is used as a noun and is talking about a tome that you read.


    # Entity Extraction (Entities as Features)


    Entities are the most important objects in a sentence—noun phrases, verb phrases,
    or both.


    Consider this sentence:


    > *The order processing system is giving an error code of 1048.*


    Entity extracts would identify the following: order, error, 1048. This key information
    is more than enough to troubleshoot and provide resolution options.


    A typical entity-extraction model consists of two activities:


    - *Noun phrase identification*: This step extracts all the noun phrases from a
    text using dependency trees and POS tagging.

    - *Phrase classification*: This step classifies all the extracted noun phrases
    into respective categories (locations, names, etc.).


    *Topic modeling*: Topic modeling is the process of automatically identifying the
    different topics (a repeating pattern of co-occurring terms in a corpus) present
    in a text corpus. It derives the hidden patterns among the words in the corpus
    in an unsupervised manner. Latent Dirichlet Allocation (LDA) is the most popular
    type of modeling algorithm.


    *LDA algorithm*: This algorithm assumes that documents are produced in the following
    fashion.


    When writing this chapter, we:


    - First conceptualized the key theme, “black box”. Then we outlined what topic
    mixture should go into the chapter. For example, we decided on having sections
    covering overviews of ML, DL, and NLP and then covered the nature of AI as a black
    box.

    - Then we added a few high-level restrictions, like the number of pages (people
    lose interest reading lengthy chapters).

    - Then we went into the art of translating our thoughts to actually writing the
    words, sentences, paragraphs, and sections.


    While this narration reflects how humans think when they want to write a document,
    a machine needs to understand this process inside and out.


    The machine approach would be:


    - First apply a tokenization approach to the entire document, then do a continuous
    bag of words to generate distinct topics appearing in the document.

    - Then using the topic as a reference point, learn which words were used to generate
    the topic (the word “explainability” with 80% probability defines “black box”
    as the topic, “parsing” with 55% probability defines “NLP” as the topic, and so
    on).


    *N-Grams as Features*: A combination of N words together are called N-Grams. N
    grams (N > 1) are generally more informative as compared to single words (unigrams)
    as features.


    # Skip-Gram


    The main idea behind the skip-gram model is to determine whether two different
    words *are similar, if they share similar context.* For example, in the sentence
    “to err is human,” if you use the term “mistake” or “screwup” instead of “err,”
    the sentence is still a meaningful sentence and means the same thing (i.e., “is
    human”).


    Skip-gram applies a context window (a window containing k consecutive terms).
    You skip one of the words and try to train a neural network that takes all terms
    except the one skipped and predict the term you had skipped.


    # Continuous Bag Of Words


    In the continuous bag of words model, the goal is to use the context surrounding
    a particular word and then predict that particular word. In a large text corpus,
    every time you see the word of interest, you consider the surrounding words (context
    words). You feed the context words to a neural network to predict the word in
    the center of the context.


    *Statistical features*: Text data can also be quantified directly into numbers
    using several techniques.


    *Term Frequency-Inverse Document Frequency (TF-IDF)*: TF-IDF is primarily used
    for information retrieval purposes. The goal is to find the occurrence of words
    in the documents without the exact ordering.


    For example, you have N documents. In any document D, TF and IDF are defined as:


    - *Term Frequency (TF)*: TF for a term “t” is the count of the term “t” in a document
    “D”.

    - *Inverse Document Frequency (IDF)*: IDF for a term is the logarithm of the ratio
    of the total documents in the corpus and the number of documents containing the
    term “t”.

    - *TF.IDF*: TF.IDF gives the relative importance of the term “t” in the corpus.'
