    # 人人享有能源


    历史上，凡是能够获得能源的人，都享有更优越的经济条件，但人类的贪婪一直在不断消耗自然储备，因此寻找替代能源已成为各国政府最关键的任务。太阳能正迅速成为一种替代选择，而获取这种可再生能源的天然特性，有望使能源使用变得民主化。嵌入太阳能电池板的`AI`和`IoT`技术将实现能源的货币化，从而惠及大众，并为高效利用和将多余能源分配到更能发挥效用的地方铺平道路。


    # 金融机构不再是中介


    令人震惊的是，由金融、保险和房地产组成的金融业并不生产任何商品或服务，但它们却在任何国家的经济中占据着非常大的比重。金融业唯一做的事情，就是为任何商业交易中所需的金融工具提供真实性和承诺。通过有效利用区块链和`AI`等技术，这种中介服务以及管理金融工具的成本无疑可以降低，这反过来又能大幅降低企业的运营成本。


    # 宜居城市


    在过去的几十年里，城市已经从最大化社交互动转向创造更好的生活设施。人们为了日常活动而从一个地方通勤到另一个地方，而不是在社交环境中度过有质量的时光并健康地生活。因此，为了提供有意义且健康的生活环境，智慧城市应运而生。`AI`和`IoT`技术能够以极低的成本实现这一目标。


    # 解放学习


    如今，一个人在就业市场上的价值在很大程度上取决于一所知名教育机构的证书。此外，在面试过程中，存在一种明显的偏见，即更看重证书而非候选人的技能和技术能力。因此，教育机构利用这种情况是相当自然的。结果呢？教育成本飙升，给千禧一代带来了沉重的债务负担。基于`AI`、价格可负担的教育系统可以极大地使整个教育体系民主化，并能提供近乎实时评估个人真实技能的手段。


    # 真正关爱健康


    当前的医疗保健总是一种被动实践，这意味着我们只有在出现紧急情况或生病时才会寻求护理选择。这种行为会导致更高的金钱支出，具体取决于健康问题的严重程度。`AI`技术可以提供重要的杠杆，使医疗保健变得负担得起。`AI`可以通过分析个人的既往病史，并结合可穿戴设备持续监测生命体征、卡路里摄入量、身体活动等，来降低诊断成本。这可以提供警报和建议，推动预防性和主动性的医疗保健，而不是像今天这样——被动、不可逆转且昂贵。


    那么，你将如何驾驭这一转变？或许是通过承认并优先考虑你的投资，并确定你业务中哪些领域需要用`AI`重新构想。


    # 一切都是预测问题！


    美国经济协会将经济学定义为“……研究稀缺性，研究人们如何利用资源并对激励做出反应，或研究决策制定。它通常涉及财富和金融等主题，但并不全是关于金钱。经济学是一门广泛的学科，帮助我们理解历史趋势、解读今天的头条新闻，并对未来几年做出预测。”^(¹)


    这个定义中有趣的是两个具体点——“决策制定”和“做出预测”——而这些正是`AI`所提供的核心。从经济学家的角度来看，`AI`本质上是一种预测技术，能够实现自动决策，从而降低做出预测的成本。


    当预测成本下降时会发生什么？我们已经看到了效果：预测是决定供需平衡的关键组成部分。如果预测成本下降，依赖预测的商品和服务的成本也会下降。`AI`大幅降低了预测成本，从而推动了两个公认的经济影响。首先，我们开始在我们所做的几乎所有事情中使用预测；其次，预测的广泛应用开始成倍放大结果的最终价值。


    如何实现？考虑这个等式：


    > `结果 = 函数 (数据, 预测, 决策制定, 行动)`


    在我们的日常生活中，无论我们做什么活动，都可以归结为五个组成部分的有效运用：数据、预测、判断、行动和结果。


    例如，我想买一台最先进的电视：


    *   *收集数据：* 包括品牌、型号、品牌、功能、价格、提供的折扣、其他促销优惠和付款方式

    *   *做出预测：* 例如“如果我选择 LG 52 英寸，那么我预测结果是 X，但如果我选择索尼 52 英寸，那么我预测结果是 Y”

    *   *做出判断：* “考虑到功能、折扣、价格范围和朋友的推荐，我认为最好的选择是索尼 52 英寸；让我要求他们额外赠送一年的 Netflix 免费订阅”

    *   *采取行动：* 经销商同意了我所有的要求，让我刷信用卡吧

    *   *结果：* 我自豪地拥有了一台索尼 52 英寸最先进的电视，外加一年的 Netflix，并且由于信用卡的促销活动，还获得了额外的 15%现金返还。我妻子肯定会喜欢这笔交易——老婆开心，生活舒心。


    随着`AI`降低预测成本，我们将开始在我们所做的几乎所有事情中使用它，无论是组织个人偏好还是解决复杂的业务问题。因此，历史上以预测为导向的活动将开始变得更便宜、更好——比如定价、库存管理、物流、供应链、需求预测、广告、诊断、运输等。同时，我们也将开始探索利用预测来解决其他问题的机会，而这些问题在历史上我们甚至从未将其视为一个预测问题。

    '
- fmt: '# 自动驾驶与人工智能的演进


    例如，考虑驾驶车辆。普遍认为，一个人需要大量练习、具备方向感、了解交通流，并保持警觉以应对任何不利条件。如果我们想实现驾驶体验的自动化呢？人类已经尝试过，并找到了一种方法，在高度受控的环境中开发自动驾驶车辆，例如大型仓库和工厂，在这些地方可以预见到车辆可能遇到的有限场景。实现这一成就的关键是冗长而复杂的计算机程序，它们执行`if-then-else`类型的推理，并指示车辆执行下一个最佳动作（例如，如果有障碍物，则停车；或者如果地板上有`X`标志，则在那里卸货）。我们做梦也未曾想过将自动驾驶车辆放到城市街道上，因为环境以及与外部世界的互动会带来无限多的可能场景。在这样一个不受控的环境中，你需要为几乎无限多的情况编程并实现决策（`if-then-else`语句）。这种方法即使不是不可能，也会变得非常昂贵且难以管理。这种方法也并非万无一失——如果你遇到了一个从未预料到的新场景怎么办？你将别无选择，只能召回你的自动驾驶车辆，打开程序，添加新的条件语句，编译程序，彻底测试，然后将自动驾驶车辆重新部署到街道上。这绝对不是一种可扩展的方法。


    然而，一旦预测技术变得更加普及和廉价，人工智能将驾驶重新定义为一个预测问题。如何做到的呢？与其思考一份详尽的可能场景清单并编写无尽的`if-then-else`语句，我们改变了问题陈述，变为“观察人类驾驶员如何驾驶”（收集大量数据），“向人类驾驶员学习”（理解数据中的模式），然后“预测人类驾驶员会做什么”（进行推理并自动化决策）。我们在车辆中安装了各种传感器（内部用于监控车辆性能，外部用于监控外部条件），收集了大量人类驾驶行为语料库，然后通过分析来自车外的数据（交通流、交通信号、障碍物以及与其他物体的距离）与车内人类驾驶员做出的驾驶决策（导航、转向控制、制动、加速、打转向灯，有时鸣笛以提醒附近的其他车辆或行人）进行模式匹配。简而言之，我们让人工智能学习预测人类如何对环境变化做出反应。结果就是——自动驾驶汽车。


    ## 人类判断力是无价的！


    预测和判断相辅相成，事实上它们是互补的。那么，如果预测成本下降，判断的价值会发生什么变化？


    以医生检查一位抱怨腿部疼痛和肿胀的病人为例。首先，医生会要求对肢体进行`X`光检查，然后通过询问一系列问题来收集信息，进行诊断，以便她能够预测下一步该做什么。现在，人工智能可能会让医生的工作变得更简单。通过扫描`X`光片（图像分析）并记录病人的回答，人工智能可以快速对照庞大的症状数据库进行核对，然后预测最佳的建议方案。然而，最终的决定权将留给医生。


    因此，虽然机器智能可能替代人类的预测，但它也可以成为人类判断的补充，从而提升人类判断的价值。简而言之，判断是预测的补充，因此，当预测成本下降时，对判断的需求就会上升。


    当预测变得越来越便宜时，决策变得不那么繁琐，导致问题和/或不确定性得到及早解决，这意味着我们将更快地采取行动，这意味着对预测应用的需求几乎在我们所做的任何事情中都会增加，这反过来又意味着判断的价值变得更加宝贵，而这些判断是由人类提供的。


    我们不应一概而论，因为判断和预测之间的界限是模糊的——一些判断任务可能被重新定义为一系列预测任务，每个预测任务向前推进以解决下一个任务，依此类推。可以肯定的是，对预测相关人类技能的需求将会下降，随后对判断相关技能的需求将会上升。


    过去十年中，人工智能的进步已经达到了企业基础技术组件的地位。它已经在各个维度上影响着商业战略——业务流程自动化、客户体验转型，以及推出差异化的产品和服务。


    人工智能的颠覆性力量可能意味着你的业务面临大量机遇，也可能意味着你需要在企业内部管理一种令人不安的变化。因此，清晰理解人工智能并了解企业如何采取措施从中获益至关重要。简而言之，迫切需要为你的业务制定一个人工智能战略。


    凡事采用`AI-first`的方法也会带来影响，因此，作为企业高管和技术领导者，你需要评估你的业务和技术格局，然后确定人工智能主导的干预或补充措施的适当性。你不需要盲目追随人工智能在其他地方创造的奇迹。直接照搬并应用到你的业务场景中，这种方法可能弊大于利。你不希望你的人工智能转型之旅变成某种难以理解的新事物。你需要你的人工智能应用与你的业务相关，你需要你的人工智能应用利用你的数据，你需要你的人工智能应用学习并改进你过去的绩效。在此过程中，如果你碰巧产生了新的想法，从而产生了独特的价值主张、新产品和新服务，那就更好了。'
  raw: 'For example, consider driving a vehicle. The common belief is that one needs
    to practice a lot, have a sense of direction, have a sense of traffic flow, and
    stay alert to react to any adverse conditions. What if we want to automate the
    driving experience? Humans have had a go at it and had figured out a way to develop
    autonomous vehicles to perform in a highly controlled environment, such as large
    warehouses and factories where one can anticipate a finite set of scenarios the
    vehicle may encounter. The key to this achievement was lengthy and complex computer
    programs performing if-then-else-type reasoning and instructing the vehicle to
    do the next best action (e.g., if there is an obstruction, then stop. Or if there
    is a X sign on the floor, then offload the materials there). In our wildest of
    dreams we had never thought to put an autonomous vehicle on a city street because
    the environment and interactions with the external world invites an infinite number
    of possible scenarios. In such an uncontrolled environment, you would need to
    program and implement decision making (if-then-else statements) for almost an
    infinite number of situations. This approach can become very costly and unmanageable,
    if not impossible. This method is also not fool-proof—what if you encounter a
    new scenario that you had never anticipated? You would have no choice but to recall
    your autonomous vehicle, open the program, add new conditional statements, compile
    the program, test it thoroughly, and then deploy the autonomous vehicle back on
    the streets. Definitely not a scalable method.


    However, once prediction technologies became more pervasive and cheaper, AI reframed
    driving as a prediction problem. How? Rather than thinking through an exhaustive
    list of possible scenarios and then programing endless if-then-else statements,
    we changed the problem statement to “observe how a human driver drives” (collect
    lots of data), “learn from the human driver” (understand the patterns in the data),
    and then “predict what a human driver would do” (draw inferences and automate
    decision making). We installed a variety of sensors in the vehicle (inside to
    monitor the performance of the car, outside to monitor the external conditions),
    collected a huge corpus of human driving behavior, then started pattern matching
    by analyzing the data from outside of the car (traffic flow, traffic signals,
    obstructions, and proximity to other objects) to the driving decisions made by
    the human inside the car (navigating, steering control, braking, accelerating,
    turning indicators, and sometimes honking to alert other nearby vehicles or humans).
    In short, we made the AI learn to predict how humans react to changes in their
    environment. The result—self-driving cars.


    ## Human Judgment Is Invaluable!


    Prediction and judgment go hand in hand, in fact they are complementary. So, if
    the cost of prediction goes down, what happens to the value of judgment?


    Let’s take the example of a doctor examining a patient who complains about pain
    and swelling on his leg. First, the doctor will ask to do an x-ray of the limb
    and then engage in a diagnosis scenario by asking a series of questions to gather
    information so that she can make a prediction on what to do next. Now, AI would
    presumably make it easier for the doctor. By scanning through the x-ray film (image
    analytics) and recording the answers the patient is giving, AI can do a quick
    check against the huge symptoms database and then predict the best course of recommendations.
    However, the final decision will be left to the doctor.


    So while machine intelligence could possibly substitute for human prediction,
    it can also be a complement to human judgment, thereby increasing the value of
    human judgment. In short, judgment is a complement to prediction and therefore,
    when the cost of prediction falls, demand for judgment rises.


    When prediction becomes cheaper and cheaper, decision making becomes less cumbersome,
    resulting in early resolution of problems and/or uncertainties, which means we
    will take actions faster, which means greater demand for the application of predictions
    in almost anything and everything we do, which in turn means the value of judgment
    becomes even more valuable, which are provided by humans.


    We should not generalize each and every scenario, as the line between judgment
    and prediction is blurry—some judgment tasks can possibly be reframed as a series
    of prediction tasks, each prediction feeding forward to solve the next task and
    so on. What is sure is that the demand for prediction-related human skills will
    fall, and subsequently the demand for judgment-related skills will rise.


    Advancements in AI over the last decade has already achieved the status of a foundational
    technology component for the enterprises. It is already influencing business strategies
    across all dimensions—automation of business processes, transformation of customer
    experiences, and launching differentiated products and service offerings.


    The disruptive power of AI could mean a plethora of opportunities for your business
    and could also mean an unsettling change that you need to manage within your business.
    It is therefore important to have a clear understanding of AI and understand how
    businesses are taking steps to drive advantage from it. In short, there is a dire
    need to create an AI strategy for your business.


    An AI-first approach to everything also has implications, hence as business executives
    and technology leaders, you need to assess your business and technology landscape
    and then determine the appropriateness of AI-led interventions or supplements.
    You don’t need to blindly follow what magic AI has done elsewhere. Do a lift and
    shift and apply to your business scenarios, this approach may do more harm. You
    do not want your AI transformation journey to become something new that is difficult
    to comprehend. You need your AI applications to be relevant to your business,
    you need your AI applications to take advantage of your data, and you need your
    AI applications to learn about and improve your past performance. And along the
    way, if you happen to generate new ideas that result in unique value propositions,
    new products, and new offerings, it is great.'
