  trans: '

    # 智能流程自动化之旅（IPA = RPA + AI）


    人类编纂了基于规则的系统，用以自动化流程并解决过去的问题。人类还开发了人工智能技术，通过观察进行学习，并解决那些依赖于判断的问题。如果将这两种截然不同的解决问题的方法结合起来，会怎样呢？本质上，智能流程自动化利用了人类的学习和适应能力，并将这些能力注入到流程再造计划中。当你将传统的基于规则的自动化设计与自学习能力相结合时，你便得到了
    IPA，它不仅能复制人类的判断和技能，还能随着时间的推移，学会更好地完成任务。


    当自动化嵌入了判断力，或者在有人员参与的情况下得到支持时，它正在重新定义企业中任务的分配和执行方式。最初，IPA 主要用于制造流程，后来才在其他职能中零散应用。如今，它正日益成为企业各项职能中不可或缺的一部分。


    各组织正在构建 IPA 系统的整体架构，因为它有潜力成为推动企业全面转型的关键载体。踏上“IPA 之旅”的时刻确实已经到来。自动化与否已不再是问题。这种新热情的主要刺激因素，来自于实施
    RPA 的组织在生产力上实现了显著的两位数增长。RPA 工具在吸收了增强智能能力以模仿人类智能后，还将进一步发展。随着它们变得更加智能，我们也将看到它们执行更多智能和复杂的任务，例如规划、预算编制、分析和决策，这些任务曾被认为只属于人类。


    在我们探讨 IPA 的构成之前，首先来破除一些关于自动化的迷思！


    - **RPA 将提高生产力并降低成本**：是的，通过自动化业务流程，确实可以提高生产力并降低成本。然而，与之相关的变革管理方面需要仔细评估。通常会发现，生产力提升和成本降低的成果，会被管理变革所需的额外开销所掩盖。


    - **在应用 RPA 之前，你需要提高流程的成熟度**：这不是一个先决条件，而是一个美好的愿望。RPA 的唯一目标是将你的流程分解成更小的模块，并找到自动化它们的方法。这样，端到端的流程要么可以完全自动化，要么可以部分自动化。无论哪种方式，你都将为你的流程和运营引入变革性的能力。


    - **鉴于供应商工具的成熟度，你可以快速在生产环境中部署软件机器人**：答案是——视情况而定。如果所讨论的流程深埋在某个后端系统中，过去没有太多人工参与，并且或多或少是一个独立的子流程，那么答案显然是肯定的。然而，如果该流程与其他系统有依赖关系，具有包含多个人工验证点的工作流，并且处理某些相当复杂和敏感的数据，那么你需要谨慎，不要急于投入生产部署。建议先进行长时间的试点解决方案，评估解决方案的有效性和效率，规划适当的变革管理计划，然后再投入生产部署。


    - **关键的成功标准是你部署的机器人数量**：如今，引用生产环境中机器人的数量，作为阐述组织自动化旅程和成熟度的代名词，已成为一种趋势。在我们看来，重要的不是数量，而是效能和效率。一方面，你可能通过自动化手动活动减少了全职等效员工（FTE）数量，但另一方面，你也在劳动力组合中增加了机器数量。这些机器也需要监督、治理和维护工作。因此，每个“机器人”的利用率可能是衡量自动化效能的更好指标。


    - **为什么先做 RPA 再做认知？可以直接跳到认知阶段**：RPA 是一个将输入映射到输出的直接过程，而认知则意味着你引入从数据中学习的能力来动态地实现自动化。这需要一定程度的数据、流程和知识库的成熟度。如果你没有简化你的流程，产生的数据将是碎片化和不连贯的，这意味着要应用机器学习，你必须承担管理和整合数据的繁重工作，这反过来意味着你需要更长的时间来训练你的机器学习模型，以实现你所期望的自动化。因此，建议从
    RPA 开始。它将是你自动化旅程中的一块垫脚石，并为组织在长期内成为自主型组织做好准备。


    IPA 不仅仅是一个工具，它由五项核心技术能力组成，这些能力集成在一起，提供了一个可以构建和部署智能自动化解决方案的平台：


    - **机器人流程自动化（RPA）**：一种软件，使你能够开发“机器人”来自动化那些具有明确定义的输入、基于规则的处理模式和可衡量输出的任务。就像人类操作员拥有登录业务系统的
    ID 一样，RPA 也会有一个用户 ID。它会记住人类操作员在业务系统中的操作，并开始模仿基于规则的任务，例如访问用户界面、执行数据输入或验证、创建文档和报告，以及触发下一组操作。


    - **智能工作流**：一个流程管理应用程序，用于集成由人类和机器人执行的任务。智能工作流系统将编排不同用户（包括机器人和人类用户）之间的交接，以高效地执行任务，并实时监控端到端流程。


    - **机器学习**：算法在识别数据模式方面发挥着至关重要的作用，例如在流程流中观察到的新场景或罕见场景。如果这些场景不通过预测技术来处理，将会在流程流中造成巨大的瓶颈。还有其他一些场景需要人工验证才能进入下一组流程步骤。在这种情况下，机器学习算法可以为人工操作员提供建议和下一步最佳行动，以便高效地推进流程。


    - **人工智能能力**：一组专门的人工智能能力，用于处理非结构化数据，包括文档、图像、视频和语音。业务流程最终往往需要管理和创建各种数据类型。在许多场景中，业务系统的输入可能是图像、视频和语音的形式。需要人工智能能力来管理这些数据类型，以便提取相关信息并将其传递给执行任务的智能工作流和机器学习程序。

    '
- fmt: '*Cognitive agents*：自维持的模块化可执行程序，像虚拟工作者（或“代理”）一样，能够执行任务、与系统、人类或其他代理通信、从数据集和环境中学习，甚至基于“情绪检测”做出决策。认知代理可以是被动的，仅在请求时协助其他代理或人类；也可以是主动的，观察流程的整体健康状况，并在发现瓶颈时立即采取行动。


    现在，我们了解了不同技术如何结合以提供强大的平台，下一个问题是：IPA平台在现实世界中表现如何？


    让我们考虑贷款审批流程。人工贷款处理员需要点击操作多个系统，如CRM、贷款账户应用程序、风险分析系统、法律与合规系统、外部信用机构系统等，以提供“常规业务”服务。借助IPA，机器人将从这些不同系统中提取所有信息，并整齐地排列好，供人工处理员进行判断，从而节省大量点击操作。NLP程序将启动，扫描与贷款申请人过去的互动记录（电子邮件、语音通话、投诉和偏好），并解读文本密集的通信内容。ML算法将根据相似档案和过往风险提供警报，或推荐下一步最佳行动。最后，认知代理将启动与贷款申请人的交互式通信，并提供系统与人工之间交接的实时跟踪（见图[5-1](#467925_1_En_5_Chapter.xhtml#Fig1)）。


    ![../images/467925_1_En_5_Chapter/467925_1_En_5_Fig1_HTML.png](images/467925_1_En_5_Chapter/467925_1_En_5_Fig1_HTML.png)


    图5-1 智能工作流：从执行到思考


    您的组织需要以有条理且深思熟虑的方式引入自动化和智能。以下部分讨论了一些需要避免的常见陷阱。


    ### 制定基于价值的战略


    组织应批判性地评估许多供应商工具背后的炒作。他们需要对其组织内智能流程自动化的业务收益建立现实的认识。他们需要客观评估当前业务流程的状态、客户未满足的需求、市场趋势、员工生产力指标以及员工敬业度指数。然后，他们应确定一套全面的、基于价值的机遇，而不仅仅是节省成本。他们应进行适当的研究，了解如何利用内部和外部数据集来改造前端应用程序和后端系统。


    ### 确定机遇的优先级


    鉴于智能流程自动化在改造业务方面的潜力，很自然地会遇到这样的情况：业务职能负责人有其自己的优先级，而CIO组织也有其自己的优先级。一种在组织边界内设定优先级的明智方法是，创建一个跨业务流程的智能自动化机遇热力图。通过审视所创造的业务价值与实施时间的关系，您可以列出一份业务流程清单，然后制定一份IT就绪计划，以描绘您当前的能力与实现业务转型所需的其他技术变革之间的差距。


    ### 确定试点场景


    在选择机遇时，也要仔细考虑其影响。流程可能运行在非常古老的遗留代码上，没有可用的文档，跨系统完成端到端流程存在多次交接，并且流程中嵌入了过多的判断调用。如果您发现的是这些情况，务实的做法是退一步，先寻找更简单的系统或流程来处理。您需要选择几个能够立即交付业务价值的简单场景，这些试点的成功必将帮助您切入其他复杂场景。


    ### 制定路线图


    我们经常看到，业务职能和IT领导者急于开展多个试点，然后宣布他们已准备好进行大规模的企业级实施。进行试点并处理较小、较简单的任务本身并没有错。然而，当您想要启动企业级的转型项目时，您需要一份路线图。智能自动化的影响超越了任务自动化本身。它会对各个职能和角色产生变革管理方面的影响。您的路线图应包含一个时间表，以及一套清晰列出的项目，以解决技术、组织、人员和运营方面的潜在变革。自上而下的支持是成功实施智能自动化的关键。请参考图[5-2](#467925_1_En_5_Chapter.xhtml#Fig2)了解智能自动化旅程图。


    ![../images/467925_1_En_5_Chapter/467925_1_En_5_Fig2_HTML.png](images/467925_1_En_5_Chapter/467925_1_En_5_Fig2_HTML.png)


    图5-2 智能自动化旅程图


    ### 整合流程与技术


    有足够多的“低垂果实”用例（至少在运营领域）可以使用简单的RPA成功实施；然而，当您试图为跨业务职能和IT系统的复杂流程带来变革力量时，简单的RPA工具往往无法胜任。供应商在支持涵盖我们之前讨论的智能自动化平台五个关键组件的整体架构方面，能力差异很大。组织需要严格评估供应商在这一领域的能力，特别是要确保新系统能与整个企业生态系统无缝集成。他们必须建立性能监控机制，以管理和监控整个智能自动化项目。


    ### 建立操作流程和治理模型


    随着自动化模仿人类重复性任务，以及人工智能提供类似人类判断的能力，企业员工队伍和标准操作流程预计将经历巨大变革。在人类与认知代理在持续学习的环境中互动时，职能和技术团队必须找到协作方式，并理解谁对什么负责。


    从历史上看，企业已经发展并变得更善于管理人力队伍。标准、最佳实践和人力资源流程旨在评估和奖励人类绩效。当有机器参与其中时，您将如何执行这些实践？


    更广泛地说，公司可能正在坚定地采用“自动化和智能优先”的方法，而没有对操作流程和治理模型给予足够的重视。'
  raw: '*   *Cognitive agents* : Self-sustainable modular executables acts like a
    virtual worker (or “agent”) capable of executing tasks, communicating with systems
    or humans or other agents, learning from data sets and the environment, and even
    making decisions based on “emotion detection.” Cognitive agents can be passive,
    coming to the aid of other agents or humans only when they are asked to. They
    can be active, observing the overall health of the process and jumping into action
    when they see bottlenecks.


    Now that we understand how different technologies coming together provides a very
    powerful platform, the next question is, how does an IPA platform perform in real-world?


    Let’s consider the loan approval process. A human loans processor will point and
    click to several systems like CRM, loan accounts application, risk profiling system,
    legal and compliance system, external credit bureau system, etc., to provide a
    “business as usual” service. With IPA, robots will pull all the information from
    these different systems and arrange them neatly for the human worker to apply
    any judgments, thus saving lots of point and click effort. The NLP programs will
    kick off to scan through past interactions (emails, voice calls, complaints, and
    preferences) with the loan applicant and interpret text-heavy communications.
    The ML algorithms will provide alerts based on similar profiles and past risks
    or provide next best actions as recommendations. Finally, the cognitive agents
    will initiate interactive communications with the loan applicant and provide real-time
    tracking of handoffs between systems and humans (see Figure [5-1](#467925_1_En_5_Chapter.xhtml#Fig1)).


    ![../images/467925_1_En_5_Chapter/467925_1_En_5_Fig1_HTML.png](images/467925_1_En_5_Chapter/467925_1_En_5_Fig1_HTML.png)


    Figure 5-1


    Smart workflows: from acting to thinking


    Your organization needs to introduce automation and intelligence in an organized
    and thoughtful way. The following sections discuss a few common pitfalls that
    you need to steer clear of.


    ### Create a Value-Based Strategy


    Organizations should critically evaluate the hype behind many vendor tools. They
    need to establish a realistic view of the business benefits of intelligent process
    automation for their organization. They need to objectively assess the current
    status of their business processes, customer unmet needs, market trends, and employee
    productivity metrics as well as employee engagement index. Then they should identify
    a comprehensive set of opportunities that are value based, not just save money.
    They should do a proper study of how they can utilize internal and external data
    sets to transform both the frontend applications and backend systems.


    ### Prioritize Opportunities


    Given the potential of intelligent process automation to transform business, it
    is quite natural that you will get into situations where the business function
    leads will have their own set of priorities and the CIO organization will have
    their own set of priorities. One sensible approach to setting priorities across
    the organizational boundaries is to create a heatmap of intelligent automation
    opportunities across business processes. Taking a view of business value created
    against time to implement, you can come up with a list of business processes and
    then develop an IT readiness plan to portray your current capabilities versus
    what other technology changes are required to deliver the business transformations.


    ### Identify Pilot Scenarios


    When choosing opportunities, carefully consider the implications as well. Processes
    might be running on very old legacy code, no documentation available, multiple
    hand-offs across systems to complete the end-to-end process flow, and too many
    judgment calls embedded into the process flow. If these are the situations you
    uncover, it is pragmatic to step back and look for simpler systems or processes
    to deal with first. You need to choose a few simpler scenarios that can deliver
    immediate business value, and the success of these pilots will certainly help
    you make inroads into other complex scenarios.


    ### Create a Roadmap


    Too often we see that business functions and IT leaders jump into doing several
    pilots and then declare they are ready for large-scale enterprise-wide implementations.
    There is nothing wrong with doing pilots and taking smaller and simpler tasks
    into account. However, when you want to initiate enterprise-wide transformational
    projects, you will need a roadmap. The impact of intelligent automation goes beyond
    automating tasks. There are change-management impacts across functions and roles.
    Your roadmap should have a timetable and a clearly outlined set of line items
    to address the underlying changes to technology, organization, people, and operations.
    Top-down sponsorship is the key to a successful intelligent automation implementation.
    Refer to Figure [5-2](#467925_1_En_5_Chapter.xhtml#Fig2) for an intelligent automation
    journey map.


    ![../images/467925_1_En_5_Chapter/467925_1_En_5_Fig2_HTML.png](images/467925_1_En_5_Chapter/467925_1_En_5_Fig2_HTML.png)


    Figure 5-2


    Intelligent automation journey map


    ### Integrate Processes and Technology


    There are enough low-hanging use cases (at least in the operations space) that
    can be successfully implemented using simple RPA; however, when you attempt to
    bring transformational power to complex processes cutting across business functions
    and IT systems, simple RPA tools fail to rise to the occasion. Vendors vary widely
    in their ability to support a holistic architecture that covers the five key components
    of intelligent automation platform we discussed earlier. Organizations need to
    critically assess vendor capabilities in this area, especially to ensure the new
    systems integrate seamlessly with the overall enterprise ecosystem. They must
    establish a performance monitoring mechanism to manage and monitor the overall
    intelligent automation projects.


    ### Establish Operating Procedures and Governance Models


    With automation mimicking human repetitive tasks and AI providing human-judgment
    types of capabilities, the enterprise workforce and standard operating procedures
    are expected to go through a sea change.  As humans and cognitive agents interact
    in an environment of continuous learning, functional and technical teams must
    find a way to collaborate and understand who is responsible for what.


    Historically, enterprises have evolved and have become better at managing the
    human workforce. Standards, best practices, and HR processes have been designed
    to assess and reward human performance. How would you execute these practices
    when you have machines in the mix?


    More broadly speaking, companies may be steadfastly adopting the “automation and
    intelligence first” approach without paying significant attention to operating
    procedures and governance models.'
