    of experience managing and running your business functions but are at sea when
    it comes to using the latest technology led decision making. Call it the “democratization
    of AI”. To accomplish this goal, the company needs to do several things: develop
    their own AI platform, conduct extensive design thinking sessions across business
    functions, and re-skill the workforce to understand how prediction technologies
    work and how they can coexist in an increasingly human-machine world.


    In the longer run, your workforce will get enough exposure and know-how to start
    developing their own AI applications to do their job faster, better, and cheaper.
    For example, your marketing team will be able to connect a widget of natural language
    processing together with other components to create an app for gathering and analyzing
    unstructured data from social media data. Or your sales team will be able to analyze
    a huge customer data set to predict which prospects are most likely to convert
    to customers or uncover insights about customer behavior and improve the design
    of different products and offerings, thus increasing the ability to cross-sell/up-sell.


    Democratization of AI will also allow your ecosystem partners to co-platform,
    bringing in strong collaboration capabilities and simplified process orchestration
    that cuts across organizational boundaries. Think of how spreadsheets helped democratize
    data analysis, enabling even mom-and-pop shops to perform invaluable “what-if”
    analyses.


    It is clear that the “democratization of AI” is a strategic undertaking that all
    enterprises need to do to create a sustainable competitive advantage.


    ## Conclusion


    AI is a longer-term trend that will impact all aspects of our lives at home and
    at work. We are moving to a world that’s a big semantic web where everything is
    connected with everything. Purely talking in algorithmic norms, our location is
    an attribute, our sentiment is an attribute, our facial expressions is an attribute,
    and our voice is an attribute. The super convergence of cloud, mobile, social
    media, Big Data, AI, and now blockchain are enabling companies to aggressively
    explore, innovate, and launch disruptive businesses models and super smart offerings
    in the consumer-to-consumer and business-to-business sectors. In this context,
    the board asking the CEO about an AI strategy is apt. Enterprise AI is about building,
    deploying, and managing systems of intelligent engagement. It is not about mere
    automation of manual work. Thus as a CEO, your task is cut out for you. You need
    to have a clear vision:


    1.  *Establish AI as a business capabili*ty : AI is too important to be left to
    few experimentations or one-off AI proof of concepts or the IT teams to develop
    know-how. The point is not about publishing an annual report where you can also
    say that you are exploring AI, like many others do. CEOs should be asking: what
    is the art of the possible with AI?


    2.  *Democratize AI* *within the company*: Incrementalism will not transform companies.
    Adopt a “dot versus bubble” analogy to arrive at how your company should be approaching
    AI use cases not only to differentiate in the market but also to democratize AI
    within the company.


    3.  *Adopt fail-fast learn-fast methodology* : Adopt a 10/10/10 methodology: 10
    hours to identify use case, 10 days to build the data pipeline, and 10 weeks to
    go live with AI capability. CEOs must encourage a culture of learning and experimenting.
    This requires an agile methodology to go from concept to capability in fewer than
    90 days.


    4.  *Drive and manage AI projects as a* *top-down initiative* : The leadership
    has to treat AI as a business imperative that is driven from the top-down, not
    a technology know-how drive and experimentation type of projects driven from the
    bottom-up.


    5.  *Build an* *ecosystem to leverage* : The hyper-convergence of the big six
    technologies means that companies need an ecosystem of partners to tackle all
    of the key technologies.


    What if your board doesn’t ask you this question? If your board of directors is
    not concerned about the company’s AI strategy to drive new business models or
    new products and services, maybe you need to consider changing the composition
    of the board! In this fast-paced changing business and market scenarios, there
    are no second chances. You absolutely need your board to understand and play a
    critical role in questioning your strategy, technology investments, and people
    reskilling initiatives that your company’s future depends on.


    In the next chapter, we discuss fundamentals of AI (slightly technical aspects
    of AI) and the associated apprehensions, despite its obvious advantages.'
