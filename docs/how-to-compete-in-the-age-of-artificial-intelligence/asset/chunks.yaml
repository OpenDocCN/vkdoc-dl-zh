  trans: '

    ### 关注成果，而非技术


    首先，要用对高管们来说至关重要的**成果**语言来沟通，而不是伴随任何颠覆性新技术而来的技术术语。


    与领导团队沟通的一个好方法是提出几个问题：


    -   我们可以在哪些方面融入响应能力和预测能力，以更好地提供客户体验、更快地推出新产品，或提高我们自身的运营效率？

    -   我们目前正在做的哪些活动可以更快、更好、更便宜地以自动化方式完成？

    -   有哪些我们想做，但因各种限制（成本、资源或技术）而无法做到的新事情？

    -   有哪些事情我们得知得太晚，以至于无法及时采取行动？

    -   有哪些事情是我们本应预见到可能发生的——无论是好是坏？


    例如，负责客户服务的高级副总裁担心“首次解决率”呈下降趋势。负责销售的总裁则担忧“交叉销售/向上销售”效果下滑，并将其归咎于糟糕的客户服务体验。负责产品战略的副总裁渴望了解市场脉搏，但却无法做到，因为我们缺乏收集和分析相关社交媒体数据、搜索查询数据和品牌资产数据的手段。没有这些数据，你就无法真正了解客户在寻找什么、在谈论什么。


    ### 解释人工智能


    一旦你确定了高管们关心的成果，你就可以阐明人工智能如何帮助业务实现其目标。这时，我们对人工智能的工作定义就会派上用场。


    例如，你的产品战略副总裁和首席营销官渴望了解客户脉搏，以便设计更好的产品、开展有效的营销活动并赢得更多市场份额。要实现这一点，你需要人工智能能力来大规模收集和分析社交媒体数据，并进行情感分析。


    现在，让我们逐步解析人工智能的工作定义：人工智能 = 训练数据 + 机器学习 + 反馈循环：


    **训练数据**。你需要各种类型的数据：来自 Twitter 上相关 `#hashtags` 和 `@mentions` 的推文，以及围绕你公司、品牌和产品体验的
    Facebook 讨论。最重要的是，你需要了解人们对竞品的评价、其他与竞争对手策略相关的公开数据，以及任何有望提供更好客户体验或使你的产品过时的创新。这些数据大多是流式且实时的，因此你需要弄清楚如何以及在何处存储所有这些数据，以及存储多长时间。这些数据初始质量不高，也未经标记，因此你必须定义一个流程来清洗数据、过滤噪音、定义你想要使用的情感量表，并安排一些领域专家协助进行标记。


    **机器学习**。现在到了讨论算法的时候了。利用你拥有的经过整理的数据集，你需要定义想要进行哪种类型的预测。有几种预测类型与你试图解决的问题相关：


    -   *分类*：查看你收集的情感数据，你需要开发诸如“正面情感”或“负面情感”之类的案例。分类算法将帮助你扫描海量数据，得出结果类别。

    -   *分割*：如果你的意图是识别出那些表达了正面情感且最有可能对你的报价做出回应的人群，那么聚类算法就会派上用场。

    -   *回归*：如果你的意图是得出一个潜在的数字（可能是收入增长，或你能按市场/地区销售的产品数量），那么你需要应用回归算法。

    -   *预测技术*：如果你想了解隐藏在数据中的各种时间、季节或其他外部影响，并希望创建预测（可能是关于营销活动对销售的影响），你需要求助于预测算法。


    还有许多其他算法变体在发挥作用，包括深度学习和神经网络。然而，为了简洁和简单起见，我们这里只举了简单算法的例子。


    **反馈循环**。无论你的算法多么出色，你都必须让预测结果具有可操作性。人们开始使用预测建议的唯一方法是，他们理解输出的原因和方式。简而言之，你的算法不能像一个黑箱。输出需要是可解释的，并且人们需要有验证输出的灵活性，从而帮助改进和丰富预测能力。


    一旦你的高管们明白这并非完全是机器主导的方式，他们就会更加欣赏人工智能如何在企业中增强人类技能。


    ### 评估人工智能平台


    企业 IT 环境中充斥着众多为业务应用和 IT 管理应用提供支持的供应商产品，这并不奇怪。企业 IT 架构师和企业标准组的自然反应是减少 IT 环境中的熵。这意味着引入工具和技术，以及另一轮漫长的评估、商业谈判、合同和认证流程。管理供应商风险和保护企业免受供应商锁定是每位
    IT 领导者的首要议程。人工智能作为一项新兴且快速发展的技术，也有其自身的技术架构和组件（无论是在本地还是在云端）。具有挑战性的是，即使是经验丰富的 IT
    领导者也难以阐明这项技术的发展方向。


    你的 IT 领导者需要帮助，以便专注于相关的内容（供应商已经对其人工智能平台能力做出了许多夸大其词），而不是陷入无休止的供应商评估阶段。你当然应该寻求首席信息官/首席技术官同事的支持，对市场上可用的工具进行广泛评估。你还应该要求他们对初创公司进行分析，了解他们试图实现的目标，很多时候与初创公司合作的方法可以奏效。这对你来说商业成本较低，并且能激励你的团队，因为他们将接触到前沿技术和创新理念。


    以下三个因素值得特别关注，特别是对于那些声称提供人工智能解决方案的供应商。


    ### 单一领域与通用平台


    一些供应商深入到了某个特定领域（例如制药临床试验、零售多渠道的超个性化、金融犯罪场景中的欺诈检测）。一些供应商选择专注于技术能力（物联网、图像识别、自然语言处理和深度学习），而其他许多供应商则选择构建通用平台（你可以输入任何类型的数据，通过使用流行的机器学习技术生成洞察，并通过多种消费渠道分发你的洞察）。这些供应商不一定专门研究人工智能的某个子领域，如文本、图像、音频、视频、深度学习等。


    很难说哪种方法比另一种更好。这完全取决于你要解决的问题类型。然而，与其“看菜下饭”（为多个用例选择他们认为合适的多种工具），企业的自然选择是合理化他们管理的供应商数量，因此会略微偏向于通用平台，如果（这是一个很大的“如果”）该通用平台能够满足不同职能部门的业务需求的话。

    '
- fmt: '### Black Box versus White Box


    Algorithms have attitude too. Some are simple and do their job quietly and are
    easy to interpret (`decision trees`, `linear regression`, `logistics regression`,
    `Naïve Bayes`, etc.). Others (especially the new generations of algorithms based
    on neural net) are complex, versatile, and extremely difficult to comprehend.
    Many of these algorithms cannot explain their results even to the data scientists
    who built them, let alone to end users. They operate like black boxes, in which
    you can’t really inspect how the algorithm is accomplishing what it is accomplishing.
    Several recent examples—like `Google Photo`’s mislabeling of an image of a black
    couple as gorillas, and `Amazon` bookseller bots that bid against each other until
    a book''s price exceeded $23 million—create a trust issue in our minds.


    What do we really mean by explaining the machine learning algorithms? With respect
    to the predictions we get from algorithms, we typically assume that the algorithm
    has done its homework, using all the right reasoning, and we are basically asking
    the algorithm to be transparent enough so that we can see the reasoning process
    it used to arrive at the prediction.


    Choosing between a black box and a white box is an important decision for your
    organization. There are obvious reasons why anyone would opt for a white box approach,
    but there are implications too. Too much fiddling around with the inner workings
    of the algorithms to make it transparent can make the algorithm run slow and can
    create bottlenecks in your automated decision-making journey because of too much
    human involvement even for simple prediction-related problems.


    ### Point Solution versus Integrated Platform


    Commercially viable AI platform needs the three critical components—training data,
    machine learning, and a feedback loop—to be integrated. As long as you are getting
    all three capabilities, you should be good. Some vendors focus on features such
    as the ability to connect to any type of data sources and systems, including devices,
    and then offer a completely open canvas to do your ML. This is done by programming
    intensive languages like `R` and `Python` or by leveraging drag-and-drop features
    like `Azure ML`, `Spark ML`, `AWS ML`, etc. Other vendors focus largely on data
    engineering aspects through `Spark`, `Scala`, and `Python` and then leave the
    ML to be done by your choice of technology.


    It is your choice, how you want to go about it.


    ## CEO’s New Management Principle: Management By AI


    All said and done, every CEO wants to leave a legacy behind. What does that mean?
    It is all about leading and inspiring people and building a future ready enterprise,
    so it is quite natural that they don’t like delegating critical business decisions
    to smart algorithms and don’t like clever code recommending management tips. In
    some of the world’s most successful companies of our times (Google, Amazon, Alibaba,
    and Facebook), algorithms are increasingly playing the decision-making role—from
    the boardroom to sales and marketing to operations to hiring talent. CEOs should
    add one more management doctrine into their best practices—empowering algorithms.
    Elite MBAs (management by AI) are slowly becoming the new normal.


    This is a tricky situation, because going too far and leaving everything to the
    algorithms to manage will create unrest within the rank and files of the company,
    whereas doing too little with algorithms is not a choice anymore. Therefore, the
    right balance of talented humans and elite MBAIs is required. The other issue
    of importance is to define clear lines of authority and accountability—the whats,
    hows, and whys of coexistence and delegation. CEOs need to establish a framework
    in the lines of the `RACI` matrix (`Responsibility`, `Accountability`, `Contribution`,
    `Information`) to clearly articulate who is in charge of doing what and when talented
    humans must defer to algorithmic judgment and when algorithms must require human
    validation.


    There is another aspect of “feeling insecure” that makes the whole scenario of
    human-machine collaboration harder to implement. Leaders who had shown passion
    and commitment to, let’s say, automating a complex business process to improve
    the supply-chain function or a geography specific operations that was highly inefficient,
    would flinch at the prospect of deep-learning algorithms dictating their business
    strategies, new market exploration, and capex planning. The implications of the
    algorithm’s success scare them more than the risk of failure.


    For example, your data science teams, in collaboration with your domain experts
    from procurement and supply chain divisions, developed an algorithm that, by all
    measures and simulations, has demonstrated that you can save hundreds of millions
    and will enable your company to respond 10 times faster to market dynamics than
    your existing batch-oriented processes. Why wouldn’t you trust this brilliant
    AI solution? This is where the challenge lies.


    When computers became ubiquitous and information technology became the backbone
    of business, CEOs appointed `CIOs` and `CTOs` to help companies organize their
    technology landscapes, information management architectures, and business applications.
    As technology matured and especially when every business became digital, CEOs
    appointed `CDOs` (Chief Digital Officer) to implement and govern their company’s
    digital strategy. Time has now come to say the same thing about the transformative
    role that AI can play in the company’s future readiness. CEOs should seriously
    think about appointing a `CAIO` (Chief AI Officer).


    AI is still maturing, so it is reasonable to accept that not everyone in the C-suite
    would understand the benefits and implications of AI in an enterprise landscape
    completely. But, think about it, if your company is into the business of products/services
    and deals with large amounts of data (whether internally or externally, it does
    not matter), then there is a good chance that AI can be used to transform that
    data into value. Companies that have data but lack deep AI knowledge, just like
    you had previously appointed `CIOs`/`CTOs`, now need to appoint a Chief AI Officer.
    If you already have a Chief Digital Officer or Chief Data Officer, or if you have
    some forward-thinking CIO, you may expand their role to also look into AI.'
