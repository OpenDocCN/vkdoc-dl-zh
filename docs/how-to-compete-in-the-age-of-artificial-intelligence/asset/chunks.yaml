    We are also grateful to the many clients, analysts, and strangers who unknowingly
    contributed to this book when they patiently listened to our ramblings, downright
    stupid questions, and crazy thoughts. Sometimes they candidly admitted when something
    did not make sense and sometimes they vociferously agreed and nudged us to keep
    researching and writing.


    Our efforts to write this book would have been futile without the continuous guidance
    from the Apress team (Shiva, Rita, and Laura). You have our sincere appreciation
    for your support throughout this project.


    A special thank you to Rita Fernando Kim from Apress for her hard work on reviews
    and for keeping us on schedule.


    I am deeply indebted to my loving family—Snigdha, Pratik, Pratyush, and Rexie.
    Without their love, affection, and support, it would be impossible to survive
    in the corporate madness, let alone write books.


    > —Soumendra Mohanty


    I am grateful to Soum (Soumendra Mohanty) for the opportunity to work with him
    on this book. It is his idea and his book, and I am really glad that I could contribute
    in some ways. There couldn’t have been a better opportunity for “my first-book”
    project! I’d also like to thank Shweta, my wife, for her patience and support
    throughout all my ventures, including this one.


    > —Sachin Vyas


    ### About the Authors


    # 1. The Economics of Artificial Intelligence


    When three types of disruptive forces (a new source of energy, a new kind of transport,
    and a new kind of communication) converge in concert, something dramatic happens.
    The cost of goods drops, the demand-supply equilibrium gets disrupted, new avenues
    of business opportunities open up, society by and large benefits, and we find
    ourselves at the cusp of an economic revolution. The last economic revolution
    was driven by oil (new source of energy), automobiles (new kind of transport),
    and telecommunication (a new kind of communication mode). In the same parlance,
    the new economy emerging now can be attributed to be driven by the convergence
    of data (the new oil), autonomous vehicles, and digital communication.


    The nature of this new economy is disruptive in a massive way, as it is pivoting
    our current state of economics of scarcity (those having access to resources call
    the shots) to an economics of sharing (those who can marshal the resources call
    the shots). This is primarily driven by the exponential progress of technology.
    For example, Facebook—arguably the biggest media company in the world—has no journalists
    or content producers. AirBnB—the hospitality company—does not own any real-estate.
    Uber—the taxi company—has no cars. Cryptocurrencies—acting as banks—have no branches.
    All these companies have one thing in common—they are network-based companies
    and are software-driven entities.


    The economics of sharing abundance is all about creating opportunities where the
    cost to create additional products or offer a new service goes down dramatically,
    almost negligible tending to zero. The generation that grew up in the scarcity
    economy focused on hoarding and ownership was important, whereas the sharing economy
    is based on access to information and services, not necessarily to own them.


    In a slightly different way, if the cost of production, distribution, and services
    tend to drop toward zero, this not only creates a sense of abundance, it also
    creates a sense of relative scarcity. How? One can think of this relative scarcity
    similar to the problem of too much information. For example, too much media (i.e.
    video, music, content, etc.), if made available on demand, through a preferred
    channel of consumption, through a device of your choice, at a fraction of a cost,
    can result in scarcity of attention. In short, the relative scarcity in the world
    of the new sharing economy will typically manifest itself in lowering our cognitive
    abilities—humans can’t handle a barrage of new information thrown at us from all
    angles of life.


    Our biggest challenge and our greatest opportunity lies in how we effectively
    and swiftly navigate this transition from economics of scarcity to economics of
    sharing. This is why AI (Artificial Intelligence) is a critical component in the
    equation. In the older economy, affordability pushed people to buy vehicles, but
    it created a scarcity in terms of readiness of infrastructure and roads (and therefore
    unbearable traffic). Now, in the newer economy, powered by AI, you will have more
    efficient use of vehicles (Uber), and you would see fewer ownership of vehicles.
    This is because owning a vehicle and bearing the brunt of traffic no longer makes
    sense; people rather would chose to have vehicles on demand.


    Let’s look at few other scenarios to see how the effects of AI play a pivotal
    role in the economics of sharing.


    ## Natural Resources


    Natural resources are often regulated by governments and in exchange of rights
    to access these resources by corporations, governments find a way to earn revenue.
    There are legal processes and contractual obligations to stipulate and monitor
    how corporations are exploiting these natural resources. These assessment methods
    are very primitive and are further aggravated through corrupt practices. AI and
    other technologies like IoT and blockchain can play a significant role in ensuring
    not only that resource consumption and compensation are tracked but can generate
    alerts on a real-time basis, wherever there are fraudulent activities manifested.
    In addition, all financial transactions can be made available in a public ledger
    that is tamper-proof and enforced at the time of consumption to eliminate any
    chances of corruption.


    ## Cooperative Business


    In an ideal economic setting, the producer of goods and services and the coordinator
    or distributor of goods and services should have a mechanism to get appropriately
    compensated, if not equal sharing of profits. However, in reality the value chain
    is extremely unbalanced, profits tend to magnify for who are responsible for coordination
    compared to those who provide the actual goods and services. AI can certainly
    play a major role in restoring some parity by providing platforms for coordination
    and capabilities for distribution to end consumers, thereby moving the value toward
    the edges to the producer of goods and services.'
