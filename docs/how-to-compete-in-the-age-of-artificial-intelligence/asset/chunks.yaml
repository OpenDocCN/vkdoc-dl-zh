- fmt: '### Managing Immature AI


    Despite the advancements in AI technology and even as organizations continue to
    push the boundaries of what’s possible with AI, there is a wide gap between the
    promise and reality of AI.


    While at one end, we have many successful implementations of AI solutions, at
    the other end, we do have many unsuccessful attempts. This is largely because
    AI is still a young, immature field.


    Algorithms are competing with, and often winning against, expert humans in complex
    games such as chess and Go. But at the same time, simple customer service chatbots
    are failing to address the real pain points with customers and at times can be
    more annoying than helpful.


    AI has the potential to apply data and algorithms to offer quick decision making;
    however in many scenarios it seems the algorithms are themselves biased, thus
    not giving an impartial view on the outcomes. Facing this contradiction, it can
    become difficult for executives to get a clear view about the usefulness of AI,
    and hence there is the temptation to adopt a wait and watch policy.


    So, how are executives pragmatically incorporating AI into current business processes?


    Clearly, AI can take the information you have and generate information you don’t
    have. From this perspective, you can expect AI’s primary job to enhance a knowledge
    worker’s ability to make use of the predictions (there is a high probability of
    someone defaulting on a payment), whereas the primary job of the knowledge worker
    is to apply judgment (seems like an anomaly, as this person has never defaulted)
    to improve AI’s prediction performance.


    For quite some time, the set of recognized prediction problems were statistical
    and operations research related, such as inventory management and demand forecasting.
    However, over the last few years, image recognition, driving, asset maintenance,
    talent acquisition, health care, and many other tasks that were solely the purview
    of humans have also been framed as prediction problems.


    As more and more tasks that were solely under the purview of human-prediction
    work get reframed as machine-prediction problems, organizations need to shift
    from training their employees in prediction-related skills to judgment-related
    skills. In short, organizations need to focus on creating an ecosystem and processes
    to enable teams of judgment-focused humans and prediction-focused AI agents working
    in concert to deliver business outcomes.


    The effectiveness of AI technologies will be only as good as the data they have
    access to, and the most valuable data may exist beyond the boundaries of one’s
    own organization. Organizations will need to look at their current inward looking
    data strategy and open up to develop strategic alliances that depend on data sharing.


    For example, BMW, Daimler, and Volkswagen, even if they compete with each other,
    formed an alliance to buy a Berlin-based digital mapping company (HERE) to create
    a real-time platform that would track and monitor driving conditions (traffic
    congestion, estimated commute times, accidents, or vehicle break-downs on routes,
    emergency services, public utilities, and weather patterns). These are based on
    data collected from cars and trucks from each brand. Alone, it would have been
    prohibitively costly for one company to build such a platform, but together they
    created a sufficiently robust data platform that provides improved customer service
    and creates new revenue models, such as subscription based fees for municipalities,
    private emergency service providers, citizen services companies, insurance companies,
    and many more.


    AI will affect different organizations in different ways, and many of the changes
    will have direct implications to managers, such as how they plan work allocations,
    how they review the work in progress, how they provide interventions, how they
    manage a combination of AI and employees, and so on. Additionally, these changes
    bring considerable risks as well.


    - **Replacement risks** — AI promises to provide assistive intelligence to human
    performance in a number of ways, which is good as it improves human productivity,
    but at the same time AI also redefines certain activities, thereby completely
    eliminating human involvement. The reality is that human roles and positions are
    not immune any more. Insurance companies have already started using AI (instead
    of human agents) to offer customers insurance plans. As the push for smart machines,
    smart factories, and smart plants continues to progress at a rapid pace, the manual
    labor force, whose workday is largely intertwined with operating machines, will
    find their jobs are taken away by AI agents.


    - **Dependence risks** — In the long run, as AI becomes completely embedded into
    business processes and in a sense runs the enterprise functions, a strong dependency
    will emerge. Unless enough care and strong governance models are in place, this
    dependency will create new vulnerabilities, creating deadlock situations between
    AI agents and human-in-the-loop and leading to potentially ineffective operations.
    Errors and biases may creep undetected into algorithms over time.


    - **Security risks** — Today, we manage security through surveillance, monitoring,
    and access controls. Our current security management practices are designed to
    detect unauthorized activities by humans. We are beginning to realize the implications
    of security threats from software. Imagine when enterprises are fully running
    on AI agents and use sophisticated algorithms that deal not only with mission-critical
    applications but also with sensitive data. The risk of AI stealing information
    from other AIs will be very real.


    - **Privacy risks** — As AI takes on the role of information worker in an enterprise,
    the AI itself will become a source of information over time—collecting, analyzing,
    and governing fairly sensitive corporate and customer data. Widespread use of
    AI will certainly raise many data privacy and ownership issues (we are already
    seeing stricter data management and protection regulations in the form of GDPR
    for the EU). The black box nature of AI systems will pose additional challenges
    for human-machine collaboration scenarios. Unless you know why the AI system did
    what it did, you really won’t be able to trust the AI system. This is where organizations
    need to come out with clear ethical standards and draw the line between AI autonomy
    and human ownership.


    How will AI impact and disrupt the way enterprises do business? And how should
    executives plan for the upcoming decade of disruption?


    Innovative organizations reinvent themselves; they demonstrate that they are able
    to fail fast and learn faster. If you are graduating with an AI technology degree
    from a prestigious school or you have invested your time wisely to get trained
    on the latest AI technologies, would you pursue a startup that is focused on a
    niche AI-based product offering, or join a company that wants to build innovative
    AI applications, or use your academic skills to collaborate with scientists in
    other fields to conduct advanced research?


    The opportunities presented by the first two options are glamorous (thanks to
    the press) and highly rewarding, consequently driving the salaries of AI skilled
    resources through the roof. Why is there such a rush to hire AI talent? The answer
    lies in the fact that companies are sold on the idea that AI will magically create
    new business segments or will help widen the gap between them and their competitors.


    In our view, the third option of advanced research is equally important for long-term
    sustainable and ethical use of AI in all spheres of life and society. We keep
    hearing optimistic views that AI (and other digital trends) will create new industries
    and new job categories that will outshine whatever job losses it causes. There
    are two open questions regarding these views: How will these new industries be
    created? How soon will they come?'
