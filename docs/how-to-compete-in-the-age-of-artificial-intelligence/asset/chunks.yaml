- fmt: "# Long Short-Term Memory (LSTM)\n\nWe do a lot of prioritization all the time,\
    \ when we get new information, we immediately judge the importance of the new\
    \ information and then start doing the re-prioritization activities. Turns out\
    \ that the conventional feedforward networks don’t do this. When a new information\
    \ is added, they transform the existing information completely by readjusting\
    \ the weights. Because of this, the entire information is modified. On the whole,\
    \ there is no consideration for “important” new information and “not so important”\
    \ new information.\n\nThere are many real-world problems where remembering a sequence\
    \ of events is important to arrive at the final predictions. LSTMs are a new breed\
    \ of neural networks designed to selectively remember or forget things.\n\nAn\
    \ LSTM network uses memory blocks called *cells*. The memory blocks are responsible\
    \ for remembering information. Updates to the memory are done by applying different\
    \ mechanisms called *gates*.\n\n## Forget Gate\n\nA forget gate applies filters\
    \ to the cell state to either remove past information that is no longer required\
    \ for the LSTM in the learning process or to ignore new information that is of\
    \ less importance in the learning process.\n\n## Input Gate\n\nThe input gate\
    \ is responsible for adding information to the cell state. This is basically done\
    \ in a three-step process.\n\n1. Creating an input vector containing all possible\
    \ values for the cell state.\n2. Controlling which values need to be added to\
    \ the cell state by invoking a sigmoid function as a filter.\n3. Multiplying the\
    \ value of the filter to the input vector and triggering an activation action\
    \ to complete the input operation.\n\nThis three-step process ensures that only\
    \ important and non-redundant information is added to the cell state.\n\n## Output\
    \ Gate\n\nThe output gate also follows a three-step process:\n\n1. Creating an\
    \ output vector after applying an activation function to the cell state.\n2. Controlling\
    \ which values qualify to be considered as output by invoking a filter function.\n\
    3. Multiplying the value of the filter to the output vector and triggering an\
    \ activation function to complete the output operation so that the output progresses\
    \ to the next layer.\n\n# NLP Primer for Managers\n\nNatural Language Processing\
    \ (NLP) is a specialized field at the intersection of computer science, artificial\
    \ intelligence, and computational linguistics.\n\nBy utilizing NLP, we can analyze\
    \ text data and perform numerous tasks, such as automatic summarization, named\
    \ entity recognition, relationship extraction, sentiment analysis, topic segmentation,\
    \ etc.\n\nAt a broad level, NLP consists of two specific tasks:\n\n- Natural Language\
    \ Understanding\n- Natural Language Generation\n\n## Natural Language Understanding\n\
    \nNLU is the process of understanding the meaning of a given text. It tries to\
    \ get a holistic view of the nature and structure of the words in the text by\
    \ resolving various ambiguity:\n\n- *Lexical ambiguity*: Words have multiple meanings\n\
    - *Syntactic ambiguity*: Sentences have multiple parse trees\n- *Semantic ambiguity*:\
    \ Sentences have multiple meanings\n- *Anaphoric ambiguity*: Phrases or words\
    \ that were previously mentioned but have different meanings\n\nOnce the ambiguities\
    \ are resolved, NLU attempts to derive the meaning of each word by using lexicons\
    \ (vocabulary) and a set of grammatical rules to resolve issues where different\
    \ words have similar meanings (synonyms) and where words have more than one meaning\
    \ (polysemy).\n\n## Natural Language Generation\n\nNLG is the process of automatically\
    \ producing text in a readable format with meaningful phrases and sentences.\n\
    \nNatural language generation consists of three key tasks:\n\n- *Text planning*:\
    \ Ordering the content to give it a structure.\n- *Sentence planning*: Sequencing\
    \ words and sentences to represent the flow of text.\n- *Realization*: Correcting\
    \ the sentences grammatically to represent the desired meaning of the text.\n\n\
    Here are a few examples of how NLP is applied to text.\n\n- *Sentence segmentation*:\
    \ Identifies sentence boundaries, i.e. where one sentence ends and another sentence\
    \ begins. Long sentences are often broken with punctuation marks like commas.\
    \ For example, “I met a friend after a long time, we had coffee together.” can\
    \ be split into two sentences. Sentence 1 is “I met a friend after a long time”\
    \ and Sentence 2 is “We had coffee together”.\n\n- *Tokenization*: Identifies\
    \ different words, numbers, and other punctuation symbols within the text. For\
    \ example, “My car keeps giving me alerts, as the doors are not properly closed.”\
    \ can be tokenized as `[My] [car] [keeps] [giving] [me] [alerts] [,] [as] [the]\
    \ [doors] [are] [not] [properly] [closed] [.]`\n\n- *Stemming*: Reduces the inflectional\
    \ forms of each word into a common base or root. For example, “Give, Gave, Giving”\
    \ can be reduced to the root word “Give”.\n\n- *Part of speech (POS) tagging*:\
    \ Assigns each word in a sentence with a part-of-speech tag, such as noun or verb.\
    \ For example, “If you build it they will come.” can be POS tagged as:\n    -\
    \ `IN`: Prepositions and subordinating conjunctions: “If”\n    - `PRP`: Personal\
    \ pronoun: “you”\n    - `VBP`: Verb: “build”\n    - `PR`: Personal pronoun: “they”\n\
    \    - `MD`: Modal Verbs: “will”\n    - `VB`: Verb base form: “come”\n\n- *Parsing*:\
    \ Involves dividing given text into different categories. For example, “Soum and\
    \ Sachin went into a bar.” can be parsed as `(S(NP(NP Soum) and (NP(Sachin)) (VP(went\
    \ (PP into (NP a bar)))))`\n\n- *Named Entity Recognition*: Identifies entities\
    \ such as people, location, and time within the text. For example, “Sachin is\
    \ traveling to the US on Sunday.” can be recognized as `[person = Sachin]`, `[location\
    \ = US]` and `[Time = Sunday]`.\n\n- *Co-Reference Resolution*: Finds all expressions\
    \ that refer to the same entity. For example, “Sachin bought a phone. He thinks\
    \ it is worth the money.” can be coreferenced as `[Sachin, He]` and `[Phone, it]`.\n\
    \nTable 4-1 provides a list of deep learning algorithms that achieve common NLP\
    \ tasks.\n\n**Table 4-1** Deep Learning Algorithms and Common NLP Tasks\n\n| Deep\
    \ Learning Algorithms | NLP Tasks |\n| --- | --- |\n| Feedforward Neural Network\
    \ | • Part-of-speech tagging • Tokenization • Named entity recognition • Intent\
    \ extraction |\n| Recurrent Neural Networks (RNN) | • Machine translation • Question\
    \ answering system • Image captioning |\n| Recursive Neural Networks | • Parsing\
    \ sentences • Sentiment analysis • Paraphrase detection • Relation classification\
    \ • Object detection |\n| Convolutional Neural Network (CNN) | • Sentence/text\
    \ classification • Relation extraction and classification • Spam detection • Categorization\
    \ of search queries • Semantic relation extraction |\n\n## Text Preprocessing\n\
    \nText is the most unstructured form of all the available data. Before we can\
    \ apply NLP techniques to text data, we have to ensure that the text is preprocessed.\
    \ How?\n\nThere are three key intermediation steps applied to text data to make\
    \ it ready for analysis (see Figure 4-3).\n\n![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig3_HTML.png](images/467925_1_En_4_Chapter/467925_1_En_4_Fig3_HTML.png)\n\
    \n**Figure 4-3** Illustrating the text preprocessing steps\n\n### Noise Removal\n\
    \nAny piece of text that is not relevant to the context of the sentence can be\
    \ considered noise. Examples of noisy entities are language stop words (`is`,\
    \ `am`, `the`, `of`, `in`, etc.), URLs or links, social media entities (mentions,\
    \ hashtags), punctuation, etc.\n\nOne approach to noise removal is to a) tokenize\
    \ the entire text, b) refer to a dictionary of noisy entities, c) eliminate those\
    \ tokens present in the noise dictionary. Another approach is to use regular expressions\
    \ while dealing with special patterns of noise."
