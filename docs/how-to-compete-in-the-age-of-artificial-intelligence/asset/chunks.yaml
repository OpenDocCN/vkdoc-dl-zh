  trans: '

    # 词汇规范化


    句子中同一个单词出现多种表现形式也会造成噪声。例如，“eat”、“eating”和“ate”都是根词“eat”的不同变体。尽管从语法角度看它们表达了不同的含义，但根词是相同的。词汇规范化将句子中一个单词的所有差异形式转换为规范化形式（也称为*词元*）。


    最常见的词汇规范化实践如下：


    -   *词干提取*：词干提取是一种基于规则的方法，用于去除我们通常添加到根词以传达特定含义的后缀。例如“ing”、“ly”、“es”、“s”等。

    -   *词形还原*：词形还原是将单词还原为其根形式的过程。


    # 对象标准化


    这个过程基于一个普遍事实：我们经常使用既不符合语法规范也不符合任何标准词汇词典的单词或短语。一些例子包括缩写词、带有附加单词的话题标签以及口语俚语。借助正则表达式和手动准备的数据字典，这类噪声可以得到修复。


    # 文本到特征（文本数据的特征工程）


    就像我们对结构化数据进行特征工程以识别可用于开发机器学习模型的重要属性一样，我们需要对预处理后的文本数据进行类似的活动以确定文本特征。有几种构建有用文本特征的技术，接下来将进行讨论。


    *句法分析*：句法分析分析句子中的单词的语法以及它们与其他单词之间的关系。


    *依存树*：句子由遵循特定顺序以传达含义的单词组成。句子中单词之间的关系由依存语法决定。例如，考虑句子：“Recommendations on BCCI operations
    and functioning were submitted by Lodha Committee.”（洛达委员会提交了关于 BCCI 运营和运作的建议。）单词之间的关系可以以树形表示的形式观察到，如图
    4-4 所示。


    ![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig4_HTML.png](img/467925_1_En_4_Fig4_HTML.png)


    图 4-4


    说明句子解析的树形结构


    该树显示“submitted”是这个句子的根词，并由两个子树连接。每个子树都有另一个带有依存关系和关联的子树。依存树有助于识别文本特征。


    *词性标注*：词性标注有助于我们理解句子的结构。词性标注在自然语言处理中用于许多重要目的，例如，在这两个句子中：


    -   “Book my tickets.”（预订我的票。）

    -   “This is a good book.”（这是一本好书。）


    “Book”在这两个句子中用于不同的语境。在第一个句子中，单词“book”是动词，指示购买票，而在第二个句子中，它用作名词，谈论的是你阅读的一本书。


    # 实体提取（实体作为特征）


    实体是句子中最重要的对象——名词短语、动词短语或两者兼有。


    考虑这个句子：


    > *The order processing system is giving an error code of 1048.*（订单处理系统正在给出错误代码
    1048。）


    实体提取将识别以下内容：order（订单）、error（错误）、1048。这些关键信息足以进行故障排除并提供解决方案。


    一个典型的实体提取模型包含两个活动：


    -   *名词短语识别*：此步骤使用依存树和词性标注从文本中提取所有名词短语。

    -   *短语分类*：此步骤将所有提取的名词短语分类到各自的类别（地点、名称等）中。


    *主题建模*：主题建模是自动识别文本语料库中存在的不同主题（语料库中共同出现术语的重复模式）的过程。它以无监督的方式推导出语料库中单词之间的隐藏模式。潜在狄利克雷分配（LDA）是最流行的建模算法类型。


    *LDA 算法*：该算法假设文档是按以下方式生成的。


    在撰写本章时，我们：


    -   首先构思了关键主题“黑盒”。然后我们概述了本章应包含哪些主题混合。例如，我们决定包含涵盖机器学习、深度学习和自然语言处理概述的章节，然后讨论了人工智能作为黑盒的本质。

    -   然后我们添加了一些高级限制，比如页数（人们会失去阅读冗长章节的兴趣）。

    -   然后我们进入了将我们的想法转化为实际书写单词、句子、段落和章节的艺术。


    虽然这种叙述反映了人类在撰写文档时的思考方式，但机器需要透彻理解这个过程。


    机器的方法将是：


    -   首先对整个文档应用分词方法，然后执行连续词袋模型以生成文档中出现的不同主题。

    -   然后以主题作为参考点，学习哪些单词被用来生成该主题（单词“explainability”以 80%的概率定义“black box”为主题，“parsing”以
    55%的概率定义“NLP”为主题，等等）。


    *N-gram 作为特征*：N 个单词的组合称为 N-gram。与单个单词（unigrams）作为特征相比，N-gram（N > 1）通常信息量更大。


    # 跳元模型


    跳元模型背后的主要思想是确定两个不同的单词*是否相似，如果它们共享相似的上下文*。例如，在句子“to err is human”（犯错是人之常情）中，如果你用“mistake”或“screwup”代替“err”，这个句子仍然是一个有意义的句子，并且表达相同的意思（即“is
    human”）。


    跳元模型应用一个上下文窗口（一个包含 k 个连续术语的窗口）。你跳过其中一个单词，并尝试训练一个神经网络，该网络接受除跳过的单词之外的所有术语，并预测你跳过的那个术语。


    # 连续词袋模型


    在连续词袋模型中，目标是使用特定单词周围的上下文，然后预测该特定单词。在一个大型文本语料库中，每次你看到感兴趣的单词时，你都会考虑周围的单词（上下文单词）。你将上下文单词输入神经网络，以预测上下文中心的单词。


    *统计特征*：文本数据也可以使用多种技术直接量化为数字。


    *词频-逆文档频率（TF-IDF）*：TF-IDF 主要用于信息检索目的。其目标是查找文档中单词的出现情况，而不考虑精确的顺序。


    例如，你有 N 个文档。在任何文档 D 中，TF 和 IDF 定义如下：


    -   *词频（TF）*：术语“t”的 TF 是术语“t”在文档“D”中的计数。

    -   *逆文档频率（IDF）*：术语的 IDF 是语料库中文档总数与包含术语“t”的文档数量之比的对数。

    -   *TF.IDF*：TF.IDF 给出了术语“t”在语料库中的相对重要性。

    '
- fmt: '# Neural Networks as Black Boxes


    Much like how our brain works, the inner workings of a neural network consist
    of layers of interconnected neuron-like nodes, an input layer, an output layer,
    and a number of intermediate “hidden” layers. The nodes themselves carry out mathematical
    operations based on the weights associated with the nodes and pass on internal
    representations of the input data to the subsequent layers, finally summarizing
    the weights at the output layer with the prediction. Deep neural nets have more
    than one hidden layer. By feeding thousands upon thousands of data to the neural
    network, you enable it to gradually fine-tune the weight of the individual neurons
    in a specific layer. The end result is a complex reading of all the neurons across
    all the layers weighing in to produce the final output. The journey from raw input
    to final outcome is so complex and goes through so many iterations and fine tunings
    that neural networks have gained the notoriety of being black boxes, in that they
    can’t explain how they arrived at the final result. The only thing we can do is
    to try to create the best model possible and train it with as much unbiased data
    as we can get our hands on.


    The key to the neural network training is the process called `back propagation`,
    in which intermediate-layer settings are progressively modified until the output
    layer arrives at an optimal match to the input layer. The more neuron-like nodes
    you have—the more weights and intermediate layers—the more complex the learning
    process is, even if you get to a fairly accurate prediction.


    It’s one thing to have a model that gives accurate predictions with previously
    unseen data, and it’s another thing that you have no explainability of how your
    model arrived at the accurate prediction. There are many real-world situations
    where it is extremely desirable to have a view of the internal decision-making
    process in detail, because the consequences can be catastrophic.


    ## Peering Inside the Black Box


    The black boxes in airplanes are also known as flight data recorders. They record
    pretty much everything that happens during the flight journey. It is an extremely
    secure device and becomes a critical source of truth for researchers and investigators,
    if anything happens to the flight.


    The black box (ML/DL algorithms) of AI has taken on the opposite meaning—the algorithm
    delivers predictions, but it doesn’t necessarily tell you how it learned to predict
    and what it took into account while it was learning.


    The developers of these “self-learning machines” also acknowledge that once a
    ML/DL algorithm is trained, it can be difficult to understand why it gives a particular
    response to a set of data inputs. This lack of transparency raises issues about
    the autonomy, decision-making, and responsibility aspects of AI.


    There are two sets of activities that define how a machine goes about its learning
    activities:


    * Knowledge gathering (through input data sets and that help validate and improve
    the prediction confidence levels) is used to arrive at accurate predictions.

    * Embedding the predictive models into applications to not only automate decision-making
    but to also learn continuously and improve continuously.


    Once the prediction system is well trained, it is time to put it into action.
    We see two prediction systems cluster into two types.


    * Type A applications, where the consequences of prediction systems can have adverse
    effects on people’s lives. These include medical diagnoses, loan processing applications,
    CV screening applications, self-driving cars, etc.

    * Type B applications, where the consequences of prediction systems may at the
    most leave people dissatisfied. These include which movie to watch, which restaurant
    to dine at, which route for commuting will be faster, which news items you would
    like to read, which items you would like to buy, etc.


    We are less concerned about the AI system’s opaqueness when it comes to Type B
    applications, whereas we are extremely keen to understand what goes into making
    the predictions in the case of the Type A applications.


    Neural nets learn by processing input data through multiple interconnected layers.
    The first layer serves as an input layer, where “neurons” receive raw inputs (such
    as pixels in a photograph of a human face). The neurons then apply certain weights
    and arrive at a score according to a mathematical rule. The aggregated score from
    this layer is then passed on to the next layer of nodes. This process continues
    across all the layers and all the nodes in the network until you get to the final
    output layer. The last layer of the network serves as the output layer and aggregates
    all of the scores in the previous layers into a prediction: “This is a picture
    of a human face,” for example. The term “deep” means more number of layers; it
    can contain anywhere from three to hundreds of layers.


    If the prediction is wrong, the neural net will then do a reverse tracing, tweaking
    the links between nodes, adjusting the mathematical rule, progressively steering
    the lessons closer to the desired result. By tuning the parameters to satisfy
    millions of examples, the neural net creates a model that can classify new images
    or perform actions under conditions it has never encountered before.


    This learning process, known as deep learning, allows neural nets to create AI
    models that are specialized in solving a particular problem (such as image recognition,
    voice recognition, etc.), but are too complicated and too tedious to code by hand.
    What’s commendable about deep learning is that you don’t have to tell the system
    what to look for. You give it a few million pictures of cats, and the image recognition
    specialist will figure out what a cat looks like.


    Because neural nets essentially program themselves, they often create an abstract
    representation of data that no human can fully understand. The decision-making
    process is encoded in the billions of back-and-forth signals between nodes.


    Many experts find this non-explainability worrisome. It doesn’t matter in a man
    versus machine game, but it seriously matters in the case of a driverless car.
    If the driverless car gets into a serious accident, it is simply not acceptable
    to say, “We just don’t understand why the car did that.”


    The irony is that, we (humans) are building the prediction systems, and the wider
    the range of use cases we go after, the more avenues for the AI to successfully
    mimic humans, and hence the more adept the AI becomes in understanding why we
    do what we do, along with all of our biases, prejudices, and limitations.'
