  trans: '

    ### 黑盒与白盒


    算法也有自己的“态度”。有些算法简单、默默完成任务且易于解释（如`决策树`、`线性回归`、`逻辑回归`、`朴素贝叶斯`等）。而另一些算法（尤其是基于神经网络的新一代算法）则复杂、多功能且极难理解。其中许多算法甚至无法向构建它们的数据科学家解释其结果，更不用说向最终用户解释了。它们像黑盒一样运作，你无法真正审视算法是如何完成其任务的。最近的几个例子——比如`Google
    Photo`将一张黑人夫妇的图片错误标记为大猩猩，以及`亚马逊`的图书销售机器人相互竞价，直到一本书的价格超过 2300 万美元——在我们心中造成了信任问题。


    我们所说的解释机器学习算法，究竟是什么意思？对于从算法中获得的预测，我们通常假设算法已经做好了功课，使用了所有正确的推理过程，而我们基本上是在要求算法足够透明，以便我们能够看到它得出预测所采用的推理过程。


    为你的组织选择黑盒还是白盒是一个重要的决策。任何人都有显而易见的理由选择白盒方法，但这也伴随着一些影响。为了使其透明而过多地干预算法的内部运作，可能会使算法运行缓慢，并因过多的人工干预（即使是针对简单的预测相关问题）而在你的自动化决策过程中造成瓶颈。


    ### 单点解决方案与集成平台


    商业上可行的人工智能平台需要三个关键组件——训练数据、机器学习以及反馈回路——实现集成。只要你获得了这三项能力，就应该没问题。一些供应商专注于某些功能，例如连接到任何类型的数据源和系统（包括设备），然后提供一个完全开放的画布供你进行机器学习。这可以通过使用`R`和`Python`等编程密集型语言，或利用`Azure
    ML`、`Spark ML`、`AWS ML`等拖放式功能来实现。其他供应商则主要通过`Spark`、`Scala`和`Python`专注于数据工程方面，然后将机器学习部分留给你选择的技术来完成。


    如何推进，取决于你的选择。


    ## CEO 的新管理原则：AI 管理


    说到底，每位 CEO 都希望留下自己的遗产。这意味着什么？这关乎领导、激励员工，并打造一个面向未来的企业。因此，他们自然不喜欢将关键业务决策委托给智能算法，也不喜欢让巧妙的代码来推荐管理建议。在我们这个时代一些最成功的公司（谷歌、亚马逊、阿里巴巴和
    Facebook）中，算法正越来越多地扮演着决策角色——从董事会到销售和市场，再到运营和人才招聘。CEO 们应该在其最佳实践中增加一条管理原则——赋能算法。精英
    MBAI（AI 管理）正逐渐成为新常态。


    这是一个棘手的情况，因为走得太远，把所有事情都交给算法来管理，会在公司内部引发不安；而算法应用不足则已不再是可选方案。因此，需要在有才华的人类和精英 MBAI
    之间取得恰当的平衡。另一个重要问题是明确界定权力和责任的界限——共存与授权的“是什么”、“怎么做”以及“为什么”。CEO 们需要建立一个类似于`RACI`矩阵（`负责`、`问责`、`咨询`、`知情`）的框架，清晰地阐明谁负责做什么，以及何时有才华的人类必须遵从算法的判断，何时算法必须寻求人类的验证。


    “不安全感”是让人机协作的整个场景更难实施的另一个方面。那些曾对（比如说）自动化一个复杂的业务流程以改善供应链功能或某个效率极低的特定区域运营表现出热情和承诺的领导者，在面对深度学习算法来指导他们的商业战略、新市场开拓和资本支出规划的前景时，会畏缩不前。算法成功的后果比失败的风险更让他们感到恐惧。


    例如，你的数据科学团队与来自采购和供应链部门的领域专家合作，开发了一个算法。根据所有指标和模拟，该算法已证明可以节省数亿美元，并使你的公司能够比现有的批处理流程快
    10 倍地响应市场动态。你为什么不信任这个出色的人工智能解决方案呢？挑战就在这里。


    当计算机变得无处不在，信息技术成为业务支柱时，CEO 们任命了`CIO`和`CTO`来帮助公司组织其技术版图、信息管理架构和业务应用。随着技术的成熟，特别是当每项业务都变得数字化时，CEO
    们任命了`CDO`（首席数字官）来实施和管理公司的数字战略。现在，是时候对人工智能在公司未来准备中可能发挥的变革性作用说同样的话了。CEO 们应该认真考虑任命一位`CAIO`（首席人工智能官）。


    人工智能仍在成熟过程中，因此可以合理地接受，并非所有高管层成员都能完全理解人工智能在企业环境中的益处和影响。但请想一想，如果你的公司从事产品/服务业务，并处理大量数据（无论是内部还是外部，这并不重要），那么人工智能很有可能被用来将这些数据转化为价值。拥有数据但缺乏深度人工智能知识的公司，就像你之前任命`CIO`/`CTO`一样，现在需要任命一位首席人工智能官。如果你已经有一位首席数字官或首席数据官，或者你有一位具有前瞻性思维的
    CIO，你可以扩展他们的职责范围，让他们也负责人工智能领域。

    '
- fmt: '# AI Strategy for the Enterprise


    More mature organizations have a Chief Data Officer with a centralized data science
    function, but the more common model seems to be a decentralized model with data
    scientists sprinkled across an organization inside different functions.


    In the decentralized scenario, there will inevitably be a broad spectrum in the
    skillsets of the data scientists in a single company. Some will have advanced
    machine learning backgrounds, while others will have progressed to the data science
    role from being a software engineer or a data analyst. Those with the advanced
    machine learning skills probably won’t be satisfied with a black box approach,
    where it’s not transparent how an algorithm works and they can’t fine-tune the
    parameter weightings. Bear this in mind when considering solutions that are black
    box only.


    `AI` itself is not a product or a business unit by itself; it is a foundational
    technology that can help existing lines of business and create new products or
    lines of business. Thus, to successfully usher `AI` into an enterprise requires
    a great deal of understanding of your current business and demands working with
    diverse business units or functional teams. You need a leader who can exhibit
    entrepreneurial traits. With `AI` evolving rapidly, your teams will need to keep
    up with changes. It is less important that they be on the bleeding edge of `AI`.
    What is important is to choose an evolutionary path. Your teams of data scientists,
    data engineers, and executives need to work cross-functionally and have the business
    skills to figure out how to develop and implement `AI` solutions that are relevant
    to your enterprise and business goals.


    The chief `AI` officer needs to have a good technical understanding of `AI` and
    your company’s data infrastructure, must have the ability to work collaboratively
    across business functions and executive leaders, and most importantly should have
    credibility to attract and retain `AI` talent.


    ## CEO Mandate: Democratize AI


    The other most important aspect in the CEO’s `AI` strategy is to make `AI` technologies
    widely available throughout the organization, especially to those who have loads
    of experience managing and running your business functions but are at sea when
    it comes to using the latest technology led decision making. Call it the “democratization
    of `AI`”. To accomplish this goal, the company needs to do several things: develop
    their own `AI` platform, conduct extensive design thinking sessions across business
    functions, and re-skill the workforce to understand how prediction technologies
    work and how they can coexist in an increasingly human-machine world.


    In the longer run, your workforce will get enough exposure and know-how to start
    developing their own `AI` applications to do their job faster, better, and cheaper.
    For example, your marketing team will be able to connect a widget of natural language
    processing together with other components to create an app for gathering and analyzing
    unstructured data from social media data. Or your sales team will be able to analyze
    a huge customer data set to predict which prospects are most likely to convert
    to customers or uncover insights about customer behavior and improve the design
    of different products and offerings, thus increasing the ability to cross-sell/up-sell.


    Democratization of `AI` will also allow your ecosystem partners to co-platform,
    bringing in strong collaboration capabilities and simplified process orchestration
    that cuts across organizational boundaries. Think of how spreadsheets helped democratize
    data analysis, enabling even mom-and-pop shops to perform invaluable “what-if”
    analyses.


    It is clear that the “democratization of `AI`” is a strategic undertaking that
    all enterprises need to do to create a sustainable competitive advantage.


    ## Conclusion


    `AI` is a longer-term trend that will impact all aspects of our lives at home
    and at work. We are moving to a world that’s a big semantic web where everything
    is connected with everything. Purely talking in algorithmic norms, our location
    is an attribute, our sentiment is an attribute, our facial expressions is an attribute,
    and our voice is an attribute. The super convergence of cloud, mobile, social
    media, Big Data, `AI`, and now blockchain are enabling companies to aggressively
    explore, innovate, and launch disruptive businesses models and super smart offerings
    in the consumer-to-consumer and business-to-business sectors. In this context,
    the board asking the CEO about an `AI` strategy is apt. Enterprise `AI` is about
    building, deploying, and managing systems of intelligent engagement. It is not
    about mere automation of manual work. Thus as a CEO, your task is cut out for
    you. You need to have a clear vision:


    1. **Establish `AI` as a business capability**: `AI` is too important to be left
    to few experimentations or one-off `AI` proof of concepts or the IT teams to develop
    know-how. The point is not about publishing an annual report where you can also
    say that you are exploring `AI`, like many others do. CEOs should be asking: what
    is the art of the possible with `AI`?


    2. **Democratize `AI` within the company**: Incrementalism will not transform
    companies. Adopt a “dot versus bubble” analogy to arrive at how your company should
    be approaching `AI` use cases not only to differentiate in the market but also
    to democratize `AI` within the company.


    3. **Adopt fail-fast learn-fast methodology**: Adopt a `10/10/10` methodology:
    10 hours to identify use case, 10 days to build the data pipeline, and 10 weeks
    to go live with `AI` capability. CEOs must encourage a culture of learning and
    experimenting. This requires an agile methodology to go from concept to capability
    in fewer than 90 days.


    4. **Drive and manage `AI` projects as a top-down initiative**: The leadership
    has to treat `AI` as a business imperative that is driven from the top-down, not
    a technology know-how drive and experimentation type of projects driven from the
    bottom-up.


    5. **Build an ecosystem to leverage**: The hyper-convergence of the big six technologies
    means that companies need an ecosystem of partners to tackle all of the key technologies.


    What if your board doesn’t ask you this question? If your board of directors is
    not concerned about the company’s `AI` strategy to drive new business models or
    new products and services, maybe you need to consider changing the composition
    of the board! In this fast-paced changing business and market scenarios, there
    are no second chances. You absolutely need your board to understand and play a
    critical role in questioning your strategy, technology investments, and people
    reskilling initiatives that your company’s future depends on.


    In the next chapter, we discuss fundamentals of `AI` (slightly technical aspects
    of `AI`) and the associated apprehensions, despite its obvious advantages.'
