    # 3. 董事会致 CEO：“你的 AI 战略是什么？”


    尊敬的 CEO，人工智能既是您最大的威胁，也是您最大的机遇，那么您的 AI 战略是什么？


    对许多 CEO 而言，这个问题是一个巨大的挑战。AI 这个话题涉及面广、被过度炒作且呈指数级发展，让人不知从何入手。您有哪些选择？


    -   您可以收购一家专注于运用 AI/ML 解决业务问题的创新科技公司，从而获得新产品、服务以及 AI/ML 人才。

    -   您可以投资几家早期阶段的 AI 初创公司，以便了解这个快速发展的技术领域中的创新动态。

    -   您可以批准资金，用于建设内部 AI 能力，并设立一个集中的 AI 卓越中心，开始探索如何优化内部流程，以及如何将 AI 整合到您的产品、服务和解决方案中。这个选项耗时较长，您需要具备远见卓识、资金承诺，以及吸引和留住顶尖
    AI/ML 人才的目标感。

    -   您可以借助外部咨询和服务公司，填补现有业务和 IT 团队的缺口，从而启动相关工作。


    这些选项绝非相互排斥。相反，您需要为您的 AI 战略保持开放的心态——构建/购买/合作/共同创新都是可选方案——但您也需要衡量/学习/试验，然后筛选出哪些对您的公司有效，哪些无效。


    虽然这些选项可能为您制定和执行 AI 战略提供一些初步思路，但事情远不止于此。您如何为未知做好准备？


    现在，回到最初的问题——您的 AI 战略是什么？为了找到答案，我们首先将讨论董事会为何提出这个问题。然后，我们将讨论一个简化 AI 的概念框架，以便您能向董事会给出深思熟虑的回应。最后，我们将讨论作为
    CEO，您应如何让团队参与 AI 议题，以及在制定 AI 战略时的重要考量。


    ## CEO：“董事会为何要问我这个问题？”


    那么，董事会为何现在问您这个问题？AI 既不是对当前 IT 系统和方法的渐进式调整，也不是购买智能能力和平台并将其纳入企业。AI 带来了巨大的变革能力，贯穿整个企业，影响所有层级的角色。这可能会让大多数高管（甚至经验丰富的
    IT 专家）感到不安。


    看看十年前发生了什么！那家 DVD 租赁公司、销售 CD 的音乐公司、实体旅行社和公司、日报、连锁书店，当时都经营良好，前景光明，未来多年盈利可期。互联网的出现改变了一切。基于电子商务的便捷购物成了一种生活方式，而根基稳固的企业则失去了相关性。


    如今，企业正面临类似的转折点。AI 正将我们带入未知领域。AI 帮助机器进行对话、驾驶汽车、在危险条件下从事体力劳动、执行精细手术、预测我们的购物意向、诊断健康状况、管理金融交易、提供安全保障等等。AI
    无处不在。总的来说，这关系到我们自己的工作、我们的企业以及生活质量。为了有效驾驭这片新领域，企业高管需要理解并考虑一个由五部分组成的 AI 行动计划。


    ### 应用“没有免费午餐”法则


    “没有免费午餐”法则指出，你无法同时兼得——你的 AI 无法同时擅长通用智能和狭义智能。不要被你在媒体上看到的内容冲昏头脑（例如谷歌、亚马逊、苹果、微软、特斯拉等公司投资开发通用
    AI）。你必须专注于识别和解决那些对你的业务和你所在市场而言具体的问题。你的战略机遇就在其中。


    ### 拥抱开放与透明


    理解并承认你无法独自完成所有事情至关重要，因此协作与共享是关键。成千上万的初创公司和其他机构正在尝试解决一些非常独特的空白领域问题。这些解决方案和想法目前可能不会颠覆你的市场；然而，它们可能很快就会成为现实。从战略上讲，你最好的选择是与初创公司、学术界以及各类
    AI 实验室共同构建一个包容性的生态系统，并开始利用这股势头，针对你的特定市场和客户开发专有能力。


    ### 评估互联世界中的机遇


    世界正变得越来越互联——从固定传感器到手机、无人机、智能可穿戴设备以及高度对话式的个人助理。这些边缘系统被赋予了看、听、理解和反应的能力，无论你身处实体环境还是高度数字化的环境，都创造了巨大的机遇。自然地，当你能够有效利用这些互联设备并推出独特的商业模式时，最大的
    AI 价值创造机会就会出现。


    这是你应该进入的市场吗？


    ### 聚焦增强智能


    我们距离创造类人的自主智能还很遥远，因此最好专注于那些能够开发增强智能产品的领域，无论是供内部使用还是外部消费。


    随着 AI 驱动的自动化开始影响知识工作者相关的技能，批判性地评估你的企业技能规划方法将变得至关重要。与其采取保守的方法来保护工作岗位，你需要评估并做出一些艰难的决定，以确保你的人力资本保持相关性（如何在人机融合的场景中共存），并在各自的业务流程中向价值链上游移动。


    ### 关注伦理与网络安全


    AI 提供了一种一致且客观的问题解决方法。即便如此，它也无法免受偏见的影响。已有多个案例显示 AI 输出结果明显带有偏见。因此，你必须密切关注 AI 引发的伦理、法律和社会问题。


    ## CEO：“我该如何回应？”


    让我们从定义 AI*不是*什么开始。这是必要的，因为媒体对 AI 的报道往往缺乏深思熟虑，且常常夸大其词。


    ### AI 不是机器与人类的对立


    过去几年，围绕 AI 的猜测甚嚣尘上：人类将被机器取代。这是描绘企业 AI 图景的完全错误方式。正确的愿景是我们如何利用 AI 来增强人类能力，去做我们以前从未想象过的事情。即使是近期媒体对谷歌
    DeepMind/AlphaGo 战胜李世石的报道，也被戏剧化地描述为机器获得超级智能，并在人类发明的游戏中击败了人类。一个更现实的描述可能是“从众多人类经验中学习的机器击败了一个单独的人类”。


    机器拥有人类不具备的优势：速度、可重复性、一致性、可扩展性和更低的成本。人类拥有机器不具备的优势：推理、经验、适应性以及处理广泛任务的能力。明智的做法是找到正确的方式将人类与机器融合，而不是用机器取代人类。

    '
- fmt: '# AI Is Not Always About the Best Algorithm


    For many, the terms AI and algorithm hold the same meaning and importance. The
    best algorithm creates the best prediction. Facebook has the best newsfeed algorithm;
    Netflix has the best movie recommendation algorithm; and Google has the best ad
    placement algorithm.


    Whether algorithms trump data or data trumps algorithms, the debate is on, but
    it is abundantly clear that algorithms are a necessary component of AI, but not
    the only component.


    Many leading AI experts now have a view that lots of data and simpler data can
    do the trick as opposed to little or minimal data and complex algorithms. You
    get more out of gathering, cleaning, and understanding data than relying heavily
    on fancy algorithms. It’s not quantity of data however, it’s the quality that
    matters. A high quantity of data cuts both ways. Sometimes you have enough data
    that the answer is clear for even the least efficient methods, and with lots of
    noise. But other times, the sheer volume of data requires clever algorithms to
    make any sense at all.


    Figure [3-1](#467925_1_En_3_Chapter.xhtml#Fig1) summarizes the several building
    blocks for AI in the enterprise. The first two blocks are related to data and
    infrastructure; the middle block is all about algorithms; and the last two blocks
    are related to new skills, adoption of AI solutions, and the feedback loop.


    ![../images/467925_1_En_3_Chapter/467925_1_En_3_Fig1_HTML.jpg](images/467925_1_En_3_Chapter/467925_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1** Building blocks for AI in the enterprise


    So this brings us to a working definition of AI for the enterprise:


    `AI = Training Data + Machine Learning + Feedback Loop`


    This is the most important equation that the CEO needs to understand, if AI is
    to become a flywheel for the enterprise. Let’s look at the individual components
    of this equation, taking a particular problem statement into account.


    Let’s suppose you want to do two things: 1) improve your service levels and 2)
    optimize your resources to eliminate activities that are repetitive. You would
    like to apply your AI solution to not only categorize support tickets by severity
    level automatically but also to create an intelligent knowledge base that will
    enable you to do event correlations, predict the ticket volumes, and automatically
    fix issues where you are 100% confident.


    ## Training Data


    Training data consists of any data (structured, unstructured, semi-structured,
    images, voice, and videos) that can help solve the problem you are going after.
    If the business process that you are trying to improve or automate with AI is
    already digital, then the data that is required to complete that process may already
    be available. If part of the data is labeled, meaning the data has certain indicators
    that you can use to correctly classify the outcomes, then you are in a good shape
    to start training your machine learning algorithms. In the context of our example,
    if we have data that besides having information about the support ticket also
    has an indicator showing the “severity level,” then we call that data set labeled.


    ## Machine Learning


    Machine learning is nothing but a mathematical representation of the data to help
    you arrive at a predictive model that can be applied to new inputs. In our example
    this means, by observing lots of support tickets, you figure out the patterns
    that lead you to correctly determine the service level. Once you have got your
    model built on training data, you can then expose your model to new support tickets
    (which are not labeled yet) to classify the ticket into the right category of
    service level. Of course, this process is not a single-shot approach. You will
    have to train your algorithm on a wide variety of support tickets. You will have
    to keep monitoring how your algorithm is performing (how many false positives
    and how many false negatives). You will have to penalize your algorithm for wrong
    predictions because it may lead to wrong fixes getting applied in live systems
    with potentially disastrous outcomes. The more quality data you get, the more
    refining you do to your algorithm and the better prediction capabilities you achieve.


    To achieve a high degree of prediction, you have to put in a sustained effort
    to acquire diverse set of data including process maps, system behaviors, user
    journeys in the system, possible root causes, a large corpus of scripts that can
    fix any kinds of system issues, troubleshooting tips and tricks, and any other
    information that can come benefit your algorithm. This diverse data set, if curated
    properly and maintained well, will become the intelligent knowledge base for your
    enterprise.


    One of the advantages of algorithms compared to humans is the true reflection
    of their own confidence level. Humans are notoriously overconfident about their
    own reasoning capabilities and judgments, which is people dependent. Two support
    engineers looking at the same support ticket will rarely arrive at the same conclusion
    if left to their judgment, unless they are bound to follow a standard operating
    procedure that has steps outlined to an excruciating level of detail. In contrast,
    algorithms will be always consistent in what they predict (right or wrong).


    ## Feedback Loop


    When algorithms start training on data, they start from no experience. They have
    no knowledge about patterns hidden deep inside the data. They can make predictions
    but someone needs to validate those predictions. This is where human experience
    comes into the picture, by providing feedback, reviews, and sometimes even overriding
    the machine predictions. This is the critical third component in the equation.


    So far we have been highlighting how the prediction technology will give impetus
    to more automated decision making, but at the same time we are also saying that
    the feedback loop is important, that human experience and involvement during the
    learning process are important. Aren’t these views contradictory? There could
    be scenarios where the algorithm will go blank. The reasons could be many—the
    new data it sees is completely different from the data it was exposed to during
    the learning process, such as certain rarely occurring or in-frequent scenarios
    it encounters for the first time which was not there in the training data. The
    machine then objectively assesses the data and comes out with predictions that
    are highly accurate from the machine’s point of view but it are not aware of the
    numerous business rules baked into the business processes and applications. These
    are the primary reasons why human involvement during the learning process is extremely
    important. Unless the machine is validated on its predictions, it will never reach
    the level of confidence where you can pretty much automate the entire decision-making
    process.


    # CEO: “How Do I Engage My Leadership Team?”


    Now that you have an understanding of how to apply the AI framework to your business,
    it’s time to start engaging with your senior leadership team. It is time to strategize
    and push a blended model that takes advantage of the speed and scale of machines
    to address the well-defined but repeatable tasks, while the humans handle the
    higher order judgment tasks.'
