    There are three broad prerequisites to an AI approach: You must have lots of data,
    you must have capabilities to interpret the data, and you must have a way of making
    predictions from the data that help you achieve certain business outcomes. As
    you contemplate the introduction of AI into your organization, the next section
    outlines a list of best practices and critical success factors for your AI initiatives
    to succeed.


    ### How to Define an AI Strategy


    Given the hype that surrounds AI in general, business leaders need to critically
    determine the areas where AI can (and cannot) make significant material differences
    to the top or bottom line or even completely change their current business model.
    This is not an easy task and requires a dispassionate and objective view to address
    two specific areas: a) AI influenced industry disruptions that may significantly
    impact the current business model, and b) how to introduce and implement AI-driven
    solutions to usher significant changes to the way the company currently operates.


    #### Identify Potential AI Use Cases


    With every new technology buzzword, it is generally observed that companies go
    into a procrastination mode for quite some time. Reasons could be many—not enough
    appetite to experiment and learn, don’t want to become the first few to take the
    plunge, uncertainty about the technology, or not enough confidence on the outcomes.
    The list can go on and on.


    Hence, business leaders need to move quickly and identify opportunities where
    AI will create business value. A sure way to generate a list of business relevant
    AI use cases is to discuss the topic with everyone, including startups (you don’t
    have to invent everything by yourself, rather look for collaboration and identify
    adjacencies or whitespaces that others are trying to figure out), do extensive
    research around the competitive landscape, and conduct design thinking sessions
    with your own business and IT leaders.


    A very effective way of getting started is to brainstorm along two distinct themes.


    Product/service innovation related questions:


    *   Does it provide a force-multiplier by improving efficiency or significantly
    reduce cost?


    *   Can it enable a better, efficient, and lower cost product substitution, thus
    altering the market dynamics?


    *   Does it integrate the enterprise value chain by optimizing or rationalizing
    processes, thus shortening time-to-market?


    *   Will it introduce features with hard entry barriers and thus enable you to
    charge premium and high margins?


    Value realization related questions:


    *   Does it provide opportunities to leverage your current customer base and develop
    new services so that you can monetize your investments on data and algorithms?


    *   Is there any way to truly introduce differentiation and value-add services
    for non-linear growths by establishing network effects based on an ecosystem or
    a platform?


    *   Will it create uniqueness and establish strong entry barriers by preventing
    competitors from replicating your products, services, and offerings?


    *   Will it increase the cost significantly for your competitors to create alternative
    options, or will your competitors be more than willing to provide complementary
    offerings, thus adopting a sharing economy?


    If the answers to these questions are more likely yes, cutting across business
    functions, corporate functions, and HR practices, you will likely end up formulating
    your own AI strategy. When you’re doing this exercise, don’t allow constraints
    to limit your answers.


    Later in this chapter, we discuss a structured approach to defining AI use cases.


    #### Assess Adoption Scenarios


    Once you have identified your high-level AI use cases, start doing an assessment,
    which may further involve market studies, surveys with your existing customers,
    or even an independent validation by industry reputed consultants to determine
    what kind of adoption scenarios your AI initiatives will go through. Whether it
    will go mainstream or remain a niche offering. Essentially what you are looking
    for are early indicators—universal applicability, customer awareness and readiness,
    low switching barriers, low TCO, high ecosystem compatibility, scalability, and
    fewer regulatory barriers.


    The more “yes’s” you get against these indicators , the more you know that your
    AI solutions are ready for mass adoption and hence you should start formulating
    investment strategies and go-to-market strategies. If you are getting guarded
    answers against a majority of these indicators, you know that it falls into a
    niche offering category. Hence you need to start thinking about how to create
    a market for your AI solutions.'
