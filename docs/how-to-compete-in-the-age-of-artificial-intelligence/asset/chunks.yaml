- fmt: '### Automation


    Enable the IT operations professionals to automate what they are currently doing
    manually. Through automation they can speed up issue identification and resolution
    activities, and therefore also solve more issues in a given time or with a given
    set of resources.


    Algorithms can automate the process of analyzing and correlating event data, which
    if done manually, would take hours. Millions of events can be reduced to tens
    of incidents automatically, using sophisticated algorithms that can de-duplicate,
    filter out the irrelevant data, and correlate event feeds in real time.


    To further elaborate on the automation aspects, let’s consider a few examples:
    correlating customer profile information with financial processing applications
    and transactional data to identify outliers and highlight performance impacting
    factors; evaluate unstructured data in service tickets to identify problem automation
    candidates; categorize workloads for optimal infrastructure placement; and correlate
    incidents with changes, work logs, and app dev activities to measure production
    impact of infrastructure and application changes.


    What do all these tasks have in common? To efficiently perform these tasks, the
    key requirements are reasoning capability and contextual knowledge. The IT operations
    personnel need to correlate among several data sources to identify outliers, identify
    causal relationships, and refer to system logs to surface the root cause. Quite
    simply, the expectation is for a system to take over these manual investigation
    tasks to highlight as many possibilities as possible, then the SMEs can apply
    the domain knowledge necessary to reason and arrive at the next best steps.


    This level of automation means that incidents can be detected instantly without
    requiring humans to manually connect the dots across various tools and application
    silos. For example, the AIOps platform can curate every incident observed in the
    past and capture all the tribal knowledge inclusive of scripts executed to resolve
    that incident. Should a similar incident occur in the future, algorithms can be
    used to automatically refer the knowledge base and reuse the approach taken to
    the incident. The role of AIOps is to increase the productivity, responsiveness,
    and productivity of the IT operations personnel by automating the manual tasks
    that they perform.


    ### Prediction


    By analyzing past incidents and the current stream of events, the system should
    be able to predict several things: a) determine the severity of the issue, b)
    categorize it into a kind of problem, such as infrastructure related, application
    related, user administration or access related, etc.


    In other words, the expectation is that there should be some sort of intelligent
    system that continuously works on the data and, by learning what is normal behavior
    and what is an abnormal behavior, raises appropriate notifications, provides recommendations
    for fixes, and highlights confidence levels against those recommendations. If
    the intelligent system achieves significant confidence levels, then it may be
    smart to autonomously execute the fixes.


    Keeping these two primary expectations in mind, let’s discuss the capabilities
    required to develop the AIOps platform:


    - **Ability to integrate extensive and diverse IT data sources**: The platform
    should be able to break the currently siloed tools and IT disciplines and integrate
    data related to events, metrics, logs, job data, tickets, monitoring, etc. across
    the entire stack of infrastructure, applications, and end-business transactions.
    The aim should be to create an end-to-end topology.

    - **Ability to aggregate and provide a holistic view**: The platform should be
    able to aggregate historical data for trends analysis and learn and at the same
    time capture streaming real-time events.

    - **Ability to compute and perform advanced analytics**: The platform should be
    able to compute and employ sophisticated machine learning algorithms, including
    NLP capabilities to eliminate noise, identify patterns, isolate probable causes,
    expose underlying problems, and achieve other investigative and prediction oriented
    tasks. The platform should also have the ability to simulate different scenarios
    in real time to enable the IT operations experts to carry out “what-if” analysis
    and speed up the triage process.

    - **Full stack visibility/ability to visualize complex patterns in data**: The
    platform should have the ability to visualize various interdependencies and relationships
    in vast amounts of diverse data. This is required to help the IT operations personnel
    quickly analyze and understand the interdependencies between systems.

    - **Ability to automate tasks**: The platform should be able to automate tasks,
    taking the outcomes generated by machine learning, to fix the issues.


    Let’s now explore how the AIOps system will be able to solve the common IT operations
    tasks.


    **Forecasting**:


    - **Task**: Determine when prior defined thresholds will hit the circuit breakers
    and perform “what if?” analysis to find root causes.

    - **Data**: System logs data, application performance data, user concurrency and
    usage patterns, and events.

    - **Algorithms**: Linear regression, change detection, seasonality decomposition,
    and Box-Jenkins.

    - **Machine learning**: Mostly supervised; the system is already trained on historical
    data.

    - **Visualization**: Graph analyzers to help quickly spot dependencies and linkages.

    - **Example of actions**: plan for in-time provisioning of resources in anticipation
    of blackouts.


    **Probable root cause analysis**:


    - **Task**: Correlate a diverse set of data points to automatically identify a
    small number of potential causes.

    - **Data**: System logs data, application performance data, user concurrency and
    usage patterns, events, and knowledge bases consisting of root causes and corresponding
    fixes.

    - **Algorithms**: Pearson correlation coefficients or other suitable linear correlation
    algorithms.

    - **Machine learning**: Unsupervised learning approach leveraging historical data
    and knowledge base without any prior training or specific goals.

    - **Visualization**: Recommendations with specific actions, corresponding confidence
    scores, decision trees, etc.

    - **Example of actions**: Redirect attention and resources to respond to the right
    cause.


    **Clustering**:


    - **Task**: Find similarities and frequency distributions of word pairings to
    categorize various issues according to severity and root causes.

    - **Data**: System logs data, application performance data, user concurrency and
    usage patterns, events, and knowledge bases consisting of root causes and corresponding
    fixes.

    - **Algorithms**: Levenshtein distance and Latent Dirichlet Allocation for topic
    modeling.

    - **Machine learning**: Unsupervised learning.

    - **Visualization**: Hierarchical clustering and self organizing maps.

    - **Example of actions**: Identify the similarity of a new issue with earlier
    ones and redirect to the right expert or respond automatically.


    **Continuous improvement**:


    - **Task**: Determine future behavior of operations metrics and system performance
    by continuously monitoring daily, weekly, and monthly behaviors.

    - **Data**: System logs data, application performance data, user concurrency and
    usage patterns, events, and knowledge bases consisting of root causes and corresponding
    fixes and implications due to new technology adoption.

    - **Algorithms**: Bayesian belief networks and stochastic non-deterministic algorithms.

    - **Machine learning**: Mostly unsupervised approach and deep learning to continuously
    learn from data.

    - **Visualization**: Recommendations with specific actions, corresponding confidence
    scores, decision trees, etc.

    - **Examples of actions**: plan for provisioning resources to avoid blackouts.'
