  trans: '

    ### 将数据转化为洞察


    第二种人工智能能力是处理所有这些不同类型的数据，从中挖掘洞察。这正是`ML`（机器学习）、`DL`（深度学习）、`NLP`（自然语言处理）和神经网络发挥作用的地方。`NLP`有助于从非结构化数据中提取含义，而`ML`则有助于从数据中开发预测能力。深度学习和神经网络从数据中学习，以解决诸如识别照片中的人脸、理解口语以及生成口语等问题。


    在`RPA`（机器人流程自动化）的背景下，这些人工智能能力无疑可以作为一项补充技术。例如，`NLP`可以标准化并从文档、电子邮件、记录和日志中提取相关数据，即使这些数据是自由格式的，甚至当感兴趣的实体位于文档的不同位置时也能处理。以发票表单为例。日期有时可能在左上角，有时在右上角；物料清单在某些表单中可能表示为“单价乘以数量”，而在其他表单中则可能逐项列出，最后在底部汇总。描述在一个表单中可能是详细版本，而在另一个表单中则是编码版本。税额可能写在总金额上方，或者作为单独条目列在下方。仅依靠`RPA`能力来处理这种多变性将极具挑战性。即使你添加了足够的规则来应对所有这些不同场景，最终的程序也会变得极其复杂且难以管理。借助`NLP`和`ML`能力，人工智能可以轻松解决这些问题。


    对话界面（或聊天机器人）可用于促进人类与其他系统之间的交互。你以自然语言形式输入你的问题，人工智能会从那里接手，处理你的查询并回复相关答案。如果你不想打字，你可以与系统对话，人工智能将使用语音识别来理解你的查询，与后端系统交互，然后向你回传相关信息。尽管人工智能技术取得了所有这些进步，我们仍然生活在狭义人工智能的世界里。这意味着，擅长图像识别的人工智能无法生成文本，而擅长`NLP`处理的人工智能也无法提供推荐或最佳后续方案。因此，在`RPA`的背景下，需要考虑人工智能的补充。通过全面考虑你试图解决的问题，你将不得不将各种人工智能能力拼接在一起。


    `RPA`和人工智能是两种截然不同的技术，但它们却能很好地相互补充。例如，人工智能可以帮助处理各种非结构化数据并构建丰富的知识库，然后`RPA`技术可以有效地利用这些知识库来自动化任务。随着企业将`RPA`的应用范围从那些易于实现的自动化任务类型问题中拓展出来，他们应该开始关注人工智能，将自学习能力引入到`RPA`领域本身，并使其业务流程实现智能自动化。


    ## 自动化与智能：协同工作


    当你将`RPA`的自动化能力与人工智能的自学习能力结合起来时，你看到的是技术解决方案的融合，这不仅能改善你的运营和客户互动，还可能创造新的商业模式。许多公司开始认识到结合这两种技术来解决问题的潜在好处，尤其是在由于大型遗留系统或包含多次跳转和复杂集成模式的旧业务流程而放大运营效率的情况下。


    让我们首先理解为什么需要智能自动化。


    ### 对更快周转的需求


    在高度竞争和快节奏的商业环境中，最关键的企业指标衡量的是公司对客户和市场的响应速度。为了实现这一点，面向客户和面向市场的应用程序需要近乎实时，而后端系统也需要进行改造以匹配前端的处理速度。这种双重转型挑战需要精心协调，因为大多数后端系统是在数十年手工编码程序的基础上演变而来的。组织迫切需要能够快速带来这些双重变化的解决方案。


    ### “直接迁移”的终结


    企业寻求的变革，并非采用新技术以老方法完成相同任务，只是配上吸引人的用户界面或提升用户体验。他们寻求的是真正的变革，即系统变得足够智能，能够适应不断变化的业务动态和客户偏好。对新技术的简单“直接迁移”方法不会使企业变得高效，真正的需求是寻找超越成本节约或运营便利性的、具有颠覆性和可证明的商业价值。


    ### 期望值已提高


    决策者不满足于稳健但僵化的业务系统。他们期望业务系统具有适应性和响应性。他们希望自己的业务系统不仅能完成其设计的工作，还能主动为他们提供额外的洞察，以便他们能够做出更明智、更好的决策。

    '
- fmt: '# The Journey of Intelligent Process Automation (IPA = RPA+AI)


    Humans codified rules-based systems to automate processes and solve the problems
    of yesteryear. Humans also developed AI technologies to learn from observations
    and solve problems that hinged on judgment. What if you combine these two distinct
    problem-solving techniques? In essence, intelligent process automation leverages
    the learning and adaptive capabilities of humans and interjects those into the
    process redesign initiatives. When you take traditional rules-based automation
    designs and augment them with self-learning capabilities, you get IPA that not
    only replicates human judgment and skills but also over time learns to do the
    tasks even better.


    Automation, when embedded with judgment or automation supported with the human
    in the loop, is redefining the way tasks are being allocated and performed in
    an enterprise. To begin with, IPA was primarily used in the manufacturing processes
    and later as bits and pieces in other functions. Now, it is increasingly becoming
    an integral part of various enterprise functions across the board.


    Organizations are putting in place holistic architectures of IPA systems because
    of its potential to be the critical vehicle for effecting enterprise-wide transformation.
    The time to embark on the “IPA journey” has indeed arrived. To automate or not
    to automate is no longer a question. The primary stimulus for this new enthusiasm
    stems from the appreciable double-digit improvement in productivity across organizations
    that have implemented RPA. RPA tools are set to evolve further as they imbibe
    augmented intelligence capabilities to mirror human intelligence. And as they
    become smarter, we will also see them perform more intelligent and complex tasks
    such as planning, budgeting, analysis, and decisions making that were perceived
    to be within the preserve of humans only.


    Before we go into what constitutes IPA, first let’s debunk a few myths about automation!


    - **RPA will improve productivity and reduce cost**: Yes, by automating business
    processes, one can surely improve productivity and reduce cost. However, the associated
    aspects of change-management need to be carefully evaluated. Often, it is seen
    that the gains in productivity and reduced cost are eclipsed in additional overhead
    that one needs to put in to manage the change.


    - **Before you apply RPA, you need to improve the maturity of your processes**:
    This is not a prerequisite, rather it is a good to have wish. The only objective
    of RPA is to break down your processes into smaller chunks and find ways to automate
    them. That way either the end-to-end process can get completely or partially automated.
    Either way, you will introduce transformative capabilities into your processes
    and operations.


    - **Given the maturity of vendor tools, you can deploy software robots in production
    quickly**: The answer is—it depends. If the process in question is deep within
    some backend systems, has not seen any significant human involvement in the past,
    and is more or less a standalone sub-process, then the answer is clearly yes.
    However, if the process has dependencies with other systems, has a workflow with
    multiple human validation points, and deals with certain data that is fairly complex
    and sensitive, then you need to be careful not to rush into production deployment.
    It is advisable to have a pilot solution for a lengthy period of time, evaluate
    the effectiveness and efficacy of the solution, plan a proper change-management
    program, and then take it to production deployment.


    - **The key success criteria are the number of bots you have deployed**: Nowadays,
    it has become a trend to quote the number of bots you have in production as a
    proxy to articulate your organization’s automation journey and maturity. In our
    view, it is not the number but the efficacy and efficiency that matters. At the
    one end, you may be reducing the FTE count by automating manual activities, but
    at the other end, you are increasing the number of machines in your workforce
    mix. These machines will need supervision, governance, and maintenance efforts
    as well. Hence, utilization per ‘bot’ is probably a better measure for understanding
    the efficacy of automation.


    - **Why RPA and then cognitive? One can straight away move to cognitive**: RPA
    is a straightforward process of mapping input to output, whereas cognitive means
    you are bringing in learning from data to dynamically do your automation. This
    requires a certain level of data, process, and knowledge base maturity. If you
    have not simplified your processes, the resulting data will be fragmented and
    disconnected, which means for you to apply machine learning, you have to do the
    heavy lifting of managing and consolidating your data, which in turn means you
    will take longer to train your machine learning models to deliver the kind of
    automation you are looking for. Hence, it is advisable to start with RPA. It becomes
    a stepping-stone in your automation journey and prepares the organization for
    becoming an autonomous organization in the long run.


    IPA is not just one tool, rather it consists of five core technology capabilities,
    all integrated to provide a platform on which you can build and deploy intelligent
    automation solutions:


    - **Robotic process automation (RPA)**: Software that enables you to develop “robots”
    to automate tasks that have a clearly defined set of inputs, rules-based processing
    patterns, and measurable outputs. Just like a human operator has an ID to log
    into business systems, an RPA also would have a user ID. It will memorize what
    the human operator does in the business system and start mimicking the rules-based
    tasks such as accessing user interfaces, performing data entry or validations,
    creating documents and reports, and triggering the next set of actions.


    - **Smart workflow**: A process management application that integrates tasks performed
    by humans and robots. The smart workflow system will orchestrate handoffs between
    different users, including between robots and human users, to execute tasks efficiently
    and to monitor the end-to-end process in real time.


    - **Machine learning**: Algorithms play a vital role in identifying patterns in
    data, such as new scenarios or rarely occurring scenarios being observed in the
    process flow. These scenarios, if not handled through prediction technologies,
    will create huge bottlenecks within the process flows. There are other scenarios
    where human validation is required to move to the next set of process steps. In
    such scenarios, an ML algorithm can provide recommendations and next best actions
    to the human worker to move on with the process efficiently.


    - **AI capabilities**: A set of specialized AI capabilities to deal with unstructured
    data, including documents, images, videos, and voice. Business processes often
    end up managing and creating a variety of data types. In many scenarios, inputs
    to business systems could be in the form of images, videos, and voice. AI capabilities
    are required to manage these data types so that relevant information is extracted
    and passed on to the smart workflow and the ML programs that carry out the tasks.'
