- fmt: '# 3. Board to CEO: “What’s Your AI Strategy?”


    Dear CEO, artificial intelligence is your biggest threat and your biggest opportunity,
    so what’s your AI strategy?


    For many CEOs this question is a huge challenge. The topic of AI is so multi-faceted,
    hyped, and parabolic that it’s hard to know where to start. What options do you
    have?


    - You can acquire an innovative technology company that is focused on applying
    AI/ML to solve business problems and gain access to new products, offerings, and
    AI/ML talent.

    - You can invest in a few early stage AI focused startups to be in the know about
    innovation happening in this fast-moving technology space.

    - You can approve funding to build in-house AI capabilities and set up a centralized
    AI CoE to start exploring how to optimize your internal processes and how AI can
    be integrated into your products, offerings, and services. This option will be
    long drawn and you will need a strong vision, funding commitments, and a sense
    of purpose to attract and retain the best AI/ML talents.

    - You can use outside consulting and services firms to fill the gaps in your existing
    business and IT teams to get the ball rolling.


    These options are by no means mutually exclusive. On the contrary, you need to
    adopt an open mindset for your AI strategy—build/buy/partner/co-innovate could
    be the options—but you also need to measure/learn/experiment and then narrow down
    to what’s working and what’s not for your company.


    While these options may give you some initial thoughts on creating and executing
    your AI strategy, there is more to it. How do you prepare for the unknown?


    Now, back to the original question—what is your AI strategy? To get to the answer,
    first we will discuss why the board is asking this question. Then, we will discuss
    a conceptual framework to simplify AI so that you can give your board a thoughtful
    response. Finally, we discuss how you as CEO are going to engage your teams on
    the topic of AI and important considerations when formulating your AI strategy.


    ## CEO: “Why Is My Board Asking This Question?”


    So why is the board asking you this now? AI is neither an incremental tweaking
    of current IT systems and methods, nor is it about buying intelligence capabilities
    and platforms and making them part of your enterprise. AI brings in huge amount
    of transformative capabilities, cutting across the enterprise and impacting all
    roles across all levels. This can be very unnerving to most executives (even seasoned
    IT experts).


    Look what happened just a decade ago! The DVD-rental company, the music company
    selling CDs, the brick-and-mortal travel planning and firms, the daily newspapers,
    the bookstore chains were all doing well and were set for long, profitable years
    ahead. The Internet happened and changed everything. Convenience shopping on the
    back of ecommerce became a way of life and well-established businesses lost relevance.


    Today, businesses are staring at a similar inflection point. AI is taking us into
    uncharted territory. AI is helping machines converse, drive cars, perform physical
    work in hazardous conditions, perform delicate surgeries, predict what we would
    like to buy, diagnose health conditions, manage financial transactions, provide
    security, and much more. AI is everywhere. There are implications to our own jobs,
    our businesses, and quality of life, in general. To navigate this new territory
    effectively, business executives need to understand and consider a five-part AI
    game plan.


    ### Apply the NFL Rule


    The No Free Lunch (NFL) rule states that you can’t have it both ways simultaneously—your
    AI cannot be good at both general intelligence and narrow intelligence at the
    same time. Don’t get carried away by what you see in the press (investments by
    Google, Amazon, Apple, Microsoft, Tesla, etc. to develop general utility AI).
    You must focus on identifying and solving problems that are specific to your business
    and the markets you are in. Therein lies your strategic opportunity.


    ### Embrace Openness and Transparency


    It is important to understand and acknowledge that you can’t do everything by
    yourself, hence collaboration and sharing is the key. Thousands of startups and
    others are trying to solve some very unique whitespace problems. Those solutions
    and ideas might not be in a disruption path for your markets at this point in
    time; however, they may become a reality really soon. Strategically, the best
    choice for you is to develop an inclusive ecosystem with startups, academia, and
    various AI labs and start leveraging the momentum to develop proprietary capabilities
    targeted to your specific market and your customers.


    ### Evaluate Opportunities in the Connected World


    The world is getting increasingly connected—ranging from fixed sensors to mobile
    phones to drones to smart wearables and highly conversational personal assistants.
    These edge systems are empowered to see, hear, understand, and react, thus creating
    enormous opportunities regardless of whether you are in a brick-and-mortar setup
    or highly digital setup. Naturally, the greatest AI value creation opportunities
    are there when you can effectively leverage these connected devices and come out
    with a unique business model.


    Is this a market you should move into?


    ### Focus on Augmented Intelligence


    We are far away from creating human-like autonomous intelligence, so it’s better
    to focus on areas where you can develop augmented intelligence offerings, both
    for your internal and external consumption.


    As AI-driven automation starts affecting the knowledge-worker related skills,
    it will become essential to critically assess your approach to enterprise skills
    planning. Instead of taking conservative approaches to protect jobs, you need
    to evaluate and take few hard calls to make your human capital relevant (how to
    coexist in a human-machine integrated scenario) and to move up the value chain
    in the respective business processes.


    ### Keep an Eye on Ethics and Cybersecurity


    AI provides a consistent and objective approach to problem solving. Even so, it
    is not immune from biases. There have been several instances where the AI outputs
    have shown clearly biased results. Therefore, you must pay careful attention to
    the ethical, legal, and social concerns raised by AI.


    ## CEO: “How Do I Respond?”


    Let’s start with some definitions of what AI is *not*. This is necessary because
    the media coverage of AI is not thoughtful and is often hyperbolic.


    ### AI Is Not About Machines versus Humans


    For the last few years there has been heightened speculations surrounding AI:
    humans will be replaced by machines. This is the completely wrong way of painting
    the picture of AI in the enterprise. The right vision is how we can leverage AI
    and augment human capabilities to do things that we had never imagined before.
    Even the recent media coverage of Google’s DeepMind/AlphaGo victory over Lee Sedol
    was dramatized as machine achieving super intelligence and defeating humans at
    the games they had invented. A more realistic description could have been “machine
    learning from many humans’ experience defeats a single human”.


    Machines have advantages that humans do not: speed, repeatability, consistency,
    scalability, and lower cost. Humans have advantages that machines do not: reasoning,
    experience, adaptability, and ability to handle a breadth of tasks. The smart
    thing to do is to find the right way to blend humans and machines, not replace
    humans with machines.'
