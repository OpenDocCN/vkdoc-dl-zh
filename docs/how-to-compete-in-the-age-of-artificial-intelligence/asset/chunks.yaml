- fmt: '# 7. Intelligence of Things = IoT + Cloud + AI


    With the Internet of Things (IoT) and artificial intelligence, one is the enabler
    and the other is the disruptor. Both of these technologies, individually, are
    transforming businesses and lives.


    The Internet of Things (IoT) is a network of physical objects embedded with sensors
    and connectivity, so that they can exchange information with other connected devices
    in the network. In simple terms, IoT is about taking the inert and making it “smart,”
    or even smarter, by connecting it to well, everything. It’s exactly what it sounds
    like—things that have Internet! You take any object, embed sensors in it, attach
    a unique digital tracker to it, and then enable it to send and receive information
    without human interactions. You got your own IoT.


    When objects can sense and communicate, it changes how and where decisions are
    made. Cheap sensors, improved wireless connectivity, and scalability through cloud
    computing have all made it possible to cost-effectively collect and process lots
    of data, analyze it, and act on it instantaneously. As a result, everything around
    us (animated, non-animated) is becoming connected and smart. If you extend the
    concept of IoT to industrial scenarios such as manufacturing and supply chain
    management, you get the Industrial Internet of Things (IIoT). If you extend the
    concept of IoT to individual consumption scenarios in our daily life such as wearables,
    home appliances, personal assistants, smart thermostats, etc., you get Consumer
    IoT.


    It is projected that IoT (and IIoT) will lead to the next-generation of smart
    operations at scale. For example, take a highly mechanical and physical intensive
    set up like a factory. It can be transformed into a “smart factory” where machines
    (“intelligent assets” or “smart machines”) are capable of “talking” to each other
    and “making decisions” independent of human interference based on the data they
    collect and communicate. The result? Improved production times, improved cost-efficiency,
    reduced waste, and top-notch quality.


    IoT doesn’t only apply to M2M (machine-to-machine) communications; it extends
    to any task where close integration between people, processes, and machines (virtual
    and real worlds) is required.


    With IoT alone, we can talk and listen to machines, but to understand machines
    and make them intelligent, we will need AI. AI provides us with the capabilities
    to learn and infer patterns from the vast amount of data collected through IoT.


    What happens when we combine IoT and AI? It’s a step-change transformation in
    everything—from machines to factories to automobiles to wearables to kitchens
    to buildings, and many more.


    Let’s explore a few scenarios to appreciate the transformative power of IoT and
    AI, combined.


    ## Making Homes and Buildings Smart


    A smart home usually consists of a central control unit (maybe physical or on
    the cloud) that reads information from every type of sensor spread throughout
    the home. Motion sensors, temperature sensors, and the like generate information
    every second and send it to the central unit. The central unit makes decisions
    based on the information sent to it by these sensors. Therefore, the entire home
    is connected and smart.


    * Proximity sensors placed in refrigerators sense the stock inside and send data
    to the central unit. The central unit processes the data and places replenishment
    orders online based on your consumption patterns.

    * Motion sensors in the house include facial recognition to recognize thieves
    and respond accordingly by sending a message to nearby authorities.

    * Temperature sensors maintain the temperature of the home, according to the weather
    outside.

    * Power consumption sensors keep tabs on usage trends and automatically turn devices/lights
    on or off based on the presence of people in the rooms.


    ## Keeping Your Car Running


    Imagine your car was fitted with all kinds of sensors, streaming data about the
    wear and tear, engine performance, and your own driving patterns, and that everything
    is collected through IoT gateways and pushed to the cloud. The AI running on the
    cloud continuously analyzes this data and generates predictions. AI reaches out
    to your `Alexa` when it thinks the car needs maintenance, and `Alexa` checks your
    calendar and talks to your favorite mechanic to find the earliest suitable schedule,
    and then asks you to confirm verbally. You’d never get into situations where you
    are oblivious to the fact that your car badly needs attention.


    ## Keeping the Power On


    When it comes to electricity supply, we are more affected by brownouts than blackouts.
    A blackout refers to complete power loss that impacts a large area, whereas a
    brownout happens when a sudden surge in demand forces your utility company to
    reduce line voltage in a few areas to manage the demand and supply better. The
    unintended consequences of a brownout are voltage fluctuations, which can severely
    damage electrical appliances.


    Now consider home thermostats that sense the environment and temperature patterns
    and transmit data to your utility company, in real time. If it is an exceptionally
    hot day and there is a possibility of brownouts, the AI system on the cloud can
    see how many devices are operational, and then proactively turn the thermostat
    up a few degrees, while keeping the thermostat stable in temperature-sensitive
    facilities such as hospitals, thereby avoiding the brownout situation.


    ## Making Sure You Stay Alive


    There is more to the Apple Watches than a status symbol. Your wearables can do
    more than just read your heart rate and determine how much you have walked today.
    Imagine that your wearable sends an alert to the AI system when it detects that
    you might be having a heart attack. The AI system receives the alert, then goes
    into a mission-critical mode by triggering several actions in real time. It sends
    your location data to the closest ambulance, notifies the closest hospital to
    prepare ahead of time, alerts your doctor and recommends the fastest and shortest
    route to reach you or the hospital. Adding AI to IoT could mean the critical minutes
    that keeps you alive.


    ## Making Sure You Stay Safe


    We are concerned about the safety of our loved ones. This is the primary reason
    why we have gone to lengths to ensure our homes are protected. We install CCTV
    cameras all around the perimeter and intrusion detection systems that are connected
    to the law enforcement agency control room. Imagine if the data from your CCTV
    camera and your intrusion detection control system was continuously being pushed
    to the cloud, where the AI system was not only assessing the situation at real
    time but also applying vision recognition algorithms to correctly identify the
    intruder by checking against the criminals database and guiding the law enforcement
    officers on the next best actions.


    Of course, there are data privacy concerns related to all of these examples. However,
    some people think the benefits clearly outweigh the risks.


    The impact of IoT, the cloud, and AI, combined, requires a vivid imagination.
    We can apply the transformative power of these technologies to pretty much anything
    and everything.'
