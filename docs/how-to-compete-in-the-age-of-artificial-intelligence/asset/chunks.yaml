- fmt: '# IoT, the Hybrid Cloud, and AI Work Together


    The examples discussed previously are no doubt fascinating. But the key question
    is how would you build these kind of integrated applications? What are the technology
    building blocks?


    The convergence of IoT and AI is simply not possible without an enabling platform
    and architecture. That’s where the hybrid cloud steps in. All companies exhibit
    a unique technology landscape that has been built for and suited to their individual
    business needs and growth. The hybrid cloud is a disruptive technology and a business
    opportunity at the same time. To understand this disruption requires a deeper
    understanding of the converging architecture involving the hybrid cloud, IoT,
    and AI.


    There are devices all around us that are collecting and transmitting data all
    the time. All of this data must be quickly analyzed for the next best action.
    When there’s a delay, the data loses its value. This zero latency requirement
    necessitates incredible distributed collection and storage capabilities closest
    to the source. This means the edge of IoT must exhibit instantaneous capabilities
    to parse and analyze streaming data for the next best actions, at the same time
    pushing the bulk of the data to the cloud for deeper analysis.


    AI, on the other hand, calls for immense compute power to operate on massive data
    sets. Speed and performance are additional considerations for AI systems, since
    decisions made by AI need to be fed back quickly to the IoT devices to make the
    predictions actionable.


    The following list explains a few examples that highlight the AI specific requirements:


    - Self-driving emergency response vehicles immediately respond to life-saving
    search and rescue operations such as floods, fire, etc.

    - Medical devices can automatically defibrillate and send an alert notification
    to the nearest hospital.

    - Financial crime detection systems include credit card swipes.

    - On-demand recommendations for streaming video services.

    - Apple’s Siri and Amazon’s Echo give instantaneous responses at the edge.


    There are many more examples spread across industrial needs as well as consumer
    needs. In all these examples, one thing is common, the AI requirements not only
    involve lots of data but also real-time decisions (see Figure [7-1](#467925_1_En_7_Chapter.xhtml#Fig1)).


    ![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig1_HTML.png](images/467925_1_En_7_Chapter/467925_1_En_7_Fig1_HTML.png)


    Figure 7-1


    Data value chain and decision latency for IoT


    Data collected by IoT can improve the prediction capabilities of AI; however,
    there are many tasks in the value chain (from raw data from devices to predictions,
    to outcomes) that need to be orchestrated well to deliver the final outcome. Figure
    [7-2](#467925_1_En_7_Chapter.xhtml#Fig2) shows a conceptual view of the different
    components that make up an IoT analytics platform.


    ![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig2_HTML.png](images/467925_1_En_7_Chapter/467925_1_En_7_Fig2_HTML.png)


    Figure 7-2


    IoT analytics platform components


    While just doing IoT is transformative by itself—at least you will get complete
    visibility into your operations and machine performance and you can make decisions—to
    become predictive, you need AI capabilities to function in tandem with IoT and
    the cloud.


    ## Avoiding Costly Unplanned Downtime


    Unplanned downtime resulting from equipment breakdown can be expensive. By applying
    machine learning algorithms to sensor data generated from machines, we can predict
    equipment failure ahead of time. The AI system can then trigger alerts to the
    field operator and schedule maintenance procedures.


    ## Increasing Operational Efficiency


    In factories, assembly line operations demand precision and strict quality controls
    adherence in everything. Take the example of spillage during the production process.
    Every 1% reduction in spillage can mean thousands of dollars in savings. By using
    IoT and machine learning, companies can significantly reduce leakages. Streaming
    data captured from sensors embedded in the machines can be analyzed at the edge
    itself in real time, thus sending alerts to human specialists to control spillage.


    ## Enabling New and Improved Products and Services


    IoT coupled with AI can form the foundation for improved product designs and in
    some cases even conceptualize entirely new products and services. For instance,
    by analyzing machine performance data, we can help spot patterns and gain operational
    insights—how is the machine working, is it able to perform based on the design
    specifications, is the real-world usage different from the usage considered during
    design, is there an opportunity to launch a new line of products, and so on.


    ## Enhancing Risk Management


    A number of applications that pair IoT with AI are helping organizations better
    understand risks and prepare them for rapid response, better manage worker safety,
    and cyber threats.


    For instance, by using machine learning on wearable devices, we can monitor workers’
    safety and prevent accidents. Banks have begun evaluating AI-enabled real-time
    identification of suspicious activities from connected surveillance cameras at
    ATMs. Vehicle insurers have started using machine learning on telematics data
    from connected cars to accurately price usage-based insurance premiums and thus
    better manage underwriting risk.


    # The Role of AI in Industry 4.0


    The prevalent notion around Industry 4.0 is to connect every asset and create
    digital environments. This is not entirely a true state. Industry 4.0 is more
    of an evolution than a revolution. There are several phases that you need to go
    through to achieve the desired level of maturity. The first phase begins with
    connecting all the assets together, which includes instrumentation, connectivity,
    and data collection. The next phase is to figure out how to make sense out of
    all this data. The final phase is to bring in automation to the entire lifecycle.
    Manufacturing agility is key to success for Industry 4.0 and AI has a critical
    role to play throughout the whole “create, make, and deliver” value chain to optimize
    and improve every process in order to achieve the best outcome regardless of external
    circumstances.


    Industry 4.0 talks invariably steers into several technologies: edge computing,
    cloud computing, AI, IoT, platforms, etc. Even though each of these technologies
    has a role to play, the most critical components are its data and prediction capabilities.'
