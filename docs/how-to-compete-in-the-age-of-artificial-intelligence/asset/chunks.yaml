    ## 利克莱德的增强论


    达特茅斯会议五年后，心理学家兼计算机科学家 J. C. R. 利克莱德阐述了人类智能与计算机智能之间的共生关系。他提出了一种互补关系：人类将定义问题陈述、设定目标，并扮演验证学习成果的关键角色；机器则将承担筛选海量数据以生成洞察和预测的繁重工作。这种互补能力与协同任务执行，将比人类单独完成任务高效得多。


    这种人机共生已悄然渗透进我们的日常生活。常见的例子包括：


    -   使用像 `Waze` 这样的 GPS 应用在繁忙路口和复杂的道路迷宫中导航

    -   通过个性化推荐菜单在海量书籍或电影选择中进行搜索

    -   与机器对话、发出指令，机器则回复事实、数据、天气模式、附近餐厅等信息


    在每种情况下，人类都会指定目标和标准（例如“带我去市中心，但避开繁忙街道”，或“给我推荐一些适度搞笑、无可救药地浪漫、且带有亚洲主题的电影选项”，或“找一家步行可达、评价高且价格适中的意大利餐厅”）。这是如何运作的呢？AI
    算法筛选海量数据以得出预测。然后，人类评估机器输出以做出决策。每当人类选择或忽略某个特定预测时，AI 算法都会记录下这一点，并将该信息反馈到学习过程中，从而不断改进和学习。在任何情况下，人类智能都不会被掩盖，而是得到了增强。


    事实证明，人类思维的不可预测的非理性程度比最初认识到的要低，而 AI 的类人程度也比最初期望的要低。


    ## 琳达实验：快思考与慢思考


    AI 先驱赫伯特·西蒙在人机协作的背景下揭示了 AI 的另一个侧面。他认为，我们人类必须满足于“增强”而非优化的解决方案，因为我们长时间工作、记住大量事物以及良好推理的能力是有限的。相比之下，机器不会表现出工作疲劳，总能做出一致的决策，并且能以最小的努力处理海量输入。此外，它们评估数百万个因素的准确度远超人类。


    丹尼尔·卡尼曼在其著作《思考，快与慢》^(¹³)中，强调了人类决策过程中有趣且非理性的方面。


    每当我们面临众多选择时，我们就会进入一个决策过程。自然，我们似乎会评估大量数据、运用某些理性思维、回忆过往经验、与他人商议，然后做出决定。这就是卡尼曼所说的“系统
    2”思维，或“慢思考”。


    实际上，我们并不总是诉诸如此冗长缓慢的评估过程来做出决定。相反，我们通常依赖由各种心理经验法则（启发法）构成的自身部落知识来做出决定。我们自己的决策过程在叙述上似乎合理，但在逻辑上往往站不住脚。卡尼曼称之为“系统
    1”思维或“快思考”，琳达实验就是其著名例证。


    在一项针对顶尖大学学生的实验中，卡尼曼和特沃斯基描述了一个名为琳达的虚构人物。她非常聪明，大学主修哲学，并参与了女权运动和反核示威。基于琳达大学时代的这些细节，以下哪个关于琳达现今情况的场景更合理？


    “琳达是一名银行出纳员。或者，琳达是一名活跃于女权运动的银行出纳员。”


    卡尼曼和特沃斯基报告称，87% 的学生认为第二个场景更可能发生，尽管稍加思考就会发现这绝不可能是真的。女权主义银行出纳员是所有银行出纳员的一个子集。但添加“琳达仍然活跃于女权运动”这一额外线索影响了叙述的连贯性，导致学生选择了（可能性更低的）第二个场景。


    本质上，人类思维会混淆易于想象与高度可能之事，其方式包括：让情绪蒙蔽判断、在随机噪声中假设模式、将因果关系归因于虚假相关性、以及从个人经验中过度概括。我们用于做出判断的许多启发法和智慧，结果证明存在系统性偏差。如果说我们的思维需要算法来消除判断中的偏差，我们的眼睛需要人工镜片来过滤虚假相关性，这或许并不算惊世骇俗。


    另一方面，如果有一种方法能将日常任务背后的处理逻辑编码，那么可以肯定，算法在这些任务上的表现将优于人类。然而，此类算法将缺乏评估新奇或新颖情境所需的概念理解和常识推理能力。为了说明这一警示，我们以
    IBM Watson 赢得《危险边缘》为例。比赛期间，在“美国城市”类别下出现了一个问题：“其最大的机场以一位二战英雄命名；其第二大机场以一场二战战役命名。”Watson
    回答“多伦多”。类别是“美国城市”，但答案却是“多伦多”！（顺便说一句，正确答案是芝加哥。）


    这个特殊的例子说明，人类智能的某些优势，如常识推理，可以抵消暴力机器学习的基本局限性。


    AI 最引人入胜的一点在于，很难预测哪些部分会容易或困难。起初，像下棋这种对人类来说极具心智挑战的活动，对机器来说会是最难的，但结果却很容易。另一方面，像识别物体或拾取物体这类对人类来说相当简单的任务，对机器来说却困难得多。


    总之，人类需要机器来避免“系统 1”决策陷阱，而机器需要人类来避免“系统 2”决策陷阱。两者共同表明，人机共生的理由比以往任何时候都更充分。


    我们需要的是一种人机融合的策略。

    '
- fmt: '# The Human-Machine Integrated Strategy (HMIS)


    Although the enhancements in AI are making life easier for human beings day by
    day, there is constant fear that AI-based systems will pose a threat to humanity.
    People in the AI community have a diverse set of opinions regarding the pros and
    cons of AI mimicking human behavior.


    For example, a neural network trained to detect digits from the MNIST data set
    failed miserably when fed with test samples that are negative of the images (i.e.,
    convert black to white and vice versa), something that a human would have no issues
    with. Algorithms are reliable only to the extent of completeness of data used
    to train them. As always, garbage in implies garbage out.


    Further, AI systems have a bias that is inherited from the data that is collected
    (something that humans consciously try to avoid). For example, a restaurant review
    system provided poor ratings to Mexican restaurants because the word Mexican is
    associated with other illegal activities.


    Instead of worrying about AI advancements, what if we can come out with a human-machine
    integrated strategy, including both human and machines, living together in a complex
    adaptive ecosystem?


    Let’s call such an ecosystem as human-machine integrated strategy. It mainly includes
    human cognition and intelligent machines, where human and machines aid each other
    in problem solving activities. The human-machine integrated strategy for the future
    is not that of AI-enabled machines replacing humans but of machines and humans
    existing in a state of symbiosis. The most productive way to utilize AI is to
    use it to augment human capabilities. Machines do better at specific tasks while
    humans do better at general tasks. Therefore, a social setting where humans and
    machines interact while pushing or delegating tasks to each other, if they are
    not good at it, is an appropriate way to move forward.


    The human role in a human-machine integrated architecture is a key differentiator
    to not only improve the quotient of trust, reciprocity, and likability, but also
    to allay the fears and concerns associated with proliferation of AI systems.


    Intelligent machines blur the lines between computational aspects and interactions
    with humans for inputs and output. They borrow and extend several established
    computing principles, like wisdom of crowd computing, collective intelligence
    computing, social networks, etc. While wisdom of crowd computing focuses on bringing
    several experts to a central platform, intelligent machines augment decision making
    of these experts by providing computational intelligence. This hybrid system allows
    humans and computers to work in harmony toward achieving the common set of goals.


    There are several real-life tasks that cannot be accomplished completely by machines.
    Using human cognition constructively in such tasks can help make problems easier
    for machines to solve. Researchers have for a long while attempted to make the
    interaction between humans and machines appear seamless and natural.


    Essential ingredients for humans are food, water, energy, and safety. Although
    these basic objectives seem trivial for a human, one may wonder what they mean
    for a machine. In case of a machine agent, those needs can be power, network,
    storage, maintenance, etc. Like in the human world, nothing is free. There has
    to be a notion of payment for every resource that a machine agent utilizes. It
    can be imagined as a type of virtual currency, which brings in the notion of reward
    and penalty for every action that a machine agent takes.


    ## Application Scenarios


    HMIS-based applications can primarily have the following different scenarios depending
    on the composition of human and machine agents, and who bears the responsibility
    of the actions being taken.


    ### Machine Agents as Human Assistants


    Humans are assisted by real-time machine agents to collaborate with diverse multi-cultural
    agents (sometimes speaking different languages). Machine agents provide necessary
    information and recommendations to humans, but the final decision is the human’s.


    For example, consider a machine agent assisting a judge with facts and analysis
    of previous rulings for similar cases, or a machine agent assisting a recruiter
    to make a hiring decision based on cultural fit of a candidate.


    ### Fully Autonomous Machine Agents


    An autonomous machine agent collaborates with other humans and machine agents.
    In this scenario, no human is responsible for the machine agent’s actions. Hence
    this scenario is limited to those applications where the risk of the machine agent’s
    actions is very low.


    For example, consider an autonomous agent as a virtual figure carrying out tasks
    in a hazardous physical environment or where the inputs-activities-outputs are
    clearly defined in a human low-touch environment, or simulating autonomous machine
    agents as observing, recording, and raising alerts in a quality control process.


    ### A Machine Agent Interacting with Humans


    In this scenario, a machine agent is trained to understand and behave according
    to the preferences and goals of its human counterpart. A machine agent has the
    ability to negotiate and make decisions for its human. It works like an autonomous
    machine agent, but it refers back to its human counterpart when in doubt. So the
    responsibility of actions taken by a machine agent lies with its human counterpart.


    For example, consider a machine agent at a call center answering queries from
    people, being sensitive to their cultural background, or a machine agent performing
    random A/B testing across the world, taking the cultural background of the people
    into account.


    ### All Machine Agents Interaction


    This is similar to the previous scenario in terms of how agents are trained and
    who bears the responsibility of actions taken by machine agents. The difference
    is that there are no humans participating in the interaction. It poses different
    challenges in terms of how interactions take place among agents.


    For example, consider machine agents of decision makers collaborating to come
    to a consensus on candidates ranking in a hiring process, or machine agents of
    members of a team selection committee collaboratively choosing a team.


    ### A Human Interacting with Machine Agents


    This scenario points to a typical setting where a human walks into a special room
    in their house or office, where she can be immersed in the virtual environment
    of another group of people (remotely located) that she wants to collaborate with.
    All or part of the remote group may be represented by their machine agents.


    For example, consider a human who talks to machines agents of friends in a virtual
    environment to have fun, or a human who conducts an auction, where people send
    their machine agents to bid.'
