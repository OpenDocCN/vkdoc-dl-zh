  trans: '

    # 为什么你的企业需要 AIOps？


    数字化转型围绕四个主要领域展开，不同组织在这些领域可能采取不同的实施策略：


    -   从硬件到应用再到业务交易（影响收入、成本或客户满意度）

    -   从传统技术到新型微服务转型（影响 IT 双速能力和 IT 系统的响应能力）

    -   针对现场（物）、本地和云端的基础设施整合与现代化（影响稳健性、可扩展性和性能）

    -   上述所有变更的不同时间间隔（影响上市准备度）


    显而易见，数字化转型需要提高云采用率，并准备好应对快速开发和部署生产的能力。然而，当你加入诸如对持续创新和持续开发（`CICD`）的需求、日益增多的机器代理采用、物联网（`IoT`）设备、应用程序接口（`API`）等基本复杂性时，你的
    IT 运维范围将面临太多未知因素。这给传统的服务管理最佳实践、团队能力以及技能和工具带来了巨大压力，甚至使其达到崩溃点。参见图 8-1。


    ![../images/467925_1_En_8_Chapter/467925_1_En_8_Fig1_HTML.png](img/467925_1_En_8_Fig1_HTML.png)


    图 8-1 IT 系统拓扑


    以下我们列出了当前服务管理设置中存在的一些关键痛点：


    -   **IT 运维自动化程度极低**：现代 IT 系统环境包括托管云、混合云、第三方服务、SaaS 应用、移动应用、API、众包应用、物联网设备等。简而言之，IT
    环境本质上是复杂、动态且具有弹性的。通过人工监控来管理 IT 环境的传统方法已不再可行。由于系统、应用和数据的接触点过多且访问渠道多样，我们需要一种高度自动化的方式来跟踪、监控和解决问题。


    -   **系统过多，数据量过大**：IT 系统环境不再局限于大型单体技术栈；有太多专门的应用和系统来解决特定的企业需求。结果呢？事件和告警数量呈指数级增长，服务工单量也随之增加。要同时理解所有这些应用产生的数据并满足服务等级协议（SLA），已经变得过于复杂。由于系统、应用和数据的接触点过多且访问渠道多样，我们需要一种高度自动化的方式来跟踪、监控和解决问题。


    -   **需要对事件进行近乎实时的响应**：数字化在企业 IT 系统中造成了鸿沟。面向客户的前端系统运行速度比后端以流程为中心的关键任务系统更快。在许多组织中，IT
    在赋能业务方面的作用如此显著，以至于 IT 本身已成为业务。随之而来的是，技术的“消费化”极大地改变了用户期望，以至于企业现在必须比以往任何时候都更快地响应
    IT 事件。无论是应对真实情况还是感知到的情况，响应都需要几乎即时完成。


    -   **计算基础设施向云端或边缘迁移**：云化从根本上颠覆了 IT 职能、预算和控制的存在方式。越来越多的计算基础设施需求现在基于按使用付费的原则。虽然从成本管理的角度来看，这一趋势是好的，但它给
    IT 团队管理混合环境（部分应用在云端，部分在本地）带来了额外压力。


    -   **敏捷开发方法与运维责任相冲突**：DevOps 和敏捷方法论使企业能够快速实验、原型设计和部署应用到生产环境。然而，管理、监控和维护这些应用的责任仍然落在
    IT 运维团队身上。由于缺乏对这些新技术的了解，IT 运维团队始终处于追赶状态。


    -   **误报告警过多**：在数字世界中，由于业务性质和众多的客户接触点，业务应用和 IT 系统始终承受着日益增长的用户活动压力。几乎不允许有任何停机时间。这种高使用率需求相应地导致了更多关于响应时间、可访问性、可用性和可扩展性的误报。IT
    运维团队面临着分析日益增多的单个工单并定位根本原因的挑战。他们必须处理多个监控解决方案以及针对同一问题的多个相关告警，这还可能引发事件风暴，占用大量资源，而实际上只需一个通知和一个事件工单就更为实用。


    此外，一旦确定了根本原因，IT 运维团队需要经历一个繁琐的故障分类流程，根据先前关于由谁修复问题的指南，将问题分派给正确的团队；这方面尤其麻烦，因为 IT
    环境不再由少数几个大型单体应用组成。相反，当今的 IT 环境涉及多样化的基础设施（本地和云端）应用、不同的 SLA 期望以及多个供应商（其中一些是开源的）。


    那么，AIOps 如何能够以智能、集成和自动化的方式帮助解决这类问题呢？


    ## AIOps 平台的构成要素


    IT 运维人员被工单、严格的 SLA 以及他们需要分析以找出根本原因的众多数据点所淹没。他们发现传统的 IT 运维管理技术已无法胜任这项任务，并且不知道从何入手。他们期望
    AIOps 系统能解决所有问题。对 AIOps 的两个关键期望是自动化和预测。

