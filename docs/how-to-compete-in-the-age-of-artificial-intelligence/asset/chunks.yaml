- fmt: '# Ethical Issues in Artificial Intelligence


    `AI`, in many ways, is pervasive and provocative at the same time. We need guidance
    and frameworks to ensure ethical usage of `AI`, and this is the right time in
    the `AI` evolution phase to consider ethics in relation to `AI` seriously.


    The ability to be introspective has made us what we are. However, it seems that
    we are in a hurry to outsource this to algorithms. There are grave consequences
    for such an approach. We are pleased to see how automation is improving the quality
    of our lives, but we have not sat down and created a list of activities that we
    would never delegate. We have not even crafted guiding principles for clear demarcation
    of responsibilities between humans and machines. These things are important. In
    the absence of values-based standards and guidelines, the biases of `AI` manufacturers
    will take over and dictate the terms and conditions.


    Ethics is not about saying, no you can’t do this. The point is to ask what are
    the goals you are trying to achieve and how can you attain these goals without
    infringing on the cultural values we hold dear. You can do things that are entirely
    legal yet highly unethical. The Socratic process of always asking for contrarian
    views is not always fun, but basking in the glory of `AI` achievements and not
    paying attention to ethical standards is no longer an acceptable stance.


    The following sections contain a list of topics that are subject to raging debates
    in various forums. The camps are still divided.


    ## Unemployment


    What happens when all manual jobs are replaced by `AI`-assisted machines?


    Cultural aspects such as position in society and consequently the division of
    labor are governed by the magnitude of automation. In the pre-industrial age,
    one’s ability to do physical work determined the paycheck. Gradually we evolved
    and invented ways to automate jobs, not eliminating the physical work completely,
    but augmenting human skills with machines so that we could do more with less.
    The result? Newer jobs like machine operators came into existence and slowly the
    skills orientation moved from physical labor to the cognitive labor, putting more
    and more emphasis on judgment-related skills.


    For example, trucking as an industry currently employs millions of individuals
    across the globe. What will happen to trucking jobs if self-driving trucks become
    a reality in the coming years? On the one hand, self-driving trucks might lower
    risk of accidents, won’t show signs of fatigue, will cover the distance in a predictable
    way all the time, reduce the cost of operations, and deliver significant efficiency
    gains. Hence, self-driving trucks seem like an ethical choice. The same scenario
    could happen to the majority of the workforces across other industries and sectors.


    The ethical question before us is, when more and more jobs are automated, what
    will we do with all the time on our hands? Our current employment contracts are
    based on one fundamental factor—we sell our time to earn enough to sustain ourselves
    and our families. So, if the prospect of time-based compensation goes away, we
    need to find newer ways to earn money.


    ## Inequality


    How can we reward the machines?


    The majority of our current compensation frameworks are based on hourly wages.
    There are few notable changes where risk and reward mechanisms are in place, but
    in general our services always equate to a rate per hour. If `AI` is going to
    do most of our work at a fraction of a cost, companies will naturally drift toward
    a newer workforce mix (an increasing number of `AI` agents and a smaller human
    workforce). This means fewer humans will get compensated. However, the company
    owners and others who invested in the company will take home a major share of
    the revenues earned.


    If you have not noticed, this is already happening and it’s creating a widening
    wealth gap. Companies whose business model revolves around this algorithmic economy
    are employing fewer humans and sharing the wealth among the workforce from the
    economic surplus they are creating.


    The ethical question before us is, if we’re truly moving toward a no manual-job
    society, how do we structure a fair compensation mechanism for the workforce consisting
    of fewer humans and more machines?


    ## Humanity


    How will machines affect human behavior?


    On the one hand, we are relishing the fact that we are letting machines think
    and act on our behalf. On the other hand, we are truly altering human behavior.
    Here are few examples that illustrate how we are being influenced:


    *   Websites are designed by taking into the account the minutest levels of detail
    that would appeal to an individual’s liking.

    *   Recommendation engines push additional products to us by suggesting “people
    like you have bought these other things”.

    *   While you are driving past a supermall, your phone vibrates with a discount
    just for you.

    *   Intelligent apps on your smart phone suggest which route to take to get to
    your destination faster.


    The right information at the right time through the right channel is all good,
    but the side effect is that we have stopped thinking about anything anymore.


    The ethical question before us is this—first, by allowing `AI` agents to think
    and act on our behalf, are we progressing toward a world where we are becoming
    increasingly uneducated about our surroundings? Second, if the `AI` agents are
    becoming better and better at modeling human behavior, is there a possibility
    that the same `AI` agents will be used to direct human attention and trigger certain
    actions that are detrimental to the very existence of the human race?


    ## Artificial Stupidity


    How do we ensure that machines do not become biased?


    Humans develop cognitive capabilities by learning from their environment; machines
    also go through a similar learning phase to acquire intelligence. Humans learn
    bad things if they are exposed to bad environments; machine learning goes through
    a similar risk if the data is incomplete or purposefully distorted.


    Machines need to learn continuously and need to be exposed to a wide variety of
    data sets in order to be prepared to handle real-world occurrences. Just relying
    on training data sets that are curated based on the data that’s available won’t
    suffice if we want machines to take on real-world challenges.


    Humans are not always fair and neutral. Machines also can exhibit similar unfair
    and irrational behavior. `AI` systems are created by humans, thus there is a high
    likelihood that humans will introduce judgmental bias into the very machines they
    build. Bias can also creep into machine behavior in many different ways—data bias
    and design bias are the most prominent ones.


    The ethical challenge before us is, if our future is going to be completely dependent
    on `AI` systems, we need to ensure that the machines perform as expected and aren’t
    biased.


    ## Security


    How do we keep `AI` safe from evil intentions?


    The more powerful a technology becomes, the more possibilities open up for malicious
    intent. Autonomous systems require a greater responsibility of making them secure,
    and it is not just adversaries we need to worry about. What if `AI` agents become
    so focused on achieving their goals, that they recommend and implement things
    that may bring disastrous consequences for us? For example, what if the goal of
    an `AI` system is to find solutions for cancer, and after careful considerations
    of numerous diagnosis results, root causes, treatment plans, and effectiveness
    of medicines, it realizes that the most effective and best way of solving the
    cancer problem is to kill everybody on the planet? From a machine’s point of view,
    it has found the solution. From human point of view, it is catastrophic.


    The ethical question before us is, how do we ensure that there are enough checks
    and balances in place before we start using `AI` systems across all spheres of
    our life and as ubiquitously as we want to?'
