  trans: '

    ### 用例：人工智能与亚马逊飞轮


    亚马逊比任何数据驱动型公司都更胜一筹，凭借其将企业打造为人工智能驱动型企业的宏伟愿景，交付了令人惊叹的服务和产品。其核心是亚马逊的“飞轮”，它确保企业各个职能部门协同运作，相互促进，以实现业务成果。另一个推动亚马逊持续推出惊人创新产品和服务的概念是“从未来回溯到现在”的方法。在亚马逊，任何举措都始于对最终目标的构想——一份“六页纸”提案，以一份推测性的新闻稿开头，描述成品或服务。


    人工智能是这一飞轮的核心，公司某一部分由算法驱动的创新被广泛利用，以加速其他团队的工作。亚马逊会仔细审视每一个将其所构建之物变现的机会。例如，在亚马逊早期，他们构建了强大的数据管理和人工智能平台来高效运营自身业务。后来他们意识到，如果将这些内部能力作为付费服务提供给外部客户，他们不仅能赚钱，还能借此了解人们如何使用这些人工智能服务以及用它们来做什么。这样一来，他们就能在未来推出更有意义的产品。


    亚马逊最初只是一家不起眼的书商。它首先建立了一个市场，并推出了一个强大的电子商务平台。也许亚马逊是第一家真正意识到平台重要性的公司。它向其他零售商开放了自己的市场，从而建立了一种利用其电子商务平台的共享经济。它建造仓库来为客户完成订单，然后向市场业务合作伙伴、物流和配送公司以及其他渠道网络提供亚马逊的配送服务。亚马逊找到了一种方法，将他们在最繁忙购物季为支持业务而构建的过剩计算能力（`AWS`）变现。


    “Amazon Go”利用计算机视觉和人工智能算法，为超市购物者提供无需收银员的购物体验。其意图并非在全国开设数千家 Go 门店，而是将这种由人工智能驱动的零售基础设施作为订阅服务提供给店主。这是另一个正在酝酿中的变现思路。


    早在成立初期，亚马逊就意识到了人工智能的潜力并开始投资。早期，亚马逊的人工智能人才分散在各个部门，创新和想法的交叉利用也是零星的。自上而下推动人工智能在公司内部制度化带来了重大变革。公司将“服务客户”作为一切行动的关键驱动力，这促使各个人工智能创新孤岛跨项目协作，并与其他团队分享解决方案，从而让飞轮转动起来。


    #### 对话式界面的影响


    亚马逊由语音平台`Alexa`驱动的 Echo 系列产品也源于一份六页纸，该文件在 2011 年名为`Operational Plan One`的年度规划流程中提交给了贝佐斯。其愿景是推出一款低成本计算机，其所有“大脑”都在云端，你可以通过语音与之交互——你对着它说话、提问，它会与你对话并提供答案。


    构建 Echo 需要当时公司尚不具备的人工智能水平。然而，得益于其从设想的最终产品反向推导的方法，高层蓝图包含了打造 Echo 所需的关键功能。特别是语音识别功能，要求达到当时尚未被发明的对话式人工智能水平。例如，使用“唤醒词”（`“Hey
    Alexa!”`）激活人工智能系统、听懂并解释自然语言指令、过滤噪音并给出非荒谬的答案等，在当时任何地方都尚未被概念化。


    此外，为了让 Echo 在商业上取得成功，它必须价格低廉、语音识别能力极其有效，并能提供前所未有的最终用户满意度。为了实现这一切，亚马逊必须构建一个能够在嘈杂环境中理解并响应自然语言查询的人工智能系统。最大的瓶颈是亚马逊从哪里获得海量的对话数据来训练人工智能。


    这个问题的答案在亚马逊飞轮中找到了。它开始利用`AWS`（其云基础设施服务）创建一个语音识别服务（`Alexa`），该服务超越了其最初实现 Echo 使命的范围，成为了一项宝贵资产。一旦他们开发出
    Echo 作为远场语音识别设备，他们就看到了做更大事情的机会。首先，他们将`Alexa`集成到其他产品和服务中：你可以与`Alexa`对话来访问 Amazon
    Music、Prime Video、来自亚马逊购物网站的个性化推荐以及其他服务。其次，他们扩展了`Alexa`的范围，使其成为一种语音服务，允许开发者创建自己的语音应用程序（称为“技能”）在
    Echo 上运行。


    起初，亚马逊很难找到对话数据来训练`Alexa`，但一旦客户开始使用 Echo，亚马逊就稳步收集了真实的对话数据。这些对话数据成为了一个强大的学习和实验测试平台——一旦你在市场上拥有了一款设备，你就能获得真实数据，这些数据对于改进一切，尤其是底层平台，至关重要。


    #### 让人工智能大众化


    亚马逊意识到，如果他们能利用自己的云平台和内部数据科学家，将内部正在做的事情外部化，就能产生巨大的价值。他们开始专注于如何简化人工智能。另一份史诗级的六页纸正在酝酿之中。


    虽然战术层面是在`AWS`上添加机器学习服务，但更广泛的层面是一个宏伟的愿景。`AWS`如何能成为所有人构建人工智能应用的首选目的地？你无需投资平台，也无需拥有自己的数据科学家团队——你只需要定义你想要解决的问题。剩下的都交给`AWS`。


    2016 年，`AWS`发布了新的机器学习服务——`Polly`（文本转语音组件）、`Lex`（自然语言处理引擎）、`Rekognition`（用于面部识别的深度学习服务）——并推出了一个更全面的人工智能平台`SageMaker`。这些服务允许`AWS`的客户（从
    Pinterest 和 Netflix 这样的巨头到小型初创公司）构建自己的人工智能驱动应用。

    '
- fmt: '### AI Way-of-Working


    Amazon democratized AI within the company and various units in a decentralized
    way. They created a specialist central group to define standards, architectures,
    and best practices. This group’s primary objective is to evangelize and promote
    machine learning across the enterprise in a highly collaborative fashion. Several
    examples highlight how different units within the company leveraged lessons from
    other units to solve problems.


    - The fulfillment team wanted to better predict which of the eight possible box
    sizes it should use to package a customer order. They leveraged the algorithms
    developed by other groups and applied them to solve their own problem.

    - Amazon Fresh, the company’s grocery delivery service, needed a better way to
    assess the quality of fruits and vegetables. They leveraged new algorithms developed
    by their Berlin-based team using IoT sensors in the delivery vans to determine
    the freshness of fruits and vegetables in transit.

    - Amazon Go leveraged a new AWS service called `Kinesis` to process streaming
    data from hundreds of cameras to track the shopping activities of customers in
    the store.

    - Amazon’s Prime Air drone-delivery service, still in the prototype phase, built
    a new AI solution to enable its autonomous drones, drawing on knowledge from the
    rest of the company and figuring out what tools to use.


    ### A New Business Model


    Shopping using Amazon has become a part of our life. We visit the website, shop
    for items, place them in the “basket,” and pay for them, and then Amazon ships
    them to us. Right now, Amazon’s business model is shopping-then-shipping.


    We all have noticed Amazon’s recommendations when we shop; the basic idea is to
    increase the basket size. The recommendation engine offers suggestions of items
    that you may find interesting to buy. It is nothing but a prediction system using
    “product-user similarity” algorithm. Considering that there is a match making
    happening at scale (millions of items to match with millions of customers’ buying
    preferences), the prediction system does a reasonably good job by accurately predicting
    what we want to buy about 5% of the time. In other words, we actually purchase
    about one out of every 20 items it recommends. Not bad!


    Amazon continuously collects information about us. In addition to our searching
    and purchasing behavior on their website, it knows not only what we buy, but also
    what is our preferred time to do online shopping, where we are located, how we
    pay, how many times we browse through before we finally make a decision to pay,
    how many times we have returned products, and many more. The prediction system
    uses all these data points to continuously refine its algorithms. The goal is
    to keep improving the metric from browsing to actually buying.


    What happens when the prediction system’s accuracy level comes significantly closer
    to 100%?


    Will it become more profitable for Amazon to ship you the products it knows you
    will want to buy rather than wait for you to order them? A change in the business
    model from shopping-to-shipping to shipping-to-shopping!


    Because the prediction system has now reached the threshold of being 100% accurate,
    Amazon can ship you products it knows you will want. You don’t have to order anymore.
    You decide in the comfort and convenience of your own home which items you want
    to keep and which ones you want to return. This new approach offers two benefits
    to Amazon. First, since Amazon proactively delivers products to your door step,
    it indirectly persuades you to not to go elsewhere to do your shopping. Second,
    by delivering products to your doorstep, it influences you to swipe your card,
    which otherwise you were considering to do for some time but might not have gotten
    around to. In both cases, Amazon benefits by gaining a higher share-of-wallet.
    Turning the prediction accuracy far enough creates a new and profitable business
    model for Amazon.


    What are some of the challenges of this new business model?


    In the current shopping-to-shipping model, Amazon picks up the products we want
    to return. However, in the new business model of shipping-to-shopping, there will
    be many more returns than observed today. So, Amazon will have to invest in infrastructure
    (perhaps scale up their fleet of trucks or expand partnerships with local logistics
    companies) to manage product delivery and returns process efficiently.


    You can ask, what if they were to launch this new business model at the current
    prediction accuracy (that is, 5%)? By launching sooner, Amazon will gain a lot
    in terms of access to newer data and will improve its prediction systems accuracy
    much faster. In addition, it will create a new entry barrier for competitors.
    The new business model will attract more shoppers, more shoppers will generate
    more data to train the AI, more data will lead to better predictions, and the
    cycle continues.


    What do we learn from the Amazon flywheel example? First, when AI is embedded
    into enterprise functions and processes, it improves the prediction capabilities
    and in turn has a significant impact on the business strategy. Second, there are
    increasing returns to investments on AI; however the timing of adopting AI as
    a business imperative matters a lot. Adopting too early could be highly experimental
    and costly, but adopting too late could be fatal.


    Companies face two questions in light of all of this. First, they must develop
    a better understanding of how fast and how far they can embed prediction capabilities
    in their businesses and applications. Second, they must focus on developing a
    strategy to continuously assess and gain business benefit of applying prediction
    capabilities to their business.


    ## Putting AI to Work


    AI has emerged out of the labs and entered the world of mainstream business. AI
    as a service offered on the cloud is simple enough for all to adopt; however,
    there is a lot of hard work that goes into managing the interplay of data, processes,
    and technologies, and solving problems that are relevant for your industry. If
    you are under the impression that you can simply subscribe to AI platforms on
    the cloud, throw all your data at the pre-built algorithms, and you will magically
    produce “intelligence,” then you are completely wrong.


    The following sections discuss AI examples across industries and corporate functions,
    to give you a sense of how AI is used to solve problems.'
  raw: '#### AI Way-of-Working


    Amazon democratized AI within the company and various units in a decentralized
    way. They created a specialist central group to define standards, architectures,
    and best practices. This group’s primary objective is to evangelize and promote
    machine learning across the enterprise in a highly collaborative fashion. Several
    examples highlight how different units within the company leveraged lessons from
    other units to solve problems.


    *   The fulfillment team wanted to better predict which of the eight possible
    box sizes it should use to package a customer order. They leveraged the algorithms
    developed by other groups and applied them to solve their own problem.


    *   Amazon Fresh, the company’s grocery delivery service, needed a better way
    to assess the quality of fruits and vegetables. They leveraged new algorithms
    developed by their Berlin-based team using IoT sensors in the delivery vans to
    determine the freshness of fruits and vegetables in transit.


    *   Amazon Go leveraged a new AWS service called Kinesis to process streaming
    data from hundreds of cameras to track the shopping activities of customers in
    the store.


    *   Amazon’s Prime Air drone-delivery service, still in the prototype phase, built
    a new AI solution to enable its autonomous drones, drawing on knowledge from the
    rest of the company and figuring out what tools to use.


    #### A New Business Model


    Shopping using Amazon has become a part of our life. We visit the website, shop
    for items, place them in the “basket,” and pay for them, and then Amazon ships
    them to us. Right now, Amazon’s business model is shopping-then-shipping.


    We all have noticed Amazon’s recommendations when we shop; the basic idea is to
    increase the basket size. The recommendation engine offers suggestions of items
    that you may find interesting to buy. It is nothing but a prediction system using
    “product-user similarity” algorithm. Considering that there is a match making
    happening at scale (millions of items to match with millions of customers’ buying
    preferences), the prediction system does a reasonably good job by accurately predicting
    what we want to buy about 5% of the time. In other words, we actually purchase
    about one out of every 20 items it recommends. Not bad!


    Amazon continuously collects information about us. In addition to our searching
    and purchasing behavior on their website, it knows not only what we buy, but also
    what is our preferred time to do online shopping, where we are located, how we
    pay, how many times we browse through before we finally make a decision to pay,
    how many times we have returned products, and many more. The prediction system
    uses all these data points to continuously refine its algorithms. The goal is
    to keep improving the metric from browsing to actually buying.


    What happens when the prediction system’s accuracy level comes significantly closer
    to 100%?


    Will it become more profitable for Amazon to ship you the products it knows you
    will want to buy rather than wait for you to order them? A change in the business
    model from shopping-to-shipping to shipping-to-shopping!


    Because the prediction system has now reached the threshold of being 100% accurate,
    Amazon can ship you products it knows you will want. You don’t have to order anymore.
    You decide in the comfort and convenience of your own home which items you want
    to keep and which ones you want to return. This new approach offers two benefits
    to Amazon. First, since Amazon proactively delivers products to your door step,
    it indirectly persuades you to not to go elsewhere to do your shopping. Second,
    by delivering products to your doorstep, it influences you to swipe your card,
    which otherwise you were considering to do for some time but might not have gotten
    around to. In both cases, Amazon benefits by gaining a higher share-of-wallet.
    Turning the prediction accuracy far enough creates a new and profitable business
    model for Amazon.


    What are some of the challenges of this new business model?


    In the current shopping-to-shipping model, Amazon picks up the products we want
    to return. However, in the new business model of shipping-to-shopping, there will
    be many more returns than observed today. So, Amazon will have to invest in infrastructure
    (perhaps scale up their fleet of trucks or expand partnerships with local logistics
    companies) to manage product delivery and returns process efficiently.


    You can ask, what if they were to launch this new business model at the current
    prediction accuracy (that is, 5%)? By launching sooner, Amazon will gain a lot
    in terms of access to newer data and will improve its prediction systems accuracy
    much faster. In addition, it will create a new entry barrier for competitors.
    The new business model will attract more shoppers, more shoppers will generate
    more data to train the AI, more data will lead to better predictions, and the
    cycle continues.


    What do we learn from the Amazon flywheel example? First, when AI is embedded
    into enterprise functions and processes, it improves the prediction capabilities
    and in turn has a significant impact on the business strategy. Second, there are
    increasing returns to investments on AI; however the timing of adopting AI as
    a business imperative matters a lot. Adopting too early could be highly experimental
    and costly, but adopting too late could be fatal.


    Companies face two questions in light of all of this. First, they must develop
    a better understanding of how fast and how far they can embed prediction capabilities
    in their businesses and applications. Second, they must focus on developing a
    strategy to continuously assess and gain business benefit of applying prediction
    capabilities to their business.


    ## Putting AI to Work


    AI has emerged out of the labs and entered the world of mainstream business. AI
    as a service offered on the cloud is simple enough for all to adopt; however,
    there is a lot of hard work that goes into managing the interplay of data, processes,
    and technologies, and solving problems that are relevant for your industry. If
    you are under the impression that you can simply subscribe to AI platforms on
    the cloud, throw all your data at the pre-built algorithms, and you will magically
    produce “intelligence,” then you are completely wrong.


    The following sections discuss AI examples across industries and corporate functions,
    to give you a sense of how AI is used to solve problems.'
  trans: '

    ### AI 工作方式


    亚马逊以去中心化的方式在公司内部及各业务部门普及了人工智能。他们成立了一个专业的中央小组，负责制定标准、架构和最佳实践。该小组的主要目标是以高度协作的方式在整个企业内推广和促进机器学习。有几个例子展示了公司内部不同部门如何借鉴其他部门的经验来解决问题。


    -   订单履行团队希望更好地预测在包装客户订单时，应从八种可能的箱子尺寸中选择哪一种。他们利用了其他团队开发的算法，并将其应用于解决自身问题。

    -   亚马逊的生鲜杂货配送服务 Amazon Fresh 需要一种更好的方法来评估水果和蔬菜的质量。他们利用了柏林团队开发的新算法，该算法通过配送货车上的物联网传感器来确定运输途中水果和蔬菜的新鲜度。

    -   Amazon Go 利用一项名为 `Kinesis` 的新 AWS 服务来处理来自数百个摄像头的流数据，以追踪店内顾客的购物活动。

    -   仍处于原型阶段的亚马逊 Prime Air 无人机配送服务，借鉴了公司其他部门的知识并确定了要使用的工具，构建了一个新的人工智能解决方案来驱动其自主无人机。


    ### 一种新的商业模式


    使用亚马逊购物已成为我们生活的一部分。我们访问网站、选购商品、将其放入“购物车”并付款，然后亚马逊将商品配送给我们。目前，亚马逊的商业模式是“先购物后配送”。


    我们在购物时都注意到了亚马逊的推荐；其基本理念是增加购物车中的商品数量。推荐引擎会提供你可能感兴趣购买的商品建议。这本质上是一个使用“产品-用户相似度”算法的预测系统。考虑到这是一个大规模匹配过程（将数百万件商品与数百万客户的购买偏好进行匹配），该预测系统表现相当不错，能够在大约
    5% 的情况下准确预测我们想要购买的商品。换句话说，我们实际上会购买它推荐的每 20 件商品中的大约 1 件。这已经很不错了！


    亚马逊持续收集着关于我们的信息。除了我们在其网站上的搜索和购买行为外，它不仅知道我们买了什么，还知道我们喜欢什么时间进行网购、我们的位置、我们的支付方式、我们在最终决定付款前浏览了多少次、我们退过多少次货，以及更多信息。预测系统利用所有这些数据点来不断优化其算法。其目标是持续提升从浏览到实际购买的转化率指标。


    当预测系统的准确率显著接近 100% 时会发生什么？


    对于亚马逊来说，直接将你知道你会想买的商品寄给你，而不是等你下单，是否会变得更有利可图？这将带来商业模式的转变：从“先购物后配送”变为“先配送后购物”！


    因为预测系统现在已达到接近 100% 准确的阈值，亚马逊可以将它知道你会想要的商品直接寄给你。你不再需要下单了。你可以在自己舒适便捷的家中决定保留哪些商品、退回哪些商品。这种新方法为亚马逊带来了两个好处。首先，由于亚马逊主动将商品送到你家门口，它间接地说服你不要去别处购物。其次，通过将商品送到你家门口，它促使你刷卡消费，而这笔消费你可能考虑了一段时间但一直没付诸行动。在这两种情况下，亚马逊都通过获得更高的钱包份额而受益。将预测准确率提升到足够高的水平，为亚马逊创造了一个新的、有利可图的商业模式。


    这种新商业模式面临哪些挑战？


    在当前的“先购物后配送”模式下，亚马逊会收取我们想要退回的商品。然而，在“先配送后购物”的新商业模式下，退货量将比现在多得多。因此，亚马逊将不得不投资于基础设施（例如扩大其卡车车队规模或加强与本地物流公司的合作），以高效地管理商品配送和退货流程。


    你可能会问，如果他们以目前的预测准确率（即 5%）推出这种新商业模式会怎样？通过尽早推出，亚马逊将在获取新数据方面获得巨大优势，并能更快地提高其预测系统的准确性。此外，这还将为竞争对手设置新的进入壁垒。新的商业模式将吸引更多购物者，更多购物者将产生更多数据来训练人工智能，更多数据将带来更好的预测，如此循环往复。


    我们从亚马逊飞轮的例子中学到了什么？首先，当人工智能被嵌入企业职能和流程时，它会提升预测能力，进而对商业战略产生重大影响。其次，对人工智能的投资回报是递增的；然而，将人工智能作为业务要务来采用的时机至关重要。采用过早可能高度实验性且成本高昂，但采用过晚则可能是致命的。


    面对这一切，企业面临两个问题。首先，他们必须更好地理解能够以多快的速度、在多大程度上将预测能力嵌入到自己的业务和应用中。其次，他们必须专注于制定一项战略，以持续评估并将预测能力应用于自身业务，从而获得商业利益。


    ## 让人工智能发挥作用


    人工智能已走出实验室，进入了主流商业世界。作为云上服务提供的人工智能简单到人人都能采用；然而，管理数据、流程和技术之间的相互作用，并解决与您所在行业相关的问题，需要付出大量艰苦的努力。如果你认为只需订阅云上的人工智能平台，将所有数据扔给预构建的算法，就能神奇地产生“智能”，那你就大错特错了。


    以下章节将讨论跨行业和企业职能的人工智能案例，让您了解人工智能是如何被用来解决问题的。

    '
- fmt: '### Marketing and Sales


    Gone are the days of mass marketing campaigns. In this increasingly digital world
    the best way to draw attention is to personalize. AI enables us to offer personalized
    services, advertising, and interactions. We have already seen the impact of successful
    personalization in the retail industry. Using not only the data shared by customers
    but also a large variety of data that is available in the web, retailers, for
    example, have developed loyalty apps that can reside on our smart phones. Based
    on our location, time of day, and proximity to supermalls or retail outlets, the
    loyalty app can push hyper-personalized offers to use in real time.


    In sales and marketing, AI can provide augmented intelligence capabilities correlating
    millions of individual data points with information on general consumer trends
    and then build a real-time marketing system that will potentially deliver thousands
    of customized offers in real time. This is a complex task that marketers today
    would probably take a week to deliver.


    “Next best offers” are positioned at the intersection of a customer’s needs and
    the company’s catalog of offerings. The key is to understand what the customer
    really wants (explicitly said and unsaid), do a match with the company’s offerings,
    and close the deal to the satisfaction of the customer as well as the company.
    In case of the insurance industry, this would mean building a model that reflects
    the needs of customers as they pass through various life stages. The model will
    leverage complex algorithms that can crunch more than 1,000 static and dynamic
    variables consisting of demographics, prior policies, prior agent interactions,
    economic conditions, segmentation of other customers, thus matching this customer
    and what products they have taken. The result? A potential to significantly increase
    cross-selling. The insurer can also use the model to reflect on how its agents
    are performing, thereby designing training programs to upskill agents who are
    not up to the mark.


    These examples demonstrate the importance of a rich supply of contextual and specific
    customer data. If you have a well-defined problem statement and data, you can
    generally validate a proof of concept within four to six weeks and then put together
    a detailed plan for the data infrastructure and the resources required for a full
    rollout.


    ### Research and Development


    R&D is a fascinating field and the problems in this field are generally complex.
    They require deep domain and technical expertise and are often driven by many
    experimentation cycles. AI solutions in the R&D area can expedite the experimentation
    cycles, often predicting the outcomes by simulating millions of data points.


    For example, in industrial manufacturing, AI can correlate real-time sensor data
    from machines with past maintenance data and OEM benchmark data to predict when
    the machine is going to fail.


    The problem in the R&D space is lack of availability of data. Companies wanting
    to better their product designs need to digitize machine operations data. Consumer
    electronics sector will need to focus a lot more on 3D design data and user experience
    data. The pharmaceutical and healthcare sector will need to focus on clinical
    trials data and drugs efficacy data. Given the knowledge and expertise required
    to develop AI solutions purpose-built for R&D, companies must engage domain experts
    to systematically curate data and help improve the prediction capabilities.


    ### Operations


    Operational practices and processes have standard operating procedures, generate
    a wealth of data, and have measurable outputs against each task. Quite naturally,
    operational tasks are well suited for AI supplements. Rapidly evolving technology
    is transforming every field, and manufacturing is no exception. Cost pressures
    are rising as industries become increasingly competitive. Heavy industries like
    chemical, power, and thermal, with longer gestation times and long-term ROI, are
    facing the brunt, not only from within but also due to the fast-moving external
    factors. For example, labor that was once readily and cheaply available is now
    hard to get.


    Manufacturing trends in itself are changing; made-to-order is the new way. Just-in-time,
    lean manufacturing calls for less inventory and a more real-time operations. How,
    then do manufacturers adopt and embrace this shifting scenario? The answer lies
    in becoming smarter and better through artificial intelligence.


    Artificial intelligence can be applied to the entire lifecycle of manufacturing,
    right from problem identification to problem communication and then resolution.
    Automation is necessary to streamline repetitive tasks such as scheduling and
    rescheduling, planning and data tracking.


    Prediction to preempt anomalies in operations goes a long way in bringing to notice
    aberrations and thereby avert critical catastrophes! Such AI-enabled systems must
    be instilled for material, machine, and equipment updates and also extended to
    the systems that they interact with, such as customer orders and supply-procurement.'
