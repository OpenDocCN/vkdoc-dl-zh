    with different incentives, means robust problem management is rare. See Figure
    [8-2](#467925_1_En_8_Chapter.xhtml#Fig2).


    ![../images/467925_1_En_8_Chapter/467925_1_En_8_Fig2_HTML.png](images/467925_1_En_8_Chapter/467925_1_En_8_Fig2_HTML.png)


    Figure 8-2


    Illustrative roadmap for AIOps implementation approach


    The strategies discussed will help create shared understanding and collaboration
    that will dramatically improve your organization’s ability to respond. That, however,
    will not be enough to deal with the scale, speed, and unpredictability of digital
    transformation. IT must leverage these strategies to actively engage in proactive
    problem identification and remediation. Machine learning and cross-pillar analytics
    will reveal common problems driving incidents and create the space for organizations
    to engage in preventive automation and process improvement. This must be part
    of any incident management analytics initiative.


    ## Conclusion


    There are no quick, easy solutions to enable a business to match the pace of digital
    transformation, let alone be successful at it. Tasked to keep the lights on, IT
    operations has always been a conservative practice, because the primary business
    expectation is that the IT operations team should only support the business—nothing
    more, nothing less. However, if a business is to digitally transform, the IT team
    must transform as well.


    The IT operations teams must learn more about their environment, the new technologies,
    and their implications. The learning mindset will encourage IT operations professionals
    to move away from a “support” only task to an Agile participant. The potential
    of automated and machine-assisted collection and interpretation of data are foundational
    capabilities of AIOps that can deliver results that far exceed what the IT operations
    team working on their own could achieve.


    The application and service environments are converging as end users demand faster
    and more reliable user experience. The IT operations personnel should see their
    roles as facilitators of business and AIOps becomes an invaluable platform for
    enabling new methods of ensuring efficient support operations.


    All forms of AI and analytics require a consistent, unified, and quality assured
    data set. The data to become useful must cross the systems and application silos
    and integrate a variety of sources from across the network. If it is not, the
    data collected will not be representative of the network’s condition, and the
    resulting analytics, suggestions, and actions will be incomplete. The effectiveness
    of AIOps will be highly dependent on quality and completeness of data. If systems
    and network data are arranged in siloes, or multiple tools are used to collect
    the data, it will be an uphill task that limits collaboration, hinders communication,
    and slows down responses from the IT operations team.


    In this chapter we discussed the conflict that exists between the innovation requirements
    and the support requirements and how AI can transform the traditional IT operations
    approach to a highly responsive and integrated AIOps. In the next chapter, we
    discuss an interesting concept—algorithmic companies and decentralized autonomous
    organization (DAO).


    # 9. Decentralized Autonomous Organizations = Blockchain + AI + IoT


    Blockchain, AI, and IoT are all technology disruptions: Blockchain promotes decentralized
    applications in an open-data environment,  AI provides intelligence through a
    centralized data and analytics platform, and IoT enables devices/machines to be
    connected via a centralized cloud storage and processing service.


    In the previous chapters, we discussed AI and its influence and the potentially
    explosive value generation if combined with IoT, RPA, and IT operations. In this
    chapter, we discuss another aspect of AI in a highly decentralized environment
    and how, if combined with blockchain technology and IoT, it can deliver far-reaching
    and amplified outcomes.


    First, let’s have a quick overview of blockchain.'
  trans: '

    ### 打通数据孤岛与学科壁垒，解锁隐藏洞察


    此前，我们探讨了从静态报表转向动态数据探索的优势。能够纳入的数据量越大、种类越丰富，发现与分析的过程就越强大且富有意义。关键在于不仅要打通 IT 数据孤岛（服务管理与运维），还要将
    IT 数据与业务数据融合起来。


    这种方法的基础是在事件管理与 IT 运维之间建立集成协作关系。运维部门在弥合性能管理工具之间的鸿沟时面临自身挑战，但将服务工单中捕获的真实用户体验与性能指标及事件相连接的需求不容忽视。


    随着工单量与复杂度的增加，IT 部门可用的两个杠杆是：a) 加快响应速度，或 b) 从源头预防问题。传统策略、分析工具通常聚焦于前者。这虽必要，但仍属被动应对。少数
    IT 部门拥有有效的问题管理实践。由于缺乏人员、专业能力、资源或洞察力，加之不同激励机制的部门孤岛加剧了问题，使得稳健的问题管理十分罕见。参见图 8-2。


    ![../images/467925_1_En_8_Chapter/467925_1_En_8_Fig2_HTML.png](img/467925_1_En_8_Fig2_HTML.png)


    **图 8-2** AIOps 实施方法示意路线图


    所讨论的策略将有助于建立共识与协作，从而显著提升组织应对问题的能力。然而，这仍不足以应对数字化转型的规模、速度与不可预测性。IT 部门必须利用这些策略，主动参与问题的识别与修复。机器学习与跨支柱分析将揭示引发事件的根本问题，为组织开展预防性自动化与流程改进创造空间。这必须成为任何事件管理分析计划的一部分。


    ## 结论


    要让企业跟上数字化转型的步伐，没有快速简单的解决方案，更遑论取得成功。由于核心业务期望 IT 运维团队仅支持业务——不多也不少——IT 运维一直是一项保守的工作。然而，如果企业要进行数字化转型，IT
    团队也必须转型。


    IT 运维团队必须更深入地了解自身环境、新技术及其影响。学习型思维将鼓励 IT 运维专业人员从单纯的“支持”任务转向敏捷参与者。自动化与机器辅助的数据采集与解读能力是
    AIOps 的基础能力，其成果远超 IT 运维团队单打独斗所能达到的水平。


    随着最终用户对更快、更可靠用户体验的需求，应用与服务环境正在融合。IT 运维人员应将自身角色视为业务的促进者，而 AIOps 则成为支持高效运维新方法的宝贵平台。


    所有形式的 AI 与分析都需要一致、统一且质量有保障的数据集。数据要变得有用，必须跨越系统与应用孤岛，整合来自网络各处的多种数据源。否则，收集的数据将无法代表网络状况，由此产生的分析、建议与行动也将不完整。AIOps
    的有效性高度依赖于数据的质量与完整性。如果系统与网络数据被孤立存放，或使用多种工具收集数据，这将是一项艰巨的任务，会限制协作、阻碍沟通，并拖慢 IT 运维团队的响应速度。


    在本章中，我们讨论了创新需求与支持需求之间存在的冲突，以及 AI 如何将传统 IT 运维方法转变为高度响应且集成的 AIOps。在下一章中，我们将探讨一个有趣的概念——算法公司与去中心化自治组织（DAO）。


    # 9. 去中心化自治组织 = 区块链 + AI + 物联网


    区块链、AI 与物联网都是颠覆性技术：区块链在开放数据环境中推动去中心化应用，AI 通过集中式数据与分析平台提供智能，物联网则通过集中式云存储与处理服务实现设备/机器的互联。


    在前几章中，我们讨论了 AI 及其影响，以及 AI 与物联网、RPA 和 IT 运维结合时可能产生的爆炸性价值。在本章中，我们将探讨 AI 在高度去中心化环境中的另一个方面，以及它如何与区块链技术和物联网结合，产生深远且放大的成果。


    首先，让我们快速了解一下区块链。

    '
- fmt: '# Blockchain Primer for Managers


    We have witnessed two waves where initially scarce and expensive resources became
    cheap and technologies then emerged to exploit these resources. When computation
    (transistors) became cheap, PCs (personal computers) emerged; when bandwidth became
    cheap, the Internet emerged. Similarly, blockchain is the third wave where cheap
    storage allowed us to create a distributed (distributed ledgers to record ownership),
    open to all (yet secure) way of recording important information, thus introducing
    a robust, transparent, and trustworthy mechanism to issue and transfer assets
    in the virtual world.


    Blockchain (distributed ledger) is a secure, distributed, and immutable database,
    accessed by all participants in a distributed network where transaction data is
    recorded (either `on-chain` for basic information or `off-chain` in the case of
    attachments) and audited. The data is stored in structures called `blocks`. The
    blocks are connected to each other in a `chain` through a `hash` (each block also
    includes a `timestamp` and a link to the previous block via its `hash`). The blocks
    have a header, which contains metadata information and the content (real transaction
    data). Since every block is connected to the previous one, as the number of participants
    and blocks grow, it becomes extremely difficult to modify information in the block
    chain without obtaining the network consensus.


    Blockchain has three major characteristics:


    - **Decentralized control**: Blockchains operate on a shared control framework
    wherein it offers a common mechanism for participants for a common cause. No single
    entity in a blockchain network has exclusive rights granted to it that others
    do not have. This allows for the smooth formation of decentralized networks for
    various transactional services. This is highly influential in cases where best
    practices need to be made aware to everyone so as to improve the process as a
    whole, make it beneficial to the end user, and make it easy for all to ensure
    better governance and compliance.


    - **Assets exchange**: This is perhaps the most important feature of blockchain,
    since all transactions are recorded and no single entity has total control over
    what happens in the network. The system allows for transparent exchange of value
    items, which are data units that have value, like digital currencies, energy unit
    data, stock unit data, land deeds, educational certificates, and much more. It
    becomes easier to maintain in a trusted network critical information exchange
    and can revolutionize the way in which transactions are carried out with blockchain
    technology compared to traditional mechanisms. More reliability, security, and
    transparent control will ensure that transactions are viable under all circumstances
    and do not violate ethical policies.


    - **Immutability**: A transaction, once it’s recorded, is permanent and can’t
    be erased from the network. There is a permanent digital audit trail that lets
    everyone in the network see who did what. This forms the basis for smart contract
    management when contractual obligations become easier to validate from all parties
    involved. This will ideally mean complete elimination of fraudulent practices
    and keeping a check on all transactions carried out on such networks. It will
    become impossible for someone or a group of people to influence the entire network
    to commit a faulty transaction. No matter how long the network exists, all previous
    actions would be available to monitor and inspect for all members and stakeholders
    involved.


    There are two methods applied to validate the transactions in the network.


    `Proof-of-work` asks the participants (called `miners`) to solve complex mathematical
    problems in order to add a block. When you want to set a transaction, this is
    what happens behind the scenes:


    - Transactions are bundled together into what we call a block.

    - Miners verify that transactions within each block are legitimate. To do so,
    miners solve a mathematical puzzle known as proof-of-work problem.

    - A reward is given to the first miner who solves each block’s problem.

    - Verified transactions are stored in the public blockchain.


    `Proof-of-stake` instead tries to attribute more mining power to participants
    who own more stakes (coins). It is still an algorithm, and the purpose is the
    same as of the proof of work, but the process to reach the goal is quite different.
    Under this system, forgers (the PoW equivalent of a miner) build blocks based
    on their stake in the blockchain’s network.


    Blockchains follow two approaches to grant access to participants in the network:


    - **Permission-less blockchains**: Anyone can join the network and participate
    in the process of block verification to create consensus and also create smart
    contracts. Bitcoin and Ethereum blockchains are a few examples, where any user
    can join the network and start mining.


    - **Permissioned blockchain**: Only a restricted set of participants have the
    right to validate the block transactions. A permissioned blockchain may also restrict
    access to approved participants for creating smart contracts. Examples: R3 (Banks),
    EWF (Energy), and B3i (Insurance).


    What happens when we merge IoT and the blockchain into a single, powerful platform?'
