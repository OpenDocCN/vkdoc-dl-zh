  trans: '

    # 神经网络：黑箱之谜


    与我们大脑的工作方式类似，神经网络内部由多层相互连接的类神经元节点构成，包括一个输入层、一个输出层以及若干中间“隐藏”层。这些节点根据自身关联的权重执行数学运算，并将输入数据的内部表征传递给后续层级，最终在输出层通过预测汇总权重。深度神经网络拥有不止一个隐藏层。通过向神经网络输入成千上万的数据，你可以让它逐步微调特定层级中单个神经元的权重。最终结果是，所有层级的所有神经元经过复杂运算，共同加权产生最终输出。从原始输入到最终结果的路径极其复杂，历经无数次迭代和微调，这使得神经网络获得了“黑箱”的恶名——它无法解释自己是如何得出最终结果的。我们唯一能做的，就是尝试创建尽可能最佳的模型，并用我们能获取到的最无偏的数据来训练它。


    神经网络训练的关键在于一个名为`反向传播`的过程。在此过程中，中间层的设置会被逐步修改，直到输出层与输入层达到最优匹配。你拥有的类神经元节点越多——即权重和中间层越多——学习过程就越复杂，即使最终能得出相当准确的预测。


    拥有一个能对未见数据做出准确预测的模型是一回事，而无法解释模型如何得出准确预测则是另一回事。在许多现实场景中，能够详细了解内部决策过程是极其必要的，因为其后果可能是灾难性的。


    ## 窥探黑箱内部


    飞机上的黑匣子也被称为飞行数据记录器。它们几乎记录飞行途中的所有情况。这是一种极其安全的设备，一旦飞机发生任何意外，它就会成为研究人员和调查人员的关键真相来源。


    人工智能的“黑箱”（指机器学习/深度学习算法）则被赋予了相反的含义——算法能给出预测，但它不一定能告诉你它是如何学会预测的，以及在学习过程中考虑了哪些因素。


    这些“自学习机器”的开发者们也承认，一旦机器学习/深度学习算法训练完成，就很难理解它为何会对一组数据输入给出特定响应。这种不透明性引发了关于人工智能自主性、决策制定和责任归属的问题。


    有两类活动定义了机器如何进行学习：


    *   知识收集（通过输入数据集，这些数据集有助于验证和提高预测置信度）用于得出准确的预测。

    *   将预测模型嵌入应用程序，不仅是为了自动化决策，也是为了持续学习和持续改进。


    一旦预测系统训练有素，就该投入使用了。我们看到预测系统可分为两种类型。


    *   A 类应用：预测系统的后果可能对人们的生活产生不利影响。这些包括医疗诊断、贷款处理应用、简历筛选应用、自动驾驶汽车等。

    *   B 类应用：预测系统的后果最多可能让人们感到不满意。这些包括看哪部电影、去哪家餐厅用餐、哪条通勤路线更快、你想阅读哪些新闻、你想购买哪些商品等。


    对于 B 类应用，我们不太关心人工智能系统的不透明性；而对于 A 类应用，我们则极其渴望了解预测是如何做出的。


    神经网络通过多层互联结构处理输入数据来学习。第一层作为输入层，其中的“神经元”接收原始输入（例如一张人脸照片中的像素）。然后，神经元根据数学规则应用特定权重并得出一个分数。这一层汇总后的分数被传递给下一层节点。这个过程会持续经过网络中的所有层级和所有节点，直到到达最终的输出层。网络的最后一层作为输出层，将前面所有层级的分数汇总成一个预测，例如：“这是一张人脸的照片”。“深度”一词意味着更多的层数；它可以包含三层到数百层不等。


    如果预测错误，神经网络会进行反向追踪，调整节点之间的连接，修正数学规则，逐步引导学习过程更接近期望的结果。通过调整参数以满足数百万个示例，神经网络创建了一个模型，该模型能够对从未遇到过的新图像进行分类或在新的条件下执行操作。


    这种被称为深度学习的学习过程，使得神经网络能够创建专门解决特定问题（如图像识别、语音识别等）的人工智能模型，但这些模型过于复杂和繁琐，无法手动编码。深度学习的可贵之处在于，你无需告诉系统要寻找什么。你给它几百万张猫的图片，图像识别专家就会自己弄清楚猫长什么样。


    由于神经网络本质上是自我编程的，它们常常会创建出人类无法完全理解的数据抽象表示。其决策过程被编码在节点之间数十亿次的来回信号中。


    许多专家认为这种不可解释性令人担忧。在人机对弈中这无关紧要，但在无人驾驶汽车的情况下却至关重要。如果无人驾驶汽车发生严重事故，仅仅说“我们就是不明白汽车为什么会那样做”是绝对不可接受的。


    讽刺的是，我们（人类）正在构建这些预测系统，而我们追求的应用场景越广泛，人工智能成功模仿人类的途径就越多，因此人工智能就越擅长理解我们为何做我们所做的事，包括我们所有的偏见、成见和局限。

    '
- fmt: '### Unmasking AI


    Debates are raging to address the concerns surrounding the opaqueness of AI. A
    methodical approach to make AI explainable is still years away, but a number of
    approaches are in the labs. The approaches may vary but their goal is the same:
    to ensure that our machines do not evolve too far beyond our ability to understand
    them.


    Some researchers are attempting to embed “explain training” modules into AI systems,
    so that any tinkering done with the inputs and resulting output can be documented
    automatically. This approach may work well in less complex AI algorithms; however,
    when you feed lots of data and your algorithm has lots of layers and then you
    have the “explain training” modules keep an eye on everything, the algorithm will
    inherently slow down the learning process, which is not a desirable effect. Others
    are attempting to develop “probe modules” that can do a dipstick analysis into
    the network’s behavior and understand how these systems learn.


    The “observer approach” treats an AI system like a black box. It is a pre-built
    neural net specialized to solve a particular task. Instead of feeding the entire
    data set, you experiment with it by feeding incremental data, piece by piece,
    and observing its behavior. For example, instead of feeding the complete picture
    of a car at once, you feed the neural net pieces of a car one at a time and observe
    which parts (headlights, front bumper, side view mirrors, windshield, partially
    visible steering, or something unexpected like a cracked windshield) lead the
    AI system to make a correct classification.


    “Explanation net” is another approach to probing a neural net with a second neural
    net. The objective is to gain deeper insight into the tweaks and adjustments that
    happens in the original neural net.


    While these approaches no doubt will bring some clarity as to how deep learning
    networks arrive at decisions, until we get to that state, we have very little
    choice but to develop an element of trust on AI delivering the outcomes, in the
    same way there is an inherent trust in humans who are responsible for decision
    making. For example, we accept the decision delivered by jury members and at best
    may contemplate which facts were instrumental in swaying their decision, but we
    do not go to the extent of quizzing them or scanning their brain activities to
    understand how they arrived at the final decision.


    ### Training ML and Our Tolerance for Error


    It doesn’t take a tremendous amount of training to begin a job as a cashier at
    a gas station. Even on their first day, cashiers posses certain basic accounting
    knowledge to get started. On their first day, new cashiers may appear to be slow,
    inefficient, and might make more mistakes than their experienced peers. We generally
    have a good amount of tolerance and accept the fact that the cashier is going
    through a learning phase and it is just a matter of time that he learns the job.


    We don’t often think of it, but the same is true of medical practitioners. We
    take comfort in the fact that medicine as a practice is regulated by the government
    and requires not only passing a grueling curriculum but also internship experience
    of thousands of hours, before one gets a license to practice medicine. If someone
    wants to pursue a specialization such as heart surgery, requires an additional
    grueling curriculum and lots of internship experience to observe and learn from
    the experts. Once someone gets a license to practice medicine, it doesn’t stop
    there. The medical practitioners continue to improve from on-the-job experience.


    What constitutes “good enough” is based on our bias toward tolerance for error.
    Our tolerance is much higher for a new cashier, and much lower for doctors. We
    have different definitions for “good enough” when it comes to how much training
    humans require in different jobs.


    The same is true of AI. Algorithms need to undergo training, just as doctors and
    cashiers do. They are also subjected to the “good enough” question and there are
    trade-offs to be made.


    Let’s take the example of the AI that manages your Gmail. The Gmail application
    applies spam-filtering to incoming emails, organizes your inbox according to your
    preferences, sets up your calendar entries based on the content in your mail,
    sends out automated responses, etc. But, it also fails quite frequently. We don’t
    trash Gmail; we consider it “good enough” and through our continued indulgence
    with Gmail (correcting its mistakes), we provide a good training ground for the
    AI at our expense.


    In contrast, we have low tolerance for error in driverless cars. We never had
    driverless cars before, there was no training data, so how did the AI learn? We
    took a clever approach of asking human drivers to take the first generation of
    autonomous cars, drive hundreds of thousands of miles, and trained the AI on the
    job. It was like a driving instructor taking a learner on supervised driving experiences
    before letting them drive on their own. The key question is, should we accept
    this AI behind autonomous vehicle as good enough?


    In order to get better, the AI behind autonomous vehicles needs to learn in real
    situations, unsupervised. But putting the immature AI in real-world situations
    means giving the passengers a relatively “young and inexperienced” driver. Suddenly,
    the risks are magnified and our tolerance for error hits rock bottom. However,
    until and unless the immature AI is encouraged to operate in real-world situations,
    it will never learn the many nuances of successfully operating and thriving in
    the real world.


    Herein lies the tricky trade-off. Putting AI in the real-world situations earlier
    accelerates learning, but could have grave consequences (challenging our tolerance
    levels). Putting products in real-world situations later slows down learning but
    allows for more time to improve the AI.


    ## Conclusion


    Why do we care so much about the “explainability” of algorithms? In many situations,
    the concerns that algorithms should be implemented with a great deal of caution
    are justifiably right. However, as we continue to find new applications for machine
    learning algorithms, we should not let this focus on algorithmic explainability
    blind us from a harsh truth about the world: humans are predictably irrational
    and no more explainable than the most opaque algorithms out there.


    This is why the distinction between the two types of AI applications—those replacing
    rule-based and repetitive human tasks and those replacing human judgment-oriented
    tasks—is important. When we focus specifically on AI applications in which algorithms
    are replacing human judgment-oriented tasks, we tend to seek for “explainability”
    of AI more than with the former tasks.


    ### Humans Can’t Explain Their Own Actions


    Humans have cognitive biases. We often aren’t even aware of how biases enter into
    our thought processes. When you ask people to explain their decisions, they feel
    uncomfortable explaining why they acted the way they did. For the same problem
    statement and the same actions taken, two humans will come up with very different
    explanations as to why they acted the way they did.


    ### Algorithms Are Predictably Rational


    An algorithm will give you the same answer every time. Yes, when we build these
    algorithms, if we are feeding them our cognitive biases and data biases, they
    will confirm to biased outputs, consistently. Hence, when we start putting stress
    on “AI explainability” as a critical factor, we must ask whether our outcome is
    more valuable than understanding the process of getting to the outcome.


    In the next chapter, we discuss how by combining robotic process automation and
    AI, companies can transform themselves by pursuing an intelligent automation journey.'
  raw: '### Unmasking AI


    Debates are raging to address the concerns surrounding the opaqueness of AI. A
    methodical approach to make AI explainable is still years away, but a number of
    approaches are in the labs. The approaches may vary but their goal is the same:
    to ensure that our machines do not evolve too far beyond our ability to understand
    them.


    Some researchers are attempting to embed “explain training” modules into AI systems,
    so that any tinkering done with the inputs and resulting output can be documented
    automatically. This approach may work well in less complex AI algorithms; however,
    when you feed lots of data and your algorithm has lots of layers and then you
    have the “explain training” modules keep an eye on everything, the algorithm will
    inherently slow down the learning process, which is not a desirable effect. Others
    are attempting to develop “probe modules” that can do a dipstick analysis into
    the network’s behavior and understand how these systems learn.


    The “observer approach” treats an AI system like a black box. It is a pre-built
    neural net specialized to solve a particular task. Instead of feeding the entire
    data set, you experiment with it by feeding incremental data, piece by piece,
    and observing its behavior. For example, instead of feeding the complete picture
    of a car at once, you feed the neural net pieces of a car one at a time and observe
    which parts (headlights, front bumper, side view mirrors, windshield, partially
    visible steering, or something unexpected like a cracked windshield) lead the
    AI system to make a correct classification.


    “Explanation net” is another approach to probing a neural net with a second neural
    net. The objective is to gain deeper insight into the tweaks and adjustments that
    happens in the original neural net.


    While these approaches no doubt will bring some clarity as to how deep learning
    networks arrive at decisions, until we get to that state, we have very little
    choice but to develop an element of trust on AI delivering the outcomes, in the
    same way there is an inherent trust in humans who are responsible for decision
    making. For example, we accept the decision delivered by jury members and at best
    may contemplate which facts were instrumental in swaying their decision, but we
    do not go to the extent of quizzing them or scanning their brain activities to
    understand how they arrived at the final decision.


