    # 企业人工智能战略


    较为成熟的组织会设立首席数据官，并配备集中化的数据科学职能，但更常见的模式似乎是分散化模式，即数据科学家分散在组织内不同职能部门中。


    在分散化模式下，同一家公司内数据科学家的技能水平必然参差不齐。有些人拥有先进的机器学习背景，而另一些人则是从软件工程师或数据分析师转型为数据科学家的。那些掌握先进机器学习技能的人，可能不会满足于“黑箱”方法——即算法运作方式不透明，且无法微调参数权重。在考虑仅提供黑箱解决方案时，请牢记这一点。


    `AI` 本身并非产品或业务单元；它是一种基础技术，能够助力现有业务线，并创造新产品或业务线。因此，要成功将 `AI` 引入企业，需要深刻理解当前业务，并与不同业务单元或职能团队协作。你需要一位能展现创业精神的领导者。随着
    `AI` 的快速发展，你的团队需要跟上变化。他们是否处于 `AI` 的最前沿并不那么重要，重要的是选择一条演进路径。你的数据科学家、数据工程师和高管团队需要跨职能协作，并具备商业技能，以找出如何开发和实施与企业和业务目标相关的
    `AI` 解决方案。


    首席 `AI` 官需要具备良好的 `AI` 技术理解力，熟悉公司的数据基础设施，必须有能力跨业务职能和高管层进行协作，最重要的是，要有足够的信誉来吸引和留住
    `AI` 人才。


    ## CEO 使命：普及 AI


    CEO 的 `AI` 战略中另一个最重要的方面是，让 `AI` 技术在整个组织中广泛可用，尤其是对那些在管理和运营业务职能方面经验丰富，但在利用最新技术进行决策时却感到迷茫的人。这可以称为“`AI`
    的普及化”。为实现这一目标，公司需要做几件事：开发自己的 `AI` 平台，跨业务职能开展广泛的设计思维研讨会，并对员工进行再培训，让他们理解预测技术如何运作，以及如何在日益人机共融的世界中与之共存。


    从长远来看，你的员工将获得足够的接触和专业知识，开始开发自己的 `AI` 应用程序，以更快、更好、更便宜地完成工作。例如，你的营销团队将能够将自然语言处理组件与其他组件连接起来，创建一个用于收集和分析社交媒体非结构化数据的应用。或者，你的销售团队将能够分析庞大的客户数据集，预测哪些潜在客户最有可能转化为实际客户，或发现关于客户行为的洞察，改进不同产品和服务的设计，从而提高交叉销售/追加销售的能力。


    `AI` 的普及化还将让你的生态系统合作伙伴能够共同构建平台，带来强大的协作能力和简化的流程编排，从而打破组织边界。想想电子表格如何帮助普及数据分析，甚至让夫妻店也能进行宝贵的“假设”分析。


    显然，“`AI` 的普及化”是所有企业为创造可持续竞争优势而必须采取的战略举措。


    ## 结论


    `AI` 是一个长期趋势，将影响我们家庭和工作的方方面面。我们正在走向一个巨大的语义网世界，万物互联。纯粹从算法规范的角度来说，我们的位置是一个属性，我们的情感是一个属性，我们的面部表情是一个属性，我们的声音也是一个属性。云、移动、社交媒体、大数据、`AI`
    以及现在的区块链的超级融合，使企业能够在消费者对消费者和企业对企业的领域，积极探索、创新并推出颠覆性的商业模式和超智能产品。在此背景下，董事会向 CEO 询问
    `AI` 战略是恰如其分的。企业 `AI` 关乎构建、部署和管理智能交互系统，而不仅仅是实现手工工作的自动化。因此，作为 CEO，你的任务已经明确。你需要有一个清晰的愿景：


    1.  **将 `AI` 确立为一项业务能力**：`AI` 太重要了，不能只停留在少数实验、一次性的 `AI` 概念验证或由 IT 团队开发专业知识上。关键不在于发布一份年度报告，像许多其他公司那样声称你正在探索
    `AI`。CEO 应该问：`AI` 能带来哪些可能性？


    2.  **在公司内部普及 `AI`**：渐进主义无法变革公司。采用“点与泡”的类比，来确定公司应如何对待 `AI` 用例，不仅要在市场上实现差异化，还要在公司内部普及
    `AI`。


    3.  **采用快速失败、快速学习的方法**：采用 `10/10/10` 方法：用 10 小时确定用例，用 10 天构建数据管道，用 10 周上线 `AI`
    能力。CEO 必须鼓励学习和实验的文化。这需要一种敏捷的方法，在 90 天内从概念走向能力。


    4.  **将 `AI` 项目作为自上而下的举措来推动和管理**：领导层必须将 `AI` 视为一项由高层推动的业务要务，而不是由底层驱动的技术知识探索和实验型项目。


    5.  **构建生态系统以充分利用**：六大技术的超融合意味着公司需要一个合作伙伴生态系统来应对所有关键技术。


    如果你的董事会没有问你这个问题怎么办？如果你的董事会不关心公司的 `AI` 战略，以推动新的商业模式或新产品和服务，也许你需要考虑更换董事会成员！在这个快速变化的商业和市场环境中，没有第二次机会。你绝对需要你的董事会理解并发挥关键作用，质疑你的战略、技术投资以及员工再培训计划——这些是公司未来所依赖的。


    在下一章中，我们将讨论 `AI` 的基础知识（`AI` 的一些技术层面）以及尽管其优势明显，但仍存在的相关疑虑。

