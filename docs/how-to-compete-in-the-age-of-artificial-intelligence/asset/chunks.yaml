  trans: '

    ### 人工智能的新进展是否名副其实？


    几乎每天，我们都会看到又一篇新闻报道或文章在赞美人工智能的应用案例。这股热潮究竟为何如此强烈？


    在短短时间内，我们目睹了一系列重大技术变革（移动化、电子商务、数字化、分析技术、大数据、物联网、自动化等），每一项都深刻影响着我们的商业运作方式和日常生活。当企业高管和技术从业者好不容易适应了这些技术演进时，人工智能浪潮及其伴随的种种炒作又带来了新的挑战。人工智能中究竟有哪些新内容可能与当下相关？为何现在人们对人工智能如此关注？人工智能中是否有值得炒作的新东西？这难道只是“新瓶装旧酒”吗？


    分析、统计分析、优化、回归、聚类、细分等概念，早在“分析”一词备受关注之前就已存在。尤其是航空公司，长期以来一直利用分析技术进行收益管理、定价和提升运营效率。在分析技术成为热门话题之前，市场营销部门早已使用客户细分技术。欺诈检测和信用评分也已应用了几十年。然而，在大数据技术出现之前，进行分析的方式也确有新意。人们不再采用抽样方法进行分析，而是开始利用大数据技术在整个数据集上运行算法，从而提升了算法的性能和输出结果，有时还能偶然发现以前无法找到的洞见。


    低估新旧时期之间的差异将是一个错误。我们现在能够获得这些技术所需的处理能力。过去只能在理论上做到的事情，如今可以在实践中大规模实现。早期的人工智能侧重于基于规则的系统（也称为专家系统），旨在实现推理自动化。而新的人工智能则完全依赖于从数据中学习模式。


    如今，商业生态系统已变得更加数字化。过去，商业应用和分析系统需要多个集成点和数据交换，人类常常需要手动连接各个环节来完成任务。但现在，随着数字化程度的提高，组织内部和外部的应用与系统之间的链接是原生的数字连接，使得人工智能系统能够直接与数字系统交互。这类网络效应加速了人工智能的采用。随着机器与机器之间的交互越来越多，这为价值创造（和毁灭）开辟了新的机遇。


    诚然，人工智能背后存在大量炒作，但同样也存在大量的现实。为了克服这种困惑，管理者需要培养一种心态，使他们能够同时倾听两种观点。


    一种观点是关于人工智能所提供的潜力。管理者需要研究与自身业务相关的人工智能技术，以便他们及其组织不会错失机遇。为了评估人工智能对其业务的适用性，他们可以开展试点项目来积累经验，即使结果并非惊世骇俗。他们也可以挑选某些现有的业务流程或应用来测试人工智能方法，以发现其优势和劣势。


    另一种观点则是质疑人工智能的承诺。在纸面上，所有这些被美化的例子可能看起来很棒。管理者需要真正理解并验证人工智能在解决其特定问题方面的相关性，而不是被技术供应商的说辞冲昏头脑。


    ## 为什么采用人工智能如此困难？


    你想要解决什么问题？你是想改进内部流程，如财务、采购或人力资源职能？你是想改善客户体验？你的产品中是否有某些功能可以受益于智能化？你是否需要你的产品对客户反应更灵敏？是否有某些重复、易出错且本质上枯燥的任务可以实现自动化？是否有某些任务，只需一点辅助就能让你的员工更高效？人工智能技术可以帮助你实现所有这些，甚至更多。如果你有一把凿子，你可以用它来雕刻任何雕像。但要成功，你不能贸然行事，到处应用这项技术。你需要一个与总体业务战略相一致的人工智能战略。无论你是改进现有业务还是构建新的商业模式，人工智能都应服务于你的商业计划，而不是反过来。


    然而，挑战是存在的！


    人工智能可以创造奇迹，但在用它解决问题之前，你需要现实地看待它，并理解其固有的挑战。例如，人工智能已被证明非常擅长对物体进行分类，比如给图片打标签，但它无法告诉你图片中内容的更多信息。在商业背景下，一个人工智能应用或许能告诉你，用户看到新产品设计时是否显得高兴，但它无法回答一个更大的问题，即该产品是否会成功。


    人工智能应用是数据饥渴型产品。要训练你的人工智能应用，你不仅需要大量数据，还需要稳健的数据管理实践。你需要识别数据源、构建数据管道、清理和准备数据、识别数据中的潜在信号，并衡量你的结果。那些认真对待人工智能的组织，历来都擅长将获取和管理数据作为一项战略资产。


    随着企业内部和外部产生和分析的数据量不断增加，企业正面临一个日益严重的问题——被淹没在数据、分析、仪表盘和数据门户的海洋中。“信息过载”或“报告太多，洞察太少”等说法变得越来越普遍。数据驱动，作为迈向人工智能的垫脚石，真正意味着企业和员工做出的所有决策和行动，都是基于使用最真实、最准确的数据，并且有一套定义明确的方法，对这些数据应用科学分析，从而得出最能代表实际情况和背景的决策。


    实现这一战略愿景需要从根本上改变解决问题的思维方式。这与其说是让技术发挥作用，不如说是要清醒地意识到你如何利用（或不利用）手头的工具（数据和算法）。你必须提出问题，而不是维持现状；我们姑且称之为“数据驱动”战略，这是有效人工智能战略的先决条件。

    '
- fmt: '### Prerequisite to AI Strategy: Data-Driven Strategy


    Imagine adopting a strategy that provides notifications and recommendations to
    every employee irrespective of cadre and role, to carry out the tasks assigned
    to them optimally so that they not only achieve their individual goals but also
    contribute to the overall goal of the company. Imagine that these notifications
    and recommendations are provided to them at the right times through the right
    channels in a precise and prescribed way. The result?


    Employees would become more productive and efficient, get more things done with
    less effort, get closer to customers, get more time to improve products or services,
    and in general elevate the enterprise to become a high-performing data-driven
    enterprise.


    For the notifications and recommendations to become highly effective, they should
    be prescriptive in nature to cut down chances of ambiguity or dependencies and
    should have clear links to actions to be taken that result in measurable outcomes.
    This prescriptive intelligence, especially if it is based on the historical events-actions-outcomes
    paradigm, can result in dramatic improvement in the quality of work. It can also
    significantly influence and improve organizational productivity improvement metrics
    like `first-time-right`, `on-time-completion`, `customer satisfaction index`,
    `employee-productivity` as a percentage of revenue contribution, and many more.
    Is this possible?


    Designing these notifications and prescriptive recommendations requires deeper
    understanding of processes, workflows, and dependencies between systems, and a
    broader view of the roles employees play in executing the tasks. The key to the
    effectiveness of the prescriptive model is that each recommendation should be
    highly contextualized to the task as well as to the employee who is supposed to
    carry out the task.


    This is not a one-time effort. These notifications and recommendations need to
    be continuously monitored and measured for relevance and recall. Enough care should
    be also taken to calibrate the frequency of delivery of these options and recommendations.
    Overdelivery of notifications and recommendations will make employees build more
    dependency and expectations on these things. They will stop applying their judgment
    and in general won’t learn. Similarly, underdelivery of notifications and recommendations
    will cause huge bottlenecks in the overall functioning of the enterprise.


    What if business contexts change? Or if employees change roles?


    This is precisely why constant monitoring of the notifications and recommendations
    generation mechanisms is required. At a macro level, these notifications and recommendations
    need to be reflective of changing business contexts and priorities, for example;
    new markets business is entering into or M&A opportunities business is pursuing
    or a new line of products it is launching, etc. At the micro level, an employee’s
    responsibilities, job function, role, affiliations, and associations with specific
    groups or projects can change, causing both the notifications and recommendations
    to adapt to the changes.


    How would you develop these notifications and recommendations?


    Generating and delivering these notifications and recommendations can be achieved
    through several techniques: starting with `if-then-else` rules, heuristics, and
    embedding thresholds and alerts into every business process or through machine
    learning (ML) and artificial intelligence (AI).


    AI and ML learn from the data and process more signals than humanly possible,
    leading to notifications and recommendations that otherwise could not have been
    possible or would not have been delivered in an adaptive and optimal manner. The
    advantage of AI and ML over other techniques is that once trained, they become
    self-learning. They observe the impact of the actions triggered by the notifications
    and recommendations; in short they are not hard-coded. They analyze the “actions”
    carried out by employees and their associated impact to improve the prescriptiveness
    quality of the notifications and recommendations.


    Okay. How do you start?


    The obvious option is to start small and target your most troublesome processes
    (need not be the most complex processes), target activities that are repetitive
    by nature but involve lots of hand-offs, and target tasks that require validation
    activities that today you do manually. Starting small not only makes the data-driven
    strategy more successful, but also provides a proving ground so that you can progress
    to more advanced notifications and recommendations such as those enabled through
    AI and ML. Over a period of time, progressively, these notifications and recommendations
    will mature, automated, prescriptive, and intelligent.


    ### Staying Clear of Biases


    AI models learn from data. By learning, we mean applying statistical and mathematical
    models to lots of known data so that you can arrive at a mathematical formula
    representing the behavior of that data set. When you apply the mathematical formula
    to run on a different set of data, one it has not seen before, it should correctly
    figure out the behavior of the unknown data set. It is the same as you experimenting
    on known things to find a pattern and then you apply the knowledge to unknown
    things to determine if your pattern matching is correct.


    This learning process is vital to the success of your AI model. Many things can
    go wrong. If you get 100% accuracy on training data, chances are good that your
    model will perform terribly on real-world data. This is known as `overfitting`.
    On the other hand, if you don’t decent accuracy on your training data, it will
    never be able to perform well on real-world data. This is known as `underfitting`.
    Too bad.


    There are no hard and fast rules around where your model should lie in the spectrum
    of `underfitting` to `overfitting`. It is contextual to the problem you are solving.
    Some applications need a lot more accuracy than others; for example, you would
    not accept a self-driving car that is 99% accurate. Whereas you might be very
    happy with product recommendations that are accurate 60% of the time.


    As AI becomes increasingly part and parcel of our lives, it is essential that
    we question how and why the AI recommended what it recommended. Most AI solutions
    are “black box,” meaning the entire decision-making process is hidden (why did
    my GPS reroute me?). Hence, transparency and impartiality in AI is essential to
    building trust. Biased data and biased algorithms lead to biased predictions.


    How exactly does bias impact the algorithms?


    #### Data-Driven Bias


    For any machine that learns from data, the output is heavily dependent on the
    quality of the data it used to learn. This is not a new realization. If the training
    data set itself is skewed, the result will be equally so.


    Most recently, this kind of bias showed up in Nikon’s face recognition AI solution.
    It started popping up alerts as “did somebody blink?” when taking pictures of
    smiling Asian faces. A clear case of AI solution learning from skewed example
    sets, certainly highlighting the problems that can arise when we do not pay attention
    to the biases in the data.


    #### Bias Through Interaction


    There are AI solutions like chatbots that learn through interaction. The idea
    is fairly simple. You interact with the machine and machine in turn learns from
    you to form the basis of subsequent responses. Microsoft’s Tay, a Twitter-based
    chatbot, was designed to learn from its interactions with users. Unfortunately,
    Tay was exposed to a user community that used racist and misogynistic statements.
    As a consequence, within 24 hours Tay became a fairly aggressive racist and was
    forced to be taken down.'
  raw: '### Prerequisite to AI Strategy: Data-Driven Strategy


    Imagine adopting a strategy that provides notifications and recommendations to
    every employee irrespective of cadre and role, to carry out the tasks assigned
    to them optimally so that they not only achieve their individual goals but also
    contribute to the overall goal of the company. Imagine that these notifications
    and recommendations are provided to them at the right times through the right
    channels in a precise and prescribed way. The result?


    Employees would become more productive and efficient, get more things done with
    less effort, get closer to customers, get more time to improve products or services,
    and in general elevate the enterprise to become a high-performing data-driven
    enterprise.


    For the notifications and recommendations to become highly effective, they should
    be prescriptive in nature to cut down chances of ambiguity or dependencies and
    should have clear links to actions to be taken that result in measurable outcomes.
    This prescriptive intelligence, especially if it is based on the historical events-actions-outcomes
    paradigm, can result in dramatic improvement in the quality of work. It can also
    significantly influence and improve organizational productivity improvement metrics
    like first-time-right, on-time-completion, customer satisfaction index, employee-productivity
    as a percentage of revenue contribution, and many more. Is this possible?


    Designing these notifications and prescriptive recommendations requires deeper
    understanding of processes, workflows, and dependencies between systems, and a
    broader view of the roles employees play in executing the tasks. The key to the
    effectiveness of the prescriptive model is that each recommendation should be
    highly contextualized to the task as well as to the employee who is supposed to
    carry out the task.


    This is not a one-time effort . These notifications and recommendations need to
    be continuously monitored and measured for relevance and recall. Enough care should
    be also taken to calibrate the frequency of delivery of these options and recommendations.
    Overdelivery of notifications and recommendations will make employees build more
    dependency and expectations on these things. They will stop applying their judgment
    and in general won’t learn. Similarly, underdelivery of notifications and recommendations
    will cause huge bottlenecks in the overall functioning of the enterprise.


    What if business contexts change? Or if employees change roles?


    This is precisely why constant monitoring of the notifications and recommendations
    generation mechanisms is required. At a macro level, these notifications and recommendations
    need to be reflective of changing business contexts and priorities, for example;
    new markets business is entering into or M&A opportunities business is pursuing
    or a new line of products it is launching, etc. At the micro level, an employee’s
    responsibilities, job function, role, affiliations, and associations with specific
    groups or projects can change, causing both the notifications and recommendations
    to adapt to the changes.


    How would you develop these notifications and recommendations?


    Generating and delivering these notifications and recommendations can be achieved
    through several techniques: starting with if-then-else rules, heuristics, and
    embedding thresholds and alerts into every business process or through machine
    learning (ML) and artificial intelligence (AI).


    AI and ML learn from the data and process more signals than humanly possible,
    leading to notifications and recommendations that otherwise could not have been
    possible or would not have been delivered in an adaptive and optimal manner. The
    advantage of AI and ML over other techniques is that once trained, they become
    self-learning. They observe the impact of the actions triggered by the notifications
    and recommendations; in short they are not hard-coded. They analyze the “actions”
    carried out by employees and their associated impact to improve the prescriptiveness
    quality of the notifications and recommendations.


