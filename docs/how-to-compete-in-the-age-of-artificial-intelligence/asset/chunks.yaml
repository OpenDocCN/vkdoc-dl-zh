  trans: '

    # 9—无人机


    你可能对无人驾驶飞行器并不陌生。多年来，它们一直被军方使用。近年来，无人机也已从军事领域转向民用领域。


    让我们探讨一些无人机如何运用人工智能的例子。


    - **拯救生命**：代尔夫特理工大学（荷兰世界领先的无人机研究中心之一）的一位工程师开始研究无人机能否比救护车更快地到达心脏病发作患者身边。


    通过与阿姆斯特丹的急救服务合作，亚历克·莫蒙特^(⁴) 确定，心脏骤停呼叫的典型响应时间约为 10 分钟。莫蒙特制造了一款配备 DIY 除颤器的无人机原型，目标是让它在六分钟内到达。莫蒙特的愿景是让无人机成为更广泛的紧急服务响应团队的一部分，目睹心脏病发作的人可以拨打
    112（相当于美国的 911 或英国的 999），接线员会派遣一架无人机。通过无人机上的双向视频连接，医护人员可以指导目击者完成使用除颤器的必要步骤。


    可以明显看出，在农村地区或难以到达的地点拥有这种技术具有明显的优势。


    - **悬停相机**：Lily Camera^(⁵) 悬停在空中，由人工智能驱动。这款自动飞行相机仅重 238 克，便于携带。它就像拥有一个属于自己的自动飞行私人摄影师。一旦升空，无人机会自动找到并跟随你（它的主人），同时从一个全新的角度记录你的日常生活。这一切都得益于先进的人工智能面部识别算法。


    在撰写本书时，尽管 Lily 相机是一款备受炒作且创新的 AI 产品，但它也经历了一段艰难时期。


    - **物流**：2016 年 12 月，一位名叫理查德·巴恩斯的英国农民收到了在亚马逊上订购的一袋爆米花和一个亚马逊 Fire TV Stick。


    这次配送有何不同？从下单到货物送达仅用了 13 分钟，并且是通过使用自主无人机完成的！


    # 10—文本分析与自然语言处理


    自然语言处理（NLP）帮助机器理解人类语言。NLP 允许人类用自然语言与机器交流。让我们探讨一些文本分析和 NLP 的例子。


    **客户评论与情感分析**：消费者经常对他们购买的具体产品或服务发表评论或评价。这类非结构化数据需要情感分析和词性标注等 AI 技术来从中提取意义，以便企业了解消费者对其产品、品牌或服务的感受。


    **广告技术**：你是否曾在亚马逊上浏览过产品，然后不久就在 Facebook 或 Twitter 信息流中看到类似产品被展示？


    通过追踪你喜欢什么、浏览过什么以及你发布和分享的评论，机器学习可以以合理的准确度将营销创意内容投放到你在社交渠道的信息流中，从而提高企业的转化率。


    广告技术是一个利润丰厚的领域，像 Twitter 这样的公司已经推出了开发者计划，以鼓励开发基于 AI 的软件来推动在线销售。


    定义 AI 用例所需的最重要因素是**数据和算法**。没有海量的高质量数据，就不可能开发出解决现实世界问题的杀手级 AI 解决方案。AI 解决方案的性能和实用性在很大程度上取决于数据的数量和质量。AI
    用例需要仔细考虑数据来源。（这包括企业业务数据、合作伙伴生态系统相关数据、外部数据如社交网络、天气状况、公开可用数据、政府开放数据、人口普查数据以及其他第三方策划的数据源。）


    虽然这不是详尽的数据源列表，但以下列表是解决特定 AI 问题所需的不同类型数据的高级概览：


    - 呼叫中心录音和聊天日志可以被挖掘，以获取内容和数据关系以及问题的答案。

    - 流式传感器数据可以与历史维护记录相关联，搜索日志可以被挖掘以获取用例和用户问题。

    - 客户账户数据和购买历史可以被处理，以寻找买家之间的相似性并预测对优惠的响应。

    - 电子邮件响应指标可以与优惠的文本内容一起处理，以找到买家细分群体。

    - 产品目录和数据表是属性和属性值的来源。

    - 公共参考资料可用于程序、工具清单和产品关联。

    - YouTube 视频内容的音频轨道可以转换为文本，并挖掘产品关联。

    - 用户网站行为可以与优惠和动态内容相关联。

    - 情感分析、用户生成内容、社交图谱数据以及其他外部数据源都可以被挖掘和重新组合，以产生知识和用户意图信号。


    毫无疑问，人工智能将继续影响我们个人和职业生活的方方面面。其中许多将以微妙的方式发生，例如提高应用程序的可用性和查找信息的便捷性。这些可能不一定看起来是由
    AI 驱动的，但事实确实如此。随着时间的推移，随着 AI 在连续体中成熟，我们将进入一个 AI 以“应用人类知识”形式出现的场景。


    因此，无论你从事什么行业，在组织中扮演什么角色，你都需要为 AI 打下坚实的基础。


    ## 结论


    你能承受不登上 AI 这趟列车吗？你不能。但不要盲目跳上这辆马车；在冒险之前先规划好你的方向。认为人工智能是一种能让一切变得更好的神奇成分的想法，将导致代价高昂的错误。理解你在做什么，为什么这么做，以及你面临的局限性。既包括
    AI 本身的局限性，也包括你所在组织的局限性。


    了解人工智能在商业领域的未来走向将非常有帮助。不幸的是，这也很难预测。为什么？每当我们面临前景或不确定性时，我们往往会回顾历史，并通过从历史推断未来来构建我们的思维地图。这种方法对
    AI 可能不太适用。


    一篇斯隆管理评论文章^(⁶) 概述了一些非常有趣的观点。在三个月内，约书亚·布劳德开发了一款 AI 应用程序，帮助人们赢得停车罚单纠纷。在最初的 21 个月里，该
    AI 应用程序取得了 64%的成功率。


    我们对此的自然反应可能是以下几种之一。再投入三个月，AI 应用程序可能会达到 100%的成功率。或者，如果你对成功率感到满意，你想扩展其适用性，将 AI 应用程序推广到其他地点。或者，如果这东西对停车罚单有效，那么我们可以无缝地将
    AI 应用程序扩展到解决其他问题，比如公用事业账单纠纷！


    尽管很吸引人，但现实是，将 AI 从一个领域的未来成功和适用性推断到另一个领域并非那么简单。为什么这对 AI 来说特别困难？要找到答案，首先我们需要熟悉三个原则。

    '
- fmt: '### The Pareto Principle


    Common sense tells us to invest efforts where the benefits are greater. The Pareto
    Principle says that 80% of the effects come from 20% of the causes. By focusing
    on a few scenarios (the 20%), AI can deliver significant values that address the
    majority of effects (∼80%).


    This is exactly what Joshua focused on. He found out that appeals courts dismissed
    most parking tickets for 12 main reasons. His AI application focused first on
    these 12 reasons and achieved a fair degree of success. Now, if we want the same
    AI application to look at more and more reasons, each new reason incorporated
    will require more and newer data sources, more training time to analyze rarer
    cases, and consequently may result in a diminishing contribution to the total
    number of successful appeals.


    The takeaway: You need to define the goals or outcomes for your AI initiative
    with a reality check. By putting in more effort or expanding the scope, you may
    achieve incremental benefits, but it will come at increased cost and increased
    complexity.


    ### The Ninety-Ninety Rule


    Tom Cargill of Bell Labs found an interesting pattern in the software development
    process, “The first 90% of the development effort accounts for the first 10% of
    the project timeline. The remaining 10% of the development effort accounts for
    the remaining 90% of the project timeline.” The underlying problem is that the
    developers first attempt to get the simple and medium complex features completed,
    which in most cases constitutes 90% of the scope. The remaining 10% of the scope
    is all about complex or highly complex features, which typically take much more
    development effort.


    AI solves problems by learning from data, no complex coding of rules. While this
    approach eased out the development effort, it created a larger dependency on the
    data related areas, mainly how exhaustive is your data sources so that your AI
    application can cover almost all the scenarios possible. In reality, even though
    we claim to have access to abundance of data, much of the data is full of noise
    and less of signals. Thus, while your best and concerted effort may result in
    solving 90% of frequently occurring scenarios, the effort required to solve the
    rarely occurring events will be much more harder. In the case of the parking ticket
    application, much less data is available to train the AI application to address
    the “long tail” of dismissal reasons.


    The takeaway: For AI in business, efforts required to solve an expanded scope
    may increase disproportionately compared to the earlier scope.


    ### Hofstadter’s Law


    Hofstadter’s Law says that time estimates for how long anything will take always
    fall short of the actual time required—even when the time allotment is increased
    to compensate for the human tendency to underestimate it.


    The pervasiveness of AI and its popularity as a term has led to rising expectations
    as a panacea to all sorts of problems, and therein lies the problem. First are
    the expectations around quick results, second are the expectations around tolerance.


    Given a clearly defined set of legal rules, Joshua was able to figure out how
    his AI application is going to solve the problem. Having this clarity upfront
    also meant that there was a certain amount of certainty around time, budget, and
    outcomes. In short, the problem statement and the expectations were clearly aligned.
    Not all problem statements follow the similar alignment. For instance, when Joshua
    extended his AI application to a more complex scenario (issues related to refugee
    asylum in UK), it took longer for him to develop the AI application.


    The takeaway: AI solutions do not follow traditional project management guidelines.
    You need to continuously experiment to achieve the desired results. Hence, learning
    fast, and continuously weighing cost vs. benefit and tolerance for error are the
    keys to developing AI applications.


    In this chapter, we covered several fundamental aspects of AI, including the maturity
    continuum of AI. The next chapter discusses how to reimagine a competitive advantage
    in the AI world, including the role of AI in the boardroom.


    # 2. Reimagining Competitive Advantage in the AI World


    AI as an area of research and fascination has been around for a long time. It’s
    a field that once disappointed its proponents in terms of progress and is now
    at the forefront of solving real-world problems. It’s rapidly entering into our
    daily lives as it expands into activities commonly performed by humans, often
    raising concerns about our very existence.


    As AI is beginning to realize its potential in achieving human-like capabilities,
    businesses are asking how they can harness AI to take advantage of the specific
    strengths of human and machine.


    Sensing, thinking, and acting have been key to human evolution, but then, when
    you say machines can do these things as well, it raises quite a lot of eyebrows.
    Humans tend to exhibit heightened capabilities in general intelligence (we call
    it *fast parallel processing and pattern recognition*), whereas they tend to slow
    down when it comes to logical reasoning (we call this *sequential processing*),
    owing to careful evaluation of implications/rewards. On the other hand, computers/machines
    are becoming good at pattern recognition in narrow fields (called *narrow intelligence*),
    yet they are superfast at logical reasoning provided there are clearly defined
    inputs and expected outputs.


    Based on the characteristics it exhibits and the contours of interaction boundaries
    as well as its limitations, AI can be placed into four categories, discussed in
    the following sections.


    ## The Sense-and-Respond Machines


    The most basic AI systems are purely reactive; they are designed to sense an event
    and programmed to provide a pre-determined response. These basic AI systems neither
    have the ability to understand what led to the event, nor do they have the ability
    to form memories or use past experiences to make informed decisions. Deep Blue
    (IBM’s chess-playing supercomputer), which beat international grandmaster Garry
    Kasparov in the late 1990s, is the perfect example of this type of machine.


    Deep Blue was designed to sense the pieces on a chess board and determine what
    move its opponent is playing. Based on the opponent’s move, it was programmed
    to respond with the most optimal move from among the various possibilities. However,
    apart from having access to a huge library of chess moves and rules, it didn’t
    have any concept of the past, nor any memory of what moves were made before. It
    was designed and programmed to sense the present moment and respond with an appropriate
    move.


    Similarly, Google’s AlphaGo (based on neural network techniques), which has beaten
    top human Go experts, uses a much more sophisticated analysis method than Deep
    Blue’s, but it still can’t evaluate all potential future moves. By applying neural
    networks and sophisticated algorithms, these machines have progressively become
    better at playing specific games and beating human experts at their own games,
    but they aren’t adaptive to other situations easily, whereas humans are. In other
    words, these machines can’t function beyond the specific tasks they’re trained
    to work on and can be easily fooled.


    They can’t adapt to changing scenarios (if you change the rules of the game, they
    will stop working and need to be reprogrammed). Instead, these machines will behave
    exactly the same way every time they encounter the same situation. Actually, this
    behavior of being consistent is their strength in a different context. It brings
    about a heightened trust quotient—consider that you would want your autonomous
    car to be a reliable driver all the time, every time.'
