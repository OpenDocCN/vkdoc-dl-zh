- fmt: '# 9—Drones


    You’re probably familiar with pilotless drones. They’ve been used by the military
    for years now. In recent years, drones have also made the switch from the military
    world to the civilian world.


    Let’s explore some examples of how drones are using artificial intelligence.


    - **Life saving**: An engineer at the Technical University of Delft, one of the
    world’s leading drone research hubs in the Netherlands, started to investigate
    if drones could reach a heart attack patient faster than an ambulance.


    By working with ambulance services in Amsterdam, Alec Momont^([⁴](#fn4)) established
    that the typical response time for a cardiac arrest call is approximately 10 minutes.
    Momont built a drone prototype that ships with a DIY defibrillator and is aiming
    to get there in six minutes. Momont’s vision is for drones to be part of a wider
    emergency services response team and that someone witnessing a heart attack could
    call 112 (the equivalent of 911 in the U.S. or 999 in the UK) and the call handler
    would dispatch a drone. Using a two-way video connected to the drone, a medic
    could talk the witness through the necessary steps of using the defibrillator.


    One can see the obvious advantage to having such technology in rural areas or
    difficult-to-reach locations.


    - **Hover camera**: Lily Camera^([⁵](#fn5)) hovers in the air and is powered by
    artificial intelligence. Weighing only 238 grams, the self-flying camera can be
    carried around. It’s like having your own self-flying personal photographer. Once
    in the air, the drone automatically finds and follows you (its owner), while recording
    your everyday life from a completely new angle. It’s all possible thanks to advanced
    artificial intelligence facial recognition algorithms.


    At the time of writing this book, even though Lily camera was a much-hyped and
    innovative AI offering, it has gone through rough weather.


    - **Logistics**: In December, 2016, a British farmer named Richard Barnes received
    an order placed on Amazon for a bag of popcorn and an Amazon Fire TV Stick.


    What was different about this delivery? It only took 13 minutes for the goods
    to be delivered from the time of order and was fulfilled by using an autonomous
    drone!


    # 10—Text Analytics and NLP


    Natural Language Processing (NLP) helps a machine make sense of human language.
    NLP allows humans to communicate with the machine in natural language. Let’s explore
    some examples of text analytics and NLP.


    **Customer Reviews and Sentiment Analysis**: Consumers often leave comments or
    reviews on specific products or services that they purchase. This sort of unstructured
    data requires AI technologies such as sentiment analysis and POS Tagging (Part
    of Speech) to make some sense out of it so that business can find out how consumers
    feel about their product, brand, or service.


    **AdTech**: Have you ever looked at products in Amazon and then moments later
    noticed similar products being displayed in your Facebook or Twitter feed?


    By tracking what you like and what you’ve viewed and the comments you post and
    share, machine learning can, with reasonable accuracy, place marketing creatives
    in your newsfeed on social channels, thereby improving conversion rates for business.


    AdTech is such a lucrative area that companies such as Twitter have launched developer
    initiatives to encourage the development of AI-based software to drive online
    sales.


    The most important ingredient necessary to define an AI use case is **data and
    algorithms**. Without vast amounts of high-quantity data, it is impossible to
    develop a killer AI solution that solves real-world problems. The performance
    and usefulness of an AI solution is heavily dependent on the quantity and quality
    of the data. AI use cases require careful considerations of the data sources.
    (This includes enterprise business data, partner ecosystem related data, external
    data such as social networks, weather conditions, publicly available data, open
    government data, census data, and other third-party curated data sources.)


    Although not an exhaustive list of data sources, the following list is a high-level
    view of different kinds of data required to solve AI specific problems:


    - Call center recordings and chat logs can be mined for content and data relationships
    as well as for answers to questions.

    - Streaming sensor data can be correlated with historical maintenance records,
    and search logs can be mined for use cases and user problems.

    - Customer account data and purchase history can be processed to look for similarities
    in buyers and predict responses to offers.

    - Email response metrics can be processed with text content of offers to find
    buyer segments.

    - Product catalogues and data sheets are sources of attributes and attribute values.

    - Public references can be used for procedures, tool lists, and product associations.

    - YouTube video content audio tracks can be converted to text and mined for product
    associations.

    - User website behaviors can be correlated with offers and dynamic content.

    - Sentiment analysis, user-generated content, social graph data, and other external
    data sources can all be mined and recombined to yield knowledge and user-intent
    signals.


    AI will no doubt continue to impact every aspect of our personal and professional
    lives. Much of this will occur in subtle ways, such as improved usability of applications
    and ease of finding information. These may not necessarily give an appearance
    of powered by AI, but they are. Over time, as AI matures in the continuum, we
    will get into a scenario where AI will take the form of “applied human knowledge”.


    Hence, no matter what business you are in and what role you play in your organization,
    you need to develop strong foundations for AI.


    ## Conclusion


    Can you afford not to get on the AI train? You can’t. But don’t jump on the wagon
    blindly; map out where you’re headed before taking the plunge. The notion that
    artificial intelligence is a magic ingredient that makes all things better will
    lead to costly mistakes. Understand what you’re doing, why you’re doing it, and
    the limitations you face. Both the limitations of AI itself and the limitations
    of your organization.


    It would be very, very helpful to know what the future holds for artificial intelligence
    in business. Unfortunately, it is also very hard to predict. Why? Whenever we
    are faced with a prospect or uncertainty, we tend to look back into history and
    develop our mental map by extrapolating from there to the future. This approach
    for AI may not work well.


    A Sloan review article^([⁶](#fn6)) outlines some very interesting perspectives.
    In three months, Joshua Browder developed an AI application to help people win
    disputes over parking tickets. In the first 21 months, the AI application registered
    a 64% success rate.


    Our natural reaction to this might be any of the following. Put in another three
    months and the AI application might deliver 100% success rate. Or if you are happy
    with the success rate, you want to expand the applicability and take the AI application
    to other locations. Or if this thing works for parking tickets, then we can seamlessly
    extend the AI application to solve other problems like utility bills disputes!


    Although appealing, the reality is that extrapolating the future success and applicability
    of AI from one field to another field is not that straightforward. Why is this
    particularly difficult for AI? To get to the answer, first we need to familiarize
    ourselves with three principles.'
