    \ in your industry? At which point in the value chain are the customers getting\
    \ frustrated? What additional data or which events, if made responsive, will significantly\
    \ improve customer experience? Taking these data points, you need to develop your\
    \ own SWOT analysis and business cases for your IoT initiatives.\n\n### Evaluate\
    \ Customer Needs\n\nFor any business, it is crucial to get as many details about\
    \ customer needs (explicit or implicit) as you can. In case of IoT, being an unchartered\
    \ territory and novel, you need to go beyond the typical customer survey type\
    \ of approaches and adopt a wide range of techniques, such as customer personas\
    \ and customer journeys, to develop a roadmap of offerings and services that will\
    \ be well accepted in the market.\n\n### Conduct Value-Chain Analysis and Profitability\
    \ Analysis\n\nThe next step is to create a value-chain analysis and profitability\
    \ analysis of your industry. Instead of taking a narrow constraints based view\
    \ of your business, you should take a broad view of the industry. In some cases,\
    \ this may result in diversifying to create a completely new line of business,\
    \ but that is the key to come up with a competitive edge and differentiations.\n\
    \n### Collaborate to Partner\n\nIt would be foolish to think and act as if you\
    \ will have the wherewithal to do everything on your own. The technology is evolving\
    \ at a rapid pace, customer needs are changing every day, and the market trends\
    \ have significant implications. It is important to understand the solutions providers\
    \ in your market and monitor their progress and challenges. This map will provide\
    \ you with enough clarity to collaborate and partner in scenarios where you can\
    \ gain speed to market with less cost."
  trans: "\n# 你的万物智联战略是什么？\n\n涉及人工智能与物联网融合的应用场景正在飞速发展，在很短的时间内，几乎所有“哑巴”设备都将变得智能化。\n\
    \n以下是构建万物智联架构时需要考虑的几个要点：\n\n-   将会有众多物联网设备组成一个整体，它们需要在组织内部进行通信和协同工作。根据产品和服务类型的不同，这个整体可能服务于一个人（通过可穿戴设备或个人设备）、一栋房屋、一辆汽车、一个项目或一座工厂。\n\
    -   设备的数量和制造商的种类将会激增。因此，将不存在实现机器间通信的标准方式。因此，选择合适的云合作伙伴至关重要，这样设备才能通过“机器-云-机器”的迂回方式协同工作。同时，也需要建立设备的“API\
    \ 化”。\n-   为了充分发挥预测和自主决策的潜力，需要整合来自物联网、其他企业数据源以及外部数据（如天气模式）的统一视图。\n\n同样，以下是识别物联网、云和人工智能创新机会时需要考虑的几个要点：\n\
    \n-   **客户体验**：通过重新构想客户如何使用产品或服务，以及如何为客户创造、分发、消费和服务最终价值，来识别客户体验方面可能的创新。是否存在通过收集新数据、融入现有流程数据并创建新流程和合作伙伴关系来改善客户旅程的机会？\n\
    -   **产品与服务**：通过利用物联网、云和人工智能的组合（结合基础设施、流程、政策和人员），识别产品为用户提供更多价值的潜在机会。设想为产品增加新功能，或增强现有功能以使其表现更佳。这更多关乎功能和形态因素，而非使能技术。\n\
    \n    在服务方面，识别服务以及客户最终消费方式的机会，即服务如何、是什么以及何时被提供和消费。设想一下，如果产品转变为服务会怎样。\n\n-   **使能技术**：使能技术的创新不一定特定于某个产品或服务，而更多是关于采用技术来实现重新构想的客户体验、产品、服务或商业模式。在这里，需要仔细评估物联网、人工智能和云的组合，以及如何针对你的特定业务需求进行采用。\n\
    -   **商业模式**：通过整合所有要素，识别增强现有商业模式的机会，以便为现有客户（或全新的客户群）创造和传递价值。设想通过采用和启用物联网、云和人工智能的技术组合，创造新的或增强的产品和服务，从而带来全新的客户体验。\n\
    \n图 7-4 展示了跨行业的 AI 与物联网融合用例。\n\n![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig4_HTML.png](img/467925_1_En_7_Fig4_HTML.png)\n\
    \n图 7-4\n\n物联网分析价值链\n\n以下是一些更具体的行业示例。\n\n-   **飞机**：对于航空公司而言，零停机时间意味着更高的收入。如今，飞机发动机制造商正在安装数百万个传感器，其主要目标不仅是了解飞机每次飞行的性能，还要能够预测发动机的磨损情况。结果如何？更高的安全性和更少的停机时间。\n\
    -   **石油钻井平台**：用于钻探的机器属于资本密集型，因此石油公司必须不断改善其运营成本。当这些机器发生故障时，公司会遭受巨大损失，但让昂贵的机器处于待命状态在经济上并不可行。解决方案是什么？让机器变得智能，以便可以持续监控和分析其利用率、性能和状况。预测性维护和基于状态的监控显著降低了运营成本。\n\
    -   **制造业**：制造商正在投资建设智能工厂和车间，以便其机械和装配线能够在未来打造出自动化工厂。\n\n虽然一方面，物联网、人工智能和云的融合为企业在\
    \ B2B 和 B2B2C 领域带来了更强的价值主张，但企业也需要意识到若干挑战，尤其是在管理数据的体量、速度和多样性方面。每一次颠覆都会创造前所未有的新机遇和市场；然而，与其贸然投入，你需要评估哪些与你的行业相关，并定义你自己的万物智联战略。\n\
    \n## 制定万物智联战略的最佳实践\n\n### 制定并阐明你自己的价值主张\n\n物联网和人工智能的结合带来了广泛的变革性机遇。然而，在屈服于“给所有东西装上传感器并期待奇迹发生”的诱惑之前，你需要仔细评估用例。物联网作为一项技术仍在成熟过程中；连接问题时有发生，传感器可能因恶劣天气条件而损坏或故障。它们也可能因电源波动而停止响应，因此你的物联网计划的成功取决于你对市场空白、可用互补技术以及你所要解决的问题的评估有多好。\n\
    \n你需要深入了解你所在行业的宏观趋势和竞争力量。分析师们对于物联网在你行业的应用有何看法？在价值链的哪个环节，客户感到沮丧？哪些额外的数据或事件，如果能够响应，将显著改善客户体验？基于这些数据点，你需要为你的物联网计划制定自己的\
    \ SWOT 分析和商业案例。\n\n### 评估客户需求\n\n对于任何企业来说，尽可能多地获取客户需求（显性或隐性）的细节至关重要。对于物联网这个尚未被充分探索的新领域，你需要超越典型的客户调查方法，采用更广泛的技术，例如客户画像和客户旅程，来制定一套能被市场广泛接受的产品和服务路线图。\n\
    \n### 进行价值链分析和盈利能力分析\n\n下一步是对你的行业进行价值链分析和盈利能力分析。与其从狭隘的约束角度看待你的业务，不如从更广阔的行业视角出发。在某些情况下，这可能会导致业务多元化，创造全新的业务线，但这正是获得竞争优势和差异化的关键。\n\
    \n### 合作共赢\n\n如果你认为并表现得好像自己有能力包办一切，那将是愚蠢的。技术正在飞速发展，客户需求日新月异，市场趋势影响深远。了解你所在市场的解决方案提供商，并监控他们的进展和挑战，这一点非常重要。这张“地图”将为你提供足够的清晰度，以便在能够以更低成本更快进入市场的情况下进行合作与结盟。\n"
- fmt: '### Evaluate the Technology and Do a Fit-Gap Analysis


    There are many vendors and solutions in the market. Some are very narrow but do
    the job very well, some are broad and offer greater flexibility to try new things.
    It is important to understand all these offerings and develop a fit-gap analysis
    specific to your goals and objectives. If your organization is new to the field
    of connected devices, your success largely depends on how quickly you can launch
    pilots and establish ROIs for business functions.


    `IoT`, `AI`, and the cloud are fast-evolving technologies, hence your technology
    architecture needs to be flexible and componentized. In the overall architecture,
    the components may seem to be low in maturity today, but tomorrow they will attain
    sufficient maturity or some components may completely become outdated. Hence,
    it is important to keep an eye on the technology trends, including how fast they
    are evolving, what other complementary technologies are coming into play, and
    how cost-effective they are.


    We have listed a few important areas you need to focus to develop a robust technology
    roadmap covering data, analytics, recommendations, performance, and overall cost-effectiveness.


    For example, under "Insights," it’s important to answer questions like the following:


    - What data would give you clear views about your product usage and performance
    tracking?

    - What data would be valuable for your business functions?

    - What data would enrich the customer experience?

    - What additional data do you need to collect to deliver these insights?


    Analytics questions may include the following:


    - What insights, if embedded into your products/offerings/processes, will make
    your company more responsive to customers or market scenarios?

    - How complex will the "math" be? Do you have to buy specialized packages like
    optimization libraries or deep learning libraries?

    - How would you manage and administer these insights?


    Performance questions might include these:


    - What is the data processing performance criteria?

    - What are the consequences of not doing data processing at the edge (versus moving
    everything to the cloud)? If the cloud is the answer, would you lose a few key
    actions?

    - How real time would you like your offering to be?


    Operating requirements questions might include these:


    - What operating conditions (temperature, moisture, pressure, access, and vibration)
    will you focus on?

    - What are the different scenarios you will enable your security and access control
    for? The rest you will leave to customer-specific asks.


    As you build your technology roadmap, you need to put on a pragmatic lens. Simply
    creating an intelligent solution will not bring you success, especially if the
    cost of building such a solution outweighs the commercial and implementational
    easiness aspects.


    ### Build Your Intelligence of Things Roadmap


    Once you’ve done all of the mentioned activities, you will have all the desired
    components to develop your intelligence of things roadmap (see Figure [7-5](#467925_1_En_7_Chapter.xhtml#Fig5)).
    The roadmap will help you plan and communicate to the stakeholders within your
    company, your partners, and employees the timelines, initiatives, pilots, changes,
    and expected outcomes.


    ![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig5_HTML.png](images/467925_1_En_7_Chapter/467925_1_En_7_Fig5_HTML.png)


    Figure 7-5 Multi-layered intelligence of things architecture


    One of the best ways to develop your roadmap is to embrace Amazon’s flywheel strategy.
    Start with a big vision, not necessarily a big capital intensive and complex bet.
    You need to start small, focusing on pilots that are easy to experiment to test
    your thinking. This can further evolve to create a minimally viable product to
    launch early in the market and gain the early movers advantage or you can identify
    customers who are willing to co-innovate with you in a profit-sharing model.


    There are three methods that can help you articulate your roadmap to your business
    stakeholders, employees, and customers:


    - **The future press release**: Start with the end in mind and develop a press
    release for your product or service offering. Since this is going to be a market
    facing announcement, you will be forced to articulate the uniqueness of your offering,
    which will in turn help you to solidify your vision.

    - **An FAQ for your plan**: Come up with the potential questions you may face
    from the market, investors, employees, business stakeholders, and partners. The
    frequently asked questions (FAQ) and corresponding answers will help you socialize
    your offering in a much more acceptable way than a black box that people need
    to figure out by themselves.

    - **A user manual**: Successful companies believe in a crowdsourcing model, wherein
    the users can create more and more utilities using your offering. This helps in
    significantly gaining market share in less time. Develop a user manual, DIY videos,
    `API`s, and tutorials for end users to build smart apps.


    ## Conclusion


    What does the advancement of new technologies like `AI`, `IoT`, and the cloud
    mean for the vast number of people employed in industrial manufacturing setups?


    `AI`, `IoT`, the cloud, and the other emerging fourth industrial revolution technologies
    are here to stay. They are changing forever the way things are designed, manufactured,
    and delivered. These technologies are making everything smart in the entire manufacturing
    lifecycle (buy, make, sell, and service) with additional complexities of managing
    smart devices, smart agents, and in some cases completely autonomous processes.


    The key question is, will the role of managers, technicians, machine operators,
    and factory floor workers change dramatically? If yes, companies need to find
    ways to monitor and track activities in which more and more human-machine collaborations
    will become the norm to executing projects.


    In this chapter, we discussed the art of possible by combining the capabilities
    of `IoT` and `AI` to improve our way of life as well as transform industrial sectors.
    In the next chapter, we discuss how `AI` can improve and transform IT operations.'
