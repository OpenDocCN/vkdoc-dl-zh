  trans: '

    #### 评估内部能力


    在了解了 AI 解决方案的采用场景后，你需要向内审视，对自身内部能力进行批判性评估。鉴于 AI 的新颖性和固有的复杂性，了解内部流程、技术架构和员工技能的成熟度至关重要。对于任何
    AI 解决方案而言，关键要素包括计算能力、算法、数据（海量数据）以及技能娴熟的员工。如果你的公司历史上并未处于技术前沿，未采用敏捷开发流程，未注重数据驱动文化，也未鼓励创新，那么即便你偶然发现了极具突破性的想法，也极有可能难以将这些想法变为现实。


    因此，必须明确每项 AI 计划的预期目标，根据投资回报率和交付准备度对 AI 计划进行优先级排序，制定路线图，并选择切入点。


    你如何在公司内部启动 AI 转型？需要持续建立并关注哪些基础要素？


    #### 启动 AI 转型计划


    我们常常被 AI 在改变公司核心商业模式方面的变革作用所吸引。然而，要让整个公司踏上 AI 转型之旅，还需要另一样东西——公司工作方式的文化转变。组织需要成为学习型公司，不畏惧实验。


    我们认为，要让组织为 AI 做好准备，需要从三个宏观层面采取行动。


    ##### 建立赞助与治理机制


    从企业 AI 准备度的角度来看，AI 与其说是技术革新，不如说是文化转变，业务领导层和技术领导层都扮演着同等重要的角色。技术领导层需要阐明如何利用 AI 解决业务问题，而业务领导层则需要构想如何采用
    AI 解决方案来实现业务成果。这些绝非易事！


    首先，你需要建立一个包含 AI 委员会的组织模型，该委员会积极参与变革管理流程，并建立敏捷的工作方式。你必须从争取高管赞助开始，并明确章程、角色与职责、决策协议、升级流程，以及与特定业务目标和流程的关联。你组织中的一些领导者很可能会选择观望（尤其是那些对
    AI 影响持怀疑态度的人）。你需要与这些领导者进行更多互动，让他们参与进来，这意味着即使存在高度不确定性也要进行投资。


    ##### 行动计划：实验、失败与学习


    AI 解决方案的核心在于快速实验——快速失败并学会即兴改进。鉴于 AI 解决方案的特性，基于传统开发方法论制定行动计划是愚蠢的。在 AI 的世界里，一切都在动态变化。你需要同时进行设计、开发、测试，将工作原型暴露给用户以获取体验反馈，并与云合作伙伴及其他生态系统参与者合作，在云端测试你的部署模型。


    你的计划还应与公司的整体业务战略保持一致，并应足够明确地说明高级领导层如何在日常业务中采用受 AI 影响的思维方式。保持灵活性并根据需要频繁调整计划方向尤为重要。在
    AI 的世界里，你从一个最终目标出发，最终却创造出许多不同可能性，这几乎是常态。


    ##### 投资并发展 AI 能力


    考虑到 AI 是一项新技术，你需要制定清晰的计划，说明如何构建所需的 AI 能力和技能，包括由数据科学家和数据工程师组成的 AI 团队，以及必要的基础设施和算法。


    你可以考虑从建立一个集中的 AI 卓越中心（CoE）开始，为各业务部门提供初始推动和支持。AI CoE 不仅应专注于与各业务职能紧密合作，以创建和增强 AI
    用例，还应建立技术路线图、标准和加速器，例如 AI 平台、用于概念验证开发和试点用例的沙箱、用于利用和重用他人构建的算法的算法市场、用于在企业各职能间利用和共享数据的数据目录，以及其他最佳实践，例如用于在企业内推广跨职能经验教训的
    AI 手册。


    AI CoE 最关键的任务是吸引并留住合适的 AI 人才。AI 人才不是单一维度的，而是不同技能的组合——创造性思维、探索未知的意愿、实验精神、阐述业务影响的能力、讲故事的能力，以及在数据、算法和云方面的技术实力。AI
    也带来了相当多的人才招聘和人才管理方面的挑战。吸引合适的人才，为他们提供茁壮成长的合适环境，留住他们，并保持他们高昂的积极性，绝非易事。这并非仅靠经理和人力资源专业人员就能完成的任务；组织的高级领导者需要持续参与、承担责任，并关注
    AI 人才库。


    鉴于 AI 技能的稀缺性，可以理解你最初可能不会选择建立内部专家团队；你可以与合作伙伴合作，在中央或业务部门内部设立创新实验室，以推动他们踏上创新和实验之旅。


    ### 如何定义 AI 用例


    几乎所有的 AI 用例都围绕三个基本原则：功能、训练数据和算法，以及最终用户需求。


    基于这三个原则，一个用例可以根据以下公式来描述：


    > *通过从（数据）中学习来提供（功能），从而满足（用户需求）*


    例如，Spotify 根据之前播放过的流派/艺术家（数据）推荐新的艺人和歌曲（功能），以便用户能够轻松快速地获取相关内容（需求）。


    首先，你必须确定*用户需求*。用户可以是内部用户，例如员工，也可以是外部用户，例如客户。例如，为员工提供处理各种 HR 政策相关查询的对话界面，满足的是组织内部的用户需求。如果你从事智能可穿戴设备制造业务，并提供围绕“保持健康”的附加增值服务和建议，那么你满足的是完全外部的用户需求。


    一个用户需求由多个*功能*组成。可能的功能范围可以从简单的推荐（辅助智能），到更复杂的如自动化业务流程中的决策（增强智能），再到更复杂的如注入恰到好处的、时机精准的、根据个人偏好定制的、且与你正在查看的内容高度相关的广告（自主智能）。


    以下部分将解释当今一些最流行的人工智能应用实例。这并非详尽无遗的列表。在所有这些例子中，你都会发现用户需求是通过使用数据和算法的特定功能来满足的。

    '
- fmt: '# Virtual Personal Assistants


    They take many forms and leverage various technologies such as voice recognition,
    text analysis, NLP, and NLG. Some even make decisions for you such as automatically
    scheduling meetings based on incoming emails!


    `Alexa` is a VPA made popular by Amazon. You use the wake word “Alexa” to start
    a conversation. As you start talking to `Alexa`, the machine will take your commands
    and start acting on it.


    Amazon offers an `Alexa Skills Kit` to develop voice-first experiences with `Alexa`.
    From interactive games to smart-home integrations and drone control, anyone can
    design and build for voice. No coding knowledge is required. These voice-first
    AI solutions run in the cloud, meaning there is no installation required from
    the end user perspective.


    # Video Games


    Advancement in AI has greatly influenced how video games are played nowadays.
    Technology has moved from the crude forms of arcade games to non-player-characters
    (or NPCs) modeling real-world scenarios.


    Consider the scenario that when an autonomous vehicle arrives at a stop sign,
    it must stop. Failing to do so could result in a human fatality. Part of the problem
    is that the image recognition algorithm must be able to recognize a stop sign.
    These signs can vary in their appearance due to low visibility, extreme weather
    conditions, paint peeling off, etc.


    While developing the video game GTA V, the city of Los Angeles was extensively
    researched. Around 250,000 photographs and many hours of video footage were captured.
    These photographs and footage served as a training data set for the image recognition
    algorithm to identify and respond to stop signs as if it were real life.


    # Smart Vehicles


    AI algorithms don’t suffer from fatigue. This is precisely why integrating AI
    into long haul trucking is an attractive value proposition for many. Companies
    such as Google, Uber, Apple, Volkswagen, and Mercedes are heavily investing in
    self-driving automobiles powered by artificial intelligence.


    # Consumer Analytics and Forecasting


    **Predictive shipping.** In 2013, Amazon patented “predictive stocking.” The idea
    behind this intelligent system is to reduce delivery times by predicting what
    consumers will want before they have even bought it.


    One example of the predictive shipping scenario: By observing historical buying
    patterns and determining the geographical locations based on ZIP codes, packages
    can be bundled together and shipped to a ZIP code-based warehouse or distribution
    center (even at the time of packaging and shipping one may not get the complete
    destination address). The AI in this case needs to exhibit a high degree of prediction
    accuracy so that there is no overstocking or understocking at the warehouse. Once
    the final destination is updated in the ordering system, the AI can then quickly
    get the last mile of delivery activities triggered.


    **Dynamic pricing.** Retail needs to learn very fast to process all available
    data (internal and external), gain useful insights, and become agile at decision
    making. Price adjustments made for the store’s inventory in seconds, in response
    to real-time demand, is much more effective than done manually with all the human
    mistakes. This is where AI comes into play, by providing an option to optimize
    not only prices, but also business strategy, costs, and manager efficacy.


    The number of variables that needs to be taken into account before setting price
    is very large: product seasonality, price elasticity, competitor prices, competitor
    markdowns and promotions, customer demand, retailer’s desired margin, etc. It’s
    nearly impossible to deal with thousands of products in real time without automated
    pricing algorithms.


    An example of a rules-based algorithm:


    > *If turnover KPIs are achieved then set the price equal to the competitor with
    the highest price. Otherwise, set the planned margin for the item.*


    This rules-based algorithm may appear simple. Here are two examples where rules
    can become more complex and nested:


    *   Identify product clusters and correlated customer clusters with identical
    sales patterns to apply differentiated pricing rules.

    *   A/B smart price testing allowing a retailer to measure pricing rule influences
    on performance and forecast gross margins.


    # Finance


    **Fraud detection.** Fraud detection has been rules-based for a long time. For
    example, a bank may create a rule that says something like this:


    > *“If the customer is purchasing a product in a different time zone than normally
    observed and the cost is greater than $1,500, do not allow a straight-through
    transaction even if it is authenticated.”*


    Rules like this, if not continuously updated, can be gamed by adopting a brute
    force approach, where criminals can try different combinations of location, lower
    monetary values, and so on. Through supervised machine-learning techniques, the
    algorithm can learn from new patterns of fraudulent transactions, in real time,
    by observing every single transaction.


    **Credit decisions.** To help banks make more informed credit decisions and become
    better at determining the lending risk, they need to look at attributes beyond
    the obvious ones used today. In addition, banks struggle with how to lend to people
    who don’t have enough credit history. Banks need to look at external data sets
    like social network, job profiles, social styles, etc., to determine additional
    attributes. Today’s consumer expects near instant decisions and AI can help drive
    them.


    # Chatbots


    Advancements in NLP have propelled chatbots beyond just a Q&A system so that they
    understand the semantic orientation of each word in a sentence, derive true meaning
    to create context and relevance of what a customer is talking about, and then
    engage in a meaningful conversation.


    Bank of America, one of the largest U.S. banks, uses a voice and text enabled
    chatbot called `Erica` to send customers notifications and help customers make
    better financial decisions.


    JPMorgan Chase uses a bot called `COIN` to analyze complex legal contracts faster
    and more efficiently than a human can.


    # Social Networking


    **Facebook**—With almost 2 billion active users on the platform sharing vast quantities
    of content consisting of text, images, and videos, Facebook has access to perhaps
    the largest data set on the planet. The largest data set is not the important
    thing; what Facebook does with it is the interesting part.


    Facebook extensively uses various AI algorithms to make sense of this diverse
    data and provide insights to its users. For example, as soon as you upload a photograph,
    Facebook automatically highlights faces and suggests friends to tag.


    **Snapchat**. Snapchat is another social networking platform that introduced “facial
    filters” to track facial movements and allow users to add digital masks that overlay
    their faces when moved. It uses AI technology, which was originally developed
    by a Ukrainian company called `Looksery` and uses machine learning to track facial
    movements in a video.


    # Real Estate


    Matching buyers to new properties within minutes of being shared online—almost
    all of us have experienced this. However, there is more to it than simply matching
    keywords.


    `Roof.AI` is using AI to automate tasks, generate leads, and integrate with Facebook
    messenger to revolutionize real estate activities.


    `Qvalue` is using AI technologies to provide a completely different experience
    of house-hunting. You choose the style of home you love and instantly you get
    a list of the very best homes available, sale rank-ordered based on the qualities
    you love the most.'
