  trans: '

    AI 技术具有变革性，需要新的领导技能才能在企业内部推广。变革管理绝对至关重要。AI 的颠覆性能力正给商业领袖和技术高管带来前所未有的压力，要求他们交付商业价值。在全企业范围内实施
    AI 所需的文化变革令人望而生畏。AI 转型之旅的关键驱动力不仅仅是技术，更在于聚焦于识别、支持并培育正确的能力，获取 AI 人才，并处理 AI 投资中相互竞争的优先事项。


    让 AI 在商业决策中发挥作用的好处有很多：


    - **更快的决策**：如今每家企业都是数字企业，因此商业场景的变化速度以及适应不断变化条件的能力，要求企业加快决策流程。例如，借助 AI 驱动的定价，企业可以根据需求或竞争市场情况动态调整产品价格，以提高利润率。


    - **更好地处理多重输入**：当人类需要评估众多因素并做出决策时，会处于劣势。相比之下，机器可以同时处理更多数据；它们能记住比人类多得多的信息，并能利用概率度量来推荐最佳决策。例如，如果你的企业正在管理供应链流程中的物流，那么考虑天气状况、车队就绪情况、物料就绪情况、当地社会活动、交通状况等各种因素就很重要。这一切都需要实时完成，以决定最优的路线方案。这不是人类能够理解的，但机器可以大规模做到。


    - **减少决策疲劳**：可以理解的是，如果要求我们在短时间内频繁做出多个决策，我们做出最有效判断的能力会迅速下降。相比之下，算法没有这种决策疲劳；它们每次都会输出完全相同的结果。有一个有趣的想法值得思考——为什么超市会在收银台摆放糖果？如果你在超市里花几个小时决定买什么、买多少、哪个产品更好、什么在打折等等，你的思维过程会处于超负荷运转状态。当你到达收银台时，你会因所有这些决策而筋疲力尽。这正是购物者在销售点渴望糖分补充的原因。


    鉴于 AI 的这些好处，CEO 们应该非常愿意将决策任务交给预测模型和算法，这似乎是显而易见的！但这并不完全正确，至少目前如此。为什么？


    有三个因素构成了障碍：


    - **问责制**：算法有其阴暗面；它们不透明，且结果缺乏解释。因此，即使商业领袖有动力拥抱 AI，他们也不确定算法是如何得出答案的！这很大程度上是一个信任问题，因此，人们普遍不愿接受
    AI 输出来做出关键决策。


    - **偏见**：目前，AI 解决方案是由人类准备的，因此人类偏见有可能潜入算法中。例如，你的 AI 算法被设计为专门筛选需要 STEM 技能（系统、工程、数学、技术）的工作简历，它总会优先考虑男性。为什么？一种普遍观念是，女性擅长与艺术、设计、创造力、同理心相关的技能，而男性擅长与逻辑推理、心智能力、解决问题和做困难事情相关的技能。算法偏见也可能由于未妥善整理的数据集而发生。如果数据本身偏向于某种推论，那么算法只会确认该推论。


    - **自尊心**：CEO 们是通过行政管理这条艰辛的道路，向他们的上级学习、磨练自己的判断力、并接受行业专家指导而成为领导者的。简而言之，成为 CEO 需要多年的学习和同样多的白发。现在，当他们突然不得不转向由
    AI 进行管理时，这就成了一个自尊心问题。

    '
- fmt: '# What Defines AI?


    In their book *Artificial Intelligence: A Modern Approach* (Pearson, 1995), Stuart
    Russell and Peter Norvig defined AI as “the designing and building of intelligent
    agents that receive percepts from the environment and take actions that affect
    that environment.” The most important part of this statement is the phrase “take
    actions.” AI infuses intelligence into machines to not only learn but also to
    respond on its own to events from the surrounding environments at large. To respond
    to these events, AI needs lots of observations (data points consisting of events
    and corresponding actions taken) to learn from them and consequently act.


    It is interesting to note that even though AI at a broad level is still a new
    technology, at the same time it is also going through a maturation. As soon as
    AI matures in one of its application areas, it gets relegated to mainstream and
    whatever is still maturing is branded as AI. For example, the initial experiments
    on AI revolved around recognizing handwriting and voices. However, with the availability
    of commercial systems that can decipher written text or understand human speech,
    these areas are no longer considered AI. Hence, arriving at a commonly agreeable
    definition of AI is tricky.


    Some of the popular stories around AI are about beating humans at games. While
    playing games, humans demonstrate quick decision making, strategizing, and learning.
    AI not only exhibits the same human traits while playing games against them, but
    also becomes better than humans. While beating the humans at their own game (thinking
    and learning) is no doubt a commendable job, extrapolating the AI achievement
    from gaming situations to higher order cognitive tasks is far fetching.


    First, these games have a prescribed set of rules of engagement and clear measurement
    of certain outcomes (e.g., win, loss, or tie). Second, these games are always
    played in an environment where the effect of actions is limited to participants
    within the system. Third, the implications of failure are no big deal; rather
    failure is always a fantastic learning opportunity for the AI so that it can be
    better trained, with no real consequences to participants outside the system.


    There are currently two main schools of thought on how to develop the learning
    and reasoning capabilities necessary for AI programs. In both, programs learn
    from experience—that is, the observations and corresponding actions define the
    way the programs act thereafter.


    The first approach uses conditional instructions (transformation rules, and heuristics)—for
    example, an AI program would refer to a business rules library and flag transactions
    as suspicious activities under the anti-money laundering context. Initially, the
    business rules library could have been created by looking at past evidences of
    what constitutes a suspicious activity and then updating continuously as newer
    regulations came into place or newer suspicious activities were observed.


    The second approach is known as machine learning. The machine is fed with millions
    of observations of suspicious and non-suspicious transactions. The machine understands
    the various patterns in the observations leading up to a suspicious transaction.
    As more and more observations are fed into the AI program, the program learns
    and builds its understanding through this inference-making ability, without having
    to code specific business rules to do so.


    AI applications are data-hungry and the ever increasing “datafication” by organizations,
    governments, households, and individuals is fueling the need to apply AI everywhere.
    That volume of data is due to increase exponentially on account of new sources
    like sensors on property and machines, connected devices, mobile devices, and
    digitalization of processes, together with customers’ increasing willingness to
    share personal information. The consequences?


    A maddening rush has begun as to who can gather the most data in an effort to
    achieve a competitive advantage. Just collecting vast troves of data is not enough.
    The data must be meaningfully processed to derive any value out of it. The success
    of using data to one’s advantage therefore depends on the appropriate methodologies
    and tools to process it—and this is where AI comes in. By applying powerful algorithms,
    AI programs sift through huge amounts of data, generating novel insights and automating
    repetitive tasks. AI thereby offers great opportunities for optimizing existing
    and enabling new procedures, giving a competitive edge to businesses today and
    in the future.


    To be able to leverage AI effectively, organizations need to combine a technological
    view with a business view—in other words, an understanding of what is technologically
    feasible today and how AI can create value for an organization by delivering business
    outcomes.


    At a broad level, we can classify AI solutions into three areas—AI as UI (Ubiquitous
    Intelligence), AI as AAAI (Assisted, Augmented, and Autonomous Intelligence),
    and AI as II (Invisible Interface or no User Interface).


    ## Artificial Intelligence as Ubiquitous Intelligence


    You wake up in the morning and from your bed ask your digital assistant, “How
    is the traffic pattern on my usual office commuting route today?” It replies,
    “If you start at 8AM, your usual time, you will get to office in 45 minutes. There
    is a small congestion 5 kilometers from the office. I am actively monitoring and
    will give you alternative options once you start from home.” The voice recognition,
    the natural language understanding of our question, the analysis of traffic patterns
    to get the right answer, and the translation of that answer into speech is all
    AI.


    You get into your office and open your email. Your email is already organized
    into folders, such as In Focus, Social, Forums, Private, Junk, or whatever categories
    you have created. It is also tagged as important or not based on your organizational
    hierarchy (a mail from your boss is always important) or whatever tags you have
    provided to make it easier for you to prioritize your time management and actions
    you need to take. The classification of your email based on the To, From, Subject,
    and the Content, the natural language processing to extract the right keywords,
    the algorithm to determine what is spam or not, or who is important or not, is
    all AI.


    You open your favorite news site and see that the news clippings are already personalized
    to your preferences. There are also few other recommendations on what is trending
    based on topics you follow. Curating news based on personal preferences and the
    recommendations for suggested articles involves using AI.


    You open your favorite search engine, and as you type your query in the search
    box, the system suggests related words, as if it knows what you are going to type
    next. Then, as soon as you submit the query, the system not only lists the right
    content from billions of documents on the Internet, it also displays the most
    relevant ad that matches your query. The algorithm that magically reads your mind
    and suggests keywords to aid in your search, the page rank algorithm that computes
    the relevant pages to display, and the selection of the right ad using a real-time
    ad exchange are all AI.


    These are just a few examples to highlight the fact that there is very little
    left in our day-to-day life that is not impacted by AI in some way. Everything
    we see around us is increasingly powered by an AI algorithm and while AI is gaining
    the status of ubiquity, we are sure that we have only scratched the surface regarding
    what AI can mean for us.'
