    # 治理框架


    遵循艾萨克·阿西莫夫著名的机器人三定律，人机智能系统（HMIS）需要建立一个治理框架，以管理和监控人类与机器智能体如何以协作方式执行各自的任务。这些法则可与机器人三定律并行使用：


    - 机器智能体绝不会收集肤色、身高、体重等身体特征作为视觉输入，用于学习或识别其所服务个体的文化背景。输入必须始终通过正式输入渠道提供。此举旨在使系统不受任何与身体特征相关的刻板印象影响。

    - 任何涉及文化不敏感的言论、句子、词汇或俚语，将始终被标记为对所有文化不敏感，除非其替代性的积极方面已针对特定文化明确说明。

    - 人类智能体需要一套主动学习系统，能够在交互后整合反馈，以持续验证其行为。


    需要为人类和机器智能体明确界定清晰的“责任分离”与事件响应矩阵。人类和机器智能体随后可利用强制或自动化活动来管理相互依赖关系与交互。这些相互依赖关系与交互要么是预先设计的，要么可根据其所处场景在运行时执行。


    效率与特异性至关重要，因此应通过妥善管理交互来清晰记录协调规则。HMIS 应能在提供安全性、可靠性和容错能力的多智能体复杂自适应生态系统中处理并发操作。协调过程应精确反映其形成所依据的语义。协调与问责的效果应精确地维持在智能体交互空间内。安全是人机交互中的另一个因素，治理框架不应忽视。正如人类遵守社会法律一样，机器智能体遵守若干防止其采取可能导致破坏性行动的极端措施的法律也同样重要。


    就像社会中我们有律师和警察来执行强制性法律一样，在 HMIS 生态系统中，我们也需要“监察者”来维护法律。


    例如，在通过面试流程招聘公司人类员工、且最终决策由机器智能体做出的场景中，HMIS 监察者将追踪整个流程中机会平等的基本价值观是否得到维护。例如，如果它无意中招聘了导致性别偏见或种族、肤色、性取向偏见的候选人，HMIS
    监察者将不会批准此类招聘，并会建议机器智能体重新评估或改变其决策。其他例子可能包括 HMIS 监察者监控通信文本，以检测不可接受或文化不敏感的词语或概念。此外，HMIS
    监察者还可能提供分布式和自主的平台，以验证来自机器的通信的真实性。法律的治理在 HMIS 中很重要，但同样重要的是应灌输给智能体的伦理道德。


    在商业环境中，违反行为准则应归入伦理范畴。如前所述，任何导致种族主义、辱骂行为甚至数据滥用的行为都将属于伦理违规，在这种情况下，惩罚应相当严厉。伦理之下是治理，即智能体在其领域或任务中受上级智能体管辖。智能体之间的治理结构应是层级式的，治理官员在基于达成的共识采取行动时，既要有问责制，也要有自主权。HMIS
    监察者有望通过整个治理过程变得更加智能。这可以通过利用对抗性机器学习程序来实现。由于智能体需要在其角色和职责中不断进化，因此在智能体的学习过程中拥有足够的垃圾信息过滤机制至关重要。这只有在
    HMIS 监察者通过改进智能体通信模式中的过滤机制而变得聪明时才能实现，否则可能会使智能体破坏自身乃至整个生态系统的健康学习过程。


    我们还必须讨论在实现稳定 HMIS 生态系统道路上可能遇到的潜在挑战，接下来将对此进行探讨。


    ## 机器的可信度与好感度


    促成两个个体之间交互的首要条件是接受这种交互。这种接受度取决于个体之间相互信任的程度，而接受的程度/水平则与个体之间的好感度直接相关。


    如果上下文中的个体之一是机器，这就变得棘手了。虽然从机器的角度来看，信任和好感度并不构成障碍（因为它总是可以通过编程方式改变），但反之则是一场艰苦的战斗。每当有文章或新闻报道机器能力的提升，或突出显示自主机器犯下的错误时，对机器的信任就会受到打击。HMIS
    生态系统要求人与机器之间进行无缝、开放的信息交换，这需要消除相关人类心中对机器的任何疑虑。智力上的优越性并不一定会让机器变得讨人喜欢，因此这比纸面上看起来要复杂得多。例如，与总是正确的机器相比，会犯错的机器似乎让人类感觉更自在。


    ## 人机关系


    人机关系是一种共生关系，两个实体相互依赖。虽然机器在执行定义明确的任务方面优于人类，但人类在并非完全可控且受不确定因素影响的动态任务方面更胜一筹。由于现实生活中的情况可能包含这两种类型的任务，因此自由度需要在人类和机器之间进行划分。


    HMIS 生态系统由机器网络和人类网络相互交织而成。随着机器变得越来越自主，保持对其关系性质以及依赖范式变化的检查至关重要。


    定义这种关系至关重要；如果一个自主智能体犯了错误或违反了法律，这种关系对于确定哪个实体将承担责任至关重要。必须解决诸如自主性的动态变化、任务的所有权以及工作分配等挑战。

    '
- fmt: '### All Humans Are Different


    As humans, one interacts with different people differently. The way people interact
    with their families is different from the way they interact with their colleagues,
    as there is a high dimensional context that goes into setting the tone and level
    of the interaction. The context does not limit itself to the relationship shared
    among the interacting parties, but also extends to the individual characteristics
    of the parties involved, such as age, gender, etc. Naturally, on the road to making
    machines more and more human-like, identifying the maximum context is crucial
    and hence becomes our next challenge.


    While a good amount of research has been done in identifying physical characteristics
    of humans, such as gender and age, there is a reasonable amount of work being
    done in identifying dynamic characteristics such as mood, emotions, etc. from
    tone, expressions, and body language. An interesting aspect and an added complexity
    in using this identified context is that it is culture specific. Even when it
    comes to the interaction between a machine and a human, culture plays an important
    role in how machines are perceived differently by individuals of different cultural
    backgrounds. While machines need to understand what certain gestures mean in different
    cultures, they also need to understand how their responses will be received in
    the same context as well.


    People and technology must play their roles, as depicted in Figure [11-1](#467925_1_En_11_Chapter.xhtml#Fig1),
    and humans must constantly evolve the design of the machines, provide governance
    frameworks, monitor capabilities, and embrace the notion that an integrated human-machine
    strategy will not eliminate them but will augment their efforts.


    ![../images/467925_1_En_11_Chapter/467925_1_En_11_Fig1_HTML.png](images/467925_1_En_11_Chapter/467925_1_En_11_Fig1_HTML.png)


    **Figure 11-1** A human-machine integrated strategy map


    ## Conclusion


    The rate at which data is growing is far outpacing our ability to extract business
    value from it. Most raw data to insights solutions are designed for volume. Few
    are designed for complexity. Fewer still excel at both volume and complexity.
    Thus, the challenge is how to extract business value from massively complex data.


    At the same time, there are companies making audacious attempts such as “mind
    as a service”. Nectome^([^(14)](#fn14)) is researching to develop a sophisticated
    brain banking technology to digitize a clinically preserved brain and use that
    information to recreate the person’s mind. Leveraging the synapses between neurons
    in a brain and reverse-engineering the brain, it is possible to keep all its memories
    intact. The result? Right from the childhood through all the highs and lows of
    a person’s life, the experiences associated with those events, the lessons and
    the wisdom, all can be made available, later on, as a service. How close are we
    to this possibility, though, only time will tell.


    For many, the word “algorithm” paints a complex incomprehensible set of mathematical
    formula. However, the reality is that algorithms are all around us, mostly working
    in an invisible mode but delivering significant business outcomes as well as uplifting
    our quality of life. No doubt, there are massive advantages to using algorithms
    within a business context; however, there are also a few challenges that need
    to be addressed.


    *Contextualization*: Algorithms present a very objective view leading to the final
    prediction. For example, they can make an accurate prediction on how a customer
    will react to an offer, but they can’t pinpoint why the customer behaved the way
    he/she behaved! Therefore, contextualization becomes extremely important to associate
    the cause against the correlation, and that is the only way algorithms will improve
    and get closer to the reality. Basing decisions purely on an algorithm prediction
    can lead your strategy down the wrong path.


    *Judgment skills*: Algorithms are good at analyzing millions of data points and
    delivering precise recommendations; however, they lack the judgment skills that
    humans have. For example, for your procurement analysis, the algorithm can take
    into account various factors such as supplier performances, economic conditions,
    and local discounted rates for raw materials, relationship strength with suppliers,
    etc. and arrive at the most optimal options. However, it can’t negotiate with
    the supplier the way an experienced human would to get the best rates.


    During our numerous conversations with business owners, technology practitioners,
    and CXOs, one question was oft repeated: “Do you think algorithms will impact
    our organization and our roles?” To answer, we borrow few stats from a Gartner
    report,^([^(15)](#fn15)) which estimates that 20% of all business content will
    come from machines by 2018; while autonomous software agents will participate
    in 5% of all economic transactions by 2020.


    To summarize, given the abundance of data sources (thanks to digital becoming
    a way of life and businesses) and fast-paced technology evolution (IoT, cloud,
    automation, blockchain, and ML/DL), algorithmic business is going to become the
    norm, not an aberration. While the cost of prediction will get cheaper and cheaper,
    the need for judgment skills will rise and the human element cannot be taken out
    altogether. Organizations will need to rethink their strategies and focus on products,
    services, customers, markets and human assets. They also need to add one more
    dimension—human-machine integrated AI strategy—into their enterprise game plans.


