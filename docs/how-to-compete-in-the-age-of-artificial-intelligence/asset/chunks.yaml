  trans: '

    # 去中心化人工智能的崛起


    直到最近，当代人工智能产业仍基于中心化的开发与使用模式，机器学习解决方案作为云端 AI 平台及相关 API 的一部分被设计、开发和访问。如今，我们正迈向下一前沿——能够在本地设备上运行和训练，或在区块链等去中心化网络中做出决策的去中心化
    AI。


    现有 AI 市场日益被谷歌、IBM 和微软等科技巨头掌控，它们均提供基于云的 AI 解决方案和 API。这种模式使用户对 AI 产品的控制权微乎其微，从长远来看，这种中心化模式可能导致
    AI 市场垄断，进而引发定价不公、缺乏透明度与互操作性，以及小公司参与 AI 创新的机会受限。幸运的是，我们正见证去中心化 AI 市场的兴起，它诞生于区块链、设备端
    AI 与边缘计算/物联网的交汇点。


    向去中心化 AI 的转型得益于新技术，例如谷歌的联邦学习，它允许对机器学习算法进行群体训练；以设备为中心的 AI，可在移动设备上运行和训练机器学习模型；以及在区块链网络的去中心化自治组织（DAO）中应用
    AI。


    ## AI 与去中心化自治组织


    当我们把部分或全部决策责任委托给 AI 代理时，DAO 便应运而生。例如，如果你持有所有权，你可以将你的决策权（如赞成/反对投票）让渡给一个 AI 代理（另一个智能合约），由它代你做出所有决策。或者，在更激进的场景中，我们可以委托
    AI 代理扮演管理者角色，承担所有组织与业务决策。例如，设想一个营销 AI 代理，它能选择最佳广告公司来投放你的广告。每个营销周期结束后，该 AI 代理会自动评估投资回报率并调整营销策略。


    本质上，DAO 将我们带入一个全新的经济现实：AI 代理成为业务管理者，监督业务绩效，并在去中心化网络中持续向其他 AI 代理学习并与之共同进化。`Terra0`是由柏林艺术大学的保罗·赛德勒和保罗·科林提出的项目。其概念涉及增强智能代理管理一片自有森林并从中获利。森林所有权被构建为一个基于以太坊区块链智能合约的
    DAO。随后，AI 代理利用无人机和卫星评估木材储量，决定在市场上出售多少木材以及何时出售。一旦项目启动并运行，DAO 可以向初始所有者偿还债务，最终将森林转变为一个控制自身资源的自主、自有实体。


    得益于针对智能手机的 AI/ML 设备端优化，以及为移动 AI 和桌面设备（如谷歌的 TPU）生产的专用芯片，去中心化 AI 近期取得了进展。


    2017 年 4 月，谷歌宣布其新的联邦学习概念后，去中心化 AI 获得了强劲动力。这一创新标志着向完全去中心化学习和以设备为中心的 AI 的转变，机器学习模型直接在用户智能手机上训练。在保持用户数据隐私完整的前提下，谷歌现在可以将
    AI 训练外包给安卓用户，实现共享模型的设备端改进。联邦学习将解决高延迟、低吞吐量连接的问题——用户过去必须连接到远程服务器才能使用机器学习软件。


    向以设备为中心的 AI 迈进的趋势，也体现在谷歌发布的`TensorFlow Lite`上，这是一个针对智能手机计算和功耗限制进行微调的机器学习库移动版本。2017
    年 6 月，苹果紧随谷歌步伐，发布了适用于 iOS 设备的`Core ML`库。该库附带优化的通用机器学习模型，以及将第三方模型转换为 iOS 格式的工具。无需网络连接即可在本地使用模型，将使开发具有
    AI 功能的移动应用变得更加容易。


    从长远来看，设备端 AI 与去中心化学习的结合将使 AI 比以往任何时候都更加民主和普及，导致越来越多的组织转变为 DAO。


    是什么在加速这一趋势？


    - **区块链上的自主 AI**：DAO 是由自主 AI 代理运营的算法公司。当将这些自主 AI 代理置于以太坊区块链上时，你可以有效管理版税分配、订阅支付、智能合约等事务。


    - **边缘端的去中心化学习**：在设备上，诸如苹果`CoreML`等移动机器学习库提供的 AI 能力，使得复杂的 AI 算法能够在传感器、安防摄像头、无人机或自动驾驶汽车等物联网设备上运行。

    '
- fmt: '*Decentralized intelligence networks*: Decentralized networks built on the
    blockchain such as `SingularityNET` allow any company or researcher to monetize
    their AI solutions and get access to a variety of AI algorithms. `SingularityNET`
    enables cross-AI capabilities through protocols that support data exchange and
    sharing across different algorithms, which is helpful in building multitier and
    connected AI applications.


    Such applications can combine multiple algorithms and perform different sub-tasks
    and then have access to the training data exchanged on the network. One example
    of such an approach is the development of a comprehensive AI-based cybersecurity
    solution. Currently, there is no single software package that handles all security-related
    tasks, which means that companies have to use various centralized AI solutions
    and customize them to their needs. Developing such a solution also brings about
    the problem of data security and domain-specific knowledge.


    Homomorphic encryption that makes different data sets visible to different classes
    of users in different aspects can solve this problem. Companies can also combine
    the expertise of different cybersecurity AI agents on the network, which will
    safely exchange security information, outsource tasks, and cooperate in solving
    common security issues. Such decentralized network will involve efficient division
    of labor and offer access to solutions without having to manually obtain data
    and customize algorithms.


    Decentralized intelligence has a number of advantages over centralized solutions
    in the following scenarios:


    - *You need an autonomous AI solution that runs in the decentralized environment
    and implements contractual obligations*: By definition, centralized proprietary
    solutions cannot be exposed to many users in the decentralized network. If your
    goal is to run a fully autonomous AI agent that makes smart managerial decisions
    and distributing profits, decentralized AI on blockchain is the way to go.

    - *You need an AI optimized for the on-device performance and not dependent on
    network connectivity*: Due to network connectivity problems, battery power constraints,
    and low computing power, mobile devices are not a good option for running cloud-based
    AI software. In particular, high latency and low throughput can compromise the
    speed and performance of AI applications, adversely affecting user experience.
    Whenever you need to run and train AI on mobile devices, a decentralized network
    becomes a better option.

    - *You want to sell your AI algorithms while maintaining proprietary rights*:
    There is no way to sell your AI algorithm and retain proprietary rights for it
    (the same goes for selling mobile apps in the app store right now). To fill this
    gap, decentralized AI networks offer an opportunity for developers to make their
    algorithms available for commercial usage as AI as a service.


    At the same time, centralized AI still remains a good option if you need a very
    generalized ML model that you can easily plug into your application. Google, Microsoft,
    and IBM have developed the best generalized machine learning models on the market
    that are trained on huge data sets and built according to the top ML standards
    and bleeding-edge ML algorithms. Reinventing the wheel is not an option if you
    want proven image or speech recognition features in your application. A more viable
    solution is to use cloud-based ML APIs provided within a pay-as-you-go model,
    which ensures cost efficiency and scalability of your AI-based solutions. Major
    providers of centralized AI have a comprehensive suite of services for image and
    video recognition, emotion AI, speech recognition, predictive modeling, and other
    common AI/ML tasks.


    In the long run, decentralized solutions can produce the radical democratization
    of the AI market, optimization of solutions for a wide variety of use cases, easy
    integration and communication between different algorithms through a single protocol,
    and the development of interoperability standards, which will ultimately lead
    us to the era of AGI (artificial general intelligence).


    ## Conclusion


    The combination of the blockchain technology and artificial intelligence is still
    a largely undiscovered area. Traditional AI methods follow a centralized development
    and deployment pattern. You have a cloud-based AI platform, you ingest data and
    do your predictive models and then, through APIs, access the models from various
    business processes or applications. There are a number of challenges to this approach:
    latency, data security, network bandwidth, performance, etc.


    Now, imagine a highly decentralized approach where your predictive models run,
    train, and even make decisions on local devices in decentralized networks like
    the blockchain. This is decentralized AI!


    There are significant benefits of decentralized AI over traditional AI:


    - Minimal latency (no dependency on a network connection)

    - Training is more efficient (done in a decentralized way)

    - Less power consumption (again, no dependency on a network connection)


    AI can be incredibly disruptive and must be designed with utmost precautions.
    Blockchain can greatly assist with the cause. How the convergence between these
    two technologies will progress is anyone’s guess.


    In this chapter we touched upon several disruptive technologies (blockchain, AI,
    IoT, and cloud), each extremely powerful on its own. When they are combined, they
    can deliver far-reaching transformative outcomes. In the next chapter, we touch
    upon the thorny topic of ethics and AI, which has raised enormous debates worldwide.


    # 10. Ethics and AI


    AI, especially ANI (Artificial Narrow Intelligence), is beginning to occupy a
    unique place in our lives. There are virtual personal assistants, hosts of intelligent
    apps on our smart phones, self-driving cars, intelligent home appliances, smart
    buildings, smart homes, and many more. No other technology has the kind of far-reaching
    implications that AI has, across so many industries and all spheres of our lives.
    This is what makes it so fascinating; it is truly incredible and no less than
    a sci-fi plotline.


    For a technology designed to mimic human-like intelligence, understanding the
    darker side of AI is also equally important and probably requires defining the
    dos and don’ts at a policy level. There are many questions we need to address,
    if we want to truly leverage the transformative power of AI.


    In the next 20 years, experts predict that AI will continue to make great strides
    in transforming and in many cases eliminating hosts of human tasks. If this innovation
    is done in an ethical way and keeping human-machine collaboration as the goal,
    we can build a future in which humans are not competing with machines. Instead,
    we will be entering into a new era of jobs that requires no manual effort but
    higher emotional intelligence.


    It is perhaps a way of life now to hail a taxi at the tap of a smart phone screen.
    Imagine the same thing, extended to getting a self-driven taxi! Imagine the extent
    of woes that the traffic management officials will have to go through to manage
    transportation and safety to accommodate the next wave of driverless cars. For
    sure, the department of transportation has their work cut out for them; they will
    have to innovate too.


    This is just one of the example that shows how the implications of AI are unprecedented.
    As we continue to innovate and solve new problems using AI, we must simultaneously
    pay attention to ethical usage and policy related aspects because there are implications
    to the society at large, not just a few industries or a few individuals. We must
    take a democratic approach to the future of technology led disruptions.'
