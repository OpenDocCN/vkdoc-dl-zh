- fmt: '#### Assess Your Internal Capabilities


    Having understood the adoption scenarios of your AI solutions, you need to turn
    inward and do a critical assessment of your own internal capabilities. Given AI’s
    newness and inherent complexity, it is important to understand where the maturity
    of your internal processes, technology landscape, and employee skills stand. For
    any AI solution, the key ingredients are computing power, algorithms, data (lots
    of data), and skilled employees. If historically your company has not been at
    the cutting edge of technology, has not adopted agile development processes, has
    not focused on data-driven culture, has not encouraged innovation, then it is
    highly likely that even though you have stumbled into great path breaking ideas,
    you will struggle to bring those ideas into life.


    Hence, it is important to work through the expectations for each AI initiative,
    prioritize the AI initiatives based on ROI and readiness to deliver, create a
    roadmap, and choose where to start.


    How do you launch the AI transformation in your company? What building blocks
    do you need to establish and pay attention to on a continuous basis?


    #### Launch the AI Transformation Program


    We get carried away and pay a lot of attention to AI’s transformative role in
    changing a company’s core business model. However, to have the entire company
    marching on the AI transformation journey requires something else—a cultural shift
    in the company’s way of working. The organization needs to become a learning company
    and not shy away from experimentation.


    To become AI ready, in our view, an organization needs three broad-level calls
    for action.


    ##### Establish Sponsorship and Governance


    From an enterprise AI readiness perspective, AI is less of a technology overhauling
    and more of a cultural shift, and both the business leadership and technology
    leadership have equal roles to play. Technology leadership needs to articulate
    how to make AI work to solve business problems and business leadership needs to
    envision how to adopt AI solutions to deliver business outcomes. These are not
    easy tasks!


    To start with, you need to establish an organizational model consisting of an
    AI council that actively engages in the change-management process and sets up
    agile ways of working. You have to start with securing executive sponsorship and
    defining charters, roles and responsibilities, decision making protocols, escalation
    processes, and links to specific business objectives and processes. It is quite
    likely that some leaders in your organization will choose to wait and see (especially
    those skeptical about the AI implications). You need to engage more with those
    leaders to get some skin in the game, which means investing despite high levels
    of uncertainty.


    ##### Action Plans: Experiment, Fail, and Learn


    AI solutions are all about rapid experimentation—fail fast and learn to improvise.
    Given the nature of AI solutions, it is foolish to adopt action plans based on
    traditional development methodologies. In the AI world, everything is a moving
    part. You need to design, develop, conduct tests, expose your working prototypes
    for user experience feedback, and test your deployment models on cloud working
    with your cloud partners and other ecosystem players—all at the same time.


    Your plans should also align to the company’s overall business strategy and should
    be prescriptive enough about how the senior leadership will adopt AI-influenced
    ways of thinking in daily business. It is especially important to be flexible
    and do course corrections to your plans as often as required. In the AI world,
    it is almost a regular occurrence that you start with one end objective in mind
    but end up creating many different possibilities.


    ##### Invest and Develop AI Capabilities


    Considering the fact that AI is a new technology, you need to develop a clear
    plan of how to build needed AI capabilities and competencies, including an AI
    team of data scientists and data engineers, and the necessary infrastructure and
    algorithms.


    You may consider starting with a centralized AI CoE to provide the initial thrust
    and support across the businesses. The AI CoE should not only focus on working
    closely with various business functions to create and enhance the AI use cases
    but also establish technology roadmaps, standards, and accelerators such as an
    AI platform, sandboxes for proof of concept development and pilot use cases, an
    algorithm marketplace to leverage and reuse algorithms built by others, a data
    catalogue to leverage and share data across the enterprise functions, and other
    best practices such as an AI playbook to evangelize cross-functional lessons across
    the enterprise.


    The most critical task of the AI CoE is to attract and retain the right AI talent.
    AI talent is not unidimensional; it is a combination of different skills—creative
    thinking, willingness to research and go after unknowns, experimentation, business
    impact articulation, story-telling, technology prowess in data, algorithms, and
    the cloud. AI also brings with it a fair share of talent acquisition and talent
    management related challenges. Attracting the right talent, giving them the right
    environment to flourish, retaining them, and keeping their motivation level high
    is definitely not a trivial act. This is not a task to be left to managers and
    HR professionals alone; senior leaders of the organization need to stay involved,
    take ownership, and pay attention to the AI talent pool.


    Given the scarcity of AI skills, it is understandable that you may not opt to
    set up in-house expertise to start with; you may collaborate with partners to
    set up innovation labs centrally or within your business functions to get them
    going along the innovation and experimentation journey.


    ### How to Define AI Use Cases


    Almost all AI use cases address three fundamental tenets: functionality, training
    data and algorithms, and an end-user need.


    Using these three tenets, a use case can be described based on this formula:


    > *Deliver (functionality) by learning from (data), thus fulfilling (user need)*


    For example, Spotify recommends new artists and songs (functionality) based on
    previously played genres/artists (data) in order to make relevant content easily
    and quickly accessible to users (need).


    First and foremost, you must establish the *user need*. The user could be internal,
    such as employees, or an external user, such as customers. For example, a conversational
    interface for your employees to address various HR policy related queries fulfills
    a user need that is internal to the organization. If you are in the smart wearables
    manufacturing business, if you offer additional value-add services and recommendations
    around “staying healthy,” Then you are fulfilling a user need that is entirely
    external.


    A user need consists of several *functionalities*. The spectrum of possible functionalities
    can range from simple things like recommendations (assisted intelligence) to more
    complex things like automating decisions in your business process (augmented intelligence),
    to even more complex things like injecting appropriate advertisements, perfectly
    timed, customized to your personal preferences, and highly aligned to the content
    you are viewing (autonomous intelligence).


    The following sections explain some of the most popular examples of artificial
    intelligence being used today. This is not an exhaustive list. In all of these
    examples you will find there are user needs met through certain functionalities
    using data and algorithms.'
