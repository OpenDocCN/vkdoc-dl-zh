    facts, figures, weather patterns, restaurants nearby, and so on


    In each case, the human specifies the goal and the criteria (such as “take me
    downtown but avoid busy streets” or “give me movie options that are moderately
    funny, hopelessly romantic, and with an Asian theme” or “find me a highly rated
    and moderately priced Italian restaurant within walking distance”). How does it
    work? An AI algorithm sifts through massive amounts of data to arrive at predictions.
    The human then evaluates the machine outputs to make a decision. Every time the
    human chooses or disregards a particular prediction , the AI algorithm makes note
    of it and feeds that information back into the learning process, thus improving
    and learning continuously. In no situation is human intelligence overshadowed,
    rather it is augmented.


    It turns out that the human mind is less predictably irrational than originally
    realized, and AI is less human-like than originally hoped.


    ## The Linda Experiment: Thinking Fast and Thinking Slow


    AI pioneer Herbert Simon brought out another facet of AI in the context of human-machine
    collaboration. He argued that we humans must settle for solutions that “augment”
    rather than optimize because our ability to work long hours, remember a multitude
    of things, and reason well are limited. In contrast, machines do not exhibit work
    fatigue, make consistent decisions always, and can process massive amounts of
    input with minimal effort. In addition, they can evaluate millions of factors
    far more accurately than humans can.


    Daniel Kahneman, in his book *Thinking Fast and Slow,*^([^(13)](#fn13)) highlighted
    the interesting yet irrational aspects of the human decision making process.


    Whenever there are multitude of choices before us, we get into a decision making
    process, and naturally it may seem that we would evaluate a lot of data, apply
    certain rational thinking, recall our past experiences, deliberate with others,
    and then make a decision. This is what Kahneman calls “System 2” thinking, or
    “thinking slow.”


    In reality, we don’t always resort to such lengthy and slow processes of evaluating
    anything to arrive at a decision. Rather we typically lean on our own tribal knowledge
    consisting of a variety of mental rules of thumb (heuristics) to arrive at a decision.
    Our own decision-making process may seem narratively plausible, but it is often
    logically dubious. Kahneman calls this “System 1” thinking or “thinking fast,”
    which is famously illustrated by the Linda experiment.


    In an experiment with students at top universities , Kahneman and Tversky described
    a fictional character named Linda. She is very intelligent, majored in philosophy
    at college, and participated in the feminist movement and anti-nuclear demonstrations.
    Based on these details about Linda’s college days, which is the more plausible
    scenario involving Linda today?


    “Linda is a bank teller. Or Linda is a bank teller who is active in the feminist
    movement.”


    Kahneman and Tversky reported that 87 percent of the students thought the second
    scenario was more likely, even though a moment’s thought reveals that this could
    not possibly be the case. Feminist bank tellers are a subset of all bank tellers.
    But adding the additional hint that Linda is still active in the feminist movement
    influenced narrative coherence and led the students to opt for the (less likely)
    second scenario.


    In essence, the human mind confuses the easily imaginable with the highly probable,
    by letting emotions cloud judgments, by hypothesizing patterns in random noise,
    by associating causality to spurious correlations, and by overgeneralizing from
    personal experience. Many of the heuristics and wisdom we use to make judgments
    turn out to be systematically biased. Perhaps it won’t be highly provocative if
    we say that our minds need algorithms to de-bias our judgments and surely our
    eyes need artificial lenses to filter out spurious correlations.


    On the other hand, if there is a way to encode the processing logic behind routine
    tasks, then it is a safe bet that algorithms will outperform humans on the same
    tasks. However, such algorithms will lack the conceptual understanding and common-sense
    reasoning needed to evaluate new or novel situations. To illustrate this caution,
    let us take the example of IBM Watson winning *Jeopardy*. During the contest a
    question was posed under the category of “US cities”: “Its largest airport is
    named for a World War II hero; its second largest, for a World War II battle.”
    Watson answered “Toronto.” Category “US Cities,” but answer “Toronto”! (The correct
    answer is Chicago, by the way.)


    This particular example illustrates that certain strengths of human intelligence,
    like common-sense reasoning, can counterbalance the fundamental limitations of
    brute-force machine learning.


    One of the fascinating things about AI is that it’s been hard to predict which
    parts would be easy or hard. At first, things like playing chess, a mentally challenging
    activity for humans, will be the hardest for machines, but it turned out to be
    easy. On the other hand, things like recognizing objects or picking them up, a
    fairly simple task for humans, are much harder for machines to do.


    In summary, humans need machines to avoid “System 1” decision making traps, and
    machines need humans to avoid “System 2” decision making traps. Together, they
    imply that the case for human-computer symbiosis is stronger than ever.


    What we need is a human-machine integrated strategy.'
