- fmt: '### Unsupervised Learning


    You are in general looking for patterns and have no outputs to map to. For example,
    you want to group your customers according to the type of products they order,
    how often they purchase your product, their last visit, etc. This process of arriving
    at a cluster with homogenous behaviors grouped together is called *unsupervised
    learning*, because it does not know what to learn. However, it observes the patterns
    in the data and automatically finds ways to find distinct groups in the data.


    The key principle to understand is:


    - Unsupervised learning does not try to map into a predefined output, rather it
    explains how the data is organized.


    Here are a few examples:


    - A clustering algorithm, such as `K-means` or hierarchical clustering. These
    algorithms try to create clusters (similar characteristics belong to one cluster).

    - Dimensionality reduction such as `PCA`. These algorithms try to find the best
    representation of the data with fewer dimensions.

    - Anomaly detections. These algorithms try to find outliers in the data.


    ### Reinforcement Learning


    You want to attain an objective but you are not given any specific set of instructions
    or prior lessons about how to achieve the objective. In reinforcement learning,
    the learner is not told how to do the tasks. However, the learner is explicitly
    informed about which actions will lead to maximum reward.


    The key principles to know are:


    - Reinforcement learning tries to acquire new knowledge and maximize reward at
    the same time. This approach is also known as the “exploration vs. exploitation
    trade-off”.

    - The learner follows the Markov Decision Process framework, where it has to take
    an action (`A`) to transition from a start state to an end state (`S`).

    - For every correct action it takes, it gets a reward (`R`). Otherwise it gets
    penalized. This sequence of actions defines the policy (`P`) and the corresponding
    rewards (or penalties) define the value (`V`). The learners’ task here is to maximize
    the rewards by choosing the correct policy.


    Reinforcement learning is not exactly supervised, because it does not rely strictly
    on what output it has to map to. It’s not unsupervised learning either, since
    it knows upfront what is the expected reward for the right actions.


    ## Categories of AI Problems


    AI problems can be classified into 10 broad categories.


    - *Domain expert*: The AI system must acquire a body of knowledge in a specific
    field and then gain enough reasoning and inference capabilities that it can act
    as an expert in that field. The key is here to get access to a huge corpus of
    data concerning a particular field.

    - *Domain extension*: The AI system leverages a body of knowledge and extends
    the capabilities to correlate different things within that body of knowledge to
    suggest new insights or patterns that were not discovered earlier.

    - *Complex planner*: The AI system serves the role of an intelligent orchestrator
    that not only integrates a variety of complex data but also generates insights.
    One example is the use of AI techniques to optimize logistics where, due to multiple
    hops and parties involved, including fleets, warehousing, routing, and distributions,
    you are looking at large and complex data sets in which human beings cannot detect
    patterns but a machine can do so easily.

    - *Better communicator*: The AI system provides a conversational mechanism, including
    natural language processing, natural language generation, interpreting emotions,
    tailoring responses, language translation, etc.

    - *New perception*: The AI system interacts with environments to determine the
    next best actions enabling new services such as autonomous vehicles.

    - *Enterprise AI*: The AI system is primarily tasked to automate activities that
    are repetitive in nature where there is enough knowledge base available to define
    input-output mapping accurately.

    - *Making ERP intelligent*: Businesses run on ERP systems. However, they lack
    in intelligence. AI systems are embedded in the various workflows in the ERP system
    and are tasked to make smart assists to users who are stuck in the workflows or
    need assistance to carry out their tasks efficiently. The AI systems are trained
    on past issues, conflict resolutions, best practices, possible remediation measures,
    etc.

    - *Making data stores intelligent*: Enterprises have many data stores. Some are
    managed centrally (data warehouses) to serve analytical needs, some are associated
    with specific business applications and stay siloed, and many more are created
    as a result of point-in-time needs of users. In addition, there is quite a large
    amount of information scattered around in unstructured formats (logs, emails,
    documents, images, videos, call transcripts, etc.). AI systems can play a role
    in cutting across all these different and distributed data stores to not only
    collect metadata (data catalogs, business glossary, and technical glossaries)
    but also to serve as a means to provide meaningful insights, letting the data
    stay wherever they are.

    - *Super long sequence pattern recognition*: The current scenario of AI systems
    doing a fabulous job in predicting the outcomes that are perhaps applied to one
    single problem. There are many large, complex real-world problems that require
    a sequence of predictions to feed into each other to solve the problem. Such AI
    systems will not only have their own memory but also will have advanced synchronization
    capabilities to self-tune and adapt.

    - *Advanced behavior analysis*: AI systems are already doing sentiment analysis
    but they apply a limited interpretation capability, primarily using vocabularies
    and grammar constructs. These AI systems can evolve to use multiple areas of understanding
    human behavior, such as observing body language, facial expressions, choice of
    words while communicating, tone of interaction, etc. to enhance sentiment analysis.


    ## ML Primer for Managers


    The best way to understand the engineering aspects of AI and algorithms is to
    refer to the definition provided by Tom Mitchell.^([⁷](#fn7))


    > “A computer program is said to learn from experience `E` with respect to some
    task `T` and some performance measure `P`, if its performance on `T`, as measured
    by `P`, improves with experience `E`.”


    So if you want to predict, for example, credit worthiness of a new loan applicant
    (task `T`), you run a machine learning algorithm on past data about similar profiles
    (experience `E`) and, if it has successfully “learned,” it will then correctly
    predict the credit worthiness of the new loan applicant (performance measure `P`).


    The answer to the question, “What machine learning algorithm should one use?”
    is always “It depends.” Choosing the right algorithm is a combination of the type
    of problem you are trying to solve, business goals, experimentation techniques
    you want to apply, and how much time you have on hand to validate your algorithm.
    It depends on several factors: data size, data quality, and data diversity. Additional
    considerations include your tolerance for error and what you want to do with the
    answer. Even the most experienced data scientists cannot tell you which algorithm
    will perform the best before trying them.


    We have picked top 10 widely used machine learning algorithms to get you initiated
    into the algorithm-jargons. It also means that there are lots of algorithms not
    listed here.


    ### Naïve Bayes Classifier


    The Naïve Bayes classifier is based on Bayes’ theorem and allows us to predict
    a class/category, based on a given set of features, using probability.


    Naïve Bayes can be applied only if the features are independent of each other.
    If we try to predict a flower type by its petal length and width, we can use the
    Naïve Bayes approach, since both those features are independent. For instance,
    spam filtering is a classifier that assigns a label “Spam” or “Not Spam” to all
    the emails.'
