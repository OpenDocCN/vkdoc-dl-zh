    ### 用于网络安全的监督式机器学习


    在网络安全领域，监督式学习最常被提及的应用场景是恶意软件分类和垃圾邮件检测。对恶意软件进行分类，首先要识别文件是否具有危害性。同样地，通过观察内容中的模式，机器学习可以将其归类为垃圾邮件或非垃圾邮件。


    监督式学习在网络安全领域之所以效果显著，是因为有数百万个已标记的数据可供使用。神经网络在这些标记数据上进行训练，以识别异常模式，例如入侵检测、恶意软件检测、网络钓鱼攻击等。以
    Gmail 为例，监督式机器学习算法会扫描无数变量，如源 IP 地址、源位置数据、用词选择、邮件内容中的短语以及许多其他因素，以判断邮件是否符合异常模式。如果符合，它就会将该邮件从收件箱移出并放入垃圾邮件文件夹。


    随着企业寻求解决方案来应对日益增多的自带设备（BYOD）和自选设备（CYOD）所带来的威胁，监督式机器学习正被嵌入到移动设备中。例如，谷歌正在使用机器学习来分析针对移动端点的威胁。


    在网络安全领域，监督式机器学习的真正优势在于，它能够自动化处理重复性任务，例如像“战术救火”一样手动响应工单并运行脚本来修复恶意软件。这将解放分析师，让他们能够专注于更重要的任务，例如对威胁情报进行分类。


    为了使监督式学习更加有效，它需要海量且优质的标记数据集。如果没有这些数据，我们就无法训练算法。


    ### 用于网络安全的无监督式机器学习


    无监督式学习没有明确的目标要实现；然而，它可以帮助减少海量数据集中的杂乱信息，使其易于安全专家进行进一步分析。上下文和专家知识库是理解原始数据的两个关键方面。这正是无监督式学习可以发挥巨大作用的地方。


    例如，麻省理工学院计算机科学与人工智能实验室（CSAIL）开发了一个自适应机器学习安全平台，该平台帮助分析师每天审查数百万次登录，然后对活动进行情境化处理，从而将误报率降低到几乎可以忽略不计的程度。


    为了更好地理解不同数据集中所涉及实体的角色，我们不仅需要提取实体，还需要为其关联上下文。我们不应孤立地查看网络流量日志，而需要添加上下文来理解数据，例如关于设备、应用程序或用户的信息、特定位置的数据、该设备是否应该响应
    DNS 查询等等。如果它是一个 DNS 服务器，那么这完全是正常行为；但如果不是，该行为则可能是攻击的迹象。


    专家知识库有助于人类专家快速分析问题并找到潜在的解决方案。像贝叶斯信念网络这样的机器学习算法，当应用于海量数据集时，可以生成图形模型和相关因子，从而对不确定性进行推理。这种方法在构建专家系统方面非常有效，这些系统不一定能立即解决所有问题，但可以通过协助安全分析师处理日常工作，使他们更高效。与其让分析师查看庞大的数据集，然后将其与已知问题和解决方案进行交叉比对（这是一项耗时的工作），不如通过带有相关因子、依赖路径和概率度量的可视化表示，在极短的时间内让分析师对实体有更深入的理解。


    ## 首席信息安全官的人工智能与网络安全行动手册


    随着越来越多的企业走向数字化，网络安全意识也在不断提高。他们正在认识到自己的网络容易受到攻击。新出现的共识是，仅靠 IT 部门无法处理安全问题；所有员工，尤其是
    C 级高管，都需要发挥作用。事实上，高管不仅要负责本部门的数据安全，还要负责推动员工广泛采用网络安全最佳实践。


    风险因行业而异。对于电力公司来说，网络安全的最高优先级是通过防止网络攻击者破坏电网来确保持续供电。对于零售商来说，是保护信用卡记录和客户数据。对于航空业来说，是保护空中交通管制系统，以确保乘客和机组人员的安全。对于首席信息安全官（CISO）来说，网络安全不仅仅是制定一份需求清单，而是将网络风险主动管理在可接受的水平。如果你是一名
    CISO，你需要制定一个与你所在行业相关的网络防御计划。


    以下是在制定网络防御计划时需要考虑的一些最佳实践。

    '
- fmt: '### Before a Breach


    Preparing for a breach should be part of the daily security routine of any organization.
    Multiple layers of network security minimize gaps in protection. In addition to
    firewalls, intrusion prevention, and antivirus technology, you should also consider
    deploying advanced intelligence capabilities that inform you of emerging threats
    beyond your own network perimeter. Persistent security measures will also help
    protect off-premise and remote devices, such as cell phones and tablets.


    Because the cyber threat landscape is always changing and new security solutions
    come to market all the time, you need to review your security strategy regularly.
    Questions that would help you formulate your strategy are:


    - What is the current level and business impact of cyber risks to your company?

    - What are your plans to address those risks?

    - Do you have an escalation matrix and communication plan that identify executive
    leadership roles to determine the business impact of cyber risks to your company?

    - Where does your cybersecurity readiness stand in comparison to industry standards
    and best practices?

    - Do you have a systematic way of collecting, analyzing, detecting, and responding
    to cyber incidents on a regular basis?

    - How comprehensive is your cyber incident response plan and how often is it tested?


    Preparing for a cyberattack involves developing a coordinated response plan that
    considers every possible threat to your organization. Studying security best practices
    and failures of other companies, especially those in your same industry, is an
    excellent first step. In addition, discussions and workshops with counterparts
    in finance, human resources, marketing, etc. helps identify pertinent threats
    and develop defenses.


    Like fire drills, you should develop scenarios and response plans that should
    be tested frequently and revised and improved as needed. You should develop mock
    scenarios of cyberattacks like, such as if website has been defaced, now the attackers
    are accessing confidential records, they are removing sensitive data from your
    network, etc. Your security analysts and AI systems must go through the process
    of discovering, identifying, prioritizing, and addressing the issues, as they
    would in a real attack. Beyond just developing an incident response plan, penetration
    and red team testing help establish the actual state of your security systems
    and procedures.


    You need to perform assessments to thoroughly review your security environment
    and then create and execute realistic threat scenarios against your vulnerabilities
    that your security teams must then respond to.


    Several cybersecurity assessments can determine how you can most effectively prepare
    for and respond to inevitable attacks:


    - **Compromise assessments** apply extensive threat intelligence and security
    expertise to determine whether you have been breached in the past or are currently
    under attack. This assessment includes recommendations for further investigation,
    containment, and long-term security improvements.

    - **Proactive objective-based tests** evaluate your security measures against
    the tools, tactics, and procedures used by attackers who typically target your
    industry.

    - **Penetration testing**, red team operations, and other objective-based tests
    can detail risk, probability of exploitation, and potential business impact, and
    they provide actionable recommendations.

    - **Security program assessments** review your security organization, practices,
    and procedures against the latest industry standards in critical security domains.
    This comprehensive assessment provides a roadmap with prioritized recommendations
    to close gaps based on vulnerabilities, attack trends, and any likely malicious
    activity.

    - **Response readiness assessments** review your security operations and incident
    response capabilities for detecting and responding to attacks. The final deliverables
    include a security roadmap with prioritized recommendations.


    ### During a Breach


    All that advance planning and those security drills are put to the test when an
    incident actually occurs. Your organization’s incident response team must spring
    into action when they identify a breach. They need to determine where the attackers
    are, what they seem to be after, how far they have advanced, and how long they
    have been in your systems.


    As a CISO, you may want to contract security consultants to advise you on incident
    response. Such experts may be aware of newer and evolving security threats and
    have the knowledge, technology, and skill to defend against those attacks.


    Just as important as responding to the attack is deciding how to disclose the
    incident to the outside world. Keeping the breach quiet may no longer be an option,
    given legal disclosure requirements and the likelihood that news of the event
    will become public. If you’ve been breached and you know it, you are in an absolute
    race against time to get your arms around what happened and what you are doing
    about it. However, you have to be careful about what you disclose, to whom, and
    when. Some companies opt to disclose as much as possible out of a sense of corporate
    responsibility.


    Having a communications plan in place ensures that you release only relevant information
    to the correct authorities and the general public in a timely manner, using appropriate
    channels. It’s important to work with your legal counsel as well as your public
    relations partners to determine not only how to put your best foot forward to
    customers, suppliers, employees, and the public, but also to determine what’s
    required of you under relevant laws. Internal coordination with your legal counsel
    and public relations department is key.


    While disclosure decisions are important, the larger concern during a breach is
    to gain control of the situation, remove attackers from your network, and get
    operations back to normal as soon as possible.'
