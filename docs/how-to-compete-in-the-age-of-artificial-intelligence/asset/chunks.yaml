  trans: '

    ### 人工智能作为无形界面（无用户界面）


    斯科特·詹森提出了“技术舵柄”的概念。^(³) 当我们固执地将旧设计套用到新技术上，并认为它会奏效时，就会陷入灾难性的“技术舵柄”困境。这个术语的灵感来源于船的舵柄，它在很长一段时间内是人类已知的主要转向工具。因此，当第一批汽车被发明时，人们没有使用方向盘作为转向工具，而是采用了船的舵柄。这使得控制汽车变得极其困难，常常导致严重的事故。采用船舵柄的汽车销量惨淡。直到方向盘被加入后，汽车才得以广泛使用。


    这里有一个宝贵的教训：技术演进需要截然不同的设计方法。当我们忽视“技术舵柄”时，最终往往会得到有缺陷的产品。然而，当我们承认“技术舵柄”的存在并引入全新的设计思维时，就能取得巨大的成功。


    或许我们正处在另一个“技术舵柄”的转折点；这一次是关于用户界面。鉴于人工智能的进步——以聊天机器人形式出现的对话界面以及像 Siri 这样的商业产品在我们的个人生活中扮演着越来越重要的角色——是否存在完全消除用户界面的可能性？


    我们被各种数字渠道和设备包围，它们无时无刻不在争夺我们的注意力：智能手机、平板电脑、笔记本电脑、智能电视、智能可穿戴设备以及各种门户网站，不断通知我们某个事件或提示我们采取行动。这些请求和我们的大部分回应都是通过图形用户界面（GUI）进行的。当然，从基于字符的屏幕到提供丰富用户体验的优雅界面，我们已经取得了长足的进步。然而，最大的问题是信息过载和注意力持续时间的缩短。或许，现在正是时候让我们从设计需要用户全神贯注的
    GUI，转向设计更平静、更直观的人机交互机制，并将其置于用户体验的核心。UI 不是产品或服务；它只是一个允许我们访问产品和服务的层。那么，问题来了，如果我们能找到一种绕过
    UI 却依然能访问产品和服务的方法，为什么不这样做呢？


    欢迎来到无 UI 的世界。


    GUI 促进三种操作：呈现信息、解释用户指令以及处理指令。在这个过程中，理解信息、指导下一步行动、然后通过将输出与预期目标进行比较来评估结果，仍然是我们人类的工作。连接这个流程的关键要素是情境和智能。有没有另一种方法可以让这个过程变得简单？让我们以你走进最喜欢的酒吧，甚至在你在吧台凳上坐好之前就拿到你最喜欢的饮料为例。酒保认识你，确切地知道你喜欢什么饮料，并且知道你刚刚走进门。这包含了大量的交互，却没有任何“界面”。


    在这个例子中，酒保就是 UI。他理解用户的需求；他掌握所有情境和所有智能，并交付了完美的结果。如果我们能将其付诸实践，这种思维在人工智能领域是革命性的。一方面，这需要承担更多责任来创造高度相关且情境化的透明体验，所有这些都由智能（即人工智能）驱动。另一方面，这为我们提供了跳出框架思考的绝佳选择，可以创造开放式的体验，在这种体验中，只有重要且可行的信息才会呈现给用户。


    当我们设计产品和服务时，我们常常沉迷于功能的精巧和创新，却忽略了关键的一点：知道什么是必须的，什么是可选的——用户需要完成某个操作。完成这个操作所需的最少步骤是多少？每个步骤所需的最少信息量是多少？最小可行交互是一种有趣的方式，可以让我们更接近直观的做事方式，因为它将焦点从产品或服务本身转移到了对产品或服务的*使用*上。


    例如，在设计界面时，设计师将其视为一个 GUI，而最终用户则将其视为预订机票的一种手段。因此，将焦点放在最终用户身上至关重要。问问自己：产品或服务能在最短时间内为最终用户提供最大的价值是什么？最终用户完成整个流程的最简单方式是什么？


    我们已经开始与我们的机器对话——不是通过命令、菜单和疯狂的按键，而是使用人类语言。自然语言处理已经取得了令人难以置信的进步，我们不需要成为一台机器才能与另一台机器对话。


    不，无 UI 并非一个全新的想法。如果你曾经使用过 Amazon Echo、通过向 Microsoft Kinect 挥手来切换频道，或者设置过 Nest
    恒温器，那么你已经使用过受无 UI 设计思想启发的机器了。我们开始从将触摸屏作为与机器交互的唯一方式，转向使用更自然的方式（触觉、手势、计算机视觉和语音识别，这些都是人工智能的子领域）与我们周围的机器进行交互。


    直到现在，机器一直迫使我们按照它们的规则行事，说它们的语言。下一步是让机器最终能够按照我们的规则，用我们自然的语言、行为和手势来理解我们。这就是无 UI 的全部意义所在。


    到目前为止，我们设计界面的旅程一直是由工具和方法驱动的，而不是由最终产品或服务应该做什么来驱动的。在数字世界中，“做”这个行为本身变得与产品或服务密不可分。换句话说，交互和体验本身就成了产品和服务。


    随着对话界面以及支持语音和手势的界面日益普及，我们开始从“键入”界面转向越来越多由“交互”主导的界面。回顾人机交互的历史，我们会发现，我们一直在应用越来越多的计算和处理能力，让机器更努力地工作，以减少机器的响应时间。这种方法根本没有简化人机交互。人类天生就善于交谈，因此最有效的人机界面本质上就是高度对话式的。我们需要重新构想我们如何与机器交互，以及机器如何与我们交互。我们需要彻底改造我们所有的传统界面，使其变得简单、抽象、隐藏且环境化（即无形界面）。


    最终的 UI 就是无 UI，这一切都由人工智能驱动。

    '
- fmt: '### Are New Advances in AI Worth the Hype?


    Almost daily, we’re hit with another news report or article glorifying AI use
    cases. Why exactly is the excitement so strong?


    In a short span of time, we have seen a succession of major technological shifts
    (mobility, e-commerce, digitization, analytics, Big Data, IoT, automation, etc.),
    each one impacting the way we go about doing businesses and leading our life in
    general. When business executives and technology practitioners somehow come to
    terms with these technology evolutions, the AI wave and all the hype surrounding
    it poses a new challenge. What exactly is new about AI that may be relevant now?
    Why the attention to AI now? Is there anything new in AI worthy of the hype? Is
    this just “old wine in new bottles”?


    Analytics, statistical analysis, optimization, regression, clustering, segmentation,
    etc., all existed long before attention magnified around the term “analytics.”
    Airlines in particular have long used analytics for revenue management, pricing,
    and operational efficiencies. Marketing was using customer segmentation techniques
    long before analytics become the talk of the town. Fraud detection and credit
    scoring has been in action for several decades. Yet something was also new about
    the way analytics was done prior to the advent of Big Data technologies. Instead
    of following sampling approaches to do analytics, everybody started using Big
    Data technologies to run algorithms on the entire data set, thereby improving
    the performance and outputs of algorithms and sometimes stumbling upon insights
    that they were not able to find earlier.


    Underappreciating the differences between the old periods and new would have been
    a mistake. We now have access to the processing power these technologies require.
    What could once be done in theory can now be done in practice and at scale. Prior
    incarnations of AI emphasized rules-based systems (also known as expert systems),
    formulated to automate reasoning. The new AI relies completely on learning patterns
    from data.


    Business ecosystems have now become more digital. Previously, business applications
    and analytics systems required multiple integration points and data exchanges
    and often times humans had to manually connect the dots to carry out their tasks.
    But now with increasing digitization, links between applications and systems within
    organizations and externally are digitally native, allowing AI systems to interact
    directly with digital systems. These kinds of network effects accelerate AI adoption.
    As more and more machine-to-machine interactions happen, it opens up new opportunities
    for value creation (and destruction).


    It is true that there is a lot of hype behind AI, but there is also an equal amount
    of reality. To overcome the confusion, managers need to embrace a mindset that
    allows them to listen to two perspectives simultaneously.


    One perspective is about the potential that AI offers. Managers need to investigate
    AI technologies with relevance to their business so that they and their organization
    do not miss the opportunities. To assess AI’s applicability to their business,
    they may pursue pilot projects to gain experience, even if the results are not
    Earth-shattering. They can also pick up certain existing business processes or
    applications to test AI approaches to find the strengths and weaknesses.


    The other perspective is to question the promises of AI. On paper all these glorified
    examples may seem great. Managers need to truly understand and validate the relevance
    of AI for solving their specific problems and not get carried away by what the
    technology vendors say.


    ## What Makes Adopting AI So Hard?


    What problems you are trying to solve? Do you want to improve your internal processes
    like accounts, procurement, or HR functions? Are you looking to improve customer
    experience? Are there features in your product that would benefit from intelligence?
    Do you need your product to become more responsive to customers? Are there specific
    tasks that are repetitive, error-prone, and basically boring, which you can automate?
    Are there tasks where a little assistance can make your employees more efficient?
    AI technology can help you with all of these things and much more. If you have
    a chisel, you can use it to build any kind of statue. But to succeed, you just
    can’t take the plunge and start applying the technology anywhere and everywhere.
    You need an AI strategy that aligns to the overarching business strategy. Whether
    you’re improving your current business or building a new business model, AI should
    serve your business plan, not the other way around.


    However, there are challenges!


    AI can do magic, but before you can use it to solve problems, you need to look
    at it realistically and understand its inherent challenges. For example, AI has
    proved to be really good at classifying objects like tagging pictures, but it
    can’t tell you a lot about what’s in those pictures. In a business context, an
    AI application might be able to tell you whether users look delighted when they
    see a new product design, but they can’t answer a bigger question, which is whether
    the product will be a success.


    AI applications are data-hungry products. To train your AI application, you not
    only require a lot of data, but also robust data management practices. You’ll
    need to identify data sources, build data pipelines, clean and prepare data, identify
    potential signals in your data, and measure your results. Organizations that are
    serious about AI have historically been proficient at acquiring and managing data
    as a strategic asset.


    With the increase in the amount of data produced and analyzed within the enterprise
    and outside, there is a growing problem that enterprises are staring at—being
    drowned in a sea of data, analysis, dashboards, and data portals. Phrases such
    as “information overload” or “too many reports less insights” have become more
    common. Data-driven, a stepping stone towards AI, really means that all decisions
    and actions taken by the enterprise and employees are done by using the most factual
    and accurate data and there is a well-defined method of applying scientific analysis
    to this data to arrive at decisions best represents the actual scenario and context.


    Achieving this strategic vision requires a significant change in the thought process
    of how problems are tackled. It is less about putting technology at work. It is
    about being conscious about how you are using (or not using) the tools (data and
    algorithms) at your disposal. You have to ask questions and not maintain the status
    quo; let’s call it the “data-driven” strategy, which is a prerequisite to an effective
    AI strategy.'
