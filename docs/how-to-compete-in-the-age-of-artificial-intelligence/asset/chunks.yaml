  trans: '

    ### 帕累托原则


    常识告诉我们，要把精力投入到收益更大的地方。帕累托原则指出，80% 的结果源于 20%的原因。通过聚焦于少数场景（即那 20%），人工智能能够带来显著的价值，解决大部分（约
    80%）的问题。


    这正是约书亚所关注的。他发现上诉法院因 12 个主要原因驳回了大多数停车罚单。他的人工智能应用首先聚焦于这 12 个原因，并取得了相当程度的成功。现在，如果我们希望同一个人工智能应用去处理越来越多的原因，每增加一个新原因，就需要更多、更新的数据源，需要更长的训练时间来分析更罕见的案例，因此，这可能会对成功上诉的总数带来递减的贡献。


    要点：你需要结合现实情况，为你的人工智能计划定义目标或成果。投入更多精力或扩大范围，或许能带来增量收益，但这将伴随着成本的增加和复杂度的提升。


    ### 九十-九十法则


    贝尔实验室的汤姆·卡吉尔在软件开发过程中发现了一个有趣的规律：“前 90%的开发工作量只占项目时间表的 10%。而剩下的 10%的开发工作量却要占项目时间表的
    90%。”其根本问题在于，开发人员首先尝试完成简单和中等复杂度的功能，这在大多数情况下构成了 90%的工作范围。剩下的 10%的工作范围则全是复杂或高度复杂的功能，这些功能通常需要更多的开发工作量。


    人工智能通过从数据中学习来解决问题，无需对规则进行复杂编码。虽然这种方法简化了开发工作，但它却增加了对数据相关领域的依赖，主要在于你的数据源有多详尽，以便你的人工智能应用能够覆盖几乎所有可能的场景。在现实中，尽管我们声称可以获取海量数据，但其中大部分数据充满了噪音，而信号很少。因此，即使你付出最大、最一致的努力，可能也只能解决
    90%的常见场景，而解决那些罕见事件所需的工作量将困难得多。以停车罚单应用为例，可用于训练人工智能应用以处理“长尾”驳回原因的数据要少得多。


    要点：对于商业领域的人工智能而言，解决扩大范围的问题所需付出的努力，与最初的范围相比，可能会不成比例地增加。


    ### 侯世达定律


    侯世达定律指出，对任何事情所需时间的预估总是会少于实际所需时间——即使为了弥补人类低估时间的倾向而增加了时间预算，结果依然如此。


    人工智能的普及及其作为一个术语的流行，导致人们对其寄予了能解决所有问题的万能药般的期望，而问题恰恰就出在这里。首先是快速见效的期望，其次是对容错率的期望。


    基于一套明确定义的法律规则，约书亚能够弄清楚他的人工智能应用将如何解决问题。这种事先的清晰性也意味着在时间、预算和结果方面有了一定的确定性。简而言之，问题陈述与期望是明确一致的。并非所有的问题陈述都能如此一致。例如，当约书亚将他的人工智能应用扩展到更复杂的场景（与英国难民庇护相关的问题）时，他开发该应用花费了更长的时间。


    要点：人工智能解决方案并不遵循传统的项目管理准则。你需要不断试验才能达到期望的结果。因此，快速学习，并持续权衡成本与收益以及对错误的容忍度，是开发人工智能应用的关键。


    在本章中，我们涵盖了人工智能的几个基本方面，包括人工智能的成熟度连续体。下一章将讨论如何在人工智能时代重新构想竞争优势，包括人工智能在董事会中的作用。


    # 2. 在人工智能时代重新构想竞争优势


    人工智能作为一个研究和令人着迷的领域，已经存在了很长时间。这是一个曾因其进展缓慢而让支持者失望，如今却处于解决现实世界问题前沿的领域。随着它扩展到人类通常执行的各种活动中，它正迅速进入我们的日常生活，并常常引发对我们自身存在的担忧。


    随着人工智能开始实现其达到人类能力的潜力，企业开始思考如何利用人工智能来发挥人类和机器各自的特定优势。


    感知、思考和行动一直是人类进化的关键，但当你提到机器也能做这些事情时，就会引起很多质疑。人类在通用智能方面往往表现出更强的能力（我们称之为*快速并行处理与模式识别*），而在逻辑推理方面（我们称之为*顺序处理*），由于需要仔细评估影响/回报，往往会慢下来。另一方面，计算机/机器在狭窄领域的模式识别方面（称为*狭义智能*）正变得擅长，同时，只要有明确定义的输入和期望的输出，它们在逻辑推理方面则超快。


    根据其表现出的特性、交互边界的轮廓以及自身的局限性，人工智能可以分为四类，将在以下章节中讨论。


    ## 感知与响应机器


    最基本的人工智能系统是纯粹反应式的；它们被设计用来感知事件，并被编程以提供预先确定的响应。这些基础的人工智能系统既没有能力理解导致事件的原因，也没有能力形成记忆或利用过往经验来做出明智的决策。在
    20 世纪 90 年代末击败国际象棋特级大师加里·卡斯帕罗夫的“深蓝”（IBM 的象棋超级计算机）就是这类机器的完美例子。


    “深蓝”被设计用来感知棋盘上的棋子，并判断对手正在走哪一步棋。根据对手的走法，它被编程为从各种可能性中选择最优的走法来回应。然而，除了能访问一个庞大的棋谱和规则库之外，它没有任何关于过去的概念，也没有任何关于之前走了哪些棋的记忆。它被设计和编程用来感知当下，并用合适的走法做出回应。


    同样，谷歌的 AlphaGo（基于神经网络技术）已经击败了顶尖的人类围棋高手，它使用的分析方法比“深蓝”复杂得多，但它仍然无法评估所有潜在的未来走法。通过应用神经网络和复杂的算法，这些机器在玩特定游戏方面逐渐变得更好，并在它们擅长的游戏中击败人类专家，但它们不像人类那样容易适应其他情况。换句话说，这些机器无法在其被训练执行的特定任务之外发挥作用，并且很容易被愚弄。


    它们无法适应变化的情景（如果你改变游戏规则，它们就会停止工作，需要重新编程）。相反，这些机器每次遇到相同的情况时，都会以完全相同的方式行事。实际上，这种一致性的行为在不同的背景下是它们的优势。它带来了更高的信任度——想想看，你肯定希望你的自动驾驶汽车始终、每次都成为一个可靠的驾驶员。

    '
- fmt: '# Limited Memory Machines


    This type of machine has limited memory and limited reasoning capabilities. Self-driving
    cars do some of this already. For example, they observe other cars’ speed, proximity,
    and traffic signals. These observations are added to the self-driving cars’ reference
    library to simulate real-world representations and act based on what is pre-programmed.
    But this library of information about the real-world representations are only
    transient, it lacks the ability to learn from the environment in a continuous
    manner, the way human drivers compile experience over years behind the wheel.
    For self-driving cars to achieve human-level cognition, they need continuous updates
    to their pre-programmed representation of the world.


    So how can we build AI systems that are capable of full representations of the
    world, remember the experiences, improvise to adapt to the changing environmental
    conditions, and learn how to handle new unseen situations?


    # Theory of Mind


    This is the point where machines start to truly exhibit thinking and reasoning
    capabilities on their own. Machines in this more advanced class not only have
    the capability to form representations about the world, but also have the capability
    to interact and learn from other machines. In psychology, this is called “theory
    of mind”—thoughts are continuously evolving and reasoning capabilities are deciding
    trade-offs.


    The theory of mind is central to human evolution, because it allowed us to learn
    from social interactions. Assuming someday machines will achieve the same thinking
    and reasoning capabilities as humans, they need also to be aware of human motives
    and intentions; otherwise, the human-machine coexistence will become at best difficult,
    and at worst impossible.


    # Self-Aware Machines


    The pinnacle of AI development is to ultimately build systems that can not only
    think and reason but also exhibit consciousness.


    This is, in a sense, an extension of the “theory of mind” possessed by machines
    that are self-aware. For example, understanding and interpreting “I want that
    item” is a very different statement from “I wish I had that item”. It’s all about
    being conscious and being able to predict other people’s feelings. For example
    we may assume that aggressive drivers are either in a hurry or are impatient,
    so we let them go. Our self-driving cars need to exhibit the same understanding
    and give way. Without a theory of mind, we can’t make these kind of inferences.


    While we are probably far from creating machines that are self-aware, it is obvious
    that we will need quantum leaps in processing power for machines to exhibit a
    combination of vastly different types of sensing, thinking, and problem-solving
    capabilities—the hallmark of human intelligence. For example, today’s much hyped
    self-driving car doesn’t exhibit what we would consider common sense, such as
    pulling aside to assist a child who has fallen off her bicycle.


    It begs the question: How can businesses leverage AI to gain a competitive advantage?


    # AI in the Boardroom


    The very idea of artificial intelligence (AI) taking a seat in the boardroom may
    seem preposterous and far-fetched. After all, experience, lateral thinking, judgment,
    shrewdness, business acumen, and an uncanny ability to spot trends ahead of time
    are the critical skills required for the kinds of complicated matters that boards
    often deal with. However, at the same time, it is also true that AI is addressing
    some extremely nuanced, complicated, and important decision making processes.
    So, AI taking a seat in the boardroom may not be a bad idea at all!


    Businesses are going through heightened sense of volatility and there are strong
    headwinds in the form of technology initiated disruptions. We all know that the
    cost of bad decisions is high, and if these bad decisions are made at the board
    level then the implications are further magnified. While there are numerous examples
    of successful new product launches, mergers and acquisitions, and digital transformations,
    at the same time there is an even larger number of instances where many of these
    decisions have turned into failures, dragging the company into the ground. A report
    from Innosight (a growth strategy consulting firm) shows an alarming trend— “The
    33-year average tenure of companies on the S&P 500 in 1964 has narrowed to 24
    years by 2016 and is forecasted to shrink to just 12 years by 2027”.


    Over the past five years alone, companies that have been displaced from the S&P
    500 list include many iconic corporations such as Yahoo, DuPont, Staples, Dell,
    EMC, and Safeway, to name a few. While the reasons are many and some were beyond
    the control of corporate leaders, it is true that many of these disruptions were
    driven by a complex combination of technology shifts and economic shocks.


    The signs were there, but these companies missed the opportunities to adapt or
    change. For example, they continued to apply old business models to new markets
    (similar to the tiller effect discussed in Chapter [1](#467925_1_En_1_Chapter.xhtml)),
    were slow to respond to disruptive competitors in low-profit segments, or failed
    to adequately envision and invest in new growth areas that often takes a decade
    or longer to pay off. In the mean time, the explosion of “decacorn” companies
    across industry sectors like transportation (Uber and Lyft), financial services
    (ANT Financial and SoFi), aerospace (Space-X), real estate (We Work), healthcare
    (Outcome Health), and energy (Bloom Energy), as well as everything in the technology
    space has been accelerating the disruption by introducing new products, business
    models, and services to new markets and customers.


    In short, businesses have become too complex and there are blind spots—most leaders
    are under the false notion that future competition is coming from existing players,
    whereas the reality is that new competitors are entering, serving your customers
    in an entirely new way. You need to respond appropriately to these new set of
    rivals and for that your board and CEO need to make good decisions with the support
    of intelligent systems.


    Leaders across every industry are failing to understand these disruptive forces
    and need serious help in developing some kind of methodical approach to the madness.
    The Innosight paper recommends five essentials:


    1. *Spend time at the periphery*: A good place to start is to continuously scan
    the horizon and understand what the emerging unicorns are doing. Your corporate
    strategy and research teams need to spend time online or in physical spaces experiencing
    new products and services and reflect back on the impacts to your core business
    model. By doing so, you can spot early warning signs and opportunities that could
    cause massive shifts in value.'
  raw: '## Limited Memory Machines


    This type of machine has limited memory and limited reasoning capabilities. Self-driving
    cars do some of this already. For example, they observe other cars’ speed, proximity,
    and traffic signals. These observations are added to the self-driving cars’ reference
    library to simulate real-world representations and act based on what is pre-programmed.
    But this library of information about the real-world representations are only
    transient, it lacks the ability to learn from the environment in a continuous
    manner, the way human drivers compile experience over years behind the wheel.
    For self-driving cars to achieve human-level cognition, they need continuous updates
    to their pre-programmed representation of the world.


    So how can we build AI systems that are capable of full representations of the
    world, remember the experiences, improvise to adapt to the changing environmental
    conditions, and learn how to handle new unseen situations?


    ## Theory of Mind


    This is the point where machines start to truly exhibit thinking and reasoning
    capabilities on their own. Machines in this more advanced class not only have
    the capability to form representations about the world, but also have the capability
    to interact and learn from other machines. In psychology, this is called “theory
    of mind”—thoughts are continuously evolving and reasoning capabilities are deciding
    trade-offs.


    The theory of mind is central to human evolution, because it allowed us to learn
    from social interactions. Assuming someday machines will achieve the same thinking
    and reasoning capabilities as humans, they need also to be aware of human motives
    and intentions; otherwise, the human-machine coexistence will become at best difficult,
    and at worst impossible.


    ## Self-Aware Machines


    The pinnacle of AI development is to ultimately build systems that can not only
    think and reason but also exhibit consciousness.


    This is, in a sense, an extension of the “theory of mind” possessed by machines
    that are self-aware. For example, understanding and interpreting “I want that
    item” is a very different statement from “I wish I had that item”. It’s all about
    being conscious and being able to predict other people’s feelings. For example
    we may assume that aggressive drivers are either in a hurry or are impatient,
    so we let them go. Our self-driving cars need to exhibit the same understanding
    and give way. Without a theory of mind, we can’t make these kind of inferences.


    While we are probably far from creating machines that are self-aware, it is obvious
    that we will need quantum leaps in processing power for machines to exhibit a
    combination of vastly different types of sensing, thinking, and problem-solving
    capabilities—the hallmark of human intelligence. For example, today’s much hyped
    self-driving car doesn’t exhibit what we would consider common sense, such as
    pulling aside to assist a child who has fallen off her bicycle .


    It begs the question: How can businesses leverage AI to gain a competitive advantage?


    ## AI in the Boardroom


    The very idea of artificial intelligence (AI) taking a seat in the boardroom may
    seem preposterous and far-fetched. After all, experience, lateral thinking, judgment,
    shrewdness, business acumen, and an uncanny ability to spot trends ahead of time
    are the critical skills required for the kinds of complicated matters that boards
    often deal with. However, at the same time, it is also true that AI is addressing
    some extremely nuanced, complicated, and important decision making processes.
    So, AI taking a seat in the boardroom may not be a bad idea at all!


    Businesses are going through heightened sense of volatility and there are strong
    headwinds in the form of technology initiated disruptions. We all know that the
    cost of bad decisions is high, and if these bad decisions are made at the board
    level then the implications are further magnified. While there are numerous examples
    of successful new product launches, mergers and acquisitions, and digital transformations,
    at the same time there is an even larger number of instances where many of these
    decisions have turned into failures, dragging the company into the ground. A report
    from Innosight (a growth strategy consulting firm) shows an alarming trend— “The
    33-year average tenure of companies on the S&P 500 in 1964 has narrowed to 24
    years by 2016 and is forecasted to shrink to just 12 years by 2027”.


    Over the past five years alone, companies that have been displaced from the S&P
    500 list include many iconic corporations such as Yahoo, DuPont, Staples, Dell,
    EMC, and Safeway, to name a few. While the reasons are many and some were beyond
    the control of corporate leaders, it is true that many of these disruptions were
    driven by a complex combination of technology shifts and economic shocks.


    The signs were there, but these companies missed the opportunities to adapt or
    change. For example, they continued to apply old business models to new markets
    (similar to the tiller effect discussed in Chapter [1](#467925_1_En_1_Chapter.xhtml)),
    were slow to respond to disruptive competitors in low-profit segments, or failed
    to adequately envision and invest in new growth areas that often takes a decade
    or longer to pay off. In the mean time, the explosion of “decacorn” companies
    across industry sectors like transportation (Uber and Lyft), financial services
    (ANT Financial and SoFi), aerospace (Space-X), real estate (We Work), healthcare
    (Outcome Health), and energy (Bloom Energy), as well as everything in the technology
    space has been accelerating the disruption by introducing new products, business
    models, and services to new markets and customers.


    In short, businesses have become too complex and there are blind spots—most leaders
    are under the false notion that future competition is coming from existing players,
    whereas the reality is that new competitors are entering, serving your customers
    in an entirely new way. You need to respond appropriately to these new set of
    rivals and for that your board and CEO need to make good decisions with the support
    of intelligent systems.


    Leaders across every industry are failing to understand these disruptive forces
    and need serious help in developing some kind of methodical approach to the madness.
    The Innosight paper recommends five essentials:


    1.  *Spend time at the periphery* : A good place to start is to continuously scan
    the horizon and understand what the emerging unicorns are doing. Your corporate
    strategy and research teams need to spend time online or in physical spaces experiencing
    new products and services and reflect back on the impacts to your core business
    model. By doing so, you can spot early warning signs and opportunities that could
    cause massive shifts in value.'
  trans: '

    # 有限记忆机器


    这类机器拥有有限的记忆和推理能力。自动驾驶汽车已经在一定程度上做到了这一点。例如，它们会观察其他车辆的速度、距离和交通信号。这些观察结果会被添加到自动驾驶汽车的参考库中，以模拟现实世界的表征，并根据预设程序做出行动。但这种关于现实世界表征的信息库只是暂时的，它缺乏像人类驾驶员那样，通过多年驾驶经验来持续从环境中学习的能力。为了让自动驾驶汽车达到人类水平的认知能力，它们需要持续更新其预设的世界表征。


    那么，我们如何才能构建出能够完整表征世界、记住经验、随机应变以适应不断变化的环境条件，并学会处理前所未见的新情况的 AI 系统呢？


    # 心智理论


    这是机器开始真正展现自身思考与推理能力的阶段。处于这一更高级类别的机器，不仅具备形成世界表征的能力，还拥有与其他机器互动并向其学习的能力。在心理学中，这被称为“心智理论”——思想不断演变，推理能力则决定着权衡取舍。


    心智理论对人类进化至关重要，因为它使我们能够从社会互动中学习。假设有一天机器能够达到与人类相同的思考和推理能力，它们还需要理解人类的动机和意图；否则，人机共存将变得困难重重，甚至绝无可能。


    # 自我意识机器


    人工智能发展的顶峰，是最终构建出不仅能思考和推理，还能展现出意识的系统。


    从某种意义上说，这是拥有自我意识的机器所具备的“心智理论”的延伸。例如，理解并解读“我想要那个物品”与“我希望拥有那个物品”是两种截然不同的表述。这完全关乎于拥有意识，并能够预测他人的感受。例如，我们可能会认为那些咄咄逼人的司机要么是赶时间，要么是不耐烦，所以我们会让他们先走。我们的自动驾驶汽车也需要展现出同样的理解力并主动让行。没有心智理论，我们就无法做出这类推断。


    虽然我们距离创造出有自我意识的机器可能还很遥远，但显而易见的是，我们需要在计算能力上实现量子跃迁，才能使机器展现出将截然不同的感知、思考和问题解决能力结合起来的本领——而这正是人类智能的标志。例如，当今被大肆炒作的自动驾驶汽车，并不具备我们认为是常识的行为，比如靠边停车去帮助一个从自行车上摔下来的孩子。


    这就引出了一个问题：企业如何利用人工智能来获得竞争优势？


    # 董事会里的人工智能


    让人工智能在董事会中占有一席之地的想法，似乎荒谬且不切实际。毕竟，经验、横向思维、判断力、精明、商业头脑，以及提前发现趋势的非凡能力，才是处理董事会经常面对的复杂事务所必需的关键技能。然而，与此同时，人工智能也确实在处理一些极其微妙、复杂且重要的决策过程。因此，让
    AI 进入董事会或许并非坏事！


    企业正经历着高度的波动性，并且面临着技术引发的颠覆所带来的强劲逆风。我们都知道错误决策的代价是高昂的，而如果这些错误决策是在董事会层面做出的，其影响将进一步放大。尽管有无数成功推出新产品、成功并购和数字化转型的例子，但同时也有更多的情况是，这些决策中的许多最终以失败告终，将公司拖入深渊。来自
    Innosight（一家增长战略咨询公司）的一份报告显示了一个令人担忧的趋势——“1964 年标普 500 指数公司的平均任期是 33 年，到 2016 年已缩短至
    24 年，预计到 2027 年将缩减至仅 12 年”。


    仅在过去五年中，从标普 500 指数名单中消失的公司就包括许多标志性企业，如雅虎、杜邦、史泰博、戴尔、EMC 和西夫韦等。虽然原因众多，有些超出了企业领导者的控制范围，但事实是，许多这些颠覆是由技术变革和经济冲击的复杂组合驱动的。


    迹象早已存在，但这些公司错过了适应或改变的机会。例如，它们继续将旧的商业模式应用于新市场（类似于第 1 章讨论的“舵手效应”），对低利润领域的颠覆性竞争对手反应迟缓，或者未能充分设想并投资于那些通常需要十年或更长时间才能产生回报的新增长领域。与此同时，跨行业的“百角兽”公司激增，如交通运输业（优步和来福车）、金融服务业（蚂蚁金服和
    SoFi）、航空航天业（Space-X）、房地产业（We Work）、医疗保健业（Outcome Health）和能源业（Bloom Energy），以及科技领域的方方面面，它们通过向新市场和客户引入新产品、商业模式和服务，加速了颠覆的进程。


    简而言之，企业已经变得过于复杂，并且存在盲点——大多数领导者错误地认为未来的竞争来自现有参与者，而现实是，新的竞争者正在以全新的方式进入市场，服务你的客户。你需要对这些新对手做出恰当回应，为此，你的董事会和
    CEO 需要在智能系统的支持下做出正确的决策。


    各行各业的领导者都未能理解这些颠覆性力量，并且迫切需要帮助，以制定某种系统化的方法来应对这种混乱局面。Innosight 的报告提出了五项基本要素：


    1.  *关注边缘地带*：一个好的起点是持续扫描地平线，了解新兴的独角兽公司在做什么。你的企业战略和研究团队需要花时间在线或实地体验新产品和服务，并反思它们对你核心商业模式的影响。通过这样做，你可以发现可能导致价值发生巨大变化的早期预警信号和机遇。'
- fmt: '2. **关注客户行为的变化**：你不能再依赖稳定的假设；你需要以客户为中心，细致观察客户习惯，并认真评估他们不断变化的行为模式，无论这些模式看起来多么微小。虽然你可能认为自己提供了大量的服务，但实际上，你可能会发现新进入者正以更低的价格解决核心任务，从而蚕食你的业务。


    3. **采用未来回溯战略**：传统的战略方法始于分析历史情况、评估未来趋势的影响，并得出SWOT（优势、劣势、机会、威胁）之类的分析结果。然后你从今天出发进行外推，以制定明天的战略。虽然这种方法在过去相当有效，但鉴于当前VUCA（波动性、不确定性、复杂性和模糊性）已成为新常态的商业环境，这种方法限制了战略选择，并可能阻碍公司客观评估其现有模式。在当今动态的商业环境中，领导者感到不堪重负，担心无法履行自己的职责。


    为了保持面向未来，组织需要采用不同的战略。与其从现在出发向前看，他们必须设想一个基于不断变化的客户需求的未来环境和业务组合。对未来的设想仅仅是一个起点。然后你需要向后回溯，为当下制定一系列战略举措和创新干预措施。其基本假设是：明天可能与今天截然不同。


    4. **拥抱双元方法**：仅仅转型核心业务只能给公司带来线性的渐进式增长。因此，公司需要像数字平台公司所展示的那样，采用双元方法。在核心业务之外发现新的增长机会，然后分别进行投资和管理。


    5. **评估不作为的成本**：说到底，需要坚定的信念来优先考虑并调动包括资本和人才在内的资源，以拥抱双元方法。在决策时，领导者倾向于选择安全的方式——他们将新的增长想法搁置一旁。虽然这样做可能有合理且完全可以接受的理由，但鉴于技术演进的步伐和多种颠覆力量的作用，你需要持续验证你的战略。年度企业战略和蓝图的概念已不复存在。如今，你需要制定季度企业战略和蓝图，并通过衡量机会损失的影响，为不作为贴上价格标签。


    问题是，你如何为这种动态且快速变化的情景做好准备？


    一个可行的解决方案是将AI（人工智能）辅助工具纳入公司治理和战略的实践中。这并非要自动化领导力和治理，而是利用AI增强智能，用于战略决策和运营决策。如何做到这一点？


    AI可用于改进战略决策，通过分析资本配置并突出风险点——也许你的公司正在削减研发支出，而你的竞争对手却在增加研发和并购领域的投资，从而积极资助初创生态系统，并在市场情报方面做得更好，以识别可能进入你市场领域的新进入者。同样，AI可用于改进运营决策，通过分析内部流程和系统，确定员工生产力，预测人员流失，突出效率低下等问题。


    作为一项新技术，AI有其相当数量的反对者——高管们对其商业案例不确定，并认为人类能力对于在企业中获取AI的回报至关重要。


    拥有大量数据并产生洞察并非关键。如何消费分析结果才是真正的游戏规则改变者。在数字时代，毫无疑问，组织在数据和数据分析领域已经成熟。通过投资于基础设施、工具、流程和人才，他们提高分析洞察生产能力的速度，比提高消费能力的速度更快。结果，尽管他们的分析生产能力在提高，但分析消费的差距却在扩大——这与你的期望和预期恰恰相反。


    管理AI技术需要新的领导技能，包括实施、治理和正确使用分析洞察所需的技能。


    ## 利用AI创造战略优势


    世界的“数据化”和预测技术的快速演进，使我们能够解决定义明确但复杂的问题，例如推荐电影、诊断癌症和创建自动驾驶汽车，仅举几例。然而，仅仅使用技术，无论多么先进，并不能带来竞争优势。为了让技术推动业务战略，它必须嵌入到业务流程、客户交互触点、合作伙伴生态系统以及企业员工的日常生活中。


    毫无疑问，技术已经变得更好、更智能。因此，AI已经涉足需要创造力和智能的任务，例如制作电影预告片、创作音乐、执行面部识别和检测情绪。它们在与人对话方面也变得更出色，包括解释和从图像、机器生成数据、文本和非结构化数据中提取洞察。鉴于如此迅速的进展（所有这些都发生在过去几年里），我们有充分的理由感到兴奋，认为技术可能会提供一个“AI战略家”应用，直接协助CEO进行战略决策。


    我们如何构建一个“AI战略家”？它无法自行开发，至少目前还不能。它一开始就需要大量的人类参与。我们在很多方面都是独一无二的；我们可以跳出任务或问题的直接范围进行思考。AI缺乏这种能力。经过大量训练，它可以完美地执行一个定义明确的任务，但如果你改变问题定义，它就会出错。


    换句话说，为了让AI展现出类似人类的思维，它需要与人类协同行动，并学习如何无缝地执行概念性和分析性操作——包括问题定义、信号处理、模式识别、抽象与概念化、分析和预测。当然，这并不是说AI无法学习这些更高层次的技能——但那个状态还很遥远，非常遥远。


    为了让AI展现出有效的业务战略制定能力，它必须展现出**重构技能和持续学习能力**——即根据反馈重新定义和重新分析问题的过程。'
  raw: '2.  *Focus on* *changing customer behaviors* : You can no longer be under
    stable assumptions; you need to become customer obsessed, observe your customer
    habits minutely, and seriously evaluate their changing behavior patterns, no matter
    how tiny these patterns appear to be. While you may think you are providing a
    large bouquet of services, in reality you might find there are new entrants solving
    essential jobs at cheaper rates and thereby eating away at your business.


    3.  *Adopt a* *future-back strategy* : The conventional approach to strategy starts
    by analyzing what has happened historically, assessing the implications of future
    trends, and arriving at a SWOT kind of analysis. Then you extrapolate from today
    to formulate the strategy for tomorrow. While this approach has worked reasonably
    well in the past, given current business conditions where VUCA (volatility, uncertainty,
    complexity, and ambiguity) is the new normal, this approach constrains strategic
    choices and can prevent a company from objectively assessing their current model.
    In today’s dynamic business conditions, leaders are overwhelmed and worried about
    not living up to their responsibilities.


    To stay future ready, organizations need to adopt a different strategy. Instead
    of starting from the present and looking forward, they have to envision a future
    environment and business portfolios based around changing customer needs. The
    vision of the future only serves as the starting point. You then need to move
    backward in time to develop a set of strategic initiatives and innovation interventions
    for the present. The underlying assumption is that tomorrow may not resemble today.


    4.  *Embrace dual approach* : Transforming the core business is only going to
    give companies incremental linear growth. Hence, companies need to adopt a dual
    approach like the digital platform companies have shown. Discover new growth opportunities
    outside the core, and then invest and govern them separately.


    5.  *Assess the* *cost of inaction* : All said and done, it requires a strong
    conviction to prioritize and marshal your resources including capital and talent
    to embrace the dual approach. When it comes to decision making, leaders tend to
    take the safe way out—they push new growth ideas to the back burner. While there
    may be valid and perfectly acceptable reasons to do so, you need to continuously
    validate your strategy given the pace of technology evolution and multiple forces
    of disruption at play. There is no longer the notion of annual corporate strategy
    and blueprints. Nowadays you need to have a quarterly corporate strategy and blueprints
    and estimate a price tag for inaction by measuring the impact of lost opportunities.


    The question is, how do you prepare for such dynamic and fast changing scenarios?


    One plausible solution is to incorporate AI supplements into the practice of corporate
    governance and strategy. This is not about automating leadership and governance,
    but rather about augmenting intelligence using AI, for both strategic decision-making
    and operations decision-making. How do you do this?


    AI could be used to improve strategic decision-making by analyzing capital allocations
    and highlighting concerns—maybe your company is cutting spending on research and
    development while your competitors are increasing investment in the R&D and M&A
    areas, thereby actively funding startup ecosystems and becoming better at market
    intelligence to identify potential new entrants moving into your market space.
    Similarly, AI can be used to improve operational decision-making by analyzing
    internal processes and systems and determining employee productivity, predicting
    churn, highlighting inefficiencies, etc.


    Being a new technology, AI has its fair share of naysayers—executives are uncertain
    of its business case and believe that human capabilities are critically important
    to capture the returns from AI in the enterprise.


    Having lots of data and producing insights is not the key. How you consume the
    analytical results is the real game-changer. In the digital era, no doubt organizations
    have matured in the data and analytics areas. By investing in infrastructure,
    tools, processes, and talent, they were able to improve their analytical insights
    production capabilities more quickly than they were able to improve the consumption
    abilities. As a result, despite the fact that their analytics production capabilities
    were improving, the analytics consumption gap is widening—the opposite of what
    you would hope and expect.


    Managing AI technology demands new leadership skills, including those required
    to implement, govern, and make right use of the analytical insights.


    ## Using AI to Create a Strategic Advantage


    “Datafication” of the world and rapid evolution in prediction technology have
    gotten us to solve well-defined but complex problems like recommending movies,
    diagnosing cancer, and creating autonomous vehicles, to name a few. However, just
    using the technology, no matter how advanced, does not deliver a competitive advantage.
    For technology to advance the business strategy, it must be embedded into business
    processes, customer interaction touch points, partner ecosystems, and into the
    day-to-day life of the enterprise workforce.


    No doubt, technology has gotten better and smarter. As a result, AI has forayed
    into tasks that require creativity and intelligence, such as creating movie trailers,
    composing music, performing facial recognition, and detecting emotions. They have
    also gotten better at conversing with humans, including interpreting and extracting
    insights from images, machine generated data, text, and unstructured data. Given
    such rapid progress, all in the last few years, there are good reasons to get
    excited that technology might deliver a “AI strategist” app that can directly
    assist CEOs in their strategic decisions.


    How do we build a “AI strategist”? It can’t be developed by itself, at least for
    now. It requires significant human involvement to begin with. We human beings
    are unique in many ways; we can think outside the immediate scope of a task or
    problem. AI lacks this capability. After a lot of training, it can flawlessly
    execute a well-defined task, but if you change the problem definition, it will
    falter.


    In other words, for AI to exhibit human-like thinking, it needs to act in concert
    with humans and learn how to seamlessly execute conceptual and analytical operations—including
    problem definition, signal processing, pattern recognition, abstraction and conceptualization,
    analysis, and prediction. Of course, this is not to say that AI is incapable of
    learning these higher-order skills—but that state is far away, too far away.


    For AI to demonstrate effective business strategy development, it must demonstrate
    *reframing skills and continuous learning capabilities* —the process of redefining
    and reanalyzing the problem with feedback.'
  trans: '

    2. **关注客户行为的变化**：你不能再依赖稳定的假设；你需要以客户为中心，细致观察客户习惯，并认真评估他们不断变化的行为模式，无论这些模式看起来多么微小。虽然你可能认为自己提供了大量的服务，但实际上，你可能会发现新进入者正以更低的价格解决核心任务，从而蚕食你的业务。


    3. **采用未来回溯战略**：传统的战略方法始于分析历史情况、评估未来趋势的影响，并得出 SWOT（优势、劣势、机会、威胁）之类的分析结果。然后你从今天出发进行外推，以制定明天的战略。虽然这种方法在过去相当有效，但鉴于当前
    VUCA（波动性、不确定性、复杂性和模糊性）已成为新常态的商业环境，这种方法限制了战略选择，并可能阻碍公司客观评估其现有模式。在当今动态的商业环境中，领导者感到不堪重负，担心无法履行自己的职责。


    为了保持面向未来，组织需要采用不同的战略。与其从现在出发向前看，他们必须设想一个基于不断变化的客户需求的未来环境和业务组合。对未来的设想仅仅是一个起点。然后你需要向后回溯，为当下制定一系列战略举措和创新干预措施。其基本假设是：明天可能与今天截然不同。


    4. **拥抱双元方法**：仅仅转型核心业务只能给公司带来线性的渐进式增长。因此，公司需要像数字平台公司所展示的那样，采用双元方法。在核心业务之外发现新的增长机会，然后分别进行投资和管理。


    5. **评估不作为的成本**：说到底，需要坚定的信念来优先考虑并调动包括资本和人才在内的资源，以拥抱双元方法。在决策时，领导者倾向于选择安全的方式——他们将新的增长想法搁置一旁。虽然这样做可能有合理且完全可以接受的理由，但鉴于技术演进的步伐和多种颠覆力量的作用，你需要持续验证你的战略。年度企业战略和蓝图的概念已不复存在。如今，你需要制定季度企业战略和蓝图，并通过衡量机会损失的影响，为不作为贴上价格标签。


    问题是，你如何为这种动态且快速变化的情景做好准备？


    一个可行的解决方案是将 AI（人工智能）辅助工具纳入公司治理和战略的实践中。这并非要自动化领导力和治理，而是利用 AI 增强智能，用于战略决策和运营决策。如何做到这一点？


    AI 可用于改进战略决策，通过分析资本配置并突出风险点——也许你的公司正在削减研发支出，而你的竞争对手却在增加研发和并购领域的投资，从而积极资助初创生态系统，并在市场情报方面做得更好，以识别可能进入你市场领域的新进入者。同样，AI
    可用于改进运营决策，通过分析内部流程和系统，确定员工生产力，预测人员流失，突出效率低下等问题。


    作为一项新技术，AI 有其相当数量的反对者——高管们对其商业案例不确定，并认为人类能力对于在企业中获取 AI 的回报至关重要。


    拥有大量数据并产生洞察并非关键。如何消费分析结果才是真正的游戏规则改变者。在数字时代，毫无疑问，组织在数据和数据分析领域已经成熟。通过投资于基础设施、工具、流程和人才，他们提高分析洞察生产能力的速度，比提高消费能力的速度更快。结果，尽管他们的分析生产能力在提高，但分析消费的差距却在扩大——这与你的期望和预期恰恰相反。


    管理 AI 技术需要新的领导技能，包括实施、治理和正确使用分析洞察所需的技能。


    ## 利用 AI 创造战略优势


    世界的“数据化”和预测技术的快速演进，使我们能够解决定义明确但复杂的问题，例如推荐电影、诊断癌症和创建自动驾驶汽车，仅举几例。然而，仅仅使用技术，无论多么先进，并不能带来竞争优势。为了让技术推动业务战略，它必须嵌入到业务流程、客户交互触点、合作伙伴生态系统以及企业员工的日常生活中。


    毫无疑问，技术已经变得更好、更智能。因此，AI 已经涉足需要创造力和智能的任务，例如制作电影预告片、创作音乐、执行面部识别和检测情绪。它们在与人对话方面也变得更出色，包括解释和从图像、机器生成数据、文本和非结构化数据中提取洞察。鉴于如此迅速的进展（所有这些都发生在过去几年里），我们有充分的理由感到兴奋，认为技术可能会提供一个“AI
    战略家”应用，直接协助 CEO 进行战略决策。


    我们如何构建一个“AI 战略家”？它无法自行开发，至少目前还不能。它一开始就需要大量的人类参与。我们在很多方面都是独一无二的；我们可以跳出任务或问题的直接范围进行思考。AI
    缺乏这种能力。经过大量训练，它可以完美地执行一个定义明确的任务，但如果你改变问题定义，它就会出错。


    换句话说，为了让 AI 展现出类似人类的思维，它需要与人类协同行动，并学习如何无缝地执行概念性和分析性操作——包括问题定义、信号处理、模式识别、抽象与概念化、分析和预测。当然，这并不是说
    AI 无法学习这些更高层次的技能——但那个状态还很遥远，非常遥远。


    为了让 AI 展现出有效的业务战略制定能力，它必须展现出**重构技能和持续学习能力**——即根据反馈重新定义和重新分析问题的过程。

    '
- fmt: 'Amazon 提供了一个绝佳的范例，展示了人工智能与人类如何在持续学习模式下执行商业战略。该公司拥有多个 AI 系统（供应链优化、库存预测系统、销售预测系统、利润优化系统、推荐引擎等）。这些系统相互交织，并与人类战略家协同，共同构建了一个集成且运转顺畅的
    AI 生态系统。例如，如果销售预测系统检测到某件商品的受欢迎程度正在上升，它会触发一系列通信：更新库存预测，进而触发供应链系统中的优化流程，以更新各仓库的库存。这会导致推荐引擎更多地推送该商品，利润优化系统调整定价，营销系统启动实时营销活动和折扣。由此产生的影响又会反馈给销售预测系统。这些仅仅是部分一阶效应；在系统与下游合作伙伴生态系统之间还存在无数进一步的交互。虽然许多操作是自动完成的，但人类也扮演着重要角色：他们设计实验并审查数据轨迹，以使
    AI 系统持续学习和改进。人类还特别关注从 AI 捕获的异常和模式中提取高阶洞察，这些洞察本质上为亚马逊的下一步战略举措提供了思考素材和动力。例如，如果某件商品变得受欢迎是不寻常的，那么就需要进行一定程度的调查。这是一款长尾商品，但因为之前未观察到的某种独特性而变得受欢迎吗？是因为该商品因另一款相关但昂贵的商品失宠而突然获得了粉丝追捧吗？这种热度有多大的季节性或短暂性？


    企业如何创建一个有效的 AI 战略家应用？从广义上讲，有三个要求，如下所述。


    ### 面向未来的目标


    首先，你必须定义期望的结果。由于战略可以涵盖任何事物，因此从一个定义明确的领域开始非常重要；例如，你可以专注于竞争情报，特别关注独角兽公司。人类战略家必须提供初始问题集并帮助解决歧义。然后，AI
    应用可以基于持续反馈学习改进，并最终在其应做的事情上变得更好。


    没有具体目标的反面就是漫无目的地瞎忙。强大的技术总是伴随着这种危险——它会使我们沉迷于思考它能做什么，而不是它应该做什么。然后，我们不可避免地会被 AI 的能力所驱动，而不是去解决我们需要解决的问题。换句话说，如果你手里只有一把锤子，那么所有东西看起来都像钉子。


    ### 人在回路中的方法


    问题陈述、数据、算法、对话界面、反馈机制、自动化能力，以及最重要的人类战略家（无论是进行干预还是优化），必须形成一个紧密集成的连续体。这种集成至关重要，因为人类和技术应该只有一个目标——优化全局结果，而不是优化单个任务。为什么？让我们以“评估一个新的商业机会”这个问题陈述为例。这需要围绕竞争威胁、与组织愿景的战略契合度、空白市场评估、自建与购买决策的审慎性等进行更深入的研究。所有这些领域都是相互关联的，但本身也是一个子领域。如果它们被分开分析，除非有一种机制来整合发现，并且人类作为解决权衡问题的关键组成部分参与其中，从而产生新的洞察，否则
    AI 战略家将无法接近答案。


    随着 AI 战略家处理越来越复杂的问题，人类将不再忙于收集数据（这是他们目前花费大量时间的地方），而是利用其理解广泛背景和连接不同领域洞察的独特能力，将更多时间用于理解数据并将这些经验教训反馈给
    AI 战略家，这最终将有助于 AI 战略家表现得更好。


    按照这个速度，认为有一天 AI 战略家会变得足够聪明以超越人类战略家并非荒谬之谈。那肯定会是很有趣的一天。


    ### 精心设计的无界面


    AI 战略家必须能够将其发现和建议传达给人类；反之，人类应该能够理解、检查并验证这些建议，并向 AI 战略家提供反馈。


    人类能够跳出固有思维模式，并执行推理、验证和重新定义框架等更高阶的任务，因为我们能够有效沟通。如果 AI 战略家像一个黑盒一样运作，并产生难以理解的输出，它就失去了价值。人类无法解释这些输出，因此无法通过连续的重新定义框架来建立更深入、更丰富的洞察。为了避免这种情况在开始时发生，AI
    战略家必须被设计成透明且具有对话性。'
  raw: 'Amazon provides an excellent example of how AI and humans, in a continuous
    learning mode, execute the business strategy. The company has several AI systems
    (supply chain optimization, inventory forecasting system, sales forecasting system,
    profit optimization system, recommendation engine, and many others). These systems
    are intertwined with one another and with human strategists to create an integrated,
    well-oiled AI ecosystem. For example, if the sales forecasting system detects
    that the popularity of an item is increasing, it triggers a series of communications:
    update the inventory forecast, which triggers an optimization process in the supply
    chain system to update inventory across warehouses. This causes the recommendation
    engine to push the item more, the profit optimization system adjusts pricing,
    and the marketing system and launches real-time campaigns and discounts. The resulting
    impact in turn feeds back to the sales forecast system. These are only some of
    the first-order effects; there are numerous further interactions between the systems
    and partner ecosystems that occur downstream. While many of the operations happen
    automatically, human beings also play an important role: they design experiments
    and review data traces to make the AI systems continuously learn and improve.
    Humans also pay specific attention to extract higher-order insights from anomalies
    and patterns captured by AI, that essentially serves as food for thought and as
    the impetus for Amazon’s next strategic moves. For example, if the item gaining
    popularity is not usual, then it requires a certain amount of investigation. Is
    it a long tail item but gaining popularity because of certain uniqueness that
    was not observed earlier? Is it because the item suddenly found a fan following
    due to another related but costly item falling out of favor? How seasonal or short-lived
    is this moment?


    How can businesses create an effective AI strategist app? At a broad level, there
    are three requirements, described next.


    ### A Future-Back Goal


    To start with, you must define the desired outcome. Since strategy can encompass
    anything and everything, it is important to have a well-defined area to begin
    with; for example, you could focus on competitive intelligence with a special
    focus on unicorns. Human strategists must provide the initial set of questions
    and help resolve ambiguity. The AI app can then learn to improvise based on continuous
    feedback and eventually become better at what it is supposed to do.


    The opposite of not having a specific goal is to go on a wild goose chase. There
    is always this danger with powerful technology—it leads us to become preoccupied
    in thinking about what it *can* do rather than what it *should* do. We then invariably
    get caught up and get driven by AI’s capabilities, rather than addressing the
    problems that we need to solve. In other words, if all you have is a hammer, then
    everything looks like a nail.


    ### A Human-in-the-Loop Approach


    The problem statement, data, algorithms, conversational interfaces, feedback mechanisms,
    automation capabilities and most importantly the human strategist (either to intervene
    or to refine) must form a tightly integrated continuum. This integration is critical,
    because the human and the technology should have only one objective—to optimize
    for the global outcome rather than for individual tasks. Why? Let’s take the problem
    statement as, “evaluate a new business opportunity”. This will need deeper research
    around competitive threats, strategic fit to the organization’s vision, evaluation
    of whitespaces, build vs. buy decision prudence, etc. All these areas are related
    but are also a sub-domain on their own. If they are analyzed separately, the AI
    strategist will be no closer to an answer unless there is a mechanism to integrate
    the findings and the human is involved as an integral component to resolve trade-offs,
    thereby generating new insights.


    As the AI strategist takes on increasingly complex questions, human beings, instead
    of running around to collect data (which is where they spend a lot of time today),
    with their unique ability to understand the broad context and connect insights
    from disparate spheres, will spend more time making sense of the data and feeding
    those lessons back to the AI strategist, which eventually will help make the AI
    strategist perform better.


    At this rate, it is not absurd to think that one day the AI strategist will become
    smart enough to surpass the human strategist. It will be an interesting day for
    sure.


    ### A Well-Designed No-UI


    The AI strategist must be able to communicate its findings and recommendations
    to people; conversely, people should be able to understand, examine, and validate
    those recommendations and provide feedback to the AI strategist.


    Humans are able to think outside the box and carry out higher-order tasks of reasoning,
    validating, and reframing because we communicate effectively. If the AI strategist
    operates as a black box and creates outputs that are incomprehensible, it loses
    its value. People cannot interpret the outputs and therefore cannot build deeper
    and richer insights through successive reframing. To avoid this situation right
    at the onset, the AI strategist must be designed to be transparent and conversational.'
  trans: '

