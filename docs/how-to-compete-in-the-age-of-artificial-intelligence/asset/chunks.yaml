  trans: '

    # 新兴产业与人工智能经济


    新兴产业并非一蹴而就；将开创性的想法转化为可行的商业价值主张需要数十年时间，最终才能建立新产业并创造新就业岗位。鉴于这一漫长历程，真正的问题在于：这些新兴产业和新职业类别能否足够快地涌现，以维持经济中足够高的就业水平，并抵消自动化和人工智能带来的失业影响？


    争相吸纳人工智能人才的公司，主要专注于开发人工智能解决方案以实现自动化和优化，而非创造新产业。已有无数例子证明了这一点：`Uber`、`Lyft`、`Airbnb`、`亚马逊`以及许多其他算法驱动的公司，要么专注于提升现有商业模式的效率，要么通过消除流程瓶颈（中间环节）来创造新的商业模式。这两种方法虽然为企业和像你我这样的终端用户带来了阶跃式的效率提升，但未必能创造新产业或新就业岗位。


    因此，企业和政府同样需要找到一种方法，利用本已稀缺的人工智能人才，为能够催生新产业和新类型就业岗位的科技进步发现与探索做出贡献。


    ## 制胜技能：面向不断演进的人工智能经济的情绪智力技能


    `巴伦-科恩`普及了共情-系统化理论。人们运用不同的技能和优势来高效完成工作。共情技能有助于识别、理解和解决冲突，激励团队，并回应他人的心理状态；而系统化技能则有助于分析、理解、推理、排障、规划和预测结果。根据`巴伦-科恩`的研究，女性在共情方面得分更高，男性在系统化方面得分更高。但这并不意味着女性不擅长系统化，或男性不擅长共情。


    继续我们关于人工智能对工作岗位影响的讨论，未来十年可能消失的岗位并不局限于特定行业或企业层级中的某个群体——其影响广泛且遍及各个层级。人工智能代理不仅会取代卡车司机和流水线工人，还会取代放射科医生、财务规划师、保险代理人和保安等——这些传统上多为男性主导的岗位。同样显而易见的是，随着越来越多的工作实现自动化，对判断力、共情力、同情心、影响力和参与度等技能（女性通常更擅长的技能）的需求将发生显著转变。为简便起见，我们姑且将这些称为情绪智力（EQ）技能。


    我们正走向一个人工智能将成为伟大平衡器的世界。如何实现？以放射科为例。人工智能代理可能判定你的放射扫描显示癌症，而当有人类坐下来向你解释最佳治疗方案时，你会感到安心。想象一下，如果不是人类，而是机器用单调乏味的声音告诉你治疗计划和下一步该做什么！同样，在商业领域，人工智能代理可能建议公司需要采取哪些运营改进措施以实现更好的利润率。但由人类主导，说服人们执行这些建议仍然有效得多。想象一下，机器向你的员工发送指令性行动方案！


    在人工智能经济中，机器将越来越多地承担“系统化”类型的工作（男性优于女性），而对“共情”类型技能（女性优于男性）的需求将更大。我们通常高度重视技术技能，而往往低估情绪智力技能。然而，鉴于人工智能主导的未来已近在眼前，我们所有人——男性、女性和组织——都需要开始关注情绪智力技能的重要性。


    如何开始培养你的情绪智力技能？与任何技术技能一样，一个人的情绪智力技能可以通过培训以及提供适当的支持系统来提升。以下是三个入门步骤：


    - **建立你自己的情绪智力基线**：人类是社会性动物。我们在团队中工作；我们相互沟通，共同解决问题。然而，在提供反馈时，我们大多数人非常不愿意批评他人的人际交往能力，因为这种反馈会让我们陷入尴尬境地，并产生防御心理。许多敏锐高效的人根本不知道他们需要提升情绪智力技能，因为他们根本没有留意来自同事和团队的微妙信号。因此，第一步是自我觉察自己的情绪智力水平，并留意你收到的反馈，尤其是诸如“你很难共事”、“你太好争论”、“你需要更好地解读他人的肢体语言”之类的评论。


    - **承认情绪智力技能同样重要**：我们一直过于关注系统化技能，无论是系统、技术、工程、数学还是相关领域。尽管每个角色都有其情绪智力维度，但历史上我们一直将其置于次要位置。例如，医生经过良好训练来识别和治疗疾病。尽管他们被期望与患者坐下来，根据患者的偏好和生活方式制定个性化的治疗方案，但他们往往忽视或委托他人来处理这种与他人建立联系的特定方面。你必须首先明确你要交付的成果，而非活动本身——是正确诊断最重要？还是实际上改善患者的健康？如果是后者，那么开始关注你的情绪智力技能同样重要。


    - **将学习与知识管理重新定义为情绪智力管理**：学习与知识管理职能对业务需求的理解往往过于短视。其重点是培训你完成当前任务，而非为未来角色做准备——在未来，你的人际交往技能将比技术技能重要得多。你需要诚实地评估自己的情绪智力水平。你需要找到一位能给予你诚实反馈并指导你的教练，并且你需要有意识地改进不足之处。情绪智力的难点在于，我们不愿承认自己存在情绪智力短板。我们谁都不想承认自己的情绪智力需要提升，而且我们脑海中根深蒂固地认为情绪智力是与生俱来、不可改变的。这两种想法都是错误的。


    随着人工智能日益融入我们职业和个人生活的方方面面，我们技能中“较软”的方面需要变得更加重要。

    '
- fmt: '### Use Case: AI and Amazon Flywheel


    More than any data-driven company, Amazon has delivered stupendous services and
    products with its audacious vision for an AI-powered enterprise. At the center
    is Amazon’s “flywheel,” which ensures various parts of its enterprise functions
    work in tandem, by feeding into each other to deliver business outcomes. Another
    interesting concept that propels Amazon to keep delivering amazing innovative
    products and offerings is the “future-back-to-the-present” approach. At Amazon,
    any initiative starts with the end in mind—a “six pager” pitch starting with a
    speculative press release describing the finished product or service.


    AI is at the core of this flywheel, where algorithm powered innovations in one
    part of the company are extensively leveraged to accelerate the efforts of other
    teams. Amazon meticulously examines every opportunity to monetize what they build.
    For example, during the early days of Amazon, they built robust data management
    and AI platforms to efficiently run their own business. Later they realized if
    they can offer these internal capabilities as a paid service to outsiders, they
    would not only make money, but they will also get an opportunity to understand
    how people are using the AI services and what they are doing with it. That way
    they could churn out more meaningful offerings in the future.


    Amazon had its humble beginning as a bookseller. First it established a marketplace
    and launched a powerful e-commerce platform. Perhaps Amazon was the first company
    to truly realize the importance of a platform. It opened up its marketplace to
    other retailers, thus establishing a sharing economy that took advantage of its
    e-commerce platform. It built warehouses to fulfill orders for customers, and
    then offered fulfillment services by Amazon to its network of marketplace business
    partners, logistics, and distribution companies and other channels. Amazon found
    a way to monetize the excess computing capacity (`AWS`) they had built to support
    the business during the busiest shopping seasons.


    “Amazon Go” leverages the computer vision and AI algorithms to offer a cashier-less
    shopping experience to supermarket shoppers. The intent is not to open thousands
    of Go stores across the country, but to offer this AI-powered retail infrastructure
    to shopkeepers as a subscription. Another monetization idea in the making.


    Right in the formative years Amazon realized the potential of AI and started investing
    in it. In the early days, Amazon’s AI talent was scattered across divisions and
    cross-leverage of the innovations and ideas were sporadic. The top-down push to
    institutionalize AI across the company brought in significant changes. The company
    put “serving its customers” as the key driver for anything they would do, which
    resulted in islands of AI innovations to collaborate across projects and share
    their solutions with other groups, thus putting the flywheel in motion.


    #### The Conversational Interface Effect


    Amazon’s Echo line of products powered by the voice platform `Alexa` also sprang
    from a six-pager, delivered to Bezos in 2011 during an annual planning process
    called `Operational Plan One`. The vision was to come out with a low-cost computer
    with all its brain in the cloud that you could interact with over voice—you speak
    to it and ask questions, and it engages in a conversation with you and provides
    answers.


    Building Echo required a level of AI prowess that the company did not have at
    that point. However, thanks to its approach of working backward from an imagined
    final product, the high-level blueprints included features that were critical
    to making Echo. The voice recognition feature in particular demanded a level of
    conversational AI that was yet to be invented. For example, activating the AI
    system by using a “wake word” (`“Hey Alexa!”`), hearing and interpreting natural
    language commands, filtering out noise and delivering non-absurd answers, etc.
    Were not conceptualized anywhere.


    In addition, for Echo to be commercially successful, it has to be cheap, extremely
    effective in voice recognition capabilities, and be able to deliver never before
    experienced end-user satisfaction. For all this to happen, Amazon had to build
    an AI system that could understand and respond to natural language queries in
    noisy conditions. The biggest bottleneck was where Amazon would get massive amounts
    of conversational data to train the AI.


    The answer to this question was found in the Amazon flywheel. It started leveraging
    `AWS` (its cloud infrastructure offering) to create a speech recognition service
    (`Alexa`) that became a valuable asset beyond its original scope of fulfilling
    the Echo’s mission. Once they developed Echo as a far-field speech recognition
    device, they saw the opportunity to do something bigger. First, they integrated
    `Alexa` into their other products and offerings: you converse with `Alexa` to
    access Amazon Music, Prime Video, your personalized recommendations from the Amazon
    shopping website, and other services. Second, they expanded the scope of `Alexa`
    to become a voice service by allowing developers to create their own voice-enabled
    applications (known as “skills”) to run on Echo.


    In the beginning Amazon struggled to find conversational data to train `Alexa`,
    but once customers began using Echo, Amazon steadily gathered real conversational
    data. This conversational data became a powerful learning and experimental test
    bed—once you have a device in the market, you get access to real data that is
    so fundamental to improving everything, especially the underlying platform.


    #### Democratizing AI


    Amazon realized that if they could externalize what they were doing internally
    using their cloud platform and their own data scientists, they could generate
    tremendous value. They started focusing on how to simplify AI. Another epic six-pager
    was in the making.


    While the tactical aspect was to add machine-learning services to `AWS`, the broader
    aspect was a grand vision. How could `AWS` become the destination choice to build
    AI applications for all and sundry? You don’t have to invest on platforms, you
    don’t have to have data scientist teams of your own—you just need to define the
    problem you are trying to solve. The rest is all on `AWS`.


    In 2016, `AWS` released new machine-learning services—`Polly` (a text-to-speech
    component), `Lex` (a natural language processing engine), `Rekognition` (a deep
    learning offering for face recognition)—and launched a more comprehensive AI platform
    called `SageMaker`. These offerings allow `AWS` customers (spanning from giants
    like Pinterest and Netflix to tiny startups) to build their own AI-powered applications.'
