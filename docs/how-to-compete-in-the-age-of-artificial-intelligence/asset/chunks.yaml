- fmt: '# New Industries and the AI Economy


    New industries are not created overnight; it takes decades to transform pathbreaking
    ideas into viable commercial value propositions, which eventually leads to setting
    up new industries and creating new jobs. Given this long journey, the real question
    is, will these new industries and new job categories emerge fast enough to maintain
    sufficiently high employment levels in the economy and offset the jobless impact
    due to automation and AI?


    Companies lapping up AI talent are primarily focused on creating AI solutions
    to automate and optimize, not to create new industries. There are numerous examples
    already proving this mentioned point: `Uber`, `Lyft`, `Airbnb`, `Amazon`, and
    many other algorithm-powered companies are either focused on improving efficiency
    out of current business models or creating new business models by removing process
    bottlenecks (intermediaries). These two methods, while introducing step-change
    efficiencies to businesses as well as end-users like you and me, are not necessarily
    creating new industries or new jobs.


    Hence, it is equally important for companies and governments to find a way to
    use the already scarce AI talent to contribute to the discovery and pursuit of
    scientific and technological advances that could lead to creation of new industries
    and new types of jobs.


    ## Skills to Succeed: EQ Skills for Evolving AI Economy


    `Baron-Cohen` popularized the empathizing-systemizing theory. People bring different
    skills and strengths to do their jobs effectively. Empathizing skills come to
    aid at identifying, understanding, and resolving conflicts, motivating teams,
    and responding to the mental states of others, whereas systemizing skills come
    to aid at analyzing, understanding, reasoning, troubleshooting, planning, and
    predicting outcomes. According to `Baron-Cohen`, women score higher on empathizing
    and men score higher on systemizing. This doesn’t mean that women can’t excel
    at systemizing or men can’t excel at empathizing.


    Continuing our conversation on the impact of AI on job roles, the roles that are
    likely to disappear over the next decade are not limited to a particular industry
    or cadre in the corporate hierarchy—the impact is far and wide and across all
    levels. AI agents will replace not only truck drivers and assembly line workers,
    but also radiologists, financial planners, insurance agents, and security guards,
    to name a few—all traditionally male-dominated roles. It is also abundantly clear
    that as more and more work becomes automated, there will be a significant shift
    in demand for the skills like judgment, empathy, compassion, influence, and engagement
    (skills in which women more often excel). For simplicity, let’s call these as
    emotional quotient (EQ) skills.


    We are heading toward a world where AI would act as a great leveler. How? Take
    the example of radiology. The AI agent may determine that your radiology scans
    indicate cancer, and you will be at ease when a human sits down with you and explains
    the best course of action. Imagine, instead of a human, the machine tells you
    in a boring and monotonic voice what your treatment plan and next steps should
    be! Similarly in case of business, the AI agent may suggest what operational improvement
    actions are required in the company to deliver better margins. It is still much
    more effective for a human to lead the charge to persuade people to execute the
    recommendations. Imagine the machine sending out prescriptive actions to your
    employees!


    In the AI economy, where machines will increasingly do the “systemizing” type
    of work (where men excel over women), there will be a greater need for “empathizing”
    type of skills (where women excel over men). Usually we put a premium on our technology
    skills and often we tend to downplay our EQ skills. However, given the AI led
    future knocking at the immediate horizon, all of us—men, women, and organizations—need
    to start paying attention to the importance of the EQ skills.


    How can you get started developing your EQ skills? Just like any technical skill,
    a person’s EQ skills can be improved through training and by providing them with
    the right support systems. Here are three steps to get started:


    - **Create your own EQ baseline**: Humans are social beings. We work in teams;
    we communicate with each other and together we solve problems. However, when it
    comes to providing feedback, most of us are very hesitant to criticize someone’s
    interpersonal skills because such feedback pushes us into uncomfortable situations
    and we become defensive. Many sharp, effective people have no idea that they need
    to improve on their EQ skills because they simply haven’t paid attention to the
    subtle indicators from their peers and teams. Hence, the first step is to become
    self-aware of your own EQ quotient and pay attention to feedback you’ve been given,
    especially comments along the lines of, “You are difficult to work with,” “You
    are too argumentative,” “You need to do a better job of reading others body language.”


    - **Acknowledge that EQ skills are important too**: We have always paid way too
    much attention to systemizing skills, whether it is systems, technology, engineering,
    mathematics, or related fields. Although every role has an EQ angle to it, historically
    we have pushed it to the back burner. For example, doctors are well trained to
    identify and treat disease. Even though they are expected to sit down with patients
    and personalize the treatment plan to suit the patient’s preference and lifestyle,
    they tend to ignore or delegate this specific aspect of relating to someone else.
    You must first be clear about the outcome you are delivering, not the activity—is
    getting the diagnosis right the most important measure of success? Or is it actually
    improving the patient’s health? If the latter is true, then it is equally important
    for you to start focusing on your EQ skills.


    - **Reframe learning and knowledge management as EQ management**: Learning and
    knowledge management functions have always taken a myopic view of business needs.
    The focus is to train you for tasks to be done not for roles of the future where
    more than your technical skills your interpersonal skills will become much more
    important. You need to honestly assess your EQ quotient. You need to find a coach
    who will give you honest feedback and mentor you, and you need to consciously
    work on the improvement areas. The difficult part of EQ is that we are hesitant
    to agree that we have EQ gaps. None of us want to admit our EQ needs work, and
    we have this notion firmly printed on our minds that our EQ is inborn and unchangeable.
    We are wrong on both accounts.


    As AI becomes increasingly embedded into everything we do in our professional
    and personal spheres, the “softer” aspects of our skills need to become much more
    important.'
