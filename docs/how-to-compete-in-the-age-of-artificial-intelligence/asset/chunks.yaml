    ## Robotic Process Automation (RPA)


    RPA is a class of software “robots” that mimics exactly how humans operate (by
    logging into a system, entering data, executing workflows, etc.). They work with
    business applications, such as ERP and CRM systems and many other applications.
    Simply speaking, since these software robots replicate human activities, to a
    large extent the business applications work exactly as they always have before,
    without significant human involvement. The term “robot” signifies the software-driven
    capability to replace or enhance a human task. RPA primarily attempts to memorize
    the activities humans do at the “presentation layer” (the user interface) of business
    applications.


    In addition to the automating process, these software robots are much cheaper
    compared to employing a human, and the software robots do not demand overtime
    allowances, as they can work 24×7 if need be. The benefits of software robots
    just from a cost optimization point of view is extremely appealing. Besides cost
    savings, RPA also delivers other important benefits, such as:


    *   *Accuracy and compliance*:  The software robots will execute the business
    processes in exactly the same way every time, all the time, with consistent outcomes.


    *   *Improved responsiveness*:  The software robots are generally faster than
    humans, can work all hours without any fatigue, and can even scale to take on
    more loads at a fraction of the cost


    *   *Agile and multi-skilled*: The software robots can do a multitude of tasks
    provided the inputs-outputs rules-based paradigm is well defined and measurable.


    A condition to apply RPA to any processes is that, the input, rules to process
    the input, and the output, need to be clearly defined without any ambiguity or
    dependencies with external systems. When one single process has multiple interfaces
    across other systems and expects the inputs from other systems in a synchronized
    manner, all such dependencies need to be clearly articulated; otherwise, bottlenecks
    will make the RPA inefficient. The customer on-boarding process is a good example
    of such a scenario, since it involves a number of different steps and systems,
    all of which need to be clearly defined and mapped.


    Robots today can open and read attachments in emails; they can move files from
    one folder to another; they can follow programmed rules like if/then/ else; they
    can extract data from forms or input data into forms; they can direct that data
    into data stores like databases and files or push the data into integrated systems
    like ERPs, CRM, finance, HR systems, etc.; and much more.


    Applications of RPAs include:


    *   *Finance and Accounting*:  Vendor management, T&E, invoicing, exception handling,
    issue resolution, payment runs/cycles, payables, receivables, collections, monthly
    closing, reconciliations, and accounting, to name a few.


    *   *Banking*: Data validations, data migrations between applications, report
    creation, form filings, claim processing, originations, servicing of loans, and
    so on.


    *   *Capital markets*:  AML & KYC processing, data remediation, management reporting,
    client reporting, customer and advisor on-boarding, license and registration processing,
    payments and sweeps, reconciliations, asset transfers, corporate action processing,
    etc.


    *   *Insurance*: Notifications to agents for renewals, credit checks, data entry
    for registration, updating client info in multiple systems of records, payment
    decisions, claims processing, daily bank reconciliations, etc.


    The software robots will do exactly what you have tasked them to do each time,
    every time. This characteristic is both their greatest strength and their greatest
    weakness. It is a strength because the robot will carry out the process compliantly
    and accurately. It is a weakness because if there is any change in the business
    rules or inputs, or even scenarios that were not envisaged earlier, the software
    robot will have no clue how to handle that. For example, invoice processing is
    a voluminous activity. You can design a software robot to read the invoice forms,
    extract the key entities, do a validation with your CRM systems and payment processing
    systems, and then release the payment. This is a very simple process if all the
    invoices you get adhere to a single template. Suppose you are onboarding a new
    partner and their invoice form is different from those you had programmed earlier.
    Your software robot will not be able to process it and you will have to reprogram
    it to accommodate the change.


    This inability to adapt to changing conditions highlights two areas of improvements
    for RPA, both of which can be supplemented by AI capabilities.


    The first constraint is that, when the input data is unstructured and does not
    have a pre-defined format, such as a customer email, or documents where there
    is generally the same information available but in variable formats (such as invoices),
    then NLP capabilities are needed to extract the relevant information, which then
    can be fed into the software robot to carry out the tasks efficiently.


    The second constraint is that software robots are good at applying rules-based
    reasoning to a small number of specific steps, but they can’t use higher order
    decision-making. For example, if you have have a relatively small number of business
    rules to apply and approve a loan application, software robots can do the job
    very well. However, when the loan approval process becomes complex with not only
    multi-branching multi-dependent rules but also requires cross-referencing with
    real-time credit scoring, you are staring at a judgment-related task and AI supplement.


    ## Artificial Intelligence


    In the previous chapters we discussed AI at length. In the context of RPA, let’s
    revisit AI’s capabilities in two different categories.


    ### The Ability to Capture and Process Any Type of Data


    The first AI capability is the ability to deal with any type of data. With Big
    Data technologies, we were no longer constrained to deal with structured data
    only. The schema-on-read flexibility enabled by Big Data technologies enabled
    us to collect and store any type of data (relational structured data, unstructured
    data, semi-structured data, machine generated data, audio data, video data, and
    images). NoSQL databases also gave us the capability to process this data in a
    scalable, distributed, and efficient manner. While these advancements were initially
    designed to collect and manage data for web related problems (search, document
    management, cataloging, network of relations, etc.), a few other types of problem
    statements emerged that required out-of-the-box thinking. For example, how do
    we recognize images and interpret speech?'
  trans: '

    # 5. 智能流程自动化 = RPA + AI


    机器人流程自动化（`RPA`）和人工智能（`AI`）传统上被视为两个独立且有些不对等的领域——各自为组织带来了显著的效率提升。


    你可能听说过智能自动化、服务交付自动化和认知自动化等术语，并且这些技术方案声称能够完全自动化你的企业运营。让我们退一步，批判性地审视这些营销宣传与现实之间的差距。


    在本章中，我们将讨论一些最佳实践，以理解`RPA`的含义，以及如何将`AI`能力与`RPA`相结合，从而在你的组织中实现重大的阶梯式变革。


    ## 机器人流程自动化（`RPA`）


    `RPA`是一类软件“机器人”，它们精确模仿人类的操作方式（例如登录系统、输入数据、执行工作流等）。它们与业务应用程序协同工作，如`ERP`和`CRM`系统以及许多其他应用程序。简单来说，由于这些软件机器人复制了人类活动，业务应用程序在很大程度上仍像以前一样运行，但无需大量人工参与。“机器人”一词指的是由软件驱动的能力，用于替代或增强人类任务。`RPA`主要试图记忆人类在业务应用程序的“表示层”（用户界面）所执行的活动。


    除了实现流程自动化之外，这些软件机器人相比雇佣人类员工要便宜得多，而且软件机器人不需要加班费，因为它们可以在需要时全天候工作。仅从成本优化的角度来看，软件机器人的优势极具吸引力。除了节省成本，`RPA`还带来了其他重要好处，例如：


    *   *准确性与合规性*：软件机器人每次都会以完全相同的方式执行业务流程，始终如一，产出结果一致。

    *   *响应速度提升*：软件机器人通常比人类更快，可以全天候工作而不会疲劳，甚至能以极低的成本扩展以承担更多负载。

    *   *敏捷且多技能*：只要输入-输出规则范式定义清晰且可衡量，软件机器人可以执行多种任务。


    将`RPA`应用于任何流程的一个条件是：输入、处理输入的规则以及输出，必须清晰定义，不能有任何歧义或对外部系统的依赖。当单个流程跨其他系统拥有多个接口，并需要以同步方式从其他系统获取输入时，所有这些依赖关系都需要清晰阐明；否则，瓶颈将使`RPA`效率低下。客户入职流程就是这种情况的一个典型例子，因为它涉及许多不同的步骤和系统，所有这些都需要清晰定义和映射。


    如今的机器人可以打开并阅读电子邮件中的附件；它们可以将文件从一个文件夹移动到另一个文件夹；它们可以遵循编程规则，例如`if/then/else`；它们可以从表单中提取数据或将数据输入表单；它们可以将数据定向到数据库和文件等数据存储中，或者将数据推送到集成的系统中，如`ERP`、`CRM`、财务、`HR`系统等；功能远不止于此。


    `RPA`的应用包括：


    *   *财务与会计*：供应商管理、差旅费用报销、发票处理、异常处理、问题解决、付款运行/周期、应付账款、应收账款、催收、月度结账、对账和会计核算等。

    *   *银行业*：数据验证、应用程序间的数据迁移、报告创建、表格归档、索赔处理、贷款发放、贷款服务等。

    *   *资本市场*：反洗钱与了解你的客户处理、数据修复、管理报告、客户报告、客户与顾问入职、许可证与注册处理、付款与资金归集、对账、资产转移、公司行动处理等。

    *   *保险业*：向代理人发送续保通知、信用检查、注册数据录入、在多个记录系统中更新客户信息、支付决策、索赔处理、每日银行对账等。


    软件机器人每次都会精确执行你分配给它们的任务。这一特性既是它们最大的优势，也是它们最大的弱点。说它是优势，因为机器人会合规且准确地执行流程。说它是弱点，因为如果业务规则或输入发生任何变化，甚至遇到之前未曾预料到的情况，软件机器人将完全不知道如何处理。例如，发票处理是一项工作量巨大的活动。你可以设计一个软件机器人来读取发票表单、提取关键实体、与你的`CRM`系统和支付处理系统进行验证，然后释放付款。如果你收到的所有发票都遵循单一模板，这是一个非常简单的流程。假设你正在引入一个新合作伙伴，而他们的发票格式与你之前编程处理的格式不同。你的软件机器人将无法处理它，你必须重新编程以适应这种变化。


    这种无法适应变化的情况凸显了`RPA`需要改进的两个方面，而这两方面都可以通过`AI`能力来补充。


    第一个限制是，当输入数据是非结构化的，没有预定义的格式时，例如客户电子邮件，或者通常包含相同信息但格式可变（如发票）的文档，就需要`NLP`能力来提取相关信息，然后将其输入软件机器人，以便高效执行任务。


    第二个限制是，软件机器人擅长将基于规则的推理应用于少量特定步骤，但它们无法进行更高层次的决策。例如，如果你有相对较少的业务规则需要应用来批准贷款申请，软件机器人可以做得很好。然而，当贷款审批流程变得复杂，不仅包含多分支、多依赖的规则，还需要与实时信用评分进行交叉引用时，你就面临着一个与判断相关的任务，需要`AI`的补充。


    ## 人工智能


    在前面的章节中，我们已经详细讨论了`AI`。在`RPA`的背景下，让我们从两个不同的类别重新审视`AI`的能力。


    ### 捕获和处理任何类型数据的能力


    第一个`AI`能力是处理任何类型数据的能力。借助大数据技术，我们不再局限于处理结构化数据。大数据技术实现的“读时模式”灵活性使我们能够收集和存储任何类型的数据（关系型结构化数据、非结构化数据、半结构化数据、机器生成数据、音频数据、视频数据和图像）。`NoSQL`数据库也使我们能够以可扩展、分布式且高效的方式处理这些数据。虽然这些进步最初是为了解决与网络相关的问题（搜索、文档管理、编目、关系网络等）而设计用于收集和管理数据，但随后出现了一些其他类型的问题陈述，需要跳出固有思维模式。例如，我们如何识别图像和解释语音？

    '
- fmt: '### Turning Data Into Insights


    The second AI capability churns all these different types of data to glean insights
    from it. This is where `ML`, `DL`, `NLP`, and neural nets come into play. `NLP`
    helps extract meaning from unstructured data and `ML` helps develop prediction
    capabilities from the data. Deep learning and neural nets learn from the data
    to solve problems like recognizing a face in a photo, interpret spoken words,
    and generate spoken words.


    In the context of `RPA`, these AI capabilities can certainly work as a complementary
    technology. For example, `NLP` can standardize and extract relevant data from
    documents, emails, transcripts, and logs even if they are in free-form, or even
    when the entities of interest are in different places in the document. Take the
    example of an invoice form. The date might be in the top-left corner sometimes,
    and other times in the top right, the bill of material may be represented as unit
    times quantity in some forms, whereas in others they may all appear as line items
    one by one and then totaled at the bottom. The descriptions might have been in
    an elongated version in one form and in a codified version in another. The tax
    amount may be written above the total value or as a separate entry below. Relying
    on `RPA` capabilities alone would make handling this variability extremely challenging.
    Even if you added enough rules to take care of all these different scenarios,
    the resulting program will be highly complex and unmanageable. With `NLP` and
    `ML` capabilities, AI can easily solve these problems.


    Conversational interfaces (or chatbots) can be used to facilitate interaction
    between humans and other systems. You type your asks in a natural language form,
    and AI picks it up from there to process your query and respond back with relevant
    answers. If you don’t want to type, you can talk to the system and AI will use
    speech recognition to understand your query, interact with backend systems, and
    then talk back to you with the relevant information. Despite all these advances
    in AI technology, we are still living in the world of narrow AI. Meaning an AI
    that does image recognition won’t be able to generate text or the AI that does
    `NLP` processing very well won’t be able to provide recommendations or next best
    offers. Hence, in the context of `RPA`, AI supplements need to be considered.
    By considering the entirety of the problem you are trying to solve, you will have
    to stitch together various AI capabilities.


    `RPA` and AI are two very different technologies, yet they complement each other
    very well. For example, AI can help process a variety of unstructured data and
    build a rich knowledge base, which then can be utilized effectively by the `RPA`
    technology to automate tasks. As businesses adopt `RPA` beyond the low-hanging
    automation task type of problems, they should start looking at AI to bring in
    self-learning capabilities to the very same `RPA` realm and make their business
    processes intelligently automated.


    ## Automation and Intelligence: Working Together


    When you combine the automation capabilities of `RPA` and self-learning capabilities
    of AI, you are looking at convergence of technology solutions that can not only
    improve your operations and customer interactions but also may create new business
    models. Many companies are beginning to recognize the potential benefits of combining
    these two technologies to solve problems, especially when operations efficiencies
    are magnified because of large legacy systems or older business processes with
    multiple hops and complex integration patterns.


    Let’s first understand why there’s a need for intelligent automation.


    ### The Need for Faster Turnaround


    In a highly competitive and fast-paced business environment, the most critical
    enterprise metrics measure how responsive the company is to its customers and
    markets. For that to happen, the customer facing and market facing applications
    need to be almost real time and the backend systems also need to be transformed
    to match the speed of the frontend. This dual transformation challenge needs to
    be carefully orchestrated because most backend systems have evolved over decades
    of hand-coded programs. Organizations are in need of solutions that can bring
    in these dual changes quickly.


    ### The Demise of “Lift and Shift”


    Enterprises are not looking for changes by adopting new technologies to do the
    same tasks the same old way, but with appealing user interfaces or elevating user
    experiences. They are looking for real change where systems become intelligent
    enough to adapt to changing business dynamics and changing customer preferences.
    A simple lift and shift approach to new technologies won’t make the enterprise
    efficient, rather the real need is to look for disruptive and demonstrable business
    value beyond the cost savings or ease of doing operations.


    ### Expectations Are Elevated


    Decision makers do not want to settle with robust yet placid business systems.
    They expect business systems to be adaptive and responsive. They want their business
    systems not only do the job it is designed for but also to provide them additional
    insights proactively so that they can take more informed and better decisions.'
