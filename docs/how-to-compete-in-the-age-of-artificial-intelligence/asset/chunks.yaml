- fmt: '# Governance Framework


    Along the lines of the famous three laws of robotics by Isaac Asimov, the HMIS
    needs to have a governance framework to govern and monitor how human and machine
    agents carry out their respective tasks in a collaborative fashion. These laws
    can be used along the three laws of robotics:


    - Machine agents will never collect physical features such as skin color, height,
    weight, etc. as visual input for the purposes of learning or identifying the cultural
    background of the individuals they cater to. The input will always need to be
    provided via a formal input channel. This is to make the system impervious to
    any stereotype associated with physical features.

    - A culturally insensitive remark, sentence, vocabulary, or slang will remain
    tagged insensitive to all cultures, unless its alternative positive aspect is
    clearly stated for a specific culture.

    - Human agents will need an active learning system, capable of incorporating feedback
    after an interaction, to continuously validate its behavior.


    A clear “segregation of responsibility” and event-response matrix needs to be
    identified for both humans and machine agents. Humans and machine agents can then
    use the enforced or automated activities to manage interdependencies and interaction.
    These interdependencies and interactions are either designed a priori or can be
    executed at runtime based on the scenarios they are exposed to.


    Efficiency and specificity are critical and hence coordination rules should be
    clearly documented by proper management of the interactions. The HMIS should be
    capable of handling concurrent actions in a multi-agent complex adaptive ecosystem
    that provides security, reliability, and fault tolerance capabilities. The coordination
    process should reflect exactly the semantics by which it has been forged. The
    effect of coordination and accountability should precisely be maintained on the
    agent interaction space. Safety is another factor in human-machine interaction,
    which the governance framework should not ignore. As human beings adhere to laws
    in society, it is as important for the machine agents to abide by a few laws that
    prevent them from taking drastic measures that may lead to disruptive actions.


    Much like in the society we have lawyers and a police force to enforce mandated
    laws, in HMIS ecosystem we will also need watch dogs for maintaining laws.


    For example, in the context of recruitment of human employees in a company through
    a process of interviews, where final decisions are made by machine agents, the
    HMIS watch dog will keep a track of whether basic values of equal opportunity
    are maintained throughout the process or not. For example, if it unknowingly recruits
    candidates giving rise to gender bias or bias in race, color, or sexual orientation,
    the HMIS watch dog will not approve such recruitment and will suggest the machine
    agents reevaluate or change their decisions. Other examples may include HMIS watch
    dogs to monitor communication texts to detect unacceptable or culturally insensitive
    words or notions. Further, HMIS watch dogs may also provide a distributed and
    autonomous platforms to verify the veracity of communications from machines. Governance
    of laws is important in HMIS, but equally important is ethics, which should be
    instilled in agents.


    In the business setting, breach of code of conduct should fall in the category
    of ethics. As described, anything giving rise to racism abusive behavior or even
    wrongful use of data will fall in the category of ethical breach and, in that
    case, the punishment should be hefty. One step below ethics comes governance where
    agents are governed by superior agents in their domain or task. The structure
    of governance among agents should be hierarchical where there is accountability
    as well as autonomy among the governing official to take actions based on consensus
    reached. HMIS watch dogs are expected to become more intelligent through the entire
    process of governance. This can be done by leveraging adversarial machine learning
    procedures. As agents need to evolve in their roles and responsibilities, it is
    important to have enough spam filtering in the agents’ learning processes. This
    can only be done when the HMIS watch dogs become clever by improving filtering
    mechanisms in the agents’ mode of communication, the absence of which may make
    the agent disrupt the healthy learning process of the agents and in turn the entire
    ecosystem.


    We must also discuss the potential challenges to be encountered on the road to
    achieving a stable HMIS ecosystem, discussed next.


    ## Trustworthiness and Likability of Machines


    The first and foremost requirement to consummate an interaction between two individuals
    is to accept such an interaction. This acceptance is a function of how trustworthy
    the individuals see each other while the extent/degree of this acceptance is directly
    correlated with the likability among the individuals.


    This becomes a tricky affair if one of the individuals in context is a machine.
    While trust and likability do not form a hurdle in a machines’ perspective of
    the human, as it can always be altered programmatically, the vice versa relationship
    is an uphill battle. With every article or news breakout about an increase in
    the capability of machines or the highlight of a mistake made by an autonomous
    machine, the trust of machines takes a beating. The HMIS ecosystem demands a seamless
    and open exchange of information between humans and machines, which requires the
    removal of any skepticism from the concerned human’s mind regarding the machine.
    Intellectual superiority does not necessarily make a machine likeable and hence
    this is a much more complex problem than it may seem on paper. For example, machines
    that make mistakes seem to make humans more comfortable as compared to machines
    that are always correct.


    ## Human-Machine Relationship


    The human-machine relationship is a symbiotic one where both entities are dependent
    on each other. While machines are superior to humans in performing well defined
    tasks, humans are superior in dynamic tasks that are not fully controlled and
    are affected by uncertain factors. Since real-life situations can consist of both
    types of tasks, the degree of freedom needs to be divided among humans and machines.


    The HMIS ecosystem consists of an intermingling of the network of machines and
    the network of humans. As machines grow more and more autonomous, it is important
    to maintain a check on the nature of their relationship and the changes in the
    dependency paradigm.


    Defining the relationship is crucial; if an autonomous agent commits a mistake
    or breaks a law, this relationship would be crucial to identify the entity that
    would take up responsibility. Challenges like the dynamics of autonomy, ownership
    of tasks, and distribution of work must be addressed.'
