    businesses are beginning to adopt AI systems, attackers are also finding ways
    to manipulate these same AI systems. They are focusing on finding ways to turn
    AI against its owners, from hacking chatbots to deliberately misleading the pattern
    recognition algorithms.


    These types of adversarial attacks means only one thing: the future of cyberattacks
    won’t between humans, but between machines.


    ## Questions for the CEO


    As your business is increasingly become digital, are you at risk of losing control
    over the machines you are creating?


    The answer should be both yes and no. The enterprise technology ecosystem is now
    much more complex, and much more open, than it used to be. Businesses can no longer
    control their own perimeters, because those perimeters no longer exist. At the
    same time, attackers have become much more creative and sophisticated. You can
    no longer rely on a set list of known attacks, because most attacks no longer
    fit recognizable patterns and signatures. On the other hand, that simply means
    you need to develop new definitions of control. Instead of attempting to control
    your perimeter against known attacks, you must learn to control unique attacks
    that have already breached your systems. There is still a place for prevention
    in cybersecurity. But you must extend your definitions of control to consider
    the full lifecycle of a threat to discover and mitigate threats before it is too
    late.


    Does AI mean the end of the human element in cybersecurity or can they coexist?


    They *must* coexist. There is currently a misconception about AI’s role in cybersecurity.
    Many people hear the term AI and imagine a general AI system that can think and
    do things as creatively as a human. This general AI might be developed in the
    future, but at the moment AI’s role in cybersecurity is very specialized. AI is
    good at processing a massive volume of threat data and providing a summary of
    what it found. But we still need humans to tell the AI what to look for, to review
    the AI’s outputs, and to ultimately decide how to act upon the AI’s findings.
    The goal of any AI-driven cybersecurity service is simple—let AI do what it does
    best, and let humans do what they do best.


    Can hackers enter the machine and alter the path of AI?


    There is one sobering truth about cybersecurity: it doesn’t matter what defenses
    you put in front of attackers, they will eventually find a way around them. There
    is no “silver bullet” technology that will solve the problem of cybersecurity
    once and for all. Cybersecurity will always be a back-and-forth game between attackers
    and defenders that will constantly evolve as technology evolves. No matter how
    powerful AI is, it will not solve this problem. It is the next necessary step
    we need to take to secure our systems, but it is possible that attackers may one
    day find a way to bypass, or subvert, AI—the same way attackers have bypassed,
    or subverted, every other security measure cybersecurity experts have developed.
    Although it’s important to ask this question, it is a moot point today. Attackers
    are already using AI to power their attacks, and we must deploy AI-driven defenses
    to keep up. In the future, we could be looking at dynamic machine learning algorithms
    that morph once they sense an intrusion, all without affecting the original purpose
    for which it was designed.


    In the short-term, AI will become a standard element of cybersecurity. As enterprises
    further adopt the cloud, mobile, and IoT, they will open more vulnerability points
    for cybercriminals to exploit. As they further digitize, they will create opportunities
    for increasingly complex multi-channel attacks. Enterprise security staff are
    already flooded with more daily threat data than any human-only team can handle.
    This data will only increase every year, and so will the need for AI to effectively
    process it.


    ## Conclusion


    Cybersecurity is going to become more dependent on AI. In particular, as the notion
    of everything connected continues to expand, we can expect security risks from
    all possible systems, which the current controls won’t be able to handle. There
    will be obstacles for sure. For example, AI needs to deliver greater accuracy
    in detection and fewer false positives for it to earn the trust.


    AI powered cybersecurity is no panacea! They are not necessarily a perfect match
    either. Some attacks are very difficult to catch. There are a wide range of attacks,
    spread across ranges of time, and across many different systems. Second, the attacks
    are constantly changing; therefore, the biggest challenge is training the AI for
    all these varied scenarios.


    In this chapter, we discussed the current state of cybersecurity measures and
    how AI can play a significant role in enhancing the security mechanisms of future
    systems. In the next chapter, we discuss concepts related to the Internet of things
    (IoT) and how AI can be leveraged to make “things” intelligent.'
