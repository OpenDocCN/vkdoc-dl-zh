    # 物联网、混合云与人工智能协同工作


    前面讨论的例子无疑引人入胜。但关键问题在于，如何构建这类集成应用？需要哪些技术构建模块？


    没有支持性的平台和架构，物联网与人工智能的融合根本不可能实现。这正是混合云发挥作用之处。每家公司都拥有独特的技术格局，这些格局是为其各自的业务需求和增长而构建并与之相适应的。混合云既是一种颠覆性技术，也是一个商业机遇。要理解这种颠覆，需要更深入地理解涉及混合云、物联网和人工智能的融合架构。


    我们周围遍布着不断收集和传输数据的设备。所有这些数据都必须被快速分析，以确定下一步最佳行动。一旦出现延迟，数据就会失去价值。这种零延迟的要求，需要在最接近数据源的地方具备令人难以置信的分布式收集和存储能力。这意味着物联网边缘必须展现出即时解析和分析流数据以采取下一步最佳行动的能力，同时将大部分数据推送到云端进行更深入的分析。


    另一方面，人工智能需要巨大的计算能力来处理海量数据集。速度和性能是人工智能系统的额外考量因素，因为人工智能做出的决策需要快速反馈给物联网设备，才能使预测具有可操作性。


    以下列表列举了几个突出人工智能特定需求的示例：


    -   自动驾驶应急响应车辆能立即响应洪水、火灾等救生搜索和救援行动。

    -   医疗设备可以自动进行除颤，并向最近的医院发送警报通知。

    -   金融犯罪检测系统涵盖信用卡刷卡行为。

    -   流媒体视频服务的按需推荐。

    -   苹果的 Siri 和亚马逊的 Echo 在边缘端提供即时响应。


    还有更多例子分布在工业需求和消费者需求中。在所有这些例子中，有一点是共通的：人工智能的需求不仅涉及大量数据，还涉及实时决策（见图 7-1）。


    ![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig1_HTML.png](img/467925_1_En_7_Fig1_HTML.png)


    图 7-1


    物联网的数据价值链与决策延迟


    物联网收集的数据可以提升人工智能的预测能力；然而，价值链中（从设备原始数据到预测，再到结果）有许多任务需要良好编排才能交付最终成果。图 7-2 展示了构成物联网分析平台的不同组件的概念视图。


    ![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig2_HTML.png](img/467925_1_En_7_Fig2_HTML.png)


    图 7-2


    物联网分析平台组件


    虽然仅仅实施物联网本身就具有变革性——至少你可以完全了解运营和机器性能，并做出决策——但要实现预测性，你需要人工智能能力与物联网和云协同运作。


    ## 避免代价高昂的计划外停机


    设备故障导致的计划外停机可能代价高昂。通过将机器学习算法应用于机器生成的传感器数据，我们可以提前预测设备故障。然后，人工智能系统可以向现场操作员触发警报，并安排维护程序。


    ## 提高运营效率


    在工厂中，装配线操作要求一切精确并严格遵守质量控制。以生产过程中的溢出为例。溢出量每减少 1% 就可能意味着节省数千美元。通过使用物联网和机器学习，公司可以显著减少泄漏。从嵌入机器的传感器捕获的流数据可以在边缘端实时分析，从而向人类专家发送警报以控制溢出。


    ## 实现新的和改进的产品与服务


    物联网与人工智能相结合，可以为改进产品设计奠定基础，在某些情况下甚至可以构思出全新的产品和服务。例如，通过分析机器性能数据，我们可以帮助发现模式并获得运营洞察——机器如何工作？能否根据设计规范执行？实际使用情况是否与设计时考虑的使用情况不同？是否有机会推出新产品线？等等。


    ## 加强风险管理


    许多将物联网与人工智能结合的应用正在帮助组织更好地理解风险，并为快速响应、更好地管理工人安全和网络威胁做好准备。


    例如，通过在可穿戴设备上使用机器学习，我们可以监控工人的安全并预防事故。银行已开始评估利用人工智能从联网的 ATM 监控摄像头中实时识别可疑活动。车辆保险公司已开始对联网汽车的远程信息处理数据使用机器学习，以准确定价基于使用情况的保险费，从而更好地管理承保风险。


    # 人工智能在工业 4.0 中的作用


    关于工业 4.0 的普遍观念是连接所有资产并创建数字化环境。这并非完全准确。工业 4.0 更像是一场演进而非革命。要达到理想的成熟度水平，需要经历几个阶段。第一阶段始于将所有资产连接在一起，包括仪器仪表、连接性和数据收集。下一阶段是弄清楚如何理解所有这些数据。最后阶段是将自动化引入整个生命周期。制造敏捷性是工业
    4.0 成功的关键，而人工智能在整个“创造、制造和交付”价值链中发挥着关键作用，以优化和改进每个流程，从而在任何外部环境下都能取得最佳成果。


    关于工业 4.0 的讨论不可避免地会涉及多种技术：边缘计算、云计算、人工智能、物联网、平台等。尽管这些技术各有其作用，但最关键的组成部分是其数据和预测能力。

    '
- fmt: '# Digital Twins


    Modern manufacturing companies are leveraging IoT platforms to capture data from
    their machines and other sources to create a “digital twin,” which is a digital
    model of an actual, physical object (see Figure [7-3](#467925_1_En_7_Chapter.xhtml#Fig3)).
    Digital twins enables us to visualize the real-life operational aspects of a machine.
    Sensors on the machine transmit data to its digital counterpart, mimicking the
    physical machine in action, then machine learning algorithms analyze the digitally
    transmitted data to optimize product performance and recommend the next best actions
    for the physical system. With digital twins, we have the ability to predict the
    physical world scenarios, optimize the asset performance, reduce maintenance costs,
    reduce downtime SLAs, and explore opportunities to monetize data and build new
    service offerings.


    ![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig3_HTML.jpg](images/467925_1_En_7_Chapter/467925_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Conceptual view of digital twins


    In essence, a digital twin is the convergence of the physical system, the digital
    mirror, and the underlying data that bridges them both.


    ## How could a digital twin deliver transformational business outcomes?


    First, digital twins—or rather the converging technologies of IoT, the cloud and
    AI—offer the possibility to optimize processes and apply effective usage of machines
    and resources. While these solutions are primarily aimed at lowering the cost
    of production, customers expect the end product to be inclusive of value-added
    services, like a dashboard, usage patterns, alerts for maintenance, etc.


    Second, smart devices acquire extensive data about the real usage of the product
    at the customer location. When you analyze this invaluable data across your install
    base, you will be able to infer not only individual customer-install base patterns
    but also a world view of how other customers are using it, how successful they
    are, what challenges they are facing, and whether there are whitespace opportunities
    to launch new products or value-added services at a premium.


    Third, because now you are not just selling a machine but a “machine as a service,”
    you can change the entire business model in which your customers won’t mind a
    premium insurance fee if you can guarantee the quality of their products and services.
    With digital twins, you can measure the health and performance of your machines.
    You are able to remotely manage the usage of these machines and predict possible
    outages. You are able to monitor machine utilization and recommend better capacity
    planning and production schedules, etc. All these insights mean that you can actually
    play a larger role in customer’s business outcomes, and if you can commit to reduced
    downtime SLAs, surely your customers will be willing to pay you a premium.


    ## How would you create a profitable digital twin strategy for your business?


    If you are purely an industrial manufacturing company, you have three options:


    *   **Become an enabler**: Start developing and embedding IoT technology, such
    as endpoint networks, edge computing, and cloud infrastructure, into your products
    and offerings. This will enable you to cross-sell pieces of digital twin components
    to your customers and gain market share. Your customers then have to take external
    help of building in-house capabilities to architect digital twins relevant to
    them. However, on the cautioning side, beware that this market will be dominated
    by a small number of global giants who can deliver the entire stack at a fraction
    of the cost.


    *   **Become an engager**: Besides manufacturing world-class products equipped
    with sensors and compute power, you can venture into designing, creating, integrating,
    and delivering value-add services to your customers. The value-add services could
    be like adding a real-time dashboard, trends of historical machine performance,
    alert notification based on thresholds, etc. These offerings may not give you
    a distinct advantage because traditional software companies specialize on delivering
    such capabilities; however, you will certainly be able to develop customer intimacy
    by offering digital services over physical machines.


    *   **Become an enhancer**: Here, the goal is to provide enriched end-user engagement
    and offer new services using the data from the customers themselves and third-party
    sources. This is where digital twins, monetizing data, and new revenue models
    come into play. The value-added offerings need to be machine specific and industry
    specific to raise the entry barrier for others to replicate.'
