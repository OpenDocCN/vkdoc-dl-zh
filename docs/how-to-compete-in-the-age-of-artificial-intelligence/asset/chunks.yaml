  trans: '

    ### 管理不成熟的 AI


    尽管人工智能技术不断进步，甚至各组织也在持续突破 AI 应用的边界，但 AI 的承诺与现实之间仍存在巨大鸿沟。


    一方面，我们有许多成功实施的 AI 解决方案；另一方面，也确实存在大量失败的尝试。这很大程度上是因为 AI 仍是一个年轻、不成熟的领域。


    在象棋和围棋等复杂游戏中，算法正与人类专家竞争，且常常胜出。但与此同时，简单的客服聊天机器人却未能真正解决客户的痛点，有时甚至比帮助更令人烦恼。


    AI 有潜力运用数据和算法来提供快速决策；然而在许多场景下，算法本身似乎就带有偏见，无法对结果给出公正的视角。面对这种矛盾，高管们很难清晰判断 AI 的实用性，因此倾向于采取观望政策。


    那么，高管们究竟如何务实地将 AI 融入当前的业务流程呢？


    显然，AI 可以获取你已有的信息，并生成你尚未掌握的信息。从这个角度看，你可以预期 AI 的主要工作是增强知识工作者利用预测结果的能力（例如，某人违约的可能性很高），而知识工作者的主要工作则是运用判断力（例如，这看起来是个异常情况，因为此人从未违约过）来提升
    AI 的预测性能。


    在相当长一段时间里，公认的预测问题都与统计学和运筹学相关，例如库存管理和需求预测。然而，在过去几年中，图像识别、驾驶、资产维护、人才招聘、医疗保健以及许多原本仅属于人类职责范畴的任务，也都被重新定义为预测问题。


    随着越来越多原本仅由人类预测完成的任务被重新定义为机器预测问题，组织需要从培训员工的预测相关技能转向判断相关技能。简而言之，组织需要专注于创建一个生态系统和流程，使专注于判断的人类团队与专注于预测的
    AI 代理协同工作，以交付业务成果。


    AI 技术的有效性取决于其所能访问的数据质量，而最有价值的数据可能存在于组织边界之外。组织需要审视当前内向型的数据战略，并开放心态，发展依赖于数据共享的战略联盟。


    例如，宝马、戴姆勒和大众，尽管彼此竞争，却结成了联盟，收购了总部位于柏林的一家数字地图公司（HERE），以创建一个实时平台，用于跟踪和监控驾驶状况（交通拥堵、预估通勤时间、事故或车辆途中故障、紧急服务、公共设施以及天气模式）。这些数据均来自各品牌汽车和卡车收集的信息。单独一家公司构建这样的平台成本高昂得令人望而却步，但通过合作，他们创建了一个足够强大的数据平台，不仅改善了客户服务，还创造了新的收入模式，例如向市政当局、私营紧急服务提供商、公民服务公司、保险公司等收取订阅费。


    AI 将以不同方式影响不同组织，其中许多变化将对管理者产生直接影响，例如他们如何规划工作分配、如何审查进行中的工作、如何进行干预、如何管理 AI 与员工的组合等等。此外，这些变化也带来了相当大的风险。


    -   **替代风险** —— AI 承诺以多种方式为人类绩效提供辅助智能，这固然能提升人类生产力，但同时也重新定义了某些活动，从而完全消除了人类的参与。现实是，人类的角色和职位已不再安全。保险公司已经开始使用
    AI（而非人类代理人）向客户提供保险计划。随着智能机器、智能工厂和智能车间的快速推进，那些日常工作很大程度上与操作机器交织在一起的体力劳动者，将会发现他们的工作正被
    AI 代理夺走。


    -   **依赖风险** —— 从长远来看，随着 AI 完全嵌入业务流程并在某种意义上运营企业功能，一种强烈的依赖性将会出现。除非有足够的谨慎和强大的治理模式到位，否则这种依赖将产生新的脆弱性，导致
    AI 代理与人类在回路之间出现僵局，并可能引发低效运营。随着时间的推移，错误和偏见可能会悄无声息地潜入算法。


    -   **安全风险** —— 如今，我们通过监控、监视和访问控制来管理安全。我们当前的安全管理实践旨在检测人类的未授权活动。我们开始意识到来自软件的安全威胁的影响。想象一下，当企业完全由
    AI 代理运营，并使用不仅处理关键任务应用还处理敏感数据的复杂算法时，AI 从其他 AI 那里窃取信息的风险将变得非常真实。


    -   **隐私风险** —— 随着 AI 在企业中扮演信息工作者的角色，AI 本身随着时间的推移将成为信息来源——收集、分析和管理相当敏感的公司和客户数据。AI
    的广泛使用无疑会引发许多数据隐私和所有权问题（我们已经看到欧盟以 GDPR 形式出台了更严格的数据管理和保护法规）。AI 系统的黑箱特性将为人机协作场景带来额外挑战。除非你知道
    AI 系统为何做出某个行为，否则你根本无法信任它。这正是组织需要制定明确道德标准，并在 AI 自主性与人类所有权之间划清界限的地方。


    AI 将如何影响并颠覆企业的运营方式？高管们又该如何为即将到来的颠覆性十年做好规划？


    创新型组织会自我革新；他们展现出能够快速失败并更快学习的能力。如果你从名校获得了 AI 技术学位，或者明智地投入时间接受了最新 AI 技术的培训，你会选择创办一家专注于利基
    AI 产品初创公司，还是加入一家希望构建创新 AI 应用的公司，抑或是利用你的学术技能与其他领域的科学家合作进行高级研究？


    前两个选项带来的机会（得益于媒体宣传）光鲜亮丽且回报丰厚，这反过来也推高了 AI 技能人才的薪酬水平。为何会出现如此急切的 AI 人才招聘热潮？答案在于，公司普遍相信
    AI 会神奇地创造新的业务领域，或者会帮助它们拉大与竞争对手之间的差距。


    在我们看来，第三个选项——高级研究——对于 AI 在生活和社会各个领域的长期可持续和合乎道德的使用同样重要。我们不断听到乐观的观点，认为 AI（及其他数字趋势）将创造新的产业和新的工作类别，其规模将远超其造成的任何失业。关于这些观点，有两个悬而未决的问题：这些新产业将如何被创造出来？它们何时会到来？

