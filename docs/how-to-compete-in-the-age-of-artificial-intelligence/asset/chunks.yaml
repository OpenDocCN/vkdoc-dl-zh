  trans: '

    ### 成本、质量与时间有多重要？


    人工智能作为一门学科发展迅速。它已走出实验室，正在给我们的日常生活带来巨大变化。一些 AI 应用甚至在视觉、对话语音和问题解决等多个方面达到了人类水平的表现。因此，每个行业都在积极考虑在其企业内开展
    AI 项目。然而，由于我们正处于这种前所未有的变革之中，目前尚无现成的方法论或先例可供遵循。关键问题包括：成本是多少？如何定义投资回报率？如何衡量质量？需要多长时间？还有更多相关问题，包括我们的工作将会发生什么变化！


    毫无疑问，借助当今强大的 AI 技术，我们正在改变以往的工作方式。在许多领域，我们已经实现了重复性任务以及大部分后台运营任务的自动化。有趣的是，AI 也开始将其智能应用于那些需要较少重复性体力劳动、曾被认为不受自动化影响的领域，例如法律、教育、新闻业等。简而言之，AI
    已经开始增强人类的心智，而不仅仅是体力。


    在这一切发生的同时，重要的是要认识到，仍有大量工作只能由人类完成（参见第 1 章——人类的判断力变得无比珍贵）。组织需要应对的挑战并非“一个没有人类参与的世界”，而是“一个人类劳动相关技能快速变化的世界”。


    当然，成本和质量参数对于任何企业保持竞争力并满足客户期望都至关重要，但 AI 开发生命周期需要与其他业务应用开发生命周期区别对待。最初的 AI 开发成本可能看起来很高，但一旦开发完成，AI
    系统开始在环境中运行，它就能轻松扩展以处理巨大的工作负载。另一个重要优势是，AI 系统能够持续从数据以及人类交互中学习，从而使得后续的运行和维护成本变得微不足道，甚至趋近于零。例如，一旦你开发了一个用于分析化验报告并报告结果的
    AI 系统，你就可以将其扩展，以极低的增量成本对数百万份化验报告进行同样的分析。AI 的这一特性为组织提供了机会，可以替代或提高高薪知识工作者的生产力，因为
    AI 自动化了许多任务。结果如何？这提供了一个重新审视当前昂贵瓶颈，并探索 AI 如何克服它们的机会。


    有了机器，我们可以期待执行的纪律性、精确性和一致的结果。你的 AI 放射科医生将每次、始终如一地输出相同的结果。有了这种一致性，组织可以随着时间的推移逐步优化并提高质量。


    虽然降低成本和提高质量很重要，但 AI 还解决了一个基本的商业目标——更快的上市时间。例如，当前的贷款审批流程通常需要 10 到 30 天。获得贷款，即使是预批准，也无法在一夜之间完成。随着支持贷款处理申请所需所有信息的数据日益可用，AI
    可以大幅缩短处理贷款所需的时间。如果你早上找到了一栋心仪的房子，你的贷款申请没有理由需要一个月才能处理完毕。理想情况下，你当天下午就应该能拿到那栋房子的钥匙。贷款审批官员（如果他们还存在的话）只需刷一下你的信用卡就能完成交易。


    诉讼则处于另一个极端。它们可能需要相当长的时间才能解决。部分时间用于收集数据和准备案件，部分是由于法院案件积压造成的延误，还有更多时间则花在审议和和解上。整个流程存在多个瓶颈和依赖关系，可以通过应用
    AI 解决方案来缩短，该方案能够研究并准备案件，同时引用过往判决，然后提前指示出达成结果可能需要多长时间。当然，如果人们能获得关于其案件立场的足够事实信息，这将有助于他们避免在原地打转，浪费时间和金钱！


    医疗诊断是另一个繁琐流程的例子。很多时候，延误是由于无法获取既往病史造成的。其次，即使你有既往病史，你也依赖于在你保险覆盖的医疗服务提供者网络中能否找到合适的医生。如果你只是需要一个简单的诊断来了解病情有多严重呢？AI
    可以通过分析你的既往病史，并将你当前的症状与庞大的诊断结果库进行匹配，从而大幅缩短等待时间。更快的初步诊断潜力无疑能帮助医院和诊所，同时通过更早地发现需要紧急医疗处理的状况来改善健康结果。


    随着 AI 的实用性开始超过其不确定性，组织需要注意些什么呢？


    #### 快得难以管理


    我们很幸运，当前流程的缓慢节奏让我们有时间进行监控和管理。如果（当！）某些事情没有按预期运行，我们通常有时间进行根本原因分析、查找瓶颈、实施修复或进行路线修正。然而，当机器运行我们的流程时，我们可能没有时间介入并管理局面，因为一切都会以机器的速度运行。在风险贷款的资金流失、罪犯逃脱、或患者因错误治疗而受苦之前，我们可能没有机会进行干预。在追求最优速度的竞赛中，机器速度（极端自动化）可能导致高风险的结果。


    #### 快得难以反应


    除了提高生产力和响应能力等许多其他原因外，追求速度的关键原因之一是为了保持领先于竞争对手。借助 AI，你可以为你的竞争对手设置高耸的进入壁垒。然而，结果可能并非如此。就像你正在认真考虑
    AI 一样，你的竞争对手也在考虑。结果如何？当每个人都想保持领先时，就会在生态系统中造成巨大的不稳定性。你不再拥有市场领导地位或竞争优势的奢侈；它突然变成了一个公平的竞争环境。


    #### 快得难以学习


    AI 解决方案对数据如饥似渴。数据越多、越多样化，AI 的结果就越好。为了在竞争中胜出，如果每个企业都尽可能多地获取数据，你最终会突然陷入一种局面：数据不再能带来差异化。另一个问题是，数据的价值可能会迅速衰减。衰减的速度可能超过数据可用的速度。Netflix
    大奖就是一个经典例子：该公司为大幅改进其基于历史客户观看行为（通过邮寄 DVD 租赁）推荐电影的算法而设立了一个奖项。在颁发奖项后，Netflix 发现该算法对新数据（视频流媒体行为）毫无用处。当
    AI 依赖于数据时，数据价值的快速衰减实际上可能会降低算法的有用性。

    '
- fmt: '### Are AI Learning Scenarios Unpredictable Enough?


    What if a collision happens between an AI operated vehicle and a human operated
    vehicle? Quite naturally, the sensational headlines would play to our biased thinking
    that the machine is to blame. This scenario is not fiction. It actually happened
    in Las Vegas, where a minor collision happened between a self-driving shuttle
    and a human operated truck when the delivery truck backed into the front bumper
    of the shuttle. The AI operated vehicle was trained to stop if there is an obstruction
    on its path, and it behaved exactly as it was supposed to behave.


    This incident highlights a crucial gap in AI and human interactions. AI systems
    are typically trained in context where there are no external factors with adversary
    objectives. The focus is to learn from observations and, while designing such
    systems, our first intent is to get something working.


    Consider how the incident between the AI operated vehicle and the human operated
    vehicle unfolded. The AI operated shuttle accurately recognized the obstruction,
    predicted a potential collision scenario, and stopped. This is the strength of
    AI—observing many inputs and processing those quickly to arrive at a reasonably
    accurate decision.


    Since the collision happened anyway, the question is: what else could the AI operated
    vehicle have done to avoid the collision? This is where it becomes difficult.
    It could have honked loudly, which might seem like common sense and fairly a risk-free
    option to humans. It could have swerved away from the approaching truck, but this
    seems more difficult and riskier than a honk. For imperfect AI (still learning
    and improving) faced with uncertainty, a reasonable decision is to stop and do
    nothing.


    The core of the problem is information asymmetry—perfect information versus imperfect
    information. When we are thinking about human-machine interactions from a game-theory
    perspective, access to information (or lack of information) changes the outcomes
    radically. If the AI system and the human don’t know what the other will do—both
    have imperfect information—then the situation is extremely volatile and unpredictable.
    If AI has perfect information, that is, it knows what the human will do, then
    the uncertainty no longer exists (at least for AI with perfect information). The
    situation plays to the AI’s strengths. Similarly, if humans know what the AI will
    do, but the AI systems have imperfect information, we are creating a scenario
    that plays to the AI’s weaknesses.


    Let’s take the example of job applicants. Once the job applicants figured out
    that AI systems were looking at an absence of certain keywords to filter out job
    applications, they got creative and included every possible keyword that would
    show up as an important and critical skill in their resume. Awareness of how the
    algorithm worked meant applicants could manipulate the system to their benefit.


    There are heightened concerns that the preoccupation with autonomous driving and
    creating human-appearance like robots is distracting us from the more enterprise
    relevant, and potentially more transformational, applications of artificial intelligence
    in business. While there is nothing wrong with solving problems that we had never
    imagined we would be able to solve, prudence must be applied by business leaders.
    We must not stay stupefied by these fascinating applications of AI, but learn
    from these examples and apply novel ideas to solve business problems.


    How can managers can bring sanity into the AI operated world? Let’s take some
    inspiration from a scenario that played out during the period of the Cold War.


    Lieutenant Colonel Stanislav Petrov noticed that the Soviet information systems
    were sounding alerts about incoming nuclear missiles from the United States. He
    was responsible to make a well-informed decision and he had to act fast: Should
    he authorize a retaliatory attack or hold on and make further investigations?
    Fortunately for all of us, Petrov chose to investigate. He realized that a real
    attack was unlikely because of several other factors—one of which was the small
    number of “missiles” reported by the system. After his death in May 2017, a report
    credited him with “quietly saving the world” by not authorizing a retaliatory
    attack.


    The real reason behind the false alarm was due to system’s inability to accurately
    distinguish the light signatures of sun’s reflection off clouds to light signatures
    from missiles once they become airborne.


    Businesses face similar (although hopefully less consequential) questions about
    whether and when to remove humans from their decision-making processes. There
    are no simple answers. As the false alarm incident demonstrates, a human can add
    value by carefully evaluating a system’s recommendations and its implications
    before taking action. We can surely question the efficacy and robustness of the
    AI algorithms. Humans develop the algorithms, hence humans could add more value
    by helping the classification system prevent misclassification.


    If our world was full of autonomous machines, when and why would they want our
    assistance? In the nuclear attack scenario, the machines, while correctly predicting
    the imminent attack should also highlight the consequences of the desired action—worldwide
    destruction. Perhaps we should build enough checks and balances to weigh in the
    consequences of a certain action, even if it is the right thing to do.


    With immature AI, the machines should assess and recognize their own state of
    inaccuracy and initiate human intervention automatically. For example, if there
    are insufficient observations, humans are more likely to utilize their breadth
    of experience, confer with other humans, and learn from other instances in ways
    that machines cannot (yet). Classification does not have to be a binary state
    (missile or no missile); AI systems, when lacking confidence, should request human
    help.


    Fortunately, business decision-making often differs considerably from the fully
    automated machine world. The pace of digital business may have accelerated, yet
    many business decisions can still afford time for a second opinion where humans
    can play the role to confirm or deny. In business situations where time does not
    allow additional steps of human intervention, the AI systems should keep asking
    for additional training to correct errors.


    The key question is: Since AI is still maturing, should we take a wait and watch
    stance or should we take few pragmatic steps, clearly knowing that there are implications?'
  raw: '### Are AI Learning Scenarios Unpredictable Enough?


    What if a collision happens between an AI operated vehicle and a human operated
    vehicle? Quite naturally, the sensational headlines would play to our biased thinking
    that the machine is to blame. This scenario is not fiction. It actually happened
    in Las Vegas, where a minor collision happened between a self-driving shuttle
    and a human operated truck when the delivery truck backed into the front bumper
    of the shuttle. The AI operated vehicle was trained to stop if there is an obstruction
    on its path, and it behaved exactly as it was supposed to behave.


    This incident highlights a crucial gap in AI and human interactions. AI systems
    are typically trained in context where there are no external factors with adversary
    objectives. The focus is to learn from observations and, while designing such
    systems, our first intent is to get something working.


    Consider how the incident between the AI operated vehicle and the human operated
    vehicle unfolded. The AI operated shuttle accurately recognized the obstruction,
    predicted a potential collision scenario, and stopped. This is the strength of
    AI—observing many inputs and processing those quickly to arrive at a reasonably
    accurate decision.


    Since the collision happened anyway, the question is: what else could the AI operated
    vehicle have done to avoid the collision? This is where it becomes difficult.
    It could have honked loudly, which might seem like common sense and fairly a risk-free
    option to humans. It could have swerved away from the approaching truck, but this
    seems more difficult and riskier than a honk. For imperfect AI (still learning
    and improving) faced with uncertainty, a reasonable decision is to stop and do
    nothing.


    The core of the problem is information asymmetry—perfect information versus imperfect
    information. When we are thinking about human-machine interactions from a game-theory
    perspective, access to information (or lack of information) changes the outcomes
    radically. If the AI system and the human don’t know what the other will do—both
    have imperfect information—then the situation is extremely volatile and unpredictable.
    If AI has perfect information, that is, it knows what the human will do, then
    the uncertainty no longer exists (at least for AI with perfect information). The
    situation plays to the AI’s strengths. Similarly, if humans know what the AI will
    do, but the AI systems have imperfect information, we are creating a scenario
    that plays to the AI’s weaknesses.


    Let’s take the example of job applicants. Once the job applicants figured out
    that AI systems were looking at an absence of certain keywords to filter out job
    applications, they got creative and included every possible keyword that would
    show up as an important and critical skill in their resume. Awareness of how the
    algorithm worked meant applicants could manipulate the system to their benefit.


    There are heightened concerns that the preoccupation with autonomous driving and
    creating human-appearance like robots is distracting us from the more enterprise
    relevant, and potentially more transformational, applications of artificial intelligence
    in business. While there is nothing wrong with solving problems that we had never
    imagined we would be able to solve, prudence must be applied by business leaders.
    We must not stay stupefied by these fascinating applications of AI, but learn
    from these examples and apply novel ideas to solve business problems.


    How can managers can bring sanity into the AI operated world? Let’s take some
    inspiration from a scenario that played out during the period of the Cold War.


    Lieutenant Colonel Stanislav Petrov noticed that the Soviet information systems
    were sounding alerts about incoming nuclear missiles from the United States. He
    was responsible to make a well-informed decision and he had to act fast: Should
    he authorize a retaliatory attack or hold on and make further investigations?
    Fortunately for all of us, Petrov chose to investigate. He realized that a real
    attack was unlikely because of several other factors—one of which was the small
    number of “missiles” reported by the system. After his death in May 2017, a report
    credited him with “quietly saving the world” by not authorizing a retaliatory
    attack.


    The real reason behind the false alarm was due to system’s inability to accurately
    distinguish the light signatures of sun’s reflection off clouds to light signatures
    from missiles once they become airborne.


    Businesses face similar (although hopefully less consequential) questions about
    whether and when to remove humans from their decision-making processes. There
    are no simple answers. As the false alarm incident demonstrates, a human can add
    value by carefully evaluating a system’s recommendations and its implications
    before taking action. We can surely question the efficacy and robustness of the
    AI algorithms. Humans develop the algorithms, hence humans could add more value
    by helping the classification system prevent misclassification.


    If our world was full of autonomous machines, when and why would they want our
    assistance? In the nuclear attack scenario, the machines, while correctly predicting
    the imminent attack should also highlight the consequences of the desired action—worldwide
    destruction. Perhaps we should build enough checks and balances to weigh in the
    consequences of a certain action, even if it is the right thing to do.


    With immature AI, the machines should assess and recognize their own state of
    inaccuracy and initiate human intervention automatically. For example, if there
    are insufficient observations, humans are more likely to utilize their breadth
    of experience, confer with other humans, and learn from other instances in ways
    that machines cannot (yet). Classification does not have to be a binary state
    (missile or no missile); AI systems, when lacking confidence, should request human
    help.


    Fortunately, business decision-making often differs considerably from the fully
    automated machine world. The pace of digital business may have accelerated, yet
    many business decisions can still afford time for a second opinion where humans
    can play the role to confirm or deny. In business situations where time does not
    allow additional steps of human intervention, the AI systems should keep asking
    for additional training to correct errors.


    The key question is: Since AI is still maturing, should we take a wait and watch
    stance or should we take few pragmatic steps, clearly knowing that there are implications?'
  trans: '

    ### AI 学习场景是否足够不可预测？


    如果一辆 AI 驾驶的车辆与一辆人类驾驶的车辆发生碰撞会怎样？很自然地，耸人听闻的标题会让我们产生偏见，认为机器是罪魁祸首。这种情况并非虚构。它实际上发生在拉斯维加斯，当时一辆自动驾驶穿梭车与一辆人类驾驶的卡车发生了轻微碰撞，原因是那辆送货卡车倒车撞上了穿梭车的前保险杠。AI
    驾驶的车辆经过训练，如果路径上有障碍物就会停车，而它的行为完全符合预期。


    这一事件凸显了 AI 与人类互动中的一个关键差距。AI 系统通常是在没有外部敌对因素的环境中进行训练的。重点是从观察中学习，而在设计此类系统时，我们的首要意图是让某些功能能够运行起来。


    思考一下 AI 驾驶车辆与人类驾驶车辆之间的事件是如何展开的。AI 驾驶的穿梭车准确识别了障碍物，预测了潜在的碰撞场景，并停了下来。这就是 AI 的优势——观察大量输入信息并快速处理，从而得出相当准确的决策。


    既然碰撞还是发生了，问题在于：AI 驾驶的车辆还能做些什么来避免碰撞？这正是难点所在。它可以大声鸣笛，这对人类来说似乎是常识，也是一个相当无风险的选择。它也可以转向避开驶来的卡车，但这似乎比鸣笛更困难、风险也更大。对于面临不确定性的不完美
    AI（仍在学习和改进中）来说，一个合理的决定就是停下来，什么都不做。


    问题的核心是信息不对称——完美信息与不完美信息。当我们从博弈论的角度思考人机互动时，信息的获取（或信息的缺失）会彻底改变结果。如果 AI 系统和人类都不知道对方会做什么——双方都拥有不完美信息——那么情况就极其不稳定且不可预测。如果
    AI 拥有完美信息，即它知道人类会做什么，那么不确定性就不再存在（至少对于拥有完美信息的 AI 而言）。这种情况有利于发挥 AI 的优势。同样，如果人类知道
    AI 会做什么，但 AI 系统拥有不完美信息，那么我们就是在创造一个有利于 AI 弱点的场景。


    让我们以求职者为例。一旦求职者发现 AI 系统通过查找某些关键词的缺失来筛选求职申请，他们就会变得很有创意，在简历中列出所有可能显示为重要和关键技能的关键词。了解算法的工作原理意味着求职者可以操纵系统为自己谋利。


    人们越来越担心，对自动驾驶和创造类人机器人的过度关注，正在分散我们对人工智能在企业中更具相关性、可能更具变革性的应用的注意力。虽然解决我们从未想过能够解决的问题本身并没有错，但企业领导者必须谨慎行事。我们绝不能因为这些迷人的
    AI 应用而目瞪口呆，而应该从这些例子中学习，并运用新颖的想法来解决商业问题。


    管理者如何能让 AI 运营的世界恢复理性？让我们从冷战时期发生的一个场景中汲取一些灵感。


    斯坦尼斯拉夫·彼得罗夫中校注意到，苏联信息系统正在发出关于美国来袭核导弹的警报。他负责做出明智的决策，并且必须迅速行动：他应该授权进行报复性攻击，还是先稳住并做进一步调查？对我们所有人来说幸运的是，彼得罗夫选择了调查。他意识到真正的攻击不太可能，因为还有其他几个因素——其中之一是系统报告的“导弹”数量很少。2017
    年 5 月他去世后，一份报告称赞他因未授权报复性攻击而“悄然拯救了世界”。


    误报背后的真正原因是系统无法准确区分太阳光在云层上的反射信号与导弹升空后的信号。


    企业面临着类似（尽管希望后果不那么严重）的问题：是否以及何时将人类从决策过程中移除。没有简单的答案。正如误报事件所表明的那样，人类可以通过在采取行动前仔细评估系统的建议及其影响来增加价值。我们当然可以质疑
    AI 算法的有效性和稳健性。人类开发了算法，因此人类可以通过帮助分类系统防止错误分类来增加更多价值。


    如果我们的世界充满了自主机器，它们何时以及为何会需要我们的帮助？在核攻击场景中，机器在正确预测即将到来的攻击的同时，也应该强调所期望行动的后果——全球毁灭。也许我们应该建立足够的制衡机制来权衡某个行动的后果，即使这是正确的事情。


    对于不成熟的 AI，机器应该评估并认识到自身的不准确状态，并自动启动人工干预。例如，如果观察数据不足，人类更有可能利用其广泛的经验，与其他人类商议，并以机器尚无法做到的方式从其他实例中学习。分类不必是二元状态（导弹或非导弹）；AI
    系统在缺乏信心时，应请求人类帮助。


    幸运的是，商业决策通常与完全自动化的机器世界有很大不同。数字业务的步伐可能已经加快，但许多商业决策仍然有时间寻求第二意见，人类可以在其中扮演确认或否定的角色。在时间不允许额外人工干预步骤的商业情境中，AI
    系统应持续要求额外训练以纠正错误。


    关键问题是：既然 AI 仍在成熟过程中，我们是应该采取观望态度，还是应该采取一些务实的步骤，同时清楚地知道其中存在影响？

