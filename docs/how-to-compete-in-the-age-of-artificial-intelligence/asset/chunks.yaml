- fmt: '## What’s Your AIOps Strategy?


    IT operations has always needed to ensure stability and availability in IT performance
    management. This has led to cautious adoption of leading edge technologies like
    machine learning (`ML`). Implementation has typically been by vendors in tools
    targeting specific use cases.


    A comprehensive, enterprise-wide analytics and machine learning strategy has eluded
    most IT shops. The challenges in tooling, knowledge, and expertise have been too
    steep and there are too many other more pressing demands. In digital transformation,
    IT becomes the business. IT needs to balance the traditional demands of performance
    management with those of innovative business. To do this, IT must bridge IT and
    business data silos and leverage machine assistance to manage evolving customer
    desires and technological change.


    Mobility, the “consumerization” of customer expectations, elastic cloud infrastructure,
    rapidly changing application technologies, and continuous delivery all place new
    demands on IT that cannot be met with the old approach. Big Data has matured and
    commoditized sufficiently to support the vast and growing quantities of real-time
    data and processing required. The general adoption of APIs and open data platforms
    enables the sharing of critical information that used to be siloed in tools and
    databases. Machine learning is mature and ubiquitous in our technology and culture.


    Gartner estimates that by 2020, 50% of enterprises will actively use AIOps platforms
    to provide insight into both business execution and IT operations. IT doesn’t
    necessarily need to change what they do; they just need to do it faster, with
    less manual intervention, and across a broader and more complicated ecosystem.


    The following sections discuss the strategies we recommend.


    ### Establish Tools and Processes to Self-Organize the Systems Topology


    As the change happens across various areas of operations over time, it’s important
    to deploy tools that can monitor and discover the entire IT systems topology and
    its relationship on a continuous basis and keep the integrated topology view up-to-date.
    Such a dependency view and knowledge is key to faster discovery, faster root cause
    analysis, and better assessment of hotspots/bottlenecks in the IT systems landscape.


    ### Establish Real-Time Data Exploration and Reporting


    Service desk ticketing tools typically provide managers and executives with reporting
    capabilities. Most implementations come with a set of out-of-the-box, boilerplate
    reports with the ability for administrators to build new, custom reports and some
    ability for individual report users to change views and parameters to suit their
    needs. Most now also offer scheduling functionality and the ability to generate
    sharable presentations out of reporting queries. This is sufficient if your organization
    has the discipline to have scheduled reviews, where everyone brings their reports
    to the table and you can spend the time correlating, corroborating, reviewing,
    discussing, and leaving with a measurable action plan. If the demands of your
    business, market, and competition don’t permit this use of your time and resources,
    it has substantially less utility. A better approach is to have all necessary
    data available in an easy-to-use exploration tool that’s available to everyone
    in the organization and updated in real time. This allows all stakeholders to
    see the top level (executive) view and dynamically investigate interesting trends,
    anomalies, or issues together, without having to collate reports or run new ones.


    ### Natural Language Processing (NLP) to Eliminate Manual Categorization


    Reporting and incident management rely on the fundamental organizational principle
    of categorization. Every ticket has structured properties assigned based on the
    source, process, etc. Routing, ownership, and ultimately reporting rely on user-,
    system-, or triage-assigned categories, which are often a reflection of what is
    in a free-text field like “Description” or “Issue.”


    In IT, it is a known but rarely discussed fact that this model of classification
    is broken. Users don’t have the patience, discipline, or knowledge to accurately
    self-assign categorizations and priorities. Categories represent an inside-out
    view of the business: what IT thinks is important is to treat the issues, not
    what users think is important to say about them. IT departments build category
    hierarchies once and iterate on them over time without rationalizing or pruning
    options. Any sufficiently mature IT shop will have hundreds or thousands of possible
    categorizations, with entries that are too broad, too narrow, meaningless, or
    irrelevant. A top category will always be “Other.” Additionally, static classifications,
    whether assigned by the user or the system, can’t capture what is new. As a result,
    using categorization for reporting or intelligent routing is practically impossible.
    The remedy most often employed is simple brute-force reclassification: staff or
    contractor resources read ticket descriptions to correct or add categorizations.
    This is unnecessarily expensive, inconsistent, and inefficient.


    A modern, analytics-based approach to address this problem would use natural language
    processing (`NLP`) backed by machine learning to process the free text of the
    tickets. Categories could be applied, but a more efficient approach would be to
    bypass categorization altogether and have dynamically updating and changing issues
    clustering based on what is actually happening in the environment. Natural language
    processing is all around us. There are simple applications like predictive typing
    on your mobile device and grammar checking in your word processing program, to
    complex implementations like auto-correct and de-duplication in Google search
    or résumé processing in Taleo. Chatbots, the next “everyday” implementation of
    artificial intelligence, rely on `NLP` to work. `NLP` needs to be a pillar of
    every IT ticket and incident management strategy.


    ### Implement ML Across the Enterprise


    Machine learning (`ML`) is a type of artificial intelligence (`AI`) that gives
    computers the ability to learn without being explicitly programmed. Said another
    way, `ML` is a capacity of computer systems to learn from data and computational
    results without direct human intervention. Understood this way, `ML` is not about
    doing or generating something completely new. It is about building on a foundation
    of domain knowledge and practices to automate adaptation in that context. In IT,
    we want to use `ML` to mimic what our best domain practitioners do, but do it
    faster and more consistently, simultaneously freeing up those practitioners for
    higher-value work. Take the `NLP` example from the previous strategy. If we use
    machine learning on `NLP` processing of free text fields, we don’t expect the
    system to learn without a language dictionary and grammar, nor without a list
    of words that can be ignored (e.g., “or,” “the,” etc.). Programmed with this information,
    the system can then begin to learn from the data which words appear most frequently
    and in what combination, how variations of the same thing can be expressed, and
    even the context to determine when words are misspelled.


    These are all things that humans can do. Implementation of `ML` in an IT context
    should be done with the goal of automating human tasks that involve learning.
    These are typically concrete and focused: monitoring activity and alerting/notifying,
    triage, routing, probable cause investigation, capacity modeling and prediction,
    etc. Implementing `ML` to take over responsibility for these tasks is manageable
    given the state of technology and IT domain knowledge. Doing so will free up your
    human capital for other value-added activities.'
