  trans: '

    #### 省心省力的客户忠诚度计划


    几乎每家企业都有忠诚度计划（作为其客户关系与营销策略的一部分），通过差异化待遇、大幅折扣、优先体验尚未全面上市的产品或服务、优惠券、代金券等方式，奖励其重要客户并鼓励他们保持忠诚。一个好的忠诚度计划不仅关乎奖励重要客户，更是强化客户关系的重要策略。


    然而在现实中，从消费者角度来看，我们被迫参与多个忠诚度计划，每个计划都有各自的奖励机制、复杂的积分体系和繁琐的兑换流程。结果就是消费者未能真正受益，企业也未能获得真正意义上的客户忠诚度。


    区块链或许就是答案。对于在众多忠诚度计划（实体卡或数字钱包）中迷失方向的消费者而言，区块链能提供一个统一的平台，无缝管理每个忠诚度计划的选项，包括限制条件和兑换规则。具体如何实现？


    区块链能够建立一个在参与者（消费者和企业）网络间共享的分布式交易账本。当新交易发生时（如忠诚度积分的发放、兑换或交换），区块链会针对该交易生成一个算法代币。这些代币被分组为区块并分布到整个网络，同时更新每个账本。此外，区块链确保这些区块经过验证并与旧区块链接，从而为所有交易创建安全透明的审计追踪，无需中介机构介入。


    基于区块链的客户忠诚度计划意味着企业能拥有一个强大且值得信赖的合作伙伴网络，在此网络中，企业可以开展协作，在自身核心产品和服务之外提供更多选择，从而突破狭隘的个体忠诚度计划限制，减少客户的麻烦。


    #### 创意护照


    这是针对音乐行业的智能合约。音乐行业的一大痛点在于，词曲作者、制作人和音乐人始终处于盲区——他们不清楚版权如何处理、版税如何计算，也不了解数字产品通常如何管理和分发，以及消费者如何消费他们的数字产品。


    这给生产者和消费者都带来了巨大挑战。


    区块链能够提供一个经过验证、透明且分布式的全球音乐注册系统来管理数字产品的生命周期，从而消除当前创意产业面临的挑战，同时为所有参与音乐创作或互动的人提供无缝体验。例如，收听一首歌的行为会自动触发区块链系统中的一系列事件，涉及这首歌旅程中的每一位参与者——无论是想体验这首歌或与之开展业务的人（个人消费者、像`Spotify`或`iTunes`这样的数字服务提供商、播放这首歌的广播电台，还是使用这首歌的电影制作团队等）。区块链系统还有一个额外优势：存储关于音乐的元数据，类似于一种“创意护照”，这些数据可以随时更新，并对所有人开放。


    #### 透明治理


    每年，世界各国政府在改善社会和公民福利计划上花费数十亿美元。然而，由于腐败、低效的中间层级以及缺乏完善的审计系统，其中相当一部分资金并未到达预期受益人手中。除此之外，大量人力被浪费在数据录入、校对、验证、日志记录等重复且单调的任务上。


    通过引入由人工智能驱动并基于区块链技术构建的智能自动化管理系统，可以在治理机制中实现高度效率和透明度。利用人工智能，可以将人力资源解放出来，用于更重要的活动，同时所有冗余任务都能实现自动化。人工智能系统能够生成大量洞察，以了解各项计划和政策实施的进展，从而消除任何形式的人为干预或篡改，进而避免腐败。


    借助区块链，公民和政府可以建立值得信赖的政策实施和数据交换机制，无需担心故障、腐败或恶意干预。公民可以核实政府支出的声明，并附上证据提出关切。得益于区块链系统中提供的智能审计追踪，政府可以监控所有部门的所有活动。


    #### 全球化验证系统


    如今，全球存在大量需要跨境信息共享和整合视图的验证系统，无论是公民身份与身份验证、移民详细信息，还是信用与财务历史等。这些数据高度敏感，一旦落入不当之手就可能被篡改。然而，为了移民、银行、教育、科研项目等全球系统的顺畅运行，透明地获取信息以验证声明和身份至关重要。


    人工智能系统有助于研究存储在数据中关于人们的深层模式，并预测其信用评分、财务健康状况或身份，这对于安全目的至关重要，例如预防恐怖主义相关犯罪或金融犯罪（如反洗钱等）。


    一个全球性的去中心化犯罪记录、金融欺诈等注册系统，将确保人工智能系统能够基于经过验证的数据进行自我训练，从而得出结论并识别异常值或离群点。基于区块链的全球验证系统有助于弥合全球调查与验证机构之间的差距，从而简化全球验证流程，最终实现更顺畅的跨境往来。


    #### 创新审计与合规系统


    区块链创建了一个用于独立验证声明的去中心化网络，使当局和企业更容易遵守合规与监管要求。区块链网络上的每笔交易都会留下不可篡改且不可逆的数字痕迹。任何机构都可以审计这一痕迹，并用于验证声明的真实性。


    利用人工智能，这些审计数据可用于为客户和公民提供更好的服务，例如关于房地产的准确定价和法律信息、税务计算与税务责任、遵守国家或全球公认的产品和服务质量标准等。随着更多权威数据的出现，人工智能系统能够为最终用户提供不间断且事实准确的信息和服务，其可能性是无限的。


    #### 数据与人工智能货币化


    将收集到的数据（我们的数据）货币化，是`Facebook`和`Google`等大型公司的巨大收入来源。


    我们在网络或使用应用程序时所做的每一件事，都会留下庞大的数据足迹。这些数据被汇总，最终用于向我们进行交叉销售和追加销售。这使得数据变得极其宝贵——比我们这些原始数据生成者意识到的还要宝贵——而我们却免费将其拱手相让。


    区块链实现了微交易，使我们能够拥有、控制并货币化自己的数据。人工智能也是如此。如果我们利用自己的数据开发人工智能算法，就可以将这些算法放在人工智能市场上供他人使用。然后，我们就能根据使用量获得报酬。

    '
- fmt: '# The Case for Decentralized AI


    Until recently, the contemporary AI industry was based on a centralized development
    and usage model where machine learning solutions were designed, developed, and
    accessed as a part of cloud-based AI platform and associated APIs. Now we are
    moving toward the next frontier—decentralized AIs that can run and train on local
    devices or make decisions in decentralized networks like blockchain.


    The existing AI market is increasingly controlled by tech giants like Google,
    IBM, and Microsoft, all of which offer cloud-based AI solutions and APIs. This
    model assumes little control of users over the AI products, and in the long run,
    such a centralized model could lead to the monopolization of the AI market. This
    could cause unfair pricing, a lack of transparency, interoperability, and limited
    participation of smaller companies in AI innovation. Fortunately, we are witnessing
    the emergence of a decentralized AI market, born at the intersection of blockchain,
    on-device AI, and edge computing/IoT.


    The transition to decentralized AI is enabled by new technologies, such as Google’s
    federated learning, that allow for crowd-training of ML algorithms, device-centric
    AI that run and train ML models on mobile devices, and the use of AI in DAOs (decentralized
    autonomous organizations) on blockchain networks.


    ## AI and Decentralized Autonomous Organizations


    DAOs manifest when we entrust some or all decision-making responsibilities to
    AI agents. For example, If you are a holder of ownership rights, you can cede
    your decision making (e.g., yes/no votes) to an AI agent (another smart contract)
    that will make all the decisions on your behalf. Or, in a more radical scenario,
    we can entrust AI agents to play the role of managers and take all organizational
    and business decisions. For example, imagine an AI agent for marketing, where
    the AI agent selects the best ad companies to place your ads with. After each
    marketing cycle, the AI agent would assess the ROI and adjust the marketing strategy
    automatically.


    In essence, DAOs take us to a qualitatively new economic reality where AI agents
    become business administrators and are overseeing business performance and continuously
    learning from and with other AI agents in a decentralized network. `Terra0` is
    a project proposed by Paul Seidler and Paul Kolling from the University of Arts,
    Berlin. The concept involves augmented intelligence agents managing and monetizing
    a self-owned forest. Forestland ownership is structured as an DAO with smart contracts
    on the Ethereum blockchain. Then, using drones and satellites, the AI agents evaluate
    the woodstock and decide how much and when to sell in the market. Once the project
    is up and running, the DAO can pay out debts to its initial owners and eventually
    turn the forest into an autonomous, self-owned entity that controls its own resources.


    Recent advances in decentralized AI have been made thanks to on-device optimization
    of AI/ML for smart phones and production of dedicated chips for mobile AI and
    for desktops (e.g., Google’s TPU).


    Decentralized AI gained powerful momentum in April 2017 after Google announced
    its new Federated Learning concept. This innovation signals a transition to fully
    decentralized learning and device-centric AI where machine learning models are
    trained directly on user smart phones. Keeping the privacy of user data intact,
    Google can now outsource AI training to Android users, enabling on-device improvement
    of shared models. Federated Learning will solve the problem of high-latency and
    low-throughput connections where users have to connect to remote servers to use
    ML software.


    The move toward device-centric AI can also be seen in the release of Google’s
    `TensorFlow Lite`, a mobile version of a machine learning library fined-tuned
    to the computational and power constraints of smart phones. In June 2017, Apple
    followed Google’s lead by releasing its `Core ML` library for iOS devices. The
    library ships with the optimized general-purpose ML models and tools to convert
    third-party models into the iOS format. Making models available locally without
    a network connection will make it easier to develop mobile applications with AI
    functionality.


    In the long run, a combination of on-device AI and decentralized learning will
    make AI more democratic and widespread than ever before, resulting in more and
    more organizations becoming DAOs.


    What is accelerating this trend?


    - **Autonomous AI on blockchain**: DAOs are algorithmic companies run by autonomous
    AI agents. When you put these autonomous AI agents on an Ethereum blockchain,
    you can effectively manage distribution of royalties, subscription payments, smart
    contracts, and more.


    - **Decentralized learning at the edge**: On the device, AI capabilities such
    as mobile machine learning libraries from Apple’s `CoreML` allows complex AI algorithms
    to run on IoT devices like sensors, security cameras, drones, or autonomous vehicles.'
