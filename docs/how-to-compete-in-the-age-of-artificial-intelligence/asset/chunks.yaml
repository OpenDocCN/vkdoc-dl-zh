  trans: '

    ### AI 战略的前提：数据驱动战略


    想象一下，采用一种战略，能够向每位员工（无论其级别和角色）提供通知和建议，帮助他们以最优方式执行分配的任务，从而不仅实现个人目标，还能为公司整体目标做出贡献。再想象一下，这些通知和建议通过恰当的渠道，在恰当的时间，以精确且规定的方式送达。结果会怎样？


    员工将变得更具生产力和效率，用更少的精力完成更多的事情，更贴近客户，有更多时间改进产品或服务，并总体上将企业提升为高绩效的数据驱动型企业。


    要使通知和建议高度有效，它们本质上应具有规定性，以减少歧义或依赖性的可能，并且应与需要采取的行动有清晰的联系，从而产生可衡量的结果。这种规定性智能，尤其是基于“历史事件-行动-结果”范式的智能，能够显著提升工作质量。它还能极大地影响和改善组织的生产力提升指标，例如`首次正确率`、`按时完成率`、`客户满意度指数`、`员工生产力`（按收入贡献占比计算）等等。这有可能实现吗？


    设计这些通知和规定性建议需要深入理解流程、工作流以及系统间的依赖关系，并对员工在执行任务中所扮演的角色有更广阔的视野。规定性模型有效性的关键在于，每条建议都应高度契合具体任务以及负责执行该任务的员工。


    这不是一蹴而就的工作。这些通知和建议需要持续监控和衡量其相关性与召回率。同时，还需精心校准这些选项和建议的推送频率。过度推送通知和建议会让员工对这些东西产生依赖和过高期望，他们将停止运用自己的判断力，通常也不会再学习。同样，推送不足则会导致企业整体运作出现巨大瓶颈。


    如果业务环境发生变化呢？或者员工更换了角色呢？


    这正是需要持续监控通知和建议生成机制的原因。在宏观层面，这些通知和建议需要反映不断变化的业务环境和优先级，例如：企业正在进入的新市场、正在寻求的并购机会，或正在推出的新产品线等。在微观层面，员工的职责、工作职能、角色、隶属关系以及与特定团队或项目的关联都可能发生变化，这要求通知和建议也随之调整适应。


    你将如何开发这些通知和建议？


    生成和推送这些通知和建议可以通过多种技术实现：从`if-then-else`规则、启发式方法开始，将阈值和警报嵌入每个业务流程，或者通过机器学习（ML）和人工智能（AI）来实现。


    AI 和 ML 从数据中学习，能处理比人类可能处理的更多的信号，从而产生原本不可能实现、或无法以自适应和最优方式推送的通知和建议。AI 和 ML 相对于其他技术的优势在于，一旦经过训练，它们就能自我学习。它们会观察由通知和建议触发的行动所产生的影响；简而言之，它们不是硬编码的。它们分析员工执行的“行动”及其相关影响，以改进通知和建议的规定性质量。


    好的。那么如何开始呢？


    显而易见的选择是从小处着手，瞄准你最棘手的流程（不一定是最复杂的流程），针对那些本质重复但涉及大量交接的活动，以及那些目前需要手动进行验证的任务。从小处着手不仅能使数据驱动战略更成功，还能提供一个试验场，以便你能逐步推进到更高级的通知和建议，例如通过
    AI 和 ML 实现的那些。随着时间的推移，这些通知和建议将逐步成熟，变得自动化、规定性且智能化。


    ### 避免偏见


    AI 模型从数据中学习。这里所说的学习，是指将统计和数学模型应用于大量已知数据，从而得出一个代表该数据集行为的数学公式。当你将这个数学公式应用于一组它从未见过的不同数据时，它应该能正确识别出未知数据集的行为。这就像你在已知事物上进行实验以发现模式，然后将该知识应用于未知事物，以判断你的模式匹配是否正确。


    这个学习过程对于 AI 模型的成功至关重要。很多地方都可能出错。如果你在训练数据上获得了 100% 的准确率，那么你的模型在真实世界数据上的表现很可能会非常糟糕。这被称为`过拟合`。另一方面，如果你在训练数据上连像样的准确率都达不到，那么它永远无法在真实世界数据上表现良好。这被称为`欠拟合`。太糟糕了。


    关于你的模型应该处于`欠拟合`到`过拟合`这个光谱上的哪个位置，并没有硬性规定。这取决于你所解决问题的具体情境。某些应用需要比其他应用高得多的准确率；例如，你不会接受一辆准确率只有
    99% 的自动驾驶汽车。而你可能对 60% 时间准确的产品推荐感到非常满意。


    随着 AI 日益成为我们生活的一部分，质疑 AI 如何以及为何做出它所给出的推荐变得至关重要。大多数 AI 解决方案都是“黑箱”，意味着整个决策过程是隐藏的（为什么我的
    GPS 重新规划了路线？）。因此，AI 的透明度和公正性对于建立信任至关重要。有偏见的数据和有偏见的算法会导致有偏见的预测。


    偏见究竟如何影响算法？


    #### 数据驱动的偏见


    对于任何从数据中学习的机器来说，其输出在很大程度上取决于它用来学习的数据质量。这并非新认识。如果训练数据集本身就有偏差，那么结果同样会有偏差。


    最近，这种偏见出现在尼康的人脸识别 AI 解决方案中。当拍摄微笑的亚洲面孔时，它会弹出“有人眨眼了吗？”的警报。这是一个明显的 AI 解决方案从有偏差的示例集中学习的案例，无疑凸显了当我们不注意数据中的偏见时可能出现的问题。


    #### 通过交互产生的偏见


    有些 AI 解决方案，比如聊天机器人，是通过交互来学习的。其理念相当简单。你与机器交互，机器反过来从你身上学习，以形成后续响应的基础。微软的 Tay 是一个基于
    Twitter 的聊天机器人，旨在通过与用户的交互来学习。不幸的是，Tay 接触到了一个充斥着种族主义和厌女言论的用户群体。结果，在 24 小时内，Tay
    就变成了一个相当激进的种族主义者，并被迫下线。

    '
- fmt: '#### Emergent Bias


    We all want products, services, and offers to be personalized for us. However,
    if we try to personalize too much, we tend to get into the trap of seeing things
    what we want to see, without contradictory or novel views. Let’s take the example
    of our favorite news site. As we open, like, and share content, we keep feeding
    our existing belief set to the algorithm that does the personalization. The result
    is that we start living in a world of conformity belief.


    These information biases have the potential to skew our thinking. A person who
    is only getting information that he likes from the people who think like him will
    never see contrasting points of view and will tend to ignore and deny alternatives.


    #### Similarity Bias


    Information systems that only provide results like “similar to” tend to information
    asymmetry. `Google News` is designed to provide stories that match the user queries.
    This is explicitly what it is designed to do and it does the job very well. The
    result is a set of similar stories that tend to confirm and corroborate each other.


    Having a different point of view supports innovation and creativity and in general
    acts as a powerful engine for improving decision making. However, if you are always
    provided “similar to” kind of information, you unknowingly are getting biased
    information.


    #### Conflicting Goals Bias


    Sometimes systems that are designed for very specific business purposes end up
    having biases that are real but completely unforeseen.


    Maximize revenue and reduce operating cost are, for example, two metrics always
    in conflict with each other. If your AI solutions look at these two metrics in
    isolation and lead you to making changes, chances are that you may excel in both,
    but separately. However, when you start correlating your actions at a holistic
    level, you will realize that you have not really improved much. Rather you are
    in a vicious loop of prioritizing one versus the other.


    #### Machine Bias Is Human Bias


    Lastly, humans build algorithms (at least as of now), and as a result, algorithms
    end up reflecting our biases as well. Hence, before we start developing AI solutions,
    we need to develop an objective view of the problem we are trying to solve.


    ## Are You Ready for AI?


    Not every problem can be solved by AI (read as ML), and not every company has
    the wherewithal to apply AI at scale across the enterprise. So how do you assess
    whether your organization is ready to reap the benefits of AI?


    To begin with, do you know what problems you want to solve? Do you know what you
    want to predict? Do you have enough data to build predictive models? Do you have
    the skilled people and technology platforms to build and train models? Do you
    already have statistical or physical models to give you a baseline for predictions?


    There are three broad prerequisites to an AI approach: You must have lots of data,
    you must have capabilities to interpret the data, and you must have a way of making
    predictions from the data that help you achieve certain business outcomes. As
    you contemplate the introduction of AI into your organization, the next section
    outlines a list of best practices and critical success factors for your AI initiatives
    to succeed.


    ### How to Define an AI Strategy


    Given the hype that surrounds AI in general, business leaders need to critically
    determine the areas where AI can (and cannot) make significant material differences
    to the top or bottom line or even completely change their current business model.
    This is not an easy task and requires a dispassionate and objective view to address
    two specific areas: a) AI influenced industry disruptions that may significantly
    impact the current business model, and b) how to introduce and implement AI-driven
    solutions to usher significant changes to the way the company currently operates.


    #### Identify Potential AI Use Cases


    With every new technology buzzword, it is generally observed that companies go
    into a procrastination mode for quite some time. Reasons could be many—not enough
    appetite to experiment and learn, don’t want to become the first few to take the
    plunge, uncertainty about the technology, or not enough confidence on the outcomes.
    The list can go on and on.


    Hence, business leaders need to move quickly and identify opportunities where
    AI will create business value. A sure way to generate a list of business relevant
    AI use cases is to discuss the topic with everyone, including startups (you don’t
    have to invent everything by yourself, rather look for collaboration and identify
    adjacencies or whitespaces that others are trying to figure out), do extensive
    research around the competitive landscape, and conduct design thinking sessions
    with your own business and IT leaders.


    A very effective way of getting started is to brainstorm along two distinct themes.


    Product/service innovation related questions:


    *   Does it provide a force-multiplier by improving efficiency or significantly
    reduce cost?

    *   Can it enable a better, efficient, and lower cost product substitution, thus
    altering the market dynamics?

    *   Does it integrate the enterprise value chain by optimizing or rationalizing
    processes, thus shortening time-to-market?

    *   Will it introduce features with hard entry barriers and thus enable you to
    charge premium and high margins?


    Value realization related questions:


    *   Does it provide opportunities to leverage your current customer base and develop
    new services so that you can monetize your investments on data and algorithms?

    *   Is there any way to truly introduce differentiation and value-add services
    for non-linear growths by establishing network effects based on an ecosystem or
    a platform?

    *   Will it create uniqueness and establish strong entry barriers by preventing
    competitors from replicating your products, services, and offerings?

    *   Will it increase the cost significantly for your competitors to create alternative
    options, or will your competitors be more than willing to provide complementary
    offerings, thus adopting a sharing economy?


    If the answers to these questions are more likely yes, cutting across business
    functions, corporate functions, and HR practices, you will likely end up formulating
    your own AI strategy. When you’re doing this exercise, don’t allow constraints
    to limit your answers.


    Later in this chapter, we discuss a structured approach to defining AI use cases.


    #### Assess Adoption Scenarios


    Once you have identified your high-level AI use cases, start doing an assessment,
    which may further involve market studies, surveys with your existing customers,
    or even an independent validation by industry reputed consultants to determine
    what kind of adoption scenarios your AI initiatives will go through. Whether it
    will go mainstream or remain a niche offering. Essentially what you are looking
    for are early indicators—universal applicability, customer awareness and readiness,
    low switching barriers, low TCO, high ecosystem compatibility, scalability, and
    fewer regulatory barriers.


    The more “yes’s” you get against these indicators, the more you know that your
    AI solutions are ready for mass adoption and hence you should start formulating
    investment strategies and go-to-market strategies. If you are getting guarded
    answers against a majority of these indicators, you know that it falls into a
    niche offering category. Hence you need to start thinking about how to create
    a market for your AI solutions.'
