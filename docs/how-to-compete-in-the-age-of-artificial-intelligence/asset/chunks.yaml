  trans: '

    # 8. IT 运维与人工智能


    每家企业都在向数字化企业转型，因此持续推动着将所有业务上云、以数据为驱动、将 AI 嵌入每个流程，并以极致的敏捷模式开展所有工作。虽然这些举措都很好，甚至可能是成为数字化企业所必需的复杂性，但与此同时，数字化也意味着要始终处于开发与运维活动的持续博弈之中。这让人联想到热力学第二定律：除非从外部向系统注入能量，否则熵会随时间增加。


    让我们进一步探讨这个类比，看看人工智能如何在 IT 运维领域发挥关键作用。


    IT 运维领域——尤其是生产运行、维护和保养活动——始终在与熵（即无序状态）作斗争。IT 运维人员花费大量时间和精力来维持一切正常运行，并始终承受着越来越大的压力，需要预测何时会出现问题，并准备好修复方案和冗长的根本原因分析文档。


    相比之下，开发活动实际上*增加*了熵的水平。每一个投入生产的新应用、每一次底层操作系统的新版本发布及相关升级、每一项向用户引入的新技术，都是必须做出的变更，这增加了运维团队竭力防止的无序状态发生的概率。


    虽然开发世界的快节奏不可避免，但如果变更得不到管理，最终将导致某些环节崩溃，除非人们持续投入精力来防止这些故障。这些相互冲突的目标如果走向极端，可能会在企业内部滚雪球般演变成不健康的局面，运维部门积极抵制变更，而开发部门则积极推动变更。


    我们需要什么？一个灵活、整体的框架，包含一套诊断和预测工具、自动化以及人机协同能力，使运维团队能够拥抱变化。这个灵活的整体框架被称为 `AIOps`，这是
    Gartner 研究公司创造的一个术语，用于描述一种基于 AI 技术实现的自动化分析来增强人类技能的 IT 运维新方式。


    `AIOps` 这个术语本身既不是一种解决方案，也不是一种理念，而是一个总体框架，用于解决如何应对日益增长的性能需求和管理 IT 复杂性。这涉及到开发新的强大技术，这些技术有潜力从根本上改变
    IT 运维乃至整个数字化企业。


    Gartner 提出了大量需要集成和管理的能力：


    *   历史数据管理，包括结构化数据和非结构化数据

    *   流式数据管理，包括多设备访问和使用

    *   主要从系统和网络生成的日志数据管理

    *   自动化模式发现与预测

    *   根本原因分析及作为热修复的脚本

    *   软件即服务，主要是基于云的解决方案以及以一对多模式消费的相关数据服务


    当今的 IT 环境过于复杂，任何个人甚至单个团队都无法独自管理；相反，所需的技能包含多个专业领域（全栈工程师）。相应地，每个专业领域都需要其特定的工具来监控、指导、建议、修复，并使
    IT 运维人员能够有效承担责任。在某个节点上，将这些局部视图组合起来以获得对环境中实际发生情况的整体理解，会变得非常困难和混乱。


    由于现代 IT 环境的规模和细微差别（混合云环境和一切即服务类型的格局）以及企业所需的变更速度日益加快，旧式的基于规则和逐级上报的方法（L1-L2-L3）已变得不可持续且脆弱，需要付出更多努力和细心。特别是当基础设施为了响应不断变化的条件和需求而变得更加自我修改（基础设施即代码）时，IT
    运维需要加速才能跟上步伐。


    每一项新技术的出现，都需要理解其表象背后的“为什么”，以便做出更好的决策。

    '
- fmt: '# Why Does Your Business Need AIOps?


    Digital transformation hinges around four broad areas and organizations may have
    different implementation strategies across these areas:


    - Hardware to applications to business transactions (impacting revenue, cost,
    or customer satisfaction)

    - Legacy technology to new-age microservices transformation (impacting dual speed
    of IT and responsiveness of IT systems)

    - Infrastructure consolidation and modernization for on-field (things), on-premise,
    and on-cloud (impacting robustness, scalability, and performance)

    - Different time intervals for changes across all of the above (impacting go-to-market
    readiness)


    It is clear that digital transformation requires increased cloud adoption and
    readiness to respond to rapid development and production deployment capabilities.
    However, when you add essential complexities like demand for continuous innovation
    and continuous development (`CICD`), increasing adoption of machine agents, Internet
    of Things (`IoT`) devices, Application Program Interfaces (`APIs`), and so on,
    your IT operations scope is exposed to too many unknowns. This strains the traditional
    service management best practices, the team’s capabilities, and the skills and
    tools to the breaking point. See Figure [8-1](#467925_1_En_8_Chapter.xhtml#Fig1).


    ![../images/467925_1_En_8_Chapter/467925_1_En_8_Fig1_HTML.png](images/467925_1_En_8_Chapter/467925_1_En_8_Fig1_HTML.png)


    Figure 8-1 IT systems topology


    Here we have listed a few key friction points that exist in the current service
    management set up:


    - **Very little automated approach to IT operations**: Modern IT systems landscape
    include managed cloud, hybrid cloud, third-party services, SaaS applications,
    mobile applications, APIs, crowd-sourced applications, IoT devices, etc. In short,
    the IT environment is complex, dynamic, and elastic in nature. The traditional
    approach of managing IT environments through human oversight is no longer a feasible
    solution. With too many touchpoints and multi-channel access to systems, applications,
    and data, the need is to have a highly automated way of tracking, monitoring,
    and resolving issues.


    - **Too many systems, too much data to deal with**: The IT systems landscape is
    no longer confined to large monolithic stacks; there are way too many specialized
    applications and systems solving specific enterprise needs. The result? Exponentially
    larger numbers of events and alerts and increased service ticket volumes. It has
    simply become too complex to understand all the data generated from all these
    applications and serve the SLAs at the same time. With too many touchpoints and
    multi-channel access to systems, applications, and data, the need is to have a
    highly automated way of tracking, monitoring, and resolving issues.


    - **Need for almost real-time responses to events**: Going digital has created
    a divide in the enterprise IT systems. Frontend customer facing systems are running
    at a higher speed compared to backend process-centric mission-critical systems.
    In many organizations, the IT’s role in enabling business has been so phenomenal
    that now IT has become the business. Subsequently, “consumerization” of technology
    has changed user expectations to such an extent that businesses now have to respond
    to IT events much faster than ever before. Whether it is responding to real or
    perceived situations, the responses need to happen almost instantaneously.


    - **Compute infrastructure moving to the cloud or to the edge**: Cloudification
    has simply disrupted the very existence of IT functions, budgets, and controls.
    More and more compute infrastructure needs are now on a usage-based principle.
    While this trend is good from a cost management perspective, it creates additional
    strains on IT teams to manage hybrid environments, where some applications are
    on cloud and some are on-premise.


    - **Agile development methods at odds with Operations responsibility**: DevOps
    and Agile methodologies have enabled the businesses to experiment, prototype,
    and deploy applications to production at a rapid pace. However, the responsibilities
    of managing, monitoring, and maintaining these applications are still left to
    the IT operations teams. Lack of knowledge about these new technologies is pushing
    the IT operations teams to be in a catch-up mode all the time.


    - **Too many false positive alerts**: In the digital world, owing to the nature
    of business and numerous customer touchpoints, the business applications and IT
    systems are at the receiving end of increased user activities all the time. There
    is virtually no down-time expected. This heightened usage requirement consequently
    is subjected to an increased number of false alarms in terms of response times,
    accessibility, availability, and scalability. IT operations teams are challenged
    to analyze an increasing volume of individual tickets and pinpoint to the root
    causes. They have to deal with multiple monitoring solutions and multiple related
    alerts for the same issue that could also create an event storm that seizes up
    resources when only one notification and incident ticket would be more practical.


    Moreover, once the root cause is identified, the IT operations team goes through
    a difficult triage procedure to route the issue to the right team based on earlier
    guidelines about who will fix the issue; this particular aspect is cumbersome
    because the IT landscape no longer consists of a few large monolithic applications.
    Rather today’s IT landscape is all about a diverse set of infrastructure (on-premise
    and cloud) apps, varying SLA expectations, and multiple vendors (some of them
    open source).


    So, how can AIOps help solve these kinds of issues in an intelligent, integrated,
    and automated way?


    ## What Constitutes an AIOps Platform


    IT operations personnel are overwhelmed with tickets, stringent SLAs, and numerous
    data points they need to analyze in order arrive at the root cause. They see that
    traditional IT operations management techniques are not up to the task, and they
    don’t know where to start. They expect AIOps systems to figure it all out. Two
    key expectations from AIOps are automation and prediction.'
