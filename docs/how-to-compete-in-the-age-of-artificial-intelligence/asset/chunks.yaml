    # 面向管理者的区块链入门指南


    我们见证了两波浪潮：最初稀缺且昂贵的资源变得廉价，随后涌现出利用这些资源的技术。当计算能力（晶体管）变得廉价时，个人电脑（PC）应运而生；当带宽变得廉价时，互联网随之兴起。同样，区块链是第三波浪潮，廉价的存储使我们能够创建一种分布式（用于记录所有权的分布式账本）、对所有人开放（且安全）的重要信息记录方式，从而在虚拟世界中引入了一种稳健、透明且可信的资产发行与转移机制。


    区块链（分布式账本）是一种安全、分布式且不可篡改的数据库，由分布式网络中的所有参与者访问，交易数据（基本信息记录在`链上`，附件等则记录在`链下`）在此记录并接受审计。数据存储在称为`区块`的结构中。这些区块通过`哈希`相互连接成一条`链`（每个区块还包含一个`时间戳`，并通过其`哈希`链接到前一个区块）。区块包含一个头部，其中包含元数据信息和内容（实际交易数据）。由于每个区块都与前一个相连，随着参与者和区块数量的增加，未经网络共识而修改区块链中的信息将变得极其困难。


    区块链具有三大主要特征：


    - **去中心化控制**：区块链运行在共享控制框架之上，为参与者提供实现共同目标的通用机制。区块链网络中的任何单一实体都不拥有其他实体所没有的专有权利。这使得各种交易服务的去中心化网络能够顺利形成。在需要让所有人了解最佳实践以整体改进流程、使最终用户受益、并让所有人更容易确保更好的治理和合规性的情况下，这一点极具影响力。


    - **资产交换**：这或许是区块链最重要的特征，因为所有交易都被记录，且没有任何单一实体能完全控制网络中发生的一切。该系统允许价值物品（即具有价值的数据单元，如数字货币、能源单位数据、股票单位数据、地契、教育证书等）进行透明交换。在可信网络中维护关键信息交换变得更加容易，并且与传统机制相比，区块链技术可以彻底改变交易执行方式。更高的可靠性、安全性和透明控制将确保交易在任何情况下都可行，且不违反道德政策。


    - **不可篡改性**：交易一旦被记录，便是永久性的，无法从网络中删除。存在一个永久的数字审计追踪，让网络中的每个人都能看到谁做了什么。这构成了智能合约管理的基础，使得合同义务更容易得到所有相关方的验证。这理想地意味着彻底消除欺诈行为，并对此类网络上进行的所有交易保持监控。任何人或群体都不可能影响整个网络来执行错误交易。无论网络存在多久，所有先前的操作都将可供所有相关成员和利益相关者监控和检查。


    网络中有两种验证交易的方法。


    `工作量证明`要求参与者（称为`矿工`）解决复杂的数学问题才能添加一个区块。当你想要发起一笔交易时，后台会发生以下过程：


    - 交易被捆绑在一起，形成我们所说的区块。

    - 矿工验证每个区块内的交易是否合法。为此，矿工需要解决一个称为工作量证明问题的数学难题。

    - 第一个解决每个区块问题的矿工将获得奖励。

    - 验证后的交易被存储在公共区块链中。


    `权益证明`则试图将更多的挖矿能力分配给拥有更多权益（代币）的参与者。它仍然是一种算法，目的与工作量证明相同，但达成目标的过程却大相径庭。在此系统下，锻造者（PoW
    中矿工的对应角色）根据他们在区块链网络中的权益来构建区块。


    区块链采用两种方法来授予参与者访问网络的权限：


    - **无许可区块链**：任何人都可以加入网络，参与区块验证过程以达成共识，并创建智能合约。比特币和以太坊区块链就是几个例子，任何用户都可以加入网络并开始挖矿。


    - **许可区块链**：只有一组受限的参与者有权验证区块交易。许可区块链还可能限制只有经批准的参与者才能创建智能合约。例如：R3（银行业）、EWF（能源业）和
    B3i（保险业）。


    当我们将物联网和区块链融合到一个强大的统一平台时，会发生什么？

    '
- fmt: '### Blockchain and the Internet of Things (IoT)


    In principle, it makes a lot of sense, and there are several clear advantages
    of the idea of machines communicating with each other and humans and operating
    in a secure, trusted way via blockchain. IoT is all about continuously providing
    information about the state of the machines, Blockchain is all about an encrypted,
    distributed transaction recording system. Put them together and in theory, you
    get a verifiable, secure, and permanent method of recording data generated by
    smart machines.


    What are the real-world benefits of blockchain and IoT convergence?


    - **Solving the issue of oversight**: In a connected world where there are multiple
    networks owned and administered by multiple organizations and vendors, it is important
    to have the oversight of what is happening across the entire network and when.
    In this type of distributed operations scenario, a permanent immutable record
    means custodianship and traceability. In the real world, physical goods passing
    between points in the supply chain is a classic example of loss of oversight.
    IoT devices continuously transmit data and blockchains register every single change
    to the state of goods in transit, which are visible to anyone authorized to connect
    to the network. This solves the problem of lack of oversight. If something goes
    wrong—breakages occur, theft, pilferage, etc.—then the blockchain record would
    make it easy to identify the weak link and raise alerts for action.


    - **Establishing trust**: The use of encryption and distributed immutable storage
    means that the information recorded in the blockchains at any point in time can
    be trusted by all parties involved, including machine-to-machine interactions.
    The “smart contract” facility enabled by blockchain networks helps establish agreements
    that will be executed when conditions are met. This is highly useful when it comes
    to, for example, authorizing machine-to-machine interactions and task executions
    when conditions indicate that tasks in the previous step are completed. IoT-enabled
    devices will securely interact and exchange information without any human involvement.


    - **Ensuring heightened security**: Both in the industrial world and consumer
    world, much of the data generated by IoT is highly sensitive and mission critical.
    This data needs to be shared with other machines and services in order to be useful.
    But it also means that this data is vulnerable and open for hackers to potentially
    misuse. This is where blockchains bring in robust access control, encryption algorithms,
    and security mechanisms that are difficult to breach.


    What happens when we merge AI and the blockchain into a single, powerful offering?


    ### Blockchain and AI


    There is a bit of AI in everything around us, be it searching for something on
    Google to buying something through Amazon, commuting to work, playing our favorite
    playlist, monitoring health conditions, ordering groceries, etc. Our decisions
    are being influenced by algorithms that have been developed to cater to almost
    any kind of human persona and needs.


    Blockchain, on the other hand, provides a way to exchange value-embedded data
    without friction and with trust, thereby making the data secure and ensuring that
    it is used for the intended and previously agreed upon purpose—nothing more, nothing
    less.


    At a broad level, there are several ways in which AI and blockchain can complement
    each other.


    #### AI Needs Encryption


    Data on a blockchain is highly secure owing to the cryptography technology record
    transactions on blockchain. Blockchains are ideal for storing highly sensitive
    data through private keys in order for all of the data on the chain to be secure.


    There is also a larger need for AI algorithms to work on the data, including the
    processes while it is still in an encrypted state, because any phase of the process
    in which the data is unencrypted represents a security risk.


    #### Blockchain Can Help AI Become Explainable


    AI algorithms analyze a large number of variables to “learn” patterns hidden within
    a vast amount of data and arrive at predictions. The learning process and the
    complexity of algorithms often becomes incomprehensible to end users—why the algorithm
    recommended what it recommended, how the algorithm arrived at the recommendation,
    which variables it used and which ones got dropped and why, and many more such
    questions.


    AI offers huge advantages in many fields; however, if the outcomes are not explainable,
    then they won’t be trusted by the end user. Blockchain technology can help AI
    record the entire learning and decision-making process, thus providing a level
    of transparency and insight to the end users.


    #### AI Can Make Blockchains More Efficient


    Due to heavy focus on encryption, blockchains require large amounts of compute
    and processing power. For example, hashing algorithms to mine blocks on the blockchain
    effectively try every combination of characters until they find one that can verify
    a transaction. Sophisticated machine-learning algorithms can optimize the blockchain
    mining algorithms, if they are fed with the right training data.


    #### AI Can Make Blockchain Scalable


    Blockchain by design is immutable, which means managing growing volumes of data
    becomes a stiff challenge. “Blockchain pruning” (removing data about inactive
    or closed down transactions) could be a possible solution. AI algorithms can play
    a role in automatically archiving using data sharding techniques to make blockchain
    more efficient and scalable.


    ## Integrated AI and Blockchain Value Propositions


    ### Improved Business Data Models


    While existing AI-driven business models rely on data produced by organizations
    and their ecosystem partners, there are drawbacks when it comes to transparent
    data sharing. Privacy concerns, abuse of data, and fraudulent contracts make it
    impossible to create fully open data systems. For AI to produce the most accurate
    decisions, it needs virtually no barriers to information access from the entire
    business ecosystem. This frictionless information access would be provided by
    blockchain technology, as all stakeholders would be more willing to share information
    since no single entity can take ownership of the network.


    Data sources from all key players can easily be integrated with a common AI-powered
    analytics platform. The way the data is going to be used would be defined in the
    blockchain ledger for the whole transaction, so there is no chance of data owners
    being subjected to scenarios where they would lose the credibility of their data
    or their data would lose its value.


    Once an uninterrupted supply of data from multiple stakeholders is established,
    AI systems can dive deep into them and study the patterns and other aspects to
    uncover insights that were never witnessed before. As the number of participants
    in the network grows, there would be more possibilities to extract more genuine
    insights and the systems can train themselves to better respond to scenarios based
    on how each stakeholder would respond, by identifying best practices and discovering
    the best solution to a new scenario.


    ### Newer Insights to Discovery


    With transparent information access, data silos could be more efficiently merged
    and this would help AI to maneuver through newer data combinations and discover
    new patterns. With blockchains it is easier to eliminate data manipulation, so
    AI can be used to create new authentic classifiers and filters for data, since
    it is possible to verify their authenticity on a decentralized blockchain framework.


    This is particularly important in scenarios that do profiling and segmentations
    for better predictive customer engagement. More data sets would allow micro-segmentation
    and hyper-personalization.'
  raw: '### Blockchain and the Internet of Things (IoT)


    In principle, it makes a lot of sense, and there are several clear advantages
    of the idea of machines communicating with each other and humans and operating
    in a secure, trusted way via blockchain. IoT is all about continuously providing
    information about the state of the machines, Blockchain is all about an encrypted,
    distributed transaction recording system. Put them together and in theory, you
    get a verifiable, secure, and permanent method of recording data generated by
    smart machines.


    What are the real-world benefits of blockchain and IoT convergence?


    *   *Solving the issue of oversight* : In a connected world where there are multiple
    networks owned and administered by multiple organizations and vendors, it is important
    to have the oversight of what is happening across the entire network and when.
    In this type of distributed operations scenario, a permanent immutable record
    means custodianship and traceability. In the real world, physical goods passing
    between points in the supply chain is a classic example of loss of oversight.
    IoT devices continuously transmit data and blockchains register every single change
    to the state of goods in transit, which are visible to anyone authorized to connect
    to the network. This solves the problem of lack of oversight. If something goes
    wrong—breakages occur, theft, pilferage, etc.—then the blockchain record would
    make it easy to identify the weak link and raise alerts for action.


    *   *Establishing trust*: The use of encryption and distributed immutable storage
    means that the information recorded in the blockchains at any point in time can
    be trusted by all parties involved, including machine-to-machine interactions.
    The “smart contract” facility enabled by blockchain networks helps establish agreements
    that will be executed when conditions are met. This is highly useful when it comes
    to, for example, authorizing machine-to-machine interactions and task executions
    when conditions indicate that tasks in the previous step are completed. IoT-enabled
    devices will securely interact and exchange information without any human involvement.


    *   *Ensuring heightened security* : Both in the industrial world and consumer
    world, much of the data generated by IoT is highly sensitive and mission critical.
    This data needs to be shared with other machines and services in order to be useful.
    But it also means that this data is vulnerable and open for hackers to potentially
    misuse. This is where blockchains bring in robust access control, encryption algorithms,
    and security mechanisms that are difficult to breach.


    What happens when we merge AI and the blockchain into a single, powerful offering?


    ### Blockchain and AI


    There is a bit of AI in everything around us, be it searching for something on
    Google to buying something through Amazon, commuting to work, playing our favorite
    playlist, monitoring health conditions, ordering groceries, etc. Our decisions
    are being influenced by algorithms that have been developed to cater to almost
    any kind of human persona and needs.


    Blockchain, on the other hand, provides a way to exchange value-embedded data
    without friction and with trust, thereby making the data secure and ensuring that
    it is used for the intended and previously agreed upon purpose—nothing more, nothing
    less.


    At a broad level, there are several ways in which AI and blockchain can complement
    each other.


    #### AI Needs Encryption


    Data on a blockchain is highly secure owing to the cryptography technology record
    transactions on blockchain. Blockchains are ideal for storing highly sensitive
    data through private keys in order for all of the data on the chain to be secure.


    There is also a larger need for AI algorithms to work on the data, including the
    processes while it is still in an encrypted state, because any phase of the process
    in which the data is unencrypted represents a security risk.


    #### Blockchain Can Help AI Become Explainable


    AI algorithms analyze a large number of variables to “learn” patterns hidden within
    a vast amount of data and arrive at predictions. The learning process and the
    complexity of algorithms often becomes incomprehensible to end users—why the algorithm
    recommended what it recommended, how the algorithm arrived at the recommendation,
    which variables it used and which ones got dropped and why, and many more such
    questions.


    AI offers huge advantages in many fields; however, if the outcomes are not explainable,
    then they won’t be trusted by the end user. Blockchain technology can help AI
    record the entire learning and decision-making process, thus providing a level
    of transparency and insight to the end users.


    #### AI Can Make Blockchains More Efficient


    Due to heavy focus on encryption, blockchains require large amounts of compute
    and processing power. For example, hashing algorithms to mine blocks on the blockchain
    effectively try every combination of characters until they find one that can verify
    a transaction. Sophisticated machine-learning algorithms can optimize the blockchain
    mining algorithms, if they are fed with the right training data.


    #### AI Can Make Blockchain Scalable


    Blockchain by design is immutable, which means managing growing volumes of data
    becomes a stiff challenge. “Blockchain pruning” (removing data about inactive
    or closed down transactions) could be a possible solution. AI algorithms can play
    a role in automatically archiving using data sharding techniques to make blockchain
    more efficient and scalable.


    ## Integrated AI and Blockchain Value Propositions


    ### Improved Business Data Models


    While existing AI-driven business models rely on data produced by organizations
    and their ecosystem partners, there are drawbacks when it comes to transparent
    data sharing. Privacy concerns, abuse of data, and fraudulent contracts make it
    impossible to create fully open data systems. For AI to produce the most accurate
    decisions, it needs virtually no barriers to information access from the entire
    business ecosystem. This frictionless information access would be provided by
    blockchain technology, as all stakeholders would be more willing to share information
    since no single entity can take ownership of the network.


    Data sources from all key players can easily be integrated with a common AI-powered
    analytics platform. The way the data is going to be used would be defined in the
    blockchain ledger for the whole transaction, so there is no chance of data owners
    being subjected to scenarios where they would lose the credibility of their data
    or their data would lose its value.


    Once an uninterrupted supply of data from multiple stakeholders is established,
    AI systems can dive deep into them and study the patterns and other aspects to
    uncover insights that were never witnessed before. As the number of participants
    in the network grows, there would be more possibilities to extract more genuine
    insights and the systems can train themselves to better respond to scenarios based
