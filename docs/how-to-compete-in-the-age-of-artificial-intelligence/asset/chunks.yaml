  trans: '

    ### AI 即 AAAI——辅助智能、增强智能与自主智能


    一般而言，智能系统是指为了完成特定目标而处理信息的系统。无论你是在互联网上搜索信息、在线购物，还是寻求医疗诊断，智能系统都可能在过程中发挥关键作用。这些智能系统会寻求最佳行动方案来完成其指定目标（作为辅助能力、增强能力和自主能力）。你可以将智能系统的这三种角色视为一个成熟度连续体。


    -   *辅助智能*：主要侧重于改善个人和组织在日常活动中已经在做的事情。

    -   *增强智能*：作为互补能力，为个人和组织提供推动力，使他们能够完成原本无法独立完成的事情。

    -   *自主智能*：创造并部署天生具备智能和适应性的机器，使其能够自主行动，完全消除人类的参与。


    #### 辅助智能


    辅助智能被视为一种弱人工智能形式，它优化了现有手动活动的价值。在给定明确输入和预期输出的情况下，这种形式的人工智能可以自动化重复性任务，并提供建议供人类验证和采取行动。


    例如，许多汽车已经配备了辅助智能——轮胎气压过低警报、未系安全带提醒、速度控制以及在必要时激活刹车。尽管它会提醒用户，但最终决定权通常不属于车辆。


    同样，许多行政任务，如会议记录、整理邮箱、在 Kindle 上打开上次阅读的页面等，都是由某种自动化系统完成的。这种人工智能辅助人类更快或更好地完成相同任务的自动化类型，就是辅助智能的一种形式。人类仍然掌控全局并做出最终决定，但在幕后，人工智能解决方案已经完成了所有繁重的工作来辅助人类。


    让我们以一位专注于达成交易的销售人员为例。她必须依赖许多不同的系统来完成工作：使用电子邮件与客户和同事沟通；使用 `SharePoint` 查找客户信息；使用
    `Dropbox` 处理文档；使用 `Skype`、`Slack`、`Yammer`、`Chatter`、短信和电话进行实时沟通；以及使用业务应用程序进行订单处理和客户关系管理。


    在任何一天，从这些不同的系统中整理信息、推断结论、发现潜在瓶颈并找出下一步行动，都是艰巨的任务。现在，设想一个人工智能解决方案，它能够从每个系统中提取主题，并协助销售人员评估下一步应采取什么行动。她应该联系客户提供折扣，还是联系她的解决方案团队，加入客户无法拒绝的额外增值服务，或者联系内部竞争情报团队，研究竞争对手的产品以制定有竞争力的价值主张？


    这位销售人员的案例并非个例。


    除了信息整合之外，辅助智能解决方案还可以模拟业务流程的复杂现实，从而允许用户在做出最终决策之前模拟业务场景并权衡各种决策。例如，一家大型建筑公司开发了其采购相关数据的模拟模型——原材料相关成本、供应商绩效、采购人员采用的企业级实践、原材料供需的市场行为，以及不同城市拓扑结构中这些模式的变化。该模型列出了超过
    10 万种需要考虑的变化，并模拟出最佳方案，从而为公司节省了巨额成本。


    这类基于人工智能的应用也主要适用于辅助企业软件平台。例如，在多个 ERP 流程中，如果能够收集与常见问题及其有效解决方案相关的语料库，并将其输入人工智能程序，那么当用户因输入数据不一致而卡在流程中时，人工智能程序就可以通过提供修复问题的建议来激活，从而巧妙地帮助用户高效、及时地完成任务。


    辅助智能解决方案直接影响多项业务绩效指标，例如员工生产力、人均收入或利润率，以及流程平均完成时间等。


    你如何确定业务中哪些领域或流程最适合应用辅助智能？你需要考虑两个问题：哪些产品或服务如果实现自动响应，可以改善用户体验？你当前的哪些流程和系统，如果获得可操作的洞察，会变得更加高效？

    '
- fmt: '#### Augmented Intelligence


    The purpose of AI applications falling in this category is to lend new capabilities
    to human activity, enabling people and enterprises to do things they couldn’t
    do before on their own. Unlike assisted intelligence, these AI applications fundamentally
    alter the nature of the task, thus creating possibilities of evolving business
    models or in some cases changing the business model entirely. The spectrum is
    broad and includes machine learning, natural language processing, image recognition,
    and neural networks.


    In augmented intelligence, humans and machines are intertwined in a continuous
    learning and improvement loop. For example, routing optimization is a well-known
    logistics problem. By adding numerous other real-time data sources and feeds like
    weather patterns, local social events, political unrests/rallies, and traffic
    patterns to the existing static routing optimization mechanism, the AI solution
    can provide numerous alternatives, all extremely dynamic and intelligent enough
    to reroute if the driver chooses not to take the machine recommended top-ranking
    option. The human decision maker gets to see a high degree of granularity and
    specificity regarding the assumptions and evaluates the implications of accepting
    or not accepting machine generated recommendations. The machine tries to remodel
    itself by observing which recommendations the human decision maker accepts and
    which ones are rejected.


    While the system learns a lot and models the ecosystem in a continuous self-learning
    mode, the humans learn a lot about the machine’s behavior. Under these circumstances,
    the human and the machine share the decision rights.


    In wealth management, augmented intelligence helps financial advisors better understand
    their clients and provide an enhanced portfolio determination beyond the usual
    aggressive, conservative, or balanced choices. The augmented intelligence system
    derives relevant signals from a holistic customer 360-degree view to give advisors
    insight into their clients’ current and potential future financial needs. For
    example, information can be gathered about clients who may want advice on retirement
    planning or others who are celebrating the birth of a child. With this type of
    timely information, advisors can have important financial conversations with their
    clients at the right time, earning their trust for achieving financial goals.


    The media and entertainment industry has been always in the lateral thinking and
    creative realm; however, there are a number of examples where augmented intelligence
    has changed the way the industry does things. Netflix movie recommendations are
    powered by an AI solution that learns about our personal preferences over time
    and gives suggestions depending on the choices we’ve made in the past.


    How about AI attempting to become creative? That is precisely the partnership
    between IBM Research and 20^(th) Century Fox recently set out to do, when they
    used machine learning techniques to produce the “first ever cognitive movie trailer.”
    Watson analyzed hundreds of existing horror movie trailers to learn what kept
    viewers on edge. The AI solution then selected the 10 most engaging moments and
    a human editor created the trailer from those clips. The entire process took about
    24 hours to complete, compared to the norm of month-long intensive manual efforts.
    Pretty cool, isn’t it?^([²](#fn2))


    In another instance, Natural Language Processing (NLP) capabilities were used
    to analyze thousands of movie plot summaries correlated to box office performance.
    The AI system became smart enough to recognize and plot patterns that would guarantee
    a successful box office performance. The movie “Impossible Things” was entirely
    created by AI by generating the initial premise and essential plot points, which
    the creative team then used as a point of reference to develop the final story.


    The success of an augmented intelligence solution depends on whether it has enabled
    you to do new things that are either hard to do by yourself or that require out
    of the box thinking. Some of the potential proxies to use to assess opportunities
    are margin improvement, innovation cycles, customer experience, new business models
    to deliver non-linear revenue growth, and so on.


    Augmented intelligence creates new possibilities. This aspect needs to be carefully
    managed in your enterprise, especially at the senior management level. Why? The
    new models will often challenge your senior executives to step out of stereotype
    thinking and explore alternatives and take calculated risks.


    #### Autonomous Intelligence


    In the continuum of the intelligent system maturity process, when a system gains
    enough self-learning capability and prediction accuracy that it can adapt to the
    changes in the environment without intervention, we call that state autonomous
    intelligence.


    As such, the term autonomous intelligence is often applied to things that are
    technically robots but don’t look like robots. Consider the example of a smart
    grocery cart in a supermarket that can navigate the isles and understands your
    shopping list to automatically pick up the items. Another example could be a home
    automation system where the windows autonomously adapt to light levels to optimize
    indoor environmental parameters, such as heating, cooling, lowering or opening
    of shades, or achieving the right level of indoor lighting.


    Autonomous intelligence also means handing over decision making to intelligent
    systems. The intelligent systems would work through enormous amounts of data,
    analyze the pros and cons, manage the associated processes, and then make a decision
    on your behalf. Off course, this demands a high level of prediction accuracy from
    the intelligent systems and at the same time humans need to trust the decision-making
    capability of the intelligent systems.'
  raw: '#### Augmented Intelligence


    The purpose of AI applications falling in this category is to lend new capabilities
    to human activity, enabling people and enterprises to do things they couldn’t
    do before on their own. Unlike assisted intelligence, these AI applications fundamentally
    alter the nature of the task, thus creating possibilities of evolving business
    models or in some cases changing the business model entirely. The spectrum is
    broad and includes machine learning, natural language processing, image recognition,
    and neural networks.


    In augmented intelligence, humans and machines are intertwined in a continuous
    learning and improvement loop. For example, routing optimization is a well-known
    logistics problem. By adding numerous other real-time data sources and feeds like
    weather patterns, local social events, political unrests/rallies, and traffic
    patterns to the existing static routing optimization mechanism, the AI solution
    can provide numerous alternatives, all extremely dynamic and intelligent enough
    to reroute if the driver chooses not to take the machine recommended top-ranking
    option. The human decision maker gets to see a high degree of granularity and
    specificity regarding the assumptions and evaluates the implications of accepting
    or not accepting machine generated recommendations. The machine tries to remodel
    itself by observing which recommendations the human decision maker accepts and
    which ones are rejected.


    While the system learns a lot and models the ecosystem in a continuous self-learning
    mode, the humans learn a lot about the machine’s behavior. Under these circumstances,
    the human and the machine share the decision rights.


    In wealth management, augmented intelligence helps financial advisors better understand
    their clients and provide an enhanced portfolio determination beyond the usual
    aggressive, conservative, or balanced choices. The augmented intelligence system
    derives relevant signals from a holistic customer 360-degree view to give advisors
    insight into their clients’ current and potential future financial needs. For
    example, information can be gathered about clients who may want advice on retirement
    planning or others who are celebrating the birth of a child. With this type of
    timely information, advisors can have important financial conversations with their
    clients at the right time, earning their trust for achieving financial goals.


    The media and entertainment industry has been always in the lateral thinking and
    creative realm; however, there are a number of examples where augmented intelligence
    has changed the way the industry does things. Netflix movie recommendations are
    powered by an AI solution that learns about our personal preferences over time
    and gives suggestions depending on the choices we’ve made in the past.


    How about AI attempting to become creative? That is precisely the partnership
    between IBM Research and 20^(th) Century Fox recently set out to do, when they
    used machine learning techniques to produce the “first ever cognitive movie trailer.”
    Watson analyzed hundreds of existing horror movie trailers to learn what kept
    viewers on edge. The AI solution then selected the 10 most engaging moments and
    a human editor created the trailer from those clips. The entire process took about
    24 hours to complete, compared to the norm of month-long intensive manual efforts.
    Pretty cool, isn’t it?^([²](#fn2))


    In another instance, Natural Language Processing (NLP) capabilities were used
    to analyze thousands of movie plot summaries correlated to box office performance.
    The AI system became smart enough to recognize and plot patterns that would guarantee
    a successful box office performance. The movie “Impossible Things” was entirely
    created by AI by generating the initial premise and essential plot points, which
    the creative team then used as a point of reference to develop the final story.


    The success of an augmented intelligence solution depends on whether it has enabled
    you to do new things that are either hard to do by yourself or that require out
    of the box thinking. Some of the potential proxies to use to assess opportunities
    are margin improvement, innovation cycles, customer experience, new business models
    to deliver non-linear revenue growth, and so on.


    Augmented intelligence creates new possibilities. This aspect needs to be carefully
    managed in your enterprise, especially at the senior management level. Why? The
    new models will often challenge your senior executives to step out of stereotype
    thinking and explore alternatives and take calculated risks.


    #### Autonomous Intelligence


    In the continuum of the intelligent system maturity process, when a system gains
    enough self-learning capability and prediction accuracy that it can adapt to the
    changes in the environment without intervention, we call that state autonomous
    intelligence.


    As such, the term autonomous intelligence is often applied to things that are
    technically robots but don’t look like robots. Consider the example of a smart
    grocery cart in a supermarket that can navigate the isles and understands your
    shopping list to automatically pick up the items. Another example could be a home
    automation system where the windows autonomously adapt to light levels to optimize
    indoor environmental parameters, such as heating, cooling, lowering or opening
    of shades, or achieving the right level of indoor lighting.


    Autonomous intelligence also means handing over decision making to intelligent
    systems. The intelligent systems would work through enormous amounts of data,
    analyze the pros and cons, manage the associated processes, and then make a decision
    on your behalf. Off course, this demands a high level of prediction accuracy from
    the intelligent systems and at the same time humans need to trust the decision-making
    capability of the intelligent systems.'
  trans: '

    #### 增强智能


    属于这一类别的人工智能应用旨在为人类活动赋予新的能力，使个人和企业能够完成以前无法独立完成的事情。与辅助智能不同，这些人工智能应用从根本上改变了任务的性质，从而创造了业务模式演变的可能性，或在某些情况下完全改变业务模式。其范围广泛，包括机器学习、自然语言处理、图像识别和神经网络。


    在增强智能中，人类与机器在一个持续学习和改进的循环中相互交织。例如，路线优化是一个众所周知的物流问题。通过将大量其他实时数据源和信息流（如天气模式、本地社交活动、政治动荡/集会以及交通模式）添加到现有的静态路线优化机制中，人工智能解决方案可以提供众多备选方案，这些方案都极具动态性，并且足够智能，如果驾驶员选择不采纳机器推荐的首选方案，系统可以重新规划路线。人类决策者能够看到关于各项假设的高度细化和具体的信息，并评估接受或不接受机器生成建议的影响。机器则通过观察人类决策者接受了哪些建议、拒绝了哪些建议，来尝试重塑自身模型。


    当系统在持续自学习模式下学习大量知识并对生态系统进行建模时，人类也会对机器的行为有深入的了解。在这种情况下，人类和机器共享决策权。


    在财富管理领域，增强智能帮助财务顾问更好地了解他们的客户，并提供超越通常的激进、保守或平衡选择的增强型投资组合决策。增强智能系统从全面的客户 360 度视图中提取相关信号，为顾问提供洞察，了解客户当前和潜在的未来财务需求。例如，可以收集关于可能希望获得退休规划建议的客户信息，或者关于庆祝孩子出生的其他客户信息。凭借这类及时的信息，顾问可以在正确的时间与客户进行重要的财务对话，从而赢得客户的信任，帮助他们实现财务目标。


    媒体和娱乐行业一直处于横向思维和创意领域；然而，有许多例子表明增强智能已经改变了该行业的运作方式。Netflix 的电影推荐由一个人工智能解决方案驱动，该方案会随着时间的推移了解我们的个人偏好，并根据我们过去做出的选择给出建议。


    那么，人工智能尝试变得有创意会怎样呢？这正是 IBM 研究院与 20 世纪福克斯公司最近合作的目标，他们使用机器学习技术制作了“首部认知电影预告片”。沃森分析了数百部现有的恐怖电影预告片，以了解是什么让观众感到紧张不安。然后，人工智能解决方案选出了
    10 个最扣人心弦的时刻，由一位人类编辑根据这些片段制作了预告片。整个过程大约需要 24 小时完成，而相比之下，通常需要长达一个月的高强度人工努力。很酷，不是吗？^(²)


    在另一个例子中，自然语言处理（NLP）能力被用于分析与票房表现相关的数千个电影情节摘要。这个人工智能系统变得足够智能，能够识别并绘制出能保证票房成功的模式。电影《不可能的事》完全由人工智能创作，它生成了初始前提和关键情节点，创意团队随后将其作为参考点来发展最终的故事。


    增强智能解决方案的成功取决于它是否让你能够完成那些要么难以独自完成、要么需要跳出固有思维模式的新事情。用于评估机会的一些潜在指标包括利润率提升、创新周期、客户体验、实现非线性收入增长的新业务模式等等。


    增强智能创造了新的可能性。这方面需要在你的企业中谨慎管理，尤其是在高级管理层。为什么？因为新模式常常会挑战你的高级管理人员，要求他们跳出刻板思维，探索替代方案并承担经过计算的风险。


    #### 自主智能


    在智能系统成熟过程的连续体中，当一个系统获得了足够的自学习能力和预测准确性，能够无需干预地适应环境变化时，我们将这种状态称为自主智能。


    因此，“自主智能”这个术语通常应用于那些技术上是机器人但看起来不像机器人的事物。以超市里的智能购物车为例，它可以在过道中导航，理解你的购物清单并自动挑选商品。另一个例子是家庭自动化系统，窗户可以自主适应光线水平，以优化室内环境参数，例如供暖、制冷、降低或打开百叶窗，或达到合适的室内照明水平。


    自主智能也意味着将决策权交给智能系统。智能系统将处理海量数据，分析利弊，管理相关流程，然后代表你做出决策。当然，这要求智能系统具有高水平的预测准确性，同时人类需要信任智能系统的决策能力。

    '
- fmt: '### AI As Invisible Interface (No-User Interface)


    Scott Jenson introduced the concept of a “technological tiller”.^([³](#fn3)) When
    we persist with an old design onto a new technology, thinking that it will work,
    we get into disastrous technological tiller situations. The term was inspired
    from the boat tiller, which was for a long time the main steering tool known to
    man. So, when the first cars were invented, rather than applying steering wheels
    as the steering tool, they used boat tillers. It was horribly difficult to control
    the car and often ended in serious crash situations. The adoption of cars with
    boat tillers was dismal. It was only after the steering wheel was added did the
    automobile become widely used.


    There is a valuable lesson here: technological evolution demands radically different
    design approaches. When we ignore technological tiller, we usually end up with
    faulty products. However, when acknowledge technological tillers and bring in
    fresh design thinking, we achieve tremendous success.


    Perhaps we are at the cusp of another technological tiller; this time it is about
    user interfaces. Given the advances in AI—conversational interfaces in the form
    of chatbots and commercial products like Siri increasingly playing a role in our
    personal life—is there a possibility of eliminating the user interface altogether?


    We are surrounded by digital channels and devices screaming for our attention
    all the time: smart phones, tablets, laptops, smart-TVs, smart wearables, and
    portals notifying us about an event or prompting us to take action. The bulk of
    these requests and our responses take place through Graphical User Interfaces
    (GUIs). Of course, we have come a long way from character-based screens to elegant
    interfaces delivering rich user experiences. However, the biggest problem is the
    information overload and diminishing attention spans. Perhaps the situation is
    right for us to move away from designing GUIs, which requires the user’s full
    attention, to designing calmer and highly intuitive human-computer interaction
    mechanisms to the core of the user experience. UI is not the product or the service;
    it is only a layer that allows us to access the product and services. So, the
    question is, if we can find a way to avoid the UI and still get to the product
    and services, then why not do it?


    Welcome to the world of no UIs.


    GUIs facilitate three actions: present information, interpret user’s instructions,
    and process the instructions. In this process, it’s still our job as humans to
    understand the information, direct next actions, then evaluate outputs by comparing
    them with expected goals. The critical elements binding this process are context
    and intelligence. Is there another way of making this process simple? Let’s take
    the example of you walking into your favorite bar and getting your favorite drink
    before even you settle down on the bar stool. The bartender knows you, knows exactly
    what drink you like, and knows that you just walked through the door. That’s a
    lot of interaction, without any “interface.”


    In this example, the bartender is the UI. He understands what the user needs;
    he has all the context and all the intelligence and he delivers the perfect outcome.
    This kind of thinking is revolutionary in AI, if we can bring it to bear. On the
    one hand, this requires a lot more responsibility to create transparent experiences
    that tend to be highly relevant and contextual, all driven by intelligence (read
    as AI). On the other hand, this gives us incredible options for thinking out of
    the box and create open-ended experiences in which only important and viable information
    is presented to the user.


    When we design products and services, we get carried away in the niceties and
    innovativeness of the features and we miss the critical aspect of knowing what
    is compulsory and what is optional—someone needs to do something. What are the
    minimum number of steps needed to allow them to do it? What is the minimum amount
    of information for each step? Minimally viable interaction is an interesting way
    of getting closer to an intuitive way of doing things, because it moves away from
    the focus on the product or service, to the *use* of the product or service.


    For example, while designing an interface the designer sees it as a GUI, whereas
    the end user sees it as a means to book a flight ticket. Hence, it is important
    to put the spotlight on the end user. Ask what is the maximum amount of value
    the product or service can deliver to the end user in the minimum amount of time?
    What is the simplest possible way for the end user to get through the end-to-end
    process?


    We’ve started talking to our machines—not with commands, menus, and frantic keystrokes,
    but by using human language. Natural language processing has seen incredible advances
    and we don’t need to be a machine to talk to another machine.


    No, UI isn’t really a new idea. If you’ve ever used an Amazon Echo, changed a
    channel by waving at a Microsoft Kinect, or set up a Nest thermostat, you’ve already
    used a machine that was inspired by no UI design thinking. We are beginning to
    move away from the touchscreen as the only way of interacting with machines to
    using more natural ways (haptics, gestures, computer vision, and voice recognition,
    all subfields of artificial intelligence) of interacting with the machines around
    us.


    Until now machines forced us to come to them on their terms, speaking their language.
    The next step is for machines to finally understand us on our own terms, in our
    own natural words, behaviors, and gestures. That’s what no UI is all about.


    So far, our journey to design interfaces has been driven by the tool and the method,
    rather than what the final product or service is supposed to do. In the digital
    world, the act of doing becomes inseparable from the product or service. In other
    words, the interaction and the experience become the product and the service.


    With conversational interfaces and voice and gesture-enabled interfaces gaining
    popularity, we are beginning to move away from “typing” into an interface to more
    and more “interaction” led interfaces. A look at the history of human-computer
    interactions will reveal that we have applied ever increasing amounts of computational
    and processing power to make the machines work harder so that machine response
    times are reduced. This approach has not simplified human machine interactions
    at all. Humans are hardwired to converse, so the most effective human-machine
    interface is one that is highly conversational in nature. We need to reimagine
    how we interact with machines and how they interact with us. We need to overhaul
    all our traditional interfaces to become simple, abstract, hidden, and ambient
    (the invisible interface).


    The ultimate UI is no UI , all powered by AI.'
