  trans: '

    # 什么定义了人工智能？


    在其著作《人工智能：一种现代方法》（Pearson, 1995）中，斯图尔特·罗素和彼得·诺维格将人工智能定义为“设计和构建智能体，使其能够从环境中接收感知并采取影响该环境的行动”。这句话中最重要的部分是“采取行动”这个短语。人工智能将智能注入机器，使其不仅能学习，还能自主对来自周围环境的事件做出响应。为了响应这些事件，人工智能需要大量的观察数据（由事件和相应采取的行动组成的数据点），从中学习并据此行动。


    有趣的是，尽管从广义上讲人工智能仍是一项新技术，但它同时也正在经历一个成熟的过程。一旦人工智能在其某个应用领域成熟，它就会被归入主流，而任何仍在成熟过程中的技术则被冠以人工智能之名。例如，早期的人工智能实验围绕着手写和语音识别展开。然而，随着能够解读书面文字或理解人类语音的商业系统的出现，这些领域已不再被视为人工智能。因此，要达成一个普遍认同的人工智能定义颇具挑战。


    一些关于人工智能的流行故事围绕着它在游戏中击败人类展开。在玩游戏时，人类展现出快速决策、制定策略和学习的能力。人工智能在与人类对弈时不仅展现出相同的人类特质，甚至变得比人类更出色。虽然在人类擅长的领域（思考和学习）击败人类无疑是一项值得称赞的成就，但将人工智能在游戏场景中的成就外推到更高层次的认知任务上，则有些牵强。


    首先，这些游戏有一套既定的参与规则，并对某些结果（如赢、输或平局）有明确的衡量标准。其次，这些游戏总是在一个行动效果仅限于系统内参与者的环境中进行。第三，失败的后果无关紧要；相反，失败对人工智能来说总是一个绝佳的学习机会，使其能得到更好的训练，而对系统外的参与者没有实际影响。


    目前，关于如何开发人工智能程序所需的学习和推理能力，主要有两种思想流派。在这两种流派中，程序都从经验中学习——也就是说，观察数据和相应的行动决定了程序之后的行为方式。


    第一种方法使用条件指令（转换规则和启发式方法）——例如，一个人工智能程序会参考业务规则库，并在反洗钱背景下将交易标记为可疑活动。最初，业务规则库可能是通过查看过去构成可疑活动的证据来创建的，然后随着新法规的出台或观察到新的可疑活动而不断更新。


    第二种方法被称为机器学习。机器被输入数百万条可疑和非可疑交易的观察数据。机器理解导致可疑交易的各种观察模式。随着越来越多的观察数据被输入人工智能程序，程序通过这种推理能力进行学习并构建其理解，而无需为此编写特定的业务规则。


    人工智能应用对数据有着巨大的需求，而组织、政府、家庭和个人日益增长的“数据化”正在推动人工智能无处不在的应用需求。由于房地产和机器上的传感器、联网设备、移动设备、流程数字化等新数据源的出现，以及客户越来越愿意分享个人信息，数据量将呈指数级增长。后果是什么？


    一场疯狂的竞赛已经开始，看谁能收集到最多的数据以获取竞争优势。仅仅收集海量数据是不够的。必须对数据进行有意义的处理，才能从中获取价值。因此，利用数据优势的成功取决于适当的处理方法和工具——而这正是人工智能的用武之地。通过应用强大的算法，人工智能程序筛选海量数据，产生新颖的见解并自动化重复性任务。因此，人工智能为优化现有流程和启用新流程提供了巨大机遇，为当今和未来的企业带来竞争优势。


    为了有效利用人工智能，组织需要将技术视角与业务视角结合起来——换句话说，需要理解当今技术上可行的是什么，以及人工智能如何通过交付业务成果为组织创造价值。


    从广义上讲，我们可以将人工智能解决方案分为三个领域——人工智能作为普适智能、人工智能作为辅助增强与自主智能，以及人工智能作为隐形界面。


    ## 人工智能作为普适智能


    你早上醒来，躺在床上问你的数字助手：“今天我去办公室常走的路况怎么样？”它回答：“如果你像往常一样早上 8 点出发，到办公室需要 45 分钟。距离办公室 5
    公里处有点拥堵。我正在积极监控，一旦你从家出发，我会为你提供替代路线。”语音识别、对我们问题的自然语言理解、分析交通模式以得出正确答案，以及将该答案转换为语音，这一切都是人工智能。


    你进入办公室，打开电子邮件。你的邮件已经被整理到文件夹中，例如“重点关注”、“社交”、“论坛”、“私人”、“垃圾邮件”或你创建的任何类别。根据你的组织层级（老板的邮件总是重要的）或你提供的任何标签，邮件还被标记为重要或不重要，以便你更轻松地确定时间管理和需要采取的行动的优先级。基于收件人、发件人、主题和内容对邮件进行分类，提取正确关键词的自然语言处理，判断是否为垃圾邮件或谁重要与否的算法，这一切都是人工智能。


    你打开最喜欢的新闻网站，发现新闻剪报已经根据你的偏好进行了个性化设置。根据你关注的话题，还有一些关于热门趋势的其他推荐。根据个人偏好策划新闻以及推荐文章推荐都涉及使用人工智能。


    你打开最喜欢的搜索引擎，当你在搜索框中输入查询时，系统会建议相关词汇，仿佛它知道你接下来要输入什么。然后，一旦你提交查询，系统不仅会从互联网上数十亿份文档中列出正确的内容，还会显示与你的查询最匹配的相关广告。那个神奇地读懂你心思并建议关键词以辅助搜索的算法、计算相关页面以显示的页面排名算法，以及通过实时广告交易选择正确广告的机制，这一切都是人工智能。


    这些只是几个例子，旨在强调一个事实：在我们的日常生活中，几乎没有什么方面不受人工智能以某种方式的影响。我们周围的一切正越来越多地由人工智能算法驱动，虽然人工智能正在获得无处不在的地位，但我们确信，关于人工智能对我们意味着什么，我们仅仅触及了皮毛。

    '
- fmt: '### AI as AAAI—Assisted, Augmented, Autonomous Intelligence


    Generally speaking, an intelligent system is something that processes information
    in order to do something purposeful. Whether you are searching for something on
    the Internet, shopping online, or seeking a medical diagnosis, intelligent systems
    are likely to play a key role in the process. These intelligent systems seek the
    best plan of action to accomplish their assigned goals (as assistive capabilities,
    as augmented capabilities, and as autonomous capabilities). You can think of these
    three roles of intelligent systems as a maturity continuum.


    - *Assisted intelligence*: Primarily focused on improving what people and organizations
    are already doing in their day-to-day activities.

    - *Augmented intelligence*: Gives an impetus to people and organizations as complementary
    capabilities so that they can do things they couldn’t otherwise do on their own.

    - *Autonomous intelligence*: Creates and deploys machines that are intelligent
    and adaptive by nature so that they can act on their own, completely eliminating
    human involvement.


    #### Assisted Intelligence


    Considered a weak form of AI, Assisted Intelligence optimizes the value of existing
    manual activity. Given clearly defined inputs and expected outputs, this form
    of AI automates repetitive tasks and provides recommendations for humans to validate
    and take action.


    For example, assisted intelligence is already included in many cars—alerts about
    low tire pressure, not wearing seat belts, controlling speed, and activating the
    brakes if necessary. Although it will alert the user, the final decision usually
    does not belong to the vehicle.


    Similarly, many administrative tasks like taking minutes at a meeting, organizing
    your mailbox, opening the page on your kindle when you last left off, etc. are
    all done by some form of automated system. This type of automation, where the
    AI is assisting humans to do the same tasks faster or better, is a form of Assisted
    Intelligence. The humans are still in charge and make the final decision, but
    in the background the AI solution has done all the hard work to assist the human.


    Let’s take the example of a salesperson focused on closing a deal. She has to
    rely on many different systems to do her job. Email for communications with client
    and colleagues; `SharePoint` to find out customer information; `Dropbox` for documents;
    `Skype`, `Slack`, `Yammer`, `Chatter`, text messaging, and the phone for real-time
    communications; and business apps for order processing and customer relationship
    management.


    On any given day, collating information from these disparate systems, drawing
    inferences, finding potential bottlenecks, and figuring out next steps, are daunting
    tasks. Now, consider an AI solution that extracts topics from each of these systems
    and assists the salesperson in evaluating what action should to be taken next.
    Should she contact the client to offer a discount, reach out to her solutions
    team to factor in additional value based offerings that client won’t be able to
    turn down, or reach out to the internal competitive intelligence team to research
    a competitor’s offering to develop a competitive value proposition?


    This case of the salesperson is not an isolated one.


    Beyond information assimilation, assisted intelligence solutions can also model
    complex realities of business processes, thus allowing the users to simulate business
    scenarios and weigh decisions before taking the final call. For example, a large
    construction company developed a simulation of their procurement related data—raw
    materials related cost, supplier’s performance, enterprise wide practices the
    procurement officers adopt, the market behavior around supply and demand for raw
    materials, and the variations in those patterns for different city topologies.
    The model spells out more than 100,000 variations to consider and simulates the
    best option, thus assisting in huge cost savings for the company.


    AI-based applications of this sort are also prime to assist in enterprise software
    platforms. For example, across the several ERP processes, if the corpus related
    to frequently faced problems and their effective resolutions can be harvested
    and fed into an AI program, then when a user is stuck in a process flow due to
    some inconsistency in data he is entering, the AI program can become active by
    offering recommendations to fix the problem, thereby smartly helping the user
    efficiently and timely finish the task.


    Assisted intelligence solutions have a direct impact on several business performance
    metrics, such as employee productivity, revenues or margins per employee, and
    average time to completion for processes, to name a few.


    How would you determine which areas or processes in your business are prime for
    assisted intelligence? You need to consider two questions: What products or services,
    if made automatically responsive, can improve user experience? Which of your current
    processes and systems would become more efficient with actionable insights?'
