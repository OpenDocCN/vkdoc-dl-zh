  trans: '

    ### 评估技术并进行适配差距分析


    市场上存在众多供应商和解决方案。有些方案范围非常狭窄但能出色地完成特定任务，有些则范围广泛，为尝试新事物提供了更大的灵活性。理解所有这些方案，并根据你的具体目标制定适配差距分析至关重要。如果你的组织在联网设备领域是新手，那么你的成功很大程度上取决于你能否快速启动试点项目并为业务功能建立投资回报率。


    `IoT`、`AI` 和云技术是快速演进的技术，因此你的技术架构需要具备灵活性和组件化特性。在整体架构中，某些组件今天可能成熟度较低，但明天它们将达到足够的成熟度，或者某些组件可能会完全过时。因此，密切关注技术趋势至关重要，包括它们演进的速度、有哪些互补技术正在发挥作用，以及它们的成本效益如何。


    我们列出了一些你需要重点关注的关键领域，以制定一个涵盖数据、分析、建议、性能和整体成本效益的稳健技术路线图。


    例如，在“洞察”方面，回答以下问题很重要：


    -   哪些数据能让你清晰了解产品使用情况和性能追踪？

    -   哪些数据对你的业务功能有价值？

    -   哪些数据能丰富客户体验？

    -   你需要收集哪些额外数据来提供这些洞察？


    分析方面的问题可能包括：


    -   如果将哪些洞察嵌入到你的产品/服务/流程中，会使你的公司对客户或市场情况反应更迅速？

    -   “数学”运算会有多复杂？你是否需要购买专门的软件包，例如优化库或深度学习库？

    -   你将如何管理和维护这些洞察？


    性能方面的问题可能包括：


    -   数据处理性能标准是什么？

    -   不在边缘进行数据处理（相对于将所有数据迁移到云端）的后果是什么？如果答案是上云，你会不会丢失一些关键操作？

    -   你希望你的服务达到怎样的实时性？


    运营需求方面的问题可能包括：


    -   你将重点关注哪些运行条件（温度、湿度、压力、访问权限和振动）？

    -   你将针对哪些不同场景启用安全性和访问控制？其余部分则留给客户的具体要求。


    在制定技术路线图时，你需要保持务实的态度。仅仅创建一个智能解决方案并不能带来成功，尤其是当构建该解决方案的成本超过了其商业和实施的便利性时。


    ### 构建你的智能物联路线图


    一旦你完成了上述所有活动，你就拥有了开发智能物联路线图所需的所有理想组件（见图 7-5）。该路线图将帮助你进行规划，并向公司内部利益相关者、合作伙伴和员工传达时间表、计划、试点项目、变更和预期成果。


    ![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig5_HTML.png](img/467925_1_En_7_Fig5_HTML.png)


    图 7-5 多层智能物联架构


    制定路线图的最佳方法之一是采用亚马逊的飞轮战略。从一个宏大的愿景开始，但不必是一个资本密集且复杂的豪赌。你需要从小处着手，专注于易于实验的试点项目来检验你的想法。这可以进一步演变为创建最小可行产品，以便尽早推向市场并获得先发优势，或者你可以识别出愿意与你以利润分享模式进行共同创新的客户。


    有三种方法可以帮助你向业务利益相关者、员工和客户清晰地阐述你的路线图：


    -   **未来的新闻稿**：以终为始，为你的产品或服务撰写一份新闻稿。由于这将是面向市场的公告，你将被迫阐述你产品的独特性，这反过来将有助于巩固你的愿景。

    -   **为你的计划准备一份常见问题解答**：提出你可能面临的市场、投资者、员工、业务利益相关者和合作伙伴的潜在问题。与需要人们自己摸索的黑箱相比，常见问题解答及其对应的答案将帮助你以更容易被接受的方式推广你的产品。

    -   **用户手册**：成功的公司信奉众包模式，即用户可以利用你的产品创造越来越多的实用工具。这有助于在更短的时间内显著提升市场份额。为最终用户开发用户手册、DIY
    视频、`API` 和教程，以帮助他们构建智能应用。


    ## 结论


    像 `AI`、`IoT` 和云这样的新技术的进步，对工业制造领域的大量从业人员意味着什么？


    `AI`、`IoT`、云以及其他新兴的第四次工业革命技术将会持续存在。它们正在永久性地改变事物的设计、制造和交付方式。这些技术正在使整个制造生命周期（采购、制造、销售和服务）中的一切变得智能化，同时也带来了管理智能设备、智能代理以及在某些情况下完全自主流程的额外复杂性。


    关键问题是，管理人员、技术人员、机器操作员和工厂车间工人的角色会发生巨大变化吗？如果是这样，公司需要找到方法来监控和跟踪活动，在这些活动中，越来越多的人机协作将成为执行项目的常态。


    在本章中，我们讨论了通过结合 `IoT` 和 `AI` 的能力来改善我们生活方式以及变革工业领域的可能性。在下一章中，我们将讨论 `AI` 如何改进和变革
    IT 运营。

    '
- fmt: '# 8. IT Operations and AI


    Every business is becoming a digital business, and as a result, there is a continuous
    drive to put everything on the cloud, become data driven, embed AI into every
    process, and do everything in an extreme Agile model. While all these are good
    and probably an essential complexity of becoming a digital business, at the same
    time being digital means being caught between the constant tussle of development
    and operations activities. This is reminiscent of the second law of thermodynamics:
    entropy increases over time unless energy is introduced into the system from outside.


    Let’s explore this analogy further and see how AI can play a crucial role in the
    world of IT operations.


    The IT operations world—and especially the production run, maintenance, and care
    activities—are in a constant fight against entropy, which refers to disorder.
    IT operations personnel spend a significant amount of time and energy trying to
    keep everything up and running and are always under mounting pressure to predict
    when things will go wrong and be prepared with fixes and lengthy root cause analysis
    documents.


    In contrast, the development activities actually *increase* the level of entropy.
    Every new app moved into production, every new release of underlying OS and associated
    upgrades, every new technology introduced to the users, is a change that has to
    be made, increasing the probability of disorder that the operations team fights
    so hard to prevent.


    While the fast pace of development world is inevitable, if the change is unmanaged,
    it will eventually cause something to break, unless people put in continuous effort
    to prevent those breaks. These conflicting goals, taken to extremes, can snowball
    into an unhealthy situation within the enterprise, with operations actively fighting
    against the change and development.


    What is needed? A flexible, holistic framework consisting of a set of diagnostic
    and predictive tools, automation, and humans-in-the-loop capabilities that will
    enable the operations teams to embrace change. This flexible holistic framework
    is called `AIOps`, a term coined by Gartner Research to describe a new way of
    operating IT based on augmenting human skills with automated analysis enabled
    by AI techniques.


    The term `AIOps` itself is neither a solution nor a philosophy, but an overarching
    framework for how to address increasing performance demands and manage IT complexity.
    This involves the development of new and powerful technologies that have the potential
    to transform IT operations and digital businesses at large.


    Gartner proposes a plethora of capabilities that need to be integrated and managed:


    * Historical data management, inclusive of structured data and unstructured data

    * Streaming data management, inclusive of multi-device access and usage

    * Log data management primarily generated from systems and networks

    * Automated pattern discovery and prediction

    * Root cause analysis and scripts serving as hot-fixes

    * Software-as-a-service, primarily cloud-based solutions and associated data services
    consumed in a one-to-many model


    Today’s IT landscape is too complex for any single person or even a team to manage
    on their own; instead, the skills required consist of multiple specializations
    (full-stack engineers). In turn, each of these specializations requires its own
    specific tools to monitor, guide, recommend, fix, and enable IT operations personnel
    to shoulder the responsibility effectively. At a certain point, it becomes very
    difficult and chaotic to combine these partial views to gain a holistic understanding
    of what is actually happening in the environment.


    Because of the scale and nuances of modern IT environments (hybrid cloud environments
    and everything-as-a-service type of landscapes) and the increasing velocity of
    change that businesses require, old-style rules-based and the keep-bubbling-up
    approach (L1-L2-L3) have become unsustainable and brittle, requiring more effort
    and care. Especially as infrastructure becomes more self-modifying (infrastructure-as-a-code)
    in response to changing conditions and demand, IT operations needs to accelerate
    just to keep up.


    With every new technology, there is a need to understand the “why” behind the
    what for better decision making.'
