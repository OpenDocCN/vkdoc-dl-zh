    It is critical to have a governance model in place to address dependencies, bottlenecks,
    escalations, course corrections, etc. Infrastructure requirements will become
    a critical element to move into production at scale, beyond the first 100-day
    period. You need to define and start building an IPA CoE that will provide critical
    guidance around infrastructure planning, standards, best practices, technical
    and functional reviews, etc.


    Your IPA journey does end with deploying bots into production. In fact, the journey
    starts after deployment. You need to track and monitor the effectiveness of your
    bots are determine whether they are delivering the business objectives. The success
    of the first few deployments needs to be spread across your organization so that
    the rest of the fence-sitters will get motivated to be part of the IPA journey.
    You will need “automation evangelists” to champion the IPA objectives.


    Now, if your CEO is asking you to come up with an operating model to put the company
    on the IPA journey, keep in mind that the operating model needs to be anchored
    around a few key elements that will allow the successful completion of tasks by
    the key stakeholders. These elements are critical in designing a flexible, yet
    robust IA program.'
  trans: '

    ### 建立变革管理计划


    智能自动化将改变我们迄今为止的工作方式。可以肯定的是，许多传统岗位将失去其重要性，并且可以理解的是，员工会产生抵触情绪。变革管理计划对于应对以下几个挑战至关重要：


    -   需要培训管理者，以监督机器与人类协同工作的流程。

    -   需要培训员工采用敏捷方法，尤其是在他们必须跟上机器速度的情况下。

    -   需要培训高管，以建立关于人机职责分离的明确指导方针。

    -   公司整体层面需要建立新的沟通渠道，以管理员工对失业的担忧，并启动新计划来引入新岗位（情商技能、新技术技能）。


    智能流程自动化既是礼物，也是谜题。说它是礼物，是因为如果实施得当，它能确保快速回报；说它是谜题，是因为目前尚无关于如何在同一环境中成功管理协同工作的机器与人类的指导方针或先例。接下来，我们将尝试概述如何开启你的智能自动化之旅。以下是一些最佳实践，可帮助你定义自己的旅程。


    ## 你的 IPA 之旅：首个 100 天


    **第 1 至 30 天：提高认识，协调职能，并动员起来，包括强有力的自上而下的支持：** 最初的 30 天主要是与你的业务高管和 IT 领导者沟通，并统一期望。IPA
    计划成功的关键不在于技术解决方案的稳健性，而在于建立强有力的变革管理计划，并提高业务和 IT 职能部门对 IPA 将如何为组织带来效率的认识。你必须有一个总体规划，详细说明各项举措、时间表、预期的颠覆或影响程度、针对每项举措的变革管理计划、每项举措的负责人等等。如果你的
    IPA 路线图是围绕完整的端到端流程（例如，从贷款发起到最后放款）来组织的，而不是围绕任务（例如，贷款审批任务）来组织的，那么它将为你提供一个整体图景，让你了解可以实现多少自动化、哪些环节仍需要人工参与，以及你将交付什么样的业务成果。


    **第 30 至 60 天：评估机会并进行概念验证：** 每个组织都面临着交付强劲利润和将效率杠杆引入运营的压力。因此，看到每个业务部门都争相列出他们想要自动化的流程清单，也就不足为奇了。如果你要求他们确定优先级，他们可能会大声宣称自己的每一项举措都是重中之重。因此，你需要迅速决定一种适用于你组织的方法论（从评估到部署）。你需要创建一个基于目标的框架来评估和确定自动化机会的优先级。这不仅有助于你有效管理对自动化的狂热追求，还能帮助你识别那些能在
    IPA 之旅早期就交付业务价值的速赢项目。除了高层次的流程自动化地图，你还必须深入几步，对已识别的部分自动化机会进行概念验证，以评估自动化的复杂性和实用性。这将帮助你初步了解暂定的时间表、你需要的任何其他技术或存在的功能差距。最重要的是，概念验证将为你提供一个足够好的机会，向业务高管和
    IT 领导者宣传你的 IPA 之旅进展。


    **第 60 至 100 天：建立治理模型并开始规模化开发：** 一旦你完成了概念验证，并对将采用哪些产品、工具和流程有了足够清晰的认识，你就需要全力以赴推进自动化之旅。在任何时间点，你很可能都有处于不同生命周期的不同流程。有些可能处于需求阶段，有些处于开发阶段，还有些处于变革管理阶段。建立一个治理模型来处理依赖关系、瓶颈、升级、路线纠偏等问题至关重要。在首个
    100 天之后，基础设施需求将成为规模化投入生产的关键要素。你需要定义并开始建立一个 IPA 卓越中心，该中心将围绕基础设施规划、标准、最佳实践、技术和功能审查等提供关键指导。


    你的 IPA 之旅并非以将机器人部署到生产环境中而结束。事实上，旅程在部署之后才刚刚开始。你需要跟踪和监控机器人的有效性，并确定它们是否在实现业务目标。最初几次部署的成功经验需要在组织内传播，以便让其他观望者受到激励，加入
    IPA 之旅。你将需要“自动化布道者”来倡导 IPA 目标。


    现在，如果你的 CEO 要求你提出一个运营模式，让公司踏上 IPA 之旅，请记住，该运营模式需要围绕几个关键要素来构建，这些要素将使关键利益相关者能够成功完成任务。这些要素对于设计一个灵活而稳健的
    IA 计划至关重要。

    '
- fmt: '# 15 Key Essentials For a Successful IPA Journey


    While RPA may sound simple and easy to implement, and AI has its own technological
    complexities, the intelligent automation journey does require thorough planning,
    coordinated action, and lots of rigor to be successful. Organizations may do well
    to follow these key ground rules:


    1. *Start with a proof of concept*: While RPA as a concept may be understood,
    showcasing RPA through a quick workable pilot project will trigger enthusiasm
    and help ward off cynicism.


    2. *Set the right expectations*: Promise less, deliver more. This age-old wisdom
    holds true here too. It helps to set realistic expectations around the potential
    benefits. So, avoid creating hype or euphoria around what RPA can achieve for
    the business or individuals. Let people be impressed with the end results.


    3. *Have a robust solution focus*: Invest efforts in building the right solution
    to address majority of the variations, handoffs, and process goals. Usually, 30%
    or less time is spent on actual BOT configuration.


    4. *Identify and bring evangelizers on board*: Change is often resisted even if
    it is for common and individual good. Thus RPA-led transformation requires strong
    sponsorship and support. It is also important to identify functional leaders and
    opinion makers right at the beginning of this journey to implement RPA adoption
    seamlessly.


    5. *Leverage complementing tools*: Be on alert to identify and explore tools that
    can complement and strengthen (e.g., OCR) RPA implementation.


    6. *Follow the quick win delivery methodology*: Chances of success increase with
    smaller manageable sets of automations than large and complex ones. Follow an
    iterative process of fine-tuning the solution through build-test-deploy procedure.


    7. *Choose processes wisely*: The success of first steps will have a significant
    bearing on the outcome of this migratory journey. So, choosing the first set of
    processes is very critical for the entire program to succeed. Initial processes
    have to be the ones where success is almost built-in while inconvenience or the
    pain of transition is minimal. Once the initial phase meets success, there will
    certainly be greater organizational support.


    8. *Make IT an integral part of the journey*: Value from RPA has to be co-created
    by the business and IT teams. Given the short bursts of implementation and launch
    of automations, it requires the business and IT to work in harmony, in the absence
    of which time lapse and resource waste are bound to happen.


    9. *Track and reap benefits simultaneously*: Actual benefits flow in only on productive
    redeployment of the saved hours. It is important to track actual savings on the
    baseline.


    10. *Plan for sustainability*: Institutionalize structure and governance to productively
    manage automations that have been delivered and prioritize and deliver on the
    pipeline of opportunities. Adopt a holistic strategy to build, re-build, and sustain
    talent.


    11. *Operating model*: Guidelines and policies required to execute tasks across
    the intelligent automation lifecycle; existing enterprise guidelines and policies
    needs to be updated to reflect the human-machine collaboration model, such as
    business continuity plan, data security and compliance, and release management.


    12. *Standards*: Standards and practices to consistently manage intelligent automation
    activities, such as exception management and logging, coding standards, documentation
    standards, and deployment and readiness checklist.


    13. *KPIs and metrics*: Measures to cover different aspects of the intelligent
    automation solution, such as process performance metrics and productivity metrics.


    14. *Methods*: Frameworks/approach to ensure a consistent approach across functions,
    such as process evaluation framework, process prioritization framework, business
    case framework, change request framework, and exception management.


    15. *Governance*: Clear segregation of responsibilities and review mechanism to
    ensure conflicts are swiftly dealt with, such as decision matrix/RACI framework,
    and meeting and reporting cadence.


    ## Conclusion


    There is certainly plenty of excitement around automation right now. RPA alone
    can deliver significant benefits; however, to make automation sustainable and
    to do real enterprise-wide transformation, AI capabilities need to brought into
    the mix. Product vendors have latched onto the buzzwords and have been marketing
    cognitive capabilities in their RPA tools in a big way. As you start your automation
    journey, it is therefore important to understand the reality versus the hype and
    plot your own roadmap.


    On the cautionary side, RPA and AI are not cure-all technologies. However, by
    objectively assessing your own use cases and designing your automation approach
    by incorporating RPA and AI technologies into the processes, you can increase
    productivity and make your organization responsive.


    Beyond the technology underpinnings, a successful intelligent automation implementation
    requires strong change-management programs to address uncertainties and impact
    on organizational and operational functions as well as on employees, who often
    are the receiving end of any large-scale transformational programs.


    In the next chapter, we discuss the interesting world of cybersecurity, including
    the implications of AI on security, and how companies can safeguard their systems
    and processes.'
