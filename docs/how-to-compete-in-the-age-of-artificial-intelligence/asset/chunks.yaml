  trans: '

    ### 无监督学习


    你通常是在寻找模式，但并没有需要映射的输出。例如，你想根据客户订购的产品类型、购买频率、上次访问时间等因素对客户进行分组。这种将具有相似行为的个体聚集成簇的过程被称为*无监督学习*，因为它并不知道要学习什么。然而，它会观察数据中的模式，并自动找到在数据中区分不同群体的方法。


    需要理解的关键原则是：


    - 无监督学习并不试图映射到预定义的输出，而是解释数据是如何组织的。


    以下是一些示例：


    - 聚类算法，例如 `K-means` 或层次聚类。这些算法试图创建簇（具有相似特征的归入同一簇）。

    - 降维算法，例如 `PCA`。这些算法试图用更少的维度找到数据的最佳表示。

    - 异常检测。这些算法试图找出数据中的离群点。


    ### 强化学习


    你想要达成一个目标，但并没有获得任何关于如何实现该目标的具体指令或先验知识。在强化学习中，学习者不会被告知如何完成任务。然而，学习者会明确获知哪些行动能带来最大回报。


    需要了解的关键原则是：


    - 强化学习试图同时获取新知识和最大化回报。这种方法也被称为“探索与利用的权衡”。

    - 学习者遵循马尔可夫决策过程框架，在该框架中，它需要采取一个行动（`A`）来从起始状态转换到结束状态（`S`）。

    - 每采取一个正确的行动，它就会获得一个奖励（`R`）。否则，它会受到惩罚。这一系列行动定义了策略（`P`），而相应的奖励（或惩罚）则定义了价值（`V`）。学习者的任务是通过选择正确的策略来最大化奖励。


    强化学习并非严格意义上的监督学习，因为它并不严格依赖于必须映射到哪个输出。它也不是无监督学习，因为它事先知道正确行动所对应的预期奖励。


    ## AI 问题的分类


    AI 问题可以归纳为 10 个大类。


    - *领域专家*：AI 系统必须在特定领域获取大量知识，然后获得足够的推理和推断能力，从而能够充当该领域的专家。关键在于能够获取关于特定领域的大量数据语料库。

    - *领域拓展*：AI 系统利用已有的知识体系，并扩展其能力，以关联该知识体系中的不同事物，从而提出先前未被发现的新见解或模式。

    - *复杂规划器*：AI 系统扮演智能编排者的角色，不仅整合各种复杂数据，还能生成洞察。一个例子是使用 AI 技术优化物流，由于涉及多个中转环节和参与方（包括车队、仓储、路线规划和配送），你面对的是庞大而复杂的数据集，人类无法从中发现模式，但机器可以轻松做到。

    - *更好的沟通者*：AI 系统提供对话机制，包括自然语言处理、自然语言生成、情绪解读、定制化回复、语言翻译等。

    - *新感知能力*：AI 系统与环境交互以确定下一步最佳行动，从而催生自动驾驶等新服务。

    - *企业级 AI*：AI 系统的主要任务是自动化那些重复性的活动，这些活动有足够的知识库来准确定义输入-输出映射。

    - *让 ERP 智能化*：企业依赖 ERP 系统运行，但这些系统缺乏智能。AI 系统被嵌入 ERP 系统的各种工作流中，其任务是为那些在工作流中遇到困难或需要帮助以高效完成任务的用户提供智能辅助。AI
    系统会基于过往问题、冲突解决方案、最佳实践、可能的补救措施等进行训练。

    - *让数据存储智能化*：企业拥有众多数据存储。有些是集中管理（数据仓库）以满足分析需求，有些与特定业务应用相关联并保持孤立，还有更多是因用户的即时需求而创建的。此外，还有大量信息以非结构化格式（日志、邮件、文档、图片、视频、通话记录等）分散在各处。AI
    系统可以发挥作用，跨越所有这些不同且分布式的数据存储，不仅收集元数据（数据目录、业务术语表和技术术语表），还能作为一种提供有意义洞察的手段，同时让数据保留在原处。

    - *超长序列模式识别*：当前 AI 系统在预测结果方面表现出色，但可能仅适用于单一问题。许多大型、复杂的现实世界问题需要一系列预测相互衔接才能解决。这类
    AI 系统不仅拥有自身的记忆，还将具备先进的同步能力，以实现自我调优和适应。

    - *高级行为分析*：AI 系统已经在进行情感分析，但它们主要利用词汇和语法结构，应用了有限的解读能力。这些 AI 系统可以进化，利用多个理解人类行为的领域（如观察肢体语言、面部表情、沟通时的措辞选择、互动语气等）来增强情感分析。


    ## 面向管理者的机器学习入门


    理解 AI 和算法工程方面的最佳方式是参考 Tom Mitchell 给出的定义。^(⁷)


    > “如果一个计算机程序在任务 `T` 上的性能（由性能度量 `P` 衡量）随着经验 `E` 的增加而提高，则可以说该程序从经验 `E` 中学习。”


    因此，如果你想预测，例如，一个新贷款申请人的信用度（任务 `T`），你可以对过去类似档案的数据（经验 `E`）运行机器学习算法，如果它成功“学习”了，那么它就能正确预测新贷款申请人的信用度（性能度量
    `P`）。


    对于“应该使用哪种机器学习算法？”这个问题，答案永远是“视情况而定”。选择合适的算法是多种因素的综合考量：你试图解决的问题类型、业务目标、你想应用的实验技术，以及你验证算法所拥有的时间。它取决于几个因素：数据规模、数据质量和数据多样性。其他考虑因素包括你对误差的容忍度以及你打算如何处理答案。即使是最有经验的数据科学家，在尝试之前也无法告诉你哪种算法表现最佳。


    我们挑选了 10 种最广泛使用的机器学习算法，帮助你入门这些算法术语。这也意味着还有很多算法未在此列出。


    ### 朴素贝叶斯分类器


    朴素贝叶斯分类器基于贝叶斯定理，允许我们利用概率，根据一组给定的特征来预测一个类别/分类。


    朴素贝叶斯仅在特征彼此独立时才能应用。如果我们试图通过花瓣的长度和宽度来预测花的种类，我们可以使用朴素贝叶斯方法，因为这两个特征是独立的。例如，垃圾邮件过滤就是一种分类器，它为所有邮件分配“垃圾邮件”或“非垃圾邮件”的标签。

    '
- fmt: '### K-Means Clustering


    `K-means` clustering is a type of unsupervised learning that’s used to categorize
    unlabeled data. `K-means` is a non-deterministic and iterative method. The algorithm
    follows a procedure to form clusters that contain homogeneous data points.


    The value of `k` is an input for the algorithm. Based on that, the algorithm selects
    `k` number of centroids. Then the neighboring data points to a centroid combine
    with its centroid and create a cluster. Later a new centroid is created within
    each cluster. Then data points near to new centroid will combine again to expand
    the cluster. This process is continued until the centroids do not change.


    ### KNN (K-Nearest Neighbors)


    `KNN` algorithm can be applied to both classification and regression problems.
    The algorithm stores all available cases and classifies any new cases by taking
    a majority vote of its `k` neighbors. The case is then assigned to the class with
    which it has the most in common. A distance function performs this measurement.


    ### Support Vector Machine


    This is a type of supervised learning that essentially filters data into categories
    by finding a line (hyperplane) that separates the training data set into classes.


    As there could be many ways to create linear hyperplanes, the `SVM` algorithm
    tries to maximize the distance between the various classes using a margin maximization
    technique. `SVM` is a method of classification in which you plot raw data as points
    in an `n`-dimensional space (where `n` is the number of features you have). The
    value of each feature is then tied to a particular coordinate, making it easy
    to classify the data. Lines called `classifiers` can be used to split the data
    and plot them on a graph.


    Compared to other classification algorithms, `SVM` gives better accuracy on the
    training data. `SVM` algorithm does not make any strong assumptions on the data
    and does not overfit the data as well.


    ### A Priori


    This is a type of unsupervised machine learning that generates rules-based inference
    from a given data set. Association rule implies that if an item `A` occurs, then
    item `B` also occurs with a certain probability. Most of the association rules
    generated are in the `IF_THEN` format. There are certain derivation principles
    this algorithm takes into account:


    *   If an item set occurs frequently then all the subsets of the item set also
    occur frequently.

    *   If an item set occurs infrequently, then all the supersets of the item set
    have infrequent occurrence.


    Many e-commerce giants such as Amazon use `A Priori` to draw inferences, like
    which products are likely to be purchased together and which are most responsive
    to promotion. Similarly, by observing the frequency of words used together in
    a search query, Google magically suggests recommendations for the next set of
    words, even when you have not stopped typing.


    ### Linear Regression


    The `Linear Regression` algorithm helps us understand the relationships between
    two continuous variables and how the change in one variable impacts the other.
    One of the most interpretable machine learning algorithms, it’s easy to explain
    to others and requires minimal tuning.


    The relationship is established between independent and dependent variables by
    fitting them to a line. This line is known as regression line and represented
    by a linear equation `Y = a * X + b`.


    In this equation:


    *   `Y` is the dependent variable

    *   `a` is the slope

    *   `X` is the independent variable

    *   `b` is the intercept


    The coefficients `a` and `b` are derived by minimizing the sum of the squared
    difference of distance between data points and the regression line.


    ### Logistic Regression


    `Logistic regression` is used to estimate discrete values (usually binary values
    like `0/1`) from a set of independent variables. It helps predict the probability
    of an event by fitting data to a logit function. Here the outcome of the prediction
    is not a continuous number but largely a classification related output.


    Based on the nature of a categorical response, logistic regression solves three
    types of problems:


    *   `Binary Logistic Regression`: Applicable when the categorical response has
    two possible outcomes, i.e., yes or no.

    *   `Multi-Nominal Logistic Regression`: Applicable when the categorical response
    has three or more possible outcomes with no ordering.

    *   `Ordinal Logistic Regression`: Applicable when the categorical response has
    three or more possible outcomes with natural ordering.


    ### Decision Trees


    A decision tree is a graphical representation that uses a branching methodology
    to plot a path leading to decisions. In a decision tree, starting from the root,
    each internal node undergoes a test on the response variable—each branch of the
    tree represents the outcome of the test and the leaf node represents a particular
    class label, i.e. the decision made after computing all of the attributes. The
    classification rules are represented through the path from the root to the leaf
    node.


    When the response variable is categorical in nature, we apply classification tree
    algorithm. When the response variable is continuous or numerical in nature, we
    apply regression tree algorithm.


    ### Random Forest


    `Random forest` as a collection of decision trees. It uses a bagging approach
    to create a number of decision trees, taking random subsets from the original
    data set. In this ensemble learning method, the output of all the decision trees
    in the random forest is combined to make the final prediction. Each tree “votes”
    for that class. The forest chooses the classification having the most votes (over
    all the trees in the forest).


    ### Dimensional Reduction Algorithms


    Not all data (attribute) is equal in terms of its value and importance in arriving
    at a prediction. However, every single raw data point, if curated well, can deliver
    tremendous value. Thanks to Big Data technologies, we now have the ability to
    store, manage, and deal with data sets consisting of thousands of variables. The
    challenge is in identifying the variables that will have the most impact on your
    prediction.


    Dimensionality reduction algorithms like `PCA`, `Decision Tree`, `Factor Analysis`,
    `Missing Value Ratio`, and `Random Forest` play a critical role in helping us
    identify the right variables we should consider for our prediction modeling.


    ### Gradient Boosting Algorithms


    `Gradient Boosting` algorithms combine multiple weak algorithms to create a more
    powerful algorithm. Oftentimes, you will get into scenarios where the data set
    could be massive or there could be several distinct characteristics present in
    the data set. In those scenarios, you could use an ensemble of learning algorithms
    that combines the predictive power of several base algorithms to improve robustness.'
