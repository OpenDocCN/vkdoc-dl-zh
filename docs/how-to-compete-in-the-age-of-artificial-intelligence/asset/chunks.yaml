  trans: '

    ### 采购与供应链管理


    人工智能在优化采购职能方面的崛起令人惊叹。如今，企业不仅衡量支出，更在利用传统和新获取的数据源，将传统的支出分析方法推向衡量对业务的总体价值贡献。它们是如何做到的呢？


    人工智能擅长自动化处理甚至复杂的任务。从识别新市场、跟踪汇率波动，到管理风险和评估最佳供应商，采购作为企业职能之一，正借助人工智能来简化流程并改进决策。支出分析以及合同分析已经经历了显著的自动化活动（即收集、清理、分类和分析组织支出数据的过程）。因此，识别可节省成本的领域并指向更高效率路径的“低垂果实”已经摘取，但这仅仅是触及了人工智能在采购领域变革力量的皮毛。


    人工智能可以将先进的战略推理和战略寻源纳入其中。诸如使用自然语言处理和自然语言生成的认知采购顾问和虚拟个人助理等人工智能辅助工具，可以进一步提高采购的自动化和效率。通过促进从自由格式数据（例如电子邮件或
    PDF 中包含的数据，而不仅仅是输入到申请界面中的数据）创建申请单，人工智能可以帮助将更多采购置于直接控制之下。语音识别（例如 Siri 和 Alexa）可以改变忙碌或异地员工的申请和审批流程。此外，利用图像识别技术，员工可以选择发送他们想要订购或重新订购的物品图片，这同样简化了申请流程，并使得更多支出可能得到积极管理。人工智能可以在审查甚至生成和监控供应商合同方面发挥重要作用，从而自动化一系列通常劳动密集型的任务。此外，人工智能技术可以查找成本/价格差异、异常订单数量或频率，将合同数据与订单和发票进行比较，以及大量其他模式，这些将帮助公司检测潜在的欺诈或错误，检测和预测采购模式，并识别表现最佳的贸易伙伴。


    最后，人工智能能够“学习”你的寻源模式和行为，并为特定项目或支出推荐最佳供应商。它甚至可用于预测市场价格、识别和分析新的潜在供应商，并帮助你评估与现有供应商关系的成功程度。


    如果人工智能要变革供应链，它应该由影响当前运营的问题驱动。因此，首先要问的问题是：“当前供应链中需要改进什么？”例如，典型的零售/消费品供应链持有 60-75
    天的库存，门店的平均服务水平约为 96%，而促销品的服务水平则低得多，约为 80%。另一方面，餐厅和休闲餐饮行业持有大约 12-15 天的库存，同时伴随着相对较高的浪费和销售成本。


    以下是供应链管理中人工智能可以有效应对的几个挑战：


    - **难以预测需求**：需要多次迭代才能得出计划。

    - **过多的安全库存和牛鞭效应**：在流程的每一步和供应链网络的每个节点都需要复杂的集成和计算。

    - **供应商不可靠和运输网络不可预测**：网络中隐藏着巨大的机会，因为它们在局部是次优的。


    人工智能可以以不同的形式和方式帮助解决所有这些问题。然而，为了让人工智能在供应链中提供最优价值，确保以下几点至关重要：


    - **访问实时数据**：供应链管理中最重要的业务要务是改进传统的批处理导向规划系统，但要做到这一点，我们必须消除数据陈旧的问题。当今大多数供应链试图使用几天前的数据来执行计划，这导致决策质量低下，使供应链规划次优化，并需要频繁的人工干预才能保持最新状态。没有实时信息，人工智能辅助工具只会更快地做出糟糕的决策。

    - **访问多样化数据**：除非人工智能辅助工具能够看到供应链中所有因外部影响而产生的相关约束和瓶颈，否则其结果不会比传统规划系统更好。因此，能够访问所有接触点的相关数据，包括外部数据，将有助于提高供应链流程及其相互依赖关系的可见性。

    - **最后一公里可见性和用户参与**：供应链管理涉及多个未集成的流程领域。最终消费者是你成品的唯一消费者。在供应链流程中，每个职能部门都有自己的目标和目的，这些目标或多或少都与最后一公里的影响脱节。因此，人工智能引擎的首要目标必须是在考虑整个供应链接触点的前提下，以尽可能低的成本提高消费者服务水平。


    多方实时网络中的数据总是在快速变化的车道上。此外，数据可变性和高延迟是反复出现的问题。因此，人工智能引擎不能停留在批处理模式；它必须持续关注问题，并在运行过程中学习如何最好地设置自己的性能参数以微调其能力。


    只有当算法能够做出智能决策并执行这些决策时，才能实现显著的价值。此外，算法不仅需要在企业内部执行，还需要在适当的情况下跨合作伙伴生态系统执行。这要求你的人工智能系统和底层执行系统支持多方执行工作流，并且在很大程度上，这些工作流需要自动化。


    最后，人工智能不应作为一个“黑箱”运行。用户必须能够看到决策标准、传播影响，并且还应该看到人工智能系统无法解决的问题。无论用户类型如何，都应在必要时积极监控并提供额外输入以覆盖人工智能的决策。


    ### 共享服务职能


    企业界的共享服务职能被视为成本中心，因此自然存在将支持活动部分外包以推动成本优化的趋势。除了成本优化之外，服务组织需要转变重心，将智能和自动化嵌入流程中，以提供更高价值的服务并提高服务水平。


    许多服务组织开始认识到将人工智能与机器人流程自动化相结合的好处。它们使用基于规则的软件机器人来替代重复性的人工活动，通过人工智能增加灵活性、智能和学习能力。这种方法结合了机器人流程自动化的快速回报和人工智能更高级的潜力。

    '
- fmt: '# Conclusion


    What are the keys to a successful AI strategy?


    For ages, we have indulged in statistics, operations research, and automation
    to solve business problems and gain competitive advantage. For example, pricing
    is core to any business and the only goal is to increase the company’s sales and
    margin. In simpler times, companies adopted different strategies for pricing that
    more or less stayed static for an extended period of time. To their pricing strategy,
    they had built-in scenarios, rules, heuristics, econometrics, and competitive
    intelligence. The more holistic and flexible the pricing strategy was, the more
    it served as a source of competitive advantage. However, today we are not in simpler
    times.


    Ubiquity of digital in consumer lives, connected devices, the always online generation,
    and in general an increased level of awareness means consumers are no longer captive
    to one product or one service or one company. Today businesses are forced to focus
    on dynamic pricing (the right price to the right customer, at the right time,
    for the right product, through the right channel) to solve the same old problem
    statement—to increase sales and margin. This is where AI comes in.


    Companies looking to achieve a competitive edge through AI need to reimagine their
    business models. They need to identify what machines can do better than humans
    and vice versa, develop complementary roles and responsibilities for each, and
    redesign processes accordingly. Executives need to identify where AI can create
    the most significant and sustainable advantage.


    You need to ask four questions:


    1. Is there a customer need?

    2. How do we leverage technological advances?

    3. Do we have access to data sources?

    4. Can we decompose our processes?


    First, understand the real needs of your customers. AI is an overhyped topic today,
    hence it always makes sense to return to the fundamental business questions. Do
    you have a view of your current or potential customers explicit or implicit unmet
    needs? Even the most disruptive recent business ideas, such as Uber and Airbnb,
    address people’s fundamental requirements.


    Second, incorporate technological advances. To do AI, you need to acquire and
    process new sources of data and push aggressive automation targets across your
    enterprise functions. The general availability of AI platforms and services can
    come to your aid, you can also take a different approach, of building your own
    AI infrastructure in house. The important thing is you need to put AI strategy
    on your board’s agenda.


    Third, create a holistic architecture that combines existing data with new or
    novel sources, even if they come from outside. The stack of AI services has become
    reasonably standardized and is increasingly accessible through intuitive tools.
    Even non-experts can use large data sets.


    Finally, break down processes and offerings into relatively smaller and isolated
    elements that can be automated, instead of looking at a huge process flow and
    getting lost in the complexity. Once you have figured out a way to infuse AI supplements
    into these smaller processes, you can then do an end-to-end orchestration to optimize
    and automate the entire process flow.


    For many organizations, these steps can be challenging. To apply the four questions
    systematically, companies need to have a clear picture of current and emerging
    capabilities of AI. A center for excellence can serve as a place to incubate technical
    and business acumen and disseminate AI expertise throughout the organization.


    If you are the CDO of a company and are responsible for ushering in the AI transformative
    capabilities to your organization, what would you do? Besides the four questions
    that you must ask, you also need to focus on additional three areas, discussed
    next.


    ## Develop a Clear Line of Sight to the Business Value


    Start by assessing the relevance of AI from a business value in relation to specific
    operations and IT challenges.


    Business value is an imperative. Many organizations become enamored with AI capabilities,
    but in the process they fail to determine the most strategic value drivers. You
    need to be certain about where to apply critical resources, such as data scientists
    and new solutions, that would benefit from AI and then firm up your plan to build
    capabilities where longer-term business outcomes are desired.


    Expand your strategy with frameworks that will help you determine AI’s applicability
    to business processes. Business process assessment frameworks establish a common
    language for describing your organization’s existing business model. It also aids
    in assessing and proposing changes to individual components—improving cost structures,
    enabling data-driven revenue streams, or identifying new key partnerships where
    data and analytics can play a prime role. It also can you help identify changes
    to interrelated components that support potential extensive business model changes.


    ## Harness Disruptive Potential in Customer Experiences


    AI presents several opportunities for gaining insight, creating personalization,
    and enhancing the customer experience, which is one of the best opportunities
    for the use of AI and machine learning. Assessing its disruptive potential gives
    you the opportunity to engage customers in new ways, deepening your understanding
    of customer behavior and shaping the future of customer experience.


    There are many opportunities to improve customer experience with AI, including
    developing customer insights and customizing their journeys, as well as predictive
    analytics for marketing. You’ll need to leverage approaches such as journey mapping
    and outcome-driven innovation to identify unmet customer needs and opportunities.


    ## Address Organizational, Governance, and Technological Impact


    Prepare for the organizational, governance, and technological challenges imposed
    by AI. Lack of the necessary skills is often seen as a primary hurdle to AI adoption,
    so developing the necessary competencies will be critical. The obvious impact
    is with the development of data science skills and refactoring the CDO’s organization
    to foster the creation and use of intelligence.


    Many of the benefits of AI will come from the predictions rendered by machine
    learning. Yet, organizations are woefully ill-prepared to use these insights rather
    and evaluate and use probabilistic assessments of outcomes in decision making.
    This underscores the equal, if not greater, importance of developing a data-driven
    culture and the ability to “speak data” from a business perspective.


    Using AI to gain insight into areas that humans can’t underlies advancements in
    predictive analytics, natural-language processing, computer vision, image recognition,
    and many other displays of seeming intelligence. Numerous business scenarios certainly
    benefit from AI-generated insights and capabilities, but governing them may be
    a challenge due to a lack of transparency in how some of these approaches attain
    their results, a lack of processes to ensure quality results and appropriate use.


    For example, it’s possible that the same data with the same analytics may be governed
    differently based on use—one is ethically okay and the other is potentially not.
    The same may also be true for security, privacy, compliance, and retention.


    To address these challenges, you need to develop a data-driven culture; be mindful
    of regulatory and ethical considerations; and steer clear of dangerous myths,
    all while fostering a learning laboratory for AI capabilities.


    In this chapter, we discussed a variety of topics associated with AI, including
    some high-level pointers for developing your own AI strategy. In the next chapter,
    we discuss a very interesting question whereby the board asks the CEO to define
    the AI strategy.'
  raw: '## Conclusion


    What are the keys to a successful AI strategy?


    For ages, we have indulged in statistics, operations research, and automation
    to solve business problems and gain competitive advantage. For example, pricing
    is core to any business and the only goal is to increase the company’s sales and
    margin. In simpler times, companies adopted different strategies for pricing that
    more or less stayed static for an extended period of time. To their pricing strategy,
    they had built-in scenarios, rules, heuristics, econometrics, and competitive
    intelligence. The more holistic and flexible the pricing strategy was, the more
    it served as a source of competitive advantage. However, today we are not in simpler
    times.


    Ubiquity of digital in consumer lives, connected devices, the always online generation,
    and in general an increased level of awareness means consumers are no longer captive
    to one product or one service or one company. Today businesses are forced to focus
    on dynamic pricing (the right price to the right customer, at the right time,
    for the right product, through the right channel) to solve the same old problem
    statement—to increase sales and margin. This is where AI comes in.


    Companies looking to achieve a competitive edge through AI need to reimagine their
    business models. They need to identify what machines can do better than humans
    and vice versa, develop complementary roles and responsibilities for each, and
    redesign processes accordingly. Executives need to identify where AI can create
    the most significant and sustainable advantage.


    You need to ask four questions:


    1.  Is there a customer need?


    2.  How do we leverage technological advances?


    3.  Do we have access to data sources?


    4.  Can we decompose our processes?


    First, understand the real needs of your customers. AI is an overhyped topic today,
    hence it always makes sense to return to the fundamental business questions. Do
    you have a view of your current or potential customers explicit or implicit unmet
    needs? Even the most disruptive recent business ideas, such as Uber and Airbnb,
    address people’s fundamental requirements.


    Second, incorporate technological advances. To do AI, you need to acquire and
    process new sources of data and push aggressive automation targets across your
    enterprise functions. The general availability of AI platforms and services can
    come to your aid, you can also take a different approach, of building your own
    AI infrastructure in house. The important thing is you need to put AI strategy
    on your board’s agenda.


    Third, create a holistic architecture that combines existing data with new or
    novel sources, even if they come from outside. The stack of AI services has become
    reasonably standardized and is increasingly accessible through intuitive tools.
    Even non-experts can use large data sets.


    Finally, break down processes and offerings into relatively smaller and isolated
    elements that can be automated, instead of looking at a huge process flow and
    getting lost in the complexity. Once you have figured out a way to infuse AI supplements
    into these smaller processes, you can then do an end-to-end orchestration to optimize
    and automate the entire process flow.


    For many organizations, these steps can be challenging. To apply the four questions
    systematically, companies need to have a clear picture of current and emerging
    capabilities of AI. A center for excellence can serve as a place to incubate technical
    and business acumen and disseminate AI expertise throughout the organization.


    If you are the CDO of a company and are responsible for ushering in the AI transformative
    capabilities to your organization, what would you do? Besides the four questions
    that you must ask, you also need to focus on additional three areas, discussed
    next.


    ### Develop a Clear Line of Sight to the Business Value


    Start by assessing the relevance of AI from a business value in relation to specific
    operations and IT challenges.


    Business value is an imperative. Many organizations become enamored with AI capabilities,
    but in the process they fail to determine the most strategic value drivers. You
    need to be certain about where to apply critical resources, such as data scientists
    and new solutions, that would benefit from AI and then firm up your plan to build
    capabilities where longer-term business outcomes are desired.


    Expand your strategy with frameworks that will help you determine AI’s applicability
    to business processes. Business process assessment frameworks establish a common
    language for describing your organization’s existing business model. It also aids
    in assessing and proposing changes to individual components—improving cost structures,
    enabling data-driven revenue streams, or identifying new key partnerships where
    data and analytics can play a prime role. It also can you help identify changes
    to interrelated components that support potential extensive business model changes.


    ### Harness Disruptive Potential in Customer Experiences


    AI presents several opportunities for gaining insight, creating personalization,
    and enhancing the customer experience, which is one of the best opportunities
    for the use of AI and machine learning. Assessing its disruptive potential gives
    you the opportunity to engage customers in new ways, deepening your understanding
    of customer behavior and shaping the future of customer experience.


    There are many opportunities to improve customer experience with AI, including
    developing customer insights and customizing their journeys, as well as predictive
    analytics for marketing. You’ll need to leverage approaches such as journey mapping
    and outcome-driven innovation to identify unmet customer needs and opportunities.


    ### Address Organizational, Governance, and Technological Impact


    Prepare for the organizational, governance, and technological challenges imposed
    by AI. Lack of the necessary skills is often seen as a primary hurdle to AI adoption,
    so developing the necessary competencies will be critical. The obvious impact
    is with the development of data science skills and refactoring the CDO’s organization
    to foster the creation and use of intelligence.


    Many of the benefits of AI will come from the predictions rendered by machine
    learning. Yet, organizations are woefully ill-prepared to use these insights rather
    and evaluate and use probabilistic assessments of outcomes in decision making.
    This underscores the equal, if not greater, importance of developing a data-driven
    culture and the ability to “speak data” from a business perspective.


    Using AI to gain insight into areas that humans can’t underlies advancements in
    predictive analytics, natural-language processing, computer vision, image recognition,
    and many other displays of seeming intelligence. Numerous business scenarios certainly
    benefit from AI-generated insights and capabilities, but governing them may be
    a challenge due to a lack of transparency in how some of these approaches attain
    their results, a lack of processes to ensure quality results and appropriate use.


    For example, it’s possible that the same data with the same analytics may be governed
    differently based on use—one is ethically okay and the other is potentially not.
    The same may also be true for security, privacy, compliance, and retention.


    To address these challenges, you need to develop a data-driven culture; be mindful
    of regulatory and ethical considerations; and steer clear of dangerous myths,
    all while fostering a learning laboratory for AI capabilities.


    In this chapter, we discussed a variety of topics associated with AI, including
    some high-level pointers for developing your own AI strategy. In the next chapter,
    we discuss a very interesting question whereby the board asks the CEO to define
    the AI strategy.'
