- fmt: '### Focus on Outcomes Not Technologies


    First, speak the language of outcomes that matter to your senior executives, not
    the techno speak that comes along with any new disruptive technology.


    A good way to engage your leadership team is by asking a few questions:


    - Where can we infuse responsiveness and prediction to better deliver customer
    experience, launch new products faster, or improve our own operational efficiencies?

    - Which activities that we are doing today can be done faster, better, cheaper,
    and in an automated way?

    - What are the new things we wanted to do but could not do due to various constraints
    (cost, resources, or technology)?

    - What are the things that we learn too late and therefore cannot act in time?

    - What are the things that we ought to know could happen—good or bad?


    For example, your SVP responsible for customer service is concerned about the
    decreasing trend in “first time right resolution”. Your president of sales is
    concerned about the dip in “cross-sell/up-sell” effectiveness and is linking the
    issue to bad customer service experience. Your VP in charge of product strategy
    is keen to understand the market pulse, but is unable to do so because you do
    not have the means to collect and analyze the relevant social media data, search
    queries data, and brand equity data. Without that data, you can’t really understand
    what customers are looking for and talking about.


    ### Explaining AI


    Once you’ve identified the outcomes that matter to your senior executives, you
    can establish how AI can help the business meet its business objectives. Here
    is where our working definition of AI will come in handy.


    For example, your VP products’ strategy and your CMO are keen to understand the
    customer pulse so that they can design better products and launch effective campaigns
    and gain more market share. For this to happen, you need AI capabilities to collect
    and analyze social media data and do sentiment analysis at scale.


    Now, stepping through the working definition of AI = Training Data + Machine Learning
    + Feedback Loop:


    **Training Data**. You need various types of data: tweets from Twitter based on
    the `#hashtags` and `@mentions` that matter, as well as Facebook conversations
    around your company, brand, and product experiences. Most importantly you need
    to know what people are saying about competing products, other publicly available
    data related to competitors strategy, and any innovations that promise to deliver
    better customer experiences or make your product obsolete. Most of this data is
    streaming and real-time so you will need to figure out how and where you will
    store all this data and for how long. This data also won’t be of high quality
    and isn’t labeled to begin with, so you will have to define a process through
    which you can clean the data, filter out noises, define a sentiment scale you
    want to use, and deploy a few subject matter experts to help with labeling.


    **Machine Learning**. Now comes the time to talk about algorithms. With the curated
    data set you have, you will have to define what type of prediction you want to
    do. Several types of predictions are relevant to the problem you are trying to
    solve:


    - *Classification*: Looking at the sentiment data, you have collected you need
    to develop cases like “positive sentiment” or “negative sentiment”. Classification
    algorithms will help you scan through vast amounts of data to arrive at classes
    of outcomes.

    - *Segmentation*: If your intent is to identify clusters of people who have expressed
    positive sentiments and are most likely to respond to your offers, then clustering
    algorithms will come into play.

    - *Regression*: If your intent is to arrive at a potential number (could be a
    revenue upswing or the number of products you will be able to sell by market/geography),
    then you will need to apply regression algorithms.

    - *Forecasting techniques*: If you want to understanding various temporal and
    seasonal or other external influences hidden within the data and want to create
    projections (could be about the effect of campaigns to sales), you need to turn
    to forecasting algorithms.


    There are many more variants of algorithms at play, including deep learning and
    neural nets. However, for the sake of brevity and to keep things simple, we have
    taken the examples of simple algorithms here.


    **Feedback Loop**. No matter how brilliant your algorithm is, you have to make
    the prediction outcomes actionable. The only way people will start using the prediction
    recommendations is if they understand the why and how of the output. In short,
    your algorithm can’t behave as a black box. The output needs to be explainable
    and people need to have flexibility in validating the outputs and as a consequence
    help in refining and enriching the prediction capabilities.


    Once your senior executives understand that it is not going to be the machine-way
    all the way, they will be much more appreciative of how AI can augment human skills
    in the enterprise.


    ### Evaluating AI Platforms


    It is not surprising to see enterprise IT landscape littered with many vendor
    products powering business applications and IT management applications. A natural
    reaction from enterprise IT architects and enterprise standard groups is to reduce
    entropy in the IT landscape. This means introducing tools and technology and another
    long process of evaluations, commercial negotiations, contracts, and certifications.
    Managing vendor risk and safeguarding the enterprise from vendor lockdown is on
    the top of every IT leader’s agenda. AI, being a new and fast evolving technology,
    also has its fair share of technology architecture and components (whether on-premise
    or on-cloud). The challenging part is that even your seasoned IT leaders will
    be struggling to articulate where this technology is moving.


    Your IT leaders will need a helping hand to focus on what is relevant (there is
    already a lot of tall claims from vendors about their AI platforms capabilities)
    than going through a never-ending phase of evaluating vendors. You should surely
    seek support from your CIO/CTO colleagues to do an extensive evaluation of tools
    available in the market. You should also ask them to profile the startups to learn
    what they are trying to achieve, many times a collaboration approach with the
    startups can do the trick. This is commercially less taxing for you and motivating
    for your teams, as they will get involved in cutting edge technology and innovative
    ideas.


    The following three factors are worthy of an extra look, specifically for vendors
    claiming to deliver AI solutions.


    ### Single Domain versus General Purpose


    Some vendors have gone deep into one specific domain (pharma clinical trials or
    hyper-personalization for retail multi-channels or fraud detection in the financial
    crimes scenario). Some vendors have chosen to specialize on technology capabilities
    (IoT, image recognition, NLP, and deep learning), while many others have chosen
    to build a general-purpose platform (you can ingest any kind of data, you can
    generate insights by using popular machine learning techniques, and you can distribute
    you insights through multiple consumption channels). These vendors don’t necessarily
    specialize in any specific AI subfield like text, images, audio, video, deep learning,
    etc.


    It is difficult to say which approach is better than the other. It all depends
    on the types of problems you are going after. However, instead of choosing horses
    for courses (multiple tools for multiple use cases as they deem to be fit), the
    natural choice for the enterprise is to rationalize the number of vendors they
    manage so there is a slight bias toward a general purpose platform, if (and it’s
    a big if) that general purpose platform can meet the business needs of different
    functions.'
