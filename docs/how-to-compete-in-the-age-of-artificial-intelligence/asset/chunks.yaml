    In the next chapter, we discuss the interesting world of cybersecurity, including
    the implications of AI on security, and how companies can safeguard their systems
    and processes.'
  trans: '

    # 成功实现 IPA 之旅的 15 个关键要素


    尽管 RPA 听起来简单易行，而 AI 有其自身的技术复杂性，但智能自动化之旅确实需要周密的规划、协调的行动以及大量的严谨性才能成功。组织最好遵循以下这些关键基本原则：


    1.  *从概念验证开始*：虽然 RPA 作为一个概念可能已被理解，但通过一个快速可行的试点项目来展示 RPA，将激发热情并有助于消除怀疑。


    2.  *设定合理的期望*：少承诺，多交付。这条古老的智慧在这里同样适用。围绕潜在收益设定现实的期望会有所帮助。因此，避免围绕 RPA 能为企业或个人实现什么目标而制造炒作或狂热。让人们被最终结果所打动。


    3.  *拥有稳健的解决方案重点*：投入精力构建正确的解决方案，以应对大多数变化、交接和流程目标。通常，30% 或更少的时间花在实际的 BOT 配置上。


    4.  *识别并引入倡导者*：即使是为了共同和个人的利益，变革也常常遭到抵制。因此，RPA 主导的转型需要强有力的支持和赞助。在旅程伊始就识别出职能领导者和意见领袖，对于无缝实施
    RPA 采用也至关重要。


    5.  *利用互补工具*：保持警惕，识别和探索能够补充和加强（例如，OCR）RPA 实施的工具。


    6.  *遵循速赢交付方法*：与大型复杂的自动化项目相比，采用较小、可管理的自动化集合，成功的机会更大。遵循通过构建-测试-部署流程来微调解决方案的迭代过程。


    7.  *明智地选择流程*：第一步的成功将对这一迁移之旅的成果产生重大影响。因此，选择第一批流程对于整个计划的成功至关重要。初始流程必须是那些几乎内置了成功要素，同时过渡的不便或痛苦最小的流程。一旦初始阶段取得成功，必然会获得更大的组织支持。


    8.  *让 IT 成为旅程中不可或缺的一部分*：RPA 的价值必须由业务和 IT 团队共同创造。鉴于自动化的实施和启动周期短，这要求业务和 IT 部门和谐合作，否则必然会导致时间延误和资源浪费。


    9.  *同时跟踪和收获收益*：实际收益只有在节省的时间被有效重新部署时才会显现。跟踪基准线上的实际节省非常重要。


    10. *为可持续性做规划*：将结构和治理制度化，以有效管理已交付的自动化项目，并对机会管道进行优先级排序和交付。采用整体策略来构建、重建和维持人才。


    11. *运营模式*：在智能自动化生命周期中执行任务所需的指南和政策；需要更新现有的企业指南和政策，以反映人机协作模式，例如业务连续性计划、数据安全与合规性以及发布管理。


    12. *标准*：用于一致管理智能自动化活动的标准和实践，例如异常管理和日志记录、编码标准、文档标准以及部署和就绪检查清单。


    13. *关键绩效指标和度量*：涵盖智能自动化解决方案不同方面的度量，例如流程绩效度量和生产力度量。


    14. *方法*：确保跨职能采用一致方法的框架/途径，例如流程评估框架、流程优先级排序框架、商业案例框架、变更请求框架和异常管理。


    15. *治理*：明确的责任划分和审查机制，以确保冲突得到迅速处理，例如决策矩阵/RACI 框架，以及会议和报告节奏。


    ## 结论


    当前，围绕自动化无疑存在着大量的兴奋点。仅靠 RPA 就能带来显著收益；然而，为了使自动化可持续并实现真正的企业级转型，需要将 AI 能力纳入其中。产品供应商已经抓住了这些流行语，并大力在其
    RPA 工具中营销认知能力。因此，当你开始自动化之旅时，理解现实与炒作之间的差距，并规划自己的路线图至关重要。


    需要警惕的是，RPA 和 AI 并非万能技术。然而，通过客观评估你自己的用例，并通过将 RPA 和 AI 技术整合到流程中来设计你的自动化方法，你可以提高生产力，并使你的组织更具响应性。


    除了技术基础之外，成功的智能自动化实施还需要强大的变革管理计划，以应对不确定性及其对组织和运营职能以及员工的影响——员工往往是任何大规模转型计划的最终承受者。


    在下一章中，我们将讨论网络安全这个有趣的世界，包括 AI 对安全的影响，以及公司如何保护其系统和流程。

    '
- fmt: '# 6. Cybersecurity and AI


    For a long time, cybersecurity was a war among humans. The protection mechanism
    was largely a “seal the borders” approach, via firewalls, proxies, antivirus software,
    access controls, dynamic passwords, and so on. However, these old methods are
    beginning to seem inadequate as the battlefield has changed to human versus machine.
    With the increasing number of entry points into the enterprise systems landscape
    and more connected devices as endpoints, news about security breaches are appearing
    more frequently than before.


    Cloudification, IoT, and BYOD (bring your own device to work) are all giving rise
    to microenvironments that contain a lot of sensitive data about the user. If these
    devices fall into the wrong hands, this could certainly lead to grave consequences.
    The situation is further alarming when you consider the newer type of attacks,
    which are mostly machine engineered. For example, adaptive malware is created
    using machine learning techniques. This type of malware can infiltrate a system,
    collect and transmit data about that system, and remain undetected for days.


    Applying the old approach of gathering information about data breaches, malware
    types, and phishing activities and then creating signatures is no longer potent
    enough to handle the next generation of cyberattacks. The threat is real and also
    magnified, primarily due to increasing digitization all around us. Standard automated
    threat-detection systems, although improving in sophistication, find it challenging
    to react quickly to unanticipated or newly formed threats.


    A new approach is required to continuously monitor the large number of factors
    and detect what constitutes abnormal activity. In short, they need to apply self-learning
    techniques to spot what could be a malicious activity without being told what
    to look for! This new approach could be similar to our body’s immune system, where
    the white cells and antibodies are continuously scanning and neutralizing any
    organism that does not fit the normal functioning patterns within the body. This
    is where AI comes into play. Machine learning algorithms can recognize potential
    security breaches or attacks by continuously observing what is an abnormal behavior,
    and if given the authority and the right credentials, they can automatically shut
    down systems under perceived threat, thereby reducing or isolating risks to the
    entire enterprise.


    There are a few challenges with this approach though. Machine learning lacks the
    general knowledge required to distinguish real threats. This leads to too many
    false positives, too many false alarms, and frequent shutting down of systems.
    For AI to play a decisive role in cybersecurity, it must be treated with caution
    and applied to problems it can solve.


    A hybrid human-machine collaborative approach to cybersecurity could be a potential
    solution. Neural networks can learn from enormous amount of data, including accessing
    publicly available cybersecurity literature to raise alerts that can be correctly
    classified by human cybersecurity experts. This human-machine collaborative approach
    would eventually make the machine smart enough to autonomously detect, classify,
    and take corrective actions. There are several examples of human-machine platforms
    in various stages of maturity.


    `AI2`—from MIT’s Computer Science and Artificial Intelligence Lab (CSAIL)—is a
    cybersecurity platform that uses machine learning combined with human experts.
    While machine learning, algorithms are trained on enormous amount of data to predict
    what could be potential threats. Human experts handle the judgment related tasks
    of validating and classifying the threats and associating severity tags.


    Today’s cybersecurity attacks conceal their presence in the systems thus making
    it a difficult task for the security analysts to pinpoint these attacks within
    a massive amount of system and network generated data. IBM''s `Watson` uses NLP
    capabilities to analyze millions of documents, logs, and research papers that
    have never before been accessible to provide a more complete picture of the threat.
    `Watson` also generates real-time reports on these threats to greatly speed up
    issue identification and subsequent issue-resolution processes.


    Microsoft recently acquired `Hexadite` to offer a fully automated incident response
    solution that enables organizations to investigate every cyberalert they receive
    and close out incidents in real time. Google attempting to develop cybersecurity
    offerings based on machine-learning capabilities for Android security.


    Machine learning is capable of locating issues that might easily be overlooked
    in overwhelmingly large data streams. In order to understand how we can apply
    machine learning to cybersecurity, we need to first answer the question: what
    is our goal?


    Broadly speaking, our first and foremost intent is to detect anomalies—to find
    malicious behavior or malicious entities. However, to find anomalies, we must
    first define what is not an anomaly! This is where the challenge lies. For example,
    starting from reading the morning news online to shopping to travel booking to
    carrying out work-related activities, we use our laptops in many different ways.
    There could be also infrequent patterns like downloading a game or organizing
    pictures from a vacation. How would you differentiate what is normal? It is highly
    possible that the game you downloaded may trigger some malware? Or the pictures
    you organized using freeware could actually introduce a security vulnerability?
    In essence, the most potent security threats are not just statistical outliers.


    ## Applying Machine Learning to Security


    Machine learning can introduce enormous capabilities and revolutionize the way
    cybersecurity has been handled to date.


    - *Detection*: Track anomalous behavior amidst massive systems and network generated
    data in real time to raise alerts and assist humans in validating and taking appropriate
    actions.


    - *Protection*: Identify and prioritize vulnerabilities to take action, including
    in some cases (where the prediction capabilities have reached significant confidence
    levels) addressing the vulnerabilities automatically.


    - *Prediction*: Algorithms and humans working in tandem to significantly improve
    the machine’s learning capabilities from each attack and developing even more
    sophisticated anti-malware techniques.


    - *Termination*: With improved prediction capabilities, you can not only identify
    malware but also terminate it in an autonomous manner.


    Now let’s deep dive into applying different machine learning techniques into the
    cybersecurity related scenarios. There are two ways to look into the possible
    use cases:


    - Apply supervised learning to the massive amount of good historical data (where
    the data set is labeled) to continuously improve prediction capabilities.


    - Apply unsupervised learning to make some sense out of the massive amount of
    system and network generated data through clustering and dimensionality reduction
    techniques.'
  raw: '# 6. Cybersecurity and AI


    For a long time, cybersecurity was a war among humans. The protection mechanism
    was largely a “seal the borders” approach, via firewalls, proxies, antivirus software,
    access controls, dynamic passwords, and so on. However, these old methods are
    beginning to seem inadequate as the battlefield has changed to human versus machine.
    With the increasing number of entry points into the enterprise systems landscape
    and more connected devices as endpoints, news about security breaches are appearing
    more frequently than before.


    Cloudification, IoT, and BYOD (bring your own device to work) are all giving rise
    to microenvironments that contain a lot of sensitive data about the user. If these
    devices fall into the wrong hands, this could certainly lead to grave consequences.
    The situation is further alarming when you consider the newer type of attacks,
    which are mostly machine engineered. For example, adaptive malware is created
    using machine learning techniques. This type of malware can infiltrate a system,
    collect and transmit data about that system, and remain undetected for days.


    Applying the old approach of gathering information about data breaches, malware
    types, and phishing activities and then creating signatures is no longer potent
    enough to handle the next generation of cyberattacks. The threat is real and also
    magnified, primarily due to increasing digitization all around us. Standard automated
    threat-detection systems, although improving in sophistication, find it challenging
    to react quickly to unanticipated or newly formed threats.


    A new approach is required to continuously monitor the large number of factors
    and detect what constitutes abnormal activity. In short, they need to apply self-learning
    techniques to spot what could be a malicious activity without being told what
    to look for! This new approach could be similar to our body’s immune system, where
    the white cells and antibodies are continuously scanning and neutralizing any
    organism that does not fit the normal functioning patterns within the body. This
    is where AI comes into play. Machine learning algorithms can recognize potential
    security breaches or attacks by continuously observing what is an abnormal behavior,
    and if given the authority and the right credentials, they can automatically shut
    down systems under perceived threat, thereby reducing or isolating risks to the
    entire enterprise.


    There are a few challenges with this approach though. Machine learning lacks the
    general knowledge required to distinguish real threats. This leads to too many
    false positives, too many false alarms, and frequent shutting down of systems.
    For AI to play a decisive role in cybersecurity, it must be treated with caution
    and applied to problems it can solve.


    A hybrid human-machine collaborative approach to cybersecurity could be a potential
    solution. Neural networks can learn from enormous amount of data, including accessing
    publicly available cybersecurity literature to raise alerts that can be correctly
    classified by human cybersecurity experts. This human-machine collaborative approach
    would eventually make the machine smart enough to autonomously detect, classify,
    and take corrective actions. There are several examples of human-machine platforms
    in various stages of maturity.


    AI2—from MIT’s Computer Science and Artificial Intelligence Lab (CSAIL)—is a cybersecurity
    platform that uses machine learning combined with human experts. While machine
    learning, algorithms are trained on enormous amount of data to predict what could
    be potential threats. Human experts handle the judgment related tasks of validating
    and classifying the threats and associating severity tags.


    Today’s cybersecurity attacks conceal their presence in the systems thus making
    it a difficult task for the security analysts to pinpoint these attacks within
    a massive amount of system and network generated data. IBM''s Watson uses NLP
    capabilities to analyze millions of documents, logs, and research papers that
    have never before been accessible to provide a more complete picture of the threat.
    Watson also generates real-time reports on these threats to greatly speed up issue
    identification and subsequent issue-resolution processes.


    Microsoft recently acquired Hexadite to offer a fully automated incident response
    solution that enables organizations to investigate every cyberalert they receive
    and close out incidents in real time. Google attempting to develop cybersecurity
    offerings based on machine-learning capabilities for Android security.


    Machine learning is capable of locating issues that might easily be overlooked
    in overwhelmingly large data streams. In order to understand how we can apply
    machine learning to cybersecurity, we need to first answer the question: what
    is our goal?


    Broadly speaking, our first and foremost intent is to detect anomalies—to find
    malicious behavior or malicious entities. However, to find anomalies, we must
    first define what is not an anomaly! This is where the challenge lies. For example,
    starting from reading the morning news online to shopping to travel booking to
    carrying out work-related activities, we use our laptops in many different ways.
    There could be also infrequent patterns like downloading a game or organizing
    pictures from a vacation. How would you differentiate what is normal? It is highly
    possible that the game you downloaded may trigger some malware? Or the pictures
    you organized using freeware could actually introduce a security vulnerability?
    In essence, the most potent security threats are not just statistical outliers.


    ## Applying Machine Learning to Security


    Machine learning can introduce enormous capabilities and revolutionize the way
    cybersecurity has been handled to date.


    *   *Detection*: Track anomalous behavior amidst massive systems and network generated
    data in real time to raise alerts and assist humans in validating and taking appropriate
    actions.


    *   *Protection*: Identify and prioritize vulnerabilities to take action, including
    in some cases (where the prediction capabilities have reached significant confidence
    levels) addressing the vulnerabilities automatically.


    *   *Prediction*: Algorithms and humans working in tandem to significantly improve
    the machine’s learning capabilities from each attack and developing even more
    sophisticated anti-malware techniques.


    *   *Termination*: With improved prediction capabilities, you can not only identify
    malware but also terminate it in an autonomous manner.


    Now let’s deep dive into applying different machine learning techniques into the
    cybersecurity related scenarios. There are two ways to look into the possible
    use cases:


    *   Apply supervised learning to the massive amount of good historical data (where
    the data set is labeled) to continuously improve prediction capabilities.


    *   Apply unsupervised learning to make some sense out of the massive amount of
    system and network generated data through clustering and dimensionality reduction
    techniques.'
  trans: '

    # 6. 网络安全与人工智能


    长期以来，网络安全一直是人类之间的战争。保护机制在很大程度上是一种“封锁边界”的方法，通过防火墙、代理、杀毒软件、访问控制、动态密码等方式实现。然而，随着战场转变为人类与机器之间的对抗，这些旧方法开始显得力不从心。随着企业系统环境入口点的不断增加以及作为终端的联网设备越来越多，关于安全漏洞的新闻比以往任何时候都更加频繁地出现。


    云化、物联网和 BYOD（自带设备上班）都在催生包含大量用户敏感数据的微环境。如果这些设备落入坏人之手，无疑会导致严重后果。当你考虑到新型攻击（其中大部分是机器设计的）时，情况就更加令人担忧了。例如，自适应恶意软件就是利用机器学习技术创建的。这种恶意软件可以渗透系统，收集并传输有关该系统的数据，并且数天内不被发现。


    应用收集数据泄露、恶意软件类型和网络钓鱼活动信息，然后创建签名这种旧方法，已不足以应对下一代网络攻击。威胁是真实存在的，而且由于我们周围日益增长的数字化，威胁也被放大了。标准的自动化威胁检测系统，尽管在复杂性上有所提高，但在快速应对意外或新形成的威胁方面仍面临挑战。


    需要一种新方法来持续监控大量因素，并检测什么构成异常活动。简而言之，他们需要应用自学习技术来发现可能是恶意活动的行为，而无需被告知要寻找什么！这种新方法可能类似于我们身体的免疫系统，其中白细胞和抗体不断扫描并中和任何不符合体内正常运作模式的生物体。这就是人工智能发挥作用的地方。机器学习算法可以通过持续观察什么是异常行为来识别潜在的安全漏洞或攻击，并且如果被授予权限和正确的凭证，它们可以在感知到威胁时自动关闭系统，从而减少或隔离整个企业的风险。


    然而，这种方法存在一些挑战。机器学习缺乏区分真实威胁所需的一般知识。这会导致过多的误报、过多的错误警报以及系统频繁关闭。为了让人工智能在网络安全中发挥决定性作用，必须谨慎对待它，并将其应用于它能解决的问题。


    一种人机协作的混合方法可能是网络安全的潜在解决方案。神经网络可以从海量数据中学习，包括访问公开的网络安全文献来发出警报，然后由人类网络安全专家正确分类。这种人机协作方法最终将使机器足够智能，能够自主检测、分类并采取纠正措施。目前有多个处于不同成熟阶段的人机平台实例。


    `AI2`——来自麻省理工学院计算机科学与人工智能实验室（CSAIL）——是一个结合了机器学习与人类专家的网络安全平台。机器学习算法在海量数据上进行训练，以预测潜在的威胁。人类专家则负责验证和分类威胁以及关联严重性标签等判断相关任务。


    如今的网络攻击会隐藏其在系统中的存在，这使得安全分析师难以在海量系统和网络生成的数据中精确定位这些攻击。IBM 的`Watson`利用自然语言处理能力分析数百万份以前无法访问的文档、日志和研究论文，以提供更完整的威胁图景。`Watson`还会生成关于这些威胁的实时报告，以大大加快问题识别和后续问题解决流程。


    微软最近收购了`Hexadite`，以提供完全自动化的事件响应解决方案，使组织能够调查其收到的每一个网络警报并实时关闭事件。谷歌正试图为安卓安全开发基于机器学习能力的网络安全产品。


    机器学习能够定位在庞大的数据流中可能被轻易忽略的问题。为了理解如何将机器学习应用于网络安全，我们首先需要回答这个问题：我们的目标是什么？


    广义上讲，我们的首要意图是检测异常——发现恶意行为或恶意实体。然而，要发现异常，我们必须首先定义什么不是异常！这就是挑战所在。例如，从在线阅读早间新闻到购物、旅行预订再到执行工作相关活动，我们以多种不同的方式使用笔记本电脑。也可能存在不常见的模式，比如下载游戏或整理度假照片。你如何区分什么是正常的？你下载的游戏极有可能触发某些恶意软件？或者你使用免费软件整理的照片实际上可能引入安全漏洞？本质上，最强大的安全威胁不仅仅是统计上的离群值。


    ## 将机器学习应用于安全


    机器学习可以引入巨大的能力，并彻底改变迄今为止网络安全处理的方式。


    - *检测*：实时追踪海量系统和网络生成数据中的异常行为，以发出警报并协助人类进行验证和采取适当行动。


    - *防护*：识别漏洞并确定其优先级以采取行动，包括在某些情况下（当预测能力达到显著置信水平时）自动处理漏洞。


    - *预测*：算法与人类协同工作，从每次攻击中显著提高机器的学习能力，并开发更先进的反恶意软件技术。


    - *终止*：凭借改进的预测能力，你不仅可以识别恶意软件，还可以以自主方式终止它。


    现在让我们深入探讨将不同机器学习技术应用于网络安全相关场景。有两种方式来看待可能的用例：


    - 将监督学习应用于大量良好的历史数据（其中数据集已标记），以持续改进预测能力。


    - 应用无监督学习，通过聚类和降维技术，从海量系统和网络生成的数据中找出一些规律。

    '
- fmt: '### Supervised Machine Learning for Cybersecurity


    The most talked about use cases of supervised learning in the context of cybersecurity
    are malware classification and spam detection. Classifying malware starts with
    identifying whether a file is harmful. Similarly, by observing patterns within
    the content, machine learning can categorize it as spam or not.


    Supervised learning in cybersecurity has worked so well because of the availability
    of millions of labeled data. The neural nets get trained on the labeled data to
    identify abnormal patterns like intrusion detection, malware detection, phishing
    attacks, etc. In Gmail, for example, the supervised machine learning algorithm
    scans countless variables such as the originating IP address, originating location
    data, word choice, phrases in the email content, and a host of other factors to
    determine whether the email confirms to an abnormal pattern and then pushes the
    email out of your inbox folder and into the junk folder if it does.


    With enterprises seeking solutions to protect threats emanating from the growing
    number of bring-your-own and choose-your-own mobile devices, supervised machine
    learning is being embedded on mobile devices. For example, Google is using machine
    learning to analyze threats against mobile endpoints.


    The real benefit of supervised machine learning in the case of cybersecurity is
    that it can automate repetitive tasks like tactical firefighting to manually respond
    to tickets and run scripts to fix malware. This would free up analysts to focus
    on more important work like triaging threat intelligence.


    For supervised learning to become much more effective, it requires massive amounts
    of good labeled data sets. In the absence of that, we cannot train our algorithms.


    ### Unsupervised Machine Learning for Cybersecurity


    Unsupervised learning doesn’t have a goal to achieve; however, it can help reduce
    the clutter in massive data sets and make it comprehensible for further analysis
    by security experts. Context and expert knowledge base are two critical aspects
    to make sense out of raw data. This is where unsupervised learning can be of immense
    help.


    For example, MIT’s Computer Science and Artificial Intelligence Lab (CSAIL) developed
    an adaptive machine learning security platform that helps analysts review millions
    of logins each day and then contextualize the activities so as to reduce false
    positives to an almost negligible amount.


    To better understand the role of the entities featured in disparate data sets,
    we need to not only extract the entities but also associate context to them. Rather
    than looking at network traffic logs in isolation, we need to add context to make
    sense of the data, such as information about devices, applications, or users,
    location specific data, whether the device is supposed to respond to DNS queries,
    and so on. If it is a DNS server, then this is absolutely a normal behavior, but
    if it isn’t, the behavior could be a sign of an attack.


    An Expert Knowledge Base helps human experts to quickly analyze the issues and
    find potential solutions. Machine learning algorithms like Bayesian belief networks,
    when applied to massive data sets, can result in graphical models and correlation
    factors that reason about uncertainty. This approach is very effective in building
    expert systems that do not necessarily solve all the problems right away, but
    can help make security analysts more effective by assisting them in their day-to-day
    activities. Instead of having analysts look at huge data sets and then cross-reference
    them with known issues and resolutions, which is a time consuming affair, the
    visual representations with correlation factors, dependency paths, and probabilistic
    measures provide a deeper understanding of the entities in a very short amount
    of time.


    ## The CISO’s Playbook for AI and Cybersecurity


    Cybersecurity awareness is growing as more and more businesses are becoming digital.
    They are learning that their networks are vulnerable to attacks. The emerging
    consensus is that the IT department alone cannot handle security; all employees,
    especially C-level executives, have a part to play. In fact, executives are responsible
    for not only the security of data in their departments but also of broad employee
    adoption of cybersecurity best practices.


    The risks vary by industry. For an electrical utility, the top cybersecurity priority
    is keeping the lights on by preventing cyberattackers from disabling the power
    grid. For a retailer, it’s protecting credit card records and customer data. For
    the aviation industry, it’s protecting the air traffic control system for the
    safety of passengers and flight crews. For the CISO (Chief Information Security
    Officer), cybersecurity is not simply about making a checklist of requirements,
    rather it is actively managing cyber risks at an acceptable level. If you are
    a CISO, you need to develop a cyber defense plan that is relevant to your industry.


    Next are a few best practices to take into account when you are preparing your
    cyber defense plan.'
