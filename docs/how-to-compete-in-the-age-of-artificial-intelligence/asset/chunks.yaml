  trans: '

    ### K-Means 聚类


    `K-means` 聚类是一种无监督学习，用于对未标记数据进行分类。`K-means` 是一种非确定性的迭代方法。该算法遵循特定流程来形成包含同质数据点的簇。


    `k` 的值是算法的一个输入参数。基于此，算法会选择 `k` 个质心。然后，靠近某个质心的邻近数据点会与该质心结合，形成一个簇。接着，在每个簇内会生成一个新的质心。之后，靠近新质心的数据点会再次结合以扩展该簇。这个过程会持续进行，直到质心不再发生变化。


    ### KNN（K-最近邻）


    `KNN` 算法可应用于分类和回归问题。该算法会存储所有可用案例，并通过对其 `k` 个邻居进行多数投票来对新案例进行分类。然后，该案例会被分配到与其共同点最多的类别中。距离函数负责执行此度量。


    ### 支持向量机


    这是一种监督学习，其核心是通过找到一条能够将训练数据集划分为不同类别的线（超平面），从而将数据过滤到不同类别中。


    由于可能存在多种创建线性超平面的方法，`SVM` 算法会尝试使用**间隔最大化**技术来最大化不同类别之间的距离。`SVM` 是一种分类方法，它将原始数据作为点绘制在一个
    `n` 维空间中（其中 `n` 是您拥有的特征数量）。然后，每个特征的值都与一个特定的坐标相关联，从而便于对数据进行分类。可以使用称为`分类器`的线来分割数据并将其绘制在图表上。


    与其他分类算法相比，`SVM` 在训练数据上能提供更高的准确率。`SVM` 算法不对数据做出任何强假设，并且也不会过拟合数据。


    ### A Priori（先验算法）


    这是一种无监督机器学习，用于从给定的数据集中生成基于规则的推理。关联规则意味着，如果项目 `A` 出现，那么项目 `B` 也会以一定的概率出现。生成的大多数关联规则都采用
    `IF_THEN` 格式。该算法会考虑某些推导原则：


    *   如果一个项集频繁出现，那么该项集的所有子集也频繁出现。

    *   如果一个项集不频繁出现，那么该项集的所有超集也都不频繁出现。


    许多电子商务巨头（如亚马逊）使用 `A Priori` 进行推理，例如哪些产品可能被一起购买，哪些产品对促销反应最积极。类似地，通过观察搜索查询中一起使用的词语的频率，即使您还没有停止输入，谷歌也会神奇地推荐下一组词语。


    ### 线性回归


    `线性回归`算法帮助我们理解两个连续变量之间的关系，以及一个变量的变化如何影响另一个变量。作为最易于解释的机器学习算法之一，它很容易向他人解释，并且只需要极少的调优。


    通过将自变量和因变量拟合到一条线上来建立它们之间的关系。这条线被称为回归线，并由线性方程 `Y = a * X + b` 表示。


    在这个方程中：


    *   `Y` 是因变量

    *   `a` 是斜率

    *   `X` 是自变量

    *   `b` 是截距


    系数 `a` 和 `b` 是通过最小化数据点与回归线之间距离的平方差之和来推导得出的。


    ### 逻辑回归


    `逻辑回归`用于从一组自变量中估计离散值（通常是像 `0/1` 这样的二值）。它通过将数据拟合到逻辑函数来帮助预测事件的概率。这里的预测结果不是一个连续的数字，而主要是一个与分类相关的输出。


    根据分类响应的性质，逻辑回归解决三类问题：


    *   `二元逻辑回归`：适用于分类响应只有两种可能结果（即“是”或“否”）的情况。

    *   `多项逻辑回归`：适用于分类响应有三种或更多可能结果且结果之间没有顺序的情况。

    *   `有序逻辑回归`：适用于分类响应有三种或更多可能结果且结果之间存在自然顺序的情况。


    ### 决策树


    决策树是一种图形化表示，它使用分支方法来绘制通向决策的路径。在决策树中，从根节点开始，每个内部节点都会对响应变量进行一次测试——树的每个分支代表测试的结果，叶节点代表一个特定的类别标签，即计算所有属性后做出的决策。分类规则通过从根节点到叶节点的路径来表示。


    当响应变量本质上是分类变量时，我们应用分类树算法。当响应变量本质上是连续或数值变量时，我们应用回归树算法。


    ### 随机森林


    `随机森林`是决策树的集合。它使用装袋方法，从原始数据集中随机抽取子集来创建多个决策树。在这种集成学习方法中，随机森林中所有决策树的输出被结合起来以做出最终预测。每棵树都对该类别进行“投票”。森林会选择获得最多投票的分类（基于森林中所有树的投票）。


    ### 降维算法


    并非所有数据（属性）在预测中的价值和重要性都是相等的。然而，每一个原始数据点，如果精心整理，都能带来巨大的价值。得益于大数据技术，我们现在能够存储、管理和处理包含数千个变量的数据集。挑战在于识别那些对预测影响最大的变量。


    像 `PCA`、`决策树`、`因子分析`、`缺失值比率`和`随机森林`这样的降维算法，在帮助我们确定为预测建模应考虑的正确变量方面起着关键作用。


    ### 梯度提升算法


    `梯度提升`算法结合多个弱算法来创建一个更强大的算法。通常情况下，您会遇到数据集可能非常庞大或数据集中存在多个不同特征的情况。在这些场景下，您可以使用学习算法的集成方法，该方法结合了多个基础算法的预测能力，以提高鲁棒性。

    '
- fmt: '# Deep Learning Primer for Managers


    Deep learning is based on the principles of connectionist systems—a collection
    of connected units or nodes called *artificial neurons* (a simplified version
    of biological neurons) transmitting signals to one another. The artificial neuron
    that receives the input signal processes it and then produces an output signal
    that is propagated to other artificial neurons it is connected to.


    In the case of neural network implementations, the artificial neurons and connections
    typically have a weight that gets adjusted during the learning process by applying
    some kind of a derivative function (also known as an activation function). The
    weight increases the signal at a connection if it contributes to prediction accuracy.
    Conversely, the weight decreases the signal at a connection if it does not contribute
    to the prediction accuracy. The artificial neurons are governed by a threshold
    value so that only if the aggregate value of the signal crosses the threshold
    is the signal propagated further. Typically, artificial neurons are organized
    in layers. Signals travel from the first (input) layer, through the subsequent
    layers, finally arriving at the last (output) layer. A neuron weighted more heavily
    than another exerts more influence on the next layer of neurons. The final layer
    sums together these weighted inputs to come up with the final answer.


    The math is fairly simple: `f(x^n) = y^m`


    Where `f` is the neural network, `x` is an `n` dimensional vector of input variables,
    and `y` is an `m` dimensional vector of output variables. Notice though that `n`
    can be different than `m`, and that is very important.


    For example, the input could be millions of pixels, while the output is compressed
    to a few numbers with meaning, e.g., the probability the image is an image of
    car/house and so on.


    Now that we know roughly what an ANN (Artificial Neural Network) is, let’s look
    at one (see Figure [4-1](#467925_1_En_4_Chapter.xhtml#Fig1)).


    ![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig1_HTML.png](images/467925_1_En_4_Chapter/467925_1_En_4_Fig1_HTML.png)


    Figure 4-1


    An artificial neural network (ANN)


    Figure [4-1](#467925_1_En_4_Chapter.xhtml#Fig1) shows a shallow (not deep) neural
    network where `n` is 3, `m` is 2, and we have a hidden layer.


    The white circles are *neurons* and neuron connection (the gray arrows) are *synapses*.
    We usually call synapses weights in terms of ANN.


    *Weight* in this context is just a number. Information flows from left to right,
    therefore you take a value on the left and move it to the right by multiplying
    the input value by weight. In other words, the value of a neuron in the hidden
    layer is the sum of all values from the previous layer multiplied by the weight
    of the connection. The neuron then holds the final value.


    The *goal* is to find the weights that will produce a meaningful output for us.


    *Learning* is the process of finding these weights. One thing you need to realize
    is there are a lot of weights. In this example, we have nine neurons in total,
    yet there are 20 weights. It gets even worse as you add more neurons. “Guessing”
    these numbers usually takes a long time and requires quite a lot of resources.


    *Guessing* is a sophisticated approach of finding the values that will work the
    best.


    *Deep ANN* is simply a ANN with more than one hidden layer, as shown in Figure
    [4-2](#467925_1_En_4_Chapter.xhtml#Fig2).


    ![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig2_HTML.png](images/467925_1_En_4_Chapter/467925_1_En_4_Fig2_HTML.png)


    Figure 4-2


    Deep ANN


    There are three widely adopted deep learning architectures.


    *   *Feedforward Neural Network*: One of the simplest forms of ANN, where the
    signals travel in one direction. In simple words, the learning is achieved through
    the front propagated wave.


    *   *Convolutional Neural Network*: Similar to feedforward neural networks, but
    specialized to recognize images through learnable weights and managing biases
    and convolutions (recognizing edges of an object in the image).


    *   *Recurrent Neural Network*: In contrast to the previous two neural networks,
    RNN is designed to recognize sequences.


    The RNN learning process starts once the first layer computes the product of the
    sum of the weights and the features. The output then follows the feedforward neural
    network principle. From one layer to the next, each neuron remembers some information
    it had in the previous step. This makes each neuron act like a memory cell. Remembering
    what information the neurons may need for later use during the learning process
    is extremely important. While the front propagation wave will keep doing the incremental
    learning as it passes on signals to each successive layer in the network, the
    backpropagation needs to keep validating the prediction and use the learning rate
    or error correction to make changes to the weights so that the network gradually
    moves toward making the right prediction.


    The three most common ways that data scientists use deep learning to perform object
    classification are:


    *   *Training from scratch*: You gather a very large labeled data set and design
    a deep neural network architecture that will automatically learn the features
    from your data and create the model for you.


    *   *Transfer learning*: Instead of building your own deep neural network architecture,
    you leverage deep learning architectures created by others (such as AlexNet or
    GoogLeNet) and use the transfer learning approach to your data. Since you are
    starting with an existing network, you have a head start. After making some tweaks
    to the existing network, you can train your network to perform newer tasks. Data
    scientists prefer transfer learning because the architecture is pre-built and
    tested on millions of data points. This way you can solve your problem with less
    data and it does not become computationally intensive.


    *   *Feature extraction*: Deep learning can be effectively used as a feature extractor
    as well. Since all the layers in the network are tasked to learn certain features
    from input data, you can possibly pull out these features from the network at
    any time during the training process and then use them as inputs to traditional
    machine learning models.


    ## Deep Learning Algorithms and Architectures


    Now that we have a high-level understanding of what deep learning means and how
    neural networks help in extracting meaningful outcomes from data, it’s time to
    discuss some of the popular deep learning algorithms and architectures.'
  raw: '## Deep Learning Primer for Managers


    Deep learning is based on the principles of connectionist systems—a collection
    of connected units or nodes called *artificial neurons* (a simplified version
    of biological neurons ) transmitting signals to one another. The artificial neuron
    that receives the input signal processes it and then produces an output signal
    that is propagated to other artificial neurons it is connected to.


    In the case of neural network implementations, the artificial neurons and connections
    typically have a weight that gets adjusted during the learning process by applying
    some kind of a derivative function (also known as an activation function). The
    weight increases the signal at a connection if it contributes to prediction accuracy.
    Conversely, the weight decreases the signal at a connection if it does not contribute
    to the prediction accuracy. The artificial neurons are governed by a threshold
    value so that only if the aggregate value of the signal crosses the threshold
    is the signal propagated further. Typically, artificial neurons are organized
    in layers. Signals travel from the first (input) layer, through the subsequent
    layers, finally arriving at the last (output) layer. A neuron weighted more heavily
    than another exerts more influence on the next layer of neurons. The final layer
    sums together these weighted inputs to come up with the final answer.


    The math is fairly simple: f(x^n)= y^m


    Where f is the neural network, x is an n dimensional vector of input variables,
    and y is an m dimensional vector of output variables. Notice though that n can
    be different than m, and that is very important.


    For example, the input could be millions of pixels, while the output is compressed
    to a few numbers with meaning, e.g., the probability the image is an image of
    car/house and so on.


    Now that we know roughly what an ANN (Artificial Neural Network) is, let’s look
    at one (see Figure [4-1](#467925_1_En_4_Chapter.xhtml#Fig1)).


    ![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig1_HTML.png](images/467925_1_En_4_Chapter/467925_1_En_4_Fig1_HTML.png)


    Figure 4-1


    An artificial neural network (ANN)


    Figure [4-1](#467925_1_En_4_Chapter.xhtml#Fig1) shows a shallow (not deep) neural
    network where *n* is 3, *m* is 2, and we have a hidden layer.


    The white circles are *neurons* and neuron connection (the gray arrows) are *synapses*.
    We usually call synapses weights in terms of ANN.


    *Weight* in this context is just a number. Information flows from left to right,
    therefore you take a value on the left and move it to the right by multiplying
    the input value by weight. In other words, the value of a neuron in the hidden
    layer is the sum of all values from the previous layer multiplied by the weight
    of the connection. The neuron then holds the final value.


    The *goal* is to find the weights that will produce a meaningful output for us.


    *Learning* is the process of finding these weights. One thing you need to realize
    is there are a lot of weights. In this example, we have nine neurons in total,
    yet there are 20 weights. It gets even worse as you add more neurons. “Guessing”
    these numbers usually takes a long time and requires quite a lot of resources.


    *Guessing* is a sophisticated approach of finding the values that will work the
    best.


    *Deep ANN* is simply a ANN with more than one hidden layer, as shown in Figure
    [4-2](#467925_1_En_4_Chapter.xhtml#Fig2).


    ![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig2_HTML.png](images/467925_1_En_4_Chapter/467925_1_En_4_Fig2_HTML.png)


    Figure 4-2


    Deep ANN


    There are three widely adopted deep learning architectures.


    *   *Feedforward* *Neural Network*: One of the simplest forms of ANN, where the
    signals travel in one direction. In simple words, the learning is achieved through
    the front propagated wave.


    *   *Convolutional Neural Network*: Similar to feedforward neural networks, but
    specialized to recognize images through learnable weights and managing biases
    and convolutions (recognizing edges of an object in the image).


    *   *Recurrent Neural Network*: In contrast to the previous two neural networks,
    RNN is designed to recognize sequences.


    The RNN learning process starts once the first layer computes the product of the
    sum of the weights and the features. The output then follows the feedforward neural
    network principle. From one layer to the next, each neuron remembers some information
    it had in the previous step. This makes each neuron act like a memory cell. Remembering
    what information the neurons may need for later use during the learning process
    is extremely important. While the front propagation wave will keep doing the incremental
    learning as it passes on signals to each successive layer in the network, the
    backpropagation needs to keep validating the prediction and use the learning rate
    or error correction to make changes to the weights so that the network gradually
    moves toward making the right prediction.


    The three most common ways that data scientists use deep learning to perform object
    classification are:


    *   *Training from scratch*: You gather a very large labeled data set and design
    a deep neural network architecture that will automatically learn the features
    from your data and create the model for you.


    *   *Transfer learning*: Instead of building your own deep neural network architecture,
    you leverage deep learning architectures created by others (such as AlexNet or
    GoogLeNet) and use the transfer learning approach to your data. Since you are
    starting with an existing network, you have a head start. After making some tweaks
    to the existing network, you can train your network to perform newer tasks. Data
    scientists prefer transfer learning because the architecture is pre-built and
    tested on millions of data points. This way you can solve your problem with less
    data and it does not become computationally intensive.


    *   *Feature extraction*: Deep learning can be effectively used as a feature extractor
    as well. Since all the layers in the network are tasked to learn certain features
    from input data, you can possibly pull out these features from the network at
    any time during the training process and then use them as inputs to traditional
    machine learning models.


    ### Deep Learning Algorithms and Architectures


    Now that we have a high-level understanding of what deep learning means and how
    neural networks help in extracting meaningful outcomes from data, it’s time to
    discuss some of the popular deep learning algorithms and architectures.'
  trans: '

    # 面向管理者的深度学习入门


    深度学习基于联结主义系统的原理——即由称为*人工神经元*（生物神经元的简化版本）的互联单元或节点组成的集合，它们相互传递信号。接收输入信号的人工神经元会对其进行处理，然后产生输出信号，并传播至与其相连的其他人工神经元。


    在神经网络实现中，人工神经元和连接通常具有一个权重，该权重在学习过程中通过应用某种导数函数（也称为激活函数）进行调整。如果某个连接有助于提高预测准确性，其权重就会增加；反之，如果该连接对预测准确性无贡献，其权重就会减小。人工神经元受阈值控制，只有当信号的聚合值超过阈值时，信号才会进一步传播。通常，人工神经元按层组织。信号从第一层（输入层）开始，经过后续各层，最终到达最后一层（输出层）。权重较大的神经元对下一层神经元的影响更大。最后一层将这些加权输入求和，得出最终答案。


    其数学原理相当简单：`f(x^n) = y^m`


    其中 `f` 是神经网络，`x` 是输入变量的 `n` 维向量，`y` 是输出变量的 `m` 维向量。请注意，`n` 可能与 `m` 不同，这一点非常重要。


    例如，输入可能是数百万个像素，而输出则被压缩为几个有意义的数字，比如图像是汽车/房屋等的概率。


    现在我们对 ANN（人工神经网络）有了大致了解，接下来看一个具体实例（见图 4-1）。


    ![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig1_HTML.png](img/467925_1_En_4_Fig1_HTML.png)


    图 4-1


    人工神经网络（ANN）


    图 4-1 展示了一个浅层（非深层）神经网络，其中 `n` 为 3，`m` 为 2，并且包含一个隐藏层。


    白色圆圈是*神经元*，神经元之间的连接（灰色箭头）是*突触*。在 ANN 术语中，我们通常将突触称为权重。


    此处的*权重*只是一个数值。信息从左向右流动，因此你取左侧的值，通过将输入值乘以权重，将其传递到右侧。换句话说，隐藏层中某个神经元的值，等于前一层所有值乘以连接权重后的总和。然后该神经元持有最终值。


    *目标*是找到能够为我们产生有意义输出的权重。


    *学习*就是寻找这些权重的过程。你需要意识到一点：权重的数量非常庞大。在这个例子中，我们总共有九个神经元，却存在 20 个权重。随着神经元数量的增加，情况会变得更复杂。“猜测”这些数值通常需要很长时间，并且消耗大量资源。


    *猜测*是一种寻找最佳数值的复杂方法。


    *深度 ANN* 就是具有多个隐藏层的 ANN，如图 4-2 所示。


    ![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig2_HTML.png](img/467925_1_En_4_Fig2_HTML.png)


    图 4-2


    深度 ANN


    目前有三种广泛采用的深度学习架构。


    *   *前馈神经网络*：ANN 中最简单的形式之一，信号仅沿一个方向传播。简单来说，学习是通过前向传播波实现的。


    *   *卷积神经网络*：与前馈神经网络类似，但专门用于通过可学习的权重以及管理偏置和卷积（识别图像中物体的边缘）来识别图像。


    *   *循环神经网络*：与前两种神经网络不同，RNN 专为识别序列而设计。


    RNN 的学习过程从第一层计算权重与特征的加权和乘积开始。输出随后遵循前馈神经网络原理。从一层到下一层，每个神经元都会记住它在上一步骤中的一些信息。这使得每个神经元都像一个记忆单元。记住神经元在学习过程中后续可能需要使用的信息至关重要。当前向传播波将信号传递给网络中每个后续层，持续进行增量学习时，反向传播则需要不断验证预测，并利用学习率或误差修正来调整权重，从而使网络逐渐向做出正确预测的方向发展。


    数据科学家使用深度学习进行目标分类的三种最常见方式是：


    *   *从头训练*：收集一个非常大的带标签数据集，并设计一个深度神经网络架构，该架构会自动从你的数据中学习特征，并为你创建模型。


    *   *迁移学习*：无需构建自己的深度神经网络架构，而是利用他人创建的深度学习架构（如 AlexNet 或 GoogLeNet），并采用迁移学习方法应用于你的数据。由于你从现有网络开始，因此具有先发优势。在对现有网络进行一些调整后，你可以训练网络执行新的任务。数据科学家更倾向于迁移学习，因为该架构是预先构建好的，并已在数百万个数据点上经过测试。这样，你可以用更少的数据解决问题，并且计算强度也不会太大。


    *   *特征提取*：深度学习也可以有效地用作特征提取器。由于网络中的所有层都负责从输入数据中学习某些特征，你可以在训练过程中的任何时候从网络中提取这些特征，然后将它们用作传统机器学习模型的输入。


    ## 深度学习算法与架构


    现在，我们对深度学习的含义以及神经网络如何帮助从数据中提取有意义的结果有了高层次的理解，是时候讨论一些流行的深度学习算法和架构了。

    '
- fmt: '# Feedforward Neural Networks


    A feedforward neural network has the following construction:


    - One or more layers, including a hidden layer.

    - Each layer has a number of neurons in it.

    - Each connection between two neurons has a weight.

    - Each neuron of a layer is typically connected to *every* neuron of the previous
    layer (you can turn them off by setting their weight to 0).

    - The learning process starts by applying an activation function on the neurons
    in the input layer. The resulting values are then propagated forward to the next
    layer’s units using the weighted sum transfer function for each unit.

    - The result of the output layer is the output of the network.


    How do you measure the accuracy and the error?


    The network error is minimized by applying gradient descent optimization algorithm.
    *Gradient descent* is used to find the minimum of a function. The optimal value
    is that at which the error achieves a *global minimum.*


    To understand gradient descent, imagine the path of a river originating from the
    top of a mountain. The goal of the river is to reach the bottom-most point flowing
    down from the mountain. Now, if there are no deep pits in between, the river won’t
    stop anywhere before arriving at its final destination. This is the ideal situation
    we desire. In machine learning context, we say that we have achieved the global
    minima of the solution starting from the initial point.


    However, if there is a deep pit in the path of the river, then the river gets
    trapped and does not achieve the global minima. In machine learning terms, such
    a pit is referred to as local minima, which is not desirable.


    # Learning Rate Decay


    Learning rate decay is an important performance tuning parameter. In the initial
    phases of training, you can afford to making large changes to the weights. However,
    as the time progresses and you add more iterations, it is desirable to have a
    decreasing learning rate decay so that with incremental smaller training updates,
    you can arrive at learning good weights and get closer to the desired final states.


    # Backpropagation


    Backpropagation provides a mechanism to adjust each weight between two neurons
    by reflecting on the output error. The errors are first calculated by observing
    the output units (based on the difference between the target and predicted values),
    and then propagated back through the network to update the weights applied during
    the previous layer. The final goal is to attain a global minimum.


    # Dropout


    There are chances of overfitting your learner if you have a large number of parameters
    for your deep neural net. Dropout is a technique to address this problem.


    The idea is to randomly drop units (along with their connections) from the neural
    network during the learning process. This prevents units from adjusting too much.
    During the training process, you can configure to dropout samples so that the
    learner approximates the effect of averaging the predictions and reduces chances
    of overfitting.


    # Batch Normalization


    Deep neural networks, at the beginning of the learning process, assume some initialization
    of weights, which are far away from the final state of the learned weights. During
    each iteration, these weights undergo careful tuning to reduce the errors. During
    this iterative process, it is possible that a small change in the initial layers
    may inadvertently lead to a large change in the later layers. Hence, it is prudent
    to keep the learning rates small, such that only a small portion of gradients
    corrects the weights. Batch normalization helps regulate the weight corrections
    through a series of min-batches, accelerating the learning process.


    # Vanishing Gradients


    A human brain stores an abstract representation of the real world somewhere deep
    inside. Similarly, the hidden layers in a deep neural network also store abstract
    representations of the training data. The more hidden layers there are in a deep
    neural network, the more abstractions (more enrichment) there are on top of the
    previous hidden layers. However, if we keep increasing the number of hidden layers
    in a deep neural network, we get to a situation where the usefulness of backpropagation
    becomes meaningless, since there is no more gradient descent improvement we can
    achieve. In effect, as less learning information is passed back, the gradients
    begin to vanish and eventually become inconsequential to adjust the weight of
    the network.


    # Autoencoders


    The network’s goal is to “recreate” the input by learning the core features that
    define the data at a conceptual level so that it can reproduce the data by following
    a compact representation technique.


    The network, instead of learning “mapping” between the input data and corresponding
    outputs, learns the internal structure and features of the data itself. How? In
    a neural network, the internal abstraction of data (most important, the features
    of data in reduced dimensions) resides in the hidden layers. The autoencoder exploits
    the hidden layers to develop its learning process.


    # Boltzmann Machines


    Boltzmann machines are *neural networks that apply probability distribution principles
    the learning mechanism*. The learning process consists of two phases (positive
    phase and negative phase) working in tandem.


    During the learning process, the network gains a perception of how the output
    data was created from the input data (you can call it the positive phase). It
    tries to use the same perception to recreate the input data (you can call it the
    negative phase). If the generated data is not close enough to reality, the network
    makes adjustments to its perception and tries again. The main goal is to keep
    refining the perception so that the generated data becomes as good as the original
    input data.


    # Filters and Max-Pooling


    Convolutional neural networks (CNNs) are a class of feedforward networks specialized
    to do image recognition.


    CNNs apply image filters and max-pooling effects to learn from data. An image
    *filter* is a rectangle with associated weights.


    *Convolutional layers* apply a number of such *filters* to the input image to
    create many subsamples of the original image. The result of one filter applied
    to the image is called a *feature map*. For example, if the input consists of
    a 32x32 image and the image filter has a subsampling parameter of 2x2, the output
    value would be a 16x16 image, which means that four pixels (each 2x2 square) of
    the input image are combined into a single output pixel. There are multiple ways
    to subsample, but the most popular method is max-pooling.


    *Max-pooling* is a method to partition the input image into a set of non-overlapping
    rectangles, reducing its dimensionality and allowing for assumptions to be made
    about features contained in the sub-regions.


    # GAN (Generative Adversarial Network)


    GAN is composed of two neural networks (generator and discriminator) competing
    with each other. The training process consists of the generator trying to produce
    data (by observing the patterns within the training data set) using some form
    of probability distribution. The discriminator acts like a judge, deciding if
    the data generated is closer to the distribution of the training set.'
