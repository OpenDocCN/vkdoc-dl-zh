    \  \n美国国会图书馆控制号：2018958917  \n© 索门德拉·莫汉蒂、萨钦·维亚斯 2018  \n本作品受版权保护。出版商保留所有权利，无论涉及材料的全部或部分，具体包括翻译、重印、重用插图、朗诵、广播、以缩微胶卷或任何其他物理方式复制，以及电子改编、计算机软件或目前已知或今后开发的类似或不同方法的传输或信息存储与检索。\
    \  \n本书中可能出现商标名称、标识和图像。我们仅在编辑风格中使用这些名称、标识和图像，以维护商标所有者的利益，并无意侵犯商标权，而非在每次出现商标名称、标识或图像时都使用商标符号。\
    \  \n本出版物中使用的商品名称、商标、服务标志及类似术语，即使未明确标识，也不应被视为对其是否受专有权利保护的立场表达。  \n尽管本书中的建议和信息在出版时被认为是真实准确的，但作者、编辑和出版商均不对可能存在的任何错误或遗漏承担法律责任。出版商对本书所含内容不作任何明示或暗示的担保。\
    \  \n本书由施普林格科学与商业媒体纽约公司（地址：233 Spring Street, 6th Floor, New York, NY 10013）在全球图书贸易中发行。电话：1-800-SPRINGER，传真：(201)\
    \ 348-4505，电子邮件：`orders-ny@springer-sbm.com`，或访问 `www.springeronline.com`。  \n\
    Apress Media, LLC 是一家加利福尼亚有限责任公司，其唯一成员（所有者）是施普林格科学与商业媒体金融公司（SSBM Finance Inc）。SSBM\
    \ Finance Inc 是一家特拉华州公司。\n\n# 引言\n\n在过去几年中，当我们与数百名首席高管、高级管理人员、业务职能负责人、技术领导者和实践者会面时，我们意识到每个人都试图理解一些基本问题：\n\
    \n*   什么是人工智能？\n*   为什么是现在？\n*   它如何影响我的职能、业务甚至整个公司？\n*   我应该做什么？\n\n这本书汇集了各种思考、整合的想法和观点——有些发人深省，有些平淡无奇——探讨了如何在人工智能时代竞争的多方面问题。一旦你开始阅读这本书，你会发现各章节以博客风格写成，这恰恰是刻意设计的。这是为了让你获得流畅的思考，并帮助你产生自己的想法。\n\
    \n简短的前言过后，让我们开始吧。\n\n最初在《危险边缘》电视游戏节目中击败参赛者的、由人工智能驱动的沃森超级计算机，大约有一间卧室那么大，由十多个机架式机器组成四面墙壁。如今的智能机器则截然不同。它们不再仅仅存在于卧室大小的房间里，而是被云化，并同时运行着数百个人工智能服务的“实例”。输出结果通过多种渠道——智能助手、智能手机、智能设备、智能家电、智能车辆、智能公用设施、智能工厂、智能建筑、智能家居等——被全球各地的接收者同时消费。结果如何？我们生活在一个“永远在线”的智能世界中。\n\
    \n人工智能的这种普及正在引发另一个有趣的现象——我们使用得越多，它就变得越智能。它在一次交互中学到的东西会立即转移到其他交互中。人工智能并非一个庞大的单一程序。它实际上是多种不同的人工狭义智能体的组合，每个智能体专门执行特定任务，并具备诸如对话界面、图像识别、语音识别、文本转语音、语音转文本、逻辑推理、自然语言解析、自然语言生成、知识库、自学习和自适应引擎等能力。\n\
    \n慢慢地，稳步地，一幅人工智能未来的图景正在浮现。地平线上的人工智能看起来更像是嵌入一切事物中、几乎无形的“人工智能即服务”。一个世纪前，我们改造一切以电力驱动，来增强人类能力；展望未来，我们正处于一个类似的转折点，我们将“人工智能化”一切，以增强人类能力，并在某些情况下引入自主人工智能，完全消除人类任务。得益于云、GPU、大数据、区块链、物联网、机器学习和深度学习等技术，“人工智能化”的过程在未来将变得更加简单，通过将人工智能注入一切事物来改变一切。事实上，如果未来公司的商业计划是“拿\
    \ X 加上人工智能”，你也不必感到惊讶。\n\n以谷歌为例。每次我们输入查询或点击链接时，我们都在成为训练谷歌人工智能的积极参与者。从如何约会、如何怀孕、如何抚养孩子、DIY\
    \ 科学实验、如何管理人际关系、如何准备一份有效的简历，到最常见的面试问题及相应答案，我们通过每一次查询向谷歌的搜索引擎输入信息，都在帮助谷歌人工智能记录我们的行为。这包括我们的想法、我们想知道什么、我们何时寻求信息、我们为何寻求信息、我们如何使用这些信息等等。也许十年后，谷歌的主要产品将是“思维即服务”，你将能够租用一位\
    \ CEO、开发者或科学家的思维。\n\n这就是事情变得模糊的地方。伦理政策及相关辩论开始发挥作用。\n\n是什么推动了人工智能的如此大规模增长？三项技术突破起到了催化剂作用：\n\
    \n*   **大规模并行计算：** 思考，即对某事进行推理的过程，是一个大规模并行的过程，我们大脑中数十亿个神经元同时行动，通过网络层将信号传递给其他神经元。最终结果是判断。在图形处理单元（GPU）被发明之前，我们无法进行大规模并行处理。GPU\
    \ 解锁了新的可能性，使得神经网络（大致基于我们大脑中神经元的工作方式）能够促进节点之间数亿计的连接，处理时间几乎不到一秒。\n\n*   **大数据：**\
    \ 我们声称属于自己的智能是随着时间的推移被教导给我们的。当人类大脑看到从未见过的东西时，需要时间来推断图像是什么！同样的规则也适用于人工智能。得益于数字化和智能手机的普及，我们可以获取海量的现实世界数据。我们收集、清理、标准化和存储这些现实世界数据的能力，为人工智能提供了巨大的训练场。结果如何？我们开始看到智能被注入几乎一切事物，从而将一切转变为“智能”事物。"
- fmt: "# 排版后的内容\n\n**更好的算法：** 我们大脑内部为了分析周围环境，发生了许多活动。我们使用启发式方法和心理思维导图进行推理。然而，将思维过程编码化对我们来说极其困难。我们早期将推理过程编码化的尝试导致了编写冗长的程序，大多以“IF\
    \ then Else…”的形式存在，并且这些程序对变化的适应性不足。深度学习算法为我们提供了一种从数据本身生成推理的方法，不是通过由成百上千个条件组成的复杂程序，而是通过数据本身来提炼模式和提出建议。我们现在可以收集大量数据，并应用复杂的算法来得出预测。唯一的缺点是，某些算法过于复杂，以至于我们无法理解得到的结果。\n\
    \n为了说明这三个催化因素的影响，我们来讨论一下1997年IBM的超级计算机“深蓝”在一场著名的人机对战中击败了 reigning 国际象棋大师加里·卡斯帕罗夫之后发生的事情。卡斯帕罗夫拥有他卓越的天才头脑；而“深蓝”则可以即时访问一个包含数千名专家所有过往棋步的庞大数据库。卡斯帕罗夫意识到，“人加机器”将比“人对机器”有益得多。“半人马玩家”（一种人类/AI合成体）的概念开始出现，即AI增强人类棋手的技能。结果如何？如今，最好的棋手是“Intagrand”——一个由人类和几种不同的国际象棋AI程序组成的团队。\n\
    \n有趣的是，另一种模式开始出现。AI驱动的国际象棋程序非但没有削弱人类棋手的兴趣，反而激励了比以往任何时候都多的人去下棋。也许，对于人类棋手和AI国际象棋程序来说，确实有一些真正激励人心和有益的东西，双方都提高了赌注，以保持领先对方一步，并因此相互学习，成为更好的棋手。结果如何？现在的大师级棋手比“深蓝”首次击败卡斯帕罗夫时还要多。\n\
    \n这引出了另一点。如果AI能帮助人类成为更好的棋手，那么AI也完全有可能帮助我们在生活和职业的其他领域变得更好。\n\n到目前为止，这一切都很棒！所有这些技术进步与商业有何关联？\n\
    \n嗯，迹象是存在的，尽管在当下这个时间点可能还很微妙。我们周围的世界，以及我们的商业和我们在商业环境中扮演的角色，正日益受到AI普及的影响。这将要求企业高管们采用一种新的角色委派方式——从实施战略性的AI顾问到增强员工能力。\n\
    \n现代组织重视被赋能的AI，就像他们重视被赋能的人一样。例如，CEO必须明确何时应咨询智能算法，而非人类同事。这可能很困难。关于机器学习的一些最重要的决策，通常涉及AI代理应拥有的权限范围。那些已经实现工厂自动化的商业领袖，现在对让AI决定其整个商业战略的想法感到畏缩。在缺乏明确的权限和问责划分的情况下，人机冲突将源于双重赋能。\n\
    \n致力于利用AI优势的商业领袖应考虑以下四个与AI相关的要务。\n\n*   **AI作为战略顾问：** AI可以有效地扮演战略顾问的角色。AI战略家的主要成果是重新定义问题、协助制定战略，以及协助确定行动方案和执行计划。这些算法将不断产生数据驱动的洞察，并推荐最佳行动方案。人类干预和监督将仅用于确定哪些决策交由算法处理，以及如何执行这些决策。\n\
    \n    AI战略家将对系统和业务流程以及竞争情报有更广泛的视野，这必然带来重大的运营挑战，例如流程间和人际间的冲突。因此，AI战略家的输出对所有相关人员都应是透明且可解释的，这一点至关重要。这样，人与机器之间的信任因素才能得以发展。\n\
    \n*   **AI作为任务执行者：** AI战略家已经完成了定义问题陈述和执行计划的工作，人类同事也已验证并批准。接下来呢？你将需要算法来分析业务流程、创建清晰的任务描述和目标，并定义详细的服务水平协议和关键绩效指标。负责任务执行的经理和员工现在将执行更高层次的任务——他们不会专注于项目执行的操作化（分配资源、管理员工和处理升级问题），而是将大部分时间用于审查算法是否提供了改进的成果和创新。算法提供的重要优势包括高水平的可靠性和可预测性。\n\
    \n*   **AI作为员工的虚拟助手：** 即使是最有才华的员工也有其局限性。与这些员工相比，AI算法是被限制在任务范围内的天才。因此，商业领袖们心中的问题是，普通的经理和员工能否与智能代理有效地协同工作。\n\
    \n    像谷歌、阿里巴巴、亚马逊、Netflix等现代企业，已经在可操作的洞察能够提高员工生产力并帮助实现业务成果的情况下，开始使用AI助手。员工别无选择，只能学会重视算法。一方面，人机协作文化将意味着成果具有更高的可扩展性和可预测性。同时，它可能在很大程度上削弱组织内的问责制。其中一个原因可能是，在快速演变的场景中，当每个人（人和机器）都在争分夺秒地交付成果时，经理们可能不清楚是需要重新培训员工还是重新训练算法。\n\
    \n*   **AI作为自主组织：** 这可能吗？嗯，如果你已经完成了前三步，那为什么不行呢？这在许多华尔街对冲基金中已经发生。这些公司允许AI拥有完全的自主权，将组织引导至新的风险、盈利能力和创新水平。这些对冲基金的高管们已将决策过程中难以想象的一部分交给了他们的算法。"
  raw: '*   **Better algorithms:** A lot goes on inside our brain in order to analyze
    our surroundings. We use heuristics and mental mind-maps to reason. However, it
    is incredibly hard for us to codify the thinking process. Our earlier endeavors
    to codify the reasoning process resulted in writing lengthy programs, mostly in
    the form of “IF then Else…” and these programs were not adaptive enough to changes.
    Deep-learning algorithms give us a way to generate reasoning from the data itself,
    not from complex programs consisting of hundreds and thousands of conditions,
    but from the data itself churning out patterns and recommendations. We can now
    collect lots of data and apply sophisticated algorithms to arrive at predictions.
    The only drawback is that some algorithms are so complex that we just can’t understand
    the results we get.


    To illustrate the impact of these three catalysts, let’s discuss what happened
    after IBM’s supercomputer Deep Blue defeated the reigning chess grand master Garry
    Kasparov in a famous man-versus-machine match in 1997\. Kasparov had his superlative
    genius mind on his side; Deep Blue had instant access to a massive database of
    all previous chess moves played thousands of experts. Kasparov realized that man-plus-machine
    would be far more beneficial than man-versus-machine. The concept of a “centaur
    player” (a human/AI cyborg) began to emerge where AI augments the human-chess
    player’s skills. The result? Today, the best chess player is “Intagrand”—a team
    of humans and several different chess AI programs.


    Interestingly, another pattern began to emerge. Instead of diminishing the interest
    of human chess players, AI-enabled chess programs actually inspired more people
    than ever to play chess. Perhaps there was something really motivating and rewarding
    for the human chess players and the AI chess programs, both turning up the ante
    to stay one step ahead of the other, and consequently both learning from each
    other to become better players. The result? There are more grand masters now than
    there were when Deep Blue first defeated Kasparov.


    This brings up another point. If AI can help humans become better chess players,
    by all means it is also possible for AI to help us become better in other spheres
    of life and professions.


    Fantastic so far! How do all of these technology advances relate to business?


    Well, the signs are there, however subtle at this point in time they may be. The
    world around us, and hence our businesses and the roles we play in a business
    context, are increasingly impacted by AI prevalence. It will require CxOs to adopt
    a new approach to role delegation—from implementing strategic AI advisors to augmenting
    employees.


    Modern organizations value empowered AI as much as they value empowered people.
    For example, CEOs must make it clear when smart algorithms, rather than human
    associates, are to be consulted. This can be difficult. Some of the most important
    decisions regarding machine learning are usually about the extent of authority
    the AI agents should have. Business leaders who automate a factory now recoil
    at the idea of letting AI determine their entire business strategy. In the absence
    of clear delineation of authority as well as accountability, human-AI conflict
    will result from dual empowerment.


    Business leaders committed to taking advantage of AI should consider the following
    four AI-related imperatives.


    *   *AI as strategic advisors:* AI can effectively play the role of the strategic
    advisor. The primary deliverables of the AI strategist are to reframe problems,
    assist in strategy development, and assist in defining the course of action and
    the execution plans. These algorithms will constantly produce data-driven insights
    and recommend optimal courses of action. Human intervention and oversight will
    solely be required to identify which decisions are deferred to the algorithms
    and how the decisions are implemented.


    The AI strategist will have a broader view across the systems and business processes
    and competitive intelligence, which will invariably present major operational
    challenges, such as inter-process and interpersonal conflicts. Hence, it is all
    the more important that the output of the AI strategist should be transparent
    and explainable to all. That way the trust factor will evolve between human and
    machine.


    *   *AI as task executioners:* The AI strategist has done its job in defining
    the problem statement and execution plans, and the human associate has validated
    it and given a go-ahead. What next? You will need algorithms to analyze business
    processes, create clear task descriptions and goals, and define detailed service-level
    agreements and key performance indicators. Managers and employees responsible
    for task execution will now perform higher order tasks—instead of focusing on
    operationalizing (allocating resources, managing employees, and managing escalations)
    the project execution, they will spend most of their time reviewing whether the
    algorithms are offering improved outcomes and innovation. Among the important
    benefits that algorithms offer are high-level reliability and predictability.


    *   *AI as a virtual assistant to employees:* Even the most talented employees
    have their limits. Compared to these employees, AI algorithms are geniuses boxed
    into a task’s scope. Therefore, the question on business leaders’ minds is whether
    the average manager and employee can effectively work together with intelligent
    agents.


    Modern enterprises like Google, Alibaba, Amazon, Netflix, etc. have already started
    using AI assistants in cases where actionable insights can improve the productivity
    of their employees and can help achieve the business outcomes. Employees have
    no other choice but to learn to treat the algorithms as valued. On the one hand,
    the collaboration culture of the human-machine will mean much more scalability
    and predictability to the outcomes. At the same time, it may to a large extent
    weaken accountability in the organization. One reason for this may be that in
    rapidly evolving scenarios, where everybody (human and machine) is running against
    time to deliver the outcomes, it may not be clear to managers whether they need
    to retrain the employee or the algorithms.


    *   *AI as an autonomous organization:* Is this possible? Well, if you have done
    the previous three, then why not? It is already happening with many Wall Street
    hedge funds. These companies are allowing AI full autonomy in steering the organization
    to new levels of risk, profitability, and innovation. Executives in these hedge
    funds have handed over an unimaginable portion of the decision-making process
    to their algorithms.'
