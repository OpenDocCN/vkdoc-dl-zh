- fmt: '# Energy for Everyone


    Whoever has access to energy has historically enjoyed a better economy, but human
    greed has been consistently depleting the natural reservoirs and thus finding
    alternative sources of energy has become the most critical factor for governments.
    Solar power is quickly becoming an alternative option and the very nature of access
    to this source of renewable energy is poised to democratize the energy usage.
    `AI` and `IoT` embedded into the solar panels will allow monetization of energy,
    thus benefiting the general public and paving the way for efficient usage and
    distribution of excess energy for where it can be used more effectively.


    # Financial Institutions Are No Longer Intermediaries


    It is almost shocking to realize that the financial industry consisting of finance,
    insurance, and real estate do not produce any goods or services, yet they account
    for a very large percentage of any nation’s economy. The only thing the financial
    industry does is provide authenticity and commitments to the financial instruments
    that are required in any business transaction. The cost of this intermediation
    and managing the cost of financial instruments can be certainly reduced by effective
    usage of technologies like blockchain and `AI`, which in turn can greatly reduce
    the cost of running businesses.


    # Livable Cities


    Over the past few decades, cities have moved away from maximizing social interactions
    to creating better living facilities. People are just commuting from one end to
    the other to go about their daily activities rather than spending quality time
    in a social settings and living healthily. Smart cities are hence the need of
    the hour, in order to provide meaningful and healthy living environments. `AI`
    and `IoT` technologies can deliver this objective at a fraction of the cost.


    # Liberated Learning


    Today, one’s value in the job market is determined to a large extent by a certificate
    from an educational institute of repute. In addition there is a distinct bias
    during the interview process toward the certificate over the skills and technical
    prowess of the candidate. Thus, it is quite natural for educational institutions
    to exploit this scenario. The result? The cost of education is skyrocketing and
    leading to crushing debt on the millennial generation. `AI`-based educational
    systems at affordable costs can greatly democratize the entire education system
    and can provide means to assess one’s true skills almost in real time.


    # Truly Caring for Health


    Healthcare in its current form is always a reactive practice, meaning we look
    for care options only when there is an emergency situation or we become sick.
    This behavior leads to higher monetary implications depending on the seriousness
    of the health issue. `AI` technologies can provide significant levers to make
    healthcare affordable. `AI` can lower the cost of diagnosis by analyzing an individual’s
    past medical history and combining it with wearable devices to continuously monitor
    one’s vital statistics, calorie intakes, physical activities, etc. This can provide
    alerts and recommendations driving toward preventive and proactive healthcare
    rather than how it is today — reactive, irreversible, and expensive.


    So, how would you navigate the transition? Probably by acknowledging and prioritizing
    your investments and identifying which areas of your business needs reimagining
    with `AI`.


    # Everything Is a Prediction Problem!


    The American Economic Association defines economics as “… the study of scarcity,
    the study of how people use resources and respond to incentives, or the study
    of decision-making. It often involves topics like wealth and finance, but it’s
    not all about money. Economics is a broad discipline that helps us understand
    historical trends, interpret today’s headlines, and make predictions about the
    coming years.”^([¹](#fn1))


    What is of interest in this definition are two specific points—“decision making”
    and “making predictions”—and these are central to what `AI` offers. From an economist’s
    perspective, `AI` in essence is a prediction technology enabling automatic decision
    making, thus lowering the cost of making predictions.


    What happens when the cost of prediction goes down? We have already seen the effects:
    prediction being a key component in determining the demand-supply equilibrium.
    If the cost of prediction goes down, the cost of goods and services that rely
    on prediction also goes down. `AI` dramatically drives down the cost of prediction,
    thereby giving impetus to two well-established economic implications. First, we
    start using prediction in almost everything that we do; and second, the prolific
    usage of prediction starts amplifying the resulting values of outcomes exponentially.


    How? Consider this equation:


    > `Outcome = Function (Data, Prediction, Decision Making, Actions)`


    In our daily life, whatever activities we do, can be summarized to effective usage
    of five components: data, prediction, judgment, action, and outcomes.


    For example, I want to buy a state-of-the-art TV:


    *   *Gather data:* Includes make, models, brands, features, prices, discounts
    offered, other promotional offers, and payment options


    *   *Make predictions*: Such as “if I choose LG 52", then I predict outcome X,
    but if I chose Sony 52", then I predict outcome Y”


    *   *Make judgments:* “Given the features, discounts, price range, and friend’s
    recommendations, I think the best option is Sony 52”; let me ask them to throw
    in a free subscription to Netflix for a year”


    *   *Take action*: The dealer has agreed to all that I asked for, let me swipe
    my credit card


    *   *Outcome*: I am the proud owner of a Sony 52" state-of-the-art TV, along with
    a year of Netflix, and an additional 15% cash back because of a promotional offer
    on my credit card. My wife will surely love the deal—Happy Wife, Happy Life.


    As `AI` lowers the cost of prediction, we will begin to use it in almost everything
    we do, whether organizing our personal preferences or solving complex business
    problems. As a result, activities that were historically prediction-oriented will
    start becoming cheaper and better—like pricing, inventory management, logistics,
    supply-chain, demand forecasting, advertising, diagnosis, transportation, etc.
    At the same time, we will also start exploring opportunities to use prediction
    to solve other problems, which historically we had never even contemplated as
    a prediction problem.'
