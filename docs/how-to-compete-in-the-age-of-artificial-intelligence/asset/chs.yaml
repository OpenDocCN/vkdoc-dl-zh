- '# 引言


  在过去几年中，当我们与数百名首席高管、高级管理人员、业务职能负责人、技术领导者和实践者会面时，我们意识到每个人都试图理解一些基本问题：


  *   什么是人工智能？

  *   为什么是现在？

  *   它如何影响我的职能、业务甚至整个公司？

  *   我应该做什么？


  这本书汇集了各种思考、整合的想法和观点——有些发人深省，有些平淡无奇——探讨了如何在人工智能时代竞争的多方面问题。一旦你开始阅读这本书，你会发现各章节以博客风格写成，这恰恰是刻意设计的。这是为了让你获得流畅的思考，并帮助你产生自己的想法。


  简短的前言过后，让我们开始吧。


  最初在《危险边缘》电视游戏节目中击败参赛者的、由人工智能驱动的沃森超级计算机，大约有一间卧室那么大，由十多个机架式机器组成四面墙壁。如今的智能机器则截然不同。它们不再仅仅存在于卧室大小的房间里，而是被云化，并同时运行着数百个人工智能服务的“实例”。输出结果通过多种渠道——智能助手、智能手机、智能设备、智能家电、智能车辆、智能公用设施、智能工厂、智能建筑、智能家居等——被全球各地的接收者同时消费。结果如何？我们生活在一个“永远在线”的智能世界中。


  人工智能的这种普及正在引发另一个有趣的现象——我们使用得越多，它就变得越智能。它在一次交互中学到的东西会立即转移到其他交互中。人工智能并非一个庞大的单一程序。它实际上是多种不同的人工狭义智能体的组合，每个智能体专门执行特定任务，并具备诸如对话界面、图像识别、语音识别、文本转语音、语音转文本、逻辑推理、自然语言解析、自然语言生成、知识库、自学习和自适应引擎等能力。


  慢慢地，稳步地，一幅人工智能未来的图景正在浮现。地平线上的人工智能看起来更像是嵌入一切事物中、几乎无形的“人工智能即服务”。一个世纪前，我们改造一切以电力驱动，来增强人类能力；展望未来，我们正处于一个类似的转折点，我们将“人工智能化”一切，以增强人类能力，并在某些情况下引入自主人工智能，完全消除人类任务。得益于云、GPU、大数据、区块链、物联网、机器学习和深度学习等技术，“人工智能化”的过程在未来将变得更加简单，通过将人工智能注入一切事物来改变一切。事实上，如果未来公司的商业计划是“拿
  X 加上人工智能”，你也不必感到惊讶。


  以谷歌为例。每次我们输入查询或点击链接时，我们都在成为训练谷歌人工智能的积极参与者。从如何约会、如何怀孕、如何抚养孩子、DIY 科学实验、如何管理人际关系、如何准备一份有效的简历，到最常见的面试问题及相应答案，我们通过每一次查询向谷歌的搜索引擎输入信息，都在帮助谷歌人工智能记录我们的行为。这包括我们的想法、我们想知道什么、我们何时寻求信息、我们为何寻求信息、我们如何使用这些信息等等。也许十年后，谷歌的主要产品将是“思维即服务”，你将能够租用一位
  CEO、开发者或科学家的思维。


  这就是事情变得模糊的地方。伦理政策及相关辩论开始发挥作用。


  是什么推动了人工智能的如此大规模增长？三项技术突破起到了催化剂作用：


  *   **大规模并行计算：** 思考，即对某事进行推理的过程，是一个大规模并行的过程，我们大脑中数十亿个神经元同时行动，通过网络层将信号传递给其他神经元。最终结果是判断。在图形处理单元（GPU）被发明之前，我们无法进行大规模并行处理。GPU
  解锁了新的可能性，使得神经网络（大致基于我们大脑中神经元的工作方式）能够促进节点之间数亿计的连接，处理时间几乎不到一秒。


  *   **大数据：** 我们声称属于自己的智能是随着时间的推移被教导给我们的。当人类大脑看到从未见过的东西时，需要时间来推断图像是什么！同样的规则也适用于人工智能。得益于数字化和智能手机的普及，我们可以获取海量的现实世界数据。我们收集、清理、标准化和存储这些现实世界数据的能力，为人工智能提供了巨大的训练场。结果如何？我们开始看到智能被注入几乎一切事物，从而将一切转变为“智能”事物。



