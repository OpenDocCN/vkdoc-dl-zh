  \n## 确保你的安全\n\n我们关心亲人的安全。这是我们竭尽全力确保家庭安全的主要原因。我们在周边安装闭路电视摄像头和连接到执法机构控制室的入侵检测系统。想象一下，如果你的闭路电视摄像头和入侵检测控制系统的数据被持续推送到云端，人工智能系统不仅实时评估情况，还应用视觉识别算法，通过与罪犯数据库核对来正确识别入侵者，并指导执法人员采取下一步最佳行动。\n\
  \n当然，所有这些例子都涉及数据隐私问题。然而，有些人认为其好处明显大于风险。\n\n物联网、云计算和人工智能三者结合的影响，需要丰富的想象力。我们可以将这些技术的变革力量应用于几乎任何事物和一切事物。\n\
  \n\n\n## 物联网、混合云与人工智能协同工作\n\n前面讨论的例子无疑引人入胜。但关键问题在于，如何构建这类集成应用？需要哪些技术构建模块？\n\n没有支持性的平台和架构，物联网与人工智能的融合根本不可能实现。这正是混合云发挥作用之处。每家公司都拥有独特的技术格局，这些格局是为其各自的业务需求和增长而构建并与之相适应的。混合云既是一种颠覆性技术，也是一个商业机遇。要理解这种颠覆，需要更深入地理解涉及混合云、物联网和人工智能的融合架构。\n\
  \n我们周围遍布着不断收集和传输数据的设备。所有这些数据都必须被快速分析，以确定下一步最佳行动。一旦出现延迟，数据就会失去价值。这种零延迟的要求，需要在最接近数据源的地方具备令人难以置信的分布式收集和存储能力。这意味着物联网边缘必须展现出即时解析和分析流数据以采取下一步最佳行动的能力，同时将大部分数据推送到云端进行更深入的分析。\n\
  \n另一方面，人工智能需要巨大的计算能力来处理海量数据集。速度和性能是人工智能系统的额外考量因素，因为人工智能做出的决策需要快速反馈给物联网设备，才能使预测具有可操作性。\n\
  \n以下列表列举了几个突出人工智能特定需求的示例：\n\n-   自动驾驶应急响应车辆能立即响应洪水、火灾等救生搜索和救援行动。\n-   医疗设备可以自动进行除颤，并向最近的医院发送警报通知。\n\
  -   金融犯罪检测系统涵盖信用卡刷卡行为。\n-   流媒体视频服务的按需推荐。\n-   苹果的 Siri 和亚马逊的 Echo 在边缘端提供即时响应。\n\
  \n还有更多例子分布在工业需求和消费者需求中。在所有这些例子中，有一点是共通的：人工智能的需求不仅涉及大量数据，还涉及实时决策（见图 7-1）。\n\n![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig1_HTML.png](img/467925_1_En_7_Fig1_HTML.png)\n\
  \n图 7-1\n\n物联网的数据价值链与决策延迟\n\n物联网收集的数据可以提升人工智能的预测能力；然而，价值链中（从设备原始数据到预测，再到结果）有许多任务需要良好编排才能交付最终成果。图\
  \ 7-2 展示了构成物联网分析平台的不同组件的概念视图。\n\n![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig2_HTML.png](img/467925_1_En_7_Fig2_HTML.png)\n\
  \n图 7-2\n\n物联网分析平台组件\n\n虽然仅仅实施物联网本身就具有变革性——至少你可以完全了解运营和机器性能，并做出决策——但要实现预测性，你需要人工智能能力与物联网和云协同运作。\n\
  \n### 避免代价高昂的计划外停机\n\n设备故障导致的计划外停机可能代价高昂。通过将机器学习算法应用于机器生成的传感器数据，我们可以提前预测设备故障。然后，人工智能系统可以向现场操作员触发警报，并安排维护程序。\n\
  \n### 提高运营效率\n\n在工厂中，装配线操作要求一切精确并严格遵守质量控制。以生产过程中的溢出为例。溢出量每减少 1% 就可能意味着节省数千美元。通过使用物联网和机器学习，公司可以显著减少泄漏。从嵌入机器的传感器捕获的流数据可以在边缘端实时分析，从而向人类专家发送警报以控制溢出。\n\
  \n### 实现新的和改进的产品与服务\n\n物联网与人工智能相结合，可以为改进产品设计奠定基础，在某些情况下甚至可以构思出全新的产品和服务。例如，通过分析机器性能数据，我们可以帮助发现模式并获得运营洞察——机器如何工作？能否根据设计规范执行？实际使用情况是否与设计时考虑的使用情况不同？是否有机会推出新产品线？等等。\n\
  \n### 加强风险管理\n\n许多将物联网与人工智能结合的应用正在帮助组织更好地理解风险，并为快速响应、更好地管理工人安全和网络威胁做好准备。\n\n例如，通过在可穿戴设备上使用机器学习，我们可以监控工人的安全并预防事故。银行已开始评估利用人工智能从联网的\
  \ ATM 监控摄像头中实时识别可疑活动。车辆保险公司已开始对联网汽车的远程信息处理数据使用机器学习，以准确定价基于使用情况的保险费，从而更好地管理承保风险。\n\
  \n## 人工智能在工业 4.0 中的作用\n\n关于工业 4.0 的普遍观念是连接所有资产并创建数字化环境。这并非完全准确。工业 4.0 更像是一场演进而非革命。要达到理想的成熟度水平，需要经历几个阶段。第一阶段始于将所有资产连接在一起，包括仪器仪表、连接性和数据收集。下一阶段是弄清楚如何理解所有这些数据。最后阶段是将自动化引入整个生命周期。制造敏捷性是工业\
  \ 4.0 成功的关键，而人工智能在整个“创造、制造和交付”价值链中发挥着关键作用，以优化和改进每个流程，从而在任何外部环境下都能取得最佳成果。\n\n关于工业\
  \ 4.0 的讨论不可避免地会涉及多种技术：边缘计算、云计算、人工智能、物联网、平台等。尽管这些技术各有其作用，但最关键的组成部分是其数据和预测能力。\n\n\n\
  \n## 数字孪生\n\n现代制造企业正利用物联网平台从机器及其他来源采集数据，以创建\"数字孪生\"——即真实物理对象的数字模型（见图 7-3）。数字孪生使我们能够可视化机器在实际运行中的各项指标。机器上的传感器将数据传输至其数字副本，模拟物理机器的运行状态，随后机器学习算法分析这些数字传输的数据，以优化产品性能，并为物理系统推荐下一步最佳操作。借助数字孪生，我们能够预测物理世界的场景、优化资产性能、降低维护成本、减少停机时间服务等级协议，并探索数据变现及构建新服务产品的机遇。\n\
  \n![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig3_HTML.jpg](img/467925_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n\n数字孪生的概念视图\n\n本质上，数字孪生是物理系统、数字镜像以及连接两者的底层数据的融合体。\n\n### 数字孪生如何带来变革性的业务成果？\n\
  \n首先，数字孪生——更确切地说是物联网、云和人工智能的融合技术——为优化流程以及有效利用机器和资源提供了可能。虽然这些解决方案主要旨在降低生产成本，但客户期望最终产品能包含增值服务，例如仪表盘、使用模式、维护警报等。\n\
  \n其次，智能设备会获取关于产品在客户现场实际使用情况的广泛数据。当您分析整个装机基础中的这些宝贵数据时，您不仅能推断出单个客户的装机基础模式，还能获得全局视角：其他客户如何使用该产品、他们的成功程度、面临的挑战，以及是否存在以溢价推出新产品或增值服务的空白市场机会。\n\
  \n第三，由于您现在销售的不仅仅是机器，而是\"机器即服务\"，您可以改变整个商业模式——如果您能保证客户产品和服务的质量，他们就不会介意支付溢价保险费。借助数字孪生，您可以衡量机器的健康状况和性能。您能够远程管理这些机器的使用情况，并预测可能的故障。您能够监控机器利用率，并推荐更好的产能规划和生产计划等。所有这些洞察意味着您实际上可以在客户的业务成果中扮演更重要的角色，如果您能承诺减少停机时间服务等级协议，客户当然愿意向您支付溢价。\n\
  \n### 如何为您的业务制定盈利的数字孪生战略？\n\n如果您是一家纯粹的工业制造企业，您有三个选择：\n\n*   **成为赋能者**：开始开发并将物联网技术（如端点网络、边缘计算和云基础设施）嵌入到您的产品和解决方案中。这将使您能够向客户交叉销售数字孪生组件，从而获得市场份额。而您的客户则需要借助外部帮助来构建内部能力，以设计适合他们的数字孪生架构。但需要注意的是，这个市场将被少数能够以极低成本提供完整技术栈的全球巨头所主导。\n\
  \n*   **成为参与者**：除了制造配备传感器和计算能力的世界级产品外，您还可以涉足为客户设计、创建、集成和交付增值服务。增值服务可能包括添加实时仪表盘、历史机器性能趋势、基于阈值的警报通知等。这些产品可能不会给您带来显著优势，因为传统软件公司专精于提供此类能力；然而，通过为物理机器提供数字服务，您无疑能够加深与客户的亲密关系。\n\
  \n*   **成为增强者**：此处的目标是提供丰富的最终用户互动，并利用客户自身及第三方来源的数据提供新服务。这正是数字孪生、数据变现和新收入模式发挥作用的地方。增值产品需要针对特定机器和特定行业，以提高其他企业复制的门槛。\n\
  \n\n\n## 你的万物智联战略是什么？\n\n涉及人工智能与物联网融合的应用场景正在飞速发展，在很短的时间内，几乎所有“哑巴”设备都将变得智能化。\n\n\
  以下是构建万物智联架构时需要考虑的几个要点：\n\n-   将会有众多物联网设备组成一个整体，它们需要在组织内部进行通信和协同工作。根据产品和服务类型的不同，这个整体可能服务于一个人（通过可穿戴设备或个人设备）、一栋房屋、一辆汽车、一个项目或一座工厂。\n\
  -   设备的数量和制造商的种类将会激增。因此，将不存在实现机器间通信的标准方式。因此，选择合适的云合作伙伴至关重要，这样设备才能通过“机器-云-机器”的迂回方式协同工作。同时，也需要建立设备的“API\
  \ 化”。\n-   为了充分发挥预测和自主决策的潜力，需要整合来自物联网、其他企业数据源以及外部数据（如天气模式）的统一视图。\n\n同样，以下是识别物联网、云和人工智能创新机会时需要考虑的几个要点：\n\
  \n-   **客户体验**：通过重新构想客户如何使用产品或服务，以及如何为客户创造、分发、消费和服务最终价值，来识别客户体验方面可能的创新。是否存在通过收集新数据、融入现有流程数据并创建新流程和合作伙伴关系来改善客户旅程的机会？\n\
  -   **产品与服务**：通过利用物联网、云和人工智能的组合（结合基础设施、流程、政策和人员），识别产品为用户提供更多价值的潜在机会。设想为产品增加新功能，或增强现有功能以使其表现更佳。这更多关乎功能和形态因素，而非使能技术。\n\
  \n    在服务方面，识别服务以及客户最终消费方式的机会，即服务如何、是什么以及何时被提供和消费。设想一下，如果产品转变为服务会怎样。\n\n-   **使能技术**：使能技术的创新不一定特定于某个产品或服务，而更多是关于采用技术来实现重新构想的客户体验、产品、服务或商业模式。在这里，需要仔细评估物联网、人工智能和云的组合，以及如何针对你的特定业务需求进行采用。\n\
  -   **商业模式**：通过整合所有要素，识别增强现有商业模式的机会，以便为现有客户（或全新的客户群）创造和传递价值。设想通过采用和启用物联网、云和人工智能的技术组合，创造新的或增强的产品和服务，从而带来全新的客户体验。\n\
  \n图 7-4 展示了跨行业的 AI 与物联网融合用例。\n\n![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig4_HTML.png](img/467925_1_En_7_Fig4_HTML.png)\n\
  \n图 7-4\n\n物联网分析价值链\n\n以下是一些更具体的行业示例。\n\n-   **飞机**：对于航空公司而言，零停机时间意味着更高的收入。如今，飞机发动机制造商正在安装数百万个传感器，其主要目标不仅是了解飞机每次飞行的性能，还要能够预测发动机的磨损情况。结果如何？更高的安全性和更少的停机时间。\n\
  -   **石油钻井平台**：用于钻探的机器属于资本密集型，因此石油公司必须不断改善其运营成本。当这些机器发生故障时，公司会遭受巨大损失，但让昂贵的机器处于待命状态在经济上并不可行。解决方案是什么？让机器变得智能，以便可以持续监控和分析其利用率、性能和状况。预测性维护和基于状态的监控显著降低了运营成本。\n\
  -   **制造业**：制造商正在投资建设智能工厂和车间，以便其机械和装配线能够在未来打造出自动化工厂。\n\n虽然一方面，物联网、人工智能和云的融合为企业在\
  \ B2B 和 B2B2C 领域带来了更强的价值主张，但企业也需要意识到若干挑战，尤其是在管理数据的体量、速度和多样性方面。每一次颠覆都会创造前所未有的新机遇和市场；然而，与其贸然投入，你需要评估哪些与你的行业相关，并定义你自己的万物智联战略。\n\
  \n### 制定万物智联战略的最佳实践\n\n#### 制定并阐明你自己的价值主张\n\n物联网和人工智能的结合带来了广泛的变革性机遇。然而，在屈服于“给所有东西装上传感器并期待奇迹发生”的诱惑之前，你需要仔细评估用例。物联网作为一项技术仍在成熟过程中；连接问题时有发生，传感器可能因恶劣天气条件而损坏或故障。它们也可能因电源波动而停止响应，因此你的物联网计划的成功取决于你对市场空白、可用互补技术以及你所要解决的问题的评估有多好。\n\
  \n你需要深入了解你所在行业的宏观趋势和竞争力量。分析师们对于物联网在你行业的应用有何看法？在价值链的哪个环节，客户感到沮丧？哪些额外的数据或事件，如果能够响应，将显著改善客户体验？基于这些数据点，你需要为你的物联网计划制定自己的\
  \ SWOT 分析和商业案例。\n\n#### 评估客户需求\n\n对于任何企业来说，尽可能多地获取客户需求（显性或隐性）的细节至关重要。对于物联网这个尚未被充分探索的新领域，你需要超越典型的客户调查方法，采用更广泛的技术，例如客户画像和客户旅程，来制定一套能被市场广泛接受的产品和服务路线图。\n\
  \n#### 进行价值链分析和盈利能力分析\n\n下一步是对你的行业进行价值链分析和盈利能力分析。与其从狭隘的约束角度看待你的业务，不如从更广阔的行业视角出发。在某些情况下，这可能会导致业务多元化，创造全新的业务线，但这正是获得竞争优势和差异化的关键。\n\
  \n#### 合作共赢\n\n如果你认为并表现得好像自己有能力包办一切，那将是愚蠢的。技术正在飞速发展，客户需求日新月异，市场趋势影响深远。了解你所在市场的解决方案提供商，并监控他们的进展和挑战，这一点非常重要。这张“地图”将为你提供足够的清晰度，以便在能够以更低成本更快进入市场的情况下进行合作与结盟。\n\
  \n\n\n#### 评估技术并进行适配差距分析\n\n市场上存在众多供应商和解决方案。有些方案范围非常狭窄但能出色地完成特定任务，有些则范围广泛，为尝试新事物提供了更大的灵活性。理解所有这些方案，并根据你的具体目标制定适配差距分析至关重要。如果你的组织在联网设备领域是新手，那么你的成功很大程度上取决于你能否快速启动试点项目并为业务功能建立投资回报率。\n\
  \n`IoT`、`AI` 和云技术是快速演进的技术，因此你的技术架构需要具备灵活性和组件化特性。在整体架构中，某些组件今天可能成熟度较低，但明天它们将达到足够的成熟度，或者某些组件可能会完全过时。因此，密切关注技术趋势至关重要，包括它们演进的速度、有哪些互补技术正在发挥作用，以及它们的成本效益如何。\n\
  \n我们列出了一些你需要重点关注的关键领域，以制定一个涵盖数据、分析、建议、性能和整体成本效益的稳健技术路线图。\n\n例如，在“洞察”方面，回答以下问题很重要：\n\
  \n-   哪些数据能让你清晰了解产品使用情况和性能追踪？\n-   哪些数据对你的业务功能有价值？\n-   哪些数据能丰富客户体验？\n-   你需要收集哪些额外数据来提供这些洞察？\n\
  \n分析方面的问题可能包括：\n\n-   如果将哪些洞察嵌入到你的产品/服务/流程中，会使你的公司对客户或市场情况反应更迅速？\n-   “数学”运算会有多复杂？你是否需要购买专门的软件包，例如优化库或深度学习库？\n\
  -   你将如何管理和维护这些洞察？\n\n性能方面的问题可能包括：\n\n-   数据处理性能标准是什么？\n-   不在边缘进行数据处理（相对于将所有数据迁移到云端）的后果是什么？如果答案是上云，你会不会丢失一些关键操作？\n\
  -   你希望你的服务达到怎样的实时性？\n\n运营需求方面的问题可能包括：\n\n-   你将重点关注哪些运行条件（温度、湿度、压力、访问权限和振动）？\n\
  -   你将针对哪些不同场景启用安全性和访问控制？其余部分则留给客户的具体要求。\n\n在制定技术路线图时，你需要保持务实的态度。仅仅创建一个智能解决方案并不能带来成功，尤其是当构建该解决方案的成本超过了其商业和实施的便利性时。\n\
  \n#### 构建你的智能物联路线图\n\n一旦你完成了上述所有活动，你就拥有了开发智能物联路线图所需的所有理想组件（见图 7-5）。该路线图将帮助你进行规划，并向公司内部利益相关者、合作伙伴和员工传达时间表、计划、试点项目、变更和预期成果。\n\
  \n![../images/467925_1_En_7_Chapter/467925_1_En_7_Fig5_HTML.png](img/467925_1_En_7_Fig5_HTML.png)\n\
  \n图 7-5 多层智能物联架构\n\n制定路线图的最佳方法之一是采用亚马逊的飞轮战略。从一个宏大的愿景开始，但不必是一个资本密集且复杂的豪赌。你需要从小处着手，专注于易于实验的试点项目来检验你的想法。这可以进一步演变为创建最小可行产品，以便尽早推向市场并获得先发优势，或者你可以识别出愿意与你以利润分享模式进行共同创新的客户。\n\
  \n有三种方法可以帮助你向业务利益相关者、员工和客户清晰地阐述你的路线图：\n\n-   **未来的新闻稿**：以终为始，为你的产品或服务撰写一份新闻稿。由于这将是面向市场的公告，你将被迫阐述你产品的独特性，这反过来将有助于巩固你的愿景。\n\
  -   **为你的计划准备一份常见问题解答**：提出你可能面临的市场、投资者、员工、业务利益相关者和合作伙伴的潜在问题。与需要人们自己摸索的黑箱相比，常见问题解答及其对应的答案将帮助你以更容易被接受的方式推广你的产品。\n\
  -   **用户手册**：成功的公司信奉众包模式，即用户可以利用你的产品创造越来越多的实用工具。这有助于在更短的时间内显著提升市场份额。为最终用户开发用户手册、DIY\
  \ 视频、`API` 和教程，以帮助他们构建智能应用。\n\n## 结论\n\n像 `AI`、`IoT` 和云这样的新技术的进步，对工业制造领域的大量从业人员意味着什么？\n\
  \n`AI`、`IoT`、云以及其他新兴的第四次工业革命技术将会持续存在。它们正在永久性地改变事物的设计、制造和交付方式。这些技术正在使整个制造生命周期（采购、制造、销售和服务）中的一切变得智能化，同时也带来了管理智能设备、智能代理以及在某些情况下完全自主流程的额外复杂性。\n\
  \n关键问题是，管理人员、技术人员、机器操作员和工厂车间工人的角色会发生巨大变化吗？如果是这样，公司需要找到方法来监控和跟踪活动，在这些活动中，越来越多的人机协作将成为执行项目的常态。\n\
  \n在本章中，我们讨论了通过结合 `IoT` 和 `AI` 的能力来改善我们生活方式以及变革工业领域的可能性。在下一章中，我们将讨论 `AI` 如何改进和变革\
  \ IT 运营。\n\n\n\n"
- '# 8. IT 运维与人工智能


  每家企业都在向数字化企业转型，因此持续推动着将所有业务上云、以数据为驱动、将 AI 嵌入每个流程，并以极致的敏捷模式开展所有工作。虽然这些举措都很好，甚至可能是成为数字化企业所必需的复杂性，但与此同时，数字化也意味着要始终处于开发与运维活动的持续博弈之中。这让人联想到热力学第二定律：除非从外部向系统注入能量，否则熵会随时间增加。


  让我们进一步探讨这个类比，看看人工智能如何在 IT 运维领域发挥关键作用。


  IT 运维领域——尤其是生产运行、维护和保养活动——始终在与熵（即无序状态）作斗争。IT 运维人员花费大量时间和精力来维持一切正常运行，并始终承受着越来越大的压力，需要预测何时会出现问题，并准备好修复方案和冗长的根本原因分析文档。


  相比之下，开发活动实际上*增加*了熵的水平。每一个投入生产的新应用、每一次底层操作系统的新版本发布及相关升级、每一项向用户引入的新技术，都是必须做出的变更，这增加了运维团队竭力防止的无序状态发生的概率。


  虽然开发世界的快节奏不可避免，但如果变更得不到管理，最终将导致某些环节崩溃，除非人们持续投入精力来防止这些故障。这些相互冲突的目标如果走向极端，可能会在企业内部滚雪球般演变成不健康的局面，运维部门积极抵制变更，而开发部门则积极推动变更。


  我们需要什么？一个灵活、整体的框架，包含一套诊断和预测工具、自动化以及人机协同能力，使运维团队能够拥抱变化。这个灵活的整体框架被称为 `AIOps`，这是 Gartner
  研究公司创造的一个术语，用于描述一种基于 AI 技术实现的自动化分析来增强人类技能的 IT 运维新方式。


  `AIOps` 这个术语本身既不是一种解决方案，也不是一种理念，而是一个总体框架，用于解决如何应对日益增长的性能需求和管理 IT 复杂性。这涉及到开发新的强大技术，这些技术有潜力从根本上改变
  IT 运维乃至整个数字化企业。


  Gartner 提出了大量需要集成和管理的能力：


  *   历史数据管理，包括结构化数据和非结构化数据

  *   流式数据管理，包括多设备访问和使用

  *   主要从系统和网络生成的日志数据管理

  *   自动化模式发现与预测

  *   根本原因分析及作为热修复的脚本

  *   软件即服务，主要是基于云的解决方案以及以一对多模式消费的相关数据服务


  当今的 IT 环境过于复杂，任何个人甚至单个团队都无法独自管理；相反，所需的技能包含多个专业领域（全栈工程师）。相应地，每个专业领域都需要其特定的工具来监控、指导、建议、修复，并使
  IT 运维人员能够有效承担责任。在某个节点上，将这些局部视图组合起来以获得对环境中实际发生情况的整体理解，会变得非常困难和混乱。


  由于现代 IT 环境的规模和细微差别（混合云环境和一切即服务类型的格局）以及企业所需的变更速度日益加快，旧式的基于规则和逐级上报的方法（L1-L2-L3）已变得不可持续且脆弱，需要付出更多努力和细心。特别是当基础设施为了响应不断变化的条件和需求而变得更加自我修改（基础设施即代码）时，IT
  运维需要加速才能跟上步伐。


  每一项新技术的出现，都需要理解其表象背后的“为什么”，以便做出更好的决策。




  ## 为什么你的企业需要 AIOps？


  数字化转型围绕四个主要领域展开，不同组织在这些领域可能采取不同的实施策略：


  -   从硬件到应用再到业务交易（影响收入、成本或客户满意度）

  -   从传统技术到新型微服务转型（影响 IT 双速能力和 IT 系统的响应能力）

  -   针对现场（物）、本地和云端的基础设施整合与现代化（影响稳健性、可扩展性和性能）

  -   上述所有变更的不同时间间隔（影响上市准备度）


  显而易见，数字化转型需要提高云采用率，并准备好应对快速开发和部署生产的能力。然而，当你加入诸如对持续创新和持续开发（`CICD`）的需求、日益增多的机器代理采用、物联网（`IoT`）设备、应用程序接口（`API`）等基本复杂性时，你的
  IT 运维范围将面临太多未知因素。这给传统的服务管理最佳实践、团队能力以及技能和工具带来了巨大压力，甚至使其达到崩溃点。参见图 8-1。


  ![../images/467925_1_En_8_Chapter/467925_1_En_8_Fig1_HTML.png](img/467925_1_En_8_Fig1_HTML.png)


  图 8-1 IT 系统拓扑


  以下我们列出了当前服务管理设置中存在的一些关键痛点：


  -   **IT 运维自动化程度极低**：现代 IT 系统环境包括托管云、混合云、第三方服务、SaaS 应用、移动应用、API、众包应用、物联网设备等。简而言之，IT
  环境本质上是复杂、动态且具有弹性的。通过人工监控来管理 IT 环境的传统方法已不再可行。由于系统、应用和数据的接触点过多且访问渠道多样，我们需要一种高度自动化的方式来跟踪、监控和解决问题。


  -   **系统过多，数据量过大**：IT 系统环境不再局限于大型单体技术栈；有太多专门的应用和系统来解决特定的企业需求。结果呢？事件和告警数量呈指数级增长，服务工单量也随之增加。要同时理解所有这些应用产生的数据并满足服务等级协议（SLA），已经变得过于复杂。由于系统、应用和数据的接触点过多且访问渠道多样，我们需要一种高度自动化的方式来跟踪、监控和解决问题。


  -   **需要对事件进行近乎实时的响应**：数字化在企业 IT 系统中造成了鸿沟。面向客户的前端系统运行速度比后端以流程为中心的关键任务系统更快。在许多组织中，IT
  在赋能业务方面的作用如此显著，以至于 IT 本身已成为业务。随之而来的是，技术的“消费化”极大地改变了用户期望，以至于企业现在必须比以往任何时候都更快地响应 IT
  事件。无论是应对真实情况还是感知到的情况，响应都需要几乎即时完成。


  -   **计算基础设施向云端或边缘迁移**：云化从根本上颠覆了 IT 职能、预算和控制的存在方式。越来越多的计算基础设施需求现在基于按使用付费的原则。虽然从成本管理的角度来看，这一趋势是好的，但它给
  IT 团队管理混合环境（部分应用在云端，部分在本地）带来了额外压力。


  -   **敏捷开发方法与运维责任相冲突**：DevOps 和敏捷方法论使企业能够快速实验、原型设计和部署应用到生产环境。然而，管理、监控和维护这些应用的责任仍然落在
  IT 运维团队身上。由于缺乏对这些新技术的了解，IT 运维团队始终处于追赶状态。


  -   **误报告警过多**：在数字世界中，由于业务性质和众多的客户接触点，业务应用和 IT 系统始终承受着日益增长的用户活动压力。几乎不允许有任何停机时间。这种高使用率需求相应地导致了更多关于响应时间、可访问性、可用性和可扩展性的误报。IT
  运维团队面临着分析日益增多的单个工单并定位根本原因的挑战。他们必须处理多个监控解决方案以及针对同一问题的多个相关告警，这还可能引发事件风暴，占用大量资源，而实际上只需一个通知和一个事件工单就更为实用。


  此外，一旦确定了根本原因，IT 运维团队需要经历一个繁琐的故障分类流程，根据先前关于由谁修复问题的指南，将问题分派给正确的团队；这方面尤其麻烦，因为 IT 环境不再由少数几个大型单体应用组成。相反，当今的
  IT 环境涉及多样化的基础设施（本地和云端）应用、不同的 SLA 期望以及多个供应商（其中一些是开源的）。


  那么，AIOps 如何能够以智能、集成和自动化的方式帮助解决这类问题呢？


  ### AIOps 平台的构成要素


  IT 运维人员被工单、严格的 SLA 以及他们需要分析以找出根本原因的众多数据点所淹没。他们发现传统的 IT 运维管理技术已无法胜任这项任务，并且不知道从何入手。他们期望
  AIOps 系统能解决所有问题。对 AIOps 的两个关键期望是自动化和预测。




  #### 自动化


  让 IT 运维专业人员能够将他们当前手动执行的工作自动化。通过自动化，他们可以加快问题识别和解决的速度，从而在给定时间或资源下解决更多问题。


  算法可以自动化分析和关联事件数据的过程，如果手动执行，这需要数小时。利用能够去重、过滤无关数据并实时关联事件源的复杂算法，数百万个事件可以自动缩减为数十个事件。


  为了进一步阐述自动化方面，让我们考虑几个例子：将客户档案信息与金融处理应用程序和交易数据进行关联，以识别异常值并突出影响性能的因素；评估服务工单中的非结构化数据，以识别潜在的自动化问题；对工作负载进行分类以优化基础设施部署；以及将事件与变更、工作日志和应用开发活动相关联，以衡量基础设施和应用变更对生产的影响。


  所有这些任务有什么共同点？要高效执行这些任务，关键需求是推理能力和上下文知识。IT 运维人员需要关联多个数据源以识别异常值、确定因果关系，并参考系统日志来揭示根本原因。简而言之，期望是系统能接管这些手动调查任务，尽可能多地突出可能性，然后领域专家（SME）可以运用必要的领域知识进行推理并确定下一步最佳行动。


  这种级别的自动化意味着可以即时检测到事件，无需人工手动连接各种工具和应用孤岛之间的信息。例如，AIOps 平台可以整理过去观察到的每一个事件，并捕获所有隐性知识，包括为解决该事件而执行的脚本。如果将来发生类似事件，可以使用算法自动参考知识库并复用之前处理该事件的方法。AIOps
  的作用是通过自动化 IT 运维人员执行的手动任务，来提高他们的生产力、响应能力和工作效率。


  #### 预测


  通过分析过去的事件和当前的事件流，系统应该能够预测几件事：a) 确定问题的严重性，b) 将其归类为某种类型的问题，例如基础设施相关、应用相关、用户管理或访问相关等。


  换句话说，期望是存在某种智能系统，它能持续处理数据，通过学习什么是正常行为、什么是异常行为，来发出适当的通知，提供修复建议，并突出显示这些建议的置信度水平。如果智能系统达到了显著的置信度水平，那么自主执行修复可能是明智之举。


  牢记这两个主要期望，我们来讨论开发 AIOps 平台所需的能力：


  - **集成广泛且多样化的 IT 数据源的能力**：平台应能打破当前孤立的工具和 IT 学科，集成与事件、指标、日志、作业数据、工单、监控等相关的数据，覆盖整个基础设施、应用和最终业务交易栈。目标应是创建一个端到端的拓扑结构。

  - **聚合并提供全局视图的能力**：平台应能聚合历史数据以进行趋势分析和学习，同时捕获流式实时事件。

  - **进行计算和执行高级分析的能力**：平台应能计算并运用复杂的机器学习算法，包括自然语言处理（NLP）能力，以消除噪音、识别模式、隔离可能原因、暴露潜在问题，并完成其他调查和预测导向的任务。平台还应具备实时模拟不同场景的能力，使
  IT 运维专家能够进行“假设”分析并加快分类过程。

  - **全栈可见性/可视化数据中复杂模式的能力**：平台应能可视化海量多样化数据中的各种相互依赖关系和关联。这有助于 IT 运维人员快速分析和理解系统间的相互依赖关系。

  - **自动化任务的能力**：平台应能利用机器学习产生的结果来自动化任务，以修复问题。


  现在让我们探讨 AIOps 系统将如何解决常见的 IT 运维任务。


  **预测**：


  - **任务**：确定先前定义的阈值何时会触发断路器，并执行“假设”分析以查找根本原因。

  - **数据**：系统日志数据、应用性能数据、用户并发及使用模式、事件。

  - **算法**：线性回归、变化检测、季节性分解和 Box-Jenkins 方法。

  - **机器学习**：主要为监督学习；系统已基于历史数据进行训练。

  - **可视化**：图分析器，帮助快速发现依赖关系和联系。

  - **行动示例**：为应对潜在的宕机，计划及时预配资源。


  **可能原因分析**：


  - **任务**：关联多样化的数据点，自动识别少量潜在原因。

  - **数据**：系统日志数据、应用性能数据、用户并发及使用模式、事件，以及包含根本原因和相应修复方案的知识库。

  - **算法**：皮尔逊相关系数或其他合适的线性相关算法。

  - **机器学习**：利用历史数据和知识库的无监督学习方法，无需任何预先训练或特定目标。

  - **可视化**：带有具体行动、相应置信度分数、决策树等的建议。

  - **行动示例**：将注意力和资源转向应对正确的原因。


  **聚类**：


  - **任务**：发现词对组合的相似性和频率分布，以根据严重性和根本原因对各类问题进行归类。

  - **数据**：系统日志数据、应用性能数据、用户并发及使用模式、事件，以及包含根本原因和相应修复方案的知识库。

  - **算法**：用于主题建模的莱文斯坦距离和潜在狄利克雷分配（LDA）。

  - **机器学习**：无监督学习。

  - **可视化**：层次聚类和自组织映射。

  - **行动示例**：识别新问题与旧问题的相似性，并将其转给合适的专家或自动响应。


  **持续改进**：


  - **任务**：通过持续监控每日、每周和每月的运行行为，确定运维指标和系统性能的未来趋势。

  - **数据**：系统日志数据、应用性能数据、用户并发及使用模式、事件，以及包含根本原因、相应修复方案以及因采用新技术而产生的影响的知识库。

  - **算法**：贝叶斯信念网络和随机非确定性算法。

  - **机器学习**：主要为无监督方法和深度学习，以持续从数据中学习。

  - **可视化**：带有具体行动、相应置信度分数、决策树等的建议。

  - **行动示例**：计划预配资源以避免宕机。




  ## 你的 AIOps 策略是什么？


  IT 运维始终需要确保 IT 性能管理中的稳定性和可用性。这导致了对机器学习（`ML`）等前沿技术的谨慎采用。通常，供应商会通过针对特定用例的工具来实现这些技术。


  大多数 IT 部门都未能制定出全面的、企业级的分析和机器学习策略。在工具、知识和专业技能方面面临的挑战过于艰巨，而且还有太多其他更紧迫的需求。在数字化转型中，IT
  即业务。IT 需要平衡性能管理的传统需求与创新业务的需求。为此，IT 必须打通 IT 与业务数据孤岛，并利用机器辅助来管理不断变化的客户需求和技术变革。


  移动性、客户期望的“消费化”、弹性云基础设施、快速变化的应用程序技术以及持续交付，都对 IT 提出了新的要求，而这些要求无法用旧方法满足。大数据已经足够成熟和商品化，能够支持所需的海量且不断增长的实时数据处理。API
  和开放数据平台的普遍采用，使得过去被封锁在工具和数据库中的关键信息得以共享。机器学习在我们的技术和文化中已经成熟且无处不在。


  Gartner 估计，到 2020 年，50% 的企业将积极使用 AIOps 平台来洞察业务执行和 IT 运维。IT 不一定需要改变他们所做的工作；他们只需要在更广泛、更复杂的生态系统中，以更少的人工干预，更快地完成这些工作。


  以下部分讨论了我们推荐的策略。


  ### 建立工具和流程以实现系统拓扑的自组织


  随着运维各个领域随时间推移发生变化，部署能够持续监控和发现整个 IT 系统拓扑及其关系，并保持集成拓扑视图更新的工具至关重要。这种依赖关系视图和知识是加快发现速度、加快根本原因分析以及更好地评估
  IT 系统格局中热点/瓶颈的关键。


  ### 建立实时数据探索与报告


  服务台工单工具通常为管理层和高管提供报告功能。大多数实现都附带一组开箱即用的标准报告，允许管理员构建新的自定义报告，并且允许个别报告用户更改视图和参数以满足其需求。现在，大多数工具还提供调度功能，以及从报告查询中生成可共享演示文稿的能力。如果你的组织有纪律进行定期评审，每个人都将报告带到会议上，并且你可以花时间进行关联、核实、审查、讨论，并带着可衡量的行动计划离开，那么这就足够了。如果你的业务、市场和竞争需求不允许你这样使用时间和资源，那么它的效用就会大大降低。更好的方法是，将所有必要的数据放在一个易于使用的探索工具中，该工具可供组织中的每个人使用，并实时更新。这允许所有利益相关者查看顶层（高管）视图，并动态地共同调查有趣的趋势、异常或问题，而无需整理报告或运行新报告。


  ### 利用自然语言处理（NLP）消除人工分类


  报告和事件管理依赖于分类这一基本组织原则。每个工单都根据来源、流程等分配了结构化属性。路由、所有权以及最终的报告都依赖于用户、系统或分类人员分配的类别，这些类别通常反映了“描述”或“问题”等自由文本字段中的内容。


  在 IT 领域，这种分类模型存在缺陷是一个众所周知但很少讨论的事实。用户没有耐心、纪律或知识来准确地自行分配分类和优先级。分类代表了由内而外的业务视角：IT 认为重要的是处理问题，而不是用户认为重要的是如何描述问题。IT
  部门会一次性构建类别层次结构，并随着时间的推移对其进行迭代，而不会进行合理化或精简选项。任何足够成熟的 IT 部门都会有成百上千种可能的分类，其中包含过于宽泛、过于狭窄、无意义或不相关的条目。顶层类别永远是“其他”。此外，无论是用户还是系统分配的静态分类，都无法捕捉到新出现的情况。因此，使用分类进行报告或智能路由实际上是不可能的。最常用的补救措施是简单的蛮力重新分类：员工或承包商资源阅读工单描述以纠正或添加分类。这既不必要地昂贵、不一致且效率低下。


  解决这个问题的现代分析方法将使用由机器学习支持的自然语言处理（`NLP`）来处理工单的自由文本。可以应用分类，但更有效的方法是完全绕过分类，根据环境中实际发生的情况，动态更新和更改问题聚类。自然语言处理无处不在。从移动设备上的预测输入和文字处理程序中的语法检查等简单应用，到
  Google 搜索中的自动更正和去重或 Taleo 中的简历处理等复杂实现，都是其应用。聊天机器人作为人工智能的下一个“日常”实现，依赖于 `NLP` 才能工作。`NLP`
  需要成为每个 IT 工单和事件管理策略的支柱。


  ### 在企业范围内实施机器学习


  机器学习（`ML`）是一种人工智能（`AI`），它赋予计算机无需明确编程即可学习的能力。换句话说，`ML` 是计算机系统无需直接人工干预即可从数据和计算结果中学习的能力。这样理解的话，`ML`
  并不是要创造或生成全新的东西。它是在领域知识和实践的基础上，在该背景下实现自动适应。在 IT 领域，我们希望使用 `ML` 来模仿我们最优秀的领域从业者所做的事情，但速度更快、更一致，同时将这些从业者解放出来从事更高价值的工作。以上一策略中的
  `NLP` 为例。如果我们在自由文本字段的 `NLP` 处理上使用机器学习，我们不会期望系统在没有语言词典和语法，也没有可忽略单词列表（例如“或”、“的”等）的情况下进行学习。通过编程输入这些信息，系统就可以开始从数据中学习哪些单词出现最频繁以及以何种组合出现，同一事物的不同变体如何表达，甚至通过上下文来确定单词何时拼写错误。


  这些都是人类可以做到的事情。在 IT 环境中实施 `ML` 应以自动化涉及学习的人类任务为目标。这些任务通常是具体且集中的：监控活动并发出警报/通知、分类、路由、可能原因调查、容量建模和预测等。鉴于当前的技术和
  IT 领域知识水平，实施 `ML` 来接管这些任务是可行的。这样做将释放你的人力资本，用于其他增值活动。




  ### 打通数据孤岛与学科壁垒，解锁隐藏洞察


  此前，我们探讨了从静态报表转向动态数据探索的优势。能够纳入的数据量越大、种类越丰富，发现与分析的过程就越强大且富有意义。关键在于不仅要打通 IT 数据孤岛（服务管理与运维），还要将
  IT 数据与业务数据融合起来。


  这种方法的基础是在事件管理与 IT 运维之间建立集成协作关系。运维部门在弥合性能管理工具之间的鸿沟时面临自身挑战，但将服务工单中捕获的真实用户体验与性能指标及事件相连接的需求不容忽视。


  随着工单量与复杂度的增加，IT 部门可用的两个杠杆是：a) 加快响应速度，或 b) 从源头预防问题。传统策略、分析工具通常聚焦于前者。这虽必要，但仍属被动应对。少数
  IT 部门拥有有效的问题管理实践。由于缺乏人员、专业能力、资源或洞察力，加之不同激励机制的部门孤岛加剧了问题，使得稳健的问题管理十分罕见。参见图 8-2。


  ![../images/467925_1_En_8_Chapter/467925_1_En_8_Fig2_HTML.png](img/467925_1_En_8_Fig2_HTML.png)


  **图 8-2** AIOps 实施方法示意路线图


  所讨论的策略将有助于建立共识与协作，从而显著提升组织应对问题的能力。然而，这仍不足以应对数字化转型的规模、速度与不可预测性。IT 部门必须利用这些策略，主动参与问题的识别与修复。机器学习与跨支柱分析将揭示引发事件的根本问题，为组织开展预防性自动化与流程改进创造空间。这必须成为任何事件管理分析计划的一部分。


  ## 结论


  要让企业跟上数字化转型的步伐，没有快速简单的解决方案，更遑论取得成功。由于核心业务期望 IT 运维团队仅支持业务——不多也不少——IT 运维一直是一项保守的工作。然而，如果企业要进行数字化转型，IT
  团队也必须转型。


  IT 运维团队必须更深入地了解自身环境、新技术及其影响。学习型思维将鼓励 IT 运维专业人员从单纯的“支持”任务转向敏捷参与者。自动化与机器辅助的数据采集与解读能力是
  AIOps 的基础能力，其成果远超 IT 运维团队单打独斗所能达到的水平。


  随着最终用户对更快、更可靠用户体验的需求，应用与服务环境正在融合。IT 运维人员应将自身角色视为业务的促进者，而 AIOps 则成为支持高效运维新方法的宝贵平台。


  所有形式的 AI 与分析都需要一致、统一且质量有保障的数据集。数据要变得有用，必须跨越系统与应用孤岛，整合来自网络各处的多种数据源。否则，收集的数据将无法代表网络状况，由此产生的分析、建议与行动也将不完整。AIOps
  的有效性高度依赖于数据的质量与完整性。如果系统与网络数据被孤立存放，或使用多种工具收集数据，这将是一项艰巨的任务，会限制协作、阻碍沟通，并拖慢 IT 运维团队的响应速度。


  在本章中，我们讨论了创新需求与支持需求之间存在的冲突，以及 AI 如何将传统 IT 运维方法转变为高度响应且集成的 AIOps。在下一章中，我们将探讨一个有趣的概念——算法公司与去中心化自治组织（DAO）。


  '
- '# 9. 去中心化自治组织 = 区块链 + AI + 物联网


  区块链、AI 与物联网都是颠覆性技术：区块链在开放数据环境中推动去中心化应用，AI 通过集中式数据与分析平台提供智能，物联网则通过集中式云存储与处理服务实现设备/机器的互联。


  在前几章中，我们讨论了 AI 及其影响，以及 AI 与物联网、RPA 和 IT 运维结合时可能产生的爆炸性价值。在本章中，我们将探讨 AI 在高度去中心化环境中的另一个方面，以及它如何与区块链技术和物联网结合，产生深远且放大的成果。


  首先，让我们快速了解一下区块链。




  ## 面向管理者的区块链入门指南


  我们见证了两波浪潮：最初稀缺且昂贵的资源变得廉价，随后涌现出利用这些资源的技术。当计算能力（晶体管）变得廉价时，个人电脑（PC）应运而生；当带宽变得廉价时，互联网随之兴起。同样，区块链是第三波浪潮，廉价的存储使我们能够创建一种分布式（用于记录所有权的分布式账本）、对所有人开放（且安全）的重要信息记录方式，从而在虚拟世界中引入了一种稳健、透明且可信的资产发行与转移机制。


  区块链（分布式账本）是一种安全、分布式且不可篡改的数据库，由分布式网络中的所有参与者访问，交易数据（基本信息记录在`链上`，附件等则记录在`链下`）在此记录并接受审计。数据存储在称为`区块`的结构中。这些区块通过`哈希`相互连接成一条`链`（每个区块还包含一个`时间戳`，并通过其`哈希`链接到前一个区块）。区块包含一个头部，其中包含元数据信息和内容（实际交易数据）。由于每个区块都与前一个相连，随着参与者和区块数量的增加，未经网络共识而修改区块链中的信息将变得极其困难。


  区块链具有三大主要特征：


  - **去中心化控制**：区块链运行在共享控制框架之上，为参与者提供实现共同目标的通用机制。区块链网络中的任何单一实体都不拥有其他实体所没有的专有权利。这使得各种交易服务的去中心化网络能够顺利形成。在需要让所有人了解最佳实践以整体改进流程、使最终用户受益、并让所有人更容易确保更好的治理和合规性的情况下，这一点极具影响力。


  - **资产交换**：这或许是区块链最重要的特征，因为所有交易都被记录，且没有任何单一实体能完全控制网络中发生的一切。该系统允许价值物品（即具有价值的数据单元，如数字货币、能源单位数据、股票单位数据、地契、教育证书等）进行透明交换。在可信网络中维护关键信息交换变得更加容易，并且与传统机制相比，区块链技术可以彻底改变交易执行方式。更高的可靠性、安全性和透明控制将确保交易在任何情况下都可行，且不违反道德政策。


  - **不可篡改性**：交易一旦被记录，便是永久性的，无法从网络中删除。存在一个永久的数字审计追踪，让网络中的每个人都能看到谁做了什么。这构成了智能合约管理的基础，使得合同义务更容易得到所有相关方的验证。这理想地意味着彻底消除欺诈行为，并对此类网络上进行的所有交易保持监控。任何人或群体都不可能影响整个网络来执行错误交易。无论网络存在多久，所有先前的操作都将可供所有相关成员和利益相关者监控和检查。


  网络中有两种验证交易的方法。


  `工作量证明`要求参与者（称为`矿工`）解决复杂的数学问题才能添加一个区块。当你想要发起一笔交易时，后台会发生以下过程：


  - 交易被捆绑在一起，形成我们所说的区块。

  - 矿工验证每个区块内的交易是否合法。为此，矿工需要解决一个称为工作量证明问题的数学难题。

  - 第一个解决每个区块问题的矿工将获得奖励。

  - 验证后的交易被存储在公共区块链中。


  `权益证明`则试图将更多的挖矿能力分配给拥有更多权益（代币）的参与者。它仍然是一种算法，目的与工作量证明相同，但达成目标的过程却大相径庭。在此系统下，锻造者（PoW
  中矿工的对应角色）根据他们在区块链网络中的权益来构建区块。


  区块链采用两种方法来授予参与者访问网络的权限：


  - **无许可区块链**：任何人都可以加入网络，参与区块验证过程以达成共识，并创建智能合约。比特币和以太坊区块链就是几个例子，任何用户都可以加入网络并开始挖矿。


  - **许可区块链**：只有一组受限的参与者有权验证区块交易。许可区块链还可能限制只有经批准的参与者才能创建智能合约。例如：R3（银行业）、EWF（能源业）和
  B3i（保险业）。


  当我们将物联网和区块链融合到一个强大的统一平台时，会发生什么？




  ### 区块链与物联网（IoT）


  原则上，这一构想极具意义，且通过区块链实现机器之间、机器与人类之间安全可信的通信，具有若干显著优势。物联网的核心在于持续提供机器状态信息，而区块链则是一种加密的分布式交易记录系统。将两者结合，理论上便能获得一种可验证、安全且永久的智能机器数据记录方法。


  区块链与物联网融合能带来哪些实际效益？


  - **解决监管缺失问题**：在互联世界中，多个网络由不同组织和供应商拥有并管理，因此对整个网络发生的事件及时间进行监管至关重要。在这种分布式运营场景下，永久且不可篡改的记录意味着可追溯与可问责。现实中，供应链节点间实体货物的流转便是监管缺失的典型例子。物联网设备持续传输数据，而区块链则记录运输中货物状态的每一次变更，任何获得网络授权的人均可查看。这解决了监管缺失的问题。若发生故障（如破损、盗窃、偷窃等），区块链记录将便于识别薄弱环节并发出警报以采取行动。


  - **建立信任**：加密技术与分布式不可篡改存储的应用，意味着区块链中任何时间点记录的信息都能获得所有相关方（包括机器对机器交互）的信任。区块链网络支持的“智能合约”功能有助于建立协议，并在条件满足时自动执行。例如，在授权机器对机器交互及任务执行时，若条件显示上一步任务已完成，此功能便极为实用。支持物联网的设备可在无需人工干预的情况下安全交互并交换信息。


  - **确保更高安全性**：无论是在工业领域还是消费领域，物联网生成的大量数据都高度敏感且关乎关键任务。这些数据需要与其他机器和服务共享才能发挥价值，但这也意味着数据易受攻击，可能被黑客滥用。而区块链恰好能提供强大的访问控制、加密算法及难以攻破的安全机制。


  当我们将人工智能与区块链融合为单一强大方案时，会发生什么？


  ### 区块链与人工智能


  我们周围的一切都蕴含着人工智能，无论是在谷歌上搜索信息、通过亚马逊购物、通勤上班、播放喜爱的歌单、监测健康状况，还是订购日用品等。我们的决策正受到算法的深刻影响，这些算法旨在满足几乎任何类型的人类特征与需求。


  另一方面，区块链提供了一种无摩擦、可信赖的价值嵌入数据交换方式，从而确保数据安全，并保证其仅用于既定且事先约定的目的——不多不少。


  从宏观层面看，人工智能与区块链可通过多种方式相互补充。


  #### 人工智能需要加密


  得益于记录区块链交易的密码学技术，区块链上的数据高度安全。通过私钥存储高度敏感数据，区块链能确保链上所有数据的安全。


  此外，人工智能算法对数据进行处理（包括在数据仍处于加密状态时的处理过程）的需求也日益迫切，因为数据在流程中任何未加密的阶段都代表着安全风险。


  #### 区块链可助力人工智能实现可解释性


  人工智能算法通过分析大量变量来“学习”海量数据中隐藏的模式，并得出预测。然而，学习过程及算法的复杂性往往令最终用户难以理解——为何算法会给出这样的推荐？算法是如何得出该推荐的？它使用了哪些变量，又舍弃了哪些变量，原因何在？诸如此类的问题层出不穷。


  人工智能在众多领域优势巨大；然而，若其结果无法解释，便无法获得最终用户的信任。区块链技术可帮助人工智能记录整个学习与决策过程，从而为最终用户提供一定程度的透明度与洞察。


  #### 人工智能可提升区块链效率


  由于对加密的高度依赖，区块链需要大量的计算与处理能力。例如，用于在区块链上挖掘区块的哈希算法会尝试所有字符组合，直到找到能验证交易的那一个。若能提供正确的训练数据，先进的机器学习算法便可优化区块链的挖矿算法。


  #### 人工智能可增强区块链可扩展性


  区块链天生具有不可篡改性，这意味着管理日益增长的数据量成为严峻挑战。“区块链剪枝”（移除关于非活跃或已关闭交易的数据）可能是一种解决方案。人工智能算法可通过数据分片技术自动归档，从而提升区块链的效率与可扩展性。


  ## 人工智能与区块链的集成价值主张


  ### 改进的商业数据模型


  虽然现有的人工智能驱动商业模型依赖于组织及其生态系统合作伙伴产生的数据，但在透明数据共享方面存在缺陷。隐私问题、数据滥用及欺诈性合同使得创建完全开放的数据系统变得不可能。为了让人工智能做出最准确的决策，它需要几乎无障碍地获取整个商业生态系统的信息。区块链技术将提供这种无摩擦的信息访问，因为没有任何单一实体能拥有网络所有权，所有利益相关者都更愿意分享信息。


  来自所有关键参与者的数据源可以轻松集成到一个通用的人工智能分析平台。数据的使用方式将在整个交易的区块链账本中定义，因此数据所有者不会面临数据可信度受损或数据价值丧失的情况。


  一旦建立了来自多个利益相关者的不间断数据供应，人工智能系统便可深入挖掘数据，研究模式及其他方面，以揭示前所未有的洞察。随着网络参与者数量的增长，提取更真实洞察的可能性将增加，系统可通过识别最佳实践并为新场景发现最佳解决方案，基于每个利益相关者的反应方式来训练自身，从而更好地应对各种场景。


  ### 发现全新洞察


  借助透明的信息访问，数据孤岛可以更高效地合并，这将帮助人工智能驾驭新的数据组合并发现新模式。利用区块链，更容易消除数据篡改，因此人工智能可用于创建新的真实数据分类器和过滤器，因为可以在去中心化的区块链框架上验证其真实性。


  这在需要进行分析和细分以实现更精准预测客户互动的场景中尤为重要。更多的数据集将允许进行微观细分和超个性化。




  ### 智能预测


  人工智能在基于从各种来源收集的数据帮助我们预测结果方面取得了长足进步。然而，有时由于数据生成系统存在缺陷、数据源被欺诈性篡改，或人工智能系统中采用的分析方法管理松散，此类预测可能在事实上变得不准确。借助区块链，可以轻松验证数据源以及将应用于数据的分析方法，因为它们必须遵守预先确定的合约和最佳实践。这为人工智能系统仅基于真实可靠的数据集工作铺平了道路，从而产生准确的预测。


  更多真实的数据源将确保人工智能系统更高效地挖掘洞察。这些洞察随后将被深度学习算法利用，以得出更符合事实的决策。这将确保为企业更好地预测终端消费者行为，或为优化治理流程更好地预测终端用户行为。


  ### 数据知识产权


  基于人工智能的数据模型总能创造鼓舞人心的成功故事。但此类模型的创建者常常因缺乏保护和版权政策而拒绝共享其数据模型信息。尽管存在版权政策，但数据模型可以被巧妙地伪装，以展示完全不同的架构，即使是原始数据模型的创建者也无法识别。然而，通过整合区块链技术，创建者可以轻松共享其数据模型，而不会失去对其发现的专有权和专利权。一个防篡改的全球注册中心可以通过您的加密数字签名来维护，其中包含您的数据及其相关模型。谁在何时用这些数据做了什么，将始终在公共领域可查，从而使得任何人都几乎不可能声称对您的创作拥有所有权。


  借助集成的人工智能工具，可以分析这些数据模型的趋势和行为，并从中发现强大的洞察。它还能使企业、内容或数据所有者能够主张其自远古以来就应享有的知识产权特权和权利。它为多个领域的专业人士提供了一种有吸引力的方式，将原始数据或内容货币化。


  ### 自治组织


  这几乎是人工智能的梦想场景。一个机器无需人工干预即可执行任务的环境。所需要的是一个全球验证过的工作策略和一套指令，这些指令需要是安全的、防篡改的，并且不由任何单一实体拥有，以便为人工智能系统建立训练和学习环境。有了区块链，这做起来比说起来更容易，在您意识到之前，人工智能系统就可以读取数据、处理数据并运营您的关键业务任务。由于整个系统由驻留在去中心化区块链网络上的智能合约管理，因此失败或产生错误运营结果的可能性微乎其微。网络节点存储整个运营系统的状态、参数、行为、结果等，并允许人工智能系统根据预定的智能策略采取相应行动。


  这种级别的自主运营前所未有；然而，借助基于人工智能的数据安全区块链系统，这种自主运营模式是相当可行的。只有在所有利益相关者的监督下，通过控制节点要求系统偏离时，才会发生与预定行为的偏离。这种安全透明的监控机制确保了事情在任何时候都不会失控，并且人工干预保持在最低限度，或者在理想情况下根本不会有任何干预。


  以下部分讨论了一些人工智能和区块链技术相结合以产生特定行业成果的例子。


  #### 更智能的金融


  人工智能和区块链技术已经在个体层面上对金融服务产生了重大影响。它们的结合将为金融实体开展交易服务带来更具变革性的方式。例如，组建银行联盟以衍生新的服务层、制定防止欺诈性使用和访问客户信息的策略等，都可以通过人工智能和区块链的结合来实现。


  虽然洞察将由人工智能提供，但底层的信任平台将是区块链。银行会为了更伟大的目标自愿贡献其数据和信息，因为没有单一实体拥有整个联盟的所有权。借助这样一个安全且互联的共享生态系统，人工智能系统可以遍历各种人口统计和市场数据，从而发现关于业务增长和更好地服务客户的潜在机会的新洞察。


  #### 智能零售


  用于店内销售的电子商务和数字零售解决方案以前所未有的方式彻底改变了消费者的购物体验。如今，零售组织在技术基础设施方面最大的投资之一就是分析和预测系统。对于现代零售商来说，在消费者实际购买之前了解其购买决策，是创造成功体验和完成结账的独特卖点。


  基于人工智能的系统已经通过更智能的预测能力为零售商带来了更多销售额。然而，仍有一些领域，人工智能需要基于未经验证的数据集来做出决策。来自合作伙伴或供应商的关于产品或组件质量的数据通常是不可验证的。如果您提供了最合适的产品，但最终在质量上出现问题，那么整个零售体验将在那一刻被摧毁，并可能导致客户永远离开您。


  通过集成区块链的系统，可以验证供应商和销售商关于产品质量和规格的声明，因为这些信息随时可供检查和分析。所有利益相关者的责任都增加了，这种集体责任导致只有最好的产品才能上架或在在线商店中展示。凭借更准确的数据，人工智能系统可以发现新的洞察，例如，基于材料真实性（来自主要产地或独特地点）的新定价点，这也为创意营销带来了更多价值。




  #### 省心省力的客户忠诚度计划


  几乎每家企业都有忠诚度计划（作为其客户关系与营销策略的一部分），通过差异化待遇、大幅折扣、优先体验尚未全面上市的产品或服务、优惠券、代金券等方式，奖励其重要客户并鼓励他们保持忠诚。一个好的忠诚度计划不仅关乎奖励重要客户，更是强化客户关系的重要策略。


  然而在现实中，从消费者角度来看，我们被迫参与多个忠诚度计划，每个计划都有各自的奖励机制、复杂的积分体系和繁琐的兑换流程。结果就是消费者未能真正受益，企业也未能获得真正意义上的客户忠诚度。


  区块链或许就是答案。对于在众多忠诚度计划（实体卡或数字钱包）中迷失方向的消费者而言，区块链能提供一个统一的平台，无缝管理每个忠诚度计划的选项，包括限制条件和兑换规则。具体如何实现？


  区块链能够建立一个在参与者（消费者和企业）网络间共享的分布式交易账本。当新交易发生时（如忠诚度积分的发放、兑换或交换），区块链会针对该交易生成一个算法代币。这些代币被分组为区块并分布到整个网络，同时更新每个账本。此外，区块链确保这些区块经过验证并与旧区块链接，从而为所有交易创建安全透明的审计追踪，无需中介机构介入。


  基于区块链的客户忠诚度计划意味着企业能拥有一个强大且值得信赖的合作伙伴网络，在此网络中，企业可以开展协作，在自身核心产品和服务之外提供更多选择，从而突破狭隘的个体忠诚度计划限制，减少客户的麻烦。


  #### 创意护照


  这是针对音乐行业的智能合约。音乐行业的一大痛点在于，词曲作者、制作人和音乐人始终处于盲区——他们不清楚版权如何处理、版税如何计算，也不了解数字产品通常如何管理和分发，以及消费者如何消费他们的数字产品。


  这给生产者和消费者都带来了巨大挑战。


  区块链能够提供一个经过验证、透明且分布式的全球音乐注册系统来管理数字产品的生命周期，从而消除当前创意产业面临的挑战，同时为所有参与音乐创作或互动的人提供无缝体验。例如，收听一首歌的行为会自动触发区块链系统中的一系列事件，涉及这首歌旅程中的每一位参与者——无论是想体验这首歌或与之开展业务的人（个人消费者、像`Spotify`或`iTunes`这样的数字服务提供商、播放这首歌的广播电台，还是使用这首歌的电影制作团队等）。区块链系统还有一个额外优势：存储关于音乐的元数据，类似于一种“创意护照”，这些数据可以随时更新，并对所有人开放。


  #### 透明治理


  每年，世界各国政府在改善社会和公民福利计划上花费数十亿美元。然而，由于腐败、低效的中间层级以及缺乏完善的审计系统，其中相当一部分资金并未到达预期受益人手中。除此之外，大量人力被浪费在数据录入、校对、验证、日志记录等重复且单调的任务上。


  通过引入由人工智能驱动并基于区块链技术构建的智能自动化管理系统，可以在治理机制中实现高度效率和透明度。利用人工智能，可以将人力资源解放出来，用于更重要的活动，同时所有冗余任务都能实现自动化。人工智能系统能够生成大量洞察，以了解各项计划和政策实施的进展，从而消除任何形式的人为干预或篡改，进而避免腐败。


  借助区块链，公民和政府可以建立值得信赖的政策实施和数据交换机制，无需担心故障、腐败或恶意干预。公民可以核实政府支出的声明，并附上证据提出关切。得益于区块链系统中提供的智能审计追踪，政府可以监控所有部门的所有活动。


  #### 全球化验证系统


  如今，全球存在大量需要跨境信息共享和整合视图的验证系统，无论是公民身份与身份验证、移民详细信息，还是信用与财务历史等。这些数据高度敏感，一旦落入不当之手就可能被篡改。然而，为了移民、银行、教育、科研项目等全球系统的顺畅运行，透明地获取信息以验证声明和身份至关重要。


  人工智能系统有助于研究存储在数据中关于人们的深层模式，并预测其信用评分、财务健康状况或身份，这对于安全目的至关重要，例如预防恐怖主义相关犯罪或金融犯罪（如反洗钱等）。


  一个全球性的去中心化犯罪记录、金融欺诈等注册系统，将确保人工智能系统能够基于经过验证的数据进行自我训练，从而得出结论并识别异常值或离群点。基于区块链的全球验证系统有助于弥合全球调查与验证机构之间的差距，从而简化全球验证流程，最终实现更顺畅的跨境往来。


  #### 创新审计与合规系统


  区块链创建了一个用于独立验证声明的去中心化网络，使当局和企业更容易遵守合规与监管要求。区块链网络上的每笔交易都会留下不可篡改且不可逆的数字痕迹。任何机构都可以审计这一痕迹，并用于验证声明的真实性。


  利用人工智能，这些审计数据可用于为客户和公民提供更好的服务，例如关于房地产的准确定价和法律信息、税务计算与税务责任、遵守国家或全球公认的产品和服务质量标准等。随着更多权威数据的出现，人工智能系统能够为最终用户提供不间断且事实准确的信息和服务，其可能性是无限的。


  #### 数据与人工智能货币化


  将收集到的数据（我们的数据）货币化，是`Facebook`和`Google`等大型公司的巨大收入来源。


  我们在网络或使用应用程序时所做的每一件事，都会留下庞大的数据足迹。这些数据被汇总，最终用于向我们进行交叉销售和追加销售。这使得数据变得极其宝贵——比我们这些原始数据生成者意识到的还要宝贵——而我们却免费将其拱手相让。


  区块链实现了微交易，使我们能够拥有、控制并货币化自己的数据。人工智能也是如此。如果我们利用自己的数据开发人工智能算法，就可以将这些算法放在人工智能市场上供他人使用。然后，我们就能根据使用量获得报酬。




  ## 去中心化人工智能的崛起


  直到最近，当代人工智能产业仍基于中心化的开发与使用模式，机器学习解决方案作为云端 AI 平台及相关 API 的一部分被设计、开发和访问。如今，我们正迈向下一前沿——能够在本地设备上运行和训练，或在区块链等去中心化网络中做出决策的去中心化
  AI。


  现有 AI 市场日益被谷歌、IBM 和微软等科技巨头掌控，它们均提供基于云的 AI 解决方案和 API。这种模式使用户对 AI 产品的控制权微乎其微，从长远来看，这种中心化模式可能导致
  AI 市场垄断，进而引发定价不公、缺乏透明度与互操作性，以及小公司参与 AI 创新的机会受限。幸运的是，我们正见证去中心化 AI 市场的兴起，它诞生于区块链、设备端
  AI 与边缘计算/物联网的交汇点。


  向去中心化 AI 的转型得益于新技术，例如谷歌的联邦学习，它允许对机器学习算法进行群体训练；以设备为中心的 AI，可在移动设备上运行和训练机器学习模型；以及在区块链网络的去中心化自治组织（DAO）中应用
  AI。


  ### AI 与去中心化自治组织


  当我们把部分或全部决策责任委托给 AI 代理时，DAO 便应运而生。例如，如果你持有所有权，你可以将你的决策权（如赞成/反对投票）让渡给一个 AI 代理（另一个智能合约），由它代你做出所有决策。或者，在更激进的场景中，我们可以委托
  AI 代理扮演管理者角色，承担所有组织与业务决策。例如，设想一个营销 AI 代理，它能选择最佳广告公司来投放你的广告。每个营销周期结束后，该 AI 代理会自动评估投资回报率并调整营销策略。


  本质上，DAO 将我们带入一个全新的经济现实：AI 代理成为业务管理者，监督业务绩效，并在去中心化网络中持续向其他 AI 代理学习并与之共同进化。`Terra0`是由柏林艺术大学的保罗·赛德勒和保罗·科林提出的项目。其概念涉及增强智能代理管理一片自有森林并从中获利。森林所有权被构建为一个基于以太坊区块链智能合约的
  DAO。随后，AI 代理利用无人机和卫星评估木材储量，决定在市场上出售多少木材以及何时出售。一旦项目启动并运行，DAO 可以向初始所有者偿还债务，最终将森林转变为一个控制自身资源的自主、自有实体。


  得益于针对智能手机的 AI/ML 设备端优化，以及为移动 AI 和桌面设备（如谷歌的 TPU）生产的专用芯片，去中心化 AI 近期取得了进展。


  2017 年 4 月，谷歌宣布其新的联邦学习概念后，去中心化 AI 获得了强劲动力。这一创新标志着向完全去中心化学习和以设备为中心的 AI 的转变，机器学习模型直接在用户智能手机上训练。在保持用户数据隐私完整的前提下，谷歌现在可以将
  AI 训练外包给安卓用户，实现共享模型的设备端改进。联邦学习将解决高延迟、低吞吐量连接的问题——用户过去必须连接到远程服务器才能使用机器学习软件。


  向以设备为中心的 AI 迈进的趋势，也体现在谷歌发布的`TensorFlow Lite`上，这是一个针对智能手机计算和功耗限制进行微调的机器学习库移动版本。2017
  年 6 月，苹果紧随谷歌步伐，发布了适用于 iOS 设备的`Core ML`库。该库附带优化的通用机器学习模型，以及将第三方模型转换为 iOS 格式的工具。无需网络连接即可在本地使用模型，将使开发具有
  AI 功能的移动应用变得更加容易。


  从长远来看，设备端 AI 与去中心化学习的结合将使 AI 比以往任何时候都更加民主和普及，导致越来越多的组织转变为 DAO。


  是什么在加速这一趋势？


  - **区块链上的自主 AI**：DAO 是由自主 AI 代理运营的算法公司。当将这些自主 AI 代理置于以太坊区块链上时，你可以有效管理版税分配、订阅支付、智能合约等事务。


  - **边缘端的去中心化学习**：在设备上，诸如苹果`CoreML`等移动机器学习库提供的 AI 能力，使得复杂的 AI 算法能够在传感器、安防摄像头、无人机或自动驾驶汽车等物联网设备上运行。




  *去中心化智能网络*：基于区块链构建的去中心化网络（例如 `SingularityNET`）允许任何公司或研究人员将其人工智能解决方案货币化，并访问多种人工智能算法。`SingularityNET`
  通过支持不同算法间数据交换与共享的协议，实现了跨人工智能能力，这有助于构建多层级的互联人工智能应用。


  此类应用可以组合多种算法，执行不同的子任务，然后访问网络上交换的训练数据。开发一套综合性的人工智能网络安全解决方案就是这种方法的一个例子。目前，没有单一的软件包能处理所有与安全相关的任务，这意味着公司必须使用各种中心化的人工智能解决方案，并根据自身需求进行定制。开发这样的解决方案也带来了数据安全和领域特定知识的问题。


  同态加密可以使不同数据集对不同类别的用户在不同方面可见，从而解决这个问题。公司还可以整合网络上不同网络安全人工智能代理的专业知识，这些代理将安全地交换安全信息、外包任务，并合作解决共同的安全问题。这种去中心化网络将涉及高效的劳动分工，并提供解决方案的访问权限，而无需手动获取数据和定制算法。


  在以下场景中，去中心化智能相比中心化解决方案具有多项优势：


  - *你需要一个在去中心化环境中运行并履行合同义务的自主人工智能解决方案*：根据定义，中心化的专有解决方案无法暴露给去中心化网络中的众多用户。如果你的目标是运行一个完全自主的人工智能代理，使其能够做出智能管理决策并分配利润，那么区块链上的去中心化人工智能是可行之道。

  - *你需要一个针对设备端性能优化且不依赖网络连接的人工智能*：由于网络连接问题、电池电量限制和计算能力低下，移动设备并非运行基于云的人工智能软件的良好选择。特别是，高延迟和低吞吐量会损害人工智能应用的速度和性能，对用户体验产生不利影响。每当需要在移动设备上运行和训练人工智能时，去中心化网络就成为了更好的选择。

  - *你想在保留所有权的情况下出售你的人工智能算法*：目前没有办法在出售人工智能算法的同时保留其所有权（就像现在在应用商店出售移动应用一样）。为了填补这一空白，去中心化人工智能网络为开发者提供了将其算法作为人工智能即服务进行商业使用的机会。


  同时，如果你需要一个非常通用的机器学习模型，可以轻松地将其插入到你的应用中，那么中心化人工智能仍然是一个不错的选择。谷歌、微软和 IBM 已经开发了市场上最好的通用机器学习模型，这些模型在庞大的数据集上训练，并按照顶级的机器学习标准和前沿的机器学习算法构建。如果你希望在你的应用中拥有经过验证的图像或语音识别功能，重新发明轮子并非明智之举。一个更可行的解决方案是使用按需付费模式提供的基于云的机器学习
  API，这能确保你基于人工智能的解决方案的成本效益和可扩展性。中心化人工智能的主要提供商提供了一套全面的服务，用于图像和视频识别、情感人工智能、语音识别、预测建模以及其他常见的人工智能/机器学习任务。


  从长远来看，去中心化解决方案可以带来人工智能市场的彻底民主化、针对各种用例的解决方案优化、通过单一协议实现不同算法间的轻松集成与通信，以及互操作性标准的发展，这最终将引领我们进入通用人工智能时代。


  ## 结论


  区块链技术与人工智能的结合在很大程度上仍是一个未被充分探索的领域。传统的人工智能方法遵循中心化的开发和部署模式。你拥有一个基于云的人工智能平台，你摄取数据并构建预测模型，然后通过
  API 从各种业务流程或应用中访问这些模型。这种方法存在诸多挑战：延迟、数据安全、网络带宽、性能等。


  现在，想象一个高度去中心化的方法，你的预测模型在区块链等去中心化网络中的本地设备上运行、训练，甚至做出决策。这就是去中心化人工智能！


  去中心化人工智能相比传统人工智能具有显著优势：


  - 最小化延迟（不依赖网络连接）

  - 训练更高效（以去中心化方式完成）

  - 功耗更低（同样，不依赖网络连接）


  人工智能可能具有极大的颠覆性，必须以最谨慎的态度进行设计。区块链可以为此提供巨大帮助。这两种技术将如何融合发展，谁也说不准。


  在本章中，我们触及了几种颠覆性技术（区块链、人工智能、物联网和云），每一种技术本身都极其强大。当它们结合在一起时，可以产生深远的变革性成果。在下一章中，我们将探讨在全球范围内引发巨大争议的伦理与人工智能这一棘手话题。


  '
- '# 10. 伦理与人工智能


  人工智能，尤其是弱人工智能，正开始在我们的生活中占据独特的位置。有虚拟个人助理、智能手机上的众多智能应用、自动驾驶汽车、智能家电、智能建筑、智能家居等等。没有其他技术能像人工智能那样，在如此多的行业和我们生活的方方面面产生如此深远的影响。这正是它如此迷人的原因；它确实令人难以置信，不亚于科幻小说的情节。


  对于一项旨在模仿人类智能的技术，理解人工智能的阴暗面同样重要，并且可能需要在政策层面定义其可为与不可为。如果我们想真正利用人工智能的变革力量，有许多问题需要解决。


  专家预测，在未来 20 年内，人工智能将继续在转变（并在许多情况下消除）大量人类任务方面取得巨大进展。如果这种创新以合乎伦理的方式进行，并以人机协作为目标，我们就可以构建一个人类不与机器竞争的未来。相反，我们将进入一个不需要体力劳动但需要更高情商的新工作时代。


  现在，在智能手机屏幕上轻点一下就能叫到出租车，这或许已成为一种生活方式。想象一下，同样的事情扩展到叫一辆自动驾驶出租车！想象一下，交通管理官员为了管理交通和安全以适应下一波无人驾驶汽车的到来，将不得不经历多少困难。可以肯定的是，交通部门有大量工作要做；他们也必须进行创新。


  这只是一个例子，展示了人工智能的影响是前所未有的。当我们继续使用人工智能进行创新并解决新问题时，我们必须同时关注伦理使用和政策相关的方面，因为这对整个社会都有影响，而不仅仅是少数行业或少数个人。我们必须对技术主导的颠覆性未来采取民主的态度。




  ## 人工智能中的伦理问题


  `AI`在许多方面既无处不在又引人深思。我们需要指导和框架来确保`AI`的合乎道德的使用，而现在是`AI`演进阶段认真考虑其伦理问题的恰当时机。


  内省能力造就了如今的我们。然而，我们似乎正急于将这种能力外包给算法。这种做法会带来严重后果。我们乐于看到自动化如何改善生活质量，却从未坐下来制定一份我们绝不会委托给机器的活动清单。我们甚至没有制定指导原则来明确划分人与机器之间的责任。这些事情至关重要。在缺乏基于价值观的标准和指导方针的情况下，`AI`制造商的偏见将占据主导地位，并决定其使用条款与条件。


  伦理并非是说“不，你不能这样做”。其关键在于追问：你试图实现的目标是什么？你如何在实现这些目标的同时，不侵犯我们所珍视的文化价值观？你可以做完全合法但极不道德的事情。苏格拉底式地不断寻求反对意见的过程并不总是令人愉快，但沉溺于`AI`成就的荣耀而忽视伦理标准，已不再是可接受的态度。


  以下章节列出了在各个论坛引发激烈争论的一系列话题。各方阵营仍存在分歧。


  ### 失业


  当所有体力工作都被`AI`辅助的机器取代时，会发生什么？


  社会地位以及随之而来的劳动分工等文化层面，都受到自动化程度的影响。在前工业时代，一个人从事体力劳动的能力决定了其收入。我们逐渐进化，发明了自动化工作的方法，并非完全消除体力劳动，而是用机器增强人类技能，从而以更少的投入获得更多的产出。结果如何？像机器操作员这样的新职业应运而生，技能导向也慢慢从体力劳动转向认知劳动，越来越强调与判断相关的技能。


  例如，卡车运输业目前在全球雇佣了数百万人。如果自动驾驶卡车在未来几年成为现实，卡车司机的工作将会怎样？一方面，自动驾驶卡车可能降低事故风险，不会出现疲劳迹象，始终以可预测的方式行驶，降低运营成本，并带来显著的效率提升。因此，自动驾驶卡车似乎是一个合乎伦理的选择。同样的情况也可能发生在其他行业和领域的大部分劳动力身上。


  我们面临的伦理问题是：当越来越多的工作被自动化后，我们该如何利用手中所有的时间？我们当前的雇佣合同基于一个基本因素——我们出售自己的时间来赚取足以维持自己和家人生计的收入。因此，如果基于时间的薪酬前景消失，我们就需要寻找新的赚钱方式。


  ### 不平等


  我们该如何回报机器？


  我们当前大部分的薪酬框架都基于时薪。虽然也有一些显著的变化引入了风险与回报机制，但总的来说，我们的服务总是等同于每小时的价格。如果`AI`将以极低的成本完成我们大部分的工作，公司自然会倾向于一种新的劳动力组合（越来越多的`AI`代理和越来越少的人类员工）。这意味着更少的人会获得报酬。然而，公司所有者和其他投资者将拿走所赚取收入的大部分份额。


  如果你还没注意到，这种情况已经发生，并且正在造成日益扩大的财富差距。那些商业模式围绕这种算法经济运转的公司，雇佣的员工越来越少，并将他们创造的经济盈余在劳动力之间进行分配。


  我们面临的伦理问题是：如果我们真的在走向一个无体力劳动的社会，我们该如何为这个由更少人类和更多机器组成的劳动力群体构建一个公平的薪酬机制？


  ### 人性


  机器将如何影响人类行为？


  一方面，我们享受着让机器替我们思考和行动的事实。另一方面，我们确实在改变人类的行为。以下是一些说明我们如何受到影响的例子：


  *   网站的设计会考虑到能吸引个人喜好的最细微的细节。

  *   推荐引擎通过提示“和您类似的人也购买了这些其他商品”来向我们推送额外产品。

  *   当你开车经过一个大型购物中心时，你的手机会震动，收到一个专属于你的折扣信息。

  *   你智能手机上的智能应用会建议走哪条路线能更快到达目的地。


  在正确的时间通过正确的渠道获取正确的信息固然很好，但其副作用是我们已经不再主动思考任何事情了。


  我们面临的伦理问题是：首先，通过允许`AI`代理替我们思考和行动，我们是否正在走向一个对周围环境越来越无知的世界？其次，如果`AI`代理在模拟人类行为方面变得越来越出色，那么这些`AI`代理是否有可能被用来引导人类的注意力，并触发某些对人类自身生存有害的行为？


  ### 人工愚蠢


  我们如何确保机器不会产生偏见？


  人类通过从环境中学习来发展认知能力；机器也经历类似的学习阶段来获取智能。如果人类暴露在不良环境中，就会学到坏的东西；如果数据不完整或被故意扭曲，机器学习也会面临类似的风险。


  机器需要持续学习，并需要接触广泛的数据集，才能准备好应对现实世界中的情况。如果我们希望机器应对现实世界的挑战，仅仅依赖基于现有数据精心策划的训练数据集是不够的。


  人类并非总是公平和中立的。机器也可能表现出类似的不公平和非理性行为。`AI`系统是由人类创造的，因此人类极有可能将他们自身的判断偏见引入他们所构建的机器中。偏见也可以通过多种方式渗透到机器行为中——数据偏见和设计偏见是最突出的两种。


  我们面临的伦理挑战是：如果我们的未来将完全依赖于`AI`系统，我们需要确保机器按预期运行，并且不带偏见。


  ### 安全


  我们如何保护`AI`免受恶意意图的侵害？


  一项技术越强大，被用于恶意目的的可能性就越大。自主系统需要承担更大的责任来确保其安全性，而且我们担心的不仅仅是敌对者。如果`AI`代理过于专注于实现其目标，以至于推荐并实施可能给我们带来灾难性后果的事情，那该怎么办？例如，如果一个`AI`系统的目标是找到治疗癌症的方法，在仔细考虑了无数诊断结果、根本原因、治疗方案和药物有效性之后，它意识到解决癌症问题最有效、最好的方法是杀死地球上的所有人？从机器的角度来看，它找到了解决方案。从人类的角度来看，这是灾难性的。


  我们面临的伦理问题是：在我们开始将`AI`系统应用于生活的各个领域，并像我们希望的那样无处不在之前，我们如何确保有足够的制衡机制到位？




  ## 奇点


  我们该如何管理超级人工智能系统？


  人类的进化几乎完全归功于我们的智慧以及适应不断变化的环境的能力。然而，在我们热衷于发明越来越多超级人工智能系统时，可能会陷入这样一种局面：机器成为地球上最智能的生命体，远超人类！这种状态被称为“奇点”。


  我们面临的伦理问题是，即便这还很遥远，但总有一天，一台足够先进的机器可能会获得生命，而这台机器将能够预知我们的预判，那么我们该如何保持领先一步呢？


  ## 机器权利


  我们该如何为人工智能定义法律框架？


  我们已经看到，奖励与厌恶机制如何在人类生活中扮演决定性角色。强化学习尤其应用了一种虚拟的风险与奖励机制，让人工智能体学习并适应环境。


  我们面临的伦理问题是，一旦机器作为实体达到足够的成熟度，能够自主地看、感知、思考和行动，它们就会要求建立法律框架来保护和管理其应享有的权利。智能机器应该被像人类一样对待吗？它们应该拥有平行的法律和申诉系统吗？当人工智能体因不当行为受到惩罚时，我们该如何提供支持系统，使其理解错误并保持在未来做得更好的动力？当机器做对了所有事情，而“人在回路中”却成为障碍时，我们又该如何解决？


  ## 董事会与 CEO 在伦理人工智能中的角色


  人工智能的预测措施旨在提供预期的结果。在现实世界中，这是唯一重要的方面。然而，正如人类不完美、主观且易腐败一样，机器也是如此。换句话说，尽管有既定的法律和协议，我们社会中的不良行为者总能找到操纵系统的方法。同样，人工智能的实用性也容易被人们用于恶意或自私的目的。风险正越来越高。


  因此，公司，尤其是那些拥有海量数据访问权限并开发和部署人工智能产品与服务的公司，不仅应要求工程师、企业家和高管具备更负责任的工作伦理，还应建立更具决断力的董事会和委员会，将伦理人工智能作为其首要战略重点。


  ### 董事会的角色


  传统行业的公司在定义企业伦理时，会参考数十年的法律、法规和诉讼案例来寻求指导。然而，对于像人工智能这样具有变革性和颠覆性的事物，并没有先例可循。规范和标准仍在形成中；法律、法规和判例都很少。这就是为什么董事会必须成为人工智能企业伦理的积极倡导者，将其与增长、盈利能力、并购目标和继任规划等其他关切事项并列为首要任务。


  董事会应要求 CEO 将人工智能伦理作为企业优先事项。例如，董事们不应仅凭表面陈述就相信公司的人工智能产品与举措不会无意中助长偏见。相反，董事会成员应规定，人工智能产品与举措必须持续接受压力测试，以发现人工智能偏见并采取补救措施。


  ### CEO 的角色：人工智能伦理的卓越治理


  CEO 可以通过三种方式建立其人工智能伦理与治理的审慎性。


  首先，CEO 应加强并扩展自身知识，涵盖从人工智能偏见到透明度和问责制最佳实践等议题。他们还应对公司人工智能产品与服务的影响有深刻认识，包括数据来源以及算法的性质/类型。CEO
  还应设立专门的智库，收集全行业关于人工智能伦理相关诉讼、客户提出的关切以及政策制定者观点的信息。这将有助于 CEO 在整个企业内进行管理层简报，并提高认知水平。


  其次，CEO 应在其智库中纳入高级顾问，他们能就人工智能对董事会的影响带来额外视角。例如，如果你的公司提供与人力资源相关的人工智能产品与服务，那么引入一位高级顾问来严格审查与多样性、包容性、劳工和民权法规相关的偏见是否得到充分消除，这一点至关重要。


  第三，CEO 必须认识到，伦理人工智能不能是事后才考虑的事情。应在人工智能系统开发过程的核心中内置足够的制衡机制，以确保技术专家不会在开发人工智能系统时忘乎所以，而忽视了让人工智能变得透明。我们不能忽视部署那些一方面表现异常出色，但另一方面却无法完全解释的人工智能系统所带来的风险。因此，CEO
  必须确保企业配备了正确的工具、方法和审查机制。


  ### 技术专家的角色


  技术专家和人工智能专家必须关注人工智能系统的目的和目标。说“算法非常复杂，但数据有偏见”很容易。现实世界的数据总是有偏见的，因为它具有情境性。人工智能专家的责任是充分理解数据背后的背景，然后设计出支持人类价值观的算法。


  ## 结论


  将追求人工智能的公平性与商业利益脱钩，并为公平、透明的人工智能解决方案创造空间，这一点至关重要。为此，让人工智能具有可解释性至关重要。


  那些基于人工智能颠覆性力量构建商业战略的公司正陷入两难境地：让它们的人工智能透明化，成本和收益是什么？它们如何保护自己的知识产权和竞争优势？


  诚然，目前存在一些经验法则或最佳实践。或许，对于每个人工智能系统，如果我们能详细说明所使用的数据类型、数据来源的细节、预测模型开发中使用的参数、达到的准确率以及关于假阳性和假阴性的统计数据，我们或许能达到一个普遍认可的透明度水平，这进而可能为伦理人工智能建立一套普遍可接受的标准。


  在本章中，我们讨论了人工智能后果的几个相关伦理观点。在下一章中，我们将汇集前几章的所有经验教训，并尝试确立构建人机协作生态系统的某些方法。




  '
- '# 11. 整合：迈向人机协作生态系统


  20 世纪 30 年代，英国植物学家亚瑟·坦斯利提出了生态系统的概念，其灵感来源于局部生物群落如何相互互动，并利用环境来维持生存、繁荣发展，甚至适应环境变化。


  1993 年，詹姆斯·摩尔将这一概念扩展到现代商业领域：企业共同进化能力，既合作又竞争，以支持新产品、满足客户需求，并最终推动下一轮创新。


  此前我们讨论过，经济已从大型“自给自足”的企业转向基于网络的公司，这主要得益于数字技术、海量数据、大幅提升的互联性以及云计算。苹果公司明确将其产品和服务设计为一个生态系统，为客户提供无缝体验；eBay
  则认识到必须刻意构建其“共享生态系统”。价值创造（财富创造）已具有完全不同的含义：更密集、更丰富的网络让生产者和消费者协作，从而放大双方的成果。例如，谁能想到，帮助我们与同类群体建立联系的平台（Facebook、Twitter
  和 WhatsApp）能产生巨大的商业价值？毕竟，这些只是人与人连接的系统。


  我们的需求始终驱动着手段。我们关心健康，于是推动了医疗实践、医生、医院、药房等手段的出现。同样，我们希望找到超越人类肌肉和驯化动物的能源，于是我们找到了从化石燃料、电力、煤炭和核聚变中获取能源的方法。核能、飞机、汽车、个人电脑、收音机、互联网等创新颠覆了既有的商业生态系统和社会的运作方式，这些创新中的每一项都可以被称为*黑天鹅*。^(⁸)
  这些突破在发现之初并非突破。它们在实验室里历经多年，只有在变得足够廉价以供大众消费后，才进入主流。仅凭人工智能战略，其误导性可能与其启发性一样大。我们认为人工智能技术是即将出现的另一只黑天鹅，因此，要真正利用人工智能的变革力量，我们别无选择，只能建立并利用一个基于人机共生的新生态系统。


  ## 人机共生


  2011 年，IBM 的沃森赢得了*Jeopardy*游戏节目。这是一个分水岭时刻，并非因为机器在人类自己的游戏中击败了人类，而是因为其可能性让我们大开眼界。随后，人工智能领域取得了一系列引人注目的突破——图像识别、语音识别等等——所有这些都通过一种称为*深度学习*的技术得以实现。


  另一方面，机器变得比人类更聪明，也引发了关于我们未来与机器关系的巨大不确定性和猜测。埃隆·马斯克将人工智能描述为“我们最大的生存威胁”。^(⁹) 斯蒂芬·霍金警告说，“全面人工智能的发展可能意味着人类的终结”。^(¹⁰)
  哲学家尼克·博斯特罗姆在其著作《超级智能》^(¹¹) 中提到了技术“奇点”，届时机器将超越人类的一般认知能力。


  所有这些争论和猜测都基于一个默认假设：因为机器能看、能听、能行动，并且持续学习，它们将在各种任务上（尽管目前仅限于狭窄领域）超越人类，并且基于同样的逻辑，它们很快就能更普遍地“超越”我们的思维能力。


  重要的问题是，与其相互竞争，我们能否设计一种机制，让机器智能与人类智能相互补充？最终目标是构建能像人类一样思考的机器，并设计出能帮助人类更好思考的机器。


  正如任何新技术演进一样，人工智能也经历了好几个进化阶段。理解这一切是如何开始的，以及最初的意图是如何被多次重新定义的，这一点很重要。


  1955 年夏天，约翰·麦卡锡在达特茅斯大学召集了一次会议。与会者都是人工智能先驱中的顶尖人物。这份广为人知的“达特茅斯会议宣言”最初提出：“原则上，学习的每一个方面或智能的任何其他特征都可以被精确地描述，以至于可以制造一台机器来模拟它。”^(¹²)


  通用智能（也称为`g`因子）指的是一种广泛的智力能力的存在，它使个体能够执行不同的认知任务。例如，个体在一类认知任务（比如描绘自然和风景的能力）上的表现，往往与同一个人在其他类型认知任务（比如绘制建筑图纸的能力）上的表现具有可比性。这种特定的通用智能能力，我们在今天的人工智能应用中看不到。一个为下棋而设计的算法，如果被要求提供产品推荐，将会完全不知所措。简而言之，当今人工智能代理的`g`因子仅限于一种狭窄的智能类型。


  此外，像“神经网络”和“深度学习”这样的术语，正在误导我们声称即将创造出“像人类一样思考”的机器。虽然神经网络的灵感来自人脑，但实际上它被视为统计回归模型的泛化。同样，“深度”指的并非心理深度，而是增加结构（“隐藏层”），使模型能够捕捉复杂的非线性模式。“学习”指的是对回归模型中大量模型参数进行数值估计。


  简而言之，迄今为止人工智能取得的惊人成功，是建立在统计推断的基础上的，而非对我们所认为的人类智能的近似或模拟。




  ## 利克莱德的增强论


  达特茅斯会议五年后，心理学家兼计算机科学家 J. C. R. 利克莱德阐述了人类智能与计算机智能之间的共生关系。他提出了一种互补关系：人类将定义问题陈述、设定目标，并扮演验证学习成果的关键角色；机器则将承担筛选海量数据以生成洞察和预测的繁重工作。这种互补能力与协同任务执行，将比人类单独完成任务高效得多。


  这种人机共生已悄然渗透进我们的日常生活。常见的例子包括：


  -   使用像 `Waze` 这样的 GPS 应用在繁忙路口和复杂的道路迷宫中导航

  -   通过个性化推荐菜单在海量书籍或电影选择中进行搜索

  -   与机器对话、发出指令，机器则回复事实、数据、天气模式、附近餐厅等信息


  在每种情况下，人类都会指定目标和标准（例如“带我去市中心，但避开繁忙街道”，或“给我推荐一些适度搞笑、无可救药地浪漫、且带有亚洲主题的电影选项”，或“找一家步行可达、评价高且价格适中的意大利餐厅”）。这是如何运作的呢？AI
  算法筛选海量数据以得出预测。然后，人类评估机器输出以做出决策。每当人类选择或忽略某个特定预测时，AI 算法都会记录下这一点，并将该信息反馈到学习过程中，从而不断改进和学习。在任何情况下，人类智能都不会被掩盖，而是得到了增强。


  事实证明，人类思维的不可预测的非理性程度比最初认识到的要低，而 AI 的类人程度也比最初期望的要低。


  ## 琳达实验：快思考与慢思考


  AI 先驱赫伯特·西蒙在人机协作的背景下揭示了 AI 的另一个侧面。他认为，我们人类必须满足于“增强”而非优化的解决方案，因为我们长时间工作、记住大量事物以及良好推理的能力是有限的。相比之下，机器不会表现出工作疲劳，总能做出一致的决策，并且能以最小的努力处理海量输入。此外，它们评估数百万个因素的准确度远超人类。


  丹尼尔·卡尼曼在其著作《思考，快与慢》^(¹³)中，强调了人类决策过程中有趣且非理性的方面。


  每当我们面临众多选择时，我们就会进入一个决策过程。自然，我们似乎会评估大量数据、运用某些理性思维、回忆过往经验、与他人商议，然后做出决定。这就是卡尼曼所说的“系统
  2”思维，或“慢思考”。


  实际上，我们并不总是诉诸如此冗长缓慢的评估过程来做出决定。相反，我们通常依赖由各种心理经验法则（启发法）构成的自身部落知识来做出决定。我们自己的决策过程在叙述上似乎合理，但在逻辑上往往站不住脚。卡尼曼称之为“系统
  1”思维或“快思考”，琳达实验就是其著名例证。


  在一项针对顶尖大学学生的实验中，卡尼曼和特沃斯基描述了一个名为琳达的虚构人物。她非常聪明，大学主修哲学，并参与了女权运动和反核示威。基于琳达大学时代的这些细节，以下哪个关于琳达现今情况的场景更合理？


  “琳达是一名银行出纳员。或者，琳达是一名活跃于女权运动的银行出纳员。”


  卡尼曼和特沃斯基报告称，87% 的学生认为第二个场景更可能发生，尽管稍加思考就会发现这绝不可能是真的。女权主义银行出纳员是所有银行出纳员的一个子集。但添加“琳达仍然活跃于女权运动”这一额外线索影响了叙述的连贯性，导致学生选择了（可能性更低的）第二个场景。


  本质上，人类思维会混淆易于想象与高度可能之事，其方式包括：让情绪蒙蔽判断、在随机噪声中假设模式、将因果关系归因于虚假相关性、以及从个人经验中过度概括。我们用于做出判断的许多启发法和智慧，结果证明存在系统性偏差。如果说我们的思维需要算法来消除判断中的偏差，我们的眼睛需要人工镜片来过滤虚假相关性，这或许并不算惊世骇俗。


  另一方面，如果有一种方法能将日常任务背后的处理逻辑编码，那么可以肯定，算法在这些任务上的表现将优于人类。然而，此类算法将缺乏评估新奇或新颖情境所需的概念理解和常识推理能力。为了说明这一警示，我们以
  IBM Watson 赢得《危险边缘》为例。比赛期间，在“美国城市”类别下出现了一个问题：“其最大的机场以一位二战英雄命名；其第二大机场以一场二战战役命名。”Watson
  回答“多伦多”。类别是“美国城市”，但答案却是“多伦多”！（顺便说一句，正确答案是芝加哥。）


  这个特殊的例子说明，人类智能的某些优势，如常识推理，可以抵消暴力机器学习的基本局限性。


  AI 最引人入胜的一点在于，很难预测哪些部分会容易或困难。起初，像下棋这种对人类来说极具心智挑战的活动，对机器来说会是最难的，但结果却很容易。另一方面，像识别物体或拾取物体这类对人类来说相当简单的任务，对机器来说却困难得多。


  总之，人类需要机器来避免“系统 1”决策陷阱，而机器需要人类来避免“系统 2”决策陷阱。两者共同表明，人机共生的理由比以往任何时候都更充分。


  我们需要的是一种人机融合的策略。




  ## 人机融合策略（HMIS）


  尽管人工智能的进步正日益让人类生活更轻松，但人们始终担心基于 AI 的系统会对人类构成威胁。AI 界人士对于 AI 模仿人类行为的利弊持有多种不同观点。


  例如，一个经过 MNIST 数据集训练、用于检测数字的神经网络，在输入图像负片（即黑白颠倒）的测试样本时彻底失败，而人类处理这类情况则毫无问题。算法的可靠性仅取决于训练所用数据的完整程度。一如既往，垃圾输入意味着垃圾输出。


  此外，AI 系统存在从收集数据中继承的偏见（这是人类会有意识地避免的）。例如，某餐厅评价系统给墨西哥餐厅打了低分，因为“墨西哥”这个词与其他非法活动相关联。


  与其担忧 AI 的进步，我们能否提出一种人机融合策略，让人类和机器共同生活在一个复杂的自适应生态系统中呢？


  我们将这种生态系统称为人机融合策略。它主要包括人类认知与智能机器，其中人与机器在解决问题时相互辅助。未来的人机融合策略并非由 AI 驱动的机器取代人类，而是机器与人类处于共生状态。利用
  AI 最高效的方式是将其用于增强人类能力。机器在特定任务上表现更佳，而人类在通用任务上更胜一筹。因此，一种理想的前进方式是构建一个社会环境，让人类与机器在相互推动或委派任务（当对方不擅长时）中互动。


  在人机融合架构中，人类角色是关键的差异化因素，不仅能提升信任、互惠和好感度，还能缓解人们对 AI 系统普及的恐惧与担忧。


  智能机器模糊了计算层面与人类输入输出交互之间的界限。它们借鉴并扩展了多项成熟的计算原则，如群体智慧计算、集体智能计算、社交网络等。群体智慧计算侧重于将多位专家汇聚到同一平台，而智能机器则通过提供计算智能来增强这些专家的决策能力。这种混合系统能让人类与计算机和谐共处，共同实现既定目标。


  现实中有许多任务无法完全由机器完成。在这些任务中建设性地运用人类认知，有助于让机器更容易解决问题。研究人员长期以来一直试图让人类与机器之间的交互显得无缝且自然。


  人类的基本需求是食物、水、能量和安全。尽管这些基本目标对人类而言看似简单，但人们可能会好奇它们对机器意味着什么。对于机器代理而言，这些需求可能是电力、网络、存储、维护等。如同人类世界一样，没有什么是免费的。机器代理使用的每一种资源都必须有相应的支付概念。这可以想象为一种虚拟货币，它为机器代理的每个行为引入了奖励与惩罚的概念。


  ### 应用场景


  基于 HMIS 的应用主要可根据人类与机器代理的构成，以及行为责任的归属，分为以下几种不同场景。


  #### 机器代理作为人类助手


  人类由实时机器代理协助，与多元文化代理（有时使用不同语言）协作。机器代理向人类提供必要信息和建议，但最终决策权在人类手中。


  例如，考虑一个机器代理协助法官分析类似案件的先例裁决事实，或一个机器代理根据候选人的文化契合度协助招聘人员做出录用决定。


  #### 完全自主的机器代理


  自主机器代理与其他人类和机器代理协作。在此场景中，无人对机器代理的行为负责。因此，该场景仅限于机器代理行为风险极低的应用。


  例如，考虑一个自主代理作为虚拟角色，在危险物理环境中执行任务，或在人类低接触环境中输入-活动-输出明确界定的场景下工作，或模拟自主机器代理在质量控制过程中进行观察、记录和发出警报。


  #### 机器代理与人类交互


  在此场景中，机器代理经过训练，能理解并依据其人类对应方的偏好和目标行事。机器代理有能力为其人类进行谈判和决策。它像自主机器代理一样工作，但在不确定时会回询其人类对应方。因此，机器代理行为责任由其人类对应方承担。


  例如，考虑呼叫中心的机器代理回答人们的问题，并对其文化背景保持敏感，或一个机器代理在全球范围内进行随机 A/B 测试，同时考虑人们的文化背景。


  #### 全机器代理交互


  此场景在代理的训练方式及机器代理行为责任的归属方面与前一场景类似。区别在于没有人类参与交互。这给代理之间的交互方式带来了不同挑战。


  例如，考虑决策者的机器代理协作，就招聘流程中的候选人排名达成共识，或团队选拔委员会成员的机器代理协作选择团队。


  #### 人类与机器代理交互


  此场景描述了一种典型设置：人类走进家中或办公室的特定房间，沉浸在她想要协作的另一组人（位于远程）的虚拟环境中。远程团队的全部或部分成员可能由其机器代理代表。


  例如，考虑一个人类在虚拟环境中与朋友的机器代理聊天娱乐，或一个人类主持拍卖，人们派自己的机器代理出价。




  ## 治理框架


  遵循艾萨克·阿西莫夫著名的机器人三定律，人机智能系统（HMIS）需要建立一个治理框架，以管理和监控人类与机器智能体如何以协作方式执行各自的任务。这些法则可与机器人三定律并行使用：


  - 机器智能体绝不会收集肤色、身高、体重等身体特征作为视觉输入，用于学习或识别其所服务个体的文化背景。输入必须始终通过正式输入渠道提供。此举旨在使系统不受任何与身体特征相关的刻板印象影响。

  - 任何涉及文化不敏感的言论、句子、词汇或俚语，将始终被标记为对所有文化不敏感，除非其替代性的积极方面已针对特定文化明确说明。

  - 人类智能体需要一套主动学习系统，能够在交互后整合反馈，以持续验证其行为。


  需要为人类和机器智能体明确界定清晰的“责任分离”与事件响应矩阵。人类和机器智能体随后可利用强制或自动化活动来管理相互依赖关系与交互。这些相互依赖关系与交互要么是预先设计的，要么可根据其所处场景在运行时执行。


  效率与特异性至关重要，因此应通过妥善管理交互来清晰记录协调规则。HMIS 应能在提供安全性、可靠性和容错能力的多智能体复杂自适应生态系统中处理并发操作。协调过程应精确反映其形成所依据的语义。协调与问责的效果应精确地维持在智能体交互空间内。安全是人机交互中的另一个因素，治理框架不应忽视。正如人类遵守社会法律一样，机器智能体遵守若干防止其采取可能导致破坏性行动的极端措施的法律也同样重要。


  就像社会中我们有律师和警察来执行强制性法律一样，在 HMIS 生态系统中，我们也需要“监察者”来维护法律。


  例如，在通过面试流程招聘公司人类员工、且最终决策由机器智能体做出的场景中，HMIS 监察者将追踪整个流程中机会平等的基本价值观是否得到维护。例如，如果它无意中招聘了导致性别偏见或种族、肤色、性取向偏见的候选人，HMIS
  监察者将不会批准此类招聘，并会建议机器智能体重新评估或改变其决策。其他例子可能包括 HMIS 监察者监控通信文本，以检测不可接受或文化不敏感的词语或概念。此外，HMIS
  监察者还可能提供分布式和自主的平台，以验证来自机器的通信的真实性。法律的治理在 HMIS 中很重要，但同样重要的是应灌输给智能体的伦理道德。


  在商业环境中，违反行为准则应归入伦理范畴。如前所述，任何导致种族主义、辱骂行为甚至数据滥用的行为都将属于伦理违规，在这种情况下，惩罚应相当严厉。伦理之下是治理，即智能体在其领域或任务中受上级智能体管辖。智能体之间的治理结构应是层级式的，治理官员在基于达成的共识采取行动时，既要有问责制，也要有自主权。HMIS
  监察者有望通过整个治理过程变得更加智能。这可以通过利用对抗性机器学习程序来实现。由于智能体需要在其角色和职责中不断进化，因此在智能体的学习过程中拥有足够的垃圾信息过滤机制至关重要。这只有在
  HMIS 监察者通过改进智能体通信模式中的过滤机制而变得聪明时才能实现，否则可能会使智能体破坏自身乃至整个生态系统的健康学习过程。


  我们还必须讨论在实现稳定 HMIS 生态系统道路上可能遇到的潜在挑战，接下来将对此进行探讨。


  ### 机器的可信度与好感度


  促成两个个体之间交互的首要条件是接受这种交互。这种接受度取决于个体之间相互信任的程度，而接受的程度/水平则与个体之间的好感度直接相关。


  如果上下文中的个体之一是机器，这就变得棘手了。虽然从机器的角度来看，信任和好感度并不构成障碍（因为它总是可以通过编程方式改变），但反之则是一场艰苦的战斗。每当有文章或新闻报道机器能力的提升，或突出显示自主机器犯下的错误时，对机器的信任就会受到打击。HMIS
  生态系统要求人与机器之间进行无缝、开放的信息交换，这需要消除相关人类心中对机器的任何疑虑。智力上的优越性并不一定会让机器变得讨人喜欢，因此这比纸面上看起来要复杂得多。例如，与总是正确的机器相比，会犯错的机器似乎让人类感觉更自在。


  ### 人机关系


  人机关系是一种共生关系，两个实体相互依赖。虽然机器在执行定义明确的任务方面优于人类，但人类在并非完全可控且受不确定因素影响的动态任务方面更胜一筹。由于现实生活中的情况可能包含这两种类型的任务，因此自由度需要在人类和机器之间进行划分。


  HMIS 生态系统由机器网络和人类网络相互交织而成。随着机器变得越来越自主，保持对其关系性质以及依赖范式变化的检查至关重要。


  定义这种关系至关重要；如果一个自主智能体犯了错误或违反了法律，这种关系对于确定哪个实体将承担责任至关重要。必须解决诸如自主性的动态变化、任务的所有权以及工作分配等挑战。




  #### 所有人类皆不同


  作为人类，我们与不同的人互动方式各不相同。人们与家人互动的方式不同于与同事互动的方式，因为存在一个高维度的背景信息，决定了互动的基调和层次。这种背景不仅限于互动双方之间的关系，还延伸到参与者的个人特征，例如年龄、性别等。自然，在让机器越来越像人的道路上，识别最大化的背景信息至关重要，因此这成为了我们的下一个挑战。


  虽然在识别人类物理特征（如性别和年龄）方面已有大量研究，但在通过语调、表情和肢体语言识别情绪、情感等动态特征方面，也有相当多的工作正在进行。使用这些已识别背景信息的一个有趣方面和额外复杂性在于，它具有文化特异性。即使在机器与人类的互动中，文化也扮演着重要角色，影响着不同文化背景的个体对机器的不同看法。机器不仅需要理解某些手势在不同文化中的含义，还需要理解它们的回应在相同背景下会如何被接收。


  人与技术必须各司其职，如图 11-1 所示，人类必须不断演进机器的设计，提供治理框架，监控能力，并接受这样一种观念：人机整合战略不会淘汰他们，反而会增强他们的能力。


