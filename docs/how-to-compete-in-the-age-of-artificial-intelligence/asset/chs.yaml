- "# 4. 黑箱之内：理解人工智能的决策过程\n\n人工智能仅通过从数据中学习，无需人类大量参与解释具体如何完成任务，就能不断提升预测能力，这意义重大。为什么？\n\
  \n有两个原因。首先，我们的大脑虽然处理着大量信息，但无法精确解释自己是如何进行推理、区分事物、适应环境变化，并利用经验解决从未遇到过的问题。在人工智能出现之前，我们试图接近人类思维水平的尝试，涉及复杂的“如果-那么-否则”式程序来解决问题。这种方法既不可扩展，也无法适应条件变化。\n\
  \n其次，人工智能系统是出色的学习者。它们从数据中学习，从人类进行的验证中学习，并在因错误预测而受到惩罚时学习。赋予人工智能这类学习能力几乎不需要编写多少代码。\n\
  \n“人工智能”一词暗示着一台能够推理的机器。更完整的人工智能特征列表如下：\n\n-   *推理*：通过逻辑演绎解决问题的能力\n-   *知识*：表示关于世界知识的能力\n\
  -   *规划*：设定并实现目标的能力\n-   *沟通*：理解书面和口头语言的能力\n-   *感知*：通过视觉、声音和其他感官输入与世界互动的能力\n\n\
  根据解决问题的能力，人工智能主要分为三大类。\n\n## 弱人工智能（ANI）\n\n也被称为“弱人工智能”，因为其问题定义范围狭窄。击败国际象棋世界冠军的人工智能就是\
  \ ANI 的一个例子。它非常擅长下棋，但这是它唯一能做的事。如果你让这个国际象棋人工智能专家为你提供从 A 点到 B 点的驾驶路线，它会茫然地看着你。可能有另一个人工智能专家能帮你提供驾驶路线，但它无法帮你下棋。\n\
  \n你可以想象，ANI 有特定的用途，其智能局限于一个领域，并且主要服务于一个或几个特定目标。这里的智能通常更被定义为独立工作的能力，而非（当前/逐步的）自我改进。\n\
  \n目前，我们在现实生活中使用着数百种弱人工智能。Siri、谷歌、Facebook、自动泊车和自动驾驶汽车都是运行中更复杂（智能）的弱人工智能。你也能找到更弱的人工智能，比如能根据你的位置调整时区的手表，或根据室外天气状况自动调节室内温度的系统。\n\
  \n以下是我们日常生活中更多 ANI 的例子：\n\n-   现代汽车充满了 ANI 系统，从自动防滑机制，到提醒你轮胎气压突然下降，再到提示你盲区有另一辆车。另一方面，自动驾驶汽车是复杂\
  \ ANI 系统的例子，它不仅操控汽车的所有机械部件并为你驾驶，还与外部环境互动，代表你做出决策——何时停车、何时保持安全距离、何时变道等。\n\n-   你的智能手机包含许多弱人工智能解决方案，从推荐购物的应用程序，到提供从\
  \ A 点到 B 点的实时驾驶路线，到获取天气更新，到播放你喜欢的音乐列表，到与你的手机进行对话，以及许多其他组织你日常活动的应用程序。\n\n-   Microsoft\
  \ Outlook 或 Google 的 Gmail 是智能的 ANI。它们预装了专门分类垃圾邮件和非垃圾邮件的功能。它们持续在后台运行，观察你的行为和偏好，以分类你认为重要、无用和垃圾的内容。\n\
  \n-   亚马逊的“购买此商品的顾客也购买了……”推荐系统是一个持续学习的 ANI 系统，它从数百万客户的购买模式中收集信息，然后将这些信息个性化，以影响你购买更多商品。\n\
  \n-   谷歌提供的搜索、谷歌翻译和谷歌新闻等服务，是专注于内容的复杂 ANI 系统的例子。Facebook 的信息流也是如此。\n\n-   还有更多 ANI\
  \ 系统的例子，尽管它们专门解决一个问题，但在这个领域钻研得非常深入。安全系统、自动化制造、资本市场的算法交易、帮助医生诊断的专家系统，以及最著名的 IBM Watson，它包含了足够多的精选信息，击败了最杰出的*危险边缘*冠军。\n\
  \n## 通用人工智能（AGI）\n\n也被称为“强人工智能”，这是一种能够执行人类所能完成的任何智力任务的人工智能系统。我们距离创造 AGI 系统还很遥远，因为智能是一个复杂的事物，它很大程度上涉及推理、适应能力和心智能力。因此，如果\
  \ AGI 要存在，它必须做人类所做的一切——在不确定性下运用策略和做出判断，集中知识（包括常识），规划，学习，用自然语言交流，然后结合所有这些高阶技能来解决问题和实现目标。这是一个艰巨的任务！\n\
  \n## 超人工智能（ASI）\n\n超越 AGI 的一切都是 ASI。ASI 系统在几乎所有领域都比最优秀的人类大脑更聪明，包括科学发现、创造力、通用知识和社交互动。\n\
  \n截至目前，我们只达到了人工智能的最低层级。从 ANI 到 AGI 再到 ASI 的道路将需要巨大的技术演进。可以肯定的是，这将是一段激动人心的旅程，但也是一段将挑战人类自身存在的旅程。\n\
  \n## 学习者的分类\n\n机器学习算法“学习”进行预测。它们采取的学习方法完全取决于你想要解决的问题类型。\n\n### 监督学习\n\n你有一个需要预测的目标或类别。例如，假设你想预测“谁会离职？”。那么你的模型将使用历史数据进行训练，其中每个客户都标有离职状态。算法会查看数据中隐藏的各种模式，以映射到客户状态（离职=是或否）。这种从数据中学习以达到预期结果的数学抽象过程被称为*监督学习*，因为它知道要学习什么。\n\
  \n需要了解的关键原则是：\n\n-   训练数据集包含预测变量和你想要预测的输出。\n-   学习者将使用训练数据集来确定预测变量和输出之间的映射关系。\n\
  -   一旦学习者学会了这种映射，就可以将其用于新数据，并具有一定的准确性。\n\n以下是一些例子：\n\n-   输入（语音录音） – 输出（文字记录） –\
  \ 应用（语音识别）\n-   输入（照片） – 输出（标题） – 应用（图像标记）\n-   输入（商店交易详情） – 输出（交易是否欺诈？） – 应用（欺诈检测）\n\
  -   输入（食谱配料） – 输出（顾客评论） – 应用（食品推荐）\n-   输入（过往购买数据） – 输出（未来购买行为） – 应用（推荐系统）\n-  \
  \ 输入（车辆位置和速度） – 输出（交通流量） – 应用（交通管理）\n\n\n\n### 无监督学习\n\n你通常是在寻找模式，但并没有需要映射的输出。例如，你想根据客户订购的产品类型、购买频率、上次访问时间等因素对客户进行分组。这种将具有相似行为的个体聚集成簇的过程被称为*无监督学习*，因为它并不知道要学习什么。然而，它会观察数据中的模式，并自动找到在数据中区分不同群体的方法。\n\
  \n需要理解的关键原则是：\n\n- 无监督学习并不试图映射到预定义的输出，而是解释数据是如何组织的。\n\n以下是一些示例：\n\n- 聚类算法，例如 `K-means`\
  \ 或层次聚类。这些算法试图创建簇（具有相似特征的归入同一簇）。\n- 降维算法，例如 `PCA`。这些算法试图用更少的维度找到数据的最佳表示。\n- 异常检测。这些算法试图找出数据中的离群点。\n\
  \n### 强化学习\n\n你想要达成一个目标，但并没有获得任何关于如何实现该目标的具体指令或先验知识。在强化学习中，学习者不会被告知如何完成任务。然而，学习者会明确获知哪些行动能带来最大回报。\n\
  \n需要了解的关键原则是：\n\n- 强化学习试图同时获取新知识和最大化回报。这种方法也被称为“探索与利用的权衡”。\n- 学习者遵循马尔可夫决策过程框架，在该框架中，它需要采取一个行动（`A`）来从起始状态转换到结束状态（`S`）。\n\
  - 每采取一个正确的行动，它就会获得一个奖励（`R`）。否则，它会受到惩罚。这一系列行动定义了策略（`P`），而相应的奖励（或惩罚）则定义了价值（`V`）。学习者的任务是通过选择正确的策略来最大化奖励。\n\
  \n强化学习并非严格意义上的监督学习，因为它并不严格依赖于必须映射到哪个输出。它也不是无监督学习，因为它事先知道正确行动所对应的预期奖励。\n\n## AI 问题的分类\n\
  \nAI 问题可以归纳为 10 个大类。\n\n- *领域专家*：AI 系统必须在特定领域获取大量知识，然后获得足够的推理和推断能力，从而能够充当该领域的专家。关键在于能够获取关于特定领域的大量数据语料库。\n\
  - *领域拓展*：AI 系统利用已有的知识体系，并扩展其能力，以关联该知识体系中的不同事物，从而提出先前未被发现的新见解或模式。\n- *复杂规划器*：AI 系统扮演智能编排者的角色，不仅整合各种复杂数据，还能生成洞察。一个例子是使用\
  \ AI 技术优化物流，由于涉及多个中转环节和参与方（包括车队、仓储、路线规划和配送），你面对的是庞大而复杂的数据集，人类无法从中发现模式，但机器可以轻松做到。\n\
  - *更好的沟通者*：AI 系统提供对话机制，包括自然语言处理、自然语言生成、情绪解读、定制化回复、语言翻译等。\n- *新感知能力*：AI 系统与环境交互以确定下一步最佳行动，从而催生自动驾驶等新服务。\n\
  - *企业级 AI*：AI 系统的主要任务是自动化那些重复性的活动，这些活动有足够的知识库来准确定义输入-输出映射。\n- *让 ERP 智能化*：企业依赖 ERP\
  \ 系统运行，但这些系统缺乏智能。AI 系统被嵌入 ERP 系统的各种工作流中，其任务是为那些在工作流中遇到困难或需要帮助以高效完成任务的用户提供智能辅助。AI\
  \ 系统会基于过往问题、冲突解决方案、最佳实践、可能的补救措施等进行训练。\n- *让数据存储智能化*：企业拥有众多数据存储。有些是集中管理（数据仓库）以满足分析需求，有些与特定业务应用相关联并保持孤立，还有更多是因用户的即时需求而创建的。此外，还有大量信息以非结构化格式（日志、邮件、文档、图片、视频、通话记录等）分散在各处。AI\
  \ 系统可以发挥作用，跨越所有这些不同且分布式的数据存储，不仅收集元数据（数据目录、业务术语表和技术术语表），还能作为一种提供有意义洞察的手段，同时让数据保留在原处。\n\
  - *超长序列模式识别*：当前 AI 系统在预测结果方面表现出色，但可能仅适用于单一问题。许多大型、复杂的现实世界问题需要一系列预测相互衔接才能解决。这类 AI\
  \ 系统不仅拥有自身的记忆，还将具备先进的同步能力，以实现自我调优和适应。\n- *高级行为分析*：AI 系统已经在进行情感分析，但它们主要利用词汇和语法结构，应用了有限的解读能力。这些\
  \ AI 系统可以进化，利用多个理解人类行为的领域（如观察肢体语言、面部表情、沟通时的措辞选择、互动语气等）来增强情感分析。\n\n## 面向管理者的机器学习入门\n\
  \n理解 AI 和算法工程方面的最佳方式是参考 Tom Mitchell 给出的定义。^(⁷)\n\n> “如果一个计算机程序在任务 `T` 上的性能（由性能度量\
  \ `P` 衡量）随着经验 `E` 的增加而提高，则可以说该程序从经验 `E` 中学习。”\n\n因此，如果你想预测，例如，一个新贷款申请人的信用度（任务 `T`），你可以对过去类似档案的数据（经验\
  \ `E`）运行机器学习算法，如果它成功“学习”了，那么它就能正确预测新贷款申请人的信用度（性能度量 `P`）。\n\n对于“应该使用哪种机器学习算法？”这个问题，答案永远是“视情况而定”。选择合适的算法是多种因素的综合考量：你试图解决的问题类型、业务目标、你想应用的实验技术，以及你验证算法所拥有的时间。它取决于几个因素：数据规模、数据质量和数据多样性。其他考虑因素包括你对误差的容忍度以及你打算如何处理答案。即使是最有经验的数据科学家，在尝试之前也无法告诉你哪种算法表现最佳。\n\
  \n我们挑选了 10 种最广泛使用的机器学习算法，帮助你入门这些算法术语。这也意味着还有很多算法未在此列出。\n\n### 朴素贝叶斯分类器\n\n朴素贝叶斯分类器基于贝叶斯定理，允许我们利用概率，根据一组给定的特征来预测一个类别/分类。\n\
  \n朴素贝叶斯仅在特征彼此独立时才能应用。如果我们试图通过花瓣的长度和宽度来预测花的种类，我们可以使用朴素贝叶斯方法，因为这两个特征是独立的。例如，垃圾邮件过滤就是一种分类器，它为所有邮件分配“垃圾邮件”或“非垃圾邮件”的标签。\n\
  \n\n\n### K-Means 聚类\n\n`K-means` 聚类是一种无监督学习，用于对未标记数据进行分类。`K-means` 是一种非确定性的迭代方法。该算法遵循特定流程来形成包含同质数据点的簇。\n\
  \n`k` 的值是算法的一个输入参数。基于此，算法会选择 `k` 个质心。然后，靠近某个质心的邻近数据点会与该质心结合，形成一个簇。接着，在每个簇内会生成一个新的质心。之后，靠近新质心的数据点会再次结合以扩展该簇。这个过程会持续进行，直到质心不再发生变化。\n\
  \n### KNN（K-最近邻）\n\n`KNN` 算法可应用于分类和回归问题。该算法会存储所有可用案例，并通过对其 `k` 个邻居进行多数投票来对新案例进行分类。然后，该案例会被分配到与其共同点最多的类别中。距离函数负责执行此度量。\n\
  \n### 支持向量机\n\n这是一种监督学习，其核心是通过找到一条能够将训练数据集划分为不同类别的线（超平面），从而将数据过滤到不同类别中。\n\n由于可能存在多种创建线性超平面的方法，`SVM`\
  \ 算法会尝试使用**间隔最大化**技术来最大化不同类别之间的距离。`SVM` 是一种分类方法，它将原始数据作为点绘制在一个 `n` 维空间中（其中 `n` 是您拥有的特征数量）。然后，每个特征的值都与一个特定的坐标相关联，从而便于对数据进行分类。可以使用称为`分类器`的线来分割数据并将其绘制在图表上。\n\
  \n与其他分类算法相比，`SVM` 在训练数据上能提供更高的准确率。`SVM` 算法不对数据做出任何强假设，并且也不会过拟合数据。\n\n### A Priori（先验算法）\n\
  \n这是一种无监督机器学习，用于从给定的数据集中生成基于规则的推理。关联规则意味着，如果项目 `A` 出现，那么项目 `B` 也会以一定的概率出现。生成的大多数关联规则都采用\
  \ `IF_THEN` 格式。该算法会考虑某些推导原则：\n\n*   如果一个项集频繁出现，那么该项集的所有子集也频繁出现。\n*   如果一个项集不频繁出现，那么该项集的所有超集也都不频繁出现。\n\
  \n许多电子商务巨头（如亚马逊）使用 `A Priori` 进行推理，例如哪些产品可能被一起购买，哪些产品对促销反应最积极。类似地，通过观察搜索查询中一起使用的词语的频率，即使您还没有停止输入，谷歌也会神奇地推荐下一组词语。\n\
  \n### 线性回归\n\n`线性回归`算法帮助我们理解两个连续变量之间的关系，以及一个变量的变化如何影响另一个变量。作为最易于解释的机器学习算法之一，它很容易向他人解释，并且只需要极少的调优。\n\
  \n通过将自变量和因变量拟合到一条线上来建立它们之间的关系。这条线被称为回归线，并由线性方程 `Y = a * X + b` 表示。\n\n在这个方程中：\n\n\
  *   `Y` 是因变量\n*   `a` 是斜率\n*   `X` 是自变量\n*   `b` 是截距\n\n系数 `a` 和 `b` 是通过最小化数据点与回归线之间距离的平方差之和来推导得出的。\n\
  \n### 逻辑回归\n\n`逻辑回归`用于从一组自变量中估计离散值（通常是像 `0/1` 这样的二值）。它通过将数据拟合到逻辑函数来帮助预测事件的概率。这里的预测结果不是一个连续的数字，而主要是一个与分类相关的输出。\n\
  \n根据分类响应的性质，逻辑回归解决三类问题：\n\n*   `二元逻辑回归`：适用于分类响应只有两种可能结果（即“是”或“否”）的情况。\n*   `多项逻辑回归`：适用于分类响应有三种或更多可能结果且结果之间没有顺序的情况。\n\
  *   `有序逻辑回归`：适用于分类响应有三种或更多可能结果且结果之间存在自然顺序的情况。\n\n### 决策树\n\n决策树是一种图形化表示，它使用分支方法来绘制通向决策的路径。在决策树中，从根节点开始，每个内部节点都会对响应变量进行一次测试——树的每个分支代表测试的结果，叶节点代表一个特定的类别标签，即计算所有属性后做出的决策。分类规则通过从根节点到叶节点的路径来表示。\n\
  \n当响应变量本质上是分类变量时，我们应用分类树算法。当响应变量本质上是连续或数值变量时，我们应用回归树算法。\n\n### 随机森林\n\n`随机森林`是决策树的集合。它使用装袋方法，从原始数据集中随机抽取子集来创建多个决策树。在这种集成学习方法中，随机森林中所有决策树的输出被结合起来以做出最终预测。每棵树都对该类别进行“投票”。森林会选择获得最多投票的分类（基于森林中所有树的投票）。\n\
  \n### 降维算法\n\n并非所有数据（属性）在预测中的价值和重要性都是相等的。然而，每一个原始数据点，如果精心整理，都能带来巨大的价值。得益于大数据技术，我们现在能够存储、管理和处理包含数千个变量的数据集。挑战在于识别那些对预测影响最大的变量。\n\
  \n像 `PCA`、`决策树`、`因子分析`、`缺失值比率`和`随机森林`这样的降维算法，在帮助我们确定为预测建模应考虑的正确变量方面起着关键作用。\n\n###\
  \ 梯度提升算法\n\n`梯度提升`算法结合多个弱算法来创建一个更强大的算法。通常情况下，您会遇到数据集可能非常庞大或数据集中存在多个不同特征的情况。在这些场景下，您可以使用学习算法的集成方法，该方法结合了多个基础算法的预测能力，以提高鲁棒性。\n\
  \n\n\n## 面向管理者的深度学习入门\n\n深度学习基于联结主义系统的原理——即由称为*人工神经元*（生物神经元的简化版本）的互联单元或节点组成的集合，它们相互传递信号。接收输入信号的人工神经元会对其进行处理，然后产生输出信号，并传播至与其相连的其他人工神经元。\n\
  \n在神经网络实现中，人工神经元和连接通常具有一个权重，该权重在学习过程中通过应用某种导数函数（也称为激活函数）进行调整。如果某个连接有助于提高预测准确性，其权重就会增加；反之，如果该连接对预测准确性无贡献，其权重就会减小。人工神经元受阈值控制，只有当信号的聚合值超过阈值时，信号才会进一步传播。通常，人工神经元按层组织。信号从第一层（输入层）开始，经过后续各层，最终到达最后一层（输出层）。权重较大的神经元对下一层神经元的影响更大。最后一层将这些加权输入求和，得出最终答案。\n\
  \n其数学原理相当简单：`f(x^n) = y^m`\n\n其中 `f` 是神经网络，`x` 是输入变量的 `n` 维向量，`y` 是输出变量的 `m` 维向量。请注意，`n`\
  \ 可能与 `m` 不同，这一点非常重要。\n\n例如，输入可能是数百万个像素，而输出则被压缩为几个有意义的数字，比如图像是汽车/房屋等的概率。\n\n现在我们对\
  \ ANN（人工神经网络）有了大致了解，接下来看一个具体实例（见图 4-1）。\n\n![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig1_HTML.png](img/467925_1_En_4_Fig1_HTML.png)\n\
  \n图 4-1\n\n人工神经网络（ANN）\n\n图 4-1 展示了一个浅层（非深层）神经网络，其中 `n` 为 3，`m` 为 2，并且包含一个隐藏层。\n\
  \n白色圆圈是*神经元*，神经元之间的连接（灰色箭头）是*突触*。在 ANN 术语中，我们通常将突触称为权重。\n\n此处的*权重*只是一个数值。信息从左向右流动，因此你取左侧的值，通过将输入值乘以权重，将其传递到右侧。换句话说，隐藏层中某个神经元的值，等于前一层所有值乘以连接权重后的总和。然后该神经元持有最终值。\n\
  \n*目标*是找到能够为我们产生有意义输出的权重。\n\n*学习*就是寻找这些权重的过程。你需要意识到一点：权重的数量非常庞大。在这个例子中，我们总共有九个神经元，却存在\
  \ 20 个权重。随着神经元数量的增加，情况会变得更复杂。“猜测”这些数值通常需要很长时间，并且消耗大量资源。\n\n*猜测*是一种寻找最佳数值的复杂方法。\n\
  \n*深度 ANN* 就是具有多个隐藏层的 ANN，如图 4-2 所示。\n\n![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig2_HTML.png](img/467925_1_En_4_Fig2_HTML.png)\n\
  \n图 4-2\n\n深度 ANN\n\n目前有三种广泛采用的深度学习架构。\n\n*   *前馈神经网络*：ANN 中最简单的形式之一，信号仅沿一个方向传播。简单来说，学习是通过前向传播波实现的。\n\
  \n*   *卷积神经网络*：与前馈神经网络类似，但专门用于通过可学习的权重以及管理偏置和卷积（识别图像中物体的边缘）来识别图像。\n\n*   *循环神经网络*：与前两种神经网络不同，RNN\
  \ 专为识别序列而设计。\n\nRNN 的学习过程从第一层计算权重与特征的加权和乘积开始。输出随后遵循前馈神经网络原理。从一层到下一层，每个神经元都会记住它在上一步骤中的一些信息。这使得每个神经元都像一个记忆单元。记住神经元在学习过程中后续可能需要使用的信息至关重要。当前向传播波将信号传递给网络中每个后续层，持续进行增量学习时，反向传播则需要不断验证预测，并利用学习率或误差修正来调整权重，从而使网络逐渐向做出正确预测的方向发展。\n\
  \n数据科学家使用深度学习进行目标分类的三种最常见方式是：\n\n*   *从头训练*：收集一个非常大的带标签数据集，并设计一个深度神经网络架构，该架构会自动从你的数据中学习特征，并为你创建模型。\n\
  \n*   *迁移学习*：无需构建自己的深度神经网络架构，而是利用他人创建的深度学习架构（如 AlexNet 或 GoogLeNet），并采用迁移学习方法应用于你的数据。由于你从现有网络开始，因此具有先发优势。在对现有网络进行一些调整后，你可以训练网络执行新的任务。数据科学家更倾向于迁移学习，因为该架构是预先构建好的，并已在数百万个数据点上经过测试。这样，你可以用更少的数据解决问题，并且计算强度也不会太大。\n\
  \n*   *特征提取*：深度学习也可以有效地用作特征提取器。由于网络中的所有层都负责从输入数据中学习某些特征，你可以在训练过程中的任何时候从网络中提取这些特征，然后将它们用作传统机器学习模型的输入。\n\
  \n### 深度学习算法与架构\n\n现在，我们对深度学习的含义以及神经网络如何帮助从数据中提取有意义的结果有了高层次的理解，是时候讨论一些流行的深度学习算法和架构了。\n\
  \n\n\n#### 前馈神经网络\n\n前馈神经网络具有以下结构：\n\n-   包含一个或多个层，其中包括一个隐藏层。\n-   每一层都有一定数量的神经元。\n\
  -   两个神经元之间的每个连接都有一个权重。\n-   某一层的每个神经元通常与前一层的*每个*神经元相连（你可以通过将其权重设为 0 来断开连接）。\n-\
  \   学习过程首先对输入层的神经元应用激活函数。然后，使用每个单元的加权和传递函数，将得到的值向前传播到下一层的单元。\n-   输出层的结果就是网络的输出。\n\
  \n如何衡量准确率和误差？\n\n通过应用梯度下降优化算法来最小化网络误差。*梯度下降*用于寻找函数的最小值。最优值就是误差达到*全局最小值*的点。\n\n为了理解梯度下降，想象一条从山顶发源的河流的路径。河流的目标是流到山脚的最低点。现在，如果中间没有深坑，河流在到达最终目的地之前不会在任何地方停留。这是我们期望的理想情况。在机器学习语境中，我们说从初始点开始，我们实现了解决方案的全局最小值。\n\
  \n然而，如果河流路径上有一个深坑，那么河流就会被困住，无法达到全局最小值。在机器学习术语中，这样的坑被称为局部最小值，这是不可取的。\n\n#### 学习率衰减\n\
  \n学习率衰减是一个重要的性能调优参数。在训练的初始阶段，你可以对权重进行较大的调整。然而，随着时间的推移和迭代次数的增加，理想的情况是使用递减的学习率衰减，这样通过逐步减小的训练更新，你可以学习到良好的权重，并更接近期望的最终状态。\n\
  \n#### 反向传播\n\n反向传播提供了一种机制，通过反映输出误差来调整两个神经元之间的每个权重。首先通过观察输出单元（基于目标值与预测值之间的差异）来计算误差，然后将误差通过网络反向传播，以更新在前一层中应用的权重。最终目标是达到全局最小值。\n\
  \n#### Dropout\n\n如果你的深度神经网络有大量参数，那么学习器存在过拟合的风险。Dropout 是一种解决此问题的技术。\n\n其思想是在学习过程中随机丢弃神经网络中的单元（及其连接）。这可以防止单元过度调整。在训练过程中，你可以配置丢弃样本，使学习器近似于平均预测的效果，并降低过拟合的风险。\n\
  \n#### 批量归一化\n\n深度神经网络在学习过程开始时，会假设一些权重的初始值，这些初始值远非学习到的权重的最终状态。在每次迭代中，这些权重都会经过仔细调整以减少误差。在这个迭代过程中，初始层的一个微小变化可能会无意中导致后续层发生巨大变化。因此，明智的做法是保持较小的学习率，这样只有一小部分梯度会修正权重。批量归一化通过一系列小批量来帮助调节权重修正，从而加速学习过程。\n\
  \n#### 梯度消失\n\n人脑在深处存储着现实世界的抽象表示。类似地，深度神经网络中的隐藏层也存储着训练数据的抽象表示。深度神经网络中的隐藏层越多，在前一个隐藏层之上产生的抽象（更丰富的表示）就越多。然而，如果我们不断增加深度神经网络中隐藏层的数量，就会遇到反向传播变得毫无意义的情况，因为我们无法再实现梯度下降的改进。实际上，随着传递回去的学习信息越来越少，梯度开始消失，最终变得对调整网络权重无关紧要。\n\
  \n#### 自编码器\n\n网络的目标是通过学习在概念层面定义数据的核心特征来“重建”输入，以便它能够遵循一种紧凑的表示技术来重现数据。\n\n网络不是学习输入数据和相应输出之间的“映射”，而是学习数据本身的内部结构和特征。如何做到？在神经网络中，数据的内部抽象（最重要的是，降维后的数据特征）存在于隐藏层中。自编码器利用隐藏层来发展其学习过程。\n\
  \n#### 玻尔兹曼机\n\n玻尔兹曼机是*将概率分布原理应用于学习机制的神经网络*。学习过程由两个阶段（正相和负相）协同工作组成。\n\n在学习过程中，网络会获得关于输出数据是如何从输入数据中产生的感知（你可以称之为正相）。它尝试使用相同的感知来重建输入数据（你可以称之为负相）。如果生成的数据与实际情况不够接近，网络就会调整其感知并再次尝试。主要目标是不断优化感知，使生成的数据变得与原始输入数据一样好。\n\
  \n#### 滤波器与最大池化\n\n卷积神经网络（CNN）是一类专门用于图像识别的前馈网络。\n\nCNN 应用图像滤波器和最大池化效果来从数据中学习。图像*滤波器*是一个带有相关权重的矩形。\n\
  \n*卷积层*将多个这样的*滤波器*应用于输入图像，以创建原始图像的许多子样本。一个滤波器应用于图像的结果称为一个*特征图*。例如，如果输入是一个 32x32\
  \ 的图像，并且图像滤波器的子采样参数是 2x2，那么输出值将是一个 16x16 的图像，这意味着输入图像的四个像素（每个 2x2 的方块）被合并成一个输出像素。有多种子采样方法，但最流行的是最大池化。\n\
  \n*最大池化*是一种将输入图像划分为一组不重叠的矩形的方法，它可以降低维度，并允许对子区域中包含的特征做出假设。\n\n#### GAN（生成对抗网络）\n\n\
  GAN 由两个相互竞争的神经网络（生成器和判别器）组成。训练过程包括生成器尝试使用某种概率分布（通过观察训练数据集中的模式）来生成数据。判别器扮演法官的角色，判断生成的数据是否更接近训练集的分布。\n\
  \n\n\n#### 长短期记忆网络（LSTM）\n\n我们无时无刻不在进行优先级排序，当获得新信息时，我们会立即判断其重要性，然后开始重新调整优先级。事实证明，传统的**前馈神经网络**并不具备这种能力。当加入新信息时，它们会通过重新调整权重来彻底改变现有信息。因此，整个信息都会被修改。总的来说，它们不会区分“重要的”新信息和“不那么重要的”新信息。\n\
  \n在许多现实世界的问题中，记住事件序列对于得出最终预测至关重要。LSTM 是一种新型的神经网络，旨在有选择地记忆或遗忘事物。\n\nLSTM 网络使用称为*记忆单元*的内存块。这些记忆块负责记住信息。对记忆的更新是通过应用不同的机制（称为*门控*）来完成的。\n\
  \n##### 遗忘门\n\n遗忘门对细胞状态应用过滤器，以移除学习过程中 LSTM 不再需要的过去信息，或忽略学习过程中重要性较低的新信息。\n\n#####\
  \ 输入门\n\n输入门负责向细胞状态添加信息。这基本上通过一个三步过程完成。\n\n1.  创建一个包含细胞状态所有可能值的输入向量。\n2.  通过调用 sigmoid\
  \ 函数作为过滤器，控制哪些值需要被添加到细胞状态中。\n3.  将过滤器的值与输入向量相乘，并触发激活操作以完成输入操作。\n\n这个三步过程确保了只有重要且非冗余的信息被添加到细胞状态中。\n\
  \n##### 输出门\n\n输出门也遵循一个三步过程：\n\n1.  在对细胞状态应用激活函数后，创建一个输出向量。\n2.  通过调用过滤器函数，控制哪些值有资格被视为输出。\n\
  3.  将过滤器的值与输出向量相乘，并触发激活函数以完成输出操作，从而使输出传递到下一层。\n\n## 面向管理者的 NLP 入门\n\n自然语言处理（NLP）是一个专业领域，位于计算机科学、人工智能和计算语言学的交叉点。\n\
  \n通过利用 NLP，我们可以分析文本数据并执行众多任务，例如自动摘要、命名实体识别、关系抽取、情感分析、主题分割等。\n\n从广义上讲，NLP 包含两个具体任务：\n\
  \n-   自然语言理解\n-   自然语言生成\n\n### 自然语言理解\n\nNLU 是理解给定文本含义的过程。它试图通过解决各种歧义来全面理解文本中词语的性质和结构：\n\
  \n-   *词汇歧义*：词语有多种含义\n-   *句法歧义*：句子有多个解析树\n-   *语义歧义*：句子有多种含义\n-   *指代歧义*：先前提到过的短语或词语具有不同的含义\n\
  \n一旦歧义被解决，NLU 会尝试通过使用词典（词汇表）和一套语法规则来推导每个词语的含义，以解决不同词语具有相似含义（同义词）以及词语具有不止一种含义（多义词）的问题。\n\
  \n### 自然语言生成\n\nNLG 是以可读格式自动生成包含有意义短语和句子的文本的过程。\n\n自然语言生成包含三个关键任务：\n\n-   *文本规划*：对内容进行排序以赋予其结构。\n\
  -   *句子规划*：对词语和句子进行排序以体现文本的流畅性。\n-   *实现*：对句子进行语法修正，以表达文本的预期含义。\n\n以下是 NLP 如何应用于文本的一些示例。\n\
  \n-   *句子分割*：识别句子边界，即一个句子结束和另一个句子开始的位置。长句子通常用逗号等标点符号分隔。例如，“I met a friend after\
  \ a long time, we had coffee together.” 可以拆分为两个句子。句子 1 是 “I met a friend after a\
  \ long time”，句子 2 是 “We had coffee together”。\n\n-   *分词*：识别文本中不同的词语、数字和其他标点符号。例如，“My\
  \ car keeps giving me alerts, as the doors are not properly closed.” 可以被分词为 `[My]\
  \ [car] [keeps] [giving] [me] [alerts] [,] [as] [the] [doors] [are] [not] [properly]\
  \ [closed] [.]`\n\n-   *词干提取*：将每个单词的屈折形式简化为一个共同的词基或词根。例如，“Give, Gave, Giving” 可以简化为词根\
  \ “Give”。\n\n-   *词性标注*：为句子中的每个单词分配一个词性标签，例如名词或动词。例如，“If you build it they will\
  \ come.” 可以被词性标注为：\n    -   `IN`：介词和从属连词：“If”\n    -   `PRP`：人称代词：“you”\n    - \
  \  `VBP`：动词：“build”\n    -   `PR`：人称代词：“they”\n    -   `MD`：情态动词：“will”\n    - \
  \  `VB`：动词原形：“come”\n\n-   *句法分析*：涉及将给定的文本划分为不同的类别。例如，“Soum and Sachin went into\
  \ a bar.” 可以被解析为 `(S(NP(NP Soum) and (NP(Sachin)) (VP(went (PP into (NP a bar)))))`\n\
  \n-   *命名实体识别*：识别文本中的人物、地点和时间等实体。例如，“Sachin is traveling to the US on Sunday.” 可以被识别为\
  \ `[person = Sachin]`、`[location = US]` 和 `[Time = Sunday]`。\n\n-   *共指消解*：找出所有指向同一实体的表述。例如，“Sachin\
  \ bought a phone. He thinks it is worth the money.” 可以被共指为 `[Sachin, He]` 和 `[Phone,\
  \ it]`。\n\n表 4-1 提供了一份实现常见 NLP 任务的深度学习算法列表。\n\n**表 4-1** 深度学习算法与常见 NLP 任务\n\n| 深度学习算法\
  \ | NLP 任务 |\n| --- | --- |\n| 前馈神经网络 | • 词性标注 • 分词 • 命名实体识别 • 意图提取 |\n| 循环神经网络（RNN）\
  \ | • 机器翻译 • 问答系统 • 图像描述 |\n| 递归神经网络 | • 句子解析 • 情感分析 • 释义检测 • 关系分类 • 目标检测 |\n| 卷积神经网络（CNN）\
  \ | • 句子/文本分类 • 关系抽取与分类 • 垃圾邮件检测 • 搜索查询分类 • 语义关系抽取 |\n\n### 文本预处理\n\n在所有可用数据中，文本是最非结构化的形式。在将\
  \ NLP 技术应用于文本数据之前，我们必须确保文本已经过预处理。如何做呢？\n\n对文本数据应用三个关键的中间步骤，使其准备好进行分析（见图 4-3）。\n\n\
  ![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig3_HTML.png](img/467925_1_En_4_Fig3_HTML.png)\n\
  \n**图 4-3** 说明文本预处理步骤\n\n#### 噪声去除\n\n任何与句子上下文无关的文本片段都可以被视为噪声。噪声实体的示例包括语言停用词（`is`、`am`、`the`、`of`、`in`\
  \ 等）、URL 或链接、社交媒体实体（提及、话题标签）、标点符号等。\n\n一种去除噪声的方法是：a) 对整个文本进行分词，b) 参考一个噪声实体词典，c)\
  \ 消除出现在噪声词典中的那些标记。另一种方法是在处理特殊的噪声模式时使用正则表达式。\n\n\n\n#### 词汇规范化\n\n句子中同一个单词出现多种表现形式也会造成噪声。例如，“eat”、“eating”和“ate”都是根词“eat”的不同变体。尽管从语法角度看它们表达了不同的含义，但根词是相同的。词汇规范化将句子中一个单词的所有差异形式转换为规范化形式（也称为*词元*）。\n\
  \n最常见的词汇规范化实践如下：\n\n-   *词干提取*：词干提取是一种基于规则的方法，用于去除我们通常添加到根词以传达特定含义的后缀。例如“ing”、“ly”、“es”、“s”等。\n\
  -   *词形还原*：词形还原是将单词还原为其根形式的过程。\n\n#### 对象标准化\n\n这个过程基于一个普遍事实：我们经常使用既不符合语法规范也不符合任何标准词汇词典的单词或短语。一些例子包括缩写词、带有附加单词的话题标签以及口语俚语。借助正则表达式和手动准备的数据字典，这类噪声可以得到修复。\n\
  \n#### 文本到特征（文本数据的特征工程）\n\n就像我们对结构化数据进行特征工程以识别可用于开发机器学习模型的重要属性一样，我们需要对预处理后的文本数据进行类似的活动以确定文本特征。有几种构建有用文本特征的技术，接下来将进行讨论。\n\
  \n*句法分析*：句法分析分析句子中的单词的语法以及它们与其他单词之间的关系。\n\n*依存树*：句子由遵循特定顺序以传达含义的单词组成。句子中单词之间的关系由依存语法决定。例如，考虑句子：“Recommendations\
  \ on BCCI operations and functioning were submitted by Lodha Committee.”（洛达委员会提交了关于\
  \ BCCI 运营和运作的建议。）单词之间的关系可以以树形表示的形式观察到，如图 4-4 所示。\n\n![../images/467925_1_En_4_Chapter/467925_1_En_4_Fig4_HTML.png](img/467925_1_En_4_Fig4_HTML.png)\n\
  \n图 4-4\n\n说明句子解析的树形结构\n\n该树显示“submitted”是这个句子的根词，并由两个子树连接。每个子树都有另一个带有依存关系和关联的子树。依存树有助于识别文本特征。\n\
  \n*词性标注*：词性标注有助于我们理解句子的结构。词性标注在自然语言处理中用于许多重要目的，例如，在这两个句子中：\n\n-   “Book my tickets.”（预订我的票。）\n\
  -   “This is a good book.”（这是一本好书。）\n\n“Book”在这两个句子中用于不同的语境。在第一个句子中，单词“book”是动词，指示购买票，而在第二个句子中，它用作名词，谈论的是你阅读的一本书。\n\
  \n#### 实体提取（实体作为特征）\n\n实体是句子中最重要的对象——名词短语、动词短语或两者兼有。\n\n考虑这个句子：\n\n> *The order\
  \ processing system is giving an error code of 1048.*（订单处理系统正在给出错误代码 1048。）\n\n\
  实体提取将识别以下内容：order（订单）、error（错误）、1048。这些关键信息足以进行故障排除并提供解决方案。\n\n一个典型的实体提取模型包含两个活动：\n\
  \n-   *名词短语识别*：此步骤使用依存树和词性标注从文本中提取所有名词短语。\n-   *短语分类*：此步骤将所有提取的名词短语分类到各自的类别（地点、名称等）中。\n\
  \n*主题建模*：主题建模是自动识别文本语料库中存在的不同主题（语料库中共同出现术语的重复模式）的过程。它以无监督的方式推导出语料库中单词之间的隐藏模式。潜在狄利克雷分配（LDA）是最流行的建模算法类型。\n\
  \n*LDA 算法*：该算法假设文档是按以下方式生成的。\n\n在撰写本章时，我们：\n\n-   首先构思了关键主题“黑盒”。然后我们概述了本章应包含哪些主题混合。例如，我们决定包含涵盖机器学习、深度学习和自然语言处理概述的章节，然后讨论了人工智能作为黑盒的本质。\n\
  -   然后我们添加了一些高级限制，比如页数（人们会失去阅读冗长章节的兴趣）。\n-   然后我们进入了将我们的想法转化为实际书写单词、句子、段落和章节的艺术。\n\
  \n虽然这种叙述反映了人类在撰写文档时的思考方式，但机器需要透彻理解这个过程。\n\n机器的方法将是：\n\n-   首先对整个文档应用分词方法，然后执行连续词袋模型以生成文档中出现的不同主题。\n\
  -   然后以主题作为参考点，学习哪些单词被用来生成该主题（单词“explainability”以 80%的概率定义“black box”为主题，“parsing”以\
  \ 55%的概率定义“NLP”为主题，等等）。\n\n*N-gram 作为特征*：N 个单词的组合称为 N-gram。与单个单词（unigrams）作为特征相比，N-gram（N\
  \ > 1）通常信息量更大。\n\n#### 跳元模型\n\n跳元模型背后的主要思想是确定两个不同的单词*是否相似，如果它们共享相似的上下文*。例如，在句子“to\
  \ err is human”（犯错是人之常情）中，如果你用“mistake”或“screwup”代替“err”，这个句子仍然是一个有意义的句子，并且表达相同的意思（即“is\
  \ human”）。\n\n跳元模型应用一个上下文窗口（一个包含 k 个连续术语的窗口）。你跳过其中一个单词，并尝试训练一个神经网络，该网络接受除跳过的单词之外的所有术语，并预测你跳过的那个术语。\n\
  \n#### 连续词袋模型\n\n在连续词袋模型中，目标是使用特定单词周围的上下文，然后预测该特定单词。在一个大型文本语料库中，每次你看到感兴趣的单词时，你都会考虑周围的单词（上下文单词）。你将上下文单词输入神经网络，以预测上下文中心的单词。\n\
  \n*统计特征*：文本数据也可以使用多种技术直接量化为数字。\n\n*词频-逆文档频率（TF-IDF）*：TF-IDF 主要用于信息检索目的。其目标是查找文档中单词的出现情况，而不考虑精确的顺序。\n\
  \n例如，你有 N 个文档。在任何文档 D 中，TF 和 IDF 定义如下：\n\n-   *词频（TF）*：术语“t”的 TF 是术语“t”在文档“D”中的计数。\n\
  -   *逆文档频率（IDF）*：术语的 IDF 是语料库中文档总数与包含术语“t”的文档数量之比的对数。\n-   *TF.IDF*：TF.IDF 给出了术语“t”在语料库中的相对重要性。\n\
  \n\n\n## 神经网络：黑箱之谜\n\n与我们大脑的工作方式类似，神经网络内部由多层相互连接的类神经元节点构成，包括一个输入层、一个输出层以及若干中间“隐藏”层。这些节点根据自身关联的权重执行数学运算，并将输入数据的内部表征传递给后续层级，最终在输出层通过预测汇总权重。深度神经网络拥有不止一个隐藏层。通过向神经网络输入成千上万的数据，你可以让它逐步微调特定层级中单个神经元的权重。最终结果是，所有层级的所有神经元经过复杂运算，共同加权产生最终输出。从原始输入到最终结果的路径极其复杂，历经无数次迭代和微调，这使得神经网络获得了“黑箱”的恶名——它无法解释自己是如何得出最终结果的。我们唯一能做的，就是尝试创建尽可能最佳的模型，并用我们能获取到的最无偏的数据来训练它。\n\
  \n神经网络训练的关键在于一个名为`反向传播`的过程。在此过程中，中间层的设置会被逐步修改，直到输出层与输入层达到最优匹配。你拥有的类神经元节点越多——即权重和中间层越多——学习过程就越复杂，即使最终能得出相当准确的预测。\n\
  \n拥有一个能对未见数据做出准确预测的模型是一回事，而无法解释模型如何得出准确预测则是另一回事。在许多现实场景中，能够详细了解内部决策过程是极其必要的，因为其后果可能是灾难性的。\n\
  \n### 窥探黑箱内部\n\n飞机上的黑匣子也被称为飞行数据记录器。它们几乎记录飞行途中的所有情况。这是一种极其安全的设备，一旦飞机发生任何意外，它就会成为研究人员和调查人员的关键真相来源。\n\
  \n人工智能的“黑箱”（指机器学习/深度学习算法）则被赋予了相反的含义——算法能给出预测，但它不一定能告诉你它是如何学会预测的，以及在学习过程中考虑了哪些因素。\n\
  \n这些“自学习机器”的开发者们也承认，一旦机器学习/深度学习算法训练完成，就很难理解它为何会对一组数据输入给出特定响应。这种不透明性引发了关于人工智能自主性、决策制定和责任归属的问题。\n\
  \n有两类活动定义了机器如何进行学习：\n\n*   知识收集（通过输入数据集，这些数据集有助于验证和提高预测置信度）用于得出准确的预测。\n*   将预测模型嵌入应用程序，不仅是为了自动化决策，也是为了持续学习和持续改进。\n\
  \n一旦预测系统训练有素，就该投入使用了。我们看到预测系统可分为两种类型。\n\n*   A 类应用：预测系统的后果可能对人们的生活产生不利影响。这些包括医疗诊断、贷款处理应用、简历筛选应用、自动驾驶汽车等。\n\
  *   B 类应用：预测系统的后果最多可能让人们感到不满意。这些包括看哪部电影、去哪家餐厅用餐、哪条通勤路线更快、你想阅读哪些新闻、你想购买哪些商品等。\n\n\
  对于 B 类应用，我们不太关心人工智能系统的不透明性；而对于 A 类应用，我们则极其渴望了解预测是如何做出的。\n\n神经网络通过多层互联结构处理输入数据来学习。第一层作为输入层，其中的“神经元”接收原始输入（例如一张人脸照片中的像素）。然后，神经元根据数学规则应用特定权重并得出一个分数。这一层汇总后的分数被传递给下一层节点。这个过程会持续经过网络中的所有层级和所有节点，直到到达最终的输出层。网络的最后一层作为输出层，将前面所有层级的分数汇总成一个预测，例如：“这是一张人脸的照片”。“深度”一词意味着更多的层数；它可以包含三层到数百层不等。\n\
  \n如果预测错误，神经网络会进行反向追踪，调整节点之间的连接，修正数学规则，逐步引导学习过程更接近期望的结果。通过调整参数以满足数百万个示例，神经网络创建了一个模型，该模型能够对从未遇到过的新图像进行分类或在新的条件下执行操作。\n\
  \n这种被称为深度学习的学习过程，使得神经网络能够创建专门解决特定问题（如图像识别、语音识别等）的人工智能模型，但这些模型过于复杂和繁琐，无法手动编码。深度学习的可贵之处在于，你无需告诉系统要寻找什么。你给它几百万张猫的图片，图像识别专家就会自己弄清楚猫长什么样。\n\
  \n由于神经网络本质上是自我编程的，它们常常会创建出人类无法完全理解的数据抽象表示。其决策过程被编码在节点之间数十亿次的来回信号中。\n\n许多专家认为这种不可解释性令人担忧。在人机对弈中这无关紧要，但在无人驾驶汽车的情况下却至关重要。如果无人驾驶汽车发生严重事故，仅仅说“我们就是不明白汽车为什么会那样做”是绝对不可接受的。\n\
  \n讽刺的是，我们（人类）正在构建这些预测系统，而我们追求的应用场景越广泛，人工智能成功模仿人类的途径就越多，因此人工智能就越擅长理解我们为何做我们所做的事，包括我们所有的偏见、成见和局限。\n\
  \n\n\n#### 揭开人工智能的黑箱\n\n围绕人工智能不透明性的担忧引发了激烈的争论。要建立一套系统性的方法来让 AI 具备可解释性，仍需数年时间，但目前实验室中已有多种方法在探索。这些方法可能各不相同，但目标一致：确保我们的机器不会进化到远超我们理解能力的程度。\n\
  \n一些研究人员正尝试将“解释训练”模块嵌入 AI 系统，这样对输入的任何调整以及由此产生的输出都能被自动记录。这种方法在不太复杂的 AI 算法中可能效果不错；然而，当你输入大量数据，且算法拥有众多层级时，再让“解释训练”模块监控一切，算法本身就会拖慢学习进程，这并非理想效果。另一些研究人员则试图开发“探测模块”，它能对网络行为进行“抽样分析”，从而理解这些系统是如何学习的。\n\
  \n“观察者方法”将 AI 系统视为一个黑箱。它是一个预先构建好的、专门用于解决特定任务的神经网络。你不是一次性输入整个数据集，而是通过逐步、逐块地输入增量数据来进行实验，并观察其行为。例如，不是一次性输入汽车的完整图片，而是将汽车的各个部件逐一输入神经网络，观察哪些部件（车头灯、前保险杠、侧视镜、挡风玻璃、部分可见的方向盘，或者像破裂的挡风玻璃这样的意外情况）会引导\
  \ AI 系统做出正确的分类。\n\n“解释网络”是另一种方法，它使用第二个神经网络来探测第一个神经网络。其目标是更深入地洞察原始神经网络中发生的微调与调整。\n\
  \n尽管这些方法无疑将有助于我们理解深度学习网络是如何做出决策的，但在达到那个状态之前，我们别无选择，只能对 AI 交付的结果建立一定程度的信任，就像我们对负责决策的人类抱有固有的信任一样。例如，我们接受陪审团成员做出的裁决，最多会思考哪些事实影响了他们的决定，但我们不会去盘问他们，或扫描他们的大脑活动来理解他们是如何得出最终裁决的。\n\
  \n#### 训练机器学习与我们对错误的容忍度\n\n在加油站当收银员并不需要大量的培训。即使在第一天上班，收银员也具备一些基本的会计知识来开始工作。第一天，新收银员可能显得动作慢、效率低，并且可能比有经验的同事犯更多错误。我们通常有相当大的容忍度，并接受这样一个事实：收银员正处于学习阶段，他学会这份工作只是时间问题。\n\
  \n我们通常不会想到这一点，但医疗从业者也是如此。我们感到欣慰的是，医学实践受到政府监管，不仅需要通过严苛的课程学习，还需要数千小时的实习经验，才能获得行医执照。如果有人想专攻心脏外科等专业，则需要额外的严苛课程和大量实习经验，以便观察并向专家学习。一旦某人获得行医执照，学习也并未停止。医疗从业者会继续从在职经验中提升自己。\n\
  \n什么是“足够好”，取决于我们对错误容忍度的偏见。我们对新收银员的容忍度要高得多，而对医生的容忍度则低得多。对于人类在不同工作中需要多少培训，我们对“足够好”有着不同的定义。\n\
  \nAI 也是如此。算法需要像医生和收银员一样接受训练。它们也面临着“足够好”的问题，并且需要做出权衡。\n\n以管理你 Gmail 的 AI 为例。Gmail\
  \ 应用会对收到的邮件进行垃圾邮件过滤，根据你的偏好整理收件箱，根据邮件内容设置日历条目，发送自动回复等。但它也经常出错。我们不会因此弃用 Gmail；我们认为它“足够好”，并且通过我们持续的包容（纠正它的错误），我们自费为\
  \ AI 提供了一个良好的训练场。\n\n相比之下，我们对无人驾驶汽车的容错率很低。我们以前从未有过无人驾驶汽车，也没有训练数据，那么 AI 是如何学习的呢？我们采取了一种巧妙的方法：让人类驾驶员驾驶第一代自动驾驶汽车行驶数十万英里，并在工作中训练\
  \ AI。这就像驾驶教练在让学员独立驾驶之前，先进行有监督的驾驶体验。关键问题是，我们是否应该认为自动驾驶汽车背后的 AI 已经“足够好”了？\n\n为了变得更好，自动驾驶汽车背后的\
  \ AI 需要在真实环境中进行无监督学习。但将不成熟的 AI 置于真实世界环境中，意味着让乘客面对一个相对“年轻且缺乏经验”的驾驶员。突然间，风险被放大，我们对错误的容忍度降到了最低点。然而，除非鼓励不成熟的\
  \ AI 在真实世界环境中运行，否则它永远无法学会在现实世界中成功运行和蓬勃发展的诸多细微之处。\n\n这就是棘手的权衡所在。让 AI 更早地进入真实世界环境可以加速学习，但可能带来严重后果（挑战我们的容忍度）。让产品更晚进入真实世界环境会减慢学习速度，但能为改进\
  \ AI 留出更多时间。\n\n## 结论\n\n我们为何如此关心算法的“可解释性”？在许多情况下，认为算法实施应极其谨慎的担忧是合理的。然而，随着我们不断为机器学习算法寻找新的应用，我们不应让对算法可解释性的关注，使我们忽视一个关于世界的残酷真相：人类是可预测的非理性生物，其可解释性并不比最不透明的算法高多少。\n\
  \n这就是区分两类 AI 应用——一类是替代基于规则和重复性的人类任务，另一类是替代基于人类判断的任务——之所以重要的原因。当我们特别关注算法替代人类判断任务的\
  \ AI 应用时，我们往往比对待前一类任务时更追求 AI 的“可解释性”。\n\n### 人类无法解释自己的行为\n\n人类存在认知偏见。我们甚至常常意识不到偏见是如何进入我们的思维过程的。当你要求人们解释他们的决定时，他们会感到不自在，难以解释自己为何那样做。面对相同的问题陈述和相同的行动，两个人会对自己为何那样做给出截然不同的解释。\n\
  \n### 算法是可预测的理性\n\n一个算法每次都会给出相同的答案。是的，当我们构建这些算法时，如果我们向它们输入我们的认知偏见和数据偏见，它们会持续地输出有偏见的结果。因此，当我们开始将“AI\
  \ 可解释性”作为一个关键因素来强调时，我们必须扪心自问：我们的结果是否比理解达成结果的过程更有价值？\n\n在下一章中，我们将讨论企业如何通过结合机器人流程自动化和\
  \ AI，开启智能自动化之旅，从而实现自我转型。\n\n\n\n"
- '# 5. 智能流程自动化 = RPA + AI


  机器人流程自动化（`RPA`）和人工智能（`AI`）传统上被视为两个独立且有些不对等的领域——各自为组织带来了显著的效率提升。


  你可能听说过智能自动化、服务交付自动化和认知自动化等术语，并且这些技术方案声称能够完全自动化你的企业运营。让我们退一步，批判性地审视这些营销宣传与现实之间的差距。


  在本章中，我们将讨论一些最佳实践，以理解`RPA`的含义，以及如何将`AI`能力与`RPA`相结合，从而在你的组织中实现重大的阶梯式变革。


  ## 机器人流程自动化（`RPA`）


  `RPA`是一类软件“机器人”，它们精确模仿人类的操作方式（例如登录系统、输入数据、执行工作流等）。它们与业务应用程序协同工作，如`ERP`和`CRM`系统以及许多其他应用程序。简单来说，由于这些软件机器人复制了人类活动，业务应用程序在很大程度上仍像以前一样运行，但无需大量人工参与。“机器人”一词指的是由软件驱动的能力，用于替代或增强人类任务。`RPA`主要试图记忆人类在业务应用程序的“表示层”（用户界面）所执行的活动。


  除了实现流程自动化之外，这些软件机器人相比雇佣人类员工要便宜得多，而且软件机器人不需要加班费，因为它们可以在需要时全天候工作。仅从成本优化的角度来看，软件机器人的优势极具吸引力。除了节省成本，`RPA`还带来了其他重要好处，例如：


  *   *准确性与合规性*：软件机器人每次都会以完全相同的方式执行业务流程，始终如一，产出结果一致。

  *   *响应速度提升*：软件机器人通常比人类更快，可以全天候工作而不会疲劳，甚至能以极低的成本扩展以承担更多负载。

  *   *敏捷且多技能*：只要输入-输出规则范式定义清晰且可衡量，软件机器人可以执行多种任务。


  将`RPA`应用于任何流程的一个条件是：输入、处理输入的规则以及输出，必须清晰定义，不能有任何歧义或对外部系统的依赖。当单个流程跨其他系统拥有多个接口，并需要以同步方式从其他系统获取输入时，所有这些依赖关系都需要清晰阐明；否则，瓶颈将使`RPA`效率低下。客户入职流程就是这种情况的一个典型例子，因为它涉及许多不同的步骤和系统，所有这些都需要清晰定义和映射。


  如今的机器人可以打开并阅读电子邮件中的附件；它们可以将文件从一个文件夹移动到另一个文件夹；它们可以遵循编程规则，例如`if/then/else`；它们可以从表单中提取数据或将数据输入表单；它们可以将数据定向到数据库和文件等数据存储中，或者将数据推送到集成的系统中，如`ERP`、`CRM`、财务、`HR`系统等；功能远不止于此。


  `RPA`的应用包括：


  *   *财务与会计*：供应商管理、差旅费用报销、发票处理、异常处理、问题解决、付款运行/周期、应付账款、应收账款、催收、月度结账、对账和会计核算等。

  *   *银行业*：数据验证、应用程序间的数据迁移、报告创建、表格归档、索赔处理、贷款发放、贷款服务等。

  *   *资本市场*：反洗钱与了解你的客户处理、数据修复、管理报告、客户报告、客户与顾问入职、许可证与注册处理、付款与资金归集、对账、资产转移、公司行动处理等。

  *   *保险业*：向代理人发送续保通知、信用检查、注册数据录入、在多个记录系统中更新客户信息、支付决策、索赔处理、每日银行对账等。


  软件机器人每次都会精确执行你分配给它们的任务。这一特性既是它们最大的优势，也是它们最大的弱点。说它是优势，因为机器人会合规且准确地执行流程。说它是弱点，因为如果业务规则或输入发生任何变化，甚至遇到之前未曾预料到的情况，软件机器人将完全不知道如何处理。例如，发票处理是一项工作量巨大的活动。你可以设计一个软件机器人来读取发票表单、提取关键实体、与你的`CRM`系统和支付处理系统进行验证，然后释放付款。如果你收到的所有发票都遵循单一模板，这是一个非常简单的流程。假设你正在引入一个新合作伙伴，而他们的发票格式与你之前编程处理的格式不同。你的软件机器人将无法处理它，你必须重新编程以适应这种变化。


  这种无法适应变化的情况凸显了`RPA`需要改进的两个方面，而这两方面都可以通过`AI`能力来补充。


  第一个限制是，当输入数据是非结构化的，没有预定义的格式时，例如客户电子邮件，或者通常包含相同信息但格式可变（如发票）的文档，就需要`NLP`能力来提取相关信息，然后将其输入软件机器人，以便高效执行任务。


  第二个限制是，软件机器人擅长将基于规则的推理应用于少量特定步骤，但它们无法进行更高层次的决策。例如，如果你有相对较少的业务规则需要应用来批准贷款申请，软件机器人可以做得很好。然而，当贷款审批流程变得复杂，不仅包含多分支、多依赖的规则，还需要与实时信用评分进行交叉引用时，你就面临着一个与判断相关的任务，需要`AI`的补充。


  ## 人工智能


  在前面的章节中，我们已经详细讨论了`AI`。在`RPA`的背景下，让我们从两个不同的类别重新审视`AI`的能力。


  ### 捕获和处理任何类型数据的能力


  第一个`AI`能力是处理任何类型数据的能力。借助大数据技术，我们不再局限于处理结构化数据。大数据技术实现的“读时模式”灵活性使我们能够收集和存储任何类型的数据（关系型结构化数据、非结构化数据、半结构化数据、机器生成数据、音频数据、视频数据和图像）。`NoSQL`数据库也使我们能够以可扩展、分布式且高效的方式处理这些数据。虽然这些进步最初是为了解决与网络相关的问题（搜索、文档管理、编目、关系网络等）而设计用于收集和管理数据，但随后出现了一些其他类型的问题陈述，需要跳出固有思维模式。例如，我们如何识别图像和解释语音？




  ### 将数据转化为洞察


  第二种人工智能能力是处理所有这些不同类型的数据，从中挖掘洞察。这正是`ML`（机器学习）、`DL`（深度学习）、`NLP`（自然语言处理）和神经网络发挥作用的地方。`NLP`有助于从非结构化数据中提取含义，而`ML`则有助于从数据中开发预测能力。深度学习和神经网络从数据中学习，以解决诸如识别照片中的人脸、理解口语以及生成口语等问题。


  在`RPA`（机器人流程自动化）的背景下，这些人工智能能力无疑可以作为一项补充技术。例如，`NLP`可以标准化并从文档、电子邮件、记录和日志中提取相关数据，即使这些数据是自由格式的，甚至当感兴趣的实体位于文档的不同位置时也能处理。以发票表单为例。日期有时可能在左上角，有时在右上角；物料清单在某些表单中可能表示为“单价乘以数量”，而在其他表单中则可能逐项列出，最后在底部汇总。描述在一个表单中可能是详细版本，而在另一个表单中则是编码版本。税额可能写在总金额上方，或者作为单独条目列在下方。仅依靠`RPA`能力来处理这种多变性将极具挑战性。即使你添加了足够的规则来应对所有这些不同场景，最终的程序也会变得极其复杂且难以管理。借助`NLP`和`ML`能力，人工智能可以轻松解决这些问题。


  对话界面（或聊天机器人）可用于促进人类与其他系统之间的交互。你以自然语言形式输入你的问题，人工智能会从那里接手，处理你的查询并回复相关答案。如果你不想打字，你可以与系统对话，人工智能将使用语音识别来理解你的查询，与后端系统交互，然后向你回传相关信息。尽管人工智能技术取得了所有这些进步，我们仍然生活在狭义人工智能的世界里。这意味着，擅长图像识别的人工智能无法生成文本，而擅长`NLP`处理的人工智能也无法提供推荐或最佳后续方案。因此，在`RPA`的背景下，需要考虑人工智能的补充。通过全面考虑你试图解决的问题，你将不得不将各种人工智能能力拼接在一起。


  `RPA`和人工智能是两种截然不同的技术，但它们却能很好地相互补充。例如，人工智能可以帮助处理各种非结构化数据并构建丰富的知识库，然后`RPA`技术可以有效地利用这些知识库来自动化任务。随着企业将`RPA`的应用范围从那些易于实现的自动化任务类型问题中拓展出来，他们应该开始关注人工智能，将自学习能力引入到`RPA`领域本身，并使其业务流程实现智能自动化。


  ## 自动化与智能：协同工作


  当你将`RPA`的自动化能力与人工智能的自学习能力结合起来时，你看到的是技术解决方案的融合，这不仅能改善你的运营和客户互动，还可能创造新的商业模式。许多公司开始认识到结合这两种技术来解决问题的潜在好处，尤其是在由于大型遗留系统或包含多次跳转和复杂集成模式的旧业务流程而放大运营效率的情况下。


  让我们首先理解为什么需要智能自动化。


  ### 对更快周转的需求


  在高度竞争和快节奏的商业环境中，最关键的企业指标衡量的是公司对客户和市场的响应速度。为了实现这一点，面向客户和面向市场的应用程序需要近乎实时，而后端系统也需要进行改造以匹配前端的处理速度。这种双重转型挑战需要精心协调，因为大多数后端系统是在数十年手工编码程序的基础上演变而来的。组织迫切需要能够快速带来这些双重变化的解决方案。


  ### “直接迁移”的终结


  企业寻求的变革，并非采用新技术以老方法完成相同任务，只是配上吸引人的用户界面或提升用户体验。他们寻求的是真正的变革，即系统变得足够智能，能够适应不断变化的业务动态和客户偏好。对新技术的简单“直接迁移”方法不会使企业变得高效，真正的需求是寻找超越成本节约或运营便利性的、具有颠覆性和可证明的商业价值。


  ### 期望值已提高


  决策者不满足于稳健但僵化的业务系统。他们期望业务系统具有适应性和响应性。他们希望自己的业务系统不仅能完成其设计的工作，还能主动为他们提供额外的洞察，以便他们能够做出更明智、更好的决策。




  ## 智能流程自动化之旅（IPA = RPA + AI）


  人类编纂了基于规则的系统，用以自动化流程并解决过去的问题。人类还开发了人工智能技术，通过观察进行学习，并解决那些依赖于判断的问题。如果将这两种截然不同的解决问题的方法结合起来，会怎样呢？本质上，智能流程自动化利用了人类的学习和适应能力，并将这些能力注入到流程再造计划中。当你将传统的基于规则的自动化设计与自学习能力相结合时，你便得到了
  IPA，它不仅能复制人类的判断和技能，还能随着时间的推移，学会更好地完成任务。


  当自动化嵌入了判断力，或者在有人员参与的情况下得到支持时，它正在重新定义企业中任务的分配和执行方式。最初，IPA 主要用于制造流程，后来才在其他职能中零散应用。如今，它正日益成为企业各项职能中不可或缺的一部分。


  各组织正在构建 IPA 系统的整体架构，因为它有潜力成为推动企业全面转型的关键载体。踏上“IPA 之旅”的时刻确实已经到来。自动化与否已不再是问题。这种新热情的主要刺激因素，来自于实施
  RPA 的组织在生产力上实现了显著的两位数增长。RPA 工具在吸收了增强智能能力以模仿人类智能后，还将进一步发展。随着它们变得更加智能，我们也将看到它们执行更多智能和复杂的任务，例如规划、预算编制、分析和决策，这些任务曾被认为只属于人类。


  在我们探讨 IPA 的构成之前，首先来破除一些关于自动化的迷思！


  - **RPA 将提高生产力并降低成本**：是的，通过自动化业务流程，确实可以提高生产力并降低成本。然而，与之相关的变革管理方面需要仔细评估。通常会发现，生产力提升和成本降低的成果，会被管理变革所需的额外开销所掩盖。


  - **在应用 RPA 之前，你需要提高流程的成熟度**：这不是一个先决条件，而是一个美好的愿望。RPA 的唯一目标是将你的流程分解成更小的模块，并找到自动化它们的方法。这样，端到端的流程要么可以完全自动化，要么可以部分自动化。无论哪种方式，你都将为你的流程和运营引入变革性的能力。


  - **鉴于供应商工具的成熟度，你可以快速在生产环境中部署软件机器人**：答案是——视情况而定。如果所讨论的流程深埋在某个后端系统中，过去没有太多人工参与，并且或多或少是一个独立的子流程，那么答案显然是肯定的。然而，如果该流程与其他系统有依赖关系，具有包含多个人工验证点的工作流，并且处理某些相当复杂和敏感的数据，那么你需要谨慎，不要急于投入生产部署。建议先进行长时间的试点解决方案，评估解决方案的有效性和效率，规划适当的变革管理计划，然后再投入生产部署。


  - **关键的成功标准是你部署的机器人数量**：如今，引用生产环境中机器人的数量，作为阐述组织自动化旅程和成熟度的代名词，已成为一种趋势。在我们看来，重要的不是数量，而是效能和效率。一方面，你可能通过自动化手动活动减少了全职等效员工（FTE）数量，但另一方面，你也在劳动力组合中增加了机器数量。这些机器也需要监督、治理和维护工作。因此，每个“机器人”的利用率可能是衡量自动化效能的更好指标。


  - **为什么先做 RPA 再做认知？可以直接跳到认知阶段**：RPA 是一个将输入映射到输出的直接过程，而认知则意味着你引入从数据中学习的能力来动态地实现自动化。这需要一定程度的数据、流程和知识库的成熟度。如果你没有简化你的流程，产生的数据将是碎片化和不连贯的，这意味着要应用机器学习，你必须承担管理和整合数据的繁重工作，这反过来意味着你需要更长的时间来训练你的机器学习模型，以实现你所期望的自动化。因此，建议从
  RPA 开始。它将是你自动化旅程中的一块垫脚石，并为组织在长期内成为自主型组织做好准备。


  IPA 不仅仅是一个工具，它由五项核心技术能力组成，这些能力集成在一起，提供了一个可以构建和部署智能自动化解决方案的平台：


  - **机器人流程自动化（RPA）**：一种软件，使你能够开发“机器人”来自动化那些具有明确定义的输入、基于规则的处理模式和可衡量输出的任务。就像人类操作员拥有登录业务系统的
  ID 一样，RPA 也会有一个用户 ID。它会记住人类操作员在业务系统中的操作，并开始模仿基于规则的任务，例如访问用户界面、执行数据输入或验证、创建文档和报告，以及触发下一组操作。


  - **智能工作流**：一个流程管理应用程序，用于集成由人类和机器人执行的任务。智能工作流系统将编排不同用户（包括机器人和人类用户）之间的交接，以高效地执行任务，并实时监控端到端流程。


  - **机器学习**：算法在识别数据模式方面发挥着至关重要的作用，例如在流程流中观察到的新场景或罕见场景。如果这些场景不通过预测技术来处理，将会在流程流中造成巨大的瓶颈。还有其他一些场景需要人工验证才能进入下一组流程步骤。在这种情况下，机器学习算法可以为人工操作员提供建议和下一步最佳行动，以便高效地推进流程。


  - **人工智能能力**：一组专门的人工智能能力，用于处理非结构化数据，包括文档、图像、视频和语音。业务流程最终往往需要管理和创建各种数据类型。在许多场景中，业务系统的输入可能是图像、视频和语音的形式。需要人工智能能力来管理这些数据类型，以便提取相关信息并将其传递给执行任务的智能工作流和机器学习程序。




  *认知代理*：自维持的模块化可执行程序，像虚拟工作者（或“代理”）一样，能够执行任务、与系统、人类或其他代理通信、从数据集和环境中学习，甚至基于“情绪检测”做出决策。认知代理可以是被动的，仅在请求时协助其他代理或人类；也可以是主动的，观察流程的整体健康状况，并在发现瓶颈时立即采取行动。


  现在，我们了解了不同技术如何结合以提供强大的平台，下一个问题是：IPA 平台在现实世界中表现如何？


  让我们考虑贷款审批流程。人工贷款处理员需要点击操作多个系统，如 CRM、贷款账户应用程序、风险分析系统、法律与合规系统、外部信用机构系统等，以提供“常规业务”服务。借助
  IPA，机器人将从这些不同系统中提取所有信息，并整齐地排列好，供人工处理员进行判断，从而节省大量点击操作。NLP 程序将启动，扫描与贷款申请人过去的互动记录（电子邮件、语音通话、投诉和偏好），并解读文本密集的通信内容。ML
  算法将根据相似档案和过往风险提供警报，或推荐下一步最佳行动。最后，认知代理将启动与贷款申请人的交互式通信，并提供系统与人工之间交接的实时跟踪（见图 5-1）。


  ![../images/467925_1_En_5_Chapter/467925_1_En_5_Fig1_HTML.png](img/467925_1_En_5_Fig1_HTML.png)


  图 5-1 智能工作流：从执行到思考


  您的组织需要以有条理且深思熟虑的方式引入自动化和智能。以下部分讨论了一些需要避免的常见陷阱。


  ### 制定基于价值的战略


  组织应批判性地评估许多供应商工具背后的炒作。他们需要对其组织内智能流程自动化的业务收益建立现实的认识。他们需要客观评估当前业务流程的状态、客户未满足的需求、市场趋势、员工生产力指标以及员工敬业度指数。然后，他们应确定一套全面的、基于价值的机遇，而不仅仅是节省成本。他们应进行适当的研究，了解如何利用内部和外部数据集来改造前端应用程序和后端系统。


  ### 确定机遇的优先级


  鉴于智能流程自动化在改造业务方面的潜力，很自然地会遇到这样的情况：业务职能负责人有其自己的优先级，而 CIO 组织也有其自己的优先级。一种在组织边界内设定优先级的明智方法是，创建一个跨业务流程的智能自动化机遇热力图。通过审视所创造的业务价值与实施时间的关系，您可以列出一份业务流程清单，然后制定一份
  IT 就绪计划，以描绘您当前的能力与实现业务转型所需的其他技术变革之间的差距。


  ### 确定试点场景


  在选择机遇时，也要仔细考虑其影响。流程可能运行在非常古老的遗留代码上，没有可用的文档，跨系统完成端到端流程存在多次交接，并且流程中嵌入了过多的判断调用。如果您发现的是这些情况，务实的做法是退一步，先寻找更简单的系统或流程来处理。您需要选择几个能够立即交付业务价值的简单场景，这些试点的成功必将帮助您切入其他复杂场景。


  ### 制定路线图


  我们经常看到，业务职能和 IT 领导者急于开展多个试点，然后宣布他们已准备好进行大规模的企业级实施。进行试点并处理较小、较简单的任务本身并没有错。然而，当您想要启动企业级的转型项目时，您需要一份路线图。智能自动化的影响超越了任务自动化本身。它会对各个职能和角色产生变革管理方面的影响。您的路线图应包含一个时间表，以及一套清晰列出的项目，以解决技术、组织、人员和运营方面的潜在变革。自上而下的支持是成功实施智能自动化的关键。请参考图
  5-2 了解智能自动化旅程图。


  ![../images/467925_1_En_5_Chapter/467925_1_En_5_Fig2_HTML.png](img/467925_1_En_5_Fig2_HTML.png)


  图 5-2 智能自动化旅程图


  ### 整合流程与技术


  有足够多的“低垂果实”用例（至少在运营领域）可以使用简单的 RPA 成功实施；然而，当您试图为跨业务职能和 IT 系统的复杂流程带来变革力量时，简单的 RPA
  工具往往无法胜任。供应商在支持涵盖我们之前讨论的智能自动化平台五个关键组件的整体架构方面，能力差异很大。组织需要严格评估供应商在这一领域的能力，特别是要确保新系统能与整个企业生态系统无缝集成。他们必须建立性能监控机制，以管理和监控整个智能自动化项目。


  ### 建立操作流程和治理模型


  随着自动化模仿人类重复性任务，以及人工智能提供类似人类判断的能力，企业员工队伍和标准操作流程预计将经历巨大变革。在人类与认知代理在持续学习的环境中互动时，职能和技术团队必须找到协作方式，并理解谁对什么负责。


  从历史上看，企业已经发展并变得更善于管理人力队伍。标准、最佳实践和人力资源流程旨在评估和奖励人类绩效。当有机器参与其中时，您将如何执行这些实践？


  更广泛地说，公司可能正在坚定地采用“自动化和智能优先”的方法，而没有对操作流程和治理模型给予足够的重视。




  ### 建立变革管理计划


  智能自动化将改变我们迄今为止的工作方式。可以肯定的是，许多传统岗位将失去其重要性，并且可以理解的是，员工会产生抵触情绪。变革管理计划对于应对以下几个挑战至关重要：


  -   需要培训管理者，以监督机器与人类协同工作的流程。

  -   需要培训员工采用敏捷方法，尤其是在他们必须跟上机器速度的情况下。

  -   需要培训高管，以建立关于人机职责分离的明确指导方针。

  -   公司整体层面需要建立新的沟通渠道，以管理员工对失业的担忧，并启动新计划来引入新岗位（情商技能、新技术技能）。


  智能流程自动化既是礼物，也是谜题。说它是礼物，是因为如果实施得当，它能确保快速回报；说它是谜题，是因为目前尚无关于如何在同一环境中成功管理协同工作的机器与人类的指导方针或先例。接下来，我们将尝试概述如何开启你的智能自动化之旅。以下是一些最佳实践，可帮助你定义自己的旅程。


  ## 你的 IPA 之旅：首个 100 天


  **第 1 至 30 天：提高认识，协调职能，并动员起来，包括强有力的自上而下的支持：** 最初的 30 天主要是与你的业务高管和 IT 领导者沟通，并统一期望。IPA
  计划成功的关键不在于技术解决方案的稳健性，而在于建立强有力的变革管理计划，并提高业务和 IT 职能部门对 IPA 将如何为组织带来效率的认识。你必须有一个总体规划，详细说明各项举措、时间表、预期的颠覆或影响程度、针对每项举措的变革管理计划、每项举措的负责人等等。如果你的
  IPA 路线图是围绕完整的端到端流程（例如，从贷款发起到最后放款）来组织的，而不是围绕任务（例如，贷款审批任务）来组织的，那么它将为你提供一个整体图景，让你了解可以实现多少自动化、哪些环节仍需要人工参与，以及你将交付什么样的业务成果。


  **第 30 至 60 天：评估机会并进行概念验证：** 每个组织都面临着交付强劲利润和将效率杠杆引入运营的压力。因此，看到每个业务部门都争相列出他们想要自动化的流程清单，也就不足为奇了。如果你要求他们确定优先级，他们可能会大声宣称自己的每一项举措都是重中之重。因此，你需要迅速决定一种适用于你组织的方法论（从评估到部署）。你需要创建一个基于目标的框架来评估和确定自动化机会的优先级。这不仅有助于你有效管理对自动化的狂热追求，还能帮助你识别那些能在
  IPA 之旅早期就交付业务价值的速赢项目。除了高层次的流程自动化地图，你还必须深入几步，对已识别的部分自动化机会进行概念验证，以评估自动化的复杂性和实用性。这将帮助你初步了解暂定的时间表、你需要的任何其他技术或存在的功能差距。最重要的是，概念验证将为你提供一个足够好的机会，向业务高管和
  IT 领导者宣传你的 IPA 之旅进展。


  **第 60 至 100 天：建立治理模型并开始规模化开发：** 一旦你完成了概念验证，并对将采用哪些产品、工具和流程有了足够清晰的认识，你就需要全力以赴推进自动化之旅。在任何时间点，你很可能都有处于不同生命周期的不同流程。有些可能处于需求阶段，有些处于开发阶段，还有些处于变革管理阶段。建立一个治理模型来处理依赖关系、瓶颈、升级、路线纠偏等问题至关重要。在首个
  100 天之后，基础设施需求将成为规模化投入生产的关键要素。你需要定义并开始建立一个 IPA 卓越中心，该中心将围绕基础设施规划、标准、最佳实践、技术和功能审查等提供关键指导。


  你的 IPA 之旅并非以将机器人部署到生产环境中而结束。事实上，旅程在部署之后才刚刚开始。你需要跟踪和监控机器人的有效性，并确定它们是否在实现业务目标。最初几次部署的成功经验需要在组织内传播，以便让其他观望者受到激励，加入
  IPA 之旅。你将需要“自动化布道者”来倡导 IPA 目标。


  现在，如果你的 CEO 要求你提出一个运营模式，让公司踏上 IPA 之旅，请记住，该运营模式需要围绕几个关键要素来构建，这些要素将使关键利益相关者能够成功完成任务。这些要素对于设计一个灵活而稳健的
  IA 计划至关重要。




  ## 成功实现 IPA 之旅的 15 个关键要素


  尽管 RPA 听起来简单易行，而 AI 有其自身的技术复杂性，但智能自动化之旅确实需要周密的规划、协调的行动以及大量的严谨性才能成功。组织最好遵循以下这些关键基本原则：


  1.  *从概念验证开始*：虽然 RPA 作为一个概念可能已被理解，但通过一个快速可行的试点项目来展示 RPA，将激发热情并有助于消除怀疑。


  2.  *设定合理的期望*：少承诺，多交付。这条古老的智慧在这里同样适用。围绕潜在收益设定现实的期望会有所帮助。因此，避免围绕 RPA 能为企业或个人实现什么目标而制造炒作或狂热。让人们被最终结果所打动。


  3.  *拥有稳健的解决方案重点*：投入精力构建正确的解决方案，以应对大多数变化、交接和流程目标。通常，30% 或更少的时间花在实际的 BOT 配置上。


  4.  *识别并引入倡导者*：即使是为了共同和个人的利益，变革也常常遭到抵制。因此，RPA 主导的转型需要强有力的支持和赞助。在旅程伊始就识别出职能领导者和意见领袖，对于无缝实施
  RPA 采用也至关重要。


  5.  *利用互补工具*：保持警惕，识别和探索能够补充和加强（例如，OCR）RPA 实施的工具。


  6.  *遵循速赢交付方法*：与大型复杂的自动化项目相比，采用较小、可管理的自动化集合，成功的机会更大。遵循通过构建-测试-部署流程来微调解决方案的迭代过程。


  7.  *明智地选择流程*：第一步的成功将对这一迁移之旅的成果产生重大影响。因此，选择第一批流程对于整个计划的成功至关重要。初始流程必须是那些几乎内置了成功要素，同时过渡的不便或痛苦最小的流程。一旦初始阶段取得成功，必然会获得更大的组织支持。


  8.  *让 IT 成为旅程中不可或缺的一部分*：RPA 的价值必须由业务和 IT 团队共同创造。鉴于自动化的实施和启动周期短，这要求业务和 IT 部门和谐合作，否则必然会导致时间延误和资源浪费。


  9.  *同时跟踪和收获收益*：实际收益只有在节省的时间被有效重新部署时才会显现。跟踪基准线上的实际节省非常重要。


  10. *为可持续性做规划*：将结构和治理制度化，以有效管理已交付的自动化项目，并对机会管道进行优先级排序和交付。采用整体策略来构建、重建和维持人才。


  11. *运营模式*：在智能自动化生命周期中执行任务所需的指南和政策；需要更新现有的企业指南和政策，以反映人机协作模式，例如业务连续性计划、数据安全与合规性以及发布管理。


  12. *标准*：用于一致管理智能自动化活动的标准和实践，例如异常管理和日志记录、编码标准、文档标准以及部署和就绪检查清单。


  13. *关键绩效指标和度量*：涵盖智能自动化解决方案不同方面的度量，例如流程绩效度量和生产力度量。


  14. *方法*：确保跨职能采用一致方法的框架/途径，例如流程评估框架、流程优先级排序框架、商业案例框架、变更请求框架和异常管理。


  15. *治理*：明确的责任划分和审查机制，以确保冲突得到迅速处理，例如决策矩阵/RACI 框架，以及会议和报告节奏。


  ## 结论


  当前，围绕自动化无疑存在着大量的兴奋点。仅靠 RPA 就能带来显著收益；然而，为了使自动化可持续并实现真正的企业级转型，需要将 AI 能力纳入其中。产品供应商已经抓住了这些流行语，并大力在其
  RPA 工具中营销认知能力。因此，当你开始自动化之旅时，理解现实与炒作之间的差距，并规划自己的路线图至关重要。


  需要警惕的是，RPA 和 AI 并非万能技术。然而，通过客观评估你自己的用例，并通过将 RPA 和 AI 技术整合到流程中来设计你的自动化方法，你可以提高生产力，并使你的组织更具响应性。


  除了技术基础之外，成功的智能自动化实施还需要强大的变革管理计划，以应对不确定性及其对组织和运营职能以及员工的影响——员工往往是任何大规模转型计划的最终承受者。


  在下一章中，我们将讨论网络安全这个有趣的世界，包括 AI 对安全的影响，以及公司如何保护其系统和流程。




  '
- '# 6. 网络安全与人工智能


  长期以来，网络安全一直是人类之间的战争。保护机制在很大程度上是一种“封锁边界”的方法，通过防火墙、代理、杀毒软件、访问控制、动态密码等方式实现。然而，随着战场转变为人类与机器之间的对抗，这些旧方法开始显得力不从心。随着企业系统环境入口点的不断增加以及作为终端的联网设备越来越多，关于安全漏洞的新闻比以往任何时候都更加频繁地出现。


  云化、物联网和 BYOD（自带设备上班）都在催生包含大量用户敏感数据的微环境。如果这些设备落入坏人之手，无疑会导致严重后果。当你考虑到新型攻击（其中大部分是机器设计的）时，情况就更加令人担忧了。例如，自适应恶意软件就是利用机器学习技术创建的。这种恶意软件可以渗透系统，收集并传输有关该系统的数据，并且数天内不被发现。


  应用收集数据泄露、恶意软件类型和网络钓鱼活动信息，然后创建签名这种旧方法，已不足以应对下一代网络攻击。威胁是真实存在的，而且由于我们周围日益增长的数字化，威胁也被放大了。标准的自动化威胁检测系统，尽管在复杂性上有所提高，但在快速应对意外或新形成的威胁方面仍面临挑战。


  需要一种新方法来持续监控大量因素，并检测什么构成异常活动。简而言之，他们需要应用自学习技术来发现可能是恶意活动的行为，而无需被告知要寻找什么！这种新方法可能类似于我们身体的免疫系统，其中白细胞和抗体不断扫描并中和任何不符合体内正常运作模式的生物体。这就是人工智能发挥作用的地方。机器学习算法可以通过持续观察什么是异常行为来识别潜在的安全漏洞或攻击，并且如果被授予权限和正确的凭证，它们可以在感知到威胁时自动关闭系统，从而减少或隔离整个企业的风险。


  然而，这种方法存在一些挑战。机器学习缺乏区分真实威胁所需的一般知识。这会导致过多的误报、过多的错误警报以及系统频繁关闭。为了让人工智能在网络安全中发挥决定性作用，必须谨慎对待它，并将其应用于它能解决的问题。


  一种人机协作的混合方法可能是网络安全的潜在解决方案。神经网络可以从海量数据中学习，包括访问公开的网络安全文献来发出警报，然后由人类网络安全专家正确分类。这种人机协作方法最终将使机器足够智能，能够自主检测、分类并采取纠正措施。目前有多个处于不同成熟阶段的人机平台实例。


  `AI2`——来自麻省理工学院计算机科学与人工智能实验室（CSAIL）——是一个结合了机器学习与人类专家的网络安全平台。机器学习算法在海量数据上进行训练，以预测潜在的威胁。人类专家则负责验证和分类威胁以及关联严重性标签等判断相关任务。


  如今的网络攻击会隐藏其在系统中的存在，这使得安全分析师难以在海量系统和网络生成的数据中精确定位这些攻击。IBM 的`Watson`利用自然语言处理能力分析数百万份以前无法访问的文档、日志和研究论文，以提供更完整的威胁图景。`Watson`还会生成关于这些威胁的实时报告，以大大加快问题识别和后续问题解决流程。


  微软最近收购了`Hexadite`，以提供完全自动化的事件响应解决方案，使组织能够调查其收到的每一个网络警报并实时关闭事件。谷歌正试图为安卓安全开发基于机器学习能力的网络安全产品。


  机器学习能够定位在庞大的数据流中可能被轻易忽略的问题。为了理解如何将机器学习应用于网络安全，我们首先需要回答这个问题：我们的目标是什么？


  广义上讲，我们的首要意图是检测异常——发现恶意行为或恶意实体。然而，要发现异常，我们必须首先定义什么不是异常！这就是挑战所在。例如，从在线阅读早间新闻到购物、旅行预订再到执行工作相关活动，我们以多种不同的方式使用笔记本电脑。也可能存在不常见的模式，比如下载游戏或整理度假照片。你如何区分什么是正常的？你下载的游戏极有可能触发某些恶意软件？或者你使用免费软件整理的照片实际上可能引入安全漏洞？本质上，最强大的安全威胁不仅仅是统计上的离群值。


  ## 将机器学习应用于安全


  机器学习可以引入巨大的能力，并彻底改变迄今为止网络安全处理的方式。


  - *检测*：实时追踪海量系统和网络生成数据中的异常行为，以发出警报并协助人类进行验证和采取适当行动。


  - *防护*：识别漏洞并确定其优先级以采取行动，包括在某些情况下（当预测能力达到显著置信水平时）自动处理漏洞。


  - *预测*：算法与人类协同工作，从每次攻击中显著提高机器的学习能力，并开发更先进的反恶意软件技术。


  - *终止*：凭借改进的预测能力，你不仅可以识别恶意软件，还可以以自主方式终止它。


  现在让我们深入探讨将不同机器学习技术应用于网络安全相关场景。有两种方式来看待可能的用例：


  - 将监督学习应用于大量良好的历史数据（其中数据集已标记），以持续改进预测能力。


  - 应用无监督学习，通过聚类和降维技术，从海量系统和网络生成的数据中找出一些规律。




  ### 用于网络安全的监督式机器学习


  在网络安全领域，监督式学习最常被提及的应用场景是恶意软件分类和垃圾邮件检测。对恶意软件进行分类，首先要识别文件是否具有危害性。同样地，通过观察内容中的模式，机器学习可以将其归类为垃圾邮件或非垃圾邮件。


  监督式学习在网络安全领域之所以效果显著，是因为有数百万个已标记的数据可供使用。神经网络在这些标记数据上进行训练，以识别异常模式，例如入侵检测、恶意软件检测、网络钓鱼攻击等。以
  Gmail 为例，监督式机器学习算法会扫描无数变量，如源 IP 地址、源位置数据、用词选择、邮件内容中的短语以及许多其他因素，以判断邮件是否符合异常模式。如果符合，它就会将该邮件从收件箱移出并放入垃圾邮件文件夹。


  随着企业寻求解决方案来应对日益增多的自带设备（BYOD）和自选设备（CYOD）所带来的威胁，监督式机器学习正被嵌入到移动设备中。例如，谷歌正在使用机器学习来分析针对移动端点的威胁。


  在网络安全领域，监督式机器学习的真正优势在于，它能够自动化处理重复性任务，例如像“战术救火”一样手动响应工单并运行脚本来修复恶意软件。这将解放分析师，让他们能够专注于更重要的任务，例如对威胁情报进行分类。


  为了使监督式学习更加有效，它需要海量且优质的标记数据集。如果没有这些数据，我们就无法训练算法。


  ### 用于网络安全的无监督式机器学习


  无监督式学习没有明确的目标要实现；然而，它可以帮助减少海量数据集中的杂乱信息，使其易于安全专家进行进一步分析。上下文和专家知识库是理解原始数据的两个关键方面。这正是无监督式学习可以发挥巨大作用的地方。


  例如，麻省理工学院计算机科学与人工智能实验室（CSAIL）开发了一个自适应机器学习安全平台，该平台帮助分析师每天审查数百万次登录，然后对活动进行情境化处理，从而将误报率降低到几乎可以忽略不计的程度。


  为了更好地理解不同数据集中所涉及实体的角色，我们不仅需要提取实体，还需要为其关联上下文。我们不应孤立地查看网络流量日志，而需要添加上下文来理解数据，例如关于设备、应用程序或用户的信息、特定位置的数据、该设备是否应该响应
  DNS 查询等等。如果它是一个 DNS 服务器，那么这完全是正常行为；但如果不是，该行为则可能是攻击的迹象。


  专家知识库有助于人类专家快速分析问题并找到潜在的解决方案。像贝叶斯信念网络这样的机器学习算法，当应用于海量数据集时，可以生成图形模型和相关因子，从而对不确定性进行推理。这种方法在构建专家系统方面非常有效，这些系统不一定能立即解决所有问题，但可以通过协助安全分析师处理日常工作，使他们更高效。与其让分析师查看庞大的数据集，然后将其与已知问题和解决方案进行交叉比对（这是一项耗时的工作），不如通过带有相关因子、依赖路径和概率度量的可视化表示，在极短的时间内让分析师对实体有更深入的理解。


  ## 首席信息安全官的人工智能与网络安全行动手册


  随着越来越多的企业走向数字化，网络安全意识也在不断提高。他们正在认识到自己的网络容易受到攻击。新出现的共识是，仅靠 IT 部门无法处理安全问题；所有员工，尤其是
  C 级高管，都需要发挥作用。事实上，高管不仅要负责本部门的数据安全，还要负责推动员工广泛采用网络安全最佳实践。


  风险因行业而异。对于电力公司来说，网络安全的最高优先级是通过防止网络攻击者破坏电网来确保持续供电。对于零售商来说，是保护信用卡记录和客户数据。对于航空业来说，是保护空中交通管制系统，以确保乘客和机组人员的安全。对于首席信息安全官（CISO）来说，网络安全不仅仅是制定一份需求清单，而是将网络风险主动管理在可接受的水平。如果你是一名
  CISO，你需要制定一个与你所在行业相关的网络防御计划。


  以下是在制定网络防御计划时需要考虑的一些最佳实践。




  ### 入侵发生前


  将入侵防范准备纳入组织的日常安全规程，应成为任何企业的常规操作。多层网络安全防护能最大限度减少防护漏洞。除防火墙、入侵防御和反病毒技术外，还应考虑部署高级情报能力，以便及时掌握自身网络边界之外的新兴威胁。持续性的安全措施同样有助于保护手机、平板等异地及远程设备。


  由于网络威胁态势不断演变，新型安全解决方案层出不穷，企业需要定期审视安全策略。以下问题有助于制定策略框架：


  - 当前网络风险对企业的影响程度及业务冲击如何？

  - 针对这些风险有何应对计划？

  - 是否建立了升级矩阵和沟通计划，明确高管层在评估网络风险业务影响中的职责？

  - 与行业标准和最佳实践相比，企业的网络安全准备度处于何种水平？

  - 是否建立了系统化的常规网络事件收集、分析、检测与响应机制？

  - 网络事件响应计划的全面性如何？测试频率是多少？


  网络攻击防范需要制定协调一致的响应计划，全面考虑组织可能面临的所有威胁。研究安全最佳实践及其他企业（尤其是同行业企业）的失败案例，是极佳的起步方式。此外，与财务、人力资源、市场营销等部门的同行开展讨论与研讨会，有助于识别相关威胁并构建防御体系。


  如同消防演习，企业应制定场景化响应方案并定期测试，根据需求持续修订完善。需构建网络攻击模拟场景，例如：网站被篡改后攻击者正在访问机密记录、从网络窃取敏感数据等。安全分析师与
  AI 系统必须像应对真实攻击一样，经历问题发现、识别、优先级排序及处置的全流程。除制定事件响应计划外，渗透测试和红队演练有助于评估安全系统与流程的实际状态。


  企业需开展评估以全面审查安全环境，针对自身漏洞创建并执行逼真的威胁场景，由安全团队进行响应。


  以下网络安全评估可确定如何最有效地准备和应对不可避免的攻击：


  - **入侵评估**：运用广泛威胁情报与安全专业知识，判断企业是否曾遭入侵或正遭受攻击。评估报告包含进一步调查、遏制及长期安全改进建议。

  - **主动式目标测试**：针对常攻击本行业的攻击者所使用的工具、战术和程序，评估安全措施的有效性。

  - **渗透测试**、红队演练及其他目标导向测试：可详细说明风险、被利用概率及潜在业务影响，并提供可操作建议。

  - **安全项目评估**：对照关键安全领域的最新行业标准，审查安全组织架构、实践与流程。该全面评估提供包含优先级建议的路线图，以弥补基于漏洞、攻击趋势及潜在恶意活动的防护缺口。

  - **响应就绪评估**：审查安全运营与事件响应能力，评估检测和应对攻击的水平。最终交付物包含带优先级建议的安全路线图。


  ### 入侵发生时


  当安全事件实际发生时，所有前期规划与安全演练都将接受检验。组织的安全事件响应团队在发现入侵后必须立即行动，需确定攻击者位置、攻击目标、渗透程度及在系统中潜伏的时间。


  作为首席信息安全官（CISO），可考虑聘请安全顾问提供事件响应咨询。此类专家通常了解最新演变的安全威胁，并具备防御这些攻击的知识、技术与技能。


  与应对攻击同等重要的是决定如何向外界披露事件。鉴于法律披露要求及事件公开化的可能性，隐瞒入侵已不再可行。若已知晓遭入侵，必须争分夺秒全面掌握事件经过及应对措施。但需谨慎决定披露内容、对象及时机。部分企业出于企业责任感选择尽可能全面披露。


  制定沟通计划可确保通过适当渠道，及时向相关监管机构和公众发布准确信息。与法律顾问及公关伙伴协作至关重要，不仅要确定如何向客户、供应商、员工和公众展现最佳姿态，还需明确相关法律要求。内部协调法律顾问与公关部门是关键环节。


  虽然披露决策至关重要，但入侵期间更需关注的是控制局面、清除网络中的攻击者，并尽快恢复正常运营。




  ### 安全事件发生后


  当企业从安全事件中恢复运营后，高管们应扪心自问一个关键问题：“这种情况会再次发生吗？”他们需要建立一个框架，用以识别系统中的漏洞和薄弱环节，并决定改进的内容与方式。改进措施可能包括强化防火墙、升级保护电子邮件、终端或移动设备的安全设备。如果入侵者是通过先攻破合作伙伴的网络进而访问你的网络，那么这一漏洞必须得到解决。


  由于企业的核心业务并不包含情报收集工作，越来越多的公司正在寻求提升对自身所面临威胁的认知能力。他们通常会与一家服务提供商签约，由该提供商识别各种潜在的攻击者及其使用的攻击方法。为了实施网络安全框架，你的公司必须根据需要调整预算，并纳入首席高管层关于如何满足各部门需求的意见。


  机器学习并非万能灵药；其效果完全取决于用于学习的数据输入。如果你的机器学习算法设计不佳，结果就不会有多大用处。例如，误报（预测结果为真，但实际为假）会促使`CISO`不必要地触发纠正措施。同样，漏报（预测结果为假，但实际为真）则会让`CISO`陷入非常棘手的境地：即使网络攻击真实存在，也未能采取任何行动。除非机器学习算法的置信度和预测准确性得到提升，否则将其作为反威胁机制的可信度仍将存疑。


  聊天机器人正日益普及于我们的职业和个人生活。这种对话式界面正在帮助销售人员查找特定数据，帮助客户无需中间环节直接解决疑问，帮助我们管理日程安排，甚至帮助安全分析师针对安全事件制定恰当的响应方案。然而，聊天机器人也带来了风险。微软推出了`Tay`，一个旨在通过“随意而有趣的对话”与人互动、像千禧一代那样说话，并从其在
  Twitter 以及消息应用`Kik`和`GroupMe`上互动的人那里学习的聊天机器人。在 24 小时内，一次针对`Tay`的有组织攻击导致该机器人发出了各种厌女和种族主义的言论。


  这次攻击突显了另一个有趣但高度脆弱的领域。正当企业开始采用人工智能系统时，攻击者也在寻找操纵这些人工智能系统的方法。他们正专注于寻找方法，让人工智能反过来对付其所有者，从入侵聊天机器人到故意误导模式识别算法。


  这类对抗性攻击只意味着一件事：网络攻击的未来将不再是人与人之间的较量，而是机器与机器之间的对决。


  ## 给 CEO 的问题


  随着你的业务日益数字化，你是否面临失去对自己所创造机器控制权的风险？


  答案应该是“是”与“否”并存。企业技术生态系统现在比以往任何时候都更加复杂和开放。企业再也无法控制自己的边界，因为这些边界已不复存在。与此同时，攻击者变得更具创造性和老练。你不能再依赖一套已知攻击的清单，因为大多数攻击已不再符合可识别的模式和特征。另一方面，这仅仅意味着你需要制定新的控制定义。与其试图控制边界以抵御已知攻击，你必须学会控制那些已经突破你系统的独特攻击。预防在网络安全中仍有一席之地。但你必须扩展对控制的定义，考虑威胁的完整生命周期，以便在一切为时已晚之前发现并缓解威胁。


  人工智能是否意味着网络安全中人的因素的终结，还是它们可以共存？


  它们*必须*共存。目前对于人工智能在网络安全中的作用存在一种误解。许多人听到“人工智能”这个词，就会想象一个能像人类一样创造性思考和行动的通用人工智能系统。这种通用人工智能或许在未来会被开发出来，但目前人工智能在网络安全中的作用非常专门化。人工智能擅长处理海量威胁数据，并提供其发现的摘要。但我们仍然需要人类来告诉人工智能该寻找什么，审查人工智能的输出，并最终决定如何根据人工智能的发现采取行动。任何人工智能驱动的网络安全服务的目标都很简单——让人工智能做它最擅长的事，让人做他们最擅长的事。


  黑客能否侵入机器并改变人工智能的路径？


  关于网络安全，有一个发人深省的真相：无论你在攻击者面前设置何种防御，他们最终都会找到绕过的方法。没有任何“银弹”技术能一劳永逸地解决网络安全问题。网络安全将始终是攻击者与防御者之间的一场拉锯战，并随着技术的演进不断演变。无论人工智能多么强大，它都无法解决这个问题。这是我们保护系统安全所需采取的下一步必要措施，但攻击者有可能在某一天找到绕过或颠覆人工智能的方法——就像他们绕过或颠覆网络安全专家开发的所有其他安全措施一样。尽管提出这个问题很重要，但在今天它还是一个没有实际意义的问题。攻击者已经在使用人工智能来驱动他们的攻击，我们必须部署人工智能驱动的防御才能跟上步伐。未来，我们可能会看到动态机器学习算法，一旦感知到入侵就会自行变形，且不影响其最初设计的目的。


  短期内，人工智能将成为网络安全的标准要素。随着企业进一步采用云、移动和物联网，它们将为网络犯罪分子打开更多可利用的漏洞点。随着它们进一步数字化，它们将为日益复杂的多渠道攻击创造机会。企业安全人员已经被每天涌入的威胁数据淹没，这些数据量远超任何纯人类团队所能处理的范围。这些数据每年只会增加，因此对人工智能有效处理这些数据的需求也会随之增长。


  ## 结论


  网络安全将越来越依赖人工智能。特别是，随着万物互联概念的不断扩展，我们可以预期来自所有可能系统的安全风险，而现有的控制措施将无法应对。当然，障碍是存在的。例如，人工智能需要在检测方面提供更高的准确性，并减少误报，才能赢得信任。


  人工智能驱动的网络安全并非万能药！它们也未必是完美的组合。有些攻击非常难以捕捉。攻击种类繁多，跨越不同的时间段，并涉及许多不同的系统。其次，攻击在不断变化；因此，最大的挑战是训练人工智能应对所有这些不同的场景。


  在本章中，我们讨论了网络安全措施的现状，以及人工智能如何在增强未来系统的安全机制方面发挥重要作用。在下一章中，我们将讨论与物联网（IoT）相关的概念，以及如何利用人工智能使“物”变得智能。




