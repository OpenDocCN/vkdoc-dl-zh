- "# 排版后的内容\n\n**更好的算法：** 我们大脑内部为了分析周围环境，发生了许多活动。我们使用启发式方法和心理思维导图进行推理。然而，将思维过程编码化对我们来说极其困难。我们早期将推理过程编码化的尝试导致了编写冗长的程序，大多以“IF\
  \ then Else…”的形式存在，并且这些程序对变化的适应性不足。深度学习算法为我们提供了一种从数据本身生成推理的方法，不是通过由成百上千个条件组成的复杂程序，而是通过数据本身来提炼模式和提出建议。我们现在可以收集大量数据，并应用复杂的算法来得出预测。唯一的缺点是，某些算法过于复杂，以至于我们无法理解得到的结果。\n\
  \n为了说明这三个催化因素的影响，我们来讨论一下 1997 年 IBM 的超级计算机“深蓝”在一场著名的人机对战中击败了 reigning 国际象棋大师加里·卡斯帕罗夫之后发生的事情。卡斯帕罗夫拥有他卓越的天才头脑；而“深蓝”则可以即时访问一个包含数千名专家所有过往棋步的庞大数据库。卡斯帕罗夫意识到，“人加机器”将比“人对机器”有益得多。“半人马玩家”（一种人类/AI\
  \ 合成体）的概念开始出现，即 AI 增强人类棋手的技能。结果如何？如今，最好的棋手是“Intagrand”——一个由人类和几种不同的国际象棋 AI 程序组成的团队。\n\
  \n有趣的是，另一种模式开始出现。AI 驱动的国际象棋程序非但没有削弱人类棋手的兴趣，反而激励了比以往任何时候都多的人去下棋。也许，对于人类棋手和 AI 国际象棋程序来说，确实有一些真正激励人心和有益的东西，双方都提高了赌注，以保持领先对方一步，并因此相互学习，成为更好的棋手。结果如何？现在的大师级棋手比“深蓝”首次击败卡斯帕罗夫时还要多。\n\
  \n这引出了另一点。如果 AI 能帮助人类成为更好的棋手，那么 AI 也完全有可能帮助我们在生活和职业的其他领域变得更好。\n\n到目前为止，这一切都很棒！所有这些技术进步与商业有何关联？\n\
  \n嗯，迹象是存在的，尽管在当下这个时间点可能还很微妙。我们周围的世界，以及我们的商业和我们在商业环境中扮演的角色，正日益受到 AI 普及的影响。这将要求企业高管们采用一种新的角色委派方式——从实施战略性的\
  \ AI 顾问到增强员工能力。\n\n现代组织重视被赋能的 AI，就像他们重视被赋能的人一样。例如，CEO 必须明确何时应咨询智能算法，而非人类同事。这可能很困难。关于机器学习的一些最重要的决策，通常涉及\
  \ AI 代理应拥有的权限范围。那些已经实现工厂自动化的商业领袖，现在对让 AI 决定其整个商业战略的想法感到畏缩。在缺乏明确的权限和问责划分的情况下，人机冲突将源于双重赋能。\n\
  \n致力于利用 AI 优势的商业领袖应考虑以下四个与 AI 相关的要务。\n\n*   **AI 作为战略顾问：** AI 可以有效地扮演战略顾问的角色。AI\
  \ 战略家的主要成果是重新定义问题、协助制定战略，以及协助确定行动方案和执行计划。这些算法将不断产生数据驱动的洞察，并推荐最佳行动方案。人类干预和监督将仅用于确定哪些决策交由算法处理，以及如何执行这些决策。\n\
  \n    AI 战略家将对系统和业务流程以及竞争情报有更广泛的视野，这必然带来重大的运营挑战，例如流程间和人际间的冲突。因此，AI 战略家的输出对所有相关人员都应是透明且可解释的，这一点至关重要。这样，人与机器之间的信任因素才能得以发展。\n\
  \n*   **AI 作为任务执行者：** AI 战略家已经完成了定义问题陈述和执行计划的工作，人类同事也已验证并批准。接下来呢？你将需要算法来分析业务流程、创建清晰的任务描述和目标，并定义详细的服务水平协议和关键绩效指标。负责任务执行的经理和员工现在将执行更高层次的任务——他们不会专注于项目执行的操作化（分配资源、管理员工和处理升级问题），而是将大部分时间用于审查算法是否提供了改进的成果和创新。算法提供的重要优势包括高水平的可靠性和可预测性。\n\
  \n*   **AI 作为员工的虚拟助手：** 即使是最有才华的员工也有其局限性。与这些员工相比，AI 算法是被限制在任务范围内的天才。因此，商业领袖们心中的问题是，普通的经理和员工能否与智能代理有效地协同工作。\n\
  \n    像谷歌、阿里巴巴、亚马逊、Netflix 等现代企业，已经在可操作的洞察能够提高员工生产力并帮助实现业务成果的情况下，开始使用 AI 助手。员工别无选择，只能学会重视算法。一方面，人机协作文化将意味着成果具有更高的可扩展性和可预测性。同时，它可能在很大程度上削弱组织内的问责制。其中一个原因可能是，在快速演变的场景中，当每个人（人和机器）都在争分夺秒地交付成果时，经理们可能不清楚是需要重新培训员工还是重新训练算法。\n\
  \n*   **AI 作为自主组织：** 这可能吗？嗯，如果你已经完成了前三步，那为什么不行呢？这在许多华尔街对冲基金中已经发生。这些公司允许 AI 拥有完全的自主权，将组织引导至新的风险、盈利能力和创新水平。这些对冲基金的高管们已将决策过程中难以想象的一部分交给了他们的算法。\n\
  \n\n\n"
- '# 最终思考


  将人工智能融入企业的四项要务如今或许显得不切实际，但这一进程不可避免。随着 AI 能力的持续进步，更严格的监管将带来更深入的洞察，软件将不断学习，并被视为负责任的智能体，而非冰冷的代码。然而，首席执行官、董事会成员和高级管理人员将扮演关键角色——他们必须密切监控算法，并通过模拟来界定技术的边界。此外，商业领袖应谨慎避免过早开展过多
  AI 主导的活动，因为这可能对责任与问责制产生不可预见的影响。他们必须确保在遵从、授权与方向指引上保持清晰。


  在本书中，我们逐章探讨了 AI 在组织流程、战略、优势与后果中的诸多方面，以及它对身处任何角色的个人意味着什么。在禅宗中，“公案”只是通往终极目标的工具或基石。同样，我们衷心希望本书能成为指引您、帮助您解决所面临问题的工具。


  现在，让我们进入本书第一章，了解 AI 的经济学，包括什么定义了 AI，以及为何其应用如此困难！


