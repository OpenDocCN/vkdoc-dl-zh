    ## 配方 4-13. 用于表格数据的 ELI5 解释器


    ### 问题


    你想使用 ELI5 库为线性回归模型生成解释。


    ### 解决方案


    `ELI5` 是一个 Python 包，有助于调试机器学习模型并解释预测结果。它支持 `scikit-learn` 库支持的所有机器学习模型。


    ### 工作原理


    让我们来看下面的例子：


    | 权重 | 特征 |

    | --- | --- |

    | 0.4385 | `powerBhp` |

