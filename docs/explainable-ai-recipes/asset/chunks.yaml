- fmt: '### How It Works


    Let’s take a look at the following example (see Figure [2-5](#540435_1_En_2_Chapter.xhtml#Fig5)):


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fig5_HTML.jpg)


    A graph of E of function x power B H P versus power B H P. It has an increasing
    slope from 0 to 70, a vertical line for E of power B H P, and a horizontal line
    for E of function x. Values are approximated.


    **Figure 2-5** Partial dependency plot for `powerBhp` and predicted price of the
    vehicle


    ```

    shap.partial_dependence_plot(

    "powerBhp", model.predict, X, ice=False,

    model_expected_value=True, feature_expected_value=True

    )

    ```


    The linear blue line shows the positive correlation between the price and the
    `powerBhp`. The `powerBhp` is a strong feature. The higher the bhp, the higher
    the price of the car. This is a continuous or numeric feature; let’s look at the
    binary or dummy features. There are two dummy features if the car is registered
    in a Bangalore location or in a Kolkata location as dummy variables. See Figure
    [2-6](#540435_1_En_2_Chapter.xhtml#Fig6).


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fig6_HTML.jpg)


    A graph of E of function x location Bangalore versus location Bangalore. It has
    an increasing slope from 0 to 11.5, a vertical line for E of location Bangalore,
    and a horizontal line for E of function x. Values are approximated.


    **Figure 2-6** Dummy variable Bangalore location versus SHAP value


    ```

    shap.partial_dependence_plot(

    "Location_Bangalore", model.predict, X, ice=False,

    model_expected_value=True, feature_expected_value=True

    )

    ```


    If the location of the car is Bangalore, then the price would be higher, and vice
    versa. See Figure [2-7](#540435_1_En_2_Chapter.xhtml#Fig7).


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fig7_HTML.jpg)


    A graph of E of function x location Kolkata versus location Kolkata. It has a
    decreasing slope from 9.6 to 0, a vertical line for E of location Kolkata, and
    a horizontal line for E of function x. Values are approximated.


    **Figure 2-7** Dummy variable `Location_Kolkata` versus SHAP value


    ```

    shap.partial_dependence_plot(

    "Location_Kolkata", model.predict, X, ice=False,

    model_expected_value=True, feature_expected_value=True

    )

    ```


    If the location is Kolkata, then the price is expected to be lower. The reason
    for the difference between the two locations is in the data that is being used
    to train the model. The previous three figures show the global importance of a
    feature versus the prediction function. As an example, only two features are taken
    into consideration; we can use all features one by one and display many graphs
    to get more understanding about the predictions.


    Now let’s look at a sample data point superimposed on a partial dependence plot
    to display local explanations. See Figure [2-8](#540435_1_En_2_Chapter.xhtml#Fig8).


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fig8_HTML.jpg)


    A graph of E of function x power B H P versus power B H P. It has an increasing
    slope from 0 to 70, a vertical line for E of power B H P, and a horizontal line
    for E of function x. Values are approximated.


    **Figure 2-8** Power bhp versus prediction function


    ```

    # make a standard partial dependence plot for lights on predicted output

    sample_ind = 20 #20th record from the dataset

    shap.partial_dependence_plot(

    "powerBhp", model.predict, X, model_expected_value=True,

    feature_expected_value=True, ice=False,

    shap_values=shap_values[sample_ind:sample_ind+1,:]

    )

    ```


    The vertical dotted line shows the average `powerBhp`, and the horizontal dotted
    line shows the average predicted value by the model. The small blue bar dropping
    from the black dot reflects the placement of record number 20 from the dataset.
    Local interpretation means that for any sample record from the dataset, we should
    be able to explain the predictions. Figure [2-9](#540435_1_En_2_Chapter.xhtml#Fig9)
    shows the importance of features corresponding to each record in the dataset.


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fig9_HTML.png)


    A graphical representation for function x equals 22.542 and E function x equals
    11.933 has 14 horizontal values. The highest value is 8.8 for power B H P. Values
    are approximated.


    **Figure 2-9** Local interpretation of the 20^(th) record and corresponding feature
    importance


    ```

    # the waterfall_plot shows how we get from shap_values.base_values to model.predict(X)[sample_ind]

    shap.plots.waterfall(shap_values[sample_ind], max_display=14)

    ```


    For the 20^(th) record, the predicted price is 22.542, the `powerBhp` stands out
    to be most important feature, and manual transmission is the second most important
    feature.


    ```

    X[20:21]

    model.predict(X[20:21])

    array([22.54213017])

    ```


    ## Recipe 2-6. SHAP Feature Importance for a Regression Model with All Mixed Input
    Variables


    ### Problem


    You want to get the global feature importance from SHAP values using mixed-input
    feature data.


    ### Solution


    The solution to this problem is to use absolute values and sort them in descending
    order.


    ### How It Works


    Let’s take a look at the following example:


    ```

    #computing shap importance values for the linear model

    import numpy as np

    # feature names from the training data

    feature_names = shap_values.feature_names

    #combining the shap values with feature names

    shap_df = pd.DataFrame(shap_values.values, columns=feature_names)

    #taking the absolute shap values

    vals = np.abs(shap_df.values).mean(0)

    #creating a dataframe view

    shap_importance = pd.DataFrame(list(zip(feature_names, vals)), columns=[''col_name'',
    ''feature_importance_vals''])

    #sorting the importance values

    shap_importance.sort_values(by=[''feature_importance_vals''], ascending=False,
    inplace=True)

    print(shap_importance)

    col_name  feature_importance_vals

    4                       powerBhp                 6.057831

    0                            Age                 2.338342

    18               FuelType_Petrol                 1.406920

    19           Transmission_Manual                 1.249077

    15               FuelType_Diesel                 0.618288

    7            Location_Coimbatore                 0.430233

    9             Location_Hyderabad                 0.401118

    2                        mileage                 0.270872

    13               Location_Mumbai                 0.227442

    5             Location_Bangalore                 0.154706

    21              OwnerType_Second                 0.154429

    6               Location_Chennai                 0.133476

    10               Location_Jaipur                 0.127807

    12              Location_Kolkata                 0.111829

    14                 Location_Pune                 0.051082

    8                 Location_Delhi                 0.049372

    22               OwnerType_Third                 0.021778

    3                       engineCC                 0.020145

    1                       Odometer                 0.009602

    11                Location_Kochi                 0.007474

    20  OwnerType_Fourth +ACY- Above                 0.002557

    16             FuelType_Electric                 0.002336

    17                  FuelType_LPG                 0.001314

    ```


    At a high level, for the linear model that is used to predict the price of the
    automobiles, the previous features are important, with the highest being the `powerBhp`,
    age of the car, petrol type, manual transmission type, etc. The previous tabular
    output shows global feature importance.


    ## Recipe 2-7. SHAP Strength for Mixed Features on the Predicted Output for Regression
    Models


    ### Problem


    You want to know the impact of a feature on the model function.


    ### Solution


    The solution to this problem is to use a beeswarm plot that displays the blue
    and red points.'
