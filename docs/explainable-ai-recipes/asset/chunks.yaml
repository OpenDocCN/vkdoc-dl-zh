    ................

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(X),

    mode=''regression'',

    feature_names=X.columns,

    class_names=[''price''],

    verbose=True)

    ```


    We are using the energy prediction data from this chapter only.


    ```

