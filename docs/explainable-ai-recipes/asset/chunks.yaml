    ## Conclusion


    In this chapter, we covered how to interpret nonlinear supervised models based
    on decision trees for regression and classification. However, the nonlinear models
    are simpler to interpret at a global level, meaning at the feature importance
    level, but hard to explain at the local interpretation level as all the features
    will not be part of the decision tree construction process. In this chapter, we
    looked at local interpretation for samples using the SHAP, ELI5, and LIME libraries.
    In the next chapter, we are going to cover the local and global interpretations
    for ensemble models. The nonlinear models cover nonlinearity existing in data
    and therefore can be complex to interpret. However, one of the limitations of
    a tree-based model is that it only considers a few powerful features to construct
    the tree and does not give equal importance to all the features. Therefore, the
    explainability is not complete for local interpretations. This problem can be
    addressed by ensemble models, which is a combination of many trees working together
    to make it happen.


    # 4. Explainability for Ensemble Supervised Models


    Ensemble models are considered to be effective when individual models are failing
    to balance bias and variance for a training dataset. The predictions are aggregated
    in ensemble models to generate the final models. In the case of supervised regression
    models, many models are generated, and the averages of all the predictions are
    taken into consideration to generate the final prediction. Similarly, for supervised
    classification problems, multiple models are being trained, and each model generates
    a classification. The final model takes into account the majority voting rule
    criteria to decide the final prediction. Because of the nature of ensemble models,
    these are harder to explain to end users. That is why we need frameworks that
    can explain the ensemble models.


    *Ensemble* means a grouping of the model predictions. There are three types of
    ensemble models: bagging, boosting, and stacking. *Bagging* means bootstrap aggregation,
    which means bootstrapping the available features, making a subset selection, generating
    predictions, continuing the same process a few times, and averaging the predictions
    to generate the final prediction. Random forest is one of the most important and
    popular bagging models.


    *Boosting* is a sequential method of boosting the predictive power of the model.
    It starts with a base classifier being trained on data to predict and classify
    the output. In the next step, the correctly predicted cases are separated in an
    automatic fashion, and the rest of the cases are used for retraining the model.
    This process will continue until there is a scope to improve and boost the accuracy
    to a higher level. If it is not possible to boost the accuracy further, then the
    iteration should stop, and the final accuracy is reported.


    *Stacking* is a process of generating predictions from different sets of models
    and averaging their predictions.


    The goal of this chapter is to introduce various explainability libraries for
    ensemble models such as feature importance, partial dependency plot, and local
    interpretation and global interpretation of the models.


