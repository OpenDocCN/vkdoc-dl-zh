- fmt: '### How It Works


    Let’s take a look at the following example. The key is to get the SHAP values,
    which will return base values, SHAP values, and data. Using the SHAP values we
    can create various explanations using graphs and figures. The SHAP values are
    always at a global level.


    ```python

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    %matplotlib inline

    from sklearn import tree, metrics, model_selection, preprocessing

    from sklearn.metrics import confusion_matrix, classification_report

    df_train = pd.read_csv(''https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/ChurnData_test.csv'')

    from sklearn.preprocessing import LabelEncoder

    tras = LabelEncoder()

    df_train[''area_code_tr''] = tras.fit_transform(df_train[''area_code''])

    df_train.columns

    del df_train[''area_code'']

    df_train.columns

    df_train[''target_churn_dum''] = pd.get_dummies(df_train.churn,prefix=''churn'',drop_first=True)

    df_train.columns

    del df_train[''international_plan'']

    del df_train[''voice_mail_plan'']

    del df_train[''churn'']

    df_train.info()

    del df_train[''Unnamed: 0'']

    df_train.columns

    from sklearn.model_selection import train_test_split

    X = df_train[[''account_length'', ''number_vmail_messages'', ''total_day_minutes'',

    ''total_day_calls'', ''total_day_charge'', ''total_eve_minutes'',

    ''total_eve_calls'', ''total_eve_charge'', ''total_night_minutes'',

    ''total_night_calls'', ''total_night_charge'', ''total_intl_minutes'',

    ''total_intl_calls'', ''total_intl_charge'',

    ''number_customer_service_calls'', ''area_code_tr'']]

    Y = df_train[''target_churn_dum'']

    import pandas as pd

    from sklearn.model_selection import train_test_split

    from interpret.glassbox import ExplainableBoostingClassifier

    from interpret import show

    xtrain,xtest,ytrain,ytest=train_test_split(X,Y,test_size=0.20,stratify=Y)

    ebm = ExplainableBoostingClassifier(random_state=12)

    ebm.fit(xtrain, ytrain)

    ebm_global = ebm.explain_global()

    show(ebm_global)

    ebm_local = ebm.explain_local(xtest[:5], ytest[:5])

    show(ebm_local)

    print("training accuracy:", ebm.score(xtrain,ytrain)) #training accuracy

    print("test accuracy:",ebm.score(xtest,ytest)) # test accuracy

    show(ebm_global)

    from interpret import set_visualize_provider

    from interpret.provider import InlineProvider

    set_visualize_provider(InlineProvider())

    from interpret import show

    X100 = X[:100]

    # explain the GAM model with SHAP

    explainer_ebm = shap.Explainer(ebm.predict, X100)

    shap_values_ebm = explainer_ebm(X100)

    ebm_global = ebm.explain_global()

    show(ebm_global)

    import numpy as np

    pd.DataFrame(np.round(shap_values_ebm.values,2)).head(2)

    ```


    ## Recipe 4-16. Partial Dependency Plot for a Nonlinear Classifier


    ### Problem


    You want to show feature associations with the class probabilities using a nonlinear
    classifier.


    ### Solution


    The class probabilities in this example are related to predicting the probability
    of churn. The SHAP value for a feature can be plotted against the feature value
    to show a scatter chart that displays the correlation, positive or negative, and
    the strength of associations.


    ### How It Works


    Let’s take a look at the following example:


    ```python

    # make a standard partial dependence plot with a single SHAP value overlaid

    sample_ind = 20

    fig,ax = shap.partial_dependence_plot(

    "number_customer_service_calls", ebm.predict, X100, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False,

    shap_values=shap_values_ebm[sample_ind:sample_ind+1,:]

    )

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig34_HTML.jpg)


    A SHAP partial dependence plot of the number of customer service calls. The line
    moves horizontally from (0, 0.05), rises vertically at (3.5, 0.05), and ends at
    (5, 0.5). A point is indicated at (1, 0.4). The lines for E customer calls and
    E f of x intersect at (1.5, 0.6). The highest bar is at (1, 0.23). All values
    are estimated.


    **Figure 4-34** Account length and SHAP value of account length


    ```python

    # make a standard partial dependence plot with a single SHAP value overlaid

    sample_ind = 20

    fig,ax = shap.partial_dependence_plot(

    "number_vmail_messages", ebm.predict, X100, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False,

    shap_values=shap_values_ebm[sample_ind:sample_ind+1,:]

    )

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig35_HTML.jpg)


    A SHAP partial dependence plot of the number of voicemail messages. The line moves
    straight from (negative 2.5, 0.07) and falls vertically at (4, 0.07), moves straight
    up to (43, 0.02), and ends at (43, 0.04). A point is indicated at (35, 0.35).
    The lines for E customer calls and E f of x intersect at (8, 0.05). The highest
    bar is at (0, 0.58). All values are estimated.


    **Figure 4-35** Number of voicemail messages and SHAP values


    ## Recipe 4-17. Global Feature Importance from the Nonlinear Classifier


    ### Problem


    You want to get the global feature importance for the decision tree classification
    model.


    ### Solution


    The solution to this problem is to use the explainer log odds.


    ### How It Works


    Let’s take a look at the following example:


    ```python

    shap.plots.scatter(shap_values_ebm)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig36_HTML.png)


    16 scatterplots of SHAP values of features. The clusters of points are mostly
    straight at approximately 0.0 SHAP value. A few points move up to 0.6 and 0.8
    SHAP values. Each plot has a histogram in the background.


    **Figure 4-36** All features SHAP values plotted together


    ```python

    # the waterfall_plot shows how we get from explainer.expected_value to model.predict(X)[sample_ind]

    shap.plots.waterfall(shap_values_ebm[sample_ind], max_display=14)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig37_HTML.jpg)


    A SHAP waterfall plot. The maximum value is 0 for features total international
    charge, night calls, and account length. The minimum value is negative 0.02 for
    customer service calls. The lines for f of x and E f of x are at 0 and 0.05 respectively.
    All values are estimated.


    **Figure 4-37** Local explanation for record 20


    The interpretation goes like this: when we change the value of a feature by 1
    unit, the model equation will produce two odds; one is the base, and the other
    is the incremental value of the feature. We are looking at the ratio of odds changes
    with every increase or decrease in the value of a feature. From the global feature
    importance, there are three important features: the number of customer service
    calls, the total day minutes, and the number of voicemail messages.


    ```python

    # the waterfall_plot shows how we get from explainer.expected_value to model.predict(X)[sample_ind]

    shap.plots.beeswarm(shap_values_ebm, max_display=14)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig38_HTML.jpg)


    A SHAP bee swarm plot. The high feature values of the number of customer service
    calls and voicemail messages have maximum and minimum values of almost 0.79 and
    negative 0.4, respectively.


    **Figure 4-38** SHAP values from EBM model on model predictions


    ## Recipe 4-18. XGBoost Model Explanation


    ### Problem


    You want to explain an extreme gradient boosting model, which is a sequential
    boosting model.


    ### Solution


    The model explanation can be done using SHAP; however, one of the limitations
    of SHAP is we cannot use the full data to create global and local explanations.
    We will take a subset if the smaller machine is allocated and a full dataset if
    the machine configuration supports it.'
