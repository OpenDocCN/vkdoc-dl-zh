    ## Conclusion


    In this chapter, we covered how to interpret a time-series model to generate a
    forecast. To interpret a univariate time-series model, we considered it as a supervised
    learning problem by taking the lags as trainable features. These features are
    then trained using a linear regressor, and the regression model is used to generate
    explanations at a global level as well as at a local level using both the SHAP
    and LIME libraries. A similar explanation can be generated using more complex
    algorithms such as the nonlinear and ensemble techniques, and finally similar
    kinds of graphs and charts can be generated using SHAP and LIME as in the previous
    chapters. The next chapter contains recipes to explain deep neural network models.


    # 7. Explainability for Deep Learning Models


    Deep learning models are becoming the backbone of artificial intelligence implementations.
    At the same time, it is super important to build the explainability layers to
    explain the predictions and output of the deep learning model. To build trust
    for the deep learning model outcome, we need to explain the results or output.
    At a high level, a deep learning layer involves more than one hidden layer, whereas
    a neural network layer has three layers: the input layer, the hidden layer, and
    the output layer. There are different variants of neural network models such as
    single hidden layer neural network model, multiple hidden layer neural networks,
    feedforward neural networks, and backpropagation neural networks. Depending upon
    the structure of the neural network model, there are three popular structures:
    recurrent neural networks, which are mostly used for sequential information processing,
    such as audio processing, text classification, etc.; deep neural networks, which
    are used for building extremely deep networks; and finally, convolutional neural
    network models, which are used for image classification.


    Deep SHAP is a framework to derive the SHAP values from a deep learning model
    developed using TensorFlow, Keras, or PyTorch. If we compare the machine learning
    models with deep learning models, the deep learning models are too difficult to
    explain to anyone. In this chapter, we will provide recipes for explaining the
    components of a deep learning model.


    ## Recipe 7-1\. Explain MNIST Images Using a Gradient Explainer Based on Keras


    ### Problem


    You want to explain a Keras-based deep learning model using SHAP.


    ### Solution


    We are using a sample image dataset called MNIST. We can first train a convolutional
    neural network using Keras from the TensorFlow pipeline. Then we can use the gradient
    explainer module from the SHAP library to build the explainer object. The explainer
    object can be used to create SHAP values, and further, using SHAP values, we can
    get more visibility into image classification tasks and individual class prediction
    and corresponding probability values.'
