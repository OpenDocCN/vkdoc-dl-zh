    ## Recipe 4-10. Random Forest Regressor for Mixed Data Types


    ### Problem


    You want to generate explainability for a random forest model using numeric as
    well as categorical features.


    ### Solution


    Random forest is useful when we have more features, say, more than 50; however,
    for this recipe, it is applied on 23 features. We could pick up a large dataset,
    but that would require more computations and may take more time to train. So,
    be cognizant about the model configurations when the model is being trained on
    a smaller machine.


    ### How It Works


    Let’s take a look at the following example:


    ```

    import shap

    from sklearn.ensemble import RandomForestRegressor

    rforest = RandomForestRegressor(n_estimators=100, max_depth=3, min_samples_split=20,
    random_state=0)

    rforest.fit(X, y)

    # explain all the predictions in the test set

    explainer = shap.TreeExplainer(rforest)

    shap_values = explainer.shap_values(X)

    shap.summary_plot(shap_values, X)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig28_HTML.png)


    A SHAP bee swarm plot for model output. The high feature values of power B H P
    and age have the maximum and the minimum SHAP values of almost 35 and negative
    10, respectively. The feature values of the rest are mostly at 0.


    **Figure 4-28** SHAP value impact on model output


    ```

    shap.dependence_plot("powerBhp", shap_values, X)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig29_HTML.jpg)


    A scatter plot has SHAP values and age versus power B H P. The dots of different
    age values rise between almost (50, negative 5) and (300, 40) and then are horizontal
    till beyond 500.


    **Figure 4-29** SHAP dependence plot


    ```

    shap.partial_dependence_plot(

    "mileage", rforest.predict, X, ice=False,

    model_expected_value=True, feature_expected_value=True

    )

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig30_HTML.jpg)


    A SHAP partial dependence plot of SHAP values versus mileage. The line moves straight
    between (5, 9.59) and (7.5, 9.59), declines sharply till (7.5, 9.49), and then
    moves straight up to (35, 0.49). The highest bar is at (17, 9.49). The lines for
    E milage and E f of x intersect at (19, 9.49). All values are estimated.


    **Figure 4-30** Partial dependency plot of mileage


    ## Recipe 4-11. Explaining the Catboost Model


    ### Problem


    You want to generate explainability for a dataset where most of the features are
    categorical. We can use a boosting model where a lot of variables are categorical.


    ### Solution


    The catboost model is known to work when we have more categorical variables compared
    to numeric variables. Hence, we can use the catboost regressor.


    ### How It Works


    Let’s take a look at the following example:


    ```

    !pip install catboost

    import catboost

    from catboost import *

    import shap

    model = CatBoostRegressor(iterations=100, learning_rate=0.1, random_seed=123)

    model.fit(X, y, verbose=False, plot=False)

    explainer = shap.TreeExplainer(model)

    shap_values = explainer.shap_values(X)

    # summarize the effects of all the features

    shap.summary_plot(shap_values, X)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig31_HTML.png)


    A SHAP bee swarm plot. The high feature values of power b h p and age have the
    maximum and the minimum SHAP values of almost 39 and negative 14, respectively.
    The low feature values of most variables are at 0.


    **Figure 4-31** SHAP value impact on model predictions


    ```

    # create a SHAP dependence plot to show the effect of a single feature across
    the whole dataset

    shap.dependence_plot("powerBhp", shap_values, X)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig32_HTML.jpg)


    A scatter plot has SHAP value and age versus power b h p. The dots for different
    ages rise between almost (50, negative 5) and (300, 35) and then a few dots scatter
    horizontally towards the right till beyond 500.


    **Figure 4-32** SHAP dependence plot


    ## Recipe 4-12. LIME Explainer for the Catboost Model and Tabular Data


    ### Problem


    You want to generate explainability at a local level in a focused manner rather
    than at a global level.


    ### Solution


    The solution to this problem is to use the LIME library. LIME is a model-agnostic
    technique; it retrains the ML model while running the explainer. LIME localizes
    a problem and explains the model at a local level.'
