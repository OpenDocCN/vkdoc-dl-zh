    ## 配方 4-2：树回归模型的偏依赖图


    ### 问题


    您希望从提升模型中获得偏依赖图。


    ### 解决方案


    此问题的解决方案是使用 SHAP 从模型生成偏依赖图。

    '
- fmt: '### How It Works


    Let’s take a look at the following example (see Figure [4-1](#540435_1_En_4_Chapter.xhtml#Fig1)):


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig1_HTML.jpg)


    A SHAP partial dependence plot has SHAP values versus lights. A solid line starts
    from (0, 60) and ends at (70, 180) in an increasing step trend. 2 dotted lines
    `E lights`, and `E f of x` intersect at (15,105). A point is indicated on the
    solid line at (20, 120). The highest bar is at (0, 105). All values are estimated.


    **Figure 4-1** Correlation between feature light and predicted output of the model


    ```

    # make a standard partial dependence plot with a single SHAP value overlaid

    sample_ind = 20

    fig,ax = shap.partial_dependence_plot(

    "lights", model_ebm.predict, X100, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False,

    shap_values=shap_values_ebm[sample_ind:sample_ind+1,:]

    )

    ```


    The correlation between the feature `lights` and the predicted value of the model
    energy usage is shown, and the steps show a nonlinear pattern. The partial dependency
    plot is a way to explain the individual predictions and generate local interpretations
