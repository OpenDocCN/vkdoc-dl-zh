    ## 配方 4-19. 解释随机森林分类器


    ### 问题


    你想使用随机森林分类器从全局和局部可解释库中获得更快的解释。随机森林创建一组树作为估计器，并使用多数投票规则平均预测结果。


    ### 解决方案


    可以使用 SHAP 进行模型解释；然而，SHAP 的局限性之一是我们无法使用全部数据来创建全局和局部解释。


    ### 工作原理


    让我们来看下面的例子：


    ```

    import shap

    from sklearn.ensemble import RandomForestClassifier

    rforest = RandomForestClassifier(n_estimators=100, max_depth=3, min_samples_split=20,
    random_state=0)

    rforest.fit(X, Y)

    # 解释测试集中的所有预测

    explainer = shap.TreeExplainer(rforest)

    shap_values = explainer.shap_values(X)

    shap.dependence_plot("account_length", shap_values[0], X)

    ```


    ![](img/540435_1_En_4_Fig48_HTML.jpg)


    SHAP 值和总日间通话分钟数与账户时长的散点图。总日间通话分钟数的梯度标尺值在 100 到 260 之间。不同深浅的点在 (25, 0.0050) 和 (225,
    -0.0125) 之间下降。所有值均为估计值。


    **图 4-48** SHAP 的依赖图


    ```

    shap.partial_dependence_plot(

    "total_day_minutes", rforest.predict, X, ice=False,

    model_expected_value=True, feature_expected_value=True

    )

    ```


    ![](img/540435_1_En_4_Fig49_HTML.jpg)


    总日间通话分钟数的 SHAP 偏依赖图。线条从 (0, 0.00) 水平移动，上升至 (300, 0.05)，并在 (350, 0.05) 结束。最高的条形位于
    (175, 0)。`E total day minutes` 和 `E f of x` 的线在 (175, 0.38) 处相交。所有值均为估计值。


    **图 4-49** 总日间通话分钟数的偏依赖图


    ```

    shap.summary_plot(shap_values, X)

    ```


    ![](img/540435_1_En_4_Fig50_HTML.png)


    一个特征与平均 SHAP 值的水平堆叠条形图。类别 0 和类别 1 中“客户服务电话次数”的条形最高，约为 0.06；类别 1 中区号 `t r` 的条形最低，几乎为
    0.00。


    **图 4-50** 基于绝对平均 SHAP 值分别显示两个类别的特征重要性


    ## 配方 4-20. 分类场景的 Catboost 模型解释


