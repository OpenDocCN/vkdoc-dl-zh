    ## Recipe 4-5. Explain the Catboost Regressor with Global and Local Interpretations


    ### Problem


    Catboost is another model that fasten the model training process by explicitly
    declaring the categorical features. If there is no categorical feature, then the
    model is trained on all numeric features as well. You want to explain the global
    and local interpretations from the catboost regression model.


    ### Solution


    We are going to use the tree explainer from the SHAP library and the catboost
    library.


    ### How It Works


    Let’s take a look at the following example:


    ```python

    !pip install catboost

    import catboost

    from catboost import *

    import shap

    shap.initjs()

    model = CatBoostRegressor(iterations=100, learning_rate=0.1, random_seed=123)

    model.fit(X, y, verbose=False, plot=False)

    explainer = shap.TreeExplainer(model)

    shap_values = explainer.shap_values(X)

    # summarize the effects of all the features

    shap.summary_plot(shap_values, X)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig14_HTML.png)


    A SHAP bee swarm plot. The high feature values of R H underscore 1 and press underscore
    m m underscore h g have the maximum positive and negative SHAP values of almost
    100 and negative 30, respectively.


    **Figure 4-14** SHAP value impact on model predictions


    ```python

    # create a SHAP dependence plot to show the effect of a single feature across
    the whole dataset

    shap.dependence_plot("lights", shap_values, X)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig15_HTML.png)


    A scatter plot of SHAP value for lights and T 8 versus lights. The dots with the
    maximum SHAP values and low T 8 values are at approximately (30, 85) and (40,
    85). High T 8 and minimum SHAP values are at almost (0, negative 1).


    **Figure 4-15** SHAP value of lights dependence plot


    ## Recipe 4-6. Explain the EBM Classifier with Global and Local Interpretations


    ### Problem


    EBM is an explainable boosting machine for a classifier. You want to explain the
    global and local interpretations from the EBM classifier model.


    ### Solution


    We are going to use the tree explainer from the SHAP library.


    ### How It Works


    Let’s take a look at the following example. We are going to use a public automobile
    dataset with some modifications. The objective is to predict the price of a vehicle
    given the features such as make, location, age, etc. It is a regression problem
    that we are going to solve using a mix of numeric and categorical features.


    ```python

    df = pd.read_csv(''https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/automobile.csv'')

    df.head(3)

    df.columns

    Index([''Price'', ''Make'', ''Location'', ''Age'', ''Odometer'', ''FuelType'',
    ''Transmission'', ''OwnerType'', ''Mileage'', ''EngineCC'', ''PowerBhp''], dtype=''object'')

    ```


    We cannot use the string-based features or categorical features in the model directly
    because matrix multiplication is not possible on string features; hence, the string-based
    features need to be transformed into dummy variables or binary features with 0
    and 1 flags. The transformation step is skipped here as many data scientists already
    know how to do data transformation. We are importing another transformed dataset
    directly.


    ```python

    df_t = pd.read_csv(''https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/Automobile_transformed.csv'')

    del df_t[''Unnamed: 0'']

    df_t.head(3)

    df_t.columns

    Index([''Price'', ''Age'', ''Odometer'', ''mileage'', ''engineCC'', ''powerBhp'',
    ''Location_Bangalore'', ''Location_Chennai'', ''Location_Coimbatore'', ''Location_Delhi'',
    ''Location_Hyderabad'', ''Location_Jaipur'', ''Location_Kochi'', ''Location_Kolkata'',
    ''Location_Mumbai'', ''Location_Pune'', ''FuelType_Diesel'', ''FuelType_Electric'',
    ''FuelType_LPG'', ''FuelType_Petrol'', ''Transmission_Manual'', ''OwnerType_Fourth
    +ACY- Above'', ''OwnerType_Second'', ''OwnerType_Third''], dtype=''object'')

    #y is the dependent variable, that we need to predict

    y = df_t.pop(''Price'')

    # X is the set of input features

    X = df_t

    from interpret import set_visualize_provider

    from interpret.provider import InlineProvider

    set_visualize_provider(InlineProvider())

    import pandas as pd

    from sklearn.model_selection import train_test_split

    from interpret.glassbox import ExplainableBoostingClassifier

    from interpret import show

    import shap

    import sklearn

    ```


    To compute the SHAP values, we can use the explainer function with the training
    dataset `X` and the model predict function. The SHAP value calculation takes place
    using a permutation approach; it took 5 minutes.


    ```python

    # fit a GAM model to the data

    import interpret.glassbox

    import shap

    model_ebm = interpret.glassbox.ExplainableBoostingRegressor()

    model_ebm.fit(X, y)

    X100 = X[:100]

    # explain the GAM model with SHAP

    explainer_ebm = shap.Explainer(model_ebm.predict, X100)

    shap_values_ebm = explainer_ebm(X100)

    import numpy as np

    pd.DataFrame(np.round(shap_values_ebm.values,2)).head(2)

    pd.DataFrame(np.round(shap_values_ebm.base_values,2)).head(2)

    ```


