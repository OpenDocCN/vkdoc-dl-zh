    # average prediction value is called as the base value

    pd.DataFrame(np.round(shap_values.base_values,3)).head(3)

    ```


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Figc_HTML.png)


    A table has 3 rows and 27 columns. The rows have decimal values for 0, 1, and
    2. The columns have decimal values from 0 to 26.


    ```

    pd.DataFrame(np.round(shap_values.data,3)).head(3)

    ```


