    ## Recipe 4-3\. Explain a Extreme Gradient Boosting Model with All Numerical Input
    Variables


    ### Problem


    You want to explain the extreme gradient boosting–based regressor.


    ### Solution


    The XGB regressor can be explained using the SHAP library; we can populate the
    global and local interpretations.


    ### How It Works


    Let’s take a look at the following example:


    ```

    # train XGBoost model

    import xgboost

    model_xgb = xgboost.XGBRegressor(n_estimators=100, max_depth=2).fit(X, y)

    # explain the GAM model with SHAP

    explainer_xgb = shap.Explainer(model_xgb, X)

    shap_values_xgb = explainer_xgb(X)

    # make a standard partial dependence plot with a single SHAP value overlaid

    sample_ind = 18

    fig,ax = shap.partial_dependence_plot(

    "lights", model_xgb.predict, X, model_expected_value=True,

    feature_expected_value=True, show=False, ice=False,

    shap_values=shap_values_xgb[sample_ind:sample_ind+1,:]

    )

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig7_HTML.jpg)


    A SHAP partial dependence plot has SHAP values versus lights. The solid line starts
    from (0, 90) and rises to (70, 130) in an increasing step trend. 2 dotted lines
    `E lights`, and `E f of x` intersect at (4, 98). A point is indicated at (20,
    120). The highest bar value is at (0, 135). All values are estimated.


    **Figure 4-7** SHAP value–based feature importance plot taken from the summary
    plot


    The XGB regressor–based model provides the summary plot that contains the SHAP
    value impact on the model output. If we need to explain the global importance
    of the features using the SHAP values, which shows what features are important
    for all data points, we can use the summary plot.


    ```

    shap.plots.scatter(shap_values_xgb[:,"lights"])

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig8_HTML.jpg)


    A scatterplot of SHAP value for lights versus lights. The majority of the dots
    are clustered between (8, 15) and (50, 60) approximately, with an increasing trend.


    **Figure 4-8** SHAP values of the lights feature plotted against the lights feature


    ```

    shap.plots.scatter(shap_values_xgb[:,"lights"], color=shap_values_xgb)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig9_HTML.jpg)


    A scatter plot of SHAP value for lights and `T 8` versus lights. A gradient scale
    on the right indicates the shades of `T 8` values between 19 and 25. A majority
    of dots in gradient shades are clustered between (5, 18) and (50, 60) approximately.


    **Figure 4-9** Scatter plot of two features, `T8` and `lights`, against the SHAP
    values of light


    ```

    shap.summary_plot(shap_values_xgb, X)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig10_HTML.jpg)


    A SHAP bee swarm plot. A gradient scale indicates the shades of high to low feature
    values. `Press underscore m m underscore h g` has the maximum positive and negative
    SHAP values of almost 100 and negative 40 for the low and high feature values,
    respectively.


    **Figure 4-10** Global feature importance based on the SHAP value


    ## Recipe 4-4\. Explain a Random Forest Regressor with Global and Local Interpretations


    ### Problem


    Random forest (RF) is a bagging approach to create ensemble models; it is also
    difficult to interpret which tree generated the final prediction and interpret
    the global and local interpretations.


    ### Solution


    We are going to use the tree explainer from the SHAP library.'
