    ## Recipe 4-8\. SHAP Feature Importance for Tree Regression Models with Mixed
    Input Variables


    ### Problem


    You want to get the global feature importance from SHAP values using mixed input
    feature data.


    ### Solution


    The solution to this problem is to use absolute values, sort them in descending
    order, and populate them in waterfall chart, beeswarm chart, scatter plot, etc.


    ### How It Works


    Let’s take a look at the following example:


    ```

    shap.plots.scatter(shap_values_ebm[:,"powerBhp"])

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig20_HTML.png)


    A scatterplot and a histogram of SHAP values versus power B H P. The dot cluster
    rises in a curve almost between (50, negative 5) and (200, 14). The histogram
    has the highest bar at around (100, 15).


    **Figure 4-20** Scatter plot of `powerBhp` and its SHAP values


    ```

    # the waterfall_plot shows how we get from explainer.expected_value to model.predict(X)[sample_ind]

    shap.plots.waterfall(shap_values_ebm[sample_ind], max_display=14)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig21_HTML.png)


    A SHAP waterfall plot of features versus SHAP values. Power b h p has the highest
    SHAP value of 9.84 and the Kochi location has the lowest SHAP value of negative
    0.54. The lines f of x and E f of x are at 21.319 and 8.383 respectively. All
    values are estimated.


    **Figure 4-21** Feature importance for a specific example


    ```

    # the waterfall_plot shows how we get from explainer.expected_value to model.predict(X)[sample_ind]

    shap.plots.beeswarm(shap_values_ebm, max_display=14)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig22_HTML.png)


    A SHAP bee swarm plot. The high feature values of power B H P and age have the
    maximum and the minimum SHAP values of 30 and negative 10, respectively. All values
    are estimated.


    **Figure 4-22** Importance of SHAP values on model prediction


    ```

    # explain all the predictions in the dataset

    shap.summary_plot(shap_values_ebm, X100)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig23_HTML.png)


    A SHAP bee swarm plot with all features. The high feature values of power B H
    P and age have the maximum and the minimum SHAP values of 30 and negative 10,
    respectively. The feature values of the rest are mostly at 0. All values are estimated.


    **Figure 4-23** Explaining all predictions with feature importance


    At a high level, for the tree-based nonlinear model that is used to predict the
    price of the automobiles, the previous features are important. The highest is
    the `powerBhp`, age of the car, petrol type, manual transmission type, etc. The
    previous tabular output shows the global feature importance.


