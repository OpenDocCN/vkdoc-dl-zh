    | T5 | 浴室温度 | 摄氏度 |

    | RH_5 | 浴室湿度 | % |

    | T6 | 建筑外部（北侧）温度 | 摄氏度 |

    | RH_6 | 建筑外部（北侧）湿度 | % |

    | T7 | 熨衣间温度 | 摄氏度 |

    | RH_7 | 熨衣间湿度 | % |

    | T8 | 青少年房间 2 温度 | 摄氏度 |

    | RH_8 | 青少年房间 2 湿度 | % |

    | T9 | 父母房间温度 | 摄氏度 |

    | RH_9 | 父母房间湿度 | % |

    | To | 外部温度（来自 Chievres 气象站） | 摄氏度 |

    | Pressure (from Chievres weather station) | | 毫米汞柱 |

