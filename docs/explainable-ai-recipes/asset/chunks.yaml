  raw: '### How It Works


    We are going to use an automobile public dataset with some modifications. The
    objective is to predict the price of a vehicle given the features such as make,
    location, age, etc. It is a regression problem that we are going to solve using
    a mix of numeric and categorical features.


    ```

    df = pd.read_csv(''https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/automobile.csv'')

    df.head(3)

    df.columns

    Index([''Price'', ''Make'', ''Location'', ''Age'', ''Odometer'', ''FuelType'',
    ''Transmission'', ''OwnerType'', ''Mileage'', ''EngineCC'', ''PowerBhp''], dtype=''object'')

    ```


    We cannot use string-based features or categorical features in the model directly
    as matrix multiplication is not possible on string features; hence, the string-based
    features need to be transformed into dummy variables or binary features with 0
    and 1 flags. The transformation step is skipped here because many data scientists
    already know how to do this data transformation. We are importing another transformed
    dataset directly.


    ```

    df_t = pd.read_csv(''https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/Automobile_transformed.csv'')

    del df_t[''Unnamed: 0'']

    df_t.head(3)

    df_t.columns

    Index([''Price'', ''Age'', ''Odometer'', ''mileage'', ''engineCC'', ''powerBhp'',
    ''Location_Bangalore'', ''Location_Chennai'', ''Location_Coimbatore'', ''Location_Delhi'',
    ''Location_Hyderabad'', ''Location_Jaipur'', ''Location_Kochi'', ''Location_Kolkata'',
    ''Location_Mumbai'', ''Location_Pune'', ''FuelType_Diesel'', ''FuelType_Electric'',
    ''FuelType_LPG'', ''FuelType_Petrol'', ''Transmission_Manual'', ''OwnerType_Fourth
    +ACY- Above'', ''OwnerType_Second'', ''OwnerType_Third''], dtype=''object'')

    #y is the dependent variable, that we need to predict

    y = df_t.pop(''Price'')

    # X is the set of input features

    X = df_t

    import pandas as pd

    import shap

    import sklearn

    # a simple linear model initialized

    model = sklearn.linear_model.LinearRegression()

    # linear regression model trained

    model.fit(X, y)

    print("Model coefficients:\n")

    for i in range(X.shape[1]):

    print(X.columns[i], "=", model.coef_[i].round(5))

    Model coefficients:

    Age = -0.92281

    Odometer = 0.0

    mileage = -0.07923

    engineCC = -4e-05

    powerBhp = 0.1356

    Location_Bangalore = 2.00658

    Location_Chennai = 0.94944

    Location_Coimbatore = 2.23592

    Location_Delhi = -0.29837

    Location_Hyderabad = 1.8771

    Location_Jaipur = 0.8738

    Location_Kochi = 0.03311

    Location_Kolkata = -0.86024

    Location_Mumbai = -0.81593

    Location_Pune = 0.33843

    FuelType_Diesel = -1.2545

    FuelType_Electric = 7.03139

    FuelType_LPG = 0.79077

    FuelType_Petrol = -2.8691

    Transmission_Manual = -2.92415

    OwnerType_Fourth +ACY- Above = 1.7104

    OwnerType_Second = -0.55923

    OwnerType_Third = 0.76687

    ```


    To compute the SHAP values, we can use the `explainer` function with the training
    dataset X and model predict function. The SHAP value calculation happens using
    a permutation approach; it took 5 minutes.


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Figd_HTML.png)


    A table has 3 rows and 23 columns. The rows have decimal values for 0, 1, and
    2\. The columns have decimal values from 0 to 22.


    ```

    # compute the SHAP values for the linear model

    explainer = shap.Explainer(model.predict, X)

    # SHAP value calculation

    shap_values = explainer(X)

    Permutation explainer: 6020it [05:14, 18.59it/s]

    import numpy as np

    pd.DataFrame(np.round(shap_values.values,3)).head(3)

    ```


    |   | **0** |

    | **0** | 11.933 |

    | **1** | 11.933 |

    | **2** | 11.933 |


    ```

    # average prediction value is called as the base value

    pd.DataFrame(np.round(shap_values.base_values,3)).head(3)

    ```


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fige_HTML.png)


