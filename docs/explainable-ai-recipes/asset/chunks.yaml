- fmt: '### How It Works


    Let’s take a look at the following example. There are two ways to get the partial
    dependency plot, one with a particular data point superimposed and the other without
    any reference to the data point. See Figure [2-1](#540435_1_En_2_Chapter.xhtml#Fig1).


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fig1_HTML.jpg)


    A graph of `E` of function `x` lights versus lights. It has an increasing slope
    from 80 to 220, a vertical line for `E` of lights, and a horizontal line for `E`
    of function `x`. Values are approximated.


    **Figure 2-1** Correlation between feature `light` and predicted output of the
    model


    ```

    # make a standard partial dependence plot for lights on predicted output for row
    number 20 from the training dataset.

    sample_ind = 20

    shap.partial_dependence_plot(

    "lights", model.predict, X, model_expected_value=True,

    feature_expected_value=True, ice=False,

    shap_values=shap_values[sample_ind:sample_ind+1,:]

    )

    ```


    The partial dependency plot is a way to explain the individual predictions and
    generate local interpretations for the sample selected from the dataset; in this
    case, the sample 20^(th) record is selected from the training dataset. Figure
    [2-1](#540435_1_En_2_Chapter.xhtml#Fig1) shows the partial dependency superimposed
    with the 20^(th) record in red.


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fig2_HTML.jpg)


    A graph of `E` of function `x` lights versus lights. It has an increasing slope
    from 80 to 220, a vertical line for `E` of lights, and a horizontal line for `E`
    of function `x`. Values are approximated.


    **Figure 2-2** Partial dependency plot between `lights` and predicted outcome
    from the model


    ```

    shap.partial_dependence_plot(

    "lights", model.predict, X, ice=False,

    model_expected_value=True, feature_expected_value=True

    )

    ```


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fig3_HTML.png)


    A graphical representation for function `x` equals 140.269 and `E` function `x`
    equals 97.494 has 14 bar values. The highest value is 119.05 for `RH_1`. Values
    are approximated.


    **Figure 2-3** Local interpretation for record number 20


    ```

    # the waterfall_plot shows how we get from shap_values.base_values to model.predict(X)[sample_ind]

    shap.plots.waterfall(shap_values[sample_ind], max_display=14)

    ```


    The local interpretation for record number 20 from the training dataset is displayed
    in Figure [2-3](#540435_1_En_2_Chapter.xhtml#Fig3). The predicted output for the
