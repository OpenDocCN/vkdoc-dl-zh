    ## Recipe 4-21. Local Explanations Using LIME


    ### Problem


    You want to get faster explanations from global and local explainable libraries.


    ### Solution


    The model explanation can be done using SHAP; however, one of the limitations
    of SHAP is we cannot use the full data to create global and local explanations.
    Even if we decide to use the full data, it usually takes more time. Hence, to
    speed up the process of generating local and global explanations in a scenario
    when millions of records are being used to train a model, LIME is very useful.


    ### How It Works


    Let’s take a look at the following example:


    ```

    import lime

    import lime.lime_tabular

    explainer = lime.lime_tabular.LimeTabularExplainer(np.array(xtrain),

    feature_names=list(xtrain.columns),

    class_names=[''target_churn_dum''],

    verbose=True, mode=''classification'')

    # this record is a no churn scenario

    exp = explainer.explain_instance(X.iloc[0], model.predict_proba, num_features=16)

    exp.as_list()

    Intercept 0.2758028503306529

    Prediction_local [0.34562036]

    Right: 0.23860629814459952

    [(''number_customer_service_calls > 2.00'', 0.06944779279619419),

    (''total_day_minutes  1.00'', 0.012192087473855579),

    (''total_day_charge  10.57'', 0.009208937152255816),

    (''total_eve_calls  234.80'', 0.0035628982403953778),

    (''total_night_calls  112.00'', -0.0028523783898236925),

    (''total_intl_calls <= 3.00'', -0.002506612124522332),

    (''10.40 < total_intl_minutes <= 11.90'', -0.0016917444417898933)]

    exp.show_in_notebook(show_table=True)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig52_HTML.png)


    A SHAP local bar chart and table for a no-churn scenario. The predicted probabilities
    for the target and others are 0.76 and 0.24. A table with 2 columns of feature
