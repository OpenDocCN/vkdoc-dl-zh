    ## Recipe 4-14. How the Permutation Model in ELI5 Works


    ### Problem


    You want to make sense of the ELI5 permutation library.


    ### Solution


    The solution to this problem is to use a dataset and a trained model.


    ### How It Works


    The permutation model in the ELI5 library works only for global interpretation.
    First it takes a baseline model from the training dataset and computes the error
    of the model. Then it shuffles the values of a feature, retrains the model, and
    computes the error. It compares the decrease in error after shuffling and before
    shuffling. A feature can be considered as important if after shuffling the error
    delta is high, and unimportant if the error delta is low. The result displays
    the average importance of features and the standard deviation of features with
    multiple shuffle steps.


    ## Recipe 4-15. Global Explanation for Ensemble Classification Models


    ### Problem


    You want to explain the predictions generated from a classification model using
    ensemble models.


    ### Solution


    The logistic regression model is also known as a classification model as we model
    the probabilities from either a binary classification or a multinomial classification
    variable. In this particular recipe, we are using a churn classification dataset
    that has two outcomes: whether the customer is likely to churn or not. Let’s use
    the ensemble models such as the explainable boosting machine for the classifier,
    extreme gradient boosting classifier, random forest classifier, and catboost classifier.'
