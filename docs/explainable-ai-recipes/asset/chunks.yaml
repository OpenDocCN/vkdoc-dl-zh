    ## Recipe 3-13\. Local Explanations Using LIME


    ### Problem


    You want to get faster explanations from explainable both global and local libraries.


    ### Solution


    The model explanation can be done using SHAP; however, one of the limitations
    of SHAP is that we cannot use the full data to create global and local explanations.
    Even if we decide to use the full data, it usually takes more time. Hence, speeding
    up the process of generating local and global explanations in a scenario when
    millions of records are being used to train a model LIME is very useful. The local
    explanations for 1st record is displayed in Figure [3-12](#540435_1_En_3_Chapter.xhtml#Fig12)
    and 20th record is shown in Figure [3-13](#540435_1_En_3_Chapter.xhtml#Fig13).


