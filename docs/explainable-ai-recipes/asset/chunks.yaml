- fmt: "### How It Works\n\nWe are going to use an automobile public dataset with\
    \ some modifications. The objective is to predict the price of a vehicle given\
    \ the features such as `make`, `location`, `age`, etc. It is a regression problem\
    \ that we are going to solve using a mix of numeric and categorical features.\n\
    \n```\ndf = pd.read_csv('https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/automobile.csv')\n\
    df.head(3)\ndf.columns\nIndex(['Price', 'Make', 'Location', 'Age', 'Odometer',\
    \ 'FuelType', 'Transmission', 'OwnerType', 'Mileage', 'EngineCC', 'PowerBhp'],\
    \ dtype='object')\n```\n\nWe cannot use string-based features or categorical features\
    \ in the model directly as matrix multiplication is not possible on string features;\
    \ hence, the string-based features need to be transformed into dummy variables\
    \ or binary features with 0 and 1 flags. The transformation step is skipped here\
    \ because many data scientists already know how to do this data transformation.\
    \ We are importing another transformed dataset directly.\n\n```\ndf_t = pd.read_csv('https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/Automobile_transformed.csv')\n\
    del df_t['Unnamed: 0']\ndf_t.head(3)\ndf_t.columns\nIndex(['Price', 'Age', 'Odometer',\
    \ 'mileage', 'engineCC', 'powerBhp', 'Location_Bangalore', 'Location_Chennai',\
    \ 'Location_Coimbatore', 'Location_Delhi', 'Location_Hyderabad', 'Location_Jaipur',\
    \ 'Location_Kochi', 'Location_Kolkata', 'Location_Mumbai', 'Location_Pune', 'FuelType_Diesel',\
    \ 'FuelType_Electric', 'FuelType_LPG', 'FuelType_Petrol', 'Transmission_Manual',\
    \ 'OwnerType_Fourth +ACY- Above', 'OwnerType_Second', 'OwnerType_Third'], dtype='object')\n\
    # y is the dependent variable, that we need to predict\ny = df_t.pop('Price')\n\
    # X is the set of input features\nX = df_t\nimport pandas as pd\nimport shap\n\
    import sklearn\n# a simple linear model initialized\nmodel = sklearn.linear_model.LinearRegression()\n\
    # linear regression model trained\nmodel.fit(X, y)\nprint(\"Model coefficients:\\\
    n\")\nfor i in range(X.shape[1]):\n    print(X.columns[i], \"=\", model.coef_[i].round(5))\n\
    Model coefficients:\nAge = -0.92281\nOdometer = 0.0\nmileage = -0.07923\nengineCC\
    \ = -4e-05\npowerBhp = 0.1356\nLocation_Bangalore = 2.00658\nLocation_Chennai\
    \ = 0.94944\nLocation_Coimbatore = 2.23592\nLocation_Delhi = -0.29837\nLocation_Hyderabad\
    \ = 1.8771\nLocation_Jaipur = 0.8738\nLocation_Kochi = 0.03311\nLocation_Kolkata\
    \ = -0.86024\nLocation_Mumbai = -0.81593\nLocation_Pune = 0.33843\nFuelType_Diesel\
    \ = -1.2545\nFuelType_Electric = 7.03139\nFuelType_LPG = 0.79077\nFuelType_Petrol\
    \ = -2.8691\nTransmission_Manual = -2.92415\nOwnerType_Fourth +ACY- Above = 1.7104\n\
    OwnerType_Second = -0.55923\nOwnerType_Third = 0.76687\n```\n\nTo compute the\
    \ SHAP values, we can use the `explainer` function with the training dataset `X`\
    \ and model predict function. The SHAP value calculation happens using a permutation\
    \ approach; it took 5 minutes.\n\n![](images/540435_1_En_2_Chapter/540435_1_En_2_Figd_HTML.png)\n\
    \nA table has 3 rows and 23 columns. The rows have decimal values for 0, 1, and\
    \ 2. The columns have decimal values from 0 to 22.\n\n```\n# compute the SHAP\
    \ values for the linear model\nexplainer = shap.Explainer(model.predict, X)\n\
    # SHAP value calculation\nshap_values = explainer(X)\nPermutation explainer: 6020it\
    \ [05:14, 18.59it/s]\nimport numpy as np\npd.DataFrame(np.round(shap_values.values,3)).head(3)\n\
    ```\n\n|   | **0** |\n|---|-------|\n| **0** | 11.933 |\n| **1** | 11.933 |\n\
    | **2** | 11.933 |\n\n```\n# average prediction value is called as the base value\n\
    pd.DataFrame(np.round(shap_values.base_values,3)).head(3)\n```\n\n![](images/540435_1_En_2_Chapter/540435_1_En_2_Fige_HTML.png)\n\
    \nA table has 3 rows and 23 columns. The rows have decimal values for 0, 1, and\
    \ 2. The columns have decimal values from 0 to 22.\n\n```\npd.DataFrame(np.round(shap_values.data,3)).head(3)\n\
    ```\n\n## Recipe 2-5. SHAP Partial Dependency Plot for Regression Model for Mixed\
    \ Input\n\n### Problem\n\nYou want to plot the partial dependency plot and interpret\
