    # 3. Explainability for Nonlinear Supervised Models


    In this chapter, we are going to use explainable libraries to explain a regression
    model and a classification model, while training a nonlinear model. A nonlinear
    model is something where either the input variables are transformed using nonlinear
    transformations or the function to model the input and output is nonlinear.


    In the pursuit of achieving higher accuracy, input features are modified either
    by including polynomial features or by including interaction features, such as
    additive features and multiplicative features. The benefit of adding nonlinear
    features is to capture more complexity in the data and catch more complex patterns
    existing in the data. If we are going to use nonlinear features, the explainability
    can be followed as per the recipes provided in Chapter [2](#540435_1_En_2_Chapter.xhtml).
    If we have a few features, we can create handcrafted polynomial features; however,
    if we have many features, creating all combinations of nonlinear features is not
    only difficult but also very complex to interpret. Hence, selecting a nonlinear
    function or a learning algorithm makes life easier. So, we are going to use the
    ID3 algorithm that powers the decision tree to capture nonlinearity existing in
    data.


    The goal of this chapter is to introduce various explainability libraries for
    decision tree models such as feature importance, partial dependency plot, and
    local interpretation.


