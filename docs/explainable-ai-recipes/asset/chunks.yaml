    ## Recipe 1-7\. Methods of Model Explainability


    ### Problem


    There are various libraries and many explanations for how to identify the right
    method for model explainability.


    ### Solution


    The explainability method depends on who is the consumer of the model output.
    If it is the business or senior management, then the explainability should be
    very simple and in plain English without any mathematical formula. If the consumer
    of explainability is data scientists and machine learning engineers, then the
    explanations may include the mathematical formulas.


    ### How It Works


    The levels of transparency of the machine learning models can be categorized into
    three buckets, as shown in Figure [1-2](#540435_1_En_1_Chapter.xhtml#Fig2).


    ![](images/540435_1_En_1_Chapter/540435_1_En_1_Fig2_HTML.png)


    A table of a row. The row header is the method of explainability. The row has
    3 sub rows with headers textual, visual, and example based. Its corresponding
    attributes are also mentioned.


    **Figure 1-2** Methods of model explainability


    Textual explanations require explaining the mathematical formula in plain English,
    which can help business users or senior management. The interpretations can be
    designed based on model type and model variant and can draw inferences from the
    model outcome. A template to draw inferences can be designed and mapped to the
    model types, and then the templates can be filled in using some natural language
    processing methods.


    A visual explainability method can be used to generate charts, graphs such as
    dendrograms, or any other types of graphs that best explain the relationships.
    The tree-based methods use `if-else` conditions on the back end; hence, it is
    simple to show the causality and the relationship.


    Using common examples and business scenarios from day-to-day operations and drawing
    parallels between them can also be useful.


    Which method you should choose depends on the problem that needs to be solved
    and the consumer of the solution where the machine learning model is being used.


    ## Conclusion


    In various AI projects and initiatives, the machine learning models generate predictions.
    Usually, to trust the outcomes of a model, a detailed explanation is required.
    Since many people are not comfortable explaining the machine learning model outcomes,
    they cannot reason out the decisions of a model, and thereby AI adoption is restricted.
    Explainability is required from a regulatory standpoint as well as from auditing
    and compliance points of view. In high-risk use cases such as medical imaging
    and object detection or pattern recognition, financial prediction and fraud detection,
    etc., explainability is required to explain the decisions of the machine learning
    model.


    In this chapter, we set up the environment by installing various explainable AI
    libraries. Machine learning model interpretability and explainability are the
    key focuses of this book. We are going to use Python-based libraries, frameworks,
    methods, classes, and functions to explain the models.


    In the next chapter, we are going to look at the linear models.


    # 2. Explainability for Linear Supervised Models


    A supervised learning model is a model that is used to train an algorithm to map
    input data to output data. A supervised learning model can be of two types: regression
    or classification. In a regression scenario, the output variable is numerical,
    whereas with classification, the output variable is binary or multinomial. A binary
    output variable has two outcomes, such as true and false, accept and reject, yes
    and no, etc. In the case of multinomial output variables, the outcome can be more
    than two, such as high, medium, and low. In this chapter, we are going to use
    explainable libraries to explain a regression model and a classification model,
    while training a linear model.


    In the classical predictive modeling scenario, a function has been identified,
    and the input data is usually fit to the function to produce the output, where
    the function is usually predetermined. In a modern predictive modeling scenario,
    the input data and output are both shown to a group of functions, and the machine
    identifies the best function that approximates well to the output given a particular
    set of input. There is a need to explain the output of machine learning and deep
    learning models when performing regression and classification tasks. Linear regression
    and linear classification models are simpler to explain.


    The goal of this chapter is to introduce various explainability libraries for
    linear models such as feature importance, partial dependency plot, and local interpretation.


    ## Recipe 2-1\. SHAP Values for a Regression Model on All Numerical Input Variables


    ### Problem


    You want to explain a regression model built on all the numeric features of a
    dataset.


    ### Solution


    A regression model on all the numeric features is trained, and then the trained
    model will be passed through SHAP to generate global explanations and local explanations.'
