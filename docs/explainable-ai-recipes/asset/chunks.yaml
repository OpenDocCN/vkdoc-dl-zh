    ## Recipe 3-7\. LIME Explainer for Tabular Data


    ### Problem


    You want to generate the explainability at a local level in a focused manner rather
    than at a global level.


    ### Solution


    The solution to this problem is to use the LIME library. LIME is a model-agnostic
    technique; it retrains the ML model while running the explainer. LIME localizes
    a problem and explains the model at a local level.


    ### How It Works


    Let’s take a look at the following example. LIME requires a numpy array as an
    input to the tabular explainer; hence, the Pandas dataframe needs to be transformed
    into an array.


