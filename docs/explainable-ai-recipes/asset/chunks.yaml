    ## 配方 1-7\. 模型可解释性的方法


    ### 问题


    关于如何为模型可解释性选择正确的方法，存在多种库和大量解释。


    ### 解决方案


    可解释性方法取决于模型输出的使用者是谁。如果是业务人员或高级管理层，那么可解释性应该非常简单，使用通俗易懂的语言，不包含任何数学公式。如果可解释性的使用者是数据科学家和机器学习工程师，那么解释内容可以包含数学公式。


    ### 工作原理


    机器学习模型的透明度级别可以分为三类，如图 1-2 所示。


    ![](img/540435_1_En_1_Fig2_HTML.png)


    一个单行表格。行标题是可解释性方法。该行有 3 个子行，标题分别为文本、可视化和基于示例。其对应的属性也已提及。


    **图 1-2** 模型可解释性的方法


    文本解释要求用通俗易懂的语言解释数学公式，这有助于业务用户或高级管理层理解。解释内容可以根据模型类型和模型变体进行设计，并可以从模型结果中推断出结论。可以设计一个用于推断结论的模板，并将其映射到模型类型，然后使用一些自然语言处理方法填充模板。


    可视化可解释性方法可用于生成图表、图形（如树状图）或任何其他最能解释关系的图形类型。基于树的方法在后端使用 `if-else` 条件；因此，展示因果关系和关系非常简单。


    使用日常运营中的常见示例和业务场景，并在它们之间进行类比，也很有用。


    您应该选择哪种方法取决于需要解决的问题以及使用机器学习模型的解决方案的使用者。


    ## 结论


    在各种人工智能项目和计划中，机器学习模型会生成预测。通常，为了信任模型的结果，需要详细的解释。由于许多人并不擅长解释机器学习模型的结果，他们无法推理出模型的决策，因此人工智能的采用受到了限制。从监管角度以及审计和合规角度来看，可解释性都是必需的。在医疗影像、目标检测或模式识别、金融预测和欺诈检测等高风险用例中，需要可解释性来解释机器学习模型的决策。


    在本章中，我们通过安装各种可解释的人工智能库来搭建环境。机器学习模型的可解释性和可说明性是本书的重点。我们将使用基于 Python 的库、框架、方法、类和函数来解释模型。


    在下一章中，我们将研究线性模型。


    # 2. 线性监督模型的可解释性


    监督学习模型是一种用于训练算法以将输入数据映射到输出数据的模型。监督学习模型可以分为两种类型：回归或分类。在回归场景中，输出变量是数值型的；而在分类场景中，输出变量是二元的或多分类的。二元输出变量有两个结果，例如真和假、接受和拒绝、是和否等。对于多分类输出变量，结果可能多于两个，例如高、中、低。在本章中，我们将使用可解释性库来解释回归模型和分类模型，同时训练一个线性模型。


    在经典的预测建模场景中，会确定一个函数，输入数据通常被拟合到该函数以产生输出，该函数通常是预先确定的。在现代预测建模场景中，输入数据和输出都展示给一组函数，机器会识别出在给定特定输入集时最能逼近输出的最佳函数。在执行回归和分类任务时，需要解释机器学习和深度学习模型的输出。线性回归和线性分类模型更容易解释。


    本章的目标是介绍各种用于线性模型的可解释性库，例如特征重要性、部分依赖图和局部解释。


    ## 配方 2-1\. 基于所有数值输入变量的回归模型的 SHAP 值


    ### 问题


    您想要解释一个基于数据集所有数值特征构建的回归模型。


    ### 解决方案


    首先训练一个基于所有数值特征的回归模型，然后将训练好的模型传递给 SHAP，以生成全局解释和局部解释。

    '
- fmt: '### How It Works


    Let’s take a look at the following script. The Shapely value can be called the
    SHAP value. It is used to explain the model. It uses the impartial distribution
    of predictions from a cooperative game theory to attribute a feature to the model’s
    predictions. Input features from the dataset are considered as players in the
    game. The models function is considered the rules of the game. The Shapely value
    of a feature is computed based on the following steps:


    1.  SHAP requires model retraining on all feature subsets; hence, usually it takes
    time if the explanation has to be generated for larger datasets.

    2.  Identify a feature set from a list of features (let’s say there are 15 features,
    and we can select a subset with 5 features).

    3.  For any particular feature, two models using the subset of features will be
    created, one with the feature and another without the feature.

    4.  Then the prediction differences will be computed.

    5.  The differences in prediction are computed for all possible subsets of features.

    6.  The weighted average value of all possible differences is used to populate
    the feature importance.


    If the weight of the feature is 0.000, then we can conclude that the feature is
    not important and has not joined the model. If it is not equal to 0.000, then
    we can conclude that the feature has a role to play in the prediction process.


    We are going to use a dataset from the UCI machine learning repository. The URL
    to access the dataset is as follows:


    [`https://archive.ics.uci.edu/ml/datasets/Appliances+energy+prediction`](https://archive.ics.uci.edu/ml/datasets/Appliances%252Benergy%252Bprediction)


    The objective is to predict the appliances’ energy use in Wh, using the features
    from sensors. There are 27 features in the dataset, and here we are trying to
    understand what features are important in predicting the energy usage. See Table
    [2-1](#540435_1_En_2_Chapter.xhtml#Tab1).


    **Table 2-1** Feature Description from the Energy Prediction Dataset


    | Feature Name | Description | Unit |

    | --- | --- | --- |

