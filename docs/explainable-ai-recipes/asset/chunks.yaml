    \ 0 到 22 的小数值。\n\n```\npd.DataFrame(np.round(shap_values.data,3)).head(3)\n```\n\
    \n## 配方 2-5. 混合输入回归模型的 SHAP 偏依赖图\n\n### 问题\n\n你想要绘制偏依赖图，并解释数值型和类别型虚拟变量的图形。\n\n\
