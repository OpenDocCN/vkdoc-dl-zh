    ```

    temp_df = pd.DataFrame()

    temp_df[''Feature Name''] = pd.Series(X.columns)

    temp_df[''Coefficients''] = pd.Series(log_model.coef_.flatten())

    temp_df.sort_values(by=''Coefficients'',ascending=False)

    ```


    The interpretation goes like this: when we change the value of a feature by 1
    unit, the model equation will produce two odds; one is the base, and the other
    is the incremental value of the feature. We are looking at the ratio of odds changing
    with every increase or decrease in the value of a feature. From the global feature
    importance, there are three important features: the number of customer service
    calls, the total minutes for the day, and the number of voicemail messages.


    ## Recipe 2-15\. Local Explanations Using LIME


    ### Problem


    You want to get faster explanations from both global and local explainable libraries.


    ### Solution


    The model explanation can be done using SHAP; however, one of the limitations
    of SHAP is we cannot use the full data to create global and local explanations.
    Even if we decide to use the full data, it usually takes more time. Hence, LIME
    is very useful to speed up the process of generating local and global explanations
    in a scenario when millions of records are being used to train a model.


    ### How It Works


    Let’s take a look at the following script:


