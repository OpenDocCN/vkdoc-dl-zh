    ## Recipe 2-5\. SHAP Partial Dependency Plot for Regression Model for Mixed Input


    ### Problem


    You want to plot the partial dependency plot and interpret the graph for numeric
    and categorical dummy variables.


    ### Solution


    The partial dependency plot shows the correlation between the feature and the
    predicted output of the target variables. There are two ways we can showcase the
    results, one with a feature and expected value of the prediction function and
    the other with superimposing a data point on the partial dependency plot.'
  trans: "\n### 工作原理\n\n我们将使用一个经过修改的汽车公开数据集。目标是根据`make`（制造商）、`location`（位置）、`age`（车龄）等特征来预测车辆的价格。这是一个回归问题，我们将结合数值型和类别型特征来解决。\n\
    \n```\ndf = pd.read_csv('https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/automobile.csv')\n\
    df.head(3)\ndf.columns\nIndex(['Price', 'Make', 'Location', 'Age', 'Odometer',\
    \ 'FuelType', 'Transmission', 'OwnerType', 'Mileage', 'EngineCC', 'PowerBhp'],\
    \ dtype='object')\n```\n\n我们不能直接在模型中使用基于字符串的特征或类别型特征，因为矩阵乘法无法在字符串特征上进行；因此，需要将基于字符串的特征转换为虚拟变量或带有\
    \ 0 和 1 标志的二元特征。此处省略了转换步骤，因为许多数据科学家已经知道如何进行这种数据转换。我们直接导入另一个已转换的数据集。\n\n```\ndf_t\
    \ = pd.read_csv('https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/Automobile_transformed.csv')\n\
    del df_t['Unnamed: 0']\ndf_t.head(3)\ndf_t.columns\nIndex(['Price', 'Age', 'Odometer',\
    \ 'mileage', 'engineCC', 'powerBhp', 'Location_Bangalore', 'Location_Chennai',\
    \ 'Location_Coimbatore', 'Location_Delhi', 'Location_Hyderabad', 'Location_Jaipur',\
    \ 'Location_Kochi', 'Location_Kolkata', 'Location_Mumbai', 'Location_Pune', 'FuelType_Diesel',\
    \ 'FuelType_Electric', 'FuelType_LPG', 'FuelType_Petrol', 'Transmission_Manual',\
    \ 'OwnerType_Fourth +ACY- Above', 'OwnerType_Second', 'OwnerType_Third'], dtype='object')\n\
    # y 是因变量，我们需要预测它\ny = df_t.pop('Price')\n# X 是输入特征集\nX = df_t\nimport pandas as\
    \ pd\nimport shap\nimport sklearn\n# 初始化一个简单的线性模型\nmodel = sklearn.linear_model.LinearRegression()\n\
    # 训练线性回归模型\nmodel.fit(X, y)\nprint(\"模型系数:\\n\")\nfor i in range(X.shape[1]):\n\
    \    print(X.columns[i], \"=\", model.coef_[i].round(5))\n模型系数:\nAge = -0.92281\n\
    Odometer = 0.0\nmileage = -0.07923\nengineCC = -4e-05\npowerBhp = 0.1356\nLocation_Bangalore\
    \ = 2.00658\nLocation_Chennai = 0.94944\nLocation_Coimbatore = 2.23592\nLocation_Delhi\
    \ = -0.29837\nLocation_Hyderabad = 1.8771\nLocation_Jaipur = 0.8738\nLocation_Kochi\
    \ = 0.03311\nLocation_Kolkata = -0.86024\nLocation_Mumbai = -0.81593\nLocation_Pune\
    \ = 0.33843\nFuelType_Diesel = -1.2545\nFuelType_Electric = 7.03139\nFuelType_LPG\
    \ = 0.79077\nFuelType_Petrol = -2.8691\nTransmission_Manual = -2.92415\nOwnerType_Fourth\
    \ +ACY- Above = 1.7104\nOwnerType_Second = -0.55923\nOwnerType_Third = 0.76687\n\
    ```\n\n为了计算 SHAP 值，我们可以使用`explainer`函数，并传入训练数据集`X`和模型预测函数。SHAP 值的计算采用排列方法；这花费了\
    \ 5 分钟。\n\n![](img/540435_1_En_2_Figd_HTML.png)\n\n一个表格有 3 行和 23 列。行的数值为 0、1 和\
