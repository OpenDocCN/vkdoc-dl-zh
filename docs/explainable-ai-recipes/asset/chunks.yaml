    ## 配方 4-5. 使用全局和局部解释解释 CatBoost 回归器


    ### 问题


    CatBoost 是另一种通过显式声明类别特征来加速模型训练过程的模型。如果没有类别特征，则该模型也会在所有数值特征上进行训练。你需要解释 CatBoost
    回归模型的全局和局部解释。


    ### 解决方案


    我们将使用 SHAP 库和 CatBoost 库中的树解释器。


    ### 工作原理


    让我们来看下面的示例：


    ```python

    !pip install catboost

