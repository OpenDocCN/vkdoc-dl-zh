    # 6. Explainability for Time-Series Models


    A time series, as the name implies, has a time stamp and a variable that we are
    observing over time, such as stock prices, sales, revenue, profit over time, etc.
    Time-series modeling is a set of techniques that can be used to generate multistep
    predictions for a future time period, which will help a business to plan better
    and will help decision-makers to plan according to the future estimations. There
    are machine learning–based techniques that can be applied to generate future forecasting;
    also, there is a need to explain the predictions about the future.


    The most commonly used techniques for time-series forecasting are autoregressive
    methods, moving average methods, autoregressive and moving average methods, and
    deep learning–based techniques such as LSTM, etc. The time-series model requires
    the data to be at frequent time intervals. If there is any gap in recording, it
    requires a different process to address the gap in the time series. The time-series
    model can be looked at from two ways: univariate, which is completely dependent
    on time, and multivariate, which takes into account various factors. Those factors
    are called *causal factors*, which impact the predictions. In the time-series
    model, the time is an independent variable, so we can compute various features
    from the time as an independent feature. Time-series modeling has various components
    such as trend, seasonality, and cyclicity.


