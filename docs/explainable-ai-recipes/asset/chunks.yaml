- fmt: '### How It Works


    Let’s take a look at the following example. The Shapely value can be called the
    SHAP value. It is used to explain the model and is used for the impartial distribution
    of predictions from a cooperative game theory to attribute a feature to the model’s
    predictions. Model input features are considered as players in the game. The model
    function is considered as the rules of the game. The Shapely value of a feature
    is computed based on the following steps:


    1. SHAP requires model retraining on all feature subsets; hence, usually it takes
    time if the explanation has to be generated for larger datasets.

    2. Identify a feature set from a list of features (let’s say there are 15 features;
    we can select a subset with 5 features).

    3. For any particular feature, two models using the subset of features will be
    created, one with the feature and another without the feature.

    4. The prediction differences will be computed.

    5. The differences in prediction are computed for all possible subsets of features.

    6. The weighted average value of all possible differences is used to populate
    the feature importance.


    If the weight of the feature is `0.000`, then we can conclude that the feature
    is not important and has not joined the model. If it is not equal to `0.000`,
    then we can conclude that the feature has a role to play in the prediction process.


    We are going to use a dataset from the UCI machine learning repository. The URL
    to access the dataset is as follows:


    [`https://archive.ics.uci.edu/ml/datasets/Appliances+energy+prediction`](https://archive.ics.uci.edu/ml/datasets/Appliances%252Benergy%252Bprediction)


    The objective is to predict the appliances’ energy use in Wh, using the features
    from sensors. There are 27 features in the dataset, and here we are trying to
    understand what features are important in predicting the energy usage. See Table
    [3-1](#540435_1_En_3_Chapter.xhtml#Tab1).


