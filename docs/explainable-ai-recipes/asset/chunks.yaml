    ## 结论


    在本章中，我们介绍了如何解释线性监督模型，例如回归和分类模型。线性模型在全局层面（即特征重要性层面）更容易解释，但在局部解释层面则难以说明。在本章中，我们使用
    SHAP、ELI5 和 LIME 库研究了样本的局部解释。


    在下一章中，我们将介绍非线性模型的局部和全局解释。非线性模型涵盖了数据中存在的非线性关系，因此可能难以解释。因此，我们需要一套框架来解释模型中的非线性。


    # 3. 非线性监督模型的可解释性


    在本章中，我们将使用可解释性库来解释回归模型和分类模型，同时训练一个非线性模型。非线性模型是指输入变量通过非线性变换进行转换，或者用于建模输入和输出的函数是非线性的模型。


    为了追求更高的准确率，输入特征会通过包含多项式特征或交互特征（例如加性特征和乘性特征）来进行修改。添加非线性特征的好处在于能够捕捉数据中更复杂的模式和关系。如果我们使用非线性特征，可以按照第
    2 章提供的方案进行解释。如果特征数量较少，我们可以创建手工制作的多项式特征；然而，如果特征数量很多，创建所有非线性特征的组合不仅困难，而且解释起来也非常复杂。因此，选择一个非线性函数或学习算法会让事情变得更容易。所以，我们将使用驱动决策树的
    ID3 算法来捕捉数据中存在的非线性。


    本章的目标是介绍决策树模型的各种可解释性库，例如特征重要性、部分依赖图和局部解释。


    ## 配方 3-1. 基于所有数值输入变量的树模型的 SHAP 值


    ### 问题


    您想要解释一个基于所有数值特征构建的决策树回归模型。


    ### 解决方案


    首先训练基于所有数值特征的决策树回归模型，然后将训练好的模型传递给 SHAP，以生成全局解释和局部解释。

