    ```


    This part of the script takes time as it is a computationally intensive process.
    The `explainer` function calculates permutations, which means taking a feature
    set and generating the prediction difference. This difference is the presence
    of one feature and the absence of the same feature. For faster calculation, we
    can reduce the sample size to a smaller set, let’s say 1,000 or 2,000. In the
    previous script, we are using the entire population of 19,735 records to calculate
    the SHAP values. This part of the script can be improved by applying Python multiprocessing,
    which is beyond the scope of this chapter.


    The SHAP value for a specific feature `i` is just the difference between the expected
    model output and the partial dependence plot at the feature’s value `xi`. One
    of the fundamental properties of Shapley values is that they always sum up to
    the difference between the game outcome when all players are present and the game
    outcome when no players are present. For machine learning models, this means that
    SHAP values of all the input features will always sum up to the difference between
    the baseline (expected) model output and the current model output for the prediction
    being explained.


    SHAP values have three objects: (a) the SHAP value for each feature, (b) the base
    value, and (c) the original training data. As there are 27 features, we can expect
    27 `shap` values.


