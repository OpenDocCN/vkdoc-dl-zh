    # 5. Explainability for Natural Language Processing


    Natural language processing tasks such as text classification and sentiment analysis
    can be explained using explainable AI libraries such as SHAP and ELI5\. The objective
    of explaining the text classification tasks or sentiment analysis tasks is to
    let the user know how a decision was made. The predictions are generated using
    a supervised learning model for unstructured text data. The input is a text sentence
    or many sentences or phrases, and we train a machine learning model to perform
    text classification such as customer review classification, feedback classification,
    newsgroup classification, etc. In this chapter, we will be using explainable libraries
    to explain the predictions or classifications.


    There are three common problems where explainability is required in natural language
    processing.


    *   Document classification, where the input is a series of sentences extracted
    from a document, and the output is the label attached to the document. If a document
    is misclassified or someone wants to know why a document is being classified by
    the algorithm in a certain way, we need to explain why.


    *   For named entity recognition tasks, we need to predict the entity to which
    a name belongs. If it is assigned to another entity, we need to explain why.


    *   For sentiment analysis, if a sentiment category is wrongly assigned to another
    category, then we need to explain why.


    ## Recipe 5-1\. Explain Sentiment Analysis Text Classification Using SHAP


    ### Problem


    You want to explain sentiment analysis prediction using SHAP.


    ### Solution


    The solution takes into account the most common dataset available, which is the
    IMDB sentiment classification dataset from the SHAP library. It can be accessed
    using the SHAP dataset. We will be using the SHAP library to explain the predictions.'
