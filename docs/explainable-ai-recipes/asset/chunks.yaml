    ## Recipe 3-2. Partial Dependency Plot for Tree Regression Model


    ### Problem


    You want to get a partial dependency plot from a decision tree regression model.


    ### Solution


    The solution to this problem is to use a partial dependency plot from the model
    using a tree explainer. The correlation between the feature and its SHAP values
    graphically displayed in Figure [3-2](#540435_1_En_3_Chapter.xhtml#Fig3).


    ### How It Works


    Let’s take a look at the following example:


    ![](images/540435_1_En_3_Chapter/540435_1_En_3_Fig2_HTML.jpg)


    A graph of `E(f(x) | lights)` versus `lights` has an increasing step function
    from (40, 150), a vertical line for `E(lights)`, and a horizontal line for `E(f(x))`.
    Values are approximated.


    **Figure 3-2** Correlation between feature light and predicted output of the model


    ```

    shap.partial_dependence_plot(

    "lights", model.predict, X, ice=False,

    model_expected_value=True, feature_expected_value=True

    )

    ```


    The correlation between the feature `lights` and the predicted value of the model
    energy usage is shown, and the steps show a nonlinear pattern.


    The partial dependency plot is a way to explain the individual predictions and
    generate local interpretations for the sample selected from the dataset.


