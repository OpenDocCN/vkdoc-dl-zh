    ### Problem


    You want to plot the partial dependency plot and interpret the graph for numeric
    and categorical dummy variables.


    ### Solution


    The partial dependency plot shows the correlation between a feature and the predicted
    output of the target variables. There are two ways we can showcase the results,
    one with a feature and expected value of the prediction function and the other
    by superimposing a data point on the partial dependency plot.'
