    ## Recipe 4-19. Explain a Random Forest Classifier


    ### Problem


    You want to get faster explanations from global and local explainable libraries
    using a random forest classifier. A random forest creates a family of trees as
    estimators and averages the predictions using the majority voting rule.


    ### Solution


    The model explanation can be done using SHAP; however, one of the limitations
    of SHAP is we cannot use the full data to create global and local explanations.


    ### How It Works


    Let’s take a look at the following example:


    ```

    import shap

    from sklearn.ensemble import RandomForestClassifier

    rforest = RandomForestClassifier(n_estimators=100, max_depth=3, min_samples_split=20,
    random_state=0)

    rforest.fit(X, Y)

    # explain all the predictions in the test set

    explainer = shap.TreeExplainer(rforest)

    shap_values = explainer.shap_values(X)

    shap.dependence_plot("account_length", shap_values[0], X)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig48_HTML.jpg)


    A scatterplot of SHAP values and total day minutes versus account length. A gradient
    scale for total day minutes has values between 100 and 260. The points of various
    shades decline between (25, 0.0050) and (225, negative 0.0125). All values are
    estimated.


    **Figure 4-48** Dependence plot from SHAP


    ```

    shap.partial_dependence_plot(

    "total_day_minutes", rforest.predict, X, ice=False,

    model_expected_value=True, feature_expected_value=True

    )

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig49_HTML.jpg)


    A SHAP partial dependence plot of total day minutes. The line moves horizontally
    from (0, 0.00), rises up to (300, 0.05), and ends at (350, 0.05). The highest
    bar is at (175, 0). The lines for `E total day minutes` and `E f of x` intersect
    at (175, 0.38). All values are estimated.


    **Figure 4-49** Partial dependence plot of total day minutes


    ```

    shap.summary_plot(shap_values, X)

    ```


    ![](images/540435_1_En_4_Chapter/540435_1_En_4_Fig50_HTML.png)


    A horizontally stacked bar graph of features versus mean SHAP value. The class
    0 and 1 bars of the number of customer service calls are the highest at around
    0.06 and the class 1 bar of area code `t r` is the lowest at almost 0.00.


    **Figure 4-50** Feature importance for two classes separately based on absolute
    average SHAP value


    ## Recipe 4-20. Catboost Model Interpretation for Classification Scenario


    ### Problem


    You want to get an explanation for the catboost model–based binary classification
    problem.


    ### Solution


    The model explanation can be done using SHAP; however, one of the limitations
    of SHAP is we cannot use the full data to create global and local explanations.
    Even if we decide to use the full data, it usually takes more time. Hence, to
    speed up the process of generating local and global explanations in a scenario
    when millions of records are being used to train a model, LIME is very useful.
    Catboost needs iterations to be defined.'
