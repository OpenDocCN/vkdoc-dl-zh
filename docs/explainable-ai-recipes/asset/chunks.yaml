    ## Recipe 2-15. Local Explanations Using LIME


    ### Problem


    You want to get faster explanations from both global and local explainable libraries.


    ### Solution


    The model explanation can be done using SHAP; however, one of the limitations
    of SHAP is we cannot use the full data to create global and local explanations.
    Even if we decide to use the full data, it usually takes more time. Hence, LIME
    is very useful to speed up the process of generating local and global explanations
    in a scenario when millions of records are being used to train a model.


    ### How It Works


    Let’s take a look at the following script:


    | 0 | 1 | 2 |

    | --- | --- | --- |

    | **0** | `number_customer_service_calls > 2.00` | 0.153089 |

    | **1** | `total_day_minutes > 213.80` | 0.111146 |

    | **2** | `number_vmail_messages <= 0.00` | 0.096100 |

    | **3** | `total_intl_calls <= 3.00` | 0.031770 |

    | **4** | `total_day_calls <= 86.00` | 0.029375 |

    | **5** | `99.00 < total_night_calls <= 113.00` | -0.023965 |

    | **6** | `account_length > 126.00` | -0.015756 |

    | **7** | `88.00 < total_eve_calls <= 101.00` | 0.008756 |

