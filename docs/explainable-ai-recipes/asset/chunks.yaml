    脚本的这一部分很耗时，因为它是一个计算密集型过程。`explainer` 函数计算排列组合，这意味着选取一个特征集并生成预测差异。这个差异就是存在某个特征与不存在该特征之间的差别。为了加快计算速度，我们可以将样本量减少到较小的集合，比如
    1,000 或 2,000。在上面的脚本中，我们使用了全部 19,735 条记录来计算 SHAP 值。脚本的这一部分可以通过应用 Python 多进程来改进，但这超出了本章的范围。


    特定特征 `i` 的 SHAP 值就是期望模型输出与该特征值 `xi` 处的部分依赖图之间的差值。Shapley 值的一个基本属性是，它们之和总是等于所有玩家参与游戏时的结果与没有玩家参与游戏时的结果之差。对于机器学习模型而言，这意味着所有输入特征的
    SHAP 值之和总是等于基线（期望）模型输出与当前被解释预测的模型输出之间的差值。


    SHAP 值包含三个对象：(a) 每个特征的 SHAP 值，(b) 基值，以及 (c) 原始训练数据。由于有 27 个特征，我们可以预期有 27 个 `shap`
    值。


