    ## Recipe 4-2\. Partial Dependency Plot for Tree Regression Models


    ### Problem


    You want to get a partial dependency plot from a boosting model.


    ### Solution


    The solution to this problem is to use a partial dependency plot from the model
    using SHAP.'
  trans: '

    ### 工作原理


    让我们来看下面的例子。Shapley 值可称为 SHAP 值。SHAP 值用于解释模型，并基于合作博弈论对预测结果进行公平分配，以将特征归因于模型的预测结果。模型输入特征被视为博弈中的玩家，模型函数则被视为博弈规则。某个特征的
    Shapley 值基于以下步骤计算：


    1.  SHAP 需要在所有特征子集上重新训练模型；因此，如果需要对较大的数据集生成解释，通常需要花费时间。

    2.  从特征列表中确定一个特征集（假设有 15 个特征，我们可以选择包含 5 个特征的子集）。

    3.  对于任何特定特征，将使用特征子集创建两个模型：一个包含该特征，另一个不包含该特征。

    4.  计算预测差异。

    5.  对所有可能的特征子集计算预测差异。

    6.  所有可能差异的加权平均值用于填充特征重要性。


    如果特征的权重为 `0.000`，那么我们可以得出结论：该特征不重要，且未参与模型。如果不等于 `0.000`，那么我们可以得出结论：该特征在预测过程中发挥作用。


    我们将使用 UCI 机器学习仓库中的一个数据集。访问该数据集的 URL 如下：


    [`https://archive.ics.uci.edu/ml/datasets/Appliances+energy+prediction`](https://archive.ics.uci.edu/ml/datasets/Appliances%252Benergy%252Bprediction)


    目标是利用传感器中的特征预测电器的能耗（单位：瓦时）。数据集中有 27 个特征，我们在此试图理解哪些特征对预测能耗至关重要。参见表 4-1。


    **表 4-1** 能耗预测数据集的特征描述


    | 特征名称 | 描述 | 单位 |

    | --- | --- | --- |

    | Appliances | 能耗 | 瓦时 |

    | Lights | 房屋内灯具的能耗 | 瓦时 |

    | T1 | 厨房区域温度 | 摄氏度 |

    | RH_1 | 厨房区域湿度 | % |

    | T2 | 客厅区域温度 | 摄氏度 |

    | RH_2 | 客厅区域湿度 | % |

    | T3 | 洗衣房区域温度 | 摄氏度 |

    | RH_3 | 洗衣房区域湿度 | % |

    | T4 | 办公室温度 | 摄氏度 |

