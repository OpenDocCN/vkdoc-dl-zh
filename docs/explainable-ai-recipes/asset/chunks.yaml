    ## Recipe 2-3. SHAP Feature Importance for Regression Model with All Numerical
    Input Variables


    ### Problem


    You want to calculate the feature importance using the SHAP values.


    ### Solution


    The solution to this problem is to use SHAP absolute values from the model.


    ### How It Works


    Let’s take a look at the following example. SHAP values can be used to show the
    global importance of features. Importance features means features that have a
    larger importance in predicting the output.


    ```

    #computing shap importance values for the linear model

    import numpy as np

    feature_names = shap_values.feature_names

    shap_df = pd.DataFrame(shap_values.values, columns=feature_names)

    vals = np.abs(shap_df.values).mean(0)

    shap_importance = pd.DataFrame(list(zip(feature_names, vals)), columns=[''col_name'',
    ''feature_importance_vals''])

    shap_importance.sort_values(by=[''feature_importance_vals''], ascending=False,
    inplace=True)

    print(shap_importance)

    col_name  feature_importance_vals

    2          RH_1                49.530061

    19        T_out                43.828847

    4          RH_2                42.911069

    5            T3                41.671587

    11           T6                34.653893

    3            T2                31.097282

    17           T9                26.607721

    16         RH_8                19.920029

    24    Tdewpoint                17.443688

    21       RH_out                13.044643

    6          RH_3                13.042064

    15           T8                12.803450

    0        lights                11.907603

    12         RH_6                 7.806188

    14         RH_7                 6.578015

    7            T4                 5.866801

    22    Windspeed                 3.361895

    13           T7                 3.182072

    18         RH_9                 3.041144

    23   Visibility                 1.385616

    10         RH_5                 0.855398

    20  Press_mm_hg                 0.823456

    1            T1                 0.765753

    8          RH_4                 0.642723

    25          rv1                 0.260885

    26          rv2                 0.260885

    9            T5                 0.041905

    ```


    All the feature importance values are not scaled; hence, sum of values from all
    features will not be totaling 100.


    The beeswarm chart in Figure [2-4](#540435_1_En_2_Chapter.xhtml#Fig4) shows the
    impact of SHAP values on model output. The blue dot shows a low feature value,
    and a red dot shows a high feature value. Each dot indicates one data point from
    the dataset. The beeswarm plot shows the distribution of feature values against
    the SHAP values.


    ![](images/540435_1_En_2_Chapter/540435_1_En_2_Fig4_HTML.png)


    A graph of feature value and SHAP value has 10 fluctuating signals. It has signals
    for `RH_1`, `T_out`, `RH_2`, `T3`, `T2`, `RH_8`, `Tdewpoint`, and the sum of 18
    other features.


    **Figure 2-4** Impact on model output


    ```

    shap.plots.beeswarm(shap_values)

    ```


    ## Recipe 2-4. SHAP Values for a Regression Model on All Mixed Input Variables


    ### Problem


    How do you estimate SHAP values when you introduce the categorical variables along
    with the numerical variables, which is a mixed set of input features.


    ### Solution


    The solution is that the mixed input variables that have numeric features as well
    as categorical or binary features can be modeled together. As the number of features
    increases, the time to compute all the permutations will also increase.'
