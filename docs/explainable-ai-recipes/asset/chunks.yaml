    \n散点图比较了 `t-1` 和 `t-2` 的 SHAP 值。它按递增趋势绘制数据，并在约 (1750, 900) 处获得高值。\n\n**图 6-7**\
    \  \nSHAP 依赖图\n\n```\nshap.dependence_plot(\"t-1\", shap_values, X)\n```\n\n```\n\
    shap.partial_dependence_plot(\n\"t-1\", rforest.predict, X, ice=False,\nmodel_expected_value=True,\
    \ feature_expected_value=True\n)\n```\n\n![](img/540435_1_En_6_Fig8_HTML.jpg)\n\
    \n一张图绘制了 `E[f(x) | t-1]` 与 `t-1` 的关系。它绘制了一条递增曲线，并附有垂直条，为特征 `t-1` 的偏依赖提供了数据。\n\n\
    **图 6-8**  \n特征 `t-1` 的偏依赖图\n\n## 结论\n\n在本章中，我们介绍了如何解释时间序列模型以生成预测。为了解释单变量时间序列模型，我们将其视为一个监督学习问题，将滞后项作为可训练特征。然后使用线性回归器训练这些特征，并利用回归模型在全局和局部层面生成解释，同时使用了\
    \ SHAP 和 LIME 库。类似地，可以使用更复杂的算法（如非线性和集成技术）生成解释，最后，可以像前几章一样，使用 SHAP 和 LIME 生成类似的图形和图表。下一章将包含解释深度神经网络模型的配方。\n\
    \n# 7. 深度学习模型的可解释性\n\n深度学习模型正成为人工智能实现的支柱。同时，构建可解释性层来解释深度学习模型的预测和输出也极其重要。为了建立对深度学习模型结果的信任，我们需要解释其结果或输出。从高层次来看，深度学习层涉及多个隐藏层，而神经网络层有三个层：输入层、隐藏层和输出层。神经网络模型有不同的变体，例如单隐藏层神经网络模型、多隐藏层神经网络、前馈神经网络和反向传播神经网络。根据神经网络模型的结构，有三种流行的结构：循环神经网络，主要用于序列信息处理，如音频处理、文本分类等；深度神经网络，用于构建极深的网络；最后是卷积神经网络模型，用于图像分类。\n\
    \nDeep SHAP 是一个框架，用于从使用 TensorFlow、Keras 或 PyTorch 开发的深度学习模型中推导出 SHAP 值。如果我们将机器学习模型与深度学习模型进行比较，深度学习模型很难向任何人解释。在本章中，我们将提供解释深度学习模型组件的配方。\n\
    \n## 配方 7-1. 使用基于 Keras 的梯度解释器解释 MNIST 图像\n\n### 问题\n\n你想使用 SHAP 解释一个基于 Keras\
    \ 的深度学习模型。\n\n### 解决方案\n\n我们使用一个名为 MNIST 的示例图像数据集。首先，我们可以使用 TensorFlow 管道中的 Keras\
    \ 训练一个卷积神经网络。然后，我们可以使用 SHAP 库中的梯度解释器模块来构建解释器对象。该解释器对象可用于创建 SHAP 值，进而利用 SHAP 值，我们可以更深入地了解图像分类任务、单个类别预测及其对应的概率值。\n"
- fmt: '### How It Works


    Let’s take a look at the following example:


    ```

    import TensorFlow as tf

    from TensorFlow.keras import Input

    from TensorFlow.keras.layers import Flatten, Dense, Dropout, Conv2D

    import warnings

    warnings.filterwarnings("ignore")

    # load the MNIST data

    (x_train, y_train), (x_test, y_test) = tf.keras.datasets.mnist.load_data()

    x_train, x_test = x_train / 255.0, x_test / 255.0

    x_train = x_train.astype(''float32'')

    x_test = x_test.astype(''float32'')

    x_train = x_train.reshape(x_train.shape[0], 28, 28, 1)

    x_test = x_test.reshape(x_test.shape[0], 28, 28, 1)

    ```


    There are two inputs: one for generating explanations using a feedforward neural
    network layer and another using the convolutional neural network layer. This is
    to compare the two inputs that can be explained by the `SHAP` library in different
    ways.


    ```

    # define our model

    input1 = Input(shape=(28,28,1))

    input2 = Input(shape=(28,28,1))

    input2c = Conv2D(32, kernel_size=(3, 3), activation=''relu'')(input2)

    joint = tf.keras.layers.concatenate([Flatten()(input1), Flatten()(input2c)])

    out = Dense(10, activation=''softmax'')(Dropout(0.2)(Dense(128, activation=''relu'')(joint)))

    model = tf.keras.models.Model(inputs = [input1, input2], outputs=out)

    model.summary()

    ```


    ![](images/540435_1_En_7_Chapter/540435_1_En_7_Figa_HTML.png)


    A table has four columns for layer, output shape, param hash, and connected to.
    It has nine rows for different layers. The text at the bottom of the table reads
    total, trainable, and non-trainable parameters.


    Compile the model using the `Adam` optimizer, with sparse categorical cross entropy
    and accuracy. We can choose different types of optimizers to achieve the best
    accuracy.


    ```

    model.compile(optimizer=''adam'',

    loss=''sparse_categorical_crossentropy'',

    metrics=[''accuracy''])

    ```


    As the next step, we can train the model. An epoch of 3 has been selected due
    to processing constraints, but the epoch size can be increased based on the time
    availability and the computational power of the machines.


    ```

    # fit the model

    model.fit([x_train, x_train], y_train, epochs=3)

    ```


    Once the model is created, in the next step we can install the `SHAP` library
    and create a gradient explainer object either using the same training dataset
    or using the test dataset.


    ```

    pip install shap

    import shap

    # since we have two inputs we pass a list of inputs to the explainer

    explainer = shap.GradientExplainer(model, [x_train, x_train])

    # we explain the model''s predictions on the first three samples of the test set

    shap_values = explainer.shap_values([x_test[:3], x_test[:3]])

    # since the model has 10 outputs we get a list of 10 explanations (one for each
    output)

    print(len(shap_values))

    ```


    The two inputs were explained previously. There are two set of SHAP values, one
    corresponding to the feedforward layer and another relating to the convolutional
    neural network layer. See Figure [7-1](#540435_1_En_7_Chapter.xhtml#Fig1) and
    Figure [7-2](#540435_1_En_7_Chapter.xhtml#Fig2).


    ![](images/540435_1_En_7_Chapter/540435_1_En_7_Fig1_HTML.png)


    A graphical representation of the SHAP value has three rows and 11 columns with
    blocks for numbers 7, 2, and 1. The first column is shaded.


    **Figure 7-1** SHAP value for three samples with positive and negative weights


    ```

    # since the model has 2 inputs we get a list of 2 explanations (one for each input)
    for each output

    print(len(shap_values[0]))

    # here we plot the explanations for all classes for the first input (this is the
    feed forward input)

    shap.image_plot([shap_values[i][0] for i in range(10)], x_test[:3])

    ```


    ```

    # here we plot the explanations for all classes for the second input (this is
    the conv-net input)

    shap.image_plot([shap_values[i][1] for i in range(10)], x_test[:3])

    ```


    ![](images/540435_1_En_7_Chapter/540435_1_En_7_Fig2_HTML.png)


    A graphical representation of the SHAP value has three rows and 11 columns with
    blocks for numbers 7, 2, and 1. The first column is shaded.


    **Figure 7-2** SHAP value for the second input versus all classes


    ```

    # get the variance of our estimates

    shap_values, shap_values_var = explainer.shap_values([x_test[:3], x_test[:3]],
    return_variances=True)

    ```


    To explain the feedforward way of weight distribution and attribution of classes,
    we need to estimate the variances; hence, we need to get the SHAP values of variances.
    See Figure [7-3](#540435_1_En_7_Chapter.xhtml#Fig3).


    ![](images/540435_1_En_7_Chapter/540435_1_En_7_Fig3_HTML.png)


    A graphical representation of the SHAP value has three rows and 11 columns with
    blocks for numbers 7, 2, and 1. The first column is shaded.


    **Figure 7-3** Feedforward input explanations for all classes


    ```

    # here we plot the explanations for all classes for the first input (this is the
    feed forward input)

    shap.image_plot([shap_values_var[i][0] for i in range(10)], x_test[:3])

    ```


    ## Recipe 7-2. Use Kernel Explainer–Based SHAP Values from a Keras Model


    ### Problem


    You want to explain the kernel-based explainer for a structured data problem for
    binary classification, while training with a deep learning model from Keras.


    ### Solution


    We will use the census income dataset, which is available in the `SHAP` library;
    develop a neural network model; and then use the trained model object to apply
    the kernel explainer. The kernel SHAP method is defined as a special weighted
    linear regression to compute the importance of each feature in a deep learning
    model.


    ### How It Works


    Let’s take a look at the following example:


    ```

    from sklearn.model_selection import train_test_split

    from keras.layers import Input, Dense, Flatten, Concatenate, concatenate, Dropout,
    Lambda

    from keras.models import Model

    from keras.layers.embeddings import Embedding

    from tqdm import tqdm

    import shap

    # print the JS visualization code to the notebook

    #shap.initjs()

    ```


    If the machine supports JS visualization, then please remove the comment and run
    the previous script. See Figure [7-4](#540435_1_En_7_Chapter.xhtml#Fig4).


    ```

    X,y = shap.datasets.adult()

    X_display,y_display = shap.datasets.adult(display=True)

    # normalize data (this is important for model convergence)

    dtypes = list(zip(X.dtypes.index, map(str, X.dtypes)))

    for k,dtype in dtypes:

    if dtype == "float32":

    X[k] -= X[k].mean()

    X[k] /= X[k].std()

    X_train, X_valid, y_train, y_valid = train_test_split(X, y, test_size=0.2, random_state=7)

    # build model

    input_els = []

    encoded_els = []

    for k,dtype in dtypes:

    input_els.append(Input(shape=(1,)))

    if dtype == "int8":

    e = Flatten()(Embedding(X_train[k].max()+1, 1)(input_els[-1]))

    else:

    e = input_els[-1]

    encoded_els.append(e)

    encoded_els = concatenate(encoded_els)

    layer1 = Dropout(0.5)(Dense(100, activation="relu")(encoded_els))

    out = Dense(1)(layer1)

    # train model

    clf = Model(inputs=input_els, outputs=[out])

    clf.compile(optimizer="adam", loss=''binary_crossentropy'')

    clf.fit(

    [X_train[k].values for k,t in dtypes],

    y_train,

    epochs=5,

    batch_size=512,

    shuffle=True,

    validation_data=([X_valid[k].values for k,t in dtypes], y_valid)

    )

    def f(X):

    return clf.predict([X[:,i] for i in range(X.shape[1])]).flatten()

    # print the JS visualization code to the notebook

    shap.initjs()

    explainer = shap.KernelExplainer(f, X.iloc[:50,:])

    shap_values = explainer.shap_values(X.iloc[299,:], nsamples=500)

    ```


    To generate the SHAP values, we need to use the kernel explainer function from
    the `SHAP` library.


    ```

    shap_values50 = explainer.shap_values(X.iloc[280:285,:], nsamples=500)

    shap_values

    import warnings

    warnings.filterwarnings("ignore")

    # summarize the effects of all the features

    shap_values50 = explainer.shap_values(X.iloc[280:781,:], nsamples=500)

    shap.summary_plot(shap_values50)

    ```


    ![](images/540435_1_En_7_Chapter/540435_1_En_7_Fig4_HTML.png)


    A graphical representation of the SHAP value has 12 fluctuating signals for different
    features.


    **Figure 7-4** SHAP values feature importance


    ## Recipe 7-3. Explain a PyTorch-Based Deep Learning Model


    ### Problem


    You want to explain a deep learning model developed using PyTorch.'
