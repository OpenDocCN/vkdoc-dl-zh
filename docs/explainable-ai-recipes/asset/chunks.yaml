    ## Recipe 4-23. Multiclass Classification Model Explanation


    ### Problem


    You want to get model explanations for multiclass classification problems.


    ### Solution


    The expectation for multiclass classification is to first build a robust model
    with categorical features, if any, and explain the predictions. In a binary class
    classification problem, we can get the probabilities, and sometimes we can get
    the feature importance corresponding to each class from all kinds of ensemble
    models. Here is an example of a catboost model that can be used to generate the
    feature importance corresponding to each class in the multiclass classification
    problem.'
