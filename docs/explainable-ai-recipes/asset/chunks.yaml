    ## Recipe 3-9. How the Permutation Model in ELI5 Works


    ### Problem


    You want to make sense of the ELI5 permutation library.


    ### Solution


    The solution to this problem is to use a dataset and a trained model.


    ### How It Works


    The permutation model in the ELI5 library works only for global interpretation.
    First it takes a base line linear regression model from the training dataset and
    computes the error of the model. Then it shuffles the values of a feature, retrains
    the model, and computes the error. It compares the decrease in error after shuffling
    and before shuffling. A feature can be considered as important if post shuffling
    the error delta is high and unimportant if the error delta is low, and vice versa.
    The result displays the average importance of features and the standard deviation
    of features with multiple shuffle steps.


    ## Recipe 3-10. Global Explanation for Decision Tree Models


    ### Problem


    You want to explain the predictions generated from a decision tree classifier.


    ### Solution


    The decision tree model can be used as we model the probabilities from either
    a binary classification or a multinomial classification variable. In this particular
    recipe, we are using a churn classification dataset that has two outcomes: whether
    the customer is likely to churn or not.


    ### How It Works


    Let’s take a look at the following example. The key is to get the SHAP values,
    which will return base values, SHAP values, and data. Using the SHAP values, we
    can create various explanations using graphs and figures. The SHAP values are
    always at a global level.


    ```

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    %matplotlib inline

    from sklearn import tree, metrics, model_selection, preprocessing

