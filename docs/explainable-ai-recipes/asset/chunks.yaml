    ## Recipe 3-4\. SHAP Values for Tree Regression Models with All Mixed Input Variables


    ### Problem


    You want to get SHAP values when you have mixed input features such as numerical
    and categorical.


    ### Solution


    Mixed input variables that have numeric features as well as categorical or binary
    features can be modeled together. As the number of features increases, the time
    to compute all the permutations will also increase.


    ### How It Works


    Let’s take a look at the following example. We are going to use a public automobile
    data dataset with some modifications. The objective is to predict the price of
    a vehicle given the features such as make, location, age, etc. It is a regression
    problem that we are going to solve using a mix of numeric and categorical features.


    ```

    df = pd.read_csv(''https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/automobile.csv'')

    df.head(3)

    df.columns

    Index([''Price'', ''Make'', ''Location'', ''Age'', ''Odometer'', ''FuelType'',
    ''Transmission'', ''OwnerType'', ''Mileage'', ''EngineCC'', ''PowerBhp''], dtype=''object'')

    ```


    We cannot use the string-based features or categorical features in the model directly
    as matrix multiplication is not possible on string features; hence, the string-based
    features need to be transformed into dummy variables or binary features with 0
    and 1 flags. We are skipping the transformation step here as many data scientists
    already know how to do data transformation. We are importing another transformed
    dataset directly.


    ```

    df_t = pd.read_csv(''https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/Automobile_transformed.csv'')

    del df_t[''Unnamed: 0'']

    df_t.head(3)

    df_t.columns

    Index([''Price'', ''Age'', ''Odometer'', ''mileage'', ''engineCC'', ''powerBhp'',
    ''Location_Bangalore'', ''Location_Chennai'', ''Location_Coimbatore'', ''Location_Delhi'',
    ''Location_Hyderabad'', ''Location_Jaipur'', ''Location_Kochi'', ''Location_Kolkata'',
    ''Location_Mumbai'', ''Location_Pune'', ''FuelType_Diesel'', ''FuelType_Electric'',
    ''FuelType_LPG'', ''FuelType_Petrol'', ''Transmission_Manual'', ''OwnerType_Fourth
    +ACY- Above'', ''OwnerType_Second'', ''OwnerType_Third''], dtype=''object'')

    #y is the dependent variable, that we need to predict

    y = df_t.pop(''Price'')

    # X is the set of input features

    X = df_t

    import pandas as pd

    import shap

    import sklearn

    # a simple non linear model initialized

    model = sklearn.tree.DecisionTreeRegressor()

    # decision tree regression model trained

    model.fit(X, y)

    ```


    To compute the SHAP values, we can use the explainer function using the training
    dataset X and model predict function. The SHAP value calculation happens using
    a permutation approach that takes 5 minutes.


    ```

    # compute the SHAP values for the linear model

    explainer = shap.Explainer(model)

    # SHAP value calculation

    shap_values = explainer.shap_values(X)

    ```


    ## Recipe 3-5\. SHAP Partial Dependency Plot for Regression Models with Mixed
    Input


    ### Problem


    You want to plot a partial dependency plot and interpret the graph for numeric
    and categorical dummy variables.


    ### Solution


    A partial dependency plot shows the correlation between the feature and the predicted
    output of the target variables. There are two ways we can showcase the results,
    one with a feature and expected value of the prediction function and another by
    superimposing a data point on the partial dependency plot. The nonlinear relationship
    is shown in Figure [3-4](#540435_1_En_3_Chapter.xhtml#Fig4) which is different
    from a straight line that we have seen in Chapter [2](#540435_1_En_2_Chapter.xhtml),
    here it shows a zigzag pattern.


