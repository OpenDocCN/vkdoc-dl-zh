    ## Recipe 1-3\. SHAPASH Installation


    ### Problem


    You want to install SHAPASH.


    ### Solution


    If you want to use a combination of functions from both the LIME library and the
    SHAP library, then you can use the SHAPASH library. You just have to install it,
    which is simple.


    ### How It Works


    Let’s take a look at the following code to install SHAPASH. This is not available
    on the Anaconda distribution; the only way to install it is by using `pip`.


    ```

    pip install shapash

    ```


