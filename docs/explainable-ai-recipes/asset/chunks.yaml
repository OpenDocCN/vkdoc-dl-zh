    可以使用 SHAP 进行模型解释；然而，SHAP 的局限性之一是我们无法使用全部数据来创建全局和局部解释。即使我们决定使用全部数据，通常也需要更多时间。因此，在训练模型使用数百万条记录的场景下，为了加速生成局部和全局解释的过程，LIME
    非常有用。Catboost 需要定义迭代次数。

