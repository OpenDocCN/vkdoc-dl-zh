    ## 配方 7-3. 解释基于 PyTorch 的深度学习模型


    ### 问题


    你希望解释一个使用 PyTorch 开发的深度学习模型。

    '
- fmt: '### Solution


    We are using a tool called `Captum`, which acts as a platform. Different kinds
    of explainability methods are embedded into `Captum` that help to further elaborate
    on how a decision has been made. A typical neural network model interpretation
    can be done to understand the feature importance, dominant layer identification,
    and dominant neuron identification. `Captum` provides three attribution algorithms
    that help in achieving three things: primary attribution, layer attribution, and
    neuron attribution.


    ### How It Works


    The following syntax explains how to install the library:


    ```

    conda install captum -c pytorch

    ```


    or


    ```

    pip install captum

    ```


    The primary attribution layer provides integrated gradients, gradient shapely
    additive explanations (SHAP), saliency, etc., to interpret the model in a more
    effective way. We can use sample data as titanic survival prediction dataset,
    which is a common dataset that is used for machine learning examples or tutorials
    every developer can quickly relate to it without much introduction.


    ```

    # Initial imports

    import numpy as np

    import torch

    from captum.attr import IntegratedGradients

    from captum.attr import LayerConductance

    from captum.attr import NeuronConductance

    import matplotlib

    import matplotlib.pyplot as plt

    %matplotlib inline

    from scipy import stats

    import pandas as pd

    dataset_path = "https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/titanic.csv"

    titanic_data = pd.read_csv(dataset_path)

    del titanic_data[''Unnamed: 0'']

    del titanic_data[''PassengerId'']

    titanic_data = pd.concat([titanic_data,

    pd.get_dummies(titanic_data[''Sex'']),

    pd.get_dummies(titanic_data[''Embarked''],prefix="embark"),

    pd.get_dummies(titanic_data[''Pclass''],prefix="class")], axis=1)

    titanic_data["Age"] = titanic_data["Age"].fillna(titanic_data["Age"].mean())

    titanic_data["Fare"] = titanic_data["Fare"].fillna(titanic_data["Fare"].mean())

    titanic_data = titanic_data.drop([''Name'',''Ticket'',''Cabin'',''Sex'',''Embarked'',''Pclass''],
    axis=1)

    # Set random seed for reproducibility.

    np.random.seed(707)

    # Convert features and labels to numpy arrays.

    labels = titanic_data["Survived"].to_numpy()

    titanic_data = titanic_data.drop([''Survived''], axis=1)

    feature_names = list(titanic_data.columns)

    data = titanic_data.to_numpy()

    # Separate training and test sets using

    train_indices = np.random.choice(len(labels), int(0.7*len(labels)), replace=False)

    test_indices = list(set(range(len(labels))) - set(train_indices))

    train_features = data[train_indices]

    train_labels = labels[train_indices]

    test_features = data[test_indices]

    test_labels = labels[test_indices]

    train_features.shape

    (623, 12)

    ```


    Now that the train and test datasets are ready, we can start writing the code
    for the model development using PyTorch.


    ```

    Import torch

    import torch.nn as nn

    torch.manual_seed(1)  # Set seed for reproducibility.

    Class TitanicSimpleNNModel(nn.Module):

    def __init__(self):

    super().__init__()

    self.linear1 = nn.Linear(12, 12)

    self.sigmoid1 = nn.Sigmoid()

    self.linear2 = nn.Linear(12, 8)

    self.sigmoid2 = nn.Sigmoid()

    self.linear3 = nn.Linear(8, 2)

    self.softmax = nn.Softmax(dim=1)

    def forward(self, x):

    lin1_out = self.linear1(x)

    sigmoid_out1 = self.sigmoid1(lin1_out)

    sigmoid_out2 = self.sigmoid2(self.linear2(sigmoid_out1))

    return self.softmax(self.linear3(sigmoid_out2))

    net = TitanicSimpleNNModel()

    criterion = nn.CrossEntropyLoss()

    num_epochs = 200

    optimizer = torch.optim.Adam(net.parameters(), lr=0.1)

    input_tensor = torch.from_numpy(train_features).type(torch.FloatTensor)

    label_tensor = torch.from_numpy(train_labels)

    ```


    The deep learning model configuration is done, so we can proceed with running
    epochs or iterations to reduce the errors.


    ```

    For epoch in range(num_epochs):

    output = net(input_tensor)

    loss = criterion(output, label_tensor)

    optimizer.zero_grad()

    loss.backward()

    optimizer.step()

    if epoch % 20 == 0:

    print (''Epoch {}/{} => Loss: {:.2f}''.format(epoch+1, num_epochs, loss.item()))

    torch.save(net.state_dict(), ''/model.pt'')

    Epoch 1/200 => Loss: 0.70

    Epoch 21/200 => Loss: 0.55

    Epoch 41/200 => Loss: 0.50

    Epoch 61/200 => Loss: 0.49

    Epoch 81/200 => Loss: 0.48

    Epoch 101/200 => Loss: 0.49

    Epoch 121/200 => Loss: 0.47

    Epoch 141/200 => Loss: 0.47

    Epoch 161/200 => Loss: 0.47

    Epoch 181/200 => Loss: 0.47

    out_probs = net(input_tensor).detach().numpy()

    out_classes = np.argmax(out_probs, axis=1)

    print("Train Accuracy:", sum(out_classes == train_labels) / len(train_labels))

    Train Accuracy: 0.8523274478330658

    test_input_tensor = torch.from_numpy(test_features).type(torch.FloatTensor)

    out_probs = net(test_input_tensor).detach().numpy()

    out_classes = np.argmax(out_probs, axis=1)

    print("Test Accuracy:", sum(out_classes == test_labels) / len(test_labels))

    Test Accuracy: 0.832089552238806

    ```


    The integrated gradient is extracted from the neural network model; this can be
    done using the `attribute` function.


    ```

    ig = IntegratedGradients(net)

    test_input_tensor.requires_grad_()

    attr, delta = ig.attribute(test_input_tensor,target=1, return_convergence_delta=True)

    attr = attr.detach().numpy()

    np.round(attr,2)

    array([[-0.7 , 0.09, -0\. , ..., 0\. , 0\. , -0.33], [-2.78, -0\. , -0\. , ...,
    0\. , 0\. , -1.82], [-0.65, 0\. , -0\. , ..., 0\. , 0\. , -0.31], ..., [-0.47,
    -0\. , -0\. , ..., 0.71, 0\. , -0\. ], [-0.1 , -0\. , -0\. , ..., 0\. , 0\. ,
    -0.1 ], [-0.7 , 0\. , -0\. , ..., 0\. , 0\. , -0.28]])

    ```


    The `attr` object contains the feature importance of the input features from the
    model.


    ```

    importances = np.mean(attr, axis=0)

    for i in range(len(feature_names)):

    print(feature_names[i], ": ", ''%.3f''%(importances[i]))

    Age :  -0.574

    SibSp :  -0.010

    Parch :  -0.026

    Fare :  0.278

    female :  0.101

    male :  -0.460

    embark_C :  0.042

    embark_Q :  0.005

    embark_S :  -0.021

    class_1 :  0.067

    class_2 :  0.090

    class_3 :  -0.144

    ```


    The `LayerConductance` helps us compute the neuron importance and combines the
    neuron activation by taking the partial derivative of the neuron with respect
    to the input and output. The conductance layer builds on the integrated gradients
    by looking at the flow of IG attribution.


    ```

    cond = LayerConductance(net, net.sigmoid1)

    cond_vals = cond.attribute(test_input_tensor,target=1)

    cond_vals = cond_vals.detach().numpy()

    Average_Neuron_Importances = np.mean(cond_vals, axis=0)

    Average_Neuron_Importances

    array([ 0.03051018, -0.23244175, 0.04743345, 0.02102091, -0.08071412, -0.09040915,
    -0.13398956, -0.04666219, 0.03577907, -0.07206058, -0.15658873, 0.03491106], dtype=float32)

    neuron_cond = NeuronConductance(net, net.sigmoid1)

    neuron_cond_vals_10 = neuron_cond.attribute(test_input_tensor, neuron_selector=10,
    target=1)

    neuron_cond_vals_0 = neuron_cond.attribute(test_input_tensor, neuron_selector=0,
    target=1)

    # Average Feature Importances for Neuron 0

    nn0 = neuron_cond_vals_0.mean(dim=0).detach().numpy()

    np.round(nn0,3)

    array([ 0.008, 0\. , 0\. , 0.028, 0\. , -0.004, -0\. , 0\. , -0.001, -0\. , 0\.
    , -0\. ], dtype=float32)

    ```


    The average feature importance for neuron 0 can be replicated to any number of
    neurons by using a threshold. If the weight threshold exceeds a certain level,
    then the neuron attribution and average feature importance for that neuron can
    be derived.'
