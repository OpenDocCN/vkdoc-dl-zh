- fmt: '# 1. Introducing Explainability and Setting Up Your Development Environment


    Industries in which artificial intelligence has been applied include banking,
    financial services, insurance, healthcare, manufacturing, retail, and pharmaceutical.
    There are regulatory requirements in some of these industries where model explainability
    is required. Artificial intelligence involves classifying objects, recognizing
    objects to detect fraud, and so forth. Every learning system requires three things:
    input data, processing, and an output. If the performance of any learning system
    improves over time by learning from new examples or data, it is called a *machine
    learning system*. When the number of features for a machine learning task increases
    or the volume of data increases, it takes a lot of time to apply machine learning
    techniques. That’s when deep learning techniques are used.


    Figure [1-1](#540435_1_En_1_Chapter.xhtml#Fig1) represents the relationships between
    artificial intelligence, machine learning, and deep learning.


    ![](images/540435_1_En_1_Chapter/540435_1_En_1_Fig1_HTML.jpg)


    A drawing of a concentric circle. It depicts the relationship between deep learning,
    machine learning, and artificial intelligence from inner to outer, respectively.


    Figure 1-1


    Relationships among ML, DL, and AI


    After preprocessing and feature creation, you can observe hundreds of thousands
    of features that need to be computed to produce output. If we train a machine
    learning supervised model, it will take significant time to produce the model
    object. To achieve scalability in this task, we need deep learning algorithms,
    such as a recurrent neural network. This is how artificial intelligence is connected
    to deep learning and machine learning.


    In the classical predictive modeling scenario, a function is identified, and the
    input data is usually fit to the function to produce the output, where the function
    is usually predetermined. In a modern predictive modeling scenario, the input
    data and output are both shown to a group of functions, and the machine identifies
    the best function that approximates well to the output given a particular set
    of input. There is a need to explain the output of a machine learning and deep
    learning model in performing regression- and classification-related tasks. These
    are the reasons why explainability is required:


    * *Trust*: To gain users’ trust on the predicted output

    * *Reliability*: To make the user rely on the predicted output

    * *Regulatory*: To meet regulatory and compliance requirements

    * *Adoption*: To increase AI adoption among the users

    * *Fairness*: To remove any kind of discrimination in prediction

    * *Accountability*: To establish ownership of the predictions


    There are various ways that explainability can be achieved using statistical properties,
    probabilistic properties and associations, and causality among the features. Broadly,
    the explanations of the models can be classified into two categories, global explanations
    and local explanations. The objective of local explanation is to understand the
    inference generated for one sample at a time by comparing the nearest possible
    data point; global explanation provides an idea about the overall model behavior.


    The goal of this chapter is to introduce how to install various explainability
    libraries and interpret the results generated by those explainability libraries.


    ## Recipe 1-1. SHAP Installation


    ### Problem


    You want to install the SHAP (shapely additive explanations) library.


    ### Solution


    The solution to this problem is to use the simple `pip` or `conda` option.


    ### How It Works


    Let’s take a look at the following script examples. The SHAP Python library is
    based on a game theoretic approach that attempts to explain local and as well
    as global explanations.


    ```

    pip install shap

    ```


    or


    ```

