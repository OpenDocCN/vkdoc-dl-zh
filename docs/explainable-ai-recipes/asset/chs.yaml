  ''Location_Mumbai'', ''Location_Pune'', ''FuelType_Diesel'', ''FuelType_Electric'',
  ''FuelType_LPG'', ''FuelType_Petrol'', ''Transmission_Manual'', ''OwnerType_Fourth
  +ACY- Above'', ''OwnerType_Second'', ''OwnerType_Third''], dtype=''object'')

  # y is the dependent variable, that we need to predict

  y = df_t.pop(''Price'')

  # X is the set of input features

  X = df_t

  import pandas as pd

