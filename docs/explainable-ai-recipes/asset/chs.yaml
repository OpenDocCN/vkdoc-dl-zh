  ## 配方 3-7. 表格数据的 LIME 解释器


  ### 问题


  你希望以聚焦的方式在局部层面生成可解释性，而非全局层面。


  ### 解决方案


  解决此问题的方法是使用 LIME 库。LIME 是一种模型无关的技术；它在运行解释器时会重新训练机器学习模型。LIME 将问题局部化，并在局部层面解释模型。


  ### 工作原理


  让我们来看下面的示例。LIME 要求将 numpy 数组作为表格解释器的输入；因此，需要将 Pandas 数据框转换为数组。


  ```

