  \ = sklearn.preprocessing.StandardScaler()\nscaler.fit(X)\n#转换数据集\nX_std = scaler.transform(X)\n\
  #初始化一个简单的线性模型\nmodel = sklearn.linear_model.LinearRegression()\n#训练线性回归模型\nmodel.fit(X_std,\
