  \ 问题\n\n你想知道如何以聚焦的方式在局部层面而非全局层面生成可解释性。\n\n### 解决方案\n\n此问题的解决方案是使用 LIME 库。LIME 是一种模型无关的技术；它在运行解释器的同时重新训练机器学习模型。LIME\
  \ 将问题局部化，并在局部层面解释模型。\n\n### 工作原理\n\n让我们来看下面的例子。LIME 要求将 numpy 数组作为表格解释器的输入；因此，需要将\
  \ Pandas 数据框转换为数组。\n\n```\n!pip install lime\nLooking in indexes: https://pypi.org/simple,\
  \ https://us-python.pkg.dev/colab-wheels/public/simple/\nCollecting lime\nDownloading\
