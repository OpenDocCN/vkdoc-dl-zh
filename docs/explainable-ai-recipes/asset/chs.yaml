  \n## 配方 2-2. 回归模型的 SHAP 部分依赖图\n\n### 问题\n\n您希望从 SHAP 获取部分依赖图。\n\n### 解决方案\n\n此问题的解决方案是使用模型中的部分依赖方法（`partial_dependence_plot`）。\n\
  \n\n\n### 工作原理\n\n让我们来看下面的例子。有两种方法可以获取部分依赖图：一种叠加了特定数据点，另一种则不参考任何数据点。见图 2-1。\n\n\
