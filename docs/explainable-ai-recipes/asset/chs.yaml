  \ SHAP 值\n\n### 问题\n\n当你将分类变量与数值变量一起引入（即混合输入特征集）时，如何估算 SHAP 值？\n\n### 解决方案\n\n解决方案是，包含数值特征以及分类或二元特征的混合输入变量可以一起建模。随着特征数量的增加，计算所有排列所需的时间也会增加。\n\
  \n\n\n### 工作原理\n\n我们将使用一个经过修改的汽车公开数据集。目标是根据`make`（制造商）、`location`（位置）、`age`（车龄）等特征来预测车辆的价格。这是一个回归问题，我们将结合数值型和类别型特征来解决。\n\
