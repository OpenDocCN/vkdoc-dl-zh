  \ 6-8**  \n特征 `t-1` 的偏依赖图\n\n## 结论\n\n在本章中，我们介绍了如何解释时间序列模型以生成预测。为了解释单变量时间序列模型，我们将其视为一个监督学习问题，将滞后项作为可训练特征。然后使用线性回归器训练这些特征，并利用回归模型在全局和局部层面生成解释，同时使用了\
