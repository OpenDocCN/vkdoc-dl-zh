  \ `scikit-learn` 库支持的所有机器学习模型提供支持。\n\n\n\n### 工作原理\n\n让我们来看一下以下脚本：\n\n```\npip install\
  \ eli5\nimport eli5\neli5.show_weights(model,\nfeature_names=list(X.columns))\n\
  ```\n\n**y** 主要特征\n\n| 权重？ | 特征 |\n| --- | --- |\n| **+97.695** | <BIAS> |\n| **+60.299**\
  \ | RH_1 |\n| **+50.967** | T3 |\n| **+43.400** | T6 |\n| **+21.177** | Tdewpoint\
  \ |\n| **+16.027** | RH_3 |\n| **+15.936** | T8 |\n| **+15.790** | Lights |\n| **+8.969**\
  \ | RH_6 |\n| **+4.176** | Windspeed |\n| **+3.787** | T7 |\n| ***… 还有 3 个正特征 …***\
  \ |\n| ***… 还有 5 个负特征 …*** |\n| **-3.740** | RH_9 |\n| **-7.079** | T4 |\n| **-7.925**\
  \ | RH_7 |\n| **-15.851** | RH_out |\n| **-24.395** | RH_8 |\n| **-31.978** | T9\
  \ |\n| **-38.828** | T2 |\n| **-54.386** | T_out |\n| **-54.862** | RH_2 |\n\n```\n\
  eli5.explain_weights(model, feature_names=list(X.columns))\neli5.explain_prediction(model,X.iloc[60])\n\
  from eli5.sklearn import PermutationImportance\n# 初始化一个简单的线性模型\nmodel = sklearn.linear_model.LinearRegression()\n\
  # 训练线性回归模型\nmodel.fit(X, y)\nperm = PermutationImportance(model)\nperm.fit(X, y)\n\
  eli5.show_weights(perm,feature_names=list(X.columns))\n```\n\n结果表中包含一个 `BIAS` 值作为特征。这可以解释为线性回归模型的截距项。其他特征根据其权重大小以降序排列。`show_weights`\
  \ 函数提供了模型的全局解释，而 `show_prediction` 函数则通过考虑训练集中的一条记录来提供局部解释。\n\n## 配方 2-11. ELI5\
  \ 中排列模型的工作原理\n\n### 问题\n\n你想理解 ELI5 排列库的原理。\n\n### 解决方案\n\n解决此问题的方法是使用一个数据集和一个训练好的模型。\n\
  \n### 工作原理\n\nELI5 库中的排列模型仅适用于全局解释。首先，它从训练数据集中获取一个基线线性回归模型，并计算该模型的误差。然后，它打乱一个特征的值，重新训练模型并计算误差。它比较打乱后和打乱前的误差下降情况。如果打乱后误差增量较大，则该特征可被视为重要；如果误差增量较小，则该特征不重要。结果会显示特征的平均重要性以及经过多次打乱步骤后特征的标准差。\n\
  \n## 配方 2-12. 逻辑回归模型的全局解释\n\n### 问题\n\n你想解释逻辑回归模型生成的预测结果。\n\n### 解决方案\n\n逻辑回归模型也被称为分类模型，因为我们是对二元分类或多分类变量的概率进行建模。在本配方中，我们使用一个流失分类数据集，该数据集包含两种结果：客户是否可能流失。\n\
