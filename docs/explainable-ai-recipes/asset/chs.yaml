  # 训练线性回归模型\nmodel.fit(X, y)\nprint(\"模型系数:\\n\")\nfor i in range(X.shape[1]):\n\
  print(X.columns[i], \"=\", model.coef_[i].round(5))\n模型系数:\nlights = 1.98971\nT1\
  \ = -0.60374\nRH_1 = 15.15362\nT2 = -17.70602\nRH_2 = -13.48062\nT3 = 25.4064\n\
  RH_3 = 4.92457\nT4 = -3.46525\nRH_4 = -0.17891\nT5 = -0.02784\nRH_5 = 0.14096\n\
  T6 = 7.12616\nRH_6 = 0.28795\nT7 = 1.79463\nRH_7 = -1.54968\nT8 = 8.14656\nRH_8\
  \ = -4.66968\nT9 = -15.87243\nRH_9 = -0.90102\nT_out = -10.22819\nPress_mm_hg =\
  \ 0.13986\nRH_out = -1.06375\nWindspeed = 1.70364\nVisibility = 0.15368\nTdewpoint\
  \ = 5.0488\nrv1 = -0.02078\nrv2 = -0.02078\n# 为线性模型计算 SHAP 值\nexplainer = shap.Explainer(model.predict,\
  \ X)\n# SHAP 值计算\nshap_values = explainer(X)\nPermutation explainer: 19736it [16:15,\
  \ 20.08it/s]\n```\n\n脚本的这一部分很耗时，因为它是一个计算密集型过程。`explainer` 函数计算排列组合，这意味着选取一个特征集并生成预测差异。这个差异就是存在某个特征与不存在该特征之间的差别。为了加快计算速度，我们可以将样本量减少到较小的集合，比如\
  \ 1,000 或 2,000。在上面的脚本中，我们使用了全部 19,735 条记录来计算 SHAP 值。脚本的这一部分可以通过应用 Python 多进程来改进，但这超出了本章的范围。\n\
  \n特定特征 `i` 的 SHAP 值就是期望模型输出与该特征值 `xi` 处的部分依赖图之间的差值。Shapley 值的一个基本属性是，它们之和总是等于所有玩家参与游戏时的结果与没有玩家参与游戏时的结果之差。对于机器学习模型而言，这意味着所有输入特征的\
  \ SHAP 值之和总是等于基线（期望）模型输出与当前被解释预测的模型输出之间的差值。\n\nSHAP 值包含三个对象：(a) 每个特征的 SHAP 值，(b)\
