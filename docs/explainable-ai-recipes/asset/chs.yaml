  \ | 随机变量 2 | 无量纲 |\n\n```\nimport pandas as pd\ndf_lin_reg = pd.read_csv('https://archive.ics.uci.edu/ml/machine-learning-databases/00374/energydata_complete.csv')\n\
  del df_lin_reg['date']\ndf_lin_reg.info()\ndf_lin_reg.columns\nIndex(['Appliances',\
