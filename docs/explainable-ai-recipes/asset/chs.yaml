  \ 'FuelType_Petrol', 'Transmission_Manual', 'OwnerType_Fourth +ACY- Above', 'OwnerType_Second',\
  \ 'OwnerType_Third'], dtype='object')\n# y 是因变量，我们需要预测它\ny = df_t.pop('Price')\n\
