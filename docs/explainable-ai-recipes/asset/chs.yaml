  \ -40）。\n\n**图 4-10** 基于 SHAP 值的全局特征重要性\n\n## 配方 4-4\\. 使用全局和局部解释解释随机森林回归器\n\n###\
  \ 问题\n\n随机森林是一种通过装袋方法创建集成模型的技术；它同样难以解释哪个树生成了最终预测，也难以解释全局和局部解释。\n\n### 解决方案\n\n我们将使用\
