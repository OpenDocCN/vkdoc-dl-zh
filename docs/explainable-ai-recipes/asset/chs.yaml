  \ (from lime) (1.21.6)\nRequirement already satisfied: scipy in /usr/local/lib/python3.7/dist-packages\
  \ (from lime) (1.7.3)\nRequire\n................\nimport lime\nimport lime.lime_tabular\n\
  explainer = lime.lime_tabular.LimeTabularExplainer(np.array(X),\nmode='regression',\n\
  feature_names=X.columns,\nclass_names=['price'],\nverbose=True)\n```\n\n我们仅使用本章中的能源预测数据。\n\
