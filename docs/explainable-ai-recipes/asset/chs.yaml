  \ 1 标志的二元特征。此处省略了转换步骤，因为许多数据科学家已经知道如何进行这种数据转换。我们直接导入另一个已转换的数据集。\n\n```\ndf_t = pd.read_csv('https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/Automobile_transformed.csv')\n\
  del df_t['Unnamed: 0']\ndf_t.head(3)\ndf_t.columns\nIndex(['Price', 'Age', 'Odometer',\
