- "# 7. 深度学习模型的可解释性\n\n深度学习模型正成为人工智能实现的支柱。同时，构建可解释性层来解释深度学习模型的预测和输出也极其重要。为了建立对深度学习模型结果的信任，我们需要解释其结果或输出。从高层次来看，深度学习层涉及多个隐藏层，而神经网络层有三个层：输入层、隐藏层和输出层。神经网络模型有不同的变体，例如单隐藏层神经网络模型、多隐藏层神经网络、前馈神经网络和反向传播神经网络。根据神经网络模型的结构，有三种流行的结构：循环神经网络，主要用于序列信息处理，如音频处理、文本分类等；深度神经网络，用于构建极深的网络；最后是卷积神经网络模型，用于图像分类。\n\
  \nDeep SHAP 是一个框架，用于从使用 TensorFlow、Keras 或 PyTorch 开发的深度学习模型中推导出 SHAP 值。如果我们将机器学习模型与深度学习模型进行比较，深度学习模型很难向任何人解释。在本章中，我们将提供解释深度学习模型组件的配方。\n\
  \n## 配方 7-1. 使用基于 Keras 的梯度解释器解释 MNIST 图像\n\n### 问题\n\n你想使用 SHAP 解释一个基于 Keras 的深度学习模型。\n\
  \n### 解决方案\n\n我们使用一个名为 MNIST 的示例图像数据集。首先，我们可以使用 TensorFlow 管道中的 Keras 训练一个卷积神经网络。然后，我们可以使用\
  \ SHAP 库中的梯度解释器模块来构建解释器对象。该解释器对象可用于创建 SHAP 值，进而利用 SHAP 值，我们可以更深入地了解图像分类任务、单个类别预测及其对应的概率值。\n\
  \n\n\n### 工作原理\n\n让我们来看下面的示例：\n\n```\nimport TensorFlow as tf\nfrom TensorFlow.keras\
  \ import Input\nfrom TensorFlow.keras.layers import Flatten, Dense, Dropout, Conv2D\n\
  import warnings\nwarnings.filterwarnings(\"ignore\")\n# load the MNIST data\n(x_train,\
  \ y_train), (x_test, y_test) = tf.keras.datasets.mnist.load_data()\nx_train, x_test\
  \ = x_train / 255.0, x_test / 255.0\nx_train = x_train.astype('float32')\nx_test\
  \ = x_test.astype('float32')\nx_train = x_train.reshape(x_train.shape[0], 28, 28,\
  \ 1)\nx_test = x_test.reshape(x_test.shape[0], 28, 28, 1)\n```\n\n这里有两个输入：一个用于通过前馈神经网络层生成解释，另一个用于通过卷积神经网络层生成解释。这是为了比较两个输入，它们可以通过`SHAP`库以不同的方式进行解释。\n\
  \n```\n# define our model\ninput1 = Input(shape=(28,28,1))\ninput2 = Input(shape=(28,28,1))\n\
  input2c = Conv2D(32, kernel_size=(3, 3), activation='relu')(input2)\njoint = tf.keras.layers.concatenate([Flatten()(input1),\
  \ Flatten()(input2c)])\nout = Dense(10, activation='softmax')(Dropout(0.2)(Dense(128,\
  \ activation='relu')(joint)))\nmodel = tf.keras.models.Model(inputs = [input1, input2],\
  \ outputs=out)\nmodel.summary()\n```\n\n![](img/540435_1_En_7_Figa_HTML.png)\n\n\
  表格有四列，分别为层、输出形状、参数哈希和连接至。表格有九行，对应不同的层。表格底部的文本显示总参数、可训练参数和不可训练参数。\n\n使用`Adam`优化器编译模型，并采用稀疏分类交叉熵和准确率作为指标。我们可以选择不同类型的优化器来达到最佳准确率。\n\
  \n```\nmodel.compile(optimizer='adam',\nloss='sparse_categorical_crossentropy',\n\
  metrics=['accuracy'])\n```\n\n接下来，我们可以训练模型。由于处理能力的限制，这里选择了 3 个周期，但可以根据时间可用性和机器的计算能力来增加周期数。\n\
  \n```\n# fit the model\nmodel.fit([x_train, x_train], y_train, epochs=3)\n```\n\n\
  模型创建完成后，下一步我们可以安装`SHAP`库，并使用相同的训练数据集或测试数据集创建一个梯度解释器对象。\n\n```\npip install shap\n\
  import shap\n# since we have two inputs we pass a list of inputs to the explainer\n\
  explainer = shap.GradientExplainer(model, [x_train, x_train])\n# we explain the\
  \ model's predictions on the first three samples of the test set\nshap_values =\
  \ explainer.shap_values([x_test[:3], x_test[:3]])\n# since the model has 10 outputs\
  \ we get a list of 10 explanations (one for each output)\nprint(len(shap_values))\n\
  ```\n\n前面已经解释了两个输入。这里有两组 SHAP 值，一组对应于前馈层，另一组对应于卷积神经网络层。见图 7-1 和图 7-2。\n\n![](img/540435_1_En_7_Fig1_HTML.png)\n\
  \nSHAP 值的图形表示有三行十一列，包含数字 7、2 和 1 的色块。第一列有阴影。\n\n**图 7-1** 三个样本的 SHAP 值，包含正负权重\n\n\
  ```\n# since the model has 2 inputs we get a list of 2 explanations (one for each\
  \ input) for each output\nprint(len(shap_values[0]))\n# here we plot the explanations\
  \ for all classes for the first input (this is the feed forward input)\nshap.image_plot([shap_values[i][0]\
  \ for i in range(10)], x_test[:3])\n```\n\n```\n# here we plot the explanations\
  \ for all classes for the second input (this is the conv-net input)\nshap.image_plot([shap_values[i][1]\
  \ for i in range(10)], x_test[:3])\n```\n\n![](img/540435_1_En_7_Fig2_HTML.png)\n\
  \nSHAP 值的图形表示有三行十一列，包含数字 7、2 和 1 的色块。第一列有阴影。\n\n**图 7-2** 第二个输入相对于所有类别的 SHAP 值\n\
  \n```\n# get the variance of our estimates\nshap_values, shap_values_var = explainer.shap_values([x_test[:3],\
  \ x_test[:3]], return_variances=True)\n```\n\n为了解释前馈方式的权重分布和类别归属，我们需要估计方差；因此，我们需要获取方差的\
  \ SHAP 值。见图 7-3。\n\n![](img/540435_1_En_7_Fig3_HTML.png)\n\nSHAP 值的图形表示有三行十一列，包含数字\
  \ 7、2 和 1 的色块。第一列有阴影。\n\n**图 7-3** 所有类别的前馈输入解释\n\n```\n# here we plot the explanations\
  \ for all classes for the first input (this is the feed forward input)\nshap.image_plot([shap_values_var[i][0]\
  \ for i in range(10)], x_test[:3])\n```\n\n## 配方 7-2. 使用基于 Keras 模型的 Kernel 解释器\
  \ SHAP 值\n\n### 问题\n\n你希望针对一个用于二分类的结构化数据问题，解释基于核的解释器，同时使用 Keras 的深度学习模型进行训练。\n\n\
  ### 解决方案\n\n我们将使用`SHAP`库中提供的人口普查收入数据集；开发一个神经网络模型；然后使用训练好的模型对象来应用核解释器。核 SHAP 方法被定义为一种特殊的加权线性回归，用于计算深度学习模型中每个特征的重要性。\n\
  \n### 工作原理\n\n让我们来看下面的示例：\n\n```\nfrom sklearn.model_selection import train_test_split\n\
  from keras.layers import Input, Dense, Flatten, Concatenate, concatenate, Dropout,\
  \ Lambda\nfrom keras.models import Model\nfrom keras.layers.embeddings import Embedding\n\
  from tqdm import tqdm\nimport shap\n# print the JS visualization code to the notebook\n\
  #shap.initjs()\n```\n\n如果机器支持 JS 可视化，请移除注释并运行前面的脚本。见图 7-4。\n\n```\nX,y = shap.datasets.adult()\n\
  X_display,y_display = shap.datasets.adult(display=True)\n# normalize data (this\
  \ is important for model convergence)\ndtypes = list(zip(X.dtypes.index, map(str,\
  \ X.dtypes)))\nfor k,dtype in dtypes:\nif dtype == \"float32\":\nX[k] -= X[k].mean()\n\
  X[k] /= X[k].std()\nX_train, X_valid, y_train, y_valid = train_test_split(X, y,\
  \ test_size=0.2, random_state=7)\n# build model\ninput_els = []\nencoded_els = []\n\
  for k,dtype in dtypes:\ninput_els.append(Input(shape=(1,)))\nif dtype == \"int8\"\
  :\ne = Flatten()(Embedding(X_train[k].max()+1, 1)(input_els[-1]))\nelse:\ne = input_els[-1]\n\
  encoded_els.append(e)\nencoded_els = concatenate(encoded_els)\nlayer1 = Dropout(0.5)(Dense(100,\
  \ activation=\"relu\")(encoded_els))\nout = Dense(1)(layer1)\n# train model\nclf\
  \ = Model(inputs=input_els, outputs=[out])\nclf.compile(optimizer=\"adam\", loss='binary_crossentropy')\n\
  clf.fit(\n[X_train[k].values for k,t in dtypes],\ny_train,\nepochs=5,\nbatch_size=512,\n\
  shuffle=True,\nvalidation_data=([X_valid[k].values for k,t in dtypes], y_valid)\n\
  )\ndef f(X):\nreturn clf.predict([X[:,i] for i in range(X.shape[1])]).flatten()\n\
  # print the JS visualization code to the notebook\nshap.initjs()\nexplainer = shap.KernelExplainer(f,\
  \ X.iloc[:50,:])\nshap_values = explainer.shap_values(X.iloc[299,:], nsamples=500)\n\
  ```\n\n为了生成 SHAP 值，我们需要使用`SHAP`库中的核解释器函数。\n\n```\nshap_values50 = explainer.shap_values(X.iloc[280:285,:],\
  \ nsamples=500)\nshap_values\nimport warnings\nwarnings.filterwarnings(\"ignore\"\
  )\n# summarize the effects of all the features\nshap_values50 = explainer.shap_values(X.iloc[280:781,:],\
  \ nsamples=500)\nshap.summary_plot(shap_values50)\n```\n\n![](img/540435_1_En_7_Fig4_HTML.png)\n\
  \nSHAP 值的图形表示有 12 个针对不同特征的波动信号。\n\n**图 7-4** SHAP 值特征重要性\n\n## 配方 7-3. 解释基于 PyTorch\
  \ 的深度学习模型\n\n### 问题\n\n你希望解释一个使用 PyTorch 开发的深度学习模型。\n\n\n\n### 解决方案\n\n我们使用一个名为\
  \ `Captum` 的工具，它作为一个平台，集成了多种可解释性方法，有助于进一步阐明决策是如何做出的。通过典型的神经网络模型解释，可以理解特征重要性、识别主导层和主导神经元。`Captum`\
  \ 提供了三种归因算法，分别用于实现主要归因、层级归因和神经元归因。\n\n### 工作原理\n\n以下语法说明了如何安装该库：\n\n```\nconda install\
  \ captum -c pytorch\n```\n\n或\n\n```\npip install captum\n```\n\n主要归因层提供了积分梯度、梯度\
  \ SHAP（SHapley Additive exPlanations）、显著性等方法，以更有效的方式解释模型。我们可以使用样本数据，例如泰坦尼克号生存预测数据集，这是一个常用于机器学习示例或教程的常见数据集，每位开发者无需过多介绍就能快速理解。\n\
  \n```\n# 初始导入\nimport numpy as np\nimport torch\nfrom captum.attr import IntegratedGradients\n\
  from captum.attr import LayerConductance\nfrom captum.attr import NeuronConductance\n\
  import matplotlib\nimport matplotlib.pyplot as plt\n%matplotlib inline\nfrom scipy\
  \ import stats\nimport pandas as pd\ndataset_path = \"https://raw.githubusercontent.com/pradmishra1/PublicDatasets/main/titanic.csv\"\
  \ntitanic_data = pd.read_csv(dataset_path)\ndel titanic_data['Unnamed: 0']\ndel\
  \ titanic_data['PassengerId']\ntitanic_data = pd.concat([titanic_data,\npd.get_dummies(titanic_data['Sex']),\n\
  pd.get_dummies(titanic_data['Embarked'],prefix=\"embark\"),\npd.get_dummies(titanic_data['Pclass'],prefix=\"\
  class\")], axis=1)\ntitanic_data[\"Age\"] = titanic_data[\"Age\"].fillna(titanic_data[\"\
  Age\"].mean())\ntitanic_data[\"Fare\"] = titanic_data[\"Fare\"].fillna(titanic_data[\"\
  Fare\"].mean())\ntitanic_data = titanic_data.drop(['Name','Ticket','Cabin','Sex','Embarked','Pclass'],\
  \ axis=1)\n# 设置随机种子以确保可重复性。\nnp.random.seed(707)\n# 将特征和标签转换为 numpy 数组。\nlabels\
  \ = titanic_data[\"Survived\"].to_numpy()\ntitanic_data = titanic_data.drop(['Survived'],\
  \ axis=1)\nfeature_names = list(titanic_data.columns)\ndata = titanic_data.to_numpy()\n\
  # 划分训练集和测试集\ntrain_indices = np.random.choice(len(labels), int(0.7*len(labels)),\
  \ replace=False)\ntest_indices = list(set(range(len(labels))) - set(train_indices))\n\
  train_features = data[train_indices]\ntrain_labels = labels[train_indices]\ntest_features\
  \ = data[test_indices]\ntest_labels = labels[test_indices]\ntrain_features.shape\n\
  (623, 12)\n```\n\n现在训练集和测试集已经准备好，我们可以开始使用 PyTorch 编写模型开发的代码。\n\n```\nImport torch\n\
  import torch.nn as nn\ntorch.manual_seed(1)  # 设置种子以确保可重复性。\nClass TitanicSimpleNNModel(nn.Module):\n\
  def __init__(self):\nsuper().__init__()\nself.linear1 = nn.Linear(12, 12)\nself.sigmoid1\
  \ = nn.Sigmoid()\nself.linear2 = nn.Linear(12, 8)\nself.sigmoid2 = nn.Sigmoid()\n\
  self.linear3 = nn.Linear(8, 2)\nself.softmax = nn.Softmax(dim=1)\ndef forward(self,\
  \ x):\nlin1_out = self.linear1(x)\nsigmoid_out1 = self.sigmoid1(lin1_out)\nsigmoid_out2\
  \ = self.sigmoid2(self.linear2(sigmoid_out1))\nreturn self.softmax(self.linear3(sigmoid_out2))\n\
  net = TitanicSimpleNNModel()\ncriterion = nn.CrossEntropyLoss()\nnum_epochs = 200\n\
  optimizer = torch.optim.Adam(net.parameters(), lr=0.1)\ninput_tensor = torch.from_numpy(train_features).type(torch.FloatTensor)\n\
  label_tensor = torch.from_numpy(train_labels)\n```\n\n深度学习模型配置已完成，因此我们可以继续运行周期或迭代以减少误差。\n\
  \n```\nFor epoch in range(num_epochs):\noutput = net(input_tensor)\nloss = criterion(output,\
  \ label_tensor)\noptimizer.zero_grad()\nloss.backward()\noptimizer.step()\nif epoch\
  \ % 20 == 0:\nprint ('Epoch {}/{} => Loss: {:.2f}'.format(epoch+1, num_epochs, loss.item()))\n\
  torch.save(net.state_dict(), '/model.pt')\nEpoch 1/200 => Loss: 0.70\nEpoch 21/200\
  \ => Loss: 0.55\nEpoch 41/200 => Loss: 0.50\nEpoch 61/200 => Loss: 0.49\nEpoch 81/200\
  \ => Loss: 0.48\nEpoch 101/200 => Loss: 0.49\nEpoch 121/200 => Loss: 0.47\nEpoch\
  \ 141/200 => Loss: 0.47\nEpoch 161/200 => Loss: 0.47\nEpoch 181/200 => Loss: 0.47\n\
  out_probs = net(input_tensor).detach().numpy()\nout_classes = np.argmax(out_probs,\
  \ axis=1)\nprint(\"Train Accuracy:\", sum(out_classes == train_labels) / len(train_labels))\n\
  Train Accuracy: 0.8523274478330658\ntest_input_tensor = torch.from_numpy(test_features).type(torch.FloatTensor)\n\
  out_probs = net(test_input_tensor).detach().numpy()\nout_classes = np.argmax(out_probs,\
  \ axis=1)\nprint(\"Test Accuracy:\", sum(out_classes == test_labels) / len(test_labels))\n\
  Test Accuracy: 0.832089552238806\n```\n\n从神经网络模型中提取积分梯度；这可以通过使用 `attribute` 函数来完成。\n\
  \n```\nig = IntegratedGradients(net)\ntest_input_tensor.requires_grad_()\nattr,\
  \ delta = ig.attribute(test_input_tensor,target=1, return_convergence_delta=True)\n\
  attr = attr.detach().numpy()\nnp.round(attr,2)\narray([[-0.7 , 0.09, -0\\. , ...,\
  \ 0\\. , 0\\. , -0.33], [-2.78, -0\\. , -0\\. , ..., 0\\. , 0\\. , -1.82], [-0.65,\
  \ 0\\. , -0\\. , ..., 0\\. , 0\\. , -0.31], ..., [-0.47, -0\\. , -0\\. , ..., 0.71,\
  \ 0\\. , -0\\. ], [-0.1 , -0\\. , -0\\. , ..., 0\\. , 0\\. , -0.1 ], [-0.7 , 0\\\
  . , -0\\. , ..., 0\\. , 0\\. , -0.28]])\n```\n\n`attr` 对象包含了模型中输入特征的特征重要性。\n\n```\n\
  importances = np.mean(attr, axis=0)\nfor i in range(len(feature_names)):\nprint(feature_names[i],\
  \ \": \", '%.3f'%(importances[i]))\nAge :  -0.574\nSibSp :  -0.010\nParch :  -0.026\n\
  Fare :  0.278\nfemale :  0.101\nmale :  -0.460\nembark_C :  0.042\nembark_Q :  0.005\n\
  embark_S :  -0.021\nclass_1 :  0.067\nclass_2 :  0.090\nclass_3 :  -0.144\n```\n\
  \n`LayerConductance` 帮助我们计算神经元重要性，并通过计算神经元相对于输入和输出的偏导数来组合神经元激活。传导层通过观察积分梯度归因的流动，在积分梯度基础上进行了扩展。\n\
  \n```\ncond = LayerConductance(net, net.sigmoid1)\ncond_vals = cond.attribute(test_input_tensor,target=1)\n\
  cond_vals = cond_vals.detach().numpy()\nAverage_Neuron_Importances = np.mean(cond_vals,\
  \ axis=0)\nAverage_Neuron_Importances\narray([ 0.03051018, -0.23244175, 0.04743345,\
  \ 0.02102091, -0.08071412, -0.09040915, -0.13398956, -0.04666219, 0.03577907, -0.07206058,\
  \ -0.15658873, 0.03491106], dtype=float32)\nneuron_cond = NeuronConductance(net,\
  \ net.sigmoid1)\nneuron_cond_vals_10 = neuron_cond.attribute(test_input_tensor,\
  \ neuron_selector=10, target=1)\nneuron_cond_vals_0 = neuron_cond.attribute(test_input_tensor,\
  \ neuron_selector=0, target=1)\n# 神经元 0 的平均特征重要性\nnn0 = neuron_cond_vals_0.mean(dim=0).detach().numpy()\n\
  np.round(nn0,3)\narray([ 0.008, 0\\. , 0\\. , 0.028, 0\\. , -0.004, -0\\. , 0\\\
  . , -0.001, -0\\. , 0\\. , -0\\. ], dtype=float32)\n```\n\n神经元 0 的平均特征重要性可以通过使用阈值复制到任意数量的神经元。如果权重阈值超过某个水平，则可以推导出该神经元的神经元归因和平均特征重要性。\n\
  \n\n\n## 结论\n\n在本章中，我们研究了两个框架，`SHAP` 和 `Captum`，用于解释使用 `Keras` 或 `PyTorch` 开发的深度学习模型。我们使用这些库解析信息并获取更小的数据块，就能越清晰地了解模型如何工作、如何进行预测以及如何对局部实例进行归因。\n\
  \n回顾一下，本书首先解释了用于回归和分类任务的线性监督模型，然后解释了基于非线性决策树的模型，接着涵盖了集成模型，如装袋、提升和堆叠。最后，本书以解释时间序列模型、基于自然语言处理的文本分类以及基于深度神经网络的模型作为结尾。\n\
