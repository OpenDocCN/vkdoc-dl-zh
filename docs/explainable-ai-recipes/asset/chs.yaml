  \ max_depth=3, min_samples_split=20, random_state=0)\nrforest.fit(X, y)\n# 解释测试集中的所有预测结果\n\
  explainer = shap.TreeExplainer(rforest)\nshap_values = explainer.shap_values(X)\n\
  shap.summary_plot(shap_values, X)\n```\n\n![](img/540435_1_En_4_Fig11_HTML.jpg)\n\
