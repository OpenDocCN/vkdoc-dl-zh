  \n时间序列预测最常用的技术是自回归方法、移动平均方法、自回归移动平均方法以及基于深度学习的技术，例如 LSTM 等。时间序列模型要求数据以频繁的时间间隔记录。如果记录中存在任何间隙，则需要不同的过程来处理时间序列中的间隙。时间序列模型可以从两个角度来看：单变量，完全依赖于时间；以及多变量，考虑了各种因素。这些因素被称为*因果因素*，它们会影响预测。在时间序列模型中，时间是一个自变量，因此我们可以从时间中计算出各种特征作为独立特征。时间序列建模具有各种组成部分，例如趋势、季节性和周期性。\n\
