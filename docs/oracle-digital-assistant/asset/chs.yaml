  \         }\n        }\n        else if (event.currentTarget.id === 'Cancel') {\n\
  \          let userProfile = {};\n          userProfile.status = \"cancel\"\n  \
  \        //JQuery post 调用\n          $.post(webViewCallback, JSON.stringify(userProfile));\n\
  \        }\n        else {\n          // 在所有组件上显示消息\n          tracker.showMessages();\n\
  \          return;\n        }\n        const sleep = (milliseconds) => {\n     \
  \     return new Promise(resolve => setTimeout(resolve, milliseconds))\n       \
  \ }\n        //关闭打开窗口的浏览器标签页。关闭浏览器标签页时，\n        //确保 AJAX 调用在标签页关闭前完成。因此添加一个 \"\
  sleep\" 时间\n        sleep(500).then(() => {\n          window.open(\", '_self').close();\n\
  \        })\n        return true;\n      }\n      function init() {\n        //\
  \ 为整个页面主体的内容绑定你的 ViewModel\n        ko.applyBindings(app, document.getElementById('globalBody'));\n\
  \      }\n      // 如果在混合（例如 Cordova）环境中运行，我们需要等待 deviceready\n      // 事件后再执行任何可能与\
  \ Cordova API 或插件交互的代码。\n      if ($(document.body).hasClass('oj-hybrid')) {\n \
  \       document.addEventListener(\"deviceready\", init);\n      } else {\n    \
  \    init();\n      }\n    });\n  }\n);\n```\n\n```\nojet create travvyWebviewApp\
  \ --template=basic\n```\n\n你可以在上述代码中看到内联代码注释，它们详细说明了每个部分。请仔细查看从技能传递到应用程序的 `webviewParameters`，以及应用程序内部如何使用\
  \ `getWebviewParam` 来访问它。检查你如何设置 \"success\" 和 \"cancel\" 状态，并使用 JQuery 向回调 URL\
  \ 发起 Ajax POST 请求。`webview.onDone` 参数保存了这个回调 URL。\n\n一切完成后，从应用程序的根文件夹执行以下命令来测试你的应用程序：\n\
  \n```\nojet serve\n```\n\n## 打包 Web 应用程序\n\n现在你的 Web 应用程序已经准备就绪并测试完毕，接下来是打包你的应用程序。从应用程序的根文件夹执行以下命令：\n\
  \n```\nojet build --release\n```\n\n导航到 \"web\" 文件夹：\n\n```\ncd web\n```\n\n从 web\
  \ 文件夹执行以下命令，为部署生成 TAR 归档文件：\n\n```\ntar -zcvf travvyWebviewApp.tgz *\n```\n\n##\
  \ 创建 Webview 服务\n\n最后，你需要在你的 Digital Assistant 环境中创建一个 Webview 服务，以部署上一步创建的 TAR\
  \ 归档文件。导航到组件 ![../images/479330_1_En_8_Chapter/479330_1_En_8_Fige_HTML.jpg](img/479330_1_En_8_Fige_HTML.jpg)。在此屏幕上，你将看到两个选项卡，即\
  \ \"Custom\" 和 \"Webview\"。选择 Webview 选项卡，然后点击 ![../images/479330_1_En_8_Chapter/479330_1_En_8_Figf_HTML.jpg](img/479330_1_En_8_Figf_HTML.jpg)\
  \ 按钮。按照图 8-10 所示填写详细信息。保持 \"Service Hosted\" 开关为打开状态，并将应用程序 web 文件夹中的 `travvyWebviewApp.tgz`\
  \ 拖放到 \"Package File\" 部分。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig10_HTML.jpg](img/479330_1_En_8_Fig10_HTML.jpg)\n\
  \n**图 8-10** 创建 Webview 服务\n\n完成后，点击 ![../images/479330_1_En_8_Chapter/479330_1_En_8_Figg_HTML.jpg](img/479330_1_En_8_Figg_HTML.jpg)\
  \ 按钮来创建你的 Webview 服务。此过程需要几分钟时间，准备就绪后，你将看到如图 8-11 所示的屏幕。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig11_HTML.jpg](img/479330_1_En_8_Fig11_HTML.jpg)\n\
  \n**图 8-11** Webview 服务\n\n由于你创建此服务时使用的名称与 `System.Webview` 组件的服务属性中提到的名称完全相同，因此无需进行任何额外更改。你现在可以按照之前用例部分所述，测试你的端到端流程。\n\
  \n\n\n## 外部托管的 Webview 应用\n\n在本节中，我们将向您说明如何将 Web 应用托管在 Digital Assistant 之外，并借助中介服务调用该应用。为此，您将复用之前章节创建的应用，仅需进行极少的修改。我们建议您将之前创建的\
  \ Web 应用复制一份到单独的文件夹中，并使用不同的名称（例如 `TravvyWebviewExternal`）克隆您的技能。虽然在真实场景中，您并不局限于使用\
  \ SPA 来实现此类功能，但当前示例已足以满足演示目的。您将使用 `ngrok` 将您的中介服务和 Web 应用暴露到互联网上。\n\n### 创建中介服务\n\
  \n在您的机器上，创建一个名为 `intermediaryService` 的文件夹来实现该服务。\n\n```\nmkdir intermediaryService\n\
  ```\n\n使用以下命令进入该文件夹：\n\n```\ncd intermediaryService\n```\n\n通过执行以下命令将其配置为 Node 项目：\n\
  \n```\nnpm init -y\n```\n\n这将在您的 `intermediaryService` 目录中生成一个默认的 `package.json`\
  \ 文件。您将使用 `Express` 来创建此服务。在同一个命令提示符/终端中，执行以下命令：\n\n```\nnpm install express --save\n\
  ```\n\n在您的 `intermediaryService` 目录中创建一个名为 `index.js` 的文件，并向其中添加以下代码：\n\n```\nvar\
  \ express = require(\"express\");\nconst bodyParser = require(\"body-parser\");\n\
  var app = express();\napp.use(bodyParser.json());\napp.post(\"/travvyWebApp\", (req,\
  \ res) => {\nlet requestBody = req.body;\nlet parameters = requestBody.parameters;\n\
  let firstName = getWebviewParam(parameters, 'travellerFirstName', null);\nlet callbackUrl\
  \ = getWebviewParam(parameters, 'webview.onDone', null);\n//Web 应用的 ngrok URL\n\
  let responseUrl = \"https://d64ae6e3.ngrok.io?callbackUrl=\"+callbackUrl+\"&firstName=\"\
  +firstName;\nres.status(200).json({\n\"webview.url\": responseUrl\n})\n});\nfunction\
  \ getWebviewParam (arrParams, key, defaultValue) {\nif (arrParams) {\nlet param\
  \ = arrParams.find(e => {\nreturn e.key === key;\n});\nreturn param ? param.value\
  \ : defaultValue;\n}\nreturn defaultValue;\n};\napp.listen(4000, () => {\nconsole.log(\"\
  Server running on port 4000\");\n});\n```\n\n在此服务中，您借助 `getWebviewParam` 函数读取技能发送的输入参数（`travellerFirstName`）和回调\
  \ URL。之后，您构建一个响应 URL，其中包含您的 Web 应用 URL、`firstName`（从技能接收的 `travellerFirstName`）以及从技能\
  \ Webview 组件接收的回调 URL。在上述代码中，您需要替换 Web 应用 URL `https://d64ae6e3.ngrok.io`，我们稍后将对此进行说明。您将此\
  \ URL 作为包含 `webview.url` 参数的 JSON 对象传递给您的技能。\n\n### Web 应用实现\n\n您需要在之前复制的应用中所做的唯一更改位于\
  \ `main.js` 文件中。导航到您复制 Web 应用的文件夹，找到您的 `main.js` 文件，并将整个代码替换为以下内容：\n\n```\n/**\n\
  * @license\n* Copyright (c) 2014, 2019, Oracle and/or its affiliates.\n* The Universal\
