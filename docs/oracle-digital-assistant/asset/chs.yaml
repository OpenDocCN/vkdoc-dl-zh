  此外，您还可以将技能的预发布版本关联到频道。这有助于您在需要时处理生产环境中的回退情况。


  ## 频道路由


  通过将技能或数字助理关联到频道，您正在定义一个特定的技能或数字助理，当频道被调用时，该频道应将您路由到该技能或数字助理。这通常称为“频道路由”。


  选择您新创建的 `travvyWebChannel`。接下来，点击“路由至”对应的 ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figf_HTML.jpg](img/479330_1_En_6_Figf_HTML.jpg)
  按钮。这将显示您可以关联到此频道的所有可用技能和数字助理的完整列表。请参考图 6-11。


