  图标识别，而未发布的技能则带有 ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figh_HTML.jpg](img/479330_1_En_6_Figh_HTML.jpg)
  图标。类似地，数字助理可以通过 ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figi_HTML.jpg](img/479330_1_En_6_Figi_HTML.jpg)
  图标识别。


