  从列表中选择您想要公开的技能或数字助理。接下来，切换“频道已启用”对应的按钮以启用频道。包含所有详细信息的屏幕应如图 6-12 所示。


  ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig12_HTML.jpg](img/479330_1_En_6_Fig12_HTML.jpg)


