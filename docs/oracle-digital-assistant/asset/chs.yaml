  使用这些示例，您可以通过最少的步骤快速测试您的 Web 渠道。这些示例附带了预配置的 Bots 客户端 SDK，您稍后将在 Web 应用程序中使用它来访问 Web
  渠道。这些示例应用程序为您提供了一个测试和调试渠道的试验场。请按照以下步骤操作：


  1. 使用上述链接下载 `bots-client-sdk-js-samples-<版本号>.zip` 文件。

