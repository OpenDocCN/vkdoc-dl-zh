  /*\nSetting default values for the travellerFirstName if no value provided\n*/\n\
  self.firstName = ko.observable(queryParameters.get('firstName') != null ? queryParameters.get('firstName')\
  \ : \");\nself.lastName = ko.observable();\nself.address = ko.observable();\nself.zipCode\
  \ = ko.observable();\nself.validId = ko.observable();\nself.idNumber = ko.observable();\n\
  self.country = ko.observable();\n/*\nWhen the user submits or cancels the web form,\
  \ control need to be passed back to the bot,\nFor this a callback URL is passed\
  \ from the webview to the web application. The parameter\nholding the information\
  \ is \"webview.onDone\"\n*/\nvar webViewCallback = queryParameters.get('callbackUrl');\n\
  this.tracker = ko.observable();\nself.buttonClick = function (event) {\nlet userProfile\
  \ = {};\nuserProfile.firstName = self.firstName();\nuserProfile.lastName = self.lastName();\n\
  userProfile.address = self.address();\nuserProfile.zipCode = self.zipCode();\nuserProfile.validId\
  \ = self.validId();\nuserProfile.idNumber = self.idNumber();\nuserProfile.country\
  \ = self.country();\nvar tracker = document.getElementById(\"tracker\");\nif (tracker.valid\
  \ === \"valid\") {\n// submit the form\nif (event.currentTarget.id === 'Submit')\
  \ {\nuserProfile.status = \"success\"\n//JQuery post call\n$.post(webViewCallback,\
  \ JSON.stringify(userProfile));\n}\n}\nelse if (event.currentTarget.id === 'Cancel')\
  \ {\nlet userProfile = {};\nuserProfile.status = \"cancel\"\n//JQuery post call\n\
  $.post(webViewCallback, JSON.stringify(userProfile));\n}\nelse {\n// show messages\
  \ on all the components\ntracker.showMessages();\nreturn;\n}\nconst sleep = (milliseconds)\
  \ => {\nreturn new Promise(resolve => setTimeout(resolve, milliseconds))\n}\n//Closes\
  \ the browser tab the window is opened in. When closing the browser\n//tab, ensure\
  \ the ajax call gets trough before the the tab closes. Thus adding\n//a \"sleep\"\
  \ time\nsleep(500).then(() => {\nwindow.open(\", '_self').close();\n})\nreturn true;\n\
  }\nfunction init() {\n// Bind your ViewModel for the content of the whole page body.\n\
  ko.applyBindings(app, document.getElementById('globalBody'));\n}\n// If running\
  \ in a hybrid (e.g. Cordova) environment, we need to wait for the deviceready\n\
  // event before executing any code that might interact with Cordova APIs or plugins.\n\
  if ($(document.body).hasClass('oj-hybrid')) {\ndocument.addEventListener(\"deviceready\"\
  , init);\n} else {\ninit();\n}\n});\n}\n);\n```\n\n由于您的应用部署在 Digital Assistant 之外，您将无法再直接访问\
  \ `getWebviewParam`。为此，您使用了中介服务。因此，您需要读取从技能 URL 中附加接收的参数。基于此原因，您现在使用 `queryParameters`\
  \ 来获取 `firstName` 和回调 URL，这些参数被附加到从技能调用的 Web 应用 URL 中。其余的实现保持不变。\n\n\n\n### 技能实现\n\
  \n打开您新克隆的技能 `TravvyWebviewExternal`，并将其流程替换为以下内容：\n\n```\n#metadata: information\
  \ about the flow\n### platformVersion: the version of the bots platform that this\
  \ flow was written to work with\nmetadata:\nplatformVersion: \"1.0\"\nmain: true\n\
  name: TravvyWebviewExternal\n#context: Define the variables which will used throughout\
  \ the dialog flow here.\ncontext:\nvariables:\ntravellerFirstName: \"string\"\n\
  appResponse: \"string\"\n#states is where you can define the various states within\
  \ your flow.\nstates:\naskTravelerInfo:\ncomponent: \"System.Text\"\nproperties:\n\
  prompt: \"To proceed with booking, please provide your first name.\"\nvariable:\
  \ \"travellerFirstName\"\ntransitions:\nnext: \"webview\"\nwebview:\ncomponent:\
  \ \"System.Webview\"\nproperties:\nservice: \"travvyWebview\"\nsourceVariableList:\
  \ \"travellerFirstName\"\nvariable: \"appResponse\"\nprompt: \"Press 'Enter Traveler\
  \ Information' to complete your booking\"\nlinkLabel: \"Enter Traveler Information\"\
  \ncancelLabel: \"Cancel\"\ntransitions:\nnext: \"evaluateWebviewResponse\"\nactions:\n\
  cancel: \"onCancel\"\nevaluateWebviewResponse:\ncomponent: \"System.Switch\"\nproperties:\n\
  source: \"${appResponse.value.status}\"\nvalues:\n- \"success\"\n- \"cancel\"\n\
  transitions:\nactions:\nsuccess: \"confirmBooking\"\ncancel: \"onCancel\"\nNONE:\
  \ \"onCancel\"\nconfirmBooking:\ncomponent: \"System.Output\"\nproperties:\ntext:\
  \ \"Booking has been confirmed for ${appResponse.value.firstName} ${appResponse.value.lastName}.\
  \ Thanks for choosing Travvy!\"\nkeepTurn: false\ntransitions:\nreturn: \"done\"\
  \nonCancel:\ncomponent: \"System.Output\"\nproperties:\ntext: \"Sorry that you canceled\
  \ your booking. Hope to see you back soon!\"\ntransitions:\nreturn: \"done\"\n```\n\
  \n您的技能整体实现保持不变，除了为 `System.Webview` 组件创建服务。在这种情况下，您将通过切换“服务托管”开关来创建 `travvyWebview`\
  \ 服务，如图 8-12 所示。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig12_HTML.jpg](img/479330_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12\n\n为外部托管应用程序创建 Webview 服务\n\n在下一节生成“Web 应用 URL”后，您需要更新它。成功完成后，服务将如图 8-13\
  \ 所示。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig13_HTML.jpg](img/479330_1_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13\n\n外部托管应用程序的服务\n\n### 使用 ngrok 公开 Web 应用程序和中介服务\n\n通过执行以下命令启动您的 Oracle\
  \ JET Web 应用程序：\n\n```\nojet serve\n```\n\n您的本地 Oracle JET 应用程序运行在端口 8000 上。您将首先使用以下命令公开此端口：\n\
  \n```\nngrok http 8000\n```\n\n复制如图 8-14 所示的高亮部分，并将其更新到您的 `intermediaryService`\
  \ 的 `index.js` 中，如“创建中介服务”部分末尾所述。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig14_HTML.jpg](img/479330_1_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14\n\n公开端口 8000\n\n现在，从服务 `intermediaryService` 的根文件夹使用以下命令启动您的中介服务：\n\n```\n\
  node index.js\n```\n\n您的服务运行在端口 4000 上。如前所述，也使用 `ngrok` 公开您的端口 4000。完成后，在您的 `TravvyWebviewExternal`\
  \ 技能的 Webview 服务（即 `travvyWebview`）中更新此 URL。您需要更新该服务的“Web 应用 URL”。\n\n现在，您可以使用技能测试器测试端到端流程。\n\
  \n## 总结\n\n在本章中，您了解了 Webview 组件，这是在对话设计中从用户处收集结构化数据的一种替代方法。我们向您解释了 Webview 组件架构以及两种不同的方法，您可以使用这些方法在技能中实现\
  \ Webview 组件。希望您觉得这个主题有趣，我们下一章再见。\n\n"
- "# 9. 将常见问题解答集成到您的数字助理中\n\n## 引言\n\n数字助理的一个非常常见的用例是使用常见问题解答（FAQ），也称为问答（Q&A）。每当用户输入与问答中的搜索词匹配的短语时，匹配的问题和答案就会显示给用户。一个已开发的技能可以作为这些常见问题解答或其他知识库文档的接口。常见问题解答是寻求答案的常见问题。“你们的营业时间是什么？”“我可以带孩子吗？”“你们有素食披萨吗？”这些常见问题解答通常已经存在于公司的网站上，并且可以轻松地引入到您的机器人中。Oracle\
  \ 数字助理的问答框架使机器人能够通过返回一个或多个问答对来回答一般兴趣问题。通过这种方式，机器人可用于展示常见问题解答或其他知识库文档。\n\n我们公司 Extreme\
  \ Hiking Holidays 运营网站已有很长时间。他们收集了大量常见问题解答，这些解答可从网站上获取。在本章中，您将学习如何获取这些常见问题解答及其答案，并将它们作为问答添加到公司的数字助理\
  \ Travvy 中。\n\n## 问答是如何工作的？\n\n在您学习如何实现问答之前，了解问答在数字助理中的工作原理会很有帮助。设置一个良好的问答技能涉及一些重要的配置。意图解析如何工作，什么是问答路由，以及如何构建您的问答流程？\n\
  \n### 在技能级别配置问答路由\n\n对于问答路由，Oracle 数字助理在问答路由配置页面中提供了一组开箱即用的常用词和开场短语，这些词和短语指示命令或问题。除此之外，还可以添加任何特定领域的内容。此配置可以在技能的设置页面中更改，它使路由器能够区分问答和意图。如图\
  \ 9-1 所示，有一个事务配置部分和一个问题配置部分。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig1_HTML.jpg](img/479330_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n技能级别的问答路由设置\n\n在事务配置部分，您可以配置技能，使意图引擎更容易将话语识别为事务（例如“**我希望你**预订行程”、“**我的**付款何时到期”）。这些示例使用了请求句子前缀。此外，默认情况下，还有一组广泛的请求动词，例如“order”、“cancel”、“check”等。您可以添加特定于用例的请求动词。从图\
  \ 9-1 可以看出，内置集已经包含了最常用的动词和前缀，但您始终可以添加自己的动词以满足特定事务，例如“book”或“check in”，这些对于我们的旅游业务来说是典型的。\n\
  \n在问题配置中，您可以创建一组单词，这些单词表明用户正在提问（“**我如何**预订行程”、“**我怎样才能**取消我的假期”），而不是请求事务。这些也可以使用特定的问题动词进行扩展。\n\
  \n### 问答在运行时如何工作\n\n在运行时，机器人的行为受到上一节中描述的配置的影响。除此之外，还有两个重要的属性参与问答路由：\n\n- `confidenceTreshold`：技能使用此属性通过已解析意图的置信度来引导对话。此属性在技能级别配置中设置。\n\
  \n- `Q&AMinimumMatch`：设置任何问答对必须包含的令牌的最小和最大百分比，才能被视为匹配。此属性的值可以在流程编辑器中的 `System.Intent`\
  \ 组件中设置。\n\n\n\n### 提示\n\n`Q&AMinimumMatch` 设置默认为 `50%/25%`。虽然将其设置为例如 `90%` 没有意义，但您可能希望通过将其设置为仅\
  \ `50%` 或仅 `30%` 来调整问答（QnA）的查找结果。`50%/25%` 的默认值意味着，如果 `50%` 的匹配度未达到，搜索将回退到 `25%`，即采用一个更宽松的条件。\n\
  \n这两个属性的组合决定了流程的最终解析结果和输出。当用户输入一个短语时，可能会出现几种情况。让我们看一些示例：\n\n- 超过 `confidenceTreshold`\
  \ 且未达到 `Q&AMinimumMatch`：在这种情况下，意图被解析，用户会看到机器人对该意图的回复（图 9-2）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig2_HTML.jpg](img/479330_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2 情况 1\n\n- 低于 `confidenceTreshold` 且达到 `Q&AMinimimMatch`：在这种情况下，机器人将向用户回复与所提问题对应的答案（图\
  \ 9-3）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig3_HTML.jpg](img/479330_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3 情况 2\n\n- 低于 `confidenceTreshold` 且未达到 `Q&AMinimimMatch`：机器人将不知道如何解析该意图，并向用户显示未解析意图的提示（图\
  \ 9-4）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig4_HTML.jpg](img/479330_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4 情况 3\n\n- 超过 `confidenceTreshold` 且达到 `Q&AMinimimMatch`：在这种情况下，有几种可能的结果：\n\
  \  - 第一种取决于是否使用了祈使动词，例如“购买”、“检查”、“订购”、“确认”和“取消”。这些词表示一个交易，而非一个问题，因此，只要话语中使用了祈使句，机器人将仅回复意图。如果话语中不包含祈使句，机器人将同时显示问答和意图（图\
  \ 9-5）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig5_HTML.jpg](img/479330_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5 情况 5\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig6_HTML.jpg](img/479330_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6 情况 5\n\n  - 第二种取决于 `QnASkipIfIntentFound` 的设置。此属性可以在 `System.Intent` 级别设置。当设置为\
  \ `true` 时，如果匹配到意图，机器人将绕过问答。当设置为 `false`（默认值）时，机器人会使用用户的话语查询问答服务器，并将问答作为选项呈现（图 9-6）。\n\
  \n在本章的剩余部分，您将学习如何在 Travvy 数字助手的问答技能中使用这些属性。\n\n## 为我们的数字助手添加问答功能\n\n现在您已经了解了如何配置问答，是时候开发一个问答技能了。为数字助手添加问答功能的过程包含多个步骤。我们将引导您完成这些步骤，并对它们逐一进行解释：\n\
  \n- 创建一个新的技能来承载问答。\n- 为该技能启用问答功能。\n- 加载问答源文件，并可选择编辑、添加或删除更多问题。\n- 使用问答训练器训练机器人。\n\
  - 通过在问答测试器中输入问题来测试新的问答功能。\n- 要在机器人对话流程中使用问答，我们需要配置 `System.QnA`。\n- 为 *none* 动作添加一个状态，并在问题被回答时，通过为下一次转换添加问答，将转换设置回问答组件。\n\
  \n要开始使用问答，首先需要创建一个新的技能（图 9-7）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig7_HTML.jpg](img/479330_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7 创建一个新的问答技能\n\n点击“创建”后，技能编辑器将打开，一切准备就绪，可以添加问题和答案、编写流程并测试问答技能。在初始创建技能后，机器人构建器并不知道这个特定的技能应该被创建为问答技能。为了使该技能成为问答技能，需要通过点击导航栏中的问答图标\
  \ ![../images/479330_1_En_9_Chapter/479330_1_En_9_Figa_HTML.jpg](img/479330_1_En_9_Figa_HTML.jpg)\
  \ 来启用问答。然后点击 **添加问答**（图 9-8）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig8_HTML.jpg](img/479330_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8 为技能添加问答\n\n现在一切已设置完毕，下一步是上传包含该技能所有问题和答案的 csv 文件。点击“+ 问答源”后，会显示一个对话框，您可以在其中设置语言、区域设置和名称，并上传您的\
  \ csv 文件。在讨论上传本身之前，我们需要确保初始问答数据集的数据源设置正确。\n\n### 问答数据文件\n\n问答数据文件是一个包含您技能初始所需的所有问答对的文件。通常，此文件会以\
  \ Oracle 数字助手可以处理的格式打包您的常见问题解答（FAQ）。该文件必须满足一些标准才能上传到数字助手云：\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig9_HTML.jpg](img/479330_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9 问答数据源文件示例\n\n- 该文件必须是 UTF-8 编码的 CSV 文件。\n- 文件必须包含带有 `category_path`、`questions`\
  \ 和 `content` 的标题行。在该行下方，可以添加实际的问题和答案。图 9-9 显示了一个示例。\n\n`category_path` 包含给定问答对的类别（或多个类别）。这样一个问答对可以属于多个类别。如果是这种情况，每个类别应在新的一行中输入。如果类别存在层级关系，则应使用正斜杠：\n\
  \n- travel\n- travel/insurance\n- travel/itinerary\n\n在 `questions` 列中，您输入要使用的问题。每个问题版本应在新的一行中输入。第一个问题，即规范问题，是默认在机器人消息中显示的问题。该列中的后续问题是替代版本。\n\
  \n您可以在云用户界面中手动添加所有问题和答案，但使用电子表格输入数据是一种更方便的方式。使用电子表格进行初始的问答批量加载将节省您的时间。如果在后期需要添加额外的单个问题和/或答案，可以在上传\
  \ csv 文件后始终在用户界面中手动添加。\n\n\n\n### 提示\n\n为每个答案添加的问题越多，技能返回相关问答对的可能性就越大。请为每个答案添加 2\
  \ 到 5 个问题，这将提高准确性。\n\n在添加问题和答案时，必须确保为技能提供足够多的问题，以便识别用户提出相同问题的所有不同方式。最佳做法是变换动词和疑问词，如“如何”、“什么”和“哪里”，但答案的主题要保持高度一致。\n\
  \n像“我在哪里可以找到旅行目的地？”这样的问题，可以用不同的方式提问，例如：\n\n- 你们有目的地列表吗？\n- 我能获取所有目的地的概览吗？\n- 我的旅行有哪些可能的目的地？\n\
  \n显然，这些问题应始终返回相同的答案。当您对问答 CSV 的内容满意后，就可以将其添加到技能中。可以通过点击“+ Q&A 源”按钮来启动此上传过程，如图 9-10\
  \ 所示。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig10_HTML.jpg](img/479330_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10：添加新的问答源\n\n将出现一个上传对话框（图 9-11），您可以在其中选择问答源的语言和区域设置，并为其命名。接下来，可以将 CSV 文件拖放到对话框中进行上传。填写完所有字段后，点击\
  \ `Create`，CSV 文件将被上传并添加到您的问答中。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig11_HTML.jpg](img/479330_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11：添加问答源\n\n### 提示\n\n如果在上传后决定编辑数据源文件并替换内容，请注意，这将用新 CSV 文件中的内容替换所有在线内容。您在云端所做的任何更改都将被覆盖。最好在\
  \ CSV 中进行更改，而不是在云端。如果您在云端进行了更改，请确保在上传新文件之前，先导出云端的问答内容。\n\nCSV 中的所有问题和答案现在都已上传到技能编辑器中。在列表中，您可以看到刚刚上传的文件。\n\
  \n提高问答质量的另一项措施是添加特定于语言的配置。在这里，您可以添加忽略词、缩写和同义词。例如，对于“旅行”，有“旅程”、“假期”、“航行”等同义词。\n\n\
  只需将它们作为同义词添加到这里，它们都可以用来解析到同一个问题（图 9-12）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig12_HTML.jpg](img/479330_1_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12：添加同义词\n\n## 注意\n\n在本章中，我们不会深入探讨多语言细节。多语言的具体内容已在第 7 章中讨论过。\n\n当您点击“查看所有问答”时，您将看到一个列表，显示该文件的确切内容（图\
  \ 9-13）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig13_HTML.jpg](img/479330_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13：Travvy 的所有问答\n\n这也是编辑问答并在需要时进行导出的地方。现在是时候训练问答了。\n\n### 测试问答\n\n为了确保问答按预期工作，必须进行测试，但在测试问答之前，我们必须先训练问答（图\
  \ 9-14）。这是一项简单的任务，可以在机器人构建器的训练部分执行：\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig14_HTML.jpg](img/479330_1_En_9_Fig14_HTML.jpg)\n\
  \n图 9-14：训练技能的问答\n\n完成后，可以通过点击“试用”来调用测试器，开始测试 Travvy 的问答。这可以“逐个”进行，也可以批量进行。对于 Travvy，我们将坚持“逐个”测试。让我们看看当我们输入“我如何支付我的旅行费用？”时会发生什么（图\
  \ 9-15）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig15_HTML.jpg](img/479330_1_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15：测试问答\n\n问答功能处理对输入语句的响应。它由一组代表最佳匹配的问题组成。在我们的测试案例中，有三个可能的问题与用户的语句相关，都属于“旅行支付”类别。在测试器之外，在真实的“聊天机器人”中，这些答案将以一种轮播形式显示，以便用户可以浏览所有匹配的问题，找到他正在寻找的那个。\n\
  \n现在让我们看看，如果我们将其改为“我如何支付我的预订费用？”会发生什么（图 9-16）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig16_HTML.jpg](img/479330_1_En_9_Fig16_HTML.jpg)\n\
  \n图 9-16：测试问答\n\n问答功能现在选择了不同的问题和不同的顺序。显然，所有问题都以某种方式与输入的语句相关。如果您想增加某个问答对针对某个语句的权重，可以使用“**添加到问题**”按钮，将您的语句添加到特定的问答问题中。\n\
  \n\n\n### 在对话流中添加问答功能\n\n设置此问答技能的最后一步是在流程编辑器中进入问答流程。打开流程编辑器后，您会看到其中已包含代码。`states`\
  \ 关键字下方的所有内容都可以删除，因为此问答机器人不需要这些内容。您也可以根据需要删除注释。清理编辑器后，现在可以轻松设置问答流程了。\n\n这个“纯问答”技能将包含两个状态：\n\
  \n- **问答**：允许输入问题并显示答案的状态。\n- **未解决**：与往常一样，技能需要一个 `unresolved` 状态，以确保当数字助手无法理解用户意图时，对话不会崩溃。\n\
  \n这里的 `Q&A` 状态是问答的主要状态，下一个状态应始终是 `Q&A`，这样在返回答案时就会路由回问答状态。因此，配置如下：\n\n- `component`：`System.Q&A`\n\
  - `transitions`：\n  - `actions`：\n    - `none`：`unresolved`\n  - `next`：`travvyQnA`\n\
  \n最终结果如下代码所示：\n\n```\nmetadata:\nplatformVersion: \"1.0\"\nmain: true\nname: \"\
  TravvyQnA\"\ncontext:\nvariables:\ngreeting: \"string\"\nname: \"string\"\nterminateChoice:\
  \ \"string\"\nstates:\ntravvyQnA:\ncomponent: \"System.QnA\"\ntransitions:\nactions:\n\
  none: \"unresolved\"\nnext: \" travvyQnA\"\nunresolved:\ncomponent: \"System.Output\"\
  \nproperties:\ntext: \"抱歉，我没有找到任何匹配项。您能重新表述一下问题吗？\"\ntransitions:\nreturn: \"done\"\
  \n```\n\n让我们看看在技能测试器中询问“how can I pay my voyage”时会发生什么。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig17_HTML.jpg](img/479330_1_En_9_Fig17_HTML.jpg)\n\
  \n**图 9-17** 测试器中的默认行为\n\n您可以在图 9-17 的右侧看到，问答功能选择了四个问答集。这四个问答集也显示在轮播中，您可以使用箭头按钮浏览选项。通过调整\
  \ `System.QnA` 组件的属性可以改变此行为。为了减少呈现给用户的问答对数量，您可以使用 `matchListLimit` 属性。\n\n在以下代码中，此属性被设置为\
  \ `1`：\n\n```\ntravvyQnA:\ncomponent: \"System.QnA\"\nproperties:\nmatchListLimit:\
  \ 1\ntransitions:\nactions:\nnone: \"unresolved\"\nnext: \" travvyQnA\"\n```\n\n\
  行为将发生变化，您可以在测试器中看到这一点（图 9-18）：\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig18_HTML.jpg](img/479330_1_En_9_Fig18_HTML.jpg)\n\
  \n**图 9-18** 设置 `matchListLimit=1` 后的行为\n\n只有第一个选项显示给用户，并且用户会获得一个额外的选项来显示“更多答案”。\n\
  \n您还可以使用更多选项来影响问答的行为，例如前面提到的 `QnASkipIfIntentFound` 和 `confidenceTreshold`。\n\n\
  为了展示将问答与意图混合使用并调整可用选项时会发生什么，我们向问答技能添加了一个简单的意图（`PayTrip`）。\n\n> **注意**：对于 Travvy\
  \ 数字助手，我们将把问答功能放在一个独立的、不包含意图的干净技能中。在后续阶段，我们会将此技能添加到数字助手中。\n\n首先，我们来看看 `confidenceTreshold`\
  \ 的作用。我们将使用语句 **“I need to fulfill the invoice”**，该语句既可以关联到问答，也可以关联到 `PayTrip` 意图。当\
  \ `confidenceTreshold` 设置为 `0.6` 时，技能会立即显示它找到的问答（图 9-19），因为意图得分百分比为 `0.49`，低于 `confidenceTreshold`。\n\
  \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig19_HTML.jpg](img/479330_1_En_9_Fig19_HTML.jpg)\n\
  \n**图 9-19** 低于 `confidenceTreshold`\n\n现在，如果我们将 `confidenceTreshold` 从 `0.6` 降低到\
  \ `0.5`，您会看到技能的行为有所不同，它会同时显示意图和问答，并让用户选择他想要的内容（图 9-20）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig20_HTML.jpg](img/479330_1_En_9_Fig20_HTML.jpg)\n\
  \n**图 9-20** 超过 `confidenceTreshold`\n\n最后，我们可以将 `QnASkipIfIntentFound` 从 `false`\
  \ 改为 `true`，看看效果如何（图 9-21）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig21_HTML.jpg](img/479330_1_En_9_Fig21_HTML.jpg)\n\
  \n**图 9-21** `qnaSkipIfIntentFound` 设置为 `true`\n\n```\nIntent:\ncomponent: \"System.Intent\"\
  \nproperties:\nvariable: \"iResult\"\nqnaEnable: true\nqnaSkipIfIntentFound: true\n\
  transitions:\nactions:\nunresolvedIntent: \"unresolved\"\npayTrip: \"payTrip\"\n\
  qna: \"travvyQna\"\n```\n\n现在，让我们将 `QnASkipIfIntentFound` 设置回 `false`。当用户说“**I need\
  \ to pay my voyage**”时，技能会显示两个选项，因为存在一个得分高于置信度阈值的意图和一个匹配的问题，但意图会排在第一位（图 9-22）。\n\
  \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig22_HTML.jpg](img/479330_1_En_9_Fig22_HTML.jpg)\n\
  \n**图 9-22** 意图优先显示\n\n当用户使用问答路由配置中定义的“问题动词或前缀”时，表明用户正在提问。问答响应的链接会优先显示，因为它比意图响应的链接获得更高的“优先级”（图\
  \ 9-23）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig23_HTML.jpg](img/479330_1_En_9_Fig23_HTML.jpg)\n\
  \n**图 9-23** 问答优先显示\n\n还有一件事需要配置，那就是问答路由。您可以在路由部分添加自定义的“**请求句子前缀**”。让我们看看，如果您在该部分添加“**I\
  \ want to**”并向技能询问“I want to pay my trip”，会发生什么。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig24_HTML.jpg](img/479330_1_En_9_Fig24_HTML.jpg)\n\
  \n**图 9-24** 配置问答路由后意图显示\n\n就是这样。技能现在完全理解您想做什么，并且会解析 `PayTrip` 意图（图 9-24）。\n\n影响和配置问答行为的方法有很多，此外，理解所有选项确实至关重要，因为您需要根据技能的要求，在不同情况下以不同方式使用它们。\n\
  \n## 总结\n\n常见问题解答是寻求答案的常见问题。它们通常已经存在于公司的网站上，并且可以轻松地引入到您的机器人中。在本章中，您学习了如何开发问答技能以及如何在数字助手中使用它。现在，您应该能够理解如何在\
  \ Oracle 数字助手中配置问答，以及如何改进问答集以获得最佳用户体验。\n\n"
- '# 第五部分：高级主题


  '
- '# 10. 使用自定义组件扩展您的数字助手




  ## 引言


  欢迎来到自定义组件章节。本章将重点介绍 Oracle 数字助手（ODA）的自定义组件。在第 5 章的学习过程中，你已经对自定义组件有了初步了解。假设你对自定义组件已有大致认识，本章将详细阐述自定义组件。自定义组件是指那些你可以根据自身需求亲手打造的组件，最重要的是，你可以完全控制其行为。你将学习从在本地环境中创建自定义组件的基础知识开始，包括本地调试、托管，并最终在技能对话流中使用它们。


  如前所述，在数字助手中，或者更准确地说，在技能中，要执行的任何任务或操作都需要一个组件来实现。考虑一个非常简单的用例：你让用户输入姓名，然后显示一条针对该用户名的个性化问候消息。要实现这个功能，你至少需要使用两个组件。首先，你将使用一个组件来显示提示，要求用户提供姓名。然后，使用第二个组件，根据提供的输入，显示一条包含用户名的个性化问候消息。


  每个操作和机器人响应，无论是输入提示还是显示消息，都需要在对话流中对应一个状态。每个状态将调用且仅调用一个组件来执行任务。尽管 Oracle 数字助手提供了多种可直接使用的内置组件，用于构建机器人流程，但你经常会遇到内置组件不足以执行特定任务的情况。


  特定任务，例如后端集成，你需要调用 REST 服务从后端系统获取所需信息，然后在向用户展示结果之前进行数据处理，这些都需要自定义组件。这仅靠内置组件是无法完成的。这是自定义组件的典型用例：你在自定义组件中使用
  JavaScript 定义自定义逻辑，托管该组件，然后从对话流中调用它以获得所需结果。在使用 Travvy 时，你可能希望使用 REST 服务检索用户特定信息，如全名、年龄、地址等。


  另一个可以考虑使用自定义组件的场景是，当你想要为技能实现一些复杂逻辑，但意识到使用 Apache FreeMarker 无法完成时。在本书的上下文中，考虑 Travvy
  的一个用例：你只允许成年用户（即年龄大于 18 岁）预订行程。如果用户年龄不符合条件，则显示一条消息，说明他/她没有资格使用 Travvy 预订行程。这种类型的复杂逻辑直接在机器人流程中实现不太方便，但使用自定义组件可以有效地完成。话虽如此，根据我们目前的讨论，可以总结出使用自定义组件的以下好处。


  ## 使用自定义组件的好处


  - 对于原本需要多个状态来实现的用例，自定义组件可以使你的对话流保持简洁。

  - 自定义组件如果使用 Oracle Mobile Hub 部署为 API（请参阅“从 ODA 实例访问自定义组件”部分下的图 10-13，其中可以选择 Oracle
  Mobile Cloud 选项），则可以跨不同的技能使用，这些技能甚至可以分布在不同的 ODA 实例中。

  - 由于自定义组件是使用 Node.js 开发的，你可以利用公共且免费的第三方 Node 库。


  ## 自定义组件的用例


  - 默认情况下，Oracle 允许你使用 Google 和 Microsoft 翻译服务为机器人提供多语言支持。但如果你希望为机器人使用任何第三方翻译服务，也可以通过自定义组件来实现。

  - 如果你希望为机器人或任何特定部分（如 API 调用）实现安全性，你也可以考虑使用自定义组件。


  这个列表远不止于此。当你开始使用自定义组件时，你会在自己的特定场景中发现更多的好处和用例。


  现在你已经对自定义组件以及何时应考虑使用它们有了基本了解，是时候开始实践了。在接下来的几个步骤中，你将看到创建第一个自定义组件并开始实现自定义逻辑是多么容易。我们还建议你学习一些
  JavaScript 语言知识，如果你目前还不熟悉的话。这将为后续工作带来极大便利，在处理自定义组件时你会感受到不同。但首先，你需要搭建本地开发环境。这将使你能够在自己的机器上开发自定义组件，在实际部署到云端之前进行调试和测试。


  ## 自定义组件的环境搭建


  为了开始使用自定义组件，你需要在本地机器上安装一些必备软件。首先也是最重要的，如果你的本地机器上尚未安装 Node，则需要安装它。你可以从以下链接下载 Node：


  [`nodejs.org/en/download/`](https://nodejs.org/en/download/)


  接下来需要下载 Oracle Bots Node.js SDK。安装 Node 后，你可以使用以下命令全局安装 Oracle Bots Node SDK：


  Windows


  ```

  npm install -g @oracle/bots-node-sdk

  ```


  Mac


  ```

  sudo npm install -g @oracle/bots-node-sdk

  ```


  接下来，你需要下载一个隧道软件。我们将使用 ngrok。这将使你在调试和测试自定义组件时轻松许多，因为它允许你直接从 ODA 访问位于你开发计算机上的自定义组件。你可以从以下链接下载
  ngrok：


  [`ngrok.com/download`](https://ngrok.com/download)


  使用 ngrok，你可以将机器上的特定端口暴露到互联网上。这将在“通过互联网暴露自定义组件”部分详细讨论。


  最后，根据你的偏好下载一个用于 JavaScript 开发的代码编辑器。你可以考虑使用 Microsoft Visual Studio Code。




  ## 自定义组件开发入门


  假设您已按照上一节中的步骤操作，您的本地环境应该已准备好进行自定义组件开发。如本章开头所述，在接下来的几个步骤中，您将创建一个自定义组件来验证用户的年龄。


  导航到您想要创建自定义组件的目录，并从该目录打开命令提示符。请确保您要创建自定义组件的目录以及您在自定义组件内部创建的任何目录都不包含空格。请参考图 10-1。


  ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig1_HTML.jpg](img/479330_1_En_10_Fig1_HTML.jpg)


  图 10-1


  自定义组件位置


  在上述位置，您将创建一个名为 `ageValidatorCC` 的目录。在命令行中使用以下命令：


  ```

  mkdir ageValidatorCC

  ```


  创建完成后，使用以下命令导航到 `ageValidatorCC` 目录：


  ```

  cd ageValidatorCC

  ```


  下一步是将您的项目目录（即 `ageValidatorCC` 目录）配置为一个 node 项目。使用以下命令：


  ```

  npm init -y

  ```


  这将在 `ageValidatorCC` 目录内生成一个默认的 `package.json`。您稍后可以更新此 `package.json` 文件，添加项目特定的详细信息。请参考图
  10-2。


  ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig2_HTML.jpg](img/479330_1_En_10_Fig2_HTML.jpg)


  图 10-2


  配置一个 node 项目


  接下来，使用以下命令将 Oracle Bots Node SDK 添加到您的项目目录：


  ```

  npm install --save-dev @oracle/bots-node-sdk

  ```


  如果您现在导航到 `ageValidatorCC` 目录，您会注意到该目录包含上一步创建的 `package.json`，以及 `node_modules` 目录中新增的
  node 模块。


  接下来，您需要添加一个 JavaScript 文件，用于编写您的自定义逻辑。为此，请使用以下命令：


  ```

  bots-node-sdk init -c AgeValidator

  ```


  完成后，您将看到一条消息，显示“自定义组件包‘ageValidatorCC’创建成功！”。这将在您的目录中创建组件包并添加依赖项。请参考图 10-3。


  ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig3_HTML.jpg](img/479330_1_En_10_Fig3_HTML.jpg)


  图 10-3


  自定义组件包


  恭喜！您现在已经成功创建了第一个自定义组件。如果您之前有使用 node 项目的经验，那么您一定对图 10-3 中显示的文件很熟悉。但如果没有，我们将简要介绍您主要关心的文件：


  `package.json`：此文件包含您项目的特定元数据信息。这包括对项目入口点的引用（在本例中为 `main.js`），以及项目的 JavaScript 依赖项。要了解更多信息，请参考以下链接：


  [`https://docs.npmjs.com/files/package.json`](https://docs.npmjs.com/files/package.json)


  `main.js`：如前所述，此文件是自定义组件项目的默认入口点。您会注意到此文件引用了组件目录，您将在其中添加自定义组件实现。请参考以下 `main.js`
  的代码：


  ```

  module.exports = {

  components: [

  ''./components''

  ]

  };

  ```


  即使您在组件目录中实现了多个组件，您也可以通过指定组件名称来简单地访问特定组件。您无需修改 `main.js` 中的任何内容即可访问它。例如，就像您添加了 `AgeValidator`
  组件一样，您也可以在组件目录中添加另一个组件 `GetUserProfile` 来检索用户配置文件信息。


  在此上下文中，另一个重要点是在创建组件时创建某种逻辑分组。例如，您可能希望将 `AgeValidator` 和 `GetUserProfile` 配置文件组件放在
  `components` 内的不同目录中，以隔离不同的实现。您可能想要更改的一件事是给您的父文件夹起一个通用名称，例如 `odaCustomComponentCC`，而在本例中它是
  `ageValidatorCC`。


  虽然这不是必须的，但这是一个值得遵守的良好实践。毕竟，它将帮助您以及您的团队成员理解代码实现，并在出现问题时准确定位到特定组件。


  `AgeValidator.js`：这是您的自定义组件的 JavaScript 实现，位于 `components` 目录下。图 10-4 向您展示了执行 `bots-node-sdk
  init -c AgeValidator` 时生成的默认自定义组件实现。


  ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig4_HTML.jpg](img/479330_1_En_10_Fig4_HTML.jpg)


  图 10-4


  自定义组件默认实现


  如您所见，`AgeValidator` 默认暴露了两个不同的函数。它们是 `metadata` 和 `invoke`。让我们在这里更详细地讨论它们：


  `metadata: ():` 如您所见，此函数保存组件的元数据信息。`metadata` 函数由三个不同的属性组成。


  *   `name`：这是标识您组件的唯一名称。

  *   `properties`：这是一个对象，包含组件执行所必需的参数。

  *   `supportedActions`：这些是您的组件支持的操作，您可以根据条件从组件中调度这些操作。基于这些操作，您可以在机器人流程中定义状态转换操作。


  `invoke: (conversation, done):` `invoke` 函数接受两个参数，即 `conversation` 和 `done`。`conversation`
  是对自定义组件 SDK 的引用。您可以使用其函数来读取从机器人发送到自定义组件的消息，并根据这些消息编写组件响应。例如，假设您在 `properties` 部分中定义了一个变量
  `userAge` 及其类型，您期望它作为自定义组件的输入参数。一旦您从技能中传递了 `userAge` 值，要在自定义组件中获取该值，您可以使用以下代码：


  ```

  var givenAge = conversation.properties().userAge;

  ```


  同样，您也可以在 `properties` 部分中定义一个变量（例如 `ccResult`）及其类型。然后使用此变量通过如下设置将值传递回您的机器人：


  ```

  conversation.variable(ccResult, ccCalculatedVal);

  ```


  一旦您的自定义组件完成处理，并且您希望将控制权交还给机器人对话流程，您将调用 `done()`，这是一个回调函数。例如，您可以在按照上述代码为变量设置计算值后立即调用
  `done()`。因此，它看起来如下所示：


  ```

  conversation.variable(ccResult, ccCalculatedVal);

  done();

  ```




