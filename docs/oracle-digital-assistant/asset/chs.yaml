  按钮，然后从列表中选择不同的技能或数字助理来更改路由。


  您新创建的 Web 频道现在已准备好被访问。


  在继续本章之前，以下两点您应始终牢记：


  1.  一个频道与一个技能或数字助理保持一对一的关系。这强调了一个事实，即在一个特定频道上一次只能公开一个技能或数字助理。不过，您可以为特定的消息类型创建多个频道。


  2.  当您通过频道调用数字助理时，与该数字助理关联的技能将始终使用数字助理的频道来发送和接收消息。无论技能是否有自己独立的频道。简而言之，如果您通过技能的频道直接访问技能，则对话将在技能的频道上进行。如果您通过数字助理的频道访问一个或多个技能，则所有通信都将通过数字助理的频道进行。




