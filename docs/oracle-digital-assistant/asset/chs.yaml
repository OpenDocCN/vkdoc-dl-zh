- '# 7. 在数字助手中支持多种语言




  ## 引言


  ![../images/479330_1_En_7_Chapter/479330_1_En_7_Figa_HTML.gif](img/479330_1_En_7_Figa_HTML.gif)


  或者，用英语来说：你可能没想过要用一句印地语来开启本章。


  虽然本书是用英语写成的，但世界上还有更多种语言，其中许多语言只有少数世界人口在使用。当今世界上大约有 6,500 种口语。然而，其中约 2,000 种语言的母语者不足
  1,000 人。使用人数最多的十种语言覆盖了全球约 50% 的人口。这意味着另外 50% 的人口使用其余 6,490 种语言中的任何一种。这些数字对任何想要提供多语言解决方案的人都构成了挑战。确定你想要支持哪些语言至关重要，因为支持所有语言几乎是不可能的。


  一个简单的例子足以说明一切：


  * I would like to order a pizza.

  * Je voudrais commander une pizza.

  * Me gustaria pedir una pizza.

  * Ich mochte gerne einen Pizza bestellen.


  如何构建一个数字助手，使其能够理解上述所有语言，并将它们关联到 `OrderPizza` 意图，同时还能用正确的语言回复用户？


  Extreme Hiking Holidays 也面临着同样的挑战，因为他们服务来自多个国家的客户。他们的大多数客户说英语，但作为对客户的额外服务，他们还为客户提供了一个不仅会说英语，还能说其他语言的数字助手。在本章中，你将学习如何为
  Oracle 数字助手添加多语言支持。


  ## 注意


  数字助手的多语言支持目前尚不完美。对于单个技能，你可以实现多语言支持。如果你需要这种多语言支持，应考虑公开技能。在数字助手层面，目前无法检测语言或使用资源包。当前的解决方案是创建所谓的“主导语言”机器人。这些机器人不是多语言的，而是单一外语机器人。


  为 Oracle 数字助手启用真正的多语言使用已在路线图中。


  ## 翻译是如何工作的？


  Oracle 数字助手的自然语言处理（NLP）基于英语。但这并不意味着你不能添加对其他语言的支持。这种支持依赖于两个组件。


  首先是使用外部翻译服务。这将获取用户输入的任何话语，并将其与英语进行互译。其次是使用包含特定语言文本的资源包。这些资源包将用于向用户发送翻译后的机器人响应。在本章后面，我们将解释这些组件如何工作以及如何组合使用。首先，你将了解语言翻译的典型流程，如图
  7-1 所示。


  ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig1_HTML.jpg](img/479330_1_En_7_Fig1_HTML.jpg)


  图 7-1


  翻译流程


  基于用户输入，数字助手将尝试检测语言。一旦检测到语言，它将进入流程的下一步。在该步骤中，如果需要，用户的输入话语将由翻译服务翻译成英语。这种翻译需求由 `autoTranslate`
  属性决定。自动翻译默认是禁用的，但随时可以启用或禁用。需要定义 `autoTranslate` 上下文变量，并且每当此变量的值设置为 `true` 时，自动翻译即被启用。启用后，所有用户消息都会被翻译成英语，所有机器人消息都会被翻译成用户语言。


  ```

  variables:

  autoTranslate: "boolean"

  states:

  enableAutotranslation:

  component: "System.SetVariable"

  properties:

  variable: "autoTranslate"

  value: true

  transitions: {}

  ```


  如果 `autoTranslate` 为 `false`，单个组件可能仍然需要翻译。这是因为组件上的 `translation` 属性可以覆盖全局的 `autoTranslate`
  设置。


  因此，如果组件上的 `translation` 属性设置为 `true`，即使 `autoTranslate` 设置为 `false`，数字助手也会调用已配置的翻译服务。


  ```

  :

  component: "System.Text"

  properties:

  translate: true

  ```


  在调用翻译服务之后，或者当不需要翻译时，数字助手将继续处理用户的输入，然后生成机器人的响应。


  数字助手需要确定如何将响应发送给最终用户。有三种选择：


  1.  可以从资源包中获取。

  2.  可以通过翻译服务进行翻译。

  3.  可以“原样”发送。


  具体方式取决于情况。默认情况下，使用组件上定义的输出字符串。如果定义的输出字符串是对资源包的引用，则使用资源包字符串。如果语言设置不是英语，则会查找并使用该语言的资源包条目。如果该条目不可用，则回退到默认语言（英语）的资源包字符串。如果为某个组件启用了翻译（可以通过
  `autoTranslate` 或 `translate` 属性实现），则组件输出文本会首先发送到翻译服务进行翻译。即使该字符串是从资源包中获取的，也是如此。


  ## 注意


  Oracle 数字助手内部使用的语言是英语。如果用户的语言是英语，则无需翻译机器人的回复，因为两者都是英语。在这种情况下，你需要使用 Apache FreeMarker
  表达式将组件上的 `translate` 属性设置为 `false`，或将 `autoTranslate` 属性设置为 `false`。否则，Oracle 数字助手会尝试将其翻译成英语。


  如果用户的语言不是英语，数字助手将调用翻译服务，并将翻译后的答案传达给用户。但是，如果你在引用资源包的组件上将 `translate` 属性设置为 `false`，则会使用资源包字符串。


  ## 注意


  如果你以 `System.TranslateInput` 开始你的流程，数字助手将始终将用户的输入翻译成英语。如果你需要这种翻译，这会非常有用。


  ```

  translateInput:

  component: "System.TranslateInput"

  properties:

  variable: "translatedString"

  transitions:

  next: "Intent"

  ```


  ### 提示


  你甚至可以从变量中读取原始字符串，这样你就可以保留原始字符串和翻译后字符串的副本。


  ### 翻译服务的陷阱


  翻译服务在创建多语言数字助手时非常有用。然而，它们并非万无一失。有几种情况下，翻译服务难以正确检测语言或提供准确的翻译。让我们看一些例子。


  首先是语言相近的情况。在欧洲，有几种语言非常接近。对于翻译服务来说，区分挪威语和瑞典语、瑞典语和丹麦语会很困难。在这种情况下，作为开发人员，你应该做好准备，在继续之前要求用户确认检测到的语言。其次是问候语或从其他语言“借用”的词语。Hi、Hey、Hoi、Hello、Hallo、Bonjour、Ciao，这些问候语在许多不同的语言中都有使用。没有任何翻译服务能够区分一个意大利人说的“Ciao”和一个荷兰人说的“Ciao”。它总是会得出意大利语的结论，从而使荷兰人感到困惑。对此你无能为力。




  ## 为 Travvy 添加多语言支持


  Extreme Hiking Holidays 的客户遍布 50 多个国家，但他们没有能覆盖这 50 种语言的员工。此外，他们也没有资源来创建和管理 50 种不同语言的机器人。这时，翻译服务就派上了用场。


  使用翻译服务需要配置一个外部翻译服务。Oracle Digital Assistant 支持使用 Google Translation API 和 Microsoft
  翻译服务。


  ## 注意


  在本书中，我们将使用 Google Translation API。


  Google Translation API 是一项付费 API。费用因 API 使用量而异，可能有所不同。在使用 API 之前，您必须设置一个 Google
  帐户并启用 Translation API。可以在您的 Google 帐户的开发者控制台（图 7-2）中启用该 API：[`https://console.developers.google.com/apis/dashboard`](https://console.developers.google.com/apis/dashboard)。


  ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig2_HTML.jpg](img/479330_1_En_7_Fig2_HTML.jpg)


  图 7-2


  Google 开发者控制台仪表板


  激活翻译服务后，必须将此翻译服务添加到 Digital Assistant 中才能使用。您可以在 Digital Assistant 级别的“设置菜单”中打开“添加翻译服务”（图
  7-3）。


  ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig3_HTML.jpg](img/479330_1_En_7_Fig3_HTML.jpg)


  图 7-3


  添加翻译服务


  您只需从下拉列表中选择服务类型，添加翻译服务的基本 URL，最后输入授权令牌。单击“创建”后，配置将被保存，翻译服务即可使用。


  添加翻译服务后，您需要配置其使用方式。翻译服务的使用可以在技能级别进行配置。在技能的常规设置中，您需要从包含此云实例所有可用翻译服务的下拉列表（图 7-4）中选择要使用的翻译服务。


  ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig4_HTML.jpg](img/479330_1_En_7_Fig4_HTML.jpg)


  图 7-4


  设置翻译服务


  选择后，所有需要的翻译都将由此翻译服务提供。


  ## 使用翻译服务


  在 Digital Assistant 中进行翻译有两种选项：选择加入和选择退出。本节将对两者进行说明。


  ### 选择退出


  要使 Digital Assistant 默认启用翻译（也称为选择退出翻译），在添加翻译服务后需要执行一些步骤。首先，您需要添加 `autoTranslate`
  上下文变量。接下来，需要一个 `System.SetVariable` 组件，将 `autoTranslate` 设置为 `true`。最后，作为下一个状态，您需要添加
  `System.DetectLanguage` 组件，该组件会调用翻译服务来确定用户的语言。所有这些将生成以下代码片段：


  ```

  metadata:

  platformVersion: "1.0"

  main: true

  name: FindTripWithTranslations

  context:

  variables:

  iResult: "nlpresult"

  autoTranslate: "boolean"

  states:

  enableAutoTranslation :

  component: "System.SetVariable"

  properties:

  variable: "autoTranslate"

  value: true

  transitions:

  next: "detectLanguage"

  detectLanguage:

  component: "System.DetectLanguage"

  properties:

  source:

  transitions:

  next: ............

  ............

  ............

  ............

  ```


  ### 选择加入


  翻译的另一个选项是选择加入选项。仅针对您希望翻译的那些组件，您需要专门将 `translate` 属性设置为 `true`。


  为了实现这一点，您必须确保将 `autoTranslate` 上下文变量设置为 `false`。接下来，对于所有需要翻译的单个组件，将 `translate`
  属性设置为 `true`。最后，确保 `System.Intent` 组件也将 `translate` 属性设置为 `true`。这是因为 Oracle Digital
  Assistant 的内部语言是英语。


  ```

  intent:

  component: "System.Intent"

  properties:

  variable: "iResult"

  translate: true

  ```


  ### 提示


  如果您依赖翻译服务来提供答案，Translation API 会将机器人的英语答案翻译成用户的语言。您对翻译几乎没有控制权，因此无法 100% 确保答案始终一致。为了完全控制
  Digital Assistant 的回复内容，您应该使用资源包来存储依赖于语言的答案。


  ## 使用资源包


  如前一条提示所述，最佳实践是依赖资源包来处理机器人的所有回复。这可以根据需要支持任意数量的语言和方言。要实现这一点，您必须创建资源包和资源包条目。如果您尚未添加任何资源包，Oracle
  Digital Assistant 会为您创建一个，然后您可以输入第一个条目（图 7-5）。


  ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig5_HTML.jpg](img/479330_1_En_7_Fig5_HTML.jpg)


  图 7-5


  创建第一个资源包条目


  ## 注意


  当您创建新的资源包条目时，它总是会被添加到默认语言（即英语）中。


  现在，您可以开始添加翻译，或者换句话说，为其他语言添加资源包。对于每个键，您可以通过点击“+ 语言”按钮来添加翻译。这将弹出一个弹出窗口，您可以在其中为所选键输入特定于语言的文本（图
  7-6）。


  ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig6_HTML.jpg](img/479330_1_En_7_Fig6_HTML.jpg)


  图 7-6


  向资源包添加其他语言


  请确保对于每一个键，您都有 Digital Assistant 支持的所有语言的翻译。为了帮助您完成此操作，Oracle Digital Assistant 在右上角提供了一个“查看方式”下拉列表（图
  7-6）。首先，您可以将其切换为“语言”。然后选择要为其创建资源字符串的语言，并开始构建字符串，直到看不到更多键为止。当所有键都有对应的字符串时，将不再显示更多键。


  ## 从资源包回复


  输入所有翻译后，现在该让 Digital Assistant 基于这些翻译来回复用户了。这实际上非常简单。单语言的 Digital Assistant 可以使用硬编码文本，如下面的代码示例所示：


  ```

  bookTrip:

  component: "System.Output"

  properties:

  text: "Ok, lets continue to book your trip."

  transitions:

  return: "done"

  ```


  为了在技能中支持多语言，您应该添加对资源包的引用，以便它可以基于此资源包进行回复。前面的代码示例需要更改为：


  ```

  bookTrip:

  component: "System.Output"

  properties:

  text: "${rb.continueBooking}"

  transitions:

  return: "done"

  ```


  其中 `rb.continueBooking` 引用对话语言中一个键值为“continueBooking”的资源包条目。Digital Assistant 将查找该条目并回复该键对应的确切值。


  请注意，前缀 `rb` 需要在流程的 `context/variables` 部分中定义。


  ```

  context:

  variables:

  iResult: "nlpresult"

  rb: "resourcebundle"

  autoTranslate: "boolean"

  ```




  ## 注意


  你可以利用资源包中的参数，让回复更具动态性。以下示例展示了如何为酒店房间添加动态定价。机器人会从资源包中提取文本进行回复，该文本会根据自定义组件中服务调用的结果动态调整价格。


  资源包的键和值：


  - 键：`Pricing`

  - 值：`Currently the price for this hotel is {0} per night.`


  oBOTML 代码：


  ```

  component: "System.Output"

  properties:

  text: ${rb(pricing, ''${pricingService.value}'')}"

  transitions:

  return: "done"

  ```


  ### 从用户话语中确定语言


  在上一节中，你学习了如何在对话中使用用户配置文件中的语言，并将所有内容在该语言与目标语言之间进行翻译。还有另一种选择，即使用翻译服务来确定用户的语言。为了实现这一点，我们需要使用
  `System.DetectLanguage`。该组件利用翻译服务检测用户语言，并自动设置一个名为 `profile.languageTag` 的变量，其值为区域设置字符串。


  ## 注意


  `profile.languageTag` 的优先级高于 `profile.locale` 变量。


  ```

  metadata:

  platformVersion: "1.0"

  main: true

  name: FindTripWithTranslations

  context:

  variables:

  iResult: "nlpresult"

  rb: "resourcebundle"

  autoTranslate: "boolean"

  states:

  enableAutoTranslation:

  component: "System.SetVariable"

  properties:

  variable: "autoTranslate"

  value: false

  transitions:

  next: " detectLanguage"

  detectLanguage:

  component: "System.DetectLanguage"

  properties:

  source:

  transitions:

  next: "intent"

  intent:

  component: "System.Intent"

  properties:

  variable: "iResult"

  transitions:

  actions:

  SelectTrip: "askAge"

  CancelTrip: "cancelTrip"

  unresolvedIntent: "unresolved"

  ```


  如果你输入的数字助理支持的任何语言的话语，它都会解析意图，并用相同的语言回复用户。如图 7-7 所示，数字助理识别出用户的话语是英语，于是用英语回复用户。接着，用户的话语变成了荷兰语，数字助理清晰地理解后，切换到新语言并用荷兰语回复。


  ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig7_HTML.jpg](img/479330_1_En_7_Fig7_HTML.jpg)


  图 7-7：数字助理用用户的语言回复


  始终存在一种可能性，即你的数字助理不支持用户的语言。


  ## 注意


  限制在于翻译服务所支持的语言范围。良好的设计实践是，机器人设计者只支持那些对其业务有意义且团队内部具备语言能力的语言。


  有几种方式可以向用户传达这一信息。一种非常友好且用户友好的方式是，用用户自己的语言告知他们其语言不受支持。此消息可以附带一份支持的语言列表。用户可以选择其中一种支持的语言，然后你可以将所选语言存储在
  `profile.languageTag` 中。


  为了实现这一点，需要在流程中的 `detectLanguage` 状态和 `intent` 状态之间添加一段额外的逻辑。


  下一个代码示例展示了如何实现此功能：


  ```

  detectLanguage:

  component: "System.DetectLanguage"

  properties:

  source:

  transitions:

  next: "checkUserDetectedLanguage"

  checkUserDetectedLanguage:

  component: "System.Switch"

  properties:

  source: "${[''nl'',''fr'',''en'']?seq_contains(profile.languageTag)?string(''yes'',''no'')}"

  values:

  - "yes"

  - "no"

  transitions:

  actions:

  yes: "Intent"

  no: "selectLanguageFromList"

  NONE: "selectLanguageFromList"

  selectLanguageFromList:

  component: "System.CommonResponse"

  properties:

  processUserMessage: true

  keepTurn: false

  translate: true

  metadata:

  responseItems:

  - type: "text"

  text: "${rb.globalLanguagePrompt}"

  actions:

  - label: "${rb.globalLanguageEnglish}"

  type: "postback"

  payload:

  variables:

  profile.languageTag: "en"

  - label: "${rb.globalLanguageDutch}"

  type: "postback"

  payload:

  variables:

  profile.languageTag: "nl"

  - label: "${rb.globalLanguageFrench}"

  type: "postback"

  payload:

  variables:

  profile.languageTag: "fr"

  transitions:

  next: "Intent"

  ```


  有了这个设置，每当 Travvy 不支持用户的语言时，它就会用该语言回复用户，告知 Travvy 仅支持英语、法语、荷兰语和西班牙语。图 7-8 展示了在意大利语环境下的效果。


  ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig8_HTML.jpg](img/479330_1_En_7_Fig8_HTML.jpg)


  图 7-8：用用户自己的语言回复用户


  ## 注意


  虽然你可以使用语言检测功能，但必须意识到这会对性能产生影响。开启语言检测后，对于每一次用户话语，翻译服务都会被调用来检测语言，从而增加了对话中对外部服务的调用次数。


  ### 使用用户配置文件中的语言


  如上一节所述，使用翻译服务进行语言检测可能会对性能产生轻微的负面影响。另一种方法是通过省略语言检测来消除这种影响。这种方法使用用户配置文件中的语言。因此，不再由翻译服务自动设置
  `profile.languageTag`，而是像以下代码示例那样显式设置它：


  ```

  metadata:

  platformVersion: "1.0"

  main: true

  name: FindTripWithTranslations

  context:

  variables:

  iResult: "nlpresult"

  rb: "resourcebundle"

  autoTranslate: "boolean"

  states:

  enableAutoTranslation:

  component: "System.SetVariable"

  properties:

  variable: "autoTranslate"

  value: false

  transitions:

  next: "setBrowserBasedProfileLanguage"

  #Set profile.languageTag based on user''s browser language

  setBrowserBasedProfileLanguage:

  component: "System.SetVariable"

  properties:

  variable: "profile.languageTag"

  value: "${profile.locale}"

  transitions:

  next: "Intent"

  ```


  为了实现这一点，你需要获取用户的区域设置。一种方法是读取 `profile.locale` 变量，该变量由消息客户端设置。


  另一种方法是在消息客户端上显式设置它。以下代码示例展示了如何在从网页调用数字助理时，使用 Oracle 数字助理 JavaScript SDK（参见第 6 章）通过
  JavaScript 实现这一点：


  ```

  Bots.updateUser(

  {

  "properties": {

  "userLocale": userLocale}

  }

  );

  ```


  ## 总结


  世界上有许多种语言。为了让数字助理取得成功，它们应该能够使用除英语以外的其他语言。幸运的是，Oracle 数字助理可以实现多语言支持这一需求。在本章中，你学习了如何基于翻译服务和资源包来实现这一点。翻译服务并不能
  100% 保证覆盖所有用例，也无法涵盖所有话语。你需要通过提供让用户选择或确认其偏好语言的功能，来帮助用户和翻译服务。



  '
- "# 8. 使用 Webview 组件\n\n聊天机器人是一种以对话方式检索信息并提供给最终用户的方法。最终用户向机器人输入查询，机器人则回复相应的答案。聊天机器人在当今世界如此流行的核心原因之一是，它们能够以极少的用户输入，以更快的速度提供响应。\n\
  \n随着聊天机器人的日益普及，各类组织不仅使用聊天机器人来提供其产品/服务信息，还将其用于关键业务流程，例如下单、预订、提供反馈等。通常，聊天机器人中的此类流程需要最终用户提供多项信息才能完成特定交易或任务。从最终用户的角度来看，这种与机器人进行的长链交互可能会变得有些乏味。因此，用户可能更愿意选择其他途径来满足其需求，例如致电客服或返回组织的网站。\n\
  \nOracle 意识到了这一点，并为数字助手提出了 Webview 组件的概念。使用 Webview 组件，参数可以从技能传递到 Web 表单，也可以从 Web\
  \ 表单传回技能。在本章中，您将熟悉 Webview 组件及其用途。\n\n## 什么是 Webview 组件？\n\n尽管聊天机器人是为信息收集和共享的对话方式而设计的，但这并非总是理想之选。处理此类情况的另一种方法可以是向最终用户提供一个\
  \ Web 表单，让他们一次性填写以完成特定任务。您可以设计机器人流程，使其仅在需要结构化数据输入的场景下向最终用户提供此类表单，例如，在下单时提供包含必要地址字段的\
  \ Web 表单，或提供包含完成假期预订所必需字段的表单，或提供包含开设银行账户所需必填信息的表单等。\n\n顾名思义，`System.Webview` 组件允许您将网页集成到数字助手中，以便从最终用户那里收集结构化数据。尽管\
  \ Webview 组件与数字助手集成，但它们会在单独的浏览器标签页/窗口中打开（对于基于 Web 的聊天客户端），或者在移动设备上于聊天客户端之外的 Webview\
  \ 中打开。因此，您能够在网页中利用各种功能，如表单视图、选择选项、日期选择器、自定义样式等。但这还不是全部。除了这些功能之外，您还可以轻松地在网页上添加各种输入验证，例如必填字段、电子邮件格式、日期范围等。此验证逻辑保留在网页上，您无需将其添加到数字助手中。\n\
  \n您已经知道，在 Oracle 数字助手的上下文中，组件大致分为两类：内置组件和自定义组件。Webview 组件（`System.Webview`）属于内置组件类别，这意味着它们由\
  \ Oracle 直接提供。\n\n在对话流程中使用 Webview 组件，您可以将最终用户引导至一个 Web 应用程序，他们可以在其中提供必要的输入以完成交易。由于\
  \ Webview 组件由 Oracle 直接提供，您只需在“流程”![../images/479330_1_En_8_Chapter/479330_1_En_8_Figa_HTML.jpg](img/479330_1_En_8_Figa_HTML.jpg)\
  \ 屏幕上点击 ![../images/479330_1_En_8_Chapter/479330_1_En_8_Figb_HTML.jpg](img/479330_1_En_8_Figb_HTML.jpg)\
  \ 按钮，然后从**用户界面**组件中选择它，即可轻松将其添加到您的流程中。\n\n请参考图 8-1。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig1_HTML.jpg](img/479330_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n\nWebview 组件\n\n在我们进一步讨论 Webview 组件之前，先来看看它的优缺点。\n\n**优点：**\n\n*   使用 Web\
  \ 应用程序收集用户信息，而非进行冗长的机器人对话。\n*   Web 应用程序的屏幕尺寸不受聊天客户端窗口限制。\n*   Web 应用程序可以按需自定义皮肤。\n\
  *   也可以使用预先构建的 Web 应用程序（网页应可通过 GET 请求访问）。\n*   利用各种浏览器功能，例如上传和下载。\n*   用户输入的数据保持安全，因为它不会出现在聊天会话中。\n\
  \n**缺点：**\n\n*   由于 Webview 在单独的浏览器窗口中打开应用程序，该应用程序看起来与聊天机器人不集成。因此，如果在启动应用程序前未在聊天中适当预先告知用户，用户可能会感到困惑。\n\
  \n## Webview 组件架构\n\n要实现 Webview 组件，您可以遵循两种不同的方法：\n\n*   在 Oracle 数字助手内部托管的 Webview\
  \ 应用程序\n*   在外部（Oracle 数字助手之外）托管的 Webview 应用程序\n\n与自定义组件类似，Oracle 数字助手提供了一个内置容器来托管单页\
  \ Web 应用程序。如果您希望在此内置容器中本地部署 Web 应用程序，那么 Webview 应用程序将托管在技能内部。如果您希望使用现有的 Web 应用程序，或将新创建的\
  \ Web 应用程序部署在数字助手之外的远程环境中，那么这将是一个外部托管的 Webview 应用程序。在这两种情况下，应用程序都会在单独的浏览器标签页中启动（对于基于\
  \ Web 的聊天客户端），或者在移动设备上于 Webview 中启动。让我们深入了解这两种方法。\n\n### 在数字助手内部托管的 Webview 应用程序\n\
  \n在您的 Oracle 数字助手中本地部署的应用程序应为单页应用程序（SPA）。如果您不熟悉，SPA 渲染单个页面，并且应用程序只有一个入口点，但页面内容可以在运行时动态更改/更新。您可以使用任何\
  \ JavaScript 框架为 `System.Webview` 组件开发此类应用程序，例如 React、Oracle Jet、Oracle VBCS 等。然后，您将应用程序打包成\
  \ TAR 归档文件（扩展名为 `.tgz`），并将其部署到本地容器中以创建 Webview 服务。\n\n## 注意\n\n您的 SPA 的入口点必须是一个\
  \ `index.html` 文件，放置在应用程序的根级别，因此也是您的部署归档文件的根级别。\n\n当您在对话流程中使用 `System.Webview` 组件时，它会：\n\
  \n1.  调用您 SPA 的 `index.html` 并在新的浏览器标签页中启动应用程序。\n2.  `System.Webview` 组件随后将输入参数从您的对话流程传递到您的\
  \ SPA，并附带一个回调 URL。该回调 URL 由 `System.Webview` 组件生成并作为 `window.webViewParameters`\
  \ 参数附加到 Webview 请求中。\n3.  您的 SPA 在处理完成后向回调 URL 发起 POST 请求。可以从应用程序中的 `webview.onDone`\
  \ 参数访问回调 URL。如果您需要将任何数据从应用程序传回技能中的 Webview 组件，则该数据作为 **JSON 对象**传递，该对象存储在从 `System.Webview`\
  \ 变量属性引用的对话流程变量中。您可以在对话流程中轻松访问此数据，如 `${variable_name.value.Param}`。\n\n此流程的图示可在图\
  \ 8-2 中找到。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig2_HTML.jpg](img/479330_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\nWeb 应用程序的本地部署\n\n上述流程将在本章后面的“在数字助手内部托管的 Webview 应用程序”一节中详细说明。\n\n\n\n\
  ## 注意\n\n如果您希望使用 Oracle VBCS 创建 SPA，它将存在一些限制。由于 VBCS 的后端负责业务对象、对业务对象的 REST 调用以及业务对象的用户访问（使用\
  \ Oracle Identity Cloud Service，IDCS），这些功能在您导出应用程序时将不可用。如果您希望使用 Oracle VBCS 来构建\
  \ SPA，则必须在外部部署应用并显式处理这些功能。\n\n### 外部托管的 Webview 应用程序\n\n如果您已有想要用作 Webview 的现有应用程序，则需要采用此方法。当您的应用程序有安全要求或需要使用服务器端基础设施等情况时，这属于典型场景。与本地部署的应用程序不同，您的外部应用程序可能是也可能不是\
  \ SPA。唯一的要求是，您希望使用的应用程序应能通过来自技能的 GET 请求进行访问。在外部托管 Web 应用程序的情况下，您需要使用一个中介服务，该服务将负责为技能组合应用程序调用\
  \ URL。然后，技能使用 GET 方法调用 Web 应用程序。您可以根据需求，将中介服务和 Web 应用程序托管在同一服务器或不同服务器上。\n\n流程如下所述：\n\
  \n1.  技能中的 `System.Webview` 组件向中介服务发送一个 POST 请求，请求中包含输入参数和有效载荷中的回调 URL。\n2.  中介服务向技能返回一个\
  \ JSON 对象，该对象仅包含一个属性 `webview.url`，其中包含 Web 应用程序 URL 以及指向技能的回调 URL。如果需要向 Web 应用程序传递任何参数，这些参数将附加到\
  \ `webview.url` 属性中。技能中的 `System.Webview` 组件随后使用此属性向 Web 应用程序发起所有后续的 GET 请求。\n3.\
  \  技能发送一个 GET 请求以启动应用程序。\n4.  Web 应用程序处理该请求，并向回调 URL 发起一个 POST 调用，指示应用程序已完成处理。同样，如果您需要从\
  \ Web 应用程序向技能中的 Webview 组件传回任何数据，则该数据将作为 JSON 对象传递，并存储在从 `System.Webview` 变量属性引用的对话流变量中。然后，您可以在对话流中通过\
  \ `${variable_name.value.param_name}` 访问此数据。\n\n图 8-3 展示了上述流程的图示，其中中介服务和 Web 应用程序托管在同一\
  \ Web 服务器上。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig3_HTML.jpg](img/479330_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3：外部托管的 Web 应用程序\n\n图 8-4 展示了中介服务和 Web 应用程序位于不同服务器时的流程。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig4_HTML.jpg](img/479330_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4：服务与应用程序位于不同服务器的外部托管 Web 应用程序\n\n## 前提条件\n\n现在您已经熟悉了实现 Webview 组件的两种方法，让我们来看看这两种方法的具体实现。在这两种情况下，我们都将使用\
  \ Oracle JET 作为 JavaScript 框架来构建我们的 Web 应用程序。如前所述，您并非必须使用 Oracle JET，也可以使用您偏好的任何其他框架。在接下来的章节中，我们不会解释如何使用\
  \ Oracle JET 设计应用程序，而是主要关注实现部分。如果您想了解更多关于 Oracle JET 的信息，我们建议您访问官方网站：[`www.oracle.com/webfolder/technetwork/jet/index.html`](http://www.oracle.com/webfolder/technetwork/jet/index.html)。\n\
  \n以下是您需要拥有/安装的前提条件列表，以便遵循实现步骤：\n\n1.  访问 Digital Assistant 环境（19.1.5 或更高版本）的权限。\n\
  2.  下载并安装 Node.js ([`https://nodejs.org/en/download/`](https://nodejs.org/en/download/))。\n\
  3.  Microsoft Visual Studio Code IDE ([`https://code.visualstudio.com/download`](https://code.visualstudio.com/download))。\n\
  4.  安装 Oracle JET 命令行界面（在 Node.js 安装之后）。\n\n    Windows\n\n    ```\n    npm install\
  \ -g @oracle/ojet-cli\n    ```\n\n    MAC\n\n    ```\n    sudo npm install -g @oracle/ojet-cli\n\
  \    ```\n\n5.  用于将您的系统暴露在互联网上的隧道软件。在我们的案例中，我们将使用 ngrok ([`https://ngrok.com/download`](https://ngrok.com/download))。这对于外部托管的\
  \ Web 应用程序是必需的。\n\n## 用例\n\n在接下来的章节中，您将为 Travvy 实现 Webview 组件。您将创建一个 Web 应用程序来检索预订\
  \ Extreme Hiking Holidays 套餐的旅行者信息。图 8-5 展示了该 Web 应用程序的模型图。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig5_HTML.jpg](img/479330_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5：Travvy Web 应用程序\n\n点击“提交”按钮后，用户档案信息将被处理，句柄将传回给技能，并相应通知用户。如果用户点击“取消”按钮，我们也会将句柄传递给技能，但会告知技能用户点击了“取消”按钮。相应地，会向用户显示一条消息。我们将在此演示中使用\
  \ Skill Tester，但您也可以按照第 6 章所述，通过渠道公开技能。让我们看一下图 8-6 中显示的流程。\n\n1.  用户向技能打招呼说“你好”。\n\
  2.  技能回复，要求用户输入其名字。\n3.  用户输入其名字。\n4.  技能随后提示用户输入旅行者信息以完成预订。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig6_HTML.jpg](img/479330_1_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6：Webview 组件的执行\n\n5.  当用户点击“输入旅行者信息”时，Web 应用程序会在一个单独的窗口中启动，如图 8-7 所示。\n6.\
  \  应用程序启动时，会预填在技能中提供的名字。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig7_HTML.jpg](img/479330_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7：从技能调用的 Web 应用程序，名字已预填\n\n7.  如果用户未填写必填字段就点击“提交”按钮，则会触发验证消息，如图 8-8 所示。\n\n\
  ![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig8_HTML.jpg](img/479330_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8：Web 应用程序验证消息\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig9_HTML.jpg](img/479330_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9：包含全名的确认消息\n\n8.  一旦用户输入必填详细信息并提交表单，将向用户显示一条确认消息。在此案例中，根据 Web 应用程序的响应显示用户的全名（见图\
  \ 8-9）。\n\n## 在 Digital Assistant 内部托管的 Webview 应用程序\n\n在本节中，我们将向您解释如何实现一个 Webview\
  \ 组件，其中 Web 应用程序部署在 Digital Assistant 内部。在以下小节中，您将找到技能实现和 Web 应用程序实现。我们将分享源代码并沿途进行解释。\n\
  \n\n\n### 技能实施\n\n在您的数字助手环境中创建一个名为 `TravvyWebview` 的新技能。导航至“流程”并替换为以下内容：\n\n1. \
  \ 在“上下文”级别，您定义了两个“变量”：\n    -   `travellerFirstName`：用于存储用户名字的变量，并将其传递给 Web 应用程序进行预订。\n\
  \    -   `appResponse`：用于存储来自 Web 应用程序响应的变量。\n\n2.  在 `askTravelerInfo` 状态中，您要求用户提供名字。请注意，您将用户的响应存储在\
  \ `travellerFirstName` 变量中。\n\n3.  在下一个状态 `webview` 中，您通过点击添加了 `System.Webview`\
  \ 组件，然后从用户界面组件类别中选择了 Webview。请查看为该组件定义的各种属性：\n    -   `service`：Webview 服务的名称。您将在后续部分创建此服务。\n\
  \    -   `sourceVariableList`：源变量列表，这些变量将被传递给 Web 应用程序。\n    -   `variable`：用于存储\
  \ Web 应用程序响应的变量。\n    -   `prompt`：向用户显示的消息提示，要求他们在 Web 应用程序中提供额外信息。\n    -   `linkLabel`：按钮的标签，点击该按钮将启动\
  \ Web 应用程序。\n    -   `cancelLabel`：取消按钮的标签，用于用户不希望提供个人信息进行预订的情况。\n    -   `transitions`：在此处，您定义了下一个状态的转换流程，用于评估应用程序响应以及取消操作。\n\
  \n4.  对话流程中的下一个状态是 `evaluateWebviewResponse`。在此状态中，您正在评估 Web 应用程序的响应 `${appResponse.value.status}`。在\
  \ Web 应用程序中，您将定义两个状态：“success”和“cancel”。在此状态中，您检查来自 Web 应用程序的状态是成功还是取消。根据状态，您随后调用相应的状态。\n\
  \n5.  如果来自 Web 应用程序的状态为“success”，您将调用 `confirmBooking` 状态。在此状态中，您根据在 Web 应用程序中输入的值向用户显示确认消息。请检查您为此使用的表达式\
  \ `${appResponse.value.firstName} ${appResponse.value.lastName}`。\n\n6.  如果来自 Web\
  \ 应用程序的状态为“cancel”或来自 `System.Webview` 组件的取消操作，您将调用 `onCancel` 状态。在此状态中，您优雅地处理了用户的取消响应并显示了适当的消息。\n\
  \n```\n#metadata: information about the flow\n### platformVersion: the version of\
  \ the bots platform that this flow was written to work with\nmetadata:\nplatformVersion:\
  \ \"1.0\"\nmain: true\nname: TravvyWebview\n#context: Define the variables which\
  \ will used throughout the dialog flow here.\ncontext:\nvariables:\ntravellerFirstName:\
  \ \"string\"\nappResponse: \"string\"\n#states is where you can define the various\
  \ states within your flow.\nstates:\naskTravelerInfo:\ncomponent: \"System.Text\"\
  \nproperties:\nprompt: \"To proceed with booking, please provide your first name.\"\
  \nvariable: \"travellerFirstName\"\ntransitions:\nnext: \"webview\"\nwebview:\n\
  component: \"System.Webview\"\nproperties:\nservice: \"travvyWebview\"\nsourceVariableList:\
  \ \"travellerFirstName\"\nvariable: \"appResponse\"\nprompt: \"Press 'Enter Traveler\
  \ Information' to complete your booking\"\nlinkLabel: \"Enter Traveler Information\"\
  \ncancelLabel: \"Cancel\"\ntransitions:\nnext: \"evaluateWebviewResponse\"\nactions:\n\
  cancel: \"onCancel\"\nevaluateWebviewResponse:\ncomponent: \"System.Switch\"\nproperties:\n\
  source: \"${appResponse.value.status}\"\nvalues:\n- \"success\"\n- \"cancel\"\n\
  transitions:\nactions:\nsuccess: \"confirmBooking\"\ncancel: \"onCancel\"\nNONE:\
  \ \"onCancel\"\nconfirmBooking:\ncomponent: \"System.Output\"\nproperties:\ntext:\
  \ \"Booking has been confirmed for ${appResponse.value.firstName} ${appResponse.value.lastName}.\
  \ Thanks for choosing Travvy!\"\nkeepTurn: false\ntransitions:\nreturn: \"done\"\
  \nonCancel:\ncomponent: \"System.Output\"\nproperties:\ntext: \"Sorry that you canceled\
  \ your booking. Hope to see you back soon!\"\ntransitions:\nreturn: \"done\"\n```\n\
  \n### Web 应用程序实施\n\n在您的系统上安装 Oracle JET CLI 后，您可以通过在命令提示符或终端中，从您希望创建应用程序的位置发出以下命令，轻松创建一个示例应用程序：\n\
  \n```\nojet create  --template=navdrawer|navbar|basic|blank\n```\n\n对于此演示，您只需调用以下命令：\n\
  \n1.  完成后，打开您的 `appController.js`（`\\travvyWebviewApp\\src\\js\\appController.js`）并将应用程序名称更新为“Travvy\
  \ Web App”，如下所示：\n\n```\n    self.appName = ko.observable(\"Travvy Webview App\"\
  );\n```\n\n2.  打开 `index.html` 文件（`\\travvyWebviewApp\\src\\index.html`）并将 **head**\
  \ 部分下的 **title** 更新如下：\n\n```\n    Travvy Webview App\n```\n\n3.  将同一 `index.html`\
  \ 文件（`\\travvyWebviewApp\\src\\index.html`）的 body 部分替换为以下代码：\n\n```\nTraveler Information\n\
  \nYes\n    No\n\nSubmit\n    Cancel\n```\n\n在此 body 部分中，您定义了如图 8-5 之前显示的各种屏幕元素，并添加了屏幕上的验证。\n\
  \n4.  最后，打开您应用程序的 `main.js` 文件（`\\travvyWebviewApp\\src\\js\\main.js`），并将文件的全部内容替换为以下代码。\n\
  \n\n\n```javascript\n/**\n * @license\n * Copyright (c) 2014, 2019, Oracle and/or\
  \ its affiliates.\n * The Universal Permissive License (UPL), Version 1.0\n */\n\
  'use strict';\n/**\n * Example of Require.js boostrap javascript\n */\nrequirejs.config(\n\
  {\n  baseUrl: 'js',\n  // Path mappings for the logical module names\n  // Update\
  \ the main-release-paths.json for release mode when updating the mappings\n  paths:\n\
  \  //injector:mainReleasePaths\n  {\n    'knockout': 'libs/knockout/knockout-3.5.0.debug',\n\
  \    'jquery': 'libs/jquery/jquery-3.4.1',\n    'jqueryui-amd': 'libs/jquery/jqueryui-amd-1.12.1',\n\
  \    'promise': 'libs/es6-promise/es6-promise',\n    'hammerjs': 'libs/hammer/hammer-2.0.8',\n\
  \    'ojdnd': 'libs/dnd-polyfill/dnd-polyfill-1.0.0',\n    'ojs': 'libs/oj/v7.0.1/debug',\n\
  \    'ojL10n': 'libs/oj/v7.0.1/ojL10n',\n    'ojtranslations': 'libs/oj/v7.0.1/resources',\n\
  \    'text': 'libs/require/text',\n    'signals': 'libs/js-signals/signals',\n \
  \   'customElements': 'libs/webcomponents/custom-elements.min',\n    'proj4': 'libs/proj4js/dist/proj4-src',\n\
  \    'css': 'libs/require-css/css',\n    'touchr': 'libs/touchr/touchr'\n  }\n \
  \ //endinjector\n}\n);\n/**\n * A top-level require call executed by the Application.\n\
  \ * Although 'ojcore' and 'knockout' would be loaded in any case (they are specified\
  \ as dependencies\n * by the modules themselves), we are listing them explicitly\
  \ to get the references to the 'oj' and 'ko'\n * objects in the callback\n */\n\
  require(['ojs/ojcore', 'knockout', 'appController', 'jquery', 'ojs/ojknockout',\
  \ 'ojs/ojformlayout', 'ojs/ojinputtext', 'ojs/ojlabel', 'ojs/ojbutton', 'ojs/ojradioset',\
  \ 'ojs/ojvalidationgroup'],\n  function (oj, ko, app, $) { // 当所有必需的模块加载完成后，此回调函数将被执行\n\
  \    $(function () {\n      /*\n      从 WebView 发送的参数保存在名为 \"webviewParameters\"\
  \ 的 window 对象中。在此示例中，\n      这些参数包含用户在机器人对话中提供的信息。\n      */\n      let webviewParameters\
  \ = window.webviewParameters != null ? window.webviewParameters['parameters'] :\
  \ null;\n      /*\n      用于读取命名 WebView 参数的辅助函数\n      */\n      let getWebviewParam\
  \ = (arrParams, key, defaultValue) => {\n        if (arrParams) {\n          let\
  \ param = arrParams.find(e => {\n            return e.key === key;\n          });\n\
  \          return param ? param.value : defaultValue;\n        }\n        return\
  \ defaultValue;\n      };\n      /*\n      如果未提供值，则为 travellerFirstName 设置默认值\n\
  \      */\n      self.firstName = ko.observable(getWebviewParam(webviewParameters,\
  \ 'travellerFirstName', \"));\n      self.lastName = ko.observable();\n      self.address\
  \ = ko.observable();\n      self.zipCode = ko.observable();\n      self.validId\
  \ = ko.observable();\n      self.idNumber = ko.observable();\n      self.country\
  \ = ko.observable();\n      /*\n      当用户提交或取消 Web 表单时，需要将控制权交回给机器人。\n      为此，WebView\
  \ 会将一个回调 URL 传递给 Web 应用程序。\n      保存此信息的参数是 \"webview.onDone\"\n      */\n     \
  \ var webViewCallback = getWebviewParam(webviewParameters, 'webview.onDone', null);\n\
  \      this.tracker = ko.observable();\n      self.buttonClick = function (event)\
  \ {\n        let userProfile = {};\n        userProfile.firstName = self.firstName();\n\
  \        userProfile.lastName = self.lastName();\n        userProfile.address =\
  \ self.address();\n        userProfile.zipCode = self.zipCode();\n        userProfile.validId\
  \ = self.validId();\n        userProfile.idNumber = self.idNumber();\n        userProfile.country\
  \ = self.country();\n        var tracker = document.getElementById(\"tracker\");\n\
  \        if (tracker.valid === \"valid\") {\n          // 提交表单\n          if (event.currentTarget.id\
  \ === 'Submit') {\n            userProfile.status = \"success\"\n            //JQuery\
