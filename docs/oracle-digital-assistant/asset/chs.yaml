- "# 2. 设计对话式用户体验\n\n在没有商业案例的情况下构建数字助理是注定失败的。在开始之前，您应该始终尝试回答关键问题，例如：\n\n-   我们试图解决的业务痛点是什么？\n\
  -   用户现有的使用流程是怎样的，如何改进？\n-   接触用户的合适渠道是什么，以及如何最好地利用它？\n-   机器人与用户之间的对话以及对话选项是什么？如何增强对话以利用渠道的属性、媒体和功能来改善用户交互？\n\
  -   关键词汇是什么？对话中交换的实体有哪些？\n\n回答这些关键问题正是设计阶段的价值所在。\n\n## 为什么需要对话式用户体验？\n\n简单来说，人与人之间的交谈比使用技术要自然得多。这是因为对话是天生的本能。与朋友或陌生人交谈时，如果我们说了令人困惑或说错的话，我们可以轻松地纠正自己。因此，自人类开始交易以来，人们就一直利用对话来推动销售和让客户满意。\n\
  \n对话式用户体验（UX）转向了一种人类沟通的形式，就像一个人在与另一个人进行正常对话一样。参与对话式用户体验的两种流行方式是通过语音说话和通过向聊天机器人输入文本。千禧一代似乎更喜欢打字而不是打电话。而我们其他人也正在逐渐适应这种方式。\n\
  \n对话式用户体验帮助企业更有效地销售其产品/服务或帮助客户。这也是通过消息和聊天应用（如 Facebook Messenger、WhatsApp、Talk 和微信）或通过语音技术（如亚马逊的\
  \ Echo 产品，它通过语音命令与公司交互）与企业进行交互这一趋势的原因。通过对话式商务，客户可以在消息应用内与公司代表聊天、提问、获得客户支持、获得个性化推荐、阅读评论并一键购买。随着越来越多的人成为重度移动用户，提供更无缝的移动在线购物体验是一个很好的商业理念。通过对话式商务，消费者可以与人类代表、聊天机器人或两者结合进行互动。\n\
  \n对话式商务之所以强大，是因为它：\n\n-   使品牌与消费者之间的自动化交互感觉更加人性化。作为界面的对话仍然是人类与技术交互最自然的方式。\n-   减少了完成一个操作所需的步骤以及消费者需要求助的信息源数量。\n\
  -   实现了与客户的双向沟通。它不仅告诉客户信息，还从客户那里学习，倾听他们的问题，并建立关系。提供迎合用户主动意图的个性化体验，对于满足（和取悦）用户，并最终赢得他们的信任和忠诚度至关重要。\n\
  -   是一种极其有效的方法，用于吸引用户/客户，根据他们的需求收集信息，理解他们的主动意图和目标，然后提供最有可能满足这些需求的体验。\n-   创造了一种比电子邮件等更具人情味和意义的互动。不仅语言听起来很自然，就像朋友或家人与用户交谈一样，而且它还能让用户一次性继续对话，从而立即加强关系，如图\
  \ 2-1 所示的示例。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig1_HTML.jpg](img/479330_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1\n\n用户只需点击一下即可继续对话\n\n-   对话式商务缩短了潜在客户与购买之间的距离。它为客户提供了在商店里可能从销售助理那里得到的关注。当从网站订购时，他们可以阅读评论以了解产品是否适合自己，但使用聊天功能，他们可以请求帮助比较选项——更像是在店内获得的建议。\n\
  \n请注意，并非所有内容都适合对话。您不希望聊天机器人列出完整的产品目录或用户手册。对话界面是一种补充界面。\n\n例如，当用户需要详细的说明或教程时，视频比文本效果更好。这保证了可用且固定的信息流，这是使用聊天时无法保证的。在这种情况下，固定的信息流效果更好，不会用大段文字填满聊天对话框。\n\
  \n本质上，对话式用户体验是关于让技术的行为和交互方式更像我们彼此之间的互动。\n\n\n\n## 设计对话式用户体验\n\n为了设计出独特的对话式用户体验，本章将揭示一种方法，通过八个步骤引导你获得令所有利益相关者满意的结果——这些利益相关者包括营销经理、开发团队，以及同样重要的最终用户/客户，他们对于最终以聊天机器人形式呈现的体验，各自有着特定的要求、期望和需求。图\
  \ 2-2 展示了所有利益相关者之间的关系。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig2_HTML.jpg](img/479330_1_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2\n\n挑战在于找到良好的平衡\n\n我们将流程分为八个步骤。图 2-3 展示了这些步骤。随后各节将依次描述每个步骤。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig3_HTML.jpg](img/479330_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3\n\n八个设计步骤\n\n## 目标\n\n设计出色聊天机器人的第一步是问自己：“我们真的需要聊天机器人吗？”\n\n> *设计的“为什么”应始终先于“怎么做”。*——威尔·范吉，《内部设计》\n\
  \n至关重要的是，对话式用户体验，以及最终的聊天机器人，必须有其存在的目的。这是所有工作的基础。这应该是在你开始考虑设计对话式用户体验之前很久就要做的事情。\n\
  \n当你明确了聊天机器人的目的时，你就已经回答了那些需要解答的基本问题，从而可以进入设计流程。\n\n为了了解客户对你的对话式体验有何目标，你可以采访不同的利益相关者，他们了解当前的业务目标并对未来有愿景。不同的利益相关者可能有不同的目标。\n\
  \n例如，CEO 可能希望利用聊天机器人来：\n\n* 击败竞争对手\n* 扩大客户覆盖范围和客户认知度\n* 减少服务台员工数量，从而使公司更具成本效益\n\n\
  另一方面，营销经理希望聊天机器人能够：\n\n* 在 Facebook Messenger 上与客户无缝连接\n* 直接从在线商店与客户聊天\n* 根据购买历史和通过对话收集的客户数据推荐产品\n\
  * 在客户离开商店后与他们保持联系\n* 询问客户是否准备再次订购附加产品\n\n最后，服务台经理可能希望：\n\n* 让客户知道他们的订单已收到或已发货\n\
  * 在客户首次购买后表示感谢\n* 向客户确认包裹已送达并征求他们的意见\n* 进行故障排除\n* 回答问题\n\n设计的主要目标是保持目标简单，因此不要陷入所有约束和需求中。要包含足够的信息，让所有利益相关者了解该项目相对于他们自身同时试图完成的其他任务，究竟要达成什么目标。\n\
  \n对目标进行优先级排序，并在设计对话式体验时牢记这些目标。\n\n每做一个设计决策时，都要问自己：“这个设计能让我们朝着目标前进吗？”\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig4_HTML.png](img/479330_1_En_2_Fig4_HTML.png)\n\
  \n图 2-4\n\n### 用户\n\n正如你在图 2-2 的维恩图中看到的，用户的需求和期望在设计对话式体验时扮演着重要角色。这就是为什么你应该充分了解你希望聊天机器人与之沟通的用户。\n\
  \n以用户为中心的设计流程的第一步是进行用户研究。通过这种方式，例如观察和访谈潜在用户，你可以了解：\n\n* 他们的目标和优先事项\n* 他们的行为\n* 日常习惯\n\
  * 他们的教育背景和技能\n* 他们对企业所在领域的知识\n* 他们对电脑、智能手机、互联网、社交媒体和其他渠道等工具的使用情况\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig5_HTML.jpg](img/479330_1_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5\n\n通过访谈和观察目标群体进行用户研究\n\n一旦你获得了所有这些有趣且有用的丰富数据，挑战就在于如何将其传达给设计/开发团队的其他成员。我们一直使用的一个有效方法是创建一个或多个人物角色。\n\
  \n#### 创建人物角色\n\n> *人物角色是一个现实的角色素描，代表目标群体的某个特定细分。*——史蒂夫·穆尔德/齐夫·亚尔，《用户永远是对的》\n\n\
  人物角色实际上是虚构的人物。人物角色的目的是传达我们对用户的所有了解，并确保在整个项目生命周期中被记住和使用。为此，人物角色必须被设计/开发团队所采纳。\n\n\
  一个人物角色有一个名字，并由一张图片和一些相关特征的摘要来代表。一句引语，将他们的需求、情感、动机和目标浓缩成一句话，具有赋予人物角色更多个性的额外优势。图 2-6\
  \ 展示了一个如何描述和说明人物角色的示例。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig6_HTML.jpg](img/479330_1_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6\n\n代表呼叫中心员工的人物角色示例\n\n每个主要用户群体至少应有一个对应的人物角色。之所以使用“主要”这个词，是因为理想情况下你应该使用三到五个人物角色。每个人物角色都应有自己的个性，并且令人难忘。如果你有超过五个人物角色，人们往往会感到不知所措。而且似乎：\n\
  \n> *当你为你的主要人物角色设计时，你最终会让主要人物角色感到愉悦，并满足次要人物角色。如果你为所有人设计，你无法取悦任何人。这就是平庸产品的配方。*——艾伦·库珀\n\
  \n\n\n### 用户画像的益处\n\n用户画像之所以有益，是因为它们有助于聚焦和定位你的思考。用户画像能帮助你以更具体的方式思考受众及其需求。精心记录用户画像的益处包括：\n\
  \n-   将焦点放在“真实用户的需求……”上。\n-   帮助设计师/开发者更容易地与用户产生共鸣。\n-   对许多不同的利益相关者都有用：\n    -\
  \   业务开发（战略制定）\n    -   营销团队（吸引用户）\n    -   设计团队（为用户设计）\n-   用户画像能促进团队内部达成共识。当用户画像被采纳时，这一点会变得很明显。然后团队开始直呼其名地引用它们，“凯莉绝不会想那样做”……而其他人也不会问凯莉是谁。\n\
  -   用户画像能提高效率。\n-   用户画像既能代表当前用户，也能代表未来用户。它们帮助团队更多地思考对话式体验的未来用途。\n-   用户画像能激发突破性思维。\n\
  \n创意/开发团队中的每个人现在都对他们正在为其创建对话式体验的用户形象有了概念。在向设计/开发团队介绍用户画像后，通过张贴用户画像海报，它们将更顺利地被采纳，并在开发过程中逐渐深入人心。\n\
  \n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig7_HTML.jpg](img/479330_1_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7  \n墙上真人大小的用户画像将时刻印在团队脑海中\n\n用户画像使团队能够基于对用户的了解来设计聊天机器人。他们开发什么、如何运作、想要达成什么目标，以及同样重要的语气语调，都可以基于你对用户的了解。\n\
  \n## 用户旅程地图\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig8_HTML.png](img/479330_1_En_2_Fig8_HTML.png)\n\
  \n图 2-8\n\n既然我们已经对对话式体验的用户有了清晰的认识，接下来需要弄清楚他/她将经历怎样的旅程，通过使用我们即将创建的聊天机器人等触点/渠道来实现其目标。实现这一目标的一个著名方法是定义用户/客户旅程地图。\n\
  \n客户旅程描述了客户在与您公司的品牌、产品、服务、网站或应用程序互动时所经历的所有体验。客户遇到的触点被用来构建旅程并创建一个引人入胜的故事，详细描述他们的互动及伴随的情感。\n\
  \n客户旅程不仅仅着眼于交易或体验的一部分，而是记录了作为客户的完整体验。对话式体验可以为客户旅程的每个部分增加价值，例如，从客户下第一笔订单到即时回答与产品相关的问题。\n\
  \n### 如何创建用户/客户旅程地图？\n\n识别用户与您的产品、服务、网站或应用程序互动的触点至关重要。一旦确定了触点，就可以将它们按顺序连接起来，代表客户在与各个触点互动时所遵循的路径。图\
  \ 2-9 展示了一个整体客户旅程地图的示例，其中包含了用户规划并通过史基浦机场使用公共交通前往阿姆斯特丹进行短途旅行的所有可能触点和路径。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig9_HTML.jpg](img/479330_1_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9  \n展示不同路径的旅程地图示例\n\n你需要分析客户执行的活动，并记录他们在旅程的每个活动中正在做什么。\n\n描述旅程中的每个相关时刻，并尝试识别以下内容：\n\
  \n-   使用情境：他们在何时何地使用该触点。\n-   他们想要达成什么目标（他们的意图）？\n-   他们采取了哪些步骤来实现目标？\n-   他们考虑什么？\n\
  \    -   他们有疑问吗？\n    -   是否存在不确定性？\n-   什么影响了客户？\n    -   是什么激励了他们？\n    -   是否存在令人气馁的障碍？思考任何可能导致客户在旅程中放弃的因素。\n\
  \    -   他们感受到了什么情绪？\n-   他们期望得到什么反馈？\n\n这将形成一个更详细的客户体验可视化图。图 2-10 提供了此类可视化图的一个示例。\n\
  \n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig10_HTML.jpg](img/479330_1_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10  \n详细的客户/用户旅程地图\n\n### 为什么客户旅程地图如此有用？\n\n客户旅程地图的益处包括：\n\n-   它从用户的角度出发，为你提供了影响体验因素的高层概览。\n\
  -   该地图提供了对触点（未来）使用情况（使用情境、使用频率）的洞察。\n-   它有助于识别问题领域和创新机会。例如，你是否可以通过主动解决客户在旅程各阶段可能遇到的问题来改善客户体验？\n\
  -   地图中的不同阶段可用于进一步分析和创建使用场景。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig11_HTML.jpg](img/479330_1_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11  \n用户在场景创建中扮演主角。\n\n-   它有助于你确定优先级。\n-   在整个设计过程中，每一个重大的设计决策都将由客户旅程地图驱动。\n\
  \n### 下一步是什么？\n\n在完成用户/客户旅程地图后，你就知道了旅程的哪些部分至关重要。这些部分是经常发生或对用户至关重要的。目标是帮助用户从头到尾完成其中一个旅程，并确定这些旅程是否可以通过你的聊天机器人设计来服务。\n\
  \n## 渠道\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig12_HTML.png](img/479330_1_En_2_Fig12_HTML.png)\n\
  \n图 2-12\n\n聊天机器人设计的下一步是确定哪些渠道适合在用户的旅程中通过你的聊天机器人触达客户/用户，以及如何最好地利用这些渠道。\n\n关于应该使用哪些渠道来触达客户的问题有两个方面：\n\
  \n-   企业认为哪个渠道是借助聊天机器人向客户提供协助的最有效方式？它可能是企业已经用于触达客户的渠道之一，甚至是一个全新的渠道，企业将其视为触达更多客户并增加产品/服务销售的机会。\n\
  -   在哪个渠道中，客户最期望（甚至可能需要）聊天机器人的协助？\n\n\n\n### Facebook Messenger\n\nFacebook Messenger\
  \ 聊天机器人非常适合营销和销售。它们提供了通过对话与潜在客户互动的途径，使公司能够围绕其产品对用户进行教育、推广和娱乐。聊天机器人还可以跟进在电商商店中放弃购物车的用户，甚至在\
  \ Messenger 内完成销售。\n\n许多公司使用聊天机器人进行客户发掘和潜在客户生成。在这种情况下，它们用包含“发送到 Messenger”按钮的个性化行动号召，取代了用于获取客户/潜在客户电子邮件地址的典型“挤压”页面。通过这样做，用户无需输入任何内容，无需提供电子邮件地址或姓名。当然，通过\
  \ FB Messenger，公司可以获取用户的真实姓名（大多数情况下）、性别以及他们系统的语言。\n\nFacebook 允许企业将 Messenger 作为网站上的客户聊天功能进行集成。人们可以在网站聊天窗口中开始对话，并在\
  \ Messenger 上继续。\n\n### Twitter\n\n您的聊天机器人可以向在 Twitter 上提及您、您提供的服务或您公司的客户发送包含相关信息的直接回复。该机器人还可以使用\
  \ Twitter 直接向客户询问更多信息，以便提供更好的帮助。\n\n您可能用于对话体验的其他渠道包括 Web、Slack、iOS、SMS、Google Home、Android\
  \ 和 Alexa。\n\n## 对话设计\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig13_HTML.png](img/479330_1_En_2_Fig13_HTML.png)\n\
  \n图 2-13\n\n下一步是设计您的机器人对话。它应该吸引用户并推动他们实现目标，同时确保公司的目标得以实现。\n\n理想情况下，对话由文本和附件（如音频、视频、图像和文件）混合组成。对话还可以呈现菜单和按钮，使用户能够快速回复。图\
  \ 2-14 展示了此类对话的一个示例。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig14_HTML.jpg](img/479330_1_En_2_Fig14_HTML.jpg)\n\
  \n图 2-14\n\n带有快速回复选项的对话示例\n\n### 聊天机器人的个性与语气\n\n每个机器人都有一种声音——这意味着每个机器人都需要个性。聊天机器人的个性由其风格、语气和态度决定。\n\
  \n聊天机器人和语音助手是供人类使用的。对话界面负责处理人与计算机之间更好的交互。通过个性，我们可以个性化这些对话，使其更逼真、更亲密，并更具人类互动的代表性。构建丰富且详细的个性使您的聊天机器人对用户更具相关性、可信度和吸引力。它鼓励客户表现出更大的信任和粘性。\n\
  \n个性有助于更好地理解机器人，以及它将如何通过语言、情绪、语气和风格的选择进行沟通。如果您不为聊天机器人创建个性，用户自己也会为其赋予一个个性。那么您将面临风险，即用户对您机器人的感知可能与您希望其关联的形象不符。\n\
  \n#### 构建个性\n\n为了定义聊天机器人的个性，您需要再次经历创建人物角色的过程。创建一个能够真实代表理想客户、模仿人类互动的角色。模仿客户的个性是吸引用户的关键。定义年龄，描述态度、一些典型词汇和个性背景。您可以选择将其设为男性、女性或完全无性别。然而，机器人不应体现性别刻板印象，除非这符合您公司的品牌和目标。创建一个角色，并为其命名，并选择一个代表您公司且能吸引用户的图片/图标。\n\
  \n在这样做时，请牢记以下几点：\n\n- 客户应在情感上与机器人的个性建立联系，从而与对话体验建立联系。\n- 如果机器人代表您的品牌，那么机器人的个性应与品牌的价值观和语气保持一致。许多公司在代表机器人的图片中使用其徽标（的一部分）。\n\
  - 机器人应具有亲和力，但不应是真人。它应该以机器人的身份表达自己；绝不应伪装成人类。当用户不确定他们是在与人类还是机器交互时，他们会感到被误导，失去信任，并拥有糟糕的体验。客户应该知道他们正在与机器人打交道。例如，可以通过让机器人自我介绍为机器人来实现这一点。\n\
  \n> *“你好！我是 Cuby。我是一个聊天机器人。有什么可以帮你的吗？”*\n\n#### 语气\n\n现在您已经定义了聊天机器人的个性，您需要了解机器人应该如何“说话”。您可以通过写下机器人的关键价值观来弄清楚这一点。您需要定义聊天机器人的态度、风格和语气，这些应反映其个性。然后决定应该使用什么词汇。\n\
  \n然后，您可以将您设计的个性与您设想的语音结合起来，编写您的机器人消息。\n\n例如，一个酷酷的机器人：\n\n> *“嘿，Harold，咋样？我看到你正在查看这个超级酷的徒步旅行假期。我能帮你什么吗？”*\n\
  \n或者一个严肃且专业的机器人：\n\n> *“你好 Amy，我看到你正在编辑你的工时表。我能帮上忙吗？”*\n\n### 对话流程\n\n对话流程可以用流程图来可视化。为了创建对话，客户/用户旅程图非常有用。在地图中，您可以找到用户意图以及机器人（代表公司）应该如何反应。用户意图可以从用户当时正在做的事情中推断出来，或者通过机器人提出的问题（如对话开场白）来推断：\n\
  \n> *“你好！我是 Cuby。我是一个聊天机器人。我能帮你处理预订吗？”*\n\n### 设计激励性对话\n\n聊天机器人能够带来愉悦感并激励用户采取行动，这一点至关重要。当机器人满足用户的需求和愿望时，它就会带来愉悦感。激励能够促成某种行为。用户可能受到以下一个或多个因素的激励：\n\
  \n#### 信息\n\n机器人提供的信息应与用户相关、易于理解、值得信赖，并能促成相关选择。用户还应能轻松了解机器人能做什么或不能做什么，以便设定正确的用户期望。机器人应清晰地传达其核心功能。如果用户意图被误解或系统无法实现，请诚实告知，让他们知道需要尝试不同的方法。\n\
  \n> *“你知道我可以帮你处理……吗？”*\n\n> *“抱歉，我只能帮你处理有关飞往美国的航班的问题。”*\n\n> *“抱歉，我不明白你的意思，你能重新表述一下问题吗？”*\n\
  \n#### 目标设定与承诺\n\n人们通过比较现状和理想的未来来设定目标。作为机器人对话的设计者，请确保您了解客户的目标，并引导他们实现这些目标。\n\n当用户致力于他们的目标时，他们更有可能坚持该行为并保持专注。\n\
  \n训练机器人通过创建更具吸引力和更个性化的闲聊对话，与用户就个人话题进行互动。通过这样做，机器人也将学会预测未来用户的信息。\n\n> *“嘿 Jenny，你今天怎么样？”*\n\
  \n#### 激励措施\n\n激励措施或奖励能激励用户表现出某种积极行为。激励和奖励并不总是经济上的；地位或便利性也可能对用户如何回应机器人产生重要影响。\n\n\
  > *“如果你告诉我你的生日是哪天，我可以给你寄一张生日贺卡。”*\n\n\n\n### 自主性\n\n成为自身行为的主宰，并以自己的方式行事，是激励用户的关键。因此，机器人应引导用户，但同时要让他们感到一切尽在掌握。例如，你可以通过随时为用户提供“退出”选项来实现这一点。图\
  \ 2-15 提供了一个示例。请注意最右侧面板底部附近的“我更喜欢自己操作”按钮。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig15_HTML.jpg](img/479330_1_En_2_Fig15_HTML.jpg)\n\
  \n**图 2-15** 一个让用户感到一切尽在掌握的对话示例\n\n### 反馈\n\n激励用户对机器人产生积极行为的最重要因素之一是反馈。机器人提供的反馈是传达上述某些激励因素所必需的。例如，目标设定需要反馈来传达实现目标的进度。\n\
  \n> *“您已选择了男士部门。”*\n\n在设计对话时，其他需要牢记的问题如下：\n\n-   保持对话主题贴近聊天机器人的服务目的。如果用户偏离主题，请尝试将其引导回主要话题。\n\
  -   避免使用“是”或“否”的答案/按钮，因为用户容易出错。相反，应指明用户将对什么内容说“是”或“否”，例如“是的，我是老客户”和“不，我是新客户”。\n\
  -   尽可能让聊天机器人的回复简洁明了，因为用户并不总是仔细阅读。相反，要预期用户经常快速浏览聊天机器人的回复。\n-   在机器人的回答中重复问题，以表明机器人理解了用户的需求。\n\
  -   考虑根据用户之前的请求来个性化机器人的回答。利用你从用户之前给出的答案/提出的问题中已经了解到的信息。\n-   根据用户与机器人及其所支持的网站或产品的实时活动来定制对话。\n\
  \n> *“我看到您正在尝试报销一项索赔。如果您提供保单号，我可以帮您处理。”*\n\n-   考虑如何结束对话，例如：\n\n> *“随时乐意为您效劳！再见。”*\n\
  \n## 后端系统\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig16_HTML.png](img/479330_1_En_2_Fig16_HTML.png)\n\
  \n**图 2-16**\n\n在设计时，你的数字助手必须考虑到，它自身不会内置处理整个流程所需的所有知识。例如，身份验证不会在数字助手本身中实现，而是由后端系统提供。客户数据、员工数据和库存信息等数据也不会成为数字助手本身的一部分。在企业环境中，可能需要一个能够执行人力资源相关任务（如员工资料更新和假期余额查询）的人力资源机器人/技能，或者一个用于招聘相关活动的招聘机器人。执行此类任务所需的信息通常在你的后端应用程序中。你的数字助手应能够连接到这些系统，并将这些系统中的信息带入对话中。\n\
  \n让我们以图 2-17 中的数字助手为例。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig17_HTML.jpg](img/479330_1_En_2_Fig17_HTML.jpg)\n\
  \n**图 2-17** 用户想要预订选定的酒店\n\n在此示例中，用户选择预订酒店。为此，数字助手需要与后端预订系统通信。当数字助手调用后端系统时，对用户而言，酒店将按要求完成预订。通常，数字助手会向预订系统发送一个包含预订详情的请求，然后由预订系统处理实际的预订。用户完全不知道数字助手调用了后端系统。这应该是完全透明的，并与用户体验流程无缝集成。\n\
  \n在你的设计中，你应该识别出对话中所有需要后端集成的部分。你还需要提供正确创建此集成所需的信息。以预订示例为例，请考虑入住和退房日期、酒店名称，以及最后但同样重要的预订酒店的用户名。提供这些信息使开发人员能够正确创建实现这些集成点的\
  \ API 和组件。\n\n## 示例实体\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig18_HTML.png](img/479330_1_En_2_Fig18_HTML.png)\n\
  \n**图 2-18**\n\n正如旅程地图中所描述的，在每个接触点，用户都有一个或多个意图，例如“从史基浦机场前往阿姆斯特丹”。*意图* 是用户的意图。\n\n\
  *实体* 则修饰一个意图。例如，在意图“从史基浦机场前往阿姆斯特丹”中，实体是“前往”、“史基浦机场”和“阿姆斯特丹”。\n\n用户实际说出的任何内容都称为话语。例如，如果用户输入或发布推文“我刚到史基浦机场，准备去阿姆斯特丹进行城市旅行”，那么整个句子就是\
  \ *话语*。\n\n在为对话流程创建流程图时，除了“快乐路径”之外，你还必须制定不同的话语，因为用户表达自己的方式多种多样。\n\n> *“在史基浦机场等候。期待我的阿姆斯特丹城市之旅。”*\n\
  \n> *“刚到史基浦机场，准备和全家人进行周末旅行。”*\n\n> *“我们前往阿姆斯特丹的周末之旅从史基浦机场开始。”*\n\n实体的组合构成了这些不同话语的基础。聊天机器人最终必须能够识别用户的问题/评论——无论其书写方式如何——以便给出正确的答案。\n\
  \n与项目利益相关者共享实体可能会有所帮助。使用图 2-19 中所示的词云方法，是一种快速提供所支持实体概览的方式，同时也能显示它们的相对重要性或至少是相对使用频率。\n\
  \n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig19_HTML.jpg](img/479330_1_En_2_Fig19_HTML.jpg)\n\
  \n**图 2-19** 词云是一种向利益相关者展示所有不同实体的方式\n\n### 可用性测试\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig20_HTML.png](img/479330_1_En_2_Fig20_HTML.png)\n\
  \n**图 2-20**\n\n这是所有辛勤工作得到回报的时刻。虽然这是此处概述的第八个步骤，但它不一定是最后一步。事实上，大多数情况下，你在测试阶段收集到的信息和反馈会导致重新定义问题、寻找更多示例实体以及更好地与用户共情。不断问自己这个问题：我们是否在构建正确的东西？\n\
  \n### 使用测试场景\n\n你为对话流程创建了流程图。流程图中从上到下的每条路径都是一个测试用例，并且只能用于测试“快乐路径”。\n\n流程图没有显示的是用户表达意图的无限可能性以及机器人自身对话响应的变化。然而，一个训练有素的聊天机器人能够理解不同的用户表达（话语），而一个设计良好的聊天机器人会在对话响应中提供一些变化。\n\
  \n### 由大量用户进行探索性测试\n\n根据项目状态明智地选择测试人群非常重要。最重要的选择标准是语言和方言。对于此测试，不需要使用任何需求或测试用例；只需让测试人群自行操作即可。\n\
  \n盲测也是一种很好的测试方式。那些属于目标受众但未接受过使用你的聊天机器人培训的用户，在第一次面对它时能否成功使用？这是一个值得提出的好问题，而用户测试将提供答案。\n\
  \n\n\n### A/B 测试\n\nA/B 测试的定义是，通过同时向相似访客展示两个版本的对话式用户体验，对二者进行比较。其目标是确定哪个版本表现更佳。\n\
  \n通过进行 A/B 测试，您将能够衡量以下指标：\n\n- **留存率**：监控聊天机器人在吸引和留住用户方面的表现。结构良好且具有吸引力的即时通讯聊天机器人用户体验，其留存率可能高达\
  \ 70%，而广泛使用的电子邮件营销活动留存率最高仅为 40%。\n- **流失点**：指用户在对话流程中离开预设主流程，转向非预期路径的位置。这意味着用户体验中可能存在某些内容或元素，访客因感到厌倦或受挫而无法触及。\n\
  - **主要转化**：测试哪种对话式用户体验最能引导用户完成对您业务最有价值的操作，例如，点击特定的“行动号召”、与客服人员开始实时聊天、完成结账流程等。\n\n\
  一些聊天机器人构建平台提供了现成的聊天机器人 A/B 测试解决方案。您可以利用它们来实现此目的。\n\n每个为 A/B 测试设置的实验都可能包含同一功能或需要验证的用户体验元素的两个或更多变体。即使您的机器人已上线，也可以进行此类测试。尝试不同的用户表述，并衡量用户行为的变化。\n\
  \n脚注 1 2\n\n"
- "# 3. 用例\n\n## 引言\n\n为了理解 Oracle 数字助理的技术实现，本章将向您介绍 Travvy——一家由作者虚构的、专为冒险爱好者提供徒步假期的旅行社“极限徒步假期”所使用的数字助理/聊天机器人。\n\
  \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig1_HTML.jpg](img/479330_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1 极限徒步假期公司网站\n\n极限徒步假期组织在瑞士/法国、加拿大和美国的高难度徒步旅行。他们提供完整的旅行套餐，包括机票、有导游带领的徒步旅行和住宿。\n\
  \n通过循序渐进的步骤，您将熟悉 Travvy，从而全面了解创建对话式体验和技术实现的各个环节。\n\n您将了解 **“Travvy 的初衷”**，并认识代表与\
  \ Travvy 沟通的旅行者/用户的**用户画像**。我们将阐述**用户旅程**，并解释 Travvy 在其中扮演的角色。您将看到如何为数字助理选择**渠道**，最后，您将找到揭示用户意图的**对话/会话流程**。在本章的最后部分，将介绍聊天机器人所使用的**实体和用户表述**。\n\
  \n## 目标\n\n### 利益相关者是谁？\n\n极限徒步假期的首席执行官和营销经理是决策者。\n\n极限徒步假期是一家小型旅行社。三名员工负责预订，六名富有冒险精神的导游在现场陪同旅行者。该机构在一个新兴的利基市场中占有很大的市场份额。\n\
  \n### 为何需要聊天机器人？\n\n营销经理知道，他们的客户对于此类假期的风险、难度等级以及保险条件有很多疑问。目前，预订部门负责通过邮件或电话回答所有这些问题，而这些问题往往有相同的答案。\n\
  \n聊天机器人有助于降低成本，因为接听电话或回复邮件的人工成本通常高于每次成本不到一美分的聊天机器人回复。这也是聊天机器人不应提供电话号码的原因。最好为用户提供一个链接，让他们自己能够找到所需信息。\n\
  \n这就是他们考虑开发聊天机器人的原因，以便能够为客户提供更好的全天候服务、建议/帮助他们，并说服他们预订假期。\n\n优秀聊天机器人的优势在于用户可以询问任何问题。这意味着无需搜索/浏览网站。用户可以直接询问他们想要什么。数字助理甚至可以显示所需的表单，以便用户立即填写。**智能数字助理变成了智能搜索引擎**。\n\
  \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig2_HTML.jpg](img/479330_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2 用户画像：哈罗德·希卡威（照片由 Danijela Froki 拍摄于 Unsplash）\n\n## 客户：用户画像\n\n### 描述哈罗德\n\
  \n在业余时间，哈罗德非常活跃。每周六早上，他都会和一群朋友进行长途骑行。他和女友霍莉每周会进行一次室内攀岩，假期时，他们喜欢在多洛米蒂山脉（具有挑战性）和捷克（价格便宜）进行户外攀岩。他们都喜欢探索新的徒步路线。哈罗德说话直截了当（“少说废话”），也期望他人同样直接和诚实。他不喜欢任何不能以积极方式度过的时光。\n\
  \n### 他的工作“日”\n\n哈罗德经常上夜班。他的主要任务是确保马斯特里赫特展览与会议中心（MECC）大楼的安全。在这些夜晚，他会进行巡逻，但中间经常有一些空闲时间，这时他就会浏览网站，寻找有关冒险旅行和不错度假目的地的信息。他曾在极限徒步假期网站上预订过一次去法国的旅行。他和霍莉认为那是一次奇妙的冒险。为了预订那次徒步旅行，他当时在该网站上创建了一个个人资料。\n\
  \n### 他的工具\n\n哈罗德使用办公室的台式电脑或在进行现场安全检查时使用手机上网。他的一些朋友使用平板电脑，但哈罗德认为这没什么优势。\n\n### 他的目标\n\
  \n他非常热衷于活跃的假期，之前他曾在极限徒步假期的网站上找到并预订了这样的假期。他使用该网站获取关于他们假期选择的详细信息。在与霍莉商量后，他们经常会有一些具体问题。如果这些问题能够快速得到解答（最好是在他上夜班期间），他就会在网站上一次性预订行程。\n\
  \n## 用户旅程图\n\n哈罗德将经历怎样的旅程，才能通过我们的聊天机器人等接触点/渠道实现他的目标？\n\n### 接触点\n\n- 在家沙发上看到的互联网/电视广告\n\
  - 在家或在工作时使用的 Facebook\n- 在家或在工作时访问的极限徒步假期网站\n- 聊天机器人\n\n### 哈罗德的意图\n\n- 查看一些徒步假期选项。\n\
  - 查找并选择一个徒步假期，并提出相关问题。\n- 预订并支付徒步旅行费用。\n\n### 他的动机/需求\n\n- 哈罗德被极限徒步假期提供的诱人假期选项所吸引。\n\
  - 他注意到自己无需输入凭据。\n- 他能全天候获得清晰、快速且个性化的答案。\n- 他喜欢被引导，但不想失去**自主权**。他想要掌控感。\n\n\n\n###\
  \ 需触发的情感\n\n- 聊天机器人记住了他的偏好，令他**喜出望外**。\n- 聊天机器人的语气应：\n  - 对他具有**吸引力**\n  - 让他感到**愉悦**\n\
  \  - **激励**他采取行动\n- 他应对结果感到**满意**并充满**信心**。\n\n下图 3-3 展示了哈罗德在搜索并决定进行一次徒步旅行时的完整旅程。\n\
  \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig3_HTML.jpg](img/479330_1_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3** – 整体旅程与接触点\n\n对于我们将在此用例中创建的聊天机器人，重点将放在核心区域旅程的前三个部分以及顶部的两个部分。至于四个核心部分，您将在后续的图中找到完整的详细客户旅程。\n\
  \n由于聊天机器人只是用户为查找和预订行程所接触的众多接触点之一，因此梳理整个客户旅程以确保没有遗漏任何交互环节至关重要。在本书中，我们只关注用户与单一接触点（即聊天机器人）的交互。因此，在后续的图片中，旅程中与聊天机器人相关的部分会被高亮显示。\n\
  \n如图 3-3 所示，哈罗德做的第一件事是查看徒步假期的选项。在此过程中，他会接触到多个接触点，例如电视上的广告和“极限徒步假期”的在线信息，并且他会遇到他们的聊天机器人。\n\
  \n图 3-4 展示了一个详细的用户旅程，描述了哈罗德的主要意图、他的行动以及公司为支持他所做的活动。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig4_HTML.jpg](img/479330_1_En_3_Fig4_HTML.jpg)\n\
  \n**图 3-4** – ❶ 哈罗德找到了一个富有挑战性的假期\n\n在旅程图中，您还可以描述您认为用户在接触该接触点时应有的感受、将使用何种渠道进行接触，甚至使用场景。由于在此旅程中，哈罗德的假定使用场景主要是在工作或家中的台式电脑上，因此这些旅程图中未描述使用场景。\n\
  \n在哈罗德找到心仪的行程（当然，还要和霍莉确认一下）后，他想进行预订并完成下单。见图 3-5。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig5_HTML.jpg](img/479330_1_En_3_Fig5_HTML.jpg)\n\
  \n**图 3-5** – ❷ 哈罗德预订了选定的徒步假期\n\n预订未完成支付就不算完整。哈罗德可以通过网站在线支付预订费用，期间会得到聊天机器人的协助，并与他的银行保持密切联系。见图\
  \ 3-6。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig6_HTML.jpg](img/479330_1_En_3_Fig6_HTML.jpg)\n\
  \n**图 3-6** – ❸ 哈罗德为预订的假期付款\n\n当然，完成所有这些操作后，哈罗德需要收到关于其预订和支付成功的反馈。他可以在他的个人页面“我的极限徒步之旅”上在线获取这些信息，同时聊天机器人也可以提供这些信息以及他的门票/代金券。见图\
  \ 3-7。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig7_HTML.jpg](img/479330_1_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7** – ❹ 哈罗德收到预订确认\n\n## 渠道\n\n哈罗德与“极限徒步假期”沟通时最常使用的接触点是他们的 Facebook 页面和网站。这就是为什么在此用例中，聊天机器人将在\
  \ Facebook 和网站这两个渠道上与用户互动。当然，哈罗德可以在他的电脑和手机上与聊天机器人交流。\n\n## 对话\n\n### 机器人的个性\n\n\
  我们聊天机器人的用户像哈罗德一样年轻、活跃且热爱运动。他们几乎从不感到无聊。不工作时，他们就去徒步和进行（团队）运动。他们经常与朋友在一起，然后详细谈论他们的运动活动、徒步旅行和假期。\n\
  \n“极限徒步假期”公司的营销传播活动与这一形象相符。因此，聊天机器人的**语气**应该像是哈罗德自行车队中的一员。机器人的**名字**应与公司形象相符。由于该机器人将为“极限徒步假期”公司提供旅行相关服务，并且不应过于严肃，因此它将被命名为\
  \ `Travvy`。它的“**肖像**”/头像源自公司标志。见图 3-8。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig8_HTML.jpg](img/479330_1_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8** – `Travvy` “肖像”的选项\n\n`Travvy` 是**无性别**的，尽管与用户一起测试聊天机器人应能确认用户是否同意这一说法。\n\
  \n### 对话流程\n\n哈罗德的主要意图构成了对话流程的基础。如图 3-3 所示，整体旅程的每个阶段都由一个意图表示，该意图需要聊天机器人具备某种技能。在第一阶段，`Travvy`\
  \ 的“信息”技能将协助哈罗德，帮助他为他和霍莉找到合适的行程，并向 `Travvy` 表明他们的偏好。\n\n图 3-9 展示了哈罗德寻找行程的对话流程。\n\
  \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig9_HTML.jpg](img/479330_1_En_3_Fig9_HTML.jpg)\n\
  \n**图 3-9** – 寻找行程的对话流程\n\n在他旅程的第一阶段，`Travvy` 会要求哈罗德指明他的度假目的地（国家和区域），以及他心目中徒步旅行的难度等级。如果他决定从一个中心点进行三级徒步，他可以指明他偏好的住宿类型。\n\
  \n在哈罗德找到并选定心仪的假期后，`Travvy` 可以协助他预订该行程。为此，`Travvy` 将整合两项技能：“客户资料”技能和“预订”技能。\n\n图\
  \ 3-10 展示了哈罗德预订行程的对话流程。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig10_HTML.jpg](img/479330_1_En_3_Fig10_HTML.jpg)\n\
  \n**图 3-10** – 预订行程的对话流程\n\n哈罗德将被要求选择一个旅行时段，并验证/输入他自己及其旅伴的所有个人信息。\n\n现在哈罗德已经预订并确认了他的行程，`Travvy`\
  \ 会询问他是否需要协助付款。为此，`Travvy` 包含一个提供“支付”技能的即时应用。\n\n图 3-11 展示了哈罗德为行程付款的对话流程。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig11_HTML.jpg](img/479330_1_En_3_Fig11_HTML.jpg)\n\
  \n**图 3-11** – 为行程付款的对话流程\n\n`Travvy` 会要求哈罗德选择他的银行账户，检查余额是否充足，然后进行转账。\n\n为了确认支付是否顺利，哈罗德需要确认信息。当然，他也希望收到与行程相关的门票和代金券。因此，`Travvy`\
  \ 包含一个提供“确认”技能的客户组件。\n\n图 3-12 展示了数字助手将提供的确认对话流程。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig12_HTML.jpg](img/479330_1_En_3_Fig12_HTML.jpg)\n\
  \n**图 3-12** – 获取确认的对话流程\n\n`Travvy` 会给他一张收据，并可以帮助他保存/打印门票和代金券。\n\n\n\n## 后端\n\n\
  在对话过程中，`Travvy` 需要 `Harold` 输入个人数据和支付信息。尽管对话需要这些数据，但它们不会存储在数字助手本身中。通常，此类信息仅能从后端获取并存储在其中。后端是包含支持对话所需数据的信息系统。聊天机器人必须能够连接到这些后端系统，以便在对话中纳入来自这些系统的信息。\n\
  \n后端必须提供 REST 接口，以便与数字助手集成。在数字助手内部，需要编写自定义组件来实现与后端系统的实际集成。与后端系统集成的另一种方式是使用表单进行数据输入。`Travvy`\
  \ 使用一个表单，让 `Harold` 直接将他的个人数据输入到后端。\n\n## 实体与表述\n\n### 用户说什么/写什么\n\n在前面的段落中，我们定义了用户的旅程并阐述了他的意图。`Harold`\
  \ 可以通过多种方式（表述）来表达他的意图。为了确保 `Travvy` 理解 `Harold` 的意思，需要对 `Travvy` 进行训练。训练机器人是决定其性能的最重要因素。这就是为什么每个意图至少应制定\
  \ 10 种可能的表述（最好达到 50 种）。最好是这些句子/表述多样化，并且真正来自最终用户。\n\n切勿仅使用开发和项目团队想出的表述来训练你的机器人：他们太熟悉技术行话了，无法准确代表像\
  \ `Harold` 这样的真实用户。\n\n图 3-13 展示了 `Harold` 某个意图的不同表述。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig13_HTML.jpg](img/479330_1_En_3_Fig13_HTML.jpg)\n\
  \n图 3-13\n\n针对“指明度假目的地”意图的表述\n\n### Travvy 说什么/回答什么\n\n请记住，聊天机器人是一种对话式界面。对话应该是互动的。`Travvy`\
  \ 绝不应回复大段文本（超过 60 个字符就太长了）。因此，回复应该简短，并且应使用图片、按钮、列表和其他用户界面组件，使对话生动有趣、富有成效，并让像 `Harold`\
  \ 这样的用户保持参与感。\n\n图 3-14 展示了如何向用户呈现交互。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig14_HTML.jpg](img/479330_1_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14\n\n使用按钮和图片使用户交互更简单，机器人响应更准确\n\n除了这种呈现对话的方式之外，你还必须确保整个流程都可以通过自然语言完成。图 3-15\
  \ 展示了一个自然对话的示例。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig15_HTML.jpg](img/479330_1_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15\n\n`Travvy` 针对“指明度假目的地”意图的反馈和回答\n\n`Travvy` 就 `Harold` 的问题/回答给出清晰反馈非常重要。这种反馈将确保\
  \ `Harold` 确信 `Travvy` 很好地理解了他。\n\n定义对话的所有其他可能的用户表述和机器人回复都可以在相关的 Excel 表格中找到。\n\n\
  通过考虑所有这些技巧，在 `Travvy` 帮助 `Harold` 选择度假目的地并为他预订行程的场景中，对话体验可能如图 3-16 所示。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig16_HTML.jpg](img/479330_1_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16\n\n`Harold` 选择一个度假目的地和旅行时段\n\n`Harold` 可以使用按钮，但他也可以输入/键入他的答案。如果你的聊天机器人是语音驱动的，`Harold`\
  \ 甚至可以“对” `Travvy` “说话”。\n\n当 `Harold` 选择了一个行程时，`Travvy` 可以通过要求 `Harold` 验证/编辑他自己及其旅行同伴的个人数据来帮助他进行预订。见图\
  \ 3-17。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig17_HTML.jpg](img/479330_1_En_3_Fig17_HTML.jpg)\n\
  \n图 3-17\n\n`Travvy` 要求 `Harold` 验证/编辑预订所需的所有个人数据\n\n`Travvy` 使用“客户资料”技能来预填一些已知的数据。为了显示和收集这些数据，`Harold`\
  \ 将看到一个不同的屏幕。这样他也知道这是聊天机器人对话的一个旁支步骤。在这个屏幕上，他不是在和 `Travvy` 聊天，而是在认真填写个人数据。\n\n这个额外的屏幕可能如图\
  \ 3-18 所示。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig18_HTML.jpg](img/479330_1_En_3_Fig18_HTML.jpg)\n\
  \n图 3-18\n\n`Harold` 验证自己的资料并编辑其旅行同伴的个人数据\n\n如果 `Harold` 现在不想编辑数据，他可以取消此屏幕以返回对话。\n\
  \n当 `Harold` 输入并验证了数据后，他可以通过点击“确定”关闭个人数据屏幕，并继续对话，例如图 3-19 所示。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig19_HTML.jpg](img/479330_1_En_3_Fig19_HTML.jpg)\n\
  \n图 3-19\n\n`Travvy` 现在拥有了预订所需的所有信息\n\n在任何时候，`Harold` 都应该能够关闭/停止对话。因此，在屏幕的右上角有一个关闭图标。\n\
  \n## 测试对话界面\n\n在设计过程的早期阶段评估对话，可以让你在投入大量昂贵的开发工作之前有机会改进流程。\n\n图 3-20 展示了好的设计如何节省资金。\n\
  \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig20_HTML.jpg](img/479330_1_En_3_Fig20_HTML.jpg)\n\
  \n图 3-20\n\n好的设计节省资金\n\n在互联网上，你可以找到各种用于模拟设计的工具。图 3-21 展示了这样一个模拟示例。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig21_HTML.jpg](img/479330_1_En_3_Fig21_HTML.jpg)\n\
  \n图 3-21\n\n`Travvy` 在 iPhone 上可能出现的启动屏幕模拟图\n\n通过在设计过程的非常早期阶段创建模拟图，你可以从文本上微调机器人的回答和问题，并找出向用户展示你想要提供的选项的最佳方式。\n\
  \n\n\n### 认知走查\n\n借助线框图，您可以进行认知走查。这是一种可用性评估方法，您需要模拟用户执行一系列预期任务，并从用户视角提出一组问题，例如：\n\
  \n- 用户是否会尝试并达成正确的结果？\n- 用户是否会注意到正确的操作是可用的？\n- 用户是否会将正确的操作与其期望达成的结果联系起来？\n- 如果执行了正确的操作，用户是否会看到正在朝着预期结果取得进展？\n\
  \n这些洞察随后被用于改进对话界面的可用性。\n\n在图 3-22、3-23 和 3-24 中，您可以看到 Travvy 的线框图，展示了为 Harold 提供不同选项的显示方式。\n\
  \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig23_HTML.jpg](img/479330_1_En_3_Fig23_HTML.jpg)\n\
  \n**图 3-23** 在轮播图中，Harold 可以一次性选择目的地和徒步难度等级\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig22_HTML.jpg](img/479330_1_En_3_Fig22_HTML.jpg)\n\
  \n**图 3-22** Harold 只需点击首选选项即可选择目的地\n\n除了为用户提供可选择的选项外，他还应该能够自行构思/输入/说出自己的答案。\n\n\
  ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig24_HTML.jpg](img/479330_1_En_3_Fig24_HTML.jpg)\n\
  \n**图 3-24** Harold 输入自己的答案\n\n### 可用性测试\n\n您可以使用线框图，邀请像 Harold 这样的代表性用户进行可用性测试，只需让他们执行一些预定义任务，与\
  \ Travvy 进行交互，然后观察他们的操作即可。\n\n如果您使用刚刚开发完成的真实对话界面进行此测试，那么您不仅测试了其可用性，而且同时还能训练 Travvy\
  \ 更好地响应用户的请求、问题和答案。\n\n为了全面了解用户对 Travvy 的感受，您可以询问以下问题：\n\n- 请说出您最喜欢 Travvy 的三点。\n\
  - 请说出您不喜欢 Travvy 的三点。\n- 我们如何改进 Travvy？\n\n这些答案将帮助您改进您的数字助手。\n\n## 训练聊天机器人\n\n您可以向\
  \ Travvy 询问任何事情，但可以肯定的是，在初期，Travvy**不会**理解您问的所有问题。\n\n为了确保用户不会因为错误的答案或 Travvy 不理解他们的问题而感到烦恼，投入精力训练\
  \ Travvy 至关重要。\n\n图 3-25 显示，随着数字助手变得越来越智能，公司的训练工作量会减少。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig25_HTML.jpg](img/479330_1_En_3_Fig25_HTML.jpg)\n\
  \n**图 3-25** 随着 Travvy 变得更智能，训练工作量减少\n\n在初期，训练会花费时间。但训练很简单，您很快就会看到 Travvy 变得更聪明。\n\
  \n### 三步训练法\n\nTravvy 最好使用用户提供的语料进行训练。但是，您不希望让真实用户面对一个未经训练/无知的聊天机器人。因此，最好分三步进行训练：\n\
  \n1.  自己训练聊天机器人。通过输入尽可能多的语料来使用 Travvy。您已经对 Harold 有了很多了解；您知道他可能会如何与 Travvy 互动。\n\
  2.  请 Extreme Hiking Holidays 的预订员工（利益相关者）利用他们对通常致电/发送电子邮件的客户的了解来试用 Travvy。\n3.\
  \  使用可用性测试（如前文所述）来收集语料（由真实用户输入）并检查 Travvy 的回复。\n\n为了避免 Travvy 要求用户澄清问题，或者更糟的是，给出不恰当的答案，请将**置信度阈值**^(⁴)设置为\
  \ 0.35 或更高，并将**胜出裕度**设置为 0.2。（具体操作方法，请参见第 9 章）。\n\n然后，聊天机器人将首先检查哪些意图与问题的匹配概率超过 35%。如果有多个意图满足此要求，机器人将查看这些意图之间的概率差异。如果差异小于\
  \ 20%，则它会将这两个或更多意图作为选项显示给用户选择。\n\n在训练和测试聊天机器人时，您可以在应用程序的“洞察”中找到结果报告。在`Retrainer`选项卡中，您可以看到哪些语料导致了未解析的意图（Travvy\
  \ 不知道答案）。然后，您可以决定是将这些语料添加到某个现有意图，还是为它们创建一个新意图。\n\n脚注 1\n\n"
- '# 第三部分 实现您的数字助手


  '
- "# 4. 设计与实现的交汇点\n\n## 引言\n\n在前面的章节中，您了解了关于聊天机器人设计的所有内容，以及 Extreme Hiking Holidays\
  \ 如何设计他们的数字助手 Travvy。这个数字助手的实际实现可以由开发人员通过编写所有流程逻辑的代码来完成，但 Oracle 数字助手（ODA）提供了一个功能，业务用户和设计人员都可以使用它来搭建数字助手的初始版本，之后开发人员可以接手完成实现。借助此功能，即**对话设计器**，您可以快速为对话设计概念构建概念验证，而无需编写任何`OBotML`代码，也无需创建意图或实体。对话设计器允许您通过设置机器人与用户之间的对话来专注于用户体验。在按照第\
  \ 2 章所述创建了对话式用户体验之后，可以使用对话设计器来创建技能机器人的原型/线框图。从该线框图出发，只需点击一个按钮即可生成实际的技能机器人。然后，可以对聊天机器人进行训练和测试。图\
  \ 4-1 展示了对话设计器在设计和开发流程中的位置。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig1_HTML.jpg](img/479330_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** 对话设计器的定位\n\n为了使用对话设计器，您必须对对话设计器使用的概念有一些基本了解。首先是任务的概念。任务代表您的主要用例（查找行程、支付行程、获取确认）。任务中的第一条消息应该是来自用户的、清晰表达所选任务/意图的消息。这是必需的，因为当从对话设计器内部生成机器人时，该用户消息将用于创建其变体作为语料。意图将从任务中派生。\n\
  \n例如，第一条消息可以是“我想找一个行程。”这条消息是祈使句，并以名词结尾。这有助于对话设计器将此消息归类为意图语料。\n\n接下来是子任务。这些子任务通常执行辅助功能，也可以称为次要任务。用户不会明确要求机器人执行这样的子任务。\n\
  \n## 注意\n\n在 Oracle 数字助手 19.1.5 版本中，对话设计器作为测试版引入（图 4-2）。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig2_HTML.jpg](img/479330_1_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2** 测试版\n\n\n\n## 实现 Travvy 设计\n\n既然你已经了解了任务和子任务的概念，那么实现第 4 章中阐述的 Travvy\
  \ 设计就变得简单了。如前所述，对话设计器中的任务将转化为意图。\n\n为了调用对话设计器并实现 Travvy 的设计，我们将创建一个全新的空技能（图 4-3）。\n\
  \n## 注意\n\n在本示例中，我们创建了一个新的空技能。不建议在现有技能上使用对话设计器。这是因为当从对话设计器内部生成技能机器人时，现有的意图、实体和代码将被覆盖。此过程将在本章后面进行说明。\n\
  \n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig3_HTML.jpg](img/479330_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\n\n创建一个新技能\n\n创建这个新技能后，你会注意到左侧工具栏中的“对话设计器”按钮。点击此按钮，你将进入创建技能机器人的引导流程。\n\n\
  欢迎界面允许你添加技能机器人应能执行的任务。你可以根据需要输入任意数量的任务（图 4-4），并且在后续阶段，如果需要，还可以添加更多任务。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig4_HTML.jpg](img/479330_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4\n\n对话设计器欢迎界面\n\n点击**创建**，对话设计器将打开并显示你在欢迎界面上输入的任务（图 4-5）。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig5_HTML.jpg](img/479330_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\n设计器的初始视图\n\n有了这个空的框架，你现在就可以开始创建机器人对话的模型了。\n\n出于本书的目的，本节不会解释创建此技能模型所涉及的所有步骤，但核心功能将详细讨论。\n\
  \n从图 4-6 中可以看到，对话设计器中有两个图标：\n\n*   ![../images/479330_1_En_4_Chapter/479330_1_En_4_Figa_HTML.jpg](img/479330_1_En_4_Figa_HTML.jpg)\
  \ 点击此图标，可以输入用户表述。\n\n*   ![../images/479330_1_En_4_Chapter/479330_1_En_4_Figb_HTML.jpg](img/479330_1_En_4_Figb_HTML.jpg)\
  \ 选择此图标，可以输入机器人回复。\n\n当你只需要输入简单文本时，可以使用一个快捷方式。只需在底部的对话框中输入文本，然后点击图标（机器人或用户）即可将其添加到对话中。\n\
  \n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig6_HTML.jpg](img/479330_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n\n添加简单步骤\n\n如前所述，任务中的第一条消息应该是来自用户的消息，该消息清晰地表达了所选的任务/意图，以便从中生成相当好的表述。例如，对于\
  \ `FindTrip` 任务，可以输入 *我想去进行一次极限徒步旅行*。下一步是添加机器人的回复。我们这里需要一个简单的回复，让机器人进行自我介绍。例如：*嘿，Harold，我是\
  \ Travvy，EHH 的数字助理。很高兴再次在这里见到你。*\n\n现在对话的开端已经设置好了，我们准备向对话中添加一些实际内容。如第 4 章所述，`FindTrip`\
  \ 技能（图 4-7）包含几个步骤，我们将在本章中实现其中一部分（并非全部）。让我们从*指明度假目的地*开始。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig7_HTML.jpg](img/479330_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\n查找旅行的对话流程\n\n`指明度假目的地` 允许用户选择最喜欢的目的地，之后用户将被引导至该目的地的可用徒步旅行。如果你再读一遍上一句话，可能会注意到它包含以下内容：\n\
  \n*   一个选择目的地的动作\n\n*   一个路由到最喜欢目的地的分支\n\n*   一个子任务，用于选择该目的地可用的徒步旅行之一\n\n这正是对话设计器允许你输入的内容。通过点击机器人图标，将打开一个“添加消息”对话框，允许你将机器人的回复作为“动作”输入。在“动作”部分，只需添加一条消息，并根据需要添加任意数量的动作。如图\
  \ 4-7 所示，用户的选项是：\n\n*   美国\n\n*   加拿大\n\n*   瑞士/法国\n\n对于每个选项，都将添加一个动作。\n\n所有这些动作都需要分支到正确的“最喜欢的目的地”子任务。你可以手动创建这些子任务，但对话设计器允许你自动完成此操作。如果你调用动作文本框旁边的汉堡菜单（图\
  \ 4-8），可以选择动作类型（`GoURL` 或 `分支对话`）。在这种情况下，我们想要分支对话，因此应该选择此项。选择该选项后，随后的文本框允许你选择一个现有的（子）任务，或者通过输入一个不存在的名称来创建一个新任务。\n\
  \n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig8_HTML.jpg](img/479330_1_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8\n\n分支对话\n\n对于创建的每个“分支对话”动作（图 4-9），对话设计器都会自动创建一个新的子任务。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig9_HTML.jpg](img/479330_1_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n分支和子任务\n\n实现设计的下一步是定义子任务的内容。这与之前描述的“常规任务”（如 `FindTrip`）的工作方式完全相同。\n\n\
  作为示例，我们将实现“前往美国”子任务。`FindTrip` 任务使用动作让用户选择目的地，而在“前往美国”中，我们将使用卡片。\n\n卡片是一种更花哨的 UI\
  \ 组件，也支持图片。你可以输入图片 URL，在其下方可以添加供用户选择的动作。图 4-10 显示了一个示例。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig10_HTML.jpg](img/479330_1_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\n卡片和图片\n\n现在，你可以在对话设计器中预览技能机器人的单个任务和子任务。此预览模式——通过点击屏幕右上角的“预览你的任务”链接激活——允许你通过播放当前显示的单个（子）任务来检查流程。它不是技能机器人完整功能的表示，只会完全按照在设计器中输入的方式回放对话。这意味着无法点击动作或滚动浏览带有卡片的轮播选项。其主要目标是“预览”你的技能机器人。\n\
  \n一旦你对模型感到满意，对话设计的最后一步就是生成你的技能机器人，对其进行训练和测试。\n\n当你点击屏幕右上角的**生成**按钮时，会弹出一个弹出窗口（图\
  \ 4-11），警告你即将生成技能机器人。当你点击“生成”时，魔法就会启动，技能机器人就会被生成。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig11_HTML.jpg](img/479330_1_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11\n\n生成技能\n\n\n\n## 注意\n\n在使用`Skill Tester`（位于左侧菜单底部，用于测试/使用`Skill Bot`）之前，您必须通过点击顶部蓝色栏中的“train”来训练它。\n\
  \n### 审查生成的工件\n\n要理解`Conversation Designer`的工作原理，最好仔细查看生成的工件。这将使我们能够了解`Intents`和`Entities`是从哪里从原型中提取的，以及对话流程是如何推导出来的。首先，我们将查看`Intents`。如前所述，`Intents`是从任务中推导出来的，示例话语是基于对话中的第一条消息生成的。以`FindTrip`为例，输入了消息“*我想去进行一次极限徒步旅行*”。查看图\
  \ 4-12，您将了解到以下内容：\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig12_HTML.jpg](img/479330_1_En_4_Fig12_HTML.jpg)\n\
  \n**图 4-12** 生成的意图\n\n- `FindTrip`意图是基于任务`Find a Trip`创建的。\n    - 此意图添加了五个话语，全部直接源自`Designer`中输入的消息。\n\
  - `Greeting`意图被创建。\n\n接下来，我们可以查看生成的实体。如您所见，为此`Skill Bot`创建了十个实体。这些实体（图 4-13）源自`Conversation\
  \ Designer`中输入的机器人回复。您会注意到有单个实体和复合包实体，这两种实体都将在第 5 章中更详细地解释。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig13_HTML.jpg](img/479330_1_En_4_Fig13_HTML.jpg)\n\
  \n**图 4-13** 生成的实体\n\n例如`TripDestination`实体。它是作为`ValueList`实体生成的，其值为*USA, Canada,\
  \ and Switzerland/France*。显然，这是从消息“*您想去哪个度假目的地？*”中推导出来的，如图 4-14 所示。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig14_HTML.jpg](img/479330_1_En_4_Fig14_HTML.jpg)\n\
  \n**图 4-14** 用于推导`TripDestination`实体的消息\n\n最后，生成了完整的`OBotML`流程定义`YAML`文件。我们不会详细讨论其内容，但高层次的解释应该足以让您有所了解。当您打开流程编辑器时，您会注意到第一部分包含大量以`#!`开头的行。这些行包含作为`JSON`对象的原型定义。\n\
  \n## 注意\n\n有时您看不到以`#!`开头的行。通常这是因为这些行被折叠了，由`{←`→`}`表示。您可以通过单击第 1 行旁边的小箭头来展开该部分。\n\
  \n除了原型定义之外，`YAML`文件还包含`Skill Bot`的实际流程定义。所有状态都已生成，包括一个`Unresolved Intent`状态。每个简单的机器人回复都有`System.Output`组件，而复杂的回复（如`Actions`和`Cards`）则有`System.CommonResponse`组件。下面显示了一个“Go\
  \ to USA”子任务及其各个卡片的示例。首先，设置一个变量名`levelCards`来包含所有关于卡片的信息。\n\n```\n--------------------\
  \  # Task \"Go to USA\" ---------------  ---------------\nsetLevelCards:\ncomponent:\
  \ System.SetVariable\nproperties:\nvariable: levelCards\nvalue:\nnp:\ntitle: Yosemite\
  \ NP\nimageUrl: \"\"\ndescription: \"陡峭的山脉，壮丽的景色\"\naction1Label: Yosemite - 徒步等级\
  \ T4\naction1Branch: Select Yosemite T4\naction2Label: Yosemite - 徒步等级 T5\naction3Label:\
  \ Yosemite - 徒步等级 T6\nyellowstone np:\ntitle: Yellowstone NP\nimageUrl: \"\"\ndescription:\
  \ 色彩斑斓的惊人间歇泉\naction1Label: Yellowstone - 徒步等级 T4\naction1Branch: Select Yellow\
  \ T4\naction2Label: Yellowstone - 徒步等级 T5\naction2Branch: Select Yellow T5\naction3Label:\
  \ Yellowstone - 徒步等级 T6\nzion np:\ntitle: Zion NP\nimageUrl: \"\"\ndescription:\
  \ 绿色、灰色和橙色相得益彰\naction1Label: Zion - 徒步等级 T4\naction2Label: Zion - 徒步等级 T5\naction3Label:\
  \ Zion - 徒步等级 T6\ntransitions: {}\n```\n\n然后，将使用此变量来提取需要在各个卡片中显示的信息。关于`Entities`、`Intents`和流程的所有细节将在本书的后续章节中解释。目前，只需知道这些是自动为您生成的，并且您对它们如何从原型中推导出来有了一些了解就足够了。\n\
  \n### 测试生成的技能机器人\n\n最后一步是实际测试生成的`Skill Bot`。如果之前没有完成，剩下的一个任务是训练`Skill Bot`。您可以通过查看工具栏中`Train`旁边的图标轻松判断是否需要训练。如果是一个感叹号，则表示需要训练（图\
  \ 4-15）。如果是一个勾选框，则表示不需要训练。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig15_HTML.jpg](img/479330_1_En_4_Fig15_HTML.jpg)\n\
  \n**图 4-15** 需要训练\n\n如果需要训练，您需要点击顶部蓝色工具栏中的`Train`，并提交弹出的窗口。训练将开始，并且通常成功完成，不会出现任何失败。您会注意到感叹号将变为一个勾选框，表示训练成功。现在您可以测试`Skill\
  \ Bot`了。可以通过点击左侧工具栏中的播放按钮来开始测试（图 4-16）。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig16_HTML.jpg](img/479330_1_En_4_Fig16_HTML.jpg)\n\
  \n**图 4-16** 启动测试器\n\n`Skill Tester`弹出窗口将显示，您可以通过输入类似“*嗨，我想去美国进行一次极限徒步旅行*”的消息来与`FindTrip`\
  \ `Skill Bot`开始对话（图 4-17）。`Skill Bot`将回复并为您提供选择徒步旅行的选项。请注意，美国已被预选为目的地，因为机器人从您的话语中识别出来了。\n\
  \n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig17_HTML.jpg](img/479330_1_En_4_Fig17_HTML.jpg)\n\
  \n**图 4-17** 使用生成的`Skill Bot`运行测试器\n\n接下来，您可以在轮播中浏览国家公园，并通过单击选择您偏好的徒步等级。对话将继续，就像在`Conversation\
  \ Designer`中定义的那样。\n\n您可以随时重新进入`Conversation Designer`对原型进行更改并重新生成`Skill Bot`。\n\
  \n## 注意\n\n始终记住，重新生成意味着所有在`OBotML`中对`Entities`、`Intents`和流程手动进行的更改都将被覆盖。\n\n## 总结\n\
  \n在本章中，您学习了如何使用`Oracle Digital Assistant`的`Conversation Designer`来实现`Skill Bot`的原型/初始骨架。`Conversation\
  \ Designer`在开发的早期阶段非常有用，因为它不允许您实现更复杂的功能，例如问答、翻译、自定义组件和代理集成。这些功能需要在为`Skill Bot`生成`OBotML`之后植入。所有这些都将在本书的后续章节中解释，您还将了解更多关于`Entities`、`Intents`和对话流程的内容。\n\
  \n\n\n"
- "# 5. 深入实现细节\n\n现在你已经熟悉了 Oracle 数字助理的背景、功能以及如何设计数字助理，是时候了解一些基本概念了。在本章中，你将首先了解 Oracle\
  \ 数字助理（ODA）环境。然后，你将基于第 3 章描述的用例，开始与数字助理 **Travvy** 的旅程。每一节中，你将先了解概念，然后针对该用例实现这些概念。\n\
  \n## Oracle 数字助理（ODA）环境简介\n\n一旦你的 Oracle 云环境中的身份域管理员授予你访问权限，你将收到一封发送至注册邮箱的注册邮件。收到邮件后，你需要完成环境的注册。流程成功完成后，你将进入\
  \ ODA 的主屏幕，如图 5-1 所示。\n\n此屏幕显示 ODA 中的实例列表。如图 5-1 所示，我们目前创建了一个名为 `dadev` 的实例，作为开发环境。\n\
  \n### 提示\n\n你应该为实例使用命名约定，以便轻松理解所查看的内容。本书使用的约定是 `<2 字母缩写-产品><3 字母缩写-环境>`，因此数字助理开发环境命名为\
  \ `dadev`。\n\n但当你为 ODA 添加任何新实例时，此列表会更新，并且该名称将出现在列表中。\n\n图 5-1：Oracle 数字助理主页\n\n\
  然后，要导航到特定实例（本例中为 `dadev`），你需要点击对应环境的图标，并选择 **数字助理设计器 UI**。\n\n选择数字助理设计器 UI 后，你将重定向到该特定实例的主屏幕，如图\
  \ 5-2 所示。你会注意到实例中包含一个数字助理和几个并非你创建的技能。这些是 Oracle 作为实例的一部分提供的示例，帮助你入门。\n\n此外，你可能注意到主屏幕包含三个选项卡：\n\
  \n- **全部**：显示 ODA 实例中所有技能和数字助理的累积视图。\n- **数字助理**：包含实例中的所有数字助理。\n- **技能**：包含 ODA\
  \ 实例中的所有技能。\n\n图 5-2：实例主页\n\n首先理解**数字助理**和**技能**之间的区别很重要。你可以将数字助理视为一个或多个技能的逻辑分组，这些技能可以单独执行特定任务，以完成一项活动。当用户开始与数字助理对话时，数字助理首先分析用户的输入，然后根据输入将用户引导至特定技能。\n\
  \n如果你考虑本书第 4 章描述的用例，Travvy 就是你的数字助理。对于 Travvy，你将创建各种技能（即独立的聊天机器人）来执行任务，例如查找行程、预订行程、更新用户信息等。\n\
  \n现在你对数字助理和技能有了基本了解，本章接下来的部分将进一步深入细节。\n\n## 使用技能\n\n你可能已经了解，技能是任何数字助理的构建块。根据你的具体场景，你将创建一个或多个技能，让数字助理执行特定任务。本节将描述如何：\n\
  \n- 创建技能\n- 克隆技能\n- 导入技能\n- 导出技能\n- 创建技能的新版本\n- 删除技能\n- 发布技能\n- 导出对话日志\n- 显示渠道路由\n\
  \n### 创建技能\n\n点击屏幕左上角的图标，导航至**开发**下的**技能**，如图 5-3 所示。\n\n图 5-3：创建技能\n\n导航至技能后，点击图标关闭侧边菜单。\n\
  \n现在你将添加一个 Travvy 的新技能。为此，你首先需要为技能决定一个名称，也称为调用名称。命名技能时有一些指导原则需要遵循。因此，技能名称应：\n\n\
  - 在 Oracle 数字助理实例中唯一\n- 明确指定技能的用途\n- 简单，即易于阅读和发音\n- 不是长短语，也不是单个单词（除非该单词明确表达唯一名称或用途）\n\
  - 不包含“打开”、“转到”或“告诉我”等词语\n\n考虑上述指导原则，你将技能命名为 `FindTrip`。顾名思义，你将使用此技能为数字助理的用户查找行程。\n\
  \n从技能主页点击**新建技能**，如图 5-4 所示。\n\n图 5-4：添加新技能\n\n这将打开一个新窗口。你需要填写所需详细信息，如图 5-5 所示。\n\
  \n图 5-5：创建 FindTrip 技能\n\n\n\n## 注意\n\n当您开始为技能输入`显示名称`时，`名称`字段会自动填充。如果您希望为技能设置不同的`显示名称`和`名称`，也可以手动编辑此字段。\n\
  \n创建完成后，`FindTrip`将与其他技能一起出现在“技能”部分。参见图 5-6。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig6_HTML.jpg](img/479330_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6 FindTrip 技能\n\n点击`FindTrip`技能。这将打开一个包含该技能所有详细信息的新窗口。参见图 5-7。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig7_HTML.jpg](img/479330_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7 FindTrip 技能详情\n\n您可以看到屏幕左上角包含一个导航菜单，可带您返回“技能”屏幕。\n\n向右移动，您会看到两个菜单项：`验证`和`训练`。顾名思义，它们用于验证您的更改和训练您的技能。\n\
  \n左侧菜单项展示了您技能的各个部分。参见表 5-1，该表对这些图标及其描述进行了说明。\n\n表 5-1 菜单项及其描述\n\n| 菜单项 | 描述 |\n\
  | --- | --- |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fige_HTML.jpg](img/479330_1_En_5_Fige_HTML.jpg)\
  \ | 意图 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figf_HTML.jpg](img/479330_1_En_5_Figf_HTML.jpg)\
  \ | 实体 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figg_HTML.jpg](img/479330_1_En_5_Figg_HTML.jpg)\
  \ | 流程 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figh_HTML.jpg](img/479330_1_En_5_Figh_HTML.jpg)\
  \ | 对话设计器 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figi_HTML.jpg](img/479330_1_En_5_Figi_HTML.jpg)\
  \ | 资源包 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figj_HTML.jpg](img/479330_1_En_5_Figj_HTML.jpg)\
  \ | 问答 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figk_HTML.jpg](img/479330_1_En_5_Figk_HTML.jpg)\
  \ | 质量 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figl_HTML.jpg](img/479330_1_En_5_Figl_HTML.jpg)\
  \ | 洞察 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figm_HTML.jpg](img/479330_1_En_5_Figm_HTML.jpg)\
  \ | 组件 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fign_HTML.jpg](img/479330_1_En_5_Fign_HTML.jpg)\
  \ | 设置 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figo_HTML.jpg](img/479330_1_En_5_Figo_HTML.jpg)\
  \ | 技能测试器 |\n| ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figp_HTML.jpg](img/479330_1_En_5_Figp_HTML.jpg)\
  \ | 查看影响技能机器人的问题 |\n\n### 克隆技能\n\n在某些时候，您可能希望将某个技能中设计的功能复用到新技能中，而无需对现有技能进行任何更改。为此，您可以将现有技能克隆到一个新技能中。\n\
  \n从“技能”屏幕（见图 5-4）中，找到您想要复用的技能。点击技能右下角的“选项”图标 ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figq_HTML.jpg](img/479330_1_En_5_Figq_HTML.jpg)，打开技能目录，如图\
  \ 5-8 所示。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig8_HTML.jpg](img/479330_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8 技能目录\n\n从目录中，选择`克隆`选项来克隆该技能。\n\n### 导出技能\n\n您可以从技能目录访问的另一个有用功能是`导出技能`。顾名思义，使用此功能，您可以导出您的技能，然后将其下载到您的系统上。例如，如果您导出`FindTrip`技能，您会注意到一个`FindTrip(1.0).zip`文件被下载到您的系统。这里的`1.0`是您技能的版本。\n\
  \n### 导入技能\n\n如果您想为您的数字助手使用一个预构建的技能，那么您可以将该技能导入到您的数字助手环境中。从技能主页，点击`导入技能`按钮，如图 5-9\
  \ 所示，以导入包含该技能的 zip 文件。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig9_HTML.jpg](img/479330_1_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9 导入技能\n\n### 创建技能的新版本\n\n从技能目录（见图 5-8）中，如果您想为您的技能添加一个新版本，请选择`新版本`。\n\n###\
  \ 删除技能\n\n如果需要，您可以通过从技能目录（见图 5-8）中选择`删除`选项来删除您的技能。\n\n### 发布技能\n\n完成技能开发后，您可能希望从数字助手中访问它。要在数字助手中访问技能，首先需要发布该技能。要发布您的技能，请从技能目录中选择`发布`选项。确保在发布前训练您的技能。如何执行此操作将在`训练和测试意图`部分中说明。\n\
  \n发布技能后，您只能从“设置”部分的“配置”选项卡更改其自定义参数值。\n\n如果您希望在发布后更新您的技能，则必须创建一个技能的`新版本`。\n\n###\
  \ 导出对话日志\n\n对话日志的目的是检查与您的技能发生的各种对话。这包括与意图、问答（如果技能中存在）以及整个技能相关的对话。默认情况下，技能的所有类型的对话日志记录都是关闭的。您可以通过访问技能的“设置”![../images/479330_1_En_5_Chapter/479330_1_En_5_Figr_HTML.jpg](img/479330_1_En_5_Figr_HTML.jpg)，从“常规”选项卡中启用它们。\n\
  \n将显示以下选项：\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig10_HTML.png](img/479330_1_En_5_Fig10_HTML.png)\n\
  \n图 5-10 对话日志记录选项\n\n启用对话日志记录后，从技能目录（见图 5-8）中选择`导出对话日志`。这将显示一个新的弹出窗口，如图 5-11 所示。在此处，您可以选择要导出的对话日志。您还可以指定要获取日志的`时间段`。要最终导出所需的对话日志，请点击`导出`按钮。\n\
  \n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig11_HTML.jpg](img/479330_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11 导出对话日志\n\n### 显示渠道路由\n\n技能目录中的`显示渠道路由`选项允许您将渠道路由到您的技能。您将在本书的后续部分中了解更多关于渠道以及如何将这些渠道路由到您的技能的信息。\n\
  \n\n\n## 处理意图与表述\n\n在本节中，您将学习如何：\n\n- 创建意图\n- 向意图添加表述\n- 导出意图\n- 导入意图\n- 训练和测试意图\n\
  \n在本书的第 2 章中，您已经了解了意图和表述的相关概念。\n\n快速回顾一下，**意图**可以描述为您打算通过技能执行的一项工作或任务。为了描述这些意图，您需要将它们与示例句子关联起来。这些描述意图的示例句子被称为**表述**。\n\
  \n例如，如果您创建了一个`PizzaSkill`，您可能希望使用该技能来订购披萨。为此，您可以添加一个意图，比如`OrderPizza`，它允许用户通过该技能订购披萨。为了让技能识别用户的意图，您只需向技能中添加一些示例表述，例如“帮我订一份披萨。”当用户与技能交互并说出/写下“帮我订一份披萨”时，技能将能够根据该表述解析出具体的意图，在本例中就是`OrderPizza`。您添加的表述越多，您的技能就越健壮。\n\
  \n您的表述应该是完整且有意义的句子，但长度不要超过 255 个字符。较短的表述通常能带来更好的结果，因为它们往往更简洁，填充词更少。此外，表述不应由单个单词构成。\n\
  \n### 提示\n\n最初，您至少应该为定义的每个意图创建十到十五条表述。这能确保更好的意图解析效果。当您准备将技能部署到生产环境时，您将需要更多的表述。为意图识别表述是一个迭代过程——如果做得好，会带来良好的结果。\n\
  \n每个技能必须至少关联两个意图。因此，如果以`PizzaSkill`为例，它应该包含两个意图，比如`OrderPizza`和`CancelPizza`。\n\n\
  ## 创建意图\n\n在本节中，您将向之前在本章中创建的`FindTrip`技能中添加意图。展开`FindTrip`技能，然后从左侧菜单导航到意图部分 ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figs_HTML.jpg](img/479330_1_En_5_Figs_HTML.jpg)。\n\
  \n点击`+ Intent`按钮来添加一个意图。点击该按钮后，您会注意到一个默认名称为`Intent1`的意图被创建。参见图 5-12。然后，您需要为意图指定一个合适的名称，在本例中为`SelectTrip`。\n\
  \n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig12_HTML.jpg](img/479330_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12\n\n创建意图\n\n将意图的**对话名称**更新为“选择您的行程”，并将**名称**更新为`SelectTrip`。当技能无法解析某个意图时，对话名称会在对话中显示（作为选项）；而在您的对话流程中，您通过名称来识别任何意图。如果需要，您还可以为意图添加**描述**，但这并非强制要求。\n\
  \n## 向意图添加表述\n\n要向意图添加表述，您需要将它们添加到**示例**部分下，位于占位符文本为“在此处输入您的示例表述”的文本区域中（参见图 5-13）。\n\
  \n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig13_HTML.jpg](img/479330_1_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13\n\n添加表述\n\n一旦您开始添加表述，这个列表就会增长。如果您想查找特定的表述，可以在`Filter`字段中输入该表述进行搜索，系统随后会在已添加的表述中进行搜索。\n\
  \n## 导出意图\n\n您可以从一个技能中导出意图，然后将这些意图用于另一个技能。这样，如果需要为多个技能创建相同的意图，可以节省您的精力。以下步骤将说明如何导出意图：\n\
  \n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig14_HTML.jpg](img/479330_1_En_5_Fig14_HTML.jpg)\n\
  \n图 5-14\n\n导出意图\n\n1. 导航到技能中的**意图**部分 ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figt_HTML.jpg](img/479330_1_En_5_Figt_HTML.jpg)。\n\
  2. 点击“更多”按钮，然后选择**导出意图**（参见图 5-14）。\n\n这会将您的意图导出到一个 CSV 文件中。在本例中，该文件名为`FindTrip-Intents.csv`。导出的\
  \ CSV 文件包含三列，分别是`query`、`topIntent`和`conversationName`。`query`列包含表述，而`topIntent`和`conversationName`列则包含相关意图的名称以及该意图的对话名称（参见图\
  \ 5-15）。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig15_HTML.jpg](img/479330_1_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15\n\n`FindTrip-Intents.csv`\n\n## 注意\n\n当您导出意图时，技能中存在的所有意图都将被导出到一个 CSV 文件中。\n\
  \n## 导入意图\n\n要将意图导入到您的技能中，您需要导入包含已导出意图的 CSV 文件，如上一节所示。以下步骤将说明如何导入意图：\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig16_HTML.jpg](img/479330_1_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16\n\n导入意图\n\n1. 导航到技能中的**意图**部分 ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figu_HTML.jpg](img/479330_1_En_5_Figu_HTML.jpg)。\n\
  2. 点击“更多”按钮，然后选择**导入意图**。参见图 5-16。\n\n如前所述，“导出意图”会导出技能包含的所有意图。因此，“导入意图”会将所有导出的意图添加到您的技能中。如果您想添加特定的意图及其关联的表述，则需要在将导出的\
  \ CSV 文件导入技能之前，手动编辑该文件。\n\n\n\n### 训练与测试意图\n\n创建或更新意图后，你需要训练技能，以便模型根据你的更改进行训练。此训练基于不同的机器学习算法，这些算法会使用相关的意图和表述来训练你的技能。当用户与你的技能交互时，此训练可确保你的技能识别出特定意图并做出相应响应。\n\
  \n当你添加或编辑意图时，你会注意到右上角的`Train`按钮旁会出现一个指示标记（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figv_HTML.jpg](img/479330_1_En_5_Figv_HTML.jpg)）（见图\
  \ 5-17）。这表示你需要训练你的技能以应用你的更改。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig17_HTML.jpg](img/479330_1_En_5_Fig17_HTML.jpg)\n\
  \n图 5-17\n\n需要训练的指示\n\n点击`Train`按钮会显示两种不同的训练机制：`Trainer Ht` 和 `Trainer Tm`（见图 5-18）。你可以通过点击相应的单选按钮来选择特定机制。请注意，默认选中\
  \ `Trainer Ht`。在初始开发周期中，当你的训练语料库较小时，请使用 `Trainer Ht` 来训练你的技能。但随着训练语料库逐渐成熟，并且你开始获得准确的意图解析结果时，你最终应转向使用\
  \ `Trainer Tm`。\n\n现在，你将使用默认的 `Trainer Ht` 训练模型来训练你的技能。由于它是默认选项，要启动该过程，你只需点击 `Submit`\
  \ 按钮。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig18_HTML.jpg](img/479330_1_En_5_Fig18_HTML.jpg)\n\
  \n图 5-18\n\n训练意图\n\n假设你已经训练了你的技能，接下来你将测试你的意图。\n\n测试是任何开发周期的核心环节之一，机器人测试也不例外。在机器人开发过程中，应持续测试其功能。一旦你完成了意图的开发，就应该测试这些意图是否按预期运行。\n\
  \n要测试你的意图，请点击 `Try It Out!`，如图 5-19 所示。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig19_HTML.jpg](img/479330_1_En_5_Fig19_HTML.jpg)\n\
  \n图 5-19\n\n测试意图\n\n这将打开一个新窗口，你可以在其中测试你的意图。输入一个短语进行测试，然后点击 `Send` 按钮。随后，测试器将处理你的短语，并向你显示该短语解析到了哪个意图，以及其他附加信息。见图\
  \ 5-20。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig20_HTML.jpg](img/479330_1_En_5_Fig20_HTML.jpg)\n\
  \n图 5-20\n\n意图测试\n\n或者，你也可以通过切换 `Batch` 按钮，然后上传 CSV 文件，以批处理模式测试你的意图。请查看图 5-21。\n\
  \n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig21_HTML.jpg](img/479330_1_En_5_Fig21_HTML.jpg)\n\
  \n图 5-21\n\n批量上传\n\n当你为“意图对话”启用对话日志记录，然后按照前面“导出对话日志”一节所述导出对话日志时，即可获得该 CSV 文件。\n\n\
  ## 使用实体\n\n在处理意图和表述时，你了解到意图是你打算执行的特定操作，而表述是描述这些意图的有意义的句子。实体是可变元素，为意图提供上下文。简单来说，实体是你在对话过程中向用户寻求的那些值，你将根据这些值来定义机器人的结果或流程。\n\
  \n例如，对于你的 `FindTrip` 技能，如果用户说“我想预订一次旅行”，那么你知道用户的意图是预订旅行，但与此同时，这是一个非常笼统的陈述。相反，如果用户说“我想预订一次去美国的徒步旅行”，那么上下文就清晰得多。所以，用户想预订旅行，但去哪个地点？答案是去美国。这个有助于为意图提供恰当含义的地点，就被称为实体。因此，如果用户提供了地点，你就可以为他预订特定的旅行，否则你需要询问他地点，以便为他提供合适的预订选项。\n\
  \n实体分为两类：\n\n1.  内置实体\n2.  自定义实体\n\n内置实体或系统实体是 Oracle 作为数字助手实例的一部分提供给你的实体。自定义实体是你根据自己的需求创建的实体。\n\
  \n### 内置实体\n\n内置实体分为两类：\n\n1.  简单实体\n2.  复杂实体\n\n#### 简单实体\n\n简单实体基于原始类型，如字符串和整数。简单实体的示例包括：\n\
  \n*   `NUMBER`\n*   `EMAIL`\n*   `YES_NO`\n\n#### 复杂实体\n\n另一方面，复杂实体基于特定属性。表 5-2\
  \ 展示了复杂实体及其属性。\n\n表 5-2\n\n复杂实体\n\n| 实体 | 属性 |\n| --- | --- |\n| `ADDRESS` | `city`、`houseNumber`、`road`、`originalString`\
  \ |\n| `DATE` | `originalString`、`date` |\n| `TIME` | `hrs`、`mins`、`secs`、`\"hourFormat\"\
  :\"PM\"` |\n| `DURATION` | `startDate`、`endDate`、`originalString` |\n| `SET` | `minute`：范围为\
  \ {0–59}，`hour`：范围为 {0–23}，`dayOfTheMonth`：范围为 {1–31}，`monthOfTheYear`：范围为 {1–12}，`dayOfTheWeek`：范围为\
  \ {0–6}，以 0 表示星期日，`year` |\n| `CURRENCY` | `amount`、`currency`、`totalCurrency` |\n\
  | `PHONE_NUMBER` | `phoneNumber`、`completeNumber` |\n| `URL` | `protocol`、`domain`、`fullPath`\
  \ |\n\n### 自定义实体\n\n自定义实体是特定于技能的实体，你将创建它们来存储或检索自定义值。例如，对于金融机器人，你可以考虑使用 `AccountType`\
  \ 实体，它可以具有 `Savings` 和 `Current` 账户等值。或者对于 `PizzaBot`，`CrustType` 可以是 `Thin`、`Thick`\
  \ 或 `Medium`。\n\n以下是自定义实体的类型：\n\n*   **派生实体**：顾名思义，它们派生自内置实体或你定义的自定义实体。\n*   **值列表实体**：这些实体基于预定义的值列表。\n\
  *   **实体列表实体**：这些实体是实体的超集，并基于其他实体的列表。\n*   **正则表达式实体**：这些实体基于正则表达式（regex）来严格匹配特定模式。\n\
  *   **复合包实体**：这些实体是一组相关实体，可以解析到特定领域或特定功能。你可以通过不同方式配置复合包实体。你可以提示用户输入构成复合包的每个实体的值，也可以提示用户输入特定实体，并根据提供的实体值推导出复合包中的其余实体。\n\
  \n\n\n### 创建实体\n\n要创建实体，你需要深入找到要添加实体的技能，然后导航至实体部分。在接下来的几步中，你将向 `FindTrip` 技能添加 `TripLocation`\
  \ 实体：\n\n1.  点击 `FindTrip` 技能。\n2.  从左侧菜单导航至实体 (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figw_HTML.jpg](img/479330_1_En_5_Figw_HTML.jpg))。\n\
  3.  点击“+ 实体”按钮。\n\n这将添加一个默认名称为 `Entity1` 的新实体。然后你需要将其更新为 `TripLocation`。请参见图 5-22。\n\
  \n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig22_HTML.jpg](img/479330_1_En_5_Fig22_HTML.jpg)\n\
  \n图 5-22\n\n创建实体\n\n你可以通过点击“+ 值”按钮向列表中添加新值。这将弹出一个如图 5-23 所示的弹出窗口，你可以在其中向列表添加新值。\n\
  \n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig23_HTML.jpg](img/479330_1_En_5_Fig23_HTML.jpg)\n\
  \n图 5-23\n\n添加新值\n\n### 向意图添加实体\n\n创建 `TripLocation` 实体后，你需要将新创建的实体添加到 `SelectTrip`\
  \ 意图中。为此，只需遵循以下步骤：\n\n1.  导航至**意图**部分 (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figx_HTML.jpg](img/479330_1_En_5_Figx_HTML.jpg))。\n\
  2.  选择“SelectTrip”意图。\n3.  点击右侧的“+ 实体”按钮。\n4.  这将打开一个包含所有可用实体的弹出窗口。\n5.  点击“TripLocation”，即可将该实体添加到“SelectTrip”意图中。\n\
  \n请参见图 5-24。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig24_HTML.jpg](img/479330_1_En_5_Fig24_HTML.jpg)\n\
  \n图 5-24\n\n向意图添加实体\n\n由于你刚刚更新了意图，请确保按照本章前一节所述训练模型并测试你的意图。此外，如果你添加了实体，则在训练模型时应选中“实体”选项（图\
  \ 5-25）。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig25_HTML.jpg](img/479330_1_En_5_Fig25_HTML.jpg)\n\
  \n图 5-25\n\n训练技能\n\n## 使用对话流\n\n到目前为止，你已经熟悉了意图、表述和实体。现在是时候在对话流中使用它们了，这样你的技能就能具备处理对话的能力。对话流是设计技能对话的地方。技能应该如何问候、应该向用户询问什么、以及如何根据用户输入做出反应——所有这些都通过对话流中的各种组件来处理。因此，可以说对话流定义充当了任何技能的模型。\n\
  \n对话流是使用 Oracle Bots 标记语言 (OBotML) 设计的。OBotML 基于 YAML，这是一种表达数据和数据关系的人性化方式。\n\n你可以通过点击左侧导航栏中的“流”\
  \ (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figy_HTML.jpg](img/479330_1_En_5_Figy_HTML.jpg))\
  \ 来访问技能的对话流。在继续之前，理解构成对话流的各个部分至关重要。请参见图 5-26。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig26_HTML.jpg](img/479330_1_En_5_Fig26_HTML.jpg)\n\
  \n图 5-26\n\n对话流部分\n\n对话流大致可以分为三个部分：\n\n1.  头部：包含 OBotML 平台版本和对话流名称。\n2.  上下文：包含上下文和变量，也称为对话流变量，这些变量在流程中使用。\n\
  3.  状态：包含各个状态、动作及其结果。此部分包含技能交互和响应的主要逻辑。\n\n由于 OBotML 遵循 YAML 标准，因此在对话流中保持正确的缩进非常重要。如果你编写的行没有正确缩进，在设计时自动保存期间将会收到错误。\n\
  \n## 注意\n\n每个缩进的长度等于两个空格。\n\n流程的头部部分相当直接。它包含你的机器人的元数据信息。但涉及到上下文和状态时，你需要更仔细地查看。\n\
  \n### 上下文部分\n\n如前所述，你在上下文部分为技能定义了全局作用域的变量，然后可以在技能对话流的各个状态中使用这些变量。上下文部分中的变量定义如下：\n\
  \n`variableName`: “`variableType`”;\n\n显然，`variableName` 是你给变量起的名称。`variableType`\
  \ 是变量的类型，可以是：\n\n*   原始类型（`string`、`int`、`boolean`、`double` 和 `float`）\n*   内置实体（`CURRENCY`、`ADDRESS`\
  \ 等）\n*   自定义实体（如前面章节创建的 `TripLocation`）\n*   `nlpresult`，来自自然语言处理引擎的结果\n*   `resourcebundle`，用于你定义的引用技能中资源包的变量\n\
  \n这些变量在对话结束时或被显式重置时总是会被清除。\n\n### 状态部分\n\n状态是定义技能整个流程的地方。在这里，你定义技能应该执行的所有活动和动作。你的流程通常由许多状态组成。这些状态调用组件，组件为状态执行任务或工作。\n\
  \n## 注意\n\n一个状态只能调用一个组件。\n\n流程总是从上到下执行。这意味着在状态部分，你定义的第一个状态首先被执行，第二个状态接下来被执行，依此类推。这是默认行为，除非你显式设置转换到另一个状态。\n\
  \n此外，强烈建议在你的流程中设置一个默认转换，以优雅地处理因不可预见的用户输入而可能产生的任何意外异常/错误。\n\n在开始使用对话流之前，你还需要了解另外两件事：Apache\
  \ FreeMarker 模板语言 (FTL) 和对话流中的组件。\n\n首先，我们来处理 Apache FreeMarker 模板语言及其工作原理。\n\n\n\
  \n### Apache FreeMarker 模板语言\n\n为简单起见，在 ODA 环境中，您使用 Apache FreeMarker 模板语言 (FTL)\
  \ 来设置和访问变量的值（以及它们的属性，如果有的话）。如果您想了解更多关于 FTL 的信息，可以访问其官方网站 [`freemarker.apache.org/`](https://freemarker.apache.org/)。\n\
  \n在对话流中使用 FTL 的语法相当直接。您只需将想要使用 FTL 处理的所有内容包裹在 `${…}` 中。您可以在组件的属性定义中使用 FTL（组件将在本章下一节中描述）。例如，如果您定义了一个名为\
  \ `myVariable` 的变量，并想读取它的值，那么您只需使用：\n\n- `${myVariable.value}`\n\n或者，如果您定义了一个变量，它是一个类型为\
  \ `ADDRESS` 的复杂实体，比如 `userAddress`，那么您可以使用 FTL 来提取城市，如下所示：\n\n- `${userAddress.value.city}`\n\
  \nFTL 的用途不仅限于此。您还可以使用 FTL 在流程中编写复杂的表达式。一个非常常见的场景是在 `System.CommonResponse` 组件中使用\
  \ FTL，您可以在其中使用 `if`、`else` 或 `elseif` 指令定义条件。其语法如下：\n\n- `<#if yourCondition>result1<#else>result2</#if>`\n\
  - `<#if firstCondition>result1<#elseif secondCondition>result2<#elseif thirdCondition>result3</#if>`\n\
  \n当然，FTL 的使用并不仅限于 `CommonResponse` 组件，您可以在整个对话流中使用它们，用于在机器人响应中赋值或进行评估。\n\n此外，您还可以使用\
  \ FTL 支持的各种操作，例如针对字符串、数字、日期时间值等的操作。要了解更多信息，请参考链接 [`freemarker.apache.org/docs/ref.html`](https://freemarker.apache.org/docs/ref.html)。\n\
  \n对 FTL 进行冗长的讨论，涵盖所有这些用例和操作，可能会超出本书的范围。因此，我们在此结束本节。任何 FTL 的进一步用法将在需要时进行解释。\n\n###\
  \ 对话流中的组件\n\n您想在技能中实现的任何功能都来自组件。无论您是想显示卡片或列表、根据用户输入执行特定操作、显示任何输出、状态转换、处理错误等，甚至是想执行某些特定任务（如调用\
  \ REST 调用来处理用户响应），您都将借助组件来完成所有这些操作。\n\n组件可以大致分为两类：\n\n- 内置组件\n- 自定义组件\n\n顾名思义，内置组件是\
  \ Oracle 作为数字助手框架的一部分提供给您的组件，供您在技能中使用。这些组件足以执行大多数技能操作。您可以在流程中轻松识别这些组件，因为它们总是在 `states`\
  \ 部分的 `component` 下以 `System.` 开头。请参考图 5-26。\n\n如果在任何时候，您想在技能中执行某些无法使用内置组件完成的操作，那么您可以定义自己的组件。您为执行特定任务而创建的这些组件称为自定义组件。\n\
  \n#### 内置组件\n\n如前所述，这些是 ODA 框架中预定义的组件。要将内置组件添加到您的流程中，您需要点击编辑器顶部的 `+ Components`\
  \ 按钮。这将打开一个新窗口，如图 5-27 所示，为您提供多种组件类型可供选择。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig27_HTML.jpg](img/479330_1_En_5_Fig27_HTML.jpg)\n\
  \n图 5-27 组件类型\n\n如上图所示，ODA 为您提供了五种类型的内置组件。通过选择一种组件类型，您可以选择属于该类型的组件模板。下面，您可以找到属于图\
  \ 5-27 中所示每种组件类型的完整组件模板列表：\n\n1.  控制\n    1.  `component: \"System.ConditionEquals\"\
  `\n    2.  `component: \"System.ConditionExists\"`\n    3.  `component: \"System.Switch\"\
  `\n\n2.  语言\n    1.  `component: \"System.DetectLanguage\"`\n    2.  `component:\
  \ \"System.Intent\"`\n    3.  `component: \"System.MatchEntity\"`\n    4.  `component:\
  \ \"System.QnA\"`\n    5.  `component: \"System.TranslateInput\"`\n    6.  `component:\
  \ \"System.TranslateOutput\"`\n\n3.  安全\n    1.  `component: \"System.OAuth2AccountLink\"\
  `\n    2.  `component: \"System.OAuthAccountLink\"`\n\n4.  用户界面\n    1.  `component:\
  \ \"System.AgentConversation\"`\n    2.  `component: \"System.AgentInitiation\"\
  `\n    3.  `component: \"System.CommonResponse\"`\n    4.  `component: \"System.List\"\
  `\n    5.  `component: \"System.Output\"`\n    6.  `component: \"System.ResolveEntities\"\
  `\n    7.  `component: \"System.Text\"`\n    8.  `component: \"System.Webview\"\
  `\n\n5.  变量\n    1.  `component: \"System.CopyVariables\"`\n    2.  `component:\
  \ \"System.ResetVariables\"`\n    3.  `component: \"System.SetVariable\"`\n\n要添加这些类型的组件及其完整状态，您需要点击该类型，然后系统会为您提供添加该类型特定组件的选项。请参考图\
  \ 5-28，这是您在选择控制类型时看到的界面。您只需选择 `Apply` 按钮即可将组件添加到您的流程中。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig28_HTML.jpg](img/479330_1_En_5_Fig28_HTML.jpg)\n\
  \n图 5-28 添加控制类型组件\n\n在上图中，您可以看到，当您添加一个内置组件时，框架会为您提供一个预构建的代码片段，然后您可以根据自己的需求对其进行更新。如果您留意，`Insert\
  \ After` 下拉菜单允许您选择在流程中的哪个状态之后添加您的组件。同样，`Remove Comments` 切换开关允许您添加带注释或不带注释的组件。\n\
  \n随着您阅读本书的深入，您将看到这些组件的使用。一些组件，例如用于问答和用户代理的组件，将在单独的章节中进行介绍，以使您熟悉它们。其他通用组件将在可行的情况下根据其用途进行解释。\n\
  \n\n\n### 自定义组件与 Webview\n\n当内置组件无法满足特定需求时，您可以创建自定义组件。自定义组件在技能中作为服务实现。为技能定义自定义组件服务后，您可以在对话流中引用它们。\n\
  \n考虑一个基于用户输入通过 API 访问数据的场景，您需要检索某些特定于用户的详细信息。这种需求无法通过内置组件满足，您需要编写自己的自定义逻辑，在自定义组件中实现此类场景。在流程中引用自定义组件的方式如下：\n\
  \n*   `component: \"YourCustomComponentName\"`\n\n您使用 JavaScript 编写自定义组件代码。为方便起见，Oracle\
  \ 为您提供了用于实现自定义组件的 SDK。自定义组件可以通过三种不同的方式实现：\n\n1.  在 Oracle Digital Assistant 的嵌入式容器中部署自定义组件\n\
  2.  作为使用 Oracle Mobile Hub（Oracle Mobile Cloud）的 API\n3.  作为外部 Node 服务\n\n要向技能添加自定义组件，请从左侧导航菜单导航到“组件”（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figz_HTML.jpg](img/479330_1_En_5_Figz_HTML.jpg)）部分。选择“自定义”选项卡（默认选中）。请参考图\
  \ 5-29。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig29_HTML.jpg](img/479330_1_En_5_Fig29_HTML.jpg)\n\
  \n图 5-29：添加自定义组件\n\n然后您需要点击 `+ Service` 按钮，该按钮将提供上述用于实现自定义组件的选项。请参考图 5-30。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig30_HTML.jpg](img/479330_1_En_5_Fig30_HTML.jpg)\n\
  \n图 5-30：创建自定义组件服务\n\n自定义组件将在第 10 章中详细说明。\n\n请参考图 5-29。在“自定义”选项卡旁边，您还有另一个“Webview”选项卡。点击“Webview”选项卡。在这里，您可以为技能创建\
  \ Webview 组件。顾名思义，Webview 允许您将网页集成到技能中。通过点击“Webview”选项卡上的 `+ Service` 按钮，您可以为技能创建\
  \ Webview 服务，如图 5-31 所示。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig31_HTML.jpg](img/479330_1_En_5_Fig31_HTML.jpg)\n\
  \n图 5-31：创建 Webview 服务\n\nWebview 组件将在第 8 章中详细讨论。\n\n## 将技能添加到数字助理\n\n如本章前面所述，您可以使用技能向数字助理添加各种功能。当具有特定功能的技能准备就绪后，您发布这些单独的技能，并将已发布的技能添加到数字助理。此外，技能必须发布才能添加到数字助理。假设您的技能\
  \ `FindTrip` 已准备就绪并已发布，本节将重点介绍如何将 `FindTrip` 技能添加到数字助理 `Travvy`。\n\n通过点击菜单（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figaa_HTML.jpg](img/479330_1_En_5_Figaa_HTML.jpg)）图标，导航到\
  \ Oracle Digital Assistant 欢迎屏幕的“数字助理”部分，如图 5-32 所示。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig32_HTML.jpg](img/479330_1_En_5_Fig32_HTML.jpg)\n\
  \n图 5-32：导航到数字助理\n\n在数字助理屏幕上，点击“新建数字助理”，如图 5-33 所示。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig33_HTML.jpg](img/479330_1_En_5_Fig33_HTML.jpg)\n\
  \n图 5-33：添加新的数字助理\n\n这将为您打开一个新的弹出窗口。在弹出窗口中添加 `Display Name` 为 `Travvy`，`Description`\
  \ 为 `The Digital Assistant for Extreme Hiking Holidays`，然后点击 `Create` 按钮。创建完成后，您将被重定向到“数字助理详细信息”屏幕（请参考图\
  \ 5-34），这也会在数字助理主屏幕上添加一个新的 Travvy 部分。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig34_HTML.jpg](img/479330_1_En_5_Fig34_HTML.jpg)\n\
  \n图 5-34：数字助理详细信息屏幕\n\n点击 `+ Add Skill` 按钮，如图 5-33 所示，以添加 `FindTrip` 技能。这将重定向您到“技能目录”屏幕。点击\
  \ `FindTrip` 技能的“添加技能”（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figab_HTML.jpg](img/479330_1_En_5_Figab_HTML.jpg)）。完成后，您将收到一条确认消息，表明技能已成功添加。\n\
  \n导航回 `Travvy`。由于您刚刚通过向数字助理添加新技能进行了更改，您会注意到一个训练指示（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figac_HTML.jpg](img/479330_1_En_5_Figac_HTML.jpg)）。您将拥有与技能相同的训练模型，即\
  \ `Trainer Ht` 和 `Trainer Tm`，其中 `Trainer Ht` 是默认模型。使用默认的 `Trainer Ht` 模型训练您的数字助理。\n\
  \n向您的技能添加一些示例语句，以区分一个技能与其他技能。在此情况下，您也将为 `FindTrip` 技能添加一些此类语句。最后，您的数字助理 `Travvy`\
  \ 的技能部分将类似于图 5-35。\n\n## 注意\n\n这些语句并非用于训练您的数字助理。相反，它们会显示在数字助理帮助中。数字助理训练所用的语句来自已配置的技能。\n\
  \n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig35_HTML.jpg](img/479330_1_En_5_Fig35_HTML.jpg)\n\
  \n图 5-35：将技能添加到数字助理\n\n这就是如何将技能集成到数字助理中的方法。\n\n## 总结\n\n既然您已经学习了这么多，现在是时候快速回顾一下了。\n\
  \n本章开始时，您熟悉了 Oracle Digital Assistant (ODA) 环境、数字助理以及技能。然后，您深入探讨了技能以及语句、意图和实体的基本概念，以及如何在技能中使用它们。下一步是对话流，您了解了如何处理技能与人的交互，以及如何使用\
  \ Digital Assistant 框架中可用的各种组件来处理用户输入，从而构建技能通信。最后，您学习了如何创建数字助理并将技能集成到其中。\n\n我们建议您清晰理解本章讨论的概念。在接下来的章节中，我们将假定您已熟悉这些概念，并将带您了解\
  \ ODA 的更高级概念。\n\n"
- '# 第四部分：增强您的数字助理




  '
- '# 6. 通过渠道发布你的数字助手


  当你决定在业务中引入数字助手时，想必你已经清楚自己的目标受众。了解目标受众将帮助你确定让数字助手触达他们的最佳方式。当你开始设计数字助手或技能时，只有你和有权访问该特定云实例的人才能使用它。为了让你的数字助手或技能可供业务用户使用，你需要一个渠道来将其发布给他们。顾名思义，渠道充当一种媒介，你通过它将技能或数字助手提供给最终用户。


  选择合适的渠道来发布数字助手对其成功与否起着至关重要的作用。例如，如果最终用户无法轻松访问你的数字助手或技能，他们可能会倾向于避开它，转而选择相对更简单的途径来完成任务。同时，如果你的聊天机器人旨在提供用户敏感信息，你可能希望将其限制在更安全、更封闭的渠道中。


  设想一个场景，你允许用户通过你的数字助手执行日常银行任务，例如查询账户余额或进行转账。在这种情况下，你可能希望通过银行的网页门户和/或他们的移动应用程序来发布你的数字助手。这可能是出于两个原因。首先，任何银行的网页门户都相当安全。其次，因为此类信息和任务仅针对该银行的用户，你不希望有不必要的用户访问。


  另一方面，考虑一个你正在为外卖配送设计数字助手的场景。为了让你的数字助手易于访问并广受欢迎，除了网页渠道之外，你可能还希望将其发布到各种其他消息渠道上——例如
  Facebook Messenger、Skype、Microsoft Teams 等。


  简而言之，你始终需要根据数字助手的目的和目标受众来决定选择哪个渠道。


  现在你已经了解了渠道的重要性，让我们来看看 Oracle 数字助手平台提供的各种开箱即用的渠道。


  ## Oracle 数字助手中的渠道类型


  Oracle 数字助手中的渠道大致分为四种类型。它们是：


  1.  用户

  2.  坐席集成

  3.  应用程序

  4.  系统


  ### 用户渠道


  用户渠道允许你通过面向用户的平台发布你的技能或数字助手。以下是用户渠道的列表：


  *   Facebook Messenger

  *   Webhook

  *   Web

  *   iOS

  *   Android

  *   Twilio SMS（仅文本）

  *   微信

  *   Slack

  *   Microsoft Teams

  *   Cortana

  *   Skype for Business


  ### 坐席集成


  顾名思义，当你希望在对话过程中引入人工坐席时，可以创建坐席集成渠道。坐席集成使用 Oracle Service Cloud（18C 或更高版本）将用户在对话过程中提供的信息传递给在线坐席。这样，当在线坐席从机器人接管对话控制权并开始与用户交互时，他们无需再次要求用户提供所需信息。坐席集成将在本书的单独章节中详细讨论。


  ### 应用程序渠道


  当你希望进行事件驱动的对话时，会使用应用程序渠道。简单来说，你根据来自不同应用程序生成的事件，在特定的（机器人流程）状态下启动与你的技能或数字助手的对话。


  ### 系统


  这是你的 Oracle 数字助手实例的特定于系统的默认渠道。此渠道用于使用技能测试器测试你的技能或数字助手。你无法自行创建任何额外的系统渠道。这里需要重点说明的是，对此渠道所做的任何更改都将应用于该实例中的所有技能以及数字助手。


  ## 使用渠道


  在本节中，你将学习为你的 Oracle 数字助手（ODA）创建渠道。登录你的 ODA 实例，点击左上角的图标打开侧边菜单。选择“开发”部分下的“渠道”。请参考图
  6-1。这将带你进入“渠道”屏幕。


  进入“渠道”屏幕后，你会注意到它包含四个不同的选项卡，分别对应上一节讨论的每种渠道类型。默认情况下，当你导航到“渠道”时，会显示“用户”选项卡，如图 6-2 所示。如果你创建过任何预配置的用户渠道，它也会显示一个列表。


  此部分允许你创建新的用户渠道，以及维护（即更新或删除）之前创建的用户渠道。这将在本章后续部分详细讨论。


  接下来，点击“坐席集成”选项卡。此选项卡允许你创建和管理坐席集成渠道。与“用户”选项卡类似，如果你碰巧有预配置的渠道，它会显示出来。如图 6-3 所示，我们尚未创建任何坐席集成。因此，这里没有显示任何渠道。


  点击下一个选项卡，“应用程序”。此选项卡允许你为 ODA 实例创建和管理你的应用程序渠道。与之前的选项卡类似，你可以找到所有之前创建的应用程序渠道（如果有的话）。请查看图
  6-4。


  点击此屏幕的最后一个选项卡，即“系统”。如图 6-5 所示，此选项卡带有预构建的默认 `System_Global_Test` 渠道。


  如果你在此屏幕上切换“渠道已启用”开关，它将根据你的选择启用或禁用 ODA 实例中的所有技能测试器。“重置会话”按钮也是如此。点击此按钮，所有技能测试器会话都将被重置。




  ## 注意


  您的数字助理实例中所有频道均设有“频道启用”开关。此开关允许您启用或禁用任何特定频道。


  假设您已熟悉各种频道类型及其重要性，下一节将开始创建“用户”频道，重点介绍 Web 频道。基于 Travvy 的用例，本章将把讨论范围限定在 Web 频道。如前所述，Webhook
  和代理集成将在单独的章节中详细讨论。频道的概念对于其他频道类型是相同的，但其配置会有所不同。如果您需要配置其他频道类型，建议您参考 Oracle 文档。


  既然本章的目的已经明确，让我们回到为 Travvy 创建和配置 Web 频道的工作。


