  trans: "\n# 注意\n\n`ssml-builder` 节点包的扩展文档可在 [`www.npmjs.com/package/ssml-builder`](http://www.npmjs.com/package/ssml-builder)\
    \ 找到。\n\n## 语音合成标记语言 (SSML)\n\n语音合成标记语言 (SSML) 是一种基于 XML 的标记语言。SSML 允许开发者指定如何使用文本转语音服务将输入文本转换为合成语音。SSML\
    \ 使开发者能够微调文本转语音输出的音高、发音、语速、音量等。标点符号（例如句号后的停顿，或句子以问号结尾时使用正确的语调）会自动处理。\n\n万维网联盟\
    \ (W3C) 有一项关于语音合成标记语言的推荐标准，可在此处找到：[`www.w3.org/TR/speech-synthesis11/`](http://www.w3.org/TR/speech-synthesis11/)。\n\
    \n使用 SSML，你可以通过特定文本指示文本转语音服务如何“朗读”你的文本，如下面的代码示例所示：\n\n```\n\"Hi, this output speech\
    \ uses SSML. It is part of this chapter.\"\n```\n\n这个示例可以通过添加额外的标签来增强。下一个示例展示了如何在句子中添加\
    \ 1 秒的停顿：\n\n```\n\"Hi,  this output speech uses SSML. It is part of this chapter.\"\
    \n```\n\n你还可以更改用于朗读句子某部分的语音：\n\n```\n\"Hi,  this output speech uses SSML.  It\
    \ is part of this chapter. \"\n```\n\n并且还有许多其他方法可以改变文本转语音的行为。\n\n## 注意\n\nSSML\
    \ 尚未完全标准化。任何供应商都会在其平台上使用自己特定的实现和扩展。请确保你了解目标平台支持哪些标签。\n\n## Webhook 代码\n\n要实现 webhook\
    \ 代码，你有两个选择。第一个是完全自己编写所有逻辑和底层代码。这可能会给你带来一些灵活性，但也会增加大量的编码工作。第二个选择（也是我们在本书中使用的）可能更明智一些。Oracle\
    \ 产品管理团队创建了一个可用的示例库，可以作为 Alexa 集成的基础。此代码使用了 `bots-node-sdk`。`bots-node-sdk` 包含以下库，用于促进你的\
    \ webhook 与 Oracle Digital Assistant 之间的通信：\n\n*   `OracleBot.Util.Webhook`\n\
    *   `OracleBot.Util.MessageModel`\n*   `OracleBot.Lib.MessageModel`\n*   `OracleBot.Util.Text`\n\
    \n因此，无需编写消息签名和建模 Alexa 与 ODA 之间消息等底层代码，你可以简单地通过 `require` 定义使用 `bots-node-sdk`，然后使用该\
    \ SDK 内部的库。\n\n```\nconst OracleBot = require('@oracle/bots-node-sdk');\nconst\
    \ MessageModel = OracleBot.Lib.MessageModel;\nconst messageModelUtil = OracleBot.Util.MessageModel;\n\
    const botUtil = OracleBot.Util.Text;\nconst webhookUtil = OracleBot.Util.Webhook;\n\
    ```\n\n有了这段通用的 Node 代码，你就可以将 webhook 用于任何你想通过 Alexa 公开的技能。Alexa 和 ODA 之间 webhook\
    \ 的最终配置也需要在此 Node 代码中完成。你将在本章后面学习如何做到这一点。\n\n## 了解 Travvy\n\n通过 Alexa 公开 Travvy\
    \ 的过程相当直接，仅包含几个配置步骤。我们将引导你完成这些步骤，并逐一解释。\n\n### 向 ODA 添加 Webhook 通道\n\n第一步是在 ODA\
    \ 中创建一个新通道。这必须是一个 webhook 通道，因为这是此类通道所需的类型。你可以简单地点击“创建通道”按钮，并填写所有需要的字段（图 11-3）。请注意，在“出站\
    \ Webhook URI”中，你必须设置你的服务器 URL 以及 webhook 代码期望接收来自 ODA 消息的端点。此处使用 `https://your-server-url/genericBotWebhook/messages`，因为\
    \ webhook 代码将运行的 URL 尚不清楚。端点将是 `/genericBotWebhook/Messages`，因为这是在 webhook 代码中定义的方式。\n\
    \n![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig3_HTML.jpg](img/479330_1_En_11_Fig3_HTML.jpg)\n\
    \n图 11-3\n\n在 ODA 中创建通道\n\n当你点击“确定”时，webhook 通道将被创建，你将看到（图 11-4）添加了两个额外字段，这两个字段在\
    \ webhook 代码的配置中都需要用到：\n\n1.  Webhook URL：你的 webhook 将用于向 ODA 发送消息的 URL。\n2. \
    \ 密钥：你的 webhook 需要对发送给 ODA 的消息进行签名所使用的密钥，ODA 将使用该密钥来检查传入的消息是否使用正确的密钥签名。\n\n  \
    \  ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig4_HTML.jpg](img/479330_1_En_11_Fig4_HTML.jpg)\n\
    \n    图 11-4\n\n    生成的密钥和 Webhook URL\n\n这就是在 Oracle Digital Assistant 中所需的所有操作。只需添加并配置该通道，你的\
    \ Digital Assistant（或技能）现在就可以通过这个最终将被 Alexa 使用的 webhook 通道进行访问。\n"
- fmt: '### Configuring Alexa


    The way to interact with Alexa is by sending a command (either speech or text)
    to an Alexa-enabled device. This command will be forwarded to a skill running
    on Amazon’s Alexa Service and eventually to services or data sources that can
    provide the requested information. To enable Oracle Digital Assistant to work
    with Alexa, a custom skill has to be created, which will invoke a REST endpoint,
    will forward the Alexa request to our DA, and will also get the DA’s response
    and send it back to Alexa.


    To create this skill for Alexa and make it work, Alexa needs to be configured.
    The steps involved in this will be explained in the next sections.


    #### An Alexa Invocation Sentence


    The invocation sentence is needed to begin an interaction with a particular custom
    skill (Figure 11-5). To invoke Travvy, you can use, for instance, “Travvy travel.”
    So whenever the user says “Alexa, Travvy travel,” this custom skill will be invoked.
    Now, to book a trip, the user can say “Alexa, ask Travvy travel to book me a trip.”


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig5_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig5_HTML.jpg)


    Figure 11-5: Set up invocation name


    #### Alexa Intents and Slot Types


    With an intent, you try to say what is it that you want, what is your intention.
    It typically consists of a sentence. Intents can optionally have arguments called
    slots. Slots are basically *variables in utterances*. A slot can have a predefined
    value but is by default empty. To define a slot, you first need to create a custom
    Intent in your Alexa skill (Figure 11-6). After that, when you need to create
    your sample utterances for the Intent, simply define a slot by writing it in curly
    brackets.


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig6_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig6_HTML.jpg)


    Figure 11-6: Alexa add intent


    Slot values are extracted from utterances and sent with the intent request. Actual
    intent resolution will not be done by Amazon Alexa but by our Oracle Digital Assistant.
    This means that you can use slot type `AMAZON.LITERAL` (Figure 11-7). This slot
    will hold the text representation of whatever the user said. The entire content
    of this slot will then be forwarded to the skill’s endpoint and to Oracle Digital
    Assistant for intent resolution.


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig7_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig7_HTML.jpg)


    Figure 11-7: Alexa add a slot type


    #### An Endpoint


    The actual logic for the custom skill will in our case be running on a REST endpoint
    implemented in Node.js and run on a server that hosts the Alexa app.


    For the purpose of this demo, it will be running locally, with an `ngrok` URL
    for it. The endpoint needs to be added to root URL of the server that hosts the
    Alexa app, in our case the local `ngrok`.


    In the HTTPS endpoint field, you need to fill out the exact URL of this (Figure
    11-8):


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig8_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig8_HTML.jpg)


    Figure 11-8: Alexa configure endpoint


    With this in place, the custom Alexa skill is configured. Finally you need to
    find the Skill ID so it can be used in the configuration section of our node code.
    The Skill ID can be found from the Alexa Skills Kit (ASK) Developer Console (Figure
    11-9):


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig9_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig9_HTML.jpg)


    Figure 11-9: Alexa find the Skill ID


    This ID needs to be added to the node code of the webhook that was previously
    created so the webhook knows where to find the Alexa skill.


    ### Setting Up the Webhook


    In order to set up the webhook between Oracle Digital Assistant and Amazon Alexa,
    they need to know where to find each other. To achieve this, you need to add the
    previously generated **Secret Key**, **Channel URL**, and **Amazon Skill ID**
    to the metadata settings in the JavaScript code:


    ```javascript

    //replace these settings to point to your webhook channel

    var metadata = {

    allowConfigUpdate: true,

    waitForMoreResponsesMs: 200,

    amzn_appId: "",

    channelSecretKey: '''', //BOT Secret Key

    channelUrl: ''''

    };

    ```


    ### Testing the Alexa Channel


    The conversation over Alexa can be easily tested with the Alexa developer console
    (Figure 11-10). Simply go to the test tab, and start typing your commands, or
    if you like it, you can even talk to Alexa.


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig10_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig10_HTML.jpg)


    Figure 11-10: Alexa, testing in the console


    Another option is to use a smartphone which removes the need of involving a real
    Amazon Echo or Alexa device. You can use the official Alexa app on your smartphone.
    The following example shows how to run Alexa on Android phone. In the Google Play
    Store, search for Alexa and select Amazon Alexa. Tap the Install button and wait
    while the Amazon Alexa app downloads onto your device. Once you have installed
    Alexa on your phone, you will need to set it up. Open the Amazon app and log in
    using your existing Amazon account information, including your email address (or
    phone number, if you have a mobile account) and password. Tap the Sign In button.


    Once logged in, you should be able to use the app as were it an Amazon Echo or
    Dot and invoke the skill that calls the Oracle Digital Assistant. Click the skill
    to view more information or simply click the Alexa button to talk to Alexa and
    ask her to get Travvy to find you a trip (Figure 11-11).


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig11_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig11_HTML.jpg)


    Figure 11-11: Alexa, skill testing in app


    It is obvious that a conversation over a voice channel is different from a conversation
    over a text or web channel. A voice channel will not be able to show images, for
    instance, nor will it allow you to click links or invoke webview components to
    enter additional data. However, it is possible to work with the differences. The
    Digital Assistant can send channel-specific replies. In a dialog flow, you can
    tell about the channel type and the name of the channel being used from expressions
    and in custom components. This would give you the option to optimize your dialog
    flow for use with voice.


    In addition, the `System.CommonResponse` component could show or hide response
    items based on the channel type and name.


    In the previous sections, you learned how to technically set up Alexa as a channel.
    It works, but the conversation is somewhat cumbersome. What you probably notice
    is that working with a voice channel is that it requires a special design of the
    conversation. The next section gives you some hints on how to design a voice user
    experience (VUX).'
