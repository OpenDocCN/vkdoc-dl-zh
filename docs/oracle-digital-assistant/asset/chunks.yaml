  trans: "\n# 用户画像的益处\n\n用户画像之所以有益，是因为它们有助于聚焦和定位你的思考。用户画像能帮助你以更具体的方式思考受众及其需求。精心记录用户画像的益处包括：\n\
    \n-   将焦点放在“真实用户的需求……”上。\n-   帮助设计师/开发者更容易地与用户产生共鸣。\n-   对许多不同的利益相关者都有用：\n   \
    \ -   业务开发（战略制定）\n    -   营销团队（吸引用户）\n    -   设计团队（为用户设计）\n-   用户画像能促进团队内部达成共识。当用户画像被采纳时，这一点会变得很明显。然后团队开始直呼其名地引用它们，“凯莉绝不会想那样做”……而其他人也不会问凯莉是谁。\n\
    -   用户画像能提高效率。\n-   用户画像既能代表当前用户，也能代表未来用户。它们帮助团队更多地思考对话式体验的未来用途。\n-   用户画像能激发突破性思维。\n\
    \n创意/开发团队中的每个人现在都对他们正在为其创建对话式体验的用户形象有了概念。在向设计/开发团队介绍用户画像后，通过张贴用户画像海报，它们将更顺利地被采纳，并在开发过程中逐渐深入人心。\n\
    \n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig7_HTML.jpg](img/479330_1_En_2_Fig7_HTML.jpg)\n\
    \n图 2-7  \n墙上真人大小的用户画像将时刻印在团队脑海中\n\n用户画像使团队能够基于对用户的了解来设计聊天机器人。他们开发什么、如何运作、想要达成什么目标，以及同样重要的语气语调，都可以基于你对用户的了解。\n\
    \n## 用户旅程地图\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig8_HTML.png](img/479330_1_En_2_Fig8_HTML.png)\n\
    \n图 2-8\n\n既然我们已经对对话式体验的用户有了清晰的认识，接下来需要弄清楚他/她将经历怎样的旅程，通过使用我们即将创建的聊天机器人等触点/渠道来实现其目标。实现这一目标的一个著名方法是定义用户/客户旅程地图。\n\
    \n客户旅程描述了客户在与您公司的品牌、产品、服务、网站或应用程序互动时所经历的所有体验。客户遇到的触点被用来构建旅程并创建一个引人入胜的故事，详细描述他们的互动及伴随的情感。\n\
    \n客户旅程不仅仅着眼于交易或体验的一部分，而是记录了作为客户的完整体验。对话式体验可以为客户旅程的每个部分增加价值，例如，从客户下第一笔订单到即时回答与产品相关的问题。\n\
    \n### 如何创建用户/客户旅程地图？\n\n识别用户与您的产品、服务、网站或应用程序互动的触点至关重要。一旦确定了触点，就可以将它们按顺序连接起来，代表客户在与各个触点互动时所遵循的路径。图\
    \ 2-9 展示了一个整体客户旅程地图的示例，其中包含了用户规划并通过史基浦机场使用公共交通前往阿姆斯特丹进行短途旅行的所有可能触点和路径。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig9_HTML.jpg](img/479330_1_En_2_Fig9_HTML.jpg)\n\
    \n图 2-9  \n展示不同路径的旅程地图示例\n\n你需要分析客户执行的活动，并记录他们在旅程的每个活动中正在做什么。\n\n描述旅程中的每个相关时刻，并尝试识别以下内容：\n\
    \n-   使用情境：他们在何时何地使用该触点。\n-   他们想要达成什么目标（他们的意图）？\n-   他们采取了哪些步骤来实现目标？\n-   他们考虑什么？\n\
    \    -   他们有疑问吗？\n    -   是否存在不确定性？\n-   什么影响了客户？\n    -   是什么激励了他们？\n    -  \
    \ 是否存在令人气馁的障碍？思考任何可能导致客户在旅程中放弃的因素。\n    -   他们感受到了什么情绪？\n-   他们期望得到什么反馈？\n\n这将形成一个更详细的客户体验可视化图。图\
    \ 2-10 提供了此类可视化图的一个示例。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig10_HTML.jpg](img/479330_1_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10  \n详细的客户/用户旅程地图\n\n### 为什么客户旅程地图如此有用？\n\n客户旅程地图的益处包括：\n\n-   它从用户的角度出发，为你提供了影响体验因素的高层概览。\n\
    -   该地图提供了对触点（未来）使用情况（使用情境、使用频率）的洞察。\n-   它有助于识别问题领域和创新机会。例如，你是否可以通过主动解决客户在旅程各阶段可能遇到的问题来改善客户体验？\n\
    -   地图中的不同阶段可用于进一步分析和创建使用场景。\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig11_HTML.jpg](img/479330_1_En_2_Fig11_HTML.jpg)\n\
    \n图 2-11  \n用户在场景创建中扮演主角。\n\n-   它有助于你确定优先级。\n-   在整个设计过程中，每一个重大的设计决策都将由客户旅程地图驱动。\n\
    \n### 下一步是什么？\n\n在完成用户/客户旅程地图后，你就知道了旅程的哪些部分至关重要。这些部分是经常发生或对用户至关重要的。目标是帮助用户从头到尾完成其中一个旅程，并确定这些旅程是否可以通过你的聊天机器人设计来服务。\n\
    \n## 渠道\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig12_HTML.png](img/479330_1_En_2_Fig12_HTML.png)\n\
    \n图 2-12\n\n聊天机器人设计的下一步是确定哪些渠道适合在用户的旅程中通过你的聊天机器人触达客户/用户，以及如何最好地利用这些渠道。\n\n关于应该使用哪些渠道来触达客户的问题有两个方面：\n\
    \n-   企业认为哪个渠道是借助聊天机器人向客户提供协助的最有效方式？它可能是企业已经用于触达客户的渠道之一，甚至是一个全新的渠道，企业将其视为触达更多客户并增加产品/服务销售的机会。\n\
    -   在哪个渠道中，客户最期望（甚至可能需要）聊天机器人的协助？\n"
- fmt: '### Facebook Messenger


    Facebook Messenger 聊天机器人非常适合营销和销售。它们提供了通过对话与潜在客户互动的途径，使公司能够围绕其产品对用户进行教育、推广和娱乐。聊天机器人还可以跟进在电商商店中放弃购物车的用户，甚至在
    Messenger 内完成销售。


    许多公司使用聊天机器人进行客户发掘和潜在客户生成。在这种情况下，它们用包含“发送到 Messenger”按钮的个性化行动号召，取代了用于获取客户/潜在客户电子邮件地址的典型“挤压”页面。通过这样做，用户无需输入任何内容，无需提供电子邮件地址或姓名。当然，通过
    FB Messenger，公司可以获取用户的真实姓名（大多数情况下）、性别以及他们系统的语言。


    Facebook 允许企业将 Messenger 作为网站上的客户聊天功能进行集成。人们可以在网站聊天窗口中开始对话，并在 Messenger 上继续。


    ### Twitter


    您的聊天机器人可以向在 Twitter 上提及您、您提供的服务或您公司的客户发送包含相关信息的直接回复。该机器人还可以使用 Twitter 直接向客户询问更多信息，以便提供更好的帮助。


    您可能用于对话体验的其他渠道包括 Web、Slack、iOS、SMS、Google Home、Android 和 Alexa。


    ## 对话设计


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig13_HTML.png](images/479330_1_En_2_Chapter/479330_1_En_2_Fig13_HTML.png)


    图 2-13


    下一步是设计您的机器人对话。它应该吸引用户并推动他们实现目标，同时确保公司的目标得以实现。


    理想情况下，对话由文本和附件（如音频、视频、图像和文件）混合组成。对话还可以呈现菜单和按钮，使用户能够快速回复。图 [2-14](#479330_1_En_2_Chapter.xhtml#Fig14)
    展示了此类对话的一个示例。


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig14_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig14_HTML.jpg)


    图 2-14


    带有快速回复选项的对话示例


    ### 聊天机器人的个性与语气


    每个机器人都有一种声音——这意味着每个机器人都需要个性。聊天机器人的个性由其风格、语气和态度决定。


    聊天机器人和语音助手是供人类使用的。对话界面负责处理人与计算机之间更好的交互。通过个性，我们可以个性化这些对话，使其更逼真、更亲密，并更具人类互动的代表性。构建丰富且详细的个性使您的聊天机器人对用户更具相关性、可信度和吸引力。它鼓励客户表现出更大的信任和粘性。


    个性有助于更好地理解机器人，以及它将如何通过语言、情绪、语气和风格的选择进行沟通。如果您不为聊天机器人创建个性，用户自己也会为其赋予一个个性。那么您将面临风险，即用户对您机器人的感知可能与您希望其关联的形象不符。


    #### 构建个性


    为了定义聊天机器人的个性，您需要再次经历创建人物角色的过程。创建一个能够真实代表理想客户、模仿人类互动的角色。模仿客户的个性是吸引用户的关键。定义年龄，描述态度、一些典型词汇和个性背景。您可以选择将其设为男性、女性或完全无性别。然而，机器人不应体现性别刻板印象，除非这符合您公司的品牌和目标。创建一个角色，并为其命名，并选择一个代表您公司且能吸引用户的图片/图标。


    在这样做时，请牢记以下几点：


    - 客户应在情感上与机器人的个性建立联系，从而与对话体验建立联系。

    - 如果机器人代表您的品牌，那么机器人的个性应与品牌的价值观和语气保持一致。许多公司在代表机器人的图片中使用其徽标（的一部分）。

    - 机器人应具有亲和力，但不应是真人。它应该以机器人的身份表达自己；绝不应伪装成人类。当用户不确定他们是在与人类还是机器交互时，他们会感到被误导，失去信任，并拥有糟糕的体验。客户应该知道他们正在与机器人打交道。例如，可以通过让机器人自我介绍为机器人来实现这一点。


    > *“你好！我是 Cuby。我是一个聊天机器人。有什么可以帮你的吗？”*


    #### 语气


    现在您已经定义了聊天机器人的个性，您需要了解机器人应该如何“说话”。您可以通过写下机器人的关键价值观来弄清楚这一点。您需要定义聊天机器人的态度、风格和语气，这些应反映其个性。然后决定应该使用什么词汇。


    然后，您可以将您设计的个性与您设想的语音结合起来，编写您的机器人消息。


    例如，一个酷酷的机器人：


    > *“嘿，Harold，咋样？我看到你正在查看这个超级酷的徒步旅行假期。我能帮你什么吗？”*


    或者一个严肃且专业的机器人：


    > *“你好 Amy，我看到你正在编辑你的工时表。我能帮上忙吗？”*


    ### 对话流程


    对话流程可以用流程图来可视化。为了创建对话，客户/用户旅程图非常有用。在地图中，您可以找到用户意图以及机器人（代表公司）应该如何反应。用户意图可以从用户当时正在做的事情中推断出来，或者通过机器人提出的问题（如对话开场白）来推断：


    > *“你好！我是 Cuby。我是一个聊天机器人。我能帮你处理预订吗？”*


    ### 设计激励性对话


    聊天机器人能够带来愉悦感并激励用户采取行动，这一点至关重要。当机器人满足用户的需求和愿望时，它就会带来愉悦感。激励能够促成某种行为。用户可能受到以下一个或多个因素的激励：


    #### 信息


    机器人提供的信息应与用户相关、易于理解、值得信赖，并能促成相关选择。用户还应能轻松了解机器人能做什么或不能做什么，以便设定正确的用户期望。机器人应清晰地传达其核心功能。如果用户意图被误解或系统无法实现，请诚实告知，让他们知道需要尝试不同的方法。


    > *“你知道我可以帮你处理……吗？”*


    > *“抱歉，我只能帮你处理有关飞往美国的航班的问题。”*


    > *“抱歉，我不明白你的意思，你能重新表述一下问题吗？”*


    #### 目标设定与承诺


    人们通过比较现状和理想的未来来设定目标。作为机器人对话的设计者，请确保您了解客户的目标，并引导他们实现这些目标。


    当用户致力于他们的目标时，他们更有可能坚持该行为并保持专注。


    训练机器人通过创建更具吸引力和更个性化的闲聊对话，与用户就个人话题进行互动。通过这样做，机器人也将学会预测未来用户的信息。


    > *“嘿 Jenny，你今天怎么样？”*


    #### 激励措施


    激励措施或奖励能激励用户表现出某种积极行为。激励和奖励并不总是经济上的；地位或便利性也可能对用户如何回应机器人产生重要影响。


    > *“如果你告诉我你的生日是哪天，我可以给你寄一张生日贺卡。”*'
  raw: '### Facebook Messenger


    Facebook Messenger chatbots are great for marketing and sales. They provide the
    means to engage prospects through conversations that allow companies to educate,
    evangelize, and entertain users around their products. The chatbot can allow also
    to follow up with users that abandon a cart in an ecommerce store and even to
    close the sale inside Messenger.


    Many companies use a chatbot for prospecting and lead generation. In this case,
    they replace the typical “squeeze” page used to get their customers’/prospects’
    email addresses with personalized calls to action that include a “Send to Messenger”
    button. By doing this, users don’t need to type anything. No email address or
    name. And of course, via FB Messenger, the company gets the users’ real name (most
    of the time), the gender, and their system’s language.


    Facebook allows enterprises to integrate Messenger as customer chat on web sites.
    People can start a conversation in a web site chat window and continue it on Messenger.


    ### Twitter


    Your chatbot can send, customers who tweet about you, about a service you provide,
    or about your company, a direct reply with relevant information. The bot can also
    use Twitter to directly ask the customer for more info so to even be of better
    assistance.


    Other channels which you might use for your conversational experience are Web,
    Slack, iOS, SMS, Google Home, Android, and Alexa.


    ## Dialog Design


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig13_HTML.png](images/479330_1_En_2_Chapter/479330_1_En_2_Fig13_HTML.png)


    Figure


    2-13. 


    The next step is to design your bot’s dialog. It should engage users and move
    them toward their goals, and it should make sure that the companies’ goals are
    achieved.


    The dialog ideally consists of a mix of text and attachments like audio, video,
    images, and files. The dialog also can present menus and buttons which enable
    the user to give a quick reply. Figure [2-14](#479330_1_En_2_Chapter.xhtml#Fig14)
    shows an example of such a dialog.


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig14_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    Example of a dialog with options for quick reply


    ### The Chatbot’s Personality and Tone of Voice


    Every bot has a voice – which means every bot needs a personality. The personality
    of a chatbot is determined by its style, tone, and attitude.


    Chatbots and voice assistants are to be used by humans. Conversational interfaces
    take care of better interactions between humans and computers. Through personality,
    we can personalize these conversations and make them more life-like, intimate,
    and representative of human interaction. Building a rich and detailed personality
    makes your chatbot more relatable, believable, and engaging to your users. It
    encourages customers to exhibit greater trust and stickiness.


    Personality creates a better understanding of the bot and how it will communicate
    through choice of language, mood, tone, and style. If you do not create a personality
    for your chatbot, the users themselves will assign a personality to the bot anyway.
    Then you run the risk that their perception of your bot is not the one you want
    it to be associated with.


    #### Building a Personality


    In order to define the chatbot’s personality, you go through the exercise of creating
    a persona again. Create a character that is a true representation of the ideal
    customer, which mimics human interactions. Mirroring a customer’s personality
    is key to engagement. Define the age and describe an attitude, some typical vocabulary,
    and a personality background. You have the option to make it male, female, or
    completely genderless. However, the bot should not embody gender stereotypes unless
    that fits your companies’ brand and goals. Create a persona, and give it a name
    and a picture/icon that represents your company and appeals to the user.


    By doing that, keep the following in mind:


    *   The customer should emotionally connect to the bot’s personality and therefore
    to the conversational experience.


    *   If the bot represents your brand, the bot’s personality should align with
    the values and tone of the brand. Many companies use (part of) their logo in the
    picture that represents the bot.


    *   The bot should be personable, but not a person. It should express itself as
    a bot; it should never disguise itself as human. When users are unsure if they
    are interacting with a human or a machine, they’ll feel misled, lose trust, and
    have a poor experience. Customers should know they are dealing with a bot. This,
    for example, can be achieved by letting the bot introduce itself as a bot.


    > *“Hi! I‘m Cuby. I am a chatbot. How can I help you?”*


    #### The Tone of Voice


    Now that you defined the personality of the chatbot, you need to understand how
    the bot should “speak.” You can figure that out by writing down key values of
    the bot. You define the chatbot’s attitude, style, and tone which should reflect
    its personality. Then you decide what vocabulary should be used.


    You then can bring together the personality you designed and the voice you envisioned,
    to write your bot messages.


    For example, the bot as a cool dude:


    > *“Hey, Harold, wassup? I see you’re checking out this super chill hiking holiday.
    How can I help you out?”*


    Or a serious and professional bot:


    > *“Hi Amy, I see you’re editing your timesheet. Can I be of help?”*


    ### The Conversation Flow


    The conversation flow can be visualized in a flowchart. To create the conversation,
    the customer/user journey map is of great use. In the map, you can find the user
    intent and how the bot (which is representing the company) is supposed to react.
    The user intent can be deducted from what the user is doing at the time or by
    a question from the bot like a conversation starter:


    > *“Hi! I‘m Cuby. I am a chatbot. Can I help you with your booking?”*


    ### Designing a Motivating Dialog


    It is essential that the chatbot causes joy and motivates users to act. The bot
    causes joy when it fulfills the users’ needs and wants. Motivation enables a certain
    behavior. Users can be motivated by one or more of the following factors:


    #### Information


    The information given by the bot should be relevant to the user, easy to understand,
    and trusted and enable relevant choices. It should also be easy for users to know
    what the bot can or cannot do, in order to set the correct user expectations.
    The bot should clearly communicate its core functionality. If user intent is misunderstood
    or not achievable by the system, be honest and let them know they need to try
    a different approach.


    > *“Did you know I can help you with …?”*


    > *“I’m sorry, I can only help you with questions regarding flights to the USA”*


    > *“I’m sorry, I do not know what you mean, can you please rephrase the question?”*


    #### Goal Setting and Commitment


    People set their goals through a comparison of the present and the desirable future.
    As a designer of the bot’s dialog, make sure you know the customers’ goals and
    guide them toward those goals.


    The moment users are committed to their goals, it is more likely that they will
    pursue that behavior and stay focused.


    Train the bot to engage the user on personal topics by creating a more engaging
    and more personal chit-chat dialog. By doing that, the bot will learn to predict
    information about future users too.


    > *“Hey Jenny, how are you doing today?”*


    #### Incentives


    Incentives or rewards motivate users to a certain positive behavior. Incentives
    and rewards do not always have to be economical; status or convenience may also
    have important effects on how users respond to the bot.


    > *“If you tell me when it’s your birthday, I can send you a birthday card.”*'
