    #  platformVersion: the version of the bots platform that this flow was written
    to work with

    metadata:

    platformVersion: "1.0"

    main: true

    name: TravvyWebviewExternal

    #context: Define the variables which will used throughout the dialog flow here.

    context:

    variables:

    travellerFirstName: "string"

    appResponse: "string"

    #states is where you can define the various states within your flow.

    states:

    askTravelerInfo:

    component: "System.Text"

    properties:

    prompt: "To proceed with booking, please provide your first name."

    variable: "travellerFirstName"

    transitions:

    next: "webview"

    webview:

    component: "System.Webview"

    properties:

    service: "travvyWebview"

    sourceVariableList: "travellerFirstName"

    variable: "appResponse"

    prompt: "Press ''Enter Traveler Information'' to complete your booking"

    linkLabel: "Enter Traveler Information"

    cancelLabel: "Cancel"

    transitions:

    next: "evaluateWebviewResponse"

    actions:

    cancel: "onCancel"

    evaluateWebviewResponse:

    component: "System.Switch"

    properties:

    source: "${appResponse.value.status}"

    values:

    - "success"

    - "cancel"

    transitions:

    actions:

    success: "confirmBooking"

    cancel: "onCancel"

    NONE: "onCancel"

    confirmBooking:

    component: "System.Output"

    properties:

    text: "Booking has been confirmed for ${appResponse.value.firstName} ${appResponse.value.lastName}.
    Thanks for choosing Travvy!"

    keepTurn: false

    transitions:

    return: "done"

    onCancel:

    component: "System.Output"

    properties:

    text: "Sorry that you canceled your booking. Hope to see you back soon!"

    transitions:

    return: "done"

    ```


    The entire implementation of your skill also remains the same except for the creation
    of service for the `System.Webview` component. In this case, you will create the
    `travvyWebview` service by toggling the switch for "Service Hosted" as shown in
    Figure [8-12](#479330_1_En_8_Chapter.xhtml#Fig12).


    ![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig12_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Create Webview service for externally hosted application


    You will need to update "Web App URL" after you generate the same in next section.
    Once completed successfully, service will look as displayed in Figure [8-13](#479330_1_En_8_Chapter.xhtml#Fig13).


    ![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig13_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig13_HTML.jpg)


    Figure 8-13


    Service for externally hosted application


    ### Expose Web Application and Intermediary Service Using ngrok


    Start your Oracle JET web application by issuing the command:


    ```

    ojet serve

    ```


    Your local Oracle JET application is running on port 8000. You will first expose
    this port using the following command:


    ```

    ngrok http 8000

    ```


    Copy the highlighted section as displayed in Figure [8-14](#479330_1_En_8_Chapter.xhtml#Fig14)
    and update this in `index.js` of your `intermediaryService` as mentioned at the
    end of the "Create Intermediary Service" section.


    ![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig14_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig14_HTML.jpg)


    Figure 8-14


    Exposing port 8000


    Now start your intermediary service using the command from the root folder of
    service `intermediaryService`:


    ```

    node index.js

    ```


    Your service is running on port 4000. Just as mentioned in the preceding text,
    expose your port 4000 as well using `ngrok`. Once done, update this URL in your
    `TravvyWebviewExternal` skill''s Webview service, which is `travvyWebview`. You
    need to update "Web App URL" for the service.


    You can now test the end-to-end flow using your Skill Tester.


    ## Summary


    In this chapter, you were made familiar with Webview components, an alternative
    approach in conversation design to accumulate structured data from users. We explained
    you the Webview component architecture and two different approaches using which
    you can implement Webview component in your skill. Hope you find this topic interesting,
    and we will see you again in the next chapter.


    # 9. Building FAQs into Your Digital Assistant


    ## Introduction


    A very common use case for a Digital Assistant is the use of frequently asked
    questions (FAQs), also known as Q&A. Whenever the user types a phrase that matches
    a search term in the Q&A, the matching questions and answers are displayed to
    the user. A developed skill can act as the interface to these FAQs or other knowledge
    base documents. Frequently asked questions are common questions that are looking
    for an answer. "What are your opening times?" "Can I bring kids?" "Do you have
    vegan pizzas?" These FAQs often already exist on a company''s web site and can
    easily be brought to your bot. The Q&A framework of Oracle Digital Assistant enables
    bots to answer general interest questions by returning one or more question and
    answer pairs. In this way, a bot can be used to surface FAQs or other knowledge
    base documents.


    Our company, Extreme Hiking Holidays, has been running a web site for a long time.
    They have collected a whole bunch of frequently asked questions which are available
    from the web site. In this chapter, you will learn how to take these FAQs and
    their answers and add them to Travvy, the company''s Digital Assistant, as Q&A.


    ## How Does Q&A Work?


    Before you learn how to implement Q&A, it is helpful to understand how Q&A works
    in Digital Assistant. There are some important configurations involved in setting
    up a good Q&A skill. How does intent resolution work, what is Q&A routing, and
    how do you build your Q&A flow?


    ### Configuring Q&A Routing at Skill Level


    For Q&A routing, Oracle Digital Assistant provides out of the box a set of commonly
    used words and opening phrases that indicate commands or questions in the Q&A
    Routing Config page. On top of these, any domain-specific content can be added.
    This configuration can be changed at the settings page of a skill, and it enables
    the router to discern between Q&A and intents. As you can see in Figure [9-1](#479330_1_En_9_Chapter.xhtml#Fig1),
    there is a section for Transaction Config and a section for Question Config.


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig1_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Skill-level Q&A routing setting


    In the Transaction Config section, you can configure the skill to make it easier
    for the intent engine to recognize the utterance as a transaction (such as "**I
    want you to** book a trip," "**When is my** payment due"). These examples use
    the Request Sentence Prefix. Also, by default, there is a wide set of Request
    Verbs, such as "order," "cancel," "check," and more. You can add Request Verbs
    that are specific for a use case. As you can see from Figure [9-1](#479330_1_En_9_Chapter.xhtml#Fig1),
    the built-in set already contains the most commonly used verbs and prefixes, but
    you can always add your own to cater to specific transactions such as "book" or
    "check in" which would be typical for our travel business.


    In the Question Config, you can create a set of words that indicate that a user
    is asking a question ("**how do I** book a trip," "**how can** I cancel my vacation")
    and not requesting a transaction. These can also be extended with specific Question
    Verbs.


    ### How Q&A Works at Runtime


    At runtime, the bot''s behavior is influenced by the configurations as described
    in the previous section to check. On top of that, there are two important properties
    involved in Q&A routing:


    - `confidenceTreshold`: The skill uses this property to steer the conversation
    by the confidence level of the resolved intent. This property is set at the Skill-level
    configuration.


    - `Q&AMinimumMatch`: Sets the minimum and maximum percentage of tokens that any
    Q&A pair must contain in order to be considered a match. The value of this property
    can be set at the `System.Intent` components in the flow editor.'
