    ### About the Authors


    ### About the Technical Reviewer


    # Part I: Foundations


    # 1. Introduction to Oracle Digital Assistant


    Over the past decades, the size of computers has changed from huge warehouse-sized
    supercomputers to tiny pocket-size smartphones. The way people interact with computers
    or use programs has changed too. From client-server or browser-based on desktop
    and laptop to the use of apps on tablet and smartphone. Over the last couple of
    years, the use of apps has changed drastically. Where originally there used to
    be "one app for each task," nowadays more and more people want to have "one app
    for all tasks." The use of messaging apps such as WeChat, Snapchat, Skype, Slack,
    and Facebook Messenger has exploded. Besides that, virtual private assistants
    such as Google Home, Amazon Echo, Apple Siri, and Microsoft Cortana found their
    way into people''s lives. Let''s have a look at how this happened and how Oracle
    took the opportunity to fill a gap between consumer use and enterprise use.


    ## A Brief History of Chatbots


    The history of chatbots started about 70 years ago when Alan Turing^([¹](#fn1))
    stated that a truly intelligent machine is one that cannot be distinguished from
    a human in a text-only conversation. Eventually this led to the "Turing Test"
    which can be used to prove whether a machine is truly exhibiting intelligent behavior
    or not. In his 1950 paper "Computing Machinery and Intelligence," he laid the
    foundation of what we now know as chatbots or Digital Assistants.


    About 15 years after Turing, MIT AI Laboratory created `ELIZA`. This was a natural
    language processing computer program, able to simulate human conversations, based
    on scripted responses. Where many early users were convinced of `ELIZA`''s intelligence
    and understanding, in fact `ELIZA` was not able to have a conversation with true
    understanding, and it did not take a very long time before it became very obvious
    that you are talking to a machine.


    Shortly after `ELIZA`, in 1972 `PARRY` was created at Stanford University. `PARRY`
    was the first "chatbot" that actually had a conversational strategy. During the
    first International Conference on Computer Communications in 1972, `PARRY` and
    `ELIZA` were set up to talk to each other.


    From `ELIZA` and `PARRY` to the next milestone in "chatbot" history, it took almost
    two decades. In the late 1980s, `Jabberwacky` was developed. `Jabberwacky` (still
    online at [`www.jabberwacky.com`](http://www.jabberwacky.com)) aims to simulate
    natural human chat in an interesting, entertaining, and humorous manner. `Jabberwacky`
    is the first "chatbot" that uses artificial intelligence and as such is able to
    learn. It learns from the conversations that it has had in the past.


    At the end of the last century and the beginning of the millennium, other "chatbots"
    made their appearance such as `Dr. Sbaitso`, `ALICE`, and `SmarterChild`. `ALICE`
    (Artificial Linguistic Internet Computer Entity) was based on `ELIZA`. Even though
    `ALICE` can set up a conversation with a user, based on user input and pattern
    recognition, `ALICE` has never been able to pass the Turing Test.


    The next-generation chatbots included bots from big vendors such as `IBM Watson`
    (2006), `Apple Siri` (2010), `Google Now` (2012), `Amazon Alexa` (2015), and `Microsoft
    Cortana` (2015). In 2016, Facebook introduced bots for Facebook Messenger that
    by the end of the year had over 30,000 bots available.


    Chatbots are generally used as interfaces, such as extracting product details.
    Chatbots are task oriented, whereas digital assistants are user focused. Digital
    assistants provide the ability to combine different chatbot tasks to a single
    conversation. These assistants can really assist users with tasks such as reminding
    you of meetings, managing your to-do lists, and so on. When a chatbot is asked
    to provide such virtual assistance, they usually get confused and ultimately keep
    asking the same questions for clarification. It is very important to understand
    that artificial intelligence is not all that it takes to build chatbots. Other
    skills, including UX and conversation design, play an important role. Bad design
    can even make a digital assistant fail. Even though chatbots and digital assistants
    are both considered conversational interfaces, they are very different. One of
    the biggest differences can be found in how the two maintain conversational flow.
    When interacting with chatbots, if you interrupt the conversation in between,
    the chatbot will most probably fail to remember the context of the interaction,
    whereas virtual assistants use dynamic conversation flow techniques, so they can
    understand human intent and keep the flow going.


    The following example shows how a well-designed assistant can cope with context
    change from booking ticket to checking balance:


    "I like to **book a ticket** for the Taylor Swift concert in Amsterdam."


    - Sure, any preference for where you want to enjoy the gig? We have category A
    for 84 Euro, category B for 60 Euro, and category C for 35 Euro.


    "**How much money** do I have?"


    - Which account do you want to know your balance for? A) Savings. B) Credit card.
    C) Checking account.


    "C, checking."


    - Well, you have 1500 Euro available.


    "Two tickets, category A please."


    - Sure. Are you interested in a Taylor Swift merchandise too? We have them on
    account today.


    Most Digital Assistants nowadays go beyond providing simple "request and response"
    features. They are changing big time the way that brands engage with their customers.'
