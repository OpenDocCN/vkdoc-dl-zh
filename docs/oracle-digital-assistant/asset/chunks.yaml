    # 3. Use Case


    ## Introduction


    To make sense of the technical implementation of Oracle Digital Assistant, in
    this chapter, you will be introduced to Travvy, the Digital Assistant/chatbot
    for Extreme Hiking Holidays, a travel agency – made up by the authors – specialized
    in hiking holidays for adventurous people.


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig1_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig1_HTML.jpg)


    Figure 3-1 Extreme Hiking Holidays company web site


    Extreme Hiking Holidays organizes high hiking scale tours in Switzerland/France,
    Canada, and the USA. They offer a complete travel package including flights, a
    guided hiking tour, and accommodation.


    Using a step-by-step approach, you will get acquainted with Travvy so you know
    all the ins and outs in order to understand all the steps of the creation of the
    conversational experience and the technical implementation.


    You will read about the **“why” of Travvy**, and you will meet **the persona**
    which represents the traveler/user who will be communicating with Travvy. The
    **user’s journey** is worked out explaining Travvy’s role in it. You will see
    how a **channel** for the Digital Assistant is selected, and finally you will
    find the **dialog/conversation flow** revealing the user’s intents. In the last
    part of this chapter, the **entities and utterances** used for the chatbot are
    presented.


    ## The Goal


    ### Who Are the Stakeholders?


    The CEO and marketing manager of Extreme Hiking Holidays are the decision-makers.


    Extreme Hiking Holidays is a small travel agency. Three employees take care of
    the reservations, and six adventurous guides are on site accompanying the travelers.
    The agency has a large market share in an emerging niche market.


    ### Why a Chatbot?


    The marketing manager knows that their customers have a lot of questions regarding
    the risks of such a holiday, the level of difficulty, and the insurance conditions.
    The reservations department currently is responsible for answering all these questions
    by mail or on the phone. Questions which often have the same answers.


    A chatbot helps reducing costs, because a person answering a phone call or email
    often costs more than a chatbot answer, which only costs less than a cent. That
    also is the reason why a chatbot should rather not refer to a phone number. Better
    provide users with a link, so that they themselves can find the requested information.


    That is the reason why they are thinking of developing a chatbot, to be able to
    offer their customers a better service, 24/7, advise/help them, and persuade them
    to book a holiday with them.


    The advantage of a good chatbot is that the user can ask anything. This means
    that there is no need to search/browse a web site. Users can just ask what they
    are looking for. The digital assistants can even display a requested form so that
    the user can complete it immediately. **Smart digital assistants become smart
    search engines**.


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig2_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig2_HTML.jpg)


    Figure 3-2 Persona Harold Hikaway (Photo by Danijela Froki on Unsplash)


    ## The Customer: A Persona


    ### Typify Harold


    In his spare time, Harold is very active. Every Saturday morning, he goes on a
    long cycling trip with a team of friends. He and Holly, his girlfriend, go climbing
    indoors once a week, and during their holidays, they like to do that in the Dolomites
    (challenging) and in Czechia (cheap). They both like to explore new hiking trails.
    Harold is to the point (“cut the crap”) and expects others to be direct and honest
    too. He dislikes every minute he cannot spent in an active way.


    ### His Working “Day”


    Harold often works in night shifts. His main task then is securing the Maastricht
    Exhibition & Conference Centre (MECC) building in Maastricht. During those nights,
    he does his rounds, but in between he often has some time to kill, and that is
    when he is searching web sites to find information about adventurous trips and
    nice holiday destinations. He once booked a trip to France on the Extreme Hiking
    Holidays web site. He and Holly thought that was an amazing adventure. To be able
    to book that hiking trip, he at that time created a profile on their web site.


    ### His Tooling


    To check out the Internet, Harold uses the desktop computer in his office or his
    mobile phone when he is doing his onsite security checks. Some of his friends
    use tablets, but Harold sees no advantage in that.


    ### His Goal


    He is very much into active holidays which he previously found and booked on the
    web site of Extreme Hiking Holidays. He uses the web site to get detailed information
    about their holiday options. After consulting Holly, they often have some detailed
    questions. If these can be answered quickly – preferably during his night shift
    – he will book the trip on the web site in one go.


    ## The User Journey Map


    What journey will Harold make to achieve his goals using touchpoints/channels
    like our chatbot?


    ### The Touchpoints


    - Advertisements on Internet/TV at home on the couch

    - Facebook at home or at work

    - Extreme Hiking Holidays web site at home or at work

    - Chatbot


    ### Harold’s Intentions


    - Check out some hiking holiday options.

    - Find and select a hiking holiday and ask related questions.

    - Book and pay for the hiking trip.


    ### His Motivations/Needs


    - Harold is triggered by the attractive holiday options Extreme Hiking Holidays
    has to offer.

    - He notices that he does not have to enter his credentials.

    - He gets clear, fast, and personal answers to his questions, 24/7.

    - He likes to be guided, but he doesn’t want to lose **autonomy**. He wants to
    feel in control.'
