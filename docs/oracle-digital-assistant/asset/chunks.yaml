    ```

    detectLanguage:

    component: "System.DetectLanguage"

    properties:

    source:

    transitions:

    next: "checkUserDetectedLanguage"

    checkUserDetectedLanguage:

    component: "System.Switch"

    properties:

    source: "${[''nl'',''fr'',''en'']?seq_contains(profile.languageTag)?string(''yes'',''no'')}"

    values:

    - "yes"

    - "no"

    transitions:

    actions:

    yes: "Intent"

    no: "selectLanguageFromList"

    NONE: "selectLanguageFromList"

    selectLanguageFromList:

    component: "System.CommonResponse"

    properties:

    processUserMessage: true

    keepTurn: false

    translate: true

    metadata:

    responseItems:

    - type: "text"

    text: "${rb.globalLanguagePrompt}"

    actions:

    - label: "${rb.globalLanguageEnglish}"

    type: "postback"

    payload:

    variables:

    profile.languageTag: "en"

    - label: "${rb.globalLanguageDutch}"

    type: "postback"

    payload:

    variables:

    profile.languageTag: "nl"

    - label: "${rb.globalLanguageFrench}"

    type: "postback"

    payload:

    variables:

    profile.languageTag: "fr"

    transitions:

    next: "Intent"

    ```


    有了这个设置，每当 Travvy 不支持用户的语言时，它就会用该语言回复用户，告知 Travvy 仅支持英语、法语、荷兰语和西班牙语。图 7-8 展示了在意大利语环境下的效果。


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig8_HTML.jpg](img/479330_1_En_7_Fig8_HTML.jpg)


    图 7-8：用用户自己的语言回复用户


    ### 注意


    虽然你可以使用语言检测功能，但必须意识到这会对性能产生影响。开启语言检测后，对于每一次用户话语，翻译服务都会被调用来检测语言，从而增加了对话中对外部服务的调用次数。


    ### 使用用户配置文件中的语言


    如上一节所述，使用翻译服务进行语言检测可能会对性能产生轻微的负面影响。另一种方法是通过省略语言检测来消除这种影响。这种方法使用用户配置文件中的语言。因此，不再由翻译服务自动设置
    `profile.languageTag`，而是像以下代码示例那样显式设置它：


    ```

    metadata:

    platformVersion: "1.0"

    main: true

    name: FindTripWithTranslations

    context:

    variables:

    iResult: "nlpresult"

    rb: "resourcebundle"

    autoTranslate: "boolean"

    states:

    enableAutoTranslation:

    component: "System.SetVariable"

    properties:

    variable: "autoTranslate"

    value: false

    transitions:

    next: "setBrowserBasedProfileLanguage"

    #Set profile.languageTag based on user''s browser language

    setBrowserBasedProfileLanguage:

    component: "System.SetVariable"

    properties:

    variable: "profile.languageTag"

    value: "${profile.locale}"

    transitions:

    next: "Intent"

    ```


    为了实现这一点，你需要获取用户的区域设置。一种方法是读取 `profile.locale` 变量，该变量由消息客户端设置。


    另一种方法是在消息客户端上显式设置它。以下代码示例展示了如何在从网页调用数字助理时，使用 Oracle 数字助理 JavaScript SDK（参见第 6
    章）通过 JavaScript 实现这一点：


    ```

    Bots.updateUser(

    {

    "properties": {

    "userLocale": userLocale}

    }

    );

    ```


    ## 总结


    世界上有许多种语言。为了让数字助理取得成功，它们应该能够使用除英语以外的其他语言。幸运的是，Oracle 数字助理可以实现多语言支持这一需求。在本章中，你学习了如何基于翻译服务和资源包来实现这一点。翻译服务并不能
    100% 保证覆盖所有用例，也无法涵盖所有话语。你需要通过提供让用户选择或确认其偏好语言的功能，来帮助用户和翻译服务。'
- fmt: '# 8. Using Webview Components


    Chatbots are the conversational approach of retrieving and providing information
    to end users. An end user enters his/her query to the bot, and the bot responds
    back with appropriate answers. One of the core reasons of chatbots being so popular
    in today’s world is that they can provide response in much faster way with bare
    minimum user inputs.


    As the popularity of chatbots is increasing day by day, organizations are using
    chatbots not only to provide information about their offerings, but also they
    are using them for business-critical flows such as ordering, booking, providing
    feedbacks, and so on. Often such flows in chatbots require multiple user information
    which an end user needs to provide in order to complete certain transaction/task.
    Such a long chain of user interaction with a bot might become a bit boring from
    an end user point of view. As a result, the user may rather prefer to use a different
    route to fulfill his/her requirement such as calling customer care or going back
    to the organization’s web site.


    Oracle acknowledged this fact and came up with the concept of Webview components
    for Digital Assistants. Using Webview components, parameters can be passed from
    the skill to the web form and from the web form back to the skill. In this chapter,
    you will become familiar with the Webview components and their uses.


    ## What Is a Webview Component?


    Though chatbots are designed for a conversational approach of information gathering
    and sharing, it is not always ideal. An alternate approach to handle such cases
    can be providing a web form to the end user, which he/she fill at once in order
    to complete a specific task. You can craft your bot flow in such a way that it
    provides such a form to the end user, only for those scenarios which require structural
    data input, for example, providing a web form containing necessary address fields
    while placing an order or a form with fields which are essential to complete a
    holiday booking or fields with mandatory information required for opening a bank
    account and so on.


    The `System.Webview` component, as the name suggests, allows you to integrate
    a web page with your digital assistant in order to accumulate structural data
    from end users. Though Webview components are integrated with the digital assistant,
    they open in a separate browser tab/window for web-based chat clients or in webview
    in case of mobile devices outside of the chat client. Because of this, you are
    able to leverage various features like form view, select choices, date pickers,
    custom styles, and so on in the web page. But it doesn’t end here. In addition
    to such features, you can also add various kinds of input validations on your
    web page with ease, such as mandatory fields, email format, date range, and so
    on. This validation logic stays on the web page, and you don’t need to add them
    inside your digital assistant.


    You are already aware that components are broadly classified into two categories
    in the context of the Oracle Digital Assistant, namely, built-in components and
    Custom Components. Webview components (`System.Webview`) fall under the category
    built-in components, which means they are provided by Oracle out of the box.


    Using a Webview component in your dialog flow, you can route your end user to
    a web application where he/she can provide the necessary inputs to complete a
    transaction. Since Webview components are provided by Oracle out of the box, you
    can easily add them to your flow by clicking the ![../images/479330_1_En_8_Chapter/479330_1_En_8_Figa_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Figa_HTML.jpg)
    button on the Flows ![../images/479330_1_En_8_Chapter/479330_1_En_8_Figb_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Figb_HTML.jpg)
    screen and then selecting the same from the **User Interface** component.


    Refer to Figure [8-1](#479330_1_En_8_Chapter.xhtml#Fig1).


    ![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig1_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Webview component


    Before we start discussing Webview component further, let’s have a look at the
    pros and cons.


    **Pros:**


    *   Use of a web application to gather user information instead of an extensive
    bot communication.

    *   Web application screen size will not be limited to chat client window.

    *   Web application can be custom skinned as preferred.

    *   Prebuild web application can also be used (web page should be accessible using
    GET request).

    *   Leverage various browser features such as upload and download.

    *   Data entered by user remain secure as it doesn’t appear in the chat session.


    **Cons:**


    *   As Webview opens the application in a separate browser window, the application
    doesn’t look integrated with the chatbot. And hence, the user might get confused
    if not preinformed properly in the chat before application launch.


    ## Webview Component Architecture


    You can adhere to two different approaches in order to implement Webview components:


    *   Webview application hosted within Oracle Digital Assistant

    *   Webview application hosted externally (outside of Oracle Digital Assistant)


    Similar to Custom Components, Oracle Digital Assistant provides a built-in container
    to host single-page web applications. If you prefer to locally deploy your web
    application in this built-in container, then the Webview application is hosted
    within the skill. If you wish to use your existing web application or deploy your
    newly created web application in a remote environment, outside of Digital Assistant,
    then that will be an externally hosted Webview application. In both cases, the
    application is launched in a separate browser tab for web-based chat clients or
    in webview in case of mobile devices. Let’s take a deeper look in both of these
    approaches.


    ### Webview Application Hosted Within Digital Assistant


    Applications deployed locally in your Oracle Digital Assistant should be single-page
    applications (SPAs). In case you are unfamiliar, SPA renders a single page and
    has a single entry point for the application, but page content can be changed/updated
    dynamically at runtime. You can use any JavaScript framework to develop such an
    application for the `System.Webview` component, for example, React, Oracle Jet,
    Oracle VBCS, and so on. You then bundle your application in a TAR archive (with
    a `.tgz` extension) and deploy it into the local container to create a Webview
    service.


    ### Note


    The entry point of your SPA must be an `index.html` file, placed at the root level
    of your application and, hence, your deployment archive.


    When you use a `System.Webview` component in your dialog flow, it then


    1.  Invokes the `index.html` for your SPA and launches the app in a new browser
    tab.

    2.  `System.Webview` component then passes input parameter(s) from your dialog
    flow to your SPA along with a callback URL. The callback URL is generated and
    appended to the webview request by the `System.Webview` component as `window.webViewParameters`
    parameter.

    3.  Your SPA makes a POST request to the callback URL upon completion of its processing.
    The callback URL can be accessed from the parameter `webview.onDone` in the app.
    In case you need to pass any data back to the Webview component in the skill from
    your app, then that data is passed as **JSON object**, which gets stored in the
    dialog flow variable that is referenced from the `System.Webview` variable property.
    You can easily access this data in your dialog flow as `${variable_name.value.Param}`.


    A pictorial representation of this flow can be found in Figure [8-2](#479330_1_En_8_Chapter.xhtml#Fig2).


    ![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig2_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Local deployment of web application


    The abovementioned flow will be explained in detail later in this chapter, under
    section “Webview Application Hosted Within Digital Assistant”.'
