    will be reset.'
  trans: '

    # 6. 通过渠道发布你的数字助手


    当你决定在业务中引入数字助手时，想必你已经清楚自己的目标受众。了解目标受众将帮助你确定让数字助手触达他们的最佳方式。当你开始设计数字助手或技能时，只有你和有权访问该特定云实例的人才能使用它。为了让你的数字助手或技能可供业务用户使用，你需要一个渠道来将其发布给他们。顾名思义，渠道充当一种媒介，你通过它将技能或数字助手提供给最终用户。


    选择合适的渠道来发布数字助手对其成功与否起着至关重要的作用。例如，如果最终用户无法轻松访问你的数字助手或技能，他们可能会倾向于避开它，转而选择相对更简单的途径来完成任务。同时，如果你的聊天机器人旨在提供用户敏感信息，你可能希望将其限制在更安全、更封闭的渠道中。


    设想一个场景，你允许用户通过你的数字助手执行日常银行任务，例如查询账户余额或进行转账。在这种情况下，你可能希望通过银行的网页门户和/或他们的移动应用程序来发布你的数字助手。这可能是出于两个原因。首先，任何银行的网页门户都相当安全。其次，因为此类信息和任务仅针对该银行的用户，你不希望有不必要的用户访问。


    另一方面，考虑一个你正在为外卖配送设计数字助手的场景。为了让你的数字助手易于访问并广受欢迎，除了网页渠道之外，你可能还希望将其发布到各种其他消息渠道上——例如
    Facebook Messenger、Skype、Microsoft Teams 等。


    简而言之，你始终需要根据数字助手的目的和目标受众来决定选择哪个渠道。


    现在你已经了解了渠道的重要性，让我们来看看 Oracle 数字助手平台提供的各种开箱即用的渠道。


    ## Oracle 数字助手中的渠道类型


    Oracle 数字助手中的渠道大致分为四种类型。它们是：


    1.  用户

    2.  坐席集成

    3.  应用程序

    4.  系统


    ### 用户渠道


    用户渠道允许你通过面向用户的平台发布你的技能或数字助手。以下是用户渠道的列表：


    *   Facebook Messenger

    *   Webhook

    *   Web

    *   iOS

    *   Android

    *   Twilio SMS（仅文本）

    *   微信

    *   Slack

    *   Microsoft Teams

    *   Cortana

    *   Skype for Business


    ### 坐席集成


    顾名思义，当你希望在对话过程中引入人工坐席时，可以创建坐席集成渠道。坐席集成使用 Oracle Service Cloud（18C 或更高版本）将用户在对话过程中提供的信息传递给在线坐席。这样，当在线坐席从机器人接管对话控制权并开始与用户交互时，他们无需再次要求用户提供所需信息。坐席集成将在本书的单独章节中详细讨论。


    ### 应用程序渠道


    当你希望进行事件驱动的对话时，会使用应用程序渠道。简单来说，你根据来自不同应用程序生成的事件，在特定的（机器人流程）状态下启动与你的技能或数字助手的对话。


    ### 系统


    这是你的 Oracle 数字助手实例的特定于系统的默认渠道。此渠道用于使用技能测试器测试你的技能或数字助手。你无法自行创建任何额外的系统渠道。这里需要重点说明的是，对此渠道所做的任何更改都将应用于该实例中的所有技能以及数字助手。


    ## 使用渠道


    在本节中，你将学习为你的 Oracle 数字助手（ODA）创建渠道。登录你的 ODA 实例，点击左上角的图标打开侧边菜单。选择“开发”部分下的“渠道”。请参考图
    6-1。这将带你进入“渠道”屏幕。


    进入“渠道”屏幕后，你会注意到它包含四个不同的选项卡，分别对应上一节讨论的每种渠道类型。默认情况下，当你导航到“渠道”时，会显示“用户”选项卡，如图 6-2
    所示。如果你创建过任何预配置的用户渠道，它也会显示一个列表。


    此部分允许你创建新的用户渠道，以及维护（即更新或删除）之前创建的用户渠道。这将在本章后续部分详细讨论。


    接下来，点击“坐席集成”选项卡。此选项卡允许你创建和管理坐席集成渠道。与“用户”选项卡类似，如果你碰巧有预配置的渠道，它会显示出来。如图 6-3 所示，我们尚未创建任何坐席集成。因此，这里没有显示任何渠道。


    点击下一个选项卡，“应用程序”。此选项卡允许你为 ODA 实例创建和管理你的应用程序渠道。与之前的选项卡类似，你可以找到所有之前创建的应用程序渠道（如果有的话）。请查看图
    6-4。


    点击此屏幕的最后一个选项卡，即“系统”。如图 6-5 所示，此选项卡带有预构建的默认 `System_Global_Test` 渠道。


    如果你在此屏幕上切换“渠道已启用”开关，它将根据你的选择启用或禁用 ODA 实例中的所有技能测试器。“重置会话”按钮也是如此。点击此按钮，所有技能测试器会话都将被重置。

    '
- fmt: '### Note


    Channel Enable switch exists for all channels which you have in your Digital Assistant
    instance. This switch allows you to enable or disable any specific channel.


    Presuming that you are well familiar with various channel types and their significance,
    in the next section, you will start with creating the Users channel with a focus
    on the Web channel. Based on our use case of Travvy, we will limit the scope of
    our discussion to the Web channel in this chapter. Webhook and Agent Integrations
    will be discussed in detail in a separate chapter, as mentioned earlier. The concept
    of channel will remain the same for other channel types, but their configurations
    will differ. We would recommend you to refer to Oracle documentations in case
    you require to configure other channel types.


    Now that the intent is clear for this chapter, let’s get back to creation and
    configuration of the Web channel for Travvy.


    ## Create Users Channel


    Click the icon ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figc_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Figc_HTML.jpg)
    at the top-left corner and select Development ➤ Channels. From the Users tab,
    click the ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figd_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Figd_HTML.jpg)
    button. This will open the Create Channel window for you as shown in Figure [6-6](#479330_1_En_6_Chapter.xhtml#Fig6).


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig6_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Create Channel


    From here, you will create a Web channel. Change the channel type by clicking
    the dropdown and selecting Web from the list. Refer to Figure [6-7](#479330_1_En_6_Chapter.xhtml#Fig7).


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig7_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Select Web channel type


    Fill in the necessary details as displayed in Figure [6-8](#479330_1_En_6_Chapter.xhtml#Fig8)
    and click the ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fige_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fige_HTML.jpg)
    button.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig8_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Create Web channel


    Once created successfully, you should be able to see your newly created `travvyWebChannel`
    under the list of your Users channel as shown in Figure [6-9](#479330_1_En_6_Chapter.xhtml#Fig9).


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig9_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    List of Users channels


    By selecting a channel, you will be able to see its details on this screen. Refer
    to Figure [6-10](#479330_1_En_6_Chapter.xhtml#Fig10). This contains various crucial
    information such as Route To, Channel Enabled, and App Id. You will be using these
    details in upcoming sections of this chapter.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig10_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Channel details


    As you can see in Figure [6-10](#479330_1_En_6_Chapter.xhtml#Fig10), this channel
    is not yet enabled. To enable a channel, you need to associate the channel with
    a Skill or a Digital Assistant. The process of associating a Skill or a Digital
    Assistant to a channel is known as Channel Routing. Channel Routing will be discussed
    in the next section.


    If you could remember from the previous chapter of this book, you always have
    to publish a Skill in order to associate the Skill to a Digital Assistant. Whereas
    in case of a channel, you can also associate an unpublished Skill to a channel.
    This feature comes very handy when you are developing and testing a Skill over
    a channel, at the same time. And hence, saves you from creating numerous versions
    of a Skill. So, you can associate any Skill which is published or unpublished
    or any Digital Assistant to a channel when you need to do so.


    In addition, you can also associate a prepublished version of a skill to a channel.
    This helps you to handle a fallback situation in your production environment,
    in case needed.


    ## Channel Routing


    By associating a Skill or a Digital assistant to a channel, you are defining a
    specific Skill or a Digital Assistant which the channel should route you to, when
    it is invoked. This is commonly known as Channel Routing.


    Select your newly created `travvyWebChannel`. Next, click the ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figf_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Figf_HTML.jpg)
    button corresponding to "Route To." This shows you a complete list of all available
    Skills and Digital Assistants you can associate to this channel. Refer to Figure
    [6-11](#479330_1_En_6_Chapter.xhtml#Fig11).


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig11_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Channel Routing


    As you can see in the preceding figure, a published Skill can be identified by
    the ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figg_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Figg_HTML.jpg)
    icon, whereas an unpublished will have the ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figh_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Figh_HTML.jpg)
    icon associated to it. Similarly, a Digital Assistant can be recognized by ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figi_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Figi_HTML.jpg)
    icon.


    In addition, the list also mentions skill''s "One-Sentence Description" and Digital
    Assistant''s "Description" underneath the name, which you mention at the time
    you create them.


    Select a Skill or a Digital Assistant from the list which you want to expose.
    Next toggle the button corresponding to "Channel Enabled" in order to enable the
    channel. The screen with all details should look like Figure [6-12](#479330_1_En_6_Chapter.xhtml#Fig12).


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig12_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Channel details


    In order to reroute your channel to a different skill or Digital Assistant, you
    can simply click the ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figj_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Figj_HTML.jpg)
    button corresponding to Route To and change the routing by selecting a different
    skill or Digital Assistant from the list.


    Your newly created Web channel is now ready to be accessed.


    Before we proceed further with this chapter, the following are the two points
    which you should always remember:


    1.  A channel holds a one-to-one relationship with a skill or a digital assistant.
    This emphasizes the fact that only one skill or a digital assistant can be exposed
    at a time over a specific channel. Though, you can create multiple channels for
    a specific messenger type.


    2.  When you invoke a digital assistant over a channel, skills associated to the
    digital assistant will always use digital assistant''s channel to send and receive
    messages. Irrespective of whether skills have their own separate channels or not.
    In simple words, if you are accessing a skill directly via the skill''s channel,
    then the conversation will take place on the skill''s channel. If you are accessing
    one or more skills via a digital assistant''s channel, then all communication
    will happen over the digital assistant''s channel.'
