  trans: '

    # 8. 使用 Webview 组件


    聊天机器人是一种以对话方式检索信息并提供给最终用户的方法。最终用户向机器人输入查询，机器人则回复相应的答案。聊天机器人在当今世界如此流行的核心原因之一是，它们能够以极少的用户输入，以更快的速度提供响应。


    随着聊天机器人的日益普及，各类组织不仅使用聊天机器人来提供其产品/服务信息，还将其用于关键业务流程，例如下单、预订、提供反馈等。通常，聊天机器人中的此类流程需要最终用户提供多项信息才能完成特定交易或任务。从最终用户的角度来看，这种与机器人进行的长链交互可能会变得有些乏味。因此，用户可能更愿意选择其他途径来满足其需求，例如致电客服或返回组织的网站。


    Oracle 意识到了这一点，并为数字助手提出了 Webview 组件的概念。使用 Webview 组件，参数可以从技能传递到 Web 表单，也可以从 Web
    表单传回技能。在本章中，您将熟悉 Webview 组件及其用途。


    ## 什么是 Webview 组件？


    尽管聊天机器人是为信息收集和共享的对话方式而设计的，但这并非总是理想之选。处理此类情况的另一种方法可以是向最终用户提供一个 Web 表单，让他们一次性填写以完成特定任务。您可以设计机器人流程，使其仅在需要结构化数据输入的场景下向最终用户提供此类表单，例如，在下单时提供包含必要地址字段的
    Web 表单，或提供包含完成假期预订所必需字段的表单，或提供包含开设银行账户所需必填信息的表单等。


    顾名思义，`System.Webview` 组件允许您将网页集成到数字助手中，以便从最终用户那里收集结构化数据。尽管 Webview 组件与数字助手集成，但它们会在单独的浏览器标签页/窗口中打开（对于基于
    Web 的聊天客户端），或者在移动设备上于聊天客户端之外的 Webview 中打开。因此，您能够在网页中利用各种功能，如表单视图、选择选项、日期选择器、自定义样式等。但这还不是全部。除了这些功能之外，您还可以轻松地在网页上添加各种输入验证，例如必填字段、电子邮件格式、日期范围等。此验证逻辑保留在网页上，您无需将其添加到数字助手中。


    您已经知道，在 Oracle 数字助手的上下文中，组件大致分为两类：内置组件和自定义组件。Webview 组件（`System.Webview`）属于内置组件类别，这意味着它们由
    Oracle 直接提供。


    在对话流程中使用 Webview 组件，您可以将最终用户引导至一个 Web 应用程序，他们可以在其中提供必要的输入以完成交易。由于 Webview 组件由
    Oracle 直接提供，您只需在“流程”![../images/479330_1_En_8_Chapter/479330_1_En_8_Figa_HTML.jpg](img/479330_1_En_8_Figa_HTML.jpg)
    屏幕上点击 ![../images/479330_1_En_8_Chapter/479330_1_En_8_Figb_HTML.jpg](img/479330_1_En_8_Figb_HTML.jpg)
    按钮，然后从**用户界面**组件中选择它，即可轻松将其添加到您的流程中。


    请参考图 8-1。


    ![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig1_HTML.jpg](img/479330_1_En_8_Fig1_HTML.jpg)


    图 8-1


    Webview 组件


    在我们进一步讨论 Webview 组件之前，先来看看它的优缺点。


    **优点：**


    *   使用 Web 应用程序收集用户信息，而非进行冗长的机器人对话。

    *   Web 应用程序的屏幕尺寸不受聊天客户端窗口限制。

    *   Web 应用程序可以按需自定义皮肤。

    *   也可以使用预先构建的 Web 应用程序（网页应可通过 GET 请求访问）。

    *   利用各种浏览器功能，例如上传和下载。

    *   用户输入的数据保持安全，因为它不会出现在聊天会话中。


    **缺点：**


    *   由于 Webview 在单独的浏览器窗口中打开应用程序，该应用程序看起来与聊天机器人不集成。因此，如果在启动应用程序前未在聊天中适当预先告知用户，用户可能会感到困惑。


    ## Webview 组件架构


    要实现 Webview 组件，您可以遵循两种不同的方法：


    *   在 Oracle 数字助手内部托管的 Webview 应用程序

    *   在外部（Oracle 数字助手之外）托管的 Webview 应用程序


    与自定义组件类似，Oracle 数字助手提供了一个内置容器来托管单页 Web 应用程序。如果您希望在此内置容器中本地部署 Web 应用程序，那么 Webview
    应用程序将托管在技能内部。如果您希望使用现有的 Web 应用程序，或将新创建的 Web 应用程序部署在数字助手之外的远程环境中，那么这将是一个外部托管的 Webview
    应用程序。在这两种情况下，应用程序都会在单独的浏览器标签页中启动（对于基于 Web 的聊天客户端），或者在移动设备上于 Webview 中启动。让我们深入了解这两种方法。


    ### 在数字助手内部托管的 Webview 应用程序


    在您的 Oracle 数字助手中本地部署的应用程序应为单页应用程序（SPA）。如果您不熟悉，SPA 渲染单个页面，并且应用程序只有一个入口点，但页面内容可以在运行时动态更改/更新。您可以使用任何
    JavaScript 框架为 `System.Webview` 组件开发此类应用程序，例如 React、Oracle Jet、Oracle VBCS 等。然后，您将应用程序打包成
    TAR 归档文件（扩展名为 `.tgz`），并将其部署到本地容器中以创建 Webview 服务。


    ### 注意


    您的 SPA 的入口点必须是一个 `index.html` 文件，放置在应用程序的根级别，因此也是您的部署归档文件的根级别。


    当您在对话流程中使用 `System.Webview` 组件时，它会：


    1.  调用您 SPA 的 `index.html` 并在新的浏览器标签页中启动应用程序。

    2.  `System.Webview` 组件随后将输入参数从您的对话流程传递到您的 SPA，并附带一个回调 URL。该回调 URL 由 `System.Webview`
    组件生成并作为 `window.webViewParameters` 参数附加到 Webview 请求中。

    3.  您的 SPA 在处理完成后向回调 URL 发起 POST 请求。可以从应用程序中的 `webview.onDone` 参数访问回调 URL。如果您需要将任何数据从应用程序传回技能中的
    Webview 组件，则该数据作为 **JSON 对象**传递，该对象存储在从 `System.Webview` 变量属性引用的对话流程变量中。您可以在对话流程中轻松访问此数据，如
    `${variable_name.value.Param}`。


    此流程的图示可在图 8-2 中找到。


    ![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig2_HTML.jpg](img/479330_1_En_8_Fig2_HTML.jpg)


    图 8-2


    Web 应用程序的本地部署


    上述流程将在本章后面的“在数字助手内部托管的 Webview 应用程序”一节中详细说明。

    '
- fmt: "### Note\n\nIf you wish to use Oracle VBCS to create your SPA, it will have\
    \ some limitations. Since the backend of VBCS is responsible for business objects,\
    \ REST calls made to the business objects, as well as the user access for the\
    \ business objects (using Oracle Identity Cloud Service, IDCS), these features\
    \ will not be available when you export your application. If you wish to use Oracle\
    \ VBCS in order to build your SPA, then you must deploy the app externally and\
    \ take care of these features explicitly.\n\n### Webview Application Hosted Externally\n\
    \nIf you already have an existing application which you want to use as Webview,\
    \ then you need to take this approach. These are typical cases when your application\
    \ has security requirements or you need to use server-side infrastructures and\
    \ so on. Unlike the case of a locally deployed application, your external application\
    \ may or may not be a SPA. Only requirement is that the application, which you\
    \ are willing to use, should be accessible over a GET request from the skill.\
    \ In the case of an externally hosted web application, you need to use an intermediary\
    \ service which will be responsible for composing the application call URL to\
    \ the skill. Skill then uses the GET method to call the web application. You can\
    \ host the intermediary service and your web application on the same server as\
    \ well as on different servers based on your requirement.\n\nThe flow goes as\
    \ mentioned in the following:\n\n1.  `System.Webview` component from the skill\
    \ sends a POST request to intermediary service along with input parameters and\
    \ the callback URL in the payload.\n2.  Intermediary service returns a JSON object\
    \ to the skill which contains only one property, `webview.url`, which holds web\
    \ app URL as well as the callback URL to the skill. In case any parameter needs\
    \ to be passed to the web app, then those parameters get appended to `webview.url`\
    \ property. `System.Webview` component in the skill then uses this property to\
    \ make all subsequent GET requests to the web app.\n3.  Skill sends a GET request\
    \ to launch the app.\n4.  The web application processes the request and makes\
    \ a POST call to the callback URL indicating that the app has finished its processing.\
    \ Again, in case you need to pass any data back to the Webview component in your\
    \ skill from the web app, then that data is passed as JSON object, which gets\
    \ stored in the dialog flow variable that is referenced from the `System.Webview`\
    \ variable property. You can then access this data in your dialog flow as `${variable_name.value.param_name}`.\n\
    \nFigure [8-3](#479330_1_En_8_Chapter.xhtml#Fig3) shows a pictorial representation\
    \ of the preceding flow with the intermediary service and web application hosted\
    \ on the same web server.\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig3_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3: Externally hosted web application\n\nFigure [8-4](#479330_1_En_8_Chapter.xhtml#Fig4)\
    \ shows the flow when the intermediary service and the web application reside\
    \ on separate servers.\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig4_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4: Externally hosted web application with service and application on\
    \ different servers\n\n## Prerequisites\n\nNow that you are familiar with both\
    \ approaches of implementing Webview component, let’s take look at the implementation\
    \ of both of these approaches. In both cases, we will use Oracle JET as JavaScript\
    \ framework to build our web app. As mentioned before, you are not bound to use\
    \ Oracle JET, and you may use any other framework of your preference. In the upcoming\
    \ sections, we will not explain how to design applications with Oracle JET and\
    \ will primarily focus on the implementation part. If you want to learn more about\
    \ Oracle JET, we encourage you to visit the official web site: [`www.oracle.com/webfolder/technetwork/jet/index.html`](http://www.oracle.com/webfolder/technetwork/jet/index.html).\n\
    \nThe following is the list of prerequisites which you need to have/install in\
    \ order to follow the implementations:\n\n1.  Access to a Digital Assistant environment\
    \ (19.1.5 or higher).\n2.  Download and install Node.js ([`https://nodejs.org/en/download/`](https://nodejs.org/en/download/)).\n\
    3.  Microsoft Visual Studio Code IDE ([`https://code.visualstudio.com/download`](https://code.visualstudio.com/download)).\n\
    4.  Install Oracle JET Command Line Interface (post-Node.js installation).\n\n\
    \    Windows\n\n    ```\n    npm install -g @oracle/ojet-cli\n    ```\n\n    MAC\n\
    \n    ```\n    sudo npm install -g @oracle/ojet-cli\n    ```\n\n5.  Tunneling\
    \ software to expose your system over the Internet. In our case, we will be using\
    \ ngrok ([`https://ngrok.com/download`](https://ngrok.com/download)). This will\
    \ be needed for a web application hosted externally.\n\n## Use Case\n\nIn upcoming\
    \ sections, you will be implementing Webview component for Travvy. You will create\
    \ a web application to retrieve traveler information for booking Extreme Hiking\
    \ Holidays’ package. Figure [8-5](#479330_1_En_8_Chapter.xhtml#Fig5) shows the\
    \ mockup of the web application.\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig5_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5: Travvy web application\n\nClicking the Submit button, user profile\
    \ information will be processed, and the handle will be passed back to the skill,\
    \ and the user will be notified accordingly. If user clicks Cancel button, then\
    \ also we will pass the handle to the skill but will inform the skill that user\
    \ clicked Cancel button. Accordingly, a message will be displayed back to the\
    \ user. We are going to use Skill Tester for this demonstration, but you can also\
    \ expose the skill over a channel as described in Chapter [6](#479330_1_En_6_Chapter.xhtml).\
    \ Let’s have a look at the flow as displayed in Figure [8-6](#479330_1_En_8_Chapter.xhtml#Fig6).\n\
    \n1.  User greets the skill with “Hi.”\n2.  Skill replies back asking user to\
    \ enter his/her first name.\n3.  User enters his first name.\n4.  Skill then gives\
    \ a prompt asking the user to enter traveler’s information to complete the booking.\n\
    \n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig6_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6: Execution of Webview component\n\n5.  When the user clicks “Enter\
    \ Traveler Information,” the web app is launched in a separate window as you can\
    \ see in Figure [8-7](#479330_1_En_8_Chapter.xhtml#Fig7).\n6.  Application launch\
    \ with prefilled first name as provide in the skill.\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig7_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7: Web app invoked from Skill with first name prepopulated\n\n7.  If\
    \ the user clicks the Submit button without entering the mandatory fields, validation\
    \ messages are triggered as can be seen in Figure [8-8](#479330_1_En_8_Chapter.xhtml#Fig8).\n\
    \n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig8_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8: Web app validation messages\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig9_HTML.jpg](images/479330_1_En_8_Chapter/479330_1_En_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9: Confirmation message with full name\n\n8.  Once the user enters\
    \ mandatory details and submits the form, a confirmation message is displayed\
    \ to the user. In this case, user’s full name is displayed based on web application’s\
    \ response (see Figure [8-9](#479330_1_En_8_Chapter.xhtml#Fig9)).\n\n## Webview\
    \ Application Hosted Within Digital Assistant\n\nIn this section, we will explain\
    \ to you how to implement a Webview component with the web application being deployed\
    \ within the Digital Assistant. In the following subsections, you will find the\
    \ skill implementation and web application implementation. We will share the source\
    \ code and then explain that along the way."
