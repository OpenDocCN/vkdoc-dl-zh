  trans: "\n### 需触发的情感\n\n- 聊天机器人记住了他的偏好，令他**喜出望外**。\n- 聊天机器人的语气应：\n  - 对他具有**吸引力**\n\
    \  - 让他感到**愉悦**\n  - **激励**他采取行动\n- 他应对结果感到**满意**并充满**信心**。\n\n下图 3-3 展示了哈罗德在搜索并决定进行一次徒步旅行时的完整旅程。\n\
    \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig3_HTML.jpg](img/479330_1_En_3_Fig3_HTML.jpg)\n\
    \n**图 3-3** – 整体旅程与接触点\n\n对于我们将在此用例中创建的聊天机器人，重点将放在核心区域旅程的前三个部分以及顶部的两个部分。至于四个核心部分，您将在后续的图中找到完整的详细客户旅程。\n\
    \n由于聊天机器人只是用户为查找和预订行程所接触的众多接触点之一，因此梳理整个客户旅程以确保没有遗漏任何交互环节至关重要。在本书中，我们只关注用户与单一接触点（即聊天机器人）的交互。因此，在后续的图片中，旅程中与聊天机器人相关的部分会被高亮显示。\n\
    \n如图 3-3 所示，哈罗德做的第一件事是查看徒步假期的选项。在此过程中，他会接触到多个接触点，例如电视上的广告和“极限徒步假期”的在线信息，并且他会遇到他们的聊天机器人。\n\
    \n图 3-4 展示了一个详细的用户旅程，描述了哈罗德的主要意图、他的行动以及公司为支持他所做的活动。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig4_HTML.jpg](img/479330_1_En_3_Fig4_HTML.jpg)\n\
    \n**图 3-4** – ❶ 哈罗德找到了一个富有挑战性的假期\n\n在旅程图中，您还可以描述您认为用户在接触该接触点时应有的感受、将使用何种渠道进行接触，甚至使用场景。由于在此旅程中，哈罗德的假定使用场景主要是在工作或家中的台式电脑上，因此这些旅程图中未描述使用场景。\n\
    \n在哈罗德找到心仪的行程（当然，还要和霍莉确认一下）后，他想进行预订并完成下单。见图 3-5。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig5_HTML.jpg](img/479330_1_En_3_Fig5_HTML.jpg)\n\
    \n**图 3-5** – ❷ 哈罗德预订了选定的徒步假期\n\n预订未完成支付就不算完整。哈罗德可以通过网站在线支付预订费用，期间会得到聊天机器人的协助，并与他的银行保持密切联系。见图\
    \ 3-6。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig6_HTML.jpg](img/479330_1_En_3_Fig6_HTML.jpg)\n\
    \n**图 3-6** – ❸ 哈罗德为预订的假期付款\n\n当然，完成所有这些操作后，哈罗德需要收到关于其预订和支付成功的反馈。他可以在他的个人页面“我的极限徒步之旅”上在线获取这些信息，同时聊天机器人也可以提供这些信息以及他的门票/代金券。见图\
    \ 3-7。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig7_HTML.jpg](img/479330_1_En_3_Fig7_HTML.jpg)\n\
    \n**图 3-7** – ❹ 哈罗德收到预订确认\n\n## 渠道\n\n哈罗德与“极限徒步假期”沟通时最常使用的接触点是他们的 Facebook 页面和网站。这就是为什么在此用例中，聊天机器人将在\
    \ Facebook 和网站这两个渠道上与用户互动。当然，哈罗德可以在他的电脑和手机上与聊天机器人交流。\n\n## 对话\n\n### 机器人的个性\n\n\
    我们聊天机器人的用户像哈罗德一样年轻、活跃且热爱运动。他们几乎从不感到无聊。不工作时，他们就去徒步和进行（团队）运动。他们经常与朋友在一起，然后详细谈论他们的运动活动、徒步旅行和假期。\n\
    \n“极限徒步假期”公司的营销传播活动与这一形象相符。因此，聊天机器人的**语气**应该像是哈罗德自行车队中的一员。机器人的**名字**应与公司形象相符。由于该机器人将为“极限徒步假期”公司提供旅行相关服务，并且不应过于严肃，因此它将被命名为\
    \ `Travvy`。它的“**肖像**”/头像源自公司标志。见图 3-8。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig8_HTML.jpg](img/479330_1_En_3_Fig8_HTML.jpg)\n\
    \n**图 3-8** – `Travvy` “肖像”的选项\n\n`Travvy` 是**无性别**的，尽管与用户一起测试聊天机器人应能确认用户是否同意这一说法。\n\
    \n### 对话流程\n\n哈罗德的主要意图构成了对话流程的基础。如图 3-3 所示，整体旅程的每个阶段都由一个意图表示，该意图需要聊天机器人具备某种技能。在第一阶段，`Travvy`\
    \ 的“信息”技能将协助哈罗德，帮助他为他和霍莉找到合适的行程，并向 `Travvy` 表明他们的偏好。\n\n图 3-9 展示了哈罗德寻找行程的对话流程。\n\
    \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig9_HTML.jpg](img/479330_1_En_3_Fig9_HTML.jpg)\n\
    \n**图 3-9** – 寻找行程的对话流程\n\n在他旅程的第一阶段，`Travvy` 会要求哈罗德指明他的度假目的地（国家和区域），以及他心目中徒步旅行的难度等级。如果他决定从一个中心点进行三级徒步，他可以指明他偏好的住宿类型。\n\
    \n在哈罗德找到并选定心仪的假期后，`Travvy` 可以协助他预订该行程。为此，`Travvy` 将整合两项技能：“客户资料”技能和“预订”技能。\n\n\
    图 3-10 展示了哈罗德预订行程的对话流程。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig10_HTML.jpg](img/479330_1_En_3_Fig10_HTML.jpg)\n\
    \n**图 3-10** – 预订行程的对话流程\n\n哈罗德将被要求选择一个旅行时段，并验证/输入他自己及其旅伴的所有个人信息。\n\n现在哈罗德已经预订并确认了他的行程，`Travvy`\
    \ 会询问他是否需要协助付款。为此，`Travvy` 包含一个提供“支付”技能的即时应用。\n\n图 3-11 展示了哈罗德为行程付款的对话流程。\n\n\
    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig11_HTML.jpg](img/479330_1_En_3_Fig11_HTML.jpg)\n\
    \n**图 3-11** – 为行程付款的对话流程\n\n`Travvy` 会要求哈罗德选择他的银行账户，检查余额是否充足，然后进行转账。\n\n为了确认支付是否顺利，哈罗德需要确认信息。当然，他也希望收到与行程相关的门票和代金券。因此，`Travvy`\
    \ 包含一个提供“确认”技能的客户组件。\n\n图 3-12 展示了数字助手将提供的确认对话流程。\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig12_HTML.jpg](img/479330_1_En_3_Fig12_HTML.jpg)\n\
    \n**图 3-12** – 获取确认的对话流程\n\n`Travvy` 会给他一张收据，并可以帮助他保存/打印门票和代金券。\n"
- fmt: '# Backends


    During the conversation, `Travvy` requires `Harold` to enter personal data and
    payment information. Even though this data is needed for the conversation, it
    will not be stored inside the digital assistant itself. Typically such information
    will only be available from and stored in backends. Backends are the information
    systems that contain the data that is needed to support the dialog. The chatbot
    must be able to connect to these backend systems so it can include information
    from these systems in the conversation.


    Backends will have to provide REST interfaces that can be used to allow integration
    with the digital assistant. Within the digital assistant, custom components need
    to be coded for the actual integration with backend systems. One other way to
    integrate with backend systems is to use forms for data entry. `Travvy` uses a
    form to allow `Harold` to enter his personal data directly into the backend.


    # Entities and Utterances


    ## What Users Say/Write


    In the preceding paragraphs, we defined the user’s journey and formulated his
    intents. `Harold` can formulate his intents in so many ways (utterances). To make
    sure that `Travvy` understands what `Harold` means, `Travvy` should be trained.
    Training the bot is the most important factor in determining its performance.
    That is the reason why for each intent at least 10 possible utterances (up to
    50 is even better) should be formulated. Best would be if these sentences/utterances
    are varied and really come from end users.


    Never train your bot only with the utterances your development and project team
    come up with: they know the technical slang too well to accurately represent the
    real users like `Harold`.


    Figure [3-13](#479330_1_En_3_Chapter.xhtml#Fig13) shows different utterances for
    one of `Harold`''s intents.


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig13_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Utterances for the intent “Indicate Holiday Destination”


    ## What Travvy Says/Answers


    Keep in mind a chatbot is a conversational interface. A conversation should be
    interactive. `Travvy` should never reply with large blocks of texts (more than
    60 characters is too long). Therefore, the reply should be short, and images,
    buttons, lists, and other UX components should be used to make the conversation
    lively and rewarding and keep a user like `Harold` engaged.


    Figure [3-14](#479330_1_En_3_Chapter.xhtml#Fig14) shows how the interaction can
    be presented to the user.


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig14_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig14_HTML.jpg)


    Figure 3-14


    Using buttons and images to make the interaction easier for the user and more
    accurate for the bot


    Next to this way of presenting the dialog, you must make sure that the entire
    flow can be done using natural language. An example of a natural conversation
    can be found in Figure [3-15](#479330_1_En_3_Chapter.xhtml#Fig15).


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig15_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    `Travvy`''s feedback and answers for the intent “Indicate Holiday Destination”


    It is very important that `Travvy` gives `Harold` clear feedback regarding `Harold`''s
    questions/answers. This feedback will make sure that `Harold` is confident about
    the fact that `Travvy` understood him well.


    All other possible user utterances and bot replies defining the dialog can be
    found in the related Excel sheet.


    By taking all these tips into account, the conversational experience for the scenario
    that `Travvy` helps `Harold` select a holiday destination and books the journey
    for him might look as visualized in Figure [3-16](#479330_1_En_3_Chapter.xhtml#Fig16).


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig16_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    `Harold` selects a holiday destination and a travel period


    `Harold` can use the buttons, but he can also type/enter his answer. If your chatbot
    is voice driven, `Harold` can even “speak” to `Travvy`.


    The moment `Harold` selects a trip, `Travvy` can help him do the booking by asking
    `Harold` to verify/edit the personal data of himself and his travel party. See
    Figure [3-17](#479330_1_En_3_Chapter.xhtml#Fig17).


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig17_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig17_HTML.jpg)


    Figure 3-17


    `Travvy` asks `Harold` to verify/edit all personal data needed for the booking


    `Travvy` uses the “Customer Profile” skill to prefill some of the data already
    known. To display and collect that data, `Harold` will see a different screen.
    So that he also knows that this is a side-step from the chatbot dialog. In this
    screen, he is not chatting with `Travvy` but seriously filling in personal data.


    This additional screen might look like as presented in Figure [3-18](#479330_1_En_3_Chapter.xhtml#Fig18).


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig18_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig18_HTML.jpg)


    Figure 3-18


    `Harold` verifies his own profile and edits the personal data of his travel party


    If `Harold` does not want to edit the data now, he can cancel this screen to go
    back to the conversation.


    The moment `Harold` entered and verified the data, he can close the personal data
    screen by clicking OK and continue with the conversation as for example visualized
    in Figure [3-19](#479330_1_En_3_Chapter.xhtml#Fig19).


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig19_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig19_HTML.jpg)


    Figure 3-19


    `Travvy` now has all the required information for the booking


    At all times, `Harold` should be able to close/stop the conversation. Therefore,
    in the top-right corner of the screen, there is a close icon.


    # Test the Conversational Interface


    Evaluating the dialog in an early stage of the design process gives you the opportunity
    to improve the flow before a lot of expensive development effort is done.


    Figure [3-20](#479330_1_En_3_Chapter.xhtml#Fig20) shows that good design saves
    money.


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig20_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig20_HTML.jpg)


    Figure 3-20


    Good design saves money


    On the Internet, you can find all kind of tooling to mock up your design. Figure
    [3-21](#479330_1_En_3_Chapter.xhtml#Fig21) represents an example of such a mock
    up.


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig21_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig21_HTML.jpg)


    Figure 3-21


    Mockup of a possible start screen for `Travvy` on an iPhone


    By creating a mockup, in a very early stage of the design process, you can textually
    fine-tune the answers and questions of your bot and find out what the best way
    is to present your users the options you want to offer them.'
