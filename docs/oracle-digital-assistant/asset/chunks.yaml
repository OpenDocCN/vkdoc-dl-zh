- fmt: "### Note\n\nBefore you can use the `Skill Tester`, at the bottom of the left-hand\
    \ menu to test/use the `Skill Bot`, you must train it by clicking “train” in the\
    \ blue bar at the top.\n\n### Reviewing the Generated Artifacts\n\nTo understand\
    \ how the `Conversation Designer` works, it is best to have a closer look at the\
    \ generated artifact. This will allow us to know where `Intents` and `Entities`\
    \ are extracted from the mockup and how the dialog flow is derived. First, we\
    \ will have a look at the `Intents`. As stated before, `Intents` are derived from\
    \ tasks, and the sample utterances are generated based on the first message in\
    \ the conversation. For the example of `FindTrip`, the message “*I want to go\
    \ on an extreme hiking trip*” was entered. Looking at Figure [4-12](#479330_1_En_4_Chapter.xhtml#Fig12),\
    \ you learn the following:\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig12_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig12_HTML.jpg)\n\
    \n**Figure 4-12** Generated Intents\n\n- `FindTrip` intent is created based on\
    \ the task `Find a Trip`.\n    - There are five utterances added to this intent,\
    \ all directly derived from the message as entered in the `Designer`.\n- `Greeting`\
    \ intent is created.\n\nNext we can look at the generated entities. As you can\
    \ see, there are ten entities created for this `Skill Bot`. These entities (Figure\
    \ [4-13](#479330_1_En_4_Chapter.xhtml#Fig13)) are derived from the bot replies\
    \ as entered in the `Conversation Designer`. You notice that there are individual\
    \ entities and composite bag entities, both of which will be explained in more\
    \ detail in Chapter [5](#479330_1_En_5_Chapter.xhtml).\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig13_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig13_HTML.jpg)\n\
    \n**Figure 4-13** Generated Entities\n\nFor example is the `TripDestination` entity.\
    \ This was generated as a `ValueList` entity with *USA, Canada, and Switzerland/France*\
    \ as values. Clearly this was derived from the message “*What holiday destination\
    \ would you like to visit?”* as displayed in Figure [4-14](#479330_1_En_4_Chapter.xhtml#Fig14).\n\
    \n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig14_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig14_HTML.jpg)\n\
    \n**Figure 4-14** Message used to derive `TripDestination` entity\n\nFinally,\
    \ the complete `OBotML` flow definition `YAML` file was generated. We will not\
    \ discuss the contents in detail, but a high-level explanation should be enough\
    \ to give you a clue. When you open the flow editor, you will notice that the\
    \ first part contains a whole bunch of lines starting with `#!` These lines contain\
    \ the mockup definition as a `JSON` object.\n\n### Note\n\nSometimes you do not\
    \ see the lines starting with `#!` Usually this is because the lines are collapsed,\
    \ indicated by `{←`→`}`. You can expand the section by clicking the small arrow\
    \ next to line number 1.\n\nBesides the mockup definition, the `YAML` file also\
    \ contains the actual flow definition of the `Skill Bot`. All the states are generated\
    \ including an `Unresolved Intent` state. There are `System.Output` components\
    \ for each simple bot reply and `System.CommonResponse` components for the complex\
    \ replies, like the `Actions` and `Cards`. An example for “Go to USA” subtask\
    \ and its individual cards is displayed in the following. First, a variable name\
    \ `levelCards` is set to contain all info regarding the cards.\n\n```\n--------------------\
    \  # Task \"Go to USA\" ---------------  ---------------\nsetLevelCards:\ncomponent:\
    \ System.SetVariable\nproperties:\nvariable: levelCards\nvalue:\nnp:\ntitle: Yosemite\
    \ NP\nimageUrl: \"\"\ndescription: \"Steep mountains, great views\"\naction1Label:\
    \ Yosemite - Hiking level T4\naction1Branch: Select Yosemite T4\naction2Label:\
    \ Yosemite - Hiking level T5\naction3Label: Yosemite - Hiking level T6\nyellowstone\
    \ np:\ntitle: Yellowstone NP\nimageUrl: \"\"\ndescription: Amazing geysers in\
    \ full color\naction1Label: Yellowstone - Hiking level T4\naction1Branch: Select\
    \ Yellow T4\naction2Label: Yellowstone - Hiking level T5\naction2Branch: Select\
    \ Yellow T5\naction3Label: Yellowstone - Hiking level T6\nzion np:\ntitle: Zion\
    \ NP\nimageUrl: \"\"\ndescription: Matching green grey and orange\naction1Label:\
    \ Zion - Hiking level T4\naction2Label: Zion - Hiking level T5\naction3Label:\
    \ Zion - Hiking level T6\ntransitions: {}\n```\n\nThis variable will then be used\
    \ to extract the information that needs to be displayed in the individual cards.\
    \ All the nitty-gritty details regarding `Entities`, `Intents`, and flow will\
    \ be explained in the next chapters of this book. For now, it is sufficient to\
    \ know that these are automatically generated for you and that you have some understanding\
    \ how they are derived from your mockup.\n\n### Testing the Generated Skill Bot\n\
    \nThe final step is the actual testing of the generated `Skill Bot`. The one remaining\
    \ task, if that was not done previously, is to train the `Skill Bot`. You can\
    \ easily see if training is required by looking at the icon next to `Train` in\
    \ the toolbar. If it is an exclamation mark, it means that training is required\
    \ (Figure [4-15](#479330_1_En_4_Chapter.xhtml#Fig15)). If it is a checked box,\
    \ that means no training is required.\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig15_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig15_HTML.jpg)\n\
    \n**Figure 4-15** Training is required\n\nIf training is required, you need to\
    \ click `Train` in the blue toolbar bar at the top and submit the popup that is\
    \ displayed. The training will start and usually succeed without any failures.\
    \ You will notice the exclamation mark will change into a checked box, meaning\
    \ that training was successful. You are now ready to test the `Skill Bot`. The\
    \ test can be started by clicking the play button in the toolbar on the left (Figure\
    \ [4-16](#479330_1_En_4_Chapter.xhtml#Fig16)).\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig16_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig16_HTML.jpg)\n\
    \n**Figure 4-16** Start the tester\n\nThe `Skill Tester` popup is displayed, and\
    \ you can start a conversation with the `FindTrip` `Skill Bot` by entering a message\
    \ like “*Hi, I want to go on an extreme hiking trip to the USA*” (Figure [4-17](#479330_1_En_4_Chapter.xhtml#Fig17)).\
    \ The `Skill Bot` will reply and offer you the option to select a hiking trip.\
    \ Note that USA is already preselected as destination, because the bot recognized\
    \ it from your utterance.\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig17_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig17_HTML.jpg)\n\
    \n**Figure 4-17** Running the tester with the generated `Skill Bot`\n\nNext you\
    \ can browse the National Parks in the carousel and select the hiking level you\
    \ prefer by clicking it. The conversation will continue, just as defined in the\
    \ `Conversation Designer`.\n\nYou can always reenter the `Conversation Designer`\
    \ to make changes to your prototype and regenerate the `Skill Bot`.\n\n### Note\n\
    \nAlways keep in mind that regenerating means that all changes that were manually\
    \ done in the `OBotML` to `Entities`, `Intents`, and flow will be overwritten.\n\
    \n## Summary\n\nIn this chapter, you have learned how the `Conversation Designer`\
    \ of `Oracle Digital Assistant` can be used to implement a mockup/the initial\
    \ skeleton of a `Skill Bot`. The `Conversation Designer` is very beneficial in\
    \ the early stages of development as it will not allow you to implement more sophisticated\
    \ functionality such as Q and A, translations, custom components, and agent integration.\
    \ These functionalities need to be implanted after generating the `OBotML` for\
    \ the `Skill Bot`. All of this will be explained in the next chapters of this\
    \ book, where you will also learn more about `Entities`, `Intents`, and conversation\
    \ flow."
  raw: "### Note\n\nBefore you can use the Skill Tester, at the bottom of the left-hand\
    \ menu to test/use the Skill Bot, you must train it by clicking “train” in the\
    \ blue bar at the top.\n\n**Reviewing the Generated Artifacts**\n\nTo understand\
    \ how the Conversation Designer works, it is best to have a closer look at the\
    \ generated artifact. This will allow us to know where Intents and Entities are\
    \ extracted from the mockup and how the dialog flow is derived. First, we will\
    \ have a look at the Intents. As stated before, Intents are derived from tasks,\
    \ and the sample utterances are generated based on the first message in the conversation.\
    \ For the example of FindTrip, the message “*I want to go on an extreme hiking\
    \ trip*” was entered. Looking at Figure [4-12](#479330_1_En_4_Chapter.xhtml#Fig12),\
