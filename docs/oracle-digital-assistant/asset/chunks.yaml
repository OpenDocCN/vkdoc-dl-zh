    *   Facebook Messenger


    *   Webhook


    *   Web


    *   iOS


    *   Android


    *   Twilio SMS (text only)


    *   WeChat


    *   Slack


    *   Microsoft Teams


    *   Cortana


    *   Skype For Business


    ### Agent Integrations


    As it is self-explanatory by its name, you create an Agent Integration channel
    when you wish to involve a human agent during the course of a conversation. Agent
    Integration uses Oracle Service Cloud (18C or later) to pass the information provided
    by a user during the course of a conversation, to a live agent. In that way, when
    a live agent takes the control of conversation from the bot and starts interacting
    with the user, they don’t need to ask user to provide required information once
    again. Agent Integration will be discussed in detail in a separate chapter of
    this book.


    ### Applications


    Applications channel is used when you want to have an event-driven conversation.
    In simple words, you initiate the conversation with your Skill or Digital Assistant
    at specific (bot flow) state based on an event generated from a different application.


    ### System


    This is a system-specific default channel for your Oracle Digital Assistant instance.
    This channel is used when testing your Skill or Digital Assistant using Skill
    Tester ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figa_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Figa_HTML.jpg).
    You can’t create any additional System channel by yourself. It is important to
    mention here that any changes being made on this channel are applicable across
    all Skills as well as Digital Assistants in the instance.


    ## Working with Channels


    In this section, you will learn to create channel for your Oracle Digital Assistant
    (ODA). Log in to your ODA instance and click the icon ![../images/479330_1_En_6_Chapter/479330_1_En_6_Figb_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Figb_HTML.jpg)
    at top-left corner to open the side menu. Select Channels located under the Development
    section. Refer to Figure [6-1](#479330_1_En_6_Chapter.xhtml#Fig1). This will take
    you to the Channels screen.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig1_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Select Channels


    Once you are on the Channels screen, you will notice it contains four different
    tabs specific to each channel type discussed in the previous section. By default,
    the Users tab is displayed when you navigate to Channels as shown in Figure [6-2](#479330_1_En_6_Chapter.xhtml#Fig2).
    It also displays you a list of preconfigured Users channels, if you have created
    any.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig2_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Users channel


    This section allows you to create new Users channels as well as maintain, that
    is, update, or delete previously created Users channels. This will be discussed
    in detail in upcoming sections of this chapter.


    Next, click the Agent Integrations tab. This tab allows you to create and manage
    Agent Integrations channels. Similar to the Users tab, this will show you preconfigured
    channels in case you happen to have any. As you can see in Figure [6-3](#479330_1_En_6_Chapter.xhtml#Fig3),
    we have not yet created any Agent Integrations. Hence, there is no channel being
    displayed here.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig3_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Agent Integrations channel


    Click the next tab, Applications. This tab allows you to create and manage your
    Application channel for ODA instance. Similar to previous tabs, you can find all
    your previously created Applications channel, if you have any. Check Figure [6-4](#479330_1_En_6_Chapter.xhtml#Fig4).


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig4_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Applications channel


    Click the last tab of this screen, which is System. As you can see in Figure [6-5](#479330_1_En_6_Chapter.xhtml#Fig5),
    this tab comes with the prebuilt default **System_Global_Test** channel.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig5_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    System channel


    If you toggle Channel Enabled switch on this screen, that would enable or disable
    all the Skill Testers in your ODA instance based on what you select. Same goes
