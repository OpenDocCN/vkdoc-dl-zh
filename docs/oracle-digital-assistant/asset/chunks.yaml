- fmt: "# Oracle Digital Assistant\n\nThe majority of the aforementioned chatbots\
    \ were aiming for personal use. Although they could also be used in enterprise\
    \ solutions, looking at requirements, there were many gaps between what the solutions\
    \ offer and what the enterprise needs.\n\nBridging the gap between personal Digital\
    \ Assistants and enterprise-grade Digital Assistants is exactly where Oracle aims\
    \ to be, and by the end of 2016, Oracle released their first version of Oracle\
    \ Digital Assistant. At that time, it was called Oracle Chatbot, and it was part\
    \ of the Oracle Mobile Cloud Service. Some 2 years later, Oracle released Oracle\
    \ Digital Assistant (ODA) cloud service, a product dedicated to developing and\
    \ running digital assistants. Digital assistants are virtual personal assistants\
    \ that understand natural language when interacting with users. Typically, simple\
    \ chatbots resolve users’ intent and help them to complete a simple task. Oracle\
    \ Digital Assistant goes one step beyond that. Each digital assistant contains\
    \ a collection of specialized skills. The assistants can be trained to use these\
    \ multiple different “skills.” These skills can have their own backend domain\
    \ integrations and can be used in the course of an across-skill user conversation\
    \ to work with these backends. They will evaluate user input and invoke the appropriate\
    \ skill to start or continue the conversation.\n\nThrough this approach, everything\
    \ a user needs to do can be done in a single conversation, without the need to\
    \ work with multiple chatbots. Users can also switch in the middle of a conversation,\
    \ and the Digital Assistant will still understand the context of the users’ questions.\
    \ Sharing of context between the skills is key to success and very important in\
    \ providing a good user experience. Think of something like someone’s location,\
    \ mood, or needs in a particular moment. These attributes can impact what messages\
    \ the user will be receptive to and, even more critically, when and where.\n\n\
    Oracle Digital Assistant is also capable of initiating a conversation with a user,\
    \ based on scheduled events that are received from external applications. This\
    \ is called Application-Initiated Conversation (AIC). The Oracle Digital Assistant\
    \ can use content of the application’s event message to begin a conversation at\
    \ a predetermined state in the dialog. This is something that differentiates Oracle\
    \ Digital Assistant from other chatbots, which typically only “speak when spoken\
    \ to.”\n\n# Oracle Digital Assistant Core Components\n\nTo get a clear understanding\
    \ of Oracle Digital Assistant (ODA), you need to know its high-level architecture.\
    \ Oracle Digital Assistant consists of a set of components working together to\
    \ enable the development and use of enterprise-grade digital assistants. In this\
    \ section, you will learn what these components are and what their main purpose\
    \ is.\n\n![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig1_HTML.jpg](images/479330_1_En_1_Chapter/479330_1_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1\n\nOracle Digital Assistant – core components\n\nThe Oracle Digital\
    \ Assistant is a Platform as a Service (PaaS) that enables you to create digital\
    \ assistants and to expose these to many different interfaces, called channels.\
    \ Oracle Digital Assistant allows you to create both `Digital Assistants` and\
    \ `Skills`.\n\nDigital assistants can help users to do multiple tasks in natural\
    \ language conversations. Each digital assistant typically has its own set of\
    \ skills.\n\nSkills can be seen as conversational workhorses that can be used\
    \ with one or many digital assistants. Think of tasks such as ordering flowers\
    \ in a specific shop or checking the balance on a bank account. With Oracle Digital\
    \ Assistant, the use of a skill is not limited to a single digital assistant.\n\
    \nImplementation of Skills and Digital Assistants relies on four core components\
    \ (Figure [1-1](#479330_1_En_1_Chapter.xhtml#Fig1)) working together:\n\n*   The\
    \ conversational AI engine\n    *   Enables the Digital Assistant to work with\
    \ user input\n*   The dialog flow\n    *   Defines the interactions that users\
    \ can have with a specific skill\n*   Enterprise data integration\n    *   Enables\
    \ Digital Assistants to connect to backend systems via their skills\n*   The channel\
    \ configurator\n    *   Enables Digital Assistants to be used in messaging platforms\n\
    \nBefore we dive into the development of skills and digital assistants, you need\
    \ to get some understanding of some of these concepts, which will be explained\
    \ in the remainder of this chapter. We will first have a look at the conversational\
    \ AI engine.\n\n## Conversational AI Engine\n\nWhen using Oracle Digital Assistant,\
    \ you do not have to worry about the technologies that are used to process and\
    \ understand the natural language or how to work with user input. Oracle Digital\
    \ Assistant uses different technologies based on neural networks to implement\
    \ its own conversational AI engine (Figure [1-2](#479330_1_En_1_Chapter.xhtml#Fig2)).\
    \ These use linguistic and language modeling to enable processing of natural language\
    \ from the end user.\n\n![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig2_HTML.jpg](images/479330_1_En_1_Chapter/479330_1_En_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2\n\n*Oracle Digital Assistant – conversational AI engine*\n\nWith\
    \ this in place, the developer can focus on the user conversations instead of\
    \ having to know all the nitty-gritty details of these underlying algorithms.\n\
    \nBoth intents and entities are common NLP (natural language processing) concepts.\
    \ NLP is the science of extracting the intention of text and relevant information\
    \ from text.\n\n`Intents` are groups of tasks or actions that a user expects your\
    \ skill to perform for them. Intents usually include verbs and nouns such as “give\
    \ quote,” “get dates,” and “find trip.” They allow your skill to understand what\
    \ the user wants it to do. In other words, they can determine the users’ intent.\
    \ For instance, a `FindTrip` intent can relate to a direct instruction, such as\
    \ *I want to find a trip*, but also to other requests, like *I’m really in for\
    \ a short holiday*, both of which are `utterances` for the same intent.\n\nWhereas\
    \ intents map words and phrases to a specific action, `entities` add context to\
    \ the intent itself. They are key identifiers for pieces of user input which enable\
    \ a skill to fulfill a task. Basically, entities are words that modify the intents\
    \ (big, modern, outdoor, short, best available). Entities can be divided into\
    \ user-created entities and system entities. All of the aforementioned concepts\
    \ will be discussed in more detail throughout this book."
