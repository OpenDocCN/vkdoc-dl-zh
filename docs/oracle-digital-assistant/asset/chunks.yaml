  trans: "\n### 注意\n\n如果您希望使用 Oracle VBCS 创建 SPA，它将存在一些限制。由于 VBCS 的后端负责业务对象、对业务对象的\
    \ REST 调用以及业务对象的用户访问（使用 Oracle Identity Cloud Service，IDCS），这些功能在您导出应用程序时将不可用。如果您希望使用\
    \ Oracle VBCS 来构建 SPA，则必须在外部部署应用并显式处理这些功能。\n\n### 外部托管的 Webview 应用程序\n\n如果您已有想要用作\
    \ Webview 的现有应用程序，则需要采用此方法。当您的应用程序有安全要求或需要使用服务器端基础设施等情况时，这属于典型场景。与本地部署的应用程序不同，您的外部应用程序可能是也可能不是\
    \ SPA。唯一的要求是，您希望使用的应用程序应能通过来自技能的 GET 请求进行访问。在外部托管 Web 应用程序的情况下，您需要使用一个中介服务，该服务将负责为技能组合应用程序调用\
    \ URL。然后，技能使用 GET 方法调用 Web 应用程序。您可以根据需求，将中介服务和 Web 应用程序托管在同一服务器或不同服务器上。\n\n流程如下所述：\n\
    \n1.  技能中的 `System.Webview` 组件向中介服务发送一个 POST 请求，请求中包含输入参数和有效载荷中的回调 URL。\n2.  中介服务向技能返回一个\
    \ JSON 对象，该对象仅包含一个属性 `webview.url`，其中包含 Web 应用程序 URL 以及指向技能的回调 URL。如果需要向 Web 应用程序传递任何参数，这些参数将附加到\
    \ `webview.url` 属性中。技能中的 `System.Webview` 组件随后使用此属性向 Web 应用程序发起所有后续的 GET 请求。\n\
    3.  技能发送一个 GET 请求以启动应用程序。\n4.  Web 应用程序处理该请求，并向回调 URL 发起一个 POST 调用，指示应用程序已完成处理。同样，如果您需要从\
    \ Web 应用程序向技能中的 Webview 组件传回任何数据，则该数据将作为 JSON 对象传递，并存储在从 `System.Webview` 变量属性引用的对话流变量中。然后，您可以在对话流中通过\
    \ `${variable_name.value.param_name}` 访问此数据。\n\n图 8-3 展示了上述流程的图示，其中中介服务和 Web 应用程序托管在同一\
    \ Web 服务器上。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig3_HTML.jpg](img/479330_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3：外部托管的 Web 应用程序\n\n图 8-4 展示了中介服务和 Web 应用程序位于不同服务器时的流程。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig4_HTML.jpg](img/479330_1_En_8_Fig4_HTML.jpg)\n\
    \n图 8-4：服务与应用程序位于不同服务器的外部托管 Web 应用程序\n\n## 前提条件\n\n现在您已经熟悉了实现 Webview 组件的两种方法，让我们来看看这两种方法的具体实现。在这两种情况下，我们都将使用\
    \ Oracle JET 作为 JavaScript 框架来构建我们的 Web 应用程序。如前所述，您并非必须使用 Oracle JET，也可以使用您偏好的任何其他框架。在接下来的章节中，我们不会解释如何使用\
    \ Oracle JET 设计应用程序，而是主要关注实现部分。如果您想了解更多关于 Oracle JET 的信息，我们建议您访问官方网站：[`www.oracle.com/webfolder/technetwork/jet/index.html`](http://www.oracle.com/webfolder/technetwork/jet/index.html)。\n\
    \n以下是您需要拥有/安装的前提条件列表，以便遵循实现步骤：\n\n1.  访问 Digital Assistant 环境（19.1.5 或更高版本）的权限。\n\
    2.  下载并安装 Node.js ([`https://nodejs.org/en/download/`](https://nodejs.org/en/download/))。\n\
    3.  Microsoft Visual Studio Code IDE ([`https://code.visualstudio.com/download`](https://code.visualstudio.com/download))。\n\
    4.  安装 Oracle JET 命令行界面（在 Node.js 安装之后）。\n\n    Windows\n\n    ```\n    npm install\
    \ -g @oracle/ojet-cli\n    ```\n\n    MAC\n\n    ```\n    sudo npm install -g\
    \ @oracle/ojet-cli\n    ```\n\n5.  用于将您的系统暴露在互联网上的隧道软件。在我们的案例中，我们将使用 ngrok ([`https://ngrok.com/download`](https://ngrok.com/download))。这对于外部托管的\
    \ Web 应用程序是必需的。\n\n## 用例\n\n在接下来的章节中，您将为 Travvy 实现 Webview 组件。您将创建一个 Web 应用程序来检索预订\
    \ Extreme Hiking Holidays 套餐的旅行者信息。图 8-5 展示了该 Web 应用程序的模型图。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig5_HTML.jpg](img/479330_1_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5：Travvy Web 应用程序\n\n点击“提交”按钮后，用户档案信息将被处理，句柄将传回给技能，并相应通知用户。如果用户点击“取消”按钮，我们也会将句柄传递给技能，但会告知技能用户点击了“取消”按钮。相应地，会向用户显示一条消息。我们将在此演示中使用\
    \ Skill Tester，但您也可以按照第 6 章所述，通过渠道公开技能。让我们看一下图 8-6 中显示的流程。\n\n1.  用户向技能打招呼说“你好”。\n\
    2.  技能回复，要求用户输入其名字。\n3.  用户输入其名字。\n4.  技能随后提示用户输入旅行者信息以完成预订。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig6_HTML.jpg](img/479330_1_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6：Webview 组件的执行\n\n5.  当用户点击“输入旅行者信息”时，Web 应用程序会在一个单独的窗口中启动，如图 8-7 所示。\n\
    6.  应用程序启动时，会预填在技能中提供的名字。\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig7_HTML.jpg](img/479330_1_En_8_Fig7_HTML.jpg)\n\
    \n图 8-7：从技能调用的 Web 应用程序，名字已预填\n\n7.  如果用户未填写必填字段就点击“提交”按钮，则会触发验证消息，如图 8-8 所示。\n\
    \n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig8_HTML.jpg](img/479330_1_En_8_Fig8_HTML.jpg)\n\
    \n图 8-8：Web 应用程序验证消息\n\n![../images/479330_1_En_8_Chapter/479330_1_En_8_Fig9_HTML.jpg](img/479330_1_En_8_Fig9_HTML.jpg)\n\
    \n图 8-9：包含全名的确认消息\n\n8.  一旦用户输入必填详细信息并提交表单，将向用户显示一条确认消息。在此案例中，根据 Web 应用程序的响应显示用户的全名（见图\
    \ 8-9）。\n\n## 在 Digital Assistant 内部托管的 Webview 应用程序\n\n在本节中，我们将向您解释如何实现一个 Webview\
    \ 组件，其中 Web 应用程序部署在 Digital Assistant 内部。在以下小节中，您将找到技能实现和 Web 应用程序实现。我们将分享源代码并沿途进行解释。\n"
- fmt: "### Skill Implementation\n\nCreate a new skill in your Digital Assistant environment\
    \ with the name `TravvyWebview`. Navigate to Flows and replace the content as\
    \ provided in the following:\n\n1. At \"context\" level, you have defined two\
    \ \"variables\":\n   - `travellerFirstName`: Variable to store user's first name\
    \ and pass it to the web application for booking\n   - `appResponse`: Variable\
    \ to store response from the web application\n\n2. In the state `askTravelerInfo`,\
    \ you asked user to provide first name. Notice that you are storing user's response\
    \ in `travellerFirstName` variable.\n\n3. In the next state `webview`, you added\
    \ `System.Webview` component by clicking and then selected Webview from the User\
    \ Interface component category. Take a look at the various properties defined\
    \ for the component:\n   - `service`: Name of the Webview service. You will create\
    \ this service in the upcoming section.\n   - `sourceVariableList`: List of source\
    \ variable(s), which will be passed to the web application.\n   - `variable`:\
    \ Variable where the response of the web application will be stored.\n   - `prompt`:\
    \ Message prompt which will be displayed to the user asking them to provide additional\
    \ information in the web application.\n   - `linkLabel`: Label of the button,\
    \ clicking which the web application will be launched.\n   - `cancelLabel`: Label\
    \ of the Cancel button, in case the user doesn't wish to provide user's information\
    \ for booking.\n   - `transitions`: Here you have defined the transition flow\
    \ for the next state to evaluate application response and to cancel.\n\n4. Next\
    \ state in the dialog flow is `evaluateWebviewResponse`. In this state, you are\
    \ evaluating the response of the web application, `${appResponse.value.status}`.\
    \ In the web application, you will define two statuses, \"success\" and \"cancel.\"\
    \ In this state, you are checking whether the status from the web application\
    \ is success or cancel. Based on the status, you then invoke the appropriate state.\n\
    \n5. In case of \"success\" status from web application, you invoke `confirmBooking`\
    \ state. In this state, you are displaying confirmation message to the user based\
    \ on the values entered in the web application. Check the expression you used\
    \ for this purpose `${appResponse.value.firstName} ${appResponse.value.lastName}`.\n\
    \n6. In case of \"cancel\" status from web application or cancel action from the\
    \ `System.Webview` component, you invoke `onCancel` state. In this state, you\
    \ gracefully handled user's cancel response and displayed an appropriate message.\n\
    \n```\n#metadata: information about the flow\n#  platformVersion: the version\
    \ of the bots platform that this flow was written to work with\nmetadata:\nplatformVersion:\
    \ \"1.0\"\nmain: true\nname: TravvyWebview\n#context: Define the variables which\
    \ will used throughout the dialog flow here.\ncontext:\nvariables:\ntravellerFirstName:\
    \ \"string\"\nappResponse: \"string\"\n#states is where you can define the various\
    \ states within your flow.\nstates:\naskTravelerInfo:\ncomponent: \"System.Text\"\
    \nproperties:\nprompt: \"To proceed with booking, please provide your first name.\"\
    \nvariable: \"travellerFirstName\"\ntransitions:\nnext: \"webview\"\nwebview:\n\
    component: \"System.Webview\"\nproperties:\nservice: \"travvyWebview\"\nsourceVariableList:\
    \ \"travellerFirstName\"\nvariable: \"appResponse\"\nprompt: \"Press 'Enter Traveler\
    \ Information' to complete your booking\"\nlinkLabel: \"Enter Traveler Information\"\
    \ncancelLabel: \"Cancel\"\ntransitions:\nnext: \"evaluateWebviewResponse\"\nactions:\n\
    cancel: \"onCancel\"\nevaluateWebviewResponse:\ncomponent: \"System.Switch\"\n\
    properties:\nsource: \"${appResponse.value.status}\"\nvalues:\n- \"success\"\n\
    - \"cancel\"\ntransitions:\nactions:\nsuccess: \"confirmBooking\"\ncancel: \"\
    onCancel\"\nNONE: \"onCancel\"\nconfirmBooking:\ncomponent: \"System.Output\"\n\
    properties:\ntext: \"Booking has been confirmed for ${appResponse.value.firstName}\
    \ ${appResponse.value.lastName}. Thanks for choosing Travvy!\"\nkeepTurn: false\n\
    transitions:\nreturn: \"done\"\nonCancel:\ncomponent: \"System.Output\"\nproperties:\n\
    text: \"Sorry that you canceled your booking. Hope to see you back soon!\"\ntransitions:\n\
    return: \"done\"\n```\n\n### Web Application Implementation\n\nOnce you have Oracle\
    \ JET CLI installed on your system, you can easily create a sample application\
    \ by issuing the command:\n\n```\nojet create  --template=navdrawer|navbar|basic|blank\n\
    ```\n\nin command prompt or on terminal from the location where you would like\
    \ to create the application. For this demonstration, you can simply invoke the\
    \ following command:\n\n1. Once done, open your `appController.js` (`\\travvyWebviewApp\\\
    src\\js\\appController.js`) and update the app name to \"Travvy Web App\" as follows:\n\
    \n```\n    self.appName = ko.observable(\"Travvy Webview App\");\n```\n\n2. Open\
    \ `index.html` file (`\\travvyWebviewApp\\src\\index.html`) and update **title**\
    \ under **head** section as follows:\n\n```\n    Travvy Webview App\n```\n\n3.\
    \ Replace the body section of your same `index.html` (`\\travvyWebviewApp\\src\\\
    index.html`) with the following code:\n\n```\nTraveler Information\n\nYes\n  \
    \  No\n\nSubmit\n    Cancel\n```\n\nIn this body section, you have defined various\
    \ screen elements as displayed earlier in Figure 8-5 and added the on-screen validation.\n\
    \n4. Finally, open `main.js` (`\\travvyWebviewApp\\src\\js\\main.js`) file of\
    \ your application, and replace the entire content of the file with the following\
    \ code."
