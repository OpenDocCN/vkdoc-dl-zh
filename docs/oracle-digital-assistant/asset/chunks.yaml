  trans: "\n### Apache FreeMarker 模板语言\n\n为简单起见，在 ODA 环境中，您使用 Apache FreeMarker 模板语言\
    \ (FTL) 来设置和访问变量的值（以及它们的属性，如果有的话）。如果您想了解更多关于 FTL 的信息，可以访问其官方网站 [`freemarker.apache.org/`](https://freemarker.apache.org/)。\n\
    \n在对话流中使用 FTL 的语法相当直接。您只需将想要使用 FTL 处理的所有内容包裹在 `${…}` 中。您可以在组件的属性定义中使用 FTL（组件将在本章下一节中描述）。例如，如果您定义了一个名为\
    \ `myVariable` 的变量，并想读取它的值，那么您只需使用：\n\n- `${myVariable.value}`\n\n或者，如果您定义了一个变量，它是一个类型为\
    \ `ADDRESS` 的复杂实体，比如 `userAddress`，那么您可以使用 FTL 来提取城市，如下所示：\n\n- `${userAddress.value.city}`\n\
    \nFTL 的用途不仅限于此。您还可以使用 FTL 在流程中编写复杂的表达式。一个非常常见的场景是在 `System.CommonResponse` 组件中使用\
    \ FTL，您可以在其中使用 `if`、`else` 或 `elseif` 指令定义条件。其语法如下：\n\n- `<#if yourCondition>result1<#else>result2</#if>`\n\
    - `<#if firstCondition>result1<#elseif secondCondition>result2<#elseif thirdCondition>result3</#if>`\n\
    \n当然，FTL 的使用并不仅限于 `CommonResponse` 组件，您可以在整个对话流中使用它们，用于在机器人响应中赋值或进行评估。\n\n此外，您还可以使用\
    \ FTL 支持的各种操作，例如针对字符串、数字、日期时间值等的操作。要了解更多信息，请参考链接 [`freemarker.apache.org/docs/ref.html`](https://freemarker.apache.org/docs/ref.html)。\n\
    \n对 FTL 进行冗长的讨论，涵盖所有这些用例和操作，可能会超出本书的范围。因此，我们在此结束本节。任何 FTL 的进一步用法将在需要时进行解释。\n\n\
    ### 对话流中的组件\n\n您想在技能中实现的任何功能都来自组件。无论您是想显示卡片或列表、根据用户输入执行特定操作、显示任何输出、状态转换、处理错误等，甚至是想执行某些特定任务（如调用\
    \ REST 调用来处理用户响应），您都将借助组件来完成所有这些操作。\n\n组件可以大致分为两类：\n\n- 内置组件\n- 自定义组件\n\n顾名思义，内置组件是\
    \ Oracle 作为数字助手框架的一部分提供给您的组件，供您在技能中使用。这些组件足以执行大多数技能操作。您可以在流程中轻松识别这些组件，因为它们总是在\
    \ `states` 部分的 `component` 下以 `System.` 开头。请参考图 5-26。\n\n如果在任何时候，您想在技能中执行某些无法使用内置组件完成的操作，那么您可以定义自己的组件。您为执行特定任务而创建的这些组件称为自定义组件。\n\
    \n#### 内置组件\n\n如前所述，这些是 ODA 框架中预定义的组件。要将内置组件添加到您的流程中，您需要点击编辑器顶部的 `+ Components`\
    \ 按钮。这将打开一个新窗口，如图 5-27 所示，为您提供多种组件类型可供选择。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig27_HTML.jpg](img/479330_1_En_5_Fig27_HTML.jpg)\n\
    \n图 5-27 组件类型\n\n如上图所示，ODA 为您提供了五种类型的内置组件。通过选择一种组件类型，您可以选择属于该类型的组件模板。下面，您可以找到属于图\
    \ 5-27 中所示每种组件类型的完整组件模板列表：\n\n1.  控制\n    1.  `component: \"System.ConditionEquals\"\
    `\n    2.  `component: \"System.ConditionExists\"`\n    3.  `component: \"System.Switch\"\
    `\n\n2.  语言\n    1.  `component: \"System.DetectLanguage\"`\n    2.  `component:\
    \ \"System.Intent\"`\n    3.  `component: \"System.MatchEntity\"`\n    4.  `component:\
    \ \"System.QnA\"`\n    5.  `component: \"System.TranslateInput\"`\n    6.  `component:\
    \ \"System.TranslateOutput\"`\n\n3.  安全\n    1.  `component: \"System.OAuth2AccountLink\"\
    `\n    2.  `component: \"System.OAuthAccountLink\"`\n\n4.  用户界面\n    1.  `component:\
    \ \"System.AgentConversation\"`\n    2.  `component: \"System.AgentInitiation\"\
    `\n    3.  `component: \"System.CommonResponse\"`\n    4.  `component: \"System.List\"\
    `\n    5.  `component: \"System.Output\"`\n    6.  `component: \"System.ResolveEntities\"\
    `\n    7.  `component: \"System.Text\"`\n    8.  `component: \"System.Webview\"\
    `\n\n5.  变量\n    1.  `component: \"System.CopyVariables\"`\n    2.  `component:\
    \ \"System.ResetVariables\"`\n    3.  `component: \"System.SetVariable\"`\n\n\
    要添加这些类型的组件及其完整状态，您需要点击该类型，然后系统会为您提供添加该类型特定组件的选项。请参考图 5-28，这是您在选择控制类型时看到的界面。您只需选择\
    \ `Apply` 按钮即可将组件添加到您的流程中。\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig28_HTML.jpg](img/479330_1_En_5_Fig28_HTML.jpg)\n\
    \n图 5-28 添加控制类型组件\n\n在上图中，您可以看到，当您添加一个内置组件时，框架会为您提供一个预构建的代码片段，然后您可以根据自己的需求对其进行更新。如果您留意，`Insert\
    \ After` 下拉菜单允许您选择在流程中的哪个状态之后添加您的组件。同样，`Remove Comments` 切换开关允许您添加带注释或不带注释的组件。\n\
    \n随着您阅读本书的深入，您将看到这些组件的使用。一些组件，例如用于问答和用户代理的组件，将在单独的章节中进行介绍，以使您熟悉它们。其他通用组件将在可行的情况下根据其用途进行解释。\n"
- fmt: '### Custom Components and Webview


    When you have specific requirement for which built-in components are not sufficient,
    then you create your custom components. Custom components are implemented as service
    in your skill. After you define the custom component service for your skill, you
    can refer them in your dialog flow.


    Consider a case of accessing data using an API based on user input, where you
    want to retrieve some user-specific detail. Such a need cannot be fulfilled with
    built-in components, and you will write your own custom logic to implement such
    scenario in a Custom Component. You refer to a custom component in your flow as:


    *   `component: "YourCustomComponentName"`


    You write your custom component code in JavaScript. For your ease, Oracle provides
    you SDK to implement your custom components. Custom components can be implemented
    in three different ways:


    1.  Deploying a custom component in the embedded container in the Oracle Digital
    Assistant

    2.  As an API using Oracle Mobile Hub (Oracle Mobile Cloud)

    3.  As an external Node service


    To add a custom component to your skill, navigate to Components (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figz_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figz_HTML.jpg))
    section from left-hand navigation menu. Select Custom tab (which is selected by
    default). Refer to Figure [5-29](#479330_1_En_5_Chapter.xhtml#Fig29).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig29_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig29_HTML.jpg)


    Figure 5-29: Adding Custom Component


    Then you need to click the `+ Service` button which will give you abovementioned
    options to implement your custom component. Refer to Figure [5-30](#479330_1_En_5_Chapter.xhtml#Fig30).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig30_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig30_HTML.jpg)


    Figure 5-30: Create Custom Component service


    Custom components will be explained in detail in Chapter [10](#479330_1_En_10_Chapter.xhtml).


    Refer to Figure [5-29](#479330_1_En_5_Chapter.xhtml#Fig29). Beside Custom tab,
    you have another tab as Webview. Click the Webview tab. Here you can create Webview
    components for your skill. As the name suggests, Webview allows you to integrate
    web pages to your skill. By clicking the `+ Service` button on Webview tab, you
    can create Webview service for your skill as shown in Figure [5-31](#479330_1_En_5_Chapter.xhtml#Fig31).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig31_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig31_HTML.jpg)


    Figure 5-31: Create Webview service


    Webview components are discussed in detail in Chapter [8](#479330_1_En_8_Chapter.xhtml).


    ## Adding Skill to a Digital Assistant


    As explained earlier in this chapter, you add various features to a Digital Assistant
    using Skills. Once skills with specific features are ready, then you publish those
    individual skills and add the published skills to Digital Assistant. Also, a skill
    must be published in order to add it to Digital Assistant. Considering that your
    skill `FindTrip` is ready and published, this section will focus on how you can
    add `FindTrip` skill to the Digital Assistant `Travvy`.


    Navigate to the Digital Assistants section of the welcome screen of your Oracle
    Digital Assistant by clicking the Menu (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figaa_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figaa_HTML.jpg))
    icon as shown in Figure [5-32](#479330_1_En_5_Chapter.xhtml#Fig32).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig32_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig32_HTML.jpg)


    Figure 5-32: Navigate to Digital Assistants


    From your Digital Assistant screen, click New Digital Assistant as shown in Figure
    [5-33](#479330_1_En_5_Chapter.xhtml#Fig33).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig33_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig33_HTML.jpg)


    Figure 5-33: Add new Digital Assistant


    This will open a new popup for you. Add `Display Name` as `Travvy` and `Description`
    as `The Digital Assistant for Extreme Hiking Holidays` in the popup and click
    the `Create` button. Once created, you will be redirected to the Digital Assistant
    Details screen (refer to Figure [5-34](#479330_1_En_5_Chapter.xhtml#Fig34)), and
    this will also add a new section of Travvy on the Digital Assistant home screen.


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig34_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig34_HTML.jpg)


    Figure 5-34: Digital Assistant Details screen


    Click the `+ Add Skill` button as shown in Figure [5-33](#479330_1_En_5_Chapter.xhtml#Fig34),
    to add `FindTrip` skill. This will redirect you to `Skill Catalog` screen. Click
    Add Skill (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figab_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figab_HTML.jpg))
    for `FindTrip` skill. Once done, you will get a confirmation message that skill
    has been added successfully.


    Navigate back to the `Travvy`. As you have just made a change by adding a new
    skill to the digital assistant, you will notice an indication (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figac_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figac_HTML.jpg))
    for training. You will have access to the same training model as for the Skill,
    that is, `Trainer Ht` and `Trainer Tm`, `Trainer Ht` being default. Train your
    digital assistant with default `Trainer Ht` model.


    Add a few sample utterances to your skill which distinguish one skill from other
    skills. In this case as well, you will add a few such utterances for `FindTrip`
    skill. Finally, the Skill section for your Digital Assistant `Travvy` will look
    similar to Figure [5-35](#479330_1_En_5_Chapter.xhtml#Fig35).


    ### Note


    These utterances are not meant for training your Digital Assistant. Rather, they
    are displayed in the Digital Assistant help. The utterances that the digital assistant
    is trained with come from the configured skills.


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig35_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig35_HTML.jpg)


    Figure 5-35: Add Skill to Digital Assistant


    That is how you can integrate a skill to a digital assistant.


    ## Summary


    Now that you have come so far, it’s the time for a quick recap.


    You started this chapter by getting familiar with the Oracle Digital Assistant
    (ODA) environment, Digital Assistant, and then Skills. Then you took a deep dive
    into Skills and the underlying concepts of Utterances, Intents, and Entities and
    how you use them in your Skill. Next step was the dialog flow, where you came
    to know how you can handle human interaction with your skill and process user
    inputs with various components available in the Digital Assistant framework to
    craft your skill communication. And finally, you learned how you can create a
    Digital Assistant and consume your Skill into it.


    We recommend you to have a clear understanding of the concepts discussed during
    the course of this chapter. In next chapters, we will presume that you are familiar
    with these concepts and will take you to more advanced concepts of ODA.


    # Part IV: Enhancing Your Digital Assistant'
