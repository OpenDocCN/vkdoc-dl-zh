  trans: '

    ### 自定义组件与 Webview


    当内置组件无法满足特定需求时，您可以创建自定义组件。自定义组件在技能中作为服务实现。为技能定义自定义组件服务后，您可以在对话流中引用它们。


    考虑一个基于用户输入通过 API 访问数据的场景，您需要检索某些特定于用户的详细信息。这种需求无法通过内置组件满足，您需要编写自己的自定义逻辑，在自定义组件中实现此类场景。在流程中引用自定义组件的方式如下：


    *   `component: "YourCustomComponentName"`


    您使用 JavaScript 编写自定义组件代码。为方便起见，Oracle 为您提供了用于实现自定义组件的 SDK。自定义组件可以通过三种不同的方式实现：


    1.  在 Oracle Digital Assistant 的嵌入式容器中部署自定义组件

    2.  作为使用 Oracle Mobile Hub（Oracle Mobile Cloud）的 API

    3.  作为外部 Node 服务


    要向技能添加自定义组件，请从左侧导航菜单导航到“组件”（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figz_HTML.jpg](img/479330_1_En_5_Figz_HTML.jpg)）部分。选择“自定义”选项卡（默认选中）。请参考图
    5-29。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig29_HTML.jpg](img/479330_1_En_5_Fig29_HTML.jpg)


    图 5-29：添加自定义组件


    然后您需要点击 `+ Service` 按钮，该按钮将提供上述用于实现自定义组件的选项。请参考图 5-30。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig30_HTML.jpg](img/479330_1_En_5_Fig30_HTML.jpg)


    图 5-30：创建自定义组件服务


    自定义组件将在第 10 章中详细说明。


    请参考图 5-29。在“自定义”选项卡旁边，您还有另一个“Webview”选项卡。点击“Webview”选项卡。在这里，您可以为技能创建 Webview 组件。顾名思义，Webview
    允许您将网页集成到技能中。通过点击“Webview”选项卡上的 `+ Service` 按钮，您可以为技能创建 Webview 服务，如图 5-31 所示。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig31_HTML.jpg](img/479330_1_En_5_Fig31_HTML.jpg)


    图 5-31：创建 Webview 服务


    Webview 组件将在第 8 章中详细讨论。


    ## 将技能添加到数字助理


    如本章前面所述，您可以使用技能向数字助理添加各种功能。当具有特定功能的技能准备就绪后，您发布这些单独的技能，并将已发布的技能添加到数字助理。此外，技能必须发布才能添加到数字助理。假设您的技能
    `FindTrip` 已准备就绪并已发布，本节将重点介绍如何将 `FindTrip` 技能添加到数字助理 `Travvy`。


    通过点击菜单（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figaa_HTML.jpg](img/479330_1_En_5_Figaa_HTML.jpg)）图标，导航到
    Oracle Digital Assistant 欢迎屏幕的“数字助理”部分，如图 5-32 所示。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig32_HTML.jpg](img/479330_1_En_5_Fig32_HTML.jpg)


    图 5-32：导航到数字助理


    在数字助理屏幕上，点击“新建数字助理”，如图 5-33 所示。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig33_HTML.jpg](img/479330_1_En_5_Fig33_HTML.jpg)


    图 5-33：添加新的数字助理


    这将为您打开一个新的弹出窗口。在弹出窗口中添加 `Display Name` 为 `Travvy`，`Description` 为 `The Digital
    Assistant for Extreme Hiking Holidays`，然后点击 `Create` 按钮。创建完成后，您将被重定向到“数字助理详细信息”屏幕（请参考图
    5-34），这也会在数字助理主屏幕上添加一个新的 Travvy 部分。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig34_HTML.jpg](img/479330_1_En_5_Fig34_HTML.jpg)


    图 5-34：数字助理详细信息屏幕


    点击 `+ Add Skill` 按钮，如图 5-33 所示，以添加 `FindTrip` 技能。这将重定向您到“技能目录”屏幕。点击 `FindTrip`
    技能的“添加技能”（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figab_HTML.jpg](img/479330_1_En_5_Figab_HTML.jpg)）。完成后，您将收到一条确认消息，表明技能已成功添加。


    导航回 `Travvy`。由于您刚刚通过向数字助理添加新技能进行了更改，您会注意到一个训练指示（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figac_HTML.jpg](img/479330_1_En_5_Figac_HTML.jpg)）。您将拥有与技能相同的训练模型，即
    `Trainer Ht` 和 `Trainer Tm`，其中 `Trainer Ht` 是默认模型。使用默认的 `Trainer Ht` 模型训练您的数字助理。


    向您的技能添加一些示例语句，以区分一个技能与其他技能。在此情况下，您也将为 `FindTrip` 技能添加一些此类语句。最后，您的数字助理 `Travvy`
    的技能部分将类似于图 5-35。


    ### 注意


    这些语句并非用于训练您的数字助理。相反，它们会显示在数字助理帮助中。数字助理训练所用的语句来自已配置的技能。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig35_HTML.jpg](img/479330_1_En_5_Fig35_HTML.jpg)


    图 5-35：将技能添加到数字助理


    这就是如何将技能集成到数字助理中的方法。


    ## 总结


    既然您已经学习了这么多，现在是时候快速回顾一下了。


    本章开始时，您熟悉了 Oracle Digital Assistant (ODA) 环境、数字助理以及技能。然后，您深入探讨了技能以及语句、意图和实体的基本概念，以及如何在技能中使用它们。下一步是对话流，您了解了如何处理技能与人的交互，以及如何使用
    Digital Assistant 框架中可用的各种组件来处理用户输入，从而构建技能通信。最后，您学习了如何创建数字助理并将技能集成到其中。


    我们建议您清晰理解本章讨论的概念。在接下来的章节中，我们将假定您已熟悉这些概念，并将带您了解 ODA 的更高级概念。


    # 第四部分：增强您的数字助理

