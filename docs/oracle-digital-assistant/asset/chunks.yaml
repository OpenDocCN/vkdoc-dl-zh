    ## 引言


    聊天机器人，或者现在通常被称为数字助手，已经进入了企业领域。它们以交互方式协助用户执行管理任务，使这些任务更简单、更省时。通过阅读本书，您将学习理解数字助手的核心概念。


    本书为您提供了开发企业级聊天机器人和数字助手的入门途径。它基于实际经验，并解释了使用 Oracle 技术开始构建您自己的数字助手所需了解的一切。通过阅读本书，您将从用户体验和技术角度熟悉数字助手开发所涉及的概念。您将学习使用
    Oracle 技术（包括 Oracle 数字助手云）创建数字助手。


    在本书的第一部分，您将学习数字助手（又称聊天机器人）技术的基本原理。之后，您将逐步了解设计数字助手所涉及的步骤，包括如何确保用户在使用助手时获得满意的体验。在本书的第二部分，您将学习如何实现第一部分中设计的数字助手。您将从基本实现开始，随后通过多语言支持、问答和
    Webview 来增强该实现。本书的最后部分深入探讨了自定义组件开发、情感分析和语音。


    本书面向希望使用 Oracle 技术和云平台实现数字助手的设计师和开发人员。本书非常适合刚接触数字助手创建的读者，并在进入技术实现之前涵盖了设计方面，包括用户体验设计。在其他平台上创建数字助手有经验的读者会发现本书对于过渡到
    Oracle 技术和 Oracle 数字助手云非常有用。


    -   **第 1 章。** 本章介绍 Oracle 数字助手，它是一个用于开发自然对话界面应用的平台。该平台使构建复杂的数字助手或简单的聊天机器人变得容易，这些机器人可以连接和扩展多个后端系统，如
    Oracle ERP、HCM 和 CX。


    -   **第 2 章。** 在本章中，您将找到设计数字助手时面临的关键问题的答案。我们试图解决的业务痛点是什么？用户现有的旅程是什么，如何改进？接触用户的合适渠道是什么，如何最好地利用它？机器人与用户之间的对话以及对话选项是什么，如何增强对话以利用渠道的属性、媒体和设施来提高用户交互性？对话中交换的、访问后端系统所需的关键词汇和实体是什么？在实际实现之前，有许多许多问题需要回答。


    -   **第 3 章。** 为了理解数字助手的技术实现，本章将向您介绍 Travvy，即极限远足假期的数字助手。通过逐步的方法，您将熟悉 Travvy，从而了解所有细节，以便理解技术实现的所有步骤。


    -   **第 4 章。** 在本章中，您将学习 Oracle 数字助手如何允许开发人员与设计师一起将初始流程输入到数字助手云中。这将加快设计与技术实现之间的过渡，因为设计师实际上可以看到数字助手的行为方式以及流程的执行方式。


    -   **第 5 章。** 本章解释了技术实现中涉及的领域，例如流程、意图和实体。这些共同构成了您数字助手的心脏和身体。您将学习实现并理解这一点，以及如何使用训练设施使您的数字助手理解用户的意图。


    -   **第 6 章。** 在本章中，您将向用户介绍您的数字助手。您将学习如何配置渠道。数字助手可以在任何支持 webhook 的消息服务上运行，webhook
    是允许无需轮询即可进行实时消息传递的调用。


    -   **第 7 章。** 在这里，您将学习如何实现多语言支持：您可以使用多语言方法或单语言方法。后者是 Oracle 数字助手使用的方法，并通过使用翻译服务进行扩展。


    -   **第 8 章。** 自然语言对话本质上是自由流动的。但它们可能并不总是您的机器人从用户那里收集信息的最佳方式。例如，在某些情况下，如输入信用卡或护照详细信息，需要用户输入特定信息（并且精确输入）。为了帮助机器人的用户轻松输入此类信息，您的机器人可以调用一个外部应用程序，该应用程序提供带有标签、选项、选择、复选框、数据字段和其他
    UI 元素的表单。您将学习如何使用 Webview 组件来实现这一点。


    -   **第 9 章。** 常见问题解答本质上是那些仅仅在寻找答案的常见问题：“你们的营业时间是什么？”“我可以用信用卡吗？”“你们每周送货几次？”这些常见问题解答通常已经存在于公司中。在本章中，您将学习如何将它们引入您的机器人。


    -   **第 10 章。** 您将学习如何构建自定义组件。每当数字助手需要执行内置组件提供的功能之外的特定操作时，例如返回后端数据或实现业务逻辑，我们就需要使用自定义组件。这些组件特定于用例，因此需要专门构建。


    -   **第 11 章。** 使用情感分析背后的原因是人类心理学。当人们感到快乐或中立时，他们往往更能接受坏消息或挫折。通过从一开始就理解上下文，聊天机器人可以选择最佳行动方案并应用非常不同的模式。您将学习如何为您的数字助手添加情感分析，此外，您还将学习如何将语音实现为一个渠道。


    我们创建了一个专门针对本书和数字助手的博客：


    [`https://oda-book.blogspot.com/`](https://oda-book.blogspot.com/)


    该博客将用于发布额外内容和其他可用于构建出色数字助手的文章。


    假设读者没有聊天机器人技术的先验知识。成为专家所需了解的一切都包含在本书中。希望您喜欢本书！


    ## 致谢


    **来自 Luc：**


    永不言败；这是我学到的教训。大约四年前，当我完成我的第一本书时，我确信我再也不会写书了。当 Oracle 发布他们的数字助手时，不知何故，这种情况发生了变化。我立即并且仍然相信这个产品的力量以及它为我们的客户带来的附加价值。


    我分享知识的渴望和对新技术的热情占据了上风，让我改变了主意，并诱使我再次写作。


    感谢 Lonneke Dikmans，她对这个项目表示了支持，并建议我组建一个合著者团队来实现这一目标。没有 Mascha 和 Ardhendu 的帮助，我永远无法做到这一点，他们为这个项目投入了大量的精力、热情和幽默。感谢你们两位！没有你们，这本书永远不会被写出来。


    特别感谢 Oracle 的团队，他们不仅帮助进行了技术审阅，还在某些时候提供了早期访问权限和技术挑战方面的指导。感谢 Frank、Grant、Martin、Rohit
    以及所有在某个时候提供过帮助的人，即使你们自己不知道。


    最后，拥抱和亲吻我的妻子 Judith 以及孩子 Olivier 和 Lisanne，他们在写作过程中再次不得不与我一起生活。这一定很困难，但你们从未停止支持我。谢谢！


    **来自 Ardhendu：**


    我是在做梦还是真的发生了？！今天很难意识到自己成为了一名作者。对您说“谢谢”太微不足道了，**Luc**。没有您的指导和引领，我不可能做到。还有 **Mascha**，总是鼓励我并指导我。我要感谢
    **Lonneke Dikmans** 和 **Ronald van Luttikhuizen**，感谢他们在本书写作过程中给予的持续鼓励、支持和指导。


    最重要的是，我要感谢我的父母，没有他们，我不可能取得今天的成就。最后，我要感谢我亲爱的妻子和我的小公主；你们一直是我灵感的源泉。


    特别感谢我们的出版商为我们提供了这个平台。


    **来自 Mascha：**


    从没想过我真的会这样做，与我的两位优秀的 eProseed 同事 Luc 和 Ardhendu 一起成为合著者并出版一本书。没有他们，我无法实现这一目标。作为首次作者，他们一路为我提供了最好的指导、反馈和建议。


    谢谢你，Luc，邀请我合作实现这一目标；没有你，我永远不会有这个机会来撰写关于编码数字助手另一面的内容，即用户方面。作为一名用户体验设计师，我总是把用户放在首位。我们为**客户**
    **销售**和**开发**数字助手，但我们为他们的**用户** **创造**它们。


    我还要感谢 Lonneke Dikmans 和 Ronald van Luttikhuizen 鼓励和支持我，并多次表达他们对这本书的热情。


    我感谢 Hans Kemp 让我能够教授年轻的用户体验专业人员关于对话式用户体验设计方法，这使我能够完善我的章节。


    我无比感激我亲爱的丈夫，他告诉任何想听的人，他的妻子与她的两位同事合著了一本书——她的处女作——这本书已经真正出版并因此可以出售 ☺。


    最后，我要感谢我亲爱的父母，他们为我感到热情和自豪，相信我，并总是用“如果有人能写作，那就是你”这句话来安慰我。'
