    \ chatbot remembers his preferences.\n- The tone of voice of the chatbot should:\n\
    \  - Be **appealing** to him\n  - **Amuse** him\n  - **Stimulate** him to act\n\
    - He should be **satisfied** with and **confident** about the result.\n\nThe following\
    \ Figure [3-3](#479330_1_En_3_Chapter.xhtml#Fig3) shows the overall journey Harold\
    \ makes while searching for and committing to a hiking holiday.\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig3_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig3_HTML.jpg)\n\
    \n**Figure 3-3** – Overall journey and touchpoints\n\nFor the chatbot we will\
    \ be creating in this use case, the focus will be on the first three parts of\
    \ the journey in the core area and the two parts at the top. For four core parts,\
    \ you will find the total detailed customer journey in the next figures.\n\nBecause\
    \ the chatbot is only one touchpoint of many the user engages with to find and\
    \ book a trip, it is essential to work out the whole customer journey to make\
    \ sure that no interaction is missing. In this book, we are focusing on the user’s\
    \ interaction with only one touchpoint, the chatbot. Therefore, in the following\
    \ pictures, the chatbot part of the journey is highlighted.\n\nAs you can see\
    \ in Figure [3-3](#479330_1_En_3_Chapter.xhtml#Fig3), the first thing Harold does\
    \ is checking out the hiking holiday options. By doing so, he encounters several\
    \ touchpoints like advertisements on TV and the online information from Extreme\
    \ Hiking Holidays, and he will meet their chatbot.\n\nFigure [3-4](#479330_1_En_3_Chapter.xhtml#Fig4)\
    \ presents a worked-out user journey describing what Harold’s main intent is,\
    \ his actions, and the company activities to support him.\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig4_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig4_HTML.jpg)\n\
    \n**Figure 3-4** – ❶ Harold finds a challenging holiday\n\nIn the journey map,\
    \ you can also describe how you think your user should feel while encountering\
    \ the touchpoint, what channel will be used for the encounter, and even the context\
    \ of use. Because the presumed context of use for Harold during this journey mainly\
    \ will be his desktop PC at work or at home, the context is not described in these\
    \ journey maps.\n\nAfter Harold found the desired trip – and of course checked\
    \ it with Holly – he wants to make reservations and book it. See Figure [3-5](#479330_1_En_3_Chapter.xhtml#Fig5).\n\
    \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig5_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig5_HTML.jpg)\n\
    \n**Figure 3-5** – ❷ Harold books the selected hiking holiday\n\nA booking is\
    \ not complete without payment. Harold can pay for his booking online via the\
    \ web site, being assisted by the chatbot and in close contact to his bank. See\
    \ Figure [3-6](#479330_1_En_3_Chapter.xhtml#Fig6).\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig6_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig6_HTML.jpg)\n\
    \n**Figure 3-6** – ❸ Harold pays for the booked holiday\n\nOf course, after all\
    \ these actions, Harold will need feedback about his booking and about the payment\
    \ being successful. He will receive that online on his personal page, “My Extreme\
    \ Hiking Trips,” but also the chatbot can provide this information and his tickets/vouchers.\
    \ See Figure [3-7](#479330_1_En_3_Chapter.xhtml#Fig7).\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig7_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig7_HTML.jpg)\n\
    \n**Figure 3-7** – ❹ Harold gets the confirmation of his booking\n\n## The Channel\n\
    \nThe touchpoint, mostly used by Harold to communicate with Extreme Hiking Holidays,\
    \ is their Facebook page and their web site. That is the reason why for this use\
    \ case the chatbot will interact with the user on those two channels: Facebook\
    \ and the web site. Of course, Harold will be able to communicate with the chatbot\
    \ on his computer and also on his mobile.\n\n## The Dialog\n\n### The Bot’s Personality\n\
    \nThe users of our chatbot are young, active, and sporty like Harold. They are\
    \ hardly ever bored. When not working, they are hiking and doing (team) sports.\
    \ They often are among friends. Then they talk in detail about their sporty activities,\
    \ hiking trips, and holidays.\n\nThe marketing communication activities from the\
    \ “Extreme Hiking Holidays” company fit with that image. Therefore, the chatbot’s\
    \ **tone of voice** should be as if it is one of Harold’s cycling team members.\
    \ The bot’s **name** should fit to the company’s image. Because the bot is going\
    \ to offer a travel-related service for the “Extreme Hiking Holidays” company\
    \ and because it should not be too serious, it will be called `Travvy`. Its “**portrait**”/avatar\
    \ is derived from the company logo. See Figure [3-8](#479330_1_En_3_Chapter.xhtml#Fig8).\n\
    \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig8_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig8_HTML.jpg)\n\
    \n**Figure 3-8** – Options for `Travvy`’s “portrait”\n\n`Travvy` is **genderless**,\
    \ although testing the chatbot with users should confirm if they agree with this\
    \ statement.\n\n### The Dialog Flows\n\nHarold’s main intents form the basis for\
    \ the dialog flow. As you can see in Figure [3-3](#479330_1_En_3_Chapter.xhtml#Fig3),\
    \ each phase in the overall journey is represented by an intent which requires\
    \ a certain skill of the chatbot. In the first phase, the “Info” skill of `Travvy`\
    \ will assist Harold with his intent to find the right trip for him and Holly\
    \ and indicate their preferences to `Travvy`.\n\nFigure [3-9](#479330_1_En_3_Chapter.xhtml#Fig9)\
    \ represents the dialogue flow for Harold to find a trip.\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig9_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig9_HTML.jpg)\n\
    \n**Figure 3-9** – Dialog flow to find a trip\n\nIn this first phase of his journey,\
    \ `Travvy` will ask Harold to indicate his holiday destination (country and region)\
    \ and also the level of difficulty for the hiking trip that he has in mind. If\
    \ he decides to take level 3 hikes from one central point, he can indicate what\
    \ kind of accommodation he prefers.\n\nAfter Harold found and selected the desired\
    \ holiday, `Travvy` can assist him booking that tour. Therefore, `Travvy` will\
    \ incorporate two skills: a “Customer Profile” skill and a “Booking” skill.\n\n\
    Figure [3-10](#479330_1_En_3_Chapter.xhtml#Fig10) represents the dialogue flow\
    \ for Harold to book his trip.\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig10_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig10_HTML.jpg)\n\
    \n**Figure 3-10** – Dialog flow to book the trip\n\nHarold will be asked to select\
    \ a travel period and to verify/enter all the personal details of himself and\
    \ his travel companion.\n\nNow that Harold booked and confirmed his trip, `Travvy`\
    \ will ask him if he likes to be assisted with the payment. To be able to do that,\
    \ `Travvy` contains an instant app which provides the “Payment” skill.\n\nFigure\
    \ [3-11](#479330_1_En_3_Chapter.xhtml#Fig11) represents the dialogue flow for\
    \ Harold to pay for his trip.\n\n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig11_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11** – Dialog flow to pay for the trip\n\n`Travvy` will ask Harold\
    \ to select his bank account, to check if he has enough balance, and then to transfer\
    \ the money.\n\nIn order to find out if the payment went well, Harold requires\
    \ confirmation. Of course, he also wants to receive the trip-related tickets and\
    \ vouchers. Therefore, `Travvy` contains a customer component which provides the\
    \ “Confirmation” skill.\n\nFigure [3-12](#479330_1_En_3_Chapter.xhtml#Fig12) represents\
    \ the dialogue flow for the confirmation the digital assistant will provide.\n\
    \n![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig12_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig12_HTML.jpg)\n\
    \n**Figure 3-12** – Dialog flow to get confirmation\n\n`Travvy` will give him\
    \ a receipt and can help him save/print out his tickets and vouchers."
