    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig7_HTML.jpg](img/479330_1_En_7_Fig7_HTML.jpg)


    图 7-7：数字助理用用户的语言回复


    始终存在一种可能性，即你的数字助理不支持用户的语言。


    ### 注意


