  trans: '

    # 后续章节概览


    在后续章节中，你将使用自己的代码更新组件的默认实现，以验证年龄、打包自定义组件，并将其部署到嵌入式容器。最后，你将从机器人对话流中调用该自定义组件。


    ## 更新自定义组件实现与本地调试


    在本节中，你将实现年龄验证的逻辑，并在本地调试组件以排查问题。将以下代码片段复制到你的 `AgeValidator.js` 文件中：


    ```javascript

    ''use strict'';

    module.exports = {

    metadata: () => ({

    name: ''com.hiking.AgeValidator'',

    supportedActions: [''allowed'', ''denied'']

    }),

    invoke: (conversation, done) => {

    // 执行对话任务。

    const userInput = conversation.text();

    // 确定年龄

    // const minBookingAge = 18;

    let age = 0;

    if (userInput){

    const matches = userInput.match(/\d+/);

    if (matches) {

    age = matches[0];

    } else {

    conversation.invalidUserInput("年龄输入无法识别，请重试");

    done();

    return;

    }

    } else {

    var errText = "未提供年龄输入";

    conversation.logger().error(errText);

    done(new Error(errText));

    return;

    }

    conversation.logger().info(''AgeValidator: 用户输入的年龄='' + age);

    conversation.transition( age >= minBookingAge ? ''allowed'' : ''denied'' );

    done();

    }

    };

    ```


    让我们简要概述这些更改。作为上述更改的一部分，你已更新了默认实现中的 `metadata` 和 `invoke` 函数。在 `metadata` 函数中，你将组件名称从
    `"AgeValidator"` 更新为 `"com.hiking.AgeValidator"`。这为你的组件赋予了唯一名称。虽然这不是强制步骤，但这样做可以让你对组件包及其包含的组件进行分类。这进一步有助于降低与其他机器人设计者可能添加的自定义组件发生命名冲突的风险。随着自定义组件规模的扩大，这种命名方式将变得非常实用。


    然后，你移除了 `properties` 对象（该对象之前是默认实现的一部分），因为此处不需要它，同时更新了 `supportedActions`。在本节后续内容中，你将看到这些操作如何用于对话流中的状态导航。


    接下来，你更新了 `invoke` 函数，使用 `conversation.text()` 方法获取用户响应并将其存储在变量中。然后，你使用正则表达式从存储用户响应的变量中提取了年龄的数值。之后，你添加了条件来验证年龄并针对这些条件做出响应。请仔细查看此实现中使用的各种
    `conversation` 方法。


    本地调试的主要好处是，它允许你逐步执行代码并查找问题（如果有的话）。


    好了，现在你的实现已经就绪，请保存文件。然后，通过导航到父目录（本例中为 `ODACustomComponents`）重启你的自定义组件 `ageValidatorCC`。使用以下命令，如前文“在本地运行自定义组件”部分所述：


    ```

    // 在现有命令窗口中使用 ctrl+c 停止现有进程

    bots-node-sdk service ageValidatorCC

    ```


    ### 注意


    每次对本地组件进行更改并保存后，都需要使用上述命令重启本地 Node 容器。


    如果你现在从本地机器通过浏览器访问 `http://localhost:3000`，你会注意到 `AgeValidator.js` 中的这些新更改已生效。请查看图
    10-16。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig16_HTML.jpg](img/479330_1_En_10_Fig16_HTML.jpg)


    **图 10-16** 更新组件响应


    如果你的 ngrok 会话仍然有效，你只需在 ODA 实例中重新加载自定义组件即可。为此，你需要点击 ODA 中“组件”屏幕右上角的 ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figd_HTML.jpg](img/479330_1_En_10_Figd_HTML.jpg)
    按钮。


    如果你的 ngrok 会话已过期或终止，你需要按照“通过互联网公开自定义组件”部分所述，使用 ngrok 重新生成主机名。为端口 3000 生成新的主机名后，你需要在“组件”屏幕上更新元数据
    URL。请参考图 10-17 中突出显示的部分。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig17_HTML.jpg](img/479330_1_En_10_Fig17_HTML.jpg)


    **图 10-17** 生成新主机后更新元数据 URL


    假设你的自定义组件已在本地运行，并且按照上述说明可在 ODA 中访问，那么现在是时候从机器人的对话流中调用该自定义组件了。从左侧菜单导航到 ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fige_HTML.jpg](img/479330_1_En_10_Fige_HTML.jpg)
    流程。进入“流程”屏幕后，按如下方式更新对话流：


    ```yaml

    metadata:

    platformVersion: 1.0.1

    main: true

    name: FindTrip

    context:

    variables:

    states:

    intent:

    component: "System.Intent"

    properties:

    variable: "iResult"

    transitions:

    actions:

    SelectTrip: "askAge"

    CancelTrip: "cancelTrip"

    unresolvedIntent: "unresolved"

    askAge:

    component: "System.Output"

    properties:

    text: "你多大了？"

    transitions:

    next: "validateAge"

    validateAge:

    component: "com.hiking.AgeValidator"

    properties:

    transitions:

    next: "bookTrip"

    actions:

    denied: "underAge"

    bookTrip:

    component: "System.Output"

    properties:

    text: "您很快就能使用 Travvy 预订行程了"

    transitions:

    return: "done"

    underAge:

    component: "System.Output"

    properties:

    text: "您不符合使用 Travvy 预订行程的最低年龄要求。"

    transitions:

    return: "done"

    cancelTrip:

    component: "System.Output"

    properties:

    text: "您很快就能使用 Travvy 取消行程了"

    transitions:

    return: "done"

    unresolved:

    component: "System.Output"

    properties:

    text: "抱歉，我不理解您的意思。请重试。"

    transitions:

    return: "done"

    ```


    作为上述机器人流程的一部分，你首先使用了 `"System.Intent"` 组件来识别意图。这些意图与你在第 5 章中创建的意图相同。根据 `System.Intent`
    组件的意图解析结果，你定义了与这些意图对应的状态。请注意，只有当意图被解析为 `SelectTrip` 时，你才会进行年龄验证，否则不会。


    检查 `"askAge"` 状态，在该状态中你要求用户提供其年龄，然后转换到 `"validateAge"` 状态。该状态正在调用你的自定义组件。然后，根据自定义组件的响应，你将机器人句柄传递给不同的状态。


    由于技能实现尚处于早期阶段，你只会为各种状态显示静态文本内容。这并没有什么问题，而且也满足了自定义组件实现的目的。随着机器人的发展，这些文本可以轻松更新为更合适的机器人响应。

