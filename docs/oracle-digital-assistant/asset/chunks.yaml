- fmt: "# Benefits of Personas\n\nPersonas are beneficial because they can help to\
    \ focus and target your thinking. Personas help you to think in less abstract\
    \ terms about your audience and their needs. Benefits from carefully documenting\
    \ user personas include the following:\n\n- They bring focus on “the needs of\
    \ real users…”\n- They help designers/developers empathize with the users more\
    \ easily.\n- They are of use to many different stakeholders:\n  - Business development\
    \ (strategy development)\n  - Marketing teams (seducing the users)\n  - Design\
    \ teams (design for the users)\n- Personas encourage consensus within the team.\
    \ It’ll be clear when the personas have been adopted. Then the team starts referring\
    \ to them on first names, “Kelly would never want to do that”… and others don’t\
    \ ask who Kelly is.\n- Personas create efficiency.\n- Personas can represent current\
    \ but also future users. They help the team think more about the future use of\
    \ the conversational experience.\n- Personas motivate out-of-the-box thinking.\n\
    \nEveryone in the creative/development team now has an idea of how the users for\
    \ whom they are creating the conversational experience look like. By putting up\
    \ posters of the personas, after introducing the personas to the design/development\
    \ team, they will be adopted more smoothly and grow on them during the development\
    \ process.\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig7_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7  \nLife size personas on the wall will always be on the team’s mind\n\
    \nA persona enables the team to design the chatbot with knowledge about the user.\
    \ What they develop, how it works, what you want to achieve, and last but not\
    \ least the tone of voice can be based on what you know about the user.\n\n##\
    \ The User Journey Map\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig8_HTML.png](images/479330_1_En_2_Chapter/479330_1_En_2_Fig8_HTML.png)\n\
    \nFigure 2-8\n\nNow that we have a clear view on the user(s) of our conversational\
    \ experience, we need to figure out what journey he/she will make to achieve his/her\
    \ goals using touchpoints/channels like the chatbot we will be creating. A well-known\
    \ method to achieve this is defining a user/customer journey map.\n\nThe customer\
    \ journey describes all the experiences that customers go through when interacting\
    \ with your company’s brand, product, service, web site, or application. The touchpoints\
    \ customers encounter are used to construct the journey and create an engaging\
    \ story, detailing their interactions and accompanying emotions.\n\nInstead of\
    \ looking at just a part of a transaction or experience, the customer journey\
    \ documents the full experience of being a customer. Conversational experiences\
    \ can add value to every part of the customer journey, ranging from, for example,\
    \ when a customer makes their first order to answering a product-related question\
    \ instantly.\n\n### How to Create the User/Customer Journey Map?\n\nIt is crucial\
    \ to identify the touchpoints where users interact with your product, service,\
    \ web site, or application. Once the touchpoints have been identified, they can\
    \ be connected in a sequence representing the way customers follow while interacting\
    \ with the various touchpoints. Figure 2-9 shows an example of an overall customer\
    \ journey map including all possible touchpoints and paths of users planning and\
    \ making a short trip to Amsterdam via Schiphol airport using public transport.\n\
    \n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig9_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9  \nExample of a journey map showing the different paths\n\nYou analyze\
    \ the activities customers perform and note down what they are doing during each\
    \ activity in their journey.\n\nDescribe each of the relevant moments in the journey\
    \ and try to identify the following:\n\n- The context of use, where and when are\
    \ they using the touchpoint.\n- What do they want to achieve (their intent)?\n\
    - Which steps did they take to get there?\n- What do they consider?\n  - Do they\
    \ have questions?\n  - Are there uncertainties?\n- What influences customers?\n\
    \  - What motivates them?\n  - Are there any discouraging obstacles? Think about\
    \ anything that might cause the customer to give up while moving through the customer\
    \ journey.\n  - What emotions do they feel?\n- What feedback do they expect?\n\
    \nThis results in a visualization of a more detailed customer experience. Figure\
    \ 2-10 provides an example of such a visualization.\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig10_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10  \nA detailed customer/user journey map\n\n### Why Is a Customer\
    \ Journey Map So Helpful?\n\nBenefits from a customer journey map include the\
    \ following:\n\n- It provides you a high-level overview of the factors influencing\
    \ the experience, constructed from a user’s point of view.\n- The map provides\
    \ insight into the (future) use (the context, frequency of use) of the touchpoints.\n\
    - It enables the identification of both problem areas and opportunities for innovation.\
    \ For example, could you improve the customer experience by proactively addressing\
    \ questions your customers will have as they move through the stages?\n- The different\
    \ stages in the map can be used for further analysis and usage scenario creation.\n\
    \n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig11_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig11_HTML.jpg)\n\
    \nFigure 2-11  \nThe user plays the leading part in a scenario creation.\n\n-\
    \ It helps you prioritize.\n- Throughout the design process, every major design\
    \ decision will be motivated by the customer journey map.\n\n### What’s Next?\n\
    \nAfter having worked out the user/customer journey map, you know which parts\
    \ of the journey are crucial. Those are the ones that happen often or are of key\
    \ importance to the user. Aim to help users to complete one of these journeys\
    \ from start to finish and determine if they can be served by your chatbot design.\n\
    \n## Channels\n\n![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig12_HTML.png](images/479330_1_En_2_Chapter/479330_1_En_2_Fig12_HTML.png)\n\
    \nFigure 2-12\n\nThe next step in your chatbot design is to determine what is\
    \ the appropriate channel to reach the customers/users on their journey with your\
    \ chatbot and how those channels can best be used.\n\nThe question of which channels\
    \ should be used to reach the customer is two sided:\n\n- What does the business\
    \ think is the most effective channel to present the customer with the assistance\
    \ of the chatbot? It might be one of the channels the enterprise already is using\
    \ to reach their customers or even a totally new one which they see as an opportunity\
    \ to reach even more customers and increase the sales of their products/services.\n\
    - In which channel does the customer expect, maybe even need, the assistance of\
    \ the chatbot the most?"
