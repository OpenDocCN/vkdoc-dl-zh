    ### 认知走查


    借助线框图，您可以进行认知走查。这是一种可用性评估方法，您需要模拟用户执行一系列预期任务，并从用户视角提出一组问题，例如：


    - 用户是否会尝试并达成正确的结果？

    - 用户是否会注意到正确的操作是可用的？

    - 用户是否会将正确的操作与其期望达成的结果联系起来？

    - 如果执行了正确的操作，用户是否会看到正在朝着预期结果取得进展？


    这些洞察随后被用于改进对话界面的可用性。


    在图 3-22、3-23 和 3-24 中，您可以看到 Travvy 的线框图，展示了为 Harold 提供不同选项的显示方式。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig23_HTML.jpg](img/479330_1_En_3_Fig23_HTML.jpg)


    **图 3-23** 在轮播图中，Harold 可以一次性选择目的地和徒步难度等级


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig22_HTML.jpg](img/479330_1_En_3_Fig22_HTML.jpg)


    **图 3-22** Harold 只需点击首选选项即可选择目的地


    除了为用户提供可选择的选项外，他还应该能够自行构思/输入/说出自己的答案。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig24_HTML.jpg](img/479330_1_En_3_Fig24_HTML.jpg)


    **图 3-24** Harold 输入自己的答案


    ### 可用性测试


    您可以使用线框图，邀请像 Harold 这样的代表性用户进行可用性测试，只需让他们执行一些预定义任务，与 Travvy 进行交互，然后观察他们的操作即可。


    如果您使用刚刚开发完成的真实对话界面进行此测试，那么您不仅测试了其可用性，而且同时还能训练 Travvy 更好地响应用户的请求、问题和答案。


    为了全面了解用户对 Travvy 的感受，您可以询问以下问题：


    - 请说出您最喜欢 Travvy 的三点。

    - 请说出您不喜欢 Travvy 的三点。

    - 我们如何改进 Travvy？


    这些答案将帮助您改进您的数字助手。


    ## 训练聊天机器人


    您可以向 Travvy 询问任何事情，但可以肯定的是，在初期，Travvy**不会**理解您问的所有问题。


    为了确保用户不会因为错误的答案或 Travvy 不理解他们的问题而感到烦恼，投入精力训练 Travvy 至关重要。


    图 3-25 显示，随着数字助手变得越来越智能，公司的训练工作量会减少。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig25_HTML.jpg](img/479330_1_En_3_Fig25_HTML.jpg)


    **图 3-25** 随着 Travvy 变得更智能，训练工作量减少


    在初期，训练会花费时间。但训练很简单，您很快就会看到 Travvy 变得更聪明。


    ### 三步训练法


    Travvy 最好使用用户提供的语料进行训练。但是，您不希望让真实用户面对一个未经训练/无知的聊天机器人。因此，最好分三步进行训练：


    1.  自己训练聊天机器人。通过输入尽可能多的语料来使用 Travvy。您已经对 Harold 有了很多了解；您知道他可能会如何与 Travvy 互动。

    2.  请 Extreme Hiking Holidays 的预订员工（利益相关者）利用他们对通常致电/发送电子邮件的客户的了解来试用 Travvy。

    3.  使用可用性测试（如前文所述）来收集语料（由真实用户输入）并检查 Travvy 的回复。


    为了避免 Travvy 要求用户澄清问题，或者更糟的是，给出不恰当的答案，请将**置信度阈值**^(⁴)设置为 0.35 或更高，并将**胜出裕度**设置为
    0.2。（具体操作方法，请参见第 9 章）。


    然后，聊天机器人将首先检查哪些意图与问题的匹配概率超过 35%。如果有多个意图满足此要求，机器人将查看这些意图之间的概率差异。如果差异小于 20%，则它会将这两个或更多意图作为选项显示给用户选择。


    在训练和测试聊天机器人时，您可以在应用程序的“洞察”中找到结果报告。在`Retrainer`选项卡中，您可以看到哪些语料导致了未解析的意图（Travvy 不知道答案）。然后，您可以决定是将这些语料添加到某个现有意图，还是为它们创建一个新意图。


    脚注 1


    # 第三部分 实现您的数字助手


    # 4. 设计与实现的交汇点


    ## 引言


    在前面的章节中，您了解了关于聊天机器人设计的所有内容，以及 Extreme Hiking Holidays 如何设计他们的数字助手 Travvy。这个数字助手的实际实现可以由开发人员通过编写所有流程逻辑的代码来完成，但
    Oracle 数字助手（ODA）提供了一个功能，业务用户和设计人员都可以使用它来搭建数字助手的初始版本，之后开发人员可以接手完成实现。借助此功能，即**对话设计器**，您可以快速为对话设计概念构建概念验证，而无需编写任何`OBotML`代码，也无需创建意图或实体。对话设计器允许您通过设置机器人与用户之间的对话来专注于用户体验。在按照第
    2 章所述创建了对话式用户体验之后，可以使用对话设计器来创建技能机器人的原型/线框图。从该线框图出发，只需点击一个按钮即可生成实际的技能机器人。然后，可以对聊天机器人进行训练和测试。图
    4-1 展示了对话设计器在设计和开发流程中的位置。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig1_HTML.jpg](img/479330_1_En_4_Fig1_HTML.jpg)


    **图 4-1** 对话设计器的定位


    为了使用对话设计器，您必须对对话设计器使用的概念有一些基本了解。首先是任务的概念。任务代表您的主要用例（查找行程、支付行程、获取确认）。任务中的第一条消息应该是来自用户的、清晰表达所选任务/意图的消息。这是必需的，因为当从对话设计器内部生成机器人时，该用户消息将用于创建其变体作为语料。意图将从任务中派生。


    例如，第一条消息可以是“我想找一个行程。”这条消息是祈使句，并以名词结尾。这有助于对话设计器将此消息归类为意图语料。


    接下来是子任务。这些子任务通常执行辅助功能，也可以称为次要任务。用户不会明确要求机器人执行这样的子任务。


    ### 注意


    在 Oracle 数字助手 19.1.5 版本中，对话设计器作为测试版引入（图 4-2）。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig2_HTML.jpg](img/479330_1_En_4_Fig2_HTML.jpg)


    **图 4-2** 测试版

