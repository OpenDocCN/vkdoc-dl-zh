    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig21_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig21_HTML.jpg)


    **Figure 10-21** Successful test execution


    In this section, you have successfully implemented your custom component and invoked
    that component from `FindTrip` skill. You have also implemented your bot flow
    to invoke that custom component.


