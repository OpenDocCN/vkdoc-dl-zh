- fmt: '### Autonomy


    Being the cause of your own actions and doing things in your own way is what motivates
    users. Therefore, the bot should steer users but at the same time make them feel
    in control. You can, for example, achieve this by offering the user a way out
    at any time. Figure [2-15](#479330_1_En_2_Chapter.xhtml#Fig15) provides an example.
    Notice the “I prefer to do it myself” button near the bottom of the right-most
    panel.


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig15_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig15_HTML.jpg)


    **Figure 2-15** Example of a dialog that makes the user feel in control


    ### Feedback


    One of the most important factors to motivate positive behavior toward the bot
    is feedback. Feedback presented by the bot is needed to communicate some of the
    previously mentioned motivation factors. For example, goal setting requires feedback
    to communicate performance toward a goal.


    > *“You’ve selected the men’s department.”*


    Other issues to keep in mind while designing the dialog are as follows:


    - Keep the conversation topics close to the purpose served by the chatbot. If
    the user is drifting off, try to get him/her back to the main topic.

    - Avoid “Yes” or “No” answers/buttons, because users easily make mistakes. Instead,
    indicate what a user will say “Yes” or “No” to like “Yes, I’m an existing customer”
    and “No, I’m new.”

    - Keep your chatbot responses brief and straight to the point wherever possible
    because users do not always read carefully. Expect users to frequently skim through
    your chatbot’s responses instead.

    - Repeat the question in the bot’s answer to indicate that the bot understood
    what the user wants from it.

    - Think about personalizing the bot’s answers according to a previous request
    from the user. Use what you already know about the user from previous answers
    given/questions asked.

    - Customize the dialog based on the real-time activity of the user with the bot
    and the web site or product it supports.


    > *“I see that you are trying to reimburse a claim. If you give me your policy
    number, I can help you with that.”*


    - Think about how to finish the conversation like:


    > *“Always glad to help you! See you soon.”*


    ## Backends


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig16_HTML.png](images/479330_1_En_2_Chapter/479330_1_En_2_Fig16_HTML.png)


    **Figure 2-16**


    When you design, your digital assistant must cater for the fact that it will not
    have all the knowledge built in that is needed to handle the entire flow. For
    example, authentication will not be implemented in the digital assistant itself
    but will be provided by a backend system. Data such as customer data, employee
    data, and stock information will not be part of the digital assistant itself.
    In an enterprise context, there might be a need for a human resource bot/Skill
    that can execute HR-related tasks like employee profile update and leave balance
    or a recruitment bot for recruitment-related activities. Information to execute
    such tasks is typically available in your backend applications. Your digital assistant
    should be able to connect to these systems and bring information from these systems
    into the conversation.


    Let’s take the example of the Digital Assistant from Figure [2-17](#479330_1_En_2_Chapter.xhtml#Fig17).


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig17_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig17_HTML.jpg)


    **Figure 2-17** The user wants to book the selected hotel


    In this example, the user chooses to book a hotel. For the DA to do this, the
    DA needs to communicate with the backend booking system. When the DA invokes the
    backend system, for the user, the hotel will be booked as required. Typically,
    the DA sends a request, containing the booking details, to the booking system
    which then takes care of the actual booking. The user has no clue that the DA
    calls out to a backend system. It should be completely transparent and seamlessly
    integrate with the UX flow.


    In your design, you should recognize all parts of the conversation where backend
    integration is required. You also need to provide the information that is needed
    to properly create this integration. Think, in the context of the booking example,
    of check-in and check-out dates, hotel name, and last but not the least the username
    that is booking the hotel. Providing this information enables developers to properly
    create the APIs and components that implement these points of integration.


    ## Sample Entities


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig18_HTML.png](images/479330_1_En_2_Chapter/479330_1_En_2_Fig18_HTML.png)


    **Figure 2-18**


    As described in the journey map, with each touchpoint, the user has one or more
    intents, for example, “Travel from Schiphol to Amsterdam.” An *intent* is the
    user’s intention.


    An *entity* modifies an intent. For example, in the intent “Travel from Schiphol
    to Amsterdam,” the entities are “Travel,” “Schiphol,” and “Amsterdam.”


    Anything the user literally says is called an utterance. For example, if a user
    types or tweets “I just arrived at Schiphol for a city trip to Amsterdam,” the
    entire sentence is *the utterance*.


    When creating a flowchart for the conversation flow, except for the happy flow,
    you will have to formulate different utterances, because there are so many ways
    for a user to express himself/herself.


    > *“Waiting at Schiphol. Looking forward to my city trip to Amsterdam.”*


    > *“Just arrived at Schiphol for a weekend trip with my whole family.”*


    > *“Our weekend trip to Amsterdam starts here at Schiphol airport.”*


    A combination of entities forms the basis for these different utterances. The
    chatbot in the end must recognize the user’s question/remark – regardless of how
    it is written – to be able to come up with the right answer.


    It can be helpful to share the entities with project stakeholders. Using the word
    cloud approach shown in Figure [2-19](#479330_1_En_2_Chapter.xhtml#Fig19) is a
    quick way to provide an at-a-glance view of the supported entities that also shows
    their relative importance or at least their relative usage.


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig19_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig19_HTML.jpg)


    **Figure 2-19** A word cloud is a way to present all different entities to the
    stakeholders


    ## The Usability Test


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig20_HTML.png](images/479330_1_En_2_Chapter/479330_1_En_2_Fig20_HTML.png)


    **Figure 2-20**


    This is where all the hard work pays off. While this is the eighth step that’s
    outlined here, it doesn’t necessarily have to be the last. As a matter of fact,
    most of the time, the information and feedback you gather in the test stage lead
    to redefining the problem, finding more sample entities, and better empathizing
    with your users. Keep asking yourself the question: Are we building the right
    thing?


    ### Using Test Scenarios


    You created a flowchart for the conversational flow. Each path through the flowchart
    from top to bottom is a test case and can be used to test the happy path only.


    What the flowcharts don’t show are the endless possibilities for a user to express
    an intent and the variance in conversation responses by the bot itself. However,
    a well-trained chatbot does understand the different user expressions (utterances),
    and a well-designed chatbot provides some variance in conversation responses.


    ### Exploratory Testing by a Lot of Users


    It is important to select the crowd wisely depending on the project state. The
    most important selection criteria are language and dialect. For this test, there
    is not a need to use any requirements or test cases; just let the crowd do their
    work.


    Blind testing can also be a good way to test. Can users who are in the target
    audience but who have not been trained in using your chatbot succeed in using
    it the first time they are confronted with it? That’s a good question to ask,
    and user testing will provide the answer.'
