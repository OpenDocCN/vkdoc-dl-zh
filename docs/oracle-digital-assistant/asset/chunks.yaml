  trans: "\n### 技能实施\n\n在您的数字助手环境中创建一个名为 `TravvyWebview` 的新技能。导航至“流程”并替换为以下内容：\n\n\
    1.  在“上下文”级别，您定义了两个“变量”：\n    -   `travellerFirstName`：用于存储用户名字的变量，并将其传递给 Web\
    \ 应用程序进行预订。\n    -   `appResponse`：用于存储来自 Web 应用程序响应的变量。\n\n2.  在 `askTravelerInfo`\
    \ 状态中，您要求用户提供名字。请注意，您将用户的响应存储在 `travellerFirstName` 变量中。\n\n3.  在下一个状态 `webview`\
    \ 中，您通过点击添加了 `System.Webview` 组件，然后从用户界面组件类别中选择了 Webview。请查看为该组件定义的各种属性：\n   \
    \ -   `service`：Webview 服务的名称。您将在后续部分创建此服务。\n    -   `sourceVariableList`：源变量列表，这些变量将被传递给\
    \ Web 应用程序。\n    -   `variable`：用于存储 Web 应用程序响应的变量。\n    -   `prompt`：向用户显示的消息提示，要求他们在\
    \ Web 应用程序中提供额外信息。\n    -   `linkLabel`：按钮的标签，点击该按钮将启动 Web 应用程序。\n    -   `cancelLabel`：取消按钮的标签，用于用户不希望提供个人信息进行预订的情况。\n\
    \    -   `transitions`：在此处，您定义了下一个状态的转换流程，用于评估应用程序响应以及取消操作。\n\n4.  对话流程中的下一个状态是\
    \ `evaluateWebviewResponse`。在此状态中，您正在评估 Web 应用程序的响应 `${appResponse.value.status}`。在\
    \ Web 应用程序中，您将定义两个状态：“success”和“cancel”。在此状态中，您检查来自 Web 应用程序的状态是成功还是取消。根据状态，您随后调用相应的状态。\n\
    \n5.  如果来自 Web 应用程序的状态为“success”，您将调用 `confirmBooking` 状态。在此状态中，您根据在 Web 应用程序中输入的值向用户显示确认消息。请检查您为此使用的表达式\
    \ `${appResponse.value.firstName} ${appResponse.value.lastName}`。\n\n6.  如果来自\
    \ Web 应用程序的状态为“cancel”或来自 `System.Webview` 组件的取消操作，您将调用 `onCancel` 状态。在此状态中，您优雅地处理了用户的取消响应并显示了适当的消息。\n\
    \n```\n#metadata: information about the flow\n#  platformVersion: the version\
    \ of the bots platform that this flow was written to work with\nmetadata:\nplatformVersion:\
    \ \"1.0\"\nmain: true\nname: TravvyWebview\n#context: Define the variables which\
    \ will used throughout the dialog flow here.\ncontext:\nvariables:\ntravellerFirstName:\
    \ \"string\"\nappResponse: \"string\"\n#states is where you can define the various\
    \ states within your flow.\nstates:\naskTravelerInfo:\ncomponent: \"System.Text\"\
    \nproperties:\nprompt: \"To proceed with booking, please provide your first name.\"\
    \nvariable: \"travellerFirstName\"\ntransitions:\nnext: \"webview\"\nwebview:\n\
    component: \"System.Webview\"\nproperties:\nservice: \"travvyWebview\"\nsourceVariableList:\
    \ \"travellerFirstName\"\nvariable: \"appResponse\"\nprompt: \"Press 'Enter Traveler\
    \ Information' to complete your booking\"\nlinkLabel: \"Enter Traveler Information\"\
    \ncancelLabel: \"Cancel\"\ntransitions:\nnext: \"evaluateWebviewResponse\"\nactions:\n\
    cancel: \"onCancel\"\nevaluateWebviewResponse:\ncomponent: \"System.Switch\"\n\
    properties:\nsource: \"${appResponse.value.status}\"\nvalues:\n- \"success\"\n\
    - \"cancel\"\ntransitions:\nactions:\nsuccess: \"confirmBooking\"\ncancel: \"\
    onCancel\"\nNONE: \"onCancel\"\nconfirmBooking:\ncomponent: \"System.Output\"\n\
    properties:\ntext: \"Booking has been confirmed for ${appResponse.value.firstName}\
    \ ${appResponse.value.lastName}. Thanks for choosing Travvy!\"\nkeepTurn: false\n\
    transitions:\nreturn: \"done\"\nonCancel:\ncomponent: \"System.Output\"\nproperties:\n\
    text: \"Sorry that you canceled your booking. Hope to see you back soon!\"\ntransitions:\n\
    return: \"done\"\n```\n\n### Web 应用程序实施\n\n在您的系统上安装 Oracle JET CLI 后，您可以通过在命令提示符或终端中，从您希望创建应用程序的位置发出以下命令，轻松创建一个示例应用程序：\n\
    \n```\nojet create  --template=navdrawer|navbar|basic|blank\n```\n\n对于此演示，您只需调用以下命令：\n\
    \n1.  完成后，打开您的 `appController.js`（`\\travvyWebviewApp\\src\\js\\appController.js`）并将应用程序名称更新为“Travvy\
    \ Web App”，如下所示：\n\n```\n    self.appName = ko.observable(\"Travvy Webview App\"\
    );\n```\n\n2.  打开 `index.html` 文件（`\\travvyWebviewApp\\src\\index.html`）并将 **head**\
    \ 部分下的 **title** 更新如下：\n\n```\n    Travvy Webview App\n```\n\n3.  将同一 `index.html`\
    \ 文件（`\\travvyWebviewApp\\src\\index.html`）的 body 部分替换为以下代码：\n\n```\nTraveler\
    \ Information\n\nYes\n    No\n\nSubmit\n    Cancel\n```\n\n在此 body 部分中，您定义了如图\
    \ 8-5 之前显示的各种屏幕元素，并添加了屏幕上的验证。\n\n4.  最后，打开您应用程序的 `main.js` 文件（`\\travvyWebviewApp\\\
    src\\js\\main.js`），并将文件的全部内容替换为以下代码。\n"
- fmt: "```javascript\n/**\n * @license\n * Copyright (c) 2014, 2019, Oracle and/or\
    \ its affiliates.\n * The Universal Permissive License (UPL), Version 1.0\n */\n\
    'use strict';\n/**\n * Example of Require.js boostrap javascript\n */\nrequirejs.config(\n\
    {\n  baseUrl: 'js',\n  // Path mappings for the logical module names\n  // Update\
    \ the main-release-paths.json for release mode when updating the mappings\n  paths:\n\
    \  //injector:mainReleasePaths\n  {\n    'knockout': 'libs/knockout/knockout-3.5.0.debug',\n\
    \    'jquery': 'libs/jquery/jquery-3.4.1',\n    'jqueryui-amd': 'libs/jquery/jqueryui-amd-1.12.1',\n\
    \    'promise': 'libs/es6-promise/es6-promise',\n    'hammerjs': 'libs/hammer/hammer-2.0.8',\n\
    \    'ojdnd': 'libs/dnd-polyfill/dnd-polyfill-1.0.0',\n    'ojs': 'libs/oj/v7.0.1/debug',\n\
    \    'ojL10n': 'libs/oj/v7.0.1/ojL10n',\n    'ojtranslations': 'libs/oj/v7.0.1/resources',\n\
    \    'text': 'libs/require/text',\n    'signals': 'libs/js-signals/signals',\n\
    \    'customElements': 'libs/webcomponents/custom-elements.min',\n    'proj4':\
    \ 'libs/proj4js/dist/proj4-src',\n    'css': 'libs/require-css/css',\n    'touchr':\
    \ 'libs/touchr/touchr'\n  }\n  //endinjector\n}\n);\n/**\n * A top-level require\
    \ call executed by the Application.\n * Although 'ojcore' and 'knockout' would\
    \ be loaded in any case (they are specified as dependencies\n * by the modules\
    \ themselves), we are listing them explicitly to get the references to the 'oj'\
    \ and 'ko'\n * objects in the callback\n */\nrequire(['ojs/ojcore', 'knockout',\
    \ 'appController', 'jquery', 'ojs/ojknockout', 'ojs/ojformlayout', 'ojs/ojinputtext',\
    \ 'ojs/ojlabel', 'ojs/ojbutton', 'ojs/ojradioset', 'ojs/ojvalidationgroup'],\n\
    \  function (oj, ko, app, $) { // this callback gets executed when all required\
    \ modules are loaded\n    $(function () {\n      /*\n      Parameters send from\
    \ the webview are saved in a window object named \"webviewParameters\". In this\
    \ sample\n      the parameters contain information provided by the user in the\
    \ bot conversation.\n      */\n      let webviewParameters = window.webviewParameters\
    \ != null ? window.webviewParameters['parameters'] : null;\n      /*\n      helper\
    \ function to read named webview parameter\n      */\n      let getWebviewParam\
    \ = (arrParams, key, defaultValue) => {\n        if (arrParams) {\n          let\
    \ param = arrParams.find(e => {\n            return e.key === key;\n         \
    \ });\n          return param ? param.value : defaultValue;\n        }\n     \
    \   return defaultValue;\n      };\n      /*\n      Setting default values for\
    \ the travellerFirstName if no value provided\n      */\n      self.firstName\
    \ = ko.observable(getWebviewParam(webviewParameters, 'travellerFirstName', \"\
    ));\n      self.lastName = ko.observable();\n      self.address = ko.observable();\n\
    \      self.zipCode = ko.observable();\n      self.validId = ko.observable();\n\
    \      self.idNumber = ko.observable();\n      self.country = ko.observable();\n\
    \      /*\n      When the user submits ot cancels the web form, control need to\
