- fmt: '# Testing a Channel Using ODA Client Samples


    Oracle provides you ODA Client samples for JavaScript, which you can download
    from [`www.oracle.com/technetwork/topics/cloud/downloads/amce-downloads-4478270.html`](http://www.oracle.com/technetwork/topics/cloud/downloads/amce-downloads-4478270.html).


    Using these samples, you can quickly test your Web channel in bare minimum steps.
    These samples come with preconfigured Bots Client SDK, which you will later use
    in your web application to access the Web channel. These sample apps provide you
    a playground to test and debug your channel. Follow the following steps:


    1. Download `bots-client-sdk-js-samples-<Version_Number>.zip` file using the preceding
    link.

    2. Extract the zip file to a location of your preference.

    3. Once extracted, you will receive two sample applications, namely, `chat-sample-web`
    and `chat-sample-custom-web`. To start working with these samples, you need to
    have Node.js installed on your system. If not, download it from [`https://nodejs.org/en/download/`](https://nodejs.org/en/download/).

    4. Navigate inside `chat-sample-web` directory and run command:


    ```

    npm install

    ```


    using a command prompt/terminal to install application dependencies.


    5. Once dependencies get installed, run the following command to start the application:


    ```

    node server.js

    ```


    By default the application will be listening to port 3000 of your machine. Open
    a browser and navigate to URL `http://localhost:3000/`.


    You should be able to see a web page as shown in Figure 6-13.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig13_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig13_HTML.jpg)


    **Figure 6-13** `chat-sample-web`


    You need to enter the App ID of your Web channel. You can find this on your channel
    details section as outlined in Figure 6-14.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig14_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig14_HTML.jpg)


    **Figure 6-14** Channel App ID


    Enter the App ID in your browser window of `chat-sample-web` application and press
    "Continue" button. This will take you to the home page of the application.


    From the home page, click the button "Chat with your BOT." This will open a chat
    widget, which will invoke your Web channel based on the App ID. Refer to Figure
    6-15.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig15_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig15_HTML.jpg)


    **Figure 6-15** Invocation of chat widget


    You should be now able to chat over your Web channel. Check Figure 6-16.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig16_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig16_HTML.jpg)


    **Figure 6-16** Conversation over Web channel


    Now that you have successfully tested your application, you will use ODA Client
    SDK for JavaScript in the next section to invoke the channel from your web application.


    # Accessing Users Web Channel from Web UI Using ODA Client SDK


    The following are the steps which you need to perform in order to access your
    Web channel from a web application:


    1. Configure client SDK and host it on a web server.

    2. Create a simple web application for Extreme Hiking.

    3. Add JavaScript code in the HTML file of web application to invoke client SDK.

    4. Deploy the web application and test conversation over the Web channel.


    For the purpose of this chapter, we will be using GlassFish web server to host
    client SDK and the web application. However, you are free to choose any web server
    of your choice.


    ## Configure Client SDK


    Download the latest version of ODA Client SDK for JavaScript from the URL [`www.oracle.com/technetwork/topics/cloud/downloads/amce-downloads-4478270.html`](http://www.oracle.com/technetwork/topics/cloud/downloads/amce-downloads-4478270.html)
    and extract it to a location of your preference. Once the files are extracted,
    you need to configure it for the web server where you will host the SDK.


    To start things off, let''s first bring up the GlassFish server and add a location
    where you will put the SDK. By default, a GlassFish server listens to port 8080.


    In this case, we have created a folder `odaTravvyDemo` inside `docroot` folder
    on GlassFish server. Inside this folder, you will add a `static` folder for SDK.
    In order to configure the SDK, you need to execute the following command on Mac
    system, as also shown in Figure 6-17.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig17_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig17_HTML.jpg)


    **Figure 6-17** Configure SDK on Mac system


    ```

    ./configure http://localhost:8080/odaTravvyDemo/static/

    ```


    `localhost` and the port `8080` may change if you wish to configure the SDK for
    a different web server, based on IP address or in case of any public Internet
    deployment.


    Once you execute the preceding command, it would generate a folder name containing
    the path you provide to configure. In this case, the folder name will be `http:__localhost:8080_odaTravvyDemo_static_`.
    Rename the folder as `static` and copy it inside the `odaTravvyDemo` folder created
    earlier on the GlassFish server. That''s it.


    Unfortunately, life is not that simple for people working on Windows machines
    in this case. Thankfully, you have an alternative. Navigate to `js-sdk` folder
    where you have extracted your SDK. Locate `loader.json` file inside `js-sdk` folder
    and open that. You will notice that the file contains:


    ```

    {"url":"https://placeholder.public.path/bots.1.16.1.min.js"}

    ```


    Replace `https://placeholder.public.path` with `http://localhost:8080/odaTravvyDemo/static`
    in `loader.json`. Again, `localhost` and the port `8080` may change if you wish
    to configure the SDK for a different web server, based on IP address or in case
    of any public Internet deployment.


    Using a text editor, find and replace the same part for each occurrence in remaining
    files of this folder. For your convenience, the following are the list of files
    which you need to update in addition to `loader.json`:


    1. `bots.1.16.1.min.js`

    2. `frame.1.16.1.css`

    3. `frame.1.16.1.min.js`


    ### Note


    Version numbers of above mentioned files may change based on SDK version.


    Once done, rename the folder as `static` and copy it inside the `odaTravvyDemo`
    folder created earlier on the GlassFish server.


    ## Create a Simple Web Application for Travvy


    Now you need to create a web application from which you will invoke the SDK. We
    have created an Extreme Hiking web application using Oracle JET, but you are open
    to choose any technology of your choice. Figure 6-18 shows you the Extreme Hiking
    web site.


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig18_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig18_HTML.jpg)


    **Figure 6-18** Extreme Hiking web site'
