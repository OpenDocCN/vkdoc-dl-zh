- fmt: '# Upcoming Sections Overview


    In upcoming sections, you will update the default implementation of your component
    with your code to validate age, package the custom component, and deploy to the
    Embedded Container. Finally, you will invoke the custom component from your bot
    dialog flow.


    ## Update Custom Component Implementation and Local Debugging


    In this section, you will implement the logic for your age validation and debug
    your component locally for any issue. Copy the following code snippet to your
    `AgeValidator.js`:


    ```javascript

    ''use strict'';

    module.exports = {

    metadata: () => ({

    name: ''com.hiking.AgeValidator'',

    supportedActions: [''allowed'', ''denied'']

    }),

    invoke: (conversation, done) => {

    // perform conversation tasks.

    const userInput = conversation.text();

    // determine age

    // const minBookingAge = 18;

    let age = 0;

    if (userInput){

    const matches = userInput.match(/\d+/);

    if (matches) {

    age = matches[0];

    } else {

    conversation.invalidUserInput("Age input not understood. Please try again");

    done();

    return;

    }

    } else {

    var errText = "No age input provided";

    conversation.logger().error(errText);

    done(new Error(errText));

    return;

    }

    conversation.logger().info(''AgeValidator: age entered by user='' + age);

    conversation.transition( age >= minBookingAge ? ''allowed'' : ''denied'' );

    done();

    }

    };

    ```


    Let’s have a brief overview of these changes. As part of the preceding change,
    you have updated both `metadata` and `invoke` functions from default implementation.
    In `metadata` function, you have updated the component name from `"AgeValidator"`
    to `"com.hiking.AgeValidator"`. This gives your component a unique name. Though
    this is not a mandatory step, by doing so you will be able to categorize your
    component packages and components which are contained in those packages. This
    will further help you to reduce the risk of naming clashes with other custom components
    that may be added by the other bot designers. This way of naming custom components
    will come much handy as your custom component landscape will grow.


    Then you have removed the `properties` object (which was earlier part of default
    implementation) as you don’t need that here and also updated the `supportedActions`.
    Later in this section, you will notice how these actions will be used for state
    navigation in dialog flow.


    Next, you updated `invoke` function to get user’s response using `conversation.text()`
    method and stored it in a variable. Using regular expressions, you then extracted
    the numeric value of age from the variable in which you stored user response.
    After that you have added conditions to validate the age and response for those
    conditions. Take a closer look at various `conversation` methods which are being
    used as part of this implementation.


    Main benefit of local debugging is that it allows you to step through the code
    and find issues, in case you have.


    Alright, now that your implementation is ready, save the file. Then restart your
    custom component `ageValidatorCC` by navigating to parent directory, which in
    this case is `ODACustomComponents`. Use the following command, as explained previously
    in the “Run Your Custom Component Locally” section:


    ```

    //use ctrl+c in the existing command window to stop the existing process

    bots-node-sdk service ageValidatorCC

    ```


    ### Note


    Every time you make a change in your local component and save it, you need to
    restart your local node container using the preceding command.


    From your local machine if you now access `http://localhost:3000` from a browser,
    you will notice that these new changes from `AgeValidator.js` are being reflected.
    Check Figure [10-16](#479330_1_En_10_Chapter.xhtml#Fig16).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig16_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig16_HTML.jpg)


    **Figure 10-16** Update component response


    If your ngrok session is still active, you just need to reload your custom component
    in ODA instance. To do so, you need to click the ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figd_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Figd_HTML.jpg)
    button available in the top-right corner of the Components screen in ODA.


    If your ngrok session is expired or terminated, you need to regenerate a host
    name using ngrok as explained in the “Expose Custom Component over the Internet”
    section. After generating a new host name for port 3000, you need to update the
    Metadata URL on the Components screen. Refer to the highlighted section in Figure
    [10-17](#479330_1_En_10_Chapter.xhtml#Fig17).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig17_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig17_HTML.jpg)


    **Figure 10-17** Update Metadata URL post generating new host


    Presuming that your custom component is running locally and is accessible in ODA
    as explained in the preceding text, now is the time to invoke the custom component
    from your bot’s dialog flow. Navigate to ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fige_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fige_HTML.jpg)
    Flows from the left-hand menu. Once you are on the Flows screen, update the dialog
    flow as follows:


    ```yaml

    metadata:

    platformVersion: 1.0.1

    main: true

    name: FindTrip

    context:

    variables:

    states:

    intent:

    component: "System.Intent"

    properties:

    variable: "iResult"

    transitions:

    actions:

    SelectTrip: "askAge"

    CancelTrip: "cancelTrip"

    unresolvedIntent: "unresolved"

    askAge:

    component: "System.Output"

    properties:

    text: "How old are you?"

    transitions:

    next: "validateAge"

    validateAge:

    component: "com.hiking.AgeValidator"

    properties:

    transitions:

    next: "bookTrip"

    actions:

    denied: "underAge"

    bookTrip:

    component: "System.Output"

    properties:

    text: "You will be soon able to book trip using Travvy"

    transitions:

    return: "done"

    underAge:

    component: "System.Output"

    properties:

    text: "You don''t meet minimum age criteria to book a trip using Travvy."

    transitions:

    return: "done"

    cancelTrip:

    component: "System.Output"

    properties:

    text: "You will be soon able to cancel your trip using Travvy"

    transitions:

    return: "done"

    unresolved:

    component: "System.Output"

    properties:

    text: "Sorry I don''t understand you. Please try again"

    transitions:

    return: "done"

    ```


    As part of the preceding bot flow, you first used `"System.Intent"` component
    to identify intent. These are the same intents which you created as part of Chapter
    [5](#479330_1_En_5_Chapter.xhtml). Based on intent resolution by `System.Intent`
    component, you have then defined the state corresponding to those intents. Notice
    that when an intent gets resolved to `SelectTrip`, only then you are doing an
    age validation else not.


    Check `"askAge"` state where you are asking user to provide his/her age and then
    making a transition to `"validateAge"` state. This state is invoking your custom
    component. Then based on the response of custom component, you are passing bot
    handle to different states.


    As the skill implementation is in its early stages, you will only display static
    text content for various states. There is nothing wrong in that, and it also suffices
    the purpose of custom component implementation. These texts can be easily updated
    to more appropriate bot response as your bot evolves.'
