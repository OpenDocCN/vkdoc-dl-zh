    # 自定义组件开发入门


    假设您已按照上一节中的步骤操作，您的本地环境应该已准备好进行自定义组件开发。如本章开头所述，在接下来的几个步骤中，您将创建一个自定义组件来验证用户的年龄。


    导航到您想要创建自定义组件的目录，并从该目录打开命令提示符。请确保您要创建自定义组件的目录以及您在自定义组件内部创建的任何目录都不包含空格。请参考图 10-1。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig1_HTML.jpg](img/479330_1_En_10_Fig1_HTML.jpg)


    图 10-1


    自定义组件位置


    在上述位置，您将创建一个名为 `ageValidatorCC` 的目录。在命令行中使用以下命令：


    ```

    mkdir ageValidatorCC

    ```


    创建完成后，使用以下命令导航到 `ageValidatorCC` 目录：


    ```

    cd ageValidatorCC

    ```


    下一步是将您的项目目录（即 `ageValidatorCC` 目录）配置为一个 node 项目。使用以下命令：


    ```

    npm init -y

    ```


    这将在 `ageValidatorCC` 目录内生成一个默认的 `package.json`。您稍后可以更新此 `package.json` 文件，添加项目特定的详细信息。请参考图
    10-2。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig2_HTML.jpg](img/479330_1_En_10_Fig2_HTML.jpg)


    图 10-2


    配置一个 node 项目


    接下来，使用以下命令将 Oracle Bots Node SDK 添加到您的项目目录：


    ```

    npm install --save-dev @oracle/bots-node-sdk

    ```


    如果您现在导航到 `ageValidatorCC` 目录，您会注意到该目录包含上一步创建的 `package.json`，以及 `node_modules`
    目录中新增的 node 模块。


    接下来，您需要添加一个 JavaScript 文件，用于编写您的自定义逻辑。为此，请使用以下命令：


    ```

    bots-node-sdk init -c AgeValidator

    ```


    完成后，您将看到一条消息，显示“自定义组件包‘ageValidatorCC’创建成功！”。这将在您的目录中创建组件包并添加依赖项。请参考图 10-3。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig3_HTML.jpg](img/479330_1_En_10_Fig3_HTML.jpg)


    图 10-3


    自定义组件包


    恭喜！您现在已经成功创建了第一个自定义组件。如果您之前有使用 node 项目的经验，那么您一定对图 10-3 中显示的文件很熟悉。但如果没有，我们将简要介绍您主要关心的文件：


    `package.json`：此文件包含您项目的特定元数据信息。这包括对项目入口点的引用（在本例中为 `main.js`），以及项目的 JavaScript
    依赖项。要了解更多信息，请参考以下链接：


    [`https://docs.npmjs.com/files/package.json`](https://docs.npmjs.com/files/package.json)


    `main.js`：如前所述，此文件是自定义组件项目的默认入口点。您会注意到此文件引用了组件目录，您将在其中添加自定义组件实现。请参考以下 `main.js`
    的代码：


    ```

    module.exports = {

    components: [

    ''./components''

    ]

    };

    ```


    即使您在组件目录中实现了多个组件，您也可以通过指定组件名称来简单地访问特定组件。您无需修改 `main.js` 中的任何内容即可访问它。例如，就像您添加了
    `AgeValidator` 组件一样，您也可以在组件目录中添加另一个组件 `GetUserProfile` 来检索用户配置文件信息。


    在此上下文中，另一个重要点是在创建组件时创建某种逻辑分组。例如，您可能希望将 `AgeValidator` 和 `GetUserProfile` 配置文件组件放在
    `components` 内的不同目录中，以隔离不同的实现。您可能想要更改的一件事是给您的父文件夹起一个通用名称，例如 `odaCustomComponentCC`，而在本例中它是
    `ageValidatorCC`。


    虽然这不是必须的，但这是一个值得遵守的良好实践。毕竟，它将帮助您以及您的团队成员理解代码实现，并在出现问题时准确定位到特定组件。


    `AgeValidator.js`：这是您的自定义组件的 JavaScript 实现，位于 `components` 目录下。图 10-4 向您展示了执行
    `bots-node-sdk init -c AgeValidator` 时生成的默认自定义组件实现。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig4_HTML.jpg](img/479330_1_En_10_Fig4_HTML.jpg)


    图 10-4


    自定义组件默认实现


    如您所见，`AgeValidator` 默认暴露了两个不同的函数。它们是 `metadata` 和 `invoke`。让我们在这里更详细地讨论它们：


    `metadata: ():` 如您所见，此函数保存组件的元数据信息。`metadata` 函数由三个不同的属性组成。


    *   `name`：这是标识您组件的唯一名称。

    *   `properties`：这是一个对象，包含组件执行所必需的参数。

    *   `supportedActions`：这些是您的组件支持的操作，您可以根据条件从组件中调度这些操作。基于这些操作，您可以在机器人流程中定义状态转换操作。


    `invoke: (conversation, done):` `invoke` 函数接受两个参数，即 `conversation` 和 `done`。`conversation`
    是对自定义组件 SDK 的引用。您可以使用其函数来读取从机器人发送到自定义组件的消息，并根据这些消息编写组件响应。例如，假设您在 `properties`
    部分中定义了一个变量 `userAge` 及其类型，您期望它作为自定义组件的输入参数。一旦您从技能中传递了 `userAge` 值，要在自定义组件中获取该值，您可以使用以下代码：


    ```

    var givenAge = conversation.properties().userAge;

    ```


    同样，您也可以在 `properties` 部分中定义一个变量（例如 `ccResult`）及其类型。然后使用此变量通过如下设置将值传递回您的机器人：


    ```

    conversation.variable(ccResult, ccCalculatedVal);

    ```


    一旦您的自定义组件完成处理，并且您希望将控制权交还给机器人对话流程，您将调用 `done()`，这是一个回调函数。例如，您可以在按照上述代码为变量设置计算值后立即调用
    `done()`。因此，它看起来如下所示：


    ```

    conversation.variable(ccResult, ccCalculatedVal);

    done();

    ```

    '
- fmt: '# Run Your Custom Component Locally


    Now that you have the base implementation of your custom component ready, the
    next step is to run it locally. Refer to Figure [10-3](#479330_1_En_10_Chapter.xhtml#Fig3)
    to see the directory structure of the project.


    Navigate to the parent directory `ODACustomComponents` which contains the custom
    component `ageValidatorCC`, to start a node server. Refer to Figure [10-4](#479330_1_En_10_Chapter.xhtml#Fig4).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig5_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig5_HTML.jpg)


    Figure 10-5 – Custom Component parent directory


    Using a command prompt/terminal, execute the following command as displayed in
    Figure [10-6](#479330_1_En_10_Chapter.xhtml#Fig6) to start the node server:


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig6_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig6_HTML.jpg)


    Figure 10-6 – Start node server


    ```

    bots-node-sdk service ageValidatorCC

    ```


    Now that your component is running on your local machine, you can check it by
    navigating to URL `http://localhost:3000/components` on your browser. It will
    look as shown in Figure [10-7](#479330_1_En_10_Chapter.xhtml#Fig7).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig7_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig7_HTML.jpg)


    Figure 10-7 – Custom Component running on local machine


    In the preceding text, you can see various metadata information from your component
    based on initial implementation. As you will change this implementation for `AgeValidator`
    in later part of this book, you will notice that these metadata information will
    also change according to your new implementation.


    # Expose Custom Component over the Internet


    So far, you have successfully created your first custom component on your local
    machine and also started it on a local node container using Oracle `bots-node-sdk`.
    You also tested your running component using a web browser. You are one step away
    from accessing your custom component from an ODA instance. For that you will need
    to expose your IP over the Internet, so that you can access your service using
    that IP. You will now use `ngrok` to accomplish that.


    Navigate to the directory where you have downloaded and extracted `ngrok.exe`
    on your local machine. Once you are there, run `ngrok`. `ngrok` allows you to
    generate a host name using which you are able to access your machine over the
    Internet. You will need to tell `ngrok` which port you are intended to expose,
    which in this case will be `3000`.


    After running `ngrok`, simply execute the following command to expose your machine
    over the Internet:


    ```

    ngrok http 3000

    ```


    Refer to Figure [10-8](#479330_1_En_10_Chapter.xhtml#Fig8).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig8_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig8_HTML.jpg)


    Figure 10-8 – Run `ngrok.exe`


    Once done, you will have to copy the `https` instance from `ngrok` and replace
    it with your `http://localhost:3000`. Refer to Figure [10-9](#479330_1_En_10_Chapter.xhtml#Fig9)
    to check what exactly you need to copy.


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig9_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig9_HTML.jpg)


    Figure 10-9 – `ngrok` https host


    Considering the preceding figure, your custom component will be accessible over
    [`https://3d649457.ngrok.io/components`](https://3d649457.ngrok.io/components).
    You may check this by accessing this URL from your web browser. Check Figure [10-10](#479330_1_En_10_Chapter.xhtml#Fig10).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig10_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig10_HTML.jpg)


    Figure 10-10 – Access Custom Component using public URL


    ### Note


    Host which you generated using `ngrok` will get changed each time you close the
    `ngrok` application or if your session gets expired. An expired host will no longer
    be accessible. However, a permanent host name could be created with a free subscription
    to `ngrok`.


    # Access Custom Component from ODA Instance


    Now that you have a custom component running locally and accessible over the Internet,
    let’s see how you can access the same from your ODA instance.


    Login to your ODA instance and navigate to the skill in which you want to consume
    your component. In this case, we want to access this custom component from `FindTrip`
    skill (Figure [10-11](#479330_1_En_10_Chapter.xhtml#Fig11)) which you have created
    in Chapter [5](#479330_1_En_5_Chapter.xhtml) of this book.


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig11_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig11_HTML.jpg)


    Figure 10-11 – `FindTrip` Skill


    From left-hand menu items, click ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figa_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Figa_HTML.jpg)
    Components. You create custom component on “Custom” tab of the screen. As you
    have not yet associated any custom component service to the skill, the screen
    looks as shown in Figure [10-12](#479330_1_En_10_Chapter.xhtml#Fig12).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig12_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig12_HTML.jpg)


    Figure 10-12 – ODA components screen


    Click the ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figb_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Figb_HTML.jpg)
    button to create a new custom component service. This will give you a new Window
    as shown in Figure [10-13](#479330_1_En_10_Chapter.xhtml#Fig13).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig13_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig13_HTML.jpg)


    Figure 10-13 – Create service


    From Figure [10-13](#479330_1_En_10_Chapter.xhtml#Fig13), you can see that you
    can create custom component service in three different ways:


    *   **Embedded Container**: You will use this approach when you want to deploy
    your custom component in a node container embedded inside your ODA instance. This
    approach will be explained in later section of this chapter. You will use this
    approach once your custom component will be ready.


    *   **Oracle Mobile Cloud**: This approach can be used if you want to expose your
    custom component as an API service. For this approach, you need to set up an Oracle
    Mobile Hub.


    *   **External**: You will use this approach if you want to use a custom component
    deployed and running on an external node container. This approach suites our case
    as we already have the component up and running in our local environment. As an
    alternative, you can also use any Node-capable server. Where you can create a
    node platform and host your custom component from.


    Select **External** from the Create Service window and fill the details as shown
    in Figure [10-14](#479330_1_En_10_Chapter.xhtml#Fig14).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig14_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig14_HTML.jpg)


    Figure 10-14 – Custom Component external service


    `User Name` and `Password` are not required for debugging purpose. But since these
    are mandatory fields in configuration, you need to provide them.


    Once done, finalize the process by clicking ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figc_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Figc_HTML.jpg)
    button. This may take a few moment based on node modules being used in your custom
    component, which you define as dependencies in your `package.json`. Once done,
    you will see a new screen showing details of your custom component. Refer to Figure
    [10-15](#479330_1_En_10_Chapter.xhtml#Fig15).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig15_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig15_HTML.jpg)


    Figure 10-15 – Custom Component service created


    Now you can see that your custom component service is accessible from ODA instance
    and is ready to be consumed in `FindTrip` skill dialog flow.'
