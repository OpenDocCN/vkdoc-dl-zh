    ## Customizing Chat Widget


    Often you will be asked to customize look and feel of the chat widget for your
    business. In this section, you will learn how you can customize the look and feel
    of your chat widget quickly and efficiently.


    In section three of "Add JavaScript Code," you have used the `Bots.init()` function.
    By simply passing some additional attributes to that, you can change various features
    of your widget. Check the following snippet of this function to achieve this:


    ```

    Bots.init(

    {

    appId: ''5d20fd8bee36010010f274ae'', // app id of channel

    menuItems: {  // enable/disable bottom-left corner options

    imageUpload: false,

    shareLocation: false,

    fileUpload: false,

    },

    browserStorage: ''sessionStorage'', // when to clear chat history

    businessName: "I''m Travvy", // bold name text

    customText: {

    headerText: ''Book A Hiking Trip'', // top pannel text

    inputPlaceholder: ''Start booking a trip...'' //message input place holder

    },

    buttonIconUrl: ''./assets/Kompas kaart-02.png'', // chat-widget button icon

    businessIconUrl: ''./assets/Kompas kaart-02.png'', // widget response icon

    backgroundImageUrl: ''./assets/Travvy.png'', // widget background image

    }

    )

    ```


    In the code editor, this should look as Figure [6-23](#479330_1_En_6_Chapter.xhtml#Fig23).


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig23_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig23_HTML.jpg)


    Figure 6-23


    Widget customization properties


    The following are a few additional default properties, in case you need to update:


    1.  To change the bot icon, search for the text in `frame.1.16.1.min.js` `m.default.createElement("img",{alt:name+"''s
    avatar",src:t}))}}])` and update it as `m.default.createElement("img",{alt:name+"''s
    avatar",src:''http://localhost:8080/odaTravvyDemo/Kompas.png''}))}}])`. Highlighted
    section is the location of the image.


    2.  To update the `introductionText` of the widget, search for `introductionText:"We''re
    here to talk, so ask us anything!"` and update it as `introductionText:"Extreme
    Hiking Assistant!"`.


    We would also advise you to refer to the `README.md` file for more customization
    options.


    After accommodating all these changes, your widget would look as Figure [6-24](#479330_1_En_6_Chapter.xhtml#Fig24).


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig24_HTML.jpg](images/479330_1_En_6_Chapter/479330_1_En_6_Fig24_HTML.jpg)


    Figure 6-24


    Customized chat widget


    ## Summary


    In this chapter, you were familiarized with various types of channels Oracle provides
    you to expose your Skills and Digital Assistants. You focused on the Users Web
    channel as this was the primary focus of the sample app which is being created
    for this book. Having said that, you are encouraged to explore various channel
    types mentioned in the initial sections of this chapter. Refer to Oracle documentations
    regarding the instructions for those channel types. Again, Agent Integration and
    Webhook channels will be explained in another chapter of this book. In the later
    sections of this chapter, you learned how, with bare minimum changes, you can
    radially enhance the look and feel of the chat widget. We hope that this chapter
    provided you enough information to start working with channels and will see you
    in the next chapter.


