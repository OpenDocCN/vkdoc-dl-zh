    当您开始为技能输入`显示名称`时，`名称`字段会自动填充。如果您希望为技能设置不同的`显示名称`和`名称`，也可以手动编辑此字段。


    创建完成后，`FindTrip`将与其他技能一起出现在“技能”部分。参见图 5-6。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig6_HTML.jpg](img/479330_1_En_5_Fig6_HTML.jpg)


