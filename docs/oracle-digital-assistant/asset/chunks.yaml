  trans: '

    ### 创建实体


    要创建实体，你需要深入找到要添加实体的技能，然后导航至实体部分。在接下来的几步中，你将向 `FindTrip` 技能添加 `TripLocation` 实体：


    1.  点击 `FindTrip` 技能。

    2.  从左侧菜单导航至实体 (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figw_HTML.jpg](img/479330_1_En_5_Figw_HTML.jpg))。

    3.  点击“+ 实体”按钮。


    这将添加一个默认名称为 `Entity1` 的新实体。然后你需要将其更新为 `TripLocation`。请参见图 5-22。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig22_HTML.jpg](img/479330_1_En_5_Fig22_HTML.jpg)


    图 5-22


    创建实体


    你可以通过点击“+ 值”按钮向列表中添加新值。这将弹出一个如图 5-23 所示的弹出窗口，你可以在其中向列表添加新值。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig23_HTML.jpg](img/479330_1_En_5_Fig23_HTML.jpg)


    图 5-23


    添加新值


    ### 向意图添加实体


    创建 `TripLocation` 实体后，你需要将新创建的实体添加到 `SelectTrip` 意图中。为此，只需遵循以下步骤：


    1.  导航至**意图**部分 (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figx_HTML.jpg](img/479330_1_En_5_Figx_HTML.jpg))。

    2.  选择“SelectTrip”意图。

    3.  点击右侧的“+ 实体”按钮。

    4.  这将打开一个包含所有可用实体的弹出窗口。

    5.  点击“TripLocation”，即可将该实体添加到“SelectTrip”意图中。


    请参见图 5-24。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig24_HTML.jpg](img/479330_1_En_5_Fig24_HTML.jpg)


    图 5-24


    向意图添加实体


    由于你刚刚更新了意图，请确保按照本章前一节所述训练模型并测试你的意图。此外，如果你添加了实体，则在训练模型时应选中“实体”选项（图 5-25）。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig25_HTML.jpg](img/479330_1_En_5_Fig25_HTML.jpg)


    图 5-25


    训练技能


    ## 使用对话流


    到目前为止，你已经熟悉了意图、表述和实体。现在是时候在对话流中使用它们了，这样你的技能就能具备处理对话的能力。对话流是设计技能对话的地方。技能应该如何问候、应该向用户询问什么、以及如何根据用户输入做出反应——所有这些都通过对话流中的各种组件来处理。因此，可以说对话流定义充当了任何技能的模型。


    对话流是使用 Oracle Bots 标记语言 (OBotML) 设计的。OBotML 基于 YAML，这是一种表达数据和数据关系的人性化方式。


    你可以通过点击左侧导航栏中的“流” (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figy_HTML.jpg](img/479330_1_En_5_Figy_HTML.jpg))
    来访问技能的对话流。在继续之前，理解构成对话流的各个部分至关重要。请参见图 5-26。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig26_HTML.jpg](img/479330_1_En_5_Fig26_HTML.jpg)


    图 5-26


    对话流部分


    对话流大致可以分为三个部分：


    1.  头部：包含 OBotML 平台版本和对话流名称。

    2.  上下文：包含上下文和变量，也称为对话流变量，这些变量在流程中使用。

    3.  状态：包含各个状态、动作及其结果。此部分包含技能交互和响应的主要逻辑。


    由于 OBotML 遵循 YAML 标准，因此在对话流中保持正确的缩进非常重要。如果你编写的行没有正确缩进，在设计时自动保存期间将会收到错误。


    ### 注意


    每个缩进的长度等于两个空格。


    流程的头部部分相当直接。它包含你的机器人的元数据信息。但涉及到上下文和状态时，你需要更仔细地查看。


    ### 上下文部分


    如前所述，你在上下文部分为技能定义了全局作用域的变量，然后可以在技能对话流的各个状态中使用这些变量。上下文部分中的变量定义如下：


    `variableName`: “`variableType`”;


    显然，`variableName` 是你给变量起的名称。`variableType` 是变量的类型，可以是：


    *   原始类型（`string`、`int`、`boolean`、`double` 和 `float`）

    *   内置实体（`CURRENCY`、`ADDRESS` 等）

    *   自定义实体（如前面章节创建的 `TripLocation`）

    *   `nlpresult`，来自自然语言处理引擎的结果

    *   `resourcebundle`，用于你定义的引用技能中资源包的变量


    这些变量在对话结束时或被显式重置时总是会被清除。


    ### 状态部分


    状态是定义技能整个流程的地方。在这里，你定义技能应该执行的所有活动和动作。你的流程通常由许多状态组成。这些状态调用组件，组件为状态执行任务或工作。


    ### 注意


    一个状态只能调用一个组件。


    流程总是从上到下执行。这意味着在状态部分，你定义的第一个状态首先被执行，第二个状态接下来被执行，依此类推。这是默认行为，除非你显式设置转换到另一个状态。


    此外，强烈建议在你的流程中设置一个默认转换，以优雅地处理因不可预见的用户输入而可能产生的任何意外异常/错误。


    在开始使用对话流之前，你还需要了解另外两件事：Apache FreeMarker 模板语言 (FTL) 和对话流中的组件。


    首先，我们来处理 Apache FreeMarker 模板语言及其工作原理。

