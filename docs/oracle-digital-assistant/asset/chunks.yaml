    # 引言


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Figa_HTML.gif](img/479330_1_En_7_Figa_HTML.gif)


    或者，用英语来说：你可能没想过要用一句印地语来开启本章。


    虽然本书是用英语写成的，但世界上还有更多种语言，其中许多语言只有少数世界人口在使用。当今世界上大约有 6,500 种口语。然而，其中约 2,000 种语言的母语者不足
    1,000 人。使用人数最多的十种语言覆盖了全球约 50% 的人口。这意味着另外 50% 的人口使用其余 6,490 种语言中的任何一种。这些数字对任何想要提供多语言解决方案的人都构成了挑战。确定你想要支持哪些语言至关重要，因为支持所有语言几乎是不可能的。


    一个简单的例子足以说明一切：


    * I would like to order a pizza.

    * Je voudrais commander une pizza.

    * Me gustaria pedir una pizza.

    * Ich mochte gerne einen Pizza bestellen.


    如何构建一个数字助手，使其能够理解上述所有语言，并将它们关联到 `OrderPizza` 意图，同时还能用正确的语言回复用户？


    Extreme Hiking Holidays 也面临着同样的挑战，因为他们服务来自多个国家的客户。他们的大多数客户说英语，但作为对客户的额外服务，他们还为客户提供了一个不仅会说英语，还能说其他语言的数字助手。在本章中，你将学习如何为
    Oracle 数字助手添加多语言支持。


    ### 注意


    数字助手的多语言支持目前尚不完美。对于单个技能，你可以实现多语言支持。如果你需要这种多语言支持，应考虑公开技能。在数字助手层面，目前无法检测语言或使用资源包。当前的解决方案是创建所谓的“主导语言”机器人。这些机器人不是多语言的，而是单一外语机器人。


    为 Oracle 数字助手启用真正的多语言使用已在路线图中。


    ## 翻译是如何工作的？


    Oracle 数字助手的自然语言处理（NLP）基于英语。但这并不意味着你不能添加对其他语言的支持。这种支持依赖于两个组件。


    首先是使用外部翻译服务。这将获取用户输入的任何话语，并将其与英语进行互译。其次是使用包含特定语言文本的资源包。这些资源包将用于向用户发送翻译后的机器人响应。在本章后面，我们将解释这些组件如何工作以及如何组合使用。首先，你将了解语言翻译的典型流程，如图
    7-1 所示。


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig1_HTML.jpg](img/479330_1_En_7_Fig1_HTML.jpg)


    图 7-1


    翻译流程


    基于用户输入，数字助手将尝试检测语言。一旦检测到语言，它将进入流程的下一步。在该步骤中，如果需要，用户的输入话语将由翻译服务翻译成英语。这种翻译需求由 `autoTranslate`
    属性决定。自动翻译默认是禁用的，但随时可以启用或禁用。需要定义 `autoTranslate` 上下文变量，并且每当此变量的值设置为 `true` 时，自动翻译即被启用。启用后，所有用户消息都会被翻译成英语，所有机器人消息都会被翻译成用户语言。


    ```

    variables:

    autoTranslate: "boolean"

    states:

    enableAutotranslation:

    component: "System.SetVariable"

    properties:

    variable: "autoTranslate"

    value: true

    transitions: {}

    ```


    如果 `autoTranslate` 为 `false`，单个组件可能仍然需要翻译。这是因为组件上的 `translation` 属性可以覆盖全局的 `autoTranslate`
    设置。


    因此，如果组件上的 `translation` 属性设置为 `true`，即使 `autoTranslate` 设置为 `false`，数字助手也会调用已配置的翻译服务。


    ```

    :

    component: "System.Text"

    properties:

    translate: true

    ```


    在调用翻译服务之后，或者当不需要翻译时，数字助手将继续处理用户的输入，然后生成机器人的响应。


    数字助手需要确定如何将响应发送给最终用户。有三种选择：


    1.  可以从资源包中获取。

    2.  可以通过翻译服务进行翻译。

    3.  可以“原样”发送。


    具体方式取决于情况。默认情况下，使用组件上定义的输出字符串。如果定义的输出字符串是对资源包的引用，则使用资源包字符串。如果语言设置不是英语，则会查找并使用该语言的资源包条目。如果该条目不可用，则回退到默认语言（英语）的资源包字符串。如果为某个组件启用了翻译（可以通过
    `autoTranslate` 或 `translate` 属性实现），则组件输出文本会首先发送到翻译服务进行翻译。即使该字符串是从资源包中获取的，也是如此。


    ### 注意


    Oracle 数字助手内部使用的语言是英语。如果用户的语言是英语，则无需翻译机器人的回复，因为两者都是英语。在这种情况下，你需要使用 Apache FreeMarker
    表达式将组件上的 `translate` 属性设置为 `false`，或将 `autoTranslate` 属性设置为 `false`。否则，Oracle
    数字助手会尝试将其翻译成英语。


    如果用户的语言不是英语，数字助手将调用翻译服务，并将翻译后的答案传达给用户。但是，如果你在引用资源包的组件上将 `translate` 属性设置为 `false`，则会使用资源包字符串。


    ### 注意


    如果你以 `System.TranslateInput` 开始你的流程，数字助手将始终将用户的输入翻译成英语。如果你需要这种翻译，这会非常有用。


    ```

    translateInput:

    component: "System.TranslateInput"

    properties:

    variable: "translatedString"

    transitions:

    next: "Intent"

    ```


    ### 提示


    你甚至可以从变量中读取原始字符串，这样你就可以保留原始字符串和翻译后字符串的副本。


    ### 翻译服务的陷阱


    翻译服务在创建多语言数字助手时非常有用。然而，它们并非万无一失。有几种情况下，翻译服务难以正确检测语言或提供准确的翻译。让我们看一些例子。


    首先是语言相近的情况。在欧洲，有几种语言非常接近。对于翻译服务来说，区分挪威语和瑞典语、瑞典语和丹麦语会很困难。在这种情况下，作为开发人员，你应该做好准备，在继续之前要求用户确认检测到的语言。其次是问候语或从其他语言“借用”的词语。Hi、Hey、Hoi、Hello、Hallo、Bonjour、Ciao，这些问候语在许多不同的语言中都有使用。没有任何翻译服务能够区分一个意大利人说的“Ciao”和一个荷兰人说的“Ciao”。它总是会得出意大利语的结论，从而使荷兰人感到困惑。对此你无能为力。

    '
- fmt: '# Adding Multilanguage Support to Travvy


    Extreme Hiking Holidays has customers in over 50 countries, but they don’t have
    employees that can cover all of these 50 languages. Besides that, they don’t have
    the resources to create and manage a bot in 50 different languages. This is where
    the translation services come in handy.


    Working with translation services requires the setup of an external translation
    service. Oracle Digital Assistant supports the use of the Google Translation API
    and Microsoft translation services.


    ## Note


    For the purpose of this book, we will use the Google Translation API.


    Google Translation API is a paid API. Costs can vary and are based on API usage.
    Before you can use the API, you must set up a Google Account and enable the Translation
    API. The API can be enabled in the developer console (Figure [7-2](#479330_1_En_7_Chapter.xhtml#Fig2))
    for your Google Account: [`https://console.developers.google.com/apis/dashboard`](https://console.developers.google.com/apis/dashboard).


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig2_HTML.jpg](images/479330_1_En_7_Chapter/479330_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Google developer console dashboard


    Once you have activated the translation service, this translation service has
    to be added to the Digital Assistant in order to use this. You can open the “Add
    Translation Services” from the “Settings menu” at the level of the Digital Assistant
    (Figure [7-3](#479330_1_En_7_Chapter.xhtml#Fig3)).


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig3_HTML.jpg](images/479330_1_En_7_Chapter/479330_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Adding a translation service


    You simply select the service type from the dropdown, add the base URL for the
    translation service, and finally enter the Authorization Token. When you click
    create, the configuration is saved, and the translation service is ready to be
    used.


    After adding the translation service, you need to configure its use. The usage
    of the translation service can be configured at skill level. In the skills’ general
    settings, you need to select the translation service that you want to use from
    a dropdown (Figure [7-4](#479330_1_En_7_Chapter.xhtml#Fig4)) that contains all
    the available translation services for this cloud instance.


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig4_HTML.jpg](images/479330_1_En_7_Chapter/479330_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Setting the translation service


    Once this is selected, all the needed translations will be provided by this translation
    service.


    ## Using the Translation Service


    For translations in Digital Assistant, there are two options, Opt-in and Opt-out.
    Both will be explained in this section.


    ### Opt-out


    To have translations in Digital Assistant enabled by default, also known as Opt-out
    translation, there are some steps to take after adding the translation service.
    First you need to add the `autoTranslate` context variable. Next you need a `System.SetVariable`
    component that sets the `autoTranslate` to `true`. Finally, as the next state,
    you need to add the `System.DetectLanguage` component, which calls the translation
    service to determine the users’ language. All of these will result in the following
    piece of code:


    ```

    metadata:

    platformVersion: "1.0"

    main: true

    name: FindTripWithTranslations

    context:

    variables:

    iResult: "nlpresult"

    autoTranslate: "boolean"

    states:

    enableAutoTranslation :

    component: "System.SetVariable"

    properties:

    variable: "autoTranslate"

    value: true

    transitions:

    next: "detectLanguage"

    detectLanguage:

    component: "System.DetectLanguage"

    properties:

    source:

    transitions:

    next: ............

    ............

    ............

    ............

    ```


    ### Opt-in


    The other option for translations is the Opt-in option. Only for those components
    that you want to have translated, you specifically set the `translate` property
    to `true`.


    In order to make this work, you must make sure to set the `autoTranslate` context
    variable to `false`. Next, for all individual components that need translation,
    set the `translate` property to `true`. Finally make sure that the `System.Intent`
    component also has the `translate` property set to `true`. This is because the
    internal language of the Oracle Digital Assistant is English.


    ```

    intent:

    component: "System.Intent"

    properties:

    variable: "iResult"

    translate: true

    ```


    ## Tip


    If you rely on a translation service for the answers, the Translation API will
    translate the Bots’ English answer to the users’ language. You have little or
    no control on the translation, and thus, you are not 100% sure that the answers
    are always the same. To be in full control of what your Digital Assistant replies,
    you should use resource bundles to store the language dependent answers.


    ## Using Resource Bundles


    As stated in the previous tip, it is good practice to rely on resource bundles
    for all replies from the bot. This can be done for as many languages and dialects
    as you need. To implement this, you must create resource bundles and resource
    bundle entries. When you have not added any resource bundles yet, Oracle Digital
    Assistant will create one for you, and you can enter the first entry (Figure [7-5](#479330_1_En_7_Chapter.xhtml#Fig5)).


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig5_HTML.jpg](images/479330_1_En_7_Chapter/479330_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Creating the first resource bundle entry


    ## Note


    When you create a new resource bundle entry, it will always be added to the default
    language, which is English.


    Now you can start adding translations, or in other words resource bundles for
    other languages. For every key, you can add a translation by invoking the “+ Language”
    button. This will show you a popup where you can enter language-specific text
    for the selected key (Figure [7-6](#479330_1_En_7_Chapter.xhtml#Fig6)).


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig6_HTML.jpg](images/479330_1_En_7_Chapter/479330_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Adding additional languages to the resource bundle


    Make sure that for each and every key, you have a translation available for all
    languages that the Digital Assistant supports. To help you with this, Oracle Digital
    Assistant has a “View By” dropdown at the top right (Figure [7-6](#479330_1_En_7_Chapter.xhtml#Fig6)).
    First, you can switch this to “language.” Then you select the language to create
    resource strings for and start building strings for as long you see keys. When
    all keys have a string, then no more keys are shown.


    ## Answering from a Resource Bundle


    With all the translations entered, it is now time to make the Digital Assistant
    reply to the user based on these translations. This is actually very simple. A
    single-language Digital Assistant can use hardcoded text as shown in the following
    code sample:


    ```

    bookTrip:

    component: "System.Output"

    properties:

    text: "Ok, lets continue to book your trip."

    transitions:

    return: "done"

    ```


    To support multiple languages in a skill, you should add a reference to a resource
    bundle, so it can reply based on this resource bundle. The previous code sample
    will have to change to


    ```

    bookTrip:

    component: "System.Output"

    properties:

    text: "${rb.continueBooking}"

    transitions:

    return: "done"

    ```


    where `rb.continueBooking` refers to a resource bundle entry in the conversation’s
    language having a key with value “continueBooking.” The Digital Assistant will
    look this up and reply the exact value belonging to that key.


    Note that the prefix `rb` needs to be defined in the `context/variables` section
    of the flow.


    ```

    context:

    variables:

    iResult: "nlpresult"

    rb: "resourcebundle"

    autoTranslate: "boolean"

    ```'
