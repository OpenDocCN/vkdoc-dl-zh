  trans: '

    # 实现 Travvy 设计


    既然你已经了解了任务和子任务的概念，那么实现第 4 章中阐述的 Travvy 设计就变得简单了。如前所述，对话设计器中的任务将转化为意图。


    为了调用对话设计器并实现 Travvy 的设计，我们将创建一个全新的空技能（图 4-3）。


    ### 注意


    在本示例中，我们创建了一个新的空技能。不建议在现有技能上使用对话设计器。这是因为当从对话设计器内部生成技能机器人时，现有的意图、实体和代码将被覆盖。此过程将在本章后面进行说明。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig3_HTML.jpg](img/479330_1_En_4_Fig3_HTML.jpg)


    图 4-3


    创建一个新技能


    创建这个新技能后，你会注意到左侧工具栏中的“对话设计器”按钮。点击此按钮，你将进入创建技能机器人的引导流程。


    欢迎界面允许你添加技能机器人应能执行的任务。你可以根据需要输入任意数量的任务（图 4-4），并且在后续阶段，如果需要，还可以添加更多任务。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig4_HTML.jpg](img/479330_1_En_4_Fig4_HTML.jpg)


    图 4-4


    对话设计器欢迎界面


    点击**创建**，对话设计器将打开并显示你在欢迎界面上输入的任务（图 4-5）。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig5_HTML.jpg](img/479330_1_En_4_Fig5_HTML.jpg)


    图 4-5


    设计器的初始视图


    有了这个空的框架，你现在就可以开始创建机器人对话的模型了。


    出于本书的目的，本节不会解释创建此技能模型所涉及的所有步骤，但核心功能将详细讨论。


    从图 4-6 中可以看到，对话设计器中有两个图标：


    *   ![../images/479330_1_En_4_Chapter/479330_1_En_4_Figa_HTML.jpg](img/479330_1_En_4_Figa_HTML.jpg)
    点击此图标，可以输入用户表述。


    *   ![../images/479330_1_En_4_Chapter/479330_1_En_4_Figb_HTML.jpg](img/479330_1_En_4_Figb_HTML.jpg)
    选择此图标，可以输入机器人回复。


    当你只需要输入简单文本时，可以使用一个快捷方式。只需在底部的对话框中输入文本，然后点击图标（机器人或用户）即可将其添加到对话中。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig6_HTML.jpg](img/479330_1_En_4_Fig6_HTML.jpg)


    图 4-6


    添加简单步骤


    如前所述，任务中的第一条消息应该是来自用户的消息，该消息清晰地表达了所选的任务/意图，以便从中生成相当好的表述。例如，对于 `FindTrip` 任务，可以输入
    *我想去进行一次极限徒步旅行*。下一步是添加机器人的回复。我们这里需要一个简单的回复，让机器人进行自我介绍。例如：*嘿，Harold，我是 Travvy，EHH
    的数字助理。很高兴再次在这里见到你。*


    现在对话的开端已经设置好了，我们准备向对话中添加一些实际内容。如第 4 章所述，`FindTrip` 技能（图 4-7）包含几个步骤，我们将在本章中实现其中一部分（并非全部）。让我们从*指明度假目的地*开始。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig7_HTML.jpg](img/479330_1_En_4_Fig7_HTML.jpg)


    图 4-7


    查找旅行的对话流程


    `指明度假目的地` 允许用户选择最喜欢的目的地，之后用户将被引导至该目的地的可用徒步旅行。如果你再读一遍上一句话，可能会注意到它包含以下内容：


    *   一个选择目的地的动作


    *   一个路由到最喜欢目的地的分支


    *   一个子任务，用于选择该目的地可用的徒步旅行之一


    这正是对话设计器允许你输入的内容。通过点击机器人图标，将打开一个“添加消息”对话框，允许你将机器人的回复作为“动作”输入。在“动作”部分，只需添加一条消息，并根据需要添加任意数量的动作。如图
    4-7 所示，用户的选项是：


    *   美国


    *   加拿大


    *   瑞士/法国


    对于每个选项，都将添加一个动作。


    所有这些动作都需要分支到正确的“最喜欢的目的地”子任务。你可以手动创建这些子任务，但对话设计器允许你自动完成此操作。如果你调用动作文本框旁边的汉堡菜单（图
    4-8），可以选择动作类型（`GoURL` 或 `分支对话`）。在这种情况下，我们想要分支对话，因此应该选择此项。选择该选项后，随后的文本框允许你选择一个现有的（子）任务，或者通过输入一个不存在的名称来创建一个新任务。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig8_HTML.jpg](img/479330_1_En_4_Fig8_HTML.jpg)


    图 4-8


    分支对话


    对于创建的每个“分支对话”动作（图 4-9），对话设计器都会自动创建一个新的子任务。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig9_HTML.jpg](img/479330_1_En_4_Fig9_HTML.jpg)


    图 4-9


    分支和子任务


    实现设计的下一步是定义子任务的内容。这与之前描述的“常规任务”（如 `FindTrip`）的工作方式完全相同。


    作为示例，我们将实现“前往美国”子任务。`FindTrip` 任务使用动作让用户选择目的地，而在“前往美国”中，我们将使用卡片。


    卡片是一种更花哨的 UI 组件，也支持图片。你可以输入图片 URL，在其下方可以添加供用户选择的动作。图 4-10 显示了一个示例。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig10_HTML.jpg](img/479330_1_En_4_Fig10_HTML.jpg)


    图 4-10


    卡片和图片


    现在，你可以在对话设计器中预览技能机器人的单个任务和子任务。此预览模式——通过点击屏幕右上角的“预览你的任务”链接激活——允许你通过播放当前显示的单个（子）任务来检查流程。它不是技能机器人完整功能的表示，只会完全按照在设计器中输入的方式回放对话。这意味着无法点击动作或滚动浏览带有卡片的轮播选项。其主要目标是“预览”你的技能机器人。


    一旦你对模型感到满意，对话设计的最后一步就是生成你的技能机器人，对其进行训练和测试。


    当你点击屏幕右上角的**生成**按钮时，会弹出一个弹出窗口（图 4-11），警告你即将生成技能机器人。当你点击“生成”时，魔法就会启动，技能机器人就会被生成。


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig11_HTML.jpg](img/479330_1_En_4_Fig11_HTML.jpg)


    图 4-11


    生成技能

