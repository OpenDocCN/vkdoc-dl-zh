    # Part III Implementing Your Digital Assistant


    # 4. Where Design and Implementation Meet


    ## Introduction


    In the previous chapters, you learned all about a chatbot’s design and how Extreme
    Hiking Holidays designed their Digital Assistant, Travvy. The actual implementation
    of this Digital Assistant can be done by developers by coding all the flow logic,
    but Oracle Digital Assistant (ODA) offers a feature that can be used by both business
    users and designers to set up the initial version of a Digital Assistant after
    which the developer can take over to finish the implementation. With this feature,
    the **Conversation Designer**, you can quickly build a proof of concept for a
    conversational design concept without any need to code `OBotML`, nor do you need
    to create intents or entities. The Conversation Designer allows you to focus on
    the user experience by setting up a conversation between the bot and a user. After
    the conversational user experience is created as explained in Chapter [2](#479330_1_En_2_Chapter.xhtml),
    the Conversation Designer can be used to create a prototype/mockup of the Skill
    Bot. From that mockup, the actual Skill Bot can be generated by the click of a
    button. Then the chatbot can be trained and tested. Figure [4-1](#479330_1_En_4_Chapter.xhtml#Fig1)
    shows where the Conversation Designer fits in the design and development process.


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig1_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1** Where the Conversation Designer fits


    In order to use the Conversation Designer, you must have some basic understanding
    of the concepts used by the Conversation Designer. First there is the concept
    of tasks. Tasks represent your main use case (Find Trip, Pay Trip, Get Confirmation).
    The first message in a task should be a message from the user that clearly expresses
    the selected task/intent. This is needed because when the bot is generated from
    within the Conversation Designer, the user message will be used to create variants
    of it as utterances. The intents will be derived from the tasks.


    As an example, the first message could be “I want to find a trip.” This message
    is imperative and ends with a noun. This helps the Conversation Designer to classify
    this message as an Intent Utterance.


    Next there are subtasks. These subtasks typically perform supporting functions
    and can also be referred to as secondary tasks. A user will not explicitly ask
    the bot to perform such a subtask.


    ### Note


    In version 19.1.5 of Oracle Digital Assistant, the Conversation Designer was introduced
    as beta release (Figure [4-2](#479330_1_En_4_Chapter.xhtml#Fig2)).


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig2_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig2_HTML.jpg)


    **Figure 4-2** Beta release'
