    在本章中，您了解了 Oracle 提供的用于公开您的技能和数字助手的各种类型的频道。您重点关注了用户 Web 频道，因为这是本书正在创建的示例应用程序的主要焦点。话虽如此，我们鼓励您探索本章开头部分提到的各种频道类型。有关这些频道类型的说明，请参考
    Oracle 文档。同样，代理集成和 Webhook 频道将在本书的另一章中解释。在本章的后续部分中，您学习了如何通过最少的更改来显著增强聊天小部件的外观。我们希望本章为您提供了足够的信息来开始使用频道，我们下一章再见。


