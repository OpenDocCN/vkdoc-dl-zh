    ## 将自定义组件部署到 ODA 实例中的嵌入式容器


    要将自定义组件部署到 ODA 实例中的嵌入式容器，您首先需要打包您的组件。您的自定义组件实现或技能的对话流程将完全不需要更改。


    打开命令提示符，导航到系统中您创建自定义组件实现的 `ageValidatorCC` 目录。在那里，执行以下命令：


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig22_HTML.jpg](img/479330_1_En_10_Fig22_HTML.jpg)


    **图 10-22** 打包自定义组件


    ```

    npm pack

    ```


    如图 10-22 所示，这会在 `ageValidatorCC` 目录内生成一个名为 `ageValidatorCC-1.0.0.tgz` 的归档文件。


    接下来，通过单击左侧菜单中的 ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figh_HTML.jpg](img/479330_1_En_10_Figh_HTML.jpg)
    按钮导航到“组件”屏幕。


    在“组件”屏幕上，您首先需要删除引用本地机器上运行的组件的现有部署。为此，请单击屏幕右上角的 ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figi_HTML.jpg](img/479330_1_En_10_Figi_HTML.jpg)
    按钮。单击该按钮后，您将看到一个要求您确认删除组件的新窗口。同意该操作。


    现在，您应该会看到一个空的“组件”屏幕，屏幕中央有一个 ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figj_HTML.jpg](img/479330_1_En_10_Figj_HTML.jpg)
    按钮。您将再次开始创建新组件服务的相同过程。单击“服务”按钮，这次填写嵌入式容器的详细信息，如图 10-23 所示。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig23_HTML.jpg](img/479330_1_En_10_Fig23_HTML.jpg)


    **图 10-23** 使用嵌入式容器的自定义组件服务


    填写详细信息后，将 `ageValidatorCC-1.0.0.tgz` 归档文件拖放到“包文件”部分。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig24_HTML.jpg](img/479330_1_En_10_Fig24_HTML.jpg)


    **图 10-24** 上传自定义组件


    单击如图 10-24 所示的“创建”按钮来创建服务。等待一段时间，直到部署完成。完成后，您应该会看到如图 10-25 所示的屏幕。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig25_HTML.jpg](img/479330_1_En_10_Fig25_HTML.jpg)


    **图 10-25** 部署在嵌入式容器上的自定义组件


    请注意，与组件相关的所有详细信息与之前保持一致，只是这次您可以看到“服务类型”为“嵌入式容器”，其中显示了您刚刚上传的包。除此之外，通过单击“诊断”按钮，您会得到两个选项，即“查看日志”和“查看崩溃报告”。您可以使用这些选项分别检查自定义组件的日志和崩溃报告。


    现在，您应该重新执行前面讨论的旅行预订测试场景，并尝试不同的年龄以查看结果。


    ## 总结


    每当您想要实现内置组件无法支持的功能时，自定义组件就成为技能开发中不可或缺的一部分。在本章开始时，您了解了自定义组件，到本章结束时，您已经准备好了一个部署在嵌入式容器中并运行的自定义组件。到现在，您一定已经意识到拥有一个本地开发环境对于能够在您的机器上创建、运行和调试自定义组件是多么重要。您现在也了解了在
    ODA 实例中为您的技能创建自定义组件服务的不同方法。希望您觉得这个主题很有趣，我们下一章再见。


    # 11. 为您的数字助手添加语音和情感

    '
- fmt: '# Introduction


    In the previous chapters of this book, you learned how to build some very smart
    Digital Assistants based on Oracle technology. They work just fine over many different
    channels and cover most of the use cases that you can think of. In this chapter,
    you will learn how to add some extra dimensions to your Digital Assistant. First,
    you will learn how to enrich a Digital Assistant with sentiment analysis, and
    next you will learn how to add speech to your Digital Assistant. While reading
    this chapter, it will become clear to you that both additions are based on a sophisticated
    usage of the knowledge that you already acquired in the previous chapters of this
    book.


    # Sentiment Analysis


    If you want to create a chatbot that behaves more like a human than like a robot,
    the chatbot should be able to understand what a user is saying and, even better,
    have an understanding of context, tone, and even subtle nuances like sarcasm.
    The most obvious way of achieving such behavior is the introduction sentiment
    analysis.


    According to the dictionary, sentiment analysis is "*the process of computationally
    identifying and categorizing opinions expressed in a piece of text, especially
    in order to determine whether the writer''s attitude towards a particular topic,
    product, etc. is positive, negative, or neutral.*"


    When you add sentiment analysis to your bot, it will be able to better understand
    the user. If the bot can sense whether the user is pleased, upset, or angry, it
    will be able to resolve intents better and most probably make the skill react
    less like a bot and behave more like a human. This adds to user satisfaction which
    in turn can have positive effects on your business. This is all based on human
    psychology. People who feel happy or neutral tend to take bad news or frustration
    in a more accepting way, whereas sad, disappointed, or mad people will have very
    limited patience.


    To make this work, you must be very careful. In the past, experiments such as
    with Microsofts'' Tay chatbot have failed. Tay became homophobic, racist, and
    Nazi, just by interacting with users. Tay learned based on the users'' responses,
    and the users in turn were teaching Tay to become a "bad bot." You can easily
    understand that this should not happen to your companies'' bots. Things like syntax,
    sarcasm and cynicism, choice of word, cultural differences, and any other factor,
    which to a human can be very normal, have to be taken into consideration and can
    influence your bot''s response. There are no simple solutions to this. So whenever
    you decide to add sentiment analyses to your bot, you must make sure not to damage
    the perception and reputation of your brand.


    In order to add this kind of functionality to an Oracle Digital Assistant, you
    could use a third-party service as there is no built-in solution in Oracle Digital
    Assistant.


    # What to Consider Before Implementation?


    Sentiment analysis can be implemented in various ways in the context of a chatbot,
    but the implementation should be always influenced by your requirement. Invoking
    any third-party API, for a commercial purpose, will involve a cost. Hence, it
    becomes crucial to understand the scope and the available budget before you start
    the implementation.


    Having these facts clear, let''s consider a few real-life scenarios. Miscreant
    users often try to break a bot flow by asking irrelevant questions. for example,
    "are you male or female?", "how is the weather?", "are you a bot?", "do you love
    me?", and so on. You should try to break any such conversation at the beginning
    itself and try to bring back the user to your bot''s context. The most common
    approach to handle any such conversations can be to add them to a skill''s `unresolvedIntent`.
    Or else, you can also create a specific intent in your skill to handle such conversations.
    This could be a dedicated "small talk" skill, which allows the Digital Assistant
    to cope with such questions and keep the conversation going. Keep an eye on such
    conversations using your skill''s Insight and keep adding those user inputs either
    to `unresolvedIntent` or in your specific intent.


    Another probable way, if you have exposed skill via a Digital Assistant and not
    the Skill directly over a channel, can be to add an explicit Skill to handle such
    chit-chat conversations. If you wish to implement this approach, then you don''t
    need to add abovementioned user inputs to any specific intent or `unresolvedIntent`.
    Rather, you create intent(s) in your dedicated skill to handle such conversation
    and let your Digital Assistant to take care of routing. This approach allows you
    to the keep the logic behind your business-specific skills clean.


    If the abovementioned approaches are not what exactly you are looking for and
    rather you want to rely on a more sophisticated approach, then using third-party
    APIs is the way to go forward. As mentioned before, use of third-party APIs will
    always adhere to a cost, but they also come with various benefits. The foremost
    is the fact that while using such API services, you don''t have to implement any
    complex feature to analyze user sentiment within your skill or digital assistant.
    As these APIs are built for highly commercial purposes, you can rely on their
    precision of analyzing the user input.


    Such APIs analyze the user inputs in broadly three categories, that is, positive,
    neutral, and negative. But there are services which further provide you additional
    categories such as extremely positive or very positive and extremely negative
    or very negative. While using such services, based on the analysis made by them
    on user''s input, you can then design appropriate dialog flow of your bot. For
    example, consider a case where you send a feedback form to the end user based
    on API result.


    There are various commercial APIs available today for sentiment analysis. In the
    following, you can find the list of a few popular sentiment analysis APIs:


    * Google Sentiment Analysis

    * IBM Watson Tone Analyzer API

    * Qemotion

    * AYLIEN API

    * PreCeive API

    * MoodPatrol API

    * Indico API

    * ParallelDots

    * DeepAI


    In order to use any of the sentiment analysis API of your choice, you will first
    have to register with the API provider on their web site. This will allow you
    to get the access token. Using the token, you will then be able to invoke the
    API from your chatbot. This process should be quite simple, and as you can choose
    any of the available API providers, this depends entirely on you. Typically these
    third parties provide a key or token during setup that should be used when invoking
    their API. We would suggest keeping the access token handy with you as it will
    be required in upcoming sections.


    # Analyzing Sentiment from Text


    In order to analyze text using any third-party API service, you simply pass the
    user''s input from your skill to the API. API then analyzes the input value and
    returns you the outcome. Based on the API outcome, you can then design your chatbot
    flow.


    To invoke the sentiment analysis API from your skill, you will be using a custom
    component. Custom components have already been discussed in detail during the
    course of Chapter [10](#479330_1_En_10_Chapter.xhtml).


    The process will be straight forward. From your skill, you will have to pass the
    user input to the custom component at the time of custom component invocation.
    Inside your custom component, you will then extract the user input from `conversation`
    argument of `invoke` function (`conversation` is a reference to `bots-node-sdk`).
    Then you would pass the extracted input to the sentiment analysis API. Invocation
    call to the sentiment analysis API may vary from provider to provider, which you
    need to take care of. Once you receive the API result, pass it back to the skill
    from your custom component. That''s all what you need to do. Each of these steps
    will be further described in detail in next section.'
