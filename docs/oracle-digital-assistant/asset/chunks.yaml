    *“The only way to do great work is to love what you do.”*


    *—Steve Jobs*


    *Every accomplishment starts with the decision to try.*


    ## Introduction


    Chatbots, or nowadays mostly called Digital Assistants, found their way into the
    enterprise. They assist users to execute administrative tasks in an interactive
    way, making these tasks simpler and less time-consuming. Throughout the book,
    you will learn to understand the core concepts of Digital Assistants.


    This book provides you with an on-ramp to the development of enterprise-grade
    chatbots and digital assistants. It is based on real-life experience and explains
    everything you need to know to start building your own digital assistant (DA)
    using Oracle technologies. By reading this book, you will become familiar with
    the concepts involved in DA development from both a user experience and a technical
    point of view. You will learn to create Digital Assistants using Oracle technologies,
    including the Oracle Digital Assistant Cloud.


    In the first part of the book, you will learn the basic principles of digital
    assistant – AKA chatbot – technology. After this you will be guided through the
    steps involved in designing a Digital Assistant, including how to make sure that
    the user receives a satisfying experience when using the assistant. In the second
    part of the book, you will learn how to implement the digital assistant that was
    designed in the first part. You’ll begin with a basic implementation, later enhancing
    that implementation with multilanguage support, Q and A (QnA), and Webviews. The
    final part of the book adds a deep dive into custom component development, sentiment
    analyses, and speech.


    This book is intended for designers and developers who want to implement digital
    assistants using Oracle technologies and cloud platform. This book is ideal for
    readers new to creating digital assistants and covers aspects of design, including
    user experience design, before moving into the technical implementation. Readers
    experienced in creating digital assistants on other platforms will find the book
    useful for making the transition to Oracle technologies and the Oracle Digital
    Assistant Cloud.


    - **Chapter 1.** This chapter introduces Oracle Digital Assistant as a platform
    for developing apps for natural conversational interfaces. The platform makes
    it easy to build sophisticated digital assistants or simple chatbots that can
    connect and extend multiple backend systems, like Oracle ERP, HCM, and CX.


    - **Chapter 2.** In this chapter, you will find answers to key questions that
    you face when designing Digital Assistants. What is the business pain we are trying
    to solve? What is the existing journey users take and how can it be improved?
    What is the appropriate channel to reach the users and how can it best be used?
    What is the conversation between the bot and user and the dialog option and how
    can the dialog be enhanced to use the channel’s properties, media, and facilities
    to improve the user interactivity? What are the key vocabulary and entities exchanged
    in the dialog and needed to access the backend systems? Many, many questions that
    need to be answered before the actual implementation can be achieved.


    - **Chapter 3.** To make sense of the technical implementation of the Digital
    Assistant, in this chapter, you will be introduced to Travvy, the Digital Assistant
    for Extreme Hiking Holidays. Using a step-by-step approach, you will get acquainted
    with Travvy so you know all the ins and outs in order to understand all the steps
    of the technical implementation.


    - **Chapter 4.** In this chapter, you will learn how Oracle Digital Assistant
    allows developers to sit with designers to enter the initial flow into the Digital
    Assistant Cloud. This will speed up the transition between design and technical
    implementation, as the designer actually can see how the DA behaves and how the
    flow is executed.


    - **Chapter 5.** This chapter explains the areas involved in the technical implementation,
    such as flow, intents, and entities. Together these form the heart and body of
    your digital assistant. You will learn to implement and understand this and how
    to use the training facilities in order to make your DA understand what the user
    means.


    - **Chapter 6.** In this chapter, you will introduce your Digital Assistant to
    the user. You will learn how to configure channels. The DA can run on any messaging
    service that supports webhooks, calls that allow real-time messaging without polling.


    - **Chapter 7.** This is where you learn how to implement multilanguage support:
    You can use multiple-language approach or single-language approach. The latter
    is what is used by Oracle Digital Assistant, extended with the use of translation
    services.


    - **Chapter 8.** Natural language conversations are, by their very nature, free-flowing.
    But they may not always be the best way for your bot to collect information from
    its users. For example, some situations, like entering credit card or passport
    details, require users to enter specific information (and enter it precisely).
    To help your bot’s users to enter this type of information easily, your bot can
    call an external application, which provides forms with labels, options, choices,
    check boxes, data fields, and other UI elements. You will learn how to achieve
    this by using Webview components.


    - **Chapter 9.** Frequently asked questions (FAQs), by their very nature, are
    common questions that are simply looking for an answer: "What are your opening
    times?", "Can I use my credit card?", "How many times a week do you deliver?"
    These FAQs (or QnAs) often already exist in a company. In this chapter, you will
    learn how to bring them into your bot.


    - **Chapter 10.** You will learn how to build Custom Components. Whenever the
    Digital Assistant needs a specific action that’s outside of the functions provided
    by the built-in components, such as returning backend data or implementing business
    logic, we need to use a custom component. These components are specific to the
    use case, so they need to be specifically built.


    - **Chapter 11.** The reasoning behind using sentiment analysis is human psychology.
    When they feel happy or neutral, people tend to take bad news or frustration in
    a more accepting way. By understanding context right from the beginning, a chatbot
    can select the best course of action and apply very different patterns. You will
    learn how to add sentiment analyses to your Digital assistant, and in addition
    to that, you will learn how to implement speech as a channel.


    We have created a weblog dedicated to this book and the Digital Assistant in general:


    [`https://oda-book.blogspot.com/`](https://oda-book.blogspot.com/)


    This weblog will be used to post additional content and other articles that can
    be used to build great Digital Assistants.


    No prior knowledge of chatbot technology is assumed. Everything you need to know
    to become a master is contained in this book. We hope you enjoy this book!


    ## Acknowledgments


    **This is from Luc:**


    Never say never again; this is my lesson learned. When I finished my first book
    some 4 years ago, I was convinced that I would never ever write a book again.
    Somehow that changed when Oracle released their Digital Assistant. I immediately
    was and still am convinced of the power of this product and the added value that
    it provides for our customers.


    My urge to share knowledge and the passion for new technologies took over and
    made me change my mind and tricked me into writing again.


    Thanks to Lonneke Dikmans who expressed her support to this project and suggested
    that I should set up a team of coauthors to make this happen. I could never have
    done this without the help of Mascha and Ardhendu who added a tremendous amount
    of effort, enthusiasm, and humor to this project. Thanks to you both for that!
    Without you, this book would have never been written.


    Special credits go to the team at Oracle who helped with the technical review,
    but also provided early access at some point and guidance in technical challenges.
    Thanks, Frank, Grant, Martin, Rohit, and all others who helped at some point,
    even if you don’t know that you did.


    Finally, hugs and kisses for my wife, Judith, and kids, Olivier and Lisanne, who
    again had to live with me during the process of writing. Must have been difficult,
    but you never stopped supporting me. Thanks!


    **This is from Ardhendu:**


    Am I dreaming or is it really happening?! Tough for me to realize myself as an
    author today. “Thanks” would be too small to say to you, **Luc**. It would have
    been impossible for me without your guidance and mentoring. And **Mascha**, for
    always cheering me up and guiding me. I want to extend my thanks to **Lonneke
    Dikmans** and **Ronald van Luttikhuizen** for their constant encouragement, support,
    and guidance during the course of writing this book.


    Most importantly, I want to thank my parents, without whom I could not have been
    where I am today. Finally, I want to thank my lovely wife and my little princess;
    you both have always been my source of inspiration.


    Special thanks to our publishers for providing us this platform.


    **This is from Mascha:**


    Never thought I would really do this, being a coauthor and publishing a book together
    with my two great eProseed colleagues Luc and Ardhendu. I would not have been
    able to achieve this without them. They have offered me, as a first-time author,
    the best guidance, feedback, and suggestions along the way.


    Thank you, Luc, for asking me to cooperate in making this happen; without you,
    I would never have enjoyed this opportunity of being able to write about the other
    side of coding a digital assistant, namely, the user side. Being a user experience
    designer, I always put the user first and foremost. We **sell** and **develop**
    Digital Assistants for our **customers**, but we **create** them for their **users**.


    I also want to thank Lonneke Dikmans and Ronald van Luttikhuizen for encouraging
    and supporting me and many times expressing their enthusiasm about the book.


    I thank Hans Kemp for enabling me to teach young UX professionals about the conversational
    user experience design method which made it possible for me to refine my chapters.


    I am immeasurably grateful to my dear husband for telling anyone who wants to
    hear it that his wife, together with two of her colleagues, wrote a book – her
    debut – that is published for real and therefore is for sale ☺.


    Finally, I want to thank my beloved parents, for being enthusiastic and proud
    of me, for believing in me, and for always reassuring me by saying “Als iemand
    kan schrijven, ben jij het.”'
