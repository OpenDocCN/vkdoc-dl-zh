    Click the “+ Intent” button to add an intent. As you click the button, you will
    notice an intent gets created with a default name of “Intent1.” See Figure [5-12](#479330_1_En_5_Chapter.xhtml#Fig12).
    You will then give a suitable name to your intent which in this case will be SelectTrip.


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig12_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Create Intent


    Update the intent’s **Conversation Name** as “Select Your Trip” and **Name** as
    “SelectTrip.” Conversation Name is displayed during conversation by your skill
    (as an option), when it is unable to resolve an intent, whereas, in your dialog
    flow, you identify any intent by its Name. If you want, you can also add a **Description**
    for your intent although it is not mandatory.


    ### Add Utterances to Intent


    To add utterances to your intent, you need to add them under the **Example** section,
    in the text area with place holder “*Enter your example utterances here*” (see
    Figure [5-13](#479330_1_En_5_Chapter.xhtml#Fig13)).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig13_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Add Utterances


    Once you start adding utterances, this list will grow. If you want to look for
    a specific utterance, you can search for it by entering the utterance in the “*Filter*”
    field which will then issue a search in the preadded utterances.


    ### Export Intents


    You can export intents from one skill and then use those intents for another skill.
    This will save your effort of creating the same intents, if needed, for various
    skills. The following steps will depict how you can export intents:


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig14_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Export Intent


    1.  Navigate to the **Intent** section ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figt_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figt_HTML.jpg)
    in your Skill.


    2.  Click the More button and select **Export intents** (see Figure [5-14](#479330_1_En_5_Chapter.xhtml#Fig14)).


    This will export your intents into a CSV file. In this case, it will be FindTrip-Intents.csv.
    The exported CSV file contains three columns, namely, **query**, **topIntent,**
    and **conversationName**. The “query” column contains utterances, whereas the
    “**topIntent**” and “conversationName” columns contain the name of the related
    intent and conversation name of that intent (see Figure [5-15](#479330_1_En_5_Chapter.xhtml#Fig15)).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig15_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    FindTrip-Intents.csv


    ### Note


    When you export intents, all intents present in the skill will be exported into
    a CSV file.


    ### Import Intents


    To import intents into your skill, you need to import the CSV file containing
    exported intents as shown in previous step. The following steps will depict how
    you can import intents:


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig16_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Import intents


    1.  Navigate to **Intent** section ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figu_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figu_HTML.jpg)
    in your Skill.


    2.  Click the More button and select **Import intents**. See Figure [5-16](#479330_1_En_5_Chapter.xhtml#Fig16).


    As mentioned earlier, “Export intents” will export all the intents which a skill
    contains. Hence, “Import intents” will add all the exported intents to your skill.
    If you want to add any specific intent along with associated utterances, then
    you need to manually edit the exported CSV file before importing it into your
    skill.'
