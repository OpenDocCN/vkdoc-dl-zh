- fmt: '# Designing a Conversational User Experience


    In order to design a unique conversational user experience, this chapter will
    disclose a method which guides you in eight steps to a result that satisfies all
    stakeholders – stakeholders like marketing managers, the development team, and
    last but not least the end user/customer, who all have their own specific requirements,
    wishes, and needs regarding the experience which in the end will be embodied in
    a chatbot. Figure [2-2](#479330_1_En_2_Chapter.xhtml#Fig2) shows how all stakeholders
    are related.


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig2_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    The challenge is to find a good balance


    We’ve divided our process into eight steps. Figure [2-3](#479330_1_En_2_Chapter.xhtml#Fig3)
    shows these steps. Then the sections that follow describe each one in sequence.


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig3_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    The eight design steps


    ## The Goals


    The first step in designing a great chatbot is asking yourself: “Do we even need
    a chatbot?”


    > *The “why” of designing should always come before the “how.”*—Will Fanguy, Inside
    Design


    It is of great importance that the conversational user experience, and in the
    end your chatbot, serves a purpose. This is the foundation of everything. This
    should be something you’ll do long before you even start to consider designing
    a conversational UX.


    The moment you know what the purpose of your chatbot is, you have answered fundamental
    questions that need to be answered in order to move to the design process.


    To find out which goals your client has in mind for your conversational experience,
    you can interview different stakeholders who know of the current business goals
    and have a vision for the future. Different stakeholders probably have different
    goals.


    For example, a CEO might want to use the chatbot to


    * Beat the competition

    * Increase customer reach and customer awareness

    * Reduce the number of service desk employees and therefore as a company be more
    cost-efficient


    On the other hand, marketing managers want the chatbot to


    * Seamlessly connect with the customer on Facebook Messenger

    * Chat with the customer directly from the online store

    * Recommend products based on purchase history and customer data that’s been collected
    conversationally

    * Touch base with the customer after they leave the store

    * Ask the customer if they are ready to reorder an additional product


    Finally, service desk managers might want to


    * Let the customer know that their order has been received or shipped

    * Thank the customer after their first purchase

    * Confirm with the customer that their package arrived and ask for their opinion

    * Do troubleshooting

    * Answer questions


    The main objective in design is to keep the goals simple, so do not get into all
    the constraints and requirements. Include enough so all stakeholders know what
    this project is trying to do, relative to everything else they themselves are
    trying to accomplish at the same time.


    Prioritize the goals and keep them in mind while designing the conversational
    experience.


    With every design decision, ask yourself: “Does this design get us where we’re
    trying to go?”


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig4_HTML.png](images/479330_1_En_2_Chapter/479330_1_En_2_Fig4_HTML.png)


    Figure 2-4.


    ## The Users


    As you saw earlier in the Venn diagram of Figure [2-2](#479330_1_En_2_Chapter.xhtml#Fig2),
    the needs and wishes of the users play an important role when designing the conversational
    experience. That is the reason why you should know all about the users with whom
    you want your chatbot to communicate.


    The first step for a user-centered design process is to do user research. Through
    this, for example, by observing and interviewing potential users, you can learn
    about


    * Their goals and priorities

    * Their behavior

    * The daily habits

    * Their education and skills

    * Their knowledge regarding the domain of the enterprise

    * Their use of tooling like a computer, a smartphone, Internet, social media,
    and other channels


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig5_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    User research by interviewing and observing the target group


    Once you get all this interesting, useful rich data, the challenge is to communicate
    it across to the rest of the design/development team. An effective method we always
    use is creating one or more personas.


    ### Creating Personas


    > *A persona is a realistic character sketch representing a certain segment of
    the target group.*—Steve Mulder/Ziv Yaar, The user is always right


    Personas actually are made-up people. The purpose of personas is to communicate
    all we know about the user and ensure that it is remembered and used throughout
    the project lifetime. For this to happen, the personas must be adopted by the
    design/development team.


    A persona has a name and is represented by a picture and a summary of some relevant
    characteristics. A quote, summarizing their needs, emotions, motivations, and
    goals into a single sentence, has the added advantage of giving the persona further
    personality. Figure [2-6](#479330_1_En_2_Chapter.xhtml#Fig6) shows an example
    of how a persona may be described and illustrated.


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig6_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Example of a persona representing a call center employee


    There should be at least one persona to represent each major segment of your users.
    The word major is used because ideally you should be using three to five personas.
    Each of the personas should have their own personality and be memorable. If you
    have more than five personas, people often start to feel overwhelmed. And it seems
    that


    > *When you design for your primary persona, you end up delighting your primary
    persona and satisfying your secondary persona(s). If you design for everyone,
    you delight no one. That is the recipe for a mediocre product.*—Alan Cooper'
