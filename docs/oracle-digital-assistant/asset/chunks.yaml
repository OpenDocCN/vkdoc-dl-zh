    to the ''oj'' and ''ko''

    * objects in the callback

    */

    require([''ojs/ojcore'', ''knockout'', ''appController'', ''jquery'', ''ojs/ojknockout'',
    ''ojs/ojformlayout'', ''ojs/ojinputtext'', ''ojs/ojlabel'', ''ojs/ojbutton'',
    ''ojs/ojradioset'', ''ojs/ojvalidationgroup''],

