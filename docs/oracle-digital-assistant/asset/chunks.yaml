  trans: '

    # 在本地运行自定义组件


    现在您已准备好自定义组件的基本实现，下一步是在本地运行它。请参考图 10-3 查看项目的目录结构。


    导航至包含自定义组件 `ageValidatorCC` 的父目录 `ODACustomComponents`，以启动节点服务器。请参考图 10-4。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig5_HTML.jpg](img/479330_1_En_10_Fig5_HTML.jpg)


    图 10-5 – 自定义组件父目录


    使用命令提示符/终端，执行如图 10-6 所示的以下命令来启动节点服务器：


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig6_HTML.jpg](img/479330_1_En_10_Fig6_HTML.jpg)


    图 10-6 – 启动节点服务器


    ```

    bots-node-sdk service ageValidatorCC

    ```


    现在您的组件已在本地机器上运行，您可以通过在浏览器中导航至 URL `http://localhost:3000/components` 来检查它。其显示效果将如图
    10-7 所示。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig7_HTML.jpg](img/479330_1_En_10_Fig7_HTML.jpg)


    图 10-7 – 在本地机器上运行的自定义组件


    在上述内容中，您可以看到基于初始实现的组件中的各种元数据信息。当您在本章后续部分更改 `AgeValidator` 的实现时，您会注意到这些元数据信息也会根据您的新实现而发生变化。


    # 通过互联网公开自定义组件


    到目前为止，您已在本地机器上成功创建了第一个自定义组件，并使用 Oracle `bots-node-sdk` 在本地节点容器中启动了它。您还使用 Web 浏览器测试了正在运行的组件。现在，您距离从
    ODA 实例访问自定义组件仅一步之遥。为此，您需要通过互联网公开您的 IP，以便使用该 IP 访问您的服务。现在，您将使用 `ngrok` 来完成此操作。


    导航到您在本地机器上下载并解压 `ngrok.exe` 的目录。到达后，运行 `ngrok`。`ngrok` 允许您生成一个主机名，通过该主机名您可以通过互联网访问您的机器。您需要告诉
    `ngrok` 您打算公开哪个端口，在本例中为 `3000`。


    运行 `ngrok` 后，只需执行以下命令即可通过互联网公开您的机器：


    ```

    ngrok http 3000

    ```


    请参考图 10-8。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig8_HTML.jpg](img/479330_1_En_10_Fig8_HTML.jpg)


    图 10-8 – 运行 `ngrok.exe`


    完成后，您需要从 `ngrok` 复制 `https` 实例，并将其替换为您的 `http://localhost:3000`。请参考图 10-9 查看具体需要复制的内容。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig9_HTML.jpg](img/479330_1_En_10_Fig9_HTML.jpg)


    图 10-9 – `ngrok` https 主机


    根据上图，您的自定义组件将通过 [`https://3d649457.ngrok.io/components`](https://3d649457.ngrok.io/components)
    进行访问。您可以通过在 Web 浏览器中访问此 URL 来检查。请查看图 10-10。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig10_HTML.jpg](img/479330_1_En_10_Fig10_HTML.jpg)


    图 10-10 – 使用公共 URL 访问自定义组件


    ### 注意


    您使用 `ngrok` 生成的主机在每次关闭 `ngrok` 应用程序或会话过期时都会发生变化。过期的主机将无法再访问。但是，通过免费订阅 `ngrok`
    可以创建永久主机名。


    # 从 ODA 实例访问自定义组件


    现在您已拥有在本地运行且可通过互联网访问的自定义组件，让我们看看如何从您的 ODA 实例访问它。


    登录您的 ODA 实例，并导航到您想要使用该组件的技能。在本例中，我们希望从您在本书第 5 章创建的 `FindTrip` 技能（图 10-11）中访问此自定义组件。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig11_HTML.jpg](img/479330_1_En_10_Fig11_HTML.jpg)


    图 10-11 – `FindTrip` 技能


    从左侧菜单项中，单击 ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figa_HTML.jpg](img/479330_1_En_10_Figa_HTML.jpg)
    组件。您在屏幕的“自定义”选项卡上创建自定义组件。由于您尚未将任何自定义组件服务关联到该技能，屏幕显示如图 10-12 所示。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig12_HTML.jpg](img/479330_1_En_10_Fig12_HTML.jpg)


    图 10-12 – ODA 组件屏幕


    单击 ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figb_HTML.jpg](img/479330_1_En_10_Figb_HTML.jpg)
    按钮以创建新的自定义组件服务。这将打开一个新窗口，如图 10-13 所示。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig13_HTML.jpg](img/479330_1_En_10_Fig13_HTML.jpg)


    图 10-13 – 创建服务


    从图 10-13 中，您可以看到可以通过三种不同的方式创建自定义组件服务：


    *   **嵌入式容器**：当您想要将自定义组件部署在 ODA 实例内嵌的节点容器中时，将使用此方法。此方法将在本章后续部分进行说明。一旦您的自定义组件准备就绪，您将使用此方法。


    *   **Oracle Mobile Cloud**：如果您想将自定义组件作为 API 服务公开，可以使用此方法。对于此方法，您需要设置一个 Oracle
    Mobile Hub。


    *   **外部**：如果您想使用部署并运行在外部节点容器上的自定义组件，将使用此方法。此方法适用于我们的情况，因为我们已经在本地环境中启动并运行了该组件。作为替代方案，您也可以使用任何支持
    Node 的服务器。您可以在其中创建节点平台并托管您的自定义组件。


    从“创建服务”窗口中选择**外部**，并填写详细信息，如图 10-14 所示。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig14_HTML.jpg](img/479330_1_En_10_Fig14_HTML.jpg)


    图 10-14 – 自定义组件外部服务


    `用户名`和`密码`在调试时不是必需的。但由于这些是配置中的必填字段，您需要提供它们。


    完成后，单击 ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figc_HTML.jpg](img/479330_1_En_10_Figc_HTML.jpg)
    按钮完成该过程。根据您在 `package.json` 中定义为依赖项的自定义组件中使用的节点模块，这可能需要一些时间。完成后，您将看到一个显示自定义组件详细信息的新屏幕。请参考图
    10-15。


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig15_HTML.jpg](img/479330_1_En_10_Fig15_HTML.jpg)


    图 10-15 – 已创建的自定义组件服务


    现在您可以看到，您的自定义组件服务可从 ODA 实例访问，并已准备好用于 `FindTrip` 技能的对话流程中。

