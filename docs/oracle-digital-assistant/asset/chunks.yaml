- fmt: '# 6. Exposing Your Digital Assistant over Channels


    At the time when you decide to introduce a Digital Assistant in your business,
    presumably you are aware of your target audience. Being aware of your target audience
    will assist you in identifying the best possible way to make your Digital Assistant
    available to them. When you start designing your Digital Assistant or Skill, it
    is only accessible by you and people who have access to that specific cloud instance.
    To make your Digital Assistant or Skill available for your business users, you
    need a channel to expose it to them. Channel, as the name suggests, acts as a
    medium using which you expose your Skill or Digital Assistant for your end users.


    Selecting the right channel to expose your Digital Assistant plays a vital role
    in its success factor. For instance, if your Digital Assistant or Skill is not
    easily accessible to end users, they might tend to avoid it and go for a comparatively
    easier route to accomplish their task. At the same time, if your chatbot is designed
    to provide user sensitive information, you might want to restrict it to a more
    secured and closed channel.


    Consider a scenario where you would allow your users to perform their day-to-day
    banking tasks using your Digital Assistant. Tasks such as checking their account
    balance or make money transfer. In this case, you might want to expose your Digital
    Assistant over bank’s web portal and/or over their mobile applications. This could
    be because of two reasons. Firstly, a web portal of any bank is considerably more
    secure. And secondly, because such information and tasks are specific to users
    of that bank, you don’t want to have unnecessary users.


    On the other hand, consider a case where you are designing a Digital Assistant
    for food delivery. To make your Digital Assistant easily accessible as well as
    popular, you might want to expose it over various other messaging channels in
    addition to a web channel – channels such Facebook Messenger, Skype, Microsoft
    Teams, and so on.


    In crux, you will always decide which channel you want to choose based on the
    purpose of your Digital Assistant and your target audience.


    Now that you are aware of significance of channel, let’s have a look at various
    out-of-the-box channels which come with Oracle Digital Assistant platform.


    ## Channel Types in Oracle Digital Assistant


    Channels in Oracle Digital Assistant are broadly classified into four types. They
    are


    1.  Users

    2.  Agent Integrations

    3.  Applications

    4.  System


    ### Users Channel


    The Users channel allows you to expose your Skill or Digital Assistant over a
    user-facing platform. The following is the list of Users channels:


    *   Facebook Messenger

    *   Webhook

    *   Web

    *   iOS

    *   Android

    *   Twilio SMS (text only)

    *   WeChat

    *   Slack

    *   Microsoft Teams

    *   Cortana

    *   Skype For Business


    ### Agent Integrations


    As it is self-explanatory by its name, you create an Agent Integration channel
    when you wish to involve a human agent during the course of a conversation. Agent
    Integration uses Oracle Service Cloud (18C or later) to pass the information provided
    by a user during the course of a conversation, to a live agent. In that way, when
    a live agent takes the control of conversation from the bot and starts interacting
    with the user, they don’t need to ask user to provide required information once
    again. Agent Integration will be discussed in detail in a separate chapter of
    this book.


    ### Applications


    Applications channel is used when you want to have an event-driven conversation.
    In simple words, you initiate the conversation with your Skill or Digital Assistant
    at specific (bot flow) state based on an event generated from a different application.


    ### System


    This is a system-specific default channel for your Oracle Digital Assistant instance.
    This channel is used when testing your Skill or Digital Assistant using Skill
    Tester. You can’t create any additional System channel by yourself. It is important
    to mention here that any changes being made on this channel are applicable across
    all Skills as well as Digital Assistants in the instance.


    ## Working with Channels


    In this section, you will learn to create channel for your Oracle Digital Assistant
    (ODA). Log in to your ODA instance and click the icon at top-left corner to open
    the side menu. Select Channels located under the Development section. Refer to
    Figure 6-1. This will take you to the Channels screen.


    Once you are on the Channels screen, you will notice it contains four different
    tabs specific to each channel type discussed in the previous section. By default,
    the Users tab is displayed when you navigate to Channels as shown in Figure 6-2.
    It also displays you a list of preconfigured Users channels, if you have created
    any.


    This section allows you to create new Users channels as well as maintain, that
    is, update, or delete previously created Users channels. This will be discussed
    in detail in upcoming sections of this chapter.


    Next, click the Agent Integrations tab. This tab allows you to create and manage
    Agent Integrations channels. Similar to the Users tab, this will show you preconfigured
    channels in case you happen to have any. As you can see in Figure 6-3, we have
    not yet created any Agent Integrations. Hence, there is no channel being displayed
    here.


    Click the next tab, Applications. This tab allows you to create and manage your
    Application channel for ODA instance. Similar to previous tabs, you can find all
    your previously created Applications channel, if you have any. Check Figure 6-4.


    Click the last tab of this screen, which is System. As you can see in Figure 6-5,
    this tab comes with the prebuilt default `System_Global_Test` channel.


    If you toggle Channel Enabled switch on this screen, that would enable or disable
    all the Skill Testers in your ODA instance based on what you select. Same goes
    with Reset Session button as well. On click of this button, all Skill Tester sessions
    will be reset.'
  raw: '# 6. Exposing Your Digital Assistant over Channels


    At the time when you decide to introduce a Digital Assistant in your business,
    presumably you are aware of your target audience. Being aware of your target audience
    will assist you in identifying the best possible way to make your Digital Assistant
    available to them. When you start designing your Digital Assistant or Skill, it
    is only accessible by you and people who have access to that specific cloud instance.
    To make your Digital Assistant or Skill available for your business users, you
    need a channel to expose it to them. Channel, as the name suggests, acts as a
    medium using which you expose your Skill or Digital Assistant for your end users.


    Selecting the right channel to expose your Digital Assistant plays a vital role
    in its success factor. For instance, if your Digital Assistant or Skill is not
    easily accessible to end users, they might tend to avoid it and go for a comparatively
    easier route to accomplish their task. At the same time, if your chatbot is designed
    to provide user sensitive information, you might want to restrict it to a more
    secured and closed channel.


    Consider a scenario where you would allow your users to perform their day-to-day
    banking tasks using your Digital Assistant. Tasks such as checking their account
    balance or make money transfer. In this case, you might want to expose your Digital
    Assistant over bank’s web portal and/or over their mobile applications. This could
    be because of two reasons. Firstly, a web portal of any bank is considerably more
    secure. And secondly, because such information and tasks are specific to users
    of that bank, you don’t want to have unnecessary users.


    On the other hand, consider a case where you are designing a Digital Assistant
    for food delivery. To make your Digital Assistant easily accessible as well as
    popular, you might want to expose it over various other messaging channels in
    addition to a web channel – channels such Facebook Messenger, Skype, Microsoft
    Teams, and so on.


    In crux, you will always decide which channel you want to choose based on the
    purpose of your Digital Assistant and your target audience.


    Now that you are aware of significance of channel, let’s have a look at various
    out-of-the-box channels which come with Oracle Digital Assistant platform.


    ## Channel Types in Oracle Digital Assistant


    Channels in Oracle Digital Assistant are broadly classified into four types. They
    are


    1.  Users


    2.  Agent Integrations


