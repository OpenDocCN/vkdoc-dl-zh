    \ by `{←`→`}`. You can expand the section by clicking the small arrow next to\
    \ line number 1.\n\nBesides the mockup definition, the YAML file also contains\
    \ the actual flow definition of the Skill Bot. All the states are generated including\
    \ an “Unresolved Intent” state. There are System.Output components for each simple\
    \ bot reply and System.CommonResponse components for the complex replies, like\
    \ the Actions and Cards. An example for “Go to USA” subtask and its individual\
    \ cards is displayed in the following. First, a variable name “levelCards” is\
    \ set to contain all info regarding the cards.\n\n```\n--------------------  #\
    \ Task \"Go to USA\" ---------------  ---------------\nsetLevelCards:\ncomponent:\
    \ System.SetVariable\nproperties:\nvariable: levelCards\nvalue:\nnp:\ntitle: Yosemite\
    \ NP\nimageUrl: \"\"\ndescription: \"Steep mountains, great views\"\naction1Label:\
    \ Yosemite - Hiking level T4\naction1Branch: Select Yosemite T4\naction2Label:\
    \ Yosemite - Hiking level T5\naction3Label: Yosemite - Hiking level T6\nyellowstone\
    \ np:\ntitle: Yellowstone NP\nimageUrl: \"\"\ndescription: Amazing geysers in\
    \ full color\naction1Label: Yellowstone - Hiking level T4\naction1Branch: Select\
    \ Yellow T4\naction2Label: Yellowstone - Hiking level T5\naction2Branch: Select\
    \ Yellow T5\naction3Label: Yellowstone - Hiking level T6\nzion np:\ntitle: Zion\
    \ NP\nimageUrl: \"\"\ndescription: Matching green grey and orange\naction1Label:\
    \ Zion - Hiking level T4\naction2Label: Zion - Hiking level T5\naction3Label:\
    \ Zion - Hiking level T6\ntransitions: {}\n```\n\nThis variable will then be used\
    \ to extract the information that needs to be displayed in the individual cards.\
    \ All the nitty-gritty details regarding Entities, Intents, and flow will be explained\
    \ in the next chapters of this book. For now, it is sufficient to know that these\
    \ are automatically generated for you and that you have some understanding how\
    \ they are derived from your mockup.\n\n### Testing the Generated Skill Bot\n\n\
    The final step is the actual testing of the generated Skill Bot. The one remaining\
    \ task, if that was not done previously, is to train the Skill Bot. You can easily\
    \ see if training is required by looking at the icon next to “**Train**” in the\
    \ toolbar. If it is an exclamation mark, it means that training is required (Figure\
    \ [4-15](#479330_1_En_4_Chapter.xhtml#Fig15)). If it is a checked box, that means\
    \ no training is required.\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig15_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15\n\nTraining is required\n\nIf training is required, you need to\
    \ click “**Train**” in the blue toolbar bar at the top and submit the popup that\
    \ is displayed. The training will start and usually succeed without any failures.\
    \ You will notice the exclamation mark will change into a checked box, meaning\
    \ that training was successful. You are now ready to test the Skill Bot. The test\
    \ can be started by clicking the play button in the toolbar on the left (Figure\
    \ [4-16](#479330_1_En_4_Chapter.xhtml#Fig16)).\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig16_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig16_HTML.jpg)\n\
    \nFigure 4-16\n\nStart the tester\n\nThe Skill Tester popup is displayed, and\
    \ you can start a conversation with the FindTrip Skill Bot by entering a message\
    \ like “*Hi, I want to go on an extreme hiking trip to the USA”* (Figure [4-17](#479330_1_En_4_Chapter.xhtml#Fig17)).\
    \ The Skill Bot will reply and offer you the option to select a hiking trip. Note\
    \ that USA is already preselected as destination, because the bot recognized it\
    \ from your utterance.\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig17_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig17_HTML.jpg)\n\
    \nFigure 4-17\n\nRunning the tester with the generated Skill Bot\n\nNext you can\
    \ browse the National Parks in the carousel and select the hiking level you prefer\
    \ by clicking it. The conversation will continue, just as defined in the Conversation\
    \ Designer.\n\nYou can always reenter the Conversation Designer to make changes\
    \ to your prototype and regenerate the Skill Bot.\n\n### Note\n\nAlways keep in\
    \ mind that regenerating means that all changes that were manually done in the\
    \ OBotML to Entities, Intents, and flow will be overwritten.\n\n## Summary\n\n\
    In this chapter, you have learned how the Conversation Designer of Oracle Digital\
    \ Assistant can be used to implement a mockup/the initial skeleton of a Skill\
    \ Bot. The Conversation Designer is very beneficial in the early stages of development\
    \ as it will not allow you to implement more sophisticated functionality such\
