    # 5. 深入实现细节


    现在你已经熟悉了 Oracle 数字助理的背景、功能以及如何设计数字助理，是时候了解一些基本概念了。在本章中，你将首先了解 Oracle 数字助理（ODA）环境。然后，你将基于第
    3 章描述的用例，开始与数字助理 **Travvy** 的旅程。每一节中，你将先了解概念，然后针对该用例实现这些概念。


    ## Oracle 数字助理（ODA）环境简介


    一旦你的 Oracle 云环境中的身份域管理员授予你访问权限，你将收到一封发送至注册邮箱的注册邮件。收到邮件后，你需要完成环境的注册。流程成功完成后，你将进入
    ODA 的主屏幕，如图 5-1 所示。


    此屏幕显示 ODA 中的实例列表。如图 5-1 所示，我们目前创建了一个名为 `dadev` 的实例，作为开发环境。


    ### 提示


    你应该为实例使用命名约定，以便轻松理解所查看的内容。本书使用的约定是 `<2 字母缩写-产品><3 字母缩写-环境>`，因此数字助理开发环境命名为 `dadev`。


    但当你为 ODA 添加任何新实例时，此列表会更新，并且该名称将出现在列表中。


    图 5-1：Oracle 数字助理主页


    然后，要导航到特定实例（本例中为 `dadev`），你需要点击对应环境的图标，并选择 **数字助理设计器 UI**。


    选择数字助理设计器 UI 后，你将重定向到该特定实例的主屏幕，如图 5-2 所示。你会注意到实例中包含一个数字助理和几个并非你创建的技能。这些是 Oracle
    作为实例的一部分提供的示例，帮助你入门。


    此外，你可能注意到主屏幕包含三个选项卡：


    - **全部**：显示 ODA 实例中所有技能和数字助理的累积视图。

    - **数字助理**：包含实例中的所有数字助理。

    - **技能**：包含 ODA 实例中的所有技能。


    图 5-2：实例主页


    首先理解**数字助理**和**技能**之间的区别很重要。你可以将数字助理视为一个或多个技能的逻辑分组，这些技能可以单独执行特定任务，以完成一项活动。当用户开始与数字助理对话时，数字助理首先分析用户的输入，然后根据输入将用户引导至特定技能。


    如果你考虑本书第 4 章描述的用例，Travvy 就是你的数字助理。对于 Travvy，你将创建各种技能（即独立的聊天机器人）来执行任务，例如查找行程、预订行程、更新用户信息等。


    现在你对数字助理和技能有了基本了解，本章接下来的部分将进一步深入细节。


    ## 使用技能


    你可能已经了解，技能是任何数字助理的构建块。根据你的具体场景，你将创建一个或多个技能，让数字助理执行特定任务。本节将描述如何：


    - 创建技能

    - 克隆技能

    - 导入技能

    - 导出技能

    - 创建技能的新版本

    - 删除技能

    - 发布技能

    - 导出对话日志

    - 显示渠道路由


    ### 创建技能


    点击屏幕左上角的图标，导航至**开发**下的**技能**，如图 5-3 所示。


    图 5-3：创建技能


    导航至技能后，点击图标关闭侧边菜单。


    现在你将添加一个 Travvy 的新技能。为此，你首先需要为技能决定一个名称，也称为调用名称。命名技能时有一些指导原则需要遵循。因此，技能名称应：


    - 在 Oracle 数字助理实例中唯一

    - 明确指定技能的用途

    - 简单，即易于阅读和发音

    - 不是长短语，也不是单个单词（除非该单词明确表达唯一名称或用途）

    - 不包含“打开”、“转到”或“告诉我”等词语


    考虑上述指导原则，你将技能命名为 `FindTrip`。顾名思义，你将使用此技能为数字助理的用户查找行程。


    从技能主页点击**新建技能**，如图 5-4 所示。


    图 5-4：添加新技能


    这将打开一个新窗口。你需要填写所需详细信息，如图 5-5 所示。


    图 5-5：创建 FindTrip 技能

