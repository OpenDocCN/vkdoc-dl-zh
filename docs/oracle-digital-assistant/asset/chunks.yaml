    # 9. 将常见问题解答集成到您的数字助理中


    ## 引言


    数字助理的一个非常常见的用例是使用常见问题解答（FAQ），也称为问答（Q&A）。每当用户输入与问答中的搜索词匹配的短语时，匹配的问题和答案就会显示给用户。一个已开发的技能可以作为这些常见问题解答或其他知识库文档的接口。常见问题解答是寻求答案的常见问题。“你们的营业时间是什么？”“我可以带孩子吗？”“你们有素食披萨吗？”这些常见问题解答通常已经存在于公司的网站上，并且可以轻松地引入到您的机器人中。Oracle
    数字助理的问答框架使机器人能够通过返回一个或多个问答对来回答一般兴趣问题。通过这种方式，机器人可用于展示常见问题解答或其他知识库文档。


    我们公司 Extreme Hiking Holidays 运营网站已有很长时间。他们收集了大量常见问题解答，这些解答可从网站上获取。在本章中，您将学习如何获取这些常见问题解答及其答案，并将它们作为问答添加到公司的数字助理
    Travvy 中。


    ## 问答是如何工作的？


    在您学习如何实现问答之前，了解问答在数字助理中的工作原理会很有帮助。设置一个良好的问答技能涉及一些重要的配置。意图解析如何工作，什么是问答路由，以及如何构建您的问答流程？


    ### 在技能级别配置问答路由


    对于问答路由，Oracle 数字助理在问答路由配置页面中提供了一组开箱即用的常用词和开场短语，这些词和短语指示命令或问题。除此之外，还可以添加任何特定领域的内容。此配置可以在技能的设置页面中更改，它使路由器能够区分问答和意图。如图
    9-1 所示，有一个事务配置部分和一个问题配置部分。


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig1_HTML.jpg](img/479330_1_En_9_Fig1_HTML.jpg)


    图 9-1


    技能级别的问答路由设置


    在事务配置部分，您可以配置技能，使意图引擎更容易将话语识别为事务（例如“**我希望你**预订行程”、“**我的**付款何时到期”）。这些示例使用了请求句子前缀。此外，默认情况下，还有一组广泛的请求动词，例如“order”、“cancel”、“check”等。您可以添加特定于用例的请求动词。从图
    9-1 可以看出，内置集已经包含了最常用的动词和前缀，但您始终可以添加自己的动词以满足特定事务，例如“book”或“check in”，这些对于我们的旅游业务来说是典型的。


    在问题配置中，您可以创建一组单词，这些单词表明用户正在提问（“**我如何**预订行程”、“**我怎样才能**取消我的假期”），而不是请求事务。这些也可以使用特定的问题动词进行扩展。


    ### 问答在运行时如何工作


    在运行时，机器人的行为受到上一节中描述的配置的影响。除此之外，还有两个重要的属性参与问答路由：


    - `confidenceTreshold`：技能使用此属性通过已解析意图的置信度来引导对话。此属性在技能级别配置中设置。


    - `Q&AMinimumMatch`：设置任何问答对必须包含的令牌的最小和最大百分比，才能被视为匹配。此属性的值可以在流程编辑器中的 `System.Intent`
    组件中设置。

    '
- fmt: "### Tip\n\nThe `Q&AMinimumMatch` setting defaults to `50%/25%`. While it does\
    \ not make sense to set it to, for example, `90%`, you may want to tune the QnA\
    \ findings by, for example, setting it to only `50%` or only `30%`. The `50%/25%`\
    \ default means that if the `50%` is not matched, the search falls back to `25%`,\
    \ so going for a weaker condition.\n\nThe combination of these two properties\
    \ leads to the final resolution and the outcome of the flow. When the user inputs\
    \ a phrase, there are a couple of possible scenarios. Let’s have a look at some\
    \ examples:\n\n- Over the `confidenceTreshold` and does not meet `Q&AMinimumMatch`:\
    \ In this case, the intent is resolved, and the user is shown the bot’s reply\
    \ to this intent (Figure [9-2](#479330_1_En_9_Chapter.xhtml#Fig2)).\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig2_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2 Situation 1\n\n- Below the `confidenceTreshold` and does meet `Q&AMinimimMatch`:\
    \ In this case, the bot will reply to the user the answer that belongs to the\
    \ asked question (Figure [9-3](#479330_1_En_9_Chapter.xhtml#Fig3)).\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig3_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3 Situation 2\n\n- Below the `confidenceTreshold` and does not meet\
    \ `Q&AMinimimMatch`: The bot will not know how to resolve the intent and will\
    \ show the user the unresolved intent prompt (Figure [9-4](#479330_1_En_9_Chapter.xhtml#Fig4)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig4_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4 Situation 3\n\n- Over the `confidenceTreshold` and meets `Q&AMinimimMatch`:\
    \ In this scenario, there are a couple of possible outcomes:\n  - The first one\
    \ depends on the use of imperative verbs like “buy,” “check,” “order,” “confirm,”\
    \ and “cancel.” These words indicate a transaction, not a question, so whenever\
    \ the utterance uses an imperative, the bot will reply with the intent only. If\
    \ the utterance does not contain an imperative, the bot will show both the Q&A\
    \ and the intent (Figure [9-5](#479330_1_En_9_Chapter.xhtml#Fig5)).\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig5_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5 Situation 5\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig6_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6 Situation 5\n\n  - The second one depends on setting of the `QnASkipIfIntentFound`.\
    \ This property can be set at the `System.Intent` level. When set to `true`, the\
    \ bot bypasses Q&A when there’s an intent match. When set to `false` (the default\
    \ value), the bot queries the Q&A server with user utterance and also presents\
    \ Q&A as an option (Figure [9-6](#479330_1_En_9_Chapter.xhtml#Fig6)).\n\nIn the\
    \ remainder of this chapter, you will learn how to use these properties in a Q&A\
    \ skill for the Travvy Digital Assistant.\n\n## Adding Q&A to Our Digital Assistant\n\
    \nNow that you know how to configure Q&A, it is time to develop a Q&A skill. The\
    \ process of adding Q&A to a Digital Assistant consists of multiple steps. We\
    \ will guide you through these steps, and they will be explained individually:\n\
    \n- Create a new skill to hold the Q&A.\n- Enable the Q&A capability for the skill.\n\
    - Load the Q&A source file, and optionally edit, add, or delete more questions.\n\
    - Train the bot with the Q&A trainer.\n- Test the new Q&A capability by entering\
    \ questions into the Q&A Tester.\n- To use Q&A in a bot dialog flow, we need to\
    \ configure the `System.QnA`.\n- Add a state for the *none* action, and set the\
    \ transition back to the Q&A component when the question is answered by adding\
    \ Q&A for the next transition.\n\nTo get started with Q&A, a new skill has to\
    \ be created (Figure [9-7](#479330_1_En_9_Chapter.xhtml#Fig7)).\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig7_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7 Creating a new Q&A Skill\n\nAfter you click Create, the skill editor\
    \ is opened, and everything is ready to add the questions and answers, write the\
    \ flow, and test the Q&A Skill. After initial creation of the skill, the bot builder\
    \ does not know that this particular skill should be created as a Q&A skill. In\
    \ order for the skill to become a Q&A skill, Q&A needs to be enabled by clicking\
    \ the Q&A icon ![../images/479330_1_En_9_Chapter/479330_1_En_9_Figa_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Figa_HTML.jpg)\
    \ in the navigation bar. Then click **Add Q&A** (Figure [9-8](#479330_1_En_9_Chapter.xhtml#Fig8)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig8_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig8_HTML.jpg)\n\
    \nFigure 9-8 Add Q&A to the skill\n\nNow everything is set up, and the next step\
    \ is to upload the csv that contains all the questions and answers for this skill.\
    \ After you click “+ Q&A Source,” a dialog is shown where you can set language,\
    \ locale, and name and where you can upload your csv. Before we go into the uploading\
    \ itself, we need to make sure that the data source for the initial set of Q&A\
    \ is set up correctly.\n\n### The Q&A Data File\n\nThe Q&A data file is a file\
    \ that contains all the question and answer pairs that you initially need for\
    \ your skill. Typically, this file would bundle your FAQ in a format that can\
    \ be handled by Oracle Digital Assistant. The file has to meet some criteria in\
    \ order to be uploaded to the Digital Assistant Cloud:\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig9_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig9_HTML.jpg)\n\
    \nFigure 9-9 Example Q&A data source file\n\n- This file has to be a UTF-8 encoded\
    \ CSV file.\n- The file must have header row with `category_path`, `questions`,\
    \ and `content`. Below that row the real questions and answers can be added. An\
    \ example can be seen in Figure [9-9](#479330_1_En_9_Chapter.xhtml#Fig9).\n\n\
    The `category_path` contains the category (or categories) for a given question\
    \ and answer (Q&A) pair. Such a Q&A pair can belong to more than one category.\
    \ If that is the case, each category should be entered on new line. If there is\
    \ a hierarchy in the categories, a forward slash should be used:\n\n- travel\n\
    - travel/insurance\n- travel/itinerary\n\nIn the `questions` column, you enter\
    \ the questions that are used. Each versions of a question should be entered on\
    \ a new line. The first question, known as the canonical question, is the question\
    \ that displays in the bot’s message by default. The subsequent questions in the\
    \ column are alternative versions.\n\nYou could add all questions and answers\
    \ manually in the cloud UI, but using a spreadsheet for entering data is a much\
    \ more convenient way of doing this. Using the spreadsheet for you initial bulk\
    \ load of Q&A will save you time. If at a later stage there is a need to add extra\
    \ individual questions and/or answers, these can always be added manually in the\
    \ UI after uploading the csv."
  raw: "### Tip\n\nThe Q&AMinimumMatch setting defaults to 50%/25%. While it does\
