  trans: "\n# Oracle 数字助手\n\n前述的大多数聊天机器人主要面向个人使用。虽然它们也可以用于企业解决方案，但从需求来看，这些解决方案所提供的功能与企业实际需求之间仍存在诸多差距。\n\
    \n弥合个人数字助手与企业级数字助手之间的差距，正是 Oracle 的目标所在。到 2016 年底，Oracle 发布了其首个版本的 Oracle 数字助手。当时，它被称为\
    \ Oracle 聊天机器人，是 Oracle 移动云服务的一部分。大约两年后，Oracle 发布了 Oracle 数字助手（ODA）云服务，这是一款专门用于开发和运行数字助手的产品。数字助手是虚拟个人助手，能够在与用户交互时理解自然语言。通常，简单的聊天机器人能够解析用户的意图并帮助他们完成简单的任务。而\
    \ Oracle 数字助手则更进一步。每个数字助手都包含一组专门的技能。这些助手可以被训练使用多种不同的“技能”。这些技能可以拥有自己的后端领域集成，并且可以在跨技能的用户对话过程中与这些后端协同工作。它们会评估用户输入，并调用合适的技能来启动或继续对话。\n\
    \n通过这种方式，用户所需完成的一切都可以在单次对话中实现，无需与多个聊天机器人打交道。用户还可以在对话中途切换，而数字助手仍能理解用户问题的上下文。技能之间的上下文共享是成功的关键，对于提供良好的用户体验至关重要。可以想象一下某人的位置、情绪或特定时刻的需求等因素。这些属性会影响用户愿意接收哪些消息，更重要的是，会影响在何时何地接收。\n\
    \nOracle 数字助手还能够根据从外部应用程序接收到的计划事件，主动与用户发起对话。这被称为应用程序发起的对话（AIC）。Oracle 数字助手可以利用应用程序事件消息的内容，在对话流程中的预定状态开始对话。这是\
    \ Oracle 数字助手区别于其他聊天机器人的特点，后者通常只“在有人说话时才回应”。\n\n# Oracle 数字助手核心组件\n\n为了清晰理解 Oracle\
    \ 数字助手（ODA），你需要了解其高层架构。Oracle 数字助手由一组协同工作的组件组成，以支持企业级数字助手的开发和使用。在本节中，你将了解这些组件是什么以及它们的主要用途。\n\
    \n![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig1_HTML.jpg](img/479330_1_En_1_Fig1_HTML.jpg)\n\
    \n图 1-1\n\nOracle 数字助手 – 核心组件\n\nOracle 数字助手是一个平台即服务（PaaS），它使你能够创建数字助手，并将其暴露给许多不同的接口，这些接口称为渠道。Oracle\
    \ 数字助手允许你创建`数字助手`和`技能`。\n\n数字助手可以帮助用户通过自然语言对话完成多项任务。每个数字助手通常拥有自己的一套技能。\n\n技能可以被视为对话的主力，可以与一个或多个数字助手配合使用。可以想象一下诸如在特定商店订购鲜花或查询银行账户余额等任务。使用\
    \ Oracle 数字助手，技能的使用并不局限于单个数字助手。\n\n技能和数字助手的实现依赖于四个协同工作的核心组件（图 1-1）：\n\n*   对话式\
    \ AI 引擎\n    *   使数字助手能够处理用户输入\n*   对话流\n    *   定义用户可以与特定技能进行的交互\n*   企业数据集成\n\
    \    *   使数字助手能够通过其技能连接到后端系统\n*   渠道配置器\n    *   使数字助手能够在消息平台中使用\n\n在深入探讨技能和数字助手的开发之前，你需要先了解其中一些概念，这些将在本章剩余部分进行解释。我们首先来看一下对话式\
    \ AI 引擎。\n\n## 对话式 AI 引擎\n\n使用 Oracle 数字助手时，你无需担心用于处理和理解自然语言的技术，也无需担心如何处理用户输入。Oracle\
    \ 数字助手使用基于神经网络的不同技术来实现其自身的对话式 AI 引擎（图 1-2）。这些技术利用语言和语言建模来处理来自最终用户的自然语言。\n\n![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig2_HTML.jpg](img/479330_1_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2\n\n*Oracle 数字助手 – 对话式 AI 引擎*\n\n有了这些，开发者可以专注于用户对话，而无需了解这些底层算法的所有繁琐细节。\n\
    \n意图和实体都是常见的 NLP（自然语言处理）概念。NLP 是从文本中提取文本意图和相关信息的科学。\n\n`意图`是用户期望你的技能为其执行的一组任务或操作。意图通常包含动词和名词，例如“提供报价”、“获取日期”和“查找行程”。它们使你的技能能够理解用户希望它做什么。换句话说，它们可以确定用户的意图。例如，一个\
    \ `FindTrip` 意图可以关联到一条直接指令，例如*我想找一趟行程*，也可以关联到其他请求，例如*我真的很想来个短假*，这两者都是同一意图的`表述`。\n\
    \n意图将单词和短语映射到特定操作，而`实体`则为意图本身添加上下文。它们是用户输入片段的关键标识符，使技能能够完成任务。基本上，实体是修饰意图的词语（大的、现代的、户外的、短的、最佳可用的）。实体可以分为用户创建的实体和系统实体。上述所有概念将在本书中更详细地讨论。\n"
- fmt: '### Dialog Flow Execution


    The next component to introduce is the `dialog flow` (Figure [1-3](#479330_1_En_1_Chapter.xhtml#Fig3)).
    A dialog flow defines the possible interactions users can have with a skill. It
    describes how a skill responds and behaves according to user input.


    ![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig3_HTML.jpg](images/479330_1_En_1_Chapter/479330_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Oracle Digital Assistant – dialog flow execution


    Oracle Digital Assistant enables you to define a context-aware conversational
    dialog. To have a context-aware dialog is very important as an end user will not
    necessarily stick to the matter and can potentially branch off into different
    states and context during a conversation. For example, if a user wants to buy
    flowers, but before he can continue to the payment, he has to check the balance
    on his account.


    At some point in the flow, they would instruct the assistant to "Pay the flowers."
    The response of the assistant could be "from which account." The user would pick
    "Checking Account" but actually has no clue how much money there is in that account.
    Then the user would switch context to ask for the current balance. In other words,
    change the state from transferring money to the flower shop to checking balance.
    At some point, the user will decide to return to paying the flowers.


    The Oracle Digital Assistant platform enables you to work with these kinds of
    scenarios with built-in state management. You as a developer do not have to code
    and maintain the solution.


    ### Enterprise Data Integration


    When creating enterprise-grade Digital Assistants, it is somewhat obvious that
    these also need to have a way to access enterprise data (Figure [1-4](#479330_1_En_1_Chapter.xhtml#Fig4)).
    Oracle Digital Assistant facilitates connections to backend systems. It helps
    you extend backend systems such as Oracle HCM, Oracle ERP, and Oracle CX. However,
    you are not limited to Oracle products. You can also connect to third-party applications.
    All of this can be done, as can be expected from enterprise solutions, in a secure
    and scalable manner.


    ![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig4_HTML.jpg](images/479330_1_En_1_Chapter/479330_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Oracle Digital Assistant – enterprise data integration


    For the integration of enterprise data in Oracle Digital Assistant, you can use
    `custom components`. They provide your skill with generic functions like outputting
    text, or they can return information from a backend and perform custom logic.
    You as a developer can create custom components, developed in JavaScript and deployed
    onto a Node.js server. Custom components can be invoked during a dialog flow to
    retrieve information from backend systems or to perform transactions in backend
    systems. Of course, these actions will use APIs that you have to make available
    in your backend systems.


    Another way to step out of the flow is by means of `QnA`. This is actually a very
    common use case for an assistant. Whenever the user types a phrase that matches
    a search term in the QnA, the matching questions and answers are displayed to
    the user. A developed skill can act as the interface to frequently asked questions
    (FAQs) or other knowledge base documents. Frequently asked questions are common
    questions that are looking for an answer: "What are your opening times?", "Can
    I bring kids?", "Do you have vegan pizzas?"


    You can simply integrate a QnA service by importing sets of question and answer
    pairs from a simple spreadsheet. Both QnA and intents can be used in the same
    flow.


    ### Agent Handover


    Every now and then, a situation can occur where your chatbot users do need to
    speak to a real human being. Oracle''s Digital Assistant can be configured in
    a way that it is able to hand over a conversation to an agent in Oracle Service
    Cloud.


    The human agent can handle the inquiry as if it were a regular inbound communication.
    The agent can see exactly what was discussed between the user and the Digital
    Assistant. This means that there is no reason to ask the user to repeat themselves
    unnecessarily. The agent can continue the conversation with the user in a two-way
    conversation and help the user before passing control of the conversation back
    to the assistant. In this way, Oracle Digital Assistant provides a seamless collaboration
    between call center agents and Digital Assistants.


    ### Webview Components


    Typically, the conversation flow between a user and a digital assistant is really
    unstructured. For humans this is a very natural way of interacting. However, sometimes
    you might need a way to capture structured information, such as a data entry form.
    This is where you can use Oracle Digital Assistant Webview components. These `Webview
    components` are small self-contained modular applications that enable users to
    complete a simple task such as a task escalation or entering purchase details.
    They can be incorporated into the conversational flow, thus allowing the digital
    assistant to have both structured (webview) and unstructured interactions (the
    chat) with the user.


    The user can switch from the natural language conversation with the bot to an
    app-like experience for structured data entry, instant validation, and rich media.


    Within Oracle Digital Assistant, you find a web-based builder tool. With this
    tool, you can declaratively develop rich forms, including images, charts, maps,
    and signature capture. It is very easy to also add validations to ensure the accuracy
    of the data captured.


    The Webview component can be invoked from a link inside the conversation. Once
    the data is entered, it can be passed back to the digital assistant, and the flow
    continues from where it was before entering the app.


    ### Channel Configurator


    The last component of the Digital Assistant''s high-level architecture is the
    channel configurator (Figure [1-5](#479330_1_En_1_Chapter.xhtml#Fig5)). Digital
    Assistants are not applications that can be installed on a smartphone or tablet.
    Typically, they are made available over different `channels`.


    ![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig5_HTML.jpg](images/479330_1_En_1_Chapter/479330_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Oracle Digital Assistant – channel configurator


    These channels, also referred to as messaging platforms or messaging apps, such
    as Facebook Messenger, Slack, and web pages, are the actual platforms where the
    user interacts with the digital assistant. Also text-only channels such as Twilio
    SMS and WeChat are supported. The channels are configured within Oracle Digital
    Assistant with their platform-specific configurations and allow access from the
    messaging platforms to the Digital Assistant and vice versa. One digital assistant
    or skill can have several channels configured for it so that it can run on different
    services simultaneously.'
  raw: '### Dialog Flow Execution


    The next component to introduce is the **dialog flow** (Figure [1-3](#479330_1_En_1_Chapter.xhtml#Fig3)).
    A dialog flow defines the possible interactions users can have with a skill. It
    describes how a skill responds and behaves according to user input.


    ![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig3_HTML.jpg](images/479330_1_En_1_Chapter/479330_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Oracle Digital Assistant – dialog flow execution


    Oracle Digital Assistant enables you to define a context-aware conversational
    dialog. To have a context-aware dialog is very important as an end user will not
    necessarily stick to the matter and can potentially branch off into different
    states and context during a conversation. For example, if a user wants to buy
    flowers, but before he can continue to the payment, he has to check the balance
    on his account.


    At some point in the flow, they would instruct the assistant to “Pay the flowers.”
    The response of the assistant could be “from which account.” The user would pick
    “Checking Account” but actually has no clue how much money there is in that account.
    Then the user would switch context to ask for the current balance. In other words,
    change the state from transferring money to the flower shop to checking balance.
    At some point, the user will decide to return to paying the flowers.


    The Oracle Digital Assistant platform enables you to work with these kinds of
    scenarios with built-in state management. You as a developer do not have to code
    and maintain the solution.


    ### Enterprise Data Integration


    When creating enterprise-grade Digital Assistants, it is somewhat obvious that
    these also need to have a way to access enterprise data (Figure [1-4](#479330_1_En_1_Chapter.xhtml#Fig4)).
    Oracle Digital Assistant facilitates connections to backend systems. It helps
    you extend backend systems such as Oracle HCM, Oracle ERP, and Oracle CX. However,
    you are not limited to Oracle products. You can also connect to third-party applications.
    All of this can be done, as can be expected from enterprise solutions, in a secure
    and scalable manner.


    ![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig4_HTML.jpg](images/479330_1_En_1_Chapter/479330_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Oracle Digital Assistant – enterprise data integration


    For the integration of enterprise data in Oracle Digital Assistant, you can use
    **custom components** . They provide your skill with generic functions like outputting
    text, or they can return information from a backend and perform custom logic.
    You as a developer can create custom components, developed in JavaScript and deployed
    onto a Node.js server. Custom components can be invoked during a dialog flow to
    retrieve information from backend systems or to perform transactions in backend
    systems. Of course, these actions will use APIs that you have to make available
    in your backend systems.


    Another way to step out of the flow is by means of **QnA.** This is actually a
    very common use case for an assistant. Whenever the user types a phrase that matches
    a search term in the QnA, the matching questions and answers are displayed to
    the user. A developed skill can act as the interface to frequently asked questions
    (FAQs) or other knowledge base documents. Frequently asked questions are common
    questions that are looking for an answer: “What are your opening times?”, “Can
    I bring kids?”, “Do you have vegan pizzas?”


    You can simply integrate a QnA service by importing sets of question and answer
    pairs from a simple spreadsheet. Both QnA and intents can be used in the same
    flow.


    ### Agent Handover


    Every now and then, a situation can occur where your chatbot users do need to
    speak to a real human being. Oracle’s Digital Assistant can be configured in a
    way that it is able to hand over a conversation to an agent in Oracle Service
    Cloud.


    The human agent can handle the inquiry as if it were a regular inbound communication.
    The agent can see exactly what was discussed between the user and the Digital
    Assistant. This means that there is no reason to ask the user to repeat themselves
    unnecessarily. The agent can continue the conversation with the user in a two-way
    conversation and help the user before passing control of the conversation back
    to the assistant. In this way, Oracle Digital Assistant provides a seamless collaboration
    between call center agents and Digital Assistants.


    ### Webview Components


    Typically, the conversation flow between a user and a digital assistant is really
    unstructured. For humans this is a very natural way of interacting. However, sometimes
    you might need a way to capture structured information, such as a data entry form.
    This is where you can use Oracle Digital Assistant Webview components. These **Webview
    components** are small self-contained modular applications that enable users to
    complete a simple task such as a task escalation or entering purchase details.
    They can be incorporated into the conversational flow, thus allowing the digital
    assistant to have both structured (webview) and unstructured interactions (the
    chat) with the user.


    The user can switch from the natural language conversation with the bot to an
    app-like experience for structured data entry, instant validation, and rich media.


    Within Oracle Digital Assistant, you find a web-based builder tool. With this
    tool, you can declaratively develop rich forms, including images, charts, maps,
    and signature capture. It is very easy to also add validations to ensure the accuracy
    of the data captured.


    The Webview component can be invoked from a link inside the conversation. Once
    the data is entered, it can be passed back to the digital assistant, and the flow
    continues from where it was before entering the app.


    ### Channel Configurator


    The last component of the Digital Assistant’s high-level architecture is the channel
    configurator (Figure [1-5](#479330_1_En_1_Chapter.xhtml#Fig5)). Digital Assistants
    are not applications that can be installed on a smartphone or tablet. Typically,
    they are made available over different **channels**.


    ![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig5_HTML.jpg](images/479330_1_En_1_Chapter/479330_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Oracle Digital Assistant – channel configurator


    These channels, also referred to as messaging platforms or messaging apps, such
    as Facebook Messenger, Slack, and web pages, are the actual platforms where the
    user interacts with the digital assistant. Also text-only channels such as Twilio
    SMS and WeChat are supported. The channels are configured within Oracle Digital
    Assistant with their platform-specific configurations and allow access from the
    messaging platforms to the Digital Assistant and vice versa. One digital assistant
    or skill can have several channels configured for it so that it can run on different
    services simultaneously.'
  trans: '

    ### 对话流执行


    接下来要介绍的组件是`对话流`（图 1-3）。对话流定义了用户与技能之间可能的交互方式，描述了技能如何根据用户输入进行响应和表现。


    ![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig3_HTML.jpg](img/479330_1_En_1_Fig3_HTML.jpg)


    图 1-3


    Oracle Digital Assistant – 对话流执行


    Oracle Digital Assistant 使您能够定义具有上下文感知能力的对话式交互。拥有上下文感知的对话非常重要，因为最终用户不一定会紧扣主题，在对话过程中可能会分支到不同的状态和上下文。例如，如果用户想买花，但在继续付款之前，他必须先检查账户余额。


    在流程的某个时刻，用户会指示助手“支付花款”。助手的回复可能是“从哪个账户支付”。用户会选择“支票账户”，但实际上并不清楚该账户中有多少钱。然后用户会切换上下文，询问当前余额。换句话说，就是将状态从“向花店转账”转变为“查询余额”。在某个时刻，用户会决定返回到支付花款的流程。


    Oracle Digital Assistant 平台通过内置的状态管理功能，使您能够处理这类场景。作为开发者，您无需编写和维护解决方案代码。


    ### 企业数据集成


    在创建企业级数字助手时，它们显然也需要一种访问企业数据的方式（图 1-4）。Oracle Digital Assistant 简化了与后端系统的连接。它帮助您扩展诸如
    Oracle HCM、Oracle ERP 和 Oracle CX 等后端系统。然而，您并不局限于 Oracle 产品。您也可以连接到第三方应用程序。所有这些操作，正如企业级解决方案所预期的那样，都可以以安全且可扩展的方式完成。


    ![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig4_HTML.jpg](img/479330_1_En_1_Fig4_HTML.jpg)


    图 1-4


    Oracle Digital Assistant – 企业数据集成


    为了在 Oracle Digital Assistant 中集成企业数据，您可以使用`自定义组件`。它们为您的技能提供通用功能，例如输出文本，或者从后端返回信息并执行自定义逻辑。作为开发者，您可以创建用
    JavaScript 开发并部署在 Node.js 服务器上的自定义组件。在对话流执行期间，可以调用自定义组件来从后端系统检索信息或执行事务。当然，这些操作将使用您必须在后端系统中提供的
    API。


    另一种跳出流程的方式是通过`问答（QnA）`。这实际上是助手的常见用例。每当用户输入的短语与 QnA 中的搜索词匹配时，匹配的问题和答案就会显示给用户。开发的技能可以作为常见问题解答（FAQ）或其他知识库文档的接口。常见问题解答是那些寻求答案的常见问题：“你们的营业时间是几点？”、“我可以带孩子吗？”、“你们有纯素披萨吗？”


    您只需通过从简单的电子表格中导入问答对集合，即可轻松集成 QnA 服务。QnA 和意图可以在同一个流程中使用。


    ### 人工坐席移交


    有时，您的聊天机器人用户确实需要与真人交谈。Oracle 的 Digital Assistant 可以配置为能够将对话移交给 Oracle Service
    Cloud 中的坐席。


    人工坐席可以像处理常规的入站通信一样处理该查询。坐席可以准确看到用户与 Digital Assistant 之间讨论的内容。这意味着无需要求用户不必要地重复自己。坐席可以与用户进行双向对话，在将对话控制权交还给助手之前帮助用户。通过这种方式，Oracle
    Digital Assistant 实现了呼叫中心坐席与数字助手之间的无缝协作。


    ### Webview 组件


    通常，用户与数字助手之间的对话流程是非常非结构化的。对人类来说，这是一种非常自然的交互方式。然而，有时您可能需要一种捕获结构化信息的方法，例如数据输入表单。这时您可以使用
    Oracle Digital Assistant Webview 组件。这些`Webview 组件`是小型、自包含的模块化应用程序，使用户能够完成简单的任务，例如任务升级或输入购买详情。它们可以集成到对话流程中，从而使数字助手能够与用户进行结构化（webview）和非结构化（聊天）两种交互。


    用户可以从与机器人的自然语言对话切换到类似应用程序的体验，用于结构化数据输入、即时验证和富媒体。


    在 Oracle Digital Assistant 中，您会找到一个基于 Web 的构建工具。使用此工具，您可以声明式地开发丰富的表单，包括图像、图表、地图和签名捕获。添加验证以确保捕获数据的准确性也非常容易。


    Webview 组件可以通过对话中的链接调用。一旦数据输入完成，就可以将其传回数字助手，流程将从进入应用程序之前的位置继续执行。


    ### 渠道配置器


    数字助手高层架构的最后一个组件是渠道配置器（图 1-5）。数字助手并非可以安装在智能手机或平板电脑上的应用程序。通常，它们通过不同的`渠道`提供。


    ![../images/479330_1_En_1_Chapter/479330_1_En_1_Fig5_HTML.jpg](img/479330_1_En_1_Fig5_HTML.jpg)


    图 1-5


    Oracle Digital Assistant – 渠道配置器


    这些渠道，也称为消息平台或消息应用，例如 Facebook Messenger、Slack 和网页，是用户与数字助手交互的实际平台。也支持纯文本渠道，例如
    Twilio SMS 和微信。这些渠道在 Oracle Digital Assistant 中使用其特定于平台的配置进行配置，并允许从消息平台访问数字助手，反之亦然。一个数字助手或技能可以配置多个渠道，以便它可以同时在多个不同的服务上运行。

