- fmt: '### Creating an Entity


    To create an entity, you need to drill down the Skill in which you want to add
    the entity and then navigate to Entity section. In the next few steps, you will
    add `TripLocation` entity to your `FindTrip` skill:


    1.  Click the `FindTrip` Skill.

    2.  Navigate to Entities (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figw_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figw_HTML.jpg))
    from the left-hand side menu.

    3.  Click the “+ Entity” button.


    This will add a new Entity with default name as `Entity1`. You will then update
    it for `TripLocation`. Check Figure [5-22](#479330_1_En_5_Chapter.xhtml#Fig22).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig22_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig22_HTML.jpg)


    Figure 5-22


    Create Entity


    You can add new values to the list by clicking the “+ value” button. This will
    then give you a popup as shown in Figure [5-23](#479330_1_En_5_Chapter.xhtml#Fig23),
    from where you can add new values to the list.


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig23_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig23_HTML.jpg)


    Figure 5-23


    Add new value


    ### Add Entity to Intent


    Once you create the `TripLocation` entity, you will then add the newly created
    entity to the `SelectTrip` intent. To do this, just follow the following steps:


    1.  Navigate to **Intent** section (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figx_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figx_HTML.jpg)).

    2.  Select “SelectTrip” intent.

    3.  Click the “+ Entity” button on the right side.

    4.  This will open a popup containing all available entities.

    5.  Click “TripLocation” which will then add the entity to “SelectTrip” intent.


    Refer to Figure [5-24](#479330_1_En_5_Chapter.xhtml#Fig24).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig24_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig24_HTML.jpg)


    Figure 5-24


    Add Entity to Intent


    As you have just updated the intent, ensure that you train the model and test
    your intent as described in previous section of this chapter. Additionally, if
    you have added an entity, the Entity option should be selected while you train
    your model (Figure [5-25](#479330_1_En_5_Chapter.xhtml#Fig25)).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig25_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig25_HTML.jpg)


    Figure 5-25


    Train Skill


    ## Working with Dialog Flow


    So far you have been made familiar with intents, utterances, and entities. Now
    is the time to use them in your dialog flow so that your skill becomes capable
    of handling a conversation. Dialog flow is the place where you craft a skill’s
    conversation. How a skill should greet, what it should ask from users, and how
    it should react based on user input – everything is handled using various components
    in your dialog flow. And hence, you can say that the dialog flow definition acts
    as a model for any skill.


    Dialog flows are designed using Oracle Bots Markup Language (OBotML). OBotML is
    based on YAML, which is a human-friendly way of expressing data and data relationship.


    You can access the dialog flow for your skill by simply clicking Flows (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figy_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figy_HTML.jpg)),
    from left-hand navigation. Before moving forward, it is crucial to understand
    various sections which constitute a dialog flow. Refer to Figure [5-26](#479330_1_En_5_Chapter.xhtml#Fig26).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig26_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig26_HTML.jpg)


    Figure 5-26


    Dialog flow sections


    A dialog flow can be broadly classified into three sections:


    1.  Header: Which contains OBotML platform version and dialog flow name.

    2.  Context: Contains context and variables, also known as dialog flow variables,
    which are being used in the flow.

    3.  States: Contains individual states, actions, and their outcome. This section
    contains the main logic based on which a skill interacts and responds.


    As OBotML follows YAML standards, it is important to follow the indentations throughout
    the dialog flow. In case you write a line without proper indention, you will receive
    errors during the autosave which happens during the design time.


    ### Note


    Each indent is equal to two blanks in length.


    Header section of a flow is pretty state forward. It contains the metadata information
    of your bot. But when it comes to context and states, you should have a look at
    it more closely.


    ### Context Section


    As mentioned before, you define the global scoped variables for your skill in
    context section which you can then use across various states in your skill’s dialog
    flow. A variable in context section is defined as


    `variableName`: “`variableType`”;


    As obvious, `variableName` is the name which you give to your variable. `variableType`,
    which is the type of variable, can be


    *   Primitive types (`string`, `int`, `boolean`, `double`, and `float`)

    *   Built-in entity (`CURRENCY`, `ADDRESS`, etc.)

    *   Custom Entity (like `TripLocation` created in previous sections)

    *   `nlpresult`, which is the result from the natural language processing engine

    *   `resourcebundle`, which is used for the variable you define to reference resource
    bundles in a skill


    These variables always get flushed when a conversation ends or when they are explicitly
    getting resetted.


    ### States Section


    States is the places where you define the entire flow for a skill. Here, you define
    all activities and actions that your skill is supposed to perform. Your flow,
    in general, comprised of many states. These states invoke component, which do
    the task or work for the state.


    ### Note


    A state can invoke one and only one component.


    A flow always goes from top to bottom. What this means is that in states section,
    the first state which you define first gets executed first, the second state gets
    executed next, and so on. This is the default behavior unless you explicitly set
    the transition to a different state.


    Also, it is highly recommended to have a default transition in your flow to gracefully
    handle any unexpected exception/error which can arise due to an unforeseen user
    input.


    There are two more things which you should know before you start working with
    dialog flows. They are Apache FreeMarker Template Language (FTL) and components
    in the dialog flow.


    First, let’s tackle Apache FreeMarker Template Language and how it works.'
