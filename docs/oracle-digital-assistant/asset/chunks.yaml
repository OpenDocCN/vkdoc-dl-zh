  trans: "\n# 情感分析 API 的调用\n\n在您的 Oracle Digital Assistant 环境中创建一个技能，并将其命名为`TravvySentimentAnalysis`。目前，该技能将仅以实现情感分析演示所需的最基本功能来实现。在`Flows`中添加以下代码：\n\
    \n```\n#metadata: information about the flow\n#  platformVersion: the version\
    \ of the bots platform that this flow was written to work with\nmetadata:\nplatformVersion:\
    \ \"1.0\"\nmain: true\nname: TravvySentimentAnalysis\n#context: Define the variables\
    \ which will used throughout the dialog flow here.\ncontext:\nvariables:\n#states\
    \ is where you can define the various states within your flow.\nstates:\naskFeedback:\n\
    component: \"System.Output\"\nproperties:\ntext: \"How was your experience with\
    \ Travvy?\"\ntransitions:\nnext: \"checkFeedback\"\ncheckFeedback:\ncomponent:\
    \ \"com.hiking.SentimentAnalysis\"\nproperties:\ntransitions:\nactions:\nPositive:\
    \ \"Positive\"\nNegative: \"Negative\"\nNeutral: \"Neutral\"\nPositive:\ncomponent:\
    \ \"System.Output\"\nproperties:\ntext: \"Thanks for your positive feedback\"\n\
    transitions:\nreturn: \"done\"\nNegative:\ncomponent: \"System.Output\"\nproperties:\n\
    text: \"Thanks for your response. Apologies for a bad experience\"\ntransitions:\n\
    return: \"done\"\nNeutral:\ncomponent: \"System.Output\"\nproperties:\ntext: \"\
    Thanks!\"\ntransitions:\nreturn: \"done\"\n```\n\n在第一个状态`askFeedback`中，您将请求用户提供对\
    \ Travvy 的反馈。一旦用户做出回应，您将在`checkFeedback`状态中调用自定义组件`com.hiking.SentimentAnalysis`。在后续步骤中，将根据自定义组件的操作响应执行状态转换。\n\
    \n接下来，按照第 10 章中向您介绍的步骤，创建一个名为`sentimentAnalysisCC`的自定义组件。完成后，在您的自定义组件内部创建一个名为`SentimentAnalysis.js`的\
    \ JavaScript 文件。同一章 10 中也对此进行了说明。之后，在`SentimentAnalysis.js`中添加以下代码：\n\n```\nvar\
    \ request = require('request');\nmodule.exports = {\nmetadata: () => ({\nname:\
    \ 'com.hiking.SentimentAnalysis',\nsupportedActions: ['Positive','Negative','Neutral']\n\
    }),\ninvoke: (conversation, done) => {\n// perform conversation tasks.\n// retrieve\
    \ user input and store it into a variable\nconst userInput = conversation.text();\n\
    // Invoke API\nrequest.post({\nurl: 'https://api.deepai.org/api/sentiment-analysis',\n\
    json: true,\nheaders: {\n'Api-Key' : 'YourAPIKeyGoesHere',\n},\nform: {\n'text':\
    \ userInput,\n}\n}, function(error, response, body){\nif (response.statusCode\
    \ === 200) {\nif (body.output[0] === 'Positive') {\nconversation.transition('Positive');\n\
    done();\nreturn;\n} else if (body.output[0] === 'Negative') {\nconversation.transition('Negative');\n\
    done();\nreturn;\n} else if (body.output[0] === 'Neutral') {\nconversation.transition('Neutral');\n\
    done();\nreturn;\n}\n} else {\nconversation.logger().error(errText);\nconversation.transition();\n\
    done();\nreturn;\n}\n});\n}\n};\n```\n\n上述代码片段中描述的步骤已添加了内联注释。在此案例中，我们使用了 DeepAI\
    \ 的情感分析 API。用上述更改更新您的自定义组件后，您需要做的就是打包和部署。同样，自定义组件的打包和部署在第 10 章中有详细描述。\n\n完成这些步骤后，您应该尝试测试此技能。您可以为此使用内置的技能测试器。图\
    \ 11-1 展示了您在本节中到目前为止所做工作的一个简单测试用例。\n\n![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig1_HTML.jpg](img/479330_1_En_11_Fig1_HTML.jpg)\n\
    \n图 11-1\n\n文本情感分析\n\n## 语音\n\n如今，支持语音的个人助手（如 Google Home、Amazon Alexa、Apple Siri、Microsoft\
    \ Cortana 等）的使用越来越广泛。如果您能为 Oracle Digital Assistant 添加语音功能会怎样？正如您已经了解的，Digital\
    \ Assistant 可以通过几个预定义的渠道进行公开。其他非开箱即用的渠道也可以使用，但要做到这一点，您必须使用 HTTP `webhook channel`，并将\
    \ Digital Assistant 与该渠道手动集成。\n\n关键问题是：语音能否被视为一个独立的渠道？如果可以，如何在 Oracle Digital\
    \ Assistant 中配置和实现它？显然，问题第一部分的答案是肯定的。语音可以被视为一个独立的渠道，更准确地说，您需要为 Amazon Alexa、Google\
    \ Home 等分别定义独立的渠道。\n\n解决了这个问题，您现在将学习如何为 Oracle Digital Assistant 实现语音功能。\n\n###\
    \ 注意\n\n在撰写本书时，Amazon Alexa、Google Home 和其他第三方提供商服务是唯一通过语音渠道公开 Oracle Digital\
    \ Assistant 的方式。Oracle 最近收购了 speak.ai，并正在努力实现自己的语音引擎并将其添加到 Oracle Digital Assistant\
    \ 中。当该功能就位后，您仍然可以使用第三方解决方案，但 Oracle 随后为您提供了完全嵌入在 Oracle Digital Assistant 中启用语音交互的选项，而无需依赖第三方服务。\n\
    \n### 您需要什么？\n\n在学习如何实现 webhook 渠道之前，您首先需要了解什么是 webhook 以及它是如何工作的。简而言之，webhook\
    \ 在技术上是一种“使用 HTTP 进行的用户定义回调”。Webhook 通常用于连接两个不同的应用程序。当触发应用程序上发生事件时，它会向操作应用程序的\
    \ webhook URL 发送（POST）数据。Webhook 使用“事件反应”（不要调用我们，我们会调用您）的概念。这个概念避免了接收端向发送端持续轮询的需要。\n\
    \n要在 Oracle Digital Assistant 中创建 webhook 渠道，您需要以下内容：\n\n*   一个可公开访问的 HTTP 消息服务器，它使用\
    \ webhook 在用户设备和您的机器人之间中继消息。通常，在 Oracle 云环境中，您会使用 Oracle 计算实例来托管它，但任何节点服务器都可以。您使用\
    \ node 实现此 webhook，并且它需要实现以下两个端点：\n    *   一个用于从我们的机器人接收消息的 POST 端点\n    *   一个用于向我们的机器人发送消息的\
    \ POST 端点\n\n*   接收您机器人消息的 webhook 调用的 URI（以便机器人知道将消息发送到哪里）。\n\n*   完成“创建渠道”对话框后为您的机器人生成的\
    \ webhook URL（以便消息服务器可以访问您的机器人）。\n\n为了使所有这些部分协同工作，形成一个基于 webhook 的可行解决方案，您需要设置节点服务器，在\
    \ Digital Assistant 上配置 webhook 渠道，编写用于传入和传出 webhook 的 Node.js 实现，并配置语音引擎。\n\n\
    ### 注意\n\n为了解释如何向 Oracle Digital Assistant 添加语音，这里使用了 Amazon Alexa。其他平台（如 Google\
    \ Assistant）只要支持 webhook，也可以以相同的方式添加。\n\n图 11-2 展示了此解决方案的整体架构：\n\n![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig2_HTML.jpg](img/479330_1_En_11_Fig2_HTML.jpg)\n\
    \n图 11-2\n\nDigital Assistant 到 Alexa 的架构\n\n### 注意\n\nAlexa 应用节点包的扩展文档可以在[`www.npmjs.com/package/alexa-app`](http://www.npmjs.com/package/alexa-app)找到。\n\
    \n您甚至可以通过使用`ssml-builder`来操纵输出，从而改变 Alexa 的说话方式。`ssml-builder /amazon_speech`节点包可以向输出中添加\
    \ Alexa 特定的 SSML 标签，从而指示 Alexa 以不同的方式说话。\n"
- fmt: "# Note\n\nExtended documentation of the `ssml-builder` node package can be\
    \ found at [`www.npmjs.com/package/ssml-builder`](http://www.npmjs.com/package/ssml-builder).\n\
    \n## Speech Synthesis Markup Language (SSML)\n\nSpeech Synthesis Markup Language\
    \ (SSML) is an XML-based markup language. SSML allows developers to specify how\
    \ input text is converted into synthesized speech using a text-to-speech service.\
    \ SSML enables developers to fine-tune the pitch, pronunciation, speaking rate,\
    \ volume, and more of the text-to-speech output. Punctuation, such as pausing\
    \ after a period or using the correct intonation when a sentence ends with a question\
    \ mark, is automatically handled.\n\nThe World Wide Web Consortium has a recommendation\
    \ regarding Speech Synthesis Markup Language, which can be found here [`www.w3.org/TR/speech-synthesis11/`](http://www.w3.org/TR/speech-synthesis11/).\n\
    \nWith SSML you can use specific text to instruct text-to-speech services how\
    \ they should “speak” your text, as can be seen from the code sample as follows:\n\
    \n```\n\"Hi, this output speech uses SSML. It is part of this chapter.\"\n```\n\
    \nThis example could be enhanced by adding extra tag. The next example shows how\
    \ to add a 1 second pause to the sentence:\n\n```\n\"Hi,  this output speech uses\
    \ SSML. It is part of this chapter.\"\n```\n\nYou can also change the voice that\
    \ is used to speak a part of your sentence:\n\n```\n\"Hi,  this output speech\
    \ uses SSML.  It is part of this chapter. \"\n```\n\nAnd there are many more ways\
    \ to change to text-to-speech behavior.\n\n## Note\n\nSSML is not fully standardized\
    \ (yet). Any vendors use their own specific implementations and additions to their\
    \ platform. Make sure that you know what tags are supported by the platform that\
    \ you are targeting.\n\n## The Webhook Code\n\nTo implement the webhook code,\
    \ you have two options. The first one is to entirely code all logic and plumbing\
    \ yourself. This might give you some flexibility but also adds a lot of coding\
    \ to your task. The second option, which we also used for the purpose of this\
    \ book, is probably a bit smarter. The Oracle Product Management team created\
    \ a working example library that can be used as a basis for your Alexa integration.\
    \ This code uses the `bots-node-sdk`. The `bots-node-sdk` contains the following\
    \ libraries to facilitate communication between your webhook and the Oracle Digital\
    \ Assistant:\n\n*   `OracleBot.Util.Webhook`\n*   `OracleBot.Util.MessageModel`\n\
    *   `OracleBot.Lib.MessageModel`\n*   `OracleBot.Util.Text`\n\nSo instead of coding\
    \ the plumbing such as message signing and modeling the messages between Alexa\
    \ and ODA, you can simply use the `bots-node-sdk` via a `require` definition and\
    \ from there use the libraries that are inside that SDK.\n\n```\nconst OracleBot\
    \ = require('@oracle/bots-node-sdk');\nconst MessageModel = OracleBot.Lib.MessageModel;\n\
    const messageModelUtil = OracleBot.Util.MessageModel;\nconst botUtil = OracleBot.Util.Text;\n\
    const webhookUtil = OracleBot.Util.Webhook;\n```\n\nWith this generic piece of\
    \ node code in place, you can use the webhook with any skill that you want to\
    \ expose over Alexa. The final configuration of the webhook between Alexa and\
    \ ODA also needs to be done in this node code. You will learn later in this chapter\
    \ how to do that.\n\n## Looking at Travvy\n\nThe process of exposing Travvy over\
    \ Alexa is rather straightforward and consists only a couple of configuration\
    \ steps. You will be guided through these steps, and they will be explained individually.\n\
    \n### Adding the Webhook Channel to ODA\n\nThe first step to create a new channel\
    \ in ODA. This has to be a webhook channel as this is the type of channel that\
    \ is required by this kind of channel. You can simply invoke the “create channel”\
    \ button and fill out all the fields that you need (Figure [11-3](#479330_1_En_11_Chapter.xhtml#Fig3)).\
    \ Note that in the “Outgoing webhook URI,” you must set your server URL plus the\
    \ endpoint where the webhook code is expecting the messages from ODA to go. In\
    \ this case `https://your-server-url/genericBotWebhook/messages` is used because\
    \ the URL where the webhook code will run is not yet known. The endpoint will\
    \ be `/genericBotWebhook/Messages` as this is how it is defined it in the webhook\
    \ code.\n\n![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig3_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig3_HTML.jpg)\n\
    \nFigure 11-3\n\nCreate channel in ODA\n\nWhen you click OK, the webhook channel\
    \ will be created for you, and you will see (Figure [11-4](#479330_1_En_11_Chapter.xhtml#Fig4))\
    \ two extra fields added, both of which you need in the configuration of the webhook\
    \ code:\n\n1.  The webhook URL: The URL that your webhook will use to send messages\
    \ to the ODA\n2.  The secret key: The key that your webhook needs to use to sign\
    \ messages that are sent to ODA and that ODA will use to check if incoming messages\
    \ are signed with the correct key\n\n    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig4_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig4_HTML.jpg)\n\
    \n    Figure 11-4\n\n    Generated secret key and webhook URL\n\nThis is all that\
    \ is needed in Oracle Digital Assistant. Just by adding and configuring the channel,\
    \ your Digital Assistant (or Skill) is now available over this webhook channel\
    \ which eventually will be used by Alexa."
