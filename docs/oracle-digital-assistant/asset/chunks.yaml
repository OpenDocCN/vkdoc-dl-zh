- fmt: '### A/B Testing


    A/B testing is defined as comparing two versions of the conversational UX by presenting
    both versions to similar visitors at the same time. The goal is to see which one
    performs better.


    By investing in an A/B test, you will be able to measure the:


    - **The retention rate**: Monitor the chatbot’s performance in attracting and
    retaining its users. A well-structured and engaging UX in messenger chatbots may
    boast retention rates up to 70%, unlike widely used email marketing campaigns
    with up to 40%.

    - **The drop-offs**: The place in the dialog flow where the user left an intended
    main flow and went down a path different than the intended flow. This means that
    there might be some content or elements of the UX that visitors are not reaching
    because they get bored or frustrated before reaching them.

    - **The main conversions**: Test which conversational UX is best leading users
    to what is most valuable to your business, for example, clicking a particular
    “Call to Action,” starting a live chat with an agent, completing the checkout
    process, and so on.


    Some of the chatbots’ building platforms offer ready-made solutions for A/B testing
    of the chatbots. You can use them for this purpose.


    Every experiment that is set up for A/B testing may include two plus variations
    of the same feature or UX element that requires validation. You can even do that
    when your bot is live. Try different utterances and measure changes in user behavior.


