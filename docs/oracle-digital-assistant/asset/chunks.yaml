- fmt: '# Introduction


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Figa_HTML.gif](images/479330_1_En_7_Chapter/479330_1_En_7_Figa_HTML.gif)


    Or, in English: You might not have considered to begin this chapter with a Hindi
    sentence.


    While this book is written in English, there are many more languages around the
    world, and many of these are spoken by only a minority of the world population.
    There are roughly 6,500 spoken languages in the world today. However, about 2,000
    of those languages have fewer than 1,000 speakers. The ten languages spoken by
    most people cover around 50% of the world. This means that the other 50% speaks
    any of the remaining 6,490 languages. These figures pose a challenge to anyone
    wanting to provide a multilingual solution. It is key to determine what languages
    you want to support, as it is virtually impossible to support all.


    A simple example says it all:


    * I would like to order a pizza.

    * Je voudrais commander une pizza.

    * Me gustaria pedir una pizza.

    * Ich mochte gerne einen Pizza bestellen.


    How would one build a digital assistant that understands all the preceding languages
    in a way that they relate to the `OrderPizza` intent and also reply to the user
    in the correct language?


    Extreme Hiking Holidays has the same challenge as they serve customers from multiple
    countries. Most of their customers speak English, but as an extra service to customers,
    they also provide their customers with a Digital Assistant that does not only
    speak English but also other languages. In this chapter, you will learn how to
    add support for multiple languages to Oracle Digital Assistant.


    ### Note


    Multilanguage support on a Digital Assistant is not perfect yet. For individual
    skills, you can have multilanguage support. If you need this multilanguage support,
    you should consider exposing skills. On the Digital Assistant level, there is
    currently no way to detect languages or to use resource bundles. The current solution
    for this is to create so-called “predominant” language bots. These are not multilanguage
    but single–foreign language bots.


    Enabling Oracle Digital Assistant for true multilanguage use is on the roadmap.


    ## How Do Translations Work?


    Oracle Digital Assistants’ NLP is based on English. This does not mean that you
    cannot add support for other languages. This support depends on two components.


    First is the use of an external translation service. This will take any utterance
    that is entered by the user and translate it to and from English. Second is the
    use of resource bundles that contain the language-specific texts. These will be
    used to send translated bot responses to the user. Later in this chapter, we explain
    how these components work and how they can be combined. First, you will learn
    about a typical flow for language translation as displayed in Figure [7-1](#479330_1_En_7_Chapter.xhtml#Fig1).


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig1_HTML.jpg](images/479330_1_En_7_Chapter/479330_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    The translation flow


    Based on the user input, the Digital Assistant will try to detect the language.
    Once the language is detected, it will proceed to the next step in the flow. In
    that step, if needed, the users’ utterance will be translated to English by the
    translation service. This need for translation is determined by the `autoTranslate`
    property. The autotranslation is disabled by default, but at any time, it can
    be enabled or disabled. The `autoTranslate` context variable needs to be defined,
    and whenever the value of this variable is set to `true`, autotranslation is enabled.
    When enabled, all user messages are translated to English, and all the bot messages
    are translated to user language.


    ```

    variables:

    autoTranslate: "boolean"

    states:

    enableAutotranslation:

    component: "System.SetVariable"

    properties:

    variable: "autoTranslate"

    value: true

    transitions: {}

    ```


    If `autoTranslate` is `false`, translation might still be required for individual
    components. This is due to the fact that the `translation` property on components
    can override the global `autoTranslate` setting.


    So if the `translation` property on a component is set to `true`, the Digital
    Assistant will invoke the configured translation service, even if `autoTranslate`
    is set to `false`.


    ```

    :

    component: "System.Text"

    properties:

    translate: true

    ```


    After invoking the translation service, or when no translation is needed, the
    Digital Assistant will continue to process the users’ input and, next, create
    the bots’ response.


    The Digital Assistant needs to figure out how the response is sent to the end
    user. There are three options:


    1. This can be derived from a resource bundle.

    2. This can be translated via a translation service.

    3. This can be sent “as is.”


    The exact way depends. By default, the output string defined on the component
    is used. If the defined output string is a reference to a resource bundle, then
    the resource bundle string is used. If the language setting is not English, then
    the resource bundle entry for this language is looked up and used. If it is not
    available, then the fall back is to the default language (English) bundle string.
    If translation is enabled for a component (which can be through `autoTranslate`
    or the `translate` property), then the component output text is sent to the translation
    service for translation first. This is the case even if the string is obtained
    from a resource bundle.


    ### Note


    The internal language used in Oracle Digital Assistant is English. If the users’
    language is English, there is no need to translate the bots’ reply, as both are
    English. In this case, you would need to use Apache FreeMarker expressions to
    set the `translate` property on the components to `false` or the `autoTranslate`
    property to `false`. Otherwise, Oracle Digital Assistant will try and translate
    to English.


    If the user’s language is other than English, Digital Assistant will invoke the
    translation service and communicate the translated answer to the user. However,
    if you set `translate` property to `false` on components that reference resource
    bundles, then the resource bundle string is used.


    ### Note


    If you start your flow with a `System.TranslateInput`, the Digital Assistant will
    ALWAYS translate the users input to English. This can be very helpful if you need
    this kind of translation.


    ```

    translateInput:

    component: "System.TranslateInput"

    properties:

    variable: "translatedString"

    transitions:

    next: "Intent"

    ```


    ### Hint


    You can even read the original string from a variable, in which case you would
    keep copies of the original and the translated string.


    ### Pitfalls in Translation Services


    Translation services can be very helpful in creating multilingual Digital Assistants.
    However, they are not failsafe. There are several situations where translation
    services will have difficulties detecting the correct language or providing the
    correct translations. Let’s have a look at some examples.


    First there is the case of closely related languages. In Europe there are several
    languages that are very closely related. For a translation service, it will be
    difficult to distinguish between, for instance, Norwegian and Swedish and Swedish
    and Danish. In such case, you as a developer should be prepared and ask the user
    to confirm the detected language before proceeding. Second there are greetings
    or words that are “borrowed” from other languages. Hi, Hey, Hoi, Hello, Hallo,
    Bonjour, Ciao, all kinds of greetings that are used in many different languages.
    There is no translation service that is able to distinguish between an Italian
    saying “Ciao” and a Dutchman saying “Ciao.” It will always come up with Italian
    as language, thus leaving the Dutchman in the dark. There is nothing you can do
    about this.'
