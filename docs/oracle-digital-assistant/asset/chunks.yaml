  trans: '

    ### 提示


    为每个答案添加的问题越多，技能返回相关问答对的可能性就越大。请为每个答案添加 2 到 5 个问题，这将提高准确性。


    在添加问题和答案时，必须确保为技能提供足够多的问题，以便识别用户提出相同问题的所有不同方式。最佳做法是变换动词和疑问词，如“如何”、“什么”和“哪里”，但答案的主题要保持高度一致。


    像“我在哪里可以找到旅行目的地？”这样的问题，可以用不同的方式提问，例如：


    - 你们有目的地列表吗？

    - 我能获取所有目的地的概览吗？

    - 我的旅行有哪些可能的目的地？


    显然，这些问题应始终返回相同的答案。当您对问答 CSV 的内容满意后，就可以将其添加到技能中。可以通过点击“+ Q&A 源”按钮来启动此上传过程，如图 9-10
    所示。


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig10_HTML.jpg](img/479330_1_En_9_Fig10_HTML.jpg)


    图 9-10：添加新的问答源


    将出现一个上传对话框（图 9-11），您可以在其中选择问答源的语言和区域设置，并为其命名。接下来，可以将 CSV 文件拖放到对话框中进行上传。填写完所有字段后，点击
    `Create`，CSV 文件将被上传并添加到您的问答中。


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig11_HTML.jpg](img/479330_1_En_9_Fig11_HTML.jpg)


    图 9-11：添加问答源


    ### 提示


    如果在上传后决定编辑数据源文件并替换内容，请注意，这将用新 CSV 文件中的内容替换所有在线内容。您在云端所做的任何更改都将被覆盖。最好在 CSV 中进行更改，而不是在云端。如果您在云端进行了更改，请确保在上传新文件之前，先导出云端的问答内容。


    CSV 中的所有问题和答案现在都已上传到技能编辑器中。在列表中，您可以看到刚刚上传的文件。


    提高问答质量的另一项措施是添加特定于语言的配置。在这里，您可以添加忽略词、缩写和同义词。例如，对于“旅行”，有“旅程”、“假期”、“航行”等同义词。


    只需将它们作为同义词添加到这里，它们都可以用来解析到同一个问题（图 9-12）。


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig12_HTML.jpg](img/479330_1_En_9_Fig12_HTML.jpg)


    图 9-12：添加同义词


    ### 注意


    在本章中，我们不会深入探讨多语言细节。多语言的具体内容已在第 7 章中讨论过。


    当您点击“查看所有问答”时，您将看到一个列表，显示该文件的确切内容（图 9-13）。


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig13_HTML.jpg](img/479330_1_En_9_Fig13_HTML.jpg)


    图 9-13：Travvy 的所有问答


    这也是编辑问答并在需要时进行导出的地方。现在是时候训练问答了。


    ### 测试问答


    为了确保问答按预期工作，必须进行测试，但在测试问答之前，我们必须先训练问答（图 9-14）。这是一项简单的任务，可以在机器人构建器的训练部分执行：


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig14_HTML.jpg](img/479330_1_En_9_Fig14_HTML.jpg)


    图 9-14：训练技能的问答


    完成后，可以通过点击“试用”来调用测试器，开始测试 Travvy 的问答。这可以“逐个”进行，也可以批量进行。对于 Travvy，我们将坚持“逐个”测试。让我们看看当我们输入“我如何支付我的旅行费用？”时会发生什么（图
    9-15）。


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig15_HTML.jpg](img/479330_1_En_9_Fig15_HTML.jpg)


    图 9-15：测试问答


    问答功能处理对输入语句的响应。它由一组代表最佳匹配的问题组成。在我们的测试案例中，有三个可能的问题与用户的语句相关，都属于“旅行支付”类别。在测试器之外，在真实的“聊天机器人”中，这些答案将以一种轮播形式显示，以便用户可以浏览所有匹配的问题，找到他正在寻找的那个。


    现在让我们看看，如果我们将其改为“我如何支付我的预订费用？”会发生什么（图 9-16）。


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig16_HTML.jpg](img/479330_1_En_9_Fig16_HTML.jpg)


    图 9-16：测试问答


    问答功能现在选择了不同的问题和不同的顺序。显然，所有问题都以某种方式与输入的语句相关。如果您想增加某个问答对针对某个语句的权重，可以使用“**添加到问题**”按钮，将您的语句添加到特定的问答问题中。

