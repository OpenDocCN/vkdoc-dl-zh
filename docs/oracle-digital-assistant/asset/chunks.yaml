- fmt: '### Train and Test Intents


    Once you create or update intents, you need to train your skill so that the model
    gets trained with your changes. This training is based on different machine learning
    algorithms which train your skill with the related intents and utterances. When
    a user interacts with your skill, this training ensures that your skill identifies
    a specific intent and acts accordingly.


    When you add or edit your intents, you will notice an indication mark (![../images/479330_1_En_5_Chapter/479330_1_En_5_Figv_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figv_HTML.jpg))
    accompanying the `Train` button in the top-right corner (see Figure [5-17](#479330_1_En_5_Chapter.xhtml#Fig17)).
    This implies that you need to train your skill in order to accommodate your changes.


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig17_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Indication that training is required


    Clicking the `Train` button reveals two different training mechanisms: `Trainer
    Ht` and `Trainer Tm` (see Figure [5-18](#479330_1_En_5_Chapter.xhtml#Fig18)).
    You can select a specific mechanism by clicking the related radio button. Notice
    that `Trainer Ht` is selected by default. During the initial development cycles,
    when your training corpus is small, use `Trainer Ht` to train your skill. But
    as training corpus becomes mature and you start getting accurate results for intent
    resolution, you should eventually move to `Trainer Tm`.


    For now, you will use the default `Trainer Ht` training model, to train your skill.
    As it is the default selection, to start the process, you just need to click the
    `Submit` button.


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig18_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    Train Intent


    Presuming that you have trained your skill, next you will test your intent.


    Testing is one of the core aspects of any development cycle, and bot testing is
    in no way different from that. Bot functionalities should be tested as you proceed
    with its development. Once you finalize the development of intent(s), you should
    test whether the intents are functioning as they are expected or not.


    To test your intents, click `Try It Out!` as shown in Figure [5-19](#479330_1_En_5_Chapter.xhtml#Fig19).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig19_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig19_HTML.jpg)


    Figure 5-19


    Test Intents


    This will open a new window where you will be able to test your intents. Type
    a phrase to test and click the `Send` button. Then the tester will process your
    phrase and show you which intent has been resolved for your phrase, along with
    other additional information. See Figure [5-20](#479330_1_En_5_Chapter.xhtml#Fig20).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig20_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig20_HTML.jpg)


    Figure 5-20


    Intent testing


    Alternatively, you can also test your intents in a batch mode by toggling the
    `Batch` button and then by uploading the CSV file. Check Figure [5-21](#479330_1_En_5_Chapter.xhtml#Fig21).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig21_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig21_HTML.jpg)


    Figure 5-21


    Batch upload


    The CSV file you can get when you enable conversation logging for the `Intent
    Conversation` and then export the conversation log as described earlier in the
    section `Export Conversation Log`.


    ## Working with Entities


    While working with intents and utterances, you learned that intents are specific
    actions you intend to perform and utterances are the meaningful sentences that
    describe those intents. Entities are the variable elements which provide context
    to the intent. In simple words, entities are those values which you seek from
    a user during a conversation, based on which you will define the outcome or flow
    of the bot.


    For example, in the case of your `FindTrip` skill, if a user says "I want to book
    a trip," then you know that the intension of the user is to book a trip, but at
    the same point in time, it is a very generic statement. Instead of that, if the
    user says "I want to book a hiking trip to the USA," then the context is much
    clearer. So, the user wants to book a trip, but to which location? And the answer
    is to the USA. This location, which helped to provide an appropriate meaning to
    the intent, is known as the entity. Hence, if the user provides you a location,
    you can book a specific trip for him, or else you need to ask him the location
    so that you can give him the appropriate option to book the trip.


    Entities are classified in two categories:


    1.  Built-in entities

    2.  Custom entities


    Built-in or system entities are the ones which are provided to you by Oracle as
    part of Digital Assistant instance. Custom entities are those entities which you
    will create based on your requirements.


    ### Built-in Entities


    Built-in entities are divided into two categories:


    1.  Simple entities

    2.  Complex entities


    #### Simple Entities


    Simple entities are based on primitive types such as strings and integers. Examples
    of simple entities are:


    *   `NUMBER`

    *   `EMAIL`

    *   `YES_NO`


    #### Complex Entities


    Complex entities, on the other hand, are based on specific properties. Table [5-2](#479330_1_En_5_Chapter.xhtml#Tab2)
    shows you complex entities and their properties.


    Table 5-2


    Complex Entities


    | Entities | Properties |

    | --- | --- |

    | `ADDRESS` | `city`, `houseNumber`, `road`, `originalString` |

    | `DATE` | `originalString`, `date` |

    | `TIME` | `hrs`, `mins`, `secs`, `"hourFormat":"PM"` |

    | `DURATION` | `startDate`, `endDate`, `originalString` |

    | `SET` | `minute`: The range is {0–59}, `hour`: The range is {0–23}, `dayOfTheMonth`:
    The range is {1–31}, `monthOfTheYear`: The range is {1–12}, `dayOfTheWeek`: The
    range is {0–6}, starting with 0 as Sunday, `year` |

    | `CURRENCY` | `amount`, `currency`, `totalCurrency` |

    | `PHONE_NUMBER` | `phoneNumber`, `completeNumber` |

    | `URL` | `protocol`, `domain`, `fullPath` |


    ### Custom Entities


    Custom entities are the skill specific entities which you will create to store
    or retrieve your custom values. For instance, in case of a financial bot, you
    can think of `AccountType` entity which can have values such as `Savings` and
    `Current` accounts. Or for a `PizzaBot`, `CrustType` can be `Thin`, `Thick`, or
    `Medium`.


    The following are the types of custom entities:


    *   **Derived**: As the name suggests, they are derived from built-in entities
    or custom entity defined by you.

    *   **Value list**: These are the entities based on a predefined list of values.

    *   **Entity list**: These entities are a super set of entities and based on the
    list of other entities.

    *   **Regular expression**: These entities are based on regular expression (regex)
    to strictly match to specific pattern.

    *   **Composite bag**: These entities are group of related entities which can
    resolve to specific domain or specific function. You can configure Composite Bag
    entities in different ways. Either you can give the user prompts to enter values
    for each and every entity constituting the composite bag, or you can also give
    the user a prompt to enter a specific entity and derive remaining entities in
    the composite bag based on provided entity value.'
