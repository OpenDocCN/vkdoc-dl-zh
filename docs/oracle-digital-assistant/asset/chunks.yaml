    result. While you work with Travvy, you might want to retrieve user-specific information,
    like full name, age, address, and so on using a REST service.


    Another scenario, which you can consider for using a custom component, is when
    you want to implement some complex logic for your skill, but you realize that
    the job cannot be accomplished using Apache FreeMarker. In the context of this
    book, consider a use case for Travvy where you only want to allow users to book
    a trip if they are grown up, that is, if their age is greater than 18\. If user’s
    age doesn’t match your criteria, then you display a message stating that he/she
    is not eligible to book a trip using Travvy. Such type of complex logic is not
    very convenient to implement directly in bot flow but can be done effectively
    using custom components. Having said that, you can outline the following benefits
    of using custom components based on what we have discussed so far.


    **Benefits of Using Custom Components**


    *   Custom components keep your dialog flows short for use cases that otherwise
    require multiple states to implement.


    *   Custom components, if deployed as an API using Oracle Mobile Hub (refer to
    Figure [10-13](#479330_1_En_10_Chapter.xhtml#Fig13) under section “Access Custom
    Component from ODA Instance” where you can select the Oracle Mobile Cloud option),
    can be used across different skills, which can be even spread across various ODA
    instances.


    *   As custom components are developed using Node.js, you can leverage public
    and free third-party Node libraries.


    **Use Cases for Custom Components**


    *   By default, Oracle allows you to use Google and Microsoft translation services
    to provide multilingual support for your bot. But if you wish to use any third-party
    translation services for your bot, you can also do that using custom components.


    *   You may also think about using custom components if you wish to implement
    security for your bot or in any specific section like for API invocations.


    And the list doesn’t end here. As you start working with custom components, you
    will yourself come up with many more benefits and use cases of using them in your
    specific scenarios.


    Now that you hold a basic understanding about the custom components and where
    you should consider using custom components, it’s the time to start working with
    them. In next few steps, you will see how easy it is to create your first custom
    component and to start implementing your custom logic. We would also suggest you
    acquire some knowledge of JavaScript language in case you don’t happen to have
    it already. That will come a lot handy going forward, and you will notice the
    difference while working on custom components. But first, you will have to set
    up your local environment for development. This would allow you to develop your
    custom components on your own machine, debug, and test before you actually deploy
    them on the cloud.


    ## Environment Setup for Custom Component


    There are a few prerequisites you need to install on your local machine in order
    to start working with your custom components. First and foremost, you need to
    install node on your local machine if you don’t already have it installed. You
    can download Node from the following link:


    [`https://nodejs.org/en/download/`](https://nodejs.org/en/download/)


    Next thing in the list is to download Oracle Bots Node.js SDK. Once you have installed
    Node, you can simply install Oracle Bots Node SDK globally using the following
    command:


    Windows


    ```

    npm install -g @oracle/bots-node-sdk

    ```


    Mac


    ```

    sudo npm install -g @oracle/bots-node-sdk

    ```


    Next, you need to download a tunneling software. We are going to use ngrok. This
    will make your life a lot easier while debugging and testing your custom component
    by allowing you to access the custom component located on your development computer
    directly from ODA. You can download ngrok from the following link:


    [`https://ngrok.com/download`](https://ngrok.com/download)


    Using ngrok, you can expose a specific port from your machine over the Internet.
    This is discussed in detail in section “Expose Custom Component over the Internet.”


    Finally, download a code editor for JavaScript development based on your preference.
    You may consider using Microsoft Visual Studio Code.'
  trans: '

    # 引言


    欢迎来到自定义组件章节。本章将重点介绍 Oracle 数字助手（ODA）的自定义组件。在第 5 章的学习过程中，你已经对自定义组件有了初步了解。假设你对自定义组件已有大致认识，本章将详细阐述自定义组件。自定义组件是指那些你可以根据自身需求亲手打造的组件，最重要的是，你可以完全控制其行为。你将学习从在本地环境中创建自定义组件的基础知识开始，包括本地调试、托管，并最终在技能对话流中使用它们。


    如前所述，在数字助手中，或者更准确地说，在技能中，要执行的任何任务或操作都需要一个组件来实现。考虑一个非常简单的用例：你让用户输入姓名，然后显示一条针对该用户名的个性化问候消息。要实现这个功能，你至少需要使用两个组件。首先，你将使用一个组件来显示提示，要求用户提供姓名。然后，使用第二个组件，根据提供的输入，显示一条包含用户名的个性化问候消息。


    每个操作和机器人响应，无论是输入提示还是显示消息，都需要在对话流中对应一个状态。每个状态将调用且仅调用一个组件来执行任务。尽管 Oracle 数字助手提供了多种可直接使用的内置组件，用于构建机器人流程，但你经常会遇到内置组件不足以执行特定任务的情况。


    特定任务，例如后端集成，你需要调用 REST 服务从后端系统获取所需信息，然后在向用户展示结果之前进行数据处理，这些都需要自定义组件。这仅靠内置组件是无法完成的。这是自定义组件的典型用例：你在自定义组件中使用
    JavaScript 定义自定义逻辑，托管该组件，然后从对话流中调用它以获得所需结果。在使用 Travvy 时，你可能希望使用 REST 服务检索用户特定信息，如全名、年龄、地址等。


    另一个可以考虑使用自定义组件的场景是，当你想要为技能实现一些复杂逻辑，但意识到使用 Apache FreeMarker 无法完成时。在本书的上下文中，考虑
    Travvy 的一个用例：你只允许成年用户（即年龄大于 18 岁）预订行程。如果用户年龄不符合条件，则显示一条消息，说明他/她没有资格使用 Travvy 预订行程。这种类型的复杂逻辑直接在机器人流程中实现不太方便，但使用自定义组件可以有效地完成。话虽如此，根据我们目前的讨论，可以总结出使用自定义组件的以下好处。


    ## 使用自定义组件的好处


    - 对于原本需要多个状态来实现的用例，自定义组件可以使你的对话流保持简洁。

    - 自定义组件如果使用 Oracle Mobile Hub 部署为 API（请参阅“从 ODA 实例访问自定义组件”部分下的图 10-13，其中可以选择 Oracle
    Mobile Cloud 选项），则可以跨不同的技能使用，这些技能甚至可以分布在不同的 ODA 实例中。

    - 由于自定义组件是使用 Node.js 开发的，你可以利用公共且免费的第三方 Node 库。


    ## 自定义组件的用例


    - 默认情况下，Oracle 允许你使用 Google 和 Microsoft 翻译服务为机器人提供多语言支持。但如果你希望为机器人使用任何第三方翻译服务，也可以通过自定义组件来实现。

    - 如果你希望为机器人或任何特定部分（如 API 调用）实现安全性，你也可以考虑使用自定义组件。


    这个列表远不止于此。当你开始使用自定义组件时，你会在自己的特定场景中发现更多的好处和用例。


    现在你已经对自定义组件以及何时应考虑使用它们有了基本了解，是时候开始实践了。在接下来的几个步骤中，你将看到创建第一个自定义组件并开始实现自定义逻辑是多么容易。我们还建议你学习一些
    JavaScript 语言知识，如果你目前还不熟悉的话。这将为后续工作带来极大便利，在处理自定义组件时你会感受到不同。但首先，你需要搭建本地开发环境。这将使你能够在自己的机器上开发自定义组件，在实际部署到云端之前进行调试和测试。


    # 自定义组件的环境搭建


    为了开始使用自定义组件，你需要在本地机器上安装一些必备软件。首先也是最重要的，如果你的本地机器上尚未安装 Node，则需要安装它。你可以从以下链接下载 Node：


    [`nodejs.org/en/download/`](https://nodejs.org/en/download/)


    接下来需要下载 Oracle Bots Node.js SDK。安装 Node 后，你可以使用以下命令全局安装 Oracle Bots Node SDK：


    Windows


    ```

    npm install -g @oracle/bots-node-sdk

    ```


    Mac


    ```

    sudo npm install -g @oracle/bots-node-sdk

    ```


    接下来，你需要下载一个隧道软件。我们将使用 ngrok。这将使你在调试和测试自定义组件时轻松许多，因为它允许你直接从 ODA 访问位于你开发计算机上的自定义组件。你可以从以下链接下载
    ngrok：


    [`ngrok.com/download`](https://ngrok.com/download)


    使用 ngrok，你可以将机器上的特定端口暴露到互联网上。这将在“通过互联网暴露自定义组件”部分详细讨论。


    最后，根据你的偏好下载一个用于 JavaScript 开发的代码编辑器。你可以考虑使用 Microsoft Visual Studio Code。

    '
- fmt: '# Getting Started with Custom Component Development


    Assuming that you followed steps mentioned in the previous section, your local
    environment should be ready for custom component development. As discussed in
    the beginning of this chapter, in next few steps, you will create a custom component
    to validate the user’s age.


    Navigate to the directory where you want to create your custom component and open
    a command prompt from there. Ensure that the directory where you want to create
    your custom component and any directory you create inside your custom component
    should not contain any blank space. See Figure [10-1](#479330_1_En_10_Chapter.xhtml#Fig1)
    for reference.


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig1_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Custom Component location


    From the preceding location, you will create a directory with name `ageValidatorCC`.
    Use the following command in the command line:


    ```

    mkdir ageValidatorCC

    ```


    Once created, navigate to the directory `ageValidatorCC` by using the following
    command:


    ```

    cd ageValidatorCC

    ```


    The next step is to configure your project directory, that is, `ageValidatorCC`
    directory, as a node project. Use the following command:


    ```

    npm init -y

    ```


    This will generate a default `package.json` inside the directory `ageValidatorCC`.
    You can later update this `package.json` file with your project-specific details.
    Refer to Figure [10-2](#479330_1_En_10_Chapter.xhtml#Fig2).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig2_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Configure a node project


    Next, add Oracle Bots Node SDK to your project directory using the following command:


    ```

    npm install --save-dev @oracle/bots-node-sdk

    ```


    If you navigate to directory `ageValidatorCC` now, you will notice that the directory
    contains `package.json` which was created in the last step and also newly added
    node modules inside `node_modules` directory.


    Next you need to add a JavaScript file where you can write your custom logic.
    For this purpose, use the following command:


    ```

    bots-node-sdk init -c AgeValidator

    ```


    Once done, you will see a message stating “Custom Component package ‘ageValidatorCC’
    created successfully!” This will create component package inside your directory
    and add dependencies. Refer to Figure [10-3](#479330_1_En_10_Chapter.xhtml#Fig3).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig3_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Custom Component package


    Congratulations! You have now successfully created your first custom component.
    If you have prior experience of working with node projects, then you must be familiar
    with files displayed in Figure [10-3](#479330_1_En_10_Chapter.xhtml#Fig3). But
    if not, we will briefly go through the files which are mainly of your interest:


    `package.json`: This file contains your project-specific metadata information.
    This includes reference to the entry point of the project, which in this case
    is `main.js`, and JavaScript dependencies for your project. To learn more, refer
    to the following link:


    [`https://docs.npmjs.com/files/package.json`](https://docs.npmjs.com/files/package.json)


    `main.js`: As mentioned before, this file is the default entry point for your
    custom component project. You will notice this file refers to the component’s
    directory where you will be adding your custom component implementation. Refer
    to the following code of `main.js`:


    ```

    module.exports = {

    components: [

    ''./components''

    ]

    };

    ```


    Even if you implement more than one component inside your component directory,
    you can simply access specific component by specifying the component name. You
    don’t have to modify anything in your `main.js` to access that. For example, like
    you have added `AgeValidator` component, you can also add another component `GetUserProfile`
    to retrieve user profile information inside the component’s directory.


    Another point which becomes important in this context is to create some sort of
    logical group at the time of component creation. For instance, you might want
    to put `AgeValidator` and `GetUserProfile` profile components in different directories
    inside `components` to isolate to different implementations. One thing which you
    might want to change is to give a generic name to your parent folder like `odaCustomComponentCC`
    which in this case was `ageValidatorCC`.


    Though this is not a must, it is a good practice to adhere. After all it will
    help you as well as your fellow team members to understand the code implementation
    and pinpoint to a specific component in case of any issue.


    `AgeValidator.js`: This is the JavaScript implementation of your custom component
    which resides under `components` directory. Figure [10-4](#479330_1_En_10_Chapter.xhtml#Fig4)
    shows you the default custom component implementation that gets generated when
    you execute `bots-node-sdk init -c AgeValidator`.


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig4_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Custom component default implementation


    As you can see, `AgeValidator`, by default, exposes two different functions. They
    are `metadata` and `invoke`. Let’s discuss them in a bit more detail here:


    `metadata: ():` As you can see, this function holds the metadata information of
    your component. `metadata` function constitutes of three different attributes.


    *   `name`: This is the unique name to identify your component.

    *   `properties`: This is an object which holds the parameters which are essential
    for your component execution.

    *   `supportedActions`: These are actions supported by your component, which you
    can conditionally dispatch from your component. Based on these actions, you can
    define state transition actions in your bot flow.


    `invoke: (conversation, done):` `invoke` function accepts two argument, namely,
    `conversation` and `done`. `conversation` is a reference to custom component SDK.
    You can use its functions to read the messages which come out from the bot to
    your custom component and write component responses based on those messages. For
    example, assume that you defined a variable as `userAge` along with its type in
    `properties` section, which you are expecting as an input parameter for you custom
    component. Once you pass `userAge` value from your skill, to get that value in
    your custom component, you can use the following code:


    ```

    var givenAge = conversation.properties().userAge;

    ```


    Likewise, you can also define a variable (say `ccResult`) in `properties` section
    along with its type. Then use this variable to pass a value to your bot by setting
    it as follows:


    ```

    conversation.variable(ccResult, ccCalculatedVal);

    ```


    You will invoke `done()`, which is a callback, as soon as your custom component
    finishes its processing and you want to pass the handle to the bot dialog flow.
    For example, you can invoke `done()` right after setting the calculated value
    for the variable as explained in the preceding code. Thus, it would look like
    as follows:


    ```

    conversation.variable(ccResult, ccCalculatedVal);

    done();

    ```'
