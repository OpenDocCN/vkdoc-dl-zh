    *   Regular expression: These entities are based on regular expression (regex)
    to strictly match to specific pattern.


    *   Composite bag: These entities are group of related entities which can resolve
    to specific domain or specific function. You can configure Composite Bag entities
    in different ways. Either you can give the user prompts to enter values for each
    and every entity constituting the composite bag, or you can also give the user
    a prompt to enter a specific entity and derive remaining entities in the composite
    bag based on provided entity value.'
  trans: '

    ### 训练与测试意图


    创建或更新意图后，你需要训练技能，以便模型根据你的更改进行训练。此训练基于不同的机器学习算法，这些算法会使用相关的意图和表述来训练你的技能。当用户与你的技能交互时，此训练可确保你的技能识别出特定意图并做出相应响应。


    当你添加或编辑意图时，你会注意到右上角的`Train`按钮旁会出现一个指示标记（![../images/479330_1_En_5_Chapter/479330_1_En_5_Figv_HTML.jpg](img/479330_1_En_5_Figv_HTML.jpg)）（见图
    5-17）。这表示你需要训练你的技能以应用你的更改。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig17_HTML.jpg](img/479330_1_En_5_Fig17_HTML.jpg)


    图 5-17


    需要训练的指示


    点击`Train`按钮会显示两种不同的训练机制：`Trainer Ht` 和 `Trainer Tm`（见图 5-18）。你可以通过点击相应的单选按钮来选择特定机制。请注意，默认选中
    `Trainer Ht`。在初始开发周期中，当你的训练语料库较小时，请使用 `Trainer Ht` 来训练你的技能。但随着训练语料库逐渐成熟，并且你开始获得准确的意图解析结果时，你最终应转向使用
    `Trainer Tm`。


    现在，你将使用默认的 `Trainer Ht` 训练模型来训练你的技能。由于它是默认选项，要启动该过程，你只需点击 `Submit` 按钮。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig18_HTML.jpg](img/479330_1_En_5_Fig18_HTML.jpg)


    图 5-18


    训练意图


    假设你已经训练了你的技能，接下来你将测试你的意图。


    测试是任何开发周期的核心环节之一，机器人测试也不例外。在机器人开发过程中，应持续测试其功能。一旦你完成了意图的开发，就应该测试这些意图是否按预期运行。


    要测试你的意图，请点击 `Try It Out!`，如图 5-19 所示。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig19_HTML.jpg](img/479330_1_En_5_Fig19_HTML.jpg)


    图 5-19


    测试意图


    这将打开一个新窗口，你可以在其中测试你的意图。输入一个短语进行测试，然后点击 `Send` 按钮。随后，测试器将处理你的短语，并向你显示该短语解析到了哪个意图，以及其他附加信息。见图
    5-20。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig20_HTML.jpg](img/479330_1_En_5_Fig20_HTML.jpg)


    图 5-20


    意图测试


    或者，你也可以通过切换 `Batch` 按钮，然后上传 CSV 文件，以批处理模式测试你的意图。请查看图 5-21。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig21_HTML.jpg](img/479330_1_En_5_Fig21_HTML.jpg)


    图 5-21


    批量上传


    当你为“意图对话”启用对话日志记录，然后按照前面“导出对话日志”一节所述导出对话日志时，即可获得该 CSV 文件。


    ## 使用实体


    在处理意图和表述时，你了解到意图是你打算执行的特定操作，而表述是描述这些意图的有意义的句子。实体是可变元素，为意图提供上下文。简单来说，实体是你在对话过程中向用户寻求的那些值，你将根据这些值来定义机器人的结果或流程。


    例如，对于你的 `FindTrip` 技能，如果用户说“我想预订一次旅行”，那么你知道用户的意图是预订旅行，但与此同时，这是一个非常笼统的陈述。相反，如果用户说“我想预订一次去美国的徒步旅行”，那么上下文就清晰得多。所以，用户想预订旅行，但去哪个地点？答案是去美国。这个有助于为意图提供恰当含义的地点，就被称为实体。因此，如果用户提供了地点，你就可以为他预订特定的旅行，否则你需要询问他地点，以便为他提供合适的预订选项。


    实体分为两类：


    1.  内置实体

    2.  自定义实体


    内置实体或系统实体是 Oracle 作为数字助手实例的一部分提供给你的实体。自定义实体是你根据自己的需求创建的实体。


    ### 内置实体


    内置实体分为两类：


    1.  简单实体

    2.  复杂实体


    #### 简单实体


    简单实体基于原始类型，如字符串和整数。简单实体的示例包括：


    *   `NUMBER`

    *   `EMAIL`

    *   `YES_NO`


    #### 复杂实体


    另一方面，复杂实体基于特定属性。表 5-2 展示了复杂实体及其属性。


    表 5-2


    复杂实体


    | 实体 | 属性 |

    | --- | --- |

    | `ADDRESS` | `city`、`houseNumber`、`road`、`originalString` |

    | `DATE` | `originalString`、`date` |

    | `TIME` | `hrs`、`mins`、`secs`、`"hourFormat":"PM"` |

    | `DURATION` | `startDate`、`endDate`、`originalString` |

    | `SET` | `minute`：范围为 {0–59}，`hour`：范围为 {0–23}，`dayOfTheMonth`：范围为 {1–31}，`monthOfTheYear`：范围为
    {1–12}，`dayOfTheWeek`：范围为 {0–6}，以 0 表示星期日，`year` |

    | `CURRENCY` | `amount`、`currency`、`totalCurrency` |

    | `PHONE_NUMBER` | `phoneNumber`、`completeNumber` |

    | `URL` | `protocol`、`domain`、`fullPath` |


    ### 自定义实体


    自定义实体是特定于技能的实体，你将创建它们来存储或检索自定义值。例如，对于金融机器人，你可以考虑使用 `AccountType` 实体，它可以具有 `Savings`
    和 `Current` 账户等值。或者对于 `PizzaBot`，`CrustType` 可以是 `Thin`、`Thick` 或 `Medium`。


    以下是自定义实体的类型：


    *   **派生实体**：顾名思义，它们派生自内置实体或你定义的自定义实体。

    *   **值列表实体**：这些实体基于预定义的值列表。

    *   **实体列表实体**：这些实体是实体的超集，并基于其他实体的列表。

    *   **正则表达式实体**：这些实体基于正则表达式（regex）来严格匹配特定模式。

    *   **复合包实体**：这些实体是一组相关实体，可以解析到特定领域或特定功能。你可以通过不同方式配置复合包实体。你可以提示用户输入构成复合包的每个实体的值，也可以提示用户输入特定实体，并根据提供的实体值推导出复合包中的其余实体。

