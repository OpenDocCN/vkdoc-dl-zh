  trans: '

    # 后端


    在对话过程中，`Travvy` 需要 `Harold` 输入个人数据和支付信息。尽管对话需要这些数据，但它们不会存储在数字助手本身中。通常，此类信息仅能从后端获取并存储在其中。后端是包含支持对话所需数据的信息系统。聊天机器人必须能够连接到这些后端系统，以便在对话中纳入来自这些系统的信息。


    后端必须提供 REST 接口，以便与数字助手集成。在数字助手内部，需要编写自定义组件来实现与后端系统的实际集成。与后端系统集成的另一种方式是使用表单进行数据输入。`Travvy`
    使用一个表单，让 `Harold` 直接将他的个人数据输入到后端。


    # 实体与表述


    ## 用户说什么/写什么


    在前面的段落中，我们定义了用户的旅程并阐述了他的意图。`Harold` 可以通过多种方式（表述）来表达他的意图。为了确保 `Travvy` 理解 `Harold`
    的意思，需要对 `Travvy` 进行训练。训练机器人是决定其性能的最重要因素。这就是为什么每个意图至少应制定 10 种可能的表述（最好达到 50 种）。最好是这些句子/表述多样化，并且真正来自最终用户。


    切勿仅使用开发和项目团队想出的表述来训练你的机器人：他们太熟悉技术行话了，无法准确代表像 `Harold` 这样的真实用户。


    图 3-13 展示了 `Harold` 某个意图的不同表述。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig13_HTML.jpg](img/479330_1_En_3_Fig13_HTML.jpg)


    图 3-13


    针对“指明度假目的地”意图的表述


    ## Travvy 说什么/回答什么


    请记住，聊天机器人是一种对话式界面。对话应该是互动的。`Travvy` 绝不应回复大段文本（超过 60 个字符就太长了）。因此，回复应该简短，并且应使用图片、按钮、列表和其他用户界面组件，使对话生动有趣、富有成效，并让像
    `Harold` 这样的用户保持参与感。


    图 3-14 展示了如何向用户呈现交互。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig14_HTML.jpg](img/479330_1_En_3_Fig14_HTML.jpg)


    图 3-14


    使用按钮和图片使用户交互更简单，机器人响应更准确


    除了这种呈现对话的方式之外，你还必须确保整个流程都可以通过自然语言完成。图 3-15 展示了一个自然对话的示例。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig15_HTML.jpg](img/479330_1_En_3_Fig15_HTML.jpg)


    图 3-15


    `Travvy` 针对“指明度假目的地”意图的反馈和回答


    `Travvy` 就 `Harold` 的问题/回答给出清晰反馈非常重要。这种反馈将确保 `Harold` 确信 `Travvy` 很好地理解了他。


    定义对话的所有其他可能的用户表述和机器人回复都可以在相关的 Excel 表格中找到。


    通过考虑所有这些技巧，在 `Travvy` 帮助 `Harold` 选择度假目的地并为他预订行程的场景中，对话体验可能如图 3-16 所示。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig16_HTML.jpg](img/479330_1_En_3_Fig16_HTML.jpg)


    图 3-16


    `Harold` 选择一个度假目的地和旅行时段


    `Harold` 可以使用按钮，但他也可以输入/键入他的答案。如果你的聊天机器人是语音驱动的，`Harold` 甚至可以“对” `Travvy` “说话”。


    当 `Harold` 选择了一个行程时，`Travvy` 可以通过要求 `Harold` 验证/编辑他自己及其旅行同伴的个人数据来帮助他进行预订。见图 3-17。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig17_HTML.jpg](img/479330_1_En_3_Fig17_HTML.jpg)


    图 3-17


    `Travvy` 要求 `Harold` 验证/编辑预订所需的所有个人数据


    `Travvy` 使用“客户资料”技能来预填一些已知的数据。为了显示和收集这些数据，`Harold` 将看到一个不同的屏幕。这样他也知道这是聊天机器人对话的一个旁支步骤。在这个屏幕上，他不是在和
    `Travvy` 聊天，而是在认真填写个人数据。


    这个额外的屏幕可能如图 3-18 所示。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig18_HTML.jpg](img/479330_1_En_3_Fig18_HTML.jpg)


    图 3-18


    `Harold` 验证自己的资料并编辑其旅行同伴的个人数据


    如果 `Harold` 现在不想编辑数据，他可以取消此屏幕以返回对话。


    当 `Harold` 输入并验证了数据后，他可以通过点击“确定”关闭个人数据屏幕，并继续对话，例如图 3-19 所示。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig19_HTML.jpg](img/479330_1_En_3_Fig19_HTML.jpg)


    图 3-19


    `Travvy` 现在拥有了预订所需的所有信息


    在任何时候，`Harold` 都应该能够关闭/停止对话。因此，在屏幕的右上角有一个关闭图标。


    # 测试对话界面


    在设计过程的早期阶段评估对话，可以让你在投入大量昂贵的开发工作之前有机会改进流程。


    图 3-20 展示了好的设计如何节省资金。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig20_HTML.jpg](img/479330_1_En_3_Fig20_HTML.jpg)


    图 3-20


    好的设计节省资金


    在互联网上，你可以找到各种用于模拟设计的工具。图 3-21 展示了这样一个模拟示例。


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig21_HTML.jpg](img/479330_1_En_3_Fig21_HTML.jpg)


    图 3-21


    `Travvy` 在 iPhone 上可能出现的启动屏幕模拟图


    通过在设计过程的非常早期阶段创建模拟图，你可以从文本上微调机器人的回答和问题，并找出向用户展示你想要提供的选项的最佳方式。

    '
- fmt: '### Cognitive Walkthrough


    With the mockup, you can do a cognitive walkthrough, a usability evaluation method
    in which you work through a series of tasks – which the user is expected to carry
    out – and ask a set of questions from the perspective of the user like:


    - Will the user try and achieve the right outcome?

    - Will the user notice that the correct action is available?

    - Will the user associate the correct action with the outcome he expects to achieve?

    - If the correct action is performed, will the user see that progress is being
    made toward the intended outcome?


    These insights are then used to improve the usability of the conversational interface.


    In Figures [3-22](#479330_1_En_3_Chapter.xhtml#Fig22), [3-23](#479330_1_En_3_Chapter.xhtml#Fig23)
    and [3-24](#479330_1_En_3_Chapter.xhtml#Fig24) you see the mockup for Travvy,
    showing different ways of displaying the options for Harold to select.


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig23_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig23_HTML.jpg)


    **Figure 3-23** In a carrousel, Harold can select destination and hiking level
    in one go


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig22_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig22_HTML.jpg)


    **Figure 3-22** Harold can select destinations just by clicking the preferred
    option


    Additional to the options for a user to choose, he should be able to formulate/type/say
    his own answer too.


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig24_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig24_HTML.jpg)


    **Figure 3-24** Harold types his own answer


    ### Usability Test


    You can use the mockup to do a usability test with representative users like Harold,
    just by asking them to perform some predefined tasks, interact with Travvy and
    then observe his actions.


    If you do this with the just developed real conversational interface, you do not
    only test its usability, but in one go you also train Travvy to better respond
    to the users’ requests, questions, and answers.


    To get an overall idea about how the user feels about Travvy, you can ask him
    the following:


    - Mention three things you liked best about Travvy.

    - Mention three things you did not like about Travvy.

    - How can we improve Travvy?


    The answers will help you to enhance your digital assistant.


    ## Train the Chatbot


    You can ask Travvy everything, but for sure in the beginning, Travvy will **not**
    understand everything you’re asking.


    To make sure that users do not get annoyed by wrong answers, or by Travvy not
    understanding their questions, it is very important to put some effort in training
    Travvy.


    Figure [3-25](#479330_1_En_3_Chapter.xhtml#Fig25) shows that companies training
    effort reduces the moment the digital assistant gets smarter.


    ![../images/479330_1_En_3_Chapter/479330_1_En_3_Fig25_HTML.jpg](images/479330_1_En_3_Chapter/479330_1_En_3_Fig25_HTML.jpg)


    **Figure 3-25** Training effort reduces when Travvy gets smarter


    In the beginning, training will cost time. But training is simple, and you will
    see very soon that Travvy gets smarter.


    ### Training in Three Steps


    Travvy best can be trained with utterances provided by users. However, you do
    not want to confront real users with an untrained/ignorant chatbot. Therefore,
    it is better to do the training in three steps:


    1.  Train the chatbot yourself. Use Travvy by entering as many utterances as possible.
    You found out a lot about Harold; you know how he might react toward Travvy.

    2.  Ask the reservation employees of Extreme Hiking Holidays (the stakeholders)
    to try out Travvy with their knowledge of the customers who normally call/email
    them.

    3.  Use the usability test (as explained in the former paragraph) to gather utterances
    (entered by real users) and check Travvy’s reply.


    To avoid Travvy asking for clarification of the user’s question or, even worse,
    giving an inappropriate answer, set the **confidence threshold**^([⁴](#fn4)) to
    0.35 or higher and the **win margin** to 0.2. (on how to do that, see Chapter
    [9](#479330_1_En_9_Chapter.xhtml)).


    Then the chatbot will first check which intents match with the question with a
    more than 35% chance. If more intents fulfil that requirement, the bot will look
    at the difference in probability between those intents. If the difference is less
    than 20%, then it will display both or more intents as options for the user to
    choose from.


    While training and testing the chatbot, you can find reports of the results in
    the Insights of the application. In the `Retrainer` tab, you can see which utterances
    lead to an unresolved intent (Travvy does not know the answer). You can then decide
    if you want to add these utterances to a certain intent or maybe even create a
    new intent for them.


