    have also tested it, this brings you to the final section of this chapter, where
    you will see how you can deploy your custom component to an Embedded Container
    in ODA instance. Let’s check that.


    ## Deploying a Custom Component to Embedded Container in ODA Instance


    To deploy a custom component to Embedded Container in ODA instance, you first
    need to package your component. There will be absolutely no change in terms of
    your custom component implementation or in the dialog flow of your skill.


    Open the command prompt and navigate to `ageValidatorCC` directory on your system
    where you have created your custom component implementation. From there, execute
    the following command:


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig22_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig22_HTML.jpg)


    **Figure 10-22** Packaging Custom Component


    ```

    npm pack

    ```


    As you can see in Figure [10-22](#479330_1_En_10_Chapter.xhtml#Fig22), this generated
    an archive with name `ageValidatorCC-1.0.0.tgz` inside `ageValidatorCC` directory.


    Next, navigate to the Components screen by clicking the ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figh_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Figh_HTML.jpg)
    button from the left-hand menu.


    From Components screen, you first need to delete the existing deployment where
    you are referring to the component running on your local machine. To do so, click
    the ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figi_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Figi_HTML.jpg)
    button which you will find in the top-right corner of your screen. When you click
    the button, you will see a new window asking you to provide the confirmation to
    delete the component. Agree to that.


    Now you should have an empty Components screen with ![../images/479330_1_En_10_Chapter/479330_1_En_10_Figj_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Figj_HTML.jpg)
    button in the middle of the screen. You will once again start the same process
    of creating a new component service. Click the Service button and this time fill
    in the details for Embedded Container as shown in Figure [10-23](#479330_1_En_10_Chapter.xhtml#Fig23).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig23_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig23_HTML.jpg)


    **Figure 10-23** Custom Component service with Embedded Container


    After filling the details, drag and drop the `ageValidatorCC-1.0.0.tgz` archive
    in the Package File section.


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig24_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig24_HTML.jpg)


    **Figure 10-24** Custom Component upload


    Click the Create button as shown in Figure [10-24](#479330_1_En_10_Chapter.xhtml#Fig24)
    to create the service. Wait for a while till the deployment gets finished. Once
    done, you should get a screen as shown in Figure [10-25](#479330_1_En_10_Chapter.xhtml#Fig25).


    ![../images/479330_1_En_10_Chapter/479330_1_En_10_Fig25_HTML.jpg](images/479330_1_En_10_Chapter/479330_1_En_10_Fig25_HTML.jpg)


    **Figure 10-25** Custom Component deployed on Embedded Container


    Notice that all details related to your component remain the same as earlier except
    this time you can see that the “Service Type” is “Embedded Container” which displays
    the package which you have just uploaded. In addition to that, by clicking the
    “Diagnostics” button, you get two options, namely, “View Logs” and “View Crash
    Report.” You can use these options to check logs and crash reports, respectively,
    for your custom component.


    You should now reexecute trip booking test scenario discussed previously and should
    play around with different ages to see the outcome.


    ## Summary


    Custom components become an integral part of Skill development whenever you want
    to implement a functionality which built-in components cannot support. In the
    beginning of this chapter, you were introduced to custom components, and by the
    time you reached the end, you are ready with a custom component deployed and running
    in Embedded Container. By now, you must have realized how important it is to have
    a local development environment for custom components to be able to create, run,
    and debug components on your machine. You are now also aware of different approaches
    to create a custom component service for your Skill in ODA instance. Hope you
    find this topic interesting, and will see you again in the next chapter.


