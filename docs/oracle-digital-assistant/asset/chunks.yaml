  trans: '

    # 引言


    在本节的前几章中，您学习了如何基于 Oracle 技术构建一些非常智能的数字助手。它们在多种渠道上都能良好运行，并涵盖了您能想到的大多数用例。在本章中，您将学习如何为数字助手增添额外维度。首先，您将学习如何通过情感分析来丰富数字助手，接着学习如何为数字助手添加语音功能。阅读本章时，您将清楚认识到，这两项新增功能都基于对前几章所学知识的巧妙运用。


    # 情感分析


    如果您想创建一个行为更接近人类而非机器人的聊天机器人，它应当能够理解用户所说的话，甚至能理解上下文、语气以及诸如讽刺等细微差别。实现这种行为最显而易见的方式就是引入情感分析。


    根据词典定义，情感分析是"*通过计算方式识别和分类文本中表达的观点，特别是为了判断作者对特定主题、产品等的态度是正面、负面还是中性的过程。*"


    当您为机器人添加情感分析功能后，它将能更好地理解用户。如果机器人能感知用户是满意、沮丧还是愤怒，它就能更好地解析意图，并很可能让技能的反应更不像机器人，而更像人类。这能提升用户满意度，进而对您的业务产生积极影响。这一切都基于人类心理学。感到快乐或中性的人往往更能接受坏消息或挫折，而悲伤、失望或愤怒的人则耐心非常有限。


    要实现这一点，您必须非常谨慎。过去，像微软的 Tay 聊天机器人这样的实验就失败了。Tay 仅仅通过与用户互动就变成了恐同、种族主义和纳粹分子。Tay 基于用户的回应进行学习，而用户反过来又教会了
    Tay 成为一个"坏机器人"。您很容易理解，这绝不应发生在您公司的机器人身上。诸如语法、讽刺与挖苦、措辞选择、文化差异以及任何对人类来说非常正常的因素，都必须加以考虑，并且可能影响机器人的回应。对此没有简单的解决方案。因此，每当您决定为机器人添加情感分析时，必须确保不会损害您品牌的形象和声誉。


    为了在 Oracle 数字助手中添加此类功能，您可以使用第三方服务，因为 Oracle 数字助手没有内置的解决方案。


    # 实施前需要考虑什么？


    在聊天机器人的背景下，情感分析可以通过多种方式实现，但实施方式始终应受您的需求影响。出于商业目的调用任何第三方 API 都会涉及成本。因此，在开始实施之前，了解范围和可用预算至关重要。


    明确了这些事实后，让我们考虑几个现实场景。恶意用户经常通过提出无关问题来试图破坏机器人流程，例如："你是男是女？"、"天气怎么样？"、"你是机器人吗？"、"你爱我吗？"等等。您应该尝试在一开始就打断任何此类对话，并尝试将用户引导回机器人的上下文。处理此类对话最常见的方法是将它们添加到技能的
    `unresolvedIntent` 中。或者，您也可以在技能中创建一个特定的意图来处理此类对话。这可以是一个专门的"闲聊"技能，让数字助手能够应对此类问题并保持对话进行。使用技能的
    Insight 功能密切关注此类对话，并不断将这些用户输入添加到 `unresolvedIntent` 或您的特定意图中。


    另一种可能的方式是，如果您通过数字助手而非直接在渠道上暴露技能，可以添加一个明确的技能来处理此类闲聊对话。如果您希望实施这种方法，则无需将上述用户输入添加到任何特定意图或
    `unresolvedIntent` 中。相反，您在专门的技能中创建意图来处理此类对话，并让数字助手负责路由。这种方法允许您保持业务特定技能背后的逻辑清晰。


    如果上述方法并非您所寻找的，而您更希望依赖更复杂的方法，那么使用第三方 API 是前进的方向。如前所述，使用第三方 API 总是会产生成本，但它们也带来各种好处。最重要的是，在使用此类
    API 服务时，您无需在技能或数字助手中实现任何复杂功能来分析用户情感。由于这些 API 是为高度商业化的目的而构建的，您可以信赖它们分析用户输入的精确性。


    此类 API 将用户输入大致分为三类：正面、中性和负面。但也有服务提供更多类别，例如极度正面或非常正面，以及极度负面或非常负面。在使用此类服务时，根据它们对用户输入的分析结果，您可以设计机器人的适当对话流程。例如，考虑一个场景，您根据
    API 结果向最终用户发送反馈表单。


    目前有多种商业 API 可用于情感分析。以下是一些流行的情感分析 API 列表：


    * Google 情感分析

    * IBM Watson 语调分析器 API

    * Qemotion

    * AYLIEN API

    * PreCeive API

    * MoodPatrol API

    * Indico API

    * ParallelDots

    * DeepAI


    为了使用您选择的任何情感分析 API，您首先需要在其网站上向 API 提供商注册。这将使您获得访问令牌。使用该令牌，您就可以从聊天机器人调用 API。这个过程应该相当简单，并且由于您可以选择任何可用的
    API 提供商，这完全取决于您。通常，这些第三方在设置期间会提供一个密钥或令牌，在调用其 API 时应使用该密钥或令牌。我们建议您将访问令牌放在手边，因为在接下来的章节中会用到它。


    # 从文本分析情感


    为了使用任何第三方 API 服务分析文本，您只需将用户的输入从技能传递给 API。然后 API 分析输入值并返回结果。根据 API 的结果，您可以设计聊天机器人的流程。


    要从技能调用情感分析 API，您将使用自定义组件。自定义组件已在第 10 章中详细讨论过。


    这个过程将很直接。在调用自定义组件时，您需要将用户输入从技能传递给自定义组件。在自定义组件内部，您将从 `invoke` 函数的 `conversation`
    参数中提取用户输入（`conversation` 是对 `bots-node-sdk` 的引用）。然后，您将提取的输入传递给情感分析 API。调用情感分析
    API 的方式可能因提供商而异，您需要注意这一点。一旦收到 API 结果，就将其从自定义组件传回技能。这就是您需要做的全部工作。这些步骤中的每一步都将在下一节中进一步详细描述。

    '
- fmt: "# Invocation of Sentiment Analysis API\n\nCreate a skill in your Oracle Digital\
    \ Assistant environment and name it as `TravvySentimentAnalysis`. For the time\
    \ being, this skill will be implemented with bare minimum functionality for the\
    \ sentiment analysis demonstration purpose. Add the following code in `Flows`:\n\
    \n```\n#metadata: information about the flow\n#  platformVersion: the version\
    \ of the bots platform that this flow was written to work with\nmetadata:\nplatformVersion:\
    \ \"1.0\"\nmain: true\nname: TravvySentimentAnalysis\n#context: Define the variables\
    \ which will used throughout the dialog flow here.\ncontext:\nvariables:\n#states\
    \ is where you can define the various states within your flow.\nstates:\naskFeedback:\n\
    component: \"System.Output\"\nproperties:\ntext: \"How was your experience with\
    \ Travvy?\"\ntransitions:\nnext: \"checkFeedback\"\ncheckFeedback:\ncomponent:\
    \ \"com.hiking.SentimentAnalysis\"\nproperties:\ntransitions:\nactions:\nPositive:\
    \ \"Positive\"\nNegative: \"Negative\"\nNeutral: \"Neutral\"\nPositive:\ncomponent:\
    \ \"System.Output\"\nproperties:\ntext: \"Thanks for your positive feedback\"\n\
    transitions:\nreturn: \"done\"\nNegative:\ncomponent: \"System.Output\"\nproperties:\n\
    text: \"Thanks for your response. Apologies for a bad experience\"\ntransitions:\n\
    return: \"done\"\nNeutral:\ncomponent: \"System.Output\"\nproperties:\ntext: \"\
    Thanks!\"\ntransitions:\nreturn: \"done\"\n```\n\nAs part of first state `askFeedback`,\
    \ you will request the user to provide feedback of Travvy. Once the user responds\
    \ back, you will then invoke the custom component `com.hiking.SentimentAnalysis`\
    \ in the state `checkFeedback`. In subsequent steps, state transition will be\
    \ performed based on the action response of the custom component.\n\nNext, create\
    \ a custom component with the name `sentimentAnalysisCC` following the steps mentioned\
    \ to you during the course of Chapter [10](#479330_1_En_10_Chapter.xhtml). Once\
    \ done, create a JavaScript file with the name `SentimentAnalysis.js` inside your\
    \ custom component. This has also been explained in the same Chapter [10](#479330_1_En_10_Chapter.xhtml).\
    \ After that add the following code in the `SentimentAnalysis.js`:\n\n```\nvar\
    \ request = require('request');\nmodule.exports = {\nmetadata: () => ({\nname:\
    \ 'com.hiking.SentimentAnalysis',\nsupportedActions: ['Positive','Negative','Neutral']\n\
    }),\ninvoke: (conversation, done) => {\n// perform conversation tasks.\n// retrieve\
    \ user input and store it into a variable\nconst userInput = conversation.text();\n\
    // Invoke API\nrequest.post({\nurl: 'https://api.deepai.org/api/sentiment-analysis',\n\
    json: true,\nheaders: {\n'Api-Key' : 'YourAPIKeyGoesHere',\n},\nform: {\n'text':\
    \ userInput,\n}\n}, function(error, response, body){\nif (response.statusCode\
    \ === 200) {\nif (body.output[0] === 'Positive') {\nconversation.transition('Positive');\n\
    done();\nreturn;\n} else if (body.output[0] === 'Negative') {\nconversation.transition('Negative');\n\
    done();\nreturn;\n} else if (body.output[0] === 'Neutral') {\nconversation.transition('Neutral');\n\
    done();\nreturn;\n}\n} else {\nconversation.logger().error(errText);\nconversation.transition();\n\
    done();\nreturn;\n}\n});\n}\n};\n```\n\nInline comments have already been added\
    \ for the steps described in the preceding code snippet. For this case, we have\
    \ used the sentiment analysis API of DeepAI. After updating your custom component\
    \ with the preceding changes, all you need to do is to package and deploy. Again,\
    \ packaging and deployment of custom components have been described in detail\
    \ in Chapter [10](#479330_1_En_10_Chapter.xhtml).\n\nOnce you complete these steps,\
    \ you should try to test this skill. You may use in-built Skill Tester for this\
    \ purpose. Figure [11-1](#479330_1_En_11_Chapter.xhtml#Fig1) displays a simple\
    \ test case of what you have done so far in this section.\n\n![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig1_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1\n\nSentiment analysis from text\n\n## Speech\n\nNowadays, there’s\
    \ a growing use of speech-enabled personal assistants, such as Google Home, Amazon\
    \ Alexa, Apple Siri, Microsoft Cortana, and many more. What if you could add speech\
    \ to Oracle Digital Assistant? As you have already learned, Digital Assistant\
    \ can be exposed over several predefined channels. Other channels that are not\
    \ supported out of the box can also be used, but in order to do that, you must\
    \ use an HTTP `webhook channel` and manually integrate the Digital Assistant with\
    \ that channel.\n\nThe key question is: Can speech be considered a separate channel,\
    \ and if so, how can this be configured and implemented in Oracle Digital Assistant?\
    \ Obviously, the answer to the first part of the question is yes. Speech can be\
    \ considered a separate channel, and to be more precise, you would have to define\
    \ a separate channel for Amazon Alexa, Google Home, and others.\n\nWith that out\
    \ of the way, you will now learn how to implement speech for Oracle Digital Assistant.\n\
    \n### Note\n\nAt the moment of the writing of this book, Amazon Alexa, Google\
    \ Home, and other third-party provider services were the only way of exposing\
    \ Oracle Digital Assistant over speech channels. Oracle recently acquired speak.ai\
    \ and is working on implementing their own speech engine and adding it to Oracle\
    \ Digital Assistant. When that is in place, you can still use the third-party\
    \ solutions, but Oracle then provides you with the option to enable speech interaction\
    \ completely embedded in the Oracle Digital Assistant without having to rely on\
    \ third-party services.\n\n### What Do You Need?\n\nBefore you learn how to implement\
    \ the webhook channel, you first need some understanding of what a webhook is\
    \ and how it works. In short webhooks, technically, are “user-defined callbacks\
    \ made with HTTP.” Webhooks are typically used to connect two different applications.\
    \ When an event happens on the trigger application, it sends (POST) data to a\
    \ webhook URL from the action application. Webhooks use “event reaction” (don’t\
    \ call us, we’ll call you). This concept avoids the need for constant polling\
    \ from the receiving end to the sending end.\n\nTo create a webhook channel in\
    \ Oracle Digital Assistant, you need the following:\n\n*   A publicly accessible\
    \ HTTP messaging server that relays messages between the user device and your\
    \ bot using a webhook. Typically, in an Oracle Cloud environment, you would use\
    \ an Oracle Compute Instance to host this, but any node server will do. You implement\
    \ this webhook in node, and it will need to implement the following two endpoints:\n\
    \    *   A POST to receive messages from our bot\n    *   A POST to send messages\
    \ to our bot\n\n*   The URI of the webhook call that receives your bot’s messages\
    \ (so the bot knows where to send the messages).\n\n*   The webhook URL that’s\
    \ generated for your bot after you complete the Create Channel dialog (so that\
    \ the message server can access your bot).\n\nFor all these pieces to come together\
    \ in a working webhook-based solution, you need to set up the node server, configure\
    \ the webhook channel on Digital Assistant, write the Node.js implementation for\
    \ the incoming and outgoing webhook, and configure the speech engine(s).\n\n###\
    \ Note\n\nFor this purpose of explaining how to add speech to Oracle Digital Assistant,\
    \ Amazon Alexa is used. Other platforms can be added in the same way such as Google\
    \ Assistant, as long as they support webhooks.\n\nFigure [11-2](#479330_1_En_11_Chapter.xhtml#Fig2)\
    \ shows the overall picture of this solution:\n\n![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig2_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig2_HTML.jpg)\n\
    \nFigure 11-2\n\nDigital Assistant to Alexa architecture\n\n### Note\n\nExtended\
    \ documentation of the Alexa app node package can be found at [`www.npmjs.com/package/alexa-app`](http://www.npmjs.com/package/alexa-app).\n\
    \nYou can even change the way Alexa is speaking by using an `ssml-builder` to\
    \ manipulate the output. The `ssml-builder /amazon_speech` node package can add\
    \ Alexa-specific SSML tags to the output, thus instructing Alexa to speak in a\
    \ different way."
