    # 处理意图与表述


    在本节中，您将学习如何：


    - 创建意图

    - 向意图添加表述

    - 导出意图

    - 导入意图

    - 训练和测试意图


    在本书的第 2 章中，您已经了解了意图和表述的相关概念。


    快速回顾一下，**意图**可以描述为您打算通过技能执行的一项工作或任务。为了描述这些意图，您需要将它们与示例句子关联起来。这些描述意图的示例句子被称为**表述**。


    例如，如果您创建了一个`PizzaSkill`，您可能希望使用该技能来订购披萨。为此，您可以添加一个意图，比如`OrderPizza`，它允许用户通过该技能订购披萨。为了让技能识别用户的意图，您只需向技能中添加一些示例表述，例如“帮我订一份披萨。”当用户与技能交互并说出/写下“帮我订一份披萨”时，技能将能够根据该表述解析出具体的意图，在本例中就是`OrderPizza`。您添加的表述越多，您的技能就越健壮。


    您的表述应该是完整且有意义的句子，但长度不要超过 255 个字符。较短的表述通常能带来更好的结果，因为它们往往更简洁，填充词更少。此外，表述不应由单个单词构成。


    ### 提示


    最初，您至少应该为定义的每个意图创建十到十五条表述。这能确保更好的意图解析效果。当您准备将技能部署到生产环境时，您将需要更多的表述。为意图识别表述是一个迭代过程——如果做得好，会带来良好的结果。


    每个技能必须至少关联两个意图。因此，如果以`PizzaSkill`为例，它应该包含两个意图，比如`OrderPizza`和`CancelPizza`。


    ## 创建意图


    在本节中，您将向之前在本章中创建的`FindTrip`技能中添加意图。展开`FindTrip`技能，然后从左侧菜单导航到意图部分 ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figs_HTML.jpg](img/479330_1_En_5_Figs_HTML.jpg)。


    点击`+ Intent`按钮来添加一个意图。点击该按钮后，您会注意到一个默认名称为`Intent1`的意图被创建。参见图 5-12。然后，您需要为意图指定一个合适的名称，在本例中为`SelectTrip`。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig12_HTML.jpg](img/479330_1_En_5_Fig12_HTML.jpg)


    图 5-12


    创建意图


    将意图的**对话名称**更新为“选择您的行程”，并将**名称**更新为`SelectTrip`。当技能无法解析某个意图时，对话名称会在对话中显示（作为选项）；而在您的对话流程中，您通过名称来识别任何意图。如果需要，您还可以为意图添加**描述**，但这并非强制要求。


    ## 向意图添加表述


    要向意图添加表述，您需要将它们添加到**示例**部分下，位于占位符文本为“在此处输入您的示例表述”的文本区域中（参见图 5-13）。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig13_HTML.jpg](img/479330_1_En_5_Fig13_HTML.jpg)


    图 5-13


    添加表述


    一旦您开始添加表述，这个列表就会增长。如果您想查找特定的表述，可以在`Filter`字段中输入该表述进行搜索，系统随后会在已添加的表述中进行搜索。


    ## 导出意图


    您可以从一个技能中导出意图，然后将这些意图用于另一个技能。这样，如果需要为多个技能创建相同的意图，可以节省您的精力。以下步骤将说明如何导出意图：


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig14_HTML.jpg](img/479330_1_En_5_Fig14_HTML.jpg)


    图 5-14


    导出意图


    1. 导航到技能中的**意图**部分 ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figt_HTML.jpg](img/479330_1_En_5_Figt_HTML.jpg)。

    2. 点击“更多”按钮，然后选择**导出意图**（参见图 5-14）。


    这会将您的意图导出到一个 CSV 文件中。在本例中，该文件名为`FindTrip-Intents.csv`。导出的 CSV 文件包含三列，分别是`query`、`topIntent`和`conversationName`。`query`列包含表述，而`topIntent`和`conversationName`列则包含相关意图的名称以及该意图的对话名称（参见图
    5-15）。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig15_HTML.jpg](img/479330_1_En_5_Fig15_HTML.jpg)


    图 5-15


    `FindTrip-Intents.csv`


    ### 注意


    当您导出意图时，技能中存在的所有意图都将被导出到一个 CSV 文件中。


    ## 导入意图


    要将意图导入到您的技能中，您需要导入包含已导出意图的 CSV 文件，如上一节所示。以下步骤将说明如何导入意图：


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig16_HTML.jpg](img/479330_1_En_5_Fig16_HTML.jpg)


    图 5-16


    导入意图


    1. 导航到技能中的**意图**部分 ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figu_HTML.jpg](img/479330_1_En_5_Figu_HTML.jpg)。

    2. 点击“更多”按钮，然后选择**导入意图**。参见图 5-16。


    如前所述，“导出意图”会导出技能包含的所有意图。因此，“导入意图”会将所有导出的意图添加到您的技能中。如果您想添加特定的意图及其关联的表述，则需要在将导出的
    CSV 文件导入技能之前，手动编辑该文件。

