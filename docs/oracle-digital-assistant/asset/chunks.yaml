- fmt: '# Webview Application Hosted Externally


    In this section, we will explain to you how to host your web application outside
    of your Digital Assistant and invoke the same with the help of an intermediary
    service. For this part, you will be reusing the application created in previous
    sections with bare minimum changes. We would advise you to make a copy of the
    web application created earlier in a separate folder and clone your skill with
    a different name, say `TravvyWebviewExternal`. Though in real-time scenario, you
    are not restricted to use a SPA for this kind of implementation, for now it is
    enough for the demonstration purpose. You will be using `ngrok` to expose your
    intermediary service and your web application to the Internet.


    ## Create Intermediary Service


    On your machine, create a folder with name `intermediaryService` to implement
    the service.


    ```

    mkdir intermediaryService

    ```


    Navigate to the folder using the following command:


    ```

    cd intermediaryService

    ```


    Configure this as a node project by issuing the command:


    ```

    npm init -y

    ```


    This will generate a default `package.json` in your `intermediaryService` directory.
    You will be using `Express` to create this service. From the same command prompt/terminal,
    issue the following command:


    ```

    npm install express --save

    ```


    Create a file with name `index.js` in your `intermediaryService` directory and
    add the following code to it:


    ```

    var express = require("express");

    const bodyParser = require("body-parser");

    var app = express();

    app.use(bodyParser.json());

    app.post("/travvyWebApp", (req, res) => {

    let requestBody = req.body;

    let parameters = requestBody.parameters;

    let firstName = getWebviewParam(parameters, ''travellerFirstName'', null);

    let callbackUrl = getWebviewParam(parameters, ''webview.onDone'', null);

    //ngrok URL of the Web application

    let responseUrl = "https://d64ae6e3.ngrok.io?callbackUrl="+callbackUrl+"&firstName="+firstName;

    res.status(200).json({

    "webview.url": responseUrl

    })

    });

    function getWebviewParam (arrParams, key, defaultValue) {

    if (arrParams) {

    let param = arrParams.find(e => {

    return e.key === key;

    });

    return param ? param.value : defaultValue;

    }

    return defaultValue;

    };

    app.listen(4000, () => {

    console.log("Server running on port 4000");

    });

    ```


    In this service, you are reading input parameter (`travellerFirstName`) and callback
    URL sent by the skill with the help of `getWebviewParam` function. After that
    you are constructing a response URL which contains the URL of your web application,
    `firstName` (received as `travellerFirstName` from the skill), and callback URL
    from the Webview component received from your skill, for the web application.
    In the preceding code, you will need to replace web application URL `https://d64ae6e3.ngrok.io`
    which we will explain to you just in a while. You are passing this URL to your
    skill as a JSON object with in the `webview.url` parameter.


    ## Web Application Implementation


    Only change which you need to do in your previously copied application will be
    in `main.js` file. Navigate to the folder where you copied your web application.
    Locate your `main.js` file and replace the entire code with the following:


    ```

