- fmt: "### Adding Q&A to the Dialog Flow\n\nThe final step in setting up this Q&A\
    \ skill is to enter the Q&A flow in the flow editor. If you open the flow editor,\
    \ you will see that it already contains code. Everything below the `states` keyword\
    \ can be removed, because it is not needed for this Q&A bot. Also you can remove\
    \ the comments if you like. With a clean editor, it is now easy to set up the\
    \ Q&A flow.\n\nThis “Q&A only” skill will have two states:\n\n- **Q&A**: The state\
    \ that allows for the questions to be entered and the answers to be shown.\n-\
    \ **Unresolved**: As always, a skill needs an `unresolved` state to make sure\
    \ the conversation does not crash when the Digital Assistant does not understand\
    \ what the user wants.\n\nThe `Q&A` state here is the main state for the Q&A,\
    \ and the next state should always be `Q&A`, thus routing back to Q&A when an\
    \ answer is returned. Therefore, the configuration is as follows:\n\n- `component`:\
    \ `System.Q&A`\n- `transitions`:\n  - `actions`:\n    - `none`: `unresolved`\n\
    \  - `next`: `travvyQnA`\n\nThe final result is shown in the following code:\n\
    \n```\nmetadata:\nplatformVersion: \"1.0\"\nmain: true\nname: \"TravvyQnA\"\n\
    context:\nvariables:\ngreeting: \"string\"\nname: \"string\"\nterminateChoice:\
    \ \"string\"\nstates:\ntravvyQnA:\ncomponent: \"System.QnA\"\ntransitions:\nactions:\n\
    none: \"unresolved\"\nnext: \" travvyQnA\"\nunresolved:\ncomponent: \"System.Output\"\
    \nproperties:\ntext: \"Sorry, I did not find any match. Can you rephrase the question?\"\
    \ntransitions:\nreturn: \"done\"\n```\n\nLet’s see what happens when we ask “how\
    \ can I pay my voyage” in the Skill Tester.\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig17_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig17_HTML.jpg)\n\
    \n**Figure 9-17** Default behavior in tester\n\nYou see at the right side of Figure\
    \ [9-17](#479330_1_En_9_Chapter.xhtml#Fig17) that there are four Q&A sets selected\
    \ by the Q&A. All four are also displayed in the carousel where you can use the\
    \ arrow buttons to browse the options. This behavior can be changed by tweaking\
    \ the properties of the `System.QnA` component. To reduce the number of Q&A pairs\
    \ presented to the user, you can use the `matchListLimit` property.\n\nIn the\
    \ following listing, this property is set to `1`:\n\n```\ntravvyQnA:\ncomponent:\
    \ \"System.QnA\"\nproperties:\nmatchListLimit: 1\ntransitions:\nactions:\nnone:\
    \ \"unresolved\"\nnext: \" travvyQnA\"\n```\n\nThe behavior will change, and you\
    \ can see this in the tester (Figure [9-18](#479330_1_En_9_Chapter.xhtml#Fig18)):\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig18_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig18_HTML.jpg)\n\
    \n**Figure 9-18** Behavior with `matchListLimit=1`\n\nOnly the first option is\
    \ displayed to the user, and he gets an extra option to display “More Answers.”\n\
    \nThere are more options that you can use to influence the behavior of the Q&A\
    \ such as the aforementioned `QnASkipIfIntentFound` and the `confidenceTreshold`.\n\
    \nTo show what happens when you mix Q&A with Intents and play with the available\
    \ options, we added a simple intent (`PayTrip`) to the Q&A skill.\n\n> **Note**:\
    \ For the Travvy Digital Assistant, we will keep the Q&A in a clean separate skill\
    \ without intents. At a later stage, we will add this skill to the Digital Assistant.\n\
    \nFirst we will have a look at what happens with the `confidenceTreshold`. We\
    \ will use the utterance **“I need to fulfill the invoice,”** which can relate\
    \ to Q&A or to the `PayTrip` intent. When the `confidenceTreshold` is set to `0.6`,\
    \ the skill will immediately show the Q&A that it finds (Figure [9-19](#479330_1_En_9_Chapter.xhtml#Fig19)),\
    \ because the Intent score percentage is `0.49`, which is less than the `confidenceTreshold`.\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig19_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig19_HTML.jpg)\n\
    \n**Figure 9-19** Less than `confidenceTreshold`\n\nNow if we decrease the `confidenceTreshold`\
    \ from `0.6` to `0.5`, you will see that the skill behaves differently and shows\
    \ both the intent and the Q&A and lets the user pick what he wants (Figure [9-20](#479330_1_En_9_Chapter.xhtml#Fig20)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig20_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig20_HTML.jpg)\n\
    \n**Figure 9-20** Over `confidenceTreshold`\n\nNow finally we can change the `QnASkipIfIntentFound`\
    \ from `false` to `true` and see what the effect is (Figure [9-21](#479330_1_En_9_Chapter.xhtml#Fig21)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig21_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig21_HTML.jpg)\n\
    \n**Figure 9-21** `qnaSkipIfIntentFound` is set to `true`\n\n```\nIntent:\ncomponent:\
    \ \"System.Intent\"\nproperties:\nvariable: \"iResult\"\nqnaEnable: true\nqnaSkipIfIntentFound:\
    \ true\ntransitions:\nactions:\nunresolvedIntent: \"unresolved\"\npayTrip: \"\
    payTrip\"\nqna: \"travvyQna\"\n```\n\nNow let’s set `QnASkipIfIntentFound` back\
    \ to `false`. When the user says “**I need to pay my voyage,**” the skill shows\
    \ both options because there is an intent scoring above the confidence threshold\
    \ and a matching question, but ranks the intent first (Figure [9-22](#479330_1_En_9_Chapter.xhtml#Fig22)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig22_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig22_HTML.jpg)\n\
    \n**Figure 9-22** Intent is showed first\n\nWhen the user uses one of the “Question\
    \ Verbs or prefixes” as defined in the Q&A Routing Config, this indicates that\
    \ a user is asking a question. The link for the Q&A response is shown first as\
    \ it gets “priority” over the link for the intent response (Figure [9-23](#479330_1_En_9_Chapter.xhtml#Fig23)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig23_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig23_HTML.jpg)\n\
    \n**Figure 9-23** Q&A shown first\n\nThere is one more thing to configure, and\
    \ that is the Q&A routing. You can add custom “**Request Sentence Prefix**” to\
    \ the routing section. Let’s see what will happen if you add “**I want to**” to\
    \ that section and ask the skill “I want to pay my trip.”\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig24_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig24_HTML.jpg)\n\
    \n**Figure 9-24** Intent shown after configuring Q&A routing\n\nThere you go.\
    \ The skill now understands exactly what you want to do, and it will resolve the\
    \ `PayTrip` intent (Figure [9-24](#479330_1_En_9_Chapter.xhtml#Fig24)).\n\nThere\
    \ are many ways to influence and configure the Q&A behavior, and besides it is\
    \ really key that you understand all the options, as you will have to use them\
    \ in different ways in different situations, depending on the requirements of\
    \ your skill.\n\n## Summary\n\nFrequently asked questions are common questions\
    \ that are looking for an answer. They often already exist on a company’s web\
    \ site and can easily be brought to your bot. In this chapter, you learned how\
    \ to develop a Q&A skill and how to use it in your Digital Assistant. You should\
    \ now be able to understand how to configure Q&A in Oracle Digital Assistant and\
    \ how to improve Q&A sets for an optimal user experience.\n\n# Part V: Advanced\
    \ Topics\n\n# 10. Extending Your Digital Assistant with Custom Components"
  raw: "### Adding Q&A to the Dialog Flow\n\nThe final step in setting up this Q&A\
    \ skill is to enter the Q&A flow in the flow editor. If you open the flow editor,\
    \ you will see that it already contains code. Everything below the “states” keyword\
    \ can be removed, because it is not needed for this Q&A bot. Also you can remove\
    \ the comments if you like to. With a clean editor, it is now easy to set up the\
    \ Q&A flow.\n\nThis “Q&A only” skill will have two states:\n\n*   Q&A: The state\
    \ that allows for the questions to be entered and the answers to be shown.\n\n\
    *   Unresolved: As always, a skill needs an “unresolved” state to make sure the\
    \ conversation does not crash when the Digital Assistant does not understand what\
    \ the user wants.\n\nThe “Q&A” state here is the main state for the Q&A, and the\
    \ next state should always be “Q&A,” thus routing back to Q&A when an answer is\
    \ returned. Therefore, the configuration is as follows:\n\n*   component: “System.Q&A”\n\
    \n*   transitions:\n    *   actions:\n        *   none: “unresolved”\n\n    *\
    \   next: “travvyQnA”\n\nThe final result is shown in the following code:\n\n\
    ```\nmetadata:\nplatformVersion: \"1.0\"\nmain: true\nname: \"TravvyQnA\"\ncontext:\n\
    variables:\ngreeting: \"string\"\nname: \"string\"\nterminateChoice: \"string\"\
    \nstates:\ntravvyQnA:\ncomponent: \"System.QnA\"\ntransitions:\nactions:\nnone:\
    \ \"unresolved\"\nnext: \" travvyQnA\"\nunresolved:\ncomponent: \"System.Output\"\
    \nproperties:\ntext: \"Sorry, I did not find any match. Can you rephrase the question?\"\
    \ntransitions:\nreturn: \"done\"\n```\n\nLet’s see what happens when we ask “how\
    \ can I pay my voyage” in the Skill Tester.\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig17_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig17_HTML.jpg)\n\
    \nFigure 9-17\n\nDefault behavior in tester\n\nYou see at the right side of Figure\
    \ [9-17](#479330_1_En_9_Chapter.xhtml#Fig17) that there are four Q&A sets selected\
    \ by the Q&A. All four are also displayed in the carousel where you can use the\
    \ arrow buttons to browse the options. This behavior can be changed by tweaking\
    \ the properties of the system.QnA component. To reduce the number of Q&A pairs\
    \ presented to the user, you can use the matchListLimit property.\n\nIn the following\
    \ listing, this property is set to “1”:\n\n```\ntravvyQnA:\ncomponent: \"System.QnA\"\
    \nproperties:\nmatchListLimit: 1\ntransitions:\nactions:\nnone: \"unresolved\"\
    \nnext: \" travvyQnA\"\n```\n\nThe behavior will change, and you can see this\
    \ in the tester (Figure [9-18](#479330_1_En_9_Chapter.xhtml#Fig18)):\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig18_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig18_HTML.jpg)\n\
    \nFigure 9-18\n\nBehavior with matchListLimit=1\n\nOnly the first option is displayed\
    \ to the user, and he gets an extra option to display “More Answers.”\n\nThere\
    \ are more options that you can use to influence the behavior of the Q&A such\
    \ as the aforementioned QnASkipIfIntentFound and the confidenceTreshold.\n\nTo\
    \ show what happens when you mix Q&A with Intents and play with the available\
    \ options, we added a simple intent (PayTrip) to the Q&A skill.\n\n### Note\n\n\
    For the Travvy Digital Assistant, we will keep the Q&A in a clean separate skill\
    \ without intents. At a later stage, we will add this skill to the Digital Assistant.\n\
    \nFirst we will have a look at what happens with the confidenceTreshold. We will\
    \ use the utterance **“I need to fulfill the invoice,”** which can relate to Q&A\
    \ or to the PayTrip intent. When the confidenceTreshold is set to 0.6, the skill\
    \ will immediately show the Q&A that it finds (Figure [9-19](#479330_1_En_9_Chapter.xhtml#Fig19)),\
    \ because the Intent score percentage is 0.49, which is less than the confidenceTreshold.\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig19_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig19_HTML.jpg)\n\
    \nFigure 9-19\n\nLess than confidenceTreshold\n\nNow if we decrease the confidenceTreshold\
    \ from 0.6 to 0.5, you will see that the skill behaves differently and shows both\
    \ the intent and the Q&A and lets the user pick what he wants (Figure [9-20](#479330_1_En_9_Chapter.xhtml#Fig20)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig20_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig20_HTML.jpg)\n\
    \nFigure 9-20\n\nOver confidenceTreshold\n\nNow finally we can change the QnASkipIfIntentFound\
    \ from false to true and see what the effect is (Figure [9-21](#479330_1_En_9_Chapter.xhtml#Fig21)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig21_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig21_HTML.jpg)\n\
    \nFigure 9-21\n\nqnaSkipIfIntentFound is set to true\n\n```\nIntent:\ncomponent:\
    \ \"System.Intent\"\nproperties:\nvariable: \"iResult\"\nqnaEnable: true\nqnaSkipIfIntentFound:\
    \ true\ntransitions:\nactions:\nunresolvedIntent: \"unresolved\"\npayTrip: \"\
    payTrip\"\nqna: \"travvyQna\"\n```\n\nNow let’s set QnASkipIfIntentFound back\
    \ to false. When the user says “**I need to pay my voyage,**” the skill shows\
    \ both options because there is an intent scoring above the confidence threshold\
    \ and a matching question, but ranks the intent first (Figure [9-22](#479330_1_En_9_Chapter.xhtml#Fig22)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig22_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig22_HTML.jpg)\n\
    \nFigure 9-22\n\nIntent is showed first\n\nWhen the user uses one of the “Question\
    \ Verbs or prefixes” as defined in the Q&A Routing Config, this indicates that\
    \ a user is asking a question. The link for the Q&A response is shown first as\
    \ it gets “priority” over the link for the intent response (Figure [9-23](#479330_1_En_9_Chapter.xhtml#Fig23)).\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig23_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig23_HTML.jpg)\n\
    \nFigure 9-23\n\nQ&A shown first\n\nThere is one more thing to configure, and\
    \ that is the Q&A routing. You can add custom “**Request Sentence Prefix**” to\
    \ the routing section. Let’s see what will happen if you add “**I want to**” to\
    \ that section and ask the skill “I want to pay my trip.”\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig24_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig24_HTML.jpg)\n\
    \nFigure 9-24\n\nIntent shown after configuring Q&A routing\n\nThere you go. The\
    \ skill now understands exactly what you want to do, and it will resolve the PayTrip\
    \ intent (Figure [9-24](#479330_1_En_9_Chapter.xhtml#Fig24)).\n\nThere are many\
    \ ways to influence and configure the Q&A behavior, and besides it is really key\
    \ that you understand all the options, as you will have to use them in different\
    \ ways in different situations, depending on the requirements of your skill.\n\
    \n## Summary\n\nFrequently asked questions are common questions that are looking\
    \ for an answer. They often already exist on a company’s web site and can easily\
    \ be brought to your bot. In this chapter, you learned how to develop a Q&A skill\
    \ and how to use it in your Digital Assistant. You should now be able to understand\
    \ how to configure Q&A in Oracle Digital Assistant and how to improve Q&A sets\
    \ for an optimal user experience.\n\n# Part VAdvanced Topics\n\n# 10. Extending\
    \ Your Digital Assistant with Custom Components"
  trans: "\n### 在对话流中添加问答功能\n\n设置此问答技能的最后一步是在流程编辑器中进入问答流程。打开流程编辑器后，您会看到其中已包含代码。`states`\
    \ 关键字下方的所有内容都可以删除，因为此问答机器人不需要这些内容。您也可以根据需要删除注释。清理编辑器后，现在可以轻松设置问答流程了。\n\n这个“纯问答”技能将包含两个状态：\n\
    \n- **问答**：允许输入问题并显示答案的状态。\n- **未解决**：与往常一样，技能需要一个 `unresolved` 状态，以确保当数字助手无法理解用户意图时，对话不会崩溃。\n\
    \n这里的 `Q&A` 状态是问答的主要状态，下一个状态应始终是 `Q&A`，这样在返回答案时就会路由回问答状态。因此，配置如下：\n\n- `component`：`System.Q&A`\n\
    - `transitions`：\n  - `actions`：\n    - `none`：`unresolved`\n  - `next`：`travvyQnA`\n\
    \n最终结果如下代码所示：\n\n```\nmetadata:\nplatformVersion: \"1.0\"\nmain: true\nname: \"\
    TravvyQnA\"\ncontext:\nvariables:\ngreeting: \"string\"\nname: \"string\"\nterminateChoice:\
    \ \"string\"\nstates:\ntravvyQnA:\ncomponent: \"System.QnA\"\ntransitions:\nactions:\n\
    none: \"unresolved\"\nnext: \" travvyQnA\"\nunresolved:\ncomponent: \"System.Output\"\
    \nproperties:\ntext: \"抱歉，我没有找到任何匹配项。您能重新表述一下问题吗？\"\ntransitions:\nreturn: \"\
    done\"\n```\n\n让我们看看在技能测试器中询问“how can I pay my voyage”时会发生什么。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig17_HTML.jpg](img/479330_1_En_9_Fig17_HTML.jpg)\n\
    \n**图 9-17** 测试器中的默认行为\n\n您可以在图 9-17 的右侧看到，问答功能选择了四个问答集。这四个问答集也显示在轮播中，您可以使用箭头按钮浏览选项。通过调整\
    \ `System.QnA` 组件的属性可以改变此行为。为了减少呈现给用户的问答对数量，您可以使用 `matchListLimit` 属性。\n\n在以下代码中，此属性被设置为\
    \ `1`：\n\n```\ntravvyQnA:\ncomponent: \"System.QnA\"\nproperties:\nmatchListLimit:\
    \ 1\ntransitions:\nactions:\nnone: \"unresolved\"\nnext: \" travvyQnA\"\n```\n\
    \n行为将发生变化，您可以在测试器中看到这一点（图 9-18）：\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig18_HTML.jpg](img/479330_1_En_9_Fig18_HTML.jpg)\n\
    \n**图 9-18** 设置 `matchListLimit=1` 后的行为\n\n只有第一个选项显示给用户，并且用户会获得一个额外的选项来显示“更多答案”。\n\
    \n您还可以使用更多选项来影响问答的行为，例如前面提到的 `QnASkipIfIntentFound` 和 `confidenceTreshold`。\n\n\
    为了展示将问答与意图混合使用并调整可用选项时会发生什么，我们向问答技能添加了一个简单的意图（`PayTrip`）。\n\n> **注意**：对于 Travvy\
    \ 数字助手，我们将把问答功能放在一个独立的、不包含意图的干净技能中。在后续阶段，我们会将此技能添加到数字助手中。\n\n首先，我们来看看 `confidenceTreshold`\
    \ 的作用。我们将使用语句 **“I need to fulfill the invoice”**，该语句既可以关联到问答，也可以关联到 `PayTrip`\
    \ 意图。当 `confidenceTreshold` 设置为 `0.6` 时，技能会立即显示它找到的问答（图 9-19），因为意图得分百分比为 `0.49`，低于\
    \ `confidenceTreshold`。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig19_HTML.jpg](img/479330_1_En_9_Fig19_HTML.jpg)\n\
    \n**图 9-19** 低于 `confidenceTreshold`\n\n现在，如果我们将 `confidenceTreshold` 从 `0.6`\
    \ 降低到 `0.5`，您会看到技能的行为有所不同，它会同时显示意图和问答，并让用户选择他想要的内容（图 9-20）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig20_HTML.jpg](img/479330_1_En_9_Fig20_HTML.jpg)\n\
    \n**图 9-20** 超过 `confidenceTreshold`\n\n最后，我们可以将 `QnASkipIfIntentFound` 从 `false`\
    \ 改为 `true`，看看效果如何（图 9-21）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig21_HTML.jpg](img/479330_1_En_9_Fig21_HTML.jpg)\n\
    \n**图 9-21** `qnaSkipIfIntentFound` 设置为 `true`\n\n```\nIntent:\ncomponent: \"\
    System.Intent\"\nproperties:\nvariable: \"iResult\"\nqnaEnable: true\nqnaSkipIfIntentFound:\
    \ true\ntransitions:\nactions:\nunresolvedIntent: \"unresolved\"\npayTrip: \"\
    payTrip\"\nqna: \"travvyQna\"\n```\n\n现在，让我们将 `QnASkipIfIntentFound` 设置回 `false`。当用户说“**I\
    \ need to pay my voyage**”时，技能会显示两个选项，因为存在一个得分高于置信度阈值的意图和一个匹配的问题，但意图会排在第一位（图 9-22）。\n\
    \n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig22_HTML.jpg](img/479330_1_En_9_Fig22_HTML.jpg)\n\
    \n**图 9-22** 意图优先显示\n\n当用户使用问答路由配置中定义的“问题动词或前缀”时，表明用户正在提问。问答响应的链接会优先显示，因为它比意图响应的链接获得更高的“优先级”（图\
    \ 9-23）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig23_HTML.jpg](img/479330_1_En_9_Fig23_HTML.jpg)\n\
    \n**图 9-23** 问答优先显示\n\n还有一件事需要配置，那就是问答路由。您可以在路由部分添加自定义的“**请求句子前缀**”。让我们看看，如果您在该部分添加“**I\
    \ want to**”并向技能询问“I want to pay my trip”，会发生什么。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig24_HTML.jpg](img/479330_1_En_9_Fig24_HTML.jpg)\n\
    \n**图 9-24** 配置问答路由后意图显示\n\n就是这样。技能现在完全理解您想做什么，并且会解析 `PayTrip` 意图（图 9-24）。\n\n\
    影响和配置问答行为的方法有很多，此外，理解所有选项确实至关重要，因为您需要根据技能的要求，在不同情况下以不同方式使用它们。\n\n## 总结\n\n常见问题解答是寻求答案的常见问题。它们通常已经存在于公司的网站上，并且可以轻松地引入到您的机器人中。在本章中，您学习了如何开发问答技能以及如何在数字助手中使用它。现在，您应该能够理解如何在\
    \ Oracle 数字助手中配置问答，以及如何改进问答集以获得最佳用户体验。\n\n# 第五部分：高级主题\n\n# 10. 使用自定义组件扩展您的数字助手\n"
- fmt: '# Introduction


    Welcome to the chapter of Custom Components. This chapter will focus explicitly
    on Custom Components for Oracle Digital Assistant (ODA). During the course of
    Chapter [5](#479330_1_En_5_Chapter.xhtml), you were introduced to Custom Components
    briefly. Presuming that you have an overview about custom components, this chapter
    will explain Custom Components in detail. Custom components are those components
    which you can handcraft by yourself, which are specific to your need, and most
    importantly whose behavior you have a complete control over. You will start with
    the basics of creating custom components in your local environment, debugging
    them locally, hosting them, and, finally, using them in your skill’s dialog flow.


    As it was mentioned earlier, any task or action that you want to perform in a
    Digital Assistant or, to be more precise, in a Skill, you will need a component
    for that. Consider a very simple use case where you ask the user to enter his/her
    name and then you display a customized greeting message specific to user name.
    You will be using at least two components to achieve this. First, you will use
    a component to display a prompt that asks the user to provide his/her name. And
    then using a second component, you will display a customized greeting message
    with user name based on the input provided.


    Every action and bot response, be it a prompt for an input or a message to display,
    requires a state in the dialog flow. Every state will invoke one and only one
    component to perform the task. Though Oracle Digital Assistant provides you a
    variety of built-in components out of the box which you can use to build your
    bot flow, you will often come across situations where built-in components are
    just not enough to perform specific tasks.


    Specific tasks, like backend integrations, where you need to invoke any REST service
    to get desired information from backend systems and then perform data manipulation
    before showing the result to user, will need custom components. This cannot be
    done using built-in components only. This is a typical use case for custom components
    where you define your custom logic inside a custom component using JavaScript,
    host the component, and then invoke it from your dialog flow to get the desired
    result. While you work with Travvy, you might want to retrieve user-specific information,
    like full name, age, address, and so on using a REST service.


    Another scenario, which you can consider for using a custom component, is when
    you want to implement some complex logic for your skill, but you realize that
    the job cannot be accomplished using Apache FreeMarker. In the context of this
    book, consider a use case for Travvy where you only want to allow users to book
    a trip if they are grown up, that is, if their age is greater than 18. If user’s
    age doesn’t match your criteria, then you display a message stating that he/she
    is not eligible to book a trip using Travvy. Such type of complex logic is not
    very convenient to implement directly in bot flow but can be done effectively
    using custom components. Having said that, you can outline the following benefits
    of using custom components based on what we have discussed so far.


    ## Benefits of Using Custom Components


    - Custom components keep your dialog flows short for use cases that otherwise
    require multiple states to implement.

    - Custom components, if deployed as an API using Oracle Mobile Hub (refer to Figure
    [10-13](#479330_1_En_10_Chapter.xhtml#Fig13) under section “Access Custom Component
    from ODA Instance” where you can select the Oracle Mobile Cloud option), can be
    used across different skills, which can be even spread across various ODA instances.

    - As custom components are developed using Node.js, you can leverage public and
    free third-party Node libraries.


    ## Use Cases for Custom Components


    - By default, Oracle allows you to use Google and Microsoft translation services
    to provide multilingual support for your bot. But if you wish to use any third-party
    translation services for your bot, you can also do that using custom components.

    - You may also think about using custom components if you wish to implement security
    for your bot or in any specific section like for API invocations.


    And the list doesn’t end here. As you start working with custom components, you
    will yourself come up with many more benefits and use cases of using them in your
    specific scenarios.


    Now that you hold a basic understanding about the custom components and where
    you should consider using custom components, it’s the time to start working with
    them. In next few steps, you will see how easy it is to create your first custom
    component and to start implementing your custom logic. We would also suggest you
    acquire some knowledge of JavaScript language in case you don’t happen to have
    it already. That will come a lot handy going forward, and you will notice the
    difference while working on custom components. But first, you will have to set
    up your local environment for development. This would allow you to develop your
    custom components on your own machine, debug, and test before you actually deploy
    them on the cloud.


    # Environment Setup for Custom Component


    There are a few prerequisites you need to install on your local machine in order
    to start working with your custom components. First and foremost, you need to
    install node on your local machine if you don’t already have it installed. You
    can download Node from the following link:


    [https://nodejs.org/en/download/](https://nodejs.org/en/download/)


    Next thing in the list is to download Oracle Bots Node.js SDK. Once you have installed
    Node, you can simply install Oracle Bots Node SDK globally using the following
    command:


    Windows


    ```

    npm install -g @oracle/bots-node-sdk

    ```


    Mac


    ```

    sudo npm install -g @oracle/bots-node-sdk

    ```


    Next, you need to download a tunneling software. We are going to use ngrok. This
    will make your life a lot easier while debugging and testing your custom component
    by allowing you to access the custom component located on your development computer
    directly from ODA. You can download ngrok from the following link:


    [https://ngrok.com/download](https://ngrok.com/download)


    Using ngrok, you can expose a specific port from your machine over the Internet.
    This is discussed in detail in section “Expose Custom Component over the Internet.”


    Finally, download a code editor for JavaScript development based on your preference.
    You may consider using Microsoft Visual Studio Code.'
