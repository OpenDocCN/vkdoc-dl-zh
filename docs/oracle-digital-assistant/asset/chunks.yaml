  trans: '

    # 为 Travvy 添加多语言支持


    Extreme Hiking Holidays 的客户遍布 50 多个国家，但他们没有能覆盖这 50 种语言的员工。此外，他们也没有资源来创建和管理 50
    种不同语言的机器人。这时，翻译服务就派上了用场。


    使用翻译服务需要配置一个外部翻译服务。Oracle Digital Assistant 支持使用 Google Translation API 和 Microsoft
    翻译服务。


    ## 注意


    在本书中，我们将使用 Google Translation API。


    Google Translation API 是一项付费 API。费用因 API 使用量而异，可能有所不同。在使用 API 之前，您必须设置一个 Google
    帐户并启用 Translation API。可以在您的 Google 帐户的开发者控制台（图 7-2）中启用该 API：[`https://console.developers.google.com/apis/dashboard`](https://console.developers.google.com/apis/dashboard)。


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig2_HTML.jpg](img/479330_1_En_7_Fig2_HTML.jpg)


    图 7-2


    Google 开发者控制台仪表板


    激活翻译服务后，必须将此翻译服务添加到 Digital Assistant 中才能使用。您可以在 Digital Assistant 级别的“设置菜单”中打开“添加翻译服务”（图
    7-3）。


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig3_HTML.jpg](img/479330_1_En_7_Fig3_HTML.jpg)


    图 7-3


    添加翻译服务


    您只需从下拉列表中选择服务类型，添加翻译服务的基本 URL，最后输入授权令牌。单击“创建”后，配置将被保存，翻译服务即可使用。


    添加翻译服务后，您需要配置其使用方式。翻译服务的使用可以在技能级别进行配置。在技能的常规设置中，您需要从包含此云实例所有可用翻译服务的下拉列表（图 7-4）中选择要使用的翻译服务。


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig4_HTML.jpg](img/479330_1_En_7_Fig4_HTML.jpg)


    图 7-4


    设置翻译服务


    选择后，所有需要的翻译都将由此翻译服务提供。


    ## 使用翻译服务


    在 Digital Assistant 中进行翻译有两种选项：选择加入和选择退出。本节将对两者进行说明。


    ### 选择退出


    要使 Digital Assistant 默认启用翻译（也称为选择退出翻译），在添加翻译服务后需要执行一些步骤。首先，您需要添加 `autoTranslate`
    上下文变量。接下来，需要一个 `System.SetVariable` 组件，将 `autoTranslate` 设置为 `true`。最后，作为下一个状态，您需要添加
    `System.DetectLanguage` 组件，该组件会调用翻译服务来确定用户的语言。所有这些将生成以下代码片段：


    ```

    metadata:

    platformVersion: "1.0"

    main: true

    name: FindTripWithTranslations

    context:

    variables:

    iResult: "nlpresult"

    autoTranslate: "boolean"

    states:

    enableAutoTranslation :

    component: "System.SetVariable"

    properties:

    variable: "autoTranslate"

    value: true

    transitions:

    next: "detectLanguage"

    detectLanguage:

    component: "System.DetectLanguage"

    properties:

    source:

    transitions:

    next: ............

    ............

    ............

    ............

    ```


    ### 选择加入


    翻译的另一个选项是选择加入选项。仅针对您希望翻译的那些组件，您需要专门将 `translate` 属性设置为 `true`。


    为了实现这一点，您必须确保将 `autoTranslate` 上下文变量设置为 `false`。接下来，对于所有需要翻译的单个组件，将 `translate`
    属性设置为 `true`。最后，确保 `System.Intent` 组件也将 `translate` 属性设置为 `true`。这是因为 Oracle Digital
    Assistant 的内部语言是英语。


    ```

    intent:

    component: "System.Intent"

    properties:

    variable: "iResult"

    translate: true

    ```


    ## 提示


    如果您依赖翻译服务来提供答案，Translation API 会将机器人的英语答案翻译成用户的语言。您对翻译几乎没有控制权，因此无法 100% 确保答案始终一致。为了完全控制
    Digital Assistant 的回复内容，您应该使用资源包来存储依赖于语言的答案。


    ## 使用资源包


    如前一条提示所述，最佳实践是依赖资源包来处理机器人的所有回复。这可以根据需要支持任意数量的语言和方言。要实现这一点，您必须创建资源包和资源包条目。如果您尚未添加任何资源包，Oracle
    Digital Assistant 会为您创建一个，然后您可以输入第一个条目（图 7-5）。


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig5_HTML.jpg](img/479330_1_En_7_Fig5_HTML.jpg)


    图 7-5


    创建第一个资源包条目


    ## 注意


    当您创建新的资源包条目时，它总是会被添加到默认语言（即英语）中。


    现在，您可以开始添加翻译，或者换句话说，为其他语言添加资源包。对于每个键，您可以通过点击“+ 语言”按钮来添加翻译。这将弹出一个弹出窗口，您可以在其中为所选键输入特定于语言的文本（图
    7-6）。


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig6_HTML.jpg](img/479330_1_En_7_Fig6_HTML.jpg)


    图 7-6


    向资源包添加其他语言


    请确保对于每一个键，您都有 Digital Assistant 支持的所有语言的翻译。为了帮助您完成此操作，Oracle Digital Assistant
    在右上角提供了一个“查看方式”下拉列表（图 7-6）。首先，您可以将其切换为“语言”。然后选择要为其创建资源字符串的语言，并开始构建字符串，直到看不到更多键为止。当所有键都有对应的字符串时，将不再显示更多键。


    ## 从资源包回复


    输入所有翻译后，现在该让 Digital Assistant 基于这些翻译来回复用户了。这实际上非常简单。单语言的 Digital Assistant 可以使用硬编码文本，如下面的代码示例所示：


    ```

    bookTrip:

    component: "System.Output"

    properties:

    text: "Ok, lets continue to book your trip."

    transitions:

    return: "done"

    ```


    为了在技能中支持多语言，您应该添加对资源包的引用，以便它可以基于此资源包进行回复。前面的代码示例需要更改为：


    ```

    bookTrip:

    component: "System.Output"

    properties:

    text: "${rb.continueBooking}"

    transitions:

    return: "done"

    ```


    其中 `rb.continueBooking` 引用对话语言中一个键值为“continueBooking”的资源包条目。Digital Assistant
    将查找该条目并回复该键对应的确切值。


    请注意，前缀 `rb` 需要在流程的 `context/variables` 部分中定义。


    ```

    context:

    variables:

    iResult: "nlpresult"

    rb: "resourcebundle"

    autoTranslate: "boolean"

    ```

    '
- fmt: '### Note


    You can make response more dynamic to use parameters in resource bundles. The
    following example shows how you could add dynamic pricing for hotel rooms. The
    bot replies with text from a resource bundle which dynamically changes the price
    based on the outcome of a service call in a custom component.


    The resource bundle key and value:


    - Key: `Pricing`

    - Value: `Currently the price for this hotel is {0} per night.`


    The oBOTML code:


    ```

    component: "System.Output"

    properties:

    text: ${rb(pricing, ''${pricingService.value}'')}"

    transitions:

    return: "done"

    ```


    ### Determine Language from Utterance


    In the previous section, you learned how to use the language from the user profile
    in the conversation and have everything translated from and to that language.
    There is another option, and that is to use the translation service to determine
    the users’ language. In order to make this happen, we need to use `System.DetectLanguage`.
    This component uses the translation service to detect the user’s language and
    automatically sets a variable named `profile.languageTag` with the locale string.


    ### Note


    The `profile.languageTag` takes precedence over the `profile.locale` variable.


    ```

    metadata:

    platformVersion: "1.0"

    main: true

    name: FindTripWithTranslations

    context:

    variables:

    iResult: "nlpresult"

    rb: "resourcebundle"

    autoTranslate: "boolean"

    states:

    enableAutoTranslation:

    component: "System.SetVariable"

    properties:

    variable: "autoTranslate"

    value: false

    transitions:

    next: " detectLanguage"

    detectLanguage:

    component: "System.DetectLanguage"

    properties:

    source:

    transitions:

    next: "intent"

    intent:

    component: "System.Intent"

    properties:

    variable: "iResult"

    transitions:

    actions:

    SelectTrip: "askAge"

    CancelTrip: "cancelTrip"

    unresolvedIntent: "unresolved"

    ```


    If you enter an utterance in any language that is supported by your digital assistant,
    it will resolve the intent and answer the user in the same language. As illustrated
    in Figure 7-7, the Digital Assistant recognized that the user’s utterance is English,
    and it replies in English to the user. Next, the user’s utterance is in Dutch,
    it is clearly understood by the Digital Assistant, and it switches to the new
    language and replies in Dutch.


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig7_HTML.jpg](images/479330_1_En_7_Chapter/479330_1_En_7_Fig7_HTML.jpg)


    Figure 7-7: Digital Assistant answering in users’ language


    There always is the possibility that the users’ language is not supported by your
    Digital Assistant.


    ### Note


    The restriction is with what the translation service supports. Good design practice
    is that bot designers only support those languages that make sense to their business
    and that they have language skills in-house.


    There are several ways of communicating this to the user. A very nice and user-friendly
    way is to tell the user in their own language that their language is not supported.
    This message can be accompanied with a list of supported languages. The user can
    select one of the supported languages, and you can store the selected language
    in the `profile.languageTag`.


    In order for this to work, an additional piece of logic needs to be added to the
    flow, right between the `detectLanguage` state and the `intent` state.


    The next code sample shows how to implement this functionality:


    ```

    detectLanguage:

    component: "System.DetectLanguage"

    properties:

    source:

    transitions:

    next: "checkUserDetectedLanguage"

    checkUserDetectedLanguage:

    component: "System.Switch"

    properties:

    source: "${[''nl'',''fr'',''en'']?seq_contains(profile.languageTag)?string(''yes'',''no'')}"

    values:

    - "yes"

    - "no"

    transitions:

    actions:

    yes: "Intent"

    no: "selectLanguageFromList"

    NONE: "selectLanguageFromList"

    selectLanguageFromList:

    component: "System.CommonResponse"

    properties:

    processUserMessage: true

    keepTurn: false

    translate: true

    metadata:

    responseItems:

    - type: "text"

    text: "${rb.globalLanguagePrompt}"

    actions:

    - label: "${rb.globalLanguageEnglish}"

    type: "postback"

    payload:

    variables:

    profile.languageTag: "en"

    - label: "${rb.globalLanguageDutch}"

    type: "postback"

    payload:

    variables:

    profile.languageTag: "nl"

    - label: "${rb.globalLanguageFrench}"

    type: "postback"

    payload:

    variables:

    profile.languageTag: "fr"

    transitions:

    next: "Intent"

    ```


    With this in place, whenever Travvy does not support the user’s language, it will
    reply in that language that Travvy only supports – English, French, Dutch, and
    Spanish. Figure 7-8 shows how that would look in Italian.


    ![../images/479330_1_En_7_Chapter/479330_1_En_7_Fig8_HTML.jpg](images/479330_1_En_7_Chapter/479330_1_En_7_Fig8_HTML.jpg)


    Figure 7-8: Reply to the user in their own language


    ### Note


    While you can use language detection, you must realize that this has an effect
    on performance. With language detection “on,” for each and every utterance, the
    translation service will be called to detect the language, thus adding calls to
    external service to the conversation.


    ### Using Language from the User Profile


    As stated in the previous section, using a translation service for language detection
    can have a small negative performance effect. There is another approach that takes
    away this effect by omitting the language detection. This approach uses the language
    from the user profile. So instead of the automatic setting of the `profile.languageTag`
    by the translation service, you now set it explicitly as in the following code
    sample:


    ```

    metadata:

    platformVersion: "1.0"

    main: true

    name: FindTripWithTranslations

    context:

    variables:

    iResult: "nlpresult"

    rb: "resourcebundle"

    autoTranslate: "boolean"

    states:

    enableAutoTranslation:

    component: "System.SetVariable"

    properties:

    variable: "autoTranslate"

    value: false

    transitions:

    next: "setBrowserBasedProfileLanguage"

    #Set profile.languageTag based on user''s browser language

    setBrowserBasedProfileLanguage:

    component: "System.SetVariable"

    properties:

    variable: "profile.languageTag"

    value: "${profile.locale}"

    transitions:

    next: "Intent"

    ```


    In order for this to work, you need to get the users’ locale. One way to achieve
    this is to read the `profile.locale` variable which is set from the messaging
    client.


    Another way to do this is to explicitly set it on the messaging client. The following
    code sample shows how this can be done in JavaScript using the Oracle Digital
    Assistant JavaScript SDK (see Chapter 6) when you invoke the Digital Assistant
    from a web page:


    ```

    Bots.updateUser(

    {

    "properties": {

    "userLocale": userLocale}

    }

    );

    ```


    ## Summary


    There are many languages spoken around the world. In order for Digital Assistants
    to be successful, they should be able to speak other languages than just English.
    Luckily this requirement of multilanguage support can be implemented in Oracle
    Digital Assistant. In this chapter, you learned how to do that based on translation
    services and resource bundles. It is not 100% guaranteed that translation services
    cover all use cases; neither will they be able to cover all utterances. You will
    have to help the user and the translation service by providing functionality to
    either pick or confirm the language the user prefers.'
