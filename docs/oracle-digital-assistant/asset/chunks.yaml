    You can edit this manually, if you wish, to have different `Display Name` and
    `Name` for your skill.


    Once created, `FindTrip` will appear under Skills section along with other skills.
    See Figure [5-6](#479330_1_En_5_Chapter.xhtml#Fig6).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig6_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig6_HTML.jpg)


