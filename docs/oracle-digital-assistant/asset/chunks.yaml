    | View problems affecting Skill Bot |


    ### Clone a Skill


    At some point, you might want to reuse the functionality you designed in a Skill
    into a new Skill without making any changes to your existing Skill. For this purpose,
    you can clone your existing Skill into a new Skill.


    From the Skills screen (see Figure [5-4](#479330_1_En_5_Chapter.xhtml#Fig4)),
    identify the Skill which you want to reuse. Click the Options icon ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figq_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figq_HTML.jpg),
    located at the bottom-right corner of your Skill, to open the Skill catalog as
    shown in Figure [5-8](#479330_1_En_5_Chapter.xhtml#Fig8).


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig8_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Skill catalog


    From the catalog, select **Clone** option to clone the Skill.


    ### Export a Skill


    Another useful feature which you can access from the Skill catalog is **Export
    Skill**. As the name suggests, by using this feature, you can export your Skill
    which will be then downloaded on your system. For example, if you export the FindTrip
    Skill, you will notice a FindTrip(1.0).zip file gets downloaded to your system.
    Here 1.0 is the version of your Skill.


    ### Import a Skill


    If you want to use a prebuilt Skill for your Digital Assistant, you then can import
    that Skill to your Digital Assistant environment. From the home page of Skills,
    click the **Import Skill** button as shown in Figure [5-9](#479330_1_En_5_Chapter.xhtml#Fig9)
    to import the zip file containing the Skill.


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig9_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Import Skill


    ### Create a New Version of a Skill


    From the Skill catalog (see Figure [5-8](#479330_1_En_5_Chapter.xhtml#Fig8)),
    select **New Version** if you want to add a new version for your Skill.


    ### Delete a Skill


    If needed, you can delete your Skill by selecting the **Delete** option from the
    Skill catalog (see Figure [5-8](#479330_1_En_5_Chapter.xhtml#Fig8)).


    ### Publish a Skill


    Once you are done with the development of your Skill, you might want to access
    it from the Digital Assistant. To access a Skill in the Digital Assistant, the
    Skill first needs to be published. To publish your Skill, from the Skill catalog,
    select the **Publish** option. Ensure that you train your Skill before publishing.
    How to do this will be explained in the “Train and Test Intents” section.


    After publishing a Skill, you can only make changes to its custom parameter values
    from the Configuration tab in Settings section.


    If you wish to update your Skill post publishing, then you will have to create
    a **new version** of the Skill.


    ### Export Conversation Log


    The purpose of the conversation log is to check various conversations which happen
    with your Skill. This includes conversations with respect to intents, Q&A (if
    present in the Skill), and the Skill as a whole. By default, all sorts of conversation
    logging are turned off for Skills. You can enable them from the General tab by
    accessing Settings for a Skill ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figr_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Figr_HTML.jpg).


    The following options will be displayed:


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig10_HTML.png](images/479330_1_En_5_Chapter/479330_1_En_5_Fig10_HTML.png)


    Figure 5-10


    Conversation logging options


    Once you enable conversation logging, select **Export Conversation Log** from
    the Skill catalog (see Figure [5-8](#479330_1_En_5_Chapter.xhtml#Fig8)). This
    will show you a new popup window as shown in Figure [5-11](#479330_1_En_5_Chapter.xhtml#Fig11).
    From here, you can select which conversation log you want to export. You can also
    specify the **Time period** for which you want to get the logs. To finally export
    the required conversation logs, click the “Export” button.


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig11_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Export conversation log


    ### Show Channel Routes


    The **Show Channel Routes** option from the Skill catalog allows you to route
    channels to your Skill. You will learn more about channels and how you can route
    those channels to your Skill in a later section of this book.'
