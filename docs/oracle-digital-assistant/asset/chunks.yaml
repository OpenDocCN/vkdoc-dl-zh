- fmt: "### Apache FreeMarker Template Language\n\nTo keep things simple, in context\
    \ of ODA, you use Apache FreeMarker Template Language (FTL) to set and access\
    \ values of variable (and their properties, if any). If you are interested to\
    \ know more about FTL, you can check their official web site [https://freemarker.apache.org/](https://freemarker.apache.org/).\n\
    \nSyntax for using FTL in dialog flow is pretty straight forward. You wrap everything\
    \ for which you want to use FTL inside `${…}`. You use FTL inside the property\
    \ definition of components (components are described in next section of this chapter).\
    \ For example, if you have defined a variable as `myVariable` and you want to\
    \ read its value, then you simply use:\n\n- `${myVariable.value}`\n\nOr if you\
    \ define a variable, which is a complex entity of type `ADDRESS`, say `userAddress`,\
    \ then you can use FTL as follows to extract the city:\n\n- `${userAddress.value.city}`\n\
    \nUse of FTL is not only limited to this. You can also use FTL to write complex\
    \ expressions in your flow. A very commonly used scenario is using FTL for `System.CommonResponse`\
    \ components where you define conditions with `if`, `else`, or `elseif` directives.\
    \ The syntax for this is:\n\n- `<#if yourCondition>result1<#else>result2</#if>`\n\
    - `<#if firstCondition>result1<#elseif secondCondition>result2<#elseif thirdCondition>result3</#if>`\n\
    \nOf course, the use of FTL is not limited to `CommonResponse` components, and\
    \ you can use them throughout your dialog flow for assignment of values in your\
    \ bot response or evaluation purposes.\n\nIn addition, you can also use various\
    \ operations which FTL supports for strings, numbers, date-time values, and so\
    \ on. To know more, refer to the link [https://freemarker.apache.org/docs/ref.html](https://freemarker.apache.org/docs/ref.html).\n\
    \nA prolong discussion on FTL, covering all such use cases and operations, may\
    \ go well beyond the scope of this book. Hence, we are concluding this section\
    \ here. Any further uses of FTL will be explained as needed.\n\n### Components\
    \ in the Dialog Flow\n\nAny functionality which you want to implement in your\
    \ skill comes from components. Whether you want to display cards or a list, perform\
    \ a specific action based on a user input, display any output, state transition,\
    \ handle error, and so on or even if you want to perform some specific task like\
    \ invocation of a REST call to process user response, you will always do all these\
    \ with the help of components.\n\nComponents can be broadly classified in two\
    \ types:\n\n- Built-in components\n- Custom Components\n\nAs the name suggests,\
    \ built-in components are those components which Oracle provides you as part of\
    \ the Digital Assistant framework, to use in your skill. These components are\
    \ sufficient to perform most of the skill’s actions. You can easily identify these\
    \ components in your flow as they are always preceded by `System.` in `states`\
    \ section under `component`. Refer to Figure [5-26](#479330_1_En_5_Chapter.xhtml#Fig26).\n\
    \nAt any point, if you want to perform some action in your skill which cannot\
    \ be done using built-in components, then you can define your own components.\
    \ Those components, which you create to perform specific tasks, are known as custom\
    \ components.\n\n#### Built-in Components\n\nAs mentioned, these are predefined\
    \ components in ODA framework. To add a built-in component into your flow, you\
    \ need to click the `+ Components` button on top of the editor. This will open\
    \ a new window as shown in Figure [5-27](#479330_1_En_5_Chapter.xhtml#Fig27) providing\
    \ you various component types to choose.\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig27_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig27_HTML.jpg)\n\
    \nFigure 5-27 Component types\n\nAs you can see in the preceding figure, ODA provides\
    \ you five types of built-in components. By selecting a component type, you can\
    \ select a component template which falls under that type. In the following, you\
    \ can find a complete list of component templates which fall under each component\
    \ type shown in Figure [5-27](#479330_1_En_5_Chapter.xhtml#Fig27):\n\n1.  Control\n\
    \    1.  `component: \"System.ConditionEquals\"`\n    2.  `component: \"System.ConditionExists\"\
    `\n    3.  `component: \"System.Switch\"`\n\n2.  Language\n    1.  `component:\
    \ \"System.DetectLanguage\"`\n    2.  `component: \"System.Intent\"`\n    3. \
    \ `component: \"System.MatchEntity\"`\n    4.  `component: \"System.QnA\"`\n \
    \   5.  `component: \"System.TranslateInput\"`\n    6.  `component: \"System.TranslateOutput\"\
    `\n\n3.  Security\n    1.  `component: \"System.OAuth2AccountLink\"`\n    2. \
    \ `component: \"System.OAuthAccountLink\"`\n\n4.  User Interface\n    1.  `component:\
    \ \"System.AgentConversation\"`\n    2.  `component: \"System.AgentInitiation\"\
    `\n    3.  `component: \"System.CommonResponse\"`\n    4.  `component: \"System.List\"\
    `\n    5.  `component: \"System.Output\"`\n    6.  `component: \"System.ResolveEntities\"\
    `\n    7.  `component: \"System.Text\"`\n    8.  `component: \"System.Webview\"\
    `\n\n5.  Variables\n    1.  `component: \"System.CopyVariables\"`\n    2.  `component:\
    \ \"System.ResetVariables\"`\n    3.  `component: \"System.SetVariable\"`\n\n\
    To add any of these types of components along with its whole state, you need to\
    \ click the type which will then give you the option to add a specific component\
    \ of that type. Refer to Figure [5-28](#479330_1_En_5_Chapter.xhtml#Fig28) which\
    \ you get when you select Control type. All you need to do is to select the `Apply`\
    \ button to add the component in your flow.\n\n![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig28_HTML.jpg](images/479330_1_En_5_Chapter/479330_1_En_5_Fig28_HTML.jpg)\n\
    \nFigure 5-28 Adding Control type component\n\nIn the preceding figure, you can\
    \ see that when you add a built-in component, the framework provides you with\
    \ a prebuilt code snippet which you then update based on your requirement. If\
    \ you notice, `Insert After` dropdown allows you to select after which state in\
    \ the flow you want to add your component. Similarly, the `Remove Comments` toggle\
    \ lets you add the component with and without comment.\n\nYou will see the use\
    \ of these components as you progress with this book. Some components such as\
    \ the ones for Q&A and user agent will be covered in individual chapters to make\
    \ you familiar with them. Other generic components will be explained based on\
    \ their use, whenever feasible."
