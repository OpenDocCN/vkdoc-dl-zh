    ### 克隆技能


    在某些时候，您可能希望将某个技能中设计的功能复用到新技能中，而无需对现有技能进行任何更改。为此，您可以将现有技能克隆到一个新技能中。


    从“技能”屏幕（见图 5-4）中，找到您想要复用的技能。点击技能右下角的“选项”图标 ![../images/479330_1_En_5_Chapter/479330_1_En_5_Figq_HTML.jpg](img/479330_1_En_5_Figq_HTML.jpg)，打开技能目录，如图
    5-8 所示。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig8_HTML.jpg](img/479330_1_En_5_Fig8_HTML.jpg)


    图 5-8 技能目录


    从目录中，选择`克隆`选项来克隆该技能。


    ### 导出技能


    您可以从技能目录访问的另一个有用功能是`导出技能`。顾名思义，使用此功能，您可以导出您的技能，然后将其下载到您的系统上。例如，如果您导出`FindTrip`技能，您会注意到一个`FindTrip(1.0).zip`文件被下载到您的系统。这里的`1.0`是您技能的版本。


    ### 导入技能


    如果您想为您的数字助手使用一个预构建的技能，那么您可以将该技能导入到您的数字助手环境中。从技能主页，点击`导入技能`按钮，如图 5-9 所示，以导入包含该技能的
    zip 文件。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig9_HTML.jpg](img/479330_1_En_5_Fig9_HTML.jpg)


    图 5-9 导入技能


    ### 创建技能的新版本


    从技能目录（见图 5-8）中，如果您想为您的技能添加一个新版本，请选择`新版本`。


    ### 删除技能


    如果需要，您可以通过从技能目录（见图 5-8）中选择`删除`选项来删除您的技能。


    ### 发布技能


    完成技能开发后，您可能希望从数字助手中访问它。要在数字助手中访问技能，首先需要发布该技能。要发布您的技能，请从技能目录中选择`发布`选项。确保在发布前训练您的技能。如何执行此操作将在`训练和测试意图`部分中说明。


    发布技能后，您只能从“设置”部分的“配置”选项卡更改其自定义参数值。


    如果您希望在发布后更新您的技能，则必须创建一个技能的`新版本`。


    ### 导出对话日志


    对话日志的目的是检查与您的技能发生的各种对话。这包括与意图、问答（如果技能中存在）以及整个技能相关的对话。默认情况下，技能的所有类型的对话日志记录都是关闭的。您可以通过访问技能的“设置”![../images/479330_1_En_5_Chapter/479330_1_En_5_Figr_HTML.jpg](img/479330_1_En_5_Figr_HTML.jpg)，从“常规”选项卡中启用它们。


    将显示以下选项：


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig10_HTML.png](img/479330_1_En_5_Fig10_HTML.png)


    图 5-10 对话日志记录选项


    启用对话日志记录后，从技能目录（见图 5-8）中选择`导出对话日志`。这将显示一个新的弹出窗口，如图 5-11 所示。在此处，您可以选择要导出的对话日志。您还可以指定要获取日志的`时间段`。要最终导出所需的对话日志，请点击`导出`按钮。


    ![../images/479330_1_En_5_Chapter/479330_1_En_5_Fig11_HTML.jpg](img/479330_1_En_5_Fig11_HTML.jpg)


    图 5-11 导出对话日志


    ### 显示渠道路由


    技能目录中的`显示渠道路由`选项允许您将渠道路由到您的技能。您将在本书的后续部分中了解更多关于渠道以及如何将这些渠道路由到您的技能的信息。

