    现在您已成功测试了您的应用程序，下一节将使用适用于 JavaScript 的 ODA 客户端 SDK 从您的 Web 应用程序中调用该渠道。


    # 使用 ODA 客户端 SDK 从 Web UI 访问用户的 Web 渠道


    以下是从 Web 应用程序访问您的 Web 渠道所需执行的步骤：


    1. 配置客户端 SDK 并将其托管在 Web 服务器上。

    2. 为 Extreme Hiking 创建一个简单的 Web 应用程序。

    3. 在 Web 应用程序的 HTML 文件中添加 JavaScript 代码以调用客户端 SDK。

    4. 部署 Web 应用程序并测试通过 Web 渠道的对话。


    在本章中，我们将使用 GlassFish Web 服务器来托管客户端 SDK 和 Web 应用程序。但是，您可以自由选择任何您喜欢的 Web 服务器。


    ## 配置客户端 SDK


    从 URL [`www.oracle.com/technetwork/topics/cloud/downloads/amce-downloads-4478270.html`](http://www.oracle.com/technetwork/topics/cloud/downloads/amce-downloads-4478270.html)
    下载最新版本的适用于 JavaScript 的 ODA 客户端 SDK，并将其解压到您偏好的位置。文件解压后，您需要为其配置将要托管 SDK 的 Web 服务器。


    首先，让我们启动 GlassFish 服务器并添加一个存放 SDK 的位置。默认情况下，GlassFish 服务器监听 8080 端口。


    在本例中，我们在 GlassFish 服务器上的 `docroot` 文件夹内创建了一个 `odaTravvyDemo` 文件夹。在此文件夹内，您将为 SDK
    添加一个 `static` 文件夹。为了配置 SDK，您需要在 Mac 系统上执行以下命令，如图 6-17 所示。


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig17_HTML.jpg](img/479330_1_En_6_Fig17_HTML.jpg)


    **图 6-17** 在 Mac 系统上配置 SDK


    ```

    ./configure http://localhost:8080/odaTravvyDemo/static/

    ```


    如果您希望为不同的 Web 服务器配置 SDK，基于 IP 地址或任何公共互联网部署，`localhost` 和端口 `8080` 可能会发生变化。


    执行上述命令后，它会生成一个文件夹，其名称包含您提供的配置路径。在本例中，文件夹名称将为 `http:__localhost:8080_odaTravvyDemo_static_`。将该文件夹重命名为
    `static`，并将其复制到之前在 GlassFish 服务器上创建的 `odaTravvyDemo` 文件夹内。这样就完成了。


    不幸的是，对于使用 Windows 机器的用户来说，情况并非如此简单。幸运的是，您有一个替代方案。导航到您解压 SDK 的 `js-sdk` 文件夹。在 `js-sdk`
    文件夹中找到 `loader.json` 文件并打开它。您会注意到该文件包含：


    ```

    {"url":"https://placeholder.public.path/bots.1.16.1.min.js"}

    ```


    在 `loader.json` 中，将 `https://placeholder.public.path` 替换为 `http://localhost:8080/odaTravvyDemo/static`。同样，如果您希望为不同的
    Web 服务器配置 SDK，基于 IP 地址或任何公共互联网部署，`localhost` 和端口 `8080` 可能会发生变化。


    使用文本编辑器，在此文件夹的其余文件中查找并替换相同的部分。为了方便您，除了 `loader.json` 之外，以下是您需要更新的文件列表：


    1. `bots.1.16.1.min.js`

    2. `frame.1.16.1.css`

    3. `frame.1.16.1.min.js`


    ### 注意


    上述文件的版本号可能会根据 SDK 版本而变化。


    完成后，将文件夹重命名为 `static`，并将其复制到之前在 GlassFish 服务器上创建的 `odaTravvyDemo` 文件夹内。


    ## 为 Travvy 创建一个简单的 Web 应用程序


    现在您需要创建一个 Web 应用程序，从中调用 SDK。我们使用 Oracle JET 创建了一个 Extreme Hiking Web 应用程序，但您可以选择任何您喜欢的技术。图
    6-18 展示了 Extreme Hiking 网站。


    ![../images/479330_1_En_6_Chapter/479330_1_En_6_Fig18_HTML.jpg](img/479330_1_En_6_Fig18_HTML.jpg)


    **图 6-18** Extreme Hiking 网站

