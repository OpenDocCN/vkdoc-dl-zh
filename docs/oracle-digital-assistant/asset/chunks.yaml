- fmt: '# Implementing the Travvy Design


    Now that you know what tasks and subtasks are, it should be easy to implement
    the Travvy design as formulated in Chapter [4](#479330_1_En_4_Chapter.xhtml).
    As stated before, the tasks in the Conversation Designer will become intents.


    To invoke the Conversation Designer and to implement Travvy’s design, we will
    create a brand-new and empty Skill (Figure [4-3](#479330_1_En_4_Chapter.xhtml#Fig3)).


    ### Note


    For this example, a new empty skill is created. Using the Conversation Designer
    on an existing skill is not a good idea. This is because existing Intents, Entities,
    and code will be overwritten when the Skill Bot is generated from within the Conversation
    Designer. This process will be explained later in this chapter.


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig3_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Create a new skill


    After this new skill is created, you will notice the “Conversation Designer” button
    in the left-hand toolbar. By invoking this button, you will be guided through
    the creation of a Skill Bot.


    The welcome screen enables you to add tasks that your Skill Bot should be able
    to do. You can enter as many tasks as you need (Figure [4-4](#479330_1_En_4_Chapter.xhtml#Fig4)),
    and at a later stage, you can add more if needed.


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig4_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    The Conversation Designer welcome screen


    By clicking **Create**, the Conversation Designer opens and shows you the tasks
    (Figure [4-5](#479330_1_En_4_Chapter.xhtml#Fig5)) that you entered on the welcome
    screen.


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig5_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Initial view of the Designer


    With this empty skeleton in place, you can now start creating the mockup of the
    bot’s conversation.


    For the purpose of this book, not all the steps involved in creating the mockup
    for this skill will be explained in this section, but the core functionality will
    be discussed in detail.


    As you can see from Figure [4-6](#479330_1_En_4_Chapter.xhtml#Fig6), there are
    two icons in the Conversation Designer:


    *   ![../images/479330_1_En_4_Chapter/479330_1_En_4_Figa_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Figa_HTML.jpg)
    When this icon is clicked, a user utterance can be entered.


    *   ![../images/479330_1_En_4_Chapter/479330_1_En_4_Figb_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Figb_HTML.jpg)
    When this icon is selected, a bot reply can be entered.


    When you only need to enter simply text, there is a shortcut that can be used.
    Simply type the text in the conversation box at the bottom and click the icon
    (bot or user) to add to conversation.


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig6_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Adding simple steps


    As explained before, the first message in a task should be a message from the
    user that clearly expresses the selected task/intent so that reasonably good utterances
    can be generated from it. In this case, for the `FindTrip` task, for example,
    *I want to go on an extreme hiking trip* can be entered. The next step is to add
    a reply of the bot. A simple reply where the bot introduces itself is what we
    need here. Something like: *Hey Harold, I’m Travvy the digital assistant for EHH.
    Great to meet you again here.*


    Now the conversation start is set up, and we are ready to add some real content
    to the conversation. As described in Chapter [4](#479330_1_En_4_Chapter.xhtml),
    the `FindTrip` Skill (Figure [4-7](#479330_1_En_4_Chapter.xhtml#Fig7)) consists
    of several steps, which we will implement (not all) in this chapter. Let’s start
    with *Indicate Holiday Destination*.


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig7_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Dialog flow to find a trip


    `Indicate Holiday Destination` enables the user to pick the favorite destination,
    and after that the user will be guided to the available hiking trips at that destination.
    If you read the previous sentence again, you might notice that it contains the
    following:


    *   An action to pick the destination


    *   A branch that routes to the favorite destination


    *   A subtask to pick one of the available hiking trips at that destination


    This is exactly what the Conversation Designer allows you to enter. By clicking
    the bot icon, an “add message” dialog will be opened that allows you to enter
    the bot’s reply as an “action.” In the “actions” section, simply add a message
    and add as many actions as you like. As indicated in Figure [4-7](#479330_1_En_4_Chapter.xhtml#Fig7),
    the options for the user are


    *   USA


    *   Canada


    *   Switzerland/France


    For each of these, an action will be added.


    All of these actions will need to branch into the correct “favorite destination”
    subtask. You could manually create these subtasks, but the Conversation Designer
    allows you to do this automatically. If you invoke the hamburger menu next to
    the actions textbox (Figure [4-8](#479330_1_En_4_Chapter.xhtml#Fig8)), you can
    select the action type (`GoURL` or `Branch Conversation`). In this case, we want
    to branch the conversation, so that is what should be selected. When you select
    that option, the following textbox allows you to select an existing (sub-)task
    or create a new one by entering a nonexisting name.


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig8_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Branching the conversation


    For each of the “Branched Conversation” actions that are created (Figure [4-9](#479330_1_En_4_Chapter.xhtml#Fig9)),
    the Conversation Designer has automatically created a new subtask.


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig9_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Branches and subtasks


    The next step in implementing the design is to define the content of the subtasks.
    This works exactly the same as “regular tasks” such as the `FindTrip` that was
    previously described.


    As an example, the “Go to USA” subtask will be implemented. Where the `FindTrip`
    task used Actions to have the user pick the destination, in the “Go to USA,” we
    will use Cards.


    Cards are a bit fancier UI component that also allows for images. You can enter
    image URLs, and below that you can add actions for the user to pick. An example
    is displayed in Figure [4-10](#479330_1_En_4_Chapter.xhtml#Fig10).


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig10_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Cards and images


    Now you can preview individual tasks and subtasks of the Skill Bot in the Conversation
    Designer. This preview mode – activated by clicking the “Preview your Task” link
    in the top-right corner of the screen – allows you to check the flow by playing
    the currently displayed individual (sub)task. It is not a fully functional representation
    of the Skill Bot and only plays back the conversation exactly like it was entered
    in the Designer. This means that clicking actions or scrolling through the options
    of a carousel with cards is not possible. The main goal is to “preview” your Skill
    Bot.


    Once you are satisfied with the mockup, the final step of the conversation design
    is to generate your Skill Bot, train it, and test it.


    As soon as you invoke the **generate** button at the top right of the screen,
    a popup opens (Figure [4-11](#479330_1_En_4_Chapter.xhtml#Fig11)) that warns you
    that you are about to generate the Skill Bot. When you click “Generate,” the magic
    is invoked, and the Skill Bot is generated.


    ![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig11_HTML.jpg](images/479330_1_En_4_Chapter/479330_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Generate Skill'
  raw: '## Implementing the Travvy Design


    Now that you know what tasks and subtasks are, it should be easy to implement
    the Travvy design as formulated in Chapter [4](#479330_1_En_4_Chapter.xhtml).
    As stated before, the tasks in the Conversation Designer will become intents.


