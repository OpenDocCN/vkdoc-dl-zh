  trans: "\n### 注意\n\n在使用`Skill Tester`（位于左侧菜单底部，用于测试/使用`Skill Bot`）之前，您必须通过点击顶部蓝色栏中的“train”来训练它。\n\
    \n### 审查生成的工件\n\n要理解`Conversation Designer`的工作原理，最好仔细查看生成的工件。这将使我们能够了解`Intents`和`Entities`是从哪里从原型中提取的，以及对话流程是如何推导出来的。首先，我们将查看`Intents`。如前所述，`Intents`是从任务中推导出来的，示例话语是基于对话中的第一条消息生成的。以`FindTrip`为例，输入了消息“*我想去进行一次极限徒步旅行*”。查看图\
    \ 4-12，您将了解到以下内容：\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig12_HTML.jpg](img/479330_1_En_4_Fig12_HTML.jpg)\n\
    \n**图 4-12** 生成的意图\n\n- `FindTrip`意图是基于任务`Find a Trip`创建的。\n    - 此意图添加了五个话语，全部直接源自`Designer`中输入的消息。\n\
    - `Greeting`意图被创建。\n\n接下来，我们可以查看生成的实体。如您所见，为此`Skill Bot`创建了十个实体。这些实体（图 4-13）源自`Conversation\
    \ Designer`中输入的机器人回复。您会注意到有单个实体和复合包实体，这两种实体都将在第 5 章中更详细地解释。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig13_HTML.jpg](img/479330_1_En_4_Fig13_HTML.jpg)\n\
    \n**图 4-13** 生成的实体\n\n例如`TripDestination`实体。它是作为`ValueList`实体生成的，其值为*USA, Canada,\
    \ and Switzerland/France*。显然，这是从消息“*您想去哪个度假目的地？*”中推导出来的，如图 4-14 所示。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig14_HTML.jpg](img/479330_1_En_4_Fig14_HTML.jpg)\n\
    \n**图 4-14** 用于推导`TripDestination`实体的消息\n\n最后，生成了完整的`OBotML`流程定义`YAML`文件。我们不会详细讨论其内容，但高层次的解释应该足以让您有所了解。当您打开流程编辑器时，您会注意到第一部分包含大量以`#!`开头的行。这些行包含作为`JSON`对象的原型定义。\n\
    \n### 注意\n\n有时您看不到以`#!`开头的行。通常这是因为这些行被折叠了，由`{←`→`}`表示。您可以通过单击第 1 行旁边的小箭头来展开该部分。\n\
    \n除了原型定义之外，`YAML`文件还包含`Skill Bot`的实际流程定义。所有状态都已生成，包括一个`Unresolved Intent`状态。每个简单的机器人回复都有`System.Output`组件，而复杂的回复（如`Actions`和`Cards`）则有`System.CommonResponse`组件。下面显示了一个“Go\
    \ to USA”子任务及其各个卡片的示例。首先，设置一个变量名`levelCards`来包含所有关于卡片的信息。\n\n```\n--------------------\
    \  # Task \"Go to USA\" ---------------  ---------------\nsetLevelCards:\ncomponent:\
    \ System.SetVariable\nproperties:\nvariable: levelCards\nvalue:\nnp:\ntitle: Yosemite\
    \ NP\nimageUrl: \"\"\ndescription: \"陡峭的山脉，壮丽的景色\"\naction1Label: Yosemite - 徒步等级\
    \ T4\naction1Branch: Select Yosemite T4\naction2Label: Yosemite - 徒步等级 T5\naction3Label:\
    \ Yosemite - 徒步等级 T6\nyellowstone np:\ntitle: Yellowstone NP\nimageUrl: \"\"\n\
    description: 色彩斑斓的惊人间歇泉\naction1Label: Yellowstone - 徒步等级 T4\naction1Branch: Select\
    \ Yellow T4\naction2Label: Yellowstone - 徒步等级 T5\naction2Branch: Select Yellow\
    \ T5\naction3Label: Yellowstone - 徒步等级 T6\nzion np:\ntitle: Zion NP\nimageUrl:\
    \ \"\"\ndescription: 绿色、灰色和橙色相得益彰\naction1Label: Zion - 徒步等级 T4\naction2Label:\
    \ Zion - 徒步等级 T5\naction3Label: Zion - 徒步等级 T6\ntransitions: {}\n```\n\n然后，将使用此变量来提取需要在各个卡片中显示的信息。关于`Entities`、`Intents`和流程的所有细节将在本书的后续章节中解释。目前，只需知道这些是自动为您生成的，并且您对它们如何从原型中推导出来有了一些了解就足够了。\n\
    \n### 测试生成的技能机器人\n\n最后一步是实际测试生成的`Skill Bot`。如果之前没有完成，剩下的一个任务是训练`Skill Bot`。您可以通过查看工具栏中`Train`旁边的图标轻松判断是否需要训练。如果是一个感叹号，则表示需要训练（图\
    \ 4-15）。如果是一个勾选框，则表示不需要训练。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig15_HTML.jpg](img/479330_1_En_4_Fig15_HTML.jpg)\n\
    \n**图 4-15** 需要训练\n\n如果需要训练，您需要点击顶部蓝色工具栏中的`Train`，并提交弹出的窗口。训练将开始，并且通常成功完成，不会出现任何失败。您会注意到感叹号将变为一个勾选框，表示训练成功。现在您可以测试`Skill\
    \ Bot`了。可以通过点击左侧工具栏中的播放按钮来开始测试（图 4-16）。\n\n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig16_HTML.jpg](img/479330_1_En_4_Fig16_HTML.jpg)\n\
    \n**图 4-16** 启动测试器\n\n`Skill Tester`弹出窗口将显示，您可以通过输入类似“*嗨，我想去美国进行一次极限徒步旅行*”的消息来与`FindTrip`\
    \ `Skill Bot`开始对话（图 4-17）。`Skill Bot`将回复并为您提供选择徒步旅行的选项。请注意，美国已被预选为目的地，因为机器人从您的话语中识别出来了。\n\
    \n![../images/479330_1_En_4_Chapter/479330_1_En_4_Fig17_HTML.jpg](img/479330_1_En_4_Fig17_HTML.jpg)\n\
    \n**图 4-17** 使用生成的`Skill Bot`运行测试器\n\n接下来，您可以在轮播中浏览国家公园，并通过单击选择您偏好的徒步等级。对话将继续，就像在`Conversation\
    \ Designer`中定义的那样。\n\n您可以随时重新进入`Conversation Designer`对原型进行更改并重新生成`Skill Bot`。\n\
    \n### 注意\n\n始终记住，重新生成意味着所有在`OBotML`中对`Entities`、`Intents`和流程手动进行的更改都将被覆盖。\n\n\
    ## 总结\n\n在本章中，您学习了如何使用`Oracle Digital Assistant`的`Conversation Designer`来实现`Skill\
    \ Bot`的原型/初始骨架。`Conversation Designer`在开发的早期阶段非常有用，因为它不允许您实现更复杂的功能，例如问答、翻译、自定义组件和代理集成。这些功能需要在为`Skill\
    \ Bot`生成`OBotML`之后植入。所有这些都将在本书的后续章节中解释，您还将了解更多关于`Entities`、`Intents`和对话流程的内容。\n"
- fmt: '# 5. Going Through the Implementation Details


    Now that you are familiar with the background of Oracle Digital Assistant, what
    it does, and how you should design a Digital Assistant, it is time to understand
    some of the basic concepts. During the course of this chapter, you will be first
    introduced with the Oracle Digital Assistant (ODA) environment. Then you will
    start your journey with the Digital Assistant **Travvy**, based on the use case
    as described in Chapter 3. With each section, you will be first introduced with
    the concept and then implement those concepts with respect to the use case.


    ## Introduction to Oracle Digital Assistant (ODA) Environment


    Once the identity domain administrator of your Oracle Cloud environment grants
    you access, you will receive an email on your registered email address for the
    registration. Post receiving the email, you need to complete your registration
    for the environment. Once the process gets completed successfully, you will land
    on the home screen of your ODA as shown in Figure 5-1.


    This screen displays a list of instances in your ODA. As you can see in Figure
    5-1, we have created one instance named as `dadev` so far considering as a development
    environment.


    ### Tip


    You should use a naming convention for your instances so you can easily understand
    what you are looking at. The convention used for this book is `<2-letter-acronym-product><3-letter-acronym-environment>`
    leading to `dadev` for a digital assistant development environment.


    But this list will get updated as you add any new instance for ODA and that name
    will appear in the list.


    Figure 5-1: Oracle Digital Assistant home


    Then to navigate to a specific instance, which in this case is `dadev`, you will
    have to click the icon corresponding to the environment and select **Digital Assistant
    Designer UI**.


    Once you select the Digital Assistant Designer UI, you will be redirected to the
    home screen of that specific instance as shown in Figure 5-2. You will notice
    that your instance contains a Digital Assistant and few Skills which you didn’t
    create. Those are the samples which Oracle provides you as part of your instance
    to get you started.


    Also, you might have noticed that your home screen contains three tabs:


    - **All**: It is a cumulative view of all the Skills and Digital Assistants your
    ODA instance contains.

    - **Digital Assistants**: It contains all the Digital Assistant(s) your instance
    has.

    - **Skills**: All the Skills which your ODA instance has.


    Figure 5-2: Instance home


    It is important to first understand the difference between a **Digital Assistant**
    and a **Skill**. You can consider a Digital Assistant as a logical grouping of
    one or more Skills, Skills which can individually perform specific tasks, to complete
    an activity. When a user starts a conversation with a Digital Assistant, the Digital
    Assistant first analyzes the user’s inputs, and then, based on the inputs, it
    takes the user to a specific Skill.


    If you consider the use case described in Chapter 4 of this book, Travvy is your
    Digital assistant. And for Travvy, you will create various Skills (which will
    be individual chatbots) to perform tasks such as to find a trip, book a trip,
    update user information, and so on.


    Now that you have a basic understanding about Digital Assistant and Skills, next
    sections of this chapter will take you further into the details.


    ## Working with Skills


    As you might have understood already, Skills are the building blocks of any Digital
    Assistant. Based on your specific scenario, you will create one or more skill
    for your digital assistant to perform specific task(s). This section will describe
    how you can:


    - Create a Skill

    - Clone a Skill

    - Import a Skill

    - Export a Skill

    - Create a new version of a Skill

    - Delete a Skill

    - Publish a Skill

    - Export conversation log

    - Show channel routes


    ### Create a Skill


    Click icon in the top-left corner of your screen and navigate to **Skills** under
    **Development** as shown in Figure 5-3.


    Figure 5-3: Create Skill


    Once you navigate to Skills, click the icon to close the side menu.


    You will now add a new Skill for Travvy. To do so, you will first have to decide
    a name, also known as invocation name, for your Skill. There are some guidelines
    which you should follow when it comes to naming a Skill. Hence, your Skill name
    should:


    - Be unique within your Oracle Digital Assistant instance

    - Clearly specify the purpose of the Skill

    - Be simple, that is, easy to read and pronounce

    - Not be a long phrase nor one single word (unless that word explicitly expresses
    a unique name or purpose)

    - Not include words like “open,” “go to,” or “tell me.”


    Considering the preceding guidelines, you will name your Skill as `FindTrip`.
    As the name describes, you will use this Skill to find trips for users of your
    Digital Assistant.


    Click **New Skill** as shown in Figure 5-4 from the home page of Skills.


    Figure 5-4: Add a new Skill


    This will open a new window. You need to fill in required details as depicted
    in Figure 5-5.


    Figure 5-5: Create FindTrip Skill'
