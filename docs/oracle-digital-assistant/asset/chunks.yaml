  trans: '

    ### 可执行的洞察


    Oracle 数字助理中另一个非常有价值的功能是内置的分析功能。这些功能使您能够对对话进行深入分析。它将向您展示数字助理的使用情况，以及对话中存在的潜在问题。分析功能还能帮助您获取一些利用率信息，这些信息可用于提高数字助理的准确性，从而为您最终用户创造更佳的体验。系统提供了几种即时报告。**概览报告**会以图表形式展示所有对话指标。您可以查看用户随时间推移是放弃对话还是完成对话。它还能帮助您确定热门意图、最常用的渠道、对话时长以及错误计数。


    **意图报告**提供针对特定意图的执行指标数据和信息，而**路径报告**则以可视化方式呈现某个意图的对话流程。此外，还有**对话报告**，它显示对话的实际记录文本。这将帮助您在对话流程和聊天窗口的上下文中查看对话。最后，还有**重新训练报告**。此报告可用于通过有节制的自我学习来改进已开发的技能。


    所有分析数据都会自动收集，并与数字助理的测试工具集成，以便即使在测试期间也能收集和分析数据。本书后续章节将更详细地讨论这些报告，届时您将学习何时以及如何使用这些报告。


    ## 总结


    在本章中，您了解了聊天机器人的历史以及 Oracle 数字助理是如何从中演变而来的。您还获得了 Oracle 数字助理所涉及组件的高级概述，以及这些组件如何帮助您构建企业级数字助理。所有这些组件以及更多内容，都将在本书的其余章节中进行深入讨论。


    脚注 1


    # 第二部分设计与用户体验


    # 2. 设计对话式用户体验


    在没有商业案例的情况下构建数字助理是注定失败的。在开始之前，您应该始终尝试回答关键问题，例如：


    -   我们试图解决的业务痛点是什么？

    -   用户现有的使用流程是怎样的，如何改进？

    -   接触用户的合适渠道是什么，以及如何最好地利用它？

    -   机器人与用户之间的对话以及对话选项是什么？如何增强对话以利用渠道的属性、媒体和功能来改善用户交互？

    -   关键词汇是什么？对话中交换的实体有哪些？


    回答这些关键问题正是设计阶段的价值所在。


    ## 为什么需要对话式用户体验？


    简单来说，人与人之间的交谈比使用技术要自然得多。这是因为对话是天生的本能。与朋友或陌生人交谈时，如果我们说了令人困惑或说错的话，我们可以轻松地纠正自己。因此，自人类开始交易以来，人们就一直利用对话来推动销售和让客户满意。


    对话式用户体验（UX）转向了一种人类沟通的形式，就像一个人在与另一个人进行正常对话一样。参与对话式用户体验的两种流行方式是通过语音说话和通过向聊天机器人输入文本。千禧一代似乎更喜欢打字而不是打电话。而我们其他人也正在逐渐适应这种方式。


    对话式用户体验帮助企业更有效地销售其产品/服务或帮助客户。这也是通过消息和聊天应用（如 Facebook Messenger、WhatsApp、Talk 和微信）或通过语音技术（如亚马逊的
    Echo 产品，它通过语音命令与公司交互）与企业进行交互这一趋势的原因。通过对话式商务，客户可以在消息应用内与公司代表聊天、提问、获得客户支持、获得个性化推荐、阅读评论并一键购买。随着越来越多的人成为重度移动用户，提供更无缝的移动在线购物体验是一个很好的商业理念。通过对话式商务，消费者可以与人类代表、聊天机器人或两者结合进行互动。


    对话式商务之所以强大，是因为它：


    -   使品牌与消费者之间的自动化交互感觉更加人性化。作为界面的对话仍然是人类与技术交互最自然的方式。

    -   减少了完成一个操作所需的步骤以及消费者需要求助的信息源数量。

    -   实现了与客户的双向沟通。它不仅告诉客户信息，还从客户那里学习，倾听他们的问题，并建立关系。提供迎合用户主动意图的个性化体验，对于满足（和取悦）用户，并最终赢得他们的信任和忠诚度至关重要。

    -   是一种极其有效的方法，用于吸引用户/客户，根据他们的需求收集信息，理解他们的主动意图和目标，然后提供最有可能满足这些需求的体验。

    -   创造了一种比电子邮件等更具人情味和意义的互动。不仅语言听起来很自然，就像朋友或家人与用户交谈一样，而且它还能让用户一次性继续对话，从而立即加强关系，如图
    2-1 所示的示例。


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig1_HTML.jpg](img/479330_1_En_2_Fig1_HTML.jpg)


    图 2-1


    用户只需点击一下即可继续对话


    -   对话式商务缩短了潜在客户与购买之间的距离。它为客户提供了在商店里可能从销售助理那里得到的关注。当从网站订购时，他们可以阅读评论以了解产品是否适合自己，但使用聊天功能，他们可以请求帮助比较选项——更像是在店内获得的建议。


    请注意，并非所有内容都适合对话。您不希望聊天机器人列出完整的产品目录或用户手册。对话界面是一种补充界面。


    例如，当用户需要详细的说明或教程时，视频比文本效果更好。这保证了可用且固定的信息流，这是使用聊天时无法保证的。在这种情况下，固定的信息流效果更好，不会用大段文字填满聊天对话框。


    本质上，对话式用户体验是关于让技术的行为和交互方式更像我们彼此之间的互动。

