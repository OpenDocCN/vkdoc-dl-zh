    After that, when you need to create your sample utterances for the Intent, simply
    define a slot by writing it in curly brackets.


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig6_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Alexa add intent


    Slot values are extracted from utterances and sent with the intent request. Actual
    intent resolution will not be done by Amazon Alexa but by our Oracle Digital Assistant.
    This means that you can use slot type “AMAZON.LITERAL” (Figure [11-7](#479330_1_En_11_Chapter.xhtml#Fig7)).
    This slot will hold the text representation of whatever the user said. The entire
    content of this slot will then be forwarded to the skill’s endpoint and to Oracle
    Digital Assistant for intent resolution.


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig7_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Alexa add a slot type


    **An Endpoint**


    The actual logic for the custom skill will in our case be running on a REST endpoint
    implemented in Node.js and run on a server that hosts the Alexa app.


    For the purpose of this demo, it will be running locally, with an ngrok URL for
    it. The endpoint needs to be added to root URL of the server that hosts the Alexa
    app, in our case the local ngrok.


    In the HTTPS endpoint field, you need to fill out the exact URL of this (Figure
    [11-8](#479330_1_En_11_Chapter.xhtml#Fig8)):


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig8_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    Alexa configure endpoint


    With this in place, the custom Alexa skill is configured. Finally you need to
    find the Skill ID so it can be used in the configuration section of our node code.
    The Skill ID can be found from the Alexa Skills Kit (ASK) Developer Console (Figure
    [11-9](#479330_1_En_11_Chapter.xhtml#Fig9)):


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig9_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig9_HTML.jpg)


    Figure 11-9


    Alexa find the Skill ID


    This ID needs to be added to the node code of the webhook that was previously
    created so the webhook knows where to find the Alexa skill.


    ### Setting Up the Webhook


    In order to set up the webhook between Oracle Digital Assistant and Amazon Alexa,
    they need to know where to find each other. To achieve this, you need to add the
    previously generated **Secret Key**, **Channel URL**, and **Amazon Skill ID**
    to the metadata settings in the JavaScript code:


    ```

    //replace these settings to point to your webhook channel

    var metadata = {

    allowConfigUpdate: true,

    waitForMoreResponsesMs: 200,

    amzn_appId: "",

    channelSecretKey: '''', //BOT Secret Key

    channelUrl: ''''

    };

    ```


    ### Testing the Alexa Channel


    The conversation over Alexa can be easily tested with the Alexa developer console
    (Figure [11-10](#479330_1_En_11_Chapter.xhtml#Fig10)). Simply go to the test tab,
    and start typing your commands, or if you like it, you can even talk to Alexa.


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig10_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig10_HTML.jpg)


    Figure 11-10


    Alexa, testing in the console


    Another option is to use a smartphone which removes the need of involving a real
    Amazon Echo or Alexa device. You can use the official Alexa app on your smartphone.
    The following example shows how to run Alexa on Android phone. In the Google Play
    Store, search for Alexa and select Amazon Alexa. Tap the Install button and wait
    while the Amazon Alexa app downloads onto your device. Once you have installed
    Alexa on your phone, you will need to set it up. Open the Amazon app and log in
    using your existing Amazon account information, including your email address (or
    phone number, if you have a mobile account) and password. Tap the Sign In button.


    Once logged in, you should be able to use the app as were it an Amazon Echo or
    Dot and invoke the skill that calls the Oracle Digital Assistant. Click the skill
    to view more information or simply click the Alexa button to talk to Alexa and
    ask her to get Travvy to find you a trip (Figure [11-11](#479330_1_En_11_Chapter.xhtml#Fig11)).


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig11_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig11_HTML.jpg)


    Figure 11-11


    Alexa, skill testing in app


    It is obvious that a conversation over a voice channel is different from a conversation
    over a text or web channel. A voice channel will not be able to show images, for
    instance, nor will it allow you to click links or invoke webview components to
    enter additional data. However, it is possible to work with the differences. The
    Digital Assistant can send channel-specific replies. In a dialog flow, you can
    tell about the channel type and the name of the channel being used from expressions
    and in custom components. This would give you the option to optimize your dialog
    flow for use with voice.


    In addition, the System.CommonResponse component could show or hide response items
    based on the channel type and name.


    In the previous sections, you learned how to technically set up Alexa as a channel.
    It works, but the conversation is somewhat cumbersome. What you probably notice
    is that working with a voice channel is that it requires a special design of the
    conversation. The next section gives you some hints on how to design a voice user
    experience (VUX).'
  trans: '

    ### 配置 Alexa


    与 Alexa 交互的方式是向支持 Alexa 的设备发送命令（语音或文本）。该命令将被转发到运行在亚马逊 Alexa 服务上的技能，并最终转发到能够提供所请求信息的服务或数据源。为了使
    Oracle Digital Assistant 能够与 Alexa 协同工作，需要创建一个自定义技能，该技能将调用一个 REST 端点，将 Alexa 请求转发给我们的
    DA，并获取 DA 的响应，然后将其发送回 Alexa。


    要创建此 Alexa 技能并使其正常工作，需要对 Alexa 进行配置。相关步骤将在后续章节中说明。


    #### Alexa 调用语句


    调用语句是开始与特定自定义技能交互所必需的（图 11-5）。例如，要调用 Travvy，您可以使用“Travvy travel”。因此，每当用户说“Alexa，Travvy
    travel”时，此自定义技能就会被调用。现在，要预订行程，用户可以这样说：“Alexa，ask Travvy travel to book me a trip.”


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig5_HTML.jpg](img/479330_1_En_11_Fig5_HTML.jpg)


    图 11-5：设置调用名称


    #### Alexa 意图和槽位类型


    通过意图，您可以尝试表达您想要什么，您的意图是什么。它通常由一个句子组成。意图可以有可选的参数，称为槽位。槽位本质上是*话语中的变量*。槽位可以有预定义的值，但默认情况下是空的。要定义一个槽位，您首先需要在您的
    Alexa 技能中创建一个自定义意图（图 11-6）。之后，当您需要为该意图创建示例话语时，只需用花括号括起来定义一个槽位即可。


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig6_HTML.jpg](img/479330_1_En_11_Fig6_HTML.jpg)


    图 11-6：Alexa 添加意图


    槽位值从话语中提取，并与意图请求一起发送。实际的意图解析不会由 Amazon Alexa 完成，而是由我们的 Oracle Digital Assistant
    完成。这意味着您可以使用槽位类型 `AMAZON.LITERAL`（图 11-7）。此槽位将保存用户所说内容的文本表示形式。此槽位的全部内容随后将被转发到技能的端点以及
    Oracle Digital Assistant 进行意图解析。


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig7_HTML.jpg](img/479330_1_En_11_Fig7_HTML.jpg)


    图 11-7：Alexa 添加槽位类型


    #### 端点


    在我们的案例中，自定义技能的实际逻辑将运行在由 Node.js 实现并托管 Alexa 应用的服务器上的 REST 端点中。


    出于本演示的目的，它将在本地运行，并附带一个 `ngrok` URL。该端点需要添加到托管 Alexa 应用的服务器根 URL 中，在我们的案例中是本地的
    `ngrok`。


    在 HTTPS 端点字段中，您需要填写此 URL 的确切地址（图 11-8）：


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig8_HTML.jpg](img/479330_1_En_11_Fig8_HTML.jpg)


    图 11-8：Alexa 配置端点


    完成此设置后，自定义 Alexa 技能就配置好了。最后，您需要找到技能 ID，以便在节点代码的配置部分中使用它。技能 ID 可以从 Alexa Skills
    Kit (ASK) 开发者控制台中找到（图 11-9）：


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig9_HTML.jpg](img/479330_1_En_11_Fig9_HTML.jpg)


    图 11-9：Alexa 查找技能 ID


    此 ID 需要添加到之前创建的 webhook 的节点代码中，以便 webhook 知道在哪里找到 Alexa 技能。


    ### 设置 Webhook


    为了在 Oracle Digital Assistant 和 Amazon Alexa 之间设置 webhook，它们需要知道在哪里可以找到对方。为此，您需要将之前生成的**密钥**、**通道
    URL** 和 **Amazon 技能 ID** 添加到 JavaScript 代码的元数据设置中：


    ```javascript

    //替换这些设置以指向您的 webhook 通道

    var metadata = {

    allowConfigUpdate: true,

    waitForMoreResponsesMs: 200,

    amzn_appId: "",

    channelSecretKey: '''', //BOT 密钥

    channelUrl: ''''

    };

    ```


    ### 测试 Alexa 通道


    通过 Alexa 的对话可以很容易地使用 Alexa 开发者控制台进行测试（图 11-10）。只需转到测试选项卡，开始输入您的命令，或者如果您喜欢，甚至可以与
    Alexa 对话。


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig10_HTML.jpg](img/479330_1_En_11_Fig10_HTML.jpg)


    图 11-10：Alexa，在控制台中测试


    另一种选择是使用智能手机，这样就不需要真正的 Amazon Echo 或 Alexa 设备。您可以在智能手机上使用官方的 Alexa 应用。以下示例展示了如何在
    Android 手机上运行 Alexa。在 Google Play 商店中，搜索 Alexa 并选择 Amazon Alexa。点击安装按钮，等待 Amazon
    Alexa 应用下载到您的设备上。在手机上安装 Alexa 后，您需要进行设置。打开 Amazon 应用，使用您现有的 Amazon 账户信息登录，包括您的电子邮件地址（如果您有移动账户，也可以是手机号码）和密码。点击登录按钮。


    登录后，您应该能够像使用 Amazon Echo 或 Dot 一样使用该应用，并调用调用 Oracle Digital Assistant 的技能。点击技能以查看更多信息，或者只需点击
    Alexa 按钮与 Alexa 对话，让她让 Travvy 为您找到一次旅行（图 11-11）。


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig11_HTML.jpg](img/479330_1_En_11_Fig11_HTML.jpg)


    图 11-11：Alexa，在应用中测试技能


    很明显，通过语音通道进行的对话与通过文本或 Web 通道进行的对话是不同的。例如，语音通道无法显示图像，也不允许您点击链接或调用 webview 组件来输入额外数据。但是，可以处理这些差异。Digital
    Assistant 可以发送特定于通道的回复。在对话流中，您可以通过表达式和自定义组件了解通道类型和正在使用的通道名称。这将使您能够优化对话流以用于语音。


    此外，`System.CommonResponse` 组件可以根据通道类型和名称显示或隐藏响应项。


    在前面的章节中，您学习了如何在技术上将 Alexa 设置为一个通道。它是可行的，但对话有些繁琐。您可能注意到，使用语音通道需要特殊的对话设计。下一节将为您提供一些关于如何设计语音用户体验
    (VUX) 的提示。

    '
- fmt: '# Voice User Experience Guidelines


    Designing a dialog for voice is very different from designing a conversation for
    vision. A voice interface provides an experience in which users don’t use their
    eyes or hands to interact. So everything you know about visual hierarchy, colors,
    and using motion to create impact on your user you cannot apply when designing
    a VUX. The choice of words will influence how people perceive the customer experience
    you design for them, because there are no accompanying visual clues to guide the
    user.


    Here are some tips:


    - So provoke a more user-oriented voice interaction by asking relevant **follow-up
    questions** (Figure [11-13](#479330_1_En_11_Chapter.xhtml#Fig13)) to narrow down
    the list to the very best options before recommending them. The chatbot can collect
    the data it needs to provide the best possible answer.


    - Finally, keep in mind that users tend to assume that the system can understand
    beyond its actual capabilities and that very often users are unaware of the available
    functionalities. Therefor add **help information** whenever the user commits the
    same mistake twice. Additional to that, whenever relevant to the current situation,
    the digital assistant can **provide information especially about functions that
    users have never used before**.


    - **Be relatable.** Design your VUX so that the chatbot talks **with** your users,
    not **at** them. Your users need the chatbot to speak concisely to help them understand
    what information your skill needs and to feel confident about what is happening.


    - Given that speech takes precious memory away from other tasks, it is best to
    keep it minimal. Do not give the user all the information in one go. **Provide
    only the most relevant information** and then confirm with the user which part
    to elaborate on.


    - Present a list of options to the user by **prioritizing and summarizing the
    information based on known user preferences**, prior to delivering an answer.


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig13_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig13_HTML.jpg)


    Figure 11-13


    Asking follow-up questions


    - **Design for how people talk**, rather than how they type. Users don’t use keywords
    like when they are searching the Internet, for example, “tourist info Zion.”


    - **Handle errors gracefully**. Avoid error messages that only say that the chatbot
    didn''t hear or understand the user correctly. For example, “I didn''t hear you.”
    This causes users to repeat the same phrase that caused the error. Instead, add
    in information that is more helpful and be as explicit in your directions where
    possible. Users will quickly lose interest in and be annoyed by talking to a voice
    that robotically repeats “I’m sorry. I didn’t quite catch that,” like a broken
    phone tree menu. Instead, **ask for the missing information only** and **provide
    a wide variation in potential responses**. Create meaningful error messages to
    steer the conversation with the user back on track, without being incessantly
    annoying.


    - Outside of what a chatbot is actually saying (the content), its voice reveals
    a wealth of metainformation to the listener. **Use gender, age, inflection, tone,
    accent, cadence, and pace** to craft a particular user experience representing
    the company’s brand. The voice makes the chatbot unique, and the tone makes it
    sound like a human. Using a likable voice is critical for your brand, but there’s
    more to it. Companies that offer a voice UX with a consistent voice and pay careful
    attention to its tone, build better relationships with their users.


    - The tone of the voice is an adaptive reflection of feelings. Think of it in
    terms of your own voice and tone: You have only one voice, but you probably use
    a certain tone when you’re talking to your friends and an entirely different one
    when talking to your boss or to customers. You might use an extremely casual tone
    when you’re joking around with a friend, but a serious one when you’re consoling
    someone who’s upset. We instinctively adjust our tone in conversation, as an expression
    of empathy.


    - When it comes to audio, you have to make a design decision: “**To record, or
    not to record?** :)” Do you use a standard voice (i.e., the text-to-speech engine)
    or do you record custom audio for every response your skill will have?


    Always test how well the words flow together and how voice prompts sound to the
    ear.


    - Our eyes like patterns. They allow users to complete their action faster. Consistent
    visual design is good design! However, when it comes to voice, our ears do not
    like repetition. When designing a voice dialog, **try to use different phrases
    that signify the same action** (Figure [11-12](#479330_1_En_11_Chapter.xhtml#Fig12)).


    ![../images/479330_1_En_11_Chapter/479330_1_En_11_Fig12_HTML.jpg](images/479330_1_En_11_Chapter/479330_1_En_11_Fig12_HTML.jpg)


    Figure 11-12


    Different phrases signifying the same action


    ## Summary


    In this chapter, you have learned how to add sentiment analyses and speech to
    your Digital Assistant. Sentiment analysis can be implemented in various ways
    in the context of a chatbot, but typically uses specific, sometimes third-party,
    APIs dedicated to sentiment analyses. By using a custom component, you can invoke
    these APIs and work with their result to reply to the user in the correct way.


    Exposing your Digital Assistant over voice channels such as Google Home or Amazon
    Alexa is very straightforward and is based on webhook channels. Once you have
    your, preferably reusable, webhook code in place, it just a matter of configuration
    for you Digital Assistant to use these channels. Even though it is very tempting
    to use voice channels, you must always remember that voice usually requires a
    completely different design than text channels.


    ### Index


    #### A


    `Actionable insights` `AgeValidator.js` `Alexa` architecture `Apache FreeMarker
    Template Language (FTL)` `Application-Initiated Conversation (AIC)`


    #### B


    `Backends` `Blind testing` `bots-node-sdk` Bot’s personality `Built-in/system
    entities`


    #### C


    `Channel configurator` Channels chat widget, customization `ODA Client` samples
    routing types agent integration applications system users channel user channel,
    creation web channel, web application configure client SDK deploy hierarachy JavaScript
    code, add Travvy, creating web application working Chatbots artificial intelligence
    conversational flow digital assistant history turing test vendors Chatbot, training
    `Conversational AI engine` `NLP` `ODA` Conversational user experience backends
    benefits cognitive walkthrough designing enterprise entities goals interface personas
    creation product catalogue/user manual steps usability test users Conversations
    report `conversation.text()` method Custom components benefits of default implementation
    embedded container, ODA instance environment setup error external service Internet
    local debugging error message metadata URL skill tester test execution local machine
    location metadata `ngrok` node project ODA instance components screen create service
    package parent directory public URL service created Custom entities Customer,
    Harold goal tool working


    #### D


    Design and implementation chatbot `Conversation Designer` generated artifacts,
    intents Travvy’s design Cards and images `Conversation Designer` `FindTrip` task
    generated artifacts generated Skill Bot, testing `GoURL/Branch` Conversation initial
    view skill, creation skill tester Dialog design autonomy building personality
    conversation flow feedback goal commitment incentives information tone of voice
    Dialog flows built-in components context section Custom components execution `FTL`
    `OBotML` states section `Webview` components Dialog flows built-in components'
