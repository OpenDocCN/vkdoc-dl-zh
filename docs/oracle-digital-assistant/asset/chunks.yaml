- fmt: '### Actionable Insights


    Another really valuable feature in Oracle Digital Assistant are the built-in analytics.
    These enable you to do in-depth analyses of conversations. It will show you how
    your Digital Assistant is used and where there are potential issues within the
    conversation. The analytics also help you to get some utilization information
    which can be used to improve the accuracy of the Digital Assistant, thus enabling
    you to create an even better experience for your end users. There are several
    instant reports available. The **Overview report** shows you a graph of all the
    conversation metrics. You can see how users have either abandoned or completed
    conversations over time. It will also help you to determine top intents, the most
    used channels, conversation duration, and error counts.


    The **Intent report** provides intent-specific data and information for the execution
    metrics, and the **Paths report** gives you a visual representation of the conversation
    flow for an intent. Then there is the **Conversations report** that displays the
    actual transcript of the dialog. This will help you to view a conversation in
    the context of the dialog flow and the chat window. Finally, there is the **Retrainer
    report**. This report can be used to improve the developed skills through moderated
    self-learning.


    All the analytics data is collected automatically and is also integrated with
    the test tool of Digital Assistant so that even during testing the data is collected
    and analyzed. The reports will be discussed in more detail later in this book
    where you will learn when and how to use these reports.


    ## Summary


    In this chapter, you learned about the history of chatbots and how Oracle Digital
    Assistant evolved from this. You were also provided with a high-level overview
    of the components involved in Oracle Digital Assistant and how these can help
    you to build enterprise-grade Digital Assistants. All of these components, and
    more, will be discussed in depth in the remaining chapters of this book.


    Footnotes [1](#479330_1_En_1_Chapter.xhtml#Fn1_source)


    # Part IIDesign and User Experience


    # 2. Designing a Conversational User Experience


    Building digital assistants without a business case is a recipe for failure. You
    should always try to answer the key questions before you start like:


    - What is the business pain we are trying to solve?

    - What is the existing journey users take and how can it be improved?

    - What is the appropriate channel to reach the users and how can it best be used?

    - What is the conversation between the bot and user and the dialog option and
    how can the dialog be enhanced to use the channel’s properties, media, and facilities
    to improve the user interactivity?

    - What is the key vocabulary? Which are the entities exchanged in the dialog?


    Answering these key questions is where the design phase has its value.


    ## Why a Conversational User Experience?


    Simply put, people are a lot better at talking with each other than using technology.
    That’s because conversation is natural and innate. When speaking with a friend
    or a stranger, we can easily correct ourselves if we say something confusing or
    misspeak. Therefore people have been using conversation to drive sales and make
    customers happy since humans first began trading.


    Conversational user experience (UX) makes the switch to a human form of communication
    as if a human is having a normal conversation with another person. Two popular
    ways of engaging with conversational UX are through vocalized speech and through
    typing text into a chatbot. Millennials appear to prefer to type over using the
    phone. And the rest of us are getting used to that too.


    A conversational UX helps an enterprise to sell their products/services or helps
    customers more effectively. That is also the reason for this trend toward interacting
    with businesses through messaging and chat apps like Facebook Messenger, WhatsApp,
    Talk, and WeChat or through voice technology, like Amazon’s Echo product, which
    interfaces with companies through voice commands. By means of conversational commerce,
    customers can chat with company representatives, ask questions, get customer support,
    get personalized recommendations, read reviews, and click to purchase all from
    within messaging apps. As more people become heavy mobile users, it’s a great
    business idea to provide a more seamless experience of shopping online with one’s
    mobile. With conversational commerce, the consumer engages in this interaction
    with a human representative, chatbot, or a mix of both.


    Conversational commerce is powerful because it:


    - Makes the automated interactions between the brand and the consumer feel much
    more human. Conversation as an interface still is the most natural way for humans
    to interact with technology.

    - Reduces the steps required to complete an action and the number of information
    sources consumers need to turn to.

    - Enables two-way communication with the customer. It doesn’t just tell them things
    but also learns from them, hears their questions, and builds a relationship. Delivering
    a personalized experience that caters to a user’s active intent is critical to
    satisfying (and gratifying) users and ultimately earning their trust and loyalty.

    - Is an extremely effective method to engage users/customers, collect information
    based on their needs, understand their active intent and goals, and then deliver
    an experience that has the greatest potential to satisfy these needs.

    - Creates an interaction that is more personable and meaningful than for instance
    email. Not only does the language sound natural, like how a friend or family member
    would talk to a user, but it also enables the relationship to immediately strengthen
    by allowing the user to continue the conversation in one go, as you can see in
    the example illustrated in Figure [2-1](#479330_1_En_2_Chapter.xhtml#Fig1).


    ![../images/479330_1_En_2_Chapter/479330_1_En_2_Fig1_HTML.jpg](images/479330_1_En_2_Chapter/479330_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    The user can continue the conversation with one click


    - Conversational commerce shortens the distance between prospect and purchase.
    It offers customers the attention they might get from a sales associate in the
    store. When ordering from a web site, they can read reviews to get a sense of
    whether a product will work for them, but using chat they can ask for help comparing
    their options – more like the advice they would receive in-store.


    Beware of the fact that not all content is dialog-able. You do not want a chatbot
    to list a complete product catalogue or user manual. A conversational interface
    is a complementary interface.


    When users require detailed instructions or tutorials, for example, video works
    better than text. This guarantees a usable and fixed information flow, something
    that is not guaranteed when using chat. A fixed flow of information works better
    in this case, not filling the chat dialog with a wall of text.


    In essence, conversational UX is about making technology behave and interact more
    like we interact with one another.'
