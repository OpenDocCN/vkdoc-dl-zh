  trans: "\n### 提示\n\n`Q&AMinimumMatch` 设置默认为 `50%/25%`。虽然将其设置为例如 `90%` 没有意义，但您可能希望通过将其设置为仅\
    \ `50%` 或仅 `30%` 来调整问答（QnA）的查找结果。`50%/25%` 的默认值意味着，如果 `50%` 的匹配度未达到，搜索将回退到 `25%`，即采用一个更宽松的条件。\n\
    \n这两个属性的组合决定了流程的最终解析结果和输出。当用户输入一个短语时，可能会出现几种情况。让我们看一些示例：\n\n- 超过 `confidenceTreshold`\
    \ 且未达到 `Q&AMinimumMatch`：在这种情况下，意图被解析，用户会看到机器人对该意图的回复（图 9-2）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig2_HTML.jpg](img/479330_1_En_9_Fig2_HTML.jpg)\n\
    \n图 9-2 情况 1\n\n- 低于 `confidenceTreshold` 且达到 `Q&AMinimimMatch`：在这种情况下，机器人将向用户回复与所提问题对应的答案（图\
    \ 9-3）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig3_HTML.jpg](img/479330_1_En_9_Fig3_HTML.jpg)\n\
    \n图 9-3 情况 2\n\n- 低于 `confidenceTreshold` 且未达到 `Q&AMinimimMatch`：机器人将不知道如何解析该意图，并向用户显示未解析意图的提示（图\
    \ 9-4）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig4_HTML.jpg](img/479330_1_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4 情况 3\n\n- 超过 `confidenceTreshold` 且达到 `Q&AMinimimMatch`：在这种情况下，有几种可能的结果：\n\
    \  - 第一种取决于是否使用了祈使动词，例如“购买”、“检查”、“订购”、“确认”和“取消”。这些词表示一个交易，而非一个问题，因此，只要话语中使用了祈使句，机器人将仅回复意图。如果话语中不包含祈使句，机器人将同时显示问答和意图（图\
    \ 9-5）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig5_HTML.jpg](img/479330_1_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5 情况 5\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig6_HTML.jpg](img/479330_1_En_9_Fig6_HTML.jpg)\n\
    \n图 9-6 情况 5\n\n  - 第二种取决于 `QnASkipIfIntentFound` 的设置。此属性可以在 `System.Intent` 级别设置。当设置为\
    \ `true` 时，如果匹配到意图，机器人将绕过问答。当设置为 `false`（默认值）时，机器人会使用用户的话语查询问答服务器，并将问答作为选项呈现（图\
    \ 9-6）。\n\n在本章的剩余部分，您将学习如何在 Travvy 数字助手的问答技能中使用这些属性。\n\n## 为我们的数字助手添加问答功能\n\n\
    现在您已经了解了如何配置问答，是时候开发一个问答技能了。为数字助手添加问答功能的过程包含多个步骤。我们将引导您完成这些步骤，并对它们逐一进行解释：\n\n\
    - 创建一个新的技能来承载问答。\n- 为该技能启用问答功能。\n- 加载问答源文件，并可选择编辑、添加或删除更多问题。\n- 使用问答训练器训练机器人。\n\
    - 通过在问答测试器中输入问题来测试新的问答功能。\n- 要在机器人对话流程中使用问答，我们需要配置 `System.QnA`。\n- 为 *none* 动作添加一个状态，并在问题被回答时，通过为下一次转换添加问答，将转换设置回问答组件。\n\
    \n要开始使用问答，首先需要创建一个新的技能（图 9-7）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig7_HTML.jpg](img/479330_1_En_9_Fig7_HTML.jpg)\n\
    \n图 9-7 创建一个新的问答技能\n\n点击“创建”后，技能编辑器将打开，一切准备就绪，可以添加问题和答案、编写流程并测试问答技能。在初始创建技能后，机器人构建器并不知道这个特定的技能应该被创建为问答技能。为了使该技能成为问答技能，需要通过点击导航栏中的问答图标\
    \ ![../images/479330_1_En_9_Chapter/479330_1_En_9_Figa_HTML.jpg](img/479330_1_En_9_Figa_HTML.jpg)\
    \ 来启用问答。然后点击 **添加问答**（图 9-8）。\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig8_HTML.jpg](img/479330_1_En_9_Fig8_HTML.jpg)\n\
    \n图 9-8 为技能添加问答\n\n现在一切已设置完毕，下一步是上传包含该技能所有问题和答案的 csv 文件。点击“+ 问答源”后，会显示一个对话框，您可以在其中设置语言、区域设置和名称，并上传您的\
    \ csv 文件。在讨论上传本身之前，我们需要确保初始问答数据集的数据源设置正确。\n\n### 问答数据文件\n\n问答数据文件是一个包含您技能初始所需的所有问答对的文件。通常，此文件会以\
    \ Oracle 数字助手可以处理的格式打包您的常见问题解答（FAQ）。该文件必须满足一些标准才能上传到数字助手云：\n\n![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig9_HTML.jpg](img/479330_1_En_9_Fig9_HTML.jpg)\n\
    \n图 9-9 问答数据源文件示例\n\n- 该文件必须是 UTF-8 编码的 CSV 文件。\n- 文件必须包含带有 `category_path`、`questions`\
    \ 和 `content` 的标题行。在该行下方，可以添加实际的问题和答案。图 9-9 显示了一个示例。\n\n`category_path` 包含给定问答对的类别（或多个类别）。这样一个问答对可以属于多个类别。如果是这种情况，每个类别应在新的一行中输入。如果类别存在层级关系，则应使用正斜杠：\n\
    \n- travel\n- travel/insurance\n- travel/itinerary\n\n在 `questions` 列中，您输入要使用的问题。每个问题版本应在新的一行中输入。第一个问题，即规范问题，是默认在机器人消息中显示的问题。该列中的后续问题是替代版本。\n\
    \n您可以在云用户界面中手动添加所有问题和答案，但使用电子表格输入数据是一种更方便的方式。使用电子表格进行初始的问答批量加载将节省您的时间。如果在后期需要添加额外的单个问题和/或答案，可以在上传\
    \ csv 文件后始终在用户界面中手动添加。\n"
- fmt: '### Tip


    The more questions you add for each answer, the more likely it is that relevant
    Q&A pairs are returned to the user of the skill. Add between 2 and 5 questions
    for each answer. This will improve accuracy.


    When adding the questions and answers, you have to make sure enough questions
    are provided to the skill in order to recognize all different ways that a user
    can ask the same question. The best way to do this is to vary the verb and interrogatives
    like “how,” “what,” and “where,” but be very consistent with the answer’s topic.


    A question like “Where can I find travel destinations?” could be asked in different
    ways such as:


    - Do you have a list of destinations?

    - Can I get an overview of all destinations?

    - What are possible destinations for my trip?


    It is obvious that these questions should always return the same answer. When
    you are satisfied with the content of the Q&A CSV, you can now add it to your
    skill. This upload process can be started by invoking the “+ Q&A Source” button
    as shown in Figure [9-10](#479330_1_En_9_Chapter.xhtml#Fig10).


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig10_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig10_HTML.jpg)


    Figure 9-10: Add new Q&A source


    An upload dialog will appear (Figure [9-11](#479330_1_En_9_Chapter.xhtml#Fig11))
    where you can pick the language and locale for the Q&A source and give it a name.
    Next, the CSV file can be dragged onto the dialog in order to upload it. Once
    all fields are entered, click `Create`, and the CSV will be uploaded and added
    to your Q&A.


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig11_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig11_HTML.jpg)


    Figure 9-11: Adding a source for Q&A


    ### Tip


    If, after uploading, you decide to edit the data source file and replace the content,
    be aware that it will replace all online content with the content from the new
    CSV file. Any changes you made in the cloud will be overwritten. It is better
    to make changes in the CSV instead of in the cloud. If you make changes in the
    cloud, make sure that, before uploading a new file, you export the cloud Q&A content.


    All the questions and answers in the CSV are now uploaded to the Skill Editor.
    In the list, you can see the file that you just uploaded.


    One more thing you can do to improve the quality of the Q&A is to add language-specific
    configuration. Here you can add ignored words, abbreviations, and synonyms. For
    instance, for “trip,” there are synonyms such as “journey,” “holiday,” “voyage,”
    and more.


    By simply adding them here as synonyms, they can all be used to resolve to the
    same question (Figure [9-12](#479330_1_En_9_Chapter.xhtml#Fig12)).


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig12_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig12_HTML.jpg)


    Figure 9-12: Add synonyms


    ### Note


    In this chapter, we will not go into the details of multilanguage. The specifics
    of multilanguage were discussed in Chapter [7](#479330_1_En_7_Chapter.xhtml).


    When you click “View All Q&A,” you will see a list that shows the exact content
    of that file (Figure [9-13](#479330_1_En_9_Chapter.xhtml#Fig13)).


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig13_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig13_HTML.jpg)


    Figure 9-13: All Q&A for Travvy


    This is also the place to edit the Q&A and to make an export if needed. It is
    now time to train the Q&A.


    ### Testing the Q&A


    In order to make sure that the Q&A works as expected, it has to be tested, but
    before we test the Q&A, we must train the Q&A (Figure [9-14](#479330_1_En_9_Chapter.xhtml#Fig14)).
    This is a simple task that can be executed in the training section of the bot
    builder:


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig14_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig14_HTML.jpg)


    Figure 9-14: Training the Q&A for the skill


    Once this is done, the tester can be invoked by clicking “Try It Out” to start
    testing the Q&A for Travvy. This can be done on a “one by one” basis or in batch.
    For Travvy, we will stick with the “one by one.” Let’s check what happens when
    we enter “How do I pay my trip?” (Figure [9-15](#479330_1_En_9_Chapter.xhtml#Fig15)).


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig15_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig15_HTML.jpg)


    Figure 9-15: Testing the Q&A


    The Q&A capability handles the responses to the utterances that were entered.
    It consists of a set of questions which represent the best fit. In our test case,
    there are three possible questions that relate to the user’s utterance, all belonging
    to the “trip payment” category. Outside the tester, in the real “chatbot,” these
    answers will be shown in a kind of carousel, so the user can browse all matching
    questions in order to find the one he is looking for.


    Now let’s have a look at what happens if we change that to “How do I pay my booking?”
    (Figure [9-16](#479330_1_En_9_Chapter.xhtml#Fig16)).


    ![../images/479330_1_En_9_Chapter/479330_1_En_9_Fig16_HTML.jpg](images/479330_1_En_9_Chapter/479330_1_En_9_Fig16_HTML.jpg)


    Figure 9-16: Testing the Q&A


    The Q&A capability now picks a different question and a different order. Obviously
    all questions somehow relate to the entered utterance. If you want to increase
    the weighting of a question and answer for an utterance, you can use the “**Add
    to Question**” button to add your utterance to a specific Q&A question.'
  raw: '### Tip


    The more questions you add for each answer, the more likely it is that relevant
    Q&A pairs are returned to the user of the skill. Add between 2 and 5 question
    for each answer. This will improve accuracy.


    When adding the questions and answers, you have to make sure enough questions
    are provided to the skill in order to recognize all different ways that a user
    can ask the same question. The best way to do this is to vary the verb and interrogatives
    like “how,” “what,” and “where,” but be very consistent with the answer’s topic.


    A question like “Where can I find travel destinations?” could be asked in different
    ways such as:


    *   Do you have a list of destinations?


    *   Can I get an overview of all destinations?


    *   What are possible destinations for my trip?


    It is obvious that these questions should always return the same answer. When
    you are satisfied with the content of the Q&A csv, you can now add it to your
    skill. This upload process can be started by invoking the “+ Q&A Source” button
    as shown in Figure [9-10](#479330_1_En_9_Chapter.xhtml#Fig10).


