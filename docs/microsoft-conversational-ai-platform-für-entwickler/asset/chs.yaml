  {\n\"Typ\": \"TextBlock\",\n\"Text\": \"12:30 - 13:30\",\n\"isSubtle\": true,\n\"\
  Abstand\": \"keine\"\n},\n{\n\"Typ\": \"TextBlock\",\n\"Text\": \"小睡时间\"\n},\n{\n\
  \"Typ\": \"Input.ChoiceSet\",\n\"id\": \"Schlummern\",\n\"Stil\": \"kompakt\",\n\
