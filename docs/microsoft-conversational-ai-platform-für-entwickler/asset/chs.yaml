  \ Python 的 Bot Framework v4 机器人，这大大方便了开发阶段。\n\n**注意**\n\n所有这些模板都为您提供了一个项目脚手架，您可以在此基础上进一步扩展，加入您想要实现的机器人逻辑。除了这些模板，微软还提供了一系列解决方案加速器，这些基本上都是现成的机器人项目。以下所有解决方案均可在此处找到：[`microsoft.github.io/botframework-solutions/index`](https://microsoft.github.io/botframework-solutions/index)。\n\
  \n表 1.2 列出了当前通过 Bot Framework SDK 可用的所有解决方案加速器。\n\n表 1.2\n\nBot Framework 解决方案加速器。（来源：[`microsoft.github.io/botframework-solutions/index`](https://microsoft.github.io/botframework-solutions/index)）\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| **虚拟助手** | 核心上，虚拟助手（提供 C# 和 TypeScript 版本）是一个项目模板，包含了在微软\
  \ Azure 平台上开发机器人的最佳实践。 |\n| **企业助手** | 企业助手示例是一个虚拟助手的实例，它有助于构思和演示在常见企业场景中使用助手的方式。同时，它为那些有兴趣为此场景创建定制化助手的人提供了一个起点。\
  \ |\n| **酒店业助手** | 酒店业示例建立在虚拟助手模板之上，并额外包含一个用于回答酒店常见问题的 QnA Maker 知识库，以及定制的自适应卡片。\
  \ |\n\n\n\n### 虚拟助手\n\n虚拟助手是三个模板中最先进的一个，它基本上集成了典型企业机器人所能提供的一切功能。它基于 Bot Framework\
  \ 技能，使您能够将可重用的技能集成到您的机器人中，并利用预定义的技能，例如电子邮件技能、日历技能、任务技能或兴趣领域技能。此模板是一个开箱即用的机器人，除了各种技能外，它还集成了多种输入和输出类型，如按钮、自适应卡片，甚至语音功能。这使得虚拟助手能够同时在各种渠道和设备上使用，从浏览器和应用程序到智能设备，甚至汽车等车辆。虚拟助手的主要优势之一在于，一个包含大量业务逻辑的复杂机器人可以在几分钟内准备就绪。这使得开发人员能够极大地简化开发流程，从而有更多时间专注于业务需求，而不是花费大量时间设置核心环境。图\
  \ 1.6 展示了虚拟助手解决方案加速器及其所有关联服务的完整图景。\n\n![](img/495919_1_De_1_Fig6_HTML.png)\n\n图\
  \ 1.6\n\n虚拟助手 Bot Framework。（来源：[`microsoft.github.io/botframework-solutions/overview/virtual-assistant-solution/`](https://microsoft.github.io/botframework-solutions/overview/virtual-assistant-solution/)）\n\
  \n### 企业助手\n\n虚拟助手是一个相当全面的机器人示例，而企业助手则展示了如何在企业场景中使用助手。此模板包含了一些在企业级机器人项目中最常用的技能和用例，例如电子邮件和\
  \ ITSM。ITSM 技能基于 ServiceNow 平台。您只需在机器人的 `appsettings.json` 文件中输入几个配置项，即可在您的机器人和\
  \ ServiceNow 之间建立连接，几分钟内，您的机器人就能够创建新工单、更新现有工单或查看您服务台内特定工单的详细信息（见图 1.7）。\n\n![](img/495919_1_De_1_Fig7_HTML.png)\n\
  \n图 1.7\n\nBot Framework 企业助手。（来源：[`microsoft.github.io/botframework-solutions/solution-accelerators/assistants/enterprise-assistant`](https://microsoft.github.io/botframework-solutions/solution-accelerators/assistants/enterprise-assistant)）\n\
  \n### 酒店业助手\n\n与不针对特定业务领域的虚拟助手或企业助手模板不同，酒店业助手模板可用作构建专门用于酒店业（如酒店或餐厅）的机器人的起点。此模板包含一系列为此类场景设计的技能，例如餐厅预订、活动、新闻或天气技能。下图中显示的所有技能都已准备就绪，并可根据特定需求进行定制。例如，天气技能利用\
  \ AccuWeather API 来收集特定地点的天气信息。作为开发人员，您只需在机器人的 `appsettings.json` 文件中提供您自己的 API\
  \ 密钥，该技能即可完全正常运行，无需编写任何代码。图 1.8 展示了与此解决方案加速器示例相关联的技能。\n\n![](img/495919_1_De_1_Fig8_HTML.png)\n\
  \n图 1.8\n\nBot Framework 酒店业助手。（来源：[`microsoft.github.io/botframework-solutions/solution-accelerators/assistants/hospitality-assistant`](https://microsoft.github.io/botframework-solutions/solution-accelerators/assistants/hospitality-assistant)）\n\
  \n### SaaS 解决方案\n\n微软 AI 平台的顶层由基于 AI 的软件即服务解决方案组成。例如，其中许多解决方案都可以在 Microsoft Teams\
  \ 中找到。如果您查看 Teams 应用商店，会发现那里有许多可用的机器人，例如 WhoBot（一个帮助您与组织内人员建立联系的机器人）和 Polly（一个帮助您在团队中创建和管理投票的基于\
  \ AI 的助手）。所有这些解决方案都旨在在各种场景中为您提供支持，而无需您开发或管理机器人。您在 Teams 应用商店中找到的许多（如果不是全部）机器人，都基于微软对话式\
  \ AI 平台，并利用 Microsoft Bot Framework 和认知服务来构建机器人。\n\n微软提供的另一个名为 Power Virtual Agents\
  \ 的 SaaS 解决方案可以帮助您创建机器人。此解决方案与前述解决方案的区别在于，使用 Power Virtual Agents 您无需编写代码。它提供了一个可视化设计器，您可以通过拖放界面创建对话树和对话场景，从而为您生成一个机器人。然后，该机器人可以部署在多种场景中，例如客户服务，以利用预构建的\
  \ AI 服务来改进您的流程。\n\n## 总结\n\n本章是对微软对话式 AI 平台的简要介绍。本章的第一部分描述了对话式 AI 应用程序的主要组成部分，重点介绍了自然语言处理、翻译和语音。然后，我们探讨了对话式\
  \ AI 的各种应用场景及其相关优势。最后一部分描述了微软提供的对话式 AI 平台的不同部分和服务，例如 Bot Framework 或认知服务，这些将在后续章节中详细讨论。\n\
  \n在下一章中，我们将更深入地了解 Microsoft Bot Framework，这是一个专为创建和托管复杂机器人而设计的平台。在那里，您将学习该框架的核心概念，以及一些在您使用微软对话式\
  \ AI 平台创建机器人时可以使用的实践和工具。\n\n\n\n"
- "# 2. 微软 Bot Framework 简介\n\n2016 年 3 月，微软宣布了一个源自 FUSE Labs（微软内部专注于实时和富媒体体验的团队）的项目公开预览版：微软\
  \ Bot Framework。该产品的主要关注点是为 Bot 开发者提供开发智能交互式 Bot 所需的一切。不久之后，Bot Framework SDK 第\
  \ 3 版正式发布，许多开发者开始使用这个框架来构建功能全面的 Bot。大约两年半后，微软于 2018 年底发布了 Bot Framework 的第 4 版，这使得为各种受支持的编程语言和平台创建\
  \ Bot 变得更加容易。在第 4 版中，Bot Framework 目前支持使用 `.NET`、`JavaScript/TypeScript` 和 `Python`\
  \ 以及仍处于预览阶段的 `Java` 来创建 Bot。\n\n如今，每月有超过 50,000 个活跃的 Bot 使用微软 Bot Framework 创建，这些\
  \ Bot 每月发送/接收的消息超过 12.5 亿条。凭借超过 99.9% 的可用性，微软 Bot Framework 是市场上最常用的 Bot 创建平台之一，并且越来越受欢迎。\n\
  \n因此，本章将介绍这个综合框架的基本原理，以及所有可用于构建复杂 Bot 的 SDK、工具和服务。\n\n## 微软 Bot Framework 的关键概念\n\
  \n通常，Bot 可以被视为一种具有特殊集成的 Web 应用程序，因为它不仅提供图形用户界面，还与最终用户进行类似人类的对话。这些对话的性质可能不同，包括文本、图像或卡片等图形，甚至语音。这些对话的核心是所谓的“活动”（Activity），它代表了\
  \ Bot 和用户之间的单次交互。由于用户通常通过“渠道”（Channel）与 Bot 交互，即 Bot 所连接的应用程序，因此 Bot Framework 服务负责在\
  \ Bot 和渠道之间路由活动。这个 Bot Framework 服务是 Azure Bot 服务中的一个组件，它为您处理这些路由和消息传递例程，因此在开发 Bot\
  \ 时您无需关心这些。\n\n回顾上一章描述的 Echo Bot 模板，Bot 和用户之间此类对话的活动流程可能如图 2.1 所示。\n\n![](img/495919_1_De_2_Fig1_HTML.png)\n\
  \n图 2.1\n\nBot Framework 活动流程。（来源：[`docs.microsoft.com/en-us/azure/bot-service/bot-builder-basics`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-basics)）\n\
  \n这个简单的对话由两条消息组成：一条来自用户发送给 Bot，内容是“你好”；另一条来自 Bot 回复给用户，内容是“你说了“你好””。然而，这个对话还涉及其他活动。首先，Bot\
  \ Framework 服务向 Bot 发送一个类型为 `ConversationUpdate` 的活动，表明有新用户加入了对话。在 Bot 向 Bot Framework\
  \ 服务返回 `HTTP 200 OK` 以确认对话可以开始后，Bot Framework 服务与 Bot 之间会交换第二个 `ConversationUpdate`\
  \ 活动，表明 Bot 也加入了对话。之后，Bot 才能接收用户的消息。消息本身也是类型为 `Message` 的活动，它们通过 Bot Framework 服务在渠道和\
  \ Bot 之间交换。当 Bot 发送一个消息活动时，用户使用的渠道负责渲染该消息，消息可以包含文本、图像、卡片或其他富媒体附件，如音频、视频、按钮或要朗读的文本。在这个简单的例子中，Bot\
  \ 响应用户发送的消息活动，但 Bot 也可以响应其他活动类型，例如 `ConversationUpdate` 活动，以便在用户进入对话时向其打招呼，这被称为“主动消息传递”，将在后面的章节中描述。\n\
  \n如上图所示，活动是通过 `HTTP-POST` 请求发送的。尽管协议没有规定 `HTTP` 请求的确切顺序，但这些请求是嵌套的。这意味着出站请求（即从 Bot\
  \ 到用户的请求）是在入站请求（即从用户到 Bot 的请求）的框架内执行的。这确保了 Bot 之间交换活动时的顺序得以保持。\n\nBot Framework\
  \ SDK 使用一种称为 `turn`（轮次）的模式，将传入的活动与属于该传入活动的所有传出活动分组。这可以类比人们说话的方式，即轮流进行，一个接一个。因此，轮次可以定义为对特定活动的处理。在一个轮次内，有一个轮次上下文对象，它本质上是活动的信息存储。这个轮次上下文通常存储关于发送者、接收者、渠道以及其他成功处理活动所需的必要元数据的信息。轮次上下文在\
  \ Bot 的所有不同层（例如中间件组件或 Bot 逻辑）中都是可访问的，因此这些组件可以随时检索活动详情。此外，轮次上下文还允许中间件组件和 Bot 的应用程序逻辑发送传出活动，这使其成为\
  \ Bot Framework SDK 中的关键组件之一。\n\n## 活动处理\n\n如果您查看图 2.2，它本质上展示了前文提到的 Echo Bot 示例中的活动处理过程，您会发现幕后还有更多事情发生。在\
  \ Bot Framework 服务接收到一个传入活动后，它会调用相应适配器的 `ProcessActivity` 方法。在渠道和 Bot 之间作为 `HTTP-POST`\
  \ 请求发送的每个活动，始终包含一个 `JSON` 负载。这个负载在传递给适配器的 `ProcessActivity` 方法之前，会被反序列化为一个 `Activity`\
  \ 对象。适配器接收到反序列化的活动对象后，会创建一个新的轮次上下文。利用这个新的轮次上下文对象，适配器随后调用中间件组件来处理这个轮次上下文。由于轮次上下文提供了发送传出活动的能力，它还提供了异步运行的发送、更新和删除响应功能。\n\
  \n![](img/495919_1_De_2_Fig2_HTML.png)\n\n图 2.2\n\nBot Framework 活动堆栈。（来源：[`docs.microsoft.com/en-us/azure/bot-service/bot-builder-basics`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-basics)）\n\
  \n\n\n## 活动处理程序\n\n当机器人接收到新的活动时，它会调用活动处理程序。Bot Framework SDK 中的主要活动是轮次处理程序，所有活动都通过它进行路由。然后，轮次处理程序会调用所有其他处理程序，以处理表\
  \ 2.1 中为 C# 描述的特定活动类型。\n\n表 2.1\n\nBot Framework 活动处理程序 C#。（来源：[`docs.microsoft.com/en-us/azure/bot-service/bot-builder-basics`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-basics)）\n\
  \n| 处理程序名称 | 事件 | 描述 |\n| --- | --- | --- |\n| `OnTurnAsync` | 每种接收到的活动类型 | 根据接收到的活动类型，调用其他处理程序之一。\
  \ |\n| `OnMessageActivityAsync` | 接收到的消息活动 | 处理消息活动。 |\n| `OnConversationUpdateActivityAsync`\
  \ | 接收到的对话更新活动 | 当机器人以外的成员加入或离开对话时，在 `conversationUpdate` 活动上调用一个处理程序。 |\n| `OnMembersAddedAsync`\
  \ | 非机器人成员已加入对话 | 处理加入对话的成员。 |\n| `OnMembersRemovedAsync` | 非机器人成员已离开对话 | 处理离开对话的成员。\
  \ |\n| `OnEventActivityAsync` | 接收到的事件活动 | 在事件活动上调用特定于事件类型的处理程序。 |\n| `OnTokenResponseEventAsync`\
  \ | 接收到的令牌响应事件活动 | 处理令牌响应事件。 |\n| `OnEventAsync` | 接收到的非令牌响应事件活动 | 处理其他类型的事件。 |\n\
  | `OnMessageReactionActivityAsync` | 接收到的消息反应活动 | 当一条消息被添加或移除一个或多个反应时，在 `messageReaction`\
  \ 活动上调用一个处理程序。 |\n| `OnReactionsAddedAsync` | 添加到消息的反应 | 处理添加到消息的反应。 |\n| `OnReactionsRemovedAsync`\
  \ | 从消息中移除的消息反应 | 处理从消息中移除的反应。 |\n| `OnUnrecognizedActivityTypeAsync` | 其他接收到的活动类型\
  \ | 处理任何其他未处理的活动类型。 |\n\n表 2.2 概述了 Microsoft Bot Framework JavaScript SDK 的各种活动处理程序。\n\
  \n表 2.2\n\nBot Framework 活动处理程序 JavaScript。（来源：[`docs.microsoft.com/en-us/azure/bot-service/bot-builder-basics`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-basics)）\n\
  \n| 处理程序名称 | 事件 | 描述 |\n| --- | --- | --- |\n| `onTurn` | 每种接收到的活动类型 | 注册一个监听器以接收活动。\
  \ |\n| `onMessage` | 接收到的消息活动 | 注册一个监听器以接收消息活动。 |\n| `onConversationUpdate` | 接收到的对话更新活动\
  \ | 当接收到 `conversationUpdate` 活动时注册一个监听器。 |\n| `onMembersAdded` | 成员已加入对话 | 注册一个监听器，指示成员（包括机器人）何时加入对话。\
  \ |\n| `onMembersRemoved` | 成员已离开对话 | 注册一个监听器，指示成员（包括机器人）何时离开对话。 |\n| `onMessageReaction`\
  \ | 接收到的消息反应活动 | 当接收到 `messageReaction` 活动时注册一个监听器。 |\n| `onReactionsAdded` | 添加到消息的反应\
  \ | 注册一个监听器，用于向消息添加反应。 |\n| `onReactionsRemoved` | 从消息中移除的消息反应 | 注册一个监听器，用于从消息中移除反应。\
  \ |\n| `onEvent` | 接收到的事件活动 | 注册一个监听器以接收事件活动。 |\n| `onTokenResponseEvent` | 接收到的令牌响应事件活动\
  \ | 注册一个监听器以接收令牌响应事件。 |\n| `onUnrecognizedActivityType` | 其他接收到的活动类型 | 注册一个监听器，用于处理未定义特定活动类型处理程序的情况。\
  \ |\n| `onDialog` | 活动处理程序已完成 | 在所有适用的处理程序完成后调用。 |\n\n## 状态\n\n从机器人的角度来看，可以将状态视为机器人的思维或记忆。从这个意义上说，机器人能够记住关于用户或对话的信息。这使得机器人可以访问用户曾经写过的特定信息，例如，这样机器人就不必在后续对话中再次询问这些信息。状态中存储的信息通常也比特定轮次内的信息可用时间更长。因此，该组件使机器人能够进行所谓的多轮对话，即超过一轮的对话。机器人的状态由几个不同的层组成：所有这些组件都相互连接，并提供了集成在\
  \ Bot Framework SDK 中的复杂状态管理。图 2.3 展示了状态处理的流程以及不同组件之间的交互。\n\n![](img/495919_1_De_2_Fig3_HTML.png)\n\
  \n图 2.3\n\nBot Framework 状态管理。（来源：[`docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-state`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-state)）\n\
  \n- **存储层**\n- **状态管理层**\n- **属性访问器状态**\n\n所有这些组件都相互连接，并提供了集成在 Bot Framework SDK\
  \ 中的复杂状态管理。\n\n\n\n上图中的实线箭头表示由特定机器人组件执行的单个方法调用，而虚线箭头则表示由此产生的响应。状态通常存储在存储层中，在该图中，存储层是最右侧的组件。集成存储解决方案来保存状态的方式有很多种，例如内存、数据库或其他文件存储解决方案。Bot\
  \ Framework SDK 已集成了其中一些解决方案：SDK 中的状态管理组件允许自动读取和写入机器人中的状态，该状态与您定义的存储层相连接。状态信息本身作为状态属性进行存储。这些状态属性是键值对，允许您定义对象结构，因为您可以将状态属性定义为类。因此，当您检索状态属性时，您会知道这些对象数据的结构是什么样的，这便于您在代码中进行处理。状态属性从一开始就被分为三个不同的组：要访问状态属性，Bot\
  \ Framework SDK 提供了所谓的状态属性访问器。这些组件允许在您的机器人内读取和写入状态属性，并在轮次（Turn）中提供 `Get`、`Set` 和\
  \ `Delete` 方法。当您在轮次中使用 `get` 方法获取特定状态属性时，SDK 会将该信息加载到本地机器人缓存中。因此，信息存储在本地缓存中，因为这样比每次访问存储来检索状态信息性能更高。此外，您可以使用访问器将状态属性视为局部变量，也就是说，您可以在代码中操作它们。为了保留本地缓存的状态属性，您必须使用访问器提供的\
  \ `SaveChanges` 方法，将存储在本地缓存状态对象中的信息保存到存储中。请务必记住，只有状态组内设置的那些属性才会被持久化到存储中，而不会影响其他属性。这样，就可以将所有信息从本地缓存保存到存储中的对话状态，而无需将信息保存到存储中的用户状态。为了避免冲突，以最后一次写入为准，即具有最新写入时间戳的写入操作会覆盖针对特定属性的所有其他更早执行的操作。\n\
  \n*   **用户状态**\n    *   这种类型的状态属性可用于存储与该机器人在特定频道上通信的用户的任何信息。用户状态在每个轮次中都可访问，且不依赖于当前对话。因此，应使用此状态属性来存储用户信息，例如姓名、偏好或用户特定的设置，以及用户之前与机器人对话的信息。这些信息可以在单个对话的整个持续时间内保留。\n\
  \n*   **对话状态**\n    *   对话状态属性在特定对话内的每个轮次中都可用，与用户无关。这意味着它也可以用于群组对话场景（例如 Microsoft\
  \ Teams 频道中的对话）。因此，应使用此属性来存储信息，例如机器人已经向用户提出了哪些问题，或者当前对话的主题是什么。\n\n*   **私有对话状态**\n\
  \    *   此属性可以看作是前两者的组合，即它针对特定的对话和特定的用户。相应地，它主要用于群组对话，因为您可以在此属性内存储群组聊天中特定于用户的对话信息。\n\
  \n要访问状态属性，Bot Framework SDK 提供了所谓的状态属性访问器。这些组件允许在您的机器人内读取和写入状态属性，并提供\n\n*   **存储空间**\n\
  \    *   内存应仅用于测试目的，因为它专为本地测试机器人而设计和考虑，这种存储类型相当临时。另一个缺点是，当您在 Azure 中将机器人作为 Web 应用运行时，通常需要为分配的资源量付费。如果您计划使用内存来存储状态，这可能会导致更高的成本，因为您需要分配相当大的内存量。另一个缺点是，每当机器人或包含代码的\
  \ Web 应用因更新或服务中断而重启时，状态都会被清除。\n\n*   **Azure Blob 存储**\n    *   Azure Blob 存储功能提供了将状态信息存储在\
  \ Azure 存储帐户内的 Blob 中的能力。这样做的好处是，您可以持久化数据，并将机器人的逻辑与状态存储组件分离。\n\n*   **Azure Cosmos\
  \ DB 存储**\n    *   在较大的场景中，使用 Azure Cosmos DB 而不是 Azure Blob 存储来存储状态信息是合理的，因为 Cosmos\
  \ DB 通常在可伸缩性和可用性方面提供更大的灵活性，但这当然也可能导致与 Azure Blob 存储相比更高的成本。\n\nSDK 中的状态管理组件允许自动读取和写入机器人中的状态，该状态与您定义的存储层相连接。状态信息本身作为状态属性进行存储。这些状态属性是键值对，允许您定义对象结构，因为您可以将状态属性定义为类。因此，当您检索状态属性时，您会知道这些对象数据的结构是什么样的，这便于您在代码中进行处理。状态属性从一开始就被分为三个不同的组。\n\
  \n\n\n## 对话\n\n对话本质上是您机器人的核心，因为它负责管理对话，并引导用户遍历对话树。一个对话可以比作机器人内部的功能，这些功能基本上按特定顺序执行特定任务。对话的触发方式可能有所不同，有时会因特定的用户消息而执行，有时触发者是另一个指示应开始新对话部分的服务，或者是一个对话调用另一个对话以继续对话。由于对话是\
  \ Bot Framework SDK 的关键概念之一，因此 SDK 已经包含了一些预构建的功能，例如提示或瀑布式对话，这些功能只需很少的实现工作即可使用。在使用\
  \ Bot Framework 创建机器人时，建议先勾勒出要实现的对话树，以便了解需要在代码中实现对话的哪些部分。图 2.4 展示了 SDK 原生支持的对话类型和提示。\n\
  \n![](img/495919_1_De_2_Fig4_HTML.png)\n\n图 2.4\n\nBot Framework 中的预构建对话和提示类型。（来源：[`docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-dialog`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-dialog)）\n\
  \n提示是收集用户信息的最简单形式。提示功能提供了多种不同类型的提示，如表 2.3 所示。\n\n表 2.3\n\nBot Framework 提示类型。（来源：[`docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-dialog`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-dialog)）\n\
  \n| 提示类型 | 描述 | 返回值 |\n| --- | --- | --- |\n| **附件提示** | 询问一个或多个附件，例如文档或图片。 | 附件对象的集合。\
  \ |\n| **选择提示** | 从一系列选项中询问选择。 | 一个找到的选择对象。 |\n| **确认提示** | 请求确认。 | 一个布尔值。 |\n|\
  \ **日期时间提示** | 询问日期和时间。 | 包含日期和时间解析结果的对象的集合。 |\n| **数字提示** | 询问一个数字。 | 一个数值。 |\n\
  | **文本提示** | 询问一般的文本输入。 | 一个字符串。 |\n\n提示是对话的最简单形式，因为它只包含两个步骤。首先，触发提示并要求用户输入。其次，评估输入并返回响应。每个提示都有提示选项，可用于设置提示文本、重试提示（即验证失败时触发的提示），如果是选择提示，还可以在选项中设置回答选项。如果您希望在预定义规则之外添加自己的验证规则，只需将自定义验证器添加到您的提示中即可。然后，提示会先执行预定义的检查，再执行自定义的检查。一个简单的例子是询问用户一个飞行目的地。在这种情况下，您可能会使用文本提示来询问机场名称。但这里的验证可能相当棘手，因为标准的文本验证只会检查输入是否为文本。但这意味着用户也可以输入任何其他类型的文本，这并非您真正想要的。因此，您可以实现一个自定义验证器，将输入与机场名称和缩写集合进行比较，以确定用户是否输入了有效的机场名称，然后再继续对话。如果验证失败，提示会调用重试提示，再次询问用户机场名称。选择、确认、日期、时间和数字提示还会使用提示的区域设置来确定特定于语言的情况。区域设置是从机器人连接的渠道获取的，因此可以在提示中实现多语言场景。\n\
  \n瀑布式对话主要用于以瀑布式的方式收集信息。瀑布式对话的目标是向用户提出一系列问题（以提示的形式），以收集所需的信息。最重要的是，机器人不是提出一个问题来获取一系列答案，而是通过一系列问题逐个询问每个答案。在机器人向用户提出一个问题后，用户必须回答该问题。当机器人收到该答案并成功验证后，将执行下一个提示。此过程将持续进行，直到所有提示都得到回答并且收集到所需的信息，这可能如图\
  \ 2.5 所示。\n\n![](img/495919_1_De_2_Fig5_HTML.png)\n\n图 2.5\n\nBot Framework 中瀑布式对话的示例。（来源：[`docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-dialog`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-dialog)）\n\
  \n在单个瀑布式对话内部，有一个所谓的瀑布步骤上下文，用于存储和访问对话上下文以及状态。由于瀑布式对话本质上由一系列提示组成，您还应该考虑对特定提示的用户回答进行验证，以避免使用无效值调用下一步。这可以通过使用上下文参数\
  \ `prompt validator` 来实现，该参数是提示功能的一部分。此参数返回一个布尔值，指示用户回答验证是否成功。\n\n\n\n## 瀑布式对话\n\
  \n瀑布式对话主要针对特定用例设计。不过，SDK 也提供了一种称为*组件对话*的对话类型，专为复用而设计。这种对话类型被设计为具有一定独立性，因此你可以为特定用例创建组件对话，然后将其作为包导出，以便集成到其他机器人中。在组件对话内部，你可以插入一系列瀑布式对话或提示，它们被分组为一个对话集。\n\
  \n负责管理对话的组件称为对话上下文。该对话上下文提供了开始、替换、继续、结束或取消对话的方法。你可以将机器人中的所有对话视为一个对话栈，而前文提到的轮次处理程序则是控制对话栈的组件。当对话栈在某个时刻为空时，轮次处理程序也会作为备用机制来继续对话。\n\
  \n当你开始一个新对话时，它会被推送到对话栈的顶部，并成为活动对话。它会保持活动状态，直到该对话结束、被取消，或因被栈内另一个对话替换而移出栈。替换对话通常通过活动对话内的\
  \ `replace dialog` 方法进行。当替换了前一个对话的对话结束后，它会从对话栈中移除，而前一个对话由于重新位于栈顶，会再次成为活动对话。通过这种方式，你可以在特定对话中实现分支，这在用户中断等场景中非常有用。\n\
  \n## 中间件\n\n中间件组件在适配器和机器人之间实现。中间件的概念是为了在特定轮次之前或之后处理活动而设计的。因此，中间件组件可以被视为机器人活动管道中的活动前或活动后处理引擎。在机器人初始化期间，启动或重启后，适配器会将所有配置的中间件组件添加到其中间件集合中。适配器将中间件组件添加到其栈中的顺序，决定了哪个中间件组件按何种顺序被调用。图\
  \ 2.6 概述了通用的中间件处理概念。\n\n![](img/495919_1_De_2_Fig6_HTML.png)\n\n图 2.6\n\nBot Framework\
  \ 中间件概念。（来源：[`docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-middleware`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-middleware)）\n\
  \n如果你在项目中实现了多个中间件组件，中间件组件的调用顺序就相当重要。例如，你可能实现了一个中间件，用于将所有与活动相关的信息记录到 Azure 存储或 Application\
  \ Insights 中。然后，你可能想使用另一个中间件组件来翻译非英语接收的消息活动，因为你的机器人和它所连接的知识库只支持英语作为语言。因此，你可能希望在翻译之前，将用户以原始语言接收的所有信息记录到\
  \ Azure 服务中，以便保留原始消息。此外，中间件组件不仅用于处理传入活动，也用于处理传出活动。沿用之前的例子，我们可以将负责翻译传入消息的同一个中间件，也用于翻译传出消息，以完全支持多语言场景。\n\
  \n如上图所示，每个中间件都实现了一个 `next()` 调用，该调用指示应执行下一层，下一层可以是另一个中间件或机器人逻辑。如果未调用此 `next` 方法，则后续层将不会执行，这被称为短路。这在某些场景下可能是有益的，例如，当当前轮次由于错误等原因需要在被轮次处理程序处理之前中止时。结果是，尽管轮次处理程序未被调用，但执行短路的中间件内部的逻辑仍会执行，并且机器人的对话会处于安全状态。\n\
  \n## 机器人项目结构\n\n在接下来的章节中，将引导你了解用 C# 和 JavaScript 编写的简单 Echo 机器人的基本项目结构。更详细的解释和扩展将在后续章节中介绍。\n\
  \n\n\n## Echo Bot 逻辑 C#\n\n无论您是使用前文提到的 Visual Studio Bot Framework 扩展，还是使用 .NET\
  \ Core CLI 创建 Bot Framework Echo Bot 项目，核心 Bot 的典型项目结构都如图 2.7 所示。\n\n![](img/495919_1_De_2_Fig7_HTML.png)\n\
  \n图 2.7 Bot Framework C# Echo Bot 项目结构\n\n**注意：** 有关使用 Bot Framework SDK for .NET\
  \ 开发 Bot 的详细先决条件列表，请参阅 [`docs.microsoft.com/en-us/azure/bot-service/dotnet/bot-builder-dotnet-sdk-quickstart`](https://docs.microsoft.com/en-us/azure/bot-service/dotnet/bot-builder-dotnet-sdk-quickstart)。\n\
  \n`Program.cs` 基本上是 Bot 项目的入口点。它创建一个新文件，定义要使用的主机以及要使用的启动类，在我们的例子中是 `Startup.cs`：\n\
  \n```\nusing Microsoft.AspNetCore;\nusing Microsoft.AspNetCore.Hosting;\nnamespace\
  \ SBEchoBotNET\n{\npublic class Program\n{\npublic static void Main(string[] args)\n\
  {\nCreateWebHostBuilder(args).Build().Run();\n}\npublic static IWebHostBuilder CreateWebHostBuilder(string[]\
  \ args) =>\nWebHost.CreateDefaultBuilder(args)\n.UseStartup<Startup>();\n}\n}\n\
  ```\n\n`Startup.cs` 是定义所有配置组件的类。此外，它将 Bot 创建为瞬态文件，以便我们可以在项目中使用它：\n\n```\nusing Microsoft.AspNetCore.Builder;\n\
  using Microsoft.AspNetCore.Hosting;\nusing Microsoft.AspNetCore.Mvc;\nusing Microsoft.Bot.Builder;\n\
  using Microsoft.Bot.Builder.Integration.AspNet.Core;\nusing Microsoft.Bot.Connector.Authentication;\n\
  using Microsoft.Bot.Builder.BotFramework;\nusing Microsoft.Extensions.Configuration;\n\
  using Microsoft.Extensions.DependencyInjection;\nusing SBEchoBotNET.Bots;\nnamespace\
  \ SBEchoBotNET\n{\npublic class Startup\n{\npublic Startup(IConfiguration configuration)\n\
  {\nConfiguration = configuration;\n}\npublic IConfiguration Configuration { get;\
  \ }\n// 此方法由运行时调用。使用此方法向容器添加服务。\npublic void ConfigureServices(IServiceCollection\
  \ services)\n{\nservices.AddMvc().SetCompatibilityVersion(CompatibilityVersion.Version_2_1);\n\
  // 创建启用了错误处理的 Bot Framework 适配器。\nservices.AddSingleton<IBotFrameworkHttpAdapter,\
  \ AdapterWithErrorHandler>();\n// 将 Bot 创建为瞬态。在这种情况下，ASP 控制器期望一个 IBot。\nservices.AddTransient<IBot,\
  \ EchoBot>();\n}\n// 此方法由运行时环境调用。使用此方法配置 HTTP 请求管道。\npublic void Configure(IApplicationBuilder\
  \ app, IHostingEnvironment env)\n{\nif (env.IsDevelopment())\n{\napp.UseDeveloperExceptionPage();\n\
  }\nelse\n{\napp.UseHsts();\n}\napp.UseDefaultFiles();\napp.UseStaticFiles();\napp.UseWebSockets();\n\
  //app.UseHttpsRedirection();\napp.UseMvc();\n}\n}\n}\n```\n\n如您在前面的代码中所见，`services.AddSingleton<IBotFrameworkHttpAdapter,\
  \ AdapterWithErrorHandler>();` 这一行将 `AdapterWithErrorHandlers` 添加到我们的服务中。适配器负责将\
  \ Bot 连接到服务端点，例如使用 Bot Connector 服务的 Azure Bot Service。此外，适配器用于处理身份验证机制，并用于在 Bot\
  \ 和 Bot Connector 服务之间交换活动。适配器收到新活动后，首先创建轮次上下文，然后调用 Bot 逻辑，该逻辑将创建的轮次上下文传递以进行进一步处理。Bot\
  \ 逻辑处理完活动后，适配器将传出活动发送回频道。此外，适配器负责管理和调用中间件管道，以便在轮次之前或之后对活动进行预处理或后处理。由于 Echo Bot 模板中没有添加预定义的中间件，`AdapterWithErrorHandlers.cs`\
  \ 如下所示：\n\n```\nusing Microsoft.Bot.Builder.Integration.AspNet.Core;\nusing Microsoft.Bot.Builder.TraceExtensions;\n\
  using Microsoft.Extensions.Configuration;\nusing Microsoft.Extensions.Logging;\n\
  namespace SBEchoBotNET\n{\npublic class AdapterWithErrorHandler : BotFrameworkHttpAdapter\n\
  {\npublic AdapterWithErrorHandler(IConfiguration configuration, ILogger<AdapterWithErrorHandler>\
  \ logger) : base(configuration, logger)\n{\nOnTurnError = async (turnContext, exception)\
  \ =>\n{\n// 记录应用程序中任何未处理的异常。\nlogger.LogError(exception, $\"[OnTurnError] 未处理的错误\
  \ : {exception.Message}\");\n// 向用户发送消息\nawait turnContext.SendActivityAsync(\"\
  Bot 遇到了错误或 bug。\");\nawait turnContext.SendActivityAsync(\"要继续运行此 Bot，请修正 Bot 源代码。\"\
  );\n// 发送将在 Bot Framework Emulator 中显示的跟踪活动\nawait turnContext.TraceActivityAsync(\"\
  OnTurnError Trace\", exception.Message, \"https://www.botframework.com/schemas/error\"\
  , \"TurnError\");\n};\n}\n}\n}\n```\n\nBot 逻辑通常位于 `EchoBot.cs` 文件中，在我们的例子中，该文件非常精简。由于\
  \ Echo Bot 仅需回显用户所说的话，因此我们的 Bot 逻辑中只有两个方法：`OnMessageActivityAsync()` 方法返回用户的输入，而\
  \ `OnMembersAddedAsync()` 方法在用户加入对话时主动向其发送“你好，欢迎！”的问候。我们的 `EchoBot.cs` 的完整实现如下所示：\n\
  \n```\nusing System.Collections.Generic;\nusing System.Threading;\nusing System.Threading.Tasks;\n\
  using Microsoft.Bot.Builder;\nusing Microsoft.Bot.Schema;\nnamespace SBEchoBotNET.Bots\n\
  {\npublic class EchoBot : ActivityHandler\n{\nprotected override async Task OnMessageActivityAsync(ITurnContext\
  \ turnContext, CancellationToken cancellationToken)\n{\nvar replyText = $\"Echo:\
  \ {turnContext.Activity.Text}\";\nawait turnContext.SendActivityAsync(MessageFactory.Text(replyText,\
  \ replyText), cancellationToken);\n}\nprotected override async Task OnMembersAddedAsync(IList<ChannelAccount>\
  \ membersAdded, ITurnContext turnContext, CancellationToken cancellationToken)\n\
  {\nvar welcomeText = \"你好，欢迎！\";\nforeach (var member in membersAdded)\n{\nif (member.Id\
  \ != turnContext.Activity.Recipient.Id)\n{\nawait turnContext.SendActivityAsync(MessageFactory.Text(welcomeText,\
  \ welcomeText), cancellationToken);\n}\n}\n}\n}\n}\n```\n\n* **`OnMessageActivityAsync`**：此方法是前面提到的\
  \ C# 活动处理程序之一，用于处理特定轮次内的消息。\n* **`OnMembersAddedAsync`**：此方法是另一个 C# 活动处理程序，用于处理加入对话的成员。\n\
  \n\n\n### BotController.cs\n\n我们项目中最后一个缺失的部分是 `BotController.cs` 文件。该控制器定义了机器人内部消息和\
  \ HTTP 调用的路由。如下所示，我们为机器人定义的唯一路由是 `\"api/messages\"`。`PostAsync()` 方法会调用适配器来处理传入的\
  \ HTTP 请求。因此，当您与机器人通信时，您使用的渠道或应用程序应将所有 HTTP 请求发送到 `\"api/messages\"` 路由，以确保它们被您的机器人接收：\n\
  \n```\nusing System.Threading.Tasks;\nmit Microsoft.AspNetCore.Mvc;\nmit Microsoft.Bot.Builder;\n\
  mit Microsoft.Bot.Builder.Integration.AspNet.Core;\nNamensraum SBEchoBotNET.Controllers\n\
  {\n// 此 ASP 控制器用于处理请求。依赖注入在运行时提供适配器和 IBot\n// 实现。通过在 Bot 构造函数参数中指定更具体的类型，可以实现多个不同的\
  \ IBot 实现运行在不同的端点上。\n[Route(\"api/messages\")]\n[ApiController]\npublic class BotController\
  \ : ControllerBase\n{\nprivate readonly IBotFrameworkHttpAdapter Adapter;\nprivate\
  \ readonly IBot Bot;\npublic BotController(IBotFrameworkHttpAdapter adapter, IBot\
  \ bot)\n{\nAdapter = Adapter;\nBot = Bot;\n}\n[HttpPost, HttpGet]\nöffentlicher\
  \ asynchroner Task PostAsync()\n{\n// 将 HTTP POST 的处理委托给适配器。\n// 适配器会调用机器人。\nawait\
  \ Adapter.ProcessAsync(Request, Response, Bot);\n}\n}\n}\n```\n\n配置设置通常保存在名为 `appsettings.json`\
  \ 的文件中。此文件应包含机器人中使用的所有 ID、机密或连接字符串。目前，我们 Echo 机器人的应用设置主要如下所示，并将在后续章节中进行调整：\n\n```\n\
  {\n\"MicrosoftAppId\": \"\",\n\"MicrosoftAppPasswort\": \"\"\n}\n```\n\n## Echo\
  \ 机器人逻辑 JavaScript\n\n要创建一个用于使用 JavaScript 开发机器人的 Bot Framework 项目，您需要使用 Yeoman\
  \ 生成器创建机器人项目。在命令行中，导航到您要创建项目的目录，并运行以下命令来安装先决条件：\n\n```\nnpm install -g npm\nnpm\
  \ install -g yo\nnpm install -g generator-botbuilder\n# 仅在 Windows 系统上运行此命令。请阅读上述说明。\n\
  npm install -g windows-build-tools\n```\n\n**注意**\n\n有关使用 Bot Framework SDK for\
  \ JavaScript 开发机器人的先决条件的详细列表，请参阅 [`docs.microsoft.com/en-us/azure/bot-service/javascript/bot-builder-javascript-quickstart`](https://docs.microsoft.com/en-us/azure/bot-service/javascript/bot-builder-javascript-quickstart)。\n\
  \n成功安装先决条件后，您需要运行以下命令并回答 Yeoman 生成器提出的问题，以创建一个新的 Bot Framework 项目：\n\n```\nyo botbuilder\n\
  ```\n\n当您开发 JavaScript 机器人时，运行 Yeoman 生成器后生成的项目结构如图 2.8 所示。\n\n![图 2.8 Bot Framework\
  \ JS Echo 机器人项目结构](img/495919_1_De_2_Fig8_HTML.png)\n\n您会发现，与 C# 模板相比，这要精简得多，这源于\
  \ JavaScript 作为编程语言的特性。在 C# 中分散在多个文件中的内容，在您的 JS 项目中会保存在一个文件中。`index.js` 需要包含一些依赖项才能集成到机器人项目中，您可以在此处看到这些依赖项：\n\
  \n```\nconst dotenv = require('dotenv');\nconst path = require('path');\nconst restify\
  \ = require('restify');\n// 导入所需的机器人服务。\nconst { BotFrameworkAdapter } = require('botbuilder');\n\
  // 此机器人的主对话框。\nconst { MyBot } = require('./bot');\n// 导入所需的机器人配置。\nconst ENV_FILE\
  \ = path.join(__dirname, '. env');\ndotenv.config({ path: ENV_FILE });\n```\n\n\
  `index.js` 文件包含您适配器的实现：\n\n```\n// 创建适配器。\n// 访问 https://aka.ms/about-bot-adapter\
  \ 了解更多关于机器人工作原理的信息。\nconst adapter = new BotFrameworkAdapter({\nappId: process.env.MicrosoftAppId,\n\
  appPasswort: process.env.MicrosoftAppPasswort\n});\n```\n\nHTTP 服务器也在此文件中使用名为 `restify`\
  \ 的 JavaScript 库创建：\n\n```\n// 创建 HTTP 服务器\nconst server = restify.createServer();\n\
  server.listen(process.env.port || process.env.PORT || 3978, () => {\nconsole.log(`n${\
  \ server.name } listening to ${ server.url }`);\nconsole.log(`n 获取 Bot Framework\
  \ 模拟器: https://aka.ms/botframework-emulator`);\nconsole.log(`要测试您的机器人，请参阅: https://aka.ms/debug-with-emulator`);\n\
  });\n```\n\n此外，`index.js` 还按如下方式创建机器人控制器：\n\n```\n// 等待传入请求。\nserver.post('/api/messages',\
  \ (req, res) => {\nadapter.processActivity(req, res, async (context) => {\n// 转发到主对话框。\n\
  await myBot.run(context);\n});\n});\n```\n\n此外，还会实例化机器人和它的主对话框，每当有新活动到达时，它们都会被调用：\n\
  \n```\n// 创建主对话框。\nconst myBot = new MyBot();\n```\n\n第二个需要查看的文件是 `bot.js`。此文件也包含两个与\
  \ C# 实现类似的方法，具体如下：在我们的例子中，`onMembersAdded()` 函数会在每个新用户加入对话时向他们打招呼“你好，欢迎！”，而 `onMessage()`\
  \ 函数则会原样返回用户所说的话。\n\n\n```javascript\nconst { ActivityHandler } = require('botbuilder');\n\
  class MyBot extends ActivityHandler {\nconstructor() {\nsuper();\n// 有关消息和其他活动类型的更多信息，请访问\
  \ https://aka.ms/about-bot-activity-message\nthis.onMessage(async (context, next)\
  \ => {\nawait context.sendActivity(`您说了 '${ context.activity.text }'`);\n// 通过调用\
  \ next() 确保执行下一个 BotHandler\nawait next();\n});\nthis.onMembersAdded(async (context,\
  \ next) => {\nconst membersAdded = context.activity.membersAdded;\nfor (let cnt\
  \ = 0; cnt < membersAdded.length; ++cnt) {\nif (membersAdded[cnt].id !== context.activity.recipient.id)\
  \ {\nawait context.sendActivity('您好，欢迎！');\n}\n}\n// 通过调用 next() 确保执行下一个 BotHandler\n\
  await next();\n});\n}\n}\nmodule.exports.MyBot = MyBot;\n```\n\n- **`onMessage`**:\
  \ 此方法是前面提到的 JavaScript 活动处理程序之一，用于处理特定轮次内的消息。\n- **`onMembersAdded`**: 此方法是另一个 JavaScript\
  \ 活动处理程序，用于处理成员加入对话的情况。\n\n在我们的案例中，该函数\n\n在 JavaScript 项目中，存储配置的文件称为 `.env` 文件，它可以与\
  \ C# 项目中的 `appsettings.json` 相类比。此文件通常存储所有配置设置，例如 `appId`、`appPassword` 或 Bot 中使用的其他连接字符串。创建项目后，Echo\
  \ Bot 的 `.env` 文件基本如下所示：\n\n```\nMicrosoftAppId=\nMicrosoftAppPassword=\n```\n\n\
  由于本章旨在概述前文提到的 Bot 组件的基本原理，因此将展示 Bot Framework 项目中的关键要素。在后续章节中，我们将再次回顾其中一些组件，并研究如何自定义它们以增强\
  \ Bot 的功能。\n\n## Bot Framework 技能：可重用的 Bot 组件\n\nBot Framework 中的技能是 Bot 的可重用组件，包括对话元素。Bot\
  \ Framework 提供了一种扩展模型，开发人员可以独立开发技能，然后将其集成到 Bot 中。这提供了开发和维护企业级 Bot 场景的灵活性，该场景集成了针对不同用例的各种技能。过去有两种解决方式：要么创建一个在其逻辑中包含所有用例功能的\
  \ Bot，要么为不同的用例创建单独的 Bot。第二种方式很快对最终用户来说变得相当不便，因为他们需要记住哪个 Bot 用于哪个用例。通过引入技能概念，开发人员可以开发独立的技能，然后通过执行调度和配置更改的单个命令行操作将其集成到一个\
  \ Bot 中。\n\n技能本身也是一个 Bot，也可以独立使用。Microsoft Bot Framework SDK 提供了 C# 和 TypeScript\
  \ 模板，用于使用模板创建新技能。表 2.4 显示了 SDK 中当前可用的技能，这些技能可以立即使用或根据需要进行自定义。\n\n**表 2.4** 预定义的\
  \ Bot Framework 技能。（来源：[`https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-skills-overview`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-skills-overview)）\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| **日历技能** | 为您的助手添加日历功能。由 Microsoft Graph 和 Google\
  \ 支持。 |\n| **电子邮件技能** | 为您的助手添加电子邮件功能。由 Microsoft Graph 和 Google 支持。 |\n| **待办事项技能**\
  \ | 为您的助手扩展任务管理功能。由 Microsoft Graph 支持。 |\n| **兴趣点技能** | 查找兴趣点和路线。由 Azure Maps 和\
  \ FourSquare 支持。 |\n| **汽车技能** | 用于演示车辆功能控制的行业垂直技能。 |\n| **实验性技能** | 消息、餐厅预订和天气。\
  \ |\n\n在接下来的章节中，我们将详细探讨如何开发这些技能并将其集成到 Bot Framework Bot 中。\n\n## Azure Bot Service：Bot\
  \ 托管平台\n\n如前章所述，Azure Bot Service 是使用 Bot Framework 开发的 Bot 的托管平台。它是连接您的 Bot 与受支持渠道的粘合剂，并为您建立和管理这些连接。这简化了\
  \ Bot 在不同渠道中的部署，因为在某些情况下，只需点击几下即可激活一个渠道，然后 Bot 便可在该渠道中使用。当前支持的渠道列表请参见第 1 章。然而，Azure\
  \ Bot Service 不仅用于将 Bot 连接到渠道，还用于在 Azure 门户内管理 Bot 的配置（[`https://portal.azure.com`](https://portal.azure.com)）。\n\
  \n它提供了一个完整的管理界面，您可以通过该门户管理 Bot 的所有相关事项，例如 Bot 句柄或显示名称、消息传递端点、用于保护 Bot 通信安全的 Microsoft\
  \ 应用 ID 和应用密码，或用于指定分析 Bot 性能和行为的 Application Insights 服务的分析配置设置（见图 2.9）。\n\n![](img/495919_1_De_2_Fig9_HTML.png)\n\
  \n**图 2.9** Azure Bot Service 的管理界面\n\n因此，Azure Bot Service 是将 Bot 集成到不同渠道并将 Bot\
  \ 作为 Web 应用程序托管的最佳选择，无论是在 Azure（这是首选方式）还是在其他位置，例如本地数据中心或其他云服务提供商。\n\n## Bot Framework\
  \ SDK 工具产品\n\n以下小节将描述 Bot Framework 中可用的工具，因为在后续章节中，当涉及如何设计、开发或部署使用 Bot Framework\
  \ SDK 创建的 Bot 时，我们都会用到它们。\n\n\n### Bot-Framework-Emulator\n\nBot Framework 生态系统提供的工具之一是\
  \ Bot Framework Emulator。这是一款用于测试和调试 Bot 的综合桌面应用程序，专注于 Bot 的本地开发和测试。此外，您还可以使用该模拟器测试和调试托管在\
  \ Microsoft Azure 或其他位置的 Bot，这为您调试使用 SDK 开发的 Bot 提供了更多细节。由于 Bot Framework 本身被定义为涵盖多种不同的开发平台，因此该模拟器也适用于多种平台：\n\
  \n*   Windows\n*   OS X\n*   Linux\n\n**注意**\n\n可以通过使用此链接从相应的 GitHub 仓库下载模拟器：[`aka.ms/botemulator`](https://aka.ms/botemulator)。\n\
  \n开发人员可以使用模拟器测试本地运行的 Bot。此外，开发人员还可以使用模拟器管理与 Bot 相关的服务（如 LUIS 或 QnA Maker），并跟踪和调试活动堆栈，如图\
  \ 2.10 所示。\n\n![](img/495919_1_De_2_Fig10_HTML.png)\n\n图 2.10\n\nBot Framework Emulator\
  \ 概览\n\n### Bot Framework Web Chat\n\n由于 Bot Framework 的 Bot 可以集成到许多不同的渠道中，因此微软也提供了一种\
  \ Web 聊天解决方案。Bot Framework Web Chat 组件（可从此处 [`aka.ms/bfwebchat`](http://aka.ms/bfwebchat)\
  \ 下载和使用）是一个高度可定制的组件，用于在 HTML 页面内呈现 Web 聊天。开发人员可以直接将 Web Chat 作为 HTML/JavaScript\
  \ 组件嵌入 HTML 代码中使用，也可以使用微软开发的 React 组件来进一步自定义 Web Chat 客户端的外观和行为。\n\n要使用 HTML 和 JavaScript\
  \ 集成 Web Chat 组件，您通常需要在您的网站中插入以下几行代码：\n\n```\nhtml,\nbody {\nheight: 100%;\n}\n\
  body {\nmargin: 0;\n}\n#webchat {\nheight: 100%;\nwidth: 100%;\n}\n\nwindow.WebChat.renderWebChat(\n\
  {\ndirectLine: window.WebChat.createDirectLine({\ntoken: \"YOUR_DIRECT_LINE_TOKEN\"\
  \n}),\nuserID: 'YOUR_USER_ID',\nusername: 'Web Chat User',\nlocale: 'en-US',\nbotAvatarInitials:\
  \ 'WC',\nuserAvatarInitials: 'WW'\n},\ndocument.getElementById('webchat')\n);\n\
  ```\n\n上述代码将 Web Chat 组件集成到您的 HTML 页面中，并通过 DirectLine 令牌将其连接到您的 Bot Framework。DirectLine\
  \ 协议的细节将在后续章节中解释，但 DirectLine API 基本上在您的 Bot 和您集成它的应用程序之间建立了安全通信。\n\n如果您需要更灵活的自定义样式和行为方法，可以使用\
  \ React 组件将 Web Chat 集成到您的 Web 应用程序中，例如使用以下代码行：\n\n```\nimport React, { useMemo\
  \ } from 'react';\nimport ReactWebChat, { createDirectLine } from 'botframework-webchat';\n\
  export default () => {\nconst directLine = useMemo(() => createDirectLine({ token:\
  \ 'YOUR_DIRECT_LINE_TOKEN' }), []);\nreturn <ReactWebChat directLine={directLine}\
  \ userID=\"YOUR_USER_ID\" />;\n};\n```\n\n为了了解哪种集成方法提供哪些功能，表 2.5 列出了两种方案的主要特性。\n\
  \n表 2.5\n\nBot Framework Web Chat 功能对比。（来源：[`github.com/Microsoft/BotFramework-WebChat`](https://github.com/Microsoft/BotFramework-WebChat)）\n\
  \n| 特性/功能 | CDN 包 | React |\n| --- | --- | --- |\n| **更改颜色** | ✓ | ✓ |\n| **调整大小**\
  \ | ✓ | ✓ |\n| **更新/替换 CSS 样式** | ✓ | ✓ |\n| **监听事件** | ✓ | ✓ |\n| **与宿主网页交互** |\
  \ ✓ | ✓ |\n| **自定义渲染活动** |   | ✓ |\n| **自定义渲染附件** |   | ✓ |\n| **添加新的 UI 组件** |\
  \   | ✓ |\n| **重新组合整个 UI** |   | ✓ |\n\n例如，可以自定义 Web Chat 以显示用户和 Bot 的自定义头像图片（见图\
  \ 2.11），为用户提供更个性化的外观。\n\n![](img/495919_1_De_2_Fig11_HTML.png)\n\n图 2.11\n\nBot\
  \ Framework Web Chat 自定义示例\n\n后续章节将描述一个端到端的实施指南，其中包含自定义 Web Chat 组件所需的所有必要步骤。\n\n\
  ### Bot Framework CLI\n\nBot Framework 命令行界面是一个跨平台的命令行界面，提供了许多用于管理 Bot Framework\
  \ 环境的工具和命令。您可以通过此链接 [`aka.ms/bfcli`](https://aka.ms/bfcli) 安装它，或者如果您已在计算机上安装了 Node.js，只需运行以下命令即可：\n\
  \n```\nnpm i -g @microsoft/botframework-cli\n```\n\n目前，该命令行界面支持以下服务的命令和管理接口，这些服务将在第\
  \ 4 章和第 5 章中详细讨论：\n\n*   **Chatdown**\n    *   `Chatdown` 是一个用于解析聊天文件的工具，这些文件随后会被转换为转录文件。这有助于在不编写实际代码的情况下设计对话和交谈，因此常用于\
  \ Bot 项目的设计阶段。\n\n*   **QnAMaker**\n    *   通过 BF CLI 中的 QnAMaker 命令，开发人员可以管理与 QnA\
  \ Maker 相关的所有内容，例如创建新的知识库，或通过使用 CLI 而非 QnA Maker 门户来训练和发布现有数据库。\n\n*   **配置**\n\
  \    *   通过 CLI 中的配置端点，您可以管理环境中的配置键值对，例如设置其他命令所需的 LUIS 密钥和 ID，这简化了命令的执行。\n\n*  \
  \ **LUIS**\n    *   LUIS 命令提供了用于管理 Bot 中使用的 LUIS 应用程序的管理接口和功能。使用这些命令，您可以通过命令行轻松创建、训练和发布新的语言理解应用程序，从而在开发\
  \ Bot 时实现此过程的自动化。\n\n\n\n### 自适应卡片\n\n`自适应卡片` 是一个开源概念，它允许卡片作者使用 `JSON` 或通过 [`adaptivecards.io/designer/`](https://adaptivecards.io/designer/)\
  \ 提供的可视化设计器来描述丰富的附件卡片。这些卡片随后会在机器人部署的渠道中以原生方式渲染。这简化了开发人员创建多渠道机器人的过程，因为他们无需为每个部分单独处理用户界面。其基本思想是使用\
  \ `自适应卡片` 将文本、图像、按钮和其他富媒体类型整合到单条消息中，并以所用渠道的原生外观与风格显示。例如，当在 Bot Framework Web Chat\
  \ 中显示时，这样一张 `自适应卡片` 可能看起来如图 2.12 所示。\n\n![](img/495919_1_De_2_Fig12_HTML.png)\n\n\
  图 2.12\n\n自适应卡片示例 BF Web Chat\n\n图 2.13 展示了同一张卡片在 Microsoft Teams 中渲染时的外观。\n\n![](img/495919_1_De_2_Fig13_HTML.png)\n\
  \n图 2.13\n\n自适应卡片 Microsoft Teams 示例\n\n如前所述，该卡片仅用 `JSON` 声明，这使其能够嵌入到多个渠道中，而无需更改卡片定义。用于前述卡片的\
