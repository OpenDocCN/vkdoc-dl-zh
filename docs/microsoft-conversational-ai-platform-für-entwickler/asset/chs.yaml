  \ Bot Framework 的可嵌入 Web 聊天控件。 | 1.2.3 (Web-Chat 4.7.1) |\n| **Outlook 可操作消息** |\
  \ 将可操作的消息附加到电子邮件中。 | 1.0 |\n| **Microsoft Teams** | 整合了聊天、会议和工作场所笔记的平台。 | 1.2 |\n\
