  \ Windows PC 以及 iOS/Android 设备上开始的先前活动的新方式。 | 1.0 |\n| **Cisco WebEx Teams** | Webex\
  \ Teams 有助于加速项目、建立更好的关系并解决业务挑战。 | 1.2 |\n\n## Bot Framework Composer 简介\n\n`Bot\
  \ Framework Composer` 是一个可视化的集成开发环境，用于创建机器人，而无需编写实际的 `C#` 或 `JavaScript` 代码。目前它仍处于预览阶段，于\
  \ Microsoft Ignite 2019 上宣布。下文将概述此工具的关键点，因为后续章节将详细描述如何使用 `Composer` 来创建和部署 Bot Framework\
  \ 机器人。\n\n如图 2.14 所示，`Bot Framework Composer` 提供了一个可视化设计器，可以以简单的图形方式创建和管理对话。此外，`Composer`\
  \ 还内置了创建和维护自然语言模型的功能，因此在开发机器人时无需在不同工具和门户之间切换。除了自然语言方面，`Composer` 还提供了一个语言生成引擎，以生成更复杂、更自然的对话。此外，您可以直接从\
  \ `Composer` 中运行您创建的机器人，这使得开发人员和业务用户的测试和调试更加简单。\n\n![](img/495919_1_De_2_Fig14_HTML.png)\n\
  \n图 2.14\n\nBot Framework Composer 概览\n\n### Composer 的优势\n\n`Composer` 最重要的特点之一是它既可以被开发人员使用，也可以被非开发人员使用。此工具旨在弥合技术与业务之间的鸿沟，使他们能够共同协作开发对话式\
  \ AI 应用程序。业务用户可以使用 `Composer` 勾勒对话设计，然后将其交给开发人员来实现需要代码的功能。\n\n此外，`Composer` 基本上会以\
  \ `JSON` 和 `Markdown` 的形式为用户编写机器人逻辑，这些逻辑可以被扩展和定制以满足需求。这样，由 `Composer` 创建的可重用组件就可以与机器人的其他部分（如语言理解定义）一起进行源代码管理，从而在由开发人员和非开发人员组成的团队中构建一个整体的机器人项目。\n\
  \n`Composer` 在单一界面中利用并集成了对话式 AI 平台的许多不同组件，包括以下内容：\n\n*   `Bot Framework SDK`\n*\
  \   自适应对话\n*   使用 `LUIS` 的语言理解服务\n*   语言生成\n*   `QnA Maker`\n*   `Bot Framework\
  \ 模拟器`\n\n## 自适应对话\n\n与当前 `Bot Framework SDK` 的概念不同，`Composer` 采用了一种称为“自适应对话”的概念来在机器人内部创建对话。通过此概念，您可以使用声明式方法（而非\
  \ `C#` 或 `JavaScript` 代码）在 `JSON` 中定义对话。这样，自适应对话可以在运行时进行交换，从而使 Bot Framework 机器人的部署和集成过程更加可靠和快速。\n\
  \n从某种意义上说，自适应对话可以被视为一种在对话式应用程序中建模和实现对话的新方式，因为它们有助于专注于对话建模，而不是管理对话的实现需求。\n\n\n\n\
  ### 语言理解\n\n由于语言理解是机器人设计与开发中的关键组成部分，Composer 提供了一个简化的编辑器，用于在对话上下文中使用 Markdown 表达式语言管理自然语言理解模型。这使得用户能够在单一界面中创建和扩展对话及语言理解模型。在此类\
  \ Markdown 格式中，您可以像在 LUIS 门户中通常所做的那样，定义意图、表述和实体。这些语言理解模型存储在 `.lu` 文件中，便于协同编写语言模型。该文件格式如图\
  \ 2.15 所示。\n\n![](img/495919_1_De_2_Fig15_HTML.png)\n\n图 2.15\n\nBot Framework Composer\
  \ 语言理解示例\n\n### 语言生成\n\n除了集成语言理解功能外，Composer 还提供了一种将语言生成集成到机器人中的简便方法。与语言理解的 Markdown\
  \ 格式类似，您也可以使用 Markdown 定义语言生成模型，如下图所示。机器人随后会使用存储为 `.lg` 文件的语言生成模型，从中随机选择一个短语，再将其发送给用户。这使对话更加自然和富有变化，因为机器人不会每次都对相同的输入做出同样的回应。此类\
  \ `.lg` 文件的格式如图 2.16 所示。\n\n![](img/495919_1_De_2_Fig16_HTML.png)\n\n图 2.16\n\n\
  Bot Framework Composer 语言生成示例\n\n## 总结\n\n在本章中，您学习了 Microsoft Bot Framework 中所有重要的概念，例如活动处理或对话管理。此外，我们还了解了典型的机器人项目结构，并通读了使用\
  \ Microsoft Bot Framework SDK for C# 和 JavaScript 新建机器人的代码。同时，我们还讨论了 Bot Framework\
  \ 相关的工具和产品，这些工具和产品对于开发、测试和维护基于对话式 AI 平台的机器人是必需的。\n\n下一章将更详细地介绍 Azure 认知服务，重点介绍机器人项目中使用的几个主要类别。此外，还将介绍一些来自实践的最佳实践和指导原则，展示如何将这些认知服务与使用\
  \ Microsoft Bot Framework SDK 构建的机器人相结合。\n\n"
- "# 3. Azure 认知服务简介\n\n对话式应用程序和代理通常凭借其智能能力从其他应用中脱颖而出。这些智能能力通常可以分为以下几类：\n\n- 语言\n\
  - 语音\n- 视觉\n- 决策\n\n在每个类别中，都有许多不同的应用场景，聊天机器人或对话式应用可以从中受益——无论是理解用户以文本形式发送的消息的能力，还是将语音转换为文本以供进一步处理的技能。微软提供了一系列名为\
  \ Azure 认知服务的 API，使开发者能够为应用程序注入智能。其总体目标是让开发者能够将任何类型的认知能力引入应用程序，使其更智能、更接近人类。这些认知服务的架构允许用户将两个或多个认知服务组合在一起，这对于聊天机器人应用尤其有用。\n\
  \n因此，本书的第三章将详细探讨第 1 章中提到的许多智能工具，这些工具对于使用 Microsoft Azure 平台构建成功的对话式 AI 应用至关重要。不过，重点将明确放在语言类别上，因为它在开发对话式应用时最为重要。\n\
  \n## 语言类别：从非结构化文本中提取含义\n\n语言类别是对话式应用中最重要的方面之一。在开发诸如聊天机器人这类旨在以对话方式与用户交互的应用时，为应用注入语言驱动的智能能力至关重要。虽然语言理解只是其中的一个方面，但对话式应用中还有处理语言的其他方面，例如文本分析或文本翻译。因此，以下部分将详细描述语言类别中部分认知服务背后的概念。\n\
  \n## 语言理解 (LUIS)\n\n如第 1 章所述，在对话式应用中理解自然语言文本是一个基本组成部分，它决定了该应用是否会被人们使用。因此，微软提供了一种名为语言理解（下文简称\
  \ LUIS）的 API，它提供了自然语言处理功能。LUIS 的理念是让人们拥有自定义的自然语言理解模型，而无需自行开发必要的算法：\n\n> *语言理解 (LUIS)\
  \ 是一种基于云的 API 服务，它将机器学习智能应用于用户的自然语言对话文本，以预测整体含义并提取相关的详细信息。*\n> \n> *LUIS 的客户端应用是任何与用户进行自然语言交流以完成任务的对话式应用。客户端应用的示例包括社交媒体应用、聊天机器人和语音驱动的桌面应用。*\
  \ (Microsoft Docs, 2020)\n\n\n\n### LUIS 构建块\n\nLUIS 应用中最重要的组件如下，它们对于理解该服务的工作原理至关重要。\n\
  \n从实践角度来看，这意味着每次通过 API 端点调用 LUIS 应用程序以获取给定用户话语的意图和实体时，您都会以识别出的意图和实体的形式获得结果，如图 3.1\
  \ 和表 3.1 所示。\n\n**表 3.1** LUIS 组件\n\n| 组件 | 描述 |\n| --- | --- |\n| **话语** | 话语是用户发送给对话应用程序（例如聊天机器人）的非结构化输入文本。一个例子是句子“西雅图的天气怎么样？”。\
  \ |\n| **意图** | 意图是用户想要执行的特定任务的定义。它可以被视为用户表达的目标或目的。对于话语“西雅图的天气怎么样？”，该话语的意图将是 `GetWeather`。\
  \ |\n| **实体** | 实体是话语中的文本片段，可用于从非结构化文本中提取特定数据，例如名称或日期等重要值。上述 `GetWeather` 意图中话语的实体将是地点，例如本例中的\
  \ `Seattle`。 |\n| **分数** | 分数表示 LUIS 应用对特定话语与特定意图匹配或在话语中识别出实体的确信程度。该值是一个介于 0 和 1\
  \ 之间的数字，接近 1 的预测值表示相对较高的置信度，而接近 0 的值表示 LUIS 对结果准确或正确的置信度较低。 |\n\n![](img/495919_1_De_3_Fig1_HTML.png)\n\
  \n**图 3.1** LUIS 基本说明\n\n从开发角度来看，您返回的结果是一个 JSON 表示形式。因此，对于图 3.1 中提到的那个话语，您基本上会得到以下\
  \ JSON 字符串作为结果：\n\n```\n{\n\"query\": \"西雅图的天气怎么样？\",\n\"topScoringIntent\": {\n\
  \"intent\": \"GetWeather\",\n\"score\": 0.921233\n},\n\"entities\": [\n{\n\"entity\"\
  : \"Seattle\",\n\"type\": \"地点\",\n\"score\": 0.9615982\n}\n]\n}\n```\n\n因此，LUIS\
  \ 并非专为聊天机器人设计，也可以应用于其他需要语言理解的场景。然而，由于本书专注于对话式 AI 平台，后续内容将探讨 LUIS 在对话用例中的应用。\n\n\
  ### 创建 LUIS 应用程序\n\n在创建 LUIS 应用程序之前，您需要确保拥有一个有效的 Microsoft Azure 订阅。重要的是，您的帐户必须能够在此\
  \ Azure 订阅中创建新资源；否则，您将无法执行以下步骤。\n\n**注意**\n\n如果您还没有有效的 Azure 订阅，可以通过此链接 `https://azure.microsoft.com/en-us/free`\
  \ 注册一个新的 Azure 订阅，并获得 200 美元的免费额度。\n\n创建新的 LUIS 应用程序主要有两种方式：通过基于 Web 的门户和通过 CLI。以下部分将介绍这两种方法。两种方式的结果相同，不过使用\
  \ CLI 时，您有更高的机会自动化这些任务。当您需要一次性创建多个 LUIS 应用程序或同时更新多个 LUIS 应用程序时，这将非常有用。\n\n在部署新的\
  \ LUIS 应用程序之前，您需要在 Azure 订阅中创建一个新的 Azure 资源组。为此，请登录 `https://portal.azure.com` 并创建一个新的资源组，如图\
  \ 3.2 所示。\n\n![](img/495919_1_De_3_Fig2_HTML.png)\n\n**图 3.2** 为 LUIS 创建新的 Azure\
  \ 资源组\n\n\n\n### 使用 LUIS 门户\n\n要创建新的 LUIS 应用程序，您需要访问 `www.luis.ai/`，并使用有权访问 Azure\
  \ 订阅的帐户登录。登录后，点击右上角的姓名，然后选择“设置”，如图 3.3 所示。\n\n![](img/495919_1_De_3_Fig3_HTML.png)\n\
  \n图 3.3\n\n设置 LUIS 应用程序 1 – 登录\n\n在设置屏幕上，您可以管理您的帐户和相应的设置。在我们的案例中，我们需要创建一个创作资源，即负责创建\
  \ LUIS 应用程序的 Azure 资源。因此，下一步是点击相应的按钮来创建新的创作资源，如图 3.4 所示。\n\n![](img/495919_1_De_3_Fig4_HTML.png)\n\
  \n图 3.4\n\n设置 LUIS 应用程序 2 – 用户设置\n\n现在，您需要输入资源名称，并选择 Azure 订阅以及之前创建的 Azure 资源组，以创建新的\
  \ LUIS 创作资源，如图 3.5 所示。\n\n![](img/495919_1_De_3_Fig5_HTML.png)\n\n图 3.5\n\n设置 LUIS\
  \ 应用程序 3 – 创建新的创作资源\n\n当您返回 `www.luis.ai/applications` 并选择您的 Azure 订阅和创作资源时，您应该会看到类似于图\
  \ 3.6 的屏幕，因为您尚未创建任何 LUIS 应用程序。\n\n![](img/495919_1_De_3_Fig6_HTML.png)\n\n图 3.6\n\
  \n设置 LUIS 应用程序 4 – “我的应用程序”视图\n\n现在，您可以创建一个用于对话的新 LUIS 应用程序。基本上，您有三种创建新 LUIS 应用程序的方式：\n\
  \n*   **新建对话应用**：此选项意味着您从头开始创建一个新的 LUIS 模型。\n*   **导入为 JSON**：此选项意味着您导入一个已存在的 JSON\
  \ 格式的 LUIS 模型。\n*   **导入为 LU**：此选项与“导入为 JSON”选项类似，但您导入的不是 LUIS 模型的 JSON 表示，而是一个\
  \ `.lu` 文件，该文件通常比 JSON 文件更易于阅读。\n\n注意\n\n`.lu` 文件是类似 Markdown 的文件，用于描述或定义 LUIS 应用程序。通常，一个\
  \ `.lu` 文件包含意图的定义以及意图的实体和表述。\n\n为简单起见，您应该选择第一个选项“新建对话应用”，以完全从头开始构建语言理解应用程序，如图 3.7\
  \ 所示。\n\n![](img/495919_1_De_3_Fig7_HTML.png)\n\n图 3.7\n\n设置 LUIS 应用程序 5 – 创建新的\
  \ LUIS 应用程序\n\n创建 LUIS 应用程序之前的最后一步是填写应用程序的相关信息，例如名称和要使用的区域设置。为您的 LUIS 应用程序指定一个描述性名称，并选择您的语言理解模型所基于的区域设置（见图\
  \ 3.8）。\n\n![](img/495919_1_De_3_Fig8_HTML.png)\n\n图 3.8\n\n设置 LUIS 应用程序 6 – 填写\
  \ LUIS 应用程序详细信息\n\n创建 LUIS 应用程序后，下一步是创建您要在 LUIS 应用程序中使用的所需意图和实体。目标是创建一个语言理解模型，如图\
  \ 3.9 所示，该模型包含两个意图。第一个意图用于处理天气查询，而第二个意图则涵盖餐厅餐桌预订。\n\n\n\n![](img/495919_1_De_3_Fig9_HTML.png)\n\
  \n**图 3.9** 示例 LUIS 模型结构\n\n由于 LUIS 应用程序现已创建，您可以继续根据您的用例对其进行自定义。当您查看新创建的 LUIS 应用程序时，您会发现已经为您创建了一个意向，即\
  \ `None` 意向。此意向在您的 LUIS 应用程序中用作回退意向，应由超出您语言模型或架构范围的表述组成。首先，您需要将必要的 `GetWeather`\
  \ 和 `BookTable` 意向添加到您的应用程序中，如图 3.9 所示。为此，请点击“意向”页面上的“+ 创建”按钮，并输入意向的名称，如图 3.10 所示。\n\
  \n![](img/495919_1_De_3_Fig10_HTML.png)\n\n**图 3.10** 设置 LUIS 应用程序 7 – 创建意向\n\n\
  **注意：** LUIS 还提供了所谓的预生成领域意向，允许您向应用程序添加包含一系列预定义表述和实体的流行意向，这些表述和实体涵盖了常见场景。\n\n下一步是向我们的\
  \ LUIS 应用程序添加必要的实体，即 `geographyV2`（用于预测地名（如城市或国家）的预生成实体）、`locationName`（用于预测地名（如餐厅）的机器学习实体）、`datetimeV2`（用于预测日期和时间值的预生成实体）和\
  \ `number`（用于预测数字的预生成实体，该数字用于预测预订人数），如图 3.9 所示。这里我们将利用 LUIS 提供的一些预生成实体的优势。因此，您需要将本图中提到的预生成实体添加到您的\
  \ LUIS 应用程序中。由于还有一个实体不属于预生成实体，您需要创建另一个名为 `locationName` 的“机器学习”类型实体，如图 3.11 所示。\n\
  \n![](img/495919_1_De_3_Fig11_HTML.png)\n\n**图 3.11** 设置 LUIS 应用程序 8 – 创建实体\n\n\
  添加完意向和实体后，您需要向 LUIS 模型添加示例数据，即所谓的表述。表述背后的概念是告诉您的 LUIS 应用程序它应该识别哪种类型的用户输入，以及如何正确预测这些用户输入短语中的特定值。因此，向您的\
  \ LUIS 应用程序添加各种不同的表述也是一个好方法，以获得更好的预测结果。例如，对于 `GetWeather` 意向，您可以在应用程序中添加以下表述：\n\n\
  - 西雅图的天气怎么样？\n- 纽约的天气怎么样？\n- 柏林的天气怎么样？\n- 你能告诉我雷德蒙德的天气预报吗？\n- 我想了解阿姆斯特丹天气的一些细节。\n\
  \n将这些表述添加到您的 `GetWeather` 意向中后，您应该会立即看到 LUIS 使用 `geographyV2` 实体标记了城市名称，如图 3.12\
  \ 所示。这意味着您无需手动标记表述中的城市名称来告诉 LUIS 这些是需要提取的城市名称。\n\n![](img/495919_1_De_3_Fig12_HTML.png)\n\
  \n**图 3.12** 设置 LUIS 应用程序 9 – 为 `GetWeather` 添加表述\n\n现在，您还需要向 `BookTable` 意向添加一些表述。例如，您可以向您的意向添加以下表述：\n\
  \n- 你能在明天为四个人在著名的寿司吧预订一张桌子吗？\n- 请为六个人在周六下午 3 点预订硬石餐厅的一张桌子。\n- 请在 11 月 23 日为五个人在杰米厨房预订一个位置。\n\
  - 你能在明天为汤姆餐厅预订一张桌子吗？\n- 请为红屋牛排馆和烧烤店预订一张桌子。\n\n您应该会看到 LUIS 能够正确识别人数以及日期和时间，但地点名称完全没有被提取出来，如图\
  \ 3.13 所示。这是因为您没有告诉您的 LUIS 应用程序地点名称是什么样子的。\n\n![](img/495919_1_De_3_Fig13_HTML.png)\n\
  \n**图 3.13** 设置 LUIS 应用程序 10 – 为 `BookTable` 添加表述\n\n但是，您可以轻松地将表述中的地点名称标记为实体，以告诉\
  \ LUIS 实体的样子。只需将鼠标悬停在表述中的一个单词上并单击它即可。如果实体由多个单词组成，只需用鼠标指针单击实体表示中的第一个单词，然后单击最后一个单词，如图\
  \ 3.14 所示。\n\n![](img/495919_1_De_3_Fig14_HTML.png)\n\n**图 3.14** 设置 LUIS 应用程序 11\
  \ – 标记实体\n\n标记表述中的所有地点名称实体，以告诉 LUIS 这类单词或短语代表一个地点名称，如图 3.15 所示。\n\n![](img/495919_1_De_3_Fig15_HTML.png)\n\
  \n**图 3.15** 设置 LUIS 应用程序 12 – `BookTable` 已标记的实体\n\n现在您已经添加了所有意向、实体和表述，接下来需要训练您的\
  \ LUIS 应用程序。通过此过程，您的 LUIS 应用程序将被指示提高或提升语言理解的水平。通常，在添加新的意向、实体或表述之后，或者在编辑了 LUIS 应用程序的某些部分以进行更新之后，您需要训练您的\
  \ LUIS 应用程序。训练应用程序的过程相当简单，如图 3.16 所示；您唯一需要做的就是点击 LUIS 门户右上角的“训练”按钮，这将启动训练过程。\n\n\
  ![](img/495919_1_De_3_Fig16_HTML.png)\n\n**图 3.16** 设置 LUIS 应用程序 13 – 训练 LUIS 应用程序\n\
  \n当您的 LUIS 应用程序训练完成后，您会在通知列表中收到一条通知，表明训练已成功完成，并且所有更改现已生效，如图 3.17 所示。\n\n![](img/495919_1_De_3_Fig17_HTML.png)\n\
  \n**图 3.17** 设置 LUIS 应用程序 14 – 训练后的通知\n\n应用程序的训练过程完成后，是时候首次测试语言模型了。只需打开测试窗口，如图 3.18\
  \ 所示，该窗口位于 LUIS 门户的右上角，并输入不属于表述列表的示例句子。\n\n![](img/495919_1_De_3_Fig18_HTML.png)\n\
  \n**图 3.18** 设置 LUIS 应用程序 15 – 测试\n\n\n\n#### 配置 LUIS 应用程序 – 测试结果\n\n例如，您可以使用以下短语来测试\
  \ `BookTable` 意图，这将得到图 3.19 所示的结果。该应用程序已识别出短语“Could you book a table at joey’s restaurant\
  \ for 7 on Sunday please?”属于 `BookTable` 意图，置信度为 `0.872`。此外，该应用程序还正确提取了实体：“joey’s\
  \ restaurant”作为地点名称，“7”作为人数，“Sunday”作为日期时间。这表明，您无需向 `LUIS` 应用程序添加大量示例数据，语言模型就能足够复杂以满足您的需求，少量话语就已足够。您向应用程序添加的话语越多，最终的语言模型就会越精确。\n\
  \n![](img/495919_1_De_3_Fig19_HTML.png)\n\n**图 3.19** 配置 LUIS 应用程序 16 – 测试结果\n\n\
  配置 `LUIS` 应用程序过程的最后一步是发布应用程序。发布 `LUIS` 应用程序后，如图 3.20 所示，该应用程序将在您的 `LUIS` API 端点内可用。这使得您可以通过\
  \ `LUIS` API 将您的客户端应用程序（例如聊天机器人）连接到您的语言模型，以便根据输入获取意图等。应用程序的发布通常是在语言模型进行重大升级后，当您希望将更改提供给客户端应用程序时，或者当您首次完成语言模型配置时进行。\n\
  \n![](img/495919_1_De_3_Fig20_HTML.png)\n\n**图 3.20** 配置 LUIS 应用程序 17 – 发布\n\n###\
  \ 使用 CLI\n\n虽然使用 `LUIS` 门户是学习 `LUIS` 概念和功能的好方法，但还有另一种管理 `LUIS` 应用程序的方法，即 Bot Framework\
  \ CLI。如第 2 章所述，可从 [`aka.ms/bfcli`](https://aka.ms/bfcli) 下载的 Bot Framework CLI 旨在让\
  \ Bot Framework 开发者能够通过命令行管理与聊天机器人或对话应用程序相关的所有服务。因此，本章的下一部分将展示如何利用 Bot Framework\
  \ CLI 来创建、更新、测试和发布 `LUIS` 应用程序。\n\n使用 Bot Framework CLI 创建新的 `LUIS` 应用程序的基础是描述语言理解模型的\
  \ `.lu` 文件或 JSON 文件。在我看来，使用 `.lu` 文件的优点是，与 JSON 文件相比，它首先更易读，也更容易创建。因此，您需要在您选择的文件夹中创建一个新文件，使用合适的名称（在本教程中，`03_convAIBook-LUIS`\
  \ 用作所有 `LUIS` 文件的名称），文件扩展名为 `.lu`，这代表一个语言理解文件。此 `.lu` 文件应基本上代表您在前面步骤中使用 `LUIS` 门户创建的\
  \ `LUIS` 应用程序；因此，它将包含以下部分：\n\n- **LUIS 应用程序信息**\n- **意图声明**\n- **实体定义**\n\n下面是一个示例\
  \ `.lu` 文件，描述了 `BookTable` 和 `GetWeather` 这两个意图及其话语和实体：\n\n```\n> LUIS 应用程序信息\n\
  > ! # @app.name = ConvAIBook-LUIS\n> ! # @app.desc = 用于演示目的的 LUIS 应用程序\n> ! # @app.versionId\
  \ = 0.1\n> ! # @app.culture = en-us\n> ! # @app.luis_schema_version = 7.0.0\n> !\
  \ # @app.tokenizerVersion = 1.0.0\n> # 意图定义\n#### BookTable\n- 请预订 {@locationName=redmond\
  \ steak house} and grill 的一张桌子。\n- 明天能在 {@locationName=famous sushi bar} 为 4 人预订一张桌子吗？\n\
  - 明天能在 {@locationName=tom's diner} 预订一张桌子吗？\n- 请在 11 月 23 日为 5 人在 {@locationName=jamie's\
  \ kitchen} 预订一个位置。\n- 请为六人在 {@locationName=hard rock café} 预订一张周六下午 3 点的桌子。\n####\
  \ GetWeather\n- 你能告诉我雷德蒙德的天气预报吗？\n- 纽约的天气怎么样？\n- 我想了解阿姆斯特丹天气的一些细节。\n- 西雅图的天气怎么样？\n\
  - 柏林的天气怎么样？\n### 无\n> # 实体定义\n@ ml locationName\n### 预构建实体定义\n@ 预构建 datetimeV2\n\
  @ 预构建 geographyV2\n@ 预构建 number\n```\n\n将上述所有部分复制并保存到新创建的 `03_convAIBook-LUIS.lu`\
  \ 文件中后，您就可以进行下一步了，即将 `.lu` 文件转换为 JSON 文件。导入命令要求传递一个 JSON 文件作为输入参数，该文件包含要创建的 `LUIS`\
  \ 应用程序的定义。因此，我们需要在安装了 Bot Framework CLI 的命令行中执行以下命令：\n\n```\nbf luis:convert --culture\
  \ \"en-us\" --in \".\\03_convAIBook-LUIS.lu\" --out \".\\03_convAIBook-LUIS.json\"\
  \n```\n\n**注意：** 如果您想创建其他语言的语言模型，请确保在 Bot Framework CLI 命令中为您的 `LUIS` 应用程序选择正确的区域设置。\n\
  \n\n\n此命令会在当前文件夹中为您创建一个名为 `03_convAIBook-LUIS.json` 的文件，该文件定义了您之前在 `.lu` 文件中描述的\
  \ LUIS 应用程序。现在，您可以使用以下命令将此 JSON 文件作为新的 LUIS 应用程序导入到您的 LUIS 帐户中：\n\n```\nbf luis:application:import\
  \ --endpoint \"https://.api.cognitive.microsoft.com\" --subscriptionKey \"yourLUISSubscriptionKey\"\
  \ --name \"ConvAIBook-LUIS-CLI\" --in \".\\03_convAIBook-LUIS.json\"\n```\n\n请确保将您在\
  \ Azure 门户中获得的 LUIS 订阅密钥插入到您的 LUIS Azure 资源中，并插入正确的 LUIS 端点区域（您也可以在显示订阅密钥的页面上找到该区域），以便成功执行该命令。如果命令成功执行，您将看到新创建的\
  \ LUIS 应用程序的 ID，如图 3.21 所示。请复制该应用程序 ID 并妥善保存，因为后续命令中会再次用到它。\n\n![](img/495919_1_De_3_Fig21_HTML.png)\n\
  \n图 3.21 使用 Bot Framework CLI 导入 LUIS 应用程序\n\n现在，您可以使用以下命令查看新创建的 LUIS 应用程序的详细信息，例如描述、区域设置、版本或上次修改时间，这将产生类似于图\
  \ 3.22 所示的输出：\n\n![](img/495919_1_De_3_Fig22_HTML.png)\n\n图 3.22 使用 Bot Framework\
  \ CLI 显示 LUIS 应用程序信息\n\n```\nbf luis:application:show --appId \"appId\" --endpoint\
  \ \"https://.api.cognitive.microsoft.com\" --subscriptionKey \"yourLUISSubscriptionKey\"\
  \n```\n\n下一个命令 `bf luis:train:run` 用于在测试 LUIS 应用程序之前对其进行训练。此命令告知服务需要处理一个新的训练请求。因此，您需要执行第二个命令\
  \ `bf luis:train:show` 来跟踪应用程序的训练过程，如图 3.23 所示：\n\n![](img/495919_1_De_3_Fig23_HTML.png)\n\
  \n图 3.23 使用 Bot Framework CLI 训练 LUIS 应用程序\n\n```\nbf luis:train:run --appId \"\
  appId\" --versionId \"0.1\" --endpoint \"https://.api.cognitive.microsoft.com\"\
  \ --subscriptionKey \"yourLUISSubscriptionKey\"\nbf luis:train:show --appId \"appId\"\
  \ --versionId \"0.1\" --endpoint \"https://.api.cognitive.microsoft.com\" --subscriptionKey\
  \ \"yourLUISSubscriptionKey\"\n```\n\n当所有状态指示器都显示“成功”时，下一步就是测试 LUIS 应用程序。这可以通过创建一个新的\
  \ `.lu` 文件并为每个要测试的意图添加测试话语来轻松完成。例如，这个名为 `03_luis_cli_test.lu` 的文件可能如下所示：\n\n```\n\
  # BuchTisch\n- Könnten Sie bitte einen Tisch in Joey's Restaurant für 7 Personen\
  \ am Sonntag reservieren?\n- Ich möchte heute Abend einen Tisch für zwei Personen\
  \ in Jamie's Kitchen reservieren.\n#### GetWeather\n- Wie ist das Wetter morgen\
  \ in Wien?\n- Wie ist das Wetter?\n```\n\n但是，在使用 CLI 测试 LUIS 应用程序之前，您需要使用以下命令将其发布；否则测试命令将会失败：\n\
  \n```\nbf luis:application:publish --appId \"appId\" --versionId \"0.1\" --endpoint\
  \ \"https://.api.cognitive.microsoft.com\" --subscriptionKey \"yourLUISSubscriptionKey\"\
  \n```\n\n现在，要测试 LUIS 应用程序，只需执行以下命令，并将新创建的 `03_luis_cli_test.lu` 文件作为输入文件通过 `-i`\
  \ 参数传递，这将向您显示类似于图 3.24 的结果：\n\n![](img/495919_1_De_3_Fig24_HTML.png)\n\n图 3.24 使用\
  \ Bot Framework CLI 测试 LUIS 应用程序\n\n```\nbf luis:test -a \"appId\" -s \"subscriptionKey\"\
  \ -i \".\\03_luis_cli_test.lu\"\n```\n\n**注意**\n\n在生产场景中，您需要为每个意图添加超过五个话语，才能构建一个精细的语言模型。此外，测试是成功的关键。因此，请在您的项目中为测试和完善语言理解模型预留足够的时间。\n\
  \n## QnA Maker\n\n语言类别中的另一个产品是名为“QnA Maker”的服务。这是一个旨在帮助您以简单 FAQ 风格构建复杂语言模型的工具。QnA\
  \ Maker 可以被视为一种知识库即服务，因为它允许您以最小的努力使用您的数据创建知识库。然后，这些知识库可以被聊天机器人等对话应用程序利用，以回答用户的问题。因此，本节将涵盖将知识库集成到对话应用程序中所有重要的方面：\n\
  \n> *通过用户友好的界面或 REST API，利用常见问题页面、支持网站、产品手册、SharePoint 文档或编辑内容，创建、训练和发布一个精密的机器人。*\
  \ (Microsoft, 2020)\n\n\n\n### QnA Maker 构建块\n\n如图 3.25 所示，`QnA Maker` 依赖于多种 Azure\
  \ 服务。最重要的是，所有服务和资源都在您的 Azure 订阅中进行部署。这意味着，存储在您的 `QnA Maker` 服务中并经过处理的数据，都处于您的控制之下。`QnA\
  \ Maker` 本身使用一个专门的 `QnA Maker` 服务，该服务负责存储您的订阅密钥。这些密钥是与 `QnA Maker` API 通信所必需的。\n\
  \n![](img/495919_1_De_3_Fig25_HTML.png)\n\n图 3.25\n\n`QnA Maker` 架构\n\n您添加到 `QnA\
  \ Maker` 知识库中的所有数据，都存储在一个专门的 `Azure Search` 实例中。在此资源内，QnA 对及其相关的元数据会被存储和索引。此外，您还可以在知识库中存储特定单词或短语的同义词，这些同义词同样存储在\
  \ `Azure Search` 中。\n\n从用户的角度来看，您可以使用 `QnA Maker` 门户来创建和维护您的知识库。在此门户中执行的所有操作，都通过\
  \ `Azure App Service` 进行处理，该服务也是您 `QnA Maker` 部署的一部分。此资源包含 QnA 运行时，负责处理 API 请求，例如创建知识库或向您的\
  \ `Azure Search Store` 添加新的 QnA 对。`Azure App Service` 的第二部分是 QnA 排名组件。在查询 `QnA Maker`\
  \ 实例时，该组件会被大量使用，因为它会对 `Azure Search` 实例检索到的结果进行评分并确定置信度值，然后再将这些结果返回给客户端应用程序。\n\n\
  在典型的 `QnA Maker` 部署中使用的最后一个服务是 `Azure Application Insights`。此云服务存储您的 `QnA Maker`\
  \ 服务的所有重要遥测数据，这些数据可以被查询和分析。一个常见的应用场景是基于用户输入分析最常见的有答案或无答案的问题。\n\n在一个 `QnA Maker`\
  \ 知识库中，存在一些对其使用至关重要的特定组件，如图 3.26 所示。知识库中存储着 QnA 对。当您的对话应用程序（例如聊天机器人）查询 `QnA Maker`\
  \ 知识库时，输入内容会与 KB 中存储的问题进行匹配。如果匹配成功，则会将答案连同匹配的置信度值一起作为响应返回。每个 QnA 对还可以包含一个元数据列表。这些键值元数据对可用于过滤特定查询的结果，并从\
  \ `QnA Maker` 服务获得更精确的答案。\n\n![](img/495919_1_De_3_Fig26_HTML.png)\n\n图 3.26\n\n\
  `QnA Maker` KB 结构\n\n### 创建 QnA Maker 服务和知识库\n\n与 `LUIS` 类似，有两种方法可以创建新的 `QnA Maker`\
  \ 实例及其知识库：通过图形用户界面或通过命令行界面。在本部分中，您将了解这两种方法，以便您可以选择使用图形化且更友好的方式，或者如果您希望将其作为例行操作的一部分，则可以使用\
  \ `CLI`。\n\n### 使用 QnA Maker 门户\n\n可以通过 [`qnamaker.ai`](https://qnamaker.ai) 使用有权创建\
  \ Azure 资源的帐户访问 `QnA Maker` 门户。使用您的帐户登录后，在顶部菜单中导航到“Create a knowledge base”以开始创建过程。在此处，您首先需要在步骤\
  \ 1 下创建一个新的 QnA 服务。单击图 3.27 中所示的链接后，您将被重定向到 Azure 门户，您可能需要在此处使用您的帐户重新登录。\n\n![](img/495919_1_De_3_Fig27_HTML.png)\n\
  \n图 3.27\n\n设置 `QnA Maker` KB 01\n\n登录后，您需要输入创建新的 `QnA Maker` Azure 服务所需的信息，以及 `QnA\
  \ Maker` 所依赖的所有其他服务（`Azure Search`、`Azure App Service` 和 `Application Insights`）。您可以选择免费层或付费层，但请注意，每个\
  \ Azure 订阅只能部署一个免费的 `QnA Maker` 实例。因此，如果您已经在使用的 Azure 订阅中设置了一个 `QnA Maker` 服务，则必须选择\
  \ `Standard S0` 层，如图 3.28 所示。\n\n![](img/495919_1_De_3_Fig28_HTML.png)\n\n图 3.28\n\
  \n设置 `QnA Maker` KB 02 – 创建 Azure 资源\n\n创建好您的 Azure 资源后，您可以返回 `QnA Maker` 门户并继续执行步骤\
  \ 2。在此步骤中，您需要选择正确的 `Azure Active Directory`、包含您的 QnA 服务实例的 Azure 订阅以及 QnA 服务本身。此外，您还需要选择知识库的语言，如图\
  \ 3.29 所示。这是一个关键步骤，因为每个 QnA 服务实例只能使用一种语言。因此，如果您在 QnA 服务中首次创建 KB 时选择了一种语言，排名算法将针对您的\
  \ Azure 服务进行部署。这意味着，如果您要创建多语言应用程序，则必须为不同的语言创建单独的 Azure QnA 服务实例。\n\n![](img/495919_1_De_3_Fig29_HTML.png)\n\
  \n图 3.29\n\n设置 `QnA Maker` KB 03 – 将您的 QnA 服务连接到您的 KB\n\n**注意**\n\n一个 `QnA Maker`\
  \ Azure 服务实例只能包含相同语言的知识库。因此，如果您计划在 KB 中使用多种语言，则必须为您要使用的每种语言部署一个 `QnA Maker` 服务以及所有用于\
  \ `QnA Maker` 的服务，例如 `Azure Search` 和 `Azure App Service`。\n\n在步骤 3 中，您需要为您的知识库命名，此名称可以随时更改。在步骤\
  \ 4 中，您可以使用现有网站的内容（通过输入 URL）来填充您的知识库。或者，您也可以上传以下类型的基于常见问题解答的文件：此外，您还可以启用多轮提取功能，该功能还会提取特定文档或网站的问答对层次结构。这意味着，例如，如果用户提出了一个特定问题，而该问题后面附加了一个后续问题，应用程序会将答案以及附加的“子”问题作为提示呈现，以便用户能够快速继续对话。在创建知识库之前的最后一步，是选择五种预置角色类型之一，该角色会用来自聊天的问答对填充您的知识库，如图\
  \ 3.30 所示。\n\n\n\n![](img/495919_1_De_3_Fig30_HTML.png)\n\n图 3.30\n\n配置 QnA Maker\
  \ KB 04 – 添加 URL、文件和闲聊内容\n\n*   PDF\n*   DOC\n*   Excel\n*   TXT\n*   TSV\n\n此外，您还可以启用多轮提取功能，该功能还会提取特定文档或网站的问答对层级结构。也就是说，当用户提出某个特定问题，而该问题后附有后续问题时，应用程序会将答案以及附带的“子”问题作为提示呈现出来，以便用户能够快速继续对话。在创建知识库之前的最后一步，是从五个预置的人格类型中选择一个，用于为您的知识库填充来自聊天的问答对，如图所示。\n\
  \n知识库创建成功后，您的知识库就可以开始填充问题和答案了。如果您添加了某个预置的闲聊人格，您的知识库中就已经包含了许多问答对，如图 3.31 所示。\n\n\
  ![](img/495919_1_De_3_Fig31_HTML.png)\n\n图 3.31\n\n配置 QnA Maker KB 05 – 创建后的知识库\n\
  \n### 使用 CLI\n\n虽然您可以像前面步骤描述的那样使用 QnA Maker 门户来创建知识库，但您也可以使用 CLI 达到同样的效果。要使用 Bot\
  \ Framework CLI 创建新的知识库，您首先需要创建一个新的 `.qna` 文件，您可以在其中按以下格式添加您的问答对：\n\n```\n> # QnA\
  \ 定义\n### ? 微软为什么开发 Bot Framework？\n'''\n我们开发 Bot Framework 是为了让开发者更容易创建出色的机器人，并将它们与用户连接起来，无论用户在哪里进行对话，包括在最重要的微软频道上。\n\
  '''\n### ? 什么是 v4 SDK？\n'''\nBot Framework v4 SDK 建立在之前 Bot Framework SDK 的反馈和经验教训之上。它引入了适当的抽象层，同时允许对机器人构建模块进行全面的组件化。您可以从一个简单的机器人开始，并借助模块化和可扩展的框架不断扩展您的机器人。您可以在\
  \ GitHub 上找到该 SDK 的常见问题解答。\n'''\n```\n\n创建 `.qna` 文件后，您需要通过运行以下命令将其转换为 `.json` 文件。这是必要的，因为\
  \ Bot Framework CLI 只接受有效的 JSON 文件来成功创建新的知识库：\n\n```\nbf qnamaker:convert -i \"\
  .\\03_convAIBook-QnA.qna\" -o \".\\03_convAIBook-QnA.json\"\n```\n\n运行此命令后，您应该会看到一条输出消息，表明\
  \ QnA 模型已成功写入您指定的 JSON 文件。上述命令的输出应如下所示：\n\n```\n{\n\"urls\": [],\n\"qnaList\": [\n\
  {\n\"id\": 0,\n\"Antwort\": \"我们创建 Bot Framework 是为了让开发者更容易创建出色的机器人，并与用户连接，无论他们在哪里进行对话，包括最重要的微软频道。\"\
  \n\"Quelle\": \"自定义编辑\",\n\"Fragen\": [\n\"微软为什么开发 Bot Framework？\"\n],\n\"Metadaten\"\
  : []\n},\n{\n\"id\": 0,\n\"Antwort\": \"Bot Framework v4 SDK 建立在之前 Bot Framework\
  \ SDK 的反馈和经验教训之上。它引入了适当的抽象层，同时允许对机器人构建模块进行全面的组件化。您可以从一个简单的机器人开始，并借助模块化和可扩展的框架不断扩展您的机器人。您可以在\
  \ GitHub 上找到该 SDK 的常见问题解答。\",\n\"Quelle\": \"自定义编辑\",\n\"Fragen\": [\n\"什么是 SDK\
  \ v4？\"\n],\n\"Metadaten\": []\n}\n],\n\"Dateien\": [],\n\"Name\": \"\"\n}\n```\n\
  \n下一步是从 Azure 门户中您之前部署的 Azure QnA 服务实例的“密钥和终结点”处获取您的 QnA Maker 订阅密钥。复制密钥后，您可以在终端中运行以下命令来创建一个新的知识库（请记得修改您的知识库名称和\
  \ `.qna` 文件的路径）：\n\n```\nbf qnamaker:kb:create --name \"ConvAIBook-CLI-KB\" --subscriptionKey\
  \ \"yourQnAMakerSubscriptionKey\" --in \".\\03_convAIBook-QnA.json\"\n```\n\n命令成功执行后，您应该会看到一条包含新知识库\
  \ ID 的输出消息，如图 3.32 所示。\n\n![](img/495919_1_De_3_Fig32_HTML.png)\n\n图 3.32\n\n使用\
  \ CLI 01 配置 QnA Maker KB – 创建后的输出\n\n现在，如果您切换回 QnA Maker 门户，并在顶部导航菜单中点击“我的知识库”，您应该会看到新的知识库“ConvAIBook-CLI-KB”已成功创建。此外，您放入\
  \ `.qna` 文件中的两个问答对也已通过 CLI 命令添加到您的新知识库中，如图 3.33 所示。\n\n![](img/495919_1_De_3_Fig33_HTML.png)\n\
  \n图 3.33\n\n使用 CLI 02 配置 QnA Maker KB – 创建后的知识库\n\n### 填充 QnA Maker 知识库\n\n创建好 QnA\
  \ Maker 知识库后，就开始了向知识库添加数据的过程。要添加新的问题和答案，您有以下几种方法，本章本节将对此进行介绍：\n\n*   通过 QnA Maker\
  \ 门户手动添加数据\n*   使用 Bot Framework CLI 添加数据\n*   向知识库添加 URL，由 QnA Maker 服务自动提取问答对\n\
  *   通过 QnA Maker 门户直接将文件添加到知识库\n\n\n\n### 通过 QnA Maker 门户手动添加数据\n\n此选项对于 QnA 内容编辑者尤其实用，因为\
  \ QnA Maker 门户提供了一种非常简单的方式来添加问答。首先，打开您的知识库，网址为 [`qnamaker.ai`](https://qnamaker.ai)，然后点击“+\
  \ 添加 QnA 对”按钮，如图 3.34 所示。\n\n![](img/495919_1_De_3_Fig34_HTML.png)\n\n图 3.34\n\n\
  通过 QnA Maker 门户填充知识库 01\n\n现在，您将在“编辑”源中获得一个新的输入字段，所有手动添加的 QnA 对都会汇总在此处。在这里，您可以在“问题”列中添加一个新问题，并在“答案”列中添加相应的答案，如图\
  \ 3.35 所示。\n\n![](img/495919_1_De_3_Fig35_HTML.png)\n\n图 3.35\n\n使用 QnA Maker 门户\
  \ 02 填充知识库 – 添加 QnA 对\n\n**注意**\n\nQnA Maker 门户提供了一个简单的富文本编辑器，用于格式化您的答案，并应用诸如粗体、斜体、项目符号，甚至链接、图片和表情符号等样式。\n\
  \n添加完第一个 QnA 对后，务必为问题添加一些替代表述。这一点很重要，因为使用您对话应用程序的用户在提问时，可能不会总是使用完全相同的措辞。因此，您需要考虑用户可能会如何提出某些问题，这些问题应导向相同的答案，以覆盖所有可能的措辞变体。例如，问题“这本书的标题是什么？”也可能以以下示例句子的形式提出：\n\
  \n- 这本书的名字是什么？\n- 这本书叫什么？\n- 这本书的标题是什么？\n- 这本书的标签是什么？\n- 您能告诉我这本册子的名称吗？\n- 我想知道这本出版物的标题。\n\
  - 您知道这部作品的名称吗？\n\n以上所有示例都指向询问这本书的名称，但每个示例又各有不同。由于 QnA Maker 使用模式匹配算法来识别和评定最佳答案，因此构建一个精良且智能的知识库的最佳方法是，尽可能多地添加您能想到的替代表述。这将确保无论用户如何查询，您的对话应用程序都能找到最合适的答案。因此，下一步就是将前面文本中的所有这些示例作为替代表述添加到您的第一个问题中，如图\
  \ 3.36 所示。\n\n![](img/495919_1_De_3_Fig36_HTML.png)\n\n图 3.36\n\n使用 QnA Maker 门户\
  \ 03 填充知识库 – 添加替代表述\n\n现在，您还可以将两个问题关联起来，以创建一个上下文机制。例如，您可以回答“这本书的标题是什么？”这个问题，然后提出一个所谓的后续问题，向用户提出一个关于同一主题的恰当问题。这有助于用户更轻松地在对话中导航。例如，您可以将“这本书是关于什么的？”这个问题作为原始书标题问题的后续问题添加。为此，只需点击某个\
  \ QnA 对答案列中的“+ 添加后续问题”，如图 3.37 所示。\n\n![](img/495919_1_De_3_Fig37_HTML.png)\n\n\
  图 3.37\n\n使用 QnA Maker 门户 04 填充知识库 – 添加后续问题\n\n随后将打开一个新的弹出对话框，您可以在其中输入一个新问题，或者从知识库中选择一个现有问题作为后续问题（见图\
  \ 3.38）。\n\n![](img/495919_1_De_3_Fig38_HTML.png)\n\n图 3.38\n\n使用 QnA Maker 门户 05\
  \ 填充知识库 – 输入后续查询数据\n\n保存后续问题后，您会注意到知识库中已添加了一个新的 QnA 对，其问题为您输入的显示文本，答案为您在“链接到 QnA”字段中输入的内容。现在，您需要为新添加的问题添加一些替代表述，以覆盖广泛可能的措辞范围，如图\
  \ 3.39 所示。\n\n![](img/495919_1_De_3_Fig39_HTML.png)\n\n图 3.39\n\n使用 QnA Maker 门户\
  \ 06 填充知识库 – 新添加的后续问题\n\n\n\n### 使用 Bot Framework CLI 添加数据\n\n要使用 Bot Framework\
  \ CLI 向 QnA Maker 知识库添加内容，您首先需要一个 `.qna` 文件。该文件应包含您想要添加到知识库中的所有新 QnA 对。以下是一个非常简单的示例，其中仅包含一个稍后将被添加到知识库的\
  \ QnA 对：\n\n```\n> # QnA 定义\n### ? 这本书是谁写的？\n'''\nStephan Bisser 写了这本书，因为他热衷于一切与对话式\
  \ AI 相关的事物。\n'''\n```\n\n创建 `.qna` 文件后，您需要再次使用 Bot Framework CLI 中的 `convert` 命令，将\
  \ `.qna` 文件转换为 JSON 文件，然后该 JSON 文件可用于更新知识库。因此，您需要在终端中执行以下命令来将文件转换为 JSON：\n\n```\n\
  bf qnamaker:convert -i \".\\03_convAIBook-QnA_update.qna\" -o \".\\03_convAIBook-QnA_update.json\"\
  \n```\n\n此命令将创建一个名为 `03_convAIBook-QnA_update.json` 的新文件，其最终内容如下所示：\n\n```\n{\n\"\
  urls\": [],\n\"qnaList\": [\n{\n\"id\": 0,\n\"Antwort\": \"Stephan Bisser hat dieses\
  \ Buch geschrieben, weil er eine Leidenschaft für alles hat, was mit Conversational\
  \ AI zu tun hat\",\n\"Quelle\": \"Custom Editorial\",\n\"Fragen\": [\n\"Wer hat\
  \ dieses Buch geschrieben?\"\n],\n\"Metadaten\": []\n}\n],\n\"Dateien\": [],\n\"\
  Name\": \"\"\n}\n```\n\n但是，为了能够执行下一个更新知识库的命令，您需要手动修改该文件，使其看起来像下面这样：\n\n```\n{\n\"\
  urls\": [],\n\"add\":{\n\"qnaList\": [\n{\n\"id\": 0,\n\"Antwort\": \"Stephan Bisser\
  \ hat dieses Buch geschrieben, weil er eine Leidenschaft für alles hat, was mit\
  \ Conversational AI zu tun hat\",\n\"Quelle\": \"Redaktion\",\n\"Fragen\": [\n\"\
  Wer hat dieses Buch geschrieben?\"\n],\n\"Metadaten\": []\n}\n],\n\"Dateien\": [],\n\
  \"Name\": \"\"\n}\n}\n```\n\n在上面的 `03_convAIBook-QnA_update.json` 文件示例中，您可以看到 `qnaList`\
  \ 被包裹在一个 `add` 对象中，以指示这些 QnA 对将被添加到知识库中。您也可以使用 `delete` 来删除特定的 QnA 对，或使用 `update`\
  \ 来更新 QnA 对。此外，`qnaList` 对象的来源已从 `custom editorial` 更改为 `editorial` 作为默认来源，这是在创建新的知识库后进行的，如前所述，该来源名为\
  \ `editorial`。这确保了 QnA 对稍后会被添加到知识库中正确的来源下。完成这些更改后，下一步是执行以下命令来更新知识库。在终端中执行命令之前，请不要忘记输入您的知识库\
  \ ID 和 QnA Maker 订阅密钥：\n\n```\nbf qnamaker:kb:update --kbId \"yourQnAMakerKBId\"\
  \ --subscriptionKey \"yourQnAMakerSubscriptionKey\" --in \".\\03_convAIBook-QnA_update.json\"\
  \n```\n\n此命令的输出是关于所执行操作的信息，如图 3.40 所示。\n\n![](img/495919_1_De_3_Fig40_HTML.png)\n\
  \n图 3.40\n\n使用 Bot Framework CLI 01 填充知识库 – 操作状态\n\n要检查操作是否已完成，请在终端中执行以下命令：\n\n\
  ```\nbf qnamaker:operationdetails:get --operationId \"yourQnAMakerOperationId\"\
  \ --subscriptionKey \"yourQnAMakerSubscriptionKey\"\n```\n\n如果操作成功执行，输出的 `operationState`\
  \ 值应为 `Succeeded`，如图 3.41 所示。\n\n![](img/495919_1_De_3_Fig41_HTML.png)\n\n图 3.41\n\
  \n使用 Bot Framework CLI 02 填充知识库 – 检查操作状态\n\n现在，如果您返回到 QnA Maker 门户中的知识库，您应该会看到来自您的\
  \ `.qna` 文件的 QnA 对已添加到知识库的 `Editorial` 来源中，如图 3.42 所示。\n\n![](img/495919_1_De_3_Fig42_HTML.png)\n\
  \n图 3.42\n\n使用 Bot Framework CLI 03 填充知识库 – 新添加的 QnA 对\n\n### 向知识库添加 URL\n\n与手动向\
  \ QnA Maker 知识库添加 QnA 对不同，您可以让 QnA Maker 提取网站上已有的内容。因此，您无需手动或通过 CLI 输入数据，而是从 URL\
  \ 导入内容。为此，请在 QnA Maker 门户中打开您的知识库，并导航到 `设置` 页面。在 `管理知识库` 部分，您可以添加 URL，例如 [`docs.microsoft.com/en-us/azure/cognitive-services/QnAMaker/troubleshooting`](https://docs.microsoft.com/en-us/azure/cognitive-services/QnAMaker/troubleshooting)，如图\
  \ 3.43 所示。\n\n![](img/495919_1_De_3_Fig43_HTML.png)\n\n图 3.43\n\n向 QnA Maker 知识库\
  \ 01 添加 URL\n\n添加 URL 并单击 `保存并训练` 以启动提取过程后，网站的内容将很快被添加到您的知识库中。网站内的标题（基本上是 `<h[n]></h[n]>`\
  \ HTML 标签）将被提取并作为问题添加到您的知识库中，而段落（即 `<p></p>` HTML 标签）将被视为这些问题的答案，如图 3.44 所示。\n\n\
  ![](img/495919_1_De_3_Fig44_HTML.png)\n\n图 3.44\n\n向 QnA Maker 知识库 02 添加 URL – 对比（左侧为原始网站，右侧为知识库）\n\
  \n如果网站内容已更新，您也可以更新您的知识库。如果您需要更新从 URL 提取的知识库内容，您需要转到 QnA Maker 门户中知识库的设置页面，勾选 `刷新内容`\
  \ 复选框，然后点击 `保存并训练`，以启动所选 URL 的更新过程，如图 3.45 所示。\n\n![](img/495919_1_De_3_Fig45_HTML.png)\n\
  \n图 3.45\n\n向 QnA Maker 知识库 03 添加 URL – 更新从 URL 提取的内容\n\n**注意**\n\n当网站内容发生更改时，您添加到知识库的网站\
  \ URL 内容不会自动更新。要更新您的知识库，您需要手动触发更新，或通过 QnA Maker API 触发。\n\n\n\n### 将文件直接添加到知识库\n\
  \n您不仅可以向 QnA Maker 知识库添加 URL，还可以直接上传文件。如果您已经创建了不属于公开网站的常见问题解答文件，这将特别有用。表 3.2 列出了所有支持直接导入知识库的文件或数据类型。所有这些文件和文档类型都可用于填充您的知识库，而无需手动将\
  \ QnA 对直接插入到知识库中。但是，这些文件应以类似 FAQ 的风格构建。这意味着文件不应包含跨越多页的段落，而应构建成 QnA Maker 服务能够以合理的方式解析内容并提取\
  \ QnA 对。\n\n表 3.2\n\n**QnA Maker** 支持的文件类型（Microsoft，2020）\n\n| 源类型 | 内容类型 |\n|\
  \ --- | --- |\n| **PDF/Word (.pdf/.docx)** | 常见问题解答、产品手册、宣传册、论文、传单、支持指南、结构化问答等。\
  \ |\n| **Excel (.xlsx)** | 结构化 QnA 文件（包括 RTF 和 HTML 支持） |\n| **TXT/TSV (.txt/.tsv)**\
  \ | 结构化 QnA 文件 |\n\n注意\n\n有关 QnA Maker 中每种支持数据类型的详细示例，请参阅 [`docs.microsoft.com/en-us/azure/cognitive-services/qnamaker/concepts/content-types`](https://docs.microsoft.com/en-us/azure/cognitive-services/qnamaker/concepts/content-types)。\n\
  \n以您可以从 [`bit.ly/ConvAIBook-structured-qna`](http://bit.ly/ConvAIBook-structured-qna)\
  \ 下载的 Word 文件为例。这个 Word 文件主要包含多个一级标题，其后跟着段落。标题主要以问题的形式提出，而段落则是对这些问题的相应回答。\n\n要从您的计算机向知识库添加文件，请转到知识库中的“设置”页面，然后在“管理知识库”部分下选择“+\
  \ 添加文件”，如图 3.46 所示。点击该按钮后，将打开一个上传对话框，您可以在其中选择正确的文件并将其上传到您的知识库。\n\n![](img/495919_1_De_3_Fig46_HTML.png)\n\
  \n图 3.46\n\n向 QnA Maker 知识库 01 添加文件\n\n上传文件后，您需要重新保存并训练您的知识库，以便 QnA Maker 服务能够提取文件内容。当您返回知识库的“编辑”页面时，您会看到它包含了上传文件中的所有\
  \ QnA 对，如图 3.47 所示。\n\n![](img/495919_1_De_3_Fig47_HTML.png)\n\n图 3.47\n\n向 QnA\
  \ Maker 知识库 02 添加文件\n\n### 测试知识库\n\n使用 QnA Maker 门户的一个优点是它提供了测试功能。当您用新的 QnA 对更新知识库时，这非常有用，应该加以利用。测试知识库对于您的对话应用程序的成功至关重要，因为您可以在用户遇到问题之前，发现并修复知识库中的低置信度或错误查询结果。\n\
  \n要测试知识库，请转到 QnA Maker 门户中的知识库，然后选择右上角的 *“← 测试”* 按钮。这将显示交互式测试窗口，您可以在其中输入您认为用户可能会提出的示例查询。请记住使用与知识库中存储的数据不同的查询数据，因为用户可能不会总是使用与知识库中存储的问题完全相同的措辞。例如，在您的知识库中，您可能有这样一个问题：“这本书是关于什么的？”\
  \ 为了测试这个问题，您应该考虑另一种措辞，例如“这本书讲的是什么？”。现在，您可以使用测试字段并输入这个措辞，看看答案是否正确。如图 3.48 所示，服务返回的答案并不完全是您期望的，因为它用书的标题来回答，而不是内容。从该图中您还可以看到，置信度值相当低，为\
  \ 49.85%，因此这个问题还需要改进。\n\n![](img/495919_1_De_3_Fig48_HTML.png)\n\n图 3.48\n\n测试 QnA\
  \ Maker 知识库 01\n\n另一个可以用来测试同一问题的例子是“这本书的精髓是什么？” 当您在测试字段中输入这个问题时，您应该会看到服务用关于书的内容的正确答案来回答，尽管置信度率仍然较低，为\
  \ 68.69%，如图 3.49 所示。\n\n![](img/495919_1_De_3_Fig49_HTML.png)\n\n图 3.49\n\n测试 QnA\
  \ Maker 知识库 02\n\n为了解决这两个问题，您现在可以将“这本书是关于什么的？”和“这本书的精髓是什么？”作为问题“这本书讲的是什么？”的替代措辞添加进去，以告知服务这类问题涉及的是书的内容主题，而不是标题。在您保存并训练知识库后，您可以进行重新测试，例如使用查询“这本出版物的精髓是什么？”，您会发现答案被正确返回，并且置信度值也达到了可接受的\
  \ 94.17%，尽管该查询并非某个 QnA 对的确切组成部分，而是措辞略有不同，如图 3.50 所示。\n\n![](img/495919_1_De_3_Fig50_HTML.png)\n\
  \n图 3.50\n\n测试 QnA Maker 知识库 03\n\n注意\n\n测试知识库是一个必要的过程，应该全面进行，以纠正低置信度值并发现错误的查询结果。\n\
  \n\n\n### 发布知识库\n\n在用户能够通过对话式应用程序（如聊天机器人）访问知识库内容之前，知识库生命周期的最后一步就是发布。发布知识库主要包含两件事：要发布知识库，请进入\
  \ QnA Maker 门户中的“发布”页面，然后点击“发布”按钮，如图 3.51 所示。\n\n![](img/495919_1_De_3_Fig51_HTML.png)\n\
  \n图 3.51\n\n发布 QnA Maker 知识库 01\n\n*   知识库的最新版本将存储在 Azure 搜索服务内的一个专用索引中。\n*   将提供一个可由您的对话式应用程序调用的终结点。\n\
  \n知识库发布后，您将看到所有终结点详细信息，稍后在从聊天机器人等处调用 QnA Maker 服务时会用到这些信息，如图 3.52 所示：\n\n![](img/495919_1_De_3_Fig52_HTML.png)\n\
  \n图 3.52\n\n发布 QnA Maker 知识库 02\n\n当然，如果您不想通过 QnA Maker 门户发布知识库，或者希望将来能自动化发布流程，也可以使用\
  \ Bot Framework CLI，在终端会话中执行以下命令来发布您的知识库：\n\n```\nbf qnamaker:kb:publish --kbId\
  \ \"yourQnAMakerKBId\" --subscriptionKey \"yourQnAMakerSubscriptionKey\"\n```\n\n\
  *   **知识库 ID**：您的知识库 ID 包含在 POST 请求的示例 URL 中，位于 `/knowledgebases/` 之后，用于识别正确的知识库。\n\
  *   **主机**：主机是您在查询知识库时，需要从对话式应用程序调用的终结点。\n*   **授权**：`EndpointKey` 用于对发往您知识库的请求进行授权，以防止未经授权的应用程序访问您知识库的内容。\n\
  \n## 文本分析\n\n语言类别中另一个常用于对话式应用程序的服务是文本分析 API。该服务主要涵盖以下四个用例：\n\n*   情感分析\n*   关键词提取\n\
  *   命名实体识别\n*   语言检测\n\n在开发聊天机器人或其他对话式应用程序时，这些用例中的许多都大有裨益，因为它们增强了自然语言处理功能。由于这是一个即用型\
  \ API，因此无需调整此服务内的组件。因此，下一节将详细讨论所有四个用例，以解释其背后的概念；但实际实现将在后续章节中介绍。\n\n### 情感分析\n\n\
  想象一下，您正在构建一个集成到客户服务流程中的聊天机器人，作为处理用户请求的第一道关口。在许多情况下，您的聊天机器人能够回答有限数量的问题，通常是常见问题，但在其他情况下，您的聊天机器人可能无法充分回答特定的用户问题。这是一个关键点，因为当聊天机器人无法回答问题时，您不希望失去用户，因此您需要考虑某种人工转接。人工转接基本上描述了当聊天机器人无法再回答用户问题时，将对话从聊天机器人转交给能够帮助用户的人员的过程。然而，在此过程中，需要决定何时进行转接，因为每次聊天机器人无法回答特定问题时都进行转接并不合理。这基本上就是情感检测可以帮助您找到向人工转接的正确时机的最佳场景。\n\
  \n文本分析 API 中的情感分析功能会为给定的文本提供 0 到 1 之间的情感评分。此功能旨在为您提供关于用户情绪的知识，使您能够判断用户当前是积极还是消极情绪。一个简单的例子是句子“我对昨天在餐厅得到的优质服务非常满意，一定会再来的。”如果您使用这个例句调用文本分析\
  \ API 的情感分析功能，您将得到 0.90463 的情感评分，这意味着该句子相当积极，如图 3.53 所示。\n\n![](img/495919_1_De_3_Fig53_HTML.png)\n\
  \n图 3.53\n\n文本分析 API 情感分析功能 01 – 正面示例\n\n然而，如果您使用句子“我很惊讶昨天餐厅的服务真的很糟糕，所以我再也不会回来了”，并使用该句子调用文本分析\
  \ API，您会看到情感评分相当低，为 0.1873，如图 3.54 所示。这意味着在这种情况下，该句子偏向负面。\n\n![](img/495919_1_De_3_Fig54_HTML.png)\n\
  \n图 3.54\n\n文本分析 API 情感分析功能 02 – 负面示例\n\n利用文本分析 API 的情感分析功能，您可以轻松检测用户的情绪，并在用户情绪消极时，决定聊天机器人是否应将对话直接转接给人工。这可以对用户的情况产生积极影响，因为它在一定程度上创造了一个降级场景，因为人工可能更有效地回答用户的问题。这反过来又会促使用户可能再次光顾，从而对您的服务产品产生积极影响。\n\
  \n\n\n### 关键词提取\n\n关键词提取是文本分析 API 中的另一项功能，可为您的对话应用程序带来一些优势。继续以之前提到的集成到客服解决方案中的聊天机器人为例，想象一下用户向您的聊天机器人发送相当长的消息，例如：“我昨天对餐厅里周到的服务非常满意，绝对会再来的。不过，我不太喜欢汤几乎是凉的，而主菜又烫得没法吃。但冰淇淋甜点非常完美！”这条消息相当长，因此聊天机器人需要分析的不仅仅是一个句子，而是多个句子。这可能是一项艰巨的任务，尤其是在需要转接给人工客服的情况下，因为可能涉及多个专家。\n\
  \n因此，识别用户请求中特定关键短语的能力，有助于识别句子中的重要部分，然后采取相应的行动。例如，在图 3.55 中，您可以看到上述示例句子的结果。文本分析的关键短语提取\
  \ API 识别出了该句子中的以下关键短语：在这些关键词中，您可以看到例如“周到的服务”被提取出来。由此可以推断，发送此消息的人可能想提供反馈，表明服务周到，餐厅体验令人愉快。\n\
  \n![](img/495919_1_De_3_Fig55_HTML.png)\n\n图 3.55\n\n文本分析 API 关键短语提取功能 01\n\n* 主菜\n\
  * 汤\n* 冰淇淋甜点\n* 周到的服务\n* 餐厅\n* 事实\n\n在这些关键词中，您可以看到例如“周到的服务”被提取出来。由此可以推断，发送此消息的人可能想提供反馈，表明服务周到，餐厅体验令人愉快。\n\
  \n通过结合关键词提取功能和情感分析服务，聊天机器人中的人工转接功能可以得到极大改善。原因是，您可以首先检测用户输入的情感，以判断用户当前情绪是好是坏。根据此结果，如果情感分数为正面，您可以允许聊天机器人结束对话；如果情感分数为负面，则将对话转接给客服人员。然后，如果您从用户的消息中提取关键短语，并将其预览提供给客服人员，客服人员就能比阅读完整聊天记录更快地了解大致主题。这样，客服人员就能更快地接管对话，并及时为用户提供帮助。\n\
  \n### 命名实体识别\n\n命名实体识别接收非结构化文本，并返回 API 识别出的实体。这些实体可以是人名、地点、事件、产品或已知的组织。例如，句子“我在西雅图太空针塔旁边遇到比尔·盖茨的那家餐厅真的很棒！”如图\
  \ 3.56 所示，识别出了“太空针塔”、“西雅图”和“比尔·盖茨”这些词，并且 API 甚至为识别出的实体标记了相应的类别，如地点或人物。\n\n![](img/495919_1_De_3_Fig56_HTML.png)\n\
  \n图 3.56\n\n文本分析 API 命名实体识别功能示例\n\n此 API 中的另一个功能是实体链接服务。它本质上描述了在给定文本中识别特定实体及其身份的能力。这些识别出的实体基本上来自一个知识库，该知识库存储了所有这些单词或短语，以及描述它们的维基百科文章链接。例如，实体链接功能可以识别给定句子中的单词“Nike”，并区分它指的是运动品牌、希腊女神还是美国陆军的火箭项目。图\
  \ 3.57 展示了从句子“Nike 的 T 恤真的很舒服，我喜欢穿它。”中识别出的输出示例。\n\n![](img/495919_1_De_3_Fig57_HTML.png)\n\
  \n图 3.57\n\n文本分析 API 命名实体识别功能 – 实体链接示例\n\n### 语言检测\n\n文本分析 API 中的第四个组件是语言检测功能。此服务接收非结构化文本作为输入，并返回给定文本的检测语言。例如，当您为在线商店创建一个聊天机器人，并预期会有来自世界各地的访客时，这会很有帮助。在这种情况下，在将输入文本传递给\
  \ LUIS 或 QnA Maker 知识库之前，先检测用户在对话中的语言是有益的，因为如果使用英文知识库来查询中文用户的问题，可能无法得到正确的答案。因此，可以使用此\
  \ API 端点来检测一个或多个句子的语言，如图 3.58 所示，其中输入包含以下两个句子：\n\n![](img/495919_1_De_3_Fig58_HTML.png)\n\
  \n图 3.58\n\n文本分析 API 语言检测示例\n\n* “我在西雅图太空针塔旁边遇到比尔·盖茨的那家餐厅真的很棒！” – 英语\n* “我在西雅图太空针塔旁边遇到比尔·盖茨的那家餐厅真是棒极了！”\
  \ – 德语\n\n## 翻译器\n\n如第 1 章所述，翻译是聊天机器人应用场景中的一个基本组件，因为它简化了数据管理流程。通过在您的聊天机器人解决方案中引入翻译功能，您无需为每种语言单独创建知识库、语言模型和其他重要服务，因为您基本上可以将所有“后端”组件保持在一两种语言中，并在进一步处理之前，将任何其他语言的输入翻译成这些语言之一。Azure\
  \ 认知服务中的翻译器服务提供了以下可在对话应用程序场景中使用的功能：\n\n* 翻译文本。\n* 音译文本。\n* 检测语言。\n* 查询单词翻译。\n* 确定句子长度。\n\
  \n\n\n### 翻译\n\n最常用的功能自然是“文本翻译”功能。通过此功能，您可以将句子从一种语言翻译成超过 70 种语言。使用翻译功能相当简单。由于它是一个\
  \ API，在最简单的情况下，您只需创建一个`HTTP-POST`请求，提供您的 Azure 订阅密钥以访问 Translator 资源，选择要将文本翻译成的语言，并添加要翻译的文本，如下面的`curl`请求所示：\n\
  \n```\ncurl -X POST \"https://api.cognitive.microsofttranslator.com/translate?api-version=3.0&\
  \ from=en& to=de\" -H \"Ocp-Apim-Subscription-Key: yourTranslatorKey\" -H \"Content-Type:\
  \ application/json; charset=UTF-8\" -d \"[{'Text':'Hallo, wie ist Ihr Name?'}]\"\
  \n```\n\n结果是将指定文本翻译成您所选语言，如下所示：\n\n```\n[{\n\"Übersetzungen\":[\n{\n\"text\": \"\
  Hallo, wie heißt du?\",\n\"bis\": \"de\"\n}\n]\n}]\n```\n\n此外，您还可以通过将所有语言添加到 HTTP\
  \ 请求中，同时将文本翻译成多种语言，如下例所示：\n\n```\ncurl -X POST \"https://api.cognitive.microsofttranslator.com/translate?api-version=3.0&\
  \ from=en& to=de&to=it&to=ja&to=th\" -H \"Ocp-Apim-Subscription-Key: yourTranslatorKey\"\
  \ -H \"Content-Type: application/json; charset=UTF-8\" -d \"[{'Text':Hi how are\
  \ you?'}]\"\n```\n\n作为结果，您将收到所有选定语言的翻译句子：\n\n```\n[{\n\"Übersetzungen\": [\n{\n\"\
  text\": \"Hallo, wie geht es dir?\",\n\"bis\": \"de\"\n},\n{\n\"text\": \"Ciao come\
  \ stai?\",\n\"zu\": \"es\"\n},\n{\n\"text\": \"やあ、元気。\",\n\"bis\": \"ja\"\n},\n\
  {\n\"text\": \"ไง เธอเป็นไงบ้าง\",\n\"bis\": \"th\"\n}\n]\n}]\n```\n\n翻译功能在您需要构建多语言聊天机器人，但不想为每种支持的语言都构建\
  \ LUIS 应用程序或 QnA Maker 知识库的场景中非常有用。在这种情况下，您可以选择主要语言，并专门为这些最常用的语言开发语言模型和知识库，然后将其他语言的用户消息翻译成这些语言之一，从而以最小的投入获得最佳效果。\n\
  \n**注意**：有关 Translator API 的详细语言支持，请访问 [`docs.microsoft.com/en-us/azure/cognitive-services/translator/language-support`](https://docs.microsoft.com/en-us/azure/cognitive-services/translator/language-support)。\n\
  \n### 语言检测\n\n在构建多语言聊天机器人时，在应用自然语言处理功能（如语言理解或关键短语提取）之前，检测用户语言的能力至关重要。因此，Translator\
  \ API 提供了检测特定句子语言的功能。这在您拥有多个 LUIS 应用程序和 QnA Maker 知识库（支持多种语言）且需要确定特定用户输入应使用哪种语言的场景中非常有用。在这种情况下，您可以使用“语言检测”功能首先确定用户输入的正确语言，然后查询\
  \ LUIS 或 QnA Maker 以相应地处理用户输入。以下 HTTP 请求演示了使用此功能的一个非常简单的示例，输入句子为“In welcher Sprache\
  \ ist dieser Text geschrieben?”\n\n```\ncurl -X POST \"https://api.cognitive.microsofttranslator.com/detect?api-version=3.0\"\
  \ -H \"Ocp-Apim-Subscription-Key: yourTranslatorKey\" -H \"Content-Type: application/json\"\
  \ -d \"[{'Text':'In welcher Sprache ist dieser Text geschrieben?'}]\"\n```\n\n上述`HTTP\
  \ POST`调用的结果是，英语被检测为前述句子的语言。同时，菲律宾语和爱尔兰语也被识别为备选语言：\n\n```\n[{\n\"Sprache\": \"en\"\
  ,\n\"Punktzahl: 1.0,\n\"isTranslationSupported\":true,\n\"isTransliterationSupported\"\
  :false,\n\"Alternativen\":\n[\n{\n\"Sprache\": \"fil\",\n\"Punktzahl: 1.0,\n\"isTranslationSupported\"\
  :true,\n\"isTransliterationSupported\":false\n},\n{\n\"Sprache\": \"ga\",\n\"Punktzahl:\
  \ 1.0,\n\"isTranslationSupported\":true,\n\"isTransliterationSupported\":false\n\
  }\n]\n}]\n```\n\n\n\n### 在词典中查询\n\n在某些场景下，获取特定单词或短语的替代翻译会很有帮助。`Translator` 提供了一项功能，可以获取这些替代翻译及其应用示例。例如，将单词“Schlüssel”从英语翻译成德语。如果像本例这样使用词典查询，您将从\
  \ API 获得所有可能的翻译，从而可以选择在当前语境下最合适的翻译：\n\n```\ncurl -X POST \"https://api.cognitive.microsofttranslator.com/dictionary/lookup?api-version=3.0&from=en&to=es\"\
  \ -H \"Ocp-Apim-Subscription-Key: yourTranslatorKey\" -H \"Content-Type: application/json\"\
  \ -d \"[{'Text':'key'}]\"\n```\n\n上述示例请求的结果如下：\n\n```\n[\n{\n\"normalisierteQuelle\"\
  : \"Schlüssel\",\n\"displaySource\": \"Schlüssel\",\n\"Übersetzungen\": [\n{\n\"\
  normalizedTarget\": \"Geschmack\",\n\"displayTarget\": \"Geschmack\",\n\"posTag\"\
  : \"NOUN\",\n\"Vertrauen\": 0.7575,\n\"PräfixWort\": \"\",\n\"backTranslations\"\
  : [\n{\n\"normalizedText\": \"Schlüssel\",\n\"displayText\": \"Schlüssel\",\n\"\
  numExamples\": 0,\n\"frequencyCount\": 9393\n}\n]\n},\n{\n\"normalizedTarget\":\
  \ \"wichtigste\",\n\"displayTarget\": \"wichtigste\",\n\"posTag\": \"ADJ\",\n\"\
  Vertrauen\": 0.1358,\n\"PräfixWort\": \"\",\n\"backTranslations\": [\n{\n\"normalizedText\"\
  : \"Schlüssel\",\n\"displayText\": \"Schlüssel\",\n\"numExamples\": 0,\n\"frequencyCount\"\
  : 1684\n}\n]\n},\n{\n\"normalizedTarget\": \"eingeben\",\n\"displayTarget\": \"\
  eingeben\",\n\"posTag\": \"VERB\",\n\"Vertrauen\": 0.0612,\n\"PräfixWort\": \"\"\
  ,\n\"backTranslations\": [\n{\n\"normalizedText\": \"eingeben\",\n\"displayText\"\
  : \"eingeben\",\n\"numExamples\": 0,\n\"frequencyCount\": 13370\n},\n{\n\"normalizedText\"\
  : \"Schlüssel\",\n\"displayText\": \"Schlüssel\",\n\"numExamples\": 0,\n\"HäufigkeitZahl\"\
  : 759\n},\n{\n\"normalizedText\": \"Eingabe\",\n\"displayText\": \"Eingabe\",\n\"\
  numExamples\": 0,\n\"HäufigkeitZahl\": 732\n}\n]\n},\n{\n\"normalizedTarget\": \"\
  tonart\",\n\"displayTarget\": \"tonart\",\n\"posTag\": \"NOUN\",\n\"Vertrauen\"\
  : 0.0455,\n\"PräfixWort\": \"\",\n\"backTranslations\": [\n{\n\"normalizedText\"\
  : \"Schlüssel\",\n\"displayText\": \"Schlüssel\",\n\"numExamples\": 1,\n\"HäufigkeitZahl\"\
  : 564\n}\n]\n}\n]\n}\n]\n```\n\n现在，对于这些单词中的每一个，您都可以使用 `Translator` 获取词典示例。此功能说明了这些翻译在语境中如何使用，以便您能更好地理解哪个翻译最合适。要获取词典示例，如果您想检索包含德语单词\
  \ *„wichtigste“* 的例句（该词在英语中翻译为“most important”），可以使用以下 HTTP 请求：\n\n```\ncurl -X\
  \ POST \"https://api.cognitive.microsofttranslator.com/dictionary/examples?api-version=3.0&from=en&to=de\"\
  \ -H \"Ocp-Apim-Subscription-Key: yourTranslatorKey\" -H \"Content-Type: application/json\"\
  \ -d \"[{'Text':'key', 'Translation':'wichtigste'}]\"\n```\n\n上述 HTTP 调用的结果是单词“wichtigste”的以下例句，每个例句都有不同的含义或语境：\n\
  \n```\n[\n{\n\"normalisierteQuelle\": \"Schlüssel\",\n\"normalizedTarget\": \"wichtigste\"\
  ,\n\"Beispiele\": [\n{\n\"sourcePrefix\": \"Die \",\n\"sourceTerm\": \"Schlüssel\"\
  ,\n\"sourceSuffix\": \"Problem in diesem Stadium ist die ...\",\n\"targetPrefix\"\
  : \"Das\",\n\"targetTerm\": \"wichtigste\",\n\"targetSuffix\": \" Problem zum jetzigen\
  \ Zeitpunkt ist die ...\"\n},\n{\n\"sourcePrefix\": \"Die \",\n\"sourceTerm\": \"\
  Schlüssel\",\n\"sourceSuffix\": \"Der Grundsatz der Strategie lautet: Vorbeugen\
  \ ist besser ...\",\n\"targetPrefix\": \"Der\",\n\"targetTerm\": \"wichtigste\"\
  ,\n\"targetSuffix\": \" Grundsatz der Strategie lautet: \\\"Vorbeugen ist besser\
  \ ...\"\n},\n{\n\"sourcePrefix\": \"Die \",\n\"sourceTerm\": \"Schlüssel\",\n\"\
  sourceSuffix\": \" Aktion für 2007 ist ...\",\n\"targetPrefix\": \"\",\n\"targetTerm\"\
  : \"Wichtigste\",\n\"targetSuffix\": \" Maßnahme im Jahr 2007 wird ...\"\n},\n...\n\
  ]\n}\n]\n```\n\n### 确定句子长度\n\n此外，`Translator-API` 还提供了确定特定句子长度以及检测句子边界的功能。当您面对长文本，并希望在使用\
  \ `文本分析 API` 的关键短语提取功能来获取特定关键短语之前，将其拆分成更小的部分时，这会非常有用。以下面这段文本为例：“Ich war gestern\
  \ sehr zufrieden mit dem netten Service in dem Restaurant und würde auf jeden Fall\
  \ wiederkommen. Allerdings hat es mir nicht gefallen, dass die Suppe fast kalt war,\
  \ während das Hauptgericht zu heiß war, um es zu essen. Aber das Eisdessert war\
  \ perfekt!”。您可以使用 `Translator-API` 通过以下 HTTP 请求以编程方式确定句子边界：\n\n```\ncurl -X POST\
  \ \"https://api.cognitive.microsofttranslator.com/breaksentence?api-version=3.0\"\
  \ -H \"Ocp-Apim-Subscription-Key: yourTranslatorKey\" -H \"Content-Type: application/json\"\
  \ -d \"[{'Text':'Ich war gestern sehr zufrieden mit dem netten Service im Restaurant\
  \ und würde auf jeden Fall wiederkommen. Allerdings hat es mir nicht gefallen, dass\
  \ die Suppe fast kalt war, während das Hauptgericht zu heiß zum Essen war. Aber\
  \ das Eisdessert war perfekt!'}]\"\n```\n\n上述命令将产生以下响应，其中句子边界由给定输入文本中的字符位置确定：\n\n\
  ```\n[{\"detectedLanguage\":{\"language\":\"en\",\"score\":1.0},\"sentLen\":[105,106,38]}]\n\
  ```\n\n现在，这些结果值可用于将文本拆分成更小的片段，并将每个片段传递给 `文本分析 API`，例如，从每个句子中单独提取关键短语。\n\n## 在聊天机器人中组合认知服务的最佳实践\n\
  \n由于您已经单独了解了对话应用场景中最常用的 `Azure Cognitive Services`，下一节将介绍组合其中一些服务的最佳实践。如前所述，这些 `Cognitive\
  \ Services` 中的每一个基本上都是作为 API 提供的，可以由应用程序（无论是聊天机器人还是其他解决方案）调用；但由于本书的重点是对话应用程序，因此以下场景将仅涵盖对话应用程序。\n\
  \n\n\n### LUIS 和 QnA Maker\n\n在创建您的第一个聊天机器人时，最好从一个相对简单的用例开始。将 `QnA Maker` 集成到您的聊天机器人中就是这样一个场景，因为您可以基于\
  \ `QnA Maker` 知识库快速构建一个聊天机器人。然而，`QnA` 当然不是复杂的聊天机器人解决方案中唯一使用的场景。因此，当您需要在聊天机器人中涵盖\
  \ `QnA` 和基于任务的应用场景时，`LUIS` 是完美的组件。在这种情况下，正确设计您的自然语言处理架构至关重要。实现这一目标的最佳方法是创建一个所谓的\
  \ `Dispatch`-`LUIS` 模型，如图 3.59 所示。\n\n![](img/495919_1_De_3_Fig59_HTML.png)\n\n\
  图 3.59\n\n`LUIS` 和 `QnA Maker` 参考架构\n\n这种架构的概念是创建一个顶层 `LUIS` 应用程序，它作为所有底层 `LUIS`\
  \ 应用程序以及 `QnA Maker` 知识库的 `Dispatch` 模型。当您的聊天机器人收到新的用户请求时，此 `Dispatch` 应用程序用于确定最合适的路由。`Dispatch`\
  \ 模型基本上充当所有 `LUIS` 模型和知识库之间的路由器。`Dispatch` 模型基本上为每个 `LUIS` 应用程序和知识库包含一个意图。当使用一个表述查询\
  \ `Dispatch` 模型时，`Dispatch` 应用程序能够识别匹配的意图，然后您可以使用该意图将您的请求路由到正确的 `LUIS` 应用程序或 `QnA\
  \ Maker` 知识库，具体取决于该表述是存储在您的某个 `KB` 中，还是与您的 `LUIS` 应用程序的某个意图相匹配。\n\n**注意**\n\n要创建这样一个\
  \ `Dispatch` 模型，您需要使用 `Dispatch CLI` 工具，该工具尚不属于 `Bot Framework CLI`，但可以从 [`aka.ms/bot-dispatch`](http://aka.ms/bot-dispatch)\
  \ 下载。\n\n上面在图 3.59 中概述的示例，是您在为一个有多个团队参与的大型组织构建聊天机器人时可能会遇到的情况。在这种情况下，创建一个涵盖所有可能用例的单一\
  \ `LUIS` 应用程序并不总是最佳方法。因此，您可以将您的语言理解模型拆分为多个部分，这使不同团队能够独立处理不同的 `LUIS` 应用程序，而不会影响语言模型的其他部分。\n\
  \n### QnA Maker + 翻译器\n\n构建多语言聊天机器人的另一个最佳实践是使用本章前面描述的 `Translator` API 以及 `QnA Maker`。这在您为旨在面向跨国场景的聊天机器人构建大型知识库时可能非常有益。在这种情况下，您基本上有三种选择：\n\
  \n1.  为聊天机器人要支持的每种语言创建 `QnA Maker` 知识库。\n2.  为主要语言创建 `QnA Maker` 知识库，并对所有其他语言使用\
  \ `Translator` API。\n3.  为聊天机器人的主要语言创建一个 `QnA Maker` 知识库，并对所有其他语言使用翻译器 API。\n\n\
  第一种选择当然是最耗时的，因为这意味着您需要为您想要支持的每种语言构建一个知识库。现在，如果您正在开发一个旨在支持来自世界各地用户的聊天机器人或对话应用程序，您需要构建大量的知识库，然后聊天机器人会连接到这些知识库。在许多情况下，这种实现的工作量太高了，因此很少选择这种方案。\n\
  \n与第一种相比，第二种方案的实现工作量稍小，因为您不需要为每一种语言都构建一个 `KB`，而只需为优先级高的语言构建。当您希望特别针对某些国家，但又不想屏蔽特定语言时，这种方案是最佳选择。在这种情况下，您可以决定哪些语言不应自动翻译，而应由手动构建的知识库来服务。这些语言的用户请求将由针对该特定语言手动构建的知识库来回答，这在大多数情况下会带来更好的结果。\n\
  \n### LUIS + 文本分析\n\n在许多面向客户的聊天机器人示例中，使用 `LUIS` 来识别用户的意图并启动对话中的特定例程或对话。如图 3.59 所示的示例，用户和聊天机器人之间的对话中可能有许多路径，例如获取天气信息或管理餐厅预订。在大多数场景中，仅使用\
  \ `LUIS` 可能就足够了，因为它能识别用户的意图并采取相应行动。但特别是在用户感到沮丧或生气的情况下，识别用户的情绪并据此决定聊天机器人是继续对话还是转接给人工客服，可能是一个不错的选择。\n\
  \n因此，将 `文本分析` API 和 `LUIS` 集成在一起以涵盖这些场景可能是一个好方案。如图 3.60 所示，如果对话沿着“愉快路径”进行，聊天机器人可以继续对话并处理用户的请求。相反，在“关键路径”的示例中，当聊天机器人检测到用户消息中的负面情绪分数时，最好将对话转接给人工客服。\n\
  \n![](img/495919_1_De_3_Fig60_HTML.png)\n\n图 3.60\n\n`LUIS` 和文本分析的实践示例\n\n\n\n##\
  \ 总结\n\n在本章中，您了解了对话式应用程序（如聊天机器人）中使用的最重要的 Azure 认知服务。首先，我们探讨了语言类别中的各种服务，例如 `LUIS`、`QnA\
  \ Maker`、`Text Analytics` 和 `Translator`。这些服务最适合用户通过书面文本与聊天机器人进行交互的场景。此外，我们还学习了如何使用基于\
  \ Web 的门户和 `Bot Framework CLI` 创建新的语言理解应用程序，以及如何通过 `QnA Maker` 门户和 `CLI` 设置并填充 `QnA\
  \ Maker` 知识库。本章的最后部分介绍了一些最佳实践，涉及在构建复杂的聊天机器人解决方案时如何组合多个 Azure 认知服务，例如多语言场景或集成多个 `LUIS`\
  \ 应用程序和 `QnA Maker` `KBs` 的能力。\n\n下一章将引导您了解开发聊天机器人时应考虑的主要设计原则和指南。此外，还将涵盖对话流程的概念、用户体验的想法以及用于开发卓越聊天机器人解决方案的视觉元素。\n\
  \n"
- "# 4. 聊天机器人的设计原则\n\n机器人的整体设计是聊天机器人成功的最重要因素。作为开发人员，您的目标是开发用户愿意使用的聊天机器人。因此，您需要考虑如何让用户在使用您的聊天机器人而非其他\
  \ Web 应用程序或解决方案时获得优势。为了让用户真正使用您的聊天机器人，机器人必须以最快且最简单的方式解决用户的需求，并且这种方式要优于其他解决方案。一个例子是在餐厅预订餐桌的用例。“传统”方法如下：在这种情况下，您的目标必须是简化这一过程，例如实现一个聊天机器人用例，用户只需执行以下步骤：\n\
  \n1. 在智能手机应用或网站上打开聊天机器人。\n2. 输入句子：“我想在西雅图的一家意大利餐厅预订周日晚上 6 点、2 位客人的餐桌。”\n3. 从可用餐厅列表中选择并确认预订。\n\
  \n在前面的示例中，您可以看到使用聊天机器人的预订过程比在应用或网站上的常规方法要简单得多，也省时得多。因此，用户更可能使用您的聊天机器人而非应用或网站，因为他们可以节省时间，同时仍能获得预期的结果。要创建一个成功的聊天机器人，有许多事情需要考虑；因此，本章将涵盖开发成功聊天机器人的所有重要方面。\n\
  \n1. 打开智能手机应用或网页浏览器，导航到可以预订餐厅餐桌的网站。\n2. 输入所需城市或餐厅。\n3. 输入餐厅类型（例如，意大利菜、墨西哥菜、快餐等）。\n\
  4. 输入客人数量。\n5. 输入时间。\n6. 从可用餐厅列表中选择并确认预订。\n\n在这种情况下，您的目标必须是简化这一过程，例如实现一个聊天机器人用例，用户只需执行以下步骤：\n\
  \n## 个性与品牌塑造\n\n机器人成功的关键首先在于其个性。如果您的机器人拥有独特的个性，用户可能会更愿意与您的机器人进行对话，因为这会使整个聊天体验更加人性化和自然。因此，您应该为聊天机器人打造一个品牌。通常，您的品牌应包含以下主要特征，以使其脱颖而出：\n\
  \n- **名称**：不要将您的机器人命名为“聊天机器人 XYZ”，而是给它起一个合适的名字，以便用户能够与您的机器人建立联系。\n- **标语**：为您的机器人提供一个简短的标语或介绍语，让人们清楚您的机器人能做什么。\n\
  - **形象**：向人们展示您的机器人的外观，无论是类似机器人的图像还是人类的插图，以便人们看到他们正在与谁交谈。\n\n您的聊天机器人本质上代表了您个人或公司在用户面前的形象，因此您必须确保机器人的个性能够反映您的核心价值观。想象一下，您正在为一家银行机构构建聊天机器人，该银行所有在柜台服务客户的员工都穿着西装打领带。在这种情况下，聊天机器人应该与银行的态度保持一致，即礼貌待客并尊重客户。因此，开发一个以幽默风格说话并针对年轻一代的机器人是不合理的，因为在许多情况下，年轻人并非银行的主要目标群体。更合理的做法是让聊天机器人的个性和语言与使用该机器人的公司整体形象保持一致。相反，如果您正在为一家专注于销售生活方式产品的年轻初创公司开发聊天机器人，那么幽默的个性就非常合适，因为该公司也希望以这种方式向用户或客户展示自己。\n\
  \n\n\n### 开发聊天机器人之前\n\n在开发聊天机器人之前，您应专注于塑造或至少勾勒出机器人的个性，使其符合预期的应用场景，尤其是要契合其目标受众。在许多情况下，这并非开发者能独立完成的任务，而是需要了解目标受众的业务人员参与，他们能够清晰地描绘出聊天机器人的个性。当然，这个过程在大多数情况下涉及角色定义和关键用户分析，因此这绝非仅由开发者完成的任务。您必须始终牢记，您的聊天机器人是您公司或服务的另一个虚拟代表。因此，它应与您公司或产品的整体形象紧密契合。\n\
  \n通常，人们更倾向于聊天机器人做出人性化而非机械化的回应。因此，密切关注您的目标受众至关重要。例如，如果目标受众是 Z 世代，聊天机器人自然可以使用该世代在与同龄人聊天时习惯的表情符号和内容来回应。相反，如果您的目标受众是婴儿潮一代，那么您的聊天机器人就应该使用这一代人习惯的语言。研究这一点的一个合适方法是使用所谓的“个性卡片”，这些卡片基本上描述了聊天机器人在不同情境下的个性。\n\
  \n**注意：** 此处的首要目标是确保聊天机器人的个性在整个对话过程中保持一致，并且可以由最终用户进行调整。\n\n## 问候与介绍\n\n聊天机器人的一个重要部分是它如何向用户介绍自己。这自然应与聊天机器人的整体个性或品牌形象保持一致，以提供统一的聊天机器人体验。例如，如果您正在开发一个具有友好个性的聊天机器人，您应尝试在对话一开始就表达出这种友好。反之，如果您的机器人应更正式，那么问候语或开场白就应以此为导向。\n\
  \n此外，您必须记住，留下积极印象的机会只有一次。如果用户喜欢聊天机器人的介绍和问候，他们就更有可能继续与它对话。这样，他们就更有可能使用通过机器人提供的服务，或访问您的网站以获取有关您产品的更多信息。因此，由于第一印象至关重要，您必须确保问候语能给用户留下积极印象。如果做到了这一点，您的聊天机器人被实际使用的可能性就会大大增加。此外，您也更有可能通过聊天机器人来推广您的产品。\n\
  \n为了给您一个在对话的问候部分应避免什么的例子，图 4.1 展示了一个可能较差的问候场景。这里最重要的一点是，机器人没有首先问候用户。这显得有点不友好，因此您应始终尝试实现所谓的“主动问候”。这是一个概念，即用户在有机会说“你好”之前就首先被问候。其次，聊天机器人提出了一个相当开放的问题：“我能为您做什么？”这类问题通常会导致用户提问不精确，因为用户不能立即知道该问什么。因此，应避免这个糟糕问候的例子，因为它没有立即展示聊天机器人最重要的能力。因此，用户可能不知道该问什么，并很快关闭聊天。\n\
  \n![](img/495919_1_De_4_Fig1_HTML.png)\n\n*图 4.1 – 一个糟糕的聊天机器人问候示例*\n\n与糟糕的例子相反，图\
  \ 4.2 展示了一个处理问候的更好示例。在这个例子中，您可以看到机器人首先问候了用户，这相当礼貌。此外，机器人不仅问候了用户，还通过说明其核心能力和应用场景进行了自我介绍。这很有好处，因为用户直接被告知可以问机器人什么，或者机器人通常能做什么。此外，问候部分不仅包含文本，还包含一些用户可以直接点击的按钮。这些按钮充当对话中的一种导航辅助工具，引导用户完成对话。这有两个主要优点：首先，用户可以在对话中更快地移动，因为他们不必手动在聊天中输入每个句子。其次，机器人提出了对话或对话树中的可能路径，这限制了用户提问的可能性。这反过来又最大限度地减少了语言理解组件的问题，因为消息已通过按钮预定义。\n\
  \n![](img/495919_1_De_4_Fig2_HTML.png)\n\n*图 4.2 – 一个良好的聊天机器人问候示例*\n\n您还应该加入主动问候机制。这样，您的用户就能更好地了解聊天机器人。如图\
  \ 4.2 所示，机器人通过一张问候卡片向用户介绍自己。这张卡片基本上包含机器人的名称、图标，以及最重要的聊天机器人的动机。通过这种方式，机器人可以在用户需要提问之前，就向用户传达其优势。如本例所示，机器人还应给用户快速开始对话的机会，这通常通过按钮实现。这样，用户甚至无需在聊天中输入任何内容，而是可以点击按钮来启动对话中的特定对话流程。\n\
  \n问候是对话生命周期中至关重要的一部分，因为它对用户的反应起着决定性作用。请记住，第一印象永远重要。因此，如果机器人留下了良好的第一印象，用户就更愿意继续与机器人对话。这反过来又会提高您机器人的使用率，并最终可能带来更多满意的客户。因此，同样，您机器人的个性也很重要，它也应该在问候消息中体现出来。如果您的用户通过聊天机器人得到了热情且恰当的问候，他们就会使用这个聊天机器人。\n\
  \n\n\n### 导航（菜单）\n\n聊天机器人对话的另一个重要组成部分是对话导航。与应用程序或网站不同，聊天机器人没有汉堡菜单或导航栏，无法让用户跳转到对话中的特定位置。因此，您需要考虑如何引导用户完成对话。此外，还应考虑对误解或死胡同的管理。因此，整合一种由机器人告知用户的导航策略是一个好方法。例如，图\
  \ 4.3 展示了一个很好的方法，即通过让用户直接回复“帮助”来引导他们如何在对话中获得帮助。这样，用户在对话的第一条消息中就能看到这一点，并知道如果遇到不清楚的地方或不知道如何继续，只需输入“帮助”即可获得支持以继续对话。\n\
  \n![](img/495919_1_De_4_Fig3_HTML.png)\n\n**图 4.3**\n\n问候卡片导航引导示例\n\n然而，这并不是对话中唯一的选择，因为用户并不总能记住欢迎消息中的描述；因此，当您认为用户不确定如何继续对话时，也应尝试提供帮助。这本质上可以通过使用自然语言处理来实现，以识别用户何时对某事不确定。在这种情况下，聊天机器人应向用户提供某种形式的帮助。为了给您一个不应如何处理这种情况的例子，图\
  \ 4.4 勾勒了一个在实践中不应出现的对话序列。在这个例子中，用户可能会认为聊天机器人并非旨在满足用户需求，从而可能立即结束对话。\n\n![](img/495919_1_De_4_Fig4_HTML.png)\n\
  \n**图 4.4**\n\n糟糕的导航/帮助示例\n\n为了克服此类问题，图 4.5 勾勒了一个处理不确定用户的好方法示例。在此示例中，聊天机器人检测到用户不确定如何继续对话，这会触发聊天机器人语言理解组件中的一个意图，进而询问用户是想要预订餐桌还是需要一般帮助。由于用户希望获得关于聊天机器人任务的一般信息，因此会向用户发送一张卡片，描述聊天机器人具体能为用户做什么，并附带按钮形式的视觉元素，以引导用户进入对话的正确部分。\n\
  \n![](img/495919_1_De_4_Fig5_HTML.png)\n\n**图 4.5**\n\n良好的导航/帮助示例\n\n如前述示例所示，聊天机器人在不确定的情况下会以导航按钮的形式提供帮助，用户可以点击这些按钮来触发对话树中的特定对话。这样，对话就能流畅地继续，用户也会被引导到对话中的正确位置。\n\
  \n## 对话流程\n\n一个对话通常由多个对话组成，这些对话共同构成一个对话树。这样的对话树本质上是对聊天机器人用例的表示。在实践中，在开始实际开发或创建机器人之前，先对对话树进行建模是一个好方法。这样，您就可以以流程图或类似选项的形式在纸上勾勒出机器人的行为和例程，这些将作为后续开发阶段的对话设计稿。如第\
  \ 2 章所述，对话是聊天机器人的核心，因为它们是用户与机器人对话时直接提供的对话机制。在设计对话流程时，您还应考虑如何正确处理中断。由于用户可能在对话中途想要切换上下文，您也应考虑如何处理此类情况，并在中断处继续对话。\n\
  \n如图 4.6 所示，聊天机器人的对话树可以由许多不同的对话组成。每个对话框负责处理不同的用例或对话部分。在 Microsoft Bot Framework\
  \ 中，顶层对话框被称为 `RootDialog` 或 `MainDialog`。它本质上是用户与聊天机器人之间任何对话的起点。`RootDialog` 通常包含一个\
  \ LUIS 识别器，负责确定用户的意图，以触发特定的子对话框。\n\n![](img/495919_1_De_4_Fig6_HTML.png)\n\n**图\
  \ 4.6**\n\n对话树概览\n\n在开始开发聊天机器人之前，通常最好先像图 4.6 那样对对话进行建模，以便了解构建机器人时需要哪些对话和对话机制。为了帮助开发人员和聊天机器人设计人员完成此过程，Bot\
  \ Framework CLI 提供了一个工具，可以将作为 Markdown 代表的聊天文件转换为可在 Bot Framework Emulator 中用于演示目的的转录文件。一个简单的\
  \ `.chat` 文件可能如下所示：\n\n```\nuser=stephan\nbot=diele\n用户: 你好\n机器人: 你好，我是 Diele 机器人。有什么可以帮你的吗？\n\
  ```\n\n在此示例中，上述 Markdown 内容保存在名为 `04_greeting_bad.chat` 的文件中。创建文件后，您可以在终端中运行以下 Bot\
  \ Framework CLI 命令，将此 `.chat` 文件转换为 `.transcript` 文件：\n\n```\nbf chatdown:convert\
  \ --in .\\04_greeting_bad.chat -o .\\\n```\n\n转录文件包含许多聊天文件之外的额外参数，例如对话和参与者 ID、活动类型以及消息。现在，可以使用\
  \ Bot Framework Emulator 打开此生成的转录文件，它将向您展示这个非常简单的对话在真实场景中的样子，如图 4.7 所示。\n\n![](img/495919_1_De_4_Fig7_HTML.png)\n\
  \n**图 4.7**\n\nChatdown 示例 01\n\n您不仅可以在聊天文件中使用纯文本，还可以使用卡片，我们将在本章稍后的部分详细介绍。在聊天文件中使用卡片的示例如下：\n\
  \n```\nuser=stephan\nbot=diele\n机器人: [Attachment=cards\\04_greetingCard.json adaptivecard]\n\
  用户: 你好\n```\n\n\n\n### 重新执行 `bf chatdown:convert` 命令并传入之前的示例聊天文件后，在 Bot Framework\
  \ Emulator 中渲染的对话如图 4.8 所示。\n\n![](img/495919_1_De_4_Fig8_HTML.png)\n\n图 4.8 Chatdown\
  \ 示例 02\n\n但 `Chatdown` 的用途并不仅限于像上面那样勾勒和检查对话中的单轮交互。您还可以使用 `Chatdown` 来设计聊天机器人内部的完整对话和对话流程。例如，您可以为\
  \ `BookRestaurantTableDialog` 创建一个 `.chat` 文件，如图 4.6 所示。此对话框旨在通过聊天机器人为用户预订餐桌。因此，聊天机器人需要知道首选地点、日期、时间以及至少用餐人数，才能预订餐厅餐桌。为了通过聊天文件来表达这一点，然后使用\
  \ Bot Framework CLI 将其转换为转录文件，您可以使用以下示例：\n\n```\nuser=stephan\nbot=diele\n用户: 预订餐桌\n\
  机器人: 您有特定的地点偏好吗？\n机器人: [Attachment=cards/04_askForLocationCard.json adaptivecard]\n\
  用户: 西雅图怎么样？\n机器人: 您有特定的日期吗？\n用户: 明天\n机器人: 几点？\n用户: 下午 3 点\n机器人: 几位客人？\n用户: 3 位\n\
  机器人: 好的。需要我为您预订明天下午 3 点在西雅图、3 位的餐桌吗？\n机器人: [Attachment=cards/04_tableConfirmationCard.json\
  \ adaptivecard]\n用户: 是的\n机器人: [打字中][延迟=3000]\n您的餐桌已预订。参考编号：#K89HG38SZ\n```\n\n将上述聊天文件转换为转录文件后，在\
  \ Bot Framework Emulator 中的输出如图 4.9 所示。如您在此示例中所见，只需几行 Markdown 即可设计完整的对话甚至整个对话路径。这样，非开发人员也可以使用\
  \ `Chatdown` 和 `.chat` 文件的标记法，在将聊天机器人逻辑和对话的实际开发工作交给开发人员之前，先设计用于测试和演示的聊天机器人对话。\n\n\
  ![](img/495919_1_De_4_Fig9_HTML.png)\n\n图 4.9 Chatdown 示例 03\n\n## 自适应对话\n\n在 Bot\
  \ Framework 中，目前有两种实现对话的概念：一种是许多 Bot Framework SDK 版本中使用的对话库，另一种是新增的自适应对话概念。这两种概念的主要区别在于，自适应对话在处理对话事件（如中断或上下文切换）时提供了更大的灵活性。自适应对话背后的主要思想是提供一种更基于事件的方法来创建对话，该方法既包含对话部分（如语言理解和生成），也包含对话内的操作。由于这种新的声明式模型旨在为开发人员提供一系列构建聊天机器人的模式，而不一定需要通过编写代码来实现，因此本书的重点主要放在描述这种自适应对话方法上。\n\
  \n**注意**\n\n如果您想了解更多关于 Bot Framework SDK 中对话库的信息，请访问 [`docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-dialog`](https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-concept-dialog)。\n\
  \n自适应对话包含一系列称为触发器的事件处理程序，如图 4.10 所示。触发器本身可以包含一个条件，用于确定何时触发该触发器。每个触发器内部包含一个或多个在触发器执行时运行的操作。事件处理程序基本上处理对话中发生的所有事件，并评估应执行哪个触发器。\n\
  \n![](img/495919_1_De_4_Fig10_HTML.png)\n\n图 4.10 自适应对话的概念\n\n\n\n### 自适应对话触发器\n\
  \nBot Framework 包含多种不同的触发器类型，用于特定场景，如表 4.1 所示，涵盖从识别事件、对话和活动事件到消息事件。\n\n表 4.1\n\n\
  自适应对话 – 触发器类型 (Microsoft, 2020)\n\n| 触发器类型 | 描述 |\n| --- | --- |\n| **基础触发器** |\
  \ `OnCondition` 触发器是所有触发器派生自的基础触发器。在自适应对话框中定义触发器时，它们被定义为一组 `OnCondition` 对象。 |\n\
  | **识别事件触发器** | 识别程序从用户输入中提取有意义的信息（如意图和实体），并发出事件。例如，当识别器从特定用户表述中提取出意图（或实体）时，会触发\
  \ `recognizedIntent` 事件。您可以使用 `OnIntent` 触发器来处理此事件。此类型下可用的触发器有：`OnChooseIntent`、`OnIntent`、`OnUnknownIntent`、`OnQnAMatch`\
  \ |\n| **对话事件触发器** | 对话触发器用于处理与“对话生命周期”相关的特定对话事件。目前 Bot Framework SDK 中有六个对话触发器，它们都派生自\
  \ `OnDialogEvent` 类。此类型下可用的触发器有：`BeginDialog`、`CancelDialog`、`EndOfActions`、`Error`\
  \ |\n| **活动事件触发器** | 使用活动触发器，您可以为来自客户端的每个传入活动分配操作，例如当新用户加入且机器人开始新对话时。有关活动的更多信息，请参阅\
  \ Bot Framework 的活动架构。所有活动事件都具有基础事件 `ActivityReceived`，并根据其活动类型进一步细化。所有活动触发器派生自的基类是\
  \ `OnActivity`。此类型下可用的触发器有：`ConversationUpdate`、`EndOfConversation`、`Event`、`Handoff`、`Invoke`、`Typing`\
  \ |\n| **消息事件触发器** | 消息事件触发器允许您响应任何消息事件，例如消息被更新（`MessageUpdate`）或删除（`MessageDeletion`），或者有人对消息做出反应（`MessageReaction`）（例如，常见的消息反应包括点赞、爱心、大笑、惊讶、悲伤和愤怒）。消息事件是活动事件的一种，因此所有消息事件都具有基础事件\
  \ `ActivityReceived`，并根据活动类型进一步细化。所有消息触发器派生自的基类是 `OnActivity`。此类型下可用的触发器有：`Message`、`MessageDeletion`、`MessageReaction`、`MessageUpdate`\
  \ |\n| **自定义事件触发器** | 您可以通过向任何触发器添加 `EmitEvent` 操作来发出自己的事件；然后，您可以通过定义自定义事件触发器，在机器人任何对话框的任何触发器中处理此自定义事件。自定义事件触发器是\
  \ `OnDialogEvent` 触发器，当您将其 `Event` 属性设置为与 `EmitEvent` 的 `EventName` 属性相同的值时，它将成为自定义触发器。此类型下可用的触发器有：`OnDialogEvent`\
  \ |\n\n识别事件触发器包含用于确定用户意图和实体的识别器。当机器人内的多个识别器检测到多个意图时，会触发识别事件触发器中的 `OnChooseIntent`\
  \ 触发器。因此，此触发器控制用于选择正确意图以继续对话的逻辑。此触发器类型中的 `OnIntent` 触发器在检测到特定意图时执行，以便可以执行定义的操作。相比之下，`OnUnknownIntent`\
  \ 触发器处理任何 `OnIntent` 触发器均未检测到意图的情况。识别事件触发器中的最后一个触发器是 `OnQnAMatch` 触发器。每当 `QnAMakerRecognizer`\
  \ 接收到 QnAMatch 意图时，就会触发此触发器，这意味着检测到用户输入与 QnA Maker 知识库中的 QnA 对之间存在匹配。\n\n对话事件触发器类型由用于处理对话生命周期中特定事件的触发器组成。`OnBeginDialog`\
  \ 触发器包含在特定对话框开始时执行的操作。`OnCancelDialog` 触发器用于防止对话框被取消。`OnEndOfActions` 触发器定义了在对话框的所有操作运行完毕后应执行的操作。而\
  \ `OnError` 触发器则处理对话框内的特定错误情况。\n\n在活动事件触发器中，当用户开始与机器人对话时，会执行 `ConversationUpdate`\
  \ 触发器。当用户与机器人之间的对话结束时，会执行 `EndOfConversation` 触发器。`Handoff` 触发器用于执行人工交接操作，以便将人工接入与用户的对话中。`Typing`\
  \ 触发器用于判断用户是否正在输入。\n\n消息事件触发器类型中的 `MessageReceived` 触发器用于在机器人收到用户的新消息时执行操作。相比之下，当用户的消息被删除时，会执行\
  \ `MessageDelete` 触发器。例如，如果用户对某条消息点赞，则会执行 `MessageReaction` 触发器来处理此类情况，并据此执行必要的操作。`MessageUpdate`\
  \ 触发器可用于处理用户消息的更新。\n\n\n\n### 自适应对话操作\n\n除了触发器之外，自适应对话还包含*操作*。这些操作本质上是对话被触发时执行的步骤或流程。操作主要侧重于维持对话流程，例如发送消息或查询知识库以回答用户问题，或执行其他类型的任务，例如验证用户输入以继续对话。由于自适应对话中提供了许多不同的操作，表\
  \ 4.2 简要描述了最常用的操作。\n\n表 4.2\n\n自适应对话的操作类型 (Microsoft, 2020)\n\n| 操作类型 | 操作名称 | 操作描述\
  \ |\n| --- | --- | --- |\n| **活动** | `SendActivity` | 发送一个活动，例如向用户发送回复。 |\n| **活动**\
  \ | `Aktivitätsmitglieder erhalten` | 获取活动成员列表并将其存储在存储中的属性中。 |\n| **条件语句** | `IfCondition`\
  \ | 基于布尔表达式执行一系列操作。 |\n| **条件语句** | `SwitchCondition` | 基于模式匹配执行一系列操作。 |\n| **条件语句**\
  \ | `ForEach` | 遍历存储在数组中的一系列值。 |\n| **对话管理** | `BeginDialog` | 开始执行另一个对话。当该对话结束时，继续执行当前触发器的后续操作。\
  \ |\n| **对话管理** | `EndDialog` | 结束当前活动的对话。当您希望对话在结束前完成并返回结果时使用此选项。会发出 `EndDialog`\
  \ 事件。 |\n| **对话管理** | `RepeatDialog` | 用于重新启动父级对话。 |\n| **管理属性** | `EditArray` |\
  \ 对数组执行操作。 |\n| **管理属性** | `SetProperties` | 一次性设置一个或多个属性的值。 |\n| **访问外部资源** | `BeginSkill`\
  \ | 启动一项技能，并将活动转发到该技能，直到技能结束。 |\n| **访问外部资源** | `HttpRequest` | 向端点发出 HTTP 请求。 |\n\
  | **访问外部资源** | `CodeAction` | 调用自定义代码。自定义代码必须是异步的，接受对话上下文和一个对象作为参数，并返回一个对话翻转结果。\
  \ |\n\n注意\n\n要获取自适应对话中所有支持的操作列表，请运行 `https://docs.microsoft.com/en-us/azure/bot-service/adaptive-dialog/adaptive-dialog-prebuilt-actions`。\n\
  \n### 自适应对话存储范围\n\n上述所有操作都可用于执行各种任务。此外，对话中的操作还可以访问机器人的存储层。这使得开发人员能够使用自适应对话管理机器人的状态，类似于\
  \ Bot Framework SDK 中对话库的概念。自适应对话中的存储被划分为不同的*存储范围*。每个范围服务于不同的目的，例如存储用户或对话数据，或访问特定对话内的值。自适应对话中的所有存储范围都在表\
  \ 4.3 中进行了描述。\n\n表 4.3\n\n自适应对话的存储范围 (Microsoft, 2020)\n\n| 范围名称 | 范围描述 |\n| ---\
  \ | --- |\n| **用户范围** | 用户范围是持久性数据，仅限于您正在通信的用户的 ID。例如：`user.name`，`user.address.city`\
  \ |\n| **对话范围** | 对话范围是一个持久性数据区域，与您正在进行的对话的 ID 相关联。例如：`conversation.hasAccepted`，`conversation.dateStarted`\
  \ |\n| **对话范围** | 对话范围在相关对话的持续时间内存储数据，并为每个对话提供存储空间，以便进行内部、持久的记账。当相关对话结束时，对话范围会被清空。例如：`dialog.orderStarted`，`dialog.shoppingCart`\
  \ |\n| **轮次范围** | 轮次范围包含非持久性数据，仅适用于当前轮次。轮次范围提供了一个在当前轮次持续时间内共享数据的位置。例如：`turn.bookingConfirmation`，`turn.activityProcessed`\
  \ |\n| **设置范围** | 这些是通过平台特定的设置配置系统提供给机器人的所有设置。例如，如果您使用 C# 开发机器人，这些设置将出现在 `appsettings.json`\
  \ 文件中。例如：`settings.QnAMaker.Hostname`，`settings.QnAMaker.endpointKey`，`settings.QnAMaker.knowledgebaseId`\
  \ |\n| **此应用范围** | 此范围指的是活动操作的属性包。这对于输入操作很有帮助，因为它们的生命周期通常超过单个对话轮次。例如：`this.value`（包含当前为输入识别的值），`this.turnCount`（指示为此输入查询缺失信息的次数）\
  \ |\n| **类范围** | 此范围包含活动对话的实例属性。您可以像这样引用此范围：`${class.<PropertyName>}`。 |\n\n使用自适应对话概念设计的对话树示例（如图\
  \ 4.6 所示）可以在图 4.11 中看到。此示例展示了 *RootDialog* 及其各种 *OnIntent* 类型触发器的实现。每个触发器都包含一个 `BeginDialog`\
  \ 操作，用于根据用户的意图执行相应的子对话。在子对话内部，又可以有特定的触发器和相应的操作来相应地执行对话。所有对话和操作共享同一个存储层，这意味着每个对话都可以访问所描述的存储范围，以实现适当的状态管理。此示例对话树也将在接下来的章节中用于开发能够处理这些对话任务的聊天机器人。\n\
  \n![](img/495919_1_De_4_Fig11_HTML.png)\n\n图 4.11\n\n自适应对话树示例\n\n\n\n## 用户体验\n\n\
  聊天机器人的用户体验在某种程度上不同于“传统”的应用程序或网站的用户体验，因为您创建的是对话式用户界面（简称 `CUI`），而非图形用户界面（简称 `GUI`）。由于人们拥有不同类型的对话习惯，设计聊天机器人的用户体验有时可能是一项挑战。因此，正如本章节中提到的，了解聊天机器人的目标受众至关重要。年轻人习惯于使用\
  \ `Facebook`、`WhatsApp` 和 `Slack` 等对话平台。他们习惯于通过即时通讯和聊天与他人交流，而年长一代可能不习惯这类通讯平台，因为他们成长于不同的时代，有着不同的沟通方式。年轻人熟悉在对话中使用表情符号以及图片和视频等富媒体，而年长一代可能并非如此。因此，在开发聊天机器人之前，您应该对目标受众有清晰的认识。\n\
  \n不过，总的来说，开发一个不仅仅通过纯文本消息与用户交流的聊天机器人是一个好的实践。当然，这要求您的聊天机器人所运行的渠道也支持其他类型的消息和富媒体附件。例如，用于短信（`SMS`）的机器人只能发送和接收文本消息，而不能发送图片和视频。然而，`Azure\
  \ Bot Service` 支持的大多数通信渠道都支持富媒体附件。因此，您的聊天机器人应设计为包含这些对话机制，以积极影响对话流程。\n\n良好的聊天机器人用户体验还包括状态管理的概念。状态基本上是机器人的大脑，用于让机器人能够检索与用户的对话历史。这对于设计良好的对话流程至关重要，因为如果机器人知道中断发生的位置，以及如何在发生中断或上下文切换的点恢复对话，它就能更好地处理中断。此外，通过适当的状态管理，您有机会开发出更人性化的对话行为，因为机器人可以记住与用户之前对话中的特定信息，这同样能改善对话流程。在我们的示例中，聊天机器人处理餐厅预订请求，这也包括预订的管理。因此，如果用户无需提供餐厅预订的完整信息即可更新或取消预订，那将非常有益。相反，机器人应该能够记住用户的预订，并仅通过询问预订参考号来继续处理用户的请求。因此，状态管理引入了机器人记住先前对话信息的能力。\n\
  \n## 富媒体附件\n\n除了机器人能够记住先前对话的部分内容之外，良好用户体验的另一个重要因素是除了文本之外，还要包含富媒体附件。如前所述，这取决于您的机器人部署在哪个渠道上，但总的来说，在用户对话中融入图片、链接、视频甚至表情符号等对话元素是一个好方法。因此，`Microsoft\
  \ Bot Framework` 支持多种不同的选项来向机器人消息添加富媒体附件。在 `C#` 机器人中，您可以使用以下代码片段，通过向消息添加内联附件，轻松地向用户发送包含图片的消息：\n\
  \n```\nmsg = MessageFactory.Text(\"Here you see the dialog tree!\");\nmsg.Attachments\
  \ = new List() { GetImageAttachment() };\nprivate static Attachment GetImageAttachment()\n\
  {\nvar imgPath = Path.Combine(Environment.CurrentDirectory, @\"img\", \"dialogTree.png\"\
  );\nvar img = Convert.ToBase64String(File.ReadAllBytes(imgPath));\nreturn new Attachment\n\
  {\nName = @\"img\\dialogTree.png\",\nContentType = \"image/png\",\nContentUrl =\
  \ $\"data:image/png;base64,{img}\",\n};\n}\n```\n\n重要的是，富媒体附件能够增强机器人与用户之间的对话。当您想要展示菜单卡等特定内容时，使用包含图片和其他媒体的消息进行回复是有益的。当然，您也可以向用户发送包含菜单信息的文本消息，但在大多数情况下，菜单的图片会更专业，并且尤其对用户更友好。\n\
  \n\n\n### 卡片作为视觉元素\n\n除了使用内联附件之外，通常一个好的做法是使用所谓的*卡片*作为开场消息，来主动开始与用户的对话，正如本章前面所示。Bot\
  \ Framework 中的卡片可以在单条消息中包含多种类型的丰富用户控件以及视觉或音频元素。如表 4.4 所述，Microsoft Bot Framework\
  \ 支持多种不同的卡片类型，可用于不同的场景，例如显示动画、视频或图片、播放音频文件或让用户登录。由于本章无法详细讨论所有支持的卡片类型，我们将在接下来的章节中重点介绍最常用的卡片类型。\n\
  \n表 4.4\n\nMicrosoft Bot Framework 中支持的卡片类型 (Microsoft, 2018)\n\n| 卡片类型 | 卡片描述 |\n\
  | --- | --- |\n| **自适应卡片** | 一种开放的卡片交换格式，以 JSON 对象表示。通常用于跨渠道部署卡片。卡片会自适应调整以匹配各自宿主渠道的外观。\
  \ |\n| **动画卡片** | 一种可以播放动画 GIF 或短视频的卡片。 |\n| **音频卡片** | 一种可以播放音频文件的卡片。 |\n| **英雄卡片**\
  \ | 一种包含单个大图、一个或多个按钮以及文本的卡片。通常用于在视觉上突出显示可能的用户选择。 |\n| **缩略图卡片** | 一种包含单个缩略图、一个或多个按钮以及文本的卡片。通常用于在视觉上突出显示用于潜在用户选择的按钮。\
  \ |\n| **收据卡片** | 一种允许机器人向用户开具收据的卡片。通常包含收据上应显示的商品列表、税费和总金额信息以及其他文本。 |\n| **登录卡片**\
  \ | 一种允许机器人提示用户登录的卡片。通常包含文本以及一个或多个按钮，用户可点击这些按钮以启动登录流程。 |\n| **建议操作** | 向用户呈现一组代表用户选择的\
  \ `CardActions`。一旦选择了其中一项建议操作，此卡片就会消失。 |\n| **视频卡片** | 一种可以播放视频的卡片。通常用于打开 URL 并流式播放可用的视频。\
  \ |\n| **卡片轮播** | 一组可水平滑动的卡片集合，使用户能够轻松查看一系列选项。 |\n\n#### 英雄卡片\n\n与将图片或视频附加到消息中不同，英雄卡片提供了将文本、图片、视频以及按钮组合在单条消息中的能力。这通常用于创建问候卡片、帮助卡片或任何其他类型的消息，在这些消息中您希望将文本和媒体整合在一起。英雄卡片还允许用户通过点击按钮来继续对话，而不是在聊天中输入文本。这在手机上尤其有用，因为它使对话更流畅、更快捷。英雄卡片主要由图\
  \ 4.12 所示的部分组成。\n\n![](img/495919_1_De_4_Fig12_HTML.png)\n\n图 4.12\n\n英雄卡片示例\n\n\
  在 C# 机器人中，您可以使用以下代码行来生成英雄卡片并将其发送给对话中的用户：\n\n```\nvar attachments = new List();\n\
  var reply = MessageFactory.Attachment(attachments);\nreply.Attachments.Add(GetHeroCard().\
  \ ToAttachment());\nawait stepContext.Context.SendActivityAsync(reply, cancellationToken);\n\
  public static HeroCard GetHeroCard()\n{\nvar heroCard = new HeroCard\n{\nTitle =\
  \ \"需要帮助？\",\nSubtitle = \"您不确定吗？\",\nText = \"当您不知道如何继续对话时，我可以在任何情况下帮助您！只需点击下方任意按钮即可继续\"\
  ,\nImages = new List { new CardImage(\"https://bisser.io/images/bisser_io_red.png\"\
  ) },\nButtons = new List\n{\nnew CardAction(ActionTypes.ImBack, title: \"预订餐桌\"\
  , value: \"预订餐桌\"),\nnew CardAction(ActionTypes.ImBack, title: \"管理预订\", value:\
  \ \"管理预订\"),\n},\nreturn heroCard;\n}\n}\n```\n\n#### 卡片轮播\n\n前面的示例向您展示了如何创建和发送单个英雄卡片或自适应卡片实例。然而，在许多情况下，您可能希望在单条消息中可视化多张卡片。因此，您可以使用英雄卡片类中的\
  \ `AttachmentLayout` 属性来创建卡片轮播，如图 4.13 所示。这样，您就可以将多张卡片添加到同一活动中。收到此卡片轮播的用户可以向右或向左滑动，以查看附加到消息中的卡片。\n\
  \n![](img/495919_1_De_4_Fig13_HTML.png)\n\n图 4.13\n\n英雄卡片轮播示例\n\n此功能在您希望在一条消息中显示相同类型的可视化内容但包含不同数据的场景中非常有用，例如上图显示了用户的餐厅预订信息。当然，您也可以为每个预订单独发送一条消息和一张卡片，但这会导致连续发送大量消息的问题。用户随后需要在聊天窗口中滚动和翻看这些消息，这在手机上尤其困难，可能会让用户感到厌烦。因此，发送轮播卡片的选项改善了用户体验，因为查看卡片和在卡片之间导航更加容易，所以在合适的情况下应使用此功能。\n\
  \n### 建议操作\n\n与卡片中用户可点击以继续对话的按钮不同，建议操作是显示在聊天输入框附近的按钮，在用户选择了其中某个按钮或输入文本后就会消失。这些建议操作是一种很好的方式，让用户可以通过点击按钮来回答问题，而无需输入文本。建议操作相对于卡片中按钮的主要优势在于，卡片中的按钮会一直保留在聊天窗口中。因此，用户可能会再次点击来自较早消息的按钮，这可能导致中断或上下文切换，因为机器人可能已经处于对话树的不同部分。使用建议操作，作为机器人开发者的您无需考虑这种情况，因为一旦用户继续对话，建议操作就会从聊天窗口中消失。建议操作的示例如图\
  \ 4.14 所示。\n\n![](img/495919_1_De_4_Fig14_HTML.png)\n\n图 4.14\n\n建议操作示例\n\n\n\n\
  ### 自适应卡片\n\n自适应卡片背后的理念是，只需创建一次卡片，然后让机器人所部署的渠道原生渲染该卡片。英雄卡片和其他卡片类型通常是机器人代码库的一部分，而自适应卡片则使用\
  \ JSON 创建。因此，卡片本身会以 JSON 卡片格式传递给渠道，这使得渠道能够原生渲染卡片，同时使用与该渠道内其他部分相同的 UI 样式。目前，表 4.5\
  \ 中列出的渠道支持自适应卡片，这远非所有 Azure 机器人服务渠道。因此，在决定卡片类型之前，您应该首先了解您打算将机器人部署到哪些渠道。\n\n**表 4.5**\
  \ 自适应卡片渠道支持 (Microsoft, 2018)\n\n| 平台 | 描述 | 版本 |\n| --- | --- | --- |\n| Bot Framework\
  \ Web Chat | 用于 Microsoft Bot Framework 的可嵌入 Web 聊天控件。 | 1.2.6 (Webchat 4.9.2) |\n\
  | Outlook 可操作消息 | 将可操作的消息附加到电子邮件。 | 1.0 |\n| Microsoft Teams | 整合了工作场所聊天、会议和笔记的平台。\
  \ | 1.2 |\n| Cortana 技能 | Windows 10 的虚拟助手。 | 1.0 |\n| Windows 时间线 | 一种继续您在此电脑、其他\
  \ Windows 电脑以及 iOS/Android 设备上开始的先前活动的新方式。 | 1.0 |\n| Cisco WebEx Teams | Webex\
  \ Teams 有助于加速项目、建立更好的关系并解决业务挑战。 | 1.2 |\n\n**注意**\n\n并非所有 Azure 机器人服务渠道都支持自适应卡片。有关支持自适应卡片的渠道列表，请访问\
  \ [`docs.microsoft.com/en-us/adaptive-cards/resources/partners`](https://docs.microsoft.com/en-us/adaptive-cards/resources/partners)。\n\
  \n由于自适应卡片本质上是 JSON 文件或对象，因此创建卡片很简单。甚至还有一个自适应卡片设计器，您可以直接在浏览器中设计和创建自适应卡片，而无需编写 JSON\
  \ 表示法。在自适应卡片中，您基本上可以插入文本块、图像、视频、列、按钮以及输入对象，例如文本输入字段、数字或日期输入字段或选择输入。\n\n**注意**\n\n\
  可用于创建自适应卡片的自适应卡片设计器位于 [`adaptivecards.io/designer/`](https://adaptivecards.io/designer/)。\n\
  \n特别是对于刚接触自适应卡片的开发人员来说，设计器是一个很好的工具，可以熟悉可用的卡片元素，并学习如何设计出外观漂亮的卡片。此外，内置的预览模式让您可以直接在浏览器中，在某个支持渠道中原生查看您创建的自适应卡片。这样，您就可以在开发聊天机器人之前，基本测试自适应卡片的外观和可用性。图\
  \ 4.12 中显示的英雄卡片也可以作为自适应卡片创建，如图 4.15 所示。\n\n![](img/495919_1_De_4_Fig15_HTML.png)\n\
  \n**图 4.15** 自适应卡片示例\n\n上图中显示的卡片基本上由以下 JSON 对象描述：\n\n```json\n{\n  \"Typ\": \"AdaptiveCard\"\
  ,\n  \"Körper\": [\n    {\n      \"Typ\": \"Bild\",\n      \"url\": \"https://someUrl/someIcon.png\"\
  ,\n      \"Größe\": \"Groß\",\n      \"horizontaleAusrichtung\": \"Center\"\n  \
  \  },\n    {\n      \"Typ\": \"TextBlock\",\n      \"Größe\": \"Groß\",\n      \"\
  Gewicht\": \"Kräftiger\",\n      \"Text\": \"Hilfe?\"\n    },\n    {\n      \"Typ\"\
  : \"TextBlock\",\n      \"Text\": \"Sind Sie unsicher?\",\n      \"wrap\": wahr,\n\
  \      \"Größe\": \"Mittel\",\n      \"fontType\": \"Standard\",\n      \"isSubtle\"\
  : wahr\n    },\n    {\n      \"Typ\": \"TextBlock\",\n      \"Text\": \"Ich kann\
  \ Ihnen in jeder Situation helfen, in der Sie vielleicht nicht wissen, wie Sie das\
  \ Gespräch fortsetzen sollen! Klicken Sie einfach auf eine der Schaltflächen unten,\
  \ um fortzufahren\",\n      \"wrap\": wahr\n    },\n    {\n      \"Typ\": \"ActionSet\"\
  ,\n      \"Aktionen\": [\n        {\n          \"Typ\": \"Action.Submit\",\n   \
  \       \"Titel\": \"Einen Tisch buchen\",\n          \"Daten\": \"Buchen Sie einen\
  \ Tisch\"\n        },\n        {\n          \"Typ\": \"Action.Submit\",\n      \
  \    \"Titel\": \"Buchung verwalten\",\n          \"Daten\": \"Buchung verwalten\"\
  \n        }\n      ]\n    }\n  ],\n  \"$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\"\
  ,\n  \"Version\": \"1.2\"\n}\n```\n\n然而，自适应卡片不仅提供了显示静态内容和按钮的能力。您还可以创建动态的自适应卡片，通过基于按钮点击或其他操作来切换或显示自适应卡片的某些部分，如图\
  \ 4.16 所示。通过这种方式，您可以创建精密的 UI 元素，这些元素可以在不同的渠道中使用，而无需为您的机器人可访问的每个渠道单独开发或编写卡片。由于自适应卡片对于机器人框架的开发至关重要，接下来的章节将深入探讨自适应卡片及其用例。\n\
  \n![](img/495919_1_De_4_Fig16_HTML.png)\n\n**图 4.16** 自适应卡片切换示例\n\n## 总结\n\n本章涵盖了开发成功聊天机器人时应考虑的聊天机器人设计原则。在本章的第一部分，我们探讨了聊天机器人的个性和品牌塑造主题。您了解了为什么分析聊天机器人的目标受众是设计阶段的一项基本任务，以及为什么令人难忘的欢迎消息和对话内导航对于任何聊天机器人都是必不可少的。此外，您还学习了设计对话流程的基本概念，重点介绍了自适应对话的概念。此外，我们还讨论了聊天机器人中的用户体验部分和可用的视觉元素，以及为什么纯文本聊天机器人并不总是最佳选择。\n\
  \n在下一章中，您将学习如何使用 Microsoft Bot Framework Composer（一个用于在图形用户界面中创建机器人的新工具）以低代码方法创建聊天机器人。\n\
  \n"
- "# 5. 构建聊天机器人\n\n在上一章中，您学习了如何设计聊天机器人，包括对话流程和用户体验。本章将介绍如何使用名为“Bot Framework Composer”的工具来构建聊天机器人，该工具是\
  \ Bot Framework 生态系统的一部分，旨在通过图形用户界面创建聊天机器人，而不是通过代码编写聊天机器人。此外，本章还将详细阐述前面章节中涉及的主题在构建聊天机器人的实际场景中的应用，例如使用语言理解和\
  \ QnA Maker 来改进自然语言处理流程。此外，本章还将描述如何使用自定义代码将特定功能集成到使用 Composer 创建的聊天机器人中，这些功能默认情况下不可用。\n\
  \n\n\n## Bot Framework Composer 简介\n\n`Bot Framework Composer` 是一款采用图形用户界面的工具，专为创建聊天机器人而设计。`Composer`\
  \ 面向开发者和高级用户，提供了创建、测试和发布聊天机器人所需的众多功能。例如，`Composer` 还提供了创建聊天机器人核心对话流程之外的关键部分的能力，例如语言理解模型、语言生成模型或\
  \ `QnA Maker` 知识库。因此，它可以被视为一个工具，无需编写代码即可提供设计和开发聊天机器人所需的主要功能和能力。\n\n`Composer` 的设计初衷不仅是为了方便开发者，也是为了方便非开发者设计和构建机器人。当然，可视化画布功能加速了机器人开发的整个生命周期，特别是对于那些不经常创建聊天机器人的人来说。使用\
  \ `Composer` 基本上有两种方式：两种方案各有优缺点，但两种版本的总体外观和功能是相同的。因此，本书中引用的所有示例均基于 `Bot Framework\
  \ Composer` 的桌面版。`Composer` 包含一个图形用户界面，如图 5.1 所示，为您提供了一个精良的创作界面，您可以在其中创建对话、触发器和操作。\n\
  \n![](img/495919_1_De_5_Fig1_HTML.png)\n\n图 5.1 Bot Framework Composer 概览\n\n- \
  \  将 `Composer` 作为桌面应用程序安装。\n-   从源代码构建 `Composer`。\n\n两种方案各有优缺点，但两种版本的总体外观和功能是相同的。因此，本书中引用的所有示例均基于\
  \ `Bot Framework Composer` 的桌面版。`Composer` 包含一个图形用户界面，如图所示。\n\n使用 `Composer` 创建机器人时，与\
  \ `Bot Framework SDK` 存在一些差异，机器人开发者需要注意。首先，`Composer` 基于第 4 章中描述的自适应对话，这与 `Bot Framework\
  \ SDK` 中使用的对话库不同。但同时，这也是 `Composer` 的优势之一，因为自适应对话以 `JSON` 格式存储，因此可以在许多不同的机器人或工具中重复使用。`Composer`\
  \ 相对于 `SDK` 的另一个巨大优势在于，它将最常用的工具整合到了一个用户界面中。过去，机器人开发者需要访问 `LUIS` Web 门户来管理所有语言理解组件。要管理\
  \ `QnA` 问答对，还需要访问 `QnA-Maker` 门户。而对于机器人开发本身，则需要使用 `Visual Studio` 或 `Visual Studio\
  \ Code` 来开发机器人的逻辑。随着 `Composer` 的推出，这些体验被整合到一个工具中，为开发者在设置和维护机器人所需的关键组件方面节省了大量时间。\n\
  \n**注意**\n\n要下载并安装 `Bot Framework Composer`，请访问 [`aka.ms/bfcomposer`](http://aka.ms/bfcomposer)。\n\
  \n### 存储\n\n在自适应对话中，存储基本上被视为机器人的大脑，如第 4 章所述。因此，您可以使用存储来保存特定值，这些值可以在对话过程中的稍后时间点访问，例如用户的姓名或地址信息。在第\
  \ 4 章中，我们了解到存在以下存储范围，它们提供不同的访问方式和持久性：这些范围用于在对话中存储不同的值，以便稍后重用。您在特定操作中或作为机器人提问结果设置的每个属性，都将存储在上述某个范围中。如果您需要存储关于用户或对话的数据，则应使用用户范围或对话范围，因为这些范围在机器人的整个生命周期内都有效。用户范围主要用于存储用户信息，例如姓名、位置或其他用户属性和设置。对话范围主要针对对话属性，例如对话的元数据（例如开始日期等），这些属性可能由进入同一对话的多个用户共享（例如\
  \ `Microsoft Teams` 群聊）。如果您需要存储短期值，则对话范围和轮次范围更为合适。对话范围的生命周期基本上与对话绑定，即当对话结束时，在该范围中定义的属性将被丢弃。轮次范围甚至比对话范围更短暂，因为在该范围中定义的属性仅在轮次内保留，而轮次本质上是由机器人处理的单条消息。\n\
  \n-   用户范围\n-   对话范围\n-   对话范围\n-   轮次范围\n-   设置范围\n-   此范围\n-   类范围\n\n这些范围用于在对话中存储不同的值，以便稍后重用。您在特定操作中或作为机器人提问结果设置的每个属性，都将存储在上述某个范围中。如果您需要存储关于用户或对话的数据，则应使用用户范围或对话范围，因为这些范围在机器人的整个生命周期内都有效。用户范围主要用于存储用户信息，例如姓名、位置或其他用户属性和设置。对话范围主要针对对话属性，例如对话的元数据（例如开始日期等），这些属性可能由进入同一对话的多个用户共享（例如\
  \ `Microsoft Teams` 群聊）。如果您需要存储短期值，则对话范围和轮次范围更为合适。对话范围的生命周期基本上与对话绑定，即当对话结束时，在该范围中定义的属性将被丢弃。轮次范围甚至比对话范围更短暂，因为在该范围中定义的属性仅在轮次内保留，而轮次本质上是由机器人处理的单条消息。\n\
  \n\n\n#### 在 Composer 中存储属性\n\n要在 Composer 中存储属性，您可以使用“设置属性”操作，也可以基于“提问”操作来设置属性。第一种方式通常用于在对话的特定时间点设置单个属性。您也可以使用“设置属性”操作一次性设置多个属性。“设置属性”操作的行为如图\
  \ 5.2 所示。该操作通常可用于对话中的任何步骤，以便在上述某个范围内存储信息。\n\n![](img/495919_1_De_5_Fig2_HTML.png)\n\
  \n*图 5.2 在 Composer 中设置属性*\n\n在前面的示例中，属性值是“硬编码”的，并且类型为 `String`。但这并不总是足够的，因为您可能需要基于某个操作生成值。这个概念在\
  \ Composer 中被称为“表达式”。表达式通常用于基于计算函数来计算值。这些表达式可以包括：\n\n- 算术运算，如加法 (`+`)、减法 (`-`)、乘法\
  \ (`*`) 或除法 (`/`)\n- 比较运算，如等于 (`==`)、不等于 (`!=`)、大于 (`>`) 或小于 (`<`)\n- 逻辑运算，如与 (`&&`)、或\
  \ (`||`) 或非 (`!`)\n\n此外，还有许多预构建的函数可用于处理各种对象类型，如 `Strings`、集合或日期，以及用于比较和类型检查的操作。\n\
  \n**注意：** 有关可用预构建函数的完整列表，请参阅 [`docs.microsoft.com/en-us/azure/bot-service/adaptive-expressions/adaptive-expressions-prebuilt-functions`](https://docs.microsoft.com/en-us/azure/bot-service/adaptive-expressions/adaptive-expressions-prebuilt-functions)。\n\
  \n如图 5.3 所示，您也可以使用*表达式*，通过不同的预构建函数来计算值。如下例所示，您可以将属性设置为硬编码的值，也可以使用 `concat` 函数动态计算属性的值。使用此函数，您还可以通过使用表达式中的属性名称来引用表达式中的现有属性，例如\
  \ `=concat(user.first, ' ', user.last)`。\n\n![](img/495919_1_De_5_Fig3_HTML.png)\n\
  \n*图 5.3 设置属性 – 显式类型与表达式的比较*\n\n要发送包含属性值的消息，您只需使用 `${scope.propertyName}` 这种表示法，如图\
  \ 5.4 所示。这种表示法在语言生成中用于引用存储在内存中的属性，这些属性需要在特定操作中被访问。\n\n![](img/495919_1_De_5_Fig4_HTML.png)\n\
  \n*图 5.4 发送包含属性值的消息*\n\n### LU（语言理解）\n\n如前几章所述，语言理解几乎是每个 AI 解决方案中的核心功能。每当您需要处理超出简单\
  \ QnA 模式的特定用户请求时，您都需要实现某种形式的语言理解，以便相应地处理用户输入。在 Bot Framework SDK 项目中使用 LUIS 与在 Composer\
  \ 中使用 LUIS 的主要区别在于，您无需在 IDE 和 LUIS 门户之间切换，因为 Composer 内置了一个内联编辑器，用于创建意图和实体等 LUIS\
  \ 组件。\n\n在 Composer 中维护语言模型的原理与第 3 章所述基本相同。使用 Composer 的内联编辑器，您可以编辑一个 `.lu` 文件，Composer\
  \ 会使用该文件自动管理 LUIS 模型。这些 `.lu` 文件通常包含意图、实体和表述。所使用的表示法如表 5.1 所示。\n\n**表 5.1 Composer\
  \ `.lu` 文件表示法**\n\n| 类型 | 表示法 |\n| --- | --- |\n| **意图** | `# IntentName` |\n| **表述**\
  \ | `- 一个表述示例` |\n| **实体** | `{entityName=example}` |\n\n因此，第 3 章中的示例意图 `GetWeather`\
  \ 的 `.lu` 文件可能如下所示：\n\n```\n#### GetWeather\n- 您能告诉我雷德蒙德的天气预报吗？\n- 纽约的天气怎么样？\n-\
  \ 我想了解阿姆斯特丹天气的一些细节\n- 西雅图的天气怎么样？\n- 柏林的天气怎么样？\n@ 预构建 geographyV2\n```\n\n您会注意到，我们向此意图添加了预构建实体\
  \ `geographyV2`，这使得 LUIS 能够自动从用户的表述中识别并提取地名。在 Composer 中使用的 `BookTable` 意图如下所示：\n\
  \n```\n#### BookTable\n- 请帮我预订 {@locationName=红狮牛排馆} 烧烤店的一张桌子。\n- 你能帮我预订明天在 {@locationName=著名寿司吧}\
  \ 的四人桌吗？\n- 你能帮我预订明天在 {@locationName=汤姆小餐馆} 的桌子吗？\n- 请帮我预订 11 月 23 日在 {@locationName=杰米厨房}\
  \ 的五人位。\n- 请帮我预订周六下午 3 点在 {@locationName=硬石餐厅} 的六人桌。\n@ ml locationName\n@ 预构建 datetimeV2\n\
  @ 预构建 number\n```\n\n在 Composer 中使用这两个 `.lu` 文件的详细信息将在本章的后续部分中介绍，同时还会提供一些关于如何相应处理语言理解的更多信息。\n\
  \n\n\n### LG（语言生成）\n\n虽然语言理解为机器人开发者提供了一种简单的方式，为聊天机器人添加自然语言处理功能，但语言生成主要用于赋予聊天机器人特定的语气，使其看起来更智能。因此，语言生成旨在为开发者提供灵活性，以便为聊天机器人的消息添加变化。这不仅提供了将业务逻辑与表示层分离的可能性，还允许在聊天机器人解决方案中使用一致的概念来管理和维护语言生成组件。`.lg`\
  \ 文件格式相当简单，在某种程度上类似于本章前面描述的 `.lu` 文件格式，并在表 5.2 中进行了描述：\n\n表 5.2\n\nComposer 的 `.lg`\
  \ 文件格式\n\n| 组件 | 表示法 |\n| --- | --- |\n| **注释** | `> 这是一条注释` |\n| **模板名称** | `#\
  \ TemplateName` |\n| **变体** | `- 这是一条机器人回复` |\n\n```\n> 包含 3 个变体的问候模板。\n#### 问候\n\
  - 你好\n- 嗨\n- 您好\n```\n\n在 `.lg` 文件中，您还可以使用条件语句，根据特定属性来定义回复。例如，问候语也可以包含“早上好”或“晚上好”等词语。默认情况下，机器人会随机选择问候模板中存储的短语之一，这可能导致在晚上\
  \ 8 点时，机器人回复“早上好”。在这种情况下，您可以通过直接在 `.lg` 文件中使用 `if-else` 语句来解决此问题，以判断“早上好”是否合适，或者用“晚上好”来问候用户是否更好，如下所示：\n\
  \n```\n> 带条件的问候语\n#### ConditionalGreeting\n- IF: ${time == 'morning'}\n- 早上好\n\
  - ELSEIF: ${time == 'afternoon'}\n- 下午好\n- ELSEIF: ${time == 'evening'}\n- 晚上好\n\
  - ELSE:\n- 你好\n- 嗨\n- 您好\n```\n\n同样，可以在模板内使用 `switch case` 语句来实现，以确定哪个 `case` 子句符合条件，并相应地设置机器人的回复：\n\
  \n```\n> 带条件的问候语\n#### ConditionalGreeting\n- SWITCH: ${time}\n- CASE: ${'morning'}\n\
  - 早上好\n- CASE: ${'afternoon'}\n- 下午好\n- CASE: ${'evening'}\n- 晚上好\n- DEFAULT:\n\
  - 你好\n- 嗨\n- 您好\n```\n\n在 `.lg` 文件中，您还可以使用前面提到的内置函数，在发送机器人回复之前计算值或执行计算。这在处理字符串时特别有用，例如当您需要将两个或多个字符串连接或拼接成一条消息时。此外，您还可以在模板内部引用另一个模板，如下所示：\n\
  \n```\n> 带引用的问候语\n#### GreetingReply\n- ${ConditionalGreeting()}, ${GreetingSuffix()}\n\
  #### ConditionalGreeting\n- IF: ${time == 'morning'}\n- 早上好\n- ELSEIF: ${time ==\
  \ 'afternoon'}\n- 下午好\n- ELSEIF: ${time == 'evening'}\n- 晚上好\n- ELSE:\n- 你好\n- 嗨\n\
  - 您好\n#### GreetingSuffix\n- 您今天怎么样？\n- 最近怎么样？\n- 今天过得如何？\n```\n\n## 使用 Composer\
  \ 创建第一个聊天机器人\n\n正如本章前面提到的，Composer 是一个可视化的机器人创作工具。您可以将其作为桌面应用程序使用，也可以从源代码构建 Composer。本书中讨论的所有场景和示例都将使用\
  \ Composer 的桌面应用程序完成，这对于非开发人员入门尤其有帮助。如果您尚未下载 Composer，则需要在开始之前安装以下必备组件：\n\n*   Bot\
  \ Framework Emulator\n    *   [`github.com/microsoft/BotFramework-Emulator/releases/latest`](https://github.com/microsoft/BotFramework-Emulator/releases/latest)\n\
  *   .NET Core SDK 3.1 及更高版本\n    *   [`dotnet.microsoft.com/download/dotnet-core/3.1`](https://dotnet.microsoft.com/download/dotnet-core/3.1)\n\
  *   Composer\n    *   [`aka.ms/bfcomposer`](https://aka.ms/bfcomposer)\n\n## 模板和示例\n\
  \n在安装了前文提到的三个工具后，您就可以使用 Composer 来创建您的第一个聊天机器人了。为了帮助刚开始使用 Bot Framework SDK 和 Composer\
  \ 的人，有许多模板和示例可用，它们可以作为您下一个项目的基础框架。预定义的示例及其简要说明列于表 5.3 中。\n\n表 5.3\n\nBot Framework\
  \ Composer 示例 (Microsoft, 2020)\n\n| 示例 | 描述 |\n| --- | --- |\n| **Echo Bot** |\
  \ 一个回显用户输入消息的机器人。 |\n| **Empty Bot** | 一个简单的机器人，等待您发挥创意。 |\n| **Simple To-Do** |\
  \ 一个示例机器人，演示如何使用正则表达式识别器来定义意图，并允许您添加、列出和删除待办事项。 |\n| **To-Do with LUIS** | 一个示例机器人，演示如何使用\
  \ LUIS 识别器来定义意图，并允许您添加、列出和删除待办事项。运行此示例需要一个 [*LUIS 创作密钥*](https://docs.microsoft.com/en-us/azure/cognitive-services/luis/luis-how-to-azure-subscription)。\
  \ |\n| **Ask Questions** | 一个示例机器人，演示如何向用户提示不同类型的输入。 |\n| **Conversation Flow Control**\
  \ | 一个示例机器人，演示如何使用分支操作来控制对话流程。 |\n| **Dialog Actions** | 一个示例机器人，演示 Composer 中操作的使用（不包括\
  \ **Ask Questions** 示例中已涵盖的**提问**操作）。 |\n| **Interruptions** | 一个示例机器人，演示如何处理对话流程中的中断。运行此示例需要一个\
