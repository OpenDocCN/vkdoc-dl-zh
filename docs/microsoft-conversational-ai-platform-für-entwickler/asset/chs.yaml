  ## 引言


  本书涵盖了使用 Microsoft 对话式 AI 平台开发聊天机器人所需经历的所有步骤。您将学习关于 Microsoft Bot Framework 和 Azure
  Cognitive Services 的关键事实和概念，这些是开发和维护聊天机器人所必需的。本书主要面向开发人员及具有开发背景的人士，因为您将学习现代端到端聊天机器人开发的概念。但由于它也涵盖了基本概念，几乎所有对聊天机器人开发感兴趣的、具备
  IT 知识的人都能从阅读本书中获益。


  从理论概念开始，前三章详细介绍了 Microsoft 对话式 AI 平台、Microsoft Bot Framework 以及本书中用于开发聊天机器人的 Azure
  Cognitive Services。第 4、5、6、7 和 8 章则涵盖了每个聊天机器人开发项目的不同阶段，从讨论设计原则的设计阶段开始，接着是使用 Microsoft
  Bot Framework Composer（一种可视化机器人编辑工具）开发真实示例聊天机器人的构建阶段。之后是测试阶段，探讨如何正确测试聊天机器人，最后两章则涉及发布阶段和连接阶段，以便将聊天机器人提供给最终用户。


