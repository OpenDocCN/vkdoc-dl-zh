- "# 7. 风险缓解的系统性方法\n\n风险缓解并非易事；如果没有可量化的衡量标准，它甚至会更加困难。在本章中，我们将讨论一种系统性的风险缓解方法。\n\n有四种风险缓解策略可供使用，即风险规避、风险接受、风险转移以及风险控制或降低。虽然规避和接受是直截了当的行动，我们将在第\
  \ 10 章讨论*风险转移*。\n\n在本章中，我们将重点讨论采用系统方法论进行风险控制或降低。这种方法还将有助于建立量化指标，进而帮助评估风险缓解活动的进展。\n\
  \n## AI 风险管理的核心原则\n\n与任何风险管理一样，在 AI 风险方面，有三个核心原则可作为基础。这些原则对于有效管理风险至关重要：\n\n***识别风险：***\
  \ 必须采用系统方法来确定最严重的风险。这是一个极其重要的原则，因为如果无法识别，就无法进行任何控制或管理。人们存在盲点，这是我们固有的局限性。为了避免这些盲点，需要一个跨部门的优秀团队来参与风险识别过程。本章后面讨论的*事前验尸*分析方法将详细阐述这一原则。\n\
  \n***全面性：*** 正如我之前提到的，AI 系统并非单点解决方案。它们通常涉及多个系统，最终的系统在很大程度上是系统的系统。这意味着，要有效管理风险，仅仅覆盖\
  \ AI 解决方案本身是不够的。你必须在风险识别过程中做到全面。如果不在方法上做到全面，系统其他部分的风险就可能被遗漏，从而抹杀所有努力。\n\n***针对你的具体用例：***\
  \ 负责任地设计和实施 AI 解决方案（即负责任的 AI）并不困难；然而，要做到这一点，一个重要的前提是更好地理解风险，并且要针对你的具体用例。宽泛的风险识别和管理方法不会有帮助。同时，在整个价值链中建立控制体系也相当重要，即对初始分析、系统设计、解决方案开发、实施及其持续使用实施控制。\n\
  \n> *好事只有计划才会发生；坏事则会自行发生。*\n> \n> *——*菲利普·克劳士比^(¹⁸)\n\n## AI 风险的常见促成因素\n\n在目睹了多次\
  \ AI 失败案例，并额外研究了众多 AI 部署完全（或部分）失败的案例后，我发现了一种典型的风险促成因素模式。几乎在每个案例中都存在七个问题。\n\n虽然系统性的风险识别会随之进行，但这些问题几乎总是存在，因此无需进一步分析即可着手解决：\n\
  \n1.  ***有缺陷的假设：*** 从一个错误的假设开始，通常意味着你很可能在解决错误的问题，而继续这样做意味着你最终会不断修补你的解决方案，这将陷入无休止修复的负面循环。\n\
  \n2.  ***未处理的侥幸脱险：*** 很多时候，小问题被忽略、忽视或未处理，随着时间的推移而堆积起来。偶尔偏离目标可能不会造成重大损害，但如果偏离次数太多，你最终可能会远离你原本想要达到的目标。\n\
  \n3.  ***糟糕的数据：*** 这一点无需解释。过去，不正确、不完整或不准确的数据一直是许多系统和流程的长期腐蚀性问题。\n\n4.  ***概念漂移：***\
  \ 性能下降可能由设计不佳的模型引起，也可能由于 AI 解决方案运行环境的自然变化导致。无论哪种情况，概念漂移都需要对机器学习模型进行持续监控和更新。\n\n\
  5.  ***糟糕的设计：*** 有很多案例中，为了达到预测精度，开发了包含尽可能多因素（或特征）的复杂模型。然而，当同样的模型部署到现实场景中时，却无法满足现实期望。解决方案本身可能很准确，但在严格的现场条件或预期标准下却无法工作。\n\
  \n6.  ***人机交互：*** 交互点，无论是人与系统之间，还是系统与系统之间，始终是薄弱环节。故障发生的可能性很高。\n\n7.  ***输入故障：***\
  \ 系统的任何输入通道，无论是通过直接的 AI 解决方案还是其他上游/下游系统，都可能容易发生故障。此外，由于这些输入最终会流经更庞大的 AI 系统，它们会带来显著的风险。\n\
  \n## 事前验尸分析\n\n“项目事前验尸”这一术语首次出现在加里·克莱因于 2007 年 9 月发表在《哈佛商业评论》的文章中。正如加里所写：“事前验尸是事后验尸的假设性对立面。”^(¹⁹)\n\
  \n一般来说，这是一种项目管理策略，项目团队设想项目失败，然后反向推导，确定可能导致失败的原因。然后利用这种推导来预先处理风险。\n\n然而，在风险管理语境下，我将互换使用这个术语（*事前验尸*）来代表一种更复杂、更偏向工程的方法论，即*失效模式与影响分析*，也就是`FMEA`。\n\
  \n\n\n### 事前验尸分析的关键部分\n\n事前验尸分析（或称 FMEA）通常由跨职能的主题专家团队完成。开展这项活动的最佳形式是举办研讨会。\n\n在研讨会期间，团队会深入分析设计及流程的实施或变更情况。此活动的主要目标是找出产品或流程（或两者）每个环节中存在的弱点和风险。一旦识别出这些风险，就要采取行动加以控制和缓解，并验证一切均在掌控之中。\n\
  \n事前验尸分析记录包含以下 16 个栏目：\n\n1.  **流程步骤或系统功能：** 此栏目简要概述您正在分析的功能、步骤或项目。在多步骤流程或多功能系统中，会有多行内容，每行分别概述这些步骤。\n\
  \n2.  **失效模式：** 对于第 1 栏中列出的每个步骤，您可以识别出一种或多种失效模式。它回答的问题是：流程或解决方案可能在哪些方面失效？或者可能出什么问题？\n\
  \n3.  **失效影响：** 如果发生第 2 栏中识别出的失效，其影响是什么？该失效会如何影响关键流程指标、产品规格、客户需求或客户体验？\n\n4.  **严重度：**\
  \ 此栏目列出了第 2 栏中每种失效的严重度评级。使用第 3 栏中列出的失效影响来确定评级。严重度的典型评分范围为 0 到 10；0 表示最不严重，而 10 表示最严重的后果。\n\
  \n5.  **根本原因：** 对于第 2 栏中列出的每种失效，进行根本原因分析以回答以下问题：是什么导致这个步骤或功能出错？\n\n6.  **频度：** 此栏目是基于失效发生频率的另一个评级。第\
  \ 2 栏中列出的每种失效发生的可能性有多大？频度按 1 到 10 的等级进行排名，其中 1 表示发生频率低，10 表示发生频率高或频繁。\n\n7.  **现行控制：**\
  \ 回答以下问题：目前有哪些控制措施可以防止第 2 栏中列出的潜在失效？有哪些控制措施可以检测故障的发生（如果有的话）？\n\n8.  **探测度：** 另一个评级栏目，用于评估每种失效被探测到的难易程度。通常要问的问题是：探测到每种潜在失效的容易程度如何？您有多大可能性能及时或在它们到达客户之前发现这些潜在失效？探测度按\
  \ 10 到 1 的等级进行排名（注意等级顺序是反向的）。这里，评级 1 表示失效容易被快速探测到，而 10 表示不太可能且很晚才能探测到失效。探测得晚通常意味着问题更严重，因此对晚探测的评级更高。\n\
  \n9.  **RPN（风险优先级数）：** 风险优先级通过将第 4、6 和 8 栏中的三个评级相乘得出。因此，`RPN = 严重度 x 频度 x 探测度`。这样，高的`RPN`值就表明该流程步骤或解决方案功能（如第\
  \ 1 栏所示）存在高风险。相应地，具有较高`RPN`值的步骤或功能需要立即关注并加以修复。\n\n10.  **建议措施：** 在此栏目中，主题专家会建议采取一项或多项措施来处理已识别的风险。这些措施可能旨在降低严重度、减少失效发生的几率、提高探测水平，或者兼而有之。\n\
  \n11.  **措施负责人、目标日期等：** 此栏目从项目管理和跟踪的角度来看至关重要。每项建议措施都可以分配给特定的负责人，并在目标日期前执行以控制风险。\n\
  \n12.  **已采取的措施：** 此栏目列出了为将风险水平（`RPN`）降低到可接受或更低水平而采取的所有措施，无论是建议的措施还是其他措施。\n\n13.\
  \  **新严重度：** 一旦第 12 栏中列出的措施完成，必须重复相同的评估过程，以得出新的严重度水平。\n\n14.  **新频度：** 根据已完成的措施，频度必然发生了变化，因此此栏目记录新的频度评级。\n\
  \n15.  **新探测度：** 由于采取了风险缓解措施，探测度也必然发生了变化；请在此栏目中记录。\n\n16.  **新 RPN：** 由于严重度、频度和探测度评级的变化，风险水平也会发生变化。新的`RPN`以相同方式计算，即`严重度\
  \ x 频度 x 探测度`，并记录在此栏目中。\n\n### 关于评级的更多信息\n\n一些风险分析方法通常只推荐两种评级评估，即严重度和频度。然而，在事前验尸分析中，我们使用了第三种评级——探测度。\n\
  \n问题的早期探测通常能使您在风险变得重大且失控之前将其控制住。这样，您可以立即修复系统，或者启动系统范围的控制措施以保持更高的警惕。无论如何，能够快速有效地探测到失效，对于像人工智能这样的复杂系统来说是一个优势。\n\
  \n对于严重度和频度评级，1 到 10 的评分标准不会因解决方案类型或行业而改变，因为这些通常是通用定义的标准。\n\n在实施事前验尸分析时，您必须采取务实的方法，并选择适当的评分标准。只需确保在整个事前验尸分析过程中，您的定义保持一致即可。\n\
  \n在开展事前验尸分析研讨会时，参与者必须事先设定并商定评级标准，然后针对每种失效模式的严重度、频度和探测度水平进行评定。\n\n\n\n### 利用分析结果\n\
  \n只有当你真正运用时，事前验尸分析的结果才有价值。\n\n每个流程步骤或系统功能都会关联一个或多个`RPN`值。`RPN`值越高，该步骤的风险就越大。在事前验尸演练中，团队必须确定一个`RPN`阈值。这样一来，对于所有`RPN`值超过阈值的步骤，就必须制定风险缓解和控制计划；而对于低于阈值的`RPN`，由于其优先级较低，可以稍后处理。\n\
  \n理想情况下，只要`RPN`不为零，你就应该处理所有可行的步骤。然而，由于资源限制，这并非总是可行。\n\n降低`RPN`的方法之一是降低失效模式的严重度。通常，降低严重度往往需要改变流程步骤或解决方案本身的功能。此外，可以通过增加特定的控制措施（例如引入人工审核或“创建-检查”机制）来控制发生频度。\n\
  \n但是，如果无法降低严重度或发生频度，那么可以通过实施控制系统来遏制故障。控制系统有助于在不良后果发生前检测到其诱因，或者检测到团队可以完全避免的不良故障的根本原因。\n\
  \n将风险量化并可视化，还能让你制定好预案，以便在发生故障时迅速、恰当地采取行动，从而减少暴露于更多故障或不良后果的风险。\n\n在事前验尸演练过程中，团队可能会发现许多未包含在设计好的控制措施或测试用例/流程中的失效模式或根本原因。至关重要的是，测试和控制计划必须始终受到此分析结果的影响。理想情况下，你应该邀请测试和控制团队的成员参与事前验尸分析演练。\n\
  \n我在这种演练中常见的一个问题是，难以或无法找到预期故障的根本原因，而这正是领域专家（SME）应该介入的地方。如果你未能正确识别根本原因，或者做得不好，那么后续行动就不会产生应有的效果。\n\
  \n我看到的另一个问题是缺乏后续跟进，以确保建议的行动得到执行，并且最终的`RPN`降低到可接受的水平。进行有效的后续跟进是项目管理职能，需要勤勉执行，以确保事前验尸分析达到其逻辑终点。\n\
  \n事前验尸分析研讨会有时可能非常耗时。由于时间需求高，可能难以让领域专家充分参与。关键在于，要让那些对潜在故障及其解决方案有知识和经验的人参加这些研讨会。领域专家的参与通常需要管理层的支持，而引导者需要确保获得这种支持。\n\
  \n*你可以在互联网上找到关于 FMEA 的更多优质信息。*^(²⁰)\n\n### 特定行业考量\n\n在事前验尸分析中，严重度-发生频度-探测度（SOD）的评级范围通常在\
  \ 1 到 10 之间。然而，分配给每个评级值的权重是主观的。同一行业中，两家不同的公司可能对同一个失效模式得出略有不同的评级。\n\n为了避免过多的主观性和混乱，一定程度的标准化或评级量表可能会有所帮助。然而，这仅在你需要比较同一行业中不同供应商的两个或多个产品时才必要。如果仅用于内部目的，主观性影响不大，因为在风险和行动项中，相对权重和关键要素仍然得以保留。\n\
  \n尽管如此，在考虑针对已识别风险的控制或行动计划时，特定行业的方法可以（并且应该）有所不同。\n\n任何失效风险都可以通过降低严重度（S）、降低发生频度（O）或提高探测度（D）来控制。如果在银行业这样做，在提升\
  \ S 和 O 评级的同时，D 评级可能需要额外关注以进行改进。鉴于金融业每天处理的交易量，由于影响范围广泛，失效的严重度可能很高，但如果严重度无法降低到一定程度，那么尽早发现并修复就变得非常必要。\n\
  \n然而，在医疗保健行业，严重度本身应该较低，因为探测可能有助于解决问题，但不一定能逆转影响。例如，如果 AI 预测或解决方案导致错误的预后，从而改变了用药方案，那么及早发现这个问题可能会停止该活动本身。但它无法逆转因首次出现这种故障而引发的问题。\n\
  \n同样，在交通场景中，特别是对于自动驾驶汽车，事后才发现汽车的某个机制已经失效，其作用不大，因为事故可能已经发生。在这些情况下，降低严重度和发生频度是更可取的行动方案。\n\
  \n一般来说，如果故障的影响能够随着时间的推移而逆转，或者在系统输出结果与最终用户感受到全部影响之间有足够的时间，那么你应该专注于提高探测度。如果即使只发生一次故障也意味着重大损害，那么必须降低严重度，并且也必须降低发生频度。\n\
  \n改进严重度和发生频度侧重于预防，而改进探测度侧重于修复（治疗）。如果你的行业认为预防胜于治疗，那么就致力于降低严重度和减少故障的发生频度。如果你的行业习惯于事后修复，那么就必须提高探测度。\n\
  \n然而，在我看来，最好同时处理这三个因素，并确保建立稳健的风险管理机制。\n\n### 结论\n\nPearl Zhu 在她的书《数字化董事会》^(²¹) 中说道：“在问题还处于萌芽状态时就感知并处理它们，以免它们发展壮大并变得致命。”\n\
  \n系统化且务实地管理风险是应对 AI 风险的关键。AI 风险的问题在于，由于自动化的力量以及 AI 执行任务的巨大能力，它们具有高度的可扩展性，并且可能迅速失控。\n\
  \n此外，风险管理中的主观性是一个误区。如果你无法量化风险，就无法衡量它；如果你无法衡量它，就无法改进或控制它。这里概述的系统化方法将帮助你量化风险，并在保持用例背景的同时更好地理解它们。\n\
  \n如果你理解风险……并且能针对你的用例更深入、更具体地理解它们，你就可以负责任地开发和部署 AI 解决方案！\n\n脚注 1   2   3   4\n\n\n\
  \n"
- "# 8. 精心教导，严格测试\n\n如果你希望系统表现更佳，就应当更好地教导它；那么，如何验证你是否已将其训练到位？通过更完善的测试！\n\n你会找到许多从开发角度介绍\
  \ AI 的资源；然而，几乎找不到涵盖 AI 系统测试本身的内容。\n\nAI 测试与典型的软件测试截然不同。AI 系统带来的挑战和风险，使得建立严格的流程和测试机制变得更为关键。\n\
  \n大多数 AI 解决方案在两个不同阶段进行学习。第一次学习发生在处理受控数据集并构建基础模型时。第二次学习则是在运行过程中或定期地，借助用户以反馈形式进行的交互来实现。\n\
  \n接下来，让我们探讨如何引导 AI 系统的教导与测试，以规避风险并为其持续改进奠定基础。\n\n## AI 如何学习\n\n首先，让我们了解学习的阶段和方法。这样做能让我们认识到每种方法的优缺点，也有助于理解潜在的漏洞。每一个漏洞都可能导致有风险的输出。\n\
  \n一个复杂的 AI 系统通常遵循两阶段学习机制，而简单的 AI 系统可能只有一个形成阶段。AI 学习的两个阶段是：\n\n*   训练\n*   反馈\n\n\
  训练阶段是首次形成基本机器学习模型的阶段，系统使用这些模型进行训练。这些模型的准确性高度依赖于训练数据集。\n\n相反，当 AI 系统部署后，部分（或全部）数据可以被反馈回系统进行持续学习，我们称之为反馈阶段学习。这个阶段相对容易受到各种持续风险的影响。主要原因是，无论你过去开发的基础模型多么精确，通过反馈系统进入的新数据都可能导致这些模型重新调整，从而变得更好或更差。\n\
  \n然而，很多情况也取决于机器在每个阶段是如何学习的。\n\n### 机器学习类型\n\n机器学习有三种类型：\n\n1.  **监督式**机器学习通常是任务驱动的，其目标是教导和训练算法进行预测。这类目标的一个常被引用的例子是*猫或非猫*识别系统，或者预测明天的天气。垃圾邮件分类和人脸识别是这类学习成果的其他例子。\n\
  \n    该算法包含一个系统需要从一组给定的预测变量（也称为自变量）中预测的目标或结果变量（也称为因变量）。利用这些变量，我们可以生成一个将输入映射到期望输出的函数。我们持续训练过程，直到模型在训练数据上达到期望的准确度水平。\n\
  \n2.  **无监督式**机器学习是高度数据驱动的，其目标是从数据中识别模式和聚类。通过输入未标记的数据，算法期望输出分组或聚类的数据集，以供进一步分类，通常由监督者完成。\n\
  \n    这里，我们没有任何需要预测或估计的目标或结果变量。输出主要是聚类或分组的，可以作为推荐或分类请求使用。想想 YouTube 或 Netflix 的推荐，它们会监控你的视频观看模式，将相似视频聚类在一起并向你推荐。\n\
  \n3.  **强化式**学习简单来说就是*从错误中学习*。虽然监督式和无监督式学习主要指示特征标签的存在与否，但这种方式有所不同。\n\n    通过强化学习机制，我们让算法进行预测，然后如果预测正确就给予奖励，如果错误则给予惩罚。基于这些奖励和惩罚，随着时间的推移，算法会调整其性能以减少错误并持续预测。当模型达到合理的准确度水平时，强化训练停止。\n\
  \n## 训练中应避免的五个错误\n\n精心教导是持续获得卓越表现的基本要求。然而，传统（和当代）的数据分析或统计方法容易犯一些严重的错误。这类问题的统称通常被称为*垃圾进，垃圾出*。\n\
  \n### 没有足够的数据进行训练\n\n你可能会问：“有效训练 AI 系统需要多少数据？”\n\n我会说：“这取决于情况！”\n\n这可能是一个令人失望的答案，尤其是当你正处于机器学习阶段的关键时刻。然而，这确实取决于你当前问题的复杂性以及你计划使用的算法的复杂性。无论哪种方式，最好的方法是使用实证研究来得出一个最优数量。\n\
  \n你可能希望在收集所需数据时使用标准抽样方法，并可能希望使用标准统计分析工具中使用的标准样本量计算器。然而，由于机器学习算法的性质，数据量往往不足。你很可能需要比标准样本量计算公式告诉你的更多的数据。\n\
  \n数据过多可能不像数据过少那样是个大问题。你必须确保有足够的数据来合理捕捉输入参数（也称为特征）内部以及输入与输出之间可能存在的关联。\n\n你也可以利用你的领域专业知识来合理评估需要多少数据才能完整展现你的业务问题的一个完整周期。它应该涵盖所有可能的季节性和变化。\n\
  \n借助这些数据开发的模型，其质量取决于你拥有或提供用于训练的数据的质量，因此请确保数据充足可用。如果你觉得数据不够（在当前大数据世界中这可能是罕见情况），不要急于求成；等到你获得足够的数据再说。\n\
  \n### 未清理和验证数据集\n\n如果数据质量差，数据过多也无用，这可能意味着以下三种情况中的一种或多种：\n\n1.  **数据有噪声**，即存在太多相互矛盾和误导性的信息。存在混杂变量或参数，而关键变量缺失。清理这类数据需要额外的数据点，因为当前数据集不可用，因此不够用。\n\
  \n2.  **数据是脏数据**，即多个值缺失（尽管参数可用），或者数据存在不一致、错误，以及同一列中数值和分类值的混合。这类数据需要领域专家进行仔细的手动清理，并且通常需要重新验证。根据资源可用性，你可能会发现获取额外数据比清理脏数据更容易。\n\
  \n3.  **数据不足或稀疏**是指实际值的数据点非常少，而数据集的很大一部分充满了*空值*或零值的情况。\n\n数据集中存在的问题类型通常无法从数据集本身清晰看出，这就是为什么我总是建议在开始时进行探索性分析和可视化。进行这第一步处理不仅能让你对数据质量有一定信心，还能告诉你是否有遗漏之处。\n\
  \n基于可视化表示，一个有趣的问题是——你看到了你期望看到的东西吗？\n\n如果答案是“否”，那么你的数据可能质量较差，需要清理。\n\n如果答案是“是”，那么它可能有助于发现一些初步见解。数据集的这种验证对于继续推进至关重要，你绝不应跳过这一步。\n\
  \n\n\n### 数据分布不够广泛\n\n拥有大量数据并不总是好事，除非它能代表所有可能的用例或场景。如果数据缺乏多样性，则可能导致未来的问题——你会增加在低频高风险场景中失败的概率。\n\
  \n对于传统的预测分析而言，随着你获取越来越多的训练数据，会存在一个收益递减的临界点。你的数据科学团队通常能凭经验发现这个点。\n\n然而，由于机器学习是一个归纳过程，你的基础模型只能覆盖它在数据中见过的情况。因此，如果你遗漏了长尾（即边缘案例），你的模型将无法支持它们。这仅仅意味着当那种场景出现时，你的\
  \ AI 会失败。这是你的训练数据应该具有足够分布广度以代表真实总体的唯一且最关键的原因。\n\n### 忽略“险些失误”与“人工干预”\n\n在初始训练阶段，很难识别出“险些失误”和被忽略的数据点。然而，在带有反馈的持续学习循环中，密切关注“险些失误”以及人工或机器的干预变得至关重要。\n\
  \n当你首次部署 AI 系统时，它只有一个基础模型来支配 AI 的性能。但随着系统持续运行，反馈循环会输入实时数据，系统开始实时或定期地进行调整。\n\n如果模型在预测或计算任何输出时仅差一点点，从而导致决策发生改变，这就是一个“险些失误”。例如，在贷款审批系统中，如果\
  \ 88.5%的分数意味着“`贷款批准`”，而 88.6%的结果却是“`贷款拒绝`”，那么这种情况就是一个“险些失误”。从技术和纯统计学的角度来看，这是正确的；然而，从现实生活的角度来看，误差范围可能扮演着重要角色。如果受到影响的当事人（如贷款申请人）提出异议，决策被改变的可能性就更高。因此，这类数据点尤其值得关注，你不应忽视它们。\n\
  \n同样的情况也适用于人类操作员监督 AI 系统输出并决定进行干预时。人类操作员覆盖 AI 输出的情况应始终被视为特殊场景，并且你必须将其反馈给训练模型。这些场景中的每一个要么凸显了基础模型的不足，要么提供了以前从未出现过的新情况。忽视干预行为会随着时间的推移降低模型性能。\n\
  \n### 混淆相关性与因果关系\n\n在统计学中，我们常说“相关性并不意味着因果关系”。这通常指的是无法合法地从输入变量和输出之间推导出因果关系。由此得出的结论可能仍然不是错误的或不真实的，但未能建立这种关系往往是潜在问题的指标。\n\
  \n类似地，你模型的预测能力并不一定意味着你已经在模型中建立了精确的因果关系。你的模型很可能混淆了输入参数的相关性，并基于此预测输出。\n\n你可能会想：“只要它有效，就无关紧要。”然而，这种区别很重要，因为许多机器学习算法仅仅因为存在高相关性就选取参数。基于相关性来确定因果关系可能非常棘手，并可能导致矛盾的结论。能够证明确实存在因果关系会好得多。\n\
  \n然而，如今，开发者和数据科学家仅仅依赖于统计模式。他们中的许多人未能认识到，这些模式仅仅是海量数据中的相关性，而非支配真实世界的因果真理或自然法则。\n\n\
  那么，你该如何处理混淆呢？\n\n试试这个——在初始训练和模型构建期间，一旦你发现相关性，不要过早下结论。花时间寻找其他潜在因素，找到隐藏因素，并验证它们是否正确，然后再下结论。\n\
  \n## 用测试来补充训练\n\n如果你必须信任某人的表现，有两种方法可以做到。有效地训练他们，以保证他们的表现。如果你对训练有所怀疑，哪怕是一点点，那么就严格地测试他们，以确保更好的表现。而且，如果你两者都做，即精心训练并严格测试，你就可以对表现充满信心，这为信任奠定了更好的基础。\n\
  \n因此，当你专注于更好地训练你的 AI 系统时，用更严格的测试来补充这种训练也是有意义的。\n\n更好的训练意味着机器学习没有导致过拟合或强制拟合模型。然而，如果你怀疑可能发生了这种情况，你应该设计你的测试来捕捉它。你可以很容易地使用全新的数据集来做到这一点，尽管这些数据集需要与应用相关，并且能代表现实场景。\n\
  \n如果你怀疑训练不够充分，可能没有涵盖所有可能的场景（包括有风险的场景），那么就创建测试，将你的 AI 系统置于这些条件下，并验证系统是否按预期运行。\n\n\
  设计你的测试来捕捉训练期间可能出现的潜在陷阱。这些测试还应反映你的 AI 系统必须运行的条件以及你将如何确认。如果你的 AI 通过了这些测试，那么你就知道它足够好了。\n\
  \n你经常会遇到黑盒 AI 系统，或者至少是其中的一些组件，它们就是这样的。由于你理解这些系统或子系统内部运作的能力有限，你唯一的盟友就是精心的训练和严格的测试。测试应该揭示任何潜在的威胁和机遇，如果一切顺利，你将对这个黑盒的功能有合理的信心。\n\
  \n简而言之，认真对待严格的统计测试，你就可以（在生产中）顺利运行了。\n\n## AI 测试不是软件测试\n\n是的，AI 系统测试与软件测试不同。\n\n\
  传统的软件测试完全是黑白分明的活动。你有一个固定的测试用例（带有预期响应），你用设计好的输入来测试它。如果你发现问题，你记录下场景并修复它。\n\n然而，对于机器学习来说，情况则不同，因为在大多数情况下，几乎不可能回溯算法的决策过程。此外，测试\
  \ AI 系统通常会引发大量（甚至过多的）场景，这在传统测试中并不常见。\n\n在传统的软件测试中，当我们执行操作时，我们期望每次重复时都得到相同的结果。而对于\
  \ AI，它可能无法 100%地重现相同的结果。\n\n此外，由于你无法逐个用例地进行测试，你可能需要向系统抛出大量场景，然后观察结果。如果正确输出的比例足够高，那么你就可以相信它（在大多数情况下）会正常工作。这很像我们的学校考试，我们可能得不到\
  \ 100 分，但只要分数超过特定百分比，就意味着我们足够优秀，可以升入下一个级别。\n\n\n\n## AI 测试的核心顺序\n\n任何测试，无论是传统软件测试还是\
  \ AI 测试，都应从一个前提开始——在通过测试证明并非如此之前，始终认为存在一个问题（或缺陷）。\n\n典型的软件测试顺序非常合乎逻辑，并且由于其局限性，几乎是不可改变的。\n\
  \n然而，在 AI 测试的情况下，顺序是可以改变的，而这种改变完全有可能成就或毁掉系统性能。如果你没有按照正确的顺序测试 AI，可能会显著增加业务的**风险敞口**：\n\
  \n1.  **首先决定测试什么，即定义你的关注总体**\n\n    你可能不需要定义测试用例或单个测试场景；但是，你需要指定测试数据集的样子。你需要定义测试数据集的整体特征、广泛的实例集合，以及可能的话，从哪里获取它？这些数据必须具有代表性，这样，如果你的系统在测试中表现出良好的性能，你才会批准它上线。\n\
  \n2.  **定义如何测试，即测试标准**\n\n    测试标准应该相当直接明了地定义——你将如何测试你的 AI 系统。你会做些什么来测试它？\n\n3.\
  \  **决定你将接受什么，即量化的验收标准**\n\n    定义你准备签字认可的最低可接受性能。定量地描述，对你来说，什么样的性能水平才算足够好。定义“足够好”对你意味着什么；一旦你定义了它——就坚持下去！\n\
  \n4.  **完成 AI 测试**\n\n    一旦前面三个步骤完成，就该进行测试了。执行所有测试，并根据之前设定的标准接受或拒绝系统。一旦你确定了验收标准，就避免讨价还价。作为人类，我们倾向于爱上自己投入了时间和精力的事物，即使它全是垃圾。用经济学术语来说，我们称之为**禀赋效应**。你应该远离它！\n\
  \n简而言之，决定测试什么——如何测试——接受或拒绝什么——然后进行测试。坚持这个顺序，你就没问题了。\n\n如果你发现在测试之后才决定或协商验收标准，那么你就做错了。避免让你的业务暴露在高财务和声誉风险之下；这些风险是不可逆的。\n\
  \n无论你测试多少，都不要过度测试，不要设置过高的通过门槛，以免错过一个好的解决方案。\n\n### 测试概念漂移\n\n“概念漂移”中的“概念”指的是输入和输出变量之间未知且隐藏的关系。数据的变化可能由各种现实场景引起。\n\
  \n训练和反馈可能会动态地发生变化。这些变化非常多样化，并会影响基础模型的可靠性。数据随时间变化，从而影响静态编程（或假设）关系的问题，在机器学习的其他几个现实场景中也很常见。在机器学习领域，这种情况的技术术语是“概念漂移”。^(²²)\n\
  \n很难识别概念漂移可能发生的场景，尤其是在训练的第一阶段，即当你开发基础模型时。因此，更明智的选择是安全地假设概念漂移会发生，并测试模型是否存在潜在的漂移。\n\
  \n有多种统计方法可用于在流程早期检测概念漂移。虽然我们不会讨论这些用于概念漂移测试的分析方法，但只需在互联网上搜索“testing for concept drift”一词，就能获得足够的工作资料。\n\
  \n简而言之——你应该确保在部署前以及持续地测试你的模型是否存在概念漂移。\n\n### 测试交互问题\n\nAI 系统并非独立存在，它们经常与多个其他系统以及人类进行交互。在每个交互点，都存在失败或性能不佳的可能性。我常说，连接两个异构系统的每一个环节都是一个薄弱环节。\n\
  \n为了发现这些弱点并能够修复它们，你需要测试所有那些点的系统交互。\n\n测试人类与 AI 系统交互有两个目标。首先是验证主要与 UI 和 UX 相关的可用性问题。其次是证明在多用户环境下的性能。\n\
  \n第一部分通常通过标准的 UI/UX 测试就能轻松实现。然而，对于第二部分，事情可能会变得有点复杂。正如前面章节提到的，AI 性能测试不是基于点的场景测试。相反，你向它输入大量数据，并期望其中合理比例的数据在可接受的范围内，这为你的交互测试增加了一定程度的复杂性。接下来是每个用户的可重复性和可再现性。\n\
  \n在统计分析中，我们称之为*量具 R&R*，即量具重复性和再现性。你会合理地期望一个人类操作员在任何给定的场景集合下都能反复展示相同的性能。你也会期望他们每次重复这些场景时都能产生相同的结果。\n\
  \n当你将这一点与一个基于可接受比例结果工作的 AI 系统混合时，情况会发生巨大变化。在这里，你处理的是系统变异（尽管是可接受的）加上人类变异（同样在可接受范围内）。当这两种变异应用于多个系统和多个参与其中的人类时，意味着整个操作机制现在表现出显著的性能差异。尽管在某种程度上完全可以接受，但这会带来相当大的风险，主要是因为任何一个参与者的性能出现微小变化都可能导致整体性能不佳。\n\
  \n这就是为什么你的 AI 系统测试的一部分也应该关注系统中所有人类参与者的量具 R&R。当然，当人员变动时，你必须对新加入者重新进行这项测试。这可能是一个痛苦的过程。然而，为了保持\
  \ AI 系统的高性能水平，这是一个很小的代价。\n\n当测试多个软件系统之间的交互时，你会面临同样程度的挑战，例如，你的 AI 与 CRM 系统、ERP 系统或故障单系统交互。也可能你的\
  \ AI 与你无法控制的系统交互，例如客户或供应商的系统。至关重要的是，你要以同等的严谨和勤奋来测试这些交互，以发现任何系统性问题或重复性与再现性问题。\n\n\
  关键不仅在于部署前测试这些交互，还要持续、定期地进行这项测试。有了如此复杂的系统之系统，每当一个参与者（人类或系统）发生变化时，动态就会改变，你的测试也必须随之改变。\n\
  \n### 它可以成为你信任的基础\n\n随着技术日新月异，它正在将强大的工具交到那些不理解其工作原理的人手中。这正在创造重大的商业和社会风险。\n\n开发者和数据科学家越来越脱离对他们所使用的工具和所创建的系统复杂性的理解。\n\
  \nAI 系统意味着一个黑箱，这正成为一种普遍接受的说法，而信任这个黑箱的唯一可靠方法将是——细致地训练它并严格地测试它！\n\n严格测试的主要目标是建立信心并增加对未来性能的信任。\n\
  \n脚注 1\n\n"
- '# 第三部分 缓解措施


  ## 最小化风险的影响




  '
- "# 红队：AI 监督之道\n\n如何阻止攻击者？像他们一样思考和谋划！\n\n我们熟知监督式机器学习的概念，但监督 AI 本身却鲜有深入探讨。本章将聚焦于对\
  \ AI 解决方案的持续控制。我们将讨论监督 AI 涉及哪些内容，并重点阐述红队概念在 AI 解决方案中的应用。\n\n## 什么是红队？\n\n在军事术语中，“红队”是指利用自身技能模拟潜在敌人可能使用的攻击手段和战术的团队。而扮演防御角色的另一组则被称为“蓝队”。\n\
  \n网络安全领域沿用了这些术语，其含义相同。\n\n红队是一个独立的团队，通过扮演对手或攻击者的角色，挑战组织以提升其防御能力和有效性。通俗地说，这是一种道德黑客行为，用于测试组织在面对真实攻击时的表现。\n\
  \n如果有效实施，红队不仅能暴露技术基础设施中的漏洞和风险，还能发现人员及物理资产方面的隐患。\n\n你常会听到一句话：“最好的防守就是进攻。”建立红队正是构筑这种良好防御的正确一步。无论是复杂的\
  \ AI 解决方案，还是基础的技术方案，红队演练都能为企业带来竞争优势。\n\n一次全面的红队演练可能涉及渗透测试（也称 pen testing）、社会工程学和物理入侵。红队可以根据需要，选择执行全部或部分组合，以最合适的方式暴露漏洞。\n\
  \n既然有红队，那必然也存在蓝队。这一假设源于系统开发仅在内部进行的传统前提。然而，对于 AI 系统，情况可能有所不同，你的实际蓝队可能是你的技术供应商。\n\n\
  ## 监督 AI 的必要性\n\n迄今为止，企业（很少）仅将红队用于典型的网络安全工作。然而，将其用于监控 AI 系统尚未普及。这很可能是因为许多企业仍将 AI\
  \ 系统视为另一个普通的 IT 系统。\n\n但随着复杂 AI 系统的出现，单纯 IT 系统与其他业务流程之间的界限正变得模糊并逐渐消失。这种系统的普及意味着你的\
  \ AI 系统不再仅仅是一个软件，而是你业务流程中不可或缺的一部分。一个快速测试可以帮助区分系统是否是核心部分。问问自己：“如果系统因任何原因完全停止，你的业务流程还能照常运行吗？”如果答案是否定的，那么可以肯定你的系统已经足够深入渗透。\n\
  \n拥有一个功能性的红队也意味着你可以识别出可能导致 AI 系统出现灾难性行为的渐近情况。从长远来看，能够识别这些情况对于构建可靠的运营至关重要。此外，不应低估一个一心想要搞垮你的\
  \ AI 系统并造成损害的强大对手。\n\n由于大多数 AI 解决方案如同黑盒，定期对其进行监督变得越来越重要。不监控这些系统可能意味着问题在未被察觉的情况下发生。如果稍后才发现问题，那将是个大问题；如果直到严重后果出现才注意到，那将是一场巨大的麻烦。\n\
  \n实际上，我们在固定的数据集上训练机器学习系统。然而，在现实中，我们几乎总是将这些系统暴露在训练数据分布之外的数据（有人称之为长尾数据）中。你如何确保 AI\
  \ 系统能在真实数据上稳健运行？\n\n“观望”不能成为这里的方法。有些机器学习模型可以即时训练，主要是作为无监督学习机制。你可以将新的训练输入反馈给系统，然后系统持续优化。然而，虽然这有时可能足够好，但在其他时候，失败可能是灾难性的。\n\
  \n客户有时可能容忍一百个无用的产品推荐。但他们绝对无法容忍一个可能导致危险或让他们损失大笔金钱的错误。商业用户在这方面也不例外。\n\n训练 AI 系统在必要时回退到人工干预可以是一种策略。然而，有些人可能会质疑其有效性，因为这似乎与\
  \ AI 存在的初衷相悖。\n\n仅仅依靠微调机器学习模型以产生越来越精确的输出是不够的。这永远无法让你清晰了解实际的风险敞口。\n\n## 为什么不使用对抗性\
  \ AI 测试？\n\n对此的简短回答是：因为对抗性 AI 测试仅仅是一种技术测试方法，即让一个 AI 与另一个 AI 对抗。然而，红队概念是跨领域的。不仅仅是跨领域，它在本质上是跨部门的。\n\
  \n如果只是从技术角度进行对抗性测试，红队可能会尝试找到一张能够扰乱图像识别 AI 系统输出的图片。通过自动化机制也能有效达到同样的结果。\n\n然而，一个真正的红队不会仅仅停留在找到一张破坏系统的图片。他们会更进一步，创建或篡改图片以实现这一目标，而这正是对抗性\
  \ AI 测试可能不足的地方。在这种情况下，GAN（生成对抗网络）系统可能显得范围更窄，而红队的工作范围则要广泛得多。\n\n红队的最终目标是产生自然且发生概率非零的有问题的输入或情况。\n\
  \n企业总是将物理安全和技术安全割裂开来。负责 IT 系统（网络、应用程序等）的人员与负责物理安全（如摄像头、运动传感器和门锁）的人员并非同一批人。你可能拥有最好的网络防御措施。但如果你的物理安全薄弱，那么最终，有人会通过那条路进入你的系统。反之亦然。\n\
  \n因此，在这个设备与系统高度互联的世界里，打破这种孤岛状态是必要的。\n\n## 唯有 AI 监督才能暴露这一点\n\n许多为 AI 系统提供输入的机器学习技术依赖于在提供的数据集中寻找相关性。无论是训练数据集还是持续的反馈数据集，它们大多会被以相同的方式处理。监督你的\
  \ AI 系统可以在多个层面带来益处。\n\n\n\n### 突出统计谬误\n\n总体而言，这些分析技术依赖于数据集的汇总统计。这种方法可能带来严重问题，因为具有不同特征的多个数据集可能拥有相同的汇总统计。1973\
  \ 年 2 月，F. J. 安斯库姆发表了一篇期刊文章，其中写道：“计算机应同时进行计算和绘图。两种输出都应加以研究；每一种都有助于理解。”^(²³)\n\n\
  受安斯库姆四重奏和恐龙数据集的启发，阿尔贝托·卡伊罗于 2016 年 8 月创建了恐龙数据集^(²⁴)。该数据集敦促人们“永远不要只相信汇总统计；始终要将数据可视化”，因为当数据呈现出看似正常的统计结果时，绘制数据图却会揭示出一只恐龙的图案。\n\
  \n欧特克公司于 2017 年发表^(²⁵)了一篇题为《相同统计，不同图形：通过模拟退火生成外观各异但统计相同的数据集》的详细论文，阐述了数据集的这些新特性。\n\
  \n当你通读所有这些参考文献时，你会意识到，从攻击者的角度来看，这简直是一个福音。此外，在现实生活中，这类场景的发生也是可能的。如果没有一支能力强大的红队并定期进行\
  \ AI 监督，这些问题可能会演变成威胁，并在很长一段时间内不被察觉。\n\n### 检测概念漂移\n\n除了统计谬误之外，AI 监督还能帮助你识别一种被称为“概念漂移”的现象。“概念漂移”中的“概念”指的是输入与输出变量之间未知且隐藏的关系。数据的变化可能由各种现实场景引起。\n\
  \n更重要的是，这种数据随时间变化，进而影响静态编程（或假设）的底层关系的问题，在机器学习的其他几个现实场景中也很常见。在机器学习领域，这种情况的技术术语就是“概念漂移”。^(²⁶)\n\
  \n你可能会问：“这为什么是个问题？”\n\n对于一个完全静态的用例来说，这（概念漂移）根本不是问题。然而，在许多用例中，输入参数（或特征）与输出特性之间的关系会随时间变化。如果你的机器学习模型假设数据模式是静态的，那么未来就会出现问题。这种漂移无法预测，因为环境或影响因素的变化可能是随机的或人为制造的。无论哪种情况，如果没有\
  \ AI 监督系统，你永远无法发现它们。\n\n处理概念漂移的主要挑战之一是检测漂移何时发生。对此，我建议采用以下两种方法之一。\n\n当你确定要部署的机器学习模型时，记录其基线性能参数，例如准确率、技能水平等。部署模型后，定期监控这些参数的变化，即定期进行\
  \ AI 监督。如果你发现参数差异显著，这可能表明存在潜在的概念漂移，你应该采取行动加以修复。\n\n另一种处理方法是假设漂移会发生，并因此定期更新模型。\n\n\
  期望数据分布在很长一段时间内保持稳定是不现实的。由于数据随时间变化，机器学习中完美世界的假设在大多数情况下并不适用。随着这些工具和方法的使用增加，这一局限性正成为一个日益严重的问题。\n\
  \n承认 AI 或机器学习可能在很长一段时间内仍处于黑箱之中，并且它们会持续演进，这是解决问题的关键。\n\n### 探索黑箱内部\n\nAI 系统作为黑箱将是一个持续存在且至关重要的问题。尽管存在大量信任问题和质疑，但几乎不可能获取\
  \ AI 系统的内部逻辑。\n\n然而，借助红队的运作和 AI 监督，这个黑箱问题可以稍微以不同的方式处理。\n\n然而，这种方法需要测试团队和红队精心设计实验和场景，然后系统地执行它们。如果操作得当，用户或组织可以合理估计黑箱内部的情况，并据此采取行动。\n\
  \n请记住，这对于试图以恶意方式操纵你 AI 系统的外部方也同样适用。因此，这就是为什么 AI 监督可以在预先或尽早识别这些风险方面发挥重要作用。\n\n##\
  \ 组建你的红队\n\n理想情况下，一个红队至少需要两个人才能有效运作，尽管许多团队规模在 2 到 5 人之间。如果你是一家大公司，你可能需要 15 名以上的团队成员在多个方面开展工作。\n\
  \n根据你部署的 AI 类型，你的红队构成可能会因所需技能组合的不同而改变。合理的结构对于最大化团队效率至关重要。\n\n通常，你需要物理安全专家，例如那些理解并能处理物理锁、门禁密码和其他方面问题的人。你还需要一名社会工程师，通过电子邮件、电话、社交媒体和其他类似途径来诱骗信息。此外，最重要的是，你需要一名技术专家，最好是全栈工程师，来利用你系统的硬件和软件方面的漏洞。这些技能要求是最低限度的。如果你的应用程序和系统过于复杂，那么为各个元素聘请专家并组建一个混合专家团队将是明智之举。\n\
  \n### 红队五大核心技能\n\n任何红队成员所能拥有的最重要技能，就是在执行任务时尽可能地进行负面思考，并尽可能保持创造力：\n\n- **创造性负面思维：**\
  \ 其核心目标是不断寻找新的工具和技术来入侵系统，并最终保护组织的安全。此外，揭示系统中的缺陷需要一定程度的负面思维，以对抗个人内在的乐观主义。\n\n- **深厚的系统级知识：**\
  \ 红队成员必须对计算机系统（包括硬件和软件）有深刻的理解。他们还应该了解当前使用的典型设计模式。\n\n    此外，这种知识不应仅限于计算机系统。它必须跨越多个系统，涉及异构系统。\n\
  \n- **渗透测试：** 这是网络安全领域常见且基本的要求。此外，对于红队来说，它已成为一个基本组成部分和一种标准流程。\n\n- **软件和硬件开发：**\
  \ 拥有这项技能意味着作为红队成员，你可以设想并开发执行任务所需的工具。\n\n    此外，首先了解 AI 系统是如何设计的，意味着你很可能知道其故障点。AI\
  \ 系统始终存在的一个关键风险是“逻辑错误”。这些错误不会破坏系统，但会使系统以某种非预期的方式运行，或可能造成更大的损害。如果红队成员有软件和硬件开发经验，那么他们极有可能见过所有典型的逻辑错误。因此，他们可以利用这些错误来完成工作。\n\
  \n- **社会工程学：** 这自不必说，因为操纵人们去做某些事情，从而引导红队达成目标，是至关重要的。人的因素也是真实攻击者会利用的失败向量之一。人为错误和失误是导致网络问题最常见的原因之一。\n\
  \n\n\n### 内部组建还是外包\n\n接下来一个关键问题是——你应该招募团队成员并内部组建红队，还是将红队活动外包？\n\n我们都知道，安全是那些资金通常捉襟见肘的领域之一。这很棘手，因为安全举措的投资回报率很难轻易证明。除非出了问题并且你成功阻止了它，否则几乎无法直观看到或想象其价值。这种局限性使得很难说服他人相信安全投资是值得的，并且你是在明智地投入资金。\n\
  \n因此，对于内部组建还是外包这个问题，一个快速的答案是——这取决于公司规模和预算。\n\n如果你部署 AI 系统是为了长期目标，那么内部红队将是正确的选择，因为他们可以持续参与。然而，这也会带来额外的持续性预算开销。\n\
  \n相反，如果你对自己的整体前景不确定，那么外包是一个更好的起步方式。这样，你可以从长远角度测试内部组建团队的业务可行性。\n\n从隐私和更严格的控制角度来看，内部红队是高度合理的。红队和蓝队的活动更像是一场猫鼠游戏。如果执行得当，每一轮攻防都能提升并丰富双方团队的技能，进而增强组织的安全性。\n\
  \n如果你计划进行更大规模的模拟演练，可以利用外包选项。如果你需要专业帮助，或者为特定策略执行寻找特定技能，那么外包也同样合理。\n\n## 红队的目标\n\n\
  红队的主要目标是通过扮演恶意实体的角色来破坏 AI 系统及其附属流程。红队不应仅仅局限于技术层面，而应作用于涉及 AI 系统的整个链条。这样做可以使他们的努力更有效，因为它能确保上游和下游的流程及系统都得到测试。\n\
  \n红队应考虑整个生态系统，并找出一个坚定的威胁行为者可能如何破坏它。不应仅仅致力于攻破一个 Web 应用或特定的技术应用，而应结合多种攻击向量。这些攻击向量可能超出技术领域，例如社会工程学，或在必要时涉及物理访问。这是必要的，因为尽管你的最终目标是降低\
  \ AI 系统的风险，但这些风险可能来自许多地方并以多种形式出现。\n\n为了最大化红队的价值，你应该考虑基于场景和目标的演练。\n\n如果你是在内部开发模型，那么一旦你的主要机器训练完成，红队就应立即启动。如果你是从外部供应商处采购训练好的模型，那么一旦采购完成，就必须立即激活红队。\n\
  \n红队的主要目标是创造或构建一个合理的场景，在该场景下，当前 AI 系统的行为将是不可接受的，如果可能的话，甚至是灾难性的不可接受。如果红队成功，那么你可以将他们的场景反馈给机器训练团队，用于模型的重新训练。然而，如果红队没有成功，那么你可以有相当信心地认为，训练好的模型在现实世界场景中也会表现可靠。\n\
  \n精心设计潜在的问题场景，并将整个 AI 系统暴露于这些情境之下，应该是关键目标之一。此外，这项活动不必完全以数字形式进行。红队可以通过任何可用手段和任何格式来生成这些场景，只要它们在现实生活情境中看起来合理。\n\
  \n红队试图使 AI 系统失效的方法之一，是在主循环或反馈循环中输入垃圾数据，并观察系统如何响应。如果系统足够智能，它会检测到垃圾数据并做出相应处理。然而，如果系统放大了垃圾输入或基于其运行，你就会知道还有工作要做。这些（垃圾）输入可以转化为机器重新训练的训练输入。\n\
  \n红队还可以致力于创建和提供合成输入，并观察系统如何响应。然后，他们可以利用输出来检查 AI 系统的内部机制。基于进一步的理解，可以使合成数据更加逼真，以测试系统的极限、响应和整体行为。一旦你识别出失效情况，修复起来就更容易了。\n\
  \n红队不一定非要试图破坏系统。有时，他们可能仅仅通过输入错误的输入或修改参数，来导致系统持续学习发生漂移，从而使其在更晚的时候失效。请参考前面章节讨论的概念漂移现象。虽然概念漂移大多是自然且正常的，但它也可能是蓄意制造的。\n\
  \n你的 AI 系统从另一个软件或人类获取输入的点，可能是一个薄弱环节。AI 系统的输出形成另一个 API 或 ERP 系统输入的点，也可能是一个薄弱环节。从本质上讲，这些环节是整个价值链中高度脆弱的点和薄弱环节。\n\
  \n每一个连接两个异构系统的环节都是一个薄弱环节！\n\n红队应瞄准并识别系统中所有此类薄弱环节。这些薄弱环节可能存在于两个软件系统之间，也可能存在于软件-硬件或软件-人类交互的边界上。\n\
  \n## 红队不是为了测试防御\n\n红队的核心目标不是测试你的防御能力。它的目标是尽一切可能，以尽可能多的方式，通过跳出固有思维模式来破坏功能性的 AI 系统。最终，这应该会在过程中强化整个组织。\n\
  \n拥有这样更广泛的授权，可以使红队能够遵循直观的方法论，为组织开发一个可靠且持续学习的学习系统。这是解决 AI 系统控制中许多严重问题的一种有前景的方法。\n\
  \n然而，请记住，红队活动并不等同于负责生成测试用例的测试团队。测试用例通常遵循明确定义的失效条件，而红队的目标则宽泛得多，方法未定义，且常常是无限的。\n\n\
  简而言之，你的红队应在三个关键参数上评估你的 AI 系统：\n\n*   失效向量后果的严重性\n*   已发现情况的发生概率\n*   早期发现失效的可能性\n\
  \n\n\n## 红队已就绪，下一步是什么？\n\n一个功能完善的红队不仅仅是为了发现 AI 系统中的漏洞。它还在于提供完整的指导手册和行动方案，以改进这些薄弱点、堵住漏洞，并在此过程中持续强化系统。\n\
  \n此外，一次有效的红队行动不会在发现系统弱点后就结束。这仅仅是开始。红队的下一个角色是提供修复协助和重新测试。更重要的是，只要有必要，就要持续这样做。\n\n\
  在你的蓝队宣布他们已准备好进行下一轮测试之前，可能涉及大量工作，包括理解发现的问题、其影响、可能性、严重性和可检测性，此外还要执行建议的修复措施、用新数据重新训练模型，以及许多其他工作。\n\
  \n红队发现弱点、蓝队修复弱点的整个过程必须是一个持续的过程，并定期进行检查和平衡。要避免为了做而做一次的诱惑。相反，要确保你定期且持续地执行。这样做将帮助你监控每个方面的风险评分，并观察你在已建立的风险缓解计划上的进展。你的目标应该是将列表中每个风险项目的风险评分降低到接近零。\n\
