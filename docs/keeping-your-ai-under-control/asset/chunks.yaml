    there might be an intermediate alternative.


    How about insurers covering not the total risk but only the damage control costs?
    For example, if something goes wrong with your AI system, and it causes your process
    to come to a halt, you will incur two financial burdens. One would be on account
    of revenue loss and others to fix the system. In this case, while the revenue
    loss can be significant, system fixing cost may be relatively lower, and insurance
    companies may start by offering only this part of the cover.


    Insurers may also explore *Parametric Insurance* to cover some of the known or
    fixed cost issues.


    Aggregators can combine the risks of a cluster of several companies matching specific
    criteria. They can cover part of those risks themselves and transfer partial risks
    to the insurers.


    Either way, it is not a complete deadlock to get this going.


    ## Why the fixation on AI insurance?


    Implementing AI solution means you can do things at a much larger scale. If you
    have been producing *x* widgets per day without the use of AI, you may end up
    creating 100*x* widgets with AI.


    This type of massive scale also means, when things fail, they would also fail
    magnanimously. The issues 100x failure can bring upon a business could be outrageous.
    They typically not only result in revenue losses but also put a burden on fixing
    them, making alternate arrangements while they are being repaired, and so on.


    In Chapter [2](#483319_1_En_2_Chapter.xhtml), I discussed a case study on Australian
    Telco’s failed automation. If they have had AI insurance, perhaps things would
    have taken a different turn. The insurance approval process would have forced
    them to perform due diligence on their design and process up front, or else, they
    could have claimed for their losses under insurance. Either way, it would have
    been a good outcome for shareholders of the company.


    This scale is dangerous, and therefore having an AI insurance would make sense.
    Additionally, with this option in place, it will also make people more responsible
    for developing and implementing AI solutions. These options would also contribute
    toward responsible AI design and use paradigm.


    And more importantly, every human consumer or user would want some level of compensation
    at some point in time when AI solutions go wrong. They won’t accept it if you
    say AI is at fault. It is a fair expectation to be compensated. The question is,
