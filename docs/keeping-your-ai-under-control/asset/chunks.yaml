    Once it is over, your stakeholders will be interested in real, measurable business
    value.


    If you have not identified the key metrics up front and linked to the outcomes
    of the project, this could be an issue. You should identify and validate the impact
    beforehand, way before you start the project so that you will know what to expect
    and when. It will also enable you to pull the plug and stop the deployment if
    it is not adding any value to your crucial metric or not going as planned.


    Implementing a “cool” technology in your business may give you some bragging rights,
    but it wouldn’t contribute to your top line or bottom line in its right. There
    should be a clear linkage of each business metric with each planned initiative.
    You must establish this linkage as a first step when you start the AI project.
    Establish how you will measure the change in metric, what will be an acceptable
    change, and what will be your lower limit.


    Having this measurement system will help you march forward or to take a pause
    and rework as you progress through.


    ## Defining your acceptance criteria


    Before deploying your AI solution, you must set your acceptance criteria for the
    deployment outcomes. Doing this beforehand helps in avoiding any confirmation
    bias and also can save you from facing endowment effect.


    Endowment effect states that people are more likely to retain an object they own
    (say AI solution) than acquire that same object when they do not own it.


    So, once you deploy the AI solution, you are more likely to relax your acceptance
    criteria and accept a subpar solution, simply because you’ve now invested resources
    in implementing it. Once this happens, you will have to live with dysfunctional
    or a poor-quality AI solution, forever. You may argue that there would be ongoing
    improvements to it, but the fact is, you would always find yourself catching up,
    and it is not a good situation to be in.


    If you accept a subpar solution with the hope to improve it later as you proceed,
    you will end up playing catchup with technology, and it is not good.


    Defining acceptance criteria to fit the output is nothing but retrofitting and
    can put you in massive intellectual debt. Intellectual debt is a situation, where
    you accept the answer, but don’t know how it was derived and expect it to be known
    later point in time. Getting into intellectual debt can increase your risk exposure
    massively and put you in weakest of spots.


    If you want to de-risk your AI deployment, define your acceptance criteria first
    and stick to it. If results are not stellar or do not meet minimum passing/acceptance
    criteria, reject the solution and do over. It is better than exposing your business
    to greater (unknown) risks.


    ## Building the capability for execution


    Deploying AI solutions demand a wide range of skills and in-depth knowledge of
    several aspects of the business to see successful outcomes. If you do not have
    the right capability within the in-house team, it could become an impediment.
    Nonetheless, if you identify this gap early on, you can work toward bridging this
    gap.


    Generally speaking, it is ideal to have talent and capability available in-house
    as a part of your core business team. However, often, it may not be the case,
    and if that so, getting external support is the next thing you should do. Here
    it would be best if you lay your expectations when looking for external help.
    It is necessary to source the right support.


    There is one thing you should watch out. Your AI vendor(s) should only be responsible
    for the timely and flawless delivery within specified constraints. The product
    and project ownership, as well as accountability, must remain with your internal
    leadership team. If you compromise on this aspect, it may lead to adverse consequences.
    So if this capability (to lead) is lacking, fix it before moving further.


    ## Handling security and compliance aspects


    AI solutions are usually black-boxed and are known for nasty surprises. Their
    detrimental impact could cost you a fortune. They may not only have significant
    operational negative implications but may also cause considerable reputational
    stress. Depending upon the size of your brand and company, the level of risk may
    be higher or lower.


    Note that cybersecurity is slightly different from AI security, and it must be
    acknowledged as you plan for AI solution deployment. Having the right expertise
    at disposal from the beginning will ensure that your implementations do not have
    any loopholes and are defensible from various possible threats.


    Having audit functionality in your AI solution is essential to have. It is not
    only necessary from operational perspective but also required throughout the deployment
    journey. Which means, at any point in time, when deploying solutions as well as
    after you have implemented them, you should be able to see what happened, good
    or bad, how and why. Having a fully compliant, auditable, and retraceable system
    means your business is covered in case of negative consequences.'
