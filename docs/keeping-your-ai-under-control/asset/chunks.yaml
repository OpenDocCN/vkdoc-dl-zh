- fmt: '# Defining Your Problems Correctly


    In the previous chapter, we covered this point partly under *importance of hypothesis*.
    A hypothesis is explanation of something or assumption that needs further validation.


    However, if you do not correctly define the problem in the first place, any assumption
    or explanation formed after that would not help. Correct hypothesis on wrong business
    problem or for the one of the least priority is not going to yield significant
    benefits.


    If you have a right problem to be solved, but you make a mistake in framing the
    hypothesis, it may lead to a waste of resources including other side effects on
    your business; the keyword here is “may.” However, if you choose a wrong (or less
    critical) problem to solve, correctly framed hypothesis won’t help; you are already
    on a wrong path here. Therefore, you will waste resources and have negative impact
    on business; the keyword here is “definitely.”


    The hypothesis is like a vehicle, while problem is like a destination. If you
    have chosen a correct destination (i.e., problem to solve), poor choice of vehicle
    will take you to your desired destination a bit late, or the right choice will
    take you there faster. Either way, you will reach your destination, that is, problem
    will be solved. However, if your destination is incorrect, no matter how good
    the vehicle is, it will be pointless.


    Defining your business problems is mostly a strategic exercise, you can evaluate
    what your goals are and what are the things stopping you from achieving those
    goals. You may treat those impediments as problems to be solved. Once you’ve listed
    your problems, quantified, and validated them properly, you can frame the hypothesis
    for each.


    Remember to define the problem(s) correctly as a foundational requirement before
    jumping to the hypothesis framing stage.


    Problem is your destination, whereas hypothesis is your choice of a vehicle.


    # Validating All the Root Causes


    If your AI solution is addressing your validated root causes, it will most likely
    be the right solution. However, important question would be—how do you know your
    root causes are valid?


    I always recommend a two-way process for root-cause validation. This process ensures
    that you have chosen valid root causes and can make a significant impact on final
    outcome.


    The first part of this involves traditional statistical and analytical methods.
    These methods mainly include statistical hypothesis testing and five-why analysis.
    Applying these techniques would lead you to short-list potential root causes;
    some of them would be significant, while some may not. It would be best if you
    treated these root causes as mere drivers of the main problem. Not all causes
    are sole drivers of the problems, and thus eliminating them may not necessarily
    result in problem-solving. That’s where the second part of the process comes in
    handy.


    ## By Applying Reverse Inference


    The second part involves *reverse inference* technique. This technique helps you
    to demonstrate the logical fallacy (if any) of affirming what you found as a problem
    driver(s). Doing this will either prove that a specific outcome (problem) is generated
    solely by a particular occurrence (of driver) or it will disprove it. If disproved,
    you can be sure that removal or reduction of that root cause is not going to solve
    your problem. On the contrary, if the reverse inference proves that a specific
    occurrence of given root cause is the only definitive path for problem to occur,
    then you can be assured that solving it will solve the main problem.


    For example, a poor customer rating is a result of the contact center interaction
    full of friction, poor quality of product manual, and lousy product quality itself.
    If you apply reverse inference, making contact center interaction frictionless
    *may not* necessarily improve ratings. However, improving product quality can
    *certainly* lead to better ratings. Thus, the primary root cause here would be
    the product quality which you must enhance for significant impact on final outcome
    (ratings).


    ## By Applying the MECE Principle


    Root causes also need to be following *mutually exclusive collective exhaustive*,
    aka MECE principle. That means while the optimum arrangement of all the problem
    drivers is exhaustive and you’ve included all drivers, you do not double count
    drivers of the problem which overlap or have same effects. Ensuring MECE means
    you are optimizing your resources in solving those issues and there is no overlap
    in their work. It will help you avoid deploying two solutions, which address the
    same problem and thus making one of them redundant.


    Validate all the root causes found by using the two-step process, and you can
    be confident that your *AI solution is right*.


    # Planning for Business Continuity


    Being skeptical is the key to de-risking your AI solution deployment.


    Think about business continuity planning (BCP), just in case these solutions do
    not work out as expected. I have seen several projects that do not get delivered
    on time or do not get delivered at all, which calls for operational rollback to
    the status quo.


    This planning is required not only during the deployment but also on an ongoing
    basis. If for whatever reason you were to take the AI solution offline, can your
    business function as usual? If the answer is no, make sure you have an alternative
    in place before deployment starts.


    # Clarifying the Accountability


    From the project management perspective, fixing an accountability is relatively
    easy as there is method to it. However, when something goes wrong during AI solution
    deployments, it is not a black-and-white situation. While the solution may be
    behaving abnormally (indicating vendor’s fault), it may very well be doing that
    due to incorrect training data input to it (indicating your responsibility). Moreover,
    since things can’t be so precise in AI deployments, clarifying and fixing accountability
    is essential.


    Your team must draw out all the potential failure scenarios during the deployment
    and assign accountabilities to respective parties and get their sign-off on it.
    Doing this can ensure that if and when implementation faces hiccups, they are
    fixed without any blame game and waste of additional resources.'
