    ## 从正确的假设开始


    当你想验证自己是否在朝着正确的解决方案努力时，`假设检验`就变得至关重要。


    通常，假设可以被定义为对某事物的解释。它也可以是一种假设或临时想法，一种需要进一步验证的有根据的猜测。


    与我们的信念不同（信念不需要验证或评估），一个好的假设总是可验证或可检验的。它可以被证明为真或为假。


    从科学角度来看，假设必须具有可证伪性，这意味着存在某些条件或场景下，该假设或假定将不成立。


    最重要的是，在检验假设或思考解决方案之前，你必须将假设作为第一步来构建。如果你不遵循这一规则，最终可能会陷入“事后补救”式的解决方案，而这可能无法取得完全的效果。


    你必须将假设作为第一步来构建，然后再进行检验或思考解决方案。


    如果你从一个有缺陷的假设开始，你很可能会选择错误的解决方案，并且多种风险会随之渗透进来。与错误假设相关的一些风险包括：财务损失（通常表现为收入流失或运营损失）、客户忠诚度下降和挫败感增加、品牌声誉受损，以及其他诸多问题。


    你可能会想：“为什么形成正确的假设如此重要？” 让我们来看一个例子。


    ### Acme Solutions 的奇特案例


    Acme Solutions（一家虚构的公司）的产品和服务正在经历显著增长。Acme 的客户群在持续扩大。客户群的增加导致其事件管理支持中心的电话数量不断上升。


    为了跟上增长步伐，Acme Solutions 希望增加其事件管理支持中心的人员编制。然而，考虑到人类的局限性，Acme 热衷于实施人工智能聊天机器人解决方案。通过这样做，他们期望在不增加人员编制的情况下，为客户报告的事件提供足够的支持。客户将能够与聊天机器人互动并报告他们的问题；或许还能立即获得解决方案。


    Acme Solutions 应该启动 AI 聊天机器人项目吗？


    如果这个项目完成了，按照所有标准来看，它能解决 Acme 的问题吗？


    如果你深入思考，就会发现 Acme 的思维过程，也就是他们的假设，存在一个缺陷。他们的假设是：如果我们实施 AI 聊天机器人，我们就能在不增加人员编制的情况下，处理数量不断增长的客户报告事件。


    这有什么问题呢？


    这里的首要问题是“`事后补救思维`”。Acme Solutions 是先从脑海中有了一个解决方案，然后试图将其与当前客户群增长和事件报告增多的问题相匹配。他们在已经选定了解决方案之后才形成假设，这正是假设构建中的根本性错误。


    相反，如果他们首先聚焦于问题本身，解决方案可能会有所不同。如果 Acme 承认客户群的增长导致了事件报告的增加，那么他们的服务或产品本身就存在根本性缺陷。他们的服务或产品中有些内在因素首先导致了事件的发生，而解决这个问题的最佳方式就是消除事件的根源。


    一旦 Acme 意识到解决产品/服务中的缺陷就能消除或减少报告的事件数量，他们对增加人员编制的需求很可能就会消失。当这种情况发生时，对 AI 聊天机器人的需求也会随之消失。


    在这种情况下，如果 Acme 执意推进 AI 聊天机器人项目，他们的事件数量并不会减少。然而，他们将能够响应更多报告事件的客户。现在，无论这个聊天机器人多么智能和高效，一旦客户报告事件，他们就已经对
    Acme 的产品和服务感到不满和沮丧。Acme 的品牌忠诚度已经受到了打击，解决客户问题也无法恢复它；最多只能阻止情况进一步恶化。


    你会注意到，AI 风险并不一定始于 AI 系统或应用程序本身。它们在解决方案构建开始或部署之前，可能就已经悄然潜入了。


    因此，正确地构建假设、用数据验证它，并用统计分析来支持它，是至关重要的。这应该是你评估 AI 解决方案风险时的第一个检查点。


    正确地构建假设、用数据验证它，并用统计分析来支持它，是至关重要的。


    ## 解决方案是否针对了有效的根本原因？


    一旦你构建了正确的假设，并验证了你确实需要一个 AI 系统来为你解决某些问题，那么就该决定：到底需要修复什么？


    通常，我们可以通过以下方式建立问题与其原因之间的关系：


    *   `y = f (x)`


    其中 `y` 是问题，`x` 是该问题的原因或驱动因素（或多个原因或驱动因素），而 `f` 代表使 `x` 导致 `y` 的过程或公式。


    如果我们继续沿用之前 Acme Solutions 的例子，它可能看起来像这样：


    *   `事件报告 = f (糟糕的产品手册，低质量的产品，等等)`


    这意味着事件报告是由糟糕的产品手册引起的，客户看不懂手册，因此产生了问题。这也意味着有时产品手册可能不是唯一的问题，产品质量差也可能导致事件报告。


    所以，如果你的解决方案要解决*事件报告增加*的问题，它无法直接对事件报告本身做任何事。它必须作用于产品手册、产品构建以及其他促成因素。当这些因素得到改善时，事件报告自然会减少。


    如果通过实施基于 AI 的转录器，产品手册的质量得到了提升，它能够自动编写产品手册并验证其内容质量，那会怎样？


    这将是一个有用的 AI 解决方案，它旨在解决一个有效的根本原因。你的 AI 解决方案必须能够解决你主要问题的一个或多个根本原因。这能确保你的问题得到解决。


    如果 AI 解决方案没有针对任何根本原因，或者它只针对影响较小的根本原因，而忽略了影响巨大的那些，这就是一个风险，你必须加以修正。确保你的解决方案是正确的。

    '
- fmt: '# Is the solution correctly trained?


    One of the critical stages in AI solution development is the training of the system.


    If you are working with a sophisticated solution, it will usually follow two-stage
    learning. In the case of a simple AI solution, it happens in only one stage, that
    is, during the model building phase.


    The training stage is where foundations are formed for the first time and the
    solution is trained using those models. Therefore, the accuracy of these models
    is highly dependent on the training dataset.


    If the data fed during the training of the solution is not good enough, it can
    result in several problems later on, and the risk would manifest in different
    forms.


    For example, algorithmic bias may seep in the solution, which will affect all
    the outcomes. Machine learning algorithms identify patterns in the data and then
    build a predictive model based on that pattern. Any rule created or decision taken
    by the AI solution is dependent on that. If those patterns have any bias in them,
    then the solution will amplify that bias and may produce outcomes which in turn
    may reinforce the bias further.


    The risk with such invisible bias is that when the AI solution makes any errors,
    it is tough to diagnose and pinpoint the source of an issue.


    If you suspect the training quality of your AI solution or have doubts over the
    data used for training, the solution has higher risk of problems. On the other
    hand, if you are confident about the source data and training process followed,
    the risk is quite low.


    There is no one and the absolute correct way to train the AI system; variations
    exist. If the confidence level in those training procedures and training data
    is low, then the solution carries high risk. Alternatively, if you are comfortable,
    it may be of low risk.


    # Has the solution considered all scenarios?


    Following the premise of the solution that is *designed right*—one of the critical
    factors in evaluating the risks of the AI solution is the depth and breadth of
    design. You want to understand and be confident that the solution at hand is fully
    equipped to handle the entire spectrum of scenarios that may occur in your business.


    The AI systems do not perform their tasks consciously. They rely on the training
    data, which means system’s reliability and reliability of its outcomes are at
    risk if the input data had problems. These data problems are not just bias and
    quality of the content, but they are also related to the representation of various
    scenarios in the data.


    Typical IT solutions, including AI and alike, are mostly point-based, that is,
    they focus on one goal to achieve with handful other parameters to optimize when
    achieving that goal. Unfortunately, they never can be all-inclusive and holistic;
    it is too much to expect from them.


    Let us take the example of an autonomous car. If you ask the car to take you to
    your destination as fast as possible, it may get you there. Moreover, when you
    get there, you may have broken several traffic rules and have put fellow traveler’s
    life at risk. None of that is acceptable. However, that may happen if your AI
    is too narrow and cannot see the wood for trees.


    Many data with only a few types of scenarios cannot train the solution for real-life
    use cases, and this is a significant risk. Unless your training dataset represents
    all the possible use cases and scenarios, it is useless.


    Since machine learning is an inductive process, the base model used by your solution
    can only cover what it has been trained on and seen in the data. If your training
    has missed low occurrence scenarios (also known as long tail or edge cases), your
    solution will not be able to support them. Your solution will be too risky in
    those scenarios or may fail.


    If the data is missing variety, then it can lead to problems in the future. The
    solution developed with limited dataset and narrow training would be highly risky.
    Also, if the solution design has covered the breadth and depth of data and as
    many scenarios as reasonably possible, risks are lower.


    # Is there an option to stop gracefully?


    A system that is *designed right* will always have redundancy inbuilt. New age
    AI solutions can be highly potent and may result in scalable damage when something
    goes wrong.


    So, ask your development team, or your AI vendors, about the kill switch. Check
    with them the possibility to stop the system gracefully when needed.


    A system without an option to stop gracefully is a highly risky system.


    It may be the case that you have an option to stop the system when needed. However,
    exercising that option is not as simple as pulling the plug. That means you may
    still face a significant risk of jeopardizing business continuity in the process
    if you decide to stop it.


    Ability to stop is not as bad as not being able to stop at all though. In this
    case, you must evaluate your options and alternate plan. What are financial and
    overall business repercussions of those alternative options when invoked? If stopping
    AI system in an emergency would mean you are required to put up 100-member team
    in place to cope with the situation, that could be a significant financial and
    HR burden for you.


    When evaluating your AI solution on this parameter, check the availability of
    kill switch or graceful stop and restart options. If there are no such options,
    it is a high-risk solution. However, if these options are available with some
    level of inconvenience and minor losses, it may be termed as medium-risk solution.
    Although highly unlikely, there may be a solution that is easy to stop and restart.
    If it won’t cost you too many resources while doing that, it may be low-risk option
    and should be the most preferred one, from risk point of view.


    If you cannot stop an AI solution easily and gracefully, it is high-risk solution.
    On the contrary, if you are in full control and can exercise that option easily
    and without any significant loss, it is low risk, that is, better solution.'
  raw: '## Is the solution correctly trained?


    One of the critical stages in AI solution development is the training of the system.


    If you are working with a sophisticated solution, it will usually follow two-stage
    learning. In the case of a simple AI solution, it happens in only one stage, that
    is, during the model building phase.


    The training stage is where foundations are formed for the first time and the
    solution is trained using those models. Therefore, the accuracy of these models
    is highly dependent on the training dataset.


    If the data fed during the training of the solution is not good enough, it can
    result in several problems later on, and the risk would manifest in different
    forms.


    For example, algorithmic bias may seep in the solution, which will affect all
    the outcomes. Machine learning algorithms identify patterns in the data and then
    build a predictive model based on that pattern. Any rule created or decision taken
    by the AI solution is dependent on that. If those patterns have any bias in them,
    then the solution will amplify that bias and may produce outcomes which in turn
    may reinforce the bias further.


    The risk with such invisible bias is that when the AI solution makes any errors,
    it is tough to diagnose and pinpoint the source of an issue.


    If you suspect the training quality of your AI solution or have doubts over the
    data used for training, the solution has higher risk of problems. On the other
    hand, if you are confident about the source data and training process followed,
    the risk is quite low.


    There is no one and the absolute correct way to train the AI system; variations
    exist. If the confidence level in those training procedures and training data
    is low, then the solution carries high risk. Alternatively, if you are comfortable,
    it may be of low risk.


    ## Has the solution considered all scenarios?


    Following the premise of the solution that is *designed right*—one of the critical
    factors in evaluating the risks of the AI solution is the depth and breadth of
    design. You want to understand and be confident that the solution at hand is fully
    equipped to handle the entire spectrum of scenarios that may occur in your business.


    The AI systems do not perform their tasks consciously. They rely on the training
    data, which means system’s reliability and reliability of its outcomes are at
    risk if the input data had problems. These data problems are not just bias and
    quality of the content, but they are also related to the representation of various
    scenarios in the data.


    Typical IT solutions, including AI and alike, are mostly point-based, that is,
    they focus on one goal to achieve with handful other parameters to optimize when
    achieving that goal. Unfortunately, they never can be all-inclusive and holistic;
    it is too much to expect from them.


    Let us take the example of an autonomous car. If you ask the car to take you to
    your destination as fast as possible, it may get you there. Moreover, when you
    get there, you may have broken several traffic rules and have put fellow traveler’s
    life at risk. None of that is acceptable. However, that may happen if your AI
    is too narrow and cannot see the wood for trees.


    Many data with only a few types of scenarios cannot train the solution for real-life
    use cases, and this is a significant risk. Unless your training dataset represents
    all the possible use cases and scenarios, it is useless.


    Since machine learning is an inductive process, the base model used by your solution
    can only cover what it has been trained on and seen in the data. If your training
    has missed low occurrence scenarios (also known as long tail or edge cases), your
    solution will not be able to support them. Your solution will be too risky in
    those scenarios or may fail.


    If the data is missing variety, then it can lead to problems in the future. The
    solution developed with limited dataset and narrow training would be highly risky.
    Also, if the solution design has covered the breadth and depth of data and as
    many scenarios as reasonably possible, risks are lower.


    ## Is there an option to stop gracefully?


    A system that is *designed right* will always have redundancy inbuilt. New age
    AI solutions can be highly potent and may result in scalable damage when something
    goes wrong.


    So, ask your development team, or your AI vendors, about the kill switch. Check
    with them the possibility to stop the system gracefully when needed.


    A system without an option to stop gracefully is a highly risky system.


    It may be the case that you have an option to stop the system when needed. However,
    exercising that option is not as simple as pulling the plug. That means you may
    still face a significant risk of jeopardizing business continuity in the process
    if you decide to stop it.


    Ability to stop is not as bad as not being able to stop at all though. In this
    case, you must evaluate your options and alternate plan. What are financial and
    overall business repercussions of those alternative options when invoked? If stopping
    AI system in an emergency would mean you are required to put up 100-member team
    in place to cope with the situation, that could be a significant financial and
    HR burden for you.


    When evaluating your AI solution on this parameter, check the availability of
    kill switch or graceful stop and restart options. If there are no such options,
    it is a high-risk solution. However, if these options are available with some
    level of inconvenience and minor losses, it may be termed as medium-risk solution.
    Although highly unlikely, there may be a solution that is easy to stop and restart.
    If it won’t cost you too many resources while doing that, it may be low-risk option
    and should be the most preferred one, from risk point of view.


    If you cannot stop an AI solution easily and gracefully, it is high-risk solution.
    On the contrary, if you are in full control and can exercise that option easily
    and without any significant loss, it is low risk, that is, better solution.'
  trans: '

    # 解决方案是否得到了正确训练？


    AI 解决方案开发的关键阶段之一是对系统进行训练。


    如果你正在处理一个复杂的解决方案，它通常会遵循两阶段学习。而对于简单的 AI 解决方案，则仅在一个阶段内完成，即在模型构建阶段。


    训练阶段是基础首次形成的阶段，解决方案会利用这些模型进行训练。因此，这些模型的准确性高度依赖于训练数据集。


    如果在解决方案训练期间输入的数据质量不佳，可能会导致后续出现若干问题，并且风险会以不同形式显现。


    例如，算法偏见可能会渗透到解决方案中，从而影响所有结果。机器学习算法会识别数据中的模式，然后基于该模式构建预测模型。AI 解决方案制定的任何规则或做出的任何决策都依赖于该模式。如果这些模式中存在任何偏见，那么解决方案将会放大这种偏见，并可能产生进一步强化该偏见的结果。


    这种无形偏见的风险在于，当 AI 解决方案出现任何错误时，很难诊断并定位问题的根源。


    如果你怀疑 AI 解决方案的训练质量，或对用于训练的数据存有疑虑，那么该解决方案出现问题的风险就更高。另一方面，如果你对源数据和所遵循的训练过程充满信心，那么风险就相当低。


    训练 AI 系统没有唯一且绝对正确的方法；存在各种差异。如果对这些训练程序和训练数据的置信度较低，那么解决方案就具有高风险。反之，如果你感到满意，则可能风险较低。


    # 解决方案是否考虑了所有场景？


    遵循“设计正确”的解决方案这一前提——评估 AI 解决方案风险的关键因素之一是设计的深度和广度。你需要理解并确信，手头的解决方案已完全准备好处理业务中可能出现的所有场景。


    AI 系统并非有意识地执行任务。它们依赖于训练数据，这意味着如果输入数据存在问题，系统的可靠性及其结果的可靠性就会面临风险。这些数据问题不仅仅是偏见和内容质量，还涉及数据中各种场景的表示。


    典型的 IT 解决方案，包括 AI 及类似技术，大多是点状的，即它们专注于实现一个目标，并附带少数几个参数用于在实现该目标时进行优化。不幸的是，它们永远无法做到包罗万象和全面；对它们期望过高是不现实的。


    让我们以自动驾驶汽车为例。如果你要求汽车尽快将你送到目的地，它可能会做到。然而，当你到达时，你可能已经违反了多条交通规则，并将同行者的生命置于危险之中。这些都是不可接受的。但是，如果你的
    AI 过于狭隘，只见树木不见森林，这种情况就可能发生。


    仅包含少数几种场景类型的大量数据无法针对现实用例训练解决方案，这是一个重大风险。除非你的训练数据集代表了所有可能的用例和场景，否则它毫无用处。


    由于机器学习是一个归纳过程，你的解决方案所使用的基础模型只能覆盖它被训练过并在数据中看到的内容。如果你的训练遗漏了低发生率的场景（也称为长尾或边缘情况），你的解决方案将无法支持它们。你的解决方案在这些场景下风险过高，或者可能会失败。


    如果数据缺乏多样性，则可能导致未来出现问题。使用有限数据集和狭隘训练开发的解决方案将具有高风险。同时，如果解决方案设计涵盖了数据的广度和深度，并尽可能合理地覆盖了多种场景，那么风险就会较低。


    # 是否有优雅停止的选项？


    一个“设计正确”的系统总是会内置冗余。新一代 AI 解决方案可能非常强大，一旦出现问题，可能会导致大规模的损害。


    因此，请向你的开发团队或 AI 供应商询问“终止开关”。与他们核实是否可以在需要时优雅地停止系统。


    一个没有优雅停止选项的系统是一个高风险系统。


    可能的情况是，你有一个在需要时停止系统的选项。然而，行使该选项并不像拔掉电源那么简单。这意味着，如果你决定停止它，你仍可能面临在此过程中危及业务连续性的重大风险。


    不过，能够停止总比完全无法停止要好。在这种情况下，你必须评估你的选项和备用计划。当这些备用选项被启用时，会带来哪些财务和整体业务影响？如果在紧急情况下停止
    AI 系统意味着你需要组建一个 100 人的团队来应对局面，那对你来说可能是一个巨大的财务和人力资源负担。


    在根据此参数评估你的 AI 解决方案时，请检查是否有终止开关或优雅停止和重启选项。如果没有此类选项，则属于高风险解决方案。然而，如果这些选项可用，但会带来一定程度的不便和轻微损失，则可称为中等风险解决方案。虽然可能性极小，但可能存在一种易于停止和重启的解决方案。如果这样做不会耗费你太多资源，那么从风险角度来看，它可能是一个低风险选项，并且应该是最优选的。


    如果你无法轻松、优雅地停止 AI 解决方案，它就是高风险解决方案。相反，如果你完全可控，并且可以轻松行使该选项且没有任何重大损失，那么它就是低风险，即更好的解决方案。

    '
- fmt: '## Is the solution explainable and auditable?


    A software solution, no matter how sophisticated, is always auditable and understandable
    (explainable), unless it wasn’t *designed right*.


    Specific to the AI solution, explainability has been one of the most talked-about
    topics. With so many different approaches to develop AI solutions, it is getting
    increasingly difficult to determine how systems are making decisions. With explainable
    and auditable AI solutions, we should be able to fix accountability as well as
    make corrections and take corrective actions.


    For many industries, AI explainability is a regulatory requirement. For example,
    with the General Data Protection Regulation (GDPR) laws in effect, companies will
    be required to provide consumers with an explanation for AI-based decisions.^([^(12)](#fn12))


    There are growing risks of AI when implemented without adequate explainability.
    These risks affect ethics, business performance, regulation, and our ability to
    learn iteratively from AI implementations. The dangers of unexplained AI aka.
    The black box is real.


    People don’t want to accept arbitrary decisions made by *some entity* that they
    don’t understand. To be acceptable and trustworthy, you would want to know why
    the system is making a specific decision.


    In addition to explainability, being auditable is another key for the right AI
    solution. Whenever something goes wrong, you would need to recover an audit trail
    of the entire transaction. Without being auditable, AI solutions are a significant
    risk. In the absence of verifiable records, regulatory fines may ramp up, and
    financial losses could pile up quickly. Not only that, it also becomes a limiting
    factor for you as a business. Without proper explanation and understanding, you
    cannot improve. Controlled and measurable improvements become near impossible
    when you are in the dark.


    If the solution is explainable and auditable, the risk of wrong decisions and
    further ramifications is lower, and it is better for improvements in the business.


    ## Is the solution tailored for your use case?


    Most of the AI solutions claim to be personalized for the end users. However,
    the critical question is, well before you deploy or start implementing those solutions—are
    they customized or tailored for you?


    For many use cases, geography-specific rules apply. For example, if you are a
    European business, your obligations related to data handling and explainability,
    verifiability, and so on are different as compared to other countries. If your
    business is in China, then facial recognition technology may be acceptable; however,
    for most of the other countries, it would be quite the opposite.


    If you expect your solution to transcribe doctor’s notes and make prognosis or
    decisions based on that, your solution must understand local vernacular, slang,
    and other language nuances. For example, `trash can` (US) vs. `garbage bin` (AU),
    or `sidewalk` (US) vs. `footpath` (AU), mean the same things but have different
    words. The examples given here are quite rudimentary; however, for a sophisticated
    application, language differences would mean a lot.


    In the case of a hiring solution or applicant tracking system (ATS), wouldn’t
    it be relevant if the solution was trained on localized or geography-specific
    data during the initial stage? The hiring pattern and criteria are significantly
    different for different countries, which means the use of a standard solution
    is not a good fit for the purpose.


    Geographical differences also influence user interactions with any software systems
    and so is the user experience. It can be best handled during solution design phase
    if the development team has local experts on board. These experts can provide
    valuable insights and knowledge to make the solution more effective and adaptable
    to the use case by end users.


    Not having a tailored solution for your use case is not a deal-breaker in most
    of the cases. However, it is safer to assume that the relevance is essential to
    think about it and evaluate it.


    If the solution is not tailored to your use case, you may be dealing with high
    latent risk. Evaluating the level of customization can help in estimating potential
    risks.


    ## Is the solution equipped to handle drift?


    The problem of change in data over time and thereby affecting statically programmed
    (or assumed) relationships is a common occurrence for several other real-life
    scenarios of machine learning. The technical term, in the field of machine learning,
    for this scenario is “concept drift.”^([^(13)](#fn13))


    Here the term *concept* refers to the unknown or hidden relationship between inputs
    and outs. The change in data can occur due to various real-life scenarios, which
    can result in degraded performance of your AI solution.


    If the solution is *designed right*, it would have accounted for such drift in
    the first place and therefore would be able to adapt to the changing scenarios.
    However, if that isn’t the case, either your solution would fail, or the performance
    will degrade, which may also mean lower accuracy, lower speed, high error margins,
    and other such issues.


    However, remember that it is difficult to identify any scenario in which concept
    drift may occur, especially when you’re training the model for the first time.
    So, instead of working on pre-deployment detection, your solution should safely
    assume that the drift will occur and accordingly have a provision to handle it.


    Your solution is not capable of handling drifts; you will have to fix it eventually
    on an ongoing basis. It is a costly proposition as you keep spending money for
    constant fixes. The risk of tolerating poor performance for some time exists.
    This risk increases if detection of drift is not apparent. If you, for some reason,
    could not detect the drift for a more extended period, it can be quite risky on
    several fronts. Thus, detection of drift is a critical factor too.


    Check if your solution has accounted for concept drift and if yes, then to what
    extent. Answer to that check would tell you the level of risk.'
