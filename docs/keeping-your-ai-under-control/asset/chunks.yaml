  trans: "\n# AI 测试的核心顺序\n\n任何测试，无论是传统软件测试还是 AI 测试，都应从一个前提开始——在通过测试证明并非如此之前，始终认为存在一个问题（或缺陷）。\n\
    \n典型的软件测试顺序非常合乎逻辑，并且由于其局限性，几乎是不可改变的。\n\n然而，在 AI 测试的情况下，顺序是可以改变的，而这种改变完全有可能成就或毁掉系统性能。如果你没有按照正确的顺序测试\
    \ AI，可能会显著增加业务的**风险敞口**：\n\n1.  **首先决定测试什么，即定义你的关注总体**\n\n    你可能不需要定义测试用例或单个测试场景；但是，你需要指定测试数据集的样子。你需要定义测试数据集的整体特征、广泛的实例集合，以及可能的话，从哪里获取它？这些数据必须具有代表性，这样，如果你的系统在测试中表现出良好的性能，你才会批准它上线。\n\
    \n2.  **定义如何测试，即测试标准**\n\n    测试标准应该相当直接明了地定义——你将如何测试你的 AI 系统。你会做些什么来测试它？\n\n\
    3.  **决定你将接受什么，即量化的验收标准**\n\n    定义你准备签字认可的最低可接受性能。定量地描述，对你来说，什么样的性能水平才算足够好。定义“足够好”对你意味着什么；一旦你定义了它——就坚持下去！\n\
    \n4.  **完成 AI 测试**\n\n    一旦前面三个步骤完成，就该进行测试了。执行所有测试，并根据之前设定的标准接受或拒绝系统。一旦你确定了验收标准，就避免讨价还价。作为人类，我们倾向于爱上自己投入了时间和精力的事物，即使它全是垃圾。用经济学术语来说，我们称之为**禀赋效应**。你应该远离它！\n\
    \n简而言之，决定测试什么——如何测试——接受或拒绝什么——然后进行测试。坚持这个顺序，你就没问题了。\n\n如果你发现在测试之后才决定或协商验收标准，那么你就做错了。避免让你的业务暴露在高财务和声誉风险之下；这些风险是不可逆的。\n\
    \n无论你测试多少，都不要过度测试，不要设置过高的通过门槛，以免错过一个好的解决方案。\n\n## 测试概念漂移\n\n“概念漂移”中的“概念”指的是输入和输出变量之间未知且隐藏的关系。数据的变化可能由各种现实场景引起。\n\
    \n训练和反馈可能会动态地发生变化。这些变化非常多样化，并会影响基础模型的可靠性。数据随时间变化，从而影响静态编程（或假设）关系的问题，在机器学习的其他几个现实场景中也很常见。在机器学习领域，这种情况的技术术语是“概念漂移”。^(²²)\n\
    \n很难识别概念漂移可能发生的场景，尤其是在训练的第一阶段，即当你开发基础模型时。因此，更明智的选择是安全地假设概念漂移会发生，并测试模型是否存在潜在的漂移。\n\
    \n有多种统计方法可用于在流程早期检测概念漂移。虽然我们不会讨论这些用于概念漂移测试的分析方法，但只需在互联网上搜索“testing for concept\
    \ drift”一词，就能获得足够的工作资料。\n\n简而言之——你应该确保在部署前以及持续地测试你的模型是否存在概念漂移。\n\n## 测试交互问题\n\n\
    AI 系统并非独立存在，它们经常与多个其他系统以及人类进行交互。在每个交互点，都存在失败或性能不佳的可能性。我常说，连接两个异构系统的每一个环节都是一个薄弱环节。\n\
    \n为了发现这些弱点并能够修复它们，你需要测试所有那些点的系统交互。\n\n测试人类与 AI 系统交互有两个目标。首先是验证主要与 UI 和 UX 相关的可用性问题。其次是证明在多用户环境下的性能。\n\
    \n第一部分通常通过标准的 UI/UX 测试就能轻松实现。然而，对于第二部分，事情可能会变得有点复杂。正如前面章节提到的，AI 性能测试不是基于点的场景测试。相反，你向它输入大量数据，并期望其中合理比例的数据在可接受的范围内，这为你的交互测试增加了一定程度的复杂性。接下来是每个用户的可重复性和可再现性。\n\
    \n在统计分析中，我们称之为*量具 R&R*，即量具重复性和再现性。你会合理地期望一个人类操作员在任何给定的场景集合下都能反复展示相同的性能。你也会期望他们每次重复这些场景时都能产生相同的结果。\n\
    \n当你将这一点与一个基于可接受比例结果工作的 AI 系统混合时，情况会发生巨大变化。在这里，你处理的是系统变异（尽管是可接受的）加上人类变异（同样在可接受范围内）。当这两种变异应用于多个系统和多个参与其中的人类时，意味着整个操作机制现在表现出显著的性能差异。尽管在某种程度上完全可以接受，但这会带来相当大的风险，主要是因为任何一个参与者的性能出现微小变化都可能导致整体性能不佳。\n\
    \n这就是为什么你的 AI 系统测试的一部分也应该关注系统中所有人类参与者的量具 R&R。当然，当人员变动时，你必须对新加入者重新进行这项测试。这可能是一个痛苦的过程。然而，为了保持\
    \ AI 系统的高性能水平，这是一个很小的代价。\n\n当测试多个软件系统之间的交互时，你会面临同样程度的挑战，例如，你的 AI 与 CRM 系统、ERP\
    \ 系统或故障单系统交互。也可能你的 AI 与你无法控制的系统交互，例如客户或供应商的系统。至关重要的是，你要以同等的严谨和勤奋来测试这些交互，以发现任何系统性问题或重复性与再现性问题。\n\
    \n关键不仅在于部署前测试这些交互，还要持续、定期地进行这项测试。有了如此复杂的系统之系统，每当一个参与者（人类或系统）发生变化时，动态就会改变，你的测试也必须随之改变。\n\
    \n## 它可以成为你信任的基础\n\n随着技术日新月异，它正在将强大的工具交到那些不理解其工作原理的人手中。这正在创造重大的商业和社会风险。\n\n开发者和数据科学家越来越脱离对他们所使用的工具和所创建的系统复杂性的理解。\n\
    \nAI 系统意味着一个黑箱，这正成为一种普遍接受的说法，而信任这个黑箱的唯一可靠方法将是——细致地训练它并严格地测试它！\n\n严格测试的主要目标是建立信心并增加对未来性能的信任。\n\
    \n脚注 1\n\n# 第三部分 缓解措施\n\n## 最小化风险的影响\n"
- fmt: '# AI Supervision with a Red Team


    How do you stop an attacker? By thinking and planning like one!


    We have a supervised machine learning as a concept, but supervising an AI itself
    is not deeply thought out. In this chapter, we focus on ongoing controls over
    the AI solution. We will discuss what does it involve supervising an AI and elaborate
    mainly the concept of a red team in the context of AI solutions.


    ## What is a red team?


    In the military parlance, “red team” is the team which uses their skills to imitate
    the attack and techniques that potential enemies might use. The other group, which
    will act as a defense, is called a “blue team.”


    Cybersecurity has picked up these terms for the use, where they signify the same
    functionality.


    A red team is an independent group of people that challenges an organization to
    improve its defenses and effectiveness by acting as an adversary or attacker.
    In layman’s terms, it is a form of ethical hacking, a way to test how well an
    organization would do in the face of a real attack.


    If effectively implemented, red teams can expose vulnerabilities and risks not
    only in your technology infrastructure but also in people and physical assets.


    You would often hear a saying that “the best offence is a good defense.” Having
    a red team is the right step in putting up this good defense. Whether it is a
    complex AI solution or merely basic technology solution, red teaming can give
    a competitive edge to the business.


    A comprehensive red team exercise may involve penetration testing (also known
    as pen testing), social engineering, and physical intrusion. Either all of these
    could be carried out, or a combination of those in the right manner as the red
    team would see fit to expose vulnerabilities.


    If there exists a red team, then there also must exist blue team. This assumption
    stems from the premise that system developments are done in-house only. However,
    with AI systems, this can change, and your actual blue team maybe your technology
    vendor.


    ## Supervising an AI is necessary


    So far, the businesses have (rarely) used red teams only for the typical endeavors
    of cybersecurity. However, using the same for monitoring an AI system is not yet
    there. Most like likely because many businesses still see the AI system as just
    another IT system.


    However, with the advent of sophisticated AI systems, boundaries between mere
    IT systems and other business processes are becoming unclear and are slowly diminishing.
    This proliferation of systems means your AI system is no more just a piece of
    software, but it is an integral part of your business process. A quick test can
    help in making a clear distinction between a system that is an essential part
    or otherwise. Ask yourself, “If the system were stopped completely for any reason,
    can your business process still function as usual?” If the answer is negative,
    then you can be sure that your systems are pervasive enough.


    Having a functional red team also means that you can identify asymptotic situations
    that can result in catastrophic behavior of your AI system. Being able to identify
    these situations is essential from building a reliable operation in the long term.
    Moreover, one shouldn’t discount a capable adversary who may be fixated on a goal
    to bring your AI system down and cause some harm.


    Since most of the AI solutions are appearing as black boxes, it is becoming more
    relevant to supervise them regularly. Not monitoring these systems could mean
    that things would go wrong without getting noticed. It would be a significant
    problem if you see issues somewhat later and would be a huge trouble if you never
    notice them until severe consequences occur.


    Practically, we train machine learning systems on a fixed dataset. However, in
    reality, we almost always subject these systems to the data outside of their training
    distribution (long tail as some would call it). How can you be sure that AI systems
    work robustly on the real data?


    Wait and watch cannot be an approach here. Some machine learning models you could
    train on the fly, mostly as unsupervised learning mechanisms. You can feed new
    training inputs back to the system, and then the system keeps optimizing continuously.
    However, while this might be good enough sometimes, at other times, failure can
    be disastrous.


    Customers may, at times, tolerate a hundred useless product recommendations. However,
    they certainly cannot tolerate a single mistake that can be hazardous or causes
    them to lose a significant amount of money. Business users are no different here.


    Training an AI system to fall back on human intervention can be one of the strategies.
    However, some may often question its effectiveness as it is counterintuitive to
    the existence of an AI in the first place.


    Relying solely on fine-tuning of machine learning models to produce more and more
    accurate output is not enough. It will never give you a clear picture of the actual
    risk exposure.


    ## Why not use adversarial AI testing?


    A short answer to this would be: because adversarial AI testing is simply a technology
    testing method, where you would play one AI against another. However, the red
    team concept is cross-domain. Not just cross-domain, it is cross-sectional in
    nature.


    If it was only adversarial testing from a technology standpoint, a red team may
    try to find an image that could throw off image recognition AI systems’ output.
    The same result can be effectively achieved with automated mechanisms too.


    However, a real red team would not stop at just finding an image to break the
    system. It would go above and beyond that to create or doctor an image to make
    it happen, which is where adversarial AI testing may fall short. The GAN (generative
    adversarial network) systems could prove to be narrower in that context, but the
    red team would be working much more broadly.


    The ultimate goal of red teams is to produce problematic inputs or situations
    that are natural and have a nonzero probability.


    Businesses have always siloed physical and technical securities. The people who
    oversee IT systems—networks, applications, and alike—are not the same people who
    manage physical security such as cameras, motion sensors, and locks. You may have
    the best cyber defenses in place. However, if your physical safety is weak, then
    eventually, someone will make their way in your systems through that route. Moreover,
    the opposite may also be possible.


    Therefore, in the world, with highly connected devices and systems, there is a
    need to break the silo.


    ## Only AI supervision can expose this


    Several machine learning techniques that feed to the AI system rely on finding
    correlation within a supplied dataset. Whether it is training dataset or ongoing
    feedback dataset, mostly they would be treated in the same manner. Supervising
    your AI system can be beneficial at many levels.'
