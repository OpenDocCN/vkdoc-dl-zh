    ## 劣质解决方案的泛滥


    随着技术工具的普及，这个问题正日益严重。越来越多的技术变得大众化，制造劣质产品（有意或无意）的能力也在成倍增长。虽然有些人运用智慧，创造出质量卓越、实用性强的合理解决方案，但许多人却反其道而行之。


    如今，一些解决方案提供商认为，只要拥有炫酷的技术，就能创造一切。常常有人会问：“我们能做这个吗？”，然后只要技术上可行，就着手去做。然而，我们真正应该问的关键问题是：“我们*应该*做这个吗？”如果答案是否定的，那么无论创建任何解决方案有多么容易和可行，都不应该去做。


    然而，AI 解决方案的创造者常常会忘乎所以。即使是客户，也常常只看表面价值就赞赏许多解决方案，而没有意识到这些方案的实用性。这在新产品和技术中屡见不鲜；新奇就是卖点！


    但最终，产生的不过是一堆垃圾。我所说的垃圾，是指那些要么质量低劣，要么微不足道、价值极低甚至毫无价值的解决方案。我确信这些解决方案迟早会被抛弃。但要知道，它们无论如何已经进入了市场。


    然而，对于 AI，许多组织在识别指标和量化收益方面仍然面临困难。原因显而易见；他们中的大多数都本末倒置了。他们手里拿着解决方案，却在寻找要解决的问题。


    许多企业，我指的是其中的高级（负责的）经理，仍然觉得并相信 AI 和自动化将一劳永逸地解决他们的问题。但当技术实施后，他们发现自己又陷入了困境，只是这次的味道不同罢了。这是一个典型的案例，当我们使用那些不能解决实际问题或不专注于解决实际问题的劣质解决方案时，就会发生这种情况。


    低收益或无收益解决方案的影响范围可能超乎你的想象。当你实施并意识到解决方案不佳时，你可能已经走到了无法回头的境地。放弃可能意味着浪费大量资金和资源；然而，继续下去也意味着你接受了次优的结果，因为它不会随着时间的推移变得更好。


    企业应该在采用过程的早期就提高期望值。当负责此类项目的人只展示故事的一面时，要保持好奇。他们通常不会讲述故事的另一面，要么是因为他们不知道（缺乏全面知识），要么是因为他们对此有某种特殊利益（技术供应商经常如此）。


    接受“*我们不知道我们不知道什么*”这一事实在这里至关重要。但更重要的是，如果问题是缺乏知识，那么在采取下一步行动之前必须解决它。没有适当的知识和信息，这无异于一场赌博。


    ## 一种好的方法


    关于教导机器道德、伦理、在灰色地带工作等方面，有很多东西可以讨论。然而，我们不能等待所有信号灯都变绿，我们必须继续前进，边学习边改进。


    机器会像人类一样犯错，并且未来也会继续犯错。企业必须接受这一事实，并认识到机器也像人类一样，在重新上线之前需要关注、再培训和绩效改进计划。


    企业必须确保，就像对待人类一样，在赋予机器更多责任之前，对它们进行循序渐进的训练和严格的测试。任何机器性能的失败，都应该以比人类相对更严厉的方式处理。


    如果你的组织中有一个人力资源团队，请确保扩充他们以处理非人类的额外资源。创建一个 `HAIR`（*人类与人工智能资源*）部门。需要制定适当的政策来管理这些
    AI 资源或现有员工的数字孪生。这听起来可能有点傻，但我们前进的方向很快就会要求这样做。让 AI 变得透明的运动正在兴起，这可能是其中的关键一步。


    然而，我们还可以做更多的事情来保持理性。


    ### 我们必须保持怀疑


    技术采用是一个相对缓慢的过程，在成为主流或确立为规范之前，会经历几个阶段。


    最小可行产品（`MVP`）就是这样一个阶段，许多 AI 解决方案正在经历这个阶段。对于已建立的解决方案，仍然存在一个需要测试和定制用户与技术交互的阶段。虽然
    `MVP` 是开发成功产品的关键，但将 `MVP` 视为 `MVP` 非常重要。


    当有人推销他们可能仍在进行中、或尚未达到可接受工作水平的工作时，问题就开始了！他们的解决方案不工作，比起它开始违背项目目标而工作，问题要小得多。


    我们必须保持积极的怀疑态度，理智地思考，并以审慎的态度采用技术。


    我们必须记住并承认，许多 AI 或自动化解决方案的问题不在于它们会崩溃。相反，像这样复杂的解决方案会产生某种形式的泄漏，这并非完全错误，但也并非完全正确。这种灰色的输出会随着时间的推移而堆积，直到人们意识到自己拥有了一堆垃圾。摆脱那堆垃圾或修复完全有缺陷的系统可能会变成一场噩梦。


    请记住，创建 `MVP` 是优秀且必要的，但我们应该以最大的谨慎和怀疑态度来处理那些尚未准备好全面上线部署的解决方案。即使它们已经完全准备好并经过验证，保持怀疑也只会对你有利。


    ### 我们绝不能超速


    我这么说，是因为问题不在于新兴技术及其承诺的光明未来。问题在于我们固执地相信，一个光明的技术未来就在眼前！


    到目前为止，我们对技术的态度一直是不对称和不平衡的。虽然我们在这个时代享受着技术带来的好处，但我们却以两极分化、终身失业以及财富和权力集中在少数技术官僚手中的形式，将危害推给了我们的后代。不幸的是，我们正在冲向一个可能黯淡且不讨人喜欢的未来。


    也许情况并非如此；到目前为止，我们还无法判断。然而，确实，超速会致命，无论是在道路上还是其他方面。我们必须花些时间思考和反思后果，然后在跃进之前为负面影响建立安全网。

    '
- fmt: '### We must insist on a kill switch


    Contemporary solutions are more than packaged software these days. Whether or
    not they are sophisticated AIs, they are still intricate pieces of intertwined
    technologies.


    Older ways of ensuring that these solutions are working as expected are not suitable
    anymore. Quality assurance methods such as unit testing, regression testing, and
    so on are not enough to qualify emerging technological solutions, AI in particular.


    Therefore, I recommend taking a systematic, thorough, and nontraditional approach
    in performing these tests. And I also insist that there should be a kill switch.
    Yes, there should be one kill switch, which may not be a physical switch per se,
    but some control mechanism, which can enable you, a human, to pull the plug and
    stop the system at once with no questions asked.


    This is perhaps the most critical requirement you should state for each of your
    AI deployments. If there is no kill switch, you could be in trouble. Remember
    the debacle I referred earlier in Part 1 of the book for an automation bot? The
    company lost close to $12 million, simply because, before fixing the auto-bot
    for good, they were unable to switch it off, at least not without having a significant
    monetary and operational impact. It was a clear case of a poorly planned project.
    But it doesn’t have to be the case every single time.


    Ask yourself, or to your vendors of AI technology, “If I have to reverse everything
    that we are deploying now, how easy will that be?”. If the answer to this question
    is anything other than a simple procedure, step back. You could be getting into
    a complex maze, never to return. As far as business risks are concerned, that
    should be a complete no-no situation. Insist on a kill switch and a simplified
    yet reversible procedure for the same.


    Another critical question you must have an answer for—what is the alternative
    action plan when that (kill) switch is used, and automation or AI is shut down?
    In the earlier example I mentioned, there was no alternative, and there was no
    path of return, which created a big problem. Let us not repeat the same mistake
    twice. You don’t have to live that mistake to learn either.


    Additionally, make sure that you test the technology for real-life scenarios and
    evaluate possible and impossible (scenarios) both with an equal level of details.
    Then thoroughly audit the system for what it has learned, how and from whom, and
    then verify how that can affect you in the future. Do not just take creators’
    word for it.


    Most importantly—pull the plug if needed, it is too costly to keep going with
    bad quality automation and AI than to just shut it.


    ### We must demand quality


    There is absolutely no reason to appreciate quantity over quality. I think it
    often promotes false economics, and here is the reason why.


    Merely pushing for more quantity (of tech solutions) without paying attention
    to quality (of the solutions) adds a lot of garbage out in the field.


    This garbage, when out there in the market, creates disillusionment and, in turn,
    adds to the resistance in healthy adoption.


    This approach (quantity vs. quality) also encourages the bad practices by creators
    of AI at customer’s expenses, where subpar solutions are pushed down customers’
    throats by leveraging their ignorance and an urge to give in to FOMO (fear of
    missing out).


    Stuff like this happens during the hype cycle for any new/upcoming trend or technology.
    If this is happening with AI, it’s nothing new per se, but we must demand quality
    and stop this from happening.


    With AI, the quality problems are a bit tougher to gauge than usual. This is because
    the flaws in subpar techs do not surface until it is too late! In many of the
    cases, the damage is already done and would be irreversible. Unlike many other
    technologies, where things work or do not work, there is a significant gray area
    which can change its shades over a period. Moreover, if we are not clear in which
    direction would that be, we end up creating a junk.


    We not only need to challenge the quality of every solution but also improvise
    our approach toward the emerging technologies in general.


    This problem of lower quality often increases with unrealistic expectations from
    the technology. Additionally, failing to define the acceptance criteria up front
    can make it worse. Failing to establish such a criterion up front only results
    in the endowment effect. Implementation teams try to justify (much later) that
    whatever has been developed should be consumed because they worked on it so hard;
    worse part is when they try to retrofit the acceptance criteria, only to make
    it happen!


    So necessarily, businesses do not have stubborn goals (read acceptance criteria)
    and do not have a handle on the means. This results in a somewhat uncontrollable
    situation. Development teams may tell you that the machine will learn eventually—but
    won’t tell you when and how would it improve.


    Garbage in will always result in garbage out—no matter how many years you keep
    doing it and how intelligent the machine is!


    ### We must seek transparency


    You might notice that people who make things often replicate their inner self
    in the output. A casual approach or thinking would encourage a casual output,
    and so would the precise thinking result in better output. Programmers who have
    clarity of mind and cleanliness in behavior usually create a clean and flawless
    program.


    We must make people responsible and accountable for their output. In the case
    of an AI, if it does a lousy job, ask creators to explain and seek transparency.
    Hiding behind deep learning algorithms and saying, “`AI did it!`” cannot be an
    acceptable answer anymore.


    People will often tell you that knowing inner mechanics is not essential for the
    users; only the output is. We must challenge this argument. For many other technologies,
    such as a car or microwave oven, this argument might hold—but for AI, it does
    not!


    For each action automation or AI takes, creators should be able to explain why
    their technology did that! The reasoning should be completely transparent and
    interpretable when needed.


    ### We must seek interpretability


    This topic is being picked up quite frequently now, and there is some thought
    given to AI interpretability now. In general, `interpretability` means being able
    to explain to the end users why AI solution did something as an outcome. It should
    be not only able to explain why a particular result was derived but also should
    be able to explain how it arrived at that outcome.


    This, in standard terms of six-sigma terminology, would mean, being able to explain:


    *   `y = f (x)`


    where `y` is the outcome (or outcomes) and `x` is the driver (or multiple drivers)
    of that outcome and `f` represents the process or formula that makes `x` turn
    into `y`.


    Interpretability is important for many stakeholders of AI solutions. Primarily,
    for the end users, it is obvious to be wanting to know *why* a particular decision
    was taken, mainly because it directly affects them. Additionally, end users would
    also want to know that this decision has been made fairly and without any prejudice
    or bias. And most importantly, it is a must-have requirement for building trust.


    Even from the creator’s perspective, interpretability is quite useful. Mainly
    because it would only benefit them to build or fine-tune their models and algorithms.


    There is a higher likelihood of being explainable AI solution if the solution
    is interpretable. Although it may not be the case always, it would be a good start,
    which is why businesses must seek interpretability in solutions and insist on
    this aspect for fair and trustworthy outcomes. Without interpretability, you will
    only keep facing resistance repeatedly while you lose trust in the eyes of end
    users.'
