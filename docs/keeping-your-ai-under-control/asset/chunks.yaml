    # 11. When Working with Emerging Technologies


    Throughout this book, I have attempted to explain the various possible risks related
    to AI solutions and ways to mitigate most of these risks or control them. Once
    these controls are in place, the world should be a better place. But as the technology
    adapts and changes, there could be new risks in the future, which are unpredictable
    at this point.


    That brings me to the question I would like readers to ponder over—how can we
    pragmatically march toward a better future with AI in it? Should there be general
    guidelines for the widespread adoption of AI solutions in businesses and socioeconomical
    contexts? And if yes, what should these guidelines say?


    I will attempt to strike a balance between optimism, pessimism, and skepticism
    while I elaborate on these points. But before I do that, let me begin with a story.


    Several years ago, I was working with a home appliance manufacturing company.
    These were the early days of my career.


    My team and I would report to a senior manager, who was quite steadfast in pushing
    to have things exactly the way he wanted them. One day he asked us to prepare
    a report, where he asked us to emphasize key items of the report in italics and
    use colored fonts in a few places. He also wanted us to give him a print copy
    of this report.


    The only (big) problem was, we were using a program called `WordStar`, and all
    we had was a dot-matrix printer! For those who do not know, it was a DOS (disk
    operating system) based word processing program. And, I do not have to explain
    why having a dot-matrix printer was a problem for the given task.


    Our obvious response, in almost unison, was—*not possible!* And he wouldn’t listen.
    He kept pushing for us to make it happen. He insisted and said something on the
    lines of—don’t try to fool me, I know that computer can do anything, and your
    boss promised that to us when buying it!


    We all stared at our team leader, with somewhat mixed feelings, waiting for him
    to own up (after all, he promised the impossible) and fix it! Eventually, he did
    something behind the scenes that day, and we were saved.


    That incident left a solid impression on me. This was not just the case of over
