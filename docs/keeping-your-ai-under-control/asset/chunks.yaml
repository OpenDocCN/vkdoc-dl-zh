    and how would you ascertain. If your AI passes those tests, then you know that
    it is good enough.


    You will often come across black-boxed AI systems or at least some components
    of it, which would be like that. Since you would be limited to understand the
    inner working of those systems or sub-systems, your only allies would be meticulous
    training and then rigorous testing. Testing should reveal any potential threats
    and opportunities, and if all goes well, you would be reasonably confident about
    the black box’s functioning.


    In a nutshell, take rigorous statistical testing seriously, and you would be good
    to go (in production).


    ## AI testing is not software testing


    Yes, AI system testing is not the same as software testing.


    Traditional software testing is entirely black-and-white activity. You have a
    fixed test case (with expected response), where you test it with designed input.
    If you find a problem, you note the scenario and fix it.


    However, with machine learning, it plays differently because, in most of the cases,
    it will be almost impossible to retrace decision-making of the algorithm. Moreover,
    testing the AI system would often incite a lot of (rather far too many) scenarios,
    which is uncommon in traditional testing.


    In traditional software testing, when we act, we would expect the same outcome
    each time we repeat it. With AI, it may not reproduce the same result 100% of
    the times.


    Also, since you cannot test case-by-case basis, you may need to throw a huge number
    of scenarios at the system and see what you get. If the proportion of correct
    output is reasonably high, then you can be confident that it will work (most of
    the times). Much like our school exams, where we may not get 100% marks, but having
    them beyond specific percentage means, we are good enough to ascend to the next
    level .'
  trans: '

    ### 数据分布不够广泛


    拥有大量数据并不总是好事，除非它能代表所有可能的用例或场景。如果数据缺乏多样性，则可能导致未来的问题——你会增加在低频高风险场景中失败的概率。


    对于传统的预测分析而言，随着你获取越来越多的训练数据，会存在一个收益递减的临界点。你的数据科学团队通常能凭经验发现这个点。


    然而，由于机器学习是一个归纳过程，你的基础模型只能覆盖它在数据中见过的情况。因此，如果你遗漏了长尾（即边缘案例），你的模型将无法支持它们。这仅仅意味着当那种场景出现时，你的
    AI 会失败。这是你的训练数据应该具有足够分布广度以代表真实总体的唯一且最关键的原因。


    ### 忽略“险些失误”与“人工干预”


    在初始训练阶段，很难识别出“险些失误”和被忽略的数据点。然而，在带有反馈的持续学习循环中，密切关注“险些失误”以及人工或机器的干预变得至关重要。


    当你首次部署 AI 系统时，它只有一个基础模型来支配 AI 的性能。但随着系统持续运行，反馈循环会输入实时数据，系统开始实时或定期地进行调整。


    如果模型在预测或计算任何输出时仅差一点点，从而导致决策发生改变，这就是一个“险些失误”。例如，在贷款审批系统中，如果 88.5%的分数意味着“`贷款批准`”，而
    88.6%的结果却是“`贷款拒绝`”，那么这种情况就是一个“险些失误”。从技术和纯统计学的角度来看，这是正确的；然而，从现实生活的角度来看，误差范围可能扮演着重要角色。如果受到影响的当事人（如贷款申请人）提出异议，决策被改变的可能性就更高。因此，这类数据点尤其值得关注，你不应忽视它们。


    同样的情况也适用于人类操作员监督 AI 系统输出并决定进行干预时。人类操作员覆盖 AI 输出的情况应始终被视为特殊场景，并且你必须将其反馈给训练模型。这些场景中的每一个要么凸显了基础模型的不足，要么提供了以前从未出现过的新情况。忽视干预行为会随着时间的推移降低模型性能。


    ### 混淆相关性与因果关系


    在统计学中，我们常说“相关性并不意味着因果关系”。这通常指的是无法合法地从输入变量和输出之间推导出因果关系。由此得出的结论可能仍然不是错误的或不真实的，但未能建立这种关系往往是潜在问题的指标。


    类似地，你模型的预测能力并不一定意味着你已经在模型中建立了精确的因果关系。你的模型很可能混淆了输入参数的相关性，并基于此预测输出。


    你可能会想：“只要它有效，就无关紧要。”然而，这种区别很重要，因为许多机器学习算法仅仅因为存在高相关性就选取参数。基于相关性来确定因果关系可能非常棘手，并可能导致矛盾的结论。能够证明确实存在因果关系会好得多。


    然而，如今，开发者和数据科学家仅仅依赖于统计模式。他们中的许多人未能认识到，这些模式仅仅是海量数据中的相关性，而非支配真实世界的因果真理或自然法则。


    那么，你该如何处理混淆呢？


    试试这个——在初始训练和模型构建期间，一旦你发现相关性，不要过早下结论。花时间寻找其他潜在因素，找到隐藏因素，并验证它们是否正确，然后再下结论。


    ## 用测试来补充训练


    如果你必须信任某人的表现，有两种方法可以做到。有效地训练他们，以保证他们的表现。如果你对训练有所怀疑，哪怕是一点点，那么就严格地测试他们，以确保更好的表现。而且，如果你两者都做，即精心训练并严格测试，你就可以对表现充满信心，这为信任奠定了更好的基础。


    因此，当你专注于更好地训练你的 AI 系统时，用更严格的测试来补充这种训练也是有意义的。


    更好的训练意味着机器学习没有导致过拟合或强制拟合模型。然而，如果你怀疑可能发生了这种情况，你应该设计你的测试来捕捉它。你可以很容易地使用全新的数据集来做到这一点，尽管这些数据集需要与应用相关，并且能代表现实场景。


    如果你怀疑训练不够充分，可能没有涵盖所有可能的场景（包括有风险的场景），那么就创建测试，将你的 AI 系统置于这些条件下，并验证系统是否按预期运行。


    设计你的测试来捕捉训练期间可能出现的潜在陷阱。这些测试还应反映你的 AI 系统必须运行的条件以及你将如何确认。如果你的 AI 通过了这些测试，那么你就知道它足够好了。


    你经常会遇到黑盒 AI 系统，或者至少是其中的一些组件，它们就是这样的。由于你理解这些系统或子系统内部运作的能力有限，你唯一的盟友就是精心的训练和严格的测试。测试应该揭示任何潜在的威胁和机遇，如果一切顺利，你将对这个黑盒的功能有合理的信心。


    简而言之，认真对待严格的统计测试，你就可以（在生产中）顺利运行了。


    ## AI 测试不是软件测试


    是的，AI 系统测试与软件测试不同。


    传统的软件测试完全是黑白分明的活动。你有一个固定的测试用例（带有预期响应），你用设计好的输入来测试它。如果你发现问题，你记录下场景并修复它。


    然而，对于机器学习来说，情况则不同，因为在大多数情况下，几乎不可能回溯算法的决策过程。此外，测试 AI 系统通常会引发大量（甚至过多的）场景，这在传统测试中并不常见。


    在传统的软件测试中，当我们执行操作时，我们期望每次重复时都得到相同的结果。而对于 AI，它可能无法 100%地重现相同的结果。


    此外，由于你无法逐个用例地进行测试，你可能需要向系统抛出大量场景，然后观察结果。如果正确输出的比例足够高，那么你就可以相信它（在大多数情况下）会正常工作。这很像我们的学校考试，我们可能得不到
    100 分，但只要分数超过特定百分比，就意味着我们足够优秀，可以升入下一个级别。

