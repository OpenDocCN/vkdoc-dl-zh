    on a pile of junk, which is growing faster than ever. The disturbing part of that
    is those who are making subpar solutions, keep telling that the machines would
    be wiser soon while shrugging off their responsibilities.


    The question however is, why should we challenge junk AI systems?


    Merely pushing for more quantity (of tech solutions) without paying attention
    to quality (of the solutions) adds a lot of garbage out in the field. This garbage,
    when out there in the market, easily creates disillusionment and in turn adds
    to the resistance for healthy adoption.


    This approach (quantity vs. quality) also encourages the corrupt practices by
    creators of AI at customer’s expenses, where subpar solutions are pushed down
    customers’ throats by leveraging their ignorance and an urge to give in to the
    fear of missing out (also called as FOMO).


    This is a common scenario with several technologies that are going through the
    hype cycle, and AI is going through the same.


    The problem though is that flaws in subpar techs do not surface until it is too
    late! In many of the cases, the damage is already done and would be irreversible.
    Unlike many other technologies, where things work or do not work, there is a significant
    gray area which can change its shades over a period. Moreover, if we are not clear
    in which direction would that be, we end up creating a junk. This junk essentially
    means someone somewhere has wasted a lot of money in creating and nurturing these
    solutions. It also indicates that several customers may have suffered or have
    had negative experiences, courtesy junk solutions.


    This is why we not only need to challenge the quality of every solution but also
    improvise our approach toward the emerging technologies in general.


    Most of the times, technology solutions go through several phases. The first phase
    usually is always minimum viable product (MVP). And it is a good practice to create
    an MVP solution, validate it, and test it thoroughly before going ahead with subsequent
    deployment.


    Treating MVP as MVP and nothing more is going to be the key in avoiding junk solutions
    making their way to the market. Dealing with these infant solutions with utmost
    care and skepticism will ensure that we are not rushing toward productizing or
    releasing them lest creating another solution that may have a potential flaw to
    disrupt healthy life.


    ## There is no balanced scorecard for AI


    Not having a balanced scorecard suffered sales departments for several decades
    and instilled predatory sales practices. This happened because one of the goals
    for sales’ team was to maximize sales numbers. This, however, lacked some of the
    finer details and did not specify acceptable methods of sale to achieve those
    goals.


    Contention and racing or conflicting objectives are often the cause of friction
    within various teams and people. With AI in the picture, there is a matter of
    scale. That is, AI-powered solutions are known for their efficiency and effectiveness
    at a massive level. Therefore, misalignment between our goals and machine’s goals
    could be dangerous for humans. It is easier to course correct a team of humans,
    doing that with machines could be a very tricky and arduous task.


    For example, if you command to your autonomous car, “Take me to the hospital as
    quickly as possible,” it may have terrible consequences. Your car may take you
    to the hospital quickly as you asked but may leave behind a trail of several accidents.
    Without you specifying that the rules of the road must be followed and no humans
    should be harmed, and no dangerous turns should be taken, and several other sets
    of humanity rules, your car would turn into a 2-tonne weaponized metal block.


    In short, the AI might use destructive, unethical, or unacceptable methods for
    achieving its goals, if we fail to align our goals with it entirely. And, achieving
    that level of alignment is quite tricky. Without having any balanced approach
    like a scorecard, this may not be achievable.'
