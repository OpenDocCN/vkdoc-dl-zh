- fmt: "# Nailing the technical element is not enough for AI\n\nNo matter how smart\
    \ the technology or AI in particular is, it cannot apply common sense and human\
    \ perspective.\n\nTherefore, merely nailing the technical element of AI is not\
    \ enough; you need to balance it with the human aspect. The understanding of the\
    \ world and the surrounding environment in which you are using the AI is crucial.\n\
    \nIncreasingly, technology teams need to demonstrate cognitive intelligence if\
    \ they were to be successful. As much as the development and deployment of an\
    \ AI solution are critical, the user aspect is important too. Without proper use\
    \ (and users), AI success will hang by a thread.\n\nA good AI solution in the\
    \ hands of bad users can be disastrous, while an average AI solution in the hands\
    \ of good users can be a great success. Technology users have the full power to\
    \ make or break it; your goal should be to enable your tech users and extract\
    \ maximum positive value out of it.\n\nThe people who understand AI users don’t\
    \ understand AI design. The people who understand AI design don’t understand AI\
    \ users.\n\nFootnotes [1](#483319_1_En_6_Chapter.xhtml#Fn1_source) [2](#483319_1_En_6_Chapter.xhtml#Fn2_source)\n\
    \n# 7. A Systematic Approach to Risk Mitigation\n\nRisk mitigation is not an easy\
    \ task; instead, it is even harder if there is no quantifiable measure attached\
    \ to it. In this chapter, we will discuss a systematic approach to risk mitigation.\n\
    \nThere are four types of risk mitigation strategies one could use, namely, risk\
    \ avoidance, acceptance, transference, and risk control or reduction. While avoidance\
    \ and acceptance indicate straightforward actions to take, we will discuss *transference*\
    \ in Chapter [10](#483319_1_En_10_Chapter.xhtml).\n\nIn this chapter, we will\
    \ focus on risk control or reduction with systematic methodology. This method\
    \ will also help in establishing quantitative measures which can then help in\
    \ assessing the progress of risk mitigation activities.\n\n## Core principles\
    \ of AI risk management\n\nAs common as it could be for any risk management, in\
    \ the case of AI risks, three core principles would serve as a foundation. These\
    \ principles are essential for the effective management of risks:\n\n***Identifying\
    \ risks:*** Using a systematic approach, one must determine the most severe risks.\
    \ It is a highly important principle because, without identification, there cannot\
    \ be any control or management. People have blind spots, and it is our inherent\
    \ limitation. To avoid them, a good cross section of the team is necessary that\
    \ will work on risk identification process. The *pre-mortem* analysis method discussed\
    \ later in this chapter elaborates this principle.\n\n***Being comprehensive:***\
    \ As I mentioned previously, AI systems are not one-point solutions. They often\
    \ involve several systems, and the final system is pretty much system of systems.\
    \ Which means, to be effective, merely covering AI solution is not going to be\
    \ helpful. You will have to be comprehensive in risk identification process. Without\
    \ being comprehensive in this approach, risks from other parts of the system can\
    \ fall through the cracks and wipe out all the efforts.\n\n***Being specific to\
    \ your use case:*** It is not difficult to design and implement AI solutions responsibly\
    \ (i.e., responsible AI); however, to do that it is highly prerequisite to understand\
    \ risks better and specific to your use case. Broad-based risk identification\
    \ and management approach will not be helpful. At the same time, establishing\
    \ a control system across the value chain is also quite important, that is, implementing\
    \ controls for initial analysis, system design, solution development, implementation,\
    \ and its ongoing use.\n\n> *Good things only happen when planned; bad things\
    \ happen on their own.*\n> \n> *—*Philip B. Crosby^([^(18)](#fn18))\n\n## Frequent\
    \ contributors to the AI risk\n\nAfter witnessing several AI failures, and additionally\
    \ studying many other cases where AI deployments have entirely (or partially)\
    \ failed, I found a typical pattern of risk contributors. Seven issues existed\
    \ in almost every case.\n\nWhile a systematic risk identification would follow,\
    \ these issues are almost always present and, therefore, do not need any further\
    \ analysis for fixing:\n\n1. ***Flawed hypothesis:*** Starting with a wrong assumption\
    \ often means you are most likely working on the wrong problem, and continuing\
    \ to do that means you end up retrofitting your solution which will enter in negative\
    \ spiral of endless fixes.\n\n2. ***Unattended near misses:*** Quite often minor\
    \ issues are missed, neglected, or unattended, which pile up over time. Once in\
    \ a while, drifting from the goal may not cause significant harm, but if you do\
    \ that too many times, you may end up far away from where you wanted to be.\n\n\
    3. ***Bad data:*** This point does not need any explanation. Incorrect, incomplete,\
    \ or inaccurate data has been constant caustic problem for several systems and\
    \ processes in the past.\n\n4. ***Concept drift:*** Performance degradation can\
    \ happen on account of poorly designed models or due to natural changes in the\
    \ ecosystem in which AI solution functioning. Either way, concept drift needs\
    \ continuous monitoring and updates to the machine learning models.\n\n5. ***Poor\
    \ design:*** There have been several cases, where an elaborate model gets developed\
    \ to incorporate as many factors (or features) as possible to achieve prediction\
    \ accuracy. However, when the same model gets deployed in a real-life situation,\
    \ it fails to meet real-life expectations. The solution itself may be accurate,\
    \ but it doesn’t work in stringent field conditions or expected standards.\n\n\
    6. ***Human-system interactions:*** Interaction points, whether between human\
    \ and system or one system and other, are always weak links. Failures are highly\
    \ likely.\n\n7. ***Ingress malfunctions:*** Any input channel to the system, whether\
    \ it is through direct AI solution or some other upstream/downstream system, can\
    \ be vulnerable to failures. Moreover, since these inputs eventually flow through\
    \ more extensive AI system, they carry significant risks.\n\n## Pre-mortem analysis\n\
    \nThe term project pre-mortem first appeared in the HBR article written by Gary\
    \ Klein in September 2007. As Gary writes, “A premortem is the hypothetical opposite\
    \ of a postmortem.”^([^(19)](#fn19))\n\nGenerally speaking, it is a project management\
    \ strategy in which a project team imagines a project failure and works backward\
    \ to determine what potentially could lead to that failure. This working is then\
    \ used to handle to risks up front.\n\nHowever, in the risk management context,\
    \ I am going to use this (*pre-mortem*) term interchangeably to represent more\
    \ sophisticated and engineering-oriented methodology, known as *failure mode and\
    \ effects analysis*, that is, `FMEA`."
