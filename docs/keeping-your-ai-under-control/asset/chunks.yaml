- fmt: "# The cardinal sequence for AI testing\n\nAny testing, whether it is traditional\
    \ software testing or AI testing, should start with the premise—there is a problem\
    \ (or bug) until proven otherwise by way of tests.\n\nA typical software testing\
    \ sequence is quite logical and almost immutable due to its limited nature.\n\n\
    However, in the case of AI testing, change in sequence is possible, and this change\
    \ has a full potential to make or break the system performance. If you do not\
    \ test AI in proper sequence, it can increase the risk exposure of the business\
    \ significantly:\n\n1. **First decide what to test, that is, define your population\
    \ of interest**\n\n   You may not be required to define test cases or individual\
    \ test scenarios; however, you will need to specify how the test dataset would\
    \ look. You will need to define overall characteristics of the test dataset, a\
    \ broad collection of instances, and potentially, where to get it? These have\
    \ to be representative ones, such that if your system demonstrates a good performance\
    \ on their testing, you will approve it for production.\n\n2. **Define how would\
    \ you test, that is, testing criteria**\n\n   Testing criteria should be reasonably\
    \ straightforward to define—how would you test your AI system. What would you\
    \ do to test it?\n\n3. **Decide what will you accept, that is, quantified acceptance\
    \ criteria**\n\n   Define the minimum acceptable performance that you will be\
    \ ready to sign off. Describe, quantitatively, what level of performance is good\
    \ enough for you. Define, what does good enough means to you; and once you do\
    \ it—stick to it!\n\n4. **Complete AI testing**\n\n   Once the preceding three\
    \ steps are complete, it is time to test. Do all the testing and accept or reject\
    \ the system based on the criteria set earlier. Avoid bargaining with the acceptance\
    \ criteria once you fix it. As humans, we tend to fall in love with what we have\
    \ poured time and effort into, even if it is all junk. In economic jargon, we\
    \ call it as the endowment effect. You should stay away from it!\n\nIn short,\
    \ decide what to test—how to test—what to accept or reject—then test. Stick to\
    \ this sequence, and you would be fine.\n\nIf you find yourself deciding or negotiating\
    \ acceptance criteria after the testing, then you’re doing it wrong. Avoid exposing\
    \ your business to high financial and reputational risks; these are irreversible.\n\
    \nNo matter how much you test, do not test excessively, with high passing bar\
    \ lest you could miss out on a good solution.\n\n## Testing for concept drift\n\
    \nA concept in “concept drift” refers to the unknown and hidden relationship between\
    \ inputs and output variables. The change in data can occur due to various real-life\
    \ scenarios.\n\nTraining and feedback can mutate dynamically. These transmutations\
    \ are very diverse and affect the reliability of the base model. The problem of\
    \ change in data over time and thereby affecting statically programmed (or assumed)\
    \ relationships is a common occurrence for several other real-life scenarios of\
    \ machine learning. The technical term, in the field of machine learning, for\
    \ this scenario is “concept drift.”^([^(22)](#fn22))\n\nIt is difficult to identify\
    \ a scenario in which concept drift may occur, especially in the first stage of\
    \ training, that is, when you’re developing the base model. Therefore, it is a\
    \ better choice to safely assume that concept drift will occur and test the model\
    \ for potential drift.\n\nThere are various statistical methods, which you can\
    \ use for detecting the concept drift early on in the process. While we will not\
    \ discuss those analytical methods for concept drift testing, a simple Internet\
    \ search with the term “testing for concept drift” can give you enough material\
    \ to work.\n\nIn a nutshell—you should make sure that you are testing your model\
    \ before deployment as well as on an ongoing basis for concept drift.\n\n## Testing\
    \ for interaction issues\n\nThe AI systems are not stand-alone, and they often\
    \ interact with more than one other system and humans too. At each interaction\
    \ point, there lies a chance of failure or subpar performance. I always say that\
    \ every link that joins two heterogeneous systems is a weak link.\n\nTo uncover\
    \ these weaknesses and be able to fix them, you need to test system interactions\
    \ at all those points.\n\nThere are two objectives to test human and AI system\
    \ interaction. First is to validate usability issues that are mostly UI and UX\
    \ related. Second is to prove that performance in a multi-user environment.\n\n\
    The first part is usually easy to achieve with standard UI/UX testing. However,\
    \ for the second part, things can get a little complex. As mentioned in previous\
    \ sections, AI performance testing is not a point-based scenario testing. Instead,\
    \ you feed it with the bulk of inputs and expect a reasonable proportion of them\
    \ to be in acceptable limits, which adds some level of complexity in your interaction\
    \ testing. Then come the repeatability and reproducibility of each of the user.\n\
    \nIn statistical analysis, we call it *Gauge R&R*, that is, gauge repeatability\
    \ and reproducibility. You would reasonably expect a human operator to demonstrate\
    \ the same performance repeatedly for any given set of scenarios. You would also\
    \ expect them to reproduce the same outcome each time you repeat those scenarios.\n\
    \nWhen you mix this with an AI system that works on acceptable proportional outcomes,\
    \ things drastically change. Here you are dealing with system variation (though\
    \ acceptable) coupled with human variation (again within acceptable limits). Both\
    \ these variations, when applied to several systems and several humans in the\
    \ loop, mean that the whole operational machinery is now exhibiting significant\
    \ variance in performance. Despite being utterly acceptable to some extent, this\
    \ poses a considerable risk, mainly due to the possibility that a minor variation\
    \ in any of the actors’ performance can result in poor overall performance.\n\n\
    That’s the reason why part of your AI system testing should also focus on gauge\
    \ R&R for all the humans involved in the system’s loop. Of course, when the person\
    \ changes, you must do over this with a new contributor. It can be a painful exercise.\
    \ However, to maintain a high level of performance of your AI system, it is a\
    \ small price to pay.\n\nThe same level of challenge you would face when testing\
    \ interactions between several software systems, for instance, your AI interacting\
    \ with say CRM system or ERP or trouble ticket system. It may also be the case\
    \ that your AI is interacting with systems outside your control, such as customer’s\
    \ or vendor’s systems. It is crucial that you test those interactions with equal\
    \ rigor and diligence to uncover any systemic or repeatability and reproducibility\
    \ issues.\n\nThe key is not only to test these interactions before deployment\
    \ but keep doing this testing on an ongoing and regular basis. With such an elaborate\
    \ system of systems in place, every time a contributor (human or system) changes,\
    \ the dynamics change, and so must your tests.\n\n## It can be the basis for your\
    \ trust\n\nAs technology is improving day by day, it is placing powerful tools\
    \ in the hands of people, who do not understand how they work. It is creating\
    \ a significant business as well as societal risks.\n\nDevelopers and data scientists\
    \ are increasingly getting detached from an understanding of intricacies of the\
    \ tools they are using and systems they’re creating.\n\nThe AI system means a\
    \ black box is becoming a commonly accepted rhetoric, and the only surefire way\
    \ to trust this black box is going to be—training it meticulously and testing\
    \ it rigorously!\n\nThe principal objective of rigorous testing is to become confident\
    \ and increase trust in future performances.\n\nFootnotes [1](#483319_1_En_8_Chapter.xhtml#Fn1_source)\n\
    \n# Part III Mitigation\n\n## Minimizing impact of risks"
