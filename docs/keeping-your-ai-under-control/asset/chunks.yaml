  trans: '

    ### 内部组建还是外包


    接下来一个关键问题是——你应该招募团队成员并内部组建红队，还是将红队活动外包？


    我们都知道，安全是那些资金通常捉襟见肘的领域之一。这很棘手，因为安全举措的投资回报率很难轻易证明。除非出了问题并且你成功阻止了它，否则几乎无法直观看到或想象其价值。这种局限性使得很难说服他人相信安全投资是值得的，并且你是在明智地投入资金。


    因此，对于内部组建还是外包这个问题，一个快速的答案是——这取决于公司规模和预算。


    如果你部署 AI 系统是为了长期目标，那么内部红队将是正确的选择，因为他们可以持续参与。然而，这也会带来额外的持续性预算开销。


    相反，如果你对自己的整体前景不确定，那么外包是一个更好的起步方式。这样，你可以从长远角度测试内部组建团队的业务可行性。


    从隐私和更严格的控制角度来看，内部红队是高度合理的。红队和蓝队的活动更像是一场猫鼠游戏。如果执行得当，每一轮攻防都能提升并丰富双方团队的技能，进而增强组织的安全性。


    如果你计划进行更大规模的模拟演练，可以利用外包选项。如果你需要专业帮助，或者为特定策略执行寻找特定技能，那么外包也同样合理。


    ## 红队的目标


    红队的主要目标是通过扮演恶意实体的角色来破坏 AI 系统及其附属流程。红队不应仅仅局限于技术层面，而应作用于涉及 AI 系统的整个链条。这样做可以使他们的努力更有效，因为它能确保上游和下游的流程及系统都得到测试。


    红队应考虑整个生态系统，并找出一个坚定的威胁行为者可能如何破坏它。不应仅仅致力于攻破一个 Web 应用或特定的技术应用，而应结合多种攻击向量。这些攻击向量可能超出技术领域，例如社会工程学，或在必要时涉及物理访问。这是必要的，因为尽管你的最终目标是降低
    AI 系统的风险，但这些风险可能来自许多地方并以多种形式出现。


    为了最大化红队的价值，你应该考虑基于场景和目标的演练。


    如果你是在内部开发模型，那么一旦你的主要机器训练完成，红队就应立即启动。如果你是从外部供应商处采购训练好的模型，那么一旦采购完成，就必须立即激活红队。


    红队的主要目标是创造或构建一个合理的场景，在该场景下，当前 AI 系统的行为将是不可接受的，如果可能的话，甚至是灾难性的不可接受。如果红队成功，那么你可以将他们的场景反馈给机器训练团队，用于模型的重新训练。然而，如果红队没有成功，那么你可以有相当信心地认为，训练好的模型在现实世界场景中也会表现可靠。


    精心设计潜在的问题场景，并将整个 AI 系统暴露于这些情境之下，应该是关键目标之一。此外，这项活动不必完全以数字形式进行。红队可以通过任何可用手段和任何格式来生成这些场景，只要它们在现实生活情境中看起来合理。


    红队试图使 AI 系统失效的方法之一，是在主循环或反馈循环中输入垃圾数据，并观察系统如何响应。如果系统足够智能，它会检测到垃圾数据并做出相应处理。然而，如果系统放大了垃圾输入或基于其运行，你就会知道还有工作要做。这些（垃圾）输入可以转化为机器重新训练的训练输入。


    红队还可以致力于创建和提供合成输入，并观察系统如何响应。然后，他们可以利用输出来检查 AI 系统的内部机制。基于进一步的理解，可以使合成数据更加逼真，以测试系统的极限、响应和整体行为。一旦你识别出失效情况，修复起来就更容易了。


    红队不一定非要试图破坏系统。有时，他们可能仅仅通过输入错误的输入或修改参数，来导致系统持续学习发生漂移，从而使其在更晚的时候失效。请参考前面章节讨论的概念漂移现象。虽然概念漂移大多是自然且正常的，但它也可能是蓄意制造的。


    你的 AI 系统从另一个软件或人类获取输入的点，可能是一个薄弱环节。AI 系统的输出形成另一个 API 或 ERP 系统输入的点，也可能是一个薄弱环节。从本质上讲，这些环节是整个价值链中高度脆弱的点和薄弱环节。


    每一个连接两个异构系统的环节都是一个薄弱环节！


    红队应瞄准并识别系统中所有此类薄弱环节。这些薄弱环节可能存在于两个软件系统之间，也可能存在于软件-硬件或软件-人类交互的边界上。


    ## 红队不是为了测试防御


    红队的核心目标不是测试你的防御能力。它的目标是尽一切可能，以尽可能多的方式，通过跳出固有思维模式来破坏功能性的 AI 系统。最终，这应该会在过程中强化整个组织。


    拥有这样更广泛的授权，可以使红队能够遵循直观的方法论，为组织开发一个可靠且持续学习的学习系统。这是解决 AI 系统控制中许多严重问题的一种有前景的方法。


    然而，请记住，红队活动并不等同于负责生成测试用例的测试团队。测试用例通常遵循明确定义的失效条件，而红队的目标则宽泛得多，方法未定义，且常常是无限的。


    简而言之，你的红队应在三个关键参数上评估你的 AI 系统：


    *   失效向量后果的严重性

    *   已发现情况的发生概率

    *   早期发现失效的可能性

    '
- fmt: '# The red team is functional, what next?


    A functional red team is not just about finding the holes in your AI system. It
    is also about providing complete guidance and playbook to improve those weak points,
    plug those holes, and strengthen the system along the way, continuously.


    Moreover, an effective red team operation wouldn’t end after they have found a
    weakness in the system. It is just the beginning. The next role of the red team
    is to provide remediation assistance and re-testing. Also, more importantly, keep
    doing this as long as necessary.


    There may be significant work involved in comprehending the findings, their impact,
    likelihood, criticality, and detectability and, furthermore, carrying out suggested
    remediations, retraining of machine with new data, and whole a lot, before your
    blue team says they’re ready for the next round of testing.


    The whole process of the red team finding weaknesses and blue team fixing them
    has to be an ongoing process with regular checks and balances. Avoid the temptation
    to do it once for the sake of it. Instead, make sure that you do it regularly
    and consistently. Doing so will help you to maintain a watch on the risk score
    of each aspect and monitor how you are progressing with the already established
    risk mitigation plan. Your target for each risk item in the list should be to
    reduce its risk score near zero.


    You stress testing your AI system for any vulnerabilities is better than someone
    else exploiting it.


    Footnotes [1](#483319_1_En_9_Chapter.xhtml#Fn1_source) [2](#483319_1_En_9_Chapter.xhtml#Fn2_source)
    [3](#483319_1_En_9_Chapter.xhtml#Fn3_source) [4](#483319_1_En_9_Chapter.xhtml#Fn4_source)


    # 10. Handling Residual Risks


    I often insist that when solving any problem, three things should be covered.


    First of all, we must make sure that we are working on the right problem, that
    is, do the right thing. Without doing so, no matter what, we are going in the
    wrong direction.


    Secondly, we must make sure that the solution to that problem is being developed
    right, that is, doing the thing right.


    Thirdly, and most importantly, covering all your bases is a must. You may have
    the right solution for solving the right problem. However, if you miss the rest
    of the factors to solution success, your solution could be futile.


    Doing everything you can is the best way to cover the risks. However, no matter
    how much you cover for, there still might be some lurking risk, which is either
    unknown or uncontrollable. This risk needs a different way of management.


    ## What is a residual risk?


    `Residual risk` in the case of an AI solution or implementation would be the amount
    of risk remaining after you taking care of inherent risks by way of risk controls.
    By performing a thorough pre-mortem analysis, ensuring that training and testing
    are complete, and, finally, systems have been stress tested using the red teams,
    you would be almost confident about the performance of the system and outcomes
    it shall achieve.


    However, there still might be some risk that is unidentified or identified but
    can’t be anticipated or controlled. Such residual risk can be dealt with by way
    of transference.


    `Transference` or the risk transfer is a risk management and control strategy
    that involves the contractual shifting of a pure risk from one party to another.
    One example is the purchase of an insurance policy, by which a specified risk
    of loss is passed from the policyholder to the insurer.^([^(27)](#fn27))


    ## Existing options and limitations


    If you have an IT solution, which is the closest equivalent for an AI solution,
    a few options are already available in the market for transferring some of the
    risks.


    `Information Technology Liability` (IT Liability) insurance covers claims arising
    from the failure of information technology products, services, and/or advice.^([^(28)](#fn28))


    The information technology (IT) industry has unique liability exposures due to
    the crossover between the provision of professional services and supply of goods.
    Moreover, many service providers in this industry have a mix of both. It gets
    further complicated by the legal ambiguity around software advice and development
    and whether it is, in fact, the provision of a service or the sale of goods.


    Traditional `Professional Indemnity` insurance policies often have onerous exclusions
    relating to the supply of goods, whereas traditional `Public and Products Liability`
    policies often contain exclusions relating to the provision of professional services.


    Many insurers have developed a range of insurance options to address these issues,
    which they commonly refer to as `IT Liability` policies. These policies represent
    a combination of `Professional Indemnity` and `Public and Products Liability`
    insurances bundled into one product. These policies were developed to minimize
    the prospect of an uninsured claim due to its “`falling between the gaps`” between
    the two traditional insurance products.


    However, the added complexity of AI solutions is driven by complex algorithms
    in addition to the data ingested or processed. Over time, change in data can significantly
    change product or solution characteristics; add to that cloud-based AI/ML services.
    It just widens the gap in existing options, and with that, the prospect of `falling
    through the gaps` increases significantly.'
