  trans: '

    # 一家澳大利亚电信公司如何浪费了数百万美元


    2018 年初，一家澳大利亚电信公司下定决心，为其事件处理流程部署了一个自动化机器人（`auto-bot`）。尽管该公司期望从实施之初就获得收益，并节省超过
    25%的运营成本，但计划却适得其反。


    这个`auto-bot`旨在拦截所有网络事件（100%的事件），然后根据用户选择的问题描述执行一系列检查。该`auto-bot`被编程为根据其执行的测试结果采取三种行动之一：它可以通过编程方式修复问题来远程解决事件，或者判断是否需要技术人员前往客户现场，并据此直接派人；如果以上情况都不明显，它就会将案例提交给人工操作员进行进一步调查和决策。


    这种方法起初听起来合理且完全合乎逻辑。然而，在`auto-bot`开始运行后的几周内，该公司意识到，这个`auto-bot`派往现场的技术人员数量比之前人工处理整个流程时多得多。派遣技术人员进行现场访问成本高昂，并且始终是解决问题的最后选择。然而，`auto-bot`却最大限度地采用了这种方式。


    经过调查，团队发现存在一些事件场景，人工操作员能够理解（并且总能将线索联系起来），但这些场景不够清晰，无法为`auto-bot`编程。在所有此类情况下，人工操作员会做出与`auto-bot`不同的决定。


    不过，主要问题在于，尽管发现了逻辑缺陷，自动化团队却无法关闭`auto-bot`（很像微软对 Tay 所做的那样）。`auto-bot`是以*全有或全无*的方式实施的，并且它正好位于用户和操作员界面的中间。这基本上意味着要么所有事件都通过`auto-bot`处理（并且经常被错误处理），要么所有事件都不通过`auto-bot`处理，从而由人工处理。现在，唯一的问题是该公司尚未准备好处理如此大的工作量。


    最终，该公司在`auto-bot`运行期间又启动了一个项目来修复它，并在此过程中浪费了数百万美元。这些钱（或者说浪费的钱）花在了两个方面：一是继续使用并不那么智能的`auto-bot`提供服务，二是运行一个持续了一年多的大规模修复项目。


    随着禀赋效应的显现，该公司没有计划回头从根本上解决问题，而是继续硬着头皮推进，浪费了大量资金。一个关键问题依然存在——最终谁来买单？


    事后看来，这次实施在多个层面都出了问题，从系统设计到实施再到问题修复。但首先浮现的问题是，为什么没有 B 计划，某种可以停止这个`auto-bot`的终止开关？似乎`auto-bot`的开发和部署并未对所有潜在场景进行彻底测试，因此缺乏本可以及早发现问题的严格测试。虽然修复问题所需的时间太长，但检测`auto-bot`失败所花的时间则更长。


    # 这些失败案例有共同点


    无论是微软的聊天机器人 Tay、优步的自动驾驶汽车，还是澳大利亚电信公司的`auto-bot`，所有这些失败案例都有共同点。而问题并不在于技术本身！


    在所有这些场景中，要么是人工智能的创造者，要么是部署人工智能的企业，都不够谨慎。处理像自动化或初级人工智能这样强大事物的基本原则没有得到负责任地遵循。我们常说：“能力越大，责任越大。”然而，在所有这些案例中，负责任的设计或部署都没有发生，或者没有完全实现。


    这种负责任的行为不仅需要在人工智能的部署和使用中体现，同样需要在从构思到设计、从测试到实施以及持续管理和治理的所有阶段中贯彻。


    我们讨论的几乎所有五个案例在解决方案构思阶段都存在一定程度的弱点，这直接渗透到了它们的开发过程中。


    在 Tay 聊天机器人、澳大利亚电信公司和优步自动驾驶汽车的案例中，对解决方案质量的重视不够。可能有一些测试流程，刚好满足 IT 开发框架的要求，但不足以满足人工智能开发框架的要求——而后者根本不存在！


    即使在亚马逊的案例中，决策者的技能也可能受到质疑。尽管将当日达服务仅推广到少数几个地区看似是一个不经意的决定，但深思熟虑本可以引发对这些问题的反思。澳大利亚电信公司的案例或灯泡的情况也是如此，其创造者缺乏对解决方案的深思熟虑的设计。

    '
- fmt: '# Key Lessons


    While there are several use cases of AI to learn from, I specifically chose these
    five, which are indicative of a common issue with AI design, development, deployment,
    and governance; and that is a thoughtful or responsible approach.


    A few key learnings that have emerged are as follows:


    - **Data governance is essential** from ethical AI’s point of view; therefore,
    the creators of AI need to ensure they have robust data governance foundations,
    or their AI applications risk being fed with inappropriate data and breaching
    several laws.


    - Narrow AI is all about the relation between input and outputs. You provide input
    `X` and get output `Y`, or there is input `X` to do output `Y`. Either way, the
    nature of input affects output such that indiscriminate input can lead to adverse
    outcomes. And this is just one good reason why **rigorous testing is so important**.
    We must note that in the case of AI systems, general IT system testing mechanisms
    are usually not enough.


    - Automated decisions are suitable when there is a large volume of decisions to
    be made, and the criteria are relatively uniform and uncontested. When discretion
    and exceptions are required, automated systems should be only used as a tool to
    assist humans—or don’t use them at all. There are still several applications and
    use cases, which are not defined as clearly as a game of chess.


    - **Humans must always be kept in the loop**, no matter what, whether it is during
    the design phase of AI or testing or deployment. Majority of the AI systems are
    still in infancy, and all of them still need a responsible adult to be in charge.
    And most importantly ensuring enough human resources are available to handle the
    likely workload is always a good idea. How to estimate a reasonable workload is
    an important question, though.


    - And most importantly, **a transparent chain of accountability**—if the answer
    to a question “Who is responsible for the decision made by this AI?” does not
    yield single person’s name, then this gap needs to be fixed.


    - For customer-facing AI systems, **having a good experience all times is crucial**.
    If customers have a terrible experience, they would lose the trust and eventually
    render your AI solution useless.


    - Fairness, lack of bias, interpretability, explainability, transparency, repeatability,
    and robustness are a few critical aspects that are some of **the must-have characteristics
    for a trustworthy AI** solution.


    - As AI systems become more powerful, managing risk is going to be even more critical
    from a **good governance and risk management** point of view. Having this governance
    in place is not only an umbrella requirement for the industry but also is a good
    idea for every business to have in-house.


    - The **ethical aspect must always be upheld**, and just because something can
    be done, should not be done. An AI that negatively affects employees, customers,
    or the general public, directly or indirectly, serves no good and should not exist.


    > Failure is not mere failure. It is instructive. The person who really thinks
    learns quite as much from his failures as from his successes.

    >

    > —John Dewey, *American philosopher*


