- fmt: "### Highlighting statistical bloopers\n\nBy and large, these analytical techniques\
    \ depend on summary statistics of the dataset. This approach can be a significant\
    \ problem because multiple datasets with different characteristics can have the\
    \ same summary statistics. In February 1973, F. J. Anscombe published a journal\
    \ article where he says, “A computer should make both, calculations and graphs.\
    \ Both sorts of output should be studied; each will contribute to understanding.”^([^(23)](#fn23))\n\
    \nInspired by Anscombe’s Quartet and the Datasaurus, in August 2016, Alberto Cairo\
    \ created the Datasaurus^([^(24)](#fn24)) dataset. This dataset urges people to\
    \ “never trust summary statistics alone; always visualize your data,” since, while\
    \ the data exhibits normal-seeming statistics, plotting the data reveals a picture\
    \ of a dinosaur.\n\nAutodesk, in 2017 published^([^(25)](#fn25)) a detailed paper\
    \ titled “Same Stats, Different Graphs: Generating Datasets with Varied Appearance\
    \ and Identical Statistics through Simulated Annealing,” on these new characteristics\
    \ of datasets.\n\nAs you go through all these references, you would realize that\
    \ from an attacker’s perspective, this is a boon. Also, in real life, the occurrence\
    \ of these types of scenarios is possible. Without having a capable red team and\
    \ supervising AI regularly, these issues could turn into threats and may go undetected\
    \ for too long.\n\n### Detecting concept drift\n\nIn addition to the statistical\
    \ bloopers, supervising AI can help you identify a phenomenon known as “concept\
    \ drift.” A concept in “concept drift” refers to the unknown and hidden relationship\
    \ between inputs and output variables. The change in data can occur due to various\
    \ real-life scenarios.\n\nMore so, this problem of change in data over time and\
    \ thereby affecting statically programmed (or assumed) underlying relationships\
    \ is a common occurrence for several other real-life scenarios of machine learning.\
    \ The technical term, in the field of machine learning, for this scenario is “concept\
    \ drift.”^([^(26)](#fn26))\n\nYou may ask, “Why is this a problem?”.\n\nFor an\
    \ utterly static use case, this (concept drift) is not a problem at all. However,\
    \ in several use cases, the relationship between input parameters (or features)\
    \ and output characteristics changes over time. If your machine learning model\
    \ did assume data patterns to be static, there would be a problem in the future.\
    \ This drift cannot be predicted as the changes in the environment or affecting\
    \ factors could be random or fabricated. Either way, without supervising AI system,\
    \ you would never be able to uncover them.\n\nOne of the significant challenges\
    \ in dealing with concept drift is to detect when this drift occurs. There I suggest\
    \ one of two ways to handle that.\n\nWhen you finalize a machine learning model\
    \ for deployment, record its baseline performance parameters such as accuracy,\
    \ skill level, and others. When you deploy the model, periodically monitor these\
    \ parameters for change, that is, supervise AI regularly. If you see the difference\
    \ in parameters is significant, it could be indicative of potential concept drift,\
    \ and you should take action to fix it.\n\nThe other way to handle it is to assume\
    \ that drift will occur and, therefore, periodically update the model.\n\nIt is\
    \ unrealistic to expect that data distributions stay stable over a long period.\
    \ The perfect world assumptions in machine learning do not work in most of the\
    \ cases due to changes in the data over time. This limitation is a growing problem\
    \ as the use of these tools and methods increases.\n\nAcknowledging that AI or\
    \ machine learning may remain inside a black box for a long time and still they\
    \ would evolve continuously is the key to fixing it.\n\n### Finding what’s inside\
    \ the black box\n\nAI systems being the black box is going to be a pertinent and\
    \ ongoing problem. Regardless of the influx of sea of trust issues and questions,\
    \ it will be near impossible to get access to the internal logic of AI systems.\n\
    \nHowever, this black-box problem can be handled slightly differently with the\
    \ help of red teams in operation and supervising AI.\n\nThis approach, however,\
    \ needs a careful designing of experiments and scenarios by testing and red teams\
    \ and then executing them systematically. When done correctly, users or organizations\
    \ can reasonably estimate what is going on inside the black box and then act accordingly.\n\
    \nRemember that this is true for external parties too, who would try to manipulate\
    \ your AI systems in malicious ways. So this is why AI supervision can play an\
    \ essential role in identifying these risks up front or as early as possible.\n\
    \n## Building your red team\n\nIdeally, a red team needs at least two people to\
    \ be effective, though many ranges from two to five. If you are a large company,\
    \ you might need 15+ members in the team to work on several fronts.\n\nDepending\
    \ upon the type of AI you are deploying, your red team’s composition might change\
    \ with different skill sets. The structure is necessary to maximize the team’s\
    \ effectiveness.\n\nTypically, you would need physical security experts, such\
    \ as the ones who understand and can deal with physical locks, door codes, and\
    \ other aspects. You would also need a social engineer to phish out information\
    \ through emails, phone calls, social media, and other such options. Also, most\
    \ importantly, you would need a technology expert, preferably a full stack one\
    \ to exploit hardware and software aspects of your system. These skill set requirements\
    \ are the minimum. If your application and systems are too complicated, then it\
    \ will make sense to hire specialists for individual elements and have a mixed\
    \ team of experts.\n\n### Top five red team skills\n\nThe most important skill\
    \ any of the red team members can have is to think as negatively as possible and\
    \ remain as creative as they can be when executing the job:\n\n- **Creative negative\
    \ thinking:** It is the core goal to continually find new tools and techniques\
    \ to invade systems and eventually protect the organization’s security. Moreover,\
    \ showing the flaws in the systems needs a level of negative thinking to counter\
    \ the inbuilt optimism in an individual.\n\n- **Profound system-wide knowledge:**\
    \ It is imperative for red team members to have a deep understanding of computer\
    \ systems, hardware and software alike. They should also be aware of typical design\
    \ patterns in use.\n\n    Additionally, this knowledge shouldn’t be limited to\
    \ only computer systems. It must span across many systems to involve heterogeneous\
    \ systems.\n\n- **Penetration testing (aka pen testing):** This is a common and\
    \ fundamental requirement in the cybersecurity world. Moreover, for red teams,\
    \ it becomes an essential part and kind of standard procedure.\n\n- **Software\
    \ and hardware development:** Having this skill means as a red team member, you\
    \ can envisage and develop tools required to execute your tasks.\n\n    Moreover,\
    \ knowing how AI systems are designed in the first place means you are likely\
    \ to know failure points. One of the critical risks AI systems always pose is\
    \ “logical errors.” These errors do not break the system but make them behave\
    \ in a certain way that is not intended or may cause more damages. If a red team\
    \ member has experience in software and hardware development, then it is highly\
    \ likely that they have seen all the typical logical errors. Therefore, they can\
    \ exploit them to accomplish their job.\n\n- **Social engineering:** This goes\
    \ without saying as manipulation of people into doing something that can lead\
    \ the red team to their goal is essential. The people aspect is also one of the\
    \ failure vectors that the actual attacker would use. Human errors and mistakes\
    \ are one of the most frequent reasons for cyber problems."
