- fmt: '# When Microsoft’s chatbot went Nazi on social network


    On March 23, 2016, Microsoft Corporation released an artificially intelligent
    chatbot, named “Tay.” Named after the acronym “Thinking About You,” `Tay` was
    developed to help better understand how AI would interact with human users online.


    Subsequently, `Tay` was programmed to ingest tweets and learn from them to communicate
    by responding and interacting with those users. Mainly, the target audience was
    American young adults. I do not think the outcome would have been any different
    if the target audience was any different though. However, this attempted experiment
    only lasted 24 hours before `Tay` had to be taken offline for publishing extreme
    and offensive racist as well as sexist tweets.


    `Tay` was a classic example of a system that was vulnerable to a burning and pertinent
    issue in the data science world—“garbage in, garbage out.” `Tay` was developed
    to learn from active real-time conversations on Twitter, but it did not have an
    ability to filter offensive inputs or bigoted comments in the process. Perhaps
    that ability was there but wasn’t enough for the purpose. Ultimately, `Tay` learned
    from user responses and reflected the same kind of emotion or thinking. Since
    most of the tweets were abusive, racist, and sexist, `Tay`’s responses followed
    the pattern.


    The second attempt to release `Tay` by Microsoft didn’t go too well either, and
    the bot was taken down soon after the second release. It hasn’t been up online
    since then.


    When looking closely, I see that although `Tay` wasn’t explicitly programmed for
    discrimination of any kind, it is safe to assume that its learning data did not
    have any discriminating characteristics either. However, the feedback loop from
    which `Tay` was supposed to learn seemed to have a flaw.


    # When Amazon’s same-day delivery caused a racial disparity


    In early 2016, Amazon rolled out same-day delivery to its Prime program subscribers,
    but only for a select group of American cities. That too was only for a select
    group of neighborhoods, potentially, where the concentration of Prime subscribers
    was large enough to justify operational costs. However, it sooner became an issue
    when people realized that predominantly nonwhite neighborhoods were primarily
    excluded from this offering. Customers from these areas weren’t happy as they
    believed to be excluded from same-day delivery and this further marginalized them
    while already facing the impact of bias and discrimination.


    When this issue was highlighted in several forums and the media, Craig Berman,
    Amazon’s VP for Global Communications, asserted, “When it comes to same-day delivery,
    our goal is to serve as many people as we can.” He continued, “Demographics play
    no role in it. Zero.”^([²](#fn2)) From Amazon’s standpoint, this seemed to be
    a logical approach from the cost and efficiency perspective, such that they would
    prioritize areas with most existing paying members over the others.


    A solely data-driven approach that looked at numbers instead of people did reinforce
    long-entrenched inequality in access to their services. For people who were inadvertently
    excluded, the fact that it was not deliberate did not make much practical difference.
    The fact that racial demographics tend to correlate with location or zip code
    did result in indirect discrimination.


    Apparently, in scenarios, when zip codes are considered as one of the data points
    for any decision-making, there will always be some inherent bias. This is because
    zip codes usually represent tightly knit communities of one kind. Perhaps better
    sampling of input data could help to a certain extent in minimizing this risk,
    but it would be far from being absolute zero.


    # When Uber’s autonomous car killed a pedestrian


    In 2018, an Arizona pedestrian was killed by an automated vehicle owned by Uber.^([³](#fn3))
    A preliminary report released by the National Transportation Safety Board (NTSB)
    in response to the incident stated that there was a human, present in the automated
    vehicle, but the human was not in control of the vehicle when the collision occurred.


    Accidents usually imply several things going wrong at once and hence are difficult
    to investigate as well as ascertain the final accountability and root cause. Various
    reasons contributed to this accident—poor visibility of the pedestrian, inadequate
    safety systems of the autonomous car, and lack of oversight by the human assistant.


    The legal matter was eventually settled out of courts, and further details were
    not released. However, the issues around liability present significant complexity
    due to multiple parties and actors involved. In this occasion, the vehicle was
    operated by Uber but was under the supervision of a human driver who was Uber
    employee, and it was operated autonomously using components and systems designed
    by various other tech companies.


    Responsibility attribution with an AI system poses a significant dilemma, and
    unfortunately, there are no set standard guidelines, which could make it more
    transparent.


    On occasions like this, where human lives are directly affected, clarity is undoubtedly
    needed along with a universal framework to help in a standardized approach to
    deal with such matters.


    Although there was no final and clear legal verdict as such, the fact that ambiguity
    exists is a significant concern. When there are several actors at play, human
    as well as nonhuman, direct as well as indirect, ascertaining accountability,
    root cause, and liability will be the key for clarity.


    # When the light bulb DoS attacked an entire smart home


    This is a story from 2009, when Raul Rojas, a computer science professor at the
    Free University of Berlin, built one of Germany’s first smart homes.^([⁴](#fn4))


    Everything in his house was connected to the Internet so that lights, music, television,
    heating, and cooling could all be turned on and off from afar. Even the stove,
    oven, and microwave could be turned off with Rojas’s computer.


    Now the challenge with his setup was ubiquitous one; there were several manufacturers
    and protocols at play. To help address this, Rojas designed the whole system such
    that all of his smart devices were connected to one hub. The hub was mainly a
    coordinator of all the communications among devices as well as through the Internet.


    A few years later of his installation, during 2013, his smart home gave up and
    stopped responding to his commands. In computer parlance, system hanged up or
    froze. When Rojas investigated, it turned out that there was one single culprit
    that caused this problem, a connected light bulb!


    He found that his light fixture burned out and was trying to tell the hub that
    it needed attention. However, when doing this, it was continuously sending requests
    to the hub, which overloaded the network and eventually caused it to freeze. In
    other words, it was causing a denial of service (DoS) to the rest of the smart
    home devices by standing in their way of communication with the hub. When Rojas
    change the bulb, the problem was fixed promptly.


    This, however, highlights a few potential problems in smart homes and otherwise
    so-called autonomous systems. When things go wrong and are out of hands, how an
    end user can take over the control and put things back to their place? Let alone
    controlling, how an average end user can even investigate the matter and figure
    out what is wrong in the first place? Rojas did not design for a bypass mechanism
    where he could commandeer the whole system. Maybe because it was an integration
    of several heterogeneous systems or perhaps he didn’t think of it!'
