  trans: "\n### 突出统计谬误\n\n总体而言，这些分析技术依赖于数据集的汇总统计。这种方法可能带来严重问题，因为具有不同特征的多个数据集可能拥有相同的汇总统计。1973\
    \ 年 2 月，F. J. 安斯库姆发表了一篇期刊文章，其中写道：“计算机应同时进行计算和绘图。两种输出都应加以研究；每一种都有助于理解。”^(²³)\n\n\
    受安斯库姆四重奏和恐龙数据集的启发，阿尔贝托·卡伊罗于 2016 年 8 月创建了恐龙数据集^(²⁴)。该数据集敦促人们“永远不要只相信汇总统计；始终要将数据可视化”，因为当数据呈现出看似正常的统计结果时，绘制数据图却会揭示出一只恐龙的图案。\n\
    \n欧特克公司于 2017 年发表^(²⁵)了一篇题为《相同统计，不同图形：通过模拟退火生成外观各异但统计相同的数据集》的详细论文，阐述了数据集的这些新特性。\n\
    \n当你通读所有这些参考文献时，你会意识到，从攻击者的角度来看，这简直是一个福音。此外，在现实生活中，这类场景的发生也是可能的。如果没有一支能力强大的红队并定期进行\
    \ AI 监督，这些问题可能会演变成威胁，并在很长一段时间内不被察觉。\n\n### 检测概念漂移\n\n除了统计谬误之外，AI 监督还能帮助你识别一种被称为“概念漂移”的现象。“概念漂移”中的“概念”指的是输入与输出变量之间未知且隐藏的关系。数据的变化可能由各种现实场景引起。\n\
    \n更重要的是，这种数据随时间变化，进而影响静态编程（或假设）的底层关系的问题，在机器学习的其他几个现实场景中也很常见。在机器学习领域，这种情况的技术术语就是“概念漂移”。^(²⁶)\n\
    \n你可能会问：“这为什么是个问题？”\n\n对于一个完全静态的用例来说，这（概念漂移）根本不是问题。然而，在许多用例中，输入参数（或特征）与输出特性之间的关系会随时间变化。如果你的机器学习模型假设数据模式是静态的，那么未来就会出现问题。这种漂移无法预测，因为环境或影响因素的变化可能是随机的或人为制造的。无论哪种情况，如果没有\
    \ AI 监督系统，你永远无法发现它们。\n\n处理概念漂移的主要挑战之一是检测漂移何时发生。对此，我建议采用以下两种方法之一。\n\n当你确定要部署的机器学习模型时，记录其基线性能参数，例如准确率、技能水平等。部署模型后，定期监控这些参数的变化，即定期进行\
    \ AI 监督。如果你发现参数差异显著，这可能表明存在潜在的概念漂移，你应该采取行动加以修复。\n\n另一种处理方法是假设漂移会发生，并因此定期更新模型。\n\
    \n期望数据分布在很长一段时间内保持稳定是不现实的。由于数据随时间变化，机器学习中完美世界的假设在大多数情况下并不适用。随着这些工具和方法的使用增加，这一局限性正成为一个日益严重的问题。\n\
    \n承认 AI 或机器学习可能在很长一段时间内仍处于黑箱之中，并且它们会持续演进，这是解决问题的关键。\n\n### 探索黑箱内部\n\nAI 系统作为黑箱将是一个持续存在且至关重要的问题。尽管存在大量信任问题和质疑，但几乎不可能获取\
    \ AI 系统的内部逻辑。\n\n然而，借助红队的运作和 AI 监督，这个黑箱问题可以稍微以不同的方式处理。\n\n然而，这种方法需要测试团队和红队精心设计实验和场景，然后系统地执行它们。如果操作得当，用户或组织可以合理估计黑箱内部的情况，并据此采取行动。\n\
    \n请记住，这对于试图以恶意方式操纵你 AI 系统的外部方也同样适用。因此，这就是为什么 AI 监督可以在预先或尽早识别这些风险方面发挥重要作用。\n\n\
    ## 组建你的红队\n\n理想情况下，一个红队至少需要两个人才能有效运作，尽管许多团队规模在 2 到 5 人之间。如果你是一家大公司，你可能需要 15 名以上的团队成员在多个方面开展工作。\n\
    \n根据你部署的 AI 类型，你的红队构成可能会因所需技能组合的不同而改变。合理的结构对于最大化团队效率至关重要。\n\n通常，你需要物理安全专家，例如那些理解并能处理物理锁、门禁密码和其他方面问题的人。你还需要一名社会工程师，通过电子邮件、电话、社交媒体和其他类似途径来诱骗信息。此外，最重要的是，你需要一名技术专家，最好是全栈工程师，来利用你系统的硬件和软件方面的漏洞。这些技能要求是最低限度的。如果你的应用程序和系统过于复杂，那么为各个元素聘请专家并组建一个混合专家团队将是明智之举。\n\
    \n### 红队五大核心技能\n\n任何红队成员所能拥有的最重要技能，就是在执行任务时尽可能地进行负面思考，并尽可能保持创造力：\n\n- **创造性负面思维：**\
    \ 其核心目标是不断寻找新的工具和技术来入侵系统，并最终保护组织的安全。此外，揭示系统中的缺陷需要一定程度的负面思维，以对抗个人内在的乐观主义。\n\n-\
    \ **深厚的系统级知识：** 红队成员必须对计算机系统（包括硬件和软件）有深刻的理解。他们还应该了解当前使用的典型设计模式。\n\n    此外，这种知识不应仅限于计算机系统。它必须跨越多个系统，涉及异构系统。\n\
    \n- **渗透测试：** 这是网络安全领域常见且基本的要求。此外，对于红队来说，它已成为一个基本组成部分和一种标准流程。\n\n- **软件和硬件开发：**\
    \ 拥有这项技能意味着作为红队成员，你可以设想并开发执行任务所需的工具。\n\n    此外，首先了解 AI 系统是如何设计的，意味着你很可能知道其故障点。AI\
    \ 系统始终存在的一个关键风险是“逻辑错误”。这些错误不会破坏系统，但会使系统以某种非预期的方式运行，或可能造成更大的损害。如果红队成员有软件和硬件开发经验，那么他们极有可能见过所有典型的逻辑错误。因此，他们可以利用这些错误来完成工作。\n\
    \n- **社会工程学：** 这自不必说，因为操纵人们去做某些事情，从而引导红队达成目标，是至关重要的。人的因素也是真实攻击者会利用的失败向量之一。人为错误和失误是导致网络问题最常见的原因之一。\n"
- fmt: '### In-house or outsourced


    Now the next key question is—should you hire your team members and employ in-house
    or outsource the red team activity?


    We all know that security is one of those aspects where funding is mostly dry.
    It is tough because the ROI of security initiatives cannot be proven easily. Unless
    something goes wrong and you prevent it, it is nearly impossible to visualize
    or imagine. This limitation makes it difficult to convince that the investment
    in security is worth doing, and you are investing money wisely.


    So, a quick answer to an in-house or outsourced question would be—it depends on
    company size and the budget.


    If you have deployed AI systems for long-term objectives, then the in-house red
    team would be the right choice as they would be engaged continuously. However,
    that comes with an additional ongoing budget overhead.


    On the contrary, if you are unsure about your overall outlook, outsourcing is
    a better way to start. This way, you can test your business case for in-house
    hiring in the long run.


    From privacy and stricter controls perspective, the in-house red team is highly
    justifiable. The red team and blue team activities are more like cat-n-mouse games.
    When done correctly, each round can improve and add to the skill set of both the
    teams, which in turn would enhance the organization’s security.


    You can utilize the outsourcing option if you are planning to run a more extensive
    simulation. If you need specialized help or looking for a specific skill set for
    particular strategy execution, then also it would make sense.


    ## Objectives of a red team


    Primarily, the red team exists to break the AI system and attached processes by
    assuming the role of the maleficent entity. The red team should go beyond just
    the technology aspect and work on the entire chain that involves the AI system.
    Doing this can make their efforts more effective as it can then ensure that upstream
    as well as downstream processes and systems are tested.


    A red team should consider the full ecosystem and figure out how a determined
    threat actor might break it. Instead of just working toward breaking a web app
    or particular technology application, it should combine several attack vectors.
    These attack vectors could be outside the technology domain, such as social engineering
    or physical access if needed. It is necessary because although your ultimate goal
    would be to reduce AI systems’ risks, these risks can come from many places and
    in many forms.


    To maximize a red team’s value, you should consider a scenario and goal-based
    exercise.


    The red team should get into motion as soon as your primary machine training is
    complete, which applies if you are developing the model in-house. If you are sourcing
    trained model(s) from an outside vendor(s), then the red team must be activated
    as soon as sourcing completes.


    The primary goal of a red team would be to produce or create a plausible scenario
    in which the current AI system behavior would be unacceptable and, if possible,
    catastrophically unacceptable. If the red team succeeds, then you can feedback
    their scenarios to the machine training team for retraining of the model. However,
    if the red team does not succeed, then you can be reasonably confident that the
    trained model will behave reliably in the real-world scenario too.


    Carefully staging potentially problematic scenarios and exposing the whole AI
    system to those situations should be one of the critical objectives. Also, this
    activity need not be entirely digital in format. The red team can generate these
    scenarios by any means available and in any formats as they seem plausible in
    real-life situations.


    One of the ways the red team can attempt to fail the AI system is by giving garbage
    inputs in primary or feedback loop and seeing how it responds. If the system is
    smart, it will detect the garbage and act accordingly. However, if the system
    magnifies or operates on the garbage input, you will know that you have work to
    do. These (garbage) inputs can take a form of training inputs for machine retraining.


    Red teams can also work on creating and providing synthetic inputs and see how
    the system responds. The output then they can use to examine the AI system’s internal
    mechanics. Based on further understanding, synthetic data could be made more authentic
    to test the system’s limits, responses, and overall behavior. Once you identify
    failure situations, they are easier to fix.


    Red teams may not necessarily try to break the systems. Sometimes, they may merely
    cause a drift in the continuous learning of the system by feeding wrong inputs
    or modifying parameters and thereby cause it to fail much later. Refer to concept
    drift phenomena discussed in the earlier section. While concept drift is mostly
    natural and normal, it can be deliberate and manufactured.


    A point where your AI system is taking input from another software or human could
    be a weak link. A point where the output of an AI system forms an input to another
    API or ERP system could also be a weak link. By nature, these links are highly
    vulnerable spots and weak links of the whole value chain.


    Every link that joins two heterogeneous systems is a weak link!


    Red teams should target and identify all such weak links in the system. These
    weak links may exist between two software systems or at the boundary of software-hardware
    or software-human interaction.


    ## A red team is not for testing defenses


    The core objective of the red team is not to test your defense capabilities. It
    is to do anything and everything to break the functional AI system, in as many
    ways as possible, and by thinking outside the box. Ultimately this should strengthen
    the whole organization in the process.


    Having this broader remit can enable red teams to follow intuitive methodologies
    for developing a reliable and ongoing learning system for the organization. It
    is a promising approach to many severe problems in AI systems’ control.


    However, remember that red teaming is not equivalent to a testing team who work
    on generating test cases. Test cases usually follow a well-defined failure condition(s),
    whereas for the red team objective is much broader, methods are undefined and
    often limitless.


    In a nutshell, your red team should evaluate your AI system on three key parameters:


    *   The severity of the consequences of a failure vector

    *   The probability of occurrence as found

    *   The likelihood of early detection of failure'
