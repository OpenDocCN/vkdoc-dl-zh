  trans: '

    ### 事前验尸分析的关键部分


    事前验尸分析（或称 FMEA）通常由跨职能的主题专家团队完成。开展这项活动的最佳形式是举办研讨会。


    在研讨会期间，团队会深入分析设计及流程的实施或变更情况。此活动的主要目标是找出产品或流程（或两者）每个环节中存在的弱点和风险。一旦识别出这些风险，就要采取行动加以控制和缓解，并验证一切均在掌控之中。


    事前验尸分析记录包含以下 16 个栏目：


    1.  **流程步骤或系统功能：** 此栏目简要概述您正在分析的功能、步骤或项目。在多步骤流程或多功能系统中，会有多行内容，每行分别概述这些步骤。


    2.  **失效模式：** 对于第 1 栏中列出的每个步骤，您可以识别出一种或多种失效模式。它回答的问题是：流程或解决方案可能在哪些方面失效？或者可能出什么问题？


    3.  **失效影响：** 如果发生第 2 栏中识别出的失效，其影响是什么？该失效会如何影响关键流程指标、产品规格、客户需求或客户体验？


    4.  **严重度：** 此栏目列出了第 2 栏中每种失效的严重度评级。使用第 3 栏中列出的失效影响来确定评级。严重度的典型评分范围为 0 到 10；0
    表示最不严重，而 10 表示最严重的后果。


    5.  **根本原因：** 对于第 2 栏中列出的每种失效，进行根本原因分析以回答以下问题：是什么导致这个步骤或功能出错？


    6.  **频度：** 此栏目是基于失效发生频率的另一个评级。第 2 栏中列出的每种失效发生的可能性有多大？频度按 1 到 10 的等级进行排名，其中 1
    表示发生频率低，10 表示发生频率高或频繁。


    7.  **现行控制：** 回答以下问题：目前有哪些控制措施可以防止第 2 栏中列出的潜在失效？有哪些控制措施可以检测故障的发生（如果有的话）？


    8.  **探测度：** 另一个评级栏目，用于评估每种失效被探测到的难易程度。通常要问的问题是：探测到每种潜在失效的容易程度如何？您有多大可能性能及时或在它们到达客户之前发现这些潜在失效？探测度按
    10 到 1 的等级进行排名（注意等级顺序是反向的）。这里，评级 1 表示失效容易被快速探测到，而 10 表示不太可能且很晚才能探测到失效。探测得晚通常意味着问题更严重，因此对晚探测的评级更高。


    9.  **RPN（风险优先级数）：** 风险优先级通过将第 4、6 和 8 栏中的三个评级相乘得出。因此，`RPN = 严重度 x 频度 x 探测度`。这样，高的`RPN`值就表明该流程步骤或解决方案功能（如第
    1 栏所示）存在高风险。相应地，具有较高`RPN`值的步骤或功能需要立即关注并加以修复。


    10.  **建议措施：** 在此栏目中，主题专家会建议采取一项或多项措施来处理已识别的风险。这些措施可能旨在降低严重度、减少失效发生的几率、提高探测水平，或者兼而有之。


    11.  **措施负责人、目标日期等：** 此栏目从项目管理和跟踪的角度来看至关重要。每项建议措施都可以分配给特定的负责人，并在目标日期前执行以控制风险。


    12.  **已采取的措施：** 此栏目列出了为将风险水平（`RPN`）降低到可接受或更低水平而采取的所有措施，无论是建议的措施还是其他措施。


    13.  **新严重度：** 一旦第 12 栏中列出的措施完成，必须重复相同的评估过程，以得出新的严重度水平。


    14.  **新频度：** 根据已完成的措施，频度必然发生了变化，因此此栏目记录新的频度评级。


    15.  **新探测度：** 由于采取了风险缓解措施，探测度也必然发生了变化；请在此栏目中记录。


    16.  **新 RPN：** 由于严重度、频度和探测度评级的变化，风险水平也会发生变化。新的`RPN`以相同方式计算，即`严重度 x 频度 x 探测度`，并记录在此栏目中。


    ### 关于评级的更多信息


    一些风险分析方法通常只推荐两种评级评估，即严重度和频度。然而，在事前验尸分析中，我们使用了第三种评级——探测度。


    问题的早期探测通常能使您在风险变得重大且失控之前将其控制住。这样，您可以立即修复系统，或者启动系统范围的控制措施以保持更高的警惕。无论如何，能够快速有效地探测到失效，对于像人工智能这样的复杂系统来说是一个优势。


    对于严重度和频度评级，1 到 10 的评分标准不会因解决方案类型或行业而改变，因为这些通常是通用定义的标准。


    在实施事前验尸分析时，您必须采取务实的方法，并选择适当的评分标准。只需确保在整个事前验尸分析过程中，您的定义保持一致即可。


    在开展事前验尸分析研讨会时，参与者必须事先设定并商定评级标准，然后针对每种失效模式的严重度、频度和探测度水平进行评定。

    '
- fmt: '### Using the Output of the Analysis


    The output of pre-mortem analysis is only useful if you use it.


    Each process step or system function would have one or more `RPN` values associated
    with it. The higher the `RPN`, the riskier the step is. During the pre-mortem
    exercise, the team must decide a threshold `RPN` value. This way, for all the
    steps where `RPN` is above the threshold, risk mitigation and control plan become
    mandatory, whereas for `RPN`s below threshold may be addressed later as their
    priority would be lower.


    Ideally, you should be addressing all the practical steps wherever `RPN` is nonzero.
    However, it is not always possible due to resource limitations.


    One of the ways you can reduce `RPN` is by reducing the severity of the failure
    mode. Typically, reducing severity often needs functional changes in process steps
    or the solution itself. Additionally, the occurrence can be controlled by addition
    of specific control measures such as human in the loop or maker-checker mechanisms.


    However, if it is not possible to reduce the severity or occurrence, then by implementing
    control systems, you can contain the failures. Control systems can help in either
    detection of causes of unwanted events before the consequence occurring or the
    detection of root causes of unwanted failures that the team can then avoid altogether.


    Having risks quantified and visible also enables you to have plans in place to
    act quickly and appropriately in case of failures and thus reduces the exposure
    to more failures or adverse consequences.


    It is possible that during the pre-mortem exercise, the team will discover many
    failure modes or root causes that were not part of the designed controls or test
    cases/procedures. It is crucial that the test and control plan is always impacted
    by the results of this analysis. Ideally, you must include test and control team
    members for pre-mortem analysis exercise.


    A common problem I’ve seen in this exercise is difficulty or failure to get to
    the root cause of anticipated failure, and this is where SMEs should lean in.
    If you do not identify root causes correctly or do it poorly, then your follow-up
    actions would not yield proper results.


    Another problem I’ve seen is the lack of follow-up to ensure that recommended
    actions are executed and the resulting `RPN` is lowered to an acceptable level.
    Doing effective follow-through is project management function and needs diligent
    execution to ensure that pre-mortem analysis reaches its logical conclusion.


    Pre-mortem analysis workshops can be time-consuming at times. Due to high time
    demand, it may become challenging to get sufficient participation of SMEs. The
    key is to get the people who are knowledgeable and experienced about potential
    failures and their resolutions showing up at these workshops. SME attendance often
    needs management support, and facilitators need to ensure that this support is
    garnered.


    *You can read more about FMEA find quality information on the Internet.*^([^(20)](#fn20))


    ### Sector-Specific Considerations


    In pre-mortem analysis, Severity-Occurrence-Detection (SOD) ratings range between
    1 and 10. However, the weights assigned to each of the rating value are subjective.
    It is possible that in the same industry two different companies could come up
    with slightly different ratings for the same failure mode.


    To avoid too much subjectivity and confusion, some level of standardization or
    rating scale could be helpful. However, that would be only necessary when you’re
    benchmarking two or more products from different vendors in the same industry.
    If this has to be used only for internal purposes, subjectivity won’t matter much,
    since relative weights and essential would still be preserved within the risks
    and action items.


    Nonetheless, when considering control or action plans for identified risks, sector-specific
    approaches could be (and should be) different.


    Any failure risk can be controlled by either reducing severity (S) or by lowering
    the chances of occurrence (O) or by improving detection levels (D). If this were
    to be done in the banking sector, while enhancing S and O ratings, D ratings might
    need additional focus for improvement. Given the volume of transactions that financial
    sector carries out every day, severity of failure could be high due to widespread
    impact, but if the severity can’t be controlled beyond a point, detecting it early
    to fix would be highly necessary.


    In the case of healthcare sector though, severity itself should be lower as the
    detection may likely result in fixing a problem but wouldn’t necessarily reverse
    the impact. For example, if AI prediction or solution results into incorrect prognosis
    and thereby change in medicine, early detection of this problem may result in
    stopping the activity per se. However, it won’t be able to revert the issues caused
    by having this failure in the first place.


    Similarly, in transportation scenario, especially for autonomous cars, detecting
    that a car’s mechanism has failed as an after the fact is less useful, since the
    accident would already have happened. Reducing severity and occurrence in those
    cases is a more acceptable course of action.


    Generally speaking, you should focus on improving detection, if the impact of
    failure can be reversed in due course of time or there is enough time available
    between system’s outcomes and see the full effect on the end user. If even having
    one failure means significant damage to you, then severity must be reduced, and
    occurrence must be reduced too.


    Severity and occurrence improvement are prevention focused, whereas detection
    improvement is fixing (cure) focused. If your industry believes that prevention
    is better than cure, then work on to reduce severity and lower the occurrence
    of failures. If your industry is comfortable with fixes after the fact, then detection
    must be improved.


    However, in my view, it is better to address all three factors and ensure that
    robust risk management is in place.


    ### Conclusion


    Pearl Zhu, in her book, *Digitizing Boardroom*^([^(21)](#fn21)) says, “Sense and
    deal with problems in their smallest state, before they grow bigger and become
    fatal.”


    Managing risks systematically and pragmatically is the key to handle AI risks.
    The problem with AI risks is that they are highly scalable and can quickly grow
    out of control due to power of automation and sheer capacity of AI to execute
    tasks.


    Moreover, subjectivity in risk management is a myth. If you can’t quantify the
    risk, you can’t measure it; and if you can’t measure it, then you can’t improve
    or control it. The systematic approach outlined here will help you to quantify
    your risks and understand them better while maintaining the context of your use
    case.


    You can develop and implement AI solutions responsibly; if you understand risks…understand
    them better and specific to your use case!


