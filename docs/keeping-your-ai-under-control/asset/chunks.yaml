- fmt: '# AI knows “how” but not “why”


    Artificially intelligent systems are usually excellent in performing any given
    task efficiently, effectively, and, at scale, consistently. However, knowing *how*
    to perform a specific task sometimes is not the only thing one needs to know.
    Understanding *why*, the purpose of the job, is equally essential since it can
    give a valuable context about the task itself. Understanding this context is helpful
    not only for performing the task but also improvising as and when required and
    ensuring that all the relevant bases are covered.


    However, with the AI, since it does not know underlying data and its premise,
    the bias will be inherent. Moreover, since AI systems do not understand the context
    of the task, and solely rely on their training data, they are not dependable.
    The reliability of their outcomes could be risked if the input data is biased,
    incomplete, or of poor quality.


    If we overestimate capabilities of AI and rely only on the knowledge of *how*,
    without knowing *why*, we will be risking the outcomes.


    “We don’t want to accept arbitrary decisions by entities, people, or AIs that
    we don’t understand,”^([⁹](#fn9)) says Uber AI researcher Jason Yosinkski. “In
    order for machine learning models to be accepted by society, we’re going to need
    to know why they’re making the decisions they’re making.”


    Not knowing *why* can sometimes become a source of the bias in AI systems.


    When AI systems only rely on the data, it becomes impossible for the users or
    the decision-makers to understand underlying reasons. For example, if your car
    insurance company tells you that you are not insurable because the system says
    so, and the system says so because it has data that says you were caught on camera
    talking on your phone while driving, would anyone even know *why* you were on
    the phone while driving? Could it be the case of an emergency where you had to
    break the rule? Only by understanding *why* it would make more sense in such cases.
    But it is quite possible that your insurance company may not even ask you about
    this and decline the cover.


    When AI systems do not know why, there is always going to be a lurking risk of
    discrimination, bias, or an illogical outcome.


    # AI does not have a conscience


    The conscience is the leading part of our spirit. It is a moral sense of right
    and wrong that is viewed to be acting as a guide to one’s behavior. As Wikipedia
    elaborates, conscience is a cognitive process that elicits emotion and rational
    associations based on an individual’s moral philosophy or value system.


    Our ways of the world are still very much a gray area—we cannot straightforwardly
    explain a lot of things with a repeatable logic. This makes human behavior least
    replicable. However, with such a complex (human) operation, conscience plays an
    essential role in binding us toward a meaningful goal at all the time. It is what
    makes us rational in our actions and decision-making.


    However, when AI systems mimic humans in some way, whether it is via narrow AI
    or relatively broader AI or a general AI (in the future), certain human qualities
    are a must-have. Without which it will not be a good idea to let the AI systems
    roam around at free will. The human must always be kept in a loop, lest things
    go astray.


    There are scenarios where conscience may have no role. Classic repetitive actions
    are an excellent example of one such situation. However, if there is even the
    slightest impact on end users, customers, employees, or society, human control
    is necessary. An AI system may take a decision but should not be allowed to act
    on it without confirmation from its responsible master.


    It is never a good idea to believe that the computer is always right. Do not believe
    in AI blindly—when in doubt, prefer human decisions. Yes, we humans are flawed,
    yet, there are several human qualities that AI will never have or be able to replicate.
    Qualities and characteristics such as conscience, empathy, emotional intelligence,
    leadership, love, hate, and several others make us human and differentiate us
    from the rest of the species.


    AI makes decisions based on how it has been taught to do so. Who taught it? How?
    With what inputs and when? All of these questions are important. Seek transparency
    and interpretability of AI decisions. If you cannot get hold of them, be very
    skeptical, you might be entering into a rabbit hole.


    Whenever you are using or planning to implement AI systems in your business or
    life, think about the consequences. No matter how well-designed AI system is,
    it inherently carries certain risks at various levels. Estimate these risks objectively
    and then plan for implications; let me know if you need any help.


    Since AI systems do not have a conscience, we must use our conscience and be prudent
    in utilizing them appropriately.


    # Losing jobs is not a real problem


    One of the hot-button topics being considered as a risk from AI is job losses.
    However, in my view, this is mostly symptomatic and does not paint an accurate
    picture. We can very well call it a myth for the same reason.


    A few years ago, I was working with a banking sector client, and our goal was
    to save roughly 1.5 hours per day per sales team member. That is whopping 7.5
    hours or one working day per week, and with the team size circa 75 members, it
    was a significant monetary benefit. Who wouldn’t have wanted that type of productivity
    increase?


    However, we still faced significant and constant resistance, until the day when
    it dawned upon us, and we figured out the potential reason behind it.


    We understood that the resistance was mainly due to “having nothing valuable to
    do if there is extra time at hand.” It became crystal clear that just creating
    a void of 1.5 hours daily was not going to work. It was also our responsibility
    to fill the void that we were set to create with something useful with something
    that the sales team members would prefer to do if they had extra time at hand.


    Not having anything better to do when there is extra time at hand makes people
    uncomfortable.


    This is a quite common scenario with any new change that is set to take *something*
    away from us. We become uncomfortable! Not because this *something* is going away,
    but because if it is taken away, we don’t know what we would do—unless we find
    *something else*, which is either same or relatively better to fill this void.
    If the new thing is not the same or better, but instead relatively not so good,
    we don’t like that change, no one would.


    And most of the times, we cannot fill the gap with the new activity after the
    fact; it is crucial that we plan it well in advance. The benefit of planning for
    this substitution in advance is that people respond naturally—they can let go
    of the first activity and create time for the new (and better) one.


    I think this is the key to minimize the risk of change resistance in AI projects
    or any other new technologies that result in significant displacements, but losing
    jobs is not the real problem.'
