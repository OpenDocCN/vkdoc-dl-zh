- fmt: '## It starts with the correct hypothesis


    When you want to verify whether you are working on the right solution or not,
    `hypothesis testing` becomes utmost important.


    Typically, a hypothesis can be defined as an explanation for something. It can
    also be an assumption or a provisional idea, an educated guess that needs further
    validation.


    Unlike our belief, which doesn’t need validation or evaluation, a good hypothesis
    is always verifiable or testable. It can be proven to be true or false.


    From a scientific perspective, a hypothesis must be falsifiable, which means there
    would be certain conditions or scenarios where this hypothesis or an assumption
    will not be valid.


    Most importantly, you must frame the hypothesis as a first step before testing
    it or thinking about a solution. If you don’t follow this rule, you might end
    up retrofitting a solution, which may not yield full results.


    You must frame the hypothesis as a first step before testing it or thinking about
    a solution.


    If you start with a flawed hypothesis, you would most likely end up selecting
    wrong solution, and several risks would seep in. Some of the risks associated
    with an incorrect assumption are financial loss, usually in the form of revenue
    leakage or operational losses, reduced customer loyalty and increase in frustration,
    risk to brand reputation, and several others.


    You may be wondering, “Why is it so important to form a correct hypothesis?”.
    Let us take an example.


    ### A curious case of Acme Solutions


    Acme Solutions (a hypothetical company) is experiencing significant growth in
    their products and services. Acme’s customer base is continuously increasing.
    Increase in customer base is leading to increased number of calls to their incident
    management support center.


    To keep up with the growth, Acme Solutions wants to increase head count in their
    incident management support center. However, acknowledging human limitations,
    Acme is keen on implementing artificially intelligent chatbot solution. By doing
    this, they expect to provide adequate support to incidents reported by customers,
    without additional head count. Customers will be able to interact with chatbot
    and report their problems; perhaps, get instant solution too.


    Should Acme Solutions embark on AI chatbot project?


    If this project is completed, by all standards, will it solve Acme’s problem(s)?


    If you think deeply, you would realize a flaw in Acme’s thought process, their
    hypothesis. Their hypothesis is, if we implement AI chatbot, we can address increased
    number of the customer reported incidents, without increased head count.


    What is wrong here?


    The very first problem here is “`retrofit thinking`.” Acme Solutions is starting
    with a solution in mind and then trying to fit in with their current issue of
    growing customer base and incident reports. They formed their hypothesis while
    they already chose the solution, which is the fundamental mistake in hypothesis
    framing.


    Instead, if they focus on the problem first, the solution may be different. If
    Acme acknowledges that if an increase in customer base is leading to increased
    incident reports, then there is fundamental flaw in their service or product.
    There is something inherent in their service or product which is causing incidents
    in first place, and the best way to address it is to eliminate the cause of incidents.


    Once Acme realizes that solving flaw in product/service would eliminate or reduce
    the number of reported incidents, their need for increased head count is likely
    to go away. When that happens, the need for AI chatbot would go away too.


    In this case, if Acme were to go ahead with AI chatbot, their incident count will
    not reduce. However, they will be able to respond to more customers that are reporting
    incidents. Now, no matter how intelligent and efficient this chatbot is, once
    customer is reporting an incident, they are already unhappy and frustrated with
    Acme’s product and service. Acme’s brand loyalty has already taken a hit and solving
    customer problem wouldn’t restore it; at best it will stop it from getting worse.


    You will notice that AI risks do not necessarily start with the AI system or application
    itself. They would have already crept in, well before the solution building starts
    or deployment begins.


    Therefore, correctly framing the hypothesis, validating it with the data, and
    supporting it with statistical analysis are highly essential. It should be your
    very first checkpoint in evaluating the risks of the AI solution.


    Correctly framing the hypothesis, validating it with the data, and supporting
    it with statistical analysis are highly essential.


    ## Does the solution address a valid root cause?


    Once you frame the correct hypothesis and validate that you indeed need an AI
    system to fix something for you, it is time to decide, exactly what needs fixing?


    Typically, we can establish a relationship between the problem and its cause in
    the following manner:


    *   `y = f (x)`


    where `y` is the problem and `x` is the cause or driver (or multiple causes or
    drivers) of that problem and `f` represents the process or formula that makes
    `x` result in `y`.


    If we continue with our earlier Acme Solutions’ example, it may look something
    like this:


    *   `Incident reports = f (poor product manual, low-quality product, etc.)`


    It means incident reports are caused by poor product manual, which customers cannot
    understand and therefore create an issue. It also means that sometimes product
    manual may not be the only issue, poor product build may also cause an incident
    report.


    So, if your solution were to address the *increasing incident report* problem,
    it cannot do anything to incident reports directly. It will have to work on the
    product manual, product build, and other contributing factors. When those factors
    are improved, automatically incident reports would reduce.


    What if by implementing AI-based transcriber the product manual quality improves,
    which could write product manual automatically and validate it for content quality?


    It would be a useful AI solution that is set to address a valid root cause. Your
    AI solution must be able to address one or more of the root causes of your main
    problem. It ensures that your issue will be solved.


    If AI solution is not addressing any of the root causes, or if it is addressing
    only low impact root causes, leaving out highly impactful ones, that’s a risk,
    and you must fix it. Make sure your solution is right.'
