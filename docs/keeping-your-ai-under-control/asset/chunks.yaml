    the prospect of an uninsured claim due to its “*falling between the gaps*” between
    the two traditional insurance products.


    However, the added complexity of AI solutions is driven by complex algorithms
    in addition to the data ingested or processed. Over time, change in data can significantly
    change product or solution characteristics; add to that cloud-based AI/ML services.
    It just widens the gap in existing options, and with that, the prospect of *falling
    through the gaps* increases significantly.'
  trans: '

    # 红队已就绪，下一步是什么？


    一个功能完善的红队不仅仅是为了发现 AI 系统中的漏洞。它还在于提供完整的指导手册和行动方案，以改进这些薄弱点、堵住漏洞，并在此过程中持续强化系统。


    此外，一次有效的红队行动不会在发现系统弱点后就结束。这仅仅是开始。红队的下一个角色是提供修复协助和重新测试。更重要的是，只要有必要，就要持续这样做。


    在你的蓝队宣布他们已准备好进行下一轮测试之前，可能涉及大量工作，包括理解发现的问题、其影响、可能性、严重性和可检测性，此外还要执行建议的修复措施、用新数据重新训练模型，以及许多其他工作。


    红队发现弱点、蓝队修复弱点的整个过程必须是一个持续的过程，并定期进行检查和平衡。要避免为了做而做一次的诱惑。相反，要确保你定期且持续地执行。这样做将帮助你监控每个方面的风险评分，并观察你在已建立的风险缓解计划上的进展。你的目标应该是将列表中每个风险项目的风险评分降低到接近零。


    你对 AI 系统进行压力测试以发现任何漏洞，总好过被别人利用。


    脚注 1 2 3 4


    # 10. 处理残余风险


    我经常强调，在解决任何问题时，应该涵盖三个方面。


    首先，我们必须确保我们正在解决正确的问题，即做正确的事。如果不这样做，无论我们做什么，都会朝着错误的方向前进。


    其次，我们必须确保该问题的解决方案正在被正确地开发，即正确地做事。


    第三，也是最重要的一点，必须覆盖所有基础。你可能拥有解决正确问题的正确方案。然而，如果你忽略了解决方案成功的其他因素，你的方案可能会徒劳无功。


    尽你所能是覆盖风险的最佳方式。然而，无论你覆盖了多少，可能仍然存在一些潜伏的风险，这些风险要么是未知的，要么是不可控的。这种风险需要不同的管理方式。


    ## 什么是残余风险？


    在 AI 解决方案或实施中，`残余风险`是指在你通过风险控制措施处理了固有风险之后，仍然剩余的风险量。通过进行彻底的预检分析，确保训练和测试完成，并最终使用红队对系统进行压力测试，你几乎可以对系统的性能及其将实现的结果充满信心。


    然而，可能仍然存在一些未被识别或已识别但无法预测或控制的风险。这种残余风险可以通过转移的方式来处理。


    `转移`或风险转移是一种风险管理和控制策略，涉及通过合同将纯粹风险从一方转移到另一方。一个例子是购买保险单，通过该保单，特定的损失风险从投保人转移给保险人。^(²⁷)


    ## 现有选项与局限性


    如果你有一个 IT 解决方案（这是与 AI 解决方案最接近的等价物），市场上已经有几种选项可用于转移部分风险。


    `信息技术责任`（IT Liability）保险承保因信息技术产品、服务和/或建议的失败而引起的索赔。^(²⁸)


    信息技术（IT）行业由于专业服务的提供与商品的供应之间存在交叉，因此具有独特的责任风险。此外，该行业的许多服务提供商两者兼有。软件咨询和开发（以及它究竟是提供服务还是销售商品）在法律上的模糊性使情况进一步复杂化。


    传统的`专业赔偿`保险单通常对商品供应有繁重的除外条款，而传统的`公众与产品责任`保险单通常包含与专业服务提供相关的除外条款。


    许多保险公司开发了一系列保险选项来解决这些问题，他们通常称之为`IT 责任`保险单。这些保单代表了`专业赔偿`与`公众与产品责任`保险捆绑成一个产品。这些保单的开发是为了最大限度地减少因“`落入两者之间的缝隙`”而导致未投保索赔的可能性。


    然而，AI 解决方案的额外复杂性是由复杂的算法以及所摄取或处理的数据驱动的。随着时间的推移，数据的变化会显著改变产品或解决方案的特性；再加上基于云的 AI/ML
    服务。这只会扩大现有选项中的差距，并且随之而来的是“`从缝隙中跌落`”的可能性显著增加。

    '
- fmt: '# Is there a need for AI insurance?


    Before we even think about AI insurance, I believe we must establish the need
    for it. And this need can only become evident when there are multiple issues with
    significant complexity.


    There has been a steady stream of warnings since the last half-century to slow
    down and ensure we keep machines on a tight leash.^([^(29)](#fn29))


    Critical questions have been asked, such as who accepts the responsibility when
    AI goes wrong and what are the implications for the insurance industry?


    Autonomous or driverless cars are the most important considerations for the insurance
    industry. In June 2016, a British insurance company *Adrian Flux* started to offer
    the first policy specifically geared toward autonomous and partly automated vehicles.^([^(30)](#fn30))
    This policy covers typical car insurance options, such as damage, fire, and theft.
    Additionally it also covers *accidents specific to AI*—loss or damage as a result
    of malfunctions in the car’s driverless systems, interference from hackers, failure
    to install vehicle software updates and security patches, satellite failure or
    outages affecting navigation systems, or failure of the manufacturer’s vehicle
    operating system or other authorized software, the article stated.


    Volvo has said that when one of its vehicles is in autonomous mode, Volvo is responsible
    for what happens.^([^(31)](#fn31))


    I think this is an important step. However, still, it fails to answer the question
    of who is liable for any accidents? Who is at fault if the car malfunctions and
    runs over someone?


    When autonomous machinery goes wrong in a factory and disrupts the production,
    who is responsible? Is it the human operator who has thin-threaded control, or
    is it the management for buying the wrong system? Maybe it should be the manufacturer
    for not testing the autonomous machinery thoroughly enough.


    We need to establish specific protections for potential victims of AI-related
    incidents, whether they are businesses or individuals, to give them confidence
    that they will have legal recourse if something goes wrong.


    The most critical question from a customer’s standpoint would be, who foots the
    bill when a robot or an intelligent AI system makes a mistake, causes an accident
    or damage, or becomes corrupted? The manufacturer, developer, the person controlling
    it, or the system itself? Or is it a matter of allocating and apportioning risk
    and liability?^([^(32)](#fn32))


    Drew Turney, a journalist, argues in one of his articles, “We don’t put the parents
    of murderers or embezzlers in jail. We assume everyone is responsible for his
    or her decisions based on the experience, memory, self-awareness, and free will
    accumulated throughout their lives.”^([^(33)](#fn33))


    There are many examples where complex situations have occurred, which begets a
    need for AI insurance.


    ## AI loses an investor’s fortune


    Early on, Austria-based AI company `42.cx` developed a supercomputer named `K1`.
    It would comb through online sources like real-time news and social media to gauge
    investor sentiment and make predictions on US stock futures.^([^(34)](#fn34))
    Based on data gathered and its analysis (based on that data), it would then send
    instructions to a broker to execute trades, adjusting its strategy over time based
    on what it had learned.


    In May 2019, a Hong Kong real estate tycoon Samathur Li Kin-kan decided to sue
    the company that used trade-executing AIs to manage his account, causing him to
    lose millions of dollars. A first-of-its-kind court case opened up that could
    help determine who should be held responsible when an AI stuffs up.^([^(35)](#fn35))


    While it is the first known instance of humans going to court over investment
    losses triggered by autonomous machines, it also highlights the black-box problem
    of AI vividly. If people do not know how the AI is making decisions, who’s responsible
    when things go wrong?


    The legal battle is a sign of what’s coming as AI gets incorporated into all facets
    of life, from self-driving cars to virtual assistants.


    Karishma Paroha, a London-based lawyer, who specializes in product liability,
    has an interesting view. She says, “What happens when autonomous chatbots are
    used by companies to sell products to customers? Even suing the salesperson may
    not be possible. Misrepresentation is about what a person said to you. What happens
    when we’re not being sold to by a human?”


    ## Risky digital assistant for patients


    In mid-2019, a large consulting firm started deploying voice-controlled digital
    assistants for hospital patients. The idea was, a digital device would be attached
    to the TV screen in the patient room, and the patient can request for assistance.


    The firm wanted to replace the age-old call button service due to its inherent
    limitations. One of the significant limitations cited was that there is not enough
    context available for nurses to prioritize patients only based on the call request.
    It is possible, with the age-old call button system, that two patients have requested
    help, and one of them needs urgent help while others can wait. However, with just
    the indication of help request, nurses can’t determine who needs immediate help.
    With voice-based digital assistants, the firm and hospital anticipated that with
    more context from the command text, they could prioritize nurse visits.


    The system was deployed with prioritization based on the words uttered by the
    patients. For example, if the patient asked for drinking water, that request was
    flagged as a low priority, whereas if someone complained about pain in the chest,
    they were flagged with the highest priority. Various other utterances were prioritized
    accordingly. The idea behind these assigned priorities was, patient needing water
    to drink can wait for a few minutes, whereas a patient with chest pain may be
    at risk of attack and needs immediate assistance. Generally speaking, this logic
    would work in most of the scenarios.


    However, this system wasn’t linked with the patient information database. Such
    that, besides getting the room number of the requester, the system did not know
    anything else. Most importantly, it did not understand what the patient’s condition
    was and why they were in the hospital.


    As you would notice, not knowing the patient’s condition or ailment may prove
    to be a severe impediment in some cases. These cases may be at the long tail of
    the common scenarios, but I think that is what makes it more dangerous.


    For example, if a patient has requested for water, the system would put it as
    a low priority request and give other requests a relatively higher priority. However,
    what if the patient was not feeling well and hence requested water. Maybe not
    getting water in time could worsen their condition. It may be that they were choking
    or coughing and therefore asked for water. Continuous coughing may be an indicator
    of imminent danger. Without knowing the patient’s ailment and condition, it is
    tough to determine whether a simple request for water is high priority or low
    priority; and, these types of scenarios are where I see significant risks. One
    may term this system as well-intentioned but poorly implemented.


    Now the question is—in a scenario, where a high priority request gets flagged
    as a low priority on account of the system’s limited information access, who is
    responsible? If the patient’s condition worsens due to this lapse, who would they
    hold accountable?


    ***Who (or what)*** can be held accountable for such failures of service or performance
    is a major lurking question; and perhaps, AI insurance may be able to cover the
    end users in all such scenarios when the need for compensation arises?'
