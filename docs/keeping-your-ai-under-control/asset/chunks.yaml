    [3](#483319_1_En_2_Chapter.xhtml#Fn3_source)


    # Understanding AI Risks and Its Impacts


    In recent past years, we have seen dramatic improvements in AI, thanks to technological
    advances. We would continue taking longer strides with even more developments
    and substantial progress in the coming years. However, while this happens, we
    are unknowingly creating various risks to our socioeconomic structure, civilization
    in general, and some extent for human species.


    Even if species-level risks are not evident yet, other two, socioeconomic- and
    civilization-level risks, are significant enough and cannot be ignored. Additionally,
    there are also several business-level risks that could affect business metrics
    adversely.


    For now, let us talk about general outcome risks that can have a significant impact
    on critical social, civil, and business aspects. And, to have these risks must
    be managed. So, it is vital that we identify them first, acknowledge them as risks
    instead of discarding them, and then work toward mitigating those risks as we
    progress.


    ## Musk, Hawking, Gates—they all said it already!


    Many notable individuals in the field across the globe have been warning and voicing
    their concerns for the past several years. A significant part of these concerns
    has been related to superintelligence per se. However, they also indicated speed
    and approach to be one of the primary drivers of these risks.


    In 2014, Stephen Hawking, who was one of Britain’s preeminent scientists, said
    that efforts to create thinking machines pose a threat to our very existence.
    He told the BBC^([⁵](#fn5)) that the development of full artificial intelligence
    could spell the end of the human race. He was responding to a question about a
    revamp of the technology he used to communicate, which involved a basic form of
    AI.


    On similar lines, Microsoft founder Bill Gates, in 2015,^([⁶](#fn6)) echoed these
    concerns, “I am in the camp that is concerned about superintelligence. First,
    the machines will do a lot of jobs for us and not be superintelligent. That should
    be positive if we manage it well. A few decades after that, though, the intelligence
    is strong enough to be a concern.”


    During SXSW 2018,^([⁷](#fn7)) Elon Musk said, “The biggest issue I see with so-called
    AI experts is that they think they know more than they do, and they think they
    are smarter than they actually are. This tends to plague smart people. They define
    themselves by their intelligence, and they don’t like the idea that a machine
    could be way smarter than them, so they discount the idea—which is fundamentally
    flawed.” As he continued to explain, “I am not really all that worried about the
    short-term stuff. Narrow AI is not a species-level risk. It will result in dislocation,
    in lost jobs, and better weaponry and that kind of thing, but it is not a fundamental
    species-level risk, whereas digital superintelligence is.”


    As you would have noticed, Musk has pointed toward general AI, which hasn’t been
    a reality yet. As several experts in the field of AI would echo, it will not be
    a reality any sooner. However, while most of them are putting 25- to 30-year time
    frame for general AI to take shape, I think it would happen sooner.


    Now, the question is, why is it that these famous people are concerned about AI
    while the rest of the world is thinking the opposite? I would call it the problem
    of hypocognition!'
  raw: "## Key lessons\n\nWhile there are several use cases of AI to learn from, I\
    \ specifically chose these five, which are indicative of a common issue with AI\
    \ design, development, deployment, and governance; and that is a thoughtful or\
    \ responsible approach.\n\nA few key learnings that have emerged are as follows:\n\
    \n*   ***Data governance is essential*** from ethical AI’s point of view; therefore,\
    \ the creators of AI need to ensure they have robust data governance foundations,\
    \ or their AI applications risk being fed with inappropriate data and breaching\
    \ several laws.\n\n*   Narrow AI is all about the relation between input and outputs.\
    \ You provide input X and get output Y, or there is input X to do output Y. Either\
    \ way, the nature of input affects output such that indiscriminate input can lead\
    \ to adverse outcomes. And this is just one good reason why ***rigorous testing\
    \ is so important***. We must note that in the case of AI systems, general IT\
    \ system testing mechanisms are usually not enough.\n\n*   Automated decisions\
    \ are suitable when there is a large volume of decisions to be made, and the criteria\
    \ are relatively uniform and uncontested. When discretion and exceptions are required,\
