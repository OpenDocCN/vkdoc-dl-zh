    in the finance industry, several applications have been developed for advising
    customers on investments and currency or stock trading, and so on. As such, AI
    and the finance industry are said to be a match made in heaven.


    General automation in many service industries, such as the telecommunications
    sector, is also growing significantly. AI systems are now scanning the network
    and can run several tests in parallel to investigate and resolve problems as they
    arise.


    In short, AI is already making decisions that affect your life, whether you like
    it or not, and has covered significant ground in recent past years.'
  trans: '

    ### 关于作者


    # 第一部分：人工智能的未来状态


    ## 评估即将到来的变革


    # 1. 2020 年后的人工智能


    `人工智能`（`AI`）终于跻身主流技术之列，其普及速度远超预期。然而，从这一阶段开始，它的发展之路将比以往其他技术更为崎岖。一个常见的现象是：当一个词被重复足够多次时，它就会失去原本的意义。这正是人工智能当前的处境。


    本书旨在从现实角度理解人工智能。明智的做法是探讨一些原因，理解为何人工智能至今未能渗透到商业领域的更多方面。


    但在深入之前，我们先来讨论一下人工智能解决方案、实施现状以及过去几年中常见的主题。牢记这些趋势，我们应能推断出它在 2020 年及以后的发展轨迹。需要明确的是，这绝非水晶球般的预言。鉴于技术呈指数级增长，事情的发生可能比预想的更早或更晚！


    ## 我们最近已换挡提速


    人工智能的概念已存在数个世纪；然而，它在 20 世纪 50 年代才真正起飞，当时艾伦·图灵探索了这一概念的现实可能性。由于当时计算机硬件的限制，这项工作并未取得太大进展。


    后来，当计算机变得更加强大时，它们速度更快、价格更实惠，并且在存储和计算速度方面都拥有更强的能力。自那时起，人工智能的研究便稳步增长。从仅 1MB 内存的大箱子系统，到拥有
    128GB 内存的信用卡大小系统，硬件的进步使技术实现了飞跃式发展。


    然而，在过去几年中，所有与人工智能相关的活动都出现了突然增长。物联网（`IoT`）以及大数据、云计算等其他互补技术的实现，支撑了这一增长。


    自去年以来，我们看到人工智能的理论研究减少，实际应用增多。毫无疑问，人工智能技术仍处于起步阶段，但它已达到一个临界点，研究和应用可以同时进行。我们可以肯定地说，我们已经换挡提速了。


    ## 人工智能已取得长足进展


    或许最广泛使用且易于部署的人工智能应用是客户服务在线聊天机器人。尽管它们易于使用，但仍有许多机器人无法按预期工作，你一个聪明的问题就可能让它们卡壳。有趣的是，尽管有编译器这种结构化语言处理的成熟应用，但聊天机器人这一应用仍然举步维艰。


    图像识别是另一种用于多种场景的广泛应用。从美化你手机上的照片，到识别行驶车辆的号牌，它都得到了突出应用。面部识别已达到可接受的准确度。然而，在隐私、安全等方面仍存在重大问题。这些问题影响了其全球推广。


    电子邮件和社交媒体越来越多地使用初级形式的人工智能，例如消息过滤、智能邮件回复（如 Gmail）或广告内容的个性化定制。


    特斯拉的预测能力和自动驾驶功能是人工智能大显身手的领域之一。


    其他各种应用，如 Netflix 和 Pandora，已利用人工智能根据用户的历史偏好向其推荐内容。


    在医疗保健领域，主要是制药领域，神经网络正被用于加速药物发现。


    创建标准技术内容，如产品描述、规格说明书等，也是近期人工智能的又一应用。


    招聘行业使用申请人追踪系统和简历扫描已有相当长的时间。新的应用程序还具备一定能力，可以仔细审查你的简历，并显示其与给定职位要求的匹配百分比。这种能力与根据搜索引擎关键词查询显示搜索结果非常相似。它虽然有其古怪之处，但无论如何，它不会消失。


    银行和保险业根据你提供的输入和信息来判断你的信用度。由于它们掌握着你大量的数据，以及像信用机构这样的中央数据库，这些系统可以做出相当准确的判断。在某些情况下，由于缺乏数据或信息，尤其是在隐私立法禁止它们访问某些信息时，它们的功能会受到影响。然而，除了在金融行业的运营领域提供帮助外，还开发了许多应用程序，用于为客户提供投资、货币或股票交易等方面的建议。因此，人工智能和金融业被认为是天作之合。


    许多服务行业（如电信行业）的通用自动化也在显著增长。人工智能系统现在正在扫描网络，并能并行运行多项测试，以在问题出现时进行调查和解决。


    简而言之，无论你喜欢与否，人工智能已经在做出影响你生活的决策，并且在过去几年中已经取得了长足的进展。

    '
- fmt: '# But it is not everywhere yet


    While it would be natural to think that AI has penetrated almost every single
    vertical or market, it is far from the truth. At best, there are only a few technology
    spot fires in a few select industries where AI is making its mark. Unfortunately,
    as always, while marketing gimmicks are at play to make everyone feel that AI
    has covered everything; several sections are still untouched, and that is for
    the right reasons.


    Many image recognition systems are now better at detecting cancer or microfractures
    from patient''s MRI or X-ray reports. Many pattern recognition systems can correlate
    several pathological reports and make an almost precise prediction of the health
    status of the patient. And yet, medical recommendations without doctor''s explicit
    approval or signatures are not a commonplace practice. And this is good, because
    when there is human life at stake, systems should not make a final call, ever.
    Therefore, as far as the medical field is concerned, AI might only reach a status
    of assisted intelligence and may not be permitted (should not be allowed) to become
    a mainstream phenomenon at all.


    Arms control is a little bit of a gray area at the moment, where granting licenses
    is not AI driven and the likelihood of that becoming a mainstream application
    is almost zero for all the right reasons. It is a different argument though that
    you may not need arms when you have AI easily accessible.


    While companies are continually taking humans out of the customer service sector
    and replacing them with chatbots or automated responders that are AI driven, a
    human touch is becoming expensive. I already saw a startup pitch at an event,
    where their primary differentiation was "we provide personal support for all your
    queries." Mostly, we see an exciting shift in terms of AI- and non-AI-based solution
    offering.


    Self-learning applications is another area where AI is making an entry. Using
    customized learning, pace, and recommendations, it is becoming popular. However,
    as that happens, teaching, coaching, and mentoring will soon become a high-touch
    service and will still be in demand. Therefore, it is difficult to say, whether
    AI has touched this sector truly or just morphed it into something else.


    Another aspect where AI has not yet touched and would not touch is live entertainment
    and art. These are such personalized and creative pursuits that without having
    a human in it, they would not have the same meaning. However, there have been
    a few experiments with AI creating art, but those art forms have quite a different
    flavor to it. AI systems can create art based on what they have been trained for.
    Several of those are mainly geometrical and systematic shapes or pictures, nothing
    that a human would necessarily draw with a slightly acceptable and natural imbalance
    in it. The real authorship of the work of art cannot be yet bestowed to an artificial
    system.


    Creativity is some part process and some part randomness. Being the exact opposite
    of the rule-based process, AI will not be able to contribute directly to the creative
    industry any time soon.


    ## How do end users see AI?


    As far as end users of AI technology are concerned, there is high-level fear,
    uncertainty, and doubt (FUD) among the majority.


    The sheer duality of this technology is a significant concern. AI is a powerful
    tool, and just like any other tool, humans can use it for good or bad things.
    However, since we aren''t actively talking about how to handle potential misuse
    of AI, this has remained as a growing concern.


    Another reason for having a skeptical outlook toward the AI is a plausible fear
    of job losses. If there are massive numbers of people losing jobs without an alternative
    system in place, it would be undoubtedly dangerous, and this can create chaos.
    But then again, if you think about it deeply, you will realize that it is not
    losing a job that concerns many. What people usually worry about is having nothing
    better to do when their mainstream work is disrupted.


    Unfortunately, the majority of AI implementation projects do not address this
    issue up front. Instead, it is done as an afterthought. This is perhaps the most
    substantial reason for being skeptical of AI.


    At a very superficial level, many of us do appreciate ease and convenience these
    AI solutions are providing. However, our comfort soon erodes as these solutions
    start to increase their scope and touch critical areas of our life, such as banking,
    social benefits, security, healthcare, and others.


    Bias and racism have been front-runners in the list of reasons for the distrust
    in AI as such. People also fear that AI may show blatant disregard for human control.
    This, however, does not have any precedence, but it is practically possible, and
    hence, it is a legitimate concern.


    Errors at scale is not a widely known issue, but those who have been victims of
    this problem in the past see this as one of the significant concerns when using
    AI in daily life. Imagine when a public AI system cancels credit cards of thousands
    of people because of some error. The scale of chaos this may cause is the main
    reason for this concern.


    As a general observation, I have seen that end users of AI are comfortable for
    as long as the applications are not touching or affecting core life matters. They
    are comfortable in areas of entertainment and luxury, but not so much when critical
    aspects of life are in the hands of an AI such as finances, health, security,
    jobs, driving, and others alike.


    ## What are business users thinking?


    Now, despite the commonplace mixed feelings and heightened expectations from AI,
    the business world still has some ability to see AI in a relatively balanced manner.
    People from a wide range of industries even agree that AI is tricky to deploy,
    and it could suck a lot of money and time before becoming useful. It can be costly,
    and the initial payout can be quite modest. The overall payback period for any
    AI project as such hasn''t been attractive per se, and in many cases, it is hard
    to establish objectively.


    Several experts, including myself, find it unsettling that some vendors are pushing
    AI systems even before they figure out the purpose and claim to know what problem
    it will solve. Some businesses discourage and loathe this approach and are taking
    a prudent approach, but that is only a small minority of them.


    It is one thing to see breakthroughs in gaming AI such as in the game of Go and
    Chess or having devices that turn on music at your voice command. It is another
    thing to use AI and make step changes in the businesses, especially organisations
    that are not fundamentally digital.


    When it comes down to improving and changing how business gets done, AI and other
    tools form only small cogs of a giant wheel. Changes that bring on company-wide
    repercussions are a different ball game.


    The change management aspect hasn''t been easy to handle in the past, and it is
    not going to change in the future either. Several experts from various domains
    of the business are needed to be involved for any significant change to occur,
    and they have to be the best ones if we are looking for effective outcomes, which
    essentially means that you have to pull your best people from routine business
    work and let them focus on AI implementation, which is a difficult proposition
    for business of any size.'
  raw: '## But it is not everywhere yet


