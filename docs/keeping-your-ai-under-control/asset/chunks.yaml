  trans: '

    # 但它尚未无处不在


    虽然人们很自然地会认为人工智能已经渗透到几乎每一个垂直领域或市场，但事实远非如此。充其量，AI 只是在少数几个特定行业中点燃了几处技术火花，留下了自己的印记。不幸的是，一如既往，尽管营销噱头在起作用，让每个人都觉得
    AI 已经覆盖了一切；但仍有几个领域尚未触及，而且这是有充分理由的。


    许多图像识别系统现在能够更好地从患者的 MRI 或 X 光报告中检测癌症或微骨折。许多模式识别系统可以关联多份病理报告，并对患者的健康状况做出几乎精确的预测。然而，没有医生明确批准或签字的医疗建议并未成为普遍做法。这是好事，因为当涉及人的生命时，系统永远不应该做出最终决定。因此，就医疗领域而言，AI
    可能只能达到辅助智能的地位，并且可能根本不被允许（也不应该被允许）成为主流现象。


    军备控制目前是一个有点灰色的领域，授予许可证并非由 AI 驱动，而且出于所有正确的理由，它成为主流应用的可能性几乎为零。不过，当你能够轻易获取 AI 时，你可能就不需要武器了，这是另一个论点。


    虽然公司不断将人类从客户服务领域移除，并用 AI 驱动的聊天机器人或自动回复器取而代之，但人性化服务正变得昂贵。我已经在一个活动中看到一家初创公司的推介，他们的主要差异化优势是“我们为您的所有查询提供人工支持”。大多数情况下，我们看到的是基于
    AI 和非 AI 解决方案提供的令人兴奋的转变。


    自主学习应用是 AI 正在进入的另一个领域。通过使用定制化的学习、节奏和推荐，它正变得越来越流行。然而，随着这种情况的发生，教学、辅导和指导将很快成为一种高接触服务，并且仍然会有需求。因此，很难说
    AI 是真正触及了这个领域，还是仅仅将其转变成了别的东西。


    AI 尚未触及且不会触及的另一个方面是现场娱乐和艺术。这些是如此个性化和创造性的追求，以至于没有人类的参与，它们将失去同样的意义。然而，确实有一些用 AI
    进行艺术创作的实验，但这些艺术形式有着截然不同的韵味。AI 系统可以根据它们被训练的内容来创作艺术。其中许多主要是几何和系统的形状或图片，并非人类必然会画出的那种带有轻微可接受且自然失衡感的东西。艺术作品的真正作者身份还不能赋予给一个人工系统。


    创造力一部分是过程，一部分是随机性。作为基于规则的过程的完全对立面，AI 短期内无法直接为创意产业做出贡献。


    ## 最终用户如何看待 AI？


    就 AI 技术的最终用户而言，大多数人中存在高度的恐惧、不确定性和怀疑（FUD）。


    这项技术的纯粹双重性是一个重大的担忧。AI 是一个强大的工具，就像任何其他工具一样，人类可以用它来做好事或坏事。然而，由于我们没有积极讨论如何处理 AI 潜在的滥用问题，这已成为一个日益增长的担忧。


    对 AI 持怀疑态度的另一个原因是可能失去工作的恐惧。如果大量的人在没有任何替代体系的情况下失业，那无疑是危险的，并且可能造成混乱。但话说回来，如果你深入思考，你会意识到许多人担心的并不是失去工作本身。人们通常担心的是，当他们的主流工作被颠覆时，没有更好的事情可做。


    不幸的是，大多数 AI 实施项目并没有预先解决这个问题。相反，它只是事后才被考虑。这也许是人们对 AI 持怀疑态度的最根本原因。


    在非常表面的层面上，我们许多人都欣赏这些 AI 解决方案提供的便利和舒适。然而，当这些解决方案开始扩大范围并触及我们生活的关键领域，如银行、社会福利、安全、医疗保健等时，我们的舒适感很快就会消失。


    偏见和种族主义一直是导致对 AI 不信任的主要原因之一。人们还担心 AI 可能会公然无视人类控制。然而，这虽然没有任何先例，但在实践上是可能的，因此这是一个合理的担忧。


    大规模错误并不是一个广为人知的问题，但那些过去曾因此问题受害的人认为，这是日常生活中使用 AI 时的主要担忧之一。想象一下，一个公共 AI 系统因为某个错误取消了数千人的信用卡。这可能造成的混乱规模是产生这种担忧的主要原因。


    根据一般观察，我看到 AI 的最终用户只要应用程序不触及或影响核心生活事务，就会感到舒适。他们在娱乐和奢侈品领域感到舒适，但当生活的关键方面，如财务、健康、安全、工作、驾驶等，掌握在
    AI 手中时，他们就不那么自在了。


    ## 商业用户在想什么？


    现在，尽管对 AI 普遍存在复杂的感受和过高的期望，但商业世界仍然能够以相对平衡的方式看待 AI。来自各行各业的许多人甚至同意，AI 很难部署，并且在变得有用之前可能会消耗大量金钱和时间。它可能成本高昂，而且初始回报可能相当微薄。任何
    AI 项目的整体投资回收期本身并不具有吸引力，而且在许多情况下，很难客观地确定。


    包括我在内的几位专家发现，一些供应商甚至在弄清楚目的并声称知道它将解决什么问题之前就推销 AI 系统，这令人不安。一些企业不鼓励并厌恶这种做法，并采取了审慎的态度，但这只是其中的一小部分。


    在围棋和国际象棋等游戏中看到 AI 的突破，或者拥有能根据你的语音指令播放音乐的设备，这是一回事。使用 AI 并在业务中做出阶梯式的改变，尤其是在那些并非根本数字化的组织中，则是另一回事。


    当涉及到改进和改变业务完成方式时，AI 和其他工具只是巨大车轮上的小齿轮。带来全公司范围影响的变革则是另一场游戏。


    变革管理方面过去并不容易处理，未来也不会改变。任何重大变革的发生都需要来自业务各个领域的多位专家参与，如果我们寻求有效的结果，他们必须是最优秀的，这基本上意味着你必须把你最优秀的人才从日常业务工作中抽离出来，让他们专注于
    AI 实施，这对于任何规模的企业来说都是一个困难的命题。

    '
- fmt: '# What’s to come?


    Technology has come a long way over the last 20 odd years. Several technological
    advances in hardware and software alike have changed the way we do things and
    experience our life now.


    Twenty years ago, computer single core CPU would run at 225 MHz. Now the same
    sized chip has eight core CPU which runs at 2.4 GHz. If you compare hand phones
    (not smartphones) that were released during the last decade, with their revised
    versions now, the difference would be enormous. Several factors of comparison
    did not even exist back then.


    The trend of technological innovation has always been heading upward and rightly
    so.


    One of the most widely discussed AI technologies today is autonomous vehicles.
    These will have a profound impact on how we think about transportation and would
    bring a significant positive change to future and current cities.


    Especially for people who need assistance, such as the elderly, children, disabled
    people, and patients, this could mean a lot. Supply chain industry, as well as
    everything that depends on physical distribution network (post, shopping, etc.),
    would see a considerable shift in operations.


    AI and other emerging technologies, besides bringing efficiencies, are also bringing
    new possibilities. These new possibilities are creating new business models and
    opportunities that we have not seen before. This will continue to happen in the
    future as we progress.


    Most of the tasks in our daily lives that depend upon our best estimates or guesswork
    would also see a significant shift due to the abundance of data with regard almost
    anything.


    As we have access to more data, the need for devices that can process this data
    on edge will increase and will be a key driver in maintaining this progression.


    One of the significant drivers in all these technological advances has always
    been the democratization of the resources. Whether it’s the Internet revolution,
    open source hardware and software revolution, or anything else, as AI technology
    becomes a part of our daily lives, we will see more of this democratization happening.
    This will be a crucial factor and will keep boosting progress.


    As of now, most AI applications follow a supervised learning approach. In years
    to come, we will start seeing more and more of unsupervised learning that will
    keep systems updated continuously. However, this will have one significant barrier
    to cross, which is the `trust factor`. Unless this `trust factor` improves, supervision
    will remain a necessity.


    There is no accepted or standard definition of good AI as such. In my view, however,
    good AI will be one that can guide users to understand various options, explain
    the trade-offs among multiple possible choices, and then help to make those decisions.
    Good AI will always honor the final decision made by the human.


    On the consumer front, several virtual support tools will increase and will become
    mainstream. It will be almost expected to come across these bots first before
    talking to any human at all. However, only the businesses that demonstrate a customer-centric
    approach will thrive in these scenarios, while others will struggle to adapt to
    the right technology.


    And, most importantly, “What do you want to do when you grow up?” will soon become
    an obsolete question. AI will change the job market entirely as we will see growing
    requirements for soft skills since most of the hard skills will be automated.


    ## A balanced approach


    Regardless of how the recent or long-term future with AI looks like, there are
    a few points that we must understand and accept in their entirety. Most of these
    points align with OECD’s AI principles^([¹](#fn1)) that were released in early
    2019.


    AI systems should benefit humans, overall ecosystem on the planet, and the planet
    itself, by driving inclusive growth, sustainable development, and well-being of
    all.


    These systems must always be designed such that they respect and follow the rule
    of law and rights of the ecosystem (humans, animals, etc.). They should also respect
    the general human value system and diversity it exhibits. More importantly, there
    must be appropriate safeguards in the system such that humans are always in the
    loop when necessary or can intervene if they (humans) feel the need, regardless
    of the necessity. After all, fair and just society should be the goal of any advancement
    that we bring.


    Creators of AI systems should always demonstrate transparency and responsible
    disclosure about the functionality and methodology of the system. It is essential
    that people involved and affected by this do understand how outcomes are derived
    and, if needed, should be able to challenge them.


    Any AI system should not cause harm to the users or general living beings as such
    and must always function in a robust, secure, and safe way throughout its life
    cycle. Creators and managers of these systems have the responsibility to assess
    continually and manage any risks in this regard.


    And most importantly, on the accountability front, anyone creating, developing,
    deploying, operating, or managing AI systems must be held accountable for the
    system’s functioning and outcomes at all times. Accountability can drive positive
    behaviors and thereby can potentially ensure that all the preceding general principles
    have adhered.


    There is a general feeling that overregulation limits innovation and advancement.
    However, in my view, let us not race to be the first, let us strive to be better!
    Being fast and first by compromising on ethics and quality is certainly not an
    acceptable approach by any means.


    I don’t think that in the next ten years or so we will have robots controlling
    humans. However, technology consuming us, our time, feelings, and mindfulness
    is very much a reality even today, and it is getting worse. Just one wrong turn
    in this fast lane is what it will take to cause regression for society. Let us
    work toward keeping the technology, AI or otherwise, in our control, always!


    Day by day, the technology is becoming autonomous and exponentially smarter; we
    humans must find ways to catch up rather quickly, lest being subjugated.


    Footnotes [1](#483319_1_En_1_Chapter.xhtml#Fn1_source)


    # Learning Lessons from Past Fiascoes


    Whenever we are set to improve something, what is the first thing we do? If you
    are thinking of assessing the past, you are correct. It is the most convenient
    and sure-shot method of understanding improvement areas and fixes that are required
    for better future outcomes.


    This should be no different for AI implementations as well. Automation and primitive
    forms of AI have been in trial and operation for many years. Some have worked
    as expected and some not so much. I have chosen a few use cases that have failed
    or have not shown full expected benefits.


    These case studies form a reasonable basis for understanding weak spots to focus
    on and thereby helping to establish a baseline for risk profiling. Some standard
    parameters will also emerge in the form of a repetitive pattern, which will give
    an insight into common root causes of these fiascoes.


    By no means, these use cases are a complete representation of the AI solution
    landscape, but they represent a few common aspects, which we will discuss subsequently.
    But first, the fiascoes.'
