- fmt: '# Regulations are gearing up


    Since 2018, European lawmakers, legal experts, and manufacturers have been locked
    in a high-stakes debate: whether it’s the machines or human beings who should
    bear ultimate responsibility for their actions.


    This debate refers to a paragraph of text that was buried deep in a European Parliament
    report from early 2017. It suggests that self-learning robots could be granted
    “electronic personalities.” This status could allow robots to be insured individually
    and be held liable for damages if they go rogue and start hurting people or damaging
    property.


    One of the paragraphs^([^(36)](#fn36)) says, “The European Parliament calls on
    the commission, when carrying out an impact assessment of its future legislative
    instrument, to explore, analyze and consider the implications of all possible
    legal solutions, such as—establishing a compulsory insurance scheme where relevant
    and necessary for specific categories of robots whereby, similarly to what already
    happens with cars, producers, or owners of robots would be required to take out
    insurance cover for the damage potentially caused by their robots.”


    # Challenges for AI insurance


    Although the market is tilting quickly to justify AI insurance products, there
    are still a few business challenges. These challenges are clear roadblocks for
    any one player to take the initiative and lead the way.


    ## A common pool


    As the insurance fundamentally works with common pool, the first challenge appears
    to be not having enough quorum to start this pool. Several AI solutions companies
    or adopters can come together and break this barrier by contributing to the common
    pool.


    ## Equitability


    The second challenge is this common pool being equitable enough. Due to the nature
    of AI solutions and customer base, not every company would have equivalent revenue
    and pose a comparable risk. Being equitable, though may not be mandatory in the
    beginning, it will soon become an impediment for growth, if not appropriately
    managed.


    ## Insurability of cloud-based AI


    In the case of minors (children), parents are liable and responsible for their
    behaviors in the public domain. Any wrongdoing by them, parents pay for it. However,
    as they grow, and are termed as adults, responsibility entirely shifts to them.


    Similarly, the liability of AI going wrong will have to shift from the vendor
    to the users over time, which may impact the annual assessment of premiums. Any
    updates to the AI software may bring this a few steps backward for vendors, as
    there are new inputs to AI now. If AI works continuously without any updates,
    the liability will keep shifting gradually toward end users.


    However, in terms of cloud AI (cloud-based AI solution), this shift may not happen
    at all since vendors would always be in full control.


    If customers or AI users supply the training data all the time, then there would
    be shared liability from solution and outcome perspective.


    ## Attribution


    However, of all, attribution of failure might be the biggest challenge with AI
    insurance. Several cases discussed throughout this book have shown us, how challenging
    and ambiguous it can be to ascertain fault contributing factor in the entire AI
    value chain.


    AI typically uses training data to make decisions. When a customer buys an algorithm
    from one company but uses their training data or buys it from a different company
    and it doesn’t work as expected, how much at fault is the AI and how much is the
    training data?


    Without solving the attribution problem, insurance proposition may not be possible.


    While writing this book, I met several insurance industry experts, who equivocally
    said one thing—a good insurance business model demands correct risk profile and
    history. This history doesn’t exist yet. The issue is that it won’t exist at all
    if no one ever takes the initiative and makes the flywheel rotate. The question,
    though is—who will do it first?


    # What might make it work?


    While doing it first in the tech industry is quite a norm, in risk-averse sectors
    like the financial industry, it is just the opposite. So, until that happens,
    there might be an intermediate alternative.


    How about insurers covering not the total risk but only the damage control costs?
    For example, if something goes wrong with your AI system, and it causes your process
    to come to a halt, you will incur two financial burdens. One would be on account
    of revenue loss and others to fix the system. In this case, while the revenue
    loss can be significant, system fixing cost may be relatively lower, and insurance
    companies may start by offering only this part of the cover.


    Insurers may also explore *Parametric Insurance* to cover some of the known or
    fixed cost issues.


    Aggregators can combine the risks of a cluster of several companies matching specific
    criteria. They can cover part of those risks themselves and transfer partial risks
    to the insurers.


    Either way, it is not a complete deadlock to get this going.


    # Why the fixation on AI insurance?


    Implementing AI solution means you can do things at a much larger scale. If you
    have been producing *x* widgets per day without the use of AI, you may end up
    creating 100*x* widgets with AI.


    This type of massive scale also means, when things fail, they would also fail
    magnanimously. The issues 100x failure can bring upon a business could be outrageous.
    They typically not only result in revenue losses but also put a burden on fixing
    them, making alternate arrangements while they are being repaired, and so on.


    In Chapter [2](#483319_1_En_2_Chapter.xhtml), I discussed a case study on Australian
    Telco’s failed automation. If they have had AI insurance, perhaps things would
    have taken a different turn. The insurance approval process would have forced
    them to perform due diligence on their design and process up front, or else, they
    could have claimed for their losses under insurance. Either way, it would have
    been a good outcome for shareholders of the company.


    This scale is dangerous, and therefore having an AI insurance would make sense.
    Additionally, with this option in place, it will also make people more responsible
    for developing and implementing AI solutions. These options would also contribute
    toward responsible AI design and use paradigm.


    And more importantly, every human consumer or user would want some level of compensation
    at some point in time when AI solutions go wrong. They won’t accept it if you
    say AI is at fault. It is a fair expectation to be compensated. The question is,
    who will foot the compensation bill?


    And that is the biggest reason why I think AI insurance will be necessary. It
    may be a fuzzy concept for now but will soon be quite relevant.'
