- fmt: '### We must seek simplicity


    Whether it is traditional automation or a sophisticated AI program, all these
    necessarily do make decisions. And just like humans, more inputs mean more resources
    would be consumed and higher chances of errors and thereby lesser accuracy.


    If it is a simple line or curve fitting algorithm, just a couple of points do
    not help. Similarly, a thousand points are also overkilling. There is an optimal
    limit at which maximum efficiency is achieved. We need to get to that point without
    wasting a lot of resources or time, and that is where simplification becomes relevant.
    As much as we do that for machine learning and computer algorithms, we should
    do the same for real-life decision-making too.


    Simplification is also relevant from the algorithm auditing perspective. By audit,
    I do not mean a traditional regulatory audit but the review of the algorithm’s
    work in general. If the work is not simple, the analysis can be complicated, lengthy,
    and sometimes misguided, and it may not yield proper results. Simplicity helps
    in retrospection process too.


    If we insist on solutions to be simpler to audit and understand, transparent enough
    to be believed and accepted, we will have better control over the technologies.


    *Simple can be harder than complex. You have to work hard to get your thinking
    clean to make it simple. But it’s worth it in the end because once you get there,
    you can move mountains.* —Steve Jobs^([^(37)](#fn37))


    ### We must seek accountability


    As technology evolves and becomes more affordable, people are relying on it for
    their business-critical or life-critical functions. Bringing in people who would
    take accountability of outcomes seriously is often a better decision. Unless the
    application is for fancy or sheer playfulness, we need to put a responsible adult
    in charge.


    Remember that machine learning is mainly teaching a computer to label things with
    examples rather than with programmed instructions. Besides, an AI that is based
    on this learning can do wrong things only in two circumstances: if the fundamental
    logic of decision-making programmed in it (by humans) is flawed, that is, lousy
    programming, or the dataset it was trained on is incorrectly labeled (by humans),
    that is, of bad data quality. In either case, the machine will *do the wrong thing*
    or *do it wrong*!


    Here AI creators cannot just wash off their hands and say they do not know what
    went wrong when something goes awry. Humans need to take responsibility for embedding
    those wrong fundamentals and take accountability of outcomes.


    The world, even today, looks at parents if their child does something wrong, questioning
    their upbringing methods and values. Then why cannot we see the same way to creators
    of AI solutions?


    We should start assigning liability to creators of AI, much as we do now with
    guns or similar powerful things and make quality acceptance parameters stricter.


    ### We must educate everyone involved


    I keep saying this that *people often leverage your ignorance to sell you something*!


    Getting educated on emerging technologies is quite essential to avoid these miss-sells.
    Starting from the top is even more critical. Executives should understand better
    as to what they are getting into.


    They need to invest some time in acquiring this education to be able to ask the
    right questions at the right time/steps. Being more involved is necessary; merely
    learning some tech lingo is not going to be enough. If you are not involved, nothing
    else can fix it, ever!


    Additionally, we may see that the same solution used by two different users can
    yield different results, much like two people can have the same smartphone with
    the same app, but still different usage or outcome.


    Therefore, educating users and creators about technological impacts and interaction
    outcomes is the key. AI is not the kind of technology that will work the same
    way for everyone or every user. Human-computer interaction will be unique for
    each case, and that means the results delivered or the way they are provided can
    be different.


    ### We must take user feedback seriously


    Unfortunately, there is a general absence of experience-based knowledge in the
    developer community, so we cannot rely solely on the data and algorithms to know
    the right problems to solve. The same goes for business to customer or consumer
    interaction. This is a significant issue these days, and the neutral business
    perspective is often required to see things from objectivity lens.


    My mention here of feedback loop does not relate to machine learning or AI system
    as such; it instead refers to the development and use value chain. When users
    provide feedback to creators and creators learn from it to adjust their creation,
    feedback serves better.


    If creators consume feedback but never consider or act on it, it remains an open
    loop system. The open loop system is not stable.


    Creators and users should ensure that an active feedback loop is established and
    everyone in that loop is sincerely learning from it.


    ### We must prefer preemption over a fix


    There are several solutions for each type of a problem in the market, even now,
    in such a nascent stage of AI. Indeed, not all the solutions could be a good match.
    Sometimes, their offerings are slightly different, and each use case may have
    different requirements too.


    Ask yourself, if AI is such a great thing, why should we focus and limit its applications
    in solving problems? Why don’t we preempt issues and avoid them altogether, won’t
    that be a wise thing to do? How many technologies stop issues from becoming problems
    today?


    Some solutions can provide a fix to the problem as an after the fact (e.g., automated
    fixing of a broken machine), while some would give an early indication (e.g.,
    anomaly detection in machine performance). Some will help in improving problem-fixing
    performance while some will help in identifying problems early on.


    Focus and prefer preemptive systems than fixers. Both are important, but if you
    must — prevention is always better than fix!


    ## Working with AI responsibly


    As a common sense, everyone should take responsibility for their business. Whether
    one is creating an AI tool or using it. Remember that when you create a tool,
    it can change the way business is done, it can change culture and society profoundly.
    So, creators of the tool become responsible for all those consequences eventually.
    Just like the factory owners are responsible for environmental pollutions or emissions
    and waste, AI creators would be accountable for their solutions.


    And almost equally, business users of AI would be responsible too, first for encouraging
    creators for developing it and secondly for consulting them with inputs.


    In his book, *Technology vs. Humanity*,^([^(38)](#fn38)) Gerd Leonhard says, *“Embrace
    technology but don’t become it. Radical human augmentation via technological means
    will be a downgrade, not an upgrade.”* We must embrace AI in a way that is appropriate
    and just enough.


    We all know that technology does not have ethics, but our society depends on them.
    Which is why just because we can do something does not mean we should do it. The
    responsible approach is the central requirement to work and handle powerful technology
    like AI.


    ## Sanity is the key!


    Sometimes, it is better to deal with humans than machines. When to do that is
    a rational thought process, where sanity is necessary!


    We should not get carried away and assume that just because we have smart technology,
    we can use it to solve every problem around us. AI is much like a new hammer;
    let us avoid treating all of the issues as nails and avoid rushing into the emerging
    future. It is challenging and sometimes nearly impossible to undo strategic and
    technological mistakes these days.


    When working with emerging technologies, sanity is the key!


    Footnotes [1](#483319_1_En_11_Chapter.xhtml#Fn1_source) [2](#483319_1_En_11_Chapter.xhtml#Fn2_source)


