- fmt: '## The Proliferation of Junk Solutions


    With democratized technology tools, this is becoming a bigger problem every passing
    day. As more technologies are democratized, the ability to create junk (knowingly
    or unknowingly) is increasing manifold. While some are using their wisdom while
    creating sensible solutions with excellent quality and usefulness, many others
    are doing just the opposite.


    Several solution providers now believe that having a cool technology at disposal
    means they can create anything. Quite often, someone would ask, “Can we do this?”,
    and then go through with it, if it’s possible. However, the critical question
    we should be asking is, “Should we do this?”. If the answer is no, then no matter
    how possible and easy creating any solution is, it should not be done.


    However, the creators of AI solutions frequently get carried away. Even customers
    appreciate many solutions at their face value without realizing the utility of
    those solutions. It is an oft case with new products and technologies; novelty
    sells!


    But then eventually, what gets created is a pile of junk. By junk, I mean solutions
    that are either subpar or trivial solutions that add low to no value. I am sure
    that these solutions would get disavowed at some point in time. But be known that
    they have already made their way into the market anyway.


    However, with AI, several organizations still face difficulties in identifying
    metrics and quantifying benefits. The reason is apparent; most of them are approaching
    it the other way around. They have solutions that are looking for problems to
    solve.


    Many businesses, I mean senior (responsible) managers in those businesses, still
    feel and believe that AI and automation will solve their problems for good. But
    when the technology is implemented, they find themselves in the soup again, just
    that it is differently flavored this time. This is a classic case when we work
    with junk solutions that do not solve real problems or do not focus on solving
    real problems.


    The impact of low yield or no yield solutions can spread wider than you can imagine.
    By the time you implement and realize that the solution is not good, you already
    could be at the point of no return. Turning away could mean wasting too much money
    and resources; however, going further would also suggest you accept the subpar
    outcome as it won’t get any better over time.


    Businesses should start by raising expectations early in the adoption process.
    Be curious when the person in charge of such initiatives demonstrates only one
    side of the story. They usually do not tell the other side of the story, either
    because they do not know (lack of full knowledge) or they have some particular
    interest in doing so (often happens with vendors of technology).


    Accepting the fact that *we don’t know what we don’t know* is quite critical here.
    But more importantly, if the issue is lack of knowledge, it must be handled before
    the next steps are taken. Without proper knowledge and information, it is nothing
    short of a gamble.


    ## A Good Approach


    There is a lot to talk about teaching machines morality, ethics, working in gray
    areas, and so on. However, we cannot wait for all the lights to turn green, and
    we must keep moving forward, learning and improvising as we do.


    Machines make mistakes, just like humans do, and they will keep making them in
    future too. Businesses must accept this fact and know that machines also need,
    much like humans, attention, retraining, and performance improvement plan before
    they go live again.


    Businesses must make sure, just as they do for humans, machines are progressively
    trained and rigorously tested before giving them more responsibilities. Any failure
    of a machines’ performance should be dealt with, somewhat relatively stronger
    than humans.


    If you have an HR team in your organization, make sure you augment them to handle
    additional resources that are not human. Create a `HAIR` (*Human and Artificial
    Intelligent Resources*) department. Appropriate policies need to be developed
    for managing these AI resources or digital twins of existing employees. This may
    sound a bit silly for now, but the direction we are heading toward would soon
    dictate that. A movement toward making AI transparent is catching up, and this
    could be an essential step for it.


    However, there are many more things we can do to maintain sanity.


    ### We Must Remain Skeptical


    Technology adoption is a relatively slow process and goes through several stages
    before being mainstream or being established as a norm.


    Minimum viable product (`MVP`) is one such a stage through which several AI solutions
    are going through. For the established solutions, there is still a stage where
    user interaction with technology needs to be tested and customized. While the
    `MVP` is key to developing a successful product, treating `MVP` as `MVP` is very
    important.


    The problem starts when someone sells their work, which could be still in progress,
    or has not achieved an acceptable working level yet! Their solution not working
    is less of a problem than when it starts working against the goals of a project.


    We must remain positively skeptical, think through it sensibly, and adopt the
    technology with a grain of salt.


    We must remember and acknowledge that the issue with many AI or automation solutions
    is not that they would break. Instead, complex solutions like these create leakage
    of some sort, which is not entirely wrong but not quite right either. This type
    of gray output piles over time, before one can realize that they own a heap of
    junk. Getting rid of that junk or fixing the completely flawed system could become
    a nightmare.


    Remember that creating the `MVP` is excellent and essential, but we should deal
    with solutions that are not ready for full live deployment with utmost care and
    skepticism. Even if they are fully ready and validated, remaining skeptical will
    only work in your favor.


    ### We Must Not Overspeed


    I say this because the problem is not the emerging technology and the bright future
    it promises. Our adamant belief that there is a bright technological future just
    around the corner is the issue!


    So far, our attitude toward technology has been asymmetric and imbalanced. While
    we are reaping the benefits of the technology in this era, we are pushing the
    harm to our future generations in the form of polarization, lifelong unemployment,
    and concentration of wealth and power in the hands of the few technocrats. We
    are unfortunately racing toward something potentially bleak and unlikeable.


    It could be that this is not the case; so far, we cannot tell. However, indeed,
    over-speeding kills, on roads or otherwise. We must take some time to think and
    reflect on repercussions and then build safety nets for negative impacts before
    we leap.'
