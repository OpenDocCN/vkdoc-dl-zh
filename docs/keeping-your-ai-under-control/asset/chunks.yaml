- fmt: '# What does a bad user mean to us?


    Typically, one can classify computer users by their roles or expertise levels.
    In the case of role-based classifications, they look like administrator, standard
    user, guest, and so on, whereas skill-based groupings put them in the following
    categories: dummy, general user, power user, wizard/geek or hacker, and alike.


    All these categories have user levels that are just good enough to use the computer
    or any software installed on it. However, if the user’s expertise is a borderline
    scenario for being good enough or below that they would soon become bad users
    of technology. So much so that they can cause a relatively good computer system
    to come to a halt, AI included.


    Additionally, I have also seen the following user categories; each of these is
    dangerous enough to cause problems:


    ## Creative users


    Creative users are generally skilled enough to use the tool, but they often use
    it beyond its specified use. Doing that may often render the tool useless or break
    it.


    I remember an interesting issue, during my tenure with LG Electronics. One of
    the products LG manufactured was a washing machine. A typical home appliance that
    normal users would use for washing clothes!


    However, when there were several field failure reports from service centers, especially
    from the North-West part of India, we were stunned by the creativity of washing
    machine users.


    Restaurant owners in Punjab and nearby regions in India used washing machines
    for churning the Lassi at large scale.


    Lassi is a popular and traditional yogurt-based drink that originated in the Indian
    subcontinent. It is a blend of yogurt, water, spices, and sometimes fruit. Due
    to its thick texture, churning Lassi requires more human strength, especially
    when one is making it in large commercial quantities.


    That’s when restaurant owners became creative and used top loader washing machines
    for Lassi churning. It caused operational issues due to unintended and unspecified
    usage of the appliance and resulted in an influx of a large number of service
    calls. This kind of creativity looks interesting at face value but certainly causes
    problems with the technology tools.


    Another example of such creativity would be the use of Microsoft Excel in organizations.
    How many companies have you seen where Excel is not only used for tabulation and
    record-keeping but also being used for small-scale automation by running macros?


    How many times you’ve seen people using PowerPoint for report making instead of
    creating presentations?


    All these are creative uses of tools and maybe okay once in a while. However,
    the users are mostly abusing the system and tools which can cause unintended damages
    and losses to the organization. These types of users also expose companies to
    more substantial risks.


    ## Mischievous users


    These types of users are not productive, and they do not mean any direct harm.
    However, they are merely toying with the system. At times, this may be completely
    harmless. However, they may cause unknown issues, especially with AI like systems.
    If your AI system has a feedback loop where it gathers data for continuous training
    and adjustments, this may be an issue as any erroneous or random data can disturb
    the set process and models.


    ## Deliberate (bad) users


    The users that are deliberately acting bad and trying to sabotage the system could
    be disgruntled employees.


    Sometimes, these types of users think that AI system is no better than them and
    it must be taught a lesson, so they become deliberate in their attempts to fail
    the system at every chance they get.


    Mostly deliberate bad actors do it with some agenda. These types of users are
    difficult to spot early on.


    ## Luddites


    A classic example of bad users would be Luddites. They are people who are, in
    principle, opposed to new technology or ways of working.


    The Luddites were a secret oath-based organization of English textile workers
    in the 19th century, a radical faction which destroyed textile machinery as a
    form of protest. The group was protesting against the use of machinery in a “fraudulent
    and deceitful manner” to get around standard labor practices. Luddites feared
    that the time spent learning the skills of their craft would go to waste, as machines
    would replace their role in the industry.


    Over time, however, the term has come to mean someone opposed to industrialization,
    automation, computerization, or new technologies in general.


    These users mostly employees who are threatened and affected due to implementation
    of new AI systems. If your change management function is doing any good job, these
    types would be easy to spot.


    ## Bad user vs. incompetent user


    Incompetence can mean different things to different people. However, generally,
    it indicates the inability to do a specified job to a satisfactory standard.


    If a user can use the system without any (human) errors and the way they were
    required to use it, you can call them competent users. Incompetent users often
    fail to use the system flawlessly on account of their ability (not system’s problems).
    These users often need considerable help from others to use the system too.


    Bad users, on the other hand, maybe excellent at using the system, but their intent
    is not a good one.


    All incompetent users are inherently bad users of the system; however, bad users
    may or may not be incompetent. The reason why we need to understand this distinction
    is—one is curable, while other isn’t. You can make incompetent user competent
    by training them, but no amount of training would refrain intentional bad users.


    ## Handling with change management


    Most of the user and other system interaction–related issues are the result of
    poor or no change management during the full term of the project.


    While AI has the power to transform the organizations radically, substantial adoption
    numbers are difficult to achieve without having an effective change management
    strategy in place. All the bases should be covered before you begin the implementation
    and continue it as long as it is necessary.


    When you have a complete understanding of how an AI solution will help end users
    at all levels in the company, it becomes easy to convey the benefits.


    Only quoting feature list of your new AI solution will not help, you will need
    to explain what exactly AI solution is going to do and change and how it will
    help everyone in doing their job more effectively.


    A safer and less risky approach will be to pick tech-savvy users for the first
    round of deployments. They cannot only provide useful feedback about the AI system
    you’re deploying but also can highlight potential roadblocks for a full rollout.
    Tech-savvy users can help you determine if the AI solution works as expected for
    their purposes.


    These users then become your advocates within the organization and also help in
    coaching their peers when needed. These early users help in creating significant
    scale buy-in within teams and potentially reduce the number of bad users down
    the track too.'
