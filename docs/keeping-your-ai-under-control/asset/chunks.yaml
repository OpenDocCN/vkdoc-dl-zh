  trans: '

    # 教育用户以实现更好的采用


    适当的培训计划和既定的培训应使用真实场景和实践环节——欢迎用户反馈，并在推进前予以采纳——不这样做意味着你会流失大量心怀不满的优秀人才。


    如果你想确保平稳过渡和用户采用，应在流程早期就开始用户教育。此外，要针对每个利益相关者群体进行定制。你应该为他们提供关于 AI 技术的整体基础信息和知识，然后针对你正在部署的具体应用提供更深入的见解和信息。这将有助于设定他们的期望。让每个相关人员都理解
    AI 解决方案的益处至关重要。


    通过教育举措，你可以迅速消除对 AI 的误解。对于某些利益相关者和用户，尤其是那些不熟悉 AI 如何提供帮助的人，未来主义技术可能会令人生畏。这种畏惧会引发防御性反应，并以各种形式激发出他们糟糕的用户行为。


    通过适当的教育，AI 的益处对你的团队成员来说会变得显而易见，从而促进积极的接纳。


    如果你将教育重点放在 AI 解决方案将提升员工的日常工作、使其更轻松地处理常规任务这一事实上，请务必强调这一点。在与员工沟通时，要聚焦于变革的目的，并强调其能带来的积极成果。


    即使是高管领导，理解正在发生的事情、了解你正在部署的 AI 系统的能力或局限性也至关重要。通过投入足够的时间接受适当的教育，高管将能够在正确的时间、正确的步骤提出正确的问题。对他们来说，更多地参与其中是必要的。


    如果你在用户教育上投入不足，就很难挽回终端用户采用率低下的局面，因此请确保你已拨出足够的预算来教育用户，以实现更好的 AI 采用。创建多种格式的资料，使其在各种设备上随时可用，包括线下的面对面课程。在推出培训时，要衡量员工使用最多的资源类型和采用率。这能告诉你哪种媒介更有效，你可以进一步加以利用。


    全力投入教育和培训材料，可以最大限度地降低员工开始使用系统时失败的可能性。这将确保 AI 解决方案在效率和生产力方面的所有承诺得以实现。


    部署新系统时，通常会出现生产力损失的典型峰值，这通常是采用缓慢和学习曲线漫长导致的结果。你可以通过适当的方法将这种生产力损失降至最低。将教育与规划相结合，再辅以培训，是确保成功部署
    AI 的最佳方法。


    此外，作为一条经验法则，教育和培训不应在解决方案部署后结束，而应成为一项定期活动，以确保你能维持所有积极成果。这也有助于随着时间的推移提高用户能力，并有助于减少不良用户现象。


    ## 检查性能与差距


    可以合理预期，对于任何给定的场景集，人类用户能够反复展示相同的性能。你也会期望他们在这些场景频繁出现时，每次都能重现相同的结果。此外，你还会期望其他连接的系统表现出类似的一致行为，以便你能够信任整个系统。


    检查性能的一致性并在部署阶段尽早发现任何差距至关重要。AI 系统通常基于比例结果运行，解决方案层面的一些差异已被接受。当你将这种固有差异与多个人类和其他系统的差异结合起来时，很快就会变得难以管理。尽管每个差异在独立层面上可能都是可接受的，但综合起来可能会产生问题，导致整体性能不佳。


    这就是为什么一旦你部署了 AI 解决方案，就必须检查这些差距的性能。当你使用 AI 解决方案时，与之交互的多个系统可能会失控。如果你在部署前没有为系统性变化做好规划，那么它很快就会成为障碍。


    执行`Gauge R&R`（量具重复性与再现性）测试可以揭示多个可操作的发现。这是一种用于识别多个操作员之间差异的统计测试，可用于测试不同用户如何与同一系统交互。你也可以用它来检查多个系统如何与你的
    AI 解决方案交互。


    `Gauge R&R`研究的结果能为你指明性能变化的原因。这些发现有助于制定培训计划以修复用户性能问题。它还能帮助你制定系统变更需求，使它们能够无缝协作。


    持续监控用户和系统的交互，并定期进行系统性检查（和测试），可以帮助你管理 AI 解决方案的错误使用。

    '
- fmt: '# Do not forget Gemba visits


    If you want to learn user behavior in real time, learn from it, and improve your
    systems and processes, Gemba studies are very useful.


    `Gemba` (also spelled less commonly as `Genba`) is a Japanese term which means
    “the real place.” Japanese police refer to a crime scene as `Gemba`, and TV reporters
    often refer to themselves as reporting live from `Gemba`.^([^(16)](#fn16))


    In business, however, it refers to the place where value is created. We have commonly
    used this term in manufacturing, where we referred the shop floor as `Gemba`.
    In other contexts, it can also be known as the site for a construction scenario,
    the sales floor for retail, or service lounge in the case of banks’ customer lobby.


    From the *lean manufacturing* perspective, `Gemba` is a highly useful methodology
    to uncover problems in the process and usage of tools or systems. The best improvements
    can often come from going to the real place where precisely the stuff happens,
    where you can see for yourself, the state of the process. The core principle says—go,
    see, ask why, and show respect.


    Doing this enables you to see things firsthand, remain curious as you ask why,
    and understand your users more deeply. Maintaining a respectful approach can help
    in gaining employees’ trust and letting them know your intentions to understand
    and fix the system as needed.


    Remember that this is not management by walking around or performing inspection
    or audits of any kind. The objective of `Gemba` visit is to understand improvement
    opportunities.


    Here are a few steps to conduct a successful^([^(17)](#fn17)) and productive `Gemba`
    visit that can help you identify improvement opportunities and improve users’
    performance too:


    1. **Start your visit with a hypothesis:** Such as “I believe that our AI solution
    is helping employees in improving their productivity, let’s go and see how”, or
    “Our AI solution is easy to use and users love it, let me see it for myself.”
    With such hypothesis, you will go with a frame of mind to seek some inputs, and
    it would reflect in your interactions with users too.


    2. **Formalize a list of questions:** Have your questions handy when visiting.
    Your questions could be leading ones to validate (or invalidate) your hypothesis.
    You may also focus on usability issues, frequent errors, and near misses observed
    by users or system performance problems such as speed or UI-related matters. These
    types of issues do not get reported frequently, or sometimes there is significant
    lag; your `Gemba` visits can uncover any such issues faster.


    3. **Share your experiences and feedback:** As you walk through, make sure that
    you are interacting with users, commenting and expressing your views with examples
    and constructively reinforcing your company’s reason behind deploying AI solution.


    4. **Ensure follow-up actions are recorded:** If can be quite helpful in tracking
    every follow-up action if logged in the format of “what, who, and when.” It can
    help in creating accountability and fix issues if any. More importantly, it can
    help you in improving your user’s learning curve and enable you to reap the benefits
    of your AI solution quicker.


    5. **Establish a rhythm:** Making sure that you are regularly doing `Gemba` visits
    can help you set a rhythm. How often you do these visits depends on the severity
    of problems you are facing in AI deployment, your user education objectives, and
    your findings from prior `Gemba` visits.


    Remember that the objective of `Gemba` visits is to improve systems and processes.
    By fostering learning from feedback mentality, you can do it much faster. These
    steps are critical to avoiding “Good AI in the Hands of Bad Users” situations.


    # Handling user testing and feedback


    No matter how much content you put into training material, it is not always possible
    to cover all the questions users may have. It makes it essential to establish
    easy to use and quickly accessible communication channel between users and responding
    team.


    If you can make it clear who the contact person is, how long it will take to get
    a response and how to escalate if needed, that would help in gaining user confidence
    and giving them clarity about AI deployments. By doing this, you will only encourage
    users to come to you when they encounter any issues.


    Giving them confidence that their feedback is valuable and you will always take
    it on board can go a long way. Moreover, once received, do not just consume the
    feedback, but act on it.


    Sincerely learning for every feedback and fine-tuning your AI application can
    help in improving user experience. It can give them confidence in the deployed
    AI system. Doing this also reduces the number of bad and incompetent users significantly
    and thereby reduces your overall risk exposure quickly.


    # Establishing HAIR department


    Thus far, the HR department has been carrying out responsibilities to manage the
    performance of (human) workforce. All the policies that HR teams have developed
    were there to address human workforce education, augmentation, and performance
    management.


    This set scenario is changing as machines are becoming smarter, and AI is becoming
    mainstream. So, how do you plan to handle this new type of workforce, which is
    fully automatic (AI only) or is augmented by smart machines (humans + AI)?


    HR teams will have to manage performance gaps and issues related to system malfunctions
    as well as retraining requirements of humans and machines. If there is any impact
    on human performance due to poor quality AI systems, it will have to be handled
    differently than how they would handle typical human (only) performance improvement.


    Generally speaking, AI systems are smart, but they seriously lack the pivotal
    characteristic of human, common sense! With the deployment of digital twins of
    your human employees, it may become an essential requirement.


    Humans in charge of powerful technologies would have to be trained, coached, and
    managed effectively just the same as the government controls armed forces differently
    than civilians.


    It would be a good idea to take steps toward establishing a new `HAIR` team or
    augment existing HR team and accommodate these new challenges. Development of
    appropriate policies and procedures would be core to their initial tasks.


    # User readiness questionnaire


    The following questions will help you in charting out user interaction and development
    plans effectively:


    1. Do you know the profile of your AI users? Which users do you think need education
    and competency support? Which users you believe could be challenging for successful
    AI deployment and why?


    2. What is your plan to get all the users onboard?


    3. Do you have a change management plan in place? What is it pivoted on?


    4. How does your education and training plan look like?


    5. How do you plan to check performance gaps among multiple users and systems?
    How would you ascertain exact reasons for the discrepancies? Have you communicated
    this plan everyone?


    6. Did you plan for `Gemba` visits? Who are the participants? What are its objectives?
    Are they aware of it?


    7. How are you going to collect and act on user feedback? Have you established
    a single point of contact for feedback? How long will it take to get a response?
    Do you have a set escalation process, if needed?


    8. How are you going to maintain continuous communication with your users?


    9. What is your strategy to augment the HR department and increase its scope with
    AI? Have you updated performance measures in light of AI twins for users? Did
    you establish evaluation criteria to identify and ascertain improvement areas?
    How would you decide whether the system needs improvement or the employee?'
