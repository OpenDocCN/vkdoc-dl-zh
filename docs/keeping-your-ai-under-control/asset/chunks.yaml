    # 当微软聊天机器人在社交网络上变成纳粹


    2016 年 3 月 23 日，微软公司发布了一款名为“Tay”的人工智能聊天机器人。`Tay`这个名字取自“Thinking About You”（想你）的首字母缩写，其开发目的是帮助更好地理解人工智能如何与人类用户在线互动。


    随后，`Tay`被编程为摄取推文并从中学习，通过回复和与这些用户互动来进行交流。其主要目标受众是美国年轻人。不过，我认为即使目标受众不同，结果也不会有任何区别。然而，这次实验尝试仅持续了
    24 小时，`Tay`就因发布极端且具有攻击性的种族主义和性别歧视推文而被迫下线。


    `Tay`是一个经典案例，它暴露了数据科学领域一个紧迫且相关的问题——“垃圾进，垃圾出”。`Tay`被设计为从 Twitter 上的实时对话中学习，但它在过程中没有能力过滤攻击性输入或偏执言论。也许这种能力是存在的，但不足以达到目的。最终，`Tay`从用户回复中学习，并反映出相同的情感或思维。由于大多数推文都是辱骂性、种族主义和性别歧视的，`Tay`的回复也遵循了这种模式。


    微软第二次尝试发布`Tay`也并不顺利，该机器人在第二次发布后不久就被下架。此后它再也没有上线过。


    仔细审视，我发现尽管`Tay`没有被明确编程为进行任何形式的歧视，但可以安全地假设其学习数据也不包含任何歧视性特征。然而，`Tay`本应从中学习的反馈循环似乎存在缺陷。


    # 当亚马逊的当日达服务造成种族差异


    2016 年初，亚马逊向其 Prime 会员计划订阅者推出了当日达服务，但仅限于美国部分选定城市。而且，这也仅限于部分选定社区，可能这些社区的 Prime
    会员集中度足够高，足以证明运营成本的合理性。然而，当人们意识到主要非白人社区被排除在此项服务之外时，这很快就成了一个争议。这些地区的客户感到不满，因为他们认为自己被排除在当日达服务之外，这在他们已经面临偏见和歧视影响的情况下，进一步将他们边缘化。


    当这个问题在多个论坛和媒体上被曝光后，亚马逊全球传播副总裁克雷格·伯曼断言：“在当日达服务方面，我们的目标是服务尽可能多的人。”他继续说道：“人口统计数据在其中不起任何作用。零作用。”^(²)
    从亚马逊的角度来看，从成本和效率的角度来看，这似乎是一种合乎逻辑的方法，即他们会优先考虑现有付费会员最多的地区，而不是其他地区。


    这种纯粹以数据为驱动、只看数字不看人的方法，确实强化了长期以来在服务获取方面的不平等。对于那些无意中被排除在外的人来说，这不是故意的这一事实并没有带来多少实际改变。种族人口统计数据往往与地点或邮政编码相关这一事实，确实导致了间接歧视。


    显然，在邮政编码被视为任何决策的数据点之一的情况下，总会存在一些固有的偏见。这是因为邮政编码通常代表某种紧密联系的社区。也许对输入数据进行更好的采样可以在一定程度上帮助降低这种风险，但这远非绝对为零。


    # 当优步的自动驾驶汽车撞死行人


    2018 年，亚利桑那州一名行人被优步公司拥有的一辆自动驾驶汽车撞死。^(³) 美国国家运输安全委员会针对该事件发布的一份初步报告称，自动驾驶汽车内有一名人类，但碰撞发生时该人类并未控制车辆。


    事故通常意味着多个环节同时出错，因此调查起来很困难，也难以确定最终责任和根本原因。多种原因导致了这起事故——行人能见度低、自动驾驶汽车安全系统不足、以及人类辅助监督的缺失。


    法律问题最终庭外和解，未公布更多细节。然而，由于涉及多方当事人和行为者，责任问题呈现出显著的复杂性。在此次事件中，车辆由优步运营，但处于优步员工——一名人类司机的监督之下，并且是使用由其他多家科技公司设计的组件和系统进行自动驾驶的。


    在人工智能系统中进行责任归属带来了重大困境，不幸的是，目前没有既定的标准指南来使其更加透明。


    在这种直接涉及人命的场合，无疑需要清晰的界定，以及一个通用框架来帮助以标准化方式处理此类问题。


    尽管最终没有明确的法律裁决，但存在模糊性本身就是一个重大问题。当有多个行为者参与时，无论是人类还是非人类，直接还是间接，确定责任归属、根本原因和法律责任将是实现清晰界定的关键。


    # 当灯泡发起拒绝服务攻击，瘫痪整个智能家居


    这是一个 2009 年的故事，当时柏林自由大学的计算机科学教授劳尔·罗哈斯建造了德国最早的智能家居之一。^(⁴)


    他房子里的所有东西都连接到了互联网，这样灯光、音乐、电视、暖气和空调都可以远程开关。甚至炉灶、烤箱和微波炉也可以用罗哈斯的电脑关闭。


    他的设置面临的挑战是普遍存在的：涉及多个制造商和协议。为了解决这个问题，罗哈斯设计了整个系统，将他所有的智能设备都连接到一个集线器上。该集线器主要充当所有设备之间以及通过互联网进行通信的协调器。


    安装几年后，在 2013 年期间，他的智能家居瘫痪了，不再响应他的命令。用计算机术语来说，系统挂起或死机了。当罗哈斯调查时，发现导致这个问题的罪魁祸首只有一个——一个联网的灯泡！


    他发现他的灯具烧坏了，并试图告诉集线器它需要维修。然而，在这样做的时候，它不断地向集线器发送请求，导致网络过载，最终使其死机。换句话说，它通过阻碍其他智能家居设备与集线器的通信，对它们造成了拒绝服务攻击。当罗哈斯更换灯泡后，问题立即得到解决。


    然而，这凸显了智能家居以及其他所谓的自治系统中存在的一些潜在问题。当事情出错且失控时，最终用户如何能够接管控制权并让一切恢复正常？更不用说控制了，一个普通最终用户如何能够首先调查问题并找出哪里出了错？罗哈斯在设计时没有考虑一个旁路机制，让他能够接管整个系统。也许是因为这是多个异构系统的集成，或者他根本没想过这个问题！

    '
- fmt: '# When an Australian telco wasted millions of dollars


    In early 2018, an Australian telco (telecommunications company) bit the bullet
    and rolled out an automation bot (`auto-bot`) for its incident handling process.
    Although the telco expected to reap the benefits from the beginning of its implementation
    and save on more than 25% of the operational costs, the plan backfired.


    This `auto-bot` was designed to intercept all of the network incidents, 100% of
    them, and then follow a series of checks based on the problem statement selected
    by the users. The `auto-bot` was programmed to take one of the three actions based
    on the tests it would perform. It would remotely resolve the incident by fixing
    the issue programmatically, or it would assume that a technician’s visit is required
    to customer premises. And accordingly it would send someone directly, or if none
    of that was apparent, it would present the case to the human operator for further
    investigation and decision.


    This approach was sound and seemed utterly logical in the first place. However,
    after the commencement of `auto-bot` operation, within a few weeks, the telco
    realized that this `auto-bot` was sending an awful lot of technicians in the field
    than before when humans handled the entire operation. Sending out technicians
    for the field visit was a costly affair and was always the last choice for fixing
    an issue. However, `auto-bot` maximized on that.


    Upon investigation, the team figured out that there were a few incident scenarios
    that a human operator could understand (and invariably join the dots) but were
    not clear enough to be programmed for `auto-bot`. In all such cases, a human operator
    would have taken a different decision than the `auto-bot`.


    The primary issue though was, despite finding out the flaw in logic, the automation
    team was not able to turn off the `auto-bot` (much like what Microsoft did with
    Tay). The `auto-bot` was implemented in *all or nothing* manner, and it was sitting
    right in the middle of user and operator interface. Which essentially meant either
    all the incidents would go through the `auto-bot` (and get wrongly handled often)
    or none would go through the `auto-bot` and thus would get manually handled. Now,
    the only issue was that the telco was not ready to handle such a workload.


    Eventually, the telco set up another project to fix the `auto-bot` while it was
    in operation and wasted millions of dollars in the process. The money was spent
    (or wasted) on two fronts, one for continuing the service with not so intelligent
    `auto-bot` and another for running massive fixing project that lasted for more
    than a year.


    As the endowment effect kicked in, the telco had no plans to go back and fix the
    problem from its roots, but instead kept ploughing through and wasting an enormous
    amount of money. A critical question remains—who is eventually paying for this?


    In retrospection, this implementation did go wrong on several different levels,
    right from system design to its implementation and fixing of the problems. But
    the first and foremost question that emanates is why there was no plan B, a kill
    switch of some sort to stop this `auto-bot`. It appeared that the `auto-bot` development
    and rollout were not thoroughly tested for all the potential scenarios and thus
    lacked testing rigor that could have identified problems early on. While the time
    required to fix the situation was too long, detecting the failure of `auto-bot`
    took considerably longer.


    # These fiascoes have something in common


    Whether it is Tay the chatbot by Microsoft or Uber’s autonomous car or the `auto-bot`
    of Australian telco, all of these have something in common that failed. And it
    is not the technology itself!


    In all these scenarios, either the creator of AI or businesses that deployed the
    AI has not been careful enough. The fundamental tenet of handling something as
    powerful as automation or primitive AI wasn’t followed responsibly. We often say,
    “With great power comes great responsibility.” And yet, in all these cases, responsible
    design or deployment did not happen or did not occur in full spirit.


    This responsible behavior is not only needed in deployment and use of AI but also
    required equally through all the stages, right from conception to design, testing
    to implementation, and ongoing management and governance.


    Almost all the five cases we discussed have had a certain level of weaknesses
    in the solution conception stage, and this directly seeped into their development.


    In the cases of Tay chatbot, Australian telco, and Uber autonomous car, emphasis
    on solution quality wasn’t enough. There might have been a few testing routines,
    just enough to meet the requirements of IT development frameworks, but not enough
    to meet the AI development framework, which doesn’t exist!


    Even in the case of Amazon, the skill set of decision-makers could be questioned.
    Although it appeared to be an inadvertent decision to roll out same-day deliveries
    to only a few localities, thoughtful consideration could have raised these questions
    in reflection. Same goes with Australian telco case or light bulb situation, where
    creators lacked thoughtful design of the solution.'
