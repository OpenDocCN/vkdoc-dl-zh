- fmt: '# The risk of the right AI in wrong hands


    I always insist that tools and systems are not hurtful; people using them are!
    Notably, the interface between humans and AI systems is one of the risky areas.
    The users of the AI system could exhibit a severe challenge by not behaving responsibly
    when using them. A classic example would be Uber autonomous car accident (briefly
    discussed in Chapter [2](#483319_1_En_2_Chapter.xhtml)), where lack of operators’
    attention was supposedly the root cause.


    Not just during the use of the systems, these interaction risks are prevalent
    in preliminary stages of AI system training too. Coding errors, lapses in proper
    data management, incorrect model trainings, and so on can easily compromise the
    AI system’s critical characteristics such as bias, security, compliance, and the
    like.


    Not to forget risks from disgruntled personnel getting hands on these systems
    and being able to corrupt systems’ functioning in some way or the other.


    Weapon systems equipped with AI are the most vulnerable to the *right AI in wrong
    hand* problems and therefore have the greatest of risks.


    Again, we are not talking about AI systems *turning evil*. Instead, the concern
    is that a powerful AI system could be misused by someone. The possibility of AI
    systems being used to overpower others by some group or a country is one of the
    real significant risks.


    Overall, the risk of the right AI in wrong hands is one of the critical challenges
    and warrants substantial attention to avoid it.


    ## The gray matter—use it or lose it


    Perhaps the most significant risk to humanity in my view is loss of brain power!
    One of the reasons why humans are in charge and not chimpanzees is the matter
    of intelligence, despite humans being physically weakest of most of the species.
    Then, what happens when we have created something more intelligent than ourselves?
    What is our differentiator? What USP would we have then?


    Extending AI and automation, beyond logical limits, could potentially alter our
    perception of what humans can do. For example, several decades ago, doing a math
    calculation by hand on a piece of paper was highly appreciated skill for a human
    being. Now, with the advent of calculators and computers, we don’t see much value
    in that (skill) anymore.


    We still value human interaction, communication skills, emotional intelligence,
    and several other qualities in humans. What happens when an AI app takes over
    and starts to book appointments for us? Last year Google showcased an application
    where haircut appointment was booked by the app, all by itself. What happened
    to the opportunity to communicate with a fellow human? Are we becoming so busy
    to spend a couple of minutes and talk to another person? What happened to AI doing
    mundane tasks and leaving time for us to do what we like and love?


    There is a high risk that eventually several of humans would resign from their
    intellect and sit on sidelines, waiting for their smartphone app to tell them
    what to do next and how they might be feeling now!


    When we invented automatic cars, an upgrade from manual gear shift cars, we almost
    lost hand-leg-brain coordination that was once important. It is not just a matter
    of coordination per se; it is the matter of ***thinking***, which is what humans
    do and are good at, aren’t we?


    The enormous power carried by the gray matter in our heads may become blunt and
    eventually useless, if we never exercise it, turning it into just some slush.
    The old saying “use it or lose it” is explicitly applicable in this case.


    Being present and engaging with the world around us can be a lost art if we don’t
    pay attention to it. Million years ago, humans lost the tail, would the brain
    be the next?


    *Nothing pains some people more than having to think.*—Dr. Martin Luther King,
    Jr.^([^(10)](#fn10))


    ## Man plans, and technology laughs


    It would be difficult or somewhat beyond our limits to predict what something
    smarter than us would do. A powerful system can be very difficult to control and
    stop. Many such concerns have been documented by Oxford Professor Nick Bostrom
    in *Superintelligence*^([^(11)](#fn11)) and by AI pioneer Stuart Russell.


    The point I am driving here is not about evil AI per se; it is somewhat a red
    herring for now. But an incompetent machine that has not been developed responsibly
    and then has gone out of control is very much a reality even today. Without appropriate
    controls and applying sensible methods to this madness, the situation would only
    worsen further.


    Misaligned or confused and conflated goals of an AI are going to be a significant
    concern of the future, as the AI will be extremely good at achieving its goals,
    but those goals may not represent what we wanted.


    You may feel indifferent about birds and wildlife. However, if you are in charge
    of a project that is building a massive factory that could open up thousands of
    jobs, and in the process, you need to clear out a significant portion of a wooded
    area occupied by the birds—too bad for the birds.


    The critical goal of responsible and safe use of AI is to never place humanity
    in the position of those birds.


    There is an old Yiddish adage, “Mann Tracht, Un Gott Lacht,” meaning, “Man Plans,
    and God Laughs.” I think a modern version of this adage might be “Man Plans, and
    Technology Laughs”! And we must avoid that from happening.


