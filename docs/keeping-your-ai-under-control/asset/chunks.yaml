  trans: '

    # 糟糕的用户对我们意味着什么？


    通常，我们可以根据用户的角色或专业水平对计算机用户进行分类。在基于角色的分类中，他们被分为管理员、标准用户、访客等；而基于技能的分类则将他们归为以下几类：小白、普通用户、高级用户、专家/极客或黑客，等等。


    所有这些类别中的用户水平都足以使用计算机或其上安装的任何软件。然而，如果用户的专业水平处于“足够好”的边缘或低于该标准，他们很快就会成为技术的糟糕用户。严重时，他们甚至可能导致一个相对良好的计算机系统（包括人工智能系统）陷入瘫痪。


    此外，我还见过以下用户类别；每一类都足以引发问题，十分危险：


    ## 创意型用户


    创意型用户通常具备足够使用工具的技能，但他们常常超出工具的指定用途来使用它。这样做往往会使工具失效或损坏。


    我记得在 LG 电子任职期间遇到过一个有趣的问题。LG 生产的产品之一是洗衣机。这是一种普通用户用来洗衣服的典型家用电器！


    然而，当服务中心收到大量来自印度西北部地区的现场故障报告时，我们对洗衣机用户的“创意”感到震惊。


    印度旁遮普邦及附近地区的餐馆老板使用洗衣机来大规模搅拌拉西（Lassi）。


    拉西是一种流行且传统的酸奶饮品，起源于印度次大陆。它是酸奶、水、香料，有时还有水果的混合物。由于其质地浓稠，搅拌拉西需要更多人力，尤其是在大规模商业制作时。


    于是，餐馆老板们发挥创意，使用波轮洗衣机来搅拌拉西。这种对电器非预期、非指定用途的使用导致了操作问题，并引发了大量服务请求。这种创意表面上看起来很有趣，但确实会给技术工具带来问题。


    另一个此类创意的例子是组织中对 Microsoft Excel 的使用。你见过多少家公司，Excel 不仅用于制表和记录保存，还通过运行宏来进行小规模自动化？


    你见过多少次人们使用 PowerPoint 来制作报告，而不是创建演示文稿？


    所有这些都属于对工具的创意性使用，偶尔为之或许可以。然而，用户大多是在滥用系统和工具，这可能会给组织带来意想不到的损害和损失。这类用户还会使公司面临更大的风险。


    ## 恶作剧型用户


    这类用户没有生产力，也无意造成直接伤害。他们只是在玩弄系统。有时，这可能完全无害。然而，他们可能会引发未知问题，尤其是在人工智能等系统中。如果你的 AI 系统有一个反馈循环，用于收集数据进行持续训练和调整，这可能就是一个问题，因为任何错误或随机的数据都可能扰乱既定的流程和模型。


    ## 蓄意（恶意）用户


    那些故意行为恶劣并试图破坏系统的用户可能是心怀不满的员工。


    有时，这类用户认为 AI 系统并不比他们强，必须给它一个教训，因此他们故意抓住一切机会让系统失败。


    大多数蓄意的恶意行为者都带有某种目的。这类用户很难及早发现。


    ## 卢德分子


    糟糕用户的一个典型例子是卢德分子。他们是在原则上反对新技术或新工作方式的人。


    卢德分子是 19 世纪英国纺织工人中一个基于秘密宣誓的组织，是一个激进派别，他们以破坏纺织机械作为抗议形式。该团体抗议的是以“欺诈和欺骗的方式”使用机器来规避标准的劳动惯例。卢德分子担心，他们花费时间学习的手艺技能会白费，因为机器将取代他们在行业中的角色。


    然而，随着时间的推移，这个词已演变为指代反对工业化、自动化、计算机化或一般意义上的新技术的人。


    这些用户大多是因新 AI 系统的实施而感到威胁和影响的员工。如果你的变革管理职能做得足够好，这类人就很容易被发现。


    ## 糟糕用户 vs. 无能用户


    “无能”对不同的人可能有不同的含义。然而，通常它指的是无法以令人满意的标准完成指定工作的能力。


    如果一个用户能够（无任何人为错误地）按照要求的方式使用系统，你可以称他们为有能力的用户。无能的用户常常因为自身能力（而非系统问题）而无法完美地使用系统。这类用户在使用系统时也经常需要他人的大量帮助。


    另一方面，糟糕用户可能非常擅长使用系统，但他们的意图并不良好。


    所有无能的用户本质上都是系统的糟糕用户；然而，糟糕用户可能无能，也可能不无能。我们需要理解这种区别的原因是——一种可以纠正，而另一种则不能。你可以通过培训使无能的用户变得有能力，但再多的培训也无法阻止蓄意的恶意用户。


    ## 通过变革管理来应对


    大多数用户及其他系统交互相关的问题，都是由于项目全周期内变革管理不善或缺失造成的。


    虽然 AI 有能力从根本上改变组织，但如果没有有效的变革管理策略，要实现大规模的采用率是困难的。在开始实施之前，你应该覆盖所有基础，并持续进行必要的变革管理。


    当你完全理解 AI 解决方案将如何帮助公司内各级最终用户时，就很容易传达其益处。


    仅仅列举新 AI 解决方案的功能列表是无济于事的，你需要解释 AI 解决方案具体要做什么、改变什么，以及它将如何帮助每个人更有效地完成工作。


    一个更安全、风险更低的方法是选择精通技术的用户进行第一轮部署。他们不仅能为你正在部署的 AI 系统提供有用的反馈，还能指出全面推广的潜在障碍。精通技术的用户可以帮助你确定
    AI 解决方案是否按预期为他们服务。


    这些用户随后会成为你在组织内的倡导者，并在需要时指导他们的同事。这些早期用户有助于在团队内部创造显著的规模性支持，并可能在此过程中减少糟糕用户的数量。

    '
- fmt: '# Educating users for better adoption


    Proper training plan and established training use real-life scenarios and hands-on
    sessions—user feedback is welcome and will be acted upon before moving forward—not
    doing that means you leave out much unhappy right talent.


    If you want to ensure smooth transitions and user adoption, start user education
    early in the process. Moreover, tailor it to each stakeholder group. You should
    provide them with baseline information and knowledge around AI technology as a
    whole and then deeper insights and information on the specific application that
    you’re deploying. It will help in setting their expectations. It is essential
    that every involved member understands the benefits of AI solution.


    By educational initiatives, you can quickly dispel misconceptions about AI. For
    some of the stakeholders and users, especially the ones unfamiliar with how AI
    can help, futuristic technologies can be intimidating. This intimidation begets
    a defensive response and brings out the lousy user in them in various forms.


    With proper education, the benefits of AI can become apparent to your team members
    and thus foster positive uptake.


    If you center the education on the fact that AI solution will enhance employee’s
    daily work and will make it easier to handle routine tasks, make sure you highlight
    that aspect. When communicating with your employees, focus on the purpose of the
    change and emphasize the positive outcomes it can bring.


    Even for executive leaders, it is vital to understand what is happening and knowing
    the capabilities or limitations of the AI system you’re deploying. By investing
    due time in acquiring appropriate education, executives will be able to ask the
    right questions at the right time and steps. Being more involved is necessary
    for them.


    It is hard to recover from a lack of end-user adoption if you haven’t invested
    enough in user education, so make sure you have spent adequate budget in educating
    users for better AI adoption. Create multiple formats that are readily available
    for various devices, including offline in-person sessions. When training is rolled
    out, measure the uptake and types of resources employees use most. It tells you
    which medium is more effective, and you can leverage it some more.


    Going all out on education and training materials can minimize the chances of
    failure when employees start using the systems. It will ensure that all the promises
    efficiency and productivity of AI solution are fulfilled.


    There is a typical spike in productivity loss when new systems are deployed, which
    is generally a result of slow adoption and long learning curve. You can minimize
    this productivity loss with a proper approach. An approach where education and
    planning are paired with training is the best way to ensure successful AI deployment.


    Moreover, as a rule of thumb, education and training should not end after solution
    deployments but must become a periodic activity to ensure that you can sustain
    all the positive gains. It will also help in improving user capability over time
    and help in reducing bad-user phenomena.


    ## Checking the performance and gaps


    It is reasonable to expect a human user to demonstrate the same performance repeatedly
    for any given set of scenarios. You would also expect them to reproduce the same
    outcome each time those scenarios frequently occur. Moreover, you would also expect
    other connected systems to exhibit similar consistent behavior for you to be able
    to trust the whole system.


    It is essential to check performance for consistency and find any gaps as early
    as possible in the deployment phase. AI systems usually work on proportional outcomes,
    and some variation at the solution level is already accepted. When you couple
    this inherent variation with the variation of several humans and other systems,
    it can quickly become unmanageable. Although each variation might have been acceptable
    at an independent level, altogether it can be problematic and result in poor overall
    performance.


    That’s the reason why performance must be checked for these gaps once you deploy
    the AI solution. When you use your AI solution, several systems interacting with
    your AI solution may go haywire. If you did not plan for systematic changes before
    the deployment, then it could soon become a roadblock.


    Performing `Gauge R&R` (gauge repeatability and reproducibility) tests can reveal
    several actionable findings. It is a statistical test used to identify variance
    between multiple operators and can be used to test how various users interact
    with the same system. You can also use it for checking how multiple systems interact
    with your AI solution.


    The outcome of `Gauge R&R` studies gives you an indication of the causes of variation
    in the performance. These findings can help in formulating training plans for
    fixing user performance. It can also help you in formulating system change requirements
    to make them work seamlessly.


    Continuously monitoring the user and system interactions and periodically conducting
    systematic checks (and tests) can help you in managing incorrect usage of your
    AI solution.'
