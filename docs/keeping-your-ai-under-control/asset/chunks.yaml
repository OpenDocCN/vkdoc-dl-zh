- fmt: "# 8. Teach Meticulously and Test Rigorously\n\nIf you want your system to\
    \ perform better, you ought to teach it better; and, how do you verify if you\
    \ have trained it well? By testing it better!\n\nYou will find several resources\
    \ that cover the AI from a development perspective; however, there are hardly\
    \ any, which include testing AI system as such.\n\nAI testing is quite different\
    \ compared to the typical software testing. The challenges and risks any AI system\
    \ pose can make it even more critical to have a rigorous process and test mechanism\
    \ in place.\n\nMajority of the AI solutions learn in two different stages. The\
    \ first learning happens while working with controlled datasets and formulating\
    \ base models. The second learning occurs on the go or periodically with the help\
    \ of user interactions in the form of feedback.\n\nLet us discuss how to navigate\
    \ through teaching and testing of an AI system to avoid risks and set it up for\
    \ continuous improvements.\n\n## How AI learns\n\nFirst, let us understand the\
    \ learning stages and methods of learning. Doing so enables us in appreciating\
    \ pros and cons of each and also helps in understanding potential loopholes. Each\
    \ of that may result in risky outputs.\n\nA sophisticated AI system will usually\
    \ follow a two-stage learning mechanism, whereas the simple AI system may have\
    \ only one formative stage. The two stages in which AI learns are:\n\n* Training\n\
    * Feedback\n\nThe training stage is where basic machine learning models are formed\
    \ for the first time, and the system is trained using those models. The accuracy\
    \ of these models is highly dependent on the training dataset.\n\nOn the contrary,\
    \ when the AI system is deployed, some (or all) data can be fed back to the system\
    \ for continuous learning, which we term as feedback stage learning. This stage\
    \ is relatively vulnerable to various ongoing risks. Mainly because no matter\
    \ how accurate you develop your base models in the past, new data (coming through\
    \ feedback system) can cause these models to readjust and thus become better or\
    \ worse.\n\nHowever, a lot would also depend on how the machine is learning in\
    \ each stage.\n\n### Types of machine learning\n\nThere are three types of machine\
    \ learning:\n\n1. **Supervised** machine learning is usually task-driven, where\
    \ the objective is to teach and train the algorithm for prediction. A commonly\
    \ quoted example of this type of goal would be *cat or no cat* identification\
    \ system or say predicting tomorrow’s weather. Spam classification and face recognition\
    \ are some other examples of this type of learning outcomes.\n\n   This algorithm\
    \ consists of a target or an outcome variable (also known as dependent variable)\
    \ which the system needs to predict from a given set of predictors (aka independent\
    \ variables). Using these variables, we can generate a function that maps inputs\
    \ to desired outputs. We continue the training process until the model achieves\
    \ a desired level of accuracy on the training data.\n\n2. **Unsupervised** machine\
    \ learning is highly data-driven, where the objective is to identify patterns\
    \ and clusters from the data. With unlabeled data input, the algorithm is expected\
    \ to spit out grouped or clustered datasets for further classification, mostly\
    \ by the supervisor.\n\n   Here, we do not have any target or outcome variable\
    \ to predict or estimate. The output is mainly clustered or grouped and can be\
    \ used as a recommendation or request for classification. Consider YouTube or\
    \ Netflix recommendations, which monitor your video watching pattern, cluster\
    \ similar videos together and recommend them to you.\n\n3. **Reinforced** learning\
    \ in simple terms is *learning from mistakes*. While supervised and unsupervised\
    \ learning predominantly indicates the presence or absence of feature labels,\
    \ this one is different.\n\n   With reinforced learning mechanism, we let the\
    \ algorithm make prediction then reward it if the prediction is correct and penalize\
    \ it if not. Based on the rewards and penalties, over time, the algorithm adjusts\
    \ its performance to make fewer mistakes and continues to predict. When the model\
    \ achieves a reasonable level of accuracy, the reinforced training stops.\n\n\
    ## Five mistakes to avoid when training\n\nMeticulous teaching is the fundamental\
    \ requirement for having an excellent performance consistently. However, there\
    \ are a few caustic mistakes to which traditional (and contemporary) data analytics\
    \ or statistical methods are susceptible. The collective calling for such issues\
    \ is often known as *garbage in, garbage out*.\n\n### Not having enough data to\
    \ train\n\nYou may ask, “How much data does one need to train the AI system effectively?”\n\
    \nI’d say, “It depends!”\n\nIt may be a sour answer, especially if you are at\
    \ the pointy end of your machine learning stage. Nevertheless, it indeed depends\
    \ on the complexity of your problem at hand as well as the complexity of the algorithm\
    \ you plan to use. Either way, the best way would be to use empirical investigation\
    \ and arrive at an optimal number.\n\nYou may want to use standard sampling methods\
    \ in the collection of required data and may wish to use standard sample size\
    \ calculators as used in standard statistical analysis tools. However, due to\
    \ the nature of machine learning algorithms, the amount of data is often insufficient.\
    \ You most likely would need more than what a standard sample size calculation\
    \ formula tells you.\n\nHaving more data may not be an as big problem as having\
    \ it less would be. You have to make sure that there is enough data to reasonably\
    \ capture the relationship that might exist within input parameters (aka features)\
    \ and between input and output.\n\nYou may also use your domain expertise to reasonably\
    \ assess how much data is enough to exhibit a full cycle of your business problem.\
    \ It should cover all the possible seasonality and variations.\n\nThe model developed\
    \ with the help of this data will only be as good as the data you have or provide\
    \ for training, so make sure that it is adequately available. If you feel that\
    \ the data is not enough, which may be a rare scenario in the current big-data\
    \ world, don’t rush; wait until you get enough of it.\n\n### Not cleaning and\
    \ validating the dataset\n\nToo much data is of no use if it is of poor quality\
    \ and can mean one or more of the following three things:\n\n1. **Data has noise**,\
    \ that is, there is too much conflicting and misleading information. Confounding\
    \ variables or parameters are present and essential variables are missing. Cleaning\
    \ this type of data needs additional data points, because the current set is unusable\
    \ and hence not enough.\n\n2. **It is dirty data**, that is, several values are\
    \ missing (though parameters are available), or the data has inconsistencies,\
    \ errors, and mix of numerical or categorical values in the same column. This\
    \ type of data needs careful manual cleaning by subject matter experts and may\
    \ often need re-validation. Depending on the resource availability, you may find\
    \ it easier to obtain additional data instead of cleaning dirty data.\n\n3. **Inadequate\
    \ or sparse data** is the scenario where very few data points have actual values\
    \ and a significant part of the dataset is full of *nulls* or zeroes.\n\nThe type\
    \ of issues present within the dataset is often not clear from the dataset itself,\
    \ which is why I always recommend exploratory analysis and visualization to be\
    \ applied at the outset. Doing this first pass not only gives you a level of confidence\
    \ in data quality but also can tell you if there is something amiss.\n\nBased\
    \ on the visual representation, an interesting question would be—do you see what\
    \ you expected to see?\n\nIf the answer is “No,” then your data may be of poor\
    \ quality and needs cleaning.\n\nIf the answer is “Yes,” it might be useful in\
    \ finding some preliminary insights. This validation of dataset is essential to\
    \ proceed, and you should never miss it."
  raw: "# 8. Teach Meticulously and Test Rigorously\n\nIf you want your system to\
    \ perform better, you ought to teach it better; and, how do you verify if you\
    \ have trained it well? By testing it better!\n\nYou will find several resources\
    \ that cover the AI from a development perspective; however, there are hardly\
    \ any, which include testing AI system as such.\n\nAI testing is quite different\
    \ compared to the typical software testing. The challenges and risks any AI system\
    \ pose can make it even more critical to have a rigorous process and test mechanism\
    \ in place.\n\nMajority of the AI solutions learn in two different stages. The\
    \ first learning happens while working with controlled datasets and formulating\
    \ base models. The second learning occurs on the go or periodically with the help\
    \ of user interactions in the form of feedback.\n\nLet us discuss how to navigate\
    \ through teaching and testing of an AI system to avoid risks and set it up for\
    \ continuous improvements.\n\n## How AI learns\n\nFirst, let us understand the\
    \ learning stages and methods of learning. Doing so enables us in appreciating\
    \ pros and cons of each and also helps in understanding potential loopholes. Each\
    \ of that may result in risky outputs.\n\nA sophisticated AI system will usually\
    \ follow a two-stage learning mechanism, whereas the simple AI system may have\
    \ only one formative stage. The two stages in which AI learns are\n\n*   Training\n\
    \n*   Feedback\n\nThe training stage is where basic machine learning models are\
    \ formed for the first time, and the system is trained using those models. The\
    \ accuracy of these models is highly dependent on the training dataset.\n\nOn\
    \ the contrary, when the AI system is deployed, some (or all) data can be fed\
    \ back to the system for continuous learning, which we term as feedback stage\
    \ learning. This stage is relatively vulnerable to various ongoing risks. Mainly\
    \ because no matter how accurate you develop your base models in the past, new\
    \ data (coming through feedback system) can cause these models to readjust and\
    \ thus become better or worse.\n\nHowever, a lot would also depend on how the\
    \ machine is learning in each stage.\n\n### Types of machine learning\n\nThere\
    \ are three types of machine learning:\n\n1.  ***Supervised*** machine learning\
    \ is usually task-driven, where the objective is to teach and train the algorithm\
    \ for prediction. A commonly quoted example of this type of goal would be *cat\
    \ or no cat* identification system or say predicting tomorrow’s weather. Spam\
    \ classification and face recognition are some other examples of this type of\
    \ learning outcomes.\n\n    This algorithm consists of a target or an outcome\
    \ variable (also known as dependent variable) which the system needs to predict\
    \ from a given set of predictors (aka independent variables). Using these variables,\
    \ we can generate a function that maps inputs to desired outputs. We continue\
    \ the training process until the model achieves a desired level of accuracy on\
    \ the training data.\n\n2.  ***Unsupervised*** machine learning is highly data-driven,\
    \ where the objective is to identify patterns and clusters from the data. With\
    \ unlabeled data input, the algorithm is expected to spit out grouped or clustered\
    \ datasets for further classification, mostly by the supervisor.\n\n    Here,\
    \ we do not have any target or outcome variable to predict or estimate. The output\
    \ is mainly clustered or grouped and can be used as a recommendation or request\
    \ for classification. Consider YouTube or Netflix recommendations, which monitor\
    \ your video watching pattern, cluster similar videos together and recommend them\
    \ to you.\n\n3.  ***Reinforced*** learning in simple terms is *learning from mistakes*.\
    \ While supervised and unsupervised learning predominantly indicates the presence\
    \ or absence of feature labels, this one is different.\n\n    With reinforced\
    \ learning mechanism, we let the algorithm make prediction then reward it if the\
    \ prediction is correct and penalize it if not. Based on the rewards and penalties,\
    \ over time, the algorithm adjusts its performance to make fewer mistakes and\
    \ continues to predict. When the model achieves a reasonable level of accuracy,\
    \ the reinforced training stops.\n\n## Five mistakes to avoid when training\n\n\
    Meticulous teaching is the fundamental requirement for having an excellent performance\
    \ consistently. However, there are a few caustic mistakes to which traditional\
    \ (and contemporary) data analytics or statistical methods are susceptible. The\
    \ collective calling for such issues is often known as *garbage in, garbage out*.\n\
    \n### Not having enough data to train\n\nYou may ask, “How much data does one\
    \ need to train the AI system effectively?”\n\nI’d say, “It depends!”.\n\nIt may\
    \ be a sour answer, especially if you are at the pointy end of your machine learning\
    \ stage. Nevertheless, it indeed depends on the complexity of your problem at\
    \ hand as well as the complexity of the algorithm you plan to use. Either way,\
    \ the best way would be to use empirical investigation and arrive at an optimal\
    \ number.\n\nYou may want to use standard sampling methods in the collection of\
    \ required data and may wish to use standard sample size calculators as used in\
    \ standard statistical analysis tools. However, due to the nature of machine learning\
    \ algorithms, the amount of data is often insufficient. You most likely would\
    \ need more than what a standard sample size calculation formula tells you.\n\n\
    Having more data may not be an as big problem as having it less would be. You\
    \ have to make sure that there is enough data to reasonably capture the relationship\
    \ that might exist within input parameters (aka features) and between input and\
    \ output.\n\nYou may also use your domain expertise to reasonably assess how much\
    \ data is enough to exhibit a full cycle of your business problem. It should cover\
    \ all the possible seasonality and variations.\n\nThe model developed with the\
    \ help of this data will only be as good as the data you have or provide for training,\
    \ so make sure that it is adequately available. If you feel that the data is not\
    \ enough, which may be a rare scenario in the current big-data world, don’t rush;\
    \ wait until you get enough of it.\n\n### Not cleaning and validating the dataset\n\
    \nToo much data is of no use if it is of poor quality and can mean one or more\
    \ of the following three things:\n\n1.  ***Data has noise***, that is, there is\
    \ too much conflicting and misleading information. Confounding variables or parameters\
    \ are present and essential variables are missing. Cleaning this type of data\
    \ needs additional data points, because the current set is unusable and hence\
    \ not enough.\n\n2.  ***It is dirty data***, that is, several values are missing\
    \ (though parameters are available), or the data has inconsistencies, errors,\
    \ and mix of numerical or categorical values in the same column. This type of\
    \ data needs careful manual cleaning by subject matter experts and may often need\
    \ re-validation. Depending on the resource availability, you may find it easier\
    \ to obtain additional data instead of cleaning dirty data.\n\n3.  ***Inadequate\
    \ or sparse data*** is the scenario where very few data points have actual values\
    \ and a significant part of the dataset is full of *nulls* or zeroes.\n\nThe type\
    \ of issues present within the dataset is often not clear from the dataset itself,\
    \ which is why I always recommend exploratory analysis and visualization to be\
    \ applied at the outset. Doing this first pass not only gives you a level of confidence\
    \ in data quality but also can tell you if there is something amiss.\n\nBased\
    \ on the visual representation, an interesting question would be—do you see what\
    \ you expected to see?\n\nIf the answer is “No,” then your data may be of poor\
    \ quality and needs cleaning.\n\nIf the answer is “Yes,” it might be useful in\
    \ finding some preliminary insights. This validation of dataset is essential to\
    \ proceed, and you should never miss it."
  trans: "\n# 8. 精心教导，严格测试\n\n如果你希望系统表现更佳，就应当更好地教导它；那么，如何验证你是否已将其训练到位？通过更完善的测试！\n\n\
    你会找到许多从开发角度介绍 AI 的资源；然而，几乎找不到涵盖 AI 系统测试本身的内容。\n\nAI 测试与典型的软件测试截然不同。AI 系统带来的挑战和风险，使得建立严格的流程和测试机制变得更为关键。\n\
    \n大多数 AI 解决方案在两个不同阶段进行学习。第一次学习发生在处理受控数据集并构建基础模型时。第二次学习则是在运行过程中或定期地，借助用户以反馈形式进行的交互来实现。\n\
    \n接下来，让我们探讨如何引导 AI 系统的教导与测试，以规避风险并为其持续改进奠定基础。\n\n## AI 如何学习\n\n首先，让我们了解学习的阶段和方法。这样做能让我们认识到每种方法的优缺点，也有助于理解潜在的漏洞。每一个漏洞都可能导致有风险的输出。\n\
    \n一个复杂的 AI 系统通常遵循两阶段学习机制，而简单的 AI 系统可能只有一个形成阶段。AI 学习的两个阶段是：\n\n*   训练\n*   反馈\n\
    \n训练阶段是首次形成基本机器学习模型的阶段，系统使用这些模型进行训练。这些模型的准确性高度依赖于训练数据集。\n\n相反，当 AI 系统部署后，部分（或全部）数据可以被反馈回系统进行持续学习，我们称之为反馈阶段学习。这个阶段相对容易受到各种持续风险的影响。主要原因是，无论你过去开发的基础模型多么精确，通过反馈系统进入的新数据都可能导致这些模型重新调整，从而变得更好或更差。\n\
    \n然而，很多情况也取决于机器在每个阶段是如何学习的。\n\n### 机器学习类型\n\n机器学习有三种类型：\n\n1.  **监督式**机器学习通常是任务驱动的，其目标是教导和训练算法进行预测。这类目标的一个常被引用的例子是*猫或非猫*识别系统，或者预测明天的天气。垃圾邮件分类和人脸识别是这类学习成果的其他例子。\n\
    \n    该算法包含一个系统需要从一组给定的预测变量（也称为自变量）中预测的目标或结果变量（也称为因变量）。利用这些变量，我们可以生成一个将输入映射到期望输出的函数。我们持续训练过程，直到模型在训练数据上达到期望的准确度水平。\n\
    \n2.  **无监督式**机器学习是高度数据驱动的，其目标是从数据中识别模式和聚类。通过输入未标记的数据，算法期望输出分组或聚类的数据集，以供进一步分类，通常由监督者完成。\n\
    \n    这里，我们没有任何需要预测或估计的目标或结果变量。输出主要是聚类或分组的，可以作为推荐或分类请求使用。想想 YouTube 或 Netflix\
    \ 的推荐，它们会监控你的视频观看模式，将相似视频聚类在一起并向你推荐。\n\n3.  **强化式**学习简单来说就是*从错误中学习*。虽然监督式和无监督式学习主要指示特征标签的存在与否，但这种方式有所不同。\n\
    \n    通过强化学习机制，我们让算法进行预测，然后如果预测正确就给予奖励，如果错误则给予惩罚。基于这些奖励和惩罚，随着时间的推移，算法会调整其性能以减少错误并持续预测。当模型达到合理的准确度水平时，强化训练停止。\n\
    \n## 训练中应避免的五个错误\n\n精心教导是持续获得卓越表现的基本要求。然而，传统（和当代）的数据分析或统计方法容易犯一些严重的错误。这类问题的统称通常被称为*垃圾进，垃圾出*。\n\
    \n### 没有足够的数据进行训练\n\n你可能会问：“有效训练 AI 系统需要多少数据？”\n\n我会说：“这取决于情况！”\n\n这可能是一个令人失望的答案，尤其是当你正处于机器学习阶段的关键时刻。然而，这确实取决于你当前问题的复杂性以及你计划使用的算法的复杂性。无论哪种方式，最好的方法是使用实证研究来得出一个最优数量。\n\
    \n你可能希望在收集所需数据时使用标准抽样方法，并可能希望使用标准统计分析工具中使用的标准样本量计算器。然而，由于机器学习算法的性质，数据量往往不足。你很可能需要比标准样本量计算公式告诉你的更多的数据。\n\
    \n数据过多可能不像数据过少那样是个大问题。你必须确保有足够的数据来合理捕捉输入参数（也称为特征）内部以及输入与输出之间可能存在的关联。\n\n你也可以利用你的领域专业知识来合理评估需要多少数据才能完整展现你的业务问题的一个完整周期。它应该涵盖所有可能的季节性和变化。\n\
    \n借助这些数据开发的模型，其质量取决于你拥有或提供用于训练的数据的质量，因此请确保数据充足可用。如果你觉得数据不够（在当前大数据世界中这可能是罕见情况），不要急于求成；等到你获得足够的数据再说。\n\
    \n### 未清理和验证数据集\n\n如果数据质量差，数据过多也无用，这可能意味着以下三种情况中的一种或多种：\n\n1.  **数据有噪声**，即存在太多相互矛盾和误导性的信息。存在混杂变量或参数，而关键变量缺失。清理这类数据需要额外的数据点，因为当前数据集不可用，因此不够用。\n\
    \n2.  **数据是脏数据**，即多个值缺失（尽管参数可用），或者数据存在不一致、错误，以及同一列中数值和分类值的混合。这类数据需要领域专家进行仔细的手动清理，并且通常需要重新验证。根据资源可用性，你可能会发现获取额外数据比清理脏数据更容易。\n\
    \n3.  **数据不足或稀疏**是指实际值的数据点非常少，而数据集的很大一部分充满了*空值*或零值的情况。\n\n数据集中存在的问题类型通常无法从数据集本身清晰看出，这就是为什么我总是建议在开始时进行探索性分析和可视化。进行这第一步处理不仅能让你对数据质量有一定信心，还能告诉你是否有遗漏之处。\n\
    \n基于可视化表示，一个有趣的问题是——你看到了你期望看到的东西吗？\n\n如果答案是“否”，那么你的数据可能质量较差，需要清理。\n\n如果答案是“是”，那么它可能有助于发现一些初步见解。数据集的这种验证对于继续推进至关重要，你绝不应跳过这一步。\n"
- fmt: '### Not Having Enough Spread in Data


    Having a large amount of data is not always a good thing unless it can represent
    all the possible use cases or scenarios. If the data is missing variety, then
    it can lead to problems in the future—you increase the chances of losing on low-frequency
    high-risk scenarios.


    For traditional predictive analysis, there is a point of diminishing returns as
    you obtain more and more data for training. Your data science team can often spot
    this point empirically.


    However, since machine learning is an inductive process, your base model can only
    cover what it has seen in the data. So, if you miss on long tail, aka edge cases,
    they will not be supported by your model. It merely means your AI will fail when
    that scenario occurs. That is the only and the most crucial reason why your training
    data should have enough spread to represent the real population.


    ### Ignoring Near Misses and Overrides


    During initial training, it is hard to identify near misses and disregarded data
    points. However, in a continuous learning loop with feedback, it becomes highly
    essential to pay close attention to near misses and human or machine overrides.


    When you deploy your AI system for the first time, it has an only base model that
    governs the performance of an AI. However, as system operation continues, the
    feedback loop feeds live data, and system starts to adjust, either live or regularly.


    If the model has missed to correctly predict or calculate any output just by a
    bit and thereby the decision has changed, it would be a near miss. For example,
    in the case of a loan approval system, if 88.5% score means "`loan approved`"
    and 88.6% results in "`loan declined`," then this scenario is a near miss. From
    a technical and pure statistical point of view, it is correct; however, from a
    real-life perspective, a margin of error may play a significant role. If contested
    by the affected party, such as loan applicant, chances of change in a decision
    are higher. Therefore, these type of data points are of particular interest, and
    you should not ignore them.


    The same applies when a human operator is supervising AI system''s output and
    can decide to override it. Human operator overriding output of an AI should always
    be treated as a special-case scenario, and you must feed it back to the training
    model. Each of these scenarios either highlights inadequacies in the base model
    or provide new situations that never existed before. Ignoring overrides can degrade
    the model performance over time.


    ### Conflating Correlation and Causation


    In statistics, we often say, "correlation does not imply causation." It usually
    refers to the inability in legitimately deducing a cause and effect relationship
    between input variables and output. The resulting conclusion still may not be
    incorrect or false, but the failure to establish this relationship is often an
    indicator of lurking problem.


    On similar terms, the predictive power of your model does not necessarily imply
    that you have established an exact cause and effect relationship in your model.
    Your model may very well be conflating correlation of input parameters and predicting
    output based on that.


    You may think that "As long as it works, it shouldn''t matter." However, the distinction
    matters since many machine learning algorithms pick upon parameters simply because
    there is a high correlation. Determining causality based on correlations can be
    very tricky and can potentially lead to contradictory conclusions. It would be
    much better to be able to prove that there truly is a causal relationship.


    However, these days, developers and data scientists are merely relying on statistical
    patterns. Many of them fail to recognize that those patterns are only correlations
    among vast amounts of data rather than causative truths or natural laws, which
    govern the real world.


    So, how do you deal with conflation?


    Try this—during initial training and model building, soon after you find a correlation,
    don''t conclude too quickly. Take time to find other underlying factors, find
    the hidden factors, and verify if they are correct and then only conclude.


    ## Complementing Training with Testing


    If you have to trust someone with their performance, there is one of the two ways
    to do it. Train them effectively such that their performance is guaranteed. If
    you suspect training, even by a bit, then test them rigorously to ensure a better
    performance. Moreover, if you do both, that is, train meticulously and test rigorously,
    you can be confident about the performance, and it forms a better basis for trust.


    So, while you would focus on better training of your AI system, it would also
    make sense to complement that training with better testing rigor.


    Better training would imply that machine learning has not resulted in overfitting
    or force-fitting of models. However, if you suspect that this may have occurred,
    you should craft your testing to capture it. You can easily do that with brand
    new datasets, albeit relevant to the application, where the dataset represents
    real-life scenarios.


    If you suspect that training was not adequate and may not have covered all the
    possible scenarios, including risky ones, then create tests that can put your
    AI system under these conditions and verify that system performs as expected.


    Design your tests to catch potential pitfalls that may occur during the training.
    These tests should also reflect the conditions where your AI system must perform
    and how would you ascertain. If your AI passes those tests, then you know that
    it is good enough.


    You will often come across black-boxed AI systems or at least some components
    of it, which would be like that. Since you would be limited to understand the
    inner working of those systems or sub-systems, your only allies would be meticulous
    training and then rigorous testing. Testing should reveal any potential threats
    and opportunities, and if all goes well, you would be reasonably confident about
    the black box''s functioning.


    In a nutshell, take rigorous statistical testing seriously, and you would be good
    to go (in production).


    ## AI Testing Is Not Software Testing


    Yes, AI system testing is not the same as software testing.


    Traditional software testing is entirely black-and-white activity. You have a
    fixed test case (with expected response), where you test it with designed input.
    If you find a problem, you note the scenario and fix it.


    However, with machine learning, it plays differently because, in most of the cases,
    it will be almost impossible to retrace decision-making of the algorithm. Moreover,
    testing the AI system would often incite a lot of (rather far too many) scenarios,
    which is uncommon in traditional testing.


    In traditional software testing, when we act, we would expect the same outcome
    each time we repeat it. With AI, it may not reproduce the same result 100% of
    the times.


    Also, since you cannot test case-by-case basis, you may need to throw a huge number
    of scenarios at the system and see what you get. If the proportion of correct
    output is reasonably high, then you can be confident that it will work (most of
    the times). Much like our school exams, where we may not get 100% marks, but having
    them beyond specific percentage means, we are good enough to ascend to the next
    level.'
