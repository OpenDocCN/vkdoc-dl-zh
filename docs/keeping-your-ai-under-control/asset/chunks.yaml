- fmt: '# AI Solution Evaluation Questionnaire


    Here is the questionnaire, which you can use in evaluating risks of your AI solution.
    It is applicable in all cases, whether you are developing the solution in-house,
    have outsourced the development, or are buying it off the shelf from another vendor:


    1. Did you frame the hypothesis correctly?

    2. Did you validate the hypothesis with data, and does statistical analysis support
    it?

    3. Collectively, how many root causes does your AI solution address?

    4. Does your solution address the high impact root cause(s)? Ideally it should
    address all the drivers, but if not, it should at least treat the most important
    ones.

    5. Do you know how your solution was trained? How many times or how long and when?

    6. Do you know what type of dataset was used during the training of AI system?
    Wherefrom the data was sourced? How reliable do you think the data and its source
    are?

    7. How was the fitness for purpose assessed for training dataset?

    8. Does the training dataset fully represent the population under consideration?

    9. Does the training dataset contain biases? If yes, of what kind? If not, how
    was that ascertained?

    10. During the initial stage, did you perform dataset cleaning and normalization?
    Did you find any anomalies? Are you aware of the source of those anomalies? How
    were those corrected before training?

    11. Does the training dataset contain a full spectrum of values? Are any long-tail
    values discarded? If yes, how did team come to that decision?

    12. Can AI solution be stopped quickly and gracefully as and when needed? Do you
    know the process to do it?

    13. Once stopped, can the solution be redeployed? What is the process to do it?

    14. Can your AI solution forget all the learning and relearn from scratch? What
    resources are required to retrain the system? If an AI solution cannot unlearn
    and retrained, how can you fix any issues?

    15. When the solution is stopped, how would business function? Do you have a business
    continuity plan in place? Have you evaluated financial repercussions, downtime,
    claims, and other impacts relating to this?

    16. Is your AI solution tailored to your use case? To what extent? If not fully
    customized, what kind of crossover is expected? Do you have plan to handle that?

    17. Has the solution been tested for concept drift? If not, why not? If yes, how?

    18. What precautions are built in the solution to handle drift? Do you know how
    to identify drift? Also, how to fix it?

    19. Are you able to explain and understand your AI solution’s decisions and predictions?

    20. Are you able to perform a full audit of your AI solution?

    21. If something goes wrong, how long will it take to audit and trace the root
    cause of failure? How does it impact the business?


    Taking a cue from these questions, you may think of more questions to seek answers.
    In the end, it is right for you because this way you can be more confident with
    your AI solution and understand it better.


    ## Evaluate Thoroughly and Be in Control


    From an economic point of view, currently there is significant information asymmetry
    that has put AI solution creators in more powerful position than the ones who
    would use it.


    It is being said that technology buyers are at a disadvantage when they know much
    less about the technology than sellers do. For the most part, decision-makers
    were not equipped to evaluate these systems. However, with the preceding questionnaire
    and information, the situation should change.


    The crux of the matter is, you cannot leave it to the AI developers, in-house
    or outside, to police themselves for mindful design and development.


    It is natural for us to evolve and keep pushing the envelope. However, certain
    things cannot be undone. There is no `undo` option here. Therefore, it is imperative
    that we either slow down or be overly cautious.


    Since slowing down is a less likely acceptable option, being overly cautious is
    necessary. Being strict in evaluation of risks and putting up strong governance
    are some of the critical steps you can take.


    It may be a minor nuisance if your laptop crashes, or your search engine shows
    weird and unrelated results, or your movie streaming service suggests you flop
    movies. However, if the system is controlling a car, or a power grid or a financial
    trading system, it better be right. Minor glitches are unacceptable.


    For you to be confident in your AI system, you must make sure that you are working
    on the `right solution`, and the solution is `designed right`.


    Tactically, “doing things right” is essential; while strategically, “doing the
    right things” is critical. With powerful technology like AI at hand, both are
    essential.


    Footnotes [1](#483319_1_En_4_Chapter.xhtml#Fn1_source) [2](#483319_1_En_4_Chapter.xhtml#Fn2_source)


    # De-risking AI Solution Deployment


    In the previous chapter, we focused on AI solution design and risk aspects related
    to it. Our objective was to ensure that the solution is `designed right`. In this
    chapter we will focus on solution’s deployment aspect and also cover `solution
    is right` aspect.


    When you have access to powerful tools and technologies such as AI, deploying
    the right solution in for the right problem at the right time becomes almost mandatory.
    It hasn’t been any different in the past. However, due to the scale at which the
    AI can now make an impact, it demands a higher level of sanity and responsibility.


    The fact that `you don’t know what you don’t know` poses a significant barrier
    when dealing with AI like solutions. The best way to break that barrier is asking
    the right questions and seeking answers.


    For AI solution deployment, it is essential that you take control of planning
    and architecture early on. Avoiding asking right questions early on can mean you
    end up with subpar solutions with reduced yield. Very likely, you may waste your
    investment altogether by doing something that doesn’t affect your key metrics.


    If you ask for tough questions early on, it may seem like you are delaying; however,
    remember that it is for the greater good. It is an oft case with new products
    and technologies such as AI, novelty sells! You do not want to buy a fancy and
    costly toy system. You want to set the foundation to boost your business significantly.


    ## Ensuring Long-term Strategy is Defined


    I often say that technology solutions are not one-point solutions anymore; they
    are intricate pieces of systems. Therefore, expecting your AI solution to be plug-and-play
    or install and get-go would be wrong.^([^(14)](#fn14))


    You must ask yourself and your leadership team how your strategic road map looks
    like or should look like after deploying AI solution. If you do not have any such
    road map, that’s your first and foremost priority, work on it already. Without
    having a strategic road map in place, there is no point in deploying any solution
    whatsoever.


    The use of emerging technologies such as AI is a direction and not a destination.
    Therefore, your road map should show the evolution of your business as you imbibe
    these techs. Having this information mapped out on a stage by stage manner would
    be highly useful.


    For each milestone and critical step, make sure you document which business metric(s)
    will improve and what is the expected outcome.


    This strategic road map can then be your ultimate guide—a north star for your
    entire journey of technology deployments. This type of document will naturally
    evolve as you make amendments in your strategy and expectations from time to time.'
