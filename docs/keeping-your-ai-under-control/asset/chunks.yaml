    *To everyone who believes that humans are more valuable than machines!*


    Early praise for “*Keeping Your AI Under Control* ”


    “Trusted AI and bias detection in AI are essential areas that have gained significance
    in recent times. Most of the AI use cases today need explainability as a critical
    feature. This book has excellent use cases for CIOs to assess their AI projects
    and their current effectiveness. In addition, the book covers an important aspect—Responsible
    AI, highlighted through “The Leash System” that outlines how organizations can
    perform a sanity check on their AI projects.”


    > —Shalini Kapoor, Director & CTO - Watson IoT, IBM India


    “In today’s world of cloud services and AUTOML [automated machine learning] frameworks,
    the development of AI models has become quite methodical (if not easy) and is
    framework driven. When you have defined steps or a pipeline to approach a particular
    problem, it has an inherent self-correcting mechanism. Today, we have a framework
    for AI development and implementations from a process and technology standpoint,
    but we don’t have a one for designing a responsible AI model with a self-correcting
    or feedback mechanism to learn from mistakes and be responsible for them. This
    book fills the gap with “The Leash System” to implement AI in an unbiased way,
    make it more responsible for its utility point of view, and make your models more
    real (if not human). AI models do not have a mind of their own, so this book will
    help the AI designers to design AI solutions, representing a responsible human
    mind.”


    > —Rahul Kharat, Director, Head of Artificial Intelligence, Eton Solutions LP


    “I had no idea AI would be such a huge game-changer when we programmed our first
    expert systems based application in 1996.*Keeping Your AI Under Control* not only
    accounts how AI is changing the world, but more importantly it gives us guidelines
    on how AI should be built to high ethical standards. Anand is skilled in converting
    complicated topics and technical jargon into a simple language; thus, the book
    will equally appeal to programmers and end-users.


    This book helps strike a collective debate on how humanity should use a potent
    tool like AI towards the betterment of all.”


    > —Amit Danglé, Vice President of Customer Success, Saviant Consulting


    ## Introduction


    Future tech always brings us two things: promise and consequences. It’s those
    consequences the*responsible AI* is all about, and if it is not, then it should
    be.


    The sensational news and resulting hysteria about the future of artificial intelligence
    are everywhere. Hyperbolic representation by the media has made many people believe
    that they are already living in the future.


    Much of our daily lives as consumers intertwine with artificial intelligence.
    There is no doubt that artificial intelligence is a powerful technology, and with
    that power comes responsibility!


    AI hyperbole has given rise to “*AI solutionism* ” mindset. Such that many believe
    that if you give them enough data, their machine learning algorithms can solve
    all of humanity’s problems.


    We already have seen the rise of a similar mindset a few years ago, which was
    “*there is an app for it* ” mindset, and we know that it hasn’t done any good
    in real life. Instead of supporting any progress, it endangers the value of emerging
    technology and sets unrealistic expectations.


    AI solutionism has also led to a reckless push to use AI for anything and everything.
    This push is making several companies to take the*ready-fire-aim* approach, which
    is not only detrimental to the company’s growth but also is dangerous for customers
    on many levels.


    A better approach would be to consider suitability and applicability, apply phronesis,
    and do what is necessary. However, fear of missing out is leading to several missteps
    and is eventually creating a substantial intellectual debt that we may never be
    able to pay.


    One of the many ways to handle this is being responsible with AI and keeping it
    always in your control. However, the problem with the responsible AI paradigm
    is that everyone knows*why* it is necessary, but no one knows*how* to achieve
    it.


    This book aims at guiding you toward responsible AI with actionable details. The
    responsible AI is not just a fancy term or an abstract concept—it is to be ethical,
    careful, controlled, cautious, reasonable, and accountable, that is, to be responsible
    in designing, developing, deploying, and using AI.


    Throughout the book, you will learn about the various risks involved in developing
    and using AI solutions. Once you are enabled to identify risks, you will be able
    to evaluate and quantify them. Doing this in a structured manner means your approach
    will be more responsible for designing and using AI.


    Knowing what we don’t know has significant advantages. Unfortunately, AI tech
    giants are continually pushing user companies in a danger zone, where companies
    don’t know what they don’t know. This push is dangerous, not only from a risk
    concentration perspective but also for your own business’s sake. You must seek
    to understand what is inside the AI black box.


    Applying structured methods to evaluate risks and diligently managing them can
    help you to understand risk exposure and mitigate it as much as possible. The
    book will enable you to do it and help you to remain in control.


    Any effort to solve problems must cover three key aspects—doing the right thing,
    doing it right, and covering all the bases. The methodology explained throughout
    the book will help you understand these aspects in detail.


    I have organized the contents of the book into three parts. In the first part,
    I explore the future state of AI by assessing what is to come. I not only talk
    about past fiascoes and lessons learned but also elaborate on risks that artificial
    intelligence as a technology is posing.


    The second part is about risk prevention. I take you to through evaluation method
    for various risks, such as AI solution risks, during the deployment, and human–machine
    interaction related. Additionally, I also discuss a systematic approach to risk
    mitigation.


    While prevention is always the best strategy than cure, having a better control
    system and mitigation plans in place can be quite useful. The third part covers
    the mitigation aspect. I elaborate on the use of*red teams* for AI solutions’
    stress testing, along with residual risk management.


    Subsequently, I also talk about AI insurance that could cover you from the new
    unknowns. I was careful while writing the chapter where I talk about AI insurance,
    and I developed it after consulting with insurance industry experts vetted the
    content.


    Not knowing what you don’t know is a more significant risk than any known risks.
    Identifying and mitigating such risks can give you peace of mind. And even if
    things go wrong, you would be able to handle them, or at least your losses may
    be covered.


    Technology is not everything; it also takes an appropriate combination of people,
    process, and timing to achieve the best results. The book helps you cover all
    these aspects.


    Remember that you can develop a responsible AI specific to your use case if you
    know the risks and understand them better.


    I not only invite you to read the book but also to try applying techniques and
    methods explained for your company and educate others about the same—we will need
    collective efforts to make AI responsible again!


    ## Acknowledgments


    There is a famous saying—“*It takes a village to raise a child* ”—and it is no
    less the case when writing a book.


    Having an idea and turning it into a book is as hard as it sounds. The experience
    is both internally challenging and rewarding. None of this would have been possible
    without so many supportive people in my life.


    I believe that the support always starts with our innermost circle, with people
    who live and breathe with you. As for me, there are three dots in my intimate
    circle, my wife*Jyoti* , my son*Aadi,* and daughter*Manasvi* . These three dots
    are extremely good at inspiring and energizing me in the most innovative ways.
    Throughout the journey of writing this book, they made sure that I’m motivated,
    inspired, and well-fed!


    I am eternally grateful to*my parents* , the source of my writing genes, who always
    nurtured my love of books since childhood and supported my quests to their full
    abilities, all their life.


    I appreciate help from*Gregory Bell* . Greg helped with the initial reviews of
    a few chapters in the book and provided with his feedback. I remember my long
    discussions with Greg, which always helped in crystallizing several points I make
    throughout this book. Thanks Greg!


    An exciting 30-day coffee challenge resulted in a meeting with*Chris Stallard*
    , who helped me with one of the critical chapters in this book. Chris comes from
    a general insurance background and has extensive experience in this domain. His
    inputs significantly helped in clarifying the AI insurance concept, factual writing,
    and making that chapter possible. Thanks mate!


    Compared to my previous book on Internet of Things, my approach in writing this
    book was quite different. It was to formulate a concept, conduct extensive research
    around it, then to test my idea in the market for feedback, and finally write
    it down in a refined format. That involved several presentations and meetings
    throughout the last year. In doing so,*Paulina Kabaczuk* from*Deloitte* and*Zara
    Crichton* and*Nathan Plummer* from*Venture Café Sydney* have been instrumental
    in helping me with the platform to present and speak at the events. It helped
    in getting useful feedback and refining the contents. Folks, thank you!


    It was*Lalit Kumar* who helped with many brainy discussions in conceptualizing*The
    Leash System* —a practical method for responsible AI development. This system
    has been a foundation for the process and content explained in this book. Thanks
    Lalit!


    Finally, to all those who have been a part of my getting there: many thanks to
    everyone on the*Apress* team who helped in getting this book out in the market.
    Special thanks to*Nikhil Karkal* for making an introduction and*Shivangi Ramchandran*
    for taking the proposal further. Thank you,*Rita Fernando,* for being a patient
    and accommodating editor.'
