  raw: '### Using the output of the analysis


    The output of pre-mortem analysis is only useful if you use it.


    Each process step or system function would have one or more RPN values associated
    with it. The higher the RPN, the riskier the step is. During the pre-mortem exercise,
    the team must decide a threshold RPN value. This way, for all the steps where
    RPN is above the threshold, risk mitigation and control plan become mandatory,
    whereas for RPNs below threshold may be addressed later as their priority would
    be lower.


    Ideally, you should be addressing all the practical steps wherever RPN is nonzero.
    However, it is not always possible due to resource limitations.


    One of the ways you can reduce RPN is by reducing the severity of the failure
    mode. Typically, reducing severity often needs functional changes in process steps
    or the solution itself. Additionally, the occurrence can be controlled by addition
    of specific control measures such as human in the loop or maker-checker mechanisms.


    However, if it is not possible to reduce the severity or occurrence, then by implementing
    control systems, you can contain the failures. Control systems can help in either
    detection of causes of unwanted events before the consequence occurring or the
    detection of root causes of unwanted failures that the team can then avoid altogether.


