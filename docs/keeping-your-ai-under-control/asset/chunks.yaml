    In the healthcare sector, primarily pharma domain, neural networks are being used
    for speedier drug discovery.


    Creating standard technical content such as product descriptions, specification
    sheets, and so on has also been another recent AI application.


    Applicant tracking systems along with resume scanning has been in use by recruitment
    industry for quite some time. New applications also have some capability to scrutinize
    your resume and show the matching percentage with given job requirements. This
    capability is quite similar to showing you search results based on your search
    engine keyword query. It has its quirks though, but regardless, it is not going
    away.


    Banking and insurance sectors are judging your creditworthiness based on inputs
    and information you provide to them. Due to their abundant data on you, as well
    as central databases like credit agencies and so on, these systems can make pretty
    close judgment calls. In some cases, their functioning does get affected due to
    lack of data or information, especially when privacy legislations prohibit them
