    # 确保基础设施的可用性


    这关乎你在技术层面的准备情况。虽然你的业务领导层可能已准备好迎接挑战并着手实施 AI，但你当前的基础设施却可能成为关键链条中最薄弱的环节之一。


    请对现有 IT 基础设施与能力状况进行现实评估。为 AI 项目升级 IT 基础设施并非*点击即购*的简单事务，需要投入大量资源进行准备，包括硬件和网络。如果存在差距，或对其适用性缺乏信心，那么优先解决这个问题将是审慎之举。


    `流程成熟度`是另一个必须关注的方面。除了 IT 基础设施，强烈建议将运营流程提升至显著成熟的水平。若非如此，随着需求持续变化，过程中将出现多次迭代，并导致大量临时调整。这些迭代和变更显然会侵蚀预算，并可能使实施延迟超出可接受范围。持续变更带来的疲劳感会迅速消耗团队精力，打击士气，并很快演变成重大问题。


    `数据就绪度`是降低 AI 部署风险的第三个关键方面。一个简单的判断方法是——如果你对自身数据能力存疑，就不要考虑任何规模的 AI 解决方案。AI 解决方案需要海量数据才能达到可接受的性能水平。然而，如果你不清楚该收集哪些数据，这就会成为一个重大问题。在考虑
    AI 解决方案实施之前，务必确保你在所有方面都已做好数据准备。


    # 设定成功的目标指标


    与其他所有项目一样，AI 项目也会经历一段蜜月期。一旦结束，利益相关者就会关注真实、可衡量的业务价值。


    如果你没有预先确定关键指标并将其与项目成果挂钩，这可能会成为问题。你应该在项目启动前就识别并验证预期影响，这样你就能知道何时该期待什么结果。这还能让你在关键指标未产生价值或进展偏离计划时，及时叫停部署。


    在业务中实施一项“酷炫”技术或许能让你获得一些炫耀资本，但它不会直接贡献于你的营收或利润。每项业务指标都必须与每项计划举措建立清晰关联。在启动 AI 项目时，建立这种关联应是第一步。要明确如何衡量指标变化、可接受的变化范围是多少、下限又是什么。


    拥有这套衡量体系将帮助你在推进过程中稳步前行，或在必要时暂停并重新调整。


    # 定义验收标准


    在部署 AI 解决方案之前，你必须为部署成果设定验收标准。提前这样做有助于避免确认偏差，也能防止你陷入禀赋效应。


    禀赋效应指出，人们更倾向于保留自己已拥有的物品（比如 AI 解决方案），而非去获取尚未拥有的相同物品。


    因此，一旦你部署了 AI 解决方案，你很可能会放宽验收标准，接受一个低于标准的方案，仅仅因为你已经投入了资源来实施它。一旦发生这种情况，你将不得不长期忍受一个功能失调或质量低劣的
    AI 解决方案。你可能会辩称后续会有持续改进，但事实是，你将永远处于追赶状态，这绝非理想局面。


    如果你接受一个低于标准的方案，并希望后续再改进，最终只会陷入与技术赛跑的困境，这并不好。


    为了迎合输出结果而定义验收标准，无异于事后修正，会让你背负巨大的智力债务。智力债务是指你接受了答案，却不知道它是如何得出的，并期望在未来某个时间点才能弄明白。陷入智力债务会极大增加你的风险敞口，使你处于最脆弱的境地。


    如果你想降低 AI 部署的风险，请先定义好验收标准并坚持执行。如果结果不够出色，或未达到最低通过/验收标准，就拒绝该方案并重新开始。这比让你的业务暴露在更大的（未知）风险中要好。


    # 构建执行能力


    部署 AI 解决方案需要广泛的技能和对业务多个方面的深入了解，才能取得成功的成果。如果内部团队不具备合适的能力，这将成为障碍。不过，如果你能及早发现这一差距，就可以着手弥补。


    一般来说，最理想的情况是将人才和能力作为核心业务团队的一部分内部拥有。然而，情况往往并非如此，如果是这样，寻求外部支持就是下一步该做的事。此时，你在寻求外部帮助时应明确表达你的期望。找到合适的支持至关重要。


    有一点你需要特别注意。你的 AI 供应商应仅负责在指定约束条件下按时、完美地交付。产品和项目的所有权以及问责制，必须由你的内部领导团队掌握。如果你在这方面妥协，可能会导致不良后果。因此，如果缺乏这种（领导）能力，请在继续推进之前先解决这个问题。


    # 处理安全与合规问题


    AI 解决方案通常是黑箱操作，并以带来意外“惊喜”而闻名。它们可能造成的破坏性影响会让你付出巨大代价。它们不仅可能带来严重的负面运营影响，还可能造成相当大的声誉压力。根据你的品牌和公司规模，风险水平可能高或低。


    请注意，网络安全与 AI 安全略有不同，在规划 AI 解决方案部署时必须认识到这一点。从一开始就拥有合适的专业知识，将确保你的实施没有任何漏洞，并能抵御各种可能的威胁。


    为 AI 解决方案配备审计功能至关重要。这不仅从运营角度来看是必要的，而且在整个部署过程中也是必需的。这意味着，在任何时间点——无论是部署解决方案时还是实施之后——你都应该能够看到发生了什么（无论好坏）、如何发生以及为何发生。拥有一个完全合规、可审计且可追溯的系统，意味着在出现负面后果时，你的业务能得到保障。

    '
- fmt: '# Integrating with your other systems


    AI systems do not work and stay in isolation, and even simple interactions can
    lead to big trouble.


    Here is a classic example of two racing algorithms that ended up listing a book
    for upward of $2.1 million on Amazon in 2011. Michael Eisen, a biologist, one
    day found from his students that an unremarkably used book—*The Making of a Fly:
    The Genetics of Animal Design*—was being offered for sale on Amazon by the lowest-priced
    seller for just over $1.7 million, plus $3.99 shipping. The next cheapest copy
    weighed in at $2.1 million. The respective sellers were well established; each
    had thousands of positive reviews. When Eisen visited the page the next day, the
    prices had gone up yet further.^([^(15)](#fn15))


    Eventually, they realized how two sellers were trying to compete with each other
    systematically and therefore landed in this situation.


    In another example, thoughtless automation deployment resulted in increased number
    of customer complaints. When one of the tier 1 telecommunications company deployed
    automated system, the system was automated to close the trouble tickets within
    the specified period. Tier 1 company expected that tier 2 company would reopen
    the trouble ticket if there were an issue faced by the customer and it will continue
    using the same trouble ticket until the resolution. However, the tier 2 company
    also decided to automate their systems (thoughtlessly), where the system would
    close the trouble tickets soon after the tier 1 company closed them. Doing this
    meant—if the issue persisted—customers were required to lodge new trouble ticket,
    and it would be counted as an additional trouble ticket, although it would be
    the same in reality.


    Since both the systems were racing to close the ticket as soon as possible, they
    missed the validation part and caused an increased number of customer complaints.
    This issue hurt their reputation badly and stressed operational metrics beyond
    repair. Both companies had to lose (or waste) money and other resources to deal
    with this condition.


    These were two simplistic examples of what can happen when multiple systems interact
    with each other, and there is rise of collective stupidity out of this.


    When you plan to deploy your AI solution, you must evaluate all the integration
    points and ensure that they are stable. Making sure that you have proper testing
    and validation plan for those integrations can save you from unknown risks and
    losses.


    Several times you may have to make make-shift arrangements in joining two systems
    for interaction and making sure that they work cohesively. These are the weak
    spots that you must monitor during and after the deployment.


    ## AI solution deployment questionnaire


    Here is the questionnaire, which you can use do de-risk your AI solution deployment.
    This questionnaire will help you answer crucial questions and highlight any gaps
    or risks related to AI deployment:


    1.  Do you have a strategic road map for implementing AI systems in your business?
    Does it (strategic road map) have clearly defined critical steps and milestones?


    2.  Did you define your core problem correctly before thinking of AI solution?
    How have you ensured that it is the correct and essential problem?


    3.  How does solving this problem fit in your strategy? What are the benefits
    you stand to achieve by solving this problem?


    4.  Did you validate all the root causes driving the given problem? Did you confirm
    these root causes with reverse inference technique?


    5.  Does your list of root causes follow MECE principle?


    6.  Do you have a business continuity plan ready? Have you clearly defined accountabilities
    and responsibilities relating to BCP? Does every accountable and responsible person
    know about it? Do they know what do you expect from them?


    7.  Do you have the right IT infrastructure in place for implementing AI systems?
    Is your IT hardware and network capable of running sophisticated AI algorithms
    on-premise? How would you proceed if there are issues with IT infrastructure?


    8.  Is the process mature enough, where you are deploying the AI solution? Are
    you anticipating any significant changes to this process?


    9.  Do you have a system in place to generate or gather required data for the
    AI solution? Do you have adequate and proper data storage facility? Do you have
    a data management plan? How would you proceed if there are issues with the data
    availability?


    10.  Would the delay in project timeline impact dataset validity (freshness) for
    the AI training? If yes, what are the impacts? If not, why and how doesn’t it
    impact?


    11.  Have you set up the target success metrics? How do you plan to measure them?
    Has everyone agreed to these metrics and measurement methods?


    12.  Have you set up acceptance criteria for the AI rollout? What is your action
    plan if it is not acceptable? What is the minimum limit for being acceptable?
    What is the upper ceiling to accept the solution? What if the AI solution is merely
    passing the criteria?


    13.  Are you aware of internal capability requirements for AI deployment?


    14.  Do you have an internal capability to see through the AI deployment? How
    do you plan to bridge the gap wherever it exists? Do you have budget to source
    external support?


    15.  Would it be possible to audit the system deployment at each step? If yes,
    how and if not, then why not?


    16.  How are you ensuring legal and policy compliances of the system?


    17.  How are you ensuring the security of the system? Is there a way to modify
    security restrictions if needed? If yes, how to do that?


    18.  Have you accounted for all the interaction points of your AI solution with
    other systems? How many make-shift arrangements are needed to make things work
    seamlessly? How do you plan to mitigate risks at those interaction points?


    19.  Are there controls and alarms in place, if the system interaction digresses
    from the routine? If yes, what are thresholds? Can these thresholds be updated?


    ## Asking the right questions is a must


    If you are set to ask these questions before beginning your AI deployment, there
    is much broader debate each question, and its answer will trigger. How you drive
    it to its logical conclusion is all up to you. If you do that in the right manner,
    it will give you enough confidence to move further.


    However, if you do not get satisfying answers, it will prompt you to go back to
    the drawing board and redo the strategy and planning for good.


    AI solution deployments are more complex than typical IT software deployments
    and, if not treated diligently, can leave a bad taste for the rest of their operational
    life and then some.


    Well begun is half done, and asking the right questions is part of it!


    Footnotes [1](#483319_1_En_5_Chapter.xhtml#Fn1_source) [2](#483319_1_En_5_Chapter.xhtml#Fn2_source)


    # 6. Good AI in the Hands of Bad Users


    Until now, we have discussed generic and specific risks of AI solutions that were
    either applicable at a macro level or were specific to the solution design. In
    this chapter, we will talk about risks arising out of the interaction of the AI
    system with other systems and human users or operators.


    Usually, the AI systems are not stand-alone; they often interact with several
    other systems and humans too. So, at each interaction point, there is either a
    chance of failure or degraded performance.


    If the users or other interacting systems are not good enough, then no matter
    how intelligent your AI system is, it will eventually fail to deliver. The failure
    may not be the only outcome, but in some cases, it may have also resulted in the
    business risk.


    Your AI solution is only as good as its users.'
