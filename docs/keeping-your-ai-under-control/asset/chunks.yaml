  trans: "\n# 掌握技术要素对 AI 来说还不够\n\n无论技术本身或特别是 AI 多么智能，它都无法运用常识和人类视角。\n\n因此，仅仅掌握 AI\
    \ 的技术要素是不够的；你需要用人文因素来平衡它。理解你使用 AI 时所处的世界和周围环境至关重要。\n\n技术团队若想成功，越来越需要展现出认知智能。AI\
    \ 解决方案的开发和部署固然关键，用户方面也同样重要。没有恰当的使用（和用户），AI 的成功将岌岌可危。\n\n一个优秀的 AI 解决方案落在糟糕的用户手中可能带来灾难，而一个普通的\
    \ AI 解决方案在优秀用户手中却能取得巨大成功。技术用户完全有能力成就或毁掉它；你的目标应该是赋能你的技术用户，并从中提取最大的正面价值。\n\n了解 AI\
    \ 用户的人不懂 AI 设计。懂 AI 设计的人不了解 AI 用户。\n\n脚注 1 2\n\n# 7. 风险缓解的系统性方法\n\n风险缓解并非易事；如果没有可量化的衡量标准，它甚至会更加困难。在本章中，我们将讨论一种系统性的风险缓解方法。\n\
    \n有四种风险缓解策略可供使用，即风险规避、风险接受、风险转移以及风险控制或降低。虽然规避和接受是直截了当的行动，我们将在第 10 章讨论*风险转移*。\n\
    \n在本章中，我们将重点讨论采用系统方法论进行风险控制或降低。这种方法还将有助于建立量化指标，进而帮助评估风险缓解活动的进展。\n\n## AI 风险管理的核心原则\n\
    \n与任何风险管理一样，在 AI 风险方面，有三个核心原则可作为基础。这些原则对于有效管理风险至关重要：\n\n***识别风险：*** 必须采用系统方法来确定最严重的风险。这是一个极其重要的原则，因为如果无法识别，就无法进行任何控制或管理。人们存在盲点，这是我们固有的局限性。为了避免这些盲点，需要一个跨部门的优秀团队来参与风险识别过程。本章后面讨论的*事前验尸*分析方法将详细阐述这一原则。\n\
    \n***全面性：*** 正如我之前提到的，AI 系统并非单点解决方案。它们通常涉及多个系统，最终的系统在很大程度上是系统的系统。这意味着，要有效管理风险，仅仅覆盖\
    \ AI 解决方案本身是不够的。你必须在风险识别过程中做到全面。如果不在方法上做到全面，系统其他部分的风险就可能被遗漏，从而抹杀所有努力。\n\n***针对你的具体用例：***\
    \ 负责任地设计和实施 AI 解决方案（即负责任的 AI）并不困难；然而，要做到这一点，一个重要的前提是更好地理解风险，并且要针对你的具体用例。宽泛的风险识别和管理方法不会有帮助。同时，在整个价值链中建立控制体系也相当重要，即对初始分析、系统设计、解决方案开发、实施及其持续使用实施控制。\n\
    \n> *好事只有计划才会发生；坏事则会自行发生。*\n> \n> *——*菲利普·克劳士比^(¹⁸)\n\n## AI 风险的常见促成因素\n\n在目睹了多次\
    \ AI 失败案例，并额外研究了众多 AI 部署完全（或部分）失败的案例后，我发现了一种典型的风险促成因素模式。几乎在每个案例中都存在七个问题。\n\n虽然系统性的风险识别会随之进行，但这些问题几乎总是存在，因此无需进一步分析即可着手解决：\n\
    \n1.  ***有缺陷的假设：*** 从一个错误的假设开始，通常意味着你很可能在解决错误的问题，而继续这样做意味着你最终会不断修补你的解决方案，这将陷入无休止修复的负面循环。\n\
    \n2.  ***未处理的侥幸脱险：*** 很多时候，小问题被忽略、忽视或未处理，随着时间的推移而堆积起来。偶尔偏离目标可能不会造成重大损害，但如果偏离次数太多，你最终可能会远离你原本想要达到的目标。\n\
    \n3.  ***糟糕的数据：*** 这一点无需解释。过去，不正确、不完整或不准确的数据一直是许多系统和流程的长期腐蚀性问题。\n\n4.  ***概念漂移：***\
    \ 性能下降可能由设计不佳的模型引起，也可能由于 AI 解决方案运行环境的自然变化导致。无论哪种情况，概念漂移都需要对机器学习模型进行持续监控和更新。\n\n\
    5.  ***糟糕的设计：*** 有很多案例中，为了达到预测精度，开发了包含尽可能多因素（或特征）的复杂模型。然而，当同样的模型部署到现实场景中时，却无法满足现实期望。解决方案本身可能很准确，但在严格的现场条件或预期标准下却无法工作。\n\
    \n6.  ***人机交互：*** 交互点，无论是人与系统之间，还是系统与系统之间，始终是薄弱环节。故障发生的可能性很高。\n\n7.  ***输入故障：***\
    \ 系统的任何输入通道，无论是通过直接的 AI 解决方案还是其他上游/下游系统，都可能容易发生故障。此外，由于这些输入最终会流经更庞大的 AI 系统，它们会带来显著的风险。\n\
    \n## 事前验尸分析\n\n“项目事前验尸”这一术语首次出现在加里·克莱因于 2007 年 9 月发表在《哈佛商业评论》的文章中。正如加里所写：“事前验尸是事后验尸的假设性对立面。”^(¹⁹)\n\
    \n一般来说，这是一种项目管理策略，项目团队设想项目失败，然后反向推导，确定可能导致失败的原因。然后利用这种推导来预先处理风险。\n\n然而，在风险管理语境下，我将互换使用这个术语（*事前验尸*）来代表一种更复杂、更偏向工程的方法论，即*失效模式与影响分析*，也就是`FMEA`。\n"
- fmt: '### Critical parts of the pre-mortem analysis


    Pre-mortem analysis (or FMEA) is typically done by a cross-functional team of
    subject matter experts (SMEs). A better format to conduct this exercise is in
    the form of a workshop.


    During the workshop, the team thoroughly analyzes the design and process are implemented
    or changed. The primary objective of this activity is to find weaknesses and risks
    associated with every aspect of the product or process or both. Once you identify
    these risks, take actions to control and mitigate them, and verify that everything
    is in control.


    Pre-mortem analysis record has 16 columns to it as explained here:


    1.  **Process step or system function:** This column briefly outlines the function,
    step, or an item you’re analyzing. In a multistep process or a multi-function
    system, there would be several rows, each outlining those steps.


    2.  **Failure mode:** For each step listed in column # 1, you can identify one
    or more failure modes. It is an answer to the question—in what ways can the process
    or solution may fail? Or what can go wrong?


    3.  **Failure effects:** In the case of failure, as identified in column # 2,
    what are its effects? How can the failure affect key process measures, product
    specifications, or customer requirements or customer experience?


    4.  **Severity:** This column lists severity rating of each of the failure listed
    in column # 2. Use the failure effects listed in column # 3 to determine the rating.
    The typical scale of severity is 0 to 10; 0 being the least severe while 10 is
    the most severe consequence(s).


    5.  **Root cause:** For each failure listed in column # 2, root-cause analysis
    is done to find an answer to the question—what will cause this step of function
    to go wrong?


    6.  **Occurrence:** This column is another rating that is based on the frequency
    of failure. How frequently is each of these failures, as listed in column # 2,
    are likely to occur? Occurrence is ranked on a scale of 1 to 10, where 1 is a
    low occurrence and 10 is high or frequent occurrence.


    7.  **Controls:** An answer to the question—what controls are in place currently
    to prevent potential failure as per column # 2? What controls are in place to
    detect the occurrence of a fault, if any?


    8.  **Detection:** Another rating column where ease of detection of each failure
    is assessed. Typical questions to ask are—how easy is it to detect each of the
    potential failures? What is the likelihood that you can discover these potential
    failures promptly, or before they reach the customers? Detection is ranked on
    a scale of 10 to 1 (note reversal of the scale). Here rating of 1 means easily
    and quickly detectable failure, whereas 10 means unlikely and very late detection
    of failure. Detection late often means more problematic situation, and therefore
    the rating for late detection is higher.


    9.  **RPN (Risk Priority Number):** The risk priority is determined by multiplying
    all three ratings from column # 4, 6, and 8. So, `RPN = Severity x Occurrence
    x Detection`. Thus, high `RPN` would indicate a high-risk process step or solution
    function (as in column # 1). Accordingly, steps or functions with higher `RPN`
    warrant immediate attention for fixing.


    10.  **Recommended actions:** In this column, SMEs would recommend one or more
    actions to handle the risks identified. These actions may be directed toward reducing
    the severity or reducing the chances of failure occurrence, or to improving the
    detection level, or maybe all of the above.


    11.  **Action owner, target date, and so on:** This column is essential from project
    management point of view as well as for tracking. Each recommended action can
    be assigned to a specific owner and carried out before target date to contain
    the risks.


    12.  **Actions taken:** This column lists all the actions taken, recommended or
    otherwise, to lower the risk level (`RPN`) to an acceptable level or lower.


    13.  **New severity:** Once the actions listed in column # 12 are complete, the
    same exercise must be repeated to arrive at new level of severity.


    14.  **New occurrence:** Depending upon the completed actions, the occurrence
    must have changed, so this column has new occurrence rating.


    15.  **New detection:** Due to risk mitigation actions, detection must have changed,
    too; register it in this column.


    16.  **New RPN:** Due to change in severity, occurrence, and detection ratings,
    risk level would have changed. New `RPN` is calculated in the same way, `Severity
    x Occurrence x Detection`, and recorded in this column.


    ### More about ratings


    Several risk analysis methodologies often recommend only two rating evaluations,
    that is, severity and occurrence. However, in the case of pre-mortem analysis,
    we are using third rating—detection.


    Early detection of the problem can often enable you to contain the risks before
    becoming significant and out of control. This way, you can either fix the system
    immediately or may invoke system-wide control measures to remain more alert. Either
    way, being able to detect failures quickly and efficiently is an advantage in
    complex systems like AI.


    In the case of severity and occurrence ratings, the scale of 1 to 10 does not
    change based on the type of solution or industry as these are generally defined
    scales.


    In implementing pre-mortem analysis, you must take a pragmatic approach and choose
    the scale as appropriate. Just make sure that you are consistent in your definitions
    throughout the pre-mortem exercise.


    While conducting a pre-mortem workshop, participants must set and agree on rankings
    criteria up front and then for the severity, occurrence, and detection level for
    each of the failure modes.'
