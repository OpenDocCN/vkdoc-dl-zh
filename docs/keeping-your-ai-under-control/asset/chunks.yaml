    # Part II Prevention


    ## Avoiding AI risks proactively


    # 4. Evaluating Risks of the AI Solution


    Artificial intelligence, being such a powerful technology, inherently carries
    a high risk. It is a source of significant new threats that we must manage. This
    risk is not concentrated in one specific section of AI; instead, it is spread
    over all the stages and components of AI system. It includes AI solution design
    methodology, the AI solution itself, its development and deployment, and then
    ongoing use. Additionally, training of AI system and feedback loop also carry
    a significant risk.


    Preventing each of risk means we will have to evaluate each component in its own
    right and seek avenues of prevention. Even before we discuss prevention, identification
    will be necessary. Figure [4-1](#483319_1_En_4_Chapter.xhtml#Fig1) shows the six
    broad stages of AI solutions’ life cycle.


    To begin with, in this chapter, we will discuss risks related to AI solution.
    We will evaluate it from two angles—first to check if it is the *right solution*
    and second to verify if the solution is *designed right*.


    If one of them is missing, that is, right solution but wrongly designed or rightly
    designed solution but fundamentally wrong—each will pose higher risks.


    ![../images/483319_1_En_4_Chapter/483319_1_En_4_Fig1_HTML.png](images/483319_1_En_4_Chapter/483319_1_En_4_Fig1_HTML.png)


    Figure 4-1. The six broad stages of AI solutions’ life cycle'
