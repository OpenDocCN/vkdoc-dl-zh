    \n我们还将点 2（即最接近测试记录但大于它的点）的微批次数据集加载到内存中，并加载对应的已保存网络文件。在遍历配对数据集时，我们检索该微批次的输入值、激活值和预测值，并对其进行反归一化。\n\
    \n接着，我们计算点 1 和点 2 的平均预测函数值。最后，我们计算误差百分比，并将结果作为处理日志打印输出。其余部分则是一些杂项内容。清单 8-9 展示了测试方法的程序代码。\n\
