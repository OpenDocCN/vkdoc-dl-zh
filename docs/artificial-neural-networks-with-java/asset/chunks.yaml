    \ York Plaza, New York, NY 10004, U.S.A.\n\n*献给 Asa 和 Sidney*\n\n# 引言\n\n人工智能是计算机科学中一个快速发展的领域。自计算机发明以来，我们观察到了一些引人入胜的现象。对人类而言困难的任务（如繁重的计算、搜索、记忆大量数据等）对计算机来说轻而易举，而人类天生擅长且能快速完成的任务（如识别部分遮挡的物体、智能、推理、创造力、发明、理解语音、科学研究等）对计算机来说却十分困难。似乎我们每个人脑海中都有一台超级计算机。\n\
    \n人工智能作为一门学科诞生于 20 世纪 50 年代。然而，当时已知的神经网络架构使用具有线性激活函数的感知器，因此无法解决非线性问题。这一原因加上计算能力的不足，使得人工智能的早期起步并不成功。人工智能在\
    \ 1974–1980 年间复兴，但最终再次失败。\n\n在第二次失败后，新的非线性网络架构被开发出来，加之机器计算能力的巨大提升，最终促成了人工智能在 20\
    \ 世纪 90 年代取得非凡成功。逐渐地，人工智能能够解决许多工业级问题，如图像识别、语音识别、自然语言处理、模式识别、预测、分类、自动驾驶汽车、机器人自动化等。\n\
    \n人工智能近年来的巨大成功引发了各种无根据的猜测。你可能会读到一些关于不久的将来机器人将匹配并超越人类智能的讨论。我们需要记住，当前的人工智能是一套巧妙的数学和处理方法，让计算机能够从处理的数据中学习，并运用这些知识解决许多重要任务。许多属于人类的东西，如智能、情感、创造力、感觉、推理等，仍然超出了人工智能的认知范围。\n\
    \n然而，情况正在迅速变化。近年来，计算机在国际象棋方面变得如此出色，以至于它们可靠地击败了人类对手。这并不奇怪，因为它们的创造者*教会*了程序几个世纪以来人类积累的国际象棋经验。如今，世界计算机国际象棋锦标赛已经设立，机器之间相互竞争。一个名为`Stockfish\
    \ 8`的最佳国际象棋程序在 2016 年赢得了世界计算机国际象棋锦标赛。\n\n几年前，谷歌开发了一个名为`AlphaZero`的国际象棋程序，它在 2017\
    \ 年世界计算机国际象棋锦标赛中击败了`Stockfish 8`程序。令人惊叹的是，没有人像之前开发其他国际象棋程序那样教`AlphaZero`国际象棋策略。相反，它利用最新的机器学习原理，通过与自己博弈来自学国际象棋。该程序花了四个小时学习国际象棋策略（同时与自己博弈）就击败了`Stockfish\
    \ 8`。自我学习是人工智能新的里程碑式成就。\n\n人工智能有许多分支。本书致力于其中之一：神经网络。神经网络使计算机能够从观测数据中学习，并基于这些知识进行预测。本书是关于神经网络的训练，以及利用训练进行函数逼近、预测和图像分类。\n\
    \n# 致谢\n\n我要感谢 Apress 执行编辑 Celestin Suresh John 帮助我将这个项目变为现实。非常感谢 Apress 副编辑 Aditee\
    \ Mirashi，以及技术审阅者 Sourav Bhattacharjee 和 Aakash Kag。他们都为本书的技术准确性和风格做出了巨大贡献。\n\n\
    # 关于作者  \n# 关于技术审阅者\n\n# 第一部分：神经网络入门\n\n# 1. 了解神经网络\n\n人脑由数十亿个相互连接的神经元组成，这些神经元构成了一个神经网络。每个神经元处理一个小任务，然后激活下一个神经元，使处理得以继续。神经网络的主要特性是它们能够从周围环境中学习。这就是人类运作的方式。\n\
    \n学习过程通过增强或减弱突触连接分布在整个神经元网络中，使得更相关的信息获得更强的突触连接，而不太相关的信息则变弱。人工神经网络就是为了模仿这一过程而构建的，正如你将在本书后面学到的，这是通过调整神经元之间连接的权重来实现的。\n\
    \n人工智能神经网络架构在结构上模仿了大脑网络。它由方向性连接的神经元层组成。图 1-1 显示了人类神经元的示意图。\n\n![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig1_HTML.jpg](img/477043_2_En_1_Fig1_HTML.jpg)\n\
    \n**图 1-1**  \n人类神经元的示意图\n\n## 生物神经元与人工神经元\n\n生物神经元（在简化层面上）由带有细胞核的细胞体、轴突和突触组成。突触接收冲动，由细胞体处理。细胞体通过轴突向与其他神经元相连的突触发送响应。模仿生物神经元，人工神经元由一个神经元体和与其他神经元的连接组成（见图\
    \ 1-2）。\n\n![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig2_HTML.jpg](img/477043_2_En_1_Fig2_HTML.jpg)\n\
    \n**图 1-2**  \n单个人工神经元\n\n每个输入到神经元的信号都被分配一个权重`W`。分配给神经元的权重表示该输入在计算网络输出时的影响程度。如果分配给神经元`W[1]`的权重大于分配给神经元`W[2]`的权重，那么输入\
    \ 1 对网络输出的影响比输入 2 更显著。我们稍后将展示这是如何工作的。\n\n神经元的主体被描绘成一个被竖线分成两部分的圆圈。左侧部分称为“神经元的网络输入”，是神经元主体进行计算的部分。这一部分在网络图中通常标记为`Z`。例如，图\
    \ 1-2 所示神经元的`Z`值计算为每个输入乘以相应权重（`W`）的总和。这是方程 1-1 的线性部分。\n\n```\nZ = W[1]*I[1] +\
    \ W[2]*I[2] + W[3]*I[3]      (1-1)\n```\n"
- fmt: '# Activation Functions


    To calculate the output, `O`, from the same neuron (Figure [1-2](#477043_2_En_1_Chapter.xhtml#Fig2)),
    we apply some special nonlinear function (called the *activation function*, Ϭ)
    to the linear part of calculation `Z` (equation [1-2](#477043_2_En_1_Chapter.xhtml#Par10)).


    `O = Ϭ(Z)` (1-2)


    There are many activation functions that are used for the neural network. Their
    usage depends on the interval where they are well-behaved (not saturated), on
    how fast the function changes when its argument changes, and simply on preference.
    Let’s look at one of the most frequently used activation functions, called *sigmoid*.
    The function has the formula shown in equation [1-3](#477043_2_En_1_Chapter.xhtml#Par12).


    `Ϭ(Z) =` ![$$ \frac{1}{1+{e}^{-z}} $$](images/477043_2_En_1_Chapter/477043_2_En_1_Chapter_TeX_IEq1.png)
    (1-3)


    Figure [1-3](#477043_2_En_1_Chapter.xhtml#Fig3) shows the graph of the sigmoid
    activation function.


    ![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig3_HTML.jpg](images/477043_2_En_1_Chapter/477043_2_En_1_Fig3_HTML.jpg)


    **Figure 1-3** Graph of the sigmoid function


    As shown in Figure [1-3](#477043_2_En_1_Chapter.xhtml#Fig3), the sigmoid function
    (sometimes also called the *logistic* function) best behaves on the interval `[-1,
    1]`. Outside of this interval, it quickly saturates, meaning that its value does
    not change when its argument changes. That is why (as you will learn later) the
    network’s input data is typically normalized on the interval in `[-1, 1]`.


    Some activation functions are well-behaved on the interval `[0, 1]`, so the input
    data for such activation functions is correspondingly normalized on the interval
    `[0, 1]`. Figure [1-4](#477043_2_En_1_Chapter.xhtml#Fig4) shows the list of the
    most frequently used activation functions. It includes the function name, the
    plot, the equation, and the function’s derivative. Figure [1-4](#477043_2_En_1_Chapter.xhtml#Fig4)
    will be useful when calculating various parts within the network.


    ![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig4_HTML.jpg](images/477043_2_En_1_Chapter/477043_2_En_1_Fig4_HTML.jpg)


    **Figure 1-4** Activation functions


    Our preferred activation function is `tanh`. It is also well-behaved (like the
    sigmoid activation function) on the interval `[-1, 1]`, but its rate of change
    on this interval is faster than that of the sigmoid function. It also saturates
    slower. We use `tanh` in almost all the examples of this book.


    ## Summary


    This chapter introduced you to artificial intelligence neural networks. It explained
    all the important concepts of a neural network such as layers, neurons, connections,
    weights, and activation functions. The chapter also explained the conventions
    used for drawing a neural network diagram. The following chapter shows all the
    details of neuron network processing by manually calculating all the network results.
    For simplicity, two terms, *neural network* and *network*, will be used interchangeably
    for the rest of this book.


    # 2. Internal Mechanics of Neural Network Processing


    This chapter discusses the inner workings of neural network processing. It shows
    how a network is built, trained, and tested.


    ## Function to Be Approximated


    Let’s consider the function `y(x) = x²` shown in Figure [2-1](#477043_2_En_2_Chapter.xhtml#Fig1).
    However, let’s pretend that the function formula is not known and that the function
    values are given to us by their values at four points.


    ![../images/477043_2_En_2_Chapter/477043_2_En_2_Fig1_HTML.jpg](images/477043_2_En_2_Chapter/477043_2_En_2_Fig1_HTML.jpg)


    **Figure 2-1** Graph of the function


    Table [2-1](#477043_2_En_2_Chapter.xhtml#Tab1) shows the function values at the
    four points.


    **Table 2-1** Function Values Given at Four Points


    | x | f(x) |

    | --- | --- |

    | 1 | 1 |

    | 3 | 9 |

    | 5 | 25 |

    | 7 | 49 |


    We want to build a formula (or procedure) that can be used for predicting the
    values of this unknown function at some arguments (`x`) that were not given to
    us (in statistical analysis such processing is called *regression*). To be able
    to get the value of the function at points that are not given, we need to approximate
    this function. When the approximation is done, we can then find the values of
    the function at any points of interest. That’s what the neural network is used
    for, because the network is the universal approximation mechanism.


    ## Network Architecture


    How a network is built? A network is built by including layers of neurons (see
    Figure [2-2](#477043_2_En_2_Chapter.xhtml#Fig2)). The first layer on the left
    is the input layer, and it contains the neurons that receive input from the outside.
    The last layer on the right is the output layer, and it contains the neurons that
    carry the output of the network. One or more hidden layers are located between
    the input and output layers. Hidden-layer neurons are used to perform most calculations
    during the approximation of the function. Figure [2-2](#477043_2_En_2_Chapter.xhtml#Fig2)
    shows the network diagram.


    ![../images/477043_2_En_2_Chapter/477043_2_En_2_Fig2_HTML.jpg](images/477043_2_En_2_Chapter/477043_2_En_2_Fig2_HTML.jpg)


    **Figure 2-2** Neural network architecture


    Connections are drawn from the neurons in the previous layer to the neurons in
    the next layer. Each neuron in the previous layer is connected to all neurons
    of the next layer. Such a network is called a *fully connected network*. Each
    connection carries a weight. Each weight is numbered by two indexes. The first
    index is the receiving neuron number, and the second index is the sending neuron
    number. For example, the connection between the second neuron in the hidden layer
    (`H[2]`), and the only neuron in the input layer (`I[1]`) is assigned the weight
    `W¹[21]`. The superscript 1 indicates the layer number of the sending neuron.
    Each network layer is assigned a bias. The bias is similar to the weight assigned
    to a neuron, but applied to the entire layer.


    When the network processing starts, the initial values for weights and biases
    are usually randomly set. Typically, to determine the number of neurons in a hidden
    layer, you double the number of neurons in the input layer and add the number
    of neurons in the output layer. In our case, it is `(1*2+1 = 3)`, meaning three
    neurons. Determining the number of hidden layers to be used in the network depends
    on the complexity of the function to be approximated. Typically, one hidden layer
    is sufficient for a smooth continuous function, and more hidden layers are needed
    for more complex function topology. In practice, the number of layers and neurons
    in the hidden layers that leads to the best approximation results is typically
    determined experimentally.


    The network processing consists of two passes: forward pass and backward pass.


    In the forward pass, calculation moves from left to right. For each neuron, the
    network gets the input to the neuron and calculates the output from the neuron.'
  raw: '## Activation Functions


