  trans: '

    # 前向传播计算


    以下是前向传播计算：


    神经元 `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1`


    `H[1] = Ϭ(Z¹[1])`


    神经元 `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1`


    `H[2] = Ϭ(Z¹[2])`


    神经元 `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1`


    `H[3] = Ϭ(Z¹[3])`


    上述计算给出了神经元 `H[1]`、`H[2]` 和 `H[3]` 的输出。这些值在处理下一层（本例中为输出层）的神经元时被用作输入。


    神经元 `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1`


    `O[1] = Ϭ(Z²[1])`


    第一次传播中的计算给出了网络的输出（称为*网络预测值*）。当我们训练网络时，我们使用训练数据点的已知输出，称为*实际值*或*目标值*。通过了解网络对于给定输入应产生的输出值，我们可以计算网络误差，即目标值与网络计算值（预测值）之间的差值。对于本例中我们要逼近的函数，实际（目标）值如表
    2-2 的第二列所示。


    **表 2-2** 示例的输入数据集


    | x | f(x) |

    | --- | --- |

    | 1 | **1** |

    | 3 | **9** |

    | 5 | **25** |

    | 7 | **49** |


    对输入数据集中的每条记录都进行计算。例如，处理输入数据集的第一条记录时使用以下公式。


    ## 输入记录 1


    以下是输入记录 1：


    神经元 `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1.00 = W¹[11]*1.00 + B[1]*1.00`


    `H[1] = Ϭ(Z¹[1])`


    神经元 `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1.00 = W¹[21]*1.00 + B[1]*1.00`


    `H[2] = Ϭ(Z¹[2])`


    神经元 `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*1.00 + B[1]*1.00`


    `H[3] = Ϭ(Z¹[3])`


    神经元 `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`


    `O[1] = Ϭ(Z²[1])`


    记录 1 的误差如下：


    `E[1] = Ϭ(Z²[1]) – 记录 1 的目标值 = Ϭ(Z²[1]) – 1.00`


    ## 输入记录 2


    以下是输入记录 2：


    神经元 `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1.00 = W¹[11]*3.00 + B[1]*1.00`


    `H[1] = Ϭ(Z¹[1])`


    神经元 `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1.00 = W¹[21]*3.00 + B[1]*1.00`


    `H[2] = Ϭ(Z¹[2])`


    神经元 `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*3.00 + B[1]*1.00`


    `H[3] = Ϭ(Z¹[3])`


    神经元 `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`


    `O[1] = Ϭ(Z²[1])`


    记录 2 的误差如下：


    `E[1] = Ϭ(Z²[1]) – 记录 2 的目标值 = Ϭ(Z²[1]) – 9.00`


    ## 输入记录 3


    以下是输入记录 3：


    神经元 `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1.00 = W¹[11]*5.00 + B[1]*1.00`


    `H[1] = Ϭ(Z¹[1])`


    神经元 `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1.00 = W¹[21]*5.00 + B[1]*1.00`


    `H[2] = Ϭ(Z¹[2])`


    神经元 `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*5.00 + B[1]*1.00`


    `H[3] = Ϭ(Z¹[3])`


    神经元 `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`


    `O[1] = Ϭ(Z²[1])`


    记录 3 的误差如下：


    `E[1] = Ϭ(Z²[1]) – 记录 3 的目标值 = Ϭ(Z²[1]) – 25.00`


    ## 输入记录 4


    以下是输入记录 4：


    神经元 `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1.00 = W¹[11]*7.00 + B[1]*1.00`


    `H[1] = Ϭ(Z¹[1])`


    神经元 `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1.00 = W¹[21]*7.00 + B[1]*1.00`


    `H[2] = Ϭ(Z¹[2])`


    神经元 `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*7.00 + B[1]*1.00`


    `H[3] = Ϭ(Z¹[3])`


    神经元 `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`


    `O[1] = Ϭ(Z²[1])`


    输入记录 4 的误差如下：


    `E[1] = Ϭ(Z²[1]) – 记录 4 的目标值 = Ϭ(Z²[1]) – 49.00`


    当所有记录都处理完毕后，处理过程中的这个点被称为一个*周期*。此时，我们取所有记录的网络误差的平均值，即 `E = (E1 + E2 + E3 + E4)/4`，这就是当前周期的误差。显然，第一个周期（使用随机初始化的权重/偏置）的误差对于良好的函数逼近来说会太大；因此，我们需要将这个误差减小到可接受的（期望的）值，称为*误差限*，我们在处理开始时设定它。减小网络误差是在反向传播（也称为*反向传播*）中完成的。


    ## 反向传播


    如何减小网络误差？显然，初始的权重和偏置值是随机设置的，它们并不理想，这导致了周期误差显著。


    我们需要调整它们，使得新的值能够导致更小的网络计算误差。反向传播通过将误差重新分配到输出层和隐藏层的所有网络神经元之间，并调整它们的初始权重值来实现这一点。同时也会对层偏置进行调整。


    为了调整每个神经元的权重，我们计算误差函数相对于该神经元输出的偏导数。例如，对于神经元 `O[1]`，计算出的偏导数是 `∂E/∂O₁`。由于偏导数指向函数值增加的方向（但我们需要减小误差函数的值），因此权重调整应在相反方向进行。


    *调整后的权重值* = *原始权重值* – η * `∂E/∂O₁`


    这里，η 是网络的学习率，它控制网络学习的速度。其值通常设置在 0.1 到 1.0 之间。


    对每一层的偏置也进行类似的计算。对于偏置 `B[1]`，计算出的偏导数是 `∂E/∂B₁`；然后按如下方式计算调整后的偏置：


    *调整后的偏置值* `B[1]` = *原始偏置值* `B[1]` – η * `∂E/∂B₁`


    通过对每个网络神经元和每层偏置重复此计算，我们得到一组新的调整后的权重/偏置值。有了新的权重/偏置值集，我们返回到前向传播，并使用调整后的权重/偏置计算新的网络输出。同时，我们重新计算网络输出误差。


    由于权重/偏置的调整是在与梯度（偏导数）相反的方向上进行的，因此新计算出的网络误差应该会减小。我们循环重复前向和反向传播，直到误差小于我们的误差限。此时，网络被认为已训练完成，我们将训练好的网络保存到磁盘上。训练好的网络包含所有权重和偏置参数，这些参数能够以所需的精度逼近预测的函数值。在下一章中，我们将手动处理一些示例，并展示所有详细的计算过程。不过，在此之前，我们需要复习一下函数导数和梯度的知识。

    '
- fmt: "# Function Derivative and Function Divergent\n\nA derivative of a function\
    \ is defined as follows:\n\n![$$ \\frac{\\partial f}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq5.png)\
    \ = ![$$ \\frac{f\\left(x+ dx\\right)-f(x)}{dx} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq6.png)\n\
    \nwhere `∂x` is a small change in a function argument.\n\n- `f(x)`: The value\
    \ of a function before changing the argument\n- `f(x + ∂x)`: The value of a function\
    \ after changing the argument\n\nThe function derivative shows the rate of change\
    \ of a single-variable function `f(x)` at point `x`. The gradient is the derivative\
    \ (rate of change) of a multivariable function `f(x, y, z)` at the point `(x,\
    \ y, z)`. The gradient of a multivariable function `f(x, y, z)` is a product of\
    \ components calculated for each direction (![$$ \\frac{\\partial f}{\\partial\
    \ x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq7.png), ![$$\
    \ \\frac{\\partial f}{\\partial y} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq8.png),\
    \ ![$$ \\frac{\\partial f}{\\partial z}\\ \\Big) $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq9.png).\
    \ Each component is called the *partial derivative* of function `f(x, y, z)` with\
    \ respect to the specific variable (direction) `x`, `y`, `z`.\n\nThe gradient\
    \ at any function point always points to the direction of greatest increase of\
    \ a function. At a local maximum or local minimum, the gradient is zero, because\
    \ there is no single direction of increase at such locations. When we are searching\
    \ for a function minimum (for example, for an error function), which we want to\
    \ minimize, we move in the direction opposite to the gradient.\n\nThere are several\
    \ rules for calculating derivatives.\n\n- The power rule: ![$$ \\frac{\\partial\
    \ }{\\partial x}\\Big( $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq10.png)`u^a`)\
    \ = `a * u^(a-1)` * ![$$ \\frac{\\partial u}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq11.png)\n\
    \n- The product rule: ![$$ \\frac{\\partial \\left(u\\ast v\\right)}{\\partial\
    \ x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq12.png) = `u`\
    \ * ![$$ \\frac{\\partial v}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq13.png)\
    \ + `v` * ![$$ \\frac{\\partial u}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq14.png)\n\
    \n- The quotient rule: ![$$ \\frac{\\partial f}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq15.png)\
    \ (![$$ \\frac{u}{v} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq16.png))\
    \ = ![$$ \\frac{v\\ast \\frac{\\partial u}{\\partial x}-u\\ast \\frac{\\partial\
    \ v}{\\partial x\\ }}{v^2} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq17.png)\n\
    \n- The chain rule: This rule tells us how to differentiate a composite function.\n\
    \n    It states that ![$$ \\frac{\\kern0.5em \\partial y}{\\partial x}=\\frac{\\\
    kern0.5em \\partial y}{\\partial u}\\ast \\frac{\\kern0.5em \\partial u}{\\partial\
    \ x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq18.png), where\
    \ `u = f(x)`.\n\n    Here’s an example: `y = u⁸` and `u = x² + 5`.\n\n    According\
    \ to the chain rule,\n\n    ![$$ \\frac{\\kern0.5em \\partial y}{\\partial x}=\\\
    frac{\\kern0.5em \\partial y}{\\partial u}\\ast \\frac{\\kern0.5em \\partial u}{\\\
    partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq19.png)\
    \ = `8u⁷ * 2x` = `16x * (x² + 5)⁷`\n\n## Most Commonly Used Function Derivatives\n\
    \nFigure [2-3](#477043_2_En_2_Chapter.xhtml#Fig3) shows the most commonly used\
    \ function derivatives.\n\n![../images/477043_2_En_2_Chapter/477043_2_En_2_Fig3_HTML.jpg](images/477043_2_En_2_Chapter/477043_2_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3\n\nCommonly used derivatives\n\nIt is also helpful to know the derivative\
    \ of the sigmoid activation function.\n\n`Ϭ(Z) = 1 / (1 + exp(-Z))`\n\n![../images/477043_2_En_2_Chapter/477043_2_En_2_Figa_HTML.png](images/477043_2_En_2_Chapter/477043_2_En_2_Figa_HTML.png)\n\
    \nThe derivative of the sigmoid activation function gives us the rate of change\
    \ of the activation function at any neuron.\n\n## Summary\n\nThis chapter explored\
    \ the inner machinery of neural network processing by explaining how all the processing\
    \ results are calculated. It introduced you to derivatives and gradients and described\
    \ how these concepts are used in finding one of the error function minimums. The\
    \ next chapter shows a simple example where the results are manually calculated.\
    \ Simply describing the rules of calculation is not enough for understanding the\
    \ subject, because applying the rules to a particular network architecture is\
    \ really tricky.\n\n# 3. Manual Neural Network Processing\n\nIn this chapter,\
    \ we show the internals of neural network processing by using a simple example.\
    \ We provide a detailed step-by-step explanation of the calculations involved\
    \ in processing the forward and backward propagation passes.\n\n> **Note**  \n\
    > It is important to mention that all the calculations in this chapter are based\
    \ on the information explained in Chapter [2](#477043_2_En_2_Chapter.xhtml). If\
    \ you have any issues reading this chapter, consult Chapter [2](#477043_2_En_2_Chapter.xhtml)\
    \ for an explanation.\n\n## Example: Manual Approximation of a Function at a Single\
    \ Point\n\nFigure [3-1](#477043_2_En_3_Chapter.xhtml#Fig1) shows the vector shown\
    \ in the 3D space.\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig1_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nVector in 3D space\n\nIt represents the value of the function\
    \ `y = f(x1, x2)`, where `x1 = 0.01` and `x2 = 0.02`.\n\n`y(0.01, 0.02) = 0.80`"
  raw: "## Function Derivative and Function Divergent\n\nA derivative of a function\
    \ is defined as follows:\n\n![$$ \\frac{\\partial f}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq5.png)\
    \ = ![$$ \\frac{f\\left(x+ dx\\right)-f(x)}{dx} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq6.png)\n\
    \nwhere ∂x is a small change in a function argument.\n\n*   f(x): The value of\
    \ a function before changing the argument\n\n*   f(x + ∂x): The value of a function\
    \ after changing the argument\n\nThe function derivative shows the rate of change\
    \ of a single-variable function f(x) at point x. The gradient is the derivative\
    \ (rate of change) of a multivariable function f(x, y, z) at the point (x, y,\
    \ z). The gradient of a multivariable function f(x, y, z) is a product of components\
    \ calculated for each direction (![$$ \\frac{\\partial f}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq7.png),\
    \ ![$$ \\frac{\\partial f}{\\partial y} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq8.png),\
    \ ![$$ \\frac{\\partial f}{\\partial z}\\ \\Big) $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq9.png).\
    \ Each component is called the *partial derivative* of function f(x, y, z) with\
    \ respect to the specific variable (direction) x, y, z.\n\nThe gradient at any\
    \ function point always points to the direction of greatest increase of a function.\
    \ At a local maximum or local minimum, the gradient is zero, because there is\
    \ no single direction of increase at such locations. When we are searching for\
    \ a function minimum (for example, for an error function), which we want to minimize,\
    \ we move in the direction opposite to the gradient.\n\nThere are several rules\
    \ for calculating derivatives.\n\n*   The power rule: ![$$ \\frac{\\partial }{\\\
    partial x}\\Big( $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq10.png)u^a)\
    \ = a*u^(a-1) * ![$$ \\frac{\\partial u}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq11.png)\n\
    \n*   The product rule: ![$$ \\frac{\\partial \\left(u\\ast v\\right)}{\\partial\
    \ x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq12.png) = u*![$$\
    \ \\frac{\\partial v}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq13.png)\
    \ + v*![$$ \\frac{\\partial u}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq14.png)\n\
    \n*   The quotient rule: ![$$ \\frac{\\partial f}{\\partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq15.png)\
    \ (![$$ \\frac{u}{v} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq16.png))\
    \ = ![$$ \\frac{v\\ast \\frac{\\partial u}{\\partial x}-u\\ast \\frac{\\partial\
    \ v}{\\partial x\\ }}{v^2} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq17.png)\n\
    \n*   The chain rule: This rule tells us how to differentiate a composite function.\n\
    \n    It states that ![$$ \\frac{\\kern0.5em \\partial y}{\\partial x}=\\frac{\\\
    kern0.5em \\partial y}{\\partial u}\\ast \\frac{\\kern0.5em \\partial u}{\\partial\
    \ x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq18.png) , where\
    \ u = f(x).\n\n    Here’s an example: y = u⁸ and u = x² + 5.\n\n    According\
    \ to the chain rule,\n\n    ![$$ \\frac{\\kern0.5em \\partial y}{\\partial x}=\\\
    frac{\\kern0.5em \\partial y}{\\partial u}\\ast \\frac{\\kern0.5em \\partial u}{\\\
    partial x} $$](images/477043_2_En_2_Chapter/477043_2_En_2_Chapter_TeX_IEq19.png)\
    \ = 8u⁷ * 2x = 16x*(x2 + 5)⁷\n\n## Most Commonly Used Function Derivatives\n\n\
    Figure [2-3](#477043_2_En_2_Chapter.xhtml#Fig3) shows the most commonly used function\
    \ derivatives.\n\n![../images/477043_2_En_2_Chapter/477043_2_En_2_Fig3_HTML.jpg](images/477043_2_En_2_Chapter/477043_2_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3\n\nCommonly used derivatives\n\nIt is also helpful to know the derivative\
    \ of the sigmoid activation function.\n\nϬ(Z) = 1/(1+exp(-Z))\n\n![../images/477043_2_En_2_Chapter/477043_2_En_2_Figa_HTML.png](images/477043_2_En_2_Chapter/477043_2_En_2_Figa_HTML.png)\n\
    \nThe derivative of the sigmoid activation function gives us the rate of change\
    \ of the activation function at any neuron.\n\n## Summary\n\nThis chapter explored\
    \ the inner machinery of neural network processing by explaining how all the processing\
    \ results are calculated. It introduced you to derivatives and gradients and described\
    \ how these concepts are used in finding one of the error function minimums. The\
    \ next chapter shows a simple example where the results are manually calculated.\
    \ Simply describing the rules of calculation is not enough for understanding the\
    \ subject, because applying the rules to a particular network architecture is\
    \ really tricky.\n\n# 3. Manual Neural Network Processing\n\nIn this chapter,\
    \ we show the internals of neural network processing by using a simple example.\
    \ We provide a detailed step-by-step explanation of the calculations involved\
    \ in processing the forward and backward propagation passes.\n\nNote\n\nIt is\
    \ important to mention that all the calculations in this chapter are based on\
    \ the information explained in Chapter [2](#477043_2_En_2_Chapter.xhtml). If you\
    \ have any issues reading this chapter, consult Chapter [2](#477043_2_En_2_Chapter.xhtml)\
    \ for an explanation.\n\n## Example: Manual Approximation of a Function at a Single\
    \ Point\n\nFigure [3-1](#477043_2_En_3_Chapter.xhtml#Fig1) shows the vector shown\
    \ in the 3D space.\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig1_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1\n\nVector in 3D space\n\nIt represents the value of the function\
    \ y = f(x1, x2), where x1 = 0.01 and x2 = 0.02.\n\ny(0.01, 0.02) = 0.80"
  trans: "\n# 函数导数与函数散度\n\n函数的导数定义如下：\n\n![$$ \\frac{\\partial f}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq5.png)\
    \ = ![$$ \\frac{f\\left(x+ dx\\right)-f(x)}{dx} $$](img/477043_2_En_2_Chapter_TeX_IEq6.png)\n\
    \n其中 `∂x` 是函数自变量的一个微小变化量。\n\n- `f(x)`: 自变量改变前的函数值\n- `f(x + ∂x)`: 自变量改变后的函数值\n\
    \n函数导数表示单变量函数 `f(x)` 在点 `x` 处的变化率。梯度是多变量函数 `f(x, y, z)` 在点 `(x, y, z)` 处的导数（变化率）。多变量函数\
    \ `f(x, y, z)` 的梯度是由每个方向上的分量（![$$ \\frac{\\partial f}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq7.png),\
    \ ![$$ \\frac{\\partial f}{\\partial y} $$](img/477043_2_En_2_Chapter_TeX_IEq8.png),\
    \ ![$$ \\frac{\\partial f}{\\partial z}\\ \\Big) $$](img/477043_2_En_2_Chapter_TeX_IEq9.png)\
    \ 相乘得到的。每个分量被称为函数 `f(x, y, z)` 关于特定变量（方向）`x`、`y`、`z` 的*偏导数*。\n\n函数任意点处的梯度总是指向该函数增长最快的方向。在局部最大值或局部最小值处，梯度为零，因为在这些位置没有单一的增长方向。当我们寻找函数的最小值（例如，误差函数的最小值）时，我们沿着与梯度相反的方向移动。\n\
    \n计算导数有若干规则。\n\n- 幂法则：![$$ \\frac{\\partial }{\\partial x}\\Big( $$](img/477043_2_En_2_Chapter_TeX_IEq10.png)`u^a`)\
    \ = `a * u^(a-1)` * ![$$ \\frac{\\partial u}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq11.png)\n\
    \n- 乘积法则：![$$ \\frac{\\partial \\left(u\\ast v\\right)}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq12.png)\
    \ = `u` * ![$$ \\frac{\\partial v}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq13.png)\
    \ + `v` * ![$$ \\frac{\\partial u}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq14.png)\n\
    \n- 商法则：![$$ \\frac{\\partial f}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq15.png)\
    \ (![$$ \\frac{u}{v} $$](img/477043_2_En_2_Chapter_TeX_IEq16.png)) = ![$$ \\frac{v\\\
    ast \\frac{\\partial u}{\\partial x}-u\\ast \\frac{\\partial v}{\\partial x\\\
    \ }}{v²} $$](img/477043_2_En_2_Chapter_TeX_IEq17.png)\n\n- 链式法则：该法则告诉我们如何对复合函数求导。\n\
    \n    它指出 ![$$ \\frac{\\kern0.5em \\partial y}{\\partial x}=\\frac{\\kern0.5em\
    \ \\partial y}{\\partial u}\\ast \\frac{\\kern0.5em \\partial u}{\\partial x}\
    \ $$](img/477043_2_En_2_Chapter_TeX_IEq18.png)，其中 `u = f(x)`。\n\n    示例如下：`y =\
    \ u⁸` 且 `u = x² + 5`。\n\n    根据链式法则，\n\n    ![$$ \\frac{\\kern0.5em \\partial\
    \ y}{\\partial x}=\\frac{\\kern0.5em \\partial y}{\\partial u}\\ast \\frac{\\\
    kern0.5em \\partial u}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq19.png)\
    \ = `8u⁷ * 2x` = `16x * (x² + 5)⁷`\n\n## 最常用的函数导数\n\n图 2-3 展示了最常用的函数导数。\n\n![../images/477043_2_En_2_Chapter/477043_2_En_2_Fig3_HTML.jpg](img/477043_2_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3\n\n常用导数\n\n了解 sigmoid 激活函数的导数也很有帮助。\n\n`Ϭ(Z) = 1 / (1 + exp(-Z))`\n\n\
    ![../images/477043_2_En_2_Chapter/477043_2_En_2_Figa_HTML.png](img/477043_2_En_2_Figa_HTML.png)\n\
    \nsigmoid 激活函数的导数给出了该激活函数在任意神经元处的变化率。\n\n## 总结\n\n本章通过解释所有处理结果是如何计算的，探讨了神经网络处理的内部机制。它向你介绍了导数和梯度，并描述了这些概念如何用于寻找误差函数的最小值之一。下一章将展示一个手动计算结果的具体示例。仅仅描述计算规则不足以理解该主题，因为将这些规则应用于特定的网络架构确实很棘手。\n\
    \n# 3. 手动神经网络处理\n\n在本章中，我们通过一个简单的示例来展示神经网络处理的内部细节。我们提供了处理前向传播和反向传播过程所涉及计算的详细分步说明。\n\
    \n> **注意**  \n> 需要指出的是，本章中的所有计算均基于第 2 章所解释的信息。如果你在阅读本章时遇到任何问题，请查阅第 2 章以获取解释。\n\
    \n## 示例：单点处函数的手动近似\n\n图 3-1 展示了在三维空间中显示的向量。\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig1_HTML.jpg](img/477043_2_En_3_Fig1_HTML.jpg)\n\
    \n图 3-1\n\n三维空间中的向量\n\n它表示函数 `y = f(x1, x2)` 的值，其中 `x1 = 0.01` 且 `x2 = 0.02`。\n\
    \n`y(0.01, 0.02) = 0.80`\n"
- fmt: "# Building the Neural Network\n\nWe want to build and train the network that\
    \ for a given input (`x1 = 0.01`, `x2 = 0.02`) calculates the output result `y\
    \ = 0.80` (the target value for the network). Figure [3-2](#477043_2_En_3_Chapter.xhtml#Fig2)\
    \ shows the network diagram for the example.\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig2_HTML.png](images/477043_2_En_3_Chapter/477043_2_En_3_Fig2_HTML.png)\n\
    \nFigure 3-2\n\nNetwork diagram\n\nThe network has three layers of neurons (input,\
    \ hidden, and output). There are two neurons (`I[1]` and `I[2]`) in the input\
    \ layer, three neurons (`H[1]`, `H[2]`, `H[3]`) in the hidden layer, and one neuron\
    \ (`O[1]`) in the output layer. Weights are depicted near arrows that show the\
    \ links (connections) between neurons (for example, neurons `I[1]` and `I[2]`\
    \ provide the input for neuron `H[1]` with the corresponding weights `W¹[11]`\
    \ and `W¹[12]`).\n\nThe bodies of neurons in the hidden and output layers (`H[1]`,\
    \ `H[2]`, `H[3]`, and `O[1]`) are shown as a circle divided in two parts (see\
    \ Figure [3-3](#477043_2_En_3_Chapter.xhtml#Fig3)). The left part of the neuron\
    \ body shows the value of the calculated network input for the neuron (`Z¹[1]\
    \ = W¹[11]*I[1]+W¹[12]*I[2] + B[1]*1`). The initial values for biases are typically\
    \ set to 1.00. The right part shows the neuron’s output calculation made by applying\
    \ the activation function to the network input into the neuron.\n\n`H[1] = Ϭ(Z¹[1])\
    \ = 1/(1+exp(- Z¹[1]))`\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig3_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3\n\nNeuron presentation in the hidden and output layers\n\nThe error\
    \ function calculation is shown as a quadrant to distinguish it from a neuron\
    \ (see Figure [3-4](#477043_2_En_3_Chapter.xhtml#Fig4)).\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig4_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4\n\nError function representation\n\n`B[1]` and `B[2]` are biases\
    \ for the corresponding network layers.\n\nHere is the summary of the initial\
    \ network settings:\n\n- Input to neuron `I[1] = 0.01`\n- Input to neuron `I[2]\
    \ = 0.02`\n- `T[1]` - (The target output from neuron `O[1]`) = 0.80\n\nWe also\
    \ need to assign initial values to the weight and bias parameters. The values\
    \ of the initial parameters are typically set randomly, but for this example we\
    \ assign them the following values:\n\n`W¹[11] = 0.05` `W¹[12] = 0.06` `W¹[21]\
    \ = 0.07` `W¹[22] = 0.08` `W¹[31] = 0.09` `W¹[32] = 0.10`\n\n`W²[11] = 0.11` `W²[12]\
    \ = 0.12` `W²[13] = 0.13`\n\n`B[1] = 0.20`\n\n`B[2] = 0.25`\n\n## Forward Pass\
    \ Calculation\n\nThe forward pass calculation starts from the hidden layers.\n\
    \n### Hidden Layers\n\nHere are the hidden layers:\n\nNeuron `H[1]`:\n\n1. Calculate\
    \ the total net input for neuron `H[1]`.\n\n   `Z¹[1] = W¹[11]* I[1] + W¹[12]*\
    \ I[2] + B[1]*1.00 = 0.05*0.01 + 0.06*0.02 + 0.20*1.00 = 0.2017000000000000` (3-1)\n\
    \n2. Use the logistic function to get the output of `H[1]`.\n\n   `H[1] = δ(Z¹[1])\
    \ = 1/(1+exp(- Z¹[1])) = 1/(1+exp(-0.2017000000000000)) = 0.5502547397403884`\
    \ (3-2)\n\nNeuron `H[2]`:\n\n- `Z¹[2] = W¹[21]* I[1] + W¹[22]* I[2] + B[1]*1.00\
    \ = 0.07*0.01 + 0.08*0.02 + 0.20*1.00 = 0.2023`\n\n  `H[2] = 1/(1+exp(-0.2023))\
    \ = 0.5504032199355139` (3-3)\n\nNeuron `H[3]`:\n\n- `Z¹[2] = W¹[31]* I[1] + W¹[32]*\
    \ I[2] + B[1]*1.00 = 0.09*0.01 + 0.10*0.02 + 0.20*1.00 = 0.20290000000000002`\n\
    \n  `H[3] = 1/(1+exp(-0.20290000000000002)) = 0.5505516911502556` (3-4)\n\n###\
    \ Output Layer\n\nThe output-layer neuron `O[1]` calculation is similar to the\
    \ hidden-layer neuron calculation, but with one difference. The input for the\
    \ output neuron `O[1]` is the output from the corresponding hidden-layer neurons.\
    \ Also, notice that there are three hidden-layer neurons contributing to the output-layer\
    \ neuron `O[1]`.\n\nNeuron `O[1]`:\n\n1. Calculate the total net input for neuron\
    \ `O`.\n\n   `Z²[1] = W²[11]* H[1] + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00 =\
    \ 0.11*0.5502547397403884 + 0.12*0.5504032199355139 + 0.13*0.5505516911502556\
    \ + 0.25*1.00 = 0.44814812761323763` (3-5)\n\n2. Use the logistic function `Ϭ`\
    \ to get the output from `O[1]`.\n\n   `O[1] = Ϭ(Z²[1]) = 1/(1+exp(- Z²[1])) =\
    \ 1/(1+exp(-0.44814812761323763)) = 0.6101988445912522` (3-6)\n\nThe calculated\
    \ output from neuron `O[1]` is 0.6101988445912522, while the target output from\
    \ neuron `O[1]` must be = 0.80; therefore, the squared error for the output for\
    \ neuron `O[1]` is as follows:\n\n- `E = 0.5*(T[1] – O[1])² = 0.5*(0.80 - 0.6101988445912522)\
    \ = 0.01801223929724783` (3-7)\n\nWhat is needed here is to minimize the network-calculated\
    \ error to obtain good approximation results. This is done by redistributing the\
    \ network error between the output- and hidden-layer neuron weights and biases,\
    \ while taking into consideration that the impact of each neuron on the network\
    \ output depends on its weight. This calculation is done in the backward propagation\
    \ pass.\n\nTo redistribute the error toward all output- and hidden-layer neurons\
    \ and adjust their weights, we need to understand how much the final error value\
    \ changes when a weight for each neuron changes. The same is true for the biases\
    \ for each layer. By redistributing the network error to all output- and hidden-layer\
    \ neurons, we actually calculate adjustments for each neuron weight and each layer\
    \ bias.\n\n## Backward Pass Calculation\n\nCalculating weight and bias adjustments\
    \ for each network neuron/layer is done by moving backward (from the network error\
    \ to the output layer and then from the output layer to the hidden layers).\n\n\
    ### Calculating Weight Adjustments for the Output-Layer Neurons\n\nLet’s calculate\
    \ the weight adjustment for the neuron `W²[11]`. As we already know, the partial\
    \ derivative of a function determines the impact of a small change in the error\
    \ function argument on the corresponding change of the function value. Applying\
    \ it to the neuron `W²[11]`, we want to know how a change in `W²[11]` affects\
    \ the network error `E`. To do this, we need to calculate the partial derivative\
    \ of the error function `E` with respect to `W²[11]`, which is `![$$ \\frac{\\\
    partial E}{\\partial {W^2}_{11}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq1.png)`."
  raw: "## Building the Neural Network\n\nWe want to build and train the network that\
    \ for a given input (x1 = 0.01, x2 = 0.02) calculates the output result y = 0.80\
    \ (the target value for the network). Figure [3-2](#477043_2_En_3_Chapter.xhtml#Fig2)\
    \ shows the network diagram for the example.\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig2_HTML.png](images/477043_2_En_3_Chapter/477043_2_En_3_Fig2_HTML.png)\n\
    \nFigure 3-2\n\nNetwork diagram\n\nThe network has three layers of neurons (input,\
    \ hidden, and output). There are two neurons (I[1] and I[2]) in the input layer,\
    \ three neurons (H[1], H[2], H[3]) in the hidden layer, and one neuron (O[1])\
    \ in the output layer. Weights are depicted near arrows that show the links (connections)\
    \ between neurons (for example, neurons I[1] and I[2] provide the input for neuron\
    \ H[1] with the corresponding weights W¹[11] and W¹[12]).\n\nThe bodies of neurons\
    \ in the hidden and output layers (H[1], H[2], H[3], and O[1]) are shown as a\
    \ circle divided in two parts (see Figure [3-3](#477043_2_En_3_Chapter.xhtml#Fig3)).\
    \ The left part of the neuron body shows the value of the calculated network input\
    \ for the neuron (Z¹[1] = W¹[11]*I[1]+W¹[12]*I[2] + B[1]*1). The initial values\
    \ for biases are typically set to 1.00\\. The right part shows the neuron’s output\
    \ calculation made by applying the activation function to the network input into\
    \ the neuron.\n\nH[1] = Ϭ(Z¹[1]) = 1/(1+exp(- Z¹[1]))\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig3_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig3_HTML.jpg)\n\
    \nFigure 3-3\n\nNeuron presentation in the hidden and output layers\n\nThe error\
    \ function calculation is shown as a quadrant to distinguish it from a neuron\
    \ (see Figure [3-4](#477043_2_En_3_Chapter.xhtml#Fig4)).\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig4_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig4_HTML.jpg)\n\
    \nFigure 3-4\n\nError function representation\n\nB[1] and B[2] are biases for\
    \ the corresponding network layers.\n\nHere is the summary of the initial network\
    \ settings:\n\n*   Input to neuron I[1] = 0.01\n\n*   Input to neuron I[2] = 0.02\n\
    \n*   T[1] - (The target output from neuron O[1]) = 0.80\n\nWe also need to assign\
    \ initial values to the weight and bias parameters. The values of the initial\
    \ parameters are typically set randomly, but for this example we assign them the\
    \ following values:\n\nW¹[11] = 0.05 W¹[12] = 0.06 W¹[21] = 0.07 W¹[22] = 0.08 W¹[31]\
    \ = 0.09 W¹[32] = 0.10\n\nW²[11] = 0.11 W²[12] = 0.12 W²[13] = 0.13\n\nB[1] =\
    \ 0.20\n\nB[2] = 0.25\n\n## Forward Pass Calculation\n\nThe forward pass calculation\
    \ starts from the hidden layers.\n\n### Hidden Layers\n\nHere are the hidden layers:\n\
    \nNeuron H[1]:\n\n1.  Calculate the total net input for neuron H[1].\n\n    Z¹[1]\
    \ = W¹[11]* I[1] + W¹[12]* I[2] + B[1]*1.00 = = 0.05*0.01 + 0.06*0.02 + 0.20*1.00\
    \ =0.2017000000000000.     (3-1)\n\n2.  Use the logistic function to get the output\
    \ of H[1.]\n\n    H[1] = δ(Z¹[1]) = 1/(1+exp(- Z¹[1])) = 1/(1+exp(-0.2017000000000000\
    \ )) =0.5502547397403884.     (3-2)\n\nNeuron H[2]:\n\n*   Z¹[2] = W¹[21]* I[1]\
    \ + W¹[22]* I[2] + B[1]*1.00 = 0.07*0.01 + 0.08*0.02 + 0.20*1.00 = 0.2023\n\n\
    \    H[2] = 1/(1+exp(-0.2023)) = 0.5504032199355139     (3-3)\n\nNeuron H[3]:\n\
    \n*   Z¹[2] = W¹[31]* I[1] + W¹[32]* I[2] + B[1]*1.00 = 0.09*0.01 + 0.10*0.02\
    \ + 0.20*1.00 =0.20290000000000002\n\n    H[3] = 1/(1+exp(-0.20290000000000002))\
    \ = 0.5505516911502556     (3-4)\n\n### Output Layer\n\nThe output-layer neuron\
    \ O[1] calculation is similar to the hidden-layer neuron calculation, but with\
    \ one difference. The input for the output neuron O[1] is the output from the\
    \ corresponding hidden-layer neurons. Also, notice that there are three hidden-layer\
    \ neurons contributing to the output-layer neuron O[1].\n\nNeuron O[1]:\n\n1.\
    \  Calculate the total net input for neuron O.\n\n    Z²[1] = W²[11]* H[1] + W²[12]*\
    \ H[2] + W²[13]* H[3] + B[2]*1.00 = 0.11*0.5502547397403884 +0.12*0.5504032199355139\
    \ + 0.13*0.5505516911502556 + 0.25*1.00 =0.44814812761323763     (3-5)\n\n2. \
    \ Use the logistic function Ϭ to get the output from O[1].\n\n    O[1] = Ϭ(Z²[1])\
    \ = 1/(1+exp(- Z²[1])) = 1/(1+exp(-0.44814812761323763 )) =0.6101988445912522     (3-6)\n\
    \nThe calculated output from neuron O[1] is 0.6101988445912522, while the target\
    \ output from neuron O[1] must be = 0.80; therefore, the squared error for the\
    \ output for neuron O[1] is as follows:\n\n*   E = 0.5*(T[1] – O[1])² = 0.5*(0.80\
    \ - 0.6101988445912522) =0.01801223929724783     (3-7)\n\nWhat is needed here\
    \ is to minimize the network-calculated error to obtain good approximation results.\
    \ This is done by redistributing the network error between the output- and hidden-layer\
    \ neuron weights and biases, while taking into consideration that the impact of\
    \ each neuron on the network output depends on its weight. This calculation is\
    \ done in the backward propagation pass.\n\nTo redistribute the error toward all\
    \ output- and hidden-layer neurons and adjust their weights, we need to understand\
    \ how much the final error value changes when a weight for each neuron changes.\
    \ The same is true for the biases for each layer. By redistributing the network\
    \ error to all output- and hidden-layer neurons, we actually calculate adjustments\
    \ for each neuron weight and each layer bias.\n\n## Backward Pass Calculation\n\
    \nCalculating weight and bias adjustments for each network neuron/layer is done\
    \ by moving backward (from the network error to the output layer and then from\
    \ the output layer to the hidden layers).\n\n### Calculating Weight Adjustments\
    \ for the Output-Layer Neurons\n\nLet’s calculate the weight adjustment for the\
    \ neuron W²[11]. As we already know, the partial derivative of a function determines\
    \ the impact of a small change in the error function argument on the corresponding\
    \ change of the function value. Applying it to the neuron W²[11], we want to know\
    \ how a change in W²[11] affects the network error E. To do this, we need to calculate\
    \ the partial derivative of the error function E with respect toW²[11], which\
    \ is ![$$ \\frac{\\partial E}{\\partial {W^2}_{11}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq1.png)\
    \ ."
  trans: "\n# 构建神经网络\n\n我们要构建并训练一个网络，使其对于给定的输入（`x1 = 0.01`，`x2 = 0.02`）能够计算出输出结果 `y\
    \ = 0.80`（网络的**目标值**）。图 3-2 展示了该示例的网络图。\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig2_HTML.png](img/477043_2_En_3_Fig2_HTML.png)\n\
    \n图 3-2\n\n网络图\n\n该网络包含三层神经元（输入层、隐藏层和输出层）。输入层有两个神经元（`I[1]` 和 `I[2]`），隐藏层有三个神经元（`H[1]`、`H[2]`、`H[3]`），输出层有一个神经元（`O[1]`）。权重显示在箭头附近，这些箭头表示神经元之间的连接（例如，神经元\
    \ `I[1]` 和 `I[2]` 为神经元 `H[1]` 提供输入，对应的权重分别为 `W¹[11]` 和 `W¹[12]`）。\n\n隐藏层和输出层神经元（`H[1]`、`H[2]`、`H[3]`\
    \ 和 `O[1]`）的主体被表示为一个分为两部分的圆圈（见图 3-3）。神经元主体的左侧部分显示该神经元计算出的网络输入值（`Z¹[1] = W¹[11]*I[1]+W¹[12]*I[2]\
    \ + B[1]*1`）。偏置的初始值通常设置为 1.00。右侧部分显示通过对神经元的网络输入应用激活函数而计算出的神经元输出。\n\n`H[1] = Ϭ(Z¹[1])\
    \ = 1/(1+exp(- Z¹[1]))`\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig3_HTML.jpg](img/477043_2_En_3_Fig3_HTML.jpg)\n\
    \n图 3-3\n\n隐藏层和输出层中的神经元表示\n\n误差函数的计算用一个方框表示，以区别于神经元（见图 3-4）。\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig4_HTML.jpg](img/477043_2_En_3_Fig4_HTML.jpg)\n\
    \n图 3-4\n\n误差函数表示\n\n`B[1]` 和 `B[2]` 是相应网络层的偏置。\n\n以下是网络初始设置的摘要：\n\n- 神经元 `I[1]`\
    \ 的输入 = 0.01\n- 神经元 `I[2]` 的输入 = 0.02\n- `T[1]` -（神经元 `O[1]` 的目标输出）= 0.80\n\n\
    我们还需要为权重和偏置参数分配初始值。初始参数的值通常是随机设置的，但对于本例，我们为其分配以下值：\n\n`W¹[11] = 0.05` `W¹[12]\
    \ = 0.06` `W¹[21] = 0.07` `W¹[22] = 0.08` `W¹[31] = 0.09` `W¹[32] = 0.10`\n\n\
    `W²[11] = 0.11` `W²[12] = 0.12` `W²[13] = 0.13`\n\n`B[1] = 0.20`\n\n`B[2] = 0.25`\n\
    \n## 前向传播计算\n\n前向传播计算从隐藏层开始。\n\n### 隐藏层\n\n以下是隐藏层：\n\n神经元 `H[1]`：\n\n1. 计算神经元\
    \ `H[1]` 的总净输入。\n\n   `Z¹[1] = W¹[11]* I[1] + W¹[12]* I[2] + B[1]*1.00 = 0.05*0.01\
    \ + 0.06*0.02 + 0.20*1.00 = 0.2017000000000000` (3-1)\n\n2. 使用逻辑函数获取 `H[1]` 的输出。\n\
    \n   `H[1] = δ(Z¹[1]) = 1/(1+exp(- Z¹[1])) = 1/(1+exp(-0.2017000000000000)) =\
    \ 0.5502547397403884` (3-2)\n\n神经元 `H[2]`：\n\n- `Z¹[2] = W¹[21]* I[1] + W¹[22]*\
    \ I[2] + B[1]*1.00 = 0.07*0.01 + 0.08*0.02 + 0.20*1.00 = 0.2023`\n\n  `H[2] =\
    \ 1/(1+exp(-0.2023)) = 0.5504032199355139` (3-3)\n\n神经元 `H[3]`：\n\n- `Z¹[2] =\
    \ W¹[31]* I[1] + W¹[32]* I[2] + B[1]*1.00 = 0.09*0.01 + 0.10*0.02 + 0.20*1.00\
    \ = 0.20290000000000002`\n\n  `H[3] = 1/(1+exp(-0.20290000000000002)) = 0.5505516911502556`\
    \ (3-4)\n\n### 输出层\n\n输出层神经元 `O[1]` 的计算与隐藏层神经元计算类似，但有一个区别。输出神经元 `O[1]` 的输入是相应隐藏层神经元的输出。另外，请注意有三个隐藏层神经元对输出层神经元\
    \ `O[1]` 有贡献。\n\n神经元 `O[1]`：\n\n1. 计算神经元 `O` 的总净输入。\n\n   `Z²[1] = W²[11]* H[1]\
    \ + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00 = 0.11*0.5502547397403884 + 0.12*0.5504032199355139\
    \ + 0.13*0.5505516911502556 + 0.25*1.00 = 0.44814812761323763` (3-5)\n\n2. 使用逻辑函数\
    \ `Ϭ` 获取 `O[1]` 的输出。\n\n   `O[1] = Ϭ(Z²[1]) = 1/(1+exp(- Z²[1])) = 1/(1+exp(-0.44814812761323763))\
    \ = 0.6101988445912522` (3-6)\n\n神经元 `O[1]` 计算出的输出是 0.6101988445912522，而神经元 `O[1]`\
    \ 的目标输出必须等于 0.80；因此，神经元 `O[1]` 输出的平方误差如下：\n\n- `E = 0.5*(T[1] – O[1])² = 0.5*(0.80\
    \ - 0.6101988445912522) = 0.01801223929724783` (3-7)\n\n这里需要做的是最小化网络计算出的误差，以获得良好的近似结果。这是通过在输出层和隐藏层神经元的权重和偏置之间重新分配网络误差来实现的，同时考虑到每个神经元对网络输出的影响取决于其权重。此计算在反向传播过程中完成。\n\
    \n为了将误差重新分配给所有输出层和隐藏层神经元并调整它们的权重，我们需要了解当每个神经元的权重发生变化时，最终误差值会变化多少。每层偏置的情况也是如此。通过将网络误差重新分配给所有输出层和隐藏层神经元，我们实际上是在计算每个神经元权重和每层偏置的调整量。\n\
    \n## 反向传播计算\n\n计算每个网络神经元/层的权重和偏置调整量是通过反向移动（从网络误差到输出层，然后从输出层到隐藏层）来完成的。\n\n### 计算输出层神经元的权重调整量\n\
    \n让我们计算神经元 `W²[11]` 的权重调整量。正如我们已经知道的，函数的偏导数决定了误差函数参数的一个微小变化对函数值相应变化的影响。将其应用于神经元\
    \ `W²[11]`，我们想知道 `W²[11]` 的变化如何影响网络误差 `E`。为此，我们需要计算误差函数 `E` 关于 `W²[11]` 的偏导数，即\
    \ `![$$ \\frac{\\partial E}{\\partial {W²}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq1.png)`。\n"
- fmt: '#### Calculating Adjustment for `W²[11]`


    Applying the chain rule for derivatives, `∂E/∂W²[11]` can be expressed by the
    following formula:


    ![$$ \frac{\partial E}{\partial {W^2}_{11}}=\frac{\partial E}{\partial {O}_1}\ast
    \frac{\partial {O}_1}{\partial {Z}_1^2}\ast \frac{\partial {Z}_1^2}{\partial {W^2}_{11}}
    $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq2.png) (3-8)


    Let’s calculate separately each part of the equation using the derivative calculus.


    `E = 0.5*(T[1] – O[1])²`


    ![$$ \frac{\partial E}{\partial {O}_1}=2\ast 0.5\ast \left({T}_1\hbox{--} {O}_1\right)\ast
    \frac{\partial \left(0.5\left(T1\hbox{--} O1\right)\right)}{\partial {O}_1}= $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq3.png)
    `(T[1] - O[1])*(-1) = O[1]- T[1] = 0.80 – 0.6101988445912522 = -0.18980115540874787`
    (3-9)


    ![$$ \frac{\partial {O}_1}{\partial {Z}_1^2} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq4.png)
    is the derivative of the sigmoid activation function and is equal to `O[1]*(1-
    O[1]) = 0.6101988445912522*(1 - 0.6101988445912522) = 0.23785621465075305` (3-10)


    ![$$ Calculating\ \frac{\partial {Z}_1^2}{\partial {W}_{11}^2} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_Equa.png)


    `Z²[1] = W²[11]* H[1] + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00` (3-11)


    ![$$ \frac{\partial {Z}_1^2}{\partial {W}_{11}^2}=\mathrm{H}1=0.5502547397403884
    $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq5.png) (3-12)


    Note that ![$$ \frac{\partial \left({W}^212\ast H2+{W}^213\ast H3+B2\ast 1.00\right)}{\partial
    {W^2}_{11}}=0 $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq6.png),
    because this part does not depend on `W²[11]`.


    Putting it all together, we have this:


    ![$$ \frac{\partial E}{\partial {W^2}_{11}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq7.png)
    `= -0.18980115540874787 * 0.23785621465075305 * 0.5502547397403884 = -0.024841461722517316`
    (3-13)


    To decrease the error, we need to calculate the new adjusted value for `W²[11]`
    by subtracting the value of ![$$ \frac{\partial E}{\partial {W^2}_{11}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq8.png)
    (optionally multiplied by some learning rate `η`) from the original value of `W²[11]`.


    `adjustedW²[11] = W²[11] – η * ∂E/∂W²[11]`. For this example, `η = 1`. (3-14)


    `adjustedW²[11] = 0.11 + 0.024841461722517316 = 0.13484146172251732`


    #### Calculating Adjustment for `W²[12]`


    Applying the chain rule for derivatives, `∂E/∂W²[12]` can be expressed by the
    following formula:


    ![$$ \frac{\partial E}{\partial {W^2}_{11}}=\frac{\partial E}{\partial {O}_1}\ast
    \frac{\partial {O}_1}{\partial {Z}_1^2}\ast \frac{\partial {Z}_1^2}{\partial {W^2}_{12}}
    $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq10.png) (3-15)


    Let’s calculate separately each part of the equation using derivative calculus.


    ![$$ \frac{\partial E}{\partial {O}_1} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq11.png)
    `= -0.18980115540874787` (see 1-3) (3-16)


    ![$$ Calculating\ \frac{\partial {O}_1}{\partial {Z}_1^2} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq12.png)


    ![$$ \frac{\partial {O}_1}{\partial {Z}_1^2} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq13.png)
    `= 0.23785621465075305` (see 1-4) (3-17)


    ![$$ Calculating\ \frac{\partial {Z}_1^2}{\partial {W}_{12}^2} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_Equb.png)


    `Z²[1] = W²[11]* H[1] + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00` (3-18)


    ![$$ \frac{\partial {Z}_1^2}{\partial {W}_{11}^2} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq14.png)
    `= H[2] = 0.5504032199355139` (see [1-3](#477043_2_En_1_Chapter.xhtml#Par12))
    (3-19)


    Putting it all together, we have this:


    ![$$ \frac{\partial E}{\partial {W^2}_{11}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq15.png)
    `= -0.18980115540874787 * 0.23785621465075305 * 0.5502547397403884 = -0.024841461722517316`
    (3-20)


    To decrease the error, we need to calculate the new adjusted value for `W²[11]`
    by subtracting the value of ![$$ \frac{\partial E}{\partial {W^2}_{11}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq16.png)
    (optionally multiplied by some learning rate `η`) from the original value of `W²[12]`.


    `adjustedW²[12] = W²[12] – η * ∂E/∂W²[12]`


    `adjustedW²[12] = 0.12 + 0.024841461722517316 = 0.1448414617225173` (3-21)


    #### Calculating Adjustment for `W²[13]`


    ![$$ \frac{\partial E}{\partial {W^2}_{13}}=\frac{\partial E}{\partial {O}_1}\ast
    \frac{\partial {O}_1}{\partial {Z}_1^2}\ast \frac{\partial {Z}_1^2}{\partial {W^2}_{13}}
    $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_Equc.png)


    ![$$ \frac{\partial E}{\partial {O}_1} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq18.png)
    `= -0.18980115540874787` (see 1-13) (3-22)


    ![$$ \frac{\partial {O}_1}{\partial {Z}_1^2} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq19.png)
    `= 0.23785621465075305` (see 1-14) (3-23)


    ![$$ Calculating\ \frac{\partial {Z}_1^2}{\partial {W}_{13}^2} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_Equd.png)


    `Z²[1] = W²[11]* H[1] + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00` (3-24)


    ![$$ \frac{\partial {Z}_1^2}{\partial {W}_{13}^2} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq20.png)
    `= H[3] = 0.5505516911502556` (see 1-4) (3-25)


    Putting it all together, we have this:


    ![$$ \frac{\partial E}{\partial {W^2}_{13}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq21.png)
    `= -0.18980115540874787 * 0.23785621465075305 * 0.5505516911502556 = -0.024854867708052567`
    (3-26)


    `adjustedW²[13] = W²[13] – η * ∂E/∂W²[13]`. For this example, `η = 1`.


    `adjustedW²[12] = 0.13 + 0.024841461722517316 = 0.1548414617225173` (3-27)


    Therefore, on the second iteration, we will use the following weight-adjusted
    values:


    *   `adjustedW²[11] = 0.08515853827748268`

    *   `adjustedW²[12] = 0.09515853827748268`

    *   `adjustedW²[13] = 0.10515853827748269`


    After adjusting weights for the output neurons, we are ready to calculate weight
    adjustments for the hidden neurons.


    ### Calculating Weight Adjustments for Hidden-Layer Neurons


    Calculating weight adjustments for the neurons in the hidden layer is similar
    to the corresponding calculations in the output layer, but with one important
