    ## Summary


    The chapter explained how to use neural networks for the classification of objects.
    Specifically, the example in this chapter showed how a neural network was able
    to determine the book to which each testing record belongs. In the next chapter,
    we will learn the importance of selecting the correct processing model.


    # 11. The Importance of Selecting the Correct Model


    The example discussed in this chapter will end up showing a negative result. However,
    we frequently learn a lot from our mistakes.


    ## Example: Predicting Next Month’s Stock Market Price


    In this example, we will try to predict next month’s price of the SPY exchange-traded
    fund (ETF), which is the exchange that mimics the S&P 500 stock market index.
    Someone’s rational for developing such a project could sound somewhat like this:


    > *“Yes, we know that the market prices are random, jumping daily up and down
    reacting to news. However, we use the monthly prices, which are more stable. In
    addition, the market experienced the conditions similar to the current situation
    many times in the past, and people (in general) should react approximately the
    same to similar conditions. By knowing how the market reacted in the past to the
    conditions similar to today’s market, we should be able to closely predict the
    market behavior for the next month.”*


    We will use the ten-year historic monthly prices for the SPY ETF and will attempt
    to predict next month’s price. Of course, using the historical SPY data of a longer
    duration should positively contribute to the accuracy of prediction; however,
    this is an example, and it should be reasonable small. The input dataset contains
    data for ten years (120 months), from January 2000 until January 2009, and we
    want to predict the SPY price at the end of February 2009\. Table [11-1](#477043_2_En_11_Chapter.xhtml#Tab1)
    shows the historical monthly SPY prices for that period.


