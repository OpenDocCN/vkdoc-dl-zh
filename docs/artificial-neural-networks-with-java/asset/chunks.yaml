    ### Testing the Network


    First, we change the configuration data to process the testing logic. We load
    the previously saved trained network. Notice here that we don’t load the testing
    dataset. We will be determining the current function value in the following way.
    On the first step of the loop the current function value is equal to the `lastFunctionValueForTraining`
    variable, which was calculated during the training process. This variable holds
    the function value at the last point, 50. On all the following steps of the loop,
    we set the current record value to the function value calculated during the previous
    step of the loop.


    Near the beginning of this example we explained how we intend to calculate the
    predicted values during the testing phase. We repeat this explanation here:


    > *“During the test, we calculate the function’s next-day value in the following
    way. When at training point `x = 50`, we want to calculate the predicted function
    value at the next point, `x = 51`. Feeding the difference between the function
    values at the current and previous points (Field 1) to the trained network, we
    will get back the predicted difference between the function values at the next
    and current points. Therefore, the predicted function value at the next point
    is equal to the sum of the actual function value at the current point and the
    predicted difference.”*


    Next, we loop over the pair dataset starting from `xPoint` 51 (the first point
    of the testing interval). At each step of the loop, we obtain the input, actual,
    and predicted values for each record, denormalize their values, and calculate
    `realTargetDiffValue` and `realPredictDiffValue` for each record. We print their
    values as the testing log and populate the chart elements with data for each record.
