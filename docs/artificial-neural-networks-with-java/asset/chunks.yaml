    ## Summary


    In this chapter. we discussed how to use a neuron network for the approximation
    of functions in 3D space. We learned that the approximation of functions in 3D
    space (functions of two variables) is done similarly to the approximation of functions
    in 2D space. The only difference is that the network architecture should include
    two inputs, and the training and testing datasets should include records of all
    the possible combinations of the `x` and `y` values. These results can be propagated
    for the approximation of functions with more than two variables.


    # Part IIIIntroduction to Computer Vision


    # 13. Image Recognition


    A neural network can also be used to recognize images. Image recognition (image
    classification) is one of the most important branches of artificial intelligence.
    Computer vision is actually a visual pattern recognition technology. It is widely
    used by banks to process checks and by post offices to recognize addresses. There
    are many areas (self-driving cars, face recognition, and so on) where image recognition
    is extremely important.


    At the same time, image recognition is one of the most difficult disciplines of
    artificial intelligence. On the surface, it seems that we can reuse all the aspects
    of neural network processing that we learned in the preceding chapters of this
    book to recognize images. Each digital image is a set of pixels or dots, so if
    we create a very large dataset of different images, feed this data to a neural
    network, and train it, then the network should be able to do the job.


    Unfortunately, it is much more complex. We can train the network to recognize
    various single images and then ask the network to recognize a given image (for
    example, is it a cat or a dog?). But there are enormous variations of even a single
    object type (how many dogs are there, their shapes, their fur or hair, their faces,
    so on). Also, if the dog images show standing dogs, the program won’t be able
    to recognize sitting dogs, moving dogs, dogs shown upside down, or dogs shown
    from different angles. Some research is underway to build three-dimensional neural
    networks, and processing colored images adds another dimension of difficulties.


    On top of this, real-life images can show a combination of many objects being
    superimposed on an image. An image can be further complicated by shadows falling
    on some part of objects or sun glaring on others, such as a cat sitting on a sofa
    or a dog that is partially shadowed by a car. You get the general idea.'
