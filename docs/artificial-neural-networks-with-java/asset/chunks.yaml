    ### 网络架构


    我们将使用图 7-4 所示的网络，该网络由输入层（包含 10 个神经元）、4 个隐藏层（每层包含 13 个神经元）和输出层（包含单个神经元）组成。


    ![../images/477043_2_En_7_Chapter/477043_2_En_7_Fig4_HTML.jpg](img/477043_2_En_7_Fig4_HTML.jpg)


    图 7-4


    网络架构


