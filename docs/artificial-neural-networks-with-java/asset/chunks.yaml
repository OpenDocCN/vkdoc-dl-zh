    ### 测试网络


    首先，我们更改配置数据以处理测试逻辑。我们加载之前保存的训练好的网络。请注意，这里我们不加载测试数据集。我们将通过以下方式确定当前函数值。在循环的第一步，当前函数值等于
    `lastFunctionValueForTraining` 变量，该变量是在训练过程中计算得出的。此变量保存了最后一个点（即 50）处的函数值。在循环的所有后续步骤中，我们将当前记录值设置为在循环上一步中计算出的函数值。


    在本示例的开头附近，我们解释了打算如何在测试阶段计算预测值。我们在此重复这一解释：


    > *“在测试期间，我们通过以下方式计算函数的次日值。当训练点为 `x = 50` 时，我们想要计算下一个点 `x = 51` 处的预测函数值。将当前点与前一个点的函数值之差（字段
    1）输入训练好的网络，我们将得到下一个点与当前点之间函数值的预测差值。因此，下一个点的预测函数值等于当前点的实际函数值与预测差值之和。”*


    接下来，我们从 `xPoint` 51（测试区间的第一个点）开始遍历配对数据集。在循环的每一步，我们获取每条记录的输入值、实际值和预测值，对其值进行反归一化，并计算每条记录的
    `realTargetDiffValue` 和 `realPredictDiffValue`。我们将这些值打印为测试日志，并用每条记录的数据填充图表元素。最后，我们保存生成的图表文件。清单
    7-5 展示了测试处理的结果。

