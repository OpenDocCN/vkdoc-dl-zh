- fmt: '# Programming Logic


    This section goes over the settings.


    Each record of the input file contains 784 input fields and 10 output fields.


    ```

    static int numberOfInputNeurons = 784;

    static int numberOfOutputNeurons = 10;

    ```


    Here is the normalizing interval:


    ```

    static double Nh =  1;

    static double Nl = -1;

    ```


    Here is the range of the input field values (maximum and minimum grayscale pixels
    values):


    ```

    static double imageBitDh = 255.00;

    static double imageBitDl = 0.00;

    ```


    Here is the range of the output field values (maximum and minimum values of the
    fields that represent the byte-wise presentation of an image):


    ```

    static double outputDh = 1.00;

    static double outputDl = 0.00;

    ```


    The program runs in two modes (training mode or testing mode) depending on the
    value of the `workingMode` parameter.


    ```

    // --- Working mode (0 - training, 1 - testing) --

    workingMode = 0; // Training mode

    // Common setting

    trainFileName = "C:/Image_Recognition/MNIS_Data/mnist_train_input_Norm.csv";

    testFileName = "C:/Image_Recognition/MNIS_Data/mnist_test_input_Norm.csv";

    networkFileName = "C:/Image_Recognition/MNIS_Data/saved_network_file";

    // Check the workingMode field and run the program in the training or testing
    mode

    if(workingMode == 0)

    {

    if(file1.exists())

    file1.delete();

    // Build the network, train it and test how it works

    trainTestSaveNetwork();

    }

    else

    {

    // Don''t save the trained network file. Read it and use it for testing

    loadAndTestNetwork();

    }

    }

    catch (Throwable t)

    {

    t.printStackTrace();

    }

    finally

    {

    Encog.getInstance().shutdown();

    }

    ```


    ## Execution


    When running in training mode (method `trainTestSaveNetwork` is executed), the
    logic loads the input file in memory, builds the network, trains the network,
    and iterates between epochs until the network error becomes less than 0.005.


    Finally, we save the trained network to the file on disk, so when running the
    program in the test mode, we can simply retrieve the saved trained network in
    memory.


    ```

    "C:/Image_Recognition/MNIS_Data/saved_network_file";

    ```


    When running in the testing mode, the method `loadAndTestNetwork()` is executed.
    The logic loads the previously saved trained network in memory and tests how it
    works against the testing dataset used as an input.


    We retrieve three groups of fields from the trained network: input data, actual
    data, and predicted data.


    ```

    MLData inputData = pair.getInput();

    MLData actualData = pair.getIdeal();

    MLData predictData = network.compute(inputData);

    ```


    Since the input dataset is normalized, the data we retrieve from the network is
    also normalized, so the next step is to denormalize the input, actual, and predicted
    data. Finally, we want to check how well the network recognized the handwritten
    digits. If the digit image is not recognized, we add 1 to the `numberOfErrors`
    field. This network classifies handwritten digits with about 92 percent accuracy,
    which is pretty good for this simple program.


    ## Convolution Neural Network


    To classify more complex images, researchers currently use a more sophisticated
    type of artificial neural network called a *convolution neural network*. The neural
    networks we discussed so far were fully connected networks, meaning that each
    neuron in the next layer is connected to each neuron of the preceding layer.


    In the convolution network, each neuron in the next layer is connected only to
    a group of closely located neurons of the preceding layer, typically called a
    *local receptive field* (or a *patch*). Figure [14-2](#477043_2_En_14_Chapter.xhtml#Fig2)
    shows the connections of a hidden neuron to a patch of neurons (5*5).


    ![../images/477043_2_En_14_Chapter/477043_2_En_14_Fig2_HTML.jpg](images/477043_2_En_14_Chapter/477043_2_En_14_Fig2_HTML.jpg)


    Figure 14-2


    Neuron connections


    The next neuron in the hidden layer is connected to a patch obtained by sliding
    the patch over by one pixel, and so on. So, each hidden neuron learns to analyze
    its particular local receptive field, rather than all input neurons. The convolution
    network structure is much more complex than the fully connected networks and is
    beyond the scope of this introductory book. More detailed information about convolution
    networks can be found in the following books:


    *   *Advanced Applied Deep Learning, Convolution Neural Networks, and Object Detection*
    by Michelucci Umberto (Apress, 2019)

    *   *Deep Learning: Fundamentals, Theory, and Applications* by Kaizhu Huang, Amiz
    Hussain, Qiu-Feng Wang, Rui Zhang (Springer, 2019)


    Powerful convolution networks are currently successfully used to process three-dimensional
    objects differently than flat images. Also, there are attempts to process colored
    images that have Red-Green-Blue (RGB) encoding (multidimensional images).


    ## Summary


    In this chapter, we developed a program able to recognize (classify) handwritten
    digits with quite good accuracy. We also discussed some basic ideas of different
    types of neural networks called *convolution networks*.'
