    The next code fragment shows the training method logic. This method trains the
    network, validates it, and saves the trained network file on disk (to be used
    later by the testing method). The method loads the training dataset into memory.
    The first parameter is the name of the input training dataset. The second and
    third parameters indicate the number of input and output neurons in the network.
    The fourth parameter (`true`) indicates that the dataset has a label record. The
    rest of the parameters specify the file format and the language (see Listing [5-6](#477043_2_En_5_Chapter.xhtml#PC6)).


    ```

    MLDataSet trainingSet =

    loadCSV2Memory(trainFileName,numberOfInputNeurons,numberOfOutputNeurons,

    true,CSVFormat.ENGLISH,false);

    Listing 5-6

    Fragments of the Network Training Logic

    ```


    After loading the training dataset in memory, a new neural network is built by
    creating the basic network and adding the input, hidden, and output layers to
    it.


    ```

    // create a neural network

    BasicNetwork network = new BasicNetwork();

    ```


    Now add the input layer:


    ```

    network.addLayer(new BasicLayer(null,true,1));

    ```


    The first parameter (`null`) indicates that this is the input layer (no activation
    function). Enter `true` as the second parameter for the input and hidden layers
    and `false` for the output layer. The third parameter shows the number of neurons
    in the layer. Next we add the hidden layer.


    ```

    network.addLayer(new BasicLayer(new ActivationTANH(),true,2));

    ```


    The first parameter specifies the activation function to be used (`ActivationTANH()`).


    Alternatively, other activation functions can be used such as the sigmoid function,
    `ActivationSigmoid()`; logarithmic, `ActivationLOG()`; linear relay, `ActivationReLU(
    )`; so on. The third parameter specifies the number of neurons in this layer.
    To add the second hidden layer, simply repeat the previous statement.


    Finally, add the output layer.


    ```

    network.addLayer(new BasicLayer(new ActivationTANH(),false,1));

    ```


    The third parameter here specifies the number of neurons in the output layer.
    The next two statements finalize the creation of the network.


    ```

    network.getStructure().finalizeStructure();

    network.reset();

    ```


    To train the newly built network, we specify the type of back-propagation. Here,
    we specify resilient propagation as the most advanced propagation type. Alternatively,
    the regular back-propagation type can be specified here.


    ```

    final ResilientPropagation train = new ResilientPropagation(network, trainingSet);

    ```


    While the network is trained, we loop over the network. On each step of the loop,
    we get the next training iteration number, increase the epoch number (see Chapter
    [2](#477043_2_En_2_Chapter.xhtml) for the epoch definition), and check whether
    the network error for the current iteration can clear the error limit being set
    to 0.00000046\. When the error on the current iteration finally becomes less than
    the error limit, we exit the loop. The network has been trained, and we save the
    trained network on disk. The network also stays in memory.


    ```

    int epoch = 1;

    do

    {

    train.iteration();

    System.out.println("Epoch #" + epoch + " Error:" + train.getError());

    epoch++;

    } while (network.calculateError(trainingSet) > 0.00000046);

    // Save the network file

    EncogDirectoryPersistence.saveObject(new File(networkFileName),network);

    ```'
