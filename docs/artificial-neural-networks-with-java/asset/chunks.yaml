    这个函数近似的问题源于函数的拓扑结构（函数值在某些点上的突然跳跃或下降）。我们将把输入文件拆分成一系列单记录输入文件，称之为*微批次*。通过这样做，我们消除了复杂函数拓扑结构的负面影响。拆分数据集后，每条记录将独立存在，不再与前后函数值相关联。将输入文件拆分成微批次会创建
