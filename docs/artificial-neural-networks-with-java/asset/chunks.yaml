  raw: 'We actually don’t need the second column in the test dataset for processing.
    We just included it in the test dataset to be able to compare the predicted values
    against the actual values programmatically. Feeding the difference between the
    `xPoint` values at the current and previous points (Field 1 of the currently processed
    record) to the trained network, we will get back the predicted difference between
    the function values at the next point and the current point. Therefore, the predicted
    function value at the next point is equal to the sum of the target function value
    at the current point (record) and the network-predicted difference value.


    ### Network Architecture for the Example


    For this example, we will use the network with the output layer consisting of
    the single neuron, three hidden layers (each holding five neurons), and the output
    layer holding a single neuron. Again, we came up with this architecture experimentally
    (by trying and testing). Figure [6-6](#477043_2_En_6_Chapter.xhtml#Fig6) shows
    the training architecture.


