    ## Digging Deeper


    In this example, we learned that by using some special data preparation techniques,
    we are able to calculate the function value at the first point of the next interval
    by knowing the function value at the last point of the training interval. Repeating
    this process for the rest of the points in the testing interval, we get the function
    values for all points of the test interval.


    Why do we always mention that the function needs to be periodic? Because we determine
    the function values on the next interval based on the results calculated for the
    training interval. This technique can also be applied to nonperiodic functions.
    The only requirement is that the function values on the next interval can be determined
    in some way based on the values in the training interval. For example, consider
    a function whose values in the next interval double from the training interval.
    Such a function is not periodic, but the techniques discussed in this chapter
    will work. Also, it is not necessary that each point in the next interval can
    be determined by the corresponding point in the training interval. As long as
    some rule exists for determining the function value at some point on the next
    interval based on the function value at some point on the training interval, this
    technique will work. That substantially increases the class of functions that
    the network can process outside of the training interval.


    **Tip**


    How do we obtain the error limit? At the start, just guess the error limit value
    and run the training process. If you see that while looping over the epochs the
    network error easily clears the error limit, then decrease the error limit and
    try again. Keep decreasing the error limit value until you see that the network
    error is able to clear the error limit; however, it must work hard to do this.


    When you find such an error limit, try to play with the network architecture by
    changing the number of hidden layers and the number of neurons within the hidden
    layers and see whether it is possible to decrease the error limit even more. Typically,
    for more complex function topologies, using more hidden layers will improve the
    results. If while increasing the number of hidden layers and the number of neurons
    you reach the point when the network error degrades, stop this process and go
    back to the previous number of layers and neurons.


    ## Summary


    In this chapter, you saw an approximation of the complex periodic function. The
    training and testing datasets were transformed to the format of sliding window
    records to add the function topology information to the data. In the next chapter,
    we will discuss an even more complex situation that involves approximation of
    the noncontinuous function (which is currently considered a known problem for
    the traditional neural network approximation).


    # 8. Approximating Noncontinuous Functions


    In this chapter, we will discuss the neural network approximation of noncontinuous
    functions. Currently, this is a problematic area for neural networks because network
    processing is based on the calculation of partial function derivatives (gradient
    descent algorithm), and our ability to calculate them for noncontinuous functions
    at the points where the function value suddenly jumps or drops is questionable.
    We will dig into this issue later in this chapter. The chapter includes method
    that I developed that solves this issue.'
