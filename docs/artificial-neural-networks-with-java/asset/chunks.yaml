- fmt: '### Example: Approximation of Spiral-like Functions


    In this section, we will discuss a group of functions that are spiral-like. These
    functions have a common property. At some points, they have multiple function
    values for a single `x` point. A function in this group is notoriously difficult
    to approximate using neural networks. We will attempt to approximate the function
    shown in Figure [9-6](#477043_2_En_9_Chapter.xhtml#Fig6).


    ![../images/477043_2_En_9_Chapter/477043_2_En_9_Fig6_HTML.jpg](images/477043_2_En_9_Chapter/477043_2_En_9_Fig6_HTML.jpg)


    **Figure 9-6** – Function with multiple values for some `xPoints`


    The function is described by two equations:


    ```

    x(t) = 10 + 0.5*t*Cos(0.3*t).

    y(t) = 10 + 0.5*t*Sin(0.3*t).

    ```


    Here, `t` is an angle.


    Plotting the values of `x` and `y` produces the chart shown in Figure [9-6](#477043_2_En_9_Chapter.xhtml#Fig6).
    Again, we pretend that the function formula is unknown, and the function is given
    to us by its values at 1,000 points. As usual, we first try to approximate this
    function in a conventional way. Table [9-3](#477043_2_En_9_Chapter.xhtml#Tab3)
    shows a fragment of the training dataset.


