    // Approximation the spiral-like function using the micro-batch method.\n// The\
    \ input is the normalized set of micro-batch files (each micro-batch\n// includes\
    \ a single day record).\n// Each record consists of:\n// - normDayValue\n// -\
    \ normTargetValue\n//\n// The number of inputLayer neurons is 1\n// The number\
    \ of outputLayer neurons is 1\n// Each network is saved on disk and a map is created\
