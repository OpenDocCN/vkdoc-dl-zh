- fmt: '# 排版后的内容


    As usual, some miscellaneous statements are present at the top of the program.
    They are required by the XChart package. The configuration part controls whether
    the training or testing method should be executed. If the `workingMode` field
    is equal to 1, we execute the training method; otherwise, the test method is executed.


    Notice the quite unusual way of calling the training method `trainValidateSaveNetwork`.
    Actually, we already discussed it briefly in Chapter [2](#477043_2_En_2_Chapter.xhtml).
    Listing [6-5](#477043_2_En_6_Chapter.xhtml#PC5) shows how this technique can be
    programmed.


    ```

    returnCode = 0;    // Clear the error Code

    do

    {

    returnCode = trainValidateSaveNetwork();

    } while (returnCode > 0);

    Listing 6-5

    Calling the Training Method in a Loop

    ```


    This logic calls the training method and then checks for the `returnCode`. If
    the `returnCode` field is not zero, the training method is called again in a loop.
    And each time the method is called, the initial weight/bias parameters are assigned
    different random values, which helps in selecting their best values when the method
    is repeatedly called in a loop.


    Inside the called method, the logic checks for the error value after 500 iterations.
    If the network-calculated error is still larger than the error limit, the method
    exits with a `returnCode` of 1. And, as we just saw, the method will be called
    again. Finally, when the calculated error clears the error threshold, the method
    exits with `returnCode` 0 and is no longer called again. You select the error
    limit value experimentally, making it difficult for the network to clear the error
    code limit, but still making sure that after enough iterations the error will
    pass the error limit.


    Listing [6-6](#477043_2_En_6_Chapter.xhtml#PC6) shows the beginning of the train
    method. It loads the training dataset in memory and creates the neural network
    consisting of the input layer (with a single neuron), three hidden layers (each
    with five neurons), and the output layer (with a single neuron). Then, we train
    the network using the most efficient `ResilientPropagation` as the back-propagation
    method.


    ```

    // Load the training CSV file in memory

    MLDataSet trainingSet =

    loadCSV2Memory(trainFileName,numberOfInputNeurons,numberOfOutputNeurons,

    true,CSVFormat.ENGLISH,false);

    // create a neural network

    BasicNetwork network = new BasicNetwork();

    // Input layer

    network.addLayer(new BasicLayer(null,true,1));

    // Hidden layer (seven hidden layers are created

    network.addLayer(new BasicLayer(new ActivationTANH(),true,5));

    network.addLayer(new BasicLayer(new ActivationTANH(),true,5));

    network.addLayer(new BasicLayer(new ActivationTANH(),true,5));

    // Output layer

    network.addLayer(new BasicLayer(new ActivationTANH(),false,1));

    network.getStructure().finalizeStructure();

    network.reset();

    // train the neural network

    final ResilientPropagation train = new ResilientPropagation(network, trainingSet);

    Listing 6-6

    Loading the Training Dataset and Building and Training the Network

    ```


    This is followed by the fragment that trains the network. We train the network
    by looping over epochs. On each iteration, we check whether the calculated error
    is less than the established error limit (in our case, 0.00000006). When the network
    error becomes less than the error limit, we exit the loop. The network is trained
    with the required precision, so we save the trained network on disk.


    ```

    int epoch = 1;

    returnCode = 0;

    do

    {

    train.iteration();

    System.out.println("Epoch #" + epoch + " Error:" + train.getError());

    epoch++;

    if (epoch >= 500 && network.calculateError(trainingSet) > 0.000000061)

    {

    returnCode = 1;

    System.out.println("Try again");

    return returnCode;

    }

    } while(train.getError()0.00000006);

    // Save the network file

    EncogDirectoryPersistence.saveObject(new File(networkFileName),network);

    ```


    Notice the logic shown in Listing [6-7](#477043_2_En_6_Chapter.xhtml#PC8) that
    checks whether the network error became less than the error limit.


    ```

    if (epoch >= 5000 && network.calculateError(trainingSet) > 0.00000006)

    {

    returnCode = 1;

    System.out.println("Try again");

    return returnCode;

    }

    Listing 6-7

    Checking the Network Error

    ```


    It checks whether after 500 iterations the network error is still not less than
    the error limit. If that is the case, the `returnCode` is set to 1, and we exit
    from the training method, returning to the point where the training method is
    called in a loop. There, it will call the training method again with a new random
    set of weight/bias parameters. Without that code, the looping would continue indefinitely
    if the calculated network error is unable to clear the error limit with the randomly
    selected set of the initial weight/bias parameters.


    There are two APIs that can check the calculated network error. The results differ
    slightly depending on which method is used.


    *   `train.getError()`: The error is calculated before the training is applied.

    *   `network.CalculateError()`: The error is calculated after the training is
    applied.


    The code fragment in Listing [6-8](#477043_2_En_6_Chapter.xhtml#PC9) loops over
    the pair dataset. The `xPoint` in the loop is set to be on the interval [0, 1.2].
    For each record, it retrieves the input and actual and predicted values, denormalizes
    them, and, by having the function value, calculates the `realTargetValue` and
    `realPredictValue`, adding them to the chart data (along with the corresponding
    `xPoint` value). It also calculates the maximum and average value percent difference
    for all records. All this data is printed as the training log. Finally, the trained
    network and the chart image files are saved on disk. Notice that the return code
    is set to zero at that point, before we return from the train method, so the method
    will no longer be called again.'
