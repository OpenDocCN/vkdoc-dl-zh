    相应地，我们可以为隐藏层重写公式。


    ![$$ \frac{\partial E}{\partial {W¹}_{11}}= $$](img/477043_2_En_3_Chapter_TeX_IEq81.png)`δ¹[1]`![$$
    \ast \frac{\partial {Z}_1¹}{\partial {W¹}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq82.png)
    (3-93)


    ![$$ \frac{\partial E}{\partial {W¹}_{12}}= $$](img/477043_2_En_3_Chapter_TeX_IEq83.png)`δ¹[1]`![$$
    \ast \frac{\partial {Z}_1¹}{\partial {W¹}_{12}} $$](img/477043_2_En_3_Chapter_TeX_IEq84.png)
    (3-94)


    ![$$ \frac{\partial E}{\partial {W¹}_{21}}= $$](img/477043_2_En_3_Chapter_TeX_IEq85.png)`δ¹[2]`![$$
    \ast \frac{\partial {Z}_2¹}{\partial {W¹}_{21}} $$](img/477043_2_En_3_Chapter_TeX_IEq86.png)
    (3-95)


    ![$$ \frac{\partial E}{\partial {W¹}_{22}}= $$](img/477043_2_En_3_Chapter_TeX_IEq87.png)`δ¹[2]`![$$
    \ast \frac{\partial {Z}_2¹}{\partial {W¹}_{22}} $$](img/477043_2_En_3_Chapter_TeX_IEq88.png)
    (3-96)


    ![$$ \frac{\partial E}{\partial {W¹}_{31}}= $$](img/477043_2_En_3_Chapter_TeX_IEq89.png)`δ¹[3]`![$$
    \ast \frac{\partial {Z}_3¹}{\partial {W¹}_{31}} $$](img/477043_2_En_3_Chapter_TeX_IEq90.png)
    (3-97)


    ![$$ \frac{\partial E}{\partial {W¹}_{32}}= $$](img/477043_2_En_3_Chapter_TeX_IEq91.png)`δ¹[3]`![$$
    \ast \frac{\partial {Z}_3¹}{\partial {W¹}_{32}} $$](img/477043_2_En_3_Chapter_TeX_IEq92.png)
    (3-98)


    通常，计算误差函数 `E` 关于其权重的偏导数可以通过将节点的增量乘以误差函数关于相应权重的偏导数来完成。这使我们免于计算一些冗余数据。这意味着我们可以计算每个网络节点的
    δ 值，然后使用公式 (3-93) 到公式 (3-98) 中的公式。


    ## 网络计算的矩阵形式


    对于同一个网络，我们可以使用矩阵来表达所有计算。例如，通过引入 `Z` 向量、`W` 矩阵和 `B` 向量，我们可以得到与使用标量时相同的计算结果。参见图
    3-5。


    ![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig5_HTML.jpg](img/477043_2_En_3_Fig5_HTML.jpg)


    **图 3-5** 网络计算的矩阵形式


    使用矩阵还是标量计算取决于个人偏好。使用优秀的矩阵库可以提供快速的计算，但缺点是内存需求高，因为矩阵需要保存在内存中。

