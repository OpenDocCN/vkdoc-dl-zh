    ### 数据准备


    我们希望使用第一个区间的函数值来训练神经网络，然后通过获取网络在第二个区间预测的函数值来测试网络。与之前的示例类似，为了能够确定训练范围之外的函数逼近结果，我们将使用
    `xPoint` 值之间的差值以及函数值之间的差值，而不是给定的 `xPoints` 和函数值。不过，在本示例中，我们将当前点与前一个点之间的 `xPoint`
    值差值用作字段 1，将下一个点与当前点之间的函数值差值用作字段 2。


    通过输入文件中的这些设置，我们教会网络学习：当 `xPoint` 值之间的差值等于某个值 `a` 时，下一天与当天之间的函数值差值必须等于某个值 `b`。这使得网络能够通过知道当天（记录）的函数值来预测下一天的函数值。


    在测试期间，我们通过以下方式计算函数在下一天的值。当位于点 `x` = 50 时，我们想要计算下一个点 `x` = 51 处的预测函数值。将当前点与前一个点之间的
    `xPoint` 值差值（字段 1）输入到训练好的网络中，我们将得到预测的下一天与当天之间的函数值差值。因此，下一个点的预测函数值等于当前点的实际函数值与从训练网络获得的预测值差值之和。


    然而，这种方法在本示例中行不通，仅仅是因为图表的许多部分可能具有相同的当前天与前一天之间的函数值差值和方向。当神经网络试图确定该点属于图表的哪个部分时，这会混淆其学习过程（见图
    7-2）。


    ![../images/477043_2_En_7_Chapter/477043_2_En_7_Fig2_HTML.jpg](img/477043_2_En_7_Fig2_HTML.jpg)


    图 7-2


    函数图表上令人困惑的点


    ### 在数据中反映函数拓扑结构


    对于这个示例，我们需要使用一个额外的技巧。我们将把函数拓扑结构包含在数据中，以帮助网络区分令人困惑的点。具体来说，我们的训练文件将使用滑动窗口作为输入记录。每个滑动窗口记录包含前十条记录的输入函数值差值（当前天与前一天之间的差值）。滑动窗口的目标函数值是原始第
    11 条记录的目标函数值差值（下一天与当天之间的差值）。


    本质上，通过使用这样的记录格式，我们教会网络学习以下条件：如果前十条记录的函数值差值分别等于 `a1`、`a2`、`a3`、`a4`、`a5`、`a6`、`a7`、`a8`、`a9`
    和 `a10`，那么下一天函数值与当天函数值之间的差值应该等于下一条记录（第 11 条记录）的目标函数值。图 7-3 展示了一个构建滑动窗口记录的直观示例。


    ![../images/477043_2_En_7_Chapter/477043_2_En_7_Fig3_HTML.jpg](img/477043_2_En_7_Fig3_HTML.jpg)


    图 7-3


    构建滑动窗口记录


    表 7-2 显示了滑动窗口训练数据集。


    表 7-2


    区间 [1, 50] 上的滑动窗口数据集

