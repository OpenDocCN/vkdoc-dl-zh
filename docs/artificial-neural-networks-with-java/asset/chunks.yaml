- fmt: "# Digging Deeper\n\nWhen processing a neural network, we set the error limit\
    \ (specifically indicating how close the trained network results should match\
    \ the target data). The training process works iteratively by gradually moving\
    \ in the direction toward the error function minimum, therefore reducing the error.\
    \ The iterative process stops when the difference between the calculated network\
    \ results and the target results becomes less than the preset error limit.\n\n\
    Could the network fail to reach the error limit being set? Unfortunately, yes.\
    \ Let’s discuss it in more detail. Of course, the approximation error depends\
    \ on the network architecture being selected (the number of hidden layers and\
    \ the number of neuron within each hidden layer). However, let’s presume that\
    \ the network architecture is being set correctly.\n\nThe approximation error\
    \ also depends on the function topology. Again, let’s presume that the function\
    \ is monotone and continuous. Still, the network can fail to reach the network\
    \ limit. Why? We already mentioned that back-propagation is an iterative process\
    \ that looks for the minimum of error function. An error function is typically\
    \ a function of many variables, but for simplicity we will show it as the 2D space\
    \ chart. (See Figure [3-6](#477043_2_En_3_Chapter.xhtml#Fig6).)\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig6_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig6_HTML.jpg)\n\
    \n**Figure 3-6** Error function local and global minimums\n\nThe goal of the training\
    \ process is finding the minimum of the error function. The error function depends\
    \ on the weight/bias parameters being calibrated during the iterative training\
    \ process. The initial values of the weights/biases are typically set randomly,\
    \ and the training process calculates the network error for this initial setting\
    \ (point). Starting from this point the training process moves down to the function\
    \ minimum.\n\nAs shown in Figure [3-6](#477043_2_En_3_Chapter.xhtml#Fig6), the\
    \ error function typically has several minimums. The lowest out of them is called\
    \ the *global minimum*, while the rest of them are called the *local minimums*.\
    \ Depending on the starting point of the training process, it can find some of\
    \ the local minimums that are close to the starting point. Each local minimum\
    \ works as a trap for the training process, because once the training process\
    \ reaches a local minimum, any further move would not show changes in the gradient\
    \ value; and the iterative process stops being stacked at the local minimum.\n\
    \nConsider starting points A and B in Figure [3-6](#477043_2_En_3_Chapter.xhtml#Fig6).\
    \ In the case of starting point A, the training process will find the local minimum\
    \ A, which produces a much larger error than in case B. That’s why running the\
    \ same training process multiple times always produces different error results\
    \ for each run (because for each run the training process starts at a random initial\
    \ point).\n\n**Tip**  \nHow do we achieve the best approximation results? When\
    \ programming neural network processing, always arrange the logic of starting\
    \ the training process in a loop. After each call of the training method, the\
    \ logic inside the training method should check whether the error is less than\
    \ the error limit, and if it is not, it should exit from the training method with\
    \ a nonzero error code. The control will be returned to the code that calls the\
    \ training method in a loop. The code calls the training method again if the return\
    \ code is not zero. The logic continues the loop until the calculated error becomes\
    \ less than the error limit. Exit at this point with the zero return code, so\
    \ the training method will no longer be called again. If this is not done, the\
    \ training logic will just loop over the epochs, not being able to clear the error\
    \ limit. Examples of such programming code are shown in later chapters.\n\nWhy\
    \ is it hard to train the network sometimes? The network is considered to be a\
    \ universal function approximation tool. However, there is an exception to this\
    \ statement. The network can approximate only continuous functions well. If a\
    \ function is noncontinuous (making sudden sharp up and down jumps), then the\
    \ approximation results for such functions show low-quality results. The errors\
    \ are so large that such approximation is practically useless.\n\nThe calculation\
    \ shown here is done for a single function point. When we need to approximate\
    \ a function of two or more variables at many points, the volume of calculations\
    \ increases exponentially. Such a resource-intensive process puts high demand\
    \ on computer resources (memory and CPU). That’s why, as mentioned in the introduction\
    \ to the book, earlier attempts to use artificial intelligence were unable to\
    \ process serious tasks. Only later, due to dramatically increased computation\
    \ power, did artificial intelligence achieve a huge success.\n\n# Mini-Batches\
    \ and Stochastic Gradient\n\nWhen the input dataset is very large (such as including\
    \ millions of records), the volume of calculations becomes extremely high. Processing\
    \ such networks takes a long time, and the network learning becomes very slow,\
    \ because the gradient should be calculated for each input record.\n\nTo speed\
    \ up this process, we can break a very large input dataset into a number of chunks\
    \ called *mini-batches* and process each mini-batch independently. Processing\
    \ all records in a single mini-batch file constitutes an epoch, the point where\
    \ weight/bias adjustments are made.\n\nBecause of a much smaller size of the mini-batch\
    \ file, processing all mini-batches will be faster than processing the entire\
    \ dataset as a single file. Finally, instead of calculating the gradient for each\
    \ record of the entire dataset, we calculate here the stochastic gradient, which\
    \ is the average of gradients calculated for each mini-batch.\n\nIf the weight\
    \ adjustment processed for the neurons in a mini-batch file *m* is *W*^(*m*)[*n*],\
    \ then the weight adjustment for such a neuron for the whole dataset is approximately\
    \ equal to the average of adjustments calculated independently for all mini-batches.\n\
    \n*adjustedW*^(*k*)[*s*] ≈ *W*^(*k*)[*s*] *-* ![$$ \\frac{\\eta }{m} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq93.png)\
    \ ![$$ {\\sum}_j^m\\frac{\\partial E}{\\partial {W^j}_s}. $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq94.png)\
    \ where *m* is the number of mini-batches.\n\nNeural network processing for large-input\
    \ datasets is mostly done using mini-batches.\n\n# Summary\n\nThis chapter showed\
    \ the internal neural network calculations. It explained why (even for a single\
    \ point) the volume of calculations is quite high. The chapter introduced the\
    \ δ variable that can reduce the calculation volume. The “Digging Deeper” section\
    \ explained how to call the training method to achieve one of the best approximation\
    \ results. The mini-batch approach was also explained here. The next chapter shows\
    \ how to configure the Windows environment for using Java and the Java network\
    \ processing framework.\n\n# Part II: Neural Network Java Development Environment\n\
    \n# 4. Configuring Your Development Environment\n\nThis book is about neural network\
    \ processing using Java. Before we can start developing any neural network program,\
    \ we need to learn several Java tools. If you are a Java developer and are familiar\
    \ with the tools discussed here, you can skip this chapter. Just make sure that\
    \ all the necessary tools are installed on your Windows machine."
  raw: '## Digging Deeper


    When processing a neural network, we set the error limit (specifically indicating
    how close the trained network results should match the target data). The training
    process works iteratively by gradually moving in the direction toward the error
    function minimum, therefore reducing the error. The iterative process stops when
    the difference between the calculated network results and the target results becomes
    less than the preset error limit.


    Could the network fail to reach the error limit being set? Unfortunately, yes.
    Let’s discuss it in more detail. Of course, the approximation error depends on
    the network architecture being selected (the number of hidden layers and the number
    of neuron within each hidden layer). However, let’s presume that the network architecture
    is being set correctly.


    The approximation error also depends on the function topology. Again, let’s presume
    that the function is monotone and continuous. Still, the network can fail to reach
    the network limit. Why? We already mentioned that back-propagation is an iterative
    process that looks for the minimum of error function. An error function is typically
    a function of many variables, but for simplicity we will show it as the 2D space
    chart. (See Figure [3-6](#477043_2_En_3_Chapter.xhtml#Fig6).)


    ![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig6_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Error function local and global minimums


    The goal of the training process is finding the minimum of the error function.
    The error function depends on the weight/bias parameters being calibrated during
    the iterative training process. The initial values of the weights/biases are typically
    set randomly, and the training process calculates the network error for this initial
    setting (point). Starting from this point the training process moves down to the
    function minimum.


    As shown in Figure [3-6](#477043_2_En_3_Chapter.xhtml#Fig6), the error function
    typically has several minimums. The lowest out of them is called the *global minimum*
    , while the rest of them are called the *local minimums*. Depending on the starting
    point of the training process, it can find some of the local minimums that are
    close to the starting point. Each local minimum works as a trap for the training
    process, because once the training process reaches a local minimum, any further
    move would not show changes in the gradient value; and the iterative process stops
    being stacked at the local minimum.


    Consider starting points A and B in Figure [3-6](#477043_2_En_3_Chapter.xhtml#Fig6).
    In the case of starting point A, the training process will find the local minimum
    A, which produces a much larger error than in case B. That’s why running the same
    training process multiple times always produces different error results for each
    run (because for each run the training process starts at a random initial point).


    Tip


    How do we achieve the best approximation results? When programming neural network
    processing, always arrange the logic of starting the training process in a loop.
    After each call of the training method, the logic inside the training method should
    check whether the error is less than the error limit, and if it is not, it should
    exit from the training method with a nonzero error code. The control will be returned
    to the code that calls the training method in a loop. The code calls the training
    method again if the return code is not zero. The logic continues the loop until
    the calculated error becomes less than the error limit. Exit at this point with
    the zero return code, so the training method will no longer be called again. If
    this is not done, the training logic will just loop over the epochs, not being
    able to clear the error limit. Examples of such programming code are shown in
    later chapters.


    Why is it hard to train the network sometimes? The network is considered to be
    a universal function approximation tool. However, there is an exception to this
    statement. The network can approximate only continuous functions well. If a function
    is noncontinuous (making sudden sharp up and down jumps), then the approximation
    results for such functions show low-quality results. The errors are so large that
    such approximation is practically useless.


    The calculation shown here is done for a single function point. When we need to
    approximate a function of two or more variables at many points, the volume of
    calculations increases exponentially. Such a resource-intensive process puts high
    demand on computer resources (memory and CPU). That’s why, as mentioned in the
    introduction to the book, earlier attempts to use artificial intelligence were
    unable to process serious tasks. Only later, due to dramatically increased computation
    power, did artificial intelligence achieve a huge success.


    ## Mini-Batches and Stochastic Gradient


    When the input dataset is very large (such as including millions of records),
    the volume of calculations becomes extremely high. Processing such networks takes
    a long time, and the network learning becomes very slow, because the gradient
    should be calculated for each input record.


    To speed up this process, we can break a very large input dataset into a number
    of chunks called *mini-batches* and process each mini-batch independently. Processing
    all records in a single mini-batch file constitutes an epoch, the point where
    weight/bias adjustments are made.


    Because of a much smaller size of the mini-batch file, processing all mini-batches
    will be faster than processing the entire dataset as a single file. Finally, instead
    of calculating the gradient for each record of the entire dataset, we calculate
    here the stochastic gradient, which is the average of gradients calculated for
    each mini-batch.


    If the weight adjustment processed for the neurons in a mini-batch file *m* is
    *W*^(*m*)[*n*] , then the weight adjustment for such a neuron for the whole dataset
    is approximately equal to the average of adjustments calculated independently
    for all mini-batches.


    *adjustedW*^(*k*)[*s*] ≈ *W* ^(*k*)[*s*] *-* ![$$ \frac{\eta }{m} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq93.png)
    ![$$ {\sum}_j^m\frac{\partial E}{\partial {W^j}_s}. $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq94.png)
    where *m* is the number of mini-batches.


    Neural network processing for large-input datasets is mostly done using mini-batches.


    ## Summary


    This chapter showed the internal neural network calculations. It explained why
    (even for a single point) the volume of calculations is quite high. The chapter
    introduced the δ variable that can reduce the calculation volume. The “Digging
    Deeper” section explained how to call the training method to achieve one of the
    best approximation results. The mini-batch approach was also explained here. The
    next chapter shows how to configure the Windows environment for using Java and
    the Java network processing framework.


    # Part IINeural Network Java Development Environment


    # 4. Configuring Your Development Environment


    This book is about neural network processing using Java. Before we can start developing
    any neural network program, we need to learn several Java tools. If you are a
    Java developer and are familiar with the tools discussed here, you can skip this
    chapter. Just make sure that all the necessary tools are installed on your Windows
    machine.'
  trans: "\n# 深入探讨\n\n在处理神经网络时，我们会设定误差限值（具体指明训练后的网络结果应与目标数据匹配的接近程度）。训练过程通过逐步向误差函数最小值方向移动来迭代进行，从而减小误差。当计算出的网络结果与目标结果之间的差值小于预设的误差限值时，迭代过程停止。\n\
    \n网络是否可能无法达到设定的误差限值？不幸的是，答案是肯定的。我们来详细讨论一下。当然，逼近误差取决于所选的网络架构（隐藏层的数量以及每个隐藏层中神经元的数量）。不过，我们假设网络架构的设置是正确的。\n\
    \n逼近误差还取决于函数的拓扑结构。同样，我们假设该函数是单调且连续的。即便如此，网络仍可能无法达到误差限值。这是为什么呢？我们之前提到过，反向传播是一个寻找误差函数最小值的迭代过程。误差函数通常是多变量函数，但为简单起见，我们将其展示为二维空间图。（见图\
    \ 3-6。）\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig6_HTML.jpg](img/477043_2_En_3_Fig6_HTML.jpg)\n\
    \n**图 3-6** 误差函数的局部最小值和全局最小值\n\n训练过程的目标是找到误差函数的最小值。误差函数取决于在迭代训练过程中被校准的权重/偏置参数。权重/偏置的初始值通常是随机设定的，训练过程会针对这个初始设定（点）计算网络误差。从该点开始，训练过程会向下移动到函数的最小值。\n\
    \n如图 3-6 所示，误差函数通常有多个最小值。其中最低的那个称为*全局最小值*，其余的都称为*局部最小值*。根据训练过程的起始点不同，它可能会找到靠近起始点的某个局部最小值。每个局部最小值都会成为训练过程的陷阱，因为一旦训练过程到达一个局部最小值，任何进一步的移动都不会显示梯度值的变化；迭代过程就会停滞在该局部最小值处。\n\
    \n考虑图 3-6 中的起始点 A 和 B。在起始点 A 的情况下，训练过程会找到局部最小值 A，它产生的误差比情况 B 大得多。这就是为什么多次运行相同的训练过程，每次都会产生不同的误差结果（因为每次运行，训练过程都从一个随机的初始点开始）。\n\
    \n**提示**  \n我们如何获得最佳的逼近结果？在编写神经网络处理程序时，始终要安排在一个循环中启动训练过程的逻辑。每次调用训练方法后，训练方法内部的逻辑应检查误差是否小于误差限值，如果不是，则应以非零错误码退出训练方法。控制权将返回给在循环中调用训练方法的代码。如果返回码不为零，代码会再次调用训练方法。该逻辑会持续循环，直到计算出的误差小于误差限值。此时以零返回码退出，这样训练方法就不会再被调用。如果不这样做，训练逻辑只会遍历各个周期（epochs），而无法清除误差限值。此类编程代码的示例将在后续章节中展示。\n\
    \n为什么有时训练网络很困难？网络被认为是通用的函数逼近工具。然而，这个说法也有例外。网络只能很好地逼近连续函数。如果一个函数是非连续的（出现突然的剧烈上下跳跃），那么对此类函数的逼近结果会显示出低质量的结果。误差如此之大，以至于这种逼近实际上毫无用处。\n\
    \n这里展示的计算是针对单个函数点进行的。当我们需要在多个点上逼近一个包含两个或更多变量的函数时，计算量会呈指数级增长。这种资源密集型过程对计算机资源（内存和\
    \ CPU）提出了很高的要求。这就是为什么，正如本书引言中提到的，早期使用人工智能的尝试无法处理严肃的任务。直到后来，由于计算能力的急剧提升，人工智能才取得了巨大的成功。\n\
    \n# 小批量与随机梯度\n\n当输入数据集非常大时（例如包含数百万条记录），计算量会变得极其庞大。处理此类网络需要很长时间，网络学习也会变得非常缓慢，因为需要为每条输入记录计算梯度。\n\
    \n为了加速这个过程，我们可以将一个非常大的输入数据集分成多个称为*小批量*的数据块，并独立处理每个小批量。处理单个小批量文件中的所有记录构成一个周期（epoch），即进行权重/偏置调整的时刻。\n\
    \n由于小批量文件的规模小得多，处理所有小批量文件会比将整个数据集作为一个文件处理更快。最后，我们不再为整个数据集的每条记录计算梯度，而是计算随机梯度，即针对每个小批量计算出的梯度的平均值。\n\
    \n如果小批量文件 *m* 中某个神经元的权重调整量为 *W*^(*m*)[*n*]，那么对于整个数据集，该神经元的权重调整量约等于所有小批量独立计算出的调整量的平均值。\n\
    \n*adjustedW*^(*k*)[*s*] ≈ *W*^(*k*)[*s*] *-* ![$$ \\frac{\\eta }{m} $$](img/477043_2_En_3_Chapter_TeX_IEq93.png)\
    \ ![$$ {\\sum}_j^m\\frac{\\partial E}{\\partial {W^j}_s}. $$](img/477043_2_En_3_Chapter_TeX_IEq94.png)\
    \ 其中 *m* 是小批量的数量。\n\n对于大型输入数据集的神经网络处理，大多采用小批量方法。\n\n# 总结\n\n本章展示了神经网络内部的计算过程。它解释了为什么（即使对于单个点）计算量也相当大。本章引入了可以降低计算量的\
    \ δ 变量。“深入探讨”部分解释了如何调用训练方法以获得最佳逼近结果之一。本章还解释了小批量方法。下一章将展示如何配置 Windows 环境以使用 Java\
    \ 和 Java 网络处理框架。\n\n# 第二部分：神经网络 Java 开发环境\n\n# 4. 配置你的开发环境\n\n本书是关于使用 Java 进行神经网络处理的。在我们开始开发任何神经网络程序之前，需要学习几个\
    \ Java 工具。如果你是一名 Java 开发者，并且熟悉这里讨论的工具，可以跳过本章。只需确保你的 Windows 机器上已安装所有必要的工具即可。\n"
- fmt: '# Installing the Java Environment and NetBeans on Your Windows Machine


    As developers, we need both the Java JDK and NetBeans as development tools. Oracle
    provides the download that installs both environments during one execution.


    Go to the following website:


    [`https://www.oracle.com/technetwork/java/javase/downloads/jdk-netbeans-jsp-3413139-esa.html`](https://www.oracle.com/technetwork/java/javase/downloads/jdk-netbeans-jsp-3413139-esa.html)


    The screen shown in Figure [4-1](#477043_2_En_4_Chapter.xhtml#Fig1) will be displayed.


    ![../images/477043_2_En_4_Chapter/477043_2_En_4_Fig1_HTML.png](images/477043_2_En_4_Chapter/477043_2_En_4_Fig1_HTML.png)


    Figure 4-1


    Java downloads


    First accept the license agreement and then click to download the following file
    for Windows x64:


    ```

    jdk-8u111-nb-8-windows-x64.exe

    ```


    Right-click this executable and select Run. Follow the installation instructions.
    This will install the Java SE Development Kit for Windows (`jdk1.8.0_111`) and
    the NetBeans 8-2 development tool, both in the `C:\Program Files` directory. They
    will be in the following subdirectories:


    ```

    C:\Program Files\Java\jdk1.8.0_111

    C:\Program Files\NetBeans 8.2

    ```


    Next, we need to set several environment variables that inform Windows 10 where
    the Java environment is installed. Enter `envir` into the Windows 10 search field
    and select "Edit the system environment variables."


    The dialog shown in Figure [4-2](#477043_2_En_4_Chapter.xhtml#Fig2) will appear.


    ![../images/477043_2_En_4_Chapter/477043_2_En_4_Fig2_HTML.jpg](images/477043_2_En_4_Chapter/477043_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    System Properties dialog


    Click the Environment Variables button on the Advanced tab. Then, click New to
    open the dialog that allows you to enter a new environment variable (Figure [4-3](#477043_2_En_4_Chapter.xhtml#Fig3)).


    ![../images/477043_2_En_4_Chapter/477043_2_En_4_Fig3_HTML.jpg](images/477043_2_En_4_Chapter/477043_2_En_4_Fig3_HTML.jpg)


    Figure 4-3


    New System Variable dialog


    Enter `JAVA_HOME` in the "Variable name" field. Enter the path to the installed
    Java environment in the "Variable value" field (Figure [4-4](#477043_2_En_4_Chapter.xhtml#Fig4)).


    ![../images/477043_2_En_4_Chapter/477043_2_En_4_Fig4_HTML.jpg](images/477043_2_En_4_Chapter/477043_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Setting the `JAVA_HOME` environment variable


    Click OK. Next, select the `CLASSPATH` environment variable and click Update.


    Add the path to the Java JDK `lib` directory and add the Java `jar` file to the
    `CLASSPATH` Variable value field (see Figure [4-5](#477043_2_En_4_Chapter.xhtml#Fig5)).


    ![../images/477043_2_En_4_Chapter/477043_2_En_4_Fig5_HTML.jpg](images/477043_2_En_4_Chapter/477043_2_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Updated `CLASSPATH` system variable


    ```

    C:\Program Files\Java\jre1.8.0_111\lib;

    C:\Program Files\Java\jdk1.8.0_111\jre\bin\java.exe

    ```


    Click OK, OK, and OK. Reboot the system. Your Java environment is set.


    ## Installing the Encog Java Framework


    As you have seen from some of the previous examples of manually processing a neural
    network (Chapter [3](#477043_2_En_3_Chapter.xhtml)), even a simple approximation
    of the function at a single point involves a large volume of calculations. For
    any serious work, you need to use one of the available frameworks.


    At the time of writing this book, several frameworks are available. Here is a
    list of the most commonly used frameworks and the language they were written for:


    *   TensorFlow (Python, C++, and R)

    *   Caffe (C, C++, Python, and MATLAB)

    *   Torch (C++, Python)

    *   Keras (Python)

    *   Deeplearning4j (Java)

    *   Encog (Java)

    *   Neurop (Java)


    Note


    Frameworks implemented in Java are more efficient compared to those implemented
    in Python.


    We are interested in a Java framework (for the obvious reason of developing an
    application on one machine and being able to run it anywhere). We are also interested
    in a fast Java framework and one that is convenient to use. After examining several
    Java frameworks, we selected Encog as the best framework for neural network processing.
    That is the framework we use in this book. The Encog framework was developed by
    Heaton Research, and it is free to use. All the Encog documentation can be found
    on its website.


    To install Encog, go to [`https://www.heatonresearch.com/encog`](https://www.heatonresearch.com/encog).
    Scroll down to the section called Encog Java Links and click the Encog Java Download/Release
    link. On the next screen, select these two files for Encog release 4.3:


    ```

    encog-core-3.4.jar

    encog-java-examples.zip

    ```


    Unzip the second file. Keep these files in a directory you remember, and also
    add the following file to the `CLASSPATH` environment variable (also refer to
    the Java installation):


    ```

    C:\encog-core-3.4\lib\encog-core-3.4.jar

    ```


    ## Installing the XChart Package


    During the data preparation and neural network development/testing, it is useful
    to be able to chart many results. We will be using the XChart Java charting library
    in this book. To download XChart, go to the following website:


    ```

    https://knowm.org/open-source/xchart/

    ```


    The screen in Figure [4-6](#477043_2_En_4_Chapter.xhtml#Fig6) will appear. Click
    the Download 3.8.0 button.


    ![../images/477043_2_En_4_Chapter/477043_2_En_4_Fig6_HTML.jpg](images/477043_2_En_4_Chapter/477043_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    XChart home page


    Unzip the downloaded zip file and double-click the executable installation file.
    Follow the installation instruction, and the XChart package will be installed
    on your machine. Add the following two files:


    ```

    xchart-3.8.0.jar

    xchart-demo-3.8.0.jar

    ```


    to the `CLASSPASS` environment variable (see the way it was done for Java 8 earlier),
    as shown in Figure [4-7](#477043_2_En_4_Chapter.xhtml#Fig7).


    ![../images/477043_2_En_4_Chapter/477043_2_En_4_Fig7_HTML.jpg](images/477043_2_En_4_Chapter/477043_2_En_4_Fig7_HTML.jpg)


    Figure 4-7


    `CLASSPATH` environment variable


    ```

    C:\Download\XChart\xchart-3.8.0\xcart-3.8.0.jar

    C:\Download\XChart\xchart-3.8.0\xchart-demo-3.8.0.jar

    ```


    Update the `PATH` environment variable by adding the JDK binary directory to it.


    ```

    C:\Program Files\Java\jdk1.8.0_111\bin

    ```


    Finally, reboot the system. We are ready for neural network development.


    ## Summary


    We introduced you to the Java environment and explained how to download and install
    the set of tools necessary for building, debugging, testing, and executing neural
    network applications using Java. All the development examples in the rest of this
    book are done using this environment. The next chapter shows you the actual development
    of the neural network program using the Java Encog framework.


    # Neural Networks Development Using the Java Encog Framework


    To learn how to do network program development using Java, we will develop our
    first simple program using the function initially shown in the "Example: Manual
    Approximation of a Function at a Single Point" section of Chapter [3](#477043_2_En_3_Chapter.xhtml).'
