- fmt: '# Forward Pass Calculation


    Here is the forward pass calculation:


    Neuron `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1`


    `H[1] = Ϭ(Z¹[1])`


    Neuron `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1`


    `H[2] = Ϭ(Z¹[2])`


    Neuron `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1`


    `H[3] = Ϭ(Z¹[3])`


    The previous calculations give us the output from neurons `H[1]`, `H[2]`, and
    `H[3]`. Those values are used as input when processing neurons in the next layer
    (in this case, the output layer).


    Neuron `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1`


    `O[1] = Ϭ(Z²[1])`


    The calculation made in the first pass gives us the output of the network (called
    the *network-predicted value*). When we train a network, we use the known output
    for the training points called the *actual* or *target* values. By knowing the
    output value that the network should produce for the given input, we can calculate
    the network error, which is the difference between the target value and the network-calculated
    value (predicted value). For the function we want to approximate on this example,
    the actual (target) values are shown in Table 2-2, column 2.


    **Table 2-2** Input Dataset for the Example


    | x | f(x) |

    | --- | --- |

    | 1 | **1** |

    | 3 | **9** |

    | 5 | **25** |

    | 7 | **49** |


    The calculation is done for each record in the input dataset. For example, processing
    the first record of the input dataset is done by using the following formulas.


    ## Input Record 1


    Here is input record 1:


    Neuron `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1.00 = W¹[11]*1.00 + B[1]*1.00`


    `H[1] = Ϭ(Z¹[1])`


    Neuron `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1.00 = W¹[21]*1.00 + B[1]*1.00`


    `H[2] = Ϭ(Z¹[2])`


    Neuron `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*1.00 + B[1]*1.00`


    `H[3] = Ϭ(Z¹[3])`


    Neuron `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`


    `O[1] = Ϭ(Z²[1])`


    The error for record 1 is as follows:


    `E[1] = Ϭ(Z²[1]) – Target value for Record 1 = Ϭ(Z²[1]) – 1.00`


    ## Input Record 2


    Here is input record 2:


    Neuron `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1.00 = W¹[11]*3.00 + B[1]*1.00`


    `H[1] = Ϭ(Z¹[1])`


    Neuron `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1.00 = W¹[21]*3.00 + B[1]*1.00`


    `H[2] = Ϭ(Z¹[2])`


    Neuron `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*3.00 + B[1]*1.00`


    `H[3] = Ϭ(Z¹[3])`


    Neuron `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`


    `O[1] = Ϭ(Z²[1])`


    The error for record 2 is as follows:


    `E[1] = Ϭ(Z²[1]) – Target value for Record 2 = Ϭ(Z²[1]) – 9.00`


    ## Input Record 3


    Here is input record 3:


    Neuron `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1.00 = W¹[11]*5.00 + B[1]*1.00`


    `H[1] = Ϭ(Z¹[1])`


    Neuron `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1.00 = W¹[21]*5.00 + B[1]*1.00`


    `H[2] = Ϭ(Z¹[2])`


    Neuron `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*5.00 + B[1]*1.00`


    `H[3] = Ϭ(Z¹[3])`


    Neuron `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`


    `O[1] = Ϭ(Z²[1])`


    The error for record 3 is as follows:


    `E[1] = Ϭ(Z²[1]) – Target value for Record 3 = Ϭ(Z²[1]) – 25.00`


    ## Input Record 4


    Here is input record 4:


    Neuron `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1.00 = W¹[11]*7.00 + B[1]*1.00`


    `H[1] = Ϭ(Z¹[1])`


    Neuron `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1.00 = W¹[21]*7.00 + B[1]*1.00`


    `H[2] = Ϭ(Z¹[2])`


    Neuron `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*7.00 + B[1]*1.00`


    `H[3] = Ϭ(Z¹[3])`


    Neuron `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`


    `O[1] = Ϭ(Z²[1])`


    The error for input record 4 is as follows:


    `E[1] = Ϭ(Z²[1]) – Target value for Record 4 = Ϭ(Z²[1]) – 49.00`


    When all the records have been processed, such a point in processing is called
    the *epoch*. At that point, we take the average of the network errors for all
    records, as in `E = (E1 + E2 + E3 + E4)/4`, and that is the error at the current
    epoch. Obviously, the error at the first epoch (with randomly initially selected
    weights/biases) will be too large for a good function approximation; therefore,
    we need to reduce this error to the acceptable (desired) value called the *error
    limit*, which we set at the beginning of processing. Reducing the network error
    is done in the backward pass (also called *back-propagation*).


    ## Back-Propagation Pass


    How can the network error be reduced? Obviously, the initial weight and bias values
    were randomly set, and they are not good, which leads to a significant error for
    the epoch.


    We need to adjust them so that their new values will lead to a smaller network-calculated
    error. Back-propagation does this by redistributing the error between all network
    neurons in the output and hidden layers and adjusting their initial weight values.
    Adjustment is also done for the layer biases.


    To adjust the weight of each neuron, we calculate the partial derivative of the
    error function with respect to the neuron''s output. For example, the calculated
    partial derivative for neuron `O[1]` is `∂E/∂O₁`. Because the partial derivative
    points to the direction of the increased function value (but we need to decrease
    the value of the error function), the weight adjustment should be done in the
    opposite direction.


    *Adjusted value of weight* = *original value of weight* – η * `∂E/∂O₁`


    Here, η is the learning rate for the network, and it controls how fast the network
    learns. Its value is typically set to be between 0.1 and 1.0.


    A similar calculation is done for the bias of each layer. For bias `B[1]`, the
    calculated partial derivative is `∂E/∂B₁`; then the adjusted bias is calculated
    as follows:


    *Adjusted value of bias* `B[1]` = *original value of bias* `B[1]` – η * `∂E/∂B₁`


    By repeating this calculation for each network neuron and each layer bias, we
    obtain a new set of adjusted weight/bias values. Having a new set of weight/bias
    values, we return to the forward pass and calculate the new network output using
    the adjusted weights/biases. We also recalculate the network output error.


    Because the adjustment of weights/biases is done in the opposite direction from
    the gradient (partial derivatives), the newly network-calculated error should
    decrease. We repeat both forward and backward passes in a loop until the error
    becomes less than our limit error. At that point, the network is considered to
    be trained, and we save the trained network on disk. The trained network includes
    all weight and bias parameters that approximate the predicted function value to
    the needed degree of precision. In the next chapter, we will manually process
    some example and show all the detail calculations. However, before doing that,
    we need to refresh our knowledge of the function derivative and gradient.'
