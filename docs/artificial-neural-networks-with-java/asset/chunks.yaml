    ### 示例：螺旋类函数的逼近


    在本节中，我们将讨论一组具有螺旋特性的函数。这些函数有一个共同属性：在某些点上，单个`x`值对应多个函数值。这类函数中的某个函数以难以用神经网络逼近而著称。我们将尝试逼近图
    9-6 所示的函数。


    ![../images/477043_2_En_9_Chapter/477043_2_En_9_Fig6_HTML.jpg](img/477043_2_En_9_Fig6_HTML.jpg)


    **图 9-6** – 对某些`xPoints`具有多个值的函数


    该函数由两个方程描述：


    ```

    x(t) = 10 + 0.5*t*Cos(0.3*t).

    y(t) = 10 + 0.5*t*Sin(0.3*t).

    ```


    其中，`t`是一个角度。


    绘制`x`和`y`的值将得到图 9-6 所示的图表。同样，我们假设函数公式未知，并且该函数通过其在 1000 个点上的值给出。像往常一样，我们首先尝试用传统方法逼近这个函数。表
