    \ File(networkFileName));\nint i = - 1; // 当前记录的索引\ndouble xPoint = -0.00;\nfor\
    \ (MLDataPair pair:  testingSet)\n{\ni++;\nxPoint = xPoint + 2.00;\nMLData inputData\
    \ = pair.getInput();\nMLData actualData = pair.getIdeal();\nMLData predictData\
    \ = network.compute(inputData);\n// 这些值是归一化的，因为整个输入都是归一化的\nnormInputXPointValueFromRecord\
    \ = inputData.getData(0);\nnormInputYPointValueFromRecord = inputData.getData(1);\n\
    normTargetValueFromRecord = actualData.getData(0);\nnormPredictValueFromRecord\
