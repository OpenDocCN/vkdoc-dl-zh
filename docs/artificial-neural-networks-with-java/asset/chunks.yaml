    \ = 0.00538  \nxPoint = 3.99900  yPoint = 3.97900  TargetValue = 49.79735  PredictValue\
    \ = 49.79433  DiffPerc = 0.00607  \nxPoint = 3.99900  yPoint = 3.99900  TargetValue\
    \ = 49.71976  PredictValue = 49.71588  DiffPerc = 0.00781  \nMaxErrorPerc  = 0.017317654932154674\
    \  \nAverErrorPerc  = 0.007356218626151153  \n列表 12-4  \n测试结果  \n```  \n\n图 12-5\
    \ 展示了测试结果的投影图。  \n\n![../images/477043_2_En_12_Chapter/477043_2_En_12_Fig5_HTML.jpg](img/477043_2_En_12_Fig5_HTML.jpg)\
    \  \n\n**图 12-5**  \n测试结果的投影图  \n\n近似结果是可以接受的；因此，无需使用微批量方法。  \n\n## 总结  \n\n在本章中，我们讨论了如何使用神经网络进行三维空间中的函数近似。我们了解到，三维空间中的函数近似（二元函数）与二维空间中的函数近似方法类似。唯一的区别在于，网络架构应包含两个输入，并且训练和测试数据集应包含所有可能的\
    \ `x` 和 `y` 值组合的记录。这些结果可以推广到对多于两个变量的函数进行近似。  \n\n# 第三部分 计算机视觉简介  \n\n# 13. 图像识别\
    \  \n\n神经网络也可用于识别图像。图像识别（图像分类）是人工智能最重要的分支之一。计算机视觉实际上是一种视觉模式识别技术。它被银行广泛用于处理支票，被邮局用于识别地址。在许多领域（自动驾驶汽车、人脸识别等），图像识别都极其重要。\
    \  \n\n同时，图像识别也是人工智能中最困难的学科之一。表面上看，我们似乎可以复用本书前几章学到的神经网络处理的所有方面来识别图像。每张数字图像都是一组像素或点，因此，如果我们创建一个包含不同图像的非常大的数据集，将这些数据输入神经网络并进行训练，那么网络应该能够完成这项工作。\
    \  \n\n不幸的是，实际情况要复杂得多。我们可以训练网络识别各种单一图像，然后要求网络识别给定的图像（例如，它是猫还是狗？）。但即使是单一物体类型，也存在巨大的变化（狗有多少种，它们的形状、毛发、面部等）。此外，如果狗的图像显示的是站立的狗，程序将无法识别坐着的狗、移动的狗、倒置的狗或从不同角度显示的狗。目前正在进行一些研究，以构建三维神经网络，而处理彩色图像又增加了另一层难度。\
    \  \n\n除此之外，真实图像可能显示多个物体叠加在一张图像上。图像还可能因阴影落在物体的某些部分或阳光照射在其他部分而变得更加复杂，例如一只猫坐在沙发上，或一只狗被汽车部分遮挡。你应该能理解这个大致概念。\n"
- fmt: '# Classification of Handwritten Digits


    In this section, we will discuss the simple task of image recognition, specifically,
    recognizing handwritten digits. Consider the sequence of handwritten digits shown
    in Figure [13-1](#477043_2_En_13_Chapter.xhtml#Fig1).


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig1_HTML.jpg](images/477043_2_En_13_Chapter/477043_2_En_13_Fig1_HTML.jpg)


    Figure 13-1


    Handwritten digits


    These digits are written by different people. Even the same person can write digits
    differently, depending on the type of a pen used, whether the person is standing
    or sitting, and many other factors. See the practically endless variations of
    the same digits written by people in Figure [13-2](#477043_2_En_13_Chapter.xhtml#Fig2).


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig2_HTML.jpg](images/477043_2_En_13_Chapter/477043_2_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Variations of handwritten digits


    If we collect thousands (or millions) of handwritten digits and use them to train
    the neural network, we can build a digit recognizer program.


    ## Preparing the Input Data


    To build our input, we will use the MNIST datasets, which contain tens of thousands
    of scanned images of handwritten digits. MNIST is a modified subset of two datasets
    collected by the U.S. National Institute of Standards and Technology (NIST). The
    first dataset includes 60,000 records, and it should be used for network training.
    The second dataset consists of 10,000 records, and it should be used to test the
    trained network.


    Each record in both datasets represents an image of a digit (28*28 pixels = 784
    pixels). The images are black and white. Each record format consists of 785 fields.
    The first field is a textual representation of the digit (for example, 5). The
    following 784 fields represent the grayscale number of each pixel intensity in
    the image. Each pixel value is a single number that represents the brightness
    of the pixel (pixel intensity) with possible values from 0 to 255, where 0 is
    white, and the rest of numbers represent darkening shades of gray. Figure [13-3](#477043_2_En_13_Chapter.xhtml#Fig3)
    shows a fragment of the image.


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig3_HTML.jpg](images/477043_2_En_13_Chapter/477043_2_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Fragment of the record representing an image


    You can get both files by downloading them from the `http://yann.lecun.com/exdb/mnist/`
    website. However, the data files on this website are formatted for the Python
    programming language, so downloading them from this site will not do you any good.
    Instead, we will use files that have been converted to CSV (Excel) format (which
    we have used in all the examples in this book). You can obtain these files from
    the GitHub site for this book.


    Figure [13-4](#477043_2_En_13_Chapter.xhtml#Fig4) shows a fragment of one of the
    CSV files.


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig4_HTML.jpg](images/477043_2_En_13_Chapter/477043_2_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Fragment of the CSV file


    ## Input Data Conversion


    We need to build a program that trains the neural net to recognize (classify)
    digits. For this, we first need to find a way of coding the digit that each record
    represents in some digital form that the network understands. We will represent
    each digit as a ten-field sequence (each field in the sequence has a character
    value 0 or 1). For example, the digit 5 will be represented by having 1 in the
    fifth position (field) of the ten-field sequence (with the rest of the fields
    being set to 0). So, it is a kind of byte-wise representation of a digit.


    Figure [13-5](#477043_2_En_13_Chapter.xhtml#Fig5) shows an example for the digit
    5.


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig5_HTML.jpg](images/477043_2_En_13_Chapter/477043_2_En_13_Fig5_HTML.jpg)


    Figure 13-5


    Bytewise representation of the digit 5


    We will put these ten fields of the byte-wise image presentation at the end of
    each record, and they will be considered as the output fields for the network.


    Therefore, we need to convert the records of the original CSV file that consists
    of 785 fields (the first field is the digit as a letter, and the following 784
    fields are the grayscale numbers of each pixel in the image) to the records in
    a different format. The format of the converted record is as follows: the first
    784 fields are the grayscale numbers of each pixel in the image following by 10
    fields, the byte-wise presentation of the record’s digit.


    Figure [13-6](#477043_2_En_13_Chapter.xhtml#Fig6) shows the graphical representation
    of the conversion process.


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig6_HTML.png](images/477043_2_En_13_Chapter/477043_2_En_13_Fig6_HTML.png)


    Figure 13-6


    Record conversion


    So, the record will contain the first 784 fields, which are the input fields for
    the network, followed by the 10 fields that are the target fields for the network.
    When training the network, we teach the network that if the first 784 fields contain
    the given grayscale pixel intensity values, then this represents the image of
    the digit 5 (and so for the rest of images).


    While doing this conversion, we also want to normalize the input grayscale field
    values and the target field values to the interval [-1.00, 1.00].


    ## Building the Conversion Program


    The CVS input train dataset is `C:\Image_Recognition\MNIS_Data\mnist_train.csv`.
    The CVS input test dataset is `C:\Image_Recognition\MNIS_Data\mnist_test.csv`.


    These are the corresponding files after conversion:


    ```

    C:\Image_Recognition\MNIS_Data\ mnist_train_input_Norm.csv

    C:\Image_Recognition\MNIS_Data\ mnist_test_input_Norm.csv

    ```


    The conversion logic reads all the records from the input dataset. For each record,
    it takes the first field (which is the character digit) and builds the corresponding
    target fields (10 fields, the byte-wise representation of the digit). The program
    puts these 10 target fields at the end of the output record (right after the 784
    input fields).


    The 784 input fields (located in the input record after the digit field) are put
    at the beginning of the converted record. Finally, we normalize all fields of
    the converted record. See Listing [13-1](#477043_2_En_13_Chapter.xhtml#PC2) and
    Listing [13-2](#477043_2_En_13_Chapter.xhtml#PC3).'
