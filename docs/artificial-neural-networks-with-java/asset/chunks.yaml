    As you remember from the preceding chapters, neural network back-propagation uses
    partial derivatives of the network error function to redistribute the error calculated
    in the output layer to all hidden-layer neurons. It repeats this iterative process
    by moving in the opposite direction of the function to find one of the local (possibly
    global) error function minimums. Due to the problem of calculating divergent/derivatives
    for noncontinuous functions, approximation such functions is problematic.


