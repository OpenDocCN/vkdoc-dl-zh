    | 0.75 | 0.5625 |

    | 1 | 1 |

    | 1.25 | 1.5625 |

    | 1.5 | 2.25 |

    | 1.75 | 3.0625 |

    | 2 | 4 |


    Next, Table [5-2](#477043_2_En_5_Chapter.xhtml#Tab2) shows the dataset that we
    will use for testing the trained network. The `xPoint` values in this dataset
    are different than the `xPoint` values in the training dataset because (as you
    already know) the file used for testing should have different input data (not
    used in the training file).


    Table 5-2


    Testing Dataset


    | xPoint | Function Value |

    | --- | --- |

    | 0.2 | 0.04 |

    | 0.3 | 0.09 |

    | 0.4 | 0.16 |

