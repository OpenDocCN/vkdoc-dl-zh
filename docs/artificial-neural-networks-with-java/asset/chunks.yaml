    实际值与预测值之间明显的差异是由于粗略的函数近似造成的。通常可以通过调整网络架构（隐藏层数量、层中神经元数量）来改善近似精度。然而，这里的主要问题是用于训练网络的点数非常少，且点与点之间的距离相对较大。为了获得显著更好的函数近似结果，应该使用更多的点（点与点之间的距离要小得多）来近似这个函数。


