    \ast \frac{\partial {Z}_2^1}{\partial {W^1}_{21}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq86.png)   (3-95)


    ![$$ \frac{\partial E}{\partial {W^1}_{22}}= $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq87.png)δ¹[2]![$$
    \ast \frac{\partial {Z}_2^1}{\partial {W^1}_{22}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq88.png)   (3-96)


    ![$$ \frac{\partial E}{\partial {W^1}_{31}}= $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq89.png)δ¹[3]![$$
    \ast \frac{\partial {Z}_3^1}{\partial {W^1}_{31}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq90.png)   (3-97)


    ![$$ \frac{\partial E}{\partial {W^1}_{32}}= $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq91.png)δ¹[3]![$$
    \ast \frac{\partial {Z}_3^1}{\partial {W^1}_{32}} $$](images/477043_2_En_3_Chapter/477043_2_En_3_Chapter_TeX_IEq92.png)   (3-98)


    In general, calculating the partial derivative of error function E with respect
    to its weights can be done by multiplying the node’s delta by the partial derivative
    of the error function with respect to the corresponding weight. That saves us
    from calculating some redundant data. That means that we can calculate δ values
    for each network node and then use the formulas in equation [3-93](#477043_2_En_3_Chapter.xhtml#Par188)
    and equation [3-98](#477043_2_En_3_Chapter.xhtml#Par195).


    ## Matrix Form of Network Calculation


    For the same network, we can express all the calculations using matrices. For
    example, by introducing the Z vector, W matrix, and B vector, we can get the same
    calculation results as we get when using scalars. See Figure [3-5](#477043_2_En_3_Chapter.xhtml#Fig5).


    ![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig5_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Matrix form of network calculation


    Using matrix or scalar calculations is a matter of preference. Using a good matrix
    library provides fast calculation, but the disadvantage is a high memory demand,
    since matrixes should be kept in memory.'
