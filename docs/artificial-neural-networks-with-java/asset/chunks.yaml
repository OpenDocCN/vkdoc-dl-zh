    ### Network Architecture for the Example


    For this example, we will use the network with the output layer consisting of
    the single neuron, three hidden layers (each holding five neurons), and the output
    layer holding a single neuron. Again, we came up with this architecture experimentally
    (by trying and testing). Figure [6-6](#477043_2_En_6_Chapter.xhtml#Fig6) shows
    the training architecture.


