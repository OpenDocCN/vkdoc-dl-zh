    Why are many more points needed for approximating this function? Function approximation
    controls the behavior of the approximated function at the points processed during
    training. The network learns to make the approximated results closely match the
    actual function values at the training points, but it has much less control of
    the function behavior between the training points. Consider the example in Figure
    [5-26](#477043_2_En_5_Chapter.xhtml#Fig26).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig26_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig26_HTML.jpg)


    **Figure 5-26** Original and approximated functions


    In the graph in Figure [5-26](#477043_2_En_5_Chapter.xhtml#Fig26), the approximation
    function values closely match the original function values at the training points,
    but not between points. The errors for testing points are deliberately exaggerated
    on Figure [5-26](#477043_2_En_5_Chapter.xhtml#Fig26) to make the point clearer.
    If many more training points are used, then the testing points will always be
    much closer to one of the training points, and the testing results at the testing
    points will be much closer to the original function value at those points.


    ## Summary


    The chapter described how to develop neural network applications using the Java
    Encog framework. We used a step-by-step approach to explain all the details that
    are used when coding neural network applications using Encog. The examples in
    the rest of this book use the Encog framework.


    # 6. Neural Network Prediction Outside of the Training Range


    Data preparation for neural network processing is typically the most difficult
    and time-consuming task. In addition to the enormous volume of data that could
    easily reach millions and even billions of rows, the main difficulty is in preparing
    the data in the correct format for the task in question. In this and the following
    chapters, we will demonstrate several techniques of data preparation/transformation.


    The goal of this example is to show how to deal with the major restrictions of
    neural network approximation, which states that predictions should be used only
    inside of the training interval. This restriction exists for any function approximation
    mechanism (not only for approximation by neural networks but also using calculus).
    Getting function values outside of the training interval is called *forecasting*
    (rather than prediction). Forecasting function values is based on extrapolation,
    while the neural network processing mechanism is based on the approximation mechanism.
    Getting the function approximation value outside the training interval simply
    produces the wrong result. This is one of the important concepts to be aware of.


    ## Example: Approximating Periodic Functions Outside of the Training Range


    We will use for this example the tangent periodic function `y = tan(x)`. We pretend
    that we don’t know what type of periodic function is given to us; the function
    is given to us by its values at certain points. Table [6-1](#477043_2_En_6_Chapter.xhtml#Tab1)
    shows the function values on the interval [0, 1.2]. We will use this data for
    network training.


