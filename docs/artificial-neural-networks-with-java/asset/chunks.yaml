    ## 示例：使用 Java 环境进行函数逼近


    图 5-1 展示了该函数，我们已知其在九个点上的值。


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig1_HTML.jpg](img/477043_2_En_5_Fig1_HTML.jpg)


    图 5-1


    待逼近的函数


    如前所述，我们将使用 Encog 软件进行神经网络处理。Encog 要求其处理的所有文件均为 CSV 格式。这实际上是一种简化的 Excel 文件格式，每条记录包含逗号分隔的值。CSV
    文件的扩展名为 `.csv`。另外，请记住 Encog 要求处理文件中的第一条记录为标签记录。相应地，表 5-1 展示了本例中带有给定函数值的输入（训练）数据集。


    表 5-1


    训练数据集


    | xPoint | 函数值 |

    | --- | --- |

    | 0.15 | 0.0225 |

    | 0.25 | 0.0625 |

    | 0.5 | 0.25 |

    | 0.75 | 0.5625 |

    | 1 | 1 |

    | 1.25 | 1.5625 |

    | 1.5 | 2.25 |

    | 1.75 | 3.0625 |

    | 2 | 4 |


    接下来，表 5-2 展示了我们将用于测试已训练网络的数据集。该数据集中的 `xPoint` 值与训练数据集中的 `xPoint` 值不同，因为（如你所知）用于测试的文件应包含不同的输入数据（未在训练文件中使用）。


    表 5-2


    测试数据集


    | xPoint | 函数值 |

    | --- | --- |

    | 0.2 | 0.04 |

    | 0.3 | 0.09 |

    | 0.4 | 0.16 |

    | 0.7 | 0.49 |

    | 0.95 | 0.9025 |

    | 1.3 | 1.69 |

    | 1.6 | 2.56 |

    | 1.8 | 3.24 |

    | 1.95 | 3.8025 |


    ## 网络架构


    图 5-2 展示了本例的网络架构。该网络设置为：输入层包含一个神经元，七个隐藏层（每层五个神经元），输出层包含一个神经元。


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig2_HTML.jpg](img/477043_2_En_5_Fig2_HTML.jpg)


    图 5-2


    网络架构


    ## 归一化输入数据集


    训练数据集和测试数据集都需要在区间 [-1, 1] 上进行归一化。让我们构建一个 Java 程序来归一化这些数据集。要归一化一个文件，需要知道待归一化字段的最大值和最小值。训练数据集的第一列最小值为
    0.15，最大值为 2.00。训练数据集的第二列最小值为 0.0225，最大值为 4.00。


    测试数据集的第一列最小值为 0.20，最大值为 1.95。测试数据集的第二列最小值为 0.04，最大值为 3.8025。因此，为简单起见，我们为训练数据集和测试数据集选择的最小值和最大值分别为
    `min = 0.00` 和 `max = 5.00`。


    用于在区间 [-1, 1] 上归一化值的公式如下：


    `f(x) = ( (x – D[L])*(N[H] – N[L]))/(D[H] – D[L]) + N[L]`


    其中，


    - `x` = 输入数据点。

    - `D[L]` = 输入数据集中 `x` 的最小（最低）值。

    - `D[H]` = 输入数据集中 `x` 的最大（最高）值。

    - `N[L]` = 归一化区间 [-1, 1] 的左端点 = -1。

    - `N[H]` = 归一化区间 [-1, 1] 的右端点 = 1。


    ## 构建归一化两个数据集的 Java 程序


    单击桌面上的 NetBeans 图标以打开 NetBeans IDE。IDE 屏幕分为几个窗口。导航窗口是您查看项目的地方（图 5-3）。单击项目前面的 `+`
    图标可显示项目的组件，例如源包、测试包和库。


