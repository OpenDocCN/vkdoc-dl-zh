- fmt: '# Digging Deeper


    Neural network back-propagation is considered as a universal function approximation
    mechanism. However, there is a strict limitation for the types of functions neural
    networks are able to approximate: the functions must be continuous (universal
    approximation theorem).


    Let’s discuss what happens when the network attempts to approximate a noncontinuous
    function. To research this question, we use a small noncontinuous function that
    is given by its values at 20 points. These points surround the point of a rapidly
    changing function pattern. Figure [8-9](#477043_2_En_8_Chapter.xhtml#Fig9) shows
    the chart.


    ![../images/477043_2_En_8_Chapter/477043_2_En_8_Fig9_HTML.jpg](images/477043_2_En_8_Chapter/477043_2_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Chart of the function with rapidly changing pattern


    Table [8-8](#477043_2_En_8_Chapter.xhtml#Tab8) shows the function values at 20
    points.


    Table 8-8


    Function Values


    | `xPoint` | Function Value |

    | --- | --- |

    | 533 | 1282.71 |

    | 534 | 1362.93 |

    | 535 | 1388.91 |

    | 536 | 1469.25 |

    | 537 | 1394.46 |

    | 538 | 1366.42 |

    | 539 | 1498.58 |

    | 540 | 1100 |

    | 541 | 980 |

    | 542 | 900 |

    | 543 | 600 |

    | 544 | 500 |

    | 545 | 1436.51 |

    | 546 | 1429.4 |

    | 547 | 1314.95 |

    | 548 | 1320.28 |

    | 549 | 1366.01 |

    | 550 | 1239.94 |

    | 551 | 1160.33 |

    | 552 | 1249.46 |

    | 553 | 1255.82 |


    This file is normalized before being processed. Figure [8-10](#477043_2_En_8_Chapter.xhtml#Fig10)
    shows the network architecture used for approximating this function.


    ![../images/477043_2_En_8_Chapter/477043_2_En_8_Fig10_HTML.jpg](images/477043_2_En_8_Chapter/477043_2_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Network architecture


    Executing the training process shows the following results:


    - The maximum error percent (the maximum percent of the difference between the
    actual and predicted function values) is greater than 130.06 percent.

    - The average error percent (the average percent of the difference between the
    actual and predicted function values) is greater than 16.25 percent.


    Figure [8-11](#477043_2_En_8_Chapter.xhtml#Fig11) shows the chart of the processing
    results.


    ![../images/477043_2_En_8_Chapter/477043_2_En_8_Fig11_HTML.jpg](images/477043_2_En_8_Chapter/477043_2_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Chart of the processing results


    Our goal is to understand what happens during this noncontinuous function approximation
    process that leads to such poor results. To research this, we will calculate the
    forward pass result (the error) for each record. The calculation for a forward
    pass is done using equations [8-1](#477043_2_En_8_Chapter.xhtml#Par56) through
    [8-5](#477043_2_En_8_Chapter.xhtml#Par68).


    Neuron `H[1]`


    `Z¹[1] = W¹[11]*I[1] + B[1]*1`


    `H[1] = Ϭ(Z¹[1])`  (8-1)


    Neuron `H[2]`


    `Z¹[2] = W¹[21]*I[1] + B[1]*1`


    `H[2] = Ϭ(Z¹[2])`  (8-2)


    Neuron `H[3]`


    `Z¹[3] = W¹[31]*I[1] + B[1]*1`


    `H[3] = Ϭ(Z¹[3])`  (8-3)


    These calculations give us the output from neurons `H[1]`, `H[2]`, and `H[3]`.
    Those values are used when processing neurons in the next layer (in this case,
    the output layer).


    Neuron `O[1]`


    `Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1`


    `O[1] = Ϭ(Z²[1])`  (8-4)


    The error function is as follows:


    `E = 0.5 * (Actual Value for Record - O[1])²`  (8-5)


    In equations [8-1](#477043_2_En_8_Chapter.xhtml#Par56) through [8-3](#477043_2_En_8_Chapter.xhtml#Par62),
    `Ϭ` is the activation function, `W` is the weight, and `B` is the bias.


    Table [8-9](#477043_2_En_8_Chapter.xhtml#Tab9) shows the calculated error for
    each record for the first forward pass.


    Table 8-9


    Records Errors for the First Pass


    | Day | Function Value | | | |

    | --- | --- | --- | --- | --- |

    | -0.76 | -0.410177778 | | | |

    | -0.68 | -0.053644444 | | | |

    | -0.6 | 0.061822222 | | | |

    | -0.52 | 0.418888889 | | | |

    | -0.44 | 0.086488889 | | **Max** | **0.202629155** |

    | -0.36 | -0.038133333 | | **Min** | **0.156038965** |

    | -0.28 | 0.549244444 | | | |

    | -0.2 | -1.222222222 | | **Difference Percent** | **29.86** |

    | -0.12 | -1.755555556 | | | |

    | -0.04 | -2.111111111 | | | |

    | 0.04 | -3.444444444 | | | |

    | 0.12 | -3.888888889 | | | |

    | 0.2 | 0.273377778 | | | |

    | 0.28 | 0.241777778 | | | |

    | 0.36 | -0.266888889 | | | |

    | 0.44 | -0.2432 | | | |

    | 0.52 | -0.039955556 | | | |

    | 0.6 | -0.600266667 | | | |

    | 0.68 | -0.954088889 | | | |

    | 0.76 | -0.557955556 | | | |

    | 0.84 | -0.529688889 | | | |


    The difference between the maximum and minimum error values for all records is
    very large and is about 30 percent. That’s where the problem exists. When all
    records are processed, this point is the epoch. At that point, the network calculates
    the average error (for all processed errors in the epoch) and then processes the
    back-propagation step to redistribute the average error among all neurons in the
    output and hidden layers, adjusting their weights and bias values.


    The calculated errors for all records depend on the initial (randomly assigned)
    weight/bias parameters set for this first pass. When the function consists of
    continuous (monotone) function values that are gradually changed in an orderly
    way, the errors calculated for each record based on the initial weight/bias values
    are close enough, and the average error is close to the error calculated for each
    record. However, when the function is noncontinuous, its pattern rapidly changes
    at some points. That leads to the situation when the randomly selected initial
    weight/bias values are not good for all records, leading to a wide difference
    between record errors.


    Next, the back-propagation adjusts the initial weight/bias values of the neurons,
    but the problem continues to exist. Those adjusted values are not good for all
    records that belong to different function pattern (topologies).


    **Tip**


    The micro-batch method requires a larger volume of calculation than the conventional
    way of network processing, so it should be used only when the conventional method
    is unable to deliver good approximation results.


    ## Summary


    Neural network approximation of noncontinuous functions is a difficult task for
    neural networks. It is practically impossible to obtain a good-quality approximation
    for such functions. This chapter introduced the micro-batch method that is able
    to approximate any noncontinuous function with high-precision results. The next
    chapter shows how the micro-batch method substantially improves the approximation
    results for continuous functions with complex topology.


    # 9. Approximation of Continuous Functions with Complex Topology


    This chapter shows that the micro-batch method substantially improves the approximation
    results of continuous functions with complex topology.'
