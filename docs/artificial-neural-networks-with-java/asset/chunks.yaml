- fmt: 'As always, we load the training file in memory and build the network. The
    built network has the input layer with 10 neurons, 4 hidden layers (each with
    13 neurons), and the output layer with a single neuron. Once the network is built,
    we train the network by looping over the epochs until the network error clears
    the error limit. Finally, we save the trained network on disk (it will be used
    later by the testing method).


    Notice that we call the training method in a loop (as we did in the previous example).
    When after 11,000 iterations the network error is still not less than the error
    limit, we exit the training method with the return code 1. That will trigger calling
    the training method again with the new set of weight/bias parameters (Listing
    [7-2](#477043_2_En_7_Chapter.xhtml#PC2)).


    ```

    // Load the training CSV file in memory

    MLDataSet trainingSet =

    loadCSV2Memory(trainFileName,numberOfInputNeurons,numberOfOutputNeurons,

    true,CSVFormat.ENGLISH,false);

    // Create a neural network

    BasicNetwork network = new BasicNetwork();

    // Input layer

    network.addLayer(new BasicLayer(null,true,10));

    // Hidden layer

