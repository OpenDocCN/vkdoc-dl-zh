    ```


    最后，重启系统。我们已准备好进行神经网络开发。


    ## 总结


    我们向您介绍了 Java 环境，并解释了如何下载和安装使用 Java 构建、调试、测试和执行神经网络应用程序所需的一组工具。本书其余部分的所有开发示例均使用此环境完成。下一章将向您展示如何使用
    Java Encog 框架实际开发神经网络程序。


