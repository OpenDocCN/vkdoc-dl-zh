  trans: '

    #### 计算 `W²[11]` 的调整量


    应用链式法则求导，`∂E/∂W²[11]` 可由以下公式表示：


    ![$$ \frac{\partial E}{\partial {W²}_{11}}=\frac{\partial E}{\partial {O}_1}\ast
    \frac{\partial {O}_1}{\partial {Z}_1²}\ast \frac{\partial {Z}_1²}{\partial {W²}_{11}}
    $$](img/477043_2_En_3_Chapter_TeX_IEq2.png) (3-8)


    让我们使用微积分分别计算等式的每个部分。


    `E = 0.5*(T[1] – O[1])²`


    ![$$ \frac{\partial E}{\partial {O}_1}=2\ast 0.5\ast \left({T}_1\hbox{--} {O}_1\right)\ast
    \frac{\partial \left(0.5\left(T1\hbox{--} O1\right)\right)}{\partial {O}_1}= $$](img/477043_2_En_3_Chapter_TeX_IEq3.png)
    `(T[1] - O[1])*(-1) = O[1]- T[1] = 0.80 – 0.6101988445912522 = -0.18980115540874787`
    (3-9)


    ![$$ \frac{\partial {O}_1}{\partial {Z}_1²} $$](img/477043_2_En_3_Chapter_TeX_IEq4.png)
    是 Sigmoid 激活函数的导数，等于 `O[1]*(1- O[1]) = 0.6101988445912522*(1 - 0.6101988445912522)
    = 0.23785621465075305` (3-10)


    ![$$ Calculating\ \frac{\partial {Z}_1²}{\partial {W}_{11}²} $$](img/477043_2_En_3_Chapter_TeX_Equa.png)


    `Z²[1] = W²[11]* H[1] + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00` (3-11)


    ![$$ \frac{\partial {Z}_1²}{\partial {W}_{11}²}=\mathrm{H}1=0.5502547397403884
    $$](img/477043_2_En_3_Chapter_TeX_IEq5.png) (3-12)


    注意，![$$ \frac{\partial \left({W}²¹²\ast H2+{W}²¹³\ast H3+B2\ast 1.00\right)}{\partial
    {W²}_{11}}=0 $$](img/477043_2_En_3_Chapter_TeX_IEq6.png)，因为这部分不依赖于 `W²[11]`。


    综合起来，我们得到：


    ![$$ \frac{\partial E}{\partial {W²}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq7.png)
    `= -0.18980115540874787 * 0.23785621465075305 * 0.5502547397403884 = -0.024841461722517316`
    (3-13)


    为了减小误差，我们需要从 `W²[11]` 的原始值中减去 ![$$ \frac{\partial E}{\partial {W²}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq8.png)
    的值（可选择乘以某个学习率 `η`），从而计算出 `W²[11]` 的新调整值。


    `adjustedW²[11] = W²[11] – η * ∂E/∂W²[11]`。在此示例中，`η = 1`。 (3-14)


    `adjustedW²[11] = 0.11 + 0.024841461722517316 = 0.13484146172251732`


    #### 计算 `W²[12]` 的调整量


    应用链式法则求导，`∂E/∂W²[12]` 可由以下公式表示：


    ![$$ \frac{\partial E}{\partial {W²}_{11}}=\frac{\partial E}{\partial {O}_1}\ast
    \frac{\partial {O}_1}{\partial {Z}_1²}\ast \frac{\partial {Z}_1²}{\partial {W²}_{12}}
    $$](img/477043_2_En_3_Chapter_TeX_IEq10.png) (3-15)


    让我们使用微积分分别计算等式的每个部分。


    ![$$ \frac{\partial E}{\partial {O}_1} $$](img/477043_2_En_3_Chapter_TeX_IEq11.png)
    `= -0.18980115540874787` (参见 1-3) (3-16)


    ![$$ Calculating\ \frac{\partial {O}_1}{\partial {Z}_1²} $$](img/477043_2_En_3_Chapter_TeX_IEq12.png)


    ![$$ \frac{\partial {O}_1}{\partial {Z}_1²} $$](img/477043_2_En_3_Chapter_TeX_IEq13.png)
    `= 0.23785621465075305` (参见 1-4) (3-17)


    ![$$ Calculating\ \frac{\partial {Z}_1²}{\partial {W}_{12}²} $$](img/477043_2_En_3_Chapter_TeX_Equb.png)


    `Z²[1] = W²[11]* H[1] + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00` (3-18)


    ![$$ \frac{\partial {Z}_1²}{\partial {W}_{11}²} $$](img/477043_2_En_3_Chapter_TeX_IEq14.png)
    `= H[2] = 0.5504032199355139` (参见 1-3) (3-19)


    综合起来，我们得到：


    ![$$ \frac{\partial E}{\partial {W²}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq15.png)
    `= -0.18980115540874787 * 0.23785621465075305 * 0.5502547397403884 = -0.024841461722517316`
    (3-20)


    为了减小误差，我们需要从 `W²[12]` 的原始值中减去 ![$$ \frac{\partial E}{\partial {W²}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq16.png)
    的值（可选择乘以某个学习率 `η`），从而计算出 `W²[12]` 的新调整值。


    `adjustedW²[12] = W²[12] – η * ∂E/∂W²[12]`


    `adjustedW²[12] = 0.12 + 0.024841461722517316 = 0.1448414617225173` (3-21)


    #### 计算 `W²[13]` 的调整量


    ![$$ \frac{\partial E}{\partial {W²}_{13}}=\frac{\partial E}{\partial {O}_1}\ast
    \frac{\partial {O}_1}{\partial {Z}_1²}\ast \frac{\partial {Z}_1²}{\partial {W²}_{13}}
    $$](img/477043_2_En_3_Chapter_TeX_Equc.png)


    ![$$ \frac{\partial E}{\partial {O}_1} $$](img/477043_2_En_3_Chapter_TeX_IEq18.png)
    `= -0.18980115540874787` (参见 1-13) (3-22)


    ![$$ \frac{\partial {O}_1}{\partial {Z}_1²} $$](img/477043_2_En_3_Chapter_TeX_IEq19.png)
    `= 0.23785621465075305` (参见 1-14) (3-23)


    ![$$ Calculating\ \frac{\partial {Z}_1²}{\partial {W}_{13}²} $$](img/477043_2_En_3_Chapter_TeX_Equd.png)


    `Z²[1] = W²[11]* H[1] + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00` (3-24)


    ![$$ \frac{\partial {Z}_1²}{\partial {W}_{13}²} $$](img/477043_2_En_3_Chapter_TeX_IEq20.png)
    `= H[3] = 0.5505516911502556` (参见 1-4) (3-25)


    综合起来，我们得到：


    ![$$ \frac{\partial E}{\partial {W²}_{13}} $$](img/477043_2_En_3_Chapter_TeX_IEq21.png)
    `= -0.18980115540874787 * 0.23785621465075305 * 0.5505516911502556 = -0.024854867708052567`
    (3-26)


    `adjustedW²[13] = W²[13] – η * ∂E/∂W²[13]`。在此示例中，`η = 1`。


    `adjustedW²[12] = 0.13 + 0.024841461722517316 = 0.1548414617225173` (3-27)


    因此，在第二次迭代中，我们将使用以下调整后的权重值：


    *   `adjustedW²[11] = 0.08515853827748268`

    *   `adjustedW²[12] = 0.09515853827748268`

    *   `adjustedW²[13] = 0.10515853827748269`


    调整完输出神经元的权重后，我们准备计算隐藏神经元的权重调整量。


    ### 计算隐藏层神经元的权重调整量


    计算隐藏层神经元的权重调整量与输出层中的相应计算类似，但有一个重要区别。对于输出层的神经元，其输入现在是隐藏层中相应神经元的输出结果。

    '
