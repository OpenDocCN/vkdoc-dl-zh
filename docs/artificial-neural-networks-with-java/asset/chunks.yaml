    inputDiffValue = inputData.getData(0);

    targetDiffValue = actualData.getData(0);

    predictDiffValue = predictData.getData(0);

    // De-normalize the values

    denormInputValueDiff     =((Dl - Dh)*inputDiffValue - Nh*Dl + Dh*Nl)/(Nl - Nh);

