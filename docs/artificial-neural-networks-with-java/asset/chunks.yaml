    ### Data Preparation


    We want to train the neural network using the function values at the first interval
    and then test the network by getting the network-predicted function values at
    the second interval. Similar to the previous example, to be able to determine
    the function approximation results outside of the training range, we will use
    the difference between `xPoint` values and the difference between the function
    values instead of the given `xPoints` and function values. However, in this example,
    we use the difference between `xPoint` values between the current and previous
    points as Field 1 and the difference between the function values between the next
    and current points as Field 2.


    With these settings in the input file, we teach the network to learn that when
    the difference between the `xPoint` values is equal to some value `a`, then the
    difference in function values between the next day and the current day must be
    equal to some value `b`. That allows the network to predict the next-day function
    value by knowing the current-day (record) function value.


    During the test, we calculate the function’s next-day value in the following way.
    When at point `x` = 50, we want to calculate the predicted function value at the
    next point, `x` = 51. Feeding the difference between the `xPoint` values at the
    current and previous points (Field 1) to the trained network, we will get back
    the predicted difference between the function values at the next day and at the
    current day. Therefore, the predicted function value at the next point is equal
    to the sum of the actual function value at the current point and the predicted
    value difference obtained from the trained network.


    However, this will not work for this example, simply because many parts of the
    chart may have the same difference and direction in function values between the
    current and previous days. It will confuse the neural network learning process
    when it tries to determine to which part of the chart such a point belongs (see
    Figure [7-2](#477043_2_En_7_Chapter.xhtml#Fig2)).


    ![../images/477043_2_En_7_Chapter/477043_2_En_7_Fig2_HTML.jpg](images/477043_2_En_7_Chapter/477043_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Confusing points on the function chart


    ### Reflecting Function Topology in the Data


    For this example, we need to use an additional trick. We are going to include
    the function topology in the data to help the network distinguish between confusing
    points. Specifically, our training file will use sliding windows as the input
    records. Each sliding window record includes the input function value differences
    (between the current and previous days) of the ten previous records. The target
    function value of the sliding window is the target function value difference (between
    the next and current days) of the original record number 11.


    Essentially, by using such a record format, we teach the network to learn the
    following conditions. If the difference in function values for the ten previous
    records is equal to `a1`, `a2`, `a3`, `a4`, `a5`, `a6`, `a7`, `a8`, `a9`, and
    `a10`, then the difference in the next-day function value and the current-day
    function value should be equal to the target function value of the next record
    (record 11). Figure [7-3](#477043_2_En_7_Chapter.xhtml#Fig3) shows a visual example
    of constructing a sliding window record.


    ![../images/477043_2_En_7_Chapter/477043_2_En_7_Fig3_HTML.jpg](images/477043_2_En_7_Chapter/477043_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Constructing the sliding window record


    Table [7-2](#477043_2_En_7_Chapter.xhtml#Tab2) shows the sliding window training
    dataset.


    Table 7-2


    Sliding Window Dataset on the Interval [1, 50]'
