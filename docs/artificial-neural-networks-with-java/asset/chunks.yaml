    ## 总结


    再次强调，神经网络是通用的函数逼近机制。这意味着一旦你在某个区间上逼近了函数，就可以使用这样一个训练好的神经网络来预测训练区间内任意点的函数值。但是，你不能使用这样一个训练好的网络来预测训练范围之外的函数值。神经网络不是函数外推机制。


    本章解释了对于某一类函数（在本例中是周期函数），如何有可能获得训练范围之外的预测数据。我们将在下一章继续探讨这个概念。


    # 7. 处理复杂周期函数


    在本章中，我们继续讨论如何处理周期函数，重点关注更复杂的周期函数。

