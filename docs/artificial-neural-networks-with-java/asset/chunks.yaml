- fmt: 'The processing logic is quite different in this program. Let’s start from
    the `getChart()` method. Apart from the usual statements needed by the XChart
    package, we generate here the names for the training micro-batches and save-network
    files. The generated filenames for micro-batches must match the micro-batch filenames
    being prepared on disk when we broke the normalized training file into micro-batches.


    The names for saved-network files have a corresponding structure. These generated
    names will be used by the training method to save the trained networks corresponding
    to the micro-batches on disk. The generated names are saved in two arrays called
    `strTrainingFileNames[]` and `strSaveTrainNetworkFileNames[]`.


    Figure [8-5](#477043_2_En_8_Chapter.xhtml#Fig5) shows a fragment of the generated
    saved network files.


    ![../images/477043_2_En_8_Chapter/477043_2_En_8_Fig5_HTML.jpg](images/477043_2_En_8_Chapter/477043_2_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Fragment of the generated saved network files


    Next, we generate and populate two arrays called `linkToSaveNetworkDayKeys[]`
    and `linkToSaveNetworkTargetFunctValueKeys[]`. For each consecutive day, we populate
    the `linkToSaveNetworkDayKeys[]` array with the Field 1 value from the training
    micro-batch records. We populate the `linkToSaveNetworkTargetFunctValueKeys[]`
    array with the names of the corresponding saved network file on disk. Therefore,
    those two arrays hold the link between the micro-batch dataset and the corresponding
    saved network dataset.


    The program also generates the names of the testing micro-batch files, similar
    to the generated names for the training micro-batch files. When all this is done,
    we call the `loadTrainFunctValueFileInMemory` method that loads the training file
    values into memory.


