    ## 训练数据集


    训练数据集中的每条记录包含三个字段，用于存放我们书籍中最常用单词列表中的单词；记录中还包含五个目标字段。这五个目标字段指示该记录所属的书籍。此信息用于训练网络。例如，组合
    `1, 0, 0, 0, 0` 表示书籍 #1，组合 `0, 1, 0, 0, 0` 表示书籍 #2，依此类推。此外，对于每本书，我们需要在训练数据集中构建六条记录，而不是一条。它们包含了记录中单词的所有可能排列。我们使用斜体来突出显示记录中存放单词数字的部分。表
