    本章讨论三维空间中的逼近函数。此类函数值依赖于两个变量（而非前几章讨论的一个变量）。图 12-1 展示了本章所考虑的三维函数图表。


    ![../images/477043_2_En_12_Chapter/477043_2_En_12_Fig1_HTML.jpg](img/477043_2_En_12_Fig1_HTML.jpg)


    **图 12-1** 三维空间中的函数图表


    ## 示例：三维空间中的逼近函数


