  trans: '

    # 手写数字分类


    在本节中，我们将讨论图像识别的简单任务，具体来说，就是识别手写数字。请观察图 13-1 所示的手写数字序列。


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig1_HTML.jpg](img/477043_2_En_13_Fig1_HTML.jpg)


    图 13-1


    手写数字


    这些数字由不同的人书写。即使是同一个人，根据所用笔的类型、站立或坐姿以及许多其他因素，写出的数字也可能不同。请参见图 13-2 中人们书写的同一数字几乎无穷无尽的变化。


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig2_HTML.jpg](img/477043_2_En_13_Fig2_HTML.jpg)


    图 13-2


    手写数字的变化


    如果我们收集数千（或数百万）个手写数字，并用它们来训练神经网络，就可以构建一个数字识别程序。


    ## 准备输入数据


    为了构建输入，我们将使用 MNIST 数据集，其中包含数万张手写数字的扫描图像。MNIST 是美国国家标准与技术研究院（NIST）收集的两个数据集的修改子集。第一个数据集包含
    60,000 条记录，应用于网络训练。第二个数据集包含 10,000 条记录，应用于测试训练好的网络。


    两个数据集中的每条记录都代表一个数字图像（28*28 像素 = 784 像素）。这些图像是黑白的。每条记录的格式包含 785 个字段。第一个字段是数字的文本表示（例如，5）。接下来的
    784 个字段表示图像中每个像素强度的灰度值。每个像素值是一个单独的数字，代表像素的亮度（像素强度），可能的值从 0 到 255，其中 0 表示白色，其余数字表示逐渐变暗的灰色阴影。图
    13-3 显示了图像的一个片段。


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig3_HTML.jpg](img/477043_2_En_13_Fig3_HTML.jpg)


    图 13-3


    表示图像的记录片段


    您可以通过从 `http://yann.lecun.com/exdb/mnist/` 网站下载来获取这两个文件。但是，该网站上的数据文件是为 Python
    编程语言格式化的，因此从该网站下载对您没有帮助。相反，我们将使用已转换为 CSV（Excel）格式的文件（我们在本书的所有示例中都使用了这种格式）。您可以从本书的
    GitHub 站点获取这些文件。


    图 13-4 显示了其中一个 CSV 文件的片段。


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig4_HTML.jpg](img/477043_2_En_13_Fig4_HTML.jpg)


    图 13-4


    CSV 文件片段


    ## 输入数据转换


    我们需要构建一个程序来训练神经网络识别（分类）数字。为此，我们首先需要找到一种方法，将每条记录所代表的数字编码成网络能够理解的某种数字形式。我们将每个数字表示为一个十字段序列（序列中的每个字段具有字符值
    0 或 1）。例如，数字 5 将通过在该十字段序列的第五个位置（字段）中置 1 来表示（其余字段设置为 0）。因此，这是一种数字的字节级表示。


    图 13-5 显示了数字 5 的示例。


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig5_HTML.jpg](img/477043_2_En_13_Fig5_HTML.jpg)


    图 13-5


    数字 5 的字节级表示


    我们将把这十个字节级图像表示的字段放在每条记录的末尾，它们将被视为网络的输出字段。


    因此，我们需要将原始 CSV 文件的记录（包含 785 个字段：第一个字段是数字的字母形式，接下来的 784 个字段是图像中每个像素的灰度值）转换为不同格式的记录。转换后的记录格式如下：前
    784 个字段是图像中每个像素的灰度值，后面跟着 10 个字段，即该记录数字的字节级表示。


    图 13-6 显示了转换过程的图形表示。


    ![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig6_HTML.png](img/477043_2_En_13_Fig6_HTML.png)


    图 13-6


    记录转换


    因此，该记录将包含前 784 个字段（网络的输入字段），后跟 10 个字段（网络的目标字段）。在训练网络时，我们教导网络：如果前 784 个字段包含给定的灰度像素强度值，那么这代表数字
    5 的图像（其余图像以此类推）。


    在进行此转换的同时，我们还需要将输入的灰度字段值和目标字段值归一化到区间 [-1.00, 1.00]。


    ## 构建转换程序


    CVS 输入训练数据集是 `C:\Image_Recognition\MNIS_Data\mnist_train.csv`。CVS 输入测试数据集是 `C:\Image_Recognition\MNIS_Data\mnist_test.csv`。


    以下是转换后对应的文件：


    ```

    C:\Image_Recognition\MNIS_Data\ mnist_train_input_Norm.csv

    C:\Image_Recognition\MNIS_Data\ mnist_test_input_Norm.csv

    ```


    转换逻辑会读取输入数据集中的所有记录。对于每条记录，它提取第一个字段（即字符数字）并构建相应的目标字段（10 个字段，数字的字节级表示）。程序将这 10 个目标字段放在输出记录的末尾（紧跟在
    784 个输入字段之后）。


    784 个输入字段（位于输入记录中数字字段之后）被放在转换后记录的开头。最后，我们对转换后记录的所有字段进行归一化。请参见清单 13-1 和清单 13-2。

    '
- fmt: "```java\n// ===============================================================\n\
    // The program converts the MNIS CVS input training file that consists of records\n\
    // with 785 fields into the CVS normalized training input file.\n//===============================================================\n\
    package numberrecognition_convertinputtrainfile;\nimport java.time.YearMonth;\n\
    import java.awt.Color;\nimport java.awt.Font;\nimport java.io.File;\nimport java.io.FileInputStream;\n\
    import java.text.DateFormat;\nimport java.text.ParseException;\nimport java.text.SimpleDateFormat;\n\
    import java.time.LocalDate;\nimport java.time.Month;\nimport java.time.ZoneId;\n\
    import java.util.ArrayList;\nimport java.util.Calendar;\nimport java.util.Date;\n\
    import java.util.List;\nimport java.util.Locale;\nimport java.util.Properties;\n\
    import java.io.BufferedReader;\nimport java.io.BufferedWriter;\nimport java.io.File;\n\
    import java.io.FileInputStream;\nimport java.io.PrintWriter;\nimport java.io.FileNotFoundException;\n\
    import java.io.FileReader;\nimport java.io.FileWriter;\nimport java.io.IOException;\n\
    import java.io.InputStream;\nimport java.nio.file.*;\nimport java.util.Properties;\n\
    public class NumberRecognition_ConvertInputTrainFile\n{\n// Interval to normalize\n\
    static double Nh =  1;\nstatic double Nl = -1;\n// Input points\nstatic double\
