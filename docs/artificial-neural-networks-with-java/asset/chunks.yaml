- fmt: '# Example: Approximating Noncontinuous Functions


    We will first attempt to approximate the noncontinuous function (shown in Figure
    [8-1](#477043_2_En_8_Chapter.xhtml#Fig1)) by using the conventional neural network
    processing and show that the results are of very low quality and practically useless.
    We will explain why this happens and then introduce the method that allows approximation
    of such functions with good precision results.


    ![../images/477043_2_En_8_Chapter/477043_2_En_8_Fig1_HTML.jpg](images/477043_2_En_8_Chapter/477043_2_En_8_Fig1_HTML.jpg)


