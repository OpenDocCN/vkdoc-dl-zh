    ![../images/477043_2_En_11_Chapter/477043_2_En_11_Fig1_HTML.jpg](images/477043_2_En_11_Chapter/477043_2_En_11_Fig1_HTML.jpg)


    **Figure 11-1** SPY monthly chart for the interval January 2000 to January 2009


    Notice that the input dataset includes the market prices during two market crashes,
    so the network should be able to learn the market behavior during those crashes.
    We already learned from the previous examples that to make predictions outside
    the training range, we need to transform the original data to a format that will
    allow us to do this. As part of this transformation, we create the price differences
    dataset with records that include two fields.


    *   *Field 1*: Percent difference between the current and previous month prices

    *   *Field 2*: Percent difference between the next and current month prices


    Table [11-2](#477043_2_En_11_Chapter.xhtml#Tab2) shows the transformed price differences
