    下一个代码片段展示了训练方法的逻辑。该方法训练网络、验证网络，并将训练好的网络文件保存到磁盘（供测试方法稍后使用）。该方法将训练数据集加载到内存中。第一个参数是输入训练数据集的名称。第二个和第三个参数表示网络中输入和输出神经元的数量。第四个参数（`true`）表示数据集有一个标签记录。其余参数指定文件格式和语言（参见清单[5-6](#477043_2_En_5_Chapter.xhtml#PC6)）。


    ```

    MLDataSet trainingSet =

    loadCSV2Memory(trainFileName,numberOfInputNeurons,numberOfOutputNeurons,

    true,CSVFormat.ENGLISH,false);

    Listing 5-6

    Fragments of the Network Training Logic

    ```


    将训练数据集加载到内存后，通过创建基本网络并向其添加输入层、隐藏层和输出层来构建一个新的神经网络。


    ```

    // create a neural network

    BasicNetwork network = new BasicNetwork();

    ```


    现在添加输入层：


    ```

    network.addLayer(new BasicLayer(null,true,1));

    ```


    第一个参数（`null`）表示这是输入层（无激活函数）。为输入层和隐藏层输入`true`作为第二个参数，为输出层输入`false`。第三个参数显示该层中的神经元数量。接下来我们添加隐藏层。


    ```

    network.addLayer(new BasicLayer(new ActivationTANH(),true,2));

    ```


    第一个参数指定要使用的激活函数（`ActivationTANH()`）。


    或者，也可以使用其他激活函数，例如Sigmoid函数`ActivationSigmoid()`、对数函数`ActivationLOG()`、线性整流函数`ActivationReLU()`等。第三个参数指定该层中的神经元数量。要添加第二个隐藏层，只需重复上一条语句。


    最后，添加输出层。


    ```

    network.addLayer(new BasicLayer(new ActivationTANH(),false,1));

    ```


    这里的第三个参数指定输出层中的神经元数量。接下来的两条语句完成网络的创建。


    ```

    network.getStructure().finalizeStructure();

    network.reset();

    ```


    为了训练新构建的网络，我们指定反向传播的类型。这里，我们指定弹性传播作为最先进的传播类型。或者，也可以在此处指定常规的反向传播类型。


    ```

    final ResilientPropagation train = new ResilientPropagation(network, trainingSet);

    ```


    在网络训练期间，我们对网络进行循环。在循环的每一步，我们获取下一个训练迭代次数，增加周期数（关于周期的定义，请参见第[2](#477043_2_En_5_Chapter.xhtml)章），并检查当前迭代的网络误差是否能够清除设置为0.00000046的误差限制。当当前迭代的误差最终变得小于误差限制时，我们退出循环。网络已训练完成，我们将训练好的网络保存到磁盘。该网络也保留在内存中。


    ```

    int epoch = 1;

    do

    {

    train.iteration();

    System.out.println("Epoch #" + epoch + " Error:" + train.getError());

    epoch++;

    } while (network.calculateError(trainingSet) > 0.00000046);

    // Save the network file

    EncogDirectoryPersistence.saveObject(new File(networkFileName),network);

