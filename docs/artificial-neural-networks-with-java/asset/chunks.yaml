    ## Summary


    Again, the neural network is the universal function approximation mechanism. This
    means once you have approximated the function on some interval, you can then use
    such a trained neural network to predict the function values at any point within
    the training interval. However, you cannot use such a trained network for predicting
    the function values outside the training range. A neural network is not a function
    extrapolation mechanism.


    The chapter explained how, for a certain class of functions (in this case, periodic
    functions), it is possible to get the predicted data outside of the training range.
    We continue exploring this concept in the next chapter.


    # 7. Processing Complex Periodic Functions


