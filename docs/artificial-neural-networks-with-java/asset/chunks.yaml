    // First column

    static double minXPointDl = 0.00;

    static double maxXPointDh = 5.00;

    // Second column - target data

    static double minTargetValueDl = 0.00;

    static double maxTargetValueDh = 5.00;

    static double doublePointNumber = 0.00;

