    你可以看到，所有三个公式都有一个公共部分 ![$$ \frac{\partial E}{\partial {O}_1}\ast \frac{\partial
    {O}_1}{\partial {Z}_1²} $$](img/477043_2_En_3_Chapter_TeX_IEq74.png)。这个部分被称为*节点增量*
    δ。使用 δ，我们可以重写公式 (3-87)、公式 (3-88) 和公式 (3-89) 中的公式。


    ![$$ \frac{\partial E}{\partial {W²}_{11}}= $$](img/477043_2_En_3_Chapter_TeX_IEq75.png)`δ²[1]`![$$
    \ast \frac{\partial {Z}_1²}{\partial {W²}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq76.png)
    (3-90)


    ![$$ \frac{\partial E}{\partial {W²}_{12}}= $$](img/477043_2_En_3_Chapter_TeX_IEq77.png)`δ²[1]`![$$
