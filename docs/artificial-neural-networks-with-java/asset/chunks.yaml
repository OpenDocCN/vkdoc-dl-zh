- fmt: '## Example: Function Approximation Using Java Environment


    Figure [5-1](#477043_2_En_5_Chapter.xhtml#Fig1) shows the function, which is given
    to us with its values at nine points.


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig1_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Function to be approximated


    As previously mentioned, we will use the Encog software for neural network processing.
    Encog expects all the files it processes to be in the CSV format. This is actually
    a simplified Excel file format that includes comma-separated values in each record.
    CSV files have the extension `.csv`. Also, remember that Encog expects the first
    record in the processed files to be a label record. Accordingly, Table [5-1](#477043_2_En_5_Chapter.xhtml#Tab1)
    shows the input (training) dataset with the given function values for this example.


    Table 5-1


    Training Dataset


    | xPoint | Function Value |

    | --- | --- |

    | 0.15 | 0.0225 |

    | 0.25 | 0.0625 |

