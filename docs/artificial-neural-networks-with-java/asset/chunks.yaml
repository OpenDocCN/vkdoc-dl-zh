  raw: '## Example: Classification of Records


    Listing [10-1](#477043_2_En_10_Chapter.xhtml#PC1) shows five books, and each book
    belongs to a different area of human knowledge: medical, programming, engineering,
    electrical, and music. We are also given the three most frequently used words
    in each of the five books.


    We have many records to be classified by the program we will develop here. Each
    record includes three words. If all three words in a record belong to a certain
    book, then the program should determine that the record belongs to that book.
    If a record has a mixture of words that don’t belong to any of the five books,
    then the program should classify the record as belonging to an unknown book.


    This example looks quite simple; the problem seems like it does not need a neural
    network and could be solved by using regular programming logic. But when the volume
    of books and records becomes very large, when there is a large number of unpredictable
    combinations of words included in each record, and when only a certain small number
    of words from one book is sufficient for a record to belong to a certain book,
    then only artificial intelligence can handle such a task.


    ```

    Book 1\. Medical.

    surgery, blood, prescription,

    Book 2\. Programming.

    file, java, debugging

    Book3\. Engineering.

    combustion, screw, machine

    Book 4\. Electrical.

    volt, solenoid, diode

    Book 5\. Music.

    adagio,  hymn, opera,

    Extra words. We will use the following words in this list to include them in the
    test dataset:

    customer, wind, grass, paper, calculator, flower, printer, desk, photo, map, pen,
    floor.

