    In general, calculating the partial derivative of error function `E` with respect
    to its weights can be done by multiplying the node’s delta by the partial derivative
    of the error function with respect to the corresponding weight. That saves us
    from calculating some redundant data. That means that we can calculate δ values
    for each network node and then use the formulas in equation (3-93) and equation
    (3-98).


    ## Matrix Form of Network Calculation


    For the same network, we can express all the calculations using matrices. For
    example, by introducing the `Z` vector, `W` matrix, and `B` vector, we can get
    the same calculation results as we get when using scalars. See Figure 3-5.


    ![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig5_HTML.jpg](images/477043_2_En_3_Chapter/477043_2_En_3_Fig5_HTML.jpg)


    **Figure 3-5** Matrix form of network calculation


    Using matrix or scalar calculations is a matter of preference. Using a good matrix
    library provides fast calculation, but the disadvantage is a high memory demand,
    since matrixes should be kept in memory.'
