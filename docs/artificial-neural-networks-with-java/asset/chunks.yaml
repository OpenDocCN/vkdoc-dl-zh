    We knew that this approximation would not work and stated this at the beginning
    of the example. However, it was deliberately done to demonstrate the point. Now,
    we will show how this noncontinuous function can be successfully approximated
    using a neural network.


    The problem with this function approximation is due to the function topology (sudden
    jumps or drops of the function values at certain points). We will break the input
    file in a series of one-record input files that we call *micro-batches*. By doing
    this, we eliminate the negative impact of the difficult function topology. After
    breaking the dataset, every record will stand isolated and not be linked to the
    previous or next function value. Breaking the input file into micro-batches creates
    1,000 input files, which the network processes individually. We link each trained
    network with the record it represents. During the validation and testing processes,
    the logic finds the trained network that best matches the first field of the corresponding
    testing or validation record.


