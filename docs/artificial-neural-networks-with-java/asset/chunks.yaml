    ## Testing Logic


    There are many new coding fragments in this method, so let’s discuss them. We
    load the micro-batch dataset and the corresponding saved network in a loop over
    the set of testing micro-batch datasets. Remember that we are no longer processing
    a single test dataset but a set of micro-batch testing datasets. Next, we obtain
    from the network the input, actual, and predicted price values; normalize them;
    and calculate the real actual and predicted prices. That is done for all test
    records for which the saved network records exist.


    However, there is no saved network file for the last micro-batch record in the
    test dataset, simply because the network was not trained for that point. For this
    record we retrieve its 12 `inputPriceDiffPerc` fields, which are the keys used
    during network training. Next we search the keys of all the saved network files
    that are located in the memory arrays called `linkToSaveInputPriceDiffPerc_00`,
    `linkToSaveInputPriceDiffPerc_01`, and so on.


    Because there are 12 keys associated with each saved network, the search is done
    in the following way. For the micro-batch being processed, we calculate the vector
    value in the 12D space using Euclidean geometry. For example, for the function
    of 12 variables y = f(x1,x2,x3,x4,x5,x6,x7,x8,x9,x10,x11,x12), the vector value
    is a square root of the sum of each x value powered to 2.


    ![$$ \sqrt{x{1}^2+x{1}^2+x{1}^2+x{1}^2+x{1}^2+x{1}^2}+x{1}^2+x{1}^2+x{1}^2+x{1}^2+x{1}^2+x{1}^2
    $$](images/477043_2_En_11_Chapter/477043_2_En_11_Chapter_TeX_IEq1.png) (11-1)


    Then, for each set of network keys held in the `linkToSaveInputPriceDiffPerc`
    arrays, the vector value is also calculated. The network keys that closely match
    the set of keys from the processed record are selected and loaded in memory. Finally,
    we obtain from that network the input, active, and predicted values; denormalize
    them; and calculate the real actual and predicted values. Listing [11-7](#477043_2_En_11_Chapter.xhtml#PC6)
    shows the code for this logic.


