    # 深入探讨


    为什么逼近这个函数需要更多的点？函数逼近控制的是训练过程中所处理点上的逼近函数行为。网络学会了让逼近结果在训练点上与实际函数值紧密匹配，但对训练点之间的函数行为控制力要弱得多。请参考图
    5-26 中的示例。


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig26_HTML.jpg](img/477043_2_En_5_Fig26_HTML.jpg)


    **图 5-26** 原始函数与逼近函数


    在图 5-26 的图表中，逼近函数值在训练点上与原始函数值高度吻合，但在点与点之间则不然。为了更清晰地说明问题，图 5-26 有意夸大了测试点的误差。如果使用更多的训练点，那么测试点将始终更接近某个训练点，从而测试点上的测试结果也会更接近该点的原始函数值。


    ## 总结


    本章描述了如何使用 Java Encog 框架开发神经网络应用程序。我们采用循序渐进的方法，解释了使用 Encog 编写神经网络应用程序代码时所涉及的所有细节。本书其余部分的示例均使用
    Encog 框架。


    # 6. 训练范围外的神经网络预测


    为神经网络处理准备数据通常是最困难且最耗时的任务。除了数据量巨大（可能轻松达到数百万甚至数十亿行）之外，主要难点在于为当前任务准备正确格式的数据。在本章及后续章节中，我们将演示几种数据准备/转换技术。


    本示例的目标是展示如何处理神经网络逼近的主要限制，即预测应仅在训练区间内使用。这一限制存在于任何函数逼近机制中（不仅限于神经网络逼近，也包括微积分方法）。在训练区间外获取函数值被称为*预测*（而非预报）。预测函数值基于外推法，而神经网络处理机制则基于逼近机制。在训练区间外获取函数逼近值只会产生错误结果。这是需要了解的重要概念之一。


    ## 示例：在训练范围外逼近周期函数


