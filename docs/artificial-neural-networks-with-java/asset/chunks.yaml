    // 所有测试批次文件已处理完毕\nXYSeries series1 = Chart.addSeries(\"Actual\", xData, yData1);\n\
    XYSeries series2 = Chart.addSeries(\"Predicted\", xData, yData2);\nseries1.setLineColor(XChartSeriesColors.BLUE);\n\
