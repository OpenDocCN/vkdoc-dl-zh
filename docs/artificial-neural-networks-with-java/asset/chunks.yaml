  trans: '

    此程序中的处理逻辑大不相同。让我们从 `getChart()` 方法开始。除了 XChart 包所需的常规语句外，我们在此处为训练微批次和保存网络文件生成名称。生成的微批次文件名必须与我们将归一化训练文件拆分为微批次时，磁盘上正在准备的微批次文件名相匹配。


    保存的网络文件的名称具有相应的结构。这些生成的名称将被训练方法用于将对应于微批次的已训练网络保存到磁盘。生成的名称保存在两个数组中，分别称为 `strTrainingFileNames[]`
    和 `strSaveTrainNetworkFileNames[]`。


    图 8-5 显示了生成的已保存网络文件的一个片段。


    ![../images/477043_2_En_8_Chapter/477043_2_En_8_Fig5_HTML.jpg](img/477043_2_En_8_Fig5_HTML.jpg)


    图 8-5


    生成的已保存网络文件片段


    接下来，我们生成并填充两个数组，分别称为 `linkToSaveNetworkDayKeys[]` 和 `linkToSaveNetworkTargetFunctValueKeys[]`。对于每个连续的天数，我们用训练微批次记录中的字段
    1 值填充 `linkToSaveNetworkDayKeys[]` 数组。我们用磁盘上相应已保存网络文件的名称填充 `linkToSaveNetworkTargetFunctValueKeys[]`
    数组。因此，这两个数组保存了微批次数据集与相应已保存网络数据集之间的链接。


    该程序还会生成测试微批次文件的名称，类似于为训练微批次文件生成的名称。当所有这些完成后，我们调用 `loadTrainFunctValueFileInMemory`
    方法，该方法将训练文件值加载到内存中。


    ### `getChart()` 方法的程序代码


