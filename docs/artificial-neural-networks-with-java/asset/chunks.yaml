    #### 输出层


    以下是输出层：


    神经元 `O[1]`：


    1.  计算神经元 `O[1]` 的总净输入。


    `Z²[1] = W²[11]* H[1] + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00 = 0.13484146172251732*
    0.5502547397403884 + 0.1448414617225173*0.5504032199355139 + 0.1548414617225173*
    0.5505516911502556 + 0.29514538436186405*1.00 = 0.5343119733119508` (3-84)


    2.  使用逻辑函数 Ϭ 从 `O[1]` 获取输出。


    `O[1] = Ϭ(Z²[1]) = 1/(1+exp(- Z²[1])) = 1/(1+exp(- 0.5343119733119508)) = 0.6304882485312977`
    (3-85)


    从神经元 `O[1]` 计算得到的输出是 `0.6304882485312977`，而 `O[1]` 的目标输出是 `0.80`；因此，以下是神经元 `O[1]`
    输出的平方误差：


    *   `E = 0.5*(T[1] – O[1])² = 0.5*(0.80 - 0.6304882485312977)² = 0.014367116942993556`
    (3-86)


    请记住，第一次迭代时的误差是 `0.01801223929724783`（参见公式 1-7）。现在，在第二次迭代中，误差已减少到 `0.014367116942993556`。


    我们继续这些迭代，直到网络计算出的误差小于设定的误差限。让我们看一下针对节点 `H[1]`，计算误差函数 `E` 关于 `W²[11]` 和 `W²[12]`
    的偏导数的公式。


    ![$$ \frac{\partial E}{\partial {W²}_{11}}=\frac{\partial E}{\partial {O}_1}\ast
