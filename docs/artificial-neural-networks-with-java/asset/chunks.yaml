    ![../images/477043_2_En_11_Chapter/477043_2_En_11_Fig6_HTML.jpg](images/477043_2_En_11_Chapter/477043_2_En_11_Fig6_HTML.jpg)


    **Figure 11-6** Chart of the testing results


    ## Analyzing Testing Results


    At all the points where the network was trained, the predicted price closely matches
    the actual price (the yellow and blue charts practically overlap). However, at
    next month’s point (the point where the network was not trained), the predicted
    price differs from the actual price (which we happen to know) by more than 17
    percent. Even the direction of next month’s predicted price (the difference from
    the previous month) is wrong. The actual price is slightly increased, while the
    predicted price dropped considerably.


    With the prices at these points being at around 1200 to 1300, the 17 percent difference
    represents the error of more than 200 points. This could not be considered as
    a prediction, and the result is useless for traders/investors. So, what is wrong?
    We did not violate the restriction of predicting function values outside of the
    training range (by transforming the price function to be dependent on the price
    difference between months instead of the sequential months). To answer this question,
    let’s research the issue.


    When we process the last test record, we obtain the values of its first 12 fields
    from the 12 previous original records. They represent the price difference percent
    between the current and previous months. The last field in the record is the percent
    difference between the price value at the next month (record 13) and the price
    value at month 12. With all fields being normalized, the record is shown here:


    *   0.621937887 0.550328191 0.214557935 0.12012062 0.419090615 0.571960009 0.4321489
    0.039710508 0.275810074 -0.074423166 0.101592253 0.29360278 0.          (11-2)


    By knowing the price for the micro-batch record 12 (which is 1,385.95) and obtaining
    the network prediction as the `targetPriceDiffPerc` field (which is the percent
    difference between the next month’s and current month’s prices), we can calculate
    the next month’s predicted price as follows:


    *   `nextMonthPredictedPrice = record12ActualPrice + record12ActualPrice * predictedPriceDiffPerc
    / 100.00`       (11-3)


    To get the network prediction for record 13 (`predictedPriceDiffPerc`), we feed
    the trained network the vector value of 12 `inputPriceDiffPerc` fields from the
    currently processed record (see Listing [10-2](#477043_2_En_10_Chapter.xhtml#PC2)).
    The network returns -16.129995719. Putting it all together, we receive the predicted
    price for next month.


    ```

    1385.59 - 1385.59 *16.12999/100.00 = 1,162.0943923170353

    ```


    The predicted price for next month is equal to 1,162.09, while the actual price
    is 1,400.38, so the difference is 17.02 percent. That’s exactly the result shown
    in the processing log for the last record.


    ```

    Month = 121  targetPrice = 1400.3800000016674  predictPrice = 1162.0943923170353   diff
    = 17.0157819794876

    ```


    The calculated result for next month’s price is mathematically correct and is
    based on the sum of the price at the last training point and the price difference
    percent between the next and current points returned by the network.


    The problem is that the historical stock market prices don’t repeat themselves
    under the same or similar conditions. The price difference percent that the network
    returns for the calculated vector (10.1) of the last processed record is not correct
    for calculating the predicted price for the next month. This is the problem with
    the model that we used in this example, which assumes that the price difference
    percent for the future month is similar to the price difference percent recorded
    for the same or close condition in the past.


    This is the important lesson to learn. If the model is wrong, nothing will work.
    Before being involved in any neural network development, the first thing that
    needs to be done is to prove that the chosen model works correctly. This will
    save you a lot of time and effort.


    ## Summary


    The chapter explained the importance of selecting the correct working model for
    the project. Prove that the model works correctly for your project before starting
    any development. Failure to select the correct model will result in an incorrectly
    working application. The network will also produce the wrong results when it is
    used to predict the results of all sort of games (gambling, sports, and so on).


