    The noticeable discrepancies between the actual and predicted values are due to
    the rough function approximation. Some improvement of the approximation precision
    can usually be done by tinkering with the architecture of the network (the number
    of hidden layers, the number of neurons in layers). However, the main problem
    here is a very small number of points and the correspondingly relatively large
    distance between points used to train the network. To get substantially better
    function approximation results, many more points (with a much smaller distance
    between them) should be used to approximate this function.


    Should the training dataset include many more points (100, 1000, or even 10,000)
    and correspondingly much smaller distances between points (0.01, 0.001, or even
