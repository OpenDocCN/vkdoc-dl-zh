- fmt: '## Training Process


    For the most part, the training method logic is similar to what was used in the
    preceding examples, so it does not need any explanation, with the exception of
    one part that needs to be discussed here.


    Sometimes, we deal with functions of very small values, so the calculated errors
    are even smaller. There are situations when the network errors reach the microscopic
    values with 14 or more zeros after the dot, for example: `0.000000000000025`.
    When you get such errors, you start questioning the accuracy of the calculation.
    In this code, we included the example of handling such situations.


    Instead of simply calling the `train.getError()` method to determine the network
    error, we use the pair dataset to retrieve the input, actual, and predicted function
    values from the network for each epoch, denormalize those values, and calculate
    the error percent difference between the calculated and actual values. We exit
    from the pair loop with the `returnCode` 0 when this difference becomes less than
    the error limit, as shown in Listing [11-5](#477043_2_En_11_Chapter.xhtml#PC4).


    ```

    int epoch = 1;

    double tempLastErrorPerc = 0.00;

    do

    {

    train.iteration();

    epoch++;

    for (MLDataPair pair1:  trainingSet)

    {

    MLData inputData = pair1.getInput();

    MLData actualData = pair1.getIdeal();

    MLData predictData = network.compute(inputData);

    // These values are Normalized as the whole input is

    normTargetPriceDiffPerc = actualData.getData(0);

    normPredictPriceDiffPerc = predictData.getData(0);

    denormTargetPriceDiffPerc = ((targetPriceDiffPercDl -

    targetPriceDiffPercDh)*normTargetPriceDiffPerc -

    Nh*targetPriceDiffPercDl + targetPriceDiffPercDh*Nl)/(Nl - Nh);

    denormPredictPriceDiffPerc =((targetPriceDiffPercDl -

    targetPriceDiffPercDh)*normPredictPriceDiffPerc  -

    Nh*targetPriceDiffPercDl + targetPriceDiffPercDh*Nl)/(Nl - Nh);

    inputPriceFromFile = arrPrices[rBatchNumber+12];

    realDenormTargetPrice = inputPriceFromFile +

    inputPriceFromFile*denormTargetPriceDiffPerc/100;

    realDenormPredictPrice = inputPriceFromFile +

    inputPriceFromFile*denormPredictPriceDiffPerc/100;

    realDenormTargetToPredictPricePerc = (Math.abs(realDenormTargetPrice -

    realDenormPredictPrice)/realDenormTargetPrice)*100;

    }

    if (epoch >= 500 && realDenormTargetToPredictPricePerc > 0.00091)

    {

    returnCodes[0] = 1;

    returnCodes[1] = rBatchNumber;

    returnCodes[2] = intDayNumber-1;

    return returnCodes;

    }

    } while(realDenormTargetToPredictPricePerc >  0.0009);

