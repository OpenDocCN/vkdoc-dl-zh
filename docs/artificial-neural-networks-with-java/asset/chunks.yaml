    | 1.95 | 3.8025 |


    ## Network Architecture


    Figure [5-2](#477043_2_En_5_Chapter.xhtml#Fig2) shows the network architecture
    for the example. The network is set to have the input layer with a single neuron,
    seven hidden layers (each having five neurons), and the output layer with a single
    neuron.


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig2_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Network architecture


    ## Normalizing the Input Datasets


    Both training and testing datasets need to be normalized on the interval [-1,
    1]. Let’s build the Java program that normalizes those datasets. To normalize
    a file, it is necessary to know the max and min values for the fields being normalized.
    The first column of the training dataset has the min value 0.15 and the max value
    2.00. The second column of the training dataset has the min value 0.0225 and the
    max value 4.00.


    The first column of the testing dataset has the min value 0.20 and the max value
    1.95. The second column of the testing dataset has the min value 0.04 and the
    max value 3.8025. Therefore, for simplicity, we select the min and max values
    for both training and testing datasets as `min = 0.00` and `max = 5.00`.


    The formula used to normalize the values on the interval [-1, 1] is as follows:


    `f(x) = ( (x – D[L])*(N[H] – N[L]))/(D[H] – D[L]) + N[L]`


    Here,


    - `x` = the input data point.

    - `D[L]` = the min (lowest) value of `x` in the input dataset.

    - `D[H]` = the max (highest) value of `x` in the input dataset.

    - `N[L]` = the left part of the normalized interval [-1, 1] = -1.

    - `N[H]` = the right part of the normalized interval [-1, 1] = 1.


