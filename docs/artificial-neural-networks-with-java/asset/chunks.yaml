    ## Including the Function Topology in the Dataset


    Next, we want to include information about the function topology in the dataset,
    because it allows matching not only a single `Field1` value but the set of 12
    `Field1` values (which means matching one year of data). To do this, we build
    the training file with the sliding window records. Each sliding window record
    consists of 12 `inputPriceDiffPerc` fields from 12 original records plus the `targetPriceDiffPerc`
    field from the next original record (the record that follows the original record
    12). Listing [11-1](#477043_2_En_11_Chapter.xhtml#Tab4) shows the resulting dataset.


