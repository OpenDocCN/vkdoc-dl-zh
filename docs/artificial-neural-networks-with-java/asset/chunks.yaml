    # Introduction\n\nArtificial intelligence is a rapidly advancing area of computer\
    \ science. Since the invention of computers, we have observed intriguing phenomena.\
    \ Tasks that are difficult for humans (such as heavy computations, searching,\
    \ memorizing large volume of data, and so on) are easily done by computers, while\
    \ tasks that humans are naturally able to do and do quickly (such as recognizing\
    \ partially covered objects, intelligence, reasoning, creativity, invention, understanding\
    \ speech, scientific research, and so on) are difficult for computers. It seems\
    \ that each of us has a super computer in our head.\n\nArtificial intelligence\
    \ as a discipline was born in the 1950s. However, the neural network architecture\
    \ known at that time used perceptions with a linear activation function, so it\
    \ was unable to solve nonlinear problems. This reason and the lack of computing\
    \ power made AI’s early start unsuccessful. AI was revived in 1974–1980 but eventually\
    \ failed again.\n\nA new nonlinear network architecture developed after that second\
    \ failure and a tremendous increase in the machines’ computing power finally contributed\
    \ to the phenomenal success of AI in 1990s. Gradually, AI became capable of solving\
    \ many industrial-grade problems such as image recognition, speech recognition,\
    \ natural language processing, pattern recognition, prediction, classification,\
    \ self-driving cars, robotic automation, and so on.\n\nTremendous success of AI\
    \ recently triggered all types of unwarranted speculations. You can read some\
    \ discussions about robots of the near future matching and exceeding the intelligence\
    \ of humans. We need to remember that currently AI is a set of clever mathematical\
    \ and processing methods that let computers learn from the data they process and\
    \ apply this knowledge to solving many important tasks. A lot of things that belong\
    \ to humans such as intelligence, emotion, creativity, feeling, reasoning, and\
    \ so on, are still outside of AI knowledge.\n\nHowever, things are rapidly changing.\
    \ In recent years, computers have become so good at playing chess that they reliably\
    \ beat their human counterparts. That is not surprising, because their creators\
    \ *taught* the program centuries of accumulated human experience in chess. Now,\
    \ the world computer chess championship is established where the machines compete\
    \ against each other. One of the best chess-playing programs called `Stockfish\
    \ 8` won the world computer chess championship in 2016.\n\nSeveral years ago Google\
    \ developed a chess playing program called `AlphaZero`, which defeated the `Stockfish\
    \ 8` program in the 2017 world computer chess championship. The amazing part of\
    \ this is that no one taught `AlphaZero` the chess strategies, as had been done\
    \ previously during development of other chess-playing programs. Instead, it used\
    \ the latest machine learning principles to teach itself chess by playing against\
    \ itself. It took the program four hours of learning chess strategies (while playing\
    \ against itself) to beat `Stockfish 8`. Self-teaching is the new milestone achievement\
    \ of artificial intelligence.\n\nAI has many branches. This book is dedicated\
    \ to one of them: neural networks. Neural networks enable computers to learn from\
    \ observational data and make predictions based on that knowledge. This book is\
    \ about neural networks training and using the training for function approximation,\
    \ prediction, and image classification.\n\n# Acknowledgments\n\nI would like to\
    \ thank Celestin Suresh John, Apress executive editor, for helping me make this\
    \ project a reality. Lots of thanks to Aditee Mirashi, Apress associate editor,\
    \ and Sourav Bhattacharjee and Aakash Kag, technical reviewers. All contributed\
    \ greatly to the technical accuracy and style of the book.\n\n# About the Author\
    \  \n# About the Technical Reviewers\n\n# Part I: Getting Started with Neural\
    \ Networks\n\n# 1. Learning About Neural Networks\n\nThe human brain consists\
    \ of billions of interconnected neurons that form a neural network. Each neuron\
    \ processes a small task, and then it activates the next neurons so that the processing\
    \ continues. The main property of neural networks is their ability to learn from\
    \ the surrounding environment. That is how human beings function.\n\nThe learning\
    \ process is distributed throughout the network of neurons by increasing or decreasing\
    \ synoptic connections so that the more relevant information gets stronger synaptic\
    \ connections, while the less relevant information gets weaker. The artificial\
    \ neural networks are built to mimic this process, and as you will learn later\
    \ in this book, this is done by adjusting the weight of connections between neurons.\n\
    \nThe artificial intelligence neural network architecture schematically mimics\
    \ a brain network. It consists of layers of neurons being directionally connected.\
    \ Figure [1-1](#477043_2_En_1_Chapter.xhtml#Fig1) shows a schematic image of the\
    \ human neuron.\n\n![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig1_HTML.jpg](images/477043_2_En_1_Chapter/477043_2_En_1_Fig1_HTML.jpg)\n\
    \n**Figure 1-1**  \nSchematic image of a human neuron\n\n## Biological and Artificial\
    \ Neurons\n\nA biological neuron (on a simplified level) consists of a cell body\
    \ with a nucleus, axon, and synapses. Synapses receive impulses, which are processed\
    \ by the cell body. The cell body sends a response over an axon to its synapses\
    \ that are connected to other neurons. Mimicking the biological neuron, artificial\
    \ neurons consist of a neuron body and connections to other neurons (see Figure\
    \ [1-2](#477043_2_En_1_Chapter.xhtml#Fig2)).\n\n![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig2_HTML.jpg](images/477043_2_En_1_Chapter/477043_2_En_1_Fig2_HTML.jpg)\n\
    \n**Figure 1-2**  \nSingle artificial neuron\n\nEach input to a neuron is assigned\
    \ a weight `W`. The weight assigned to a neuron indicates the impact this input\
    \ makes in calculating the network output. If the weight assigned to neuron `W[1]`\
    \ is greater than the weight assigned to neuron `W[2]`, then the impact of input\
    \ 1 on the network output is more significant than from input 2. We’ll show how\
    \ this works shortly.\n\nThe body of a neuron is depicted as a circle divided\
    \ into two parts by a vertical line. The left part is called “Network input to\
    \ neuron,” and it is the part where the neuron body performs the calculation.\
    \ This part is typically marked on network diagrams as `Z`. For example, the value\
    \ of `Z` for the neuron shown in Figure [1-2](#477043_2_En_1_Chapter.xhtml#Fig2)\
    \ is calculated as a sum of each input to the neuron multiplied by the corresponding\
    \ weight (`W`). That is the linear part of equation [1-1](#477043_2_En_1_Chapter.xhtml#Par8).\n\
    \n```\nZ = W[1]*I[1] + W[2]*I[2] + W[3]*I[3]      (1-1)\n```"
