    To create a new project, select File ➤ New Project. The dialog shown in Figure
    [5-9](#477043_2_En_5_Chapter.xhtml#Fig9) appears.


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig9_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig9_HTML.jpg)


    Figure 5-9


    NetBeans IDE


    Click Next. In the next dialog (shown in Figure [5-10](#477043_2_En_5_Chapter.xhtml#Fig10)),
    enter the project name and click the Finish button.


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig10_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig10_HTML.jpg)


    Figure 5-10


    New NetBeans project


    The project is created, and you should see it in the Navigation window (Figure
    [5-11](#477043_2_En_5_Chapter.xhtml#Fig11)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig11_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig11_HTML.jpg)


    Figure 5-11


    Project Sample1


    The source code of the program appears in the source code window (Figure [5-12](#477043_2_En_5_Chapter.xhtml#Fig12)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig12_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Source code for program `Sample1.java`


    Again, this is just the automatically generated skeleton of the Java program.
    Let’s add the necessary logic here. First, include all the necessary import files.
    There are three groups of import statements (Java imports, Encog imports, and
    XChart imports), and two of them (the one that belongs to Encog and the next that
    belongs to XChart) are marked as errors, because NetBeans is unable to find them
    (Figure [5-13](#477043_2_En_5_Chapter.xhtml#Fig13)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig13_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig13_HTML.jpg)


    Figure 5-13


    Import statements marked as errors


    Here is how to fix this. Right-click the project and select Properties. The Project
    Properties dialog will appear (Figure [5-14](#477043_2_En_5_Chapter.xhtml#Fig14)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig14_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Project Properties dialog


    On the left column of the Project Properties dialog, select Libraries. Click the
    Add Jar/Folders button located on the right of the Properties dialog. Click the
    down arrow of the Java Platform field (at the top of the screen) and go to the
    location where the Encog package is installed (Figure [5-15](#477043_2_En_5_Chapter.xhtml#Fig15)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig15_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Location where Encog is installed


    Double-click the Installation folder, and two JAR files will be displayed (Figure
    [5-16](#477043_2_En_5_Chapter.xhtml#Fig16)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig16_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Encog JAR files location


    Select both JAR files and click the Open button. They will be included in a list
    of JAR files to be added to NetBeans (Figure [5-17](#477043_2_En_5_Chapter.xhtml#Fig17)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig17_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig17_HTML.jpg)


    Figure 5-17


    List of Encog JAR files to be included in the NetBeans IDE


    Click the Add Jar/Folders button again. Click again the down arrow of the Java
    Properties field and go to the location where the XChart package is installed
    (Figure [5-18](#477043_2_En_5_Chapter.xhtml#Fig18)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig18_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig18_HTML.jpg)


    Figure 5-18


    XChart location


    Double-click the `XChart-3.5.0` folder and select two XChart JAR files (Figure
    [5-19](#477043_2_En_5_Chapter.xhtml#Fig19)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig19_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig19_HTML.jpg)


    Figure 5-19


    XChart files


    Click the Open button. Now we have the list of four JAR files (from Encog and
    XChart) to be included in the NetBeans IDE (Figure [5-20](#477043_2_En_5_Chapter.xhtml#Fig20)).


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig20_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig20_HTML.jpg)


    Figure 5-20


    List of JAR files to be included in the NetBeans IDE


    Finally, click OK, and all errors within the source file will disappear.


    Instead of doing this for every new project, a better way is to set a new global
    library. From the main bar, select Tools ➤ Libraries. The screen shown in Figure
    [5-21](#477043_2_En_5_Chapter.xhtml#Fig21) will appear.


    ![../images/477043_2_En_5_Chapter/477043_2_En_5_Fig21_HTML.jpg](images/477043_2_En_5_Chapter/477043_2_En_5_Fig21_HTML.jpg)


    Figure 5-21


    Creating a global library


    Now, you repeat the same steps that were shown earlier on the project level. Do
    this by clicking the Add JAR/Folder button twice (for Encog and XChart) and add
    the appropriate JAR files for the Encog and XChart packages.


    ## Program Code


    Here, we will discuss all the important fragments of the program code using Encog.
    Just remember that you can find the documentation for all the Encog APIs and many
    examples of programming on the Encog website.'
