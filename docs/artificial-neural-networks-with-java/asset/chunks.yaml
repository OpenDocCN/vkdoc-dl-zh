    method. When the `workingMode` field is 1, it calls the training method in a loop
    (the way we did it previously). However, because we now have many micro-batch
    training files (instead of the single dataset), we need to expand the `errorCode`
    array to hold one more value: the micro-batch number.


    ### Code Fragment 1 of the Training Method


    If after many iterations the network error is unable to clear the error limit,
    we exit the training method with a `returnCode` of 1. The control is returned
    to the logic inside the `getChart()` method that calls the training method in
    a loop. At that point, we need to return the parameters that the micro-batch method
    is being called with. Listing [8-6](#477043_2_En_8_Chapter.xhtml#PC8) shows code
    fragment 1 of the training method.


    ```

    if(intWorkingMode == 0)

