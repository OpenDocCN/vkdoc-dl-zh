    ## Example: Correct Way of Approximating Periodic Functions Outside of the Training
    Range


    In this example, we show how with special data preparation it is possible for
    periodic functions to be correctly approximated outside of the network training
    range. As you will see later, this technique can also be used for more complex
    periodic functions and even some nonperiodic functions.


    ### Preparing the Training Data


    As a reminder, this example needs to use the network trained on the interval [0,
    1.2] to predict the function results on the interval [3.141592654 – 4.341592654],
    which is outside the training range. We will show here how to sidestep this neural
    network restriction for the periodic function. To do this, we will first transform
    the given function values to a dataset with each record consisting of two fields:


    *   Field 1 is the difference between `xPoint` values of the current point (record)
    and the first point (record).

    *   Field 2 is the difference between the function values at the next point (record)
    and the current point (record).


    Tip


    When expressing the first field of the record as the difference between `xPoint`
    values instead of just the original `xPoint` values, we are no longer getting
    outside of the training interval even when we are trying to predict the function
    values for any next interval (in our case [3.141592654 – 4.341592654]). In other
    words, the difference between `xPoint` values on the next interval [3.141592654
    – 4.341592654] becomes within the training range.


    By constructing the input dataset in such way, we essentially teach the network
    to learn that when the difference in the function values between the current and
    the first `xPoint` is equal to some value *a*, then the difference in function
    values between the next and current points must be equal to some value *b*. That
    allows the network to predict the next day’s function value by knowing the current
    day’s function value. Table [6-5](#477043_2_En_6_Chapter.xhtml#Tab5) shows the
    transform dataset.


