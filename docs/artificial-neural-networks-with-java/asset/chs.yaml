- '# 第一部分：神经网络入门


  '
- "# 1. 了解神经网络\n\n人脑由数十亿个相互连接的神经元组成，这些神经元构成了一个神经网络。每个神经元处理一个小任务，然后激活下一个神经元，使处理得以继续。神经网络的主要特性是它们能够从周围环境中学习。这就是人类运作的方式。\n\
  \n学习过程通过增强或减弱突触连接分布在整个神经元网络中，使得更相关的信息获得更强的突触连接，而不太相关的信息则变弱。人工神经网络就是为了模仿这一过程而构建的，正如你将在本书后面学到的，这是通过调整神经元之间连接的权重来实现的。\n\
  \n人工智能神经网络架构在结构上模仿了大脑网络。它由方向性连接的神经元层组成。图 1-1 显示了人类神经元的示意图。\n\n![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig1_HTML.jpg](img/477043_2_En_1_Fig1_HTML.jpg)\n\
  \n**图 1-1**  \n人类神经元的示意图\n\n### 生物神经元与人工神经元\n\n生物神经元（在简化层面上）由带有细胞核的细胞体、轴突和突触组成。突触接收冲动，由细胞体处理。细胞体通过轴突向与其他神经元相连的突触发送响应。模仿生物神经元，人工神经元由一个神经元体和与其他神经元的连接组成（见图\
  \ 1-2）。\n\n![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig2_HTML.jpg](img/477043_2_En_1_Fig2_HTML.jpg)\n\
  \n**图 1-2**  \n单个人工神经元\n\n每个输入到神经元的信号都被分配一个权重`W`。分配给神经元的权重表示该输入在计算网络输出时的影响程度。如果分配给神经元`W[1]`的权重大于分配给神经元`W[2]`的权重，那么输入\
  \ 1 对网络输出的影响比输入 2 更显著。我们稍后将展示这是如何工作的。\n\n神经元的主体被描绘成一个被竖线分成两部分的圆圈。左侧部分称为“神经元的网络输入”，是神经元主体进行计算的部分。这一部分在网络图中通常标记为`Z`。例如，图\
  \ 1-2 所示神经元的`Z`值计算为每个输入乘以相应权重（`W`）的总和。这是方程 1-1 的线性部分。\n\n```\nZ = W[1]*I[1] + W[2]*I[2]\
  \ + W[3]*I[3]      (1-1)\n```\n\n\n\n### 激活函数\n\n为了计算同一神经元（图 1-2）的输出 `O`，我们将某种特殊的非线性函数（称为*激活函数*，Ϭ）应用于计算的线性部分\
  \ `Z`（公式 1-2）。\n\n`O = Ϭ(Z)` (1-2)\n\n神经网络中使用的激活函数有很多种。它们的选择取决于其表现良好（未饱和）的区间、函数值随自变量变化的速率，以及个人偏好。让我们来看一种最常用的激活函数，称为\
  \ *sigmoid*。该函数的公式如公式 1-3 所示。\n\n`Ϭ(Z) =` ![$$ \\frac{1}{1+{e}^{-z}} $$](img/477043_2_En_1_Chapter_TeX_IEq1.png)\
  \ (1-3)\n\n图 1-3 展示了 sigmoid 激活函数的图像。\n\n![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig3_HTML.jpg](img/477043_2_En_1_Fig3_HTML.jpg)\n\
  \n**图 1-3** Sigmoid 函数图像\n\n如图 1-3 所示，sigmoid 函数（有时也称为 *logistic* 函数）在区间 `[-1, 1]`\
  \ 上表现最佳。在此区间之外，它会迅速饱和，这意味着当自变量变化时，其函数值不再变化。这就是为什么（你将在后面了解到）网络的输入数据通常被归一化到 `[-1,\
  \ 1]` 区间内。\n\n一些激活函数在区间 `[0, 1]` 上表现良好，因此这些激活函数的输入数据会相应地归一化到 `[0, 1]` 区间。图 1-4 列出了最常用的激活函数，包括函数名称、图像、方程以及函数的导数。图\
  \ 1-4 在计算网络内部各部分时将非常有用。\n\n![../images/477043_2_En_1_Chapter/477043_2_En_1_Fig4_HTML.jpg](img/477043_2_En_1_Fig4_HTML.jpg)\n\
  \n**图 1-4** 激活函数\n\n我们偏好的激活函数是 `tanh`。它在区间 `[-1, 1]` 上也表现良好（类似于 sigmoid 激活函数），但在此区间内的变化速率比\
  \ sigmoid 函数更快，并且饱和得更慢。在本书的几乎所有示例中，我们都使用 `tanh`。\n\n### 本章小结\n\n本章向你介绍了人工智能神经网络，解释了神经网络的所有重要概念，如层、神经元、连接、权重和激活函数。本章还解释了绘制神经网络图时使用的约定。下一章将通过手动计算所有网络结果，展示神经网络处理的全部细节。为简洁起见，在本书的其余部分，术语*神经网络*和*网络*将互换使用。\n\
  \n"
- "# 2. 神经网络处理的内部机制\n\n本章讨论神经网络处理的内部工作原理，展示网络是如何构建、训练和测试的。\n\n### 待逼近的函数\n\n让我们考虑图\
  \ 2-1 中所示的函数 `y(x) = x²`。然而，我们假设该函数的公式是未知的，并且我们只知道该函数在四个点上的值。\n\n![../images/477043_2_En_2_Chapter/477043_2_En_2_Fig1_HTML.jpg](img/477043_2_En_2_Fig1_HTML.jpg)\n\
  \n**图 2-1** 函数图像\n\n表 2-1 显示了该函数在四个点上的值。\n\n**表 2-1** 在四个点上给出的函数值\n\n| x | f(x)\
  \ |\n| --- | --- |\n| 1 | 1 |\n| 3 | 9 |\n| 5 | 25 |\n| 7 | 49 |\n\n我们希望构建一个公式（或过程），用于预测这个未知函数在未给出的某些自变量（`x`）上的值（在统计分析中，这种处理称为*回归*）。为了能够获得未给出点上的函数值，我们需要逼近这个函数。逼近完成后，我们就可以找到该函数在任何感兴趣点上的值。这正是神经网络的用途，因为网络是一种通用的逼近机制。\n\
  \n### 网络架构\n\n网络是如何构建的？网络是通过包含神经元层来构建的（见图 2-2）。左侧的第一层是输入层，包含接收外部输入的神经元。右侧的最后一层是输出层，包含承载网络输出的神经元。一个或多个隐藏层位于输入层和输出层之间。隐藏层神经元用于在函数逼近过程中执行大部分计算。图\
  \ 2-2 展示了网络图。\n\n![../images/477043_2_En_2_Chapter/477043_2_En_2_Fig2_HTML.jpg](img/477043_2_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2** 神经网络架构\n\n从前一层神经元到下一层神经元之间绘制了连接。前一层中的每个神经元都与下一层的所有神经元相连。这样的网络称为*全连接网络*。每个连接都带有一个权重。每个权重由两个索引编号。第一个索引是接收神经元的编号，第二个索引是发送神经元的编号。例如，隐藏层中第二个神经元（`H[2]`）与输入层中唯一神经元（`I[1]`）之间的连接被赋予权重\
  \ `W¹[21]`。上标 1 表示发送神经元所在的层号。每个网络层都分配有一个偏置。偏置类似于分配给神经元的权重，但应用于整个层。\n\n当网络处理开始时，权重和偏置的初始值通常是随机设置的。通常，要确定隐藏层中的神经元数量，可以将输入层神经元数量加倍，然后加上输出层神经元数量。在我们的例子中，是\
  \ `(1*2+1 = 3)`，即三个神经元。确定网络中使用的隐藏层数量取决于待逼近函数的复杂度。通常，对于一个平滑的连续函数，一个隐藏层就足够了；而对于更复杂的函数拓扑，则需要更多的隐藏层。在实践中，能够带来最佳逼近结果的隐藏层数量和神经元数量通常是通过实验确定的。\n\
  \n网络处理包括两个过程：前向传播和反向传播。\n\n在前向传播中，计算从左向右进行。对于每个神经元，网络获取该神经元的输入，并计算该神经元的输出。\n\n\n\
  \n### 前向传播计算\n\n以下是前向传播计算：\n\n神经元 `H[1]`\n\n`Z¹[1] = W¹[11]*I[1] + B[1]*1`\n\n`H[1]\
  \ = Ϭ(Z¹[1])`\n\n神经元 `H[2]`\n\n`Z¹[2] = W¹[21]*I[1] + B[1]*1`\n\n`H[2] = Ϭ(Z¹[2])`\n\
  \n神经元 `H[3]`\n\n`Z¹[3] = W¹[31]*I[1] + B[1]*1`\n\n`H[3] = Ϭ(Z¹[3])`\n\n上述计算给出了神经元\
  \ `H[1]`、`H[2]` 和 `H[3]` 的输出。这些值在处理下一层（本例中为输出层）的神经元时被用作输入。\n\n神经元 `O[1]`\n\n`Z²[1]\
  \ = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1`\n\n`O[1] = Ϭ(Z²[1])`\n\n第一次传播中的计算给出了网络的输出（称为*网络预测值*）。当我们训练网络时，我们使用训练数据点的已知输出，称为*实际值*或*目标值*。通过了解网络对于给定输入应产生的输出值，我们可以计算网络误差，即目标值与网络计算值（预测值）之间的差值。对于本例中我们要逼近的函数，实际（目标）值如表\
  \ 2-2 的第二列所示。\n\n**表 2-2** 示例的输入数据集\n\n| x | f(x) |\n| --- | --- |\n| 1 | **1**\
  \ |\n| 3 | **9** |\n| 5 | **25** |\n| 7 | **49** |\n\n对输入数据集中的每条记录都进行计算。例如，处理输入数据集的第一条记录时使用以下公式。\n\
  \n#### 输入记录 1\n\n以下是输入记录 1：\n\n神经元 `H[1]`\n\n`Z¹[1] = W¹[11]*I[1] + B[1]*1.00 =\
  \ W¹[11]*1.00 + B[1]*1.00`\n\n`H[1] = Ϭ(Z¹[1])`\n\n神经元 `H[2]`\n\n`Z¹[2] = W¹[21]*I[1]\
  \ + B[1]*1.00 = W¹[21]*1.00 + B[1]*1.00`\n\n`H[2] = Ϭ(Z¹[2])`\n\n神经元 `H[3]`\n\n\
  `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*1.00 + B[1]*1.00`\n\n`H[3] = Ϭ(Z¹[3])`\n\
  \n神经元 `O[1]`\n\n`Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`\n\n\
  `O[1] = Ϭ(Z²[1])`\n\n记录 1 的误差如下：\n\n`E[1] = Ϭ(Z²[1]) – 记录 1 的目标值 = Ϭ(Z²[1]) – 1.00`\n\
  \n#### 输入记录 2\n\n以下是输入记录 2：\n\n神经元 `H[1]`\n\n`Z¹[1] = W¹[11]*I[1] + B[1]*1.00 =\
  \ W¹[11]*3.00 + B[1]*1.00`\n\n`H[1] = Ϭ(Z¹[1])`\n\n神经元 `H[2]`\n\n`Z¹[2] = W¹[21]*I[1]\
  \ + B[1]*1.00 = W¹[21]*3.00 + B[1]*1.00`\n\n`H[2] = Ϭ(Z¹[2])`\n\n神经元 `H[3]`\n\n\
  `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*3.00 + B[1]*1.00`\n\n`H[3] = Ϭ(Z¹[3])`\n\
  \n神经元 `O[1]`\n\n`Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`\n\n\
  `O[1] = Ϭ(Z²[1])`\n\n记录 2 的误差如下：\n\n`E[1] = Ϭ(Z²[1]) – 记录 2 的目标值 = Ϭ(Z²[1]) – 9.00`\n\
  \n#### 输入记录 3\n\n以下是输入记录 3：\n\n神经元 `H[1]`\n\n`Z¹[1] = W¹[11]*I[1] + B[1]*1.00 =\
  \ W¹[11]*5.00 + B[1]*1.00`\n\n`H[1] = Ϭ(Z¹[1])`\n\n神经元 `H[2]`\n\n`Z¹[2] = W¹[21]*I[1]\
  \ + B[1]*1.00 = W¹[21]*5.00 + B[1]*1.00`\n\n`H[2] = Ϭ(Z¹[2])`\n\n神经元 `H[3]`\n\n\
  `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*5.00 + B[1]*1.00`\n\n`H[3] = Ϭ(Z¹[3])`\n\
  \n神经元 `O[1]`\n\n`Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`\n\n\
  `O[1] = Ϭ(Z²[1])`\n\n记录 3 的误差如下：\n\n`E[1] = Ϭ(Z²[1]) – 记录 3 的目标值 = Ϭ(Z²[1]) – 25.00`\n\
  \n#### 输入记录 4\n\n以下是输入记录 4：\n\n神经元 `H[1]`\n\n`Z¹[1] = W¹[11]*I[1] + B[1]*1.00 =\
  \ W¹[11]*7.00 + B[1]*1.00`\n\n`H[1] = Ϭ(Z¹[1])`\n\n神经元 `H[2]`\n\n`Z¹[2] = W¹[21]*I[1]\
  \ + B[1]*1.00 = W¹[21]*7.00 + B[1]*1.00`\n\n`H[2] = Ϭ(Z¹[2])`\n\n神经元 `H[3]`\n\n\
  `Z¹[3] = W¹[31]*I[1] + B[1]*1.00 = W¹[31]*7.00 + B[1]*1.00`\n\n`H[3] = Ϭ(Z¹[3])`\n\
  \n神经元 `O[1]`\n\n`Z²[1] = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1.00`\n\n\
  `O[1] = Ϭ(Z²[1])`\n\n输入记录 4 的误差如下：\n\n`E[1] = Ϭ(Z²[1]) – 记录 4 的目标值 = Ϭ(Z²[1]) –\
  \ 49.00`\n\n当所有记录都处理完毕后，处理过程中的这个点被称为一个*周期*。此时，我们取所有记录的网络误差的平均值，即 `E = (E1 + E2 +\
  \ E3 + E4)/4`，这就是当前周期的误差。显然，第一个周期（使用随机初始化的权重/偏置）的误差对于良好的函数逼近来说会太大；因此，我们需要将这个误差减小到可接受的（期望的）值，称为*误差限*，我们在处理开始时设定它。减小网络误差是在反向传播（也称为*反向传播*）中完成的。\n\
  \n### 反向传播\n\n如何减小网络误差？显然，初始的权重和偏置值是随机设置的，它们并不理想，这导致了周期误差显著。\n\n我们需要调整它们，使得新的值能够导致更小的网络计算误差。反向传播通过将误差重新分配到输出层和隐藏层的所有网络神经元之间，并调整它们的初始权重值来实现这一点。同时也会对层偏置进行调整。\n\
  \n为了调整每个神经元的权重，我们计算误差函数相对于该神经元输出的偏导数。例如，对于神经元 `O[1]`，计算出的偏导数是 `∂E/∂O₁`。由于偏导数指向函数值增加的方向（但我们需要减小误差函数的值），因此权重调整应在相反方向进行。\n\
  \n*调整后的权重值* = *原始权重值* – η * `∂E/∂O₁`\n\n这里，η 是网络的学习率，它控制网络学习的速度。其值通常设置在 0.1 到 1.0\
  \ 之间。\n\n对每一层的偏置也进行类似的计算。对于偏置 `B[1]`，计算出的偏导数是 `∂E/∂B₁`；然后按如下方式计算调整后的偏置：\n\n*调整后的偏置值*\
  \ `B[1]` = *原始偏置值* `B[1]` – η * `∂E/∂B₁`\n\n通过对每个网络神经元和每层偏置重复此计算，我们得到一组新的调整后的权重/偏置值。有了新的权重/偏置值集，我们返回到前向传播，并使用调整后的权重/偏置计算新的网络输出。同时，我们重新计算网络输出误差。\n\
  \n由于权重/偏置的调整是在与梯度（偏导数）相反的方向上进行的，因此新计算出的网络误差应该会减小。我们循环重复前向和反向传播，直到误差小于我们的误差限。此时，网络被认为已训练完成，我们将训练好的网络保存到磁盘上。训练好的网络包含所有权重和偏置参数，这些参数能够以所需的精度逼近预测的函数值。在下一章中，我们将手动处理一些示例，并展示所有详细的计算过程。不过，在此之前，我们需要复习一下函数导数和梯度的知识。\n\
  \n\n\n### 函数导数与函数散度\n\n函数的导数定义如下：\n\n![$$ \\frac{\\partial f}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq5.png)\
  \ = ![$$ \\frac{f\\left(x+ dx\\right)-f(x)}{dx} $$](img/477043_2_En_2_Chapter_TeX_IEq6.png)\n\
  \n其中 `∂x` 是函数自变量的一个微小变化量。\n\n- `f(x)`: 自变量改变前的函数值\n- `f(x + ∂x)`: 自变量改变后的函数值\n\n\
  函数导数表示单变量函数 `f(x)` 在点 `x` 处的变化率。梯度是多变量函数 `f(x, y, z)` 在点 `(x, y, z)` 处的导数（变化率）。多变量函数\
  \ `f(x, y, z)` 的梯度是由每个方向上的分量（![$$ \\frac{\\partial f}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq7.png),\
  \ ![$$ \\frac{\\partial f}{\\partial y} $$](img/477043_2_En_2_Chapter_TeX_IEq8.png),\
  \ ![$$ \\frac{\\partial f}{\\partial z}\\ \\Big) $$](img/477043_2_En_2_Chapter_TeX_IEq9.png)\
  \ 相乘得到的。每个分量被称为函数 `f(x, y, z)` 关于特定变量（方向）`x`、`y`、`z` 的*偏导数*。\n\n函数任意点处的梯度总是指向该函数增长最快的方向。在局部最大值或局部最小值处，梯度为零，因为在这些位置没有单一的增长方向。当我们寻找函数的最小值（例如，误差函数的最小值）时，我们沿着与梯度相反的方向移动。\n\
  \n计算导数有若干规则。\n\n- 幂法则：![$$ \\frac{\\partial }{\\partial x}\\Big( $$](img/477043_2_En_2_Chapter_TeX_IEq10.png)`u^a`)\
  \ = `a * u^(a-1)` * ![$$ \\frac{\\partial u}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq11.png)\n\
  \n- 乘积法则：![$$ \\frac{\\partial \\left(u\\ast v\\right)}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq12.png)\
  \ = `u` * ![$$ \\frac{\\partial v}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq13.png)\
  \ + `v` * ![$$ \\frac{\\partial u}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq14.png)\n\
  \n- 商法则：![$$ \\frac{\\partial f}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq15.png)\
  \ (![$$ \\frac{u}{v} $$](img/477043_2_En_2_Chapter_TeX_IEq16.png)) = ![$$ \\frac{v\\\
  ast \\frac{\\partial u}{\\partial x}-u\\ast \\frac{\\partial v}{\\partial x\\ }}{v²}\
  \ $$](img/477043_2_En_2_Chapter_TeX_IEq17.png)\n\n- 链式法则：该法则告诉我们如何对复合函数求导。\n\n \
  \   它指出 ![$$ \\frac{\\kern0.5em \\partial y}{\\partial x}=\\frac{\\kern0.5em \\\
  partial y}{\\partial u}\\ast \\frac{\\kern0.5em \\partial u}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq18.png)，其中\
  \ `u = f(x)`。\n\n    示例如下：`y = u⁸` 且 `u = x² + 5`。\n\n    根据链式法则，\n\n    ![$$ \\\
  frac{\\kern0.5em \\partial y}{\\partial x}=\\frac{\\kern0.5em \\partial y}{\\partial\
  \ u}\\ast \\frac{\\kern0.5em \\partial u}{\\partial x} $$](img/477043_2_En_2_Chapter_TeX_IEq19.png)\
  \ = `8u⁷ * 2x` = `16x * (x² + 5)⁷`\n\n#### 最常用的函数导数\n\n图 2-3 展示了最常用的函数导数。\n\n![../images/477043_2_En_2_Chapter/477043_2_En_2_Fig3_HTML.jpg](img/477043_2_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3\n\n常用导数\n\n了解 sigmoid 激活函数的导数也很有帮助。\n\n`Ϭ(Z) = 1 / (1 + exp(-Z))`\n\n![../images/477043_2_En_2_Chapter/477043_2_En_2_Figa_HTML.png](img/477043_2_En_2_Figa_HTML.png)\n\
  \nsigmoid 激活函数的导数给出了该激活函数在任意神经元处的变化率。\n\n### 总结\n\n本章通过解释所有处理结果是如何计算的，探讨了神经网络处理的内部机制。它向你介绍了导数和梯度，并描述了这些概念如何用于寻找误差函数的最小值之一。下一章将展示一个手动计算结果的具体示例。仅仅描述计算规则不足以理解该主题，因为将这些规则应用于特定的网络架构确实很棘手。\n\
  \n"
- "# 3. 手动神经网络处理\n\n在本章中，我们通过一个简单的示例来展示神经网络处理的内部细节。我们提供了处理前向传播和反向传播过程所涉及计算的详细分步说明。\n\
  \n> **注意**  \n> 需要指出的是，本章中的所有计算均基于第 2 章所解释的信息。如果你在阅读本章时遇到任何问题，请查阅第 2 章以获取解释。\n\n\
  ### 示例：单点处函数的手动近似\n\n图 3-1 展示了在三维空间中显示的向量。\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig1_HTML.jpg](img/477043_2_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n\n三维空间中的向量\n\n它表示函数 `y = f(x1, x2)` 的值，其中 `x1 = 0.01` 且 `x2 = 0.02`。\n\n\
  `y(0.01, 0.02) = 0.80`\n\n\n\n### 构建神经网络\n\n我们要构建并训练一个网络，使其对于给定的输入（`x1 = 0.01`，`x2\
  \ = 0.02`）能够计算出输出结果 `y = 0.80`（网络的**目标值**）。图 3-2 展示了该示例的网络图。\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig2_HTML.png](img/477043_2_En_3_Fig2_HTML.png)\n\
  \n图 3-2\n\n网络图\n\n该网络包含三层神经元（输入层、隐藏层和输出层）。输入层有两个神经元（`I[1]` 和 `I[2]`），隐藏层有三个神经元（`H[1]`、`H[2]`、`H[3]`），输出层有一个神经元（`O[1]`）。权重显示在箭头附近，这些箭头表示神经元之间的连接（例如，神经元\
  \ `I[1]` 和 `I[2]` 为神经元 `H[1]` 提供输入，对应的权重分别为 `W¹[11]` 和 `W¹[12]`）。\n\n隐藏层和输出层神经元（`H[1]`、`H[2]`、`H[3]`\
  \ 和 `O[1]`）的主体被表示为一个分为两部分的圆圈（见图 3-3）。神经元主体的左侧部分显示该神经元计算出的网络输入值（`Z¹[1] = W¹[11]*I[1]+W¹[12]*I[2]\
  \ + B[1]*1`）。偏置的初始值通常设置为 1.00。右侧部分显示通过对神经元的网络输入应用激活函数而计算出的神经元输出。\n\n`H[1] = Ϭ(Z¹[1])\
  \ = 1/(1+exp(- Z¹[1]))`\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig3_HTML.jpg](img/477043_2_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\n隐藏层和输出层中的神经元表示\n\n误差函数的计算用一个方框表示，以区别于神经元（见图 3-4）。\n\n![../images/477043_2_En_3_Chapter/477043_2_En_3_Fig4_HTML.jpg](img/477043_2_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4\n\n误差函数表示\n\n`B[1]` 和 `B[2]` 是相应网络层的偏置。\n\n以下是网络初始设置的摘要：\n\n- 神经元 `I[1]`\
  \ 的输入 = 0.01\n- 神经元 `I[2]` 的输入 = 0.02\n- `T[1]` -（神经元 `O[1]` 的目标输出）= 0.80\n\n我们还需要为权重和偏置参数分配初始值。初始参数的值通常是随机设置的，但对于本例，我们为其分配以下值：\n\
  \n`W¹[11] = 0.05` `W¹[12] = 0.06` `W¹[21] = 0.07` `W¹[22] = 0.08` `W¹[31] = 0.09` `W¹[32]\
  \ = 0.10`\n\n`W²[11] = 0.11` `W²[12] = 0.12` `W²[13] = 0.13`\n\n`B[1] = 0.20`\n\n\
  `B[2] = 0.25`\n\n### 前向传播计算\n\n前向传播计算从隐藏层开始。\n\n#### 隐藏层\n\n以下是隐藏层：\n\n神经元 `H[1]`：\n\
  \n1. 计算神经元 `H[1]` 的总净输入。\n\n   `Z¹[1] = W¹[11]* I[1] + W¹[12]* I[2] + B[1]*1.00\
  \ = 0.05*0.01 + 0.06*0.02 + 0.20*1.00 = 0.2017000000000000` (3-1)\n\n2. 使用逻辑函数获取\
  \ `H[1]` 的输出。\n\n   `H[1] = δ(Z¹[1]) = 1/(1+exp(- Z¹[1])) = 1/(1+exp(-0.2017000000000000))\
  \ = 0.5502547397403884` (3-2)\n\n神经元 `H[2]`：\n\n- `Z¹[2] = W¹[21]* I[1] + W¹[22]*\
  \ I[2] + B[1]*1.00 = 0.07*0.01 + 0.08*0.02 + 0.20*1.00 = 0.2023`\n\n  `H[2] = 1/(1+exp(-0.2023))\
  \ = 0.5504032199355139` (3-3)\n\n神经元 `H[3]`：\n\n- `Z¹[2] = W¹[31]* I[1] + W¹[32]*\
  \ I[2] + B[1]*1.00 = 0.09*0.01 + 0.10*0.02 + 0.20*1.00 = 0.20290000000000002`\n\n\
  \  `H[3] = 1/(1+exp(-0.20290000000000002)) = 0.5505516911502556` (3-4)\n\n#### 输出层\n\
  \n输出层神经元 `O[1]` 的计算与隐藏层神经元计算类似，但有一个区别。输出神经元 `O[1]` 的输入是相应隐藏层神经元的输出。另外，请注意有三个隐藏层神经元对输出层神经元\
  \ `O[1]` 有贡献。\n\n神经元 `O[1]`：\n\n1. 计算神经元 `O` 的总净输入。\n\n   `Z²[1] = W²[11]* H[1]\
  \ + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00 = 0.11*0.5502547397403884 + 0.12*0.5504032199355139\
  \ + 0.13*0.5505516911502556 + 0.25*1.00 = 0.44814812761323763` (3-5)\n\n2. 使用逻辑函数\
  \ `Ϭ` 获取 `O[1]` 的输出。\n\n   `O[1] = Ϭ(Z²[1]) = 1/(1+exp(- Z²[1])) = 1/(1+exp(-0.44814812761323763))\
  \ = 0.6101988445912522` (3-6)\n\n神经元 `O[1]` 计算出的输出是 0.6101988445912522，而神经元 `O[1]`\
  \ 的目标输出必须等于 0.80；因此，神经元 `O[1]` 输出的平方误差如下：\n\n- `E = 0.5*(T[1] – O[1])² = 0.5*(0.80\
  \ - 0.6101988445912522) = 0.01801223929724783` (3-7)\n\n这里需要做的是最小化网络计算出的误差，以获得良好的近似结果。这是通过在输出层和隐藏层神经元的权重和偏置之间重新分配网络误差来实现的，同时考虑到每个神经元对网络输出的影响取决于其权重。此计算在反向传播过程中完成。\n\
  \n为了将误差重新分配给所有输出层和隐藏层神经元并调整它们的权重，我们需要了解当每个神经元的权重发生变化时，最终误差值会变化多少。每层偏置的情况也是如此。通过将网络误差重新分配给所有输出层和隐藏层神经元，我们实际上是在计算每个神经元权重和每层偏置的调整量。\n\
  \n### 反向传播计算\n\n计算每个网络神经元/层的权重和偏置调整量是通过反向移动（从网络误差到输出层，然后从输出层到隐藏层）来完成的。\n\n#### 计算输出层神经元的权重调整量\n\
  \n让我们计算神经元 `W²[11]` 的权重调整量。正如我们已经知道的，函数的偏导数决定了误差函数参数的一个微小变化对函数值相应变化的影响。将其应用于神经元\
  \ `W²[11]`，我们想知道 `W²[11]` 的变化如何影响网络误差 `E`。为此，我们需要计算误差函数 `E` 关于 `W²[11]` 的偏导数，即 `![$$\
  \ \\frac{\\partial E}{\\partial {W²}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq1.png)`。\n\
  \n\n\n##### 计算 `W²[11]` 的调整量\n\n应用链式法则求导，`∂E/∂W²[11]` 可由以下公式表示：\n\n![$$ \\frac{\\\
  partial E}{\\partial {W²}_{11}}=\\frac{\\partial E}{\\partial {O}_1}\\ast \\frac{\\\
  partial {O}_1}{\\partial {Z}_1²}\\ast \\frac{\\partial {Z}_1²}{\\partial {W²}_{11}}\
  \ $$](img/477043_2_En_3_Chapter_TeX_IEq2.png) (3-8)\n\n让我们使用微积分分别计算等式的每个部分。\n\n\
  `E = 0.5*(T[1] – O[1])²`\n\n![$$ \\frac{\\partial E}{\\partial {O}_1}=2\\ast 0.5\\\
  ast \\left({T}_1\\hbox{--} {O}_1\\right)\\ast \\frac{\\partial \\left(0.5\\left(T1\\\
  hbox{--} O1\\right)\\right)}{\\partial {O}_1}= $$](img/477043_2_En_3_Chapter_TeX_IEq3.png)\
  \ `(T[1] - O[1])*(-1) = O[1]- T[1] = 0.80 – 0.6101988445912522 = -0.18980115540874787`\
  \ (3-9)\n\n![$$ \\frac{\\partial {O}_1}{\\partial {Z}_1²} $$](img/477043_2_En_3_Chapter_TeX_IEq4.png)\
  \ 是 Sigmoid 激活函数的导数，等于 `O[1]*(1- O[1]) = 0.6101988445912522*(1 - 0.6101988445912522)\
  \ = 0.23785621465075305` (3-10)\n\n![$$ Calculating\\ \\frac{\\partial {Z}_1²}{\\\
  partial {W}_{11}²} $$](img/477043_2_En_3_Chapter_TeX_Equa.png)\n\n`Z²[1] = W²[11]*\
  \ H[1] + W²[12]* H[2] + W²[13]* H[3] + B[2]*1.00` (3-11)\n\n![$$ \\frac{\\partial\
  \ {Z}_1²}{\\partial {W}_{11}²}=\\mathrm{H}1=0.5502547397403884 $$](img/477043_2_En_3_Chapter_TeX_IEq5.png)\
  \ (3-12)\n\n注意，![$$ \\frac{\\partial \\left({W}²¹²\\ast H2+{W}²¹³\\ast H3+B2\\ast\
  \ 1.00\\right)}{\\partial {W²}_{11}}=0 $$](img/477043_2_En_3_Chapter_TeX_IEq6.png)，因为这部分不依赖于\
  \ `W²[11]`。\n\n综合起来，我们得到：\n\n![$$ \\frac{\\partial E}{\\partial {W²}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq7.png)\
  \ `= -0.18980115540874787 * 0.23785621465075305 * 0.5502547397403884 = -0.024841461722517316`\
  \ (3-13)\n\n为了减小误差，我们需要从 `W²[11]` 的原始值中减去 ![$$ \\frac{\\partial E}{\\partial {W²}_{11}}\
  \ $$](img/477043_2_En_3_Chapter_TeX_IEq8.png) 的值（可选择乘以某个学习率 `η`），从而计算出 `W²[11]`\
  \ 的新调整值。\n\n`adjustedW²[11] = W²[11] – η * ∂E/∂W²[11]`。在此示例中，`η = 1`。 (3-14)\n\n\
  `adjustedW²[11] = 0.11 + 0.024841461722517316 = 0.13484146172251732`\n\n##### 计算\
  \ `W²[12]` 的调整量\n\n应用链式法则求导，`∂E/∂W²[12]` 可由以下公式表示：\n\n![$$ \\frac{\\partial E}{\\\
  partial {W²}_{11}}=\\frac{\\partial E}{\\partial {O}_1}\\ast \\frac{\\partial {O}_1}{\\\
