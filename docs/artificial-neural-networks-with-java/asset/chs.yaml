  \ 8-1 到 8-5 完成。\n\n神经元 `H[1]`\n\n`Z¹[1] = W¹[11]*I[1] + B[1]*1`\n\n`H[1] = Ϭ(Z¹[1])`\
  \  (8-1)\n\n神经元 `H[2]`\n\n`Z¹[2] = W¹[21]*I[1] + B[1]*1`\n\n`H[2] = Ϭ(Z¹[2])`  (8-2)\n\
  \n神经元 `H[3]`\n\n`Z¹[3] = W¹[31]*I[1] + B[1]*1`\n\n`H[3] = Ϭ(Z¹[3])`  (8-3)\n\n这些计算给出了神经元\
  \ `H[1]`、`H[2]` 和 `H[3]` 的输出。这些值在处理下一层（本例中为输出层）的神经元时会被用到。\n\n神经元 `O[1]`\n\n`Z²[1]\
  \ = W²[11]*H[1] + W²[12]*H[2] + W²[13]*H[3] + B[2]*1`\n\n`O[1] = Ϭ(Z²[1])`  (8-4)\n\
  \n误差函数如下：\n\n`E = 0.5 * (记录的实际值 - O[1])²`  (8-5)\n\n在公式 8-1 到 8-3 中，`Ϭ` 是激活函数，`W`\
