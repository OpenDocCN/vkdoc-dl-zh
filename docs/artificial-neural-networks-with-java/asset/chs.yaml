  | 19 | 1 | 8 | 0 | 0 | 0 | 0 | 0 |\n| 27 | 23 | 17 | 0 | 0 | 0 | 0 | 0 |\n\n实际上，测试文件中不需要包含目标列；但是，为了方便（比较预测结果和实际结果），我们将其包含在内。这些列不用于处理。像往常一样，我们需要在区间\
  \ `[-1, 1]` 上对训练和测试数据集进行归一化。由于此示例在输入层和输出层具有多个神经元，我们将在此处展示归一化的源代码。\n\n\n\n#### 数据归一化的程序代码\n\
  \n清单 10-2 展示了训练和测试数据集归一化的程序代码。\n\n```\n// ============================================================\n\
  // This program normalizes all columns of the input CSV dataset putting the\n//\
  \ result in the output CSV file.\n// ============================================================\n\
  package sample5_norm;\nimport java.io.BufferedReader;\nimport java.io.BufferedWriter;\n\
  import java.io.PrintWriter;\nimport java.io.FileNotFoundException;\nimport java.io.FileReader;\n\
  import java.io.FileWriter;\nimport java.io.IOException;\nimport java.nio.file.*;\n\
  public class Sample5_Norm\n{\n// Interval to normalize\nstatic double Nh =  1;\n\
  static double Nl = -1;\n// First column\nstatic double minXPointDl = 1.00;\nstatic\
  \ double maxXPointDh = 1000.00;\n// Second column - target data\nstatic double minTargetValueDl\
  \ = 60.00;\nstatic double maxTargetValueDh = 1600.00;\npublic static double normalize(double\
  \ value, double Dh, double Dl)\n{\ndouble normalizedValue = (value - Dl)*(Nh - Nl)/(Dh\
  \ - Dl) + Nl;\nreturn normalizedValue;\n}\npublic static void main(String[] args)\n\
