  \ = 1 (3-66)\n\n![$$ \\frac{\\partial E}{\\partial {B}_1}=\\frac{\\partial E}{\\\
  partial {H}_1}\\ast \\frac{\\partial {H}_1}{\\partial {Z}_1¹}\\ast 1 $$](img/477043_2_En_3_Chapter_TeX_IEq63.png)\
  \ = `δ¹[1]` (3-67)\n\n![$$ \\frac{\\partial E}{\\partial {B}_2}=\\frac{\\partial\
