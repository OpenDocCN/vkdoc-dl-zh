  \ = 归一化区间 [-1, 1] 的左侧部分 = -1\n- `N[H]` = 归一化区间 [-1, 1] 的右侧部分 = 1\n\n反归一化后，我们计算`realTargetDiffValue`和`realPredictDiffValue`字段，在处理日志中打印它们的值，并为当前记录填充图表数据。最后，我们将图表文件保存到磁盘，并以返回码\
