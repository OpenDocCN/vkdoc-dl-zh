  \n在被调用的方法内部，逻辑会在 500 次迭代后检查误差值。如果网络计算出的误差仍然大于误差限制，该方法将以 `returnCode` 为 1 退出。并且，正如我们刚才所见，该方法将被再次调用。最后，当计算出的误差低于误差阈值时，该方法以\
  \ `returnCode` 为 0 退出，并且不再被调用。您通过实验选择误差限制值，使网络难以清除误差代码限制，但仍确保经过足够多的迭代后，误差将低于误差限制。\n\
