  \ (3-80)\n\n神经元 `H[2]`:\n\n*   `Z¹[2]` = `W¹[21]` * `I[1]` + `W¹[22]` * `I[2]` +\
  \ `B[1]` * 1.00 = 0.07002698635479371 * 0.01 + 0.08005397270958742 * 0.02 + 0.2451453843618641\
  \ * 1.00 = 0.24744673367960376 (3-81)\n\n    `H[2]` = 1 / (1 + exp(-0.24744673367960376))\
  \ = 0.5615479555799516 (3-82)\n\n神经元 `H[3]`:\n\n*   `Z¹[3]` = `W¹[31]` * `I[1]`\
  \ + `W¹[32]` * `I[2]` + `B[1]` * 1.00 = 0.09011170978258068 * 0.01 + 0.10022341956516137\
  \ * 0.02 + 0.2451453843618641 * 1.00 = 0.24805096985099312\n\n    `H[3]` = 1 / (1\
  \ + exp(-0.24805096985099312)) = 0.5616967201480348 (3-83)\n\n\n\n#### 输出层\n\n以下是输出层：\n\
  \n神经元 `O[1]`：\n\n1.  计算神经元 `O[1]` 的总净输入。\n\n`Z²[1] = W²[11]* H[1] + W²[12]* H[2]\
  \ + W²[13]* H[3] + B[2]*1.00 = 0.13484146172251732* 0.5502547397403884 + 0.1448414617225173*0.5504032199355139\
  \ + 0.1548414617225173* 0.5505516911502556 + 0.29514538436186405*1.00 = 0.5343119733119508`\
  \ (3-84)\n\n2.  使用逻辑函数 Ϭ 从 `O[1]` 获取输出。\n\n`O[1] = Ϭ(Z²[1]) = 1/(1+exp(- Z²[1]))\
  \ = 1/(1+exp(- 0.5343119733119508)) = 0.6304882485312977` (3-85)\n\n从神经元 `O[1]`\
  \ 计算得到的输出是 `0.6304882485312977`，而 `O[1]` 的目标输出是 `0.80`；因此，以下是神经元 `O[1]` 输出的平方误差：\n\
  \n*   `E = 0.5*(T[1] – O[1])² = 0.5*(0.80 - 0.6304882485312977)² = 0.014367116942993556`\
  \ (3-86)\n\n请记住，第一次迭代时的误差是 `0.01801223929724783`（参见公式 1-7）。现在，在第二次迭代中，误差已减少到 `0.014367116942993556`。\n\
  \n我们继续这些迭代，直到网络计算出的误差小于设定的误差限。让我们看一下针对节点 `H[1]`，计算误差函数 `E` 关于 `W²[11]` 和 `W²[12]`\
  \ 的偏导数的公式。\n\n![$$ \\frac{\\partial E}{\\partial {W²}_{11}}=\\frac{\\partial E}{\\\
  partial {O}_1}\\ast \\frac{\\partial {O}_1}{\\partial {Z}_1²}\\ast \\frac{\\partial\
