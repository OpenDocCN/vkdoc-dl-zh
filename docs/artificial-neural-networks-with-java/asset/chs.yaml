  \n本章解释了对于某一类函数（在本例中是周期函数），如何有可能获得训练范围之外的预测数据。我们将在下一章继续探讨这个概念。\n\n"
- "# 7. 处理复杂周期函数\n\n在本章中，我们继续讨论如何处理周期函数，重点关注更复杂的周期函数。\n\n\n\n### 示例：复杂周期函数的逼近\n\n\
  让我们来看一下图 7-1 所示的函数图表。该函数表示以天为单位测量的某些实验数据（`x` 是实验的连续天数）。这是一个周期为 50 天的周期函数。\n\n![../images/477043_2_En_7_Chapter/477043_2_En_7_Fig1_HTML.jpg](img/477043_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\n周期函数在两个区间（1–50 天和 51–100 天）的图表\n\n表 7-1 显示了两个周期（1–50 天和 51–100 天）的函数值。\n\
  \n表 7-1\n\n两个周期的函数值\n\n| 天数 | 函数值（周期 1） | 天数 | 函数值（周期 2） |\n| --- | --- | --- |\
