  \ \\frac{\\partial E}{\\partial {W¹}_{22}} $$](img/477043_2_En_3_Chapter_TeX_IEq46.png)\
  \ `= 0.08 + 0.000053972709587411966 = 0.08005397270958742` (3-51)\n\n##### 计算 `W¹[31]`\
  \ 的调整量\n\n![$$ \\frac{\\partial E}{\\partial {W¹}_{31}}=\\frac{\\partial E}{\\partial\
