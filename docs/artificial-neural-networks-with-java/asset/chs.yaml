  \ (3-88) 和公式 (3-89) 中的公式。\n\n![$$ \\frac{\\partial E}{\\partial {W²}_{11}}= $$](img/477043_2_En_3_Chapter_TeX_IEq75.png)`δ²[1]`![$$\
  \ \\ast \\frac{\\partial {Z}_1²}{\\partial {W²}_{11}} $$](img/477043_2_En_3_Chapter_TeX_IEq76.png)\
