  #### 安装 Encog Java 框架


  从之前手动处理神经网络的一些示例（第 3 章）中可以看出，即使是对单个点的函数进行简单近似，也涉及大量的计算。对于任何严肃的工作，您都需要使用现有的框架之一。


  在编写本书时，已有多个框架可用。以下是最常用的框架列表及其适用的编程语言：


  *   TensorFlow（Python、C++ 和 R）

  *   Caffe（C、C++、Python 和 MATLAB）

  *   Torch（C++、Python）

  *   Keras（Python）

  *   Deeplearning4j（Java）

  *   Encog（Java）

  *   Neurop（Java）


  注意


  用 Java 实现的框架比用 Python 实现的效率更高。


  我们关注的是 Java 框架（原因显而易见：在一台机器上开发应用程序，并能在任何地方运行）。我们还关注一个快速且使用方便的 Java 框架。在研究了几个 Java
  框架后，我们选择了 Encog 作为神经网络处理的最佳框架。这就是我们在本书中使用的框架。Encog 框架由 Heaton Research 开发，并且可以免费使用。所有
  Encog 文档都可以在其网站上找到。


  要安装 Encog，请访问 [`https://www.heatonresearch.com/encog`](https://www.heatonresearch.com/encog)。向下滚动到名为
  Encog Java Links 的部分，然后点击 Encog Java Download/Release 链接。在下一个屏幕上，为 Encog 4.3 版本选择以下两个文件：


  ```

  encog-core-3.4.jar

  encog-java-examples.zip

  ```


