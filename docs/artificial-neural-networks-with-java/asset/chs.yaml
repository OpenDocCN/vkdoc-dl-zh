  import java.time.LocalDate;\nimport java.time.Month;\nimport java.time.ZoneId;\n\
  import java.util.ArrayList;\nimport java.util.Calendar;\nimport java.util.Date;\n\
  import java.util.List;\nimport java.util.Locale;\nimport java.util.Properties;\n\
  import java.io.BufferedReader;\nimport java.io.BufferedWriter;\nimport java.io.File;\n\
  import java.io.FileInputStream;\nimport java.io.PrintWriter;\nimport java.io.FileNotFoundException;\n\
  import java.io.FileReader;\nimport java.io.FileWriter;\nimport java.io.IOException;\n\
  import java.io.InputStream;\nimport java.nio.file.*;\nimport java.util.Properties;\n\
  public class NumberRecognition_ConvertInputTrainFile\n{\n// 归一化区间\nstatic double\
  \ Nh =  1;\nstatic double Nl = -1;\n// 输入点\nstatic double minXPointDl = 0.00;\n\
  static double maxXPointDh = 255.00;\n// 目标点\nstatic double minTargetValueDl = 0.00;\n\
  static double maxTargetValueDh = 1.00;\npublic static double normalize(double value,\
  \ double Dh, double Dl)\n{\ndouble normalizedValue = (value - Dl)*(Nh - Nl)/(Dh\
  \ - Dl) + Nl;\nreturn normalizedValue;\n}\npublic static void main(String[] args)\n\
  {\n// 归一化训练文件\nString inputFileName = \"C:/Image_Recognition/MNIS_Data/mnist_train.csv\"\
  ;\nString outputNormFileName =\n\"C:/Image_Recognition/MNIS_Data/mnist_train_input_Norm.csv\"\
  ;\nBufferedReader br = null;\nPrintWriter out = null;\nString line = \"\";\nString\
  \ cvsSplitBy = \",\";\ndouble[] inputXPointValue = new double[784] ;\ndouble[] targetXPointValue\
  \ = new double[10] ;\ndouble[] normInputXPointValue = new double[784];\ndouble[]\
  \ normTargetXPointValue = new double[10];\nString[] strNormInputXPointValue  = new\
  \ String[784];\nString[] strNormTargetXPointValue  = new String[10];;\nString strLabelLine1\
  \ = \"\";\nString fullLine;\n// 构建标签行 labelLine1\nfor (int m = 0; m < 794; m++)\n\
  if(m == 793)\nstrLabelLine1 = strLabelLine1 + Integer.toString(m);\nelse\nstrLabelLine1\
  \ = strLabelLine1 + Integer.toString(m) + \",\";\ntry\n{\nFiles.deleteIfExists(Paths.get(outputNormFileName));\n\
  br = new BufferedReader(new FileReader(inputFileName));\nout = new\nPrintWriter(new\
  \ BufferedWriter(new FileWriter(outputNormFileName)));\nout.println(strLabelLine1);\n\
  while ((line = br.readLine()) != null)\n{\n// 使用逗号作为分隔符拆分行\nString[] workFields\
  \ = line.split(cvsSplitBy);\nfor (int k = 0; k < 784; k++)\ninputXPointValue[k]\
  \ = Double.parseDouble(workFields[k+1]);\ndouble digitValue = Double.parseDouble(workFields[0]);\n\
  int workIndex = (int) digitValue;\n// 首先，清空数组 targetXPointValue\nfor (int v = 0;\
  \ v < 10; v++)\ntargetXPointValue[v] = 0.00;\ntargetXPointValue[workIndex] = 1.00;\n\
  // 对这些字段进行归一化\nfor (int k = 0; k < 784; k++)\nnormInputXPointValue[k] =\nnormalize(inputXPointValue[k],\
  \ maxXPointDh, minXPointDl);\nfor (int k = 0; k < 10; k++)\nnormTargetXPointValue[k]\
  \ =\nnormalize(targetXPointValue[k], maxTargetValueDh, minTargetValueDl);\n// 将归一化后的字段转换为字符串，以便插入到输出\
  \ CSV 文件中\nfor (int k = 0; k < 784; k++)\nstrNormInputXPointValue[k] = Double.toString(normInputXPointValue[k]);\n\
  for (int k = 0; k < 10; k++)\nstrNormTargetXPointValue[k] = Double.toString(normTargetXPointValue[k]);\n\
  // 将这些字段拼接成一个字符串行，使用逗号分隔符\nfullLine = \"\";\nfor (int k = 0; k < 784; k++)\nfullLine\
  \  = fullLine + strNormInputXPointValue[k] + \",\";\nfor (int k = 0; k < 10; k++)\n\
  {\nif(k == 9)\nfullLine  = fullLine + strNormTargetXPointValue[k];\nelse\nfullLine\
  \  = fullLine + strNormTargetXPointValue[k] + \",\";\n}\n// 将完整行写入输出文件\nout.println(fullLine);\n\
  }    // while 循环结束\nout.close();\nbr.close();\nSystem.out.println(\"转换完成。\");\n\
  System.exit(0);\n}  // TRY 块结束\ncatch (FileNotFoundException e)\n{\ne.printStackTrace();\n\
  System.exit(1);\n}\ncatch (IOException io)\n{\nio.printStackTrace();\n}\nfinally\n\
  {\nif (br != null)\n{\ntry\n{\nbr.close();\nout.close();\n}\ncatch (IOException\
  \ e)\n{\ne.printStackTrace();\n}\n}\n}\n}\n}\n```\n**清单 13-1**  \n用于转换输入训练数据集的程序代码\n\
