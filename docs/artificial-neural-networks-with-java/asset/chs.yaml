  \ (3-62)\n\n### 更新网络偏置\n\n我们需要计算偏置 `B[1]` 和 `B[2]` 的误差调整量。再次使用链式法则：\n\n![$$ \\frac{\\\
  partial E}{\\partial {B}_1}=\\frac{\\partial E}{\\partial {O}_1}\\ast \\frac{\\\
