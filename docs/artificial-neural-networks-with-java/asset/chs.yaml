  \n**图 11-6** 测试结果图表\n\n### 分析测试结果\n\n在网络训练过的所有数据点上，预测价格与实际价格高度吻合（黄色和蓝色图表几乎重叠）。然而，在下一个月的点上（网络未训练过的数据点），预测价格与实际价格（我们恰好已知）的偏差超过了\
  \ 17%。甚至下个月预测价格的方向（与上个月的差值）也是错误的。实际价格略有上涨，而预测价格却大幅下跌。\n\n由于这些数据点的价格大约在 1200 到 1300\
  \ 之间，17%的偏差意味着误差超过 200 个点。这不能被视为有效的预测，对交易者/投资者而言毫无用处。那么，问题出在哪里？我们并没有违反在训练范围外预测函数值的限制（通过将价格函数转换为依赖于月份间价格差而非连续月份）。为了回答这个问题，让我们深入研究一下。\n\
  \n当我们处理最后一条测试记录时，我们从之前的 12 条原始记录中获取其前 12 个字段的值。这些值代表当前月与上个月之间的价格差百分比。记录中的最后一个字段是下个月（第\
  \ 13 条记录）的价格值与第 12 个月价格值之间的百分比差值。所有字段均已归一化，记录如下所示：\n\n*   0.621937887 0.550328191\
  \ 0.214557935 0.12012062 0.419090615 0.571960009 0.4321489 0.039710508 0.275810074\
  \ -0.074423166 0.101592253 0.29360278 0.         (11-2)\n\n通过已知微批次记录 12 的价格（即 1,385.95），并获取网络预测的`targetPriceDiffPerc`字段（即下个月与当前月价格的百分比差值），我们可以按如下方式计算下个月的预测价格：\n\
  \n*   `nextMonthPredictedPrice = record12ActualPrice + record12ActualPrice * predictedPriceDiffPerc\
  \ / 100.00`       (11-3)\n\n为了获取网络对记录 13 的预测值（`predictedPriceDiffPerc`），我们将当前处理记录中\
  \ 12 个`inputPriceDiffPerc`字段的向量值输入训练好的网络（参见代码清单 10-2）。网络返回-16.129995719。综合所有信息，我们得到下个月的预测价格。\n\
  \n```\n1385.59 - 1385.59 *16.12999/100.00 = 1,162.0943923170353\n```\n\n下个月的预测价格等于\
  \ 1,162.09，而实际价格为 1,400.38，因此偏差为 17.02%。这正是处理日志中最后一条记录显示的结果。\n\n```\nMonth = 121\
  \  targetPrice = 1400.3800000016674  predictPrice = 1162.0943923170353   diff =\
  \ 17.0157819794876\n```\n\n下个月价格的计算结果在数学上是正确的，它基于最后一个训练点的价格与网络返回的下一个点与当前点之间的价格差百分比之和。\n\
  \n问题在于，历史股票市场价格不会在相同或相似条件下重复出现。网络针对最后处理记录的计算向量（10.1）返回的价格差百分比，并不适用于计算下个月的预测价格。这就是本例所用模型的问题所在，该模型假设未来月份的价格差百分比与过去相同或接近条件下记录的价格差百分比相似。\n\
  \n这是需要吸取的重要教训。如果模型是错误的，那么一切都不会奏效。在参与任何神经网络开发之前，首先要做的是证明所选模型能够正确工作。这将为你节省大量时间和精力。\n\
  \n### 总结\n\n本章阐述了为项目选择正确工作模型的重要性。在开始任何开发之前，先证明模型对你的项目能够正确工作。未能选择正确的模型将导致应用程序运行异常。当网络被用于预测各类游戏（赌博、体育等）的结果时，也会产生错误的结果。\n\
