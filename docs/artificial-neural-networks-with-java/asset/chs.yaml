  \ `xPoint` 值时，就会返回这些值。\n\n### 示例：在训练范围外正确逼近周期函数的正确方法\n\n在本示例中，我们将展示如何通过特殊的数据准备，使得周期函数能够在网络训练范围之外被正确逼近。稍后您将看到，这种技术也可用于更复杂的周期函数，甚至一些非周期函数。\n\
  \n#### 准备训练数据\n\n提醒一下，本示例需要使用在区间 [0, 1.2] 上训练的网络，来预测区间 [3.141592654 – 4.341592654]（该区间在训练范围之外）上的函数结果。我们将在此展示如何针对周期函数规避神经网络的这一限制。为此，我们首先将给定的函数值转换为一个数据集，其中每条记录包含两个字段：\n\
  \n*   字段 1 是当前点（记录）的 `xPoint` 值与第一个点（记录）的 `xPoint` 值之差。\n*   字段 2 是下一个点（记录）的函数值与当前点（记录）的函数值之差。\n\
  \n提示\n\n当将记录的第一个字段表示为 `xPoint` 值之差，而不是原始的 `xPoint` 值时，即使我们试图预测任何下一个区间（在我们的例子中是 [3.141592654\
  \ – 4.341592654]）的函数值，我们也不会再超出训练区间。换句话说，下一个区间 [3.141592654 – 4.341592654] 上的 `xPoint`\
  \ 值之差将落在训练范围内。\n\n通过以这种方式构建输入数据集，我们实质上是在教网络学习：当当前点与第一个 `xPoint` 之间的函数值之差等于某个值 *a*\
  \ 时，那么下一个点与当前点之间的函数值之差必须等于某个值 *b*。这使得网络能够通过知道当前天的函数值来预测第二天的函数值。表 6-5 展示了转换后的数据集。\n\
