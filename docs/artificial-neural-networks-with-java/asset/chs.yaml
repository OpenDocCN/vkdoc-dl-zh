  \ * 0.23785621465075305 = -0.04514538436186407 (3-72)\n\n`δ¹[1]` = ![$$ \\frac{\\\
  partial E}{\\partial {O}_1}\\ast \\frac{\\partial {O}_1}{\\partial {Z}_2¹} $$](img/477043_2_En_3_Chapter_TeX_IEq68.png)\
  \ = -0.04514538436186407 (3-73)\n\n`δ¹[2]` = ![$$ \\frac{\\partial E}{\\partial\
  \ {O}_1}\\ast \\frac{\\partial {O}_1}{\\partial {Z}_1¹} $$](img/477043_2_En_3_Chapter_TeX_IEq69.png)\
  \ = -0.04514538436186407 (3-74)\n\n`δ¹[3]` = ![$$ \\frac{\\partial E}{\\partial\
  \ {O}_1}\\ast \\frac{\\partial {O}_1}{\\partial {Z}_3¹} $$](img/477043_2_En_3_Chapter_TeX_IEq70.png)\
  \ = -0.04514538436186407 (3-75)\n\n由于偏置调整是按层计算的，我们取每个神经元计算出的偏置调整量的平均值。\n\n`δ¹` =\
  \ (`δ¹[1]` + `δ¹[2]` + `δ¹[3]`) / 3 = -0.04514538436186407 (3-76)\n\n`δ²` = -0.04514538436186407\n\
  \n引入变量 δ 后，我们得到：\n\n`adjusted B[1]` = `B[1]` – η * `δ[1]` = 0.20 + 0.04514538436186407\
  \ = 0.2451453843618641 (3-77)\n\n`adjusted B[2]` = `B[2]` - η * `δ[2]` = 0.25 +\
  \ 0.04514538436186407 = 0.29514538436186405 (3-78)\n\n现在我们已经计算了所有新的权重值，让我们回到前向阶段并计算新的误差。\n\
  \n### 回到前向传播\n\n使用新的调整后的权重/偏置重新计算隐藏层和输出层的网络输出。\n\n#### 隐藏层\n\n以下是隐藏层：\n\n神经元 `H[1]`:\n\
  \n1.  计算神经元 `H[1]` 的总净输入。\n\n    `Z¹[1]` = `W¹[11]` * `I[1]` + `W¹[12]` * `I[2]`\
  \ + `B[1]` * 1.00 = 0.05011172329667623 * 0.01 + 0.06022344659335245 * 0.02 + 0.2451453843618641\
  \ * 1.00 = 0.2468509705266979 (3-79)\n\n2.  使用逻辑函数获取 `H[1]` 的输出。\n\n    `H[1]` =\
