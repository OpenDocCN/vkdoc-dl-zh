  \ 8%，而最大近似误差（近似效果最差的记录）则超过 97%。这样的函数近似显然无法使用。图 8-3 展示了近似结果的图表。\n\n![../images/477043_2_En_8_Chapter/477043_2_En_8_Fig3_HTML.jpg](img/477043_2_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\n低质量的函数近似\n\n我们事先知道这种近似方法行不通，并在示例开始时就已经说明。然而，我们特意这样做是为了说明问题。现在，我们将展示如何使用神经网络成功近似这个非连续函数。\n\
  \n这个函数近似的问题源于函数的拓扑结构（函数值在某些点上的突然跳跃或下降）。我们将把输入文件拆分成一系列单记录输入文件，称之为*微批次*。通过这样做，我们消除了复杂函数拓扑结构的负面影响。拆分数据集后，每条记录将独立存在，不再与前后函数值相关联。将输入文件拆分成微批次会创建\
  \ 1,000 个输入文件，网络会逐个处理这些文件。我们将每个训练好的网络与其所代表的记录关联起来。在验证和测试过程中，逻辑会找到与相应测试或验证记录的第一个字段最匹配的训练好的网络。\n\
  \n### 使用微批次方法近似非连续函数\n\n让我们将归一化的训练数据集拆分成微批次。每个微批次数据集应包含标签记录和来自原始文件的一条待处理记录。表 8-3\
  \ 展示了微批次数据集的样子。\n\n表 8-3\n\n微批次文件\n\n| xPoint | 函数值 |\n| --- | --- |\n| -1 | -0.938458442\
  \ |\n\n我们编写了一个简单的程序来将归一化的训练数据集拆分成微批次。执行该程序后，我们创建了 999 个微批次数据集（编号从 0 到 998）。图 8-4\
  \ 展示了微批次数据集列表的一个片段。\n\n![../images/477043_2_En_8_Chapter/477043_2_En_8_Fig4_HTML.jpg](img/477043_2_En_8_Fig4_HTML.jpg)\n\
