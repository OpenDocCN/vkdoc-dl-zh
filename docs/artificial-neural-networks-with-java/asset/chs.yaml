  \ `x` 和 `y` 值组合的记录。这些结果可以推广到对多于两个变量的函数进行近似。  \n\n# 第三部分 计算机视觉简介  \n\n# 13. 图像识别\
  \  \n\n神经网络也可用于识别图像。图像识别（图像分类）是人工智能最重要的分支之一。计算机视觉实际上是一种视觉模式识别技术。它被银行广泛用于处理支票，被邮局用于识别地址。在许多领域（自动驾驶汽车、人脸识别等），图像识别都极其重要。\
  \  \n\n同时，图像识别也是人工智能中最困难的学科之一。表面上看，我们似乎可以复用本书前几章学到的神经网络处理的所有方面来识别图像。每张数字图像都是一组像素或点，因此，如果我们创建一个包含不同图像的非常大的数据集，将这些数据输入神经网络并进行训练，那么网络应该能够完成这项工作。\
  \  \n\n不幸的是，实际情况要复杂得多。我们可以训练网络识别各种单一图像，然后要求网络识别给定的图像（例如，它是猫还是狗？）。但即使是单一物体类型，也存在巨大的变化（狗有多少种，它们的形状、毛发、面部等）。此外，如果狗的图像显示的是站立的狗，程序将无法识别坐着的狗、移动的狗、倒置的狗或从不同角度显示的狗。目前正在进行一些研究，以构建三维神经网络，而处理彩色图像又增加了另一层难度。\
  \  \n\n除此之外，真实图像可能显示多个物体叠加在一张图像上。图像还可能因阴影落在物体的某些部分或阳光照射在其他部分而变得更加复杂，例如一只猫坐在沙发上，或一只狗被汽车部分遮挡。你应该能理解这个大致概念。\n\
  \n\n\n### 手写数字分类\n\n在本节中，我们将讨论图像识别的简单任务，具体来说，就是识别手写数字。请观察图 13-1 所示的手写数字序列。\n\n![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig1_HTML.jpg](img/477043_2_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1\n\n手写数字\n\n这些数字由不同的人书写。即使是同一个人，根据所用笔的类型、站立或坐姿以及许多其他因素，写出的数字也可能不同。请参见图 13-2\
  \ 中人们书写的同一数字几乎无穷无尽的变化。\n\n![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig2_HTML.jpg](img/477043_2_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2\n\n手写数字的变化\n\n如果我们收集数千（或数百万）个手写数字，并用它们来训练神经网络，就可以构建一个数字识别程序。\n\n#### 准备输入数据\n\
  \n为了构建输入，我们将使用 MNIST 数据集，其中包含数万张手写数字的扫描图像。MNIST 是美国国家标准与技术研究院（NIST）收集的两个数据集的修改子集。第一个数据集包含\
  \ 60,000 条记录，应用于网络训练。第二个数据集包含 10,000 条记录，应用于测试训练好的网络。\n\n两个数据集中的每条记录都代表一个数字图像（28*28\
  \ 像素 = 784 像素）。这些图像是黑白的。每条记录的格式包含 785 个字段。第一个字段是数字的文本表示（例如，5）。接下来的 784 个字段表示图像中每个像素强度的灰度值。每个像素值是一个单独的数字，代表像素的亮度（像素强度），可能的值从\
  \ 0 到 255，其中 0 表示白色，其余数字表示逐渐变暗的灰色阴影。图 13-3 显示了图像的一个片段。\n\n![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig3_HTML.jpg](img/477043_2_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3\n\n表示图像的记录片段\n\n您可以通过从 `http://yann.lecun.com/exdb/mnist/` 网站下载来获取这两个文件。但是，该网站上的数据文件是为\
  \ Python 编程语言格式化的，因此从该网站下载对您没有帮助。相反，我们将使用已转换为 CSV（Excel）格式的文件（我们在本书的所有示例中都使用了这种格式）。您可以从本书的\
  \ GitHub 站点获取这些文件。\n\n图 13-4 显示了其中一个 CSV 文件的片段。\n\n![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig4_HTML.jpg](img/477043_2_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4\n\nCSV 文件片段\n\n#### 输入数据转换\n\n我们需要构建一个程序来训练神经网络识别（分类）数字。为此，我们首先需要找到一种方法，将每条记录所代表的数字编码成网络能够理解的某种数字形式。我们将每个数字表示为一个十字段序列（序列中的每个字段具有字符值\
  \ 0 或 1）。例如，数字 5 将通过在该十字段序列的第五个位置（字段）中置 1 来表示（其余字段设置为 0）。因此，这是一种数字的字节级表示。\n\n图 13-5\
  \ 显示了数字 5 的示例。\n\n![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig5_HTML.jpg](img/477043_2_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5\n\n数字 5 的字节级表示\n\n我们将把这十个字节级图像表示的字段放在每条记录的末尾，它们将被视为网络的输出字段。\n\n因此，我们需要将原始\
  \ CSV 文件的记录（包含 785 个字段：第一个字段是数字的字母形式，接下来的 784 个字段是图像中每个像素的灰度值）转换为不同格式的记录。转换后的记录格式如下：前\
  \ 784 个字段是图像中每个像素的灰度值，后面跟着 10 个字段，即该记录数字的字节级表示。\n\n图 13-6 显示了转换过程的图形表示。\n\n![../images/477043_2_En_13_Chapter/477043_2_En_13_Fig6_HTML.png](img/477043_2_En_13_Fig6_HTML.png)\n\
  \n图 13-6\n\n记录转换\n\n因此，该记录将包含前 784 个字段（网络的输入字段），后跟 10 个字段（网络的目标字段）。在训练网络时，我们教导网络：如果前\
  \ 784 个字段包含给定的灰度像素强度值，那么这代表数字 5 的图像（其余图像以此类推）。\n\n在进行此转换的同时，我们还需要将输入的灰度字段值和目标字段值归一化到区间\
  \ [-1.00, 1.00]。\n\n#### 构建转换程序\n\nCVS 输入训练数据集是 `C:\\Image_Recognition\\MNIS_Data\\\
  mnist_train.csv`。CVS 输入测试数据集是 `C:\\Image_Recognition\\MNIS_Data\\mnist_test.csv`。\n\
  \n以下是转换后对应的文件：\n\n```\nC:\\Image_Recognition\\MNIS_Data\\ mnist_train_input_Norm.csv\n\
  C:\\Image_Recognition\\MNIS_Data\\ mnist_test_input_Norm.csv\n```\n\n转换逻辑会读取输入数据集中的所有记录。对于每条记录，它提取第一个字段（即字符数字）并构建相应的目标字段（10\
  \ 个字段，数字的字节级表示）。程序将这 10 个目标字段放在输出记录的末尾（紧跟在 784 个输入字段之后）。\n\n784 个输入字段（位于输入记录中数字字段之后）被放在转换后记录的开头。最后，我们对转换后记录的所有字段进行归一化。请参见清单\
  \ 13-1 和清单 13-2。\n\n\n```java\n// ===============================================================\n\
  // 该程序将包含 785 个字段的 MNIS CSV 输入训练文件转换为 CSV 归一化训练输入文件。\n//===============================================================\n\
  package numberrecognition_convertinputtrainfile;\nimport java.time.YearMonth;\n\
