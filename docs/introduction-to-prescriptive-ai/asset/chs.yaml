- "# 4. 解读不同方法论的结果\n\n在上一章中，我们了解了不同的决策智能方法论及其优势和局限性。在本章中，我们将使用 Python 编程语言实现各种人机决策方法论。由于在一章甚至一本书中不可能涵盖所有方法论，我们将重点介绍最常用的几种：基于数学、概率和人工智能的技术。此外，我们还将探讨如何解读这些方法论产生的结果，以及如何利用它们来做出决策。\n\
  \n## 决策智能方法论：数学模型\n\n数学模型长期以来被用于各种流程。如前一章所述，这类模型因其准确性、执行速度和结果的一致性而优于其他模型。在因素/变量行为一致且不确定性较低的情况下，这类模型表现非常出色。因此，我们可以在物理和工程领域找到许多数学模型的用例。让我们来看一些线性和非线性数学模型的例子。\n\
  \n\n\n### 线性模型\n\n线性模型，顾名思义，是描述两个或多个变量之间线性关系的数学方程。它们由以下方程表示：\n\n`y = β0 + β1x1 +\
  \ β2x2 +….+ βnxn`\n\n其中：\n\n- `y` 是因变量（需要根据输入进行计算/预测的变量）。\n- `x1`, `x2`, …., `xn`\
  \ 是作为输入的 n 个自变量。\n- `β0` 是一个常数值。当 `x1`, `x2`, …., `xn` 均为 0 时，它等于 `y`。\n- `β1`,\
  \ `β2`, …., `βn` 分别是自变量 `x1`, `x2`, …., `xn` 的贝塔系数。\n\n线性模型方程通常在其自变量满足特定约束条件下运行。让我们通过一个实际案例来探索线性模型。\n\
  \n**问题陈述：**\n\n一家工厂生产四种不同的产品：尿布、卫生巾、面巾纸和卫生纸。这四种产品的日产量分别为 `x[1]`、`x[2]`、`x[3]` 和\
  \ `x[4]`。\n\n**条件：**\n\n基于以下条件，工厂管理层希望制定一个生产计划以实现利润最大化：\n\n- 尿布、卫生巾、面巾纸和卫生纸的单位产品利润分别为\
  \ 10 美元、11 美元、8 美元和 12.5 美元。\n- 由于劳动力限制，每天生产的总单位数不能超过 45。\n- 生产上述产品所需的原材料是木浆和纤维。生产一个单位的尿布需要消耗\
  \ 5 个单位的木浆。每个单位的卫生巾需要 7 个单位的木浆和 2 个单位的纤维。每个单位的面巾纸需要 2 个单位的木浆和 1 个单位的纤维。最后，每个单位的卫生纸需要\
  \ 3 个单位的纤维。\n- 由于运输和存储限制，工厂每天最多能消耗 100 个单位的木浆和 75 个单位的纤维。\n\n**解决方案：**\n\n由于该问题与生产优化相关，可以安全地假设环境是可控的，不确定性很小或没有。因此，我们可以使用数学模型作为解决方案。\n\
  \n根据给定的问题陈述和相关条件，数学模型可以定义如下：\n\n最大化：`10x[1] + 11x[2] + 8x[3] + 12.5x[4]`（利润）\n\n\
  约束条件：\n\n`x[1] + x[2] + x[3] + x[4] ≤ 45`（人力）\n\n`5x[1] + 7x[2] + 2x[3] ≤ 100`（木浆）\n\
  \n`2x[2] + 1x[3] + 3x[4] ≤ 75`（纤维）\n\n`x[1], x[2], x[3], x[4] ≥ 0`\n\n我们将使用 Python\
  \ 中一个名为 `PuLP` 的通用开源线性规划建模包。由于其卓越的特性，如用户友好性、多功能性、与其他 Python 库的兼容性、来自活跃社区的持续支持以及开源可用性，它是解决各种优化问题的非常合适的选择。\n\
  \n**第 1 步：导入 PuLP 库并定义数学模型对象**\n\n```\n[In]: from pulp import LpProblem, LpMaximize,\
  \ LpVariable, LpStatus, lpSum\n[In]: opt_model = LpProblem(name=\"production-planning\"\
  , sense=LpMaximize)\n```\n\n这里，模型对象使用 `LpProblem` 模块定义，并将 `sense` 设置为 `LpMaximize`，因为我们希望最大化生产利润。\n\
  \n**第 2 步：定义决策变量**\n\n```\n[In]: x = {i: LpVariable(name=f\"x{i}\", lowBound=0)\
  \ for i in range(1, 5)}\n[In]: print(x)\n[Out]: {1: x1, 2: x2, 3: x3, 4: x4}\n```\n\
  \n**第 3 步：添加约束条件**\n\n```\n[In]: opt_model += (lpSum(x.values()) <= 45, \"Manpower\"\
  )\n[In]: opt_model += (6 * x[1] + 4 * x[2] + 2 * x[3] <= 100, \"Wood Pulp\")\n[In]:\
  \ opt_model += (2 * x[2] + 4 * x[3] + 6 * x[4] <= 75, \"Fiber\")\n```\n\n**第 4 步：设置目标函数**\n\
  \n```\n[In]: opt_model += (10 * x[1] + 11 * x[2] + 8 * x[3] + 12.5 * x[4], \"Objective\
  \ Function\")\n```\n\n**第 5 步：使用默认求解器求解给定的优化问题**\n\n```\n[In]: status = opt_model.solve()\n\
  ```\n\n**第 6 步：获取结果**\n\n```\n[In]: print(f\"status: {opt_model.status}, {LpStatus[opt_model.status]}\"\
  )\n[In]: print(f\"objective: {opt_model.objective.value()}\")\n[In]: for var in\
  \ x.values():\nprint(f\"{var.name}: {var.value()}\")\n[In]: for name, constraint\
  \ in opt_model.constraints.items():\nprint(f\"{name}: {constraint.value()}\")\n\
  [Out]:\nstatus: 1, Optimal\nobjective: 512.5\nx1: 20.0\nx2: 0.0\nx3: 0.0\nx4: 25.0\n\
  Manpower: 0.0\nWood_Pulp: 0.0\nFiber: 0.0\n```\n\n从之前的输出中，我们可以看到模型建议在给定约束条件下生产 20\
  \ 个单位的 `x[1]`（即尿布）和 25 个单位的 `x[4]`（即卫生纸），以获得最大利润（512.5 美元）。现在，在动态的实际工厂环境中，约束条件会发生变化，因此需要构建一个能够根据多种因素随时间变化（例如，产品利润值的变化）来更新约束条件的解决方案。因此，可以将此解决方案构建成一个\
  \ API 解决方案，该方案可以通过 UI 手动输入或通过其他系统输出来接收输入（约束条件和其他细节），并且结果可以通过同一 UI 或任何其他应用程序（Excel、自定义应用程序等）来使用。\n\
  \n图 4-1 展示了高级解决方案架构的外观。\n\n![](img/602259_1_En_4_Fig1_HTML.jpg)\n\n线性数学模型的框图。输入引擎由\
  \ UI、其他数据库和源组成，流向由线性规划模型 API 组成的解决方案引擎，最后到达由 UI 和其他下游应用程序组成的输出引擎。\n\n**图 4-1** 高级架构：线性数学模型\n\
  \n\n\n### 非线性模型\n\n线性模型假设输入与输出之间的关系始终是线性的。然而在现实世界中，变量之间的关系往往复杂且非线性，这一假设通常不成立。因此，非线性模型应运而生。它们能够更准确地捕捉输入与输出之间的复杂行为/关系，并可用以下方程表示：\n\
  \n`y = f(x)`\n\n其中：\n\n- `y` 是因变量（需要根据输入计算/预测的变量）。\n- `f(x)` 可以是任意非线性函数，例如多项式、指数函数、三角函数或其他非线性函数。\n\
  \n接下来，我们通过以下案例来理解如何求解非线性问题。\n\n**问题描述：**\n\n新冠疫情后，X 公司计划逐步让员工返回办公室工作，同时确保其两栋办公楼的最低占用率均维持在\
  \ 25%，以保证运营效率。政府提供了一个风险指数，帮助公司评估在当前情况下重新开放办公室的风险。风险指数（RI）定义如下：\n\n`RI = 3x_1² +\
  \ 3x_1³ + x_1*x_2 - 2x_2² + 2x_2³`\n\n其中：\n\n- `x_1` = A 栋楼可用容量的比例\n- `x_2` = B\
  \ 栋楼可用容量的比例\n\n根据风险指数，X 公司恢复办公室工作的最安全方式是什么？\n\n**解决方案：**\n\n根据风险指数的定义，并考虑到 X 公司希望将风险降至最低，我们可以将目标函数定义如下：\n\
  \n最小化：`RI = 3x_1² + 3x_1³ + x_1*x_2 - 2x_2² + 2x_2³`\n\n约束条件：\n\n- `x_1 >= 0.25`\n\
  - `x_2 >= 0.25`\n- `x_1, x_2 <= 1`\n\n针对这个非线性问题，我们将使用`scipy`包来求解。\n\n**步骤 1：导入所需库（尤其是\
  \ scipy）**\n\n```\n[In]:\nimport numpy as np\nimport pandas as pd\nimport random\n\
  from scipy.optimize import minimize\n```\n\n**步骤 2：创建生成起始点的函数**\n\n我们将使用以下函数，在该问题的可行范围内生成一组起始点元组：\n\
  \n```\n[In]:\ndef geneate_kickoff_points(number_of_points):\n    '''\n    number_of_points\
  \ [list]: 需要生成的点的数量\n    '''\n    kickoff_points = []\n    for point in range(number_of_points):\n\
  \        kickoff_points.append((random.random(), random.random()))\n    return kickoff_points\n\
  ```\n\n**步骤 3：构建目标函数与约束条件**\n\n```\nobjective_function = lambda x: (3*x[0]**2) +\
  \ (3*x[0]**3) + (x[0]*x[1]) - (2*x[1]**2) + (2*x[1]**3)\nconstraints = [\n    {'type':\
  \ 'ineq', 'fun': lambda x: x[0] - 0.25}, # A 栋楼容量 >= 0.25\n    {'type': 'ineq',\
  \ 'fun': lambda x: x[1] - 0.25}  # B 栋楼容量 >= 0.25\n]\nboundaries = [(0,1), (0,1)]\n\
  ```\n\n**步骤 4：运行最优解函数**\n\n```\n#### 生成 N 个潜在起始点的列表\n[In]: kickoff_points = geneate_kickoff_points(20)\n\
  [In]: first_iteration = True\n[In]:\nfor point in kickoff_points:\n    # 对每个点运行算法\n\
  \    result = minimize(\n        objective_function,\n        [point[0], point[1]],\n\
  \        method='SLSQP',\n        bounds=boundaries,\n        constraints=constraints\n\
  \    )\n    # 第一次迭代始终作为当前最优解\n    if first_iteration:\n        better_solution_found\
  \ = False\n        best_solution = result\n    else:\n        # 如果找到更优解，则采用它\n \
  \       if result.success and result.fun < best_solution.fun:\n            better_solution_found\
  \ = True\n            best_solution = result\n#### 如果算法成功，打印结果\n[In]:\nif best_solution.success:\n\
  \    print(f\"\"\"找到最优解：\n    -  A 栋楼可用容量的比例: {round(best_solution.x[0], 3)}\n \
  \   -  B 栋楼可用容量的比例: {round(best_solution.x[1], 3)}\n    -  风险指数值: {round(best_solution.fun,\
  \ 3)}\"\"\")\nelse:\n    print(\"未找到问题的解\")\n[Out]:\n找到最优解：\n    -  A 栋楼可用容量的比例:\
  \ 0.25\n    -  B 栋楼可用容量的比例: 0.597\n    -  风险指数值: 0.096\n```\n\n根据上述模拟，我们发现 X 公司可以让员工返回办公室工作，其中\
  \ A 栋楼容量为 25%，B 栋楼容量约为 60%，在给定的约束/条件下，最优风险约为 10%。\n\n该解决方案的部署方式与线性模型相同。不过，某些细节（如基础设施）可能需要调整，因为与线性模型相比，非线性解决方案通常需要更多的计算能力来进行计算。\n\
  \n## 决策智能方法论：概率模型\n\n概率模型运用概率论原理来建模问题，这与使用数学方程的数学模型不同。这使得概率模型特别适用于结果受众多不确定因素影响的情况。概率模型常用于金融、经济和医疗保健等领域，在这些领域中，决策的结果具有不确定性和不可预测性。接下来，我们将了解如何使用一种广泛使用的概率模型——马尔可夫链，来构建决策智能系统。\n\
  \n\n\n### 马尔可夫链\n\n马尔可夫链模型是一种可用于研究动态系统的概率模型，其中从一个状态转移到另一个状态的可能性仅由当前状态决定，与系统的历史无关。\n\
  \n马尔可夫链模型的一个例子是股票市场模型，该模型具有三种状态：牛市、熊市和横盘。我们可以将其表示为三状态马尔可夫链模型，其中状态之间的转移概率仅取决于当前状态。例如，假设从牛市转移到熊市的概率为\
  \ 0.3，而停留在牛市的概率为 0.6。从熊市转移到横盘的概率为 0.2，停留在熊市的概率为 0.3。从横盘转移到牛市的概率为 0.2，停留在横盘的概率为 0.6。图\
  \ 4-2 展示了股票市场模型的转移矩阵。\n\n![](img/602259_1_En_4_Fig2_HTML.jpg)\n\n一个马尔可夫链模型的示意图，包含三种状态：牛市、熊市和横盘。牛市到牛市的概率为\
  \ 0.6，牛市到横盘的概率为 0.1，牛市到熊市的概率为 0.3，熊市到牛市的概率为 0.5，横盘到牛市的概率为 0.2，熊市到熊市的概率为 0.3，横盘到横盘的概率为\
  \ 0.6，熊市到横盘的概率为 0.2，横盘到熊市的概率为 0.2。\n\n**图 4-2** 状态转移图：马尔可夫链\n\n该矩阵告诉我们，在给定的一天中，有\
  \ 60%的概率停留在牛市，30%的概率转移到熊市，10%的概率转移到横盘。类似地，有 30%的概率停留在熊市，20%的概率转移到横盘，50%的概率转移到牛市。最后，有\
  \ 20%的概率从横盘转移到牛市，20%的概率转移到熊市，60%的概率停留在横盘。\n\n让我们了解如何将马尔可夫链模型用于为不同的营销渠道/接触点分配预算。\n\
  \n### 问题陈述\n\nX 公司正在推出一款新的 Android/iOS 费用管理应用程序，并希望在其目标受众中建立知名度。该公司计划为通过网站订阅的用户提供一个月的免费试用。为了实现其营销目标，他们需要确定能够触达目标受众并通过网站注册产生高投资回报率的有效营销渠道。虽然他们拥有之前类似活动的数据，并且一直使用启发式模型（最后接触归因）进行预算分配，但他们希望利用其机器学习团队的输入来构建一个更具数据驱动性的解决方案，以分析和优化其营销渠道。\n\
  \n### 解决方案\n\n基于给定的问题，机器学习团队建议使用马尔可夫链模型，因为它最适合归因问题。团队的主要目标是根据马尔可夫链模型的输出，找出每个营销渠道的最佳预算分配百分比。\n\
  \n团队可以访问历史用户路径数据以及每个渠道的每日营销支出。\n\n团队提议使用`ChannelAttribution` Python 包构建模型。\n\n#####\
  \ 步骤 1：导入所需的库\n\n```\n[In]:\nimport numpy as np\nimport pandas as pd\nfrom ChannelAttribution\
  \ import *\n```\n\n##### 步骤 2：读取历史活动数据（用户路径和渠道的每日营销支出）\n\n```\n[In]:\nattribution_data\
  \ = pd.read_csv('attribution_data.csv')\nattribution_data['time'] = pd.to_datetime(attribution_data['time'])\n\
  daily_budget = pd.read_csv('daily_budget.csv')\n```\n\n##### 步骤 3：数据预处理\n\n我们创建用户与不同渠道交互时的路径顺序（这相当于\
  \ SQL 窗口函数）。\n\n```\n[In]:\nattribution_data['path_order'] = attribution_data.sort_values(['time']).groupby(['cookie']).cumcount()\
  \ + 1\n```\n\n我们将用户交互过的渠道聚合到单行中。\n\n```\n[In]:\nattribution_data_paths = attribution_data.groupby('cookie')['channel'].agg(lambda\
  \ x: x.tolist()).reset_index()\nattribution_data_paths = attribution_data_paths.rename(columns={'channel':\
  \ 'path'})\n```\n\n我们按 cookie ID 聚合转化次数及其价值。\n\n```\n[In]:\nattribution_data_conversions\
  \ = attribution_data.groupby('cookie', as_index=False).agg({'conversion': 'sum',\
  \ 'conversion_value': 'sum'})\n```\n\n我们将路径数据与转化数据合并。\n\n```\n[In]:\nattribution_data_final\
  \ = pd.merge(attribution_data_paths, attribution_data_conversions, how='left', on='cookie')\n\
  [In]:\nprint('总转化次数: {}'.format(sum(attribution_data.conversion)))\nprint('总转化率:\
  \ {}%'.format(round(sum(attribution_data.conversion) / len(attribution_data)*100)))\n\
  print('转化总价值: ${}'.format(round(sum(attribution_data.conversion_value))))\nprint('平均转化价值:\
  \ ${}'.format(round(sum(attribution_data.conversion_value) / sum(attribution_data.conversion))))\n\
  [Out]:\n总转化次数: 19613\n总转化率: 3%\n转化总价值: $122529\n平均转化价值: $6\n```\n\n我们将创建一个变量`path`，其格式符合归因模型包的要求，即用户交互的有序渠道之间用`>`分隔。\n\
  \n```\n[In]:\ndef listToString(df):\nstr1 = \"\"\nfor i in df['path']:\nstr1 +=\
  \ i + ' > '\nreturn str1[:-3]\nattribution_data_final['path'] = attribution_data_final.apply(listToString,\
  \ axis=1)\n```\n\n我们移除用户的 cookie，并按路径分组，以查看特定渠道组合导致转化或空结果的次数。\n\n```\n[In]:\nattribution_data_final.drop(columns\
  \ = 'cookie', inplace = True)\nattribution_data_final['null'] = np.where(attribution_data_final['conversion']\
  \ == 0,1,0)\nattribution_data_final = attribution_data_final.groupby(['path'], as_index\
  \ = False).sum()\nattribution_data_final.rename(columns={\"conversion\": \"total_conversions\"\
  , \"null\": \"total_null\", \"conversion_value\": \"total_conversion_value\"}, inplace\
  \ = True)\n```\n\n##### 步骤 4：构建归因模型（用于比较的启发式模型和用于计算的马尔可夫模型）并将结果保存到数据框中\n\n```\n\
  [In]:\nheuristic_models = heuristic_models(attribution_data_final,\"path\",\"total_conversions\"\
  ,var_value=\"total_conversion_value\")\nmarkov_model = markov_model(attribution_data_final,\
  \ \"path\", \"total_conversions\", var_value=\"total_conversion_value\")\n[Out]:\n\
  模拟次数: 100000 - 收敛达到: 0.85% < 5.00%\n在达到最大步数(456)之前成功结束的模拟路径百分比: 99.99%\n[In]:\n\
  all_attribution_models_result = pd.merge(heuristic_models,markov_model,on=\"channel_name\"\
  ,how=\"inner\")\nall_attribution_models_conversion_result = all_attribution_models_result[[\"\
  channel_name\",\"first_touch_conversions\",\"last_touch_conversions\",\\\n\"linear_touch_conversions\"\
  ,\"total_conversions\"]]\nall_attribution_models_conversion_result.columns = [\"\
  channel_name\",\"first_touch\",\"last_touch\",\"linear_touch\",\"markov_model\"\
  ]\nall_attribution_models_conversion_value_result = all_attribution_models_result[[\"\
  channel_name\",\"first_touch_value\",\"last_touch_value\",\\\n\"linear_touch_value\"\
  ,\"total_conversion_value\"]]\nall_attribution_models_conversion_value_result.columns\
  \ = [\"channel_name\",\"first_touch\",\"last_touch\",\"linear_touch\",\"markov_model\"\
  ]\nall_attribution_models_conversion_value_result = pd.melt(all_attribution_models_conversion_value_result,\
  \ id_vars=\"channel_name\")\n```\n\n##### 步骤 5：计算营销渠道的最佳预算\n\n\n\n| `channel_name`\
