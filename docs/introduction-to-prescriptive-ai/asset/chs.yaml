  \ for cat, map_dict in mappings.items()}\ndecoded_output[list(mappings.keys())]\
  \ = decoded_output[list(mappings.keys())].astype(int)\ndecoded_output = decoded_output.replace(inv_mapping_dict)\n\
  return decoded_output\ndef generate_output_counterfactuals(explainer,feature_range,query_instance,model_type,model,feature_list,desired_class_or_range,continuous_features,features_vary='all',num_cf=3,mappings={}):\n\
  \"\"\"\n为特定的查询实例（记录）生成反事实输出，给定各种其他输入，如要变化的特征等。\n参数:\nexplainer (object) : 反事实解释器对象\n\
  feature_range (dict) : 包含连续特征允许范围的字典\nquery_instance (dataframe) : 要解释的选定记录（用户输入）\n\
  model_type (str) : 分类或回归\nmodel (object) : 模型对象，仅在分类情况下需要\nfeature_list (list) :\
