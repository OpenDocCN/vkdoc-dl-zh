  \ 10% 的目标。\n\n## 结论\n\n在本章中，我们了解了如何通过应用 AI/ML 和其他先进技术（反事实分析和假设分析）来支持决策。我们看到了组织如何不仅能够预测哪些客户会流失，还可以借助反事实分析和假设分析主动采取措施来避免流失。我们还看到了机器学习预测、反事实分析和假设分析的结合如何帮助手机制造商设计其产品配置（屏幕尺寸、`ram`等），并在预测价格的基础上获得期望的价格。通过这些用例，我们涵盖了分类和回归问题的决策智能。\n\
