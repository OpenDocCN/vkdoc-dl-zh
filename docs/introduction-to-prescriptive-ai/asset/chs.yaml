  if len(cat_cols)>0:\nencode_df.update(encode_df[cat_cols].apply(lambda col: col.map(mappings[col.name])).astype(int))\n\
  encode_df[cat_cols] = encode_df[cat_cols].astype(int)\nelse:\nencode_df = df.copy()\n\
  return encode_df\ndef postprocess_decode(df,mappings):\ndecoded_output = df.copy()\n\
