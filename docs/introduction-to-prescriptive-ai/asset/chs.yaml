  \n#### 步骤 6：使用假设分析为给定手机找到正确的定价策略\n\n现在，假设对于给定的反事实建议，我们有一个限制：诸如`ram`之类的昂贵部件不能增加，但诸如`internal\
  \ mem`之类的较便宜部件可以增加到当前的两到四倍，而`battery`最多可以增加 50%。因此，对于给定的手机，我们不能增加`ram`。让我们检查哪种配置可以帮助我们获得期望的价格。\n\
