    ## Conclusion


    In this chapter, we saw how decision-making can be supported by applying AI/ML
    and other advanced techniques (counterfactuals and what-if analysis). We saw how
    organizations not only can predict which customers are going to churn but also
    can take proactive measures to avoid the churn, with the help of counterfactuals
    and what-if analysis. We also saw how a combination of machine learning predictions,
