    - **与现有系统的集成：** 将 AI 输出与现有系统集成可能具有挑战性。这需要深入了解组织的 IT 基础设施和安全协议，以确保应用程序能够顺利、安全地集成。


    - **用户采用与培训：** 如果用户不愿意或无法采用，即使设计再好的应用程序也可能无效。确保用户采用并提供充分的培训对于应用程序的成功至关重要。


    - **持续的维护与更新：** 与所有软件应用程序一样，这也需要持续的维护和更新，以确保其保持功能正常，并与最新的技术和数据保持同步。这需要资源和专业知识来确保应用程序随着时间的推移保持有效。


    特别是，将决策智能与现有系统集成可能因以下几个原因而具有挑战性：


    - **不同的数据格式：** 现有系统可能以不同的格式存储数据，这使得与 DI 系统集成变得困难。例如，一个系统可能使用 CSV 文件格式，而另一个系统可能使用数据库格式。在格式之间转换数据可能既耗时又容易出错。


    - **遗留系统：** 一些组织可能仍在使用未设计为与现代软件应用程序集成的遗留系统。这些系统可能功能有限，并且可能不支持现代集成方法，例如 REST API。


    - **安全考量：** 现有系统可能具有严格的安全协议来保护敏感数据。与这些系统集成可能需要额外的安全措施，例如身份验证和加密，以确保数据得到保护。


    - **可扩展性：** 现有系统可能未设计为处理与 DI 系统集成所带来的增加的工作负载。这可能导致性能问题，并可能需要额外的硬件或基础设施来支持集成。


    - **复杂性：** 现有系统可能很复杂且难以理解，特别是如果它们已经使用了多年。这使得识别 DI 系统所需的数据以及设计有效的集成策略变得具有挑战性。


    总的来说，将 DI 与现有系统集成需要深入了解现有的 IT 基础设施，以及数据集成和系统架构方面的专业知识。应对这些挑战对于确保集成成功以及 DI 系统能够提供准确可靠的洞察以支持决策至关重要。

    '
- fmt: '# Workflow


    Let’s understand the steps involved to ensure DI outputs are properly ingested
    into business workflows and overcome the previous challenges.


    1. **Clearly define the business problem:** Before starting the DI process, it
    is important to clearly define the business problem that you are trying to solve.
    This will help you to identify the relevant data sources and develop machine learning
    models that are aligned with your business objectives.


    2. **Involve key stakeholders:** Involve key stakeholders in the DI process, including
    business users, data scientists, and IT professionals. This will help to ensure
    that the DI outputs are aligned with business needs and can be integrated into
    existing business workflows.


    3. **Integrations:** Develop user-friendly interfaces that can be easily integrated
    into existing business workflows. This may involve developing APIs that can be
    called from within business applications or integrating the models into existing
    business processes. Business workflow could be in CRM, marketing application,
    apps, etc.


    4. **Ensure data quality:** Ensure that the data used in the DI process is accurate,
    complete, and relevant. This may require data cleansing, normalization, and transformation.


    5. **Monitor performance:** Monitor the performance of the DI process and evaluate
    its impact on business outcomes. This will help you to identify areas for improvement
    and make adjustments as necessary.


    6. **Provide training and support:** Provide training and support to business
    users on how to use the DI outputs in their daily work. This will help to ensure
    that the DI outputs are properly ingested into business workflows and that the
    organization can derive maximum value from the DI process.


    As shown in Figure [5-1](#602259_1_En_5_Chapter.xhtml#Fig1), organizations can
    ensure that DI outputs are properly ingested into business workflows, leading
    to better decisions, improved operations, and a competitive advantage.


    ![](images/602259_1_En_5_Chapter/602259_1_En_5_Fig1_HTML.jpg)


    A workflow diagram of decision intelligence. The customers and orders and other
    data flows to prepare then to AI or ML predict churn and finally to CRM marketing
    applications UI.


    Figure 5-1


    Workflow


    # Decision Intelligence Apps


    One of the ways businesses can use predictions is through apps. So, let’s explore
    how to build/integrate apps with DI and why this is important.


    Integrating a DI framework through apps involves developing applications that
    can leverage the insights generated by the DI process. Here are some steps to
    consider when integrating DI through apps:


    1. **Define the business problem:** Clearly define the business problem you are
    trying to solve using DI. This will help you to identify the relevant data sources
    and determine the appropriate machine learning models to use.


    2. **Develop the DI process:** Develop the DI process to generate insights that
    are relevant to the business problem. This may involve data cleansing, feature
    engineering, model training, and validation.


    3. **Develop the app:** Develop an app that can leverage the insights generated
    by the DI process. This may involve developing APIs that can be called from within
    the app or integrating the models into the app’s functionality.


    4. **Test and validate:** Test and validate the app to ensure that it is working
    as expected. This may involve unit testing, integration testing, and user acceptance
    testing.


    5. **Deploy the app:** Deploy the app to a production environment where it can
    be used by business users. This may involve working with IT professionals to ensure
    that the app is secure, scalable, and reliable.


    6. **Monitor performance:** Monitor the performance of the app and the DI process
    to identify areas for improvement and make adjustments as necessary.


    ## How and Why?


    Developing an app to integrate DI involves creating a software application that
    leverages the insights generated by the DI process. Here are some details on how
    and why to develop an app for DI:


    1. **Identify the use case:** The first step is to identify the use case for the
    app. What business problem are you trying to solve with DI? What insights do you
    need to generate to address this problem? Once you have a clear understanding
    of the use case, you can determine the functionality required for the app.


    2. **Define the user interface:** The next step is to define the user interface
    for the app. This involves identifying the user personas and designing an interface
    that is easy to use and understand. The interface should provide users with access
    to the insights generated by the DI process in a clear and intuitive manner.


    3. **Develop the app functionality:** Once you have defined the user interface,
    the next step is to develop the functionality for the app. This may involve developing
    APIs that can be called from within the app to access the insights generated by
    the DI process. It may also involve integrating the machine learning models into
    the app’s functionality to generate predictions or recommendations based on the
    user’s input.


    4. **Test and validate the app:** Once the app has been developed, it is important
    to test and validate it to ensure that it is working as expected. This may involve
    unit testing, integration testing, and user acceptance testing. The testing phase
    helps to identify any bugs or issues that need to be addressed before the app
    is deployed.


    5. **Deploy the app:** Once the app has been tested and validated, it is ready
    to be deployed to a production environment. This may involve working with IT professionals
    to ensure that the app is secure, scalable, and reliable.


    By developing an app to integrate DI, organizations can provide business users
    with easy access to the insights generated by the DI process. The app can help
    to streamline workflows, improve decision-making, and drive business value. However,
    it is important to ensure that the app is user-friendly, reliable, and secure
    to maximize adoption and ensure that the organization can derive maximum value
    from the DI process.'
