    \ + 3x_1³ + x_1*x_2 - 2x_2² + 2x_2³`\n\n其中：\n\n- `x_1` = A 栋楼可用容量的比例\n- `x_2`\
    \ = B 栋楼可用容量的比例\n\n根据风险指数，X 公司恢复办公室工作的最安全方式是什么？\n\n**解决方案：**\n\n根据风险指数的定义，并考虑到\
    \ X 公司希望将风险降至最低，我们可以将目标函数定义如下：\n\n最小化：`RI = 3x_1² + 3x_1³ + x_1*x_2 - 2x_2² +\
    \ 2x_2³`\n\n约束条件：\n\n- `x_1 >= 0.25`\n- `x_2 >= 0.25`\n- `x_1, x_2 <= 1`\n\n针对这个非线性问题，我们将使用`scipy`包来求解。\n\
