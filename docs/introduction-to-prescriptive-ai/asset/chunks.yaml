  trans: '

    # 2. 决策智能需求


    许多人工智能项目将在各行各业遭遇失败，因为 AI 项目可能复杂且充满挑战，许多潜在因素都可能导致其失败。失败的原因包括缺乏明确目标、数据质量问题，以及将 AI
    系统集成到现有流程中的困难。此外，还可能存在组织层面的挑战，例如缺乏利益相关者的支持或认同、不切实际的期望，以及对 AI 能力和局限性的理解不足。


    在本章中，我们将讨论如何通过规划、明确需求以及理解 DI 需求框架来减少失败。


    ## 为什么 AI 项目会失败？


    AI 项目可能因多种原因失败，包括缺乏明确定义的目标、数据不足或数据质量差、缺乏专业知识或资源，以及难以将 AI 系统集成到现有流程或系统中。此外，伦理方面的考量，例如数据或算法本身存在的偏见，也可能导致
    AI 项目失败。


    决策智能（DI）是一个结合了人工智能（AI）和决策技术的领域，旨在帮助组织做出更好的决策。决策智能需求指的是一个 DI 系统要有效并对组织有价值所必须满足的具体需求和标准。


    让我们退一步，理解一下在启动任何 AI 项目之前需要提出的一些问题。


    - “AI 能否比现有流程表现更好？”

    - “数据是否适合 AI 模型？”

    - “AI 项目的目标/目的是否明确定义？”

    - “这个 AI 项目是否创造了价值？”

    - “我们是否选择了正确的关键绩效指标来衡量 AI 项目的价值？”

    - “AI 结果是否被（通过采取行动）应用？”

    - “业务用户是否从 AI 预测中受益？”


    以下是围绕 AI 的一些常见误解：


    - **误解 1：** 合适的数据科学家和正确的算法就能创造出完美的 AI。

    - **误解 2：** 要在 AI 领域获胜，你需要大量数据，并且需要最好的算法。

    - **误解 3：** AI 模型越准确越好。

    - **误解 4：** AI 试点在一个区域/领域有效，同样的 AI 模型在企业推广中也有效。

    - **误解 5：** 如果 AI 模型今天有效，它就永远有效。


    为了回答上述问题并克服这些误解，一个 DI 需求框架至关重要。该框架如同 AI 项目的“圣经”，因为它包含了从构思阶段到运营阶段项目的所有细节。


    要通过 AI 交付价值，遵循一些指导方针/路径非常重要，这些方针有助于确保决策智能解决方案的成功实施和采用。


    - **明确定义问题：** 在实施任何 AI 和决策智能解决方案之前，必须清楚理解需要解决的问题。这意味着要识别利益相关者、他们的需求和期望、问题的范围以及预期的结果。

    - **收集和分析数据：** AI 解决方案严重依赖数据。因此，收集和分析所需数据以确保解决方案基于准确可靠的信息至关重要。

    - **确定决策标准：** AI 应通过提供评估备选方案的标准来支持决策。这些标准应基于问题定义、利益相关者需求和相关数据。

    - **选择合适的决策方法：** 根据问题和可用数据，可以使用不同的决策方法。选择合适的、能基于现有信息提供最佳结果的方法非常重要。这将在第 3 章详细讨论。

    - **构建 AI 模型：** 一旦确定了标准和决策方法，就可以构建模型。模型应透明、可解释且用户友好。

    - **验证模型：** 应对 AI 模型进行验证，以确保其准确可靠。这可以通过测试、模拟和实时分析来完成。

    - **实施解决方案：** 模型验证后，即可实施解决方案。确保解决方案与现有系统集成，并且利益相关者经过培训并获得支持以有效使用该解决方案至关重要。

    - **监控和评估解决方案：** 应持续监控和评估 AI 解决方案，以确保其交付预期价值。这可以通过定期性能检查和利益相关者反馈来实现。


    牢记所有这些指导方针，让我们构建一个*DI 需求框架*，它将作为在启动项目之前构建需求文档的手册。


    ## DI 需求框架


    要使 AI 项目成功，仅仅构建花哨的机器学习和深度学习模型并部署它们是不够的。那只是冰山一角。真正的努力需要投入到规划、定义明确目标、构建方法框架以及评估这些项目可能产生的潜在价值上，如图
    2-1 所示。


    ![](img/602259_1_En_2_Fig1_HTML.jpg)


    一幅描绘冰山浸没部分的插图展示了 AI 生命周期中隐藏的步骤。这些步骤包括：构建 ML 或 DL 模型、数据清洗、部署、规划或目标、方法框架、KPI 和公式、潜在价值以及决策制定。


    **图 2-1** AI 生命周期中的隐藏步骤


    那么，让我们详细讨论一个框架。第一步是进行适当的规划。

    '
- fmt: "# Planning\n\nPlanning is a crucial aspect of any AI project, as it helps\
    \ to ensure that the project is well-defined, is well-organized, and has a clear\
    \ path to success. These are some of the specific reasons why planning is important\
    \ for AI projects:\n\n- **Identify the problem:** Start by identifying a specific\
    \ problem or opportunity that AI can help to solve or address. This could be anything\
    \ from improving customer service to automating repetitive tasks to identifying\
    \ new revenue streams. Lots of AI projects are force-fitting AI into a business\
    \ flow even though there is no problem in the first place.\n\n- **Define project\
    \ goals and objectives:** Planning helps to ensure that the project has clear,\
    \ measurable, and attainable goals and objectives. This helps to guide the development\
    \ of the AI system and ensure that it aligns with the organization’s overall strategy.\n\
    \n- **Identify and address potential risks:** Planning allows teams to identify\
    \ and assess potential risks that may impact the project, such as lack of data,\
    \ lack of expertise, or difficulty integrating the AI system into existing processes.\
    \ Addressing these risks early on can help to mitigate them and ensure the project’s\
    \ success.\n\n- **Build the right team:** Assemble a team with the right mix of\
    \ skills, including data scientists, engineers, and domain experts. This will\
    \ help to ensure that the project is executed effectively and that the AI system\
    \ is tailored to the specific needs of the organization.\n\n- **Manage expectations:**\
    \ Planning helps to manage expectations by clearly communicating the project’s\
    \ goals, objectives, timeline, and budget to stakeholders. This helps to ensure\
    \ that everyone is on the same page and that the project is delivered as expected.\n\
    \n- **Identify and address ethical considerations:** Planning allows teams to\
    \ identify and address ethical considerations, such as the potential for bias\
    \ in the data or the algorithms, that may impact the project.\n\n- **Understand\
    \ the data:** Make sure you have access to the necessary data and that it is of\
    \ high quality. Understand how the data is collected, how it is stored, and how\
    \ it can be used to train and operate the AI system.\n\n- **Measure the results:**\
    \ Plan and define the right KPIs and metrics to measure the results of the AI\
    \ project. This will help to determine the system’s effectiveness and avoid confusion\
    \ later.\n\n- **Communicate the value:** Communicate the value of the AI project\
    \ to stakeholders, both inside and outside of the organization. This will help\
    \ to build support and ensure that the project is seen as a success.\n\nOverall,\
    \ planning is important for AI projects because it helps to ensure that the project\
    \ is well-defined, is well-organized, and has a clear path to success.\n\n# Approach\n\
    \nApproaching an AI project requires careful consideration of several key factors\
    \ including the type of problem being addressed, the available data, the computing\
    \ resources available, and the deployment requirements. Here are some general\
    \ guidelines for approaching an AI project:\n\n- **Model type:** Depending on\
    \ the problem you are trying to solve, choose an appropriate machine learning\
    \ or deep learning model. There are many different models to choose from, such\
    \ as neural network–based models, decision trees, and support vector machines.\
    \ Your choice of model will depend on the specific problem you are trying to solve,\
    \ as well as the amount and quality of your data.\n  - **Classification:** Use\
    \ classification when you have labeled data and want to predict a categorical\
    \ outcome. This is often used in scenarios where you want to identify which class\
    \ or category a new data point belongs to. For example, you might use classification\
    \ to predict whether a customer will buy a product or not based on their demographic\
    \ information.\n\n- **Regression:** Use regression when you have labeled data\
    \ and want to predict a continuous outcome. This is often used in scenarios where\
    \ you want to predict a numerical value, such as the price of a house or the amount\
    \ of rainfall in a particular region. Regression models are useful when you want\
    \ to make predictions that are not limited to a discrete set of values.\n\n- **Unsupervised\
    \ learning:** Use unsupervised learning when you have unlabeled data and want\
    \ to identify patterns or groupings in the data. This is often used in scenarios\
    \ where you want to discover hidden relationships or structures in your data,\
    \ without having any prior knowledge about what you are looking for. Clustering\
    \ is a common unsupervised learning technique that can be used to group similar\
    \ data points based on their features.\n\nIt is also important to consider the\
    \ size and quality of your data when deciding between these different types of\
    \ learning. If you have a small dataset with limited features, you may want to\
    \ use a simpler model like logistic regression or k-nearest neighbors. On the\
    \ other hand, if you have a large dataset with complex features, you may want\
    \ to use a more sophisticated model like a deep neural network.\n\nUltimately,\
    \ the choice of learning algorithm will depend on the specifics of your project\
    \ and your data.\n\n- **Framework:** Select a framework for your AI project based\
    \ on your choice of model. There are many popular frameworks available for building\
    \ machine learning and deep learning models, including `TensorFlow`, `PyTorch`,\
    \ and `Scikit-learn`. Choose a framework that is well-suited to your model and\
    \ that has the necessary features and functionality you need.\n\n- **Deployment\
    \ details:** Deploying an AI model is an important part of the overall project\
    \ and should be planned ahead of time to ensure that the model can be integrated\
    \ smoothly into a production environment. Here are some steps you can take to\
    \ plan the deployment of your AI model:\n  - **Identify the deployment requirements:**\
    \ Begin by identifying the requirements for deploying your model in a production\
    \ environment. Consider factors such as the hardware and software infrastructure\
    \ needed to run the model, the data inputs and outputs, and any security or compliance\
    \ considerations.\n\n- **Select a deployment strategy:** Once you have identified\
    \ the deployment requirements, choose a deployment strategy that is appropriate\
    \ for your model and project goals. Some common strategies include deploying the\
    \ model as a web service, integrating it into an existing application, or deploying\
    \ it to an edge device.\n\n- **Choose a deployment platform:** Depending on your\
    \ deployment strategy, choose a deployment platform that is well-suited to your\
    \ model and project goals. There are many platforms available for deploying AI\
    \ models, including cloud platforms such as `AWS`, `Azure`, and `Google Cloud`,\
    \ as well as edge devices such as the `Raspberry Pi` and `Nvidia Jetson`.\n\n\
    With a proper approach before even implementation, we can ensure that the AI projects\
    \ will deliver value over the long term and don’t end up as toy projects."
