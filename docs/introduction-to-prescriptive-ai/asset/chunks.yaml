    ## Introduction


    This book will introduce you to the concept of decision intelligence, including
    its history and current and future trends. It will help you evaluate different
    decision intelligence techniques and guide you on how to them through different
    prescriptive AI methods and incorporate them into business workflows through different
    domain-specific use case implementations.


    This book is for data scientists, AI/machine learning engineers, and deep learning
    professionals who are working toward building advanced intelligent AI/ML applications.
    This book is also for business professionals and nontechnical stakeholders who
    want to understand how decision intelligence can help a business grow.


    This book will take you through the journey of decision-making in companies with
    key milestones, key statistics, and benefits. It will provide insights on where
    decision intelligence fits within the AI life cycle. This book will provide insights
    on how to prepare for prescriptive AI (a key requirement to decision intelligence)
    with the help of a business requirement document. It will then deep dive into
    different decision intelligence methodologies, their advantages, and their limitations.
    Next, you will learn how to perform different simulations and interpret the results
    from them. Then you will be guided on how to enable and embed the decision intelligence
    process into the business workflow through prescriptive AI. You will learn about
    different cognitive biases that humans make and how that can be lowered/eliminated
    through the combination of machine and human intelligence. Finally, you will find
    different cases studies by domain through tailored use cases.


    By the end of the book, you will have a solid understanding of decision intelligence
    and prescriptive AI tools and techniques and how to incorporate them within the
    business workflow for greater productivity and profit to the business.


    The source code for this book is available on GitHub ( [`github.com/apress/introduction-prescriptive-ai`](https://github.com/apress/introduction-prescriptive-ai)
    ).


    ## Acknowledgments


    We would like to thank our families who have always made sure we had the right
