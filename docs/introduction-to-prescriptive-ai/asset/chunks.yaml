- fmt: '### Map the Data


    Mapping the data in the context of connecting AI predictions to business tools
    refers to the process of identifying the relevant data produced by the AI model
    and aligning it with the data required by the business tool. The data produced
    by the AI model may be in a format that is different from what the business tool
    requires, so mapping is necessary to ensure that the data can be effectively shared
    between the two systems.


    For example, as shown in Figure [5-3](#602259_1_En_5_Chapter.xhtml#Fig3), let’s
    say that an organization has an AI model that predicts customer churn. The AI
    model produces a list of customers who are at high risk of churning, along with
    a probability score for each customer. To integrate this prediction into the organization’s
    CRM system, the organization would need to map the data from the AI model to the
    data required by the CRM system.


    ![](images/602259_1_En_5_Chapter/602259_1_En_5_Fig3_HTML.jpg)


    A workflow diagram of the AI model that predicts customer churn. The customers
    and orders and other data flows to prepare then to AI or ML predict churn and
    maps to CRM systems and to customer name, account number, contact information,
    and churn probability score.


    **Figure 5-3** Example AI model that predicts customer churn


    Mapping the data would involve identifying the specific fields in the CRM system
    that correspond to the data produced by the AI model. For example, the CRM system
    may require the customer name, account number, and contact information, in addition
    to the churn probability score. The organization would need to ensure that the
    data produced by the AI model is aligned with the data required by the CRM system
    and may need to perform data transformations or conversions to ensure compatibility.


    Once the data mapping is complete, the organization can then connect the AI model
    to the CRM system, using the CRM system’s API or other integration methods, to
    share the AI predictions with the CRM system. This enables the organization to
    leverage the AI predictions to inform its customer retention strategies, and to
    take targeted actions to prevent customer churn.


    In summary, mapping the data involves aligning the data produced by the AI model
    with the data required by the business tool to ensure that the data can be effectively
    shared and used to support business operations.


    ## Conclusion


    In this chapter, we discussed how decision intelligence can be integrated into
    business workflows through the development of user-friendly applications that
    connect AI predictions to existing business tools. We highlighted the importance
    of collaboration between DI experts and business teams to ensure that the outputs
    of DI models are properly integrated into business workflows. We also discussed
    some of the technical challenges involved in integrating DI into business workflows,
    such as connecting to legacy systems and ensuring data security.


    To successfully integrate DI into business workflows, it is essential to develop
    user-friendly interfaces that make it easy for nontechnical users to interact
    with the DI models and understand the outputs. The development of custom applications
    that connect AI predictions to existing business tools is an effective way to
    achieve this. To increase user adoption, it is important to involve business teams
    in the development process and to provide training and support to help users understand
    how to use the applications effectively.


    Overall, integrating DI into business workflows requires a combination of technical
    expertise, collaboration between DI experts and business teams, and a focus on
    developing user-friendly interfaces that make it easy for nontechnical users to
    interact with the outputs of DI models. By successfully integrating DI into business
    workflows, organizations can leverage the power of AI to support informed decision-making
    and improve business outcomes.


    # 6. Actions, Biases, and Human-in-the-Loop


    Ethical AI refers to the development and use of artificial intelligence (AI) in
    a way that aligns with ethical principles and values. This includes ensuring that
    AI systems are transparent, accountable, and unbiased, and that they do not cause
    harm to individuals or society. In this chapter, we will uncover the ethical aspects
    of AI such as bias and fairness, responsible AI, and human in the loop.


    ## Key Ethical Considerations in AI


    Several key ethical considerations must be taken into account when developing
    AI systems. This includes ensuring that AI systems are designed and implemented
    in ways that respect individual privacy and autonomy, that they are not used to
    create or perpetuate unjust power structures, and that they do not contribute
    to social or economic inequality.


    To promote ethical AI, organizations and developers should follow several best
    practices, such as involving diverse stakeholders in the design and development
    process, conducting thorough testing and evaluation of AI systems to identify
    potential biases and unintended consequences, and implementing clear guidelines
    and standards for ethical AI across the industry.


    - **Bias and fairness:** AI systems can perpetuate and amplify biases, particularly
    if the data used to train them is biased. Ethical AI requires addressing and mitigating
    these biases to ensure fairness and equity.

    - **Privacy and security:** AI systems often deal with sensitive personal data,
    such as medical records or financial information. Ethical AI requires ensuring
    that this data is handled securely and in accordance with relevant privacy laws
    and regulations.

    - **Transparency and explainability:** AI systems can be difficult to understand
    and interpret, making it challenging to determine how decisions are made. Ethical
    AI requires transparency and explainability so that individuals can understand
    how and why decisions are being made.

    - **Accountability:** Ethical AI requires accountability so that individuals or
    organizations responsible for developing and deploying AI systems can be held
    responsible for any negative outcomes.

    - **Human values and rights:** AI systems should be designed and used in a way
    that respects human values and rights, including autonomy, privacy, and dignity.


    Addressing these ethical considerations requires collaboration and engagement
    across a range of stakeholders, including technologists, policymakers, ethicists,
    and civil society groups. It also requires ongoing evaluation and adaptation as
    AI technologies continue to evolve.'
