    \n## 决策智能方法论：概率模型\n\n概率模型运用概率论原理来建模问题，这与使用数学方程的数学模型不同。这使得概率模型特别适用于结果受众多不确定因素影响的情况。概率模型常用于金融、经济和医疗保健等领域，在这些领域中，决策的结果具有不确定性和不可预测性。接下来，我们将了解如何使用一种广泛使用的概率模型——马尔可夫链，来构建决策智能系统。\n"
- fmt: '# Markov Chain


    Markov chain models are a type of probabilistic models that can be employed to
    study dynamic systems, where the likelihood of transitioning from one state to
    another is determined solely by the present state, without any dependence on the
    system’s past history.


    An example of a Markov chain model is a stock market model that has three states:
    bull, bear, and flat. We can represent this as a three-state Markov chain model,
    where the transition probabilities between states depend only on the current state.
    For example, let’s say that the probability of moving from a bull market to a
    bear market is 0.3, and it is 0.6 for staying in bull market itself. The probability
    of moving from a bear market to a flat market is 0.2, and it is 0.3 for staying
    in bear market itself. The probability of moving from a flat market to a bull
    market is 0.2, and the probability of staying in the flat market is 0.6. Figure
    [4-2](#602259_1_En_4_Chapter.xhtml#Fig2) shows what the transition matrix for
    the stock market model.


    ![](images/602259_1_En_4_Chapter/602259_1_En_4_Fig2_HTML.jpg)


    An illustration of a Markov chain model has three states: bull, bear, and flat.
    The bull to bull is 0.6, bull to flat is 0.1, bull to bear is 0.3, bear to bull
    is 0.5, flat to bull is 0.2, bear to bear is 0.3, flat to flat is 0.6, bear to
    flat is 0.2, and flat to bear is 0.2.


    **Figure 4-2** State transition diagram: Markov chain


    This matrix tells us that there is a 60 percent chance of staying in the bull
    market on a given day, a 30 percent chance of moving to the bear market, and a
    10 percent chance of moving to the flat market. Similarly, there is a 30 percent
    chance of staying in the bear market on a given day, a 20 percent chance of moving
    to the flat market, and a 50 percent chance of moving to the bull market. Finally,
    there is a 20 percent chance of moving from the flat market to the bull market,
    a 20 percent chance of moving to the bear market, and a 60 percent chance of staying
    in the flat market.


    Let’s understand how Markov chain models can be used for allocating a budget for
    different marketing channels/touchpoints.


    ## Problem Statement


    Company X is launching a new Android/iOS expense manager application and wants
    to create awareness among its target audience. It plans to offer a one-month free
    trial of the application to people who subscribe through the website. To achieve
    their marketing goal, they need to identify effective marketing channels that
    can reach their target audience and generate a high ROI through website sign-ups.
    While they have data from a previous similar campaign and have been using a heuristic
    model (last touch attribution) for budget allocation, they want to leverage their
    ML team’s inputs to build a more data-driven solution that can analyze and optimize
    their marketing channels.


    ## Solution


    Based on the given problem, the ML team suggested using a Markov chain model as
    it best suits attribution problems. The primary aim of the team is to find out
    the optimal percentage budget allocation for each marketing channel, based on
    the output of the Markov chain model.


    The team has access to the historical user path data along with the daily marketing
    spend for each of the channel.


    The team proposes to build the model using the `ChannelAttribution` Python package.


    ### Step 1: Importing the required libraries


    ```

    [In]:

    import numpy as np

    import pandas as pd

    from ChannelAttribution import *

    ```


    ### Step 2: Reading historical campaign data (user path and daily marketing spend
    for the channels)


    ```

    [In]:

    attribution_data = pd.read_csv(''attribution_data.csv'')

    attribution_data[''time''] = pd.to_datetime(attribution_data[''time''])

    daily_budget = pd.read_csv(''daily_budget.csv'')

    ```


    ### Step 3: Data preprocessing


    We create the path order for when users interact with different channels (this
    is equivalent to SQL window functions).


    ```

    [In]:

    attribution_data[''path_order''] = attribution_data.sort_values([''time'']).groupby([''cookie'']).cumcount()
    + 1

    ```


    We aggregate the channels a user interacted with into a single row.


    ```

    [In]:

    attribution_data_paths = attribution_data.groupby(''cookie'')[''channel''].agg(lambda
    x: x.tolist()).reset_index()

    attribution_data_paths = attribution_data_paths.rename(columns={''channel'': ''path''})

    ```


    We aggregate conversions and their value by cookie ID.


    ```

    [In]:

    attribution_data_conversions = attribution_data.groupby(''cookie'', as_index=False).agg({''conversion'':
    ''sum'', ''conversion_value'': ''sum''})

    ```


    We append path data with that of conversion.


    ```

    [In]:

    attribution_data_final = pd.merge(attribution_data_paths, attribution_data_conversions,
    how=''left'', on=''cookie'')

    [In]:

    print(''Total conversions: {}''.format(sum(attribution_data.conversion)))

    print(''Total conversion rate: {}%''.format(round(sum(attribution_data.conversion)
    / len(attribution_data)*100)))

    print(''Total value of conversions: ${}''.format(round(sum(attribution_data.conversion_value))))

    print(''Average conversion value: ${}''.format(round(sum(attribution_data.conversion_value)
    / sum(attribution_data.conversion))))

    [Out]:

    Total conversions: 19613

    Total conversion rate: 3%

    Total value of conversions: $122529

    Average conversion value: $6

    ```


    We will create a variable `path` in the specific format required by the Attribution
    Model package where the ordered channels a user interacts with are delimited by
    `>`.


    ```

    [In]:

    def listToString(df):

    str1 = ""

    for i in df[''path'']:

    str1 += i + '' > ''

    return str1[:-3]

    attribution_data_final[''path''] = attribution_data_final.apply(listToString,
    axis=1)

    ```


    We remove the user’s cookie and grouping by the path to see how many times a specific
    combination of channels led to a conversion or null outcome.


    ```

    [In]:

    attribution_data_final.drop(columns = ''cookie'', inplace = True)

    attribution_data_final[''null''] = np.where(attribution_data_final[''conversion'']
    == 0,1,0)

    attribution_data_final = attribution_data_final.groupby([''path''], as_index =
    False).sum()

    attribution_data_final.rename(columns={"conversion": "total_conversions", "null":
    "total_null", "conversion_value": "total_conversion_value"}, inplace = True)

    ```


    ### Step 4: Building the attribution models (heuristic for comparison and Markov
    models for calculations) and saving the results in a dataframe


    ```

    [In]:

    heuristic_models = heuristic_models(attribution_data_final,"path","total_conversions",var_value="total_conversion_value")

    markov_model = markov_model(attribution_data_final, "path", "total_conversions",
    var_value="total_conversion_value")

    [Out]:

    Number of simulations: 100000 - Convergence reached: 0.85% < 5.00%

    Percentage of simulated paths that successfully end before maximum number of steps
    (456) is reached: 99.99%

    [In]:

    all_attribution_models_result = pd.merge(heuristic_models,markov_model,on="channel_name",how="inner")

    all_attribution_models_conversion_result = all_attribution_models_result[["channel_name","first_touch_conversions","last_touch_conversions",\

    "linear_touch_conversions","total_conversions"]]

    all_attribution_models_conversion_result.columns = ["channel_name","first_touch","last_touch","linear_touch","markov_model"]

    all_attribution_models_conversion_value_result = all_attribution_models_result[["channel_name","first_touch_value","last_touch_value",\

    "linear_touch_value","total_conversion_value"]]

    all_attribution_models_conversion_value_result.columns = ["channel_name","first_touch","last_touch","linear_touch","markov_model"]

    all_attribution_models_conversion_value_result = pd.melt(all_attribution_models_conversion_value_result,
    id_vars="channel_name")

    ```


    ### Step 5: Calculating the optimal budget for the marketing channels'
