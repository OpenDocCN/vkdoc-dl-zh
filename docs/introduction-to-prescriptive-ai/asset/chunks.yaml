  trans: '

    ### 基于投票


    基于投票的决策是指一群人通过投票来决定行动方案的过程。决策基于票数统计，需要多数或绝对多数才能确定结果。这种方法通常在时间有限或无法达成共识时使用。投票可以采取多种形式，例如简单多数、三分之二多数，或根据成员个人持股或影响力进行加权投票。


    这种方法注重效率和公平性，并确保决策反映群体的意愿。然而，它也可能导致少数人的意见被忽视或忽略。基于投票的决策有几种类型，包括以下几种：


    - **简单多数：** 这涉及根据群体中多数个体的意愿做出决策。

    - **绝对多数：** 这涉及根据群体中特定比例个体的同意做出决策。

    - **相对多数：** 这涉及根据获得最多票数的候选人或选项做出决策，即使他们未获得多数票。


    以下是其优点：


    - **公平性：** 基于投票的决策可以促进公平，因为群体中的所有个体都有平等的机会影响结果。

    - **民主性：** 基于投票的决策是民主制度的基石，因为它允许表达和实施人民的意愿。

    - **透明度：** 基于投票的决策可以提高透明度，因为投票结果清晰且易于理解。


    以下是其缺点：


    - **代表性有限：** 基于投票的决策可能无法准确代表群体中所有个体的观点，因为有些人可能不参与投票，或者其观点可能被多数人稀释。

    - **结果有偏：** 基于投票的决策可能导致有偏见的结果，因为结果可能受到选民投票率或代表性不均等因素的影响。

    - **缺乏问责：** 基于投票的决策可能导致缺乏问责，因为个人可能不太愿意为投票或选举的结果承担责任。


    ### 基于阈值


    这种类型的决策会考虑给定活动的特定阈值来执行操作。当结果样本空间非常有限，并且有大量基于结果所做的决策的历史信息时，就会采用这种方法。基于阈值的决策有几种类型，包括以下几种：


    - **法定人数：** 这涉及根据群体中必须出席或代表才能做出决策的最少人数来做出决策。

    - **批准阈值：** 这涉及根据在做出决策前必须达到的最低批准或支持水平来做出决策。

    - **绩效阈值：** 这涉及根据在做出决策前必须达到的最低绩效或成就水平来做出决策。


    以下是其优点：


    - **客观性：** 基于阈值的决策可以为决策提供客观标准，因为它基于具体、可衡量的标准。

    - **透明度：** 基于阈值的决策可以提高透明度，因为决策标准清晰且易于理解。

    - **一致性：** 基于阈值的决策可以带来决策的一致性，因为每个人都遵循相同的标准和期望。


    以下是其缺点：


    - **僵化性：** 基于阈值的决策可能僵化且不灵活，因为它可能不允许考虑背景因素或个人情况。

    - **缺乏创造力：** 基于阈值的决策可能限制创造力和创新，因为个人可能只专注于满足最低标准，而不是探索新的创新解决方案。

    - **代表性不足：** 基于阈值的决策可能无法准确代表群体中所有个体的观点和需求，因为有些人可能达不到最低标准，或者其观点可能被其他达到标准的人稀释。


    ### 基于首个可接受匹配


    首个可接受匹配，也称为*满意*决策，是指个体选择第一个满足最低可接受标准的选项，而不是寻找最佳可能解决方案的过程。这种方法注重效率和速度，通常在决策者面临时间限制或资源有限时使用。在满意方法中，个体设定一个最低可接受的质量或绩效水平，然后选择第一个满足该标准的选项。这种方法可以快速做出决策，但可能导致次优结果，因为它可能忽略了需要额外努力或资源才能发现的更好选项。满意也可能导致未能充分探索所有可用选项，并考虑决策的长期后果。基于满意的决策有几种类型，包括以下几种：


    - **有限理性：** 这涉及基于有限的信息、资源和时间做出决策，并选择第一个满足最低可接受水平的选项。

    - **满意启发法：** 这涉及基于经验法则或捷径做出决策，帮助个体快速识别满足最低可接受水平的选项。


    以下是其优点：


    - **效率：** 基于满意的决策可以是一种高效的决策方式，因为它允许个体快速识别满足最低可接受水平的选项。

    - **现实性：** 基于满意的决策可以促进现实性，因为它承认个体拥有有限的信息、资源和时间，并且并非总能实现最佳解决方案。

    - **实用性：** 基于满意的决策可以是一种实用的决策方式，因为它关注可实现和现实的目标，而不是理想或最优的目标。


    以下是其缺点：


    - **质量不足：** 基于满意的决策可能导致质量较低的结果，因为个体可能满足于一个达到最低可接受水平的选项，而不是争取最佳解决方案。

    - **视角有限：** 基于满意的决策可能基于有限的信息、资源和时间，并且可能不考虑所有相关因素或视角。

    - **错失机会：** 基于满意的决策可能导致错失机会，因为个体可能满足于一个达到最低可接受水平的选项，而不是探索替代或更好的选项。

    '
- fmt: '### Optimization/Maximization Based


    Optimizing or maximizing decision-making is a process in which individuals strive
    to make the best possible decision based on all available information and constraints.
    This approach values finding the best solution and is often used when the consequences
    of a decision are significant or long-lasting. In an optimizing approach, individuals
    consider all available options, weigh the pros and cons, and choose the option
    that provides the greatest benefits or the least drawbacks. This method can lead
    to the best possible outcome, but it can also be time-consuming and resource-intensive,
    as it requires a thorough analysis of all options. Maximizing decision-making
    can also result in decision paralysis if individuals become overwhelmed by the
    available information and are unable to make a decision. There are several types
    of optimization/maximization-based decision-making, including these:


    - **Linear programming:** This involves using mathematical models to optimize
    decisions based on constraints and objectives.

    - **Nonlinear programming:** This involves using mathematical models to optimize
    decisions based on complex, nonlinear relationships between variables and constraints.


    These are the advantages:


    - **Quality:** Optimization/maximization-based decision-making can result in higher-quality
    outcomes, as individuals strive to find the best possible solution.

    - **Efficiency:** Optimization/maximization-based decision-making can be an efficient
    way to make decisions, as it involves evaluating all options and choosing the
    best one.

    - **Complete perspective:** Optimization/maximization-based decision-making can
    consider all relevant factors and perspectives, providing a complete and comprehensive
    perspective on the decision-making process.


    These are the disadvantages:


    - **Complexity:** Optimization/maximization-based decision-making can be complex,
    as it involves evaluating all options and considering multiple factors.

    - **Resource-intensive:** Optimization/maximization-based decision-making can
    be resource-intensive, requiring significant time, information, and computational
    resources to find the best possible solution.

    - **Unrealistic expectations:** Optimization/maximization-based decision-making
    can result in unrealistic expectations, as individuals may strive for the best
    possible solution, even if it is not achievable or practical.


    With human-only decision-making, a lot of different cognitive biases tend to exist.
    Let’s deep dive into the concept of cognitive bias and its different types.


    ### Cognitive Bias Due to Human-Only Decision-Making


    Cognitive bias refers to systematic errors in our thinking that can lead to flawed
    decisions. These biases arise from our emotions, experiences, and beliefs, and
    they can distort our perception of reality. Some common cognitive biases include
    confirmation bias, where we tend to favor information that supports our existing
    beliefs, and negativity bias, where we give more weight to negative information.
    Overconfidence bias, where we overestimate our abilities and the accuracy of our
    judgments, is another example. Understanding these biases is important, as they
    can impact our decision-making and lead to suboptimal outcomes. By recognizing
    and correcting for our biases, we can make more informed and objective decisions.


    We will study cognitive biases in detail in the following chapters.


    ## Human-Machine Decision-Making


    As humans evolved, their decision-making techniques evolved too. Just like we
    invented tools/techniques to help ease our day-to-day life (e.g., wheels for traveling,
    tools for farming, etc.), we also started to create tools and techniques to aid
    our decision-making process. This led to human-machine interactions that helped
    us make decisions quickly and with more accuracy and to some extent mitigate the
    cognitive bias effects. Let’s evaluate the different types of human-machine decision-making,
    aka machine assisted decision-making.


    ### Instruction/Rule-Based Systems


    In this technique, there is a computerized system that uses a set of explicitly
    stated rules to support decision-making activities. These rules are derived from
    domain expertise, regulations, or best practices, and they are encoded in the
    system to assist with decision-making processes. The system operates by matching
    the facts of a particular case against the rules and suggesting the course of
    action that best fits the rules. Rule-based human-machine decision-making is useful
    in situations where the decision-making process is well defined and the rules
    are well understood, as it provides a consistent and repeatable approach to decision-making.
    However, it may not be well suited to situations where the rules are complex or
    subject to change, as this requires manual updates to the system’s rule base.
    Before the advent of computer systems, there were other tools used for decision-making.
    For example, the abacus was used for calculating finances. There are several types
    of instruction/rule-based decision systems, including the following:


    - **Expert systems:** These are computer programs that use a set of rules and
    knowledge to mimic the decision-making abilities of human experts.

    - **Decision trees:** These are graphical representations of a set of rules or
    conditions that specify how decisions should be made based on a set of variables
    or factors.


    These are the advantages:


    - **Consistency:** Instruction/rule-based decision systems can provide consistent
    outcomes, as they rely on a set of predefined rules that specify how decisions
    should be made.

    - **Speed:** Instruction/rule-based decision systems can make decisions quickly,
    as they rely on predefined rules and algorithms.

    - **Accuracy:** Instruction/rule-based decision systems can provide accurate outcomes,
    as they rely on well-defined rules and algorithms that have been tested and validated.


    These are the disadvantages:


    - **Rigidity:** Instruction/rule-based decision systems can be rigid, as they
    rely on a set of predefined rules that may not adapt to changing circumstances
    or new information.

    - **Lack of flexibility:** Instruction/rule-based decision systems may not be
    flexible, as they rely on predefined rules that may not account for all possible
    scenarios or exceptions.

    - **Limited perspective:** Instruction/rule-based decision systems may have a
    limited perspective, as they rely on predefined rules that may not consider all
    relevant factors or perspectives.'
  raw: '#### Optimization/Maximization Based


    Optimizing or maximizing decision-making is a process in which individuals strive
    to make the best possible decision based on all available information and constraints.
    This approach values finding the best solution and is often used when the consequences
    of a decision are significant or long-lasting. In an optimizing approach, individuals
    consider all available options, weigh the pros and cons, and choose the option
    that provides the greatest benefits or the least drawbacks. This method can lead
    to the best possible outcome, but it can also be time-consuming and resource-intensive,
    as it requires a thorough analysis of all options. Maximizing decision-making
    can also result in decision paralysis if individuals become overwhelmed by the
    available information and are unable to make a decision. There are several types
    of optimization/maximization-based decision-making, including these:


    *   **Linear programming:** This involves using mathematical models to optimize
    decisions based on constraints and objectives.


    *   **Nonlinear programming:** This involves using mathematical models to optimize
    decisions based on complex, nonlinear relationships between variables and constraints.


    These are the advantages:


    *   **Quality:** Optimization/maximization-based decision-making can result in
    higher-quality outcomes, as individuals strive to find the best possible solution.


    *   **Efficiency:** Optimization/maximization-based decision-making can be an
    efficient way to make decisions, as it involves evaluating all options and choosing
    the best one.


    *   **Complete perspective:** Optimization/maximization-based decision-making
    can consider all relevant factors and perspectives, providing a complete and comprehensive
    perspective on the decision-making process.


    These are the disadvantages:


    *   **Complexity:** Optimization/maximization-based decision-making can be complex,
    as it involves evaluating all options and considering multiple factors.


    *   **Resource-intensive:** Optimization/maximization-based decision-making can
    be resource-intensive, requiring significant time, information, and computational
    resources to find the best possible solution.


    *   **Unrealistic expectations:** Optimization/maximization-based decision-making
    can result in unrealistic expectations, as individuals may strive for the best
    possible solution, even if it is not achievable or practical.


    With human-only decision-making, a lot of different cognitive biases tend to exist.
    Let’s deep dive into the concept of cognitive bias and its different types.


    #### Cognitive Bias Due to Human-Only Decision-Making


    Cognitive bias refers to systematic errors in our thinking that can lead to flawed
    decisions. These biases arise from our emotions, experiences, and beliefs, and
    they can distort our perception of reality. Some common cognitive biases include
    confirmation bias, where we tend to favor information that supports our existing
    beliefs, and negativity bias, where we give more weight to negative information.
    Overconfidence bias, where we overestimate our abilities and the accuracy of our
    judgments, is another example. Understanding these biases is important, as they
    can impact our decision-making and lead to suboptimal outcomes. By recognizing
    and correcting for our biases, we can make more informed and objective decisions.


