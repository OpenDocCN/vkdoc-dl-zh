- fmt: '### Decision-Making Process


    As per the research by Baker et al. (2001), before making a decision, it is important
    to identify the individuals or groups that are responsible for making the decision
    and those who will be affected by it. This helps to reduce any possible disagreement
    about problem definition, requirements, goals, and criteria. Once the individual/group
    identification is done, it is recommended to follow a structured approach for
    decision-making, as shown in Figure [3-2](#602259_1_En_3_Chapter.xhtml#Fig2).


    ![](images/602259_1_En_3_Chapter/602259_1_En_3_Fig2_HTML.jpg)


    An illustration of the decision-making process. It includes problem definition,
    listing constraints, possible decision and effect evaluation, decision execution,
    and outcome evaluation and process update.


    **Figure 3-2** Decision-making process


    **Step 1: Problem Definition**


    This is the most critical and often ignored step in the decision-making process.
    Usually, framing the problem statement is a more iterative and time-consuming
    process than the solution itself. It requires input from the stakeholders, understanding
    the environment under which a decision has to be made, and what will happen if
    the problem is left as is, i.e., no decision is made. Once the problem definition
    is reviewed and agreed on by all will this step be considered done, and one can
    move to the subsequent steps.


    The problem definition stage also requires the “desirable” state to be defined,
    i.e., what the ideal solution to the problem looks like once the decision is made.


    A wrong problem definition will have wrong decisions made, and the actual problem
    will still remain the same, causing negative effects on the individuals/groups.


    **Step 2: Listing Constraints**


    Decision-making is, almost all the time, never done without constraints. These
    constraints can be financial, ethical/moral, environmental, time related, etc.
    The constraints help to filter out the alternatives and bring them from a possibly
    infinite number to a finite number. Listing all the constraints for a given problem
    is as important as the problem definition. Wrong constraints can lead to no or
    wrong decisions.


    The constraints can be categorized into hard and soft ones. The hard constraints
    are the ones that are bound to be fulfilled and are non-negotiable in any condition.
    These constraints cannot be overlooked. The soft constraints, on the other hand,
    are the ones that are not “compulsory” but “good to have.” They add more value
    to the decision-making but do not act as a blocker, if not fulfilled.


    **Step 3: Possible Decisions and Their Effects Evaluation**


    Once the problem is defined and constraints are listed, one needs to evaluate
    the possible decisions/solutions and their closeness to the desired state mentioned
    in step 1. Listing the pros and cons of every possible decision/solution within
    the scope of the constraints is a good practice to choose the right one.


    **Step 4: Decision Execution**


    Once all the possible solutions/alternatives are evaluated and the best one is
    chosen, it is time to execute the decision under the given constraints.


    **Step 5: Outcome Evaluation and Process Update**


    This step enables you to monitor and compare the outcome of the decision made
    to that of the expected one shown in step 3. This helps to re-evaluate the whole
    process and change the problem, constraints, and decisions if required.


    These steps continue in a cyclic fashion until the right decision with the right
    outcome emerges. Let’s go through the decision-making process with an example.


    ### Decision-Making Process Example


    In this example, we will go through the decision-making process of a person wanting
    to purchase a car. We will see how the person navigates the process, as listed
    in Figure [3-2](#602259_1_En_3_Chapter.xhtml#Fig2), to arrive at the decision
    of which car to purchase based on their needs.


    **Step 1: Problem Definition**


    Amit, a 25-year-old unmarried software professional from Bangalore, is planning
    to purchase a car. It will be his first car, so he is super excited about it.
    He wants to ensure he does all the due diligence in the process to purchase a
    car so that he doesn’t regret it later.


    **Step 2: Listing Constraints**


    Here are the hard constraints:


    *   **Car condition:** Brand new (not considering used cars)

    *   **Budget:** INR 8-10 lakhs ($9.6K–$12K)

    *   **Size:** Hatchback, 13.7 feet long (164.4 inches) × 6 feet wide (72 inches)
    × 5.4 feet tall (64.8 inches), comfortable for four people

    *   **Safety Ratings:** 4 or 5 (NCAP)

    *   **Purpose:** Travel to work and for short trips with family during weekends

    *   **Engine:** Diesel (manual), for better mileage

    *   **Boot space:** Minimum 250 liters

    *   **Waiting Period:** 1 to 3 months

    *   **After sales service charges:** Economical (INR 25–35K per year)

    *   **Authorized service centers:** Maximum coverage, even in remote areas

    *   **Comfort:** Comfortable and smooth driving quality


    Here are the soft constraints:


    *   Premium interiors

    *   Cheap spare parts cost

    *   Wireless charger

    *   Top-notch music system

    *   Touchscreen display

    *   Alloy wheels

    *   Wide variety of color options

    *   Hill assist feature

    *   Good resale value


    **Step 3: Possible Decisions and Their Effects Evaluation**


    As this is the first time Amit is buying a car, he reaches out to his family and
    close friends, relatives, etc., who have a hatchback or have had one in the past.
    He wants to ensure at least the after service and authorized service center details
    are known through their experience. He also does secondary research with details
    available on social media, brand websites, forums, etc., that extend his scope
    of information beyond family/peers and validate their claims. He prepares a list
    of the constraints and the values/parameters according to the requirements (as
    shown in Figure [3-3](#602259_1_En_3_Chapter.xhtml#Fig3)). He also visits the
    showrooms of the brands to test-drive the vehicles and find out details such as
    drive quality, comfort, and waiting period.


    ![](images/602259_1_En_3_Chapter/602259_1_En_3_Fig3_HTML.jpg)


    A table of possible decisions and the evaluation of their effects. It includes
    constraints, type, brand A, brand B, brand C, and brand E. The constraints are
    price, safety rating, engine capacity, mileage, boot space capacity, walking period,
    etcetera.


    **Figure 3-3** Possible decisions and their effects evaluation


    **Step 4: Decision Execution**


    From Table 3-3, it seems like Brand A and Brand C are the closest in terms of
    what Amit needs. Brand A is a little costlier than Brand C, has less trunk space,
    has a longer waiting period, and has an average maintenance cost. Brand C’s safety
    rating is lesser than that of Brand A, with slightly less mileage, fewer authorized
    service centers, fewer color options, and less resale value. After doing the cost-benefit
    analysis and immediate requirements, Amit goes ahead and buys Brand C. The price
    and waiting period played a bigger role in his decision-making than some of the
    other factors.


    **Step 5: Outcome Evaluation and Process Update**


    Ideally, for a once-in-a-lifetime type of decision, this step is not required
    as the decision-maker often makes the decision only after thorough research. However,
    Amit might face issues after buying the car, such as loan issues, hidden charges
    by the showroom, a sudden extension of the waiting period, etc. So, Amit might
    cancel his purchase and go for Brand A or re-evaluate all other options. Amit
    could also face issues post-delivery of the car, such as lower mileage than claimed,
    faulty car components, higher than expected maintenance cost, etc., which could
    force him to sell his car and consider buying a new one or look into used cars.'
