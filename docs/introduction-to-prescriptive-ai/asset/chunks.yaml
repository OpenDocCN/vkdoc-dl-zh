    # 马尔可夫链


    马尔可夫链模型是一种可用于研究动态系统的概率模型，其中从一个状态转移到另一个状态的可能性仅由当前状态决定，与系统的历史无关。


    马尔可夫链模型的一个例子是股票市场模型，该模型具有三种状态：牛市、熊市和横盘。我们可以将其表示为三状态马尔可夫链模型，其中状态之间的转移概率仅取决于当前状态。例如，假设从牛市转移到熊市的概率为
    0.3，而停留在牛市的概率为 0.6。从熊市转移到横盘的概率为 0.2，停留在熊市的概率为 0.3。从横盘转移到牛市的概率为 0.2，停留在横盘的概率为 0.6。图
    4-2 展示了股票市场模型的转移矩阵。


    ![](img/602259_1_En_4_Fig2_HTML.jpg)


    一个马尔可夫链模型的示意图，包含三种状态：牛市、熊市和横盘。牛市到牛市的概率为 0.6，牛市到横盘的概率为 0.1，牛市到熊市的概率为 0.3，熊市到牛市的概率为
    0.5，横盘到牛市的概率为 0.2，熊市到熊市的概率为 0.3，横盘到横盘的概率为 0.6，熊市到横盘的概率为 0.2，横盘到熊市的概率为 0.2。


    **图 4-2** 状态转移图：马尔可夫链


    该矩阵告诉我们，在给定的一天中，有 60%的概率停留在牛市，30%的概率转移到熊市，10%的概率转移到横盘。类似地，有 30%的概率停留在熊市，20%的概率转移到横盘，50%的概率转移到牛市。最后，有
    20%的概率从横盘转移到牛市，20%的概率转移到熊市，60%的概率停留在横盘。


    让我们了解如何将马尔可夫链模型用于为不同的营销渠道/接触点分配预算。


    ## 问题陈述


    X 公司正在推出一款新的 Android/iOS 费用管理应用程序，并希望在其目标受众中建立知名度。该公司计划为通过网站订阅的用户提供一个月的免费试用。为了实现其营销目标，他们需要确定能够触达目标受众并通过网站注册产生高投资回报率的有效营销渠道。虽然他们拥有之前类似活动的数据，并且一直使用启发式模型（最后接触归因）进行预算分配，但他们希望利用其机器学习团队的输入来构建一个更具数据驱动性的解决方案，以分析和优化其营销渠道。


    ## 解决方案


    基于给定的问题，机器学习团队建议使用马尔可夫链模型，因为它最适合归因问题。团队的主要目标是根据马尔可夫链模型的输出，找出每个营销渠道的最佳预算分配百分比。


    团队可以访问历史用户路径数据以及每个渠道的每日营销支出。


    团队提议使用`ChannelAttribution` Python 包构建模型。


    ### 步骤 1：导入所需的库


    ```

    [In]:

    import numpy as np

    import pandas as pd

    from ChannelAttribution import *

    ```


    ### 步骤 2：读取历史活动数据（用户路径和渠道的每日营销支出）


    ```

    [In]:

    attribution_data = pd.read_csv(''attribution_data.csv'')

    attribution_data[''time''] = pd.to_datetime(attribution_data[''time''])

    daily_budget = pd.read_csv(''daily_budget.csv'')

    ```


    ### 步骤 3：数据预处理


    我们创建用户与不同渠道交互时的路径顺序（这相当于 SQL 窗口函数）。


    ```

    [In]:

    attribution_data[''path_order''] = attribution_data.sort_values([''time'']).groupby([''cookie'']).cumcount()
    + 1

    ```


    我们将用户交互过的渠道聚合到单行中。


    ```

    [In]:

    attribution_data_paths = attribution_data.groupby(''cookie'')[''channel''].agg(lambda
    x: x.tolist()).reset_index()

    attribution_data_paths = attribution_data_paths.rename(columns={''channel'': ''path''})

    ```


    我们按 cookie ID 聚合转化次数及其价值。


    ```

    [In]:

    attribution_data_conversions = attribution_data.groupby(''cookie'', as_index=False).agg({''conversion'':
    ''sum'', ''conversion_value'': ''sum''})

    ```


    我们将路径数据与转化数据合并。


    ```

    [In]:

    attribution_data_final = pd.merge(attribution_data_paths, attribution_data_conversions,
    how=''left'', on=''cookie'')

    [In]:

    print(''总转化次数: {}''.format(sum(attribution_data.conversion)))

    print(''总转化率: {}%''.format(round(sum(attribution_data.conversion) / len(attribution_data)*100)))

    print(''转化总价值: ${}''.format(round(sum(attribution_data.conversion_value))))

    print(''平均转化价值: ${}''.format(round(sum(attribution_data.conversion_value) / sum(attribution_data.conversion))))

    [Out]:

    总转化次数: 19613

    总转化率: 3%

    转化总价值: $122529

    平均转化价值: $6

    ```


    我们将创建一个变量`path`，其格式符合归因模型包的要求，即用户交互的有序渠道之间用`>`分隔。


    ```

    [In]:

    def listToString(df):

    str1 = ""

    for i in df[''path'']:

    str1 += i + '' > ''

    return str1[:-3]

    attribution_data_final[''path''] = attribution_data_final.apply(listToString,
    axis=1)

    ```


    我们移除用户的 cookie，并按路径分组，以查看特定渠道组合导致转化或空结果的次数。


    ```

    [In]:

    attribution_data_final.drop(columns = ''cookie'', inplace = True)

    attribution_data_final[''null''] = np.where(attribution_data_final[''conversion'']
    == 0,1,0)

    attribution_data_final = attribution_data_final.groupby([''path''], as_index =
    False).sum()

    attribution_data_final.rename(columns={"conversion": "total_conversions", "null":
    "total_null", "conversion_value": "total_conversion_value"}, inplace = True)

    ```


    ### 步骤 4：构建归因模型（用于比较的启发式模型和用于计算的马尔可夫模型）并将结果保存到数据框中


    ```

    [In]:

    heuristic_models = heuristic_models(attribution_data_final,"path","total_conversions",var_value="total_conversion_value")

    markov_model = markov_model(attribution_data_final, "path", "total_conversions",
    var_value="total_conversion_value")

    [Out]:

    模拟次数: 100000 - 收敛达到: 0.85% < 5.00%

    在达到最大步数(456)之前成功结束的模拟路径百分比: 99.99%

    [In]:

    all_attribution_models_result = pd.merge(heuristic_models,markov_model,on="channel_name",how="inner")

    all_attribution_models_conversion_result = all_attribution_models_result[["channel_name","first_touch_conversions","last_touch_conversions",\

    "linear_touch_conversions","total_conversions"]]

    all_attribution_models_conversion_result.columns = ["channel_name","first_touch","last_touch","linear_touch","markov_model"]

    all_attribution_models_conversion_value_result = all_attribution_models_result[["channel_name","first_touch_value","last_touch_value",\

    "linear_touch_value","total_conversion_value"]]

    all_attribution_models_conversion_value_result.columns = ["channel_name","first_touch","last_touch","linear_touch","markov_model"]

    all_attribution_models_conversion_value_result = pd.melt(all_attribution_models_conversion_value_result,
    id_vars="channel_name")

    ```


    ### 步骤 5：计算营销渠道的最佳预算

    '
- fmt: '| `channel_name` | `markov_model` | `cost` | `channel_weight` | `cost_weight`
    | `roas` | `optimal_budget` | `optimal_budget_percentage` |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | Facebook | 5289.103801 | 1481.679 | 0.26967337 | 0.305076822 | 0.883952337 |
    1309.733172 | 27 |

    | Instagram | 4468.380797 | 641.159 | 0.227827502 | 0.1320143 | 1.725778963 |
    1106.498714 | 23 |

    | Paid Search | 3957.708706 | 1187.142 | 0.201790073 | 0.244431809 | 0.825547518
    | 980.0417185 | 20 |

    | Online Display | 2395.295285 | 554.937 | 0.12212794 | 0.114261236 | 1.068848407
    | 593.1435285 | 12 |

    | Online Video | 3502.511411 | 991.823 | 0.178581115 | 0.204215833 | 0.874472427
    | 867.3218664 | 18 |


    ```

    [In]:

    daily_budget_agg = daily_budget.drop([''day'', ''impressions''], axis=1).groupby(''channel'',
    as_index=False).sum(''cost'')

    daily_budget_agg.columns = [''channel_name'', ''cost'']

    roas_data = pd.merge(all_attribution_models_conversion_result, daily_budget_agg)

    roas_data[''channel_weight''] = (roas_data[''markov_model''])/(sum(roas_data[''markov_model'']))

    roas_data[''cost_weight''] = (roas_data[''cost''])/(sum(roas_data[''cost'']))

    roas_data[''roas''] = (roas_data[''channel_weight''])/(roas_data[''cost_weight''])

    roas_data[''optimal_budget''] = (roas_data[''cost''])*(roas_data[''roas''])

    roas_data[''optimal_budget_percentage''] = (round((roas_data[''optimal_budget''])/(sum(roas_data[''optimal_budget''])),2))*100

    roas_data.head()

    [Out]:

    ```


    From the previous output, the team realized that Instagram and online display
    channels, while performing well in driving the conversions, were under-budgeted.
    They need to be given a higher share of the marketing budget, which, in this case
    is 23 percent and 12 percent for Instagram and online display, respectively.


    ## Decision Intelligence Methodology: AI/ML Models


    AI/ML models are based on machine learning algorithms that can learn from data
    and improve their performance over time. These models are used in a wide range
    of applications, from image recognition and natural language processing to predictive
    analytics and decision-making.


    Unlike mathematical and probabilistic models, AI models do not require explicit
    formulas or assumptions about the relationships between variables. Instead, they
    learn patterns and relationships from large datasets and can identify complex
    patterns and trends that are difficult or impossible for humans to discern.


    Let’s understand how AI/ML models can be used for decision intelligence through
    an HR analytics use case.


    ### Problem Statement


    A multinational corporation with nine distinct areas of operation faces a challenge
    in selecting suitable candidates for managerial (and below positions) promotions
    and providing them with timely training. The announcement of final promotions
    occurs only after evaluations, resulting in delays in transitioning to new roles.
    Therefore, the company seeks assistance in identifying qualified candidates at
    specific checkpoints to accelerate the promotion process as a whole.


    The company has historical data comprising demographic, educational, work experience,
    and skill details, along with the promotion details.


    ### Solution


    As the company has access to historical data, it makes sense to build a machine
    learning model that can find the traits of employees fit for promotion. As the
    goal is to find the list of employees who can be promoted, it will come under
    the supervised classification category.


    #### Step 1: Importing the libraries and reading the training and test data


    ```

    [In]:

    from sklearn.preprocessing import LabelEncoder, StandardScaler, RobustScaler

    from sklearn.model_selection import train_test_split, StratifiedKFold

    from sklearn.linear_model import LogisticRegression

    from sklearn.impute import SimpleImputer

    from sklearn.metrics import *

    import pandas as pd

    import numpy as np

    [In]:

    training_data = pd.read_csv(''hr_train.csv'')

    test_data = pd.read_csv(''hr_test.csv'')

    ```


    #### Step 2: Data preprocessing


    As the `employee_id` column is an ID column, it serves no purpose in the modeling
    process. So, we delete the `employee_id` column from the training and test data.


    ```

    [In]:

    del training_data[''employee_id'']

    del test_data[''employee_id'']

    categorical_columns = [c for c in training_data.columns if training_data[c].dtypes==''object'']

    numeric_columns = [n for n in training_data.columns if n not in categorical_columns]

    true_categorical_columns = [''department'', ''region'', ''education'', ''gender'',
    ''recruitment_channel'',''awards_won?'',

    ''previous_year_rating'',''length_of_service'', ''no_of_trainings'']

    true_numeric_columns = [c for c in training_data.columns if c not in true_categorical_columns]

    true_numeric_columns.remove(''is_promoted'')

    ```


    There are very few employees whose work experience is 30 years or more (0.1 percent).
    These people can be considered as outliers, and it is a best practice to remove
    them before we feed data to the model.


    ```

    [In]:

    training_data = training_data[training_data.length_of_service<30]

    ```


    We apply the imputation strategy for the `education` and `previous_year_rating`
    columns.


    ```

    [In]:

    target = training_data.pop(''is_promoted'')

    all_data = pd.concat([training_data, test_data], axis=0)

    si_most_frequent = SimpleImputer(strategy= ''most_frequent'')

    all_data[''education''] = si_most_frequent.fit_transform(all_data.education.values.reshape(-1,
    1))

    si_mean = SimpleImputer(strategy=''mean'')

    all_data[''previous_year_rating''] = si_mean.fit_transform(all_data.previous_year_rating.values.reshape(-1,
    1))

    ```


    We convert categorical features into dummy ones.


    ```

    [In]:

    all_data_dummy = pd.get_dummies(all_data)

    new_training_data = all_data_dummy.iloc[:len(training_data)]

    new_test_data = all_data_dummy.iloc[len(training_data):]

    ```'
