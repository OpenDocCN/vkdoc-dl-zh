  trans: "\n### 投资回报率\n\n项目的*投资回报率*（`ROI`）应综合考虑项目实施成本及其为业务带来的潜在价值。\n\nAI 项目的 `ROI`\
    \ 是指实施 AI 解决方案或计划所预期或实际获得的财务回报。其计算方式是将项目实施成本（包括数据采集、硬件软件及人员成本）与预期或实际收益进行比较。\n\n\
    AI 项目的收益可能难以量化，但通常包括效率提升、准确性改善、决策优化以及劳动力成本降低。AI 项目的 `ROI` 可通过将净财务收益（如收入增加或成本降低）除以项目总成本，再乘以\
    \ 100 得出百分比。\n\n但如何计算潜在价值呢？我们来探讨一下。\n\n### 每次决策的价值\n\n通过估算 AI 项目每次决策的潜在影响，来计算每次决策的价值。\n\
    \n**示例 1：**\n\n再次以客户流失预测为例。如果我们成功预测某位客户即将流失，用户可采取相应措施挽留该客户。因此，单个客户带来的价值为 `X` 美元。\n\
    \n在此场景中，\n\n单次预测价值 = 单个客户产生的价值\n\n**示例 2：**\n\n在某些情况下，我们可能希望了解整体产生的价值，而非单次预测层面的价值。\n\
    \n每次预测的价值可通过将项目总价值除以决策次数来计算。\n\n综合考虑这些因素，您可以推导出 AI 项目的潜在价值，或计算每次决策的价值。\n\n请注意，实际价值可能因以下多种因素而异：\n\
    \n- **概率性或不确定性结果：** 由于预测具有概率性，并非每次预测都能带来 100% 的价值。\n- **错误成本：** 即模型产生错误所导致的成本。\n\
    \n因此，整体 `ROI` 的计算公式如下：\n\n`ROI = 回报 / 投资`\n\n其中 `回报 = 模型收益 – 预测不确定性`\n\n`投资 =\
    \ 资源 * 资源成本`\n\n请记住，从 AI 预测中推导出美元价值可能颇具挑战性，尤其是在收益并非直接体现为财务指标时。然而，通过明确问题、定义用例、识别成本与收益、计算\
    \ `ROI` 并传达价值，组织可以更清晰地了解 AI 系统的财务影响。\n\n## AI 预测的消费\n\nAI 生命周期的一个关键环节是确保业务能够消费\
    \ AI 预测。否则，价值将无法产生。因此，在规划阶段，理解业务将如何消费输出至关重要。以下是清晰理解这一点的步骤：\n\n1. **考虑置信水平：** AI\
    \ 模型通常会提供与预测相关的置信度或概率。在决定如何使用预测时，考虑这一置信水平非常重要。例如，如果置信水平较低，可能需要在采取行动前用其他数据或方法验证预测。\n\
    2. **确定合适的存储方案：** 根据 AI 预测的类型和用例，您可能需要使用不同的存储方案。例如，如果预测结果是图像或视频，可能适合使用 Blob 存储；而对于文本数据，API\
    \ 调用可能更合适。\n3. **设置存储方案：** 确定合适的存储方案后，您需要对其进行设置和适当配置。这可能涉及创建存储容器、配置访问策略和权限，或与其他系统集成。\n\
    4. **建立数据流：** 为了消费 AI 预测，您需要在 AI 模型和存储方案之间建立数据流。这可能涉及设置事件触发器、建立数据传输协议或配置 API 端点。\n\
    5. **确保数据安全：** 在处理敏感数据时，确保采取适当的安全措施至关重要。这可能涉及对传输中和静态数据进行加密、配置访问控制和权限，或与其他安全系统集成。\n\
    6. **识别用户群体：** 问题定义明确后，识别将使用 AI 预测的不同用户群体。这可能包括不同的部门、团队或个人。\n7. **了解用户需求：** 对于每个用户群体，了解他们使用\
    \ AI 预测的具体需求和条件至关重要。这包括了解他们需要做出哪些决策、需要访问哪些数据，以及需要何种详细程度和准确性。\n8. **提供培训和支持：**\
    \ 在向用户提供 AI 预测后，提供培训和支持以确保用户能够有效消费并依据预测采取行动至关重要。这可能涉及提供用户指南、培训课程或支持资源。\n9. **理解预测：**\
    \ 在消费 AI 预测之前，理解其含义及生成方式至关重要。这包括了解输入数据、所用算法、模型的准确性和局限性，以及建模过程中所做的任何假设。\n10. **确定如何使用预测：**\
    \ 理解预测后，确定如何利用它来做出决策或采取行动。这可能涉及将预测用作另一个系统的输入，或用于触发警报或通知。还应包括以下方面：\n    - **可解释性：**\
    \ 系统必须能够为其决策和建议提供清晰透明的解释，这有助于在利益相关者之间建立信任和理解。\n    - **可扩展性：** 系统必须能够处理大量数据，应对问题的复杂性，并适应不断变化的条件。\n\
    \    - **灵活性：** 系统应能处理不同类型的问题，并能在组织的不同领域使用。\n    - **集成性：** 系统应能与现有系统和流程集成，以确保工作流程顺畅高效。\n\
    \n通过遵循这些步骤，您可以识别 AI 预测的用户，并确保他们获得有效使用预测以支持决策和改善结果所需的信息和资源。\n\n## 总结\n\n在本章中，我们讨论了\
    \ AI 项目失败的潜在原因、决策智能在利用 AI 做出更好决策中的重要性，以及成功实施 AI 解决方案的指南。本章强调了在启动任何 AI 项目之前提出关键问题的必要性，并揭穿了围绕\
    \ AI 的一些迷思。我们还介绍了一个 DI 需求框架，涵盖了规划、方法、审批机制、KPI、潜在价值以及 AI 预测的消费，这些是 AI 项目的基础。\n\n\
    # 3. 决策智能方法论\n\n决策的概念及其类型是本章的主要议题。我们将从决策的定义开始，审视其不同形式。然后，通过一个示例来理解决策过程。接下来，我们将更详细地探讨人类历史上采用的决策方法演变，即*决策智能方法论*，及其优缺点。我们的讨论将以针对不同场景的决策智能方法建议作为结束。\n"
- fmt: '# Decision-Making


    To get to know the different decision intelligence methodologies, you have to
    understand what decision-making is.


    Decision-making can be defined as the mental process of choosing among different
    options, culminating in the selection of a belief or action. Thus, decision-making
    consists of two major components.


    * An objective function

    * Alternatives/options available to reach the objective


    The objective function is, in simple terms, the goal to achieve. Objectives can
    vary in complexity, from something as simple as selecting an outfit for a party
    to something as complex as finding a cure for cancer. The objective function typically
    has multiple ways to achieve it, known as *alternatives* or *options*, which must
    be evaluated to arrive at a decision. The decision-making process involves evaluating
    these alternatives to achieve the given objective. For example, when choosing
    an outfit for a party, a gentleman might have two options: a blue tuxedo and a
    black tuxedo. He might consider a variety of factors such as personal preference,
    what looks good, the theme of the party, etc., to make his decision, or he might
    randomly pick something without giving much thought to it. The thought process
    behind the decision can be complex or simple, and the decision-maker’s reasoning,
    whether rational or irrational, is an important part of the process and impacts
    the outcome.


    Decision-making can be classified in many ways, depending upon the factors taken
    into consideration such as single- and multiple-criterion decision-making, the
    number of people involved (individual and group decision-making), and the level
    of decision-making (strategic, tactical, and operational decision-making).


    ## Types of Decision-Making


    There are basically three types of decision-making. Let’s examine each in detail.


    ### Individual vs. Group Decision-Making


    As the name suggests, individual decision-making is something that is the responsibility
    of a single person. This type of decision-making is mostly seen in the personal
    lives of individuals wherein they are responsible for making their own life decisions.
    It is a type of problem-solving that is used to identify and choose a course of
    action from among several alternatives. In individual decision-making, the person
    is solely responsible for the outcome of the decision, and the decision is based
    on their own personal values, beliefs, and experiences.


    Group decision-making, on the other hand, refers to the process of making a decision
    with a group of individuals. This type of decision-making can be used in various
    settings, such as in the workplace, in government, or in social organizations.
    Group decision-making is a way of problem-solving that is used to identify and
    choose a course of action from among several alternatives. The group members work
    together to identify and evaluate the different options and then make a decision
    that is collectively agreed upon. Group decision-making can be more effective
    than individual decision-making because it allows for the sharing of diverse perspectives
    and ideas and can increase the likelihood of better decisions being made.


    ### Single- vs. Multiple-Criterion Decision-Making


    Single-criterion decision-making (SCDM) is a decision-making approach where only
    one criterion is used to evaluate alternatives. In this type, the decision-maker
    selects the alternative that maximizes the value of the chosen criterion. This
    approach is useful when the decision is based on a single objective, such as maximizing
    profit/revenue or minimizing cost/time. Examples of SCDM include choosing an apartment
    for rent based on the price or buying shoes based on the brand.


    Multiple-criterion decision-making (MCDM) is a decision-making approach where,
    unlike SCDM, multiple criteria are used to evaluate alternatives. This type of
    decision-making involves a trade-off between different criteria and often requires
    the decision-maker to assign weights to each criterion to reflect their relative
    importance. MCDM is useful when the decision involves multiple objectives, such
    as, for the previous example, choosing an apartment for rent not only based on
    the price but also based on location, size, view, distance to public transportation,
    etc.


    One of the main advantages of MCDM over SCDM is that it provides a more comprehensive
    evaluation of alternatives. In MCDM, decision-makers can consider a range of factors
    and evaluate trade-offs between them. Additionally, MCDM can help to ensure that
    other important criteria are not overlooked, which can happen in SCDM when only
    one criterion is used to make the decision and the rest of them are ignored. However,
    MCDM can also be more complex and time-consuming than SCDM, and it requires more
    information and analysis. Additionally, assigning weights to criteria can be difficult,
    and the results may be sensitive to the weights chosen.


    In summary, SCDM is appropriate when the decision is based on a single objective,
    while MCDM is more appropriate when the decision involves multiple objectives
    that need to be traded off against each other.


    ### Strategic, Tactical, and Operational Decision-Making


    Strategic, tactical, and operational decision-making is commonly observed in organizations.
    Figure [3-1](#602259_1_En_3_Chapter.xhtml#Fig1) is a high-level overview of the
    decision-making process under strategic, tactical, and operational conditions.
    It explains what questions these types of decision-making answer, their execution
    time frame, and their frequency. Let’s look at each one of them in detail.


    ![](images/602259_1_En_3_Chapter/602259_1_En_3_Fig1_HTML.jpg)


    A pyramid of strategic, tactical, and operational decision-making. The Strategic
    consists of where and why, long-term, and non-routines. The tactical consists
    of what and when, medium-term, and majorly routines. The operational consists
    of how, short terms, and routines.


    **Figure 3-1** Strategic, tactical, and operational decision-making


    Strategic decision-making is the process of determining the long-term goals and
    objectives of an individual/organization and the actions needed to achieve them.
    In an organizational setting, these types of decisions are usually made by top-level
    management and typically involve significant investments and changes to the organization’s
    overall strategy and structure. Hence, they usually are nonroutine decisions.
    These types of decisions are usually slow moving, and changes happen over a long
    period of time.


    Tactical decision-making involves the implementation and execution of medium-term
    plans and objectives. In an organizational setting, these types of decisions are
    usually formulated by middle-level management. These types of decisions often
    involve the management of day-to-day operations and the allocation of resources
    to achieve medium-term goals that align with the organization’s overall strategy.
    These types of decisions are a mix of routine and nonroutine tasks and move faster
    than the strategic ones but are slower than that of the operational ones and are
    planned for medium to long term.


    Operational decision-making is the process of making decisions related to the
    day-to-day management and operations of an individual/organization. These decisions
    are usually made by front-line managers and employees and include scheduling,
    production, and other activities that are necessary to maintain the smooth functioning
    of the organization. These types of decisions are the fastest moving ones and
    are planned for the short term and involve routine tasks.'
