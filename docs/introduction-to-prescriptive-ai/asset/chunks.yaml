- fmt: '# Decision-Making Methodologies


    Humans have evolved over the years, and along with them, the way they make the
    decisions has also seen lots of changes. From making decisions as an individual
    randomly to group decision-makers who are rational to combining random and process-oriented
    and individual and group decision-makers, the decision-making process has been
    constantly increasing in its complexity.


    The decision-making methodologies can be broadly divided into three major categories,
    human-only, human-machine, and machine-only, as shown in Figure [3-4](#602259_1_En_3_Chapter.xhtml#Fig4).


    ![](images/602259_1_En_3_Chapter/602259_1_En_3_Fig4_HTML.jpg)


    An illustration has 3 components. The humans only decisions include random choices,
    experience-based, authority-based, consensus-based, and threshold. The machine
    and human decisions include A I based, probabilistic, and mathematical models,
    and instruction. Both decisions go to autonomous systems.


    **Figure 3-4** Decision-making methodologies


    This type of categorization is purely based on the share of decision-making between
    humans and machines.


    Let’s take a closer look at decision-making methodologies in detail.


    ## Human-Only Decision-Making


    Human-only decision-making refers to the process of making choices or decisions
    solely on the judgment of human beings, without the involvement of artificial
    intelligence, machine learning, or any automated decision-making systems.


    Before the advent of machines (from the abacus to computers and AI robots), humans
    have been making decisions either individually or in a group for personal, social,
    or organizational needs. The type of decisions that humans make vary depending
    upon the situation at hand, criticality of the decision, mental state of the people
    making the decision etc., ranging from totally random to outcome based to a more
    systematic complex decision-making.


    The history of human decision-making can be traced back to the earliest civilizations,
    where decisions were made by leaders, elders, or individuals in positions of authority.
    Over time, the development of democratic institutions, laws, and norms has led
    to an increased emphasis on individual autonomy and the ability of individuals
    to make decisions for themselves.


    Let’s further evaluate the different types of human-only decision-making techniques.


    ### Random Decisions


    Random decision-making refers to the process of selecting an option or making
    a choice randomly, rather than relying on reasoning, intuition, or personal preference.
    This type of decision-making technique comes naturally to us and has been used
    in situations where the stakes are not high, there is an urgency to decide, there
    is no historical data to support the decision-making process, or all or any combination
    of these situations. Examples of random decision-making are flipping a coin or
    rolling a die.


    Here are the advantages of random decisions:


    - **Removes confirmation bias:** By relying on chance instead of personal preference,
    random decision-making can help to remove personal bias and increase objectivity.

    - **Increases creativity:** Random selection can lead to unexpected and creative
    solutions.

    - **Enhances exploration:** By forcing individuals to consider options they may
    not have otherwise considered, random decision-making can encourage exploration
    and increase the chances of discovering new and innovative solutions.


    These are the disadvantages:


    - **Lack of control:** Random decision-making leaves little room for control or
    direction, which can lead to suboptimal or even negative outcomes.

    - **Inefficient:** It can be time-consuming to generate enough random outcomes
    to make an informed decision.

    - **Unpredictable:** The outcomes of random decision-making can be unpredictable
    and difficult to control, leading to a lack of confidence in the decision-making
    process.


    ### Morality/Ethics Based


    Ethics-based or moral-based decision-making refers to the process of making choices
    and taking actions that align with a set of moral or ethical principles and values.
    The outcomes of these type of decisions may or may not be favorable to the decision-maker;
    however, they are of the highest ethics. The opposite of this is unethical decision-making.
    The decision-maker deliberately makes a decision that is not ethical and is most
    of the time favorable to them. There are several types of ethics-based decision-making,
    including the following:


    - **Utilitarianism:** This is a theory of morality that advocates actions that
    foster happiness or pleasure and oppose actions that cause unhappiness or harm.
    An example of utilitarianism would be to choose playing with your kid over completing
    an office report, as you find more happiness in spending time with your kid.

    - **Deontology:** This approach focuses on following a set of moral duties and
    obligations, regardless of the outcomes. A classic example of deontology would
    be “Don’t lie. Don’t steal. Don’t cheat.”

    - **Virtue ethics:** This approach emphasizes the character and habits of the
    decision-maker, rather than rules or consequences, in determining the morality
    of a decision. An example of virtue ethics can be a customer going back to a store
    to settle the payment for an item that was unintentionally left unpaid or notifying
    the cashier if they issued a refund for an amount greater than what was owed.


    Here are the advantages:


    - **Consistency:** By following a set of ethical principles, individuals can make
    decisions that are consistent with their values and beliefs.

    - **Increased trust:** Ethical decision-making can increase trust in organizations
    and relationships, as individuals perceive decisions as fair and just.

    - **Personal fulfillment:** Making decisions that align with personal values and
    beliefs can lead to a sense of personal fulfillment and satisfaction.


    Here are the disadvantages:


    - **Subjectivity:** Ethics and morality can be subjective and open to interpretation,
    leading to disagreements and conflicts about the correct course of action.

    - **Time-consuming:** Making decisions based on ethics can be time-consuming and
    require extensive research and consideration.

    - **Potential for negative consequences:** Ethics-based decision-making may prioritize
    moral principles over practical considerations, leading to decisions with negative
    outcomes.'
  raw: '## Decision-Making Methodologies


    Humans have evolved over the years, and along with them, the way they make the
    decisions has also seen lots of changes. From making decisions as an individual
    randomly to group decision-makers who are rational to combining random and process-oriented
    and individual and group decision-makers, the decision-making process has been
    constantly increasing in its complexity.


    The decision-making methodologies can be broadly divided into three major categories,
    human-only, human-machine, and machine-only, as shown in Figure [3-4](#602259_1_En_3_Chapter.xhtml#Fig4).


    ![](images/602259_1_En_3_Chapter/602259_1_En_3_Fig4_HTML.jpg)


    An illustration has 3 components. The humans only decisions include random choices,
    experience-based, authority-based, consensus-based, and threshold. The machine
    and human decisions include A I based, probabilistic, and mathematical models,
    and instruction. Both decisions go to autonomous systems.


    Figure 3-4


    Decision-making methodologies


    This type of categorization is purely based on the share of decision-making between
    humans and machines.


    Let’s take a closer look at decision-making methodologies in detail.


    ### Human-Only Decision-Making


    Human-only decision-making refers to the process of making choices or decisions
    solely on the judgment of human beings, without the involvement of artificial
    intelligence, machine learning, or any automated decision-making systems.


    Before the advent of machines (from the abacus to computers and AI robots), humans
    have been making decisions either individually or in a group for personal, social,
    or organizational needs. The type of decisions that humans make vary depending
    upon the situation at hand, criticality of the decision, mental state of the people
    making the decision etc., ranging from totally random to outcome based to a more
    systematic complex decision-making.


    The history of human decision-making can be traced back to the earliest civilizations,
    where decisions were made by leaders, elders, or individuals in positions of authority.
    Over time, the development of democratic institutions, laws, and norms has led
    to an increased emphasis on individual autonomy and the ability of individuals
    to make decisions for themselves.


    Let’s further evaluate the different types of human-only decision-making techniques.


    #### Random Decisions


    Random decision-making refers to the process of selecting an option or making
    a choice randomly, rather than relying on reasoning, intuition, or personal preference.
    This type of decision-making technique comes naturally to us and has been used
    in situations where the stakes are not high, there is an urgency to decide, there
    is no historical data to support the decision-making process, or all or any combination
    of these situations. Examples of random decision-making are flipping a coin or
    rolling a die.


    Here are the advantages of random decisions:


    *   **Removes confirmation bias:** By relying on chance instead of personal preference,
    random decision-making can help to remove personal bias and increase objectivity.


    *   **Increases creativity:** Random selection can lead to unexpected and creative
    solutions.


    *   **Enhances exploration:** By forcing individuals to consider options they
    may not have otherwise considered, random decision-making can encourage exploration
    and increase the chances of discovering new and innovative solutions.


    These are the disadvantages:


    *   **Lack of control:** Random decision-making leaves little room for control
    or direction, which can lead to suboptimal or even negative outcomes.


    *   **Inefficient:** It can be time-consuming to generate enough random outcomes
    to make an informed decision.


    *   **Unpredictable:** The outcomes of random decision-making can be unpredictable
    and difficult to control, leading to a lack of confidence in the decision-making
    process.


    #### Morality/Ethics Based


    Ethics-based or moral-based decision-making refers to the process of making choices
    and taking actions that align with a set of moral or ethical principles and values.
    The outcomes of these type of decisions may or may not be favorable to the decision-maker;
    however, they are of the highest ethics. The opposite of this is unethical decision-making.
    The decision-maker deliberately makes a decision that is not ethical and is most
    of the time favorable to them. There are several types of ethics-based decision-making,
    including the following:


    *   **Utilitarianism****:** This is a theory of morality that advocates actions
    that foster happiness or pleasure and oppose actions that cause unhappiness or
    harm. An example of utilitarianism would be to choose playing with your kid over
    completing an office report, as you find more happiness in spending time with
    your kid.


    *   **Deontology****:** This approach focuses on following a set of moral duties
    and obligations, regardless of the outcomes. A classic example of deontology would
    be “Don’t lie. Don’t steal. Don’t cheat.”


    *   **Virtue ethics****:** This approach emphasizes the character and habits of
    the decision-maker, rather than rules or consequences, in determining the morality
    of a decision. An example of virtue ethics can be a customer going back to a store
    to settle the payment for an item that was unintentionally left unpaid or notifying
    the cashier if they issued a refund for an amount greater than what was owed.


    Here are the advantages:


    *   **Consistency:** By following a set of ethical principles, individuals can
    make decisions that are consistent with their values and beliefs.


    *   **Increased trust:** Ethical decision-making can increase trust in organizations
    and relationships, as individuals perceive decisions as fair and just.


    *   **Personal fulfillment:** Making decisions that align with personal values
    and beliefs can lead to a sense of personal fulfillment and satisfaction.


    Here are the disadvantages:


    *   **Subjectivity:** Ethics and morality can be subjective and open to interpretation,
    leading to disagreements and conflicts about the correct course of action.


    *   **Time-consuming:** Making decisions based on ethics can be time-consuming
    and require extensive research and consideration.


    *   **Potential for negative consequences:** Ethics-based decision-making may
    prioritize moral principles over practical considerations, leading to decisions
    with negative outcomes.'
