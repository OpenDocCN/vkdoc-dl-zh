- fmt: '**Competitive advantage:** Successfully predicting and mitigating customer
    churn can set the company apart from its competitors. By delivering exceptional
    customer experiences and satisfying customer demands, it can establish a devoted
    customer base and stand out in the marketplace.


    ### Dataset Details


    The dataset on customer churn pertains to a hypothetical telecom business that
    operated in California during the third quarter and encompasses information on
    7,043 customers who had either churned, retained, or acquired the company’s services.
    The dataset further features various crucial demographic variables for each customer.


    #### Demographics


    - **CustomerID:** A unique ID that identifies each customer.

    - **Gender:** The customer’s gender: Male, Female.

    - **Senior Citizen:** Indicates if the customer is 65 or older: Yes, No.

    - **Partner:** Indicates if the customer has a partner: Yes, No.

    - **Dependents:** Indicates if the customer lives with any dependents: Yes, No.
    Dependents could be children, parents, grandparents, etc.


    #### Services


    - **Tenure in Months:** Indicates the total number of months that the customer
    has been with the company by the end of the quarter.

    - **Phone Service:** Indicates if the customer subscribes to home phone service
    with the company: Yes, No.

    - **Multiple Lines:** Indicates if the customer subscribes to multiple telephone
    lines with the company: Yes, No.

    - **Internet Service:** Indicates if the customer subscribes to Internet service
    with the company: No, DSL, Fiber Optic, Cable.

    - **Online Security:** Indicates if the customer subscribes to an additional online
    security service provided by the company: Yes, No.

    - **Online Backup:** Indicates if the customer subscribes to an additional online
    backup service provided by the company: Yes, No.

    - **Device Protection Plan:** Indicates if the customer subscribes to an additional
    device protection plan for their Internet equipment provided by the company: Yes,
    No.

    - **Premium Tech Support:** Indicates if the customer subscribes to an additional
    technical support plan from the company with reduced wait times: Yes, No.

    - **Streaming TV:** Indicates if the customer uses their Internet service to stream
    television programming from a third party provider: Yes, No. The company does
    not charge an additional fee for this service.

    - **Streaming Movies:** Indicates if the customer uses their Internet service
