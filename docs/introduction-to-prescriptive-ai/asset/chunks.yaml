    Fairness metrics such as disparate impact, equal opportunity difference, false
    positive rate parity, equalized odds, and calibration are used to assess whether
    an AI model is treating different groups of individuals fairly, and the choice
    of metrics depends on the specific context and goals. Disparate impact is one
    such measure of fairness that examines whether the AI model’s outcomes have a
    disproportionate impact on particular groups based on protected characteristics,
    and its formula is used to calculate the disparate impact ratio for two groups
    being compared.


    Let’s calculate the disparate impact value for the `Gender` and `SeniorCitizen`
    columns in our dataset.


    ```

    [In]:

