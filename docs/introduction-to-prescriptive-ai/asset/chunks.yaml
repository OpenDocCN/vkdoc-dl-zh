  trans: '

    # 工作流程


    让我们了解确保决策智能（DI）输出被正确纳入业务工作流程并克服先前挑战所涉及的步骤。


    1. **清晰定义业务问题：** 在启动 DI 流程之前，清晰定义你试图解决的业务问题至关重要。这将帮助你识别相关数据源，并开发与业务目标一致的机器学习模型。


    2. **让关键利益相关者参与：** 让关键利益相关者（包括业务用户、数据科学家和 IT 专业人员）参与 DI 流程。这将有助于确保 DI 输出与业务需求保持一致，并能集成到现有的业务工作流程中。


    3. **集成：** 开发易于集成到现有业务工作流程中的用户友好型界面。这可能涉及开发可从业务应用程序内部调用的 API，或将模型集成到现有业务流程中。业务工作流程可能存在于
    CRM、营销应用程序、应用等之中。


    4. **确保数据质量：** 确保 DI 流程中使用的数据准确、完整且相关。这可能需要进行数据清洗、标准化和转换。


    5. **监控性能：** 监控 DI 流程的性能，并评估其对业务成果的影响。这将帮助你识别需要改进的领域，并进行必要的调整。


    6. **提供培训和支持：** 为业务用户提供关于如何在日常工作中使用 DI 输出的培训和支持。这将有助于确保 DI 输出被正确纳入业务工作流程，并使组织能够从
    DI 流程中获得最大价值。


    如图 5-1 所示，组织可以确保 DI 输出被正确纳入业务工作流程，从而带来更好的决策、改进的运营和竞争优势。


    ![](img/602259_1_En_5_Fig1_HTML.jpg)


    决策智能的工作流程示意图。客户、订单及其他数据流经准备阶段，然后进入 AI 或 ML 预测流失环节，最终流向 CRM 营销应用程序 UI。


    图 5-1


    工作流程


    # 决策智能应用


    企业利用预测的方式之一是通过应用程序。因此，让我们探讨如何构建/集成带有 DI 的应用程序，以及这为何重要。


    通过应用程序集成 DI 框架涉及开发能够利用 DI 流程所生成洞察的应用程序。以下是集成 DI 时需要考虑的一些步骤：


    1. **定义业务问题：** 清晰定义你试图通过 DI 解决的业务问题。这将帮助你识别相关数据源，并确定要使用的适当机器学习模型。


    2. **开发 DI 流程：** 开发 DI 流程以生成与业务问题相关的洞察。这可能涉及数据清洗、特征工程、模型训练和验证。


    3. **开发应用程序：** 开发一个能够利用 DI 流程所生成洞察的应用程序。这可能涉及开发可从应用程序内部调用的 API，或将模型集成到应用程序的功能中。


    4. **测试与验证：** 测试并验证应用程序，确保其按预期工作。这可能涉及单元测试、集成测试和用户验收测试。


    5. **部署应用程序：** 将应用程序部署到生产环境，以便业务用户使用。这可能涉及与 IT 专业人员合作，确保应用程序安全、可扩展且可靠。


    6. **监控性能：** 监控应用程序和 DI 流程的性能，以识别需要改进的领域，并进行必要的调整。


    ## 如何做及为何做？


    开发一个集成 DI 的应用程序涉及创建一个利用 DI 流程所生成洞察的软件应用。以下是关于如何以及为何为 DI 开发应用程序的一些细节：


    1. **识别用例：** 第一步是识别应用程序的用例。你试图通过 DI 解决什么业务问题？你需要生成哪些洞察来解决这个问题？一旦你清楚理解了用例，就可以确定应用程序所需的功能。


    2. **定义用户界面：** 下一步是定义应用程序的用户界面。这涉及识别用户角色，并设计一个易于使用和理解的界面。该界面应以清晰直观的方式向用户提供 DI
    流程生成的洞察。


    3. **开发应用程序功能：** 定义用户界面后，下一步是开发应用程序的功能。这可能涉及开发可从应用程序内部调用的 API，以访问 DI 流程生成的洞察。也可能涉及将机器学习模型集成到应用程序的功能中，以便根据用户输入生成预测或建议。


    4. **测试与验证应用程序：** 应用程序开发完成后，对其进行测试和验证以确保其按预期工作至关重要。这可能涉及单元测试、集成测试和用户验收测试。测试阶段有助于识别在应用程序部署前需要解决的任何错误或问题。


    5. **部署应用程序：** 应用程序经过测试和验证后，即可部署到生产环境。这可能涉及与 IT 专业人员合作，确保应用程序安全、可扩展且可靠。


    通过开发集成 DI 的应用程序，组织可以为业务用户提供便捷访问 DI 流程所生成洞察的途径。该应用程序有助于简化工作流程、改进决策并推动业务价值。然而，确保应用程序用户友好、可靠且安全至关重要，以最大限度地提高采用率，并确保组织能够从
    DI 流程中获得最大价值。

    '
- fmt: '### User-Friendly Interfaces


    Designing user-friendly interfaces is essential when integrating decision intelligence
    outputs into business workflows. Because the users are nontechnical, it’s important
    to develop interfaces that are easy to use and take actions.


    Here are some reasons why a user-friendly interface matters:


    - **Facilitates adoption:** User-friendly interfaces make it easier for business
    users to adopt and use the `DI` outputs in their daily work. If the interfaces
    are difficult to use, it may discourage adoption, which could undermine the effectiveness
    of the `DI` process.

    - **Enhances usability:** User-friendly interfaces enhance the usability of the
    `DI` outputs. By making the interfaces easy to use and understand, business users
    can quickly access the insights they need and make better decisions.

    - **Improves productivity:** User-friendly interfaces can improve productivity
    by reducing the time and effort required to access the `DI` outputs. This can
    help to streamline business workflows, increase efficiency, and reduce costs.

    - **Supports collaboration:** User-friendly interfaces can support collaboration
    between business users and data scientists. By providing a common interface for
    accessing `DI` outputs, business users and data scientists can work together more
    effectively and share insights more easily.

    - **Increases engagement:** User-friendly interfaces can increase engagement with
    the `DI` outputs. By providing a visually appealing and intuitive interface, business
    users are more likely to engage with the insights provided by the `DI` process.


    In summary, designing user-friendly interfaces is critical when integrating `DI`
    outputs into business workflows. It can facilitate adoption, enhance usability,
    improve productivity, support collaboration, and increase engagement. By prioritizing
    user experience, organizations can maximize the value derived from the `DI` process
    and achieve better business outcomes.


    ## Augmenting AI Predictions to Business Workflow


    Connecting `AI` predictions to business tools involves integrating the `AI` system
    with existing business systems, such as enterprise resource planning (`ERP`) systems,
    customer relationship management (`CRM`) systems, and business intelligence (`BI`)
    tools. Here are the technical steps to connect `AI` predictions to business tools:


    1. **Collect and process data:** Collect and process data required for the `AI`
    model to make predictions. This data can be sourced from internal business systems
    or external sources.

    2. **Build and train the AI model:** Develop the `AI` model that will generate
    predictions based on the data. Train the model using historical data to ensure
    accurate predictions.

    3. **Deploy the AI model:** Deploy the trained `AI` model to an environment where
    it can be accessed by business tools. This can be done using application programming
    interfaces (`APIs`), web services, or other integration tools.

    4. **Connect to business tools:** Connect the `AI` model to the relevant business
    tools, such as `ERP` systems, `CRM` systems, or `BI` tools. This can be done through
    `APIs`, custom integrations, or prebuilt connectors.

    5. **Test and validate:** Test the integration to ensure that `AI` predictions
    are properly integrated into the business tools. Validate that the predictions
    align with the business goals and objectives.

    6. **Monitor and maintain:** Monitor the `AI` system to ensure that it continues
    to provide accurate predictions. Maintenance and updates may be required to address
    changes in the business environment or to improve the accuracy of the predictions.


    As shown in Figure [5-2](#602259_1_En_5_Chapter.xhtml#Fig2), in summary, connecting
    `AI` predictions to business tools involves data collection and processing, building
    and training an `AI` model, deploying the model, connecting to business tools,
    testing and validating the integration, and ongoing monitoring and maintenance.
    By following these technical steps, organizations can ensure that `AI` predictions
    are effectively integrated into their business processes and support informed
    decision-making.


    ![](images/602259_1_En_5_Chapter/602259_1_En_5_Fig2_HTML.jpg)


    A workflow of augmenting `AI` predictions to business decision intelligence. The
    customers and orders and other data flow to prepare then to `AI` or `ML` predict
    churn, `CRM` marketing applications `UI`, and finally to business tools consists
    of `CRM`, `ERP`, `API`, `BI`, apps, and marketing tools.


    **Figure 5-2** Augmenting predictions with business tools


    ### Connect to Business Tools


    Connecting `AI` predictions to business tools means connecting the `AI` model
    to the relevant business tools, such as `ERP` systems, `CRM` systems, or `BI`
    tools. This step is crucial because it enables the `AI` model to share its predictions
    with other systems that are critical to business operations.


    Connecting the `AI` model to business tools involves integrating the `AI` model
    with the business tool’s `API`. `APIs` provide a standard interface for different
    systems to communicate with each other, enabling data to be exchanged seamlessly
    between systems. The integration process typically involves the following steps:


    1. **Identify the appropriate API:** Determine which `API` the business tool supports
    and what data format it uses.

    2. **Define the data requirements:** Identify the specific data that the business
    tool requires to make use of the `AI` model’s predictions.

    3. **Map the data:** Map the data produced by the `AI` model to the data required
    by the business tool. This may involve data transformation or conversion to ensure
    that the data is compatible.

    4. **Test the integration:** Test the integration to ensure that data is being
    transferred correctly and that the business tool can use the `AI` model’s predictions
    effectively.


    There are several methods for connecting `AI` models to business tools, including
    custom integration, prebuilt connectors, and third-party integration platforms.
    The choice of method depends on the specific requirements of the organization
    and the systems being integrated.


    In summary, connecting `AI` predictions to business tools involves integrating
    the `AI` model with the business tool’s `API`, mapping data between the two systems,
    and testing the integration to ensure that it works effectively. By connecting
    `AI` models to business tools, organizations can leverage `AI` predictions to
    support informed decision-making and improve business outcomes.'
