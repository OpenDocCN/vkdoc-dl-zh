    # 排版后的内容


    - **制定有针对性的营销活动：** 金融机构将利用模型的预测结果，制定有针对性的营销活动，向经常在已识别零售商处购物的客户推广新信用卡。该活动可能包括个性化优惠、定向广告和激励措施，以鼓励客户申请新信用卡。金融机构可以使用数据分析工具，根据已识别客户的购物行为、人口统计数据和信用记录对其进行细分，从而针对其特定需求定制活动信息和优惠。


    - **监控活动效果：** 金融机构将通过收集和分析客户数据（如响应率、转化率以及新信用卡产品产生的收入）来监控营销活动的效果。利用这些数据，机构可以优化活动信息、改进活动定位，并优化其决策流程。


    - **持续更新模型：** 随着新数据的出现，金融机构将持续更新预测模型，以提高其准确性和有效性。这可能涉及整合新的数据源，例如客户反馈、社交媒体数据或外部经济指标。机构还可能调整模型算法、调整不同变量的权重，或使用集成建模技术来提升模型性能。


    - **评估业务影响：** 金融机构将通过收集和分析数据（如产生的收入、客户满意度和留存率）来评估新信用卡产品对业务的影响。利用这些数据，机构可以调整策略、优化模型，并优化其决策流程，以最大化业务绩效。


    通过利用决策智能，基于预测模型的预测结果制定有针对性的营销活动，金融机构可以最大化其营销工作的效果，并提高新信用卡产品的成功几率。通过持续更新模型并评估其对业务的影响，机构可以进一步优化其决策流程并提升整体绩效。


    ## 决策智能的一些潜在优缺点


    以下是决策智能的一些优点：


    - **改进决策：** 决策智能可以通过提供数据驱动的洞察来帮助企业做出更好的决策，而这些洞察是使用传统决策方法难以获得的。


    - **提高效率：** 决策智能可以自动化某些决策流程，从而为企业节省时间和金钱。


    - **增强准确性：** 决策智能算法可以分析大量数据并识别人类可能无法看到的模式，从而带来更准确的预测和更好的决策。


    - **定制化：** 决策智能可以根据企业的特定需求进行定制，从而实现更个性化的决策方法。


    - **改进风险管理：** 决策智能可以通过分析数据和预测潜在结果来帮助企业识别和减轻风险。


    - **可扩展性：** 决策智能可以扩展以处理大量数据和决策任务，而这些任务手动完成可能非常困难或不可能。


    - **实时决策：** 决策智能可以提供实时洞察和决策，这在时间紧迫的情况下至关重要。


    - **竞争优势：** 决策智能可以通过使企业比竞争对手更快地做出更好的决策，从而为其提供竞争优势。


    - **持续改进：** 决策智能算法可以随着时间的推移不断学习和改进，使企业能够优化其决策流程并保持领先地位。


    - **成本效益：** 从长远来看，与传统决策方法相比，决策智能可能更具成本效益，尤其是在处理大量数据时。


    以下是决策智能的一些缺点：


    - **数据质量问题：** 决策智能严重依赖于其所用数据的质量，如果数据不准确或不完整，则可能导致有缺陷的决策。


    - **隐私问题：** 决策智能通常涉及收集和分析大量数据，这可能会引起客户和利益相关者的隐私担忧。


    - **偏见：** 如果决策智能算法在有偏见的数据上训练，或者算法本身存在偏见，则可能产生偏见。


    - **过度依赖技术：** 决策智能可能导致对技术的过度依赖，从而缺乏人工输入和监督。


    - **复杂性：** 决策智能可能复杂且难以理解，这可能会使企业难以有效实施和使用。


    - **技术专长：** 实施决策智能需要一些企业可能缺乏的技术专长和资源。


    - **伦理问题：** 决策智能引发了与隐私、偏见和透明度相关的伦理问题，企业必须解决这些问题以确保合乎伦理的决策。


    - **对数据的依赖：** 决策智能依赖于拥有足够的数据来做出明智的决策，而数据可能并非总是可用。


    - **集成挑战：** 将决策智能集成到现有决策流程中可能具有挑战性，并且需要付出巨大努力。


    - **采用障碍：** 由于对变革的抵制或对其潜在好处的缺乏理解，决策智能的采用可能面临障碍。


    ## 公司利用决策智能的示例


    很难估计成功实施决策智能的公司数量，因为决策智能的采用仍然相对较新，并且因行业和组织而异。然而，有几个成功实施决策智能并看到显著收益的公司示例。以下是一些例子：


    - **第一资本：** 金融服务公司第一资本已实施决策智能来改进其信用决策流程。通过将机器学习模型与人类专业知识相结合，第一资本能够提高信用决策的准确性并降低违约风险。


    - **波音：** 航空航天公司波音已实施决策智能来优化其飞机维护流程。通过分析飞机发动机传感器数据，波音可以预测何时需要维护并主动安排维修，从而减少停机时间并提高安全性。


    - **宝洁：** 消费品公司宝洁已实施决策智能来改进其供应链运营。通过分析库存、生产和物流数据，宝洁可以优化其供应链以降低成本并改善交货时间。


    - **UPS：** 物流公司 UPS 已实施决策智能来优化其包裹递送流程。通过使用机器学习模型预测包裹需求并优化递送路线，UPS 能够减少燃料消耗、降低成本并改善递送时间。


    虽然这些只是几个例子，但它们展示了决策智能在改进决策和推动业务价值方面的潜力。随着决策智能采用的持续增长，我们可以期待看到更多公司实施决策智能并实现其收益。


    ## 结论


    你现在了解了规范性 AI 是什么、它的历史、工作原理、方法论、应用以及优缺点。在接下来的章节中，我们将深入探讨这些方面的每一个，同时构建一个端到端的决策智能解决方案。

    '
- fmt: '# 2. Decision Intelligence Requirements


    Lots of AI projects will fail across industries because AI projects can be complex
    and challenging, and many potential factors can contribute to their failure. Some
    of the reasons for failure are lack of clear goals, data quality issues, and difficulty
    integrating the AI system into existing processes. Additionally, there can be
    organizational challenges such as a lack of support or buy-in from stakeholders,
    unrealistic expectations, and a lack of understanding of the capabilities and
    limitations of AI.


    In this chapter, we are going to discuss how we might reduce the failures by planning,
    having clear requirements, and understanding the DI requirements framework.


    ## Why Do AI Projects Fail?


    AI projects can fail for a variety of reasons, including lack of clearly defined
    goals, lack of data or poor-quality data, lack of expertise or resources, and
    difficulty in integrating the AI system into existing processes or systems. Additionally,
    ethical considerations, such as bias in the data or the algorithms themselves,
    can contribute to the failure of an AI project.


    Decision intelligence (DI) is a field that combines artificial intelligence (AI)
    and decision-making techniques to help organizations make better decisions. Decision
    intelligence requirements refer to the specific needs and criteria that must be
    met for a DI system to be effective and valuable to an organization.


    Let’s take a step back and understand some of the questions we need to ask before
    we start any AI projects.


    - “Can AI perform better than the current processes?”

    - “Is the data good for the AI models?”

    - “Are the goals/objectives clearly defined for an AI project?”

    - “Is this AI project creating any value?”

    - “Did we select the right key performance indicators to measure the value of
    the AI projects?”

    - “Are AI results being consumed (through taking action)?”

    - “Are business users getting benefits from AI predictions?”


    These are some of the myths surrounding AI:


    - **Myth 1:** The right data scientists and the right algorithms create the perfect
    AI.

    - **Myth 2:** To win at AI, you need a lot of data, and you need the best algorithms.

    - **Myth 3:** The more accurate the AI model, the better it is.

    - **Myth 4:** AI pilots work in one region/domain, and the same AI models work
    in enterprise rollout.

    - **Myth 5:** If the AI model works today, it works forever.


    In answer to the previous questions and to overcome these myths, a DI requirements
    framework is essential. A framework acts as a bible to AI projects because it
    contains every detail about the project, from the ideation phase to the operationalize
    phase.


    To deliver value through AI, it’s important to follow some of the guidelines/paths
    that can help ensure the successful implementation and adoption of decision intelligence
    solutions.


    - **Clearly define the problem:** Before implementing any AI and decision intelligence
    solution, it’s important to have a clear understanding of the problem that needs
    to be solved. This means identifying the stakeholders, their needs and requirements,
    the scope of the problem, and the expected outcomes.

    - **Gather and analyze data:** AI solutions rely heavily on data. Therefore, it’s
    important to collect and analyze the required data to ensure that the solution
    is based on accurate and reliable information.

    - **Identify decision-making criteria:** AI should be designed to support decision-making
    by providing criteria for evaluating alternatives. These criteria should be based
    on the problem definition, stakeholder requirements, and relevant data.

    - **Choose the appropriate decision-making method:** Different decision-making
    methods can be used depending on the problem and the available data. It’s important
    to choose the appropriate method that will provide the best outcome based on the
    available information. This will be discussed in detail in Chapter [3](#602259_1_En_3_Chapter.xhtml).

    - **Build the AI model:** Once the criteria and method have been identified, a
    model can be built. The model should be transparent, interpretable, and user-friendly.

    - **Validate the model:** The AI model should be validated to ensure that it’s
    accurate and reliable. This can be done through testing, simulation, and real-time
    analysis.

    - **Implement the solution:** After the model has been validated, the solution
    can be implemented. It’s important to ensure that the solution is integrated with
    existing systems and that stakeholders are trained and supported to use the solution
    effectively.

    - **Monitor and evaluate the solution:** AI solutions should be continuously monitored
    and evaluated to ensure that they are delivering the expected value. This can
    be done through regular performance checks and feedback from stakeholders.


    Keeping all these guidelines in mind, let’s build a *DI requirements framework*
    that will act as a handbook to build requirement documents before even starting
    a project.


    ## DI Requirements Framework


    To make AI projects successful, building fancy machine learning and deep learning
    models and deploying them won’t do the trick. That’s just the tip of the iceberg.
    The real effort needs to be put into planning, defining clear objectives, building
    the approach framework, and evaluating the potential value that could be generated
    from these projects, as shown in Figure [2-1](#602259_1_En_2_Chapter.xhtml#Fig1).


    ![](images/602259_1_En_2_Chapter/602259_1_En_2_Fig1_HTML.jpg)


    An illustration of a submerged iceberg depicts the hidden steps in the AI life
    cycle. These are build ML or DL models, data cleaning, deployments, planning or
    objectives, approach framework, KPI and formulas, potential value, and decision
    making.


    **Figure 2-1** Hidden steps in the AI life cycle


    So, let’s discuss a framework in detail. The first step is proper planning.'
