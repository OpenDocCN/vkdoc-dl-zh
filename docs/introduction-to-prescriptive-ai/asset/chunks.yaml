    and our colleagues who were always there in tough times and motivated us to chase
    our dreams.


    ## About the Authors About the Technical Reviewer


    # 1. Decision Intelligence Overview


    *Prescriptive AI* is a type of artificial intelligence that is designed to provide
    recommendations, solutions, or actions to optimize or improve a specific process
    or outcome. It is unlike descriptive AI, which describes “what” has happened in
    the past/present; inferential/diagnostic AI, which helps us understand “why” something
    has happened; and predictive AI, which helps predict what might happen in the
    future. Once we have the predictions, prescriptive AI focuses on what actions
    should be taken to achieve a particular goal or outcome.


    Prescriptive AI can be used in a variety of applications, such as in healthcare
    to help doctors diagnose diseases and prescribe treatments, in finance to make
    investment decisions, and in manufacturing to optimize production processes. It
    typically uses machine learning algorithms and other advanced technologies to
    analyze large datasets and generate recommendations based on the data.


    Overall, the goal of prescriptive AI is to help humans make better decisions by
    providing them with accurate and actionable insights based on data-driven analysis.


    As mentioned, prescriptive AI systems differ from descriptive and predictive AI
    systems in that they not only provide insights and predictions based on data analysis
    but also offer specific recommendations or actions. Prescriptive AI goes a step
    further by suggesting optimal solutions and strategies to achieve desired outcomes.


    In this chapter, we will start with the types of AI and then deep dive into prescriptive
    AI and decision intelligence.'
