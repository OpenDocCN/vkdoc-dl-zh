    \ lack of expertise, or difficulty integrating the AI system into existing processes.\
    \ Addressing these risks early on can help to mitigate them and ensure the project’s\
    \ success.\n\n*   **Build the right team:** Assemble a team with the right mix\
    \ of skills, including data scientists, engineers, and domain experts. This will\
    \ help to ensure that the project is executed effectively and that the AI system\
    \ is tailored to the specific needs of the organization.\n\n*   **Manage expectations:**\
    \ Planning helps to manage expectations by clearly communicating the project’s\
    \ goals, objectives, timeline, and budget to stakeholders. This helps to ensure\
    \ that everyone is on the same page and that the project is delivered as expected.\n\
    \n*   **Identify and address ethical considerations:** Planning allows teams to\
    \ identify and address ethical considerations, such as the potential for bias\
    \ in the data or the algorithms, that may impact the project.\n\n*   **Understand\
    \ the data:** Make sure you have access to the necessary data and that it is of\
    \ high quality. Understand how the data is collected, how it is stored, and how\
    \ it can be used to train and operate the AI system.\n\n*   **Measure the results:**\
    \ Plan and define the right KPIs and metrics to measure the results of the AI\
    \ project. This will help to determine the system’s effectiveness and avoid confusion\
    \ later.\n\n*   **Communicate the value:** Communicate the value of the AI project\
    \ to stakeholders, both inside and outside of the organization. This will help\
    \ to build support and ensure that the project is seen as a success.\n\nOverall,\
    \ planning is important for AI projects because it helps to ensure that the project\
    \ is well-defined, is well-organized, and has a clear path to success.\n\n## Approach\n\
    \nApproaching an AI project requires careful consideration of several key factors\
    \ including the type of problem being addressed, the available data, the computing\
    \ resources available, and the deployment requirements. Here are some general\
    \ guidelines for approaching an AI project:\n\n*   **Model type:** Depending on\
    \ the problem you are trying to solve, choose an appropriate machine learning\
    \ or deep learning model. There are many different models to choose from, such\
    \ as neural network–based models, decision trees, and support vector machines.\
    \ Your choice of model will depend on the specific problem you are trying to solve,\
    \ as well as the amount and quality of your data.\n    *   **Classification:**\
    \ Use classification when you have labeled data and want to predict a categorical\
    \ outcome. This is often used in scenarios where you want to identify which class\
    \ or category a new data point belongs to. For example, you might use classification\
    \ to predict whether a customer will buy a product or not based on their demographic\
    \ information.\n\n*   **Regression:** Use regression when you have labeled data\
    \ and want to predict a continuous outcome. This is often used in scenarios where\
    \ you want to predict a numerical value, such as the price of a house or the amount\
    \ of rainfall in a particular region. Regression models are useful when you want\
    \ to make predictions that are not limited to a discrete set of values.\n\n* \
    \  **Unsupervised learning:** Use unsupervised learning when you have unlabeled\
    \ data and want to identify patterns or groupings in the data. This is often used\
    \ in scenarios where you want to discover hidden relationships or structures in\
    \ your data, without having any prior knowledge about what you are looking for.\
    \ Clustering is a common unsupervised learning technique that can be used to group\
    \ similar data points based on their features.\n\nIt is also important to consider\
    \ the size and quality of your data when deciding between these different types\
    \ of learning. If you have a small dataset with limited features, you may want\
    \ to use a simpler model like logistic regression or k-nearest neighbors. On the\
    \ other hand, if you have a large dataset with complex features, you may want\
    \ to use a more sophisticated model like a deep neural network.\n\nUltimately,\
    \ the choice of learning algorithm will depend on the specifics of your project\
    \ and your data.\n\n*   **Framework:** Select a framework for your AI project\
    \ based on your choice of model. There are many popular frameworks available for\
    \ building machine learning and deep learning models, including TensorFlow, PyTorch,\
    \ and Scikit-learn. Choose a framework that is well-suited to your model and that\
    \ has the necessary features and functionality you need.\n\n*   **Deployment details:**\
    \ Deploying an AI model is an important part of the overall project and should\
    \ be planned ahead of time to ensure that the model can be integrated smoothly\
    \ into a production environment. Here are some steps you can take to plan the\
    \ deployment of your AI model:\n    *   **Identify the deployment requirements:**\
    \ Begin by identifying the requirements for deploying your model in a production\
    \ environment. Consider factors such as the hardware and software infrastructure\
    \ needed to run the model, the data inputs and outputs, and any security or compliance\
    \ considerations.\n\n*   **Select a deployment strategy:** Once you have identified\
    \ the deployment requirements, choose a deployment strategy that is appropriate\
    \ for your model and project goals. Some common strategies include deploying the\
    \ model as a web service, integrating it into an existing application, or deploying\
    \ it to an edge device.\n\n*   **Choose a deployment platform:** Depending on\
    \ your deployment strategy, choose a deployment platform that is well-suited to\
    \ your model and project goals. There are many platforms available for deploying\
    \ AI models, including cloud platforms such as AWS, Azure, and Google Cloud, as\
    \ well as edge devices such as the Raspberry Pi and Nvidia Jetson.\n\nWith a proper\
    \ approach before even implementation, we can ensure that the AI projects will\
    \ deliver value over the long term and don’t end up as toy projects."
  trans: "\n# 规划\n\n规划是任何人工智能项目的关键环节，它有助于确保项目定义明确、组织有序，并拥有清晰的成功路径。以下是规划对人工智能项目至关重要的具体原因：\n\
    \n-   **明确问题：** 首先明确人工智能能够帮助解决或应对的具体问题或机遇。这可能涉及从改善客户服务、自动化重复性任务到识别新的收入来源等各个方面。许多人工智能项目是在原本没有问题的情况下，强行将人工智能塞入业务流程中。\n\
    \n-   **定义项目目标与目的：** 规划有助于确保项目拥有清晰、可衡量且可实现的目标与目的。这能指导人工智能系统的开发，并确保其与组织的整体战略保持一致。\n\
    \n-   **识别并应对潜在风险：** 规划使团队能够识别并评估可能影响项目的潜在风险，例如数据不足、缺乏专业知识，或难以将人工智能系统集成到现有流程中。尽早应对这些风险有助于减轻其影响，确保项目成功。\n\
    \n-   **组建合适的团队：** 组建一支拥有数据科学家、工程师和领域专家等多元化技能的团队。这将有助于确保项目有效执行，并使人工智能系统能够针对组织的特定需求进行定制。\n\
    \n-   **管理期望：** 规划通过向利益相关者清晰传达项目的目标、目的、时间表和预算来管理期望。这有助于确保各方达成共识，并确保项目按预期交付。\n\n\
    -   **识别并应对伦理考量：** 规划使团队能够识别并应对可能影响项目的伦理考量，例如数据或算法中潜在的偏见。\n\n-   **理解数据：** 确保你能获取必要的数据，并且这些数据质量较高。了解数据是如何收集、存储的，以及如何用于训练和运行人工智能系统。\n\
    \n-   **衡量结果：** 规划并定义合适的 KPI 和指标来衡量人工智能项目的结果。这将有助于确定系统的有效性，并避免日后产生混淆。\n\n-   **传达价值：**\
    \ 向组织内外的利益相关者传达人工智能项目的价值。这将有助于获得支持，并确保项目被视为成功。\n\n总体而言，规划对人工智能项目至关重要，因为它有助于确保项目定义明确、组织有序，并拥有清晰的成功路径。\n\
    \n# 方法\n\n着手一个人工智能项目需要仔细考虑几个关键因素，包括要解决的问题类型、可用数据、可用计算资源以及部署要求。以下是着手人工智能项目的一些通用指南：\n\
    \n-   **模型类型：** 根据你要解决的问题，选择合适的机器学习或深度学习模型。有许多不同的模型可供选择，例如基于神经网络的模型、决策树和支持向量机。你对模型的选择将取决于你要解决的具体问题，以及数据的数量和质量。\n\
    \    -   **分类：** 当你拥有带标签的数据并希望预测分类结果时，使用分类方法。这通常用于需要判断新数据点属于哪个类别或分类的场景。例如，你可以使用分类方法根据客户的个人信息预测他们是否会购买产品。\n\
    \n-   **回归：** 当你拥有带标签的数据并希望预测连续结果时，使用回归方法。这通常用于需要预测数值的场景，例如房屋价格或特定地区的降雨量。当你需要做出不限于离散值集合的预测时，回归模型非常有用。\n\
    \n-   **无监督学习：** 当你拥有未标记的数据并希望识别数据中的模式或分组时，使用无监督学习。这通常用于在没有任何先验知识的情况下，发现数据中隐藏的关系或结构。聚类是一种常见的无监督学习技术，可以根据特征将相似的数据点分组。\n\
    \n在决定使用这些不同类型的学习方法时，考虑数据的大小和质量也很重要。如果你的数据集较小且特征有限，你可能希望使用像逻辑回归或 K 近邻这样的简单模型。另一方面，如果你有包含复杂特征的大型数据集，你可能希望使用像深度神经网络这样更复杂的模型。\n\
    \n最终，学习算法的选择将取决于你的项目和数据的具体情况。\n\n-   **框架：** 根据你选择的模型，为你的 AI 项目选择一个框架。有许多流行的框架可用于构建机器学习和深度学习模型，包括\
    \ `TensorFlow`、`PyTorch` 和 `Scikit-learn`。选择一个适合你的模型，并具备所需特性和功能的框架。\n\n-   **部署细节：**\
    \ 部署 AI 模型是整个项目的重要组成部分，应提前规划，以确保模型能够顺利集成到生产环境中。以下是规划 AI 模型部署的一些步骤：\n    -   **明确部署要求：**\
    \ 首先明确在生产环境中部署模型的要求。考虑因素包括运行模型所需的硬件和软件基础设施、数据输入和输出，以及任何安全或合规性考量。\n\n-   **选择部署策略：**\
    \ 一旦明确了部署要求，选择适合你的模型和项目目标的部署策略。一些常见策略包括将模型部署为 Web 服务、将其集成到现有应用程序中，或将其部署到边缘设备上。\n\
    \n-   **选择部署平台：** 根据你的部署策略，选择一个适合你的模型和项目目标的部署平台。有许多可用于部署 AI 模型的平台，包括云平台如 `AWS`、`Azure`\
    \ 和 `Google Cloud`，以及边缘设备如 `Raspberry Pi` 和 `Nvidia Jetson`。\n\n通过在实施之前采取恰当的方法，我们可以确保人工智能项目能够长期交付价值，而不会最终沦为玩具项目。\n"
- fmt: '# Approval Mechanism/Organization Alignment


    Establishing an approval mechanism for AI projects is an important step to ensure
    that the projects are aligned with organizational goals and values. Here are some
    steps to follow to establish an approval mechanism for AI projects:


    1. **Identify stakeholders:** Start by identifying the stakeholders who should
    be involved in the approval process. This may include executive leadership, legal
    counsel, data privacy and security experts, and representatives from affected
    business units.


    2. **Establish evaluation criteria:** Define the criteria that will be used to
    evaluate AI projects. This may include factors such as data quality, the potential
    impact on stakeholders, the value generated, and alignment with organizational
    goals.


    3. **Develop an approval process:** Create a formal approval process that outlines
    the steps and stakeholders involved in the decision-making process. This may include
    submitting a project proposal, evaluating the proposal against the established
    criteria, and making a final decision.


    4. **Implement a review board:** Establish a review board that is responsible
    for reviewing and approving or rejecting AI projects. The review board should
    include representation from the identified stakeholders and be responsible for
    ensuring that the project meets the established evaluation criteria.


    5. **Conduct a risk assessment:** Before approving an AI project, conduct a thorough
    risk assessment to identify potential risks and develop mitigation strategies.
    This may involve assessing the potential impact on stakeholders, identifying potential
    biases in the data, and evaluating the accuracy and reliability of the AI model.


    By establishing an approval mechanism for AI projects, you can ensure that AI
    projects are evaluated responsibly and ethically and that they align with organizational
    goals and values.


    # Key Performance Indicators


    Measuring the results of an AI project is crucial for understanding its effectiveness
    and identifying areas for improvement. By using clear metrics, collecting and
    analyzing data, comparing data to baselines, identifying areas for improvement,
    and communicating the results, organizations can ensure that the AI system is
    aligned with the project’s goals and objectives and continues to generate value
    over time.


    ## Define Clear Metrics


    Define clear and specific metrics that will be used to measure the results of
    the AI project. These metrics should align with the project’s goals and objectives
    and be easy to understand and communicate.


    Some examples of metrics that can be used to measure the results of an AI project
    include accurate churn rate for churn prediction model, customer satisfaction
    score, average delivery time for route optimization algorithm, ROI, etc.


    Collecting the right key performance indicators (KPIs) is an important step in
    measuring the results of an AI project. KPIs are specific metrics that are used
    to measure the performance of a system or process, and they help to provide a
    clear and objective way to measure the results of an AI project.


    When selecting KPIs for an AI project, it’s important to ensure that they align
    with the project’s goals and objectives and that they are easy to understand and
    communicate. It’s also important to consider the data that will be required to
    measure the KPIs and make sure that the data is available and of high quality.


    It’s crucial to do the following:


    - Track business KPI performance against benchmarks over time.

    - Analyze business KPIs versus model KPIs for insights into how model performance
    is affecting the bottom line.

    - Calculate realized value (in dollars) and the ROI.


    Obtaining business KPIs from stakeholders is an important step in measuring the
    results of an AI project. Here are a few steps for getting these KPIs from stakeholders:


    1. **Identify the stakeholders:** Identify the key stakeholders in the organization,
    including those who will be affected by the AI project, those who will be using
    the system, and those who will be responsible for its implementation and maintenance.


    2. **Communicate the goals and objectives:** Clearly communicate the goals and
    objectives of the AI project to stakeholders. This will help to ensure that everyone
    is on the same page and that the project is aligned with the organization’s overall
    strategy.


    3. **Involve stakeholders in the planning process:** Involve stakeholders in the
    planning process, such as identifying the problem, understanding the data, and
    defining the use case. This will help to ensure that the project is tailored to
    the specific needs of the organization and that stakeholders are invested in its
    success.


    4. **Identify the KPIs:** Work with stakeholders to identify the specific KPIs
    that will be used to measure the results of the AI project. This will help to
    ensure that the KPIs align with the project’s goals and objectives and are relevant
    to the stakeholders.


    5. **Communicate the process:** Communicate the process for collecting and analyzing
    data, as well as the schedule for measuring the results. This will help to ensure
    that stakeholders understand the process and can provide the necessary data and
    support.


    6. **Measure the KPIs:** Measure the KPIs for AI projects as planned once models
    are in production and perform impact analysis based on controllable factors. Evaluate
    if AI is truly adding value and helping to make appropriate decisions.


    7. **Keep stakeholders informed:** Keep stakeholders informed of the results of
    the AI project, including the performance of the system, areas for improvement,
    and any changes that have been made.


    By following these strategies, organizations can obtain the necessary business
    KPIs from stakeholders and ensure that the AI project is aligned with the organization’s
    goals and objectives.


    # Value


    One of the biggest challenges that organizations face is to quantify the benefits
    of their AI initiatives. Value realization involves effort, and until one knows
    what benefits they are getting through their AI initiatives, they cannot improve
    them. No wonder most of the AI use cases fail to get any adoption at all due to
    the complexities in realizing the business value of the use cases.


    As shown in Figure [2-2](#602259_1_En_2_Chapter.xhtml#Fig2), processing data,
    building models with good accuracy, and deploying the models seems easier than
    tracking and realizing the value of AI. It seems difficult because we have come
    from a value standpoint when building AI projects and have never tracked the KPIs
    and return on investment.


    ![](images/602259_1_En_2_Chapter/602259_1_En_2_Fig2_HTML.jpg)


    A stacked Venn diagram from inner to outer circle includes data, model accuracy,
    deployment, M L Ops, business K P I, and value. A vertical double-headed arrow
    on the left is labeled hard to build and easy to build, respectively. Another
    arrow on the right is labeled large impact and small impact.


    Figure 2-2


    Data to value


    Let’s discuss what return on investment is and how to calculate it for an AI project.'
