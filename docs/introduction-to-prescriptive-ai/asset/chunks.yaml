    ## DI Requirements Framework


    To make AI projects successful, building fancy machine learning and deep learning
    models and deploying them won’t do the trick. That’s just the tip of the iceberg.
    The real effort needs to be put into planning, defining clear objectives, building
    the approach framework, and evaluating the potential value that could be generated
    from these projects, as shown in Figure [2-1](#602259_1_En_2_Chapter.xhtml#Fig1).


    ![](images/602259_1_En_2_Chapter/602259_1_En_2_Fig1_HTML.jpg)


    An illustration of a submerged iceberg depicts the hidden steps in the A I life
    cycle. These are build M L or D L models, data cleaning, deployments, planning
