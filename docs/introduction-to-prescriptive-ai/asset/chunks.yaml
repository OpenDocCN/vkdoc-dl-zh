    ## 引言


    本书将向您介绍决策智能的概念，包括其历史、现状及未来趋势。它将帮助您评估不同的决策智能技术，并指导您如何通过不同的规范性 AI 方法应用这些技术，以及如何通过特定领域的用例实现将其融入业务流程。


    本书面向数据科学家、AI/机器学习工程师以及深度学习专业人士，他们致力于构建先进的智能 AI/ML 应用。同时，本书也适合希望了解决策智能如何助力业务增长的业务专业人士和非技术利益相关者。


    本书将带您了解企业决策过程中的关键里程碑、关键统计数据及其收益。它将阐明决策智能在 AI 生命周期中的定位。本书将提供见解，说明如何借助业务需求文档为规范性
    AI（决策智能的关键要求）做好准备。随后，将深入探讨不同的决策智能方法论、它们的优势及局限性。接下来，您将学习如何执行不同的模拟并解读其结果。然后，您将获得指导，了解如何通过规范性
    AI 将决策智能流程启用并嵌入到业务工作流中。您将了解人类常犯的各种认知偏差，以及如何通过机器与人类智能的结合来减少或消除这些偏差。最后，您将通过量身定制的用例，了解不同领域的案例研究。


    到本书结束时，您将对决策智能和规范性 AI 工具与技术有扎实的理解，并知道如何将它们融入业务流程，以提高生产力和企业利润。


    本书的源代码可在 GitHub 上获取（[`github.com/apress/introduction-prescriptive-ai`](https://github.com/apress/introduction-prescriptive-ai)）。


    ## 致谢


    我们要感谢我们的家人，他们始终确保我们在家中拥有合适的环境，以便专注于本书并按时完成。我们还要感谢出版团队——Mark Powers 和 Celestin
    Suresh John，以及我们的技术审稿人 Nitin Sharma——他们帮助我们确保本书达到最佳状态。我们还要感谢我们的导师，他们始终支持我们的梦想，并引导我们实现目标，确保我们在职业和个人方面不断成长。最后但同样重要的是，我们感谢我们的父母、朋友和同事，他们在困难时期始终陪伴在我们身边，激励我们追逐梦想。


    ## 关于作者 关于技术审稿人


    # 1. 决策智能概述


    *规范性 AI*是一种旨在提供建议、解决方案或行动，以优化或改善特定流程或结果的人工智能。它不同于描述性 AI（描述过去/现在“发生了什么”）、推断性/诊断性
    AI（帮助我们理解“为什么”会发生某事）以及预测性 AI（帮助预测未来可能发生什么）。一旦我们有了预测，规范性 AI 便专注于应采取哪些行动来实现特定目标或结果。


    规范性 AI 可用于多种应用，例如在医疗领域帮助医生诊断疾病和制定治疗方案，在金融领域做出投资决策，以及在制造业优化生产流程。它通常使用机器学习算法和其他先进技术来分析大型数据集，并基于数据生成建议。


    总体而言，规范性 AI 的目标是通过提供基于数据驱动分析的准确且可操作的见解，帮助人类做出更好的决策。


    如前所述，规范性 AI 系统与描述性和预测性 AI 系统的不同之处在于，它们不仅基于数据分析提供见解和预测，还提供具体的建议或行动。规范性 AI 更进一步，通过建议实现预期结果的最佳解决方案和策略。


    在本章中，我们将从 AI 的类型开始，然后深入探讨规范性 AI 和决策智能。'
- fmt: '# Types of AI


    Descriptive, diagnostic, predictive, and prescriptive AI are four different types
    of artificial intelligence that are used in various applications. Here’s an overview
    of each:


    - **Descriptive AI:** Descriptive AI, also known as *descriptive analytics*, is
    used to describe what has happened in the past or is currently happening. It involves
    analyzing historical data to identify patterns, trends, and insights. Descriptive
    AI is often used for reporting and business intelligence applications, such as
    dashboards and scorecards that summarize key performance metrics. It can also
    be used for exploratory data analysis to uncover hidden insights and correlations.


    For example, a retail company may use descriptive AI to analyze its sales data
    and identify which products are selling the most, which stores are performing
    the best, and which customers are buying the most. This information can then be
    used to make data-driven decisions on inventory management, pricing strategies,
    and marketing campaigns.


    - **Diagnostic AI:** Diagnostic AI, also known as *diagnostic analytics*, is used
    to identify the root cause of a problem or issue. It involves analyzing data to
    identify factors that contribute to a specific outcome or event. Diagnostic AI
    is often used in healthcare, finance, and manufacturing applications.


    For example, a hospital may use diagnostic AI to analyze patient data and identify
    the factors that contribute to re-admissions. This could involve analyzing patient
    demographics, medical histories, and treatment plans to identify common risk factors
    and develop targeted interventions to reduce re-admissions.


    - **Predictive AI:** Predictive AI, also known as *predictive analytics*, is used
    to predict what is likely to happen in the future. It involves using statistical
    modeling and machine learning techniques to analyze historical data and make predictions
    about future outcomes. Predictive AI is often used in marketing, finance, and
    customer service applications.


    For example, a bank may use predictive AI to analyze customer data and predict
    which customers are most likely to default on their loans. This information can
    then be used to proactively reach out to those customers and offer them personalized
    loan modification options to avoid default.


    - **Prescriptive AI:** Prescriptive AI, also known as *prescriptive analytics*,
    is used to provide recommendations on what actions to take based on the predictions
    made by predictive AI. It involves using optimization algorithms to identify the
    best course of action based on a set of constraints and objectives. Prescriptive
    AI is often used in supply chain management, logistics, and resource-planning
    applications.


    For example, a logistics company may use prescriptive AI to optimize its delivery
    routes based on real-time traffic data, weather conditions, and delivery deadlines.
    This information can then be used to automatically reroute delivery trucks to
    avoid traffic jams and ensure on-time delivery.


    In summary, as shown in Figure [1-1](#602259_1_En_1_Chapter.xhtml#Fig1), descriptive
    AI is used to describe what has happened, diagnostic AI is used to identify the
    root cause of a problem, predictive AI is used to predict what is likely to happen,
    and prescriptive AI is used to recommend what actions to take based on those predictions.
    Each type of AI has different applications and can be used to solve different
    types of problems.


    ![](images/602259_1_En_1_Chapter/602259_1_En_1_Fig1_HTML.jpg)


    An illustration of the types of AI. The types are descriptive analytics, diagnostic
    analytics, predictive analytics, and prescriptive analytics from information to
    optimization with hindsight, insight, and foresight.


    **Figure 1-1** Types of AI


    Prescriptive AI typically involves analyzing large amounts of data using machine
    learning algorithms to identify patterns and relationships between variables.
    It then uses this analysis to provide recommendations or decisions that can optimize
    business processes, improve customer experiences, or achieve other desired outcomes.


    Examples of prescriptive AI applications include personalized medicine, where
    AI systems provide doctors with recommendations for personalized treatments based
    on a patient’s genetic and medical history, and supply chain management, where
    AI systems optimize logistics and inventory management to minimize costs and improve
    efficiency.


    We try to achieve preceptive AI through decision intelligence.


    ## Decision Intelligence


    *Decision intelligence* (DI) is a discipline that combines techniques from artificial
    intelligence, decision theory, and behavioral science to support and improve human
    decision-making. It aims to provide a more structured and rigorous approach to
    decision-making by using data and analytics to help people make better decisions.
    It involves using a combination of human expertise and machine intelligence to
    make better decisions in complex and uncertain situations.


    DI involves a variety of techniques, including machine learning, optimization,
    simulation, and behavioral science, to provide decision-makers with insights and
    recommendations. It typically involves collecting and analyzing data from various
    sources, identifying decision criteria, and generating possible alternatives based
    on various constraints and objectives.


    The ultimate goal of DI is to enable organizations and individuals to make better
    decisions that are more aligned with their goals, values, and preferences. This
    can lead to improved efficiency, effectiveness, and competitiveness in a wide
    range of domains, including business, healthcare, government, and education.


    ## Decision Intelligence History


    Decision intelligence has its roots in a variety of fields, including decision
    theory, game theory, and operations research. Let us understand a brief history
    of DI.


    - **Decision theory:** Decision theory is a field of study that has been around
    for more than a century. In the early 1900s, economists and mathematicians began
    to develop formal models for decision-making, which included elements such as
    utility theory and expected value. These models provided a framework for understanding
    how decisions are made and how outcomes can be optimized.


    - **Operations research:** Operations research (OR) emerged during World War II
    as a way to solve military logistics problems. OR involves using mathematical
    and statistical methods to analyze complex systems and make decisions. OR has
    been applied to a wide range of industries, including manufacturing, transportation,
    and healthcare.


    - **Game theory:** Game theory is a branch of mathematics that studies how people
    interact in strategic situations. It was developed in the mid-20th century by
    mathematicians such as John Nash and John von Neumann and has been used to study
    decision-making in fields such as economics, political science, and psychology.


    - **Business analytics:** In recent years, with the rise of big data and data
    analytics, decision-making has become increasingly data-driven. Business analytics
    involves using data to inform decision-making and has been used to optimize processes,
    improve customer experiences, and drive revenue growth.


    - **Decision intelligence:** DI emerged in the early 2000s as a way to integrate
    the various disciplines involved in decision-making, including decision theory,
    game theory, and analytics. DI involves using a range of tools and techniques
    to support decision-making, including machine learning, optimization, and simulation.'
