    decisions that are more aligned with their goals, values, and preferences. This
    can lead to improved efficiency, effectiveness, and competitiveness in a wide
    range of domains, including business, healthcare, government, and education.


    ## Decision Intelligence History


    Decision intelligence has its roots in a variety of fields, including decision
    theory, game theory, and operations research. Let us understand a brief history
    of DI.


    *   **Decision theory:** Decision theory is a field of study that has been around
    for more than a century. In the early 1900s, economists and mathematicians began
    to develop formal models for decision-making, which included elements such as
    utility theory and expected value. These models provided a framework for understanding
    how decisions are made and how outcomes can be optimized.


    *   **Operations research:** Operations research (OR) emerged during World War
    II as a way to solve military logistics problems. OR involves using mathematical
    and statistical methods to analyze complex systems and make decisions. OR has
    been applied to a wide range of industries, including manufacturing, transportation,
    and healthcare.


    *   **Game theory:** Game theory is a branch of mathematics that studies how people
    interact in strategic situations. It was developed in the mid-20th century by
    mathematicians such as John Nash and John von Neumann and has been used to study
    decision-making in fields such as economics, political science, and psychology.


    *   **Business analytics****:** In recent years, with the rise of big data and
    data analytics, decision-making has become increasingly data-driven. Business
    analytics involves using data to inform decision-making and has been used to optimize
    processes, improve customer experiences, and drive revenue growth.


    *   **Decision intelligence:** DI emerged in the early 2000s as a way to integrate
    the various disciplines involved in decision-making, including decision theory,
    game theory, and analytics. DI involves using a range of tools and techniques
    to support decision-making, including machine learning, optimization, and simulation.'
  trans: '

    # 人工智能的类型


    描述型、诊断型、预测型和规定型人工智能是四种不同类型的人工智能，应用于各种场景。以下是每种类型的概述：


    - **描述型人工智能：** 描述型人工智能，也称为*描述性分析*，用于描述过去或当前正在发生的事情。它涉及分析历史数据以识别模式、趋势和洞察。描述型人工智能常用于报告和商业智能应用，例如汇总关键绩效指标的仪表盘和计分卡。它也可用于探索性数据分析，以发现隐藏的洞察和相关性。


    例如，一家零售公司可能使用描述型人工智能来分析其销售数据，识别哪些产品销量最高、哪些门店业绩最佳、哪些客户购买最多。这些信息随后可用于在库存管理、定价策略和营销活动方面做出数据驱动的决策。


    - **诊断型人工智能：** 诊断型人工智能，也称为*诊断性分析*，用于识别问题或事件的根本原因。它涉及分析数据以确定导致特定结果或事件的因素。诊断型人工智能常用于医疗、金融和制造应用。


    例如，一家医院可能使用诊断型人工智能来分析患者数据，并识别导致再入院的因素。这可能涉及分析患者人口统计数据、病史和治疗方案，以识别常见的风险因素，并制定有针对性的干预措施来减少再入院率。


    - **预测型人工智能：** 预测型人工智能，也称为*预测性分析*，用于预测未来可能发生的事情。它涉及使用统计建模和机器学习技术来分析历史数据，并对未来结果做出预测。预测型人工智能常用于营销、金融和客户服务应用。


    例如，一家银行可能使用预测型人工智能来分析客户数据，并预测哪些客户最有可能贷款违约。这些信息随后可用于主动联系这些客户，为他们提供个性化的贷款修改方案以避免违约。


    - **规定型人工智能：** 规定型人工智能，也称为*规定性分析*，用于根据预测型人工智能做出的预测，提供关于应采取何种行动的建议。它涉及使用优化算法，基于一组约束条件和目标来确定最佳行动方案。规定型人工智能常用于供应链管理、物流和资源规划应用。


    例如，一家物流公司可能使用规定型人工智能，根据实时交通数据、天气状况和交付截止时间来优化其配送路线。这些信息随后可用于自动重新规划送货卡车的路线，以避免交通拥堵并确保准时交付。


    总之，如图 1-1 所示，描述型人工智能用于描述已发生的事情，诊断型人工智能用于识别问题的根本原因，预测型人工智能用于预测可能发生的事情，规定型人工智能用于根据这些预测建议应采取的行动。每种类型的人工智能都有不同的应用，可用于解决不同类型的问题。


    ![](img/602259_1_En_1_Fig1_HTML.jpg)


    人工智能类型示意图。这些类型从信息到优化，涵盖事后洞察、实时洞察和事前洞察，分别是描述性分析、诊断性分析、预测性分析和规定性分析。


    **图 1-1** 人工智能的类型


    规定型人工智能通常涉及使用机器学习算法分析大量数据，以识别变量之间的模式和关系。然后，它利用这种分析提供建议或决策，以优化业务流程、改善客户体验或实现其他期望的结果。


    规定型人工智能应用的例子包括个性化医疗（AI 系统根据患者的基因和病史为医生提供个性化治疗建议）和供应链管理（AI 系统优化物流和库存管理以降低成本并提高效率）。


    我们试图通过决策智能来实现感知型人工智能。


    ## 决策智能


    *决策智能*（DI）是一门结合了人工智能、决策理论和行为科学技术的学科，旨在支持和改进人类决策。它旨在通过使用数据和数据分析来帮助人们做出更好的决策，从而为决策提供更结构化和严谨的方法。它涉及结合人类专业知识和机器智能，在复杂和不确定的情况下做出更好的决策。


    决策智能涉及多种技术，包括机器学习、优化、模拟和行为科学，为决策者提供洞察和建议。它通常涉及从各种来源收集和分析数据，识别决策标准，并根据各种约束条件和目标生成可能的备选方案。


    决策智能的最终目标是使组织和个人能够做出更符合其目标、价值观和偏好的更好决策。这可以在商业、医疗、政府和教育等广泛领域带来效率、效益和竞争力的提升。


    ## 决策智能发展史


    决策智能源于多个领域，包括决策理论、博弈论和运筹学。让我们了解一下决策智能的简要历史。


    - **决策理论：** 决策理论是一个已有超过一个世纪历史的研究领域。在 20 世纪初，经济学家和数学家开始为决策制定正式的模型，其中包括效用理论和期望值等要素。这些模型为理解如何做出决策以及如何优化结果提供了框架。


    - **运筹学：** 运筹学（OR）在第二次世界大战期间作为解决军事后勤问题的一种方法而出现。运筹学涉及使用数学和统计方法来分析复杂系统并做出决策。运筹学已应用于广泛的行业，包括制造业、交通运输和医疗保健。


    - **博弈论：** 博弈论是数学的一个分支，研究人们在战略情境中如何互动。它由约翰·纳什和约翰·冯·诺伊曼等数学家在 20 世纪中期发展起来，并已被用于研究经济学、政治学和心理学等领域的决策。


    - **商业分析：** 近年来，随着大数据和数据分析的兴起，决策越来越以数据为驱动。商业分析涉及使用数据为决策提供信息，并已被用于优化流程、改善客户体验和推动收入增长。


    - **决策智能：** 决策智能在 21 世纪初出现，旨在整合决策所涉及的各个学科，包括决策理论、博弈论和分析学。决策智能涉及使用一系列工具和技术来支持决策，包括机器学习、优化和模拟。

    '
- fmt: '# Challenges in AI Adoption


    There are several challenges that businesses face when adopting AI technology.
    These are some of the key challenges:


    - **Data quality and availability:** AI systems rely heavily on data, so poor
    data quality and a lack of available data can hinder the effectiveness of the
    system.

    - **Technical expertise:** Implementing/maintaining AI systems often requires
    specialized technical expertise, which may not be readily available within the
    business.

    - **Cost:** AI systems can be expensive to implement and maintain, especially
    if the business does not have the necessary infrastructure in place.

    - **Resistance to change:** There may be resistance to change from employees who
    are used to working with traditional systems and processes.

    - **Ethical considerations:** AI systems can raise ethical concerns related to
    privacy, bias, and transparency, which must be addressed to ensure ethical decision-making.

    - **Integration with existing systems:** Integrating AI with existing systems
    can be challenging, particularly if those systems are outdated or incompatible
    with the new technology.

    - **Regulation and compliance:** AI systems may need to comply with regulations
    such as `GDPR` or `HIPAA`, which can add an extra layer of complexity to their
    implementation.

    - **Lack of understanding:** There may be a lack of understanding among business
    leaders and employees about the potential benefits and limitations of AI technology,
    which can hinder adoption.


    To overcome these challenges, businesses need to carefully evaluate the potential
    benefits and risks of AI adoption, identify the necessary resources and expertise
    required, and develop a comprehensive plan for implementing and integrating the
    technology into their existing systems and processes. They also need to prioritize
    ethical considerations and work closely with employees to ensure that they are
    comfortable and confident using the new technology.


    # How Can DI Help Bridge the Gap Between AI and Business?


    One of the challenges with AI is that it can be difficult to understand how it
    arrives at its decisions. DI can help by providing insights into how AI models
    work, allowing business users to understand and interpret the decisions that are
    being made.


    - **Integration:** DI can help integrate AI technology into existing business
    processes and workflows, making it easier for business users to take advantage
    of AI capabilities without having to learn complex new systems.

    - **Customization:** DI can be customized to fit the specific needs of a business,
    allowing for a more personalized approach to decision-making that takes into account
    the unique challenges and opportunities facing the organization.

    - **Risk management:** DI can help identify and mitigate risks associated with
    AI technology, such as bias, privacy concerns, and data quality issues, ensuring
    that the benefits of AI are realized while minimizing the risks.

    - **Transparency:** DI can help improve transparency in decision-making by providing
    clear and understandable explanations of the decisions being made, helping to
    build trust and confidence in AI technology among business users and stakeholders.


    By leveraging the power of AI in a way that is tailored to the specific needs
    of businesses, DI can help bridge the gap between AI and business, enabling organizations
    to take advantage of the benefits of AI technology while minimizing the risks
    and ensuring that decisions are made in a way that is transparent, ethical, and
    effective.


    # The Need for Decision Intelligence


    There are several reasons why DI is becoming increasingly important in today’s
    world.


    - **Information overload:** With the explosion of data and information, decision-makers
    are often overwhelmed with too much information, making it difficult to make informed
    decisions. DI can help cut through the noise by analyzing and synthesizing relevant
    data into actionable insights.

    - **Complex and uncertain environments:** Many decisions today are made in complex
    and uncertain environments, where there are multiple factors and variables to
    consider. DI can help decision-makers better understand the interdependencies
    and trade-offs between different options and provide recommendations based on
    probabilistic modeling and simulation.

    - **Cognitive biases:** Human decision-making is often subject to cognitive biases,
    such as overconfidence, anchoring, and confirmation bias. DI can help mitigate
    these biases by providing a more objective and data-driven approach to decision-making.

    - **Competitive advantage:** In today’s competitive environment, organizations
    that can make better decisions faster are more likely to succeed. DI can provide
    a competitive advantage by enabling organizations to make better decisions based
    on data-driven insights.

    - **Improved decision quality:** DI can help decision-makers make better, more
    informed decisions by providing insights and recommendations based on data and
    analytics. This can lead to improved outcomes and increased efficiency.

    - **Risk management:** Many decisions involve some level of risk. DI can help
    decision-makers understand and manage this risk by providing probabilistic assessments
    and scenario analysis.

    - **Agility and flexibility:** In today’s fast-paced and rapidly changing environment,
    organizations need to be agile and flexible in their decision-making. DI can help
    organizations respond quickly and effectively to changing circumstances by providing
    real-time data and insights.

    - **Transparency and accountability:** DI can help ensure that decisions are transparent
    and accountable by providing a clear audit trail and documentation of the decision-making
    process.

    - **Personalization:** DI can help personalize decisions based on individual preferences
    and goals, leading to a more tailored and effective decision-making process.


    Overall, DI can help organizations and individuals make better decisions that
    are more aligned with their goals, values, and preferences, leading to improved
    outcomes and performance.'
