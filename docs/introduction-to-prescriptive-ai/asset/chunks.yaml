    ### 映射数据


    在将人工智能预测与业务工具相连接的背景下，映射数据指的是识别 AI 模型产生的相关数据，并将其与业务工具所需的数据对齐的过程。AI 模型产生的数据格式可能与业务工具要求的格式不同，因此需要进行映射，以确保数据能在两个系统之间有效共享。


    例如，如图 5-3 所示，假设某组织有一个预测客户流失的 AI 模型。该 AI 模型会生成一份高流失风险客户名单，并附上每位客户的概率评分。为了将此预测结果集成到组织的
    CRM 系统中，该组织需要将 AI 模型的数据映射到 CRM 系统所需的数据。


    ![](img/602259_1_En_5_Fig3_HTML.jpg)


    一个预测客户流失的 AI 模型工作流程图。客户、订单及其他数据流经准备阶段，随后进入 AI 或机器学习预测流失环节，并映射到 CRM 系统，以及客户姓名、账号、联系信息和流失概率评分。


    **图 5-3** 预测客户流失的 AI 模型示例


    映射数据需要识别 CRM 系统中与 AI 模型生成数据相对应的特定字段。例如，CRM 系统除了需要流失概率评分外，可能还需要客户姓名、账号和联系信息。组织需要确保
    AI 模型生成的数据与 CRM 系统所需的数据对齐，并可能需要进行数据转换或格式调整以保证兼容性。


    一旦数据映射完成，组织便可通过 CRM 系统的 API 或其他集成方法，将 AI 模型连接到 CRM 系统，从而与 CRM 系统共享 AI 预测结果。这使得组织能够利用
    AI 预测来制定客户留存策略，并采取有针对性的措施来防止客户流失。


    总之，映射数据涉及将 AI 模型生成的数据与业务工具所需的数据对齐，以确保数据能够有效共享并用于支持业务运营。


    ## 结论


    在本章中，我们讨论了如何通过开发用户友好的应用程序，将决策智能集成到业务流程中，从而将 AI 预测与现有业务工具相连接。我们强调了 DI 专家与业务团队协作的重要性，以确保
    DI 模型的输出能够正确集成到业务流程中。我们还讨论了将 DI 集成到业务流程中涉及的一些技术挑战，例如连接遗留系统和确保数据安全。


    为了成功地将 DI 集成到业务流程中，开发用户友好的界面至关重要，这能让非技术用户轻松与 DI 模型交互并理解其输出。开发将 AI 预测与现有业务工具相连接的自定义应用程序是实现这一目标的有效方法。为了提高用户采用率，必须让业务团队参与开发过程，并提供培训和支持，帮助用户了解如何有效使用这些应用程序。


    总体而言，将 DI 集成到业务流程中需要结合技术专长、DI 专家与业务团队之间的协作，并专注于开发用户友好的界面，使非技术用户能够轻松与 DI 模型的输出进行交互。通过成功地将
    DI 集成到业务流程中，组织可以利用 AI 的力量来支持明智的决策并改善业务成果。


    # 6. 行动、偏见与人在回路中


    伦理 AI 指的是以符合伦理原则和价值观的方式开发和使用人工智能。这包括确保 AI 系统透明、负责、无偏见，并且不会对个人或社会造成伤害。在本章中，我们将揭示
    AI 的伦理方面，例如偏见与公平、负责任的 AI 以及人在回路中。


    ## AI 中的关键伦理考量


    在开发 AI 系统时，必须考虑几个关键的伦理问题。这包括确保 AI 系统的设计和实施方式尊重个人隐私和自主权，不用于创建或延续不公正的权力结构，并且不会加剧社会或经济不平等。


    为了促进伦理 AI，组织和开发者应遵循若干最佳实践，例如在设计开发过程中让多元利益相关者参与，对 AI 系统进行彻底的测试和评估以识别潜在偏见和意外后果，并在整个行业实施明确的伦理
    AI 指南和标准。


    -   **偏见与公平：** AI 系统可能会延续并放大偏见，尤其是在用于训练的数据本身存在偏见的情况下。伦理 AI 要求解决并减轻这些偏见，以确保公平与公正。

    -   **隐私与安全：** AI 系统通常处理敏感的个人数据，例如医疗记录或财务信息。伦理 AI 要求确保这些数据得到安全处理，并符合相关的隐私法律法规。

    -   **透明度与可解释性：** AI 系统可能难以理解和解释，这使得确定决策如何做出变得具有挑战性。伦理 AI 要求透明度和可解释性，以便个人能够理解决策是如何以及为何做出的。

    -   **问责制：** 伦理 AI 要求建立问责制，以便负责开发和部署 AI 系统的个人或组织能够对任何负面结果承担责任。

    -   **人类价值观与权利：** AI 系统的设计和使用应尊重人类的价值观和权利，包括自主权、隐私和尊严。


    解决这些伦理问题需要技术专家、政策制定者、伦理学家和公民社会团体等一系列利益相关者的协作与参与。随着 AI 技术的持续发展，还需要进行持续的评估和调整。

