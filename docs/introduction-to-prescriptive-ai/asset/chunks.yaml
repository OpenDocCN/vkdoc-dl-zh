  trans: "\n### 阶段 3：假设分析\n\n#### 步骤 7：使用解释器对象生成保留客户的可行策略\n\n现在，我们有了一个名为 `explainer`\
    \ 的反事实对象，它可以用来生成反事实解释，即：对输入进行哪些更改才能获得期望的输出。在我们的案例中，它将是：“对于那些可能流失的客户，可以更改哪些方面（服务、账户相关、人口统计特征），以便他/她能被保留下来。”让我们通过一个例子来理解这一点。\n\
    \n以下是 `DiCEML` 期望的输入：\n\n-   训练好的机器学习模型。\n-   我们想要为其生成反事实的输入实例。我们将从被预测为可能流失的用户池中选取一个样本用户。\n\
    -   要变化的特征。对于这个例子，我们将看看提供诸如无纸化账单、在线安全、在线备份、设备保护、技术支持、用于流媒体电视或电影的互联网服务、一年或两年合同等服务，或者更改月度套餐，或者组合这些特征，是否能改变客户的想法，让他们计划继续留在电信运营商那里。\n\
    -   期望的输出或我们想要为其生成反事实的目标类别。在这种情况下，它将是非流失，即 0（从 1 变为 0）。\n\n具体操作如下：\n\n| PaperlessBilling\
    \ | MonthlyCharges | OnlineSecurity_Yes | OnlineBackup_Yes | DeviceProtection_Yes\
