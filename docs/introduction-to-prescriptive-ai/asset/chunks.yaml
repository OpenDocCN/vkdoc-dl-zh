    ''''''

    number_of_points [list]: how many points to generate

    ''''''

    kickoff_points = []

    for point in range(number_of_points):

    kickoff_points.append((random.random(), random.random()))

    return kickoff_points

    ```


    **Step 3: Formulating the objective function and constraints**


    ```

    objective_function = lambda x: (3*x[0]**2) + (3*x[0]**3) + (x[0]*x[1]) - (2*x[1]**2)
    + (2*x[1]**3)

    constraints = [

    {''type'': ''ineq'', ''fun'': lambda x: x[0] - 0.25}, # Block A capacity >= 0.25

    {''type'': ''ineq'', ''fun'': lambda x: x[1] - 0.25} # Block B capacity >= 0.25

    ]

    boundaries = [(0,1), (0,1)]

    ```


    **Step 4: Running the** **optimal solution function**


    ```

    # generate a list of N potential kickoff points

    [In]: kickoff_points = geneate_kickoff_points(20)

    [In]: first_iteration = True

    [In]:

    for point in kickoff_points:

    # for each point run the algorithm

    result = minimize(

    objective_function,

    [point[0], point[1]],

    method=''SLSQP'',

    bounds=boundaries,

    constraints=constraints

    )

    # first iteration always going to be the best so far

    if first_iteration:

    better_solution_found = False

    best_solution = result

    else:

    # if we find a better solution, lets use it

    if result.success and result.fun < best_solution.fun:

    better_solution_found = True

    best_solution = result

    # print results if algorithim was successful

    [In]:

    if best_solution.success:

    print(f"""Optimal solution found:

    -  Proportion of block A available capacity: {round(best_solution.x[0], 3)}

    -  Proportion of block B available capacity: {round(best_solution.x[1], 3)}

    -  Risk index value: {round(best_solution.fun, 3)}""")

    else:

    print("No solution found to problem")

    [Out]:

    Optimal solution found:

    -  Proportion of block A available capacity: 0.25

    -  Proportion of block B available capacity: 0.597

    -  Risk index value: 0.096

    ```


    From the previous simulation, we find that company X can resume work from office
    for its employees with block A capacity at 25 percent and block B capacity at
    about 60 percent, with the optimal about 10 percent risk for the given constraints/conditions.


    This solution can be deployed the same way as how the linear model was deployed.
    However, certain details such as the infrastructure might need changes as usually
    nonlinear solutions require more compute power for calculations, as compared to
    the linear ones.


    ## Decision Intelligence Methodology: Probabilistic Models


    Probabilistic models employ probability theory principles, unlike mathematical
    models that use mathematical equations, to model problems. This makes the probabilistic
    models particularly appropriate for situations where numerous uncertain factors
    influence the outcome. Probabilistic models are often used in fields such as finance,
    economics, and healthcare, where the outcomes of decisions are uncertain and unpredictable.
    We will now see how we can use one of the widely used probabilistic models, a
    Markov chain, to build a decision intelligence system.'
  trans: "\n### 非线性模型\n\n线性模型假设输入与输出之间的关系始终是线性的。然而在现实世界中，变量之间的关系往往复杂且非线性，这一假设通常不成立。因此，非线性模型应运而生。它们能够更准确地捕捉输入与输出之间的复杂行为/关系，并可用以下方程表示：\n\
    \n`y = f(x)`\n\n其中：\n\n- `y` 是因变量（需要根据输入计算/预测的变量）。\n- `f(x)` 可以是任意非线性函数，例如多项式、指数函数、三角函数或其他非线性函数。\n\
    \n接下来，我们通过以下案例来理解如何求解非线性问题。\n\n**问题描述：**\n\n新冠疫情后，X 公司计划逐步让员工返回办公室工作，同时确保其两栋办公楼的最低占用率均维持在\
