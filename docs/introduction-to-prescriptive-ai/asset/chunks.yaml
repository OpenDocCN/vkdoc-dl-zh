    y = clf.predict_proba(X_tr)[:,1]

    print(''train:'',roc_auc_score(y_tr, y),''val :'' , roc_auc_score(y_test, (probs[val_ind])))

    print(20 * ''-'')

    scores.append(roc_auc_score(y_test, probs[val_ind]))

    print(''log reg  roc_auc=  '', round(np.mean(scores)*100,2))

