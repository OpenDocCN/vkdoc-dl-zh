    tools. Here are the technical steps to connect AI predictions to business tools:


    1.  **Collect and process data:** Collect and process data required for the AI
    model to make predictions. This data can be sourced from internal business systems
    or external sources.


    2.  **Build and train the AI model:** Develop the AI model that will generate
    predictions based on the data. Train the model using historical data to ensure
    accurate predictions.


    3.  **Deploy the AI model:** Deploy the trained AI model to an environment where
    it can be accessed by business tools. This can be done using application programming
    interfaces (APIs), web services, or other integration tools.


    4.  **Connect to business tools:** Connect the AI model to the relevant business
    tools, such as ERP systems, CRM systems, or BI tools. This can be done through
    APIs, custom integrations, or prebuilt connectors.


    5.  **Test and validate:** Test the integration to ensure that AI predictions
    are properly integrated into the business tools. Validate that the predictions
    align with the business goals and objectives.


    6.  **Monitor and maintain:** Monitor the AI system to ensure that it continues
    to provide accurate predictions. Maintenance and updates may be required to address
    changes in the business environment or to improve the accuracy of the predictions.


    As shown in Figure [5-2](#602259_1_En_5_Chapter.xhtml#Fig2), in summary, connecting
    AI predictions to business tools involves data collection and processing, building
    and training an AI model, deploying the model, connecting to business tools, testing
    and validating the integration, and ongoing monitoring and maintenance. By following
    these technical steps, organizations can ensure that AI predictions are effectively
    integrated into their business processes and support informed decision-making


    ![](images/602259_1_En_5_Chapter/602259_1_En_5_Fig2_HTML.jpg)


    A workflow of augmenting A I predictions to business decision intelligence. The
    customers and orders and other data flow to prepare then to A I or M L predict
    churn, C R M marketing applications U I, and finally to business tools consists
    of C R M, E R P, A P I, B I, apps, and marketing tools.


    Figure 5-2


    Augmenting predictions with business tools


    ### Connect to Business Tools


    Connecting AI predictions to business tools means connecting the AI model to the
    relevant business tools, such as ERP systems, CRM systems, or BI tools. This step
    is crucial because it enables the AI model to share its predictions with other
    systems that are critical to business operations.


    Connecting the AI model to business tools involves integrating the AI model with
    the business tool’s API. APIs provide a standard interface for different systems
    to communicate with each other, enabling data to be exchanged seamlessly between
    systems. The integration process typically involves the following steps:


    1.  **Identify the appropriate API:** Determine which API the business tool supports
    and what data format it uses.


    2.  **Define the data requirements:** Identify the specific data that the business
    tool requires to make use of the AI model’s predictions.


    3.  **Map the data:** Map the data produced by the AI model to the data required
    by the business tool. This may involve data transformation or conversion to ensure
    that the data is compatible.


    4.  **Test the integration:** Test the integration to ensure that data is being
    transferred correctly and that the business tool can use the AI model’s predictions
    effectively.


    There are several methods for connecting AI models to business tools, including
    custom integration, prebuilt connectors, and third-party integration platforms.
    The choice of method depends on the specific requirements of the organization
    and the systems being integrated.


    In summary, connecting AI predictions to business tools involves integrating the
    AI model with the business tool’s API, mapping data between the two systems, and
    testing the integration to ensure that it works effectively. By connecting AI
    models to business tools, organizations can leverage AI predictions to support
    informed decision-making and improve business outcomes.'
  trans: '

    ### 用户友好型界面


    在将决策智能输出集成到业务工作流中时，设计用户友好型界面至关重要。由于用户是非技术人员，因此开发易于使用并能采取行动的界面非常重要。


    以下是用户友好型界面至关重要的几个原因：


    - **促进采用：** 用户友好型界面使业务用户更容易在日常工作中采用和使用`DI`输出。如果界面难以使用，可能会阻碍采用，从而削弱`DI`流程的有效性。

    - **增强可用性：** 用户友好型界面增强了`DI`输出的可用性。通过使界面易于使用和理解，业务用户可以快速访问所需的洞察并做出更好的决策。

    - **提高生产力：** 用户友好型界面可以通过减少访问`DI`输出所需的时间和精力来提高生产力。这有助于简化业务工作流、提高效率并降低成本。

    - **支持协作：** 用户友好型界面可以支持业务用户和数据科学家之间的协作。通过提供访问`DI`输出的通用界面，业务用户和数据科学家可以更有效地合作，并更轻松地分享洞察。

    - **增加参与度：** 用户友好型界面可以增加对`DI`输出的参与度。通过提供视觉上吸引人且直观的界面，业务用户更有可能参与`DI`流程所提供的洞察。


    总之，在将`DI`输出集成到业务工作流中时，设计用户友好型界面至关重要。它可以促进采用、增强可用性、提高生产力、支持协作并增加参与度。通过优先考虑用户体验，组织可以最大化从`DI`流程中获得的价值，并实现更好的业务成果。


    ## 将 AI 预测增强到业务工作流


    将`AI`预测连接到业务工具涉及将`AI`系统与现有业务系统（如企业资源规划（`ERP`）系统、客户关系管理（`CRM`）系统和商业智能（`BI`）工具）集成。以下是将`AI`预测连接到业务工具的技术步骤：


    1. **收集和处理数据：** 收集和处理`AI`模型进行预测所需的数据。这些数据可以来自内部业务系统或外部来源。

    2. **构建和训练 AI 模型：** 开发将根据数据生成预测的`AI`模型。使用历史数据训练模型以确保预测准确。

    3. **部署 AI 模型：** 将训练好的`AI`模型部署到业务工具可以访问的环境中。这可以通过应用程序编程接口（`API`）、Web 服务或其他集成工具来完成。

    4. **连接到业务工具：** 将`AI`模型连接到相关的业务工具，例如`ERP`系统、`CRM`系统或`BI`工具。这可以通过`API`、自定义集成或预构建连接器来完成。

    5. **测试和验证：** 测试集成以确保`AI`预测正确集成到业务工具中。验证预测是否符合业务目标和目的。

    6. **监控和维护：** 监控`AI`系统以确保其持续提供准确的预测。可能需要进行维护和更新，以应对业务环境的变化或提高预测的准确性。


    如图 5-2 所示，总之，将`AI`预测连接到业务工具涉及数据收集和处理、构建和训练`AI`模型、部署模型、连接到业务工具、测试和验证集成以及持续的监控和维护。通过遵循这些技术步骤，组织可以确保`AI`预测有效集成到其业务流程中，并支持明智的决策。


    ![](img/602259_1_En_5_Fig2_HTML.jpg)


    一个将`AI`预测增强到业务决策智能的工作流。客户、订单及其他数据流向准备阶段，然后进入`AI`或`ML`预测流失、`CRM`营销应用`UI`，最后到达由`CRM`、`ERP`、`API`、`BI`、应用程序和营销工具组成的业务工具。


    **图 5-2** 使用业务工具增强预测


    ### 连接到业务工具


    将`AI`预测连接到业务工具意味着将`AI`模型连接到相关的业务工具，例如`ERP`系统、`CRM`系统或`BI`工具。这一步至关重要，因为它使`AI`模型能够与对业务运营至关重要的其他系统共享其预测。


    将`AI`模型连接到业务工具涉及将`AI`模型与业务工具的`API`集成。`API`为不同系统之间的相互通信提供了标准接口，使数据能够在系统之间无缝交换。集成过程通常包括以下步骤：


    1. **识别合适的 API：** 确定业务工具支持哪个`API`以及它使用什么数据格式。

    2. **定义数据需求：** 确定业务工具利用`AI`模型预测所需的具体数据。

    3. **映射数据：** 将`AI`模型产生的数据映射到业务工具所需的数据。这可能涉及数据转换或格式转换，以确保数据兼容。

    4. **测试集成：** 测试集成以确保数据正确传输，并且业务工具能够有效使用`AI`模型的预测。


    有多种方法可以将`AI`模型连接到业务工具，包括自定义集成、预构建连接器和第三方集成平台。方法的选择取决于组织的具体需求以及被集成的系统。


    总之，将`AI`预测连接到业务工具涉及将`AI`模型与业务工具的`API`集成、在两个系统之间映射数据，并测试集成以确保其有效运行。通过将`AI`模型连接到业务工具，组织可以利用`AI`预测来支持明智的决策并改善业务成果。

