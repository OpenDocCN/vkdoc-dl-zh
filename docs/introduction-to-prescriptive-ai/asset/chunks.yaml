    ## Stage 2: Generating Counterfactuals


    We will be using a combination of counterfactual and what-if analysis to drive
    decision intelligence. Let’s look into what they mean and how they can be used.


    ### Counterfactual Analysis


    Counterfactuals refer to a type of analysis that involves identifying the minimal
    set of changes required to an input instance such that the machine learning model
    output changes to a desired outcome. In simpler terms, counterfactuals are hypothetical
    examples of inputs that would lead to a different output from a machine learning
    model.


    Counterfactual analysis can be used to explain the behavior of a machine learning
    model and to provide insights into how the model can be improved as well as what
    actions can be taken so that favorable outcomes can be generated. It can also
    be used for various applications such as fairness analysis, where the minimal
    set of changes required to achieve a desired outcome can be used to identify potential
    sources of bias in the model. Additionally, counterfactual analysis can be used
    for causal inference, where the minimal set of changes can be used to estimate
    the causal effect of a treatment on an outcome.


    We will be using the `DiCEML` Python package for generating counterfactuals.


    ### DiCEML


    `DiCEML` (Diverse Counterfactual Explanations through Mixed Integer Linear Programming)
    is a framework that enables the generation of counterfactual examples for machine
    learning models. `DiCEML` employs mixed-integer linear programming to find a minimal
    set of changes to input instances required to change the model output to a desired
    outcome. It is a state-of-the-art method for generating diverse counterfactual
    explanations that take into account the constraints and features of the input
    data and can be used for various applications such as explainable AI, fairness
    analysis, and causal inference.


