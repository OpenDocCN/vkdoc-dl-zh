- fmt: "### Return on Investment\n\nThe *return on investment* (`ROI`) of the project\
    \ should consider the costs of implementing the project and the potential value\
    \ it will bring to the business.\n\nThe `ROI` for an AI project refers to the\
    \ expected or realized financial return on investment for implementing an AI solution\
    \ or initiative. It is determined by comparing the cost of implementing the project,\
    \ including the cost of data acquisition, hardware and software, and personnel,\
    \ to the expected or realized benefits.\n\nThe benefits of an AI project can be\
    \ difficult to quantify but may include increased efficiency, improved accuracy,\
    \ better decision-making, and reduced labor costs. The `ROI` for an AI project\
    \ can be calculated by dividing the net financial benefits, such as increased\
    \ revenue or reduced costs, by the total cost of the project and then multiplying\
    \ the result by 100 to get a percentage.\n\nBut how do we calculate the potential\
    \ value? Let’s discuss that.\n\n### Value per Decision\n\nCalculate the value\
    \ per decision by estimating the potential impact of each decision made by the\
    \ AI project.\n\n**Example 1:**\n\nLet’s take the example of churn prediction\
    \ again. If we successfully predict a customer is going to leave your business,\
    \ the user can take some actions to retain the customer. So, the value from one\
    \ customer would be `X` dollars.\n\nIn this scenario,\n\nValue from one prediction\
    \ = One generated from one customer\n\n**Example 2:**\n\nIn some cases, we might\
    \ want to know the overall value generated, not at prediction level.\n\nThe value\
    \ per prediction can be calculated by dividing the total value of the project\
    \ by the number of decisions it will make.\n\nBy considering these factors, you\
    \ can derive the potential value from AI projects or calculate the value per decision.\n\
    \nKeep in mind that the actual value may vary based on various other factors,\
    \ such as the following:\n\n- **Probabilistic or uncertain outcomes:** Since the\
    \ predictions are probabilistic, every prediction won’t give us 100 percent value.\n\
    - **Cost of errors:** It’s the cost of errors made by the model.\n\nSo, the overall\
    \ `ROI` is as follows:\n\n`ROI = Return / Investment`\n\nwhere `Return = Benefits\
    \ from the model – Uncertainty of the predictions`\n\n`Investments = Resources\
    \ * Cost of resources`\n\nKeep in mind that deriving the dollar value from an\
    \ AI prediction can be challenging, especially when the benefits are not directly\
    \ financial. However, by identifying the problem, defining the use case, identifying\
    \ the costs and benefits, calculating the `ROI`, and communicating the value,\
    \ organizations can get a better understanding of the financial impact of the\
    \ AI system.\n\n## Consumption of the AI Predictions\n\nA major part of the AI\
    \ life cycle is making sure the business consumes the AI predictions. Otherwise,\
    \ the value won’t be generated. So, while planning, it’s crucial to understand\
    \ how the business is going to consume the outputs. The following are the steps\
    \ to be followed to have a clear understanding of this:\n\n1. **Consider the confidence\
    \ level:** AI models typically provide a level of confidence or probability associated\
    \ with a prediction. It’s important to consider this confidence level when deciding\
    \ how to use the prediction. For example, if the confidence level is low, it may\
    \ be necessary to verify the prediction with other data or methods before acting.\n\
    2. **Determine the appropriate storage solution:** Depending on the type of AI\
    \ prediction and the use case, you may need to use different storage solutions.\
    \ For example, if the prediction is an image or video, blob storage may be appropriate,\
    \ while for text data, API calls may be more suitable.\n3. **Set up the storage\
    \ solution:** Once you have determined the appropriate storage solution, you will\
    \ need to set it up and configure it appropriately. This may involve creating\
    \ storage containers, configuring access policies and permissions, or integrating\
    \ with other systems.\n4. **Establish data flows:** To consume AI predictions,\
    \ you will need to establish data flows between the AI model and the storage solution.\
    \ This may involve setting up event triggers, establishing data transfer protocols,\
    \ or configuring API endpoints.\n5. **Ensure data security:** When working with\
    \ sensitive data, it’s important to ensure that appropriate security measures\
    \ are in place. This may involve encrypting data in transit and at rest, configuring\
    \ access controls and permissions, or integrating with other security systems.\n\
    6. **Identify user groups:** Once the problem has been defined, identify the different\
    \ user groups who will be using the AI predictions. This may include different\
    \ departments, teams, or individuals.\n7. **Understand user needs:** For each\
    \ user group, it’s important to understand their specific needs and requirements\
    \ for using the AI predictions. This includes understanding what decisions they\
    \ need to make, what data they need to access, and what level of detail and accuracy\
    \ they require.\n8. **Provide training and support:** Once the AI predictions\
    \ have been made available to users, it’s important to provide training and support\
    \ to ensure that users can effectively consume and act on the predictions. This\
    \ may involve providing user guides, training sessions, or support resources.\n\
    9. **Understand the prediction:** Before consuming an AI prediction, it’s important\
    \ to understand what it means and how it was generated. This includes understanding\
    \ the input data, the algorithm used, the model’s accuracy and limitations, and\
    \ any assumptions made during the modeling process.\n10. **Determine how to use\
    \ the prediction:** Once you understand the prediction, determine how it can be\
    \ used to make a decision or take action. This could involve using the prediction\
    \ as input to another system or using it to trigger an alert or notification.\
    \ It should also include the following:\n    - **Explainability:** The system\
    \ must be able to provide clear and transparent explanations for its decisions\
    \ and recommendations, which helps to build trust and understanding among stakeholders.\n\
    \    - **Scalability:** The system must be able to handle large amounts of data\
    \ and handle the complexity of the problem and adapt to changing conditions.\n\
    \    - **Flexibility:** The system should be able to handle different types of\
    \ problems and be used in different areas of the organization.\n    - **Integration:**\
    \ The system should be able to integrate with existing systems and processes to\
    \ ensure a smooth and efficient workflow.\n\nBy following these steps, you can\
    \ identify users for AI predictions and ensure that they are provided with the\
    \ information and resources they need to effectively use the predictions to support\
    \ decision-making and improve outcomes.\n\n## Conclusion\n\nIn this chapter, we\
    \ discussed the potential reasons for AI project failure, the importance of decision\
    \ intelligence in making better decisions using AI, and the guidelines for the\
    \ successful implementation of AI solutions. It highlighted the need to ask critical\
    \ questions before starting any AI projects and debunked some of the myths surrounding\
    \ AI. We also introduced a DI requirements framework that covers planning, approach,\
    \ approval mechanism, KPIs, potential value, and consumption of AI predictions,\
    \ which are fundamental to AI projects.\n\n# 3. Decision Intelligence Methodologies\n\
    \nThe idea of decision-making is the main topic of this chapter, along with its\
    \ types. We will begin with the definition of decision-making and examine its\
    \ various forms. Then, we will understand the decision-making process through\
    \ an example. We will next go into greater detail about the development of decision-making,\
    \ also known as *decision intelligence methodologies*, employed by humans over\
    \ time, as well as their benefits and drawbacks. Our discussion will end with\
    \ suggestions for decision intelligence approaches for various scenarios."
