- fmt: "### Nonlinear Models\n\nLinear models assume that the relationship between\
    \ the inputs and outputs is always linear. This assumption is often not true in\
    \ real-world situations where the relationship between variables is complex and\
    \ nonlinear. This is where the need for nonlinear models arises. They can capture\
    \ the complex behavior/relationships between the inputs and outputs more accurately.\
    \ They can be represented by the following equation:\n\n`y = f(x)`\n\nwhere:\n\
    \n- `y` is the dependent variable (a variable that needs to be calculated/predicted\
    \ based on input).\n- `f(x)` could be any nonlinear function, such as a polynomial,\
    \ exponential function, trigonometric function, or any other nonlinear function.\n\
    \nLet’s understand how to solve a nonlinear problem with the help of the following\
    \ use case.\n\n**Problem Statement:**\n\nAfter the COVID-19 pandemic, company\
    \ X plans to gradually have its employees return to work at the office while maintaining\
    \ a minimum of 25 percent occupancy in both of its office blocks to ensure efficient\
    \ operations. The government has provided a risk index to assist companies in\
    \ determining the risks associated with re-opening offices during the current\
    \ situation. The risk index (RI) is defined in the following manner:\n\n`RI =\
    \ 3x_1^2 + 3x_1^3 + x_1*x_2 - 2x_2^2 + 2x_2^3`\n\nwhere:\n\n- `x_1` = Proportion\
    \ of block A available capacity\n- `x_2` = Proportion of block B available capacity\n\
    \nWhat is the safest way (according to the RI) for company X to resume work from\
    \ the office?\n\n**Solution:**\n\nWith the RI definition and considering company\
    \ X wants to minimize the risk, we can define the objective function as follows:\n\
    \nMinimize: `RI = 3x_1^2 + 3x_1^3 + x_1*x_2 - 2x_2^2 + 2x_2^3`\n\nConstraints:\n\
    \n- `x_1 >= 0.25`\n- `x_2 >= 0.25`\n- `x_1, x_2 <= 1`\n\nFor this nonlinear problem,\
    \ we will use the `scipy` package to derive the solution.\n\n**Step 1: Importing\
    \ the required libraries (especially scipy)**\n\n```\n[In]:\nimport numpy as np\n\
    import pandas as pd\nimport random\nfrom scipy.optimize import minimize\n```\n\
    \n**Step 2: Create a function to generate starting points**\n\nWe will use the\
    \ following function to generate a tuple of starting points within the feasible\
    \ range for this problem:\n\n```\n[In]:\ndef geneate_kickoff_points(number_of_points):\n\
    \    '''\n    number_of_points [list]: how many points to generate\n    '''\n\
    \    kickoff_points = []\n    for point in range(number_of_points):\n        kickoff_points.append((random.random(),\
    \ random.random()))\n    return kickoff_points\n```\n\n**Step 3: Formulating the\
    \ objective function and constraints**\n\n```\nobjective_function = lambda x:\
    \ (3*x[0]**2) + (3*x[0]**3) + (x[0]*x[1]) - (2*x[1]**2) + (2*x[1]**3)\nconstraints\
    \ = [\n    {'type': 'ineq', 'fun': lambda x: x[0] - 0.25}, # Block A capacity\
    \ >= 0.25\n    {'type': 'ineq', 'fun': lambda x: x[1] - 0.25}  # Block B capacity\
    \ >= 0.25\n]\nboundaries = [(0,1), (0,1)]\n```\n\n**Step 4: Running the optimal\
    \ solution function**\n\n```\n# generate a list of N potential kickoff points\n\
    [In]: kickoff_points = geneate_kickoff_points(20)\n[In]: first_iteration = True\n\
    [In]:\nfor point in kickoff_points:\n    # for each point run the algorithm\n\
    \    result = minimize(\n        objective_function,\n        [point[0], point[1]],\n\
    \        method='SLSQP',\n        bounds=boundaries,\n        constraints=constraints\n\
    \    )\n    # first iteration always going to be the best so far\n    if first_iteration:\n\
    \        better_solution_found = False\n        best_solution = result\n    else:\n\
    \        # if we find a better solution, lets use it\n        if result.success\
    \ and result.fun < best_solution.fun:\n            better_solution_found = True\n\
    \            best_solution = result\n# print results if algorithim was successful\n\
    [In]:\nif best_solution.success:\n    print(f\"\"\"Optimal solution found:\n \
    \   -  Proportion of block A available capacity: {round(best_solution.x[0], 3)}\n\
    \    -  Proportion of block B available capacity: {round(best_solution.x[1], 3)}\n\
    \    -  Risk index value: {round(best_solution.fun, 3)}\"\"\")\nelse:\n    print(\"\
    No solution found to problem\")\n[Out]:\nOptimal solution found:\n    -  Proportion\
    \ of block A available capacity: 0.25\n    -  Proportion of block B available\
    \ capacity: 0.597\n    -  Risk index value: 0.096\n```\n\nFrom the previous simulation,\
    \ we find that company X can resume work from office for its employees with block\
    \ A capacity at 25 percent and block B capacity at about 60 percent, with the\
    \ optimal about 10 percent risk for the given constraints/conditions.\n\nThis\
    \ solution can be deployed the same way as how the linear model was deployed.\
    \ However, certain details such as the infrastructure might need changes as usually\
    \ nonlinear solutions require more compute power for calculations, as compared\
    \ to the linear ones.\n\n## Decision Intelligence Methodology: Probabilistic Models\n\
    \nProbabilistic models employ probability theory principles, unlike mathematical\
    \ models that use mathematical equations, to model problems. This makes the probabilistic\
    \ models particularly appropriate for situations where numerous uncertain factors\
    \ influence the outcome. Probabilistic models are often used in fields such as\
    \ finance, economics, and healthcare, where the outcomes of decisions are uncertain\
    \ and unpredictable. We will now see how we can use one of the widely used probabilistic\
    \ models, a Markov chain, to build a decision intelligence system."
