  trans: '

    ### 音频生成


    - **WaveNet 与 SampleRNN**：这些模型在生成逼真的语音和音乐方面表现突出。其中，`WaveNet` 以其高质量的语音合成而闻名。

    - **Transformer 模型**：尽管在音频生成中不太常见，但 Transformer 因其在处理序列数据方面的高效性，正开始被探索在该模态中的潜力。


    ### 视频生成


    - **基于 CNN 的模型**：卷积神经网络（`CNN`）已被用于视频相关任务，专注于理解视频帧中的空间特征。

    - **Transformer 模型**：它们正被探索用于处理视频数据中的空间（图像）和时间（序列）两方面，尽管这是一个相对较新的应用领域。


    ### 多模态应用


    - **多模态 Transformer**：像 `CLIP`、`DALL-E` 和 `Gemini` 这样的模型展示了 Transformer 在同时处理文本和图像方面的能力。此外，在音频方面，还有诸如
    `AudiClip`、`Jukebox` 和 `Wave2Vec 2.0` 等模型。

    - **其他模型**：根据任务的具体要求，开发了各种定制化的 AI 模型，用于跨多种模态集成和处理数据。


    不同的生成式 AI 模型为各种模态带来了其独特的优势。Transformer 模型凭借其在处理序列和多模态数据方面的先进能力，在多个领域产生了重大影响。与此同时，像
    `GAN` 和 `WaveNet` 这样的模型在各自的图像和音频生成领域具有开创性意义。模型的选择通常取决于手头任务的具体要求，例如是否需要理解序列数据、生成逼真的图像或合成类人语音。随着生成式
    AI 的不断发展，这些多样化模型之间的相互作用正在推动创新，并拓展 AI 所能创造的边界。


    ## 历史里程碑


    生成式 AI 的主要历史里程碑出现在 20 世纪 50-60 年代、90 年代、2000 年代、2010 年代和 2020 年代。


    ### 20 世纪 50-60 年代：神经网络的基础


    20 世纪 50 年代和 60 年代是人工智能和神经网络历史上的关键十年。这些年为后来成为生成式 AI 的领域奠定了基石。让我们深入探讨这一时代的关键发展。


    #### 感知机（1957）


    - **发明与影响**：感知机由弗兰克·罗森布拉特于 1957 年开发。这是一项开创性的发明，因为它本质上是第一个被算法描述的神经网络。罗森布拉特的感知机旨在模仿人脑处理信息的方式，为现代神经网络奠定了基础。

    - **功能**：感知机是一种线性分类器；它基于一个线性预测函数进行预测，将一组权重与特征向量相结合。该算法允许在给定带标签的训练集的情况下自动学习权重，这在当时是革命性的。

    - **局限性与批评**：尽管最初前景广阔，但感知机后来受到了批评，特别是马文·明斯基和西摩·帕珀特在他们 1969 年的著作《感知机》中指出的根本性局限，例如无法解决非线性可分问题（如异或问题）。这一批评使神经网络研究停滞了数年。


    #### 神经网络的概念（20 世纪 60 年代）


    - **早期研究**：在 20 世纪 60 年代，随着感知机的发展，人们对神经网络的兴趣和研究激增。科学家们对创造能够模仿人类思维过程并从环境中学习的机器这一想法着迷。

    - **技术局限**：这一时期的主要障碍之一是计算能力的缺乏。神经网络算法的复杂性需要比当时可用的更强的处理能力和更大的数据存储容量。这一限制是阻碍该领域发展的重大瓶颈。

    - **理论发展**：尽管存在这些限制，20 世纪 60 年代仍取得了重要的理论成果。研究人员探索了各种网络结构和学习算法，为未来的进步奠定了基础。这一时期见证了早期多层网络的发展以及对非线性激活函数的探索，尽管这些想法直到很久以后才得以完全实现。

    - **兴趣减退**：到 20 世纪 60 年代末，人们对神经网络的兴趣开始下降。明斯基和帕珀特指出的局限性，加上计算挑战以及 AI 中替代方法（如符号 AI）的兴起，导致了现在所谓的第一次“AI
    寒冬”，在此期间，对神经网络研究的资助和兴趣显著减少。


    #### 遗产与复兴


    - **长期影响**：20 世纪 50 年代和 60 年代的基础性工作为神经网络和 AI 的未来发展奠定了基础。随着更强大的计算机和改进算法的出现，感知机和早期网络结构等概念最终将演变为更复杂、能力更强的系统。

    - **20 世纪 80 年代的复兴**：随着反向传播算法的出现和计算能力的提升，神经网络领域以及由此延伸的生成式 AI 在 20 世纪 80 年代经历了复兴。这次复兴标志着
    AI 和神经网络现代时代的开始，最终带来了我们今天所见的复杂而强大的生成模型。


    20 世纪 50 年代和 60 年代对神经网络的早期探索至关重要。它们是理解和创造能够学习和适应的智能系统的初步步骤——这一愿景至今仍在推动着 AI 的研究与发展。


    ### 20 世纪 80 年代：神经网络的复兴


    20 世纪 80 年代标志着人工智能领域，特别是神经网络研究与发展的重要转折点。这一时期通常以神经网络研究兴趣的复苏为特征，这主要得益于反向传播算法的引入。让我们更详细地探讨这个时代。


    #### 反向传播（1986）


    - **引入与开发者**：反向传播算法由大卫·鲁梅尔哈特、杰弗里·辛顿和罗纳德·威廉姆斯在 1986 年一篇里程碑式的论文中引入，这是神经网络历史上的一个关键时刻。该算法解决了神经网络训练中的一个基本挑战：高效地调整多层网络中的权重。

    - **技术突破**：反向传播是一种用于训练前馈神经网络的监督学习算法。它采用一种称为微积分链式法则的方法来计算损失函数相对于网络权重的梯度。本质上，它通过将误差从输出层向输入层反向传播到网络各层来工作，因此得名“反向传播”。

    - **机制**：该过程包括两个主要阶段：前向传播，即输入通过网络得到输出，并计算误差（实际输出与期望输出之间的差异）；以及反向传播，即该误差通过网络反向传播，使算法能够朝着最小化误差的方向调整权重。

    - **对神经网络的影响**：反向传播使得训练深度神经网络成为可能，这种网络在输入层和输出层之间具有多个隐藏层。这是一项重大进步，因为它意味着神经网络现在可以学习复杂的模式，并以以前不可能达到的复杂程度执行任务。

    '
- fmt: '### Revival of Interest in Neural Networks


    - **Overcoming Past Limitations**: The introduction of backpropagation helped
    to overcome some of the limitations that had been highlighted in the 1960s and
    1970s, particularly regarding the training of multilayer networks. It provided
    a practical way to train deep neural networks, which was a major step forward
    from the simple perceptrons of the previous decades.

    - **Renewed Research and Funding**: The success and potential of backpropagation
    rekindled interest in neural network research. The 1980s saw an increase in academic
    and industry research in this area, as well as a boost in funding. This renewed
    interest helped to bring neural networks back into the mainstream of AI research.

    - **Broader Applications**: With the ability to efficiently train multilayer networks,
    researchers began to apply neural networks to a wider range of problems, from
    speech recognition and image processing to more complex tasks like natural language
    processing.


    ### Legacy and Continuing Development


    - **Foundation for Modern AI**: The advancements in neural network training in
    the 1980s, especially the development of backpropagation, laid the groundwork
    for the deep learning revolution that would follow in the subsequent decades.
    It set the stage for the development of more complex architectures and the emergence
    of convolutional neural networks (`CNNs`), recurrent neural networks (`RNNs`),
    and eventually, transformers.

    - **Catalyst for Innovation**: The revival of neural networks in the 1980s can
    be seen as a catalyst that spurred a wave of innovation in AI, leading to the
    development of algorithms and models that are at the core of modern AI applications.


    In summary, the 1980s represented a renaissance in neural network research, driven
    in large part by the introduction of the backpropagation algorithm. This period
    not only revived interest in an area of AI that had experienced a significant
    downturn but also set the stage for the rapid advancements in AI and machine learning
    that would follow in the decades to come.


    ### 1990s: Early Generative Models


    The 1990s played a crucial role in the history of Generative AI, marked by significant
    developments in the field of neural networks and the introduction of early generative
    models. A key innovation during this period was the development and refinement
    of Boltzmann Machines and Restricted Boltzmann Machines (`RBMs`). These models
    were instrumental in advancing the understanding of how neural networks could
    learn and represent complex probability distributions.


    ### Boltzmann Machines


    - **Background and Development**: Boltzmann Machines, named after the physicist
    Ludwig Boltzmann, were developed in the mid-1980s, with their roots tracing back
    to the work of Geoffrey Hinton and Terry Sejnowski. They are a type of stochastic
    recurrent neural network.

    - **Mechanism**: A Boltzmann Machine consists of a network of symmetrically connected,
    neuron-like units that make stochastic decisions about whether to be on or off.
    The connections in the network (analogous to synapses in biological brains) have
    weights that are adjusted during the learning process. The learning in Boltzmann
    Machines involves adjusting these weights to minimize the energy of the network,
    following principles analogous to those in statistical mechanics.

    - **Energy-Based Model**: The key concept in Boltzmann Machines is the idea of
    an “energy” landscape, where the network learns to represent the training data
    by finding low-energy configurations. This is achieved through a process known
    as simulated annealing, which is inspired by thermodynamic systems.


    ### Restricted Boltzmann Machines (RBMs)


    - **Introduction and Evolution**: The concept of `RBMs` emerged as a variation
    of the original Boltzmann Machine. `RBMs` were simplified versions introduced
    to overcome some of the computational complexities of the full Boltzmann Machine.
    In an `RBM`, the network is divided into two layers: a visible layer (for input
    data) and a hidden layer (for feature detection), with no intra-layer connections,
    unlike the fully connected Boltzmann Machine.

    - **Training and Efficiency**: `RBMs` are trained using a procedure called contrastive
    divergence, a method developed by Geoffrey Hinton. This training method was more
    efficient than the procedures used for traditional Boltzmann Machines, making
    `RBMs` more practical for real-world applications.

    - **Generative Capabilities**: `RBMs` are generative models, meaning they can
    learn to represent and sample from the probability distribution of the input data.
    After training, an `RBM` can generate new data that resembles the training data,
    making it an early example of a generative model.


    ### Impact and Applications


    - **Learning Deep Representations**: `RBMs` were crucial in learning deep representations
    of data. They could be stacked to form Deep Belief Networks (`DBNs`), which represented
    a significant step forward in the ability to train deep neural networks.

    - **Contributions to Deep Learning**: The developments in `RBMs` and their training
    algorithms contributed significantly to the field of deep learning. They provided
    insights into how deep architectures could be effectively trained and laid the
    groundwork for more advanced generative models.

    - **Applications**: While `RBMs` themselves were not widely used in practical
    applications compared to later models, their development was key to understanding
    deep learning and generative models. They were explored for tasks like dimensionality
    reduction, feature learning, and collaborative filtering.


    ### Legacy of Boltzmann Machines and RBMs


    The development of Boltzmann Machines and `RBMs` in the 1990s represents a foundational
    period in the history of Generative AI. These models contributed to a deeper understanding
    of how neural networks could learn complex distributions and generate new data.
    The techniques and theories developed during this period paved the way for more
    advanced generative models and were instrumental in the resurgence of interest
    in deep learning in the following decades.


    ### 2000s: Advances in Deep Learning


    The 2000s were a transformative decade in the field of artificial intelligence,
    particularly with the advances in deep learning. A pivotal development in this
    era was the introduction of Deep Belief Networks (`DBNs`) by Geoffrey Hinton and
    his team in 2006. This breakthrough played a crucial role in demonstrating the
    potential and viability of deep learning architectures, paving the way for the
    rapid advancement of AI technologies.


    ### Deep Belief Networks (2006)


    - **Introduction and Context**: Geoffrey Hinton, a leading figure in the field
    of neural networks, along with his colleagues, introduced Deep Belief Networks
    in 2006. This came at a time when the potential of neural networks, especially
    deep architectures, was not fully realized due to training difficulties.

    - **Architecture of DBNs**: A `DBN` is essentially a stacked architecture of multiple
    layers of Restricted Boltzmann Machines (`RBMs`). Each layer in a `DBN` aims to
    learn increasingly abstract representations of the input data. The lower layers
    capture basic features, while the higher layers combine these features to represent
    more complex patterns.

    - **Training Methodology**: The innovative aspect of `DBNs` was their training
    approach. The model utilized a greedy, layer-by-layer training method. Each `RBM`
    layer was trained independently in an unsupervised manner to model the distribution
    of its input. Once all layers were pretrained, the entire network could be fine-tuned
    using supervised methods like backpropagation, particularly for tasks like classification.'
