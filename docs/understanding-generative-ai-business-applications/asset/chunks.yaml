  trans: '

    ### 神经网络的复兴


    - **克服过往局限**：反向传播算法的引入帮助克服了 20 世纪 60 年代和 70 年代凸显的一些局限，尤其是在多层网络的训练方面。它提供了一种训练深度神经网络的实用方法，相较于前几十年的简单感知机，这是一次重大进步。

    - **研究与资金重振**：反向传播算法的成功与潜力重新点燃了人们对神经网络研究的兴趣。20 世纪 80 年代，该领域的学术与产业研究有所增加，资金投入也随之提升。这种重燃的兴趣帮助神经网络重回人工智能研究的主流。

    - **更广泛的应用**：由于能够高效训练多层网络，研究人员开始将神经网络应用于更广泛的问题，从语音识别、图像处理到自然语言处理等更复杂的任务。


    ### 遗产与持续发展


    - **现代人工智能的基础**：20 世纪 80 年代神经网络训练的进步，尤其是反向传播算法的发展，为随后几十年的深度学习革命奠定了基础。它也为更复杂架构的发展以及卷积神经网络（`CNNs`）、循环神经网络（`RNNs`）乃至最终
    Transformer 的出现铺平了道路。

    - **创新的催化剂**：20 世纪 80 年代神经网络的复兴可被视为一股催化剂，激发了人工智能领域的创新浪潮，催生了处于现代人工智能应用核心的算法与模型。


    总而言之，20 世纪 80 年代代表了神经网络研究的复兴，这在很大程度上归功于反向传播算法的引入。这一时期不仅重燃了人们对这一曾经历严重衰退的人工智能领域的兴趣，也为随后几十年人工智能和机器学习的快速发展奠定了基础。


    ### 20 世纪 90 年代：早期生成模型


    20 世纪 90 年代在生成式人工智能的历史中扮演了关键角色，其标志是神经网络领域的重大发展以及早期生成模型的引入。这一时期的一项关键创新是玻尔兹曼机和受限玻尔兹曼机（`RBMs`）的开发与完善。这些模型对于增进理解神经网络如何学习并表征复杂概率分布起到了重要作用。


    ### 玻尔兹曼机


    - **背景与发展**：玻尔兹曼机以物理学家路德维希·玻尔兹曼的名字命名，开发于 20 世纪 80 年代中期，其根源可追溯到杰弗里·辛顿和特里·谢伊诺夫斯基的研究工作。它是一种随机递归神经网络。

    - **机制**：玻尔兹曼机由对称连接的类神经元单元组成的网络构成，这些单元会随机决定是开启还是关闭。网络中的连接（类似于生物大脑中的突触）具有权重，这些权重在学习过程中进行调整。玻尔兹曼机的学习涉及调整这些权重以最小化网络的能量，遵循类似于统计力学中的原理。

    - **基于能量的模型**：玻尔兹曼机的关键概念是“能量”景观，网络通过学习找到低能量配置来表征训练数据。这是通过一种称为模拟退火的过程实现的，该过程受热力学系统启发。


    ### 受限玻尔兹曼机（RBMs）


    - **引入与演变**：`RBMs`的概念作为原始玻尔兹曼机的一种变体而出现。`RBMs`是简化版本，旨在克服完整玻尔兹曼机的一些计算复杂性。在`RBM`中，网络分为两层：可见层（用于输入数据）和隐藏层（用于特征检测），与全连接的玻尔兹曼机不同，它没有层内连接。

    - **训练与效率**：`RBMs`使用一种称为对比散度的程序进行训练，该方法由杰弗里·辛顿开发。这种训练方法比传统玻尔兹曼机使用的程序更高效，使得`RBMs`在实际应用中更具实用性。

    - **生成能力**：`RBMs`是生成模型，这意味着它们可以学习表征输入数据的概率分布并从中采样。训练后，`RBM`可以生成与训练数据相似的新数据，使其成为早期生成模型的一个例子。


    ### 影响与应用


    - **学习深度表征**：`RBMs`在学习数据的深度表征方面至关重要。它们可以堆叠形成深度信念网络（`DBNs`），这代表了训练深度神经网络能力的一次重大进步。

    - **对深度学习的贡献**：`RBMs`及其训练算法的发展对深度学习领域做出了重大贡献。它们为如何有效训练深度架构提供了见解，并为更先进的生成模型奠定了基础。

    - **应用**：尽管与后来的模型相比，`RBMs`本身并未在实际应用中得到广泛使用，但它们的发展对于理解深度学习和生成模型至关重要。它们曾被探索用于降维、特征学习和协同过滤等任务。


    ### 玻尔兹曼机与 RBMs 的遗产


    20 世纪 90 年代玻尔兹曼机和`RBMs`的发展代表了生成式人工智能历史上的一个奠基时期。这些模型有助于更深入地理解神经网络如何学习复杂分布并生成新数据。这一时期开发的技术和理论为更先进的生成模型铺平了道路，并对随后几十年深度学习兴趣的复苏起到了关键作用。


    ### 21 世纪初：深度学习的进展


    21 世纪初是人工智能领域变革性的十年，尤其是在深度学习的进展方面。这个时代的一个关键发展是 2006 年杰弗里·辛顿及其团队引入的深度信念网络（`DBNs`）。这一突破在展示深度学习架构的潜力和可行性方面发挥了关键作用，为人工智能技术的快速发展铺平了道路。


    ### 深度信念网络（2006 年）


    - **引入与背景**：神经网络领域的领军人物杰弗里·辛顿与他的同事在 2006 年引入了深度信念网络。当时，由于训练困难，神经网络（尤其是深度架构）的潜力尚未得到充分实现。

    - **DBNs 的架构**：`DBN`本质上是多层受限玻尔兹曼机（`RBMs`）的堆叠架构。`DBN`中的每一层旨在学习输入数据日益抽象的表征。较低层捕捉基本特征，而较高层则组合这些特征以表征更复杂的模式。

    - **训练方法**：`DBNs`的创新之处在于其训练方法。该模型采用了一种贪婪的、逐层训练方法。每个`RBM`层以无监督方式独立训练，以对其输入的分布进行建模。当所有层预训练完成后，整个网络可以使用反向传播等监督方法进行微调，特别是用于分类等任务。

    '
- fmt: '### Impact and Contributions


    * **Overcoming Deep Network Training Challenges**: Before the advent of DBNs,
    training deep neural networks was challenging due to problems like vanishing gradients.
    The layer-wise training strategy of DBNs effectively addressed this, making the
    training of deep networks feasible and more efficient.

    * **Demonstrating the Power of Deep Learning**: DBNs were among the first models
    to show that deep neural networks could outperform shallower architectures, particularly
    in tasks involving complex data like images and speech. This was a significant
    proof-of-concept for the deep learning field.

    * **Stimulating Further Research**: The success of DBNs reignited interest in
    neural networks and deep learning. It spurred a wave of research that led to the
    development of other deep learning models, such as deep convolutional networks
    and recurrent neural networks.


    ### Broader Implications


    * **Applications**: Following their introduction, DBNs were applied to various
    domains, including image recognition, video processing, and speech recognition.
    They proved particularly effective in tasks requiring the extraction of hierarchical
    features from raw data.

    * **Influence on Subsequent Models**: The principles of layer-wise training and
    feature abstraction in DBNs influenced the development of other deep learning
    architectures. Subsequent models, like Convolutional Neural Networks (CNNs) and
    autoencoders, benefited from the insights gained from DBNs.

    * **Revival of Neural Networks**: The introduction and success of DBNs played
    a significant role in the revival of interest in neural networks, marking the
    beginning of what is often referred to as the “deep learning revolution.” This
    period saw rapid advancements in AI capabilities and applications.


    ### Legacy of Deep Belief Networks


    The introduction of Deep Belief Networks in the 2000s was a watershed moment in
    the history of artificial intelligence. DBNs not only showcased the feasibility
    and effectiveness of deep neural architectures but also laid a foundation for
    future innovations in deep learning. Their development marked the beginning of
    a new era in AI, characterized by an emphasis on deep, layered architectures capable
    of learning complex, high-level abstractions from data. The legacy of DBNs is
    evident in the modern landscape of AI, where deep learning is a dominant paradigm,
    driving advancements across numerous fields and applications.


    ### 2010s: The Rise of Modern Generative AI


    The 2010s marked a period of significant advancements in the field of Generative
    AI, characterized by the introduction of groundbreaking models and techniques.
    These developments not only expanded the capabilities of AI in creating realistic,
    high-quality content but also paved the way for new applications and raised important
    ethical considerations. Let’s explore some of these key developments in more detail.


    ### Generative Adversarial Networks (GANs, 2014)


    * **Introduction and Concept**: Introduced by Ian Goodfellow and his colleagues
    in 2014, Generative Adversarial Networks (GANs) represented a novel approach to
    generative modeling. A GAN consists of two neural networks: a generator and a
    discriminator. The generator creates data, while the discriminator evaluates it.
    The two networks are trained simultaneously in a competitive manner, with the
    generator aiming to produce increasingly realistic data and the discriminator
    striving to become better at distinguishing real data from fake.

    * **Impact on Image Generation**: GANs quickly became famous for their ability
    to generate highly realistic and high-quality images. They could create photorealistic
    images of objects, scenes, and even human faces that were indistinguishable from
    real images.

    * **Broader Applications**: Beyond image generation, GANs have been used in various
    fields such as art creation, image super-resolution, style transfer, and more.
    They also played a significant role in advancing the field of unsupervised learning.


    ### Variational Autoencoders (VAEs, 2013–2014)


    * **Development and Mechanics**: VAEs, developed around 2013–2014, are another
    important class of generative models. They are based on the framework of autoencoders
    but with a twist: they enforce a probabilistic distribution (usually Gaussian)
    on the encoded representations. This allows VAEs to not just compress data but
    also to generate new data similar to the input data.

    * **Applications and Significance**: VAEs have been particularly influential in
    unsupervised learning. They are used for tasks like image generation, image denoising,
    and more abstract applications like learning latent representations of data which
    can be useful in various data analysis tasks.


    ### Transformer Model (2017)


    * **Revolution in NLP**: The introduction of the transformer model by Vaswani
    et al. in 2017 was a landmark event, especially for natural language processing
    (NLP). The transformer architecture, based on self-attention mechanisms, significantly
    improved the efficiency and effectiveness of processing sequential data, like
    text.

    * **Foundation for Generative Models**: Transformers laid the groundwork for the
    development of powerful generative models in NLP. Models like GPT (Generative
    Pretrained Transformer) and BERT (Bidirectional Encoder Representations from Transformers)
    have their foundations in the transformer architecture and have shown remarkable
    capabilities in generating coherent and contextually relevant text.


    ### GANs for Deepfakes (Mid-2010s)


    * **Emergence of Deepfakes**: The mid-2010s saw the application of GANs in creating
    deepfakes—highly realistic and convincing digital manipulations of audio and video.
    This application showcased the power of GANs in creating lifelike and convincing
    artificial content.

    * **Ethical and Societal Implications**: While the technology behind deepfakes
    highlighted the advancements in Generative AI, it also raised significant ethical
    and societal concerns. The potential for misuse of deepfake technology in misinformation,
    propaganda, and privacy violations brought attention to the need for responsible
    AI development and usage.


    The 2010s were a defining decade for Generative AI, witnessing the emergence of
    models and techniques that pushed the boundaries of what AI could create and emulate.
    From the visually compelling outputs of GANs to the sophisticated language models
    built on transformers, this era marked a shift toward more advanced, versatile,
    and sometimes controversial applications of AI. These developments not only opened
    up new possibilities across various domains but also brought to the forefront
    the importance of ethical considerations and regulations in the rapidly evolving
    field of AI.


    ### 2020s: State-of-the-Art Developments in Generative AI


    The 2020s have continued the rapid advancement of Generative AI, with several
    groundbreaking developments that have not only enhanced the capabilities of AI
    systems but have also expanded the scope of their applications. Key among these
    developments are the introduction of GPT-3, DALL-E, and the emergence of multimodal
    models.'
  raw: '### Impact and Contributions


    *   **Overcoming Deep Network Training Challenges**: Before the advent of DBNs,
    training deep neural networks was challenging due to problems like vanishing gradients.
    The layer-wise training strategy of DBNs effectively addressed this, making the
    training of deep networks feasible and more efficient.


    *   **Demonstrating the Power of Deep Learning**: DBNs were among the first models
    to show that deep neural networks could outperform shallower architectures, particularly
    in tasks involving complex data like images and speech. This was a significant
    proof-of-concept for the deep learning field.


    *   **Stimulating Further Research**: The success of DBNs reignited interest in
    neural networks and deep learning. It spurred a wave of research that led to the
    development of other deep learning models, such as deep convolutional networks
    and recurrent neural networks.


    ### Broader Implications


    *   **Applications**: Following their introduction, DBNs were applied to various
    domains, including image recognition, video processing, and speech recognition.
    They proved particularly effective in tasks requiring the extraction of hierarchical
    features from raw data.


    *   **Influence on Subsequent Models**: The principles of layer-wise training
    and feature abstraction in DBNs influenced the development of other deep learning
    architectures. Subsequent models, like Convolutional Neural Networks (CNNs) and
    autoencoders, benefited from the insights gained from DBNs.


    *   **Revival of Neural Networks**: The introduction and success of DBNs played
    a significant role in the revival of interest in neural networks, marking the
    beginning of what is often referred to as the “deep learning revolution.” This
    period saw rapid advancements in AI capabilities and applications.


    ### Legacy of Deep Belief Networks


    The introduction of Deep Belief Networks in the 2000s was a watershed moment in
    the history of artificial intelligence. DBNs not only showcased the feasibility
    and effectiveness of deep neural architectures but also laid a foundation for
    future innovations in deep learning. Their development marked the beginning of
    a new era in AI, characterized by an emphasis on deep, layered architectures capable
    of learning complex, high-level abstractions from data. The legacy of DBNs is
    evident in the modern landscape of AI, where deep learning is a dominant paradigm,
    driving advancements across numerous fields and applications.


    ### 2010s: The Rise of Modern Generative AI


    The 2010s marked a period of significant advancements in the field of Generative
    AI, characterized by the introduction of groundbreaking models and techniques.
    These developments not only expanded the capabilities of AI in creating realistic,
    high-quality content but also paved the way for new applications and raised important
    ethical considerations. Let’s explore some of these key developments in more detail.


    ### Generative Adversarial Networks (GANs, 2014)


    *   **Introduction and Concept**: Introduced by Ian Goodfellow and his colleagues
    in 2014, Generative Adversarial Networks (GANs) represented a novel approach to
    generative modeling. A GAN consists of two neural networks: a generator and a
    discriminator. The generator creates data, while the discriminator evaluates it.
    The two networks are trained simultaneously in a competitive manner, with the
    generator aiming to produce increasingly realistic data and the discriminator
    striving to become better at distinguishing real data from fake.


    *   **Impact on Image Generation**: GANs quickly became famous for their ability
    to generate highly realistic and high-quality images. They could create photorealistic
    images of objects, scenes, and even human faces that were indistinguishable from
    real images.


    *   **Broader Applications**: Beyond image generation, GANs have been used in
    various fields such as art creation, image super-resolution, style transfer, and
    more. They also played a significant role in advancing the field of unsupervised
    learning.


    ### Variational Autoencoders (VAEs, 2013–2014)


    *   **Development and Mechanics**: VAEs, developed around 2013–2014, are another
    important class of generative models. They are based on the framework of autoencoders
    but with a twist: they enforce a probabilistic distribution (usually Gaussian)
    on the encoded representations. This allows VAEs to not just compress data but
    also to generate new data similar to the input data.


    *   **Applications and Significance**: VAEs have been particularly influential
    in unsupervised learning. They are used for tasks like image generation, image
    denoising, and more abstract applications like learning latent representations
    of data which can be useful in various data analysis tasks.


    ### Transformer Model (2017)


    *   **Revolution in NLP**: The introduction of the transformer model by Vaswani
    et al. in 2017 was a landmark event, especially for natural language processing
    (NLP). The transformer architecture, based on self-attention mechanisms, significantly
    improved the efficiency and effectiveness of processing sequential data, like
    text.


    *   **Foundation for Generative Models**: Transformers laid the groundwork for
    the development of powerful generative models in NLP. Models like GPT (Generative
    Pretrained Transformer) and BERT (Bidirectional Encoder Representations from Transformers)
    have their foundations in the transformer architecture and have shown remarkable
    capabilities in generating coherent and contextually relevant text.


    ### GANs for Deepfakes (Mid-2010s)


    *   **Emergence of Deepfakes**: The mid-2010s saw the application of GANs in creating
    deepfakes—highly realistic and convincing digital manipulations of audio and video.
    This application showcased the power of GANs in creating lifelike and convincing
    artificial content.


    *   **Ethical and Societal Implications**: While the technology behind deepfakes
    highlighted the advancements in Generative AI, it also raised significant ethical
    and societal concerns. The potential for misuse of deepfake technology in misinformation,
    propaganda, and privacy violations brought attention to the need for responsible
    AI development and usage.


    The 2010s were a defining decade for Generative AI, witnessing the emergence of
    models and techniques that pushed the boundaries of what AI could create and emulate.
    From the visually compelling outputs of GANs to the sophisticated language models
    built on transformers, this era marked a shift toward more advanced, versatile,
    and sometimes controversial applications of AI. These developments not only opened
    up new possibilities across various domains but also brought to the forefront
    the importance of ethical considerations and regulations in the rapidly evolving
    field of AI.


    ### 2020s: State-of-the-Art Developments in Generative AI


    The 2020s have continued the rapid advancement of Generative AI, with several
    groundbreaking developments that have not only enhanced the capabilities of AI
    systems but have also expanded the scope of their applications. Key among these
    developments are the introduction of GPT-3, DALL-E, and the emergence of multimodal
    models.'
  trans: '

    ### 影响与贡献


    *   **克服深度网络训练难题**：在深度信念网络出现之前，由于梯度消失等问题，训练深度神经网络极具挑战性。DBNs 的逐层训练策略有效解决了这一问题，使得深度网络的训练变得可行且更高效。

    *   **展示深度学习的强大能力**：DBNs 是最早证明深度神经网络能够超越浅层架构的模型之一，尤其是在处理图像和语音等复杂数据的任务中。这对深度学习领域来说是一个重要的概念验证。

    *   **激发进一步研究**：DBNs 的成功重新点燃了人们对神经网络和深度学习的兴趣。它引发了一波研究浪潮，催生了其他深度学习模型的发展，例如深度卷积网络和循环神经网络。


    ### 更广泛的影响


    *   **应用领域**：自问世以来，DBNs 被应用于多个领域，包括图像识别、视频处理和语音识别。它们在需要从原始数据中提取分层特征的任务中尤其有效。

    *   **对后续模型的影响**：DBNs 中的逐层训练和特征抽象原则影响了其他深度学习架构的发展。后续的模型，如卷积神经网络（CNNs）和自编码器，都受益于从
    DBNs 中获得的见解。

    *   **神经网络的复兴**：DBNs 的引入和成功在重新激发人们对神经网络的兴趣方面发挥了重要作用，标志着通常被称为“深度学习革命”的开端。这一时期见证了人工智能能力和应用的飞速发展。


    ### 深度信念网络的遗产


    21 世纪初深度信念网络的引入是人工智能史上的一个分水岭。DBNs 不仅展示了深度神经架构的可行性和有效性，也为未来深度学习的创新奠定了基础。它们的发展标志着人工智能新时代的开始，其特点是以能够从数据中学习复杂、高层抽象的深度分层架构为重点。DBNs
    的遗产在当今的人工智能格局中显而易见，深度学习已成为主导范式，推动着众多领域和应用的进步。


    ### 2010 年代：现代生成式 AI 的崛起


    2010 年代是生成式 AI 领域取得重大进展的时期，其特点是引入了开创性的模型和技术。这些发展不仅扩展了 AI 创建逼真、高质量内容的能力，也为新应用铺平了道路，并引发了重要的伦理考量。让我们更详细地探讨其中一些关键发展。


    ### 生成对抗网络（GANs，2014 年）


    *   **引入与概念**：由 Ian Goodfellow 及其同事于 2014 年提出的生成对抗网络（GANs）代表了一种新颖的生成建模方法。GAN 由两个神经网络组成：一个生成器和一个判别器。生成器创建数据，而判别器评估数据。这两个网络以竞争方式同时训练，生成器旨在产生越来越逼真的数据，而判别器则努力变得更好地区分真实数据和伪造数据。

    *   **对图像生成的影响**：GANs 因其生成高度逼真和高质量图像的能力而迅速闻名。它们可以创建物体、场景甚至人脸的逼真图像，这些图像与真实图像难以区分。

    *   **更广泛的应用**：除了图像生成，GANs 还被用于艺术创作、图像超分辨率、风格迁移等多个领域。它们在推动无监督学习领域的发展中也发挥了重要作用。


    ### 变分自编码器（VAEs，2013–2014 年）


    *   **发展与机制**：VAEs 大约在 2013-2014 年开发，是另一类重要的生成模型。它们基于自编码器的框架，但有一个关键不同：它们在编码表示上强制施加一个概率分布（通常是高斯分布）。这使得
    VAEs 不仅能压缩数据，还能生成与输入数据相似的新数据。

    *   **应用与意义**：VAEs 在无监督学习中尤其具有影响力。它们被用于图像生成、图像去噪等任务，以及更抽象的应用，如学习数据的潜在表示，这在各种数据分析任务中非常有用。


    ### Transformer 模型（2017 年）


    *   **NLP 领域的革命**：Vaswani 等人在 2017 年引入的 transformer 模型是一个里程碑事件，尤其对于自然语言处理（NLP）领域。基于自注意力机制的
    transformer 架构显著提高了处理文本等序列数据的效率和效果。

    *   **生成模型的基础**：Transformers 为 NLP 中强大生成模型的发展奠定了基础。像 GPT（生成式预训练 Transformer）和
    BERT（来自 Transformer 的双向编码器表示）这样的模型都基于 transformer 架构，并在生成连贯且上下文相关的文本方面展现了卓越的能力。


    ### 用于深度伪造的 GANs（2010 年代中期）


    *   **深度伪造的出现**：2010 年代中期，GANs 被应用于创建深度伪造——高度逼真且令人信服的音频和视频数字篡改。这一应用展示了 GANs 在创建逼真且令人信服的人工内容方面的强大能力。

    *   **伦理与社会影响**：虽然深度伪造背后的技术突显了生成式 AI 的进步，但也引发了重大的伦理和社会担忧。深度伪造技术在虚假信息、宣传和侵犯隐私方面被滥用的可能性，引起了人们对负责任地开发和使用
    AI 的必要性的关注。


    2010 年代是生成式 AI 的决定性十年，见证了突破 AI 所能创造和模仿界限的模型和技术的出现。从 GANs 视觉上引人注目的输出到基于 transformer
    构建的复杂语言模型，这个时代标志着向更先进、更多样化、有时甚至更具争议性的 AI 应用的转变。这些发展不仅为各个领域开辟了新的可能性，也使得在快速发展的 AI
    领域中伦理考量和监管的重要性凸显出来。


    ### 2020 年代：生成式 AI 的最新发展


    2020 年代继续着生成式 AI 的快速发展，几项突破性的发展不仅增强了 AI 系统的能力，也扩展了其应用范围。这些发展中的关键包括 GPT-3、DALL-E
    的引入以及多模态模型的出现。

