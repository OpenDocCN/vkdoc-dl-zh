  trans: '

    #### 确保可及性与包容性


    支撑生成式人工智能的先进技术并未在全球人口中均匀分布。这些强大工具极有可能加深技术前沿群体与技术匮乏群体之间的鸿沟。这种数字鸿沟可能导致权力和影响力集中在少数人手中，而其他人则被剥夺参与这场技术革命的手段。确保生成式人工智能技术具有可及性和包容性，为广泛参与提供机会，对于培育多元且公平的创意产业至关重要。


    ## 总结


    总而言之，虽然生成式人工智能为内容创作带来了令人兴奋的可能性，但它也引发了一系列复杂的法律、质量、伦理、语境、偏见、创造力、环境和可及性挑战。每一项挑战都需要多方利益相关者深思熟虑并采取行动，以确保生成式人工智能在内容创作中的使用是负责任、公平且可持续的。为适应和规范人工智能而演变的法律框架尤为关键，随着技术的不断进步及其应用的日益广泛，这很可能将是一个持续的过程。


    总之，将基于文本的生成式人工智能整合到文档自动化和情感分析中，预示着内容管理和文本分析情感智能的新时代。这项技术通过自动化复杂的文档处理流程，并提供对消费者情感更深入的洞察，显著提升了法律、医疗和客户关系等多个领域的效率与准确性。尽管它带来了诸如复杂模板创建、高级数据处理和细致情感解读等显著优势，但也面临着确保质量一致性、应对伦理与法律复杂性以及解决环境问题等挑战。随着技术的不断演进与适应，尽管存在这些障碍，其颠覆内容创作与分析领域的潜力依然巨大，预示着未来生成式人工智能驱动的解决方案将在管理和理解人类生成的浩瀚文本领域变得愈发不可或缺。


    # 8. 基于感官的生成式人工智能揭秘


    生成式人工智能领域通常让人联想到算法生成文本、图像或音乐的画面。然而，新兴的基于感官的生成式人工智能代表了人工智能领域的范式转变，它涵盖了能够生成类似于人类感知的感官体验的技术。这一人工智能分支专注于以对机器和人类都有意义且可解释的方式创建或增强感官数据。


    在此，我们探讨其在视觉、听觉和多感官类别中的应用，并阐述这些技术如何不仅增强了机器感知，还彻底改变了人机交互。


    ## 类别：视觉、听觉与多感官


    在生成式人工智能的创新世界中，三个关键领域——视觉生成式人工智能、听觉生成式人工智能和多感官生成式人工智能——因其对各行业的变革性影响而脱颖而出。


    视觉生成式人工智能专注于利用生成对抗网络（GAN）和变换器（Transformer）等先进技术创建高分辨率、细节丰富的图像。该技术应用于艺术创作、医学影像、虚拟现实与增强现实、制造业、电子商务和地理空间成像等多个领域。GAN
    凭借其生成器与判别器的独特结构，尤其擅长生成逼真的图像。而借鉴自自然语言处理成功经验的变换器，在处理复杂视觉任务方面也取得了显著进展，能够生成更连贯、语境更准确的视觉输出。


    听觉生成式人工智能深入声音领域，采用循环神经网络（RNN）、卷积神经网络（CNN）、变换器以及适用于音频处理的 GAN 等技术。这一人工智能分支彻底改变了音乐创作、语音合成、娱乐音效设计、语言翻译和电信增强等领域。它尤其以其创建逼真且沉浸式听觉体验的能力而著称，无论是合成语音还是复杂的音乐作品。


    多感官生成式人工智能代表着一次大胆的飞跃，旨在创建同时调动多种感官的连贯体验。该领域利用机器学习框架、传感器技术、机器人和数据处理技术的组合来模拟人类的感官体验。多感官生成式人工智能在医疗保健、教育、零售、娱乐、旅游、烹饪艺术、艺术与设计以及城市规划等领域具有潜在应用。它试图将触觉、嗅觉和味觉等多种感官输出与视觉和听觉元素相结合，以创造完全沉浸式的体验。


    视觉、听觉和多感官这三个生成式人工智能领域共同塑造着一个未来：人工智能不仅能创造出与真实生活难以区分的体验，还能以增强和拓展人类能力的方式进行定制。随着这些技术的持续演进，它们有望改变我们与数字内容互动的方式，在多个领域催生新的创造力、创新和沉浸式体验形式。以下是对这三个领域的更详细阐述。


    ### 视觉生成式人工智能


    视觉人工智能利用 GAN 等技术创建可用于从艺术创作到医学影像等各种用途的细节丰富的高分辨率图像。在虚拟现实领域，视觉生成式人工智能有助于开发可用于训练模拟、游戏和治疗目的的沉浸式动态环境。


    基于感官的生成式人工智能的出现，尤其是在视觉领域，代表着我们创建和与数字图像互动方式的巨大转变。这一转变主要由先进的机器学习模型推动，如 GAN，以及最近开始在视觉领域崭露头角的变换器模型。这些技术是众多应用背后的引擎，其应用范围远超静态图像，深入到了动态、交互式和超逼真的视觉模拟领域。关于特定支持技术的更多细节，请参见第
    9 章“深入探讨支持的视觉算法与计算机视觉”。


    #### 视觉人工智能中的变换器


    以在自然语言处理（NLP）中的成功而闻名的变换器，如今正被改编用于视觉任务（视觉变换器，ViT）。它们可以处理图像块的序列并建模它们之间的关系，使其适用于图像分类、目标检测甚至图像生成等复杂任务。变换器中的自注意力机制允许考虑图像的整个上下文，从而产生更连贯、语境更准确的视觉输出。


    #### 生成对抗网络（GAN）


    GAN 因其生成逼真图像的能力而成为视觉生成式人工智能的基石。它们由两个神经网络——生成器和判别器——组成，通过一个竞争过程同时训练。生成器创建图像，然后判别器将这些图像与真实图像进行对比评估，其目标是生成如此令人信服的图像，以至于判别器无法将其与真实照片区分开来。

    '
- fmt: '### Expanding Realms of Visual AI Application


    **Art and Creative Media**:


    - Artists and designers are using visual Generative AI to push the boundaries
    of creativity, generating novel artworks and designs. Open-source models include
    `LLaVA 1.6`, `CogVLM`, `CogCoM`, `Qwen-VL`, `PaLI-X`, `PaLM-E`, `Fuyu-8B`, `AnyGPT`,
    `CoLLaVO`, and `CogAgent`.

    - Film and media production can use AI to create detailed sets, backgrounds, and
    visual effects, lowering costs and increasing efficiency.


    **Medical Imaging**:


    - `GANs` can augment medical training datasets with synthetic images that preserve
    patient anonymity, enhancing the training of medical professionals without compromising
    privacy.

    - AI-generated medical imagery can assist in planning surgeries or simulating
    medical scenarios for educational purposes.


    **Virtual and Augmented Reality**:


    - In VR, visual Generative AI is creating environments that are richly detailed
    and reactive to user input, providing immersive experiences for training, gaming,
    or exploration.

    - AR applications are benefiting from AI that can accurately overlay digital information
    onto the real world, enhancing user interaction with their environment.


    **Manufacturing and Prototyping**:


    - Visual AI accelerates the design process by generating multiple iterations of
    potential products, allowing for rapid prototyping and market testing.

    - In automotive design, AI-generated visuals help in visualizing new models and
    features with high fidelity.


    **E-commerce and Retail**:


    - AI-generated images allow customers to see products in different colors and
    styles without the need for physical samples.

    - Virtual try-on solutions, powered by visual Generative AI, enable customers
    to visualize clothing, accessories, or makeup on themselves, driving engagement
    and reducing returns.


    **Geospatial Imaging**:


    - AI-generated geographical and topographical maps can assist in urban planning
    and environmental monitoring.

    - Synthetic satellite imagery can be used for strategic planning and simulation
    in areas where current data is unavailable or outdated.


    ### Spotlight on Transformers


    In the context of visual Generative AI, transformers represent an advanced class
    of neural network architectures that are particularly adept at handling sequential
    data, including pixels in images or sequence of images in videos. While `GANs`
    have been pivotal in generating high-quality and high-resolution visuals, transformers
    are beginning to play a significant role in visual tasks due to their ability
    to capture long-range dependencies and understand the context within visual data.


    Here’s an expansion on how transformers are being integrated into visual Generative
    AI:


    **Art and Design Creation**: Transformers are being used to analyze and generate
    art by learning from vast collections of artworks. They can capture the style
    of specific artists or art periods and create new works that reflect those styles,
    offering tools for artists and designers to explore new creative territories.


    **Medical Imaging**: In medical imaging, transformers are applied to enhance image
    quality and generate synthetic medical images for training and research purposes.
    They can learn from sequences of medical images, allowing for the creation of
    detailed anatomical visuals that can aid in diagnosis and treatment planning.


    **VR**: Transformers can contribute to the creation of more coherent and contextually
    rich virtual environments. By understanding the sequence of user actions and visual
    elements, they can generate responsive environments that adapt in real time, providing
    more realistic training simulations for various professions, including healthcare,
    military, and aviation.


    **AR**: In AR applications, transformers can help in overlaying digital information
    onto the real world in a way that is contextually relevant and spatially accurate.
    This can enhance user experiences in gaming, navigation, and information retrieval.


    **Video Generation and Editing**: For video content, transformers can be trained
    to understand the temporal dynamics of video sequences, enabling the generation
    and editing of video content that aligns with narrative structures or follows
    specific directorial styles.


    **Autonomous Vehicles**: In the autonomous vehicle space, visual transformers
    can process inputs from various sensors to create a comprehensive understanding
    of the vehicle’s surroundings, improving decision-making and safety.


    **Fashion and Retail**: Transformers are being used to generate virtual try-ons
    and fashion designs by understanding the context of current fashion trends and
    customer preferences.


    **Content Personalization**: By understanding user preferences and content context,
    transformers in visual Generative AI can personalize visual content, whether it’s
    for individual users in entertainment platforms or for targeted groups in advertising
    campaigns.


    As transformers continue to develop, we can expect to see even more innovative
    applications in the field of visual Generative AI. These applications will be
    measured by KPIs that focus on the quality and relevance of the generated content,
    the efficiency of content creation, the user engagement levels, and the overall
    impact on the business or end-users. The integration of transformer models is
    poised to elevate the capabilities of visual Generative AI, creating visuals that
    are not just impressive in quality but also meaningful and context aware.'
