    layers of interconnected nodes (neurons) that process input data and produce output.
    The strength of these connections (weights) is adjusted during training to minimize
    the difference between the actual output and the desired output.


    *   **Deep Learning**: Deep learning is a subset of machine learning (ML) where
    neural networks with many layers (deep networks) are used. These networks are
    capable of learning complex patterns in large amounts of data, which is crucial
    for generative tasks.


    *   **Supervised vs. Unsupervised Learning**: In supervised learning, the model
    is trained on labeled data (input-output pairs). However, many generative models
    use unsupervised learning, where the model learns to identify patterns and structures
    in unlabeled data.


    *   **Generative vs. Discriminative Models**: Discriminative models learn the
    boundary between classes in a dataset, while generative models learn the underlying
    distribution of the data. Generative models are thus capable of generating new
    data points that are similar to the training data. (More on Generative vs. Discriminative
    Models later on in the chapter.)


    Here is an overview of several key generative models and techniques in AI.


    ### Generative Adversarial Networks (GANs)


    *   **Basic Concept**: GANs consist of two neural networks, a generator and a
    discriminator, which are trained simultaneously. The generator creates fake data
    that resembles the training data, while the discriminator tries to distinguish
    between real and fake data.


    *   **Applications**: GANs are widely used for image generation and manipulation,
    such as creating photorealistic images, art generation, and more recently, in
    deepfakes.


    ### Variational Autoencoders (VAEs)


    *   **Basic Concept**: VAEs are a type of autoencoder that generates new data
    points. They work by encoding input data into a latent space and then decoding
    from this space to reconstruct the input. The variational aspect introduces a
    probabilistic twist, enabling the generation of new data.


    *   **Applications**: VAEs are used in image generation, image denoising, and
    as a tool for understanding high-dimensional data in a lower-dimensional representation.


    ### AutoRegressive Models


    *   **Basic Concept**: These models predict future values in a sequence based
    on past values. Each output element is a function of previous elements.


    *   **Applications**: They are used in time-series prediction, text generation
    (like earlier RNNs and LSTMs), and speech synthesis.


    ### Transformers


    *   **Basic Concept**: Transformers use self-attention mechanisms to process sequences
    of data, and they excel in tasks where understanding the context and relationships
    in data is crucial.


    *   **Applications**: Beyond text generation (like GPT [Generative Pretrained
    Transformer] series), transformers are used in translation (like Google’s BERT
    [Bidirectional Encoder Representations from Transformers]), image recognition
    and generation (like Image GPT), and even in music composition.'
  trans: '

    # 什么是生成式人工智能？


    生成式人工智能处于人工智能的前沿，是一个专注于创造新内容的动态且创新的子领域。它涵盖多种多样的输出形式，包括文本、图像、音频以及其他多媒体形态。生成式人工智能的独特之处在于其基本原则：从现有数据集中学习，并利用所学知识生成原创、通常极具创造性的内容，这些内容与原始数据高度相似或基于其进行外推。


    生成式人工智能的发展历程中取得了显著进步，尤其是在深度学习和先进神经网络架构取得突破性进展之后。这些技术进步不仅提升了生成式人工智能模型的复杂程度，也拓宽了其潜在应用领域。特别是深度学习，凭借其处理和理解大型复杂数据集的能力，在帮助这些人工智能系统捕捉并复现人类生成内容中错综复杂的模式和细微差别方面发挥了关键作用。


    作为一个领域，生成式人工智能融合了创造力与计算力的元素，不断拓展机器所能创造和实现的边界。它开启了一个新时代，人工智能不仅是分析或自动化的工具，更是创作过程中的积极参与者。从创作能与人类艺术家媲美的艺术品，到谱写音乐、撰写文字内容，再到创建逼真的虚拟环境，生成式人工智能的能力持续扩展和演进。


    此外，生成式人工智能的影响已超越艺术和创意领域。它在实际和商业应用中扮演着日益重要的角色，例如个性化内容创作、为训练模型生成逼真的模拟场景，甚至助力药物发现和材料设计。生成式人工智能的多功能性和潜力使其成为现代人工智能研发的关键组成部分，推动着创新，并为不同领域开辟了新的可能性。


    然而，生成式人工智能的快速发展也带来了伦理和社会挑战，尤其是在真实性、知识产权以及潜在滥用等方面。生成逼真内容的能力引发了关于信任、验证以及在一个日益数字化的世界中信息传播影响的诸多问题。随着生成式人工智能能力的持续增长，审慎考量其影响的需求也日益迫切，确保其开发和应用遵循伦理原则和社会规范。


    从本质上讲，生成式人工智能代表了技术、创造力和伦理的交汇，构成了人工智能持续发展旅程中的关键支柱，并在塑造人类表达、创新和互动的未来中发挥着重要作用。


    ## 生成式人工智能的核心概念


    -   **神经网络**：生成式人工智能的核心是神经网络，这是一种受人类大脑启发的计算模型。这些网络由多层相互连接的节点（神经元）组成，用于处理输入数据并产生输出。在训练过程中，会调整这些连接的强度（权重），以最小化实际输出与期望输出之间的差异。


    -   **深度学习**：深度学习是机器学习的一个子集，它使用具有许多层（深度网络）的神经网络。这些网络能够学习大量数据中的复杂模式，这对于生成任务至关重要。


    -   **监督学习 vs. 无监督学习**：在监督学习中，模型使用带标签的数据（输入-输出对）进行训练。然而，许多生成模型使用无监督学习，即模型学习识别未标记数据中的模式和结构。


    -   **生成模型 vs. 判别模型**：判别模型学习数据集中类别之间的边界，而生成模型学习数据的底层分布。因此，生成模型能够生成与训练数据相似的新数据点。（本章稍后将详细介绍生成模型与判别模型。）


    以下是人工智能中几种关键生成模型和技术的概述。


    ## 生成对抗网络


    -   **基本概念**：生成对抗网络由两个神经网络组成：一个生成器和一个判别器，它们同时进行训练。生成器创建与训练数据相似的假数据，而判别器则试图区分真实数据和假数据。


    -   **应用**：生成对抗网络广泛应用于图像生成和操作，例如创建逼真的图像、艺术创作，以及最近在深度伪造中的应用。


    ## 变分自编码器


    -   **基本概念**：变分自编码器是一种生成新数据点的自编码器。它们的工作原理是将输入数据编码到一个潜在空间，然后从这个空间解码以重建输入。变分方面引入了概率性变化，从而能够生成新数据。


    -   **应用**：变分自编码器用于图像生成、图像去噪，以及作为一种工具，以低维表示来理解高维数据。


    ## 自回归模型


    -   **基本概念**：这些模型根据过去的值预测序列中的未来值。每个输出元素都是先前元素的函数。


    -   **应用**：它们用于时间序列预测、文本生成（如早期的 RNN 和 LSTM）以及语音合成。


    ## 变换器


    -   **基本概念**：变换器使用自注意力机制来处理数据序列，并且在需要理解数据上下文和关系的任务中表现出色。


    -   **应用**：除了文本生成（如 GPT 系列），变换器还用于翻译（如谷歌的 BERT）、图像识别和生成（如 Image GPT），甚至用于音乐创作。

    '
- fmt: '### Role of Transformers in Generative AI


    `Transformers`, a type of model introduced in a 2017 paper titled “Attention Is
    All You Need” by Vaswani et al., have revolutionized the field of Generative AI,
    particularly in natural language processing (NLP).


    - **Architecture**: The transformer architecture, pivotal in advancing neural
    network approaches for natural language processing and beyond, features a unique
    design centered around self-attention mechanisms, eliminating the need for recurrent
    layers. Its structure comprises an input-embedding layer that combines word embeddings
    with positional encodings to retain word order information. The core of the transformer
    includes encoder and decoder stacks, each layer within these stacks containing
    two sub-layers: a self-attention mechanism and a feedforward neural network, with
    the decoder also including an encoder–decoder attention mechanism. Residual connections
    and layer normalization follow each sub-layer to facilitate training stability
    and efficiency. The output from the decoder passes through a final linear layer
    and a softmax to predict the next token in a sequence. This architecture enables
    parallel processing of sequences, dramatically improving performance and efficiency
    on tasks requiring understanding of complex dependencies within data, and serves
    as the foundation for subsequent models like `BERT` and `GPT`, revolutionizing
    the machine learning landscape.


    - **Self-attention Mechanism**: The key feature of transformers is the self-attention
    mechanism, which computes a score for how much each element in the input sequence
    should attend to every other element. This allows the model to capture complex
    relationships and dependencies in the data.


    - **Applications in Generative AI**: Transformers have been used to build some
    of the most advanced generative models, especially for text. Models like `GPT`
    (Generative Pretrained Transformer) series by OpenAI are based on this architecture
    and have shown remarkable ability in generating coherent and contextually relevant
    text. They have also been adapted for other generative tasks such as image generation
    (e.g., `DALL-E`) and music composition.


    ### Restricted Boltzmann Machines (RBMs)


    - **Basic Concept**: RBMs are a type of stochastic neural network that can learn
    a probability distribution over its set of inputs.


    - **Applications**: They are used for dimensionality reduction, classification,
    regression, collaborative filtering, feature learning, and topic modeling.


    ### Deep Belief Networks (DBNs)


    - **Basic Concept**: DBNs are composed of multiple layers of stochastic, latent
    variables. They are often constructed by stacking RBMs and fine-tuning the network
    through a process called backpropagation.


    - **Applications**: DBNs are used in image and video recognition, in motion-capture
    data analysis, and in some cases, for generating music.


    ### Flow-Based Generative Models


    - **Basic Concept**: These models, including normalizing flows, focus on directly
    learning the distribution of data. They are designed to create an invertible mapping
    between the data and a latent space.


    - **Applications**: Used for high-fidelity image generation and in scientific
    applications where understanding the data distribution is key.


    ### Challenges and Future Directions


    Generative AI faces several challenges:


    - **Data and Computational Requirements**: Training large transformer models requires
    vast amounts of data and significant computational resources, making it inaccessible
    for many organizations and researchers.


    - **Bias and Ethics**: Since these models learn from existing data, they can perpetuate
    and amplify biases present in the training data. Ensuring that generative models
    are fair and ethical is an ongoing challenge.


    - **Interpretability and Control**: The interpretability and control of Generative
    AI models present a complex challenge, particularly as these models advance in
    their ability to process and generate diverse data forms like text, images, and
    audio. Ensuring these AI systems make decisions and produce outputs that are both
    safe and aligned with human values becomes increasingly difficult. The core of
    the challenge lies in the models’ “black-box” nature, where the internal decision-making
    processes are not easily understood by humans. This opacity complicates efforts
    to predict, explain, or control the AI’s behavior, raising concerns about unintended
    consequences or the generation of inappropriate content. As such, developing mechanisms
    for better understanding and guiding these AI systems is crucial for leveraging
    their capabilities responsibly and ethically, ensuring they contribute positively
    across various domains without compromising safety or ethical standards.


    The future of Generative AI is likely to involve more efficient and scalable models,
    better mechanisms for bias mitigation, and more robust frameworks for ethical
    use. Innovations are likely to focus on improving efficiency, reducing biases,
    and enhancing the control and interpretability of these models. The integration
    of Generative AI with other technologies like AR and VR could lead to more immersive
    and personalized experiences in gaming, training simulations, and interactive
    media. In sectors like healthcare, generative models could aid in drug discovery
    and personalized medicine, while in the creative industries, they could revolutionize
    content creation and design.


    Understanding and harnessing the potential of Generative AI, while addressing
    its ethical and societal implications, remains a critical area of focus for researchers,
    developers, and policymakers alike.


    ## The Various Facets: Text, Senses, and Rationale


    Generative AI operates across diverse modalities such as text, images, audio,
    video, and multimodal applications. These AIs leverage advanced models to generate
    new, realistic content that spans these modalities. They excel in translating
    between data types, enabling applications such as generating images from text
    descriptions or synthesizing speech from written content. Key to these systems
    is their ability to understand the semantic connections between varied data forms,
    facilitating diverse applications from content creation to enhancing augmented
    reality (AR) and virtual reality (VR) experiences. This technology represents
    a significant step forward in AI’s capability to interact with and generate complex,
    cross-modal content, offering innovative solutions across numerous fields. A variety
    of AI models, including but not limited to transformer models, play critical roles
    in these domains. Going forward, in several chapters, there will be mention of
    particular Generative AI companies and what capacities they are good for. Here,
    there is just a summary of what types of Generative AI are good for which kind
    of generation and application.


    ### Text Generation


    - **Transformer Models**: `GPT-4` and its predecessors are prime examples in this
    domain, excelling in generating human-like text for a variety of applications.


    - **Other Models**: Before transformers, models like `LSTM` (Long Short-Term Memory)
    and other `RNNs` (Recurrent Neural Networks) were widely used for sequential data
    like text.


    ### Image Generation


    - **Generative Adversarial Networks (GANs)**: GANs are pivotal in image generation,
    capable of creating photorealistic images and artwork. They involve a generator
    and discriminator network that work in tandem.


    - **Transformer Models**: Adaptations of transformer models like `DALL-E` are
    used for generating images from textual descriptions, demonstrating versatility
    in handling visual content.'
