  尽管 K-means 算法即使对于非常大的数据集也易于实现，但从 AIOps 角度来看，它存在一些挑战。


  *   集群数量对 K-means 算法的效率起着关键作用。

  *   K-means 聚类会因数据集中存在噪声或大量异常值而受到影响。质心会被拉伸以包含异常值或噪声。

  *   较高维度的参数或变量会对算法的效率产生负面影响。


  除了异常检测，AIOps 的另一个常见用例是相关性和关联分析，这将在下一节中讨论。




  ## 相关性与关联性


  相关性是一个统计学术语，指识别两个或多个实体之间的任何关系或关联。从 AIOps 的角度来看，相关性用于确定实体之间的依赖关系或关联，并将它们聚类在一起以便进行高效分析。我们在第
  5 章中介绍了多种用于确定多个实体之间关系以建立相关性的回归算法。


  然而，在事件层建立相关性有些困难，因为来自不同来源的多个事件会在不同的时间间隔内到达。在事件层，基于时间的序列或事件模式相当罕见。在事件层能高效确定相关性和关联性的算法之一是`DBSCAN`，它在数据点彼此接近（密集）且存在大量噪声或异常值的场景中特别有用。


  ### 基于拓扑的相关性


  聚类的准确性是事件管理系统最重要的关键绩效指标之一，它驱动着引擎的效率。为了提高聚类和根因确定的准确性，你需要提供一些拓扑上下文。但 CMDB 和发现本身就是一个挑战，要拥有一个
  100% 准确且能 100% 发现和建模基础设施的 CMDB 是一项艰巨的任务。


  考虑到 CMDB 和发现的各种挑战，拓扑相关性仍然可以用于网络拓扑相关性以及应用拓扑相关性。考虑图 8-16 中所示的示例拓扑。黑色标记的连接代表网络拓扑，而红色标记的连接代表应用拓扑。我们将使用这个示例拓扑来讨论网络拓扑和应用拓扑的相关性。


  ![](img/524834_1_En_8_Fig16_HTML.jpg)


  图表有一个主分支和十个子分支。主分支是网络交换机-1。在该图中，红色箭头表示应用拓扑，黑色箭头表示网络拓扑。


  图 8-16


  示例拓扑图


  ### 网络拓扑相关性


  这种相关性使用网络连接图作为拓扑来执行相关性。例如，如果一个连接了数百台服务器和设备到其接口的核心交换机宕机，那么来自该交换机的告警是因果性的，而来自底层网络设备、服务器以及其上运行的应用的所有其他告警都被视为受影响的。


  IT 运维团队可以专注于因果性的 CI（即网络交换机），而不是因这次中断而在系统中手动筛选告警。这种相关性需要确定起始位置和层级深度，以比较和创建此拓扑，并最终找到因果事件。由于存储整个拓扑或发现所有内容可能不切实际，次优的方法是在事件管理层存储关键设备或应用的拓扑信息子集，用于相关性分析，并每
  24 小时（如果环境变化不大，可以每周）使用自动化发现/脚本或手动方式更新一次。图 8-4 中示例拓扑的网络拓扑可以在事件管理器层存储为键值对，如下所示：


  ```

  {"network_topology": [

  {"child-ci": "dummy-app-1 ", "parent-ci": " ntwrk-switch-1 "},

  {"child-ci": "dummy-app-2 ", "parent-ci": " ntwrk-switch-1 "},

  {"child-ci": "dummy-web-1 ", "parent-ci": " ntwrk-switch-1 "},

  {"child-ci": "dummy-web-2 ", "parent-ci": " ntwrk-switch-1 "},

  {"child-ci": "dummy-db-1 ", "parent-ci": " ntwrk-switch-1 "},

  {"child-ci": "dummy-db-2 ", "parent-ci": " ntwrk-switch-1 "},

  {"child-ci": "dummy-srv-1 ", "parent-ci": " ntwrk-switch-1 "},

  {"child-ci": "dummy-srv-2 ", "parent-ci": " ntwrk-switch-1 "},

  {"child-ci": "dummy-srv-3 ", "parent-ci": " ntwrk-switch-1 "},

  {"child-ci": "ntwrk-lb-1", "parent-ci": " ntwrk-switch-1 "}

  ]}

  ```


  每当生成告警时，事件管理算法将使用这些数据来确定关系、执行相关性分析，并确定因果性和受影响的 CI。此方法依赖于静态信息，因此有其局限性和挑战。存储大量拓扑数据会严重影响事件管理工具的性能。


  从 AIOps 的角度来看，建议将此相关性卸载到网络监控层，该层具有扫描子网范围、发现设备并使用`ICMP`或`SNMP`将其配置到可用性监控中的原生能力。网络监控工具可以实时查看所有
  CI 的可用性及其拓扑，并且可以根据网络变化动态更新它们。网络监控工具应使用检测到的拓扑执行此相关性，过滤掉受影响的 CI 告警，并将因果性告警转发到事件管理层。如果需要，可以将网络监控工具配置为以信息性严重级别转发受影响的
  CI 告警，而以严重级别转发因果性告警。


  如果使用的是开源网络监控工具，其原生基于拓扑的相关性能力有限或没有，组织仍然可以将所需的拓扑数据导入事件管理层，并按照前面讨论的方式执行相关性分析。




  ### 应用拓扑关联


  此关联利用应用组件之间的关系来构建应用架构。它可以简单如一个运行在集群中多个虚拟机监控程序上并托管各种虚拟机的`vCenter`集群。也可以是一个更复杂的业务应用架构，例如一个运行在多个节点上的保险理赔处理系统，这些节点托管着
  Web 服务器、数据库服务器、EDI 系统和 SAP 系统。


  与仅考虑系统可用性的网络拓扑关联不同，应用关联既考虑应用的可用性，也考虑其性能。这种关联不仅需要网络拓扑的详细信息，还需要应用蓝图和关键性能指标的细节。考虑一个例子：当收到一个关于数据库进程宕机的告警时，会进一步引发以下告警：


  - 来自应用服务器的应用队列请求过高

  - 来自 Web 服务器的应用 URL 响应时间过长

  - 来自负载均衡器的合成监控超时告警


  此时，事件管理可能还会收到许多其他不相关的告警。在这种情况下，所有系统都处于运行状态，但问题出在应用层面。此时，应用层面的关联有助于隔离故障。


  理想情况下，应用架构或蓝图应该可用（或被发现）并作为服务模型存储在 CMDB 中。但由于以下三个最常见的原因，组织在维护这些蓝图方面面临诸多挑战：


  - 发现应用拓扑需要领域知识来确定在发现过程中需要检测的模式。发现工具的主题专家并不具备如此广泛的领域知识。

  - 信息是联合的，并且存在于由多个团队管理的不同工具中。

  - 获取读取应用日志/服务/进程的权限存在挑战。日志通常包含 PII/PHI/机密数据，这会引起安全和应用团队的警觉。


  从 AIOps 的角度来看，每当与应用相关的告警到达时，算法应利用应用拓扑来执行必要的关联。考虑到 CMDB 的这些挑战，可以使用 AIOps 算法来学习模式和依赖关系，并自动推导出拓扑。在我们的示例拓扑中，算法可以使用以下特征来理解拓扑并执行应用关联：


  - 通过分析主机名/IP 地址的相似性来学习，因为属于同一应用的服务器通常在主机名中共享共同的前缀或共同的子网细节。

  - 通过分析事件的到达时间并从中检测模式来学习。

  - 通过分析事件中的消息文本来学习，判断其属于可用性类别还是性能类别，或者在短时间内同时出现的事件中是否存在共同的应用/服务名称。

  - 通过分析事件类别和来源来学习。来自多个运维管理数据库（OMDB）的数据，如`vCenter`、`SAP`、`SCCM`等，在此学习过程中非常有用，因为这些是管理不同配置项（CI）的来源。例如，`vCenter`数据库提供了虚拟机到
  ESX 集群的映射数据，其中事件源将是`vCenter`，类别将是`Virtualization`。类似地，`SAP`可以提供应用映射细节，其中源将是`SAP
  System`，类别将是`Application`。算法可以使用这些数据来关联事件，并找出问题是源于底层虚拟机监控程序还是应用性能。

  - 与网络拓扑关联类似，您可以将关键应用的应用拓扑数据存储在事件管理层，并让系统从中学习。除非应用运行在云或 SDI 上，否则应用拓扑的更新频率通常不如网络拓扑数据高，因此可以按月或按季度同步。对于基于云和
  SDI 的应用，使用原生 API 并在变更发生时立即更新拓扑数据相对容易。


  ```

  {"application_topology": [

  {"child-ci": " dummy-db-1 ", "parent-ci": " " ,"application":"dummy_app","kpi":["type":"process","name":"
  dummy-process"]},

  {"child-ci": " dummy-db-2 ", "parent-ci": " " ,"application":"dummy_app","kpi":["type":"process","name":"
  dummy-process"]}

  {"child-ci": "dummy-app-1 ", "parent-ci": " dummy-db-1", "application”: “dummy-app","kpi":["type":"service","name":"
  app_service "]},

  {"child-ci": "dummy-app-2 ", "parent-ci": " dummy-db-2" ,"application":"dummy_app","kpi":["type":"service","name":"
  app_service "]},

  {"child-ci": "dummy-web-1 ", "parent-ci": " ntwrk-lb-1" ,"application":"dummy_app","kpi":["type":"url","name":"
  dummy-url.com "]},

  {"child-ci": "dummy-web-2 ", "parent-ci": " ntwrk-lb-1" ,"application":"dummy_app","kpi":["type":"url","name":"
  dummy-url.com "]},

  {"child-ci": " dummy-web-1 ", "parent-ci": " dummy-app-1 "     ,"application":"dummy_app","kpi":["type":"url","name":"
  dummy-    url.com "]},

