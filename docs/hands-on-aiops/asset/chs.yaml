  \ `Severity` 和枚举值 `Status`。问题详情在 `AlertDescription` 中提供。\n\n为了进行去重示例，我们将去重键命名为 `EMUniqueKey`，并将其创建为\
  \ `Host`、`Source`、`AlertType`、`AlertManager` 和 `AlertClass` 字段的组合，用分隔符 `::` 连接，如图\
  \ 6-7 所示。然后将其添加到数据集中每个事件中。\n\n![](img/524834_1_En_6_Fig7_HTML.png)\n\nE M Unique\
  \ key: Host (Ex. 10.10.10.1) separator Source (Ex. Tablespace) separator Alert type\
  \ (Ex. Oracle) separator Alert Manager (Ex. O E M) separator Alert Class (Ex. database).\
  \ The separator is 4 dots in a square pattern.\n\n**图 6-7** 唯一键组成\n\n```\nraw_events['EMUniqueKey']\
  \ = raw_events['Host'].str.strip() + \"::\" \\\n+ raw_events['Source'].str.strip()\
  \ + \"::\" \\\n+ raw_events['AlertType'].str.strip() + \"::\" \\\n+ raw_events['AlertManager'].str.strip()\
  \ + \"::\" \\\n+ raw_events['AlertClass'].str.strip()\nraw_events['EMUniqueKey']\
  \ = raw_events['EMUniqueKey'].str.lower()\nraw_events = raw_events.sort_values(by=\"\
  AlertTime\")\nraw_events[\"AlertTime\"] = raw_events[\"AlertTime\"].astype(str)\n\
  ```\n\n`EMUniqueKey` 是一个通用标识符，用于唯一标识底层问题，为执行去重提供所需的上下文。\n\n让我们观察在数据集中添加唯一标识符后的数据。\n\
