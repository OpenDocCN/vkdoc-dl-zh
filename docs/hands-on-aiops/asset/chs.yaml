  \n一个 Jupyter 笔记本的弹出窗口，左侧有文件、运行和集群选项。文件选项下包含一些项目，如应用程序、Creative Cloud 文件、桌面、文档和下载。右侧是\
  \ Python 3 的菜单栏，包含文本文件、文件夹和终端选项。\n\n图 6-2\n\nJupyter Notebook 用户界面\n\n一个空白笔记本将在新窗口中启动。你只需在单元格中输入命令，然后点击“运行”按钮来执行它们。为了测试环境是否正常工作，在单元格中输入\
  \ `print(\"Hello World\")` 语句并执行。\n\n本书使用 Python Notebooks 来演示 AIOps 的去重、动态基线设定和异常检测用例；这些\
  \ Notebooks 可在 [`https://github.com/dryice-devops/AIOps.git`](https://github.com/dryice-devops/AIOps.git)\
  \ 获取。你可以下载源代码以跟随本章的练习进行操作。\n\n现在，环境已准备好，可以为多个 AIOps 用例开发和测试算法模型。在进入模型开发之前，让我们先了解一些将用于分析和衡量模型性能的术语。\n\
  \n## 模型性能分析\n\n在实践中，需要创建多个模型来进行预测，量化其预测的准确性非常重要，以便选择性能最佳的模型用于生产环境。\n\n在监督式机器学习模型中，一组实际数据点被分为训练数据和测试数据。模型通过训练数据学习并进行预测，这些预测结果会与训练数据和测试数据进行验证。实际值与预测值之间的差值称为*误差*。目标是选择误差最小的模型。\n\
  \n有多种方法可以分析误差并衡量预测的准确性。以下是最常用的方法。\n\n### 均方误差/均方根误差\n\n在这种方法中，首先通过从预测结果值中减去实际结果值来计算每个数据点的误差。这些误差需要相加，以计算从特定模型获得的总误差。但不同数据点的误差可能为正或负，将它们相加会相互抵消，从而得出错误的结果。为了解决这个问题，在均方误差（MSE）中，对计算出的误差进行平方，以确保正负误差值不会相互抵消，然后对所有平方误差值取平均值，以确定整体准确性。\n\
  \n![](img/524834_1_En_6_Figa_HTML.png)\n\nMSE 的公式等于 1 除以 n 乘以从 i 等于 1 到小写 n 的求和，括号内为\
  \ Y 下标 i 减去 Y 帽下标 i 的平方。\n\n- ![](img/524834_1_En_6_Figb_HTML.jpg) 小写 n。 -> 数据点数量\n\
  - ![](img/524834_1_En_6_Figc_HTML.jpg) 大写 Y 下标小写 i。 -> 特定测试数据点的实际值\n- ![](img/524834_1_En_6_Figd_HTML.jpg)\
  \ 大写 Y 帽下标小写 i。 -> 特定测试数据点的预测值\n\nMSE 还有另一种变体，即对 MSE 取平方根，以提供均方根误差（RMSE）值。MSE/RMSE\
  \ 越低，预测的准确性越高，模型越好。\n\n![](img/524834_1_En_6_Fige_HTML.jpg)\n\nRMSE 的公式等于根号下从 i\
  \ 等于 1 到小写 n 的求和，括号内为 y 帽下标 i 减去 y 下标 i 的平方，再除以 n。\n\nMSE 和 RMSE 都使用“均值”作为基线，这是这些方法最大的问题，因为均值对异常值具有固有的敏感性。简单来说，假设有四个数据点提供给模型\
  \ A 和模型 B。表 6-1 列出了每个模型在每个数据点上获得的误差。\n\n表 6-1\n\n机器学习模型中的样本数据和误差\n\n| 数据点 | 模型 A\
  \ 的误差 | 模型 B 的误差 |\n| --- | --- | --- |\n| D1 | 0.45 | 0 |\n| D2 | 0.27 | 0 |\n\
  | D3 | 0.6 | 0 |\n| D4（异常值） | 0.95 | 1.5 |\n\n模型 B 看起来是更好的模型，因为它除了在一个数据点（该点是异常值并产生了高误差）外，其他预测的准确率达到了\
  \ 100%。另一方面，模型 A 几乎在每个数据点上都产生了小误差。\n\n但如果考虑两个模型的误差均值，那么模型 A 的误差均值将低于模型 B，这会导致对模型准确性的错误解读。\n\
  \n\n\n#### 平均绝对误差\n\n与均方误差类似，平均绝对误差（MAE）方法首先计算实际结果值与预测结果值之间的差值作为误差，但 MAE 不计算误差的平方，而是考虑误差的绝对值。最后，对所有绝对误差值取平均值，以确定整体精度。\n\
  \n![](img/524834_1_En_6_Figf_HTML.jpg)\n\n公式为 `MAE = 1/n * Σ|Yi - ŷi|`，其中 `i` 从\
  \ `1` 到 `n`。\n\n#### 平均绝对百分比误差\n\nMAE、MSE 和 RMSE 的最大挑战之一是，它们提供的绝对值可用于比较多个模型的精度。但由于没有定义用于比较该绝对值的尺度，因此无法验证单个模型的有效性。这些方法的输出可以取任何值，且没有定义范围。\n\
  \nMAPE 不计算绝对误差，而是通过首先计算每个数据点的误差值除以实际值，然后取其平均值，以百分比形式衡量精度。\n\n![](img/524834_1_En_6_Figg_HTML.jpg)\n\
  \n公式为 `MAPE = (100% / n) * Σ|(Yi - ŷi) / Yi|`，其中 `i` 从 `1` 到 `n`。\n\nMAPE 是一个有用的指标，也是最常用的计算精度的方法之一，因为其输出介于\
  \ 0 到 100 之间，可以直观地分析模型性能。当数据点值中没有极端值、异常值或零值时，其效果最佳。\n\n#### 均方根对数误差\n\nRMSE 面临的挑战之一是异常值对整体\
  \ RMSE 输出值的影响。为了最小化（有时甚至消除）这些异常值的影响，存在另一种称为 RMSLE 的方法，它是 RMSE 的一种变体，利用对数性质计算预测值与实际值之间的相对误差，而非绝对误差。\n\
  \n![](img/524834_1_En_6_Figh_HTML.jpg)\n\n公式为 `RMSLE = sqrt((1/n) * Σ(log(ŷi + 1)\
  \ - log(Yi + 1))²)`，其中 `i` 从 `1` 到 `n`。\n\n在实际值与预测值存在巨大差异的情况下，误差会变得很大，导致 RMSE 产生巨大惩罚，但\
  \ RMSLE 能很好地处理这种情况。另外需要注意的是，当预测值或实际值为零时，零的对数未定义。因此，在预测值和实际值上都加 1，以避免这种情况。\n\n####\
  \ 决定系数 - R² 分数\n\n在统计学中，R² 被定义为“因变量中可由自变量预测的变异比例”。它在一个方便的 0–100% 尺度上衡量模型与因变量之间关系的强度。\n\
  \n*   0% 表示模型无法解释响应变量围绕其均值的任何变异。\n*   100% 表示模型解释了响应变量围绕其均值的所有变异。\n\n在拟合线性回归模型后，确定模型对数据的拟合程度非常重要。通常，R²\
  \ 越大，回归模型对观测值的拟合效果越好；然而，其中存在一些注意事项，这超出了本书的讨论范围。\n\n在了解了衡量模型精度的各种方法之后，我们现在将进入第一个\
  \ AIOps 用例，即事件去重。\n\n## 去重\n\n去重是事件管理功能最基础的功能之一，通过处理来自监控底层基础设施和应用程序的多个工具的数百万个事件来减少噪音。考虑一个简单常见的场景：一个批处理作业被触发，导致\
  \ CPU 利用率超过 70% 的警告阈值；15 分钟内，备份启动，将 CPU 利用率推高至 90%，并生成一个严重事件。监控系统每次轮询该系统时，此事件都会重复出现；一旦计划作业结束，CPU\
  \ 利用率将恢复正常。然而，在此期间，它生成了四个具有不同时间戳的事件。但本质上，所有这些事件都代表了服务器上 CPU 利用率高的同一个问题。存在大量此类操作场景，既有简单的也有复杂的，都会生成重复事件。如图\
  \ 6-3 所示，去重功能通过将新事件与系统中现有事件进行比较来验证其唯一性，从而管理这种复杂性；如果找到匹配项，则丢弃该事件，同时增加原始告警的计数器，并根据最新生成的事件更新时间戳。这有助于确保事件控制台不会被同一事件多次充斥。\n\
  \n![](img/524834_1_En_6_Fig3_HTML.jpg)\n\n原始数据到去重数据的去重管理功能示意图。原始数据有 4 个垂直层，包含字母：A\
  \ B C D、D C B A、B A D C 和 B A D C。去重后的数据有 4 个字母：A、B、C 和 D。中间有一个向右的箭头，标记为“去重”。\n\n\
  **图 6-3** 去重功能\n\n为了实现去重功能，需要定义一个唯一键，用于定义唯一的问题及其上下文。该唯一键使用事件中的信息（例如主机名、来源、服务、位置、类别等）动态创建。可以配置规则或算法，将此唯一键与系统中的所有事件进行匹配，并执行去重功能。请注意，此\
  \ AIOps 功能不需要机器学习，只需使用基于规则的去重系统即可完成。\n\n让我们观察去重功能的实际实现。此实现将从输入文件中读取告警。\n\n在我们的代码中，我们将使用\
  \ `Pandas`（一个强大的 Python 库，用于分析和处理告警）以及 `SQLite DB`（一个轻量级的基于磁盘的数据库，用于在处理后存储告警）。与客户端-服务器数据库管理系统不同，`SQLite`\
  \ 不需要单独安装服务器进程，并允许使用 SQL 查询语言的非标准变体访问数据库。`SQLite` 作为嵌入式数据库，在 Web 浏览器等软件的本地/客户端存储中很受欢迎。`SQLite`\
  \ 将整个数据库（定义、表、索引和数据本身）作为单个跨平台文件存储在主机上。\n\n从输入文件读取告警后，将动态创建一个唯一键 `EMUniqueKey`，以确定问题的唯一性并执行去重功能。在代码末尾，我们将确定代码中有多少告警是真实告警，有多少是重复告警。\n\
  \n在此代码中，我们将使用表 6-2 中提到的 Python 库。\n\n**表 6-2** 机器学习中的样本数据和错误\n\n\n\n| 库名称 | 用途 |\n\
