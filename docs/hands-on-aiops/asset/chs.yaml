  \n\n\n#### ACF 与 PACF 分析\n\n##### PACF 图\n\nPACF 图展示了从 0 到 25 的滞后值与相关性的关系。水平轴上的阴影条表示显著性水平。穿过显著性条的值序列大约为：1、-0.35、-0.22、-0.30、-0.20、-0.13、-0.23、-0.12、-0.11\
