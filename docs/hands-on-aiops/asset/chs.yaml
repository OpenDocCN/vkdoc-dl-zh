  \ DB 响应时间的影响\n\n接下来，你需要将自变量（CPU 和内存使用率）的数据点提取到 `X` 中，将因变量（DB 响应时间）的数据点提取到 `Y` 中。\n\
  \n```python\nX = df[['MemoryUtilizationMB','CPUUsage']]\nY = df['DBResponseTime']\n\
  ```\n\n正如在监督学习中讨论的那样，整个带标签的数据集需要被分割成用于学习目的的训练数据和用于验证模型学习准确性或质量的测试数据。现在，需要将这些数据分割成测试数据和训练数据。在我们的示例中，我们考虑使用\
