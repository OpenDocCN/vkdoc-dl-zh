  ]}

  ```


  假设运行在`dummy-db-1server`上的数据库进程宕机，它将生成一个数据库告警，以及来自`dummy-app-1`的应用队列告警和来自`dummy-web-1`服务器的
  URL 响应时间告警。利用上述数据，事件管理系统可以创建集群，关联这些告警，并突出显示哪些是原因，哪些是受影响的对象。


  应用拓扑或服务模型的可用性无疑可以提高算法的准确性，但这并非 AIOps 的必备要求。有监督和无监督机器学习算法都显示出巨大潜力，并且可以在执行应用拓扑关联方面提供很大帮助。


  ## 总结


  本章涵盖了 AIOps 中关于使用 K-means 聚类进行异常检测的重要用例。您还使用了诸如停用词移除和 TF-IDF 等 NLP 技术来理解文本数据。您学习了其他技术，如应用依赖关系映射和
  CMDB，以及它们与 AIOps 的相关性。在下一章中，我们将介绍如何将 AIOps 作为一项实践在组织中建立起来。


  '
- "# 9. 建立 AIOps\n\n本章为 AIOps 之旅提供了最佳实践，并就如何在您的组织中建立 AIOps 提供了指导。\n\n在了解了 AIOps、其技术及其优势之后，现在是时候看看如何在组织中实施\
  \ AIOps 了。图 9-1 描述了在组织中建立 AIOps 实践的步骤。\n\n![](img/524834_1_En_9_Fig1_HTML.jpg)\n\
  \n在组织中实施 AIOps 有 10 个步骤，每个步骤包含两个要点。这些步骤是：定义 AIOps 章程、组建 AIOps 团队、规划环境、数据源和集成方法、安装\
  \ AIOps 引擎、配置 AIOps 功能、部署服务管理功能、自动化功能、衡量成功，以及庆祝和分享成功。\n\n**图 9-1** AIOps 建立流程\n\n\
  让我们从定义 AIOps 章程开始 AIOps 之旅。\n\n\n\n## 第一步：编写 AIOps 章程\n\nAIOps 不仅仅是技术变革，更是一种文化变革，涉及流程和人员技能的调整，因此需要获得高层管理者的承诺才能成功实施。\n\
  \nAIOps 会影响多个职能和团队，包括流程团队、流程负责人、指挥中心和 IT 运维部门。组织中可能还有其他举措，例如站点可靠性工程和 DevOps，这些都需要与\
  \ AIOps 计划保持一致。\n\n制定正式的项目章程、获得资金和高层领导的批准至关重要，这样才能确保 AIOps 项目获得所需的资金和关注。这将有助于获得受项目影响的各种团队的支持。一旦\
  \ AIOps 章程获得批准，下一步就是组建 AIOps 团队。\n\n## 第二步：组建你的 AIOps 团队\n\n下一步是为该项目组建一个团队。这需要一位专职项目经理和具有\
  \ AIOps 经验的领域专家，以及来自其他团队的成员，例如监控、可观测性、流程、ITSM 工具、指挥中心、IT 运维、DevOps 和 SRE 团队。\n\n\
  核心团队将负责实施 AIOps 系统；然而，由于该职能贯穿并集成于其他多种职能，因此建立更高级别的治理和报告机制非常重要。\n\n这是一场文化变革，在那些存在孤岛式层级结构和垂直分割职能的大型企业中，有必要让组织变革管理和人力资源团队参与进来，以便有效地推动跨职能变革，并通过流程导向的方法来处理变革中的人员方面问题。在此阶段，你需要开始探索和评估\
  \ AIOps 实施的范围和目标，我们将在下一步中对此进行介绍。\n\n## 第三步：定义你的 AIOps 蓝图\n\n在着手任何技术变革之前，必须明确目标以及你试图达成的成果。团队应审视\
  \ AIOps 的各个领域，并确定最适合他们的方案。\n\n下一步应该是定义实施 AIOps 的子集，或者定义一种分阶段实施的方法，逐步推出各种功能和特性。\n\
  \n因此，你可以为特定业务线部署完整的 AIOps 功能套件，也可以逐步为整个企业逐个模块地实施。决策应基于组织结构、团队结构和规模、以及复杂程度。对于高度孤岛化的大型组织，最好在某个业务垂直领域实施；而中型组织则可以着手为整个组织进行实施。\n\
  \n规划阶段的第一步是收集有关当前各种工具、技术以及 ITSM 流程实施情况的数据。这应包括以下内容：\n\n-   当前的监控工具布局\n-   当前的基础设施和应用布局\n\
  -   拓扑/CMDB 的数据源\n-   服务管理工具\n-   流程\n-   指挥中心职能和流程\n-   解决小组和流程\n-   当前监控和管理中的问题和挑战\n\
  -   现有的事件关联基于规则的策略\n-   自动化覆盖范围和工具\n\n收集完所有这些数据后，有必要在此阶段设置一个关卡。对这些数据的分析将有助于更好地了解组织在监控和服务管理方面的成熟度。对这些数据的分析可能会导致另一个子项目，其中需要增强或更改监控或服务管理的一些基本要素，以便\
  \ AIOps 项目能够获得其运行所需的集成和数据。\n\n如果分析结果导致需要另一个子项目来增强监控和管理工具或流程，则应将其作为同一总计划下的独立项目来处理，因为该项目的负责人可能不同。AIOps\
  \ 项目可以继续其进程，而监控增强项目则并行运行。\n\n作为数据收集的一部分，你应该收集当前 KPI 的数据，以便在实施 AIOps 前后对 KPI 进行比较。以下\
  \ KPI 是衡量 AIOps 部署成功与否的重要指标，应在实施前以及部署 AIOps 后持续进行衡量。\n\n-   告警与事件比率\n-   平均响应时间\n\
  -   平均解决时间\n-   P1 和 P2 的 SLA 指标\n-   服务请求关闭时间\n-   自动解决的服务请求百分比\n-   自动解决的事件百分比\n\
  -   关键系统的可用性\n\nAIOps 旅程的下一步是定义数据源及其集成。\n\n## 第四步：定义集成和数据源\n\n在收集了环境的相关数据后，你将清楚需要哪些集成。集成将主要涉及以下系统：\n\
  \n-   监控工具\n    -   SNMP（NetBackup、SAP Solman 等）\n    -   Syslog（配置变更告警、UNIX 内核告警等）\n\
  \    -   API（Zabbix、vCenter 等）\n    -   其他基于数据库的连接器\n-   使用 API 的服务管理工具\n-   使用\
  \ API 的 CMDB\n-   使用 API 的知识管理源\n-   使用 API 的自动化工具\n\n通常，你会在环境中发现多个监控工具。其中一些支持 API，数据可以通过基于\
  \ API 的连接器导入 AIOps。像 vCenter 这样的工具提供 API 来检查底层虚拟化基础设施的状态；其他工具可能发送基于 SNMP 的告警。例如，SAP\
  \ Solman 会为 SAP 资源触发 SNMP 告警。有多种选项可以将数据导入 AIOps 引擎；应根据最佳方法对这些选项进行评估和实施。\n\n通常，你会在环境中看到网络监控、服务器监控和应用监控工具，以及用于监控备份、作业、存储和其他\
  \ OEM 设备的专用工具。所有这些都需要与 AIOps 引擎集成，以便所有监控数据都驻留在单一引擎中，用于分析和训练其算法。\n\n从服务管理的角度来看，通常只有一个工具，CMDB\
  \ 可能与 KEDB 和基本知识管理位于同一工具集中。大多数主流工具都提供 API，因此可以轻松使用基于 API 的连接器为这些系统导入数据。\n\n自动化工具可能会根据你为\
  \ AIOps 规划的用例以及你是计划直接与 AIOps 集成还是通过服务管理工具集成来进行集成。\n\n即使在 AIOps 引擎被训练之前，一旦集成完成，组织就会开始看到单一管理视图带来的好处，所有告警都集中在一个控制台中。\n\
  \n此阶段标志着 AIOps 旅程中一个重要步骤的完成，即先决条件已满足，你实际上可以开始安装、部署和配置步骤，这些将在后续章节中介绍。\n\n\n\n"
- '# 第 5 步：安装和配置 AIOps 引擎


  在确定所有数据源和数据后，下一步是开始安装 AIOps 引擎。这取决于您选择的工具和技术。由于这些系统较为复杂，组织通常会向熟悉产品并具备实施这些解决方案所需专业知识的合作伙伴寻求实施服务或专业服务。核心
  AIOps 团队可以在 AIOps 引擎实施过程中进行观摩学习，积累专业知识。或者，如果内部具备所需的技能和专业知识，团队也可以自行开始构建解决方案。


  对于大型、复杂的部署，强烈建议采用分阶段的方法，以确保对服务或业务的影响最小化甚至为零。试图在最短时间内快速完成所有事情需要良好的经验和多个利益相关者的支持。在实施的第一阶段或初始阶段，安装基础的
  AIOps 解决方案，并根据前面第 3 步和第 4 步的输出，选择并集成 APM（事务监控）、平台和网络数据源。这些集成将提供对服务器、数据库和网络设备运行状况的可视性，这涵盖了组织的大部分资产。


  此阶段为后续阶段提供了良好的学习和充分的信心。然后，可以利用第一阶段学到的经验来改进现有集成，并在后续阶段执行其他数据源的集成，例如 APM（深度分析）、存储、备份、VMware、SAP
  Solman、作业调度等。需要注意的是，在特定阶段选择用于集成的数据源取决于组织需求的紧迫性和关键性。


  按照第 3 步和第 4 步的定义，将所有数据源集成到 AIOps 引擎中可能需要时间，具体取决于其覆盖范围、成熟度以及组织流程。例如，计划集成 `vCenter`，但并非所有
  ESX 和集群都已在其配置中，或者存储（如 EMC）的升级恰逢其与 AIOps 引擎的集成。实际上，要深入了解所有技术栈（尤其是在大型组织中）是很困难的，这就是为什么持续反馈对于调整集成和扩大覆盖范围至关重要。


  为了降低复杂性并缩短价值实现时间（TTV），可以利用 SaaS 平台。在 SaaS 平台上，不涉及安装，因此一旦 AIOps 供应商将您接入平台，您就可以直接开始配置解决方案。


  一旦 AIOps 引擎设置并配置完成，下一步就是设置和测试集成。这涉及配置和集成集成适配器。每个数据源在集成设置后都需要进行测试，以验证所需数据是否被正确捕获到
  AIOps 引擎中。


  如果您直接与自动化系统集成，那么到自动化的出站集成也需要设置和配置。


  在此阶段，您的 AIOps 系统已设置完毕，可供运维团队进行验证，他们可以在单个控制台中查看所有事件和告警。您可以继续根据角色配置角色、用户和访问权限，并为他们提供所需的控制台和仪表板。


  在此阶段，您的 AIOps 引擎充当所有数据源的中央存储库，但尚未执行任何用于事件管理的 AIOps 功能和特性。


  '
- '# 第 6 步：配置 AIOps 功能


  下一步是利用平台的核心 AIOps 功能来配置事件管理功能。我们已经在前面章节中介绍了事件管理的各个层面；这些都需要在系统中实施和配置。对于大型和复杂的部署，此步骤与第
  5 步的集成阶段并行进行。诸如去重、富化、拓扑关联、应用关联、异常检测等功能，会处理来自各种数据源集成的事件，并选择合格的告警用于创建事件以及后续的诊断和修复自动化。同样，在配置
  AIOps 特性和功能时，持续反馈对于调整 AIOps 引擎的性能和准确性至关重要。我们已经在前面章节中详细讨论了这些 AIOps 功能的实施和最佳实践。


  配置完所有功能后，系统开始从数据和运维团队提供的反馈中学习，形成一个持续循环，其中新数据和新反馈为 AIOps 引擎提供新的输入，使其能够自我微调，提高覆盖范围和准确性。


  一旦您设置好一切并且系统启动并运行，您应该持续监控系统的准确性以及数据中可能发生的任何漂移。在其生命周期内，环境中可能会出现需要与 AIOps 引擎集成的新集成和新工具。当环境中引入新的监控能力时，需要处理这些情况。


  '
- '# 第 7 步：部署服务管理功能


  接下来，您可以开始在服务管理领域使用 AIOps 的能力。正如之前在 Engage 层中定义的，可以实施逐步的方法，每个功能或特性都可以作为计划的一部分推出。AIOps
  服务管理中的详细活动将从 Observe 层与事件创建和分配的集成开始，然后按顺序实施 Engage 层中的其余功能。倾向于高度谨慎方法的组织可以首先选择性地进行自动事件创建，例如仅针对生产服务器或仅针对宕机事件创建自动事件，然后逐步将自动事件和自动分配扩展到其他类型的合格告警，持续改进平均响应时间和平均修复时间。


  '
- '# 第 8 步：部署自动化功能


  一旦 AIOps 引擎为 Observe 和 Engage 阶段配置完成，就可以配置自动化操作了。


  自动化引擎需要分两个阶段进行配置。第一阶段可称为“人工辅助自动化”，即 AIOps 引擎提供可能的原因，需要人工代理进行验证；自动化引擎提供解决建议，也需要人工代理进行验证。


  一旦 AIOps Observe 引擎运行数周并达到一定的置信度分数，并且一旦可能的原因可以被视为根本原因，并且自动化引擎的置信度分数也基于人工操作的反馈达到了阈值，我们就可以继续将系统部署为全自动模式。


  从此以后，系统将逐步在其知识库中添加更多的根本原因和自动化操作，以在全自动模式下覆盖更多领域。


  确保监控所有模块的准确性，并跟踪和修复可能发生的任何漂移，以维持准确性水平。环境中可能会部署新的自动化运行手册和工具，并且当它们可用时，将需要进行集成。


  一旦 AIOps 系统设置完毕并准备就绪，就可以观察和衡量其价值和收益了。




  '
- '# 第 9 步：衡量成功


  一旦实施部署完成，就该衡量你所处的阶段了。在项目初期，当你踏上 AIOps 之旅时，你已经衡量了初始的关键绩效指标（KPI）。现在是时候再次衡量这些 KPI，看看实施后的情况了。请记住，我们之前定义了以下
  KPI：


  - **告警与事件比率**：你应该会看到告警事件比率有显著改善。由于系统中噪音的消除和可能原因的分析，触发事件的虚假告警不再发生或显著减少。这也导致事件管理流程中的事件数量减少，因为虚假或重复的事件现在已被
  AIOps 引擎抑制。

  - **平均响应时间**：平均响应时间显著缩短，因为对事件的自动化分析为响应团队提供了更好的输入，并且部分响应也由系统自动完成。该指标应有明显改善。

  - **平均解决时间**：该指标也应显著减少，因为响应时间缩短了，并且通过自动化解决问题的时间也大大降低。花在尝试不同方案上的时间更少，AIOps 引擎能够引导解决团队找到正确的操作手册来解决问题。该指标还会影响系统的可用性，你应该会看到应用程序和基础设施的可用性有所提升。

  - **P1 和 P2 的 SLA 指标**：由于 SLA 基于响应和解决时间，这些方面的显著改善将转化为更好的 SLA 评分。事实上，运维团队可以回过头来承诺更好的
  SLA，因为使用 AIOps 后运维得到了改进。

  - **服务请求（SR）关闭时间**：作为 AIOps 计划的一部分，服务请求实现了自动化，因此关闭 SR 所需的时间显著减少。由于 SR 被自动处理，错误也更少，从而避免了人为错误。

  - **自动解决的 SR 百分比**：由于自动化解决了许多 SR，这个数字通过自动化显著增加。

  - **自动解决的事件百分比**：一旦自动化作为 AIOps 工具集的一部分建立起来，自动解决的事件数量就会显著增加。

  - **关键系统的可用性**：高度自动化导致诊断和解决事件的时间缩短，从而提高了关键系统的可用性。


