  \n一份 SARIMAX 结果报告，顶部包含多个输出项，标题为：因变量、模型、日期、时间、样本、协方差类型、观测数、对数似然、AIC、BIC 和 HQIC。中间是一个表格，底部有更多输出项，标题为：Ljung-Box、概率、异方差性、概率和\
  \ Jarque-Bera。\n\n**图 7-24** 训练数据上的 ARIMA 模型输出结果\n\n#### 模型准确性检查\n\n在将此模型应用于测试数据之前，需要检查所选分量值组合\
  \ `p,d,q` 下 ARIMA 模型的准确性。有两个关键的统计指标可用于比较不同模型的相对质量。\n\n-   **赤池信息准则 (AIC)**：通过检查模型对调优参数的依赖程度，来验证模型对数据的拟合优度。AIC\
  \ 值越低，模型性能越好。当前 ARIMA `(6,1,2)` 模型的 AIC 值为 2113。\n\n-   **贝叶斯信息准则 (BIC)**：除 AIC\
  \ 外，BIC 还使用了用于拟合的训练数据集中的样本数量。同样，BIC 值较低的模型更受青睐。当前 ARIMA `(6,1,2)` 模型的 BIC 值为 2150。\n\
  \n基于 PACF 和 ACF 图表，可以尝试多个值来降低 AIC 和 BIC 值。目前，我们继续使用 ARIMA `(6,1,2)`。\n\n#### 对训练数据进行预测\n\
  \n让我们将训练数据集中的实际值与模型的预测值绘制在一起，以分析实际值与模型预测值的接近程度。\n\n```python\nprediction_manual=manual_arima_model_fit.predict(dynamic=False,typ='levels')\n\
