  \ left', fontsize=8)\nplt.show()\n```\n\n图 7-26 显示，ARIMA `(6,1,2)` 模型在测试数据集上的性能不佳，其预测值随时间推移而恶化。\n\
  \n![测试数据上的预测分析](img/524834_1_En_7_Fig26_HTML.jpg)\n\n预测分析图，数据点与日期 _ 时间的关系。训练数据、实际数据和预测数据的三条高频波分别从\
  \ 2020 年 1 月的 70 点、2020 年 11 月的 55 点和 2020 年 11 月的 70 点开始，结束于 2020 年 11 月的 70 点、2021\
  \ 年 1 月的 55 点和 2021 年 1 月的 55 点。\n\n**图 7-26** 测试数据上的预测分析\n\n#### 性能指标\n\n让我们使用之前定义的指标来量化模型性能。\n\
  \n```python\ndef forecast_accuracy(forecast, actual):\nmape = np.mean(np.abs(forecast\
  \ - actual)/np.abs(actual)*100)\nmae = np.mean(np.abs(forecast - actual))\nrmse\
  \ = np.mean((forecast - actual)**2)**.5\nrmsle = np.sqrt(mean_squared_log_error(actual,\
  \ forecast))\nreturn({'MAPE : ':mape, 'MAE : ': mae,\n'RMSE : ':rmse, 'RMSLE : ':rmsle\n\
  })\nforecast_accuracy(manual_arima_fc, test_data)\n```\n\n![指标输出](img/524834_1_En_7_Fige_HTML.png)\n\
  \n`{'MAPE : ': 24.071440955749733, 'MAE : ': 11.286266474840719, 'RMSE : ': 13.201605001517883,\
  \ 'RMSLE : ': 0.2593143147566868}`\n\n根据性能指标，模型预测的准确率约为 76%（MAPE = 约 24%）。\n\n\n\
  \n在实际场景中，需要使用 ARIMA 组件的多个值才能得到预测精度最高的模型。手动执行此任务需要大量的时间和统计技术专业知识。此外，要为大量实体（如服务器、参数、股票等）创建模型几乎是不可能的。\n\
  \n有一种称为 Auto ARIMA 的机器学习方法，可以学习组件 `p`、`d`、`q` 的最优值。在 Python 中，有一个名为 `pdarima` 的库，它提供了\
  \ `auto_arima` 函数，用于在模型创建中尝试 ARIMA/SARIMA 组件的各种值，并搜索具有最低 AIC 和 BIC 值的最优模型。\n\n让我们尝试使用\
  \ auto ARIMA 从给定的训练数据集中为 ARIMA 模型找到最优的组件值。在 auto ARIMA 模型中，我们目前将 `seasonal` 指定为\
  \ `False`，以便更深入地探索 ARIMA。对于 SARIMA 模型，此值将为 `true`，以考虑季节性。我们还将提供 auto ARIMA 可以探索的\
  \ `p` 和 `q` 的最大值，以获得最佳模型。让我们将 `max_p` 和 `max_q` 设置为 15，以限制模型的复杂度。\n\n```\n#### 在训练集上拟合\
  \ auto_arima\nauto_arima_model = pm.auto_arima(train_data, start_p = 1, start_q\
  \ = 1,\nmax_p = 15, max_q = 15,\nseasonal = False,\nd = None, trace = True,\nerror_action\
  \ ='ignore',\nsuppress_warnings = True,\nstepwise = True)\n#### 打印摘要\nauto_arima_model.summary()\n\
  ```\n\n根据图 7-27 所示的 auto ARIMA 结果，最佳模型被识别为 ARIMA (6,1,0)，其 AIC 和 BIC 值相比之前的 ARIMA\
  \ (6,1,2) 模型有轻微改善。\n\n![](img/524834_1_En_7_Fig27_HTML.jpg)\n\n预测分析展示了为最小化 AIC 而进行的逐步性能。SARIMAX\
  \ 结果如下所示，包含不同的输出标题：因变量、模型、日期、时间、样本、协方差类型、观测数、对数似然、AIC、BIC、HQIC。\n\n**图 7-27** 对测试数据的预测分析\n\
  \n接下来，仅在测试数据上验证 ARIMA (1,1,1) 的性能。\n\n```\nauto_arima_predictions = pd.Series(auto_arima_model.predict(len(test_data)))\n\
  actuals = test_data.reset_index(drop = True)\nauto_arima_predictions.plot(legend\
  \ = True,label = \"ARIMA 预测\",\nxlabel = \"索引\",ylabel = \"CPU 利用率\",\nfigsize=(10,\
  \ 7))\nactuals.plot(legend = True, label = \"实际值\");\nforecast_accuracy(np.array(auto_arima_predictions),\
  \ test_data)\n```\n\n如图 7-28 所示，并且根据获得的性能指标，ARIMA (1,1,1) 模型的精度进一步下降。\n\n![](img/524834_1_En_7_Fig28_HTML.jpg)\n\
  \n一张 CPU 利用率与索引的关系图。图中绘制了一条频率波和一条曲线。频率波表示实际值，从 (0, 70) 开始，到 (40, 95) 结束。曲线表示 ARIMA\
  \ 预测，从 (0, 65) 开始，到 (95, 68) 结束。这些点是近似值。\n\n**图 7-28** 对测试数据 ARIMA (1,1,1) 的预测分析\n\
  \n显然，ARIMA 模型在此场景中不适用，我们需要使用 `seasonal_decompose` 包来查找数据中的季节性。\n\n```\nseasonality_check\
  \ = seasonal_decompose(cpu_util_raw_data['cpu_utilization'],\nmodel='additive',extrapolate_trend='freq')\n\
  seasonality_check.plot()\nplt.show()\n```\n\n基于图 7-29 中的图表，我们可以观察到数据中的季节性，这意味着我们应该使用\
  \ SARIMA 模型。\n\n![](img/524834_1_En_7_Fig29_HTML.jpg)\n\n四个图表。图表 1，CPU 利用率与日期时间的关系，绘制了一条高频波。图表\
  \ 2，趋势与日期时间的关系，绘制了一条低频波。图表 3，季节性与日期时间的关系，绘制了一条高度相同的高频波。图表 4，残差与日期时间的关系，绘制了一个散点图。\n\
  \n**图 7-29** 时间序列季节性检查\n\n让我们使用启用了季节性的 auto ARIMA 来探索 SARIMA 模型。由于我们有每日数据点，并且根据季节性图表，似乎存在周季节性，因此我们将\
  \ SARIMA 组件的值设置为 `m = 7`。\n\n```\n#### 季节性 - 拟合逐步 auto-ARIMA\nsarima_model = pm.auto_arima(train_data,\
  \ start_p=1, start_q=1,\ntest='adf',\nmax_p=15, max_q=15, m=7,\nstart_P=0, seasonal=True,\n\
  d=None, D=1, trace=True,\nerror_action='ignore',\nsuppress_warnings=True,\nstepwise=True)\n\
  sarima_model.summary()\n```\n\n如图 7-30 所示，auto ARIMA 尝试了各种组合，并将 SARIMA (3,0,2)(0,1,1)[7]\
  \ 检测为最佳拟合模型，其 AIC 值与之前的 ARIMA 模型相比有显著改善。\n\n![](img/524834_1_En_7_Fig30_HTML.png)\n\
  \n在训练数据上的自动 ARIMA 模型执行结果展示了为最小化 AIC 而进行的逐步性能。SARIMAX 结果如下所示，包含不同的输出标题：因变量、模型、日期、时间、样本、协方差类型、观测数、对数似然、AIC、BIC、HQIC。\n\
  \n**图 7-30** 在训练数据上的自动 ARIMA 模型执行结果\n\n让我们验证这个新 SARIMA 模型的结果。\n\n```\nsarima_predictions\
  \ = pd.Series(sarima_model.predict(len(test_data)))\nactuals = test_data.reset_index(drop\
  \ = True)\nsarima_predictions.plot(legend = True,label = \"SARIMA 预测\",xlabel =\
  \ \"索引\", ylabel = \"CPU 利用率\", figsize=(10, 7))\nauto_arima_predictions.plot(legend\
  \ = True,label = \"ARIMA 预测\")\nactuals.plot(legend = True, label = \"实际值\")\nforecast_accuracy(np.array(sarima_predictions),\
  \ test_data)\n```\n\n在考虑了季节性之后，预测精度提高到约 62%，而 MAPE 降低到约 38%。这种精度的提升也可以通过将 ARIMA\
  \ 和 SARIMA 模型的预测与观察到的实际测试数据绘制在一起，在图 7-31 中观察到。\n\n![](img/524834_1_En_7_Fig31_HTML.jpg)\n\
  \n一张 CPU 利用率与索引的关系图。图中绘制了两条频率波和一条曲线。频率波表示 SARIMA 和实际值。实际值从大约 (0, 70) 开始，到 (40, 95)\
  \ 结束；SARIMA 从大约 (0, 65) 开始，到 (45, 95) 结束。曲线表示 ARIMA 预测，从大约 (0, 65) 开始，到 (95, 68)\
  \ 结束。\n\n**图 7-31** ARIMA/SARIMA 对测试数据的时间序列预测\n\n此模型可用于生成未来预测，以动态确定适当的基线，而不是使用静态的全局基线。这种方法可以显著减少大型环境中的噪声。\n\
  \n该模型还可用于围绕基础设施自动扩缩容的最常见用例之一，尤其是在利用率存在季节性时。SARIMA（或 SARIMAX）模型可用于分析历史时间序列数据，同时考虑季节性和任何外部因素，以预测利用率，并据此在特定时间段内扩缩容基础设施，从而提供潜在的成本节约。\n\
  \n\n\n## APM 与 SecOps 中的自动基线化\n\n与 SecOps 和应用监控相关的监控工具具有不同的特性，因为大多数情况下，它们的监控参数值保持极低，几乎趋近于零，这会导致数据集不平衡，从而提供错误的预测。在这种情况下，更有意义的做法是将峰值或异常的高利用率值（称为*异常*）与预测值进行比较，以计算\
  \ `MASE` 比率，并据此调整机器学习模型，而不是利用通常较低的参数值。异常值是指那些不遵循常规模式并表现出突然峰值（上升或下降）的值。我们将在第 8 章中进一步讨论这些内容。\n\
  \n这些针对安全相关参数的预测阈值可以应用于监控受保护网段的策略，该网段包括定义服务的 IP 地址范围、端口和协议、VLAN 编号或 MPLS 标签。一个合适的策略将动态检测针对不同受保护网段的攻击，并触发合格的告警，而不是产生噪音。\n\
  \n实施具有自动基线化功能的监控解决方案，可以使运维团队快速识别中断、异常和网络攻击，而不是将时间浪费在噪音上，从而带来立竿见影的好处。但组织在采用动态阈值时常常面临一些运营挑战，我们接下来将讨论这些挑战。\n\
  \n### 动态阈值面临的挑战\n\n尽管动态阈值看起来很有前景，但由于担心错过关键告警，其采用面临挑战。尤其是在 AIOps 系统刚刚开始学习过程的初始阶段，组织对预测的准确性会产生很多质疑。此外，大多数开源和原生监控工具不具备此功能。实施基于\
  \ AIOps 的动态阈值涉及使用多种算法和技术，并且需要较长时间的数据才能分析季节性和模式。\n\n## 总结\n\n在本章中，我们介绍了 AIOps 中的一个重要用例，即自动基线化。我们涵盖了可用于此目的的各种回归算法。我们通过使用多种算法（如线性回归、`ARIMA`\
  \ 和 `SARIMA`）对该用例进行了动手实践。在下一章中，我们将介绍各种异常检测算法以及如何在 AIOps 中使用它们。\n\n"
- '# 8. AIOps 用例：异常检测


  在前几章讨论了去重和自动基线化之后，我们现在将沿着 AIOps 成熟度阶梯向上，讨论异常检测，这为迈向主动性提供了巨大飞跃。本章将解释异常检测及其对 IT 运维的用处。


  ## 异常检测概述


  异常检测是识别不寻常或意外数据点的过程。CPU、内存、交换内存、磁盘等的常规事件对运维来说是正常的，但如果出现任何“应用程序宕机”或防火墙事件，则代表了一种异常情况。异常检测的目标是识别数据集中与其它观测值显著不同的此类异常情况（我们称之为*离群点*）。尽管检测异常的任务可以通过所有三种类型的机器学习算法来执行，但其实现主要通过将未标记数据聚类成不同组来广泛进行。在
  IT 运维中，执行服务改进计划是一项常规工作，运维并没有特定的预测目标。相反，他们需要分析大量数据，然后尝试观察相似性并将它们组合成不同的组，以理解异常并制定建议。我们在第
  5 章中简要讨论了无监督机器学习中可用于异常检测的不同聚类算法，而 K-means 聚类是其中最简单、最流行的无监督机器学习算法之一，我们将在本章中探索它。


  ## K-Means 算法


  如第 5 章所述，K-means 是一种基于质心的聚类算法，广泛用于数据挖掘中检测模式并将相似的数据点分组到一个*簇*中。从数学上讲，如果有一个由 `N` 个数据点组成的数据集
  `{x1, . . . , xn}`，如图 8-1 所示，那么我们的目标是将数据集划分为 `K` 个簇。


  ![](img/524834_1_En_8_Fig1_HTML.jpg)


  一个散点图，显示了可以在质心周围创建的不同的簇。有多种方法可以从数据集中确定质心。在散点图中，水平轴值为 0、200、400、600、800 和 1000，垂直轴值为
  0、5000、10000、15000、20000 和 25000。


  图 8-1


  空间中的 `N` 个数据点


  这里，`K` 表示可以在质心周围创建的不同的簇的数量。有多种方法可以从数据集中确定质心，本节将在我们的实现中使用肘部法来确定合适的簇数。数据集中检测到了三个质心，在图
  8-2 中标记为红点。


  K-means 算法试图确定数据点与质心的相似性，并相应地将数据点聚类在这些质心周围，如图 8-2 所示。


  ![](img/524834_1_En_8_Fig2_HTML.jpg)


  一个散点图，用于确定数据点与质心的相似性，并相应地将数据点聚类在这些质心周围。散点图的水平轴值为 0、200、400、600、800 和 1000，垂直轴值为
  0、5000、10000、15000、20000 和 25000。


  图 8-2


  K-means 算法执行的聚类


  IT 运维团队执行手动过滤数百个事件并将相关事件分组到组中的任务，用于各种目的，例如：


  *   *根本原因分析*：将与某个问题或中断相关的事件分组，以了解问题是如何开始发展的。

  *   *性能分析*：将与特定应用或服务相关的事件分组，以分析其性能和相关的瓶颈。

  *   *服务改进*：将产生噪音的事件分组，并分析应在源头更新哪些监控配置或基线以减少噪音并提高服务质量。

  *   *容量规划*：将代表热点的事件分组，这些热点需要通过容量规划流程进行及时的干预和解决。


  从 AIOps 的角度来看，它可能是最简单的聚类算法，可以在广泛的场景中检测异常。在该算法中，首先为每个簇选择一个质心，然后根据数据点与质心的距离将它们分组到簇中。有多种计算距离的方法，例如闵可夫斯基距离、曼哈顿距离、欧几里得距离、汉明距离等。


  聚类是一个迭代过程，用于优化计算距离的质心位置。例如，大多数组织会收到数千个与性能或可用性相关的事件，但很少收到与 DDoS/DoS 攻击相关的安全告警。不仅频率不同，告警文本消息也会不同。在这种情况下，你可以对事件消息应用
  K-means 聚类，将时间尺度上的相关消息分组，而将安全告警作为异常单独处理。




  让我们考虑一个实现场景：系统中存在多个告警，您需要分析告警消息，以区分频繁发生的事件和异常事件，然后尝试确定事件的根因。在此实现中，您将处理文本数据；因此，您必须使用人工智能的一个子领域，即*自然语言处理*（NLP）。您将使用
  NLP 对文本进行分词分析，获取分词的相关性及其在不同事件中的相似性，从而创建聚类。


  首先，您需要导入一些库。在此实现中，您将使用与 NLP 相关的库。


  - *自然语言工具包 (nltk)*：这是一套用于文本分词、解析、分类、词干提取、词性标注和语义推理的库，用于处理人类语言数据，并将其用于统计或机器学习系统中的进一步分析。

  - *sklearn*：这是一个机器学习库，提供了各种算法的实现，例如 K-means、SVM、随机森林、梯度提升等。该库允许您直接在数据上使用这些算法，而无需花费巨大精力手动实现它们。

  - *Genism*：这是一个用于主题建模的重要库，*主题建模是一种用于文本挖掘和发现隐藏在文本集合中的抽象主题的统计模型*。*主题*可以定义为文本语料库中共同出现的术语的重复模式。例如，*switch*、*interface*、*router*
  和 *bandwidth* 这些术语会频繁地一起出现，因此可以归入*网络*这一主题。这不是一种基于规则的方法，不使用正则表达式或基于字典的关键词搜索技术。它是一种无监督的机器学习算法，用于查找一组相关的词语并创建文本聚类。


  您可以从 [`https://github.com/dryice-devops/AIOps/blob/main/Ch-8_Anomaly%20Detection.ipynb`](https://github.com/dryice-devops/AIOps/blob/main/Ch-8_Anomaly%2520Detection.ipynb)
  下载此代码。


