  \ 值：0.000000，ADF 检验结果：时间序列平稳。下方备注：使数据平稳所需的差分阶数：1。\n\n差分后时间序列的 ADF 结果显示 p 值为 0，这证实了数据序列现在是平稳的。可以通过在时间尺度图上绘制原始序列和差分序列来可视化这一点，如图\
