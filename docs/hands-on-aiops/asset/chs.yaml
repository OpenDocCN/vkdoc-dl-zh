  \ Y, \\\ntest_size = 0.2, random_state = 42)\n```\n\n在此阶段，我们将从 `Sklearn` 库中调用 `LinearRegression`，并将训练数据应用（称为\
  \ *fit 方法*）到这个线性回归模型中，以创建方程并从中学习。\n\n```python\nLR = LinearRegression()\n#### fitting\
  \ the training data\nLR.fit(x_train,y_train)\n```\n\n现在可以使用这个模型来预测测试数据上的值。\n\n```python\n\
  y_prediction =  LR.predict(x_test)\ny_prediction\n```\n\n基于测试数据中的 CPU 和内存利用率值，我们的模型预测了\
  \ DB 响应时间值，如图 7-7 的输出所示。\n\n![](img/524834_1_En_7_Fig7_HTML.png)\n\n`array([3.60063185,\
  \ 5.02933512, 2.49967556, 5.33846418, 3.92287079])`\n\n**图 7-7** 测试数据集上的预测数据库响应时间\n\
  \n让我们将机器学习模型的预测值与测试数据集上的实际观测值进行比较。\n\n```python\nindices = np.arange(len(y_prediction))\n\
  width = 0.20\n#### Plotting\nplt.bar(indices, y_prediction, width=width)\n#### Offsetting\
  \ by width to shift the bars to the right\nplt.bar(indices + width, y_test, width=width)\n\
  plt.xticks(ticks=indices)\nplt.ylabel(\"DB Response Time\")\nplt.xlabel(\"Test Dataset\
  \ \")\nplt.title(\"Predicted vs. Actual\")\nvaluesType=['Predicted','Actual']\n\
  plt.legend(valuesType,loc=2)\nplt.show()\n```\n\n如图 7-8 的输出所示，预测值非常接近实际观测值。这表明模型表现良好。\n\
  \n![](img/524834_1_En_7_Fig8_HTML.jpg)\n\n一张预测值与实际值的双柱状图，其中垂直轴代表 DB 响应时间，水平轴代表测试数据集。测试数据集上的值如下：预测值：3.6、5、2.3、5.2\
  \ 和 3.9。实际值：3.3、4.9、2、5.4 和 4。所有值均为近似值。\n\n**图 7-8** 测试数据上 DB 响应时间预测的准确性分析\n\n让我们通过计算模型的\
  \ R2 分数来评估其性能。\n\n```python\nscore=r2_score(y_test,y_prediction)\nprint(\"r2 score\
  \ is \", score)\nprint('Root Mean Squared Error is =',np.sqrt(mean_squared_error(y_test,\\\
  \ny_prediction)))\nr2 score is  0.9679128701220477\nRoot Mean Squared Error is =\
  \ 0.2102141626503609\n```\n\n根据输出，`r2` 分数值为 0.9679，这意味着在给定的 CPU 和内存利用率场景下，模型预测数据库响应时间的准确率约为\
  \ 97%，这相当不错。根据复杂性和需求，可以进一步扩展此模型以包含其他自变量，例如事务数量、用户连接数、可用磁盘空间等，这使得该模型可用于生产环境，以执行容量规划、升级或迁移相关任务，从而改善数据库响应时间，最终提升应用程序性能和用户体验。\n\
  \n\n\n线性回归模型存在一些局限性，它通过计算因变量与一个或多个自变量之间的相关性来进行预测。第一个主要挑战是，变量之间的相关性与任何与之相关的时间序列是相互独立的。线性回归无法在给定自变量值的情况下，预测因变量在“特定时间点”的值。其次，预测完全基于自变量，而没有考虑近期已经预测出的因变量值。为了克服这些挑战，你可以使用时间序列模型，我们将在下一节中讨论。\n\
  \n**注意**\n\n从技术上讲，时间序列在线性回归中也可以被视为一个自变量，但这是不正确的。相反，在这种情况下，应该使用时间序列模型而不是线性回归模型。\n\
  \n## 时间序列模型\n\n为了对基于时间序列的场景进行建模，并预测数据在指定时间间隔内未来的取值，你可以利用时间序列建模。让我们了解时间序列建模中需要的一些重要术语。\n\
  \n### 时间序列数据\n\n任何按固定时间间隔收集的数据都称为*时间序列数据*。数据收集的频率可以是每小时、每天、每周等，只要它是按固定间隔进行的。以下是时间序列数据的常见示例：\n\
  \n*   *股票价格数据*：股票的最高价和最低价通常按日记录。然后，在月度或年度时间框架内进一步分析这些数据，以做出业务决策。\n*   *呼叫中心通话量*：每小时的通话量会被记录。然后，从资源配置的角度，在月度或年度时间框架内分析这些数据，以确定高峰时段的负载。\n\
  *   *销售数据*：销售数据对任何企业都至关重要，通常按月记录销售数据，以预测未来的销售额或组织的盈利能力。\n*   *网站点击量*：网站点击量通常每五到十分钟记录一次，以确定应用程序的负载、检测任何潜在的安全威胁，或扩展基础设施以满足业务需求。\n\
  \n每个时间序列数据都会有一个日期或时间列，以及一个或多个数据列。如果只有一个数据列，则称为*单变量时间序列*；如果有多个数据列，则称为*多变量时间序列*。图\
  \ 7-9 是一个单变量时间序列的示例，展示了服务器的每日平均 CPU 利用率。\n\n![](img/524834_1_En_7_Fig9_HTML.jpg)\n\
  \n一个 CPU 利用率时间序列表，包含两列，标题分别为时间戳和 CPU 利用率 Y。\n\n**图 7-9**\n\nCPU 利用率时间序列\n\n为了进行分析，可能需要通过添加一些额外的辅助列，将单变量时间序列转换为多变量时间序列。借助`TimeStamp`，我们添加了另一列`Day\
  \ of the week`，从图 7-10 中我们可以观察到，与工作日相比，周末的 CPU 利用率出现了异常峰值。\n\n![](img/524834_1_En_7_Fig10_HTML.jpg)\n\
  \n一个 CPU 利用率时间序列分析表，包含三列，标题分别为时间戳、CPU 利用率和星期几。第四行和第五行被高亮显示。\n\n**图 7-10**\n\nCPU\
  \ 利用率的时间序列分析\n\n### 平稳时间序列\n\n时间序列最重要的统计特性之一是*平稳性*，即时间序列的均值和方差不随时间变化，如图 7-11 所示。简单来说，一个平稳时间序列在不同时间戳上可以有不同的值，但生成这些值的底层逻辑或方法保持不变。\n\
  \n![](img/524834_1_En_7_Fig11_HTML.jpg)\n\n一个平稳时间序列的图表，显示一条高频波形图，位于两条平行虚线之间的水平线上。\n\
  \n**图 7-11**\n\n平稳时间序列示例\n\n### 滞后变量\n\n滞后变量是随时间推移而滞后的因变量。`Lag-1`（`Y[t-1]`）表示因变量`Y[t]`在前一个时间单位的值，`Lag\
  \ 2`（`Y[t-2]`）表示`Y[t]`在前两个时间单位的值，依此类推。\n\n考虑前面关于特定时间戳 CPU 利用率的时间序列示例。在此示例中，`Lag-1`（`Y[t-1]`）在\
  \ 2020 年 7 月 3 日下午 2:00 的值将是`Y[t]`在 2020 年 7 月 2 日下午 2:00 的值，即 8.82；而`Lag 2`（`Y[t-2]`）在\
  \ 2020 年 7 月 3 日下午 2:00 的值将是`Y[t]`在 2020 年 7 月 1 日下午 2:00 的值，即 8.33，如图 7-12 所示。\n\
  \n![](img/524834_1_En_7_Fig12_HTML.jpg)\n\n一个滞后变量表，包含四列，标题分别为时间戳、CPU 利用率 Y 下标 t、Lag\
  \ 1 Y 下标 t-1 和 Lag 2 Y 下标 t-2。\n\n**图 7-12**\n\n滞后变量及其值\n\n从数学上讲，如果`Y[t]`与其滞后值`Y[t-1]`、`Y[t-2]`等之间存在关系或相关性，那么可以创建一个模型来检测模式，并利用其滞后值预测同一序列的未来值。例如，假设\
  \ CPU 利用率在每个星期六都增加约 100%；那么可以考虑使用`Lag-7`（`Yt-7`）的值进行预测。\n\n下一步是确定`Y[t]`与其滞后值之间关系的强度，以及有多少滞后值与`Y[t]`具有统计上显著的关系，以便我们可以在预测模型中使用它们。这就是`ACF`和`PACF`图发挥作用的地方，我们接下来将讨论这些内容。\n\
  \n\n\n### ACF 与 PACF\n\n`ACF` 和 `PACF` 都是研究人员用来理解单个时间序列时间动态的统计方法，这基本上意味着检测随时间变化的关联性，通常称为*自相关*。对\
  \ `ACF` 和 `PACF` 的详细讨论超出了本书的范围，因此我们将把讨论限制在 `ACF` 和 `PACF` 的基础知识上，以了解如何在 AIOps 模型开发中使用它们。\n\
  \n`ACF` 是一个统计术语，代表自相关函数，用于衡量时间序列值 `Y[t]` 与其自身滞后值 `Y[t-1]`、`Y[t-2]`、`Y[t-3]` 等的相关性。这种不同滞后的相关性可以使用\
  \ `ACF` 图在 1 到 -1 的尺度上进行可视化，其中 1 表示完全正相关，-1 表示完全负相关。\n\n如图 7-13 所示，y 轴代表相关值，x 轴代表滞后阶数。序列的第一个值总是与自身\
  \ 100% 相关，这就是为什么在 `ACF` 图中，Lag 0 的相关值达到 1。`ACF` 图有助于检测相关数据中的模式。\n\n![](img/524834_1_En_7_Fig13_HTML.jpg)\n\
  \n一个 `ACF` 图，其中 y 轴代表相关值，x 轴代表从 0 到 7 的滞后阶数。x 轴两侧的虚线表示显著性。序列的第一个值从 1 开始，然后逐渐减小，数值大约为\
  \ 8、7、5、-4、-5、-7 和 -8。\n\n**图 7-13** 示例 `ACF` 图\n\n在 `ACF` 图中，两侧各有一条红线，称为显著性线，它创建了一个范围或带，称为*误差带*。跨越这条线的滞后阶数与变量\
  \ `Y` 具有统计上显著的关系。在示例 `ACF` 图中，有三个滞后阶数跨越了这条线，因此直到 Lag 3，都存在统计上显著的关系，而该带内的任何值都不具有统计显著性。\n\
  \n`PACF` 是另一个统计术语，代表偏自相关函数，它与 `ACF` 图类似，不同之处在于它考虑了在消除所有中间滞后效应后，特定时间点上变量与滞后值之间关系的强度。\n\
  \n例如，在图 7-14 的示例 `ACF` 图中，可以看到直到三个滞后阶数都存在显著相关性，但 `PACF` 图则说明了在消除 `Y[t-1]` 和 `Y[t-2]`\
  \ 的任何影响后，`Y[t-3]` 单独与 `Y[t]` 的相关性强度。`PACF` 可以被视为 `ACF` 的一种过滤值。\n\n![](img/524834_1_En_7_Fig14_HTML.jpg)\n\
  \n`PACF` 图，其中 y 轴代表相关值，x 轴代表从 0 到 7 的滞后阶数。x 轴两侧的虚线表示显著性。序列的第一个值从 1 开始，然后逐渐减小，数值大约为\
  \ 6、3、2、-2、-2、-4.5 和 -8。\n\n**图 7-14** 示例 `PACF` 图\n\n现在，我们已经准备好实现两种最常用的时间序列模型 `ARIMA`\
  \ 和 `SARIMA`，通过预测参数的适当监控阈值来进行降噪。这是 AIOps 实现中最常见的用例之一。\n\n### ARIMA\n\n`ARIMA` 是基础性的时间序列预测技术之一；它很流行，并且已被广泛使用了相当长一段时间。这个概念最早由\
  \ George Box 和 Gwilym Jenkins 在 1976 年出版的《时间序列分析：预测与控制》一书中提出。他们定义了一种称为 Box-Jenkins\
  \ 分析的系统方法，用于识别、拟合和使用自回归（AR）技术与移动平均（MA）技术相结合的集成（I）方法，从而形成 `ARIMA` 时间序列模型。\n\n`ARIMA`\
  \ 利用时间序列中包含的模式和信息来预测其未来值。那么，`ARIMA` 是否可能对任何时间序列进行预测呢？例如，使用 `ARIMA` 根据其历史价格预测您最喜爱的股票价格如何？从技术上讲，可以进行预测，但可能根本不准确。例如，股票价格受多种外部因素控制，如公司的季度业绩、政府法规、天气状况、竞争对手的价格等。如果不考虑所有这些因素，`ARIMA`\
  \ 无法提供有意义的预测。重要的是要注意，`ARIMA` 应仅用于表现出以下属性的时间序列：\n\n- 它应该是平稳的，或非季节性的。\n- 过去的值应具有足够的模式（不仅仅是随机白噪声）和信息来预测其未来值。\n\
  - 它应该具有中等到较长的长度，至少包含 50 个观测值。\n\n### 模型开发\n\n`ARIMA` 模型包含三个组成部分。\n\n#### 差分（d）\n\
  \n如前所述，`ARIMA` 模型需要序列是平稳的，但面临的挑战如下：\n\n- 如何使序列达到平稳性\n- 如何验证序列是否变得平稳\n\n有两种方法可以将非平稳序列变为平稳序列。\n\
  \n- 执行适当的变换，例如对数变换或平方根变换，将非平稳序列变为平稳序列，这种方法相对复杂。\n- 一种更可靠且广泛使用的方法是对序列进行差分以使其变为平稳。在这种方法中，计算序列中连续值之间的差值，然后验证结果序列是否平稳。\n\
  \n用于确定时间序列是否平稳的最常用统计检验之一是增广迪基-富勒检验（`ADF` 检验），它是一种单位根检验，用于确定时间序列受趋势影响的强度。简单来说，`ADF`\
  \ 检验验证一个原假设（`H0`），该假设声称时间序列具有某种时间依赖结构，因此是非平稳的。如果这个原假设被拒绝，则意味着时间序列是平稳的。`ADF` 检验计算\
  \ p 值，如果 p 值小于 0.05（5%），则原假设被拒绝。感兴趣的读者可以在线探索单位根检验和 `ADF` 检验的内部工作原理和数学原理。\n\n我们需要持续进行差分，并通过\
  \ `ADF` 检验验证结果，直到我们得到一个具有定义均值的近似平稳序列。为使时间序列平稳而执行的差分次数由模型变量 `d` 表示。\n\n需要注意的是，序列不应被过度差分，否则虽然我们得到了一个平稳序列，但模型参数会受到影响，预测的准确性也会受到影响。检查过度差分的一种方法是，自相关的\
  \ Lag 1 不应变得过于负值。\n\n\n\n### 自回归或 AR(p)\n\n该组件被称为*自回归*，表明因变量 `Y[t]` 可以计算为其自身滞后项\
  \ `Y[t-1]`、`Y[t-2]` 等的函数。\n\n`Y[t] = α + β₁Y[t-1] + β₂Y[t-2] + ... + βₚY[t-p]`\n\
  \n其中：\n\n- `α` 是常数项（截距）。\n- `β` 是滞后项的系数，下标表示其位置。\n- `ε` 是误差项或白噪声。\n\n我们之前讨论过，PACF\
  \ 图显示了在排除中间滞后项的影响后，序列与其滞后项之间的偏自相关。我们可以使用 PACF 图来确定最后一个滞后项 `p`，该滞后项截断了显著线，可以被视为 AR\
  \ 的一个良好估计值。该值由模型变量 `p` 表示，作为 AR 模型的阶数。\n\n基于图 7-15 中的样本 PACF 图，我们可以观察到滞后 1 似乎是穿过显著线的最后一个滞后项。因此，我们可以将\
  \ `p` 设为 1，并将其表示为 `AR(1)`。\n\n![PACF 图](img/524834_1_En_7_Fig15_HTML.jpg)\n\n该 PACF\
  \ 图中，y 轴代表相关值，x 轴代表从 0 到 7 的滞后项。x 轴两侧的虚线表示显著性。序列的第一个值从 1 开始，随后逐渐减小，数值大约为 6、4、3.5、-2、-3、-4\
  \ 和 -8。\n\n**图 7-15** – PACF 图\n\n### 移动平均或 MA(q)\n\n该组件被称为*移动平均*，表明因变量 `Y[t]` 可以计算为先前滞后项中预测误差的加权平均值的函数。\n\
  \n`Y[t] = α + ε[t] + φ₁ε[t-1] + φ₂ε[t-2] + ... + φₚε[t-q]`\n\n- `α` 通常是序列的均值。\n\
  - `ε` 是各自滞后项处自回归模型的误差。\n\nMA 可以检测时间序列数据中的趋势和模式。你可以使用 ACF 图来确定模型变量 `q` 的值，该值表示需要多少个移动平均来消除平稳序列中的任何自相关。从图\
  \ 7-16 的 ACF 图中，我们可以观察到在滞后 2 和滞后 6 之后有一个截断。因此，我们可以尝试使用 `q = 2`、`MA(2)` 或 `q = 6`、`MA(6)`\
  \ 的 ACF。\n\n![ACF 图](img/524834_1_En_7_Fig16_HTML.jpg)\n\n该 ACF 图中，y 轴代表相关值，x 轴代表从\
  \ 0 到 7 的滞后项。x 轴两侧的虚线表示显著性。序列的第一个值从 1 开始，随后逐渐减小，数值大约为 8、7、5、-4、-5、-7 和 -8。\n\n**图\
  \ 7-16** – ACF 图\n\nAR 和 MA 方程都需要进行差分（I 或 d）以创建 ARIMA 模型，该模型表示为 `ARIMA(p, d, q)`。\n\
  \nARIMA 是其他各种自回归时间序列模型的基础，具体如下：\n\n- **SARIMA**：如果在固定的时间间隔内存在重复模式，则称之为*季节性*，此时使用\
  \ SARIMA 模型，其中 S 代表季节性。我们将在下一节中进一步探讨。\n- **ARIMAX**：如果序列依赖于外部因素，则使用 ARIMAX 模型，其中\
  \ X 代表外部因素。\n- **SARIMAX**：如果除了季节性之外，还存在外部因素的强烈影响，则使用 SARIMAX 模型。\n\nARIMA 的一个主要局限性是无法考虑时间序列数据中的季节性，而这在现实场景中很常见，例如每年感恩节和圣诞节假期期间销售额异常高、每月第一周支出较高、周末购物中心人流量大等。这种季节性会在另一种算法（称为\
  \ SARIMA，它是 ARIMA 模型的一个变体）中得到考虑。\n\n### SARIMA\n\n在固定时间间隔内出现的周期性模式被称为*季节性*，应在预测模型中加以考虑，以提高预测的准确性。这就是\
  \ ARIMA 模型被修改以开发出 SARIMA 的方式，该模型考虑了时间序列数据中的季节性，并支持带有季节性成分的单变量时间序列数据。\n\n除了 ARIMA\
  \ 变量之外，SARIMA 还需要四个新组件：\n\n- **p**：时间序列的自回归（AR）阶数。\n- **d**：时间序列的差分（I）阶数。\n- **q**：时间序列的移动平均（MA）阶数。\n\
  - **m（或滞后）**：季节性因子，单个季节性周期要考虑的时间步数。例如，如果是年度季节性，则 `m = 12`；如果是季度，则 `m = 4`；如果是周度，则\
  \ `m = 52`。\n- **P**：季节性自回归阶数。\n- **D**：季节性差分阶数。\n- **Q**：季节性移动平均阶数。\n\nSARIMA 模型的最终表示法指定为\
  \ `SARIMA(p, d, q)(P, D, Q)m`。\n\n\n\n### ARIMA 与 SARIMA 的实现\n\n接下来，我们将在 CPU 利用率数据上对\
  \ ARIMA 和 SARIMA 模型进行示例实现，以预测其阈值。\n\n首先，导入所需的 Python 库。\n\n```python\n#### 数据操作库\n\
  import pandas as pd\nimport numpy as np\n#### 数据可视化库\nimport matplotlib.pyplot as\
  \ plt\n#### 时间序列模型库\nfrom statsmodels.tsa.stattools import adfuller\nfrom statsmodels.graphics.tsaplots\
  \ import plot_acf, plot_pacf\nfrom statsmodels.tsa.arima.model import ARIMA\nfrom\
  \ statsmodels.tsa.stattools import acf\nfrom statsmodels.tsa.seasonal import seasonal_decompose\n\
  #### 机器学习库\nfrom sklearn.metrics import mean_squared_log_error\n#### 时间追踪库\nfrom\
  \ datetime import datetime\n```\n\n从 CSV 文件中读取 CPU 利用率数据到 Pandas 数据框，并检查导入数据的数据类型、列名和数值数量等信息。\n\
  \n```python\ncpu_util_raw_data= pd.read_csv(\"cpu_utilization-data.csv\")\ncpu_util_raw_data.info()\n\
  ```\n\n如图 7-17 所示，共有两列：`date_time` 和 `cpu_utilization`，总计 396 个数据点（第一行为表头）可供分析。\n\
  \n![](img/524834_1_En_7_Fig17_HTML.jpg)\n\n一个模型描述数据文件，表头为 `<class 'pandas.core.frame.DataFrame'>`，其中范围索引为\
  \ 397 个条目（0 到 396），数据列包含两列标题：非空计数和数据类型。数据类型包括 `float64`（1 列）和 `object`（1 列），内存使用量为\
  \ 6.3+ KB。\n\n**图 7-17** 数据文件中的数据概览\n\n将 `date_time` 列的数据类型设置为 `DateTime`，并将其设为索引以对数据框中的数据点进行排序，然后在时间尺度上绘制\
  \ CPU 利用率，如图 7-18 所示。\n\n![](img/524834_1_En_7_Fig18_HTML.jpg)\n\nCPU 利用率实现图，其中纵轴标记为数据点，横轴标记为\
  \ `date_time`。一条高频波形从点 4 开始，大约在点 55 结束。该高频波形的最高点为 88，最低点为 0。\n\n**图 7-18** 时间尺度上的\
  \ CPU 利用率\n\n```python\ntotal_records = cpu_util_raw_data.count()['cpu_utilization']\n\
  cpu_util_raw_data['date_time'] = pd.to_datetime(cpu_util_raw_data['date_time'])\n\
  cpu_util_raw_data.set_index('date_time',inplace=True)\ncpu_util_raw_data = cpu_util_raw_data.sort_values(by=\"\
