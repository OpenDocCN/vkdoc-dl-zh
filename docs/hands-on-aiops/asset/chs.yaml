  `SRE` 面临的挑战是在不同系统之间提高稳定性、可靠性和可用性，而应用团队则以快速的速度交付新功能。为了实现目标，站点可靠性工程师必须比故障提前一步，并快速解决事件。然而，缺乏
  `AIOps` 工具会导致团队被噪音淹没，难以隔离根本原因并提供即时分析和建议。


