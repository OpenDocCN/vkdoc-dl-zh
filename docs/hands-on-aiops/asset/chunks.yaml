    at low levels of accuracy. Thus, the human element, feedback, and training of
    the AIOps engines are important parameters and limitations as well. Trying to
    do root-cause analysis with only unsupervised learning will not be effective as
    it will only be able to flag anomalies, but whether the anomaly is actually causing
    a system degradation or an incident may not be accurately flagged by the AIOps
    engine. Another limitation of root-cause analysis is the nature of incidents in
    the IT domain; an incident may be unique and have a unique combination of events
    that are generated during that incident, and that incident may not have happened
    in the past, so there is no precedence or data in the AIOps engine that it can
    use to arrive at a conclusion. Thus, novel or new incidents with new events previously
    unseen are a challenge for current AIOps systems.


    Thus, we cannot expect the current generation of AIOps systems to accurately pinpoint
    root cause without training by subject-matter experts and human operators. There
    are scenarios where the customers expect the AIOps engine to be a magic wand and
    automatically start finding the root cause and remediation of problems; however,
    deep learning and machine learning systems are dependent on labeled data and training,
    and without this training, the system is incapable of providing accurate results.


    Since root-cause analysis is the most important and complex lever in the entire
    AIOps stack, it is important to pay utmost attention to its implementation and
    continued operations effectiveness. As a future direction, AIOps tools can use
    multiple algorithms and an ensemble of algorithms to do root-cause analysis and
    provide better accuracy even with limited training data.


    Root-cause analysis feeds into automation; without having this process step trained
    and generating accurate results, end-to-end automation and remediation are not
    possible. Once the root cause is identified, it feeds into the automation engine
    to resolve problems automatically and catapult the organization into the highest
    levels of maturity with autohealing.'
  trans: '

    #### 根因分析


    `根因分析`是 AIOps 最重要的模块；这也是运维工作实现最大价值的地方。在事件关联部分，我们已经看到现代分布式应用和基础设施是如何分布的，事件是如何从各种监控和管理系统产生的，以及这如何影响运维团队手动处理海量数据并试图找到问题根因的能力。随着运维工作面临如此复杂性，如果没有事件关联系统的辅助，进行`根因分析`正变得不可能。无论组织采用基于规则的方法还是基于
    AIOps 的方法，如果不利用技术，就不可能进行`根因分析`、问题修复并满足与业务约定的服务水平。


    手动或通过事件关联和自动化分析来识别根因，需要来自不同 IT 领域的多个团队共同协作，分析情况，并就问题可能是什么得出结论。这还需要协作工具，以便不同的利益相关者能够在一个共同的平台上，有效地进行“`根因分析`”。基于
    AIOps 的`根因分析`会审视所有输入到 AIOps 系统的数据，并为团队提供洞察，以便更快、更好地识别根因。由于机器学习技术本质上是概率性的，因此在 AIOps
    术语中，`根因分析`也被称为*可能原因分析*；因此，它可能会为一个根因抛出多个可能的原因，并附带一个置信度分数。分配给事件的置信度分数越高，AIOps 引擎认为该事件是根因的概率就越高。基于可能的原因，运维团队可以进行深入分析，找到最终的根因，并在系统中将其标记为根因。


    `根因分析`利用异常检测、事件关联技术以及监督学习反馈来得出根因。`根因分析`同时利用监督和非监督技术来得出这个结果。


    由于 IT 数据量庞大且依赖于环境，反馈循环是`根因分析`的一个重要方面。运维团队的大脑中存在着大量的隐性知识，这些知识可能没有文档记录，仅以非正式知识的形式存在。当运维团队协作并从系统生成的多种可能原因中标记出根因时，AIOps
    系统会从人类操作员那里学习并更新其模型。因此，系统可以存储运维团队采取的行动，并能从以前的事件中回忆出根因。我们将在反馈部分更详细地讨论这一点；然而，重要的是要理解`根因分析`依赖于人类反馈，没有这一点，`根因分析`的准确性可能会达到一个天花板。


    自动化`根因分析`的好处很多。由于系统通过标记可能原因并消除系统噪音，使人类操作员的工作更轻松，因此平均响应时间和平均解决时间会有显著改善。结合知识管理和来自操作员的反馈循环，`根因分析`随着使用时间的推移，会创建一个强大且高度准确的系统。


    使用机器学习技术进行`根因分析`存在某些局限性。由于这是基于概率的，因此无法保证识别出的根因就是实际的根因。`根因分析`的另一个局限性是，与可以仅使用数据完成的异常检测和预测分析不同，根因依赖于人类反馈。如果没有运维团队的参与，`根因分析`的准确性将保持在较低水平。因此，人为因素、反馈以及
    AIOps 引擎的训练既是重要参数，也是局限性。仅使用非监督学习进行`根因分析`是无效的，因为它只能标记异常，但该异常是否真的导致系统降级或事件，AIOps
    引擎可能无法准确标记。`根因分析`的另一个局限性在于 IT 领域事件的性质；一个事件可能是独特的，并且在该事件期间生成的事件组合也是独特的，该事件过去可能从未发生过，因此
    AIOps 引擎中没有可以用来得出结论的先例或数据。因此，对于当前 AIOps 系统来说，包含前所未见新事件的新型或新事件是一个挑战。


    因此，我们不能期望当前一代的 AIOps 系统在没有领域专家和人类操作员训练的情况下，就能精确地定位根因。有些场景下，客户期望 AIOps 引擎能像魔法棒一样，自动开始寻找根因并修复问题；然而，深度学习和机器学习系统依赖于标记数据和训练，没有这种训练，系统就无法提供准确的结果。


    由于`根因分析`是整个 AIOps 堆栈中最重要且最复杂的杠杆，因此必须对其实现和持续运维有效性给予最高度的关注。作为未来的方向，AIOps 工具可以使用多种算法和算法集成来进行`根因分析`，即使在训练数据有限的情况下也能提供更好的准确性。


    `根因分析`为自动化提供输入；如果没有将这个流程步骤训练好并生成准确的结果，端到端的自动化和修复就不可能实现。一旦根因被识别，它就会输入到自动化引擎中，以自动解决问题，并将组织推向具有自愈能力的最成熟级别。

