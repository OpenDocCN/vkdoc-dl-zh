  trans: '

    # 第 5 步：安装和配置 AIOps 引擎


    在确定所有数据源和数据后，下一步是开始安装 AIOps 引擎。这取决于您选择的工具和技术。由于这些系统较为复杂，组织通常会向熟悉产品并具备实施这些解决方案所需专业知识的合作伙伴寻求实施服务或专业服务。核心
    AIOps 团队可以在 AIOps 引擎实施过程中进行观摩学习，积累专业知识。或者，如果内部具备所需的技能和专业知识，团队也可以自行开始构建解决方案。


    对于大型、复杂的部署，强烈建议采用分阶段的方法，以确保对服务或业务的影响最小化甚至为零。试图在最短时间内快速完成所有事情需要良好的经验和多个利益相关者的支持。在实施的第一阶段或初始阶段，安装基础的
    AIOps 解决方案，并根据前面第 3 步和第 4 步的输出，选择并集成 APM（事务监控）、平台和网络数据源。这些集成将提供对服务器、数据库和网络设备运行状况的可视性，这涵盖了组织的大部分资产。


    此阶段为后续阶段提供了良好的学习和充分的信心。然后，可以利用第一阶段学到的经验来改进现有集成，并在后续阶段执行其他数据源的集成，例如 APM（深度分析）、存储、备份、VMware、SAP
    Solman、作业调度等。需要注意的是，在特定阶段选择用于集成的数据源取决于组织需求的紧迫性和关键性。


    按照第 3 步和第 4 步的定义，将所有数据源集成到 AIOps 引擎中可能需要时间，具体取决于其覆盖范围、成熟度以及组织流程。例如，计划集成 `vCenter`，但并非所有
    ESX 和集群都已在其配置中，或者存储（如 EMC）的升级恰逢其与 AIOps 引擎的集成。实际上，要深入了解所有技术栈（尤其是在大型组织中）是很困难的，这就是为什么持续反馈对于调整集成和扩大覆盖范围至关重要。


    为了降低复杂性并缩短价值实现时间（TTV），可以利用 SaaS 平台。在 SaaS 平台上，不涉及安装，因此一旦 AIOps 供应商将您接入平台，您就可以直接开始配置解决方案。


    一旦 AIOps 引擎设置并配置完成，下一步就是设置和测试集成。这涉及配置和集成集成适配器。每个数据源在集成设置后都需要进行测试，以验证所需数据是否被正确捕获到
    AIOps 引擎中。


    如果您直接与自动化系统集成，那么到自动化的出站集成也需要设置和配置。


    在此阶段，您的 AIOps 系统已设置完毕，可供运维团队进行验证，他们可以在单个控制台中查看所有事件和告警。您可以继续根据角色配置角色、用户和访问权限，并为他们提供所需的控制台和仪表板。


    在此阶段，您的 AIOps 引擎充当所有数据源的中央存储库，但尚未执行任何用于事件管理的 AIOps 功能和特性。


    # 第 6 步：配置 AIOps 功能


    下一步是利用平台的核心 AIOps 功能来配置事件管理功能。我们已经在前面章节中介绍了事件管理的各个层面；这些都需要在系统中实施和配置。对于大型和复杂的部署，此步骤与第
    5 步的集成阶段并行进行。诸如去重、富化、拓扑关联、应用关联、异常检测等功能，会处理来自各种数据源集成的事件，并选择合格的告警用于创建事件以及后续的诊断和修复自动化。同样，在配置
    AIOps 特性和功能时，持续反馈对于调整 AIOps 引擎的性能和准确性至关重要。我们已经在前面章节中详细讨论了这些 AIOps 功能的实施和最佳实践。


    配置完所有功能后，系统开始从数据和运维团队提供的反馈中学习，形成一个持续循环，其中新数据和新反馈为 AIOps 引擎提供新的输入，使其能够自我微调，提高覆盖范围和准确性。


    一旦您设置好一切并且系统启动并运行，您应该持续监控系统的准确性以及数据中可能发生的任何漂移。在其生命周期内，环境中可能会出现需要与 AIOps 引擎集成的新集成和新工具。当环境中引入新的监控能力时，需要处理这些情况。


    # 第 7 步：部署服务管理功能


    接下来，您可以开始在服务管理领域使用 AIOps 的能力。正如之前在 Engage 层中定义的，可以实施逐步的方法，每个功能或特性都可以作为计划的一部分推出。AIOps
    服务管理中的详细活动将从 Observe 层与事件创建和分配的集成开始，然后按顺序实施 Engage 层中的其余功能。倾向于高度谨慎方法的组织可以首先选择性地进行自动事件创建，例如仅针对生产服务器或仅针对宕机事件创建自动事件，然后逐步将自动事件和自动分配扩展到其他类型的合格告警，持续改进平均响应时间和平均修复时间。


    # 第 8 步：部署自动化功能


    一旦 AIOps 引擎为 Observe 和 Engage 阶段配置完成，就可以配置自动化操作了。


    自动化引擎需要分两个阶段进行配置。第一阶段可称为“人工辅助自动化”，即 AIOps 引擎提供可能的原因，需要人工代理进行验证；自动化引擎提供解决建议，也需要人工代理进行验证。


    一旦 AIOps Observe 引擎运行数周并达到一定的置信度分数，并且一旦可能的原因可以被视为根本原因，并且自动化引擎的置信度分数也基于人工操作的反馈达到了阈值，我们就可以继续将系统部署为全自动模式。


    从此以后，系统将逐步在其知识库中添加更多的根本原因和自动化操作，以在全自动模式下覆盖更多领域。


    确保监控所有模块的准确性，并跟踪和修复可能发生的任何漂移，以维持准确性水平。环境中可能会部署新的自动化运行手册和工具，并且当它们可用时，将需要进行集成。


    一旦 AIOps 系统设置完毕并准备就绪，就可以观察和衡量其价值和收益了。

    '
- fmt: '# Step 9: Measure Success


    Once the implementation has been rolled out, it is time to measure where you stand.
    In the initial stages of the project, you measured the initial KPIs when you were
    embarking on the AIOps journey. It is now time to measure these KPIs again and
    see where you stand after implementation. Remember, we had defined the following
    KPIs:


    - **Alert to incident ratio**: You should see a significant improvement in the
    alert incident ratio. Because of the removal of noise in the system and probable
    cause analysis, false alerts that trigger an incident do not happen or are significantly
    reduced. This also results in a lower number of incidents in the incident management
    process since false or duplicate incidents are now suppressed by the AIOps engine.

    - **Mean time to respond**: The mean time to respond is significantly reduced
    since the automated analysis of events provides better input to the response teams
    and some of the response is automated by the system as well. This metric should
    see a marked improvement.

    - **Mean time to resolve**: This metric should also see significant reduction
    since the time to respond is reduced, and the time to resolve problems through
    automation is significantly lower. Less time is spent in trying different options,
    and the AIOps engine is able to guide the resolution teams to the right runbook
    for resolving the issues. This metric also impacts the availability of the systems,
    and you should see an improvement in the availability of the applications and
    infrastructure.

    - **SLA metrics for P1 and P2**: Since the SLAs are based on response and resolution,
    a marked improvement on these would translate to better scores on SLAs. In fact,
    the operations teams can go back and commit on better SLAs because of improvement
    in operations using AIOps.

    - **Time for closure of SRs**: Service requests get automated as a part of AIOps
    initiative, and thus the time required for closure of SRs is significantly reduced.
    There are also fewer errors since the SRs are handled automatically, thus avoiding
    human errors.

    - **Percentage of SRs automatically resolved**: Since automation resolves many
    SRs, this number sees significant increase through automation.

    - **Percentage of incidents automatically resolved**: Once automation has been
    established as part of AIOps toolset, then automated incidents significantly increase.

    - **Availability of critical systems**: A high degree of automation results in
    lower time to diagnose and resolve incidents, and this results in the higher availability
    of critical systems.


    # Step 10: Celebrate and Share Success


    Once you are done with all the layers, the final step in your AIOps journey is
    sharing your success with the business, leadership, and all the teams. Prepare
    a detailed case study leveraging the metrics that you set out to achieve and the
    actual results. Cover how you undertook the journey and what challenges were faced
    and how those were overcome. Share the knowledge with the AIOps community so that
    others can learn from your experiences. You can drop a note to us on your journey
    on AIOps as well at `Feedback@AgileInfraOps.com`.


    Next, let’s discuss some best practices and guidelines for AIOps implementation.


    # Guidelines on Implementing AIOps


    The following are some guidelines when implementing AIOps.


    ## Hype vs. Clarity


    Do not undertake an AIOps project or any other project for that matter because
    it is fancy and hyped. There should be a definitive need and a use case for deploying
    AIOps. Clarity of need and purpose is essential for your successful journey to
    AIOps journey.


    ## Be Goal and KPI Driven


    It is important that you measure your KPIs in the beginning and the end of the
    implementation. There are implementations that will fail because there is no clear
    idea on what the team wants to achieve. Having KPIs and knowing how they get impacted
    by the current project keeps everyone focused on the end outcome.


    ## Expectations


    AIOps applies extensive automation and statistical analysis to the events, performance
    metrics, logs, and trace data collected from monitoring tools to learn behaviors,
    identify anomalies, correlate alerts, reduce noise, and pinpoint root causes.


    One has to understand and accept that machine learning technologies are probabilistic
    in nature, and thus they cannot be 100 percent accurate all the time. The idea
    is to progressively train them to a level of accuracy and confidence where the
    recommendations can be used by the IT operations teams in finding and resolving
    problems.


    ## Time to Realize Benefits


    Have realistic expectations for the time that machine learning needs to analyze
    data, build and train models, and begin providing insights, such as performance
    anomalies, grouped alerts, and root causes. For example, identifying weekly seasonality
    requires at least a couple of weeks of observation.


    Given the time and feedback, AIOps will provide IT operations with more accurate
    insights, allowing better decisions to be made. However, expecting AIOps to be
    a turnkey solution that automates everything on day one is an unrealistic expectation.


    ## One Size Doesn’t Fit All


    Every organization is unique, and you will have differences in infrastructure,
    application landscape, monitoring, and management tools, and hence there will
    be differences in approach, implementation, and the time to realize value. The
    size, scale, and complexity of an environment also have a bearing on the time
    taken to implement and realize value. However, we have seen that AIOps, if implemented
    correctly, provides rapid value realization and positive ROI.


    ## Organizational Change Management


    Familiarity with AIOps tools and processes is one part of the puzzle; however,
    a bigger piece is how to get buy-in from different teams that need to be part
    of this initiative; thus, organizational change management is a key factor in
    successful AIOps projects.


    ## Plan Big, Start Small, and Iterate Fast


    Rather than attempting to do everything in one massive undertaking, start small.
    That gives you the chance to learn from your accomplishments, validate and fine-tune
    your approach, acquire and build on capabilities, and achieve all-important quick
    wins for your organization. Taking on too much at once can lead to disappointments
    and may lead to poor business adoption.


    ## Continually Improve


    Once it’s deployed, you can continuously improve by extending the coverage and
    scope of AIOps and fine-tuning its algorithms to gain higher accuracy. AI is a
    dynamic and fast-evolving field, and newer technologies in AI are emerging that
    can impact how AIOps will be delivered in the near future.'
