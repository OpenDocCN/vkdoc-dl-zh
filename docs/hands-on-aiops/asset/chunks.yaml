    for i,v in enumerate(event_msg):

    event_msg[i] = preprocess(v)

    for i,v in enumerate(event_msg):

    event_msg[i] = " ".join(v)

    ```


    For each event sentence, we have the relevant tokens for analysis. Now we need
    to map these text tokens from the vocabulary to a corresponding vector of real
    numbers so that we can apply statistical algorithms. This process is called *vectorization*.


    You will be using TF-IDF for the vectorization process. TF-IDF is a statistical
    measure to calculate the relevance of a token. It consists of two concepts: term
    frequency (TF) and inverse document frequency (IDF).


    - *TF*: This considers how frequently the word appears in an event message. As
    each message is not the same length, it may be possible that a token in a long
    sentence occurs more frequently compared to a token in a shorter message.'
