    The reporting and dashboard layer provides views for different IT teams and stakeholders
    to collaborate and manage incidents, capacity, change, and problems to further
    support business by providing KPIs and SLAs that are driven by insights and provide
    an element of predictive analytics to make operations more proactive.


    AIOps systems leverage a Configuration Management Database (CMDB) to improve the
