    - *Natural Language ToolKit (nltk)*: This is a suite of libraries for tokenization,
    parsing, classification, stemming, tagging, and semantic reasoning of text to
    process human language data and use it for further analysis in statistical or
    ML systems.

    - *sklearn*: This is a machine learning library that provides the implementation
    of various algorithms such as K-means, SVM, random forests, gradient boosting,
    etc. This library allows you to use these algorithms on data rather than making
    a huge effort to manually implement them and then use them on data.

    - *Genism*: This is an important library for topic modeling, *which is a statistical
    model for text mining and discovering abstract topics that are hidden in a collection*
    of text. *Topics* can be defined as a repeating pattern of co-occurring terms
    in a text corpus. For example *switch*, *interface*, *router*, and *bandwidth*
    are terms that will occur together frequently and hence can be grouped under the
    topic of *network*. This is not a rule-based approach that uses regular expressions
    or dictionary-based keyword searching techniques. It is an unsupervised ML algorithm
    to find a bunch of related words and create clusters of text.


