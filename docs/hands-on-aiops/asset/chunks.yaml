  trans: '

    ## 相关性与关联性


    相关性是一个统计学术语，指识别两个或多个实体之间的任何关系或关联。从 AIOps 的角度来看，相关性用于确定实体之间的依赖关系或关联，并将它们聚类在一起以便进行高效分析。我们在第
    5 章中介绍了多种用于确定多个实体之间关系以建立相关性的回归算法。


    然而，在事件层建立相关性有些困难，因为来自不同来源的多个事件会在不同的时间间隔内到达。在事件层，基于时间的序列或事件模式相当罕见。在事件层能高效确定相关性和关联性的算法之一是`DBSCAN`，它在数据点彼此接近（密集）且存在大量噪声或异常值的场景中特别有用。


    ### 基于拓扑的相关性


    聚类的准确性是事件管理系统最重要的关键绩效指标之一，它驱动着引擎的效率。为了提高聚类和根因确定的准确性，你需要提供一些拓扑上下文。但 CMDB 和发现本身就是一个挑战，要拥有一个
    100% 准确且能 100% 发现和建模基础设施的 CMDB 是一项艰巨的任务。


    考虑到 CMDB 和发现的各种挑战，拓扑相关性仍然可以用于网络拓扑相关性以及应用拓扑相关性。考虑图 8-16 中所示的示例拓扑。黑色标记的连接代表网络拓扑，而红色标记的连接代表应用拓扑。我们将使用这个示例拓扑来讨论网络拓扑和应用拓扑的相关性。


    ![](img/524834_1_En_8_Fig16_HTML.jpg)


    图表有一个主分支和十个子分支。主分支是网络交换机-1。在该图中，红色箭头表示应用拓扑，黑色箭头表示网络拓扑。


    图 8-16


    示例拓扑图


    ### 网络拓扑相关性


    这种相关性使用网络连接图作为拓扑来执行相关性。例如，如果一个连接了数百台服务器和设备到其接口的核心交换机宕机，那么来自该交换机的告警是因果性的，而来自底层网络设备、服务器以及其上运行的应用的所有其他告警都被视为受影响的。


    IT 运维团队可以专注于因果性的 CI（即网络交换机），而不是因这次中断而在系统中手动筛选告警。这种相关性需要确定起始位置和层级深度，以比较和创建此拓扑，并最终找到因果事件。由于存储整个拓扑或发现所有内容可能不切实际，次优的方法是在事件管理层存储关键设备或应用的拓扑信息子集，用于相关性分析，并每
    24 小时（如果环境变化不大，可以每周）使用自动化发现/脚本或手动方式更新一次。图 8-4 中示例拓扑的网络拓扑可以在事件管理器层存储为键值对，如下所示：


    ```

    {"network_topology": [

    {"child-ci": "dummy-app-1 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-app-2 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-web-1 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-web-2 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-db-1 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-db-2 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-srv-1 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-srv-2 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-srv-3 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "ntwrk-lb-1", "parent-ci": " ntwrk-switch-1 "}

    ]}

    ```


    每当生成告警时，事件管理算法将使用这些数据来确定关系、执行相关性分析，并确定因果性和受影响的 CI。此方法依赖于静态信息，因此有其局限性和挑战。存储大量拓扑数据会严重影响事件管理工具的性能。


    从 AIOps 的角度来看，建议将此相关性卸载到网络监控层，该层具有扫描子网范围、发现设备并使用`ICMP`或`SNMP`将其配置到可用性监控中的原生能力。网络监控工具可以实时查看所有
    CI 的可用性及其拓扑，并且可以根据网络变化动态更新它们。网络监控工具应使用检测到的拓扑执行此相关性，过滤掉受影响的 CI 告警，并将因果性告警转发到事件管理层。如果需要，可以将网络监控工具配置为以信息性严重级别转发受影响的
    CI 告警，而以严重级别转发因果性告警。


    如果使用的是开源网络监控工具，其原生基于拓扑的相关性能力有限或没有，组织仍然可以将所需的拓扑数据导入事件管理层，并按照前面讨论的方式执行相关性分析。

    '
- fmt: '### Application Topology Correlation


    This correlation leverages the application architecture with a relationship between
    application components. This can be as simple as a `vCenter` farm running on multiple
    hypervisors in a cluster and hosting various VMs. This can also be a more complex
    application architecture for a business application like an insurance claim processing
    system running on multiple nodes hosting web servers, DB servers, EDI systems,
    and SAP systems.


    Unlike network topology correlation where only the availability of systems are
    considered, application correlation considers the availability as well as the
    performance of applications. This correlation not only needs details of network
    topology but also the details of application blueprints and key performance indicators.
    Consider an example where an alert is received about database processes being
    down, which further causes alerts for the following:


    - High request in application queue from application servers

    - High response time of an application URL from web servers

    - Timeout alert from synthetic monitoring from the load balancer


    At this point of time, many other unrelated alerts may also be received at event
    management. In this case, all systems are up and running, but the issue is at
    the application level. Here the application-level correlation helps in isolating
    faults.


    Application architecture or blueprints ideally should be available (or discovered)
    and stored in the CMDB as service models. But organizations face lots of challenges
    in maintaining these blueprints because of the following three most common reasons:


    - Discovering application topology requires domain knowledge to determine the
    pattern that needs to be detected in discovery. Discovery tool SMEs don’t possess
    such vast domain knowledge.

    - Information is federated and available inside different tools managed by multiple
    teams.

    - There are challenges in getting clearance to read application logs/services/processes.
    Logs usually contain PII/PHI/confidential data, which causes a red flag to be
    raised by the security and application teams.


    From an AIOps perspective, whenever alerts related to an application arrive, then
    algorithms should leverage application topology to perform the necessary correlation.
    Considering these challenges with the CMDB, AIOps algorithms can be used to learn
    patterns and dependencies and automatically derive topology. In our sample topology
    example, algorithms can use the following features to understand topology and
    perform application correlation:


    - Learn by analyzing the similarity of hostnames/IP addresses as servers belong
    to one application usually share a common prefix in the hostname or common subnet
    details.

    - Learn by analyzing the arrival time of the events and detecting patterns from
    it.

    - Learn by analyzing message texts in the event, whether it belongs to the availability
    category or the performance category or if there any common application/service
    name in events that comes together within a short interval.

    - Learn by analyzing the event class and source. Data from multiple operational
    management databases (OMDBs) like `vCenter`, `SAP`, `SCCM`, etc., is quite useful
    in this learning as these are the sources where different CIs are getting managed.
    For example, the `vCenter` database provides the data of the mapping of VMs to
    the ESX farm where the event source will be `vCenter` and the class will be `Virtualization`.
    Similarly, `SAP` can provide application mapping details where the source will
    be `SAP System` and the class will be `Application`. The algorithm can use this
    data to correlate events and find out whether the issue is due to the underlying
    hypervisor or due to application performance.

    - Like network topology correlation, you can store the application topology data
    for critical applications at the event management layer and let the system learn
    from it. Unless the application is running on the cloud or on SDI, the application
    topology usually does not get updated as frequently as the network topology data,
    so it can be synced on a monthly or quarterly basis. For cloud and SDI-based applications,
    it is comparatively easy to use native APIs and update the topology data as soon
    as a change happens.


    ```

    {"application_topology": [

    {"child-ci": " dummy-db-1 ", "parent-ci": " " ,"application":"dummy_app","kpi":["type":"process","name":"
    dummy-process"]},

    {"child-ci": " dummy-db-2 ", "parent-ci": " " ,"application":"dummy_app","kpi":["type":"process","name":"
    dummy-process"]}

    {"child-ci": "dummy-app-1 ", "parent-ci": " dummy-db-1", "application”: “dummy-app","kpi":["type":"service","name":"
    app_service "]},

