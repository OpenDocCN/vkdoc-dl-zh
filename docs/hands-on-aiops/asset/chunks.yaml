- fmt: '# Automated Baselining in APM and SecOps


    Monitoring tools related to SecOps and application monitoring have different characteristics
    as the majority of time their monitoring parameter values remain very low, almost
    touching zero, causing imbalanced dataset and hence providing incorrect predictions.
    In these situations, it makes more sense to compare spikes or unusual high utilization
    values (called *anomaly*) with predicted values to calculate the `MASE` ratio
    and accordingly tune the ML model rather than leveraging the usual low values
    of parameters. Anomaly values are the ones that do not follow a regular pattern
    and show sudden spikes (up or down). We will discuss more about these in Chapter
    [8](#524834_1_En_8_Chapter.xhtml).


    These predicted thresholds for security-related parameters can be applied on policies
    that monitor the protected segment comprising the IP address range, port, and
    protocol that define services, VLAN numbers, or MPLS tags. An appropriate policy
    will dynamically detect attacks on different protected segments and trigger qualified
    alarms rather than noise.


    Implementing a monitoring solution with an automated baselining feature brings
    in immediate benefits by enabling the operations team to quickly identify outages,
    exceptions, and cyberattacks rather than wasting time on noise. But organizations
    often face some operational challenges in adopting dynamic thresholding, which
    we will be discussing next.


    ## Challenges with Dynamic Thresholding


    Though dynamic thresholding looks promising, there is a challenge in adoption
    due to fear of missing critical alerts. Especially during the initial phases when
    the AIOps system has just started the learning process, organizations raise a
    lot of doubt over the accuracy of prediction. Also, the majority of open source
    and native monitoring tools don’t have this capability. Implementing AIOps-based
    dynamic thresholding involves the use of multiple algorithms and techniques and
    requires data for a longer duration to be able to analyze the seasonality and
    patterns.


    ## Summary


    In this chapter, we covered one of the important use cases in AIOps, which is
    automated baselining. We covered various types of regression algorithms that can
    be used for this purpose. We covered hands-on implementation of the use case using
    multiple algorithms such as linear regression, `ARIMA`, and `SARIMA`. In the next
    chapter, we will cover various anomaly detection algorithms and how they can be
    used in AIOps.


    # 8. AIOps Use Case: Anomaly Detection


    After discussing deduplication and automated baselining in previous chapters,
    we will now move up the AIOps maturity ladder to discuss anomaly detection, which
    provides a big leap toward proactiveness. This chapter explains anomaly detection
    and how it is useful for IT operations.


    ## Anomaly Detection Overview


    Anomaly detection is the process of identifying data points that are unusual or
    unexpected. Regular events of the CPU, memory, swap memory, disk, etc., are normal
    to operations, but if there is any “application down” or firewall event, then
    it represents an unusual scenario. The goal of anomaly detection is to identify
    such unusual scenarios (what we call *outliers*) within a dataset that differ
    significantly from other observations. Though the task of detecting an anomaly
    can be performed by all three types of machine learning algorithms, its implementation
    is done extensively on unlabeled data by clustering them into various groups.
    In IT operations, the execution of a service improvement plan is a regular exercise,
    and operations do not have a specific target to predict. Rather, they need to
    analyze lots of data and then try to observe similarities and club together them
    to form different groups to understand anomalies and formulate recommendations.
    We briefly discussed different clustering algorithms available in unsupervised
    machine learning in Chapter [5](#524834_1_En_5_Chapter.xhtml) for anomaly detection,
    and K-means clustering is one of the simplest and most popular unsupervised machine
    learning algorithms that we will be discovering in this chapter.


    ## K-Means Algorithms


    As discussed in Chapter [5](#524834_1_En_5_Chapter.xhtml), K-means is a centroid-based
    clustering algorithm that is extensively used in data mining to detect patterns
    and group together similar data points into a *cluster*. Mathematically, if there
    is a dataset `{x1, . . . , xn}` consisting of `N` data points, as shown in Figure
    [8-1](#524834_1_En_8_Chapter.xhtml#Fig1), then our goal is to partition the dataset
    into some number `K` of clusters.


    ![](images/524834_1_En_8_Chapter/524834_1_En_8_Fig1_HTML.jpg)


    A scatterplot of distinct clusters that can be created around centroids. There
    are ways to determine the centroids from the dataset. In the scatterplot horizontal
    access values are 0, 200, 400, 600, 800 and 1000, and the vertical access values
    are 0, 5000, 10000, 15000, 20000 and 25000.


    Figure 8-1


    `N` data points in space


    Here, `K` represent the number of distinct clusters that can be created around
    centroids. There are ways to determine the centroids from the dataset, and this
    section will use the Elbow method in our implementation to determine the appropriate
    number of clusters. There are three centroids detected in the dataset that are
    marked as red dots in Figure [8-2](#524834_1_En_8_Chapter.xhtml#Fig2).


    The K-means algorithm tries to determine the similarity of data points with centroids
    and accordingly cluster the data points around these centroids, as shown in Figure
    [8-2](#524834_1_En_8_Chapter.xhtml#Fig2).


    ![](images/524834_1_En_8_Chapter/524834_1_En_8_Fig2_HTML.jpg)


    A scatterplot determine the similarity of data points with centroids and accordingly
    cluster the data points around these centroids. The scatterplot horizontal access
    values are 0, 200, 400, 600, 800 and 1000, and the vertical access values are
    0, 5000, 10000, 15000, 20000 and 25000.


    Figure 8-2


    Clustering performed by the K-means algorithm


    The IT operations team performs the task of manually filtering hundreds of events
    and selecting related events in a group for various tasks such as the following:


    *   *Root-cause analysis*: Groups events that are related to an issue or outage
    to find how an issue starts unfolding

    *   *Performance analysis*: Groups events related to a specific application or
    service to analyze its performance and related bottlenecks

    *   *Service improvement*: Groups events that create noise and analyzes what monitoring
    configurations or baselines should be updated at the source to reduce noise and
    improve service quality

    *   *Capacity planning*: Groups events that represent hot spots that need timely
    intervention and resolution by a capacity planning process


    From an AIOps perspective, it is probably the simplest clustering algorithm that
    can detect anomalies in a wide range of scenarios. In this algorithm, first a
    centroid is chosen for every cluster, and then data points are grouped into the
    cluster based on their distance from centroids. There are multiple methods to
    calculate distance such as Minkowski, Manhattan, Euclidean, Hamming, etc.


    Clustering is an iterative process to optimize the position of centroids with
    which the distance is getting calculated. For example, the majority of organizations
    receive thousands of events related to performance or availability, but rarely
    do they receive security alerts related to DDoS/DoS attacks. Not only the frequency
    but the alarm text message will differ. In this case, you can apply K-means clustering
    on event messages that group related messages over a time scale, leaving aside
    security alerts as an anomaly.'
