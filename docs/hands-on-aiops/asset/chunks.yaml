- fmt: '# Collaboration


    Just like Observe, collaboration is important in the Engage phase as well. In
    the Observe phase, the collaboration between teams happens on a bridge or using
    ChatOps to find the root cause of a problem. In the Engage phase, collaboration
    happens between various stakeholders to resolve the problem. Thus, various stakeholders
    collaborate on the tickets to bring the problem to closure. Unlike Observe, where
    multiple teams have to come together to analyze the issues, here it is a limited
    set of people sometimes restricted to a particular technology domain; at times
    it is only one individual who is working on the ticket to resolve the issue.


    Collaboration also happens in the service request and change execution task; however,
    most of it is orchestrated through a rule-based system where completion of each
    task is sequentially assigned to the person who needs to do the job. There is
    a greater degree of collaboration required in change management as multiple teams
    may be involved in executing a complex and big change; the change management process
    manages these through a rule-based approach where the required stakeholders are
    brought together by the system at various stages of a change.


    If the person who is responsible for executing a task is not able to finish it
    within the time period assigned, the system assigns or engages a higher skilled
    resource to help and complete the task in time. This is all done using a rule-based
    engine that keeps a tab on the time to complete a task and escalates it after
    expiration of a set period of time.


    Collaboration also happens in these processes on the visualization or dashboarding
    layer where different stakeholders can collaboratively look at the data, analyze
    it, and make decisions that require inputs from multiple teams or stakeholders.


    Though largely rule based, there are aspects of ChatOps that can be used in the
    Engage step where teams can use ChatOps to collaborate over incidents, problems,
    and changes in real time. This data is also stored for creating knowledge management.


    Knowledge management is a key area in Engage, since ITSM systems are the primary
    repository of most of the information in IT service management. AIOps techniques
    such as natural language processing and text extraction come in handy to find
    the relevant information while resolving incidents and executing changes and service
    requests. The AIOps system can use information retrieval and search techniques
    to find the relevant information quickly and easily so that the operations teams
    can resolve incidents faster.


    ## Feedback


    The feedback in the Engage phase is generated through various mechanisms and in
    various processes. In the incident management process, the closure of an incident
    triggers feedback that is filled in by the impacted user; similarly, reopened
    incidents are a feedback mechanism for analytics. Feedback on failed changes or
    changes that had to be aborted and changes that were executed fully but caused
    incidents is an important input.


    Service requests raised by users also trigger a feedback post-completion and form
    an input to analytics to understand how well the process is performing.


    All this data is fed into the system to be visualized in the visualization layer
    and analyzed using analytics techniques.


    Rather than acting as feedback to an algorithm, the feedback here is used mostly
    in data analytics for decision-making to improve the overall process.


    The Engage ITSM systems orchestrate the entire process, and every step of the
    process is logged and updated in the Engage phase; however, the actual action
    performed is under the Act phase, which we will be discussing next.


    # Act


    The Act phase is the actual technical execution of the task that includes execution
    of incident resolution, service request fulfilment, change execution, etc. Figure
    [2-6](#524834_1_En_2_Chapter.xhtml#Fig6) offers a visualization of this phase.


    ![](images/524834_1_En_2_Chapter/524834_1_En_2_Fig6_HTML.png)


    An illustration of four A I Ops-driven I T automation: Automation recommendation
    and execution; change orchestration, S R fulfilment, incident resolution; automation
    analytics; and visualization, collaboration, and feedback.


    **Figure 2-6** AIOps-driven IT automation


    Thus, all technical tasks executed by the operations team come under this phase.


    The completion of the AIOps journey happens with the Act layer; it is here that
    the incident is resolved, and the system is brought back to its normal condition.
    AIOps has benefits without this layer as well, where most of the diagnostic and
    analytics activities are covered under the Observe and Engage sections; however,
    extending AIOps to Act increases the benefits manifold as organizations are able
    to not just find problems quickly but are able to resolve them automatically without
    human intervention.


    For the Act layer to work, it is essential that we have the Observe layer implemented
    and fine-tuned. Without the ability of the AIOps engine to detect anomalies and
    probable cause and trigger an action, it is not possible for the Act layer to
    resolve a problem.


    Thus, the Act layer is integrated with the Engage and Observe layers to get its
    data feed and then acts on that data feed to take resolution or other actions
    on the technical environment. The Observe layer uses AIOps techniques as described
    earlier to find the probable cause and then create an incident in the ITSM system
    or the Engage layer; the automation of Act layer can pick up these incidents from
    the Engage layer and then resolve the incident automatically. To resolve incidents
    automatically, it needs to know how to resolve an incident. It also needs to understand
    the incident and the infrastructure on which this incident has happened. We will
    look at various techniques that are used in AIOps starting with least complex
    but very effective technique of automation recommendation.


    ## Automation Recommendation


    The first step for resolution is to recommend which automation will resolve a
    particular problem. This can be done using a rule-based approach or a machine
    learning approach. In the rule-based approach, each type of probable cause is
    mapped with an automation, which is fired to resolve the probable cause. In machine
    learning AIOps approaches, this relationship is not fixed and is probabilistic.


    Various techniques like natural language processing and text extraction are used
    to find the right automation for resolving a problem and then recommending that
    as a solution for the probable cause identified in the Observe layer.


    The automations are generally static in the AIOps domain; however, there are newer
    technologies that use advanced machine learning techniques to club together runbooks
    that can be chained to resolve problems, thus creating new automations on the
    fly using machine learning. Tools like `DryICE iAutomate` provide these advanced
    features along with out-of-the-box runbooks and pretrained models to significantly
    enhance the automation recommendation capabilities.


    Automation recommendations provide a confidence score for the automation. Low-risk
    tasks can be automatically mapped for execution of the recommendation, and any
    high-risk execution tasks can have a human in the middle approach where a human
    operator validates the recommendation before it is sent for execution.'
