    of the AIOps engine while they are being integrated or set up. Once AIOps systems
    get up and running, they learn patterns, anomalies, and behavior using data over
    a period of time. Gradually, based on maturity, the AIOps system gets consumed
    by other technology or business units such as ChatOps, robotic process automation,
    business process automation, etc. More complex business process workflow or chat
    responses can be triggered based on the AIOps system recommendations.'
  trans: "\n# AIOps 简介\n\n`AIOps` 是运维领域的一个流行术语，由 Gartner 在 2016 年提出。如前所述，它意味着将人工智能应用于\
    \ IT 运维。`AIOps` 指的是一种变革性的运维方法，它利用人工智能和机器学习技术，在监控、可观测性、事件关联、服务管理和自动化等多个运维领域发挥作用。随着应用和平台多样性的指数级增长，包括向微服务和云架构的迁移，运维过程中产生了海量数据。运维团队被这海量数据以及环境中应用、平台和基础设施的多样性所淹没。如今，大多数企业都在快速迁移和采用云、微服务架构等新技术，因此基础设施和平台的变化速度前所未有。IT\
    \ 运维面临的挑战是既要维持稳态运维而不中断，又要支持这种敏捷性和迁移，并将新服务纳入运维。这些中断和变化给运维团队带来了巨大压力。过去行之有效的流程和系统已不再适用，而应用和基础设施快速变化的新数字化世界带来了新的挑战。因此，`AIOps`\
    \ 在过去几年中逐渐演变为解决新模式运维挑战的潜在方案。\n\n从监控和可观测性系统产生的海量数据是输入到基于 `AIOps` 系统的数据源之一，然后利用人工智能和机器学习技术来理解这些数据，并从关键事件中过滤掉噪音。这使得过去许多依赖人工判断和隐性知识的手动任务得以自动化。通过分析技术，可以高效地识别出可能导致业务运营中断的根本原因事件，从而立即通知相关解决团队。如果没有\
    \ `AIOps`，在技术快速变革的情况下，这个过程将难以运行；依赖旧系统和隐性知识意味着运维不具备可扩展性和可预测性。\n\n所有这一切都得益于人工智能和机器学习技术的出现和成熟，它们是\
    \ `AIOps` 的基础。\n\n人工智能已经改变了系统开发和业务流程运行的方式。人工智能无处不在，从手机中的图像处理，到亚马逊上根据你的偏好提供新产品推荐的推荐引擎。手机上的面部识别和图像美化是人们每天都在使用的应用实例，他们甚至不知道是人工智能在为这些应用提供动力。自然语言处理的进步改变了我们与应用交互的方式。如今，像\
    \ Alexa、Siri 和 Cortana 这样的语音助手正在改变我们与内容沟通的方式。\n\n信息技术已经利用这些技术来解决构建推荐系统、预测系统、图像识别、语音识别、文本提取和自然语言理解系统等领域的各种业务问题。\n\
    \n然而，在利用人工智能解决 IT 问题方面，企业和科技公司尚未完全拥抱这一技术。\n\n最后，IT 团队曾用于为消费者和企业提供令人兴奋的新应用的人工智能技术，现在正被用于监控和管理\
    \ IT 技术本身。因此，一类使用算法来运行 IT 运维的新系统诞生了。\n\n`AIOps` 是 Gartner 创造的一个术语，用于描述将 AI 技术应用于\
    \ IT 运维数据源以提供额外洞察的总体趋势。`AIOps` 本质上是一个或一组用于分析、组合和收集数据的功能。\n\n根据 Gartner 的说法，“到\
    \ 2023 年，40% 的 DevOps 团队将通过用于 IT 运维的人工智能（`AIOps`）平台能力来增强应用和基础设施监控工具。” `AIOps`\
    \ 平台是那些“利用大数据、现代机器学习和其他高级分析技术，通过主动、个性化和动态的洞察，直接或间接增强 IT 运维功能”的平台。\n\n图 1-1 定义了\
    \ `AIOps` 中包含的 IT 运维各个领域。这些领域包括监控、事件分析、预测和推荐系统、协作与参与、以及报告和仪表盘技术。\n\n![](img/524834_1_En_1_Fig1_HTML.png)\n\
    \n一张展示 `AIOps` 中信息技术各层的图表。中间是一个标记为 `Devops/operation` 的图表。左侧是三个图标：聊天框、机器人流程自动化和\
    \ `BPM`，标题为业务服务。右侧是 `CMDB/发现`、安全性和治理三个层。\n\n**图 1-1**  \nIT 运维领域中的 `AIOps`\n\n\
    `AIOps` 涵盖了信息技术的各个层面。从网络到终端，IT 中的一切都可以利用 `AIOps` 技术来获得其带来的好处。\n\n企业监控为 `AIOps`\
    \ 系统提供实时数据流，以便使用各种技术执行基于机器学习的关联和分析，检测模式和异常，并进行因果影响分析。这是最重要的阶段之一，因为该分析需要考虑实时流数据和历史数据，以提供预测性建议或主动修复措施，然后通过\
    \ IT 流程或运行手册自动化工具来执行这些建议。解决建议通过无需人工干预地解决问题，帮助组织实现端到端自动化。\n\n报告和仪表盘层为不同的 IT 团队和利益相关者提供视图，以便协作管理事件、容量、变更和问题，通过提供由洞察驱动的\
    \ KPI 和 SLA，并引入预测分析元素，使运维更加主动，从而进一步支持业务。\n\n`AIOps` 系统利用配置管理数据库（`CMDB`）来提高关联质量和预测与建议的准确性，但由于基础设施环境不断变化，组织通常难以维护\
    \ `CMDB` 和发现数据的准确性。在云计算环境下，使用传统工具和流程几乎不可能更新 `CMDB`。`AIOps` 系统通过自动填充 `CMDB` 中缺失的所需数据来解决这个问题。这个运转良好的\
    \ `AIOps` 引擎必须在组织治理框架下定义的安全策略内工作。在集成或设置 `AIOps` 引擎的每一层时，都应考虑各种合规需求，如 GDPR、数据分类等。一旦\
    \ `AIOps` 系统启动并运行，它会利用一段时间内的数据学习模式、异常和行为。逐渐地，基于成熟度，`AIOps` 系统会被其他技术或业务单元（如 `ChatOps`、机器人流程自动化、业务流程自动化等）所使用。可以根据\
    \ `AIOps` 系统的建议触发更复杂的业务流程工作流或聊天响应。\n"
- fmt: "# AIOps 概述\n\n就像软件工程中的持续集成和持续部署整合了应用程序的开发、测试和部署活动，并共享反馈以进行改进一样，`AIOps` 也提供了各种运维组件之间的无缝集成，并为持续服务改进提供反馈。\n\
    \n`AIOps` 的基本定义是：它涉及使用人工智能和机器学习来支持所有主要的 IT 运维。如图 [1-2](#524834_1_En_1_Chapter.xhtml#Fig2)\
    \ 所示，在事件关联方面，`AIOps` 包含三个层次。\n\n![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig2_HTML.png)\n\
    \n该图描绘了 `AIOps` 的三个层次。数据调查有 4 个子层：日志、追踪、指标和信号，每个子层又有 2 个子层。数据处理有 3 个子层：分析、机器学习和自然语言处理。数据表示有\
    \ 4 个子层：趋势图、箱线图、服务视图和热力图。左侧有 18 个应用程序。\n\n**图 1-2**  \n使用 `AIOps` 进行事件关联设计\n\n\
    ## 数据摄取层\n\n基础设施中存在许多异构实体，全面的监控环境由多种工具和解决方案组成，用于监控这些实体。数据摄取层是来自不同应用程序、平台和基础设施层的数据通过各种集成机制被摄取的地方。典型被摄取的数据形式包括事件、日志、指标和追踪。常用的数据摄取机制包括表述性状态转移（`REST`）、简单网络管理协议（`SNMP`）和应用程序编程接口（`API`）集成。\n\
    \n## 数据处理层\n\n数据处理层是 `AIOps` 系统的核心；正是在这里，人工智能和机器学习技术被用于处理数据并生成洞察。一旦数据被摄取到 `AIOps`\
    \ 系统中，数据处理层就会使用机器学习和深度学习技术来发现数据中的异常。它还使用指标数据来预测可能导致事件并中断业务服务的问题。就事件管理而言，该层构成了\
    \ `AIOps` 的核心。\n\n## 数据表示层\n\n数据表示层充当仪表板层，数据处理层的结果通过直观的仪表板以各种格式在此显示。用于解决问题的可操作数据也会被转发到外部系统（如\
    \ `ITSM`），以便解决团队能够根据这些数据采取行动并解决问题。\n\n这里的目标是利用 IT 系统生成的海量数据，并使用人工智能和机器学习来理解这些数据，从而得出分析和洞察，并利用它们使\
    \ IT 系统运行得更快、更好、更经济，并且对故障更具弹性。\n\n`AIOps` 帮助人类弥补其在满足 IT 运维需求能力方面存在的差距。它并不会取代运维岗位上的人员，而是增强他们的能力，以便借助\
    \ `AIOps` 提供更好的按时服务。\n\n人类与人工智能协同工作，能够提供任何一方都无法单独提供的服务水平。图 [1-3](#524834_1_En_1_Chapter.xhtml#Fig3)\
    \ 定义了人工智能和人类代理如何协作以提供更好的 IT 运维服务，以及哪些功能属于哪一方。这种庞大且不断增长的事件量使得人类无法进行分析并编写静态规则和策略。分析过程中的挑战会级联到各种\
    \ IT 服务，例如容量规划、问题管理、事件管理等，这些服务会使用分析输出。在 `AIOps` 模型中，人工智能和人类在提供 IT 运维服务方面紧密相连，密不可分。`AIOps`\
    \ 承担了数据预处理、过滤和分析等大部分耗时且复杂的任务，从而为专家提供关键洞察，以便他们做出明智的决策。\n\n![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig3_HTML.jpg)\n\
    \n数百万数据点的两个层次。人工智能代理层有六项服务：过滤、趋势分析、模式检测、异常检测、聚类和自动化。`AIOps` 服务层有五项服务：协作、根因分析、变更管理、服务改进以及容量优化与建议。\n\
    \n**图 1-3**  \n`AIOps` 驱动的人工智能与人类之间的协作\n\n通过应用由人工智能/机器学习驱动的数据分析和启发式方法，工程师可以借助\
    \ `AIOps` 被动地处理事件，`AIOps` 会为他们指明正确的方向，并提供过去此类解决方案的相关数据。`AIOps` 也被主动用于通过分析性能和容量数据来确定如何优化应用程序性能和基础设施性能。\n\
    \n作为开发生命周期一部分的应用程序监控和 `AIOps`，将帮助开发团队主动发现应用程序或部署基础设施的可用性和性能问题，并在应用程序发布到生产环境之前解决这些问题。\n\
    \n采用 `AIOps` 可以通过确保容量的最佳利用，同时避免停机，帮助企业节省资金。如果出现问题，工程师能够比使用传统工具更快地恢复系统。\n\n`AIOps`\
    \ 有助于自动化那些不需要 IT 操作员参与的日常任务，同时为开发人员提供上下文信息，以缩短平均解决时间（`MTTR`）并改善客户体验。尽管主动性是 `AIOps`\
    \ 的核心，但它同样适用于被动场景。"
  raw: 'Just like in software engineering, continuous integration and continuous deployment
    integrates different activities of development, testing, and deployment of applications
    and shares feedback for improvement. Similarly, AIOps is something that provides
    seamless integrations between various operations components and provides feedback
    for continuous service improvement.


    The basic definition of AIOps is that it involves using artificial intelligence
    and machine learning to support all primary IT operations. As depicted in Figure
    [1-2](#524834_1_En_1_Chapter.xhtml#Fig2), there are three layers in AIOps when
    it comes to event correlation.


    ![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig2_HTML.png)


    The image depicts three layers of A I Ops. Data investigation has 4 sub-layers,
    logs, traces, metrics, and signals, each with 2 sub-layers. Data processing has
    3 sub-layers analytics, machine learning, and N L P. Data representation has 4
    sub-layers trend charts, box plot, service views, and heat maps. To the left,
    there are 18 applications.


    Figure 1-2


    Event correlation design with AIOps


    ### Data Ingestion Layer


    There are many heterogeneous entities in the infrastructure, and a comprehensive
    monitoring landscape consists of multiple tools and solutions to monitor them.
    The data ingestion layer is where data from different applications, platforms,
    and infrastructure layers is ingested using various integration mechanisms. Typical
    data that is ingested is in the form of events, logs, metrics, and traces. Popular
    mechanisms to ingest data are Representational State Transfer (REST), Simple Network
    Management Protocol (SNMP), and application programming interface (API) integrations.


    ### Data Processing Layer


    The data processing layer is the heart of an AIOps system; it is here that AI
    and machine learning techniques are used to process data and generate insights.
    Once the data is ingested into the AIOps system, the data processing layer uses
    machine learning and deep learning techniques to find anomalies in the data. It
    also uses the metric data to predict problems that may cause incidents and disrupt
    the business services. This layer forms the core of AIOps as far as event management
    is concerned.


    ### Data Representation Layer


    The data representation layer acts as the dashboarding layer where the results
    of data processing layer are displayed using intuitive dashboards in various formats.
    The actionable data for resolution is also forwarded to external systems like
    ITSM so that resolver groups can act on the data and resolve the issues.


    The goal here is to use the enormous amounts of data that IT systems are generating
    and to use AI and machine learning to make sense of that data to arrive at analytics
    and insights and use them to make the IT systems perform faster, better, and cheaper,
    and make them more resilient to failures.


    AIOps helps humans to address the gap that exists in their abilities to service
    the needs of IT operations. It does not take away people from the operations roles
    but augments their capabilities to provide better on-time services leveraging
    AIOps.


    Together humans and AI are able to deliver a level of service that both individually
    cannot deliver. Figure [1-3](#524834_1_En_1_Chapter.xhtml#Fig3) defines how AI
    and human agents work in collaboration to deliver better IT operations services
    and which functions belong where. This humongous, ever-increasing volume of events
    makes it impossible for a human to analyze and then write static rules and policies.
    Challenges in the analysis process get cascaded to various IT services such as
    capacity planning, problem management, incident management, etc., who consume
    analysis output. AI and humans are intertwined and joined at the hip in delivering
    IT operations services in the AIOps model. AIOps takes the majority of time-consuming
    and complex tasks of data preprocessing, filtering, and analysis thereby providing
    key insights to the experts for making well-informed decisions.


    ![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig3_HTML.jpg)


    Two layers of Millions of data points. The layer, A.I. Agent, has six services:
    Filtering, trend analysis, pattern detection, anomaly detection, clustering, and
    automation. The layer, A I O Dryice A I Ops, has five services: Collaboration,
    root cause analysis, change management, service improvement, and capacity optimization
    & recommendation.


    Figure 1-3


    AIOps-driven collaboration between AI and humans


    Through the application of AI/ML-powered data analysis and heuristics, engineers
    can reactively work on incidents with the aid of AIOps, which points them in the
    right direction and also provides them with the past data on such resolutions.
    AIOps is also used proactively to determine how to optimize application performance
    and infrastructure performance by analyzing the performance and capacity data.


    Application monitoring and AIOps embedded as part of the development lifecycle
    would aid the development teams to proactively find availability and performance
    issues with either the application or the deployment infrastructure and resolve
    them before the application is released to production.


    Adopting AIOps allows enterprises to save money by ensuring optimal utilization
    of capacity while at the same time avoiding downtime. If something goes wrong,
    the engineers are able to bring up the systems much faster than using traditional
    tools.


    AIOps is helping to automate mundane tasks that do not require IT operators while
    providing contextual information for developers to improve mean time to resolution
    (MTTR) and customer experience. Though proactivity is core to AIOps, it applies
    equally to reactive situations.'
  trans: "\n# AIOps 概述\n\n就像软件工程中的持续集成和持续部署整合了应用程序的开发、测试和部署活动，并共享反馈以进行改进一样，`AIOps`\
