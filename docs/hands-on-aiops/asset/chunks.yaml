    represented in cluster 0\. This is feedback to tune the thresholds of the CPU
    monitoring parameter. Or you can submit a recommendation to the capacity planning
    team to increase the CPU capacity.


    *   The algorithm automatically created three clusters, one for each application,
    which primarily contains alerts related to that specific application only. These
    clusters can be analyzed for incident or problem management–related tasks. These
    clusters provide a lot of visibility to the applications teams and are immensely
    helpful in executing service improvement programs.


    This AIOps use case of anomaly detection also makes it extremely helpful and efficient
    to detect potentially critical events, such as security events, from the enormous
    pile of events and initiate automated actions, such as invocating a kill switch
    to minimize the impact. You have seen how K-means clustering detected noise and
    can generate recommendations for problem and capacity management processes.


    Note


