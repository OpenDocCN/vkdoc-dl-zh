    Next, start applying the NLP algorithm. First, we need to download the English
    words dictionary from `nltk`. You need to add domain-specific words as that may
    be missing from the English words dictionary like *app*, *HTTP*, *CPU*, etc. These
    domain-specific words are important for efficiently creating clusters.


    Now apply preprocessing on the event message, which includes removing special
    characters and punctuation to create tokens. These tokens then pass through the
    stemming and lemmatization process (explained in Chapter [4](#524834_1_En_4_Chapter.xhtml))
    to get more meaningful words that also remove stopwords that represent a set of
    commonly used words and do not add much meaning to a sentence like *is*, *are*,
    etc. They carry little useful information and hence can be safely removed.


    ```

    nltk.download(''words'')

    words = set(nltk.corpus.words.words())

    stemmer = SnowballStemmer(''english'')

    def lemmatize_stemming(text):

    return stemmer.stem(WordNetLemmatizer().lemmatize(text, pos=''v''))

    def preprocess(text):

    result = []

    words = set(nltk.corpus.words.words())

    domain_terms = set(["cpu","interface","application","failure",

    "https","outage", "synthetic","timeout","utc",

    "www","simulation","simulated","http",

    "response","app","network","emprecord",

    "global_hr","pyroll","employee_lms","demoapp1",

    "emp_logistics_summary","demo","down", "tcp" ,

    "connect","emp_tsms","payroll_sap_gts",

    "demoapp3","high","state"])

    for token in gensim.utils.simple_preprocess(text):

    if token not in gensim.parsing.preprocessing.STOPWORDS:

    if token.lower() in words or token.lower() in domain_terms:

    result.append(lemmatize_stemming(token))

    return result

    ```


