  raw: '# 4. AIOps Supporting SRE and DevOps


    Just like AIOps is disrupting the technology and processes for IT operations,
    there are other transformational changes that are happening in the IT operations
    space.


    DevOps as a movement has gained momentum and now cuts across the development,
    infrastructure, and operations worlds. With cloud infrastructure and cloud-native
    applications becoming the norm, DevOps is expanding its coverage to include end-to-end
    workflows right from development to deployment. AIOps supports the DevOps model
    and promotes collaboration across the development and operations teams.


    Similarly, another movement that is closely related but has a slightly different
    take on operations is site reliability engineering (SRE), where the focus is on
    managing and operating applications and platforms with a focus on reliability,
    availability, and automation.


    This chapter explains how AIOps, DevOps, and the SRE model are complementary and
    how one can underpin the DevOps and SRE services by using AIOps technologies.


    Let’s begin with the overview of the SRE model and DevOps.


    ## Overview of SRE and DevOps


    AIOps is not the only discipline that is changing the way IT is run. DevOps, Agile,
    and SRE are the other disciplines that are transforming IT operations. Agile and
    DevOps have driven a cultural shift in organizations where agility and speed of
    delivery coupled with collaboration between development and operations resulted
    in benefits to enterprises that adopted them. Similarly, AIOps is changing the
    way collaboration is done between the development and operations teams using data
    and analytics and providing insights and knowledge that weren’t available earlier.
    With ChatOps and knowledge management, AIOps is providing the technology foundation
    on which the development and operations team collaborate. Both AIOps and DevOps
    together are taking organizations to even higher levels of automation and maturity.


    AIOps is providing access to technologies that can bring data, data analytics,
    and machine intelligence together to make informed decisions and perform automated
    actions by collecting and analyzing data. Figure [4-1](#524834_1_En_4_Chapter.xhtml#Fig1)
    shows the DevOps process from Plan to Deploy and the various AIOps functions that
    we discussed in earlier chapters.


    ![](images/524834_1_En_4_Chapter/524834_1_En_4_Fig1_HTML.png)


    An image of A I Ops''s big data and machine learning functions that circulates
    under the build, test, release, monitor, and plan procedures. The icon to the
    left is leveled as DevOps team, and to the right, the icon is labeled as customer.


    Figure 4-1


    AIOps and DevOps, better together


    AIOps and DevOps should be adopted across the enterprise to reap their benefits;
    deploying them in departmental silos wouldn’t make organizations move up the maturity
    ladder. Though DevOps implementations generally follow a step-by-step approach
    to implementation, AIOps needs all the data that is in the monitoring and management
    space to be able to better correlate data and provide insights and analytics.


    AIOps eliminates noise and thus helps in making DevOps more effective. With AIOps
    in place, false alarms are reduced in the system, and this reduces the wasteful
