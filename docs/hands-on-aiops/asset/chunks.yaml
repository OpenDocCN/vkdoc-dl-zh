- fmt: 'In practical scenarios, multiple values of ARIMA components need to be used
    to arrive at a model with maximum accuracy in predictions. Manually performing
    this task requires a lot of time and expertise in statistical techniques. Also,
    it becomes practically impossible to create models for a large number of entities
    such as servers, parameters, stocks, etc.


    There are ML approaches called Auto ARIMA to learn optimal values of the components
    `p`, `d`, `q`. In Python there is a library called `pdarima` that provides the
    function `auto_arima` to try various values of ARIMA/SARIMA components in model
    creation and search for most optimal model with the lowest AIC and BIC values.


    Let’s try auto ARIMA to find the most optimal component values for the ARIMA model
    from the given training dataset. In the auto ARIMA model, we currently specify
    `seasonal` to be `False` to explore more about ARIMA. This value will be `true`
    for the SARIMA model to consider seasonality. We will also provide the maximum
    values of `p` and `q` that auto ARIMA can explore to obtain the best model. Let’s
    proceed with `max_p` and `max_q` as 15 to limit the complexity of the model.


    ```

    # Fit auto_arima on train set

    auto_arima_model = pm.auto_arima(train_data, start_p = 1, start_q = 1,

    max_p = 15, max_q = 15,

    seasonal = False,

    d = None, trace = True,

    error_action =''ignore'',

    suppress_warnings = True,

    stepwise = True)

    # To print the summary

    auto_arima_model.summary()

    ```


    As per the auto ARIMA result shown in Figure [7-27](#524834_1_En_7_Chapter.xhtml#Fig27),
    the best model is identified as ARIMA (6,1,0) with marginal improvement in the
    AIC and BIC values as compared to the previous ARIMA (6,1,2) model.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig27_HTML.jpg)


    A prediction analysis depicts stepwise performance to minimize A I C. SARIMAX
    results are given below with different output headers depanneur variable, model,
    date, time, sample, covariance type, number observations, log-likelihood, A I
    C, B I C, H Q I C.


    **Figure 7-27** Prediction analysis on test data


    Next validate the performance of ARIMA (1,1,1) only on test data.


    ```

    auto_arima_predictions = pd.Series(auto_arima_model.predict(len(test_data)))

    actuals = test_data.reset_index(drop = True)

    auto_arima_predictions.plot(legend = True,label = "ARIMA Predictions",

    xlabel = "Index",ylabel = "CPU Utilization",

    figsize=(10, 7))

    actuals.plot(legend = True, label = "Actual");

    forecast_accuracy(np.array(auto_arima_predictions), test_data)

    ```


    As observed in Figure [7-28](#524834_1_En_7_Chapter.xhtml#Fig28) and as the performance
    metrics are obtained, there is even further degradation in the accuracy of the
    ARIMA (1,1,1) model.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig28_HTML.jpg)


    A graph of CPU utilization versus the index. A frequency wave and a curve line
    are graphed. The frequency wave denotes actual starts from (0, 70) and ends at
    (40, 95). The curve line denotes ARIMA prediction starts from (0, 65) and ends
    at (95, 68). The points are approximate.


    **Figure 7-28** Prediction analysis on test data for ARIMA (1,1,1)


    Clearly, the ARIMA model is not going to work in this scenario, and we need to
    look for the seasonality in data using the `seasonal_decompose` package.


    ```

    seasonality_check = seasonal_decompose(cpu_util_raw_data[''cpu_utilization''],

    model=''additive'',extrapolate_trend=''freq'')

    seasonality_check.plot()

    plt.show()

    ```


    Based on the graph in Figure [7-29](#524834_1_En_7_Chapter.xhtml#Fig29), we can
    observe seasonality in the data, which implies we should use the SARIMA model.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig29_HTML.jpg)


    Four graphs. Graph 1, CPU utilization versus date-time where a high-frequency
    wave is graphed. Graph 2, trend versus date-time where a low-frequency wave is
    graphed. Graph 3, seasonal versus date-time where a high-frequency wave with the
    same height is graphed. Graph 4, resid versus date-time where a scatter plot is
    graphed.


    **Figure 7-29** Time series seasonality check


    Let’s explore the SARIMA model using auto ARIMA with seasonality enabled. As we
    have daily data points and based on the seasonality graph, it seems there is weekly
    seasonality, so we will be setting the value of the SARIMA component as `m = 7`.


    ```

    # Seasonal - fit stepwise auto-ARIMA

    sarima_model = pm.auto_arima(train_data, start_p=1, start_q=1,

    test=''adf'',

    max_p=15, max_q=15, m=7,

    start_P=0, seasonal=True,

    d=None, D=1, trace=True,

    error_action=''ignore'',

    suppress_warnings=True,

    stepwise=True)

    sarima_model.summary()

    ```


    As shown in Figure [7-30](#524834_1_En_7_Chapter.xhtml#Fig30), auto ARIMA tried
    various combination and has detected SARIMA (3,0,2)(0,1,1)[7] as a best-fit model
    with considerable improvement in the AIC values as compared to previous ARIMA
    models.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig30_HTML.png)


    An auto Arima model execution result on train data depicts stepwise performance
    to minimize A I C. SARIMAX results are given below with different output headers
    depanneur variable, model, date, time, sample, covariance type, number observations,
    log-likelihood, A I C, B I C, H Q I C.


    **Figure 7-30** Auto Arima model execution result on train data


    Let’s validate the results of this new SARIMA model.


    ```

    sarima_predictions = pd.Series(sarima_model.predict(len(test_data)))

    actuals = test_data.reset_index(drop = True)

    sarima_predictions.plot(legend = True,label = "SARIMA Predictions",xlabel = "Index",
    ylabel = "CPU Utilization", figsize=(10, 7))

    auto_arima_predictions.plot(legend = True,label = "ARIMA Predictions")

    actuals.plot(legend = True, label = "Actual")

    forecast_accuracy(np.array(sarima_predictions), test_data)

    ```


    After considering the seasonality, the prediction’s accuracy improved to about
    62 percent as MAPE reduced to about 38 percent. This improvement in accuracy can
    also be observed in Figure [7-31](#524834_1_En_7_Chapter.xhtml#Fig31) by plotting
    predictions of the ARIMA and SARIMA models against the actual test data observed.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig31_HTML.jpg)


    A graph of CPU utilization versus the index. Two frequency waves and a curve line
    are graphed. The frequency waves denote SARIMA and actual. The actual starts around
    (0, 70) and ends at (40, 95) and SARIMA starts around (0, 65) and ends at (45,
    95). The curve line denotes ARIMA prediction starts around (0, 65) and ends at
    (95, 68).


    **Figure 7-31** Time-series prediction by ARIMA/SARIMA on test data


    This model can be used to generate future predictions to determine an appropriate
    baseline dynamically rather than going with a static global baseline. This approach
    drastically reduces the noise in large environments.


    This model can also be used for one of the most common use cases around the autoscaling
    of infrastructure, especially when there is seasonality in the utilization. The
    SARIMA (or SARIMAX) model can be used to analyze historical time-series data along
    with seasonality and any external factor to predict the utilization and accordingly
    scale up or down infrastructure for a specific duration and provide potential
    cost savings.'
