    sap g t`、`applic` 和 `app`。各特征对应的条形值大约为：0.26、0.19、0.19、0.9、0.9、0.9、0.9、0.8、0.6
    和 0.6。


    **图 8-12**


    **集群 6** 代表一次中断。


    让我们观察这个特定集群（集群 6）中的所有事件。


    ```

    df_appcluster=df_temp[df_temp[''cluster''] == 6 ]

    df_appcluster.info()

    ```


    如图 8-13 所示，集群 6 中共有 43 个事件被聚集在一起。


    ![](img/524834_1_En_8_Fig13_HTML.jpg)


    这是 K-means 算法的数据集。在该图像中，表头为：列名、非空计数和数据类型。顶部为 `class pandas.core.frame.DataFrame`，`Int64Index`
    包含 43 个条目，范围从 31 到 1050。共有 7 列：`Source`、`Alert Time`、`Alert Description`、`Alert
    Class`、`Alert Type`、`Alert Manager` 和 `Cluster`。


    **图 8-13**


    **集群 6** 事件数据


    让我们观察该集群中的事件。


    ```

    df_appcluster[[''AlertTime'',''AlertClass'',''AlertType'',''AlertDescription'']]

    ```


    仔细审查集群 6 中的事件后，您可以看到有五个来自不同事务失败的事件，它们几乎在同一时间（7 月 8 日大约 19:30）到达，表明发生了一次中断。如图 8-14
    所示，这五个事件中有一个属于网络接口宕机事件，这被指示为可能的原因，因为在此事件之后，立即出现了针对 Global HR 应用程序的模拟事务失败事件。


    ![](img/524834_1_En_8_Fig14_HTML.jpg)


    一个包含四列七行的表格，列标题为：`Alert Time`、`Alert Class`、`Alert Type` 和 `Alert Description`。该表格中，第
    706、707、708、709 和 710 行被红色框标记。


    **图 8-14**


    **集群 6** 中的事件


    借助 ML 和 NLP 能力，该算法从 1000 多个事件中发现并聚类了有用信息，而且无需编写任何静态规则或使用任何拓扑相关细节。


    让我们也在时间尺度上一起分析这些集群，以揭示更多见解。


    首先，打印算法根据每个集群中分组的事件检测到的标签。


    ```

    print("Cluster Labels are: \n", labels)

    Cluster Labels are:

    {0: ''pyrol'', 1: ''cpu'', 2: ''interfac'', 3: ''global_hr'', 4: ''emprecord'',
    5: ''memori'', 6: ''simul''}

    ```


    现在，让我们在时间线上观察这些集群，以探索任何有用的细节。


    ```

    df_temp.plot(x=''AlertTime'', y=''cluster'', lw=0, marker=''s'', color ="#eb5634",\

    figsize=(12,8),rot = 90,  alpha = 0.5,fontsize = 15,grid=True, legend=False,\

    ylabel="Cluster Number")

    ```


    从图 8-15 中，您可以得出以下几点重要观察：


    ![](img/524834_1_En_8_Fig15_HTML.jpg)


    这是 K-means 算法的时间线分析。在该图像中，水平轴表示告警时间，垂直轴表示集群编号。集群编号从 0 到 6，告警时间从 2021-06-01 到 2021-08-01。


    **图 8-15**


    **集群时间线分析**


    *   由于集群 0 中表示的 CPU 利用率事件，存在持续的大量噪声。这是调整 CPU 监控参数阈值的反馈。或者，您可以向容量规划团队提交建议，以增加 CPU
    容量。

    *   该算法自动为每个应用程序创建了三个集群，这些集群主要包含与该特定应用程序相关的告警。这些集群可用于分析事故或问题管理相关任务。这些集群为应用程序团队提供了大量可见性，并且在执行服务改进计划时非常有帮助。


    这种 AIOps 异常检测用例还使得从海量事件中检测潜在关键事件（例如安全事件）变得极其高效，并能够启动自动化操作（例如调用终止开关）以最小化影响。您已经看到
    K-means 聚类如何检测噪声，并可以为问题和容量管理流程生成建议。


    > **注意**

    > 根据最佳实践，安全告警不应与运维事件控制台集成。安全告警仅供安全专家查看，而非所有人。理想情况下，应为安全运维团队设置单独的 SIEM 控制台进行监控。


    尽管 K-means 算法即使对于非常大的数据集也易于实现，但从 AIOps 角度来看，它存在一些挑战。


    *   集群数量对 K-means 算法的效率起着关键作用。

    *   K-means 聚类会因数据集中存在噪声或大量异常值而受到影响。质心会被拉伸以包含异常值或噪声。

    *   较高维度的参数或变量会对算法的效率产生负面影响。


    除了异常检测，AIOps 的另一个常见用例是相关性和关联分析，这将在下一节中讨论。

    '
- fmt: '## Correlation and Association


    Correlation is a statistical term that means identifying any relationship or association
    between two or more entities. From an AIOps perspective, correlation is used to
    determine any dependency or relation between entities and cluster them together
    for efficient analysis. We covered multiple regression algorithms that determine
    the relationship between multiple entities to establish correlation in Chapter
    [5](#524834_1_En_5_Chapter.xhtml).


    However, establishing correlation at the event layer is a bit difficult as multiple
    events from varied sources come at a varied time interval. A time-based sequence
    or pattern of event is quite rare at the event layer. One of the algorithms that
    works efficiently at the event layer to determine correlation and association
    is `DBSCAN`, and it is particularly useful in scenarios where data points are
    close to each other (dense) along with the presence of a considerable amount of
    noise or outliers.


    ### Topology-Based Correlation


    The accuracy of clustering is one of the most important KPIs of an event management
    system that drives the efficiency of the engine. To improve the accuracy of clustering
    and the determination of the root cause, you need to provide some topology context.
    But the CMDB and discovery are challenges in themselves, and having a 100 percent
    accurate CMDB with 100 percent discovery and modeling of infrastructure is a tough
    task.


    Considering the various challenges with the CMDB and discovery, topology correlation
    can still be implemented for network topology correlation as well as for application
    topology correlation. Consider the sample topology shown in Figure [8-16](#524834_1_En_8_Chapter.xhtml#Fig16).
    Connections marked in black represent the network topology, whereas connections
    marked in red represent the application topology. We will use this sample topology
    to discuss correlation for network topology and application topology.


    ![](images/524834_1_En_8_Chapter/524834_1_En_8_Fig16_HTML.jpg)


    A chart has one main branch and ten sub branches. The main branch is network switch
    -1, In that image the red arrow denotes application Topology and the black arrow
    denote Network Topology.


    Figure 8-16


    Sample topology diagram


    ### Network Topology Correlation


    This correlation uses the network connectivity diagram as the topology to perform
    correlation. For example, if a core switch connecting hundreds of servers and
    devices to its interfaces is down, then alerts from this switch are causal, and
    all other alerts from the underlying network devices and servers as well as applications
    running over them are considered impacted.


    The IT operations team can focus on the causal CI that is the network switch instead
    of manually filtering alerts in the system due to this outage. This correlation
    needs to determine the starting position and then depth of hierarchy to compare
    and create this topology and arrive at the causal event. Since storing the entire
    topology or discovering everything may not be practical feasible, the next best
    approach is to store a subset of topology information for critical devices or
    application at the event management layer for correlation and every 24 hours (or
    weekly if the environment is not very dynamic) updating it using automated discovery/scripts
    or manually. The network topology for the sample topology in Figure [8-4](#524834_1_En_8_Chapter.xhtml#Fig4)
    can be stored as a key-value pair at the event manager layer, as shown here:


    ```

    {"network_topology": [

    {"child-ci": "dummy-app-1 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-app-2 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-web-1 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-web-2 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-db-1 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-db-2 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-srv-1 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-srv-2 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "dummy-srv-3 ", "parent-ci": " ntwrk-switch-1 "},

    {"child-ci": "ntwrk-lb-1", "parent-ci": " ntwrk-switch-1 "}

    ]}

    ```


    Whenever alerts are generated, the event management algorithm will use this data
    to determine relationships, perform correlation, and determine the causal and
    impacted CIs. This method is dependent on the static information, and thus it
    has its limitations and challenges. Storing a high volume of topology data can
    severely impact the event management tool performance.


    From an AIOps perspective, it’s recommended to offload this correlation at the
    network monitoring layer, which has a native capability to scan the subnet ranges,
    discover devices, and configure them in availability monitoring using `ICMP` or
    `SNMP`. Network monitoring tools have real-time visibility on the availability
    of all CIs, and their topology, as well as can dynamically update them based on
    changes in the network. A network monitoring tool should perform this correlation
    using the topology detected, filtering out impacted CI alerts and forwarding causal
    alerts to the event management layer. If needed, the network monitoring tool can
    be configured to forward the impacted CI alerts with the information severity,
    whereas a causal alert can be forwarded with a critical severity.


    In cases of an open source network monitoring tool with limited to no capability
    for native topology-based correlation, organizations can still import the required
    topology data in the event management layer and perform correlation as discussed
    earlier.'
