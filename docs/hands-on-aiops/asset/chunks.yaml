  trans: '

    #### 异常检测


    `异常检测`是一个识别数据中意外事件或罕见事件的过程。`异常检测`也被称为*离群点检测*，因为它涉及检测离群点或罕见事件。


    离群点或异常事件与正常事件不同。`异常检测`算法试图从正常事件中识别出这些事件，并将其标记为异常。通常，异常事件可能指向系统中的某些问题。`异常检测`技术已被应用于多种场景，例如信用卡和银行交易中的欺诈检测、用于检测网络安全攻击的安全系统等。借助`AIOps`，相同的技术和算法现在正被应用于
    IT 运维数据。


    异常不仅仅指罕见或离群事件；在`AIOps`系统中，对于指标数据（例如网络或系统利用率参数）也会检测异常。在指标数据中，异常表现为利用率或活动的突发峰值，这些可能指向某些根本原因，并由`AIOps`系统标记出来。


    `异常检测`技术使用无监督、有监督以及半监督机器学习，将事件标记为异常，并在指标数据出现违反正常行为的情况时进行标记。


    `异常检测`相比传统的基于规则的系统具有优势。`异常检测`算法能够检测数据中的季节性变化，并在考虑季节性变化因素后，仅标记系统的异常行为。指标数据具有高度的季节性，因为
    IT 基础设施上运行的应用程序负载和任务通常遵循一天中的时段规律。某些每月运行的任务也会增加系统利用率，但这并非异常。


    `AIOps`系统中可以使用多种可用算法进行`异常检测`。`AIOps`团队可以根据数据类型和环境，利用这些算法来微调实现方案。


    因此，使用`异常检测`的`AIOps`系统能够更好地减少事件数据或指标数据中的噪音：一方面，它基于数据的季节性标记正确的事件；另一方面，它能发现基于规则的系统可能遗漏的异常模式。这些功能共同帮助运维团队深入了解其环境中的状况，使他们能够采取被动和主动的措施来修复问题或防止问题发生。


    #### 事件关联


    现代数字应用都是相互关联的。即使是传统应用也已采用分布式架构开发，其中 Web 服务器、应用服务器和数据库服务器协同工作以完成应用功能。基础设施本身也分布在网络拓扑中，包含路由器、交换机和防火墙，将来自不同位置用户的流量路由到托管应用的主数据中心。


    分布式应用和基础设施通过多种工具进行监控。因此，一个环境会收到来自网络监控工具、服务器监控、数据库和平台监控的告警，而应用本身也会记录事件和追踪信息。所有这些数据都需要进行关联，以便消除噪音，并自动标记和识别出因果事件（导致问题的事件）。在未部署`AIOps`工具的场景下，这项活动由不同领域的专家团队通过一个被称为*运维桥接*或*重大事件桥接*的电话会议共同完成，他们分析所有系统和数据，以集体识别分布式系统中潜在的问题根源。你可以想象遍历所有数据并得出结论的复杂性和耗时。


    `事件关联`还会从配置管理和变更管理系统中获取信息，从而将这些系统变更与监控工具生成的事件关联起来。这有助于进行根因分析，因为许多事件和问题都是在进行配置更改或修补现有系统后出现的。变更和配置管理数据需要提供给`AIOps`引擎，以便与来自监控系统的事件和性能数据进行关联。事实上，领域专家首先会查找近期是否对系统进行了任何可能导致事件的变更。


    基于机器学习的`事件关联`通过跨各种参数关联相关告警，自动将相关告警分组，从而帮助解决这个问题，使解决团队能在单一位置获取所有信息。`事件关联`利用发现和`CMDB`系统中可用的拓扑和关系信息，同时使用时间戳和历史数据对事件进行分组，并为运维团队提供洞察。


    随着时间的推移和足够的有监督学习数据，`事件关联`引擎会变得更加准确。`事件关联`引擎将数据输入到“根因分析”中。我们将在下一节更详细地介绍根因分析。没有`事件关联`，就无法进行根因分析或预测性分析。因此，`事件关联`是迈向根因分析和预测性分析的第一步。

    '
- fmt: '#### Root-Cause Analysis


    `Root-cause analysis` is the most important module of AIOps; this is where the
    most value is realized by operations. We have already seen in event correlation
    how modern distributed applications and infrastructure are spread out and events
    are generated from various monitoring and management systems and how this impacts
    operations’ ability to go through this large set of data and try to find the root
    cause of the problem manually. With such complexity coming into operations, it
    is becoming impossible to do `root-cause analysis` without the aid of event correlation
    systems. Whether an organization uses a rule-based approach or an AIOps-based
    approach, without leveraging technology, it is impossible to do `root-cause analysis`
    and remediation of issues and meet the service levels that are agreed with the
    business.


    Identifying the root cause manually or with event correlation and automated analysis
    involves multiple teams from different IT domains coming together and analyzing
    the situation to arrive at a conclusion on what could be the problem. This also
    involves the need for collaboration and tools for collaboration so that different
    stakeholders are on a common platform and can effectively do “`root-cause analysis`.”
    `Root-cause analysis` with AIOps looks at all the data being ingested into the
    AIOps system and provides insights to the teams for faster and better root-cause
    identification. Since machine learning technologies are probabilistic in nature,
    `root-cause analysis` in AIOps parlance is also referred to as *probable cause
    analysis*; thus, it may throw multiple probable causes for a root cause with an
    attached confidence score. The higher the confidence score assigned to an event,
    the higher the probability that the AIOps engine has assigned to the event to
    be the root cause. Based on the probable cause, the operations teams can do a
    deep dive and arrive at the final root cause and mark it as such in the system.


    `Root-cause analysis` leverages anomaly detection and event correlation techniques
    as well as supervised learning feedback to arrive at the root cause. `Root-cause
    analysis` leverages both supervised and unsupervised techniques to arrive at this
    result.


    Since the IT data is vast and dependent on the environment, the feedback loop
    is an important aspect of `root-cause analysis`. There are vast amounts of tribal
    knowledge in the minds of the operations teams that may be undocumented and known
    only in the form of informal knowledge. When the operations teams collaborate
    and mark the root cause from various probable causes that the system has generated,
    the AIOps systems learns from the human operators and updates its model. Thus,
    the system can store the actions taken by operations teams and can recall the
    root cause from previous incidents. We will cover this in greater detail in the
    feedback section; however, it is important to understand that `root-cause analysis`
    has a dependency on human feedback, and without this, the `root-cause analysis`
    accuracy may hit a ceiling.


    The benefits of automated `root-cause analysis` are many. There is a marked improvement
    in the mean time to respond and mean time to resolution since the system makes
    the job of human operators easier by flagging the probable cause and eliminating
    noise from the system. Integrated with knowledge management and feedback loop
    from operators, `root-cause analysis` creates a robust and highly accurate system
    as its usage gets expanded over time.


    There are certain limitations of the `root-cause analysis` using machine learning
    technologies. Since this is probability based, there is no guarantee that the
    root cause identified is the actual root cause. The other limitation of `root-cause
    analysis` is that unlike anomaly detection and predictive analytics, which can
    be done using data alone, root cause is dependent on human feedback. If there
    is no participation from the operations teams, the `root-cause analysis` will
    remain at low levels of accuracy. Thus, the human element, feedback, and training
    of the AIOps engines are important parameters and limitations as well. Trying
    to do `root-cause analysis` with only unsupervised learning will not be effective
    as it will only be able to flag anomalies, but whether the anomaly is actually
    causing a system degradation or an incident may not be accurately flagged by the
    AIOps engine. Another limitation of `root-cause analysis` is the nature of incidents
    in the IT domain; an incident may be unique and have a unique combination of events
    that are generated during that incident, and that incident may not have happened
    in the past, so there is no precedence or data in the AIOps engine that it can
    use to arrive at a conclusion. Thus, novel or new incidents with new events previously
    unseen are a challenge for current AIOps systems.


    Thus, we cannot expect the current generation of AIOps systems to accurately pinpoint
    root cause without training by subject-matter experts and human operators. There
    are scenarios where the customers expect the AIOps engine to be a magic wand and
    automatically start finding the root cause and remediation of problems; however,
    deep learning and machine learning systems are dependent on labeled data and training,
    and without this training, the system is incapable of providing accurate results.


    Since `root-cause analysis` is the most important and complex lever in the entire
    AIOps stack, it is important to pay utmost attention to its implementation and
    continued operations effectiveness. As a future direction, AIOps tools can use
    multiple algorithms and an ensemble of algorithms to do `root-cause analysis`
    and provide better accuracy even with limited training data.


    `Root-cause analysis` feeds into automation; without having this process step
    trained and generating accurate results, end-to-end automation and remediation
    are not possible. Once the root cause is identified, it feeds into the automation
    engine to resolve problems automatically and catapult the organization into the
    highest levels of maturity with autohealing.'
