    接下来，开始应用 NLP 算法。首先，我们需要从 `nltk` 下载英语单词词典。您需要添加领域特定的单词，因为这些单词可能不在英语单词词典中，例如 *app*、*HTTP*、*CPU*
    等。这些领域特定的单词对于高效创建聚类非常重要。


    现在对事件消息应用预处理，包括移除特殊字符和标点符号以创建分词。然后，这些分词通过词干提取和词形还原过程（在第 4 章中解释）进行处理，以获得更有意义的单词，同时移除停用词，这些停用词代表一组常用词，对句子没有太多意义，例如
    *is*、*are* 等。它们携带的有用信息很少，因此可以安全地移除。


    ```

    nltk.download(''words'')

    words = set(nltk.corpus.words.words())

    stemmer = SnowballStemmer(''english'')

    def lemmatize_stemming(text):

    return stemmer.stem(WordNetLemmatizer().lemmatize(text, pos=''v''))

    def preprocess(text):

    result = []

    words = set(nltk.corpus.words.words())

    domain_terms = set(["cpu","interface","application","failure",

    "https","outage", "synthetic","timeout","utc",

    "www","simulation","simulated","http",

    "response","app","network","emprecord",

    "global_hr","pyroll","employee_lms","demoapp1",

    "emp_logistics_summary","demo","down", "tcp" ,

    "connect","emp_tsms","payroll_sap_gts",

    "demoapp3","high","state"])

    for token in gensim.utils.simple_preprocess(text):

    if token not in gensim.parsing.preprocessing.STOPWORDS:

    if token.lower() in words or token.lower() in domain_terms:

    result.append(lemmatize_stemming(token))

    return result

    ```


    接下来，将事件消息通过 NLP 预处理。


    ```

    event_msg = np.array(raw_alerts[[''AlertDescription'']])

    temp = []

    for i in event_msg :

    temp.append(i[0])

    event_msg = temp

    for i,v in enumerate(event_msg):

    event_msg[i] = preprocess(v)

    for i,v in enumerate(event_msg):

    event_msg[i] = " ".join(v)

    ```


    对于每个事件句子，我们都有用于分析的相关分词。现在，我们需要将这些文本分词从词汇表映射到对应的实数向量，以便我们可以应用统计算法。这个过程称为*向量化*。


    您将使用 TF-IDF 进行向量化处理。TF-IDF 是一种用于计算分词相关性的统计度量。它包含两个概念：词频（TF）和逆文档频率（IDF）。


    - *TF*：这考虑了一个词在事件消息中出现的频率。由于每条消息的长度不同，长句子中的分词出现频率可能比短消息中的分词更高。

    '
- fmt: '*   *IDF*: This is based on the fact that less frequent tokens are more informative
    and important. So if a token appears frequently in multiple event messages, like
    `high`, then it’s not critical compared to the tokens that are not frequent in
    multiple messages like `down`.


    Readers can get more details on TF-IDF at [`https://en.wikipedia.org/wiki/Tf–idf`](https://en.wikipedia.org/wiki/Tf%25E2%2580%2593idf).


    We will be using TF-IDF to vectorize the data in the following:


    ```

    tf_idf_vectorizor = TfidfVectorizer(stop_words = ''english'',

    max_features = 10000)

    tf_idf = tf_idf_vectorizor.fit_transform(event_msg)

    tf_idf_norm = normalize(tf_idf)

    tf_idf_array = tf_idf_norm.toarray()

    ```


    Now we have the final list of tokens on which we can apply the K-means algorithm.


    To apply the K-means algorithm, first we need to determine what will be the ideal
    value of K. For this we will be using the Elbow method, which is a heuristic used
    in determining the number of clusters in a dataset.


    Let’s use this method to plot a graph of scores and the number of clusters.


    ```

    number_clusters = range(3, 12)

    kmeans = [KMeans(n_clusters=i, max_iter = 600) for i in number_clusters]

    kmeans

    score = [kmeans[i].fit(tf_idf_array).score(tf_idf_array) for i in range(len(kmeans))]

    score

    plt.plot(number_clusters, score)

    plt.xlabel(''Number of Clusters'')

    plt.ylabel(''Score'')

    plt.title(''Elbow Method'')

    plt.show()

    ```


    From the graph in Figure [8-5](#524834_1_En_8_Chapter.xhtml#Fig5) we know that
    total seven clusters are possible in our dataset. So, let’s set the value of K
    as 7 and execute the K-means algorithm.


