  trans: '

    # 机器学习面临的挑战


    `AIOps` 结合了基于规则、基于机器学习和基于拓扑的系统，而来自不同监控和管理系统的数据及其配置在每个环境中都相当独特。这给机器学习模型带来了挑战，因为模型需要理解不同的事件并提供自动化的分析告警。根据每个独特的环境来微调模型可能会成为一个繁琐的过程。


    当提供准确且完整的数据时，机器学习的效果最佳，但如果监控系统配置不正确，或者事件和日志提供的数据不完整或不正确，这就会成为一个挑战。


    机器学习中其他值得关注的领域在于可解释性，即很难明确指出机器学习系统做出某个决策的原因。较新的 `AIOps` 系统内置了可解释性功能，以便用户可以深入探究，找出
    `AIOps` 系统推荐特定根因或标记特定异常的原因。


    机器学习系统也容易发生数据漂移，监控系统或环境的变化会对 `AIOps` 系统产生影响；因此，拥有拓扑信息有助于克服这些问题。


    # 数据漂移


    所有机器学习模型都面临数据漂移的挑战。如果采用 `AIOps` 的组织同时在进行多个转型项目（如云迁移），这个问题会更加突出。由于来自系统的监控工具和数据正在发生剧烈变化，数据会发生漂移，基于现有历史数据的模型准确性将会降低。需要通过流程和分析来谨慎处理
    `AIOps` 中的数据漂移，以确保模型在当前数据下保持准确。


    由于转型项目导致数据剧烈漂移，事件、症状和指标都会发生变化。这意味着转型前的数据是无效的，不能与新数据合并用于生成异常、动态基线或容量预测。


    必须谨慎地更改数据源或数据本身，因为这会使当前已部署的模型过时。


    运行 `AIOps` 系统的专家应对数据及其如何影响机器学习模型有基本的了解。我们希望，通过阅读这本实践指南并完成一些动手练习，读者能够更好地理解数据变化与生成模型之间的关系，并运用这些知识确保
    `AIOps` 系统得到有效利用。


    # 预测性分析的挑战


    对于任何机器学习或深度学习系统来说，预测性分析都是一个充满挑战的领域；它永远无法达到 100% 的准确率。准确预测系统何时会失效是不现实的，因为失效带有偶然性，因此不可能以预期的精度进行预测。


    如前所述，`AIOps` 系统使用预测性分析，这些系统基于概率工作，可能会产生误报（将不正确的事件标记为可能的根因）或漏报（将真正有影响的事件标记为非关键）。


    这与这些算法在其他领域的运作方式类似，例如，当一笔真实的信用卡交易被拒绝并标记为欺诈，或者欺诈交易通过分析引擎并被批准。


    预测性分析的其他挑战涉及数据的季节性，现代机器学习技术可以处理这一点；然而，长期季节性数据可能无法获取，因此系统在收集到足够的数据之前无法学习季节性。例如，要能够生成基于季节性的年度预测，你需要多年的数据。


    # 成本节约预期


    客户通常对成本节约抱有期望；然而，仅仅部署事件管理 `AIOps` 所能带来的成本节约是有限的。它可能对用户体验和客户满意度产生显著影响，但如果没有自动化，成本影响可能无法达到客户的预期。因此，像
    `iAutomate` 这样提供自动化能力的工具会与事件关联平台一起部署，通过自动化从告警检测到问题修复的整个价值流，来实现显著的成本节约。


    通过利用 `AIOps`，组织将在运维方面达到更高的成熟度，系统中的噪音会减少，资源将能够处理更大的工作量，并改进向业务承诺的 `SLA`。


    部署这些技术后，平均响应时间和平均解决时间将会缩短。


    系统的可用性将更高，业务用户和最终用户的满意度也将提升。


    这些都是 `AIOps` 带来的可衡量、可感知的益处。然而，要降低成本，还有其他因素在起作用。例如，组织可能人手不足，或者已经应用了所有成本杠杆，只配备了按承诺服务水平工作的最低限度团队。在这些情况下，可能不会实现成本降低。


    `AIOps` 系统也需要持续付费和维护。这将导致组织为提升成熟度水平并向客户提供更好服务而产生额外成本。因利用这些系统而可能产生的任何资源节约，都需要首先与设置和持续管理这些系统所需的投资和运营费用进行对冲。


    因此，组织在设定成本和节约预期之前，应制定业务计划，并审视所有成本和节约。


    # 缺乏领域输入


    `AIOps` 需要来自操作特定环境的技术专家的领域输入。这可以是对 `AIOps` 平台输出提供反馈，也可以是文档和知识库的形式。缺乏技术专家的支持会导致
    `AIOps` 引擎没有监督训练，这意味着 `AIOps` 引擎将退而求其次，依赖无监督学习来提供结果。没有领域专家的反馈循环，机器学习模型的持续学习就无法进行，系统的准确性也就无法达到其潜力。


    在让领域专家参与这一转型之旅方面存在各种挑战。可能是单纯缺乏对 `AIOps` 系统运作方式的理解，或者是偏好于当前的操作模式，继续沿用人们几十年来习惯的流程。


    组织变革管理和 `AIOps` 流程建立阶段应获得所有领域专家的支持，以便每个人都为项目做出贡献，并能共同看到成功。


    尽早识别利益相关者，为协作设定 `KPI`，并激励团队为项目成功而努力，是组织可以采取的一些措施，以确保 `AIOps` 项目成功。


    # 总结


    在本章中，我们涵盖了组织在部署 `AIOps` 时面临的挑战以及如何缓解这些挑战。对于任何实施 `AIOps` 的组织来说，事先了解这些挑战并规划缓解措施，以成功实施
    `AIOps` 项目至关重要。在下一章中，你将看到 `AIOps` 如何使 `SRE` 和 `DevOps` 团队高效工作，以及 `AIOps` 如何与 `SRE`
    和 `DevOps` 原则保持一致。

    '
- fmt: '# 4. AIOps Supporting SRE and DevOps


    Just like AIOps is disrupting the technology and processes for IT operations,
    there are other transformational changes that are happening in the IT operations
    space.


    `DevOps` as a movement has gained momentum and now cuts across the development,
    infrastructure, and operations worlds. With cloud infrastructure and cloud-native
    applications becoming the norm, `DevOps` is expanding its coverage to include
    end-to-end workflows right from development to deployment. `AIOps` supports the
    `DevOps` model and promotes collaboration across the development and operations
    teams.


    Similarly, another movement that is closely related but has a slightly different
    take on operations is site reliability engineering (`SRE`), where the focus is
    on managing and operating applications and platforms with a focus on reliability,
    availability, and automation.


    This chapter explains how `AIOps`, `DevOps`, and the `SRE` model are complementary
    and how one can underpin the `DevOps` and `SRE` services by using `AIOps` technologies.


    Let’s begin with the overview of the `SRE` model and `DevOps`.


    ## Overview of SRE and DevOps


    `AIOps` is not the only discipline that is changing the way IT is run. `DevOps`,
    `Agile`, and `SRE` are the other disciplines that are transforming IT operations.
    `Agile` and `DevOps` have driven a cultural shift in organizations where agility
    and speed of delivery coupled with collaboration between development and operations
    resulted in benefits to enterprises that adopted them. Similarly, `AIOps` is changing
    the way collaboration is done between the development and operations teams using
    data and analytics and providing insights and knowledge that weren’t available
    earlier. With `ChatOps` and knowledge management, `AIOps` is providing the technology
    foundation on which the development and operations team collaborate. Both `AIOps`
    and `DevOps` together are taking organizations to even higher levels of automation
    and maturity.


    `AIOps` is providing access to technologies that can bring data, data analytics,
    and machine intelligence together to make informed decisions and perform automated
    actions by collecting and analyzing data. Figure [4-1](#524834_1_En_4_Chapter.xhtml#Fig1)
    shows the `DevOps` process from Plan to Deploy and the various `AIOps` functions
    that we discussed in earlier chapters.


    ![](images/524834_1_En_4_Chapter/524834_1_En_4_Fig1_HTML.png)


    An image of AIOps''s big data and machine learning functions that circulates under
    the build, test, release, monitor, and plan procedures. The icon to the left is
    leveled as DevOps team, and to the right, the icon is labeled as customer.


    Figure 4-1


    AIOps and DevOps, better together


    `AIOps` and `DevOps` should be adopted across the enterprise to reap their benefits;
    deploying them in departmental silos wouldn’t make organizations move up the maturity
    ladder. Though `DevOps` implementations generally follow a step-by-step approach
    to implementation, `AIOps` needs all the data that is in the monitoring and management
    space to be able to better correlate data and provide insights and analytics.


    `AIOps` eliminates noise and thus helps in making `DevOps` more effective. With
    `AIOps` in place, false alarms are reduced in the system, and this reduces the
    wasteful work for `DevOps` teams to analyze the false positives in the system.
    `DevOps` teams get single alerts rather than multiple alerts from various systems
    in the `AIOps` model along with probable root cause so that they can focus their
    energies on resolving the problem rather than trying to decipher and analyze so
    many alerts that are getting generated because of an issue in an application or
    infrastructure.


    Thus, `AIOps` supports `DevOps` and helps the `DevOps` teams realize their vision
    of greater collaboration between Dev and Ops. `AIOps` helps in breaking the boundaries
    between Dev and Ops through a platform and makes life easier for both the Dev
    and Ops teams by eliminating waste and helping the teams focus their energies
    to elevate the `DevOps` processes to a higher level of maturity and provide higher
    availability and agility. `AIOps` is the foundation that supports `SRE` and `DevOps`.
