    Figure 2-7


    `AIOps` for business and service impact analysis


    This must be done in real time across distributed, hybrid IT environments. Without
    it, they will be forced to engage in extensive and complex troubleshooting exercises
    to triangulate hundreds of thousands, if not millions, of data points. The time
    required to do so can negatively impact the uptime and performance of key processes
    such as e-commerce, order to cash, and others.'
  raw: '#### Change Orchestration


    Similar to service request fulfilment, the changes are granularly planned and
    comprise a series of tasks to be performed by different teams.


    There are additional tasks around change review where a change advisory board
    comprising technical and business stakeholders reviews all aspects of the change
    and approves it.


    There are other steps such as reviewing the change test plans, rollback plans,
    etc., and at each stage different stakeholders may be involved in the review and
    analysis of the change.


    Once everything is reviewed and the change is ready to be executed as per schedule,
    the change is executed in a step-by-step fashion by various teams involved in
    the technical execution.


    Thus, change orchestration is a well-scripted process that involves well-defined
    steps and tasks at each stage, and rule-based systems have been used to run this
    process for ages. Since change orchestration tasks are mostly definitive in nature
    and there is no ambiguity on how this task needs to be executed, the role for
    machine learning technologies is limited.


    There are a few areas where machine learning or analytics technologies can be
    used in change orchestration.


    Change scheduling and conflicts is one such area. When a change is scheduled,
    it involves infrastructure, platform, and application components that form part
    of the change; the change is also scheduled on a particular time on a particular
    date. Analytics techniques can be used to find out if there are items that are
    getting impacted because of the change and if there is conflicting or overlapping
    changes that impact connected devices or systems. This data can be analyzed by
    overlaying the topology and configuration data with the change schedules, and
    this information can be used by the change advisory board to better analyze the
    change and its impact and may result in the rescheduling of changes in the case
    of conflicts.


    The other area is around change risk analysis; we are aware that every change
    carries a risk to the application and infrastructure and can result in downtime,
    and the predictive analytics techniques can be used to find out the risk of the
    change based on components involved, the complexity of the change, and the risk
    analysis data from previous such changes. This predictive analytics component
    from AIOps can come in handy for such analytics and providing this additional
    information to the change advisory board and technical execution teams.


    Cognitive virtual assistants internally use natural language processing and understanding
    and can also be used in the change management process for technical and process
    teams to collaborate and find information about the change using the intuitive
    NLP capabilities of the cognitive virtual agents.


    We have covered some of these elements in the change analytics section in Engage
    as well.


    #### Automation Analytics


    Automation analytics is an important area in the execution space. Though most
    of the analytics is relevant in the Engage phase, automation execution generates
    its own valuable data that needs analytics.


    Some of the data generated by the automation is used to further improve the accuracy
    and efficiency of the automation system. The other data is used for reporting
    and analytics of how the current state of automation is performing in the organization.


    Generally, the following are important automation KPIs:


    *   Automation coverage


    *   Automation success rate


    *   Automation failure rate


    *   High used use cases


    *   Low used use cases


    *   Failure cause analysis


    *   Low automation areas


    #### Visualization


    Just like the visualization and dashboarding that we covered in the Engage phase,
    the automation phase also logs its data into the system. We mentioned a few important
    parameters that are important for automation teams to track, and these need to
    be visualized using dashboarding technologies to provide a bird’s-eye view of
    how automation is performing and run some level of analytics to run continual
    service improvement on this data.


    #### Collaboration


    Collaboration in automation is largely delivered through the Engage phase since
    all the activities are logged in the IT service management systems. Thus, collaboration
    between various teams and people involved in incident, service request, and change
    orchestration is done in the Engage phase using ITSM tools.


    However, with AIOps ChatOps, cognitive virtual agents become the core of collaboration
    for various teams where they can interact with the right stakeholders as well
    as get the required data from the ITSM systems, which is required during the Act
    phase. Thus, real-time collaboration during the actual activities in the Act phase
    is done using ChatOps where humans interface with other teams and with machines
    to analyze the data and take appropriate decisions.


    #### Feedback


    This information is available in the AIOps system to analyze the efficiency of
    the automation execution. Feedback from automated resolutions is an essential
    input into the AIOps system. Success and failure of automation scripts is an important
    learning data for the machine learning algorithms. This data helps the system
    to improve its accuracy scores and to change the confidence scores of the various
    automation engines and scripts.


    Operators confirm the actions that the AIOps algorithms are suggesting, and thus
    the human input provides training to the AIOps algorithms where they can improve
    on their model and change the confidence scores based on human feedback.


    With time the AIOps engine becomes better tuned to the environment that they are
    operating in by learning from the actions of human operators. The confidence scores
    of various resolutions become high enough to move them to fully autonomous mode
    where the human in the loop is no longer needed for certain use cases. This fulfills
    the promise of AIOps to turn operations into NoOps, by leveraging the autohealing
    capabilities of AIOps technologies. Expansion of fully automated use case library
    and its success rate gets greatly impacted by the knowledge of the application
    blueprint and its relevance or its business impact level (BIL), and that’s where
    application discovery becomes important, which we will be discussing next.


    ## Application Discovery and Insights


    To manage business transactions’ key performance indicators (KPIs) and to guarantee
    business process service level agreements (SLAs), enterprises also need powerful
    full-stack analytics.


    These analytics need to automatically map business transactions (such as orders,
    invoices, and so on) to their application services (web server, application server,
    databases, and so on) and to the supporting infrastructure (compute, network,
    and storage), as shown in Figure [2-7](#524834_1_En_2_Chapter.xhtml#Fig7).


    ![](images/524834_1_En_2_Chapter/524834_1_En_2_Fig7_HTML.png)


    A flow chart with four layers represents business transactions to the applications
    services like App server 1, 2, and web services to the supporting infrastructures
    like L D A P server 1, 2 and file server with some full-stack analytics like business
    impact, service impact, driven topology correlation, and C D M B.


    Figure 2-7


    AIOps for business and service impact analysis


    This must be done in real time across distributed, hybrid IT environments. Without
    it, they will be forced to engage in extensive and complex troubleshooting exercises
    to triangulate hundreds of thousands, if not millions, of data points. The time
    required to do so can negatively impact the uptime and performance of key processes
    such as e-commerce, order to cash, and others.'
  trans: '

    #### 变更编排


    与服务请求履行类似，变更会被精细规划，并包含一系列由不同团队执行的任务。


    在变更审查环节中，还有一些额外任务，由技术和业务利益相关者组成的变更咨询委员会会对变更的各个方面进行审查并批准。


    还有其他步骤，例如审查变更测试计划、回滚计划等，在每个阶段，不同的利益相关者都可能参与变更的审查和分析。


    一旦所有内容都经过审查，并且变更已准备好按计划执行，变更就会由参与技术执行的各个团队以逐步的方式执行。


    因此，变更编排是一个精心编排的过程，在每个阶段都包含明确定义的步骤和任务，并且基于规则的系统长期以来一直被用于运行此过程。由于变更编排任务本质上大多是确定性的，并且对于如何执行这些任务没有歧义，因此机器学习技术的作用有限。


    在变更编排中，有少数几个领域可以使用机器学习或分析技术。


    变更调度和冲突便是这样一个领域。当安排一个变更时，它会涉及构成变更一部分的基础设施、平台和应用组件；该变更也会安排在特定日期的特定时间。可以使用分析技术来找出是否有项目因变更而受到影响，以及是否存在影响连接设备或系统的冲突或重叠变更。通过将拓扑和配置数据与变更计划叠加，可以分析这些数据，变更咨询委员会可以利用这些信息更好地分析变更及其影响，并且在发生冲突时可能导致变更的重新安排。


    另一个领域是变更风险分析；我们知道，每个变更都会给应用和基础设施带来风险，并可能导致停机。预测分析技术可用于根据所涉及的组件、变更的复杂性以及以往此类变更的风险分析数据来找出变更的风险。来自
    `AIOps` 的此预测分析组件对于此类分析非常有用，并能向变更咨询委员会和技术执行团队提供这些额外信息。


    认知虚拟助手内部使用自然语言处理和自然语言理解，也可以在变更管理流程中用于技术和流程团队之间的协作，并利用认知虚拟代理直观的 `NLP` 功能查找有关变更的信息。


    我们在 `Engage` 部分的变更分析章节中也涵盖了其中一些要素。


    #### 自动化分析


    自动化分析是执行领域中的一个重要方面。尽管大多数分析都与 `Engage` 阶段相关，但自动化执行会生成其自身需要分析的有价值数据。


    自动化生成的一些数据用于进一步提高自动化系统的准确性和效率。其他数据则用于报告和分析自动化在组织中的当前运行状态。


    通常，以下是一些重要的自动化关键绩效指标（KPI）：


    *   自动化覆盖率

    *   自动化成功率

    *   自动化失败率

    *   高使用率用例

    *   低使用率用例

    *   失败原因分析

    *   低自动化领域


    #### 可视化


    就像我们在 `Engage` 阶段介绍的可视化和仪表板一样，自动化阶段也会将其数据记录到系统中。我们提到了几个对自动化团队来说需要跟踪的重要参数，这些参数需要使用仪表板技术进行可视化，以提供自动化运行情况的概览，并对这些数据运行一定程度的分析，以进行持续的服务改进。


    #### 协作


    自动化中的协作主要通过 `Engage` 阶段实现，因为所有活动都记录在 IT 服务管理系统中。因此，参与事件、服务请求和变更编排的各个团队和人员之间的协作是在
    `Engage` 阶段使用 `ITSM` 工具完成的。


    然而，借助 `AIOps ChatOps`，认知虚拟代理成为各个团队协作的核心，他们可以与正确的利益相关者互动，并从 `ITSM` 系统中获取 `Act`
    阶段所需的数据。因此，在 `Act` 阶段的实际活动中，实时协作是通过 `ChatOps` 完成的，人类与其他团队以及机器进行交互，以分析数据并做出适当的决策。


    #### 反馈


    这些信息可在 `AIOps` 系统中获取，用于分析自动化执行的效率。来自自动解决方案的反馈是 `AIOps` 系统的重要输入。自动化脚本的成功与失败是机器学习算法的重要学习数据。这些数据有助于系统提高其准确性评分，并改变各种自动化引擎和脚本的置信度评分。


    操作员会确认 `AIOps` 算法建议的操作，因此人工输入为 `AIOps` 算法提供了训练，使其能够改进模型并根据人类反馈更改置信度评分。


    随着时间的推移，`AIOps` 引擎通过从人类操作员的行动中学习，能够更好地适应其运行的环境。各种解决方案的置信度评分会变得足够高，从而可以将其转移到完全自主模式，对于某些用例不再需要人工参与。这实现了
    `AIOps` 的承诺，即通过利用 `AIOps` 技术的自动修复能力，将运维转变为 `NoOps`。完全自动化用例库的扩展及其成功率在很大程度上受到应用蓝图知识及其相关性或业务影响级别（`BIL`）的影响，这就是应用发现变得重要的原因，我们接下来将对此进行讨论。


    ## 应用发现与洞察


    为了管理业务交易的关键绩效指标（`KPI`）并保证业务流程的服务水平协议（`SLA`），企业还需要强大的全栈分析能力。


    这些分析需要自动将业务交易（例如订单、发票等）映射到其应用服务（Web 服务器、应用服务器、数据库等）以及支持性基础设施（计算、网络和存储），如图 2-7
    所示。


    ![](img/524834_1_En_2_Fig7_HTML.png)


    一个包含四层的流程图，展示了从业务交易到应用服务（如 `App server 1`、`2` 和 Web 服务）再到支持性基础设施（如 `L D A P server
    1`、`2` 和文件服务器）的映射，并包含一些全栈分析，如业务影响、服务影响、驱动拓扑关联和 `C D M B`。


    图 2-7


    用于业务和服务影响分析的 `AIOps`


    这必须在分布式、混合 IT 环境中实时完成。否则，他们将被迫进行广泛而复杂的故障排除工作，以三角定位数十万甚至数百万个数据点。所需的时间可能会对关键流程（如电子商务、订单到现金等）的正常运行时间和性能产生负面影响。

    '
- fmt: '# Making Connections: The Value of Data Correlation


    The app economy is upon us, and businesses of all stripes are moving to address
    it. In this age of digital transformation, businesses rely on applications to
    serve customers and improve operations. Businesses need to rapidly introduce new
    applications and adopt new technologies to become more agile, efficient, and responsive.


    As part of these efforts, businesses are employing cloud-based solutions, software-centric
    and microservices architectures, and virtualization and containers. But these
    new architectures and technologies are creating challenges of their own.


    Some business applications today are hosted on public clouds, and enterprises
    tend to have no, or very limited, visibility into those clouds.


    Applications increasingly deployed on virtual machines rather than physical servers,
    which adds more complexity.


    Containers often exist alongside, or within, virtual machines. The use of containers—and
    the number of containers themselves—is quickly proliferating enterprise IT environments.


    Because this environment is very different from what came before, the application
    performance tools created a decade or so ago no longer apply. Tools that consider
    only the application—and not the underlying infrastructure—fall short. These tools
    must collect and correlate information about the application itself and about
    the underlying infrastructure. This should include data about application server
    performance, events, logs, transactions, and more. The compute, network, and storage
    resources involved in application delivery also need to be figured into the equation.


    ## Summary


    In this chapter we covered the different layers of `AIOps`, i.e., Observe, Engage,
    and Act. The three core foundation pillars of `AIOps` along with the core analytics
    techniques of event correlation, predictive analytics, anomaly detection, and
    root-cause analysis were covered in depth. Each function within the Observe, Engage,
    and Act layers was covered in depth by providing real-life practical examples
    so that `AIOps` and its functions can be demystified and correlated with on-the-ground
    activities being done by operations teams today. In the next chapter, we will
    cover challenges that organizations face while deploying `AIOps`.


    # 3. AIOps Challenges


    Though IT teams are optimistic and moving full steam ahead on implementing `AIOps`
    technologies, there are some challenges that hinder the value realization and
    implementation of these technologies. This chapter explains such challenges in
    more detail so that organizations can plan for them while implementing `AIOps`.
    Figure [3-1](#524834_1_En_3_Chapter.xhtml#Fig1) lists the key challenges in the
    `AIOps` journey that we will be exploring further.


    ![](images/524834_1_En_3_Chapter/524834_1_En_3_Fig1_HTML.png)


    An image of the 11 key challenges of `AIOps`, which are: organizational change
    management, monitoring coverage & data availability, rigid process, expectations
    mismatch, fragmented functions & `CMDB`, machine learning, data drift, predictive
    analytics, cost savings expectations, lack of understanding of machine learning
    and domain inputs.


    **Figure 3-1** AIOps challenges


    ## Organizational Change Management


    `AIOps` is a transformational theme that cuts across various processes such as
    `ITSM`, monitoring, and runbook automation. It also cuts across various teams
    including the command center, the service desk, resolution teams, automation,
    `SRE`, and `DevOps`. To successfully deploy and realize value, you need effective
    change management at the organizational level, along with support and sponsorship
    from the management to see this cross-functional change through. Organizational
    hierarchies and functional divisions get in the way of successful and effective
    deployment of `AIOps`; thus, it is important to engage organizational change managers
    to run the project through various stakeholders and get management buy-in for
    the project.


    Typically, the previous teams are structured in different functional hierarchies,
    and they collaborate on an as-needed basis on initiatives through defined processes
    and policies. `AIOps` is a disruptive change that impacts all of these teams drastically.


    To be able to get the project off the ground and be successful, it is important
    that this is driven as a program of organization-wide significance and monitored
    and governed at the highest levels.


    Team structures, processes, policies, and communication mediums need to change
    to adopt `AIOps` in totality and realize the maximum benefits by deploying these
    technologies across the entire value stream.


    Thinking of `AIOps` as just a technology change that can be dropped on top of
    existing technologies and processes without re-engineering is an expectation that
    needs to be tapered down, and organizations should realize that they are moving
    to a different system and method of doing IT operations that requires changes
    to the current structures, teams, and processes. Therefore, this needs to be handled
    in a manner that is process oriented, systematic, and nondisruptive to existing
    operations and provides clear guidance to the people who are going to be impacted
    by this organization-wide change.


    ## Monitoring Coverage and Data Availability


    There are organizations where monitoring and observability are in place, and they
    can proceed smoothly to deploy `AIOps` technologies and reap the benefits that
    `AIOps` provides. However, there are organizations where the basic monitoring
    coverage is not complete, and many infrastructure and application components are
    not monitored effectively. Thus, due to lack of data, deploying `AIOps` would
    not be able to provide probable cause or root cause for those application or infrastructure
    elements. After all, machine learning systems are based on data availability and
    accuracy of data. There are other challenges where the coverage may be complete,
    but the monitoring parameters are incorrectly configured and do not provide complete
    and accurate data for effective functioning of the `AIOps` algorithms.


    Without monitoring and observability data in place, expecting `AIOps` to solve
    basic monitoring or observability problems would result in a failure of the initiative
    and `AIOps` getting the blame for no fault on the `AIOps` side either from a technology
    or process perspective.


    IT operations needs to be able to measure their maturity and coverage of systems
    and processes from monitoring, observability, `ITSM`, and automation standpoints
    before embarking on an `AIOps` journey. This can be done either in house or by
    engaging consultants who are well versed with this domain and can provide an outside
    perspective to where the organization is and compare the systems and processes
    with companies that are leaders in this space. This exercise will result in a
    maturity journey where there may be projects and programs that need to be run
    to prepare the organization for `AIOps`. For example, if the monitoring is not
    comprehensive, a separate program to set this right and provide comprehensive
    coverage may get initiated as a preparatory step to bringing in `AIOps`.'
