- fmt: '### Autoregression or AR (p)


    This component, known as *autoregression*, shows that the dependent variable `Y[t]`
    can be calculated as a function of its own lags `Y[t-1]`, `Y[t-2]`, and so on.


    `Y[t] = α + β₁Y[t-1] + β₂Y[t-2] + ... + βₚY[t-p]`


    Here:


    - `α` is the constant term (intercept).

    - `β` is the coefficient of lag with a subscript indicating its position.

    - `ε` is the error or white noise.


    We already discussed that the PACF plot shows the partial autocorrelation between
    the series and its lag after excluding the effect from the intermediate lags.
    We can use the PACF plot to determine the last lag `p`, which cuts off the significant
    line and can be considered as a good estimate value of AR. This value is represented
    by the model variable `p` as an order of the AR model.


    Based on the sample PACF plot in Figure 7-15, we can observe that lag 1 seems
    to be the last lag crossing a significant line. So, we can set `p` as 1 and represent
    it as `AR(1)`.


    ![PACF plot](images/524834_1_En_7_Chapter/524834_1_En_7_Fig15_HTML.jpg)


    The PACF plot where the y-axis represents the correlation value and the x-axis
    represents the lags from 0 to 7. The dashed lines on either side of the x-axis
    indicate significance. The first value of the series starts from 1 and decreases
    gradually with values 6, 4, 3.5, -2, -3, -4, and -8, approximately.


    **Figure 7-15** – PACF plot


    ### Moving Average or MA (q)


    This component, known as *moving average*, shows that the dependent variable `Y[t]`
    can be calculated as a function of the weighted average of the forecast errors
    in previous lags.


    `Y[t] = α + ε[t] + φ₁ε[t-1] + φ₂ε[t-2] + ... + φₚε[t-q]`


    - `α` is usually the mean of the series.

    - `ε` is the error from the autoregressive models at respective lags.


    MA can detect trends and patterns in time-series data. You can use the ACF plots
    to determine the value of model variable `q`, which represents how many moving
    averages are required to remove any autocorrelation in a stationary series. From
    the ACF plot in Figure 7-16, we can observe that there is a cut-off after lags
    2 and 6. So, we can try ACF with `q = 2`, `MA(2)` or `q = 6`, `MA(6)`.


    ![ACF plot](images/524834_1_En_7_Chapter/524834_1_En_7_Fig16_HTML.jpg)


    An ACF plot where the y-axis represents the correlation value and the x-axis represents
    the lags from 0 to 7. The dashed lines on either side of the x-axis indicate significance.
    The first value of the series starts from 1 and decreases gradually with values
    8, 7, 5, -4, -5, -7, and -8, approximately.


    **Figure 7-16** – ACF plot


    Both AR and MA equations need to be integrated (I or d) to create the ARIMA model,
    which is represented as `ARIMA(p, d, q)`.


    ARIMA acts as a foundation for various other autoregressive time-series models
    as follows:


    - **SARIMA**: If there is a repetitive pattern at a regular time interval, then
    it’s referred to as *seasonality*, and the SARIMA model is used where S stands
    for seasonality. We will explore this more in the next section.

    - **ARIMAX**: If the series depends on external factors, then the ARIMAX model
    is used, where X stands for external factors.

    - **SARIMAX**: If along with seasonality there is a strong influence of external
    factors, then the SARIMAX model is used.


    One of the big limitations of ARIMA is the inability to consider the seasonality
    in time-series data, which is common in real-world scenarios like when there is
    exceptionally high sales figures during the holiday period of Thanksgiving and
    Christmas every year, high expenditure during the first week of every month, high
    footprints during the weekend in shopping malls, and so on. Such seasonality gets
    considered in another algorithm, called SARIMA, which is a variant of the ARIMA
    model.


    ### SARIMA


    A cyclical pattern at a regular time interval is referred to as *seasonality*
    and should be considered in a prediction model to improve the accuracy of prediction.
    That’s how the ARIMA model is modified to develop SARIMA, which considers seasonality
    in time-series data and supports univariate time-series data with a seasonal component.


    Along with ARIMA variables, SARIMA needs four new components:


    - **p**: Autoregression (AR) order of time series.

    - **d**: Difference (I) order of time series.

    - **q**: Moving average (MA) order of time series.

    - **m (or lag)**: Seasonal factor, number of time steps to be considered for a
    single seasonal period. For example, if there is yearly seasonality, then `m =
    12`; if it’s quarterly, then `m = 4`; if it’s weekly, then `m = 52`.

    - **P**: Seasonal autoregressive order.

    - **D**: Seasonal difference order.

    - **Q**: Seasonal moving average order.


    The final notation for an SARIMA model is specified as `SARIMA(p, d, q)(P, D,
    Q)m`.'
