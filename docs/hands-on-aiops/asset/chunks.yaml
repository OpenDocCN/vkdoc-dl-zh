    \n通过应用由人工智能/机器学习驱动的数据分析和启发式方法，工程师可以借助 `AIOps` 被动地处理事件，`AIOps` 会为他们指明正确的方向，并提供过去此类解决方案的相关数据。`AIOps`\
    \ 也被主动用于通过分析性能和容量数据来确定如何优化应用程序性能和基础设施性能。\n\n作为开发生命周期一部分的应用程序监控和 `AIOps`，将帮助开发团队主动发现应用程序或部署基础设施的可用性和性能问题，并在应用程序发布到生产环境之前解决这些问题。\n\
    \n采用 `AIOps` 可以通过确保容量的最佳利用，同时避免停机，帮助企业节省资金。如果出现问题，工程师能够比使用传统工具更快地恢复系统。\n\n`AIOps`\
    \ 有助于自动化那些不需要 IT 操作员参与的日常任务，同时为开发人员提供上下文信息，以缩短平均解决时间（`MTTR`）并改善客户体验。尽管主动性是 `AIOps`\
    \ 的核心，但它同样适用于被动场景。\n"
- fmt: '# AIOps 核心用例与功能


    企业正在使用 AIOps 解决不同的用例。图 [1-4](#524834_1_En_1_Chapter.xhtml#Fig4) 展示了 AIOps 中最常见的用例。组织从智能告警开始，在此阶段可以进行基本的根因分析，然后转向关联分析，以便识别不同系统之间的根因。随着组织在成熟度曲线上不断上升，会配置诸如异常检测等功能，使运维从被动响应转变为主动预防。处于成熟度曲线顶端的企业已经能够部署自愈和自动修复技术，从而完全自动化“检测到修复”的周期。


    ![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig4_HTML.png)


    一条水平线标记为“AIOps 用例”。四条垂直虚线穿过水平线，代表四个组织阶段：智能告警、跨实体关联、异常与威胁检测、自愈与自动修复，并有一条沿垂直线向上延伸的成熟度曲线。


    **图 1-4** AIOps 关键用例


    DevOps 和基础设施运维团队已部署了许多监控工具来获取可观测性数据，但如今他们被大量事件淹没。组织已部署了各种监控工具，例如 `Nagios`、`Zabbix`、`ELK`、`Prometheus`、`BMC`
    堆栈、`Microfocus` 堆栈、`SolarWinds`、`Zenoss`、`Datadog`、`Appdynamics`、`Dynatrace` 等。除了这些工具，企业还使用云原生监控工具（如
    `Azure Monitor` 和 `AWS CloudWatch`）来监控云原生 PaaS 系统。所有这些监控系统都在从可观测性的角度收集海量数据。许多组织正在监控从网络到应用程序的整个技术栈。然而，即使进行了所有这些投资并使用了多种工具，组织仍然难以获得洞察和可操作的情报。工程师被虚假告警和过多的工单所淹没。


    在 DevOps 模型中，如果没有 AIOps 等技术，DevOps 团队可能会被告警和值班支持压垮。引入 AIOps 可以确保只有可操作的告警被转化为事件，并标记给正确的团队进行解决。在非生产系统上部署
    AIOps 有助于发现开发和配置问题，并促进开发团队与运维团队之间更好的协作。AIOps 在确保业务服务不受影响，以及确保正确的团队和资源被调配用于解决问题方面发挥着重要作用。


    许多 IT 团队没有足够的能力来应对不断变化的技术需求。随着云计算的普及，整个 IT 格局正在快速变化，混合云和云原生技术在企业中被广泛使用。


    在这些核心基础设施和应用程序架构正在转型的情况下，运维工程师没有足够的时间来评估告警并找到问题的根因。在这种情况下，组织面临着不可用和停机的风险。


    传统的 IT 监控和管理解决方案无法跟上技术的变化和监控的深度，这导致了海量监控数据的产生（见图 [1-5](#524834_1_En_1_Chapter.xhtml#Fig5)）。不断变化的技术格局意味着日志数据和追踪数据正以不断增长的规模产生，并且不可能在监控系统中定义所有规则。AIOps
    通过摄取和分析所有这些数据来理解它们，并创建有意义且相关的告警，从而帮助运维团队专注于他们的核心工作——提供高可用性并达成服务等级协议（SLA）目标。


    ![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig5_HTML.jpg)


    该图描绘了一个标记为“数据过多”的表示层，包含 25 个图标，其中一些图标是云、位置、WiFi、电池、消息、锁、WiFi 路由器和网页浏览器。


    **图 1-5** 数据爆炸对传统 IT 运维的影响


    图 [1-6](#524834_1_En_1_Chapter.xhtml#Fig6) 展示了 AIOps 工具能够提供的核心功能。


    ![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig6_HTML.png)


    一张带有标题“AIOps”的图表。它有三个表格，分别标记为“数据摄取”、“分析”和“自动化”。“数据摄取”进一步分为 5 个工具：指标、追踪、日志、拓扑和配置。“分析”包含预测分析，有两个子分类。“自动化”包含
    3 个工具：诊断、分类和修复。


    **图 1-6** AIOps 工具核心功能


    **数据摄取：** 来自各种监控工具（包括指标、追踪和日志）的数据被摄取、存储和索引，以供进一步处理。此外，来自配置管理系统和拓扑数据的数据也被存储在 AIOps
    引擎中，以便基于 CMDB 和拓扑关系提供关联分析。


    **基于机器学习的分析：** AIOps 使用不同类型的方法来分析这些数据，以发现模式和异常。AIOps 平台使用基于规则和机器学习的方法来理解摄取的数据。我们将在本书中讨论的一些技术包括：使用聚类、关联和分类进行统计分析；检测事件数据中异常的异常检测；基于模式预测近期可能发生情况的预测分析；以及基于拓扑和
    CMDB 的关联分析。其理念是将所有这些事件数据转化为可能存在的因果告警，这些告警是问题的根因，以便运维团队能够专注于这些告警并及时解决事件。


    **自动诊断与修复：** 目前大多数 AIOps 工具专注于分析功能并交付该功能。自动化并非大多数 AIOps 工具集的一部分。然而，有一些工具（如 `DRYiCE
    iAutomate`）将前述技术也应用于诊断和修复，其中引擎将可能的原因作为输入，提供修复方案，并自动执行修复。这实现了自动修复，并提供了完整的端到端工作流。接下来，让我们详细讨论
    AIOps 的优势。'
  raw: 'Businesses are using AIOps to solve different use cases. Figure [1-4](#524834_1_En_1_Chapter.xhtml#Fig4)
    shows the most common use cases in AIOps. Organizations start with intelligent
    alerting where they can do basic root-cause analysis and then move to correlation
    so that the root cause between various systems can be identified. As organizations
    move up the maturity curve, features such as anomaly detection are configured
    so that the operations become more proactive than reactive. Enterprises at the
    top of the curve have been able to deploy self-healing and automated resolution
    technologies so that the detect-to-correct cycle is automated completely.


    ![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig4_HTML.png)


    A horizontal line labeled as A I Ops use cases. Four dotted vertical lines across
    the horizontal line represent four organizations, intelligent alerting, cross
    entity correlation, anomaly & threat detection, and self-healing & automated resolution
    with a maturity curve that moves up across the vertical lines.


    Figure 1-4


    AIOps key use cases


    DevOps and infrastructure operations teams have deployed many monitoring tools
    to get data for observability, and they are today swamped with too many events.
    Organizations have deployed various monitoring tools such as Nagios, Zabbix, ELK,
    Prometheus, the BMC stack, the Microfocus stack, SolarWinds, Zenoss, Datadog,
    Appdynamics, Dynatrace, etc. In addition to these tools, enterprises use cloud-native
    monitoring tools like Azure Monitor and AWS CloudWatch to monitor cloud-native
    PaaS systems. All these monitoring systems are collecting huge amounts of data
    from an observability perspective. Monitoring the entire stack from the network
    to the application is being done in many organizations. However, even with all
    these investments and multiple tools, organizations are struggling to get insights
    and actionable intelligence. The engineers are overloaded with false alerts and
    too many tickets to handle.


    In the DevOps model, without technologies like AIOps, there are scenarios where
    the DevOps teams will get overwhelmed with alerts and on-call support. Bringing
    AIOps into the mix ensures that only actionable alerts are converted into incidents
    and flagged to the right teams for resolution. AIOps deployed on nonproduction
    systems helps to find the development and configuration issues and results in
    better collaboration between the development and operations teams. AIOps is instrumental
    in ensuring that the business services are not affected, and the right teams and
    resources are aligned for resolution.


    Many IT teams are not well equipped to cope with the changing demands of technology.
    With the cloud becoming all-pervasive, the entire IT landscape is changing fast,
    with hybrid and cloud-native technologies being used extensively in enterprises.


    Operations engineers in these situations where the transformation of the core
    infrastructure and application landscape is happening don’t have adequate time
    to assess alerts and get to the root cause of the problem. In these situations,
    organizations are carrying a risk of unavailability and downtime.


    Traditional IT monitoring and management solutions are unable to keep up with
    the changes in technology and depth of monitoring that are resulting in huge amounts
    of monitoring data being generated (see Figure [1-5](#524834_1_En_1_Chapter.xhtml#Fig5)).
    The ever-changing technology landscape means that log data and trace data are
    being generated at ever-increasing volumes, and it is not possible to define all
    rules in the monitoring systems. AIOps comes to the rescue by ingesting and analyzing
    all this data to make sense of it and create meaningful and relevant alerts so
    that the operations teams can focus on their core job of providing high availability
    and meeting their goals on their SLAs.


    ![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig5_HTML.jpg)


    The image depicts a representation layer labeled as ''too much of data'' with
    25 icons, among which some of the icons are cloud, location, wifi, battery, message,
    lock, wifi router, and web browser.


    Figure 1-5


    Data explosion impacting traditional IT operations


    Figure [1-6](#524834_1_En_1_Chapter.xhtml#Fig6) shows the core functionality that
    AIOps tools can provide.


    ![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig6_HTML.png)


    An image of a chart with the heading A I Ops. It has three tables labeled as Data
    ingestion, Analytics, and Automation. Data ingestion is further divided into 5
    tools, metrics, traces, logs, topology, and configuration. Analytics has predictive
    analysis with two sub-divisions. Automation has 3 tools, diagnosis, triaging,
    and remediation.


    Figure 1-6


    AIOps tools core functionality


    **Ingestion of data:** Data from various monitoring tools including metrics, traces,
    and logs is ingested, stored, and indexed for further processing. In addition,
    data from configuration management systems and topology data is also stored in
    the AIOps engine to provide correlation based on CMDB and topology relationships.


    **Analytics using** **machine learning****:** AIOps uses different types of approaches
    for analyzing this data to find patterns and anomalies. There are rule-based and
    machine learning approaches used in AIOps platforms to make sense of the ingested
    data. Some of the techniques that we are going to discuss in this book are statistical
    analysis using clustering, correlation, and classification; anomaly detection
    to detect anomalies in the event data; predictive analytics to find what may happen
    in the near future based on patterns; and topology-based and CMDB-based correlation.
    The idea is to convert all this event data into probable causal alerts that are
    the root cause for an issue so that the operations teams can focus on this and
    resolve the incident in a timely manner.


    **Automated diagnosis and remediation****:** Most AIOps tools today focus on and
    deliver the functionality until analysis. Automation is not part of a majority
    of AIOps toolsets. However, there are a few tools like DRYiCE iAutomate that apply
    the previous techniques to diagnosis and remediation as well, where the engine
    takes the probable cause as input, provides the remediation, and runs the remediation
    automatically. This results in automated healing and provides a complete end-to-end
    workflow. Let’s discuss the benefits of AIOps in detail.'
