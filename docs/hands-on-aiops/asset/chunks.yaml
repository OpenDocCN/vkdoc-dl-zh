    alerts. AIOps platforms combine CMDBs, rule-based correlation, and unsupervised
    and supervised machine learning to achieve the end objective of finding out the
    root cause, and they attempt to provide predictive insights to find hidden issues,
    which may surface later. The core themes are the higher availability of systems,
    better insights and governance, and higher customer satisfaction scores.


    Let’s understand how AIOps improves the IT operations.


    ## The Three Key Areas in AIOps


    AIOps cuts across three key areas in IT operations, which are Observe, Engage,
    and Act.


    Traditionally, some aspects of the Observe area were under Monitoring, and now
    with end-to-end visibility being the focus, it has matured to “observability.”


    The second key area is Engage, which is part of the value stream and is related
    to IT service management and the functions of IT service management such as service
    desk, command center, and resolution groups as well as the ITSM processes such
    as incident management, change management, problem management, configuration management,
    capacity planning, and continual service improvement.


    The third area is Act, which defines the technical function where technical teams
    resolve incidents, complete service requests, and orchestrate changes in the IT
    systems.


    We will now delve deeper into each of these areas and see how AIOps impacts them.


    ### Observe


    Unlike traditional monitoring and event management tools, Observability uses machine
    learning–driven functions and ensures there are no blind spots or gaps left while
    catering to the enterprise monitoring needs of organizations irrespective of whether
    monolithic applications are running on traditional physical or virtual infrastructure
    or modern applications running on cloud-native or microservices architectures.
    Primarily four processes get performed in this stage, as shown in Figure [2-3](#524834_1_En_2_Chapter.xhtml#Fig3).


    ![](images/524834_1_En_2_Chapter/524834_1_En_2_Fig3_HTML.png)


    An illustration of four processes of observability using A I Ops: data ingestions
    and integration; event processing; event analytics; and visualization, collaboration,
    and feedback. Event processing has 2 branches, event deduplication, and suppression.
    Event analytics has 2 branches, machine learning, and rule based correlation.


    Figure 2-3


    Observability using AIOps


    #### Data Ingestion


    Data ingestion in AIOps is the first important step, and all monitoring and management
    data is ingested into the AIOps system so that all the data is available to the
    system for analysis. At times while implementing AIOps projects it is observed
    that the basic monitoring data is not in place while the organization is insisting
    on going ahead with AIOps; in such situations a fundamental discussion of how
    AIOps works and how machine learning algorithms are completely dependent on data
    comes to the rescue. Setting the right monitoring pieces can be spun off as a
    separate project under the program while AIOps continues to integrate and move
    forward with the plan of integrating its data sources. When the entire data is
    available, the algorithms are trained and tweaked to reflect the new data.


    For event management, the following data is required:


    *   *Events*: These are the events generated from various sources including operating
    systems, network devices, cloud computing platforms, applications, databases,
    and middleware platforms. All these platforms generate events, and they are captured
    through monitoring tools and then forwarded to the AIOps systems.


    *   *Metrics*: These are performance metrics, which include infrastructure metrics
    such as CPU utilization, memory, and disk performance parameters, network utilization,
    and response time metrics. These also include application metrics such as response
    time of an application, page load times, the completion time of queries, etc.
    The metrics are collected in a periodic manner, say every five minutes, and the
    data is used for understanding the behavior of the system over a period of time.
    This data is also termed *performance metrics*.


    *   *Logs*: Many systems maintain log files and provide data in logs. The log
    collection can be configured and tuned to log certain types of information. These
    log files are sent to AIOps systems to find patterns.


    *   *Traces*: The applications use tracing mechanisms to provide information on
    a complete application transaction right from the users’ browser to the backend
    servers; these are logged using various mechanisms including widely used formats
    like OpenTracing. The trace data provides information on the end-to-end transaction,
    and it provides the path and time that each step of the transaction took. Any
    errors or performance issues in any component can be diagnosed by using the trace
    data.


    Apart from the real-time data mentioned, AIOps tools need discovery and configuration
    data as well so that topology and relationship-based correlations can effectively
    work. This data ingestion may be done periodically rather than on a real-time
    basis.'
  trans: '

    ### 数据量


    `数据量`是大数据的核心特征。大数据系统处理的数据量远大于关系型数据库管理系统（RDBMS）所处理的数据量。由于 AIOps 将来自不同系统的数据整合到数据仓库中，如果没有以大数据技术平台为核心，数据量将变得难以管理。


    ### 速度


    大数据技术的第二个`V`是`速度`，它描述了数据被发送处理的速度。由于 AIOps 处理的是需要快速实时处理的事件数据，因此速度是 AIOps 处理数据时的一个重要参数。数据需要以近乎实时的间隔进行处理，以便人类或机器代理能够立即做出响应。来自多个来源的数据以高速发送到
    AIOps 系统，这需要合适的平台架构来大规模、快速地处理这些数据。


    ### 多样性


    大数据的第三个`V`是`多样性`。在 AIOps 中，需要处理多种多样的数据。存在多种监控和管理系统以及数据，例如事件、日志、指标、工单等，这些数据格式各异，都需要在
    AIOps 中进行处理。


    ### 真实性


    第四个`V`是`真实性`，这意味着数据应该是高质量的。你应该拥有正确的数据，并避免数据缺失等陷阱。发送到 AIOps 系统的数据需要准确、完整且干净，以便
    AIOps 平台能够根据用例进行处理。


    ### 价值


    `价值`意味着数据应具有商业价值。AIOps 数据极具价值，因为它能转化为更高的可用性和可见性，并且构成了自动化的支柱，以降低成本并为客户提供更好的服务。


    ## 机器学习


    除了大数据，AIOps 的另一个核心组件是机器学习。人工智能和机器学习技术是 AIOps 的核心。传统系统已被用于监控和事件关联；然而，它们是基于规则的，并未利用机器学习技术来高效、有效地获取洞察，并提供通过利用机器学习技术才能实现的特性和高级用例。


    AIOps 平台利用机器学习的能力来分析来自不同系统的数据，并检测被监控实体与事件之间的关系，以便发现模式和异常。我们将在后续章节中详细讨论 AIOps 的机器学习方面。


    然后，这些数据被用于提供洞察和分析，并得出根本原因告警。AIOps 平台结合了配置管理数据库（CMDB）、基于规则的关联以及无监督和有监督的机器学习，以实现找出根本原因的最终目标，并尝试提供预测性洞察以发现可能稍后才会浮出水面的隐藏问题。其核心主题是提高系统可用性、更好的洞察和治理，以及更高的客户满意度评分。


    让我们了解 AIOps 如何改进 IT 运维。


    ## AIOps 的三个关键领域


    AIOps 贯穿 IT 运维的三个关键领域，即：观察、参与和行动。


    传统上，观察领域的某些方面属于监控范畴，而现在随着端到端可见性成为焦点，它已成熟为“可观测性”。


    第二个关键领域是参与，它是价值流的一部分，与 IT 服务管理及其功能相关，例如服务台、指挥中心和解决小组，以及 IT 服务管理（ITSM）流程，如事件管理、变更管理、问题管理、配置管理、容量规划和持续服务改进。


    第三个领域是行动，它定义了技术职能，即技术团队解决事件、完成服务请求并协调 IT 系统中的变更。


    现在，我们将深入探讨每个领域，并了解 AIOps 如何影响它们。


    ### 观察


    与传统的监控和事件管理工具不同，可观测性使用机器学习驱动的功能，并确保在满足企业监控需求时不留盲点或空白，无论组织运行的是传统物理或虚拟基础设施上的单体应用，还是云原生或微服务架构上的现代应用。此阶段主要执行四个流程，如图
    2-3 所示。


    ![](img/524834_1_En_2_Fig3_HTML.png)


    使用 AIOps 实现可观测性的四个流程示意图：数据摄取与集成；事件处理；事件分析；以及可视化、协作与反馈。事件处理有两个分支：事件去重和抑制。事件分析有两个分支：机器学习和基于规则的关联。


    图 2-3


    使用 AIOps 实现可观测性


    #### 数据摄取


    AIOps 中的数据摄取是第一个重要步骤，所有监控和管理数据都被摄取到 AIOps 系统中，以便系统能够获取所有数据进行分析。有时在实施 AIOps 项目时，会发现基本的监控数据尚未到位，而组织却坚持推进
    AIOps；在这种情况下，关于 AIOps 如何工作以及机器学习算法如何完全依赖数据的基本讨论将有助于解决问题。设置正确的监控组件可以作为项目下的一个独立子项目进行，同时
    AIOps 继续集成并推进其数据源集成计划。当所有数据可用时，算法会进行训练和调整以反映新数据。


    对于事件管理，需要以下数据：


    *   `事件`：这些是从各种来源生成的事件，包括操作系统、网络设备、云计算平台、应用程序、数据库和中间件平台。所有这些平台都会生成事件，并通过监控工具捕获，然后转发到
    AIOps 系统。


    *   `指标`：这些是性能指标，包括基础设施指标，如 CPU 利用率、内存和磁盘性能参数、网络利用率和响应时间指标。这些还包括应用程序指标，如应用程序的响应时间、页面加载时间、查询完成时间等。指标会定期收集，例如每五分钟一次，这些数据用于了解系统在一段时间内的行为。这些数据也称为`性能指标`。


    *   `日志`：许多系统维护日志文件并在日志中提供数据。可以配置和调整日志收集以记录某些类型的信息。这些日志文件被发送到 AIOps 系统以查找模式。


    *   `追踪`：应用程序使用追踪机制来提供从用户浏览器到后端服务器的完整应用程序事务信息；这些信息通过各种机制记录，包括广泛使用的格式，如`OpenTracing`。追踪数据提供了端到端事务的信息，并显示了事务每个步骤的路径和耗时。任何组件中的错误或性能问题都可以通过使用追踪数据进行诊断。


    除了上述实时数据，AIOps 工具还需要发现和配置数据，以便基于拓扑和关系的关联能够有效工作。这种数据摄取可能是定期进行的，而不是实时的。

