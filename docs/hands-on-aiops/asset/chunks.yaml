    # 前言


    在开启我们的 AIOps 之旅之前，让我们先简要讨论一下自动化及其在过去十年中的演变。


    技术领域的自动化被定义为一个系统，在该系统中，流程或任务可以在最少的人工监督和操作下完成。人类一直在自动化各种任务，最终发明了减少人力投入并提高效率的机械机器。如今，像制造业这样过去部分自动化的领域，正在转向
    3D 打印，这完全自动化了制造过程；然而，设计要制造什么仍然属于人类领域。


    因此，自动化减少了人力投入，并使用机器或软件来完成可定义、可重复的任务。


    在 IT 领域，人类执行着各种任务，包括构想新产品或应用程序、开发将需求转化为可用软件的代码、部署基础设施和应用程序，并在其生命周期内保持更新。


    IT 团队在从软件开发到运营的各个领域都广泛使用了自动化；然而，这在很大程度上是孤立的，并且没有采用正式的自动化系统或方法。IT 团队使用脚本、运行手册自动化工具、作业调度系统和机器人流程自动化系统来自动化他们的任务。这些工具提高了效率，并减少了运营
    IT 环境所需的人力。


    随着云计算和 DevOps 原则的日益普及，基础设施即服务和平台即服务环境的配置以及应用程序的部署也已实现自动化。这不仅实现了任务自动化和效率提升，还带来了敏捷性和速度，使企业能够通过根据客户和市场反馈快速更改功能和特性，来调整和适应不断变化的市场需求。


    IT 运行在三大支柱之上：流程、人员和技术。要实现自动化，需要了解这些支柱之间的相互关系。人员使用定义的流程来处理技术，而通过自动化，我们本质上是在自动化人员当前用于运营环境的流程。然而，随着技术格局的变化以及人工智能和机器学习能力的日益普及和成熟，我们现在可以审视当前的流程，并制定新的流程，以利用这些技术提供的变革能力。当前的流程是基于当时最先进的技术建立的，这些流程随后定义了人类应如何在其中操作以执行任务并实现目标；但是，随着技术格局的剧烈变化，流程也需要改变和适应。例如，随着云计算的普及，IT
    流程需要改变和适应，顺序的、非自动化的流程需要改变，以适应自动配置等新功能。2013 年，我谈到了容量管理将如何在云计算世界中发生巨大变化，以及需要针对云成本管理制定新的程序。其中一些概念已扩展到涵盖整个财务运营领域，统称为*云
    FinOps*。


    同样，IT 运营自动化一直以来都是孤立存在的。人们使用脚本、监控工具、运行手册自动化、配置和部署自动化、RPA 工具，以及通过 ITSM 工具实现自动化服务管理流程。然而，所有这些都发生在不同的领域，并通过孤立的集成进行整合。


    在技术方面，人工智能和机器学习技术已成为主流，并被广泛应用于面向业务和面向客户的应用程序的各个方面，从网站到搜索引擎再到协作和通信工具。AI 迅速占领了 IT
    世界；然而，IT 在采用这些技术方面却姗姗来迟。虽然 IT 团队正在使用这些技术为客户创建具有 AI 能力的新应用程序，但他们自己的内部系统仍然使用着较旧的技术，并运行在过去十年中基本未受影响的流程和系统上。


    通过 DevOps 和敏捷运动，这种变革性的变化已经改变了应用程序构建、测试和部署的方式，并且开发价值流中的大多数任务都已实现自动化和集成，从而使组织能够迈向持续交付和持续部署。与
    DevOps 带来的变革类似，随着 AIOps 的兴起，我们将见证一场变革性的变化，它将彻底改变过去 IT 运营的运行方式。旧的流程、系统、工具和工作方式将被
    AIOps 的运营方式所取代，并有助于实现 NoOps 的愿景，即运营工作在没有人工监督和干预的情况下，以自动化方式无缝、无中断地进行。'
- fmt: '# 排版后的文本


    Enterprises today are at various levels of maturity when it comes to automation.
    Most are yet to achieve a high level of maturity in automation, partly because
    changing processes, breaking down walls of organization structures, and deploying
    new technology are complex, time-consuming tasks. In some organizations, where
    digitization and cloud computing programs are a part of large-scale transformation;
    `AIOps` and associated technology and process changes are enabling a complete
    transformation of digitization. One key factor in adopting `AIOps` has been a
    lack of comprehensive process and technology guidance in this domain. There is
    limited guidance available, and most of it is focused on products that vendors
    are trying to sell as a one-stop solution, which will leapfrog an organization
    to the next level. With this publication we are aiming to provide hands-on pragmatic
    guidance on how an organization can adopt these changes in the origination and
    what the pitfalls are to be avoided. Implementing `AIOps` is not about deploying
    an event correlation tool; it is about infusing AI and algorithms and automating
    all aspects of operations.


    Most organizations today are at a level where they have automated individual tasks
    and have automated certain processes. Some have also achieved automation of complex
    end-to-end processes. However, an end-to-end self-sustaining model for automation
    is still missing. Automating a few processes versus automating everything that
    can be automated is a change that people haven’t yet initiated. Automating a few
    processes and then scaling the automation across teams, functions, and departments
    is still work in progress in most organizations.


    `AIOps` is not just a technology or process change; it is a cultural change where
    humans and AI work together in tandem supporting and augmenting each other’s capabilities
    to achieve efficiencies and scalability, which IT teams have only wished for but
    have been unable to achieve. The promise of `NoOps` has failed to materialize
    because organizations have not been able to take a holistic and end-to-end approach
    to `AIOps` and instead have relied on quick fixes in the form of siloed tools
    that are deployed.


    In enterprises that have moved up the maturity curve in automation, most activities
    that can be automated fully or partially are automated, and AI drives decision-making
    rather than humans using a dashboard and analytics to arrive at the next steps.
    It is a mindset change where humans have to accept the supremacy of the AI systems
    in certain areas and let go of the control mindset inherent in our species. IT
    teams are used to certainty and rule-based systems that have dominated the IT
    landscape for decades. AI-based systems are probabilistic and not definitive;
    thus, some enterprises have deployed `AIOps` systems but configured them in a
    manner where they are nothing but rule-based systems. Accepting probabilistic
    systems rather than step-by-step rule-based systems is a mindset change, and one
    needs to accept the risks that come with implementing such systems and controls
    to ensure best practices for running AI-based systems; human control on some of
    the actions is incorporated as part of the process changes.


    Enterprises are also evolving to change their operating models to align with Agile
    principles; they are starting to integrate applications and infrastructure teams
    and are adopting new practices such as site reliability engineering to make operations
    support highly reliable and high-availability mission-critical systems and Internet-scale
    applications. `AIOps` is a key pillar in site reliability engineering–based operations.
    The book *Hands On Guide to AgileOps* published in 2021 by Apress provides hands-on
    guidance on how to adopt Agile for IT operations.


    This book will take you through all aspects of `AIOps` including AI and machine
    learning algorithms and demonstrate how some of the features in `AIOps` are implemented
    in enterprise `AIOps` platforms. You will be able to leverage the capabilities
    provided by `AIOps` processes and platforms and take your organization to a higher
    level of maturity in operations. We will continue to provide updated content and
    guidance on the companion website, [`www.AgileInfraOps.com`](http://www.agileinfraops.com),
    where you will find articles and best practices as processes and technology continues
    to evolve.


    ## Introduction


    This book is a hands-on guide to understanding `AIOps` in detail and assisting
    in implementing its technologies and processes in the organization.


    The book explains the IT industry’s need for `AIOps`, its architecture, and the
    technologies that contributed to its evolution. Readers will be able to grasp
    the core theoretical concepts around `AIOps` as well as go deeper by implementing
    hands-on examples and exercises that leverage machine learning techniques to implement
    `AIOps`. The book also provides guidance on how to set up `AIOps` in an enterprise
    and what pitfalls to avoid to complete a successful implementation. The book also
    explains the role of `AIOps` in the `SRE` and `DevOps` model and provides a detailed
    explanation of the enablement of key `SRE` principles by `AIOps`.


    This hands-on book also provides an implementation of multiple `AIOps` use cases
    and provides sample code that you can run to better grasp some of the underlying
    principles and technologies that form the core of `AIOps`.


    This book shares the best practices, processes, and guidelines to establish `AIOps`
    practice and systems in enterprises and the methods to measure the outcomes and
    continuously evolve.


    ## Acknowledgments


    To my family, Shweta and Soumil, for being always there by my side and letting
    me sacrifice their time for my intellectual and spiritual pursuit. This and other
    accomplishments of my life wouldn’t have been possible without your love and support.


    To my mom and my sister for your love and support as always: without your blessings,
    nothing is possible.


    To my coauthor Gaurav and the team at HCL who have been a source of inspiration.


    Thank you to Celestine and the entire team at Apress for turning our ideas into
    reality. It has been an amazing experience authoring with you, and over the years,
    the speed of decision-making and the editorial support has been excellent.


    > —Navin


    To my mom and dad for always being there by my side, giving invaluable support
    and encouragement and continuously striving for knowledge and wisdom.


    To my wife and lovely daughters, Vaidehi and Maanvi, for being inspirations to
    me and for sacrificing their time.


    To my coauthor and mentor, Navin, thank you for your guidance, support, and feedback.


    To my teammates, Vipul Tyagi and Rajesh Upadhyay, thank you for your technical
    support.


    Thank you, Lord, for giving me wisdom and strength through every aspect of life.


    > —Gaurav


    ## About the Authors


    ## About the Technical Reviewer


    # 1. What Is AIOps?


    This chapter introduces artificial intelligence for IT operations (abbreviated
    as `AIOps`). In today’s rapidly transforming application and infrastructure landscape
    and adoption of cloud-native technologies, organizations are finding it difficult
    to provide 24/7 operations that can scale and meet the needs of businesses that
    now want much higher availability and agility to change based on customer and
    market feedback. This chapter also provides details on the benefits that `AIOps`
    brings to the table and how it supports the digitization journey of enterprises.'
