    requirements and users. As an example, we have a 100 percent availability expectation
    when it comes to mission-critical applications or internet-scale applications
    like search and email. However, we may not have the same expectations from less
    critical systems like a timesheet application. Similarly, our requirements for
    response time from a mail or search engine application versus an ERP application
    are different. Service level objectives take the business and customer context
    and apply it on top of the service level indicators to arrive at the objective
    or target that the SRE team is willing to live with. An example could be 99.95
    availability.


    Service level objectives are for a timeframe. For example, an objective could
    be to meet the 99.95 availability goal on a monthly basis.


    SLOs also leave room for an error budget. Whenever a failure or degradation affects
    the service, the error budget decreases. Thus, in the previous example, .05 percent
    is the error budget available.


    It is difficult to achieve granular SLIs and SLOs and measure them accurately
    without AIOps. With basic monitoring and fragmented monitoring tools working in
    silos, it is extremely difficult to calculate and arrive at application availability
    or business process availability. Thus, AIOps is essential to provide the correct
    data on the availability and response time of an application or business process
    to enable the SREs to have granular and correct data to arrive at the right SLIs
    and SLOs.


    ### Principle 3: Eliminating Toil


    Eliminating toil means reducing the amount of repetitive work a team must do.


    This is an extremely important principle for SREs; it differentiates the SRE model
    from other operations models that do not have metrics to measure and eliminate
    toil. SREs carry targets for toil elimination, and for this there are two important
    elements. One is the ability to measure toil in the system, and the second is
    to eliminate toil rapidly so that the teams can focus on more value-adding work.


    SREs eliminate toil by automating routine and standard work that does not need
    human intelligence for every transaction. Things like health checks, routine checks,
    reporting, automated monitoring, and autoremediation for known errors are some
    of the tasks that SREs work to automate.


    Another way SREs eliminate toil is by creating guides or standard operating procedures
    so that the knowledge base is enriched and can be quickly searched and used whenever
    required.


    AIOps comes to the rescue here in more ways than one. Though not many AIOps products
    support algorithmic or machine learning–based automation systems, but there are
    a few upcoming products like iAutomate that use machine learning technologies
    to manage automation work. AIOps products provide capabilities where the SRE teams
    can use algorithms to estimate the amount of toil and keep track of automation
    and its benefits using analytics to identify, automate, and report on toil. The
    tools also come with built-in automations that can be used easily by the SREs
    to eliminate toil rapidly without having to create automations from scratch.'
  trans: '

    # SRE 原则与 AIOps


    站点可靠性工程近年来已发展成为一个备受关注的领域和技能。由于众多架构选择导致应用和基础设施复杂性不断增加，可用性和韧性在架构和运维中都至关重要。SRE 模型建立在以下原则之上；你将看到
    AIOps 如何赋能其中大部分原则。


    ## 原则一：拥抱风险


    拥抱风险意味着权衡提升可靠性的成本及其对客户满意度的影响。没有任何服务能够做到 100% 可靠。可靠性也存在成本权衡；超过某个临界点后，增加更多可靠性可能意味着成本翻倍，甚至成倍增长。例如，支持
    99.95% 的可用性与支持 99.999% 相比，成本差异可能高达数倍。因此，必须在可靠性目标与其相关成本之间取得平衡。


    SRE 围绕可用性和响应时间制定的服务等级协议，结合错误预算，支撑了这一原则，使其能够在 SLA 范围内自由管理可用性。当错误预算不足时，SRE 有权拒绝应用或基础设施的变更。此外，SRE
    的重点是尽快让服务恢复运行，这可能涉及在快速决策中承担一定风险。


    AIOps 通过为 SRE 提供所有必要数据来测量 SLI 和 SLO，并将其汇总到 SLA 下，从而支持这一原则。AIOps 工具利用自动化机制，使 SRE
    能够快速解决可用性问题。AIOps 模型和分析并非确定性，而是概率性的，因此带有不确定性因素，永远无法达到 100% 准确，这与 SRE 模型的精神是一致的。


    ## 原则二：服务等级目标


    可观测性数据构成了服务等级指标的基础，这些指标提供关于可用性、响应时间等方面的数据。这些指标随后被汇总到服务等级目标（SLO）中。服务等级目标设定在客户会对服务感到不满的临界点。对于不同类型的业务需求和用户，服务等级指标和目标也会有所不同。例如，对于关键任务应用或互联网规模的应用（如搜索和电子邮件），我们期望
    100% 的可用性。然而，对于不那么关键的系统（如工时表应用），我们的期望可能就不同。同样，我们对邮件或搜索引擎应用与 ERP 应用的响应时间要求也不同。服务等级目标会考虑业务和客户背景，并将其应用于服务等级指标之上，从而得出
    SRE 团队愿意接受的目标或指标。例如，99.95% 的可用性。


    服务等级目标是有时间范围的。例如，一个目标可能是每月达到 99.95% 的可用性。


    SLO 也为错误预算留出了空间。每当发生故障或性能降级影响服务时，错误预算就会减少。因此，在前面的例子中，0.05% 就是可用的错误预算。


    没有 AIOps，很难实现细粒度的 SLI 和 SLO 并对其进行精确测量。使用基础监控和各自为政的碎片化监控工具，计算并得出应用可用性或业务流程可用性极其困难。因此，AIOps
    对于提供应用或业务流程可用性和响应时间的正确数据至关重要，从而使 SRE 能够获得细粒度且正确的数据，以制定合适的 SLI 和 SLO。


    ## 原则三：消除琐事


    消除琐事意味着减少团队必须执行的重复性工作。


    这对 SRE 来说是一个极其重要的原则；它使 SRE 模型区别于其他没有指标来衡量和消除琐事的运维模型。SRE 承担着消除琐事的目标，为此有两个重要要素。一是能够衡量系统中的琐事，二是能够快速消除琐事，以便团队可以专注于更有价值的工作。


    SRE 通过自动化那些不需要每次交易都进行人工判断的常规和标准工作来消除琐事。诸如健康检查、例行检查、报告、自动化监控以及对已知错误的自动修复等，都是 SRE
    致力于自动化的工作。


    SRE 消除琐事的另一种方式是创建指南或标准操作流程，从而丰富知识库，使其在需要时能够被快速搜索和使用。


    AIOps 在此以多种方式提供了帮助。尽管没有太多 AIOps 产品支持基于算法或机器学习的自动化系统，但有一些新兴产品，如 `iAutomate`，使用机器学习技术来管理自动化工作。AIOps
    产品提供了这样的能力：SRE 团队可以使用算法来估算琐事的数量，并通过分析来跟踪自动化及其收益，从而识别、自动化并报告琐事。这些工具还内置了自动化功能，SRE
    可以轻松使用这些功能快速消除琐事，而无需从头开始创建自动化。

    '
- fmt: '### Principle 4: Monitoring


    Monitoring or observability is the key to getting data from systems and applications.
    Without monitoring and observability, the availability, performance, and response
    time of applications and business processes cannot be measured. Monitoring looks
    at events, metrics, logs, and traces to provide meaningful data that can be analyzed
    and used for reactive and proactive actions to provide higher availability.


    Monitoring and observability tools provide the raw data for the AIOps tools that
    can then use this input and apply algorithms and machine learning techniques to
    provide deeper actionable insights on this data.


    The most common metrics focused on for reliability are these four golden signals:


    - *Latency*: The time it takes for a service to respond to a request

    - *Traffic*: The amount of load a service is experiencing

    - *Error rate*: How often requests to the service fail

    - *Saturation*: How much longer the service’s resources will last


    All these golden signals are analyzed by the AIOps tools to provide forecasting
    to see if something will break in the near future. This removes noise and selects
    actionable alerts and supporting data so that the teams can focus on the right
    alerts without wasting time to find the root cause. Advanced statistical techniques
    are used to create causality maps that show which component failure resulted in
    failure of the system. Pattern matching techniques are used to find relevant information
    in log files, which is then provided to the site reliability engineers to do a
    deeper analysis.


    AIOps tools greatly enhance the SRE function by providing them with the right
    information at the right time without having to dig through multiple records to
    arrive at a conclusion on the root cause. The dashboards created in AIOps provide
    topology, alerts, and knowledge articles so that the SREs can collaborate with
    development teams.


    Using AIOps, the SRE and DevOps teams are able to visualize the entire architecture
    of an application using the topology and discovery data. Then this data is overlayed
    with the events that are getting generated from individual layers and components.
    This gives a bird’s-eye view to the entire application landscape and makes it
    easier for SREs to use this data and visualization in both operations as well
    as architectural transformation decisions.


    The AIOps tools also help the SRE teams in understanding the application from
    an infrastructure-up perspective by getting the data from infrastructure monitoring
    tools and overlaying that with real user-monitoring data from application monitoring
    tools. This helps the SRE teams to narrow down on the root cause, which can be
    at the user end-level or in the network, infrastructure, or software code. The
    visibility provided by the AIOps tools helps SREs arrive at the root cause much
    faster.


    Root-cause analysis done using machine learning technologies aids in faster response
    and resolution time and helps the SRE teams in maintaining a high level of availability
    and manage their SLAs. This results in increased productivity of the operations
    teams and higher customer satisfaction scores.


    ### Principle 5: Automation


    Automation means creating ways to complete repetitive tasks without human intervention.
    This helps free up teams for higher-value work.


    This principle is an extension of the eliminate toil principle where everything
    that creates repetitive work for the team is eliminated. Automation helps to achieve
    the elimination of toil.


    The SREs work on many automation levers.


    - *Incident response*: The SREs respond to incidents that have or are likely to
    impact SLOs. This is an important function for the SREs. The SREs automate incident
    response by using scripts and creating automation for simple scenarios. They can
    also leverage tools to deploy out-of-the-box automations for incident response.

    - *Deployment*: The SRE teams automate the deployment of monitoring and other
    applications as well, depending on how the function is structured in an organization.

    - *Testing*: This is an important element of SRE work, where automated testing
    for infrastructure and applications is used by SREs to find resilience issues.
    SREs use various methods and tools.

    - *Communication*: This is an essential ingredient in any operation. SREs use
    ChatOps tools to collaborate and communicate about issues and development work
    along with incidents and other actions, and tools like Slack are used by SREs
    for real-time communication.


    AIOps tools help in the automation of monitoring, root-cause or probable-cause
    analysis, and remediation of incidents. The AIOps tools also provide embedded
    or integrated ChatOps to facilitate communication between SRE members and development
    teams on a real-time basis where both can have access to a common shared dashboard
    and alert data to better analyze the situation and take appropriate remedial action.


    ### Principle 6: Release Engineering


    Release engineering means building and deploying software in a consistent, stable,
    repeatable way. The previous SRE principles are applied to releasing software.


    Some of the activities done as part of release engineering are as follows:


    - *Configuration management*: Define the baseline configuration and ensure that
    the releases change the configuration based on defined processes and that the
    configuration changes are tracked. It also involves defining “desired state configuration”
    for systems so that there is no deviation from the approved configuration.

    - *Testing*: Implement continuous testing and automated testing to ensure the
    release meets the requirements and definition of done.

    - *CI/CD and rapid deployment*: Where possible, automate the release process by
    leveraging the DevOps principles of continuous integration, continuous delivery,
    and continuous deployment. This enables consistent, repeatable releases in an
    automated fashion and increases the agility by providing teams with a system and
    process to release very frequently in response to business needs or for bug fixing.


    Since the AIOps tools today are focused more on the operations aspects, they are
    used in the development process to ensure that the release has the requisite operations
    aspects covered during the development process.


    AIOps tools help in identifying configuration drift and unapproved changes to
    infrastructure or applications by providing analytics over log data that is ingested
    into the AIOps tools. The tools facilitate continuous testing and deployment by
    providing insights into the availability and performance of the application and
    infrastructure in the development lifecycle. The AIOps tools support rapid deployment
    by providing before and after deployment comparison when SREs and DevOps teams
    are using continuous deployment and deploying to production frequently. Without
    AIOps, these processes are manual and prone to errors; AIOps helps the SREs to
    focus on the core aspects of availability resilience and performance while doing
    the heavy lifting of providing the right data to them.


    ### Principle 7: Simplicity


    Simplicity means developing the least complex system that still performs as intended.
    The goals of simplicity and reliability go hand in hand. A simpler system is easier
    to monitor, repair, and improve.


    ## AIOps Enabling Visibility in SRE and DevOps


    SREs advocate an end-to-end approach to reliability; building models is a good
    way to gain insights into the internal components. SRE advocates a holistic, end-to-end
    approach to reliability.


    AIOps tools bring simplicity to the architecture by ensuring everything is integrated
    from observability aspects and integrated into a dashboard. AIOps ties together
    all the monitoring tools and integrates the automation aspects into the mix. Using
    AIOps simplifies operations and integrates the Dev and Ops teams through collaboration
    tooling.'
