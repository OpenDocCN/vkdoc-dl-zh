- fmt: "# Introduction to AIOps\n\n`AIOps` is a buzzword in the operations world and\
    \ was coined by Gartner in 2016. As mentioned, it means implementing artificial\
    \ intelligence for IT operations. `AIOps` refers to a transformational approach\
    \ to running operations using AI and machine learning technologies in various\
    \ operations domains such as monitoring, observability, event correlation, service\
    \ management, and automation. With the exponential growth seen in application\
    \ and platform diversity, including the movement to microservices and cloud architectures,\
    \ there is an enormous amount of data being generated in operations. The operations\
    \ teams are overwhelmed with this vast amount of data and the diversity in applications,\
    \ platforms, and infrastructures in the environment. Most enterprises today are\
    \ rapidly migrating and adopting new technologies such as cloud and microservices\
    \ architecture, and thus the rate of change in infrastructure and platforms is\
    \ unlike anything seen before. The challenge in IT operations is to run steady-state\
    \ operations without disruption and also support this agility and migration and\
    \ bring new services into operations. These disruptions and changes are putting\
    \ an enormous strain on the operations teams. Processes and systems that have\
    \ worked in the past are not working anymore, and the new digitalized world with\
    \ rapid changes both in applications and infrastructure is resulting in newer\
    \ challenges. Thus, `AIOps` has evolved over the last few years as a potential\
    \ solution to the operational challenges of the new model.\n\nThe huge amount\
    \ of data getting generated from monitoring and observability systems is one of\
    \ the sources of data that is fed into `AIOps`-based systems, and then AI and\
    \ machine learning techniques are used to make sense of the data and filter the\
    \ noise from critical events. This results in automating most of the tasks that\
    \ were manual before and that relied on human judgment and tribal knowledge. The\
    \ events that can cause disruption in business operations and are the root cause\
    \ are efficiently identified using analytics techniques and thus provide immediate\
    \ notification to the groups that are resolving them. Without `AIOps` this process\
    \ will be difficult to run with changes in technology happening at a rapid pace;\
    \ relying on older systems and tribal knowledge would mean operations is not scalable\
    \ and predictable.\n\nAll of this is enabled by the emergence and maturity of\
    \ artificial intelligence and machine learning technologies, which are the foundation\
    \ of `AIOps`.\n\nArtificial intelligence has transformed the way systems are developed\
    \ and business processes are run. AI is everywhere from the image processing in\
    \ your phone to recommendation engines on Amazon that provide you with new product\
    \ recommendations based on your preferences. Face recognition and image beautification\
    \ on phones are examples of applications that people are consuming every day without\
    \ even knowing that artificial intelligence is powering these applications. Natural\
    \ language processing advancements have transformed the way we interact with applications.\
    \ Today voice assistants like Alexa, Siri, and Cortana are changing the way we\
    \ communicate with content.\n\nInformation technology has leveraged these technologies\
    \ to solve varying business problems in the areas of building recommendation systems,\
    \ predictive systems, image recognition, voice recognition, text extraction, and\
    \ natural language understanding systems.\n\nHowever, when it comes to solving\
    \ IT problems using artificial intelligence, enterprises and technology companies\
    \ have yet to embrace this fully.\n\nFinally, the AI technologies that IT teams\
    \ have used to deliver exciting new applications for consumers and businesses\
    \ are now finding their way into monitoring and managing the IT technologies.\
    \ Thus, a new class of systems that are using algorithms to run IT operations\
    \ was born.\n\n`AIOps` is a term Gartner invented to describe a general trend\
    \ of applying AI techniques to IT operations data sources to provide additional\
    \ insights. `AIOps` is essentially a feature or set of features to analyze, combine,\
    \ and collect data.\n\nAccording to Garner, “By 2023, 40% of DevOps teams will\
    \ augment application and infrastructure monitoring tools with artificial intelligence\
    \ for IT operations (`AIOps`) platform capabilities.” `AIOps` platforms are platforms\
    \ that “utilize big data, modern machine learning and other advanced analytics\
    \ technologies to directly and indirectly enhance IT operations functions with\
    \ proactive, personal and dynamic insight.”\n\nFigure [1-1](#524834_1_En_1_Chapter.xhtml#Fig1)\
    \ defines the various areas in IT operations that are included in `AIOps`. These\
    \ include monitoring, event analytics, predictive and recommendation systems,\
    \ collaboration and engagement, and reporting and dashboarding technologies.\n\
    \n![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig1_HTML.png)\n\nA chart of\
    \ various layers of information technology in `AIOps`. In the middle, there is\
    \ a chart labeled `Devops/operation`. To the left, there are three icons Chatbox,\
    \ robotic process automation, and `BPM`, with the heading Business services. There\
    \ are three layers `CMDB/discovery`, security, and governance to the right.\n\n\
    **Figure 1-1**  \n`AIOps` in the IT operations landscape\n\n`AIOps` covers various\
    \ layers of information technology. From the network to the endpoints, everything\
    \ in IT can use `AIOps` technologies to reap the benefits that `AIOps` provides.\n\
    \nEnterprise monitoring provides a real-time data feed to the `AIOps` system to\
    \ perform ML-driven correlation and analysis using various techniques to detect\
    \ patterns and anomalies, as well as perform causal-impact analysis. This is one\
    \ of the most important stages as this analysis needs to consider both real-time\
    \ streaming data as well as historical data to provide predictive recommendations\
    \ or proactive remediations, which then get executed using IT process or runbook\
    \ automation tools. The recommendations for resolution help the organizations\
    \ in achieving end-to-end automation by resolving problems without human intervention.\n\
    \nThe reporting and dashboard layer provides views for different IT teams and\
    \ stakeholders to collaborate and manage incidents, capacity, change, and problems\
    \ to further support business by providing KPIs and SLAs that are driven by insights\
    \ and provide an element of predictive analytics to make operations more proactive.\n\
    \n`AIOps` systems leverage a Configuration Management Database (`CMDB`) to improve\
    \ the quality of correlations and accuracy of predictions and recommendations,\
    \ but organizations usually struggle in maintaining the accuracy of the `CMDB`\
    \ and discovery data due to the ever-changing infrastructure landscape. With cloud\
    \ computing, it is practically impossible to update the `CMDB` using traditional\
    \ tools and processes. An `AIOps` system solves this problem by automatically\
    \ populating the required missing data in the `CMDB`. This well-oiled engine of\
    \ `AIOps` has to work within organizations’ security policies defined under their\
    \ governance framework. Various compliance needs like GDPR, data classifications,\
    \ etc., should be considered at each layer of the `AIOps` engine while they are\
    \ being integrated or set up. Once `AIOps` systems get up and running, they learn\
    \ patterns, anomalies, and behavior using data over a period of time. Gradually,\
    \ based on maturity, the `AIOps` system gets consumed by other technology or business\
    \ units such as `ChatOps`, robotic process automation, business process automation,\
    \ etc. More complex business process workflow or chat responses can be triggered\
    \ based on the `AIOps` system recommendations."
  raw: '## Introduction to AIOps


    AIOps is a buzzword in the operations world and was coined by Gartner in 2016\.
    As mentioned, it means implementing artificial intelligence for IT operations.
    AIOps refers to a transformational approach to running operations using AI and
    machine learning technologies in various operations domains such as monitoring,
    observability, event correlation, service management, and automation. With the
    exponential growth seen in application and platform diversity, including the movement
    to microservices and cloud architectures, there is an enormous amount of data
    being generated in operations. The operations teams are overwhelmed with this
    vast amount of data and the diversity in applications, platforms, and infrastructures
    in the environment. Most enterprises today are rapidly migrating and adopting
    new technologies such as cloud and microservices architecture, and thus the rate
    of change in infrastructure and platforms is unlike anything seen before. The
    challenge in IT operations is to run steady-state operations without disruption
    and also support this agility and migration and bring new services into operations.
    These disruptions and changes are putting an enormous strain on the operations
    teams. Processes and systems that have worked in the past are not working anymore,
    and the new digitalized world with rapid changes both in applications and infrastructure
    is resulting in newer challenges. Thus, AIOps has evolved over the last few years
    as a potential solution to the operational challenges of the new model.


    The huge amount of data getting generated from monitoring and observability systems
    is one of the sources of data that is fed into AIOps-based systems, and then AI
    and machine learning techniques are used to make sense of the data and filter
    the noise from critical events. This results in automating most of the tasks that
    were manual before and that relied on human judgment and tribal knowledge. The
    events that can cause disruption in business operations and are the root cause
    are efficiently identified using analytics techniques and thus provide immediate
    notification to the groups that are resolving them. Without AIOps this process
    will be difficult to run with changes in technology happening at a rapid pace;
    relying on older systems and tribal knowledge would mean operations is not scalable
    and predictable.


    All of this is enabled by the emergence and maturity of artificial intelligence
    and machine learning technologies, which are the foundation of AIOps.


    Artificial intelligence has transformed the way systems are developed and business
    processes are run. AI is everywhere from the image processing in your phone to
    recommendation engines on Amazon that provide you with new product recommendations
    based on your preferences. Face recognition and image beautification on phones
    are examples of applications that people are consuming every day without even
    knowing that artificial intelligence is powering these applications. Natural language
    processing advancements have transformed the way we interact with applications.
    Today voice assistants like Alexa, Siri, and Cortana are changing the way we communicate
    with content.


    Information technology has leveraged these technologies to solve varying business
    problems in the areas of building recommendation systems, predictive systems,
    image recognition, voice recognition, text extraction, and natural language understanding
    systems.


    However, when it comes to solving IT problems using artificial intelligence, enterprises
    and technology companies have yet to embrace this fully.


    Finally, the AI technologies that IT teams have used to deliver exciting new applications
    for consumers and businesses are now finding their way into monitoring and managing
    the IT technologies. Thus, a new class of systems that are using algorithms to
    run IT operations was born.


    AIOps is a term Gartner invented to describe a general trend of applying AI techniques
    to IT operations data sources to provide additional insights. AIOps is essentially
    a feature or set of features to analyze, combine, and collect data.


    According to Garner, “By 2023, 40% of DevOps teams will augment application and
    infrastructure monitoring tools with artificial intelligence for IT operations
    (AIOps) platform capabilities.” AIOps platforms are platforms that “utilize big
    data, modern machine learning and other advanced analytics technologies to directly
    and indirectly enhance IT operations functions with proactive, personal and dynamic
    insight.”


    Figure [1-1](#524834_1_En_1_Chapter.xhtml#Fig1) defines the various areas in IT
    operations that are included in AIOps. These include monitoring, event analytics,
    predictive and recommendation systems, collaboration and engagement, and reporting
    and dashboarding technologies.


    ![](images/524834_1_En_1_Chapter/524834_1_En_1_Fig1_HTML.png)


    A chart of various layers of information technology in A I Ops. In the middle,
