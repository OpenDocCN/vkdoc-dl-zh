  trans: '

    #### 自动化执行


    自动化执行是指实际执行上一步骤中生成的建议。因此，一旦将可能的原因与某个自动化操作关联起来，就会触发该自动化来解决问题。


    执行层可以构建在 AIOps 平台内部，也可以利用环境中现有的自动化工具。自动化执行引擎会向 AIOps 工具反馈执行成功或失败的结果。


    自动化可以通过多种工具触发，包括 runbook 自动化工具、配置管理工具、预配置工具、基础设施即代码工具、机器人流程自动化和 DevOps 工具。大多数组织都拥有多种自动化工具，相关的工具可以集成起来，作为自动化执行臂，接收来自自动化建议引擎的指令。


    自动化任务可以是简单的任务，例如运行 `PowerShell` 或 shell 脚本来重启或重新启动服务，也可以包含更复杂的任务，这些任务涉及复杂的工作流程，甚至包括启动新的实例和基础设施。


    如今，大多数 AIOps 平台仅在“观察”层运行，其工具集中并不包含自动化执行或建议功能；然而，也有一些工具，例如 `DryICE iAutomate`，它提供了自动化建议和执行功能，并捆绑了开箱即用的工作流程，使组织能够快速跨越式发展，达到更高的成熟度。


    在 AIOps 平台之外，还有无数场景可以利用 AIOps 方法作为触发现有自动化的手段。大多数组织都有 `Python` 或 `PowerShell` 脚本，可以自动执行常规的修复工作流程，例如重启虚拟机。预计这类预定义的自动化将成为您智能自动化组合中的重要组成部分，并通过
    AIOps 解决方案复用自动化资产，以提升 AIOps 分析和自动化开发两者的价值。


    自动化执行可以涵盖不同类型的用例，包括事件解决、服务请求履行和变更编排。其中一些用例更适用于概率性场景，而另一些则可以使用基于规则的流程工作流。


    在触发低置信度的建议时应格外小心，否则自动化失败可能导致更多问题。在这种情况下，谨慎的做法是使用其他技术，例如诊断 runbook。低置信度的自动化还可以强制实施“执行者-检查者”流程，即系统的操作在系统内执行之前，先由人工操作员进行评估。在某些情况下，基于规则的系统与基于置信度的建议相结合效果最佳，因此需要根据环境和相关风险做出明智的决策。


    #### 事件解决


    事件解决是自动化执行的一种类型。这是一个与“观察”阶段紧密集成的领域。因此，“观察”阶段的输出（即可能的原因）成为自动化评估的输入，如果存在针对该特定根本原因的自动化操作，则可以自动触发，或采用人工介入的方式来解决该问题。


    事件解决是一个可以有效利用机器学习技术来推荐自动化的领域，并且会比基于规则的系统提供更好的结果。


    事件解决是 AIOps 中概率性机器学习技术发挥作用的主要领域。


    #### 服务请求履行


    服务请求履行是指用户请求特定服务的领域，这些请求作为服务请求记录在 ITSM 系统中。然后，服务请求作为一系列任务被履行，这些任务可以自动执行，由人工代理执行，或者由自动化和人工操作共同执行。


    由于服务请求任务本质上大多是确定性的，并且对于如何执行这些任务没有歧义，因此机器学习技术的作用有限。


    服务请求通过一系列称为任务的逐步流程来履行。在执行的每个阶段，请求者都会收到关于其请求进度的最新通知，并且在任务完成时，请求者会收到履行完成的通知以及访问已履行交付物的方式。


    服务请求可以针对软件系统，也可以针对需要交付的硬件；例如，为新员工提供一台笔记本电脑就是一个服务请求，它实际上经历了一个物理履行流程，因此无法完全自动化。这里的自动化是指将服务请求系统与采购和订购系统集成，以便请求可以自动转发给第三方合作伙伴或供应商，他们通过运送笔记本电脑/硬件来履行请求。


    软件部署任务则通过软件交付平台为服务请求实现完全自动化，这包括在笔记本电脑上部署诸如 `Microsoft Office` 之类的最终用户应用程序。


    服务请求由请求者从服务目录中发起。服务目录类似于购物车，您可以在其中从像 `Amazon` 这样的在线市场订购商品和服务。


    机器学习在该领域的角色主要体现在认知虚拟助手方面，它可以为用户提供直观的聊天或语音界面，而不是网页门户或目录。这使得用户更容易使用自然语言进行交流，找到正确的目录项，然后通过聊天界面完成订购。认知虚拟助手集成在“交互”层，并在用户确认后发起请求。请求者也可以使用虚拟代理来跟踪请求履行的进度。


    认知虚拟助手在内部使用自然语言处理和自然语言理解，结合各种机器学习和深度学习技术，来解读用户的意图并提供适当的响应。


    认知虚拟助手的主要用例在于服务请求领域；然而，类似的功能和用例同样适用于事件管理和变更管理。

    '
- fmt: '#### Change Orchestration


    Similar to service request fulfilment, the changes are granularly planned and
    comprise a series of tasks to be performed by different teams.


    There are additional tasks around change review where a change advisory board
    comprising technical and business stakeholders reviews all aspects of the change
    and approves it.


    There are other steps such as reviewing the change test plans, rollback plans,
    etc., and at each stage different stakeholders may be involved in the review and
    analysis of the change.


    Once everything is reviewed and the change is ready to be executed as per schedule,
    the change is executed in a step-by-step fashion by various teams involved in
    the technical execution.


    Thus, change orchestration is a well-scripted process that involves well-defined
    steps and tasks at each stage, and rule-based systems have been used to run this
    process for ages. Since change orchestration tasks are mostly definitive in nature
    and there is no ambiguity on how this task needs to be executed, the role for
    machine learning technologies is limited.


    There are a few areas where machine learning or analytics technologies can be
    used in change orchestration.


    Change scheduling and conflicts is one such area. When a change is scheduled,
    it involves infrastructure, platform, and application components that form part
    of the change; the change is also scheduled on a particular time on a particular
    date. Analytics techniques can be used to find out if there are items that are
    getting impacted because of the change and if there is conflicting or overlapping
    changes that impact connected devices or systems. This data can be analyzed by
    overlaying the topology and configuration data with the change schedules, and
    this information can be used by the change advisory board to better analyze the
    change and its impact and may result in the rescheduling of changes in the case
    of conflicts.


    The other area is around change risk analysis; we are aware that every change
    carries a risk to the application and infrastructure and can result in downtime,
    and the predictive analytics techniques can be used to find out the risk of the
    change based on components involved, the complexity of the change, and the risk
    analysis data from previous such changes. This predictive analytics component
    from `AIOps` can come in handy for such analytics and providing this additional
    information to the change advisory board and technical execution teams.


    Cognitive virtual assistants internally use natural language processing and understanding
    and can also be used in the change management process for technical and process
    teams to collaborate and find information about the change using the intuitive
    `NLP` capabilities of the cognitive virtual agents.


    We have covered some of these elements in the change analytics section in `Engage`
    as well.


    #### Automation Analytics


    Automation analytics is an important area in the execution space. Though most
    of the analytics is relevant in the `Engage` phase, automation execution generates
    its own valuable data that needs analytics.


    Some of the data generated by the automation is used to further improve the accuracy
    and efficiency of the automation system. The other data is used for reporting
    and analytics of how the current state of automation is performing in the organization.


    Generally, the following are important automation KPIs:


    *   Automation coverage

    *   Automation success rate

    *   Automation failure rate

    *   High used use cases

    *   Low used use cases

    *   Failure cause analysis

    *   Low automation areas


    #### Visualization


    Just like the visualization and dashboarding that we covered in the `Engage` phase,
    the automation phase also logs its data into the system. We mentioned a few important
    parameters that are important for automation teams to track, and these need to
    be visualized using dashboarding technologies to provide a bird’s-eye view of
    how automation is performing and run some level of analytics to run continual
    service improvement on this data.


    #### Collaboration


    Collaboration in automation is largely delivered through the `Engage` phase since
    all the activities are logged in the IT service management systems. Thus, collaboration
    between various teams and people involved in incident, service request, and change
    orchestration is done in the `Engage` phase using `ITSM` tools.


    However, with `AIOps ChatOps`, cognitive virtual agents become the core of collaboration
    for various teams where they can interact with the right stakeholders as well
    as get the required data from the `ITSM` systems, which is required during the
    `Act` phase. Thus, real-time collaboration during the actual activities in the
    `Act` phase is done using `ChatOps` where humans interface with other teams and
    with machines to analyze the data and take appropriate decisions.


    #### Feedback


    This information is available in the `AIOps` system to analyze the efficiency
    of the automation execution. Feedback from automated resolutions is an essential
    input into the `AIOps` system. Success and failure of automation scripts is an
    important learning data for the machine learning algorithms. This data helps the
    system to improve its accuracy scores and to change the confidence scores of the
    various automation engines and scripts.


    Operators confirm the actions that the `AIOps` algorithms are suggesting, and
    thus the human input provides training to the `AIOps` algorithms where they can
    improve on their model and change the confidence scores based on human feedback.


    With time the `AIOps` engine becomes better tuned to the environment that they
    are operating in by learning from the actions of human operators. The confidence
    scores of various resolutions become high enough to move them to fully autonomous
    mode where the human in the loop is no longer needed for certain use cases. This
    fulfills the promise of `AIOps` to turn operations into `NoOps`, by leveraging
    the autohealing capabilities of `AIOps` technologies. Expansion of fully automated
    use case library and its success rate gets greatly impacted by the knowledge of
    the application blueprint and its relevance or its business impact level (`BIL`),
    and that’s where application discovery becomes important, which we will be discussing
    next.


    ## Application Discovery and Insights


    To manage business transactions’ key performance indicators (`KPIs`) and to guarantee
    business process service level agreements (`SLAs`), enterprises also need powerful
    full-stack analytics.


    These analytics need to automatically map business transactions (such as orders,
    invoices, and so on) to their application services (web server, application server,
    databases, and so on) and to the supporting infrastructure (compute, network,
    and storage), as shown in Figure [2-7](#524834_1_En_2_Chapter.xhtml#Fig7).


