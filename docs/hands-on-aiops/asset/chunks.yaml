  raw: '### Implementation of ARIMA and SARIMA


    Let’s perform a sample implementation of the ARIMA and SARIMA models on CPU utilization
    data to predict its thresholds.


    Begin by importing the required Python libraries.


    ```

    # Library for Data Manipulation

    import pandas as pd

    import numpy as np

    # Library for Data Visualization

    import matplotlib.pyplot as plt

    # Library for Time Series Models

    from statsmodels.tsa.stattools import adfuller

    from statsmodels.graphics.tsaplots import plot_acf, plot_pacf

    from statsmodels.tsa.arima.model import ARIMA

    from statsmodels.tsa.stattools import acf

    from statsmodels.tsa.seasonal import seasonal_decompose

    # Library for Machine Learning

    from sklearn.metrics import mean_squared_log_error

    # Library for Track time

    from datetime import datetime

    ```


    Read data on CPU utilization from a CSV in a Pandas data frame and check information
    about the data types, column names, and count of values present in imported data.


    ```

    cpu_util_raw_data= pd.read_csv("cpu_utilization-data.csv")

    cpu_util_raw_data.info()

    ```


    As shown in Figure [7-17](#524834_1_En_7_Chapter.xhtml#Fig17), there are two columns,
    `date_time` and `cpu_utilization`, and a total of 396 data points (first row is
    the header) are available for analysis.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig17_HTML.jpg)


    A model description data file with header Open chevron class pandas dot core dot
    frame dot data frame close chevron, where range index is 397 entries, 0 to 396,
    and data columns has two columns titles non null count and dtype. Dtypes has float64
    1, and object 1, and memory usage of 6.3 plus K B.


    Figure 7-17


    Overview of data in data file


    Set the data type of column `date_time` to `DateTime`, set it as an index to sort
    the data points in a data frame, and plot the CPU utilization on a time scale,
    as shown in Figure [7-18](#524834_1_En_7_Chapter.xhtml#Fig18).


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig18_HTML.jpg)


    A graph of C P U utilization implementation, where the vertical axis is marked
    as data points and the horizontal axis is marked as date underscore time. A high-frequency
    wave is graphed from point 4 and ends at 55 approximately. The high-frequency
    wave has the highest point at 88 and the lowest point at 0.


    Figure 7-18


    CPU utilization on time scale


    ```

    total_records = cpu_util_raw_data.count()[''cpu_utilization'']

    cpu_util_raw_data[''date_time''] = pd.to_datetime(cpu_util_raw_data[''date_time''])

    cpu_util_raw_data.set_index(''date_time'',inplace=True)

    cpu_util_raw_data = cpu_util_raw_data.sort_values(by="date_time")

    fig = plt.figure(figsize =(10, 5))

    cpu_util_raw_data[''cpu_utilization''].plot()

    ```


    It is important to check for the outliers in the data using a box plot. The presence
    of outliers impacts the quality of predictions. If there are a high number of
    outliers in data, then they need to be either processed or removed from the dataset
    based on the domain requirements.


    ```

    #Global variables

    NOISE = False

    MAPE = True

    TEST_DATA_SIZE = 0.2 #in percent

    SEASONAL = False

    def getOutliers(data, col):

    Q3 = data[col].quantile(0.75)

    Q1 = data[col].quantile(0.25)

    IQR = Q3 - Q1

    lower_limit = Q1 - 1.5 * IQR

    upper_limit = Q3 + 1.5 * IQR

    return lower_limit, upper_limit

    lower, upper = getOutliers(cpu_util_raw_data, ''cpu_utilization'')

    outliers_count = cpu_util_raw_data[(cpu_util_raw_data[''cpu_utilization'']upper)].count()[''cpu_utilization'']

    outlier_percentage = ((outliers_count / total_records) * 100)

    if outlier_percentage > 20:

    NOISE = True

    print(f"Outlier Percentage in data: {outlier_percentage}%")

    #Render box plot

    cpu_util_raw_data.boxplot(''cpu_utilization'', figsize=(10,10))

    zero_values = cpu_util_raw_data[(cpu_util_raw_data[''cpu_utilization'']==0)].count()[''cpu_utilization'']

    zero_values_percentage = ((zero_values / total_records) * 100)

    if zero_values_percentage > 20:

    MAPE = False

    print("Zero Value percentage in data: ", zero_values_percentage)

    ```


    Based on Figure [7-19](#524834_1_En_7_Chapter.xhtml#Fig19), there are no outliers
    and no “zero” values, so let’s continue with the given dataset.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig19_HTML.png)


    A box plot is graphed for outer line analysis. The vertical axis has points, and
    the horizontal axis denotes C P U utilization. The interquartile range is between
    points 19 to 59, where the median is at point 40\. The minimum outlier is at point
    1, and the maximum outlier is at point 93.


    Figure 7-19


    Box plot analysis for outliers


    Let’s check for the stationarity of a time series using an ADF test. Based on
    an ADF test, if the p-value comes out to more than 0.05, it means the time series
    is nonstationary and needs to be differenced using the `diff()` function and again
    checked with an ADF test for stationarity.


    ```

    diff_count = 0

    differencing_order = {

    1: lambda x: x[''cpu_utilization''].diff(),

    2: lambda x: x[''cpu_utilization''].diff().diff(),

    3: lambda x: x[''cpu_utilization''].diff().diff().diff(),

    4: lambda x: x[''cpu_utilization''].diff().diff().diff().diff(),

    5: lambda x: x[''cpu_utilization''].diff().diff().diff().diff().diff()

    }

    while True:

    if diff_count == 0:

    adftestresult = adfuller(cpu_util_raw_data[''cpu_utilization''].dropna())

    else:

    adftestresult = adfuller(differencing_order[diff_count](cpu_util_raw_data).dropna())

    print(''#'' * 60)

    print(''ADF Statistic: %f'' % adftestresult[0])

    print(''p-value: %f'' % adftestresult[1])

    print(f''ADF Test Result: The time series is {"non-" if adftestresult[1] >= 0.05
    else ""}stationary'')

    print(''#'' * 60)

    if adftestresult[1] = len(differencing_order):

    break

    diff_count += 1

    print("Differencing order to make data stationary: ",diff_count)

    ```


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Figd_HTML.png)


    The A D F result implementation has two series. Series 1, A D F statistic: negative
    2.5335679, p-value: 0.107493, A D F test result: the time series is non-stationary.
    Series 2, A D F statistic: negative 15.396157, p-value: 0.000000, A D F test result:
    the time series is stationary. A remark is below, differencing order to make data
    stationery: 1.


    The ADF result on differenced time series shows that the p-value is 0, which confirms
    that data series is now stationary. This can be visualized by plotting both the
    original series and a differenced series on a time scale graph, as shown in Figure
    [7-20](#524834_1_En_7_Chapter.xhtml#Fig20).


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig20_HTML.jpg)


    A graph of time-series dataset of C P U usage, where the vertical axis is marked
    as data points and the horizontal axis is marked as date underscore time. Two
    high-frequency waves of original series and 1st order differencing are graphed
    from point 0 in January 2020 and end at points 50 in January 2021 and 0 in January
    2021, respectively.


    Figure 7-20


    Time-series stationarity check


    ```

    fig, ax = plt.subplots(figsize=(10,8), dpi=100)

    #  Differencing

    ax.plot(cpu_util_raw_data.cpu_utilization[:], label=''Original Series'')

    ax.plot(cpu_util_raw_data.cpu_utilization.diff(1), label=''1st Order Differencing'')

    ax.set_title(''1st Order Differencing'')

    ax.legend(loc=''upper left'', fontsize=10)

    plt.legend(loc=''upper left'', fontsize=10)

    plt.suptitle(''CPU Usage - Time Series Dataset'', fontsize=16)

    plt.show()

    ```


    As we have done differencing only one time, we can set the value of the differencing
    (d) component of ARIMA as d=1.


