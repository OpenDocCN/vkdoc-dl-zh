    # 5. Fundamentals of Machine Learning and AI


    You learned about AIOps, its architecture, and its components in previous chapters,
    and you will be venturing deeper into AIOps in the next few chapters. Before you
    start implementing algorithms for AIOps, though, you need to learn a few basic
    things about machine learning and artificial intelligence. This chapter will cover
    the fundamentals of artificial intelligence, machine learning, and deep learning.
    It will then go on to discuss specific techniques that are used in AIOps.


    ## What Is Artificial Intelligence and Machine Learning?


    Artificial intelligence, machine learning, and deep learning are terms that are
    often used interchangeably. This chapter will introduce each of these terms and
    detail the differences and overlaps between these technologies.


    Most of us have come across AI in some form or another. Today AI is being used
    in most of the applications that we use every day. From recommendations on shopping
    sites to finding the most relevant article through a search engine like Google,
    everything involves AI. We all use speech recognition technologies in the form
    of voice assistants such as Alexa, Siri, etc. All of these are powered by artificial
    intelligence. What started as science fiction has become part of our everyday
    life; artificial intelligence has come a long way in a short span of time.


    Let’s start with understanding artificial intelligence. The term *artificial intelligence*
    is used to define intelligence that is created by humans and programmed by humans.
    The AI systems mimic human intelligence and reasoning to make decisions and solve
    problems. Just like human intelligence resides in the human brain, AI resides
    in the form of algorithms, data, and models in a machine.


    AI has been used to beat humans in games like Chess and Go. AI is also solving
    problems and creating new use cases for various applications that were not possible
    before it became available. AI is now being used in diverse fields including military
    and surveillance applications, healthcare, and diagnostics. Even the legal and
    governance field is something that has not been left untouched by artificial intelligence.
    Thus, AI as a technology is finding applications in almost everything.


    Artificial intelligence as a term has gained traction since 1950s. It encompasses
    every type of technology that has an element of intelligence that is artificially
    created. Machine learning blossomed in the 1980s, and with more computing power
    being made available, deep learning gained traction starting in 2010\. We will
    be explaining each of these in this chapter.


    AI has exploded over the last decade primarily because of newer hardware technologies
    like GPUs that have made processing faster and cheaper. More powerful processing
    systems are being made at lower costs, and this has resulted in making the AI
    algorithms and techniques feasible. Theoretically, the techniques have existed
    for a long period; however, the technology infrastructure to execute these models
    at scale did not exist.'
  trans: '

    # 文化


    DevOps 是一种在软件开发团队与基础设施运维团队之间建立紧密协作关系的文化和思维方式。这种文化建立在以下支柱之上：


    - *持续协作与沟通*：`AIOps` 为 DevOps 和 SRE 团队提供了协作与沟通的工具，并通过 `ChatOps` 实现实时协作。

    - *渐进式变革*：`AIOps` 深深融入 DevOps 和 SRE 的整体文化中，其模型会随着应用、基础设施和数据的变化而逐步演进。

    - *共享端到端责任*：`AIOps` 工具通过在开发和运维生命周期中实现更好的协调，并促进协作与沟通，从而支持共享的端到端责任。

    - *早期问题解决*：`AIOps` 利用自动化根因分析以及智能运行手册自动化执行，能够快速解决事件。


    # 流程自动化


    流程自动化是 DevOps 和 SRE 团队的关键目标。通过 `AIOps` 工具可以实现日常工作的自动化和消除繁琐劳动，因为自动化的根因分析、主动问题管理的输入以及告警的自动解决，能够释放团队的时间，使其专注于更高层次的活动。


    # 关键绩效指标（KPI）的衡量


    衡量系统的各项指标有助于了解哪些方面运行良好，哪些方面可以改进。`AIOps` 工具提供深入的报告和分析，并帮助创建服务等级目标、服务等级指标以及服务等级协议。


    # 共享


    `AIOps` 工具通过整合可观测性工具的数据，并向开发和运维团队提供洞察，从而实现在整个价值流中的共享。`AIOps` 通过提供知识管理能力来促进知识共享，团队可以利用
    `AIOps` 引擎进行协作、创建和共享内容。`AIOps` 使 SRE 团队能够更快、更好地交付，是构建 SRE 流程和团队的基础技术。


    # 总结


    在本章中，我们介绍了 SRE 模型，以及 `AIOps` 如何帮助 SRE 团队兑现其承诺。我们还探讨了 `AIOps` 如何促进开发与运维团队之间的真正协作。我们了解了
    `AIOps` 工具提供的各种功能，以及它们如何支持并赋能 SRE 和 DevOps 原则。在下一章中，我们将介绍人工智能、机器学习和深度学习的基础知识。


    # 5. 机器学习与人工智能基础


    在前面的章节中，你已经了解了 `AIOps`、其架构及其组件，在接下来的几章中，你将更深入地探索 `AIOps`。不过，在开始为 `AIOps` 实现算法之前，你需要学习一些关于机器学习和人工智能的基本知识。本章将介绍人工智能、机器学习和深度学习的基础知识，然后继续讨论
    `AIOps` 中使用的特定技术。


    ## 什么是人工智能与机器学习？


    人工智能、机器学习和深度学习这几个术语经常被互换使用。本章将逐一介绍这些术语，并详细说明这些技术之间的差异与重叠之处。


    我们大多数人或多或少都接触过人工智能。如今，人工智能被广泛应用于我们日常使用的大多数应用中。从购物网站上的推荐，到通过谷歌等搜索引擎找到最相关的文章，一切都涉及人工智能。我们都使用过语音识别技术，例如
    Alexa、Siri 等语音助手。所有这些都由人工智能驱动。曾经是科幻小说的东西，如今已成为我们日常生活的一部分；人工智能在短时间内取得了长足的进步。


    让我们从理解人工智能开始。*人工智能*这个术语用于定义由人类创造并由人类编程的智能。人工智能系统模仿人类的智能和推理能力来做出决策和解决问题。就像人类智能存在于人脑中一样，人工智能以算法、数据和模型的形式存在于机器中。


    人工智能已被用于在国际象棋和围棋等游戏中击败人类。人工智能还在解决各种应用中的问题，并创造以前无法实现的新用例。如今，人工智能被应用于包括军事和监控应用、医疗保健和诊断在内的多个领域。甚至法律和治理领域也未能免受人工智能的影响。因此，人工智能作为一种技术，几乎在所有领域都找到了应用。


    人工智能作为一个术语，自 20 世纪 50 年代以来逐渐流行起来。它涵盖了每一种具有人工创造智能元素的技术。机器学习在 20 世纪 80 年代蓬勃发展，而随着更多计算能力的可用，深度学习从
    2010 年开始受到关注。我们将在本章中对这些技术逐一进行解释。


    人工智能在过去十年中呈爆炸式增长，这主要归功于 GPU 等新型硬件技术，它们使处理速度更快、成本更低。更强大的处理系统正以更低的成本被制造出来，这使得人工智能算法和技术的实施成为可能。从理论上讲，这些技术已经存在了很长时间；然而，大规模执行这些模型所需的技术基础设施此前并不存在。

    '
- fmt: '# Why Machine Learning Is Important


    AI is broadly classified into general AI and narrow AI. General AI as a concept
    that is still science fiction. General AI is a machine that possesses all the
    senses that we possess such as sight, sound, touch, smell, and taste and maybe
    even beyond human senses to see and experience things that are beyond human capabilities.
    These general AI machines would act just like humans do and possess powers beyond
    human capabilities. The term *general* in general AI means that just like humans
    are very general purpose and can do a variety of tasks and learn a variety of
    things, the machines should be able to do the same.


    In contrast, *narrow AI* consists of technologies that perform specific tasks
    as well as or better than humans. The current state of the technology and implementations
    are centered around narrow AI. Think of narrow AI as a specialist that can perform
    one type of a task quickly and with accuracy but is not capable of learning other
    tasks that are different in nature. Examples of narrow AI are systems that can
    understand natural language, systems that can translate language, systems that
    can recognize objects, etc. These systems are created and fine-tuned to do a particular
    task.


    There is a third term called “AI superintelligence,” which is used extensively
    in science fiction to depict an artificial intelligence that reaches a critical
    threshold of intelligence with which it can optimize itself in progressively smaller
    timeframes and reach a level of superintelligence. Thus, superintelligence has
    the ability to transform and optimize itself rapidly by coding itself recursively
    and improving with each iteration. As the superintelligence improves itself with
    each iteration, it becomes faster and more powerful, and thus each subsequent
    cycle takes less time. It is postulated that if such a system becomes reality,
    it may be able to recode itself millions of times and consume all the available
    compute power on the planet to create a superintelligence in hours as each successive
    step takes less time.


    Broadly, AI systems have these three key qualities:


    - *Intentionality*: The AI system has the intention of making a decision based
    on real-time analysis of data or based on historical analysis of data. For example,
    an algorithm for correlation can classify website hits as normal user hits or
    a DoS attack.

    - *Intelligence*: AI systems have intelligence by using machine learning and deep
    learning technologies to understand the environment through data and arrive at
    a probabilistic conclusion. An example is performing the root-cause analysis (RCA)
    of an issue. These systems try to mimic human intelligence and decision-making,
    but technologically we are still very far from reaching levels of human intelligence
    in AI systems. However, in some specific tasks such as natural language understanding,
    some AI systems are providing accuracy levels that are on par with average human
    accuracy.

    - *Adaptability*: AI systems have the ability to learn and adapt as they compile
    information and make decisions. AI systems have the ability to adapt as data changes.
    Thus, rather than learning from static rules, an AI system is highly adaptable
    and learns from changing data. For example, predicting the outage or service impact
    in business involves the ability to adapt to changing environments and new data.


    ## Types of Machine Learning


    AI is quite an extensive and complex domain that consists of multiple specialized
    subdomains. Let’s understand machine learning and deep learning in greater detail.


    ### Machine Learning


    Machine learning is a technique that includes the algorithms that parse data,
    learn from the data supplied to the algorithm, and then apply the learning to
    make decisions. Unlike traditional programming where a person must manually create
    programs and rules based on the point-in-time snapshot of the environment and
    specific logic derived by the programmer, ML algorithms automatically derive that
    logic from data and create required rules.


    Machine learning algorithms are at work in most of the applications that we use
    today. A simple example is a recommender system that recommends a movie, a song,
    or an item for us to buy based on analysis of our past preferences as well as
    the preferences of other users who are statistically similar to us.


    As the name suggests, machine learning algorithms are not static; they continue
    to learn with new data that is being fed into the system, and they get progressively
    better at the job with more data.


    The term *machine learning* was first coined by Arthur Samuel in 1952; its canonical
    and more practical definition was given by Tom Mitchell in 1997, which says “An
    agent or a program is said to learn from experience E with respect to some class
    of tasks T and performance measure P, if learner performance at tasks T, as measured
    by P, improves with experience E.”


    Machine learning has three different types, namely, supervised learning, unsupervised
    learning, and reinforcement learning, as shown in Figure [5-1](#524834_1_En_5_Chapter.xhtml#Fig1).


    ![](images/524834_1_En_5_Chapter/524834_1_En_5_Fig1_HTML.png)


    A model tree diagram with header machine learning. It has three branches, supervised
    learning, unsupervised learning, and reinforcement learning. Supervised learning
    is labeled as task driven. Unsupervised learning is labeled as data driven. Reinforcement
    learning is labeled as learn from hit and trial.


    **Figure 5-1** Types of machine learning'
