  trans: '

    # 什么是自然语言处理？


    人类的自然语言是复杂的；它有着多种可能表达相同含义的变体。它有时模棱两可，依赖于对象或情境的上下文，并且极其多样化。因此，当我们试图让机器解读或破译语言时，它本身就带来了一系列挑战。我们在这里没有使用*理解*这个词，因为机器可能不像我们那样理解语言。因此，破译和解读我们试图传达的内容更为恰当。


    `NLP` 是人工智能领域的一个分支，它使计算机能够理解人类语言。`NLP` 分析句子的语法结构和单词的个体含义；它使用机器学习和深度学习算法以及其他特定的
    `NLP` 技术，从提供的输入中提取含义。因此，`NLP` 是让机器破译人类语言的技术，机器可以使用自然的人类语言而非软件代码来接收输入。


    `NLP` 技术广泛应用于各种场景；然而，它最显著的形式是虚拟助手，如苹果 Siri、谷歌助手、微软小娜和亚马逊 Alexa。你还会在许多应用程序和网站中发现认知虚拟助手，你可以用人类语言输入查询，系统能够破译它并返回答案。所有这些系统都在幕后使用
    `NLP` 技术。


    除了聊天机器人和虚拟助手，还有许多其他应用使用 `NLP`。当你在搜索引擎中输入术语时的文本推荐或下一个单词建议、使用谷歌翻译服务时的语言翻译、电子邮件中的垃圾邮件过滤、帖子或推特动态的情感分析——所有这些用例都使用了
    `NLP` 技术。


    简而言之，`NLP` 的目标是让复杂、模棱两可且极其多样化的人类语言变得易于机器理解。


    `NLP` 和机器学习都是人工智能的子集。为了创建 `NLP` 算法，需要使用机器学习技术。由于它本身就是一个领域，`NLP` 在人工智能技术中被单独列为一个领域。有完全致力于
    `NLP` 的技术、算法和系统。


    `NLP` 应用两种技术来帮助计算机理解文本：句法分析和语义分析。


    ## 句法分析


    句法分析（或解析）使用基本语法规则分析文本，以识别句子结构、单词的组织方式以及单词之间的相互关系。它的一些主要子任务包括：


    *   *分词* 将文本分解成称为标记的更小部分，以使文本更易于处理。这是 `NLP` 中将文本分解为标记的第一步，以便 `NLP` 引擎可以进一步处理。


    *   *词性标注* 将分词生成的标记标注为名词、形容词、动词、副词等。这有助于 `NLP` 引擎推断单词在特定上下文中的含义。例如，单词 *Saw* 可以表示过去的“看见”，也可以是指向物体
    `Saw` 的名词。


    *   *停用词移除* 移除频繁出现但不增加任何语义价值的单词，例如 *我*、*他们*、*有*、*喜欢*、*你的* 等。


    *   *词干提取* 通过移除后缀将单词转换为词根形式。例如，*Studying* 将被转换为 *Study*。它指的是一种粗略的启发式过程，大多数情况下通过修剪单词末尾来找到正确的词根，但资源消耗较少且速度快。


    *   *词形还原* 也使用词汇和词的形态分析将单词转换为词根，旨在去除屈折词尾并返回单词的基本形式或词典形式。例如，它将屈折词替换为其基本形式，因此 *Saw*
    被转换为 *See*。词形还原更准确，但资源消耗更大且更复杂。


    *   *指代消解* 处理解决代词（如 *他*）或名词（如 *CEO*）所指对象的问题。


    ## 语义分析


    语义分析侧重于捕捉文本的含义。它遵循两步过程。首先，它试图提取每个单词的含义，然后查看单词的组合以破译它们在特定上下文中的含义。


    *   *词义消歧*：处理确定句子中使用的单词的真实含义或意义的问题。这也会影响指代消解的输出。


    *   *关系抽取*：关系抽取分析文本数据，并试图找出各种实体之间的关系。实体可以是各种名词，如人物、地点、地理区域、物体等。


    `NLP` 工具和技术在 `AIOps` 领域高度适用。聊天机器人或认知虚拟代理是 `AIOps` 中由 `NLP` 技术驱动的模块之一。在认知虚拟助手中，有多种
    `NLP` 服务和技术被组合在一起以提供认知虚拟助手。在了解了 `NLP` 技术之后，让我们讨论一下它在 `AIOps` 中的用例。


    # NLP AIOps 用例


    `NLP` 在 `AIOps` 系统中扮演着至关重要的角色，用于理解告警消息（`SNMP` 陷阱、电子邮件、事件 ID 等）、事件、用户聊天消息、日志内容以及许多其他传达问题或反馈的来源中的文本数据。`NLP`
    使得 `AIOps` 系统能够解释此类文本，并据此采取适当的行动。让我们探讨一下 `NLP` 在 `AIOps` 中的一些用例。


    ## 情感分析


    情感分析识别文本中的情感，并将数据分类为正面、负面或中性。


    在使用工单数据或聊天数据时，情感分析是一个关键用例。对于每一条工单反馈以及每一次与客服人员发起和结束的对话，你可以利用情感分析来了解用户对所提供服务的感受。这在认知虚拟助手对话中也很有用，因为认知虚拟代理可以根据用户的情感来调整其回复。例如，如果用户很生气，认知虚拟代理可以用“对造成的不便深表歉意”这样的安抚性语句开始对话，使对话更自然、更像人类，而不是可能忽略情感的机械式对话。


    ## 语言翻译


    许多 IT 运营支持多个地理区域和语言，IT 服务管理员和服务台客服人员很难全天候覆盖所有语言。因此，语言翻译服务对于服务台客服人员来说非常有用，他们可以翻译工单数据或对话数据，并利用这些数据来定位用户的问题并解决它。语言翻译既用于认知虚拟助手，也用于用户与客服人员的沟通。翻译服务在分析可能以不同语言提供的工单数据时也很有用。


    ## 文本提取


    文本提取使你能够从文本中提取预定义的信息。IT 团队通常处理各种知识管理存储库中的大量数据。在 IT 服务管理系统中，已知错误数据库（`KEDBs`）中也有数据。技术文档中也有大量数据，为根本原因分析、故障排除和解决方案提供信息。所有这些信息对于运营团队来说都变得难以招架。`AIOps`
    系统从这些存储库中提取相关信息，并向管理员和服务台客服人员呈现正确的信息，以便他们能够进行故障排除和解决问题，或完成服务请求和变更。

    '
- fmt: '### Topic Classification


    Topic classification helps the AIOps engine to organize the unstructured text
    available in various repositories into categories. Most of the time information
    is spread across multiple systems, and any directory structure or categorization
    structure that was initially created becomes unmanageable. Content for related
    categories and topics gets spread out in various repositories, and manually maintaining
    the topics and relevant documents becomes impossible. The AIOps engine helps you
    to organize this unstructured data into various categories. This feature can also
    be used to tag the tickets into various categories in IT service management.


    This covers the overview of the NLP technique and its use case, and now we will
    move to the last but most complex technique that is used in AIOps, which is deep
    learning.


    ## Deep Learning


    We covered machine learning and its branches in the previous sections. As introduced
    earlier, deep learning is a subset of machine learning or a specialized way of
    making machines learn from data. Deep learning functions in a similar fashion
    as machine learning; however, the technologies used to achieve the end results
    and the capabilities that deep learning provides are a bit different.


    Though both machine learning and deep learning are used interchangeably, both
    are different technically in their approach to learning.


    Deep learning is a subfield of machine learning that structures algorithms in
    layers to create an “artificial neural network” that can learn and make intelligent
    decisions on its own.


    A deep learning model is designed to analyze data in a structure similar to how
    humans draw conclusions. Deep learning algorithms use a layered structure called
    an `artificial neural network` to process the data and learn various features
    in the data.


    Artificial neural networks have been in existence theoretically for a long time;
    however, the application of artificial neural networks was possible only once
    the computing technology progressed to provide the compute resources necessary
    to run these models. Thus, neural networks and deep learning became practical
    and created miraculous solutions in the last decade. Google created `AlphaGo`,
    which beat all human champions at the game, and this demonstrated the arrival
    of computing intelligence, which could be applied to games that required billions
    of computations to solve.


    Artificial neural networks were inspired by biological neural networks in animal
    and human brains. The biological neural networks learn progressively by seeing
    and learning from data without any task-specific program guiding them. A human
    is able to recognize a cat from a dog after just seeing a few samples of cats
    and dogs; however, a machine would need much more data to learn, but it surely
    learns the difference and is able to classify them under the right species after
    learning.


    Artificial neural networks are created using layers of neurons. Different layers
    called `hidden layers` perform a different transformation on the input as the
    signal moves from the input layer through the various hidden layers to the output
    layer, which finally arrives at the result as shown in Figure [5-3](#524834_1_En_5_Chapter.xhtml#Fig3).


    ![](images/524834_1_En_5_Chapter/524834_1_En_5_Fig3_HTML.jpg)


    An illustration of three layers of a deep neural network. The layers are the Input
    layer, multiple hidden layers, and output layer. The input layer has 5 circles
    placed vertically. The multiple hidden layers have 3 sets of circles placed vertically.
    Each set has 5 circles. The output layer has 3 circles placed vertically.


    Figure 5-3


    Deep learning neural network


    Neural networks can have a huge number of neurons and connections spanning millions
    of connections for complex use cases.


    Neural networks and deep learning are being used in various use cases such as
    NLP, machine translation, image recognition, video gameplays, spam filtering,
    search engines, etc.


    Neural networks at a fundamental level comprise inputs, weights, a bias (threshold),
    and an output. The neural network then balances the weight when training data
    is fed into the system using backpropagation to find out which neurons cause the
    errors in mapping to the correct output. After the neural network is trained with
    all the data in multiple iterations, the weights of each neuron get configured
    in a manner that the collective response as an output is accurate.


    Threshold is an important parameter in neural networks; it leads to the activation
    of the node if the value generated is above the threshold, and it then sends the
    data to the next layer. Thus, the output of one neuron in a layer impacts the
    input and thus the output of the next layer of neurons to which it is connected.
    The hidden layers comprising multiple neurons have their own activation functions
    and keep passing the information based on the threshold to the next layer.


    The idea is that each layer discovers a feature in the input, and progressively
    lower-level features are discovered by the next layer, just like a human brain
    would work, finding a higher-level object and then discovering what the object
    is and its features.


    The general equation for a neural network is as follows, where `w` is the weight
    and `x` are the features:


    ![](images/524834_1_En_5_Chapter/524834_1_En_5_Figa_HTML.jpg)


    A general equation represented as sigma from i equals 0 to m of, w subscript i
    x subscript i plus bias equals w subscript 1 x subscript 1 plus w subscript 2
    x subscript 2 plus w subscript 3 x subscript 3 plus bias.


    Neutral networks use backpropagation, which allows the weights in neurons to adjust
    in response to the error that they are contributing to the output. This allows
    for the adjustment of the weights and the model to progressively reach higher
    levels of accuracy and converge so that it can then be deployed for the use case
    for which it is getting trained.


    Though a deep learning model needs much higher computing resources and data, the
    flexibility of the model and its ability to learn complex features makes it a
    compelling proposition for various use cases. Deep learning is generally deployed
    in use cases where there is higher complexity, the amount of data is much higher,
    and there is availability of data for training the deep learning model.


    ## Summary


    This chapter covered the basics of machine learning, deep learning, natural language
    processing, and how some of the capabilities can be used in the AIOps domain.
    We covered various techniques including supervised and unsupervised machine learning
    as well as NLP. These techniques provide the foundation on which AIOps platforms
    are built. In the next chapter, we will look at specific AIOps use cases and how
    we can use these techniques in those cases. We will start with the most common
    use case of deduplication in the next chapter.


    # 6. AIOps Use Case: Deduplication


    In the previous chapters, you learned about the various machine learning techniques
    and how they are used in general. In this chapter, you will see the implementation
    of a specific use case of deduplication in AIOps along with practical scenarios
    where it is used in operations and business.'
  raw: '### Topic Classification


    Topic classification helps the AIOps engine to organize the unstructured text
    available in various repositories into categories. Most of the time information
    is spread across multiple systems, and any directory structure or categorization
    structure that was initially created becomes unmanageable. Content for related
    categories and topics gets spread out in various repositories, and manually maintaining
    the topics and relevant documents becomes impossible. The AIOps engine helps you
    to organize this unstructured data into various categories. This feature can also
    be used to tag the tickets into various categories in IT service management.


    This covers the overview of the NLP technique and its use case, and now we will
    move to the last but most complex technique that is used in AIOps, which is deep
    learning.


    ## Deep Learning


    We covered machine learning and its branches in the previous sections. As introduced
    earlier, deep learning is a subset of machine learning or a specialized way of
    making machines learn from data. Deep learning functions in a similar fashion
    as machine learning; however, the technologies used to achieve the end results
    and the capabilities that deep learning provides are a bit different.


    Though both machine learning and deep learning are used interchangeably, both
    are different technically in their approach to learning.


    Deep learning is a subfield of machine learning that structures algorithms in
    layers to create an “artificial neural network” that can learn and make intelligent
    decisions on its own.


    A deep learning model is designed to analyze data in a structure similar to how
    humans draw conclusions. Deep learning algorithms use a layered structure called
    an *artificial neural network* to process the data and learn various features
    in the data.


    Artificial neural networks have been in existence theoretically for a long time;
    however, the application of artificial neural networks was possible only once
    the computing technology progressed to provide the compute resources necessary
    to run these models. Thus, neural networks and deep learning became practical
    and created miraculous solutions in the last decade. Google created AlphaGo, which
    beat all human champions at the game, and this demonstrated the arrival of computing
    intelligence, which could be applied to games that required billions of computations
    to solve.


    Artificial neural networks were inspired by biological neural networks in animal
    and human brains. The biological neural networks learn progressively by seeing
    and learning from data without any task-specific program guiding them. A human
    is able to recognize a cat from a dog after just seeing a few samples of cats
    and dogs; however, a machine would need much more data to learn, but it surely
    learns the difference and is able to classify them under the right species after
    learning.


    Artificial neural networks are created using layers of neurons. Different layers
    called *hidden layers* perform a different transformation on the input as the
    signal moves from the input layer through the various hidden layers to the output
    layer, which finally arrives at the result as shown in Figure [5-3](#524834_1_En_5_Chapter.xhtml#Fig3).


    ![](images/524834_1_En_5_Chapter/524834_1_En_5_Fig3_HTML.jpg)


    An illustration of three layers of a deep neural network. The layers are the Input
    layer, multiple hidden layers, and output layer. The input layer has 5 circles
    placed vertically. The multiple hidden layers have 3 sets of circles placed vertically.
    Each set has 5 circles. The output layer has 3 circles placed vertically.


    Figure 5-3


    Deep learning neural network


    Neural networks can have a huge number of neurons and connections spanning millions
    of connections for complex use cases.


    Neural networks and deep learning are being used in various use cases such as
    NLP, machine translation, image recognition, video gameplays, spam filtering,
    search engines, etc.


    Neural networks at a fundamental level comprise inputs, weights, a bias (threshold),
    and an output. The neural network then balances the weight when training data
    is fed into the system using backpropagation to find out which neurons cause the
    errors in mapping to the correct output. After the neural network is trained with
    all the data in multiple iterations, the weights of each neuron get configured
    in a manner that the collective response as an output is accurate.


    Threshold is an important parameter in neural networks; it leads to the activation
    of the node if the value generated is above the threshold, and it then sends the
    data to the next layer. Thus, the output of one neuron in a layer impacts the
    input and thus the output of the next layer of neurons to which it is connected.
    The hidden layers comprising multiple neurons have their own activation functions
    and keep passing the information based on the threshold to the next layer.


    The idea is that each layer discovers a feature in the input, and progressively
    lower-level features are discovered by the next layer, just like a human brain
    would work, finding a higher-level object and then discovering what the object
    is and its features.


    The general equation for a neural network is as follows, where *w* is the weight
    and *x* are the features:


    ![](images/524834_1_En_5_Chapter/524834_1_En_5_Figa_HTML.jpg)


    A general equation represented as sigma from i equals 0 to m of, w subscript i
    x subscript i plus bias equals w subscript 1 x subscript 1 plus w subscript 2
    x subscript 2 plus w subscript 3 x subscript 3 plus bias.


    Neutral networks use backpropagation, which allows the weights in neurons to adjust
    in response to the error that they are contributing to the output. This allows
    for the adjustment of the weights and the model to progressively reach higher
    levels of accuracy and converge so that it can then be deployed for the use case
    for which it is getting trained.


    Though a deep learning model needs much higher computing resources and data, the
    flexibility of the model and its ability to learn complex features makes it a
    compelling proposition for various use cases. Deep learning is generally deployed
    in use cases where there is higher complexity, the amount of data is much higher,
    and there is availability of data for training the deep learning model.


    ## Summary


    This chapter covered the basics of machine learning, deep learning, natural language
    processing, and how some of the capabilities can be used in the AIOps domain.
    We covered various techniques including supervised and unsupervised machine learning
    as well as NLP. These techniques provide the foundation on which AIOps platforms
    are built. In the next chapter, we will look at specific AIOps use cases and how
    we can use these techniques in those cases. We will start with the most common
    use case of deduplication in the next chapter.


    # 6. AIOps Use Case: Deduplication


    In the previous chapters, you learned about the various machine learning techniques
    and how they are used in general. In this chapter, you will see the implementation
    of a specific use case of deduplication in AIOps along with practical scenarios
    where it is used in operations and business.'
