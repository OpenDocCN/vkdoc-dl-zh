- fmt: '### Predictive Analysis


    Predictive analysis brings in the predictive element to IT operations. This is
    an area where the customers have always expected predictive capabilities from
    IT operations systems but have not been able to achieve them. `AIOps` brings predictive
    analytics capabilities to IT operations and fulfills this unmet demand from the
    operations teams.


    As the name suggests, predictive analytics means the ability to predict things
    in advance based on the data provided to `AIOps` systems. There are use cases
    where predictive analytics has a role to play in the IT operations space, so let’s
    take a look at some of them.


    One important application of predictive analytics is in the area of performance
    management and capacity planning. With metric data being available to `AIOps`
    systems, it is possible for the `AIOps` engine to predict what the future utilization
    of these systems will be. The data around users accessing an application and the
    associated utilization of the system can be used to make predictions based on
    scenarios of how many users will hit the application and how much infrastructure
    will be needed to support these users. Regression techniques can be used to consider
    the current performance and workload of a system and predict the future utilization
    of the infrastructure. Being able to predict in advance the utilization helps
    IT operations teams to plan better for infrastructure capacity and instantiate
    new virtual machines or cloud instances to cater to the predicted demand. In microservices-based
    applications, new pods are spun automatically to cater to increased demand on
    infrastructure.


    Predictive analytics uses regression techniques, which can take into consideration
    the seasonality of the data and provide accurate results. As an example, a backup
    or data processing job at the end or beginning of a month may be causing performance
    issues and errors in an application. Leveraging predictive analytics techniques
    can ensure that the `AIOps` system is able to forecast the utilization and the
    operations teams can take appropriate actions to increase the capacity during
    that period by spinning extra instances or by vertically scaling up the capacity
    so that there are no performance issues and incidents are avoided.


    Another use case based on metrics can be around trend finding, where the `AIOps`
    engine is able to spot a trend and an associated event at the end of a trend.
    Based on this association, it can predict in advance things like a system failure.
    An example of this would be a memory leak issue in an application that causes
    the memory utilization of a machine to keep increasing and thus following a trend.
    After consuming all the available memory, the system starts to consume the disk
    space, and the memory is paged to the physical disk. After a while, the application
    starts to slow down and eventually crashes, causing a set of events. This pattern
    can be detected by predictive analytics engine, and on observing, a trend the
    `AIOps` system can warn the operations teams of impending failure.


    Another example on the previous lines can be of a faulty database connection code
    where the database connections are not released and after a while choke up the
    entire database and the application starts to get connection failure alerts. The
    metric around database connections when plotted will form an increasing trend
    and can be deciphered by the `AIOps` systems to forewarn the operations teams.


    Like other elements in the `AIOps` space, predictive analytics is also based on
    probability and thus may not be 100 percent accurate. Predictive analytics in
    the IT operations space looks at events and metrics to predict what could be a
    probable outcome and then alerts the operations teams.


    The customers sometimes think of `AIOps` tools as a magic wand and expect them
    to predict all kinds of failures and prevent them. This is impossible with the
    current state of the technology as all failures are not predictable. Only events
    that have underlying patterns decipherable through trends or a sequence of events
    prior to the failure can be deciphered by the `AIOps` engine. We have to be aware
    of the limitations of the system and configure them to their best capabilities
    and not expect magic. There are lots of failures that are unpredictable in nature
    and happen at random. Devices and systems fail randomly without any forewarning,
    and predicting their failure accurately is not possible with the current state
    of the technology.


    Predictive analytics can be simple based on a single variable, or it can work
    on multiple variables and the correlation between them to arrive at a prediction.
    Predictive analytics systems can take care of seasonality of data in their models
    to arrive at accurate predictions with a high level of accuracy.


    Predictive analytics results in proactivity in operations and a higher availability
    of the system since the problem is remediated before it is able to impact the
    availability or response time of an application.


    ### Visualization


    Visualizations are important parameters in the `AIOps` tools. There are various
    types of views and dashboards that are needed from an operations point of view
    in `AIOps` tools.


    The foremost visualization is the event console. The `AIOps` tools need to have
    an intuitive and easy-to-use event console. The event console is a grid view that
    has all the alerts that need action or analysis from the operations teams.


    The following is important information that is available in the event console:


    - Event ID/alert ID

    - Description

    - First occurrence

    - Last occurrence

    - The number of times the event has occurred

    - Any associated incidents with the alert

    - Severity of the event

    - Whether it is a probable cause or not

    - Status whether it is open or cleared

    - History event/alert with associated actions and state changes


    The event console typically color codes the events per their severity and their
    tagging of being probable cause or not. Events that are correlated together are
    shown together in a consolidated console that enables the operations teams to
    look at all correlated events associated with a probable cause in a single console
    and deliberate on the root cause.


    Beyond the event console, the `AIOps` console has other dashboards that provide
    aggregated and consolidated information, as shown here:


    - Event trends, patterns; graphical plot of event trend

    - Top events across the environment

    - Top applications or infrastructure elements causing events

    - Information on event flood

    - Performance data plots for metrics

    - CMDB views/topology views

    - Historical data around events, alerts, and performance metrics


    Apart from the previous views, the `AIOps` engine may also provide views and information
    on the performance of the `AIOps` engine itself.


    Visualization in `AIOps` engine thus comprises the Event console, dashboards for
    real-time data, and reports for historical analysis of data that drives the collaboration
    process and is going to be discussed next.'
