    ## 关于技术审校


    # 1. 什么是 AIOps？


    本章介绍用于 IT 运维的人工智能（简称 `AIOps`）。在当今快速转型的应用和基础设施格局以及云原生技术广泛采用的背景下，组织发现难以提供能够扩展并满足业务需求的
    7×24 小时运维服务——如今的企业希望基于客户和市场反馈实现更高的可用性和敏捷性。本章还详细介绍了 `AIOps` 带来的优势，以及它如何支持企业的数字化转型之旅。

