    information and make decisions. AI systems have the ability to adapt as data changes.
    Thus, rather than learning from static rules, an AI system is highly adaptable
    and learns from changing data. For example, predicting the outage or service impact
    in business involves the ability to adapt to changing environments and new data.


    ## Types of Machine Learning


    AI is quite an extensive and complex domain that consists of multiple specialized
    subdomains. Let’s understand machine learning and deep learning in greater detail.


    ### Machine Learning


    Machine learning is a technique that includes the algorithms that parse data,
    learn from the data supplied to the algorithm, and then apply the learning to
    make decisions. Unlike traditional programming where a person must manually create
    programs and rules based on the point-in-time snapshot of the environment and
    specific logic derived by the programmer, ML algorithms automatically derive that
    logic from data and create required rules.


    Machine learning algorithms are at work in most of the applications that we use
    today. A simple example is a recommender system that recommends a movie, a song,
    or an item for us to buy based on analysis of our past preferences as well as
    the preferences of other users who are statistically similar to us.


    As the name suggests, machine learning algorithms are not static; they continue
    to learn with new data that is being fed into the system, and they get progressively
    better at the job with more data.


    The term *machine learning* was first coined by Arthur Samuel in 1952; its canonical
    and more practical definition was given by Tom Mitchell in 1997, which says “An
    agent or a program is said to learn from experience E with respect to some class
    of tasks T and performance measure P, if learner performance at tasks T, as measured
    by P, improves with experience E.”


    Machine learning has three different types, namely, supervised learning, unsupervised
    learning, and reinforcement learning, as shown in Figure [5-1](#524834_1_En_5_Chapter.xhtml#Fig1).


    ![](images/524834_1_En_5_Chapter/524834_1_En_5_Fig1_HTML.png)


    A model tree diagram with header machine learning. It has three branches, supervised
    learning, unsupervised learning, and reinforcement learning. Supervised learning
    is labeled as task driven. Unsupervised learning is labeled as data driven. Reinforcement
    learning is labeled as learn from hit and trial.


    Figure 5-1


    Types of machine learning'
  trans: '

    # 机器学习为何重要


    人工智能广义上分为通用人工智能和狭义人工智能。通用人工智能作为一个概念，目前仍属于科幻范畴。通用人工智能是一种拥有我们人类所有感官（如视觉、听觉、触觉、嗅觉和味觉）的机器，甚至可能超越人类感官，去感知和体验超出人类能力范围的事物。这些通用人工智能机器会像人类一样行动，并拥有超越人类的能力。通用人工智能中的*通用*一词意味着，正如人类具有高度通用性，能够完成多种任务并学习多种事物一样，机器也应具备同样的能力。


    相比之下，*狭义人工智能*由那些能够像人类一样甚至更好地执行特定任务的技术组成。当前的技术和实现状态都集中在狭义人工智能上。可以将狭义人工智能视为一个专家，它能快速且准确地执行一种类型的任务，但无法学习其他性质不同的任务。狭义人工智能的例子包括能够理解自然语言的系统、能够翻译语言的系统、能够识别物体的系统等。这些系统是为执行特定任务而创建和优化的。


    还有第三个术语，称为“超级人工智能”，它在科幻作品中广泛使用，用来描绘一种达到关键智能阈值的人工智能，它能够在越来越短的时间框架内自我优化，并达到超级智能的水平。因此，超级智能能够通过递归地自我编码并在每次迭代中改进，从而快速自我转化和优化。随着超级智能在每次迭代中自我改进，它会变得更快、更强大，因此后续每个周期所需的时间更少。据推测，如果这样的系统成为现实，它可能能够在数小时内自我编码数百万次，并消耗地球上所有可用的计算能力来创造一个超级智能，因为每一步后续步骤所需的时间都会更少。


    广义上，人工智能系统具有以下三个关键特性：


    - *意向性*：人工智能系统有意基于数据的实时分析或历史分析做出决策。例如，一个用于相关性的算法可以将网站访问分类为正常用户访问或拒绝服务攻击。

    - *智能性*：人工智能系统通过使用机器学习和深度学习技术，从数据中理解环境并得出概率性结论，从而具备智能。一个例子是对问题进行根本原因分析。这些系统试图模仿人类的智能和决策，但从技术上讲，我们距离在人工智能系统中达到人类智能水平仍然非常遥远。然而，在某些特定任务（如自然语言理解）中，一些人工智能系统提供的准确率已与普通人类的准确率相当。

    - *适应性*：人工智能系统在编译信息和做出决策时，具备学习和适应的能力。人工智能系统能够随着数据的变化而适应。因此，人工智能系统不是从静态规则中学习，而是高度适应并从变化的数据中学习。例如，预测业务中的中断或服务影响，就涉及适应不断变化的环境和新数据的能力。


    ## 机器学习的类型


    人工智能是一个相当广泛且复杂的领域，包含多个专门化的子领域。让我们更详细地了解机器学习和深度学习。


    ### 机器学习


    机器学习是一种技术，它包括解析数据、从提供给算法的数据中学习，然后应用所学知识做出决策的算法。与传统编程不同（传统编程中，人们必须根据环境的快照和程序员推导出的特定逻辑，手动创建程序和规则），机器学习算法会自动从数据中推导出逻辑并创建所需的规则。


    机器学习算法在我们今天使用的大多数应用程序中都在发挥作用。一个简单的例子是推荐系统，它根据对我们过去偏好的分析，以及与我们统计上相似的其他用户的偏好，推荐一部电影、一首歌或一件商品供我们购买。


    顾名思义，机器学习算法不是静态的；它们会随着输入系统的新数据不断学习，并且随着数据量的增加，它们在任务上的表现会逐渐变得更好。


    *机器学习*这个术语最早由阿瑟·塞缪尔于 1952 年提出；其经典且更实用的定义由汤姆·米切尔于 1997 年给出，该定义指出：“如果一个主体或程序在某一类任务
    T 上的性能（由性能指标 P 衡量）随着经验 E 的增加而提高，则称该主体或程序从经验 E 中学习。”


    机器学习有三种不同类型，即监督学习、无监督学习和强化学习，如图 5-1 所示。


    ![](img/524834_1_En_5_Fig1_HTML.png)


    一个以“机器学习”为标题的模型树状图。它有三个分支：监督学习、无监督学习和强化学习。监督学习被标记为任务驱动。无监督学习被标记为数据驱动。强化学习被标记为从试错中学习。


    **图 5-1** 机器学习的类型

    '
- fmt: '### Supervised (Inductive) Learning


    In supervised learning, users provide training data for a specific task to ML
    algorithms to analyze and learn from it. Training data includes both input, which
    is termed as *features*, and correct output, called the *label*. A simple example
    is an event with its description, timestamp, number of times it has occurred,
    the device on which it has occurred, and whether it is a critical alert or noise.
    Once the system gets enough data examples, it learns what is an alert and what
    is noise. The more training data, the higher the accuracy of the system.


    This model is then applied to unseen data as an input for the algorithm to predict
    a response. The model is essential for the algorithm finding the connections between
    the parameters provided and establishing a cause-and-effect relationship between
    the features in the dataset. At the end of the training, the algorithm develops
    a draft of how the data works and the relationship between the input and the output.


    For machine learning algorithms, the labeled dataset is divided into training
    data and test data where the training dataset trains the algorithm, and later
    the testing dataset is used to feed into the model to measure its accuracy of
    predictions. Models are then further fine-tuned progressively to arrive at better
    accuracy.


    Both the quantity and quality of training data are important in determining the
    accuracy of output. As per best practices, the dataset should be split into a
    70 to 30 ratio between training and testing datasets. If there is uneven class
    distribution in the dataset, then it is called an *imbalanced* training dataset,
    which means many more records for a particular class/label and very few records
    for another class/label. An imbalanced dataset causes imperfect decision boundaries,
    leading to inaccuracies in prediction. From an AIOps perspective, the training
    dataset should represent the actual production or operational characteristics
    with correct labeled parameters.


    Another important factor in improving the accuracy of prediction is to remove
    irrelevant features as they negatively impact the learning process. The features
    are various inputs that are part of the data; it is important that only relevant
    features are provided in the training. Incorrect, insufficient, or irrelevant
    data in training will lead to errors in the model.


    From an AIOps perspective, most commonly used supervised machine algorithms are
    as follows:


    - *Regression*: Regression is used to predict a continuous numerical value. For
    instance, at any specific time interval, it finds out what is the percentage utilization
    of CPU or count of website hits, capacity (GB) of a database, etc.

    - *Classification*: Classification is used if the expectation is to get a discrete
    value from a set of finite categories. We have already seen an example of classifying
    an event as an alert or noise. Classification use cases are marked as binary classification
    problem or multiclass classification problems depending upon whether the predicted
    output can belong to either of two classes or one of the multiple classes.


    The following are supervised machine learning algorithms:


    - Regression

    - Logistic regression

    - Classification

    - Naive Bayes classifiers

    - K-NN (k-nearest neighbors)

    - Decision trees

    - Support vector machine


    With an understanding of supervised ML techniques, let’s explore another crucial
    ML technique, that of unsupervised learning.


    ### Unsupervised Learning


    One of the big challenges in AIOps implementation in any organization is to get
    clean labeled data. In such scenarios, unsupervised machine learning provides
    the starting point for AIOP’s journey. Unlike supervised learning, it doesn’t
    need any “correct answer” as a label. Rather, these algorithms explore inherent
    patterns and relationships from millions of unlabeled data points to discover
    hidden correlation and patterns in the data. The unsupervised learning algorithms
    can adapt to the data by dynamically changing hidden correlations. It allows the
    model to work on its own to discover patterns and information that were previously
    undetected. Since there is no training data and it is left to the algorithm to
    decipher and make sense of the data, it is computationally more intensive than
    supervised learning. Since there is no training provided and no expert input to
    the algorithm, it is also less accurate than supervised learning. At times unsupervised
    learning is used to arrive at an initial analysis, and then the data is fed to
    supervised learning algorithms after gaining more insights. Though unsupervised
    learning does not use labels, humans still need to analyze the output generated
    to make sense of the data and fine-tune the models so that the expected result
    is generated.


    There are unsupervised machine learning algorithms that are mostly used in AIOps.


    *Clustering* identifies the anomalies in the dataset by splitting, and clustering
    is based on the similarity and differences between features and patterns available
    in the dataset. Multiple clusters help the operations team to diagnose issues
    and anomalies. Clusters divide the entire data set into subsets that are more
    similar to each other, and thus it creates insights into the data without any
    training. Clustering will bring together similar events, and this can then be
    used to further analyze the data and select appropriate mechanisms and algorithms
    that need to be used for AIOps.


    *Association* discovers the relationship between entities based on the correlation
    deduced from the dataset. For example, a long-running database job on a server
    can be associated with high CPU utilization and may lead to high response time
    on website hits or transactions.


    From an AIOps perspective, datapoints should be exposed to unsupervised learning
    to leverage clustering and association algorithms for root-cause analysis purposes.
    As a best practice, all events and incidents should be fed into the unsupervised
    learning algorithm to determine noise.


    Dimensionality reduction is a learning technique used when the number of features
    in a given dataset is too high. It reduces the number of data inputs to a manageable
    size while also preserving the data integrity. Often, this technique is used in
    the preprocessing data stage. This ensures that noisy features or features that
    are not relevant to the task at hand are reduced.


    The following are types of unsupervised learning:


    - Clustering

    - Exclusive (partitioning)

    - Agglomerative

    - Overlapping

    - Probabilistic


    The following are the most commonly used clustering algorithms:


    - *Hierarchical clustering*: As the name suggest, this clustering algorithm uses
    a “hierarchy” of clusters to decompose data into a cluster and form a tree structure
    called a *dendrogram*. From an AIOps perspective, it is useful in automatically
    detecting service models without a CMDB and performing service impact analysis
    on it. You can either follow a top-down approach (divisive) or a follow bottom-up
    approach (agglomerative) to group data points in a cluster. In the divisive approach,
    all data points are assumed to be part of one large cluster (like application
    service), and then based on the termination logic they get divided into smaller
    clusters (like technical service). In agglomerative, each data point is assumed
    to be a cluster, which iteratively gets merged to create large clusters.'
