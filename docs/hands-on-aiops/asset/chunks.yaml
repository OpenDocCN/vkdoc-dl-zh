    # APM 与 SecOps 中的自动基线化


    与 SecOps 和应用监控相关的监控工具具有不同的特性，因为大多数情况下，它们的监控参数值保持极低，几乎趋近于零，这会导致数据集不平衡，从而提供错误的预测。在这种情况下，更有意义的做法是将峰值或异常的高利用率值（称为*异常*）与预测值进行比较，以计算
    `MASE` 比率，并据此调整机器学习模型，而不是利用通常较低的参数值。异常值是指那些不遵循常规模式并表现出突然峰值（上升或下降）的值。我们将在第 8 章中进一步讨论这些内容。


    这些针对安全相关参数的预测阈值可以应用于监控受保护网段的策略，该网段包括定义服务的 IP 地址范围、端口和协议、VLAN 编号或 MPLS 标签。一个合适的策略将动态检测针对不同受保护网段的攻击，并触发合格的告警，而不是产生噪音。


    实施具有自动基线化功能的监控解决方案，可以使运维团队快速识别中断、异常和网络攻击，而不是将时间浪费在噪音上，从而带来立竿见影的好处。但组织在采用动态阈值时常常面临一些运营挑战，我们接下来将讨论这些挑战。


    ## 动态阈值面临的挑战


    尽管动态阈值看起来很有前景，但由于担心错过关键告警，其采用面临挑战。尤其是在 AIOps 系统刚刚开始学习过程的初始阶段，组织对预测的准确性会产生很多质疑。此外，大多数开源和原生监控工具不具备此功能。实施基于
    AIOps 的动态阈值涉及使用多种算法和技术，并且需要较长时间的数据才能分析季节性和模式。


    ## 总结


    在本章中，我们介绍了 AIOps 中的一个重要用例，即自动基线化。我们涵盖了可用于此目的的各种回归算法。我们通过使用多种算法（如线性回归、`ARIMA` 和
    `SARIMA`）对该用例进行了动手实践。在下一章中，我们将介绍各种异常检测算法以及如何在 AIOps 中使用它们。


    # 8. AIOps 用例：异常检测


    在前几章讨论了去重和自动基线化之后，我们现在将沿着 AIOps 成熟度阶梯向上，讨论异常检测，这为迈向主动性提供了巨大飞跃。本章将解释异常检测及其对 IT
    运维的用处。


    ## 异常检测概述


    异常检测是识别不寻常或意外数据点的过程。CPU、内存、交换内存、磁盘等的常规事件对运维来说是正常的，但如果出现任何“应用程序宕机”或防火墙事件，则代表了一种异常情况。异常检测的目标是识别数据集中与其它观测值显著不同的此类异常情况（我们称之为*离群点*）。尽管检测异常的任务可以通过所有三种类型的机器学习算法来执行，但其实现主要通过将未标记数据聚类成不同组来广泛进行。在
    IT 运维中，执行服务改进计划是一项常规工作，运维并没有特定的预测目标。相反，他们需要分析大量数据，然后尝试观察相似性并将它们组合成不同的组，以理解异常并制定建议。我们在第
    5 章中简要讨论了无监督机器学习中可用于异常检测的不同聚类算法，而 K-means 聚类是其中最简单、最流行的无监督机器学习算法之一，我们将在本章中探索它。


    ## K-Means 算法


    如第 5 章所述，K-means 是一种基于质心的聚类算法，广泛用于数据挖掘中检测模式并将相似的数据点分组到一个*簇*中。从数学上讲，如果有一个由 `N`
    个数据点组成的数据集 `{x1, . . . , xn}`，如图 8-1 所示，那么我们的目标是将数据集划分为 `K` 个簇。


    ![](img/524834_1_En_8_Fig1_HTML.jpg)


    一个散点图，显示了可以在质心周围创建的不同的簇。有多种方法可以从数据集中确定质心。在散点图中，水平轴值为 0、200、400、600、800 和 1000，垂直轴值为
    0、5000、10000、15000、20000 和 25000。


    图 8-1


    空间中的 `N` 个数据点


    这里，`K` 表示可以在质心周围创建的不同的簇的数量。有多种方法可以从数据集中确定质心，本节将在我们的实现中使用肘部法来确定合适的簇数。数据集中检测到了三个质心，在图
    8-2 中标记为红点。


    K-means 算法试图确定数据点与质心的相似性，并相应地将数据点聚类在这些质心周围，如图 8-2 所示。


    ![](img/524834_1_En_8_Fig2_HTML.jpg)


    一个散点图，用于确定数据点与质心的相似性，并相应地将数据点聚类在这些质心周围。散点图的水平轴值为 0、200、400、600、800 和 1000，垂直轴值为
    0、5000、10000、15000、20000 和 25000。


    图 8-2


    K-means 算法执行的聚类


    IT 运维团队执行手动过滤数百个事件并将相关事件分组到组中的任务，用于各种目的，例如：


    *   *根本原因分析*：将与某个问题或中断相关的事件分组，以了解问题是如何开始发展的。

    *   *性能分析*：将与特定应用或服务相关的事件分组，以分析其性能和相关的瓶颈。

    *   *服务改进*：将产生噪音的事件分组，并分析应在源头更新哪些监控配置或基线以减少噪音并提高服务质量。

    *   *容量规划*：将代表热点的事件分组，这些热点需要通过容量规划流程进行及时的干预和解决。


    从 AIOps 的角度来看，它可能是最简单的聚类算法，可以在广泛的场景中检测异常。在该算法中，首先为每个簇选择一个质心，然后根据数据点与质心的距离将它们分组到簇中。有多种计算距离的方法，例如闵可夫斯基距离、曼哈顿距离、欧几里得距离、汉明距离等。


    聚类是一个迭代过程，用于优化计算距离的质心位置。例如，大多数组织会收到数千个与性能或可用性相关的事件，但很少收到与 DDoS/DoS 攻击相关的安全告警。不仅频率不同，告警文本消息也会不同。在这种情况下，你可以对事件消息应用
    K-means 聚类，将时间尺度上的相关消息分组，而将安全告警作为异常单独处理。

