  trans: '

    #### 集成


    要实现数据摄取，AIOps 平台中必须存在可用的集成功能。AIOps 平台应同时支持推送和拉取两种集成模式。在推送模式下，监控工具或转发器可以将数据转发至
    AIOps 引擎。在拉取模式下，AIOps 工具具备从各种监控系统中拉取数据的能力。


    集成的另一个方面涉及实时与周期性数据上传：事件、指标日志和追踪数据需要实时集成，因为运维团队需要立即采取行动。发现数据和 CMDB 数据则可以周期性集成到
    AIOps 系统，例如，作为批处理任务在每天或每周末执行，或在 CMDB 任务同步完成后立即执行。这有助于保持 AIOps 数据在拓扑和关系方面的最新性。然而，在云计算和软件定义环境中，CMDB
    数据的发现是实时的，并且在通过基础设施即代码进行资源调配和解除调配时，集成也是实时完成的。


    用于集成各种监控和管理系统的适配器是 AIOps 系统的一部分。需要对这些适配器进行配置，以便将来自不同系统的数据汇集到一个统一的大数据存储库中，用于数据分析和推理。


    #### 事件抑制


    通过集成和数据摄取，来自各种监控和管理工具的所有数据都被摄入到 AIOps 解决方案中。这些海量数据需要经过清理以减少噪音。第一步是事件抑制，即从系统中抑制或消除不需要的告警。需要注意的是，任何对后续处理有用或能为
    AIOps 引擎提供信息的数据，都不应在抑制过程中被丢弃。抑制的一个例子可能是事件和日志源中的信息性事件。这些事件仅用于提供信息，并不表示系统中存在潜在问题。摄入的日志文件中可能存在的另一种数据是成功执行记录；这些数据同样仅用于信息参考，与发现系统问题无关。在其他系统中，警告类事件也可能在事件抑制阶段被丢弃；这一决定需要由领域专家做出。


    如果没有事件抑制，AIOps 系统将被大量后续处理和分析不需要的数据所淹没。


    #### 事件去重


    事件被抑制后，下一步是事件去重。去重是 AIOps 数据处理中的一个重要步骤。在此步骤中，重复的事件会被合并并去重。例如，如果一个系统宕机，监控工具可能每分钟都会发送一次此数据；这些数据包含相同的信息，但时间戳不同。AIOps
    系统会接收此数据，增加原始事件的计数器，然后更新时间戳，以反映该系统和该特定事件最后一次发生的时间。这为 AIOps 系统以及工程师提供了所需信息，即哪些系统从何时开始宕机，以及最后一个数据点的时间戳是什么。去重确保了事件控制台不会被多个事件塞满，同时相关信息仍然可用。


    去重保留了系统中持续存在的连续事件所发送的信息，这些信息供 AIOps 系统处理使用；然而，这些信息不会多次显示，而是在控制台和数据库中进行聚合。


    如果没有事件去重，事件控制台将会被大量重复显示相同事件的信息所充斥。


    #### 基于规则的关联


    AIOps 系统使用机器学习技术来分析数据。传统系统则使用基于规则的关联来解读和分析数据。在 AIOps 系统中，基于规则的关联仍然扮演着重要角色，并且组织中可能存在一些需要通过基于规则的配置（而非使用概率性机器学习模型）来实施的策略。例如，可以设置一条规则，根据系统是开发环境还是生产环境来提升事件的严重级别。这通过查询
    CMDB 以查找设备类型，然后根据系统分类应用一条规则或策略来升级或降级事件的严重级别来实现。AIOps 系统中还需要其他重要规则，例如“维护窗口”，在该窗口期间，任何维护或补丁活动产生的告警都会被抑制。这减少了系统中的噪音，并防止事件控制台显示因重启或关机进行维护活动而产生的告警。


    基于规则的关联还有一个子类型，称为**基于拓扑的关联**。系统之间的拓扑和关系既用于基于规则的关联，也用于基于机器学习的关联。在基于规则的系统中，系统的拓扑及其关系被用来抑制或关联事件。例如，如果一个交换机宕机，那么该交换机之后的所有服务器或基础设施对于监控系统来说都将不可达。基于拓扑的关联会标记这些事件，将所有基础设施事件与交换机宕机事件关联起来，并将该交换机标记为所有这些事件的潜在根本原因。


    #### 基于机器学习的关联


    AIOps 工具提供的基于机器学习的关联正是其被称为 AIOps 的原因。我们讨论的其他功能在传统平台中也可用，但基于机器学习的能力才是将 AIOps 产品与其他事件管理和事件关联引擎区分开来的关键。图
    2-4 展示了 AIOps 引擎执行的各种类型的关联。


    ![](img/524834_1_En_2_Fig4_HTML.png)


    一张说明机器学习执行的各种关联类型的插图。围绕机器学习顺时针循环的关联类型是：异常检测、事件关联、根本原因分析和预测分析。


    图 2-4


    AIOps 驱动的关联引擎


    在本节中，我们将从异常检测开始，更深入地探讨每一种类型。

    '
- fmt: '#### Anomaly Detection


    `Anomaly detection` is the process where you can identify unexpected events or
    rate events in the data. `Anomaly detection` is also termed *outlier detection*
    since it is about detecting outliers or rare events.


    The outlier or anomaly events differ from the normal events. `Anomaly detection`
    algorithms try to identify these events from normal events and flag them as anomalies.
    Typically, events that are anomalies may point to some issues with the system.
    `Anomaly detection` techniques have been used in various use cases such as fraud
    detection in credit card and banking transactions, security systems to detect
    cybersecurity attacks, etc. With `AIOps` the same techniques and algorithms are
    now being used on the IT operations data.


    Anomalies are not just about rare or outlier events; anomalies are also detected
    in `AIOps` systems for metric data such as network or system utilization parameters.
    In metric data, the anomalies are the bursts in utilization or activity, and these
    may point to some underlying causes that are flagged by the `AIOps` systems.


    `Anomaly detection` techniques use unsupervised and supervised as well as semisupervised
    machine learning to flag events as anomalies and flag the metric data when there
    are breaches to normal behavior.


    `Anomaly detection` has advantages over traditional rule-based systems. `Anomaly
    detection` algorithms can detect seasonal variations in data and only flag anomalous
    behavior of the system after taking into consideration the seasonality of variations.
    Metric data has high seasonality since application load and jobs running on IT
    infrastructure typically follow a time-of-day season. Some of the jobs that are
    run monthly also increase the utilization of systems but are not anomalies.


    `Anomaly detection` can be done using a variety of available algorithms in `AIOps`
    systems. The `AIOps` teams can use these algorithms to fine-tune the implementation
    based on the type of data and in the environment.


    Thus, `AIOps` systems using `anomaly detection` are better suited to reduce the
    noise in the event data or metric data by flagging the right events based on the
    seasonality of data on one hand and by finding anomalous patterns that may get
    missed in rule-based systems. Together these features help the operations teams
    by giving them insights into what is happening in their environment so that they
    can take reactive and proactive steps to remediate problems or prevent problems
    from occurring in the environment.


    #### Event Correlation


    Modern digital applications are all interconnected. Even traditional applications
    have been developed using distributed architecture where web servers, application
    servers, and database servers work in tandem to complete the application functionality.
    The infrastructure itself is distributed in network topologies with routers, switches,
    and firewalls routing the traffic from users of different locations to the main
    data center where the application is hosted.


    The distributed application and infrastructure are monitored using multiplicity
    of tools. Thus, an environment will have alerts coming in from the network monitoring
    tools, server monitoring, database, and platform monitoring, and the application
    itself will be logging events and traces. All this data needs correlation so that
    the noise can be eliminated, and the causal event (the event causing the problem)
    is flagged and identified automatically. In the scenario where `AIOps` tools are
    not deployed, this activity is done by different subject-matter teams coming together
    over a call that is termed the *operations bridge* or *critical incident bridge*
    and analyzing all the systems and data to collectively identify what could be
    the potential source of the problem in a distributed system. You can imagine the
    complexity and the time taken to go through all the data and arrive at a conclusion.


    `Event correlation` also takes feeds from configuration management and change
    management systems, thus correlating these changes in systems to the events getting
    generated by monitoring tools. This helps in root-cause analysis as many incidents
    and problems arise after making a configuration change or patching an existing
    system. Change and configuration management data needs to be made available to
    the `AIOps` engine to correlate with event and performance data coming in from
    the monitoring systems. In fact, the first thing subject-matter experts look for
    is any changes that may have been made to the system recently that would have
    caused the incident.


    Machine learning–based `event correlation` helps solve this problem by automatically
    grouping related alerts by correlating across various parameters so that the resolution
    group gets all the information at a single place. `Event correlation` is done
    using the topology and relationship information that is available in discovery
    and `CMDB` systems; it also uses timestamps and historical data to group events
    and provides insights to operations teams.


    With time and enough supervised learning data, the `event correlation` engine
    becomes more accurate. The `event correlation` engine feeds in the data to “root-cause
    analysis.” We will be covering root-cause analysis in greater detail in the next
    section. Without `event correlation`, it is not possible to do root-cause analysis
    or predictive analytics. Thus, `event correlation` is the first step to move forward
    with root-cause analysis and predictive analytics.'
