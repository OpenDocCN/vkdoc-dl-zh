  trans: '

    # 协作


    与观察阶段一样，协作在参与阶段也至关重要。在观察阶段，团队间的协作通过协作桥或使用 ChatOps 进行，以找出问题的根本原因。而在参与阶段，协作则发生在不同利益相关者之间，共同解决问题。因此，各类利益相关者通过工单协作，推动问题最终解决。与观察阶段需要多个团队共同分析问题不同，参与阶段的协作人员范围有限，有时仅局限于特定技术领域；甚至有时只有一个人在处理工单以解决问题。


    协作同样存在于服务请求和变更执行任务中；不过，这些任务大多通过基于规则的系统进行编排，每个任务的完成会按顺序分配给需要执行该工作的人员。在变更管理中，由于复杂且重大的变更可能涉及多个团队，因此需要更高程度的协作；变更管理流程通过基于规则的方法来管理这些协作，系统会在变更的不同阶段将所需的利益相关者聚集在一起。


    如果负责执行任务的人员未能在规定时间内完成，系统会指派或引入技能更高的资源来协助并按时完成任务。这一切都通过一个基于规则的引擎完成，该引擎会持续监控任务完成时间，并在设定时间到期后自动升级处理。


    协作还体现在可视化或仪表盘层面，不同利益相关者可以在此共同查看数据、进行分析，并做出需要多个团队或利益相关者提供输入的决策。


    尽管主要基于规则，但 ChatOps 的某些方面也可用于参与阶段，团队可以利用 ChatOps 实时协作处理事件、问题和变更。这些数据也会被存储，用于知识管理。


    知识管理是参与阶段的关键领域，因为 ITSM 系统是 IT 服务管理中大部分信息的主要存储库。在解决事件、执行变更和服务请求时，自然语言处理和文本提取等 AIOps
    技术可用于快速查找相关信息。AIOps 系统可以利用信息检索和搜索技术，快速轻松地找到相关信息，从而使运维团队能够更快地解决事件。


    ## 反馈


    参与阶段的反馈通过多种机制和流程产生。在事件管理流程中，事件关闭会触发反馈，由受影响的用户填写；同样，重新打开的事件也是一种分析反馈机制。关于失败变更、必须中止的变更以及已完全执行但导致事件的变更的反馈，都是重要的输入。


    用户提出的服务请求在完成后也会触发反馈，并作为分析输入，用于评估流程的运行状况。


    所有这些数据都会被输入系统，在可视化层进行展示，并利用分析技术进行分析。


    这里的反馈并非作为算法的输入，而主要用于数据分析，以辅助决策，从而改进整体流程。


    参与阶段的 ITSM 系统负责编排整个流程，流程的每一步都会被记录和更新；然而，实际执行的操作属于“行动”阶段，我们将在接下来讨论。


    # 行动


    行动阶段是任务的实际技术执行阶段，包括事件解决、服务请求履行、变更执行等。图 2-6 展示了这一阶段的可视化效果。


    ![](img/524834_1_En_2_Fig6_HTML.png)


    四类 AIOps 驱动的 IT 自动化示意图：自动化推荐与执行；变更编排、服务请求履行、事件解决；自动化分析；以及可视化、协作与反馈。


    **图 2-6** AIOps 驱动的 IT 自动化


    因此，运维团队执行的所有技术任务都属于这一阶段。


    AIOps 旅程的完成依赖于行动层；正是在这里，事件得到解决，系统恢复正常状态。即使没有这一层，AIOps 也能带来收益，因为大多数诊断和分析活动都涵盖在观察和参与阶段；然而，将
    AIOps 扩展到行动层会成倍增加收益，因为组织不仅能够快速发现问题，还能在无需人工干预的情况下自动解决问题。


    要使行动层发挥作用，必须确保观察层已实施并经过微调。如果 AIOps 引擎无法检测异常和可能原因并触发操作，行动层就不可能解决问题。


    因此，行动层与参与层和观察层集成，以获取数据输入，然后根据这些数据输入在技术环境中采取解决或其他操作。观察层使用前述的 AIOps 技术来查找可能原因，然后在
    ITSM 系统或参与层中创建事件；行动层的自动化可以从参与层获取这些事件，然后自动解决事件。要自动解决事件，它需要知道如何解决事件，还需要理解事件以及发生事件的基础设施。我们将从最简单但非常有效的自动化推荐技术开始，探讨
    AIOps 中使用的各种技术。


    ## 自动化推荐


    解决事件的第一步是推荐哪种自动化能够解决特定问题。这可以通过基于规则的方法或机器学习方法来实现。在基于规则的方法中，每种可能原因类型都与一个自动化操作映射，该操作被触发以解决该可能原因。在机器学习
    AIOps 方法中，这种关系不是固定的，而是概率性的。


    自然语言处理和文本提取等多种技术被用于找到解决问题的正确自动化操作，然后将其作为针对观察层识别出的可能原因的解决方案进行推荐。


    在 AIOps 领域，自动化操作通常是静态的；然而，也有一些较新的技术使用先进的机器学习技术，将多个可链接的 runbook 组合在一起以解决问题，从而利用机器学习动态创建新的自动化操作。像
    `DryICE iAutomate` 这样的工具提供了这些高级功能，以及开箱即用的 runbook 和预训练模型，显著增强了自动化推荐能力。


    自动化推荐会为自动化操作提供一个置信度评分。低风险任务可以自动映射以执行推荐，而高风险执行任务则可以采取人工介入的方式，即由人工操作员在推荐发送执行之前进行验证。

    '
- fmt: '#### Automation Execution


    Automation execution is the actual act of executing on the recommendation generated
    in the previous step. Thus, once a probable cause has been mapped with an automation,
    the automation is triggered to resolve the problem.


    The execution layer can be built in the AIOps platform or can leverage existing
    automation tools available in the environment. The automation execution engine
    provides feedback to the AIOps tool on successful or unsuccessful execution results.


    The automation can be triggered using a variety of tools including runbook automation
    tools, configuration management tools, provisioning tools, infrastructure as code
    tools, robotic process automation, and DevOps tools. Most organizations have multiple
    automation tools, and the relevant ones can get integrated as the automation execution
    arm to be fed by the automation recommendation engine.


    Automation tasks can be simple ones like running a `PowerShell` or shell script
    to reboot or restart services or can encompass more complex tasks that involve
    complex workflows and even involves spinning up new instances and infrastructure.


    Most AIOps platforms today operate only at the Observe layer and do not have automation
    execution or recommendation as part of the toolset; however, there are tools like
    `DryICE iAutomate` that provide automation recommendation and execution capabilities
    bundled with out-of-the-box workflows so that organizations can leapfrog and reach
    a higher level of maturity quickly.


    Outside of the AIOps platforms, there are countless scenarios where it is possible
    to use AIOps disciplines as a trigger to an existing automation. Most organizations
    have `Python` or `PowerShell` scripts that can automate routine remediation workflows,
    such as rebooting a virtual machine. Expect these types of predefined automations
    to be a substantial portion of your intelligent automation portfolio, and reuse
    automation assets with AIOps solutions to increase the value of both the AIOps
    analysis and the automation development.


    Automated execution can span different types of use cases including incident resolution,
    service request fulfilment, and change orchestration. Some of them are more tuned
    for a probabilistic scenario, while others can use rule-based process workflows.


    One should take care while triggering low-confidence recommendations, or the failure
    of automation may lead to further problems. In such situations, it may be prudent
    to use other techniques such as diagnostics runbooks. The low-confidence automations
    can also mandate a doer checker process whereby the actions of the system are
    evaluated by a human operator before being fired in the system. A combination
    of a rule-based system with confidence-based recommendations would best work in
    certain situations, and thus an intelligent call needs to be taken based on the
    environment and the risk associated.


    #### Incident Resolution


    Incident resolution is one of the types of automated execution. This is one area
    that tightly integrates with the Observe phase. Thus, the output of the observe
    phase, which is a probable cause, becomes an input to the automation assessment,
    and if there is an automation available for that particular root cause, it can
    be triggered automatically or using a human in the middle approach to resolve
    the problem.


    Incident resolution is an area where machine learning techniques of recommending
    an automation can be used effectively and will provide better results than rule-based
    systems.


    Incident resolution is the primary area where probabilistic machine learning technologies
    in AIOps play a role.


    #### SR Fulfilment


    Service request fulfilment is an area where users request particular services,
    which are logged into the ITSM system as a service request. The service request
    is then fulfilled as a series of tasks that get executed automatically or by human
    agents, or by a combination of both automation and human actions.


    Since service request tasks are mostly definitive in nature and there is no ambiguity
    on how this task needs to be executed, the role for machine learning technologies
    is limited.


    Service requests are fulfilled through a series of step-by-step processes termed
    tasks. At each stage of execution, the requester is kept updated on the progress
    of his request, and on completion of the task, the requester is notified of fulfilment
    and a way to access the fulfilled deliverable.


    Service requests can be for software systems, or they may be for hardware that
    needs to be delivered; for example, the delivery of a laptop to a new employee
    is a service request, which actually goes through a physical fulfilment process
    and hence cannot be fully automated. Automation here is about integration of service
    request systems with procurement and ordering systems so that the request can
    be automatically forwarded to third-party partners or vendors who would take this
    up for fulfillment by way of shipping a laptop/hardware.


    Software deployment tasks are fully automated using software delivery platforms
    for service requests, which include things like deployment of end user applications
    like `Microsoft Office` on laptops.


    The service requests are initiated by the requester from a service catalog. The
    service catalog is similar to the shopping cart where you can order goods and
    services from online marketplaces like `Amazon`.


    The role of machine learning in this area is around cognitive virtual assistants,
    which can provide an intuitive chat or voice interface to users rather than a
    web portal or catalog. This makes it easier for users to converse in natural language,
    arrive at the right catalog item, and then order it all from a chat interface.
    The cognitive virtual assistants are integrated in the Engage layer and raise
    a request after the confirmation from the user. The virtual agents can also be
    used by the requester to track the progress of fulfilling the request.


    Cognitive virtual assistants internally use natural language processing and understanding
    along with various machine learning and deep learning technologies to decipher
    the intent of the user and provide appropriate responses.


    The primary use case for cognitive virtual assistants is in the area of service
    request; however, similar functionality and use cases are equally appliable in
    incident management and change management.'
