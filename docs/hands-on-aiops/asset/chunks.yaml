  trans: '

    ### 预测性分析


    预测性分析为 IT 运维引入了预测元素。客户一直期望 IT 运维系统具备预测能力，但这一需求始终未能实现。`AIOps`将预测性分析能力引入 IT 运维，满足了运维团队这一长期未获满足的需求。


    顾名思义，预测性分析是指基于提供给`AIOps`系统的数据，提前预测事物的能力。在 IT 运维领域，预测性分析有多种应用场景，下面我们来了解其中一些。


    预测性分析的一个重要应用领域是性能管理和容量规划。由于`AIOps`系统能够获取指标数据，`AIOps`引擎可以预测这些系统未来的利用率。围绕访问应用程序的用户数据以及相关的系统利用率，可以基于场景进行预测，例如将有多少用户访问应用程序，以及需要多少基础设施来支持这些用户。回归技术可用于考虑系统当前的性能和工作负载，并预测基础设施未来的利用率。能够提前预测利用率，有助于
    IT 运维团队更好地规划基础设施容量，并实例化新的虚拟机或云实例以满足预测的需求。在基于微服务的应用程序中，新的 Pod 会自动启动以满足基础设施上增长的需求。


    预测性分析使用回归技术，该技术可以考虑数据的季节性并提供准确的结果。例如，在月初或月末执行的备份或数据处理作业，可能会导致应用程序出现性能问题和错误。利用预测性分析技术，可以确保`AIOps`系统能够预测利用率，运维团队可以采取适当措施，通过启动额外实例或垂直扩展容量来增加该时段的容量，从而避免性能问题和事件发生。


    另一个基于指标的用例是关于趋势发现，`AIOps`引擎能够识别趋势以及趋势末端关联的事件。基于这种关联，它可以提前预测系统故障等情况。例如，应用程序中的内存泄漏问题会导致机器的内存利用率持续上升，从而形成一种趋势。在消耗完所有可用内存后，系统开始消耗磁盘空间，并将内存分页到物理磁盘。一段时间后，应用程序开始变慢并最终崩溃，引发一系列事件。预测性分析引擎可以检测到这种模式，并在观察到趋势时，`AIOps`系统可以警告运维团队即将发生的故障。


    另一个类似的例子是存在缺陷的数据库连接代码，其中数据库连接未被释放，一段时间后阻塞了整个数据库，应用程序开始收到连接失败警报。当绘制数据库连接相关的指标时，会形成一个上升趋势，`AIOps`系统可以解读此趋势，从而预先警告运维团队。


    与`AIOps`领域的其他要素一样，预测性分析也基于概率，因此可能并非 100%准确。IT 运维领域的预测性分析通过观察事件和指标来预测可能的结果，然后向运维团队发出警报。


    客户有时会将`AIOps`工具视为魔法棒，期望它们能预测并防止所有类型的故障。以当前的技术水平，这是不可能的，因为并非所有故障都是可预测的。只有那些具有可通过趋势或故障前一系列事件解读的底层模式的事件，才能被`AIOps`引擎解读。我们必须认识到系统的局限性，并将其配置到最佳能力，而不是期待奇迹。许多故障本质上是不可预测且随机发生的。设备和系统会在没有任何预兆的情况下随机故障，以当前的技术水平，准确预测它们的故障是不可能的。


    预测性分析可以基于单个变量而简单实现，也可以基于多个变量及其之间的相关性来得出预测。预测性分析系统可以在其模型中考虑数据的季节性，从而得出高准确度的预测。


    预测性分析使运维工作更具主动性，并提高了系统的可用性，因为问题在影响应用程序的可用性或响应时间之前就已得到修复。


    ### 可视化


    可视化是`AIOps`工具中的重要参数。从运维角度来看，`AIOps`工具需要多种类型的视图和仪表盘。


    最重要的可视化是事件控制台。`AIOps`工具需要拥有一个直观且易于使用的事件控制台。事件控制台是一个网格视图，其中包含所有需要运维团队处理或分析的所有警报。


    以下是事件控制台中包含的重要信息：


    - 事件 ID/警报 ID

    - 描述

    - 首次发生时间

    - 最近发生时间

    - 事件发生次数

    - 与警报相关的任何事件单

    - 事件严重级别

    - 是否为可能原因

    - 状态（打开或已清除）

    - 历史事件/警报及其关联的操作和状态变更


    事件控制台通常根据事件的严重级别以及是否标记为可能原因，使用颜色编码。关联在一起的事件会显示在整合的控制台中，使运维团队能够在一个控制台中查看与某个可能原因相关的所有关联事件，并分析根本原因。


    除了事件控制台，`AIOps`控制台还提供其他仪表盘，用于显示聚合和整合的信息，如下所示：


    - 事件趋势、模式；事件趋势的图形化展示

    - 整个环境中的顶级事件

    - 导致事件的主要应用程序或基础设施元素

    - 事件洪泛信息

    - 指标的性能数据图

    - CMDB 视图/拓扑视图

    - 关于事件、警报和性能指标的历史数据


    除了上述视图，`AIOps`引擎还可能提供关于`AIOps`引擎自身性能的视图和信息。


    因此，`AIOps`引擎中的可视化包括事件控制台、用于实时数据的仪表盘，以及用于历史数据分析的报告，这些报告驱动着协作流程，这将是接下来要讨论的内容。

    '
- fmt: '### Collaboration


    IT operations teams collaborate to find root cause and to deliberate on ways of
    solving the problem. The Command Center function in IT operations is where the
    collaboration between various teams happens over a bridge. A bridge is an online
    real-time call over communication channels like Microsoft Teams and Phone where
    multiple teams interact and collaborate to look at the events and incidents and
    try to analyze and find the root cause of the issue at hand. Priority 1 incidents
    that are impacting an application or infrastructure mandate the opening of a P1
    bridge where the required stakeholders from different technical domains collaborate.


    In AIOps, the same process runs; however, there are a few differences. More and
    more teams are leveraging the built-in ChatOps features of AIOps tools where different
    team members can converse as well as run scripts to diagnose and resolve the problem.


    Another change in AIOps is that rather than looking at different consoles and
    events, the entire team has access to the AIOps event console where consolidated
    and correlated events along with probable cause that are flagged by the AIOps
    system are available for the teams.


    The views on topology and relationships between the affected or systems under
    investigation is also available from the AIOps console; thus, the teams don’t
    have to go to various systems to get the complete picture.


    This results in speeding up the entire process of root-cause analysis, problem
    identification, and resolution of the problem.


    Another important aspect of collaboration in AIOps is that this is no longer a
    collaboration between people only. The artificial intelligence system is a party
    to the entire collaboration and is storing the information in its records to be
    used as a learning tool and to be used in future incidents involving the same
    set of events or same probable cause. AIOps tools can bring up the past records
    and help the operations teams in referring to the accumulated knowledge from past
    collaborative analysis that was done. Thus, historical knowledge is not lost but
    accumulated for usage in the future.


    ### Feedback


    Feedback is the last step in our Observe process, but it’s perhaps the most important
    step. As you learned in earlier sections, root-cause or probable cause analysis
    is one of the most important use cases in AIOps, and the foundation of root-cause
    analysis is the continuous feedback on its accuracy and confidence scores provided
    by the operations teams. Every root cause identified by the AIOps engine is analyzed,
    and feedback is provided in the system by the operations teams. Thus, an incorrect
    root cause provided by the AIOps engine is marked as incorrect, and the correct
    ones are marked as correct. This data feed helps the AI engine to understand the
    environment and improve on its model. This data is the labeled data that is required
    for training the supervised learning system in AIOps. Once there is enough data
    with the AIOps engine on what events are root cause and which events are not root
    cause, it is able to better analyze and interpret the next set of events based
    on this learning. Thus, feedback is what powers continuous learning of the system.
    This enables the AI system to learn and improve its accuracy and confidence scores
    and achieve a level of accuracy where the data can be then used to initiate automation.


    Typically, after a few months of running the AIOps system and providing the correct
    feedback, the system’s accuracy and confidence scores reach a level where the
    automation can be initiated from the AIOps engine for high-confidence probable-cause
    alerts so that the entire process from detecting a problem to taking a correction
    action through automation is achieved automatically without human intervention.
    This concludes the Observe stage of AIOps system. Let’s now move to the other
    core function under AIOPs, which is Engage.


    ## Engage


    The Engage area is related to ITSM and its functions. It is an important piece
    in the AIOps space as it primarily deals with the processes and their execution
    by various functions and the metrics around process and people. The Engage piece
    deals with the service management data and hence is a repository of all the actions
    taking place in important ITSM functions like incident management, problem management,
    change management, configuration management, service level agreements, availability,
    and capacity management. Figure [2-5](#524834_1_En_2_Chapter.xhtml#Fig5) illustrates
    this.


    ![](images/524834_1_En_2_Chapter/524834_1_En_2_Fig5_HTML.png)


    An illustration of four service management of A I Ops-driven data: incident creation
    and task assignment; task analytics and agent analytics; process analytics and
    change risk analytics; and visualization, collaboration, and feedback. The task,
    agent, process, and change risk have heading analytics.


    Figure 2-5


    AIOps-driven IT service management


    Continual service improvement is an important lifecycle stage in ITSM, and that’s
    where most of the analytics is performed in AIOps. In Observe, the primary data
    includes events, metrics, logs, and traces, but here the primary data is around
    the activities being done in various processes. Workflows in Observe are more
    machine to machine; here the workflows involve the human element.


    The data in Observe is mostly real time, but in Engage it is a mix of real time
    as well as on-demand analytics.


    Let’s do a deep dive on this and understand its elements and stages.


    ### Incident Creation


    The Engage phase starts with the Observe phase creating an incident in the ITSM
    system. After probable cause analysis creates a qualified alert, the alert is
    sent to the ITSM system for creation of an incident. Incident creation needs various
    fields to be populated in the ITSM system so that the information is complete
    and helps the resolution teams in resolving the incident. The AIOps Observe tool
    and the ITSM tool are integrated to automatically create incidents in the ITSM
    system and have the fields in ITSM autopopulated from the information available
    in the Observe module. This includes the description of the alert and other related
    information as defined earlier in the Observe section.


    If an alert is cleared from the Observe module, the AIOps engine keeps updating
    the incident in ITSM automatically and marks it as cleared so that the incident
    can be closed. If the alert gets new events that are triggered, it keeps updating
    the incident in the ITSM module with new information that alerts the operations
    teams.


    There are scenarios where the events in the Observe console do not get autocleared
    if a problem is resolved. In those scenarios, there is a two-way integration where
    the ITSM system clears the alarm when an incident is closed so that the Event
    console reflects the accurate state of systems being monitored.'
