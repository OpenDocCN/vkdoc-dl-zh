  trans: '

    ### 原则四：监控


    监控或可观测性是获取系统和应用数据的关键。没有监控和可观测性，就无法衡量应用和业务流程的可用性、性能及响应时间。监控通过关注事件、指标、日志和链路追踪，提供可供分析的有意义数据，并用于采取主动或被动的措施，以实现更高的可用性。


    监控和可观测性工具为 AIOps 工具提供原始数据，后者可利用这些输入，应用算法和机器学习技术，对这些数据提供更深入、可操作的洞察。


    针对可靠性最常关注的指标是以下四个黄金信号：


    -   *延迟*：服务响应请求所需的时间

    -   *流量*：服务当前承受的负载量

    -   *错误率*：服务请求失败的频率

    -   *饱和度*：服务资源还能持续多久


    AIOps 工具会分析所有这些黄金信号，以提供预测，判断近期内是否有组件会发生故障。这能消除噪音，筛选出可操作的告警和支持数据，使团队能够专注于正确的告警，而无需浪费时间查找根本原因。高级统计技术用于创建因果图，以显示哪个组件故障导致了系统故障。模式匹配技术用于在日志文件中查找相关信息，然后提供给站点可靠性工程师进行更深入的分析。


    AIOps 工具通过在正确的时间向 SRE 团队提供正确的信息，使其无需翻阅多条记录就能得出根本原因的结论，从而极大地增强了 SRE 职能。AIOps 创建的仪表盘提供拓扑、告警和知识文章，以便
    SRE 能够与开发团队协作。


    使用 AIOps，SRE 和 DevOps 团队能够利用拓扑和发现数据可视化应用的整个架构。然后，这些数据会与从各个层和组件生成的事件叠加。这为整个应用全景提供了鸟瞰视图，使
    SRE 更容易在运维和架构转型决策中使用这些数据和可视化信息。


    AIOps 工具还通过从基础设施监控工具获取数据，并将其与应用监控工具的真实用户监控数据叠加，帮助 SRE 团队从基础设施角度理解应用。这有助于 SRE 团队缩小根本原因的范围，该原因可能位于用户终端层面，也可能在网络、基础设施或软件代码中。AIOps
    工具提供的可见性帮助 SRE 更快地找到根本原因。


    使用机器学习技术进行的根本原因分析有助于加快响应和解决时间，并帮助 SRE 团队维持高可用性水平和管理其 SLA。这带来了运维团队生产力的提升和更高的客户满意度评分。


    ### 原则五：自动化


    自动化意味着创建无需人工干预即可完成重复性任务的方法。这有助于解放团队，使其专注于更高价值的工作。


    此原则是消除琐事原则的延伸，旨在消除所有为团队带来重复性工作的事项。自动化有助于实现消除琐事的目标。


    SRE 致力于多种自动化手段。


    -   *事件响应*：SRE 响应已经或可能影响 SLO 的事件。这是 SRE 的一项重要职能。SRE 通过使用脚本和为简单场景创建自动化来自动化事件响应。他们还可以利用工具部署开箱即用的事件响应自动化方案。

    -   *部署*：SRE 团队也会自动化监控及其他应用的部署，具体取决于该职能在组织中的结构。

    -   *测试*：这是 SRE 工作的重要组成部分，SRE 使用基础设施和应用的自动化测试来发现弹性问题。SRE 使用各种方法和工具。

    -   *沟通*：这是任何运维工作的基本要素。SRE 使用 ChatOps 工具就问题、开发工作以及事件和其他行动进行协作和沟通，并利用 Slack 等工具进行实时沟通。


    AIOps 工具有助于自动化监控、根本原因或可能原因分析以及事件修复。AIOps 工具还提供嵌入式或集成的 ChatOps，以促进 SRE 成员和开发团队之间的实时沟通，双方可以访问共享的通用仪表盘和告警数据，从而更好地分析情况并采取适当的补救措施。


    ### 原则六：发布工程


    发布工程意味着以一致、稳定、可重复的方式构建和部署软件。前述 SRE 原则也应用于软件发布。


    作为发布工程一部分的一些活动如下：


    -   *配置管理*：定义基线配置，确保发布根据既定流程更改配置，并跟踪配置变更。它还涉及为系统定义“期望状态配置”，以确保不偏离批准的配置。

    -   *测试*：实施持续测试和自动化测试，确保发布满足需求和完成标准。

    -   *CI/CD 与快速部署*：在可能的情况下，利用持续集成、持续交付和持续部署的 DevOps 原则来自动化发布流程。这能够以自动化方式实现一致、可重复的发布，并通过为团队提供系统和流程来非常频繁地响应业务需求或修复错误，从而提高敏捷性。


    由于当前的 AIOps 工具更侧重于运维方面，它们在开发过程中被用于确保发布在开发过程中涵盖了必要的运维方面。


    AIOps 工具通过分析摄入到工具中的日志数据，帮助识别配置漂移以及未经批准的基础设施或应用变更。这些工具通过提供开发生命周期中应用和基础设施的可用性与性能洞察，促进持续测试和部署。当
    SRE 和 DevOps 团队使用持续部署并频繁部署到生产环境时，AIOps 工具通过提供部署前后的对比来支持快速部署。没有 AIOps，这些流程将是手动的且容易出错；AIOps
    帮助 SRE 专注于可用性、弹性和性能的核心方面，同时承担了提供正确数据的繁重工作。


    ### 原则七：简洁性


    简洁性意味着开发出最不复杂但仍能按预期运行的系统。简洁性和可靠性的目标相辅相成。一个更简单的系统更容易监控、修复和改进。


    ## AIOps 赋能 SRE 与 DevOps 的可视性


    SRE 倡导端到端的可靠性方法；构建模型是深入了解内部组件的好方法。SRE 倡导一种整体、端到端的可靠性方法。


    AIOps 工具通过确保从可观测性角度将所有内容集成并整合到一个仪表盘中，为架构带来了简洁性。AIOps 将所有监控工具连接起来，并将自动化方面整合其中。使用
    AIOps 简化了运维，并通过协作工具将开发团队和运维团队整合在一起。

    '
- fmt: '# Culture


    DevOps is the culture and mindset forging strong collaborative bonds between the
    software development and infrastructure operations teams. This culture is built
    upon the following pillars:


    - *Constant collaboration and communication*: `AIOps` provides the tools for DevOps
    and SRE teams to collaborate and communicate and provides `ChatOps` for real-time
    collaboration.

    - *Gradual changes*: `AIOps` gets well entrenched in the overall culture of DevOps
    and SRE, and the models evolve over time with the changes in applications, infrastructure,
    and data.

    - *Shared end-to-end responsibility*: `AIOps` tools enable shared end-to-end responsibility
    through better coordination across the development and operations lifecycle as
    well as promoting collaboration and communication.

    - *Early problem-solving*: `AIOps` provides for rapid resolution of incidents
    using automated root cause and analysis and intelligent run book automation execution.


    # Automation of Processes


    Automation of processes is the key goal of DevOps and SRE teams. Automating routine
    work and eliminating toil are achieved using `AIOps` tools, because the automated
    analysis of root cause, inputs to proactive problem management, and automated
    resolution of alerts free up the team’s time to take on higher-level activities.


    # Measurement of Key Performance Indicators (KPIs)


    Measuring various metrics of a system allows for understanding what works well
    and what can be improved. `AIOps` tools provide in-depth reporting and analytics
    and help in creating service level objectives, service level indicators, and SLAs.


    # Sharing


    `AIOps` tools enable sharing across the value stream by bringing the data from
    observability tools and providing insights to both development and operations
    teams. `AIOps` helps in knowledge sharing by providing knowledge management capabilities
    where teams can collaborate, create, and share content using the `AIOps` engine.
    `AIOps` enables the SRE teams to deliver faster and better and is a foundational
    technology on which SRE processes and teams are built.


    # Summary


    In this chapter, we covered the SRE model and how `AIOps` enables the SRE teams
    to deliver on their promise. We also covered how `AIOps` enables true collaboration
    between the development and operations teams. We looked at various features provided
    by `AIOps` tools and how they support and enable SRE and DevOps principles. In
    the next chapter, we will cover the fundamentals of AI, machine learning, and
    deep learning.


    # 5. Fundamentals of Machine Learning and AI


    You learned about `AIOps`, its architecture, and its components in previous chapters,
    and you will be venturing deeper into `AIOps` in the next few chapters. Before
    you start implementing algorithms for `AIOps`, though, you need to learn a few
    basic things about machine learning and artificial intelligence. This chapter
    will cover the fundamentals of artificial intelligence, machine learning, and
    deep learning. It will then go on to discuss specific techniques that are used
    in `AIOps`.


    ## What Is Artificial Intelligence and Machine Learning?


    Artificial intelligence, machine learning, and deep learning are terms that are
    often used interchangeably. This chapter will introduce each of these terms and
    detail the differences and overlaps between these technologies.


    Most of us have come across AI in some form or another. Today AI is being used
    in most of the applications that we use every day. From recommendations on shopping
    sites to finding the most relevant article through a search engine like Google,
    everything involves AI. We all use speech recognition technologies in the form
    of voice assistants such as Alexa, Siri, etc. All of these are powered by artificial
    intelligence. What started as science fiction has become part of our everyday
    life; artificial intelligence has come a long way in a short span of time.


    Let’s start with understanding artificial intelligence. The term *artificial intelligence*
    is used to define intelligence that is created by humans and programmed by humans.
    The AI systems mimic human intelligence and reasoning to make decisions and solve
    problems. Just like human intelligence resides in the human brain, AI resides
    in the form of algorithms, data, and models in a machine.


    AI has been used to beat humans in games like Chess and Go. AI is also solving
    problems and creating new use cases for various applications that were not possible
    before it became available. AI is now being used in diverse fields including military
    and surveillance applications, healthcare, and diagnostics. Even the legal and
    governance field is something that has not been left untouched by artificial intelligence.
    Thus, AI as a technology is finding applications in almost everything.


    Artificial intelligence as a term has gained traction since 1950s. It encompasses
    every type of technology that has an element of intelligence that is artificially
    created. Machine learning blossomed in the 1980s, and with more computing power
    being made available, deep learning gained traction starting in 2010. We will
    be explaining each of these in this chapter.


    AI has exploded over the last decade primarily because of newer hardware technologies
    like GPUs that have made processing faster and cheaper. More powerful processing
    systems are being made at lower costs, and this has resulted in making the AI
    algorithms and techniques feasible. Theoretically, the techniques have existed
    for a long period; however, the technology infrastructure to execute these models
    at scale did not exist.'
