- fmt: '# Rigid Processes


    There are organizations where the event management process and procedures are
    rigid and it is difficult to change them. The processes have been created based
    on the existing technologies at that time, which means they are not appropriate
    for probabilistic models and are hardwired for each type of event. Deploying AIOps
    needs process changes to accommodate for probabilistic decision-making rather
    than rule-based decision-making. At times organizations end up deploying AIOps
    tools but deploy rule-based logic rather than machine learning, thus reducing
    them to non-AI-based traditional event correlation systems.


    There are organizations that want to adopt AIOps but do not want to change the
    current processes that are set up based on technology that evolved a decade back
    and largely remained consistent. AIOps needs a mindset change where you may not
    be able to test the system granularly with all the data and define test cases
    that replicate all real-life scenarios or are 100 percent predictable. The AIOps
    system is not a stagnant rule-based system that will give the same result if the
    same data input is provided. The system is ever learning, and thus the models
    keep changing based on the data that the AIOps system is ingesting and the learning
    that humans are providing to the system.


    Expecting AIOps to work in the same fashion as traditional systems creates incorrect
    expectations from an AI system. AI-based systems work on data and probability,
    and thus the results may vary from organization to organization, from infrastructure
    to infrastructure, and from time to time based on the unique data that is generated
    in each organization.


    Fine-tuning of the system ensures that the confidence scores and accuracy of the
    AIOps system is maintained and improved on an ongoing basis.


    # Lack of Understanding of Machine Learning and AIOps


    A few organizations may not have expertise and experience in machine learning
    and AIOps, and they may struggle to understand and accept the benefits that this
    technology transformation can provide. In such situations, it is important to
    expose the stakeholders to the new technology through webinars, trainings, and
    proof of concepts to make them aware of the new methods and techniques.


    A lack of understanding of how AIOps works is one of the most important aspects
    to consider while moving ahead with an AIOps project.


    Typically, the monitoring and management teams are experts in their own domain
    and have worked on technologies that have serviced their needs for decades. The
    teams are generally comprised of subject-matter experts in the monitoring and
    observability domain as well as experts in various technology domains such as
    networks, cloud computing, storage, security, and data center; however, the teams
    may not have any expertise in AI and machine learning since this was not needed
    for them to run IT operations.


    Thus, there is a gap in capability and expertise that is needed to make the best
    use of AIOps systems. One does not need deep-level expertise in AI or machine
    learning to be able to use the AIOps system; however, they do need exposure and
    beginner-level skills in AI and machine learning to be able to understand what
    the AIOps system is trying to do and how to utilize it to its potential.


    We sincerely hope that this publication will bridge the gap and expose the monitoring
    and management subject-matter experts to enough AI and machine learning that is
    needed for them to successfully implement and run AIOps-based systems.


    # Expectations Mismatch


    There are times when there is an expectation mismatch and the AIOps tools vendor
    makes promises on value realization without understanding the bottlenecks of processes,
    systems, functions, and technology limitations in an enterprise. The tools may
    provide extensive capabilities, but without changing the processes and the functions,
    the realization of benefit may not happen. A typical case in point is collaborative
    ChatOps between the Dev and Ops teams. If an organization is siloed and does not
    have DevOps processes in place, deploying an AIOps feature for ChatOps and collaboration
    is not going to help bridge the gap. This needs to be handled elsewhere in the
    project, and the organization needs to embrace DevOps before the tool’s capabilities
    can be used effectively by the team.


    Expectations mismatch stems from some of the areas that we covered in earlier
    points. For example, a lack of understanding of AIOps and AI and machine learning
    in general will result in an expectations mismatch as the teams might be expecting
    AIOps to be a magic wand that will solve all their problems. Alternatively, the
    operations teams may want the AIOps systems to just replicate the features and
    functionality of their rule-based systems, which will again result in a mismatch
    in the capabilities of the tools versus the expectations.


    Another expectation that security and compliance teams may have from the new AIOps
    system getting deployed is to have 100 percent accuracy on the insights that the
    system is providing, and that is an incorrect expectation to have from a machine
    learning system that works on probabilities and not rules.


    It is important to have all stakeholders as part of the program so that the expectations
    from different stakeholders can be tuned and managed based on what AIOps is and
    what it delivers for IT operations in order to avoid understanding gaps of the
    AIOps domain, technology, or processes.


    # Fragmented Functions and the CMDB


    AIOps works best when the entire estate right from the business process to the
    application, infrastructure, and network provides the data to the AIOps platform.
    There are challenges if the monitoring systems and the teams for different technology
    domains are fragmented and they are unwilling to be onboarded to new integrated
    process and function. AIOps can easily handle the fragmentation in monitoring
    systems; however, different configuration management systems and a lack of configuration
    management database pose problems when correlating events.


    The AIOps systems will work best if the machine learning algorithms are provided
    with more and correct data. Getting accurate topology information vastly improves
    the accuracy of the AIOps systems to pinpoint problems and provide a root cause.
    Without this data, the system is running blind and trying to figure out the event
    correlation based on timestamp data as well as statistical techniques to correlate
    various events, which may not be as accurate.


    It is not necessary that a complete CMDB is provided to the system; however, getting
    topology information into the AIOps system provides for much better event correlation
    and root-cause analysis.


    If it is difficult to get topology or configuration information for the entire
    landscape, one can start with critical applications and infrastructure and slowly
    expand the coverage to the other areas.'
