    # Data Splitting


    Next split the data into training and test data to be used for the ARIMA model
    `(6,1,2)`. Out of 396 data points, let’s use the first 300 (~75 percent) data
    points for training and the rest of the data points for testing purposes and plot
    them on a time scale, as shown in Figure 7-23.


    ![Data split graph](images/524834_1_En_7_Chapter/524834_1_En_7_Fig23_HTML.jpg)


    A graph of test train data splits of CPU usage, where the vertical axis is marked
    as data points and the horizontal axis is marked as date underscore time. Two
    high-frequency waves of train data points and test data points start from 4 in
    January 2020 and November 2020 and end at points 70 in November 2020 and 50 in
    January 2021, respectively.


    **Figure 7-23** Time-series data split in test data and training data


    ```python

    # Plot train and test data

    train_data = cpu_util_raw_data[''cpu_utilization''][:300]

    test_data = cpu_util_raw_data[''cpu_utilization''][300:]

    fig, ax = plt.subplots(figsize=(10,5), dpi=100)

    ax.plot(train_data, label=''Train Data Points'')

    ax.plot(test_data, label=''Test Data Points'')

    ax.set_title(''CPU Usage Timeline'')

    ax.legend(loc=''upper left'', fontsize=10)

    plt.legend(loc=''upper left'', fontsize=10)

    plt.suptitle(''Test-Train Data Splits'', fontsize=16)

    plt.show()

    ```


    # ARIMA Model Creation


    Let’s create the ARIMA `(6,1,2)` model using the train data.


    ```python

    manual_arima_model = ARIMA(train_data, order=(6,1,2))

    manual_arima_model_fit = manual_arima_model.fit()

    print(manual_arima_model_fit.summary())

    ```


    Figure 7-24 shows the output from the ARIMA model on the train data.


    ![ARIMA model output](images/524834_1_En_7_Chapter/524834_1_En_7_Fig24_HTML.png)


    A report of SARIMAX results has several outputs with headers, depanneur variable,
    model, date, time, sample, covariance type, number of observations, log-likelihood,
    AIC, BIC, and HQIC in the top. A table is in the middle and in the bottom, there
    are more outputs with headers, Ljung box, prob, heteroskedasticity, prob, and
    Jaraque-Bera.


    **Figure 7-24** ARIMA model output result on training data


    # Model Accuracy Check


    Before applying this model on the test data, the ARIMA model needs to be checked
    for accuracy with the chosen combination of component values `p,d,q`. There are
    two key statistical measures to compare the relative quality of the different
    models.


    - **Akaike information criteria (AIC)**: This validates the model in terms of
    goodness of fit of the data by checking how much it relies on the tuning parameters.
    The lower the value of AIC, the better the model performance. The current ARIMA
    `(6,1,2)` model has an AIC value of 2113.


    - **Bayesian information criteria (BIC)**: In addition to AIC, the BIC uses the
    number of samples in the training dataset that are used for fitting. Here also
    a model with a lower BIC is preferred. The current ARIMA `(6,1,2)` model has a
    BIC value of 2150.


    Based on PACF and ACF charts, multiple values can be tried to lower the AIC and
    BIC values. For now let’s proceed with ARIMA `(6,1,2)`.


    # Prediction on Training Data


    Let’s plot the actual values in a training dataset with the model’s predicted
    value to analyze how close the actual and model predicted values are.


    ```python

    prediction_manual=manual_arima_model_fit.predict(dynamic=False,typ=''levels'')

    plt.figure(figsize=(15,5), dpi=100)

    fig, ax = plt.subplots(figsize=(10,5), dpi=100)

    ax.plot(prediction_manual, label=''Prediction'')

    ax.plot(train_data, label=''Training Data'')

    ax.legend(loc=''upper left'', fontsize=10)

    plt.legend(loc=''upper left'', fontsize=10)

    plt.suptitle(''Actual V\S Predicted CPU Utilization on Train Data'', fontsize=16)

    plt.show()

    ```


    As observed in Figure 7-25, the model predictions are quite close to actual values,
    indicating that it gets trained quite well.


    ![Prediction analysis on training data](images/524834_1_En_7_Chapter/524834_1_En_7_Fig25_HTML.jpg)


    A graph of actual versus predicted CPU utilization on train data, where the vertical
    axis denotes data points, and the horizontal axis denotes date underscore time.
    Two high-frequency waves of prediction and training data are graphed. Both waves
    start at point 70 in January 2020 and end at point 60 in January 2021.


    **Figure 7-25** Prediction analysis on training data


    # Validation on Test Data


    Now let’s validate the model performance on the test data.


    ```python

    # Forecast with 95% confidence interval

    forecast = manual_arima_model_fit.get_forecast(97)

    manual_arima_fc = forecast.predicted_mean

    manual_arima_conf = forecast.conf_int(alpha=0.05)

    manual_arima_fc_series = pd.Series(manual_arima_fc, index=test_data.index)

    manual_arima_lower_series = pd.Series(manual_arima_conf["lower cpu_utilization"],

    index=manual_arima_conf.index)

    manual_arima_upper_series = pd.Series(manual_arima_conf["upper cpu_utilization"],

    index=manual_arima_conf.index)

    plt.figure(figsize=(15,10), dpi=100)

    plt.plot(train_data, label=''Training Data'')

    plt.plot(test_data, label=''Actual Data'')

    plt.plot(manual_arima_fc_series, label=''Forecast Data'')

    plt.fill_between(manual_arima_lower_series.index, manual_arima_lower_series,

    manual_arima_upper_series, color=''gray'', alpha=.15)

    plt.title(''Forecast vs Actuals'')

    plt.legend(loc=''upper left'', fontsize=8)

    plt.show()

    ```


    Figure 7-26 shows that the ARIMA `(6,1,2)` model performance on the test dataset
    is not good and its predictions are deteriorating over time.


    ![Prediction analysis on test data](images/524834_1_En_7_Chapter/524834_1_En_7_Fig26_HTML.jpg)


    A graph of prediction analysis, data points versus date underscore time. Three
    high-frequency waves of training data, actual data, and forecast data start from
    70 in January 2020, 55 in November 2020 and 70 in November 2020 and end at points
    70 in November 2020, 55 in January 2021, and 55 in January 2021, respectively.


    **Figure 7-26** Prediction analysis on test data


    # Performance Metrics


    Let’s quantify the model performance with the metrics defined earlier.


    ```python

    def forecast_accuracy(forecast, actual):

    mape = np.mean(np.abs(forecast - actual)/np.abs(actual)*100)

    mae = np.mean(np.abs(forecast - actual))

    rmse = np.mean((forecast - actual)**2)**.5

    rmsle = np.sqrt(mean_squared_log_error(actual, forecast))

    return({''MAPE : '':mape, ''MAE : '': mae,

    ''RMSE : '':rmse, ''RMSLE : '':rmsle

    })

    forecast_accuracy(manual_arima_fc, test_data)

    ```


