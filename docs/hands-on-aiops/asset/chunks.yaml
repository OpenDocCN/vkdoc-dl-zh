  trans: '

    # 僵化的流程


    有些组织的事件管理流程和规程僵化且难以改变。这些流程是基于当时现有技术创建的，这意味着它们不适用于概率模型，并且是为每种事件类型硬性设定的。部署 AIOps
    需要改变流程，以适应基于概率的决策，而非基于规则的决策。有时，组织最终部署了 AIOps 工具，却仍采用基于规则的逻辑而非机器学习，从而将其降级为非 AI
    的传统事件关联系统。


    有些组织希望采用 AIOps，但不愿改变当前基于十年前技术建立且基本保持不变的流程。AIOps 需要思维模式的转变——你可能无法用所有数据对系统进行细粒度测试，也无法定义能复现所有真实场景或
    100% 可预测的测试用例。AIOps 系统并非一个静态的基于规则的系统，不会在输入相同数据时给出相同结果。该系统会持续学习，因此模型会根据 AIOps 系统摄入的数据以及人类向系统提供的学习内容不断变化。


    期望 AIOps 以与传统系统相同的方式工作，会让人对 AI 系统产生错误的预期。基于 AI 的系统依赖于数据和概率，因此结果可能因组织而异、因基础设施而异，并且会随着每个组织产生的独特数据而随时间变化。


    对系统进行微调可确保持续维持并提升 AIOps 系统的置信度分数和准确性。


    # 对机器学习与 AIOps 缺乏理解


    部分组织可能缺乏机器学习和 AIOps 方面的专业知识和经验，因而难以理解并接受这项技术转型所能带来的益处。在这种情况下，有必要通过网络研讨会、培训以及概念验证等方式，让利益相关者接触新技术，使其了解新的方法和技术。


    在推进 AIOps 项目时，对 AIOps 工作原理缺乏理解是需要考虑的最重要方面之一。


    通常，监控和管理团队是其自身领域的专家，并且长期使用满足其需求的技术。这些团队通常由监控与可观测性领域的主题专家，以及网络、云计算、存储、安全、数据中心等不同技术领域的专家组成；然而，这些团队可能不具备
    AI 和机器学习方面的专业知识，因为此前运行 IT 运维并不需要这些。


    因此，在充分利用 AIOps 系统所需的能力和专业知识方面存在差距。使用 AIOps 系统并不需要具备 AI 或机器学习的深厚专业知识；但确实需要接触并掌握
    AI 和机器学习的入门级技能，以便理解 AIOps 系统试图做什么，以及如何充分发挥其潜力。


    我们真诚希望本出版物能够弥合这一差距，让监控和管理领域的主题专家接触到足够多的 AI 和机器学习知识，使其能够成功实施并运行基于 AIOps 的系统。


    # 期望错位


    有时会出现期望错位的情况：AIOps 工具供应商在未了解企业流程、系统、功能和技术限制的瓶颈时，就承诺价值实现。这些工具可能提供强大的功能，但若不改变流程和职能，就无法实现收益。一个典型的例子是开发团队与运维团队之间的协作式
    ChatOps。如果组织处于孤岛状态，且未建立 DevOps 流程，那么部署用于 ChatOps 和协作的 AIOps 功能将无助于弥合差距。这需要在项目的其他环节处理，并且组织需要先拥抱
    DevOps，团队才能有效利用工具的功能。


    期望错位源于我们之前提到的某些方面。例如，对 AIOps 以及 AI 和机器学习普遍缺乏理解，会导致期望错位，因为团队可能期望 AIOps 成为能解决所有问题的魔法棒。或者，运维团队可能希望
    AIOps 系统仅仅复制其基于规则的系统的特性和功能，这同样会导致工具能力与期望之间的错位。


    安全与合规团队对即将部署的新 AIOps 系统可能还有另一个期望：系统提供的洞察要 100% 准确。对于一个基于概率而非规则运行的机器学习系统来说，这是一个错误的期望。


    让所有利益相关者都参与到项目中来至关重要，这样可以根据 AIOps 是什么以及它为 IT 运维带来了什么，来调整和管理不同利益相关者的期望，从而避免对 AIOps
    领域、技术或流程的理解出现偏差。


    # 碎片化的功能与 CMDB


    当从业务流程到应用、基础设施和网络的整个资产体系都能向 AIOps 平台提供数据时，AIOps 才能发挥最佳效果。如果不同技术领域的监控系统和团队各自为政，且不愿加入新的集成流程和职能，就会带来挑战。AIOps
    可以轻松处理监控系统的碎片化问题；然而，不同的配置管理系统以及配置管理数据库的缺失，会在事件关联时引发问题。


    如果能为机器学习算法提供更多且正确的数据，AIOps 系统将发挥最佳效果。获取准确的拓扑信息能极大提升 AIOps 系统精确定位问题并提供根因分析的能力。没有这些数据，系统就如同盲人摸象，只能基于时间戳数据和统计技术来尝试关联各种事件，这可能导致准确性不足。


    系统并不一定需要完整的 CMDB；但将拓扑信息纳入 AIOps 系统，能显著改善事件关联和根因分析。


    如果难以获取整个环境的拓扑或配置信息，可以从关键应用和基础设施入手，然后逐步将覆盖范围扩展到其他领域。

    '
- fmt: '# Challenges in Machine Learning


    `AIOps` uses a combination of rule-based, machine learning–based, and topology-based
    systems, and the data from different monitoring and management systems as well
    as their configuration is fairly unique in each environment. This poses a challenge
    for the machine learning models as the models need to understand different events
    and provide automated analytics alerts. Fine-tuning the model based on each unique
    environment may become a tedious process.


    Machine learning works best when accurate and complete data is provided, and that
    may become a challenge if monitoring systems are not correctly configured or events
    and logs are providing data that is incomplete or incorrect.


    Other areas of concern in machine learning are around explainability where it
    is difficult to pinpoint why a decision was made by the machine learning system.
    Newer `AIOps` systems have explainability aspects built in so that one can do
    a deep dive and find out why the `AIOps` system recommended a particular root
    cause or flagged a particular anomaly.


    Machine learning systems are also prone to data drift, and changes to the monitoring
    systems or landscape will have an impact on the `AIOps` system; therefore, having
    topology information helps to overcome these aspects.


    # Data Drift


    All machine learning models have the challenge of data drift. This becomes more
    pronounced if the organization adopting `AIOps` is simultaneously working on multiple
    transformational projects like cloud migration. Since the monitoring tools and
    data from systems is changing drastically, the data will drift, and the model’s
    accuracy based on historical data that is available will reduce. The data drift
    in `AIOps` needs to be carefully handled through processes and analysis to ensure
    that the models are accurate with current data.


    As the data drifts drastically because of transformation projects, the events,
    symptoms, and metrics will change. This will mean that the data prior to the transformation
    is invalid and cannot be clubbed with the new data to generate anomalies, dynamic
    baselines, or prediction on capacity.


    One has to be careful to make changes to the data sources or change the data itself
    as this will make the current deployed models obsolete.


    Experts running the `AIOps` systems should have a basic idea about the data and
    how it impacts machine learning models. We hope that by going through this hands-on
    guide and implementing some of the hands-on exercises one would be able to better
    grasp the relationship between changes in data and the generated models and use
    this knowledge to ensure that the `AIOps` systems are utilized effectively.


    # Predictive Analytics Challenges


    Predictive analytics is a challenging field for any machine learning or deep learning
    system; it can never be 100 percent accurate. Knowing exactly when a system will
    fail is unrealistic since failures have an element of chance and thus are impossible
    to predict with the expected accuracy.


    As mentioned earlier, `AIOps` systems use predictive analytics, and the systems
    work on probabilities and may generate false positives where incorrect events
    are flagged as probable root cause or false negatives and real impacting events
    are flagged as noncritical.


    This is similar to the way that these algorithms work in other areas, for example,
    when a genuine credit card transaction is declined and flagged as fraudulent or
    fraudulent transactions pass through the analytics engine and are approved.


    Other challenges in predictive analytics are around the seasonality of the data
    that modern machine learning technologies cover; however, long-term seasonality
    data may not be available, and thus the system will not be able to learn seasonality
    until it has gathered enough data to do so. For example, to be able to generate
    seasonality-based predictions for annual seasonality, you would need data for
    multiple years.


    # Cost Savings Expectations


    Customers often have expectations around cost savings; however, just by deploying
    event management `AIOps` there will be limited cost savings. There may be significant
    impact on the user experience and customer satisfaction, but without automation,
    the cost impact may not be as per the customer’s expectations. Thus, tools like
    `iAutomate` that provide automation capabilities are deployed alongside the event
    correlation platforms to gain significant cost savings by automating the entire
    value stream from alert detection to remediation of the problem.


    By leveraging `AIOps`, organizations will reach a higher level of maturity in
    operations, there will be less noise in the system, and resources will be able
    to handle a higher volume and improve on the `SLAs` that are committed to business.


    One will see a lower mean time to respond and mean time to resolution by deploying
    these technologies.


    There will be higher availability of systems and a higher level of customer satisfaction
    from both business users and end users.


    All these are measurable and tangible benefits that `AIOps` brings to the table.
    However, to be able to reduce cost, there are other factors at play. As an example,
    the organization may be understaffed or has already applied all cost levers and
    has a bare minimum team staffed to work as per the service levels committed. In
    these scenarios, there may not be cost reduction.


    The `AIOps` systems also need to be paid for and maintained on an ongoing basis.
    This will result in additional costs that an organization will incur to move up
    the maturity level and provide better services to their customers. Any resource
    savings that may accrue because of leveraging these systems need to be first adjusted
    against the investment and operations expenses that are needed to set these systems
    up and manage them on an ongoing basis.


    Thus, organizations should create a business plan and look at all costs and savings
    before setting expectations on costs and savings.


    # Lack of Domain Inputs


    `AIOps` needs domain inputs from technology experts who are operating a particular
    environment. This can be in terms of providing feedback on the output of the `AIOps`
    platform or documentation and knowledge repository. A lack of buy-in from the
    technical experts results in no supervised training for the `AIOps` engine, which
    then means that the `AIOps` engine falls back on unsupervised learning to provide
    results. Without the feedback loop from domain experts, the continuous learning
    of the machine learning models does not happen, and subsequently the accuracy
    of the system does not reach its potential.


    There are various challenges in getting domain experts on board on this transformation
    journey. It could be a plain simple lack of understanding of how `AIOps` systems
    operate or a preference to work in the current mode of operations and continue
    with the processes that people are used to from decades ago.


    Organizational change management and `AIOps` process setup phases should have
    a buy-in from all domain experts so that everyone contributes to the project and
    is able to visualize common successes.


    Identifying stakeholders early on, setting up `KPIs` for collaboration, and incentivizing
    the team for the success of the project are a few things that organizations can
    do to have a successful `AIOps` project.


    # Summary


    In this chapter, we covered the challenges that organizations face while deploying
    `AIOps` and how they need to be mitigated. It is essential for any organization
    implementing `AIOps` to understand the challenges beforehand and plan for their
    mitigation to successfully implement an `AIOps` project. In the next chapter,
    you will see how `AIOps` enables `SREs` and `DevOps` teams to work efficiently
    and how `AIOps` aligns to the `SRE` and `DevOps` principles.'
