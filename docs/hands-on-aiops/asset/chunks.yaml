- fmt: '### ACF and PACF


    Both `ACF` and `PACF` are statistical methods used by researchers to understand
    the temporal dynamics of an individual time series, which basically means detecting
    correlation over time, often called *autocorrelation*. A detailed discussion on
    `ACF` and `PACF` is beyond scope of this book, so we will be limiting the discussion
    to the basics of `ACF` and `PACF` to understand how to use them in the AIOps model
    development.


    `ACF` is a statistical term that represents the autocorrelation function and is
    used to measure the correlation of time-series values `Y[t]` with its own lags
    `Y[t-1]`, `Y[t-2]`, `Y[t-3]`, etc. This correlation of various lags can be visualized
    using an `ACF` plot on a scale of 1 to -1, where 1 represents a perfect positive
    relationship and -1 represents a perfect negative relationship.


    As shown in Figure [7-13](#524834_1_En_7_Chapter.xhtml#Fig13), the y-axis represents
    the correlation value, and the x-axis represents the lags. The first value of
    the series will always be 100 percent correlated with itself, and that’s why in
    the `ACF` plot the Lag 0 correlation value is going until 1. The `ACF` plot is
    useful in detecting the pattern in the correlated data.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig13_HTML.jpg)


    An `ACF` plot where the y-axis represents the correlation value and the x-axis
    represents the lags from 0 to 7. The dashed lines on either side of the x-axis
    indicate significance. The first value of the series starts from 1 and decreases
    gradually with values 8, 7, 5, negative 4, negative 5, negative 7, and negative
    8, approximately.


    **Figure 7-13** Sample `ACF` plot


    There is a red line shown on both sides in the `ACF` plot called the significance
    line, which is creating a range or band referred to as the *error band*. The lags
    that cross this line have a statistically significant relationship with variable
    `Y`. In a sample `ACF` plot, three lags are crossing this line, so up to Lag 3,
    there is a statistically significant relationship, and anything within this band
    is not statistically significant.


    `PACF` is another statistical term that represents the partial autocorrelation
    function, which is similar to an `ACF` plot except that it considers the strength
    of the relationship between the variable and lag at a specific time after removing
    the effects of all intermediate lags.


    For example, in the sample `ACF` plot in Figure [7-14](#524834_1_En_7_Chapter.xhtml#Fig14),
    it is visible that there is a significant correlation up to three lags, but the
    `PACF` plot tells how much the strength of correlation of `Y[t-3]` alone with
    `Y[t]` is after removing any impact of `Y[t-1]` and `Y[t-2]`. `PACF` can be considered
    as more of a filtered value of `ACF`.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig14_HTML.jpg)


    The `PACF` plot where the y-axis represents the correlation value and the x-axis
    represents the lags from 0 to 7. The dashed lines on either side of the x-axis
    indicate significance. The first value of the series starts from 1 and decreases
    gradually with values 6, 3, 2, negative 2, negative 2, negative 4.5, and negative
    8, approximately.


    **Figure 7-14** Sample `PACF` plot


    Now we are all set to implement two most commonly used time-series models, `ARIMA`
    and `SARIMA`, for noise reduction by predicting the appropriate monitoring threshold
    of parameters. This is one of the most common use cases in an AIOps implementation.


    ### ARIMA


    `ARIMA` is one of the foundational time-series forecasting techniques; it is popular
    and has been extensively used for quite a while now. This concept was first introduced
    by George Box and Gwilym Jenkins in 1976 in a book titled *Time Series Analysis:
    Forecasting and Control*. They defined a systematic method called the Box: Jenkins
    Analysis to identify, fit, and use an autoregressive (AR) technique integrated
    (I) with a moving average (MA) technique resulting in an `ARIMA` time-series model.


    `ARIMA` leverages the pattern and information contained in a time series to predict
    its future values. So, is it possible that `ARIMA` can forecast with any time
    series? How about predicting the price of your favorite stocks using `ARIMA` considering
    its historical prices? Technically, forecasting can be done, but it might not
    be accurate at all. For example, the price of a stock is controlled by multiple
    external factors such as the company’s quarterly results, government regulations,
    weather conditions, competitors price, etc. Without considering all such factors,
    `ARIMA` cannot provide meaningful predictions. It is important to note that `ARIMA`
    should be used only for those time series that exhibit the following properties:


    - It should be stationary, or nonseasonal.

    - Past values should have a sufficient pattern (not just a random white noise)
    and information to predict its future values.

    - It should be of medium to long length with at least 50 observations.


    ### Model Development


    The `ARIMA` model has three components.


    #### Differencing (d)


    As discussed earlier, the `ARIMA` model needs the series to be stationary, but
    then the challenges are as follows:


    - How to attain stationarity in a series

    - How to validate if the series becomes stationary or not


    There are two approaches to change nonstationary series into stationary.


    - Perform an appropriate transformation such as a log transformation or square
    root transformation to change a nonstationary series into a stationary series
    that is relatively complex.

    - A more reliable and widely used approach is to perform differencing on a series
    to convert it into stationary. In this approach, the difference between consecutive
    values in a series gets calculated, and then the resultant series is validated
    whether or not it is stationary.


    One of the most used statistical tests to determine whether a time series is stationary
    or not is the augmented Dickey Fuller test (`ADF` test), which is one type of
    unit root test that determines how strongly a time series is defined by a trend.
    In simple terms, the `ADF` test validates a null hypothesis (`H0`), which claims
    that a time series has some time-dependent structure and hence it is nonstationary.
    If this null hypothesis gets rejected, then it means that time series is stationary.
    The `ADF` test calculates the p-value, and if it’s less than 0.05 (5 percent),
    then the null hypothesis gets rejected. Interested readers can explore more about
    internal functioning and mathematics behind unit root tests and `ADF` tests online.


    We need to continue performing differencing and validating the results via an
    `ADF` test until we get a near-stationary series with a defined mean. The number
    of time differencing performed to make time series stationary is represented by
    model variable `d`.


    It is important to note that series should not get over-differenced in which case
    we get a stationary series, but the model parameters get affected, and the prediction’s
    accuracy gets impacted. One way to check for over-differencing is that Lag 1 of
    autocorrelation should not get too negative.'
  raw: '### ACF and PACF


    Both ACF and PACF are statistical methods used by researchers to understand the
    temporal dynamics of an individual time series, which basically means detecting
    correlation over time, often called *autocorrelation*. A detailed discussion on
    ACF and PACF is beyond scope of this book, so we will be limiting the discussion
    to the basics of ACF and PACF to understand how to use them in the AIOps model
    development.


    ACF is a statistical term that represents the autocorrelation function and is
    used to measure the correlation of time-series values Y[t] with its own lags Y[t-1],
    Y[t-2], Y[t-3], etc. This correlation of various lags can be visualized using
    an ACF plot on a scale of 1 to -1, where 1 represents a perfect positive relationship
    and -1 represents a perfect negative relationship.


    As shown in Figure [7-13](#524834_1_En_7_Chapter.xhtml#Fig13), the y-axis represents
    the correlation value, and the x-axis represents the lags. The first value of
    the series will always be 100 percent correlated with itself, and that’s why in
    the ACF plot the Lag 0 correlation value is going until 1\. The ACF plot is useful
    in detecting the pattern in the correlated data.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig13_HTML.jpg)


    An A C F plot where the y-axis represents the correlation value and the x-axis
    represents the lags from 0 to 7\. The dashed lines on either side of the x-axis
    indicate significance. The first value of the series starts from 1 and decreases
    gradually with vales 8, 7, 5, negative 4, negative 5, negative 7, and negative
    8, approximately.


    Figure 7-13


    Sample ACF plot


    There is a red line shown on both sides in the ACF plot called the significance
    line, which is creating a range or band referred to as the *error band*. The lags
    that cross this line have a statistically significant relationship with variable
    Y. In a sample ACF plot, three lags are crossing this line, so up to Lag 3, there
    is a statistically significant relationship, and anything within this band is
    not statistically significant.


    PACF is another statistical term that represents the partial autocorrelation function,
    which is similar to an ACF plot except that it considers the strength of the relationship
    between the variable and lag at a specific time after removing the effects of
    all intermediate lags.


    For example, in the sample ACF plot in Figure [7-14](#524834_1_En_7_Chapter.xhtml#Fig14),
    it is visible that there is a significant correlation up to three lags, but the
    PACF plot tells how much the strength of correlation of Y[t-3] alone with Y[t,]
    is after removing any impact of Y[t-1] and Y[t-2]. PACF can be considered as more
    of a filtered value of ACF.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig14_HTML.jpg)


    The P A C F plot where the y-axis represents the correlation value and the x-axis
    represents the lags from 0 to 7\. The dashed lines on either side of the x-axis
    indicate significance. The first value of the series starts from 1 and decreases
    gradually with vales 6, 3, 2, negative 2, negative 2, negative 4.5, and negative
    8, approximately.


    Figure 7-14


    Sample PACF plot


    Now we are all set to implement two most commonly used time-series models, ARIMA
    and SARIMA, for noise reduction by predicting the appropriate monitoring threshold
    of parameters. This is one of the most common use cases in an AIOps implementation.


    ### ARIMA


    ARIMA is one of the foundational time-series forecasting techniques; it is popular
    and has been extensively used for quite a while now. This concept was first introduced
    by George Box and Gwilym Jenkins in 1976 in a book titled *Time Series Analysis:
    Forecasting and Control*. They defined a systematic method called the Box: Jenkins
    Analysis to identify, fit, and use an autoregressive (AR) technique integrated
    (I) with a moving average (MA) technique resulting in an ARIMA time-series model.


    ARIMA leverages the pattern and information contained in a time series to predict
    its future values. So, is it possible that ARIMA can forecast with any time series?
    How about predicting the price of your favorite stocks using ARIMA considering
    its historical prices? Technically, forecasting can be done, but it might not
    be accurate at all. For example, the price of a stock is controlled by multiple
    external factors such as the company’s quarterly results, government regulations,
    weather conditions, competitors price, etc. Without considering all such factors,
    ARIMA cannot provide meaningful predictions. It is important to note that ARIMA
    should be used only for those time series that exhibit the following properties:


    *   It should be stationary, or nonseasonal.


    *   Past values should have a sufficient pattern (not just a random white noise)
    and information to predict its future values.


    *   It should be of medium to long length with at least 50 observations.


    ### Model Development


    The ARIMA model has three components.


    #### Differencing (d)


    As discussed earlier, the ARIMA model needs the series to be stationary, but then
    the challenges are as follows:


    *   How to attain stationarity in a series


    *   How to validate if the series becomes stationary or not


    There are two approaches to change nonstationary series into stationary.


    *   Perform an appropriate transformation such as a log transformation or square
    root transformation to change a nonstationary series into a stationary series
    that is relatively complex.


    *   A more reliable and widely used approach is to perform differencing on a series
    to convert it into stationary. In this approach, the difference between consecutive
    values in a series gets calculated, and then the resultant series is validated
    whether or not it is stationary.


    One of the most used statistical tests to determine whether a time series is stationary
    or not is the augmented Dickey Fuller test (ADF test), which is one type of unit
    root test that determines how strongly a time series is defined by a trend. In
    simple terms, the ADF test validates a null hypothesis (H0), which claims that
    a time series has some time-dependent structure and hence it is nonstationary.
    If this null hypothesis gets rejected, then it means that time series is stationary.
    The ADF test calculates the p-value, and if it’s less than 0.05 (5 percent), then
    the null hypothesis gets rejected. Interested readers can explore more about internal
    functioning and mathematics behind unit root tests and ADF tests online.


    We need to continue performing differencing and validating the results via an
    ADF test until we get a near-stationary series with a defined mean. The number
    of time differencing performed to make time series stationary is represented by
    model variable d.


    It is important to note that series should not get over-differenced in which case
    we get a stationary series, but the model parameters get affected, and the prediction’s
    accuracy gets impacted. One way to check for over-differencing is that Lag 1 of
    autocorrelation should not get too negative.'
  trans: '

    ### ACF 与 PACF


    `ACF` 和 `PACF` 都是研究人员用来理解单个时间序列时间动态的统计方法，这基本上意味着检测随时间变化的关联性，通常称为*自相关*。对 `ACF`
    和 `PACF` 的详细讨论超出了本书的范围，因此我们将把讨论限制在 `ACF` 和 `PACF` 的基础知识上，以了解如何在 AIOps 模型开发中使用它们。


    `ACF` 是一个统计术语，代表自相关函数，用于衡量时间序列值 `Y[t]` 与其自身滞后值 `Y[t-1]`、`Y[t-2]`、`Y[t-3]` 等的相关性。这种不同滞后的相关性可以使用
    `ACF` 图在 1 到 -1 的尺度上进行可视化，其中 1 表示完全正相关，-1 表示完全负相关。


    如图 7-13 所示，y 轴代表相关值，x 轴代表滞后阶数。序列的第一个值总是与自身 100% 相关，这就是为什么在 `ACF` 图中，Lag 0 的相关值达到
    1。`ACF` 图有助于检测相关数据中的模式。


    ![](img/524834_1_En_7_Fig13_HTML.jpg)


    一个 `ACF` 图，其中 y 轴代表相关值，x 轴代表从 0 到 7 的滞后阶数。x 轴两侧的虚线表示显著性。序列的第一个值从 1 开始，然后逐渐减小，数值大约为
    8、7、5、-4、-5、-7 和 -8。


    **图 7-13** 示例 `ACF` 图


    在 `ACF` 图中，两侧各有一条红线，称为显著性线，它创建了一个范围或带，称为*误差带*。跨越这条线的滞后阶数与变量 `Y` 具有统计上显著的关系。在示例
    `ACF` 图中，有三个滞后阶数跨越了这条线，因此直到 Lag 3，都存在统计上显著的关系，而该带内的任何值都不具有统计显著性。


    `PACF` 是另一个统计术语，代表偏自相关函数，它与 `ACF` 图类似，不同之处在于它考虑了在消除所有中间滞后效应后，特定时间点上变量与滞后值之间关系的强度。


    例如，在图 7-14 的示例 `ACF` 图中，可以看到直到三个滞后阶数都存在显著相关性，但 `PACF` 图则说明了在消除 `Y[t-1]` 和 `Y[t-2]`
    的任何影响后，`Y[t-3]` 单独与 `Y[t]` 的相关性强度。`PACF` 可以被视为 `ACF` 的一种过滤值。


    ![](img/524834_1_En_7_Fig14_HTML.jpg)


    `PACF` 图，其中 y 轴代表相关值，x 轴代表从 0 到 7 的滞后阶数。x 轴两侧的虚线表示显著性。序列的第一个值从 1 开始，然后逐渐减小，数值大约为
    6、3、2、-2、-2、-4.5 和 -8。


    **图 7-14** 示例 `PACF` 图


    现在，我们已经准备好实现两种最常用的时间序列模型 `ARIMA` 和 `SARIMA`，通过预测参数的适当监控阈值来进行降噪。这是 AIOps 实现中最常见的用例之一。


    ### ARIMA


    `ARIMA` 是基础性的时间序列预测技术之一；它很流行，并且已被广泛使用了相当长一段时间。这个概念最早由 George Box 和 Gwilym Jenkins
    在 1976 年出版的《时间序列分析：预测与控制》一书中提出。他们定义了一种称为 Box-Jenkins 分析的系统方法，用于识别、拟合和使用自回归（AR）技术与移动平均（MA）技术相结合的集成（I）方法，从而形成
    `ARIMA` 时间序列模型。


    `ARIMA` 利用时间序列中包含的模式和信息来预测其未来值。那么，`ARIMA` 是否可能对任何时间序列进行预测呢？例如，使用 `ARIMA` 根据其历史价格预测您最喜爱的股票价格如何？从技术上讲，可以进行预测，但可能根本不准确。例如，股票价格受多种外部因素控制，如公司的季度业绩、政府法规、天气状况、竞争对手的价格等。如果不考虑所有这些因素，`ARIMA`
    无法提供有意义的预测。重要的是要注意，`ARIMA` 应仅用于表现出以下属性的时间序列：


    - 它应该是平稳的，或非季节性的。

    - 过去的值应具有足够的模式（不仅仅是随机白噪声）和信息来预测其未来值。

    - 它应该具有中等到较长的长度，至少包含 50 个观测值。


    ### 模型开发


    `ARIMA` 模型包含三个组成部分。


    #### 差分（d）


    如前所述，`ARIMA` 模型需要序列是平稳的，但面临的挑战如下：


    - 如何使序列达到平稳性

    - 如何验证序列是否变得平稳


    有两种方法可以将非平稳序列变为平稳序列。


    - 执行适当的变换，例如对数变换或平方根变换，将非平稳序列变为平稳序列，这种方法相对复杂。

    - 一种更可靠且广泛使用的方法是对序列进行差分以使其变为平稳。在这种方法中，计算序列中连续值之间的差值，然后验证结果序列是否平稳。


    用于确定时间序列是否平稳的最常用统计检验之一是增广迪基-富勒检验（`ADF` 检验），它是一种单位根检验，用于确定时间序列受趋势影响的强度。简单来说，`ADF`
    检验验证一个原假设（`H0`），该假设声称时间序列具有某种时间依赖结构，因此是非平稳的。如果这个原假设被拒绝，则意味着时间序列是平稳的。`ADF` 检验计算
    p 值，如果 p 值小于 0.05（5%），则原假设被拒绝。感兴趣的读者可以在线探索单位根检验和 `ADF` 检验的内部工作原理和数学原理。


    我们需要持续进行差分，并通过 `ADF` 检验验证结果，直到我们得到一个具有定义均值的近似平稳序列。为使时间序列平稳而执行的差分次数由模型变量 `d` 表示。


    需要注意的是，序列不应被过度差分，否则虽然我们得到了一个平稳序列，但模型参数会受到影响，预测的准确性也会受到影响。检查过度差分的一种方法是，自相关的 Lag
    1 不应变得过于负值。

