- fmt: '# Automated Baselining Overview


    In traditional monitoring tools, a baseline is static and rule-based and is set
    at predetermined levels. An example of a baseline could be CPU utilization, which
    is set at, say, 95 percent. An event gets triggered when the CPU utilization of
    a server goes above this threshold. Now the challenge with this approach is that
    baselines or thresholds cannot be static. Consider a scenario where an application
    runs a CPU-intensive data processing job at 2 a.m. local time and causes 99 percent
    CPU utilization until the job ends, say, at 2:30 a.m. This is the usual behavior
    of the application, but because of the static baseline threshold, an event gets
    generated. But this alarm doesn’t need any intervention as it will automatically
    close once the job get completed and the CPU utilization returns to normal. There
    are many such false positive events in operations due to this static baselining
    of thresholds.


    Automated baselining helps in such scenarios because it considers the dynamic
    behavior of systems. It analyzes historical performance data to detect the real
    performance issues that need attention and eliminates the noise by adjusting the
    baseline threshold. In the given scenario, the system would automatically increase
    the threshold and not generate the event until after 2:30 a.m. However, if the
    same machine exhibits a CPU spike at, say, 9 a.m., it would generate an event.


    It is important to note that the dynamic baseline of a threshold will work a bit
    differently in a microservices architecture where the underlying infrastructure
    will scale up based on increased utilization or load. These aspects of application
    architecture and infrastructure utilization need to be considered for dynamic
    baselining.


    Noise in operations causes the following inefficiencies:


    - Increases volume of events for operations to manage, which in turn increases
    time and effort of operation teams.

    - Clutters the operator console with false positive events, which leads to missing
    important qualified and actionable events.

    - Causes failures in automated diagnosis and remediation. Since the event itself
    is false, the automated resolution would be triggered unnecessarily.


    Automated baselining reduces noise and related inefficiencies. Automated baselining
    can be achieved by leveraging supervised machine learning techniques that learn
    from past data and predict dynamic thresholds based on daily, weekly, monthly,
    and yearly seasonality of the data. From an AIOps perspective, there are three
    prominent algorithms that are core to implementing automated baselining. We will
    explore these approaches in this chapter starting with regression algorithms.


    ## Regression


    These classes of algorithms are used to determine the relationship between multiple
    variables and predict the value of a target variable. For example, based on the
    historical analysis of marketing spend, predict the next month’s sales revenue.
    Primarily, linear regression belongs to the statistics domain but is extensively
    used by machine learning for predictive modeling and is widely useful in multiple
    domains such as predicting stock prices, sales to price ratio of product, housing
    prices, etc. There are multiple variants of the regression algorithm, but the
    linear regression algorithm is one of the most-used regression algorithms in machine
    learning. Figure [7-1](#524834_1_En_7_Chapter.xhtml#Fig1) lists some of the important
    linear regression algorithms available, and we will be discussing linear regression
    in the next section.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig1_HTML.jpg)


    A circle is labeled as types of regression. The regression types given on the
    right are as follows: linear regression, polynomial regression, support vector
    regression, decision tree regression, random forest regression, ridge regression,
    lasso regression, and logistic regression.


    Figure 7-1


    Regression algorithms


    ### Linear Regression


    This algorithm is applicable where the dataset shows a linear relationship between
    input and output variables and the output variable has continuous values, such
    as percentage utilization of CPU, etc.


    In linear regression, input variables, referred to as *independent variables*
    or *features*, from the dataset get chosen to predict the values of the output
    variable, referred to as the *dependent variable* or *target value*. Mathematically,
    the linear regression model establishes a relationship between the dependent variable
    (`Y`) and one or more independent variables (`Xi`) using a best-fit straight line
    (called the *regression line*) and is represented by the equation `Y = a + bXi
    + e`, where `a` is the intercept, `b` is the slope of the line, and `e` is the
    error in prediction from the actual value. When there are multiple independent
    variables, it’s called *multiple linear regression*.


    Let’s first understand simple linear regression that has only one independent
    variable.


    In Figure [7-2](#524834_1_En_7_Chapter.xhtml#Fig2)’s graph, there are a set of
    actual data points that exhibit a linear relationship, and an imaginary straight
    line runs somewhere in the middle of these data points.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig2_HTML.jpg)


    A graph of dependent variable `y` versus independent variable `X`. Eight vertical
    lines, regression line with a dot on tip denotes actual data, joins at the top
    and bottom of the inclined line between `y`-intercept `a`, and `y` equals `a`
    plus `bX` plus epsilon. Two horizontal and vertical lines, delta `X` and delta
    `y` make a triangle with the regression line.


    Figure 7-2


    Simple linear regression


    This imaginary straight line is the regression line, which consists of predicted
    data points. Now the distance between each one of the actual data points, and
    the line is called an *error*. Multiple lines can be drawn that pass through these
    data points, so the algorithm finds the best line that minimizes this error by
    calculating distances with all points. Whichever lines gives the smallest error
    becomes the regression line and provides the best prediction. From an AIOps perspective,
    linear regression provides a predictive capability for correlation, but it does
    not show causation.


    Now let’s understand the implementation of linear regression to forecast the database
    response time (in seconds) based on the memory utilization (MB) and CPU utilization
    (percent) of the server. Here we have two independent variables, namely, CPU and
    memory, so we will be using multiple linear regression models to predict the database
    response time based on the specific utilization value of CPU and memory.


    You can download the code from [`https://github.com/dryice-devops/AIOps/blob/main/Ch-7_AutomatedBaselinig-Regression.ipynb`](https://github.com/dryice-devops/AIOps/blob/main/Ch-7_AutomatedBaselinig-Regression.ipynb).


    Let’s begin by exporting data for the parameters CPU Utilization, Memory Utilization,
    and DB Response Time from the file [`https://github.com/dryice-devops/AIOps/blob/main/data.xlsx`](https://github.com/dryice-devops/AIOps/blob/main/data.xlsx),
    which is shown in Table [7-1](#524834_1_En_7_Chapter.xhtml#Tab1).


    Table 7-1


    CPU and Memory Utilization Mapping with DB Response Time


    | -![](images/524834_1_En_7_Chapter/524834_1_En_7_Figa_HTML.jpg)A table for CPU
    and memory utilization mapping has three columns with headers DB response time,
    CPU usage, and memory utilization MB. |


    Along with `Pandas` and `Matplotlib`, we will be using the additional Python libraries
    listed here:


    - `NumPy`: This is the most widely used library in Python development to perform
    mathematical operations on matrices, linear algebra, and Fourier transform.

    - `Seaborn`: This is another data visualization library that is based on the `Matplotlib`
    library and primarily used for generating informative statistical graphics.'
