    factors, then the SARIMAX model is used.


    One of the big limitations of ARIMA is the inability to consider the seasonality
    in time-series data, which is common in real-world scenarios like when there is
    exceptionally high sales figures during the holiday period of Thanksgiving and
    Christmas every year, high expenditure during the first week of every month, high
    footprints during the weekend in shopping malls, and so on. Such seasonality gets
    considered in another algorithm, called SARIMA, which is a variant of ARIMA model.


    ### SARIMA


    A cyclical pattern at a regular time interval is referred as *seasonality* and
    should be considered in a prediction model to improve the accuracy of prediction.
    That’s how the ARIMA model is modified to develop SARIMA, which considers seasonality
    in time-series data and supports univariate time-series data with a seasonal component.


    Along with ARIMA variables, SARIMA needs four new components.


    *   **p**: Autoregression (AR) order of time series.


    *   **d**: Difference (I) order of time series.


    *   **q**: Moving average (MA) order of time series.


    *   **m (or lag)**: Seasonal factor, number of time steps to be considered for
    a single seasonal period. For example, if there is yearly seasonality, then m
    = 12; if it’s quarterly, then m=4; if it’s weekly, then m=52.


    *   **P**: Seasonal autoregressive order.


    *   **D**: Seasonal difference order.


    *   **Q**: Seasonal moving average order.


    The final notation for an SARIMA model is specified as SARIMA (p,d,q)(P,D,Q)m.'
  trans: '

    ### 自回归或 AR(p)


    该组件被称为*自回归*，表明因变量 `Y[t]` 可以计算为其自身滞后项 `Y[t-1]`、`Y[t-2]` 等的函数。


    `Y[t] = α + β₁Y[t-1] + β₂Y[t-2] + ... + βₚY[t-p]`


    其中：


    - `α` 是常数项（截距）。

    - `β` 是滞后项的系数，下标表示其位置。

    - `ε` 是误差项或白噪声。


    我们之前讨论过，PACF 图显示了在排除中间滞后项的影响后，序列与其滞后项之间的偏自相关。我们可以使用 PACF 图来确定最后一个滞后项 `p`，该滞后项截断了显著线，可以被视为
    AR 的一个良好估计值。该值由模型变量 `p` 表示，作为 AR 模型的阶数。


    基于图 7-15 中的样本 PACF 图，我们可以观察到滞后 1 似乎是穿过显著线的最后一个滞后项。因此，我们可以将 `p` 设为 1，并将其表示为 `AR(1)`。


    ![PACF 图](img/524834_1_En_7_Fig15_HTML.jpg)


    该 PACF 图中，y 轴代表相关值，x 轴代表从 0 到 7 的滞后项。x 轴两侧的虚线表示显著性。序列的第一个值从 1 开始，随后逐渐减小，数值大约为
    6、4、3.5、-2、-3、-4 和 -8。


    **图 7-15** – PACF 图


    ### 移动平均或 MA(q)


    该组件被称为*移动平均*，表明因变量 `Y[t]` 可以计算为先前滞后项中预测误差的加权平均值的函数。


    `Y[t] = α + ε[t] + φ₁ε[t-1] + φ₂ε[t-2] + ... + φₚε[t-q]`


    - `α` 通常是序列的均值。

    - `ε` 是各自滞后项处自回归模型的误差。


    MA 可以检测时间序列数据中的趋势和模式。你可以使用 ACF 图来确定模型变量 `q` 的值，该值表示需要多少个移动平均来消除平稳序列中的任何自相关。从图
    7-16 的 ACF 图中，我们可以观察到在滞后 2 和滞后 6 之后有一个截断。因此，我们可以尝试使用 `q = 2`、`MA(2)` 或 `q = 6`、`MA(6)`
    的 ACF。


    ![ACF 图](img/524834_1_En_7_Fig16_HTML.jpg)


    该 ACF 图中，y 轴代表相关值，x 轴代表从 0 到 7 的滞后项。x 轴两侧的虚线表示显著性。序列的第一个值从 1 开始，随后逐渐减小，数值大约为 8、7、5、-4、-5、-7
    和 -8。


    **图 7-16** – ACF 图


    AR 和 MA 方程都需要进行差分（I 或 d）以创建 ARIMA 模型，该模型表示为 `ARIMA(p, d, q)`。


    ARIMA 是其他各种自回归时间序列模型的基础，具体如下：


    - **SARIMA**：如果在固定的时间间隔内存在重复模式，则称之为*季节性*，此时使用 SARIMA 模型，其中 S 代表季节性。我们将在下一节中进一步探讨。

    - **ARIMAX**：如果序列依赖于外部因素，则使用 ARIMAX 模型，其中 X 代表外部因素。

    - **SARIMAX**：如果除了季节性之外，还存在外部因素的强烈影响，则使用 SARIMAX 模型。


    ARIMA 的一个主要局限性是无法考虑时间序列数据中的季节性，而这在现实场景中很常见，例如每年感恩节和圣诞节假期期间销售额异常高、每月第一周支出较高、周末购物中心人流量大等。这种季节性会在另一种算法（称为
    SARIMA，它是 ARIMA 模型的一个变体）中得到考虑。


    ### SARIMA


    在固定时间间隔内出现的周期性模式被称为*季节性*，应在预测模型中加以考虑，以提高预测的准确性。这就是 ARIMA 模型被修改以开发出 SARIMA 的方式，该模型考虑了时间序列数据中的季节性，并支持带有季节性成分的单变量时间序列数据。


    除了 ARIMA 变量之外，SARIMA 还需要四个新组件：


    - **p**：时间序列的自回归（AR）阶数。

    - **d**：时间序列的差分（I）阶数。

    - **q**：时间序列的移动平均（MA）阶数。

    - **m（或滞后）**：季节性因子，单个季节性周期要考虑的时间步数。例如，如果是年度季节性，则 `m = 12`；如果是季度，则 `m = 4`；如果是周度，则
    `m = 52`。

    - **P**：季节性自回归阶数。

    - **D**：季节性差分阶数。

    - **Q**：季节性移动平均阶数。


    SARIMA 模型的最终表示法指定为 `SARIMA(p, d, q)(P, D, Q)m`。

