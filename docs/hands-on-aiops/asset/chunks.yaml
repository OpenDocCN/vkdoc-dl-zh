    Based on the analysis done, we can conclude that each event has a specific `AlertTime`
    that got generated from the device mentioned in `Host` with an event source captured
    in `Source` that belongs to a specific category defined by `AlertClass` and `AlertType`.
    This event got captured by the monitoring tool mentioned in `AlertManager` with
    a specific severity `Severity` and `Status` as an enumerated value. Issue details
    are provided in `AlertDescription`.


    For the purpose of the deduplication example, let’s name the deduplication key
    `EMUniqueKey` and create it as a combination of the `Host`, `Source`, `AlertType`,
    `AlertManager`, and `AlertClass` fields concatenated with the separator `::`,
    as shown in Figure [6-7](#524834_1_En_6_Chapter.xhtml#Fig7). Then let’s add it
    in our dataset for each event.


    ![](images/524834_1_En_6_Chapter/524834_1_En_6_Fig7_HTML.png)


    The E M Unique key: Host (Ex. 10.10.10.1) separator Source (Ex. Tablespace) separator
    Alert type (Ex. Oracle) separator Alert Manager (Ex. O E M) separator Alert Class
    (Ex. database). The separator is 4 dots in a square pattern.


    **Figure 6-7** Unique key composition


    ```

    raw_events[''EMUniqueKey''] = raw_events[''Host''].str.strip() + "::" \

    + raw_events[''Source''].str.strip() + "::" \

    + raw_events[''AlertType''].str.strip() + "::" \

    + raw_events[''AlertManager''].str.strip() + "::" \

    + raw_events[''AlertClass''].str.strip()

    raw_events[''EMUniqueKey''] = raw_events[''EMUniqueKey''].str.lower()

    raw_events = raw_events.sort_values(by="AlertTime")

    raw_events["AlertTime"] = raw_events["AlertTime"].astype(str)

    ```


    `EMUniqueKey` is a generic identifier that uniquely identifies the underlying
    issues to provide the required context for the purpose of performing deduplication.


    Let’s observe the data after adding the unique identifier in the dataset.


    ```

    raw_events.head().transpose()

    ```


    As observed in the output in Table [6-6](#524834_1_En_6_Chapter.xhtml#Tab6), we
    have a new field added called `EMUniqueKey` in the dataset for each event.


