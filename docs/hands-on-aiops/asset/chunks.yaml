    # 2. AIOps Architecture and Methodology


    In this chapter, you will learn about technologies and components that are in
    the AIOps architecture along with its implementation methodology and challenges.
    The chapter will explore the AIOps key features of the Observability, Engage,
    and Act phases and the role of machine learning in IT operations.


    ## AIOps Architecture


    AIOps systems primarily consist of three core services of IT operations, which
    are enterprise monitoring, IT service management, and automation. The AIOps architecture
    provides technologies and methods for seamless integration between these three
    services and delivers a complete AIOps system. Figure 2-1 defines the AIOps platform
    and its applicability across various processes and functions in the three core
    services defined in the IT operations value chain as defined by Gartner. Let’s
    delve deeper into this and understand the AIOps architecture.


    ![Figure 2-1](images/524834_1_En_2_Chapter/524834_1_En_2_Fig1_HTML.png)


    An AIOps platform has three core services: observe; monitoring, engage; ITSM,
    and act; automation. The observe service has events metrics traces and topology
    with four points. The engage service has incidents, dependencies, and changes
    with four points. The act service has scripts, a runbook, and ARA.


    **Figure 2-1** AIOps architecture


    ## The Core Platform


    The AIOps system is intended to ingest millions of data points that get generated
    at a rapid pace and need to be analyzed quickly along with historical data to
    deliver value. Big Data technologies coupled with machine learning algorithms
    provide the solution and form the core of the AIOps system.


    ### Big Data


    The AIOps platform ingests data from multiple sources, and thus the platform needs
    to be built on Big Data technologies. Traditional systems have been built on relational
    systems; however, when it comes to AIOps, there are multiple data sources and
    a huge amount of data to be processed to arrive at meaningful insights. Big Data
    is defined as the type of data that is characterized by the five *V*s, which are
    volume, velocity, variety, veracity and value, as shown in Figure 2-2.


    ![Figure 2-2](images/524834_1_En_2_Chapter/524834_1_En_2_Fig2_HTML.png)


    A flowchart of 5 V''s of Big Data has five sub-branches with definitions. The
    branches are Velocity: speed at which data is emanating, Veracity: data reliability
    and trust, Volume: refers to the sheer volume of data, Value: having data to big
    data is all well and good, and Variety: can use structured and unstructured data
    as well.


    **Figure 2-2** Big Data definition'
