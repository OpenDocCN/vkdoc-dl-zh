    # 排版后的文本


    当今企业在自动化方面的成熟度参差不齐。大多数企业尚未达到较高的自动化成熟度，部分原因在于流程变更、打破组织架构壁垒以及部署新技术都是复杂且耗时的任务。在一些组织中，数字化和云计算项目已成为大规模转型的一部分；`AIOps`
    及相关技术和流程变革正在推动数字化的全面转型。采用 `AIOps` 的一个关键障碍是该领域缺乏全面的流程和技术指导。现有的指导十分有限，且大多聚焦于供应商试图作为一站式解决方案推销的产品，声称能让组织实现跨越式发展。通过本出版物，我们旨在提供切实可行的实践指导，说明组织应如何从源头采纳这些变革，以及需要避免哪些陷阱。实施
    `AIOps` 并非部署一个事件关联工具，而是要将人工智能和算法融入其中，并实现运维各环节的自动化。


    目前，大多数组织已实现单个任务的自动化和某些流程的自动化。部分组织还实现了复杂端到端流程的自动化。然而，一个端到端的自维持自动化模型仍然缺失。自动化少数流程与自动化所有可自动化内容之间的转变，人们尚未启动。在大多数组织中，先自动化少数流程，再将自动化扩展到跨团队、跨职能和跨部门，仍是一项进行中的工作。


    `AIOps` 不仅仅是技术或流程的变革，更是一种文化变革。在这种文化中，人类与人工智能协同工作，相互支持和增强彼此的能力，以实现效率和可扩展性——这是 IT
    团队梦寐以求却一直未能达成的目标。`NoOps` 的承诺之所以未能实现，是因为组织未能对 `AIOps` 采取整体且端到端的方法，而是依赖以孤岛式工具形式部署的快速修复方案。


    在自动化成熟度曲线中处于较高水平的企业中，大多数可完全或部分自动化的活动都已实现自动化，并且由人工智能驱动决策，而非人类通过仪表盘和分析来确定下一步行动。这是一种思维模式的转变：人类必须接受人工智能系统在某些领域的优势地位，并放弃我们物种固有的控制欲。IT
    团队习惯于确定性以及基于规则的系统，这些系统主导了 IT 领域数十年。而基于人工智能的系统是概率性的，而非确定性的；因此，一些企业虽然部署了 `AIOps`
    系统，却将其配置得与基于规则的系统无异。接受概率性系统而非逐步的基于规则的系统是一种思维转变，人们需要接受实施此类系统所带来的风险，并建立相应的控制措施，以确保运行基于人工智能的系统的最佳实践；将人类对某些操作的控制纳入流程变革的一部分。


    企业也在不断演进，调整其运营模式以符合敏捷原则；它们开始整合应用和基础设施团队，并采用站点可靠性工程等新实践，使运维支持能够支撑高可靠性、高可用性的关键任务系统和互联网规模的应用。`AIOps`
    是基于站点可靠性工程的运维中的关键支柱。Apress 于 2021 年出版的《*Hands On Guide to AgileOps*》一书提供了关于如何在
    IT 运维中采用敏捷方法的实践指导。


    本书将带你深入了解 `AIOps` 的各个方面，包括人工智能和机器学习算法，并演示企业 `AIOps` 平台如何实现 `AIOps` 的某些功能。你将能够利用
    `AIOps` 流程和平台提供的能力，将组织的运维成熟度提升到更高水平。我们将在配套网站 [`www.AgileInfraOps.com`](http://www.agileinfraops.com)
    上持续提供更新的内容和指导，随着流程和技术的发展，你可以在该网站找到相关文章和最佳实践。


    ## 引言


    本书是一本实践指南，旨在详细理解 `AIOps`，并协助在组织中实施其技术和流程。


    本书阐述了 IT 行业对 `AIOps` 的需求、其架构以及促成其演进的技术。读者将能够掌握 `AIOps` 的核心理论概念，并通过实施利用机器学习技术的实践示例和练习来深入理解
    `AIOps`。本书还提供了关于如何在企业中搭建 `AIOps` 以及如何避免陷阱以成功完成实施的指导。此外，本书还解释了 `AIOps` 在 `SRE`
    和 `DevOps` 模型中的作用，并详细说明了 `AIOps` 如何赋能关键的 `SRE` 原则。


    这本实践指南还提供了多个 `AIOps` 用例的实现，并附带了可运行的示例代码，帮助你更好地理解构成 `AIOps` 核心的一些基础原理和技术。


    本书分享了在企业中建立 `AIOps` 实践和系统的最佳实践、流程和指南，以及衡量成果并持续演进的方法。


    ## 致谢


    感谢我的家人 Shweta 和 Soumil，你们始终陪伴在我身边，并允许我牺牲与你们相处的时间去追求智识和精神上的目标。没有你们的爱与支持，我生命中的这一成就以及其他成就都将无法实现。


    感谢我的母亲和姐姐，你们一如既往的爱与支持：没有你们的祝福，一切皆不可能。


    感谢我的合著者 Gaurav 以及 HCL 的团队，你们一直是我灵感的源泉。


    感谢 Celestine 和 Apress 的整个团队，将我们的想法变为现实。与你们合作撰写本书是一次奇妙的经历，多年来，决策速度和编辑支持都非常出色。


    > ——Navin


    感谢我的父母，你们始终陪伴在我身边，给予我宝贵的支持和鼓励，并不断追求知识与智慧。


    感谢我的妻子和可爱的女儿 Vaidehi 与 Maanvi，你们是我的灵感来源，并牺牲了自己的时间。


    感谢我的合著者和导师 Navin，感谢你的指导、支持和反馈。


    感谢我的队友 Vipul Tyagi 和 Rajesh Upadhyay，感谢你们的技术支持。


    感谢主，赐予我在生活各个方面智慧与力量。


    > ——Gaurav


