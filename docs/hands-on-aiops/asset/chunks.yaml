    Let’s validate the results of this new SARIMA model.


    ```

    sarima_predictions = pd.Series(sarima_model.predict(len(test_data)))

    actuals = test_data.reset_index(drop = True)

    sarima_predictions.plot(legend = True,label = "SARIMA Predictions",xlabel = "Index",
    ylabel = "CPU Utilization", figsize=(10, 7))

    auto_arima_predictions.plot(legend = True,label = "ARIMA Predictions")

    actuals.plot(legend = True, label = "Actual")

    forecast_accuracy(np.array(sarima_predictions), test_data)

    ```


    After considering the seasonality, the prediction’s accuracy improved to about
    62 percent as MAPE reduced to about 38 percent. This improvement in accuracy can
    also be observed in Figure [7-31](#524834_1_En_7_Chapter.xhtml#Fig31) by plotting
    predictions of the ARIMA and SARIMA models against the actual test data observed.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig31_HTML.jpg)


    A graph of C P U utilization versus the index. Two frequency waves and a curve
    line are graphed. The frequency waves denote SARIMA and actual. The actual starts
    around (0, 70) and ends at (40, 95) and SARIMA starts around (0, 65) and ends
    at (45, 95). The curve line denotes ARIMA prediction starts around (0, 65) and
    ends at (95, 68).


    Figure 7-31


    Time-series prediction by ARIMA/SARIMA on test data


    This model can be used to generate future predictions to determine an appropriate
    baseline dynamically rather than going with a static global baseline. This approach
    drastically reduces the noise in large environments.


    This model can also be used for one of the most common use cases around the autoscaling
    of infrastructure, especially when there is seasonality in the utilization. The
    SARIMA (or SARIMAX) model can be used to analyze historical time-series data along
    with seasonality and any external factor to predict the utilization and accordingly
    scale up or down infrastructure for a specific duration and provide potential
    cost savings.'
  trans: '

    在实际场景中，需要使用 ARIMA 组件的多个值才能得到预测精度最高的模型。手动执行此任务需要大量的时间和统计技术专业知识。此外，要为大量实体（如服务器、参数、股票等）创建模型几乎是不可能的。


    有一种称为 Auto ARIMA 的机器学习方法，可以学习组件 `p`、`d`、`q` 的最优值。在 Python 中，有一个名为 `pdarima` 的库，它提供了
    `auto_arima` 函数，用于在模型创建中尝试 ARIMA/SARIMA 组件的各种值，并搜索具有最低 AIC 和 BIC 值的最优模型。


    让我们尝试使用 auto ARIMA 从给定的训练数据集中为 ARIMA 模型找到最优的组件值。在 auto ARIMA 模型中，我们目前将 `seasonal`
    指定为 `False`，以便更深入地探索 ARIMA。对于 SARIMA 模型，此值将为 `true`，以考虑季节性。我们还将提供 auto ARIMA 可以探索的
    `p` 和 `q` 的最大值，以获得最佳模型。让我们将 `max_p` 和 `max_q` 设置为 15，以限制模型的复杂度。


    ```

    # 在训练集上拟合 auto_arima

    auto_arima_model = pm.auto_arima(train_data, start_p = 1, start_q = 1,

    max_p = 15, max_q = 15,

    seasonal = False,

    d = None, trace = True,

    error_action =''ignore'',

    suppress_warnings = True,

    stepwise = True)

    # 打印摘要

    auto_arima_model.summary()

    ```


    根据图 7-27 所示的 auto ARIMA 结果，最佳模型被识别为 ARIMA (6,1,0)，其 AIC 和 BIC 值相比之前的 ARIMA (6,1,2)
    模型有轻微改善。


    ![](img/524834_1_En_7_Fig27_HTML.jpg)


    预测分析展示了为最小化 AIC 而进行的逐步性能。SARIMAX 结果如下所示，包含不同的输出标题：因变量、模型、日期、时间、样本、协方差类型、观测数、对数似然、AIC、BIC、HQIC。


    **图 7-27** 对测试数据的预测分析


    接下来，仅在测试数据上验证 ARIMA (1,1,1) 的性能。


    ```

    auto_arima_predictions = pd.Series(auto_arima_model.predict(len(test_data)))

    actuals = test_data.reset_index(drop = True)

    auto_arima_predictions.plot(legend = True,label = "ARIMA 预测",

    xlabel = "索引",ylabel = "CPU 利用率",

    figsize=(10, 7))

    actuals.plot(legend = True, label = "实际值");

    forecast_accuracy(np.array(auto_arima_predictions), test_data)

    ```


    如图 7-28 所示，并且根据获得的性能指标，ARIMA (1,1,1) 模型的精度进一步下降。


    ![](img/524834_1_En_7_Fig28_HTML.jpg)


    一张 CPU 利用率与索引的关系图。图中绘制了一条频率波和一条曲线。频率波表示实际值，从 (0, 70) 开始，到 (40, 95) 结束。曲线表示 ARIMA
    预测，从 (0, 65) 开始，到 (95, 68) 结束。这些点是近似值。


    **图 7-28** 对测试数据 ARIMA (1,1,1) 的预测分析


    显然，ARIMA 模型在此场景中不适用，我们需要使用 `seasonal_decompose` 包来查找数据中的季节性。


    ```

    seasonality_check = seasonal_decompose(cpu_util_raw_data[''cpu_utilization''],

    model=''additive'',extrapolate_trend=''freq'')

    seasonality_check.plot()

    plt.show()

    ```


    基于图 7-29 中的图表，我们可以观察到数据中的季节性，这意味着我们应该使用 SARIMA 模型。


    ![](img/524834_1_En_7_Fig29_HTML.jpg)


    四个图表。图表 1，CPU 利用率与日期时间的关系，绘制了一条高频波。图表 2，趋势与日期时间的关系，绘制了一条低频波。图表 3，季节性与日期时间的关系，绘制了一条高度相同的高频波。图表
    4，残差与日期时间的关系，绘制了一个散点图。


    **图 7-29** 时间序列季节性检查


    让我们使用启用了季节性的 auto ARIMA 来探索 SARIMA 模型。由于我们有每日数据点，并且根据季节性图表，似乎存在周季节性，因此我们将 SARIMA
    组件的值设置为 `m = 7`。


    ```

    # 季节性 - 拟合逐步 auto-ARIMA

    sarima_model = pm.auto_arima(train_data, start_p=1, start_q=1,

    test=''adf'',

    max_p=15, max_q=15, m=7,

    start_P=0, seasonal=True,

    d=None, D=1, trace=True,

    error_action=''ignore'',

    suppress_warnings=True,

    stepwise=True)

    sarima_model.summary()

    ```


    如图 7-30 所示，auto ARIMA 尝试了各种组合，并将 SARIMA (3,0,2)(0,1,1)[7] 检测为最佳拟合模型，其 AIC 值与之前的
    ARIMA 模型相比有显著改善。


    ![](img/524834_1_En_7_Fig30_HTML.png)


    在训练数据上的自动 ARIMA 模型执行结果展示了为最小化 AIC 而进行的逐步性能。SARIMAX 结果如下所示，包含不同的输出标题：因变量、模型、日期、时间、样本、协方差类型、观测数、对数似然、AIC、BIC、HQIC。


    **图 7-30** 在训练数据上的自动 ARIMA 模型执行结果


    让我们验证这个新 SARIMA 模型的结果。


    ```

    sarima_predictions = pd.Series(sarima_model.predict(len(test_data)))

    actuals = test_data.reset_index(drop = True)

    sarima_predictions.plot(legend = True,label = "SARIMA 预测",xlabel = "索引", ylabel
    = "CPU 利用率", figsize=(10, 7))

    auto_arima_predictions.plot(legend = True,label = "ARIMA 预测")

    actuals.plot(legend = True, label = "实际值")

    forecast_accuracy(np.array(sarima_predictions), test_data)

    ```


    在考虑了季节性之后，预测精度提高到约 62%，而 MAPE 降低到约 38%。这种精度的提升也可以通过将 ARIMA 和 SARIMA 模型的预测与观察到的实际测试数据绘制在一起，在图
    7-31 中观察到。


    ![](img/524834_1_En_7_Fig31_HTML.jpg)


    一张 CPU 利用率与索引的关系图。图中绘制了两条频率波和一条曲线。频率波表示 SARIMA 和实际值。实际值从大约 (0, 70) 开始，到 (40, 95)
    结束；SARIMA 从大约 (0, 65) 开始，到 (45, 95) 结束。曲线表示 ARIMA 预测，从大约 (0, 65) 开始，到 (95, 68)
    结束。


    **图 7-31** ARIMA/SARIMA 对测试数据的时间序列预测


    此模型可用于生成未来预测，以动态确定适当的基线，而不是使用静态的全局基线。这种方法可以显著减少大型环境中的噪声。


    该模型还可用于围绕基础设施自动扩缩容的最常见用例之一，尤其是在利用率存在季节性时。SARIMA（或 SARIMAX）模型可用于分析历史时间序列数据，同时考虑季节性和任何外部因素，以预测利用率，并据此在特定时间段内扩缩容基础设施，从而提供潜在的成本节约。

