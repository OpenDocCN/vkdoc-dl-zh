    However, natural language processing and text extraction–based systems can be
    used to extract the information from the incident and map it probabilistically
    to the right skill and thus aid the task assignment engine. The machine learning
    capabilities using text extraction help in automatic mapping of the task to the
    right skill rather than using a regular expression–based approach to look for
    keywords. Using or not using machine learning for this is entirely dependent on
    the scale, size, and complexity of the environment. For smaller environments,
    rule-based systems would work perfectly well, and leveraging machine learning
    here may not be needed. However, larger and more complex operations would require
    this capability to run efficient operations.


    #### Task Analytics


    Tasks assigned to individuals need to be analyzed; thus, each task that is in
    the system is generating data. Statistical analysis of the tasks in the system
    is used to provide insights into how the process and people are performing. Tasks
    can be analyzed for volumetric data as well as for efficiency data in terms of
    time taken at each step. Analyzing the tasks gives important insights to run Six
    Sigma or Lean projects in the organization.


    This is also used for assessing the accuracy of the assignment engine to see if
    the tasks are correctly assigned. If the tasks are not correctly assigned, the
    task will keep hopping between different teams, and this may indicate a problem
    with the assignment engine.


    #### Agent Analytics


    Similar to task analytics, the other important lever in ITSM is the agents or
    resources working on these tasks. Agent analytics analyzes the performance of
    human as well automated agents on parameters such as accuracy, time taken to resolve
    issues, individual performance, and performance as compared to baselines. This
    can flag any issues with skills or availability of resources. This data is also
    useful to analyze if the assignment engine is assigning tasks correctly.


    #### Change Analytics


    Changes including patches, updates, upgrades, configuration changes, and release
    of new software into production are potential sources of incidents. What was working
    before may stop working after making a change. Thus, it is important to analyze
    changes that are happening in the infrastructure and application environment.


    Change analytics includes areas where the impact of change can be assessed by
    using topology and configuration information. Change analytics also includes probabilistic
    analytics of risk to infrastructure and platforms because of changes. This may
    involve analyzing the data around topology, relationships between various components,
    the size and complexity of the change involved, and the associated historical
    data with these changes to arrive at a risk score for a particular change. The
    feedback score from technical evaluators and business approvers of change is also
    an important input to analyze the change and plan for its execution, keeping in
    mind the risks that it carries.


    #### Process Analytics


    We talked about analyzing key basic processes in ITSM including incident management
    and change management. However, all processes in ITSM need analytics particularly
    around the KPIs that are defined for each process.


    As an example, change management has associated KPIs for changes implemented within
    a certain time, changes that caused outages and incidents, etc. Similarly, incident
    management has KPIs around response time and resolution time of an incident along
    with other process KPIs such as time taken to identify root cause, etc.


    Service level management processes have KPIs around the SLAs that may be related
    to the response and resolution of priority-based problems. For example, all P1
    incidents should be responded to within 5 minutes and resolved within 30 minutes
    with an SLA of 90 percent over a monthly cycle. This means that 90 percent of
    the P1 incidents should be responded to and resolved within the time defined,
    and this calculation is done on a monthly basis and reset at the beginning of
    each month.


    All this process data is fed into the AIOps analytics engine to do statistical
    analysis of this data and analyze it for process improvement purposes. You can
    also use AIOps machine learning techniques like regression here to predict the
    future metrics based on the historical data; the regression techniques will take
    into consideration the seasonality variations and the data from the past to arrive
    at the future predicted values.


    This data helps to better plan the resources and also feeds into process improvement
    initiatives.


    #### Visualization


    Since most of this data in ITSM systems is about people, process, and technology
    aspects, it is important that we have the right level of visualization and dashboarding
    technology available to make sense of this data and walk the path of continual
    service improvement.


    There are various stakeholders who need access to this data, and their requirements
    are different; thus, the visualization layer needs to have role-based access and
    role-based views to facilitate the operations team.


    There are service delivery managers, incident managers, command center leads,
    process analysts consultants, and owners. You also have the service level manager
    and change and configuration managers who are responsible for the SLAs with customers
    and responsible for maintaining the CMDB, respectively. All these roles require
    the right level of insights and visualization into the relevant data to be able
    to manage their respective processes.


    Visualization is also needed for business owners and application owners, and in
    the case of outsourcing engagements, there are views needed by the customer and
    service provider.


    Right dashboarding and visualization tooling in AIOps is essential to get all
    the required data and insights including insights generated by machine learning
    algorithms to run operations with higher efficiency and maturity.'
  trans: '

    ### 任务分配


    在传统系统中，任务由技术主管根据资源的可用性和完成特定任务所需的技能分配给工程师。在基于现代 AIOps 的系统中，任务分配通过 ITSM 系统内部或外部的自动化流程完成。任务分配引擎会考虑资源在特定班次的可用性、其技能水平、解决特定任务或事件所需的技术，以及该资源已有的工作量。基于这些参数，工单会被分配给个人进行处理，并更新进度直至关闭。


    任务分配使用基于规则的系统而非机器学习系统来完成，因为它需要将技能与任务匹配，并将资源的经验水平与工作量或可用性相匹配，这些查找操作可以通过基于规则的系统完成，而无需利用机器学习技术。


    然而，基于自然语言处理和文本提取的系统可用于从事件中提取信息，并概率性地将其映射到正确的技能，从而辅助任务分配引擎。利用文本提取的机器学习能力有助于将任务自动映射到正确的技能，而不是使用基于正则表达式的方法来查找关键词。是否为此使用机器学习完全取决于环境的规模、大小和复杂性。对于较小的环境，基于规则的系统就能完美运行，可能无需利用机器学习。然而，更大、更复杂的运维则需要这种能力来高效运行。


    ### 任务分析


    分配给个人的任务需要进行分析；因此，系统中的每个任务都在生成数据。对系统中的任务进行统计分析，可以深入了解流程和人员的表现。可以从任务量数据以及每个步骤所花费时间等效率数据方面对任务进行分析。分析任务为在组织中运行六西格玛或精益项目提供了重要见解。


    这也用于评估分配引擎的准确性，以查看任务是否被正确分配。如果任务未被正确分配，任务将在不同团队之间不断流转，这可能表明分配引擎存在问题。


    ### 坐席分析


    与任务分析类似，ITSM 中的另一个重要杠杆是处理这些任务的坐席或资源。坐席分析根据准确性、解决问题所需时间、个人绩效以及与基线相比的绩效等参数，分析人类坐席和自动化坐席的表现。这可以标记出技能或资源可用性方面的任何问题。这些数据也有助于分析分配引擎是否在正确分配任务。


    ### 变更分析


    变更，包括补丁、更新、升级、配置变更以及将新软件发布到生产环境，都是事件的潜在来源。之前能正常工作的东西在变更后可能停止工作。因此，分析基础设施和应用程序环境中正在发生的变更非常重要。


    变更分析包括可以通过使用拓扑和配置信息来评估变更影响的领域。变更分析还包括对因变更导致的基础设施和平台风险的概率分析。这可能涉及分析关于拓扑、各组件之间关系、所涉及变更的规模和复杂性，以及与这些变更相关的历史数据，从而得出特定变更的风险评分。来自技术评估人员和变更业务审批人员的反馈分数也是分析变更并规划其执行的重要输入，同时需考虑其带来的风险。


    ### 流程分析


    我们讨论了分析 ITSM 中的关键基础流程，包括事件管理和变更管理。然而，ITSM 中的所有流程都需要分析，特别是围绕为每个流程定义的 KPI。


    例如，变更管理有与在一定时间内实施的变更、导致中断和事件的变更等相关的 KPI。类似地，事件管理有关于事件响应时间和解决时间的 KPI，以及其他流程 KPI，例如识别根本原因所花费的时间等。


    服务水平管理流程有与 SLA 相关的 KPI，这些 KPI 可能与基于优先级的问题的响应和解决有关。例如，所有 P1 事件应在 5 分钟内响应，并在 30
    分钟内解决，月度周期内的 SLA 为 90%。这意味着 90% 的 P1 事件应在规定时间内得到响应和解决，此计算按月进行，并在每月初重置。


    所有这些流程数据都被输入到 AIOps 分析引擎中，以对这些数据进行统计分析，并用于流程改进目的。您还可以在此处使用 AIOps 机器学习技术（如回归）来根据历史数据预测未来的指标；回归技术将考虑季节性变化和过去的数据，以得出未来的预测值。


    这些数据有助于更好地规划资源，并为流程改进计划提供信息。


    ### 可视化


    由于 ITSM 系统中的大部分数据都涉及人员、流程和技术方面，因此拥有适当级别的可视化和仪表盘技术来理解这些数据并走上持续服务改进之路至关重要。


    有各种利益相关者需要访问这些数据，他们的需求各不相同；因此，可视化层需要具备基于角色的访问和基于角色的视图，以便于运维团队使用。


    有服务交付经理、事件经理、指挥中心负责人、流程分析师、顾问和负责人。还有服务水平经理以及变更和配置经理，他们分别负责与客户签订的 SLA 和维护 CMDB。所有这些角色都需要对相关数据有适当级别的洞察和可视化，以便能够管理各自的流程。


    业务所有者和应用程序所有者也需要可视化，并且在外包合作的情况下，客户和服务提供商也需要相应的视图。


    AIOps 中正确的仪表盘和可视化工具对于获取所有必需的数据和洞察（包括由机器学习算法生成的洞察）至关重要，以便以更高的效率和成熟度来运行运维。

