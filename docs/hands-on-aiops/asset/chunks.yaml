    Jupyter Notebook UI\n\nA blank notebook will launch in a new window. You can just\
    \ type commands in the cell and click the Run button to execute them. To test\
    \ that the environment is working perfectly, type in a print (“Hello World”) statement\
    \ in the cell and execute it.\n\nPython Notebooks are used in the book for demonstrating\
    \ the AIOps use cases of deduplication, dynamic baselining, and anomaly detection;\
    \ they are available at [`https://github.com/dryice-devops/AIOps.git`](https://github.com/dryice-devops/AIOps.git).\
    \ You can download the source code to follow along with the exercises in this\
    \ chapter.\n\nThe environment is now ready to develop and test algorithmic models\
    \ for multiple AIOps use cases. Before getting into model development, let’s understand\
    \ a few terms that are going to be used to analyze and measure the performance\
    \ of models.\n\n## Performance Analysis of Models\n\nIn practice, multiple models\
    \ need to be created to make predictions, and it is important to quantify the\
    \ accuracy of their prediction so that the best-performing model can be selected\
    \ for production use.\n\nIn the supervised ML model, a set of actual data points\
    \ is separated into training data and test data. The model is trained to learn\
    \ from training data and make predictions that get validated against both training\
    \ data and testing data. The delta between actual values and predicted values\
    \ is called the *error*. The objective is to select a model with minimum error.\n\
    \nThere are multiple methods to analyze errors and measure the accuracy of predictions.\
    \ The following are the most commonly used methods.\n\n### Mean Square Error/Root\
    \ Mean Square Error\n\nIn this approach, the first error is calculated for each\
    \ data point by subtracting the actual result value from the predicted result\
    \ value. These errors need to be added together to calculate the total error obtained\
    \ from a specific model. But errors can be positive or negative on different data\
    \ points, and adding them will cancel out each other, giving an incorrect result.\
    \ To overcome this issue, in mean square error (MSE), a square of calculated error\
    \ is performed to ensure that the positive and negative error values should not\
    \ cancel out each other, and then the mean of all squared error values is performed\
    \ to determine the overall accuracy.\n\n![](images/524834_1_En_6_Chapter/524834_1_En_6_Figa_HTML.png)\n\
    \nAn equation of M S E equals 1 over n of sigma from i equals 1 to lowercase n\
    \ of, open parenthesis Y subscript i minus Y cap subscript i close parenthesis\
    \ to the power 2.\n\n*   ![](images/524834_1_En_6_Chapter/524834_1_En_6_Figb_HTML.jpg)A\
    \ lowercase n. -> Number of data points\n\n*   ![](images/524834_1_En_6_Chapter/524834_1_En_6_Figc_HTML.jpg)An\
    \ uppercase Y subscript lowercase i. -> Actual value at specific test data point\n\
    \n*   ![](images/524834_1_En_6_Chapter/524834_1_En_6_Figd_HTML.jpg)An uppercase\
    \ y cap subscript lowercase i. -> Predicted value at specific test data point\n\
    \nThere is another variant of MSE where the square root of MSE is performed to\
    \ provide the root mean square error (RMSE) value. The lower the MSE/RMSE, the\
    \ higher the accuracy in prediction and the better the model.\n\n![](images/524834_1_En_6_Chapter/524834_1_En_6_Fige_HTML.jpg)\n\
    \nAn equation of R M S E equals root over sigma from i equals 1 to lowercase n\
    \ of open parenthesis y cap subscript i minus y subscript i close parenthesis\
    \ to the power 2 over n.\n\nBoth MSE/RMSE use “mean” as the baseline, and that’s\
    \ the biggest issue with these methods because mean has inherent sensitivity toward\
    \ outliers. In simple terms, assume there are four data points provided to model\
    \ A and model B. Table [6-1](#524834_1_En_6_Chapter.xhtml#Tab1) lists the errors\
    \ obtained on each of the data points for each model.\n\nTable 6-1\n\nSample Data\
    \ and Errors in ML Models\n\n| Data Point | Error in Model A | Error in Model\
    \ B |\n| --- | --- | --- |\n| **D1** | 0.45 | 0 |\n| **D2** | 0.27 | 0 |\n| **D3**\
    \ | 0.6 | 0 |\n| **D4 (Outlier)** | 0.95 | 1.5 |\n\nModel B appears to be a better\
    \ model because it predicted with 100 percent accuracy except on one data point,\
    \ which was an outlier and gave a high error. On the other hand, model A gave\
    \ small errors D on almost every data point.\n\nBut if we consider the mean of\
    \ errors for both models, then model A will have a lower mean value of errors\
    \ than model B, which gives an incorrect interpretation of model accuracy."
  trans: "\n# 环境搭建\n\n在本节中，你将学习如何搭建环境以运行演示各种 AIOps 用例的示例代码。你有三种搭建环境的选择。\n\n- 从 [`https://www.python.org/downloads/`](https://www.python.org/downloads/)\
    \ 下载 Python，并通过安装程序直接安装 Python。其他软件包需要在 Python 基础上显式安装。\n- 使用 Anaconda，它是一个 Python\
    \ 发行版，专为大数据处理、预测分析和科学计算需求而设计。Anaconda 发行版是执行 Python 编码最简单的方式，它适用于 Linux、Windows\
    \ 和 macOS。可以从 [`https://www.anaconda.com/distribution/`](https://www.anaconda.com/distribution/)\
    \ 下载。\n- 使用云服务。这是所有选项中最简单的一种，但需要互联网连接才能使用。诸如 Microsoft Azure Notebooks 和 Google\
    \ Collaboratory 等云提供商很受欢迎，可通过以下链接访问：\n  - Microsoft Azure Notebooks：[`https://notebooks.azure.com/`](https://notebooks.azure.com/)\n\
    \  - Google Collaboratory：[`https://colab.research.google.com`](https://colab.research.google.com)\n\
    \n我们将使用第二个选项，并使用 Anaconda 发行版搭建环境。\n\n# 软件安装\n\n从 [`https://www.anaconda.com/distribution/`](https://www.anaconda.com/distribution/)\
    \ 下载 Anaconda Python 发行版，如图 6-1 所示。\n\n![](img/524834_1_En_6_Fig1_HTML.jpg)\n\n\
    一个下载 Anaconda 的仪表盘，包含选项、产品、定价、解决方案、资源、博客和公司。在选项套件下方，有一段文字写着“你的数据科学工具包”。\n\n图 6-1\n\
    \n下载 Anaconda\n\n下载文件后，启动安装程序以开始安装过程。\n\n1. 点击“继续”。\n2. 在“自述”步骤，点击“继续”。\n3. 接受协议，然后点击“继续”。\n\
    4. 选择安装位置，然后点击“继续”。\n5. 它将在计算机上占用约 500MB 的空间。点击“安装”。\n6. 一旦 Anaconda 应用程序安装完成，点击“关闭”并进入下一步以启动应用程序。\n\
    \n# 启动应用程序\n\n安装 Anaconda Jupyter 后，打开命令行终端并输入 `jupyter notebook`。\n\n这将启动 Jupyter\
    \ 服务器，监听 8888 端口。通常，会有一个默认浏览器的弹出窗口自动打开，或者你可以通过打开任意网页浏览器并访问 URL `http://localhost:8888/`\
    \ 来登录应用程序，如图 6-2 所示。\n\n点击“新建” ➤ “Python 3” 以创建一个空白笔记本。\n\n![](img/524834_1_En_6_Fig2_HTML.jpg)\n\
    \n一个 Jupyter 笔记本的弹出窗口，左侧有文件、运行和集群选项。文件选项下包含一些项目，如应用程序、Creative Cloud 文件、桌面、文档和下载。右侧是\
    \ Python 3 的菜单栏，包含文本文件、文件夹和终端选项。\n\n图 6-2\n\nJupyter Notebook 用户界面\n\n一个空白笔记本将在新窗口中启动。你只需在单元格中输入命令，然后点击“运行”按钮来执行它们。为了测试环境是否正常工作，在单元格中输入\
    \ `print(\"Hello World\")` 语句并执行。\n\n本书使用 Python Notebooks 来演示 AIOps 的去重、动态基线设定和异常检测用例；这些\
    \ Notebooks 可在 [`https://github.com/dryice-devops/AIOps.git`](https://github.com/dryice-devops/AIOps.git)\
    \ 获取。你可以下载源代码以跟随本章的练习进行操作。\n\n现在，环境已准备好，可以为多个 AIOps 用例开发和测试算法模型。在进入模型开发之前，让我们先了解一些将用于分析和衡量模型性能的术语。\n\
    \n# 模型性能分析\n\n在实践中，需要创建多个模型来进行预测，量化其预测的准确性非常重要，以便选择性能最佳的模型用于生产环境。\n\n在监督式机器学习模型中，一组实际数据点被分为训练数据和测试数据。模型通过训练数据学习并进行预测，这些预测结果会与训练数据和测试数据进行验证。实际值与预测值之间的差值称为*误差*。目标是选择误差最小的模型。\n\
    \n有多种方法可以分析误差并衡量预测的准确性。以下是最常用的方法。\n\n## 均方误差/均方根误差\n\n在这种方法中，首先通过从预测结果值中减去实际结果值来计算每个数据点的误差。这些误差需要相加，以计算从特定模型获得的总误差。但不同数据点的误差可能为正或负，将它们相加会相互抵消，从而得出错误的结果。为了解决这个问题，在均方误差（MSE）中，对计算出的误差进行平方，以确保正负误差值不会相互抵消，然后对所有平方误差值取平均值，以确定整体准确性。\n\
    \n![](img/524834_1_En_6_Figa_HTML.png)\n\nMSE 的公式等于 1 除以 n 乘以从 i 等于 1 到小写 n 的求和，括号内为\
    \ Y 下标 i 减去 Y 帽下标 i 的平方。\n\n- ![](img/524834_1_En_6_Figb_HTML.jpg) 小写 n。 -> 数据点数量\n\
    - ![](img/524834_1_En_6_Figc_HTML.jpg) 大写 Y 下标小写 i。 -> 特定测试数据点的实际值\n- ![](img/524834_1_En_6_Figd_HTML.jpg)\
    \ 大写 Y 帽下标小写 i。 -> 特定测试数据点的预测值\n\nMSE 还有另一种变体，即对 MSE 取平方根，以提供均方根误差（RMSE）值。MSE/RMSE\
    \ 越低，预测的准确性越高，模型越好。\n\n![](img/524834_1_En_6_Fige_HTML.jpg)\n\nRMSE 的公式等于根号下从\
    \ i 等于 1 到小写 n 的求和，括号内为 y 帽下标 i 减去 y 下标 i 的平方，再除以 n。\n\nMSE 和 RMSE 都使用“均值”作为基线，这是这些方法最大的问题，因为均值对异常值具有固有的敏感性。简单来说，假设有四个数据点提供给模型\
    \ A 和模型 B。表 6-1 列出了每个模型在每个数据点上获得的误差。\n\n表 6-1\n\n机器学习模型中的样本数据和误差\n\n| 数据点 | 模型\
    \ A 的误差 | 模型 B 的误差 |\n| --- | --- | --- |\n| D1 | 0.45 | 0 |\n| D2 | 0.27 | 0\
    \ |\n| D3 | 0.6 | 0 |\n| D4（异常值） | 0.95 | 1.5 |\n\n模型 B 看起来是更好的模型，因为它除了在一个数据点（该点是异常值并产生了高误差）外，其他预测的准确率达到了\
    \ 100%。另一方面，模型 A 几乎在每个数据点上都产生了小误差。\n\n但如果考虑两个模型的误差均值，那么模型 A 的误差均值将低于模型 B，这会导致对模型准确性的错误解读。\n"
- fmt: '### Mean Absolute Error


    Similar to MSE, in the mean absolute error (MAE) approach the first error is calculated
    as the difference between the actual result value and the predicted result value,
    but rather than squaring the error value, MAE considers the absolute error value.
    Finally, the mean of all absolute error values is performed to determine the overall
    accuracy.


    ![](images/524834_1_En_6_Chapter/524834_1_En_6_Figf_HTML.jpg)


    An equation of `MAE = 1/n * Σ|Yi - ŷi|` from `i = 1` to `n`.


    ### Mean Absolute Percentage Error


    One of the biggest challenges of MAE, MSE, and RMSE is that they provide absolute
    values that can be used to compare multiple models’ accuracies. But there is no
    way to validate the effectiveness of an individual model as there is no scale
    defined to compare that absolute value. The output of these methods can take any
    value, and there is no range defined.


    Instead of calculating the absolute error, MAPE measures accuracy as a percentage
    by first calculating the error value divided by the actual value for each data
    point and then taking the mean of them.


    ![](images/524834_1_En_6_Chapter/524834_1_En_6_Figg_HTML.jpg)


    An equation of `MAPE = (100% / n) * Σ|(Yi - ŷi) / Yi|` from `i = 1` to `n`.


    MAPE is a useful metric and one of the most commonly used methods to calculate
    accuracy because the output lies between 0 and 100, enabling intuitive analysis
    of the model’s performance. It works best if there are no extremes or outliers
    and no zeros in data point values.


    ### Root Mean Squared Log Error


    One of the challenges in RMSE was the effect of outliers on the overall RMSE output
    value. To minimize (sometimes nullify as well) the effect of these outliers, there
    is another method called RMSLE, which is a variant of RMSE and uses the logarithmic
    property to calculate the relative error between the predicted value and the actual
    values instead of the absolute error.


    ![](images/524834_1_En_6_Chapter/524834_1_En_6_Figh_HTML.jpg)


    An equation of `RMSLE = sqrt((1/n) * Σ(log(ŷi + 1) - log(Yi + 1))^2)` from `i
    = 1` to `n`.


    In cases when there is a huge difference between the actual and predicted values,
    the error becomes large, resulting in huge penalties by RMSE but handled well
    by RMSLE. Also, to note that in cases where either the predicted value or actual
    value is zero, then the log of zero becomes not defined. That’s why one is added
    to both the predicted and actual values to avoid such situations.


    ### Coefficient of Determination - R² Score


    In statistics, R² is defined as the “proportion of the variation in the dependent
    variable that is predictable from the independent variable(s).” It measures the
    strength of the relationship between the model and the dependent variable on a
    convenient 0–100 percent scale.


    * 0 percent represents a model that does not explain any of the variations in
    the response variable around its mean.

    * 100 percent represents a model that explains all the variation in the response
    variable around its mean.


    After fitting a linear regression model, it is important to determine how well
    the model fits the data. Usually, the larger the R², the better the regression
    model fits your observations; however, there are caveats that are beyond the scope
    of this book.


    Having understood the various ways to measure accuracy of models, we will now
    proceed with our first AIOps use case, which is a deduplication of events.


    ## Deduplication


    Deduplication is one of the most primitive features of the event management function
    to reduce noise by processing millions of events arriving from multiple tools
    that are monitoring the underlying infrastructure and applications. Consider a
    simple and common scenario where a batch processing job gets triggered causing
    CPU utilization to cross the warning threshold of 70 percent and within 15 minutes
    backup gets initiated, shooting up the CPU utilization to 90 percent and generating
    a critical event. This event will be repeated for every poll that the monitoring
    system makes to this system, and once the scheduled job is over, the CPU utilization
    will return to its normal state. However, within this period, it has generated
    four events with different timestamps. But essentially, all these events represent
    the same issue of high CPU utilization on a server. There is a plethora of such
    operational scenarios, both simple and complex, that generate duplicate events.
    As shown in Figure [6-3](#524834_1_En_6_Chapter.xhtml#Fig3), the deduplication
    function manages this complexity to validate the uniqueness of a new event by
    comparing it against an existing event in the system, dropping it if a match is
    found along with an increasing counter of the original alert, and updating the
    timestamp based on the latest event generated. This helps in ensuring that the
    event console is not cluttered with the same event multiple times.


    ![](images/524834_1_En_6_Chapter/524834_1_En_6_Fig3_HTML.jpg)


    An illustration of the deduplication management function of original data to deduplicated
    data. The original data has 4 vertical layers with alphabets: A B C D, D C B A,
    B A D C, and B A D C. The deduplicated data has 4 alphabets with A, B, C and D.
    In the middle, there is a right-facing arrow marked as deduplication.


    **Figure 6-3** Deduplication function


    To implement the deduplication function, a unique key needs to be defined that
    defines unique issues and their context. This unique key gets created dynamically
    using information coming in the event such as the hostname, source, service, location,
    class, etc. A rule or algorithm can be configured to match this unique key with
    all events in the system and perform the deduplication function. Please note that
    this AIOps function does not need machine learning and can be simply done by using
    a rule-based deduplication system.


    Let’s observe the practical implementation of the deduplication function. This
    implementation will be reading alerts from an input file.


    In our code, we will be using `Pandas`, which is a powerful library of Python
    to analyze and process alerts, along with the `SQLite DB`, which is a lightweight
    disk-based database to store alerts after processing. Unlike client–server database
    management systems, `SQLite` doesn’t require a separate installation for a server
    process and allows accessing the database using a nonstandard variant of the SQL
    query language. `SQLite` is popular as an embedded database for local/client storage
    in software such as web browsers. `SQLite` stores the entire database (definitions,
    tables, indices, and the data itself) as a single cross-platform file on a host
    machine.


    After reading alerts from an input file, a unique key of `EMUniqueKey` will be
    dynamically created to determine the uniqueness of the issue and execute the deduplication
    function. At the end of the code, we will determine how many alerts were genuine
    alerts in our code and how many were duplicates.


    In this code we will be using the Python libraries mentioned in Table [6-2](#524834_1_En_6_Chapter.xhtml#Tab2).


    **Table 6-2** Sample Data and Errors in ML'
