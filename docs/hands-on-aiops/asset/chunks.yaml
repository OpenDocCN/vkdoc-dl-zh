- fmt: '*   `Sklearn`: This is one of the most important and widely used libraries
    for machine learning–related development as it contains various tools for modeling
    and predictions.


    Let’s begin writing code by importing the required libraries and functions, as
    shown here:


    ```python

    import pandas as pd

    import matplotlib.pyplot as plt

    import numpy as np

    import seaborn as sns

    from sklearn.model_selection import train_test_split

    from sklearn.linear_model import LinearRegression

    from sklearn.metrics import mean_absolute_error

    from sklearn.metrics import r2_score

    from sklearn.metrics import mean_squared_error

    percentmatplotlib inline

    import matplotlib as mpl

    import matplotlib.pyplot as plt

    ```


    Now read the performance data from the input file and observe the top five values
    in the dataset.


    ```python

    df = pd.read_excel("data.xlsx")

    df.head()

    ```


    Figure [7-3](#524834_1_En_7_Chapter.xhtml#Fig3) shows the sample values for CPU
    and memory utilization and the corresponding database response times.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig3_HTML.png)


    A table for sample values for CPU and memory has three columns with headers DB
    response time, CPU usage, and memory utilization MB.


    **Figure 7-3** CPU and memory utilization mapping with DB response time


    In the dataset we have utilization values of the parameters `DBResponseTime`,
    `CPUUsage`, and `MemoryUtilizationMB` as three different columns. Let’s find out
    how many datapoints are present in the dataset for analysis and prediction.


    ```python

    df.shape

    ```


    As shown in Figure [7-4](#524834_1_En_7_Chapter.xhtml#Fig4), there are a total
    of 24 rows in the dataset providing values for each of the three independent and
    dependent variables.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig4_HTML.jpg)


    `(24, 3)`


    **Figure 7-4** Count of data points in DataSet


    One of the important conditions for the applicability of linear regression algorithms
    is that there must exist a linear relationship between the input and output data
    points. Let’s first find out if the data satisfies this condition by plotting
    a graph between DB Response Time and CPU Usage.


    ```python

    sns.jointplot(x=df[''DBResponseTime''], y=df[''CPUUsage''], \

    data=df, kind=''reg'')

    ```


    As per the graph in Figure [7-5](#524834_1_En_7_Chapter.xhtml#Fig5), there exists
    a linear relationship between CPU Utilization and DB Response Time.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig5_HTML.jpg)


    A graph of CPU usage versus DB response time, where a line with scatter plots
    is graphed. The scatter plot has a tight pattern with an upward slope on either
    side of the line between (2.2, 6.8) and (6.5, 11) approximately. The vertical
    and horizontal bars with a curve line are graphed on the top and right windows,
    respectively.


    **Figure 7-5** Impact on DB ResponseTime due to CPU utilization


    Similarly, let’s validate the linear relationship between DB Response Time and
    Memory Usage.


    ```python

    sns.jointplot(x=df[''DBResponseTime''], y=df[''MemoryUtilizationMB''], \

    data=df, kind=''reg'')

    ```


    Figure [7-6](#524834_1_En_7_Chapter.xhtml#Fig6) also shows that a linear relationship
    exists between DB Response Time and Memory Usage, which satisfies the condition
    of applying the linear regression algorithm.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig6_HTML.jpg)


    A graph of memory utilization MB versus DB response time, where a line with scatter
    plots is graphed. The scatter plot has a tight pattern with an upward slope on
    either side of the line between (2.2, 980) and (6.5, 1800) approximately. The
    vertical and horizontal bars with a curve line are graphed on the top and right
    windows, respectively.


    **Figure 7-6** Impact of DB ResponseTime due to memory utilization


    Next, you need to extract data points of independent variables (CPU and Memory
    usage) in `X` and dependent variables (DB Response Time) in `Y`.


    ```python

    X = df[[''MemoryUtilizationMB'',''CPUUsage'']]

    Y = df[''DBResponseTime'']

    ```


    As discussed in supervised learning, the entire labeled dataset needs to be split
    into training data for learning purposes and testing data for validating the accuracy
    or quality of learning done by the model. Now this data needs to be split into
    testing and training data. In our example, we are considering the ratio of 80
    percent to 20 percent for splitting the dataset between testing and training data.


    ```python

    x_train, x_test, y_train, y_test = train_test_split(X, Y, \

    test_size = 0.2, random_state = 42)

    ```


    At this stage, we will invoke `LinearRegression` from the `Sklearn` library and
    apply (called the *fit method*) training data into this linear regression model
    to create the equation and learn from it.


    ```python

    LR = LinearRegression()

    # fitting the training data

    LR.fit(x_train,y_train)

    ```


    This model can now be used to predict values on the test data.


    ```python

    y_prediction =  LR.predict(x_test)

    y_prediction

    ```


    Based on the CPU and Memory Utilization values present in the test data, our model
    has forecasted DB Response Time Values, as shown in the output in Figure [7-7](#524834_1_En_7_Chapter.xhtml#Fig7).


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig7_HTML.png)


    `array([3.60063185, 5.02933512, 2.49967556, 5.33846418, 3.92287079])`


    **Figure 7-7** Forecasted database response time on test dataset


    Let’s compare the predicted values from the ML model with the actual observed
    values on the test dataset.


    ```python

    indices = np.arange(len(y_prediction))

    width = 0.20

    # Plotting

    plt.bar(indices, y_prediction, width=width)

    # Offsetting by width to shift the bars to the right

    plt.bar(indices + width, y_test, width=width)

    plt.xticks(ticks=indices)

    plt.ylabel("DB Response Time")

    plt.xlabel("Test Dataset ")

    plt.title("Predicted vs. Actual")

    valuesType=[''Predicted'',''Actual'']

    plt.legend(valuesType,loc=2)

    plt.show()

    ```


    As observed in the output in Figure [7-8](#524834_1_En_7_Chapter.xhtml#Fig8),
    predicted values are very close to the actual observed value. This indicates that
    the model is performing well.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig8_HTML.jpg)


    A double bar graph of predicted versus actual, where the vertical axis represents
    DB response time, and the horizontal axis represents the test dataset. The values
    across the test data set are as follows. Predicted: 3.6, 5, 2.3, 5.2 and 3.9.
    Actual: 3.3, 4.9, 2, 5.4, and 4. All the values are approximate.


    **Figure 7-8** Accuracy analysis of DB Response Time prediction on test data


    Let’s evaluate the performance of the model by calculating its R2 score.


    ```python

    score=r2_score(y_test,y_prediction)

    print("r2 score is ", score)

    print(''Root Mean Squared Error is ='',np.sqrt(mean_squared_error(y_test,\

    y_prediction)))

    r2 score is  0.9679128701220477

    Root Mean Squared Error is = 0.2102141626503609

    ```


    As per the output, the `r2` score value is 0.9679, which means that the model
    is predicting the database response time with around 97 percent accuracy for a
    given scenario of CPU and memory utilization, which is quite good. Based on the
    complexity and requirements, this model can be further expanded to include other
    independent variables such as the number of transactions, user connections, available
    disk space, etc., which makes this model production usable to perform capacity
    planning, upgrades, or migration-related tasks to improve DB response time, which
    will eventually improve the application performance and user experience.'
