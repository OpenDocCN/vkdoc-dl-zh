  raw: '## Summary


    In this chapter, we covered a step-by-step approach to implementing AIOps in an
    organization. We also covered what to watch out for while implementing AIOps and
    avoid pitfalls. We gave guidance on a successful implementation of a project and
    ways to measure success as well as the important KPIs to measure the success of
    an AIOps project.


    This brings us to the end of this book; we have covered AIOps in depth, beginning
    with the definition and areas that AIOps covers to a complete architecture of
    AIOps covering the Observe, Engage, and Act phases. We also covered various machine
    learning tools and techniques and algorithms that can be used in the AIOps domain.
    We gave you a detailed walk-through of the process that you can use to implement
    AIOps in your organization in a step-by-step manner. We sincerely hope that you
    enjoyed this book as much as we enjoyed authoring it. We look forward to your
    feedback and comments at `feedback@AgileInfraOps.com`.


