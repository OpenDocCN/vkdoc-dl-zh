    \ Your AIOps Landscape\n\nBefore embarking on any technology change, it is essential\
    \ to define what the goals are and what you trying to achieve. The team should\
    \ go through various areas in AIOps and identify what would work for them best.\n\
    \nThe next step should be to either define a subset where AIOps will be implemented\
    \ or define a phased approach to implementation where various functions and features\
    \ will be rolled out in stages.\n\nThus, you can go ahead and deploy the complete\
    \ suite of AIOps features for a specific business line or go step-by-step and\
    \ implement module by module for the entire enterprise as a whole. The decision\
    \ should be based on the organizational structure, team structure and size, scale,\
    \ and complexity. For a highly siloed and large organization, it would be better\
    \ to implement it in a business vertical, whereas a medium-sized organization\
    \ can proceed to implement it for the entire organization.\n\nThe first step in\
    \ the planning stage is to gather the data around the current implementation of\
    \ various tools and technologies and the ITSM processes. This should include the\
    \ following:\n\n*   Current monitoring tools landscape\n\n*   Current infrastructure\
    \ and application landscape\n\n*   Data sources for topology/CMDB\n\n*   Service\
    \ management tools\n\n*   Processes\n\n*   Command center function and procedures\n\
    \n*   Resolution groups and procedures\n\n*   Current issues and challenges in\
    \ monitoring and management\n\n*   Rule-based policies in existence for event\
    \ correlation\n\n*   Automation coverage and tools\n\nAfter gathering all of this\
    \ data, it is necessary to have a tollgate at this stage. The analysis of this\
    \ data will result in better understanding of the maturity of the organization\
    \ in terms of monitoring and service management. It is possible that the analysis\
    \ of this data may lead to another subproject where some of the basic elements\
    \ of monitoring or service management need to be enhanced or changed so that the\
    \ AIOps project gets the integrations and data for it to function.\n\nIf the analysis\
    \ results in another subproject to enhance the monitoring and management tools\
    \ or processes, it should be handled as a separate project under the same umbrella\
    \ program since the owners for this project may be different. The AIOps project\
    \ can continue on its journey while this monitoring enhancement project runs in\
    \ parallel.\n\nAs part of the data gathering, you should gather data on the current\
    \ KPIs so that before and after implementation of AIOps the KPIs can be compared.\
    \ The following KPIs are important indicators for measuring the success of AIOps\
    \ deployment and should be measured before implementation and on an ongoing basis\
    \ after deploying AIOps.\n\n*   Alert to incident ratio\n\n*   Mean time to respond\n\
    \n*   Mean time to resolve\n\n*   SLA metrics for P1 and P2\n\n*   Time for closure\
    \ of SRs\n\n*   Percentage of SRs automatically resolved\n\n*   Percentage of\
    \ incidents automatically resolved\n\n*   Availability of critical systems\n\n\
    The next step in the AIOps journey is to define data sources and their integration.\n\
    \n## Step 4: Define Integrations and Data Sources\n\nAfter having collected the\
    \ relevant data for the environment, you will have clarity on what integrations\
    \ are required. The integrations will be broadly with the following systems:\n\
    \n*   Monitoring tools\n    *   SNMP (NetBackup, SAP Solman, etc.)\n\n    *  \
    \ Syslog (config change alerts, UNIX kernel alerts, etc.)\n\n    *   APIs (Zabbix,\
    \ vCenter, etc.)\n\n    *   Other database-based connectors\n\n*   Service management\
    \ tools using APIs\n\n*   CMDB using APIs\n\n*   Knowledge management sources\
    \ using APIs\n\n*   Automation tools using APIs\n\nIn general, you will find multiple\
    \ monitoring tools in the environment. Some of them will support APIs, and the\
    \ data can be ingested into AIOps using API-based connectors. Tools like vCenter\
    \ provide APIs to check the status of the underlying visualized infrastructure;\
    \ others may send SNMP-based alerts. For example, SAP Solman triggers SNMP alerts\
    \ for SAP resources. There are multiple options for getting the data into the\
    \ AIOps engine; these should be evaluated and then implemented based on the best\
    \ approach.\n\nTypically, you will see network monitoring, server monitoring,\
    \ and application monitoring tools in the environment along with specialized tools\
    \ for monitoring backups, jobs, storage, and other OEM devices. All these need\
    \ to be integrated with the AIOps engine so that all the monitoring data resides\
    \ in the single engine for analytics and for its algorithms to be trained.\n\n\
    From a service management perspective, there will be typically one tool, and the\
    \ CMDB may be within the same toolset along with the KEDB and basic knowledge\
    \ management. Most of the leading tools provide APIs, so data can be easily ingested\
    \ using API-based connectors for these systems.\n\nAutomation tools may get integrated\
    \ based on use cases that you are planning for AIOps and whether you plan a direct\
    \ integration with AIOps or through service management tools.\n\nEven before the\
    \ AIOps engine gets trained, once integrations are complete, the organization\
    \ will start seeing the benefits of a single-pane-of-glass view into operations\
    \ with all alerts in a single console.\n\nThis stage concludes the important step\
    \ in the AIOps journey where prerequisites get completed and you actually start\
    \ the installation, deployment, and configuration steps, which will be covered\
    \ in subsequent sections."
  trans: "\n# 第一步：编写 AIOps 章程\n\nAIOps 不仅仅是技术变革，更是一种文化变革，涉及流程和人员技能的调整，因此需要获得高层管理者的承诺才能成功实施。\n\
    \nAIOps 会影响多个职能和团队，包括流程团队、流程负责人、指挥中心和 IT 运维部门。组织中可能还有其他举措，例如站点可靠性工程和 DevOps，这些都需要与\
    \ AIOps 计划保持一致。\n\n制定正式的项目章程、获得资金和高层领导的批准至关重要，这样才能确保 AIOps 项目获得所需的资金和关注。这将有助于获得受项目影响的各种团队的支持。一旦\
    \ AIOps 章程获得批准，下一步就是组建 AIOps 团队。\n\n# 第二步：组建你的 AIOps 团队\n\n下一步是为该项目组建一个团队。这需要一位专职项目经理和具有\
    \ AIOps 经验的领域专家，以及来自其他团队的成员，例如监控、可观测性、流程、ITSM 工具、指挥中心、IT 运维、DevOps 和 SRE 团队。\n\
    \n核心团队将负责实施 AIOps 系统；然而，由于该职能贯穿并集成于其他多种职能，因此建立更高级别的治理和报告机制非常重要。\n\n这是一场文化变革，在那些存在孤岛式层级结构和垂直分割职能的大型企业中，有必要让组织变革管理和人力资源团队参与进来，以便有效地推动跨职能变革，并通过流程导向的方法来处理变革中的人员方面问题。在此阶段，你需要开始探索和评估\
    \ AIOps 实施的范围和目标，我们将在下一步中对此进行介绍。\n\n# 第三步：定义你的 AIOps 蓝图\n\n在着手任何技术变革之前，必须明确目标以及你试图达成的成果。团队应审视\
    \ AIOps 的各个领域，并确定最适合他们的方案。\n\n下一步应该是定义实施 AIOps 的子集，或者定义一种分阶段实施的方法，逐步推出各种功能和特性。\n\
    \n因此，你可以为特定业务线部署完整的 AIOps 功能套件，也可以逐步为整个企业逐个模块地实施。决策应基于组织结构、团队结构和规模、以及复杂程度。对于高度孤岛化的大型组织，最好在某个业务垂直领域实施；而中型组织则可以着手为整个组织进行实施。\n\
    \n规划阶段的第一步是收集有关当前各种工具、技术以及 ITSM 流程实施情况的数据。这应包括以下内容：\n\n-   当前的监控工具布局\n-   当前的基础设施和应用布局\n\
    -   拓扑/CMDB 的数据源\n-   服务管理工具\n-   流程\n-   指挥中心职能和流程\n-   解决小组和流程\n-   当前监控和管理中的问题和挑战\n\
    -   现有的事件关联基于规则的策略\n-   自动化覆盖范围和工具\n\n收集完所有这些数据后，有必要在此阶段设置一个关卡。对这些数据的分析将有助于更好地了解组织在监控和服务管理方面的成熟度。对这些数据的分析可能会导致另一个子项目，其中需要增强或更改监控或服务管理的一些基本要素，以便\
    \ AIOps 项目能够获得其运行所需的集成和数据。\n\n如果分析结果导致需要另一个子项目来增强监控和管理工具或流程，则应将其作为同一总计划下的独立项目来处理，因为该项目的负责人可能不同。AIOps\
    \ 项目可以继续其进程，而监控增强项目则并行运行。\n\n作为数据收集的一部分，你应该收集当前 KPI 的数据，以便在实施 AIOps 前后对 KPI 进行比较。以下\
    \ KPI 是衡量 AIOps 部署成功与否的重要指标，应在实施前以及部署 AIOps 后持续进行衡量。\n\n-   告警与事件比率\n-   平均响应时间\n\
    -   平均解决时间\n-   P1 和 P2 的 SLA 指标\n-   服务请求关闭时间\n-   自动解决的服务请求百分比\n-   自动解决的事件百分比\n\
    -   关键系统的可用性\n\nAIOps 旅程的下一步是定义数据源及其集成。\n\n# 第四步：定义集成和数据源\n\n在收集了环境的相关数据后，你将清楚需要哪些集成。集成将主要涉及以下系统：\n\
    \n-   监控工具\n    -   SNMP（NetBackup、SAP Solman 等）\n    -   Syslog（配置变更告警、UNIX 内核告警等）\n\
    \    -   API（Zabbix、vCenter 等）\n    -   其他基于数据库的连接器\n-   使用 API 的服务管理工具\n-   使用\
    \ API 的 CMDB\n-   使用 API 的知识管理源\n-   使用 API 的自动化工具\n\n通常，你会在环境中发现多个监控工具。其中一些支持\
    \ API，数据可以通过基于 API 的连接器导入 AIOps。像 vCenter 这样的工具提供 API 来检查底层虚拟化基础设施的状态；其他工具可能发送基于\
    \ SNMP 的告警。例如，SAP Solman 会为 SAP 资源触发 SNMP 告警。有多种选项可以将数据导入 AIOps 引擎；应根据最佳方法对这些选项进行评估和实施。\n\
    \n通常，你会在环境中看到网络监控、服务器监控和应用监控工具，以及用于监控备份、作业、存储和其他 OEM 设备的专用工具。所有这些都需要与 AIOps 引擎集成，以便所有监控数据都驻留在单一引擎中，用于分析和训练其算法。\n\
    \n从服务管理的角度来看，通常只有一个工具，CMDB 可能与 KEDB 和基本知识管理位于同一工具集中。大多数主流工具都提供 API，因此可以轻松使用基于\
    \ API 的连接器为这些系统导入数据。\n\n自动化工具可能会根据你为 AIOps 规划的用例以及你是计划直接与 AIOps 集成还是通过服务管理工具集成来进行集成。\n\
    \n即使在 AIOps 引擎被训练之前，一旦集成完成，组织就会开始看到单一管理视图带来的好处，所有告警都集中在一个控制台中。\n\n此阶段标志着 AIOps\
    \ 旅程中一个重要步骤的完成，即先决条件已满足，你实际上可以开始安装、部署和配置步骤，这些将在后续章节中介绍。\n"
- fmt: '# Step 5: Install and Configure the AIOps Engine


    Once all the data sources and data has been identified, the next step is to start
    installing the AIOps engine. This depends on the tools and technology that you
    are choosing. Since these are complex systems, organizations generally take implementation
    services or professional services from partners who are well versed with the product
    and have the required expertise to implement these solutions. The Core AIOps team
    can shadow the implementation and learn and gain expertise while the AIOps engine
    is getting implemented. Alternatively, if the required skills and expertise are
    available in house, the team can start building the solution themselves.


    For large, complex deployments, it’s highly recommended to proceed with a phased
    approach to ensure minimal to zero disruption to the services or business. Trying
    to accomplish everything quickly in minimal time needs good experience and multiple
    stakeholders’ support. In the first or initial phase of implementation, install
    the base AIOps solution and select and integrate APM (transaction monitoring),
    platform, and network data sources based on the output from step 3 and step 4
    as explained earlier. These integrations will provide visibility into the health
    of servers, databases, and network devices, which covers the majority of organization
    estate.


    This phase provides good learning and ample confidence for subsequent phases.
    Learning from phase 1 can then be used for improving the existing integrations
    as well as executing other data sources integrations like APM (deep dive), storage,
    backup, VMware, SAP Solman, job scheduling, etc., in subsequent phases. It is
    important to note that selecting data sources for integration in a specific phase
    depends on the criticality and urgency of the organization’s requirements.


    Configuring the AIOps engine with all data sources integrations as defined in
    step 3 and step 4 may take time depending upon their coverage and maturity and
    organizational processes. For example, `vCenter` is planned to be integrated,
    but not all ESXs and farms are not configured in it, or an upgrade of storage,
    like EMC, comes during its integration with the AIOps engine. It is practically
    difficult to have detailed insight into all technology towers, especially in large
    organizations, and that’s why continuous feedback is important to tune the integrations
    and expand the coverage.


    To reduce complications and have better time to value (TTV), SaaS platforms can
    be leveraged. On SaaS platforms, it would not involve installation, so you can
    proceed directly with configuring the solutions once the AIOps vendor onboards
    you onto the platform.


    Once the AIOps engine is set up and configured, the next step is to set up and
    test the integrations. This involves getting the integration adapters configured
    and integrated. Each data source needs to be tested once the integration is set
    up to validate that the required data is being captured correctly in the AIOps
    engine.


    If you are directly integrating with automation, then the outbound integration
    to automation is also set up and configured.


    At this stage, your AIOps system is set up and ready for validation by the operations
    teams where they can see all the events and alerts in a single console. You can
    proceed to configure roles, users, and access based on roles and provide them
    with the required console and dashboards.


    At this stage, your AIOps engine acts like a central repository of all the data
    sources but doesn’t do any AIOps functionality and features for event management.


    # Step 6: Configure AIOps Features


    The next step is to use the core AIOps features of the platform to configure the
    event management functionality. We have already covered the various layers in
    event management in earlier chapters; these need to be implemented and configured
    in the system. For large and complex deployments, this step happens in parallel
    with the integration phases of step 5. Functions such as deduplication, enrichment,
    topology correlation, application correlation, anomaly detection, etc., process
    the events coming from integrations with various data sources and select the qualified
    alerts for incident creation and subsequent automation of diagnosis and remediation.
    Again, continuous feedback is important while configuring the AIOps features and
    functions to tune the performance and accuracy of the AIOps engine. We have discussed
    in detail the implementation and best practices around these AIOps functions in
    previous chapters.


    After configuring all the features, the system starts to learn from the data and
    the feedback being provided by the operations teams and forms a continuous loop
    where new data and new feedback provides new inputs to the AIOps engine to fine-tune
    itself and improve its coverage and accuracy.


    Once you have set up everything and the system is up and running, you should monitor
    the system on an ongoing basis for accuracy and any drift that may happen in the
    data. During its lifetime there will be new integrations and new tools that may
    come up in the environment that need integration with the AIOps engine. These
    need to be handled as and when new monitoring capabilities are brought into the
    environment.


    # Step 7: Deploy the Service Management Features


    You can start using the capabilities of AIOps in the service management space
    next. As defined earlier in the Engage layer, the step-by-step approach can be
    implemented, and each function or feature can be rolled out as part of the plan.
    The detailed activities in AIOps service management will start with the integration
    of the Observe layer with incident creation and assignment, and the remaining
    features in the Engage layer will get implemented in order. An organization that
    prefers a highly cautious approach can proceed with selective automatic incident
    creation, such as creating automatic incidents only for production servers or
    only for a down event, etc., and then gradually expand automatic incident and
    auto-assignment for other types of qualified alerts, continuously improving both
    mean time to respond and mean time to repair.


    # Step 8: Deploy Automation Features


    Once the AIOps engine has been configured for the Observe and Engage phases the
    automation actions can be configured.


    The automation engine needs to be configured in two phases. Phase-1 can be referred
    as “human assisted automation”, where the AIOps engine provides probable cause
    that needs to be validated by the human agents and the automation engine provides
    the recommendation for resolution that also needs validation by the human agent.


    Once the AIOps Observe engine has run its course over a few weeks and reached
    a level of confidence score and once the probable cause can be considered as the
    root cause and the confidence score of the automation engine has also reached
    a threshold based on the feedback from human actions, we can proceed to deploy
    the system in fully automated mode.


    From here on, the system will gradually adding more root cause and automations
    to its repository to cover more areas under full automation mode.


    Ensure that all the modules are monitored for accuracy and any drift that may
    happen is tracked and remediated for the accuracy levels to be maintained. New
    automation runbooks and tools may get deployed in the environment and will need
    integrations as and when they are available in the environment.


    Once the AIOps system is set up and ready, it is time to observe and measure its
    value and benefits.'
