  trans: "\n### 监督（归纳）学习\n\n在监督学习中，用户为特定任务向机器学习算法提供训练数据，供其分析学习。训练数据既包含输入（称为*特征*），也包含正确输出（称为*标签*）。一个简单的例子是某个事件及其描述、时间戳、发生次数、发生的设备，以及它是关键告警还是噪音。一旦系统获得足够的数据样本，它就能学会区分告警和噪音。训练数据越多，系统的准确率就越高。\n\
    \n随后，该模型被应用于未见过的数据作为输入，供算法预测响应。该模型对于算法寻找所提供参数之间的关联，并在数据集中的特征之间建立因果关系至关重要。训练结束时，算法会形成一份关于数据运作方式以及输入与输出之间关系的草案。\n\
    \n对于机器学习算法，带标签的数据集被分为训练数据和测试数据。训练数据集用于训练算法，之后测试数据集被输入模型以衡量其预测的准确性。随后，模型会逐步进行微调，以达到更高的准确率。\n\
    \n训练数据的数量和质量对于决定输出的准确性都至关重要。根据最佳实践，数据集应按照 70:30 的比例划分为训练集和测试集。如果数据集中存在类别分布不均的情况，则称为*不平衡*训练数据集，这意味着某个特定类别/标签的记录非常多，而另一个类别/标签的记录非常少。不平衡的数据集会导致决策边界不完善，从而造成预测不准确。从\
    \ AIOps 的角度来看，训练数据集应使用正确的带标签参数来代表实际的生产或运营特征。\n\n提高预测准确性的另一个重要因素是移除不相关的特征，因为它们会对学习过程产生负面影响。特征是构成数据的一部分的各种输入；重要的是，训练中只应提供相关的特征。训练数据中的错误、不足或不相关数据都会导致模型出错。\n\
    \n从 AIOps 的角度来看，最常用的监督机器学习算法如下：\n\n-   *回归*：回归用于预测一个连续的数值。例如，在任何特定时间间隔内，找出 CPU\
    \ 的使用率百分比、网站点击次数、数据库容量（GB）等。\n-   *分类*：如果期望从一组有限的类别中获取一个离散值，则使用分类。我们已经见过一个将事件分类为告警或噪音的例子。根据预测输出是属于两个类别之一还是多个类别之一，分类用例被标记为二分类问题或多分类问题。\n\
    \n以下是监督机器学习算法：\n\n-   回归\n-   逻辑回归\n-   分类\n-   朴素贝叶斯分类器\n-   K-NN（K-最近邻）\n- \
    \  决策树\n-   支持向量机\n\n了解了监督机器学习技术后，让我们探索另一种关键的机器学习技术：无监督学习。\n\n### 无监督学习\n\n在任何组织中实施\
    \ AIOps 的一大挑战是获取干净的带标签数据。在这种情况下，无监督机器学习为 AIOps 之旅提供了起点。与监督学习不同，它不需要任何“正确答案”作为标签。相反，这些算法从数百万个未标记的数据点中探索固有的模式和关系，以发现数据中隐藏的相关性和模式。无监督学习算法可以通过动态改变隐藏的相关性来适应数据。它允许模型自行工作，发现以前未被检测到的模式和信息。由于没有训练数据，完全由算法自行解读和理解数据，因此它在计算上比监督学习更密集。由于没有提供训练，也没有专家输入给算法，它的准确性也低于监督学习。有时，无监督学习用于进行初步分析，然后在获得更多见解后将数据输入监督学习算法。尽管无监督学习不使用标签，但人类仍然需要分析生成的输出以理解数据并微调模型，以便产生预期的结果。\n\
    \n以下是 AIOps 中最常用的一些无监督机器学习算法。\n\n*聚类*通过分割来识别数据集中的异常，聚类基于数据集中特征和模式之间的相似性和差异性。多个聚类有助于运维团队诊断问题和异常。聚类将整个数据集划分为彼此更相似的子集，从而无需任何训练就能洞察数据。聚类会将相似的事件聚集在一起，然后可用于进一步分析数据，并选择需要用于\
    \ AIOps 的适当机制和算法。\n\n*关联*基于从数据集中推导出的相关性来发现实体之间的关系。例如，服务器上一个长时间运行的数据库作业可能与高 CPU\
    \ 使用率相关，并可能导致网站点击或事务的响应时间变长。\n\n从 AIOps 的角度来看，数据点应暴露给无监督学习，以利用聚类和关联算法进行根因分析。作为最佳实践，所有事件和告警都应输入无监督学习算法，以确定噪音。\n\
    \n降维是一种在给定数据集中特征数量过多时使用的学习技术。它在保持数据完整性的同时，将数据输入的数量减少到可管理的大小。通常，该技术用于数据预处理阶段。这确保了噪声特征或与当前任务不相关的特征被减少。\n\
    \n以下是无监督学习的类型：\n\n-   聚类\n    -   独占（划分）\n    -   凝聚\n    -   重叠\n    -   概率\n\
    \n以下是最常用的聚类算法：\n\n-   *层次聚类*：顾名思义，这种聚类算法使用聚类的“层次结构”将数据分解成簇，并形成一种称为*树状图*的树形结构。从\
    \ AIOps 的角度来看，它有助于在没有 CMDB 的情况下自动检测服务模型，并对其执行服务影响分析。您可以遵循自上而下的方法（分裂）或自下而上的方法（凝聚）来将数据点分组到簇中。在分裂方法中，所有数据点都被假定为一个大簇（如应用服务）的一部分，然后根据终止逻辑，它们被分成更小的簇（如技术服务）。在凝聚方法中，每个数据点被假定为一个簇，然后通过迭代合并来创建更大的簇。\n"
- fmt: '# 聚类算法


    *   *基于质心的聚类*：这类算法是创建聚类并将数据点分配到其中的最简单、最有效的方法之一。在此算法中，我们首先需要找到“K”个质心，然后根据与质心的距离（或邻近度）对数据集进行分组。`K-means`是一种流行的基于质心的聚类算法，我们将在第[8](#524834_1_En_8_Chapter.xhtml)章中详细探讨它，用于IT运维中AIOps实施过程中的异常检测、噪声检测和根因分析。


    *   *基于密度的聚类*：基于质心和基于层次的聚类技术都基于数据点之间的距离（或邻近度），而没有考虑特定位置（或时间戳）上数据点的密度。这一局限性由基于密度的聚类算法解决，并且这些技术在从数据集中检测离群点和噪声方面比`K-means`算法表现更好。


    接下来，我们将讨论强化学习，这是另一种用于特定场景的技术。


    ## 强化学习


    监督学习和无监督学习算法都依赖于数据集进行学习。但你也可以从对你行为的反馈中学习，无论这种反馈是奖励还是惩罚。强化学习利用了这种方法，并由一系列行动的反馈驱动。它通过试错法不断改进和学习。强化学习算法基于涉及奖励和惩罚的训练。因此，对于每一个成功的行动，智能体都会获得奖励；而对于每一个不成功的步骤，则会受到惩罚。强化学习策略决定了智能体应该做什么。它还涉及调整短期和长期的奖励与惩罚，以防止智能体为了短期奖励而错失长期更大的回报。除了智能体、奖励与惩罚以及策略之外，另一个重要元素是智能体运行的环境。因此，在智能体的每一步，智能体及其环境的状态都会被反馈到系统中，以计算下一步要采取的行动。强化学习为一些在传统游戏和视频游戏中击败人类玩家的AI系统提供了动力。


    图[5-2](#524834_1_En_5_Chapter.xhtml#Fig2)总结了我们在机器学习中讨论过的算法。


    ![](images/524834_1_En_5_Chapter/524834_1_En_5_Fig2_HTML.png)


    一个带有标题“机器学习算法”的模型树状图有三个分支：监督学习、无监督学习和强化学习。每个学习分支有两个子分支及其输出。这些子分支分别是回归、分类、聚类、关联、分类和控制。


    图5-2


    机器学习算法的类型


    ## 监督学习与无监督学习的区别


    在监督学习中，目标是通过利用从训练数据中学到的知识来预测新数据的结果。在此模型中，结果对应的类别是已知的，因此你可以从一组可能的结果中知道最终结果是什么。对于无监督学习算法，目标是从可用数据中获取洞察，算法会根据提供的数据自行决定特征。无监督学习的输出及其类别是未知的。


    监督学习模型适用于我们知道类别并且有足够的训练数据来训练机器学习算法的数据。监督学习算法广泛用于价格预测、预测、情感分析以及其他分类和回归任务。无监督机器学习则广泛用于推荐引擎、异常检测等场景。


    监督学习算法更准确，因为训练数据是由领域专家整理、验证和提供的；而无监督算法则不那么准确，需要人工干预来解释结果。训练监督学习算法需要花费时间和精力来创建训练数据，而对于无监督学习，则无需创建训练数据。


    在了解了所有三种学习技术之后，让我们来理解如何从可用于实现这些技术的各种选项中进行选择。


    ## 选择机器学习方法


    选择正确的机器学习方法类型取决于多种因素。


    *   *目标*：目标是更详细地理解数据及其相关性和特征吗？目标是将相似的数据聚类在一起进行分析吗？还是对离散或连续变量进行概率预测？根据应用的最终目标，你需要在监督学习和无监督机器学习之间做出选择。


    *   *数据*：是否有可用的训练数据和标记数据？这些数据能否被提供？如果可以，那么你可以选择监督学习；否则，在没有训练数据的情况下，你需要选择无监督机器学习技术。


    到目前为止，在AIOps中讨论的机器学习技术可能需要处理大量文本数据，而不仅仅是指标。自然语言处理（NLP）使得使用机器学习技术分析文本数据成为可能，接下来将对此进行讨论。


    ## 自然语言处理


    NLP是AI领域内的关键研究领域之一，它处理自然语言文本中包含（或者说隐藏）的信息。NLP利用语言语义和语法来确定上下文以及通过文本传达的真实含义和情感。


    NLP使AIOps系统能够从组织内可用的各种规则手册和知识文章中挖掘知识，并搜索供应商仓库或在线社区中的最新信息。个人几乎不可能在有限的时间窗口内扫描和吸收成千上万份文档中的知识，并据此执行特定的任务或操作。从NLP获得的知识极大地有助于改进强化学习算法、高效执行自动化解决方案，以及在处理故障时为SRE和DevOps提供建议和指导。


    聊天机器人曾经被视为可选实体，如今已成为企业（尤其是服务行业）的必备品。得益于新兴技术，最终用户获得了自助服务能力，这让他们感到更有主动权。借助NLP，聊天机器人可以进行类似人类的有意义对话，而不仅仅是给出预定义的有限回复。这成为AIOps系统中的一个巨大差异化优势。让我们更详细地了解自然语言处理过程。'
  raw: '*   *Centroid-based clustering*: These algorithms are one of the simplest
    and most effective ways of creating clusters and assigning data points to them.
    In this algorithm, we have to first find “K” centroids and then group dataset
    based on the distance (or proximity) with centroids. K-means is a popular centroid-based
    clustering algorithm, and we will be exploring it in detail in Chapter [8](#524834_1_En_8_Chapter.xhtml)
    for anomaly detection, noise detection, and probable cause analysis processes
    as part of the AIOps implementation in IT operations.


    *   *Density-based clustering*: Both centroid-based and hierarchical clustering
    techniques are based on the distance (or proximity) between data points without
    considering the density of data points at a specific position (or time stamp).
    This limitation is handled by a density-based clustering algorithm, and the techniques
    perform much better than K-means algorithms for outlier detection and noise from
    data set.


    Next, we will discuss reinforcement learning, which is another technique that
    is used in specific situations.


    ### Reinforcement Learning


    Both supervised and unsupervised algorithms have a dependency on the dataset for
    learning. But you can also learn from feedback on your actions whether it is in
    the form of a reward or penalty. Reinforcement learning leverages this methodology
    and is driven by feedback from the sequence of action. It continuously improves
    and learns by the trial-and-error method. The reinforcement learning algorithms
    are based on training that involves reward and penalty. Thus, for every successful
    action, a reward is given to the agent, and for every unsuccessful step a penalty
    is levied. The reinforcement learning policy determines what is expected from
    the agent. It also involves tweaking the short-term and long-term rewards and
    penalties so that the agent does not go for short-term rewards while losing out
    on a bigger reward in the longer run. Apart from the agent, reward and penalty,
    and policy, the other important element is the environment in which the agent
    is operating, so at every step of the agent the state of the agent and its environment
    is fed back into the system to calculate what steps to take next. Reinforcement
    learning powers some of the AI-based systems that have outplayed human agents
    in traditional and video games.


    Figure [5-2](#524834_1_En_5_Chapter.xhtml#Fig2) summarizes the algorithms that
    we have discussed in machine learning.


    ![](images/524834_1_En_5_Chapter/524834_1_En_5_Fig2_HTML.png)


    A model tree diagram with header machine learning algorithms has three branches,
    supervised, unsupervised, and reinforcement learning. Each learning has two sub-branches
    with outputs. The sub-branches are regression, classification, clustering, association,
    classification, and control.


    Figure 5-2


    Types of ML algorithms


    ## Differences Between Supervised and Unsupervised Learning


    In supervised learning, the goal is to predict outcomes for new data by leveraging
    the learnings from the training data. In this model, the categories are known
    for the result, so you know what the end result will be from a set of possible
    outcomes. With an unsupervised learning algorithm, the goal is to get insights
    from the available data, and the algorithm decides on the features from the data
    provided. The output of unsupervised learning and their categories is not known.


    Supervised learning models are ideal for data where we know the categories and
    we have sufficient training data available to train the machine learning algorithm.
    Supervised learning algorithms are used extensively in price prediction, forecasting,
    sentiment analysis, and other classification and regression tasks. Unsupervised
    machine learning is used extensively in recommendation engines, anomaly detection,
    etc.


    Supervised leaning algorithms are more accurate since the training data is curated,
    validated, and provided by subject-matter experts, while unsupervised algorithms
    are not as accurate and require human intervention for interpretation of the result.
    Training supervised learning algorithms requires time and effort to create the
    training data, while for unsupervised learning, there is no requirement to create
    training data.


    With an understanding of all three learning techniques, let’s understand how to
    choose from various options that are available to us for implementing these technologies.


    ## Choosing the Machine Learning Approach


    Choosing the right type of machine learning approach depends on various factors.


    *   *Objective*: Is the objective or goal to understand the data and its correlation
    and features in more detail? Is the goal to cluster together similar data for
    analysis? Or is the goal a probabilistic prediction of a discrete or continuous
    variable? Dependent on the end goal of the application, you need to choose between
    supervised and unsupervised machine learning.


    *   *Data*: Is there availability of training and labeled data? Can this data
    be made available? If yes, then you can go for supervised learning; otherwise,
    in absence of training data, you need to opt for unsupervised machine learning
    techniques.


    ML techniques discussed so far in AIOps may need to deal with a lot of textual
    data and not just the metrices. Natural language processing (NLP) made it possible
    to analyze text data using ML techniques and will be discussed next.


    ## Natural Language Processing


    NLP is one of the key research fields within the AI domain that deals with processing
    information contained (or rather hidden) in natural language text. NLP uses language
    semantics and syntax to determine the context as well as real meaning and emotions
    getting conveyed via text.


    NLP enables an AIOps system to mine knowledge from various rulebooks and knowledge
    articles available within the organization as well as search the latest information
    available in vendor repositories or online communities. It is practically impossible
    for an individual to scan and ingest knowledge from various thousands of documents
    available and accordingly perform specific tasks or actions in a limited time
    window. Knowledge obtained from NLP helps tremendously in improving reinforcement
    learning algorithms, executing automated resolutions efficiently, and providing
    recommendations and guidance to SRE and DevOps while dealing with an outage.


    Chatbots, which were once considered as an optional entity, have become a must-have
    for business, especially in the service industry. Thanks to the emerging technology,
    self-service capabilities are given to end users, which makes them feel empowered.
    With NLP, chatbots can have a human-like meaningful conversation instead of just
    giving predefined limited responses to queries. This becomes a huge differentiator
    in an AIOps system. Let’s understand the natural language process in more detail.'
