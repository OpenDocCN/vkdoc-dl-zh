  trans: '

    ### 应用拓扑关联


    此关联利用应用组件之间的关系来构建应用架构。它可以简单如一个运行在集群中多个虚拟机监控程序上并托管各种虚拟机的`vCenter`集群。也可以是一个更复杂的业务应用架构，例如一个运行在多个节点上的保险理赔处理系统，这些节点托管着
    Web 服务器、数据库服务器、EDI 系统和 SAP 系统。


    与仅考虑系统可用性的网络拓扑关联不同，应用关联既考虑应用的可用性，也考虑其性能。这种关联不仅需要网络拓扑的详细信息，还需要应用蓝图和关键性能指标的细节。考虑一个例子：当收到一个关于数据库进程宕机的告警时，会进一步引发以下告警：


    - 来自应用服务器的应用队列请求过高

    - 来自 Web 服务器的应用 URL 响应时间过长

    - 来自负载均衡器的合成监控超时告警


    此时，事件管理可能还会收到许多其他不相关的告警。在这种情况下，所有系统都处于运行状态，但问题出在应用层面。此时，应用层面的关联有助于隔离故障。


    理想情况下，应用架构或蓝图应该可用（或被发现）并作为服务模型存储在 CMDB 中。但由于以下三个最常见的原因，组织在维护这些蓝图方面面临诸多挑战：


    - 发现应用拓扑需要领域知识来确定在发现过程中需要检测的模式。发现工具的主题专家并不具备如此广泛的领域知识。

    - 信息是联合的，并且存在于由多个团队管理的不同工具中。

    - 获取读取应用日志/服务/进程的权限存在挑战。日志通常包含 PII/PHI/机密数据，这会引起安全和应用团队的警觉。


    从 AIOps 的角度来看，每当与应用相关的告警到达时，算法应利用应用拓扑来执行必要的关联。考虑到 CMDB 的这些挑战，可以使用 AIOps 算法来学习模式和依赖关系，并自动推导出拓扑。在我们的示例拓扑中，算法可以使用以下特征来理解拓扑并执行应用关联：


    - 通过分析主机名/IP 地址的相似性来学习，因为属于同一应用的服务器通常在主机名中共享共同的前缀或共同的子网细节。

    - 通过分析事件的到达时间并从中检测模式来学习。

    - 通过分析事件中的消息文本来学习，判断其属于可用性类别还是性能类别，或者在短时间内同时出现的事件中是否存在共同的应用/服务名称。

    - 通过分析事件类别和来源来学习。来自多个运维管理数据库（OMDB）的数据，如`vCenter`、`SAP`、`SCCM`等，在此学习过程中非常有用，因为这些是管理不同配置项（CI）的来源。例如，`vCenter`数据库提供了虚拟机到
    ESX 集群的映射数据，其中事件源将是`vCenter`，类别将是`Virtualization`。类似地，`SAP`可以提供应用映射细节，其中源将是`SAP
    System`，类别将是`Application`。算法可以使用这些数据来关联事件，并找出问题是源于底层虚拟机监控程序还是应用性能。

    - 与网络拓扑关联类似，您可以将关键应用的应用拓扑数据存储在事件管理层，并让系统从中学习。除非应用运行在云或 SDI 上，否则应用拓扑的更新频率通常不如网络拓扑数据高，因此可以按月或按季度同步。对于基于云和
    SDI 的应用，使用原生 API 并在变更发生时立即更新拓扑数据相对容易。


    ```

    {"application_topology": [

    {"child-ci": " dummy-db-1 ", "parent-ci": " " ,"application":"dummy_app","kpi":["type":"process","name":"
    dummy-process"]},

    {"child-ci": " dummy-db-2 ", "parent-ci": " " ,"application":"dummy_app","kpi":["type":"process","name":"
    dummy-process"]}

    {"child-ci": "dummy-app-1 ", "parent-ci": " dummy-db-1", "application”: “dummy-app","kpi":["type":"service","name":"
    app_service "]},

    {"child-ci": "dummy-app-2 ", "parent-ci": " dummy-db-2" ,"application":"dummy_app","kpi":["type":"service","name":"
    app_service "]},

    {"child-ci": "dummy-web-1 ", "parent-ci": " ntwrk-lb-1" ,"application":"dummy_app","kpi":["type":"url","name":"
    dummy-url.com "]},

    {"child-ci": "dummy-web-2 ", "parent-ci": " ntwrk-lb-1" ,"application":"dummy_app","kpi":["type":"url","name":"
    dummy-url.com "]},

    {"child-ci": " dummy-web-1 ", "parent-ci": " dummy-app-1 "     ,"application":"dummy_app","kpi":["type":"url","name":"
    dummy-    url.com "]},

    {"child-ci": " dummy-web-2 ", "parent-ci": " dummy-app-2 " ,"application":"dummy_app","kpi":["type":"url","name":"
    dummy-    url.com "]}

    ]}

    ```


    假设运行在`dummy-db-1server`上的数据库进程宕机，它将生成一个数据库告警，以及来自`dummy-app-1`的应用队列告警和来自`dummy-web-1`服务器的
    URL 响应时间告警。利用上述数据，事件管理系统可以创建集群，关联这些告警，并突出显示哪些是原因，哪些是受影响的对象。


    应用拓扑或服务模型的可用性无疑可以提高算法的准确性，但这并非 AIOps 的必备要求。有监督和无监督机器学习算法都显示出巨大潜力，并且可以在执行应用拓扑关联方面提供很大帮助。


    ## 总结


    本章涵盖了 AIOps 中关于使用 K-means 聚类进行异常检测的重要用例。您还使用了诸如停用词移除和 TF-IDF 等 NLP 技术来理解文本数据。您学习了其他技术，如应用依赖关系映射和
    CMDB，以及它们与 AIOps 的相关性。在下一章中，我们将介绍如何将 AIOps 作为一项实践在组织中建立起来。


    # 9. 建立 AIOps


    本章为 AIOps 之旅提供了最佳实践，并就如何在您的组织中建立 AIOps 提供了指导。


    在了解了 AIOps、其技术及其优势之后，现在是时候看看如何在组织中实施 AIOps 了。图 9-1 描述了在组织中建立 AIOps 实践的步骤。


    ![](img/524834_1_En_9_Fig1_HTML.jpg)


    在组织中实施 AIOps 有 10 个步骤，每个步骤包含两个要点。这些步骤是：定义 AIOps 章程、组建 AIOps 团队、规划环境、数据源和集成方法、安装
    AIOps 引擎、配置 AIOps 功能、部署服务管理功能、自动化功能、衡量成功，以及庆祝和分享成功。


    **图 9-1** AIOps 建立流程


    让我们从定义 AIOps 章程开始 AIOps 之旅。

    '
- fmt: "# Step 1: Write an AIOps Charter\n\nAIOps is not just a technology change;\
    \ it is a cultural change that involves changes to processes and people skills,\
    \ so it needs commitment from executive management for it to be implemented successfully.\n\
    \nAIOps impacts various functions and teams including process teams, process owners,\
    \ the command center, and IT operations. There may also be other initiatives in\
    \ the organization such as site reliability engineering and DevOps that need alignment\
    \ with the AIOps initiative.\n\nHaving a formal project charter, funding, and\
    \ approval of executive leadership so that the AIOps project can get the required\
    \ funding and attention is essential. This will help get the buy-in from various\
    \ teams that are going to be impacted by the project. Once the AIOps charter gets\
    \ approved, the next task is to build the AIOps team.\n\n# Step 2: Build Your\
    \ AIOps Team\n\nThe next step is to get a team together for this project. This\
    \ needs a dedicated project manager and subject-matter experts with AIOps experience\
    \ along with members from other teams such as monitoring, observability, process,\
    \ ITSM tools, the command center, IT operations, DevOps, and SRE.\n\nThe core\
    \ team will implement the AIOps system; however, since this function cuts across\
    \ and integrates with various other functions, it is important to have a higher\
    \ level of governance and reporting mechanism.\n\nIt is a cultural change, and\
    \ in large enterprises with siloed hierarchies and vertically split functions,\
    \ it is necessary to get representation from organizational change management\
    \ and HR teams so that this is driven across various functions effectively and\
    \ the people aspect of the change is handled through a process-oriented approach.\
    \ At this stage, you need to start exploring and evaluating the scope and goals\
    \ for an AIOps implementation, which we will be covering next.\n\n# Step 3: Define\
    \ Your AIOps Landscape\n\nBefore embarking on any technology change, it is essential\
    \ to define what the goals are and what you trying to achieve. The team should\
    \ go through various areas in AIOps and identify what would work for them best.\n\
    \nThe next step should be to either define a subset where AIOps will be implemented\
    \ or define a phased approach to implementation where various functions and features\
    \ will be rolled out in stages.\n\nThus, you can go ahead and deploy the complete\
    \ suite of AIOps features for a specific business line or go step-by-step and\
    \ implement module by module for the entire enterprise as a whole. The decision\
    \ should be based on the organizational structure, team structure and size, scale,\
    \ and complexity. For a highly siloed and large organization, it would be better\
    \ to implement it in a business vertical, whereas a medium-sized organization\
    \ can proceed to implement it for the entire organization.\n\nThe first step in\
    \ the planning stage is to gather the data around the current implementation of\
    \ various tools and technologies and the ITSM processes. This should include the\
    \ following:\n\n- Current monitoring tools landscape\n- Current infrastructure\
    \ and application landscape\n- Data sources for topology/CMDB\n- Service management\
    \ tools\n- Processes\n- Command center function and procedures\n- Resolution groups\
    \ and procedures\n- Current issues and challenges in monitoring and management\n\
    - Rule-based policies in existence for event correlation\n- Automation coverage\
    \ and tools\n\nAfter gathering all of this data, it is necessary to have a tollgate\
    \ at this stage. The analysis of this data will result in better understanding\
    \ of the maturity of the organization in terms of monitoring and service management.\
    \ It is possible that the analysis of this data may lead to another subproject\
    \ where some of the basic elements of monitoring or service management need to\
    \ be enhanced or changed so that the AIOps project gets the integrations and data\
    \ for it to function.\n\nIf the analysis results in another subproject to enhance\
    \ the monitoring and management tools or processes, it should be handled as a\
    \ separate project under the same umbrella program since the owners for this project\
    \ may be different. The AIOps project can continue on its journey while this monitoring\
    \ enhancement project runs in parallel.\n\nAs part of the data gathering, you\
    \ should gather data on the current KPIs so that before and after implementation\
    \ of AIOps the KPIs can be compared. The following KPIs are important indicators\
    \ for measuring the success of AIOps deployment and should be measured before\
    \ implementation and on an ongoing basis after deploying AIOps.\n\n- Alert to\
    \ incident ratio\n- Mean time to respond\n- Mean time to resolve\n- SLA metrics\
    \ for P1 and P2\n- Time for closure of SRs\n- Percentage of SRs automatically\
    \ resolved\n- Percentage of incidents automatically resolved\n- Availability of\
    \ critical systems\n\nThe next step in the AIOps journey is to define data sources\
    \ and their integration.\n\n# Step 4: Define Integrations and Data Sources\n\n\
    After having collected the relevant data for the environment, you will have clarity\
    \ on what integrations are required. The integrations will be broadly with the\
    \ following systems:\n\n- Monitoring tools\n  - SNMP (NetBackup, SAP Solman, etc.)\n\
    \  - Syslog (config change alerts, UNIX kernel alerts, etc.)\n  - APIs (Zabbix,\
    \ vCenter, etc.)\n  - Other database-based connectors\n- Service management tools\
    \ using APIs\n- CMDB using APIs\n- Knowledge management sources using APIs\n-\
    \ Automation tools using APIs\n\nIn general, you will find multiple monitoring\
    \ tools in the environment. Some of them will support APIs, and the data can be\
    \ ingested into AIOps using API-based connectors. Tools like vCenter provide APIs\
    \ to check the status of the underlying visualized infrastructure; others may\
    \ send SNMP-based alerts. For example, SAP Solman triggers SNMP alerts for SAP\
    \ resources. There are multiple options for getting the data into the AIOps engine;\
    \ these should be evaluated and then implemented based on the best approach.\n\
    \nTypically, you will see network monitoring, server monitoring, and application\
    \ monitoring tools in the environment along with specialized tools for monitoring\
    \ backups, jobs, storage, and other OEM devices. All these need to be integrated\
    \ with the AIOps engine so that all the monitoring data resides in the single\
    \ engine for analytics and for its algorithms to be trained.\n\nFrom a service\
    \ management perspective, there will be typically one tool, and the CMDB may be\
    \ within the same toolset along with the KEDB and basic knowledge management.\
    \ Most of the leading tools provide APIs, so data can be easily ingested using\
    \ API-based connectors for these systems.\n\nAutomation tools may get integrated\
    \ based on use cases that you are planning for AIOps and whether you plan a direct\
    \ integration with AIOps or through service management tools.\n\nEven before the\
    \ AIOps engine gets trained, once integrations are complete, the organization\
    \ will start seeing the benefits of a single-pane-of-glass view into operations\
    \ with all alerts in a single console.\n\nThis stage concludes the important step\
    \ in the AIOps journey where prerequisites get completed and you actually start\
    \ the installation, deployment, and configuration steps, which will be covered\
    \ in subsequent sections."
