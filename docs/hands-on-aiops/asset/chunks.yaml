- fmt: '# What Is Natural Language Processing?


    Natural human language is complex; it has various variations that may mean the
    same thing. It is ambiguous at times, it is dependent on the context of the object
    or situation, and it is extremely diverse. Thus, it comes with its own set of
    challenges when we try to make machines interpret or decipher the language. We
    haven’t used the word *understand* here, because the machines may not have an
    understanding of the language like we have. That’s why deciphering and interpreting
    what we are trying to communicate is more appropriate.


    `NLP` is the domain in artificial intelligence that makes it possible for computers
    to understand human language. `NLP` analyzes the grammatical structure of sentences
    and the individual meaning of words; it uses machine learning and deep learning
    algorithms and other specific `NLP` techniques to extract meaning from the provided
    input. Thus, `NLP` is the technology that makes machines decipher human language,
    and machines can take input using natural human language rather than software
    code.


    `NLP` technology is used extensively in various use cases; however, it is most
    visible in the form of virtual assistants like Apple Siri, Google Assistant, Microsoft
    Cortana, and Amazon Alexa. You will also find cognitive virtual assistants in
    many applications and websites where you can type in your query in human language
    and the system will be able to decipher it and return an answer. All these systems
    use `NLP` technologies behind the scenes.


    Beyond the chatbots and virtual assistants, there are many other applications
    that use `NLP`. Text recommendations or next word suggestions when you are trying
    to key in terms in a search engine, language translation when you use Google Translation
    Services, spam filtering in email, sentiment analysis of posts or Twitter feeds—all
    these use cases use `NLP` technologies.


    In a nutshell, the goal of `NLP` is to make human language—which is complex, ambiguous,
    and extremely diverse—easy for machines to understand.


    `NLP` and machine learning are both subsets of artificial intelligence. To create
    `NLP` algorithms, machine learning technologies are used. Since it is a domain
    in itself, `NLP` is called out separately as a domain in artificial intelligence
    technologies. There are techniques, algorithms, and systems entirely devoted to
    `NLP`.


    `NLP` applies two techniques to help computers understand text: syntactic analysis
    and semantic analysis.


    ## Syntactic Analysis


    Syntactic analysis—or parsing—analyzes text using basic grammar rules to identify
    sentence structure, how words are organized, and how words relate to each other.
    Some of its main subtasks include the following:


    *   *Tokenization* consists of breaking up text into smaller parts called tokens
    to make text easier to handle. This is the first step in `NLP` to break down the
    text into tokens so that it can be processed further by the `NLP` engine.


    *   *Part-of-speech tagging (PoS tagging)* labels the tokens that are generated
    from tokenization as noun, adjective, verb, adverb, etc. This helps the `NLP`
    engine to infer the meaning of the word in a particular context. For example,
    the word *Saw* can mean seeing in the past or it can be a noun pointing to the
    object `Saw`.


    *   *Stop-word removal* removes frequently occurring words that don’t add any
    semantic value, such as *I*, *they*, *have*, *like*, *yours*, etc.


    *   *Stemming* converts a word into root form by removing suffixes. For example,
    *Studying* will be converted to *Study*. It refers to a crude heuristic process
    that trims ends of words to find the correct root most of the time but is less
    resource extensive as well as fast.


    *   *Lemmatization* also converts the word into the root but by using vocabulary
    and morphological analysis of word with the aim to remove inflectional endings
    and return the base or dictionary form of a word. For example, it replaces an
    inflected word with its base form, so *Saw* gets converted into *See*. Lemmatization
    is more accurate but more resource extensive and complex.


    *   *Anaphora resolution* deals with the problem of resolving what a pronoun such
    as *he* or a noun such as *CEO* refer to.


    ## Semantic Analysis


    Semantic analysis focuses on capturing the meaning of text. It follows a two-step
    process. First it tries to extract the meaning of each individual word, and then
    it looks at the combination of words to decipher what they mean in a particular
    context.


    *   *Word-sense disambiguation*: This deals with the problem of determining the
    true meaning or sense of a word that is used in the sentence. This impacts the
    output of anaphora resolution as well.


    *   *Relationship extraction*: Relationship extraction analyzes the textual data
    and tries to find relationships between various entities. Entities can be various
    nouns such as people, places, geographies, objects, etc.


    `NLP` tools and techniques are highly applicable in the `AIOps` domain. Chatbots
    or cognitive virtual agents are one of the modules in `AIOps` powered by `NLP`
    technologies. Within the cognitive virtual assistant there are multiple `NLP`
    services and techniques that are combined to deliver the cognitive virtual assistant.
    With an understanding of the `NLP` technique, let’s discuss its `AIOps` use cases.


    # NLP AIOps Use Cases


    `NLP` plays a crucial role in `AIOps` systems in the understanding of textual
    data in alert messages (`SNMP` traps, emails, event IDs, etc.), incidents, user
    chat messages, log contents, and many other sources that convey issues or feedbacks.
    `NLP` enables the interpretation of such text for `AIOps` systems and accordingly
    takes the appropriate actions. Let’s explore some of the `NLP` use cases in `AIOps`.


    ## Sentiment Analysis


    Sentiment analysis identifies emotions in text and classifies the data as positive,
    negative, or neutral.


    While using ticket data or chat data, sentiment analysis is a key use case. For
    every ticket feedback and for every conversation initiated and closed with the
    agents, you can leverage sentiment analysis to find out how the users feel about
    the services rendered. This comes in handy during a cognitive virtual assistant
    conversation as well because the cognitive virtual agent can tailor its responses
    based on the sentiment of the user. As an example, if a user is angry, the cognitive
    virtual agent can start the conversation with a pacifying statement like “sorry
    for the inconvenience caused” and make the conversation more natural and human-like
    rather than a robotic conversation where the sentiment may get ignored.


    ## Language Translation


    Many IT operations support multiple geographies and languages, and it becomes
    difficult for IT service administrators and service desk agents to cover 24/7
    for all languages. Thus, language translation services come in handy for service
    desk agents to translate the ticket data or conversation data and use that to
    pinpoint the user’s issue and resolve it. Language translation is used both in
    cognitive virtual assistants and in user-to-agent communication. Translation services
    also find their utility in analyzing the ticket data that may have been provided
    in different languages.


    ## Text Extraction


    Text extraction enables you to pull out predefined information from text. IT teams
    typically deal with large volumes of data in various knowledge management repositories.
    There is also data in known error databases (`KEDBs`) in IT service management
    systems. There is also voluminous data in technical documentation that provides
    information for root-cause analysis, troubleshooting, and resolution. All this
    information becomes overwhelming for operations teams. `AIOps` systems extract
    the relevant information from these repositories and present the right information
    to administrators and service desk agents so they can troubleshoot and resolve
    issues or complete service request and changes.'
