- fmt: '#### Integration


    For data ingestion to happen, there needs to be integrations available in AIOps
    platforms. AIOps platforms should support both push and pull integrations. In
    a push model, the monitoring tools or forwarders can forward the data to the AIOps
    engine. In a pull model, the AIOps tools have the capability to pull the data
    from various monitoring systems.


    The other aspect of integration is real time and periodic data upload; the event,
    metric logs, and trace data is integrated on a real-time basis since the operations
    teams need to take immediate actions. The discovery and CMDB data can be integrated
    with the AIOps system periodically, say, every day and weekend as a batch job
    or just after the synchronization of the CMDB jobs. This helps in keeping the
    AIOps data up-to-date on the topology and relationships. However, in cloud computing
    and software-defined environments, the discovery of CMDB data is real time, and
    the integration is done on a real-time basis during provisioning and deprovisioning
    using infrastructure as code.


    The adapters for integration to various monitoring and management systems are
    part of the AIOps system. These need to be configured to bring data from different
    systems into a single Big Data repository for data analytics and inference.


    #### Event Suppression


    Using the integrations and data ingestion, all the data from various monitoring
    and management tools is ingested into the AIOps solution. This voluminous data
    needs to be cleaned to reduce the noise. The first step is event suppression,
    where unwanted alerts are suppressed or eliminated from the system. Care should
    be taken that any data that is relevant for further processing or can provide
    any information to the AIOps engine is not discarded during suppression. An example
    of suppression may be the information events in event and log sources. These events
    are only for informational purposes and do not indicate an underlying problem
    in the system. Another type of data that may be there in ingested log files could
    be the successful executions; this data is again for information and not relevant
    for finding any issues with the system. In other systems, events that are warnings
    may also be discarded during the event suppression phase; this decision needs
    to be taken by the domain experts.


    Without event suppression, the AIOps system will be overloaded with data, which
    is not needed for further processing and analytics.


    #### Event Deduplication


    Once events are suppressed, the next step is event deduplication. Deduplication
    is an important step in the processing of AIOps data. In this step, duplicate
    events are clubbed together and deduplicated. As an example, if a system is down,
    the monitoring tool may send in this data every one minute; the data shows the
    same information but with a different timestamp. The AIOps system takes this data
    and increments the counter of the original event and then updates the time stamp
    to reflect when the last event for this system and this particular event occurred.
    This gives the required information to the AIOps system as well as the engineers
    on what systems are down from what time and what is the timestamp of the last
    data point. Deduplication ensures that the event console is not cluttered with
    multiple events in the console and relevant information is available.


    Deduplication preserves the information that is sent by successive events that
    remain in the system and is used for processing by the AIOps system; however,
    rather than showing it multiple times, the information is aggregated in the console
    and database.


    Without event deduplication, the event console will become cluttered with many
    events showing the same event again and again.


    #### Rule-Based Correlation


    AIOps systems use machine learning technologies to analyze the data. Traditional
    systems used rule-based correlation to decipher and analyze the data. In AIOps
    systems, rule-based correlation still plays an important role, and there may be
    policies in an organization that need implementation through rule-based configuration
    rather than using probabilistic machine learning models. An example of this could
    be a rule that increases the severity of an event based on the type of a system
    being development or production. This is achieved by looking up the CMDB to find
    the type of the device and then applying a rule or policy to upgrade or downgrade
    the severity of the event based on the system’s categorization. There are other
    important rules that are required in AIOps systems like “maintenance window,”
    where the alerts are suppressed for the period of any maintenance or patching
    activity. This reduces noise in the system and prevents the event console from
    showing alerts for systems that have been rebooted or shut down for maintenance
    activities.


    Rule-based correlation also has a subtype called *topology-based correlation*.
    Topology and relationships between systems are used both in rule-based correlation
    as well as in machine learning–based correlation. In rule-based systems the topology
    of the system and their relationship is used to suppress or correlate events.
    For example, if a switch is down, then all servers or infrastructure beyond the
    switch is unreachable from the monitoring systems. The topology-based correlation
    will flag these events, correlate all infrastructure events with the switch-down
    event, and flag the switch as a probable root cause for all these events.


    #### Machine Learning–Based Correlation


    The machine learning–based correlation that is provided by AIOps tools is what
    makes it AIOps. The other features that we discussed were available with traditional
    platforms, but machine learning–based capabilities are the ones that differentiate
    AIOps products from other event management and event correlation engines. Figure
    [2-4](#524834_1_En_2_Chapter.xhtml#Fig4) shows various types of correlation that
    are performed by the AIOps engine.


    ![](images/524834_1_En_2_Chapter/524834_1_En_2_Fig4_HTML.png)


    An illustration of various types of correlation performed by machine learning.
    The correlations that circulate clockwise around machine learning are anomaly
    detection, event correlation, root cause analysis, and predictive analysis.


    Figure 2-4


    AIOps-driven correlation engine


    In this section, we will take a deeper look at each of these types, beginning
    with anomaly detection.'
