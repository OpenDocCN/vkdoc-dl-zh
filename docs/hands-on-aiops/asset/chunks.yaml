  trans: '

    # 自动化基线化概述


    在传统监控工具中，基线是静态且基于规则的，并设定在预定水平。例如，CPU 利用率基线可设为 95%。当服务器 CPU 利用率超过此阈值时，便会触发事件。然而，这种方法面临的挑战在于基线或阈值不能是静态的。设想一个场景：某个应用程序在本地时间凌晨
    2 点运行一个 CPU 密集型数据处理任务，导致 CPU 利用率达到 99%，直到任务在凌晨 2:30 结束。这是该应用程序的常规行为，但由于静态基线阈值，仍会生成一个事件。但此警报无需任何干预，因为一旦任务完成且
    CPU 利用率恢复正常，它会自动关闭。由于这种静态阈值基线化，运维中会产生许多此类误报事件。


    自动化基线化在此类场景中大有裨益，因为它考虑了系统的动态行为。它通过分析历史性能数据来检测真正需要关注的性能问题，并通过调整基线阈值来消除噪音。在上述场景中，系统会自动提高阈值，并且在凌晨
    2:30 之前不会生成事件。然而，如果同一台机器在上午 9 点出现 CPU 峰值，则会生成一个事件。


    需要注意的是，在微服务架构中，动态基线阈值的工作方式会略有不同，因为底层基础设施会根据利用率或负载的增加而自动扩展。在进行动态基线化时，需要考虑应用程序架构和基础设施利用率的这些方面。


    运维中的噪音会导致以下低效问题：


    -   增加运维需要管理的事件数量，进而增加运维团队的时间和精力。

    -   用误报事件充斥运维控制台，导致遗漏重要的、可操作的有效事件。

    -   导致自动化诊断和修复失败。由于事件本身是虚假的，自动化解决方案会被不必要地触发。


    自动化基线化可以减少噪音及相关低效问题。自动化基线化可以通过利用监督式机器学习技术来实现，该技术从历史数据中学习，并根据数据的日、周、月、年季节性规律预测动态阈值。从
    AIOps 的角度来看，有三种核心算法是实现自动化基线化的关键。本章将从回归算法开始，探讨这些方法。


    ## 回归


    这类算法用于确定多个变量之间的关系，并预测目标变量的值。例如，基于对营销支出的历史分析，预测下个月的销售收入。线性回归主要属于统计学领域，但被机器学习广泛用于预测建模，并在多个领域有广泛应用，例如预测股票价格、产品的销售价格比、房价等。回归算法有多种变体，但线性回归算法是机器学习中最常用的回归算法之一。图
    7-1 列出了一些重要的线性回归算法，我们将在下一节讨论线性回归。


    ![](img/524834_1_En_7_Fig1_HTML.jpg)


    一个圆形被标记为回归类型。右侧给出的回归类型如下：线性回归、多项式回归、支持向量回归、决策树回归、随机森林回归、岭回归、套索回归和逻辑回归。


    图 7-1


    回归算法


    ### 线性回归


    该算法适用于数据集中的输入和输出变量呈现线性关系，且输出变量为连续值（例如 CPU 的百分比利用率）的情况。


    在线性回归中，从数据集中选取的输入变量（称为*自变量*或*特征*）用于预测输出变量（称为*因变量*或*目标值*）的值。从数学上讲，线性回归模型通过一条最佳拟合直线（称为*回归线*）建立因变量（`Y`）与一个或多个自变量（`Xi`）之间的关系，并由方程
    `Y = a + bXi + e` 表示，其中 `a` 是截距，`b` 是直线的斜率，`e` 是预测值与实际值之间的误差。当存在多个自变量时，称为*多元线性回归*。


    让我们首先理解只有一个自变量的简单线性回归。


    在图 7-2 的图表中，有一组呈现线性关系的实际数据点，一条假想的直线穿过这些数据点的中间位置。


    ![](img/524834_1_En_7_Fig2_HTML.jpg)


    因变量 `y` 与自变量 `X` 的关系图。八条垂直线，顶端带点的回归线表示实际数据，连接在 `y` 截距 `a` 与 `y` 等于 `a` 加 `bX`
    加 epsilon 之间的倾斜线的顶部和底部。两条水平线和垂直线，delta `X` 和 delta `y` 与回归线构成一个三角形。


    图 7-2


    简单线性回归


    这条假想的直线就是回归线，它由预测的数据点组成。每个实际数据点与这条直线之间的距离称为*误差*。可以画出多条穿过这些数据点的直线，因此算法通过计算所有点的距离来找到使误差最小化的最佳直线。无论哪条直线产生的误差最小，它就成为回归线并提供最佳预测。从
    AIOps 的角度来看，线性回归提供了相关性预测能力，但它并不显示因果关系。


    现在让我们了解如何实现线性回归，以根据服务器的内存利用率（MB）和 CPU 利用率（百分比）来预测数据库响应时间（秒）。这里我们有两个自变量，即 CPU 和内存，因此我们将使用多元线性回归模型，根据
    CPU 和内存的具体利用率值来预测数据库响应时间。


    你可以从 [`https://github.com/dryice-devops/AIOps/blob/main/Ch-7_AutomatedBaselinig-Regression.ipynb`](https://github.com/dryice-devops/AIOps/blob/main/Ch-7_AutomatedBaselinig-Regression.ipynb)
    下载代码。


    让我们首先从文件 [`https://github.com/dryice-devops/AIOps/blob/main/data.xlsx`](https://github.com/dryice-devops/AIOps/blob/main/data.xlsx)
    中导出参数 CPU 利用率、内存利用率和数据库响应时间的数据，该文件如表 7-1 所示。


    表 7-1


    CPU 和内存利用率与数据库响应时间的映射关系


    | -![](img/524834_1_En_7_Figa_HTML.jpg)一个 CPU 和内存利用率映射表，包含三列，标题分别为数据库响应时间、CPU
    使用率和内存利用率（MB）。 |


    除了 `Pandas` 和 `Matplotlib`，我们还将使用下面列出的其他 Python 库：


    -   `NumPy`：这是 Python 开发中最广泛使用的库，用于执行矩阵、线性代数和傅里叶变换等数学运算。

    -   `Seaborn`：这是另一个基于 `Matplotlib` 库的数据可视化库，主要用于生成信息丰富的统计图形。

