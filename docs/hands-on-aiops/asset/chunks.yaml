  trans: '

    # 4. AIOps 支持 SRE 与 DevOps


    正如 AIOps 正在颠覆 IT 运维的技术和流程一样，IT 运维领域也在发生着其他变革性的变化。


    `DevOps` 作为一种运动已获得发展势头，如今已横跨开发、基础设施和运维领域。随着云基础设施和云原生应用成为常态，`DevOps` 正在扩展其覆盖范围，将端到端的工作流程（从开发到部署）都纳入其中。`AIOps`
    支持 `DevOps` 模式，并促进开发和运维团队之间的协作。


    同样，另一个与之密切相关但在运维方面略有不同的运动是站点可靠性工程（`SRE`），其重点在于管理和运营应用与平台，并关注可靠性、可用性和自动化。


    本章将解释 `AIOps`、`DevOps` 和 `SRE` 模式如何相辅相成，以及如何通过使用 `AIOps` 技术来支撑 `DevOps` 和 `SRE`
    服务。


    让我们从 `SRE` 模式和 `DevOps` 的概述开始。


    ## SRE 与 DevOps 概述


    `AIOps` 并非唯一改变 IT 运行方式的学科。`DevOps`、`Agile` 和 `SRE` 是其他正在改变 IT 运维的学科。`Agile` 和
    `DevOps` 推动了组织中的文化转变，其中敏捷性和交付速度，加上开发与运维之间的协作，为采用这些方法的企带来了益处。同样，`AIOps` 正在改变开发和运维团队之间利用数据和分析进行协作的方式，并提供以前无法获得的洞察和知识。通过
    `ChatOps` 和知识管理，`AIOps` 为开发和运维团队的协作提供了技术基础。`AIOps` 和 `DevOps` 共同将组织推向更高水平的自动化和成熟度。


    `AIOps` 提供了能够将数据、数据分析和机器智能结合起来的技术的访问途径，通过收集和分析数据来做出明智的决策并执行自动化操作。图 4-1 展示了从计划到部署的
    `DevOps` 流程，以及我们在前几章讨论过的各种 `AIOps` 功能。


    ![](img/524834_1_En_4_Fig1_HTML.png)


    一张展示 AIOps 大数据和机器学习功能的图片，这些功能围绕构建、测试、发布、监控和计划流程。左侧图标标记为 DevOps 团队，右侧图标标记为客户。


    图 4-1


    AIOps 与 DevOps，强强联合


    `AIOps` 和 `DevOps` 应在整个企业中采用，以发挥其优势；将它们部署在部门孤岛中不会使组织在成熟度阶梯上向上移动。尽管 `DevOps` 实施通常遵循逐步实施的方法，但
    `AIOps` 需要监控和管理空间中的所有数据，以便更好地关联数据并提供洞察和分析。


    `AIOps` 消除了噪音，从而有助于使 `DevOps` 更加高效。有了 `AIOps`，系统中的误报会减少，这减少了 `DevOps` 团队分析系统中误报的无效工作。在
    `AIOps` 模式下，`DevOps` 团队会收到来自各个系统的单一告警，而不是多个告警，同时还会收到可能的根本原因，这样他们就可以集中精力解决问题，而不是试图解读和分析因应用或基础设施问题而产生的众多告警。


    因此，`AIOps` 支持 `DevOps`，并帮助 `DevOps` 团队实现 Dev 和 Ops 之间更大协作的愿景。`AIOps` 通过一个平台帮助打破
    Dev 和 Ops 之间的界限，并通过消除浪费、帮助团队集中精力将 `DevOps` 流程提升到更高的成熟度水平，并提供更高的可用性和敏捷性，从而使 Dev
    和 Ops 团队的工作都变得更加轻松。`AIOps` 是支撑 `SRE` 和 `DevOps` 的基础。因此，`DevOps` 和 `SRE` 模式可以从
    `AIOps` 提供的机器学习能力中获益，如图 4-2 所示。


    ![](img/524834_1_En_4_Fig2_HTML.jpg)


    一张图片，显示一个带有“大脑”标签的阴影圆圈，标记为 AIOps。左侧有一个阴影框，标记为 DevOps，指向圆圈。右侧有一个阴影框，标记为 SRE，指向圆圈。


    图 4-2


    AIOps 在 SRE 与 DevOps 之间协作


    在当今世界，如此多的关键业务任务已经数字化，IT 团队必须在确保零停机时间的同时应对持续的变化。


    在现代数字化 IT 运维世界中，`DevOps` 团队协同工作，各自负责自己的微服务。`DevOps` 团队由 `SRE` 团队或嵌入 `DevOps` 团队的个人提供支持，其主要
    `SRE` 角色是维护应用的高可用性。站点可靠性工程师通过分析运维数据流，向 `DevOps` 团队提供洞察，以改进应用的架构和代码。


    `SRE` 面临的挑战是在不同系统之间提高稳定性、可靠性和可用性，而应用团队则以快速的速度交付新功能。为了实现目标，站点可靠性工程师必须比故障提前一步，并快速解决事件。然而，缺乏
    `AIOps` 工具会导致团队被噪音淹没，难以隔离根本原因并提供即时分析和建议。


    手动分析告警数据正变得越来越不可能。获取大量告警数据并使用 `Excel` 和其他 `BI` 工具来分析数据将不再可行，因为监控和管理数据量巨大且格式多样。`SRE`
    团队能够消除噪音并专注于作为事件根本原因的告警至关重要。


    由于团队分布在不同地点，协作也成为一个挑战。拥有不同微服务（这些微服务组合在一起创建应用）所有权的 `SRE` 和 `DevOps` 团队如何解决事件？他们从哪里获取数据、可视化工具和协作工具来运行运维？`AIOps`
    通过为 `DevOps` 和 `SRE` 团队提供高效运行运维所需的工具和技术来提供帮助，为他们提供可视化、仪表板、拓扑和配置数据，以及与当前问题相关的告警。因此，`AIOps`
    提供了一个独特的解决方案来应对运维挑战。


    因此，`SRE` 团队正在采用 `AIOps` 工具来帮助应对这些挑战，包括采用 `AIOps` 进行事件分析和修复。


    以下是企业在评估其 `SRE` 运维以确定对 `AIOps` 需求时应提出的几个问题：


    *   您是否为 `DevOps` 和 `SRE` 团队配备了有效的协作工具？

    *   您的组织是否使用自动化和工具来提高弹性？

    *   您的 `SRE` 团队能否管理好 `SLA` 和错误预算？

    *   您的 `SRE` 团队收到的是正确的告警，还是被误报所淹没？

    *   您的 `SRE` 能否通过自动化机制快速找到根本原因？

    *   您是否在使用 `ChatOps` 并在运行运维的同时生成知识？

    *   您的 `SRE` 是否使用自动化进行事件解决和配置更改？


    根据环境复杂性、流程成熟度以及在工具和解决方案上的投资，不同组织定义和实施的 `SRE` 原则可能有所不同。在下一节中，我们将讨论与 `AIOps` 相关的、可供组织广泛采用的最佳实践和
    `SRE` 原则，以及 `AIOps` 如何支持 `SRE` 模式的关键原则。

    '
- fmt: '# SRE Principles and AIOps


    Site reliability engineering has gained traction as a domain and skill in recent
    years. With application and infrastructure complexity increasing because of many
    architectural choices, availability and resilience are essential in both architecture
    and operations. The SRE model is built on the following principles; you will see
    how AIOps enables most of them.


    ## Principle 1: Embracing Risk


    Embracing risk means weighing the costs of improving reliability and the impact
    it has on customer satisfaction. No service can be reliable 100 percent of the
    time. There is also a cost trade-off with reliability; after a certain point,
    adding more reliability would mean doubling the cost or even increasing the cost
    multifold. As an example, to support 99.95 availability versus supporting 99.999,
    the cost difference can be multiple times. Thus, there has to be a balance between
    the goal for reliability and the cost associated with it.


    SRE service level agreements around availability and response time coupled with
    error budgets support this principle where they are free to manage availability
    within the SLA ranges. The SREs have a right to reject changes to applications
    or infrastructure if they are running low on error budget. Also, the SRE focus
    is on getting the services up and running as quickly as possible, which may involve
    taking some level of risk with quick decision-making.


    AIOps helps SREs in this principle by providing them with all the data to measure
    SLIs and SLOs and then aggregate them under SLAs. The AIOps tools enable quick
    resolution of incidents using automated mechanisms that can be fired by the SREs
    to resolve availability problems. The AIOps models and analytics are not deterministic
    but probabilistic and thus carry an element of uncertainty and will never be 100
    percent accurate and thus align with the SRE model.


    ## Principle 2: Service Level Objectives


    The observability data forms the basis for service level indicators that provide
    data on things like availability, response time, etc. These metrics are then aggregated
    under service level objectives (SLOs). Service level objectives are set to the
    point where the customers will feel dissatisfaction with a service. The service
    level indicators and objectives will be different for different types of business
    requirements and users. As an example, we have a 100 percent availability expectation
    when it comes to mission-critical applications or internet-scale applications
    like search and email. However, we may not have the same expectations from less
    critical systems like a timesheet application. Similarly, our requirements for
    response time from a mail or search engine application versus an ERP application
    are different. Service level objectives take the business and customer context
    and apply it on top of the service level indicators to arrive at the objective
    or target that the SRE team is willing to live with. An example could be 99.95
    availability.


    Service level objectives are for a timeframe. For example, an objective could
    be to meet the 99.95 availability goal on a monthly basis.


    SLOs also leave room for an error budget. Whenever a failure or degradation affects
    the service, the error budget decreases. Thus, in the previous example, .05 percent
    is the error budget available.


    It is difficult to achieve granular SLIs and SLOs and measure them accurately
    without AIOps. With basic monitoring and fragmented monitoring tools working in
    silos, it is extremely difficult to calculate and arrive at application availability
    or business process availability. Thus, AIOps is essential to provide the correct
    data on the availability and response time of an application or business process
    to enable the SREs to have granular and correct data to arrive at the right SLIs
    and SLOs.


    ## Principle 3: Eliminating Toil


    Eliminating toil means reducing the amount of repetitive work a team must do.


    This is an extremely important principle for SREs; it differentiates the SRE model
    from other operations models that do not have metrics to measure and eliminate
    toil. SREs carry targets for toil elimination, and for this there are two important
    elements. One is the ability to measure toil in the system, and the second is
    to eliminate toil rapidly so that the teams can focus on more value-adding work.


    SREs eliminate toil by automating routine and standard work that does not need
    human intelligence for every transaction. Things like health checks, routine checks,
    reporting, automated monitoring, and autoremediation for known errors are some
    of the tasks that SREs work to automate.


    Another way SREs eliminate toil is by creating guides or standard operating procedures
    so that the knowledge base is enriched and can be quickly searched and used whenever
    required.


    AIOps comes to the rescue here in more ways than one. Though not many AIOps products
    support algorithmic or machine learning–based automation systems, but there are
    a few upcoming products like `iAutomate` that use machine learning technologies
    to manage automation work. AIOps products provide capabilities where the SRE teams
    can use algorithms to estimate the amount of toil and keep track of automation
    and its benefits using analytics to identify, automate, and report on toil. The
    tools also come with built-in automations that can be used easily by the SREs
    to eliminate toil rapidly without having to create automations from scratch.'
