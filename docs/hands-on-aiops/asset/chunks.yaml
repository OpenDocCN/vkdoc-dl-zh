    # AIOps 的优势


    已部署 AIOps 解决方案的企业体验到了变革性的优势。其中一些优势如下：


    - **更高的系统可用性**：这是 AIOps 的关键原因和优势之一，可确保持续的服务和不间断的业务。事实证明，AIOps 是一个潜在的颠覆者，可在当今运行容器化应用的混合基础设施中确保最大可用性。


    - **减少人为错误**：由于基础设施和应用环境的复杂性不断增加且变化速度加快，大多数中断都是由人为错误引起的。这是采用 AIOps 系统的另一个杠杆，因为
    AIOps 自动化了大部分重复性和日常性任务。


    - **更好的平均修复时间 SLA 合规性**：这是任何 IT 运营的目标，也是业务部门的真实期望。AIOps 系统与 ITSM 功能的集成使其成为可能，它通过揭示有用的见解、发现问题的模式，并支持与自动化解决方案协作以快速解决问题。所有这些都意味着平均修复时间得以缩短，并帮助
    IT 运营团队不仅满足而且超越当前的 SLA。


    - **更好的事件自动检测**：这是 AIOps 的另一个关键优势。AIOps 系统通过减少因创建误报事件而产生的噪音，消除了大量浪费。AIOps 系统会对事件进行彻底分析，以确定是否创建具有适当严重级别的事件。这节省了
    IT 运营团队在追逐误报时浪费的时间。


    - **预测和预防中断**：AIOps 可实现主动运营，并成为衡量运营绩效的重要 KPI。AIOps 系统会生成智能建议，帮助 IT 运营实现这一目标。


    - **成本优化**：IT 仍被许多组织视为成本。一个成熟的 AIOps 系统能大幅降低运营成本。通过将工作卸载给算法，并释放人力资源，使其将时间和精力投入到增值项目上，组织能够更好地利用其宝贵的人力资源。


    - **更好的环境可见性**：AIOps 不仅使 IT 运营能够识别需要改进的领域，还使企业能够发现新的机会或做出战略决策。由于 AIOps 系统触及所有
    IT 职能，它最适合过滤噪音，并向利益相关者提供所管理 IT 资产的相关可见性。


    - **降低运营风险**：风险管理是 IT 运营中的一个关键领域，但 AIOps 系统负责任务的自动执行、减少人为错误，并使用 AI 驱动的工具增强分析能力，从而大大降低了运营风险，无论这些风险是与安全、灾难恢复（DR）相关，还是与事件管理、变更管理和问题管理等日常运营任务相关。


    - **自动化优势**：自动化是一个过程，但当它在孤岛中运行时，常常会失败或无法交付预期的结果。另一方面，AIOps 系统通过提供端到端的自动化服务，实现了核心
    IT 功能的集成。


    - **更高的 IT 运营成熟度**：AIOps 的持续反馈提供了对流程、工具和基础设施中差距与挑战的可见性。这引导 IT 运营从被动状态走向成熟的主动状态。


    - **更好的可见性、治理和控制**：组织通常会实施各种事件管理和报告工具来进行运营治理和控制，但由于基础设施的动态特性以及运营团队无法保持系统更新，这些工具常常失败。另一方面，AIOps
    系统可以使用算法自动检测并吸收此类变化，并提供治理和控制所需的可见性。


    - **更轻松地迁移到 SRE 和 DevOps 模式**：AIOps 系统为 IT 流程和工具带来了自动化和成熟度，从而使运营团队能够采用 SRE 和 DevOps
    模式。


    - **更高效地利用基础设施容量**：AIOps 系统提供了更高效、更精细的容量利用率可见性，使容量管理员能够更好、更快地进行需求预测和成本效益分析。


    - **更快地交付新服务**：AIOps 系统消除了浪费，提升了运营团队的技能，并带来了流程和工具的成熟度。这使得 IT 团队能够支持新的计划和服务。


    ## 总结


    在本章中，我们介绍了运营团队面临的挑战，以及 AIOps 如何帮助组织克服这些挑战。我们探讨了 AIOps 及其各个组件，以及每个组件提供的功能。我们还列出了组织在部署
    AIOps 时可以预期的优势。在下一章中，我们将探讨 AIOps 的架构和方法论。


    # 2. AIOps 架构与方法论


    在本章中，您将了解 AIOps 架构中的技术和组件，以及其实施方法论和挑战。本章将探讨 AIOps 在可观测性、参与和行动阶段的关键特性，以及机器学习在 IT
    运营中的作用。


    ## AIOps 架构


    AIOps 系统主要由 IT 运营的三个核心服务组成，即企业监控、IT 服务管理和自动化。AIOps 架构提供了在这三项服务之间无缝集成的技术和方法，并交付一个完整的
    AIOps 系统。图 2-1 定义了 AIOps 平台及其在 Gartner 定义的 IT 运营价值链中三个核心服务的各种流程和功能中的适用性。让我们深入探讨并理解
    AIOps 架构。


    ![图 2-1](img/524834_1_En_2_Fig1_HTML.png)


    一个 AIOps 平台包含三个核心服务：可观测（监控）、参与（ITSM）和行动（自动化）。可观测服务包含事件、指标、追踪和拓扑，有四个要点。参与服务包含事件、依赖关系和变更，有四个要点。行动服务包含脚本、运行手册和
    ARA。


    **图 2-1** AIOps 架构


    ## 核心平台


    AIOps 系统旨在摄取快速生成的海量数据点，并需要结合历史数据快速分析以交付价值。大数据技术与机器学习算法相结合提供了解决方案，并构成了 AIOps 系统的核心。


    ### 大数据


    AIOps 平台从多个来源摄取数据，因此该平台需要构建在大数据技术之上。传统系统构建在关系型系统之上；然而，对于 AIOps，有多个数据源和大量数据需要处理，才能得出有意义的见解。大数据被定义为具有五个“V”特征的数据类型，即容量、速度、多样性、真实性和价值，如图
    2-2 所示。


    ![图 2-2](img/524834_1_En_2_Fig2_HTML.png)


    大数据的 5V 流程图有五个子分支及其定义。这些分支是：速度：数据产生的速度，真实性：数据的可靠性和可信度，容量：指数据的绝对数量，价值：拥有数据对于大数据来说固然很好，多样性：也可以使用结构化和非结构化数据。


    **图 2-2** 大数据定义

