- fmt: "# Environment Setup\n\nIn this section, you’ll learn how to set up the environment\
    \ to run the sample code demonstrating various AIOps use cases. You have three\
    \ options to set up an environment.\n\n- Download Python from [`https://www.python.org/downloads/`](https://www.python.org/downloads/)\
    \ and install Python directly with the installer. Other packages need to be installed\
    \ explicitly on top of Python.\n- Use Anaconda, which is a Python distribution\
    \ and made for large data processing, predictive analytics, and scientific computing\
    \ requirements. The Anaconda distribution is the easiest way to perform Python\
    \ coding, and it works on Linux, Windows, and macOS. It can be downloaded from\
    \ [`https://www.anaconda.com/distribution/`](https://www.anaconda.com/distribution/).\n\
    - Use cloud services. This is the simplest of all the options but needs Internet\
    \ connectivity to use. Cloud providers such as Microsoft Azure Notebooks and Google\
    \ Collaboratory are popular and available at the following links:\n  - Microsoft\
    \ Azure Notebooks: [`https://notebooks.azure.com/`](https://notebooks.azure.com/)\n\
    \  - Google Collaboratory: [`https://colab.research.google.com`](https://colab.research.google.com)\n\
    \nWe will be using the second option and will set up an environment using the\
    \ Anaconda distribution.\n\n# Software Installation\n\nDownload the Anaconda Python\
    \ distribution from [`https://www.anaconda.com/distribution/`](https://www.anaconda.com/distribution/),\
    \ as shown in Figure [6-1](#524834_1_En_6_Chapter.xhtml#Fig1).\n\n![](images/524834_1_En_6_Chapter/524834_1_En_6_Fig1_HTML.jpg)\n\
    \nA dashboard of download anaconda with options, products, pricing, solutions,\
    \ resources, blog and company. Below the option kit, there is a text written ‘your\
    \ data science toolkit’.\n\nFigure 6-1\n\nDownloading Anaconda\n\nAfter downloading\
    \ the file, trigger the setup to initiate the installation process.\n\n1. Click\
    \ Continue.\n2. On the Read me step, click Continue.\n3. Accept the agreement,\
    \ and click Continue.\n4. Select the installation location, and click Continue.\n\
    5. It will take about 500MB of space on the computer. Click Install.\n6. Once\
    \ the Anaconda application gets installed, click Close and proceed to the next\
    \ step to launch the application.\n\n# Launch Application\n\nAfter installing\
    \ Anaconda Jupyter, open the command-line terminal and type `jupyter notebook`.\n\
    \nThis will launch the Jupyter server listening on port 8888. Usually, a pop-up\
    \ window with the default browser will automatically open, or you can log in to\
    \ the application by opening any web browser and opening the URL `http://localhost:8888/`,\
    \ as shown in Figure [6-2](#524834_1_En_6_Chapter.xhtml#Fig2).\n\nClick New ➤\
    \ Python 3 to create a blank notebook.\n\n![](images/524834_1_En_6_Chapter/524834_1_En_6_Fig2_HTML.jpg)\n\
    \nA pop-up window of Jupyter notebook with options files, running, and clusters\
    \ on the left. The file option has some items of applications, creative cloud\
    \ files, desktop, documents, and downloads. To the right, there is a menu bar\
    \ of Python 3 with options text file, folder, and terminal.\n\nFigure 6-2\n\n\
    Jupyter Notebook UI\n\nA blank notebook will launch in a new window. You can just\
    \ type commands in the cell and click the Run button to execute them. To test\
    \ that the environment is working perfectly, type a `print(\"Hello World\")` statement\
    \ in the cell and execute it.\n\nPython Notebooks are used in the book for demonstrating\
    \ the AIOps use cases of deduplication, dynamic baselining, and anomaly detection;\
    \ they are available at [`https://github.com/dryice-devops/AIOps.git`](https://github.com/dryice-devops/AIOps.git).\
    \ You can download the source code to follow along with the exercises in this\
    \ chapter.\n\nThe environment is now ready to develop and test algorithmic models\
    \ for multiple AIOps use cases. Before getting into model development, let’s understand\
    \ a few terms that are going to be used to analyze and measure the performance\
    \ of models.\n\n# Performance Analysis of Models\n\nIn practice, multiple models\
    \ need to be created to make predictions, and it is important to quantify the\
    \ accuracy of their prediction so that the best-performing model can be selected\
    \ for production use.\n\nIn the supervised ML model, a set of actual data points\
    \ is separated into training data and test data. The model is trained to learn\
    \ from training data and make predictions that get validated against both training\
    \ data and testing data. The delta between actual values and predicted values\
    \ is called the *error*. The objective is to select a model with minimum error.\n\
    \nThere are multiple methods to analyze errors and measure the accuracy of predictions.\
    \ The following are the most commonly used methods.\n\n## Mean Square Error/Root\
    \ Mean Square Error\n\nIn this approach, the first error is calculated for each\
    \ data point by subtracting the actual result value from the predicted result\
    \ value. These errors need to be added together to calculate the total error obtained\
    \ from a specific model. But errors can be positive or negative on different data\
    \ points, and adding them will cancel out each other, giving an incorrect result.\
    \ To overcome this issue, in mean square error (MSE), a square of calculated error\
    \ is performed to ensure that the positive and negative error values should not\
    \ cancel out each other, and then the mean of all squared error values is performed\
    \ to determine the overall accuracy.\n\n![](images/524834_1_En_6_Chapter/524834_1_En_6_Figa_HTML.png)\n\
    \nAn equation of MSE equals 1 over n of sigma from i equals 1 to lowercase n of,\
    \ open parenthesis Y subscript i minus Y cap subscript i close parenthesis to\
    \ the power 2.\n\n- ![](images/524834_1_En_6_Chapter/524834_1_En_6_Figb_HTML.jpg)\
    \ A lowercase n. -> Number of data points\n- ![](images/524834_1_En_6_Chapter/524834_1_En_6_Figc_HTML.jpg)\
    \ An uppercase Y subscript lowercase i. -> Actual value at specific test data\
    \ point\n- ![](images/524834_1_En_6_Chapter/524834_1_En_6_Figd_HTML.jpg) An uppercase\
    \ y cap subscript lowercase i. -> Predicted value at specific test data point\n\
    \nThere is another variant of MSE where the square root of MSE is performed to\
    \ provide the root mean square error (RMSE) value. The lower the MSE/RMSE, the\
    \ higher the accuracy in prediction and the better the model.\n\n![](images/524834_1_En_6_Chapter/524834_1_En_6_Fige_HTML.jpg)\n\
    \nAn equation of RMSE equals root over sigma from i equals 1 to lowercase n of\
    \ open parenthesis y cap subscript i minus y subscript i close parenthesis to\
    \ the power 2 over n.\n\nBoth MSE/RMSE use “mean” as the baseline, and that’s\
    \ the biggest issue with these methods because mean has inherent sensitivity toward\
    \ outliers. In simple terms, assume there are four data points provided to model\
    \ A and model B. Table [6-1](#524834_1_En_6_Chapter.xhtml#Tab1) lists the errors\
    \ obtained on each of the data points for each model.\n\nTable 6-1\n\nSample Data\
    \ and Errors in ML Models\n\n| Data Point | Error in Model A | Error in Model\
    \ B |\n| --- | --- | --- |\n| D1 | 0.45 | 0 |\n| D2 | 0.27 | 0 |\n| D3 | 0.6 |\
    \ 0 |\n| D4 (Outlier) | 0.95 | 1.5 |\n\nModel B appears to be a better model because\
    \ it predicted with 100 percent accuracy except on one data point, which was an\
    \ outlier and gave a high error. On the other hand, model A gave small errors\
    \ on almost every data point.\n\nBut if we consider the mean of errors for both\
    \ models, then model A will have a lower mean value of errors than model B, which\
    \ gives an incorrect interpretation of model accuracy."
