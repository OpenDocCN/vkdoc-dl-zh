- fmt: 'Before we proceed, it is important to note that we can use arrays as well
    in code to read and process events fields by referring them with indexes (`0`,
    `1`, `2`, etc.), but it will limit the scalability if new fields need to be added
    later. To avoid the scalability issue, we will be using a dictionary datatype
    so that we can use the event field name instead of indexes, as shown in the following
    function:


    ```

    def transform_dictionary(cursor, row):

    key_value = {}

    for idx, col in enumerate(cursor.description):

    key_value[col[0]] = row[idx]

    return key_value

    ```


    Now values will be stored as a key-value pair, and we can directly refer to any
    event field with its name.


    Let’s define a class to contain a few critical functions for SQLite. First create
    a connection with the database by using the initialization function `_init`.


    ```

    class Database:

    # create db connection to store and process events.

    def __init__(self):

    self._con = sqlite3.connect(''de_duplicationv5.db'')

    self._con.row_factory = transform_dictionary

    self.cur = self.con.cursor()

    self.createTable()

    def getConn(self):

    return self.con

    ```


    The function `getConn` will create a connection with the database.


    Next, create the required tables in database. Though we need only one table `dedup`
    to store the final deduplicated events, we will also be creating a table `archive`
    to store duplicated events. The table `archive` will be used to quantify the benefits
    of the deduplication function.


    ```

    def createTable(self):

    self.cur.execute(''''''CREATE TABLE if not exists dedup

    (AlertTime date, EMUniqueKey text, Host text, \

    AlertDescription text, AlertClass text, AlertType text, \

    AlertManager text, Source text, Status text, \

    Severity text, Count real)'''''')

    self.cur.execute(''''''CREATE TABLE if not exists archive

    (AlertTime date, EMUniqueKey text, Host text,

    AlertDescription text, AlertClass text, AlertType text,\

    AlertManager text, Source text, Status text, \

    Severity text)'''''')

    ```


    After reading events, they need to be inserted either into the `dedup` table or
    into the `archive` table depending upon whether it’s a new event or a duplicate
    event. The function `insert` will accept the table name and event values that
    need to be inserted. Before inserting the event, `EMUniqueKey` is getting dynamically
    generated for that event.


    ```

    def insert(self, table, values):

    columns = []

    val = []

    value = []

    for EMUniqueKey in values:

    columns.append(EMUniqueKey)

    val.append("?")

    value.append(values[EMUniqueKey])

    query = "Insert into {} ({}) values ({})".format\

    (table, ",".join(columns), ",".join(val) )

    self.cur.execute(query, tuple(value))

    ```


    We need the function `execute` to execute database queries as well as the function
    `update` to update the event’s count, severity, and status in the `dedup` table
    for any repeated occurrence of an event that is already present in the system
    in an open state.


    ```

    def execute(self, query):

    self.cur.execute(query)

    def update(self, query, values):

    # print(query)

    return self.cur.execute(query, values)

    ```


    Finally, we need supporting functions to fetch record(s), commit transactions,
    and close the connection.


    ```

    def fetchOne(self, query):

    self.cur.execute(query)

    return self.cur.fetchone()

    def fetchAll(self, query):

    self.cur.execute(query)

    return self.cur.fetchall()

    def commit(self):

    self._con.commit()

    def close(self):

    self._con.close()

    ```


    Now let’s start reading and processing events data iteratively from the event
    bank. In the AIOps solution, this processing happens as part of stream processing
    in real time rather than as batch processing.


    ```

    db = Database()

    for item in raw_events.iterrows():

    #read events

    data = dict(item[1])

    print("Input Data",data)

    dedupData = db.fetchOne("Select * from dedup where EMUniqueKey=''{}'' \

    and Status != 3".format(data["EMUniqueKey"]))

    if dedupData:

    #increase count and add current row in archive

    count = dedupData[''Count''] + 1

    query = "Update dedup set Count=?, AlertDescription=?, \

    Severity=?, Status=? where EMUniqueKey=? and Status=?"

    db.update(query, (count, data[''AlertDescription''], \

    data["Severity"], data["Status"], data["EMUniqueKey"], dedupData[''Status''])
    )

    db.insert("archive", data)

    db.commit()

    else:

    #insert in dudup table

    data[''count''] = 1

    db.insert("dedup", data)

    db.commit()

    ```


    In the previous code, first `EMUniqueKey` got generated dynamically using event
    slots and stored in the `data` variable (data frame). Then the table `dedup` gets
    checked to find out whether there is any open event with the same `EMUniqueKey`.
    If there is any matching event found in the `dedup` table, then it means that
    a new event is a duplicate event. Hence, the original event in the `dedup` table
    gets updated with the new event’s description, severity, and status, and the count
    field of the older event gets increased by 1.


    This duplicate event now gets stored in the archive for later analysis. If there
    is no matching event found in the `dedup` table, then the new incoming event represents
    a new issue and gets stored as a new entry in the `dedup` table.


    After processing all events in the alert bank, let’s find out how much noise (duplicate
    events) was filtered by the deduplication function. We will compare the events
    present in the `archive` table and `dedup` table and then use the Python library
    `matplotlib` to plot the pie chart for this analysis.


    ```

    df_dedup = pd.read_sql("select * from dedup" , Database().getConn())

    df_archive = pd.read_sql("select * from archive", Database().getConn())

    fig, ax = plt.subplots()

    source = ["Actual-Issues", "Duplicate Event - Noise"]

    colors = [''green'',''yellow'']

    values = [len(df_dedup), len(df_archive)]

    ax.pie(values, labels=source, colors=colors, autopct=''%.1f%%'', shadow=True)

    plt.show()

    ```


    Based on the pie chart in Figure [6-8](#524834_1_En_6_Chapter.xhtml#Fig8), the
    deduplication function has filtered out 70.6 percent of duplicated events, leaving
    only 29.4 percent of actual events for IT operations team, which is a considerable
    reduction in event volume to be processes while retaining the useful information
    coming via new duplicated events.


    ![](images/524834_1_En_6_Chapter/524834_1_En_6_Fig8_HTML.jpg)


    A pie chart with values in percentage. Actual Issues: 29.4\. Duplicate Event Noise:
    70.6.


    **Figure 6-8** Deduplication function noise removal


    Let’s observe what are the top noise maker CIs in data, as shown in Figure [6-6](#524834_1_En_6_Chapter.xhtml#Fig6).


    ```

    df_dedup = df_dedup.sort_values(by="Count", ascending=False)

    df_dedup[:10].plot(kind="bar", by="Count", x="Host")

    plt.title("Top 10 host with most de-duplications", y=1.02);

    ```


    Figure [6-9](#524834_1_En_6_Chapter.xhtml#Fig9) shows the top 10 CIs that generate
    maximum events in the environment that need to be analyzed by problem management
    and capacity management teams.


    ![](images/524834_1_En_6_Chapter/524834_1_En_6_Fig9_HTML.jpg)


    A bar graph of number versus hosts which are, Payroll underscore S A P underscore
    G T S, USPRDPAYROLAPP01, AUPRDPAYROLWEB03, UKDEVPAYROLDBA02, USPRDPAYROLAPP03,
    UKPRDPAYROLAPP03, UKPRDPAYROLDBA02, UKDEVPAYROLDBA02, UKDEVPAYROLAPP02, and UKPRDPAYROLWEB01\.
    The values across horizontal axis are: 8, 5, 5, 5, 5, 5, 5, 5, 5, and 5.


    **Figure 6-9** Top 10 noisy host


    This completes our first use case of deduplication in AIOps.


    ## Summary


    In this chapter, we covered how to set up the environment using Anaconda for running
    the use cases. We covered our first use case, which was deduplication. This use
    case does not use any machine learning but relies on rule-based correlation to
    deduplicate events. In the next chapter, we will cover another important use case
    in AIOps: automated baselining.


