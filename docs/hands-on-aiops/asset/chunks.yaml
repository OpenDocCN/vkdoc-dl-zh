    ## Monitoring Coverage and Data Availability


    There are organizations where monitoring and observability are in place, and they
    can proceed smoothly to deploy AIOps technologies and reap the benefits that AIOps
    provides. However, there are organizations where the basic monitoring coverage
    is not complete, and many infrastructure and application components are not monitored
    effectively. Thus, due to lack of data, deploying AIOps would not be able to provide
    probable cause or root cause for those application or infrastructure elements.
    After all, machine learning systems are based on data availability and accuracy
    of data. There are other challenges where the coverage may be complete, but the
    monitoring parameters are incorrectly configured and do not provide complete and
    accurate data for effective functioning of the AIOps algorithms.


    Without monitoring and observability data in place, expecting AIOps to solve basic
    monitoring or observability problems would result in a failure of the initiative
    and AIOps getting the blame for no fault on the AIOps side either from a technology
    or process perspective.


    IT operations needs to be able to measure their maturity and coverage of systems
    and processes from monitoring, observability, ITSM, and automation standpoints
    before embarking on an AIOps journey. This can be done either in house or by engaging
    consultants who are well versed with this domain and can provide an outside perspective
    to where the organization is and compare the systems and processes with companies
    that are leaders in this space. This exercise will result in a maturity journey
    where there may be projects and programs that need to be run to prepare the organization
    for AIOps. For example, if the monitoring is not comprehensive, a separate program
    to set this right and provide comprehensive coverage may get initiated as a preparatory
    step to bringing in AIOps.'
  trans: '

    # 建立关联：数据关联的价值


    应用经济时代已经到来，各类企业都在积极应对。在这个数字化转型的时代，企业依靠应用程序来服务客户并改善运营。企业需要快速引入新应用、采用新技术，以变得更加敏捷、高效和响应迅速。


    作为这些努力的一部分，企业正在采用基于云的解决方案、以软件为中心的微服务架构，以及虚拟化和容器技术。但这些新架构和新技术也带来了自身的挑战。


    如今，一些企业应用托管在公有云上，而企业对这些云环境往往没有或只有非常有限的可见性。


    应用程序越来越多地部署在虚拟机上而非物理服务器上，这增加了更多的复杂性。


    容器通常与虚拟机共存，或存在于虚拟机内部。容器的使用——以及容器本身的数量——正在企业 IT 环境中迅速激增。


    由于这种环境与以往截然不同，大约十年前创建的应用性能工具已不再适用。那些只考虑应用程序而不考虑底层基础设施的工具存在不足。这些工具必须收集并关联应用程序本身及其底层基础设施的信息。这应包括应用服务器性能、事件、日志、事务等数据。应用交付所涉及的计算、网络和存储资源也需要纳入考量。


    ## 总结


    在本章中，我们涵盖了`AIOps`的不同层级，即观察、参与和行动。我们深入探讨了`AIOps`的三大核心基础支柱，以及事件关联、预测分析、异常检测和根因分析等核心分析技术。通过提供实际案例，我们详细介绍了观察、参与和行动层中的每个功能，以便揭开`AIOps`及其功能的神秘面纱，并将其与运维团队当前的实际工作联系起来。在下一章中，我们将介绍组织在部署`AIOps`时面临的挑战。


    # 3. AIOps 挑战


    尽管 IT 团队对实施`AIOps`技术持乐观态度并全力推进，但仍存在一些挑战阻碍了这些技术的价值实现和落地。本章将更详细地解释这些挑战，以便组织在实施`AIOps`时能够提前规划。图
    3-1 列出了我们将在`AIOps`旅程中进一步探讨的关键挑战。


    ![](img/524834_1_En_3_Fig1_HTML.png)


    一张展示`AIOps`的 11 个关键挑战的图片，这些挑战包括：组织变革管理、监控覆盖范围与数据可用性、僵化的流程、期望错位、功能碎片化与`CMDB`、机器学习、数据漂移、预测分析、成本节约预期、对机器学习及领域输入缺乏理解。


    **图 3-1** AIOps 挑战


    ## 组织变革管理


    `AIOps`是一个变革性主题，贯穿`ITSM`、监控和运行手册自动化等多个流程。它也涉及多个团队，包括指挥中心、服务台、解决团队、自动化、`SRE`和`DevOps`。要成功部署并实现价值，你需要在组织层面进行有效的变革管理，并获得管理层的支持与赞助，以推动这一跨职能变革。组织层级和职能划分会阻碍`AIOps`的成功有效部署；因此，重要的是让组织变革管理者参与进来，通过各个利益相关方推进项目，并争取管理层对项目的支持。


    通常，上述团队被组织在不同的职能层级中，他们通过既定的流程和政策，在需要时基于特定倡议进行协作。`AIOps`是一种颠覆性的变革，会极大地影响所有这些团队。


    为了让项目顺利启动并取得成功，必须将其作为一项具有组织级重要性的计划来推动，并在最高层级进行监控和治理。


    团队结构、流程、政策和沟通媒介都需要改变，以全面采用`AIOps`，并通过在整个价值流中部署这些技术来实现最大收益。


    将`AIOps`仅仅视为一种可以叠加在现有技术和流程之上而无需重新设计的技术变革，这种期望需要降低。组织应该认识到，他们正在转向一种不同的 IT 运维系统和方法，这需要对当前的结构、团队和流程进行改变。因此，这需要以流程导向、系统化且不干扰现有运维的方式进行处理，并为受此组织级变革影响的人员提供清晰的指导。


    ## 监控覆盖范围与数据可用性


    有些组织已经建立了监控和可观测性体系，他们可以顺利部署`AIOps`技术并收获其带来的好处。然而，也有一些组织的基础监控覆盖范围并不完整，许多基础设施和应用组件没有得到有效监控。因此，由于缺乏数据，部署`AIOps`将无法为这些应用或基础设施元素提供可能的原因或根因。毕竟，机器学习系统依赖于数据的可用性和准确性。还存在其他挑战，例如覆盖范围可能完整，但监控参数配置不正确，无法为`AIOps`算法的有效运行提供完整准确的数据。


    如果没有监控和可观测性数据，期望`AIOps`来解决基本的监控或可观测性问题，将导致该计划失败，而`AIOps`则会无端受到指责——无论从技术还是流程角度来看，这都不是`AIOps`的错。


    在开启`AIOps`之旅之前，IT 运维需要能够从监控、可观测性、`ITSM`和自动化的角度，衡量其系统和流程的成熟度及覆盖范围。这可以通过内部完成，也可以聘请精通该领域的顾问，他们能从外部视角评估组织的现状，并将系统和流程与该领域的领先公司进行比较。这项工作将形成一个成熟度提升路径，其中可能需要运行一些项目和计划，为组织采用`AIOps`做好准备。例如，如果监控不全面，可能会启动一个单独的项目来纠正这一问题并提供全面覆盖，作为引入`AIOps`的预备步骤。

