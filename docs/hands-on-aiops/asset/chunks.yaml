    **Figure 7-21** PACF graph of time series


    ## ACF Graph


    In the ACF graph in Figure 7-22, there is sharp cut-off on the lag 2 and lag 7
    crossing significance line, so we can try with the MA component as `q=2` or `q=7`
    for modeling.


    ![ACF graph](images/524834_1_En_7_Chapter/524834_1_En_7_Fig22_HTML.jpg)


    An ACF graph correlation value versus lags from 0 to 25. The shaded bar on the
