  trans: '

    # 第 9 步：衡量成功


    一旦实施部署完成，就该衡量你所处的阶段了。在项目初期，当你踏上 AIOps 之旅时，你已经衡量了初始的关键绩效指标（KPI）。现在是时候再次衡量这些 KPI，看看实施后的情况了。请记住，我们之前定义了以下
    KPI：


    - **告警与事件比率**：你应该会看到告警事件比率有显著改善。由于系统中噪音的消除和可能原因的分析，触发事件的虚假告警不再发生或显著减少。这也导致事件管理流程中的事件数量减少，因为虚假或重复的事件现在已被
    AIOps 引擎抑制。

    - **平均响应时间**：平均响应时间显著缩短，因为对事件的自动化分析为响应团队提供了更好的输入，并且部分响应也由系统自动完成。该指标应有明显改善。

    - **平均解决时间**：该指标也应显著减少，因为响应时间缩短了，并且通过自动化解决问题的时间也大大降低。花在尝试不同方案上的时间更少，AIOps 引擎能够引导解决团队找到正确的操作手册来解决问题。该指标还会影响系统的可用性，你应该会看到应用程序和基础设施的可用性有所提升。

    - **P1 和 P2 的 SLA 指标**：由于 SLA 基于响应和解决时间，这些方面的显著改善将转化为更好的 SLA 评分。事实上，运维团队可以回过头来承诺更好的
    SLA，因为使用 AIOps 后运维得到了改进。

    - **服务请求（SR）关闭时间**：作为 AIOps 计划的一部分，服务请求实现了自动化，因此关闭 SR 所需的时间显著减少。由于 SR 被自动处理，错误也更少，从而避免了人为错误。

    - **自动解决的 SR 百分比**：由于自动化解决了许多 SR，这个数字通过自动化显著增加。

    - **自动解决的事件百分比**：一旦自动化作为 AIOps 工具集的一部分建立起来，自动解决的事件数量就会显著增加。

    - **关键系统的可用性**：高度自动化导致诊断和解决事件的时间缩短，从而提高了关键系统的可用性。


    # 第 10 步：庆祝并分享成功


    当你完成所有层级后，AIOps 之旅的最后一步就是与业务部门、领导层以及所有团队分享你的成功。利用你设定的目标和实际结果，准备一份详细的案例研究。涵盖你是如何开展这一旅程的，遇到了哪些挑战，以及如何克服这些挑战的。与
    AIOps 社区分享知识，以便其他人可以从你的经验中学习。你也可以通过 `Feedback@AgileInfraOps.com` 向我们发送关于你 AIOps
    之旅的说明。


    接下来，让我们讨论一些 AIOps 实施的最佳实践和指南。


    # AIOps 实施指南


    以下是实施 AIOps 时的一些指南。


    ## 炒作与清晰度


    不要因为某个项目花哨或受追捧就开展它，无论是 AIOps 项目还是其他任何项目。部署 AIOps 必须有明确的需求和用例。对需求和目的的清晰认识对于你成功踏上
    AIOps 之旅至关重要。


    ## 以目标和 KPI 为驱动


    在实施开始和结束时衡量你的 KPI 非常重要。有些实施会失败，因为团队对想要实现的目标没有清晰的概念。拥有 KPI 并了解它们如何受当前项目影响，能让每个人都专注于最终成果。


    ## 期望


    AIOps 对从监控工具收集的事件、性能指标、日志和跟踪数据应用广泛的自动化和统计分析，以学习行为、识别异常、关联告警、减少噪音并查明根本原因。


    必须理解并接受机器学习技术本质上是概率性的，因此它们不可能始终 100% 准确。其理念是逐步训练它们，使其达到一定的准确度和置信度水平，以便 IT 运维团队能够使用其建议来发现和解决问题。


    ## 实现收益的时间


    对机器学习分析数据、构建和训练模型以及开始提供洞察（例如性能异常、分组告警和根本原因）所需的时间要有现实的期望。例如，识别每周的季节性模式至少需要几周的观察时间。


    考虑到时间和反馈，AIOps 将为 IT 运维提供更准确的洞察，从而做出更好的决策。然而，期望 AIOps 成为一个开箱即用、第一天就能自动化一切的解决方案是不切实际的。


    ## 没有放之四海而皆准的方案


    每个组织都是独一无二的，在基础设施、应用环境、监控和管理工具方面都会存在差异，因此在方法、实施和实现价值的时间上也会有所不同。环境的规模、范围和复杂性也会影响实施和实现价值所需的时间。然而，我们已经看到，如果实施得当，AIOps
    能够快速实现价值并带来正向的投资回报率。


    ## 组织变革管理


    熟悉 AIOps 工具和流程只是问题的一部分；然而，更大的部分是如何获得需要参与此计划的不同团队的认同；因此，组织变革管理是成功实施 AIOps 项目的关键因素。


    ## 大处着眼，小处着手，快速迭代


    不要试图一次性完成所有事情，从小处着手。这让你有机会从成就中学习，验证和调整你的方法，获取并构建能力，并为你的组织实现至关重要的速赢。一次承担太多可能会导致失望，并可能导致业务采用率低下。


    ## 持续改进


    一旦部署完成，你可以通过扩展 AIOps 的覆盖范围和范围，并微调其算法以获得更高的准确性来持续改进。人工智能是一个动态且快速发展的领域，新兴的 AI 技术可能会影响
    AIOps 在不久的将来的交付方式。

    '
- fmt: '# The Future of AIOps


    With advancements in AI and ML technology, `AIOps` systems will also get enhanced
    with more accurate predictions. Let’s understand the potential future of `AIOps`
    in enterprises.


    `Observability` has a key role to play in `DevOps` and site reliability engineering.
    With new tools and techniques available for observability, the data available
    for analysis increases multifold. With `AIOps` and observability, the operations
    teams will have much higher visibility and greater control over their infrastructure
    and application landscape. After implementing `AIOps` in the observability area,
    deploying AI techniques to make sense of the event data, and helping the operations
    teams find the root cause of issues, the next step is to leverage these techniques
    to automate the resolution itself.


    Tools such as `iAutomate` provide these capabilities where advanced machine learning
    techniques are used to take the probable cause as an input and apply AI to find
    the right automation and take automation in the operations area to the next level
    of maturity. Currently enterprises that are early adopters are using these technologies
    in the monitoring and observability domain and implementing automation to realize
    the complete benefits of end-to-end automation.


    The next frontier for `AIOps` is the better integration of the development pipeline
    and using these technologies in the development area. `AIOps` should be able to
    help by automating the path from development to production, predicting the effect
    of deployment on production and responding to changes in the production environment.


    With cloud computing and the adoption of microservices architecture, the resolution
    of root cause, especially the root causes that are related to capacity or performance
    of the infrastructure, would simply be to spin more containers or to launch more
    virtual machines. Thus, microservices architecture on one hand increases the complexity
    of the application by breaking it down into many services to map and manage; however,
    it eases the task of resolution for performance and capacity issues by providing
    an easy automation capability to spin up more containers quickly and handle the
    spike in workload.


    `AIOps` and `DevOps` together solve a lot of problems. `DevOps` brings together
    the teams that were siloed earlier, while `AIOps` brings together data from multiple
    sources at a single place for insights and analytics. Both require a level of
    cultural change since they look at the entirely of the process as well as cut
    across multiple teams and processes. We will see much better integration of `AIOps`
    and `DevOps` in times to come with enterprises making the transition to `AIOps`
    by relooking at their `DevOps` processes and vice versa. Organizations will go
    on to create interfaces between the `AIOps` and `DevOps` processes and create
    procedures that cut across the two domains.


    `AIOps` in its current form and shape will continue to be adopted by enterprises,
    and with better integration, `DevOps` organizations will start using the AI techniques
    in other areas beyond operations. `AIOps` is primarily focused on the operations
    world today; however, the tools and techniques and the algorithms are equally
    applicable in the development world. On one hand, `AIOps` data will be used as
    an input into the development processes for creating more resilient and optimized
    applications, and on the other hand new use cases will evolve for taking `AIOps`
    technology into the development world.


    Similar to the operations world, where we have multiplicity of monitoring and
    management tools, the development world also has multiplicity of tools. The development
    tools that generate the development data are the Agile dashboards that track the
    pipeline of features to be built, the team statistics, the burndown charts, and
    the schedule of releases. Then there is data from testing tools that include functional
    testing, performance testing, code quality, and security and vulnerability testing.
    All this data is still analyzed by humans, and the decisions for deployment are
    made by the release and management teams. There are enterprises that have perfected
    the art of continuous delivery and continuous deployment; however, using `AIOps`
    technologies to go through the development data and provide insights and analytics
    similar to what is now available in the operations world will be the next frontier
    for `AIOps` technologies.


    Some application performance management tools have started using these technologies
    to provide insights into the application code to find where the root cause of
    performance or availability issues are. Though most `APM` technologies are still
    rule or topology based, a few vendors have moved in this direction to bring machine
    learning and AI technologies to the area of application development and testing.


    There will be better integration of the `AIOps` technologies in the development
    pipeline, wherein events and data getting generated through the pipeline are sent
    to the `AIOps` pipeline for analysis and automated actions. The next step is where
    `AIOps` is able to provide intelligent guidance on the code and configuration
    changes being made in various environments. This can be based on the data being
    generated by the pipeline. There would be integration with historical analysis
    of issues and bugs that were generated, and these can be source of input to arrive
    at predictions on the current pipeline.


    There are lot of false positives that are generated in testing. The automated
    testing tools that look for code quality or static code analysis often generate
    false positives. `AIOps` can be used to eliminate these false positives. Regression
    testing can be automated and simplified through the use of machine learning technologies.
    Thus, `AIOps` technologies in the `DevOps` pipeline can reduce the amount of testing,
    help in automated testing, reduce false positives, and guide the team in focusing
    their time and energy on the most relevant pieces.


    `AIOps` can be intelligently used in both preproduction and production systems
    to analyze the behavior of applications and impact of configuration changes on
    the application performance. These alerts can be configured to map the changes
    between the preproduction and production deployment to find any issues that may
    crop up because of configuration issues or because of changes in the workload
    pattern.


    `AIOps` is already being used by advanced automation systems to find the best
    remediation available and to apply it automatically; however, future systems will
    also enable `ChatOps`-based collaboration between the developers and operations
    teams to enable knowledge sharing and just-in-time knowledge retrieval for bug
    fixing as well as fixing errors in production environments. Thus, `AIOps` will
    see its usage expand beyond operations into the entire `DevSecOps` value chain.


    Though there has been work in the areas of predictive analytics, there will be
    further enhancements to the algorithms and techniques being used in `AIOps` to
    deliver ever-increasing use cases and also to improve the accuracy of the results.
    As more and more data is fed into the systems, the `AIOps` engines will become
    more powerful and provide ever deeper insights and analytics.


    The core algorithms that involve lots of machine learning models today will evolve
    to use deep learning technologies that will provide better insight since the amount
    of data available to `AIOps` systems will increase, and neural network systems
    will become more accurate.


    `AIOps` has had a great start, and organizations are seeing immense benefits of
    using these technologies today. It will go on to conquer new domains and areas
    beyond IT operations and eventually impact the entire IT value chain.'
