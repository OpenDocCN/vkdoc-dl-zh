- fmt: '线性回归模型存在一些局限性，它通过计算因变量与一个或多个自变量之间的相关性来进行预测。第一个主要挑战是，变量之间的相关性与任何与之相关的时间序列是相互独立的。线性回归无法在给定自变量值的情况下，预测因变量在“特定时间点”的值。其次，预测完全基于自变量，而没有考虑近期已经预测出的因变量值。为了克服这些挑战，你可以使用时间序列模型，我们将在下一节中讨论。


    **注意**


    从技术上讲，时间序列在线性回归中也可以被视为一个自变量，但这是不正确的。相反，在这种情况下，应该使用时间序列模型而不是线性回归模型。


    ## 时间序列模型


    为了对基于时间序列的场景进行建模，并预测数据在指定时间间隔内未来的取值，你可以利用时间序列建模。让我们了解时间序列建模中需要的一些重要术语。


    ### 时间序列数据


    任何按固定时间间隔收集的数据都称为*时间序列数据*。数据收集的频率可以是每小时、每天、每周等，只要它是按固定间隔进行的。以下是时间序列数据的常见示例：


    *   *股票价格数据*：股票的最高价和最低价通常按日记录。然后，在月度或年度时间框架内进一步分析这些数据，以做出业务决策。

    *   *呼叫中心通话量*：每小时的通话量会被记录。然后，从资源配置的角度，在月度或年度时间框架内分析这些数据，以确定高峰时段的负载。

    *   *销售数据*：销售数据对任何企业都至关重要，通常按月记录销售数据，以预测未来的销售额或组织的盈利能力。

    *   *网站点击量*：网站点击量通常每五到十分钟记录一次，以确定应用程序的负载、检测任何潜在的安全威胁，或扩展基础设施以满足业务需求。


    每个时间序列数据都会有一个日期或时间列，以及一个或多个数据列。如果只有一个数据列，则称为*单变量时间序列*；如果有多个数据列，则称为*多变量时间序列*。图
    [7-9](#524834_1_En_7_Chapter.xhtml#Fig9) 是一个单变量时间序列的示例，展示了服务器的每日平均 CPU 利用率。


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig9_HTML.jpg)


    一个 CPU 利用率时间序列表，包含两列，标题分别为时间戳和 CPU 利用率 Y。


    **图 7-9**


    CPU 利用率时间序列


    为了进行分析，可能需要通过添加一些额外的辅助列，将单变量时间序列转换为多变量时间序列。借助`TimeStamp`，我们添加了另一列`Day of the week`，从图
    [7-10](#524834_1_En_7_Chapter.xhtml#Fig10) 中我们可以观察到，与工作日相比，周末的 CPU 利用率出现了异常峰值。


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig10_HTML.jpg)


    一个 CPU 利用率时间序列分析表，包含三列，标题分别为时间戳、CPU 利用率和星期几。第四行和第五行被高亮显示。


    **图 7-10**


    CPU 利用率的时间序列分析


    ### 平稳时间序列


    时间序列最重要的统计特性之一是*平稳性*，即时间序列的均值和方差不随时间变化，如图 [7-11](#524834_1_En_7_Chapter.xhtml#Fig11)
    所示。简单来说，一个平稳时间序列在不同时间戳上可以有不同的值，但生成这些值的底层逻辑或方法保持不变。


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig11_HTML.jpg)


    一个平稳时间序列的图表，显示一条高频波形图，位于两条平行虚线之间的水平线上。


    **图 7-11**


    平稳时间序列示例


    ### 滞后变量


    滞后变量是随时间推移而滞后的因变量。`Lag-1`（`Y[t-1]`）表示因变量`Y[t]`在前一个时间单位的值，`Lag 2`（`Y[t-2]`）表示`Y[t]`在前两个时间单位的值，依此类推。


    考虑前面关于特定时间戳 CPU 利用率的时间序列示例。在此示例中，`Lag-1`（`Y[t-1]`）在 2020 年 7 月 3 日下午 2:00 的值将是`Y[t]`在
    2020 年 7 月 2 日下午 2:00 的值，即 8.82；而`Lag 2`（`Y[t-2]`）在 2020 年 7 月 3 日下午 2:00 的值将是`Y[t]`在
    2020 年 7 月 1 日下午 2:00 的值，即 8.33，如图 [7-12](#524834_1_En_7_Chapter.xhtml#Fig12)
    所示。


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig12_HTML.jpg)


    一个滞后变量表，包含四列，标题分别为时间戳、CPU 利用率 Y 下标 t、Lag 1 Y 下标 t-1 和 Lag 2 Y 下标 t-2。


    **图 7-12**


    滞后变量及其值


    从数学上讲，如果`Y[t]`与其滞后值`Y[t-1]`、`Y[t-2]`等之间存在关系或相关性，那么可以创建一个模型来检测模式，并利用其滞后值预测同一序列的未来值。例如，假设
    CPU 利用率在每个星期六都增加约 100%；那么可以考虑使用`Lag-7`（`Yt-7`）的值进行预测。


    下一步是确定`Y[t]`与其滞后值之间关系的强度，以及有多少滞后值与`Y[t]`具有统计上显著的关系，以便我们可以在预测模型中使用它们。这就是`ACF`和`PACF`图发挥作用的地方，我们接下来将讨论这些内容。'
  raw: 'There are a few limitations with linear regression model where it performs
    correlation between the dependent variable with one or more independent variables
    to perform predictions. The first big challenge is that correlations between variables
    are independent of any time series associated with them. Linear regression cannot
    predict the value of the dependent variable at a “specific time” with given values
    of independent variables. Second, prediction is entirely based on the independent
    variables without considering values of the dependent variable that were already
    predicted in the recent past. To overcome such challenges, you can use the time-series
    model, which we will discuss in the next section.


    Note


    Technically, a time series can also be considered as an independent variable in
    linear regressions, but that’s not correct. Rather, time-series models should
    be used instead of linear regression models in such scenarios.


    ## Time-Series Models


    To model scenarios that are based on time series and forecast what values that
    data is going to take into the future at a specified time interval, you can leverage
    time-series modeling. Let’s understand a few important terms required in time-series
    modeling.


    ### Time-Series Data


    Any data that is collected at regular time intervals is called *time-series data*.
    Data collection frequency can be anything like hourly, daily, weekly, etc., as
    long as it is happening at regular intervals. The following are common examples
    of time-series data:


    *   *Stock price data*: The maximum and minimum prices of stock are usually maintained
    at a daily level. It is then further analyzed on a monthly or yearly time frame
    to make business decisions.


    *   *Calls in call center*: The call volume at every hour is maintained. It is
    then analyzed to determine the peak hour load on a monthly or yearly time frame
    from a resourcing perspective.


    *   *Sales data*: Sales data is important for any business, and usually monthly
    sales figures are maintained to forecast future sales or profitability of the
    organization.


    *   *Website hits*: Website hit volume is usually maintained every five to ten
    minutes to determine the load on the application, detect any potential security
    threats, or scale the infrastructure to meet business requirements.


    Every time-series data will have a date or time column along with one or more
    data columns. If there is only one data column, then it’s called a *univariate
    time series*, and if there are multiple data columns, then it’s called a *multivariate
    time series*. Figure [7-9](#524834_1_En_7_Chapter.xhtml#Fig9) is the example of
    a univariate time series with the daily average CPU utilization of a server.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig9_HTML.jpg)


    A table of C P U utilization time series has two columns titled time stamp and
    C P U utilization Y.


    Figure 7-9


    CPU utilization time series


    For the purpose of analysis, a univariate time series may need to be converted
    into multivariate by adding some additional supporting columns. With the help
    of `TimeStamp`, we have added another column, `Day of the week`, and from Figure
    [7-10](#524834_1_En_7_Chapter.xhtml#Fig10) we can observe that there is an unusual
    spike in CPU utilization on weekends as compared to weekdays.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig10_HTML.jpg)


    A table of time series analysis of C P U utilization has three columns titled
    time stamp, C P U utilization, and day of the week. The fourth and fifth rows
    are highlighted.


    Figure 7-10


    TimeSeries analysis of CPU utilization


    ### Stationary Time Series


    One of the most important statistical properties of a time series is *stationarity*,
    where the mean and the variance of the time series do not change over time, as
    shown in Figure [7-11](#524834_1_En_7_Chapter.xhtml#Fig11). In simple terms, a
    stationary time series can have different values with different timestamps, but
    the underlying logic or method to generate those values remains constant and does
    not change.


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig11_HTML.jpg)


    A graph of stationary time series has a high-frequency wave graphed on a horizontal
    line between two parallel dashed lines.


    Figure 7-11


    Sample stationary time series


    ### Lag Variable


    A lag variable is a dependent variable that is lagged in over time. Lag-1 (Y[t-1])
    represents the value of dependent variable Y[t] at previous one unit of time,
    Lag 2 (Y[t-2]) will have value of Y[t] at previous two units of time, and so on.


    Consider the earlier example of time series on CPU utilization at specific timestamps.
    In this example, Lag-1 (Y[t-1]) at 7/3/20 2:00 PM will be the value of Y[t] at
    7/2/20 2:00 PM, which is 8.82, and Lag 2 (Y[t-2]) will have value of Y[t] at 7/1/20
    2:00 PM, which is 8.33, as shown in Figure [7-12](#524834_1_En_7_Chapter.xhtml#Fig12).


    ![](images/524834_1_En_7_Chapter/524834_1_En_7_Fig12_HTML.jpg)


    A table of lag variables has four columns titled time stamp, C P U utilization
    Y subscript t, Lag 1 Y subscript t minus 1, and Lag 2 Y subscript t minus 2.


    Figure 7-12


    Lag variable and its values


    Mathematically if there exists a relationship or correlation between Y[t] and
    its lagged values Y[t-1], Y[t-2], etc., then a model can be created to detect
    the pattern and predict future values of the same series using its lagged values.
    For example, assume that CPU utilization increases around 100 percent on every
    Saturday; then the value at Lag-7 (Yt-7) can be considered for prediction.


    The next step is to determine the strength of the relationship between Y[t] and
    its lags and how many lags have statistically significant relationship with Y[t]
    that we can use in the prediction model. That’s where ACF and PACF plots help,
    and we will be discussing these next.'
