  \n**图 6-8** 命名实体识别系统结果\n\n现在我们已经了解了如何将基于 BERT 的实体识别系统用于研究目的，接下来考虑一个场景，我们需要部署此功能以供对话系统使用。对话系统通常使用实体来配置或开发用例。例如，对于“Outlook\
