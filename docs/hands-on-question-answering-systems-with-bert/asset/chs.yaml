  \n### 文本摘要\n\n文本摘要是一个利用 NLP 和 NLU 从文档中生成或提取摘要，同时保留文档原始含义的过程。换句话说，摘要应与文档内容高度相似。此功能在搜索引擎系统中非常流行，系统向用户呈现文档时，通常也会包含文档摘要，而非整个文档文本。文档摘要可以是单文档摘要或多文档摘要。文本摘要问题可分为两类：\n\
  \n*   **抽取式摘要**：在抽取式摘要中，生成的摘要句子仅来自文档本身，不会对摘要中的句子进行任何修改。这也可以定义为根据句子与文档主题的相关性对句子进行重新排列。诸如\
  \ TF-IDF、余弦相似度、基于图的方法、实体提取、分词等多种方法已被积极用于开发文档摘要系统。\n\n*   **生成式摘要**：在生成式摘要中，生成的摘要句子并非文档中的原始句子。这些句子将根据文档中使用的语言语义进行修改。各种基于神经网络的方法，如\
  \ LSTM、GRU 等，已被用于实现此功能。\n\n在本节中，我们将讨论如何使用 BERT 生成文档摘要。BERT 提出了一种名为 BERTSUM 的新架构，用于从文档生成摘要。与往常一样，BERT\
  \ 用于生成多个句子的嵌入，其中标记`[CLS]`插入在第一个句子的开头之前，后续句子由标记`[SEP]`分隔。接着，添加分段嵌入和位置嵌入以区分不同句子。然后，这些句子向量通过摘要层，以选择用于摘要的代表性句子。在摘要层中，任何神经网络都可以构建摘要。图\
  \ 6-14 展示了文档摘要模型的架构。\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig14_HTML.jpg](img/498208_1_En_6_Fig14_HTML.jpg)\n\
  \n**图 6-14** BERTSUM 模型的架构\n\n现在，让我们看看如何利用基于 BERT 的抽取式文档摘要模型。我们使用`bert-extractive-summarizer`（Python\
  \ 中抽取式文档摘要的实现之一）来进行演示。\n\n1.  按照之前的方法创建一个新的 Jupyter 笔记本，并运行以下命令来安装`bert-extractive-summarizer`。\n\
  \n```bash\n! pip3 install bert-extractive-summarizer\n```\n\n成功安装该包后，将显示如图 6-15\
  \ 所示的输出。\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig15_HTML.jpg](img/498208_1_En_6_Fig15_HTML.jpg)\n\
  \n**图 6-15** 安装包\n\n2.  使用以下命令导入此实现所需的包，例如从 Summarizer 库中导入`summarizer`。\n\n该库实现了\
  \ HuggingFace PyTorch transformers 来运行抽取式摘要。其工作原理是生成句子的嵌入，然后使用聚类算法（如基于密度的算法等）将最接近质心的句子聚类，形成高密度区域。将选取来自最高密度区域的句子来构成摘要。接下来，创建一个`Summarizer`实例，如下所示。\n\
  \n```python\nfrom summarizer import Summarizer\n```\n\n3.  将文档内容作为参数传递给刚刚创建的`Summarizer`实例，如下所示。\n\
  \n```python\ntext_summarization_model = Summarizer()\n```\n\n```python\nreturn text_summarization_model()\n\
  ```\n\n这将返回文档的摘要。以下是使用 BERT 执行文档摘要的完整 Python 代码。\n\n\n\n```python\nfrom summarizer\
  \ import Summarizer\n\ndef text_summary(text):\n    model = Summarizer()\n    return\
  \ model(text)\n\nif __name__ == '__main__':\n    text = \"Machine learning (ML)\
  \ is the study of computer algorithms that improve automatically through experience.\
  \ It is seen as a subset of artificial intelligence. Machine learning algorithms\
  \ build a mathematical model based on sample data, known as \\\"training data\\\"\
  , in order to make predictions or decisions without being explicitly programmed\
  \ to do so. Machine learning algorithms are used in a wide variety of applications,\
  \ such as email filtering and computer vision, where it is difficult or infeasible\
  \ to develop conventional algorithms to perform the needed tasks.\"\n    print(text_summary(text))\n\
  ```\n\n此示例中的文本片段摘自维基百科上关于机器学习的文章。\n\n以下是生成的输出结果：\n\n```\nMachine learning (ML) is\
  \ the study of computer algorithms that improve automatically through experience.\
  \ It is seen as a subset of artificial intelligence.\n```\n\n该输出展示了文档的摘要，并且摘要中的所有句子均来自文档本身。文档可以是任意长度（例如，100\
  \ 页或 200 页），而 REST API 无法在单次 API 调用中接收如此大量的数据。因此，作为最佳实践，文档摘要系统应仅用作后端应用程序或系统，并配合一个父系统（如搜索引擎）使用，其中作为搜索结果一部分返回的每个文档都应同时包含文档摘要。\n\
  \n本练习的代码库可从 GitHub 下载，地址为：[`https://github.com/bertbook/Python_code/tree/master/Chapter6/TextSummarization`](https://github.com/bertbook/Python_code/tree/master/Chapter6/TextSummarization)。\n\
  \n## 结论\n\n本章涵盖了 BERT 在各类 NLP 任务中的适用性，例如情感分析、文本分类、实体识别和文档摘要。我们利用基于 BERT 的模型构建了基于\
  \ NLP 的系统。在下一章中，我们将讨论 BERT 领域的最新研究进展。\n\n"
- '# 7. BERT 模型的未来


  我们目前讨论的主题涉及 BERT 模型的架构和应用。BERT 模型不仅影响了机器学习领域，也影响了内容营销等其他领域。现在，让我们来探讨 BERT 的发展与未来可能性。


  ## 未来能力


  基于 Transformer 的机器学习模型（如 BERT）已被证明在先进的自然语言处理任务中取得了成功。BERT 作为一个大规模模型，仍然是能够提供最先进准确率的最流行的语言模型之一。


  谷歌搜索团队也使用了 BERT 模型来提升谷歌搜索的查询理解能力。由于 BERT 是一个双向模型，它能够通过查看周围的词语来理解某个词的上下文。BERT 特别有助于捕捉搜索查询背后的意图。


  自发布以来，BERT 模型影响了众多基于 BERT 的模型的开发。它的贡献在于催生了不仅沿用其名称，还借鉴其核心架构思想的模型。BERT 的各种变体能够成功地在广泛
  NLP 任务（如情感分析、文档分类、问答等）中打破记录。


  以下是几个基于 BERT 的模型。


  - 有些模型针对特定应用或领域语料库。`BioBERT`就是这样一个在生物医学文本上训练的模型。其他例子包括`SciBERT`和`Clinical BERT`。在领域特定语料库上进行训练被证明是有用的，并且在针对下游
  NLP 任务进行微调时，相比在`BookCorpus`和维基百科上训练的 BERT，能获得更好的性能。


  - `ERNIE`模型将知识融入预训练，并使用知识图谱来掩盖实体和短语。它在大型语料库上进行预训练，同时在输入时考虑知识图谱。


  - `TransBERT`模型用于故事结局预测任务，采用三阶段无监督训练方法，随后是两个有监督步骤。


  - 为了进行医疗推荐，`G-BERT`基本上结合了图神经网络和 BERT 的能力。该模型用于医疗代码推荐和表示。在`G-BERT`中，借助图神经网络，医疗代码通过层次化表示进行编码。


  - 除了预训练模型，还有微调模型，如`DocBERT`（文档分类）和`PatentBERT`（专利分类）。这些模型针对特定任务进行了微调。这些基于 BERT 的预训练模型可以借助
  NLP 任务、词性标注、命名实体识别等进行微调，以获得更好的结果。


  这些模型代表了基于 BERT 的模型的广泛类别。它们展示了 BERT 模型如何通过修改预训练或微调，进一步应用于不同领域。因此，BERT 为开发在多种任务中有效的其他模型奠定了基础。


  其中一个依赖 BERT 模型的进展是 Facebook 开发的`RoBERTa`，它已被证明在 GLUE 基准测试中非常高效。`RoBERTa`使用 BERT
  的策略来掩盖文本，机器则学习预测被掩盖的文本。训练在更大数量的迷你批次和学习率上进行，并修改超参数以获得更好的结果。这些变化使得`RoBERTa`模型在 MNLI、QNLI、RTE、STS-B
  和 RACE 任务上证明了其效率，并且在 GLUE 基准测试上也显示出显著的改进。


  `RoBERTa`使用 160 GB 的数据进行预训练，其中包括未标注的 NLP 数据集和从公共新闻文章中抓取的数据（称为 CC-News 数据集）。这些数据，连同在
  1024 块 V100 Tesla GPU 上训练`RoBERTa`，需要一天时间才能完成。这使得`RoBERTa`相比其他可用模型（如 BERT、XLNet、Alice
  等）具有更好的性能。


  BERT 被整合到谷歌搜索中，从而实现了精确和准确的搜索。这将影响许多用户的内容策略。现在内容必须更加精确，以便通过搜索引擎优化获得更好的评级。设计内容的策略必须不断改进。




  ### 抽象式摘要


  机器学习在自然语言处理领域取得了长足进步，其应用之一便是摘要生成。最常见的摘要形式是抽取式摘要，它从原文中提取出最重要的句子。另一种类型是抽象式摘要，它使用全新的句子，同时保留核心思想或事实。


  内容选择是任何摘要系统不可或缺的组成部分。在近期的研究方法中，将内容选择与摘要生成相分离的重要性得到了高度强调。目前有许多研究尝试提取应作为摘要组成部分的内容词和句子，并利用它们来指导抽象摘要的生成。


  一个简短的句子可以通过缩短或改写冗长的文本来形成。编码器和解码器在此背景下非常有用。全面的摘要可以通过类似的方式生成，即选择重要的句子，并删除非必要的句子成分，例如介词短语。摘要也可以通过融合多个句子来生成。选择重要句子可以通过多种方法实现，但处理其庞大的基数并识别句子关系以进行融合一直是一项艰巨的任务。此前人们认为，相似的句子可以融合在一起，因为它们携带了可供处理的相似信息。


  由于抽象式摘要难以实现，该领域有大量的发展。`BERT` 在抽象式摘要中也有应用。可以使用 `BERT` 模型生成多个句子的嵌入表示。为了执行此任务，可以在第一个句子开始之前插入一个
  `[CLS]` 标记。输出的嵌入表示需要通过多个层进行处理，这有助于捕获重要的特征。`BERTSUM` 模型就是一个例子。


  ### 自然语言生成


  自然语言生成（NLG）是较为活跃的研究领域之一。它与自然语言理解（NLU）同属自然语言处理（NLP）的子领域。NLG 的基本任务是将一些文本标记或数据转换为自然语言。实现这一目标的基本方法是为特定领域预定义模板，并使用
  NLU 技术填充空白槽位。


  一种更复杂的方法是使用语言建模。语言建模用于通过写作方式、语法、句法等来模拟自然语言，这些是学习源语言内在特征所必需的。然后，我们可以利用这种语言，根据给定的输入数据或文本来生成语言内容。


  在语言理解方面的应用不仅限于 NLP，还延伸到了 NLG。OpenAI 的 `GPT-2` 能够根据给定的单词生成文本，是 NLG 领域最先进的模型之一。`BERT`
  模型则试图通过 HuggingFace 的 transformers 库实现相同的功能。


  近期的发展表明，`BERT` 在 NLG 领域的性能并非最优。其背后的原因是 `BERT` 模型是在掩码语言模型（MLM）上训练的，而非自回归训练。除了使用 MLM
  之外，诸如打乱输入和随机词等变体使得 `BERT` 模型更加泛化。即使经过了所有这些变体处理，`BERT` 仍然落后于 `GPT-2`，因为 `BERT` 模型是一个编码器表示，而
  `GPT-2` 是一个解码器堆栈，这有助于它创建上下文丰富的表示。


  ### 机器翻译


  翻译是将文本从一种语言转换为另一种语言的概念。鉴于人类语言的波动性，自动或机械翻译可能是最具挑战性的脑功能之一。最近，诸如 `ELMo`、`GPT` 和 `GPT-2`、`BERT`、跨语言模型（`XLM`）、`XLNet`
  和 `RoBERTa` 等预训练技术在机器学习和自然语言处理社区引起了广泛关注。


  神经机器翻译（NMT）模型通常包含一个编码器，用于将输入序列映射到隐藏表示，以及一个解码器，用于解码隐藏表示并生成目标语言的句子。`BERT` 在 NLU 领域取得了巨大成功，将
  `BERT` 与 NMT 结合以提升性能可能是一个不错的研究方向。


  当 `BERT` 通过注意力模型被传感器和解码器利用时，可以通过融合 `BERT` 模型和 NMT 来改进 NMT。对有监督 NMT（包括句子级和文本级翻译）、半监督
  NMT 和无监督 NMT 的研究证明了这种方法的有效性。


  为了准确预测翻译质量，从头开始训练的模型理论上需要大量的自然语言源文本、翻译文本及其人工标注的质量评分数据集。创建规模足以训练神经网络模型的此类数据集成本高昂得令人望而却步。因此，研究人员确定，他们可以将从正确翻译的平行语料库上训练的模型所学到的知识迁移到判断翻译是否正确这一任务上。在不需要质量评分的领域，获取数百万个正确翻译的句子来预训练模型要容易得多。


  对于未来的工作，有许多有趣的方向。首先，我们必须学习如何加速测量过程。其次，我们可以在许多应用中使用此类算法，例如查询响应。如何将融合了 `BERT` 的模型压缩成简化版本是另一个课题。还有其他现代功能，包括关于蒸馏的信息，用于将预训练模型与
  NMT 集成，这是一种测试方法。


  ## 结论


  本章探讨了 `BERT` 以及最先进的 NLP 任务中的当前研究。至此，我们结束了这段进入 NLP 世界的激动人心的旅程。




