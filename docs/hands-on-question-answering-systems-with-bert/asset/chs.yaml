  \        words = model_output[0][0]\n        tags = model_output[1][0]\n       \
  \ result_json = dict()\n        result_json['query'] = query\n        entities =\
  \ []\n        index = 0\n        for word in words:\n            word_tag_dict =\
  \ dict()\n            word_tag_dict['word'] = word\n            word_tag_dict['tag']\
  \ = tags[index]\n            index = index + 1\n            entities.append(word_tag_dict)\n\
  \        result_json['entities'] = entities\n        result = json.dumps(result_json)\n\
  \        return result\n    except Exception as e:\n        return {\"Error\": str(e)}\n\
