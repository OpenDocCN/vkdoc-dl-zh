  \n**图 4-6** `Dev.tsv`快照\n\n3. 现在，导航到下载的`BERT`模型所在的目录。\n\n4. 如前所述，在命令提示符下执行训练命令。训练完成后，模型输出存储在`bert_output`参数定义的位置，如图\
  \ 4-9 所示。\n\n```\npython run_classifier.py --task_name=cola --do_train=true --do_eval=true\
  \ --data_dir=$BERT_BASE_DIR/data --vocab_file=$BERT_BASE_DIR/bert_output/cased_L-12_H-768_A-12/vocab.txt\
  \ --bert_config_file=$BERT_BASE_DIR/bert_output/ cased_L-12_H-768_A-12/bert_config.json\
  \ --init_checkpoint=$BERT_BASE_DIR/bert_output/ model.ckpt-2023 --max_seq_length=128\
  \ --train_batch_size=32 --learning_rate=2e-5 --num_train_epochs=3.0 --output_dir=$BERT_BASE_DIR/bert_output/\n\
  ```\n\n`$BERT_BASE_DIR`是您必须从 GitHub 下载代码的目录。\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig9_HTML.jpg](img/498208_1_En_4_Fig9_HTML.jpg)\n\
  \n**图 4-9** 训练`BERT`模型的命令\n\n5. 训练完成后，我们可以使用训练好的模型对测试数据进行分类。在命令提示符下运行以下命令，以获取`test.tsv`文件中问题的预测结果，如图\
  \ 4-10 所示。\n\n```\npython bert/run_classifier.py --task_name=cola --do_predict=true\
  \ --data_dir=$BERT_BASE_DIR/data vocab_file=$BERT_BASE_DIR/bert_output/cased_L-12_H-768_A-12/vocab.txt\
  \ --bert_config_file=$BERT_BASE_DIR/bert_output/ cased_L-12_H-768_A-12/bert_config.json\
  \ --init_checkpoint=$TRAINED_CLASSIFIER --max_seq_length=128 --output_dir=$BERT_BASE_DIR/bert_output/\n\
  ```\n\n`$BERT_BASE_DIR`是您必须从 GitHub 下载代码的目录。\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig10_HTML.jpg](img/498208_1_En_4_Fig10_HTML.jpg)\n\
  \n**图 4-10** 预测命令\n\n6. 分类结果存储在`test_results.tsv`文件中，该文件的位置定义为`bert_output`参数的值。如图\
  \ 4-11 所示，分类结果是问题在两个类别上的概率分布。得分较高的类别将被视为相关类别。\n\n第一列对应标签 0（事实型），第二列对应标签 1（非事实型）。从这个生成的`.csv`文件中，我们可以查看测试数据中的问题是事实型还是非事实型。\n\
  \n这种问题类型分类系统在对话系统中非常有用，在该系统中，需要分类终端用户输入的查询或问题以检索相关结果。\n\n## BERT 模型的基准测试\n\n`BERT`嵌入模型的性能和准确性已在不同类型的\
  \ NLP 任务数据集上持续评估。这样做是为了检查`BERT`是否能够达到其他方法为这些数据集设定的基准值。这些基准是评估模型特定方面工作的数据集。存在许多这样的基准，下面讨论其中一些。\n\
  \n### GLUE 基准测试\n\n通用语言理解评估（GLUE）是一个数据集集合，可用于训练、评估和分析 NLP 模型。这些不同的模型在 GLUE 数据集上相互比较。为了测试模型的语言理解能力，GLUE\
  \ 基准测试包括九个不同的任务数据集。为了评估模型，首先在 GLUE 提供的数据集上训练模型，然后在所有九个任务上对其进行评分。最终性能分数是所有九个任务的平均值。\n\
  \n![$$ Final\\ GLUE\\ Score=\\sum Individual\\ Task\\ Score $$](img/498208_1_En_4_Chapter_TeX_Equa.png)\n\
  \n模型需要更改其输入和输出的表示以适应任务。例如，在`BERT`的预训练期间，当句子作为输入时，会屏蔽少数单词。由于`BERT`中的输入表示层适应所有 GLUE\
  \ 任务，因此无需更改此层。但是，必须移除预训练分类层。该层被替换为适应每个 GLUE 任务输出的层。`BERT`模型在 GLUE 基准测试上取得了最先进的结果，得分为\
  \ 80.5%。\n\n### SQuAD 数据集\n\n斯坦福问答数据集（SQuAD）是一个阅读理解数据集，包含基于一组维基百科文章提出的问题。每个问题的答案分别是文本片段或段落中的跨度。SQuAD\
  \ 数据集有两个版本。\n\n- `SQuAD 1.1`\n- `SQuAD 2.0`\n\n`SQuAD 2.0`除了包含`SQuAD 1.1`的 50,000\
  \ 个可回答问题外，还包含 50,000 个无法回答的问题，但这些问题的形式与可回答的问题相似。这样做是为了让`SQuAD 2.0`在段落不支持问题答案的情况下也能表现良好。\n\
  \n`BERT`能够通过微小的修改在 SQuAD 数据集上取得最先进的结果。它需要对数据进行半复杂的预处理和后处理，以处理 SQuAD 上下文段落的可变长度性质以及\
  \ SQuAD 训练中使用的字符级答案注释。`BERT`模型在测试数据集上分别达到了`SQuAD 1.0`的 F1 分数 93.2 和`SQuAD v2.0`的\
  \ F1 分数 83.1。\n\n\n\n### IMDB 评论数据集\n\nIMDB 数据集是一个广泛使用的电影评论数据集，用于对观众对电影的情感进行分类。该数据集包含\
  \ 25,000 条高度两极分化的电影评论用于训练，以及 25,000 条评论用于测试。除了训练和测试数据外，还有额外的未标记数据。该数据集也被用于在情感分类任务中评估\
  \ `BERT`。\n\n### RACE 基准\n\n`RACE` 是一个来自考试的大规模阅读理解数据集。`RACE` 数据集用于评估模型在阅读理解任务上的表现。该数据集收集自中国学生的英语考试。它包含近\
  \ 28,000 篇文章和 100,000 个由人类专家生成的问题。与其他基准数据集相比，`RACE` 中的问题数量要多得多。`BERT large` 模型在\
  \ `RACE` 基准数据集上达到了 73.8% 的得分。\n\n## 基于 BERT 的模型类型\n\n`BERT` 是一个开创性的自然语言模型，它在机器学习领域的引入导致了基于它的各种模型的发展。`BERT`\
  \ 模型的变体已被开发出来，以满足不同类型的基于 NLP 的系统。以下是 `BERT` 的几个主要变体：\n\n- `ALBERT`\n- `RoBERTa`\n\
  - `DistilBERT`\n- `StructBERT`\n- 用于自然问题的 `BERT[joint]`\n\n### ALBERT\n\n`ALBERT`\
  \ 是 `BERT` 的一个更小的版本，由谷歌研究院和丰田工业大学联合推出。它是一个更智能的“精简版”`BERT`，也被认为是 `BERT` 的自然继承者。它也可以用于实现最先进的\
  \ NLP 任务。所有这些都可以通过比 `BERT` 更少的计算能力实现，但需要在准确性上做出一点妥协。`ALBERT` 的创建主要是为了改进架构和训练方法，以便用更少的计算资源获得更好的结果。\n\
  \n`ALBERT` 具有类似 `BERT` 的核心架构。它有一个 Transformer 编码器架构和一个包含 30,000 个单词的词汇表，这与 `BERT`\
  \ 相同。然而，`ALBERT` 在架构上进行了实质性的改进，以实现高效的参数使用。\n\n1.  **分解式嵌入参数化：** 在 `BERT` 的情况下，WordPiece\
  \ 嵌入大小 (`E`) 直接与隐藏层大小 (`H`) 绑定。据观察，WordPiece 嵌入旨在学习上下文无关的表示，而隐藏层嵌入旨在学习上下文相关的表示。在\
  \ `BERT` 中，我们仅通过隐藏层来学习上下文相关的表示。\n\n    当 `H` 和 `E` 绑定时，我们最终会得到一个拥有数十亿参数的模型，而这些参数在训练中很少更新。这是因为嵌入矩阵（即\
  \ `V*E`，其中 `V` 是大型词汇表）必须随 `H`（隐藏层）缩放。这实际上导致了低效的参数，因为这两个项目服务于不同的目的。\n\n    在 `ALBERT`\
  \ 中，为了提高效率，我们将这两个参数解绑，并将嵌入参数拆分为两个较小的矩阵。现在，独热向量不再直接投影到 `H`；而是先投影到一个更小的、低维的矩阵 `E`，然后将\
  \ `E` 投影到隐藏层。因此，参数从 `O(V*H)` 减少到 `Θ(V*E+E*H)`。\n\n2.  **跨层参数共享：** 与 `BERT` 相比，`ALBERT`\
  \ 在层与层之间具有更平滑的过渡，并且通过在所有层之间共享所有参数来提高参数效率。前馈和注意力参数都是共享的。这种权重共享有助于稳定网络参数。\n\n3.  **训练变化：句子顺序预测：**\
  \ 与 `BERT` 类似，`ALBERT` 也使用 `MLM`，但不使用 `NSP`。`ALBERT` 使用其自己新开发的训练方法——句子顺序预测 (`SOP`)\
  \ 来代替 `NSP`。\n\n    在后续研究中发现，`BERT` 中使用的 `NSP` 损失并不是一个非常有效的训练机制。因此，由于 `NSP` 不可靠，它被用来开发\
  \ `SOP`。\n\n    在 `ALBERT` 的 `SOP` 中，损失用于建模句子间的连贯性。`SOP` 的创建主要是为了关注句子间的连贯性损失，而不是主题预测，而\
  \ `BERT` 则将主题预测与连贯性预测结合起来。因此，`ALBERT` 能够通过避免主题预测的问题来学习更细粒度的句子间连贯性。\n\n尽管 `ALBERT`\
  \ 的参数比 `BERT` 少，但它能在更短的时间内获得结果。在语言基准测试 `SQuAD1.1`、`SQuAD2.0`、`MNLI`、`SST-2` 和 `RACE`\
  \ 中，`ALBERT` 的表现显著优于 `BERT`，正如我们在表 4-1 的比较中所看到的。\n\n**表 4-1** `BERT` 与 `ALBERT`\
  \ 模型对比\n\n| 模型 | 参数 | SQuAD1.1 | SQuAD2.0 | MNLI | SST-2 | RACE | 平均分 | 加速比 |\n\
  | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| `BERT base` | 108M |\
  \ 90.5/83.3 | 80.3/77.3 | 84.1 | 91.7 | 68.3 | 82.1 | 17.7x |\n| `BERT large` |\
  \ 334M | 92.4/85.8 | 83.9/80.8 | 85.8 | 92.2 | 73.8 | 85.1 | 3.8x |\n| `BERT xlarge`\
  \ | 1270M | 86.3/77.9 | 73.8/70.5 | 80.5 | 87.8 | 39.7 | 76.7 | 1.0 |\n| `ALBERT\
  \ base` | 12M | 89.3/82.1 | 79.1/76.1 | 81.9 | 89.4 | 63.5 | 80.1 | 21.1x |\n| `ALBERT\
  \ large` | 18M | 90.9/84.1 | 82.1/79.0 | 83.8 | 90.6 | 68.4 | 82.4 | 6.5x |\n| `ALBERT\
  \ xlarge` | 59M | 93.0/86.5 | 85.9/83.1 | 85.4 | 91.9 | 73.9 | 85.5 | 2.4x |\n|\
  \ `ALBERT xxlarge` | 233M | 94.1/88.3 | 88.1/85.1 | 88.0 | 95.2 | 82.3 | 88.7 |\
  \ 1.2x |\n\n\n\n### RoBERTa\n\n`RoBERTa` 是一种用于预训练 NLP 系统的优化方法。`RoBERTa`（稳健优化的 BERT）由\
  \ Facebook AI 团队开发，基于谷歌的 `BERT` 模型。`RoBERTa` 重新实现了 `BERT` 的神经网络架构，并加入了额外的预训练改进，在多个基准测试中取得了最先进的成果。\n\
  \n`RoBERTa` 和 `BERT` 共享多项配置，但两者在模型设置上存在一些差异。\n\n- **保留标记：** `BERT` 分别使用 `[CLS]`\
  \ 和 `[SEP]` 作为起始标记和分隔标记，而 `RoBERTa` 使用 `<s>` 和 `</s>` 来转换句子。\n- **子词大小：** `BERT`\
  \ 约有 30,000 个子词，而 `RoBERTa` 约有 50,000 个子词。\n\n此外，还有一些特定的修改和调整帮助 `RoBERTa` 的性能优于\
  \ `BERT`。\n\n- **更多训练数据：** 在重新实现 `BERT` 的过程中，对 `BERT` 模型的超参数进行了多项更改，并使用更大量的数据和更多迭代次数进行训练。`RoBERTa`\
  \ 使用了更多的训练数据，包括 `BookCorpus`（16G）、`CC-NEWS`（76G）、`OpenWebText`（38G）和 `Stories`（31G）数据集，而\
  \ `BERT` 仅使用 `BookCorpus` 作为训练数据。\n- **动态掩码：** 在将 `BERT` 移植以创建 `RoBERTa` 时，创建者修改了词掩码策略。`BERT`\
  \ 主要使用静态掩码，即在预处理阶段将句子中的词进行掩码。`RoBERTa` 则采用动态掩码。每当一个句子被输入训练时，都会生成一个新的掩码模式。`RoBERTa`\
  \ 将训练数据复制 10 次，并对这些数据进行不同的掩码处理。实验观察到，动态掩码能提升性能，并比静态掩码产生更好的结果。\n- **不同的训练目标：** `BERT`\
  \ 通过训练 `NSP` 来捕捉句子间的关系。一些未应用 `NSP` 的训练方法取得了更好的结果，证明了 `NSP` 的无效性。实验比较了使用带 `NSP` 的段对、带\
  \ `NSP` 的句对、不带 `NSP` 的完整句子以及不带 `NSP` 的文档句子训练的模型。不带 `NSP` 训练的模型在 `SQuAD1.1/2.0`、`MNLI-m`、`SST-2`\
  \ 和 `RACE` 上表现更佳。\n- **在更长序列上训练：** 当模型在更长序列上训练时，取得了更好的结果。`BERT` base 使用 256 个序列的批次大小，经过\
  \ 100 万步训练，但在 2,000 个序列和 31,000 步上的训练显示了性能提升。\n\n通过实施这些设计变更，`RoBERTa` 模型在 `MNLI`、`QNLI`、`RTE`\
  \ 和 `RACE` 任务上实现了最先进的性能。它在 `GLUE` 基准测试中也取得了显著的性能提升，得分为 88.5。\n\n`RoBERTa` 表明，调整\
  \ `BERT` 的训练过程可以在各种 NLP 任务上带来性能提升。这凸显了探索 `BERT` 训练中的设计选择以获得更好性能输出的重要性。\n\n### DistilBERT\n\
  \n`DistilBERT` 是为知识蒸馏而引入的。这种知识蒸馏是为了解决大量参数计算带来的弊端。最近开发的 NLP 模型参数数量不断增加，现已达到数百亿级别。尽管更高的参数数量能确保最佳性能，但在计算资源有限的情况下，它会阻碍模型的训练和服务。\n\
  \n知识蒸馏的核心思想是，一个较大的模型充当较小模型的教师，后者试图针对给定的输入集复制前者的输出和子层激活。这有时也被称为师生学习。这是一种压缩技术，通过较小的模型来复现较大模型的行为。来自教师的输出分布可用于所有可能的目标，这有助于创建一个具有泛化能力的学生模型。例如，在句子“天空是\
  \ [mask]”中，教师可能会为“多云”和“晴朗”等词分配高概率。也有可能为“蓝色”一词分配高概率。这对学生模型很有帮助，使其能够进行泛化，而不仅仅是学习正确的目标。这些信息通过用于训练学生的损失函数来捕获。该损失函数由三个因素的线性组合构成。\n\
  \n#### 蒸馏损失\n\n蒸馏损失考虑了教师（`t`）和学生（`s`）输出概率的组合，如下式所示。\n\n```\nL[ce] = ∑[i] t[i] log(s[i])\n\
  ```\n\n蒸馏损失\n\n```\nt[i] = exp(z[i]/T)/ ∑[j] exp(z[j]/T)\n```\n\n温度 Softmax\n\n\
  教师概率通过温度 softmax 计算。这基本上是对 softmax 的一种修改，以便从教师模型输出分布中获得更细粒度的信息。这会得到一个更平滑的输出分布，因为较大概率的规模减小了，而较小概率的规模增大了。这有助于最小化蒸馏损失。\n\
  \n#### 余弦嵌入损失\n\n余弦嵌入损失是教师和学生隐藏表示之间的距离度量。这有助于创建更好的模型，因为它使学生不仅能在输出层，还能在其他层模仿教师。\n\
  \n#### 掩码语言建模损失\n\n这与训练 `BERT` 模型时使用的损失相同，用于预测序列中掩码标记的正确标记值。\n\n#### 架构修改\n\n`DistilBERT`\
  \ 网络架构也是一个类似于 `BERT` base 的 Transformer 编码器模型，但其层数减半。不过，隐藏表示的维度保持不变。这影响了参数数量，`DistilBERT`\
  \ 的参数数量为 6600 万，而教师模型的参数数量为 1.1 亿。通过减少层数来缩小模型规模，有助于大幅降低计算复杂度。向量或隐藏状态表示维度的减小也缩小了模型规模。\n\
  \n经过知识蒸馏后，`DistilBERT` 在 `GLUE` 基准测试中能够达到 `BERT` base 得分的 97%。这种知识蒸馏有助于将较大的模型或模型集成压缩成一个较小的学生网络。这在计算环境受限的情况下已被证明是有帮助的。\n\
  \n### StructBERT\n\n`StructBERT` 是一个基于 `BERT` 的模型，它将语言结构融入 `BERT` 的预训练中。两种线性化策略有助于将语言结构融入\
  \ `BERT`。词级排序和句子级排序是 `StructBERT` 中利用的两种结构信息集。由于融入了这种结构预训练，`StructBERT` 实现了更好的泛化能力和适应性。词与词之间以及句子之间的依赖关系在\
  \ `StructBERT` 中被编码。\n\n#### StructBERT 中的结构预训练\n\n与所有其他基于 `BERT` 的模型类似，`StructBERT`\
  \ 也建立在 `BERT` 架构之上。原始的 `BERT` 执行两个无监督预训练任务：`MLM` 和 `NSP`。`StructBERT` 能够增强 `MLM`\
  \ 任务的能力。它在词被掩码后打乱一定数量的标记，并预测正确的顺序。`StructBERT` 还能更好地理解句子之间的关系。这是通过随机交换句子顺序来实现的。这种新的基于\
  \ `BERT` 的模型能够捕捉每个句子中细粒度的词结构。\n\n在对 `StructBERT` 进行预训练后，可以针对特定任务的数据对其进行微调，以应用于广泛的下游任务，例如文档摘要。\n\
  \n\n\n#### 预训练目标\n\n在 `StructBERT` 中，原始 `BERT` 的预训练目标得到了扩展，以充分利用语言中丰富的句子内部和句子间结构。这通过两种方式实现。\n\
  \n1.  **词结构目标：** `BERT` 模型未能显式地建模自然语言中的序列顺序和高阶词依赖关系。一个好的语言模型应该能够从给定的、单词顺序被打乱的句子中重建出原句。`StructBERT`\
  \ 通过为 `BERT` 的训练目标补充一个新的词结构目标来实现这一想法。这个新的模型目标赋予了模型重组句子、将随机打乱的词元恢复为正确顺序的能力。该目标与 `BERT`\
  \ 中的 `MLM` 目标一起训练。\n\n2.  **句子结构目标：** 在 `StructBERT` 中，原始 `BERT` 模型的 `NSP` 目标得到了扩展，不仅预测下一句，还预测上一句。这使得预训练模型能够以双向方式学习句子的序列顺序。\n\
  \n这两个辅助目标与原始的 `MLM` 目标一起进行预训练，以利用语言的内在结构。\n\n### 用于自然问题的 BERT[joint]\n\n`BERT[joint]`\
  \ 是一个基于 BERT 的模型，用于处理自然问题。`BERT[joint]` 模型仅在一个单一模型中预测短答案和长答案，而不是采用流水线方法。在该模型中，每个文档通过重叠的词元窗口被分割成多个训练实例。这种方法用于创建平衡的训练集，并通过下采样没有答案的实例（空实例）来遵循。训练期间使用\
  \ `[CLS]` 词元来预测空实例，在推理时，跨度根据跨度得分与 `[CLS]` 得分之间的差异进行排序。\n\n该模型使用自然问题（`NQ`）数据集，这是一个包含\
  \ 307,373 个训练样本、7,830 个开发样本和 7,842 个测试样本的问答数据集。对于每个样本，用户通过谷歌搜索引擎输入一个查询，并找到包含答案的相应维基百科页面。该维基百科页面被标注为问题的答案。\n\
  \n`BERT[joint]` 模型从在 `SQuAD 1.1` 数据集上训练的原始 `BERT` 模型初始化。之后，该模型在自然问题训练实例上进行了微调。它使用了\
  \ Adam 优化器来最小化损失。用于自然问题的 `BERT[joint]` 模型比基线 `NQ` 系统取得了显著更好的结果。这种 `BERT` 变体为设计问答系统提供了一种新方法。\n\
  \n## 结论\n\n本章深入探讨了 `BERT`，以及它的两种算法 `MLM` 和 `NSP`。我们还讨论了一个使用 `BERT` 开发的文本分类模型示例。我们还考察了\
  \ `BERT` 在不同基准数据集上的表现，以及 `BERT` 的多种变体。在下一章中，我们将讨论使用 `BERT` 设计问答系统。\n\n"
- "# 5. BERT 模型应用：问答系统\n\n我们被以文档、图像、博客、网站等形式呈现的海量信息所包围。在大多数情况下，我们总是寻找直接的答案，而不是阅读冗长的文档全文。问答系统通常用于此目的。这些系统扫描文档语料库，并为您提供相关的答案或段落。它是信息检索和\
  \ `NLP` 领域中计算机科学学科的一部分，专注于构建能够自动从自然语言中提取由人类或机器提出的问题答案的系统。\n\n两个最早的问答系统 `BASEBALL`\
  \ 和 `LUNAR`，因其核心数据库或信息系统而广受欢迎。`BASEBALL` 旨在回答一年周期内关于美国联盟棒球的问题。`LUNAR` 旨在根据阿波罗登月任务收集的数据，回答与月球岩石地质分析相关的问题。这些早期系统专注于封闭领域，每个查询必须针对特定领域，且答案文本必须仅使用受限词汇。\n\
  \n现代世界一些先进的问答系统包括苹果 Siri、亚马逊 Alexa 和谷歌助手。有各种流行的问答系统数据集可用于检验模型性能。这些数据集包括以下内容。\n\n\
  *   **SQuAD：** 斯坦福问答数据集（`SQuAD`）是一个阅读理解数据集，我们在第 4 章中介绍过。\n\n*   **NewsQA：** 该数据集旨在帮助研究社区构建能够回答需要人类水平理解和推理能力问题的算法。作者利用\
  \ DeepMind 问答数据集中的 CNN 文章，构建了一个包含 120,000 个问答对的人工众包机器阅读理解数据集。\n\n*   **WikiQA：**\
  \ 这个公开可用的数据集包含问答对。它被收集和注释用于开放域问答系统的研究。此外，`WikiQA` 数据集还包含没有正确答案的问题，使研究人员也能处理负面案例，以避免选择不相关的答案。\n\
  \n\n\n## 问答系统的类型\n\n问答系统大致分为两类：开放域问答系统（ODQA）和封闭域问答系统（CDQA）。\n\n- **封闭域：** 在封闭域系统中，问题属于特定领域。它们只能回答来自单一领域的问题。例如，一个面向医疗保健领域的问答系统无法回答任何与\
  \ IT 相关的问题。这些系统通过使用在特定领域数据集上训练的模型来利用领域特定知识。`CDQA` 套件可用于构建此类封闭域问答系统。\n\n- **开放域：**\
  \ 在开放域系统中，问题可以来自任何领域，例如医疗保健、IT、体育等。这些系统旨在回答来自任何领域的问题。它们实际上模仿了人类智能来回答问题。此类系统的一个例子是\
  \ `DeepPavlov ODQA` 系统，这是由 MIPT 开发的一个开放域问答系统，它使用维基百科文章的大型数据集作为其知识来源。\n\n这些系统还可以进一步分为事实型和非事实型，如第\
  \ 4 章所述，此处进行说明。\n\n- **事实型问题：** 事实型问题要求提供简洁的事实。事实型问题的答案基于已证实的事实。例如，学习者可能会被要求阅读一段文字，然后根据刚刚阅读的内容回答一系列事实性问题。这类问题通常以谁、什么、何时或哪里开头。\n\
  \n  以下是一些事实型问题的示例。\n  - 美国总统是谁？\n  - 印度总理是谁？\n  - 谷歌的 CEO 是谁？\n\n  如果文本包含足以回答问题的相关数据，那么所有这些问题的答案都可以从任何文档或博客中找到。\n\
  \n- **非事实型问题：** 非事实型问题期望得到关于任何主题的详细答案。例如，用户可以提出与数学问题、如何驾驶车辆、温度的含义等相关的问题。非事实型问题通常需要多个句子作为答案，并且这些答案来自文档中的特定段落。因此，句子的上下文在检索相关答案时起着重要作用。\n\
  \n  以下是一些非事实型问题的示例。\n  - 在 Windows 上安装 Python 的流程是什么？\n  - 如何重置我的 Microsoft Outlook\
  \ 密码？\n  - 温度是什么意思？\n\n  这些问题的答案将是一个文档、一个段落或一个段落中的定义。\n\n\n\n## 使用 BERT 设计问答系统\n\
  \n本节将详细介绍如何利用 `BERT` 实现一个事实型问答系统。本书将使用一个已在 `SQuAD` 1.0 数据集上预训练好的模型。\n\n举例来说，考虑以下问题及其来自维基百科关于足球联盟文章的段落。\n\
  \n- **问题**：足球联盟成立于何处？\n- **段落**：1888 年，足球联盟在英格兰成立，成为众多职业足球比赛中的第一个。在 20 世纪，多种不同类型的足球运动逐渐发展成为世界上最受欢迎的团队运动之一。\n\
  \n因此，这个问题的答案是英格兰。\n\n现在，我们更深入地探讨如何使用 `BERT` 处理这个问题和段落，以找到相关答案。与第 4 章中的文本分类方法相比，这一切都发生在问答系统的上下文中。\n\
  \n`BERT` 从问题和段落中提取标记，并将它们组合在一起作为输入。如前所述，它以 `[CLS]` 标记开始，该标记表示句子的开始，并使用 `[SEP]` 分隔符来分隔问题和段落。除了\
  \ `[SEP]` 标记，`BERT` 还使用分段嵌入来区分问题和包含答案的段落。`BERT` 创建两个分段嵌入，一个用于问题，另一个用于段落，以区分问题和段落。然后，将这些嵌入添加到标记的独热表示中，以区分问题和段落，如图\
  \ 5-1 所示。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig1_HTML.jpg](img/498208_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** BERT 输入表示\n\n接下来，我们将问题和段落的组合嵌入表示作为输入传递给 `BERT` 模型。然后，`BERT` 的最后一个隐藏层将被修改，并使用\
  \ `softmax` 为输入文本句子上的起始和结束索引生成概率分布，该分布定义了一个子字符串，即答案，如图 5-2 所示。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig2_HTML.jpg](img/498208_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 问答系统的 BERT 架构\n\n至此，我们已经讨论了 `BERT` 如何处理输入的问题和段落。接下来，我们将看到如何在 Python\
  \ 中使用 `BERT` 实现一个问答系统。\n\n请按照以下步骤安装基于 `BERT` 的问答系统所需的先决条件。其中许多与第 4 章中的示例相同，但为了完整性而包含在内，以确保您可以运行本章中的示例。\n\
  \n1.  确保您的系统上已安装 Python。打开命令提示符并运行以下命令以确定是否安装了 Python，如图 5-3 所示。\n\n    `python`\n\
  \n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig3_HTML.jpg](img/498208_1_En_5_Fig3_HTML.jpg)\n\
  \n    **图 5-3** Python 控制台\n\n    这将在命令提示符下打开您的 Python 控制台。如果您的系统上未安装 Python，请根据您的操作系统从\
  \ [`https://www.python.org/downloads/`](https://www.python.org/downloads/) 下载并安装。\n\
  \n2.  接下来，安装我们将用于编码的 Jupyter Notebook。打开命令提示符并运行以下命令。\n\n    ```\n    pip install\
  \ notebook\n    ```\n\n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig4_HTML.jpg](img/498208_1_En_5_Fig4_HTML.jpg)\n\
  \n    **图 5-4** Jupyter Notebook 控制台\n\n3.  打开命令提示符并运行以下命令以运行 Jupyter Notebook。\n\
  \n    `jupyter notebook`\n\n    Notebook 将在您的默认浏览器中打开，主机地址为 `localhost`，端口号为 `8888`，并附带一个唯一的令牌\
  \ ID。现在，您可以按照后续步骤开始编写代码，如图 5-4 所示。\n\n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig5_HTML.jpg](img/498208_1_En_5_Fig5_HTML.jpg)\n\
  \n    **图 5-5** 用于创建或导入 Notebook 的 Google Colab 界面\n\n4.  您也可以使用 Google Colab Notebook\
  \ 达到相同目的。如果您的系统没有足够的可用资源，它提供了一个快速且免费的环境来运行您的 Python 代码。您还可以在 Google Colab 中免费使用\
  \ GPU 和 TPU，但时间有限（12 小时）。您只需要一个 Google 帐户即可登录 Google Colab Notebook。本书将使用 Google\
  \ Colab Notebook 来演示使用 `BERT` 的问答系统。登录您的 Google 帐户并点击 [`https://colab.research.google.com`](https://colab.research.google.com)。您将看到如图\
