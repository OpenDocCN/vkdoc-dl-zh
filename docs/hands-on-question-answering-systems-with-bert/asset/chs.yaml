  \ `deeppavlov` 库的 `build_model` 类来获取 BERT 模型。它需要两个参数：\n    *   **配置文件路径：** 定义包含要使用的相关\
  \ NLP 模型详细信息的 `config` 文件的名称。在本例中，我们将使用 `squad_bert`。此配置包含了在 SQuAD 数据集上训练过的特定 BERT\
