  \ 1888 年，英格兰成立了足球联赛，成为众多职业足球比赛中的第一个。在 20 世纪，几种不同类型的足球运动逐渐发展成为世界上最受欢迎的团队运动之一。\n\n\
  **问题：** 足球联赛是哪一年成立的？\n\n**答案：** 1888\n\n请按照以下步骤实现一个基于上下文的问答系统。\n\n1.  创建一个新的 Jupyter\
  \ notebook，并运行以下命令来安装 `deeppavlov` 库。\n2.  运行以下命令来安装所有必需的模型、词汇表等。\n\n```\npip install\
  \ deeppavlov\n```\n\n```\n! python -m deeppavlov install squad_bert\n```\n\n**注意：**\
