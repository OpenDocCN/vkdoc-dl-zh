  \n按照下面给出的步骤，将问答系统的功能作为 REST API 发布。\n\n1.  创建一个名为 `QuestionAnsweringAPI.py` 的文件。\n\
  2.  复制以下代码并粘贴到该文件中，然后保存。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig19_HTML.jpg](img/498208_1_En_5_Fig19_HTML.jpg)\n\
  \n图 5-19 服务部署\n\n1.  该代码处理传递给 API 的输入，调用函数 `get_answer_using_bert`，并将此函数的响应作为 API\
  \ 响应发送。\n2.  打开命令提示符并运行以下命令。\n\n`Python QuestionAnsweringAPI.py`\n\n这将在 `http://127.0.0.1:5000/`\
  \ 上启动一个服务，如图 5-19 所示。\n\n```\nfrom flask import Flask, request\nimport json\nfrom\
  \ QuestionAnsweringSystem.QuestionAnswer import get_answer_using_bert\napp=Flask(__name__)\n\
  @app.route (\"/questionAnswering\", methods=['POST'])\ndef questionAnswering():\n\
  try:\njson_data = request.get_json(force=True)\nquery = json_data['query']\ncontext_list\
  \ = json_data['context_list']\nresult = []\nfor val in context_list:\ncontext =\
  \ val['context']\ncontext = context.replace(\"\\n\",\" \")\nanswer_json_final =\
  \ dict()\nanswer = get_answer_using_bert(context, query)\nanswer_json_final['answer']\
  \ = answer\nanswer_json_final['id'] = val['id']\nanswer_json_final['question'] =\
  \ query\nresult.append(answer_json_final)\nresult={'results':result}\nresult = json.dumps(result)\n\
  return result\nexcept Exception as e:\nreturn {\"Error\": str(e)}\nif __name__ ==\
  \ \"__main__\" :\napp.run(port=\"5000\")\n```\n\n1.  现在，为了测试 REST API，我们将使用 Postman。这是一个\
  \ REST API 客户端，用于测试 API URL。我们可以测试任何复杂的 HTTP/s 请求，也可以读取它们的响应。首先，访问 `https://www.postman.com/downloads/`\
  \ 下载 Postman 工具并将其安装到你的系统上。\n2.  安装后，测试以下 URL 和示例请求 JSON（该 JSON 被发送到问答 API 端点）以及将从\
  \ API 接收到的响应 JSON，如图 5-20 所示。\n\n**URL:** `http://127.0.0.1:5000/questionAnswering`\n\
  \n**问答系统示例输入请求 JSON:**\n\n```\n{\n\"query\": \"Where was the Football league founded?\"\
  ,\n\"context_list\": [\n{\n\"id\": 1,\n\"context\": \"In 1888, The Football League\
  \ was founded in England, becoming the first of many professional football competitions.\
  \ During the 20th century, several of the various kinds of football grew to become\
  \ some of the most popular team sports in the world\"\n}\n]\n}\n```\n\n**问答系统示例输出响应\
  \ JSON:**\n\n```\n{\n\"results\": [\n{\n\"answer\": \"england\",\n\"id\": 1,\n\"\
  question\": \"Where was the Football leagure founded?\"\n}\n]\n}\n```\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig20_HTML.jpg](img/498208_1_En_5_Fig20_HTML.jpg)\n\
  \n图 5-20 调用问答 API\n\n本练习的代码库可以从 GitHub 的 `https://github.com/bertbook/Python_code/tree/master/Chapter5/QuestionAnsweringSystem`\
  \ 下载。\n\n## 开放域问答系统\n\nODQA 系统旨在从维基百科文章中找出任何问题的确切答案。因此，对于一个问题，该系统将提供一个相关的答案。ODQA\
  \ 系统的默认实现将一批查询作为输入进行处理，并返回答案。\n\n\n\n## 模型架构\n\nDeepPavlov ODQA 系统的架构由两个组件构成：一个排序器和一个阅读器。为了找到任何问题的答案，排序器首先从文档集合中检索出相关文章列表，然后阅读器扫描这些文章以识别答案。\n\
  \n排序器组件基于 Facebook Research 提出的 DrQA 架构。具体来说，DrQA 方法使用一元-二元哈希和 TF-IDF 算法，根据问题高效地返回相关文章的子集。阅读器组件基于微软亚洲研究院提出并由\
  \ Wenxuan Zhou 实现的 R-NET 架构。R-NET 架构是一个端到端的神经网络模型，旨在根据给定的文档回答问题。R-NET 首先通过基于门控注意力的循环网络匹配问题和文档，以获得问题感知的文档表示。然后，自匹配注意力机制通过将文档与自身进行匹配来优化表示，从而有效地编码整个文档的信息。最后，指针网络定位答案在文章中的起始和结束索引。图\
  \ 5-21 展示了 DeepPavlov ODQA 系统的逻辑流程。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig21_HTML.jpg](img/498208_1_En_5_Fig21_HTML.jpg)\n\
