    \n图 6-11\n\nTensorFlow 的安装\n\n2.  导入此实现所需的包，例如来自`sklearn`的`fetch_20newsgroup`数据集和`ktrain`库，如下所示。\n\
    \n```\nfrom sklearn.datasets import fetch_20newsgroups\nimport ktrain\n```\n\n\
