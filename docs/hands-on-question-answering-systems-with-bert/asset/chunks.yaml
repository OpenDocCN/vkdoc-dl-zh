- fmt: "# Recurrent Neural Networks\n\nRecurrent neural networks (`RNN`s) are neural\
    \ networks that are designed to process continuous data or data that are presented\
    \ as streams to benefit from the continuity of data. Often the data that are received\
    \ at each hidden layer have an input from the previous layer’s output as input\
    \ to the current layer, along with a hidden input.\n\n`RNN`s can prove to be very\
    \ advantageous in cases with long input sequences where the requirement circles\
    \ around maintaining the context of the same input, not affecting the size of\
    \ the model being used. This makes `NLP` a natural fit application for `RNN`s,\
    \ although historical information tends to fade over a long period of time, and\
    \ also can slow down the process.\n\nAs we can see in Figure [2-8](#498208_1_En_2_Chapter.xhtml#Fig8),\
    \ the input is represented by `X[t]`, which is the input to the network at time\
    \ step `t`. For instance, `X[1]` can be one vector corresponding to a word in\
    \ a sentence. The hidden state is represented by `H[t]` at time `t`. It acts as\
    \ the memory of the network. The value of `H[t]` is computed on the basis of current\
    \ input and the previous time step’s hidden state:\n\n`H[t] = f (U X[t] + W H[t-1])`\n\
    \nThe function `f` is a nonlinear transformation function like `tanh` or `ReLU`.\n\
    \n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig8_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig8_HTML.jpg)\n\
    \n**Figure 2-8**  \nRNN diagram\n\nIn contrast to `FNN`s, `RNN`s make use of their\
    \ internal state or memory to process the input sequences. All the inputs in an\
    \ `RNN` are related to each other, unlike other networks where inputs are independent\
    \ of each other. An `RNN` takes `X[0]` from the sequence of inputs and then it\
    \ outputs `H[0]`. This output, together with `X[1]`, is the input for the next\
    \ step. Hence, `H[0]` and `X[1]` form the input to the next step. Similarly, `H[t-1]`\
    \ and `X[t]` form the input at time `t`. This way, the `RNN` remembers the context\
    \ while training.\n\nThe current state is given by\n\n`H[t] = f (H[t-1], X[t])`.\n\
    \nOn applying the activation function,\n\n`H[(t)] = tanh (W H[(t-1)] + U X[(t)])`.\n\
    \n* `H` is the single hidden vector.\n* `W` is the weight at previous state.\n\
    * `tanh` is the activation function.\n* `U` is the weight at the current input\
    \ state.\n\nThe output of the network is represented by `Y[t]`. There are weights\
    \ that parameterize the connections from input to hidden layers. The weight matrix\
    \ `U` parameterizes the input to hidden connections. The hidden to hidden connections\
    \ are parameterized by the weight matrix `W`, and hidden to output layer connections\
    \ are parameterized by the weight matrix `V`. All these weights (`U`, `V`, `W`)\
    \ are shared across time.\n\nHence, the output is given by\n\n`Y[t] = V H[t]`.\n\
    \nAn `RNN` model enables modeling of the sequence of data so that each result\
    \ of the sample can be assumed to be dependent on previous ones. There is also\
    \ another advantage of `RNN`s, as they can even be used with convolutional layers\
    \ to extend the effective pixel neighborhood.\n\nThe `RNN` model has a disadvantage\
    \ when using `tanh` or `ReLU` as an activation function, as it fails to process\
    \ long sequences. Training of an `RNN` is also a difficult task and there are\
    \ problems of gradients vanishing and exploding.\n\n# Long Short-Term Memory\n\
    \n`LSTM` is one of the most widely used forms of `RNN`s. They are capable of learning\
    \ long-term dependencies, and their default behavior to learn or remember information\
    \ for long periods of time.\n\nAll `RNN` models have the form of repeating modules\
    \ of neural networks that are chained. In standard `RNN`s, this repeating module\
    \ will have a very simple structure, such as a single `tanh` layer.\n\n`LSTM`s,\
    \ on the other hand, also have this chain-like structure, but the repeating module\
    \ has a different structure. Here, instead of a single neural network layer, there\
    \ are four layers that interact in a very special way. The control flow of `LSTM`\
    \ is similar to the `RNN`, as it processes the data and passes the information\
    \ as the data propagates forward. The difference in the way `LSTM` works is that\
    \ the cell allows the `LSTM` to keep or forget the information. In `LSTM` there\
    \ is emphasis on cell state and the various gates. The cell state acts as a transport\
    \ highway and transfers the relative information all the way through the sequence\
    \ chain. The gates add or remove information as the cell state goes on the journey.\
    \ The gates are different neural networks that decide which information is allowed\
    \ in the cell state. The gates and cell state make `LSTM` distinctive among `RNN`\
    \ models and further makes `LSTM` useful in various applications.\n\n# Encoders\
    \ and Decoders\n\nThe encoder–decoder is an organization of `RNN`s for sequence\
    \ prediction problems that often have a variable number of inputs, outputs, or\
    \ both. The main purpose of the encoder–decoder initially was machine translation\
    \ problems, but it has proven to be successful at related sequence-to-sequence\
    \ prediction problems such as question answering and text summarization.\n\nThe\
    \ encoder–decoder approach involves two `RNN`s, one to encode the input sequence\
    \ and the other to decode the encoded input sequence into the target sequence.\
    \ The encoding task is performed by the encoder and the decoding task is performed\
    \ by the decoder. This encoder–decoder architecture is useful for various applications\
    \ of sequence-to-sequence models like these:\n\n* Chatbots\n* Machine translation\n\
    * Text summary\n* Image captioning\n\n## The Encoder–Decoder Architecture\n\n\
    The encoder–decoder architecture consists of two main components, the encoder\
    \ and the decoder. Both these components are trained jointly at the same time.\
    \ The architecture of the encoder–decoder is shown in Figure [2-9](#498208_1_En_2_Chapter.xhtml#Fig9).\n\
    \n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig9_HTML.png](images/498208_1_En_2_Chapter/498208_1_En_2_Fig9_HTML.png)\n\
    \n**Figure 2-9**  \nArchitecture of encoder–decoder\n\nThe encoder takes the input\
    \ and reads the entire input sequence, which it encodes into an internal representation.\
    \ The encoder processes the input sequence and collects information from the sequence\
    \ and then propagates it further. This fixed-length internal representation vector\
    \ is known as the context vector. The intermediate vector ID is the final internal\
    \ state produced from the encoder part of the model. This helps the decoder to\
    \ make accurate predictions. The decoder is responsible for reading the encoded\
    \ sequence from the encoder and thereby generating the output sequence."
