  trans: '

    ### 隐藏层


    这些层负责生成特定于任务的特征。我们可以在输入层和输出层之间设置任意数量的隐藏层。每一层都由负责执行特定任务操作的神经元组成。该层可能实现激活函数（例如 `Sigmoid`、`tanh`），也可能仅对来自上一层的所有输入进行加权求和。因此，该层接收来自上一层的输入，然后计算输入与其对应权重值的乘积之和，并应用激活函数，从而得到该隐藏层的输出。随后，这些信息会被传递到下一个隐藏层或输出层。


    ### 输出层


    输出层是神经网络中的最后一层。它负责收集来自最后一个隐藏层的所有信息，以输出最终的预期结果。如果你正在处理分类模型，那么最后一层的节点数应等于类别数；如果是回归问题，则只需一个节点。


    关于如何确定网络层数以及每层节点数，一直是一个悬而未决的问题。虽然没有严格的规定，但在设计神经网络架构时，有一些建议值得考虑。


    *   输入层的节点数必须等于输入数据点的维度。

    *   输出层的节点数取决于神经网络执行的任务。例如，对于分类任务，节点数应等于类别数；对于回归任务，则只需一个节点。

    *   隐藏层的数量以及每个隐藏层的节点数完全取决于你的目标任务。很可能一个神经网络对任务 A 效果完美，但对任务 B 却不起作用。

    *   列出你希望在输入层和输出层之间执行的所有中间变换。

    *   隐藏层的节点数应大于输入层和输出层的节点数。

    *   隐藏层的节点数应为 2 的幂（例如 2、4、8、16、32 等）。


    例如，如果你正在构建一个情感模型（或分类模型），该系统将识别用户反馈的情感为正面、负面或中性，那么神经网络输出层的结果将是所有类别（正面、负面和中性）的概率分布，如图
    2-2 所示。


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig2_HTML.jpg](img/498208_1_En_2_Fig2_HTML.jpg)


    图 2-2


    神经网络


    ### 激活函数


    神经网络用于解决复杂的非线性问题，而传统的线性模型无法胜任。神经网络中的激活函数正是为系统引入非线性的关键，如图 2-3 所示。


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig3_HTML.jpg](img/498208_1_En_2_Fig3_HTML.jpg)


    图 2-3


    激活函数


    它计算输入与其对应权重的乘积之和，然后加上偏置。接着，激活函数决定将哪些特征或输入值传递到下一层。例如，假设我们在隐藏层的所有节点上都使用 `Sigmoid`
    函数，`Sigmoid` 可以取 0 到 1（含）之间的任意值。基于此，激活函数决定将来自本层和上一层的多少比例的信息传递到下一层。`Tanh` 和 `ReLU`
    是神经网络中其他重要的激活函数示例。


    至此，我们已经讨论了神经网络的构建模块。接下来，我们将转向神经网络的训练。


    ## 神经网络训练


    神经网络训练基于前向传播和反向传播的概念。在前向传播中，输入数据从输入层的神经元传递到隐藏层的神经元，然后使用激活函数进行相关变换，最后到达输出层的神经元以计算预测值。在反向传播中，通过比较输入数据的实际值和预测值来计算损失。这个误差从输出层的神经元传播到所有隐藏层的神经元。隐藏层中的神经元很可能只接收到误差的一部分，具体取决于它们对输出层神经元的贡献程度。


    当我们谈论信息的前向或反向传播时，这意味着连接这些神经元的边的权重以及这些神经元的偏置值将被调整。此外，权重和偏置的值是随机初始化的，学习过程会相应地找到这些模型参数的最优值。


    ## 神经网络的类型


    既然我们已经了解了每个神经元、权重和激活函数如何共同构建一个神经网络，我们就可以研究如何以不同的方式使用它们来获得不同的结果。接下来，我们将讨论几种类型的神经网络。


    ### 前馈神经网络


    前馈神经网络（FNN）可以最好地描述为一种单向神经网络，其结构中没有反馈或回路。FNN 的架构包括一定数量的隐藏层和每层中一定数量的隐藏单元，如图 2-4
    所示。


    这种神经网络被称为前馈网络的原因之一是，在 FNN 作为分类器正常运行期间，各层之间没有反馈。


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig4_HTML.jpg](img/498208_1_En_2_Fig4_HTML.jpg)


    图 2-4


    基本 FNN 感知器示意图


    在 FNN 中，感知器按层排列。第一层负责接收输入，最后一层产生输出。由于中间层与外部世界没有任何连接，因此它们被称为隐藏层。信息从一层前馈到下一层，因为一层中的每个感知器都与下一层中的每个感知器相连。另一方面，同一层中的感知器之间没有连接。


    FNN 模型在训练过程中使用成本函数。该成本函数作用于模型做出的近似值与实际目标值之间的差异。与机器学习算法类似，FNN 也使用基于梯度的学习进行训练。成本函数可能的选择包括二次成本、交叉熵成本、指数成本等。


    输出层包含输出单元，其任务是提供所需的输出或预测。成本函数和输出单元的选择是紧密耦合的。输出单元有多种选择，如线性单元、Sigmoid 单元、Softmax
    单元等。


    FNN 对数据中的噪声敏感，且易于维护，因此在计算机视觉等领域具有广泛的应用前景。FNN 有助于揭示输入和输出之间的非线性关系，因此大多数多分类问题都可以借助这些网络轻松表示。

    '
- fmt: '# Convolutional Neural Networks


    A `CNN` is a deep learning algorithm. It takes in an input image and assigns weights
    and biases to various aspects in the image. There is comparatively less preprocessing
    in `CNN`s in contrast to other classification algorithms, as they possess the
    ability to learn filters and characteristics.


    Similar to other neural networks, `CNN`s are also composed of neurons and have
    learnable weights and biases. The weighted sum is taken over several inputs received,
    and is then passed through the activation function along with an output. The `CNN`
    varies from other networks in the way that it operates over volumes. Here the
    input is not a vector; instead, the input is a multichannel image.


    The `CNN` is used in image processing, as it captures the spatial and temporal
    dependencies in an image successfully by the application of relevant filters.
    The network understands the image in a better way as it performs better fitting
    to the image dataset while reducing the number of parameters involved.


    Convolution is the combination of two inputs to generate an output. For `CNN`s,
    often this input is an image that is masked with a filter to generate the desired
    output features. When we talk in terms of spatially distributed data or matrixes
    as input, the filter that is chosen is often a set of weights to tune the input
    for the desired changes to generate a result. If a generic meaning is referred,
    then convolution stands as a dot product of two values to generate a third value.
    Figures [2-5](#498208_1_En_2_Chapter.xhtml#Fig5) and [2-6](#498208_1_En_2_Chapter.xhtml#Fig6)
    show how convolution works in `CNN`s.


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig6_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Convolution example


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig5_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Convolution example


    In the example shown in Figure [2-5](#498208_1_En_2_Chapter.xhtml#Fig5), the input
    is in the form of a 5 × 5 matrix containing information from an image. We are
    going to apply a filter to yield the output. The input is padded with zeros to
    convert it into the below matrix. This padding is done to generate a spatial representation
    of the output in the desired dimensions.


    In the given example, the stride or the step size is 2, meaning the filter moves
    two steps right horizontally and two steps down vertically. The first time the
    filter convolves the top left corner submatrix shown in blue:


    `(0x-1 + 0x0 + 0x-1 + 0x0 + 1x1 + 4x1 + 0x1 + 2x0 + 0x-1) = 5`


    The following steps fill in the rest of the output matrix. It is also noticeable
    here that the submatrices shown in blue, black, and red hold very different values,
    but after masking from the filter the blue and black submatrices yield an equal
    output and the red submatrix yields a far smaller value. This signifies how much
    an appropriate filter can help change the output feature matrix. For example,
    if an image has pixel values with huge contrast values, a proper filter can help
    tone down the image contrast.


    `CNN`s play a crucial role by reducing images into a form that is easier to process
    while retaining the features that are important to obtain a good prediction. This
    ability of the `CNN`s makes them scalable to large datasets.


    In a `CNN`, we have a convolutional layer that extracts the high-level features
    like edges from the input image. This layer is the building block of the `CNN`.
    It consists of a set of independent filters that are convolved with the image,
    giving us the feature maps. These filters are randomly initialized, and they become
    parameters on subsequent learning by the network.


    Each of the neurons is connected to an input image’s small chunk for a particular
    feature map. There is also parameter sharing in a particular feature map. All
    the neurons have the same connection weights in a particular feature map. Parameter
    sharing and local connectivity help in reduction of the number of parameters in
    the whole system and ensure better computational efficiency.


    The concept of pooling makes `CNN`s differ from other neural networks. Pooling
    functions to reduce the spatial size of the representation progressively to reduce
    the number of parameters and amount of computation. The pooling layer operates
    independently on each of the feature maps.


    After the pooling layer, the flattened output is fed to an `FNN` and then backpropagation
    is applied to every iteration of training, as shown in Figure [2-7](#498208_1_En_2_Chapter.xhtml#Fig7).
    Over a series of iterations, the model is able to classify the images using the
    softmax classification technique.


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig7_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    CNN diagram'
