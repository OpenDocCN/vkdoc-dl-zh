    \n![$$ Final\\ GLUE\\ Score=\\sum Individual\\ Task\\ Score $$](img/498208_1_En_4_Chapter_TeX_Equa.png)\n\
    \n模型需要更改其输入和输出的表示以适应任务。例如，在`BERT`的预训练期间，当句子作为输入时，会屏蔽少数单词。由于`BERT`中的输入表示层适应所有 GLUE\
