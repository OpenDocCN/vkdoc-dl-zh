- fmt: '### Bidirectional Encoder Representations from Transformers


    `Bidirectional Encoder Representations from Transformers` (`BERT`) has been introduced
    by researchers at Google. The bidirectional transformer for language modeling
    makes `BERT` popular in a variety of `NLP` tasks as well as question answering.
    This makes it different from the previous models where sequences are taken in
    one direction only, either left to right or right to left.


    The bidirectional encoder takes two sequences for encoding, one of which is the
    normal sequence and the other one is the reverse of it. It consists of two encoders
    for encoding the two sequences. For the final output, both encoding results are
    considered. The bidirectional training of language models gives them deeper insight
    into the context of language. It is indeed important for understanding the meaning
    of text, as shown in Figure [3-7](#498208_1_En_3_Chapter.xhtml#Fig7).


    For example, consider the following two sentences:


    - Sentence 1: I got scared on seeing a `bat` flying in my room.

    - Sentence 2: The player held the `bat` firmly while smashing a ball with it.


    Here, the word “bat” has a different meaning in the two sentences, depending on
    the language context. This is better understood if we approach the sentence from
    both directions. If we move in only one direction, we might miss useful information
    and might not correctly obtain the meaning. `BERT` considers both the preceding
    and following context, which reduces the chances for an error before making any
    prediction. Information is gathered from both directions while training and the
    context from both directions is jointly conditioned in all the layers.


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig7_HTML.jpg](images/498208_1_En_3_Chapter/498208_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    `BERT` architecture


    The pretrained `BERT` model can be used for various state-of-the-art tasks by
    just modifying the output layer. It does not require any task-specific architectural
    change. It uses the transformer to grasp the relationship of a token or word in
    the text. A transformer includes an encoder and a decoder. The encoder reads the
    input text and the decoder helps in generating predictions for a task. The transformer
    encoder is able to read the entire sequence of words at once instead of reading
    sequentially from left to right. This makes the model bidirectional and allows
    it to learn the context of a word or token from both left and right side of it.
    The sequence of tokens that are input to the transformer are embedded into vectors
    and then vectors are further processed in the neural network. The output of the
    network is a sequence of vectors corresponding to the input tokens, as shown in
    Figure [3-8](#498208_1_En_3_Chapter.xhtml#Fig8).


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig8_HTML.jpg](images/498208_1_En_3_Chapter/498208_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    `BERT` transformer


    `BERT` uses two strategies to surpass unidirectional constraints. `BERT` is pretrained
    on these two `NLP` tasks: masked language modeling (`MLM`) and next sentence prediction
    (`NSP`). `MLM` assists in pretraining the bidirectional transformer by randomly
    masking tokens from the input text while the `NSP` task jointly pretrains text
    pair representations. `BERT` minimizes the combined loss function for both the
    tasks during training.


    To use `BERT`, two stages are to be followed:


    1. **Pretraining:** In this step the model is trained on unlabeled data over different
    pretraining tasks.

    2. **Fine-tuning:** The `BERT` model is initialized with the pretrained parameters
    followed by fine-tuning using the data from the downstream task, which could be
    classification, question answering, and so on.


    There are two implementations for the `BERT` model, the `BERT` base model and
    the `BERT` large model.


    #### BERT Base Model


    The `BERT` base model is a pretrained `BERT` model that has 12 layers or transformer
    blocks, 768 hidden units in each layer, and 110 million parameters. It can further
    be classified as `BERT` base-cased and `BERT` base-uncased depending on the English
    text (cased or uncased) it has been trained on, as shown in Figure [3-9](#498208_1_En_3_Chapter.xhtml#Fig9).


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig9_HTML.jpg](images/498208_1_En_3_Chapter/498208_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    `BERT` base and `BERT` large models


    #### BERT Large Model


    The `BERT` large model is a pretrained `BERT` model that has 24 layers or transformer
    blocks, 1,024 hidden units in each layer, and 340 million parameters. It can also
    further be classified as `BERT` large-cased and `BERT` large-uncased. This model
    requires significantly more memory than `BERT` base.


    ## Conclusion


    This chapter covered word embedding, sentence embeddings, and their different
    methods of implementation, such as `Word2vec`, `GloVe`, `Universal Sentence Encoder`,
    and so on. We have also discussed `BERT` and its variations (i.e., base and large
    models). In the next chapter, we will look deeper into `BERT` and its different
    implementations.


    # 4. BERT Algorithms Explained


    This chapter takes a deep dive into the `BERT` algorithm for sentence embedding
    along with various training strategies, including `MLM` and `NSP`. We will also
    see an implementation of a text classification system using `BERT`.


    ## How Does BERT Work?


    `BERT` makes use of a transformer to learn contextual relations between words
    in a text. A transformer has two mechanisms—an encoder and a decoder—but `BERT`
    only requires the encoder mechanism. `BERT` uses a bidirectional approach and
    reads the text input sequentially, which allows the model to learn the context
    of a word based on its surrounding words. The input to the encoder is a sequence
    of tokens that are embedded into vectors. The vectors are then passed into the
    neural network and an output sequence of vectors is then generated corresponding
    to the input. The output vector for a word is dependent on the context in which
    it occurs. For example, the vector for the word “like” in the sentence “He likes
    to play cricket” would be different than the vector for the same word in the sentence
    “His face turned red like a tomato.”


    This procedure involves text processing steps before even starting the model-building
    phase. The next section discusses the text processing steps used in `BERT`.'
