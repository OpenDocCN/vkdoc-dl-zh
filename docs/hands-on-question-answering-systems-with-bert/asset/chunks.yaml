- fmt: '# Count Vector


    In the previous section, we saw how one-hot representation of a sentence is generated
    on the basis of occurrence of words, not on the basis of their frequency of occurrence.
    The count vector for an individual sentence is generated on the basis of the number
    of times a particular word occurs in the sentence. The unique words in the corpus
    form the vocabulary.


    As an example, consider these two sentences.


    - Sentence 1: The blue bird is flying in the clear blue sky.

    - Sentence 2: The sky is clear today.


    This corpus has two sentences and the vocabulary set `[bird, blue, flying, is,
    in, the, sky, clear, today]` contains nine terms. For every word in the vocabulary
    set, its frequency of occurrence in a sentence is determined. A count vector corresponding
    to that sentence is thus formed. From these count vectors that represent the sentences
    we get our count matrix. The count matrix for the two example sentences is shown
    here.


    | | **is** | **bird** | **blue** | **flying** | **In** | **the** | **sky** | **clear**
    | **today** |

    | **Sentence 1** | 1 | 1 | 2 | 1 | 1 | 2 | 1 | 0 | 0 |

    | **Sentence 2** | 1 | 0 | 0 | 0 | 0 | 1 | 1 | 1 | 1 |


    The rows in the matrix are representative of the sentences and the columns signify
    the word vector for the corresponding word in the matrix. The size of the matrix
    is `S × T`, where `S` is the number of sentences and `T` is the number of terms
    or words.


    Count vector representation of sentences helps us to achieve several tasks, including
    these:


    - Determining similarity between sentences

    - Identification of relevant documents for a query

    - Document summarization


    As an example, we are showing how similarity between sentences can be computed
    mathematically. The count vector for Sentence 1 is `[1 1 2 1 1 2 1 0 0]` and the
    count vector for Sentence 2 is `[1 0 0 0 0 1 1 1 1]`. The cosine similarity can
    be computed using the following mathematical expression.


    `Sim = (x · y) / (||x|| ||y||)`


    Here, `x` and `y` are the two count vectors. `||x||` is the Euclidean norm of
    vector `x`.


    So,


    `x · y = 1×1 + 1×0 + 2×0 + 1×0 + 1×0 + 2×1 + 1×1 + 0×1 + 0×1 = 4`


    `||x|| = sqrt(1² + 1² + 2² + 1² + 1² + 2² + 1² + 0² + 0²) = 3.60`


    `||y|| = sqrt(1² + 0² + 0² + 0² + 0² + 1² + 1² + 1² + 1²) = 2.24`


    `Sim = 4 / (3.6 × 2.24) = 0.49`


    This calculation means these two sentences are similar to each other with a similarity
    score of 49% (0.49). The similarity value will always lie between 0 and 1, where
    1 indicates maximum similarity and 0 means no similarity.


    # TF-IDF Vectorization


    One-hot representation and the count vector method are the most basic methods
    that do not actually consider the importance of a particular word in a sentence
    and in a corpus. For some NLP projects such as search engines, it is very important
    to know about the importance of words in a query to words in documents in your
    corpus to determine the relevancy of documents to that query. Some English words
    that occur frequently (e.g., "is," "the," "a," etc.) will be present in all the
    documents. Even though their count is higher, they are not useful when performing
    NLP-related tasks. To overcome this drawback of count vectors, TF-IDF is used.
    TF-IDF is one of the most popular techniques used in various applications as it
    is able to weight the words that appear more frequently in general.


    In TF-IDF we form vocabulary in a way similar to the previous method. The vocabulary
    consists of unique words across the corpus. Now term frequency is computed for
    every word in the vocabulary set. Term frequency (`TF`) of a word or term `t`
    corresponds to the count of all its occurrences in a document `d` to the number
    of terms in the document.


    `TF = (Number of times term t appears in a document) / (Number of terms in the
    document)`


    We compute the inverse document frequency (`IDF`) by calculating the count of
    documents in which that term is present. `IDF` tells us about how much information
    a term or word gives. It tells you if a word is common across all documents or
    not. `IDF` is the log value of the ratio of total number of documents to the number
    of documents in which a term `t` has appeared.


    `IDF = log(N / n)` where `N` is the total number of documents in the corpus and
    `n` is the number of documents in which a term `t` has appeared


    `TF-IDF` is the product of `TF` and `IDF`.


    `TF-IDF(t, document) = TF(t, document) × IDF(t)`


    For example, let''s use the previous two example sentences, where Sentence 1 and
    Sentence 2 correspond to two documents.


    `TF` of word "blue" in Sentence 1 = 2


    `IDF = log(2 / 1) = 0.3`


    `TF-IDF` of word "blue" in Sentence 1 = `2 × 0.3 = 0.6`


    Similarly, the `TF-IDF` value of the word "is" in Sentence 2 is 0, as its `IDF`
    score is 0. This signifies that the word "is" does not have any importance because
    it is common and present across all the documents.


    Methods like `TF-IDF`, count vector, and one-hot encoding are easy to compute,
    but they do not capture semantics (or order of occurrence of words) in the document.
    The words or the sentences represented using these methods do not provide any
    contextual information. Even though many NLP tasks can be performed using them,
    the overall results are mediocre, especially when the training data are sparse.
    A better technique is therefore required that can capture useful language information
    and at the same time boost generalization and performance for pretty much any
    NLP problem.


    In next section, we are going to discuss one such approach, word embedding, where
    vector representation of words contains contextual information.'
