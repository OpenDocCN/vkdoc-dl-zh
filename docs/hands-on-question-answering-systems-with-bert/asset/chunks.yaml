- fmt: '# Abstractive Summarization


    ML has come a long way in NLP, and one of these applications is in the field of
    summarization. The most common form of summarization is extractive summarization,
    which returns the most important sentences out of the content. The other type
    is abstractive summarization, which uses new sentences, keeping the important
    ideas or facts intact.


    Content selection is integral to any summarization system. In recent approaches,
    the importance of separating content selection from summary generation is highly
    emphasized. There are many ongoing studies that attempt to extract content words
    and sentences that should be the part of summary and use them to guide the generation
    of an abstract summary.


    A brief sentence can be formed by shortening or rewriting a lengthy text. Encoders
    and decoders are helpful in this context. Comprehensive summaries can be generated
    in a similar way, by selecting important sentences and dropping the inessential
    sentence elements, such as prepositional phrases. A summary can be generated through
    fusing multiple sentences. Selecting important sentences can be done via many
    approaches, but handling its large cardinality and identifying the sentence relationship
    to perform fusion has been a tough job. Previously it has been assumed that similar
    sentences can be fused together because they carry similar information to be processed.


    Because abstractive summarization is difficult to perform, there is a lot of development
    in this area. `BERT` also has applications in abstractive summarization. The embeddings
    of multiple sentences can be generated using a `BERT` model. To perform this task,
    a `[CLS]` token can be inserted before the start of the first sentence. The output
    embeddings have to be processed through multiple layers, which enables the capture
    of important features. The `BERTSUM` model is one example.


    # Natural Language Generation


    Natural language generation (NLG) is one of the more active research areas. It
    is a subgroup of NLP, along with NLU. The basic task of NLG is to convert some
    text tokens or data into natural language. The basic approach to achieve this
    is by predefining the templates for a specific domain and filling the empty slots
    using NLU techniques.


    A more complex approach to this is using language modeling. Language modeling
    is used to model the natural language using the ways of writing, grammar, syntax,
    and so on, that are required to learn intrinsic features of the source language.
    We can then use this language in generating language content against some given
    input data or text.


    The applications in terms of language understanding are not limited to NLP, but
    also extend to NLG. Open-AI’s `GPT-2` generates text based on the given words
    and is one of the state-of-the-art models in NLG. The `BERT` model tries to attain
    the same feature using HuggingFace transformers.


    Recent developments show that the performance of `BERT` in the field of NLG is
    not an optimal fit. The reason behind it is that the `BERT` model was trained
    on MLM rather than being trained autoregressively. Apart from using MLM, the variations
    such as shuffled input and random words make the `BERT` model more generalized.
    Even after all these variations, `BERT` lags behind `GPT-2` because the `BERT`
    model is an encoder representation, whereas `GPT-2` is a decoder stack, which
    helps it create context-rich representations.


    # Machine Translation


    Translation is the idea of translating text from one language to another. Automatic
    or mechanical translation is probably one of the most challenging brain functions
    given the fluctuations in human language. Recently, pretraining techniques, such
    as `ELMo`, `GPT` and `GPT-2`, `BERT`, the cross-language model (`XLM`), `XLNet`,
    and `RoBERTa` have attracted a lot of attention in the ML and NLP communities.


    A Neural Machine Translation (NMT) model usually consists of an encoder to map
    an input sequence to hidden representations, and a decoder to decode hidden representations
    and generate a sentence in the target language. `BERT` has achieved great success
    in NLU, and incorporating `BERT` with NMT for performance improvement might be
    a good research area.


    NMT can be improved by fusing the `BERT` model and NMT, when `BERT` is drawn by
    the sensor and decoder using attention models. Research on open supervised NMT
    (including sentence-level and text-level translation), semisupervised NMT, and
    unsupervised NMT demonstrates the effectiveness of this approach.


    To accurately predict translation quality, a model trained from scratch would
    theoretically require a large corpus of natural language source text, translations,
    and their human-labeled quality scores. Creating these datasets at a sufficient
    scale to train a neural network model is prohibitively expensive. Therefore, researchers
    have determined that they can transfer learnings from models trained on correctly
    translated parallel corpora to the task of identifying whether a translation is
    correct or not. It is far easier to obtain millions of correctly translated sentences
    to use to pretrain a model in areas where you don’t need a quality score.


    For future work, there are many interesting directions. First, we have to learn
    how to speed up the measurement process. Second, we can use such an algorithm
    in many applications, such as query in response. How to compress the `BERT`-fused
    model into a simplified version is another topic. There are other modern functions
    that include information about distillation to integrate pretrained models with
    NMT, which is a test method.


    # Conclusion


    This chapter looked at the ongoing research in `BERT` and in state-of-the-art
    NLP tasks. With this we have come to the conclusion of this exciting journey into
    the world of NLP.'
