  trans: '

    ### 注意力模型


    注意力机制是一个使用 softmax 函数的密集层的输出向量。通过将其应用于合适的场景，可以提升结果质量。传统的翻译机制依赖于读取完整句子并将所有信息压缩成一个固定长度的向量。在这种情况下，如果一个句子包含数百个单词，却仅用几个词来表征，必然会导致信息丢失或翻译不充分。


    注意力机制能够部分解决这个问题。它允许机器翻译系统审视句子包含的所有信息，从而根据当前词和上下文生成恰当的词语。注意力机制还通过允许翻译系统“拉近”或“拉远”视角，提供了聚焦局部或全局特征的能力。


    #### 为什么需要注意力机制？


    由于句子包含不同数量的单词，自然引入了循环神经网络来对单词间的条件概率进行建模。在概率语言模型中，核心是利用马尔可夫假设为句子分配概率。


    `P(w[1]w[2] … w[n]) ≈ *Π*P(w[i] | w[i-k] … w[i-1])`


    翻译工作通过这种编码器-解码器模型处理可变长度的输入和输出。这通常是在将基础 RNN 单元替换为 GRU 或 LSTM 单元，并用 ReLU 激活函数替代双曲正切激活函数时采用的。


    为了计算效率，离散的单词通过嵌入层映射为密集向量。这些嵌入后的单词随后被顺序输入编码器。随着信息从左向右流动，每个词向量都是根据所有先前的输入（而不仅仅是当前词）学习得到的。一旦句子被完整读取，编码器就会生成输出。编码器还会生成一个隐藏状态用于后续处理。解码器利用这个来自编码器的隐藏状态，顺序生成翻译后的单词。


    #### 注意力机制如何工作


    注意力机制本质上是一个上下文向量，它被插入到编码器和解码器之间的架构间隙中。这个上下文向量将所有编码器单元的输出作为输入，然后为解码器想要生成的每个单词计算源语言单词的概率分布。这使得解码器能够捕获全局信息，而不仅仅是基于一个隐藏状态进行推断。这种注意力机制帮助解码器获得更广阔的视角。


    如果我们探究上下文向量是如何构建的，会发现它其实相当简单。对于每个固定的目标词，我们通过遍历编码器的所有状态，并将目标状态与源状态进行比较，来为每个编码器状态生成分数。然后使用
    softmax 函数对所有分数进行归一化。这样我们就得到了以目标状态为条件的概率分布。最后，为了使上下文向量易于训练，引入了权重。一旦我们得到上下文向量，就可以使用上下文向量、注意力函数和目标词轻松计算出注意力向量。


    #### 注意力模型的类型


    注意力模型主要有三种类型：全局与局部注意力、硬注意与软注意力，以及自注意力。让我们逐一审视。


    ##### 全局注意力模型


    在全局注意力模型中，计算输出时会考虑来自当前状态之前的所有编码器状态和解码器状态的输入。这里的上下文向量是通过将全局对齐权重与每个编码器步骤的输出相乘得到的。然后将其输入到
    RNN 单元中以获得解码器输出。


    ##### 局部注意力模型


    局部注意力模型与全局注意力模型不同，它仅使用编码器中的少数几个位置来计算对齐权重。局部注意力模型又分为两种类型：单调对齐和预测对齐。


    ##### 硬注意与软注意力模型


    软注意力模型与全局注意力模型类似。硬注意力模型与局部注意力模型的不同之处在于，局部模型几乎在每个点都是可微的，而硬注意力模型则不是。局部注意力模型可以被视为硬注意力和软注意力的混合体。


    ##### 自注意力模型


    自注意力模型关联同一输入序列中的不同位置。理论上，自注意力可以采用任何评分函数，前提是目标序列被替换为相同的输入序列。


    ## 结论


    在本章中，我们讨论了自然语言处理领域的各种神经网络。现在我们已经涵盖了不同类型的神经网络，接下来我们将关注如何使用 BERT。


    # 3. 词嵌入简介


    文档分类、情感分析、聚类和文档摘要等自然语言处理任务需要处理和理解文本数据。这些任务的实现取决于人工智能系统如何处理和理解数据。一种方法是使用一些统计方法（如词频-逆文档频率、计数向量等）将文本表示转换为数值形式，但这些方法不考虑句子的含义，只处理单词在句子中的出现情况。


    随着时间的推移，人们开发了几种语义方法，如解析树、上下文语法、本体等，但这些方法需要大量的人力来准备带标签的训练数据。在过去几年中，计算能力的广泛普及使得使用基于神经网络的方法来完成这些任务成为可能。


    ## 独热表示


    独热表示是最常见、最基本的文本表示方法之一。它涉及使用二进制编码（即 0 和 1）来表示一个单词。它也可以用于表示分类属性。


    例如，假设一个数据集将颜色作为特征之一，具有三个可能的值：红色、蓝色和绿色。因此，该特征将被转换为三个新列，每个颜色值一列，如下所示。


    |   | **红色** | **蓝色** | **绿色** |

    | **1** | 1 | 0 | 0 |

    | **2** | 0 | 1 | 0 |

    | **3** | 0 | 0 | 1 |


    例如，第一个数据点在红色列中的值为 1，在其他列中为 0。这意味着该数据点最初的颜色列值为红色。红色在独热编码中表示为`[1 0 0]`，蓝色则 1 占据第二位，绿色则
    1 在第三位。这是一个三维向量。独热表示扩展了特征向量，因为颜色的每个类别现在本身就是一个特征。


    现在，当我们谈论文本句子的独热编码时，它不关心单词在句子中出现的顺序，实际上忽略了单词的语义含义。这种方法在语料库较小且需要使用一些传统自然语言处理方法的情况下效果最佳。


    例如，要使用独热表示来表示一个文本句子，请遵循以下步骤。


    1. 统计语料库中唯一单词的总数。

    2. 根据单词是否出现在句子中，分配 0 或 1。


    考虑句子“The sky is clear today.”。词汇表包括单词 The、sky、is、clear 和 today。如果以独热表示表示，它将形成一个五维向量，如图
    3-1 所示。


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig1_HTML.png](img/498208_1_En_3_Fig1_HTML.png)


    **图 3-1** 独热表示

