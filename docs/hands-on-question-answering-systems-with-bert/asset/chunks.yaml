    ```

    pip install flask-restful

    ```


    This command will install the package and all its dependencies.


    **2. Build the REST API**


    A RESTful API uses HTTP requests to GET and POST data.


    First create a `QuestionAnswering.py` file that will have the question answering
    code that you have downloaded from GitHub.


    **3. Deploy Flask REST API**


    Using `Flask`, deploy the REST API service and run the following command at the
    Windows command prompt as shown in Figure [5-8](#498208_1_En_5_Chapter.xhtml#Fig8).


    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig8_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig8_HTML.jpg)


    Figure 5-8 Service deployment


    ```

    python QuestionAnswering.py

    ```


    **4. Response from REST API**


    Now the service has been hosted at the URL `http://127.0.0.1:5000/getResponse`.
    We want the features of the question answering system to be publicly available.
    Therefore, we will use `ngrok` to generate a public URL corresponding to the local
    URL that we configured earlier.


    Let’s look at the steps to generate a public URL using `ngrok`.


    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig9_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig9_HTML.jpg)


    Figure 5-9 Token generation


    1. To configure `ngrok`, download it from `https://ngrok.com/download`.

    2. The public URL is only available when the auth token is downloaded from `https://dashboard.ngrok.com`
    after signing up at `https://ngrok.com/signup`.

    3. The auth token must be specified to `ngrok` so that the client is tied to this
    account. `ngrok` saves the auth token in `~/.ngrok2/ngrok.yml` so that there is
    no need to repeat the preceding steps.

    4. Unzip the downloaded `ngrok` folder and run the `ngrok.exe` application.

    5. Copy the auth token from the user account mentioned in the command and run
    this command on the `ngrok` terminal prompt, as shown in Figure [5-9](#498208_1_En_5_Chapter.xhtml#Fig9).


    ```

    "ngrok authtoken "

    ```


    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig10_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig10_HTML.jpg)


    Figure 5-10 ngrok configuration


    6. After the previous step, authtoken gets saved to the configuration file, as
    shown in Figure [5-10](#498208_1_En_5_Chapter.xhtml#Fig10).


    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig11_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig11_HTML.jpg)


    Figure 5-11 Generate public URL


    7. `ngrok` is a command-line application, so type `ngrok http https://<IP>:<PORT>`
    at this terminal prompt to expose the HTTPS URL. Here the IP and port settings
    correspond to the question answering API host and port on which the API is hosted,
    as shown in Figure [5-11](#498208_1_En_5_Chapter.xhtml#Fig11).


    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig12_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig12_HTML.jpg)


    Figure 5-12 Public URL


    8. A new terminal will open after the execution of the command that will show
    the public URL `https://44e2f215.ngrok.io` corresponding to the local server URL,
    as shown in Figure [5-12](#498208_1_En_5_Chapter.xhtml#Fig12).


    Now, you can use the URL highlighted in Figure [5-12](#498208_1_En_5_Chapter.xhtml#Fig12).
    That is, `<URL>/getResponse Flask` is good for a development environment, but
    not for production. For a production environment, the API should be hosted on
    Apache Server. Refer to the following URL to deploy a service on Apache Server
    in Windows.


    ```

    https://medium.com/@madumalt/flask-app-deployment-in-windows-apache-server-mod-wsgi-82e1cfeeb2ed

    ```


