    2]


    This word vector is obtained after the hidden layer is fed to the output layer,
    which produces an output between 0 and 1\. The output layer is a softmax regression
    classifier that gives the probability of the output word to be in that context
    position near the input target word.


    Figure [3-4](#498208_1_En_3_Chapter.xhtml#Fig4) shows an example of word embedding
    using skip gram.


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig4_HTML.jpg](images/498208_1_En_3_Chapter/498208_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Neural network architecture


    #### GloVe


    GloVe (Global Vector) is an unsupervised technique that is used for the vector
    representation of the words in the global corpus. The word vectors are obtained
    by taking into consideration both global and local statistics of a corpus. The
    local statistics correspond to the local context information of words, whereas
    global statistics are captured by word cooccurrences.


    Even though Word2vec performance was quite satisfactory, there remained a need
    for a better approach, as Word2vec only considers the surrounding words, which
    might sometimes fail to capture useful relationships of a word with other words.
    The semantics learned in case of Word2vec is only dependent on the local information
    and is affected by the neighboring words. In GloVe, on the other hand, the meaning
    of a word can be obtained with the help of the structure of the whole corpus.
    This constitutes word frequency and cooccurrence count. This model mainly relies
    on the intuition that word-to-word cooccurrence probabilities can contribute to
    encoding some form of meaning that gives it an extra benefit over Word2vec.


    GloVe trains on these aggregated global word–word cooccurrence statistics and
    minimizes the least square error. This results in the meaningful linear substructure
    of a word vector space. For example, “man” and “woman” are similar in the context
    that they both describe human beings, but these two words are also opposites.
    To capture as much of the meaning specified by the two words as possible, we need
    a larger information corpus. The discrimination between the two words is based
    on gender, which can be specified by other word pairs like husband–wife, brother–sister,
    and so on.


    ### Sentence Embeddings


    Word embedding generates a vector representation of words by considering only
    neighboring words, not other sentences. To capture the relationship between sentences,
    sentence embedding is the best approach. These are vector representations of the
    sentences in a document. Sentence embedding models are essential, as they are
    capable of capturing contextual information that word embedding models fail to
    capture. As discussed previously, the word embeddings represent the meaning of
    words in a sentence or conversation. They are a representation of words in an
    N-dimensional vector space. These methods often tend to neglect necessary information,
    however, as explained in the example that follows.


    Two sentences can have identical representations but entirely different meanings.
    For instance:


    *   Sentence 1: The sky is clear not cloudy today.


    *   Sentence 2: The sky is cloudy not clear today.


    Here, Sentence 1 and Sentence 2 have similar representations, but their meanings
    are entirely different. Word embeddings won’t be able to differentiate between
    these two sentences because the vector representation of words present in these
    sentences would almost be same. Sentence embeddings can be used to accomplish
    this differentiation.


    When working with textual data in the ML pipeline, we do come across the need
    to compute sentence embeddings so that we are able to embed full sentences into
    a vector space. Sentence embeddings can capture semantic similarity or relatedness
    between sentences, then paragraphs, then documents.


    A sentence embedding for a sentence might look like: this


    *   “The bird is flying in sky.” – [0.1, 0.7,0.4, …]


    To generate sentence embedding for a sentence, the most basic approach will be
    to perform an average of word embeddings of all words present in that sentence.


    A weighted average of the word embeddings can be used to obtain the sentence embeddings
    and reduce the dimensionality. In addition to this method, other methods such
    as Universal Sentence Encoder and ELMo have been introduced that have turned out
    to be very useful for NLP-related tasks .'
  trans: '

    ### 跳字模型


    跳字模型是一种无监督学习技术，用于找出目标词周围最相关的词语。在此语境下，通过目标词来预测其上下文词语。它是`CBOW`方法的逆向过程。这里，目标词是输入，上下文词语是输出。由于需要预测多个上下文词语，这是一种相对困难的技术。如跳字模型架构（图
    3-3）所示，输入是目标词 `W(t)`，输出是上下文词语的向量表示。


    该过程通常按以下方法计算。通过一个隐藏层，计算输入向量与权重矩阵的点积。类似地，在输出层，计算隐藏层输出向量与输出层权重矩阵的点积。然后，使用 softmax
    激活函数计算在 `W(t)` 上下文中各词语出现的概率。


    隐藏层是一个权重矩阵，其各行对应输出词语的贡献。例如，如果权重矩阵的维度是 4 × 4，输入是一个独热编码的词，那么将从矩阵中选择与输入向量中“1”对应的那一行。


    ```

    [0 0 1 0] × [矩阵] = [6 15 3 2]

    ```


    这个词向量是在隐藏层将结果馈送到输出层后获得的，输出层会产生一个介于 0 和 1 之间的输出。输出层是一个 softmax 回归分类器，用于给出输出词出现在输入目标词附近该上下文位置的概率。


    图 3-4 展示了一个使用跳字模型进行词嵌入的示例。


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig4_HTML.jpg](img/498208_1_En_3_Fig4_HTML.jpg)


    **图 3-4** 神经网络架构


    ### GloVe


    `GloVe`（全局向量）是一种无监督技术，用于在全局语料库中对词语进行向量表示。词向量的获取综合考虑了语料库的全局统计信息和局部统计信息。局部统计信息对应词语的局部上下文信息，而全局统计信息则通过词语共现来捕获。


    尽管 `Word2vec` 的性能相当令人满意，但仍有必要采用更好的方法，因为 `Word2vec` 只考虑周围的词语，有时可能无法捕获一个词与其他词之间的有用关系。`Word2vec`
    学习到的语义仅依赖于局部信息，并受邻近词语的影响。相比之下，在 `GloVe` 中，可以借助整个语料库的结构来获取词语的含义。这包括词频和共现计数。该模型主要依赖于这样一个直觉：词与词之间的共现概率有助于编码某种形式的含义，这使其比
    `Word2vec` 更具优势。


    `GloVe` 在这些聚合的全局词-词共现统计信息上进行训练，并最小化最小二乘误差。这导致了词向量空间中有意义的线性子结构的形成。例如，“man”和“woman”在描述人类这一语境下是相似的，但这两个词又是对立的。为了尽可能多地捕获这两个词所指定的含义，我们需要一个更大的信息语料库。这两个词的区别在于性别，这可以通过其他词对来指定，例如
    husband–wife、brother–sister 等。


    ## 句子嵌入


    词嵌入仅通过考虑邻近词语（而非其他句子）来生成词语的向量表示。为了捕获句子之间的关系，句子嵌入是最佳方法。句子嵌入是文档中句子的向量表示。句子嵌入模型至关重要，因为它们能够捕获词嵌入模型无法捕获的上下文信息。如前所述，词嵌入表示句子或对话中词语的含义。它们是词语在
    N 维向量空间中的表示。然而，这些方法往往容易忽略必要的信息，如下面的例子所示。


    两个句子可能具有相同的表示，但含义却完全不同。例如：


    - 句子 1：The sky is clear not cloudy today.

    - 句子 2：The sky is cloudy not clear today.


    这里，句子 1 和句子 2 具有相似的表示，但它们的含义完全不同。词嵌入无法区分这两个句子，因为这两个句子中词语的向量表示几乎相同。句子嵌入可用于实现这种区分。


    在机器学习流水线中处理文本数据时，我们确实需要计算句子嵌入，以便能够将完整的句子嵌入到向量空间中。句子嵌入可以捕获句子之间、段落之间乃至文档之间的语义相似性或相关性。


    一个句子的句子嵌入可能如下所示：


    - “The bird is flying in sky.” – `[0.1, 0.7, 0.4, …]`


    为了生成句子的句子嵌入，最基本的方法是对该句子中所有词语的词嵌入进行平均。


    可以使用词嵌入的加权平均来获得句子嵌入并降低维度。除了这种方法之外，还引入了其他方法，例如通用句子编码器和 `ELMo`，这些方法已被证明对自然语言处理相关任务非常有用。

    '
- fmt: '### ELMo


    `ELMo` (Embeddings from Language Models) 是一种深度上下文词嵌入。它由艾伦人工智能研究所于 2018 年开发。`ELMo`
    使用深度双向 LSTM 模型来创建词表示。其嵌入由两层双向语言模型的内部状态计算得出。它能够捕捉句子中词语变化的上下文含义，如图 [3-5](#498208_1_En_3_Chapter.xhtml#Fig5)
    所示。


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig5_HTML.png](images/498208_1_En_3_Chapter/498208_1_En_3_Fig5_HTML.png)


    **图 3-5** ELMo 架构


    与 `Word2vec` 不同，`ELMo` 在其使用的上下文中分析词语。它不为词典中的词语创建向量；相反，向量是通过将文本传递给深度学习模型来创建的。词语的表示取决于传递给模型的整个句子语料库。它不为每个词语使用固定的嵌入；而是在为词语分配嵌入之前查看整个句子。它能够理解词语的含义及其所在的上下文。因此，它能够捕捉含义以及上下文信息。与词语相关的上下文信息可能会根据使用该词语的句子而变化。这使得它比
    `Word2vec` 和 `GloVe` 更具优势。当预训练的语言嵌入被添加到现有模型中时，它能够提升 NLP 问题的最新技术水平。


    `ELMo` 是基于字符的：它将字符作为输入而非词语，这使得它能够为训练期间未见过的词语计算有意义的表示。当在大型数据集上训练时，它还能够学习语言模式，这对于与
    NLU 相关的任务（例如确定短语中的下一个词）非常有益。例如，在短语“The weather is cloudy today, it might …”中，单词“rain”比单词“dog”更可能出现。该模型在此类场景中非常有用，可以根据上下文找到最可能的词语，如图
    [3-6](#498208_1_En_3_Chapter.xhtml#Fig6) 所示。


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig6_HTML.png](images/498208_1_En_3_Chapter/498208_1_En_3_Fig6_HTML.png)


    **图 3-6** 单词“blue”的 ELMo 特定表示


    `ELMo` 模型是一个相当复杂的神经语言模型，旨在根据先前看到的词语历史来计算一个词语的概率。`ELMo` 架构（参考图 [3-5](#498208_1_En_3_Chapter.xhtml#Fig5)）以两层双向
    LSTM 作为其骨干。这种两层双向 LSTM 模型帮助模型理解句子中的下一个词以及前一个词。第一层和第二层通过残差连接相连，这些连接可以跳过一个或多个层，因为层会馈送到下一层，并直接馈送到相隔几层的层。它们用于使更深的网络更容易优化。在
    `ELMo` 语言模型中，每个 token 都使用字符嵌入转换为适当的表示。我们使用一维 CNN 获得这些字符级嵌入，以获取词语的数值表示。这允许即使对于词汇表中不存在的词语也能获得有效的表示。然后，使用不同数量和类型的滤波器，将其传递通过卷积层。最后，在作为输入传递到
    LSTM 层之前，它会被传递通过一个两层的高速公路网络。该高速公路网络使得信息能够更平滑地通过输入进行传输。对输入 token 的这些转换允许选择形态特征、n-gram
    特征等。这有助于构建强大的句子表示。


    假设我们正在查看输入中的第 i 个词。以图 [3-5](#498208_1_En_3_Chapter.xhtml#Fig5) 为参考，单词“blue”的 `ELMo`
    表示是转换后的词表示 `x[i]` 以及两个双向表示 `h[1i]` 和 `h[2i]` 输出的组合。函数 `f` 对输入执行以下操作。


    `ELMo [i] ^(task) = *γ*i . (s[0] ^(task) . xi + s[1] ^(task) . h[1, i] + s[2]
    ^(task) . h[2, k])`


    这里，`*γ*i` 和 `s[k]` 是在特定任务模型训练期间学习到的权重因子。因此，当我们使用 `ELMo` 时，我们会冻结权重，然后将每个 token
    的 `ELMo i task` 连接到输入表示。


    ### Universal Sentence Encoder


    Universal Sentence Encoder 是最近引入的，它已成为最流行的句子嵌入预训练模型之一。它能够将句子转换为向量表示。这个多功能的句子嵌入模型可以学习丰富的语义信息，从而利用迁移学习，其中来自其他任务的句子表示可以通过重新训练架构的最后一层来学习。


    这个句子编码器模型可用于各种 NLU 任务。编码器使用的 Transformer 网络在大型、多样的数据语料库上进行训练。输入文本（可以是句子、短语或短段落）被编码成一个高维向量。这里，输入长度可以是可变的，但输出是一个
    512 维向量。这使得能够为广泛的下游任务（如文本分类、聚类、语义相似度等）生成句子嵌入。


    Google 使用 TensorFlow 训练的这些模型的多个版本和实现可在 TensorFlow Hub 上供机器学习工程师使用，包括以下这些。


    *   `universal-sentence-encoder-large`

    *   `universal-sentence-encoder-lite`

    *   `universal-sentence-encoder-multilingual`

    *   `universal-sentence-encoder-multilingual-large`

    *   `universal-sentence-encoder-multilingual-qa`'
  raw: '### ELMo


    ELMo (Embeddings from Language Models) is a deep contextualized word embedding.
    It was developed in 2018 by the Allen Institute of AI. ELMo uses a deep bidirectional
    LSTM model to create word representations. The internal states of the two-layer
    bidirectional language model compute the embeddings. It is able to capture the
    changing contextual meaning of words in the sentences, as shown in Figure [3-5](#498208_1_En_3_Chapter.xhtml#Fig5).


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig5_HTML.png](images/498208_1_En_3_Chapter/498208_1_En_3_Fig5_HTML.png)


    Figure 3-5


    ELMo architecture


    ELMo analyzes the words within the context in which they are used, unlike Word2vec.
    It does not create vectors for a dictionary of words; instead, vectors are created
    by passing text through the deep learning model. The representation of a word
    is dependent on the entire sentence corpus that is passed to the model. It does
    not use a fixed embedding for each word; instead the entire sentence is looked
    at before assigning embedding to a word. It is able to understand the meaning
    of a word along with the context in which it is found. Hence it is able to capture
    meaning along with the contextual information. This contextual information related
    to a word might vary depending on the sentences in which the word is used. This
    gives it an advantage over Word2vec and GloVe. The pretrained language embeddings,
    when added to existing models, improve the state of the art across NLP problems.


    ELMo is character based: It takes characters as input instead of words, which
    enables it to compute meaningful representations for words not seen during training
    . When trained on a large dataset, it is also able to learn the language patterns,
    which is beneficial for tasks related to NLU, like determining the next word in
    a phrase. For example, in the phrase “The weather is cloudy today, it might …
    ,” the word “rain” is more likely to appear instead of the word “dog.” The model
    is quite useful in scenarios like these to find the most probable word depending
    on context, as shown in Figure [3-6](#498208_1_En_3_Chapter.xhtml#Fig6).


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig6_HTML.png](images/498208_1_En_3_Chapter/498208_1_En_3_Fig6_HTML.png)


    Figure 3-6


    ELMo specific representation of the word “blue”


    The ELMo model is a fairly sophisticated neural language model that seeks to compute
    the probability of a word, given some prior history of words seen. The ELMo architecture
    (refer to Figure [3-5](#498208_1_En_3_Chapter.xhtml#Fig5)) has a two-layer bidirectional
    LSTM as its backbone. This two-layer bidirectional LSTM model helps the model
    to understand the next word as well as the previous word in a sentence. The first
    and second layers are connected by residual connections that can skip one or multiple
    layers as the layer feeds into the next layer and directly into layers hops away.
    They are used to make deeper networks easier to optimize. In the ELMo language
    model, each token is converted into an appropriate representation using character
    embeddings. We get these character-level embeddings using a one-dimensional CNN
    to obtain a numerical representation of a word. This allows a valid representation
    even for words not in the vocabulary set. This is then passed through the convolutional
    layer using various numbers and types of filters. Finally, before passing as the
    input to the LSTM layer, it is passed through a two-layer highway network. This
    highway network enables smoother transfer of information through the input. These
    transformations to the input token allow selection of the morphological features,
    n-gram features, and more. This helps to build a powerful representation of sentences.


    Let us assume we are looking at the ith word in our input. Taking Figure [3-5](#498208_1_En_3_Chapter.xhtml#Fig5)
    as a reference, the ELMo representation of the word “blue” is the combination
    of the transformed word representation x[i] as well as the output of two bidirectional
    representations h[1i] and h[2i]. The function f performs the following operation
    on input.


    ELMo [i] ^(task) = *γ*i . (s[0] ^(task) . xi + s[1] ^(task) . h[1, i] + s[2] ^(task)
    . h[2, k])


    Here, *γ*i and s[k] are the weighting factors that are learned during the task-specific
    model. So, when we use ELMo, we freeze the weights and then concatenate the ELMo
    i task for each token to the input representation .


    ### Universal Sentence Encoder


    Universal Sentence Encoder was introduced recently, and it has become one of the
    most popular pretrained models for sentence embeddings. It is able to convert
    sentences into vector representations. This versatile sentence embedding model
    can learn rich semantic information and thereby use transfer learning where sentence
    representation from other tasks can be learned by retraining the last layer of
    the architecture.


    This sentence encoder model can be used for a wide variety of NLU tasks. The transformer
    network used by the encoder is trained on a large, varied data corpus. The input
    text, which can be a sentence, phrase, or short paragraph, is encoded into a high-dimensional
    vector. Here, input length can be variable but the output is a 512-dimensional
    vector. This enables generation of sentence embedding for a broad range of downstream
    tasks like text classification, clustering, semantic similarity, and more.


    Several versions and implementations of these models that have been trained by
    Google using Tensorflow are available on the TensorFlow hub for ML engineers to
    consume, including these.


    *   universal-sentence-encoder-large


    *   universal-sentence-encoder-lite


    *   universal-sentence-encoder-multilingual


    *   universal-sentence-encoder-multilingual-large


    *   universal-sentence-encoder-multilingual-qa'
