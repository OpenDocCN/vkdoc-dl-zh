    RoBERTa and BERT share several configurations, but there are some model settings
    that differentiate the two models.


    *   **Reserved token** **:** BERT uses [CLS] and [SEP] as starting token and separator
    token, respectively, whereas RoBERTa uses <s> and </s> to convert sentences.


    *   **Size of sub-word** **:** BERT has about 30,000 sub-words, whereas in RoBERTa
    there are about 50,000 sub-words.


    In addition, there are specific modifications and adjustments that help RoBERTa
    to perform better than BERT.


    *   **More training data:** During reimplementation of BERT, several changes were
    made to the hyperparameters of the BERT model and training was done with a higher
    magnitude of data with more iterations. RoBERTa uses more training data. It uses
    BookCorpus (16G), CC-NEWS (76G), OpenWebText (38G), and Stories (31G) data, whereas
    BERT uses only BookCorpus as training data.


    *   **Dynamic masking** **:** When BERT was being ported to create RoBERTa, the
    creators modified the word masking strategy. BERT mainly uses static masking,
    in which the words are masked from sentences during preprocessing. RoBERTa makes
    use of dynamic masking. Here, a new masking pattern is generated whenever a sentence
    is fed into training. RoBERTa duplicates training data 10 times and masks those
    data differently. It is experimentally observed that the dynamic masking improves
    performance and gives a better result than static masking.


    *   **Different training objective** **:** BERT captures the relationships between
    the sentences by training on NSP. Some training approaches without application
    of NSP provided better results, proving the ineffectiveness of NSP. Experiments
    were done to compare models trained with segment-pair with NSP, sentence-pair
    with NSP, full sentences without NSP, and doc-sentences without NSP. The models
    trained without NSP performed better on SQuAD1.1/2.0, MNLI-m, SST-2, and RACE.


    *   **Training on longer sequences:** Better results have been achieved when a
    model was trained on longer sequences. BERT base is trained with a batch size
    of 256 sequences via 1 million steps, but training on 2,000 sequences and 31,000
    steps shows improvement in performance.


    With the implementation of the design changes, the RoBERTa model delivered state-of-the-art
    performance on the MNLI, QNLI, RTE, and RACE tasks. It also realized a sizable
    performance improvement on the GLUE benchmark with a score of 88.5.


    RoBERTa demonstrates that the tuning the BERT training procedure can result in
    performance improvement on a variety of NLP tasks. This highlights the importance
    of exploring the design choices in BERT training for better performance output
    .


    ### DistilBERT


    DistilBERT was introduced for knowledge distillation. This knowledge distillation
    was required to address the drawbacks of computation of large numbers of parameters.
    The NLP models that have been developed recently show an increase in parameter
    count, now reaching parameter counts as high as in the tens of billions. Even
    though higher parameter count ensures optimal performance, it prevents model training
    and serving when computational resources are limited.


    Knowledge distillation revolves around the idea that a larger model acts as a
    teacher for a smaller one that tries to replicate its outputs and sublayer activation
    for a given set of inputs. This is sometimes also known as teacher–student learning.
    It is a compression technique where the behavior of larger models is reproduced
    by the smaller ones. The output distribution from the teacher can be used for
    all possible targets, which helps in creation of a student with generalizability.
    For example, in the sentence “The sky is [mask]” a teacher might assign high probabilities
    to words like “cloudy” and “clear.” There are also chances that a high probability
    is assigned to the word “blue.” This is helpful for the student model, so that
    it is able to generalize rather than only learn the correct target. This information
    is captured through the loss function that is being used to train the student.
    This loss function comprises a linear combination of three factors.


    #### Distillation Loss


    Distillation loss takes into consideration combination of the output probabilities
    of the teacher (t) and the student (s) as shown in the following equation.


    L[ce] = ∑[i] t[i] log(s[i])


    Distillation Loss


    t[i] = exp(z[i]/T)/ ∑[j] exp(z[j]/T)


    Temperature Softmax


    The teacher probabilities are calculated through temperature softmax. This is
    basically a modification to the softmax so that more granularities are obtained
    from the teacher model output distribution. This gives a smoother output distribution,
    as the size of larger probabilities are decreased and the smaller ones are increased.
    This helps to minimize the distillation loss.


    #### Cosine Embedding Loss


    Cosine embedding loss is a distance measure between the hidden representations
    for teacher and student. This helps in creation of a better model as it enables
    the student to imitate the teacher not just in the output layer, but in other
    layers, too.


    #### Masked Language Modeling Loss


    This is the same loss as used in training of the BERT model to predict the correct
    token value for the masked token in the sequence.


    #### Architectural Modifications


    The DistilBERT network architecture is also a transformer encoder model similar
    to BERT base, but it has half the number of layers. The hidden representations,
    though, are kept the same. This affects the parameter count, with a 66 million
    parameter count in the case of DistilBERT, whereas there are 110 million parameters
    in the teacher model. The reduction in the model size through the number of layers
    helps to achieve the drastic reduction in computation complexity. The reduction
    in the size of the vectors or the hidden state representations have also reduced
    the model size.


    After the knowledge distillation, DistilBERT is able to achieve 97% of BERT base’s
    score on the GLUE benchmark. This knowledge distillation has helped to condense
    the larger models or ensembles of models into a smaller student network. This
    has proven to be helpful in situations where the computational environment is
    limited.


    ### StructBERT


    StructBERT is a model based on BERT that incorporates language structures into
    BERT pretraining. The two linearization strategies help to incorporate language
    structure into BERT. Word-level ordering and sentence-level ordering are the two
    structural information sets that are leveraged in StructBERT. StructBERT achieves
    better generalizability and adaptability due to the incorporation of this structural
    pretraining. The dependency between the words as well as sentences is encoded
    in StructBERT.


    #### Structural Pretraining in StructBERT


    Similar to all the other BERT-based models, StructBERT also builds on the BERT
    architecture. The original BERT performs two unsupervised pretraining tasks, MLM
    and NSP. StructBERT is able to increase the ability of the MLM task. It shuffles
    a certain number of tokens after masking of words and predicts the right order.
    StructBERT is also able to understand the relationship between sentences in a
    better way. This is achieved by random swapping of the sentence order. This new
    BERT-based model captures the fine-grained word structure in every sentence.


    After pretraining of the StructBERT it can be fine-tuned on task-specific data
    for a wide range of downstream tasks such as document summarization.'
  trans: '

    ### RoBERTa


    `RoBERTa` 是一种用于预训练 NLP 系统的优化方法。`RoBERTa`（稳健优化的 BERT）由 Facebook AI 团队开发，基于谷歌的 `BERT`
    模型。`RoBERTa` 重新实现了 `BERT` 的神经网络架构，并加入了额外的预训练改进，在多个基准测试中取得了最先进的成果。


    `RoBERTa` 和 `BERT` 共享多项配置，但两者在模型设置上存在一些差异。


    - **保留标记：** `BERT` 分别使用 `[CLS]` 和 `[SEP]` 作为起始标记和分隔标记，而 `RoBERTa` 使用 `<s>` 和 `</s>`
    来转换句子。

    - **子词大小：** `BERT` 约有 30,000 个子词，而 `RoBERTa` 约有 50,000 个子词。


    此外，还有一些特定的修改和调整帮助 `RoBERTa` 的性能优于 `BERT`。


    - **更多训练数据：** 在重新实现 `BERT` 的过程中，对 `BERT` 模型的超参数进行了多项更改，并使用更大量的数据和更多迭代次数进行训练。`RoBERTa`
    使用了更多的训练数据，包括 `BookCorpus`（16G）、`CC-NEWS`（76G）、`OpenWebText`（38G）和 `Stories`（31G）数据集，而
    `BERT` 仅使用 `BookCorpus` 作为训练数据。

    - **动态掩码：** 在将 `BERT` 移植以创建 `RoBERTa` 时，创建者修改了词掩码策略。`BERT` 主要使用静态掩码，即在预处理阶段将句子中的词进行掩码。`RoBERTa`
    则采用动态掩码。每当一个句子被输入训练时，都会生成一个新的掩码模式。`RoBERTa` 将训练数据复制 10 次，并对这些数据进行不同的掩码处理。实验观察到，动态掩码能提升性能，并比静态掩码产生更好的结果。

    - **不同的训练目标：** `BERT` 通过训练 `NSP` 来捕捉句子间的关系。一些未应用 `NSP` 的训练方法取得了更好的结果，证明了 `NSP`
    的无效性。实验比较了使用带 `NSP` 的段对、带 `NSP` 的句对、不带 `NSP` 的完整句子以及不带 `NSP` 的文档句子训练的模型。不带 `NSP`
    训练的模型在 `SQuAD1.1/2.0`、`MNLI-m`、`SST-2` 和 `RACE` 上表现更佳。

    - **在更长序列上训练：** 当模型在更长序列上训练时，取得了更好的结果。`BERT` base 使用 256 个序列的批次大小，经过 100 万步训练，但在
    2,000 个序列和 31,000 步上的训练显示了性能提升。


    通过实施这些设计变更，`RoBERTa` 模型在 `MNLI`、`QNLI`、`RTE` 和 `RACE` 任务上实现了最先进的性能。它在 `GLUE` 基准测试中也取得了显著的性能提升，得分为
    88.5。


    `RoBERTa` 表明，调整 `BERT` 的训练过程可以在各种 NLP 任务上带来性能提升。这凸显了探索 `BERT` 训练中的设计选择以获得更好性能输出的重要性。


    ### DistilBERT


    `DistilBERT` 是为知识蒸馏而引入的。这种知识蒸馏是为了解决大量参数计算带来的弊端。最近开发的 NLP 模型参数数量不断增加，现已达到数百亿级别。尽管更高的参数数量能确保最佳性能，但在计算资源有限的情况下，它会阻碍模型的训练和服务。


    知识蒸馏的核心思想是，一个较大的模型充当较小模型的教师，后者试图针对给定的输入集复制前者的输出和子层激活。这有时也被称为师生学习。这是一种压缩技术，通过较小的模型来复现较大模型的行为。来自教师的输出分布可用于所有可能的目标，这有助于创建一个具有泛化能力的学生模型。例如，在句子“天空是
    [mask]”中，教师可能会为“多云”和“晴朗”等词分配高概率。也有可能为“蓝色”一词分配高概率。这对学生模型很有帮助，使其能够进行泛化，而不仅仅是学习正确的目标。这些信息通过用于训练学生的损失函数来捕获。该损失函数由三个因素的线性组合构成。


    #### 蒸馏损失


    蒸馏损失考虑了教师（`t`）和学生（`s`）输出概率的组合，如下式所示。


    ```

    L[ce] = ∑[i] t[i] log(s[i])

    ```


    蒸馏损失


    ```

    t[i] = exp(z[i]/T)/ ∑[j] exp(z[j]/T)

    ```


    温度 Softmax


    教师概率通过温度 softmax 计算。这基本上是对 softmax 的一种修改，以便从教师模型输出分布中获得更细粒度的信息。这会得到一个更平滑的输出分布，因为较大概率的规模减小了，而较小概率的规模增大了。这有助于最小化蒸馏损失。


    #### 余弦嵌入损失


    余弦嵌入损失是教师和学生隐藏表示之间的距离度量。这有助于创建更好的模型，因为它使学生不仅能在输出层，还能在其他层模仿教师。


    #### 掩码语言建模损失


    这与训练 `BERT` 模型时使用的损失相同，用于预测序列中掩码标记的正确标记值。


    #### 架构修改


    `DistilBERT` 网络架构也是一个类似于 `BERT` base 的 Transformer 编码器模型，但其层数减半。不过，隐藏表示的维度保持不变。这影响了参数数量，`DistilBERT`
    的参数数量为 6600 万，而教师模型的参数数量为 1.1 亿。通过减少层数来缩小模型规模，有助于大幅降低计算复杂度。向量或隐藏状态表示维度的减小也缩小了模型规模。


    经过知识蒸馏后，`DistilBERT` 在 `GLUE` 基准测试中能够达到 `BERT` base 得分的 97%。这种知识蒸馏有助于将较大的模型或模型集成压缩成一个较小的学生网络。这在计算环境受限的情况下已被证明是有帮助的。


    ### StructBERT


    `StructBERT` 是一个基于 `BERT` 的模型，它将语言结构融入 `BERT` 的预训练中。两种线性化策略有助于将语言结构融入 `BERT`。词级排序和句子级排序是
    `StructBERT` 中利用的两种结构信息集。由于融入了这种结构预训练，`StructBERT` 实现了更好的泛化能力和适应性。词与词之间以及句子之间的依赖关系在
    `StructBERT` 中被编码。


    #### StructBERT 中的结构预训练


    与所有其他基于 `BERT` 的模型类似，`StructBERT` 也建立在 `BERT` 架构之上。原始的 `BERT` 执行两个无监督预训练任务：`MLM`
    和 `NSP`。`StructBERT` 能够增强 `MLM` 任务的能力。它在词被掩码后打乱一定数量的标记，并预测正确的顺序。`StructBERT` 还能更好地理解句子之间的关系。这是通过随机交换句子顺序来实现的。这种新的基于
    `BERT` 的模型能够捕捉每个句子中细粒度的词结构。


    在对 `StructBERT` 进行预训练后，可以针对特定任务的数据对其进行微调，以应用于广泛的下游任务，例如文档摘要。

    '
- fmt: '### Pretraining Objectives


    The pretraining objectives of the original `BERT` are extended in the case of
    `StructBERT` to fully utilize rich inner-sentence and intersentence structures
    in language. This is done in two ways.


    1. **Word structural objective:** The `BERT` model fails to model sequential order
    and high-order word dependency in natural language explicitly. A good language
    model should be able to reconstruct a sentence from a given sentence that has
    randomly ordered words. `StructBERT` is able to implement this idea by supplementing
    `BERT`''s training objectives with a new word structural objective. This new model
    objective gives the model the ability to restructure the sentence to have correct
    ordering of the randomly shuffled word tokens. This objective is trained together
    with the `MLM` objective from `BERT`.


    2. **Sentence structural objective:** The original `BERT` model objective of `NSP`
    is extended in `StructBERT` by predicting both the next sentence as well as the
    previous sentence. This makes the pretrained model learn the sequential ordering
    of the sentences in a bidirectional manner.


    These two auxiliary objectives are pretrained together with the original `MLM`
    objective to exploit inherent language structures.


    ### BERT[joint] for Natural Questions


    `BERT[joint]` is a BERT-based model for Natural Questions. The `BERT[joint]` model
    predicts short and long answers in a single model only instead of a pipeline approach.
    In this model each document is split into multiple instances of training with
    the help of overlapping token windows. This approach is used to create a balanced
    training set and is being followed by down sampling instances without an answer
    (null instances). The `[CLS]` token is used during training to predict null instances,
    and spans at inference time are ranked by the difference between the span score
    and the `[CLS]` score.


    The model uses the Natural Questions (`NQ`) dataset that is a question answering
    dataset of 307,373 training examples, 7,830 development examples, and 7,842 test
    examples. For every example, a query is entered by the user over the Google search
    engine and the corresponding Wikipedia page that contains an answer. The Wikipedia
    page is annotated as an answer to the question.


    The `BERT[joint]` model was initialized from the original `BERT` model that trained
    on the `SQuAD 1.1` dataset. Afterward, this model was fine-tuned on Natural Questions
    training instances. It has used the Adam optimizer to minimize the loss. The `BERT[joint]`
    model for Natural Questions gives dramatically better results than the baseline
    `NQ` systems. This variation of `BERT` offers a new way to design a question-answering
    system.


    ## Conclusion


    This chapter looked deeper into `BERT`, along with its two algorithms, `MLM` and
    `NSP`. We also discussed a sample text classification model developed using `BERT`.
    We also examined the behavior of `BERT` over different benchmark datasets, along
    with multiple variations of `BERT`. In the next chapter, we discuss the design
    of a question answering system using `BERT`.


    # 5. BERT Model Applications: Question Answering System


    We are surrounded by massive amounts of information present in the form of documents,
    images, blogs, websites, and more. In most cases, we always look for a direct
    answer instead of reading the entirety of lengthy documents. Question answering
    systems are generally being used for this purpose. These systems scan through
    a corpus of documents and provide you with the relevant answer or paragraph. It
    is part of the computer science discipline in the field of information retrieval
    and `NLP`, which focuses on building systems that automatically extract an answer
    to questions posed by humans or machines in a natural language.


    Two of the earliest question answering systems, `BASEBALL` and `LUNAR`, have been
    popular because of their core database or information system. `BASEBALL` was built
    for answers to American League baseball questions over a one-year cycle. `LUNAR`
    was built to answer questions related to geological analysis of lunar rocks based
    on data collected from the Apollo moon mission. Such earlier systems concentrated
    on closed domains where every query must be about the specific domain and the
    answer text must be from a restricted vocabulary only.


    Some of the advanced question answering systems of the modern world are Apple
    Siri, Amazon Alexa, and Google Assistant. There are various popular datasets available
    for question answering systems that can be leveraged to check your model performance.
    These include the following.


    * **SQuAD:** The Stanford Question Answering Dataset (`SQuAD`) is a reading comprehension
    dataset that we covered in Chapter [4](#498208_1_En_4_Chapter.xhtml).


    * **NewsQA:** This dataset has been created to help the research community build
    algorithms that are capable of answering questions requiring human-level comprehension
    and reasoning skills. By using CNN articles from the DeepMind Q&A dataset, authors
    have prepared a crowd-sourced machine reading comprehension dataset of 120,000
    Q&A pairs.


    * **WikiQA:** This publicly available dataset contains pairs of questions and
    answers. It has been collected and annotated for research on open-domain question
    answering systems. In addition, the `WikiQA` dataset also includes questions for
    which there are no correct answers, enabling researchers to work on negative cases
    as well to avoid selection of irrelevant answers.'
