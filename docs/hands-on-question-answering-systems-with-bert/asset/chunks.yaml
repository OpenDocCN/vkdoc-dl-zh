- fmt: "### IMDB Reviews Dataset\n\nThe IMDB dataset is an extensive movie review\
    \ dataset that has been used for classification of viewer sentiments about films.\
    \ This dataset consists of 25,000 highly polar movie reviews for training and\
    \ 25,000 reviews for testing. In addition to the training and testing data, there\
    \ are also additional unlabeled data. This dataset has also been used to evaluate\
    \ `BERT` in a sentiment classification task.\n\n### RACE Benchmark\n\n`RACE` is\
    \ a large-scale reading comprehension dataset from examinations. The `RACE` dataset\
    \ is used to evaluate models on a reading comprehension task. This dataset was\
    \ collected from English examinations of Chinese students. It consists of nearly\
    \ 28,000 passages and 100,000 questions generated by human experts. The number\
    \ of questions is much larger in `RACE` as compared to other benchmark datasets.\
    \ The `BERT large` model achieves a score of 73.8% on the `RACE` benchmark dataset.\n\
    \n## Types of BERT-Based Models\n\n`BERT` is a ground-breaking natural language\
    \ model and its introduction in the ML world has led to development of various\
    \ models that are based on it. Variants of the `BERT` model have been developed\
    \ to cater to different types of NLP-based systems. Here are a few of the major\
    \ variants of `BERT`:\n\n- `ALBERT`\n- `RoBERTa`\n- `DistilBERT`\n- `StructBERT`\n\
    - `BERT[joint]` for Natural Questions\n\n### ALBERT\n\n`ALBERT` is a much smaller\
    \ version of `BERT` that was introduced jointly by Google Research and the Toyota\
    \ Technological Institute. It is a smarter, “lite” `BERT` and is also considered\
    \ a natural successor to `BERT`. It can also be used to implement state-of-the-art\
    \ NLP tasks. This is all possible with less computation power compared to `BERT`,\
    \ but you need to compromise on accuracy a little bit. `ALBERT` was basically\
    \ created to make improvements in architecture and training methods so that better\
    \ results are delivered with fewer required computation resources.\n\n`ALBERT`\
    \ has a `BERT`-like core architecture. It has a transformer encoder architecture\
    \ and a vocabulary of 30,000 words, which is the same as `BERT`. However, there\
    \ are substantial architectural improvements in `ALBERT` for efficient parameter\
    \ usage.\n\n1. **Factorized embedding parameterization:** In the case of `BERT`,\
    \ the WordPiece embeddings size (`E`) is directly tied to the hidden layer size\
    \ (`H`). It was observed that WordPiece embeddings are designed to learn context-independent\
    \ representations, whereas the hidden layer embeddings are designed to learn context-dependent\
    \ representations. In `BERT` we try to learn context-dependent representations\
    \ through the hidden layers only.\n\n   When `H` and `E` are tied together, we\
    \ end up with a model with billions of parameters that are rarely updated in training.\
    \ This happens as the embedding matrix, which is `V*E` where `V` is the large\
    \ vocabulary, must scale with the `H` (hidden layers). This actually results in\
    \ inefficient parameters, as these two items work for different purposes.\n\n\
    \   In `ALBERT`, to make it more efficient we untie the two parameters and embedding\
    \ parameters are split into two smaller matrices. Now the one-hot vectors are\
    \ not directly projected into `H`; rather, they are projected into a smaller,\
    \ lower dimension matrix `E`, and then `E` is projected into the hidden layers.\
    \ Thus, the parameters get reduced from `O(V*H)` to `Θ(V*E+E*H)`.\n\n2. **Cross-layer\
    \ parameter sharing:** `ALBERT` has a smoother transition from layer to layer\
    \ in comparison to `BERT` and the parameter efficiency is improved by sharing\
    \ of all the parameters across all layers. The feed-forward and attention parameters\
    \ are all shared. This weight sharing is helpful in stabilizing the network parameters.\n\
    \n3. **Training changes: Sentence order prediction:** Similar to `BERT`, `ALBERT`\
    \ also uses `MLM` but does not use `NSP`. Instead of `NSP`, `ALBERT` uses its\
    \ own newly developed training method called sentence order prediction (`SOP`).\n\
    \n   The `NSP` loss used in `BERT` was not found to be a very effective training\
    \ mechanism in subsequent studies. Hence, it was leveraged to develop `SOP` as\
    \ `NSP` was unreliable.\n\n   In `ALBERT` `SOP`, loss is used to model intersentence\
    \ coherence. `SOP` was mainly created to focus on intersentence coherence loss\
    \ instead of topic prediction, whereas `BERT` combines topic prediction with coherence\
    \ prediction. Hence, `ALBERT` is able to learn finer grained intersentence cohesion\
    \ by avoiding issues of topic prediction.\n\n`ALBERT`, even though it has fewer\
    \ parameters than `BERT`, gets results in less time. In the language benchmark\
    \ tests `SQuAD1.1`, `SQuAD2.0`, `MNLI`, `SST-2`, and `RACE`, `ALBERT` has significantly\
    \ outperformed `BERT`, as we can see in the comparison in Table 4-1.\n\n**Table\
    \ 4-1** Comparison Between `BERT` and `ALBERT` Models\n\n| Model | Parameters\
    \ | SQuAD1.1 | SQuAD2.0 | MNLI | SST-2 | RACE | Avg | Speedup |\n| --- | --- |\
    \ --- | --- | --- | --- | --- | --- | --- |\n| `BERT base` | 108M | 90.5/83.3\
    \ | 80.3/77.3 | 84.1 | 91.7 | 68.3 | 82.1 | 17.7x |\n| `BERT large` | 334M | 92.4/85.8\
    \ | 83.9/80.8 | 85.8 | 92.2 | 73.8 | 85.1 | 3.8x |\n| `BERT xlarge` | 1270M |\
    \ 86.3/77.9 | 73.8/70.5 | 80.5 | 87.8 | 39.7 | 76.7 | 1.0 |\n| `ALBERT base` |\
    \ 12M | 89.3/82.1 | 79.1/76.1 | 81.9 | 89.4 | 63.5 | 80.1 | 21.1x |\n| `ALBERT\
    \ large` | 18M | 90.9/84.1 | 82.1/79.0 | 83.8 | 90.6 | 68.4 | 82.4 | 6.5x |\n\
    | `ALBERT xlarge` | 59M | 93.0/86.5 | 85.9/83.1 | 85.4 | 91.9 | 73.9 | 85.5 |\
    \ 2.4x |\n| `ALBERT xxlarge` | 233M | 94.1/88.3 | 88.1/85.1 | 88.0 | 95.2 | 82.3\
    \ | 88.7 | 1.2x |"
  raw: '### IMDB Reviews Dataset


    The IMDB dataset is an extensive movie review dataset that has been used for classification
    of viewer sentiments about films. This dataset consists of 25,000 highly polar
    movie reviews for training and 25,000 reviews for testing. In addition to the
    training and testing data, there are also additional unlabeled data. This dataset
    has also been used to evaluate BERT in a sentiment classification task.


    ### RACE Benchmark


    RACE is a large-scale reading comprehension dataset from examinations. The RACE
    dataset is used to evaluate models on a reading comprehension task. This dataset
    was collected from English examinations of Chinese students. It consists of nearly
    28,000 passages and 100,000 questions generated by human experts. The number of
    questions is much larger in RACE as compared to other benchmark datasets. The
    BERT large model achieves a score of 73.8% on the RACE benchmark dataset.


    ## Types of BERT-Based Models


    BERT is a ground-breaking natural language model and its introduction in the ML
    world has led to development of various models that are based on it. Variants
    of the BERT model have been developed to cater to different types of NLP-based
    systems. Here are a few of the major variants of BERT:


    *   ALBERT


    *   RoBERTa


    *   DistilBERT


    *   StructBERT


    *   BERT[joint] for Natural Questions


    ### ALBERT


    ALBERT is a much smaller version of BERT that was introduced jointly by Google
    Research and the Toyota Technological Institute. It is a smarter, “lite” BERT
    and is also considered a natural successor to BERT. It can also be used to implement
    state-of-the-art NLP tasks. This is all possible with less computation power compared
    to BERT, but you need to compromise on accuracy a little bit. ALBERT was basically
    created to make improvements in architecture and training methods so that better
    results are delivered with fewer required computation resources.


    ALBERT has a BERT-like core architecture. It has a transformer encoder architecture
    and a vocabulary of 30,000 words, which is the same as BERT. However, there are
    substantial architectural improvements in ALBERT for efficient parameter usage.


    1.  **Factorized embedding parameterization** **:** In the case of BERT, the WordPiece
    embeddings size (E) is directly tied to the hidden layer size (H). It was observed
    that WordPiece embeddings are designed to learn context-independent representations,
    whereas the hidden layer embeddings are designed to learn context-dependent representations.
    In BERT we try to learn context-dependent representations through the hidden layers
    only.


    When H and E are tied together, we end up with a model with billions of parameters
    that are rarely updated in training. This happens as the embedding matrix, which
    is V*E where V is the large vocabulary, must scale with the H (hidden layers).
    This actually results in inefficient parameters, as these two items work for different
    purposes.


    In ALBERT, to make it more efficient we untie the two parameters and embedding
    parameters are split into two smaller matrices. Now the one-hot vectors are not
    directly projected into H; rather, they are projected into a smaller, lower dimension
    matrix E, and then E is projected into the hidden layers. Thus, the parameters
    get reduced from O (V*H) to Θ(V*E+E*H).


    2.  **Cross-layer parameter sharing** **:** ALBERT has a smoother transition from
    layer to layer in comparison to BERT and the parameter efficiency is improved
    by sharing of all the parameters across all layers. The feed-forward and attention
    parameters are all shared. This weight sharing is helpful in stabilizing the network
    parameters .


    3.  **Training changes: Sentence order prediction:** Similar to BERT, ALBERT also
    uses MLM but does not use NSP. Instead of NSP, ALBERT uses its own newly developed
    training method called sentence order prediction (SOP).


    The NSP loss used in BERT was not found to be a very effective training mechanism
    in subsequent studies. Hence, it was leveraged to develop SOP as NSP was unreliable.


    In ALBERT SOP, loss is used to model intersentence coherence. SOP was mainly created
    to focus on intersentence coherence loss instead of topic prediction, whereas
    BERT combines topic prediction with coherence prediction. Hence, ALBERT is able
    to learn finer grained intersentence cohesion by avoiding issues of topic prediction.


    ALBERT, even though it has fewer parameters than BERT, gets results in less time.
    In the language benchmark tests SQuAD1.1, SQuAD2.0, MNLI SST-2, and RACE, ALBERT
    has significantly outperformed BERT, as we can see in the comparison in Table
    [4-1](#498208_1_En_4_Chapter.xhtml#Tab1) .


    Table 4-1


    Comparison Between BERT and ALBERT Models


    | **Model** | **Parameters** | **SQuAD1.1** | **SQuAD2.0** | **MNLI** | **SST-2**
    | **RACE** | **Avg** | **Speedup** |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | **BERT base** | **108M** | **90.5/83.3** | **80.3/77.3** | **84.1** | **91.7**
    | **68.3** | **82.1** | **17.7x** |

    | **BERT large** | **334M** | **92.4/85.8** | **83.9/80.8** | **85.8** | **92.2**
    | **73.8** | **85.1** | **3.8x** |

    | **BERT xlarge** | **1270M** | **86.3/77.9** | **73.8/70.5** | **80.5** | **87.8**
    | **39.7** | **76.7** | **1.0** |

    | **ALBERT base** | **12M** | **89.3/82.1** | **79.1/76.1** | **81.9** | **89.4**
    | **63.5** | **80.1** | **21.1x** |

    | **ALBERT large** | **18M** | **90.9/84.1** | **82.1/79.0** | **83.8** | **90.6**
    | **68.4** | **82.4** | **6.5x** |

    | **ALBERT xlarge** | **59M** | **93.0/86.5** | **85.9/83.1** | **85.4** | **91.9**
    | **73.9** | **85.5** | **2.4x** |

    | **ALBERT xxlarge** | **233M** | **94.1/88.3** | **88.1/85.1** | **88.0** | **95.2**
    | **82.3** | **88.7** | **1.2x** |'
  trans: "\n### IMDB 评论数据集\n\nIMDB 数据集是一个广泛使用的电影评论数据集，用于对观众对电影的情感进行分类。该数据集包含 25,000\
    \ 条高度两极分化的电影评论用于训练，以及 25,000 条评论用于测试。除了训练和测试数据外，还有额外的未标记数据。该数据集也被用于在情感分类任务中评估\
    \ `BERT`。\n\n### RACE 基准\n\n`RACE` 是一个来自考试的大规模阅读理解数据集。`RACE` 数据集用于评估模型在阅读理解任务上的表现。该数据集收集自中国学生的英语考试。它包含近\
    \ 28,000 篇文章和 100,000 个由人类专家生成的问题。与其他基准数据集相比，`RACE` 中的问题数量要多得多。`BERT large` 模型在\
    \ `RACE` 基准数据集上达到了 73.8% 的得分。\n\n## 基于 BERT 的模型类型\n\n`BERT` 是一个开创性的自然语言模型，它在机器学习领域的引入导致了基于它的各种模型的发展。`BERT`\
    \ 模型的变体已被开发出来，以满足不同类型的基于 NLP 的系统。以下是 `BERT` 的几个主要变体：\n\n- `ALBERT`\n- `RoBERTa`\n\
    - `DistilBERT`\n- `StructBERT`\n- 用于自然问题的 `BERT[joint]`\n\n### ALBERT\n\n`ALBERT`\
    \ 是 `BERT` 的一个更小的版本，由谷歌研究院和丰田工业大学联合推出。它是一个更智能的“精简版”`BERT`，也被认为是 `BERT` 的自然继承者。它也可以用于实现最先进的\
    \ NLP 任务。所有这些都可以通过比 `BERT` 更少的计算能力实现，但需要在准确性上做出一点妥协。`ALBERT` 的创建主要是为了改进架构和训练方法，以便用更少的计算资源获得更好的结果。\n\
    \n`ALBERT` 具有类似 `BERT` 的核心架构。它有一个 Transformer 编码器架构和一个包含 30,000 个单词的词汇表，这与 `BERT`\
    \ 相同。然而，`ALBERT` 在架构上进行了实质性的改进，以实现高效的参数使用。\n\n1.  **分解式嵌入参数化：** 在 `BERT` 的情况下，WordPiece\
    \ 嵌入大小 (`E`) 直接与隐藏层大小 (`H`) 绑定。据观察，WordPiece 嵌入旨在学习上下文无关的表示，而隐藏层嵌入旨在学习上下文相关的表示。在\
    \ `BERT` 中，我们仅通过隐藏层来学习上下文相关的表示。\n\n    当 `H` 和 `E` 绑定时，我们最终会得到一个拥有数十亿参数的模型，而这些参数在训练中很少更新。这是因为嵌入矩阵（即\
    \ `V*E`，其中 `V` 是大型词汇表）必须随 `H`（隐藏层）缩放。这实际上导致了低效的参数，因为这两个项目服务于不同的目的。\n\n    在 `ALBERT`\
    \ 中，为了提高效率，我们将这两个参数解绑，并将嵌入参数拆分为两个较小的矩阵。现在，独热向量不再直接投影到 `H`；而是先投影到一个更小的、低维的矩阵 `E`，然后将\
    \ `E` 投影到隐藏层。因此，参数从 `O(V*H)` 减少到 `Θ(V*E+E*H)`。\n\n2.  **跨层参数共享：** 与 `BERT` 相比，`ALBERT`\
    \ 在层与层之间具有更平滑的过渡，并且通过在所有层之间共享所有参数来提高参数效率。前馈和注意力参数都是共享的。这种权重共享有助于稳定网络参数。\n\n3.\
    \  **训练变化：句子顺序预测：** 与 `BERT` 类似，`ALBERT` 也使用 `MLM`，但不使用 `NSP`。`ALBERT` 使用其自己新开发的训练方法——句子顺序预测\
    \ (`SOP`) 来代替 `NSP`。\n\n    在后续研究中发现，`BERT` 中使用的 `NSP` 损失并不是一个非常有效的训练机制。因此，由于\
    \ `NSP` 不可靠，它被用来开发 `SOP`。\n\n    在 `ALBERT` 的 `SOP` 中，损失用于建模句子间的连贯性。`SOP` 的创建主要是为了关注句子间的连贯性损失，而不是主题预测，而\
    \ `BERT` 则将主题预测与连贯性预测结合起来。因此，`ALBERT` 能够通过避免主题预测的问题来学习更细粒度的句子间连贯性。\n\n尽管 `ALBERT`\
    \ 的参数比 `BERT` 少，但它能在更短的时间内获得结果。在语言基准测试 `SQuAD1.1`、`SQuAD2.0`、`MNLI`、`SST-2` 和\
    \ `RACE` 中，`ALBERT` 的表现显著优于 `BERT`，正如我们在表 4-1 的比较中所看到的。\n\n**表 4-1** `BERT` 与\
    \ `ALBERT` 模型对比\n\n| 模型 | 参数 | SQuAD1.1 | SQuAD2.0 | MNLI | SST-2 | RACE | 平均分\
    \ | 加速比 |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| `BERT base`\
    \ | 108M | 90.5/83.3 | 80.3/77.3 | 84.1 | 91.7 | 68.3 | 82.1 | 17.7x |\n| `BERT\
    \ large` | 334M | 92.4/85.8 | 83.9/80.8 | 85.8 | 92.2 | 73.8 | 85.1 | 3.8x |\n\
    | `BERT xlarge` | 1270M | 86.3/77.9 | 73.8/70.5 | 80.5 | 87.8 | 39.7 | 76.7 |\
    \ 1.0 |\n| `ALBERT base` | 12M | 89.3/82.1 | 79.1/76.1 | 81.9 | 89.4 | 63.5 |\
    \ 80.1 | 21.1x |\n| `ALBERT large` | 18M | 90.9/84.1 | 82.1/79.0 | 83.8 | 90.6\
    \ | 68.4 | 82.4 | 6.5x |\n| `ALBERT xlarge` | 59M | 93.0/86.5 | 85.9/83.1 | 85.4\
    \ | 91.9 | 73.9 | 85.5 | 2.4x |\n| `ALBERT xxlarge` | 233M | 94.1/88.3 | 88.1/85.1\
    \ | 88.0 | 95.2 | 82.3 | 88.7 | 1.2x |\n"
- fmt: '### RoBERTa


    `RoBERTa` is an optimized method for pretraining NLP systems. `RoBERTa` (Robustly
    optimized BERT) was developed by the Facebook AI team and based on Google’s `BERT`
    model. `RoBERTa` reimplemented the neural network architecture of `BERT` with
    additional pretraining improvements that achieve state-of-the-art results on several
    benchmarks.


    `RoBERTa` and `BERT` share several configurations, but there are some model settings
    that differentiate the two models.


    - **Reserved token:** `BERT` uses `[CLS]` and `[SEP]` as starting token and separator
    token, respectively, whereas `RoBERTa` uses `<s>` and `</s>` to convert sentences.

    - **Size of sub-word:** `BERT` has about 30,000 sub-words, whereas in `RoBERTa`
    there are about 50,000 sub-words.


    In addition, there are specific modifications and adjustments that help `RoBERTa`
    to perform better than `BERT`.


    - **More training data:** During reimplementation of `BERT`, several changes were
    made to the hyperparameters of the `BERT` model and training was done with a higher
    magnitude of data with more iterations. `RoBERTa` uses more training data. It
    uses `BookCorpus` (16G), `CC-NEWS` (76G), `OpenWebText` (38G), and `Stories` (31G)
    data, whereas `BERT` uses only `BookCorpus` as training data.

    - **Dynamic masking:** When `BERT` was being ported to create `RoBERTa`, the creators
    modified the word masking strategy. `BERT` mainly uses static masking, in which
    the words are masked from sentences during preprocessing. `RoBERTa` makes use
    of dynamic masking. Here, a new masking pattern is generated whenever a sentence
    is fed into training. `RoBERTa` duplicates training data 10 times and masks those
    data differently. It is experimentally observed that the dynamic masking improves
    performance and gives a better result than static masking.

    - **Different training objective:** `BERT` captures the relationships between
    the sentences by training on `NSP`. Some training approaches without application
    of `NSP` provided better results, proving the ineffectiveness of `NSP`. Experiments
    were done to compare models trained with segment-pair with `NSP`, sentence-pair
    with `NSP`, full sentences without `NSP`, and doc-sentences without `NSP`. The
    models trained without `NSP` performed better on `SQuAD1.1/2.0`, `MNLI-m`, `SST-2`,
    and `RACE`.

    - **Training on longer sequences:** Better results have been achieved when a model
    was trained on longer sequences. `BERT` base is trained with a batch size of 256
    sequences via 1 million steps, but training on 2,000 sequences and 31,000 steps
    shows improvement in performance.


    With the implementation of the design changes, the `RoBERTa` model delivered state-of-the-art
    performance on the `MNLI`, `QNLI`, `RTE`, and `RACE` tasks. It also realized a
    sizable performance improvement on the `GLUE` benchmark with a score of 88.5.


    `RoBERTa` demonstrates that the tuning the `BERT` training procedure can result
    in performance improvement on a variety of NLP tasks. This highlights the importance
    of exploring the design choices in `BERT` training for better performance output.


    ### DistilBERT


    `DistilBERT` was introduced for knowledge distillation. This knowledge distillation
    was required to address the drawbacks of computation of large numbers of parameters.
    The NLP models that have been developed recently show an increase in parameter
    count, now reaching parameter counts as high as in the tens of billions. Even
    though higher parameter count ensures optimal performance, it prevents model training
    and serving when computational resources are limited.


    Knowledge distillation revolves around the idea that a larger model acts as a
    teacher for a smaller one that tries to replicate its outputs and sublayer activation
    for a given set of inputs. This is sometimes also known as teacher–student learning.
    It is a compression technique where the behavior of larger models is reproduced
    by the smaller ones. The output distribution from the teacher can be used for
    all possible targets, which helps in creation of a student with generalizability.
    For example, in the sentence “The sky is [mask]” a teacher might assign high probabilities
    to words like “cloudy” and “clear.” There are also chances that a high probability
    is assigned to the word “blue.” This is helpful for the student model, so that
    it is able to generalize rather than only learn the correct target. This information
    is captured through the loss function that is being used to train the student.
    This loss function comprises a linear combination of three factors.


    #### Distillation Loss


    Distillation loss takes into consideration combination of the output probabilities
    of the teacher (`t`) and the student (`s`) as shown in the following equation.


    ```

    L[ce] = ∑[i] t[i] log(s[i])

    ```


    Distillation Loss


    ```

    t[i] = exp(z[i]/T)/ ∑[j] exp(z[j]/T)

    ```


    Temperature Softmax


    The teacher probabilities are calculated through temperature softmax. This is
    basically a modification to the softmax so that more granularities are obtained
    from the teacher model output distribution. This gives a smoother output distribution,
    as the size of larger probabilities are decreased and the smaller ones are increased.
    This helps to minimize the distillation loss.


    #### Cosine Embedding Loss


    Cosine embedding loss is a distance measure between the hidden representations
    for teacher and student. This helps in creation of a better model as it enables
    the student to imitate the teacher not just in the output layer, but in other
    layers, too.


    #### Masked Language Modeling Loss


    This is the same loss as used in training of the `BERT` model to predict the correct
    token value for the masked token in the sequence.


    #### Architectural Modifications


    The `DistilBERT` network architecture is also a transformer encoder model similar
    to `BERT` base, but it has half the number of layers. The hidden representations,
    though, are kept the same. This affects the parameter count, with a 66 million
    parameter count in the case of `DistilBERT`, whereas there are 110 million parameters
    in the teacher model. The reduction in the model size through the number of layers
    helps to achieve the drastic reduction in computation complexity. The reduction
    in the size of the vectors or the hidden state representations have also reduced
    the model size.


    After the knowledge distillation, `DistilBERT` is able to achieve 97% of `BERT`
    base’s score on the `GLUE` benchmark. This knowledge distillation has helped to
    condense the larger models or ensembles of models into a smaller student network.
    This has proven to be helpful in situations where the computational environment
    is limited.


    ### StructBERT


    `StructBERT` is a model based on `BERT` that incorporates language structures
    into `BERT` pretraining. The two linearization strategies help to incorporate
    language structure into `BERT`. Word-level ordering and sentence-level ordering
    are the two structural information sets that are leveraged in `StructBERT`. `StructBERT`
    achieves better generalizability and adaptability due to the incorporation of
    this structural pretraining. The dependency between the words as well as sentences
    is encoded in `StructBERT`.


    #### Structural Pretraining in StructBERT


    Similar to all the other `BERT`-based models, `StructBERT` also builds on the
    `BERT` architecture. The original `BERT` performs two unsupervised pretraining
    tasks, `MLM` and `NSP`. `StructBERT` is able to increase the ability of the `MLM`
    task. It shuffles a certain number of tokens after masking of words and predicts
    the right order. `StructBERT` is also able to understand the relationship between
    sentences in a better way. This is achieved by random swapping of the sentence
    order. This new `BERT`-based model captures the fine-grained word structure in
    every sentence.


    After pretraining of the `StructBERT` it can be fine-tuned on task-specific data
    for a wide range of downstream tasks such as document summarization.'
