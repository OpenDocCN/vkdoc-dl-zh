  trans: "\n# 命名实体识别\n\n命名实体识别是信息抽取的一个子领域，旨在从文本数据中提取名词或名词短语，并将其分类为人名、地名、时间、组织等类别。这主要用于将非结构化文本转换为结构化文本。实体识别在以下系统中扮演着重要角色。\n\
    \n*   **搜索引擎**：用于识别与用户查询相关的文档。例如，假设查询是“什么是 Microsoft Outlook？”在此查询中，“Microsoft\
    \ Outlook”是一个应用类型的实体。因此，搜索引擎会给予将 Microsoft Outlook 识别为实体的文档更高的权重。\n\n*   **对话系统**：实体在对话系统的设计中起着关键作用。对话系统利用实体来消除用户问题的歧义，特别是当问题涉及常见问题但针对不同实体时。例如，用户输入了查询“我在\
    \ Outlook 中遇到了问题。”对话系统有两个解决方案：一个针对 Outlook，另一个针对 Gmail。因为 Outlook 和 Gmail 是不同的实体，所以解决方案也不同。因此，在识别意图（即“问题”）之后，下一步就是识别实体（即“Outlook”），对话系统据此提供相应的解决方案。\n\
    \n存在许多用于实体识别的标注数据集。不过，在本书中，我们将演示一个使用 BERT 作为基线在 OntoNotes 数据集上训练的实体模型。该数据集包含从电话对话、新闻专线、广播新闻、广播对话和博客等多种来源收集的\
    \ 1,745,000 个英文、900,000 个中文和 300,000 个阿拉伯文文本数据。\n\n在该数据集中，实体被标注为 18 个类别，包括组织、艺术作品、数字（文字形式）、数字、数量、人物、地点、地缘政治实体、时间、日期、设施、事件、法律、国籍/宗教/政治团体、语言、货币、百分比和产品等。\n\
    \n在本节中，我们将探讨如何使用一个在 OntoNotes 数据集上使用 BERT 训练好的命名实体识别系统。请按照以下步骤实现一个命名实体识别系统。\n\n\
    1.  如前所述，创建一个新的 Jupyter notebook，并运行以下命令来安装 `deeppavlov` 库。\n\n```\n! pip install\
    \ deeppavlov\n```\n\n安装完成后，您将看到类似图 6-5 的输出。\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig5_HTML.jpg](img/498208_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5\n\n安装 `deeppavlov`\n\n2.  我们将使用一个在 OntoNotes 数据上训练好的实体识别系统，如图 6-6 所示。因此，运行以下命令来下载训练好的模型\
    \ `ner_ontonotes_bert_mult`。\n\n```\n! python -m deeppavlov install ner_ontonotes_bert_mult\n\
    ```\n\n注意\n\n如果您使用的是 Colab Notebook，请像上面那样在安装命令前加上‘!’符号。\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig6_HTML.jpg](img/498208_1_En_6_Fig6_HTML.jpg)\n\
    \n图 6-6\n\n安装包\n\n3.  使用此命令执行此实现所需的必要导入。\n\n4.  然后，我们将使用 `deeppavlov` 库的 `build_model`\
    \ 类来获取一个实体模型。它接受两个参数：\n    *   **配置文件路径**：定义包含要使用的相关 NLP 模型详细信息的 `config` 文件的名称。在本例中，我们将使用\
    \ `ner_ontonotes_bert_mult`。此文件包含在 OntoNotes 上训练的实体模型所需的所有配置。\n    *   `download`：如果需要下载模型，则为\
    \ `True`，否则为 `False`。由于我们是第一次执行此操作，此参数的值将为 `True`。\n"
