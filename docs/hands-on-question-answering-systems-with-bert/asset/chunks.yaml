    of H[t] is computed on the basis of current input and the previous time step’s
    hidden state:


    H[t] = f (U X[t] + W H[t-1])


    The function f is a nonlinear transformation function like tanh or ReLU.


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig8_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    RNN diagram


    In contrast to FNNs , RNNs make use of their internal state or memory to process
    the input sequences. All the inputs in an RNN are related to each other, unlike
    other networks where inputs are independent of each other. An RNN takes X[0] from
    the sequence of inputs and then it outputs H[0]. This output, together with X[1],
    is the input for the next step. Hence, H[0] and X[1] form the input to the next
    step. Similarly, H[t-1] and X[t] form the input at time t. This way, the RNN remembers
    the context while training.


    The current state is given by


    H[t] = f (H[t-1], X[t]).


    On applying the activation function,


    H[(t)] = tanh (W H[(t-1)] + U X[(t)]).


    *   H is the single hidden vector.


    *   W is the weight at previous state.


    *   tanh is the activation function.


    *   U is the weight at the current input state.


    The output of the network is represented by Y[t]. There are weights that parameterize
    the connections from input to hidden layers. The weight matrix U parameterizes
    the input to hidden connections. The hidden to hidden connections are parameterized
    by the weight matrix W, and hidden to output layer connections are parameterized
    by the weight matrix V. All these weights (U, V, W) are shared across time.


    Hence, the output is given by


    Y[t] = V H[t].


    An RNN model enables modeling of the sequence of data so that each result of the
    sample can be assumed to be dependent on previous ones. There is also another
    advantage of RNNs, as they can even be used with convolutional layers to extend
    the effective pixel neighborhood.


    The RNN model has a disadvantage when using tanh or ReLU as an activation function,
    as it fails to process long sequences. Training of an RNN is also a difficult
    task and there are problems of gradients vanishing and exploding.


    ### Long Short-Term Memory


    LSTM is one of the most widely used forms of RNNs. They are capable of learning
    long-term dependencies, and their default behavior to learn or remember information
    for long periods of time.


    All RNN models have the form of repeating modules of neural networks that are
    chained. In standard RNNs, this repeating module will have a very simple structure,
    such as a single tanh layer.


    LSTMs, on the other hand, also have this chain-like structure, but the repeating
    module has a different structure. Here, instead of a single neural network layer,
    there are four layers that interact in a very special way. The control flow of
    LSTM is similar to the RNN, as it processes the data and passes the information
    as the data propagates forward. The difference in the way LSTM works is that the
    cell allows the LSTM to keep or forget the information. In LSTM there is emphasis
    on cell state and the various gates. The cell state acts as a transport highway
    and transfers the relative information all the way through the sequence chain.
    The gates add or remove information as the cell state goes on the journey. The
    gates are different neural networks that decide which information is allowed in
    the cell state. The gates and cell state make LSTM distinctive among RNN models
    and further makes LSTM useful in various applications.


    ### Encoders and Decoders


    The encoder–decoder is an organization of RNNs for sequence prediction problems
    that often have a variable number of inputs, outputs, or both. The main purpose
    of the encoder–decoder initially was machine translation problems, but it has
    proven to be successful at related sequence-to-sequence prediction problems such
    as question answering and text summarization.


    The encoder–decoder approach involves two RNNs, one to encode the input sequence
    and the other to decode the encoded input sequence into the target sequence. The
    encoding task is performed by the encoder and the decoding task is performed by
    the decoder. This encoder–decoder architecture is useful for various applications
    of sequence-to-sequence models like these:


    *   Chatbots


    *   Machine translation


    *   Text summary


    *   Image captioning


    #### The Encoder–Decoder Architecture


    The encoder–decoder architecture consists of two main components, the encoder
    and the decoder. Both these components are trained jointly at the same time. The
    architecture of the encoder–decoder is shown in Figure [2-9](#498208_1_En_2_Chapter.xhtml#Fig9).


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig9_HTML.png](images/498208_1_En_2_Chapter/498208_1_En_2_Fig9_HTML.png)


    Figure 2-9


    Architecture of encoder–decoder


    The encoder takes the input and reads the entire input sequence, which it encodes
    into an internal representation. The encoder processes the input sequence and
    collects information from the sequence and then propagates it further. This fixed-length
    internal representation vector is known as the context vector. The intermediate
    vector ID is the final internal state produced from the encoder part of the model.
    This helps the decoder to make accurate predictions. The decoder is responsible
    for reading the encoded sequence from the encoder and thereby generating the output
    sequence.'
  trans: "\n# 循环神经网络\n\n循环神经网络（`RNN`）是一类旨在处理连续数据或流式数据的神经网络，其优势在于能够利用数据的连续性。通常，每个隐藏层接收的数据不仅包含来自上一层的输出作为当前层的输入，还包含一个隐藏输入。\n\
    \n在处理长输入序列且需要保持同一输入上下文、同时不影响模型规模的情况下，`RNN` 能展现出显著优势。这使得 `NLP` 成为 `RNN` 的自然应用领域，尽管历史信息会随时间推移而逐渐衰减，并且也可能拖慢处理速度。\n\
    \n如图 2-8 所示，输入由 `X[t]` 表示，即网络在时间步 `t` 的输入。例如，`X[1]` 可以是句子中某个单词对应的向量。隐藏状态由 `H[t]`\
    \ 表示，它充当网络的记忆。`H[t]` 的值基于当前输入和上一时间步的隐藏状态计算得出：\n\n`H[t] = f (U X[t] + W H[t-1])`\n\
    \n函数 `f` 是一个非线性变换函数，例如 `tanh` 或 `ReLU`。\n\n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig8_HTML.jpg](img/498208_1_En_2_Fig8_HTML.jpg)\n\
    \n**图 2-8**  \nRNN 示意图\n\n与 `FNN` 不同，`RNN` 利用其内部状态或记忆来处理输入序列。在 `RNN` 中，所有输入都相互关联，而其他网络中的输入则彼此独立。`RNN`\
    \ 从输入序列中获取 `X[0]`，然后输出 `H[0]`。该输出与 `X[1]` 共同构成下一步的输入。因此，`H[0]` 和 `X[1]` 形成下一步的输入。类似地，`H[t-1]`\
    \ 和 `X[t]` 形成时间步 `t` 的输入。通过这种方式，`RNN` 在训练过程中记住了上下文。\n\n当前状态由下式给出：\n\n`H[t] = f\
    \ (H[t-1], X[t])`\n\n应用激活函数后：\n\n`H[(t)] = tanh (W H[(t-1)] + U X[(t)])`\n\n*\
    \   `H` 是单个隐藏向量。\n*   `W` 是上一状态的权重。\n*   `tanh` 是激活函数。\n*   `U` 是当前输入状态的权重。\n\n\
    网络的输出由 `Y[t]` 表示。存在一些权重参数化从输入层到隐藏层的连接。权重矩阵 `U` 参数化输入到隐藏层的连接。隐藏层到隐藏层的连接由权重矩阵 `W`\
    \ 参数化，而隐藏层到输出层的连接由权重矩阵 `V` 参数化。所有这些权重（`U`、`V`、`W`）在时间上是共享的。\n\n因此，输出由下式给出：\n\n\
    `Y[t] = V H[t]`\n\n`RNN` 模型能够对数据序列进行建模，从而可以假设样本的每个结果都依赖于先前的结果。`RNN` 还有另一个优势，即它们甚至可以与卷积层结合使用，以扩展有效的像素邻域。\n\
    \n当使用 `tanh` 或 `ReLU` 作为激活函数时，`RNN` 模型存在一个缺点，即无法处理长序列。训练 `RNN` 也是一项艰巨的任务，并且存在梯度消失和梯度爆炸的问题。\n\
    \n# 长短期记忆网络\n\n`LSTM` 是应用最广泛的 `RNN` 形式之一。它们能够学习长期依赖关系，并且其默认行为是长时间学习或记住信息。\n\n\
    所有 `RNN` 模型都具有链式重复神经网络模块的形式。在标准 `RNN` 中，这种重复模块的结构非常简单，例如单个 `tanh` 层。\n\n另一方面，`LSTM`\
    \ 也具有这种链式结构，但其重复模块的结构不同。这里，不是单个神经网络层，而是四个以非常特殊的方式相互作用的层。`LSTM` 的控制流与 `RNN` 类似，因为它处理数据并在数据向前传播时传递信息。`LSTM`\
    \ 工作方式的区别在于，细胞允许 `LSTM` 保留或遗忘信息。在 `LSTM` 中，重点在于细胞状态和各种门控。细胞状态充当传输高速公路，将相关信息一路传递到整个序列链中。门控在细胞状态传递过程中添加或移除信息。门控是决定哪些信息允许进入细胞状态的不同神经网络。门控和细胞状态使\
    \ `LSTM` 在 `RNN` 模型中独树一帜，并进一步使 `LSTM` 在各种应用中发挥作用。\n\n# 编码器与解码器\n\n编码器-解码器是一种针对序列预测问题而组织的\
    \ `RNN` 结构，这类问题通常具有可变数量的输入、输出或两者兼有。编码器-解码器最初的主要目的是解决机器翻译问题，但后来被证明在相关的序列到序列预测问题（如问答和文本摘要）中也很成功。\n\
    \n编码器-解码器方法涉及两个 `RNN`：一个用于编码输入序列，另一个用于将编码后的输入序列解码为目标序列。编码任务由编码器执行，解码任务由解码器执行。这种编码器-解码器架构对于序列到序列模型的各种应用非常有用，例如：\n\
    \n*   聊天机器人\n*   机器翻译\n*   文本摘要\n*   图像描述\n\n## 编码器-解码器架构\n\n编码器-解码器架构由两个主要组件组成：编码器和解码器。这两个组件同时进行联合训练。编码器-解码器的架构如图\
    \ 2-9 所示。\n\n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig9_HTML.png](img/498208_1_En_2_Fig9_HTML.png)\n\
    \n**图 2-9**  \n编码器-解码器架构\n\n编码器接收输入并读取整个输入序列，将其编码为内部表示。编码器处理输入序列，从中收集信息，然后将其进一步传播。这个固定长度的内部表示向量被称为上下文向量。中间向量\
    \ ID 是模型编码器部分产生的最终内部状态。这有助于解码器做出准确的预测。解码器负责从编码器读取编码后的序列，从而生成输出序列。\n"
- fmt: "### Encoder Part of the Model\n\nThe encoder, which is responsible for converting\
    \ the input sequence and encapsulating the information as the internal state vectors,\
    \ is basically an LSTM or GRU (Gated Recurrent Unit) cell. Only the internal states\
    \ are used; the outputs of the encoder are rejected, as shown in Figure [2-10](#498208_1_En_2_Chapter.xhtml#Fig10).\n\
    \n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig10_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10  \nLSTM for encoder\n\nTo understand the working of the encoder\
    \ part of the model, we focus on LSTM. In LSTM only one element is taken as input\
    \ at a time. This implies that if we have a sequence of length `m`, then the LSTM\
    \ takes `m` time steps to read the entire sequence.\n\n- `X[t]` is the input at\
    \ time step `t`.\n- `h[t]` and `c[t]` are internal states at time step `t` of\
    \ the LSTM; for GRU there is only one internal state `h[t]`.\n- `Y[t]` is the\
    \ output at time step `t`.\n\nLet’s take an example of translation of a sentence\
    \ in English into French.\n\n![../images/498208_1_En_2_Chapter/498208_1_En_2_Figa_HTML.png](images/498208_1_En_2_Chapter/498208_1_En_2_Figa_HTML.png)\n\
    \n- **English:** It is a good day.\n- **French:** C’est une bonne journée.\n\n\
    The English sequence shown can be considered a sentence containing five words.\
    \ The inputs of the encoder `X[t]` are as follows.\n\n- `X[1]` = It\n- `X[2]`\
    \ = is\n- `X[3]` = a\n- `X[4]` = good\n- `X[5]` = day.\n\nThe LSTM will read the\
    \ sequence word by word in five time steps. Each word `X[t]` is represented as\
    \ a vector using the word embedding. The word embedding converts each of the words\
    \ into a vector of fixed length. The internal states (`h[t]`, `c[t]`) learn what\
    \ LSTM has read until time step `t`. Here the LSTM will read the entire sentence\
    \ in time step `t = 5`. The final state `h[5]`, `c[5]` has the information of\
    \ the entire input sequence, “It is a good day.”\n\nThe output of the encoder\
    \ is `Y[t]`, which at each time step is the prediction of the LSTM. Because in\
    \ machine translation problems we take the output of the entire input sequence,\
    \ `Y[t]` at each time step is discarded because it is of no use.\n\n### Decoder\
    \ Part of the Model\n\nThe decoder works in a different way than the encoder.\
    \ Its training phase and testing phase work differently, whereas the encoder model\
    \ works the same way during the training and testing phases.\n\nIf we take the\
    \ sentence language translation example presented earlier, just like the encoder,\
    \ the decoder also generates the output sentence word by word. To generate the\
    \ output “C’est une bonne journée,” we need to add `START_` at the beginning and\
    \ `_END` at the end as delimiters of the output sequence so that the decoder recognizes\
    \ the start and the end of the sequence. The decoder is basically trained to generate\
    \ the output based on the information gathered by the encoder, so the initial\
    \ states (`h[0]`, `c[0]`) of the decoder are set to the final states of the encoder.\n\
    \nThe `START_` is input so that the decoder can start generating the next word.\
    \ The decoder is made to learn the end of the French sentence using `_END`. The\
    \ loss is calculated on the outputs that are predicted from each time step and\
    \ the errors are backpropagated through time to update the parameters of the model.\
    \ In the testing phase, output produced at each time step is fed as input into\
    \ the next time step and the end of the sequence is identified using `_END`.\n\
    \n### Bidirectional Encoders and Decoders\n\nIn a bidirectional encoder–decoder\
    \ architecture, the encoders and the decoders are bidirectional LSTMs. The last\
    \ hidden state of the backward encoder initializes the forward decoder, whereas\
    \ the backward decoder is initialized with the last hidden state of the forward\
    \ encoder.\n\nThe bidirectional encoder is used when considering context information\
    \ from the past and future. The sequence of input word vectors is fed to LSTM\
    \ from forward and backward directions. The bidirectional decoder is also a bidirectional\
    \ RNN that is made up of two separate LSTMs. One of the LSTMs decodes the information\
    \ from left to right, whereas the other LSTM decodes in a backward direction from\
    \ right to left. This bidirectionality in the RNN provides better performance.\n\
    \nFor instance, we have to predict next word after “cloudy” in the sentence “The\
    \ weather is cloudy; it might rain.” The unidirectional LSTM will see “The weather\
    \ is …” and will try to predict the next word using this context only. When using\
    \ bidirectional LSTM we will be able to see more information.\n\n- Forward LSTM:\
    \ “The weather is …”\n- Backward LSTM: “… it might rain today.”\n\nHence using\
    \ the information from the past as well as the future makes it easier to predict\
    \ the word “cloudy,” as the network will better understand the next word.\n\n\
    ### Transformer Models\n\nThe transformer is a novel architecture with the aim\
    \ of solving sequence-to-sequence tasks while handling long-range dependencies.\
    \ The transformer maintains sequential information in a sample just as RNNs do.\
    \ If we take a high-level look at the transformer model, it basically is like\
    \ a single black box in machine translation application that takes a sentence\
    \ in one language as an input and outputs the translation of the sentence, as\
    \ shown in Figure [2-11](#498208_1_En_2_Chapter.xhtml#Fig11).\n\n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig11_HTML.png](images/498208_1_En_2_Chapter/498208_1_En_2_Fig11_HTML.png)\n\
    \nFigure 2-11  \nThe transformer as a black box\n\n### Model Architecture\n\n\
    The transformer has an encoder–decoder structure using stacked self-attention\
    \ and fully connected layers for both the encoder and decoder. The transformer\
    \ consists of components like encoders, decoders, positional encoding, and attention.\
    \ There is a stack of encoders and decoders. Each of the encoders is very similar\
    \ to the other encoders, as they have the same architecture. Decoders, too, share\
    \ this property and are similar to each other in the transformer, as shown in\
    \ Figure [2-12](#498208_1_En_2_Chapter.xhtml#Fig12).\n\n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig12_HTML.png](images/498208_1_En_2_Chapter/498208_1_En_2_Fig12_HTML.png)\n\
    \nFigure 2-12  \nEncoder–decoder stacks in transformer\n\nThe encoder comprises\
    \ a stack of identical layers. Every layer further consists of two sublayers.\
    \ The first layer is for a multihead self-attention mechanism. The second layer,\
    \ on the other hand, is a simple, fully connected feed-forward network. In between\
    \ each of the sublayers, residual connections are employed along with layer normalization.\
    \ The input flows through the self-attention layer in the encoder and helps the\
    \ encoder to look at other words in the input sequence while encoding a specific\
    \ word.\n\nThe decoder, similar to encoder, comprises a stack of identical layers.\
    \ It also has sublayers like the encoder, but has one more sublayer. This third\
    \ sublayer is responsible for performing multihead attention over the output of\
    \ the encoder stack. These layers help the decoder to focus on relevant parts\
    \ of the input sentence only.\n\nThe encoder block has one layer of a multihead\
    \ layer of FNN, and the decoder, on the other hand, has an extra masked multihead\
    \ attention mechanism. Both the encoder and decoder stacks have the same number\
    \ of units. That number of encoder and decoder units is basically a hyperparameter\
    \ that can be varied.\n\nTo prevent unwanted attention to out-of-sequence positions,\
    \ masking is used before softmax in the self-attention layer in both the encoder\
    \ and the decoder. For prevention of positions from attending to subsequent positions,\
    \ an additional mask is used in conjunction with the general mask in the decoder.\
    \ These two masks in the decoder can be blended with the help of a bit-wise AND\
    \ operation."
  raw: '#### Encoder Part of the Model


    The encoder, which is responsible for converting the input sequence and encapsulating
    the information as the internal state vectors, is basically an LSTM or GRU (Gated
    Recurrent Unit) cell. Only the internal states are used; the outputs of the encoder
    are rejected, as shown in Figure [2-10](#498208_1_En_2_Chapter.xhtml#Fig10).


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig10_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    LSTM for encoder


    To understand the working of the encoder part of the model, we focus on LSTM.
    In LSTM only one element is taken as input at a time. This implies that if we
    have a sequence of length m, then the LSTM takes m time steps to read the entire
    sequence.


    *   X[t] is the input at time step t.


    *   h[t] and c[t] are internal states at time step t of the LSTM; for GRU there
    is only one internal state h[t].


    *   Y[t] is the output at time step t.


    Let’s take an example of translation of a sentence in English into French.


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Figa_HTML.png](images/498208_1_En_2_Chapter/498208_1_En_2_Figa_HTML.png)


    *   **English:** It is a good day.


    *   **French:** C’est une bonne journée.


    The English sequence shown can be considered a sentence containing five words.
    The inputs of the encoder X[t] are as follows.


    *   X[1] = It


    *   X[2] = is


    *   X[3] = a


    *   X[4] = good


    *   X[5] = day.


    The LSTM will read the sequence word by word in five time steps. Each word X[t]
    is represented as a vector using the word embedding. The word embedding converts
    each of the words into a vector of fixed length. The internal states (h[t] , c[t])
    learn what LSTM has read until time step t. Here the LSTM will read the entire
    sentence in time step t = 5\. The final state h[5], c[5] has the information of
    the entire input sequence, “It is a good day.”


    The output of the encoder is Y[t], which at each time step is the prediction of
    the LSTM. Because in machine translation problems we take the output of the entire
    input sequence, Y[t] at each time step is discarded because it is of no use.


    #### Decoder Part of the Model


    The decoder works in a different way than the encoder. Its training phase and
    testing phase work differently, whereas the encoder model works the same way during
    the training and testing phases.


    If we take the sentence language translation example presented earlier, just like
    the encoder, the decoder also generates the output sentence word by word. To generate
    the output “C’est une bonne journée,” we need to add `START_` at the beginning
    and `_END` at the end as delimiters of the output sequence so that the decoder
    recognizes the start and the end of the sequence. The decoder is basically trained
    to generate the output based on the information gathered by the encoder, so the
    initial states (h[0], c[0]) of the decoder are set to the final states of the
    encoder.


    The `START_` is input so that the decoder can start generating the next word.
    The decoder is made to learn the end of the French sentence using `_END`. The
    loss is calculated on the outputs that are predicted from each time step and the
    errors are backpropagated through time to update the parameters of the model.
    In the testing phase, output produced at each time step is fed as input into the
    next time step and the end of the sequence is identified using `_END`.


    #### Bidirectional Encoders and Decoders


    In a bidirectional encoder–decoder architecture, the encoders and the decoders
    are bidirectional LSTMs. The last hidden state of the backward encoder initializes
    the forward decoder, whereas the backward decoder is initialized with the last
    hidden state of the forward encoder.


    The bidirectional encoder is used when considering context information from the
    past and future. The sequence of input word vectors is fed to LSTM from forward
    and backward directions. The bidirectional decoder is also a bidirectional RNN
    that is made up of two separate LSTMs. One of the LSTMs decodes the information
    from left to right, whereas the other LSTM decodes in a backward direction from
    right to left. This bidirectionality in the RNN provides better performance.


    For instance, we have to predict next word after “cloudy” in the sentence “The
    weather is cloudy; it might rain.” The unidirectional LSTM will see “The weather
    is …” and will try to predict the next word using this context only. When using
    bidirectional LSTM we will be able to see more information.


    *   Forward LSTM: “The weather is …”


    *   Backward LSTM: “… it might rain today.”


    Hence using the information from the past as well as the future makes it easier
    to predict the word “cloudy,” as the network will better understand the next word.


    ### Transformer Models


    The transformer is a novel architecture with the aim of solving sequence-to-sequence
    tasks while handling long-range dependencies. The transformer maintains sequential
    information in a sample just as RNNs do. If we take a high-level look at the transformer
    model, it basically is like a single black box in machine translation application
    that takes a sentence in one language as an input and outputs the translation
    of the sentence, as shown in Figure [2-11](#498208_1_En_2_Chapter.xhtml#Fig11).


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig11_HTML.png](images/498208_1_En_2_Chapter/498208_1_En_2_Fig11_HTML.png)


    Figure 2-11


    The transformer as a black box


    ### Model Architecture


    The transformer has an encoder–decoder structure using stacked self-attention
    and fully connected layers for both the encoder and decoder. The transformer consists
    of components like encoders, decoders, positional encoding, and attention. There
    is a stack of encoders and decoders. Each of the encoders is very similar to the
    other encoders, as they have the same architecture. Decoders, too, share this
    property and are similar to each other in the transformer, as shown in Figure
    [2-12](#498208_1_En_2_Chapter.xhtml#Fig12).


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig12_HTML.png](images/498208_1_En_2_Chapter/498208_1_En_2_Fig12_HTML.png)


    Figure 2-12


    Encoder–decoder stacks in transformer


    The encoder comprises a stack of identical layers. Every layer further consists
    of two sublayers. The first layer is for a multihead self-attention mechanism.
    The second layer, on the other hand, is a simple, fully connected feed-forward
    network. In between each of the sublayers, residual connections are employed along
    with layer normalization. The input flows through the self-attention layer in
    the encoder and helps the encoder to look at other words in the input sequence
    while encoding a specific word.


    The decoder, similar to encoder, comprises a stack of identical layers. It also
    has sublayers like the encoder, but has one more sublayer. This third sublayer
    is responsible for performing multihead attention over the output of the encoder
    stack. These layers help the decoder to focus on relevant parts of the input sentence
    only.


    The encoder block has one layer of a multihead layer of FNN, and the decoder,
    on the other hand, has an extra masked multihead attention mechanism. Both the
    encoder and decoder stacks have the same number of units. That number of encoder
    and decoder units is basically a hyperparameter that can be varied.


    To prevent unwanted attention to out-of-sequence positions, masking is used before
    softmax in the self-attention layer in both the encoder and the decoder. For prevention
    of positions from attending to subsequent positions, an additional mask is used
    in conjunction with the general mask in the decoder. These two masks in the decoder
    can be blended with the help of a bit-wise AND operation.'
  trans: "\n### 模型的编码器部分\n\n编码器负责转换输入序列并将信息封装为内部状态向量，它本质上是一个 LSTM 或 GRU（门控循环单元）单元。仅使用内部状态；编码器的输出被舍弃，如图\
    \ 2-10 所示。\n\n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig10_HTML.jpg](img/498208_1_En_2_Fig10_HTML.jpg)\n\
    \n图 2-10  \n用于编码器的 LSTM\n\n为了理解模型编码器部分的工作原理，我们重点关注 LSTM。在 LSTM 中，每次只将一个元素作为输入。这意味着，如果我们有一个长度为\
    \ `m` 的序列，那么 LSTM 需要 `m` 个时间步来读取整个序列。\n\n- `X[t]` 是时间步 `t` 的输入。\n- `h[t]` 和 `c[t]`\
    \ 是 LSTM 在时间步 `t` 的内部状态；对于 GRU，只有一个内部状态 `h[t]`。\n- `Y[t]` 是时间步 `t` 的输出。\n\n让我们以将英语句子翻译成法语的例子来说明。\n\
    \n![../images/498208_1_En_2_Chapter/498208_1_En_2_Figa_HTML.png](img/498208_1_En_2_Figa_HTML.png)\n\
    \n- **英语：** It is a good day.\n- **法语：** C’est une bonne journée.\n\n所示的英语序列可以看作是一个包含五个单词的句子。编码器的输入\
    \ `X[t]` 如下所示。\n\n- `X[1]` = It\n- `X[2]` = is\n- `X[3]` = a\n- `X[4]` = good\n\
    - `X[5]` = day.\n\nLSTM 将在五个时间步内逐词读取该序列。每个单词 `X[t]` 都通过词嵌入表示为一个向量。词嵌入将每个单词转换为一个固定长度的向量。内部状态（`h[t]`，`c[t]`）学习\
    \ LSTM 在时间步 `t` 之前读取到的内容。在这里，LSTM 将在时间步 `t = 5` 时读取整个句子。最终状态 `h[5]`，`c[5]` 包含了整个输入序列“It\
    \ is a good day.”的信息。\n\n编码器的输出是 `Y[t]`，在每个时间步，它都是 LSTM 的预测。因为在机器翻译问题中，我们取整个输入序列的输出，所以每个时间步的\
    \ `Y[t]` 都被丢弃，因为它没有用处。\n\n### 模型的解码器部分\n\n解码器的工作方式与编码器不同。它的训练阶段和测试阶段工作方式不同，而编码器模型在训练和测试阶段的工作方式相同。\n\
    \n如果我们沿用前面提到的句子语言翻译示例，与编码器类似，解码器也逐词生成输出句子。为了生成输出“C’est une bonne journée”，我们需要在开头添加\
    \ `START_`，在结尾添加 `_END` 作为输出序列的分隔符，以便解码器识别序列的开始和结束。解码器本质上被训练为基于编码器收集的信息来生成输出，因此解码器的初始状态（`h[0]`，`c[0]`）被设置为编码器的最终状态。\n\
    \n`START_` 作为输入，以便解码器可以开始生成下一个单词。解码器被训练使用 `_END` 来学习法语句子的结束。损失是根据每个时间步预测的输出计算的，并且误差通过时间反向传播以更新模型的参数。在测试阶段，每个时间步产生的输出被作为输入馈送到下一个时间步，并使用\
    \ `_END` 来识别序列的结束。\n\n### 双向编码器和解码器\n\n在双向编码器-解码器架构中，编码器和解码器都是双向 LSTM。反向编码器的最后一个隐藏状态初始化前向解码器，而反向解码器则用前向编码器的最后一个隐藏状态初始化。\n\
    \n当需要考虑来自过去和未来的上下文信息时，会使用双向编码器。输入词向量序列从前向和后向两个方向馈送到 LSTM。双向解码器也是一个双向 RNN，由两个独立的\
    \ LSTM 组成。其中一个 LSTM 从左到右解码信息，而另一个 LSTM 则从右到左反向解码。RNN 中的这种双向性提供了更好的性能。\n\n例如，我们需要预测句子“The\
    \ weather is cloudy; it might rain.”中“cloudy”之后的单词。单向 LSTM 将看到“The weather is\
    \ …”，并尝试仅使用此上下文来预测下一个单词。当使用双向 LSTM 时，我们将能够看到更多信息。\n\n- 前向 LSTM：“The weather is\
    \ …”\n- 后向 LSTM：“… it might rain today.”\n\n因此，利用来自过去和未来的信息使得预测单词“cloudy”更容易，因为网络将更好地理解下一个单词。\n\
    \n### Transformer 模型\n\nTransformer 是一种新颖的架构，旨在解决序列到序列任务，同时处理长距离依赖关系。Transformer\
    \ 像 RNN 一样在样本中维护序列信息。如果我们从高层次来看 Transformer 模型，它在机器翻译应用中基本上就像一个黑盒，以一种语言的一个句子作为输入，并输出该句子的翻译，如图\
    \ 2-11 所示。\n\n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig11_HTML.png](img/498208_1_En_2_Fig11_HTML.png)\n\
    \n图 2-11  \n作为黑盒的 Transformer\n\n### 模型架构\n\nTransformer 采用编码器-解码器结构，为编码器和解码器都使用了堆叠的自注意力和全连接层。Transformer\
    \ 由编码器、解码器、位置编码和注意力等组件组成。它有一组堆叠的编码器和解码器。每个编码器都非常相似，因为它们具有相同的架构。解码器也共享此属性，并且在 Transformer\
    \ 中彼此相似，如图 2-12 所示。\n\n![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig12_HTML.png](img/498208_1_En_2_Fig12_HTML.png)\n\
    \n图 2-12  \nTransformer 中的编码器-解码器堆栈\n\n编码器由一组相同的层堆叠而成。每一层又包含两个子层。第一层用于多头自注意力机制。另一方面，第二层是一个简单的、全连接的前馈网络。在每个子层之间，都使用了残差连接以及层归一化。输入流经编码器中的自注意力层，帮助编码器在编码特定单词时查看输入序列中的其他单词。\n\
    \n解码器与编码器类似，也由一组相同的层堆叠而成。它也有像编码器那样的子层，但多了一个子层。这第三个子层负责对编码器堆栈的输出执行多头注意力。这些层帮助解码器仅关注输入句子的相关部分。\n\
    \n编码器块有一层 FNN 的多头层，而解码器则有一个额外的掩码多头注意力机制。编码器和解码器堆栈具有相同数量的单元。编码器和解码器的单元数量本质上是一个可以变化的超参数。\n\
    \n为了防止对序列外位置的无关注意力，在编码器和解码器的自注意力层中，softmax 之前都使用了掩码。为了防止位置关注后续位置，在解码器中，除了通用掩码之外，还使用了一个额外的掩码。解码器中的这两个掩码可以通过按位与操作进行合并。\n"
- fmt: '### Attention Models


    Attention is the output vector of a dense layer using a softmax function. It enhances
    the results by plugging it into suitable scenarios. The translation mechanism
    is used to rely on reading of a complete sentence and compressing all information
    into a fixed-length vector. In this situation if we have a sentence with hundreds
    of words that are represented by several words, there will surely be a loss of
    information or inadequate translation.


    Attention is able to partially fix this problem. It is responsible for allowing
    the machine translator to look over all of the information that the sentence contains.
    Thereby, the proper word is generated according to the current word and the context.
    Attention also provides the ability to focus on local or global features by allowing
    the translator to zoom in or out.


    #### Why Is Attention Required?


    As sentences consist of different numbers of words, an RNN is naturally introduced
    to model the conditional probability among words. In a probabilistic language
    model, the focus is to assign a probability to a sentence using a Markov assumption.


    `P(w[1]w[2] … w[n]) ≈ *Π*P(w[i] | w[i-k] … w[i-1])`


    The translation works on input and output of variable lengths with this encoder–decoder
    model. This is adopted while the basic RNN cell is changed to an GRU or LSTM cell
    and ReLU replaces the hyperbolic tangent activation.


    The discrete words are mapped to dense vectors for computational efficiency with
    the help of an embedding layer. These embedded words are then fed sequentially
    to the encoder. As the information flows from left to right, every word vector
    is learned according to all the previous inputs, not just the current word. Once
    the sentence is read completely, output is generated by the encoder. There is
    also a hidden state that is generated by the encoder for further processing. The
    decoder uses this hidden state from the encoder and generates the translation
    words sequentially.


    #### How Attention Works


    The attention mechanism is basically a context vector that is plugged into the
    encoder–decoder architecture within the gap between the encoder and decoder. This
    context vector takes all the encoder cell’s output as input and then computes
    the probability distribution of source language words for each of the words that
    the decoder wants to generate. The decoder is able to capture global information,
    not just infer on the basis of one hidden state. This attention mechanism helps
    the decoder to capture a wider perspective.


    If we look into how a context vector is built, it is basically quite simple. For
    every fixed target word, we generate scores for each of the encoder states by
    looping over all the states of the encoder and comparing the target to the source
    states. Then softmax is used to normalize all the scores. We now obtain the probability
    distribution conditioned on the target states. Finally, to make the context vector
    easy to train, the weights are introduced. Once we get the context vector, the
    attention vector can be easily computed using the context vector, the attention
    function, and the target word.


    #### Types of Attention Models


    There are three types of attention models: global and local attention, hard and
    soft attention, and self-attention. Let’s examine each in turn.


    ##### Global Attention Model


    In the global attention model, inputs from every encoder state and decoder state
    prior to the current state is taken into consideration for computation of the
    output. The context vector here is obtained by taking product of global aligned
    weights and each of the encoder steps. This is then fed to the RNN cell to obtain
    the decoder output.


    ##### Local Attention Model


    The local attention model varies from the global attention model as few positions
    from the encoder are used for calculation of the aligned weights. Local attention
    models are further of two types: monotonic alignment and predictive alignment.


    ##### Hard and Soft Attention Model


    The soft attention model is similar to the global attention model. The hard attention
    model differs from the local attention model in that the local model is almost
    differential at every point, whereas the hard attention model is not. The local
    attention model can be considered a blend of hard and soft attention.


    ##### Self-Attention Model


    The self-attention model relates different positions of the same input sequence.
    Self-attention can theoretically adopt any score functions conditioned that the
    target sequence is to be replaced with the same input sequence.


    ## Conclusion


    In this chapter, we have discussed about various Neural networks in NLP domain.
    Now that we have covered different types of neural networks, we turn our attention
    to how we can use BERT.


    # 3. Introduction to Word Embeddings


    NLP tasks such as document classification, sentiment analysis, clustering, and
    document summarization require processing and understanding of textual data. Implementation
    of these tasks depends on how data are being processed and understood by AI systems.
    One way of doing this is to convert textual representation to a numerical form
    using some statistical methods such as term frequency-inverse document frequency
    (TF-IDF), count vector, and so on, but these methods do not consider the meaning
    of a sentence and only deal with the occurrence of words in sentences.


    Over the course of time, several semantic methods such as parse trees, contextual
    grammar, ontologies, and others have been developed, but these methods would require
    a great amount of human effort to prepare labeled training data. In the last few
    years, widespread availability of computing capacity has made it possible to use
    neural network–based methods for these tasks.


    ## One-Hot Representation


    One-hot representation is one of the most common and basic methods for representation
    of text. It involves representation of a word using binary encodings (i.e., 0
    and 1). It can also be used for representation of categorical attributes.


    As an example, assume that a dataset has color as one of the features, with three
    possible values: red, blue, and green. Therefore, this feature will be converted
    to three new columns, one for each color value, as shown here.


    |   | **RED** | **BLUE** | **GREEN** |

    | **1** | 1 | 0 | 0 |

    | **2** | 0 | 1 | 0 |

    | **3** | 0 | 0 | 1 |


    As an example, the first data point has value of 1 in the RED column and 0 in
    the others. This means initially that this data point has value for the color
    column of RED. Red is represented as `[1 0 0]` in one-hot encoding, for blue 1
    occupies the second position, and for green 1 is in the third position. This is
    a three-dimensional vector. The one-hot representation expands the feature vector
    as each category of the color is itself a feature now.


    Now, when we talk about one-hot encoding for textual sentences, it does not care
    about order of occurrence of words in sentences and actually ignores semantic
    meaning of words. This approach works best in scenarios where the corpus is smaller
    and some traditional NLP methods need to be used.


    As an example, to represent a text sentence using one-hot representation, following
    these steps.


    1. Count the total number of unique words present in corpus.

    2. Assign 0 or 1 depending on if the word is present in the sentence or not.


    Consider the sentence “The sky is clear today.” The vocabulary includes words
    such as The, sky, is, clear, and today. It forms a five-dimensional vector if
    represented in one-hot representation as shown in Figure 3-1.


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig1_HTML.png](images/498208_1_En_3_Chapter/498208_1_En_3_Fig1_HTML.png)


    **Figure 3-1** One-hot representation'
