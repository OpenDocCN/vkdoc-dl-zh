    \ headers and should have four columns as shown below.\n\n1          1         a         text\
    \ example belonging to class 1\n\n2          1         a          text example\
    \ belonging to class 1\n\n3          2         a          text example belonging\
    \ to class 2\n\n4          0         a          text example belonging to class\
    \ 0\n\n```\ngit clone https://github.com/google-research/bert.git\n```\n\nHere\
    \ are details of the columns used.\n\n1.  The `test.tsv` file should have a header\
    \ line, unlike the other two files, and should appear as shown here.\n\nid sentence\n\
    \n1\\. first test example\n\n2\\. second test example\n\n3\\. third test example\n\
    \n2.  To train the model, you need to navigate to the directory into which the\
