    ### 开放域问答系统


    ODQA 系统旨在从维基百科文章中找出任何问题的确切答案。因此，对于一个问题，该系统将提供一个相关的答案。ODQA 系统的默认实现将一批查询作为输入进行处理，并返回答案。

