  trans: '

    ### 命名实体识别


    实体被定义为文本中提供重要信息的对象或名词，例如人物、组织或其他对象。这些信息可作为下游任务的特征。例如，`Google`、`Microsoft` 和 `IBM`
    都是类型为 `Organization` 的实体。


    `NER` 是一种信息提取技术，它根据训练好的模型将实体提取并分类到相应的类别中。例如，英语中的一些基本类别包括人名、组织名、地点、日期、电子邮件地址、电话号码等。再比如，在我们的示例句子中，“machine
    learning”和“computer vision”等短语是类型为 `AI_Branch` 的实体，指的是人工智能的分支。


    目前，人工智能领域的大型供应商，如 `IBM`、`Google` 和 `Microsoft`，都提供了用于从文本中提取命名实体的预训练模型。它们还允许你构建特定于你的应用和领域的自定义
    `NER` 模型。像 `spaCy` 这样的开源项目也提供了训练和使用自定义 `NER` 模型的能力。


    ### 共指消解


    `NLP` 领域（尤其是在英语中）的主要挑战之一就是代词的使用。在英语中，代词被广泛用于指代前文或前一句中的名词。为了进行语义分析或识别这些句子之间的关系，系统必须建立句子之间的依赖关系，这一点至关重要。


    例如，考虑句子“它可以分为两种类型，即有监督学习和无监督学习”，其中“它”指代的是第一句和第二句中的机器学习。这可以通过在数据集中标注此类依赖关系来训练模型，然后使用相同的模型对未见过的文本片段或文档进行关系提取来实现。


    ### 词袋模型


    众所周知，计算机只能处理数值数据；因此，要理解文本的含义，必须将其转换为数值形式。词袋模型是将文本转换为数值数据的方法之一。


    词袋模型是一种非常流行的特征提取方法，它描述了文本中每个单词的出现情况。你需要先构建语料库的词汇表，然后计算每个单词相对于语料库中每个文本片段或文档的出现次数。它不存储任何与顺序或句子结构相关的信息。这就是它被称为词袋模型的原因。它还可以告诉你某个特定单词是否出现在文档中，但不提供该单词在文档中位置的信息。例如，考虑我们的示例文本片段，该片段经过句子分割步骤后被分割成了三个句子。


    - **句子 A**：机器学习（ML）是计算机系统用来执行特定任务而无需使用显式指令的[算法](https://en.wikipedia.org/wiki/Algorithm)和[统计模型](https://en.wikipedia.org/wiki/Statistical_model)的[科学研究](https://en.wikipedia.org/wiki/Branches_of_science)，它依赖于模式和[推理](https://en.wikipedia.org/wiki/Inference)。

    - **句子 B**：机器学习算法被广泛应用于各种场景，例如[电子邮件过滤](https://en.wikipedia.org/wiki/Email_filtering)和[计算机视觉](https://en.wikipedia.org/wiki/Computer_vision)。

    - **句子 C**：它可以分为两种类型，即有监督学习和无监督学习。


    图 1-2 是我们示例文本片段的文档-词项矩阵，其中如果词项出现在句子中，则其值为 1，否则为 0。


    ![../images/498208_1_En_1_Chapter/498208_1_En_1_Fig2_HTML.jpg](img/498208_1_En_1_Fig2_HTML.jpg)


    图 1-2


    文档-词项矩阵


    一旦句子或文本片段被转换为数字向量，我们就可以将这些向量值作为特征用于进一步的下游任务，例如问答系统、文本摘要等。此方法存在以下局限性。


    - 句子的向量表示长度会随着词汇表大小的增加而增加。这增加了下游任务的计算量，同时也增加了句子的维度。

    - 它无法根据单词在文本中的上下文来识别具有相似含义的不同单词。


    还有其他方法可以减少将句子表示为向量形式所需的计算量和内存需求。词嵌入是一种方法，我们可以在保留单词语义含义的同时，在低维空间中表示单词。我们稍后将详细探讨词嵌入如何成为下游
    `NLP` 任务的一个重大突破。


    ## 结论


    本章讨论了 `NLP` 的基础知识，以及一些基本的 `NLP` 任务，例如分词、词干提取等。在下一章中，我们将讨论 `NLP` 领域的神经网络。


    # 2. 自然语言处理的神经网络


    将人类的认知智能（即思考、推理和行动）赋予人工系统一直是研究人员的热门话题。在这个过程中，他们提出了神经网络的概念，试图模拟人脑神经元的工作方式。尽管它们距离人类的认知能力还很遥远，但人工神经网络在
    `ML` 领域占据着非常有前景的地位，并彻底改变了 `NLP` 应用的开发方式。


    在本章中，我们将讨论神经网络及其类型，以及一些特殊类型的神经网络，例如长短期记忆网络（`LSTM`）、卷积神经网络（`CNN`）、编码器、解码器和 Transformer。这将为我们进入更高级的
    `NLP` 主题奠定基础，并探讨当前最先进的 `NLP` 技术如何在 `NLU` 方面力求达到人类水平。


    ## 什么是神经网络？


    神经网络被定义为一个由神经元组成的网络，这些神经元相互连接以处理信息并执行特定于任务的操作。简单来说，人类神经元在突触末端接收到电信号时，能够传输和处理信息。人工神经网络（`ANN`）通过在被激活函数触发后跨网络传输信息来复制这种信息流。`ANN`
    分为三种类型的层：输入层、隐藏层和输出层。神经网络通常有一个输入层、一个输出层和多个隐藏层，如图 2-1 所示。


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig1_HTML.png](img/498208_1_En_2_Fig1_HTML.png)


    图 2-1


    神经网络


    ## 神经网络的构建模块


    在本节中，我们将讨论神经网络的基本构建模块，以及如何将这些模块组合起来形成一个神经网络。


    ### 神经元


    神经元是神经网络的最小单元，它模仿人类神经元的行为。它接收输入，进行处理，并将输出发送给其他神经元，作为其他神经元的激活信号。一个神经元只能根据从前一层接收到的观测结果被激活。


    ### 输入层


    如图 2-1 所示，输入层接收处理后的数据作为输入。这里的输入可以是图像的像素，也可以是文本数据中句子向量表示的数值或特征值。该层负责将所有特征值与一些权重值（权重值定义了每个特征的重要性）相结合。处理完成后，输入层的输出被馈送到下一层（隐藏层），最后到达输出层。

    '
- fmt: '### Hidden Layers


    These layers are responsible for generation of features that are specific to a
    task. We can have any number of hidden layers between the input and output layer.
    Each layer consists of neurons that are responsible for performing actions specific
    to the task. This layer might either implement an activation function (i.e., `Sigmoid`,
    `tanh`), or can just do a weighted summation of all inputs from the previous layer.
    This layer therefore receives the input from previous layer and then performs
    a sum of the products of inputs with their corresponding weight value and applies
    an activation function to get output from this hidden layer. This information
    is then passed to the next hidden layer or output layer.


    ### Output Layer


    The output layer is the last layer in a neural network. It is responsible for
    gathering all information from the last hidden layer to output the final expected
    results. If you are working on classification model, then the last layer should
    have a number of nodes equal to number of classes or a single node in the case
    of a regression problem.


    There has always been an open question of how we decide on the number of nodes
    in layers and nodes on each of the layers. There are no strict guidelines, but
    there are some recommendations you should consider while designing the a neural
    network architecture.


    *   Number of nodes in the input layer must be equal to the size of your input
    data point.

    *   Number of nodes in the output layer depends on the task the neural network
    is performing. As an example, for a classification task, the number of nodes should
    be equal to the number of classes and for regression it should be only one node.

    *   Number of hidden layers and nodes in each hidden layer is completely dependent
    on your target task. It is quite possible that one neural network will work perfectly
    for Task A but not for Task B.

    *   List all intermediate transformations you want to perform between the input
    and output layers.

    *   Number of nodes in a hidden layer should be greater than the number of nodes
    in the input and output layers.

    *   Number of nodes in the hidden layer should be a power of 2 (i.e., 2, 4, 8,
    16, 32, etc.).


    As an example, if you are building a sentiment model (or classification model)
    where the system will identify the sentiment of a user’s feedback as positive,
    negative, or neutral, then the result from the output layer of the neural network
    is probability distribution across all classes (positive, negative, and neutral),
    as shown in Figure [2-2](#498208_1_En_2_Chapter.xhtml#Fig2).


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig2_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Neural network


    ### Activation Function


    Neural networks are used to solve complex nonlinear problems, which is not feasible
    with traditional linear models. The activation function in a neural network is
    the one that introduces nonlinearity in the system, as shown in Figure [2-3](#498208_1_En_2_Chapter.xhtml#Fig3).


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig3_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Activation function


    It calculates the sum of product of input and their corresponding weights followed
    by the addition of bias. The activation function then decides on which feature
    or input value to pass on to the next layer. As an example, say we use a `Sigmoid`
    function at all nodes of a hidden layer where `Sigmoid` can take any values between
    0 and 1 inclusive. On the basis of this, the activation function then decides
    on what proportion of information from this and the previous layer should be passed
    to the next layer. `Tanh` and `ReLU` are the other important examples of activation
    functions in neural network.


    To this point, we have discussed the building blocks of neural networks. Next,
    we turn to the training of neural networks.


    ## Neural Network Training


    Neural network training is based on the concept of forward and backward propagation.
    In forward propagation, input data travels from neurons in the input layer to
    neurons in a hidden layer, followed by the application of relevant transformations
    using activation functions, and then finally to the neurons of the output layer
    to calculate the prediction value. In backward propagation, loss is calculated
    by comparing the actual and predicted value of input data. This error travels
    from neurons of the output layer to all neurons of the hidden layers. It is quite
    possible that neurons in the hidden layer receive only a fraction of an error
    component depending on their contribution to the neurons in the output layer.


    When we talk about propagation of information either forward or backward it means
    the weights of edges connecting these neurons and values of these biases to neurons
    will be adjusted. Also, values of weights and biases are initialized randomly
    and the learning process finds optimal values of these model parameters accordingly.


    ## Types of Neural Networks


    Now that we understand how each of the neurons, weights, and activation functions
    together build a neural network, we can examine how each of these can be used
    in a different ways to achieve different results. Next we discuss a few types
    of neural networks.


    ### Feed-Forward Neural Networks


    Feed-forward neural networks (FNNs) can be best described as a unidirectional
    neural networks that do not have any feedback or loopback in their structure.
    The architecture of an FNN includes a number of hidden layers and a number of
    hidden units in each layer, as shown in Figure [2-4](#498208_1_En_2_Chapter.xhtml#Fig4).


    One of the reasons that this neural network is termed a feed-forward network is
    that there is no feedback between the layers during normal operations when the
    FNN acts as a classifier.


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig4_HTML.jpg](images/498208_1_En_2_Chapter/498208_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Basic FNN perceptron diagram


    In an FNN, the perceptrons are arranged in layers. The first layer is responsible
    for taking in the input and the last layer produces the output. Because the middle
    layers do not have any connection with the external world, they are referred to
    as the hidden layers. The information is fed forward from one layer to the next
    as the perceptron in one layer is connected to every perceptron in the next layer.
    The perceptrons in the same layer, on the other hand, are not connected.


    The FNN model uses a cost function during training. This cost function works on
    the difference between the approximation made by the model and the actual target
    value. Similar to ML algorithms, FNNs also use gradient-based learning for training
    purposes. The possible choices of cost function include quadratic cost, cross-entropy
    cost, exponential cost, and so on.


    The output layer contains output units whose task is to provide the desired output
    or prediction. Both the choice of cost function and output units are tightly coupled
    together. There are various options for output units like linear units, sigmoid
    units, softmax units, and more.


    FNNs are susceptible to noise in data and are easy to maintain, so they can have
    a huge scope of applications in fields like computer vision. FNNs can help in
    bringing out nonlinear relations between the input and output, so most of the
    multiclassification can be easily represented with the help of these networks.'
