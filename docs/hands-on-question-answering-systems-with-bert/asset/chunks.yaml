  trans: '

    ### 文本处理


    `BERT`模型有一套特定的规则来表示输入文本。这同样有助于模型更好地运行。如果我们深入研究嵌入，`BERT`中的输入嵌入是以下三种嵌入类型的组合。


    -   **位置嵌入：** 位置嵌入用于学习嵌入中的顺序信息。由于 Transformer 模型会丢失与顺序相关的信息，因此使用位置嵌入来恢复它。对于输入序列中的每个位置，`BERT`都会学习一个独特的位置嵌入。借助这些位置嵌入，`BERT`能够表达单词在句子中的位置，因为它捕获了这种序列或顺序信息。

    -   **段落嵌入：** `BERT`还会为第一句和第二句学习独特的嵌入，以帮助模型区分它们。它也可以将句子对作为输入，用于问答等任务。

    -   **词元嵌入：** 对于`WordPiece`词元词汇表中的每个词元，都会学习词元嵌入。`WordPiece`词元词汇表包含语料库中单词的子词。例如，对于单词“Question”，该词汇集将包含“Question”的所有可能子词，例如[`“Questio”`，
    `“Questi”`…]等等。


    图 4-1 展示了`BERT`中嵌入序列的一个示例。


    ![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig1_HTML.jpg](img/498208_1_En_4_Fig1_HTML.jpg)


    图 4-1


    BERT 嵌入


    给定词元的输入表示是通过对词元嵌入、段落嵌入和位置嵌入求和来构建的。这使得它成为一个全面的嵌入方案，为模型包含大量有用信息。


    对于一个任务是预测句子中下一个单词的 NLP 任务，如果我们采用单向方法，它会有一些局限性。然而，`BERT`提供了两种学习上下文信息的策略：`MLM`和`NSP`。在`BERT`的训练过程中，这两个任务会一起训练。当使用这两种策略时，模型会试图实现最小化组合损失函数的目标。


    ### 掩码语言建模


    `BERT`是一个深度双向模型，比从左到右模型或从左到右和从右到左模型的浅层拼接更强大。`BERT`网络可以有效地从词元的右侧和左侧上下文中捕获信息。这从第一层开始，一直贯穿到最后一层。以前，语言模型是在从左到右的上下文中训练的，这使得它们容易信息不足。尽管`ELMo`模型通过浅层拼接两个
    LSTM 语言模型极大地改进了现有技术，但这还不够。`BERT`已被证明比现有技术更重要，其中`MLM`起着关键作用。


    在掩码语言任务中，文本中的一些单词会被随机掩码。`[MASK]`词元周围的上下文单词用于预测`[MASK]`单词。当单词序列被输入`BERT`时，每个序列中
    15%的单词会被替换为`[MASK]`词元。这 15%的单词是随机选择的。其中，80%被掩码，10%被替换为随机单词，10%保持不变。这样做是因为如果 100%的掩码单词都被使用，那么模型不一定能为非掩码单词产生良好的词元表示。模型性能得到了提升，因为防止了过度关注特定位置或词元。基于序列中非掩码单词提供的上下文，模型试图预测掩码单词的原始值。


    使用`BERT`生成词嵌入需要遵循以下过程：


    -   在编码器输出之上添加一个分类层。

    -   将输出向量与嵌入矩阵相乘，从而将它们转换为词汇维度。

    -   使用`softmax`计算词汇表中每个单词的概率。


    `BERT`中的损失函数只考虑掩码值的预测；非掩码单词的预测被忽略。这使得模型收敛速度比单向模型慢。例如，对于句子“The birds are flying
    in the clear blue sky”，如果我们训练双向模型，而不是预测序列中的下一个单词，可以构建一个模型来预测序列本身中缺失的单词。现在，考虑一个词元“flying”并将其掩码，使其被视为缺失。现在需要以这样一种方式训练模型，使其能够预测句子“The
    birds are `[MASK]` in the clear blue sky”中这个缺失或掩码词元的值。这就是`MLM`的本质，它使模型能够理解句子中单词之间的关系。


    ### 下一句预测


    `NSP`任务类似于句子中的下一个单词预测。`NSP`预测文档中的下一个句子，而后者则用于预测句子中缺失的单词。`BERT`也在`NSP`任务上进行了训练。这是必需的，以便我们的模型能够理解文本语料库中不同句子之间的相互关系。在`BERT`模型的训练过程中，句子对被作为输入。然后它预测这对句子中的第二个句子是否是原始文档中的后续句子。为了实现这一点，50%的输入被设置为第二个句子是原始文档中的后续句子，而另外
    50%则由第二个句子从文档中随机选择的句子对组成。假设随机选择的第二个句子与第一个句子无关。


    例如，考虑句子 A 和句子 B 的两个不同训练数据实例：


    ```

    实例 1

    句子 A – I saw a bird flying in the sky.

    句子 B – It was a blue sparrow.

    标签 – IsNextSentence

    实例 2

    句子 A – I saw a bird flying in the sky.

    句子 B – The dog is barking.

    标签 – NotNextSentence

    ```


    正如我们所见，对于实例 1，句子 B 在逻辑上是句子 A 的后续，但对于实例 2 则不然，这从标签`IsNextSentence`和`NotNextSentence`中分别可以清楚地看出。


    这些输入甚至在训练过程开始之前就被处理，以区分两个句子。过程概述如下。


    1.  在句子对中插入两个词元。一个词元`[CLS]`插入在第一个句子的开头，另一个词元`[SEP]`插入在每个句子的末尾。这两个句子都被分词，并通过分隔词元彼此分开，然后作为单个输入序列输入模型。

    2.  对于每个词元句子，添加一个嵌入，指示它是句子 A 还是句子 B。这些句子嵌入在概念上基本类似于词汇量为 2 的词元嵌入。

    3.  除了句子嵌入之外，还为每个词元添加位置嵌入，这有助于指示词元在序列中的位置。


    现在，执行以下步骤来预测第二个句子是否确实与第一个句子相关联。


    1.  整个输入序列通过 Transformer 模型。

    2.  借助简单的分类层，`[CLS]`词元的输出被转换为一个 2X1 形状的向量。

    3.  从而，借助`softmax`计算`IsNextSentence`的概率。


    众所周知，`BERT`用于各种 NLP 任务，例如文档摘要、问答系统、文档或句子分类等。现在，让我们看看`BERT`如何用于句子分类。

    '
- fmt: "# Text Classification Using BERT\n\nBERT can be used for a variety of language\
    \ tasks. A small layer added to the core model allows use of BERT for tasks like\
    \ classification, question answering, named entity recognition, and so on. The\
    \ BERT model is fine tuned for this purpose. For classification tasks, a classification\
    \ layer is added on top of the transformer output for the `[CLS]` token, similar\
    \ to NSP. Most of the hyperparameters stay the same as in BERT training, but some\
    \ of them require tuning to achieve state-of-the art-results for text classification\
    \ tasks. Figure [4-2](#498208_1_En_4_Chapter.xhtml#Fig2) gives an example of determining\
    \ whether a given tweet is hate speech or not.\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig2_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2\n\nAn example of classification using BERT\n\nSimilar types of tasks\
    \ such as such as document classification, sentiment analytics, and so on, can\
    \ also be achieved using BERT.\n\nNext, we will see how a pretrained model of\
    \ text classification can be configured in your system. Follow the steps listed\
    \ here to configure or install the necessary prerequisites.\n\n1. Make sure Python\
    \ is installed on your system. Open a command prompt and run the following command\
    \ to determine if Python is installed, as shown in Figure [4-3](#498208_1_En_4_Chapter.xhtml#Fig3).\n\
    \n`Python`\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig3_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3\n\nPython console\n\nThis will start the Python console at the command\
    \ prompt. If Python is not installed on your system, download and install Python\
    \ as per your operating system using this link: [`https://www.python.org/downloads/`](https://www.python.org/downloads/)\n\
    \n2. Next, install Jupyter Notebook. Open a command prompt and run the following\
    \ command.\n\n1. Open a command prompt and run the following command to run Jupyter\
    \ Notebook.\n\n```\njupyter notebook\n```\n\nThe notebook will start in your default\
    \ browser with localhost as the host address and port number as 8888, along with\
    \ a unique token ID, as shown in Figure [4-4](#498208_1_En_4_Chapter.xhtml#Fig4).\n\
    \n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig4_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4\n\nJupyter Notebook console\n\n2. You can also use Google Colab Notebook\
    \ for the same purpose. It provides a fast and free environment to run your Python\
    \ code in case your system doesn’t have sufficient resources available. You can\
    \ also use the graphics processing units (GPUs) and Tensor Processing Units (TPUs)\
    \ for free, but for a limited time (12 hours) in Google Colab. You just need a\
    \ Google account to log in to Google Colab Notebook. For this book, we will be\
    \ using Google Colab Notebook to demonstrate text classification using BERT. Log\
    \ in to your Google account and click [`https://colab.research.google.com`](https://colab.research.google.com).\
    \ You will see the screen shown in Figure [4-5](#498208_1_En_4_Chapter.xhtml#Fig5).\n\
    \n```\npip install notebook\n```\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig5_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5\n\nGoogle Colab interface to create or import a notebook\n\n1. To\
    \ create a new Colab notebook, click New Notebook in the bottom right corner as\
    \ shown in Figure [4-5](#498208_1_En_4_Chapter.xhtml#Fig5).\n\n2. Install TensorFlow.\
    \ Run the following command in your Jupyter Notebook or Colab Notebook.\n\n```\n\
    pip install tensorflow\n```\n\nWe have now installed all prerequisites for this\
    \ exercise. Please follow the steps listed next to configure a pretrained model\
    \ for text classification using BERT.\n\n1. BERT model files and required code\
    \ can be downloaded from the GitHub repository. Open the command prompt and clone\
    \ the GitHub repository (i.e., `https://github.com/google-research/bert.git`)\
    \ onto the system by typing the following command:\n\n```\ngit clone https://github.com/google-research/bert.git\n\
    ```\n\n2. Downloaded model files containing the weights and other necessary BERT\
    \ files. Depending on your requirements, a BERT pretrained model needs to be selected\
    \ from this list.\n   * BERT Base, Uncased\n   * BERT Large, Uncased\n   * BERT\
    \ Base, Cased\n   * BERT Large, Cased\n\n3. If you have an access to a cloud TPU,\
    \ BERT Large can be used; otherwise, the BERT Base model should be used. Further\
    \ selection can be made from the cased and uncased models.\n\n4. The data for\
    \ fine-tuning the BERT model are expected to be in the format that BERT understands.\
    \ Data have to be divided into three parts: train, dev, and test. As a rule of\
    \ thumb, train should contain 80% of data and the remaining 20% will be divided\
    \ into dev and test. You need to make a folder containing three separate files:\
    \ `train.tsv`, `dev.tsv`, and `test.tsv`. The `train.tsv` file will be used for\
    \ training the model, `dev.tsv` will be used for developing the system, and `test.csv`\
    \ will be used for evaluating model performance over unseen data. Both `train.tsv`\
    \ and `dev.tsv` should not have headers and should have four columns as shown\
    \ below.\n\n```\n1          1         a         text example belonging to class\
    \ 1\n2          1         a          text example belonging to class 1\n3          2         a          text\
    \ example belonging to class 2\n4          0         a          text example belonging\
    \ to class 0\n```\n\nHere are details of the columns used.\n   * **First Column**:\
    \ Represents IDs of sample.\n   * **Second Column**: Classification labels corresponding\
    \ to examples.\n   * **Third Column**: Throw-away column.\n   * **Fourth Column**:\
    \ This represents the actual textual sentence that needs to be classified.\n\n\
    5. The `test.tsv` file should have a header line, unlike the other two files,\
    \ and should appear as shown here.\n\n```\nid sentence\n1. first test example\n\
    2. second test example\n3. third test example\n```\n\n6. To train the model, you\
    \ need to navigate to the directory into which the model has been cloned. Afterward,\
    \ enter the following command at the command prompt:\n\n```\npython bert/run_classifier.py\
    \ \\\n--task_name=cola \\\n--do_train=true \\\n--do_eval=true \\\n--data_dir=./data\
    \ \\\n--vocab_file=$BERT_BASE_DIR/vocab.txt \\\n--bert_config_file=$BERT_BASE_DIR/bert_config.json\
    \ \\\n--init_checkpoint=$BERT_BASE_DIR/bert_model.ckpt \\\n--max_seq_length=128\
    \ \\\n--train_batch_size=32 \\\n--learning_rate=2e-5 \\\n--num_train_epochs=3.0\
    \ \\\n--output_dir=./bert_output/\n```\n\nIf length of your training data text\
    \ is longer than 128 words then the value for `max_seq_length` can be increased\
    \ to 512. If you are training the model over a CPU system, then you can reduce\
    \ the training size to avoid an out-of-memory error.\n\nWhen the training is finished,\
    \ the reports get stored in the `bert_output` directory.\n\n7. This trained BERT\
    \ model is now ready to use for prediction purposes. If we have to make a prediction\
    \ for new data, then data need to be stored in `test.tsv`. Go to the directory\
    \ where the trained model files have been stored. Please refer to the highest-number\
    \ (latest model file) `model.ckpt` file seen in the `bert_output` directory. These\
    \ files contain the weights of the model trained. Now run the following commands\
    \ at the command prompt to obtain the classification result, which will be stored\
    \ in `test_results.tsv` in the `bert_output` directory location.\n\n```\npython\
    \ bert/run_classifier.py \\\n--task_name=cola \\\n--do_predict=true \\\n--data_dir=./data\
    \ \\\n--vocab_file=$BERT_BASE_DIR/vocab.txt \\\n--bert_config_file=$BERT_BASE_DIR/bert_config.json\
    \ \\\n--init_checkpoint=$TRAINED_CLASSIFIER \\\n--max_seq_length=128 \\\n--output_dir=./bert_output/\n\
    ```\n\nPlease note that the value for the `max_seq_length` parameters should be\
    \ the same as what was used during the training process."
  raw: "## Text Classification Using BERT\n\nBERT can be used for a variety of language\
    \ tasks. A small layer added to the core model allows use of BERT for tasks like\
    \ classification, question answering, named entity recognition, and so on. The\
    \ BERT model is fine tuned for this purpose. For classification tasks, a classification\
    \ layer is added on top of the transformer output for the [CLS] token, similar\
    \ to NSP. Most of the hyperparameters stay the same as in BERT training, but some\
    \ of them require tuning to achieve state-of-the art-results for text classification\
    \ tasks. Figure [4-2](#498208_1_En_4_Chapter.xhtml#Fig2) gives an example of determining\
    \ whether a given tweet is hate speech or not.\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig2_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2\n\nAn example of classification using BERT\n\nSimilar types of tasks\
    \ such as such as document classification, sentiment analytics, and so on, can\
    \ also be achieved using BERT.\n\nNext, we will see how a pretrained model of\
    \ text classification can be configured in your system. Follow the steps listed\
    \ here to configure or install the necessary prerequisites.\n\n1.  Make sure Python\
    \ is installed on your system. Open a command prompt and run the following command\
