  trans: '

    ### 来自 Transformers 的双向编码器表示


    `来自 Transformers 的双向编码器表示`（`BERT`）由谷歌的研究人员提出。用于语言建模的双向 Transformer 使得 `BERT` 在多种
    `NLP` 任务以及问答系统中广受欢迎。这使其与以往仅按单一方向（从左到右或从右到左）处理序列的模型有所不同。


    双向编码器接收两个序列进行编码，其中一个为正常序列，另一个为其逆序序列。它包含两个编码器，分别用于编码这两个序列。最终输出会综合考虑两个编码结果。语言模型的双向训练使其能够更深入地理解语言上下文。这对于理解文本含义至关重要，如图
    3-7 所示。


    例如，考虑以下两个句子：


    - 句子 1：看到一只`蝙蝠`在我房间里飞，我吓坏了。

    - 句子 2：球员在击球时牢牢握住了`球棒`。


    在这里，单词“bat”根据语言上下文在两个句子中具有不同的含义。如果我们从两个方向来处理句子，就能更好地理解这一点。如果只朝一个方向移动，我们可能会错过有用信息，并且可能无法正确获取其含义。`BERT`
    同时考虑了前文和后文语境，这降低了在进行任何预测之前出错的可能性。在训练过程中，信息从两个方向收集，并且所有层都共同基于两个方向的上下文进行条件处理。


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig7_HTML.jpg](img/498208_1_En_3_Fig7_HTML.jpg)


    图 3-7


    `BERT` 架构


    预训练的 `BERT` 模型只需修改输出层，即可用于各种最先进的任务。它不需要针对特定任务进行架构更改。它利用 Transformer 来理解文本中标记或单词之间的关系。Transformer
    包含一个编码器和一个解码器。编码器读取输入文本，解码器则有助于为任务生成预测。Transformer 编码器能够一次性读取整个单词序列，而不是从左到右顺序读取。这使得模型具有双向性，并允许它从单词或标记的左侧和右侧学习其上下文。输入到
    Transformer 的标记序列被嵌入到向量中，然后这些向量在神经网络中进一步处理。网络的输出是一个与输入标记相对应的向量序列，如图 3-8 所示。


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig8_HTML.jpg](img/498208_1_En_3_Fig8_HTML.jpg)


    图 3-8


    `BERT` Transformer


    `BERT` 使用两种策略来克服单向限制。`BERT` 在这两个 `NLP` 任务上进行预训练：掩码语言建模（`MLM`）和下一句预测（`NSP`）。`MLM`
    通过从输入文本中随机掩码标记来协助预训练双向 Transformer，而 `NSP` 任务则联合预训练文本对表示。在训练期间，`BERT` 最小化这两个任务的组合损失函数。


    要使用 `BERT`，需要遵循两个阶段：


    1.  **预训练：** 在此步骤中，模型在不同预训练任务上使用未标记数据进行训练。

    2.  **微调：** `BERT` 模型使用预训练参数进行初始化，然后使用来自下游任务（可能是分类、问答等）的数据进行微调。


    `BERT` 模型有两种实现方式：`BERT` 基础模型和 `BERT` 大型模型。


    #### BERT 基础模型


    `BERT` 基础模型是一个预训练的 `BERT` 模型，具有 12 层或 Transformer 块，每层有 768 个隐藏单元，以及 1.1 亿个参数。根据其训练的英文文本（区分大小写或不区分大小写），它可以进一步分类为
    `BERT` base-cased 和 `BERT` base-uncased，如图 3-9 所示。


    ![../images/498208_1_En_3_Chapter/498208_1_En_3_Fig9_HTML.jpg](img/498208_1_En_3_Fig9_HTML.jpg)


    图 3-9


    `BERT` 基础模型和 `BERT` 大型模型


    #### BERT 大型模型


    `BERT` 大型模型是一个预训练的 `BERT` 模型，具有 24 层或 Transformer 块，每层有 1,024 个隐藏单元，以及 3.4 亿个参数。它也可以进一步分类为
    `BERT` large-cased 和 `BERT` large-uncased。该模型所需的内存明显多于 `BERT` 基础模型。


    ## 结论


    本章涵盖了词嵌入、句子嵌入及其不同的实现方法，例如 `Word2vec`、`GloVe`、`通用句子编码器`等。我们还讨论了 `BERT` 及其变体（即基础模型和大型模型）。在下一章中，我们将更深入地探讨
    `BERT` 及其不同的实现。


    # 4. BERT 算法详解


    本章深入探讨用于句子嵌入的 `BERT` 算法，以及各种训练策略，包括 `MLM` 和 `NSP`。我们还将看到一个使用 `BERT` 实现文本分类系统的示例。


    ## BERT 是如何工作的？


    `BERT` 利用 Transformer 来学习文本中单词之间的上下文关系。Transformer 有两种机制——编码器和解码器——但 `BERT` 只需要编码器机制。`BERT`
    采用双向方法并顺序读取文本输入，这使得模型能够根据单词周围的单词来学习其上下文。编码器的输入是一个标记序列，这些标记被嵌入到向量中。然后，这些向量被传递到神经网络中，并生成与输入相对应的输出向量序列。一个单词的输出向量取决于它出现的上下文。例如，句子“他喜欢打板球”中单词“like”的向量，与句子“他的脸像番茄一样红”中同一个单词的向量是不同的。


    这个过程甚至在开始模型构建阶段之前就涉及文本处理步骤。下一节将讨论 `BERT` 中使用的文本处理步骤。

    '
- fmt: '### Text Processing


    There is a specific set of rules for representing the input text for the `BERT`
    model. This, too, is responsible for better functioning of the model. If we look
    into the embeddings, the input embedding in `BERT` is a combination of the following
    three types of embeddings.


    - **Position embeddings:** Positional embeddings are used to learn the information
    of order in the embeddings. As in transformers the information related to order
    is missed, positional embeddings are used to recover it. For each of the positions
    in the input sequence, `BERT` learns a unique positional embedding. With the help
    of these positional embeddings, `BERT` is able to express the position of words
    in a sentence as it captures this sequence or order information.

    - **Segment embeddings:** `BERT` also learns unique embedding for the first and
    second sentences to help the model distinguish between them. It can also take
    sentence pairs as inputs for tasks like question answering.

    - **Token embeddings:** For every token in the `WordPiece` token vocabulary, token
    embeddings are learned. The `WordPiece` token vocabulary contains subwords of
    words in the corpus. As an example, for the word “Question,” this vocabulary set
    will include all possible subwords of “Question,” such as [`“Questio”`, `“Questi”`…],
    and so on.


    Figure [4-1](#498208_1_En_4_Chapter.xhtml#Fig1) shows an example of sequences
    of embeddings in `BERT`.


    ![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig1_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    BERT embeddings


    The input representation of a given token is constructed by summing the token,
    segment, and position embeddings. This makes it a comprehensive embedding scheme
    that contains a lot of useful information for the model.


    For an NLP task where the job is to predict next word in a sentence, if we go
    with a directional approach, it has some limitations. However, `BERT` provides
    two strategies to learn contextual information: `MLM` and `NSP`. During training
    in `BERT`, both of these tasks will be trained together. When using these two
    strategies, the model tries to achieve the goal of minimizing the combined loss
    function.


    ### Masked Language Modeling


    `BERT` is a deep bidirectional model that is more powerful than a left-to-right
    model or the shallow concatenation of a left-to-right and a right-to-left model.
    The `BERT` network can effectively capture information from both the right and
    left context of a token. This goes from the first layer itself and all the way
    through to the last layer. Previously, language models were trained on left-to-right
    context, which made them susceptible to information less. Even though the `ELMo`
    model greatly improved on the existing techniques using the shallow concatenating
    of the two LSTM language models, that wasn’t enough. `BERT` has proven to be more
    significant than the existing techniques where `MLM` plays a crucial role.


    In a masked language task, some of the words in text are randomly masked. The
    context words surrounding a `[MASK]` token are used to predict the `[MASK]` word.
    When word sequences are being fed into `BERT`, 15% of the words in each sequence
    are replaced with a `[MASK]` token. These 15% of words are randomly selected.
    Of these, 80% are masked, 10% are replaced with a random word, and 10% are retained.
    This is done because if 100% of the masked words were used then the model wouldn’t
    necessarily produce good token representations for nonmasked words. The model
    performance is improved, as too much focusing on a particular position or tokens
    has been prevented. On the basis of the context provided by the nonmasked words
    in the sequence, the model tries to predict the original value of the masked words.


    These processes that need to be followed for generation of word embedding using
    `BERT`:


    - Addition of a classification layer on top of the encoder output.

    - Multiplication of the output vectors by the embedding matrix, thus transforming
    them into the vocabulary dimension.

    - Calculation of the probability of each word in the vocabulary with `softmax`.


    The loss function in `BERT` only considers the prediction of the masked values;
    the prediction of the nonmasked words is ignored. This makes the model converge
    slower than directional ones. As an example, for the sentence “The birds are flying
    in the clear blue sky,” if we are training the bidirectional model instead of
    predicting the next word in the sequence, a model can be built to predict the
    missing word from within the sequence itself. Now, consider a token “flying” and
    mask it so that it can be considered missing. The model would now need to be trained
    in such a way that it can predict the value of this missing or masked token in
    the sentence “The birds are `[MASK]` in the clear blue sky.” This is the essence
    of `MLM`, which enables the model to understand the relationships between words
    in a sentence.


    ### Next Sentence Prediction


    The `NSP` task is similar to next word prediction in a sentence. `NSP` predicts
    the next sentence in document, whereas the latter works for prediction of missing
    words in a sentence. `BERT` is also trained on the `NSP` task. This is required
    so that our model is able to understand how different sentences in a text corpus
    are related to each other. During the training of the `BERT` model, the sentence
    pairs are taken as input. It then predicts if the second sentence in the pair
    is the subsequent sentence in the original document. To achieve this, 50% of inputs
    are taken such that the second sentence is the subsequent sentence as in the original
    document, whereas the other 50% comprises the pair where the second sentence is
    chosen randomly from the document. It is assumed that the random second sentence
    is disconnected from the first sentence.


    As an example, consider two different instances of training data for Sentence
    A and Sentence B:


    ```

    Instance 1

    Sentence A – I saw a bird flying in the sky.

    Sentence B – It was a blue sparrow.

    Label – IsNextSentence

    Instance 2

    Sentence A – I saw a bird flying in the sky.

    Sentence B – The dog is barking.

    Label – NotNextSentence

    ```


    As we can see, for Instance 1 Sentence B is logically subsequent to Sentence A,
    but the same is not true for Instance 2, which is quite clear from the labels
    `IsNextSentence` and `NotNextSentence`, respectively.


    These inputs are being processed even before the training process starts to differentiate
    between two sentences. The procedure is outlined here.


    1. Two tokens are inserted in a sentence pair. One of the tokens `[CLS]` is inserted
    at the beginning of the first sentence and other token `[SEP]` is inserted at
    the end of each sentence. The two sentences are both tokenized and separated from
    each other by the separation token and then fed as a single input sequence into
    the model.

    2. For each of the token sentences, embedding is added that indicates whether
    it is Sentence A or Sentence B. These sentence embeddings are basically similar
    in concept to token embeddings with a vocabulary of 2.

    3. Along with the sentence embeddings, positional embeddings are also added to
    each of the tokens, which helps to indicate the position of the token in the sequence.


    Now, the following steps are performed to predict if the second sentence is actually
    connected to the first.


    1. The whole input sequence is passed though the transformer model.

    2. With the help of the simple classification layer, the output of the `[CLS]`
    token is transformed into a 2X1 shaped vector.

    3. Thereby, the probability of `IsNextSentence` is computed with the help of `softmax`.


    As we know, `BERT` is used for variety of NLP tasks such as document summarization,
    question answering systems, document or sentence classification, and so on. Now,
    let’s see how `BERT` can be used for classification of sentences.'
  raw: '### Text Processing


    There is a specific set of rules for representing the input text for the BERT
    model. This, too, is responsible for better functioning of the model. If we look
    into the embeddings, the input embedding in BERT is a combination of the following
    three types of embeddings.


    *   **Position embeddings** **:** Positional embeddings are used to learn the
    information of order in the embeddings. As in transformers the information related
    to order is missed, positional embeddings are used to recover it. For each of
    the positions in the input sequence, BERT learns a unique positional embedding.
    With the help of these positional embeddings, BERT is able to express the position
    of words in a sentence as it captures this sequence or order information.


    *   **Segment embeddings** **:** BERT also learns unique embedding for the first
    and second sentences to help the model distinguish between them. It can also take
    sentence pairs as inputs for tasks like question answering.


    *   **Token embeddings** **:** For every token in the WordPiece token vocabulary,
    token embeddings are learned. The WordPiece token vocabulary contains subwords
    of words in the corpus. As an example, for the word “Question,” this vocabulary
    set will include all possible subwords of “Question,” such as [“Questio”, “Questi”…],
    and so on.


    Figure [4-1](#498208_1_En_4_Chapter.xhtml#Fig1) shows an example of sequences
    of embeddings in BERT.


    ![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig1_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    BERT embeddings


    The input representation of a given token is constructed by summing the token,
    segment, and position embeddings. This makes it a comprehensive embedding scheme
    that contains a lot of useful information for the model.


    For an NLP task where the job is to predict next word in a sentence, if we go
    with a directional approach, it has some limitations. However, BERT provides two
    strategies to learn contextual information: MLM and NSP. During training in BERT,
    both of these tasks will be trained together. When using these two strategies,
    the model tries to achieve the goal of minimizing the combined loss function.


    ### Masked Language Modeling


    BERT is a deep bidirectional model that is more powerful than a left-to-right
    model or the shallow concatenation of a left-to-right and a right-to-left model.
    The BERT network can effectively capture information from both the right and left
    context of a token. This goes from the first layer itself and all the way through
    to the last layer. Previously, language models were trained on left-to-right context,
    which made them susceptible to information less. Even though the ELMo model greatly
    improved on the existing techniques using the shallow concatenating of the two
    LSTM language models, that wasn’t enough. BERT has proven to be more significant
    than the existing techniques where MLM plays a crucial role.


    In a masked language task, some of the words in text are randomly masked. The
    context words surrounding a [MASK] token are used to predict the [MASK] word.
    When word sequences are being fed into BERT, 15% of the words in each sequence
    are replaced with a [MASK] token. These 15% of words are randomly selected. Of
    these, 80% are masked, 10% are replaced with a random word, and 10% are retained.
    This is done because if 100% of the masked words were used then the model wouldn’t
    necessarily produce good token representations for nonmasked words. The model
    performance is improved, as too much focusing on a particular position or tokens
    has been prevented. On the basis of the context provided by the nonmasked words
    in the sequence, the model tries to predict the original value of the masked words.


    These processes that need to be followed for generation of word embedding using
    BERT:


    *   Addition of a classification layer on top of the encoder output.


    *   Multiplication of the output vectors by the embedding matrix, thus transforming
    them into the vocabulary dimension.


    *   Calculation of the probability of each word in the vocabulary with softmax.


    The loss function in BERT only considers the prediction of the masked values;
    the prediction of the nonmasked words is ignored. This makes the model converge
    slower than directional ones. As an example, for the sentence “The birds are flying
    in the clear blue sky,” if we are training the bidirectional model instead of
    predicting the next word in the sequence, a model can be built to predict the
    missing word from within the sequence itself. Now, consider a token “flying” and
    mask it so that it can be considered missing. The model would now need to be trained
    in such a way that it can predict the value of this missing or masked token in
    the sentence “The birds are [MASK] in the clear blue sky.” This is the essence
    of MLM, which enables the model to understand the relationships between words
    in a sentence .


    ### Next Sentence Prediction


    The NSP task is similar to next word prediction in a sentence. NSP predicts the
    next sentence in document, whereas the latter works for prediction of missing
    words in a sentence. BERT is also trained on the NSP task. This is required so
    that our model is able to understand how different sentences in a text corpus
    are related to each other. During the training of the BERT model, the sentence
    pairs are taken as input. It then predicts if the second sentence in the pair
    is the subsequent sentence in the original document. To achieve this, 50% of inputs
    are taken such that the second sentence is the subsequent sentence as in the original
    document, whereas the other 50% comprises the pair where the second sentence is
    chosen randomly from the document. It is assumed that the random second sentence
    is disconnected from the first sentence.


    As an example, consider two different instances of training data for Sentence
    A and Sentence B:


    ```

    Instance 1

    Sentence A – I saw a bird flying in the sky.

    Sentence B – It was a blue sparrow.

    Label – IsNextSentence

    Instance 2

    Sentence A – I saw a bird flying in the sky.

    Sentence B – The dog is barking.

    Label – NotNextSentence

    ```


    As we can see, for Instance 1 Sentence B is logically subsequent to Sentence A,
    but the same is not true for Instance 2, which is quite clear from the labels
    `IsNextSentence` and `NotNextSentence`, respectively.


    These inputs are being processed even before the training process starts to differentiate
    between two sentences. The procedure is outlined here .


    1.  Two tokens are inserted in a sentence pair. One of the tokens [CLS] is inserted
    at the beginning of the first sentence and other token [SEP] is inserted at the
    end of each sentence. The two sentences are both tokenized and separated from
    each other by the separation token and then fed as a single input sequence into
    the model.


    2.  For each of the token sentences, embedding is added that indicates whether
    it is Sentence A or Sentence B. These sentence embeddings are basically similar
    in concept to token embeddings with a vocabulary of 2.


    3.  Along with the sentence embeddings, positional embeddings are also added to
    each of the tokens, which helps to indicate the position of the token in the sequence.


    Now, the following steps are performed to predict if the second sentence is actually
    connected to the first.


    1.  The whole input sequence is passed though the transformer model.


    2.  With the help of the simple classification layer, the output of the [CLS]
    token is transformed into a 2X1 shaped vector.


    3.  Thereby, the probability of `IsNextSentence` is computed with the help of
    softmax.


    As we know , BERT is used for variety of NLP tasks such as document summarization,
