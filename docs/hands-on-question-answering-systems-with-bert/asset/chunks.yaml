    Now that we have seen how an entity recognition system based on BERT can be used
    for research purposes, we next consider a scenario where we need to deploy this
    feature to be consumed by a conversation system. A conversation system generally
    uses entities to configure or develop use cases. As an example, for use case “Facing
    an issue with Outlook,” this system can be used to identify “Outlook” as an entity.
    In this case, you need to release or expose the features of the entity recognition
    system as a REST API using the following steps.


    1.  Create a file with named `NamedEntityAPI`.


    2.  Copy the following code and paste in that file, then save it.


    1.  This code processes the input passed to an API, calls the `build_ner_model`
    function, and sends a response from this function as an API response.


    2.  Open a command prompt and run the following command.


    ```

    from flask import Flask, request

    import json

    from NamedEntityRecognition.NamedEntityRecognition import build_ner_model

    app=Flask(__name__)

    @app.route ("/namedEntity", methods=[''POST''])

    def namedEntity():

    try:

    json_data = request.get_json(force=True)

    query = json_data[''query'']

    ner_model = build_ner_model()

    model_output = ner_model([query])

    words= model_output[0][0]

    tags = model_output[1][0]

    result_json = dict()

    result_json[''query''] = query

    entities = []

    index = 0

    for word in words:

    word_tag_dict=dict()

    word_tag_dict[''word''] = word

    word_tag_dict[''tag''] = tags[index]

    index = index+1

    entities.append(word_tag_dict)

    result_json[''entities''] = entities

    result = json.dumps(result_json)

    return result

    except Exception as e:

    return {"Error": str(e)}

    if __name__ == "__main__" :

    app.run(port="5000")

    ```


    ```

    Python NamedEntiityAPI.py

    ```


