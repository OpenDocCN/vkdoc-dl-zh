    \n    --do_train=true \\\n    --do_eval=true \\\n    --data_dir=./data \\\n  \
    \  --vocab_file=$BERT_BASE_DIR/vocab.txt \\\n    --bert_config_file=$BERT_BASE_DIR/bert_config.json\
    \ \\\n    --init_checkpoint=$BERT_BASE_DIR/bert_model.ckpt \\\n    --max_seq_length=128\
    \ \\\n    --train_batch_size=32 \\\n    --learning_rate=2e-5 \\\n    --num_train_epochs=3.0\
    \ \\\n    --output_dir=./bert_output/\n    ```\n\nIf length of your training data\
    \ text is longer than 128 words then the value for `max_seq_length` can be increased\
    \ to 512\\. If you are training the model over a CPU system, then you can reduce\
    \ the training size to avoid an out-of-memory error.\n\nWhen the training is finished,\
    \ the reports get stored in the `bert_output` directory.\n\n3.  This trained BERT\
    \ model is now ready to use for prediction purposes. If we have to make a prediction\
    \ for new data, then data need to be stored in `test.tsv`. Go to the directory\
    \ where the trained model files have been stored. Please refer to the highest-number\
    \ (latest model file) `model.ckpt` file seen in the `bert_output` directory. These\
    \ files contain the weights of the model trained. Now run the following commands\
    \ at the command prompt to obtain the classification result, which will be stored\
    \ in `test_results.tsv` in the `bert_output` directory location.\n\n```\n    python\
    \ bert/run_classifier.py \\\n    --task_name=cola \\\n    --do_predict=true \\\
    \n    --data_dir=./data \\\n    --vocab_file=$BERT_BASE_DIR/vocab.txt \\\n   \
    \ --bert_config_file=$BERT_BASE_DIR/bert_config.json \\\n    --init_checkpoint=$TRAINED_CLASSIFIER\
    \ \\\n    --max_seq_length=128 \\\n    --output_dir=./bert_output/\n    ```\n\n\
    Please note that the value for the `max_seq_length` parameters should be the same\
    \ as what was used during the training process.\n\n1.  **First Column**: Represents\
    \ IDs of sample.\n\n2.  **Second Column**: Classification labels corresponding\
    \ to examples.\n\n3.  **Third Column**: Throw-away column.\n\n4.  **Fourth Column**:\
    \ This represents the actual textual sentence that needs to be classified."
  trans: "\n# 使用 BERT 进行文本分类\n\nBERT 可用于多种语言任务。在核心模型上添加一个小层，即可将 BERT 用于分类、问答、命名实体识别等任务。BERT\
    \ 模型会为此进行微调。对于分类任务，会在 `[CLS]` 标记的 Transformer 输出之上添加一个分类层，类似于 NSP（下一句预测）。大多数超参数与\
    \ BERT 训练时保持一致，但部分参数需要调整，才能在文本分类任务中达到最先进的结果。图 4-2 给出了一个判断给定推文是否为仇恨言论的示例。\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig2_HTML.jpg](img/498208_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2\n\n使用 BERT 进行分类的示例\n\n类似的任务，如文档分类、情感分析等，也可以使用 BERT 来实现。\n\n接下来，我们将了解如何在系统中配置一个预训练的文本分类模型。请按照以下步骤配置或安装必要的先决条件。\n\
    \n1.  确保你的系统已安装 Python。打开命令提示符并运行以下命令，以确定是否安装了 Python，如图 4-3 所示。\n\n`Python`\n\
    \n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig3_HTML.jpg](img/498208_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3\n\nPython 控制台\n\n这将在命令提示符下启动 Python 控制台。如果你的系统未安装 Python，请根据你的操作系统，通过此链接下载并安装\
    \ Python：[`https://www.python.org/downloads/`](https://www.python.org/downloads/)\n\
    \n2.  接下来，安装 Jupyter Notebook。打开命令提示符并运行以下命令。\n\n1.  打开命令提示符并运行以下命令来启动 Jupyter\
    \ Notebook。\n\n```\njupyter notebook\n```\n\nNotebook 将在你的默认浏览器中启动，主机地址为 localhost，端口号为\
    \ 8888，并附带一个唯一的令牌 ID，如图 4-4 所示。\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig4_HTML.jpg](img/498208_1_En_4_Fig4_HTML.jpg)\n\
    \n图 4-4\n\nJupyter Notebook 控制台\n\n2.  你也可以使用 Google Colab Notebook 达到相同目的。如果你的系统资源不足，它提供了一个快速且免费的环境来运行你的\
    \ Python 代码。你还可以在 Google Colab 中免费使用图形处理单元（GPU）和张量处理单元（TPU），但时间有限（12 小时）。你只需要一个\
    \ Google 帐户即可登录 Google Colab Notebook。本书将使用 Google Colab Notebook 来演示如何使用 BERT\
    \ 进行文本分类。登录你的 Google 帐户，然后点击 [`https://colab.research.google.com`](https://colab.research.google.com)。你将看到如图\
    \ 4-5 所示的界面。\n\n```\npip install notebook\n```\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig5_HTML.jpg](img/498208_1_En_4_Fig5_HTML.jpg)\n\
    \n图 4-5\n\n用于创建或导入 Notebook 的 Google Colab 界面\n\n1.  要创建新的 Colab Notebook，请点击右下角的“新建笔记本”，如图\
    \ 4-5 所示。\n\n2.  安装 TensorFlow。在你的 Jupyter Notebook 或 Colab Notebook 中运行以下命令。\n\
    \n```\npip install tensorflow\n```\n\n现在，我们已经安装了本练习的所有先决条件。请按照以下步骤配置一个使用 BERT\
    \ 进行文本分类的预训练模型。\n\n1.  BERT 模型文件和所需代码可以从 GitHub 仓库下载。打开命令提示符，通过输入以下命令将 GitHub\
    \ 仓库（即 `https://github.com/google-research/bert.git`）克隆到系统上：\n\n```\ngit clone\
    \ https://github.com/google-research/bert.git\n```\n\n2.  下载包含权重和其他必要 BERT 文件的模型文件。根据你的需求，需要从此列表中选择一个\
    \ BERT 预训练模型。\n    *   BERT Base, Uncased（基础版，未区分大小写）\n    *   BERT Large, Uncased（大型版，未区分大小写）\n\
    \    *   BERT Base, Cased（基础版，区分大小写）\n    *   BERT Large, Cased（大型版，区分大小写）\n\n\
    3.  如果你有权访问云 TPU，可以使用 BERT Large；否则，应使用 BERT Base 模型。可以进一步在区分大小写和未区分大小写的模型之间进行选择。\n\
    \n4.  用于微调 BERT 模型的数据需要采用 BERT 能够理解的格式。数据必须分为三部分：训练集（train）、开发集（dev）和测试集（test）。根据经验法则，训练集应包含\
    \ 80% 的数据，剩余的 20% 将分为开发集和测试集。你需要创建一个包含三个独立文件的文件夹：`train.tsv`、`dev.tsv` 和 `test.tsv`。`train.tsv`\
    \ 文件将用于训练模型，`dev.tsv` 将用于开发系统，`test.csv` 将用于评估模型在未见数据上的性能。`train.tsv` 和 `dev.tsv`\
    \ 都不应有标题行，并且应包含如下所示的四列。\n\n```\n1          1         a         属于类别 1 的文本示例\n\
    2          1         a         属于类别 1 的文本示例\n3          2         a         属于类别\
    \ 2 的文本示例\n4          0         a         属于类别 0 的文本示例\n```\n\n以下是所用列的详细信息。\n\
    \    *   **第一列**：表示样本的 ID。\n    *   **第二列**：与示例对应的分类标签。\n    *   **第三列**：可丢弃的列。\n\
    \    *   **第四列**：表示需要分类的实际文本句子。\n\n5.  `test.tsv` 文件应包含标题行（与其他两个文件不同），并且应如下所示。\n\
    \n```\nid sentence\n1. 第一个测试示例\n2. 第二个测试示例\n3. 第三个测试示例\n```\n\n6.  要训练模型，你需要导航到模型被克隆到的目录。然后，在命令提示符下输入以下命令：\n\
    \n```\npython bert/run_classifier.py \\\n--task_name=cola \\\n--do_train=true\
    \ \\\n--do_eval=true \\\n--data_dir=./data \\\n--vocab_file=$BERT_BASE_DIR/vocab.txt\
    \ \\\n--bert_config_file=$BERT_BASE_DIR/bert_config.json \\\n--init_checkpoint=$BERT_BASE_DIR/bert_model.ckpt\
    \ \\\n--max_seq_length=128 \\\n--train_batch_size=32 \\\n--learning_rate=2e-5\
    \ \\\n--num_train_epochs=3.0 \\\n--output_dir=./bert_output/\n```\n\n如果你的训练数据文本长度超过\
    \ 128 个词，则可以将 `max_seq_length` 的值增加到 512。如果你在 CPU 系统上训练模型，则可以减少训练规模以避免内存不足错误。\n\
    \n训练完成后，报告将存储在 `bert_output` 目录中。\n\n7.  这个训练好的 BERT 模型现在可以用于预测。如果需要对新的数据进行预测，则需要将数据存储在\
    \ `test.tsv` 中。进入存储训练模型文件的目录。请参考在 `bert_output` 目录中看到的编号最高（最新的模型文件）的 `model.ckpt`\
    \ 文件。这些文件包含训练好的模型权重。现在在命令提示符下运行以下命令以获取分类结果，该结果将存储在 `bert_output` 目录位置下的 `test_results.tsv`\
    \ 中。\n\n```\npython bert/run_classifier.py \\\n--task_name=cola \\\n--do_predict=true\
    \ \\\n--data_dir=./data \\\n--vocab_file=$BERT_BASE_DIR/vocab.txt \\\n--bert_config_file=$BERT_BASE_DIR/bert_config.json\
    \ \\\n--init_checkpoint=$TRAINED_CLASSIFIER \\\n--max_seq_length=128 \\\n--output_dir=./bert_output/\n\
    ```\n\n请注意，`max_seq_length` 参数的值应与训练过程中使用的值相同。\n"
- fmt: "# 问题分类与BERT模型实现\n\n本书将演示如何实现一个问题分类数据集，将问题分类到各自的类别中。问题主要分为两类：事实型（非描述性）问题和非事实型问题。例如，“What\
    \ is the temperature in Delhi?”是一个事实型问题，因为它基于某些事实寻找答案；“What is temperature?”是一个非事实型问题，因为它寻找关于温度的文本片段。关于此实现，请参考位于[`https://cogcomp.seas.upenn.edu/Data/QA/QC/`](https://cogcomp.seas.upenn.edu/Data/QA/QC/)的数据集。\n\
    \n现在我们将了解如何使用`BERT`实现问题分类系统。\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig11_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig11_HTML.jpg)\n\
    \n**图4-11** 预测结果快照\n\n1. 对于此实现，我们将按照之前所述从GitHub下载`BERT` base-cased模型。\n\n2. 问题分类数据集已采用训练`BERT`模型所需的格式。数据被分为`train.tsv`、`dev.tsv`和`test.tsv`集合。在`train.tsv`和`dev.tsv`中，我们没有表头。以下是文件中各列的说明：\n\
    \   - **第一列**：数据点的索引。\n   - **第二列**：分类标签（即事实型或非事实型）。在此数据集中，事实型用0表示，非事实型用1表示。\n\
    \   - **第三列**：值为`a`的废弃列。\n   - **第四列**：实际的问题文本。\n\n然后我们创建数据文件夹并将这些文件保存到该文件夹中。请参考图[4-6](#498208_1_En_4_Chapter.xhtml#Fig6)至[4-8](#498208_1_En_4_Chapter.xhtml#Fig8)查看训练文件中的一些示例。\n\
    \n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig8_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig8_HTML.jpg)\n\
    \n**图4-8** `test.tsv`快照\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig7_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig7_HTML.jpg)\n\
    \n**图4-7** `train.tsv`快照\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig6_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig6_HTML.jpg)\n\
    \n**图4-6** `Dev.tsv`快照\n\n3. 现在，导航到下载的`BERT`模型所在的目录。\n\n4. 如前所述，在命令提示符下执行训练命令。训练完成后，模型输出存储在`bert_output`参数定义的位置，如图[4-9](#498208_1_En_4_Chapter.xhtml#Fig9)所示。\n\
    \n```\npython run_classifier.py --task_name=cola --do_train=true --do_eval=true\
    \ --data_dir=$BERT_BASE_DIR/data --vocab_file=$BERT_BASE_DIR/bert_output/cased_L-12_H-768_A-12/vocab.txt\
    \ --bert_config_file=$BERT_BASE_DIR/bert_output/ cased_L-12_H-768_A-12/bert_config.json\
    \ --init_checkpoint=$BERT_BASE_DIR/bert_output/ model.ckpt-2023 --max_seq_length=128\
    \ --train_batch_size=32 --learning_rate=2e-5 --num_train_epochs=3.0 --output_dir=$BERT_BASE_DIR/bert_output/\n\
    ```\n\n`$BERT_BASE_DIR`是您必须从GitHub下载代码的目录。\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig9_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig9_HTML.jpg)\n\
    \n**图4-9** 训练`BERT`模型的命令\n\n5. 训练完成后，我们可以使用训练好的模型对测试数据进行分类。在命令提示符下运行以下命令，以获取`test.tsv`文件中问题的预测结果，如图[4-10](#498208_1_En_4_Chapter.xhtml#Fig10)所示。\n\
    \n```\npython bert/run_classifier.py --task_name=cola --do_predict=true --data_dir=$BERT_BASE_DIR/data\
    \ vocab_file=$BERT_BASE_DIR/bert_output/cased_L-12_H-768_A-12/vocab.txt --bert_config_file=$BERT_BASE_DIR/bert_output/\
    \ cased_L-12_H-768_A-12/bert_config.json --init_checkpoint=$TRAINED_CLASSIFIER\
    \ --max_seq_length=128 --output_dir=$BERT_BASE_DIR/bert_output/\n```\n\n`$BERT_BASE_DIR`是您必须从GitHub下载代码的目录。\n\
    \n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig10_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig10_HTML.jpg)\n\
    \n**图4-10** 预测命令\n\n6. 分类结果存储在`test_results.tsv`文件中，该文件的位置定义为`bert_output`参数的值。如图[4-11](#498208_1_En_4_Chapter.xhtml#Fig11)所示，分类结果是问题在两个类别上的概率分布。得分较高的类别将被视为相关类别。\n\
    \n第一列对应标签0（事实型），第二列对应标签1（非事实型）。从这个生成的`.csv`文件中，我们可以查看测试数据中的问题是事实型还是非事实型。\n\n这种问题类型分类系统在对话系统中非常有用，在该系统中，需要分类终端用户输入的查询或问题以检索相关结果。\n\
    \n## BERT模型的基准测试\n\n`BERT`嵌入模型的性能和准确性已在不同类型的NLP任务数据集上持续评估。这样做是为了检查`BERT`是否能够达到其他方法为这些数据集设定的基准值。这些基准是评估模型特定方面工作的数据集。存在许多这样的基准，下面讨论其中一些。\n\
    \n### GLUE基准测试\n\n通用语言理解评估（GLUE）是一个数据集集合，可用于训练、评估和分析NLP模型。这些不同的模型在GLUE数据集上相互比较。为了测试模型的语言理解能力，GLUE基准测试包括九个不同的任务数据集。为了评估模型，首先在GLUE提供的数据集上训练模型，然后在所有九个任务上对其进行评分。最终性能分数是所有九个任务的平均值。\n\
    \n![$$ Final\\ GLUE\\ Score=\\sum Individual\\ Task\\ Score $$](images/498208_1_En_4_Chapter/498208_1_En_4_Chapter_TeX_Equa.png)\n\
    \n模型需要更改其输入和输出的表示以适应任务。例如，在`BERT`的预训练期间，当句子作为输入时，会屏蔽少数单词。由于`BERT`中的输入表示层适应所有GLUE任务，因此无需更改此层。但是，必须移除预训练分类层。该层被替换为适应每个GLUE任务输出的层。`BERT`模型在GLUE基准测试上取得了最先进的结果，得分为80.5%。\n\
    \n### SQuAD数据集\n\n斯坦福问答数据集（SQuAD）是一个阅读理解数据集，包含基于一组维基百科文章提出的问题。每个问题的答案分别是文本片段或段落中的跨度。SQuAD数据集有两个版本。\n\
    \n- `SQuAD 1.1`\n- `SQuAD 2.0`\n\n`SQuAD 2.0`除了包含`SQuAD 1.1`的50,000个可回答问题外，还包含50,000个无法回答的问题，但这些问题的形式与可回答的问题相似。这样做是为了让`SQuAD\
    \ 2.0`在段落不支持问题答案的情况下也能表现良好。\n\n`BERT`能够通过微小的修改在SQuAD数据集上取得最先进的结果。它需要对数据进行半复杂的预处理和后处理，以处理SQuAD上下文段落的可变长度性质以及SQuAD训练中使用的字符级答案注释。`BERT`模型在测试数据集上分别达到了`SQuAD\
    \ 1.0`的F1分数93.2和`SQuAD v2.0`的F1分数83.1。"
  raw: "For this book, we will demonstrate implementation of a question classification\
    \ dataset where questions will be classified into their respective categories.\
    \ There are mainly two types of questions, factoid (nondescriptive) and non-factoid\
    \ questions. As an example, “What is the temperature in Delhi?” is a factoid question,\
    \ as it is looking for an answer based on some facts. “What is temperature?” is\
    \ a non-factoid question, as it is looking for text snippets about temperature.\
    \ For this implementation, please refer to the dataset at [`https://cogcomp.seas.upenn.edu/Data/QA/QC/`](https://cogcomp.seas.upenn.edu/Data/QA/QC/).\n\
    \nNow we will see how a question classification system can be implemented using\
    \ BERT.\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig11_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11\n\nPrediction results snapshot\n\n1.  For this implementation, we\
    \ will download the BERT base-cased model from GitHub as described previously.\n\
    \n2.  The question classification dataset is already in the format required for\
    \ training the BERT model. The data are split into `train.tsv`, `dev.tsv`, and\
    \ `test.tsv` sets. In `train.tsv` and `dev.tsv`, we do not have any headers. The\
    \ following is a description of the columns in the file.\n    *   **First Column**:\
    \ Index for data point.\n\n*   **Second Column**: Classification label (i.e.,\
    \ factoid or non-factoid). In this dataset, factoid is represented by 0 and 1\
    \ for non-factoid.\n\n*   **Third Column**: Throwaway column with value a.\n\n\
    *   **Fourth Column**: Actual question text.\n\nThen we create data folder and\
    \ save these files in the folder. Please refer Figures [4-6](#498208_1_En_4_Chapter.xhtml#Fig6)\
    \ through [4-8](#498208_1_En_4_Chapter.xhtml#Fig8) for some examples from training\
    \ files.\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig8_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig8_HTML.jpg)\n\
    \nFigure 4-8\n\nSnapshot of `test.tsv`\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig7_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7\n\nSnapshot of `train.tsv`\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig6_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6\n\nSnapshot of `Dev.tsv`\n\n3.  Now, navigate to the directory where\
    \ the downloaded BERT model exists.\n\n4.  As mentioned earlier, execute the command\
    \ for training at the command prompt. The model output after completion of training\
    \ gets stored in the location that has been defined under the `bert_output` parameter,\
    \ as shown in Figure [4-9](#498208_1_En_4_Chapter.xhtml#Fig9).\n\n```\n    python\
    \ run_classifier.py --task_name=cola --do_train=true --do_eval=true --data_dir=$BERT_BASE_DIR/data\
    \ --vocab_file=$BERT_BASE_DIR/bert_output/cased_L-12_H-768_A-12/vocab.txt --bert_config_file=$BERT_BASE_DIR/bert_output/\
    \ cased_L-12_H-768_A-12/bert_config.json --init_checkpoint=$BERT_BASE_DIR/bert_output/\
    \ model.ckpt-2023 --max_seq_length=128 --train_batch_size=32 --learning_rate=2e-5\
    \ --num_train_epochs=3.0 --output_dir=$BERT_BASE_DIR/bert_output/\n    ```\n\n\
    `$BERT_BASE_DIR` is a directory where you must have downloaded code from GitHub.\n\
    \n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig9_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig9_HTML.jpg)\n\
    \nFigure 4-9\n\nCommand to train BERT model\n\n5.  After completion of training,\
    \ we can classify the test data using the trained model. Run the following command\
    \ at the command prompt to get a prediction for questions present in the `test.tsv`\
    \ file as shown in Figure [4-10](#498208_1_En_4_Chapter.xhtml#Fig10).\n\n```\n\
    \    python bert/run_classifier.py --task_name=cola --do_predict=true --data_dir=$BERT_BASE_DIR/data\
    \ vocab_file=$BERT_BASE_DIR/bert_output/cased_L-12_H-768_A-12/vocab.txt --bert_config_file=$BERT_BASE_DIR/bert_output/\
    \ cased_L-12_H-768_A-12/bert_config.json --init_checkpoint=$TRAINED_CLASSIFIER\
    \ --max_seq_length=128 --output_dir=$BERT_BASE_DIR/bert_output/\n    ```\n\n`$BERT_BASE_DIR`\
    \ is a directory where you must have downloaded code from GitHub.\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig10_HTML.jpg](images/498208_1_En_4_Chapter/498208_1_En_4_Fig10_HTML.jpg)\n\
    \nFigure 4-10\n\nCommand for prediction\n\n6.  The results of the classification\
    \ are stored in the location that has been defined as the value for the `bert_output`\
    \ parameter in the `test_results.tsv` file. As we can see in Figure [4-11](#498208_1_En_4_Chapter.xhtml#Fig11),\
    \ the result of classification is a probability distribution of a question to\
    \ two classes. The class with the higher score will be considered the relevant\
    \ one.\n\nThe first column corresponds to the label 0 (Factoid) and the second\
    \ column corresponds to the label 1 (non-factoid). From this generated `.csv`\
    \ we can see whether the questions in the test data are Factoid or non-factoid\
    \ questions.\n\nThis question type classification system is quite useful in a\
    \ conversational system where a query or question entered by an end user needs\
    \ to be classified to retrieve relevant results.\n\n## Benchmarks for BERT Model\n\
    \nBERT embedding model performance and accuracy have been continuously evaluated\
    \ over different types of datasets for various NLP tasks. This is being done to\
    \ check if BERT is able to achieve benchmark values already set up for these datasets\
    \ by some other methods. These benchmarks are datasets that evaluate the working\
    \ of specific aspects of a model. There exist many such benchmarks and some of\
    \ them are discussed next.\n\n### GLUE Benchmark\n\nGeneral Language Understanding\
    \ Evaluation (GLUE) is a collection of datasets that can be used to train, evaluate,\
    \ and analyze NLP models. These different models are compared with each other\
    \ over the GLUE dataset. To test a model’s language understanding, the GLUE benchmark\
    \ includes nine diverse task datasets. To evaluate a model, first it is trained\
    \ over a dataset provided by GLUE and then it is scored on all nine tasks. The\
    \ final performance score is the average of all nine tasks.\n\n![$$ Final\\ GLUE\\\
    \ Score=\\sum Individual\\ Task\\ Score $$](images/498208_1_En_4_Chapter/498208_1_En_4_Chapter_TeX_Equa.png)\n\
    \nThe model is required to have representation of its input and output changed\
    \ so as to accommodate the task. For instance, during the pretraining of BERT,\
    \ few words are masked when sentences are given as input. Because the input representation\
    \ layer in BERT accommodates all of the GLUE tasks, there is no need to change\
    \ this layer. However, the pretraining classification layer has to be removed.\
    \ This layer is replaced with the one that accommodates the output of each GLUE\
    \ task. The BERT model scores a state-of-the-art result on the GLUE benchmark,\
    \ with a score of 80.5%.\n\n### SQuAD Dataset\n\nThe Stanford Question Answering\
    \ Dataset (SQuAD) is a reading comprehension dataset, consisting of questions\
    \ asked on a set of Wikipedia articles. The answer to each of the questions is\
    \ either a text segment or a span from the passage, respectively. There are two\
    \ versions of the SQuAD dataset.\n\n*   SQuAD 1.1\n\n*   SQuAD 2.0\n\nSQuAD2.0\
    \ has 100,000 questions in addition to SQuAD 1.1, which contains 50,000 unanswered\
    \ questions, but are similar to questions that were answerable. This was done\
    \ so that SQuAD2.0 can do well in situations where no answers to questions are\
    \ supported by a paragraph for a question.\n\nBERT is able to achieve state-of-the-art\
    \ results on the SQuAD dataset with minor modifications. It requires semicomplex\
    \ preprocessing of data and postprocessing to deal with the variable-length nature\
    \ of SQuAD context paragraphs and the character-level answer annotations used\
    \ for SQuAD training. The BERT model was able to achieve an F1 score of 93.2 and\
    \ 83.1 for SQuAD 1.0 and SQuAD v2.0 over test dataset, respectively."
  trans: "\n# 问题分类与 BERT 模型实现\n\n本书将演示如何实现一个问题分类数据集，将问题分类到各自的类别中。问题主要分为两类：事实型（非描述性）问题和非事实型问题。例如，“What\
    \ is the temperature in Delhi?”是一个事实型问题，因为它基于某些事实寻找答案；“What is temperature?”是一个非事实型问题，因为它寻找关于温度的文本片段。关于此实现，请参考位于[`https://cogcomp.seas.upenn.edu/Data/QA/QC/`](https://cogcomp.seas.upenn.edu/Data/QA/QC/)的数据集。\n\
    \n现在我们将了解如何使用`BERT`实现问题分类系统。\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig11_HTML.jpg](img/498208_1_En_4_Fig11_HTML.jpg)\n\
    \n**图 4-11** 预测结果快照\n\n1. 对于此实现，我们将按照之前所述从 GitHub 下载`BERT` base-cased 模型。\n\n\
    2. 问题分类数据集已采用训练`BERT`模型所需的格式。数据被分为`train.tsv`、`dev.tsv`和`test.tsv`集合。在`train.tsv`和`dev.tsv`中，我们没有表头。以下是文件中各列的说明：\n\
    \   - **第一列**：数据点的索引。\n   - **第二列**：分类标签（即事实型或非事实型）。在此数据集中，事实型用 0 表示，非事实型用 1 表示。\n\
    \   - **第三列**：值为`a`的废弃列。\n   - **第四列**：实际的问题文本。\n\n然后我们创建数据文件夹并将这些文件保存到该文件夹中。请参考图\
    \ 4-6 至 4-8 查看训练文件中的一些示例。\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig8_HTML.jpg](img/498208_1_En_4_Fig8_HTML.jpg)\n\
    \n**图 4-8** `test.tsv`快照\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig7_HTML.jpg](img/498208_1_En_4_Fig7_HTML.jpg)\n\
    \n**图 4-7** `train.tsv`快照\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig6_HTML.jpg](img/498208_1_En_4_Fig6_HTML.jpg)\n\
    \n**图 4-6** `Dev.tsv`快照\n\n3. 现在，导航到下载的`BERT`模型所在的目录。\n\n4. 如前所述，在命令提示符下执行训练命令。训练完成后，模型输出存储在`bert_output`参数定义的位置，如图\
    \ 4-9 所示。\n\n```\npython run_classifier.py --task_name=cola --do_train=true --do_eval=true\
    \ --data_dir=$BERT_BASE_DIR/data --vocab_file=$BERT_BASE_DIR/bert_output/cased_L-12_H-768_A-12/vocab.txt\
    \ --bert_config_file=$BERT_BASE_DIR/bert_output/ cased_L-12_H-768_A-12/bert_config.json\
    \ --init_checkpoint=$BERT_BASE_DIR/bert_output/ model.ckpt-2023 --max_seq_length=128\
    \ --train_batch_size=32 --learning_rate=2e-5 --num_train_epochs=3.0 --output_dir=$BERT_BASE_DIR/bert_output/\n\
    ```\n\n`$BERT_BASE_DIR`是您必须从 GitHub 下载代码的目录。\n\n![../images/498208_1_En_4_Chapter/498208_1_En_4_Fig9_HTML.jpg](img/498208_1_En_4_Fig9_HTML.jpg)\n\
