    \ NLP 的基础知识。\n"
- fmt: '# Natural Language Processing


    `NLP` is a sub-branch of artificial intelligence (`AI`) that enables computers
    to read, understand, and process human language. It is very easy for computers
    to read data from structured systems such as spreadsheets, databases, `JavaScript
    Object Notation` (`JSON`) files, and so on. However, a lot of information is represented
    as unstructured data, which can be quite challenging for computers to understand
    and generate knowledge or information. To solve these problems, `NLP` provides
    a set of techniques or methodologies to read, process, and understand human language
    and generate knowledge from it. Currently, numerous companies including `IBM`,
    `Google`, `Microsoft`, `Facebook`, `OpenAI`, and others have been providing various
    `NLP` techniques as a service. Some open-source libraries such as `NLTK`, `spaCy`,
    and so on are also key enablers in making it possible to break down and understand
    the meaning behind linguistic texts.


    As we know, processing and understanding of text is a very complex problem. Data
    scientists, researchers, and developers have been solving `NLP` problems by building
    a pipeline: breaking up an `NLP` problem into smaller parts; solving each of the
    subparts with their corresponding `NLP` techniques and `ML` methods such as entity
    recognition, document summarization, and so on; and finally combining or stacking
    all parts or models together as the final solution to the problem.


    The main objective of `NLP` is to teach machines how to interpret and understand
    language. Any language such as English, programming construct, mathematics, and
    so on, involves the following three major components:


    - **Syntax**: Defines rules for ordering of words in text. As an example, subject,
    verb, and object should be in the correct order for a sentence to be syntactically
    correct.

    - **Semantics**: Defines the meaning of words in text and how these words should
    be combined together. As an example, in the sentence, “I want to deposit money
    in this bank account,” the word “bank” refers to a financial institution.

    - **Pragmatics**: Defines usage or selection of words in a particular context.
    As an example, the word “bank” can have different meanings on the basis of context.
    For example, “bank” could also mean financial institution or land at the edge
    of a river.


    For this reason, `NLP` employs different methodologies to extract these components
    out of text or speech to generate features that will be used for downstream tasks
    such as text classification, entity extraction, language translation, and document
    summarization. Natural language understanding (`NLU`), a sub-branch of `NLP` that
    aims at understanding and generating knowledge from documents, web pages, and
    so on. Some examples are listed here.


    - **Language translation**: Language translation is considered one of the most
    complex problems in `NLP` and `NLU`. You can provide text snippets or documents
    and these systems will convert them into another language. Some of the major cloud
    vendors such as `Google`, `Microsoft`, and `IBM` provide this feature as a service
    that can be leveraged by anyone for their `NLP`-based system. As an example, a
    developer who is working on development of a conversation system can leverage
    translation services from these vendors to enable multilingual capability in a
    conversation system without even doing any actual development.

    - **Question-answering system**: This type of system is very useful if you want
    to implement a system to find an answer to a question from a document, paragraph,
    database, or any other system. Here, `NLU` is responsible for understanding a
    user’s query as well as the document or paragraph (unstructured text) that contains
    the answer to that question. There exist a few variations of question-answering
    systems, such as reading comprehension-based systems, mathematical systems, multiple
    choice systems, question-answering and so on.

    - **Automatic routing of support tickets**: These systems read through the contents
    of customer support tickets and route them to the person who can solve the issue.
    Here, `NLU` enables these systems to process and understand emails, topics, chat
    data, and more, and route them to the appropriate support person, thereby avoiding
    extra hops due to incorrect assignation.


    Systems such as question-answering systems, machine translation, named entity
    recognition (`NER`), document summarization, parts of speech (`POS`) tagging,
    and search engines are some of examples of `NLP`-based systems.


    As an example, consider the following text from the Wikipedia article for “Machine
    Learning”.


    > Machine learning (ML) is the [scientific study](https://en.wikipedia.org/wiki/Branches_of_science)
    of [algorithms](https://en.wikipedia.org/wiki/Algorithm) and [statistical models](https://en.wikipedia.org/wiki/Statistical_model)
    that [computer systems](https://en.wikipedia.org/wiki/Computer_systems) use to
    perform a specific task without using explicit instructions, relying on patterns
    and [inference](https://en.wikipedia.org/wiki/Inference) instead. Machine learning
    algorithms are used in a wide variety of applications, such as [email filtering](https://en.wikipedia.org/wiki/Email_filtering)
    and [computer vision](https://en.wikipedia.org/wiki/Computer_vision). It can be
    divided into two types, i.e., Supervised and Unsupervised Learning.


    This text includes a lot of useful data that can be used as information. It would
    be good if computers could read, understand, and answer the following questions
    from the text:


    - What are the applications of machine learning?

    - What type of study does machine learning refer to?

    - What type of models do computers use to perform specific tasks?


    There should be some way to teach a machine the basic concepts and rules of languages
    so that they can read, process, and understand text. To derive an insight from
    a text, `NLP` techniques combine all of the steps into a pipeline known as the
    `NLP/ML` pipeline. The following are some of the steps of an `NLP` pipeline.


    - Sentence segmentation

    - Tokenization

    - `POS` tagging

    - Stemming and lemmatization

    - Identification of stop words


    ## Sentence Segmentation


    The first step in the pipeline is to segment the text snippet into individual
    sentences, as shown here.


    - Machine learning (ML) is the [scientific study](https://en.wikipedia.org/wiki/Branches_of_science)
    of [algorithms](https://en.wikipedia.org/wiki/Algorithm) and [statistical models](https://en.wikipedia.org/wiki/Statistical_model)
    that [computer systems](https://en.wikipedia.org/wiki/Computer_systems) use to
    perform a specific task without using explicit instructions, relying on patterns
    and [inference](https://en.wikipedia.org/wiki/Inference) instead.

    - Machine learning algorithms are used in a wide variety of applications, such
    as [email filtering](https://en.wikipedia.org/wiki/Email_filtering) and [computer
    vision](https://en.wikipedia.org/wiki/Computer_vision).

    - It can be divided into two types, i.e., Supervised and Unsupervised Learning.


    Earlier implementation of sentence segmentation was quite easy, just splitting
    the text on the basis of punctuation, or a “full stop.” Sometimes that failed,
    though, when documents or a piece of text were not formatted correctly or were
    grammatically incorrect. Now, there are some advanced `NLP` methods such as sequence
    learning that segments a piece of text even if a full stop is not present or a
    document is not formatted correctly, basically extracting phrases by breaking
    up text using semantic understanding along with syntactic understanding.'
  raw: '## Natural Language Processing


    NLP is a sub-branch of artificial intelligence (AI) that enables computers to
    read, understand, and process human language. It is very easy for computers to
    read data from structured systems such as spreadsheets, databases, JavaScript
    Object Notation (JSON) files, and so on. However, a lot of information is represented
    as unstructured data, which can be quite challenging for computers to understand
    and generate knowledge or information. To solve these problems, NLP provides a
    set of techniques or methodologies to read, process, and understand human language
    and generate knowledge from it. Currently, numerous companies including IBM, Google,
    Microsoft, Facebook, OpenAI, and others have been providing various NLP techniques
    as a service. Some open-source libraries such as NLTK, spaCy, and so on are also
    key enablers in making it possible to break down and understand the meaning behind
    linguistic texts.


    As we know, processing and understanding of text is a very complex problem. Data
    scientists, researchers, and developers have been solving NLP problems by building
    a pipeline: breaking up an NLP problem into smaller parts; solving each of the
    subparts with their corresponding NLP techniques and ML methods such as entity
    recognition, document summarization, and so on; and finally combining or stacking
    all parts or models together as the final solution to the problem.


    The main objective of NLP is to teach machines how to interpret and understand
    language. Any language such as English, programming construct, mathematics, and
    so on, involves the following three major components:


    *   **Syntax** : Defines rules for ordering of words in text. As an example, subject,
    verb, and object should be in the correct order for a sentence to be syntactically
    correct.


    *   **Semantics** : Defines the meaning of words in text and how these words should
    be combined together. As an example, in the sentence, “I want to deposit money
    in this bank account,” the word “bank” refers to a financial institution.


    *   **Pragmatics** : Defines usage or selection of words in a particular context.
    As an example, the word “bank” can have different meanings on the basis of context.
    For example, “bank” could also mean financial institution or land at the edge
    of a river.


    For this reason, NLP employs different methodologies to extract these components
    out of text or speech to generate features that will be used for downstream tasks
    such as text classification, entity extraction, language translation, and document
    summarization. Natural language understanding (NLU), a sub-branch of NLP that
    aims at understanding and generating knowledge from documents, web pages, and
    so. Some examples are listed here.


    *   **Language translation**: Language translation is considered one of the most
    complex problems in NLP and NLU. You can provide text snippets or documents and
    these systems will convert them into another language. Some of the major cloud
    vendors such as Google, Microsoft, and IBM provide this feature as a service that
    can be leveraged by anyone for their NLP-based system. As an example, a developer
    who is working on development of a conversation system can leverage translation
    services from these vendors to enable multilingual capability in a conversation
    system without even doing any actual development.


    *   **Question-answering system** : This type of system is very useful if you
    want to implement a system to find an answer to a question from a document, paragraph,
    database, or any other system. Here, NLU is responsible for understanding a user’s
    query as well as the document or paragraph (unstructured text) that contains the
    answer to that question. There exist a few variations of question-answering systems,
    such as reading comprehension-based systems, mathematical systems, multiple choice
    systems, question-answering and so on.


    *   **Automatic routing of support tickets** : These systems read through the
    contents of customer support tickets and route them to the person who can solve
    the issue. Here, NLU enables these systems to process and understand emails, topics,
    chat data, and more, and route them to the appropriate support person, thereby
    avoiding extra hops due to incorrect assignation.


    Systems such as question-answering systems, machine translation, named entity
    recognition (NER), document summarization, parts of speech (POS) tagging, and
    search engines are some of examples of NLP-based systems.


    As an example, consider the following text from the Wikipedia article for “Machine
    Learning”.


    > Machine learning (ML) is the [scientific study](https://en.wikipedia.org/wiki/Branches_of_science)
    of [algorithms](https://en.wikipedia.org/wiki/Algorithm) and [statistical models](https://en.wikipedia.org/wiki/Statistical_model)
    that [computer systems](https://en.wikipedia.org/wiki/Computer_systems) use to
    perform a specific task without using explicit instructions, relying on patterns
    and [inference](https://en.wikipedia.org/wiki/Inference) instead. Machine learning
    algorithms are used in a wide variety of applications, such as [email filtering](https://en.wikipedia.org/wiki/Email_filtering)
    and [computer vision](https://en.wikipedia.org/wiki/Computer_vision). It can be
    divided into two types, i.e., Supervised and Unsupervised Learning.


    This text includes a lot of useful data that can be used as information. It would
    be good if computers could read, understand, and answer the following questions
    from the text:


    *   What are the applications of machine learning?


    *   What type of study does machine learning refer to?


    *   What type of models do computers use to perform specific tasks?


    There should be some way to teach a machine the basic concepts and rules of languages
    so that they can read, process, and understand text. To derive an insight from
    a text, NLP techniques combine all of the steps into a pipeline known as the NLP/ML
    pipeline. The following are some of the steps of an NLP pipeline.


    *   Sentence segmentation


    *   Tokenization


    *   POS tagging


    *   Stemming and lemmatization


    *   Identification of stop words


    ### Sentence Segmentation


    The first step in the pipeline is to segment the text snippet into individual
    sentences, as shown here.


    *   Machine learning (ML) is the [scientific study](https://en.wikipedia.org/wiki/Branches_of_science)
    of [algorithms](https://en.wikipedia.org/wiki/Algorithm) and [statistical models](https://en.wikipedia.org/wiki/Statistical_model)
    that [computer systems](https://en.wikipedia.org/wiki/Computer_systems) use to
    perform a specific task without using explicit instructions, relying on patterns
    and [inference](https://en.wikipedia.org/wiki/Inference) instead.


    *   Machine learning algorithms are used in a wide variety of applications, such
    as [email filtering](https://en.wikipedia.org/wiki/Email_filtering) and [computer
    vision](https://en.wikipedia.org/wiki/Computer_vision).


    *   It can be divided into two types, i.e., Supervised and Unsupervised Learning.


    Earlier implementation of sentence segmentation was quite easy, just splitting
    the text on the basis of punctuation, or a “full stop.” Sometimes that failed,
    though, when documents or a piece of text were not formatted correctly or were
    grammatically incorrect. Now, there are some advanced NLP methods such as sequence
    learning that segments a piece of text even if a full stop is not present or a
    document is not formatted correctly, basically extracting phrases by breaking
    up text using semantic understanding along with syntactic understanding.'
  trans: '

    # 自然语言处理


    `NLP` 是人工智能（`AI`）的一个子分支，它使计算机能够读取、理解和处理人类语言。计算机很容易从电子表格、数据库、`JavaScript Object
    Notation`（`JSON`）文件等结构化系统中读取数据。然而，大量信息以非结构化数据的形式呈现，这对计算机理解和生成知识或信息来说颇具挑战。为了解决这些问题，`NLP`
    提供了一套技术或方法，用于读取、处理和理解人类语言，并从中生成知识。目前，包括 `IBM`、`Google`、`Microsoft`、`Facebook`、`OpenAI`
    等在内的众多公司，已将各种 `NLP` 技术作为服务提供。一些开源库，如 `NLTK`、`spaCy` 等，也是实现解析和理解语言文本背后含义的关键推动因素。


    众所周知，处理和理解文本是一个非常复杂的问题。数据科学家、研究人员和开发者通过构建一个流水线来解决 `NLP` 问题：将 `NLP` 问题分解成更小的部分；使用相应的
    `NLP` 技术和 `ML` 方法（如实体识别、文档摘要等）解决每个子部分；最后将所有部分或模型组合或堆叠起来，作为问题的最终解决方案。


    `NLP` 的主要目标是教会机器如何解释和理解语言。任何语言，如英语、编程结构、数学等，都包含以下三个主要组成部分：


    - **句法**：定义文本中词语顺序的规则。例如，一个句子在句法上正确，其主语、谓语和宾语必须按正确顺序排列。

    - **语义**：定义文本中词语的含义以及这些词语应如何组合。例如，在句子“我想在这个银行账户里存钱”中，“银行”一词指的是金融机构。

    - **语用**：定义在特定语境下词语的用法或选择。例如，“bank”一词根据语境可以有不同的含义。比如，“bank”既可以指金融机构，也可以指河岸。


    因此，`NLP` 采用不同的方法从文本或语音中提取这些组成部分，以生成用于下游任务（如文本分类、实体提取、语言翻译和文档摘要）的特征。自然语言理解（`NLU`）是
    `NLP` 的一个子分支，旨在从文档、网页等中理解和生成知识。以下列举了一些例子。


    - **语言翻译**：语言翻译被认为是 `NLP` 和 `NLU` 中最复杂的问题之一。你可以提供文本片段或文档，这些系统会将其转换成另一种语言。一些主要的云服务商，如
    `Google`、`Microsoft` 和 `IBM`，将此功能作为服务提供，任何人都可以将其用于基于 `NLP` 的系统。例如，正在开发对话系统的开发者可以利用这些供应商的翻译服务，在不进行任何实际开发的情况下，为对话系统启用多语言能力。

    - **问答系统**：如果你想实现一个系统，从文档、段落、数据库或任何其他系统中找到问题的答案，这类系统非常有用。在这里，`NLU` 负责理解用户的查询以及包含答案的文档或段落（非结构化文本）。问答系统存在几种变体，例如基于阅读理解系统、数学系统、选择题系统、问答系统等。

    - **支持工单自动路由**：这些系统会读取客户支持工单的内容，并将其路由给能够解决问题的人员。在这里，`NLU` 使这些系统能够处理和理解电子邮件、主题、聊天数据等，并将其路由给合适的支持人员，从而避免因错误分配而导致的额外跳转。


    诸如问答系统、机器翻译、命名实体识别（`NER`）、文档摘要、词性（`POS`）标注和搜索引擎等系统，都是基于 `NLP` 的系统的例子。


    例如，考虑以下来自维基百科“机器学习”词条的文本。


    > 机器学习（ML）是对[算法](https://en.wikipedia.org/wiki/Algorithm)和[统计模型](https://en.wikipedia.org/wiki/Statistical_model)的[科学研究](https://en.wikipedia.org/wiki/Branches_of_science)，[计算机系统](https://en.wikipedia.org/wiki/Computer_systems)使用这些算法和模型来执行特定任务，无需使用显式指令，而是依赖模式和[推理](https://en.wikipedia.org/wiki/Inference)。机器学习算法广泛应用于各种场景，例如[电子邮件过滤](https://en.wikipedia.org/wiki/Email_filtering)和[计算机视觉](https://en.wikipedia.org/wiki/Computer_vision)。它可以分为两种类型，即监督学习和无监督学习。


    这段文本包含大量可用作信息的有用数据。如果计算机能够阅读、理解并回答以下来自文本的问题，那就太好了：


    - 机器学习的应用有哪些？

    - 机器学习指的是对什么类型的研究？

    - 计算机使用什么类型的模型来执行特定任务？


    应该有某种方法教会机器语言的基本概念和规则，以便它们能够阅读、处理和理解文本。为了从文本中获取洞察，`NLP` 技术将所有步骤组合成一个称为 `NLP/ML`
    流水线的流程。以下是 `NLP` 流水线的一些步骤。


    - 句子分割

    - 分词

    - `POS` 标注

    - 词干提取和词形还原

    - 停用词识别


    ## 句子分割


    流水线的第一步是将文本片段分割成单独的句子，如下所示。


    - 机器学习（ML）是对[算法](https://en.wikipedia.org/wiki/Algorithm)和[统计模型](https://en.wikipedia.org/wiki/Statistical_model)的[科学研究](https://en.wikipedia.org/wiki/Branches_of_science)，[计算机系统](https://en.wikipedia.org/wiki/Computer_systems)使用这些算法和模型来执行特定任务，无需使用显式指令，而是依赖模式和[推理](https://en.wikipedia.org/wiki/Inference)。

    - 机器学习算法广泛应用于各种场景，例如[电子邮件过滤](https://en.wikipedia.org/wiki/Email_filtering)和[计算机视觉](https://en.wikipedia.org/wiki/Computer_vision)。

    - 它可以分为两种类型，即监督学习和无监督学习。


    早期的句子分割实现相当简单，只需根据标点符号或“句号”来分割文本。然而，当文档或文本片段格式不正确或语法有误时，这种方法有时会失败。现在，有一些先进的 `NLP`
    方法，例如序列学习，即使没有句号或文档格式不正确，也能分割文本片段，其基本原理是通过结合语义理解和句法理解来分解文本，从而提取短语。

    '
- fmt: '### Tokenization


    The next task in the NLP pipeline is tokenization. In this task, we break each
    of the sentences into multiple tokens. A token can be a character, a word, or
    a phrase. The basic methodology used in tokenization is to split a sentence into
    separate words whenever there is a space between them. As an example, consider
    the second sentence from our example text: “Machine learning algorithms are used
    in a wide variety of applications, such as [email filtering](https://en.wikipedia.org/wiki/Email_filtering)
    and [computer vision](https://en.wikipedia.org/wiki/Computer_vision).” Here is
    the result of applying tokenization to this example.


    ```

    ["Machine", "learning", "algorithms", "are", "used", "in" , "a", "wide", "variety",
    "of", "applications", "such", "as", "email", "filtering", "and", "computer", "vision"].

    ```


    However, there are some advanced tokenization methods such as Markov chain models
    that can extract phrases out of a sentence. As an example, “machine learning”
    can be extracted as a phrase by applying advanced ML and NLP methods.


    ### Parts of Speech Tagging


    `POS` tagging is the next step to determine parts of speech for each of the tokens
    or words extracted from the tokenization step. This helps us to identify the use
    of each word and its significance in a sentence. It also introduces first steps
    toward the actual understanding of the meaning of a sentence. Imparting a `POS`
    tag can increase the dimension of the word, to give better detail of the meaning
    the given word is trying to impart. The phrases “putting on an act” and “act on
    an instinct” both use the word “act,” but as a noun and a verb, respectively,
    so a `POS` tag can greatly help in distinguishing the meaning. In this approach,
    we pass the token, referred as `Word`, to the `POS` tagger, a classification system,
    along with some context words that will be used to classify the `Word` with its
    relevant tags as shown in Figure [1-1](#498208_1_En_1_Chapter.xhtml#Fig1).


    ![../images/498208_1_En_1_Chapter/498208_1_En_1_Fig1_HTML.png](images/498208_1_En_1_Chapter/498208_1_En_1_Fig1_HTML.png)


    Figure 1-1


    `POS` tagging


    These models are trained on a huge corpus of (millions or billions) sentences
    of literature in the target language where each word along with its `POS` tag
    is used as training data for the `POS` classifier. The previously mentioned models
    are completely based on statistics as per training data and not on actual interpretation.
    The model tries to find `POS` tag for each of the words based on syntactic similarity
    of a sentence with historical sentences. As an example, for the sentence “Machine
    learning algorithms are used in a wide variety of applications, such as [email
    filtering](https://en.wikipedia.org/wiki/Email_filtering) and [computer vision](https://en.wikipedia.org/wiki/Computer_vision),”
    the `POS` tag is as shown here:


    ```

    Machine (NN) learning (NN) algorithms (NNS) are (VBP) used (VBN) in (IN) a (DT)
    wide (JJ) variety (NN) of (IN) applications (NNS), such (JJ) as (IN) email (NN)
    filtering (VBG) and (CC) computer (NN) vision (NN).

    ```


    As we can see from those results, there are various nouns (i.e., *Machine, learning,
    variety, computer,* and *vision*). We can thus conclude that the sentence may
    be talking about machines and computers.


    ### Stemming and Lemmatization


    Sometimes the same word occurs in multiple sentences in different forms. Stemming
    can be defined as the process of reducing words to their root or base form by
    removing suffixes. Here, the reduced words can be dictionary words or nondictionary
    words. For example, the word “machine” can be reduced to its root form, “machin.”
    It doesn’t take into consideration the context in which word is being used. Here
    is the stemmed representation of tokenized words for our example sentence.


    ```

    machin learn algorithm ar us in a wid vary of apply , such as email filt and comput
    vis

    ```


    In this result, some of the words are represented as nondictionary words; for
    example, “machine” reduced to “machin,” which is a stemmed word but not a dictionary
    word.


    Lemmatization can be defined as a process of deriving a canonical form or lemma
    of the word. It uses context to identify the lemma of the word, which must be
    a dictionary word. However, the same is not true for stemming. Using our previous
    example, the word “machine” will be converted into its canonical form as “machine.”
    The following is the lemmatized representation of tokenized words of our example
    sentence. It uses tags of words as context to derive canonical forms of words.


    ```

    Machine learning algorithm be use in a wide variety of application , such a email
    filtering and computer vision.

    ```


    In these results, some of the words, such as “filtering,” are reduced to their
    canonical form, in this case ”filtering,” not “filter,” because the word “filtering”
    is being used as a verb in the sentence.


    Lemmatization and stemming should be used with utmost care and as per requirements.
    For example, if you are working with a search engine system, then stemming should
    be preferred, but if you are working with question answering, where reasoning
    is important, then lemmatization should be preferred over stemming.


    ### Identification of Stop Words


    Text snippets contain important as well as filler words. For example, in our example
    sentence, these are the filler words.


    ```

    ["be", "use", "in", "a", "such", “a", "and"]

    ```


    These filler words introduce noise into your text and it is important to manage
    them, as they appear very frequently in the text and will have a much higher frequency
    and less importance than other words. Some systems use a predefined list of these
    stop words, such as “is,” “at,” and so on. This is not helpful for some domains,
    though. As an example, in documents related to health care, you will find some
    common terms such as patient, doctor, or ICU. These words appear very frequently
    and you need to somehow remove them from your text. There are two methods that
    are generally used to deal with domain-specific stop words.


    *   Flag words as stop words on basis of their frequency of occurrence. It could
    be either most frequent or least frequent.


    *   Flag words as stop words if they are quite common across all documents in
    the corpus.


    ### Phrase Extraction


    Sometimes a single word doesn’t provide sufficient information for most of the
    NLP tasks. As an example, the meaning of the two words “machine” and “learning”
    from the dictionary are shown here.


    *   **Machine**: An apparatus using mechanical power to perform certain tasks.


    *   **Learning**: An acquisition of knowledge or skills through study, experience,
    or being taught.


    It is very clear from the definitions of these two words that our sample sentence
    should have been talking about some mechanical device and various media for acquiring
    the knowledge. However, when these words are used together (i.e., “machine learning”),
    it refers to the sub-branch of AI that deals with the scientific study of algorithms
    and statistical models used by computers to perform a specific task without being
    explicitly programmed.


    To extract phrases, we need to combine multiple words together, or identify phrases.
    Here, phrases can be of two types, noun phrases and verb phrases. We can define
    rules to extract phrases from sentences. As an example, to extract a noun phrase,
    we can define a rule such that “two consecutive occurrences of nouns in a sentence
    should be considered a noun phrase.” For example, the phrase “machine learning”
    is a noun phrase in our sample sentence. In a similar manner, we can define more
    rules to extract noun phrases and verb phrases from a sentence.'
