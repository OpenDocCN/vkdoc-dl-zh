- fmt: "### Model Architecture\n\nThe architecture of the DeepPavlov ODQA system consists\
    \ of two components: a ranker and a reader. To find an answer to any question,\
    \ the ranker first retrieves a list of relevant articles from the collection of\
    \ documents, and then the reader scans them to identify an answer.\n\nThe ranker\
    \ component is based on the DrQA architecture proposed by Facebook Research. Specifically,\
    \ the DrQA approach uses unigram-bigram hashing and a TF-IDF algorithm to efficiently\
    \ return a subset of relevant articles based on a question. The reader component\
    \ is based on R-NET proposed by Microsoft Research Asia and implemented by Wenxuan\
    \ Zhou. The R-NET architecture is an end-to-end neural network model that aims\
    \ to answer questions based on a given document. R-NET first matches the question\
    \ and the document via gated attention-based recurrent networks to obtain a question-aware\
    \ document representation. Then, the self-matching attention mechanism refines\
    \ the representation by matching the document against itself, which effectively\
    \ encodes information from the whole document. Finally, pointer networks locate\
    \ the start and end index of the answer in the article. Figure [5-21](#498208_1_En_5_Chapter.xhtml#Fig21)\
    \ shows the logical flow of a DeepPavlov ODQA system.\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig21_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig21_HTML.jpg)\n\
    \nFigure 5-21\n\nThe DeepPavlov-based ODQA system architecture\n\nTo use this\
    \ model for an ODQA system, we have used the `deeppavlov` library in Python. Please\
    \ note that an ODQA system uses a corpus of Wikipedia articles or documents. Follow\
    \ these steps to configure and use an ODQA system.\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig22_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig22_HTML.jpg)\n\
    \nFigure 5-22\n\nInstalling `deeppavlov` library\n\n1.  Create a new Jupyter notebook\
    \ and run the following command to install the `deeppavlov` library, as shown\
    \ in Figure [5-22](#498208_1_En_5_Chapter.xhtml#Fig22).\n\n```\npip install deeppavlov\n\
    ```\n\n2.  Run the following command to install all required models, vocabulary,\
    \ and so on, trained on the Wikipedia corpus in the English language, as shown\
    \ in Figure [5-23](#498208_1_En_5_Chapter.xhtml#Fig23).\n\n```\n! python -m deeppavlov\
    \ install en_odqa_infer_wiki\n```\n\n> **Note:** Please use the `!` symbol before\
    \ the installation command as just shown if you are working with Colab Notebook.\n\
    \n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig23_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig23_HTML.jpg)\n\
    \nFigure 5-23\n\nInstalling required packages for `deeppavlov`\n\n3.  Perform\
    \ the necessary imports required for this implementation as shown here.\n\n```\n\
    from deeppavlov import configs\nfrom deeppavlov.core.commands.infer import build_model\n\
    ```\n\n4.  Then we will get an ODQA model using the `build_model` class of the\
    \ `deeppavlov` library. It takes two arguments:\n    *   `config` file path: Define\
    \ the name of the `config` file that contains details of the relevant NLP model\
    \ to be used. For this case, we will use `en_odqa_infer_wiki`. This name implies\
    \ the ODQA model from Wikipedia.\n    *   `download`: This will be `True` if the\
    \ model needs to be downloaded and `False` otherwise.\n\n5.  Once the ODQA model\
    \ has been loaded, you can test this model by providing questions such as \"Who\
    \ is Virat Kohli?\" as shown here.\n\n```\nodqa = build_model(configs.odqa.en_odqa_infer_wiki,\
    \ download = True)\n```\n\n```\nquestions = [\"Where did guinea pigs originate?\"\
    , \"Who is virat kohli?\"]\nanswers = odqa(questions)\n```\n\nThe output of this\
    \ code will be the answer to questions asked from Wikipedia documents. Here is\
    \ the complete code for the ODQA system.\n\n```\nfrom deeppavlov import configs\n\
    from deeppavlov.core.commands.infer import build_model\ndef odqa_deeppavlov(questions):\n\
    odqa = build_model(configs.odqa.en_odqa_infer_wiki, download = True)\nresults\
    \ = odqa(questions)\nreturn results\nif __name__ == \"__main__\" :\nquestions\
    \ = [\"Where did guinea pigs originate?\", \"Who is virat kohli?\"]\nanswers =\
    \ odqa_deeppavlov(questions)\nprint(answers)\n```\n\nHere is the output:\n\n```\n\
    ['Andes of South America',  'Indian international cricketer who currently captains\
    \ the India national team']\n```\n\nNow, we have seen how an ODQA system can be\
    \ used for research or development purposes. Next, consider a scenario where you\
    \ need to deploy this feature to be consumed by some website or conversation system\
    \ to serve the end user who is looking for an answer to his or her query. In this\
    \ case, you need to release or expose features of the ODQA system as a REST API.\
    \ Now, follow these steps to release features of the question answering system\
    \ as a REST API.\n\n1.  Create a file named `OpenDomainQuestionAnsweringAPI`.\n\
    \n2.  Copy the following code and paste it in that file, then save it.\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig24_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig24_HTML.jpg)\n\
    \nFigure 5-24\n\nService deployment\n\n3.  This code processes input passed to\
    \ an API, calls a function `odqa_deeppavlov`, and sends a response from this function\
    \ as an API response.\n\n4.  Open a command prompt and run the following command.\n\
    \n```\nPython OpenDomainQuestionAnsweringAPI.py\n```\n\nThis will start a service\
    \ on `http://127.0.0.1:5000/` as shown in Figure [5-24](#498208_1_En_5_Chapter.xhtml#Fig24).\n\
    \n```\nfrom flask import Flask, request\nimport json\nfrom OpenDomainQuestionAnsweringSystem.OpenDomainQA\
    \ import odqa_deeppavlov\napp=Flask(__name__)\n@route (\"/opendomainquestionAnswering\"\
    , methods=['POST'])\ndef opendomainquestionAnswering():\ntry:\njson_data = request.get_json(force=True)\n\
    questions = json_data['questions']\nanswers_list = odqa_deeppavlov(questions)\n\
    index = 0\nresult = []\nfor answer in answers_list:\nqa_dict = dict()\nqa_dict['answer']=answer\n\
    qa_dict['question']=questions[index]\nindex = index+1\nresult.append(qa_dict)\n\
    results = {'results':result}\nresults = json.dumps(results)\nreturn results\n\
    except Exception as e:\nreturn {\"Error\": str(e)}\nif __name__ == \"__main__\"\
    \ :\napp.run(debug=True,port=\"5000\")\n```\n\n5.  Now, to test this API, Postman\
    \ can be used. Please refer to the following URL and sample request JSON that\
    \ is being provided to the question answering API and response JSON that will\
    \ be received as a response from API, as shown in Figure [5-25](#498208_1_En_5_Chapter.xhtml#Fig25).\n\
    \n**URL:** `http://127.0.0.1:5000/opendomainquestionAnswering`\n\n**ODQA system\
    \ sample input request JSON:**\n\n```\n{\n\"questions\": [\n{\n\"question\": \"\
    Where did guinea pigs originate?\"\n},\n{\n\"question\": \"Who is virat kohli?\"\
    \n}\n]\n}\n```\n\n**ODQA system sample output response JSON:**\n\n```\n{\n\"results\"\
    : [\n{\n\"answer\": \"Andes of South America\",\n\"question\": \"Where did guinea\
    \ pigs originate?\"\n},\n{\n\"answer\": \"Indian international cricketer who currently\
    \ captains the India national team\",\n\"question\": \"Who is virat kohli?\"\n\
    }\n]\n}\n```\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig25_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig25_HTML.jpg)\n\
    \nFigure 5-25\n\nCalling the ODQA system API\n\nThe codebase for this exercise\
    \ can be downloaded from GitHub at `https://github.com/bertbook/Python_code/tree/master/Chapter5/OpenDomainQuestionAnsweringSystem`."
  raw: "#### Model Architecture\n\nThe architecture of the DeepPavlov ODQA system\
    \ consists of two components: a ranker and a reader. To find an answer to any\
    \ question, the ranker first retrieves a list of relevant articles from the collection\
    \ of documents, and then the reader scans them to identify an answer.\n\nThe ranker\
    \ component is based on the DrQA architecture proposed by Facebook Research. Specifically,\
    \ the DrQA approach uses unigram-bigram hashing and a TF-IDF algorithm to efficiently\
    \ return a subset of relevant articles based on a question. The reader component\
    \ is based on R-NET proposed by Microsoft Research Asia and implemented by Wenxuan\
    \ Zhou. The R-NET architecture is an end-to-end neural network model that aims\
    \ to answer questions based on a given document. R-NET first matches the question\
    \ and the document via gated attention-based recurrent networks to obtain a question-aware\
    \ document representation. Then, the self-matching attention mechanism refines\
    \ the representation by matching the document against itself, which effectively\
    \ encodes information from the whole document. Finally, pointer networks locate\
    \ the start and end index of the answer in the article. Figure [5-21](#498208_1_En_5_Chapter.xhtml#Fig21)\
    \ shows the logical flow of a DeepPavlov ODQA system.\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig21_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig21_HTML.jpg)\n\
    \nFigure 5-21\n\nThe DeepPavlov-based ODQA system architecture\n\nTo use this\
    \ model for an ODQA system, we have used the deeppavlov library in Python. Please\
    \ note that an ODQA system uses a corpus of Wikipedia articles or documents. Follow\
    \ these steps to configure and use an ODQA system.\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig22_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig22_HTML.jpg)\n\
    \nFigure 5-22\n\nInstalling deeppavlov library\n\n1.  Create a new Jupyter notebook\
    \ and run the following command to install the deeppavlov library, as shown in\
    \ Figure [5-22](#498208_1_En_5_Chapter.xhtml#Fig22).\n\n```\npip install deeppavlov\n\
    ```\n\n1.  Run the following command to install all required models, vocabulary,\
    \ and so on, trained on the Wikipedia corpus in the English language, as shown\
    \ in Figure [5-23](#498208_1_En_5_Chapter.xhtml#Fig23).\n\n```\n! python -m deeppavlov\
    \ install en_odqa_infer_wiki\n```\n\nNote\n\nPlease use the ‘!’ symbol before\
    \ the installation command as just shown if you are working with Colab Notebook.\n\
    \n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig23_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig23_HTML.jpg)\n\
    \nFigure 5-23\n\nInstalling required packages for deeppavlov\n\n1.  Perform the\
    \ necessary imports required for this implementation as shown here.\n\n1.  Then\
    \ we will get an ODQA model using the `build_model` class of the deeppavlov library.\
    \ It takes two arguments:\n    *   `config` **file path:** Define the name of\
    \ the `config` file that contains details of the relevant NLP model to be used.\
    \ For this case, we will use `en_odqa_infer_wiki`. This name implies the ODQA\
    \ model from Wikipedia.\n\n*   `download`**:** This will be `True` if the model\
    \ needs to be downloaded and `False` otherwise.\n\n```\nfrom deeppavlov import\
    \ configs\nfrom deeppavlov.core.commands.infer import build_model\n```\n\n1. \
    \ Once the ODQA model has been loaded, you can test this model by providing questions\
    \ such as “Who is Virat Kohli?” as shown here.\n\n```\nodqa = build_model(configs.odqa.en_odqa_infer_wiki,\
    \ download = True)\n```\n\n```\nquestions = [\"Where did guinea pigs originate?\"\
    , \"Who is virat kohli?\"]\nanswers = odqa(questions)\n```\n\nThe output of this\
    \ code will be the answer to questions asked from Wikipedia documents. Here is\
    \ the complete code for the ODQA system.\n\n```\nfrom deeppavlov import configs\n\
    from deeppavlov.core.commands.infer import build_model\ndef odqa_deeppavlov(questions):\n\
    odqa = build_model(configs.odqa.en_odqa_infer_wiki, download = True)\nresults\
    \ = odqa(questions)\nreturn results\nif __name__ == \"__main__\" :\nquestions\
    \ = [\"Where did guinea pigs originate?\", \"Who is virat kohli?\"]\nanswers =\
    \ odqa_deeppavlov(questions)\nprint(answers)\n```\n\nHere is the ouput:\n\n```\n\
    ['Andes of South America',  'Indian international cricketer who currently captains\
    \ the India national team']\n```\n\nNow, we have seen how an ODQA system can be\
    \ used for research or development purposes. Next, consider a scenario where you\
    \ need to deploy this feature to be consumed by some website or conversation system\
    \ to serve the end user who is looking for an answer to his or her query. In this\
    \ case, you need to release or expose features of the ODQA system as a REST API.\
    \ Now, follow these steps to release features of the question answering system\
    \ as a REST API.\n\n1.  Create a file named `OpenDomainQuestionAnsweringAPI`.\n\
    \n2.  Copy the following code and paste it in that file, then save it.\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig24_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig24_HTML.jpg)\n\
    \nFigure 5-24\n\nService deployment\n\n1.  This code processes input passed to\
    \ an API, calls a function `odqa_deeppavlov`, and sends a response from this function\
    \ as an API response.\n\n2.  Open a command prompt and run the following command.\n\
    \n`Python OpenDomainQuestionAnsweringAPI.py`\n\nThis will start a service on [`http://127.0.0.1:5000/`](http://127.0.0.1:5000/)\
    \ as shown in Figure [5-24](#498208_1_En_5_Chapter.xhtml#Fig24).\n\n```\nfrom\
    \ flask import Flask, request\nimport json\nfrom OpenDomainQuestionAnsweringSystem.OpenDomainQA\
    \ import odqa_deeppavlov\napp=Flask(__name__)\n@route (\"/opendomainquestionAnswering\"\
    , methods=['POST'])\ndef opendomainquestionAnswering():\ntry:\njson_data = request.get_json(force=True)\n\
    questions = json_data['questions']\nanswers_list = odqa_deeppavlov(questions)\n\
    index = 0\nresult = []\nfor answer in answers_list:\nqa_dict = dict()\nqa_dict['answer']=answer\n\
    qa_dict['question']=questions[index]\nindex = index+1\nresult.append(qa_dict)\n\
    results = {'results':result}\nresults = json.dumps(results)\nreturn results\n\
    except Exception as e:\nreturn {\"Error\": str(e)}\nif __name__ == \"__main__\"\
    \ :\napp.run(debug=True,port=\"5000\")\n```\n\n1.  Now, to test this API, Postman\
    \ can be used. Please refer to the following URL and sample request JSON that\
    \ is being provided to the question answering API and response JSON that will\
    \ be received as a response from API, as shown in Figure [5-25](#498208_1_En_5_Chapter.xhtml#Fig25).\n\
    \n**URL:** [`http://127.0.0.1:5000/opendomainquestionAnswering`](http://127.0.0.1:5000/opendomainquestionAnswering%2520)\n\
    \n**ODQA system sample input request JSON:**\n\n```\n{\n\"questions\": [\n{\n\"\
    question\": \"Where did guinea pigs originate?\"\n},\n{\n\"question\": \"Who is\
    \ virat kohli?\"\n}\n]\n}\n```\n\n**ODQA system sample output response JSON:**\n\
    \n```\n{\n\"results\": [\n{\n\"answer\": \"Andes of South America\",\n\"question\"\
    : \"Where did guinea pigs originate?\"\n},\n{\n\"answer\": \"Indian international\
    \ cricketer who currently captains the India national team\",\n\"question\": \"\
    Who is virat kohli?\"\n}\n]\n}\n```\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig25_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig25_HTML.jpg)\n\
    \nFigure 5-25\n\nCalling the ODQA system API\n\nThe codebase for this exercise\
    \ can be downloaded from GitHub at [`https://github.com/bertbook/Python_code/tree/master/Chapter5/OpenDomainQuestionAnsweringSystem`](https://github.com/bertbook/Python_code/tree/master/Chapter5/OpenDomainQuestionAnsweringSystem)`.`"
  trans: "\n### 模型架构\n\nDeepPavlov ODQA 系统的架构由两个组件构成：一个排序器和一个阅读器。为了找到任何问题的答案，排序器首先从文档集合中检索出相关文章列表，然后阅读器扫描这些文章以识别答案。\n\
    \n排序器组件基于 Facebook Research 提出的 DrQA 架构。具体来说，DrQA 方法使用一元-二元哈希和 TF-IDF 算法，根据问题高效地返回相关文章的子集。阅读器组件基于微软亚洲研究院提出并由\
    \ Wenxuan Zhou 实现的 R-NET 架构。R-NET 架构是一个端到端的神经网络模型，旨在根据给定的文档回答问题。R-NET 首先通过基于门控注意力的循环网络匹配问题和文档，以获得问题感知的文档表示。然后，自匹配注意力机制通过将文档与自身进行匹配来优化表示，从而有效地编码整个文档的信息。最后，指针网络定位答案在文章中的起始和结束索引。图\
    \ 5-21 展示了 DeepPavlov ODQA 系统的逻辑流程。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig21_HTML.jpg](img/498208_1_En_5_Fig21_HTML.jpg)\n\
    \n图 5-21\n\n基于 DeepPavlov 的 ODQA 系统架构\n\n为了将此模型用于 ODQA 系统，我们使用了 Python 中的 `deeppavlov`\
    \ 库。请注意，ODQA 系统使用维基百科文章或文档的语料库。请按照以下步骤配置和使用 ODQA 系统。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig22_HTML.jpg](img/498208_1_En_5_Fig22_HTML.jpg)\n\
    \n图 5-22\n\n安装 `deeppavlov` 库\n\n1.  创建一个新的 Jupyter notebook，并运行以下命令来安装 `deeppavlov`\
    \ 库，如图 5-22 所示。\n\n```\npip install deeppavlov\n```\n\n2.  运行以下命令来安装所有必需的模型、词汇表等，这些模型基于英文维基百科语料库训练，如图\
    \ 5-23 所示。\n\n```\n! python -m deeppavlov install en_odqa_infer_wiki\n```\n\n\
    > **注意：** 如果你使用的是 Colab Notebook，请像上面那样在安装命令前加上 `!` 符号。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig23_HTML.jpg](img/498208_1_En_5_Fig23_HTML.jpg)\n\
    \n图 5-23\n\n为 `deeppavlov` 安装所需包\n\n3.  执行此实现所需的必要导入，如下所示。\n\n```\nfrom deeppavlov\
    \ import configs\nfrom deeppavlov.core.commands.infer import build_model\n```\n\
    \n4.  然后，我们将使用 `deeppavlov` 库的 `build_model` 类获取一个 ODQA 模型。它接受两个参数：\n    *   `config`\
    \ 文件路径：定义包含要使用的相关 NLP 模型详细信息的 `config` 文件名称。在本例中，我们将使用 `en_odqa_infer_wiki`。此名称表示来自维基百科的\
    \ ODQA 模型。\n    *   `download`：如果需要下载模型，则为 `True`，否则为 `False`。\n\n5.  一旦 ODQA\
    \ 模型加载完毕，你可以通过提供诸如“谁是维拉特·科利？”之类的问题来测试该模型，如下所示。\n\n```\nodqa = build_model(configs.odqa.en_odqa_infer_wiki,\
    \ download = True)\n```\n\n```\nquestions = [\"Where did guinea pigs originate?\"\
    , \"Who is virat kohli?\"]\nanswers = odqa(questions)\n```\n\n这段代码的输出将是来自维基百科文档的问题的答案。以下是\
    \ ODQA 系统的完整代码。\n\n```\nfrom deeppavlov import configs\nfrom deeppavlov.core.commands.infer\
    \ import build_model\ndef odqa_deeppavlov(questions):\nodqa = build_model(configs.odqa.en_odqa_infer_wiki,\
    \ download = True)\nresults = odqa(questions)\nreturn results\nif __name__ ==\
    \ \"__main__\" :\nquestions = [\"Where did guinea pigs originate?\", \"Who is\
    \ virat kohli?\"]\nanswers = odqa_deeppavlov(questions)\nprint(answers)\n```\n\
    \n以下是输出：\n\n```\n['Andes of South America',  'Indian international cricketer who\
    \ currently captains the India national team']\n```\n\n现在，我们已经了解了如何将 ODQA 系统用于研究或开发目的。接下来，考虑一个场景，你需要部署此功能以供某个网站或对话系统使用，从而为正在寻找问题答案的最终用户提供服务。在这种情况下，你需要将\
    \ ODQA 系统的功能作为 REST API 发布或暴露出来。现在，按照以下步骤将问答系统的功能作为 REST API 发布。\n\n1.  创建一个名为\
    \ `OpenDomainQuestionAnsweringAPI` 的文件。\n\n2.  复制以下代码并粘贴到该文件中，然后保存。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig24_HTML.jpg](img/498208_1_En_5_Fig24_HTML.jpg)\n\
    \n图 5-24\n\n服务部署\n\n3.  此代码处理传递给 API 的输入，调用 `odqa_deeppavlov` 函数，并将该函数的响应作为 API\
    \ 响应发送。\n\n4.  打开命令提示符并运行以下命令。\n\n```\nPython OpenDomainQuestionAnsweringAPI.py\n\
    ```\n\n这将在 `http://127.0.0.1:5000/` 上启动一个服务，如图 5-24 所示。\n\n```\nfrom flask import\
    \ Flask, request\nimport json\nfrom OpenDomainQuestionAnsweringSystem.OpenDomainQA\
    \ import odqa_deeppavlov\napp=Flask(__name__)\n@route (\"/opendomainquestionAnswering\"\
    , methods=['POST'])\ndef opendomainquestionAnswering():\ntry:\njson_data = request.get_json(force=True)\n\
    questions = json_data['questions']\nanswers_list = odqa_deeppavlov(questions)\n\
    index = 0\nresult = []\nfor answer in answers_list:\nqa_dict = dict()\nqa_dict['answer']=answer\n\
    qa_dict['question']=questions[index]\nindex = index+1\nresult.append(qa_dict)\n\
    results = {'results':result}\nresults = json.dumps(results)\nreturn results\n\
    except Exception as e:\nreturn {\"Error\": str(e)}\nif __name__ == \"__main__\"\
    \ :\napp.run(debug=True,port=\"5000\")\n```\n\n5.  现在，要测试此 API，可以使用 Postman。请参考以下\
    \ URL 和提供给问答 API 的示例请求 JSON，以及将从 API 接收到的响应 JSON，如图 5-25 所示。\n\n**URL:** `http://127.0.0.1:5000/opendomainquestionAnswering`\n\
    \n**ODQA 系统示例输入请求 JSON：**\n\n```\n{\n\"questions\": [\n{\n\"question\": \"Where\
    \ did guinea pigs originate?\"\n},\n{\n\"question\": \"Who is virat kohli?\"\n\
    }\n]\n}\n```\n\n**ODQA 系统示例输出响应 JSON：**\n\n```\n{\n\"results\": [\n{\n\"answer\"\
    : \"Andes of South America\",\n\"question\": \"Where did guinea pigs originate?\"\
    \n},\n{\n\"answer\": \"Indian international cricketer who currently captains the\
    \ India national team\",\n\"question\": \"Who is virat kohli?\"\n}\n]\n}\n```\n\
    \n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig25_HTML.jpg](img/498208_1_En_5_Fig25_HTML.jpg)\n\
    \n图 5-25\n\n调用 ODQA 系统 API\n\n本练习的代码库可以从 GitHub 的 `https://github.com/bertbook/Python_code/tree/master/Chapter5/OpenDomainQuestionAnsweringSystem`\
    \ 下载。\n"
- fmt: "### DeepPavlov QA System\n\nIn the previous section, we discussed how an ODQA\
    \ system that has been trained on Wikipedia documents can be used to answer factoid\
    \ and non-factoid questions. Next, we look at how DeepPavlov can be used for an\
    \ implementation of a contextual-based question answering system where an answer\
    \ to the question exists in context. As an example, consider the following context\
    \ and question from a Wikipedia article.\n\n**Context:** In 1888, The Football\
    \ League was founded in England, becoming the first of many professional football\
    \ competitions. During the 20th century, several of the various kinds of football\
    \ grew to become some of the most popular team sports in the world.\n\n**Question:**\
    \ In which year was the Football League founded?\n\n**Answer:** 1888\n\nPlease\
    \ follow these steps to implement a contextual-based question answering system.\n\
    \n1.  Create a new Jupyter notebook and run the following command to install the\
    \ `deeppavlov` library.\n2.  Run the following command to install all required\
    \ models, vocabulary, and so on.\n\n```\npip install deeppavlov\n```\n\n```\n\
    ! python -m deeppavlov install squad_bert\n```\n\n**Note:** Please use the `!`\
    \ symbol before the installation command as just shown if you are working with\
    \ Colab Notebook.\n\n3.  Import the required packages as shown here.\n4.  Then\
    \ we will get the BERT model using the `build_model` class of the `deeppavlov`\
    \ library. It takes two arguments:\n    *   **config file path:** Define the name\
    \ of the `config` file that contains details of the relevant NLP model to be used.\
    \ For this case, we will use `squad_bert`. This configuration contains all details\
    \ for the specific BERT model that has been trained over the SQuAD dataset.\n\
    \    *   `download:` This is `True` if the model needs to be downloaded and `False`\
    \ otherwise.\n\n```\nfrom deeppavlov import configs, build_model\n```\n\n5.  Once\
    \ the BERT model has been loaded, you can test it by providing a question along\
    \ with the context to extract an answer, as shown here.\n\n```\nodqa = build_model(configs.squad.squad_bert,\
    \ download = True)\n```\n\n6.  The output of this code snippet will be the answer\
    \ extracted from the context for the question asked.\n\n```\ncontext = \" In 1888,\
    \ The Football League was founded in England, becoming the first of many professional\
    \ football competitions. During the 20th century, several of the various kinds\
    \ of football grew to become some of the most popular team sports in the world.\"\
    \nquestion = \"In which year the Football league was founded?\"\nanswers = qa_\
    \ deeppavlov (context, question)\n```\n\nHere is the complete Python code that\
    \ shows an implementation of a contextual CDQA system.\n\n```\nfrom deeppavlov\
    \ import build_model, configs\ndef qa_deeppavlov(question, context):\nmodel =\
    \ build_model(configs.squad.squad_bert, download=True)\nresult = model([context],\
    \ [question])\nreturn result [0]\nif __name__==\"__main__\":\ncontext = \"In 1888,\
    \ The Football League was founded in England, becoming the first of many professional\
    \ football competitions. During the 20th century, several of the various kinds\
    \ of football grew to become some of the most popular team sports in the world.\"\
    \nquestion = \"In which year the Football league was founded?\"\nanswers = qa_deeppavlov\
    \ (context, question)\nprint(answers)\n```\n\nHere is the output:\n\n```\n\n```\n\
    \nNow, we have seen how a contextual-based question answering system (another\
    \ variation of BERT) can be used for research or development purposes. Next, consider\
    \ a scenario where you need to deploy this feature to be consumed by some website\
    \ or conversation system to serve the end user who is looking for an answer to\
    \ his or her query. In this case, you need to release or expose features of the\
    \ ODQA system as a REST API. Follow the steps given here to release features of\
    \ the question answering system as a REST API.\n\n1.  Create a file named `DeepPavlovQASystemAPI`.\n\
    2.  Copy the following code and paste in that file, then save it.\n3.  This code\
    \ processes input passed to an API, calls a function `qa_deeppavlov`, and sends\
    \ a response from this function as an API response.\n4.  Open a command prompt\
    \ and run the following command.\n\n```\nfrom flask import Flask, request\nfrom\
    \ DeeppavlovQASystem.QA_Deepplavlov import qa_deeppavlov\nimport json\napp=Flask(__name__)\n\
    @app.route (\"/qaDeepPavlov\", methods=['POST'])\ndef qaDeepPavlov():\ntry:\n\
    json_data = request.get_json(force=True)\nquery = json_data['query']\ncontext_list\
    \ = json_data['context_list']\nresult = []\nfor val in context_list:\ncontext\
    \ = val['context']\ncontext = context.replace(\"\\n\",\" \")\nanswer_json_final\
    \ = dict()\nanswer = qa_deeppavlov(context, query)\nanswer_json_final['answer']\
    \ = answer\nanswer_json_final['id'] = val['id']\nanswer_json_final['question']\
    \ = query\nresult.append(answer_json_final)\nresult = json.dumps(result)\nreturn\
    \ result\nexcept Exception as e:\nreturn {\"Error\": str(e)}\n```\n\n```\nPython\
    \ DeepPavlovQASystemAPI.py\n```\n\nThis will start a service on `http://127.0.0.1:5000/`\
    \ as shown in Figure 5-26.\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig26_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig26_HTML.jpg)\n\
    \n**Figure 5-26** Service deployment\n\n5.  Now, to test this API, Postman can\
    \ be used. Please refer to the following URL and sample request JSON that is being\
    \ provided to the DeepPavlov QA API end and response JSON that will be received\
    \ as a response from the API as shown in Figure 5-27.\n\n**URL:** `http://127.0.0.1:5000/qaDeepPavlov`\n\
    \n**DeepPavlov QA system sample input request JSON:**\n\n```\n{\n\"query\": \"\
    In which year the Football league was founded?\",\n\"context_list\": [\n{\n\"\
    id\": 1,\n\"context\": \"In 1888, The Football League was founded in England,\
    \ becoming the first of many professional football competitions. During the 20th\
    \ century, several of the various kinds of football grew to become some of the\
    \ most popular team sports in the world\"\n}\n]\n}\n```\n\n**DeepPavlov QA system\
    \ sample output response JSON:**\n\n```\n{\n\"results\": [\n{\n\"answer\": \"\
    1888\",\n\"id\": 1,\n\"question\": \"In which year the Football league was founded?\"\
    \n}\n]\n}\n```\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig27_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig27_HTML.jpg)\n\
    \n**Figure 5-27** Calling DeepPavlov QA system API\n\nThe codebase for this exercise\
    \ can be downloaded from GitHub at `https://github.com/bertbook/Python_code/tree/master/Chapter5/DeeppavlovQASystem`.\n\
    \n## Conclusion\n\nThis chapter covered the question answering system, which is\
    \ one of the important applications of the BERT model. We learned about types\
    \ of question answering Systems like CDQA and ODQA. We built a question answering\
    \ system using BERT and deployed it as an API for use by a third-party system.\
    \ In the next chapter, we look at how BERT is used in other NLP tasks.\n\n# 6.\
    \ BERT Model Applications: Other Tasks\n\nIn the last chapter, we learned about\
    \ BERT and its usage in the design of a question answering system. This chapter\
    \ discusses how BERT can be used for implementation of other NLP tasks such as\
    \ text classification, named entity recognition, language translation, and more.\n\
    \nBERT has performed well in many benchmark datasets for various NLP tasks such\
    \ as SQuAD (question answering dataset), Natural Questions (question answering\
    \ dataset for factoid and non-factoid questions), the IMDB movie review dataset\
    \ (classification data), and so on. Now, we will see how a BERT-based model trained\
    \ on these benchmarked datasets can be used as pretrained model for the following\
    \ NLP tasks.\n\n*   Sentiment analysis\n*   Named entity recognition\n*   Text\
    \ classification\n*   Text summarization\n\nWe introduce these topics and then\
    \ take a looked at their implementation."
  raw: "### DeepPavlov QA System\n\nIn the previous section , we discussed how an\
    \ ODQA system that has been trained on Wikipedia documents can be used to answer\
    \ factoid and non-factoid questions. Next, we look at how DeepPavlov can be used\
    \ for an implementation of a contextual-based question answering system where\
    \ an answer to the question exists in context. As an example, consider the following\
    \ context and question from a Wikipedia article.\n\n**Context:** In 1888, The\
    \ Football League was founded in England, becoming the first of many professional\
    \ football competitions. During the 20th century, several of the various kinds\
    \ of football grew to become some of the most popular team sports in the world.\n\
    \n**Question:** In which year was the Football League founded?\n\n**Answer:**\
    \ 1888\n\nPlease follow these steps to implement a contextual-based question answering\
    \ system.\n\n1.  Create a new Jupyter notebook and run the following command to\
    \ install the deeppavlov library.\n\n1.  Run the following command to install\
    \ all required models, vocabulary, and so on.\n\n```\npip install deeppavlov\n\
    ```\n\n```\n! python -m deeppavlov install squad_bert\n```\n\nNote\n\nPlease use\
    \ the ‘!’ symbol before the installation command as just shown if you are working\
    \ with Colab Notebook.\n\n1.  Import the required packages as shown here.\n\n\
    1.  Then we will get the BERT model using the `build_model` class of the deeppavlov\
    \ library. It takes two arguments:\n    *   **config** **file path:** Define the\
    \ name of the `config` file that contains details of the relevant NLP model to\
    \ be used. For this case, we will use `squad_bert`. This configuration contains\
    \ all details for the specific BERT model that has been trained over the SQuAD\
    \ dataset.\n\n*   `download:` This is `True` if the model needs to be downloaded\
    \ and `False` otherwise.\n\n```\nfrom deeppavlov import configs, build_model\n\
    ```\n\n1.  Once the BERT model has been loaded, you can test it by providing a\
    \ question along with the context to extract an answer, as shown here.\n\n```\n\
    odqa = build_model(configs.squad.squad_bert, download = True)\n```\n\n1.  The\
    \ output of this code snippet will be the answer extracted from the context for\
    \ the question asked.\n\n```\ncontext = \" In 1888, The Football League was founded\
    \ in England, becoming the first of many professional football competitions. During\
    \ the 20th century, several of the various kinds of football grew to become some\
    \ of the most popular team sports in the world.\"\nquestion = \"In which year\
    \ the Football league was founded?\"\nanswers = qa_ deeppavlov (context, question)\n\
    ```\n\nHere is the complete Python code that shows an implementation of a contextual\
    \ CDQA system.\n\n```\nfrom deeppavlov import build_model, configs\ndef qa_deeppavlov(question,\
    \ context):\nmodel = build_model(configs.squad.squad_bert, download=True)\nresult\
    \ = model([context], [question])\nreturn result [0]\nif __name__==\"__main__\"\
    :\ncontext = \"In 1888, The Football League was founded in England, becoming the\
    \ first of many professional football competitions. During the 20th century, several\
    \ of the various kinds of football grew to become some of the most popular team\
    \ sports in the world.\"\nquestion = \"In which year the Football league was founded?\"\
    \nanswers = qa_deeppavlov (context, question)\nprint(answers)\n```\n\nHere is\
    \ the output:\n\n```\n\n```\n\nNow, we have seen how a contextual-based question\
    \ answering system (another variation of BERT) can be used for research or development\
    \ purposes. Next, consider a scenario where you need to deploy this feature to\
    \ be consumed by some website or conversation system to serve the end user who\
    \ is looking for an answer to his or her query. In this case, you need to release\
    \ or expose features of the ODQA system as a REST API. Follow the steps given\
    \ here to release features of the question answering system as a REST API.\n\n\
    1.  Create a file named `DeepPavlovQASystemAPI`.\n\n2.  Copy the following code\
    \ and paste in that file, then save it.\n\n1.  This code processes input passed\
    \ to an API, calls a function `qa_deeppavlov`, and sends a response from this\
    \ function as an API response.\n\n2.  Open a command prompt and run the following\
    \ command.\n\n```\nfrom flask import Flask, request\nfrom DeeppavlovQASystem.QA_Deepplavlov\
    \ import qa_deeppavlov\nimport json\napp=Flask(__name__)\n@app.route (\"/qaDeepPavlov\"\
    , methods=['POST'])\ndef qaDeepPavlov():\ntry:\njson_data = request.get_json(force=True)\n\
    query = json_data['query']\ncontext_list = json_data['context_list']\nresult =\
    \ []\nfor val in context_list:\ncontext = val['context']\ncontext = context.replace(\"\
    \\n\",\" \")\nanswer_json_final = dict()\nanswer = qa_deeppavlov(context, query)\n\
    answer_json_final['answer'] = answer\nanswer_json_final['id'] = val['id']\nanswer_json_final['question']\
    \ = query\nresult.append(answer_json_final)\nresult = json.dumps(result)\nreturn\
    \ result\nexcept Exception as e:\nreturn {\"Error\": str(e)}\n```\n\n```\nPython\
    \ DeepPavlovQASystemAPI.py\n```\n\nThis will start a service on [`http://127.0.0.1:5000/`](http://127.0.0.1:5000/)\
    \ as shown in Figure [5-26](#498208_1_En_5_Chapter.xhtml#Fig26).\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig26_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig26_HTML.jpg)\n\
    \nFigure 5-26\n\nService deployment\n\n1.  Now, to test this API, Postman can\
    \ be used. Please refer to the following URL and sample request JSON that is being\
    \ provided to the DeepPavlov QA API end and response JSON that will be received\
    \ as a response from the API as shown in Figure [5-27](#498208_1_En_5_Chapter.xhtml#Fig27).\n\
    \n**URL:** [`http://127.0.0.1:5000/qaDeepPavlov`](http://127.0.0.1:5000/qaDeepPavlov%2520)\n\
    \n**DeepPavlov QA system sample input request JSON:**\n\n```\n{\n\"query\": \"\
    In which year the Football league was founded?\",\n\"context_list\": [\n{\n\"\
    id\": 1,\n\"context\": \"In 1888, The Football League was founded in England,\
    \ becoming the first of many professional football competitions. During the 20th\
    \ century, several of the various kinds of football grew to become some of the\
    \ most popular team sports in the world\"\n}\n]\n}\n```\n\n**DeepPavlov QA system\
    \ sample output response JSON:**\n\n```\n{\n\"results\": [\n{\n\"answer\": \"\
    1888\",\n\"id\": 1,\n\"question\": \"In which year the Football league was founded?\"\
    \n}\n]\n}\n```\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig27_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig27_HTML.jpg)\n\
    \nFigure 5-27\n\nCalling DeepPavlov QA system API\n\nThe codebase for this exercise\
    \ can be downloaded from GitHub at [`https://github.com/bertbook/Python_code/tree/master/Chapter5/DeeppavlovQASystem`](https://github.com/bertbook/Python_code/tree/master/Chapter5/DeeppavlovQASystem).\n\
    \n## Conclusion\n\nThis chapter covered the question answering system, which is\
    \ one of the important applications of the BERT model. We learned about types\
    \ of question answering Systems like CDQA and ODQA. We built a question answering\
    \ system using BERT and deployed it as an API for use by a third-party system.\
    \ In the next chapter, we look at how BERT is used in other NLP tasks.\n\n# 6. BERT\
    \ Model Applications: Other Tasks\n\nIn the last chapter, we learned about BERT\
    \ and its usage in the design of a question answering system. This chapter discusses\
    \ how BERT can be used for implementation of other NLP tasks such as text classification,\
    \ named entity recognition, language translation, and more.\n\nBERT has performed\
    \ well in many benchmark datasets for various NLP tasks such as SQuAD (question\
    \ answering dataset), Natural Questions (question answering dataset for factoid\
    \ and non-factoid questions), the IMDB movie review dataset (classification data),\
    \ and so on. Now, we will see how a BERT-based model trained on these benchmarked\
    \ datasets can be used as pretrained model for the following NLP tasks.\n\n* \
    \  Sentiment analysis\n\n*   Named entity recognition\n\n*   Text classification\n\
    \n*   Text summarization\n\nWe introduce these topics and then take a looked at\
    \ their implementation."
  trans: "\n### DeepPavlov 问答系统\n\n在上一节中，我们讨论了如何使用在维基百科文档上训练过的 ODQA 系统来回答事实型和非事实型问题。接下来，我们将探讨如何利用\
    \ DeepPavlov 实现一个基于上下文的问答系统，该系统中问题的答案存在于给定的上下文里。例如，考虑以下来自维基百科文章的上下文和问题。\n\n**上下文：**\
    \ 1888 年，英格兰成立了足球联赛，成为众多职业足球比赛中的第一个。在 20 世纪，几种不同类型的足球运动逐渐发展成为世界上最受欢迎的团队运动之一。\n\
    \n**问题：** 足球联赛是哪一年成立的？\n\n**答案：** 1888\n\n请按照以下步骤实现一个基于上下文的问答系统。\n\n1.  创建一个新的\
    \ Jupyter notebook，并运行以下命令来安装 `deeppavlov` 库。\n2.  运行以下命令来安装所有必需的模型、词汇表等。\n\n\
    ```\npip install deeppavlov\n```\n\n```\n! python -m deeppavlov install squad_bert\n\
    ```\n\n**注意：** 如果你使用的是 Colab Notebook，请像上面那样在安装命令前加上 `!` 符号。\n\n3.  如下所示导入所需的包。\n\
    4.  然后，我们将使用 `deeppavlov` 库的 `build_model` 类来获取 BERT 模型。它需要两个参数：\n    *   **配置文件路径：**\
    \ 定义包含要使用的相关 NLP 模型详细信息的 `config` 文件的名称。在本例中，我们将使用 `squad_bert`。此配置包含了在 SQuAD\
    \ 数据集上训练过的特定 BERT 模型的所有详细信息。\n    *   `download:` 如果需要下载模型，则此参数为 `True`，否则为 `False`。\n\
    \n```\nfrom deeppavlov import configs, build_model\n```\n\n5.  一旦 BERT 模型加载完毕，你可以通过提供一个问题和上下文来提取答案，从而测试它，如下所示。\n\
    \n```\nodqa = build_model(configs.squad.squad_bert, download = True)\n```\n\n\
    6.  这段代码片段的输出将是从上下文中为所提问题提取的答案。\n\n```\ncontext = \" 1888 年，英格兰成立了足球联赛，成为众多职业足球比赛中的第一个。在\
    \ 20 世纪，几种不同类型的足球运动逐渐发展成为世界上最受欢迎的团队运动之一。\"\nquestion = \"足球联赛是哪一年成立的？\"\nanswers\
    \ = qa_ deeppavlov (context, question)\n```\n\n以下是展示基于上下文的 CDQA 系统实现的完整 Python\
    \ 代码。\n\n```\nfrom deeppavlov import build_model, configs\ndef qa_deeppavlov(question,\
    \ context):\nmodel = build_model(configs.squad.squad_bert, download=True)\nresult\
    \ = model([context], [question])\nreturn result [0]\nif __name__==\"__main__\"\
    :\ncontext = \"1888 年，英格兰成立了足球联赛，成为众多职业足球比赛中的第一个。在 20 世纪，几种不同类型的足球运动逐渐发展成为世界上最受欢迎的团队运动之一。\"\
    \nquestion = \"足球联赛是哪一年成立的？\"\nanswers = qa_deeppavlov (context, question)\nprint(answers)\n\
    ```\n\n以下是输出结果：\n\n```\n\n```\n\n现在，我们已经了解了如何将基于上下文的问答系统（BERT 的另一种变体）用于研究或开发目的。接下来，考虑一个场景，你需要部署此功能，供某个网站或对话系统使用，以服务于正在寻找问题答案的最终用户。在这种情况下，你需要将\
    \ ODQA 系统的功能作为 REST API 发布或暴露出来。按照以下步骤将问答系统的功能作为 REST API 发布。\n\n1.  创建一个名为 `DeepPavlovQASystemAPI`\
    \ 的文件。\n2.  复制以下代码并粘贴到该文件中，然后保存。\n3.  此代码处理传递给 API 的输入，调用 `qa_deeppavlov` 函数，并将该函数的响应作为\
    \ API 响应发送。\n4.  打开命令提示符并运行以下命令。\n\n```\nfrom flask import Flask, request\nfrom\
    \ DeeppavlovQASystem.QA_Deepplavlov import qa_deeppavlov\nimport json\napp=Flask(__name__)\n\
    @app.route (\"/qaDeepPavlov\", methods=['POST'])\ndef qaDeepPavlov():\ntry:\n\
    json_data = request.get_json(force=True)\nquery = json_data['query']\ncontext_list\
    \ = json_data['context_list']\nresult = []\nfor val in context_list:\ncontext\
    \ = val['context']\ncontext = context.replace(\"\\n\",\" \")\nanswer_json_final\
    \ = dict()\nanswer = qa_deeppavlov(context, query)\nanswer_json_final['answer']\
    \ = answer\nanswer_json_final['id'] = val['id']\nanswer_json_final['question']\
    \ = query\nresult.append(answer_json_final)\nresult = json.dumps(result)\nreturn\
    \ result\nexcept Exception as e:\nreturn {\"Error\": str(e)}\n```\n\n```\nPython\
    \ DeepPavlovQASystemAPI.py\n```\n\n这将在 `http://127.0.0.1:5000/` 上启动一个服务，如图 5-26\
    \ 所示。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig26_HTML.jpg](img/498208_1_En_5_Fig26_HTML.jpg)\n\
    \n**图 5-26** 服务部署\n\n5.  现在，要测试此 API，可以使用 Postman。请参考以下 URL 和提供给 DeepPavlov QA\
    \ API 端的示例请求 JSON，以及将从 API 接收到的响应 JSON，如图 5-27 所示。\n\n**URL：** `http://127.0.0.1:5000/qaDeepPavlov`\n\
    \n**DeepPavlov QA 系统示例输入请求 JSON：**\n\n```\n{\n\"query\": \"足球联赛是哪一年成立的？\",\n\"\
    context_list\": [\n{\n\"id\": 1,\n\"context\": \"1888 年，英格兰成立了足球联赛，成为众多职业足球比赛中的第一个。在\
    \ 20 世纪，几种不同类型的足球运动逐渐发展成为世界上最受欢迎的团队运动之一。\"\n}\n]\n}\n```\n\n**DeepPavlov QA 系统示例输出响应\
    \ JSON：**\n\n```\n{\n\"results\": [\n{\n\"answer\": \"1888\",\n\"id\": 1,\n\"\
    question\": \"足球联赛是哪一年成立的？\"\n}\n]\n}\n```\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig27_HTML.jpg](img/498208_1_En_5_Fig27_HTML.jpg)\n\
    \n**图 5-27** 调用 DeepPavlov QA 系统 API\n\n本练习的代码库可以从 GitHub 下载，地址为 `https://github.com/bertbook/Python_code/tree/master/Chapter5/DeeppavlovQASystem`。\n\
    \n## 结论\n\n本章涵盖了问答系统，这是 BERT 模型的重要应用之一。我们了解了问答系统的类型，如 CDQA 和 ODQA。我们使用 BERT 构建了一个问答系统，并将其作为\
    \ API 部署，供第三方系统使用。在下一章中，我们将探讨 BERT 如何用于其他 NLP 任务。\n\n# 6. BERT 模型应用：其他任务\n\n在上一章中，我们学习了\
    \ BERT 及其在问答系统设计中的用法。本章将讨论 BERT 如何用于实现其他 NLP 任务，例如文本分类、命名实体识别、语言翻译等。\n\nBERT 在许多针对各种\
    \ NLP 任务的基准数据集上表现良好，例如 SQuAD（问答数据集）、Natural Questions（用于事实型和非事实型问题的问答数据集）、IMDB\
    \ 电影评论数据集（分类数据）等。现在，我们将看到如何将在这些基准数据集上训练的基于 BERT 的模型用作以下 NLP 任务的预训练模型。\n\n*   情感分析\n\
    *   命名实体识别\n*   文本分类\n*   文本摘要\n\n我们将介绍这些主题，然后探讨它们的实现。\n"
- fmt: "# Sentiment Analysis\n\nSentiment analysis is a subfield of NLP that identifies\
    \ opinions or sentiments of given text across blogs, reviews, news, and so on.\
    \ It can inform businesses about acceptance of their products and consumer sentiments\
    \ toward the same. It is also useful to identify hate speech and other issues\
    \ over social media to identify the population’s mood toward a given topic of\
    \ discussion. Sentiment analysis can even help companies plan product releases\
    \ on the basis of consumer opinion about particular topics in particular demographic\
    \ regions.\n\nFor this book, we have used a sentiment analysis model that has\
    \ been trained using BERT, which uses a dataset in `.csv` format where each data\
    \ point is pair of sentences and its opinion (i.e., not insult, insult). For inference,\
    \ the system processes a user’s query and provides a sentiment for the same.\n\
    \nPlease follow these steps to implement a sentiment analysis system.\n\n1. Create\
    \ a new Jupyter notebook as covered previously and run the following command to\
    \ install the `deeppavlov` library (if you didn’t do so in Chapter [5](#498208_1_En_5_Chapter.xhtml)).\n\
    \n```\n! pip install deeppavlov\n```\n\nOnce it is installed, you will see the\
    \ output shown in Figure [6-1](#498208_1_En_6_Chapter.xhtml#Fig1).\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig1_HTML.jpg](images/498208_1_En_6_Chapter/498208_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1 Installation of `deeppavlov`\n\n2. Because we are going to use sentiment\
    \ analysis, we will use a model that has been trained on sentiment data. Run the\
    \ following command to download a trained model, `insults_kaggle_bert`.\n\n```\n\
    ! python -m deeppavlov install insults_kaggle_bert\n```\n\nNote: Please use the\
    \ `!` symbol before the installation command as just shown if you are working\
    \ with Colab Notebook.\n\nOnce it is installed, you will see the output shown\
    \ in Figure [6-2](#498208_1_En_6_Chapter.xhtml#Fig2).\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig2_HTML.jpg](images/498208_1_En_6_Chapter/498208_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2 Installation of packages\n\n3. Perform the necessary imports as required\
    \ for this implementation using this command.\n\n```\nfrom deeppavlov import build_model,\
    \ configs\n```\n\n4. Then we will get a sentiment analysis model using the `build_model`\
    \ class of the `deeppavlov` library. It takes two arguments:\n   - **config file\
    \ path:** Define the name of the `config` file that contains details of the relevant\
    \ NLP model to be used. For this case, we will use `insults_kaggle_bert`. This\
    \ contains the configuration required to use the sentiment model.\n   - **download:**\
    \ This is `True` if the model needs to be downloaded, and `False` otherwise. Because\
    \ we are doing this for the first time, the value of this argument will be `True`.\n\
    \n```\nsentiment_model = build_model(configs.classifiers.insults_kaggle_bert,\
    \ download=True)\n```\n\n5. Once the sentiment model has been loaded, you can\
    \ test this model by asking questions such as “You are so dumb!,” “This movie\
    \ is good,” and so on, and passing these questions as an argument to the `sentiment_model`\
    \ function shown here.\n\n```\ntest_input = ['This movie is good', 'You are so\
    \ dumb!']\nresults = sentiment_model(test_input)\n```\n\nThe output of this code\
    \ segment will be `Not Insult` or `Insult` depending on the question asked. Here\
    \ is the complete end-to-end codebase to use sentiment analysis.\n\n```\nfrom\
    \ deeppavlov import build_model, configs\n\ndef build_sentiment_model():\n   \
    \ model = build_model(configs.classifiers.insults_kaggle_bert, download=True)\n\
    \    return model\n\ntest_input = ['This movie is good', 'You are so dumb!']\n\
    \nif __name__ == \"__main__\":\n    sentiment_model = build_sentiment_model()\n\
    \    results = sentiment_model(test_input)\n    print(results)\n```\n\nThis is\
    \ the output:\n\n```\n['Not Insult', 'Insult']\n```\n\nNow that we have seen how\
    \ a sentiment analysis system based on BERT can be leveraged for research purposes,\
    \ let’s consider a scenario where you need to enable sentiment analysis in a conversation\
    \ system such that it can identify sentiments of a user based on a query or a\
    \ response given by user. This would help the conversation system to respond on\
    \ the basis of the sentiments of a user. Follow the steps given here to release\
    \ features of sentiment analysis system as a REST API.\n\n1. Create a file named\
    \ `SentimentAnalysisAPI.py`.\n2. Copy the code shown here and paste it in this\
    \ file, then save it.\n3. This code processes input passed to an API, calls the\
    \ `build_sentiment_model` function, and sends a response from this function as\
    \ an API response.\n4. Open a command prompt and run the following command.\n\n\
    ```\npython SentimentAnalysisAPI.py\n```\n\n```\nfrom flask import Flask, request\n\
