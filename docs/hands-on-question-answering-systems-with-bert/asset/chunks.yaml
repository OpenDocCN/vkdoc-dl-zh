  trans: '

    ### 预训练目标


    在 `StructBERT` 中，原始 `BERT` 的预训练目标得到了扩展，以充分利用语言中丰富的句子内部和句子间结构。这通过两种方式实现。


    1.  **词结构目标：** `BERT` 模型未能显式地建模自然语言中的序列顺序和高阶词依赖关系。一个好的语言模型应该能够从给定的、单词顺序被打乱的句子中重建出原句。`StructBERT`
    通过为 `BERT` 的训练目标补充一个新的词结构目标来实现这一想法。这个新的模型目标赋予了模型重组句子、将随机打乱的词元恢复为正确顺序的能力。该目标与 `BERT`
    中的 `MLM` 目标一起训练。


    2.  **句子结构目标：** 在 `StructBERT` 中，原始 `BERT` 模型的 `NSP` 目标得到了扩展，不仅预测下一句，还预测上一句。这使得预训练模型能够以双向方式学习句子的序列顺序。


    这两个辅助目标与原始的 `MLM` 目标一起进行预训练，以利用语言的内在结构。


    ### 用于自然问题的 BERT[joint]


    `BERT[joint]` 是一个基于 BERT 的模型，用于处理自然问题。`BERT[joint]` 模型仅在一个单一模型中预测短答案和长答案，而不是采用流水线方法。在该模型中，每个文档通过重叠的词元窗口被分割成多个训练实例。这种方法用于创建平衡的训练集，并通过下采样没有答案的实例（空实例）来遵循。训练期间使用
    `[CLS]` 词元来预测空实例，在推理时，跨度根据跨度得分与 `[CLS]` 得分之间的差异进行排序。


    该模型使用自然问题（`NQ`）数据集，这是一个包含 307,373 个训练样本、7,830 个开发样本和 7,842 个测试样本的问答数据集。对于每个样本，用户通过谷歌搜索引擎输入一个查询，并找到包含答案的相应维基百科页面。该维基百科页面被标注为问题的答案。


    `BERT[joint]` 模型从在 `SQuAD 1.1` 数据集上训练的原始 `BERT` 模型初始化。之后，该模型在自然问题训练实例上进行了微调。它使用了
    Adam 优化器来最小化损失。用于自然问题的 `BERT[joint]` 模型比基线 `NQ` 系统取得了显著更好的结果。这种 `BERT` 变体为设计问答系统提供了一种新方法。


    ## 结论


    本章深入探讨了 `BERT`，以及它的两种算法 `MLM` 和 `NSP`。我们还讨论了一个使用 `BERT` 开发的文本分类模型示例。我们还考察了 `BERT`
    在不同基准数据集上的表现，以及 `BERT` 的多种变体。在下一章中，我们将讨论使用 `BERT` 设计问答系统。


    # 5. BERT 模型应用：问答系统


    我们被以文档、图像、博客、网站等形式呈现的海量信息所包围。在大多数情况下，我们总是寻找直接的答案，而不是阅读冗长的文档全文。问答系统通常用于此目的。这些系统扫描文档语料库，并为您提供相关的答案或段落。它是信息检索和
    `NLP` 领域中计算机科学学科的一部分，专注于构建能够自动从自然语言中提取由人类或机器提出的问题答案的系统。


    两个最早的问答系统 `BASEBALL` 和 `LUNAR`，因其核心数据库或信息系统而广受欢迎。`BASEBALL` 旨在回答一年周期内关于美国联盟棒球的问题。`LUNAR`
    旨在根据阿波罗登月任务收集的数据，回答与月球岩石地质分析相关的问题。这些早期系统专注于封闭领域，每个查询必须针对特定领域，且答案文本必须仅使用受限词汇。


    现代世界一些先进的问答系统包括苹果 Siri、亚马逊 Alexa 和谷歌助手。有各种流行的问答系统数据集可用于检验模型性能。这些数据集包括以下内容。


    *   **SQuAD：** 斯坦福问答数据集（`SQuAD`）是一个阅读理解数据集，我们在第 4 章中介绍过。


    *   **NewsQA：** 该数据集旨在帮助研究社区构建能够回答需要人类水平理解和推理能力问题的算法。作者利用 DeepMind 问答数据集中的 CNN
    文章，构建了一个包含 120,000 个问答对的人工众包机器阅读理解数据集。


    *   **WikiQA：** 这个公开可用的数据集包含问答对。它被收集和注释用于开放域问答系统的研究。此外，`WikiQA` 数据集还包含没有正确答案的问题，使研究人员也能处理负面案例，以避免选择不相关的答案。

    '
- fmt: "# Types of QA Systems\n\nQuestion answering systems are broadly divided into\
    \ two categories: open-domain QA (ODQA) system and closed-domain QA (CDQA) system.\n\
    \n- **Closed-domain:** In closed-domain systems, questions belong to a particular\
    \ domain. They can answer the questions from a single domain only. As an example,\
    \ a question answering system for the health care domain cannot answer any IT-related\
    \ questions. These systems exploit domain-specific knowledge by using a model\
    \ that has been trained on a domain specific dataset. The `CDQA` suite can be\
    \ used to build such a closed-domain QA system.\n\n- **Open-domain:** In open-domain\
    \ systems, questions can be from any domain, such as health care, IT, sports,\
    \ and more. These systems are designed to answer questions from any domain. These\
    \ systems actually mimic human intelligence to answer questions. One example of\
    \ such a system is the `DeepPavlov ODQA` system, an ODQA developed by MIPT that\
    \ uses a large dataset of articles from Wikipedia as its source of knowledge.\n\
    \nThese systems can be further divided into factoid and non-factoid as briefly\
    \ covered in Chapter [4](#498208_1_En_4_Chapter.xhtml) and described here.\n\n\
    - **Factoid question:** A factoid question is about providing concise facts. Answers\
    \ to factoid questions are based on proven facts. As an example, a learner might\
    \ be asked to look at a passage, then answer a series of factual questions based\
    \ on what he or she just read. These types of questions usually start with who,\
    \ what, when, or where.\n\n  Here are some examples of factoid questions.\n  -\
    \ Who is the president of the United States?\n  - Who is the prime minister of\
    \ India?\n  - Who is the CEO of Google?\n\n  All of these questions can be answered\
    \ from any document or blog if text contains relevant data which is sufficient\
    \ to answer questions.\n\n- **Non-factoid question:** A non-factoid question expects\
    \ detailed answers about any topic. As an example, a user can ask questions related\
    \ to mathematical problems, how to run a vehicle, what does temperature mean,\
    \ and so on. Non-factoid questions usually require multiple sentences as answers,\
    \ and these answers come from a particular paragraph in a document. Thus, the\
    \ context of a sentence plays an important role to retrieve the relevant answer.\n\
    \n  Here are some examples of non-factoid questions.\n  - What is the process\
    \ of installing Python on Windows?\n  - How can I reset my Microsoft Outlook password?\n\
    \  - What do you mean by temperature?\n\n  Answers to these questions will be\
    \ a document, a paragraph, or a definition from a paragraph."
