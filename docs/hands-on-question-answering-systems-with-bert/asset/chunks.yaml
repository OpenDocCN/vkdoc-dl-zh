    \ the GitHub repository (i.e., `https:/`[`github.com/google-research/bert.git`](http://github.com/google-research/bert.git))\
    \ onto the system by typing the following command:\n\n1.  Downloaded model files\
    \ containing the weights and other necessary BERT files. Depending on your requirements,\
    \ a BERT pretrained model needs to be selected from this list.\n    *   BERT Base,\
    \ Uncased\n\n*   BERT Large, Uncased\n\n*   BERT Base, Cased\n\n*   BERT Large,\
    \ Cased\n\n2.  If you have an access to a cloud TPU, BERT Large can be used; otherwise,\
    \ the BERT Base model should be used. Further selection can be made from the cased\
