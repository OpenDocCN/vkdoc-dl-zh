- fmt: "# Text Classification\n\nText classification can be defined as the problem\
    \ of assigning or categorizing text into a particular category or class. Document\
    \ classification or categorization, intent classification, spam blog detection,\
    \ and more falls under text classification. Here, text can be anything such as\
    \ a sentence, a document, blogs, and so on. Text classification leverages NLP\
    \ methods for preprocessing such as tokenization, stop-word removal, phrase extraction,\
    \ entity extraction, and so on.\n\nDuring inference, text classification analyzes\
    \ the text (document, blog, or sentence) and assigns it to pretrained categories.\
    \ As an example, if document is referring to politics, then this belongs to the\
