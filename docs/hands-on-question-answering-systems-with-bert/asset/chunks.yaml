  trans: "\n# 问答系统的类型\n\n问答系统大致分为两类：开放域问答系统（ODQA）和封闭域问答系统（CDQA）。\n\n- **封闭域：** 在封闭域系统中，问题属于特定领域。它们只能回答来自单一领域的问题。例如，一个面向医疗保健领域的问答系统无法回答任何与\
    \ IT 相关的问题。这些系统通过使用在特定领域数据集上训练的模型来利用领域特定知识。`CDQA` 套件可用于构建此类封闭域问答系统。\n\n- **开放域：**\
    \ 在开放域系统中，问题可以来自任何领域，例如医疗保健、IT、体育等。这些系统旨在回答来自任何领域的问题。它们实际上模仿了人类智能来回答问题。此类系统的一个例子是\
    \ `DeepPavlov ODQA` 系统，这是由 MIPT 开发的一个开放域问答系统，它使用维基百科文章的大型数据集作为其知识来源。\n\n这些系统还可以进一步分为事实型和非事实型，如第\
    \ 4 章所述，此处进行说明。\n\n- **事实型问题：** 事实型问题要求提供简洁的事实。事实型问题的答案基于已证实的事实。例如，学习者可能会被要求阅读一段文字，然后根据刚刚阅读的内容回答一系列事实性问题。这类问题通常以谁、什么、何时或哪里开头。\n\
    \n  以下是一些事实型问题的示例。\n  - 美国总统是谁？\n  - 印度总理是谁？\n  - 谷歌的 CEO 是谁？\n\n  如果文本包含足以回答问题的相关数据，那么所有这些问题的答案都可以从任何文档或博客中找到。\n\
    \n- **非事实型问题：** 非事实型问题期望得到关于任何主题的详细答案。例如，用户可以提出与数学问题、如何驾驶车辆、温度的含义等相关的问题。非事实型问题通常需要多个句子作为答案，并且这些答案来自文档中的特定段落。因此，句子的上下文在检索相关答案时起着重要作用。\n\
    \n  以下是一些非事实型问题的示例。\n  - 在 Windows 上安装 Python 的流程是什么？\n  - 如何重置我的 Microsoft Outlook\
    \ 密码？\n  - 温度是什么意思？\n\n  这些问题的答案将是一个文档、一个段落或一个段落中的定义。\n"
- fmt: "# Question Answering System Design Using BERT\n\nThis section details how\
    \ `BERT` can be used for implementation of a factoid question answering system.\
    \ For this book, we are using a pretrained model that has been trained on the\
    \ `SQuAD` version 1 dataset.\n\nAs an example, consider this question, along with\
    \ the passage from a Wikipedia article on the Football League.\n\n- **Question**:\
    \ Where was the Football League founded?\n- **Passage**: In 1888, The Football\
    \ League was founded in England, becoming the first of many professional football\
    \ competitions. During the 20th century, several of the various kinds of football\
    \ grew to become some of the most popular team sports in the world.\n\nThe answer\
    \ to this question will therefore be England.\n\nNow, we look closer at how this\
    \ question and passage will be processed using `BERT` to find the relevant answer.\
    \ This is all in the context of a question answering system, compared to the text\
    \ classification approach in Chapter [4](#498208_1_En_4_Chapter.xhtml).\n\n`BERT`\
    \ extracts tokens from the question and passage and combines them together as\
    \ an input. As mentioned earlier, it starts with a `[CLS]` token that indicates\
    \ the start of a sentence and uses an `[SEP]` separator to separate the question\
    \ and passage. Along with the `[SEP]` token, `BERT` also uses segment embeddings\
    \ to differentiate between the question and the passage that contains an answer.\
    \ `BERT` creates two segment embeddings, one for the question and other for the\
    \ passage, to differentiate between question and passage. Then these embeddings\
    \ are added to a one-hot representation of tokens to segregate between question\
    \ and passage as shown in Figure [5-1](#498208_1_En_5_Chapter.xhtml#Fig1).\n\n\
    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig1_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig1_HTML.jpg)\n\
    \n**Figure 5-1** BERT input representation\n\nNext, we pass our combined embedded\
    \ representation of question and passage as input in the `BERT` model. The last\
    \ hidden layer of `BERT` will then be changed and uses `softmax` to generate probability\
    \ distributions for the start and end index over an input text sentence that defines\
    \ a substring, which is an answer, as shown in Figure [5-2](#498208_1_En_5_Chapter.xhtml#Fig2).\n\
    \n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig2_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig2_HTML.jpg)\n\
    \n**Figure 5-2** BERT architecture for question answering system\n\nTo this point,\
    \ we have discussed how `BERT` will process input questions and passages. Next,\
    \ we will see an implementation of a question answering system using `BERT` in\
    \ Python.\n\nFollow the steps given here to install the required prerequisites\
    \ for a `BERT`-based question answering system. Many of them are the same as those\
    \ for the examples in Chapter [4](#498208_1_En_4_Chapter.xhtml), but are included\
    \ for completeness to ensure you can run the examples in this chapter.\n\n1. \
    \ Make sure Python is installed on your system. Open a command prompt and run\
    \ the following command to determine if Python is installed, as shown in Figure\
    \ [5-3](#498208_1_En_5_Chapter.xhtml#Fig3).\n\n    `python`\n\n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig3_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig3_HTML.jpg)\n\
    \n    **Figure 5-3** Python console\n\n    This will open your Python console\
    \ at the command prompt. If Python is not installed on your system, download and\
    \ install it as per your operating system from [`https://www.python.org/downloads/`](https://www.python.org/downloads/).\n\
    \n2.  Next, install Jupyter Notebook, which we will use to code. Open a command\
    \ prompt and run the following command.\n\n    ```\n    pip install notebook\n\
    \    ```\n\n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig4_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig4_HTML.jpg)\n\
    \n    **Figure 5-4** Jupyter Notebook console\n\n3.  Open a command prompt and\
    \ run the following command to run Jupyter Notebook.\n\n    `jupyter notebook`\n\
    \n    The notebook will open in your default browser with the host address as\
    \ `localhost` and the port number as `8888`, along with a unique token ID. Now,\
    \ you can start writing code as mentioned in subsequent steps, as shown in Figure\
    \ [5-4](#498208_1_En_5_Chapter.xhtml#Fig4).\n\n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig5_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig5_HTML.jpg)\n\
    \n    **Figure 5-5** Google Colab interface to create or import a notebook\n\n\
    4.  You can also use Google Colab Notebook for the same purpose. It provides a\
    \ fast and free environment to run your Python code if your system doesn’t have\
    \ sufficient resources available. You can also use the GPUs and TPUs for free\
    \ but for a limited time (12 hours) in Google Colab. You just need a Google account\
    \ to log in to Google Colab Notebook. For this book, we will be using Google Colab\
    \ Notebook to demonstrate a question answering system using `BERT`. Log in to\
    \ your Google account and click [`https://colab.research.google.com`](https://colab.research.google.com).\
    \ You will see the screen shown in Figure [5-5](#498208_1_En_5_Chapter.xhtml#Fig5).\n\
    \n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig6_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig6_HTML.jpg)\n\
    \n    **Figure 5-6** Installing transformers library\n\n5.  To create a new Colab\
    \ notebook, click **New Notebook** in the bottom right corner as shown in Figure\
    \ [5-5](#498208_1_En_5_Chapter.xhtml#Fig5).\n\n6.  Install the `transformers`\
    \ library from Huggingface. Run the following command in your Jupyter Notebook\
    \ or Colab Notebook.\n\n    `pip install transformers`\n\n7.  After successful\
    \ installation of the `transformers` library, you should be able to see the output\
    \ shown in Figure [5-6](#498208_1_En_5_Chapter.xhtml#Fig6).\n\nNext, we will proceed\
    \ to implementation of a question answering system using `BERT`. The included\
    \ code snippets will provide a step-by-step explanation for the question answering\
    \ system.\n\n1.  Import the `BertQuestionAnswering` and `BertTokenizer` classes\
    \ of the `transformers` library as shown here.\n\n    ```\n    from transformers\
    \ import BertForQuestionAnswering\n    from transformers import BertTokenizer\n\
    \    import torch\n    ```\n\n2.  Next, load the `BERT` question answering model\
    \ fine-tuned on the `SQuAD` version 2 dataset. It will be a large version of `BERT`,\
    \ with 24 layers, 340 million parameters, and an embedding size of 1,024. Along\
    \ with the `BERT` model, we have also downloaded a trained model vocabulary set\
    \ as shown here.\n\n    ```\n    # Load pretrained model for Question Answering\n\
    \    bert_model = BertForQuestionAnswering.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    \    #Load Vocabulary\n    bert_tokenizer = BertTokenizer.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    \    ```\n\n    **Note**: This will take a few minutes, depending on your Internet\
    \ bandwidth, as the model size is approximately 1.34 GB.\n\n3.  Next, it requires\
    \ a question and candidate paragraph context where an answer to the question would\
    \ exist. You can find a candidate paragraph using any search engine or document\
    \ indexer system such as Apache Solr or Watson Discovery Service (WDS). These\
    \ systems will provide context paragraphs for the question asked by the user.\n\
    \n4.  Then, the question, along with the context paragraph, will be passed to\
    \ the question answering system, where first they will be tokenized based on downloaded\
    \ vocabulary. As mentioned earlier, these will be concatenated together using\
    \ a special character `[SEP]` token in between as shown here (reference text has\
    \ been taken from a Wikipedia article).\n\n    ```\n    question = \"Where was\
    \ the Football League founded?\"\n    reference_text = \" In 1888, The Football\
    \ League was founded in England, becoming the first of many professional football\
    \ competitions. During the 20th century, several of the various kinds of football\
    \ grew to become some of the most popular team sports in the world.\"\n    #Perform\
    \ tokenization on input text\n    input_ids = bert_tokenizer.encode(question,\
    \ reference_text)\n    input_tokens = bert_tokenizer.convert_ids_to_tokens(input_ids)\n\
    \    ```\n\n5.  Next, we need to concatenate them using segment embedding to differentiate\
    \ between the question and the context passage. Segment embedding for the question\
    \ will be added to the token vector of the question and similarly for segment\
    \ embedding for the context passage. This should be done before even using it\
    \ as an input to the `BERT` model. These additions are managed internally by the\
    \ `transformers` library, but we need to provide Boolean values (`0` or `1`) to\
    \ differentiate for each token as shown here.\n\n    ```\n    #Find index of first\
    \ occurrence of [SEP] token\n    sep_location = input_ids.index(bert_tokenizer.sep_token_id)\n\
    \    first_seg_len, second_seg_len = sep_location+1, len(input_ids)-(sep_location+1)\n\
    \    seg_embedding = [0]*first_seg_len + [1]*second_seg_len\n    ```\n\n6.  Now\
    \ we can pass our example to the model.\n\n    ```\n    #Test model on our example\n\
    \    model_scores=bert_model(torch.tensor([input_ids]),token_type_ids=torch.tensor([seg_embedding]))\n\
    \    ans_start_loc, ans_end_loc = torch.argmax(model_scores[0]), torch.argmax(model_scores[1])\n\
    \    result = ' '.join(input_tokens[ans_start_loc:ans_end_loc+1])\n    result\
    \ = result.replace(' ##','')\n    ```\n\n7.  The model will provide start and\
    \ end index from context passage as an answer such as start index value as `11`\
    \ and end index value as `18`. The final output will be extracted from context\
    \ passage using these indexes.\n\nHere is the complete Python code that takes\
    \ the question and reference passage as an input and finds the answer to that\
    \ question.\n\n```\nfrom transformers import BertForQuestionAnswering\nfrom transformers\
    \ import BertTokenizer\nimport torch\ndef get_answer_using_bert(question, reference_text):\n\
    # Load pretrained model for Question Answering\nbert_model = BertForQuestionAnswering.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    #Load Vocabulary\nbert_tokenizer = BertTokenizer.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    #Perform tokenization on input text\ninput_ids = bert_tokenizer.encode(question,\
    \ reference_text)\ninput_tokens = bert_tokenizer.convert_ids_to_tokens(input_ids)\n\
    #Find index of first occurrence of [SEP] token\nsep_location = input_ids.index(bert_tokenizer.sep_token_id)\n\
    first_seg_len, second_seg_len = sep_location+1, len(input_ids)-(sep_location+1)\n\
    seg_embedding = [0]*first_seg_len + [1]*second_seg_len\n#Test model on our example\n\
    model_scores = bert_model(torch.tensor([input_ids]), token_type_ids=torch.tensor([seg_embedding]))\n\
    ans_start_loc, ans_end_loc = torch.argmax(model_scores[0]), torch.argmax(model_scores[1])\n\
    result = ' '.join(input_tokens[ans_start_loc:ans_end_loc+1])\nresult = result.replace('\
    \ ##','')\nreturn result\nif __name__ == \"__main__\" :\nquestion = \"Where was\
    \ the Football League founded?\"\nreference_text = \" In 1888, The Football League\
    \ was founded in England, becoming the first of many professional football competitions.\
    \ During the 20th century, several of the various kinds of football grew to become\
    \ some of the most popular team sports in the world.\"\nprint(get_answer_using_bert(question,\
    \ reference_text))\n```\n\nAfter running this code in Colab Notebook, we get following\
    \ output:\n\n```\nengland\n```\n\nNow, we have seen how a `BERT`-based question\
    \ answering system can be used for research purposes. Next, consider a scenario\
    \ where you need to deploy this feature to be consumed by some website or conversation\
    \ system to serve the end user who is looking for an answer to his or her query.\
    \ In this case, you need to release or expose features of the QA system as a REST\
    \ API. Now, follow below steps to release features of QA system as REST API.\n\
    \nLet’s go through the steps to set up a REST API and public URL for that API\
    \ (use `ngrok` to generate a public URL if you are inside the private network)\
    \ for a question answering system on both Windows and Linux Server."
  raw: "## Question Answering System Design Using BERT\n\nThis section details how\
    \ BERT can be used for implementation of a factoid question answering system.\
    \ For this book, we are using a pretrained model that has been trained on the\
    \ SQuAD version 1 dataset.\n\nAs an example, consider this question, along with\
    \ the passage from a Wikipedia article on the Football League.\n\n*   **Question**:\
    \ Where was the Football League founded?\n\n*   **Passage:** In 1888, The Football\
    \ League was founded in England, becoming the first of many professional football\
    \ competitions. During the 20th century, several of the various kinds of football\
    \ grew to become some of the most popular team sports in the world.\n\nThe answer\
    \ to this question will therefore be England.\n\nNow, we look closer at how this\
    \ question and passage will be processed using BERT to find the relevant answer.\
    \ This is all in the context of a question answering system, compared to the text\
    \ classification approach in Chapter [4](#498208_1_En_4_Chapter.xhtml).\n\nBERT\
    \ extracts tokens from the question and passage and combines them together as\
    \ an input. As mentioned earlier, it starts with a [CLS] token that indicates\
    \ the start of a sentence and uses an [SEP] separator to separate the question\
    \ and passage. Along with the [SEP] token, BERT also uses segment embeddings to\
    \ differentiate between the question and the passage that contains an answer.\
    \ BERT creates two segment embeddings, one for the question and other for the\
    \ passage, to differentiate between question and passage. Then these embeddings\
    \ are added to a one-hot representation of tokens to segregate between question\
    \ and passage as shown in Figure [5-1](#498208_1_En_5_Chapter.xhtml#Fig1).\n\n\
    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig1_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nBERT input representation\n\nNext, we pass our combined embedded\
    \ representation of question and passage as input in the BERT model. The last\
    \ hidden layer of BERT will then be changed and uses softmax to generate probability\
    \ distributions for the start and end index over an input text sentence that defines\
    \ a substring, which is an answer, as shown in Figure [5-2](#498208_1_En_5_Chapter.xhtml#Fig2).\n\
    \n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig2_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2\n\nBERT architecture for question answering system\n\nTo this point,\
    \ we have discussed how BERT will process input questions and passages. Next,\
    \ we will see an implementation of a question answering system using BERT in Python.\n\
    \nFollow the steps given here to install the required prerequisites for a BERT-based\
    \ question answering system. Many of them are the same as those for the examples\
    \ in Chapter [4](#498208_1_En_4_Chapter.xhtml), but are included for completeness\
    \ to ensure you can run the examples in this chapter.\n\n1.  Make sure Python\
    \ is installed on your system. Open a command prompt and run the following command\
    \ to determine if Python is installed, as shown in Figure [5-3](#498208_1_En_5_Chapter.xhtml#Fig3).\n\
    \n    `python`\n\n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig3_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig3_HTML.jpg)\n\
    \n    Figure 5-3\n\n    Python console\n\n    This will open your Python console\
    \ at the command prompt. If Python is not installed on your system, download and\
    \ install it as per your operating system from [`https://www.python.org/downloads/`](https://www.python.org/downloads/)`.`\n\
    \n1.  Next, install Jupyter Notebook, which we will use to code. Open a command\
    \ prompt and run the following command.\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig4_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\n\nJupyter Notebook console\n\n1.  Open a command prompt and run\
    \ the following command to run Jupyter Notebook.\n\n    `jupyter notebook`\n\n\
    \    The notebook will open in your default browser with the host address as localhost\
    \ and the port number as 8888, along with a unique token ID. Now, you can start\
    \ writing code as mentioned in subsequent steps, as shown in Figure [5-4](#498208_1_En_5_Chapter.xhtml#Fig4).\n\
    \n```\npip install notebook\n```\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig5_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5\n\nGoogle Colab interface to create or import a notebook\n\n1.  You\
    \ can also use Google Colab Notebook for the same purpose. It provides a fast\
    \ and free environment to run your Python code if your system doesn’t have sufficient\
    \ resources available. You can also use the GPUs and TPUs for free but for a limited\
    \ time (12 hours) in Google Colab. You just need a Google account to log in to\
    \ Google Colab Notebook. For this book, we will be using Google Colab Notebook\
    \ to demonstrate a question answering system using BERT. Log in to your Google\
    \ account and click [`https://colab.research.google.com`](https://colab.research.google.com).\
    \ You will see the screen shown in Figure [5-5](#498208_1_En_5_Chapter.xhtml#Fig5).\n\
    \n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig6_HTML.jpg](images/498208_1_En_5_Chapter/498208_1_En_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6\n\nInstalling transformers library\n\n1.  To create a new Colab notebook,\
    \ click New Notebook in the bottom right corner as shown in Figure [5-5](#498208_1_En_5_Chapter.xhtml#Fig5).\n\
    \n2.  Install the transformers library from Huggingface. Run the following command\
    \ in your Jupyter Notebook or Colab Notebook.\n\n    `pip install transformers`\n\
    \n3.  After successful installation of the transformers library, you should be\
    \ able to see the output shown in Figure [5-6](#498208_1_En_5_Chapter.xhtml#Fig6).\n\
    \nNext, we will proceed to implementation of a question answering system using\
    \ BERT. The included code snippets will provide a step-by-step explanation for\
    \ the question answering system.\n\n1.  Import the `BertQuestionAnswering` and\
    \ `BertTokenizer` classes of the transformers library as shown here.\n\n1.  Next,\
    \ load the BERT question answering model fine-tuned on the SQuAD version 2 dataset.\
    \ It will be a large version of BERT, with 24 layers, 340 million parameters,\
    \ and an embedding size of 1,024\\. Along with the BERT model, we have also downloaded\
    \ a trained model vocabulary set as shown here.\n\n```\nfrom transformers import\
    \ BertForQuestionAnswering\nfrom transformers import BertTokenizer\nimport torch\n\
    ```\n\n```\n# Load pretrained model for Question Answering\nbert_model = BertForQuestionAnswering.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    #Load Vocabulary\nbert_tokenizer = BertTokenizer.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    ```\n\nNote\n\nThis will take a few minutes, depending on your Internet bandwidth,\
    \ as the model size is approximately 1.34 GB.\n\n1.  Next, it requires a question\
    \ and candidate paragraph context where an answer to the question would exist.\
    \ You can find a candidate paragraph using any search engine or document indexer\
    \ system such as Apache Solr or Watson Discovery Service (WDS). These systems\
    \ will provide context paragraphs for the question asked by the user.\n\n2.  Then\
    \ , the question, along with the context paragraph, will be passed to the question\
    \ answering system, where first they will be tokenized based on downloaded vocabulary.\
    \ As mentioned earlier, these will be concatenated together using a special character\
    \ [SEP] token in between as shown here (reference text has been taken from a Wikipedia\
    \ article).\n\n    ```\n    question = \"Where was the Football League founded?”\n\
    \    reference_text = \" In 1888, The Football League was founded in England,\
    \ becoming the first of many professional football competitions. During the 20th\
    \ century, several of the various kinds of football grew to become some of the\
    \ most popular team sports in the world.\"\n    #Perform tokenization on input\
    \ text\n    input_ids = bert_tokenizer.encode(question, reference_text)\n    input_tokens\
    \ = bert_tokenizer.convert_ids_to_tokens(input_ids)\n    ```\n\n3.  Next, we need\
    \ to concatenate them using segment embedding to differentiate between the question\
    \ and the context passage. Segment embedding for the question will be added to\
    \ the token vector of the question and similarly for segment embedding for the\
    \ context passage. This should be done before even using it as an input to the\
    \ BERT model. These additions are managed internally by the transformer library,\
    \ but we need to provide Boolean values (0 or 1) to differentiate for each token\
    \ as shown here.\n\n    ```\n    #Find index of first occurrence of [SEP] token\n\
    \    sep_location = input_ids.index(bert_tokenizer.sep_token_id)\n    first_seg_len,\
    \ second_seg_len = sep_location+1, len(input_ids)-(sep_location+1)\n    seg_embedding\
    \ = [0]*first_seg_len + [1]*second_seg_len\n    ```\n\n4.  Now we can pass our\
    \ example to the model.\n\n    ```\n    #Test model on our example\n    model_scores=bert_model(torch.tensor([input_ids]),token_type_ids=torch.tensor([seg_embedding]))\n\
    \    ans_start_loc, ans_end_loc = torch.argmax(model_scores[0]),\n    torch.argmax(model_scores[1])\n\
    \    result = ' '.join(input_tokens[ans_start_loc:ans_end_loc+1])\n    result\
    \ = result.replace(' ##','')\n    ```\n\n5.  The model will provide start and\
    \ end index from context passage as an answer such as start index value as 11\
    \ and end index value as 18\\. The final output will be extracted from context\
    \ passage using these indexes.\n\nHere is the complete Python code that takes\
    \ the question and reference passage as an input and finds the answer to that\
    \ question.\n\n```\nfrom transformers import BertForQuestionAnswering\nfrom transformers\
    \ import BertTokenizer\nimport torch\ndef get_answer_using_bert(question, reference_text):\n\
    # Load pretrained model for Question Answering\nbert_model = BertForQuestionAnswering.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    #Load Vocabulary\nbert_tokenizer = BertTokenizer.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    #Perform tokenization on input text\ninput_ids = bert_tokenizer.encode(question,\
    \ reference_text)\ninput_tokens = bert_tokenizer.convert_ids_to_tokens(input_ids)\n\
    #Find index of first occurrence of [SEP] token\nsep_location = input_ids.index(bert_tokenizer.sep_token_id)\n\
    first_seg_len, second_seg_len = sep_location+1, len(input_ids)-(sep_location+1)\n\
    seg_embedding = [0]*first_seg_len + [1]*second_seg_len\n#Test model on our example\n\
    model_scores = bert_model(torch.tensor([input_ids]), token_type_ids=torch.tensor([seg_embedding]))\n\
    ans_start_loc, ans_end_loc = torch.argmax(model_scores[0]), torch.argmax(model_scores[1])\n\
    result = ' '.join(input_tokens[ans_start_loc:ans_end_loc+1])\nresult = result.replace('\
    \ ##','')\nreturn result\nif __name__ == \"__main__\" :\nquestion = \"Where was\
    \ the Football League founded?\"\nreference_text = \" In 1888, The Football League\
    \ was founded in England, becoming the first of many professional football competitions.\
    \ During the 20th century, several of the various kinds of football grew to become\
    \ some of the most popular team sports in the world.\"\nprint(get_answer_using_bert(question,\
    \ reference_text))\n```\n\nAfter running this code in Colab Notebook, we get following\
    \ output:\n\n```\nengland\n```\n\nNow, we have seen how a BERT-based question\
    \ answering system can be used for research purposes. Next, consider a scenario\
    \ where you need to deploy this feature to be consumed by some website or conversation\
    \ system to serve the end user who is looking for an answer to his or her query.\
    \ In this case, you need to release or expose features of the QA system as a REST\
    \ API. Now, follow below steps to release features of QA system as REST API.\n\
    \nLet’s go through the steps to set up a REST API and public URL for that API\
    \ (use ngrok to generate a public URL if you are inside the private network) for\
    \ a question answering system on both Windows and Linux Server."
  trans: "\n# 使用 BERT 设计问答系统\n\n本节将详细介绍如何利用 `BERT` 实现一个事实型问答系统。本书将使用一个已在 `SQuAD` 1.0\
    \ 数据集上预训练好的模型。\n\n举例来说，考虑以下问题及其来自维基百科关于足球联盟文章的段落。\n\n- **问题**：足球联盟成立于何处？\n- **段落**：1888\
    \ 年，足球联盟在英格兰成立，成为众多职业足球比赛中的第一个。在 20 世纪，多种不同类型的足球运动逐渐发展成为世界上最受欢迎的团队运动之一。\n\n因此，这个问题的答案是英格兰。\n\
    \n现在，我们更深入地探讨如何使用 `BERT` 处理这个问题和段落，以找到相关答案。与第 4 章中的文本分类方法相比，这一切都发生在问答系统的上下文中。\n\
    \n`BERT` 从问题和段落中提取标记，并将它们组合在一起作为输入。如前所述，它以 `[CLS]` 标记开始，该标记表示句子的开始，并使用 `[SEP]`\
    \ 分隔符来分隔问题和段落。除了 `[SEP]` 标记，`BERT` 还使用分段嵌入来区分问题和包含答案的段落。`BERT` 创建两个分段嵌入，一个用于问题，另一个用于段落，以区分问题和段落。然后，将这些嵌入添加到标记的独热表示中，以区分问题和段落，如图\
    \ 5-1 所示。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig1_HTML.jpg](img/498208_1_En_5_Fig1_HTML.jpg)\n\
    \n**图 5-1** BERT 输入表示\n\n接下来，我们将问题和段落的组合嵌入表示作为输入传递给 `BERT` 模型。然后，`BERT` 的最后一个隐藏层将被修改，并使用\
    \ `softmax` 为输入文本句子上的起始和结束索引生成概率分布，该分布定义了一个子字符串，即答案，如图 5-2 所示。\n\n![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig2_HTML.jpg](img/498208_1_En_5_Fig2_HTML.jpg)\n\
    \n**图 5-2** 问答系统的 BERT 架构\n\n至此，我们已经讨论了 `BERT` 如何处理输入的问题和段落。接下来，我们将看到如何在 Python\
    \ 中使用 `BERT` 实现一个问答系统。\n\n请按照以下步骤安装基于 `BERT` 的问答系统所需的先决条件。其中许多与第 4 章中的示例相同，但为了完整性而包含在内，以确保您可以运行本章中的示例。\n\
    \n1.  确保您的系统上已安装 Python。打开命令提示符并运行以下命令以确定是否安装了 Python，如图 5-3 所示。\n\n    `python`\n\
    \n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig3_HTML.jpg](img/498208_1_En_5_Fig3_HTML.jpg)\n\
    \n    **图 5-3** Python 控制台\n\n    这将在命令提示符下打开您的 Python 控制台。如果您的系统上未安装 Python，请根据您的操作系统从\
    \ [`https://www.python.org/downloads/`](https://www.python.org/downloads/) 下载并安装。\n\
    \n2.  接下来，安装我们将用于编码的 Jupyter Notebook。打开命令提示符并运行以下命令。\n\n    ```\n    pip install\
    \ notebook\n    ```\n\n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig4_HTML.jpg](img/498208_1_En_5_Fig4_HTML.jpg)\n\
    \n    **图 5-4** Jupyter Notebook 控制台\n\n3.  打开命令提示符并运行以下命令以运行 Jupyter Notebook。\n\
    \n    `jupyter notebook`\n\n    Notebook 将在您的默认浏览器中打开，主机地址为 `localhost`，端口号为 `8888`，并附带一个唯一的令牌\
    \ ID。现在，您可以按照后续步骤开始编写代码，如图 5-4 所示。\n\n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig5_HTML.jpg](img/498208_1_En_5_Fig5_HTML.jpg)\n\
    \n    **图 5-5** 用于创建或导入 Notebook 的 Google Colab 界面\n\n4.  您也可以使用 Google Colab\
    \ Notebook 达到相同目的。如果您的系统没有足够的可用资源，它提供了一个快速且免费的环境来运行您的 Python 代码。您还可以在 Google Colab\
    \ 中免费使用 GPU 和 TPU，但时间有限（12 小时）。您只需要一个 Google 帐户即可登录 Google Colab Notebook。本书将使用\
    \ Google Colab Notebook 来演示使用 `BERT` 的问答系统。登录您的 Google 帐户并点击 [`https://colab.research.google.com`](https://colab.research.google.com)。您将看到如图\
    \ 5-5 所示的屏幕。\n\n    ![../images/498208_1_En_5_Chapter/498208_1_En_5_Fig6_HTML.jpg](img/498208_1_En_5_Fig6_HTML.jpg)\n\
    \n    **图 5-6** 安装 transformers 库\n\n5.  要创建一个新的 Colab Notebook，请点击右下角的 **新建笔记本**，如图\
    \ 5-5 所示。\n\n6.  从 Huggingface 安装 `transformers` 库。在您的 Jupyter Notebook 或 Colab\
    \ Notebook 中运行以下命令。\n\n    `pip install transformers`\n\n7.  成功安装 `transformers`\
    \ 库后，您应该能够看到如图 5-6 所示的输出。\n\n接下来，我们将继续使用 `BERT` 实现问答系统。随附的代码片段将为问答系统提供逐步解释。\n\n\
    1.  导入 `transformers` 库的 `BertQuestionAnswering` 和 `BertTokenizer` 类，如下所示。\n\n\
    \    ```\n    from transformers import BertForQuestionAnswering\n    from transformers\
    \ import BertTokenizer\n    import torch\n    ```\n\n2.  接下来，加载在 `SQuAD` 2.0 数据集上微调的\
    \ `BERT` 问答模型。它将是 `BERT` 的大型版本，具有 24 层、3.4 亿个参数和 1,024 的嵌入大小。除了 `BERT` 模型，我们还下载了一个训练好的模型词汇集，如下所示。\n\
    \n    ```\n    # 加载用于问答的预训练模型\n    bert_model = BertForQuestionAnswering.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    \    # 加载词汇表\n    bert_tokenizer = BertTokenizer.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    \    ```\n\n    **注意**：这需要几分钟时间，具体取决于您的互联网带宽，因为模型大小约为 1.34 GB。\n\n3.  接下来，它需要一个问题和候选段落上下文，其中存在问题的答案。您可以使用任何搜索引擎或文档索引系统（如\
    \ Apache Solr 或 Watson Discovery Service (WDS)）来查找候选段落。这些系统将为用户提出的问题提供上下文段落。\n\
    \n4.  然后，问题连同上下文段落将被传递给问答系统，首先会根据下载的词汇表对它们进行分词。如前所述，它们将使用特殊字符 `[SEP]` 标记连接在一起，如下所示（参考文本取自维基百科文章）。\n\
    \n    ```\n    question = \"Where was the Football League founded?\"\n    reference_text\
    \ = \" In 1888, The Football League was founded in England, becoming the first\
    \ of many professional football competitions. During the 20th century, several\
    \ of the various kinds of football grew to become some of the most popular team\
    \ sports in the world.\"\n    # 对输入文本执行分词\n    input_ids = bert_tokenizer.encode(question,\
    \ reference_text)\n    input_tokens = bert_tokenizer.convert_ids_to_tokens(input_ids)\n\
    \    ```\n\n5.  接下来，我们需要使用分段嵌入将它们连接起来，以区分问题和上下文段落。问题的分段嵌入将被添加到问题的标记向量中，上下文段落的分段嵌入也是如此。这应该在将其用作\
    \ `BERT` 模型的输入之前完成。这些添加由 `transformers` 库内部管理，但我们需要为每个标记提供布尔值（`0` 或 `1`）以进行区分，如下所示。\n\
    \n    ```\n    # 查找 [SEP] 标记首次出现的位置\n    sep_location = input_ids.index(bert_tokenizer.sep_token_id)\n\
    \    first_seg_len, second_seg_len = sep_location+1, len(input_ids)-(sep_location+1)\n\
    \    seg_embedding = [0]*first_seg_len + [1]*second_seg_len\n    ```\n\n6.  现在，我们可以将我们的示例传递给模型。\n\
    \n    ```\n    # 在我们的示例上测试模型\n    model_scores=bert_model(torch.tensor([input_ids]),token_type_ids=torch.tensor([seg_embedding]))\n\
    \    ans_start_loc, ans_end_loc = torch.argmax(model_scores[0]), torch.argmax(model_scores[1])\n\
    \    result = ' '.join(input_tokens[ans_start_loc:ans_end_loc+1])\n    result\
    \ = result.replace(' ##','')\n    ```\n\n7.  模型将提供上下文段落中的起始和结束索引作为答案，例如起始索引值为\
    \ `11`，结束索引值为 `18`。最终输出将使用这些索引从上下文段落中提取。\n\n以下是完整的 Python 代码，它将问题和参考段落作为输入，并找到该问题的答案。\n\
    \n```\nfrom transformers import BertForQuestionAnswering\nfrom transformers import\
    \ BertTokenizer\nimport torch\ndef get_answer_using_bert(question, reference_text):\n\
    # 加载用于问答的预训练模型\nbert_model = BertForQuestionAnswering.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    # 加载词汇表\nbert_tokenizer = BertTokenizer.from_pretrained('bert-large-uncased-whole-word-masking-finetuned-squad')\n\
    # 对输入文本执行分词\ninput_ids = bert_tokenizer.encode(question, reference_text)\ninput_tokens\
    \ = bert_tokenizer.convert_ids_to_tokens(input_ids)\n# 查找 [SEP] 标记首次出现的位置\nsep_location\
    \ = input_ids.index(bert_tokenizer.sep_token_id)\nfirst_seg_len, second_seg_len\
    \ = sep_location+1, len(input_ids)-(sep_location+1)\nseg_embedding = [0]*first_seg_len\
    \ + [1]*second_seg_len\n# 在我们的示例上测试模型\nmodel_scores = bert_model(torch.tensor([input_ids]),\
    \ token_type_ids=torch.tensor([seg_embedding]))\nans_start_loc, ans_end_loc =\
    \ torch.argmax(model_scores[0]), torch.argmax(model_scores[1])\nresult = ' '.join(input_tokens[ans_start_loc:ans_end_loc+1])\n\
    result = result.replace(' ##','')\nreturn result\nif __name__ == \"__main__\"\
    \ :\nquestion = \"Where was the Football League founded?\"\nreference_text = \"\
    \ In 1888, The Football League was founded in England, becoming the first of many\
    \ professional football competitions. During the 20th century, several of the\
    \ various kinds of football grew to become some of the most popular team sports\
    \ in the world.\"\nprint(get_answer_using_bert(question, reference_text))\n```\n\
    \n在 Colab Notebook 中运行此代码后，我们得到以下输出：\n\n```\nengland\n```\n\n现在，我们已经了解了如何将基于 `BERT`\
    \ 的问答系统用于研究目的。接下来，考虑一个场景，您需要部署此功能以供某个网站或对话系统使用，以服务于正在寻找其查询答案的最终用户。在这种情况下，您需要将\
    \ QA 系统的功能作为 REST API 发布或公开。现在，请按照以下步骤将 QA 系统的功能作为 REST API 发布。\n\n让我们逐步了解如何在\
    \ Windows 和 Linux 服务器上为问答系统设置 REST API 和该 API 的公共 URL（如果您在私有网络内，请使用 `ngrok` 生成公共\
    \ URL）。\n"
- fmt: '### For Windows Server


    **Prerequisite:** `Python 3.6.x` and `Pip` need to be installed on your system.


    #### Creation of REST API


    **1. Install Flask-RESTful**


    `Flask-RESTful` is an extension of the micro-framework `Flask` for building REST
    APIs.


    For installation, run the following command at the Windows command prompt, as
    shown in Figure [5-7](#498208_1_En_5_Chapter.xhtml#Fig7).


