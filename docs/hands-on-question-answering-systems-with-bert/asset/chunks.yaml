    sentiment_qa =dict()\nsentiment_qa['qustion'] = questions_list[index]\nsentiment_qa['answer']\
    \ = ans\nresult.append(sentiment_qa)\nresult={'results':result}\nresult = json.dumps(result)\n\
    return result\nexcept Exception as e:\nreturn {\"Error\": str(e)}\nif __name__\
