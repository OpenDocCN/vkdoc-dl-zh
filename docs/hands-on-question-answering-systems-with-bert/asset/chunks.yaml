- fmt: '### Named Entity Recognition


    An entity is defined as an object or noun such as a person, organization, or other
    object that provides important information from the text. This information can
    be used as a feature for downstream tasks. As an example, `Google`, `Microsoft`,
    and `IBM` are entities of the type `Organization`.


    `NER` is an information extraction technique that extracts and classifies entities
    into categories as per the trained model. As an example, some of the basic categories
    in the English language are names of persons, organizations, locations, dates,
    email addresses, phone numbers, and so on. For example, in our sample sentence
    phrases such as “machine learning” and “computer vision” are entities of type
    `AI_Branch`, which refers to branches of AI.


    Currently, large vendors in the AI domain such as `IBM`, `Google`, and `Microsoft`
    provide their trained models to extract named entities from the text. They also
    enable you to build your own `NER` model specific to your application and domain.
    Open-source projects such as `spaCy` also provide the capability to train and
    use your own custom `NER` model.


    ### Coreference Resolution


    One of the major challenges in the `NLP` domain, especially in the English language,
    is the use of pronouns. In English, pronouns are used extensively to refer to
    nouns in a previous context or sentence. To perform semantic analysis or identify
    the relationship between these sentences, it is very important that somehow the
    system should establish dependencies between the sentences.


    As an example, consider the sentence “It can be divided into two types, i.e.,
    Supervised and Unsupervised Learning,” where “It” refers to machine learning in
    the first and second sentences. It can be accomplished by annotating such dependencies
    in the dataset for training a model and using the same model over unseen text
    snippets or documents to extract such relationships.


    ### Bag of Words


    As we all know, computers work on numerical data only; therefore, to understand
    meaning of text, it must be converted into a numerical form. Bag of words is one
    of the approaches for converting text into numerical data.


    Bag of words is a very popular feature extraction method that describes the occurrence
    of each word in the text. You need to first build the vocabulary of your corpus
    then calculate the occurrence of each word corresponding to each text snippet
    or document in the corpus. It doesn’t store any information related to order or
    sentence structure. That’s why it is known as a bag of words. It can also tell
    you whether a particular word is present in the document or not, but it doesn’t
    provide any information about the location of the word in the document. As an
    example, consider our example text snippet, which has been segmented into three
    sentences as a result of the sentence segmentation step.


    - **Sentence A**: Machine learning (ML) is the [scientific study](https://en.wikipedia.org/wiki/Branches_of_science)
    of [algorithms](https://en.wikipedia.org/wiki/Algorithm) and [statistical models](https://en.wikipedia.org/wiki/Statistical_model)
    that [computer systems](https://en.wikipedia.org/wiki/Computer_systems) use to
    perform a specific task without using explicit instructions, relying on patterns
    and [inference](https://en.wikipedia.org/wiki/Inference) instead.

    - **Sentence B**: Machine learning algorithms are used in a wide variety of applications,
    such as [email filtering](https://en.wikipedia.org/wiki/Email_filtering) and [computer
    vision](https://en.wikipedia.org/wiki/Computer_vision).

    - **Sentence C**: It can be divided into two types, i.e., Supervised and Unsupervised
    Learning.


    Figure [1-2](#498208_1_En_1_Chapter.xhtml#Fig2) is a document-term matrix for
    our example text snippet, where the term value is 1 if it is present in the sentence,
    or 0 otherwise.


    ![../images/498208_1_En_1_Chapter/498208_1_En_1_Fig2_HTML.jpg](images/498208_1_En_1_Chapter/498208_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Document-term matrix


    Once sentences or text snippets are converted into vectors of numbers, we can
    use these vector values as a feature for further downstream tasks such as a question-answering
    system, text summarization, and so on. This method has the following limitations.


    - Length of vector representation for the sentence increases as vocabulary size
    increases. This requires higher computation for downstream tasks. It also increases
    dimensionality of sentences.

    - It can’t identify different words with similar meanings on the basis of their
    context in the text.


    There are other methods that reduce computation and memory requirements to represent
    sentences in vector form. Word embedding is one of the approaches where we can
    represent a word in lower dimensional space while preserving the semantic meaning
    of the word. We will see in detail later how word embedding is major breakthrough
    for downstream `NLP` tasks.


    ## Conclusion


    This chapter discussed the basics of `NLP`, along with some of the basic `NLP`
    tasks such as tokenization, stemming, and more. In next chapter, we discuss neural
    networks in the `NLP` domain.


    # 2. Neural Networks for Natural Language Processing


    Bringing human cognitive intelligence (i.e., thinking, reasoning, and action)
    to artificial systems has always been a hot topic for researchers. In this process,
    they came up with idea of neural networks that try to emulate how the neurons
    of the human brain work. Although they are still very far from human cognitive
    capability, artificial neural networks hold a very promising position in the area
    of `ML`, and have transformed the way `NLP` applications are developed.


    In this chapter, we will discuss neural networks and their types, along with some
    special types of neural networks, such as long short-term memory (`LSTM`), convolutional
    neural networks (`CNNs`), encoders, decoders, and transformers. This will set
    the stage for us to move to more advanced topics on `NLP` and examine how the
    state of the art in `NLP` is now aiming to match human abilities as far as `NLU`
    is concerned.


    ## What Is a Neural Network?


    A neural network is defined as a network of neurons that are connected to process
    information and perform actions specific to the task. To put it simply, human
    neurons have the capability to transmit and process information when they receive
    electrical signals at their synaptic endpoints. An artificial neural network (`ANN`)
    replicates this flow of information by transmitting the information across the
    network after getting triggered by an activation function. `ANNs` are divided
    into three types of layers: input layer, hidden layers, and output layer. Neural
    networks generally have one input and one output layer and multiple hidden layers,
    as shown in Figure [2-1](#498208_1_En_2_Chapter.xhtml#Fig1).


    ![../images/498208_1_En_2_Chapter/498208_1_En_2_Fig1_HTML.png](images/498208_1_En_2_Chapter/498208_1_En_2_Fig1_HTML.png)


    Figure 2-1


    Neural network


    ## Building Blocks of Neural Networks


    In this section we discuss the basic building blocks of neural networks and how
    these blocks can be combined to form a neural network.


    ### Neuron


    The neuron, which mimics the behavior of the human neuron, is the smallest unit
    of a neural network. It takes input, processes it, and sends output to other neurons
    that work as activation for others. A neuron can only be activated based on observations
    received from a previous layer.


    ### Input Layer


    As per Figure [2-1](#498208_1_En_2_Chapter.xhtml#Fig1), the input layer takes
    processed data as input. Here, input can be pixels in the case of an image, or
    numbers from a vector representation of a sentence for text data or feature values.
    This layer is responsible for combining all features’ values with some weight
    values (weight value defines how much importance is given to each feature). Once
    processed, the output from the input layer is fed into the next layer, a hidden
    layer, and at last into the output layer.'
