    Introduction


    Question answering systems have revolutionized information retrieval. Technologies
    like Bidirectional Encoder Representations from Transformers (BERT) have made
    it possible for documents to be analyzed by machine learning systems and retrieve
    contextual information through the question-and-answer mechanism without the need
    for extensive training. Evolution of deep learning has had a great impact on the
    design of question answering systems and has enabled these systems to ingest enormous
    amounts of data and build billions of connections to understand human language
    better.


    This book focuses on a recent breakthrough in the natural language processing
    (NLP) domain, BERT which has achieved benchmarks on state-of-art NLP tasks such
    as question answering system, entity recognition systems, and so on.


    BERT implements innovative ways to generate the embedding of textual sentences.
    This book provides guidance on design and implementation of various types of question
    answering systems along with NLP tasks such as document summarization, entity
    recognition, and sentiment analysis. This could help data scientists and developers
    to design and implement their own NLP-based systems using BERT.


    Let’s start our journey in the exciting and quickly evolving domain of NLP.


    Acknowledgments


