  trans: "\n# 情感分析\n\n情感分析是自然语言处理的一个子领域，用于识别博客、评论、新闻等文本中的观点或情感。它可以帮助企业了解其产品的接受度以及消费者对产品的态度。它同样有助于识别社交媒体上的仇恨言论和其他问题，从而判断公众对特定讨论话题的情绪。情感分析甚至可以帮助企业根据特定人口区域消费者对特定话题的看法来规划产品发布。\n\
    \n本书使用了一个基于 BERT 训练的情感分析模型，该模型使用`.csv`格式的数据集，其中每个数据点由一对句子及其观点（即非侮辱、侮辱）组成。在推理时，系统处理用户的查询并返回相应的情感。\n\
    \n请按照以下步骤实现情感分析系统。\n\n1. 按照之前的方法创建一个新的 Jupyter 笔记本，并运行以下命令安装`deeppavlov`库（如果你在第\
    \ 5 章中没有安装的话）。\n\n```\n! pip install deeppavlov\n```\n\n安装完成后，你将看到如图 6-1 所示的输出。\n\
    \n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig1_HTML.jpg](img/498208_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1 安装`deeppavlov`\n\n2. 由于我们将使用情感分析，因此需要加载一个已在情感数据上训练好的模型。运行以下命令下载预训练模型`insults_kaggle_bert`。\n\
    \n```\n! python -m deeppavlov install insults_kaggle_bert\n```\n\n注意：如果你使用的是 Colab\
    \ 笔记本，请在安装命令前加上`!`符号，如上所示。\n\n安装完成后，你将看到如图 6-2 所示的输出。\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig2_HTML.jpg](img/498208_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2 安装包\n\n3. 使用以下命令执行此实现所需的必要导入。\n\n```\nfrom deeppavlov import build_model,\
    \ configs\n```\n\n4. 然后，我们将使用`deeppavlov`库中的`build_model`类获取情感分析模型。它接受两个参数：\n\
    \   - **config 文件路径：** 定义包含要使用的相关 NLP 模型详细信息的`config`文件名。在本例中，我们将使用`insults_kaggle_bert`。它包含了使用情感模型所需的配置。\n\
    \   - **download：** 如果需要下载模型，则为`True`，否则为`False`。由于我们是第一次使用，此参数的值将为`True`。\n\n\
    ```\nsentiment_model = build_model(configs.classifiers.insults_kaggle_bert, download=True)\n\
    ```\n\n5. 加载情感模型后，你可以通过提问“你真笨！”、“这部电影不错”等问题来测试该模型，并将这些问题作为参数传递给`sentiment_model`函数，如下所示。\n\
    \n```\ntest_input = ['This movie is good', 'You are so dumb!']\nresults = sentiment_model(test_input)\n\
    ```\n\n此代码段的输出将根据所提问题返回`Not Insult`或`Insult`。以下是使用情感分析的完整端到端代码库。\n\n```\nfrom\
    \ deeppavlov import build_model, configs\n\ndef build_sentiment_model():\n   \
    \ model = build_model(configs.classifiers.insults_kaggle_bert, download=True)\n\
    \    return model\n\ntest_input = ['This movie is good', 'You are so dumb!']\n\
    \nif __name__ == \"__main__\":\n    sentiment_model = build_sentiment_model()\n\
    \    results = sentiment_model(test_input)\n    print(results)\n```\n\n输出如下：\n\
    \n```\n['Not Insult', 'Insult']\n```\n\n现在我们已经了解了如何利用基于 BERT 的情感分析系统进行研究，接下来考虑一个场景：你需要在对话系统中启用情感分析，以便系统能够根据用户的查询或回复识别用户的情感。这将帮助对话系统根据用户的情感做出响应。请按照以下步骤将情感分析系统的功能作为\
    \ REST API 发布。\n\n1. 创建一个名为`SentimentAnalysisAPI.py`的文件。\n2. 将以下代码复制并粘贴到该文件中，然后保存。\n\
    3. 此代码处理传递给 API 的输入，调用`build_sentiment_model`函数，并将该函数的响应作为 API 响应发送。\n4. 打开命令提示符并运行以下命令。\n\
    \n```\npython SentimentAnalysisAPI.py\n```\n\n```\nfrom flask import Flask, request\n\
    import json\nfrom SentimentAnalysis.SentimentAnalysis import build_sentiment_model\n\
    \napp = Flask(__name__)\n\n@app.route(\"/sentimentAnalysis\", methods=['POST'])\n\
    def sentimentAnalysis():\n    try:\n        json_data = request.get_json(force=True)\n\
    \        questions = json_data['questions']\n        sentiment_model = build_sentiment_model()\n\
    \        questions_list = []\n        for ques in questions:\n            questions_list.append(ques)\n\
    \        model_output = sentiment_model(questions_list)\n        index = 0\n \
    \       result = []\n        for ans in model_output:\n            sentiment_qa\
    \ = dict()\n            sentiment_qa['question'] = questions_list[index]\n   \
    \         sentiment_qa['answer'] = ans\n            result.append(sentiment_qa)\n\
    \        result = {'results': result}\n        result = json.dumps(result)\n \
    \       return result\n    except Exception as e:\n        return {\"Error\":\
    \ str(e)}\n\nif __name__ == \"__main__\":\n    app.run(port=\"5000\")\n```\n\n\
    ![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig3_HTML.jpg](img/498208_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3 服务部署\n\n- 这将在`http://127.0.0.1:5000/`上启动一个服务，如图 6-3 所示。\n\n5. 现在，可以使用\
    \ Postman 测试 REST API。请参考图 6-4 中所示的 URL、提供给情感分析 API 的示例请求 JSON 以及从 API 接收的响应 JSON。\n\
    \n**URL：** `http://127.0.0.1:5000/sentimentAnalysis`\n\n**情感分析系统示例输入请求 JSON：**\n\
    \n```\n{\n    \"questions\": [\n        {\n            \"question\": \"This movie\
    \ is good.\"\n        },\n        {\n            \"question\": \"You are so dumb!\"\
    \n        }\n    ]\n}\n```\n\n**情感分析系统示例输出响应 JSON：**\n\n```\n{\n    \"results\"\
    : [\n        {\n            \"question\": \"This movie is good.\",\n         \
    \   \"answer\": \"Not Insult\"\n        },\n        {\n            \"question\"\
    : \"You are so dumb!\",\n            \"answer\": \"Insult\"\n        }\n    ]\n\
    }\n```\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig4_HTML.jpg](img/498208_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4 调用情感分析系统 API\n\n本练习的代码库可以从 GitHub 下载：`https://github.com/bertbook/Python_code/tree/master/Chapter6/SentimentAnalysis`。\n"
- fmt: "# Named Entity Recognition\n\nNamed entity recognition is a subfield of information\
    \ extraction where it aims to extract nouns or noun phrases from text data and\
    \ classify them into categories such as person, place, time, organization, and\
    \ so on. This is mainly useful for conversion of unstructured text to structured\
    \ text. Entity recognition plays a major role in the following systems.\n\n* **Search\
    \ engine**: This is used to identify relevant documents for a query asked by the\
    \ user. For an example, let’s use “What is Microsoft Outlook?” In this query,\
    \ “Microsoft Outlook” is an entity of type application. The search engine will\
    \ thus give more importance to a document where Microsoft Outlook is being identified\
    \ as an entity.\n\n* **Conversation system**: Entity plays a major role in the\
    \ design of a conversation system. Entities are being used in conversation systems\
    \ to disambiguate a question asked by the user if it is related to common issues\
    \ but for different entities. As an example, a user has entered the query “I am\
    \ facing an issue in Outlook.” The conversation system has two solutions: one\
    \ for Outlook and the other for Gmail. Because Outlook and Gmail both are different\
    \ entities, so are the solutions. Therefore, after identification of intent (i.e.,\
    \ Issue), the next identification will be entity (i.e., Outlook) and the conversation\
    \ system provides a solution accordingly.\n\nThere exist many annotated datasets\
    \ for entity recognition. For this book, though, we will demonstrate an entity\
    \ model that has been trained on the OntoNotes dataset using BERT as a baseline.\
    \ This dataset is a collection of 1,745,000 English, 900,000 Chinese, and 300,000\
    \ Arabic text data collected from a range of sources such as telephone conversations,\
    \ newswire, broadcast news, broadcast conversation, and blogs.\n\nIn this dataset,\
    \ entities have been annotated with 18 categories such as organization, art work,\
    \ numbers in word, numbers, quantity, person, location, geopolitical entity, time,\
    \ date, facility, event, law, nationalities or religious or political groups,\
    \ language, currency, percentage, and product, among others.\n\nIn this section,\
    \ we explore how a named entity recognition system that has been trained on an\
    \ OntoNotes dataset using BERT can be used. Please follow these steps to implement\
    \ a named entity recognition system.\n\n1. Create a new Jupyter notebook, as mentioned\
    \ previously, and run the following command to install the `deeppavlov` library.\n\
    \n```\n! pip install deeppavlov\n```\n\nOnce installed, you will see output that\
    \ looks like Figure [6-5](#498208_1_En_6_Chapter.xhtml#Fig5).\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig5_HTML.jpg](images/498208_1_En_6_Chapter/498208_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5\n\nInstallation of `deeppavlov`\n\n2. We are going to use an entity\
    \ recognition system that has been trained on OntoNotes data as shown in Figure\
    \ [6-6](#498208_1_En_6_Chapter.xhtml#Fig6). Hence, run the following command to\
    \ download the trained model, `ner_ontonotes_bert_mult`.\n\n```\n! python -m deeppavlov\
    \ install ner_ontonotes_bert_mult\n```\n\nNote\n\nPlease use the ‘!’ symbol before\
    \ the installation command as just shown if you are working with Colab Notebook.\n\
    \n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig6_HTML.jpg](images/498208_1_En_6_Chapter/498208_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nInstallation of packages\n\n3. Perform the necessary imports as\
    \ required for this implementation using this command.\n\n4. We will then get\
    \ an entity model using the `build_model` class of the `deeppavlov` library. It\
    \ takes two arguments:\n   * **Config file path**: Define the name of the `config`\
    \ file that contains the details of the relevant NLP model to be used. For this\
    \ case, we will use `ner_ontonotes_bert_mult`. This file contains all configurations\
    \ required for the entity model trained on OntoNotes.\n   * `download`: This is\
    \ `True` if the model needs to be downloaded and `False` otherwise. Because we\
    \ are doing this for the first time, the value of this argument will be `True`."
