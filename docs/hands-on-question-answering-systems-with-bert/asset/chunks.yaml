    result should have document summary as well.


    The codebase for this exercise can be downloaded from GitHub at [`https://github.com/bertbook/Python_code/tree/master/Chapter6/TextSummarization`](https://github.com/bertbook/Python_code/tree/master/Chapter6/TextSummarization)
    .


    ## Conclusion


    This chapter covered the applicability of BERT in various NLP tasks such as sentiment
    analysis, text classification, entity recognition, and document summarization.
    We leveraged a BERT-based model to build NLP-based systems. In the next chapter,
    we will talk about the latest research happening in BERT.


    # 7. Future of BERT Models


    The topics we have covered thus far deal with the architecture and application
    of the BERT model. The BERT model has not only affected the ML domain, but other
    fields like content marketing as well. Now let’s discuss the development and future
    possibilities of BERT.


    ## Future Capabilities


    Transformer-based ML models like BERT have proven to be successful for state-of-the-art
    natural processing tasks. BERT, which is a large-scale model, remains one of the
    most popular language models that delivers state-of-the-art accuracy.


    The BERT model has also been used by the Google search team to improve the query
    understanding capabilities of Google Search. As BERT is a bidirectional model,
    it is able to understand the context of a word by looking at the surrounding words.
    BERT is particularly helpful to capture the intent behind search queries.


    Ever since its release, the BERT model has influenced the development of various
    models that are based on BERT. It has to be credited for the introduction of models
    that not only incorporate its name, but also its core architecture ideas. The
    variants of BERT are able to successfully beat records across a wide array of
    NLP tasks like sentiment analysis, document classification, question answering,
    and more.


    Here are a few of the models that are based on BERT.


    *   There are models that pertain to an application or domain-specific corpus.
    BioBERT is one such model that is trained on biomedical text. Other examples are
    SciBERT and Clinical BERT. Training on a domain-specific corpus has turned out
    to be useful and results in better performance when fine-tuning is done on downstream
    NLP tasks in contrast to fine-tuning BERT, which is trained on BookCorpus and
    Wikipedia.


    *   The ERNIE model incorporates knowledge into pretraining and uses a knowledge
    graph to mask entities and phrases. It is pretrained on a large corpus while taking
    the knowledge graph into consideration during input.


    *   The TransBERT model is used for a story ending prediction task that uses a
    three-stage unsupervised training approach. This is then followed by two supervised
    steps.


    *   For making medical recommendations, G-BERT basically combines the power of
    graph neural networks and BERT. This model is used for medical code recommendations
    and representations. Encoding of medical codes with hierarchical representations
    in G-BERT is done with the help of graph neural networks.


    *   In addition to pretrained models there are also fine-tuned models like DocBERT
    (document classification) and PatentBERT (patent classification). These models
    are fine-tuned for specific tasks. These pretrained BERT-based models can be fine-tuned
    with the help of NLP tasks, POS, NER, and so on, to achieve better results.


    These models are representative of broad classes of BERT- based models. They depict
    how the BERT model can further be used in different domains with modifications
    in pretraining or fine-tuning. BERT hence forms a base for the development of
    other models that are effective in a wide variety of tasks.


    One of the developments that relies on the BERT model is RoBERTa, developed by
    Facebook, which has proven to be highly efficient on GLUE benchmarking. RoBERTa
    uses the strategy of BERT to mask the text and the machine learns to predict the
    hidden text. The training is done on a larger number of mini-batches and learning
    rates, and the hyperparameters are modified to achieve better results. These changes
    allowed the RoBERTa model to prove its efficiency on MNLI, QNLI, RTE, STS-B, and
    RACE tasks, and it also shows considerable improvement on the GLUE benchmark.


    RoBERTa uses 160 GB of data for pretraining, which includes unannotated NLP datasets
    and data scrapped from public news articles called the CC-News dataset. These
    data, along with training of RoBERTa on a 1024 V100 Tesla GPU, takes a day to
    complete. This results in better performance of RoBERTa over other available models
    like BERT, XLNet, Alice, and so on.


    BERT is incorporated into Google Search, which results in precise and accurate
    searches. This will affect the content strategy of many users. The content now
    has to be more precise so that it can be rated better using search engine optimization.
    The strategies to design the content have to be improvised.'
