    About the Authors About the Technical Reviewer


    # 1. Introduction to Natural Language Processing


    With recent advances in technology, communication is one of the domains that has
    seen revolutionary developments. Communication and information have formed the
    backbone of modern society and it is language and communication that has led to
    such advances in human knowledge in all spheres. Humans have been fascinated by
    the idea of machines or robots having human-like abilities to converse in our
    language. Numerous science fiction books and media have dealt with this topic.
    The Turing test was designed for this purpose, to test whether a human being is
    able to decipher if the entity on the other end of a communication channel is
    a human being or a machine.


    With computers, we started with a binary language that a computer could interpret
    and then compute based on the instructions. Over time, however, we came up with
    procedural and object-oriented languages that use syntax and instructions in languages
    that are more natural and correspond to the words and ways in which humans communicate.
    Examples of such constructs are for loops and if constructs.


    With the availability of increased computing capacity and the ability of computers
    to process huge amounts of data, it became easier to use machine learning (ML)
    and deep learning models to understand human language. With neural networks, recurrent
    neural networks (RNNs), and other deep learning technologies becoming accessible
    and the computing power to run these models available, a variety of natural language
    processing (NLP) platforms became available for developers to work with over the
    cloud and on premises. This chapter takes you through the basics of NLP.'
