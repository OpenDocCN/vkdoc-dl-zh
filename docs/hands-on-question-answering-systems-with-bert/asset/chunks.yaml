  raw: "## Sentiment Analysis\n\nSentiment analysis is a subfield of NLP that identifies\
    \ opinions or sentiments of given text across blogs, reviews, news, and so on.\
    \ It can inform businesses about acceptance of their products and consumer sentiments\
    \ toward the same. It is also useful to identify hate speech and other issues\
    \ over social media to identify the population’s mood toward a given topic of\
    \ discussion. Sentiment analysis can even help companies plan product releases\
    \ on the basis of consumer opinion about particular topics in particular demographic\
    \ regions.\n\nFor this book, we have used a sentiment analysis model that has\
    \ been trained using BERT, which uses a dataset in `.csv` format where each data\
    \ point is pair of sentences and its opinion (i.e., not insult, insult). For inference,\
    \ the system processes a user’s query and provides a sentiment for the same.\n\
    \nPlease follow these steps to implement a sentiment analysis system.\n\n1.  Create\
    \ a new Jupyter notebook as covered previously and run the following command to\
    \ install the deeppavlov library (if you didn’t do so in Chapter [5](#498208_1_En_5_Chapter.xhtml)).\n\
    \n```\n! pip install deeppavlov\n```\n\nOnce it is installed, you will see the\
    \ output shown in Figure [6-1](#498208_1_En_6_Chapter.xhtml#Fig1).\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig1_HTML.jpg](images/498208_1_En_6_Chapter/498208_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nInstallation of deeppavlov\n\n1.  Because we are going to use\
    \ sentiment analysis we we will use a model that has been trained on sentiment\
    \ data. Run the following command to download a trained model, `insults_kaggle_bert`.\n\
    \n```\n! python -m deeppavlov install insults_kaggle_bert\n```\n\nNote\n\nPlease\
    \ use the ‘!’ symbol before the installation command as just shown if you are\
    \ working with Colab Notebook.\n\nOnce it is installed, you will see the output\
    \ shown in Figure [6-2](#498208_1_En_6_Chapter.xhtml#Fig2).\n\n![../images/498208_1_En_6_Chapter/498208_1_En_6_Fig2_HTML.jpg](images/498208_1_En_6_Chapter/498208_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nInstallation of packages\n\n1.  Perform the necessary imports\
    \ as required for this implementation using this command.\n\n1.  Then we will\
    \ get a sentiment analysis model using the `build_model` class of the deeppavlov\
    \ library. It takes two arguments:\n    *   **config** **file path:** Define the\
    \ name of the `config` file that contains details of the relevant NLP model to\
    \ be used. For this case, we will use `insults_kaggle_bert`. This contains the\
    \ configuration required to use the sentiment model.\n\n*   **download:** This\
    \ is `True` if the model needs to be downloaded, and `False` otherwise. Because\
    \ we are doing this for the first time, the value of this argument will be `True`.\n\
    \n```\n        sentiment_model = build_model(configs.classifiers.insults_kaggle_bert,\
    \ download=True)\n        ```\n\n2.  Once the sentiment model has been loaded,\
    \ you can test this model by asking questions such as “You are so dumb!,” “This\
    \ movie is good,” and so on, and passing these questions as an argument to the\
    \ `sentiment_model` function shown here.\n\n```\nfrom deeppavlov import build_model,\
    \ configs\n```\n\n```\ntest_input = ['This movie is good', 'You are so dumb!']\n\
    results = sentiment_model(test_ input)\n```\n\nThe output of this code segment\
    \ will be `Not Insult` or `Insult` depending on the question asked. Here is the\
    \ complete end-to-end codebase to use sentiment analysis.\n\n```\nfrom deeppavlov\
    \ import build_model, configs\ndef build_sentiment_model ():\nmodel = build_model(configs.classifiers.insults_kaggle_bert,\
    \ download=True)\nreturn model\ntest_input = ['This movie is good', 'You are so\
    \ dumb!']\nif __name__ == \"__main__\" :\nsentiment_model = build_sentiment_model()\n\
    results = sentiment_model(test_ input)\nprint(results)\n```\n\nThis is the output:\n\
