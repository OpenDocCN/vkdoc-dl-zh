- fmt: '# Understanding the Vision APIs with Computer Vision


    **Computer Vision** is a set of APIs that come under the category of artificial
    intelligence (AI). It helps you train computers (machines). The process of training
    a machine is to teach the computer how to understand the visual world. The act
    of capturing text data from the digital image (and capturing graphics data from
    videos) is one of the most powerful inventions in the world of Computer Vision.


    **Artificial intelligence (AI)** refers to the technique how machines can think
    like humans. This technique comes with programming, algorithms, and training,
    where machines are instructed or trained to think and behave like humans. The
    term AI was coined in 1956, when scientists explored topics like problem solving.
    It then grew in popularity in 1960 when Defense Advanced Research Projects Agency
    (DARPA) took interest in the work to train computers and mimic basic human reasoning.
    The research was so good that, in 2003, DARPA introduced intelligent personal
    assistants.


    Deep learning is a type of machine learning that helps train the computers/machines,
    so that these machines perform tasks like humans do. These tasks could be speech
    recognition, image identification, object specifications, or the machines can
    take possible decisions and make predictions.


    In short, Computer Vision comes under artificial intelligence (AI). With the help
    of training (called deep learning), the trained machines can easily identify the
    objects. A training model also helps these machines classify the identified objects.
    Note that the accuracy to identify and specify the objects will depend upon the
    training of the machines.


    Optical character recognition (OCR) is a technique that helps you create editable
    or searchable data from visual, textual documents, such as scanned paper, images,
    PDF files, and or any other file format that contains textual or visual contents
    that can be extracted.


    Computer Vision is not new. It has been here for more than six decades. It got
    more popular in the 1970s, when **Raymond Kurzweil** (known as Ray Kurzweil) commercialized
    the first optical character recognition tool, which was named “**omni-font OCR**”.
    This tool was able to process the printed text in almost any font. In the year
    2000, the OCR was released as a cloud-based service.


    Now, we can say that Computer Vision is mature (but keep in mind it’s still growing
    and learning itself). It is one of the best gifts for technologists and scientists,
    to take advantage of the advanced capabilities to analyze and identify the data.
    The inner workings of Computer Vision are rather simple and can be defined in
    the following steps:


    1. **Collecting images** – These days, we have a host of space, which can be 100
    GB to 1 TB or more, and we have the technology to capture digital images. So,
    today it is very easy to capture and collect digital images, photos, and 3D objects.

    2. **Image processing** – The first step to train the model is that we need data.
    This data is merely a collection of related images. Now, we have technology with
    more compute power. We can process thousands of pre-identified images.

    3. **Image understanding** – This is the step where the Computer Vision has identified
    or classified the object.


    The preceding steps are called thumb steps, which only describe the basic functionality
    of Computer Vision. These steps can further be divided, based on decisions made.
    Computer Vision can also be divided into the following steps:


    - Image partitioning or separating an image into multiple regions, subregions,
    or pieces of a large image, so that each piece can be examined separately.

    - Using X and Y coordinate detection or the identification of objects in a single
    image. With the help of X and Y coordinates, it creates a bounding box, and then
    it’s easy to identify everything inside the box.

    - Considering facial recognition, which is an advanced type of intelligence that
    detects the object. It is so advanced that it not only recognizes that it sees
    a human face in an image, but it also identifies a specific individual (whose
    face it is).

    - Pattern detection is another advanced functionality, which recognizes repeated
    shapes and colors in the images.


    ## Microsoft Azure Cognitive Services


    The Computer Vision API is a set of cloud-based services that provide advanced
    algorithms and that help developers analyze and process the images, to retrieve
    the information. In short, the Computer Vision APIs provide insights on images,
    handwriting, and videos.


    Now, OCR supports API v3.2 for 73 different languages. You can find this language
    information at [`https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/language-support#optical-character-recognition-ocr`](https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/language-support%2523optical-character-recognition-ocr).


    To get started with the Azure portal, you need a valid Azure account. If you do
    not have a valid Azure account, take the following steps to register a free Azure
    account:


    - Go to [`https://signup.azure.com`](https://signup.azure.com).

    - To sign up for a free account, you are required to provide a valid phone number,
    a valid credit card, and a GitHub account or Microsoft account ID (previously
    known as the Windows Live ID).

    - Follow the instructions on the screen.


    After registration, your account will include 12 months of free services.


    You can then sign in to Azure, at [`https://portal.azure.com`](https://portal.azure.com).
    Once you sign in, you will land on the portal home page, which currently looks
    like Figure [3-1](#499686_1_En_3_Chapter.xhtml#Fig1).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig1_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    The Azure portal


    A complete walkthrough of the Azure portal is beyond the scope of this book. If
    you want to learn the details of navigating and using the Azure portal, please
    refer to the book ***Cloud Debugging and Profiling in Microsoft Azure***, published
    by Apress.


    ## Analyzing Images


    In the previous section, we discussed how the Computer Vision APIs provide a way
    to identify and analyze object. Computer Vision does this to extract the data
    from images with the help of various algorithms. Computer Vision makes a developer’s
    job easier, by providing hundreds of objects and parameters. In this section,
    we will learn more about the APIs, and we’ll take it to the next level, with a
    code example.


    First, go to the Azure portal, and search “Cognitive Services” from search text
    box. Alternatively, you can click **All services**, **AI + machine learning**
    (in the left pane), and **Cognitive Services** in the right pane. See Figure [3-2](#499686_1_En_3_Chapter.xhtml#Fig2).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig2_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Searching for Cognitive Services


    Next, you will see the Cognitive Services screen. From this screen, you can manage
    your existing service or add/create a new service. This is the starting point
    from where the journey of image analysis begins.


    The Computer Vision Cognitive Service uses a model that is pretrained and helps
    developers analyze the images.'
