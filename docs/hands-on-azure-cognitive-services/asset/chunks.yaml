- fmt: '# Working with Azure Container Instances


    “It works on my machine” is a great goal, but you might want to achieve reproducibility,
    performance, simplicity, and speed, without having the burden of a full orchestration
    platform (such as Kubernetes and Mesos). Azure Container Instances (`ACI`) provides
    a good alternative. `ACI` is a quick and lightweight way of running containers
    in the Azure cloud, and you can manage your own container registry with Azure
    Container Registry (`ACR`).


    “Doesn’t this defeat the purpose?” you may ask. The reason for having containers
    was to have control and not deploy things on the cloud. Now we suggest that you
    deploy the container itself on the cloud? That does not make any sense. Let us
    explain.


    Besides compliance and data protection, one of the reasons for containerization
    is control. If your organizational or regional policy allows you to only host,
    keep, and process your customer data in the specific region, and you want to control
    your deployment process, then running your containers in `ACI` might be a good
    alternative to managing your own data center. With the Microsoft cloud platform,
    you have choices – you can bring your own hardware, use lightweight `ACI`, or
    go with an orchestration platform like `AKS`. Let’s get started, with `ACI`:


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig21_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig21_HTML.jpg)


    Figure 8-21


    Searching for `ACI`


    1.  Go to the Azure portal and search for “`ACI`” or “Container instances,” as
    shown in Figure [8-21](#499686_1_En_8_Chapter.xhtml#Fig21). Click **Container
    instances**.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig22_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig22_HTML.jpg)


    Figure 8-22


    Create container instance


    1.  Create the container instance, as shown in Figure [8-22](#499686_1_En_8_Chapter.xhtml#Fig22).
    Populate the required fields, and then select the image link. In this case, we
    select the Microsoft Text Analytics image from `MCR`.


    Before proceeding, you should review the container requirements and recommendations^([^(29)](#fn29)),
    and then make sure that the configuration of your container instances matches
    the configuration that Microsoft recommends. The current specification is listed
    in Figure [8-23](#499686_1_En_8_Chapter.xhtml#Fig23), but you should verify the
    necessary specification, as they may periodically change. We now live in the era
    of a billion parameter models.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig23_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig23_HTML.jpg)


    Figure 8-23


    The container requirements


    In our case, we will use the language detection container, and we will modify
    the specs by clicking **Change size**. You will then see the Change container
    configuration screen, as shown in Figure [8-24](#499686_1_En_8_Chapter.xhtml#Fig24).
    Update the number of CPU cores and the memory required.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig24_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig24_HTML.jpg)


    Figure 8-24


    Configuring the resource requirements


    Now you can proceed and create the container. Once the deployment is complete,
    you would see screen shown in Figure [8-25](#499686_1_En_8_Chapter.xhtml#Fig25).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig25_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig25_HTML.jpg)


    Figure 8-25


    A completed deployment


    Since this container is deployed in the cloud via `ACI`, it has a public IP (in
    our case, it is `52.146.70.12`). You can access the IP from your browser to see
    the welcome screen shown in Figure [8-26](#499686_1_En_8_Chapter.xhtml#Fig26).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig26_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig26_HTML.jpg)


    Figure 8-26


    The Azure Container Instances welcome screen


    Now that the instance is ready, you can access the API, invoke the service, and
    so on. We will see this in detail shortly.'
