- fmt: '# Creating a Machine Learning Model for Classification


    The UCI Census Adult Income Data Set^([^(39)](#fn39)) has been around for a while.
    It is used for a variety of different use cases, including to predict if the income
    exceeds $50K per year, based on the census data.


    1. Create a notebook by clicking the **Create** button, as shown in Figure [10-18](#499686_1_En_10_Chapter.xhtml#Fig18).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig18_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig18_HTML.jpg)


    Figure 10-18


    Azure Machine Learning notebooks – creating a notebook workflow


    Name the notebook `AdultCensusClassifer.ipynb`. In the File type drop-down box,
    select **Notebook** (as shown in Figure [10-19](#499686_1_En_10_Chapter.xhtml#Fig19)).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig19_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig19_HTML.jpg)


    Figure 10-19


    Azure Machine Learning notebooks – creating a notebook workflow


    1. Upload the `adult.csv` and `adult_test.csv` datasets, which are part of the
    book’s code repository. These files contain the adult dataset in the CSV format,
    as shown in Figure [10-20](#499686_1_En_10_Chapter.xhtml#Fig20).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig20_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig20_HTML.jpg)


    Figure 10-20


    Azure Machine Learning – uploading the dataset


    You will need to verify that you trust the contents of these files. Click the
    **I trust contents of these files** checkbox to give your consent, as shown in
    Figure [10-21](#499686_1_En_10_Chapter.xhtml#Fig21). Any unsecure uploads can
    cause security and governance issues to your repositories.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig21_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig21_HTML.jpg)


    Figure 10-21


    Azure Machine Learning notebooks – uploading the dataset


    You can click the uploaded dataset to view the CSV file in the browser, as shown
    in Figure [10-22](#499686_1_En_10_Chapter.xhtml#Fig22).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig22_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig22_HTML.jpg)


    Figure 10-22


    Azure Machine Learning notebooks – viewing the dataset


    1. The experiment will try to apply different classification algorithms to the
    dataset, and then it will generate the accuracy scores. The code segment, as shown
    in Figure [10-23](#499686_1_En_10_Chapter.xhtml#Fig23), loads the adult dataset,
    the adult test dataset, and the prerequisites and dependencies.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig23_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig23_HTML.jpg)


    Figure 10-23


    Azure Machine Learning notebooks – code for running prerequisites and loading
    the datasets


    1. Let’s run the logistic regression classifier on the dataset and then calculate
    the scores. The `sklearn` library makes the interface very consistent and easy
    to work with. Toward the end, we print the accuracy scores and append it to the
    performance array (as shown in Figure [10-24](#499686_1_En_10_Chapter.xhtml#Fig24)).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig24_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig24_HTML.jpg)


    Figure 10-24


    Azure Machine Learning notebooks – code for logistic regression


    1. We repeat the same experiment with Gaussian Naïve Bayes, K neighbors, random
    forests, and support vector machines. In Figure [10-25](#499686_1_En_10_Chapter.xhtml#Fig25),
    you can see that random forest has the best results for both training and test
    data.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig25_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig25_HTML.jpg)


    Figure 10-25


    Azure Machine Learning notebooks – results for experiments


    Before we conclude, the notebook’s IntelliSense, a code-completion aid, is a wonderful
    feature that gives you the look and feel of an IDE in the browser. In Figure [10-26](#499686_1_En_10_Chapter.xhtml#Fig26),
    you can see the method’s parameter when you mouse over it, and you also can use
    autocomplete.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig26_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig26_HTML.jpg)


    Figure 10-26


    Azure Machine Learning notebooks – IntelliSense and autocomplete


    This experiment provided you insight into how you can import a dataset into Azure
    notebooks and run multiple algorithms.


    Azure Notebooks had a preview version (`https://notebooks.azure.com/`), which
    is now retired, and these notebooks are not an integrated part of Azure Machine
    Learning service. If you are looking for a free alternative for research and development
    purposes, Google Colab (`https://colab.research.google.com/notebooks/intro.ipynb`)
    provides an excellent choice. However, the service is *stateless*, which means
    upon every session expiration, you would need to reload the datasets.'
