    \n现在，你已经准备好使用这些技术构建自己的应用程序。你的用例会有所不同，但这些基础知识将帮助你开始在组织内部以及外部网络上进行搜索。\n\n继续探索吧！\n\
    \n# 8. 使用容器部署和托管服务\n\n好吧，如果你还没听说过容器，那你可能还在用拨号上网！可以这么说，容器是自切片面包以来最伟大的发明。容器使你能够以一致且可重复的方式在多种环境中部署软件。它们不像虚拟机那样笨重。微软首席讲解员\
    \ Scott Hanselman 制作了一个关于容器的精彩视频^([²²)，我强烈推荐，特别是如果你刚接触这个容器生态系统。\n\n在本章中，我们的目标是深入了解认知服务容器。我们将重点介绍关键的容器化特性，并演示如何使用\
    \ Docker 构建和部署应用程序。在本章中，你将学习以下主题：\n\n1.  认知服务容器入门\n2.  理解部署，以及如何在 Azure 容器实例上部署和运行容器\n\
    3.  理解 Docker Compose 并使用它部署多个容器\n4.  理解 Azure Kubernetes 服务以及如何将应用程序部署到 Azure\
    \ Kubernetes 服务\n\n容器化技术包括 Docker、Kubernetes（简称 K8s）、Azure Kubernetes 服务（AKS）、Azure\
    \ 容器实例（ACI）以及其他相关主题。这些主题过于复杂，无法在本章中详尽涵盖。相反，本章将重点帮助你入门认知服务容器，解释其必要性，并使你能够在需要时充分利用这些惊人技术的强大功能。\n"
- fmt: '# Cognitive Services Containers


    Azure Cognitive Services are hosted in the highly available Azure cloud data centers
    and provide excellent SLAs (service-level agreements), and they use the economy
    of scale to learn, adapt, and improve. Why do we need to box them up and serve
    it as containers?


    Great question, but have you spoken to an auditor? Imagine working in a highly
    regulated environment, where exposing data outside the firewall requires an act
    of congress, and rightfully so. Also, containers make a great business use case
    for disconnected environments, those with low latency requirements, or where the
    Internet connectivity is either unavailable or inconsistent. With full control
    on data, and model updates, containers provide an excellent alternative to cloud-based
    services with high throughput and low latency.


    Therefore, to solve security, compliance, and operational issues, Azure Cognitive
    Services provides containers in the following categories:


    * **Vision containers** – [OCR](https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/computer-vision-how-to-install-containers),
    perform [spatial analysis, face](https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/spatial-analysis-container)
    detection, and form recognition

    * **Language containers** – [sentiment analysis](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dsentiment),
    [key phrase extraction](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dkeyphrase),
    [text language detection](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dlanguage),
    [Text Analytics for health](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dhealthcare),
    and [LUIS (language understanding intelligent service or simply *language understanding*)](https://docs.microsoft.com/en-us/azure/cognitive-services/luis/luis-container-howto)

    * **Speech containers** – [speech to text](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dstt),
    [custom speech to text](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dcstt),
    [text to speech](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dtts),
    [custom text to speech](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dctts),
    [neural text to speech](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dntts),
    and [speech language detection](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dlid)

    * **Decision container** – Anomaly Detector


    Cognitive computing containers are, interestingly enough, Linux containers. Microsoft
    is the first provider of pretrained AI in containers with the metering model of
    billing per transaction. For versioning and other related frequently asked questions,
    Microsoft maintains an active FAQ section on their production documentation which
    can be found at [`https://docs.microsoft.com/en-us/azure/cognitive-services/containers/container-faq`](https://docs.microsoft.com/en-us/azure/cognitive-services/containers/container-faq).


    The availability of these offerings varies. Some of the containers are GA (generally
    available), while others are in preview or a gated private preview (they require
    access approvals). The current availability status of each offering, for Azure
    Cognitive Services containers, can be found at [`https://docs.microsoft.com/en-us/azure/cognitive-services/cognitive-services-container-support`](https://docs.microsoft.com/en-us/azure/cognitive-services/cognitive-services-container-support).


    As part of vision containers, the face detection and form recognition services
    are unavailable. On June 11, 2020, Microsoft announced *“that it will not sell
    facial recognition technology to police departments in the United States until
    strong regulation, grounded in human rights, has been enacted.”* Other major cloud
    providers also followed suit. The Form Recognizer service is available as part
    of the Azure Cognitive Services offering, but not as a container.


    The Cognitive Services containers connect to the Azure data centers to send the
    metering information, but they do not send customer data to Microsoft. Cognitive
    Services include most industry standard certifications, which helps you build
    and deploy healthcare, manufacturing, and financial use cases on the Azure platform.
    These certifications include ISO 20000-1:2011, ISO 27001:2013, ISO 27017:2015,
    ISO 27018:2014, and ISO 9001:2015 certification; HIPAA BAA, SOC 1 Type 2, SOC
    2 Type 2, and SOC 3 attestation; and PCI DSS Level 1 attestation. Cognitive Services
    containers, however, do not have any compliance certifications.


    Note from Microsoft on Face Recognition^([^(23)](#fn23))


    On June 11, 2020, Microsoft announced that it will not sell facial recognition
    technology to police departments in the United States until strong regulation,
    grounded in human rights, has been enacted. As such, customers may not use facial
    recognition features or functionality included in Azure Services, such as Face
    or Video Indexer, if a customer is, or is allowing use of such services by or
    for, a police department in the United States.


    Like SDLC (software design life cycle), the machine learning development life
    cycle, data science life cycle, and/or Microsoft team data science process also
    demands a higher degree of control over the deployment process. This includes
    versioning, controlling model drift, model decay, and compliance. Containers provide
    you the required granularity and control to ensure that you have the required
    governance powers.


    Next, let’s build some Cognitive Services containers.


    ## Hosting Cognitive Services Containers


    Cognitive Services containers have multiple hosting options. You can build a Docker
    container and host it locally and then connect it with Cognitive Services; you
    can use Azure Container Instances (ACI), Azure Kubernetes Service (AKS), or deploy
    a Kubernetes cluster on Azure Stack. These options provide the entire spectrum
    of container deployment with varying degrees of control and responsibility. With
    great power comes great responsibility.'
  raw: '## Cognitive Services Containers


    Azure Cognitive Services are hosted in the highly available Azure cloud data centers
    and provide excellent SLAs (service-level agreements), and they use the economy
    of scale to learn, adapt, and improve. Why do we need to box them up and serve
    it as containers?


    Great question, but have you spoken to an auditor? Imagine working in a highly
    regulated environment, where exposing data outside the firewall requires an act
    of congress, and rightfully so. Also, containers make a great business use case
    for disconnected environments, those with low latency requirements, or where the
    Internet connectivity is either unavailable or inconsistent. With full control
    on data, and model updates, containers provide an excellent alternative to cloud-based
    services with high throughput and low latency.


    Therefore, to solve security, compliance, and operational issues, Azure Cognitive
    Services provides containers in the following categories:


    *   **Vision containers** – [OCR,](https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/computer-vision-how-to-install-containers)
    perform [spatial analysis, face](https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/spatial-analysis-container)
    detection, and form recognition


    *   **Language containers** – [sentiment analysis](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dsentiment),
    [key phrase extraction](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dkeyphrase),
    [text language detection](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dlanguage),
    [Text Analytics for health](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dhealthcare),
    and [LUIS (language understanding intelligent service or simply *language understanding*)](https://docs.microsoft.com/en-us/azure/cognitive-services/luis/luis-container-howto)


    *   **Speech containers** – [speech to text](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dstt),
    [custom speech to text](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dcstt),
    [text to speech](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dtts),
    [custom text to speech](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dctts),
    [neural text to speech](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dntts),
    and [speech language detection](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dlid)


    *   **Decision container** – Anomaly Detector


    Cognitive computing containers are, interestingly enough, Linux containers. Microsoft
    is the first provider of pretrained AI in containers with the metering model of
    billing per transaction. For versioning and other related frequently asked questions,
    Microsoft maintains an active FAQ section on their production documentation which
    can be found at [`https://docs.microsoft.com/en-us/azure/cognitive-services/containers/container-faq`](https://docs.microsoft.com/en-us/azure/cognitive-services/containers/container-faq).


    The availability of these offerings varies. Some of the containers are GA (generally
    available), while others are in preview or a gated private preview (they require
    access approvals). The current availability status of each offering, for Azure
    Cognitive Services containers, can be found at [`https://docs.microsoft.com/en-us/azure/cognitive-services/cognitive-services-container-support`](https://docs.microsoft.com/en-us/azure/cognitive-services/cognitive-services-container-support).


    As part of vision containers , the face detection and form recognition services
    are unavailable. On June 11, 2020, Microsoft announced *“that it will not sell
    facial recognition technology to police departments in the United States until
    strong regulation, grounded in human rights, has been enacted.”* Other major cloud
    providers also followed suit. The Form Recognizer service is available as part
    of the Azure Cognitive Services offering, but not as a container.


    The Cognitive Services containers connect to the Azure data centers to send the
    metering information, but they do not send customer data to Microsoft. Cognitive
    Services include most industry standard certifications, which helps you build
    and deploy healthcare, manufacturing, and financial use cases on the Azure platform.
    These certifications include ISO 20000-1:2011, ISO 27001:2013, ISO 27017:2015,
    ISO 27018:2014, and ISO 9001:2015 certification; HIPAA BAA, SOC 1 Type 2, SOC
    2 Type 2, and SOC 3 attestation; and PCI DSS Level 1 attestation. Cognitive Services
    containers, however, do not have any compliance certifications.


    Note from Microsoft on Face Recognition^([^(23)](#fn23))


    On June 11, 2020, Microsoft announced that it will not sell facial recognition
    technology to police departments in the United States until strong regulation,
    grounded in human rights, has been enacted. As such, customers may not use facial
    recognition features or functionality included in Azure Services, such as Face
    or Video Indexer, if a customer is, or is allowing use of such services by or
    for, a police department in the United States.


    Like SDLC (software design life cycle), the machine learning development life
    cycle, data science life cycle, and/or Microsoft team data science process also
    demands a higher degree of control over the deployment process. This includes
    versioning, controlling model drift, model decay, and compliance. Containers provide
    you the required granularity and control to ensure that you have the required
    governance powers.


    Next, let’s build some Cognitive Services containers.


    ## Hosting Cognitive Services Containers


    Cognitive Services containers have multiple hosting options. You can build a Docker
