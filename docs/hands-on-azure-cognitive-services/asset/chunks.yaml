    # 创建用于分类的机器学习模型


    UCI 人口普查成人收入数据集^(³⁹) 已经存在一段时间了。它被用于多种不同的场景，包括根据人口普查数据预测年收入是否超过 5 万美元。


    1. 点击**创建**按钮来创建一个笔记本，如图 10-18 所示。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig18_HTML.jpg](img/499686_1_En_10_Fig18_HTML.jpg)


    图 10-18


    Azure 机器学习笔记本 – 创建笔记本工作流


    将笔记本命名为 `AdultCensusClassifer.ipynb`。在文件类型下拉框中，选择**笔记本**（如图 10-19 所示）。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig19_HTML.jpg](img/499686_1_En_10_Fig19_HTML.jpg)


    图 10-19


    Azure 机器学习笔记本 – 创建笔记本工作流


    1. 上传 `adult.csv` 和 `adult_test.csv` 数据集，这些文件是本书代码仓库的一部分。这些文件包含 CSV 格式的成人数据集，如图
    10-20 所示。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig20_HTML.jpg](img/499686_1_En_10_Fig20_HTML.jpg)


    图 10-20


    Azure 机器学习 – 上传数据集


    你需要确认信任这些文件的内容。点击**我信任这些文件的内容**复选框以表示同意，如图 10-21 所示。任何不安全的上传都可能给你的仓库带来安全和管理问题。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig21_HTML.jpg](img/499686_1_En_10_Fig21_HTML.jpg)


    图 10-21


    Azure 机器学习笔记本 – 上传数据集


    你可以点击已上传的数据集，在浏览器中查看 CSV 文件，如图 10-22 所示。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig22_HTML.jpg](img/499686_1_En_10_Fig22_HTML.jpg)


    图 10-22


    Azure 机器学习笔记本 – 查看数据集


    1. 该实验将尝试对数据集应用不同的分类算法，然后生成准确率分数。代码段如图 10-23 所示，它加载了成人数据集、成人测试数据集以及先决条件和依赖项。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig23_HTML.jpg](img/499686_1_En_10_Fig23_HTML.jpg)


    图 10-23


    Azure 机器学习笔记本 – 运行先决条件和加载数据集的代码


    1. 让我们在数据集上运行逻辑回归分类器，然后计算分数。`sklearn` 库使得接口非常一致且易于使用。最后，我们打印准确率分数并将其附加到性能数组中（如图
    10-24 所示）。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig24_HTML.jpg](img/499686_1_En_10_Fig24_HTML.jpg)


    图 10-24


    Azure 机器学习笔记本 – 逻辑回归代码


    1. 我们使用高斯朴素贝叶斯、K 近邻、随机森林和支持向量机重复相同的实验。在图 10-25 中，你可以看到随机森林在训练数据和测试数据上都取得了最佳结果。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig25_HTML.jpg](img/499686_1_En_10_Fig25_HTML.jpg)


    图 10-25


    Azure 机器学习笔记本 – 实验结果


    在结束之前，笔记本的 IntelliSense（一种代码补全辅助功能）是一个很棒的特性，它让你在浏览器中拥有 IDE 的外观和感觉。在图 10-26 中，你可以看到鼠标悬停时显示的方法参数，并且还可以使用自动补全功能。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig26_HTML.jpg](img/499686_1_En_10_Fig26_HTML.jpg)


    图 10-26


    Azure 机器学习笔记本 – IntelliSense 和自动补全


    这个实验让你了解了如何将数据集导入 Azure 笔记本并运行多种算法。


    Azure Notebooks 曾有一个预览版本 (`https://notebooks.azure.com/`)，现已停用，并且这些笔记本并非 Azure
    机器学习服务的集成部分。如果你正在寻找一个用于研究和开发的免费替代方案，Google Colab (`https://colab.research.google.com/notebooks/intro.ipynb`)
    提供了一个绝佳的选择。但是，该服务是*无状态的*，这意味着每次会话过期后，你都需要重新加载数据集。

