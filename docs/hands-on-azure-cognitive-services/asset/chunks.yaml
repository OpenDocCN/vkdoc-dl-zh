    #### Implement It Using Code


    With the help of these APIs, it’s very easy to integrate APIs in an existing code,
    or you can write a new application to analyze the faces. In this section, we included
    a small demo to help you understand the code and the power of the APIs. You can
    find the complete code in the repository at [URL of the repository].


    We created a Visual Studio project. (Please refer to the previous section to recall
    how we built a Visual Studio project.) Once you’ve created the project, open NuGet
    Package Manager and search for the package **Microsoft.Azure.CognitiveServices.Vision.Face**.
    Click **Install** in the right pane, as shown in Figure [3-20](#499686_1_En_3_Chapter.xhtml#Fig20).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig20_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig20_HTML.jpg)


    Figure 3-20


    Adding a NuGet package


    Before, you created a client to call the Face API, and you added a name space.
    See Listing [3-10](#499686_1_En_3_Chapter.xhtml#PC10). This namespace will help
    you resolve all the references, so you can easily create a face client.


    ```

    using Microsoft.Azure.CognitiveServices.Vision.Face;

    Listing 3-10

    Namespace

    ```


    Let’s create a face client. You need a valid subscription key for this. Write
    the method to create a client, as shown in Listing [3-11](#499686_1_En_3_Chapter.xhtml#PC11).


    ```

    private static FaceClient AuthenticatedClient(string endpoint, string subscriptionKey)

    {

    ApiKeyServiceClientCredentials clientCredentials = new ApiKeyServiceClientCredentials(subscriptionKey);

    return new FaceClient(clientCredentials) { Endpoint = endpoint };

    }

    Listing 3-11

    Creating a face client

    ```


    Here, we used subscriptionkey as the client’s credentials. Then we provide the
    endpoint to create the FaceClient.


    Let’s perform a simple face detection. This will provide an overview of the identified
    face, by getting its location in the image. Before we write the code to start
    an analysis, we must add a few namespaces, as shown in Listing [3-12](#499686_1_En_3_Chapter.xhtml#PC12).


    ```

    using Microsoft.Azure.CognitiveServices.Vision.Face;

    using Microsoft.Azure.CognitiveServices.Vision.Face.Models;

    Listing 3-12

    Face model namespaces

    ```


    The model’s namespace will let you access the DetectedFace model, which contains
    the analysis data. We added a simple call to the API by using our face client.
    We used an image with the URL shown in Listing [3-13](#499686_1_En_3_Chapter.xhtml#PC13).
    Complete example is available on GitHub ([`https://github.com/Apress/hands-on-azure-cognitive-services/tree/main/Chapter%2003/Chap3FaceAnalysis`](https://www.github.com/Apress/hands-on-azure-cognitive-services/tree/main/Chapter%252003/Chap3FaceAnalysis)).


    ```

    IList faces = await client.Face.DetectWithUrlAsync(url: imgURL, returnFaceId:
    true, detectionModel: DetectionModel.Detection02);

    Listing 3-13

    Requesting a Face API

    ```


    In this code, Detection02 is a predefined detection model. You can use either
    Detection01 or Detection02 for our demo example. There are two request methods,
    DetectWithUrlAsync and DetectWithStreamAsync. The first method detects a face
    in the image, from the provided URL. The second method (DetectWithStreamAsync)
    expects a stream of the image. (This is important when you are building a user
    interface to upload the images.) Listing [3-14](#499686_1_En_3_Chapter.xhtml#PC14)
    shows how you can retrieve the data from the DetectedFace model list, which is
    returned from the API.


    ```

    foreach (var face in faces)

    {

    FaceRectangle rect = face.FaceRectangle;

    Console.WriteLine($"Face:{face.FaceId} is located in the image in marked point
    having dimensions: height-{rect.Height} width-{rect.Width} which is available
    from Top-{rect.Top} Left-{rect.Left}.");

    }

    Listing 3-14

    Information about the detected face

    ```


    Run the project. The result should be similar to what’s shown in Figure [3-21](#499686_1_En_3_Chapter.xhtml#Fig21).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig21_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig21_HTML.jpg)


    Figure 3-21


    The facial analysis output'
