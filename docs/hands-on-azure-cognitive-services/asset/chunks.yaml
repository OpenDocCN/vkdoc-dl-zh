  trans: '

    ### 语音转文本 – 将口语音频转换为文本以实现交互


    在第一个示例中，我们将了解如何使用适用于 Windows 的 .NET Framework 在 C# 中转录对话。请按照以下步骤操作：


    从认知服务语音 SDK 仓库克隆对话转录仓库（`https://github.com/Azure-Samples/cognitive-services-speech-sdk/tree/master/quickstart/csharp/dotnet/conversation-transcription`）。参见图
    5-3。然后，在您的系统中导航到相应的文件夹（`cognitive-services-speech-sdk/quickstart/csharp/dotnet/conversation-transcription/`）。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig3_HTML.jpg](img/499686_1_En_5_Fig3_HTML.jpg)


    图 5-3


    克隆语音 SDK GitHub 仓库


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig4_HTML.jpg](img/499686_1_En_5_Fig4_HTML.jpg)


    图 5-4


    Visual Studio – 从路径打开解决方案


    1. 打开 Visual Studio，然后从克隆的路径（`quickstart/csharp/dotnet/conversation-transcription`）打开解决方案文件。参见图
    5-4。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig5_HTML.jpg](img/499686_1_En_5_Fig5_HTML.jpg)


    图 5-5


    Azure 服务 – 创建资源


    1. 打开 Azure 服务控制台，然后点击**创建资源**（如图 5-5 所示）。


    从市场中选择**语音**，然后点击 Microsoft 提供的**语音**资源。参见图 5-6。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig6_HTML.jpg](img/499686_1_En_5_Fig6_HTML.jpg)


    图 5-6


    Azure 服务 – 从市场创建语音资源


    接下来，点击**创建**按钮继续。然后，添加所需的服务参数，例如名称、订阅、位置、定价层和资源组（如图 5-7 所示）。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig7_HTML.jpg](img/499686_1_En_5_Fig7_HTML.jpg)


    图 5-7


    Azure 服务 – 提供所需信息


    点击**创建**继续。这将部署该服务。您将看到部署开始的提示，如图 5-8 所示。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig8_HTML.jpg](img/499686_1_En_5_Fig8_HTML.jpg)


    图 5-8


    Azure 服务 – 语音部署进行中


    部署完成后，您将看到密钥和相应的终结点，如图 5-9 所示。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig9_HTML.jpg](img/499686_1_En_5_Fig9_HTML.jpg)


    图 5-9


    Azure 语音服务 – 密钥和终结点


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig10_HTML.jpg](img/499686_1_En_5_Fig10_HTML.jpg)


    图 5-10


    Azure 语音服务 – 填充密钥和服务区域


    1. 您可以从此页面复制密钥和服务区域（位置）。然后，使用它替换打开目录中解决方案文件中的标签（如图 5-10 所示）。


    编辑 `Program.cs` 源文件，然后替换 `YourSubscriptionKey` 和 `YourServiceRegion` 的值、首选语言，并添加一个用于语音签名的
    WAV 文件示例。参见图 5-11。

    '
- fmt: '![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig11_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig11_HTML.jpg)


    **Figure 5-11** Azure Speech service – populating the keys and service region


    > *Using the key directly in code is not recommended. A secure way is to use key
    vault or use system variables.*


    This voice signature sample is for the voice being detected. The recommended length
    for each sample is between thirty seconds and two minutes. Cognitive Services
    expects a `.wav` file, which should be captured using a supported device (8 channel,
    16kHz, 16-bit PCM). To create this WAV file, open up the Windows Voice Recorder
    or an audio recorder of your choice. Here, we are using the Windows Voice Recorder,
    as shown in Figure [5-12](#499686_1_En_5_Chapter.xhtml#Fig12).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig12_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig12_HTML.jpg)


    **Figure 5-12** Opening Windows Voice Recorder


    Start recording the user 1 voice. Then, separately, record the user 2 voice. This
    provides the signatures of your user voices for the Speech service. See Figure
    [5-13](#499686_1_En_5_Chapter.xhtml#Fig13).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig13_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig13_HTML.jpg)


    **Figure 5-13** Recording audio files of conversations


    You can also record a single conversation file, between user 1 and user 2. See
    Figure [5-14](#499686_1_En_5_Chapter.xhtml#Fig14) for our three recorded audio
    files.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig14_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig14_HTML.jpg)


    **Figure 5-14** The recorded audio files


    At this point, we have three `.wav` files. If you created the voices by using
    the given specifications^([(13)](#fn13)), then place the file path in the program
    and proceed with the build. Otherwise, follow these steps to get the files in
    the right format.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig15_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig15_HTML.jpg)


    **Figure 5-15** Opening a file in Audacity


    1.  Open Audacity^([(14)](#fn14)) and navigate to the `.wav` file that you recorded.
    See Figure [5-15](#499686_1_En_5_Chapter.xhtml#Fig15). Audacity is a free, open
    source, cross-platform audio software, which can be used to convert audio files
    into multiple formats.


    As you can see in Figure [5-16](#499686_1_En_5_Chapter.xhtml#Fig16) (via the red
    arrow), our recorded file does not meet the required specifications. Therefore,
    we need to modify the format.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig16_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig16_HTML.jpg)


    **Figure 5-16** Format details in Audacity


    To edit the file format, right-click the track, select **Format**, and then change
    it to **16-bit PCM** (as shown in Figure [5-17](#499686_1_En_5_Chapter.xhtml#Fig17)).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig17_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig17_HTML.jpg)


    **Figure 5-17** Changing the format in Audacity


    Also, change the rate. Right-click the audio track, select **Rate**, and then
    click **16000 Hz** (as shown in Figure [5-18](#499686_1_En_5_Chapter.xhtml#Fig18)).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig18_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig18_HTML.jpg)


    **Figure 5-18** Changing the rate in Audacity


    Next, to convert the file from stereo to mono, in the top file menu, click **Tracks**,
    select **Mix**, and then click **Mix Stereo Down to Mono**. See Figure [5-19](#499686_1_En_5_Chapter.xhtml#Fig19).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig19_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig19_HTML.jpg)


    **Figure 5-19** Changing the mix in Audacity


    At this point, the file will look like Figure [5-20](#499686_1_En_5_Chapter.xhtml#Fig20).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig20_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig20_HTML.jpg)


    **Figure 5-20** The file format changes in Audacity


    Next, export the file as a WAV format, and then save it to the directory of your
    choice. Click **File**, **Export**, and then **Export as WAV** (as shown in Figure
    [5-21](#499686_1_En_5_Chapter.xhtml#Fig21)). After that, a new dialog box appears.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig21_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig21_HTML.jpg)


    **Figure 5-21** Exporting as a WAV file


    Open the Advanced Mixing Options^([(15)](#fn15)), and then drag the output channel
    slider to 8, as shown in Figure [5-22](#499686_1_En_5_Chapter.xhtml#Fig22).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig22_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig22_HTML.jpg)


    **Figure 5-22** Advanced Mixing Options


    Link all the channels to user 1, except for Channel 8 (as shown in Figure [5-23](#499686_1_En_5_Chapter.xhtml#Fig23)).
    Then click **OK**. Do the same step for the conversation file of your recorded
    files, to meet the specification.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig23_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig23_HTML.jpg)


    **Figure 5-23** Linking the channels


    Next, in the config file, add the file path accordingly, as shown in Figure [5-24](#499686_1_En_5_Chapter.xhtml#Fig24).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig24_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig24_HTML.jpg)


    **Figure 5-24** Modifying the config file


    Click the **Start** button to build and run the project (as shown in Figure [5-25](#499686_1_En_5_Chapter.xhtml#Fig25)).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig25_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig25_HTML.jpg)


    **Figure 5-25** The program running and transcribing the text


    Upon a successful build and execution of the program, a console window will open
    up, showing the transcribed text as present in the audio file that you recorded.


    There is a variety of practical applications that you can use for this transcription,
    from converting call center audio recordings into textual data for analytics to
    creating video subtitles. You might have already seen and used Microsoft Teams,
    Skype, and Zoom to create subtitles for taking notes, based on audio conversations.
    These transcriptions aren’t perfect, but they are definitely getting better. Imagine
    performing a real-time escalation analysis, by combining the sentiment analysis
    of text APIs with the speech transcripts. Wouldn’t that be an excellent way to
    analyze how an irate customer’s call should be handled, in order to provide the
    best possible customer experience?


    Now that you know how to create a speech solution in your own application, by
    using the Speech SDK and Azure Cognitive Services, what business problem would
    you want to solve? The possibilities are limitless.'
