- fmt: "### Identifying a Face\n\nThe Computer Vision API is also helpful to identify\
    \ the human faces in an image. This will analyze the image and return different\
    \ kinds of data, based on the identified faces.\n\nThere are around 27 predefined\
    \ landmark points that are used to detect human faces. Computer Vision uses these\
    \ predefined landmarks while processing the images. Refer to the image, [`https://docs.microsoft.com/en-us/azure/cognitive-services/face/images/landmarks.1.jpg`](https://docs.microsoft.com/en-us/azure/cognitive-services/face/images/landmarks.1.jpg),\
    \ for a pictorial view of these landmarks.\n\nThe Face API provides facial analysis.\
    \ You can perform this analysis to do the following:\n\n- **Detect a face in an\
    \ image** – It provides the facility to detect a human face with analysis data,\
    \ by extracting face-related attributes, like a head pose, the person’s gender,\
    \ age, emotion, facial hair, and glasses.\n- **Find similar faces in an image**\
    \ – You might want to search from your database, to find a human face. This API\
    \ helps you identify a face in an image. This API also further narrows down the\
    \ search and provides two ways to identify the faces:\n  - **matchPerson mode**\
    \ – It first matches and identifies the same person, and then it returns the match.\n\
    \  - **matchFace mode** – It returns the matches and ignores the same person’s\
    \ face. This API does not consider whether a face belongs to a particular person,\
    \ but it finds all the face matches. In other words, it returns the similar matches\
    \ of faces that may or may not belong to the same person.\n- **Identify faces**\
    \ – Imagine the feature of auto-tagging human faces, where the system automatically\
    \ tags the image with a human identity (a name or any symbolic identifier) that\
    \ is then stored in a database. This API helps you identify specific faces from\
    \ a stored database of images.\n\nTo get started with facial recognition, we need\
    \ to set up the Face API. To do so, follow the same steps that we followed in\
    \ the previous section, to set up the Vision API. Search for **Face**, and then\
    \ set up the service by following the instructions.\n\n> **Note**  \n> If you\
    \ have a very limited requirement to identify the face from an image, then you\
    \ can do it with the help of the Vision API, using the optional `visualFeatures`\
    \ parameter^([¹](#fn1)). In case you must deal with complex scenarios (where you\
    \ want to collect all the data related to the facial analysis), then we recommend\
    \ you use the Face API.\n\nMake sure you have set up your key and endpoint as\
    \ well. The Face resource screen should look like Figure [3-17](#499686_1_En_3_Chapter.xhtml#Fig17),\
    \ after a successful setup.\n\n![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig17_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig17_HTML.jpg)\n\
    \n**Figure 3-17** The resource overview screen\n\n### Test Using the API Console\n\
    \nWe have set up our Face API. Let’s now test it, by using the API console. You\
    \ need to open the API console from the Azure portal, by selecting the region\
    \ where you have created your resource. For demo purposes, we created a resource\
    \ in the Central US region. We will test the API from this region only. We are\
    \ using a very simple API called Face Detect, with a random image ([`https://docs.microsoft.com/en-us/learn/wwl-data-ai/analyze-images-computer-vision/media/woman-roof.png`](https://docs.microsoft.com/en-us/learn/wwl-data-ai/analyze-images-computer-vision/media/woman-roof.png)).\
    \ We are also analyzing the image for the following facial attributes: age and\
    \ gender. See Figure [3-18](#499686_1_En_3_Chapter.xhtml#Fig18).\n\n![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig18_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig18_HTML.jpg)\n\
    \n**Figure 3-18** Requesting the Face Detect API\n\n> **Note**  \n> There are\
    \ prebuilt detection models to identify or analyze the human faces for the Face\
    \ API – `detection_01`, `detection_02`, and `detection_03`. Make sure you use\
    \ the same detection model while comparing or identifying similar human faces.\
    \ In the demo example, we used `detection_01` model.\n\nIf your request is valid\
    \ and executed, it will return similar results as what is shown in Listing [3-8](#499686_1_En_3_Chapter.xhtml#PC8).\n\
    \n```\n[{\n\"faceId\": \"0edfbefe-a73a-4143-b6bb-f722d39f97db\",\n\"faceRectangle\"\
    : {\n\"top\": 45,\n\"left\": 195,\n\"width\": 42,\n\"height\": 42\n},\n\"faceLandmarks\"\
    : {\n\"pupilLeft\": {\n\"x\": 204.3,\n\"y\": 59.6\n},\n\"pupilRight\": {\n\"x\"\
    : 222.5,\n\"y\": 54.8\n},\n\"noseTip\": {\n\"x\": 220.4,\n\"y\": 66.9\n},\n\"\
    mouthLeft\": {\n\"x\": 209.6,\n\"y\": 78.4\n},\n\"mouthRight\": {\n\"x\": 226.3,\n\
    \"y\": 74.1\n},\n\"eyebrowLeftOuter\": {\n\"x\": 193.1,\n\"y\": 57.8\n},\n\"eyebrowLeftInner\"\
    : {\n\"x\": 210.0,\n\"y\": 51.9\n},\n\"eyeLeftOuter\": {\n\"x\": 200.3,\n\"y\"\
    : 60.8\n},\n\"eyeLeftTop\": {\n\"x\": 203.4,\n\"y\": 58.8\n},\n\"eyeLeftBottom\"\
    : {\n\"x\": 203.8,\n\"y\": 60.9\n},\n\"eyeLeftInner\": {\n\"x\": 207.3,\n\"y\"\
    : 59.3\n},\n\"eyebrowRightInner\": {\n\"x\": 217.4,\n\"y\": 50.5\n},\n\"eyebrowRightOuter\"\
    : {\n\"x\": 226.6,\n\"y\": 46.7\n},\n\"eyeRightInner\": {\n\"x\": 219.2,\n\"y\"\
    : 55.7\n},\n\"eyeRightTop\": {\n\"x\": 221.9,\n\"y\": 53.9\n},\n\"eyeRightBottom\"\
    : {\n\"x\": 222.4,\n\"y\": 55.7\n},\n\"eyeRightOuter\": {\n\"x\": 224.9,\n\"y\"\
    : 53.9\n},\n\"noseRootLeft\": {\n\"x\": 211.4,\n\"y\": 58.3\n},\n\"noseRootRight\"\
    : {\n\"x\": 217.3,\n\"y\": 56.6\n},\n\"noseLeftAlarTop\": {\n\"x\": 213.5,\n\"\
    y\": 65.5\n},\n\"noseRightAlarTop\": {\n\"x\": 221.4,\n\"y\": 63.0\n},\n\"noseLeftAlarOutTip\"\
    : {\n\"x\": 211.9,\n\"y\": 69.3\n},\n\"noseRightAlarOutTip\": {\n\"x\": 225.1,\n\
    \"y\": 65.4\n},\n\"upperLipTop\": {\n\"x\": 220.3,\n\"y\": 73.8\n},\n\"upperLipBottom\"\
    : {\n\"x\": 220.6,\n\"y\": 75.4\n},\n\"underLipTop\": {\n\"x\": 221.3,\n\"y\"\
    : 79.1\n},\n\"underLipBottom\": {\n\"x\": 222.2,\n\"y\": 81.5\n}\n},\n\"faceAttributes\"\
    : {\n\"gender\": \"female\",\n\"age\": 25.0\n}\n}]\n```\n\n**Listing 3-8** Detecting\
    \ a face analysis response\n\nHere, the Face API identifies the human face with\
    \ the following attributes: the gender is female, and her age is 25 years."
