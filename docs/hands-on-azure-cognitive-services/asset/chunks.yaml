    frequency, by invoking cell #9, as shown in Figure [6-59](#499686_1_En_6_Chapter.xhtml#Fig59).
    Here, we set the granularity to be daily (as compared to hourly) and build the
    figure. It shows the daily outliers within the dataset, along with the associated
