    great power comes great responsibility.'
  trans: '

    # 认知服务容器


    Azure 认知服务托管在高度可用的 Azure 云数据中心，提供卓越的 SLA（服务级别协议），并利用规模经济进行学习、适应和改进。那么，我们为何需要将它们打包成容器来提供服务呢？


    问得好，但您是否与审计员交流过？想象一下，在高度监管的环境中工作，将数据暴露在防火墙之外需要经过国会批准，这完全合情合理。此外，容器在断网环境、低延迟需求场景，或互联网连接不可用或不稳定的情况下，也具有极佳的商业应用价值。通过对数据和模型更新的完全控制，容器为基于云的服务提供了高吞吐量和低延迟的绝佳替代方案。


    因此，为了解决安全、合规和运营问题，Azure 认知服务提供了以下类别的容器：


    * **视觉容器** – [OCR](https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/computer-vision-how-to-install-containers)、执行[空间分析、人脸](https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/spatial-analysis-container)检测和表单识别

    * **语言容器** – [情感分析](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dsentiment)、[关键短语提取](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dkeyphrase)、[文本语言检测](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dlanguage)、[健康文本分析](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers%253Ftabs%253Dhealthcare)和
    [LUIS（语言理解智能服务，或简称为*语言理解*）](https://docs.microsoft.com/en-us/azure/cognitive-services/luis/luis-container-howto)

    * **语音容器** – [语音转文本](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dstt)、[自定义语音转文本](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dcstt)、[文本转语音](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dtts)、[自定义文本转语音](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dctts)、[神经文本转语音](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dntts)和[语音语言检测](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-container-howto%253Ftabs%253Dlid)

    * **决策容器** – 异常检测器


    有趣的是，认知计算容器是 Linux 容器。微软是首家在容器中提供预训练 AI 的供应商，采用按交易计费的计量模式。有关版本控制和其他常见问题，微软在其产品文档中维护了一个活跃的
    FAQ 部分，可访问 [`https://docs.microsoft.com/en-us/azure/cognitive-services/containers/container-faq`](https://docs.microsoft.com/en-us/azure/cognitive-services/containers/container-faq)。


    这些产品的可用性各不相同。部分容器已正式发布（GA），而其他容器则处于预览阶段或受限的私有预览阶段（需要访问批准）。Azure 认知服务容器各产品的当前可用性状态，可访问
    [`https://docs.microsoft.com/en-us/azure/cognitive-services/cognitive-services-container-support`](https://docs.microsoft.com/en-us/azure/cognitive-services/cognitive-services-container-support)
    查看。


    作为视觉容器的一部分，人脸检测和表单识别服务不可用。2020 年 6 月 11 日，微软宣布*“在基于人权的严格监管法规出台之前，不会向美国警察部门出售人脸识别技术。”*其他主要云提供商也纷纷效仿。表单识别器服务作为
    Azure 认知服务产品的一部分提供，但不以容器形式提供。


    认知服务容器会连接到 Azure 数据中心以发送计量信息，但不会将客户数据发送给微软。认知服务拥有大多数行业标准认证，可帮助您在 Azure 平台上构建和部署医疗、制造和金融用例。这些认证包括
    ISO 20000-1:2011、ISO 27001:2013、ISO 27017:2015、ISO 27018:2014 和 ISO 9001:2015
    认证；HIPAA BAA、SOC 1 Type 2、SOC 2 Type 2 和 SOC 3 证明；以及 PCI DSS Level 1 证明。然而，认知服务容器本身没有任何合规认证。


    微软关于人脸识别的说明^(²³)


    2020 年 6 月 11 日，微软宣布，在基于人权的严格监管法规出台之前，不会向美国警察部门出售人脸识别技术。因此，如果客户是美国警察部门，或者允许美国警察部门使用此类服务，则客户不得使用
    Azure 服务（如 Face 或 Video Indexer）中包含的人脸识别功能。


    与 SDLC（软件设计生命周期）类似，机器学习开发生命周期、数据科学生命周期和/或微软团队数据科学流程也要求对部署过程有更高程度的控制。这包括版本控制、模型漂移控制、模型衰退和合规性。容器为您提供了所需的精细度和控制力，以确保您拥有所需的治理能力。


    接下来，让我们构建一些认知服务容器。


    ## 托管认知服务容器


    认知服务容器有多种托管选项。您可以构建一个 Docker 容器并在本地托管，然后将其与认知服务连接；您可以使用 Azure 容器实例（ACI）、Azure
    Kubernetes 服务（AKS），或在 Azure Stack 上部署 Kubernetes 集群。这些选项提供了容器部署的完整范围，并具有不同程度的控制权和责任。能力越大，责任越大。

