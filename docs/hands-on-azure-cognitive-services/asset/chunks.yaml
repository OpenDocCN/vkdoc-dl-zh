    lends itself to be examined that easily.


    According to most estimates, over 80% of organizational data is unstructured.
    (See “What Is Unstructured Data and Why Is It So Important to Businesses?” at
    [`www.forbes.com/sites/bernardmarr/2019/10/16/what-is-unstructured-data-and-why-is-it-so-important-to-businesses-an-easy-explanation-for-anyone`](http://www.forbes.com/sites/bernardmarr/2019/10/16/what-is-unstructured-data-and-why-is-it-so-important-to-businesses-an-easy-explanation-for-anyone).)
    All this unstructured data leads to practical challenges of information extraction,
    such as parsing, optical character recognition, named entity recognition, dependency
    parsing, and other data enrichment needs. But fear no more, Microsoft’s AI-powered
    search is here to help!


    In this chapter, we will provide insights on Bing Search APIs and Azure Cognitive
    Search, by adding various search functionalities to the application. In this chapter,
    you will learn to do the following**:**


    1.  Understand search, Bing Search APIs, and Cognitive Search.


    2.  Create smart search applications by adding Bing Search Azure Cognitive Search
    capabilities.


    Let’s begin.


    ## The Search Ecosystem


    Microsoft’s search ecosystem has gone through a few iterations that can be easily
    explained, as follows.


    Azure Cognitive Search, formerly known as Azure Search, is Microsoft’s enterprise
    search capability (where you can choose your own data sources to crawl and index).
    Therefore, even though it could technically encompass web searches, it’s more
    than that. You can also choose how often you index. Essentially, you can create
    your own mashup of data sources to index from.


    Bing Search is specifically Microsoft’s enterprise web search. You can create
    silos of domains from the web that you want to allow your enterprise to search.
    Azure Cognitive Search is a custom enterprise search. It can be siloed to on prem,
    private, and enterprise-specific data, with the option to include a custom public
    domain. In contrast, Bing Search is a public domain that can be filtered.


    Currently, Bing Search APIs are listed as part of Azure Cognitive Services, which
    can create confusion. However, Microsoft has announced that Bing Search APIs will
    transition from Azure Cognitive Services to Azure Marketplace on October 31, 2023^([^(16)](#fn16)),
    which will help address the separation of concerns. According to the announcement,
    *“Bing Search APIs provisioned using Cognitive Services will be supported for
    the next three years or until the end of your Enterprise Agreement, whichever
    happens first.”*


    ## Azure Cognitive Search


    Formerly known as Azure Search, Azure Cognitive Search is the AI-powered search
    service with extensive data enrichment capabilities, including OCR, NER, and key
    phrase extraction. Provided as a fully managed service, Azure Cognitive Search
    is supported by decades of work done at Microsoft Research on NLP, Office, Bing,
    and other search solutions. With crawling capabilities on some data sources, Azure
    Cognitive Search offers geospatial search, filtering, autocomplete, and search
    stacking or faceting features. Custom models help support your subject matter,
    as well as domain-specific client needs. More on the service offering can be read
    at [`https://azure.microsoft.com/en-us/services/search/`](https://azure.microsoft.com/en-us/services/search/).'
  trans: '

    # 7. 搜索 – 为你的应用程序添加搜索功能


    尤达大师去世时多少岁？


    一升等于多少夸脱？


    福勒街上那家波霸奶茶店营业到几点？


    嘿，谷歌，学猫叫。


    好吧，最后一个请求可能不太相关。无论如何，从我们的日常行为中可以明显看出，数字搜索已成为现代人类思维的延伸。搜索无处不在——从我们的个人生活，到我们创建和为之工作的公司；我们在日常生活中不断搜索信息。随着我们寻求的信息变得更加多样化、多模态和分散，搜索也变得越来越复杂。我们现在严重依赖上下文相关的自然语言搜索，其答案跨越多个文档（包括图像、PDF、文本文件和结构化数据）。我们的搜索还包括人物和地点、个人和企业名称以及其他实体，这些很可能需要对拼写和意图进行自动更正。


    通过提问，我们借助搜索引擎探索互联网，探查数据点，并寻找教程、指南和操作视频。我们还查询公司内部网门户以处理假期/休假申请和共付金额，搜寻医疗服务提供者的覆盖范围和地点，并调查哪些法律条款属于特定合同。尽管我们越来越擅长探查所有这些信息，但数据本身并不会自动变得易于检查。


    根据大多数估计，超过 80%的组织数据是非结构化的。（请参阅 `www.forbes.com/sites/bernardmarr/2019/10/16/what-is-unstructured-data-and-why-is-it-so-important-to-businesses-an-easy-explanation-for-anyone`
    上的“什么是非结构化数据，为什么它对商业如此重要？”）。所有这些非结构化数据带来了信息提取的实际挑战，例如解析、光学字符识别、命名实体识别、依存句法分析以及其他数据增强需求。但别担心，微软基于
    AI 的搜索来帮忙了！


    在本章中，我们将通过向应用程序添加各种搜索功能，提供关于必应搜索 API 和 Azure 认知搜索的见解。在本章中，你将学习以下内容：


    1. 理解搜索、必应搜索 API 和认知搜索。

    2. 通过添加必应搜索和 Azure 认知搜索功能来创建智能搜索应用程序。


    让我们开始吧。


    ## 搜索生态系统


    微软的搜索生态系统经历了几次迭代，可以简单解释如下。


    `Azure 认知搜索`，以前称为`Azure 搜索`，是微软的企业搜索能力（你可以选择自己的数据源进行爬取和索引）。因此，尽管从技术上讲它可以涵盖网络搜索，但其功能远不止于此。你还可以选择索引的频率。本质上，你可以创建自己的数据源混搭来进行索引。


    `必应搜索`特指微软的企业网络搜索。你可以创建允许企业搜索的网络域隔离区。`Azure 认知搜索`是一种自定义的企业搜索。它可以隔离到本地、私有和企业特定的数据，并可以选择包含自定义的公共域。相比之下，`必应搜索`是一个可以过滤的公共域。


    目前，`必应搜索 API`被列为`Azure 认知服务`的一部分，这可能会造成混淆。然而，微软已宣布`必应搜索 API`将于 2023 年 10 月 31
    日从`Azure 认知服务`过渡到`Azure Marketplace`^(¹⁶)，这将有助于解决关注点分离的问题。根据公告，“使用认知服务预配的必应搜索
    API 将在未来三年内或直到企业协议结束（以先到者为准）得到支持。”


    ## Azure 认知搜索


    `Azure 认知搜索`（以前称为`Azure 搜索`）是基于 AI 的搜索服务，具有广泛的数据增强能力，包括 OCR、NER 和关键短语提取。作为完全托管的服务提供，`Azure
    认知搜索`得到了微软研究院在 NLP、Office、必应和其他搜索解决方案方面数十年工作的支持。凭借对某些数据源的爬取能力，`Azure 认知搜索`提供地理空间搜索、筛选、自动完成以及搜索堆叠或分面功能。自定义模型有助于支持你的主题领域以及特定领域的客户需求。有关该服务的更多信息，请访问
    `https://azure.microsoft.com/en-us/services/search/`。

