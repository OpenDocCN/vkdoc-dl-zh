- fmt: "# Decision Services and APIs\n\nOriginally launched as “Project Custom Decision,”\
    \ it has now graduated to become part of the `Personalizer` service, joining the\
    \ ranks of the `Anomaly Detector`, `Content Moderator`, and `Metrics Advisor`\
    \ suite of Cognitive Services. This minor lesson in history is important since\
    \ making a smarter decision requires a multifaceted skillset. Having one comprehensive\
    \ “decision service” might not be the most effective way to address this nuanced\
    \ discipline. Therefore, a combination of different skillsets is necessary, such\
    \ as identifying outliers; finding out potentially offensive, racy, obscene, or\
    \ unwanted contents; and creating tailored custom interactions for users.\n\n\
    Decision services are a critical part of the Azure Cognitive Services ecosystem,\
    \ which also offers amazing capabilities in the areas of language, speech, vision,\
    \ and web search (as you have seen in the earlier chapters). The current members\
    \ of the decision service family include the following:\n\n- **Anomaly Detector**\
    \  \n  Cognitive service to identify outliers and to pinpoint potential behaviors\
    \ that are out of the ordinary\n\n- **Content Moderator**  \n  Cognitive service\
    \ that helps identify racy, obscene, and offensive contents across multiple modalities\n\
    \n- **Personalizer**  \n  Service to build a customized, individualized, and targeted\
    \ experience that is curated for individual user preferences\n\n- **Metrics Advisor\
    \ (in preview at the time of this writing)**  \n  Anomaly detection core engine,\
    \ customized for AIOps, such as detecting and diagnosing metrices for root cause\
    \ analysis and finding issues in logs with time series analysis\n\nIn the rest\
    \ of this chapter, we will review these services and build demo applications that\
    \ will show you how to use them in your own projects.\n\n## Content Moderator\
    \ Service\n\nFor today’s digital economy, scale is the name of the game. The service\
    \ that’s offered must be able to scale to millions of users without these manual\
    \ bottlenecks.\n\nExtending on the “I know it when I see it” metaphor, an Internet\
    \ scale system today cannot rely on human screenings for every video and image\
    \ uploaded to the Internet. Platforms like YouTube get more than 500 hours of\
    \ video contents uploaded every minute, which results in approximately 30,000\
    \ hours of hourly contents. The cost and resources required make it prohibitive\
    \ for human screening. Human in the loop (HiTL) is the technique of keeping human\
    \ interaction as part of the process. Ideally, the human interaction is limited\
    \ only to the exceptional cases that really require human intervention for decision\
    \ making. The rest is automated.\n\nContent moderation is a required component\
    \ in most modern websites that interact with their users. Some of the use cases\
    \ include the following:\n\n1. An organization offers a digital bank, which allows\
    \ their customers to upload an image for their custom debit card. They want to\
    \ ensure that the uploaded image does not contain any obscene or racy pictures.\n\
    \n2. For a company’s intranet, a co-worker wants to upload the latest company\
    \ holiday party photos. They want to ensure the images are safe for work.\n\n\
    3. An organization’s application moderates social media feeds, which are imported\
    \ to be displayed on an employee’s custom dashboard. It monitors Facebook, Twitter,\
    \ and Instagram posts for contents about the company and associated social media\
    \ hashtags, to ensure a strong reputation and full compliance.\n\n4. An organization\
    \ builds a customer profile online, complete with photos and personalized information.\
    \ They also want to ensure the pictures are not riddled with profane phrases.\n\
