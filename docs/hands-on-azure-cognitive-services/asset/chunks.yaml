- fmt: "### Running a Language Service Container\n\nWe will start small, with building\
    \ and hosting a simple, local Docker container:\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig1_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1 Text Analytics\n\n1. First things first, let’s install Docker Desktop.\
    \ You can download the application from [`www.docker.com/products/docker-desktop`](http://www.docker.com/products/docker-desktop).\
    \ It will allow you to build and run the containers with container runtime. It\
    \ also provides the Docker CLI, the command line interface that’s used to run\
    \ commands. Go ahead and install it on your platform; we will wait.\n\n2. Our\
    \ goal in this first example is to run a Cognitive Services container instance\
    \ locally, connect it with the Text Analytics service for metering and billing,\
    \ and then invoke the language detection service on the container. We will use\
    \ a few different containers and services in this chapter. You can find a detailed\
    \ list of Azure Cognitive Services container image tags and release notes here^([^(24)](#fn24)).\n\
    \n3. Cognitive Services containers are self-sufficient, to run the underlying\
    \ Cognitive Services. However, they need to be able to access the subscription\
    \ for metering and billing purposes. Therefore, you would need to create a Text\
    \ Analytics services account by visiting [`https://portal.azure.com/#create/hub`](https://portal.azure.com/%2523create/hub),\
    \ as shown in Figure [8-1](#499686_1_En_8_Chapter.xhtml#Fig1).\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig2_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2 Create Text Analytics\n\n1. Complete the required fields (as shown\
    \ in Figure [8-2](#499686_1_En_8_Chapter.xhtml#Fig2)), including subscription,\
    \ location, pricing tier, and resource group. Then, click **Create**. This process\
    \ has been repeatedly discussed in Chapters [6](#499686_1_En_6_Chapter.xhtml)\
    \ and [7](#499686_1_En_7_Chapter.xhtml) in detail, so refer back if you need to,\
    \ as we now will skip over some steps for brevity.\n\nOnce the service is validated,\
    \ created, and deployed, you will see the screen in Figure [8-3](#499686_1_En_8_Chapter.xhtml#Fig3).\
    \ To continue, click **Go to resource**.\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig3_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3 Your deployment is complete\n\nAs shown in Figure [8-4](#499686_1_En_8_Chapter.xhtml#Fig4),\
    \ you will get the key and endpoints from the Text Analytics engine service dashboard,\
    \ which you can use in the container.\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig4_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4 Keys and Endpoint\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig5_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5 macOS Big Sur\n\n1. Now that we have the keys to the analytics service\
    \ for metering, we can proceed with building and running the container. We are\
    \ running this on a Mac with the configuration shown in Figure [8-5](#499686_1_En_8_Chapter.xhtml#Fig5).\
    \ You likely need to allocate some memory to your container, so make sure you\
    \ have a decent machine with good CPU and memory to be able to run the container\
    \ locally. Otherwise, it will be super slow and may not run.\n\nThe Docker container\
    \ for language detection is located here^([^(25)](#fn25)) on Docker Hub. It pulls\
    \ from the Microsoft container repository^([^(26)](#fn26)). In order to start\
    \ and run the Docker image, you need to run the following command:\n\n```\ndocker\
    \ run --rm -it -p 5000:5000 --memory 8g --cpus 1 \\\nmcr.microsoft.com/azure-cognitive-services/language\
    \ \\\nEula=accept \\\nBilling={ENDPOINT_URI} \\\nApiKey={API_KEY}\n```\n\nYou\
    \ then need to replace the endpoint URL and API key, as shown in the following.\
    \ Please use your own keys.\n\n```\ndocker run --rm -it -p 5000:5000 --memory\
    \ 8g --cpus 1 \\\nmcr.microsoft.com/azure-cognitive-services/language \\\nEula=accept\
    \ \\\nBilling='https://textanalyticsengine.cognitiveservices.azure.com/' \\\n\
    ApiKey='5e9a5dcd31d9458f8e6f51a488d86399'a\n```\n\nRunning this code in the terminal\
    \ will pull down the container image from the registry. Run it locally, as shown\
    \ in Figure [8-6](#499686_1_En_8_Chapter.xhtml#Fig6).\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig6_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6 Pulling down the container image\n\nYou can see the list of images\
    \ available in the Docker Desktop console, as shown in Figure [8-7](#499686_1_En_8_Chapter.xhtml#Fig7).\n\
    \n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig7_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7 Images on disk\n\nThere is no place like `127.0.0.1`. So once the\
    \ image is downloaded, you can visit the `localhost:5000`, as it’s perfectly safe\
    \ during the COVID lockdowns. The URL and port were specified in the command,\
    \ if you didn’t notice (be sure to copy and paste!). Also note that your Azure\
    \ Cognitive Services container is up and running, as shown in Figure [8-8](#499686_1_En_8_Chapter.xhtml#Fig8).\
    \ If you would like to run multiple containers, change the port numbers.\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig8_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8 Azure Cognitive Service container confirmation\n\nThe language container\
    \ (and therefore the language detection service) is up and running. If you click\
    \ the **Service API Description** link, you will see the swagger API information\
    \ page (shown in Figure [8-9](#499686_1_En_8_Chapter.xhtml#Fig9)), where you can\
    \ invoke the services.\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig9_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9 Language Detection Cognitive Service API\n\nThere are different versions\
    \ of the services available on the container. You can click any of these links\
    \ and invoke the service with a pre-created request. See Figure [8-10](#499686_1_En_8_Chapter.xhtml#Fig10).\n\
    \n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig10_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10 A pre-created request\n\nClick **Execute**, and then you’ll see\
    \ the response. Next, you will also make the `cURL`^([^(27)](#fn27)) request,\
    \ in case you feel like invoking it from the terminal. See the following code:\n\
    \n```\ncurl -X POST \"http://localhost:5000/text/analytics/v2.0/languages\" -H\
    \ \"accept: application/json\" -H \"Content-Type: application/json-patch+json\"\
    \ -d \"{ \\\"documents\\\": [ { \\\"id\\\": \\\"1\\\", \\\"text\\\": \\\"This\
    \ document is in English.\\\" }, { \\\"id\\\": \\\"2\\\", \\\"text\\\": \\\"Este\
    \ documento está en inglés.\\\" }, { \\\"id\\\": \\\"3\\\", \\\"text\\\": \\\"\
    Ce document est en anglais.\\\" }, { \\\"id\\\": \\\"4\\\", \\\"text\\\": \\\"\
    本文件为英文\\\" }, { \\\"id\\\": \\\"5\\\", \\\"text\\\": \\\"Этот документ на английском\
    \ языке.\\\" } ]}\"\n```\n\nHere, we executed the code. You can see the response\
    \ detecting the languages correctly in Figure [8-11](#499686_1_En_8_Chapter.xhtml#Fig11).\n\
    \n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig11_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig11_HTML.jpg)\n\
    \nFigure 8-11 Detecting the languages\n\n> The docker command to run the container\
    \ would be\n> \n> `docker run --rm -it -p 5000:5000 --memory 8g --cpus 1 mcr.microsoft.com/azure-cognitive-services/textanalytics/language:1.1.012840001-amd64\
    \ Eula=accept Billing=\"https://<resource_name>.cognitiveservices.azure.com/\"\
    \ ApiKey=\"<subscription_key>\"`\n\nYou can also invoke it directly from the web\
    \ page as well. The screen in Figure [8-12](#499686_1_En_8_Chapter.xhtml#Fig12)\
    \ shows the response you would get from the container, via the web page.\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig12_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig12_HTML.jpg)\n\
    \nFigure 8-12 The response from the container"
  raw: '### Running a Language Service Container


    We will start small, with building and hosting a simple, local Docker container
    :


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig1_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Text Analytics


    1.  First things first, let’s install Docker Desktop. You can download the application
    from [`www.docker.com/products/docker-desktop`](http://www.docker.com/products/docker-desktop).
    It will allow you to build and run the containers with container runtime. It also
    provides the Docker CLI, the command line interface that’s used to run commands.
    Go ahead and install it on your platform; we will wait.


    2.  Our goal in this first example is to run a Cognitive Services container instance
    locally, connect it with the Text Analytics service for metering and billing,
    and then invoke the language detection service on the container. We will use a
    few different containers and services in this chapter. You can find a detailed
    list of Azure Cognitive Services container image tags and release notes here^([^(24)](#fn24)).


    3.  Cognitive Services containers are self-sufficient, to run the underlying Cognitive
    Services. However, they need to be able to access the subscription for metering
    and billing purposes. Therefore, you would need to create a Text Analytics services
    account by visiting [`https://portal.azure.com/#create/hub`](https://portal.azure.com/%2523create/hub),
    as shown in Figure [8-1](#499686_1_En_8_Chapter.xhtml#Fig1).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig2_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Create Text Analytics


    1.  Complete the required fields (as shown in Figure [8-2](#499686_1_En_8_Chapter.xhtml#Fig2)),
    including subscription, location, pricing tier, and resource group. Then, click
    **Create**. This process has been repeatedly discussed in Chapters [6](#499686_1_En_6_Chapter.xhtml)
    and [7](#499686_1_En_7_Chapter.xhtml) in detail, so refer back if you need to,
    as we now will skip over some steps for brevity.


    Once the service is validated, created, and deployed, you will see the screen
    in Figure [8-3](#499686_1_En_8_Chapter.xhtml#Fig3). To continue, click **Go to
    resource**.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig3_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Your deployment is complete


    As shown in Figure [8-4](#499686_1_En_8_Chapter.xhtml#Fig4), you will get the
    key and endpoints from the Text Analytics engine service dashboard, which you
    can use in the container.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig4_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Keys and Endpoint


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig5_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    macOS Big Sur


    1.  Now that we have the keys to the analytics service for metering, we can proceed
    with building and running the container. We are running this on a Mac with the
    configuration shown in Figure [8-5](#499686_1_En_8_Chapter.xhtml#Fig5). You likely
    need to allocate some memory to your container, so make sure you have a decent
    machine with good CPU and memory to be able to run the container locally. Otherwise,
    it will be super slow and may not run.


    The Docker container for language detection is located here^([^(25)](#fn25)) on
    Docker Hub. It pulls from the Microsoft container repository^([^(26)](#fn26)).
    In order to start and run the Docker image, you need to run the following command:


    ```

    docker run --rm -it -p 5000:5000 --memory 8g --cpus 1 \

    mcr.microsoft.com/azure-cognitive-services/language \

    Eula=accept \

    Billing={ENDPOINT_URI} \

    ApiKey={API_KEY}

    ```


    You then need to replace the endpoint URL and API key, as shown in the following.
    Please use your own keys.


    ```

    docker run --rm -it -p 5000:5000 --memory 8g --cpus 1 \

    mcr.microsoft.com/azure-cognitive-services/language \

    Eula=accept \

    Billing=''https://textanalyticsengine.cognitiveservices.azure.com/'' \

    ApiKey=''5e9a5dcd31d9458f8e6f51a488d86399''a

    ```


    Running this code in the terminal will pull down the container image from the
    registry. Run it locally, as shown in Figure [8-6](#499686_1_En_8_Chapter.xhtml#Fig6).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig6_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Pulling down the container image


    You can see the list of images available in the Docker Desktop console, as shown
    in Figure [8-7](#499686_1_En_8_Chapter.xhtml#Fig7).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig7_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Images on disk


    There is no place like 127.0.0.1\. So once the image is downloaded, you can visit
    the localhost:5000, as it’s perfectly safe during the COVID lockdowns. The URL
    and port were specified in the command, if you didn’t notice (be sure to copy
    and paste!). Also note that your Azure Cognitive Services container is up and
    running, as shown in Figure [8-8](#499686_1_En_8_Chapter.xhtml#Fig8). If you would
    like to run multiple containers, change the port numbers.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig8_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Azure Cognitive Service container confirmation


    The language container (and therefore the language detection service) is up and
    running. If you click the **Service API Description** link, you will see the swagger
    API information page (shown in Figure [8-9](#499686_1_En_8_Chapter.xhtml#Fig9)),
    where you can invoke the services.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig9_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Language Detection Cognitive Service API


    There are different versions of the services available on the container. You can
    click any of these links and invoke the service with a pre-created request. See
    Figure [8-10](#499686_1_En_8_Chapter.xhtml#Fig10).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig10_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    A pre-created request


    Click **Execute**, and then you’ll see the response. Next, you will also make
    the cURL^([^(27)](#fn27)) request, in case you feel like invoking it from the
    terminal. See the following code:


    ```

    curl -X POST "http://localhost:5000/text/analytics/v2.0/languages" -H "accept:
    application/json" -H "Content-Type: application/json-patch+json" -d "{ \"documents\":
    [ { \"id\": \"1\", \"text\": \"This document is in English.\" }, { \"id\": \"2\",
    \"text\": \"Este documento está en inglés.\" }, { \"id\": \"3\", \"text\": \"Ce
    document est en anglais.\" }, { \"id\": \"4\", \"text\": \"本文件为英文\" }, { \"id\":
    \"5\", \"text\": \"Этот документ на английском языке.\" } ]}"

    ```


    Here, we executed the code. You can see the response detecting the languages correctly
    in Figure [8-11](#499686_1_En_8_Chapter.xhtml#Fig11).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig11_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Detecting the languages


    > The docker command to run the container would be


    > *docker run --rm -it -p 5000:5000 --memory 8g --cpus 1 mcr.microsoft.com/azure-cognitive-services/textanalytics/language:1.1.012840001-amd64
    Eula=accept Billing=“https://<resource_name>.cognitiveservices.azure.com/” ApiKey=“<subscription_key>”*


    You can also invoke it directly from the web page as well. The screen in Figure
    [8-12](#499686_1_En_8_Chapter.xhtml#Fig12) shows the response you would get from
    the container, via the web page.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig12_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    The response from the container'
  trans: "\n### 运行语言服务容器\n\n我们将从小处着手，构建并托管一个简单的本地 Docker 容器：\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig1_HTML.jpg](img/499686_1_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1 文本分析\n\n1. 首先，我们来安装 Docker Desktop。你可以从 [`www.docker.com/products/docker-desktop`](http://www.docker.com/products/docker-desktop)\
    \ 下载该应用程序。它将允许你使用容器运行时构建和运行容器。它还提供了 Docker CLI，即用于运行命令的命令行界面。请在你的平台上安装它；我们会等你。\n\
    \n2. 在第一个示例中，我们的目标是在本地运行一个认知服务容器实例，将其连接到文本分析服务以进行计量和计费，然后调用容器上的语言检测服务。本章中我们将使用几个不同的容器和服务。你可以在此处找到\
    \ Azure 认知服务容器镜像标签和发行说明的详细列表^(²⁴)。\n\n3. 认知服务容器是自给自足的，用于运行底层认知服务。但是，它们需要能够访问订阅以进行计量和计费。因此，你需要通过访问\
    \ [`https://portal.azure.com/#create/hub`](https://portal.azure.com/%2523create/hub)\
    \ 创建一个文本分析服务帐户，如图 8-1 所示。\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig2_HTML.jpg](img/499686_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2 创建文本分析\n\n1. 填写必填字段（如图 8-2 所示），包括订阅、位置、定价层和资源组。然后，单击**创建**。此过程已在第 6 章和第\
    \ 7 章中详细讨论过，因此如果需要，请参考回去，因为我们现在将跳过一些步骤以保持简洁。\n\n服务经过验证、创建和部署后，你将看到图 8-3 中的屏幕。要继续，请单击**转到资源**。\n\
    \n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig3_HTML.jpg](img/499686_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3 你的部署已完成\n\n如图 8-4 所示，你将从文本分析引擎服务仪表板获取密钥和终结点，你可以在容器中使用它们。\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig4_HTML.jpg](img/499686_1_En_8_Fig4_HTML.jpg)\n\
    \n图 8-4 密钥和终结点\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig5_HTML.jpg](img/499686_1_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5 macOS Big Sur\n\n1. 现在我们有了用于计费的分析服务的密钥，我们可以继续构建和运行容器。我们在 Mac 上运行此操作，配置如图\
    \ 8-5 所示。你可能需要为容器分配一些内存，因此请确保你有一台具有良好 CPU 和内存的像样机器，以便能够在本地运行容器。否则，它会非常慢，甚至可能无法运行。\n\
    \n用于语言检测的 Docker 容器位于 Docker Hub 的此处^(²⁵)。它从 Microsoft 容器存储库^(²⁶) 拉取。为了启动和运行 Docker\
    \ 镜像，你需要运行以下命令：\n\n```\ndocker run --rm -it -p 5000:5000 --memory 8g --cpus 1\
    \ \\\nmcr.microsoft.com/azure-cognitive-services/language \\\nEula=accept \\\n\
    Billing={ENDPOINT_URI} \\\nApiKey={API_KEY}\n```\n\n然后，你需要替换终结点 URL 和 API 密钥，如下所示。请使用你自己的密钥。\n\
    \n```\ndocker run --rm -it -p 5000:5000 --memory 8g --cpus 1 \\\nmcr.microsoft.com/azure-cognitive-services/language\
    \ \\\nEula=accept \\\nBilling='https://textanalyticsengine.cognitiveservices.azure.com/'\
    \ \\\nApiKey='5e9a5dcd31d9458f8e6f51a488d86399'a\n```\n\n在终端中运行此代码将从注册表中拉取容器镜像。在本地运行它，如图\
    \ 8-6 所示。\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig6_HTML.jpg](img/499686_1_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6 拉取容器镜像\n\n你可以在 Docker Desktop 控制台中看到可用镜像列表，如图 8-7 所示。\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig7_HTML.jpg](img/499686_1_En_8_Fig7_HTML.jpg)\n\
    \n图 8-7 磁盘上的镜像\n\n没有什么地方比得上 `127.0.0.1`。因此，一旦镜像下载完成，你就可以访问 `localhost:5000`，因为在\
    \ COVID 封锁期间它非常安全。如果你没有注意到，URL 和端口已在命令中指定（请务必复制并粘贴！）。另请注意，你的 Azure 认知服务容器已启动并正在运行，如图\
    \ 8-8 所示。如果你想运行多个容器，请更改端口号。\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig8_HTML.jpg](img/499686_1_En_8_Fig8_HTML.jpg)\n\
    \n图 8-8 Azure 认知服务容器确认\n\n语言容器（以及语言检测服务）已启动并正在运行。如果你单击**服务 API 描述**链接，你将看到 swagger\
    \ API 信息页面（如图 8-9 所示），你可以在其中调用服务。\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig9_HTML.jpg](img/499686_1_En_8_Fig9_HTML.jpg)\n\
    \n图 8-9 语言检测认知服务 API\n\n容器上有不同版本的服务可用。你可以单击这些链接中的任何一个，并使用预先创建的请求调用服务。参见图 8-10。\n\
    \n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig10_HTML.jpg](img/499686_1_En_8_Fig10_HTML.jpg)\n\
    \n图 8-10 一个预先创建的请求\n\n单击**执行**，然后你将看到响应。接下来，你还可以发出 `cURL`^(²⁷) 请求，以防你想从终端调用它。请参见以下代码：\n\
    \n```\ncurl -X POST \"http://localhost:5000/text/analytics/v2.0/languages\" -H\
    \ \"accept: application/json\" -H \"Content-Type: application/json-patch+json\"\
    \ -d \"{ \\\"documents\\\": [ { \\\"id\\\": \\\"1\\\", \\\"text\\\": \\\"This\
    \ document is in English.\\\" }, { \\\"id\\\": \\\"2\\\", \\\"text\\\": \\\"Este\
    \ documento está en inglés.\\\" }, { \\\"id\\\": \\\"3\\\", \\\"text\\\": \\\"\
    Ce document est en anglais.\\\" }, { \\\"id\\\": \\\"4\\\", \\\"text\\\": \\\"\
    本文件为英文\\\" }, { \\\"id\\\": \\\"5\\\", \\\"text\\\": \\\"Этот документ на английском\
    \ языке.\\\" } ]}\"\n```\n\n在这里，我们执行了代码。你可以在图 8-11 中看到正确检测语言的响应。\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig11_HTML.jpg](img/499686_1_En_8_Fig11_HTML.jpg)\n\
    \n图 8-11 检测语言\n\n> 用于运行容器的 docker 命令是\n> \n> `docker run --rm -it -p 5000:5000\
    \ --memory 8g --cpus 1 mcr.microsoft.com/azure-cognitive-services/textanalytics/language:1.1.012840001-amd64\
    \ Eula=accept Billing=\"https://<resource_name>.cognitiveservices.azure.com/\"\
    \ ApiKey=\"<subscription_key>\"`\n\n你也可以直接从网页调用它。图 8-12 中的屏幕显示了你将通过网页从容器获得的响应。\n\
    \n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig12_HTML.jpg](img/499686_1_En_8_Fig12_HTML.jpg)\n\
    \n图 8-12 来自容器的响应\n"
- fmt: 'In this example, we pulled a Cognitive Services Docker container, ran it while
    linking it with the metering language service, and we invoked the results via
    the webUI and `cURL` interfaces. In the next example, let’s try to do this with
    the Anomaly Detector service, but this time, we’ll use Jupyter notebook.


    ### Running an Anomaly Detector Service Container


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig13_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig13_HTML.jpg)


    **Figure 8-13** Keys and Endpoint


    1.  Similar to the language detection container, Anomaly Detectors are hosting
    on the Docker Hub^([^(28)](#fn28)), as well as the Microsoft container repository
    at `mcr.microsoft.com/azure-cognitive-services/decision/anomaly-detector`.


    2.  Create an instance of the Anomaly Detector service to get the endpoint and
    keys for metering (see Figure [8-13](#499686_1_En_8_Chapter.xhtml#Fig13)). You
    can refer to Chapter [6](#499686_1_En_6_Chapter.xhtml) for the detailed steps
    of creating an anomaly detection service, but it’s pretty much identical to what
    we have done earlier with the language service. Once an instance is created, we
    would use it in the Docker run command.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig14_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig14_HTML.jpg)


    **Figure 8-14** The application starts serving


    1.  Run the following command to create an Anomaly Detector Docker container.
    This will pull down the latest container and connect the service to the Azure
    portal for billing.


    ```

    docker run --rm -it -p 5000:5000 --memory 4g --cpus 1 \

    mcr.microsoft.com/azure-cognitive-services/decision/anomaly-detector:latest \

    Eula=accept \

    Billing=''https://haystackneedleanomalydetector.cognitiveservices.azure.com/''
    \

    ApiKey=''83c02850ba4b402f819c0f2f87f71b86''

    ```


    You would then see the screenshots shown in Figure [8-14](#499686_1_En_8_Chapter.xhtml#Fig14),
    as the application starts serving on the `http://localhost:5000` URL.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig15_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig15_HTML.jpg)


    **Figure 8-15** The welcome screen


    1.  As shown in the language detection example earlier, you can access the Cognitive
    Services container at `http://localhost:5000` and see the welcome screen shown
    in Figure [8-15](#499686_1_En_8_Chapter.xhtml#Fig15). This screen is consistent
    across the Cognitive Services.


    Next, you will see the Swagger page for the APIs and invoke them directly from
    the UI, or via an application (see Figure [8-16](#499686_1_En_8_Chapter.xhtml#Fig16)).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig16_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig16_HTML.jpg)


    **Figure 8-16** The Swagger page


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig17_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig17_HTML.jpg)


    **Figure 8-17** Anaconda Navigator


    1.  For this example, we will run a local instance of Jupyter notebook using Anaconda,
    and we’ll run the sample notebook we used in Chapter [6](#499686_1_En_6_Chapter.xhtml).
    The repository can be cloned from [`https://github.com/Azure-Samples/AnomalyDetector`](https://github.com/Azure-Samples/AnomalyDetector).
    Start the JupyterLab from Anaconda Navigator (as shown in Figure [8-17](#499686_1_En_8_Chapter.xhtml#Fig17)),
    and then navigate to the point anomaly detection notebook.


    Open the notebook, and then populate the API key and endpoint with the API key
    from the anomaly detection service and with the URL `http://localhost:8888` to
    the local anomaly detection container instance. See Figure [8-18](#499686_1_En_8_Chapter.xhtml#Fig18).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig18_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig18_HTML.jpg)


    **Figure 8-18** Latest point anomaly detection


    The first cell should look like the cell in Figure [8-19](#499686_1_En_8_Chapter.xhtml#Fig19).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig19_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig19_HTML.jpg)


    **Figure 8-19** Anomaly Detector resource access key


    Now, when you invoke the further cells to run the example, you will see similar
    results as shown in Chapter [6](#499686_1_En_6_Chapter.xhtml). See Figure [8-20](#499686_1_En_8_Chapter.xhtml#Fig20).
    The difference being that the code is now running locally on your machine via
    the Cognitive Services container.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig20_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig20_HTML.jpg)


    **Figure 8-20** Anomaly Detection Result


    With these two examples, you saw how easy it is to run Cognitive Services containers
    locally, using Docker. Now we will use the cloud-based approaches of ACI and AKS
    to host these containers.'
