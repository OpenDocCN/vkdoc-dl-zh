  trans: '

    ### 使用 LUIS 和 Speech Studio 进行认知语音搜索


    在前一个示例中，您学习了如何转录音频文件。在本示例中，我们将使用自定义语音与微软 LUIS（语言理解）服务，构建一个支持语音的应用程序。请按照以下步骤操作：


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig26_HTML.jpg](img/499686_1_En_5_Fig26_HTML.jpg)


    图 5-26：创建新的 Azure 认知服务帐户


    1.  从市场创建语音资源，如前面示例的步骤 2 所示。我们已经多次执行此操作，希望您对此已非常熟悉。在此，我们将重用前面示例步骤 1 中克隆的 GitHub
    仓库。


    2.  启动 Visual Studio，然后选择 **文件** ➤ **打开** ➤ **项目/解决方案**。导航到包含此示例的文件夹，然后选择其中的解决方案文件。这应该是标准路径（`cognitive-services-speech-sdk`/`samples`/`csharp`/`dotnet-windows`/`console/`）。


    3.  导航到 `intent_recognition_samples.cs`，然后创建一个 Azure 认知服务帐户（见图 5-26）。LUIS 是认知服务的一部分，被称为“基于机器学习的服务，用于将自然语言构建到应用、机器人和物联网设备中”。作为一种企业级且可扩展的服务，LUIS
    提供了一种快速高效的方式，为您的应用程序添加语言功能。登录 `LUIS.AI` 后，您需要创建一个新的 Azure 认知服务帐户。


    填写详细信息以完成该过程。此时，您将看到 Azure 帐户创建和相应资源创建的通知，如图 5-27 所示。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig27_HTML.jpg](img/499686_1_En_5_Fig27_HTML.jpg)


    图 5-27：Azure 认知服务帐户通知


    完成后，继续进行对话应用创作服务控制台的操作，如图 5-28 所示。接下来，您将创建一个新应用。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig28_HTML.jpg](img/499686_1_En_5_Fig28_HTML.jpg)


    图 5-28：LUIS 对话服务应用控制台


    点击 **新建应用** 按钮，创建一个名为 `search service` 的新应用，该应用将包含实例名称、订阅密钥和应用 ID。见图 5-29。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig29_HTML.jpg](img/499686_1_En_5_Fig29_HTML.jpg)


    图 5-29：LUIS 对话服务 – 创建新应用


    接下来，您将创建一个名为 `SearchService` 的对话应用，如图 5-30 所示。双击 `SearchService` 将其打开，然后点击 **创建新意向**
    来创建一个新意向。此时会弹出图 5-30 中的对话框。*意向* 是用户在 *话语* 中提及要执行的任务或操作，例如，点咖啡、查看发货状态等。LUIS 使用
    `None` 意向作为回退，并附带预构建的域，这些域提供了带有话语的已知意向。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig30_HTML.jpg](img/499686_1_En_5_Fig30_HTML.jpg)


    图 5-30：LUIS 对话服务 – 创建新意向


    接下来，转到已创建的意向，并添加一个示例用户输入，如图 5-31 所示。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig31_HTML.jpg](img/499686_1_En_5_Fig31_HTML.jpg)

    '
- fmt: '### Figure 5-31

    LUIS conversation service – creating custom user input


    At this point, we have the keys for [Language Understanding service (LUIS)](https://aka.ms/csspeech/luisdocs)
    to populate the solution file. You can click the **Manage** tab to see these keys
    (as shown in Figure [5-32](#499686_1_En_5_Chapter.xhtml#Fig32)).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig32_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig32_HTML.jpg)


    ### Figure 5-32

    LUIS conversation service – Application Settings and App ID


    Next, open the `intent_recognition_samples.cs` file, and replace the keys `YourSubscriptionKey`,
    `YourServiceRegion`, `YourLanguageUnderstandingSubscriptionKey`, and `YourLanguageUnderstandingServiceRegion`.
    You will also need to replace the names of the intents, such as `YourLanguageUnderstandingIntentName1`,
    `YourLanguageUnderstandingIntentName2`, and `YourLanguageUnderstandingIntentName3`,
    with the names of intents that LUIS recognizes. To find and replace these keys,
    in the top menu, click **Edit** and then **Find and Replace**. See Figure [5-33](#499686_1_En_5_Chapter.xhtml#Fig33).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig33_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig33_HTML.jpg)


    ### Figure 5-33

    Replacing the keys in the project in Visual Studio


    One last thing to consider is the associated model (such as `YourKeywordRecognitionModelFile.table`).
    You need to replace it with the location of your keyword recognition model file.
    In the next step, we will see how to obtain the table file from Speech Studio.
    Also, replace the `YourKeyword` trigger with the phrase from your keyword recognition
    model.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig34_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig34_HTML.jpg)


    ### Figure 5-34

    The Speech Studio portal


    1.  In order to obtain the `YourKeywordRecognitionModelFile.table` file, go to
    `speech.microsoft.com`. See Figure [5-34](#499686_1_En_5_Chapter.xhtml#Fig34).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig35_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig35_HTML.jpg)


    ### Figure 5-35

    Speech Studio features


    2.  Log into Speech Studio, and then click **Custom Keyword**, as shown in Figure
    [5-35](#499686_1_En_5_Chapter.xhtml#Fig35).


    Custom Keyword is a voice assistant capability to select keyword spotting. Click
    **New project** to create a new project (as shown in Figure [5-36](#499686_1_En_5_Chapter.xhtml#Fig36)).


