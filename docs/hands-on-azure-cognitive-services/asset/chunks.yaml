- fmt: '# Video Indexer


    `Video Indexer` provides a way to analyze a video’s contents, by using three channels:
    voice, vocal, and visual. In this way, you will get insights about the video,
    even if you don’t have any expertise on video analysis. It also minimizes your
    efforts, as there is no need to write any additional or custom code.


    `Video Indexer` provides us a way to easily analyze our videos, and it covers
    the following categories:


    - Content creation

    - Content moderation

    - Deep search

    - Accessibility

    - Recommendations

    - Monetization


    We will cover video analysis more thoroughly in Chapter [3](#499686_1_En_3_Chapter.xhtml).


    ## Speech APIs


    `Speech APIs` provide you a way to make your application smarter. Thus, your application
    can now listen and speak. These APIs filter out the noise (words and sounds that
    you don’t want to analyze), detect speakers, and then perform your assigned actions.


    ### Speech Service


    Microsoft introduced the `Speech` service to replace the `Bing Speech API` and
    `Translator Speech`. These are the services that provide an extraordinary effect
    to your application, in such a way that your application can hear users and speak/interact
    with your users.


    > **Note**

    > You can also customize `Speech` services by using frameworks. For speech to
    text, refer to [`https://aka.ms/CustomSpeech`](https://aka.ms/customspeech). For
    text to speech, refer to [`https://aka.ms/CustomVoice`](https://aka.ms/customvoice).


    The `Speech` service enables the following scenarios:


    - Speech to text

    - Text to speech

    - Speech translation

    - Voice assistants


    With the help of different frameworks, you can also customize your `Speech` experience.


    ### Speaker Recognition (Preview)


    `Speaker Recognition` is in Preview, at the time of writing this book. This service
    enables you to recognize the speakers; you can determine who is talking. With
    the help of this service, your application can also verify that the person that
    is speaking is who they claim to be. So, it is now much easier for your application
    to identify unknown speakers from a group of potential speakers.


    It can be divided into these two parts:


    - Speaker verification

    - Speaker identification


    We will cover voice recognition in detail in Chapter [5](#499686_1_En_5_Chapter.xhtml).


    ## Language APIs


    With the help of prebuilt scripts, the `Language APIs` enable your application
    to process the natural language. Also, they provide you the ability to learn how
    to recognize what users want. This would add more capabilities to your application,
    like textual and linguistic analysis.


    ### Immersive Reader


    `Immersive Reader` is a very intelligent service that builds a tool to help every
    reader, especially people affected with dyslexia.


    > **Note**

    > Dyslexia affects that part of the brain that processes language. People with
    dyslexia have difficulty reading, and they can find it very challenging to identify
    the sound in written speech.


    `Immersive Reader` is designed to make it easier for everyone to read.


    It provides the following features:


    - Reads textual content out loud

    - Highlights the adjectives, verbs, nouns, and adverbs

    - Graphically represents commonly used words

    - Helps you understand the content in your own translated language


    ### Language Understanding (LUIS)


    Think of a scenario where you need to make your application smart enough, so that
    it can understand user input (such as speech, text, and so on). The `Speech` service
    makes your application smart enough to listen and speak with the user. But your
    application might need to be smart enough to answer a question that your user
    asks it, such as, “*What is my health status?*” Even after implementing the `Speech
    APIs`, your application will not be ready to understand commands like that. To
    achieve such a complicated requirement, we have the `Language Understanding (LUIS)`
    services. (`LUIS` stands for Language Understanding Intelligent Service.) With
    the help of `LUIS`, you can build an application that interacts with users and
    pulls the relevant information out of the conversations. For a question like,
    “*What is my health status?*”, your application can assess the stored data, and
    it then provides the status of the user’s health. Or it asks a few questions,
    and based on the user’s answer, it would then provide the user’s health status.


    You can work with the following two types of models:


    - Prebuilt model

    - Custom model


    Learn more about `LUIS` in Chapter [4](#499686_1_En_4_Chapter.xhtml).


    ### QnA Maker


    `QnA` is very relevant, when you have an FAQ and want to make it interactive.
    This means that you have a predefined set of QnA (questions and answers). `QnA`
    is mostly used in chat-based applications, where the user enters queries, and
    then your application answers the question. You can try using Microsoft’s [`www.qnamaker.ai/`](http://www.qnamaker.ai/)
    to enable your experience with `QnA Maker`.


    ### Text Analytics


    With the help of the `Text Analytics` service, you can build an application that
    analyzes the raw text and then gives you the result. It includes the following
    functions:


    - Sentiment analysis

    - Key phrase extraction

    - Language identification

    - Name identifications


    ### Translator


    `Translator` enables text-to-text translation, and it provides a way to build
    translation into your application. With the help of `Translator`, you can add
    multilingual capabilities to your application. Currently, more than 60 languages
    are supported. If you want to translate a spoken speech, you will need to use
    the `Speech` service.


    ## Web Search APIs


    The `Web Search APIs` enable you to build more intelligent applications, and they
    give you the power of `Bing Search`. They allow you to access data from billions
    of web pages, images, and news articles (and more), in order to build your search
    results.


    ### Bing Search APIs


    `Bing Search` facilitates your application by providing the ability to do a web
    search. You can imagine that with the implementation of `Bing Search APIs`, you
    now have a wide range of web pages with which to build out your search results.
    The code implementation is very easy as well (see Listing [1-1](#499686_1_En_1_Chapter.xhtml#PC1)).


    ```

    //Sample code

    public static async void WebResults(WebSearchClient client)

    {

    try

    {

    var fetchedData = await client.Web.SearchAsync(query: "Tom Campbell''s Hill Natural
    Park");

    Console.WriteLine("Looking for \"Tom Campbell''s Hill Natural Park\"");

    // ...

    }

    catch (Exception ex)

    {

    Console.WriteLine("Exception during search. " + ex.Message);

    }

    }

    Listing 1-1

    The sample code to implement Bing Web Search

    ```


    ### Bing Web Search


    With the `Bing Web Search API`, you can suggest search terms while a user is typing,
    filter and restrict search results, remove unwanted characters from search results,
    localize search results by country, and analyze search data.


    ### Bing Custom Search


    The `Bing Custom Search API` allows you to customize the search suggestions, the
    image search experience, and the video search experience. You can share and collaborate
    on your custom search, and you can configure a unique UI for your app to display
    your search results.


    ### Bing Image Search


    The `Bing Image Search API` enables you to leverage Bing’s image searching capabilities.
    You can suggest image search terms, filter and restrict image results, crop and
    resize images, display thumbnails of the images, and showcase trending images.


    ### Bing Entity Search


    The `Bing Entity Search API` gets you search results of entities and locations,
    such as restaurants, hotels, or stores. You can provide real-time search suggestions,
    entity disambiguation (providing multiple search results), and return information
    on businesses and other entities.


    ### Bing News Search


    The `Bing News Search API` lets you search for relevant news articles. You can
    suggest search terms, return news articles, showcase the day’s top news articles
    and headlines, and filter news results by category.'
  raw: '#### Video Indexer


    Video Indexer provides a way to analyze a video’s contents, by using three channels:
    voice, vocal, and visual. In this way, you will get insights about the video,
    even if you don’t have any expertise on video analysis. It also minimizes your
    efforts, as there is no need to write any additional or custom code.


    Video Indexer provides us a way to easily analyze our videos, and it covers the
    following categories:


    *   Content creation


    *   Content moderation


    *   Deep search


    *   Accessibility


    *   Recommendations


    *   Monetization


    We will cover video analysis more thoroughly in Chapter [3](#499686_1_En_3_Chapter.xhtml).


    ### Speech APIs


    Speech APIs provide you a way to make your application smarter. Thus, your application
    can now listen and speak. These APIs filter out the noise (words and sounds that
    you don’t want to analyze), detect speakers, and then perform your assigned actions.


    #### Speech Service


    Microsoft introduced the Speech service to replace the Bing Speech API and Translator
    Speech. These are the services that provide an extraordinary effect to your application,
    in such a way that your application can hear users and speak/interact with your
    users.


    Note


    You can also customize Speech services by using frameworks. For speech to text,
    refer to [`https://aka.ms/CustomSpeech`](https://aka.ms/customspeech). For text
    to speech, refer to [`https://aka.ms/CustomVoice`](https://aka.ms/customvoice).


    The Speech service enables the following scenarios:


    *   Speech to text


    *   Text to speech


    *   Speech translation


    *   Voice assistants


    With the help of different frameworks, you can also customize your Speech experience.


    #### Speaker Recognition (Preview)


    Speaker Recognition is in Preview, at the time of writing this book. This service
    enables you to recognize the speakers; you can determine who is talking. With
    the help of this service, your application can also verify that the person that
    is speaking is who they claim to be. So, it is now much easier for your application
    to identify unknown speakers from a group of potential speakers.


    It can be divided into these two parts:


    *   Speaker verification


    *   Speaker identification


    We will cover voice recognition in detail in Chapter [5](#499686_1_En_5_Chapter.xhtml).


    ### Language APIs


    With the help of prebuilt scripts, the Language APIs enable your application to
    process the natural language. Also, they provide you the ability to learn how
    to recognize what users want. This would add more capabilities to your application,
    like textual and linguistic analysis.


    #### Immersive Reader


    Immersive Reader is a very intelligent service that builds a tool to help every
    reader, especially people affected with dyslexia.


    Note


    Dyslexia affects that part of the brain that processes language. People with dyslexia
    have difficulty reading, and they can find it very challenging to identify the
    sound in written speech.


    Immersive Reader is designed to make it easier for everyone to read.


    It provides the following features:


    *   Reads textual content out loud


    *   Highlights the adjectives, verbs, nouns, and adverbs


    *   Graphically represents commonly used words


    *   Helps you understand the content in your own translated language


    #### Language Understanding (LUIS)


    Think of a scenario where you need to make your application smart enough, so that
    it can understand user input (such as speech, text, and so on). The Speech service
    makes your application smart enough to listen and speak with the user. But your
    application might need to be smart enough to answer a question that your user
    asks it, such as, “*What is my health status?*” Even after implementing the Speech
    APIs, your application will not be ready to understand commands like that. To
    achieve such a complicated requirement, we have the Language Understanding (LUIS)
    services. (LUIS stands for Language Understanding Intelligent Service.) With the
    help of LUIS, you can build an application that interacts with users and pulls
    the relevant information out of the conversations. For a question like, “*What
    is my health status?*”, your application can assess the stored data, and it then
    provides the status of the user’s health. Or it asks a few questions, and based
    on the user’s answer, it would then provide the user’s health status.


    You can work with the following two types of models:


    *   Prebuilt model


    *   Custom model


    Learn more about LUIS in Chapter [4](#499686_1_En_4_Chapter.xhtml).


    #### QnA Maker


    QnA is very relevant, when you have an FAQ and want to make it interactive. This
    means that you have a predefined set of QnA (questions and answers). QnA is mostly
    used in chat-based applications, where the user enters queries, and then your
    application answers the question. You can try using Microsoft’s [`www.qnamaker.ai/`](http://www.qnamaker.ai/)
    to enable your experience with QnA Maker.


    #### Text Analytics


    With the help of the Text Analytics service, you can build an application that
    analyzes the raw text and then gives you the result. It includes the following
    functions:


    *   Sentiment analysis


    *   Key phrase extraction


    *   Language identification


    *   Name identifications


    #### Translator


    Translator enables text-to-text translation, and it provides a way to build translation
    into your application. With the help of Translator, you can add multilingual capabilities
    to your application. Currently, more than 60 languages are supported. If you want
    to translate a spoken speech, you will need to use the Speech service.


    ### Web Search APIs


    The Web Search APIs enable you to build more intelligent applications, and they
    give you the power of Bing Search. They allow you to access data from billions
    of web pages, images, and news articles (and more), in order to build your search
    results.


    #### Bing Search APIs


    Bing Search facilitates your application by providing the ability to do a web
    search. You can imagine that with the implementation of Bing Search APIs, you
    now have a wide range of web pages with which to build out your search results.
    The code implementation is very easy as well (see Listing [1-1](#499686_1_En_1_Chapter.xhtml#PC1)).


    ```

    //Sample code

    public static async void WebResults(WebSearchClient client)

    {

    try

    {

    var fetchedData = await client.Web.SearchAsync(query: "Tom Campbell''s Hill Natural
    Park");

    Console.WriteLine("Looking for \"Tom Campbell''s Hill Natural Park\"");

    // ...

    }

    catch (Exception ex)

    {

    Console.WriteLine("Exception during search. " + ex.Message);

    }

    }

    Listing 1-1

    The sample code to implement Bing Web Search

    ```


    #### Bing Web Search


    With the Bing Web Search API, you can suggest search terms while a user is typing,
    filter and restrict search results, remove unwanted characters from search results,
    localize search results by country, and analyze search data.


    #### Bing Custom Search


    The Bing Custom Search API allows you to customize the search suggestions, the
    image search experience, and the video search experience. You can share and collaborate
    on your custom search, and you can configure a unique UI for your app to display
    your search results.


    #### Bing Image Search


    The Bing Image Search API enables you to leverage Bing’s image searching capabilities.
    You can suggest image search terms, filter and restrict image results, crop and
    resize images, display thumbnails of the images, and showcase trending images.


    #### Bing Entity Search


    The Bing Entity Search API gets you search results of entities and locations,
    such as restaurants, hotels, or stores. You can provide real-time search suggestions,
    entity disambiguation (providing multiple search results), and return information
    on businesses and other entities.


    #### Bing News Search


    The Bing News Search API lets you search for relevant news articles. You can suggest
    search terms, return news articles, showcase the day’s top news articles and headlines,
    and filter news results by category.'
  trans: '

    # 视频索引器


    `Video Indexer` 提供了一种通过语音、人声和视觉三个渠道来分析视频内容的方法。通过这种方式，即使你没有任何视频分析专业知识，也能深入了解视频信息。它还最大限度地减少了你的工作量，因为无需编写任何额外的或自定义的代码。


    `Video Indexer` 为我们提供了一种轻松分析视频的方法，它涵盖以下类别：


    - 内容创作

    - 内容审核

    - 深度搜索

    - 无障碍访问

    - 推荐

    - 变现


    我们将在第 3 章中更全面地介绍视频分析。


    ## 语音 API


    `Speech APIs` 提供了一种让你的应用程序更智能的方法。因此，你的应用程序现在可以“听”和“说”。这些 API 会过滤掉噪音（你不想分析的词语和声音），识别说话者，然后执行你指定的操作。


    ### 语音服务


    微软推出了 `Speech` 服务来取代 `Bing Speech API` 和 `Translator Speech`。这些服务能为你的应用程序带来非凡的效果，让你的应用程序能够听到用户的声音并与用户进行语音交互。


    > **注意**

    > 你也可以使用框架自定义 `Speech` 服务。关于语音转文本，请参考 [`https://aka.ms/CustomSpeech`](https://aka.ms/customspeech)。关于文本转语音，请参考
    [`https://aka.ms/CustomVoice`](https://aka.ms/customvoice)。


    `Speech` 服务支持以下场景：


    - 语音转文本

    - 文本转语音

    - 语音翻译

    - 语音助手


    借助不同的框架，你还可以自定义你的 `Speech` 体验。


    ### 说话人识别（预览版）


    在撰写本书时，`Speaker Recognition` 处于预览阶段。此服务使你能够识别说话者；你可以确定谁在说话。借助此服务，你的应用程序还可以验证说话者的身份是否与其声称的一致。因此，你的应用程序现在可以更容易地从一组潜在的说话者中识别出未知的说话者。


    它可以分为以下两个部分：


    - 说话人验证

    - 说话人识别


    我们将在第 5 章中详细介绍语音识别。


    ## 语言 API


    借助预构建的脚本，`Language APIs` 使你的应用程序能够处理自然语言。同时，它们还为你提供了学习如何识别用户意图的能力。这将为你的应用程序增加更多功能，例如文本和语言分析。


    ### 沉浸式阅读器


    `Immersive Reader` 是一项非常智能的服务，它构建了一个工具来帮助每一位读者，尤其是受阅读障碍影响的人群。


    > **注意**

    > 阅读障碍会影响大脑中处理语言的部分。有阅读障碍的人阅读困难，并且他们可能会觉得识别书面语言中的声音非常具有挑战性。


    `Immersive Reader` 旨在让每个人都能更轻松地阅读。


    它提供以下功能：


    - 大声朗读文本内容

    - 高亮显示形容词、动词、名词和副词

    - 以图形方式表示常用词

    - 帮助你理解翻译成自己语言的内容


    ### 语言理解 (LUIS)


    设想一个场景，你需要让你的应用程序足够智能，以便能够理解用户输入（例如语音、文本等）。`Speech` 服务让你的应用程序足够智能，可以听用户说话并与用户交流。但是，你的应用程序可能需要足够智能才能回答用户提出的问题，例如，“*我的健康状况如何？*”
    即使实现了 `Speech APIs`，你的应用程序也无法理解这样的命令。为了实现如此复杂的需求，我们提供了 `Language Understanding
    (LUIS)` 服务。（`LUIS` 代表语言理解智能服务。）借助 `LUIS`，你可以构建一个与用户交互并从对话中提取相关信息的应用程序。对于像“*我的健康状况如何？*”这样的问题，你的应用程序可以评估存储的数据，然后提供用户的健康状况。或者它会问几个问题，然后根据用户的回答提供用户的健康状况。


    你可以使用以下两种类型的模型：


    - 预构建模型

    - 自定义模型


    在第 4 章中了解更多关于 `LUIS` 的信息。


    ### QnA Maker


    当你拥有常见问题解答（FAQ）并希望使其具有交互性时，`QnA` 非常适用。这意味着你有一组预定义的问答对。`QnA` 主要用于基于聊天的应用程序，用户输入查询，然后你的应用程序回答问题。你可以尝试使用微软的
    [`www.qnamaker.ai/`](http://www.qnamaker.ai/) 来体验 `QnA Maker`。


    ### 文本分析


    借助 `Text Analytics` 服务，你可以构建一个分析原始文本并给出结果的应用程序。它包括以下功能：


    - 情感分析

    - 关键短语提取

    - 语言识别

    - 名称识别


    ### 翻译器


    `Translator` 支持文本到文本的翻译，并提供了一种将翻译功能构建到应用程序中的方法。借助 `Translator`，你可以为应用程序添加多语言功能。目前支持超过
    60 种语言。如果你想翻译口语语音，则需要使用 `Speech` 服务。


    ## 网页搜索 API


    `Web Search APIs` 使你能够构建更智能的应用程序，并为你提供 `Bing Search` 的强大功能。它们允许你访问来自数十亿网页、图像和新闻文章（等等）的数据，以构建你的搜索结果。


    ### Bing 搜索 API


    `Bing Search` 通过提供执行网页搜索的能力来增强你的应用程序。可以想象，通过实现 `Bing Search APIs`，你现在拥有大量的网页可以用来构建你的搜索结果。代码实现也非常简单（参见代码清单
    1-1）。


    ```

    //示例代码

    public static async void WebResults(WebSearchClient client)

    {

    try

    {

    var fetchedData = await client.Web.SearchAsync(query: "Tom Campbell''s Hill Natural
    Park");

    Console.WriteLine("正在搜索 \"Tom Campbell''s Hill Natural Park\"");

    // ...

    }

    catch (Exception ex)

    {

    Console.WriteLine("搜索过程中出现异常。" + ex.Message);

    }

    }

    代码清单 1-1

    实现 Bing 网页搜索的示例代码

    ```


    ### Bing 网页搜索


    使用 `Bing Web Search API`，你可以在用户输入时建议搜索词，过滤和限制搜索结果，从搜索结果中移除不需要的字符，按国家/地区本地化搜索结果，以及分析搜索数据。


    ### Bing 自定义搜索


    `Bing Custom Search API` 允许你自定义搜索建议、图像搜索体验和视频搜索体验。你可以共享和协作你的自定义搜索，并且可以为你的应用配置独特的用户界面来显示搜索结果。


    ### Bing 图像搜索


    `Bing Image Search API` 使你能够利用 Bing 的图像搜索能力。你可以建议图像搜索词，过滤和限制图像结果，裁剪和调整图像大小，显示图像的缩略图，以及展示热门图像。


    ### Bing 实体搜索


    `Bing Entity Search API` 为你提供实体和地点（例如餐厅、酒店或商店）的搜索结果。你可以提供实时搜索建议、实体消歧（提供多个搜索结果），并返回有关企业和其他实体的信息。


    ### Bing 新闻搜索


    `Bing News Search API` 让你能够搜索相关的新闻文章。你可以建议搜索词，返回新闻文章，展示当天的热门新闻文章和头条新闻，并按类别过滤新闻结果。

