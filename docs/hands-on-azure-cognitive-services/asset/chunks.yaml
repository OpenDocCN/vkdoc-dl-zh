  raw: '## Decision Services and APIs


    Originally launched as “Project Custom Decision,” it has now graduated to become
    part of the Personalizer service, joining the ranks of the Anomaly Detector, Content
    Moderator, and Metrics Advisor suite of Cognitive Services. This minor lesson
    in history is important since making a smarter decision requires a multifaceted
    skillset. Having one comprehensive “decision service” might not be the most effective
    way to address this nuanced discipline. Therefore, a combination of different
    skillsets is necessary, such as identifying outliers; finding out potentially
    offensive, racy, obscene, or unwanted contents; and creating tailored custom interactions
    for users.


    Decision services are a critical part of the Azure Cognitive Services ecosystem,
    which also offers amazing capabilities in the areas of language, speech, vision,
    and web search (as you have seen in the earlier chapters). The current members
    of the decision service family include the following:


    *   **Anomaly Detector**


    Cognitive service to identify outliers and to pinpoint potential behaviors that
    are out of the ordinary


    *   **Content Moderator**


    Cognitive service that helps identify racy, obscene, and offensive contents across
    multiple modalities


    *   **Personalizer**


    Service to build a customized, individualized, and targeted experience that is
    curated for individual user preferences


    *   **Metrics Advisor (in preview at the time of this writing)**


    Anomaly detection core engine, customized for AIOps, such as detecting and diagnosing
    metrices for root cause analysis and finding issues in logs with time series analysis


    In the rest of this chapter, we will review these services and build demo applications
    that will show you how to use them in your own projects.


    ## Content Moderator Service


    For today’s digital economy, scale is the name of the game. The service that’s
    offered must be able to scale to millions of users without these manual bottlenecks.


    Extending on the “I know it when I see it” metaphor, an Internet scale system
    today cannot rely on human screenings for every video and image uploaded to the
    Internet. Platforms like YouTube get more than 500 hours of video contents uploaded
    every minute, which results in approximately 30,000 hours of hourly contents.
    The cost and resources required make it prohibitive for human screening. Human
    in the loop (HiTL) is the technique of keeping human interaction as part of the
    process. Ideally, the human interaction is limited only to the exceptional cases
    that really require human intervention for decision making. The rest is automated.


    Content moderation is a required component in most modern websites that interact
    with their users. Some of the use cases include the following:


    1.  An organization offers a digital bank, which allows their customers to upload
    an image for their custom debit card. They want to ensure that the uploaded image
    does not contain any obscene or racy pictures.


    2.  For a company’s intranet, a co-worker wants to upload the latest company holiday
    party photos. They want to ensure the images are safe for work.


    3.  An organization’s application moderates social media feeds, which are imported
    to be displayed on an employee’s custom dashboard. It monitors Facebook, Twitter,
    and Instagram posts for contents about the company and associated social media
    hashtags, to ensure a strong reputation and full compliance.


    4.  An organization builds a customer profile online, complete with photos and
    personalized information. They also want to ensure the pictures are not riddled
    with profane phrases.


    5.  A company creates an ecommerce marketplace, where customers can make niche
    stores of their own and sell their products. They want to make sure that the pictures
    uploaded are suitable for the appropriate audience.


    6.  A company provides a Discord-style chat room for their perspective customers.
    The customers can share live feedback about the company’s products and services.
    The company wants to maintain decorum and keep the language moderated, to ensure
    no outwardly offensive terms are being used.


    7.  A company creates a live-tour website, where users upload their TikTok adventures
    to their microsites, which promise authentic experiences. They want to make sure
    that these experiences, however authentic they might be, do not become a potential
    adult-content liability for their small business.


    There are many more examples, but you get the point. Without sophisticated Cognitive
    Services and huge help from AI, a small business would be at a great disadvantage.
    Hypothetically speaking, large companies like YouTube, Twitter, Instagram, or
    Facebook might be able to hire an army of human reviewers to sift through every
    video, but you cannot afford to do that. However, that’s okay because the Azure
    Content Moderator service is here to help. By the way, the companies we specified
    earlier heavily use AI and machine learning to perform content moderation, and
    they have humans in the loop as a secondary step. Some of them also have to deal
    with fake news; remember all those tweet warnings. Unfortunately, fact-checking
    isn’t part of the content moderation service, yet.


    The Content Moderator service provides answer to these enterprise needs, with
    the necessary tools for a safe and positive user experience. The service comes
    with a human review tool and image text and video moderation capabilities, which
    we will explore in the next sections.'
  trans: "\n# 决策服务与 API\n\n该服务最初以“Project Custom Decision”之名推出，现已升级并成为 `Personalizer`\
    \ 服务的一部分，与 `Anomaly Detector`、`Content Moderator` 和 `Metrics Advisor` 共同组成认知服务套件。这段历史小知识之所以重要，是因为做出更明智的决策需要多方面的技能组合。仅靠一个单一的“决策服务”可能并非应对这一复杂学科的最有效方式。因此，我们需要结合不同的技能，例如识别异常值、发现可能具有攻击性、露骨、淫秽或不受欢迎的内容，以及为用户创建量身定制的个性化交互。\n\
    \n决策服务是 Azure 认知服务生态系统中的关键组成部分，该生态系统还在语言、语音、视觉和网络搜索领域提供了强大的功能（正如你在前几章中所见）。目前决策服务家族包括以下成员：\n\
    \n- **异常检测器**  \n  用于识别异常值并精确定位可能超出常规行为的认知服务。\n\n- **内容审查器**  \n  帮助识别跨多种模态的露骨、淫秽和攻击性内容的认知服务。\n\
    \n- **个性化器**  \n  用于构建定制化、个性化且有针对性的体验，并根据个人用户偏好进行优化的服务。\n\n- **指标顾问（撰写本文时处于预览阶段）**\
    \  \n  专为 AIOps 定制的异常检测核心引擎，例如检测和诊断指标以进行根本原因分析，以及通过时间序列分析发现日志中的问题。\n\n在本章的剩余部分，我们将逐一审视这些服务，并构建演示应用程序，向你展示如何在自有项目中使用它们。\n\
    \n## 内容审查器服务\n\n在当今的数字经济中，规模是关键。所提供的服务必须能够扩展到数百万用户，而不会受到这些人工瓶颈的制约。\n\n沿用“我一看便知”的比喻，如今的互联网规模系统无法依赖人工筛查来审核上传到互联网的每一个视频和图片。像\
    \ YouTube 这样的平台每分钟会收到超过 500 小时的视频内容上传，相当于每小时约 30,000 小时的内容量。所需成本和资源使得人工筛查变得不可行。人在回路中（HiTL）是一种将人工交互保留为流程一部分的技术。理想情况下，人工交互仅限于那些真正需要人为干预才能做出决策的例外情况，其余部分则实现自动化。\n\
    \n内容审查是大多数与用户互动的现代网站所必需的组件。一些用例包括：\n\n1.  某组织提供数字银行服务，允许客户上传图片用于定制借记卡。他们需要确保上传的图片不包含任何淫秽或露骨的内容。\n\
    \n2.  在公司内部网络中，同事想上传最新的公司假日派对照片。他们需要确保这些图片适合工作场合。\n\n3.  某组织的应用程序对社交媒体信息流进行审查，这些信息流被导入并显示在员工的定制仪表盘上。它监控\
    \ Facebook、Twitter 和 Instagram 上关于公司及相关社交媒体话题标签的帖子，以确保良好的声誉和完全合规。\n\n4.  某组织在线构建客户档案，包含照片和个性化信息。他们还需要确保图片中没有充斥粗俗的短语。\n\
    \n5.  某公司创建了一个电子商务市场，客户可以在其中开设自己的小众店铺并销售产品。他们需要确保上传的图片适合相应的受众群体。\n\n6.  某公司为其潜在客户提供了一个类似\
    \ Discord 的聊天室。客户可以分享关于公司产品和服务的实时反馈。公司希望维持良好的秩序并对语言进行审查，以确保不使用任何明显冒犯性的词汇。\n\n\
    7.  某公司创建了一个实景旅游网站，用户可以将他们的 TikTok 冒险视频上传到微站点，这些站点承诺提供真实的体验。公司需要确保这些体验，无论多么真实，都不会成为其小企业潜在的成人内容责任。\n\
    \n还有更多例子，但你应该已经明白了要点。如果没有复杂的认知服务和人工智能的巨大帮助，小企业将处于极大的劣势。假设来说，像 YouTube、Twitter、Instagram\
    \ 或 Facebook 这样的大公司或许能雇佣一支人工审核员大军来筛选每一个视频，但你无法负担这样做。不过，这没关系，因为 Azure 内容审查器服务可以帮到你。顺便提一下，我们之前提到的那些公司大量使用人工智能和机器学习来执行内容审查，并将人工审核作为第二步流程。其中一些公司还需要处理假新闻；还记得那些推文警告吗？不幸的是，事实核查目前还不是内容审查服务的一部分。\n\
    \n内容审查器服务为这些企业需求提供了答案，并配备了确保安全、积极用户体验的必要工具。该服务附带一个人工审核工具以及图像、文本和视频审查功能，我们将在接下来的章节中探讨这些功能。\n"
- fmt: '### Trying It Out – Building Content Moderators


    In this section, we will use the Content Moderator service to show how it can
    be used in your application. The Content Moderator service has the capabilities
    to detect questionable content in text, images, and videos, as well as human-in-the-loop
    capabilities to review these contents. This is a hands-on tour of these capabilities,
    to enable you to be able to build it as part of your own application. Follow along
    with these instructions:


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig1_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Content Moderator service portal homepage


    1.  The easiest way to get started with Content Moderator service is to go to
    the Content Moderator portal, at [`https://contentmoderator.cognitive.microsoft.com/`](https://contentmoderator.cognitive.microsoft.com/).


    Figure [6-1](#499686_1_En_6_Chapter.xhtml#Fig1) shows the Content Moderator sign-up
    button.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig2_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Content Moderator service portal homepage login screen


    1.  Click **Sign Up**, and you can log in using your Microsoft account, as shown
    in Figure [6-2](#499686_1_En_6_Chapter.xhtml#Fig2).


    This portal is designed for human-in-the-loop review, but you also see the response
    from the APIs. The next step, after logging in, is to create a review team.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig3_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Content Moderator service portal Create review team screen


    1.  Create a review team by providing information about your region, team name,
    team ID, and invitation to other reviewers, as shown in Figure [6-3](#499686_1_En_6_Chapter.xhtml#Fig3).
    The fields are fairly self-descriptive, and you can always add team members later.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig4_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Content Moderator service portal dashboard


    1.  Once you have created the team, you see the dashboard shown in Figure [6-4](#499686_1_En_6_Chapter.xhtml#Fig4).
    This summarized view shows the total requests of submitted review tasks for images,
    text, and videos, along with all pending and completed requests. You can now try
    to submit a task, by selecting the right content modality (image, text, or video)
    from the top menu, as shown in Figure [6-4](#499686_1_En_6_Chapter.xhtml#Fig4).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig5_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Content Moderator service Upload Images to Moderate screen


    1.  We don’t recommend that you find risqué images to test the Content Moderator
    service on a work machine. As they say, it’s all fun and games until HR sends
    you an email, and “but I am doing research” is no longer a valid justification.
    So, before you start searching for that image, consider using the Flickr30K Image
    dataset. Released under the creative commons license, it is widely used as a benchmark
    for sentence-based image descriptions, and it contains a very diverse set of images.
    You can download the dataset from [`www.kaggle.com/hsankesara/flickr-image-dataset`](http://www.kaggle.com/hsankesara/flickr-image-dataset).


    To test the Content Moderator service, we uploaded the picture of some swimmers
    to be moderated and reviewed, as shown in Figure [6-5](#499686_1_En_6_Chapter.xhtml#Fig5).


    Once you upload the image, you would see the confirmation shown in Figure [6-6](#499686_1_En_6_Chapter.xhtml#Fig6).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig6_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Content Moderator service Upload Image Confirmation


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig7_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Content Moderator service dashboard status


    1.  Once you get the confirmation, you would see that the image is pending review,
    as shown in Figure [6-7](#499686_1_En_6_Chapter.xhtml#Fig7).


    As the uploaded image goes through the review workflow, APIs have already processed
    the image and provided their feedback. The flags used to identify unsuitable contents
    include `isImageAdultClassified` and `isImageRacyClassified`, as seen in Figure
    [6-8](#499686_1_En_6_Chapter.xhtml#Fig8).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig8_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Content Moderator service image review scoring screen


    The flags are self-explanatory; `isImageAdultClassified` identifies the sexually
    explicit images, while `isImageRacyClassified` flags suggestive comments. The
    probabilistic score is between 0 and 1, where a higher score means increased confidence
    in the image being explicit or suggestive in the respective category. Based on
    your organizational needs, you can set up your own threshold for what is a tolerable
    number to be allowed before a manual review must be taken place.


    In the case of this image’s manual review, you can either tag the image `a` (adult)
    or `r` (racy), or you can just skip it, since it’s neither. Then click **Next**
    to finish the review process, as shown in Figure [6-9](#499686_1_En_6_Chapter.xhtml#Fig9).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig9_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Content Moderator service image review screen


    Now that we have reviewed the human-in-the-loop review scenario of the Content
    Moderator service, let’s explore the text moderation capabilities in the next
    section.'
