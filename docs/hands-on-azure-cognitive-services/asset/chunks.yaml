- fmt: '### Speech to Text – Converting Spoken Audio to Text for Interaction


    In this first example, we will see how to transcribe conversations in C# by using
    .NET Framework for Windows. Follow these steps:


    Clone the conversation transcription repository from the cognitive services speech
    SDK repository (`https://github.com/Azure-Samples/cognitive-services-speech-sdk/tree/master/quickstart/csharp/dotnet/conversation-transcription`).
    See Figure [5-3](#499686_1_En_5_Chapter.xhtml#Fig3). Then navigate to the equivalent
    folder (`cognitive-services-speech-sdk/quickstart/csharp/dotnet/conversation-transcription/`)
    in your system.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig3_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Cloning the speech SDK GitHub repository


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig4_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Visual Studio – opening the solution from the path


    1. Open up Visual Studio, and then open the solution file, from the cloned path
    (`quickstart/csharp/dotnet/conversation-transcription`). See Figure [5-4](#499686_1_En_5_Chapter.xhtml#Fig4).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig5_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Azure services – Create a resource


    1. Open the Azure services console, and then click **Create a resource** (as shown
    in Figure [5-5](#499686_1_En_5_Chapter.xhtml#Fig5)).


    Select **Speech** from the marketplace, and then click the **Speech** resource
    by Microsoft. See Figure [5-6](#499686_1_En_5_Chapter.xhtml#Fig6).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig6_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Azure services – creating a speech resource from the marketplace


    Next, click the **Create** button to continue. Next, add the required service
    parameters, such as the name, subscription, location, pricing tier, and resource
    group (as shown in Figure [5-7](#499686_1_En_5_Chapter.xhtml#Fig7)).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig7_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Azure services – providing the required information


    Click **Create** to continue. This deploys the service. You will see the notification
    of deployment as it starts, as shown in Figure [5-8](#499686_1_En_5_Chapter.xhtml#Fig8).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig8_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Azure services – speech deployment in progress


    Once the deployment completes, you will see the keys and the respective endpoints,
    as shown in Figure [5-9](#499686_1_En_5_Chapter.xhtml#Fig9).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig9_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Azure Speech service – keys and endpoint


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig10_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Azure Speech service – populate the keys and service region


    1. You can copy the key and service region (location) from this page. Then, use
    it to replace the tags in the solution file of the open directory (as shown in
    Figure [5-10](#499686_1_En_5_Chapter.xhtml#Fig10)).


    Edit the `Program.cs` source file, and then replace the `YourSubscriptionKey`
    and `YourServiceRegion` values, preferred language, and add a WAV file sample
    for a voice signature. See Figure [5-11](#499686_1_En_5_Chapter.xhtml#Fig11).'
