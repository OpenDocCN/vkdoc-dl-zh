  trans: '

    # 使用 Azure 机器学习设计器构建分类模型


    在前面的示例中，我们通过使用 Azure 机器学习笔记本构建了一个分类模型。这是一种代码密集型方法，需要我们为不同的算法编写 Python 代码。现在，我们将采用一种低代码方法，使用
    Azure 机器学习设计器，如图 10-27 所示。


    在 Azure 机器学习工作区门户的左窗格中，单击 `Designer`。设计器主页随即打开，您可以在其中看到管道的集合（如图 10-27 所示）。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig27_HTML.jpg](img/499686_1_En_10_Fig27_HTML.jpg)


    **图 10-27** – Azure 机器学习设计器 – 主屏幕


    Microsoft Azure 团队提供了一套基础及高级的配方，用于学习如何使用设计器。Azure 机器学习设计器的示例管道和数据集包括回归示例（如汽车价格预测）、分类用例（如针对收入进行特征选择的二元分类）、信用风险、航班延误、客户关系预测、使用
    Wikipedia SP 500 数据集进行文本分类，以及基于计算机视觉、使用 DenseNet 的图像分类。这些示例还包括推荐引擎，例如餐厅评分预测、基于推文的电影评分，以及使用
    Vowpal Wabbit 模型进行成人收入预测的二元分类。


    要使用 Azure 机器学习设计器构建分类模型，请遵循以下步骤：


    1.  在此示例中，我们将使用成人人口普查收入数据集。通过双击主页上的示例将其打开，或者从头开始构建。要继续，请单击 `Designer` 选项卡（在左窗格中）。见图
    10-28。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig28_HTML.jpg](img/499686_1_En_10_Fig28_HTML.jpg)


    **图 10-28** – Azure 机器学习设计器 – 创作


    2.  设计器是一个面向公民数据科学家的拖放工具，侧重于低代码。它相当易于使用。您可以先拖放 `Adult Census Income Binary Classification`
    数据集（如图 10-29 所示）。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig29_HTML.jpg](img/499686_1_En_10_Fig29_HTML.jpg)


    **图 10-29** – Azure 机器学习设计器 – 数据集导入


    拖放数据集后，您将在右侧窗格中看到该数据集的参数（见图 10-30）。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig30_HTML.jpg](img/499686_1_En_10_Fig30_HTML.jpg)


    **图 10-30** – Azure 机器学习设计器 – 数据集导入


    3.  需要将数据集拆分为训练数据集和测试数据集。这在上一节中是通过代码完成的。但是，这里我们将使用拆分数据模块来完成此任务。我们将对数据集执行随机拆分。见图
    10-31。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig31_HTML.jpg](img/499686_1_En_10_Fig31_HTML.jpg)


    **图 10-31** – Azure 机器学习设计器 – 拆分数据


    4.  然后筛选特征并定义目标列（`income`），使用皮尔逊相关系数作为特征评分方法。另一种支持的技术是卡方检验，如图 10-32 所示。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig32_HTML.jpg](img/499686_1_En_10_Fig32_HTML.jpg)


    **图 10-32** – Azure 机器学习设计器 – 基于筛选器的特征选择


    5.  现在数据摄取已完成，可以使用 `Two-Class Boosted Decision Tree` 模块来初始化分类器，这需要一个 `Train Model`
    模块和相关的转换。在左窗格中，您可以看到 Azure 机器学习设计器支持的不同类型的转换（如图 10-33 所示）。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig33_HTML.jpg](img/499686_1_En_10_Fig33_HTML.jpg)


    **图 10-33** – Azure 机器学习设计器 – 选择列


    将 `Train Model` 模块与 `Score Model` 以及测试集连接起来。添加 `Evaluate Model` 模块。最终的管道应如图 10-34
    所示。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig34_HTML.jpg](img/499686_1_En_10_Fig34_HTML.jpg)


    **图 10-34** – Azure 机器学习设计器 – 最终流程


    在左窗格中，您可以看到可用算法的列表，包括提升决策树、快速森林回归、线性回归、神经网络回归和泊松回归等。运行完成后，您现在可以看到运行的属性和所用模型的评分卡，在本例中为
    `Two-Class Boosted Decision Tree`（见图 10-35）。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig35_HTML.jpg](img/499686_1_En_10_Fig35_HTML.jpg)


    **图 10-35** – Azure 机器学习设计器 – 运行概览


    运行完成后，在模型运行概览窗口中，您可以展开并查看运行中的各个任务（`Evaluate Model`、`Applying Transformation`、`Scoring`、`Selecting
    Columns`、`Splitting Dataset` 等）以及流程中每个部分所花费的时间。在这里，我们可以看到 `Two-Class Boosted Decision
    Tree` 花费的时间最多。您还可以使用 Azure 机器学习 Visual Studio Code 扩展；分步说明可在此处找到。^(⁴⁰) 请参见图 10-36
    中的运行视图。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig36_HTML.jpg](img/499686_1_En_10_Fig36_HTML.jpg)


    **图 10-36** – Azure 机器学习设计器 – 运行视图


    现在运行已完成，右键单击 `Evaluate Model`，然后单击 `Visualize`，接着单击 `Evaluation results`，如图 10-37
    所示。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig37_HTML.jpg](img/499686_1_En_10_Fig37_HTML.jpg)


    **图 10-37** – Azure 机器学习设计器 – 评估模型可视化


    结果显示 `Score Model` 结果可视化，展示了不同属性及其评分标签（例如，他们的收入是高于还是低于 50,000 美元）。见图 10-38。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig38_HTML.jpg](img/499686_1_En_10_Fig38_HTML.jpg)


    **图 10-38** – Azure 机器学习设计器 – 评分模型结果可视化


    您还可以查看模型的准确率、精确率召回率、提升度和混淆矩阵（见图 10-39）。在本例中，模型准确率约为 85%。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig39_HTML.jpg](img/499686_1_En_10_Fig39_HTML.jpg)


    **图 10-39** – Azure 机器学习设计器 – 评估模型结果可视化


    在这种低代码、基于设计器的拖放方法中，您可以用最少的编码更快地获得结果。对于希望无需投入大量精力即可在给定数据集上进行实验的公民数据科学家、有潜力的数据科学家和机器学习工程师来说，这是一个合适的
    IDE。

    '
- fmt: '## Conclusion and Summary


    You have made it to the end of this book. We hope it was a meaningful journey
    for you, and it was helpful to your goals of learning and exploring the Azure
    Cognitive Services and Azure Machine Learning landscape.


    In this final chapter, you’ve learned about Azure Machine Learning offerings,
    beyond Cognitive Services, getting started with Azure Machine Learning, and the
    machine learning services ecosystem. You have configured, built, deployed, and
    tested a classification model by using Azure Machine Learning Jupyter notebook.
    You explored capabilities such as collaborative notebooks, machine learning operations,
    reinforcement learning, automated ML, data labeling, and autoscaling compute.


    Now you can apply the knowledge you have learned into real-world projects. The
    best way to learn these new, ever-changing, and nuanced technologies is to start
    working with them. Like AI and machine learning as a discipline, Azure Machine
    Learning is constantly evolving and adding new capabilities, features, and skills.
    Today is a good day to start (or to continue learning).


    Happy machine learning!'
