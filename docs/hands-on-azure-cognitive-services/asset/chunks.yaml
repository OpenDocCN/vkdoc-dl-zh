    choice. Click **File**, **Export**, and then **Export as WAV** (as shown in Figure
    [5-21](#499686_1_En_5_Chapter.xhtml#Fig21)). After that, a new dialog box appears.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig21_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig21_HTML.jpg)


    Figure 5-21


    Exporting as a WAV file


    Open the Advanced Mixing Options^([^(15)](#fn15)), and then drag the output channel
    slider to 8, as shown in Figure [5-22](#499686_1_En_5_Chapter.xhtml#Fig22).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig22_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig22_HTML.jpg)


    Figure 5-22


    Advanced Mixing Options


    Link all the channels to user 1, except for Channel 8 (as shown in Figure [5-23](#499686_1_En_5_Chapter.xhtml#Fig23)).
    Then click **OK**. Do the same step for the conversation file of your recorded
    files, to meet the specification.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig23_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig23_HTML.jpg)


    Figure 5-23


    Linking the channels


    Next, in the config file, add the file path accordingly, as shown in Figure [5-24](#499686_1_En_5_Chapter.xhtml#Fig24).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig24_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig24_HTML.jpg)


    Figure 5-24


    Modifying the config file


    Click the **Start** button to build and run the project (as shown in Figure [5-25](#499686_1_En_5_Chapter.xhtml#Fig25)).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig25_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig25_HTML.jpg)


    Figure 5-25


    The program running and transcribing the text


    Upon a successful build and execution of the program, a console window will open
    up, showing the transcribed text as present in the audio file that you recorded.


    There is a variety of practical applications that you can use for this transcription,
    from converting call center audio recordings into textual data for analytics to
    creating video subtitles. You might have already seen and used Microsoft Teams,
    Skype, and Zoom to create subtitles for taking notes, based on audio conversations.
    These transcriptions aren’t perfect, but they are definitely getting better. Imagine
    performing a real-time escalation analysis, by combining the sentiment analysis
    of text APIs with the speech transcripts. Wouldn’t that be an excellent way to
    analyze how an irate customer’s call should be handled, in order to provide the
    best possible customer experience?


    Now that you know how to create a speech solution in your own application, by
    using the Speech SDK and Azure Cognitive Services, what business problem would
    you want to solve? The possibilities are limitless.'
  trans: '

    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig11_HTML.jpg](img/499686_1_En_5_Fig11_HTML.jpg)


    **图 5-11** Azure 语音服务 – 填充密钥和服务区域


    > *不建议在代码中直接使用密钥。安全的方式是使用密钥保管库或系统变量。*


    此语音签名样本用于检测到的语音。每个样本的建议长度为三十秒到两分钟。认知服务期望一个 `.wav` 文件，该文件应使用支持的设备（8 通道、16kHz、16
    位 PCM）捕获。要创建此 WAV 文件，请打开 Windows 语音录音机或您选择的音频录音机。此处，我们使用的是 Windows 语音录音机，如图 5-12
    所示。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig12_HTML.jpg](img/499686_1_En_5_Fig12_HTML.jpg)


    **图 5-12** 打开 Windows 语音录音机


    开始录制用户 1 的语音。然后，单独录制用户 2 的语音。这为语音服务提供了您用户语音的签名。见图 5-13。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig13_HTML.jpg](img/499686_1_En_5_Fig13_HTML.jpg)


    **图 5-13** 录制对话的音频文件


    您也可以录制一个用户 1 和用户 2 之间的单一对话文件。我们录制的三个音频文件见图 5-14。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig14_HTML.jpg](img/499686_1_En_5_Fig14_HTML.jpg)


    **图 5-14** 录制的音频文件


    此时，我们有了三个 `.wav` 文件。如果您按照给定的规格^((13))创建了语音，则将文件路径放入程序并继续构建。否则，请按照以下步骤获取正确格式的文件。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig15_HTML.jpg](img/499686_1_En_5_Fig15_HTML.jpg)


    **图 5-15** 在 Audacity 中打开文件


    1.  打开 Audacity^((14)) 并导航到您录制的 `.wav` 文件。见图 5-15。Audacity 是一款免费、开源、跨平台的音频软件，可用于将音频文件转换为多种格式。


    如图 5-16（通过红色箭头所示）所示，我们录制的文件不符合要求的规格。因此，我们需要修改格式。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig16_HTML.jpg](img/499686_1_En_5_Fig16_HTML.jpg)


    **图 5-16** Audacity 中的格式详情


    要编辑文件格式，右键单击音轨，选择**格式**，然后将其更改为**16 位 PCM**（如图 5-17 所示）。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig17_HTML.jpg](img/499686_1_En_5_Fig17_HTML.jpg)


    **图 5-17** 在 Audacity 中更改格式


    同时，更改采样率。右键单击音轨，选择**采样率**，然后点击**16000 Hz**（如图 5-18 所示）。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig18_HTML.jpg](img/499686_1_En_5_Fig18_HTML.jpg)


    **图 5-18** 在 Audacity 中更改采样率


    接下来，要将文件从立体声转换为单声道，在顶部文件菜单中，点击**音轨**，选择**混音**，然后点击**将立体声混音为单声道**。见图 5-19。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig19_HTML.jpg](img/499686_1_En_5_Fig19_HTML.jpg)


    **图 5-19** 在 Audacity 中更改混音


    此时，文件将如图 5-20 所示。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig20_HTML.jpg](img/499686_1_En_5_Fig20_HTML.jpg)


    **图 5-20** Audacity 中的文件格式更改


    接下来，将文件导出为 WAV 格式，然后保存到您选择的目录。点击**文件**、**导出**，然后**导出为 WAV**（如图 5-21 所示）。之后，会出现一个新的对话框。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig21_HTML.jpg](img/499686_1_En_5_Fig21_HTML.jpg)


    **图 5-21** 导出为 WAV 文件


    打开**高级混音选项**^((15))，然后将输出通道滑块拖到 8，如图 5-22 所示。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig22_HTML.jpg](img/499686_1_En_5_Fig22_HTML.jpg)


    **图 5-22** 高级混音选项


    将所有通道链接到用户 1，通道 8 除外（如图 5-23 所示）。然后点击**确定**。对您录制的对话文件执行相同步骤，以满足规格要求。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig23_HTML.jpg](img/499686_1_En_5_Fig23_HTML.jpg)


    **图 5-23** 链接通道


    接下来，在配置文件中，相应地添加文件路径，如图 5-24 所示。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig24_HTML.jpg](img/499686_1_En_5_Fig24_HTML.jpg)


    **图 5-24** 修改配置文件


    点击**启动**按钮以构建并运行项目（如图 5-25 所示）。


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig25_HTML.jpg](img/499686_1_En_5_Fig25_HTML.jpg)


    **图 5-25** 程序运行并转录文本


    成功构建并执行程序后，将打开一个控制台窗口，显示您录制的音频文件中存在的转录文本。


    此转录有许多实际应用，从将呼叫中心录音转换为用于分析的文字数据，到创建视频字幕。您可能已经见过并使用过 Microsoft Teams、Skype 和 Zoom，它们基于音频对话创建用于记笔记的字幕。这些转录并非完美无缺，但确实在变得越来越好。想象一下，通过将文本
    API 的情感分析与语音转录相结合，进行实时升级分析。这难道不是分析如何处理愤怒客户来电、以提供最佳客户体验的绝佳方式吗？


    既然您已经知道如何使用语音 SDK 和 Azure 认知服务在您自己的应用程序中创建语音解决方案，那么您想解决什么业务问题呢？可能性是无限的。

