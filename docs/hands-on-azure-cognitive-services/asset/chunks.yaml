  trans: '

    1.  打开 Visual Studio（如图 4-10 所示），然后从 GitHub 上的 [`https://github.com/microsoft/AzureSearch_JFK_Files`](https://github.com/microsoft/AzureSearch_JFK_Files)
    克隆存储库。


    点击**文件**选项卡，点击**打开**，然后点击**项目/解决方案**（如图 4-11 所示）。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig11_HTML.jpg](img/499686_1_En_4_Fig11_HTML.jpg)


    图 4-11


    打开项目


    克隆存储库后，从 **JfkWebApiSkills** Visual Studio 解决方案文件中打开项目目录（如图 4-12 所示）。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig12_HTML.jpg](img/499686_1_En_4_Fig12_HTML.jpg)


    图 4-12


    打开 JfkWebApiSkills 解决方案文件


    接下来，在解决方案资源管理器中，编辑 **App.config** 文件（如图 4-13 所示）。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig13_HTML.jpg](img/499686_1_En_4_Fig13_HTML.jpg)


    图 4-13


    选择 App.config 文件


    现在，点击 Azure 控制台中的**输出**选项卡，如图 4-14 所示。该选项卡在模板的部署屏幕中可用。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig14_HTML.jpg](img/499686_1_En_4_Fig14_HTML.jpg)


    图 4-14


    输出选项卡


    然后您将看到模板信息，其中包含所有密钥和字符串（如图 4-15 所示）。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig15_HTML.jpg](img/499686_1_En_4_Fig15_HTML.jpg)


    图 4-15


    模板输出屏幕


    将除 `SearchServiceQueryKey` 之外的值复制并粘贴到配置密钥设置中。参见图 4-16。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig16_HTML.jpg](img/499686_1_En_4_Fig16_HTML.jpg)


    图 4-16


    在应用配置文件中粘贴值


    您需要从已部署的部分获取 `SearchServiceQueryKey` 值。对于部署，点击**概述**选项卡，如图 4-17 所示。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig17_HTML.jpg](img/499686_1_En_4_Fig17_HTML.jpg)


    图 4-17


    获取 SearchServiceQueryKey 值


    选择已部署的服务（如图 4-18 所示），然后点击右侧的**操作详细信息**。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig18_HTML.jpg](img/499686_1_En_4_Fig18_HTML.jpg)


    图 4-18


    选择已部署的服务


    在详细信息屏幕中，点击左侧菜单中“设置”下的**密钥**（如图 4-19 所示）。复制 `SearchServiceQueryKey` 值，然后将其粘贴到应用程序配置文件中。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig19_HTML.jpg](img/499686_1_En_4_Fig19_HTML.jpg)


    图 4-19


    密钥选项


    现在构建 API 解决方案，这将创建应用程序密钥（如图 4-20 所示）。在您接下来运行 `npm` 步骤后，您将回到此窗口。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig20_HTML.jpg](img/499686_1_En_4_Fig20_HTML.jpg)


    图 4-20


    在 API 解决方案中设置密钥


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig21_HTML.jpg](img/499686_1_En_4_Fig21_HTML.jpg)


    图 4-21


    将目录更改为下载的文件夹


    1.  下一步是构建 Web 应用程序，该应用程序使用 Node.js 构建。打开 Node.js 命令提示符，并导航到前端文件夹。参见图 4-21。


    运行 `npm install` 命令来构建应用程序（如图 4-22 所示）。它将获取所有依赖项。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig22_HTML.jpg](img/499686_1_En_4_Fig22_HTML.jpg)


    图 4-22


    运行命令 npm install


    `npm install` 完成后，运行 `npm run build:prod` 命令来运行 Web 应用程序，该命令将构建并部署 Web 应用程序。参见图
    4-23。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig23_HTML.jpg](img/499686_1_En_4_Fig23_HTML.jpg)


    图 4-23


    运行命令 npm run build:prod


    接下来，返回到步骤 3（概述）中的上一个屏幕，然后按任意键完成构建（如图 4-24 所示）。然后导航到控制台中的 URL，以打开 Web 应用程序。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig24_HTML.jpg](img/499686_1_En_4_Fig24_HTML.jpg)


    图 4-24


    返回上一个屏幕以完成构建


    构建和部署现已完成，可以访问关联的 JFK Files 应用程序，如图 4-25 所示。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig25_HTML.jpg](img/499686_1_En_4_Fig25_HTML.jpg)


    图 4-25


    在 JFK Files 应用中搜索


    在这里，您可以搜索一个词条，例如“security”，并查看来自手写笔记图像以及键入的 PDF 文件的相关结果。它会在左侧窗格中显示关联的实体，在主窗口中显示包含该词条的文档（如图
    4-26 所示）。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig26_HTML.jpg](img/499686_1_En_4_Fig26_HTML.jpg)


    图 4-26


    JFK Files 应用搜索结果


    至此，JFK Files 应用程序的安装、配置和运行就完成了。令人印象深刻的是，如何使用 Azure 认知服务、Azure 搜索、计算机视觉 API（使用文本识别
    API 进行 OCR）、文本分析 API 和自定义技能来对与 JFK 遇刺相关的 34,000 页文件进行编目和解释。这些功能被用来构建一个复杂的认知搜索解决方案。它甚至可以关联和搜索
    CIA 的密语，例如 GPFLoor 到 Oswald^(⁶)。


    JFK Files 并非徒劳无功的假设性练习，而是一个针对企业数据的现实解决方案，这些数据大多是非结构化的，以多种格式存在，并来自各种类型的数据源。通过应用和修改
    JFK 解决方案中规定的自然语言处理管道，您可以轻松地将其用于各种满足类似条件的企业解决方案。在下一个示例中，我们将探讨 Transformer 语言模型。

    '
- fmt: '# The Muppet Models – Transformers for NLP


    No discussion in natural language processing, especially around unstructured text
    and models, is complete without the mention of `BERT`, `ELmo`, `Grover`, `RoBERTa`,
    `ERNIEs`, and a `KERMIT`. It is not because the ACL (Association for Computational
    Linguistics) flagship conference was somehow co-located with a Sesame Street convention
    (where Big Bird definitely did not give a memorable keynote speech), but it’s
    because when language model papers introduced Sesame Street-related acronyms,
    the inside joke kind of got out of hand (and many people started contributing
    to the bad joke).


    An overview of transformer models and their intricate details would require a
    chapter of its own, but in brevity, the table in Figure [4-27](#499686_1_En_4_Chapter.xhtml#Fig27)
    shows an overview of some of the popular Muppet models.


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig27_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig27_HTML.jpg)


    Figure 4-27


    A table with some popular Muppet models


    ## Named Entity Recognition with Fine-Tuned BERT


    Named entity recognition (NER) is one of the key capabilities of any natural language
    processing system, and therefore it’s among the fundamental features offered by
    language models. It is the capability of extracting entities from unstructured
    datasets, such as geographical entities (city, country, and so on), organizational
    entity (the name of an organization), personal entity (names and identifiers associated
    with people), geopolitical entity (countries, organizations), time, event, natural
    phenomenon, seasonality (holidays), custom entities, and so on.


    In this example, we will use `PyTorch Pretrained BERT` on `Azure ML`, for named
    entity recognition. We will use `Google Colaboratory`, a free tool for running
    `Jupyter` notebooks. (It’s often called `Google Colab`. The name is a pun that
    mixes the words *laboratory* and *collaboration*.) However, you can also complete
    the same exercise on your local machine via `Anaconda` or on `Azure Machine Learning`
    via `Azure` notebooks.


    Use the following steps to complete this example.


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig28_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig28_HTML.jpg)


    Figure 4-28


    Opening the BERT NER colab with Azure ML


    1.  Open the `Jupyter` notebook in `Colab` from [`https://github.com/microsoft/AzureML-BERT/blob/master/finetune/PyTorch/notebooks/Pretrained-BERT-NER.ipynb`](https://github.com/microsoft/AzureML-BERT/blob/master/finetune/PyTorch/notebooks/Pretrained-BERT-NER.ipynb)
    (as shown in Figure [4-28](#499686_1_En_4_Chapter.xhtml#Fig28)).


    Populate your subscription ID and resource group information. You would also need
    to perform the interactive authentication by opening the browser and entering
    the provided code. See Figure [4-29](#499686_1_En_4_Chapter.xhtml#Fig29).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig29_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig29_HTML.jpg)


    Figure 4-29


    Populating your information


    You now need to initialize the workspace and install the `Azure ML SDK` for notebooks
    (as shown in Figure [4-30](#499686_1_En_4_Chapter.xhtml#Fig30)).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig30_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig30_HTML.jpg)


    Figure 4-30


    Installing the Azure ML SDK for notebooks


    The next step is to create (or use) a compute cluster target for execution. In
    this case, we chose a standard single GPU `NC_6` VM, while our region is set to
    western United States. See Figure [4-31](#499686_1_En_4_Chapter.xhtml#Fig31).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig31_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig31_HTML.jpg)


    Figure 4-31


    Creating a compute cluster


    However, we ran into an error! You learn more from your mistakes than if everything
    works smoothly. In this case, `NC6` type VM is not available in the region. You
    will see the error message, “`STANDARD_NC6` is not supported in region `westus`.
    Please choose a different VM size.” (See Figure [4-32](#499686_1_En_4_Chapter.xhtml#Fig32).)


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig32_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig32_HTML.jpg)


    Figure 4-32


    ComputeTarget creation error


    It is important to note that all the compute types are not available in all the
    regions, and therefore, it’s important to choose the right region. You can read
    more about regions and VMs at [`https://docs.microsoft.com/azure/virtual-machines/regions`](https://docs.microsoft.com/azure/virtual-machines/regions)
    (on Microsoft Docs).


    To fix this issue, go to the Azure console, and change the region to the eastern
    United States by creating a new workspace in eastern United States, where the
    VM is available. Now you can successfully create the compute target, as shown
    in Figure [4-33](#499686_1_En_4_Chapter.xhtml#Fig33).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig33_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig33_HTML.jpg)


    Figure 4-33


    ComputeTarget creation successful'
