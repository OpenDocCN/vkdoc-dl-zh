    This concludes our coverage of the Anomaly Detector service. There is a lot more
    information about Anomaly Detector that you can read in Microsoft Docs, at [`https://docs.microsoft.com/en-us/azure/cognitive-services/anomaly-detector`](https://docs.microsoft.com/en-us/azure/cognitive-services/anomaly-detector).


    ## Metrics Advisor (Preview)


    One of the newest members of Azure Cognitive Services is Metrics Advisor (see
    [`https://azure.microsoft.com/en-us/services/cognitive-services/metrics-advisor`](https://azure.microsoft.com/en-us/services/cognitive-services/metrics-advisor)).
    It is a special case of outlier analysis services. Metrics Advisor is in preview
    at the time of this writing, which means the screens and underlying services may
    change. Metrics Advisor is a cognitive service that helps monitor different metrics,
    and it assists with root cause analysis. The workflow steps are shown in Figure
    [6-60](#499686_1_En_6_Chapter.xhtml#Fig60).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig60_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig60_HTML.jpg)


    Figure 6-60


    Metrics Advisor workflow, courtesy Microsoft Docs


    Applying AI and machine learning to operations is an area of tremendous interest.
    In fact, it brought about a whole new subfield in IT operations, called AIOps.
    That’s where AI techniques are used for data ingestion, from a variety of event
    management systems, performing anomaly detection, and respective diagnostics.
    Metrics Advisor is used to correlate and analyze data from multiple sources. It
    then diagnoses anomalies and the associated root causes. Unlike the Anomaly Detector
    service, Metrics Advisor doesn’t only focus on outlier detection, but it also
    helps with the root cause analysis and with incident alert management.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig61_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig61_HTML.jpg)


    Figure 6-61


    Metrics Advisor console – setup


    1.  Like all of Cognitive Services, we start by creating a Metrics Advisor instance
