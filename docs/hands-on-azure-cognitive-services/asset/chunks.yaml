    现在我们需要为目录中的电影创建一个 `RankableAction` 列表。可以将其视为对数据集中属性和特征的预训练。可排序操作接收一个对象列表，这些对象可以是你的产品、新闻文章或购物车商品。然后，它会根据模型应用排序和奖励函数。在本例中，我们的
    `RankableAction` 列表如下所示（为简洁起见已做删减）：


    ```

    IList actions = new List

    {

    new RankableAction

    {

    Id = "Interstellar",

    Features =

    new List

    {

    new

    {

    imdb = 8.6, rottentomatoes = 72, popularityFeature = "blockbuster",

    genreFeature = "scifi", plot = "time paradox"

    }

    }

    },

    new RankableAction

    {

    Id = "Gattaca",

    Features = new List

    {

    new

    {

    imdb = 7.8, rottentomatoes = 82, popularityFeature = "cult-classic", genreFeature
    = "scifi",

    plot = "genetic profiling"

    }

    }

    },

    };

    ```


    这是 `IList<RankableAction> GetActions()` 方法的一部分。另外两个方法是 `GetPopularityFeatures()`
    和 `GetGenrePreferences()`，如图 6-40 和 6-41 所示。


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig42_HTML.jpg](img/499686_1_En_6_Fig42_HTML.jpg)


    图 6-42


    个性化服务 – 设置模型更新和奖励频率


    1. 现在我们已经设置了流派，并用一些电影来训练初始模型，可以开始调用服务了。但在那之前，让我们将奖励函数的等待时间设置为五秒，这样可以更快地重新训练模型。如此快速地重新训练可能会带来性能损失，但对于这个示例来说，这种影响可以忽略不计。你可以通过主控制台菜单左侧窗格中的**模型和学习设置**访问以下屏幕。设置奖励等待时间，然后将模型更新频率设置为五秒。参见图
    6-42。


    2. 要启动排序和奖励流程，你可以按 `F5` 运行程序。完整的代码列表包含在本书 Personalizer 仓库的 `program.cs` 文件中。我们将逐步讲解代码的重要部分。


    首先，通过以下代码行从用户那里获取上下文信息，例如流行度特征和电影流派偏好：


    ```

    var popularityFeatures = GetPopularityFeatures();

    var genreFeatures = GetGenrePreferences();

    ```


    接下来，根据用户数据创建一个当前上下文，作为一个对象列表。参见以下代码：


    ```

    IList currentContext = new List

    {

    new {popularity = popularityFeatures},

    new {genre = genreFeatures}

    };

    ```


    你还可以创建一个排除操作列表，即你希望排除在排序考虑之外的任何属性。在本例中，我们没有需要排除的属性，因此将其留空，如下所示：


    ```

    IList excludeActions = new List {""};

    ```


    现在，我们生成一个事件 ID 来关联请求，如下所示：


    ```

    var eventId = Guid.NewGuid().ToString();

    ```


    然后，我们继续对操作进行排序。`RankRequest()` 方法接收操作、上下文和排除操作，然后进行服务调用。这个调用可以是你现有任何工作流程的一部分，例如无限滚动、提供电影推荐、为新客户生成优惠等。参见以下代码：


    ```

    var request = new RankRequest(actions, currentContext, excludeActions, eventId);

    var response = client.Rank(request);

    ```


    你得到的响应包含一个奖励操作 ID。请记住，这是基于之前设置的 `RankableAction`，因此在我们的例子中，它将是一个电影推荐。参见以下代码行：


    ```

    Console.WriteLine("\nPersonalizer service thinks you would like to have: " + response.RewardActionId
    +". Is this correct? (y/n)");

    ```


    在这里，你进行调用。如果你喜欢这个推荐，你可以相应地调整奖励，模型就会学习，如下所示：


    ```

    if (answer == "Y")

    {

    reward = 1;

    Console.WriteLine("\nGreat! Enjoy your movie.");

    }

    else if (answer == "N")

    {

    reward = 0;

    Console.WriteLine("\nYou didn''t like the recommended movie choice.");

    }

    ```


    你还可以在响应对象中获得所有其他操作及其对应的概率。参见以下代码：


    ```

    Console.WriteLine("\nPersonalizer service ranked the actions with the probabilities
    as below:");

    foreach (var rankedResponse in response.Ranking)

    Console.WriteLine(rankedResponse.Id + " " + rankedResponse.Probability);

    // Send the reward for the action based on user response.

    client.Reward(response.EventId, new RewardRequest(reward));

    ```


    接下来，你发送奖励以进行重新训练。该过程会持续学习、探索、利用和重新训练，形成一个循环，直到你退出。这个循环类似于你的电子商务网站运行推荐系统的方式。


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig43_HTML.jpg](img/499686_1_En_6_Fig43_HTML.jpg)


    图 6-43


    个性化服务 – 排序和奖励演示


    3. 现在你可以运行这个程序来查看代码的实际效果。它会询问流行度特征和流派，然后列出推荐的电影。在数据有限的冷启动阶段，所有产品的概率是平均分配的。随着个性化引擎的学习，概率会发生变化。参见图
    6-43。


    如图 6-43 的结果所示，*星际穿越* 是概率最高的推荐电影，而其余项目则显示其各自的排名。训练有多种方式。其中包括学徒模式，你可以在不影响生产应用程序的情况下训练个性化服务。了解如何使用学徒模式训练个性化服务，请访问
    [`https://docs.microsoft.com/en-us/azure/cognitive-services/personalizer/concept-apprentice-mode`](https://docs.microsoft.com/en-us/azure/cognitive-services/personalizer/concept-apprentice-mode)。你还可以根据用户的属性构建特征类型，为其创建特定的用户画像。然后，你可以相应地自定义奖励函数。


    非常重要的一点是，最终的推荐并不总是基于最高排名。这个概念被称为探索与利用的权衡。例如，你可能喜欢恐怖片，但如果我只是一遍又一遍地推荐《驱魔人》，你肯定会错过恐怖片的所有其他子类型，比如鬼怪、怪物、超自然活动和吵闹鬼。因此，在搜索空间中平衡探索和利用非常重要。你应该在更广泛的推荐和利用奖励函数（即根据以往行为最大化奖励）之间取得平衡。这种方法用于扩展模型的视野。你可以通过以下链接了解更多关于如何使用异常检测器服务实现这一点的信息：[`https://docs.microsoft.com/en-us/azure/cognitive-services/anomaly-detector/overview`](https://docs.microsoft.com/en-us/azure/cognitive-services/anomaly-detector/overview)。


    在下一次迭代中，我向推荐系统请求了一部独立科幻电影，得到了《这个男人来自地球》，这又是一个不错的推荐，尽管它并不是评分最高的（如图 6-44 所示）。


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig44_HTML.jpg](img/499686_1_En_6_Fig44_HTML.jpg)


    图 6-44


    个性化服务 – 排序和奖励演示

    '
- fmt: 'Remember that next time when you see a seemingly unrelated product, it is
    the algorithm experimenting to broaden its reinforcement learning boundaries.
    Without that, you would not be exposed to the horror subgenres of zombies, dystopian
    or apocalyptic worlds, and serial killers.


    This example concludes our overview of the `Personalizer` service. As you can
    imagine, `Personalizer` and recommendation systems are everywhere, to capture
    our attention and to try to understand us better on a personal level. These algorithms
    are getting really good at it, and as you build your own solution, make sure you
    consider the ethical ramifications associated with it. Microsoft has provided
    a sample set of guidelines for responsible implementation of `Personalizer` at
    [`https://docs.microsoft.com/en-us/azure/cognitive-services/personalizer/ethics-responsible-use`](https://docs.microsoft.com/en-us/azure/cognitive-services/personalizer/ethics-responsible-use).
    We highly recommended reading this for everyone building personalization tools
    and algorithms, either with custom algorithms or via `Personalizer` and other
    personalization services.


    In the next section, we will review the `Anomaly Detector` service.


    ## Anomaly Detector Service


    Anomalies or outliers are deviations from the usual trends of data. These deviations
    can be just noise or may hide some very interesting aspects within these unusual
    data points. This is why finding anomalies has been a topic of significant interest
    in retail, financial services, healthcare, manufacturing, and cybersecurity verticals.
    By incorporating historical data, seasonality, and consumer behavioral profiling,
    effective anomaly detection systems provide greater insights into behaviors that
    pose a risk to a business or that provide new opportunities for the business.


    Simplistic statistical approaches to anomaly detection are typically based on
    distance-based measures. For example, one approach is to find out how far the
    data point in question is from the existing distribution, which determines if
    this is just noise, error in measurement, or something more interesting. The approaches
    can be roughly classified as predictive-confidence-based approaches, statistical
    approaches, and clustering-based approaches.


    For example, a customer who typically spends only $500 a month on groceries and
    in supermarkets suddenly doubled his expenditure in March 2020. This outlier gets
    flagged, but a more sophisticated model will realize that this pattern is emerging
    globally and is in line with a COVID-19 spending uptick and toilet-paper hoarding.
    Incorporating seasonality helps make a robust and adjustable model.


    For another example, your bank notices a $100 charge on your card for Robux or
    V-Bucks. Because there is no previous history of this level of expenditure of
    in-game currency, they know that either somehow your kids have cajoled you into
    buying them these virtual dollars for their games, or someone is misusing your
    card. These different types of outliers help identify interesting patterns in
    data and are very helpful to understand consumer behaviors.


    Typical approaches used to determine outliers include `z-score` (the deviation
    from the mean value) or extreme value analysis (EVA), linear regression models
    (such as principal component analysis or least median of square), proximity-based
    models, information theoretical approaches, or high-dimensional sparse models.
    Anomaly detection is nuanced, and the `Anomaly Detector` service abstracts out
    the details by allowing you to pass the time series data and to identify abnormal
    behaviors among these data points in an automated manner. The service API provides
    information about expected value and detects which data points are anomalies (as
    we will see shortly).


    ### How it works


    The explanation is an abstract from the paper “Time-Series Anomaly Detection Service
    at Microsoft,” by Ren et al. The white paper outlines the algorithms behind a
    “time-series anomaly detection service that helps customers monitor the time-series
    continuously and alert for potential incidents on time. In this paper, we introduce
    the pipeline and algorithm of our anomaly detection service, which is designed
    to be accurate, efficient, and general. The pipeline consists of three major modules,
    including data ingestion, experimentation platform, and online compute. To tackle
    the problem of time-series anomaly detection, we propose a novel algorithm, based
    on Spectral Residual (SR) and Convolutional Neural Network (CNN). Our work is
    the first attempt to borrow the SR model from visual saliency detection domain
    to time-series anomaly detection. Moreover, we combine SR and CNN together to
    improve the performance of the SR model. Our approach achieves superior experimental
    results, compared with state-of-the-art baselines on both public datasets and
    Microsoft production data.” The paper can be downloaded from [`https://arxiv.org/abs/1906.03821`](https://arxiv.org/abs/1906.03821).


    Microsoft provides an excellent `Anomaly Detector` demo ([`https://algoevaluation.azurewebsites.net/`](https://algoevaluation.azurewebsites.net/))
    to help you understand how this service identifies anomalies from time series
    data. The API operates on both batch and streaming data, and it identifies the
    deviations from the normal pattern of events. There are three data samples available.
    One sample includes seasonality built in, for you to try out different scenarios
    and discover outliers with different parameters. You can see the demo in action,
    in Figure [6-45](#499686_1_En_6_Chapter.xhtml#Fig45).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig45_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig45_HTML.jpg)


    **Figure 6-45** Anomaly Detector demo'
