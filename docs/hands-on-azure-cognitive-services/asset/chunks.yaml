    Then navigate to the URL in the console, to open the web application.


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig24_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig24_HTML.jpg)


    Figure 4-24


    Returning to the previous screen to complete the build


    The build and deployment are now complete, and the associated JFK Files application
    can be accessed, as shown in Figure [4-25](#499686_1_En_4_Chapter.xhtml#Fig25).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig25_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig25_HTML.jpg)


    Figure 4-25


    Searching in the JFK Files app


    Here, you can search for a term, like “security,” and see the associated results
    from the images of handwritten notes, as well as the typed PDF files. It shows
    the associated entities on the left pane and the documents containing the terms
    in the main window (as shown in Figure [4-26](#499686_1_En_4_Chapter.xhtml#Fig26)).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig26_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig26_HTML.jpg)


    Figure 4-26


    The JFK Files app search results


    This concludes the installation, configuration, and running the JFK Files application.
    It is very impressive to see how 34,000 pages related to the JFK assassination
    were catalogued and interpreted, using Azure Cognitive Services, Azure Search,
    Computer Vision API (which uses text recognition APIs for OCR), Text Analytics
    API, and Custom Skills. These features were used to build a complex cognitive
    search solution. It can even correlate and search on CIA’s cryptonyms, such as
    GPFLoor to Oswald^([⁶](#fn6)).


    JFK Files is not a hypothetical exercise in futility, but a realistic solution
    for enterprise data that is largely unstructured, that exists in multiple formats,
    and that comes from all types of data sources. By applying and modifying the natural
    language processing pipeline prescribed in the JFK solution, you can easily use
    it for a variety of enterprise solutions, where similar conditions are met. In
    the next example, we will explore the transformer language models.'
