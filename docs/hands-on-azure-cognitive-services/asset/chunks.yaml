    \ of creating an anomaly detection service, but it’s pretty much identical to\
    \ what we have done earlier with the language service. Once an instance is created,\
    \ we would use it in the Docker run command.\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig14_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig14_HTML.jpg)\n\
    \nFigure 8-14\n\nThe application starts serving\n\n1.  Run the following command\
    \ to create an Anomaly Detector Docker container. This will pull down the latest\
    \ container and connect the service to the Azure portal for billing.\n\n```\n\
    \    docker run --rm -it -p 5000:5000 --memory 4g --cpus 1 \\\n    mcr.microsoft.com/azure-cognitive-services/decision/anomaly-detector:latest\
    \ \\\n    Eula=accept \\\n    Billing='https://haystackneedleanomalydetector.cognitiveservices.azure.com/'\
    \ \\\n    ApiKey='83c02850ba4b402f819c0f2f87f71b86'\n    ```\n\nYou would then\
    \ see the screenshots shown in Figure [8-14](#499686_1_En_8_Chapter.xhtml#Fig14),\
    \ as the application starts serving on the `http://localhost:5000` URL.\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig15_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig15_HTML.jpg)\n\
    \nFigure 8-15\n\nThe welcome screen\n\n1.  As shown in the language detection\
    \ example earlier, you can access the Cognitive Services container at `http://localhost:5000`\
    \ and see the welcome screen shown in Figure [8-15](#499686_1_En_8_Chapter.xhtml#Fig15).\
    \ This screen is consistent across the Cognitive Services.\n\nNext, you will see\
    \ the Swagger page for the APIs and invoke them directly from the UI, or via an\
    \ application (see Figure [8-16](#499686_1_En_8_Chapter.xhtml#Fig16)).\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig16_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig16_HTML.jpg)\n\
    \nFigure 8-16\n\nThe Swagger page\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig17_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig17_HTML.jpg)\n\
    \nFigure 8-17\n\nAnaconda Navigator\n\n1.  For this example, we will run a local\
    \ instance of Jupyter notebook using Anaconda, and we’ll run the sample notebook\
    \ we used in Chapter [6](#499686_1_En_6_Chapter.xhtml). The repository can be\
    \ cloned from [`https://github.com/Azure-Samples/AnomalyDetector`](https://github.com/Azure-Samples/AnomalyDetector).\
    \ Start the JupyterLab from Anaconda Navigator (as shown in Figure [8-17](#499686_1_En_8_Chapter.xhtml#Fig17)),\
    \ and then navigate to the point anomaly detection notebook.\n\nOpen the notebook,\
    \ and then populate the API key and endpoint with the API key from the anomaly\
    \ detection service and with the URL http://localhost:8888 to the local anomaly\
    \ detection container instance. See Figure [8-18](#499686_1_En_8_Chapter.xhtml#Fig18).\n\
    \n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig18_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig18_HTML.jpg)\n\
    \nFigure 8-18\n\nLatest point anomaly detection\n\nThe first cell should look\
    \ like the cell in Figure [8-19](#499686_1_En_8_Chapter.xhtml#Fig19).\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig19_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig19_HTML.jpg)\n\
    \nFigure 8-19\n\nAnomaly Detector resource access key\n\nNow, when you invoke\
    \ the further cells to run the example, you will see similar results as shown\
    \ in Chapter [6](#499686_1_En_6_Chapter.xhtml). See Figure [8-20](#499686_1_En_8_Chapter.xhtml#Fig20).\
    \ The difference being that the code is now running locally on your machine via\
    \ the Cognitive Services container.\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig20_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig20_HTML.jpg)\n\
    \nFigure 8-20\n\nAnomaly Detection Result\n\nWith these two examples, you saw\
    \ how easy it is to run Cognitive Services containers locally, using Docker. Now\
    \ we will use the cloud-based approaches of ACI and AKS to host these containers."
