    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig6_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    QnA Maker – creating a knowledge base


    1. In order to get the QnA Bot working, we need to create a Q&A knowledge base
    (KB). This knowledge base can be created here. Visit QnA Maker at [`www.qnamaker.ai/Create`](http://www.qnamaker.ai/Create),
    and log in, using your Azure account to see the screenshot shown in Figure [9-6](#499686_1_En_9_Chapter.xhtml#Fig6).
    Click `Create a QnA service`.


    1. You will then see the Cognitive Services Create screen. QnA Maker is a cloud-based
    service to build conversational UI. Fill the following form (opens a new window
    of portal to create QnA Maker) with your subscription, resource group, and application
    service details. Click `Review + create` to continue.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig7_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    Azure portal – creating Cognitive Services


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig8_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Azure portal – Cogntive Services deployment completion


    1. Once the service is created and deployed, you will see the screen shown in
    Figure [9-8](#499686_1_En_9_Chapter.xhtml#Fig8). Then proceed to the next level
    in QnA Maker.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig9_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig9_HTML.jpg)


    Figure 9-9


    QnA Maker – connect the QnA service to a knowledge base'
