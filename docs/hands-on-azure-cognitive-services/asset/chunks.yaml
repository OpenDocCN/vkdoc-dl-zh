- fmt: "### Searching with Azure Cognitive Search\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig1_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1: Microsoft Azure Portal Offerings search results\n\n1. In the Azure\
    \ portal, search for `Azure Cognitive Search`, and then click the `Azure Cognitive\
    \ Search` search result, as it appears in the drop-down menu (shown in Figure\
    \ [7-1](#499686_1_En_7_Chapter.xhtml#Fig1)). Select `Azure Cognitive Search`.\n\
    \n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig2_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2: Microsoft Azure Cognitive Search – create offering screen\n\n1.\
    \ The screen in Figure [7-2](#499686_1_En_7_Chapter.xhtml#Fig2) shows all the\
    \ capabilities and features of `Azure Cognitive Search`. As discussed earlier,\
    \ this includes scalability, manageability, feature enrichment (OCR, NER, faceting),\
    \ and custom models. Click `Create` to proceed.\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig3_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3: Azure Cognitive Search – create instance\n\n1. Fill out the information\
    \ to create the service. This includes subscription information, the unique URL,\
    \ resource group, location, and the pricing information (as shown in Figure [7-3](#499686_1_En_7_Chapter.xhtml#Fig3)).\n\
    \nThe following pricing information (Figure [7-4](#499686_1_En_7_Chapter.xhtml#Fig4))\
    \ is for different tiers. It is subject to change and is provided here as a sample\
    \ reference only. Please review the current pricing information before use.\n\n\
    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig4_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4: Azure Cognitive Search – Select Pricing Tier\n\n> **Note:** It is\
    \ important to ensure that your search instance and the `Cognitive Services` instance\
    \ used to enrich the data are in the same region. If you’d like your service to\
    \ be migrated, make sure that the offerings are supported in the target region^([^(17)](#fn17)).\n\
    \n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig5_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5: Azure Cognitive Search – deployment completed\n\n1. You will see\
    \ screen from Figure [7-5](#499686_1_En_7_Chapter.xhtml#Fig5), once you are done\
    \ creating the service. Click `Go to resource` to see the complete dashboard.\n\
    \nThe `Cognitive Services` dashboard (shown in Figure [7-6](#499686_1_En_7_Chapter.xhtml#Fig6))\
    \ includes the details of quotas, service status, location, subscription information,\
    \ location, and usage information. This dashboard comes in quite handy, to monitor\
    \ how storage and indexes perform with additional data sources.\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig6_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6: Azure Cognitive Search – dashboard\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig7_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7: Azure Cognitive Search – Import data\n\n1. Now that we have created\
    \ a search service instance, let’s import some data to be searched. Click `Import\
    \ data` from the top menu in the dashboard, and you will see the screen (as shown\
    \ in Figure [7-7](#499686_1_En_7_Chapter.xhtml#Fig7)) to connect to your data.\
    \ Complete the following four steps:\n   1. Connect to the data source (such as\
    \ `Azure SQL Database`, `SQL Server on Azure VMs`, `Cosmos DB`, `Azure Blob Storage`\
    \ for documents and PDFs, `Azure Data Lake Storage Gen2`, or `Azure Table Storage`).\n\
    \   2. Add Cognitive Skills for enrichment (such as NER, key phrase extraction,\
    \ and so on).\n   3. Customize the Target Instance.\n   4. Finally, create an\
    \ indexer.\n\nTo keep this simple, we will import data from the samples, specifically\
    \ the real estate sample (as shown in Figure [7-8](#499686_1_En_7_Chapter.xhtml#Fig8)).\n\
    \n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig8_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8: Azure Cognitive Search – import the dataset\n\nThe data comes from\
    \ SQL and contains real estate information about homes. The next step is to add\
    \ enrichment or cognitive skills, as shown in Figure [7-9](#499686_1_En_7_Chapter.xhtml#Fig9).\
    \ In this case, we will perform some limited enrichments to recognize the entities.\n\
    \n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig9_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9: Azure Cognitive Search – Add cognitive skills\n\nThe `Cognitive\
    \ Services` enrichments include extracting people, organization, and location\
    \ names, detecting key phrases, and extracting personally identifiable information\
    \ (PII). You can create custom enrichments and add domain-specific skills to recognize\
    \ your industry keywords and phrases. For instance, the `ICD-10-CM/PCS Medical\
    \ Coding Reference` can be mapped to corresponding diagnostic and procedure keywords.\
    \ There is a lot you can do to build Custom Skills in an `Azure Cognitive Search`\
    \ enrichment pipeline. You can read the details about attaching a `Cognitive Services`\
    \ resource to a skillset in `Azure Cognitive Search` at [`https://docs.microsoft.com/en-us/azure/search/cognitive-search-attach-cognitive-services#limits-when-no-cognitive-services-resource-is-selected`](https://docs.microsoft.com/en-us/azure/search/cognitive-search-attach-cognitive-services%2523limits-when-no-cognitive-services-resource-is-selected).\
    \ For this exercise, we will perform the named entity recognition enrichments\
    \ only. See Figure [7-10](#499686_1_En_7_Chapter.xhtml#Fig10).\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig10_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig10_HTML.jpg)\n\
    \nFigure 7-10: Azure Cognitive Search – adding cognitive skill enrichments\n\n\
    After adding cognitive skill enrichments, the next step in your `Azure Cognitive\
    \ Search` setup is to create a target index. If you are familiar with other search\
    \ programs, such as `Apache Solr`, `Apache Lucene`, or `Elasticsearch`, you might\
    \ know that indexing helps you speed up the search. It stores the contents used\
    \ for full text search, so that it’s optimized for faster searches with the physical\
    \ schema. In Figure [7-11](#499686_1_En_7_Chapter.xhtml#Fig11), you’ll find the\
    \ recommended index, along with fields listed that are retrievable, filterable,\
    \ sortable, facet-able, and searchable. This target index gives you excellent\
    \ control over your data, so you can granularly include or exclude the attributes\
    \ to be included in the search. For numerical values, like the number of bedrooms\
    \ and bathrooms, you can request for it to be sortable. Microsoft has made it\
    \ very easy with default values preselected, as shown in Figure [7-11](#499686_1_En_7_Chapter.xhtml#Fig11).\n\
    \n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig11_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig11_HTML.jpg)\n\
    \nFigure 7-11: Azure Cognitive Search – Customize target index\n\nThe final step\
    \ is to create an indexer and define the frequency you would like it to run (see\
    \ Figure [7-12](#499686_1_En_7_Chapter.xhtml#Fig12)).\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig12_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig12_HTML.jpg)\n\
    \nFigure 7-12: Azure Cognitive Search – Create an indexer"
