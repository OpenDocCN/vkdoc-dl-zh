- fmt: '# Microsoft Azure Video Indexer


    The Microsoft Azure Video Indexer is an application that’s part of Azure Media
    Services, and it’s also built on Cognitive Search and other Azure Cognitive Services
    (such as Face API, Microsoft Translator, Computer Vision API, and Custom Speech).
    It provides you with the capability to automatically extract advanced metadata
    from your video and audio content. To get started, follow these steps:


    1. Visit the Video Indexer^([³](#fn3)), and then click **Start free** to begin
    the free trial. See Figure [3-46](#499686_1_En_3_Chapter.xhtml#Fig46).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig46_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig46_HTML.jpg)


    Figure 3-46


    Video Indexer homepage


    Log in using your Microsoft account. See Figure [3-47](#499686_1_En_3_Chapter.xhtml#Fig47).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig47_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig47_HTML.jpg)


    Figure 3-47


    Video Indexer login


    After signing in with your Microsoft account, you will see the screen shown in
    Figure [3-48](#499686_1_En_3_Chapter.xhtml#Fig48). Click the **Media files** film
    icon on the side bar, to add your video files.


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig48_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig48_HTML.jpg)


    Figure 3-48


    Video Indexer – Extract insights and enhance your content


    Click the **Model customizations** settings icon on the left side bar, to add
    the person to be identified. In this case, we uploaded the video from one of the
    talks at ISG Automation Summit London^([⁴](#fn4)) and then selected the person.
    Click **Add person** from the menu on the right (as shown in Figure [3-49](#499686_1_En_3_Chapter.xhtml#Fig49)).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig49_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig49_HTML.jpg)


    Figure 3-49


    Video Indexer – Content model customization


    At this point, you will want to fill in the person’s details. The service cannot
    be used for law enforcement, as Microsoft decided to not sell police its facial
    recognition technology^([⁵](#fn5)). Now you will upload the photos of the individual
    to be identified in the video. See Figure [3-50](#499686_1_En_3_Chapter.xhtml#Fig50).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig50_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig50_HTML.jpg)


    Figure 3-50


    Video Indexer – Person’s details


    After the photo is uploaded, person 1 is now added to the model, as shown in Figure
    [3-51](#499686_1_En_3_Chapter.xhtml#Fig51).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig51_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig51_HTML.jpg)


    Figure 3-51


    Video Indexer – the person is added


    Now go back to the dashboard. Click **Upload** to upload the video that needs
    to be indexed. Click **browse for a file**, to browse for the file in your system
    (as shown in Figure [3-52](#499686_1_En_3_Chapter.xhtml#Fig52)).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig52_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig52_HTML.jpg)


    Figure 3-52


    Video Indexer – uploading the video file


    The file is then uploaded and analyzed. This process will take some time (as shown
    in Figure [3-53](#499686_1_En_3_Chapter.xhtml#Fig53)).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig53_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig53_HTML.jpg)


    Figure 3-53


    Video Indexer – the file upload progress


    Upon successful completion, you will see the analyzed video on the dashboard.
    Now click the **Play** button on the video (see Figure [3-54](#499686_1_En_3_Chapter.xhtml#Fig54)).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig54_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig54_HTML.jpg)


    Figure 3-54


    Video Indexer – extracting insights from the video


    As you can see in Figure [3-55](#499686_1_En_3_Chapter.xhtml#Fig55), not only
    did Video Indexer recognize the individual, but it also recognized several other
    people in the video.


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig55_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig55_HTML.jpg)


    Figure 3-55


    Video Indexer identified individuals in the video


    With this enriched video, we can select different insight categories in the video,
    such as identifying an object, person, keyword, and so on. Figure [3-56](#499686_1_En_3_Chapter.xhtml#Fig56)
    demonstrates the Timeline report.


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig56_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig56_HTML.jpg)


    Figure 3-56


    Video Indexer Insights – Timeline


    Video Indexer is a comprehensive and sophisticated video enrichment offering,
    which can be used in a variety of use cases in media, news, entertainment, journalism,
    and so on. Here, you have seen some fairly basic capabilities of the service,
    which can unlock video insights to enrich your videos, to enhance discovery and
    improve engagement. The feature set includes face detection, celebrity identification,
    custom face identification, thumbnail extraction, text recognition, object identification,
    visual content moderation (detecting explicit contents), scene segmentation, shot
    detection, and so on.


    We can only imagine the extent to which you, your company, your clients, and organizations
    around the world can use this technology!


    ## Summary


    In this chapter, we explained the Computer Vision API and various related APIs.
    With the help of these features, we can identify faces, and we can perform an
    analysis of any set of images. We can capture the data, and we can make the documents
    searchable. For motion graphics (videos), the Video Indexer (associated with Azure
    Media Services) provides us with the facility to identify the audio, words, speakers,
    written content, and so on.


    In the next chapter, we will continue with the discussion of Azure Cognitive Services,
    and we will take a look at natural language processing (NLP).


    Footnotes [1](#499686_1_En_3_Chapter.xhtml#Fn1_source)   [2](#499686_1_En_3_Chapter.xhtml#Fn2_source)
      [3](#499686_1_En_3_Chapter.xhtml#Fn3_source)   [4](#499686_1_En_3_Chapter.xhtml#Fn4_source)
      [5](#499686_1_En_3_Chapter.xhtml#Fn5_source)


    # Language – Understand Unstructured Text and Models


    A smart application can understand a user’s input. Users can provide inputs via
    a keyboard, a mic, or by using any other external devices. These systems are so
    smart that they can interact with the user.


    The aim of this chapter is to get started with natural language processing (NLP)
    and to create a smart application that can interact with its users. There are
    a lot of ways to train and prepare the system, so that it can interact with a
    user.


    Throughout this chapter, we will cover the following topics:


    *   Creating and understanding language models

    *   Training and enrichment with Cognitive Services

    *   The Muppet models – transformers for NLP

    *   Named entity recognition with fine-tuned BERT

    *   Summary of the language API'
