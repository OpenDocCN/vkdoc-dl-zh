- fmt: 'Before we move to the next section, let’s make sure we are clear on pricing.
    The Free tier allows 10K messages, but the SLA is not guaranteed. With the Standard
    tier, there is a limited number of messages, but with a 99.9% SLA guarantee. Check
    your requirements to make sure you select the right pricing tier. See Figure [9-24](#499686_1_En_9_Chapter.xhtml#Fig24).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig24_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig24_HTML.jpg)


    Figure 9-24

    Azure portal – pricing tier information


    In the earlier example, you saw how easy it is to build a QnA bot, by using `QnA
    Maker` and `Azure Bot Services`. But as you might have noticed, there is a lot
    going on in the background to make it happen. There is a lot of heavy lifting
    in terms of parsing natural language queries, retrieving data from text files,
    converting it into questions and answer pairs, being able to publish these queries
    as a service, and then answering them in real time. The good news is that all
    of this is hidden from us, and we don’t have to build anything, thanks to `Azure
    Bot Services`.


    In the next section, we will see how we can augment the bot knowledge base from
    the Web and how we can do interesting things with natural language questions.


    ## Augmenting the Bot Knowledge Base from the Web


    The standard CDC QnA is great. However, our fictitious client wants to make the
    COVID-19 bot more localized. Hillsborough county is the fourth most populous county
    in Florida, and they would like their FAQs^([^(35)](#fn35)) to be a part of this
    bot. Follow these steps:


    1.  Go to `QnA Maker`, and click the **My knowledge bases** link from the top
    bar. You will see your knowledge base `CDCQnABotKB` listed, as shown in Figure
    [9-25](#499686_1_En_9_Chapter.xhtml#Fig25).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig25_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig25_HTML.jpg)


    Figure 9-25

    QnA portal – list of knowledge bases


    Click the knowledge base name (`CDCQnABotKB`) to proceed.


    2.  To add new resources, click **settings tab** in the QnA portal as part of
    your model. It will take you to the Manage knowledge base screen, as shown in
    Figure [9-26](#499686_1_En_9_Chapter.xhtml#Fig26).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig26_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig26_HTML.jpg)


    Figure 9-26

    QnA portal – manage knowledge base


    3.  Add the Hillsborough county FAQs URL in the link (the URL is [`www.hillsboroughcounty.org/en/residents/public-safety/emergency-management/stay-safe/getting-tested`](https://www.hillsboroughcounty.org/en/residents/public-safety/emergency-management/stay-safe/getting-tested)).
    You can now click **Save and train** from the top menu. After that, click the
    blue **Test** button (as shown in Figure [9-27](#499686_1_En_9_Chapter.xhtml#Fig27)),
    and then ask a question related to Hillsborough county. Voila! The relevant answer
    appears from the new source. This is the power of `QnA Maker`, which is part of
    the Cognitive Services ecosystem.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig27_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig27_HTML.jpg)


    Figure 9-27

    QnA portal – testing the knowledge base for questions and answers


    However, if you closely look at the answer, it leaves a few things to be desired.
    First of all, it doesn’t give you information about the address and hours of the
    Raymond James and Lee Davis testing locations. See Figure [9-28](#499686_1_En_9_Chapter.xhtml#Fig28).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig28_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig28_HTML.jpg)


    Figure 9-28

    QnA portal – testing the knowledge base for questions and answers


    4.  We assume the problem is that this information is stored in the tables within
    the page, and it is not part of the extracted knowledge base. However, we can
    improve upon it. Click the **Inspect** link in Figure [9-28](#499686_1_En_9_Chapter.xhtml#Fig28),
    and you will see the answers with their corresponding confidence scores (as shown
    in Figure [9-29](#499686_1_En_9_Chapter.xhtml#Fig29)).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig29_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig29_HTML.jpg)


    Figure 9-29

    QnA portal – editing the knowledge base for questions and answers


    This is an excellent place to test your questions, improve answers, add alternative
    phrasing for questions (other ways that these questions can be asked), and also
    add alternative answers. This is exactly what we did, as shown in Figure [9-30](#499686_1_En_9_Chapter.xhtml#Fig30).
    We added the locations in the existing answers, and we also added some alternative
    phrasing.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig30_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig30_HTML.jpg)


    Figure 9-30

    QnA portal – editing the knowledge base for questions and answers


    5.  Now you can click **Save and train** from the top menu, and then run the query
    again. See the answer in Figure [9-31](#499686_1_En_9_Chapter.xhtml#Fig31).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig31_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig31_HTML.jpg)


    Figure 9-31

    QnA portal – knowledge base response with edited questions and answers


    Now the answer is detailed and exactly what we wanted. You will note that the
    answer is added to the knowledge base (as shown in Figure [9-32](#499686_1_En_9_Chapter.xhtml#Fig32)),
    with the source identified as *editorial*. This helps identify the source citation
    of the answers.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig32_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig32_HTML.jpg)


    Figure 9-32

    QnA portal – knowledge base updated with editoral answers


    6.  Now that the bot knowledge base is trained and running, we can call the API.
    Unlike the earlier `cURL` instance, this time we would set the debug to be true,
    as shown in the following code:


    ```

    curl -X POST https://cdcqnabot.azurewebsites.net/qnamaker/knowledgebases/600a1ebc-9fbe-4c27-b5db-bfbd505c87fb/generateAnswer
    -H "Authorization: EndpointKey 57306630-69dd-434e-b8d5-a3dd32929107" -H "Content-type:
    application/json" -d "{''question'':''can I go to a funeral safely?'', ''Debug'':{''Enable'':true}}"

    ```


    This enables us to get a larger question answer set, along with the debug flag
    items, such as the associated ranks, synonyms, and probabilities of answers, which
    help us understand the responses. See the `cURL` response in Figure [9-33](#499686_1_En_9_Chapter.xhtml#Fig33).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig33_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig33_HTML.jpg)


    Figure 9-33

    The `cURL` response with debug from the Bot Services API


    7.  Lastly, the analytics capabilities of `Azure Bot Services` are phenomenal.
    You can trace the number of users, activities, the channels (Alexa, Cortana, and
    so on), and check out the retention of users. See Figure [9-34](#499686_1_En_9_Chapter.xhtml#Fig34).
    This screen is available on Azure portal on the bot resource, conversational analytics
    tab, or blade.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig34_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig34_HTML.jpg)


    Figure 9-34

    Azure portal – analytics about user engagement with the chatbot'
