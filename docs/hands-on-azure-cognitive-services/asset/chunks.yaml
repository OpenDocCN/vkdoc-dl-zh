- fmt: "# Figure 7-2\n\n## Bing Image Search Results in Python\n\n1. We will now demonstrate\
    \ how you can call the API and plot the response using Python Imaging Library.\
    \ The code isn’t too different. The only additional part is to read the thumbnails\
    \ and to show them on the image canvas.\n\n```\nf, axes = plt.subplots(4, 4)\n\
    for i in range(4):\n    for j in range(4):\n        image_data = requests.get(thumbnail_urls[i\
    \ + 4 * j])\n        image_data.raise_for_status()\n        image = Image.open(BytesIO(image_data.content))\n\
    \        axes[i][j].imshow(image)\n        axes[i][j].axis(\"off\")\nplt.show()\n\
    ```\n\nYou can see the result in Figure [7-32](#499686_1_En_7_Chapter.xhtml#Fig32),\
    \ where the image is being drawn on the left pane.\n\nThe complete listing is\
    \ shown in Listing [7-1](#499686_1_En_7_Chapter.xhtml#PC2).\n\n```\nimport requests\n\
    import matplotlib.pyplot as plt\nfrom PIL import Image\nfrom io import BytesIO\n\
    \nsubscriptionKey = '5202a6e4229e4d3491f648d7ebc8aa9c'\nendpoint = 'https://api.bing.microsoft.com/v7.0/images/search'\n\
    query = \"cat memes\"\nmkt = 'en-US'\nparams = {\"q\": query, \"license\": \"\
    public\", \"imageType\": \"photo\"}\nheaders = {'Ocp-Apim-Subscription-Key': subscriptionKey}\n\
    \ntry:\n    response = requests.get(endpoint, headers=headers, params=params)\n\
    \    response.raise_for_status()\n    search_results = response.json()\n    thumbnail_urls\
    \ = [img[\"thumbnailUrl\"] for img in search_results[\"value\"][:16]]\n\n    f,\
    \ axes = plt.subplots(4, 4)\n    for i in range(4):\n        for j in range(4):\n\
    \            image_data = requests.get(thumbnail_urls[i + 4 * j])\n          \
    \  image_data.raise_for_status()\n            image = Image.open(BytesIO(image_data.content))\n\
    \            axes[i][j].imshow(image)\n            axes[i][j].axis(\"off\")\n\
    \    plt.show()\nexcept Exception as ex:\n    raise ex\n```\n\n**Listing 7-1**\
    \ Bing Image Search results in Python\n\nThe raw JSON response returned by service\
    \ is shown in Listing [7-2](#499686_1_En_7_Chapter.xhtml#PC3). We have truncated\
    \ it for brevity and to avoid cuteness overload, with a single result.\n\n```\n\
    Headers:\n{'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache',\
    \ 'Content-Length': '124071', 'Content-Type': 'application/json; charset=utf-8',\
    \ 'Expires': '-1', 'P3P': 'CP=\"NON UNI COM NAV STA LOC CURa DEVa PSAa PSDa OUR\
    \ IND\"', 'BingAPIs-TraceId': 'C1EEB539F44E4BF8AE333467AFD3A2A9', 'X-MSEdge-ClientID':\
    \ '324563186B086B31062D6CAE6ABF6A2A', 'X-MSAPI-UserState': '33d6', 'X-Search-ResponseInfo':\
    \ 'InternalResponseTime=279,MSDatacenter=BN2B', 'X-MSEdge-Ref': 'Ref A: C1EEB539F44E4BF8AE333467AFD3A2A9\
    \ Ref B: BLUEDGE0716 Ref C: 2021-01-05T02:47:31Z', 'apim-request-id': '9e4f0b22-8ce6-421d-a0f0-5cbc1499de3d',\
    \ 'Strict-Transport-Security': 'max-age=31536000; includeSubDomains; preload',\
    \ 'x-content-type-options': 'nosniff', 'CSP-Billing-Usage': 'CognitiveServices.BingSearchV7.Transaction=1',\
    \ 'Date': 'Tue, 05 Jan 2021 02:47:31 GMT'}\n\nJSON Response:\n{'_type': 'Images',\n\
