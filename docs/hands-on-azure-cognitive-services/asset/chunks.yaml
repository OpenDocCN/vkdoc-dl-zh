    在计算目标设置中，我们先上传 NER 数据集。本例将使用来自 Kaggle 的、基于 GMB（格罗宁根意义银行）进行实体分类的标注语料库^(⁷)。首先，从
    Kaggle 下载 NER 数据集文件，然后将其上传到笔记本中。接着，使用图 4-34 所示的命令，将文件上传到 Azure ML 工作区的 blob 存储中。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig34_HTML.jpg](img/499686_1_En_4_Fig34_HTML.jpg)


    图 4-34


    上传数据集


    下一步是使用这个 NER 数据集并对模型进行微调。你需要完成一些数据工程步骤，例如替换标签值和分词。你将使用 `BertForTokenClassification`
    类进行词元级别的预测，作为微调模型，它封装了实际的 `BertModel` 并添加了词元级别的分类器。笔记本会创建 `train.py` 文件，用于训练模型（如图
    4-35 所示）。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig35_HTML.jpg](img/499686_1_En_4_Fig35_HTML.jpg)


    图 4-35


    为 BERT 微调训练 Python 文件


    现在你有了训练文件，接下来创建一个 Azure ML 实验^(⁸)，将 `train.py` 作为入口脚本的参数（该脚本用于运行实验）。见图 4-36。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig36_HTML.jpg](img/499686_1_En_4_Fig36_HTML.jpg)


    图 4-36


    创建实验以微调模型


    你可以在 Azure 机器学习控制台的“实验”选项卡中跟踪正在运行的实验。见图 4-37。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig37_HTML.jpg](img/499686_1_En_4_Fig37_HTML.jpg)


    图 4-37


    正在运行的训练实验，用于微调模型


    实验完成后，服务可以部署到 ACI 中并进行调用。现在你可以看到这个新微调模型产生的命名实体识别结果（如图 4-38 所示）。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig38_HTML.jpg](img/499686_1_En_4_Fig38_HTML.jpg)


    图 4-38


    测试已部署的 NER 服务


    文本通过服务进行处理，识别出的实体被标识并显示出来。见图 4-39。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig39_HTML.jpg](img/499686_1_En_4_Fig39_HTML.jpg)


    图 4-39


    已部署的 NER 服务的结果


    以上简要概述了如何在 Azure ML 中使用 Transformer 模型、微调模型、部署和调用服务以获得期望结果。你可以在 [`https://docs.microsoft.com/azure/machine-learning/how-to-configure-environment`](https://docs.microsoft.com/azure/machine-learning/how-to-configure-environment)（微软文档）找到关于如何设置
    Python 环境（用于 Azure 机器学习）的详细说明。


    在下一节中，我们将讨论非结构化文本和模型如何在整个生态系统中使用，并深入探讨一些相关的用例。


    认知服务和语言模型在应用生态系统中被广泛用于构建智能应用程序。微软学习工具（也称为数字学习工具）利用这些能力服务于教育领域。例如，微软沉浸式阅读器^(⁹)
    利用了 Azure 文本分析功能，包括全面的自然语言分析（用于情感、关系、趋势等）。


    文本分析服务被描述为*“一种 AI 服务，能够揭示非结构化文本中的洞察，如情感分析、实体、关系和关键短语。”* 它提供了广泛的功能，例如广泛的实体提取、情感分析、语言检测和灵活的部署。文本分析服务主页见图
    4-40。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig40_HTML.jpg](img/499686_1_En_4_Fig40_HTML.jpg)


    图 4-40


    文本分析服务主页


    文本分析服务可在云端、本地以及作为边缘部署使用，这使其成为满足各种不同企业需求的优秀工具。例如，你可以将其作为容器在本地使用。关于安装和运行文本分析容器的详细信息，请参阅微软文档^(¹⁰)。


    该服务的开源替代方案是通过使用 `spaCy`、`NLTK` 和 `CoreNLP` 等库进行自定义训练的模型，或使用 Hugging Face、OpenAI
    等云提供商来实现。然而，使用文本分析服务可以分离实现细节，帮助你进行抽象工作。无需微调自定义模型来识别和分类重要概念，你可以利用广泛的预构建实体和数百个个人身份信息（PII）数据元素，包括受保护的健康信息（PHI）。你可以提取相关短语、主题模型、客户情感分析和医疗数据（用于健康的文本分析目前处于预览阶段^(¹¹)）。


    ## 语言 API 总结


    在本章中，我们探讨了围绕语言 API 的一些关键概念及其在处理非结构化文本和模型方面的用途。我们通过示例演示了如何使用 Azure 认知服务和 Azure
    机器学习构建一个全面的搜索引擎。我们还研究了 Transformer 模型以及如何使用 Azure 机器学习对其进行微调。


    在下一章中，我们将继续这些主题，探索语音和语音服务，作为你认知服务之旅的下一步。


    脚注 1   2   3   4   5   6

