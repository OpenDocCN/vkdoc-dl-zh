    on your local machine via Anaconda or on Azure Machine Learning via Azure notebooks.


    Use the following steps to complete this example.


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig28_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig28_HTML.jpg)


    Figure 4-28


    Opening the BERT NER colab with Azure ML


    1.  Open the Jupyter notebook in Colab from [`https://github.com/microsoft/AzureML-BERT/blob/master/finetune/PyTorch/notebooks/Pretrained-BERT-NER.ipynb`](https://github.com/microsoft/AzureML-BERT/blob/master/finetune/PyTorch/notebooks/Pretrained-BERT-NER.ipynb)
    (as shown in Figure [4-28](#499686_1_En_4_Chapter.xhtml#Fig28)).


    Populate your subscription ID and resource group information. You would also need
    to perform the interactive authentication by opening the browser and entering
    the provided code. See Figure [4-29](#499686_1_En_4_Chapter.xhtml#Fig29).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig29_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig29_HTML.jpg)


    Figure 4-29


    Populating your information


    You now need to initialize the workspace and install the Azure ML SDK for notebooks
    (as shown in Figure [4-30](#499686_1_En_4_Chapter.xhtml#Fig30)).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig30_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig30_HTML.jpg)


    Figure 4-30


    Installing the Azure ML SDK for notebooks


    The next step is to create (or use) a compute cluster target for execution. In
    this case, we chose a standard single GPU NC_6 VM, while our region is set to
    western United States. See Figure [4-31](#499686_1_En_4_Chapter.xhtml#Fig31).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig31_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig31_HTML.jpg)


    Figure 4-31


    Creating a compute cluster


    However, we ran into an error! You learn more from your mistakes than if everything
    works smoothly. In this case, NC6 type VM is not available in the region. You
    will see the error message, “STANDARD_NC6 is not supported in region westus. Please
    choose a different VM size.” (See Figure [4-32](#499686_1_En_4_Chapter.xhtml#Fig32).)


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig32_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig32_HTML.jpg)


    Figure 4-32


    ComputeTarget creation error


    It is important to note that all the compute types are not available in all the
    regions, and therefore, it’s important to choose the right region. You can read
    more about regions and VMs at [`https://docs.microsoft.com/ azure/virtual-machines/regions`](https://docs.microsoft.com/%2520azure/virtual-machines/regions)
    (on Microsoft Docs).


    To fix this issue, go to the Azure console, and change the region to the eastern
    United States by creating a new workspace in eastern United States, where the
    VM is available. Now you can successfully create the compute target, as shown
    in Figure [4-33](#499686_1_En_4_Chapter.xhtml#Fig33).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig33_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig33_HTML.jpg)


    Figure 4-33


    ComputeTarget creation successful'
  trans: '

    # 木偶模型——用于自然语言处理的 Transformer


    在自然语言处理领域，尤其是围绕非结构化文本和模型的讨论中，如果不提及`BERT`、`ELmo`、`Grover`、`RoBERTa`、`ERNIEs`和`KERMIT`，那就不算完整。这并非因为
    ACL（计算语言学协会）旗舰会议恰好与芝麻街大会在同一地点举办（大鸟绝对没有发表令人难忘的主题演讲），而是因为当语言模型论文引入与芝麻街相关的缩写时，这个内部玩笑有点失控了（而且很多人开始为这个烂笑话添砖加瓦）。


    要概述 Transformer 模型及其复杂细节，需要单独用一章来讲解，但简而言之，图 4-27 中的表格展示了一些流行的木偶模型概览。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig27_HTML.jpg](img/499686_1_En_4_Fig27_HTML.jpg)


    图 4-27


    一些流行木偶模型的表格


    ## 使用微调 BERT 进行命名实体识别


    命名实体识别（NER）是任何自然语言处理系统的关键能力之一，因此也是语言模型提供的基本功能之一。它能够从非结构化数据集中提取实体，例如地理实体（城市、国家等）、组织实体（组织名称）、个人实体（与人员相关的姓名和标识符）、地缘政治实体（国家、组织）、时间、事件、自然现象、季节性（节假日）、自定义实体等。


    在本示例中，我们将使用`Azure ML`上的`PyTorch Pretrained BERT`进行命名实体识别。我们将使用`Google Colaboratory`，这是一个用于运行`Jupyter`笔记本的免费工具。（它通常被称为`Google
    Colab`。这个名称是实验室和协作两个词的混合双关语。）不过，你也可以通过`Anaconda`在本地机器上，或通过`Azure`笔记本在`Azure Machine
    Learning`上完成同样的练习。


    请按照以下步骤完成本示例。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig28_HTML.jpg](img/499686_1_En_4_Fig28_HTML.jpg)


    图 4-28


    使用 Azure ML 打开 BERT NER Colab


    1.  从[`https://github.com/microsoft/AzureML-BERT/blob/master/finetune/PyTorch/notebooks/Pretrained-BERT-NER.ipynb`](https://github.com/microsoft/AzureML-BERT/blob/master/finetune/PyTorch/notebooks/Pretrained-BERT-NER.ipynb)在`Colab`中打开`Jupyter`笔记本（如图
    4-28 所示）。


    填写你的订阅 ID 和资源组信息。你还需要通过打开浏览器并输入提供的代码来执行交互式身份验证。见图 4-29。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig29_HTML.jpg](img/499686_1_En_4_Fig29_HTML.jpg)


    图 4-29


    填写你的信息


    现在你需要初始化工作区，并为笔记本安装`Azure ML SDK`（如图 4-30 所示）。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig30_HTML.jpg](img/499686_1_En_4_Fig30_HTML.jpg)


    图 4-30


    为笔记本安装 Azure ML SDK


    下一步是创建（或使用）一个计算集群目标用于执行。在本例中，我们选择了一个标准的单 GPU `NC_6`虚拟机，同时将区域设置为美国西部。见图 4-31。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig31_HTML.jpg](img/499686_1_En_4_Fig31_HTML.jpg)


    图 4-31


    创建计算集群


    然而，我们遇到了一个错误！从错误中学到的东西比一切顺利时更多。在本例中，`NC6`类型的虚拟机在该区域不可用。你将看到错误消息：“`STANDARD_NC6`在`westus`区域不受支持。请选择其他虚拟机大小。”（见图
    4-32。）


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig32_HTML.jpg](img/499686_1_En_4_Fig32_HTML.jpg)


    图 4-32


    ComputeTarget 创建错误


    需要注意的是，并非所有计算类型在所有区域都可用，因此选择合适的区域非常重要。你可以在[`https://docs.microsoft.com/azure/virtual-machines/regions`](https://docs.microsoft.com/azure/virtual-machines/regions)（微软文档）上阅读更多关于区域和虚拟机的信息。


    要解决此问题，请转到 Azure 控制台，通过在美国东部（该虚拟机可用的区域）创建一个新工作区，将区域更改为美国东部。现在你可以成功创建计算目标，如图 4-33
    所示。


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig33_HTML.jpg](img/499686_1_En_4_Fig33_HTML.jpg)


    图 4-33


    ComputeTarget 创建成功

    '
- fmt: 'For the compute target setup, let’s upload the NER dataset. In this example,
    we will use the annotated corpus using GMB (Groningen Meaning Bank) for entity
    classification from Kaggle^([⁷](#fn7)). First, download the NER dataset file from
    Kaggle, and then upload it to the notebook. Then, use the commands shown in Figure
    [4-34](#499686_1_En_4_Chapter.xhtml#Fig34), to upload the files to the Azure ML
    workspace blob store.


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig34_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig34_HTML.jpg)


    Figure 4-34


    Uploading the dataset


    The next step is to use this NER dataset and fine-tune the model. There are a
    few data engineering steps you’ll need to take, such as replacing the tag values
    and tokenization. You’ll use the `BertForTokenClassification` class for token-level
    predictions, as a fine-tuning model, which wraps the actual `BertModel` and adds
    token-level classifiers. The notebook creates the `train.py` file, which is used
    to train the model (as shown in Figure [4-35](#499686_1_En_4_Chapter.xhtml#Fig35)).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig35_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig35_HTML.jpg)


    Figure 4-35


    Training a Python file for the BERT fine-tuning


    Now that you have the training file, create an Azure ML experiment^([⁸](#fn8)),
    using `train.py` as the parameter for an entry script (which is the script used
    to run the experiment). See Figure [4-36](#499686_1_En_4_Chapter.xhtml#Fig36).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig36_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig36_HTML.jpg)


    Figure 4-36


    Creating the experiment to fine-tune the model


    You can track the running experiment in the Experiments tab, in the Azure Machine
    Learning console. See Figure [4-37](#499686_1_En_4_Chapter.xhtml#Fig37).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig37_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig37_HTML.jpg)


    Figure 4-37


    Training experiment running, to fine-tune the model


    Once the experiment is completed, the service can be deployed in ACI and then
    invoked. Now you can see the named entity recognition results from this new fine-tuned
    model (as shown in Figure [4-38](#499686_1_En_4_Chapter.xhtml#Fig38)).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig38_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig38_HTML.jpg)


    Figure 4-38


    Testing the deployed NER service


    The text gets processed via the service, and the resulting entities are identified
    and shown. See Figure [4-39](#499686_1_En_4_Chapter.xhtml#Fig39).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig39_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig39_HTML.jpg)


    Figure 4-39


    Results from the deployed NER service


    This is a rather brief overview of how you can use transformer models in Azure
    ML, fine-tune models, and deploy and invoke services to get the desired results.
    You can find detailed instructions on how to set up a Python environment (for
    Azure Machine Learning) at [`https://docs.microsoft.com/azure/machine-learning/how-to-configure-environment`](https://docs.microsoft.com/azure/machine-learning/how-to-configure-environment)
    (on Microsoft Docs).


    In the next section, we will discuss how unstructured text and models are used
    across the ecosystem, taking a deeper look at some related use cases.


    Cognitive Services and language models are ubiquitously used across the application
    ecosystem, to build intelligent applications. Microsoft Learning Tools (also referred
    to as Digital Learning Tools) leverage these capabilities, for the education.
    For example, Microsoft Immersive Reader^([⁹](#fn9)) utilizes the Azure Text Analytics
    capabilities, including comprehensive natural language analysis (for sentiment,
    relations, trends, and so on).


    The Text Analytics service is described as an *“AI service that uncovers insights
    such as sentiment analysis, entities, relations, and key phrases in unstructured
    text.”* It provides capabilities, such as broad entity extraction, sentiment analysis,
    language detection, and flexible deployment. See Figure [4-40](#499686_1_En_4_Chapter.xhtml#Fig40)
    for the Text Analytics service homepage.


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig40_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig40_HTML.jpg)


    Figure 4-40


    Text Analytics service homepage


    The Text Analytics service is available in the cloud, on premises, and as an edge
    deployment, which makes it a great utility for a variety of different enterprise
    needs. For instance, you can use it on premises as a container. Details on installing
    and running Text Analytics containers can be found on Microsoft Docs^([^(10)](#fn10)).


    The open source alternative to this service is achieved with custom-trained models,
    with libraries like `spaCy`, `NLTK`, and `CoreNLP`, or with cloud providers like
    Hugging Face, OpenAI, and so on. However, using the Text Analytics service separates
    out the implementation details, and it helps you work in abstraction. Instead
    of fine-tuning custom models to identify and categorize important concepts, you
    can utilize the wide range of prebuilt entities and hundreds of personally identifiable
    information (PII) data elements, including protected health information (PHI).
    You can extract relevant phrases, topic models, customer sentiment analysis, and
    medical data (Text Analytics for health is in preview^([^(11)](#fn11))).


    ## Summary of the Language API


    In this chapter, we explored some of the key concepts around language APIs and
    their use for processing unstructured text and models. We demonstrated, with examples,
    how Azure Cognitive Services and Azure Machine Learning can be used to build a
    comprehensive search engine. We also studied transformer models and how to fine-tune
    one, using Azure Machine Learning.


    In the next chapter, we will continue these topics, by exploring speech and speech
    services as the next step in your Cognitive Services journey.


