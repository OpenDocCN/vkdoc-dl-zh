- fmt: '# Conclusion and Summary


    Digital conversations are on the rise, and bots are our first line of defense
    in this barrage of queries, which require instant gratification. In this chapter,
    we scratched the surface of what Azure Bot Services and Bot Framework are capable
    of. We started by explaining the key aspects of Azure Bot Services, we created
    a COVID-19 bot using Azure Bot Services, and then we tested it using Azure Bot
    Builder SDK and QnA Maker.


    Now that you built a fundamental understanding of Azure Bot Services, you can
    start exploring and use these technologies for your own business use cases. Natural
    language conversations have tons of implementations. From healthcare to finance,
    retail, and hospitality, the industries are brimming with use cases to provide
    improved customer experiences for your users.


    Keep chatting!


    # 10. Azure Machine Learning


    Q: Why did Ed get attacked in the haunted jungle?


    A: Because other people are sensible enough to not enter random forests.


    That’s a machine learning joke at the expense of our co-author, but it makes an
    excellent segue into customized algorithms such as random forests. (A random decision
    forest classifies tasks in decision trees to output mean or average predictions/regressions.
    Ed’s revenge is that he explains jokes.) So far, in this book, you have done an
    extensive review of Cognitive Services, which provide a set of prebuilt algorithms,
    models, and recipes in a managed and well-organized manner. These services enable
    and accelerate machine learning development and make data scientists deliver products
    and services faster and more effectively without reinventing the wheel.


    However, real-world business use cases exist in data science and machine learning,
    beyond using prebuilt APIs. You have to be able to build your own models, try
    out new datasets, augment existing models, and create your own algorithms. Rest
    assured Microsoft Azure has extensive capabilities to address each one of these
    customized needs. Azure Machine Learning is an integral part of the Microsoft
    AI ecosystem, which helps machine learning engineers, AI enthusiasts and professionals,
    and citizen data scientists alike, to implement intelligent solutions. The end-to-end
    machine learning life cycle comprises of not only building, training, and deploying
    machine learning models, but it’s also maintaining them in the long run. You must
    monitor the model drift and decay, scale based on demand, and complete challenger
    champion tests to ensure that the best model wins. The Azure Machine Learning
    platform helps bring together a diverse set of these services, to support the
    full machine learning life cycle.


    This chapter will help you understand Azure Machine Learning ecosystem offerings
    and how to train an application to learn without being explicitly programmed,
    which is the goal of machine learning. So far, you have mostly seen Azure Cognitive
    Services in action, but in this chapter, we will review the entire Azure Machine
    Learning ecosystem to provide you a big picture of life beyond Cognitive Services.
    You will learn


    * The Azure Machine Learning stack and offerings

    * Building models with no code, using the Azure Machine Learning designer

    * Building ML models in Python and deploying them using Azure notebooks

    * Deploying and testing models, with Azure Machine Learning


    Let’s dive in.


    ## Azure Machine Learning Stack


    Azure Machine Learning stack is a cloud platform hyperscaler force to reckon with.
    It contains the entire end-to-end machine learning platform capabilities, from
    data ingestion to model deployment and management. For instance, to bring in the
    datasets for running predictive analytics, and to include data science experiments,
    Azure offers storage repositories, like Azure Blob Storage and Azure Data Lakes
    Storage. For the machine learning compute resources, there are options of individual
    virtual machines (VMs), Spark clusters with HD Insight, or Azure Databricks.


    Figure 10-1 outlines the different offerings within the Azure Machine Learning
    stack and what should be used when. The focus of this chapter is Azure Machine
    Learning.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig1_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig1_HTML.jpg)


    **Figure 10-1** Azure Machine Learning key offerings – from [*https://docs.microsoft.com/azure/architecture/data-guide/technology-choices/data-science-and-machine-learning*](https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology-choices/data-science-and-machine-learning)


    Enterprise readiness and governance requires data protection, which is offered
    by Azure Key Vault, to manage and secure credentials. Repeatable and reproducible
    experimentation helps achieve consistent results and require a managed and properly
    versioned set of models and dependencies. With Microsoft Azure, you can use Docker
    containers, and with ACI and AKS, you can manage these repositories to build and
    deploy as needed. In the context of machine learning, the salient capabilities
    are shown in Figure 10-2.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig2_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig2_HTML.jpg)


    **Figure 10-2** Azure Machine Learning key service capabilities – from [*https://azure.microsoft.com/services/machine-learning*](https://azure.microsoft.com/en-us/services/machine-learning/)


    The following provides a brief overview of what these entail, which you will see
    as part of Azure Machine Learning studio, the machine learning one-stop shop for
    Azure data scientists. The highest item in the hierarchy of Azure Machine Learning
    is a workspace, as shown in Figure 10-3. It contains a variety of different elements,
    such as experiments, pipelines, datasets, models, and so on, as we will discuss
    in the following.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig3_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig3_HTML.jpg)


    **Figure 10-3** Azure Machine Learning workspace – from [*https://docs.microsoft.com/azure/machine-learning/concept-workspace*](https://docs.microsoft.com/azure/machine-learning/concept-workspace)


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig4_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig4_HTML.jpg)


    **Figure 10-4** Azure Machine Learning studio – key offerings


    1. **Endpoints** – A machine learning model needs to be consumed, and there are
    few ways to do that. One of the popular ways to deploy a machine learning model
    is via a web service, which contains one or more endpoints. An endpoint is an
    address where a model can be reached and invoked via a well-defined protocol,
    such as RESTful APIs over HTTP. (*REST* stands for representational state transfer.)


    2. **Azure notebooks** – Azure notebooks provide an integrated working environment
    for data scientists to access files, folders, storage, and compute, all within
    the Azure workspace. We have seen Jupyter notebooks in Chapter 6, and Azure notebooks
    are similar; they just use Azure compute and storage, which we will explore shortly.
    Azure notebooks provide an excellent place to collaborate and work with datasets,
    models, and experiment in one place. See Notebooks in Figure 10-4.'
