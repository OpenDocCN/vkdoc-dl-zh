- fmt: '### Cognitive Speech Search with LUIS and Speech Studio


    In the previous example, you learned how to transcribe an audio file. In this
    example, we will be using Custom Speech with the Microsoft LUIS (Language Understanding)
    service, to build a speech-enabled application. Follow these steps:


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig26_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig26_HTML.jpg)


    Figure 5-26: Create new Azure Cognitive Services account


    1.  Create a speech resource from the marketplace, as shown in step 2 of the earlier
    example. We have done this a few times now, so hopefully you are well versed in
    it. Here, we would reuse the GitHub repository cloned in step 1 of the earlier
    example.


    2.  Start Visual Studio, and then select **File** ➤ **Open** ➤ **Project/Solution**.
    Navigate to the folder that contains this sample, and then select the solution
    file contained within it. This should be the standard path (`cognitive-services-speech-sdk`/`samples`/`csharp`/`dotnet-windows`/`console/`).


    3.  Navigate to the `intent_recognition_samples.cs`, and then create an Azure
    Cognitive Services account (see Figure 5-26). LUIS is part of Cognitive Services
    and is dubbed as a “machine learning-based service to build natural language into
    apps, bots, and IoT devices.” An enterprise ready and scalable service, LUIS provides
    a fast and efficient way to add language capabilities to your application. Upon
    logging into `LUIS.AI`, you will need to create a new Azure Cognitive Services
    account.


    Fill in the details to complete the process. At this point, you will see the notifications
    for your Azure account creation and respective resource creation, as shown in
    Figure 5-27.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig27_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig27_HTML.jpg)


    Figure 5-27: The Azure Cognitive Services account notifications


    Once completed, proceed with the conversation apps authoring service console,
    as shown in Figure 5-28. Next, you will create a new app.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig28_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig28_HTML.jpg)


    Figure 5-28: LUIS conversation service app console


    Click the **New App** button to create a new app called `search service` which
    would contain the instance name, subscription key, and app ID. See Figure 5-29.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig29_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig29_HTML.jpg)


    Figure 5-29: LUIS conversation service – creating a new app


    Next, you will create a conversation app, called `SearchService`, as shown earlier,
    in Figure 5-30. Open `SearchService` by double-clicking it, and then create a
    new intent by clicking **Create new intent**. The dialog box in Figure 5-30 opens.
    An *intent* is a task or action the user mentions in the *utterance* to perform,
    for instance, order coffee, check shipping status, etc. LUIS uses `None` intent
    as a fallback and comes with pre-built domains which provide known intents with
    utterances.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig30_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig30_HTML.jpg)


    Figure 5-30: LUIS conversation service – Create new intent


    Next, go to the created intent and add an example user input, as shown in Figure
    5-31.


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig31_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig31_HTML.jpg)'
