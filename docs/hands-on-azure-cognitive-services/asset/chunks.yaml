  trans: '

    请记住，下次当你看到一个看似毫不相关的产品时，这其实是算法在尝试拓宽其强化学习的边界。如果没有这一点，你就不会接触到僵尸、反乌托邦或末世世界以及连环杀手这些恐怖题材。


    这个例子结束了我们对 `Personalizer` 服务的概述。正如你所想，`Personalizer` 和推荐系统无处不在，它们旨在吸引我们的注意力，并试图在个人层面上更好地理解我们。这些算法在这方面做得越来越出色，当你在构建自己的解决方案时，请务必考虑与之相关的伦理影响。微软提供了一套关于负责任地实施
    `Personalizer` 的示例指南，网址为 [`https://docs.microsoft.com/en-us/azure/cognitive-services/personalizer/ethics-responsible-use`](https://docs.microsoft.com/en-us/azure/cognitive-services/personalizer/ethics-responsible-use)。我们强烈建议所有构建个性化工具和算法的人阅读此指南，无论你是使用自定义算法，还是通过
    `Personalizer` 及其他个性化服务。


    在下一节中，我们将回顾 `Anomaly Detector` 服务。


    ## 异常检测器服务


    异常或离群点是指偏离数据通常趋势的偏差。这些偏差可能只是噪声，也可能隐藏在这些不寻常的数据点中一些非常有趣的方面。这就是为什么在零售、金融服务、医疗保健、制造业和网络安全等领域，发现异常一直是一个备受关注的话题。通过整合历史数据、季节性和消费者行为画像，有效的异常检测系统能够更深入地洞察那些对企业构成风险或带来新机遇的行为。


    简单的统计异常检测方法通常基于距离度量。例如，一种方法是找出所讨论的数据点与现有分布之间的距离，从而判断这仅仅是噪声、测量误差，还是更有趣的东西。这些方法大致可以分为基于预测置信度的方法、统计方法和基于聚类的方法。


    例如，一个通常每月只在食品杂货和超市消费 500 美元的客户，在 2020 年 3 月的支出突然翻倍。这个离群点会被标记出来，但一个更复杂的模型会意识到，这种模式正在全球范围内出现，并且与
    COVID-19 期间支出增加和囤积卫生纸的趋势相符。引入季节性因素有助于建立一个稳健且可调整的模型。


    再举一个例子，你的银行注意到你的卡上有一笔 100 美元的 Robux 或 V-Bucks 消费。由于之前没有这种水平的游戏内货币消费记录，他们知道要么是你的孩子哄骗你为他们购买这些游戏虚拟货币，要么是有人在盗用你的卡。这些不同类型的离群点有助于识别数据中有趣的模式，并且对于理解消费者行为非常有帮助。


    用于确定离群点的典型方法包括 `z-score`（与平均值的偏差）或极值分析（EVA）、线性回归模型（如主成分分析或最小中位数平方）、基于邻近度的模型、信息理论方法或高维稀疏模型。异常检测是微妙的，而
    `Anomaly Detector` 服务通过允许你传入时间序列数据，并以自动化方式识别这些数据点中的异常行为，从而抽象出这些细节。该服务 API 提供有关预期值的信息，并检测哪些数据点是异常（我们稍后将看到）。


    ### 工作原理


    以下解释摘自 Ren 等人的论文《微软的时间序列异常检测服务》。该白皮书概述了“一种时间序列异常检测服务背后的算法，该服务帮助客户持续监控时间序列，并及时针对潜在事件发出警报。在本文中，我们介绍了异常检测服务的流水线和算法，该服务设计为准确、高效且通用。该流水线由三个主要模块组成，包括数据摄取、实验平台和在线计算。为了解决时间序列异常检测问题，我们提出了一种基于谱残差（SR）和卷积神经网络（CNN）的新颖算法。我们的工作是首次尝试将视觉显著性检测领域的
    SR 模型应用于时间序列异常检测。此外，我们将 SR 和 CNN 结合起来以提高 SR 模型的性能。与公共数据集和微软生产数据上的最先进基线相比，我们的方法取得了优越的实验结果。”
    该论文可从 [`https://arxiv.org/abs/1906.03821`](https://arxiv.org/abs/1906.03821) 下载。


    微软提供了一个出色的 `Anomaly Detector` 演示（[`https://algoevaluation.azurewebsites.net/`](https://algoevaluation.azurewebsites.net/)），以帮助你理解该服务如何从时间序列数据中识别异常。该
    API 可同时处理批处理和流式数据，并识别与正常事件模式的偏差。有三个数据样本可用。其中一个样本内置了季节性，供你尝试不同的场景，并使用不同的参数发现离群点。你可以在图
    6-45 中看到该演示的实际运行情况。


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig45_HTML.jpg](img/499686_1_En_6_Fig45_HTML.jpg)


    **图 6-45** 异常检测器演示

    '
- fmt: '### Try It Out – Anomaly Detector Demo


    To effectively show the usage of the Anomaly Detector service, we will follow
    these steps:


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig46_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig46_HTML.jpg)


    Figure 6-46


    Cognitive Services – setting up Anomaly Detector service


    - Let’s create an Anomaly Detector service instance, as shown in Figure [6-46](#499686_1_En_6_Chapter.xhtml#Fig46).
    You would repeat a previous process: starting from [`https://portal.azure.com`](https://portal.azure.com),
    search for the Anomaly Detector service, and then continue creating your work.


    Set up the Anomaly Detector service parameter, and then click **Create**. The
    service verifies the parameters, and then create the instance. See Figure [6-47](#499686_1_En_6_Chapter.xhtml#Fig47).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig47_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig47_HTML.jpg)


    Figure 6-47


    Cognitive Services – Anomaly Detector service validation completion


    Once the deployment is completed, you will see the screen in Figure [6-48](#499686_1_En_6_Chapter.xhtml#Fig48).
    Click **Go to resource** to proceed.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig48_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig48_HTML.jpg)


    Figure 6-48


    Cognitive Services – Anomaly Detector service deployment completion


    The Quick start page is a great way to get started with the Anomaly Detector service.
    One of the best ways is to check out the API console shown in section 2 in Figure
    [6-49](#499686_1_En_6_Chapter.xhtml#Fig49). Click the **API Console** link to
    proceed to the API console.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig49_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig49_HTML.jpg)


    Figure 6-49


