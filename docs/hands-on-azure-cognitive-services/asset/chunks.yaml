- fmt: '# Personalizer Service


    Even for millennials, it is hard to recognize a digital world without constant
    recommendations. Blockbuster stores had a hard time keeping the movies clustered
    in the same genre, while Netflix seamlessly curated to my movie sensibilities.
    YouTube offers relevant contents and helps me explore similar channels and new
    artists, while Spotify constantly digs for all my nostalgic tunes, based on my
    playlist. Amazon recommends the most relevant products, based on my recent purchases,
    and financial institutions create customizable offerings, based on my savings
    and spending patterns. This is hyper-personalization, customization, segmentation,
    and content curation, designed to create a segment of one (you). It’s made possible,
    due to machine learning approaches that are applied to the problem of serving
    custom experiences.


    To enable and accelerate AI democratization, like all other Cognitive Services,
    the Personalizer service creates an abstraction layer that allows you, the developer,
    to create a seamless experience for your customer, without getting into the nitty-gritty
    of an underlying recommendation engine.


    However, if you are interested in the underlying algorithms that are associated
    with the recommender systems, Microsoft has an excellent GitHub repository (`https://github.com/Microsoft/Recommenders`)
    with detailed implementations, notebooks, and comparisons of different algorithms.
    This discussion is beyond the scope of this chapter, but you can find everything
    you need there, including all the relevant details, associated research papers,
    Jupyter notebooks, example code, and so on.


    The Azure Cognitive Services Personalizer service won the Strata Data Awards for
    the most innovative product. It can be applied to customizing anything, including
    but not limited to news articles, products, food, movies, blog posts, and so on.
    Based on reinforcement learning approaches and customized Microsoft research algorithms,
    the principle behind the Personalizer service is quite easy to understand. It
    works like this:


    1. Each item (product, news article, food item, movie, and so on) includes attributes
    or features. The Personalizer API is called and passed these features to the `Rank`
    API.

    2. Personalizer’s underlying engine uses a reward action identifier to determine
    the best model and recommendation. You determine (train) via user preferences,
    or via a business rule.

    3. Based on this feedback, the reward (re)trains itself by correlating the rank
    and reward. Now the inference engine has the new model.


    Obviously, this is an oversimplification of the process, but if you still feel
    kind of lost, think of the Personalizer approach as it would operate on the reward
    behavior. Later, we will cover the details of learning policy, Apprentice mode,
    exploration vs. exploitation, the trade-off, and so on. But first, it makes sense
    to do a quick, hands-on experiment and show you how Personalizer works.


    Before we start, let us point out that there is a large repository of Personalizer
    related demos, snippets, and utilities available at `https://github.com/Azure-Samples/cognitive-services-personalizer-samples`.
    You can also see an interactive working demo at `https://personalizationdemo.azurewebsites.net`,
    which helps explain the concepts in a visual manner, as shown in Figure 6-32.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig32_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig32_HTML.jpg)


    Figure 6-32 Personalizer services demo


    Personalizer uses Vowpal Wabbit as the foundation for its machine learning implementations.
    You can read more about it on GitHub at `https://github.com/VowpalWabbit/vowpal_wabbit/wiki`.


    ## Trying It Out – Building a Movie Personalizer


    In this example, we will repeat some of the earlier steps of setting up Azure
    Cognitive Services. Consistent workflow is one of the salient features offered
    by Cognitive Services, where you can easily replicate your earlier knowledge.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig33_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig33_HTML.jpg)


    Figure 6-33 Personalizer service – creating a Personalizer instance


    1. Go to `https://portal.azure.com`. Log in with your existing Azure subscription,
    and then search for Personalizer Service, as shown in Figure 6-33. Click the Personalizer
    pane.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig34_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig34_HTML.jpg)


    Figure 6-34 Personalizer service – configuring the Personalizer elements


    2. Upon clicking Personalizer, you will see the screen shown in Figure 6-34. Fill
    in the details to create a Personalizer instance.


    The details will be validated, and you would see the screen shown in Figure 6-35.
    Click **Create** to proceed with your deployment.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig35_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig35_HTML.jpg)


    Figure 6-35 Personalizer service – validation screen


    Once the deployment is in progress, it will deploy the instance, based on the
    given parameters (see Figure 6-36).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig36_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig36_HTML.jpg)


    Figure 6-36 Personalizer service – deployment in progress


    Once the deployment is completed, you will see the screen shown in Figure 6-37.
    Click the **Go to resource** button to navigate to the next screen.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig37_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig37_HTML.jpg)


    Figure 6-37 Personalizer service – deployment completed


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig38_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig38_HTML.jpg)


    Figure 6-38 Personalizer service – Quick start page


    3. Now that we have the service deployed, we can consume it via various methods
    that are specified in the Quick start page, as shown in Figure 6-38. In our case,
    we will create a small movie recommendation personalizer.


    Like the other Cognitive Services, to invoke the Personalizer, you will need the
    keys and the endpoint. You can find this information by clicking the **Keys and
    Endpoint** link on the left pane (see Figure 6-39).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig39_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig39_HTML.jpg)


    Figure 6-39 Personalizer service – key and endpoint information


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig41_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig41_HTML.jpg)


    Figure 6-41 Personalizer service demo – `GetGenrePreference` method


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig40_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig40_HTML.jpg)


    Figure 6-40 Personalizer service demo – `GetPopularityFeatures` method


    4. To help explain this concept, let’s create a simple application that gets trained.
    It then recommends a movie, based on genre and popularity. We will define these
    popularity features as follows:


    ```

    string[] PopularityFeature = {"blockbuster", "indie", "cult-classic"};

    ```


    We define the genre features as follows:


    ```

    string[] GenreFeatures =

    {"action", "animation", "comedy", "drama", "horror", "romance", "scifi", "thriller"};

    ```'
