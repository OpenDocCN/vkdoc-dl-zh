    ## Speech API 总结


    在本章中，我们使用了 Azure 认知服务 Speech API。我们回顾了几种使用 Speech 服务的方法，这些方法通过语音帮助理解用户并与用户交互，从而使您的应用程序能够与用户对话。


    在下一章中，我们将学习如何让应用程序变得足够智能，以便它们能够自行做出决策。这是一个令人兴奋的新世界。敬请期待。


    脚注 1 2 3 4


    # 6. 决策 – 在应用程序中做出更明智的决策


    决策，决策，决策——是拉差辣椒酱还是塔巴斯科辣酱，雅各布队还是爱德华队，PC 还是 Mac，iPhone 还是 Android，堡垒之夜还是 Apex，可口可乐还是百事可乐，*星球大战*还是*星际迷航*……（好吧，最后一个没什么好争论的，但我们跑题了。）做出决策可能是我们做的最具人性的事情。这些决策基于我们可用的感官信息输入，并结合了一些先验观察、事实、我们的隐性偏见以及大量启发式方法。这种能够决定下一步最佳行动的*认知计算*能力是决策科学中的一个永久性特征。研究和捕捉我们如何做出这些决策的内在技能，需要理解我们如何摄取和处理这些信息。然后我们才能得出结论。


    与决策相关的细微差别可以很好地概括为：“我见到它时就知道它。”这是波特·斯图尔特大法官用来描述其淫秽测试的一句开创性名言。保持内容健康，在本章中，我们将了解如何将
    API 用于此目的。本章将通过向应用程序添加内容审核功能来提供对决策服务的见解。本章还将涉及一个相对较新的功能——异常检测器。以下是本章的一些显著特点：


    1.  理解决策服务和决策 API

    2.  创建一个自动内容审核器应用程序

    3.  使用个性化服务创建个性化体验

    4.  使用异常检测器识别未来问题

    5.  使用指标顾问服务探索指标

    6.  决策 API 总结


    那么，闲话少说，让我们开始吧！


    企业决策管理是使用业务规则、领域知识、预测分析和大数据来构建和驱动高效业务流程的艺术与科学。这是一个激动人心的话题，但尽管如此，它超出了本书的范围。

