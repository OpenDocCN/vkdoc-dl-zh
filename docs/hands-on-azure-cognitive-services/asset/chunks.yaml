    在这个简短的演示中，我们分析了所有可能的功能，以检查图像描述、类型、对象等。我们演示图像（`https://docs.microsoft.com/en-us/learn/wwl-data-ai/analyze-images-computer-vision/media/woman-roof.png`）的最终结果应如图
    3-16 所示。


