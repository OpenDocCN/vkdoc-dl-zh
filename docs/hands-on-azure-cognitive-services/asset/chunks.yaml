- fmt: '# The Azure Bot Services Ecosystem


    The Microsoft Bot ecosystem comprises of a few salient offerings – this includes
    Microsoft Bot Framework, Azure Bot Services, Language Understanding (LUIS), and
    Azure Health Bot (conversational AI for healthcare).


    Bot Framework has gone through a few iterations. It provides an SDK and a comprehensive
    set of tools to build conversational AI. It comprises of Bot Framework Composer,
    Bot Framework Solutions, Botkit, Bot Framework Emulator, Bot Framework Web Chat,
    Bot Framework Tools, Language Understanding, QnA Maker, Dispatch, Speech Services,
    Adaptive Cards, and Analytics. These are fairly large topics and beyond the scope
    of this book. In this chapter, we will focus on building a bot using Azure Bot
    Services.


    # Building Azure Service COVID-19 Bot^([^(33)](#fn33))


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig1_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Azure portal – creating a bot services instance


    1. Start with the Azure portal (`portal.azure.com`), and search for `bot services`,
    as shown in Figure [9-1](#499686_1_En_9_Chapter.xhtml#Fig1).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig2_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Azure portal – creating Web App Bot


    1. Select `Bot Services`, and you will see a list of different Bot Services offered
    by Microsoft and in the marketplace. Select `Web App Bot`, as shown in Figure
    [9-2](#499686_1_En_9_Chapter.xhtml#Fig2).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig3_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Azure portal – creating Web App Bot


    1. Click `Create` to create a Web App Bot, which is going to use Azure Bot Services
    to help build, deploy, and manage the underlying activities. See Figure [9-3](#499686_1_En_9_Chapter.xhtml#Fig3).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig4_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Azure portal – creating Web App Bot


    1. Fill out the details for creating a bot, including the bot handle name, subscription,
    resource group, location, and pricing tier, and select a bot template. See Figure
    [9-4](#499686_1_En_9_Chapter.xhtml#Fig4). Remember that you can always use your
    own existing App Service plan instead of creating a new one.


    There are a few bot starter kits to choose from, and these are available in C#
    and Node.js. Echo Bot echoes the message, while basic bot demonstrates the LUIS
    skills. See Figure [9-5](#499686_1_En_9_Chapter.xhtml#Fig5). We also have virtual
    assistant, LUIS Bot, and QnA Bot. In this case, since we are focused on creating
    a COVID-19 bot, we will use the QnA template.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig5_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig5_HTML.jpg)


