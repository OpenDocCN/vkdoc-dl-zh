    \ linking it with the metering language service, and we invoked the results via\
    \ the webUI and cURL interfaces. In the next example, let’s try to do this with\
    \ the Anomaly Detector service, but this time, we’ll use Jupyter notebook.\n\n\
    ### Running an Anomaly Detector Service Container\n\n![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig13_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig13_HTML.jpg)\n\
    \nFigure 8-13\n\nKeys and Endpoint\n\n1.  Similar to the language detection container,\
    \ Anomaly Detectors are hosting on the Docker Hub^([^(28)](#fn28)), as well as\
    \ the Microsoft container repository at `mcr.microsoft.com/azure-cognitive-services/decision/anomaly-detector`.\n\
    \n2.  Create an instance of the Anomaly Detector service to get the endpoint and\
    \ keys for metering (see Figure [8-13](#499686_1_En_8_Chapter.xhtml#Fig13)). You\
