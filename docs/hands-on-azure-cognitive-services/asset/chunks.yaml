  trans: "\n### 使用 Azure 认知搜索进行搜索\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig1_HTML.jpg](img/499686_1_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1：Microsoft Azure 门户产品搜索结果\n\n1. 在 Azure 门户中，搜索 `Azure Cognitive Search`，然后在下拉菜单中点击\
    \ `Azure Cognitive Search` 搜索结果（如图 7-1 所示）。选择 `Azure Cognitive Search`。\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig2_HTML.jpg](img/499686_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2：Microsoft Azure 认知搜索 – 创建产品界面\n\n1. 图 7-2 中的界面展示了 `Azure Cognitive Search`\
    \ 的所有功能和特性。如前所述，这包括可扩展性、可管理性、功能增强（OCR、NER、分面）以及自定义模型。点击 `Create` 继续。\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig3_HTML.jpg](img/499686_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3：Azure 认知搜索 – 创建实例\n\n1. 填写信息以创建服务。这包括订阅信息、唯一 URL、资源组、位置和定价信息（如图 7-3 所示）。\n\
    \n以下定价信息（图 7-4）针对不同层级。价格可能随时变化，此处仅作为示例参考。使用前请查看当前定价信息。\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig4_HTML.jpg](img/499686_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4：Azure 认知搜索 – 选择定价层\n\n> **注意：** 务必确保你的搜索实例和用于数据增强的 `Cognitive Services`\
    \ 实例位于同一区域。如果你希望迁移服务，请确保目标区域支持这些产品^(¹⁷)。\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig5_HTML.jpg](img/499686_1_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5：Azure 认知搜索 – 部署完成\n\n1. 创建服务完成后，你将看到图 7-5 中的界面。点击 `Go to resource` 查看完整仪表板。\n\
    \n`Cognitive Services` 仪表板（如图 7-6 所示）包含配额、服务状态、位置、订阅信息和用量信息的详细信息。该仪表板对于监控存储和索引在添加更多数据源时的表现非常有用。\n\
    \n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig6_HTML.jpg](img/499686_1_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6：Azure 认知搜索 – 仪表板\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig7_HTML.jpg](img/499686_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7：Azure 认知搜索 – 导入数据\n\n1. 现在我们已经创建了一个搜索服务实例，接下来导入一些数据进行搜索。点击仪表板顶部菜单中的 `Import\
    \ data`，你将看到连接数据的界面（如图 7-7 所示）。完成以下四个步骤：\n   1. 连接到数据源（例如用于文档和 PDF 的 `Azure SQL\
    \ Database`、`Azure VM 上的 SQL Server`、`Cosmos DB`、`Azure Blob Storage`、`Azure Data\
    \ Lake Storage Gen2` 或 `Azure Table Storage`）。\n   2. 添加认知技能进行增强（例如 NER、关键短语提取等）。\n\
    \   3. 自定义目标索引。\n   4. 最后，创建索引器。\n\n为简单起见，我们将从示例中导入数据，具体是房地产示例（如图 7-8 所示）。\n\n\
    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig8_HTML.jpg](img/499686_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8：Azure 认知搜索 – 导入数据集\n\n数据来自 SQL，包含有关房屋的房地产信息。下一步是添加增强或认知技能，如图 7-9 所示。在此案例中，我们将执行一些有限的增强来识别实体。\n\
    \n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig9_HTML.jpg](img/499686_1_En_7_Fig9_HTML.jpg)\n\
    \n图 7-9：Azure 认知搜索 – 添加认知技能\n\n`Cognitive Services` 增强包括提取人名、组织名和地名，检测关键短语，以及提取个人身份信息\
    \ (PII)。你可以创建自定义增强，并添加特定领域的技能来识别行业关键词和短语。例如，`ICD-10-CM/PCS 医学编码参考` 可以映射到相应的诊断和程序关键词。在\
    \ `Azure Cognitive Search` 增强管道中，你可以做很多事情来构建自定义技能。你可以在 [`https://docs.microsoft.com/en-us/azure/search/cognitive-search-attach-cognitive-services#limits-when-no-cognitive-services-resource-is-selected`](https://docs.microsoft.com/en-us/azure/search/cognitive-search-attach-cognitive-services%2523limits-when-no-cognitive-services-resource-is-selected)\
    \ 阅读关于将 `Cognitive Services` 资源附加到 `Azure Cognitive Search` 技能集的详细信息。在本练习中，我们仅执行命名实体识别增强。见图\
    \ 7-10。\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig10_HTML.jpg](img/499686_1_En_7_Fig10_HTML.jpg)\n\
    \n图 7-10：Azure 认知搜索 – 添加认知技能增强\n\n添加认知技能增强后，`Azure Cognitive Search` 设置的下一步是创建目标索引。如果你熟悉其他搜索程序，例如\
    \ `Apache Solr`、`Apache Lucene` 或 `Elasticsearch`，你可能知道索引有助于加速搜索。它存储用于全文搜索的内容，以便通过物理模式优化以实现更快的搜索。在图\
    \ 7-11 中，你将找到推荐的索引，以及列出的可检索、可筛选、可排序、可分面和可搜索的字段。这个目标索引让你能够出色地控制数据，从而可以精细地包含或排除要包含在搜索中的属性。对于数值，例如卧室和浴室的数量，你可以要求其可排序。Microsoft\
    \ 通过预选默认值使其变得非常容易，如图 7-11 所示。\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig11_HTML.jpg](img/499686_1_En_7_Fig11_HTML.jpg)\n\
    \n图 7-11：Azure 认知搜索 – 自定义目标索引\n\n最后一步是创建索引器并定义其运行频率（见图 7-12）。\n\n![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig12_HTML.jpg](img/499686_1_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12：Azure 认知搜索 – 创建索引器\n"
- fmt: '### Testing Azure Cognitive Search


    Once the indexer is created, you can go back to the dashboard and see the progress.
    You can invoke the service directly from the console. The search explorer provides
    you with the capability to do it right from the Azure portal, so that you can
    see the request and the response (result) and make sure it satisfies your business
    needs. Figure [7-13](#499686_1_En_7_Chapter.xhtml#Fig13) demonstrates invoking
    the service from the search explorer.


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig13_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    Azure Cognitive Search – invoking the service


    Microsoft has made it really easy for you to consume the service as part of your
    application. The search explorer tool also comes with a prebuilt HTML and JavaScript-based
    application, which serves as a getting started guide to build and test the search
    results in your application. Click **Create Demo App** to continue, and you will
    see the screen shown in Figure [7-14](#499686_1_En_7_Chapter.xhtml#Fig14), which
    requests you to enable CORS (cross-origin resource sharing).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig14_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig14_HTML.jpg)


    Figure 7-14


    Azure Cognitive Search – enabling CORS


    CORS is an HTTP header-based mechanism, which provides restriction measures for
    cross-domain invocation. By enabling it, you allow that an HTML file sitting on
    your desktop can invoke a RESTful API on Azure. In reality (read production),
    you probably want to be more careful, but this works for the demo app. Now you
    can start configuring the demo app for results, sidebar, and suggestions (as shown
    in Figure [7-15](#499686_1_En_7_Chapter.xhtml#Fig15)).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig15_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Azure Cognitive Search – Create Demo App


    And voila! We have a search engine for product listing. The HTML file `AzSearch.html`
    contains the code required to make the API call and to get the results for search
    and recommendations. For instance, we search for a home, as shown in Figure [7-16](#499686_1_En_7_Chapter.xhtml#Fig16).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig16_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Azure Cognitive Search – real estate search application


    The search returns the possible matches, as shown in Figure [7-17](#499686_1_En_7_Chapter.xhtml#Fig17).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig17_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig17_HTML.jpg)


    Figure 7-17


    Azure Cognitive Search – search application results


    It is impressive to see how quickly we can get started with a searchable real
    estate repository. Because the data already exists, the ability to search at lightning
    speed, with a minimal-code or no-code approach, is empowering for a lot of organizations.


    In the next example, we will use Azure Cognitive Search as part of the Jupyter
    notebook.


    ### Integrating Azure Cognitive Search in Your Notebooks


    In Chapter [6](#499686_1_En_6_Chapter.xhtml), we discussed Jupyter notebook, Anaconda,
    and the sheer effectiveness of these self-contained, executable Python notebooks,
    which come in very handy for data scientists. In this example, we will demonstrate
    how can you create and invoke the Azure Cognitive Search Python SDK.


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig18_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig18_HTML.jpg)


    Figure 7-18


    Azure Cognitive Search Python SDK – creating a search index


    1.  To get started, clone the repository^([^(18)](#fn18)) from GitHub (at [`https://github.com/Azure-Samples/azure-search-python-samples/tree/master/Quickstart/v11`](https://github.com/Azure-Samples/azure-search-python-samples/tree/master/Quickstart/v11)).
    Open it up as part of your Jupyter notebook, as shown in Figure [7-18](#499686_1_En_7_Chapter.xhtml#Fig18).


    Once opened, uncomment the `azure-search-documents` package to ensure you have
    the prerequisites, and then run the first cell. Behind the scenes, you loaded
    the Azure Cognitive Search Sample hotel dataset^([^(19)](#fn19)) from JSON files,
    which consists of 50 hotels in US cities with images, hotel, and room information.
    See Figure [7-19](#499686_1_En_7_Chapter.xhtml#Fig19).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig19_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig19_HTML.jpg)


    Figure 7-19


    Azure Cognitive Search – installing the prerequisites


    Once completed with the prerequisites, populate the service name and admin key
    with the information. You will find this information in the dashboard, keys, and
    endpoint section. The code then creates the SDK client, as shown in Figure [7-20](#499686_1_En_7_Chapter.xhtml#Fig20).
    The client (search client) is used to invoke the service.


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig20_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig20_HTML.jpg)


    Figure 7-20


    Azure Cognitive Search – setting the parameters


    Now we can check other parameters (like autocomplete) and invoke for incomplete
    text (like `"sa"`). You can imagine `sa` being typed, and behind the scenes, you
    get the result `san Antonio` or `Sarasota` (as shown in Figure [7-21](#499686_1_En_7_Chapter.xhtml#Fig21)).
    It then gets filtered by the user. All of these capabilities are built right into
    the APIs.


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig21_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig21_HTML.jpg)


    Figure 7-21


    Azure Cognitive Search – autocomplete invocation


    The APIs also allow for invoking the `get_document()` function to get the information
    about the specific items, in this case hotels. See the example shown in Figure
    [7-22](#499686_1_En_7_Chapter.xhtml#Fig22).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig22_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig22_HTML.jpg)


    Figure 7-22


    Azure Cognitive Search – document retrieval


    You can also append to the index and add a list of additional documents, such
    as hotels (as shown in Figure [7-23](#499686_1_En_7_Chapter.xhtml#Fig23)).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig23_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig23_HTML.jpg)


    Figure 7-23


    Azure Cognitive Search – additional documents (hotels)


    Then, upload the documents to the search client index, as shown in Figure [7-24](#499686_1_En_7_Chapter.xhtml#Fig24).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig24_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig24_HTML.jpg)


    Figure 7-24


    Azure Cognitive Search – uploading additional documents


    Now, you can run the queries on these additional hotels, as these are now part
    of the search index.


    In this section, you have learned how to complete searches, based on datasets
    like hotels and real estate, which are stored in a structured format (database)
    or in an unstructured form (documents). Now, we will explore Bing Web Search,
    to scour billions of pages on the Web for images, videos, news, and more.'
