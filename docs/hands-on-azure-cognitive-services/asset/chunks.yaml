    **代码清单 3-9** 人脸检测分析数据


    如果我们查看这些数据，可以很容易地判断出这张脸属于一个 41 岁的男性，黑发，戴着老花镜，脸上带着微笑。


    ### 使用代码实现


    借助这些 API，将 API 集成到现有代码中非常容易，或者你也可以编写一个新的应用程序来分析人脸。在本节中，我们包含了一个小型演示，以帮助你理解代码和 API
    的强大功能。你可以在仓库的 [仓库 URL] 中找到完整的代码。


    我们创建了一个 Visual Studio 项目。（请参考上一节回顾如何构建 Visual Studio 项目。）创建项目后，打开 NuGet 包管理器并搜索包
    `Microsoft.Azure.CognitiveServices.Vision.Face`。在右侧窗格中点击**安装**，如图 3-20 所示。


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig20_HTML.jpg](img/499686_1_En_3_Fig20_HTML.jpg)


    **图 3-20** 添加 NuGet 包


    之前，你创建了一个客户端来调用 Face API，并添加了一个命名空间。参见代码清单 3-10。这个命名空间将帮助你解析所有引用，从而可以轻松创建人脸客户端。


    ```

    using Microsoft.Azure.CognitiveServices.Vision.Face;

    ```


    **代码清单 3-10** 命名空间


    让我们创建一个人脸客户端。为此，你需要一个有效的订阅密钥。编写创建客户端的方法，如代码清单 3-11 所示。


    ```

    private static FaceClient AuthenticatedClient(string endpoint, string subscriptionKey)

    {

    ApiKeyServiceClientCredentials clientCredentials = new ApiKeyServiceClientCredentials(subscriptionKey);

    return new FaceClient(clientCredentials) { Endpoint = endpoint };

    }

    ```


    **代码清单 3-11** 创建人脸客户端


    这里，我们使用 `subscriptionkey` 作为客户端的凭据。然后我们提供端点来创建 `FaceClient`。


    让我们执行一次简单的人脸检测。这将通过获取识别出的人脸在图像中的位置，来提供其概览信息。在编写代码开始分析之前，我们必须添加几个命名空间，如代码清单 3-12
    所示。


    ```

    using Microsoft.Azure.CognitiveServices.Vision.Face;

    using Microsoft.Azure.CognitiveServices.Vision.Face.Models;

    ```


    **代码清单 3-12** 人脸模型命名空间


    模型命名空间将允许你访问包含分析数据的 `DetectedFace` 模型。我们通过使用人脸客户端添加了一个简单的 API 调用。我们使用了一个带有 URL
    的图像，如代码清单 3-13 所示。完整示例可在 GitHub (`https://github.com/Apress/hands-on-azure-cognitive-services/tree/main/Chapter%2003/Chap3FaceAnalysis`)
    上找到。


    ```

    IList faces = await client.Face.DetectWithUrlAsync(url: imgURL, returnFaceId:
    true, detectionModel: DetectionModel.Detection02);

    ```


    **代码清单 3-13** 请求 Face API


    在这段代码中，`Detection02` 是一个预定义的检测模型。在我们的演示示例中，你可以使用 `Detection01` 或 `Detection02`。有两种请求方法：`DetectWithUrlAsync`
    和 `DetectWithStreamAsync`。第一种方法从提供的 URL 中检测图像中的人脸。第二种方法（`DetectWithStreamAsync`）需要一个图像流。（这在构建用于上传图像的用户界面时非常重要。）代码清单
    3-14 展示了如何从 API 返回的 `DetectedFace` 模型列表中检索数据。


    ```

    foreach (var face in faces)

    {

    FaceRectangle rect = face.FaceRectangle;

    Console.WriteLine($"Face:{face.FaceId} is located in the image in marked point
    having dimensions: height-{rect.Height} width-{rect.Width} which is available
    from Top-{rect.Top} Left-{rect.Left}.");

    }

    ```


    **代码清单 3-14** 关于检测到的人脸的信息


    运行该项目。结果应类似于图 3-21 所示。


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig21_HTML.jpg](img/499686_1_En_3_Fig21_HTML.jpg)


    **图 3-21** 人脸分析输出

