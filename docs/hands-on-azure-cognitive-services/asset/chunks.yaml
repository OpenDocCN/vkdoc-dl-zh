  trans: '

    # 使用 Azure 容器实例


    “在我机器上能跑”是一个很好的目标，但你可能希望在无需承担完整编排平台（如 Kubernetes 和 Mesos）负担的情况下，实现可重复性、高性能、简洁性和速度。Azure
    容器实例（`ACI`）提供了一个很好的替代方案。`ACI` 是在 Azure 云中运行容器的一种快速且轻量的方式，你可以通过 Azure 容器注册表（`ACR`）管理自己的容器注册表。


    “这难道不是违背了初衷吗？”你可能会问。使用容器的原因是为了拥有控制权，而不是将东西部署到云上。现在我们却建议你将容器本身部署到云上？这听起来毫无道理。让我们来解释一下。


    除了合规性和数据保护之外，容器化的原因之一就是控制。如果你的组织或地区政策只允许你在特定区域托管、保存和处理客户数据，并且你想控制自己的部署流程，那么在 `ACI`
    中运行容器可能是管理自有数据中心的一个不错替代方案。借助微软云平台，你拥有多种选择——你可以自带硬件，使用轻量级的 `ACI`，或者选择像 `AKS` 这样的编排平台。让我们开始使用
    `ACI`：


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig21_HTML.jpg](img/499686_1_En_8_Fig21_HTML.jpg)


    图 8-21


    搜索 `ACI`


    1.  进入 Azure 门户，搜索“`ACI`”或“容器实例”，如图 8-21 所示。点击**容器实例**。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig22_HTML.jpg](img/499686_1_En_8_Fig22_HTML.jpg)


    图 8-22


    创建容器实例


    1.  创建容器实例，如图 8-22 所示。填写必填字段，然后选择镜像链接。在本例中，我们从 `MCR` 中选择微软文本分析镜像。


    在继续之前，你应该查看容器要求和建议^(²⁹)，然后确保你的容器实例配置与微软推荐的配置相匹配。当前规格列于图 8-23 中，但你应该核实必要的规格，因为它们可能会定期更改。我们现在生活在拥有数十亿参数模型的时代。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig23_HTML.jpg](img/499686_1_En_8_Fig23_HTML.jpg)


    图 8-23


    容器要求


    在我们的案例中，我们将使用语言检测容器，并通过点击**更改大小**来修改规格。然后你将看到“更改容器配置”屏幕，如图 8-24 所示。更新所需的 CPU 核心数和内存量。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig24_HTML.jpg](img/499686_1_En_8_Fig24_HTML.jpg)


    图 8-24


    配置资源需求


    现在你可以继续并创建容器。部署完成后，你将看到如图 8-25 所示的屏幕。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig25_HTML.jpg](img/499686_1_En_8_Fig25_HTML.jpg)


    图 8-25


    部署完成


    由于此容器是通过 `ACI` 部署在云中的，因此它有一个公共 IP（在我们的案例中，是 `52.146.70.12`）。你可以从浏览器访问该 IP，以查看如图
    8-26 所示的欢迎屏幕。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig26_HTML.jpg](img/499686_1_En_8_Fig26_HTML.jpg)


    图 8-26


    Azure 容器实例欢迎屏幕


    现在实例已就绪，你可以访问 API、调用服务等。我们稍后将详细说明这一点。

    '
- fmt: 'There are three different ways to build and deploy ACI and AKS containers
    – via the UI, Azure Cloud Shell, and terminal. In the example earlier, you saw
    how we can accomplish the task of creating and running a container via the UI.
    Now let’s switch to the command line interface (CLI). Azure Cloud Shell is a great
    way to perform command line work in the browser. You can access it from `shell.azure.com`,
    which will ask you to choose your flavor of cloud shell. See Figure [8-27](#499686_1_En_8_Chapter.xhtml#Fig27).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig27_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig27_HTML.jpg)


    Figure 8-27: Selecting a scripting language


    Upon selection of your scripting language, you will see the all-powerful terminal
    we all love, as shown in Figure [8-28](#499686_1_En_8_Chapter.xhtml#Fig28).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig28_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig28_HTML.jpg)


    Figure 8-28: Opening the Azure Cloud Shell


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig29_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig29_HTML.jpg)


    Figure 8-29: The Azure Cloud Shell and CLI


    1.  The following command creates a sentiment analysis Cognitive Services container
    in ACI. You will notice that it is very similar to the parameters passed in the
    earlier UI.


    ```

    aci=cognitiveservice-language-container

    az container create \

    -g cognitive-svc-book \

    -n cognitiveservice-language-container \

    --image mcr.microsoft.com/azure-cognitive-services/sentiment \

    -e Eula=accept Billing=''https://textanalyticsengine.cognitiveservices.azure.com/text/analytics/v2.0''
    ApiKey=''5e9a5dcd31d9458f8e6f51a488d86399'' \

    --ports 5000 \

    --cpu 4 \

    --memory 16 \

    --ip-address public

    ```


    2.  It is important to note that you can run this code on the Azure CLI^([^(30)](#fn30))
    as well, as shown side by side in Figure [8-29](#499686_1_En_8_Chapter.xhtml#Fig29).
    You would need Azure CLI installed. In this case, we will only use the Azure Cloud
    Shell.


    As the command runs in the cloud shell, it creates the instance and makes it available
    via public IP. You will see the completion response, as shown in Figure [8-30](#499686_1_En_8_Chapter.xhtml#Fig30).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig30_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig30_HTML.jpg)


    Figure 8-30: The completion response


    And now you can access the public IP, which is provided as part of a response
    to access the much sought-after container screens. See Figure [8-31](#499686_1_En_8_Chapter.xhtml#Fig31).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig31_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig31_HTML.jpg)


    Figure 8-31: The container welcome screens


    3.  Now the containers are running, thanks to the amazing infrastructure and CLI
    support that’s provided by Azure. We can easily invoke the sentiment analysis
    service.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig32_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig32_HTML.jpg)


    Figure 8-32: The sentiment analysis service


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig33_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig33_HTML.jpg)


    Figure 8-33: The browser response


    4.  The following code represents the simple request to get the sentiment data:


    ```

    {

    "documents": [

    {

    "language": "en",

    "id": "1-en",

    "text": "Hello world. This is some input text that I love."

    },

    {

    "language": "en",

    "id": "2-en",

    "text": "It''s incredibly sunny outside! I''m so happy."

    },

    {

    "language": "en",

    "id": "3-en",

    "text": "Pike place market is my favorite Seattle attraction."

    }

    ]

    }

    ```


    Once we invoke it via your browser, you will see the response, as shown in Figure
    [8-33](#499686_1_En_8_Chapter.xhtml#Fig33).


    > *The request body drop-down should be changed to `application/json`; the default
    `application/json-patch+json` will display unsupported content type error.*


    The JSON looks like the following, which we truncated to one document for brevity:


    ```

    {

    "statistics": {

    "documentsCount": 3,

    "validDocumentsCount": 3,

    "erroneousDocumentsCount": 0,

    "transactionsCount": 3

    },

    "documents": [

    {

    "id": "1-en",

    "sentiment": "positive",

    "confidenceScores": {

    "positive": 1,

    "neutral": 0,

    "negative": 0

    },

    "sentences": [

    ....

    "errors": [],

    "modelVersion": "2019-10-01"

    }

    ```


    And there you have it – the creation of an ACI container on Azure, both via a
    command line and web UI, and with invocation in the cloud.


    Now we will review the last approach, Azure Kubernetes Service (AKS), and we’ll
    see how to deploy an Azure Cognitive Services [Text Analytics](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers)
    container image to Azure Kubernetes Service.'
