  trans: '

    # 使用内容审查服务进行文本审核


    非结构化数据（尤其是文本和自然语言）是互联网上数量最庞大的数据形态。因此，能够摄取、消费、处理、过滤并准备这些数据以使其具有洞察力的技术备受追捧。对文本内容（无论是企业社交媒体领域中的评论、评价还是帖子）进行审核，正是内容审查服务大显身手的典型场景。


    内容审查服务的文本审核功能不仅限于检测脏话，还能帮助你将可疑语言分为三个不同类别。与图像审核类似，内容属于特定类别的置信度介于 0 到 1 之间，数值越高表示置信度越高（问题越小）。当服务建议进行人工审核时，`ReviewRecommended`
    标志会被设置为 true。你可以结合此标志与类别分数的阈值，来判断在你的特定场景下是否需要人工审核。


    输出类别代表不同程度的粗俗文本。类别 1 包含粗俗、露骨或成人内容，类别 2 则暗示含有性暗示语言。与图像审核不同，文本审核还有另一个类别——类别 3，表示轻度冒犯性语言。除了这些类别，文本审核还能检测文本中的个人身份信息（PII），例如电子邮件地址、IP
    地址、美国电话号码或美国邮寄地址。这在需要匿名化或编辑个人身份信息的场景中非常有用。自动文本纠错是内容审查服务提供的另一个非常实用的功能。


    要开始使用此服务，我们可以重复之前的内容审核服务流程，但这次针对的是文本。参见图 6-10。


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig10_HTML.jpg](img/499686_1_En_6_Fig10_HTML.jpg)


    图 6-10


    内容审查服务审核界面


    数据科学挑战网站 Kaggle 提供了一个“有毒评论分类挑战赛”，用于识别和分类有害的在线评论。数据集可以从 [`www.kaggle.com/c/jigsaw-toxic-comment-classification-challenge/data`](http://www.kaggle.com/c/jigsaw-toxic-comment-classification-challenge/data)
    下载，但我们强烈建议不要逐条阅读这些评论，因为它们可能非常有害（即粗俗且露骨）。我们从该数据集中选择了一条评论，用于测试该服务，你可以在图 6-11 中看到测试过程。


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig11_HTML.jpg](img/499686_1_En_6_Fig11_HTML.jpg)


    图 6-11


    内容审查服务文本审核界面


    如置信度数值所示，该评论既非粗俗（类别 1），也非性暗示（类别 2），但语言带有轻度冒犯性或防御性（类别 3）。`text.HasProfanity` 标志被设置为
    `False`，`text.hasPII` 标志同样为 `False`。在下一个示例中，我们选取了内容审查服务提供的一段示例文本，并将其提交审核，如图 6-12
    所示。


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig12_HTML.jpg](img/499686_1_En_6_Fig12_HTML.jpg)


    图 6-12


    内容审查服务文本提交界面


    在此案例中，评论包含个人身份信息（PII），包括电子邮件、电话号码、IP 地址和美国邮寄地址。这些信息已被检测到，如图 6-13 所示。


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig13_HTML.jpg](img/499686_1_En_6_Fig13_HTML.jpg)


    图 6-13


    内容审查服务文本提交界面


    在下一节中，我们将了解如何通过 API 将内容审核功能集成到你自己的应用程序中。

    '
- fmt: '### Moderating Text – Invoking the API


    Using the `Content Moderator` review workflow is okay, but there are several workflows
    where you want interactive responses and to build your own decision workflows.
    For example, for your product support chat rooms, you would like to ensure that
    any of posted chat contents that are category 1 or 2 (adult, profane, or sexually
    explicit) are automatically filtered. You can easily build the moderation system
    by using the `Content Moderator` APIs.


    The following steps show you how to consume the `Content Moderator` API:


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig14_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Azure portal `Content Moderator` service setup


    1. First things first, you need to set up a `Content Moderator` instance on Azure.
    Visit `portal.azure.com` and search for "content moderator cognitive service"
    in the search box, as shown in Figure [6-14](#499686_1_En_6_Chapter.xhtml#Fig14).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig15_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Azure portal `Content Moderator` service setup


    2. The `Content Moderator` service displays in the search results, as shown in
    Figure [6-15](#499686_1_En_6_Chapter.xhtml#Fig15). To proceed, click the `Content
    Moderator` pane.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig16_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig16_HTML.jpg)


    Figure 6-16


    Azure portal `Content Moderator` service setup


    3. The `Content Moderator` service detail screen is shown. To proceed, click the
    **Create** button, as shown in Figure [6-16](#499686_1_En_6_Chapter.xhtml#Fig16).


    Now you will create the `Content Moderator` instance, by selecting the subscription,
    resource group, instance information, and pricing tier. To continue, click the
    **Review + create** button, as shown in Figure [6-17](#499686_1_En_6_Chapter.xhtml#Fig17).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig17_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig17_HTML.jpg)


    Figure 6-17


    Azure portal `Content Moderator` service setup


    The validation occurs, and you see the screen in Figure [6-18](#499686_1_En_6_Chapter.xhtml#Fig18)
    (the validation passed).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig18_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig18_HTML.jpg)


    Figure 6-18


    Azure portal Create `Content Moderator` screen


    Click **Create** to continue deploying the service. You see the screen shown in
    Figure [6-19](#499686_1_En_6_Chapter.xhtml#Fig19), which shows the deployment
    status.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig19_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig19_HTML.jpg)


    Figure 6-19


    Azure portal Deployment is in progress screen


    Once the deployment is completed, you are taken to the screen shown in Figure
    [6-20](#499686_1_En_6_Chapter.xhtml#Fig20). To continue, click **Go to resource**.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig20_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig20_HTML.jpg)


    Figure 6-20


    Azure portal `Content Moderator` service deployment completed


    The resource screen shows you the Quick start page, where you can get the keys,
    make API calls, and view the SDK and documentation. See Figure [6-21](#499686_1_En_6_Chapter.xhtml#Fig21).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig21_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig21_HTML.jpg)


    Figure 6-21


    Azure portal `Content Moderator` Service Quick start


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig22_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig22_HTML.jpg)


    Figure 6-22


    Azure portal `Content Moderator` service Keys and Endpoint screen


    4. To invoke the API, you need the keys and the endpoint address. Click the **Keys
    and Endpoint** tab in the left pane. You will see the screen shown in Figure [6-22](#499686_1_En_6_Chapter.xhtml#Fig22),
    with the endpoint and keys.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig23_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig23_HTML.jpg)'
