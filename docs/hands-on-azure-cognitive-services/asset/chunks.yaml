- fmt: "#### Bing Video Search\n\n`Bing Video Search` API返回高质量视频。您可以建议搜索词、筛选和限制视频查询结果、创建视频缩略图预览、展示热门视频以及访问视频洞察。\n\
    \n#### Bing Visual Search\n\n`Bing Visual Search` API为单个图像（无论是上传的还是通过URL共享的）提供指标和洞察。您可以识别相似的图像和产品、识别图像的购物来源、访问其他人基于您图像内容进行的相关搜索、查找显示该图像的网页、查找图像中菜肴的食谱，以及利用图像自动收集关于某个实体的信息（例如图像中演员的信息或图像中地点的导航路线）。\n\
    \n#### Bing Autosuggest\n\n`Bing Autosuggest` API通过基于部分查询返回建议查询列表，来改善您的搜索体验。\n\
    \n#### Bing Spell Check\n\n`Bing Spell Check` API对任何文本执行语法和拼写检查。您可以检查俚语或非正式语言、区分相似单词，并追踪新品牌、标题和流行表达。\n\
    \n#### Bing Local Business Search\n\n`Bing Local Business Search` API帮助您查找企业的信息。您可以找到离您最近的餐厅（例如特定连锁店或某种类型的食物）、定位并绘制特定企业和地点的地图、限制搜索的距离参数，以及按类别筛选企业结果。\n\
    \n### Decision APIs\n\n`Decision APIs`帮助您创建个性化且具有内容审核功能的丰富用户体验。它们帮助您进行高效的决策。\n\
    \n#### Anomaly Detector (Preview)\n\n`Anomaly Detector`在撰写本书时处于预览阶段。它帮助您检测数据中的异常，以便将其移除。使用此服务时，您无需考虑哪种模型适合您的业务。`Anomaly\
    \ Detector`服务会自动确定最适合您数据的模型。\n\n#### Content Moderator\n\n`Content Moderator`帮助您识别业务不允许的内容或不适合业务的内容。它也会检查文本、图像和视频内容。例如，您可以移除亵渎和不理想的文本、识别包含亵渎内容的视频、审核成人及露骨的视频和图像内容、检查文本中是否包含个人身份信息（PII），以及检测其他冒犯性或不需要的图像。\n\
    \n#### Personalizer\n\n`Personalizer`帮助您为每个用户提供个性化的体验。它帮助您向不同用户展示不同且个性化的内容。这些内容可以是文本、图像、URL或电子邮件。\n\
    \n## Overview of Machine Learning\n\n关于机器学习的定义有很多。根据所有可用的定义，我们可以得出以下结论。\n\n机器学习是人工智能的一个子集，它为您提供了一种研究计算机算法的方法。在此过程中，计算机程序在学习了数据之后，可以预测未来事件。\n\
    \n我们的学习过程简单且持续。这个过程随时随地都在发生，比如在您走路、煮咖啡或购物时。每个学习都有其自身的范围和边界。例如，当您走路时，您的智能手表（一个装有程序的机器）会收集您的数据（如步数、里程、心率和血压）。再比如，当您去百货商店购物时，技术系统（如会员卡和支持软件）会根据您过去购买的商品来了解您的购买行为。\n\
    \n有了这些信息，机器就可以预测未来。例如，学习购买行为的机器可以预测客户会订购哪些商品。再比如，它可以帮助店主了解客户对特定商品的消费量。\n\n注意\n\
    \n总之，机器学习是一项帮助我们理解未来行为的研究。我们通过从各个方面研究数据来实现这一点，例如分析文本的情感倾向或分析图像以识别物体或人脸。\n\n机器学习过程包含几个阶段。这些阶段是迭代的，并且需要根据需求和/或训练进行重复。以下是最常见的阶段：\n\
    \n*   **数据收集阶段** – 在此阶段，数据被准备或收集。您根据训练需求或训练所需的组件来确定要收集哪些数据。\n\n*   **测试和开发训练模型**\
    \ – 这是测试学习并开发训练模型的阶段。例如，要为百货商店构建一个新的训练模型，我们需要分析杂货商品。您将使用算法来收集和访问数据。\n\n*   **部署和管理训练好的模型**\
    \ – 这是您可以看到实际输出的阶段。您也可以将此阶段称为“机器学习在行动”。\n\n微软通过多种计划使开发人员能够轻松做到这一点。您可以遵循上述阶段，并使用可用的微软技术来管理您的机器学习模型。\n\
    \n以下可用的各种微软技术可用于处理机器学习：\n\n*   **基于云** – Microsoft Azure 提供了大量选项，您可以使用云服务来处理机器学习。\n\
    \    *   `Cognitive Services` API（例如视觉、语音、语言和 Web 搜索）提供了复杂的预训练机器学习模型。\n\n*   **本地部署**\
    \ – 与基于云的选项类似，您有本地部署选项，其中本地（本地）服务器也可以在虚拟机中运行。最常用的服务如下：\n    *   `SQL Server Machine\
    \ Learning Services` 允许您将 Python 和 R 脚本与关系数据一起运行，用于预测分析和机器学习。\n\n*   `Microsoft\
    \ Machine Learning Server` 在 SQL Server 和 Teradata 中运行数据库内分析。\n\n*   **工具**\n\
    \    *   `Azure Data Science Virtual Machines`（DSVM）已预安装、配置并测试了各种机器学习和人工智能工具，以优化对机器学习和人工智能工作负载的支持。\n\
    \n*   `Azure Databricks` 基于 Apache Spark，可扩展分析，并从数据和人工智能解决方案中解锁洞察。\n\n*   `ML.NET`\
    \ 是一个开源且跨平台的机器学习框架，支持 Windows、Linux 和 macOS。它是为 .NET 开发人员构建的，可与 TensorFlow、ONNX\
    \ 和 Infer.NET 等机器学习库无缝协作。\n\n*   `Windows ML` 内置于 Windows 10 和 Windows Server\
    \ 2019 中。它是一个 API，可在为此优化的 Windows 设备上部署机器学习。\n\n*   `MMLSpark` 是一套开源工具，提供与 Azure\
    \ Spark 等的无缝集成。\n\n*   其他框架包括 PyTorch、Keras、ONNX 和 TensorFlow。\n\n*   **Azure\
    \ Machine Learning** – 这是一项基于 Azure 云的服务。它提供了一种训练、部署和管理机器学习模型的方法。（要开始使用 Azure\
    \ Machine Learning，请访问 [`https://ml.azure.com`](https://ml.azure.com)。）其主要优点是它是完全开源的，因此您可以利用以下技术：\n\
    \    *   `Azure Notebooks` 是一项免费服务，适用于使用笔记本并携带代码和应用程序的 R 开发人员。\n\n*   `Jupyter\
    \ Notebooks` 是一个开源项目，供开发人员积极成长和学习。\n\n*   `Azure Machine Learning` 可以回答您关于 Visual\
    \ Studio Code 的扩展问题。\n\n> *您可以在* [`https://aka.ms/AMLFree`](https://aka.ms/AMLFree)\
    \ *注册，获得 12 个月的免费 Azure Machine Learning 服务。*"
  raw: "#### Bing Video Search\n\nThe Bing Video Search API returns high-quality videos.\
    \ You can suggest search terms, filter and restrict the results of the video query,\
    \ create thumbnail previews of the videos, showcase trending videos, and access\
    \ video insights.\n\n#### Bing Visual Search\n\nThe Bing Visual Search API provides\
    \ metrics and insights for an individual image, whether one that is uploaded or\
    \ shared via a URL. You can identify similar images and products, identify shopping\
    \ sources for the image, access related searches made by others (based on the\
    \ content of your image), find the web pages that display the image, find recipes\
    \ for a dish featured in your image, and use the image to automatically gather\
    \ information about an entity (such as information about an actor in an image\
    \ or directions to a location in the image).\n\n#### Bing Autosuggest\n\nThe Bing\
    \ Autosuggest API can improve your search experience by returning a list of suggested\
    \ queries, based on a partial query.\n\n#### Bing Spell Check\n\nThe Bing Spell\
    \ Check API performs grammar and spell checking on any text. You can check for\
    \ slang or informal language, differentiate between similar words, and track new\
    \ brands, titles, and popular expressions.\n\n#### Bing Local Business Search\n\
    \nThe Bing Local Business Search API helps you find information about a business.\
    \ You can find the nearest restaurant to you (such as a specific chain or a type\
    \ of food), locate and map out specific businesses and places, limit the distance\
    \ parameters of your search, and filter the business results by category.\n\n\
    ### Decision APIs\n\nDecision APIs help you create a rich user experience that\
    \ is personalized, with content moderation. They help you perform efficient decision\
    \ making.\n\n#### Anomaly Detector (Preview)\n\nAnomaly Detector is in Preview,\
    \ at the time of writing this book. It helps you detect abnormalities in the data,\
    \ in order to remove them. When you use this service, you don’t need to think\
    \ about what model is fit for your business. The Anomaly Detector service automatically\
    \ determines the best-fit model of your data.\n\n#### Content Moderator\n\nContent\
    \ Moderator helps you identify the content that your business does not allow or\
    \ content that does not fit your business. It checks text, image, and video contents\
    \ as well. For example, you can remove profanity and undesirable text, you can\
    \ identify videos that contain profanity, you can moderate adult and racy video\
    \ and image content, you can check text for personally identifiable information\
    \ (PII), and you can detect other offensive or unwanted images.\n\n#### Personalizer\n\
    \nPersonalizer helps you give a personal experience to your user individually.\
    \ It helps you show different and personalized content, to individual users. The\
    \ content can be within text, images, URLs, or emails.\n\n## Overview of Machine\
    \ Learning\n\nThere are a lot of possible definitions of what machine learning\
    \ is. According to all the available definitions, we can conclude the following.\n\
    \nMachine learning is a subset AI that provides you with a way to study computer\
    \ algorithms. In this process, after studying the data, computer programs can\
    \ forecast future events.\n\nOur learning process is simple and continuous. The\
    \ process happens anytime and anywhere, like while you’re walking, making a coffee,\
    \ or purchasing items. Every learning has its own scope and boundaries. For example,\
    \ while you are walking, your smartwatch (a machine fitted with a program) collects\
    \ your data (such as step counts, miles, heartbeats, and your blood pressure).\
    \ For another example, while you visit the department store for purchases, technology\
    \ systems (like loyalty cards and supporting software) learn about your purchase\
    \ behavior, based on the items that you’ve purchased in the past.\n\nWith this\
    \ information, machines can predict the future. For example, the machine that\
    \ learns purchase behavior can predict which items would be ordered by their customers.\
    \ For another example, it helps the store owners understand how much a customer\
    \ consumes a particular item.\n\nNote\n\nIn summary, machine learning is a study\
    \ that helps us understand future behavior. We achieve this by studying data in\
    \ various aspects, such as analyzing text for emotional sentiment or analyzing\
    \ images to recognize objects or faces.\n\nThere are several phases in the machine\
    \ learning process. These phases are iterative and require repetition, based on\
    \ the requirement and/or training. Here are the most common phases:\n\n*   **Data\
    \ collection phase** – In this phase, the data is being prepared or collected.\
    \ You determine what data to collect, based on the need of training or the component\
    \ that is required for training.\n\n*   **Test and develop training models** –\
    \ This is the phase where the learning is being tested and where the training\
    \ models are developed. For example, to build a new training model for a department\
    \ store, we need to analyze the grocery items. You would gather and access the\
    \ data by using algorithms.\n\n*   **Deploy and manage trained models** – This\
    \ is the phase where you can see the actual output. You can also call this phase\
    \ *machine learning in action*.\n\nMicrosoft made this easy for developers, with\
    \ the help of various plans. You can follow the preceding phases and manage your\
    \ machine learning models, using the available Microsoft technologies.\n\nThe\
    \ following various Microsoft technologies are available, to work with ML:\n\n\
    *   **Cloud based** – Microsoft Azure provides a lot of options, where you can\
    \ use cloud services and work with machine learning.\n    *   Cognitive Services\
    \ APIs (such as Vision, Speech, Language, and Web Search) provide sophisticated\
    \ pretrained ML models.\n\n*   **On-premises** – Similar to cloud-based options,\
    \ you have on-premises options where local (on-premises) servers can also be run\
    \ in virtual machines. The most commonly used services are as follows:\n    *\
    \   SQL Server Machine Learning services allows you to run Python and R scripts\
    \ with relational data, for predictive analytics and machine learning.\n\n*  \
    \ Microsoft Machine Learning Server runs in-database analytics in SQL Server and\
    \ Teradata.\n\n*   **Tools**\n    *   Azure Data Science Virtual Machines (DSVMs)\
    \ are preinstalled, configured, and tested with various ML and AI tools, to optimize\
    \ support of ML and AI workloads.\n\n*   Azure Databricks is Apache Spark based,\
    \ scales analytics, and unlocks insights from data and AI solutions.\n\n*   ML.NET\
    \ is an open source and cross-platform ML framework that supports Windows, Linux,\
    \ and macOS. It is built for .NET developers, and it works seamlessly with ML\
    \ libraries, such as TensorFlow, ONNX, and Infer.NET.\n\n*   Windows ML is built\
    \ into Windows 10 and Windows Server 2019\\. It is an API that deploys ML on Windows\
    \ devices that are optimized for this purpose.\n\n*   MMLSpark is an open source\
    \ set of tools that provides seamless integration with Azure Spark and the like.\n\
    \n*   Additional frameworks include PyTorch, Keras, ONNX, and TensorFlow.\n\n\
    *   **Azure Machine Learning** – This is a service, based on the Azure cloud.\
    \ It provides a way to train, deploy, and manage machine learning models. (To\
    \ get started with Azure Machine Learning, go to [`https://ml.azure.com`](https://ml.azure.com).)\
    \ The main advantage of this is that it is fully open source, and so you can take\
    \ advantage of the following technologies:\n    *   Azure notebooks is a free\
    \ service for R developers who work with notebooks and bring their code and apps.\n\
    \n*   Jupyter notebooks is an open source project for developers to grow and learn\
    \ proactively.\n\n*   Azure Machine Learning can answer your extension questions\
    \ for Visual Studio Code.\n\n> *You can sign up at* [`https://aka.ms/AMLFree`](https://aka.ms/AMLFree)\
    \ *for 12 months of free Azure Machine Learning services.*"
  trans: "\n#### Bing 视频搜索\n\n`Bing Video Search` API 返回高质量视频。您可以建议搜索词、筛选和限制视频查询结果、创建视频缩略图预览、展示热门视频以及访问视频洞察。\n\
    \n#### Bing 视觉搜索\n\n`Bing Visual Search` API 为单个图像（无论是上传的还是通过 URL 共享的）提供指标和洞察。您可以识别相似的图像和产品、识别图像的购物来源、访问其他人基于您图像内容进行的相关搜索、查找显示该图像的网页、查找图像中菜肴的食谱，以及利用图像自动收集关于某个实体的信息（例如图像中演员的信息或图像中地点的导航路线）。\n\
    \n#### Bing 自动建议\n\n`Bing Autosuggest` API 通过基于部分查询返回建议查询列表，来改善您的搜索体验。\n\n####\
    \ Bing 拼写检查\n\n`Bing Spell Check` API 对任何文本执行语法和拼写检查。您可以检查俚语或非正式语言、区分相似单词，并追踪新品牌、标题和流行表达。\n\
    \n#### Bing 本地企业搜索\n\n`Bing Local Business Search` API 帮助您查找企业的信息。您可以找到离您最近的餐厅（例如特定连锁店或某种类型的食物）、定位并绘制特定企业和地点的地图、限制搜索的距离参数，以及按类别筛选企业结果。\n\
    \n### 决策 API\n\n`Decision APIs` 帮助您创建个性化且具有内容审核功能的丰富用户体验。它们帮助您进行高效的决策。\n\n####\
    \ 异常检测器（预览版）\n\n`Anomaly Detector` 在撰写本书时处于预览阶段。它帮助您检测数据中的异常，以便将其移除。使用此服务时，您无需考虑哪种模型适合您的业务。`Anomaly\
    \ Detector` 服务会自动确定最适合您数据的模型。\n\n#### 内容审查器\n\n`Content Moderator` 帮助您识别业务不允许的内容或不适合业务的内容。它也会检查文本、图像和视频内容。例如，您可以移除亵渎和不理想的文本、识别包含亵渎内容的视频、审核成人及露骨的视频和图像内容、检查文本中是否包含个人身份信息（PII），以及检测其他冒犯性或不需要的图像。\n\
    \n#### 个性化器\n\n`Personalizer` 帮助您为每个用户提供个性化的体验。它帮助您向不同用户展示不同且个性化的内容。这些内容可以是文本、图像、URL\
    \ 或电子邮件。\n\n## 机器学习概述\n\n关于机器学习的定义有很多。根据所有可用的定义，我们可以得出以下结论。\n\n机器学习是人工智能的一个子集，它为您提供了一种研究计算机算法的方法。在此过程中，计算机程序在学习了数据之后，可以预测未来事件。\n\
    \n我们的学习过程简单且持续。这个过程随时随地都在发生，比如在您走路、煮咖啡或购物时。每个学习都有其自身的范围和边界。例如，当您走路时，您的智能手表（一个装有程序的机器）会收集您的数据（如步数、里程、心率和血压）。再比如，当您去百货商店购物时，技术系统（如会员卡和支持软件）会根据您过去购买的商品来了解您的购买行为。\n\
    \n有了这些信息，机器就可以预测未来。例如，学习购买行为的机器可以预测客户会订购哪些商品。再比如，它可以帮助店主了解客户对特定商品的消费量。\n\n注意\n\
    \n总之，机器学习是一项帮助我们理解未来行为的研究。我们通过从各个方面研究数据来实现这一点，例如分析文本的情感倾向或分析图像以识别物体或人脸。\n\n机器学习过程包含几个阶段。这些阶段是迭代的，并且需要根据需求和/或训练进行重复。以下是最常见的阶段：\n\
    \n*   **数据收集阶段** – 在此阶段，数据被准备或收集。您根据训练需求或训练所需的组件来确定要收集哪些数据。\n\n*   **测试和开发训练模型**\
    \ – 这是测试学习并开发训练模型的阶段。例如，要为百货商店构建一个新的训练模型，我们需要分析杂货商品。您将使用算法来收集和访问数据。\n\n*   **部署和管理训练好的模型**\
    \ – 这是您可以看到实际输出的阶段。您也可以将此阶段称为“机器学习在行动”。\n\n微软通过多种计划使开发人员能够轻松做到这一点。您可以遵循上述阶段，并使用可用的微软技术来管理您的机器学习模型。\n\
    \n以下可用的各种微软技术可用于处理机器学习：\n\n*   **基于云** – Microsoft Azure 提供了大量选项，您可以使用云服务来处理机器学习。\n\
    \    *   `Cognitive Services` API（例如视觉、语音、语言和 Web 搜索）提供了复杂的预训练机器学习模型。\n\n*   **本地部署**\
    \ – 与基于云的选项类似，您有本地部署选项，其中本地（本地）服务器也可以在虚拟机中运行。最常用的服务如下：\n    *   `SQL Server Machine\
    \ Learning Services` 允许您将 Python 和 R 脚本与关系数据一起运行，用于预测分析和机器学习。\n\n*   `Microsoft\
    \ Machine Learning Server` 在 SQL Server 和 Teradata 中运行数据库内分析。\n\n*   **工具**\n\
    \    *   `Azure Data Science Virtual Machines`（DSVM）已预安装、配置并测试了各种机器学习和人工智能工具，以优化对机器学习和人工智能工作负载的支持。\n\
    \n*   `Azure Databricks` 基于 Apache Spark，可扩展分析，并从数据和人工智能解决方案中解锁洞察。\n\n*   `ML.NET`\
    \ 是一个开源且跨平台的机器学习框架，支持 Windows、Linux 和 macOS。它是为 .NET 开发人员构建的，可与 TensorFlow、ONNX\
    \ 和 Infer.NET 等机器学习库无缝协作。\n\n*   `Windows ML` 内置于 Windows 10 和 Windows Server\
    \ 2019 中。它是一个 API，可在为此优化的 Windows 设备上部署机器学习。\n\n*   `MMLSpark` 是一套开源工具，提供与 Azure\
    \ Spark 等的无缝集成。\n\n*   其他框架包括 PyTorch、Keras、ONNX 和 TensorFlow。\n\n*   **Azure\
    \ Machine Learning** – 这是一项基于 Azure 云的服务。它提供了一种训练、部署和管理机器学习模型的方法。（要开始使用 Azure\
    \ Machine Learning，请访问 [`https://ml.azure.com`](https://ml.azure.com)。）其主要优点是它是完全开源的，因此您可以利用以下技术：\n\
    \    *   `Azure Notebooks` 是一项免费服务，适用于使用笔记本并携带代码和应用程序的 R 开发人员。\n\n*   `Jupyter\
    \ Notebooks` 是一个开源项目，供开发人员积极成长和学习。\n\n*   `Azure Machine Learning` 可以回答您关于 Visual\
    \ Studio Code 的扩展问题。\n\n> *您可以在* [`https://aka.ms/AMLFree`](https://aka.ms/AMLFree)\
    \ *注册，获得 12 个月的免费 Azure Machine Learning 服务。*\n"
- fmt: '### Understanding the Use Cases


    Machine learning (`ML`) is getting more popular each day. More and more people
    are using it in their business requirements. The following industries prolifically
    use `ML`, to forecast their business needs, as well as artificial intelligence
    (`AI`) in general:


    - **Finance and banking** – `ML` is being used to understand the needs of future
    borrowers for credit decisions, to personalize loan options, as well as for determining
    loan eligibility. In addition, credit scoring is being driven by `AI`. Risk management
    is completely dependent on `AI`, in order to manage a massive amount of structured
    and unstructured data (by analyzing the history of issues, failures, and successes).
    Banking and leasing companies immediately find significant improvements when using
    cloud-based `AI` services to determine risk, rather than using their previous
    data science processes. `AI` and `ML` are also used for fraud prevention, trading,
    personalized banking, process automation, digital assistants, and account transaction
    security.


    - **Fraud detection** – Although the number of identity thefts are growing each
    year, `AI` and `ML` are being applied to countless data points in order to analyze
    and compare a consumer’s historical record and data, in order to identify and
    stop fraudulent transactions. As this trend continues, financial fraud is being
    caught more often and much sooner than ever before.


    - **Healthcare** – `AI` is being used for robotic surgery, virtual nursing assistants,
    and automating workflow and administrative activities. `AI` and `ML` are also
    used to make clinical judgments and to help diagnose patients. This includes detecting
    skin cancer, breast cancer, and an early detection and prediction of cancer in
    general, by examining medical records, habits, and genetic information. `AI` is
    also being used to identify cardiac arrests, based only on the tone of someone’s
    voice and the background noise in phone calls. `AI` is also being used for image
    analysis (such as `CT` scans), which results in an increased reliability in accurate
    detection and diagnosis of various inflictions, and it is already helping reduce
    hospital wait times.


    - **Retail, ecommerce, and advertising** – For the retail industry, `ML` is being
    used for supply chain planning, demand forecasting, customer intelligence, marketing
    campaigns and advertising, store operations, pricing, and product promotions.
    Stores are using loyalty cards in order to track who purchases what items. They
    predict their sales for every day of the calendar year, based on previous days
    in all the previous years, taking into account recent and annual trends and changes.
    The data is also used to staff appropriately, planning schedules and vacation
    hours around the demand, forecasting down to the time of day. From the very beginning,
    that data has also been used by online retailers and websites to advertise to
    you, based on your online purchases, searches, websites you visit, and content
    you view.


    - **Education** – `AI` is being used now to create unique, individualized learning
    systems. This intelligent instructional design provides students with challenges
    that are constantly meeting them where they are at, taking them to the next level
    the moment that they are ready. `AI` is enabling students universal access to
    global schools, including translating languages for students in order to understand
    foreign instructors. `AI` is also helping create learning opportunities for students
    who might have visual or hearing impairments. In addition, `AI` and `ML` are helping
    automate school and classroom administrative tasks, and they help provide tutoring
    and support to students outside the class.


    ## The COVID-19 SmartApp Scenario


    While we planned this book, we’re facing a Coronavirus disease (`COVID-19`) pandemic:
    [`www.who.int/emergencies/diseases/novel-coronavirus-2019`](http://www.who.int/emergencies/diseases/novel-coronavirus-2019).
    We decided to draft our examples in such a way so that we’d cover real-world use
    cases.


    The `COVID-19 SmartApp` covers the following scenarios:


    - Data collection

    - Data analysis

    - Vision analysis


    We’ll revisit the `COVID-19 SmartApp` throughout this book, offering samples and
    explanations, in order to provide you with an example of an end-to-end smart application.


    ## Summary


    The aim of this chapter was to set up the values, reasons, and impacts you can
    achieve through Microsoft Azure Cognitive Services. This discussion started with
    an overview of Azure Cognitive Services and why you would use Cognitive Services.
    We followed this with high-level overviews of the various APIs provided by Cognitive
    Services. These APIs minimize our efforts related to machine learning and artificial
    intelligence. This chapter also covered machine learning and the various offerings
    from Microsoft, including Azure Machine Learning.


    During this discussion, this chapter acknowledged the various use cases related
    to `AI` and `ML`. Finally, we briefly introduced you to our `COVID-19 SmartApp`.


    In the next chapter, we will continue with the discussion of Azure Cognitive Services.
    We will discuss how to get started with Azure Cognitive Services by exploring
    the Microsoft Azure portal.


    # 2. The Azure Portal for Cognitive Services


    This chapter will explore how you can get started with Cognitive Services on the
    Azure portal, and it includes an exploration of the common features. Next, the
    chapter will take you inside the Azure Marketplace for Bot Service, Cognitive
    Services, and Machine Learning.


    In this chapter, we will cover the following topics:


    - Getting started with the Azure portal and Azure Cognitive Services

    - Azure Marketplace – an overview of `AI` + Machine Learning

    - Understanding software development kits (`SDKs`) – to get started with your
    favorite programing language

    - Setting up your Visual Studio template'
