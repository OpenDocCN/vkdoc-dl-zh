    ## Introduction


    In about 400 BC, the Greek tale of Talos was told (and vividly illustrated). It
    was later chronicled in the epic poem, *Argonautica*, and its namesake is a giant
    automaton made of bronze, by Hephaestus, as requested by his father Zeus. This
    first robot (mythically speaking) sported wings, protected Europa (a woman) in
    Crete (an island), threw rocks at ships, and met his demise when Medea’s spirits
    drove him crazy enough to pull out his own nail (thus, disassemble himself). In
    the 300s (BC), Aristotle brought us his syllogistic logic, a deductive reasoning
    system. Hero of Alexandria applied mechanics, basic robotics, and wrote *Automata*
    in the first century AD. AI in robots continued in myths with Pandora, who was
    also created by Hephaestus (you know, it’s the story about the box), Pygmalian’s
    Galatea (thanks to Venus, this is a statue of a woman who came alive to bear a
    child; don’t ask), and then Jewish lore brought us Golems (in the early 1200s,
    AD), who are intelligent clay automatons that cannot speak.


    Likely, in 1495, Leonardo da Vinci expanded on the many clockmakers’ mechanical
    novelties to construct an automaton knight, and in 1515, we believe he continued
    his efforts to create a walking lion (presented to Francis I, the new King of
    France, and it’s said to have been able to open its chest to present the gift
    of lilies). In 1642, Pascal invented a mechanical calculator. Swift’s *Gulliver’s
    Travels* (1726) seemed to have described an engine that’s an AI computer and that
    forces knowledge on the poor Lilliputians. Punched cards came out in 1801, Mary
    Shelley scared us all with her intelligent *Frankenstein* in 1818, and in 1884,
    IBM got its start when Herman Hollerith invented a punched card tabulating machine
    to conduct the 1890 US census (that’s the simplified explanation). At the 1939
    World’s Fair (in New York), Westinghouse unveiled Elektro, the mechanical man
    (he smoked), and Sparko, his mechanical dog.


    Isaac Asimov wrote about robotics in 1950. Walt Disney (after having his Imagineers
    hack European wind-up novelties) developed a Dancing Man in 1961, he unveiled
    his tiki birds (which are in the tiki room) in 1963, he also recreated Abe Lincoln
    in 1963 for the 1964–1965 World’s Fair, and he put the first animatronics in film
    with a bird in 1964’s *Mary Poppins*. Ever since then, as computers evolved, we’ve
    been focused on building increasingly improved artificial intelligence in software
    and robotics (and we’ve been really hoping that our intelligent creations never
    take over and destroy us, like in *Terminator*, *Matrix*, or even *WALL-E*).


    We intended this book to act as an introduction to Azure Cognitive Services, but
    also for it to become your guide to implementing Cognitive Services in real-world
    application scenarios. That means that we take you on a tour of everything that
    Cognitive Services has to offer, and, as you can imagine, that’s quite a journey.


    Azure Cognitive Services are broken down into services and APIs that explore decision,
    language, speech, and vision. With these APIs and technologies, you can create
    the future software that powers our computers and robots for centuries to come!
    (Or you can just make a silly website.) In this book, we take you on a journey
    to build an application, one step at a time. Please join us. After all, you’re
    now walking in the footsteps of Aristotle, Hero, Hephaestus, Rabbi Loew (chief
    Golem mischief maker), Leonardo (not the turtle), Pascal, Gulliver, Mary Shelley,
    Hollerith, Elektro, Asimov, Disney, Bill Gates, Steve Jobs, and countless others.
    It’s time to make a creation that’s all your own.


    ## Acknowledgments


    To Rohit, our technical editor, for being so thorough, meticulous, detailed, careful,
    conscientious, diligent, scrupulous – we are running out of synonyms, but seriously,
    you rock.


    To Shrikant for his extreme patience and regular follow-ups; thank you for putting
    up with us. Ghosting you is virtually impossible; we tried!


    To Smriti for believing in us and this project!


    ## About the Authors About the Technical Reviewer


    # 1. The Power of Cognitive Services


    The terms artificial intelligence (AI) and machine learning (ML) are becoming
    more popular every day. Microsoft Azure Cognitive Services provides an opportunity
    to work with the top cutting-edge AI and ML technologies. To work with these technologies,
    we require some framework.


    The aim of this first chapter is to set up the values, reasons, and impacts that
    you can achieve through Azure Cognitive Services. The chapter provides an overview
    of the features and capabilities. In the upcoming sections, you will understand
    how Azure Cognitive Services is helpful and how it makes it easy for you to work
    with AI and ML.


    We also introduce you to our case study and the structures that we’ll use throughout
    the rest of the book.


    In this chapter, we cover the following topics:


    *   Overview of Azure Cognitive Services

    *   Exploring the Cognitive Services APIs: Vision, Speech, Language, Web Search,
    and Decision

    *   Overview of machine learning

    *   Understanding the use cases

    *   The COVID-19 SmartApp scenario'
