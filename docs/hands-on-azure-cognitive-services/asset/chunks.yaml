  raw: '## Creating and Understanding Language Models


    It should come as no surprise that most enterprise data is in an unstructured
    form. The algorithms that can understand the meaning of words in documents are
    in huge demand. Since the advent of transformer networks, the field of natural
    language processing has seen significant improvements in tasks, such as comprehension,
    questioning and answering, summarization, topic modeling, machine translation,
    sentiment analysis, text generation, information retrieval, and relationship extraction.
    These natural language processing tasks are only as diverse as the document types
    that we deal with in an enterprise.


    Training an enterprise language model requires an understanding of multiple modalities,
    as well as the nuances associated with a multitude of document types. Most unstructured
    data comes from emails, wikis (SharePoint, confluence, and so on), and other official
    documents, such as client agreements, vendor agreements, NDAs, employee contracts,
    loan and lease documents, investment and compliance documents, amendments, purchase
    orders, work orders, and so on. These documents vary in nomenclature, jargon,
    and terminologies, as well as in structure and form. A language model must also
    deal with legal documents and documents with governance and audit needs, such
    as term and termination, confidentiality, limitation of liability, indemnification,
    governing law, assignments, notices, and clauses, such as non-solicitation and
    noncompete. Extracting such legal clauses can be a challenging task, if applied
    in a general-purpose setting. A natural language processing pipeline comprises
    of a variety of steps, as shown in Figure [4-1](#499686_1_En_4_Chapter.xhtml#Fig1).


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig1_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    An end-to-end natural language processing pipeline – courtesy of [`https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology-choices/natural-language-processing`](https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology-choices/natural-language-processing)


    A typical language pipeline deals with multimodal data formats and storages, as
    well as with the NLP engine, which is one part of the entire end-to-end life cycle.
    For instance, one important use case of such a language model may require entity
    recognition. This could be beyond the typical subject, object, and verb pairs,
    but instead with business and contractual entities. These include the title of
    a document, party names and addresses, effective dates, terms and legal clauses,
    fees, copayments, and so on. Once identified and extracted, you’d analyze these
    entities, to be presented in the business report and translated into actionable
    items. For instance, if you would like to know when a particular LLC expires (in
    order to send an alert to your customer), you can use the extracted filing date
    and create an alert for 30, 60, and 90 days before the expiration, to let the
    customer know.


    As the industry matures, businesses now look for outcome-driven, end-to-end solutions
    and complete automated “jobs” (larger groups of tasks), as compared to individual,
    piecemeal tasks performed by the AI. In the next example, we’ll use a demo to
    show you how this unstructured text enrichment works.


    ## Enrichment in Progress – JFK Files Demo


    To demonstrate the power of Cognitive Services and Azure Machine Learning, Microsoft
    took the complex dataset of the JFK files and put together an impressive demo
    (see [`www.microsoft.com/ai/ai-lab-jfk-files`](http://www.microsoft.com/ai/ai-lab-jfk-files)).
    In this example, we will show you how the demo works and how you can recreate
    it for yourself. Figure [4-2](#499686_1_En_4_Chapter.xhtml#Fig2) shows the end-to-end
    enrichment model, starting with the blob storage, where complex files (such as
    photos, handwriting, and unclassified documents) are stored. Then, Cognitive Search
    is used to extract information.


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig2_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Azure Search for JFK files – courtesy of [`https://github.com/microsoft/AzureSearch_JFK_Files`](https://github.com/microsoft/AzureSearch_JFK_Files)


    ![../images/499686_1_En_4_Chapter/499686_1_En_4_Fig3_HTML.jpg](images/499686_1_En_4_Chapter/499686_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    ARM deployment of Azure Search for JFK files – courtesy of [`https://github.com/microsoft/AzureSearch_JFK_Files`](https://github.com/microsoft/AzureSearch_JFK_Files)


