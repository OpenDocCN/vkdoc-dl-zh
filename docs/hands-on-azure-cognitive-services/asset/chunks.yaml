    \ gender. See Figure [3-18](#499686_1_En_3_Chapter.xhtml#Fig18).\n\n![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig18_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig18_HTML.jpg)\n\
    \nFigure 3-18\n\nRequesting the Face Detect API\n\nNote\n\nThere are prebuilt\
    \ detection models to identify or analyze the human faces for the Face API – detection_01,\
    \ detection_02, and detection_03. Make sure you use the same detection model while\
    \ comparing or identifying similar human faces. In the demo example, we used detection_01\
    \ model.\n\nIf your request is valid and executed, it will return similar results\
    \ as what is shown in Listing [3-8](#499686_1_En_3_Chapter.xhtml#PC8).\n\n```\n\
    [{\n\"faceId\": \"0edfbefe-a73a-4143-b6bb-f722d39f97db\",\n\"faceRectangle\":\
    \ {\n\"top\": 45,\n\"left\": 195,\n\"width\": 42,\n\"height\": 42\n},\n\"faceLandmarks\"\
    : {\n\"pupilLeft\": {\n\"x\": 204.3,\n\"y\": 59.6\n},\n\"pupilRight\": {\n\"x\"\
