    in Figure [6-45](#499686_1_En_6_Chapter.xhtml#Fig45).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig45_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig45_HTML.jpg)


