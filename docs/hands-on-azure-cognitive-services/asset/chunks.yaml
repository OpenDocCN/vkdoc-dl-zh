  trans: "\n### 识别人脸\n\n计算机视觉 API 也有助于识别图像中的人脸。它会分析图像，并根据识别出的人脸返回不同类型的数据。\n\n大约有 27\
    \ 个预定义的界标点用于检测人脸。计算机视觉在处理图像时会使用这些预定义的界标点。请参考图片 [`https://docs.microsoft.com/en-us/azure/cognitive-services/face/images/landmarks.1.jpg`](https://docs.microsoft.com/en-us/azure/cognitive-services/face/images/landmarks.1.jpg)\
    \ 查看这些界标点的示意图。\n\n人脸 API 提供面部分析功能。你可以执行此分析来完成以下操作：\n\n- **检测图像中的人脸** – 它通过提取与面部相关的属性（如头部姿势、人物性别、年龄、情绪、胡须和眼镜）来检测人脸并提供分析数据。\n\
    - **查找图像中的相似人脸** – 你可能希望从数据库中搜索以找到某个人脸。此 API 可帮助你识别图像中的人脸。该 API 还能进一步缩小搜索范围，并提供两种识别人脸的方式：\n\
    \  - **matchPerson 模式** – 它首先匹配并识别同一个人，然后返回匹配结果。\n  - **matchFace 模式** – 它返回匹配结果，但忽略同一个人的面孔。此\
    \ API 不考虑面孔是否属于特定人物，而是查找所有面孔匹配项。换句话说，它返回可能属于或不属于同一个人的相似面孔匹配结果。\n- **识别人脸** – 想象一下自动标记人脸的功能，系统会自动用人物身份（姓名或任何符号标识符）标记图像，然后将其存储在数据库中。此\
    \ API 可帮助你从存储的图像数据库中识别特定人脸。\n\n要开始使用人脸识别，我们需要设置人脸 API。为此，请按照上一节中设置视觉 API 的相同步骤进行操作。搜索\
    \ **Face**，然后按照说明设置服务。\n\n> **注意**  \n> 如果你的需求非常有限，仅需从图像中识别人脸，那么你可以借助视觉 API，使用可选的\
    \ `visualFeatures` 参数^(¹) 来完成。如果你必须处理复杂场景（例如需要收集与面部分析相关的所有数据），那么我们建议你使用人脸 API。\n\
    \n请确保你也已设置好密钥和终结点。成功设置后，人脸资源屏幕应如图 3-17 所示。\n\n![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig17_HTML.jpg](img/499686_1_En_3_Fig17_HTML.jpg)\n\
    \n**图 3-17** 资源概览屏幕\n\n### 使用 API 控制台进行测试\n\n我们已经设置好了人脸 API。现在，让我们通过 API 控制台来测试它。你需要从\
    \ Azure 门户打开 API 控制台，方法是选择你创建资源所在的区域。出于演示目的，我们在美国中部区域创建了一个资源。我们将仅从该区域测试 API。我们使用一个非常简单的\
    \ API，称为 Face Detect，并附带一张随机图片（[`https://docs.microsoft.com/en-us/learn/wwl-data-ai/analyze-images-computer-vision/media/woman-roof.png`](https://docs.microsoft.com/en-us/learn/wwl-data-ai/analyze-images-computer-vision/media/woman-roof.png)）。我们还针对以下面部属性分析图像：年龄和性别。请参见图\
    \ 3-18。\n\n![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig18_HTML.jpg](img/499686_1_En_3_Fig18_HTML.jpg)\n\
    \n**图 3-18** 请求 Face Detect API\n\n> **注意**  \n> 人脸 API 有预构建的检测模型用于识别或分析人脸 – `detection_01`、`detection_02`\
    \ 和 `detection_03`。在比较或识别相似人脸时，请确保使用相同的检测模型。在演示示例中，我们使用了 `detection_01` 模型。\n\n\
    如果你的请求有效并成功执行，它将返回类似于清单 3-8 所示的结果。\n\n```\n[{\n\"faceId\": \"0edfbefe-a73a-4143-b6bb-f722d39f97db\"\
    ,\n\"faceRectangle\": {\n\"top\": 45,\n\"left\": 195,\n\"width\": 42,\n\"height\"\
    : 42\n},\n\"faceLandmarks\": {\n\"pupilLeft\": {\n\"x\": 204.3,\n\"y\": 59.6\n\
    },\n\"pupilRight\": {\n\"x\": 222.5,\n\"y\": 54.8\n},\n\"noseTip\": {\n\"x\":\
    \ 220.4,\n\"y\": 66.9\n},\n\"mouthLeft\": {\n\"x\": 209.6,\n\"y\": 78.4\n},\n\"\
    mouthRight\": {\n\"x\": 226.3,\n\"y\": 74.1\n},\n\"eyebrowLeftOuter\": {\n\"x\"\
    : 193.1,\n\"y\": 57.8\n},\n\"eyebrowLeftInner\": {\n\"x\": 210.0,\n\"y\": 51.9\n\
    },\n\"eyeLeftOuter\": {\n\"x\": 200.3,\n\"y\": 60.8\n},\n\"eyeLeftTop\": {\n\"\
    x\": 203.4,\n\"y\": 58.8\n},\n\"eyeLeftBottom\": {\n\"x\": 203.8,\n\"y\": 60.9\n\
    },\n\"eyeLeftInner\": {\n\"x\": 207.3,\n\"y\": 59.3\n},\n\"eyebrowRightInner\"\
    : {\n\"x\": 217.4,\n\"y\": 50.5\n},\n\"eyebrowRightOuter\": {\n\"x\": 226.6,\n\
    \"y\": 46.7\n},\n\"eyeRightInner\": {\n\"x\": 219.2,\n\"y\": 55.7\n},\n\"eyeRightTop\"\
    : {\n\"x\": 221.9,\n\"y\": 53.9\n},\n\"eyeRightBottom\": {\n\"x\": 222.4,\n\"\
    y\": 55.7\n},\n\"eyeRightOuter\": {\n\"x\": 224.9,\n\"y\": 53.9\n},\n\"noseRootLeft\"\
    : {\n\"x\": 211.4,\n\"y\": 58.3\n},\n\"noseRootRight\": {\n\"x\": 217.3,\n\"y\"\
    : 56.6\n},\n\"noseLeftAlarTop\": {\n\"x\": 213.5,\n\"y\": 65.5\n},\n\"noseRightAlarTop\"\
    : {\n\"x\": 221.4,\n\"y\": 63.0\n},\n\"noseLeftAlarOutTip\": {\n\"x\": 211.9,\n\
    \"y\": 69.3\n},\n\"noseRightAlarOutTip\": {\n\"x\": 225.1,\n\"y\": 65.4\n},\n\"\
    upperLipTop\": {\n\"x\": 220.3,\n\"y\": 73.8\n},\n\"upperLipBottom\": {\n\"x\"\
    : 220.6,\n\"y\": 75.4\n},\n\"underLipTop\": {\n\"x\": 221.3,\n\"y\": 79.1\n},\n\
    \"underLipBottom\": {\n\"x\": 222.2,\n\"y\": 81.5\n}\n},\n\"faceAttributes\":\
    \ {\n\"gender\": \"female\",\n\"age\": 25.0\n}\n}]\n```\n\n**清单 3-8** 检测人脸分析响应\n\
    \n在此，人脸 API 识别出人脸并附带以下属性：性别为女性，年龄为 25 岁。\n"
