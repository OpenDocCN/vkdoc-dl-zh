- fmt: 'We now need to create a list of `RankableAction` for the movies in our catalogue.
    Think of this as pretraining for the attributes and features that you have in
    your dataset. The rankable action takes a list of objects, which could be your
    products, news articles, or shopping cart items. It then applies the ranking and
    reward functions, based on the model. In this case, our `RankableAction` list
    looks like the following, which we have shortened for brevity:


    ```

    IList actions = new List

    {

    new RankableAction

    {

    Id = "Interstellar",

    Features =

    new List

    {

    new

    {

    imdb = 8.6, rottentomatoes = 72, popularityFeature = "blockbuster",

    genreFeature = "scifi", plot = "time paradox"

    }

    }

    },

    new RankableAction

    {

    Id = "Gattaca",

    Features = new List

    {

    new

    {

    imdb = 7.8, rottentomatoes = 82, popularityFeature = "cult-classic", genreFeature
    = "scifi",

    plot = "genetic profiling"

    }

    }

    },

    };

    ```


    This is part of the `IList<RankableAction> GetActions()` method. The other two
    methods are `GetPopularityFeatures()` and `GetGenrePreferences()`, as shown in
    Figures [6-40](#499686_1_En_6_Chapter.xhtml#Fig40) and [6-41](#499686_1_En_6_Chapter.xhtml#Fig41).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig42_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig42_HTML.jpg)


    Figure 6-42


    Personalizer service – setting the model update and reward frequency


    1. Now that we have set up the genres, with a set of some movies to train the
    initial model, we can start invoking the service. But before we do that, let’s
    set up the reward function’s wait time to five seconds, which allows for it to
    be retrained faster. There is a potential performance penalty for retraining so
    quickly, but for this example, it would be negligible. You can access the following
    screen from **Model and learning settings** in the left pane in the main console
    menu. Set the reward wait time, and then set the model update frequency to five
    seconds. See Figure [6-42](#499686_1_En_6_Chapter.xhtml#Fig42).


    2. To start the ranking and reward process, you can run the program by pressing
    `F5`. The entire code list is available as part of `program.cs` file in the Personalizer
    repository of this book. We will do a walk through of important parts of the code.


    First, get the context information, such as the popularity features and movie
    genre preferences from the users, via the following lines:


    ```

    var popularityFeatures = GetPopularityFeatures();

    var genreFeatures = GetGenrePreferences();

    ```


    Next, create a current context, based on the user’s data as a list of objects.
    See the following code:


    ```

    IList currentContext = new List

    {

    new {popularity = popularityFeatures},

    new {genre = genreFeatures}

    };

    ```


    You can also create a list of excluded actions, any attributes that you want to
    be considered for ranking. In this case, we don’t have any, so we will leave it
    empty, as follows:


    ```

    IList excludeActions = new List {""};

    ```


    Now, we generate an event ID to associate with the request, as follows:


    ```

    var eventId = Guid.NewGuid().ToString();

    ```


    We then proceed with ranking the actions. The `RankRequest()` method takes the
    action, context, and exclusion actions, and then it makes the service call. This
    call could be part of any of your existing workflows, such as doomsday scroll,
    serving movie recommendations, generating offers for your new customers, and so
    on. See the following code:


    ```

    var request = new RankRequest(actions, currentContext, excludeActions, eventId);

    var response = client.Rank(request);

    ```


    The response you get has a reward action ID. Remember, this is based on the `RankableAction`
    set earlier, so it will be a movie recommendation in our case. See the following
    line:


    ```

    Console.WriteLine("\nPersonalizer service thinks you would like to have: " + response.RewardActionId
    +". Is this correct? (y/n)");

    ```


    Here, you make the call. If you like the recommendation, you can adjust the reward
    accordingly and the model learns, as shown in the following:


    ```

    if (answer == "Y")

    {

    reward = 1;

    Console.WriteLine("\nGreat! Enjoy your movie.");

    }

    else if (answer == "N")

    {

    reward = 0;

    Console.WriteLine("\nYou didn''t like the recommended movie choice.");

    }

    ```


    You also get all the other actions and corresponding probabilities as part of
    the response object. See the following code:


    ```

    Console.WriteLine("\nPersonalizer service ranked the actions with the probabilities
    as below:");

    foreach (var rankedResponse in response.Ranking)

    Console.WriteLine(rankedResponse.Id + " " + rankedResponse.Probability);

    // Send the reward for the action based on user response.

    client.Reward(response.EventId, new RewardRequest(reward));

    ```


    Next, you send the reward for retraining. The process continues to learn, explore,
    exploit, and retrain as part of the loop, until you exit. This loop is an analogy
    to how your ecommerce website would have the recommendations system running.


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig43_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig43_HTML.jpg)


    Figure 6-43


    Personalizer service – ranking and reward demo


    3. You can now run this program to see the code in action. It asks for the popularity
    feature and genre, and then it lists the recommended movie. During a cold start
    with limited data, the probabilities of all the products are equally divided.
    It changes as the Personalizer engine learns. See Figure [6-43](#499686_1_En_6_Chapter.xhtml#Fig43).


    As the results show in Figure [6-43](#499686_1_En_6_Chapter.xhtml#Fig43), *Interstellar*
    is the recommended movie with the highest probability, while rest of the items
    are shown with their respective rankings. There are multiple ways to train. It
    includes the Apprentice mode, where you can train the Personalizer without impacting
    the production application. Learn how to use Apprentice mode to train Personalizer,
    at [`https://docs.microsoft.com/en-us/azure/cognitive-services/personalizer/concept-apprentice-mode`](https://docs.microsoft.com/en-us/azure/cognitive-services/personalizer/concept-apprentice-mode).
    You can also build feature types to create specific personas for users, based
    on their attributes. You can then customize the reward functions accordingly.


    A very important thing to note is that the resulting recommendation is not always
    based on the highest ranking. This concept is referred to as the exploration vs.
    exploitation trade-off. For example, you might love horror movies, but if I just
    keep recommending *The Exorcist* over and over again, you will definitely miss
    out on all the other subgenres of horror, which may have ghosts and ghouls, monsters,
    paranormal activities, and poltergeists. Therefore, it is important to balance
    between exploration and exploitation in the search space. You should balance between
    wider-ranging recommendations and exploiting the reward function (where you maximize
    the reward, based on previous behavior). This approach is used to expand the figurative
    horizon of the model. You can read more about how to do this with the Anomaly
    Detector service, at [`https://docs.microsoft.com/en-us/azure/cognitive-services/anomaly-detector/overview`](https://docs.microsoft.com/en-us/azure/cognitive-services/anomaly-detector/overview).


    In the next iteration, I asked our recommender for an indie sci-fi movie, and
    I got *The Man from Earth*, which is again a good recommendation, even though
    it’s not the highest rated (as shown in Figure [6-44](#499686_1_En_6_Chapter.xhtml#Fig44)).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig44_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig44_HTML.jpg)


    Figure 6-44


    Personalizer service – ranking and reward demo'
