- fmt: '# Moderating Text Using Content Moderator Service


    Unstructured data (especially text and natural language) is the largest modality
    of data available on the Internet. Therefore, the technologies to ingest, consume,
    process, filter, and prepare to make it insightful are highly sought after. Moderation
    of text contents, whether they are comments, reviews, or posts in your corporate
    social media domain, is exactly the kind of problems where the Content Moderator
    service shines.


    The text moderation capabilities of the Content Moderator service are not limited
    to profanity, but it also helps you classify the questionable language in three
    different categories. Like the image moderator, the confidence of contents falling
    in a specific category is between 0 and 1, where higher number demonstrates greater
    confidence (less of an issue). The `ReviewRecommended` flag is set to true, in
    case the service recommends a manual review. You can use this flag, along with
    the threshold for the category score, to determine whether a review is warranted
    in your specific case.


    The output categories signify different degrees of profane text. Category 1 contains
    profane, explicit, or adult language, while category 2 implies sexually suggestive
    language use. Unlike image moderation, there is another category for text moderation,
    category 3, which implies mildly offensive language. Besides these categories,
    text moderation also detects personally identifiable information (PII) in the
    text, such as email addresses, IP address, a US phone number, or a US mailing
    address. This helps in scenarios when personally identifiable information may
    need to be anonymized or redacted. Auto text correction is another highly useful
    feature provided by the Content Moderator service.


    To get started with this service, we can repeat the content moderation service
    process as before, but this time with text. See Figure [6-10](#499686_1_En_6_Chapter.xhtml#Fig10).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig10_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Content Moderator service review screen


    Kaggle, the data science challenge website, provides a Toxic Comment Classification
    Challenge to identify and classify toxic online comments. The dataset can be downloaded
    from [`www.kaggle.com/c/jigsaw-toxic-comment-classification-challenge/data`](http://www.kaggle.com/c/jigsaw-toxic-comment-classification-challenge/data),
    but we highly recommend not to read through these comments, and they can be very
    toxic (meaning profane and explicit). We have selected a comment from this dataset
    to be tested against the service, and you can see it being tried out in Figure
    [6-11](#499686_1_En_6_Chapter.xhtml#Fig11).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig11_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Content Moderator service text review screen


    As the confidence numbers show, the comment is neither profane (category 1) nor
    sexually suggestive (category 2), but the language is mildly offensive or defensive
    (category 3). The `text.HasProfanity` flag is set to `False`, and so is the `text.hasPII`
    flag. In the next example, we take a sample text that’s provided by the Content
    Moderator service, and we submit it to be moderated, as shown in Figure [6-12](#499686_1_En_6_Chapter.xhtml#Fig12).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig12_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Content Moderator service text submission screen


    In this case, the comment has PII information, including an email, phone number,
    IP address, and US mailing address. This is detected and can be seen in Figure
    [6-13](#499686_1_En_6_Chapter.xhtml#Fig13).


    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig13_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Content Moderator service text submission screen


    In the next section, we will see how to integrate the content moderation capabilities
    in your own application, via APIs.'
