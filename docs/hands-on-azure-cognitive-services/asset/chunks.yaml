  trans: '

    构建和部署 ACI 与 AKS 容器有三种不同方式：通过 UI、Azure Cloud Shell 和终端。在前面的示例中，你已经了解了如何通过 UI 完成创建和运行容器的任务。现在，让我们切换到命令行界面（CLI）。Azure
    Cloud Shell 是在浏览器中执行命令行操作的绝佳方式。你可以从 `shell.azure.com` 访问它，系统会要求你选择偏好的云 Shell 类型。见图
    8-27。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig27_HTML.jpg](img/499686_1_En_8_Fig27_HTML.jpg)


    图 8-27：选择脚本语言


    选择脚本语言后，你将看到我们都喜爱的强大终端，如图 8-28 所示。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig28_HTML.jpg](img/499686_1_En_8_Fig28_HTML.jpg)


    图 8-28：打开 Azure Cloud Shell


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig29_HTML.jpg](img/499686_1_En_8_Fig29_HTML.jpg)


    图 8-29：Azure Cloud Shell 与 CLI


    1.  以下命令在 ACI 中创建一个情感分析认知服务容器。你会注意到，它与之前 UI 中传递的参数非常相似。


    ```

    aci=cognitiveservice-language-container

    az container create \

    -g cognitive-svc-book \

    -n cognitiveservice-language-container \

    --image mcr.microsoft.com/azure-cognitive-services/sentiment \

    -e Eula=accept Billing=''https://textanalyticsengine.cognitiveservices.azure.com/text/analytics/v2.0''
    ApiKey=''5e9a5dcd31d9458f8e6f51a488d86399'' \

    --ports 5000 \

    --cpu 4 \

    --memory 16 \

    --ip-address public

    ```


    2.  需要注意的是，你也可以在 Azure CLI^(³⁰) 上运行此代码，如图 8-29 中并排显示的那样。你需要安装 Azure CLI。在本例中，我们将仅使用
    Azure Cloud Shell。


    当命令在云 Shell 中运行时，它会创建实例并通过公共 IP 使其可用。你将看到完成响应，如图 8-30 所示。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig30_HTML.jpg](img/499686_1_En_8_Fig30_HTML.jpg)


    图 8-30：完成响应


    现在，你可以访问作为响应一部分提供的公共 IP，以访问备受期待的容器屏幕。见图 8-31。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig31_HTML.jpg](img/499686_1_En_8_Fig31_HTML.jpg)


    图 8-31：容器欢迎屏幕


    3.  现在，得益于 Azure 提供的强大基础设施和 CLI 支持，容器正在运行。我们可以轻松调用情感分析服务。


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig32_HTML.jpg](img/499686_1_En_8_Fig32_HTML.jpg)


    图 8-32：情感分析服务


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig33_HTML.jpg](img/499686_1_En_8_Fig33_HTML.jpg)


    图 8-33：浏览器响应


    4.  以下代码表示获取情感数据的简单请求：


    ```

    {

    "documents": [

    {

    "language": "en",

    "id": "1-en",

    "text": "Hello world. This is some input text that I love."

    },

    {

    "language": "en",

    "id": "2-en",

    "text": "It''s incredibly sunny outside! I''m so happy."

    },

    {

    "language": "en",

    "id": "3-en",

    "text": "Pike place market is my favorite Seattle attraction."

    }

    ]

    }

    ```


    一旦我们通过浏览器调用它，你将看到响应，如图 8-33 所示。


    > *请求正文下拉菜单应更改为 `application/json`；默认的 `application/json-patch+json` 将显示不支持的 content
    type 错误。*


    JSON 内容如下所示，为简洁起见，我们将其截断为一个文档：


    ```

    {

    "statistics": {

    "documentsCount": 3,

    "validDocumentsCount": 3,

    "erroneousDocumentsCount": 0,

    "transactionsCount": 3

    },

    "documents": [

    {

    "id": "1-en",

    "sentiment": "positive",

    "confidenceScores": {

    "positive": 1,

    "neutral": 0,

    "negative": 0

    },

    "sentences": [

    ....

    "errors": [],

    "modelVersion": "2019-10-01"

    }

    ```


    至此，你已经完成了在 Azure 上创建 ACI 容器的过程——既通过命令行，也通过 Web UI，并在云中进行了调用。


    现在，我们将回顾最后一种方法：Azure Kubernetes 服务（AKS），并了解如何将 Azure 认知服务[文本分析](https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics-how-to-install-containers)容器镜像部署到
    Azure Kubernetes 服务。

    '
- fmt: '# Deploying a Cognitive Services Container with Azure Kubernetes Service


    ACI helps you deploy a container, but what if you have to deploy and manage a
    bunch of these? Kubernetes is an open source orchestration engine that helps you
    build, deploy, and manage these containers at scale. Azure Kubernetes Service
    (AKS) is a managed Kubernetes service on Azure cloud, which, as far as managed
    services go, is pretty awesome since it’s free. Yes, you don’t have to pay for
    AKS, only for the nodes you use. You can create AKS clusters via web UI, CLI,
    or by using templates.


    Let’s start with building the Kubernetes Service. As always, `portal.azure.com`
    is our one-stop shop. Search for “Kubernetes Service,” and then click **Create**.
    See Figure [8-34](#499686_1_En_8_Chapter.xhtml#Fig34).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig34_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig34_HTML.jpg)


    Figure 8-34


    Kubernetes Service in the Azure portal


    Fill out the Create Kubernetes cluster page with the default settings, as shown
    in Figure [8-35](#499686_1_En_8_Chapter.xhtml#Fig35). In the cluster, you have
    options to customize node pools, authentication, advance networking settings,
    and integrations. See Figure [8-35](#499686_1_En_8_Chapter.xhtml#Fig35). Details
    about individual parameters, and their possible settings, can be found here^([^(31)](#fn31)).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig35_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig35_HTML.jpg)


    Figure 8-35


    Create Kubernetes cluster


    Click **Review + create** to proceed, and you will see the screen shown in Figure
    [8-36](#499686_1_En_8_Chapter.xhtml#Fig36), once the cluster is deployed (which
    can take some time).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig36_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig36_HTML.jpg)


    Figure 8-36


    The cluster is deployed


    Once the cluster is deployed, you will want to sign in to the AKS cluster. Use
    the following command to sign into the cluster:


    ```

    az aks get-credentials --name cognitive-svc-k8 --resource-group cognitive-svc-book

    ```


    You can run this command in the terminal, with Azure CLI installed, and see the
    output shown in Figure [8-37](#499686_1_En_8_Chapter.xhtml#Fig37). Make sure you
    replace your own resource group and AKS cluster name in the command.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig37_HTML.png](images/499686_1_En_8_Chapter/499686_1_En_8_Fig37_HTML.png)


    Figure 8-37


    Cluster sign-in output


    The cluster is successfully created, but it does not include any container nodes.
    So, let’s fix that by creating a key phrase Cognitive Services container to the
    K8s cluster. To accomplish adding containers to the cluster, we will need to add
    this information in the K8s config file. Kubernetes uses YAML for its configuration
    settings. (YAML originally stood for *Yet Another Markup Language* as a silly
    name, but it was changed to *YAML Ain’t Markup Language* to show that it is intended
    to be used for data-oriented purposes, rather than document markup.)


    We will use Visual Studio 2019 for Mac to edit it (as shown in Figure [8-38](#499686_1_En_8_Chapter.xhtml#Fig38)),
    but feel free to use the editor of your choice.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig38_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig38_HTML.jpg)


    Figure 8-38


    Visual Studio 2019 for Mac


    The YAML file (pronounced *yamel*, like *camel*) is fairly simple, as shown in
    Figure [8-39](#499686_1_En_8_Chapter.xhtml#Fig39). Here, we define the container
    name, the image path, the ports, what kind of resources to allocate, the billing
    URL, and the API key – similar to what was done earlier for creating an ACI container.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig39_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig39_HTML.jpg)


    Figure 8-39


    The YAML file


    You can now apply this YAML to the container, by using the following command:


    ```

    kubectl apply -f keyphrase.yaml

    ```


    The command line will show the results from Figure [8-40](#499686_1_En_8_Chapter.xhtml#Fig40),
    as the deployment container is created.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig40_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig40_HTML.jpg)


    Figure 8-40


    The deployment container is created


    Now you can verify that the pod (the smallest deployable unit, in this case the
    Cognitive Service container and associated services and dependencies) was deployed
    and the services are running, as shown in Figure [8-41](#499686_1_En_8_Chapter.xhtml#Fig41).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig41_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig41_HTML.jpg)


    Figure 8-41


    Verifying the deployment


    As the earlier screenshot shows, the container is now accessible via a public
    IP address, [`http://20.75.16.10:5000/`](http://20.75.16.10:5000/), and it can
    be invoked to gain access to the Cognitive Services container and associated APIs.
    After connecting to the cluster, you can run a variety of different commands,
    as shown in Figure [8-42](#499686_1_En_8_Chapter.xhtml#Fig42).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig42_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig42_HTML.jpg)


    Figure 8-42


    Different commands you can use


    These commands, and the logs screen shown in Figure [8-43](#499686_1_En_8_Chapter.xhtml#Fig43),
    show the amount of control you have over your container management with K8s, as
    compared to a single individual ACI deployment.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig43_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig43_HTML.jpg)


    Figure 8-43


    The Logs screen


    ## Summary and Conclusion


    Containers are contained, barely. The world of containers is as big as the thriving
    discipline of DevOps, and it’s extremely difficult to cover it in a short chapter.
    We tried our best to help you develop an understanding of the Cognitive Services
    container ecosystem. We explored Docker, ACI, and AKS, and we looked into how
    the containers work in different settings. You then created samples, which call
    the self-contained code from containers, without calling the Cognitive Services
    directly.


    You now have the fundamentals to start exploring and to use these technologies
    for your own business use cases. Your regulatory, compliance, infrastructure,
    and operational use cases will be different, but these fundamentals will help
    you get started with containerization within your organization.


    Keep containerization!


    # Azure Bot Services


    Human: What do we want?


    Machine: Context-aware NLP bots


    Human: When do we want it?


    Machine: When do we want what?


    Natural language processing (NLP) is a core element of a bot service. Unlike our
    joke, we want to develop artificial intelligence (AI) in our bots, to understand
    the context of a conversation. Bots are conversational user interfaces that allow
    you to communicate with the machines in different modalities, such as text and
    voice. Azure Bot Services is a cloud based, managed, integrated environment to
    empower bot development, hosting, and management. Azure Bot Services allow you
    to focus on what’s important, the crux of conversational interface, while it handles
    the infrastructure and associated toolset. Powered by the comprehensive Bot Framework,
    Bot Services comes with prebuilt templates for you to get started, providing a
    browser-based interface to make bot development as easy as possible.


    In this chapter, we will provide insights on Bot Services by creating the COVID-19
    QnA Bot. You will learn the following topics:


    1.  Understanding Azure Bot Services

    2.  Creating a COVID-19 bot using Azure Bot Services

    3.  Using the Azure Bot Builder SDK^([^(32)](#fn32))'
