- fmt: '# 排版后的内容


    1.  Back at QnA Maker, step 2 is to connect the QnA service, which we just connected
    to our knowledge base. It usually takes around ten minutes after the resource
    is created for the runtime to be ready. Then can we select the service, and create
    the KB in QnA Maker portal. Click **Refresh** on the screen shown in Figure [9-9](#499686_1_En_9_Chapter.xhtml#Fig9),
    to populate the respective fields.


    Once populated, you should name your knowledge base. We called it `CDCQnABotKB`.
    See Figure [9-10](#499686_1_En_9_Chapter.xhtml#Fig10).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig10_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    QnA Portal – name the knowledge base


    And then finally, you would now make your KB (knowledge base), meaning that you
    will populate it with the contents. There are a few ways of uploading content
    to the knowledge base. First, you can provide a URL or files to read from. See
    Figure [9-11](#499686_1_En_9_Chapter.xhtml#Fig11).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig11_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig11_HTML.jpg)


    Figure 9-11


    QnA portal – populate the knowledge base


    In this case, we are getting the information from CDC corona virus FAQs^([^(34)](#fn34)),
    and we put it in a text file (as shown in Figure [9-12](#499686_1_En_9_Chapter.xhtml#Fig12)),
    which we uploaded to the knowledge base via the Add File option. You can also
    use the PDF files.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig12_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig12_HTML.jpg)


    Figure 9-12


    Knowledge base file containing the cleaned up CDC data


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig13_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig13_HTML.jpg)


    Figure 9-13


    QnA portal – adding the chitchat module to the knowledge base


    1.  In this step, you can give your bot a personality by adding some predefined
    small talk questions with personas. The personas (shown in Figure [9-13](#499686_1_En_9_Chapter.xhtml#Fig13))
    are provided as part of the chitchat capability in Azure Bot Services.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig14_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig14_HTML.jpg)


    Figure 9-14


    QnA portal – create your knowledge base


    1.  The final step is to create your knowledge base. Click **Create your KB**,
    as shown in Figure [9-14](#499686_1_En_9_Chapter.xhtml#Fig14).


    After a brief loading screen, you can now see all the questions and answers, as
    part of the QnA Maker knowledge base (as shown in Figure [9-15](#499686_1_En_9_Chapter.xhtml#Fig15)).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig15_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig15_HTML.jpg)


    Figure 9-15


    QnA portal – the knowledge base populated with 190 questions


    This web-based IDE is quite useful for managing questions and answers, adding
    alternative phrasing, testing the questions and answers, and providing alternative
    answers (if needed). For example, in Figure [9-16](#499686_1_En_9_Chapter.xhtml#Fig16),
    we searched for the keyword *swimming*, to see what the CDC guidelines are for
    swimming. In this case, it’s just a keyword search, not a question and answer.
    See Figure [9-16](#499686_1_En_9_Chapter.xhtml#Fig16).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig16_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig16_HTML.jpg)


    Figure 9-16


    QnA portal – searching the knowledge base


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig17_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig17_HTML.jpg)


    Figure 9-17


    QnA portal – publishing the knowledge base


    1.  Here, you see the question and answer pair appear with the right answer. Notice
    that the question does not directly include the word *swimming*, but it implies
    the bodies of water, and the complete answer refers to the *swimming* key term.
    Now it’s time to publish the serivce, for the world to see. Click the **Publish**
    tab in the top menu, and then click the **Publish** button (as shown in Figure
    [9-17](#499686_1_En_9_Chapter.xhtml#Fig17)).


    Providing that everything has gone smoothly, you would see the following screen
    which notifies that your question and answering knowledge base has been deployed
    as Azure Bot Services. It is available as a public API at this point. You can
    call it via postman or cURL.


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig18_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig18_HTML.jpg)


    Figure 9-18


    QnA portal – the knowledge base deployment screen


    > *Testing the KB from the QnA Maker portal is also a great way to understand
    how the final bot will respond.*


    1.  In order to test the service out, we will ask the question, “Who is considered
    a close contact to someone with COVID-19?” We will need the endpoint and key,
    which will be available from the Azure Bot Services instance that we created earlier.
    Use the following code to make the `cURL` call:


    ```

    curl -X POST https://cdcqnabot.azurewebsites.net/qnamaker/knowledgebases/600a1ebc-9fbe-4c27-b5db-bfbd505c87fb/generateAnswer
    -H "Authorization: EndpointKey 57306630-69dd-434e-b8d5-a3dd32929107" -H "Content-type:
    application/json" -d "{''question'':''Who is considered a close contact to someone
    with COVID-19?''}"

    ```


    The response JSON comes back right away, and we see the CDC’s definition of a
    *close contact*, in Figure [9-19](#499686_1_En_9_Chapter.xhtml#Fig19). Isn’t that
    impressive?


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig19_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig19_HTML.jpg)


    Figure 9-19


    Invoking the knowledge base query, using cURL


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig20_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig20_HTML.jpg)


    Figure 9-20


    Azure portal – creating the Web App Bot


    1.  As you may recall from step 4, we set out to create a chatbot for COVID-19\.
    Now that we have our knowledge base ready, we can go back and create a bot by
    clicking the **Create Bot** button in the previous screen (see Figure [9-18](#499686_1_En_9_Chapter.xhtml#Fig18))
    on the QnA portal. It will open up the Web App Bot screen, with a pre-populated
    QnA authkey. This means the bot is now connected to the QnA service.


    Verify the information, and then click **Create** to proceed. Your bot will be
    created, and once the deployment is successful, you will see the screen shown
    in Figure [9-21](#499686_1_En_9_Chapter.xhtml#Fig21).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig21_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig21_HTML.jpg)


    Figure 9-21


    Azure portal – Bot Services deployment successful


    1.  We now have the Web App Bot ready, along with the recipes to build, test,
    publish, connect with adapters, and evaluate the analytics as part of the one-stop
    Azure portal. See Figure [9-22](#499686_1_En_9_Chapter.xhtml#Fig22).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig22_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig22_HTML.jpg)


    Figure 9-22


    Azure portal – Web App Bot in Azure Bot Services


    You can also test the bot in the browser, by using the web chat feature. Click
    **Test in Web Chat** in the left pane, and you will see the screen to test the
    features. In this case, we will ask it questions about a funeral service, and
    you can see that without any prior training, it shows you the respective answers.
    See Figure [9-23](#499686_1_En_9_Chapter.xhtml#Fig23).


    ![../images/499686_1_En_9_Chapter/499686_1_En_9_Fig23_HTML.jpg](images/499686_1_En_9_Chapter/499686_1_En_9_Fig23_HTML.jpg)


    Figure 9-23


    Azure portal – testing the Web Chat'
