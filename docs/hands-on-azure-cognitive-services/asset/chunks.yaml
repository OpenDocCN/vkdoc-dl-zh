  trans: '

    ### 测试 Azure 认知搜索


    创建索引器后，您可以返回仪表板查看进度。您可以直接从控制台调用该服务。搜索资源管理器让您能够直接在 Azure 门户中执行此操作，以便查看请求和响应（结果），并确保其满足您的业务需求。图
    7-13 演示了从搜索资源管理器调用服务的过程。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig13_HTML.jpg](img/499686_1_En_7_Fig13_HTML.jpg)


    **图 7-13**

    Azure 认知搜索 – 调用服务


    微软让您能够非常轻松地将该服务作为应用程序的一部分来使用。搜索资源管理器工具还附带了一个预构建的基于 HTML 和 JavaScript 的应用程序，该应用程序可作为入门指南，帮助您在应用程序中构建和测试搜索结果。点击**创建演示应用**继续，您将看到如图
    7-14 所示的屏幕，该屏幕要求您启用 CORS（跨域资源共享）。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig14_HTML.jpg](img/499686_1_En_7_Fig14_HTML.jpg)


    **图 7-14**

    Azure 认知搜索 – 启用 CORS


    CORS 是一种基于 HTTP 标头的机制，为跨域调用提供了限制措施。通过启用它，您可以允许桌面上的 HTML 文件调用 Azure 上的 RESTful
    API。在实际生产环境中，您可能需要更加谨慎，但这对于演示应用来说是可行的。现在，您可以开始为结果、侧边栏和建议配置演示应用（如图 7-15 所示）。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig15_HTML.jpg](img/499686_1_En_7_Fig15_HTML.jpg)


    **图 7-15**

    Azure 认知搜索 – 创建演示应用


    瞧！我们有了一个用于产品列表的搜索引擎。HTML 文件 `AzSearch.html` 包含了进行 API 调用以及获取搜索和推荐结果所需的代码。例如，我们搜索一个住宅，如图
    7-16 所示。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig16_HTML.jpg](img/499686_1_En_7_Fig16_HTML.jpg)


    **图 7-16**

    Azure 认知搜索 – 房地产搜索应用


    搜索返回了可能的匹配项，如图 7-17 所示。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig17_HTML.jpg](img/499686_1_En_7_Fig17_HTML.jpg)


    **图 7-17**

    Azure 认知搜索 – 搜索应用结果


    看到我们能如此快速地启动一个可搜索的房地产存储库，真是令人印象深刻。由于数据已经存在，能够以闪电般的速度进行搜索，并且采用低代码或无代码的方法，这对许多组织来说都是一种赋能。


    在下一个示例中，我们将把 Azure 认知搜索作为 Jupyter notebook 的一部分来使用。


    ### 在 Notebook 中集成 Azure 认知搜索


    在第 6 章中，我们讨论了 Jupyter notebook、Anaconda 以及这些自包含、可执行的 Python notebook 的强大功效，它们对数据科学家来说非常有用。在本示例中，我们将演示如何创建和调用
    Azure 认知搜索 Python SDK。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig18_HTML.jpg](img/499686_1_En_7_Fig18_HTML.jpg)


    **图 7-18**

    Azure 认知搜索 Python SDK – 创建搜索索引


    1.  首先，从 GitHub（位于 [`https://github.com/Azure-Samples/azure-search-python-samples/tree/master/Quickstart/v11`](https://github.com/Azure-Samples/azure-search-python-samples/tree/master/Quickstart/v11)）克隆仓库^(¹⁸)。将其作为
    Jupyter notebook 的一部分打开，如图 7-18 所示。


    打开后，取消注释 `azure-search-documents` 包以确保您拥有先决条件，然后运行第一个单元格。在后台，您从 JSON 文件加载了 Azure
    认知搜索示例酒店数据集^(¹⁹)，该数据集包含美国城市中 50 家酒店的信息，包括图片、酒店和房间信息。见图 7-19。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig19_HTML.jpg](img/499686_1_En_7_Fig19_HTML.jpg)


    **图 7-19**

    Azure 认知搜索 – 安装先决条件


    完成先决条件后，用相关信息填充服务名称和管理员密钥。您可以在仪表板的“密钥”和“终结点”部分找到这些信息。然后，代码会创建 SDK 客户端，如图 7-20
    所示。该客户端（搜索客户端）用于调用服务。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig20_HTML.jpg](img/499686_1_En_7_Fig20_HTML.jpg)


    **图 7-20**

    Azure 认知搜索 – 设置参数


    现在，我们可以检查其他参数（如自动完成），并对不完整的文本（如 `"sa"`）进行调用。您可以想象输入了 `sa`，在后台，您会得到结果 `san Antonio`
    或 `Sarasota`（如图 7-21 所示）。然后由用户进行过滤。所有这些功能都内置于 API 中。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig21_HTML.jpg](img/499686_1_En_7_Fig21_HTML.jpg)


    **图 7-21**

    Azure 认知搜索 – 自动完成调用


    API 还允许调用 `get_document()` 函数来获取特定项目（此处为酒店）的信息。请参见图 7-22 中的示例。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig22_HTML.jpg](img/499686_1_En_7_Fig22_HTML.jpg)


    **图 7-22**

    Azure 认知搜索 – 文档检索


    您还可以追加到索引中，并添加额外的文档列表，例如酒店（如图 7-23 所示）。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig23_HTML.jpg](img/499686_1_En_7_Fig23_HTML.jpg)


    **图 7-23**

    Azure 认知搜索 – 额外文档（酒店）


    然后，将文档上传到搜索客户端索引，如图 7-24 所示。


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig24_HTML.jpg](img/499686_1_En_7_Fig24_HTML.jpg)


    **图 7-24**

    Azure 认知搜索 – 上传额外文档


    现在，您可以对这些额外酒店运行查询，因为它们现在已成为搜索索引的一部分。


    在本节中，您学习了如何基于存储在结构化格式（数据库）或非结构化格式（文档）中的数据集（如酒店和房地产）完成搜索。接下来，我们将探索必应 Web 搜索，以搜索网络上数十亿页面的图像、视频、新闻等内容。

