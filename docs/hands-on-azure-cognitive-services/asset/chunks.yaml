- fmt: '# Searching with Bing Web Search


    Bing Web Search API^([20](#fn20)) is a search powerhouse which brings intelligent
    search to the Web. However, providing its broad reach, it will soon be part of
    its own Bing Search Services ecosystem. Bing Web Search puts a search engine at
    your fingertips, by helping you search the web for information stored in web pages,
    images, videos, and news resources. The information is context and location sensitive,
    filtered, and free of ads. Spelling correction comes standard, but unlike Azure
    Cognitive Search, you can tap into the wisdom of crowds by looking into related
    searches.


    Let’s start building a Bing Web Search API instance:


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig25_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig25_HTML.jpg)


    **Figure 7-25** Bing Web Search API – creating an instance


    1. Access the Bing Web Search API by creating an instance on the Azure portal
    (as shown in Figure [7-25](#499686_1_En_7_Chapter.xhtml#Fig25)). See [`https://portal.azure.com/#create/microsoft.bingsearch`](https://portal.azure.com/%2523xscreate/microsoft.bingsearch).


    Once you have completed the information, click **Create**, and it creates a Microsoft
    Bing Search instance, as shown in Figure [7-26](#499686_1_En_7_Chapter.xhtml#Fig26).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig26_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig26_HTML.jpg)


    **Figure 7-26** Bing Search API – deployment completed


    Click **Go to resource**, to see the Quick start page (shown in Figure [7-27](#499686_1_En_7_Chapter.xhtml#Fig27)).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig27_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig27_HTML.jpg)


    **Figure 7-27** Bing Web Search – Quick start page


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig28_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig28_HTML.jpg)


    **Figure 7-28** Bing API search in Python – PyCharm project start page


    2. In this example, we will complete an image search by using the Bing Image Search
    APIs. First, we will perform a simple search to retrieve the results, and then
    we’ll use Python Imaging Library to display the results. We are using PyCharm,
    as shown in Figure [7-28](#499686_1_En_7_Chapter.xhtml#Fig28), but feel free to
    use the IDE of your choice. The code originates from MIT-licensed *cognitive-services-REST-api-samples*^([21](#fn21)),
    but we have made several changes to simplify it and to make it easy to consume.
    The complete listing is available as part of this book’s GitHub repository.


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig29_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig29_HTML.jpg)


    **Figure 7-29** Bing API search – Keys and Endpoint


    3. Once the project is created, you will need the keys and endpoints, which can
    be retrieved from the portal (as shown in Figure [7-29](#499686_1_En_7_Chapter.xhtml#Fig29)).


    Populate the `subscriptionKey` and `endpoint` variables with the key and endpoint
    information. The code in Figure [7-30](#499686_1_En_7_Chapter.xhtml#Fig30) is
    extremely simple and shows you how easy it is to invoke the search service. Aside
    from `subscriptionKey` and `endpoint` as part of the headers, you also define
    the market via `mkt` (''en-US'') and `query` ("cat memes"). Run the program to
    get the results. You can see the response in the output pane shown in Figure [7-30](#499686_1_En_7_Chapter.xhtml#Fig30).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig30_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig30_HTML.jpg)


    **Figure 7-30** Bing Image Search in Python


    Along with individual results, you can open the `websearchURL` response element
    in the browser. See Figure [7-31](#499686_1_En_7_Chapter.xhtml#Fig31).


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig31_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig31_HTML.jpg)


    **Figure 7-31** Bing Image Search results – GET request in the browser


    ![../images/499686_1_En_7_Chapter/499686_1_En_7_Fig32_HTML.jpg](images/499686_1_En_7_Chapter/499686_1_En_7_Fig32_HTML.jpg)'
