- fmt: "### Figure 6-23\nContent Moderator samples GitHub repo\n\n1.  To test the\
    \ APIs, you can use tools like `curl`, `Postman`, `Swagger`, or `Fiddler` or do\
    \ it from an application. In this example, we will use a .NET application. Cognitive\
    \ service samples are a great place to start exploring different ways of using\
    \ Azure Cognitive Services. First, clone the GitHub repository (`https://github.com/Azure-Samples/cognitive-services-content-moderator-samples`),\
    \ as shown in Figure [6-23](#499686_1_En_6_Chapter.xhtml#Fig23).\n\n    Clone\
    \ the repository in a local folder. In this example, we are using GitHub Desktop,\
    \ but you can do it via command line. The resulting repository is cloned in the\
    \ following folder (shown in Figure [6-24](#499686_1_En_6_Chapter.xhtml#Fig24)):\
    \ `D:\\dev\\cognitive-services-content-moderator-samples\\`.\n\n    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig24_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig24_HTML.jpg)\n\
    \n    **Figure 6-24**\n    Content Moderator samples GitHub repo clone\n\n   \
    \ ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig25_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig25_HTML.jpg)\n\
    \n    **Figure 6-25**\n    Content Moderator service invocation application\n\n\
    2.  Once the repo is cloned (sync’d to your machine), open the `text-moderation-quickstart-dotnet.cs`\
    \ file from the `D:\\dev\\cognitive-services-content-moderator-samples\\documentation-samples\\\
    csharp` folder. You can open this file in Visual Studio Code or in Visual Studio\
    \ 2019. In this example, we will be using Visual Studio and will create a .NET\
    \ Core 3.1 console app. We add the code provided in the `text-moderation-quickstart-dotnet.cs`\
    \ file, to use it as shown in Figure [6-25](#499686_1_En_6_Chapter.xhtml#Fig25).\n\
    \n    > *Since the time of this writing, there have been* API *updates, for instance,*\
    \ `Microsoft.CognitiveServices.ContentModerator` *needs to be replaced with* `Microsoft.Azure.CognitiveServices.ContentModerator`.\
    \ *You would get these changes with the latest repo updates.*\n\n    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig26_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig26_HTML.jpg)\n\
    \n    **Figure 6-26**\n    Command for installation of the NuGet package\n\n3.\
    \  We need to do a few things before we run this app. First, you need to install\
    \ the Content Moderator packages, using the NuGet Package Manager. Run the command\
    \ shown in Figure [6-26](#499686_1_En_6_Chapter.xhtml#Fig26), to get the `Microsoft.Azure.CognitiveServices.ContentModerator`\
    \ package.\n\n    Once the installation is completed, we proceed with configuring\
    \ the items we need to run the `text-moderation-quickstart-dotnet.cs` file.\n\n\
    \    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig27_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig27_HTML.jpg)\n\
    \n    **Figure 6-27**\n    Content Moderator invocation – subscription key information\n\
    \n4.  To run this simple piece of code that calls the Content Moderator API, you\
    \ need to store the keys in environment variables. This is where this information\
    \ is read from, as shown in Figure [6-27](#499686_1_En_6_Chapter.xhtml#Fig27).\n\
    \n    To add items to the environment variables, open the system properties panel\
    \ by typing “system properties” on the Run window in Windows 10, as seen in Figure\
    \ [6-28](#499686_1_En_6_Chapter.xhtml#Fig28). Click the **Environment Variables…**\
    \ button.\n\n    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig28_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig28_HTML.jpg)\n\
    \n    **Figure 6-28**\n    System properties to set the environment variables\n\
    \n    Once the window is open, add the two keys (shown in Figure [6-29](#499686_1_En_6_Chapter.xhtml#Fig29))\
    \ as new environment variables. Use user variables instead of system variables.\
    \ You would need to restart the VS.NET to load the newly added environment variables.\n\
    \n    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig29_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig29_HTML.jpg)\n\
    \n    **Figure 6-29**\n    System properties to set the environment variables\n\
    \n    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig30_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig30_HTML.jpg)\n\
    \n    **Figure 6-30**\n    Visual Studio – Copy to Output Directory setting\n\n\
    5.  Lastly, you would need to create a file that contains the evaluation text\
    \ to be passed to the API. The text is what we have used earlier. The following\
    \ is the evaluation text:\n\n    ```\n    Is this a grabage or crap email abcdef@abcd.com,\
    \ phone: 4255550111, IP: 255.255.255.255, 1234 Main Boulevard, Panapolis WA 96555.\n\
    \    ```\n\n    Now create a new file called `Evaluate.txt`, and then copy this\
    \ text in the file. Make sure to set the copy to output the directory setting\
    \ to **Copy if newer**, as shown in Figure [6-30](#499686_1_En_6_Chapter.xhtml#Fig30).\
    \ If you don’t set this value, the evaluate file is not copied over to the build,\
    \ and therefore, the executable cannot find the program when it runs.\n\n    ![../images/499686_1_En_6_Chapter/499686_1_En_6_Fig31_HTML.jpg](images/499686_1_En_6_Chapter/499686_1_En_6_Fig31_HTML.jpg)\n\
    \n    **Figure 6-31**\n    Output listing for the Content Moderator service response\n\
    \n6.  Now you can run the program by pressing `F5`. The code will call the API,\
    \ get the response back, and save it in the output file, `TextModerationOutput.txt`,\
    \ in the `bin/debug` folder (as shown in Figure [6-31](#499686_1_En_6_Chapter.xhtml#Fig31)).\
    \ To enable this view, click the **Show all Files** icon in the Solution Explorer\
    \ window.\n\n    The JSON output from the API is detailed as follows, where you\
    \ can easily see the category identification, review recommendation, PII, and\
    \ language detection – similar to how it was in the review console.\n\n    ```\n\
    \    Autocorrect typos, check for matching terms, PII, and classify.\n    {\n\
    \    \"OriginalText\": \"Is this a grabage or crap email abcdef@abcd.com, phone:\
    \ 4255550111, IP: 255.255.255.255, 1234 Main Boulevard, Panapolis WA 96555.\"\
    ,\n    \"NormalizedText\": \"   grabage  crap email abcdef@abcd.com, phone: 4255550111,\
    \ IP: 255.255.255.255, 1234 Main Boulevard, Panapolis WA 96555.\",\n    \"AutoCorrectedText\"\
    : \"Is this a garbage or crap email abcdef@abcd.com, phone: 4255550111, IP: 255.255.255.255,\
    \ 1234 Main Boulevard, Pentapolis WA 96555.\",\n    \"Misrepresentation\": null,\n\
    \    \"Classification\": {\n    \"Category1\": {\n    \"Score\": 0.0022211475297808647\n\
    \    },\n    \"Category2\": {\n    \"Score\": 0.22706618905067444\n    },\n  \
    \  \"Category3\": {\n    \"Score\": 0.9879999756813049\n    },\n    \"ReviewRecommended\"\
    : true\n    },\n    \"Status\": {\n    \"Code\": 3000,\n    \"Description\": \"\
    OK\",\n    \"Exception\": null\n    },\n    \"PII\": {\n    \"Email\": [\n   \
    \ {\n    \"Detected\": \"abcdef@abcd.com\",\n    \"SubType\": \"Regular\",\n \
    \   \"Text\": \"abcdef@abcd.com\",\n    \"Index\": 32\n    }\n    ],\n    \"SSN\"\
    : [],\n    \"IPA\": [\n    {\n    \"SubType\": \"IPV4\",\n    \"Text\": \"255.255.255.255\"\
    ,\n    \"Index\": 72\n    }\n    ],\n    \"Phone\": [\n    {\n    \"CountryCode\"\
    : \"US\",\n    \"Text\": \"4255550111\",\n    \"Index\": 56\n    }\n    ],\n \
    \   \"Address\": [\n    {\n    \"Text\": \"1234 Main Boulevard, Panapolis WA 96555\"\
    ,\n    \"Index\": 89\n    }\n    ]\n    },\n    \"Language\": \"eng\",\n    \"\
    Terms\": [\n    {\n    \"Index\": 12,\n    \"OriginalIndex\": 21,\n    \"ListId\"\
    : 0,\n    \"Term\": \"crap\"\n    }\n    ],\n    \"TrackingId\": \"f0dba865-3731-4fd2-b07f-01878ba7325a\"\
    \n    }\n    ```\n\n    **Listing 6-1**\n    Output listing for the Content Moderator\
    \ service response\n\nContent moderation use cases in the industry exist to provide\
    \ positive user experiences. They apply to pretty much all the user-generated\
    \ contents, from moderating text, chat messages, and user-selected usernames (or\
    \ avatars) to uploaded images that might contain sexually explicit, hateful, violent,\
    \ or extreme contents, and more. In this section, you have learned how to use\
    \ the content moderation service with its powerful review features – both via\
    \ an API and the human-in-the-loop console.\n\nIn the next section, we will explore\
    \ another one of decision services, Personalizer."
