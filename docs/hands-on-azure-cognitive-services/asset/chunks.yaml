    (as shown in Figure [10-16](#499686_1_En_10_Chapter.xhtml#Fig16)). This is overkill
    for the task at hand, printing *Hello World*, but we can reuse this resource for
    our next task of classification.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig16_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig16_HTML.jpg)


    Figure 10-16


    Azure Machine Learning studio – configuring the VM settings


    1.  Once you have chosen the VM and created the compute name, now it’s time to
    run the notebook. Voila! See Figure [10-17](#499686_1_En_10_Chapter.xhtml#Fig17).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig17_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig17_HTML.jpg)


    Figure 10-17


    Azure Machine Learning studio – Hello World notebook


    This example seems trivial, but it has prepared you with all the prerequisites
    for what is coming next, an income classification model that you build, by using
    Azure Machine Learning service and Jupyter notebook. Now, with all the dependencies
    out of the way, let’s look into the census income classification problem.'
  trans: '

    # 使用 Azure 机器学习实现 Hello World


    到目前为止，本书中你主要使用的是预构建的库和 API。在接下来的示例中，我们将展示如何获取 UCI 人口普查成人收入数据集^(³⁷)，并构建一个 Jupyter
    notebook，根据人口普查数据预测收入是否超过每年 5 万美元。有关此数据集的信息，请参见图 10-7。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig7_HTML.jpg](img/499686_1_En_10_Fig7_HTML.jpg)


    图 10-7


    UCI 人口普查成人收入数据集信息 ([*https://archive.ics.uci.edu/ml/datasets/Adult*](https://archive.ics.uci.edu/ml/datasets/Adult))


    然后，我们将使用 Azure ML 设计器重复此实验。请按照以下步骤操作：


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig8_HTML.jpg](img/499686_1_En_10_Fig8_HTML.jpg)


    图 10-8


    Azure 门户 – 创建机器学习工作区


    1. Azure 机器学习 notebook 是 Azure 机器学习工作室的一部分。但是，首先你需要创建一个工作区才能继续。访问 Azure 门户 ([`http://portal.azure.com`](http://portal.azure.com))，然后选择**机器学习**，如图
    10-8 所示。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig9_HTML.jpg](img/499686_1_En_10_Fig9_HTML.jpg)


    图 10-9


    Azure 门户 – 创建机器学习工作区


    2. 填写有关订阅、工作区名称、区域和存储帐户的详细信息。除非你有特定的网络或容器用例需要处理，否则可以将大部分设置保留为默认值。完成后，单击**查看 +
    创建**以继续（如图 10-9 所示）。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig10_HTML.jpg](img/499686_1_En_10_Fig10_HTML.jpg)


    图 10-10


    Azure 门户 – 创建机器学习工作区


    3. 部署完成后，你将看到如图 10-10 所示的消息。要继续，请单击**转到资源**。


    4. 在资源屏幕中，你将看到已创建工作区的摘要。现在你可以继续使用机器学习工作室了。你可以单击工作室 Web URL，也可以单击**启动工作室**按钮，这将带你进入
    Azure 机器学习工作室。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig11_HTML.jpg](img/499686_1_En_10_Fig11_HTML.jpg)


    图 10-11


    Azure 门户 – 创建机器学习工作区


    ## Azure 机器学习工作室


    你可能会注意到，机器学习工作室还有另一种风格，称为 Azure 机器学习工作室（经典版）^(³⁸)。不要将其与当前现代化的 Azure 机器学习工作室界面混淆，后者包含设计器、自动化机器学习和
    Jupyter notebook 功能。Azure 机器学习工作室（经典版）是 2015 年创建的用于构建机器学习模型的原始拖放式 UI。其大部分功能现在都可以在设计器中使用，但现代化的
    Azure 机器学习工作室环境提供了更多功能。


    5. 这是 Azure 机器学习工作室的主屏幕，现在可以通过 ML URL (`ml.azure.com`) 访问。它包含你之前了解到的不同功能和技能。让我们单击
    notebook 的**立即开始**按钮，创建一个简单的 *hello world* notebook。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig12_HTML.jpg](img/499686_1_En_10_Fig12_HTML.jpg)


    图 10-12


    Azure 机器学习工作室主页


    你可以选择浏览示例 notebook 或创建新的 Jupyter notebook 文件。作为入门步骤，让我们创建一个新文件，如图 10-13 所示。这将使你更容易理解底层依赖关系。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig13_HTML.jpg](img/499686_1_En_10_Fig13_HTML.jpg)


    图 10-13


    Azure 机器学习 – 创建 Jupyter notebook


    6. 创建新的 Jupyter notebook（默认情况下为空）后，你会在右上角看到“未找到计算资源”消息（如图 10-14 所示）。如果你尝试运行此 notebook，将会收到一条错误消息，指出你的
    notebook 当前未连接到计算资源。它要求你切换到正在运行的计算资源或创建新的计算资源来运行单元格。这仅仅意味着你需要一个计算资源来运行 notebook。单击**创建计算资源**按钮为
    notebook 创建资源。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig14_HTML.jpg](img/499686_1_En_10_Fig14_HTML.jpg)


    图 10-14


    Azure 机器学习 – 创建计算资源


    7. 计算实例屏幕可帮助你创建计算实例，在本例中为虚拟机 (VM)。你可以选择 VM 类型。如果你的工作负载侧重于深度学习，请使用 GPU。否则，CPU 就足够了。有一些预构建的
    VM，其成本列在旁边 – 根据需要选择资源（参见图 10-15）。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig15_HTML.jpg](img/499686_1_En_10_Fig15_HTML.jpg)


    图 10-15


    Azure 机器学习工作室 – 选择 VM


    对于这个简单的示例，我们将选择一台具有以下规格的 DS2 v2 机器（如图 10-16 所示）。对于打印 *Hello World* 这个任务来说，这有点大材小用，但我们可以将此资源重用于下一个分类任务。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig16_HTML.jpg](img/499686_1_En_10_Fig16_HTML.jpg)


    图 10-16


    Azure 机器学习工作室 – 配置 VM 设置


    8. 选择 VM 并创建计算名称后，现在可以运行 notebook 了。瞧！参见图 10-17。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig17_HTML.jpg](img/499686_1_En_10_Fig17_HTML.jpg)


    图 10-17


    Azure 机器学习工作室 – Hello World notebook


    这个示例看似简单，但它为你准备了接下来所需的所有先决条件：使用 Azure 机器学习服务和 Jupyter notebook 构建一个收入分类模型。现在，所有依赖关系都已解决，让我们来研究一下人口普查收入分类问题。

