    Figure 3-8 Selecting the API console region


    1.  **API console** – This method to test the API requires a minimal effort. Using
    the API console, a developer can pass the values to the API, by using the endpoint,
    and retrieve the results. From the API console, choose the API by clicking the
    specific region. See Figure [3-8](#499686_1_En_3_Chapter.xhtml#Fig8).


    Select the **Analyze Image** resource, and then provide the required information,
    as shown in Figure [3-9](#499686_1_En_3_Chapter.xhtml#Fig9). Then click **Send**.
