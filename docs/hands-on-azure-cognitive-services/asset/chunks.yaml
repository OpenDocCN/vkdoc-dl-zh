    **图 3-15** 缺失的命名空间


    向视觉 API 发出请求并获取结果。响应是 `ImageAnalysis` 模型对象，如列表 3-7 所示。


    ```

    ImageAnalysis analysisData = await client.AnalyzeImageAsync(imgURL, featuresToBeAnalyzed);

    ```

