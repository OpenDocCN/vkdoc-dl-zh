  trans: "\n![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig5_HTML.jpg](img/499686_1_En_10_Fig5_HTML.jpg)\n\
    \n**图 10-5** Azure 机器学习计算目标\n\n1. **自动化机器学习** – 自动化机器学习（简称 AutoML）是一种应用机器学习技术，为问题找出最佳模型的能力。这包括自动特征工程、神经架构搜索和超参数优化。Azure\
    \ AutoML 消除了寻找最佳超参数时的猜测工作，并能以无代码的方式帮助你找到最适合使用的模型。\n\n2. **数据集** – 对于机器学习从业者来说，管理机器学习资产（如模型和数据集）可能是一个具有挑战性的问题。借助\
    \ Azure 数据集，你可以轻松地在多个机器学习工作流中共享和跟踪数据，同时数据的一个副本会保留在存储中。例如，无需担心连接性和连接字符串即可访问数据。\n\
    \n3. **试验** – 试验和可重复性是*数据科学*之所以成为科学的关键，它能够创建数据集和算法并进行试验。Azure 机器学习的“试验”部分会跟踪你的机器学习试验和运行情况，以便你可以重放管道。\n\
    \n4. **管道**^(³⁶) – *管道*可能是机器学习中含义最丰富的术语，通常指数据提取、模型开发和训练、调优、生产发布，然后是监控和审查，或这些活动的某种组合。在\
    \ Azure 机器学习的上下文中，它是指这些机器学习任务的可重复执行工作流，可以执行数据操作（如归一化、转换、特征化、验证等）、模型构建和训练（如超参数调优、自动模型选择、模型测试和验证）以及模型部署（如部署和批量评分）。模型管道提供了出色的功能，例如：\n\
    \    - 无人值守执行\n    - 多样化的计算资源可访问性\n    - 可重现性和可重用性\n    - 跟踪和版本控制\n\n5. **模型**\
    \ – 模型是机器学习的核心：它们通过使用指定的算法，封装了从数据中学习到的知识。在 Azure 机器学习工作区中，你可以注册、创建、管理和跟踪模型。你在工作区其他部分构建的任何模型也会在此存储库中注册，并可在整个平台中使用。\n\
    \n6. **计算** – 机器学习模型、自动化机器学习过程和 Jupyter 笔记本，都需要一个运行（执行计算）的地方。这正是 Azure 计算所提供的——你可以在此创建不同类型的计算目标，如图\
    \ 10-5 所示。下表详细说明了适用于工作负载的不同训练目标。对于机器学习工作负载，你可以使用本地计算机、计算集群、远程虚拟机以及各种其他训练目标。\n\n\
    7. **数据存储** – 数据存储是数据的存储库；它们是数据集的容器，例如 Azure 存储、Azure Data Lake Storage、Azure\
    \ SQL 数据库和 Azure Databricks 文件系统 (DBFS)。对于系统存储，Azure 机器学习使用 Azure Blob 容器和文件容器。\n\
    \n8. **标记** – 标记和注释是数据科学生命周期的重要组成部分。使用 Azure 机器学习的标记功能，你可以通过创建标记项目、管理工作流并将其分发给多个标记人员来标记数据集，还可以利用机器学习来帮助你完成标记。\n\
    \n你很快就会在实际操作中进一步了解这些组件。在我们踏上构建机器学习模型的旅程时，了解用于构建模型的正确算法非常重要。\n\n除了提供一些阐述清晰、简洁且管理完善的文档外，Azure\
    \ 机器学习团队还提供了一份非常有用的备忘单（`aka.ms/mlcheatsheet`），可帮助你确定最佳的机器学习算法。该备忘单如图 10-6 所示。\n\
    \n![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig6_HTML.jpg](img/499686_1_En_10_Fig6_HTML.jpg)\n\
    \n**图 10-6** Azure 机器学习算法备忘单（`aka.ms/mlcheatsheet`）\n\n无论你是想在类别之间进行预测、发现结构，还是从文本中提取信息，在下面的流程中，你都可以根据需求找到最佳的算法。\n"
- fmt: '# Hello World with Azure Machine Learning


    In the book so far, you have mainly worked with prebuilt libraries and APIs. In
    this next example, we will show how you can take the UCI Census Adult Income Data
    Set^([^(37)](#fn37)) and build a Jupyter notebook to predict if the income exceeds
    $50K per year, based on the census data. See Figure [10-7](#499686_1_En_10_Chapter.xhtml#Fig7)
    for information about this dataset.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig7_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    UCI Census Adult Income Data Set information ([*https://archive.ics.uci.edu/ml/datasets/Adult*](https://archive.ics.uci.edu/ml/datasets/Adult))


    Then we will repeat this experiment using Azure ML designer. Follow these steps:


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig8_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Azure portal – creating a machine learning workspace


    1. The Azure Machine Learning notebook is part of Azure Machine Learning studio.
    However, first you need to create a workspace to proceed. Visit the Azure portal
    ([`http://portal.azure.com`](http://portal.azure.com)), and select **Machine Learning**,
    as shown in Figure [10-8](#499686_1_En_10_Chapter.xhtml#Fig8).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig9_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Azure portal – creating a machine learning workspace


    2. Fill out the details about the subscription, workspace name, region, and storage
    account. You can leave most of these as the default settings, unless you have
    specific use cases in networking or containers you would like to address. Once
    completed, click **Review + create** to proceed (as shown in Figure [10-9](#499686_1_En_10_Chapter.xhtml#Fig9)).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig10_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Azure portal – creating a machine learning workspace


    3. Once the deployment completes, you will see the message shown in Figure [10-10](#499686_1_En_10_Chapter.xhtml#Fig10).
    To continue, click **Go to resource**.


    4. In the resource screen, you will see the summary of the created workspace.
    Now you are ready to proceed with Machine Learning studio. You can either click
    the Studio web URL or click the **Launch studio** button, which will take you
    to the Azure Machine Learning studio.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig11_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    Azure portal – creating a machine learning workspace


    ## Azure Machine Learning studio


    You might notice that there is another flavor to the Machine Learning studio,
    called Azure Machine Learning studio (classic)^([^(38)](#fn38)). This is not to
    be confused with the current, modernized Azure Machine Learning studio interface,
    which includes a designer, automated machine learning, and Jupyter notebook capabilities.
    The Azure Machine Learning studio (classic) was the original drag-and-drop UI
    for building machine learning models, created in 2015. Most of its features are
    available as part of the designer, but there is a whole lot more in the modern
    Azure Machine Learning studio environment.


    5. This is the main screen for Azure Machine Learning studio, which can now be
    accessed via the ML URL (`ml.azure.com`). It comprises of different capabilities
    and skills that you read about earlier. Let’s click the notebooks’ **Start now**
    button, to create a simple *hello world* notebook.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig12_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Azure Machine Learning studio homepage


    You have an option to explore sample notebooks or to create a new Jupyter notebook
    file. As a baby step, let’s create a new file, as shown in Figure [10-13](#499686_1_En_10_Chapter.xhtml#Fig13).
    This will make it easy for you to understand the underlying dependencies.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig13_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig13_HTML.jpg)


    Figure 10-13


    Azure Machine Learning – creating a Jupyter notebook


    6. Once you create a new Jupyter notebook, which is empty by default, you will
    notice the “No computes found” message, on the top right (as shown in Figure [10-14](#499686_1_En_10_Chapter.xhtml#Fig14)).
    If you try to run this notebook, you will get an error message stating that your
    notebook is currently not connected to a compute. It requires you to switch to
    a running compute or to create a new compute to run a cell. This simply means
    that you need a compute resource to run a notebook. Click the **Create compute**
    button to create a resource for the notebook.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig14_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Azure Machine Learning – creating compute


    7. The compute instance screen helps you create a compute instance, in this case
    a virtual machine (VM). You can choose the VM type. If you have a deep learning–focused
    workload, use a GPU. Otherwise, a CPU should serve you fine. There are some prebuilt
    VMs, with their costs listed next to them – select a resource, as needed (see
    Figure [10-15](#499686_1_En_10_Chapter.xhtml#Fig15)).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig15_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Azure Machine Learning studio – selecting a VM


    For this simple example, we would choose a DS2 v2 machine with the following specs
    (as shown in Figure [10-16](#499686_1_En_10_Chapter.xhtml#Fig16)). This is overkill
    for the task at hand, printing *Hello World*, but we can reuse this resource for
    our next task of classification.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig16_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig16_HTML.jpg)


    Figure 10-16


    Azure Machine Learning studio – configuring the VM settings


    8. Once you have chosen the VM and created the compute name, now it’s time to
    run the notebook. Voila! See Figure [10-17](#499686_1_En_10_Chapter.xhtml#Fig17).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig17_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig17_HTML.jpg)


    Figure 10-17


    Azure Machine Learning studio – Hello World notebook


    This example seems trivial, but it has prepared you with all the prerequisites
    for what is coming next, an income classification model that you build, by using
    Azure Machine Learning service and Jupyter notebook. Now, with all the dependencies
    out of the way, let’s look into the census income classification problem.'
