- fmt: "# Getting Started with Azure Portal and Azure Cognitive Services\n\nMicrosoft\
    \ Azure Cognitive Services provides the facility to develop smart applications.\
    \ You can build these smart applications with the help of `API`s, `SDK`s, services,\
    \ and so on.\n\nMicrosoft Azure Cognitive Services are a set of `API`s, `SDK`s,\
    \ and services that facilitate developers to create smart applications, without\
    \ the prior knowledge of AI or ML.\n\nAzure Cognitive Services provides everything\
    \ that a developer (without the knowledge of data science) needs, in order to\
    \ work on smart applications. For example, with the help of Cognitive Services,\
    \ a developer can create a smart application that can converse, understand, or\
    \ train itself.\n\nIn this section, we will walk through the Azure portal and\
    \ explore the various options of Azure Cognitive Services.\n\nThis section is\
    \ a walkthrough of the Azure portal. You can skip this section if you’re already\
    \ familiar with the Azure portal.\n\nTo get started with the Azure portal, you\
    \ need a valid Azure account. If you do not have a valid Azure account, follow\
    \ these points, to register a free Azure account:\n\n*   Go to [`https://signup.azure.com`](https://signup.azure.com).\n\
    *   To sign up a free account, you must have a valid phone number, a valid credit\
    \ card, and a GitHub account or Microsoft account Id (previously called a Windows\
    \ Live ID).\n*   Follow the instructions on the screen.\n\nAfter completing your\
    \ registration, your free account consists of the following benefits:\n\n*   Free\
    \ services for 12 months\n*   With the free account, you can build a smart/intelligent\
    \ application, with the help of these free services:\n    *   Computer Vision\n\
    \    *   Personalizer\n    *   Translator\n    *   Anomaly Detector\n    *   Form\
    \ Recognizer\n    *   Face services\n    *   Language Understanding\n    *   QnA\
    \ Maker\n\nTo view the complete list of free products and services, refer to this\
    \ link: [`https://azure.microsoft.com/en-us/free/`](https://azure.microsoft.com/en-us/free/).\n\
    \nAfter completing your registration, sign in to the Azure portal ([`https://portal.azure.com`](https://portal.azure.com)).\
    \ After you sign in, you will land on the Azure portal home page, which should\
    \ look like Figure 2-1.\n\n![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig1_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig1_HTML.jpg)\n\
    \n**Figure 2-1** The Azure portal\n\nYou can see the various services available\
    \ to you, as per your subscription. This is the starting point to explore the\
    \ Azure products and services.\n\nA complete walkthrough of the Azure portal is\
    \ beyond the scope of this book. If you want to learn about working in the Azure\
    \ portal in detail, please refer to the book, *Cloud Debugging and Profiling in\
    \ Microsoft Azure*, published by Apress.\n\n## Getting Started with Azure Cognitive\
    \ Services\n\nLet’s explore Microsoft Azure Cognitive Services. Please note that\
    \ we will cover each and every service with code examples in the coming chapters.\
    \ To get started with Cognitive Services, from the Azure portal, search for “Cognitive\
    \ Services” from the search text box, or click **All Services** ➤ **AI + machine\
    \ learning** ➤ **Cognitive Services** (see Figure 2-2).\n\n![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig2_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig2_HTML.jpg)\n\
    \n**Figure 2-2** Cognitive Services\n\nNext, you will see the Cognitive Services\
    \ screen. From this screen, you can manage your existing service or add/create\
    \ a new service. This is the starting point from where you will need to begin\
    \ exploring the Azure Marketplace.\n\nIn the forthcoming section, we will discuss\
    \ Cognitive Services in Azure Marketplace.\n\n## Azure Marketplace: An Overview\
    \ of AI + Machine Learning\n\nAzure Cognitive Services are backed by world-class\
    \ model deployment technology, which is built by the top experts in the area.\
    \ With the pay-as-you-go model, you can choose from a lot of different plans and\
    \ offers. You can find a faster, easier, and often cheaper solution, instead of\
    \ investing in the development and infrastructure that you will likely need (if\
    \ you choose to develop and host your models for such common use cases).\n\nAzure\
    \ Marketplace is a one-stop shop to get all the services. You will be sent to\
    \ Azure Marketplace, as soon as you click **Add** or **Create cognitive services**\
    \ (see Figure 2-3).\n\n![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig3_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig3_HTML.jpg)\n\
    \n**Figure 2-3** Add or create cognitive service\n\nAzure Marketplace provides\
    \ many categories of offerings, including these examples:\n\n*   **Bot Service**\
    \ – Includes tools to create, test, deploy, and manage your intelligent bots.\n\
    *   **Cognitive Services** – In Chapter 1, we provided an overview of these services.\n\
    *   **ML service** – Azure Machine Learning builds intelligent models and repeatable\
    \ workflows for you to deploy and manage.\n*   **Automated ML** – With AutoML,\
    \ you can train and tune a model, by specifying your target metric.\n*   **Business\
    \ or robotic process automation** – Allows you to create virtual workforces to\
    \ help drive your business forward.\n*   **Data labeling** – Create, manage, and\
    \ monitor your labeling projects, across a team.\n*   **Data preparation** – Ensure\
    \ that the data uses the correct encoding and a consistent schema, for example.\n\
    *   **Knowledge mining** – Quickly explore and learn from large amounts of data,\
    \ to uncover important insights, relationships, and patterns.\n*   **ML operations**\
    \ – MLOps applies DevOps to machine learning, including building continuous integration,\
    \ delivery, deployment, and quality assurance.\n*   And more\n\n## Understanding\
    \ Software Development Kits (SDKs): To Get Started with Your Favorite Programing\
    \ Language\n\nYou would find it too complex and time consuming to write each and\
    \ every piece of code from scratch. We can minimize our efforts and time with\
    \ the help of software development kits (`SDK`s). You have various `SDK`s available\
    \ that you can use to develop an application with Cognitive Services. The following\
    \ major languages are currently supported by the `SDK`s (as of when we wrote this\
    \ book):\n\n*   C#\n*   Go (often referred to as Golang, or Go Language)\n*  \
    \ Java\n*   JavaScript\n*   Python\n*   R\n\nWe will use C# for all the examples\
    \ in this book."
