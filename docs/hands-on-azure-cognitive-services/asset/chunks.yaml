- fmt: '# 7. Search – Add Search Capabilities to Your Application


    How old was master Yoda when he died?


    How many quarts are in a liter?


    How late does the boba place on Fowler stay open?


    Okay, Google, make cat sounds.


    Well, that last request might not be very relevant. Anyway, it’s quite evident
    from our everyday behavior that digital search has become an extension of the
    modern human mind. Search is everywhere – in our personal lives, to the companies
    we build and work for; we are constantly searching for information in our everyday
    lives. Search has become sophisticated, as the information we seek becomes more
    diverse, multimodal, and distributed. We now heavily rely on context-sensitive,
    natural language searches, where answers span across multiple documents (including
    images, PDFs, text files, and structured data). Our searches also include people
    and places, individuals and business names, and other entities, which likely require
    autocorrection for spelling and intent.


    By asking questions, we explore the Internet via search engines, we probe for
    data points, and we seek tutorials, guides, and how-to videos. We also query our
    corporate intranet portals for holiday/vacation requests and co-payment amounts,
    we hunt for medical provider coverage and locations, and we investigate which
    legal clauses are part of a specific contract. Even though we are becoming quite
    good at probing for all this information, the data itself doesn’t automatically
    lend itself to be examined that easily.


    According to most estimates, over 80% of organizational data is unstructured.
    (See “What Is Unstructured Data and Why Is It So Important to Businesses?” at
    `www.forbes.com/sites/bernardmarr/2019/10/16/what-is-unstructured-data-and-why-is-it-so-important-to-businesses-an-easy-explanation-for-anyone`.)
    All this unstructured data leads to practical challenges of information extraction,
    such as parsing, optical character recognition, named entity recognition, dependency
    parsing, and other data enrichment needs. But fear no more, Microsoft’s AI-powered
    search is here to help!


    In this chapter, we will provide insights on Bing Search APIs and Azure Cognitive
    Search, by adding various search functionalities to the application. In this chapter,
    you will learn to do the following:


    1. Understand search, Bing Search APIs, and Cognitive Search.

    2. Create smart search applications by adding Bing Search and Azure Cognitive
    Search capabilities.


    Let’s begin.


    ## The Search Ecosystem


    Microsoft’s search ecosystem has gone through a few iterations that can be easily
    explained, as follows.


    `Azure Cognitive Search`, formerly known as `Azure Search`, is Microsoft’s enterprise
    search capability (where you can choose your own data sources to crawl and index).
    Therefore, even though it could technically encompass web searches, it’s more
    than that. You can also choose how often you index. Essentially, you can create
    your own mashup of data sources to index from.


    `Bing Search` is specifically Microsoft’s enterprise web search. You can create
    silos of domains from the web that you want to allow your enterprise to search.
    `Azure Cognitive Search` is a custom enterprise search. It can be siloed to on-prem,
    private, and enterprise-specific data, with the option to include a custom public
    domain. In contrast, `Bing Search` is a public domain that can be filtered.


    Currently, `Bing Search APIs` are listed as part of `Azure Cognitive Services`,
    which can create confusion. However, Microsoft has announced that `Bing Search
    APIs` will transition from `Azure Cognitive Services` to `Azure Marketplace` on
    October 31, 2023^([^(16)](#fn16)), which will help address the separation of concerns.
    According to the announcement, “Bing Search APIs provisioned using Cognitive Services
    will be supported for the next three years or until the end of your Enterprise
    Agreement, whichever happens first.”


    ## Azure Cognitive Search


    Formerly known as `Azure Search`, `Azure Cognitive Search` is the AI-powered search
    service with extensive data enrichment capabilities, including OCR, NER, and key
    phrase extraction. Provided as a fully managed service, `Azure Cognitive Search`
    is supported by decades of work done at Microsoft Research on NLP, Office, Bing,
    and other search solutions. With crawling capabilities on some data sources, `Azure
    Cognitive Search` offers geospatial search, filtering, autocomplete, and search
    stacking or faceting features. Custom models help support your subject matter,
    as well as domain-specific client needs. More on the service offering can be read
    at `https://azure.microsoft.com/en-us/services/search/`.'
