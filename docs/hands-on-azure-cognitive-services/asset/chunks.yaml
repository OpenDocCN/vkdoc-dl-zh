  trans: '

    # 理解计算机视觉中的视觉 API


    **计算机视觉**是一组属于人工智能（AI）范畴的 API。它帮助你训练计算机（机器）。训练机器的过程就是教会计算机如何理解视觉世界。从数字图像中捕获文本数据（以及从视频中捕获图形数据）是计算机视觉领域最强大的发明之一。


    **人工智能（AI）** 指的是机器如何像人类一样思考的技术。这项技术涉及编程、算法和训练，通过指令或训练让机器像人类一样思考和行动。AI 一词诞生于 1956
    年，当时科学家们探索了诸如问题解决等主题。随后在 1960 年，当美国国防高级研究计划局（DARPA）对训练计算机并模仿人类基本推理的工作产生兴趣时，AI
    开始流行起来。这项研究非常成功，以至于在 2003 年，DARPA 推出了智能个人助理。


    深度学习是机器学习的一种类型，它有助于训练计算机/机器，使这些机器能够像人类一样执行任务。这些任务可以是语音识别、图像识别、对象规格说明，或者机器可以做出可能的决策和预测。


    简而言之，计算机视觉属于人工智能（AI）范畴。借助训练（称为深度学习），训练好的机器可以轻松识别物体。训练模型还能帮助这些机器对识别出的物体进行分类。请注意，识别和指定物体的准确性取决于机器的训练程度。


    光学字符识别（OCR）是一种技术，它可以帮助你从视觉文本文档（如扫描的纸张、图像、PDF 文件或任何其他包含可提取文本或视觉内容的文件格式）中创建可编辑或可搜索的数据。


    计算机视觉并非新鲜事物。它已经存在了六十多年。它在 20 世纪 70 年代变得更加流行，当时**雷蒙德·库兹韦尔**（被称为雷·库兹韦尔）将第一个光学字符识别工具商业化，并将其命名为“**全字体
    OCR**”。该工具能够处理几乎任何字体的印刷文本。在 2000 年，OCR 作为一项基于云的服务发布。


    现在，我们可以说计算机视觉已经成熟（但请记住，它仍在不断成长和自我学习）。它是给技术专家和科学家最好的礼物之一，让他们能够利用先进的能力来分析和识别数据。计算机视觉的内部工作原理相当简单，可以概括为以下步骤：


    1. **收集图像** – 如今，我们拥有大量的存储空间，从 100 GB 到 1 TB 甚至更多，并且我们有技术来捕获数字图像。因此，今天捕获和收集数字图像、照片和
    3D 物体变得非常容易。

    2. **图像处理** – 训练模型的第一步是我们需要数据。这些数据仅仅是相关图像的集合。现在，我们拥有计算能力更强的技术。我们可以处理数千张预先识别好的图像。

    3. **图像理解** – 这是计算机视觉识别或分类物体的步骤。


    上述步骤被称为基本步骤，它们仅描述了计算机视觉的基本功能。这些步骤可以根据所做的决策进一步细分。计算机视觉也可以分为以下步骤：


    - 图像分割，即将一张大图像分成多个区域、子区域或片段，以便可以分别检查每个部分。

    - 使用 X 和 Y 坐标检测，或识别单张图像中的物体。借助 X 和 Y 坐标，它创建一个边界框，然后很容易识别框内的所有内容。

    - 考虑面部识别，这是一种高级智能类型，用于检测物体。它非常先进，不仅能识别出图像中的人脸，还能识别出特定的个体（这是谁的脸）。

    - 模式检测是另一项高级功能，它可以识别图像中重复的形状和颜色。


    ## Microsoft Azure 认知服务


    计算机视觉 API 是一组基于云的服务，提供高级算法，帮助开发者分析和处理图像，以检索信息。简而言之，计算机视觉 API 提供对图像、手写内容和视频的洞察。


    现在，OCR 支持 API v3.2，适用于 73 种不同的语言。你可以在 [`https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/language-support#optical-character-recognition-ocr`](https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/language-support%2523optical-character-recognition-ocr)
    找到这些语言信息。


    要开始使用 Azure 门户，你需要一个有效的 Azure 帐户。如果你没有有效的 Azure 帐户，请按照以下步骤注册一个免费的 Azure 帐户：


    - 访问 [`https://signup.azure.com`](https://signup.azure.com)。

    - 要注册免费帐户，你需要提供有效的电话号码、有效的信用卡以及 GitHub 帐户或 Microsoft 帐户 ID（以前称为 Windows Live ID）。

    - 按照屏幕上的说明操作。


    注册后，你的帐户将包含 12 个月的免费服务。


    然后，你可以登录 Azure，网址为 [`https://portal.azure.com`](https://portal.azure.com)。登录后，你将进入门户主页，当前外观如图
    3-1 所示。


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig1_HTML.jpg](img/499686_1_En_3_Fig1_HTML.jpg)


    图 3-1


    Azure 门户


    对 Azure 门户的完整介绍超出了本书的范围。如果你想了解导航和使用 Azure 门户的详细信息，请参考 Apress 出版的《***Microsoft
    Azure 中的云调试和性能分析***》一书。


    ## 分析图像


    在上一节中，我们讨论了计算机视觉 API 如何提供识别和分析物体的方法。计算机视觉通过借助各种算法从图像中提取数据来实现这一点。计算机视觉通过提供数百个对象和参数，使开发者的工作更加轻松。在本节中，我们将进一步了解这些
    API，并通过一个代码示例将其提升到新的水平。


    首先，进入 Azure 门户，在搜索文本框中搜索“Cognitive Services”。或者，你可以点击**所有服务**、**AI + 机器学习**（在左侧窗格中），然后在右侧窗格中点击**认知服务**。参见图
    3-2。


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig2_HTML.jpg](img/499686_1_En_3_Fig2_HTML.jpg)


    图 3-2


    搜索认知服务


    接下来，你将看到认知服务屏幕。在此屏幕上，你可以管理现有服务或添加/创建新服务。这是图像分析之旅的起点。


    计算机视觉认知服务使用一个预训练的模型，帮助开发者分析图像。

    '
- fmt: '### Start Diving for Computer Vision


    To take advantage of the Computer Vision service, let’s first create a resource
    from the Azure portal. Search “Computer Vision” from the search text box, at the
    top of the screen. From the search results, click **Computer Vision** under *Marketplace*,
    as shown in Figure [3-3](#499686_1_En_3_Chapter.xhtml#Fig3).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig3_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig3_HTML.jpg)


    Figure 3-3 Computer Vision


    On the Create Computer Vision page, you need to provide details, like your Azure
    subscription, resource group, region, instance name, and pricing tier. See Figure
    [3-4](#499686_1_En_3_Chapter.xhtml#Fig4).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig4_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig4_HTML.jpg)


    Figure 3-4 Setting up Computer Vision


    Follow the on-screen instructions, and complete the process to create the Computer
    Vision instance. It will take some time. Once the deployment is completed, click
    **Go to resource**, as shown in Figure [3-5](#499686_1_En_3_Chapter.xhtml#Fig5).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig5_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig5_HTML.jpg)


    Figure 3-5 Deployment completion


    You will not be able to make API calls until you get the key and endpoint, so
    that the application can be authenticated.


    For demo purposes, we chose the Free Tier pricing model. For production level
    applications, you’ll need to evaluate the various pricing models to meet your
    unique requirements. For more information on the pricing tiers, see [`https://azure.microsoft.com/en-us/pricing/details/cognitive-services/computer-vision/`](https://azure.microsoft.com/en-us/pricing/details/cognitive-services/computer-vision/).


    To get the key and endpoint, click **Keys and Endpoint** available under the Resource
    Management section, in the left navigation menu. See Figure [3-6](#499686_1_En_3_Chapter.xhtml#Fig6).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig6_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig6_HTML.jpg)


    Figure 3-6 The Quick start page


    From the Keys and Endpoint page, write down your Key 1, Key 2, and Endpoint IDs,
    to use the Computer Vision resource. See Figure [3-7](#499686_1_En_3_Chapter.xhtml#Fig7).
    From this screen, you can also regenerate the keys.


