    ## 结论与总结


    你已经读完了本书的最后一章。我们希望这对你来说是一段有意义的旅程，并且对你学习和探索 Azure 认知服务与 Azure 机器学习领域的目标准备有所帮助。


    在最后一章中，你了解了认知服务之外的 Azure 机器学习产品、如何开始使用 Azure 机器学习，以及机器学习服务生态系统。你通过使用 Azure 机器学习
    Jupyter notebook 配置、构建、部署并测试了一个分类模型。你还探索了协作式 notebook、机器学习运维、强化学习、自动化机器学习、数据标记和自动缩放计算等功能。


    现在，你可以将所学知识应用到实际项目中。学习这些不断变化且细致入微的新技术的最佳方式就是开始动手实践。如同人工智能和机器学习这门学科一样，Azure 机器学习也在不断发展，并不断添加新的功能、特性和技能。今天就是开始（或继续学习）的好日子。


    祝你机器学习愉快！'
