- fmt: '# 5. Speech – Talk to Your Application


    In the previous chapter, we saw how text models can be used to build enriched
    text and to build smart search applications from unstructured data. In this chapter,
    we will add a capability to our cognitive computing toolkit – how to understand
    the request from a user and process these requests via speech. To extend this
    skillset, you will see how you can take user input via speech, create custom input
    events, and interact with your user.


    Interaction, in communication, is one of the important behaviors of humans. With
    the help of communication, you can describe the things you see and use. Communication
    can be verbal or nonverbal, but the aim would be the same in either case. Your
    speech plays an important role to describe and commute your words. Your verbal
    communication is flawless, if your speech is delivered in such a way that your
    audience can understand it. In the same way, your nonverbal communication is mostly
    depending upon the text. Your text should be precise and understandable.


    In a real-world scenario, there are a lot of hurdles for someone to overcome,
    in order to communicate everything they need to convey, perfectly, in nonverbal
    communication (text). Others can do the same, more easily, in verbal communication
    (speech).


    The aim of this chapter is to provide insight on speech services by evaluating
    and translating text to speech and vice versa. We will also build a comprehensive
    sample that provides cognitive capabilities, such as speech recognition with microphone
    input, continuous recognition with file input, customized models, pull and push
    audio streams, keyword spotting, translation with microphone input, file input
    and audio streams, intent recognition, speech synthesis, keyword recognition,
    language detection, and much more. All these capabilities can be used in a variety
    of enterprise use cases.


    Throughout this chapter, the following topics will be covered:


    - Understanding speech and speech services

    - Speech to text – converting spoken audio to text for interaction

    - Cognitive speech search with LUIS and Speech Studio

    - Custom Keyword using Speech Studio

    - Summary of the Speech API


    ## Understanding Speech and Speech Services


    As humans, we have special abilities, and one of those abilities is the ability
    to express our thoughts and feelings, to explain specific work and tasks by generating
    sounds. These sounds could be anything, vocal music, words, or a song. Anything
    classified as a linguistic sound can be translated to become understood in any
    language. This is what we call *speech*. The aim of speech is to connect or communicate
    with an audience, in order to deliver a specific message. The message may differ
    from one place to another place. (For example, in a classroom, a teacher’s message
    is related to the subject for her or his students.) Similarly, when we talk about
    the application in software development, it must communicate directly with its
    users. This communication can be through voice (speech) or text.


    Microsoft Azure Cognitive Services provides the facility to develop smart applications,
    with the help of APIs and the Azure Speech service.


    ### Comprehensive Privacy and Security^([^(12)](#fn12))


    - The Speech service, part of Azure Cognitive Services, is [certified](https://docs.microsoft.com/en-us/microsoft-365/compliance/offering-home%253Fview%253Do365-worldwide)
    by SOC, FedRAMP, PCI DSS, HIPAA, HITECH, and ISO.

    - Your data remains yours. Your audio input and transcription data aren’t logged
    during audio processing.

    - View and delete your Custom Speech data and models at any time. Your data is
    encrypted while it’s in storage.

    - Backed by the Azure infrastructure, the Speech service offers enterprise-grade
    security, availability, compliance, and manageability.


    **Microsoft Azure has introduced the Speech service, which also replaced the Bing
    Speech API and Translator Speech.**


    Azure Cognitive Services provides the following tools to develop speech-enabled
    smart applications:


    - Azure Speech CLI – [`https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/spx-overview`](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/spx-overview)

    - Cognitive Services Speech Studio – [`https://speech.microsoft.com/`](https://speech.microsoft.com/)

    - Speech Devices SDK – [`https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-devices-sdk-quickstart`](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/speech-devices-sdk-quickstart%253Fpivots%253Dplatform-android)

    - Speech service API – [`https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/overview#reference-docs`](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/overview%2523reference-docs)


    ### Getting Started


    If you want to start or want to try the Speech service, you can try it with a
    free account by following these steps:


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig1_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig1_HTML.jpg)


    Figure 5-1: Creating a new resource for the Speech service


    1. If you don’t have an Azure account, you can create a free account: [`https://azure.microsoft.com/en-in/free/`](https://azure.microsoft.com/en-in/free/).

    2. Sign into the Azure portal: [`https://portal.azure.com/`](https://portal.azure.com/).

    3. From the search text box, search for “Speech.”

    4. Select “Speech” services, and then click **Create** to create a new resource
    (as shown in Figure [5-1](#499686_1_En_5_Chapter.xhtml#Fig1)).


    ### Translating Speech Real Time into Your Application


    Azure Cognitive Services are backed by a world-class model deployment technology,
    which was built by top experts. There are many plans and offers for you to use
    a pay-as-you-go model, instead of investing in development and infrastructure
    that you may need if you choose to develop and host your models.


    Azure Marketplace is a one-stop place to get all the services. You will be sent
    to Azure Marketplace, as soon as you click **Add** or **Create cognitive services**
    (as shown in Figure [5-2](#499686_1_En_5_Chapter.xhtml#Fig2)).


    ![../images/499686_1_En_5_Chapter/499686_1_En_5_Fig2_HTML.jpg](images/499686_1_En_5_Chapter/499686_1_En_5_Fig2_HTML.jpg)


    Figure 5-2: Add/Create cognitive services


    Before getting started with the Azure Speech service, let’s take a look at some
    important considerations. Due to frequent updates, new regions, and languages
    being added, your environment will get out of sync as soon as this book gets published.
    Therefore, we have included the following links that will provide the most up-to-date
    information:


    - Language, voice support – [`https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/language-support`](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/language-support)

    - Service availability, region wise – [`https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/regions`](https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/regions)

    - Pricing – [`https://azure.microsoft.com/en-us/pricing/details/cognitive-services/speech-services/`](https://azure.microsoft.com/en-us/pricing/details/cognitive-services/speech-services/)'
