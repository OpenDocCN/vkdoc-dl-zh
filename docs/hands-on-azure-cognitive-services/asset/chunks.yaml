    # 6. Decision – Make Smarter Decisions in Your Applications


    Decisions, decisions, decisions – sriracha or Tabasco, team Jacob or team Edward,
    PC or Mac, iPhone or Android, Fortnite or Apex, Coke or Pepsi, *Star Wars* or
    *Star Trek*… (Okay, that last one isn’t that much of a discussion, but we digress.)
    Making decisions is possibly the most human thing we do. These decisions are based
    on inputs from sensory information available to us, coupled with some a priori
    observations, facts, our implicit biases, and lots of heuristics. This *cognitive
    computing* capability of being able to decide the next best action is a permanent
    fixture in decision sciences. Studying and capturing our innate skills of how
    we come to these decisions requires an understanding of how we ingest and process
    this information. Then we can conclude the results.


    The nuances associated with decision making can be summed up quite well by, "I
    know it when I see it." This is a seminal quote by Justice Potter Stewart to describe
    his test for obscenity. Keeping it PG, in this chapter, we will see how APIs can
    be used for this purpose. This chapter will provide insight on decision services
    by adding content moderation facility in the application. The chapter will also
    touch on a relatively new feature – Anomaly Detector. The following are some of
    the salient features of this chapter:


    1.  Understanding the decision service and Decision APIs

    2.  Creating an auto Content Moderator application

    3.  Creating personalized experiences with the Personalizer

    4.  Identifying future problems with the Anomaly Detector

    5.  Exploring metrics with the Metrics Advisor service

    6.  Summary of the Decision API


    So, without further ado, let’s dive in!


    Enterprise Decision Management is the art and science of using business rules,
    domain knowledge, predictive analytics, and big data to build and drive efficient
    business processes. It’s an exciting topic, but nevertheless, it is beyond the
    scope of this manuscript.'
