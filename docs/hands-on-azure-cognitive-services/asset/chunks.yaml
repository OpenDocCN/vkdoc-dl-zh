- fmt: '# Overview of Azure Cognitive Services


    Microsoft Azure Cognitive Services provides you with the ability to develop smart
    applications. You can build these smart applications with the help of APIs, SDKs
    (software development kits), services, and so on.


    `Microsoft Azure Cognitive Services` is a set of APIs, SDKs, and services that
    facilitate developers to create smart applications (without the prior knowledge
    of AI or ML).


    Azure Cognitive Services provides everything that developers need in order to
    work on AI solutions, without the knowledge of data science. A developer can create
    a smart application that can converse, understand, or train itself.


    ## Why Azure Cognitive Services


    Azure Cognitive Services is backed by world-class model deployment technologies,
    and it is built by top experts in the area. There are a lot of plans and offers
    that use the pay-as-you-go model. You no longer have to invest in the development
    and infrastructure that you may need in order to build and host your models. Cognitive
    Services provides all this for you.


    The following list shows the advantages you gain when you use Azure Cognitive
    Services:


    - You don’t need to build your own custom machine learning model.

    - You gain a required AI service for your app. Azure Cognitive Services, as a
    **Platform as a Service** (**PaaS**), can offer these required features.


    > You can build upon a **Platform as a Service** (**PaaS**) without being concerned
    about the infrastructure used to support the service.


    - You can invest your development time in the core app and release a stronger
    product.


    **Note**


    You should not use Azure Cognitive Services if it doesn’t meet your requirements.
    For example, your data might have regulatory requirements that stop you from using
    an external service, like Azure. Or your organization might have a long-term commitment
    toward developing its own data science practices and product.


    In the next section, we will discuss the Cognitive Services APIs in more detail.


    ## Exploring the Cognitive Services APIs: Vision, Speech, Language, Web Search,
    and Decision


    In the preceding section, we discussed Cognitive Services and the advantages that
    it provides. In this section, we will explore the APIs that are available to help
    developers.


    Figure [1-1](#499686_1_En_1_Chapter.xhtml#Fig1) provides a pictorial overview
    of these APIs.


    ![../images/499686_1_En_1_Chapter/499686_1_En_1_Fig1_HTML.jpg](images/499686_1_En_1_Chapter/499686_1_En_1_Fig1_HTML.jpg)


    *Figure 1-1 Pictorial overview of Cognitive Services APIs*


    Figure [1-1](#499686_1_En_1_Chapter.xhtml#Fig1) displays the following elements
    of the Azure Cognitive Services APIs:


    - I – Represents all the Azure Cognitive Services APIs

    - II – Represents the developer who consumes these APIs to build smart apps

    - 1 – Vision APIs

    - 2 – Speech APIs

    - 3 – Language APIs

    - 4 – Web Search APIs

    - 5 – Decision APIs


    The Vision APIs provide insights on images, handwriting, and videos. The Speech
    APIs analyze and convert audio voices. The Language APIs offer you text analysis,
    they can make text easier to read, they help you create intelligent chat features,
    and they can translate text. The Bing Web Search APIs allow you to search and
    pull content from the entire Internet, leveraging pages, text, images, videos,
    news, and more. Finally, the Decision APIs help your app make intelligent decisions
    to moderate and personalize content for your users, and they help you detect anomalies
    in your data.


    In the upcoming sections, we will briefly introduce you to each of these sets
    of APIs.


    ### Vision APIs


    First, let’s explore the Vision APIs from Azure Cognitive Services. Use these
    APIs whenever you need to work with images or videos, to understand or analyze
    their contents. These APIs help you to get information like a facial analysis
    (determining age, gender, and more), feelings (e.g., through facial expressions),
    and more visual contents. Furthermore, with the help of these APIs, you can read
    the text from images, and thumbnails can be easily generated from images and/or
    videos. The Cognitive Services Vision APIs are divided into the following APIs,
    as detailed in the following.


    #### Computer Vision


    The `Computer Vision` API allows the developer to analyze an image and its contents.
    In the previous section, we discussed that with the help of Vision APIs, you can
    understand and collect the image contents. You can decide what content and information
    to retrieve from an image, based on your requirements. For example, a business
    might need to access the images in order to help make sure kids using their web
    app will avoid viewing adult content.


    This API can also read printed text, hand-written text via optical character recognition
    (OCR).


    **Note**


    The current version of the `Computer Vision` API is v3.0, at the time of writing
    this book.


    From a development perspective, you can either use RESTful (representational state
    transfer) APIs or you can build applications using an SDK. We will cover the development
    instructions and details in Chapter [3](#499686_1_En_3_Chapter.xhtml).


    #### Custom Vision


    The Cognitive Services APIs for Custom Vision provide a way to customize images
    with various customizations. You can customize the images with labels, and you
    can assess and improve these images based on the customization classifiers. The
    Custom Vision APIs use machine learning algorithms and apply labels to assess
    and improve the images. Furthermore, it is divided into two parts:


    1. **Image classification** – Applies the label to an image.

    2. **Object detection** – Applies the label, and it returns the coordinates from
    the image where the label is located.


    #### Face


    This API helps you detect and analyze human faces from an image. The algorithm
    can detect and analyze the data.


    This service provides the following features:


    ![../images/499686_1_En_1_Chapter/499686_1_En_1_Fig2_HTML.jpg](images/499686_1_En_1_Chapter/499686_1_En_1_Fig2_HTML.jpg)


    *Figure 1-2 Human face detection using the Face API*


    - **Face detection** – Detects a human face and provides the coordinates of where
    the face is located in the image. Based on the algorithm, you can also get various
    properties of face detection, such as gender, the head pose, emotions, age, and
    so on. Figure [1-2](#499686_1_En_1_Chapter.xhtml#Fig2) shows the face detection
    of a human (the author, Gaurav Aroraa).


    ![../images/499686_1_En_1_Chapter/499686_1_En_1_Fig3_HTML.jpg](images/499686_1_En_1_Chapter/499686_1_En_1_Fig3_HTML.jpg)


    *Figure 1-3 Face verification*


    - **Face verification** – Verifies two similar faces from images of one human
    face to compare them, in order to find out whether it belongs to the same human.
    Figure [1-3](#499686_1_En_1_Chapter.xhtml#Fig3) shows two faces of the same human.

    - **Face grouping** – Groups the similar faces from an available database or set
    of faces.


    **Note**


    During your development cycle, the `Face` API and its data must meet the requirements
    of the privacy policies. You can refer to the Microsoft policies on customer data
    here: [`https://azure.microsoft.com/en-us/support/legal/cognitive-services-compliance-and-privacy/`](https://azure.microsoft.com/en-us/support/legal/cognitive-services-compliance-and-privacy/).


    #### Form Recognizer


    `Form Recognizer` extracts the data in key/value pairs and extracts the table
    data from a form-type document.


    This is made with the following components:


    - **Custom models** – Enables you to train your own data by providing five-form
    samples.

    - **Prebuilt receipt model** – You can also use the prebuilt receipt model. Currently,
    only English sales receipts from the Unites States are available.

    - **Layout API** – It enables `Form Recognizer` to extract the text and table
    structure data, by using optical character recognition (OCR).'
  raw: '## Overview of Azure Cognitive Services


    Microsoft Azure Cognitive Services provides you with the ability to develop smart
    applications. You can build these smart applications with the help of APIs, SDKs
    (software development kits), services, and so on.


    Microsoft Azure Cognitive Services


    is a set of APIs, SDKs, and services that facilitate developers to create smart
    applications (without the prior knowledge of AI or ML).


    Azure Cognitive Services provides everything that developers need in order to
    work on AI solutions, without the knowledge of data science. A developer can create
    a smart application that can converse, understand, or train itself.


    ### Why Azure Cognitive Services


    Azure Cognitive Services is backed by world-class model deployment technologies,
    and it is built by top experts in the area. There are a lot of plans and offers
    that use the pay-as-you-go model. You no longer have to invest in the development
    and infrastructure that you may need in order to build and host your models. Cognitive
    Services provides all this for you.


    The following list shows the advantages you gain when you use Azure Cognitive
    Services:


    *   You don’t need to build your own custom machine learning model.


    *   You gain a required AI service for your app. Azure Cognitive Services, as
    a **Platform as a Service** (**PaaS**) , can offer these required features.


    > *You can build upon a* ***Platform as a Service*** *(**PaaS**) without being
    concerned about the infrastructure used to support the service.*


    *   You can invest your development time in the core app and release a stronger
    product.


    Note


    You should not use Azure Cognitive Services if it doesn’t meet your requirements.
    For example, your data might have regulatory requirements that stop you from using
    an external service, like Azure. Or your organization might have a long-term commitment
    toward developing its own data science practices and product.


    In the next section, we will discuss the Cognitive Services APIs in more detail.


