    The deployment container is created


    Now you can verify that the pod (the smallest deployable unit, in this case the
    Cognitive Service container and associated services and dependencies) was deployed
    and the services are running, as shown in Figure [8-41](#499686_1_En_8_Chapter.xhtml#Fig41).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig41_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig41_HTML.jpg)


    Figure 8-41


    Verifying the deployment


    As the earlier screenshot shows, the container is now accessible via a public
    IP address, [`http://20.75.16.10:5000/`](http://20.75.16.10:5000/), and it can
    be invoked to gain access to the Cognitive Services container and associated APIs.
    After connecting to the cluster, you can run a variety of different commands,
    as shown in Figure [8-42](#499686_1_En_8_Chapter.xhtml#Fig42).


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig42_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig42_HTML.jpg)


    Figure 8-42


    Different commands you can use


    These commands, and the logs screen shown in Figure [8-43](#499686_1_En_8_Chapter.xhtml#Fig43),
    show the amount of control you have over your container management with K8s, as
    compared to a single individual ACI deployment.


    ![../images/499686_1_En_8_Chapter/499686_1_En_8_Fig43_HTML.jpg](images/499686_1_En_8_Chapter/499686_1_En_8_Fig43_HTML.jpg)


    Figure 8-43


    The Logs screen


    ## Summary and Conclusion


    Containers are contained, barely. The world of containers is as big as the thriving
    discipline of DevOps, and it’s extremely difficult to cover it in a short chapter.
    We tried our best to help you develop an understanding of the Cognitive Services
    container ecosystem. We explored Docker, ACI, and AKS, and we looked into how
    the containers work in different settings. You then created samples, which call
    the self-contained code from containers, without calling the Cognitive Services
    directly.


    You now have the fundamentals to start exploring and to use these technologies
    for your own business use cases. Your regulatory, compliance, infrastructure,
    and operational use cases will be different, but these fundamentals will help
    you get started with containerization within your organization.


    Keep containerization!


    # 9. Azure Bot Services


    Human: What do we want?


    Machine: Context-aware NLP bots


    Human: When do we want it?


    Machine: When do we want what?


    Natural language processing (NLP) is a core element of a bot service. Unlike our
    joke, we want to develop artificial intelligence (AI) in our bots, to understand
    the context of a conversation. Bots are conversational user interfaces that allow
    you to communicate with the machines in different modalities, such as text and
    voice. Azure Bot Services is a cloud based, managed, integrated environment to
    empower bot development, hosting, and management. Azure Bot Services allow you
    to focus on what’s important, the crux of conversational interface, while it handles
    the infrastructure and associated toolset. Powered by the comprehensive Bot Framework,
    Bot Services comes with prebuilt templates for you to get started, providing a
    browser-based interface to make bot development as easy as possible.


    In this chapter, we will provide insights on Bot Services by creating the COVID-19
    QnA Bot. You will learn the following topics:


    1.  Understanding Azure Bot Services


    2.  Creating a COVID-19 bot using Azure Bot Services


    3.  Using the Azure Bot Builder SDK^([^(32)](#fn32))'
