    \ to uploaded images that might contain sexually explicit, hateful, violent, or\
    \ extreme contents, and more. In this section, you have learned how to use the\
    \ content moderation service with its powerful review features – both via an API\
    \ and the human-in-the-loop console.\n\nIn the next section, we will explore another\
    \ one of decision services, Personalizer."
