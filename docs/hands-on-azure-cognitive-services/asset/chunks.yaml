- fmt: '# Classification Model Using Azure Machine Learning Designer


    In the earlier example, we built a classification model, by using Azure Machine
    Learning notebooks. This was a code-heavy approach that required us to write Python
    code for different algorithms. Now, we will follow a low-code approach, by using
    the Azure Machine Learning designer, as shown in Figure [10-27](#499686_1_En_10_Chapter.xhtml#Fig27).


    In the left pane of the Azure Machine Learning workspace portal, click `Designer`.
    The designer homepage opens, where you can see the collection of pipelines (shown
    in Figure [10-27](#499686_1_En_10_Chapter.xhtml#Fig27)).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig27_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig27_HTML.jpg)


    **Figure 10-27** – Azure Machine Learning designer – main screen


    The Microsoft Azure team provides a set of basic and advanced recipes to learn
    how to use the designer. The example pipelines and datasets for Azure Machine
    Learning designer include regression examples, like automobile price prediction,
    classification use cases (such as binary classification with feature selection
    for income), credit risk, flight delay, customer relationship prediction, text
    classification with Wikipedia SP 500 Dataset, and computer vision–based Image
    Classification, using DenseNet. The examples also include recommendation engines,
    such as a restaurant rating prediction, movie ratings based on tweets, and binary
    classification using Vowpal Wabbit Model for Adult Income Prediction.


    To build a classification model by using Azure Machine Learning designer, follow
    these steps:


    1. In this example, we will use the Adult Census Income dataset. Open up the example
    by double-clicking it, from the home screen, or build it from scratch. To continue,
    click the `Designer` tab (in the left pane). See Figure [10-28](#499686_1_En_10_Chapter.xhtml#Fig28).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig28_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig28_HTML.jpg)


    **Figure 10-28** – Azure Machine Learning designer – authoring


    2. The designer is a drag-and-drop tool for citizen data scientists, with low-code
    focus. It is fairly easy to use. You can start by dragging the `Adult Census Income
    Binary Classification` dataset (as shown in Figure [10-29](#499686_1_En_10_Chapter.xhtml#Fig29)).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig29_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig29_HTML.jpg)


    **Figure 10-29** – Azure Machine Learning designer – dataset import


    Once you drag and drop the dataset, you will see the parameters for the dataset
    on the right pane (see Figure [10-30](#499686_1_En_10_Chapter.xhtml#Fig30)).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig30_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig30_HTML.jpg)


    **Figure 10-30** – Azure Machine Learning designer – dataset import


    3. The dataset needs to be split into a training dataset and a test dataset. This
    was accomplished in the previous session by using code. However, here we will
    use the split data module to accomplish this task. We will perform the randomized
    split of the dataset. See Figure [10-31](#499686_1_En_10_Chapter.xhtml#Fig31).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig31_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig31_HTML.jpg)


    **Figure 10-31** – Azure Machine Learning designer – split data


    4. Then filter the features and define the target column (`income`), with Pearson
    correlation as the feature scoring method. The other supported technique is chi
    squared, as seen in Figure [10-32](#499686_1_En_10_Chapter.xhtml#Fig32).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig32_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig32_HTML.jpg)


    **Figure 10-32** – Azure Machine Learning designer – Filter Based Feature Selection


    5. Now that the data ingestion is completed, a `Two-Class Boosted Decision Tree`
    module can be used to initialize the classifier, which requires a `Train Model`
    module and associated transformation. In the left pane, you can see the different
    types of transformations that are supported by the Azure Machine Learning designer
    (as shown in Figure [10-33](#499686_1_En_10_Chapter.xhtml#Fig33)).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig33_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig33_HTML.jpg)


    **Figure 10-33** – Azure Machine Learning designer – select columns


    Connect the `Train Model` module with the `Score Model`, along with the test set.
    Add the `Evaluate Model` module. The final pipeline should look like Figure [10-34](#499686_1_En_10_Chapter.xhtml#Fig34).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig34_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig34_HTML.jpg)


    **Figure 10-34** – Azure Machine Learning designer – final flow


    On the left pane, you can see the list of algorithms that are available, including
    boosted decision trees, fast forest regression, linear regression, neural networking
    regression, and Poisson regression, to name a few. As the run completes, you can
    now see the run attributes and the score card for model used, in this case, the
    `Two-Class Boosted Decision Tree` (see Figure [10-35](#499686_1_En_10_Chapter.xhtml#Fig35)).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig35_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig35_HTML.jpg)


    **Figure 10-35** – Azure Machine Learning designer – Run overview


    Once the run is completed, in the model runs overview window, you can expand and
    see the individual tasks within the run (`Evaluate Model`, `Applying Transformation`,
    `Scoring`, `Selecting Columns`, `Splitting Dataset`, and so on) and the time taken
    for each individual part of the process. Here, we can see that the `Two-Class
    Boosted Decision Tree` took the most time. You can also use Azure Machine Learning
    Visual Studio Code extension; step-by-step instructions are found here.^([^(40)](#fn40))
    See the Run view in Figure [10-36](#499686_1_En_10_Chapter.xhtml#Fig36).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig36_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig36_HTML.jpg)


    **Figure 10-36** – Azure Machine Learning designer – Run view


    Now that the run has been completed, right-click the `Evaluate Model`, and click
    `Visualize` and then `Evaluation results`, as shown in Figure [10-37](#499686_1_En_10_Chapter.xhtml#Fig37).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig37_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig37_HTML.jpg)


    **Figure 10-37** – Azure Machine Learning designer – Evaluate Model visualization


    The results show the `Score Model` result visualization for different attributes
    and their scored label (such as whether they would have income greater or less
    than $50,000). See Figure [10-38](#499686_1_En_10_Chapter.xhtml#Fig38).


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig38_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig38_HTML.jpg)


    **Figure 10-38** – Azure Machine Learning designer – Score Model result visualization


    You can also see the accuracy, precision recall, lift, and confusion matrix for
    the model (see Figure [10-39](#499686_1_En_10_Chapter.xhtml#Fig39)). In this case,
    the model accuracy is ~85%.


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig39_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig39_HTML.jpg)


    **Figure 10-39** – Azure Machine Learning designer – Evaluate Model result visualization


    In this low-code, designer-based, drag-and-drop approach, you can get the results
    faster with minimal coding. This is a suitable IDE for citizen data scientists,
    and perspective data scientists and machine learning engineers, who want to experiment
    with the given dataset, without putting in a lot of effort.'
