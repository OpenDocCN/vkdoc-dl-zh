  trans: "\n# Azure 门户与 Azure 认知服务入门\n\nMicrosoft Azure 认知服务提供了开发智能应用程序的功能。你可以借助 `API`、`SDK`、服务等来构建这些智能应用程序。\n\
    \nMicrosoft Azure 认知服务是一组 `API`、`SDK` 和服务，可帮助开发者在无需预先掌握 AI 或 ML 知识的情况下创建智能应用程序。\n\
    \nAzure 认知服务为开发者（即使不具备数据科学知识）提供了开发智能应用程序所需的一切。例如，借助认知服务，开发者可以创建能够对话、理解或自我训练的智能应用程序。\n\
    \n在本节中，我们将逐步了解 Azure 门户，并探索 Azure 认知服务的各种选项。\n\n本节是对 Azure 门户的逐步介绍。如果你已经熟悉 Azure\
    \ 门户，可以跳过本节。\n\n要开始使用 Azure 门户，你需要一个有效的 Azure 帐户。如果你没有有效的 Azure 帐户，请按照以下步骤注册一个免费\
    \ Azure 帐户：\n\n*   访问 [`https://signup.azure.com`](https://signup.azure.com)。\n\
    *   要注册免费帐户，你必须拥有有效的电话号码、有效的信用卡以及 GitHub 帐户或 Microsoft 帐户 ID（以前称为 Windows Live\
    \ ID）。\n*   按照屏幕上的说明操作。\n\n完成注册后，你的免费帐户将包含以下权益：\n\n*   12 个月的免费服务\n*   使用免费帐户，你可以借助以下免费服务构建智能应用程序：\n\
    \    *   计算机视觉\n    *   个性化体验创建服务\n    *   翻译器\n    *   异常检测器\n    *   表单识别器\n\
    \    *   人脸服务\n    *   语言理解\n    *   QnA Maker\n\n要查看免费产品和服务的完整列表，请参考此链接：[`https://azure.microsoft.com/en-us/free/`](https://azure.microsoft.com/en-us/free/)。\n\
    \n完成注册后，登录 Azure 门户（[`https://portal.azure.com`](https://portal.azure.com)）。登录后，你将进入\
    \ Azure 门户主页，其外观应如图 2-1 所示。\n\n![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig1_HTML.jpg](img/499686_1_En_2_Fig1_HTML.jpg)\n\
    \n**图 2-1** Azure 门户\n\n你可以看到根据订阅可用的各种服务。这是探索 Azure 产品和服务的起点。\n\n对 Azure 门户的完整介绍超出了本书的范围。如果你想详细了解如何在\
    \ Azure 门户中工作，请参考由 Apress 出版的《*Cloud Debugging and Profiling in Microsoft Azure*》一书。\n\
    \n## Azure 认知服务入门\n\n让我们来探索 Microsoft Azure 认知服务。请注意，我们将在后续章节中通过代码示例逐一介绍每项服务。要开始使用认知服务，请在\
    \ Azure 门户的搜索文本框中搜索“Cognitive Services”，或单击**所有服务** ➤ **AI + 机器学习** ➤ **认知服务**（见图\
    \ 2-2）。\n\n![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig2_HTML.jpg](img/499686_1_En_2_Fig2_HTML.jpg)\n\
    \n**图 2-2** 认知服务\n\n接下来，你将看到认知服务屏幕。在此屏幕上，你可以管理现有服务或添加/创建新服务。这是你需要开始探索 Azure 市场的起点。\n\
    \n在下一节中，我们将讨论 Azure 市场中的认知服务。\n\n## Azure 市场：AI + 机器学习概述\n\nAzure 认知服务由世界一流的模型部署技术支持，这些技术由该领域的顶尖专家构建。借助即用即付模式，你可以从许多不同的计划和优惠中进行选择。你可以找到更快、更简单且通常更便宜的解决方案，而无需投资于你可能需要的开发和基础设施（如果你选择为此类常见用例开发和托管自己的模型）。\n\
    \nAzure 市场是一个获取所有服务的一站式商店。一旦你单击**添加**或**创建认知服务**，你将被引导至 Azure 市场（见图 2-3）。\n\n\
    ![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig3_HTML.jpg](img/499686_1_En_2_Fig3_HTML.jpg)\n\
    \n**图 2-3** 添加或创建认知服务\n\nAzure 市场提供多种类别的产品，包括以下示例：\n\n*   **机器人服务** – 包含用于创建、测试、部署和管理智能机器人的工具。\n\
    *   **认知服务** – 我们在第 1 章中概述了这些服务。\n*   **ML 服务** – Azure 机器学习可为你构建智能模型和可重复的工作流，以便部署和管理。\n\
    *   **自动化 ML** – 使用 AutoML，你可以通过指定目标指标来训练和调整模型。\n*   **业务或机器人流程自动化** – 允许你创建虚拟劳动力，以帮助推动业务发展。\n\
    *   **数据标注** – 在团队中创建、管理和监控标注项目。\n*   **数据准备** – 确保数据使用正确的编码和一致的架构，例如。\n*   **知识挖掘**\
    \ – 快速探索和学习大量数据，以发现重要的见解、关系和模式。\n*   **ML 操作** – MLOps 将 DevOps 应用于机器学习，包括构建持续集成、交付、部署和质量保证。\n\
    *   以及更多\n\n## 了解软件开发工具包 (SDK)：开始使用你喜爱的编程语言\n\n你会发现从头开始编写每一段代码既复杂又耗时。我们可以借助软件开发工具包（`SDK`）来最大程度地减少工作量和时间。你可以使用各种可用的\
    \ `SDK` 来开发认知服务应用程序。目前 `SDK` 支持以下主要语言（截至本书编写时）：\n\n*   C#\n*   Go（通常称为 Golang\
    \ 或 Go 语言）\n*   Java\n*   JavaScript\n*   Python\n*   R\n\n本书中的所有示例都将使用 C#。\n"
- fmt: '# Setting Up Your Visual Studio Template


    At this point, you have a basic understanding of the Azure portal and the various
    services provided in Azure Marketplace. Now it’s time to start building a small
    app. In this section, you will start by setting up your environment, using Visual
    Studio, and you’ll follow this approach throughout the book.


    We are creating this template so that while we create more small applications
    to describe the topic in the coming chapters, we do not need to recreate this
    same application more than once.


    > We use Visual Studio 2019 Community Edition to build the examples.


    Before you get started with the template setup, make sure you have **ASP.NET and
    web development** and the **.NET desktop development** workloads installed in
    your Visual Studio 2019 environment (see Figure [2-4](#499686_1_En_2_Chapter.xhtml#Fig4)).


    ![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig4_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig4_HTML.jpg)


    Figure 2-4 – Workload selection – .NET desktop development


    Let’s create a Visual Studio template:


    ![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig5_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig5_HTML.jpg)


    Figure 2-5 – Creating a new project


    1.  Open Visual Studio.

    2.  Click **File**, **Project**, **New Project**, and then search for and select
    **ASP.NET Core Web Application** (see Figure [2-5](#499686_1_En_2_Chapter.xhtml#Fig5)).
    Click **Next**.


    ![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig6_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig6_HTML.jpg)


    Figure 2-6 – Configuring your new project


    1.  Enter your project name location and so on. These values will not be the same
    as our template, so do not worry about these values (see Figure [2-6](#499686_1_En_2_Chapter.xhtml#Fig6)).


    ![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig7_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig7_HTML.jpg)


    Figure 2-7 – Selecting an empty template


    1.  Select the **Empty** project (in the left pane). Make sure you select **.NET
    Core** and **ASP.NET Core 3.1** from the drop-down lists, at the top of the page
    (see Figure [2-7](#499686_1_En_2_Chapter.xhtml#Fig7)). Click **Create** (in the
    lower right corner).


    ![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig8_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig8_HTML.jpg)


    Figure 2-8 – Choose Template Type


    1.  Let’s keep it simple. We won’t add anything additional for this template.
    Click **Project** and then **Export Template**. From the Choose Template Type
    screen (in the Export Template Wizard), select the **Project template** option,
    and then click **Next** (see Figure [2-8](#499686_1_En_2_Chapter.xhtml#Fig8)).


    ![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig9_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig9_HTML.jpg)


    Figure 2-9 – Select Template Options


    1.  From the next screen of the Export Template Wizard, provide the **Template
    name** and **Template description**. You can also provide the **Icon Image**.
    Make sure both of the check boxes remain checked, and then click **Finish** (see
    Figure [2-9](#499686_1_En_2_Chapter.xhtml#Fig9)).


    Your exported template should be generated into your “My Exported Templates” folder
    in the “Visual Studio 2019” folder.


    > We have also created a template for a desktop application, by using WPF. This
    template (`Covid19WpfApp.zip`) is located in the GitHub repository [`https://github.com/Apress/hands-on-azure-cognitive-services/blob/main/Chapter%2002/Templates/Covid19WpfApp.zip`](https://www.github.com/Apress/hands-on-azure-cognitive-services/blob/main/Chapter%252002/Templates/Covid19WpfApp.zip).


    We’re now done with the preparation of the template. This is a blank Asp.Net Core
    3.1 template that we will use with our upcoming code examples. You can also extract
    the template zip file and open the `MyTemplate.vstemplate` file in any text editor.
    (We opened it in Notepad++.) The zip file contains the following files, as shown
    in Figure [2-10](#499686_1_En_2_Chapter.xhtml#Fig10).


    ![../images/499686_1_En_2_Chapter/499686_1_En_2_Fig10_HTML.jpg](images/499686_1_En_2_Chapter/499686_1_En_2_Fig10_HTML.jpg)


    Figure 2-10 – Template files


    The `MyTemplate.vstemplate` file consists of the following code (see Listing [2-1](#499686_1_En_2_Chapter.xhtml#PC1)).


    ```

    Covid19 Web Smart App Template

    This is a basic template to create all COVID19 web sample applications

    CSharp


    C#

    Web

    Covid19


    true

    Covid19WebSmartAppTemplate

    true

    Enabled

    true

    true

    __TemplateIcon.ico


    ...

    ```


    Listing 2-1 – `MyTemplate` configuration


    Make sure you update the following optional tags in your exported template file
    (from Listing [2-1](#499686_1_En_2_Chapter.xhtml#PC1)):


    *   `LanguageTag`

    *   `ProjectTypeTag(s)`


    You can see this is a simple XML file that defines the various properties of the
    template. The main properties are listed as follows. These properties help Visual
    Studio to group the project template on the Add New Project dialog:


    *   **Template Data** – This is to define the template name and its description.
    This name and description appear on the Add New Project dialog window.

    *   **ProjectType** – This contains the value of the project type, such as `CSharp`.

    *   **LanguageTag** – This is an important property that tells Visual Studio that
    the template is for a specific language. For example, our template is for C#.

    *   **ProjectTypeTag** – This contains the value of the project type, such as
    Web, Desktop, and so on. Our template has these `ProjectType` labels: Web and
    Covid19.


    In this section, we created a Visual Studio template. This template will be helpful
    for us, while we create our code examples in the upcoming chapters.


    ## Summary


    The aim of this chapter was to explore the Azure portal and to get started with
    Cognitive Services. In this chapter, we discussed Azure Marketplace. We went through
    the various available SDKs. Finally, we created a Visual Studio template to start
    building an app with Cognitive Services.


    In the next chapter, we will continue with the discussion of Azure Cognitive Services.
    We will discuss how to get started with Azure Cognitive Services, and we will
    further explore the Microsoft Azure portal.


    # 3. Vision – Identify and Analyze Images and Videos


    The identification of images and videos is one of the core features needed to
    make a smart application. Azure Cognitive Services provides us with the Vision
    API, to work with images and videos.


    The aim of this chapter is to get started with the Vision API and to create a
    smart application that helps you work with images and videos.


    In this chapter, the following topics will be covered:


    *   Understanding the Vision API with Computer Vision

    *   Analyzing images

    *   Identifying a face

    *   Understanding the working behavior of Vision APIs for video analysis

    *   Summary of the Vision API


    In coming sections, we will discuss, understand, and use the Computer Vision API.'
