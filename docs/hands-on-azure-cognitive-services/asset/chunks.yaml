  trans: '

    # 结论与总结


    数字对话正在兴起，而机器人是我们应对这些需要即时满足的查询浪潮的第一道防线。在本章中，我们初步探索了 Azure 机器人服务和 Bot Framework
    的功能。我们首先解释了 Azure 机器人服务的关键方面，然后使用 Azure 机器人服务创建了一个 COVID-19 机器人，接着使用 Azure Bot
    Builder SDK 和 QnA Maker 对其进行了测试。


    现在，你已经对 Azure 机器人服务有了基本的了解，可以开始探索并将这些技术用于你自己的业务场景。自然语言对话有着大量的应用场景。从医疗保健到金融、零售和酒店业，各行各业都充满了为用户提供更好客户体验的用例。


    继续畅聊吧！


    # 10. Azure 机器学习


    问：为什么埃德在闹鬼的丛林里被袭击了？


    答：因为其他人都足够理智，不会随便进入随机森林。


    这是一个以我们合著者为代价的机器学习笑话，但它很好地引出了诸如随机森林之类的定制化算法。（随机决策森林通过对决策树中的任务进行分类，来输出均值或平均预测/回归结果。埃德的报复方式是他来解释这些笑话。）到目前为止，在本书中，你已经对认知服务进行了广泛的回顾，这些服务以托管且组织良好的方式提供了一组预构建的算法、模型和配方。这些服务能够加速机器学习开发，并使数据科学家能够更快速、更有效地交付产品和服务，而无需重复造轮子。


    然而，现实世界的业务用例存在于数据科学和机器学习领域，而不仅仅是使用预构建的 API。你必须能够构建自己的模型，尝试新的数据集，增强现有模型，并创建自己的算法。请放心，Microsoft
    Azure 拥有广泛的能力来满足这些定制化需求。Azure 机器学习是微软 AI 生态系统不可或缺的一部分，它帮助机器学习工程师、AI 爱好者和专业人士以及公民数据科学家实现智能解决方案。端到端的机器学习生命周期不仅包括构建、训练和部署机器学习模型，还包括长期维护它们。你必须监控模型漂移和衰减，根据需求进行扩展，并完成挑战者测试，以确保最佳模型胜出。Azure
    机器学习平台有助于整合这些多样化的服务，以支持完整的机器学习生命周期。


    本章将帮助你了解 Azure 机器学习生态系统产品，以及如何训练应用程序在没有显式编程的情况下进行学习，这正是机器学习的目标。到目前为止，你主要看到了 Azure
    认知服务的实际应用，但在本章中，我们将回顾整个 Azure 机器学习生态系统，为你提供认知服务之外的广阔图景。你将学习：


    *   Azure 机器学习堆栈和产品

    *   使用 Azure 机器学习设计器通过无代码方式构建模型

    *   使用 Python 构建 ML 模型并使用 Azure 笔记本进行部署

    *   使用 Azure 机器学习部署和测试模型


    让我们开始吧。


    ## Azure 机器学习堆栈


    Azure 机器学习堆栈是一个不容小觑的云平台超大规模计算力量。它包含了从数据摄取到模型部署和管理的整个端到端机器学习平台能力。例如，为了引入用于运行预测分析的数据集，并包含数据科学实验，Azure
    提供了存储库，如 Azure Blob 存储和 Azure Data Lake 存储。对于机器学习计算资源，有单个虚拟机 (VM)、带有 HD Insight
    的 Spark 集群或 Azure Databricks 等选项。


    图 10-1 概述了 Azure 机器学习堆栈中的不同产品以及何时应使用它们。本章的重点是 Azure 机器学习。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig1_HTML.jpg](img/499686_1_En_10_Fig1_HTML.jpg)


    **图 10-1** Azure 机器学习关键产品 – 来自 [*https://docs.microsoft.com/azure/architecture/data-guide/technology-choices/data-science-and-machine-learning*](https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology-choices/data-science-and-machine-learning)


    企业就绪性和治理需要数据保护，这由 Azure Key Vault 提供，用于管理和保护凭据。可重复和可重现的实验有助于获得一致的结果，并且需要一组托管且版本管理得当的模型和依赖项。使用
    Microsoft Azure，你可以使用 Docker 容器，并通过 ACI 和 AKS 管理这些存储库，以根据需要构建和部署。在机器学习背景下，显著的能力如图
    10-2 所示。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig2_HTML.jpg](img/499686_1_En_10_Fig2_HTML.jpg)


    **图 10-2** Azure 机器学习关键服务能力 – 来自 [*https://azure.microsoft.com/services/machine-learning*](https://azure.microsoft.com/en-us/services/machine-learning/)


    以下内容简要概述了这些能力所包含的内容，你将作为 Azure 机器学习工作室（Azure 数据科学家的一站式机器学习平台）的一部分看到它们。Azure 机器学习层次结构中的最高项是工作区，如图
    10-3 所示。它包含各种不同的元素，例如实验、管道、数据集、模型等，我们将在下面讨论。


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig3_HTML.jpg](img/499686_1_En_10_Fig3_HTML.jpg)


    **图 10-3** Azure 机器学习工作区 – 来自 [*https://docs.microsoft.com/azure/machine-learning/concept-workspace*](https://docs.microsoft.com/azure/machine-learning/concept-workspace)


    ![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig4_HTML.jpg](img/499686_1_En_10_Fig4_HTML.jpg)


    **图 10-4** Azure 机器学习工作室 – 关键产品


    1.  **端点** – 机器学习模型需要被使用，有几种方法可以实现。部署机器学习模型的一种流行方式是通过 Web 服务，该服务包含一个或多个端点。端点是一个地址，可以通过定义良好的协议（例如基于
    HTTP 的 RESTful API）访问和调用模型。（*REST* 代表表述性状态转移。）


    2.  **Azure 笔记本** – Azure 笔记本为数据科学家提供了一个集成的工作环境，使其能够在 Azure 工作区内访问文件、文件夹、存储和计算资源。我们在第
    6 章中看到了 Jupyter 笔记本，Azure 笔记本与之类似；它们只是使用了 Azure 的计算和存储资源，我们稍后将进行探讨。Azure 笔记本提供了一个绝佳的平台，可以在一个地方协作处理数据集、模型并进行实验。参见图
    10-4 中的笔记本。

    '
- fmt: "![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig5_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig5_HTML.jpg)\n\
    \n**Figure 10-5** Azure Machine Learning compute targets\n\n1. **Automated Machine\
    \ Learning** – Automated machine learning (or AutoML) is the capability to apply\
    \ machine learning techniques, to find out the best models for a problem. This\
    \ includes automated feature engineering, neural architecture search, and hyperparameter\
    \ optimization. Azure AutoML takes the guess work out of finding out the best\
    \ hyperparameters, and it can help you find the best model to use, with a no-code\
    \ approach.\n\n2. **Datasets** – The management of machine learning assets, such\
    \ as models and datasets, can be a challenging problem for ML practitioners. With\
    \ Azure datasets, you can easily share and track data across multiple machine\
    \ learning workflows, while a single copy of data stays in storage. The data is\
    \ accessible without the concerns of connectivity and connection strings, for\
    \ example.\n\n3. **Experiments** – Experimentation and repeatability is what puts\
    \ science in *data science*, to be able to create and experiment with datasets\
    \ and algorithms. The Experiments section of Azure Machine Learning keeps track\
    \ of your machine learning experiments and runs so you can replay the pipelines.\n\
    \n4. **Pipelines**^([^(36)](#fn36)) – *Pipeline* is possibly the most overloaded\
    \ term in machine learning, which typically means data extraction, model development\
    \ and training, tuning, production release, and then monitoring and review, or\
    \ some combination of these activities. In the context of Azure Machine Learning,\
    \ it is the executable workflow of these machine learning tasks that is repeatable,\
    \ and that can perform data operations (such as normalization, transformation,\
    \ featurization, validation, and so on), model building and training (such as\
    \ hyperparameter tuning, automatic model selection, model testing, and validation),\
    \ and model deployment (such as deployment and batch scoring). Model pipelines\
    \ offer great features, like the following:\n    - Unattended execution\n    -\
    \ Diverse computational resource accessibility\n    - Reproducibility and reusability\n\
    \    - Tracking and versioning\n\n5. **Models** – Models are the bread and butter\
    \ of machine learning: they encapsulate the learning from the data, by using the\
    \ prescribed algorithm. In the Azure Machine Learning workspace, you can register,\
    \ create, manage, and track models. Any model you built in other parts of the\
    \ workspace also gets registered in this repository and can be used across the\
    \ platform.\n\n6. **Compute** – A machine learning model, an automated machine\
    \ learning process, and a Jupyter notebook, all need a place to run (to perform\
    \ a computation). This is exactly what Azure Compute provides – here you can create\
    \ different types of compute targets, as seen in Figure [10-5](#499686_1_En_10_Chapter.xhtml#Fig5).\
    \ This table elaborates on different training targets for workloads. For machine\
    \ learning workloads, you can use local computers, a compute cluster, remote virtual\
    \ machines, and a variety of other training targets.\n\n7. **Data Store** – Data\
    \ stores are the repositories for data; they are the containers for datasets,\
    \ such as Azure Storage, Azure Data Lake Storage, Azure SQL Database, and Azure\
    \ Databricks File System (DBFS). For system storage, Azure Machine Learning uses\
    \ an Azure blob container and file container.\n\n8. **Labeling** – Labeling and\
    \ annotation are important parts of the data science life cycle. Using the Azure\
    \ Machine Learning labeling features, you can label datasets by creating labeling\
    \ projects, managing workflows, and farming it out to multiple labelers, and you\
    \ can also use machine learning to help you out.\n\nYou will learn more about\
    \ these components, shortly, as you see them in action. As we move toward our\
    \ journey to build a machine learning model, it is important to know the right\
    \ algorithm to use for building the models.\n\nAlong with some well-articulated,\
    \ concise, and managed documentation, the Azure Machine Learning team also offers\
    \ a highly useful cheat sheet (`aka.ms/mlcheatsheet`), which assists in determining\
    \ the best machine learning algorithm. The cheat sheet is shown in Figure [10-6](#499686_1_En_10_Chapter.xhtml#Fig6).\n\
    \n![../images/499686_1_En_10_Chapter/499686_1_En_10_Fig6_HTML.jpg](images/499686_1_En_10_Chapter/499686_1_En_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6** Azure Machine Learning Algorithm Cheat Sheet (`aka.ms/mlcheatsheet`)\n\
    \nWhether you want to predict between categories, discover a structure, or extract\
    \ information from the text, in the following flow, you can find out the best\
    \ algorithm, based on your needs."
