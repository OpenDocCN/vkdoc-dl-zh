    ...\n```\n\n**Listing 7-2** Bing Image Search results – JSON response\n\nAs you\
    \ would notice in the JSON response, it provides the suggestions, search link\
    \ for direct access, information about the thumbnail, and header-related information.\
    \ Your enterprise use case would probably not be searching for cat memes, unless\
    \ you work for a pet food company’s social media department. Whatever it might\
    \ be, you can easily accomplish it with the help of Bing Search APIs.\n\n## Summary\
    \ and Conclusion\n\nThe search is over, at least for now.\n\nIn this chapter,\
    \ you have developed an understanding of the Azure Search ecosystem. You explored\
    \ the Microsoft Azure Cognitive Search capabilities, and you looked into how Microsoft\
    \ Bing Search works. You have created sample applications to search real estate\
    \ and hotels by keywords, and you built an application that searches images on\
    \ the Web.\n\nYou are now ready to go and build your own applications using these\
    \ technologies. Your use cases will be different, but these fundamentals will\
    \ help you get started with the search, both within your organization and outside\
    \ on the Web.\n\nKeep exploring!\n\n# 8. Deploy and Host Services Using Containers\n\
    \nWell, if you have not heard of containers, you might still be using dial-up\
    \ Internet! Let’s just say that containers are the best thing since sliced bread.\
    \ Containers enable you to deploy your software in a consistent and repeatable\
    \ manner, in multiple environments. They are not as nearly as bulky as VMs. Scott\
    \ Hanselman, Microsoft explainer in chief, has done an excellent video^([^(22)](#fn22))\
    \ on containers, which I can’t recommend enough, especially if you are new to\
    \ this container ecosystem.\n\nIn this chapter, our goal is to accomplish insight\
    \ on Cognitive Services containers. We will highlight the key containerization\
    \ features, and we’ll demonstrate how to build and deploy an application using\
    \ Docker. In this chapter, you will learn the following topics:\n\n1. Getting\
    \ started with Cognitive Services containers\n2. Understanding deployment and\
    \ how to deploy and run a container on Azure Container Instances\n3. Understand\
    \ Docker compose and use it to deploy multiple containers\n4. Understanding Azure\
    \ Kubernetes Service and how to deploy an application to Azure Kubernetes Service\n\
    \nContainerization technologies include Docker, Kubernetes (referred to as K8s),\
    \ Azure Kubernetes Service (AKS), Azure Container Instances (ACI), and other related\
    \ topics. These topics are far too complex to be covered exhaustively in this\
    \ chapter. Instead, this chapter will focus on getting you started with Cognitive\
    \ Services containers, explain their need, and enable you to fully utilize the\
    \ power of these amazing technologies, should you need them."
