    **Listing 3-2** Identification of the object


    Open Visual Studio, and then click **Create a new project**. On the **Create a
    new project** page, click **Console App (.NET Core)**, as shown in Figure [3-11](#499686_1_En_3_Chapter.xhtml#Fig11).
    Then, click **Next**.


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig11_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig11_HTML.jpg)


    **Figure 3-11** Create a new project


    Name the project, enter the project location path, and provide a valid solution
    name. Then, click **Create**, as shown in Figure [3-12](#499686_1_En_3_Chapter.xhtml#Fig12).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig12_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig12_HTML.jpg)


    **Figure 3-12** Configure your new project


    Right-click the project name from Solution Explorer, and then click **Manage NuGet
    Packages**. From the NuGet Package Manager, search for `Microsoft.Azure.CognitiveServices.Vision.ComputerVision`
    in the Browse tab. Make sure you check the **Include prerelease** check box. In
    the right pane, select the latest version, and then click **Install** to the right
    of it. See Figure [3-13](#499686_1_En_3_Chapter.xhtml#Fig13).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig13_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig13_HTML.jpg)


    **Figure 3-13** Installation of the NuGet Package


    Go to the Azure portal and copy the key and endpoint. Add the key and endpoint
    in your code, as shown in Listing [3-3](#499686_1_En_3_Chapter.xhtml#PC3).


    ```

    static string subscriptionKey = "SUBSCRIPTION_KEY_GOES_HERE";

    static string endpoint = "ENDPOINT_GOES_HERE";

    ```

    **Listing 3-3** Adding the Computer Vision subscription key and endpoint


    The subscription is required to validate the requests to the endpoint. You can
    revisit the previous section and get the subscription key and endpoint.


    Set up the `AuthenticatedClient`. Write the statement shown in Listing [3-4](#499686_1_En_3_Chapter.xhtml#PC4).


    ```

    ComputerVisionClient client = AuthenticatedClient(endpoint, subscriptionKey);

    ```

    **Listing 3-4** Creating the client


    We passed an endpoint and a valid subscription key to create an authenticated
    client. You may see that Visual Studio is throwing an error about the missing
    namespace. Add the proposed namespace, as shown in Figure [3-14](#499686_1_En_3_Chapter.xhtml#Fig14).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig14_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig14_HTML.jpg)


    **Figure 3-14** Adding the missing namespace


    The `AuthenticatedClient` method creates a valid and authenticated client, by
    validating `ApiKeyServiceClientCredentials`. See Listing [3-5](#499686_1_En_3_Chapter.xhtml#PC5).


    ```

    private static ComputerVisionClient AuthenticatedClient(string endpoint, string
    subscriptionKey)

    {

    ApiKeyServiceClientCredentials clientCredentials = new ApiKeyServiceClientCredentials(subscriptionKey);

    return new ComputerVisionClient(clientCredentials) { Endpoint = endpoint };

    }

    ```

    **Listing 3-5** Authenticating a client


    To add all the features that you are required to analyze, simply create a list
    of the `VisualFeatureTypes` model. See Listing [3-6](#499686_1_En_3_Chapter.xhtml#PC6).


    ```

    List featuresToBeAnalyzed = new List()

    {

    VisualFeatureTypes.Categories, VisualFeatureTypes.Description,

    VisualFeatureTypes.Faces, VisualFeatureTypes.ImageType,

    VisualFeatureTypes.Tags, VisualFeatureTypes.Adult,

    VisualFeatureTypes.Color, VisualFeatureTypes.Brands,

    VisualFeatureTypes.Objects

    };

    ```

    **Listing 3-6** VisualFeatures to be analyzed


    Add the missing namespace, as shown in Figure [3-15](#499686_1_En_3_Chapter.xhtml#Fig15).


    ![../images/499686_1_En_3_Chapter/499686_1_En_3_Fig15_HTML.jpg](images/499686_1_En_3_Chapter/499686_1_En_3_Fig15_HTML.jpg)


    **Figure 3-15** The missing namespace


    Make a request to the Vision API and get the result. The response is the `ImageAnalysis`
    model object, as shown in Listing [3-7](#499686_1_En_3_Chapter.xhtml#PC7).


    ```

    ImageAnalysis analysisData = await client.AnalyzeImageAsync(imgURL, featuresToBeAnalyzed);

    ```

    **Listing 3-7** Making a request


    In this short demo, we analyzed every possible feature to check the image description,
