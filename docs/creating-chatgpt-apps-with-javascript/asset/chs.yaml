  url\"`，则这是生成图像的 URL。（或）如果请求中的 `response_format` 为 `\"b64_json\"`，则这是 base64 编码的\
  \ JSON 图像。 |\n\n### 图像\n\n## 使用 DALL·E 模型创建图像\n\n从表 5-2 和表 5-3 可以看出，使用 DALL·E 模型创建图像是一个非常直接的过程。因此，我们在清单\
