  清单 7-2\n我们更智能的技术支持 Discord 机器人\n```\n\n### 与之前版本技术支持机器人相比的重要变化\n\n让我们简要分析一下我们更新后的技术支持机器人，并讨论所做的更改。如您所见，我们同时在做几件事。\n\
  \n首先，这个脚本将同时作为 Discord 和 ChatGPT 的客户端，因此使用一个名为`client`的单一常量会有些令人困惑。因此，用于与 ChatGPT\
  \ 进行任何 AI 操作的客户端被命名为`chatGPTClient`：\n\n```\nconst systemMessage =\n\"你是一个为克鲁克斯银行应用提供支持的虚拟助手。\"\
  ;\nconst faqContents = fs.readFileSync(\"./FAQ.txt\", \"utf8\");\nconst chatGPTClient\
  \ = new ChatGPTClient(systemMessage, faqContents);\n```\n\n请记住本书前几章的内容，您可以通过在提示中向系统本身提供特定消息来显著设定与\
  \ ChatGPT 对话的基调。因此，我们创建了一个常量来保存系统消息。此外，我们定义了一个保存常见问题解答文件内容的常量。定义了系统消息和 FAQ 内容后，我们就能实例化我们的`ChatGPTClient`类（稍后会详细介绍）。\n\
  \n这个机器人的全部目的是将 Discord 用户的任何消息发送给 ChatGPT 并显示响应。因此，让我们看看对`client.on()`所做的更改，它已被重命名为`discordClient.on()`。\n\
  \n#### 对新命名函数 `discordClient.on()` 的更新\n\n每当有消息发布到 Discord 服务器时，`discordClient.on()`函数会被异步调用。出于明显的性能原因，实例化`chatGPTClient`类（包括从`FAQ.txt`文件加载内容的过程）的代码不在此函数中。我们已经在脚本的早期执行了这些步骤，因为它们只需要执行一次。\n\
  \n当在我们监控的频道中收到消息时，请务必注意以下代码行：\n\n```\nawait message.channel.sendTyping();\nconst\
  \ chatGPTResponse = await chatGPTClient.sendMessageFromDiscord(\nmessage.content\n\
  );\nconst reply = `${mention(message.author)} ${chatGPTResponse}`;\nawait message.channel.send(reply);\n\
  });\n```\n\n在这里，我们提供了良好的用户体验，向用户显示机器人正在“输入”，而用户的问题实际上正在被发送到 ChatGPT。当响应返回时，我们将回复发送给用户。\n\
  \n现在让我们看看处理所有 ChatGPT 功能的辅助类：`chatGPTClient.js`。\n\n\n\n## 分析我们的 ChatGPT 客户端：`chatGPTClient.js`\n\
  \n我们有一个名为 `chatGPTClient.js` 的类，它与我们之前使用过的类非常相似。`chatGPTClient.js` 的完整源代码如代码清单 7-3\
  \ 所示。\n\n```\nconst { OpenAI } = require(\"openai\");\nrequire(\"dotenv\").config();\n\
  class ChatGPTClient {\nconstructor(systemMessage, initialInstructionsToChatGPT)\
  \ {\nthis.systemMessage = systemMessage;\nthis.initialInstructionsToChatGPT = initialInstructionsToChatGPT;\n\
  this.client = new OpenAI({\napiKey: process.env[\"OPENAI_API_KEY\"],\n});\n}\nasync\
  \ sendMessageFromDiscord(userMessage) {\nconst chatCompletion = await this.client.chat.completions.create({\n\
  messages: [\n{\nrole: \"system\",\ncontent: this.systemMessage,\n},\n{\nrole: \"\
  user\",\ncontent: this.initialInstructionsToChatGPT,\n},\n{\nrole: \"user\",\ncontent:\
  \ userMessage,\n},\n],\nmodel: \"gpt-4\",\ntemperature: 0.85,\ntop_p: 1,\nmax_tokens:\
  \ 1921,\nfrequency_penalty: 0,\npresence_penalty: 0,\n});\nconst result = chatCompletion.choices[0].message.content;\n\
  return result;\n}\n}\nmodule.exports = { ChatGPTClient };\n代码清单 7-3\nchatGPTClient.js\n\
  ```\n\n最需要注意的一点是，在构造函数中，我们发送了常见问题解答内容的完整字符串，以及我们将要提供给系统本身的消息。\n\n这样，在构建了 `ChatGPTClient`\
  \ 类之后，我们就可以重用已构建的对象，以便回答用户提出的各个问题。\n\n每当我们的 Discord 频道上有人发布问题时，我们的机器人就会从 `chatGPTClient.js`\
  \ 中调用 `sendMessageFromDiscord()` 方法。在此方法中，我们将执行所有必要的常规操作，以便以编程方式调用 ChatGPT。\n\n\
  ## 运行我们的智能问答机器人\n\n现在，让我们运行这个全新改进的问答 Discord 机器人。执行应用程序后，请务必返回你的 Discord 服务器并开始提问。图\
