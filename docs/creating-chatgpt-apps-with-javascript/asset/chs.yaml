  \n图 6-4\n\n使用网页界面创建频道\n\n## 向 Discord 注册新的机器人应用\n\n现在我们已经创建了带有适当频道的 Discord 服务器，是时候注册机器人本身了——或者更确切地说，在我们的案例中，是注册多个机器人。为了保持代码整洁且易于管理，我们实际上会为\
