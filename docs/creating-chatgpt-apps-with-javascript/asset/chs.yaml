  `（适合艺术风格）。 |\n| `response_format` | `String` 或 `null` 默认值：`\"url\"` | 可选 | 生成图像的格式。可接受的值有：`\"\
  url\"`、`\"b64_json\"`。 |\n| `user` | `String` | 可选 | 代表最终用户的唯一标识符，可帮助 OpenAI 监控和检测滥用行为。\
