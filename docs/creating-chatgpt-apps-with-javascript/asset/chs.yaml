  \ false,\n\"avoidHighways\": false,\n\"avoidFerries\": false\n},\n\"languageCode\"\
  : \"en-US\",\n\"units\": \"IMPERIAL\"\n}' \\\n-H 'Content-Type: application/json'\
  \ -H 'X-Goog-Api-Key: YOUR_API_KEY' \\\n-H 'X-Goog-FieldMask: routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline'\
  \ \\\n'https://routes.googleapis.com/directions/v2:computeRoutes'\n清单 2-12\n用于调用\
  \ Google Maps Routes API 的 cURL 命令\n```\n\n请记住，最佳实践是使用三个井号（`###`）将指令与内容分开，以获得最佳效果。清单\
  \ 2-13 是我们提供给 ChatGPT 的完整提示词：\n\n```\n我正在用 JavaScript 编码，试图构建一个应用程序，该应用程序向 Google\
  \ Maps API 发出请求，并获取从一个地点到另一个地点所需的时间。以下是可以实现该目标的 cURL 代码。请帮我将其转换为可以在 JavaScript 中使用的代码：\n\
