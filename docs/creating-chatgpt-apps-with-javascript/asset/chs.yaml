  \n## 使用 ChatGPT 作为结对编程伙伴构建估算距离和到达时间的应用程序\n\n接下来我们要做的是开始构建一个应用程序，该应用程序可以估算从一个地点到另一个地点的预计到达时间和距离，例如从家到办公室。让我们使用\
