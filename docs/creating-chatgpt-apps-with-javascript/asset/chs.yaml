  \ 类，该类负责创建提示词，当然也负责调用 ChatGPT。\n\n\n\n## 让我们的技术支持机器人更智能\n\n清单 7-1 包含了虚构的客户支持团队根据新推出的移动银行应用用户提交的支持工单所创建的常见问题解答的完整内容。\n\
