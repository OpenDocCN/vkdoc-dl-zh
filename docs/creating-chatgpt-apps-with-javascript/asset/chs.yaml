  \ – 启用名为“消息内容意图”的选项\n\n\n\n## 用 JavaScript 创建问答机器人应用，从频道中回答问题\n\n当然，既然我们已经完成了所有必要的准备工作，并且知道了要监控用户提问的频道名称，接下来就让我们编写\
  \ JavaScript 代码，让机器人加入我们的服务器并访问特定 Discord 频道中的所有消息。\n\n这是本章中我们要创建的两个 Discord 机器人中的第一个。这个机器人将负责监控我们\
  \ Discord 服务器中 `q-and-a` 频道内的消息。\n\n在本章稍后的部分，我们将创建另一个机器人，负责审核 Discord 服务器中（包括 `q-and-a`\
  \ 频道）所有不当内容。这样做的目的是遵循“关注点分离”的架构模式。我们不会创建一个庞大的、能处理 Discord 服务器所有审核需求的 JavaScript\
  \ 机器人，而是将功能拆分成两个不同的应用。\n\n我们还将循序渐进，将本章的重点放在攻克 JavaScript 中 Discord 功能的学习曲线上。在本书的最后几章中，我们将使用\
  \ OpenAI API 来增强这两个机器人，让它们具备人工智能。\n\n代码清单 6-1 展示了创建一个基础 Discord 机器人所需的代码，该机器人可以监控单个频道中发布的所有消息并提供回答。\n\
  \n```\n// 引入必要的 discord.js 类\nconst { Client, Events, GatewayIntentBits } = require(\"\
  discord.js\");\nrequire(\"dotenv\").config();\n// 配置变量\nconst CHANNEL_NAME = \"\
