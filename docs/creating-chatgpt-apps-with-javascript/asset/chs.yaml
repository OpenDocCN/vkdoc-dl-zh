  \ API 密钥\n```\n### 步骤 3：编写应用程序代码\n在项目根目录创建名为 `index.js` 的文件，并添加以下代码：\n```javascript\n\
  const axios = require(\"axios\");\nconst readlineSync = require(\"readline-sync\"\
  );\nrequire(\"dotenv\").config();\nconst apiKey = process.env.ACCUWEATHER_API_KEY;\n\
  const baseUrl = \"http://dataservice.accuweather.com\";\nasync function getCityKey(city)\
  \ {\nconst url = `${baseUrl}/locations/v1/cities/search`;\ntry {\nconst response\
  \ = await axios.get(url, {\nparams: {\napikey: apiKey,\nq: city,\n},\n});\nif (response.data\
  \ && response.data.length > 0) {\nreturn response.data[0].Key;\n} else {\nconsole.log(\"\
  未找到城市。\");\nprocess.exit(1);\n}\n} catch (error) {\nconsole.error(\"获取城市密钥时出错：\"\
  , error);\nprocess.exit(1);\n}\n}\nasync function getWeather(cityKey) {\nconst url\
  \ = `${baseUrl}/currentconditions/v1/${cityKey}`;\ntry {\nconst response = await\
  \ axios.get(url, {\nparams: {\napikey: apiKey,\n},\n});\nif (response.data && response.data.length\
  \ > 0) {\nreturn response.data[0];\n} else {\nconsole.log(\"未找到天气数据。\");\nprocess.exit(1);\n\
  }\n} catch (error) {\nconsole.error(\"获取天气数据时出错：\", error);\nprocess.exit(1);\n\
  }\n}\nasync function main() {\nconst city = readlineSync.question(\"输入你的城市：\");\n\
  const cityKey = await getCityKey(city);\nconst weather = await getWeather(cityKey);\n\
  console.log(`城市 ${city} 的天气：`);\nconsole.log(\n`温度：${weather.Temperature.Metric.Value}°${weather.Temperature.Metric.Unit}`\n\
  );\nconsole.log(`天气描述：${weather.WeatherText}`);\n}\nmain();\n```\n### 步骤 4：运行应用程序\n\
