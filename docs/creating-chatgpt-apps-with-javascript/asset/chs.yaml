  \ -d '{\n\"origin\":{\n\"location\":{\n\"latLng\":{\n\"latitude\": 37.419734,\n\"\
  longitude\": -122.0827784\n}\n}\n},\n\"destination\":{\n\"location\":{\n\"latLng\"\
  :{\n\"latitude\": 37.417670,\n\"longitude\": -122.079595\n}\n}\n},\n\"travelMode\"\
