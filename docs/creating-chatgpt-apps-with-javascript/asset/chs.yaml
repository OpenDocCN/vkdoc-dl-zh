  \ \"longitude\": -122.0827784 } } }, \"destination\":{ \"location\":{ \"latLng\"\
  :{ \"latitude\": 37.417670, \"longitude\": -122.079595 } } }, \"travelMode\": \"\
  DRIVE\", \"routingPreference\": \"TRAFFIC_AWARE\", \"departureTime\": \"2023-10-15T15:01:23.045123456Z\"\
