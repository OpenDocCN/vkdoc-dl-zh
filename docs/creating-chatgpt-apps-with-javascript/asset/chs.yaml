  \ 客户端\n  const openai = new OpenAI({\n    apiKey: process.env.OPENAI_API_KEY,\n\
  \  });\n  const response = await openai.images.generate({\n    model: \"dall-e-3\"\
  ,\n    n: 1,\n    // 图像的提示词\n    prompt:\n      \"a 35mm macro photo of 3 cute Rottweiler\
  \ puppies with no collars laying down in a field\",\n    size: \"1024x1024\",\n\
