  \  \nDave [18:40 | 02/08/2019]: 做得好，团队！非常感谢大家的努力。我们以创纪录的速度解决了这个紧急问题。让我们继续保持！  \n\
  列表 4-1  \nSlack 频道中试图分析客户问题的团队成员  \n```  \n\n## 提示工程 101：文本摘要  \n\n所以，不用说，没人愿意整天在\
  \ Slack 频道里滚动阅读各种燃眉之急的问题。我们将利用 ChatGPT 的文本摘要能力。为简单起见，我们尝试几个提示，将整个聊天消息列表发送给 ChatGPT，以便它为我们生成所有事件的可用的摘要。\
  \  \n\n**注意**  \n\n请注意，ChatGPT 是非确定性的。这仅仅意味着，即使你多次使用相同的设置执行相同的提示，也不一定会得到与本章列表中逐字相同的响应。不过，它们应该会非常相似。\
  \  \n\n### 提示 #1：“tl;dr”  \n\n这个提示简短、精炼且切中要点。如果你不熟悉它，这是一个在网络上常用的术语，用于简要总结一篇长文章。它字面意思是“太长；没读”，这也是我工作繁忙时对\
  \ Slack 上许多对话的感受。方便的是，ChatGPT 能够理解这个简单的术语（我不一定称它为一个词）作为提示，并且结果相当令人印象深刻。  \n\n```\
  \  \n系统：你是一个乐于助人的助手  \n用户： Fatima [16:00 | 02/08/2019]: 大家好，我有个紧急...  \n用户： Tl;dr\
  \  \n模型： gpt-4o  \n温度： 1  \n最大长度： 360  \nTop P： 1  \n频率惩罚： 0  \n存在惩罚： 0  \n列表 4-2\
  \  \n提示。要求对较长的对话进行摘要  \n```  \n\n注意，令牌数量保持较小，为 360，这最终有助于 ChatGPT 生成简短的响应。同时可以看到温度保持为\
  \ 1（默认值），但 Top P 增加到了最大值（即 1）。因此，调整温度和其他设置以控制 ChatGPT 响应的语气和多样性非常重要。  \n\n列表 4-3\
  \ 显示了 ChatGPT 对列表 4-1 中对话的摘要。  \n\n```  \n团队迅速响应客户应用崩溃的问题。John 调查代码库，同时 Fatima 从客户处收集信息。他们发现了与\
  \ iOS 15.1 的兼容性问题，John 修复了它。补丁经过审查和批准，应用已在商店中更新。客户已被告知，并对快速解决表示感谢。团队因协作和迅速行动而受到表扬。\
  \  \n列表 4-3  \n响应。获取超长对话的摘要版本  \n```  \n\n太棒了！它将那段超长的对话缩减为仅 68 个单词的简单摘要。如你所见，ChatGPT\
  \ 并非要取代某个工作岗位；但它无疑会让一些人更高效。现在，让我们再尝试几个提示，好吗？\n\n\n\n### 提示 #2：“用三句话以内解释清楚”\n\n因此，如果\
  \ `tl;dr` 提供的解释对你来说还不够简洁，我们可以让 `ChatGPT` 把事情变得更简单。`ChatGPT` 在处理参数方面表现良好，所以让我们指定解释内容不应超过三句话（列表\
  \ 4-4）。\n\n```\nSystem: You are a helpful assistant\nUser:  Fatima [16:00 | 02/08/2019]:\
  \ Hey everyone, I have an urgent ...\nUser: Explain this in 3 sentences or less.\n\
  Model: gpt-4o\nTemperature: 1\nMaximum length: 250\nTop P: 0\nFrequency penalty:\
  \ 0\nPresence penalty: 0\nListing 4-4\nPROMPT. 要求对较长的对话进行简短概括\n```\n\n你可能已经注意到，在这个例子中，`temperature`\
  \ 被设置为 `0.82`。我们确实希望 `ChatGPT` 在这里给出一个简洁的答案，所以“越干巴巴”越好。\n\n```\nA black and white\
  \ geometric logo featuring an interwoven, symmetrical design resembling a knot or\
  \ a stylized flower.\nA customer reported an urgent issue of app crashes to the\
  \ team. John investigates the issue and asks Fatima to gather additional information\
  \ from the client. They discover that the issue is related to a compatibility problem\
  \ with iOS 15.1. John fixes the problem and Keith approves the deployment of the\
  \ fix to the client's production environment.\nListing 4-5\nRESPONSE. 获得一个三句话的摘要\n\
  ```\n\n### 提示 #3：“我是经理。向我解释发生了什么”\n\n当你不想成为那个唯一听不懂的人时，`ChatGPT` 能够重新表述已经说过的话，并将其分解，直到变得非常简单。\n\
  \n```\nSystem: You are a helpful assistant\nUser:  Fatima [16:00 | 02/08/2019]:\
  \ Hey everyone, I have an urgent ...\nUser: Summarize this conversation and explain\
  \ it to me like I'm a manager with little technical experience.\nModel: gpt-4o\n\
  Temperature: 0.82\nMaximum length: 750\nTop P: 1\nFrequency penalty: 0\nPresence\
  \ penalty: 0\nListing 4-6\nPROMPT. 要求对更复杂的对话进行简化解释\n```\n\n同样，`temperature` 被设置在\
  \ `1.0` 以下，以便 `ChatGPT` 能够保持答案简洁易懂。我们增加了 token 长度，以便 `ChatGPT` 有足够的时间来解释一些可能的技术概念。\n\
  \n```\nA black and white geometric logo featuring an interwoven, symmetrical design\
  \ resembling a knot or flower with six loops.\nIn this conversation, Fatima brings\
  \ up an urgent issue with a client who is experiencing app crashes as soon as they\
  \ load it. Keith assigns John to investigate the issue since their architect is\
  \ out sick. John asks Fatima to gather additional information from the client about\
  \ their device, operating system, and recent updates. Dave emphasizes the importance\
  \ of keeping the client informed throughout the troubleshooting process.\nJohn checks\
  \ the codebase but doesn't find any obvious issues, so he suspects it could be a\
  \ memory-related problem. Keith agrees to check for memory-related anomalies in\
  \ recent releases. Fatima provides an update that the client is using an iPhone\
  \ X running iOS 15.1 and mentioned that the issue started after updating the app.\
  \ Keith suggests testing the latest app update on an iPhone X simulator with iOS\
  \ 15.1 to replicate the issue.\nJohn successfully reproduces the crash on the emulator\
  \ and identifies a compatibility issue with iOS 15.1, possibly due to a deprecated\
  \ method call. He fixes the issue and prepares a patch for review and deployment.\
  \ Keith approves the patch and asks John to update the app in the store. Dave requests\
  \ that the client be kept informed and that the release notes reflect the upcoming\
  \ fix.\nJohn uploads the patch and informs the client about the fix. Keith reviews\
  \ and approves the patch, and John proceeds with updating the app in the store.\
  \ Fatima informs the client about the fix, and they express relief and gratitude\
  \ for the prompt response. Dave commends the team for their collaboration and quick\
  \ action, emphasizing the importance of maintaining good work.\nIn summary, the\
  \ team quickly addressed an urgent issue where a client's app was crashing on load.\
  \ They investigated the issue, identified a compatibility problem with iOS 15.1,\
  \ fixed it, and prepared a patch for deployment. The client was kept informed throughout\
  \ the process, and the fix was successfully implemented, resulting in a relieved\
  \ and grateful client.\nListing 4-7\nRESPONSE. 获得更复杂对话的简化版本\n```\n\n### 提示 #4：“给我下一步行动的建议”\n\
  \n除了生成更易于理解的摘要外，`ChatGPT` 还可以用不同的风格和“语气”进行解释。我们将把 `top P` 提高到 `0.75`，因为我们希望 `ChatGPT`\
  \ 能想到比默认值更多的可能性。我们还将把 `presence penalty` 提高到 `0.5`，因为我们希望鼓励多样化的回答。\n\n```\nSystem:\
  \ You are a helpful assistant\nUser:  Fatima [16:00 | 02/08/2019]: Hey everyone,\
  \ I have an urgent ...\nUser: I’m a QA engineer at the company. Give me suggestions\
  \ on next steps.\nModel: gpt-4o\nTemperature: 1\nMaximum length: 1200\nTop P: 0.75\n\
  Frequency penalty: 0\nPresence penalty: 0.5\nListing 4-8\nPROMPT. 向 ChatGPT 询问最佳下一步行动的建议\n\
  ```\n\n```\nA black and white geometric logo featuring an interwoven, symmetrical\
  \ design resembling a knot or flower with six loops.\nAs a QA engineer, here are\
  \ some suggestions for next steps:\n1. Test the patch: Once the patch has been deployed\
  \ to the app store, thoroughly test it on various devices and operating systems\
  \ to ensure that the issue has been resolved and there are no new bugs or regressions\
  \ introduced.\n2. Conduct regression testing: In addition to testing the specific\
  \ issue, perform a comprehensive regression test to ensure that the fix does not\
  \ have any unintended side effects on other functionalities of the app.\n3. Communicate\
  \ the fix to the client: Keep the client updated on the progress and let them know\
  \ that the fix is available in the latest app update. Provide them with clear instructions\
  \ on how to update their app and encourage them to test it on their end as well.\n\
  4. Monitor user feedback: Keep an eye on user feedback after the fix has been deployed.\
  \ Encourage users to report any issues they encounter, and be proactive in addressing\
  \ them promptly.\n5. Document the issue and resolution: Create a detailed report\
  \ documenting the issue, the steps taken to reproduce and resolve it, and any other\
  \ relevant information. This will serve as a reference for future troubleshooting\
  \ and help improve the development process.\n6. Conduct a post-mortem analysis:\
  \ After the issue has been resolved and the fix has been deployed, schedule a post-mortem\
  \ meeting with the team to discuss the root cause, lessons learned, and any process\
  \ improvements that can be implemented to prevent similar issues in the future.\n\
  7. Continuous improvement: Use this incident as an opportunity to identify areas\
  \ of improvement in the development and testing processes. Evaluate if there are\
  \ any changes that can be made to prevent similar issues from occurring in the future.\n\
  Remember, open communication, collaboration, and continuous learning are key to\
  \ ensuring the highest quality of your app and maintaining a strong relationship\
  \ with your clients.\nListing 4-9\nRESPONSE. ChatGPT 关于可能下一步行动的建议\n```\n\n当然，`ChatGPT`（就像世界上其他形式的人工智能一样）并非完全完美。例如，建议第\
  \ 3 条是一个有效的待办事项，但通常 QA 人员的职责并不包括直接与客户沟通。这种沟通可以通过技术支持或拥有沟通渠道的产品经理来完成（尤其是当客户是重要客户时）。因此，这个建议本身没问题，但对于公司中担任该角色的人来说并不合适。\n\
  \n\n\n### 让我们谈谈真正的提示工程\n\n如果你在谷歌上搜索“提示工程”这个词，你会发现大量的示例、博客，甚至还有提供订阅计划的完整网站，它们会试图让你相信，只需使用文本就能创建完美的提示。正如你从上面的示例中看到的，提示工程不能仅仅通过精心制作文本输入来完成。\n\
  \n实际上，这个过程非常类似于烹饪一道精致的菜肴。想象一下，例如，尝试只用盐作为调味料来烹饪勃艮第牛肉，而忽略所有其他食材和香料！老实说，结果与真正的菜肴相比会相形见绌。\n\
  \n类似地，尝试组建一个完整的管弦乐队，但只使用一种乐器和一位音乐家。那是一个尴尬的“一人乐队”。因此，仅仅调整提示文本不足以真正执行提示工程。诸如模型的 `temperature`（控制随机性）、`top-p`（影响令牌概率）、所使用的特定模型、令牌数量以及其他参数，在获得良好响应方面都起着高度关键的作用。\n\
  \n这本书不是关于提示工程的，因为（正如你从上面的解释中看到的）它确实涉及几个与 JavaScript 无关的因素。但是，强烈建议你尝试 OpenAI 提供的模型的所有参数，以找到最适合你用例的参数。\n\
  \n## 注册一个 Slack 机器人应用\n\n现在我们已经了解了 ChatGPT 为我们总结大量文本的各种方法，让我们看看在 JavaScript 中创建一个简单的机器人需要什么，该机器人将以编程方式从\
  \ Slack 实例中的频道抓取所有消息。\n\n**注意**\n\n为了完成这些步骤，你需要拥有对 Slack 工作区的管理权限。大多数开发者**不会**拥有这些级别的权限；因此，为了充分进行实验，我建议你创建自己的个人\
  \ Slack 工作区用于测试目的。这样，你将拥有安装 Slack 机器人的所有权利和权限。\n\n但是，一步一步来。首先，我们将创建我们的 Slack 机器人应用，所以前往\
  \ Slack API 网站：\n\n[`https://api.slack.com/`](https://api.slack.com/)\n\n![](img/625846_1_En_4_Fig1_HTML.jpg)\n\
  \nSlack API 网页推广其自动化平台。标题写着“使用 Slack 平台释放你的生产力潜力”，并带有“开始使用”和“探索示例”按钮。一个下拉菜单显示管理或创建应用的选项。下方，一个部分突出显示了\
  \ Slack 的模块化自动化工具，包括“函数”、“工作流”和“触发器”，每个都有简要描述和彩色图标。\n\n**图 4-1** 要创建 Slack 机器人，请前往\
  \ Slack API 网站\n\n当然，你需要有一个 Slack 账户才能使其工作，所以如果你没有，你需要先创建一个。\n\n登录后，转到页面右上角，导航到“**你的应用\
  \ ➤ 创建你的第一个应用**”，如上图 4-1 所示。在 Slack 术语中，“机器人”就是一个“应用”，并且机器人不允许在 Slack 实例上运行，除非它们已先在\
  \ Slack 注册。\n\n![](img/625846_1_En_4_Fig2_HTML.jpg)\n\n图片显示 Slack API 界面，带有一个标题为“创建应用”的弹出窗口。它提供两个选项：“从头开始”，允许用户使用配置\
  \ UI 手动添加基本信息、范围、设置和功能；以及“从应用清单”，使用清单文件实现相同目的。背景显示一个带有导航选项的侧边栏，如开始学习、自动化和 API。\n\
  \n**图 4-2** 为 Slack 创建一个新的机器人应用\n\n如上图 4-2 所示，你将被带到**你的应用**页面，在那里你可以管理你的 Slack 应用。你会立即在屏幕中央看到一个弹出窗口，上面有**创建应用**按钮。\n\
  \n选择**从头开始**创建你的应用的选项。这是因为我们希望能够自己操作应用的所有细节，而不被一堆默认设置弄得过于复杂。\n\n之后，系统会提示你为你的机器人指定一个名称，并选择你希望机器人有权访问的工作区，如图\
  \ 4-3 所示。\n\n点击**创建应用**按钮继续。\n\n![](img/625846_1_En_4_Fig3_HTML.jpg)\n\nSlack API\
  \ 界面用于创建新应用。一个标题为“命名应用并选择工作区”的弹出窗口提示用户输入应用名称并从下拉菜单中选择一个工作区。说明指出工作区选择是永久性的。底部有“取消”或“创建应用”选项。背景显示一个带有导航选项的侧边栏，如“自动化”和“身份验证”。\n\
  \n**图 4-3** 为 Slack 创建一个新的机器人应用\n\n### 通过设置范围来指定你的机器人能（和不能）做什么\n\n现在，你将看到一个屏幕，上面有大量针对\
  \ Slack 工作区机器人的选项。然而，你需要做的第一件事是从左侧边栏点击 **OAuth 与权限**。\n\n我们的机器人将非常简单；它只需要读取频道中的消息，以便为我们提供所讨论内容的摘要。除了读取消息，我们还需要知道\
  \ Slack 工作区中人员的姓名；否则，我们将得到人员的 UUID 表示而不是他们的名字，这对我们来说毫无意义。\n\n所以，向下滚动并确保为你的 Slack\
  \ 机器人添加以下 OAuth 范围，如图 4-4 所示。\n\n![](img/625846_1_En_4_Fig4_HTML.jpg)\n\n图片显示 Slack\
  \ API 网页详细说明应用权限的“范围”。它包括“机器人令牌范围”和“用户令牌范围”部分。在“机器人令牌范围”下，列出了三个：`channels:history`\
  \ 用于查看公共频道中的消息，`channels:read` 用于查看基本频道信息，以及 `users:read` 用于查看工作区中的人员。每个范围都有描述和一个删除选项。有一个标有“添加\
  \ OAuth 范围”的按钮。页面标题包括指向“文档”、“教程”和“你的应用”的链接。\n\n**图 4-4** 为 Slack 机器人应用添加范围\n\n*\
  \   `channels:history`\n*   `channels:read`\n*   `users:read`\n\n### 确认你的设置\n\n\
  为你的机器人添加了适当的范围后，向上滚动并从左侧边栏点击**基本信息**。\n\n在接下来的页面上，你会看到“添加特性和功能”旁边现在有一个绿色对勾，这确认了你已正确添加了范围，如图\
  \ 4-5 所示。\n\n![](img/625846_1_En_4_Fig5_HTML.jpg)\n\nSlack API 界面显示用于构建应用的“基本信息”部分。侧边栏包括协作者和\
  \ Socket 模式等设置。主面板提供了添加功能、安装应用和管理分发的步骤，并带有一个“安装到工作区”按钮。底部有放弃或保存更改的选项。\n\n**图 4-5**\
  \ 确认你的设置\n\n\n\n### 查看 OAuth 与权限页面\n\n如图 4-6 所示，导航至 `OAuth & Permissions` 页面，并点击“安装到工作区”按钮。\n\
  \n![](img/625846_1_En_4_Fig6_HTML.jpg)\n\nSlack API 界面展示了“OAuth 与权限”部分。页面突出显示了“通过令牌轮换实现高级令牌安全”，建议开发者使用令牌轮换以确保安全。一条通知提示必须设置重定向\
  \ URL 才能进行令牌轮换。页面上有用于 OAuth 令牌的“选择加入”和“安装到工作区”按钮。侧边栏包含基本设置、协作者和传入 Webhook 等设置和功能。\n\
  \n图 4-6\n\nOAuth 与权限界面\n\n### 将 Slack 机器人应用安装到你的工作区\n\n既然所有权限都已请求完毕，现在可以将你的机器人安装到工作区了。在安装过程中，你应该会看到如图\
  \ 4-7 所示的界面。\n\n![](img/625846_1_En_4_Fig7_HTML.jpg)\n\nSlack 权限请求界面，请求“Tester Bot”访问“Apress\
  \ Book Testing”工作区。该机器人请求查看频道、对话和工作区内容及信息的权限。提供了“取消”或“允许”选项。顶部横幅显示该应用由工作区成员创建。\n\
  \n图 4-7\n\n“安装”一个新的 Slack 机器人应用\n\n点击 `Allow` 按钮以授权机器人，并允许你在上一步中分配的权限。\n\n**注意**\n\
  \n理解此处“安装”的含义非常重要。在传统的 JavaScript 语境中，安装应用意味着将你的代码和依赖项复制到另一台机器上并执行。但这里的情况并非如此。\n\
  \n在这里，当你“安装”一个机器人应用时，你是在允许你的 Slack 工作区让一个应用加入该工作区——仅此而已。你的机器人代码将在你自己的机器上运行，而不是在\
  \ Slack 的服务器上。\n\n### 获取你的 Slack 机器人（访问）令牌\n\n这次，“令牌”实际上指的是访问令牌！为了以编程方式连接到 Slack\
  \ API 并访问消息和用户信息，你需要一个为你的 Slack 机器人生成的特定 OAuth 令牌。\n\n![](img/625846_1_En_4_Fig8_HTML.jpg)\n\
  \nSlack API 界面展示了“OAuth 与权限”部分。页面突出显示了“通过令牌轮换实现高级令牌安全”，建议开发者选择加入以增强安全性。一条警告指出，在启用令牌轮换之前，必须至少设置一个重定向\
  \ URL。页面上有一个“选择加入”按钮。下方，“你的工作区的 OAuth 令牌”区域显示了一个模糊处理的机器人用户 OAuth 令牌，并提供了复制令牌或重新安装到工作区的选项。左侧边栏包含基本设置、协作者和事件订阅等设置和功能。\n\
  \n图 4-8\n\n为你的 Slack 机器人应用复制 OAuth 令牌\n\n回到 `OAuth & Permissions` 页面，请务必从此页面复制机器人令牌（通常以\
  \ `xoxb-` 开头），如图 4-8 所示。\n\n### 将你的机器人邀请到频道中\n\n接下来，你需要进入想要用来测试机器人的频道，并在该频道中输入以下命令。\n\
  \n```\n/invite\n```\n\n选择“将应用添加到此频道”选项，然后选择你之前在 Slack 注册机器人时指定的 Slack 机器人名称。\n\n\
  ![](img/625846_1_En_4_Fig9_HTML.jpg)\n\nSlack 界面显示了命令“/invite”的搜索结果。下拉菜单提供了三个选项：“邀请某人加入此频道”、“邀请新成员加入此工作区”和“将应用添加到此频道”，最后一个选项以蓝色高亮显示。\n\
  \n图 4-9\n\n将你的 Slack 机器人添加到频道\n\n恭喜！你现在已成功向 Slack 注册了一个 Slack 机器人应用，使其能够读取你工作区中的消息，并将该\
  \ Slack 机器人添加到了一个频道中。在我们编写 JavaScript 代码来访问工作区中的频道之前，我们需要知道 Slack 为我们的频道使用的内部 ID。\n\
  \n## 查找你频道的频道 ID\n\n好的，这一步很简单。在 Slack 中，右键点击你的频道名称，然后选择“查看频道详情”选项。弹出窗口的底部就是你的频道\
  \ ID。复制该编号并保存以备后用。你的 JavaScript 应用将需要它来加入 Slack 工作区中的正确频道。\n\n## 使用你的 Slack 机器人应用自动抓取频道中的消息\n\
  \n好了，既然我们已经完成了所有准备工作，并且知道了频道的 ID，那么让我们开始编写 JavaScript 代码，用于访问特定 Slack 频道中的所有消息。\n\
  \n\n\n### 以编程方式从 Slack 读取消息\n\n首先，你需要安装官方的 JavaScript Slack 库。以下是安装所有必要依赖项的 `npm`\
  \ 命令：\n\n```\nnpm install @slack/web-api @slack/events-api dotenv\n```\n\n清单 4-10\
  \ 是一个简单的 JavaScript Slack 机器人，它可以获取指定频道中每条帖子的用户名、时间戳和消息内容。\n\n```\nimport { WebClient\
  \ } from \"@slack/web-api\";\nimport \"dotenv/config\";\nconst token = process.env.SLACK_API_TOKEN;\n\
  const channel_id = process.env.SLACK_CHANNEL_ID;\nasync function main() {\nconst\
  \ web = new WebClient(token);\n// 存储对话历史\nlet conversationHistory;\n// 你想要获取历史记录的频道\
  \ ID\ntry {\n// 使用 WebClient 调用 conversations.history 方法\nconst result = await web.conversations.history({\n\
  channel: channel_id,\nlimit: 50,\n});\n// 按发送顺序获取消息\nconversationHistory = result.messages.reverse();\n\
  // 打印结果\nfor (const message of conversationHistory) {\nconst userInfo = await web.users.info({\
  \ user: message.user });\n// 将时间戳转换为日期\nconst timestamp = new Date(parseFloat(message.ts)\
  \ * 1000);\nif (userInfo.ok) {\nconsole.log(userInfo.user.name + \"[\" + timestamp\
  \ + \"]\" + message.text);\nconsole.log(\"\\n\");\n}\n}\n} catch (error) {\nconsole.error(error);\n\
  }\n}\nmain();\n清单 4-10\n我们的 JavaScript Slack 机器人\n```\n\n让我们一起来解读这段代码。\n\n首先，我们导入与\
  \ Slack API 交互和加载环境变量所需的基本依赖项。\n\n接下来，我们定义两个关键变量：从环境变量 `SLACK_API_TOKEN` 中获取的 `token`，以及从\
  \ `SLACK_CHANNEL_ID` 中获取的 `channel_id`。这些变量对于向 Slack API 进行身份验证以及指定我们要检索的 Slack\
  \ 频道历史记录是必需的。\n\n然后，我们定义一个异步的 `main` 函数，脚本的核心逻辑就在其中。在此函数中，我们使用 Slack API 令牌初始化 `WebClient`，以便能够进行\
  \ API 调用。我们还声明了一个变量 `conversationHistory`，用于存储从频道检索到的消息。\n\n脚本的原理很简单；它通过调用 Slack\
  \ API 的 `conversations.history()` 方法，从 Slack 频道中检索最新的 50 条消息。\n\n成功获取消息后，脚本使用 `.reverse()`\
  \ 方法反转消息的顺序，以确保按从旧到新的顺序处理，然后打印每条消息。\n\n清单 4-11 显示了运行 Slack 机器人脚本的结果。\n\n```\nFatima\
  \ [2023-08-11T09:04:20] : 大家好，我有一个紧急问题需要讨论。我刚和一位客户通完电话，他们的应用一加载就崩溃。他们非常沮丧。我们能尽快解决这个问题吗？:tired_face:\n\
  Keith [2023-08-11T09:04:35] : 感谢你提醒我们，Fatima。我们马上处理这个问题。John，既然我们的架构师今天生病请假了，你能带头调查这个问题吗？\n\
  John [2023-08-11T09:04:52] : 没问题，Keith。我会深入代码库，看看能否找到导致崩溃的潜在原因。\nJohn [2023-08-11T09:05:30]\
  \ : Fatima，你能从客户那里收集一些额外信息吗？询问他们具体的设备、操作系统以及最近可能安装的任何更新。\n...\n清单 4-11\n执行我们的频道读取\
  \ Slack 机器人的输出\n```\n\n## 留给读者的练习\n\n显然，这里还有一些额外的事情可以做，这些步骤将留给你（读者）来完成，例如：\n\n*\
  \   将读取 Slack 消息的代码连接到上一章的 ChatGPT 客户端，这样抓取消息并获取摘要就变成了一个步骤。\n*   为 Slack 机器人本身添加更多功能，例如添加命令，以便频道中的任何人都可以请求摘要。在当前状态下，机器人不会在频道中发布任何内容。然而，机器人的“用户界面”就是频道本身；因此，用户应该能够通过输入命令（例如请求摘要）来与\
  \ Slack 机器人交互。\n*   确保机器人不会让糟糕的情况变得更糟。每当机器人提供摘要时，它不应该在频道本身中发布，因为这可能会给已经嘈杂的情况增加很多噪音。最佳实践是让机器人向请求摘要（或你创建的任何新命令）的人发送一条私密消息。\n\
  \n## 结论\n\n在本章中，我们讨论了当今人工智能在企业中实际应用的多种方式之一。我们探讨了什么是真正的“提示工程”，指出提示工程不能仅仅通过向 ChatGPT\
  \ 输入文本来完成。为了正确且有效地进行提示工程，你绝对需要理解 ChatGPT API 所有输入参数的影响。\n\n利用我们学到的关于提示工程的知识，我们成功地获得了提供给我们的任何大段文本的摘要。最后，我们看到了运行一个自动机器人所需的代码，该机器人可以以编程方式从任何\
  \ Slack 频道抓取消息。\n\n在本章（以及上一章）中，我们专门使用了 OpenAI API 的聊天补全端点。在下一章中，我们将通过尝试 Whisper\
  \ 和 DALL-E 端点来突破可能性的边界。\n\n\n\n"
- "# 5. 多模态 AI：使用 Whisper 和 DALL·E 3 创建播客可视化工具\n\n在本章中，我们将看到如何结合多个模型来创造令人惊叹的结果。作为一名狂热的播客听众，我在收听沉浸式音频故事时，常常会好奇其中的场景、画面、角色、主题或背景究竟是什么样的。\n\
  \n让我们引入一个新术语：**多模态 AI**。简单来说，生成式 AI 模型可以创建以下四种格式的内容：\n\n- 文本\n- 音频\n- 图像\n- 视频\n\
  \n每种格式都是一种**模态**。多模态 AI 是指同时使用多个 AI 模型来生成（或理解）内容的过程，其中输入是一种模态，而输出是另一种不同的模态。\n\n\
  以 OpenAI 的 Whisper 模型为例。如果你提供音频，它能够将所说的所有内容转录为文本。同样，DALL·E 模型也是如此。如果你提供文本提示，它就能根据你的描述生成图像。\n\
  \n因此，我们将使用 OpenAI 的多个模型来创建一个播客可视化工具。虽然涉及几个步骤，但最终效果令人惊艳。在收听一个关于某人用豆腐烹饪美味佳肴的播客时（别急着否定，先试试看），播客可视化工具生成了图\
  \ 5-1 中的图像。\n\n![](img/625846_1_En_5_Fig1_HTML.jpg)\n\n一个人戴着眼镜，穿着浅蓝色衬衫，手里端着一个白色碗，碗里放着一大块豆腐。背景模糊，暗示是室内环境。\n\
  \n**图 5-1** AI 生成的图像。使用 GPT-4、Whisper 和 DALL·E 模型可视化关于豆腐的播客的结果\n\n为了让播客可视化工具的代码易于理解，我们将分以下三个步骤进行：\n\
  \n- **步骤 1：** 选取一集播客，使用 Whisper 模型获取转录文本。\n- **步骤 2：** 获取生成的转录文本，使用 GPT-4 模型描述该集播客中讨论内容的视觉方面。\n\
  - **步骤 3：** 获取生成的描述，使用 DALL·E 模型生成图像。\n\n本章提供的代码具有大量实际用途，例如：\n\n- 如果你只是好奇播客一集中的内容可能是什么样子（我经常如此），你可以获得一个简单的代表性视觉图像，与你正在收听的内容相关联。\n\
  - 对于有听力障碍的人，你可以轻松地将播客或广播节目转换为幻灯片式的图像展示。这大大增强了内容的可访问性。\n- 对于播客创作者，你现在有了一种简单的方法，可以为每一集添加视觉/主图。这很有用，因为\
  \ Apple Podcasts 和 Spotify 等播客播放器允许播客创作者显示单张图像来关联单集节目，这有助于提高听众的参与度。\n\n## 介绍 OpenAI\
  \ 的 Whisper 模型\n\n现在让我们引入另一个新术语：**自动语音识别**（ASR）。普通日常消费者对这种技术非常熟悉，因为它已集成到手机（例如 iPhone\
  \ 的 Siri）和智能音箱（例如任何 Alexa 设备）中。其核心是，ASR 技术将口语转换为文本。\n\nWhisper 是 OpenAI 的语音识别模型，其准确性高得惊人。下面的列表是广受欢迎的\
  \ DuoLingo 西班牙语播客一集的转录文本，该播客通过将英语和西班牙语交织成一个叙事故事，使英语听众能够轻松理解西班牙语。该转录文本是使用 Whisper\
  \ 模型生成的。\n\n```\n...我是 Martina Castro。每集节目，我们都会为您带来引人入胜的真实故事，帮助您提高西班牙语听力，并获得看待世界的新视角。讲故事的人将使用中级西班牙语，而我会用英语补充上下文。如果您错过了什么，可以随时回退重听。我们还在\
  \ podcast.duolingo.com 提供完整转录文本。\n在成长过程中，Linda 对她的祖母 Erlinda 非常着迷。Erlinda 是一位治疗师或\
  \ curandera，即那些为精神、情感、身体或灵性疾病提供疗法的人。\n在危地马拉，这是一种通过同一家族世代口头传承的实践。Mal de ojo，即邪恶之眼，被许多危地马拉人视为一种疾病，他们认为人类有能力将负能量传递给他人。邻居们会在怀疑婴儿能量失衡时，把他们带到\
  \ Linda 的祖母那里。Su madre lo llevaba a nuestra casa para curarlo...\n```\n\n**列表 5-1**\
  \ Whisper 模型执行语音识别，将音频转换为文本\n\n如果你以前使用过语音识别系统（即使是像 Siri 和 Alexa 这样复杂的技术），你会知道它存在一些问题，例如：\n\
  \n- **语音识别在标点符号方面存在问题。**\n    - 你有没有注意到，没有人说话时会带标点符号？对于英语，我们通过改变语调或音量来提问或表达感叹。我们也用短停顿和长停顿来表示逗号和句号。\n\
  \n- **语音识别在外来词和口音方面存在问题。**\n    - 根据你问的人不同，英语中至少有 17 万个单词。然而，在英语会话中，我们经常使用外来词，例如：\n\
  \        - Tsunami（源自日语）：通常由地震引起的大海啸\n        - Hors d’oeuvre（源自法语）：开胃菜\n      \
  \  - Lingerie（源自法语）：女性内衣或睡衣\n        - Aficionado（源自西班牙语）：对特定活动或主题非常热衷的人\n     \
  \   - Piñata（源自西班牙语）：一个色彩鲜艳的糖果盒，供孩子们尽情敲打\n\n- **语音识别在名称方面存在问题。**\n    - 某些人名、企业名和网站名通常难以拼写和理解。\n\
  \n- **语音识别在同音词方面存在问题。**\n    - 你还记得那些发音相同但拼写和含义不同的词吗？本书那位出色的编辑全都知道！\n        - Would\
  \ / Wood\n        - Flour / Flower\n        - Two / Too / To\n        - They’re\
  \ / There / Their\n        - Pair / Pare / Pear\n        - Break / Brake\n     \
  \   - Allowed / Aloud\n\n正如你从列表 5-1 中看到的，Whisper 能够理解音频中的所有标点符号，识别所有外来词（其中有多个），理解名称，以及\
  \ URL 中的公司名称（`Duolingo`）！当然，如果你注意到了，它还能区分`wood`和`would`。\n\n\n\n## Whisper 模型的功能与限制\n\
  \nWhisper 模型能够将以下语言的语音音频转换为文本：\n\n- 南非荷兰语\n- 阿拉伯语\n- 亚美尼亚语\n- 阿塞拜疆语\n- 白俄罗斯语\n-\
  \ 波斯尼亚语\n- 保加利亚语\n- 加泰罗尼亚语\n- 中文\n- 克罗地亚语\n- 捷克语\n- 丹麦语\n- 荷兰语\n- 英语（当然！）\n- 爱沙尼亚语\n\
  - 芬兰语\n- 法语\n- 加利西亚语\n- 德语\n- 希腊语\n- 希伯来语\n- 印地语\n- 匈牙利语\n- 冰岛语\n- 印度尼西亚语\n- 意大利语\n\
  - 日语\n- 卡纳达语\n- 哈萨克语\n- 韩语\n- 拉脱维亚语\n- 立陶宛语\n- 马其顿语\n- 马来语\n- 马拉地语\n- 毛利语\n- 尼泊尔语\n\
  - 挪威语\n- 波斯语\n- 波兰语\n- 葡萄牙语\n- 罗马尼亚语\n- 俄语\n- 塞尔维亚语\n- 斯洛伐克语\n- 斯洛文尼亚语\n- 西班牙语\n\
  - 斯瓦希里语\n- 瑞典语\n- 他加禄语\n- 泰米尔语\n- 泰语\n- 土耳其语\n- 乌克兰语\n- 乌尔都语\n- 越南语\n- 威尔士语\n\n\
  因此，归根结底，它能够理解您自己说的音频，以及您的朋友和同事可能说的任何语言的音频。\n\n开发者每分钟最多只能向 API 发送 50 个请求，因此如果您要转录大量音频，需要考虑此限制。\n\
  \nWhisper 支持 `flac`、`mp3`、`mp4`、`mpeg`、`mpga`、`m4a`、`ogg`、`wav` 或 `webm` 格式的音频。无论您使用哪种格式，发送到\
  \ API 的最大文件大小为 25MB。\n\n如果您没有大量处理过音频文件，请注意，某些格式会生成**非常大**的文件（例如 `wav` 格式），而其他格式会生成非常小的文件（例如\
  \ `m4a` 格式）。因此，将文件转换为其他格式可以帮助您应对 25MB 的限制。不过，在本章后面，我们将看到一个工具的代码，该工具可以获取单个大音频文件并将其分割成多个较小的文件。\n\
  \n## 使用 `OpenAI.audio.transcriptions.create()` 转录音频\n\n`OpenAI.audio.transcriptions.create()`\
  \ 方法将音频转换为文本，并且仅与 Whisper 模型兼容。让我们看看该方法需要哪些参数才能成功调用 API。\n\n### 检查方法参数\n\n**表 5-1.\
  \ Whisper 的请求体**\n\n| 字段 | 类型 | 是否必需 | 描述 |\n| --- | --- | --- | --- |\n| `file`\
  \ | 文件 | 必需 | 您想要转录的整个音频文件。接受的格式为：`flac`、`mp3`、`mp4`、`mpeg`、`mpga`、`m4a`、`ogg`、`wav`、`webm`\
  \ |\n| `model` | 字符串 | 必需 | 您想要用于转录的模型 ID。兼容的模型包括：`whisper-1` |\n| `prompt` | 字符串\
  \ | 可选 | 可以提供任何文本来改变模型的转录风格，或为模型提供来自先前音频片段的更多上下文。为确保最佳效果，请确保提示与音频使用相同的语言。此外，此字段可用于更改\
  \ Whisper 不熟悉的任何单词的拼写或大小写。 |\n| `response_format` | 字符串（默认值：`json`） | 可选 | 这是转录输出的格式。接受的格式为：`json`、`text`、`srt`、`verbose_json`、`vtt`\
  \ |\n| `temperature` | 数字（默认值：`0`） | 可选 | 这是采样温度，范围从 0 到 1。较高的值会增加输出的随机性，而较低的值则确保输出更具确定性。\
  \ |\n| `language` | 字符串 | 可选 | 这是输入音频的语言。它是可选的，但提供该值可以提高转录的准确性和延迟 |\n\n## 创建用于分割音频文件的实用程序\n\
  \n那么，我们几乎已经能够使用转录端点以编程方式调用 Whisper 模型了。但是，Whisper 模型对每个文件有 25MB 的限制。\n\n现在，如果您收听的是例如德克萨斯大学奥斯汀分校的\
  \ StarDate 播客，这不成问题。这个播客大约有 2 分钟的音频，让您很好地了解夜空中应该寻找什么。但是，对于其他往往持续一小时（甚至更长时间）的音频节目来说，情况就不同了。在这种情况下，您肯定会超过\
  \ 25MB 的文件限制。\n\n因此，让我们与 ChatGPT 结对编程，利用我们的人类智慧创建我们自己的实用程序，该程序将获取单个音频文件并将其分割成多个较小的文件。\n\
  \n**注意：** 在本节中，我将介绍如何将大音频文件分割成较小片段的众多可能性之一。例如，您可以使用流行的音频编辑应用程序（例如开源工具 Audacity 或授权工具\
  \ Adobe Audition）手动将大文件切割成较小的文件。\n\n`FFmpeg` 是以编程方式操作媒体文件最可靠的工具之一，并且由于它是开源的，因此使用它来满足我们的需求是合理的。\n\
  \n清单 5-2 是总结我们需要完成的任务的提示。\n\n```\n系统：你是一名 JavaScript 开发者\n用户：编写一个应用程序，该应用程序接收单个\
  \ MP3 文件作为输入，并使用 ffmpeg 库将该文件分割成不超过 10 分钟的连续片段。\n```\n\n**清单 5-2. 提示。使用 ChatGPT\
  \ 创建 AudioSplitter 应用程序**\n\n经过一番来回交流，我能够创建（如清单 5-3 所示）`audiosplitter` 应用程序，其中包含我对\
  \ ChatGPT 生成内容的编辑。\n\n```\nconst ffmpeg = require(\"fluent-ffmpeg\");\nconst ffmpegPath\
  \ = require(\"ffmpeg-static\");\nconst path = require(\"path\");\nconst fs = require(\"\
  fs\");\n\n// 配置 ffmpeg 使用静态二进制文件\nffmpeg.setFfmpegPath(ffmpegPath);\n\n// 分割 MP3\
  \ 文件的函数\nfunction splitMP3(inputFile, duration) {\n    ffmpeg.ffprobe(inputFile,\
  \ (err, metadata) => {\n        if (err) {\n            console.error(`发生错误：${err.message}`);\n\
  \            return;\n        }\n        const totalDuration = metadata.format.duration;\n\
  \        const numberOfChunks = Math.ceil(totalDuration / duration);\n        const\
  \ outputDir = path.join(__dirname, \"output\");\n\n        if (!fs.existsSync(outputDir))\
  \ {\n            fs.mkdirSync(outputDir);\n        }\n\n        for (let i = 0;\
  \ i < numberOfChunks; i++) {\n            const startTime = i * duration;\n    \
  \        const outputFile = path.join(outputDir, `output_${i + 1}.mp3`);\n\n   \
  \         ffmpeg(inputFile)\n                .setStartTime(startTime)\n        \
  \        .setDuration(duration)\n                .output(outputFile)\n         \
  \       .on(\"end\", () => {\n                    console.log(`已创建 ${outputFile}`);\n\
  \                })\n                .on(\"error\", (err) => {\n               \
  \     console.error(`发生错误：${err.message}`);\n                })\n              \
  \  .run();\n        }\n    });\n}\n\n// 使用示例\nconst inputFilePath = path.join(__dirname,\
  \ \"input.mp3\"); // 输入 MP3 文件的路径\nconst maxDuration = 600; // 10 分钟（以秒为单位）\nsplitMP3(inputFilePath,\
  \ maxDuration);\n```\n\n**清单 5-3. 响应。Audio-splitter.js**\n\n我们的目标很简单：使用 JavaScript\
  \ 和 FFmpeg 将一个 MP3 文件分割成指定时长的片段。每个片段不应超过 10 分钟（即 600 秒）。整个过程使用 `fluent-ffmpeg` 库进行管理，该库充当\
  \ FFmpeg 的 Node.js 封装器，使我们能够高效地处理音频和视频处理。\n\n当然，首要步骤之一是确保您已安装并正确配置了 FFmpeg。我们的脚本使用\
  \ `ffmpeg-static` 来确保 FFmpeg 二进制文件与代码打包在一起。这避免了特定于系统的依赖性问题。您可以使用以下命令安装依赖项：\n\n```\n\
  npm install fluent-ffmpeg ffmpeg-static\n```\n\n主要逻辑位于 `splitMP3()` 函数中，该函数接受两个参数：输入\
  \ MP3 文件的路径和所需的片段时长（以秒为单位）。\n\n首先，我们使用 `ffmpeg.ffprobe()` 函数从输入 MP3 文件中提取元数据，特别是其总时长。这是必要的，因为它让我们确定需要创建多少个片段。\n\
  \n如果输出目录不存在，我们使用 Node.js 的 `fs` 模块创建它。这确保了我们分割后的音频文件有一个专用的目标文件夹。\n\n运行脚本后，输出文件夹将填充\
  \ MP3 文件，每个文件的时长不超过 10 分钟。如果输入文件少于 10 分钟，则只会生成一个片段。\n\n\n\n## 使用 Whisper 创建音频转录器\n\
  \n现在，让我们构建下一个 JavaScript 应用，它将使用 Whisper 模型来创建音频转录。同样，我们将与 ChatGPT 进行结对编程，以获得一个可用的基础。\n\
  \n清单 5-4 是在聊天游乐场中输入的提示，以启动整个过程。请务必注意，我要求设置 60 秒的 HTTP 请求超时，因为 Whisper 生成转录可能需要一些时间。\n\
  \n```\nSystem: You are a JavaScript developer.\nUser: Using JavaScript, write a\
  \ script that iterates over all of the mp3 files in a single folder on my local\
  \ computer and send all the files in the folder to the webservice provided by OpenAI's\
  \ Whisper model, using the OpenAI's node.js library.\nModel: gpt-4\nTemperature:\
  \ 1\nMaximum Length: 1150\n清单 5-4\n提示：要求 ChatGPT 使用 OpenAI 的 JavaScript 库并将 MP3\
  \ 文件发送到 Whisper 的 API\n```\n\n经过一番来回交流，ChatGPT 给出了一个可行的回复（清单 5-5）：\n\n```\nA black\
  \ and white geometric logo featuring an interlocking, symmetrical design resembling\
  \ a knot or woven pattern.\nconst fs = require(\"fs\");\nconst path = require(\"\
  path\");\nconst { OpenAI } = require(\"openai\");\n// 使用你的 API 密钥设置 OpenAI 客户端\n\
  const openai = new OpenAI({\napiKey: process.env.OPENAI_API_KEY,\n});\n// 读取并转录目录中\
  \ .mp3 文件的函数\nasync function transcribeMP3Files(directory) {\ntry {\n// 读取目录\nconst\
  \ files = fs.readdirSync(directory);\n// 过滤出 .mp3 文件\nconst mp3Files = files.filter((file)\
  \ => path.extname(file) === \".mp3\");\n// 处理每个 .mp3 文件\nfor (const file of mp3Files)\
  \ {\nconst filePath = path.join(directory, file);\n// 读取 .mp3 文件\nconst fileData\
  \ = fs.readFileSync(filePath);\n// 将文件发送到 OpenAI 的 Whisper\nconst response = await\
  \ openai.transcriptions.create({\nfile: fileData,\nmodel: \"whisper-1\",\n});\n\
  // 输出转录文本\nconsole.log(`转录文件 ${file}:`);\nconsole.log(response.data.text);\n}\n\
  } catch (error) {\nconsole.error(\"处理文件时出错:\", error);\n}\n}\n// 设置要读取的目录\nconst\
  \ directoryPath = \"./mp3-files\";\n// 运行转录函数\ntranscribeMP3Files(directoryPath);\n\
  清单 5-5\n回复：Whisper 转录器脚本\n```\n\n## 小试牛刀：用播客进行测试\n\n好了，让我们用目前已有的代码来运行一个测试。《美国生活》是一档每周播出的公共广播节目（也是一个播客），由艾拉·格拉斯主持，并与芝加哥\
  \ WBEZ 电台合作制作。\n\n每一集都会围绕一个特定的主题或话题，编织一系列故事。有些故事是调查性新闻报道，另一些则只是对拥有引人入胜故事的普通人的采访。第\
  \ 811 集名为“我唯一不能去的地方”，文件大小为 56MB，格式为 MP3。由于我们已经知道 56MB 的文件太大，无法发送给 Whisper 进行转录，因此让我们运行工具来拆分音频文件，并转录各个片段。\n\
  \n清单 5-6 展示了该集完整转录文本的一个摘录。\n\n```\n\"...我的表妹卡米尔其实并不喜欢狗，但有一只狗她非常喜爱。它叫福克西，因为它看起来就像一只狐狸，只不过它是黑色的。它是邻居家的狗，但卡米尔和它似乎有一种真正的亲密关系，也许是因为它们俩都离地面不远。那时卡米尔大约四五岁，说话有点咬舌，所以福克西被她叫成了福兹。我觉得这是我听过最可爱的事情之一。\n\
  卡米尔对福克西的记忆，几乎像电影一样。她的回忆感觉像是无尽的夏天，朦胧而完美，就像在噼啪作响的胶片上拍摄的场景。我只记得那种兴奋地跑去看福克西的感觉。我脑海里有一个画面，就是来到房子前，我能看到福克西在外面。我能透过通往花园的门看到福克西。有一个关于卡米尔和福克西的故事，我经常想起。我和姐姐谈论了好几年，但从未和卡米尔谈过。故事是这样的：有一次，当它们在玩耍的时候...\"\
  \n清单 5-6\n《美国生活》第 811 集的转录文本节选\n```\n\n为简洁起见，我们只展示了转录文本的一个摘录。完整的转录文本超过 8000 个单词，因为该集节目时长接近\
  \ 1 小时。\n\n## 元操作：提示工程——让 `gpt-4o-mini` 为 DALL·E 编写提示\n\n由于我们想要可视化的播客剧集的完整文本转录有数千个单词，我们将使用\
  \ `gpt-4o-mini` 来自动创建 DALL·E 模型所需的提示。DALL·E 能够根据提示中的文本描述创建图像，但最好让提示尽可能简短。清单 5-7\
  \ 是让 `gpt-4o-mini` 为 DALL·E 生成提示的输入。\n\n```\nSystem: You are a service that helps\
  \ to visualize podcasts.\nUser: Read the following transcript from a podcast. Describe\
  \ for a visually impaired person the background and subject that best represents\
  \ the overall theme of the episode. Start with any of the following phrases:\n-\
  \ \"A photo of\"\n- \"A painting of\"\n\"A macro 35mm photo of\"\n\"Digital art\
  \ of \"\nUser: Support for This American Life comes from Squarespace...\nModel:\
  \ gpt-4o-mini\nTemperature: 1.47\nMaximum length: 150\nTop P: 0\nFrequency penalty:\
  \ 0.33\nPresence penalty: 0\n清单 5-7\n让 GPT-4 为 DALL·E 创建提示的提示\n```\n\n正如你在提示中所见，使用的模型是\
  \ `gpt-4o-mini`，它允许我们处理长达 128k 个 token 的极长文本转录。DALL·E 需要知道要生成的图像类型，因此我们需要指定图像应该是照片、绘画、数字艺术等。我们需要确保模型生成的文本简短，因此我们希望最大长度为\
  \ 150 个 token。此外，为了防止 ChatGPT 多次重复某些短语，我们引入了 0.33 的频率惩罚。\n\n清单 5-8 展示了 ChatGPT 在阅读《美国生活》第\
  \ 811 集转录文本后给出的结果。\n\n```\nDigital art of a young girl sitting in a garden with\
  \ a black dog that looks like a fox. The girl is smiling and the dog is wagging\
  \ its tail. The image has a hazy, dream-like quality, with crackly film effects\
  \ to evoke nostalgia.\n清单 5-8\n由 GPT-4o-mini 为 DALL·E 创建的提示\n```\n\n\n\n## 使用 `OpenAI.openai.images.generate()`\
  \ 创建图像\n\n`OpenAI.images.generate()` 方法允许你使用 DALL·E 模型，根据文本提示动态创建图像。\n\n表 5-2 描述了创建图像所需的\
  \ JSON 对象格式。显而易见，`prompt` 是成功调用服务的唯一必需参数。\n\n**表 5-2** 创建图像端点的请求体\n\n| 字段 | 类型 |\
  \ 是否必需 | 描述 |\n| --- | --- | --- | --- |\n| `prompt` | `String` | 必需 | 在此描述你想要创建的图像。对于\
  \ `dall-e-2`，最大长度为 1000 个字符；对于 `dall-e-3`，最大长度为 4000 个字符。 |\n| `model` | `String`\
  \ 默认值：`\"dall-e-2\"` | 可选 | 用于生成图像的模型名称。兼容的模型包括：`\"dall-e-2\"`、`\"dall-e-3\"`。 |\n\
  | `n` | `integer` 或 `null` 默认值：`1` | 可选 | 请求创建的图像数量。必须在 1 到 10 之间。注意：由于 `dall-e-3`\
  \ 的复杂性，OpenAI 可能会将你的请求限制为单张图像。 |\n| `quality` | `String` 默认值：`\"standard\"` | 可选\
  \ | 允许你指定生成图像的质量。此参数仅对 `dall-e-3` 有效。可接受的值有：`\"standard\"`、`\"hd\"`。 |\n| `size`\
