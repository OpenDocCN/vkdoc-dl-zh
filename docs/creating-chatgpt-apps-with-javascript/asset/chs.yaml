  \ OpenAI 开发者帐户并获取你的 API 密钥。接下来，本书中的所有代码示例都需要一个有效的 API 密钥。\n\n## 使用 `openai.models.list()`\
  \ 获取可用模型列表\n\n最基本（但也至关重要）的功能之一是我们能够获取可用模型的列表。你可能会问，为什么？ChatGPT 网站只公开了少数几个可用模型，而\
  \ Playground 则增加了更多可供使用的模型。然而，通过调用 `openai.models.list()`，你会得到一个指定了每个模型名称的列表，而且有很多可供选择！\n\
  \n### 处理响应\n\n**注意**\n\n由于对象可以包含数组（这很难在表格中表示），我们使用以下符号 “↳” 来表示数组的元素。从表 2-1 中可以看出，`“id”`、`“object”`、`“created”`\
  \ 和 `“owned_by”` 都是响应中 `“data”` 数组的元素。\n\n**表 2-1**\n\n模型对象的结构\n\n| 字段 | 类型 | 描述\
  \ |\n| --- | --- | --- |\n| `object` | 字符串 | 始终返回字面量 `“list”` |\n| `data` | 数组 |\
  \ OpenAI 提供的 AI 模型数组 |\n| `↳ id` | 字符串 | AI 模型的唯一 ID，本质上是模型的完整名称 |\n| `↳ object`\
  \ | 字符串 | 始终返回字面量 `“model”` |\n| `↳ created` | 整数 | 模型的创建日期 |\n| `↳ owned_by` |\
  \ 字符串 | 拥有该模型的组织名称 |\n\n现在我们有了模型对象的详细信息，让我们讨论一下如何测试我们在第一章中获得的 API 密钥。实际上有几种方法可以做到这一点。\n\
  \n\n\n## 使用 API 密钥通过 OpenAI API 获取可用模型列表\n\n在本地 `.env` 文件中配置好 API 密钥后，我们将使用以下代码获取\
  \ OpenAI API 中可用的模型列表，并将其打印到终端中。\n\n```javascript\nimport OpenAI from \"openai\"\
  ;\nimport \"dotenv/config\";\n// 创建 openai 客户端\nconst openai = new OpenAI({\napiKey:\
  \ process.env[\"OPENAI_API_KEY\"],\n});\nasync function main() {\n// 从 openai 客户端获取模型列表\n\
  const model_list = await openai.models.list();\n// 将模型名称保存到变量中\nconst model_names_list\
  \ = model_list.data.map((model) => model.id);\n// 遍历名称并打印它们\nfor (const name of\
  \ model_names_list) {\nconsole.log(name);\n}\n}\nmain();\n```\n\n运行清单 2-4 中的代码后，清单\
