  \n## 简化注册下一个 Discord 机器人应用的流程\n\n既然我们已经成功完成了所有步骤，创建了一个可运行的 Discord 机器人，那么创建第二个机器人就易如反掌了！所以，让我们简要地重复一下上述所有步骤，以便创建我们的第二个\
  \ Discord 机器人。我们会明确指出哪些项目需要更改或增强，因为第二个机器人将作为审核员工作，而不是回答我们 Discord 服务器用户的问题。\n\n\
  ### 向 Discord 注册一个新的机器人应用\n\n执行与上述相同的步骤；不过，明智的做法是给机器人起一个不同的名字。就我们而言，这第二个机器人将被命名为“内容审核机器人”。\n\
  \n### 指定机器人的常规信息\n\n我们决定为内容审核机器人使用不同的图标，因此在这里进行了指定（图 6-15）。\n\n![](img/625846_1_En_6_Fig15_HTML.jpg)\n\
  \nDiscord 应用程序设置界面，显示了一个名为“Mod Bot”的机器人。屏幕显示“常规信息”部分，展示了一个卡通人物应用图标、应用名称“Mod Bot”以及描述“此机器人将作为服务器管理员的助手。”。还有用于添加标签的字段，以及复制应用程序\
  \ ID 和公钥的按钮。左侧边栏包括“安装”、“OAuth2”和“机器人”等导航选项。\n\n**图 6-15** 为第二个机器人提供名称和图标\n\n###\
  \ 为机器人指定 OAuth2 参数\n\n第二个机器人需要更多权限才能执行更多任务。以下是我们想要的作用域：\n\n- 机器人\n  - 踢出成员\n  -\
  \ 封禁成员\n  - 发送消息\n  - 管理消息\n  - 读取消息历史\n\n### 邀请你的机器人加入你的服务器\n\n重复与第一个机器人相同的步骤。\n\
  \n\n\n#### 获取机器人的 Discord ID 令牌并设置网关意图\n\n同样，请按照上述步骤获取 Discord ID 令牌。然后向下滚动页面至名为“特权网关意图”的部分，并启用“服务器成员意图”和“消息内容意图”选项。\n\
  \n### 创建下一个 Discord 机器人：内容审核员\n\n内容审核员的职责是确保 Discord 服务器中不会发布不当内容。与我们本章前面创建的机器人一样，这个机器人（目前）还不具备人工智能。在当前状态下，它会不加区分地删除服务器中任何包含“puppies”一词的消息。\n\
  \n这并不是因为“puppies”本身有什么问题。不过，它们确实有在无人看管时毁掉你最爱鞋子的倾向。老实说，我们只是需要一些东西来测试机器人在 Discord\
  \ 中运行时的代码。\n\n清单 6-2 是这个简化版内容审核机器人的代码。\n\n```\n// Require the necessary discord.js\
  \ classes\nconst { Client, Events, GatewayIntentBits } = require(\"discord.js\"\
  );\nrequire(\"dotenv\").config();\n// Create a new client instance\nconst client\
  \ = new Client({\nintents: [\nGatewayIntentBits.MessageContent,\nGatewayIntentBits.GuildMessages,\n\
  GatewayIntentBits.Guilds,\n],\n});\nconst BANNED_WORD = \"puppies\";\nclient.once(Events.ClientReady,\
  \ (readyClient) => {\nconsole.log(`Ready! Logged in as ${readyClient.user.tag}`);\n\
  });\nclient.on(Events.MessageCreate, async (message) => {\nif (client.user.username\
  \ === message.author.username) return;\nif (message.content.includes(BANNED_WORD))\
  \ {\nif (!(await message.delete())) {\nconsole.log(\"Failed to delete message\"\
  );\n} else {\nconst authorMention = `${mention(message.author)}`;\nconst reply =\
  \ `${authorMention} This comment was deemed inappropriate for this channel.\\nIf\
  \ you believe this to be in error, please contact one of the human server moderators.`;\n\
  await message.channel.send(reply);\n}\n}\n});\nfunction mention(author) {\nreturn\
  \ ``;\n}\nclient.login(process.env.DISCORD_BOT_API_TOKEN);\n清单 6-2\n我们的简化版内容审核机器人\n\
  ```\n\n#### 处理发送到 Discord 服务器的消息\n\n再次，让我们将注意力集中在 `client.on()` 事件监听函数上，因为每当有消息发布到\
  \ Discord 服务器时，它都会被异步调用。如你所见，如果发布到服务器的消息包含违禁词，我们会删除该消息，并在发布违规消息的同一频道中，通过 `@mention`\
  \ 消息向发送者发出警告。\n\n#### 再次成功！运行你的第二个 Discord 机器人：内容审核员\n\n现在让我们运行第二个 JavaScript Discord\
  \ 机器人。执行应用程序后，请务必返回你的 Discord 服务器，并在任意频道中输入一条包含违禁词的消息。图 6-16 展示了机器人的运行效果。\n\n![](img/625846_1_En_6_Fig16_HTML.jpg)\n\
