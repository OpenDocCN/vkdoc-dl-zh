  console.log(`Weather Description: ${weatherText}`);\nconsole.log(`Icon URL: ${iconUrl}`);\n\
  }\nmain();\n```\n\n#### 更改说明\n\n1. **华氏温度**：使用`Temperature.Imperial.Value`获取华氏温度。\n\
