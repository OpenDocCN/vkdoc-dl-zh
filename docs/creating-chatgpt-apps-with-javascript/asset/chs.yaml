  ```\n\n## 我们取得了里程碑式的成就……但有一个小缺陷\n\n好吧，如果你退后一步，审视一下我们到目前为止所取得的成就，你应该会意识到，我们看到的无疑是一个里程碑式的成就。我们拥有以下成果：\n\
  \n*   一个由几个脚本组成的系统，允许用户输入问题，并获得关于如何使用我们移动应用的答案。\n*   使用一个简单的文本文件，我们可以教会机器人如何回答用户的问题。公司里的任何人都可以编辑这个文件，并且可以将其用作知识库，日复一日地帮助提高机器人的智能水平。这真是太棒了。\n\
  *   该系统允许客户使用自然语言输入问题，机器人会向他们提供智能答案。你猜怎么着？客户不喜欢阅读常见问题解答——尤其是那些非常长的。然而，使用这个系统，他们根本不需要阅读！他们只需提出与自己相关的问题即可。\n\
  \n那么，在我们取得了所有这些成就之后，有一个我们无法忽视的巨大缺陷。在代码清单 7-4 中，机器人对用户说：\n\n```\n登录后，您可以设置触控 ID 或面容\
  \ ID，以便将来更快、更安全地登录。\n```\n\n不，不，不！坏机器人！如果你没有完整阅读常见问题解答文件，请允许我解释一下这里出了什么问题：\n\n1.\
  \  代码清单 7-1 中的 `FAQ.txt` 文件明确指出 Crooks Bank 移动应用是一个移动应用。目前，触控 ID 只能用于苹果台式机和笔记本电脑。所以这根本说不通。\n\
  2.  `FAQ.txt` 文件中完全没有提到使用面容 ID 进行移动应用身份验证。\n\n因此，不幸的是，ChatGPT 在编造一些根本不真实的事情，并假设存在某些并不存在的功能。所以，就真正的技术支持而言，这是绝对不可接受的。\n\
  \n那么，我们该如何解决这个问题呢？在阅读下一节之前，请先思考一下你如何能解决这个问题。\n\n\n\n## 更新 ChatGPT 的系统消息，再试一次\n\n\
  你想出解决方案了吗？解决此问题的一种方法是更新系统消息。请参考上方清单 7-2 中的以下代码行：\n\n```\nconst systemMessage =\n\
  \"You are a virtual assistant that provides support for the Crooks Bank banking\
  \ app.\";\n```\n\n请记住，系统消息向 ChatGPT 指示了它在聊天对话中的角色。目前，它被设定为一个乐于助人的助手，因此它擅自猜测移动应用程序中存在某些功能。现在，让我们确保\
  \ ChatGPT 不会提供任何假设。将系统消息更新为如下所示：\n\n```\nconst systemMessage = \"You are a virtual\
  \ assistant that provides support for the Crooks Bank banking app. You will be provided\
  \ Information about the application, and users will ask you questions about the\
  \ application. Your role is to answer questions explicitly from the training information.\
  \ If you were not given an answer to a question, then provide an apologetic message\
  \ to the user explaining that you do not know the answer.\";\n```\n\n就是这样。`FAQ.txt`\
  \ 文件与之前完全相同，我们只需要更新系统消息，让 ChatGPT 知道它在对话中的角色。清单 7-5 展示了我们与 Discord 机器人的新对话。\n\n\
  ```\nMe: How are you today?\nQ and A Bot: As a virtual assistant, I don't have feelings\
