  \ \"avoidHighways\": false, \"avoidFerries\": false }, \"languageCode\": \"en-US\"\
  , \"units\": \"IMPERIAL\" }'\n-H 'Content-Type: application/json' -H 'X-Goog-Api-Key:\
  \ YOUR_API_KEY'\n-H 'X-Goog-FieldMask: routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline'\n\
  'https://routes.googleapis.com/directions/v2:computeRoutes\n清单 2-13\n提示词。要求 ChatGPT\
  \ 将 cURL 转换为 JavaScript\n```\n\n这是我们从 ChatGPT 的回复中得到的代码（清单 2-14）：\n\n```\n一个黑白几何标志，采用交织的对称设计，类似于一个结或六瓣花。\n\
  要将提供的 cURL 命令转换为 JavaScript，你可以使用 `fetch` API。以下是具体方法：\n```javascript\nconst apiKey\
  \ = \"YOUR_API_KEY\"; // 替换为你的实际 API 密钥\nconst url = \"https://routes.googleapis.com/directions/v2:computeRoutes\"\
  ;\nconst requestBody = {\norigin: {\nlocation: {\nlatLng: {\nlatitude: 37.419734,\n\
  longitude: -122.0827784,\n},\n},\n},\ndestination: {\nlocation: {\nlatLng: {\nlatitude:\
  \ 37.41767,\nlongitude: -122.079595,\n},\n},\n},\ntravelMode: \"DRIVE\",\nroutingPreference:\
  \ \"TRAFFIC_AWARE\",\ndepartureTime: \"2023-10-15T15:01:23.045123456Z\",\ncomputeAlternativeRoutes:\
  \ false,\nrouteModifiers: {\navoidTolls: false,\navoidHighways: false,\navoidFerries:\
  \ false,\n},\nlanguageCode: \"en-US\",\nunits: \"IMPERIAL\",\n};\nconst requestOptions\
  \ = {\nmethod: \"POST\",\nheaders: {\n\"Content-Type\": \"application/json\",\n\"\
  X-Goog-Api-Key\": apiKey,\n\"X-Goog-FieldMask\":\n\"routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline\"\
  ,\n},\nbody: JSON.stringify(requestBody),\n};\nfetch(url, requestOptions)\n.then((response)\
  \ => response.json())\n.then((data) => {\n// 在此处处理数据\nconsole.log(data);\n})\n.catch((error)\
  \ => {\nconsole.error(\"错误:\", error);\n});\n```\n#### 说明：\n1. **API 密钥：** 确保将 `'YOUR_API_KEY'`\
  \ 替换为你实际的 Google Maps API 密钥。\n2. **URL：** Google Maps Directions API 端点的 URL 保持不变。\n\
  3. **请求体：** 请求体被定义为一个 JavaScript 对象，然后使用 `JSON.stringify()` 转换为 JSON 字符串。\n4. **请求选项：**\n\
  \   - `method: 'POST'` 表示我们正在发起一个 POST 请求。\n   - `headers` 包含内容类型、API 密钥和字段掩码。\n\
  \   - `body` 是请求体的 JSON 字符串。\n5. **fetch：** 这会发起 HTTP 请求并返回一个 promise。\n   - `.then(response\
  \ => response.json())` 将响应处理为 JSON。\n   - `.then(data => { ... })` 处理返回的数据。\n  \
  \ - `.catch(error => { ... })` 处理 fetch 过程中发生的任何错误。\n\n此代码将向 Google Maps API 发送一个\
  \ POST 请求，并将响应数据记录到控制台。调整 `.then(data => { ... })` 块内的处理逻辑，以满足你应用程序的需求。\n\n清单 2-14\n\
  响应。从 ChatGPT 获取包含可用 JavaScript 代码的响应\n```\n\n**注意**\n\n为了使此代码能够运行，你必须在 `\"DEPARTURE-TIME\"\
  ` 参数中设置一个晚于你运行代码时间的日期和时间。换句话说，出发时间不能设置为过去的时间。在此示例中，日期设置为 2023 年的一个特定时间，因为那是原始请求中的时间戳。因此，你需要调整\
  \ `\"DEPARTURE-TIME\"` 参数中的代码，以便你的代码按预期运行。\n\n调整时间戳并运行代码后，你应该会得到类似于清单 2-15 的响应：\n\
  \n```\n{'routes': [{'distanceMeters': 773, 'duration': '158s', 'polyline': {'encodedPolyline':\
  \ 'ipkcFjichVzQ@d@gU{E?'}}]}\n清单 2-15\n运行 ChatGPT 代码后的成功响应\n```\n\n### 方法二：利用 ChatGPT\
  \ 避免阅读大量文档\n\n如前所述，Google Maps Platform 有*大量*文档需要阅读。如果你粗略浏览一下 Routes API 中可用的其他功能，你会看到可以请求各种类型信息的功能，例如空气质量、花粉计数、航拍视图（就像你使用\
  \ Google Maps 时看到的那样），以及你可能认为理所当然的许多其他 Google Maps 功能。你知道什么是地理编码吗？好吧，如果你自己通读文档，你可能会费一番功夫才能弄明白。\n\
  \n阅读文档很烦人，尤其是当我们只想要某个 API 或服务中的少数几个功能时。在理想情况下，我们甚至不*需要*知道什么是地理编码，就能让我们的代码在不同于 Google\
  \ 示例代码提供的场景下工作。\n\n我们可能并非生活在理想世界，但*不必*知道什么是地理编码，至少现在不用了。我们可以简单地使用 ChatGPT 来跳过我们不想阅读的文档。\n\
  \n清单 2-16 展示了给 ChatGPT 的提示词，这样你就不必阅读任何 Google Maps Route API 文档来获取可工作的代码：\n\n```\n\
  我需要使用 Google Maps Platform 的 Routes API 来获取从一个目的地到另一个目的地所需的时间，以及两点之间的距离信息。如何在 JavaScript\
  \ 中发起 HTTP 请求来获取我正在寻找的信息？\n清单 2-16\n提示词。要求 ChatGPT 避免阅读文档\n```\n\n清单 2-17 展示了 ChatGPT\
  \ 的响应：\n\n\n\n## 一个黑白几何标志，采用交织对称设计，形似带有六个环的结或花朵。\n\n要在 Node.js 中使用 Google Maps Platform\
  \ 的 Routes API 获取两点之间的行程时间和距离，你需要向 API 端点发起 HTTP 请求。以下是帮助你入门的步骤和示例代码片段：\n\n1. **获取\
  \ API 密钥**：确保你拥有来自 Google Cloud Console 且有权访问 Google Maps Platform 的 API 密钥。\n2.\
  \ **安装 Axios**：我们将使用 `axios` 库来发起 HTTP 请求。如果尚未安装，可以通过运行以下命令进行安装：\n\n```sh\nnpm install\
  \ axios\n```\n\n3. **发起 HTTP 请求**：创建一个 Node.js 脚本，向 Routes API 端点发起 HTTP 请求。\n\n\
  以下是实现此功能的示例脚本：\n\n```javascript\nconst axios = require(\"axios\");\n// 替换为你的 API\
  \ 密钥\nconst apiKey = \"YOUR_GOOGLE_MAPS_API_KEY\";\n// 获取两点之间行程时间和距离的函数\nasync function\
  \ getTravelInfo(origin, destination) {\nconst url = `https://maps.googleapis.com/maps/api/directions/json?origin=${encodeURIComponent(\n\
  origin\n)}&destination=${encodeURIComponent(destination)}&key=${apiKey}`;\ntry {\n\
  const response = await axios.get(url);\nconst data = response.data;\nif (data.status\
  \ === \"OK\") {\nconst route = data.routes[0];\nconst leg = route.legs[0];\nconst\
  \ travelTime = leg.duration.text;\nconst distance = leg.distance.text;\nconsole.log(`行程时间:\
  \ ${travelTime}`);\nconsole.log(`距离: ${distance}`);\n} else {\nconsole.error(`错误:\
  \ ${data.status}`);\n}\n} catch (error) {\nconsole.error(\"发起请求时出错\", error);\n\
  }\n}\n// 替换为你的起点和终点\nconst origin = \"纽约, 纽约州\";\nconst destination = \"洛杉矶, 加利福尼亚州\"\
  ;\n// 调用函数\ngetTravelInfo(origin, destination);\n```\n\n### 说明\n\n- **API 端点**：Directions\
  \ API 端点的 URL 是 `https://maps.googleapis.com/maps/api/directions/json`。\n- **参数**：\n\
  \  - `origin`：路线的起点。\n  - `destination`：路线的终点。\n  - `key`：你的 API 密钥。\n- **Axios**：用于发起\
  \ HTTP GET 请求。\n- **响应处理**：响应包含一个 `status` 字段和一个 `routes` 数组。第一条路线的第一个路段包含 `duration`\
  \ 和 `distance`。\n\n将 `'YOUR_GOOGLE_MAPS_API_KEY'` 替换为你的实际 API 密钥，并根据需要更新 `origin`\
  \ 和 `destination`。\n\n### 运行脚本\n\n1. 将脚本保存到文件，例如 `getTravelInfo.js`。\n2. 使用 Node.js\
  \ 运行脚本：\n\n```sh\nnode getTravelInfo.js\n```\n\n这将在控制台打印指定起点和终点之间的行程时间和距离。\n\n**清单\
  \ 2-17** 从 ChatGPT 获取响应以避免阅读文档\n\n如果你运行此代码，应该会得到这个非常清晰、非常简单的响应：\n\n```\n距离: 2,789\
  \ 英里, 时长: 1 天 17 小时\n```\n\n## 结论\n\n让我们破除一个常见的误解并澄清事实：ChatGPT 并不是什么能读心的巫师！作为一种\
  \ AI 工具，它无法取代开发人员和架构师的专业知识。然而，它可以补充开发人员的编程技能，并在编码时为你节省一些时间和精力。\n\n如你所见，将 ChatGPT\
  \ 用作结对编程伙伴的最大好处之一是，它可以将你的自然语言请求转换为可运行的代码。但是，我们不要忘记，在实践 AI（不仅仅是 ChatGPT）时，人类判断的关键作用。最终，由人类来决定是使用、调整还是完全抛弃结果。\n\
  \n"
- "# 3. 在 JavaScript 中创建基础 ChatGPT 客户端\n\n本章的目的简单明了。我们将仅用几行 JavaScript 代码构建最强大的 ChatGPT\
  \ 客户端。这个客户端将比你在 ChatGPT 网站上能做的多得多，并且将提供比我们在第 1 章中看到的 Chat Playground 更多的选项。\n\n\
  ## 在 JavaScript 中创建我们的 ChatGPT 客户端应用程序\n\n清单 3-1 是我们的 ChatGPT 客户端的 JavaScript 代码。这是一个简单的客户端，允许我们使用\
  \ JSON 创建 `system` 和 `user` 消息。我们还可以指定所需的模型和配置参数，例如要使用的令牌数量。\n\n```javascript\n\
  import OpenAI from \"openai\";\nimport \"dotenv/config\";\n// 创建一个新的 open ai 客户端\n\
  const openai = new OpenAI({\napiKey: process.env[\"OPENAI_API_KEY\"],\n});\nasync\
  \ function main() {\nconst chatCompletion = await openai.chat.completions.create({\n\
  messages: [\n{\nrole: \"system\",\ncontent: \"你是一名 JavaScript 开发者\",\n},\n{\nrole:\
  \ \"user\",\ncontent: \"为什么 JavaScript 用于 Web 开发？\",\n},\n],\nmodel: \"gpt-4o\"\
  ,\ntemperature: 0.85,\ntop_p: 1,\nmax_tokens: 1921,\nfrequency_penalty: 0,\npresence_penalty:\
  \ 0,\n});\nconst result = chatCompletion.choices[0].message.content;\nconsole.log(result);\n\
  }\nmain();\n```\n\n**清单 3-1** JavaScript ChatGPT 客户端\n\n当你分析清单 3-1 中的代码时，你会看到一些在\
