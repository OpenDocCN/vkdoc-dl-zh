  \n## 结论\n\n我们刚刚完成了用 JavaScript 创建两个可运行 Discord 机器人所需的所有步骤。对于那些不熟悉创建 Discord 服务器流程的人，我们展示了如何设置一个服务器来管理我们的社区。\n\
  \n如你所见，我们采用的方法与第 4 章中 Slack 机器人的方法截然不同！我们创建的 Slack 机器人主要关注工作场所的用户生产力。而这两个 Discord\
  \ 机器人则真正专注于社区管理。我们已经为这些机器人借助 OpenAI 的 API 实现人工智能做好了所有准备。这一切将在最后两章中完成。\n\n## 留给读者的练习\n\
  \n在接下来的章节中，我们将让我们的“笨”机器人变得智能，但至少有一件事我们现在就可以做。与其使用命令行报告状态消息，不如让机器人拥有一个专门用于状态报告的频道。这样，当机器人启动、关闭或有任何重要信息需要通知管理员时，所有信息都会记录并保存在一个中心位置。\n\
  \n"
- "# 7. 为我们的 Discord 机器人添加智能，第 1 部分：改进我们的问答机器人\n\n至此，我们已经具备了所有结构，可以使我们在上一章中创建的两个 Discord\
