  trans: '

    ### 使用 Google Maps Platform API 创建项目


    大多数人已经拥有 Gmail 账户，但万一你没有，请务必在继续之前创建一个。


    Google 拥有大量 API，几乎涵盖你能想到的所有领域。然而，由于我们需要完成需要地理定位数据的任务，因此需要直接访问 Google Maps 的 API（如图
    2-7 所示），其地址为 [`https://developers.google.com/maps/documentation`](https://developers.google.com/maps/documentation)。


    ![](img/625846_1_En_2_Fig7_HTML.jpg)


    Google Maps Platform 网页，标题为“利用 Google 对现实世界的认知，构建出色的应用”。下方有“开始使用”和“阅读文档”按钮。该页面推广使用地图、路线和地点功能创建实时体验。底部区域通过图片突出显示热门主题，包括一张彩色图形、一张城市景观图、一张带有位置标记的地图以及一张详细的地图布局。导航栏包含指向概览、产品、定价、文档、博客和社区的链接。


    图 2-7


    Google Maps Platform 主页


    在 Google Maps Platform 页面上，点击**开始使用**来设置你的账户以使用 API。按照 Google 提供的步骤操作后，你将进入图 2-7
    所示的页面，在这里你可以看到 Google Maps Platform 提供的各种 API。但首先引起你注意的可能是，你还需要**完成账户设置**。


    完成账户设置（见图 2-8）需要输入信用卡信息，以便开始免费试用，该试用将提供价值 200 美元的额度，这完全足够我们测试使用。


    ![](img/625846_1_En_2_Fig8_HTML.jpg)


    Google Maps Platform 界面，展示了用于定制基于位置的体验的功能。主要部分突出显示了带有地图标记图标的“Locator Plus”，提供将客户引导至营业地点的工具。选项包括显示理想的营业地点、简化地址输入以及在地图上可视化数据。侧边栏列出了规划路线和以
    3D 方式探索区域等功能。顶部横幅提示用户完成账户设置。


    图 2-8


    完成 Google Maps Platform 账户设置


    正确设置账户后，你将看到一个欢迎页面。在左侧，你会找到一个菜单图标，点击它可以显示你有权访问的服务列表。你需要导航到**应用与服务**，然后点击**库**（如图
    2-9 和 2-10 所示）。


    ![](img/625846_1_En_2_Fig10_HTML.jpg)


    Google Cloud API 库界面，显示欢迎消息和用于搜索 API 和服务的搜索栏。该页面包含“地图”和“机器学习”API 部分。“地图”部分包括 Android
    版 Maps SDK、iOS 版 Maps SDK、Maps JavaScript API 和 Places API 等选项。“机器学习”部分列出了 Dialogflow、Cloud
    Vision、Cloud Natural Language 和 Cloud Speech-to-Text 等 API。左侧有可见性和类别过滤器，提供公共和私有
    API 选项，以及分析和大数据等类别。顶部横幅提供价值 300 美元额度的免费试用。


    图 2-10


    API 库页面


    ![](img/625846_1_En_2_Fig9_HTML.jpg)


    Google Cloud Platform 仪表盘界面，显示一个名为“My Maps Project”的项目。搜索栏中包含单词“maps”。“固定产品”下的下拉菜单列出了
    API 和服务、结算以及 IAM 和管理等选项。可以看到“在 BigQuery 中运行查询”和“创建存储桶”等操作按钮。顶部横幅提供价值 300 美元额度的免费试用。


    图 2-9


    导航到 Google Maps Platform 上的 API 和服务选项卡


    你需要点击 **Maps JavaScript API**，然后**启用**它，如图 2-11 所示。


    ![](img/625846_1_En_2_Fig11_HTML.jpg)


    Google Cloud 界面，显示 Maps JavaScript API 产品详情。该页面包含一个“启用”按钮，以及概览、文档、支持和相关产品选项卡。概览部分描述了如何使用
    Google Maps 数据将地图添加到网站。其他详细信息提到产品类型为 SaaS 和 API，最后更新于 2022 年 9 月 28 日，归类于地图。服务名称为
    `maps-backend.googleapis.com`。


    图 2-11


    启用 JavaScript API


    启用 JavaScript API 后，返回两次并再次打开菜单，然后点击 **Google Maps Platform** 以查看 Google Maps
    的仪表盘。


    从这里，我们将查看另一个侧边菜单，它看起来与之前的类似，但这次我们将再次点击**应用与服务**以查看不同的页面。在这里，你可以点击**路线**来启用它，如图
    2-12 所示。


    ![](img/625846_1_En_2_Fig12_HTML.jpg)


    Google Cloud 界面，在“查找合适的地图产品”下显示各种与地图相关的 API。选项包括空气质量 API、花粉 API、太阳能 API、空中视角 API、地图瓦片
    API、地图数据集 API、地图高程 API 和地图嵌入 API。每个 API 都有简要说明和一个“启用”或“禁用”按钮。侧边栏建议了“地图控制台快速导览”和“限制你的
    API 密钥”等教程。


    图 2-12


    启用路线 API


    启用我们需要的 API 后，导航到**密钥和凭据**选项卡，然后**创建新的 API 密钥**（图 2-13）。


    ![](img/625846_1_En_2_Fig13_HTML.jpg)


    该图片显示了 Google Cloud Platform 中用于管理 Google Maps Platform 内 API 密钥的界面。一个弹出窗口显示了一个新创建的
    API 密钥，并带有警告信息，提示该密钥未受限制，建议用户限制其使用以确保安全。背景包括概览、API 和配额等导航选项。右侧有一个标题为“为你推荐”的侧边栏，列出了“地图控制台快速导览”和“限制你的
    API 密钥”等教程。


    图 2-13


    Google Maps Platform 上的密钥和凭据页面


    现在我们有了 Google Maps API 密钥，我们可以再次利用 ChatGPT 作为我们的结对编程伙伴。我们的最终目标是拥有一个能够告诉我们目的地有多远以及到达那里需要多长时间的应用程序。顺便说一句，这里有一个有趣的事实——当你请求预计行程时间时，Google
    Maps 路线 API 会考虑道路上的实时交通拥堵数据，这使得我们的应用程序非常适合提高生产力！


    现在，为了展示 ChatGPT 作为结对编程伙伴的灵活性，让我们采用两种不同的方法来实现同一个目标。

