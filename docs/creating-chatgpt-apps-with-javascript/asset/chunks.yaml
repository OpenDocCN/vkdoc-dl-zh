- fmt: '### Viewing the OAuth & Permissions Page


    As shown in Figure [4-6](#625846_1_En_4_Chapter.xhtml#Fig6), navigate to the `OAuth
    & Permissions` page, and click the “Install to Workspace” button.


    ![](images/625846_1_En_4_Chapter/625846_1_En_4_Fig6_HTML.jpg)


    Slack API interface showing the "OAuth & Permissions" section. The page highlights
    "Advanced token security via token rotation," recommending developers to use token
    rotation for security. A notification indicates that a redirect URL must be set
    for token rotation. There are buttons labeled "Opt In" and "Install to Workspace"
    for OAuth tokens. The sidebar includes settings and features like Basic Information,
    Collaborators, and Incoming Webhooks.


    Figure 4-6


    The OAuth & Permission Screen


    ### Installing Your Slack Bot App to Your Workspace


    Now that all the permissions have been requested, it’s time to install your bot
    to your workspace. During the installation process, you should see a screen as
    shown in Figure [4-7](#625846_1_En_4_Chapter.xhtml#Fig7).


    ![](images/625846_1_En_4_Chapter/625846_1_En_4_Fig7_HTML.jpg)


    Slack permission request screen for "Tester Bot" to access the "Apress Book Testing"
    workspace. The bot requests access to view content and information about channels,
    conversations, and the workspace. Options to "Cancel" or "Allow" are available.
    The top banner indicates the app was created by a workspace member.


    Figure 4-7


    “Installing” a New Slack Bot App


    Click the `Allow` button to authorize the bot and allow the permissions you allotted
    in the previous step.


    **Note**


    It’s important to understand what “installing” means here. In a traditional JavaScript
    sense, installing an app means to copy your code and dependencies over to another
    machine and have it to execute. That’s not what’s happening here.


    Here, when you “install” a bot app, you’re enabling your Slack workspace to allow
    an app to join the workspace – that’s all. The code for your bot will run on your
    own machine, and not on Slack’s servers.


    ### Getting Your Slack Bot (Access) Token


    This time, “token” actually means access token! In order to connect to the Slack
    API and access messages and user information programmatically, you need a specific
    OAuth token generated for your Slack bot.


    ![](images/625846_1_En_4_Chapter/625846_1_En_4_Fig8_HTML.jpg)


    Slack API interface showing the "OAuth & Permissions" section. The page highlights
    "Advanced token security via token rotation," recommending developers to opt-in
    for enhanced security. A warning indicates that at least one redirect URL must
    be set before enabling token rotation. There is an "Opt In" button. Below, "OAuth
    Tokens for Your Workspace" displays a blurred Bot User OAuth Token with options
    to copy the token or reinstall to the workspace. The left sidebar includes settings
    and features like Basic Information, Collaborators, and Event Subscriptions.


    Figure 4-8


    Copy Your OAuth Token for Your Slack Bot App


    Back on the `OAuth & Permissions` page, be sure to copy the bot token (which usually
    starts with `xoxb-`) from the page here, as shown in Figure [4-8](#625846_1_En_4_Chapter.xhtml#Fig8).


    ### Inviting Your Bot to Your Channel


    Next, you’re going to go to the channel you’d like to use to test your bot and
    type in the following command in the channel itself.


    ```

    /invite

    ```


    Select the option “Add apps to this channel,” and then select the name of the
    Slack Bot that you specified earlier when you registered the bot with Slack.


    ![](images/625846_1_En_4_Chapter/625846_1_En_4_Fig9_HTML.jpg)


    A Slack interface showing a search result for the command "/invite." The dropdown
    menu displays three options: "Invite someone to this channel," "Invite someone
    new to join this workspace," and "Add apps to this channel," with the last option
    highlighted in blue.


    Figure 4-9


    Adding Your Slack Bot to a Channel


    Congratulations! You now have successfully registered a Slack Bot App with Slack,
    enabled it to read messages in your workspace, and added the Slack Bot to a channel.
    Before we can write the JavaScript code to access the channel in our workspace,
    we need to know what is the internal ID that Slack uses for our channel.


    ## Finding the Channel ID of Your Channel


    Ok, this is an easy step to do. In Slack, right-click the name of your channel
    and select the option “View Channel details.” At the bottom of the popup window
    is the ID of your channel. Copy that number and save it for later. Your JavaScript
    app will need this in order to join the right channel in your Slack workspace.


    ## Using Your Slack Bot App to Automatically Grab Messages from a Channel


    Alright, now that we have done all the prerequisites and we know the ID of our
    channel, let’s get to the code in JavaScript that accesses all the messages from
    a particular Slack channel.'
