- fmt: '# Regex vs. ChatGPT – Fight!


    **Note:** If you already know that a regular expression can’t perform Natural
    Language Understanding or sentiment analysis, then feel free to skip this section.


    I’m thoroughly convinced that every programmer somewhere in their lifetime has
    met *somebody* who happens to be an expert in writing regular expressions. Regular
    expressions are great because they serve the purpose of being able to parse large
    amounts of text in order to find patterns within the text programmatically.


    *However*, one of the biggest downsides to regular expressions is that once they
    have been written, they are extremely difficult to read (in my opinion, even by
    the developer who originally wrote it).


    So let’s see how regex holds up against ChatGPT, which has Natural Language Processing
    (NLP) and Natural Language Understanding (NLU) capabilities.


    Listing [1-3](#625846_1_En_1_Chapter.xhtml#PC3) is a story of an impractically
    sad situation. However, it drives home the point that although regular expressions
    can be used to find words and phrases within a body of text, it can’t be used
    to provide any type of NLU.


    ```

    In the city of Buttersville, United States, on Milkmaid street, there''s a group
    of three friends: Marion Yogurt, Janelle de Queso, and Steve Cheeseworth III.
    On a hot summer''s day, they heard the music from an ice cream truck and decided
    to buy something to eat.

    Marion likes strawberries, Janelle prefers chocolate, and Steve is lactose intolerant.
    That day, only two kids ate ice cream, and one of them bought a bottle of room-temperature
    water. The ice cream truck was fully stocked with the typical flavors of ice cream.

    Listing 1-3

    Sadstory.txt – A Sad Story About a Kid Who Didn’t Eat Ice Cream

    ```


    ## Analysis Question #1: Who Didn’t Get Any Ice Cream and Why?


    Now let’s analyze this for a bit and ask some questions among ourselves. First
    of all, who didn’t get any ice cream and why? The obvious answer is that Steve
    did not get any ice cream because of his lactose intolerance. However, since the
    story did not directly say that Steve did not buy ice cream, there’s no way for
    a regular expression to match a text pattern in the story.


    The regular expression could look for keywords such as “didn’t have,” “no ice
    cream,” or the names of the kids. However, it would only be able to provide a
    response based on the presence of these patterns. For example, if the regular
    expression matches the pattern “didn’t have” or “no ice cream” with Steve’s name,
    it could show you the result of the text pattern. However, it certainly wouldn’t
    be able to explain why Steve was the one who didn’t have ice cream or provide
    any context-specific reasoning.


    Now, let’s provide the same story to ChatGPT, and ask the question, “Who didn’t
    get any ice cream?” Listing [1-4](#625846_1_En_1_Chapter.xhtml#PC4), located below,
    takes our question and the story above and puts both together as a prompt.


    ```

    Using the information in the story below, who didn''t get any ice cream and why?

    ###

    In the city of Buttersville, United States, on Milkmaid street, there''s a group
    of three friends: Marion Yogurt, Janelle de Queso, and Steve Cheeseworth III.
    On a hot summer''s day, they heard the music from an ice cream truck, and decided
    to buy something to eat.

    Marion likes strawberries, Janelle prefers chocolate, and Steve is lactose intolerant.
    That day, only two kids ate ice cream, and one of them bought a bottle of room-temperature
    water. The ice cream truck was fully stocked with the typical flavors of ice cream.

    Listing 1-4

    PROMPT. The Sad Story Put Into a Prompt

    ```


    Notice how it is a best practice to provide some type of separation, in this case,
    `###`, when creating a prompt (like the one above) where you have both instructions
    and data together. Later on, when we start using either the Playground or JavaScript
    to programmatically invoke the ChatGPT API, you’ll see that there’s a much better
    way to provide that separation.


    So, after sending the prompt, ChatGPT will provide you an answer like shown in
    Listing [1-5](#625846_1_En_1_Chapter.xhtml#PC5):


    ```

    A geometric, interwoven pattern resembling a knot, composed of black lines forming
    a symmetrical, circular design on a white background.

    Based on the given information, Steve is lactose intolerant and therefore cannot
    eat ice cream. Therefore, Steve is the one who didn''t get any ice cream.

    Listing 1-5

    RESPONSE. ChatGPT’s Answer to Analysis Question #1

    ```


    As you can see, ChatGPT can utilize NLP and NLU, and therefore it can understand
    (artificially intelligently, that is) the context of the scenario. It can interpret
    the relationships between the kids, their preferences, and Steve’s lactose intolerance.
    It is able to understand that the last names of the children, the street name,
    and the city name are the names of dairy products, but are obviously irrelevant
    to the question at hand.


    ## Analysis Question #2: Which Kid Was Probably Left Sad?


    Now to further prove the point that a regular expression is unable to provide
    any type of NLP or NLU, now let’s use a new term called **sentiment analysis**.
    Therefore, after the ice cream truck drove away, which kid was left sad?


    Since the story had no mention of any of the children’s feelings or emotions,
    there is no text pattern that would allow any regular expression to return a match.


    However, if you posed the same question to ChatGPT, it will return a response
    like shown in Listing [1-6](#625846_1_En_1_Chapter.xhtml#PC6):


    ```

    A black and white geometric logo featuring an interlocking pattern of six shapes
    forming a symmetrical design.

    Since Steve is lactose intolerant and cannot eat ice cream, he would be the kid
    left sad because he couldn''t enjoy the ice cream like Marion and Janelle.

    Listing 1-6

    RESPONSE. ChatGPT’s Answer to Analysis Question #2

    ```


    Therefore, ChatGPT is able to comprehend the scenario, reason through the information,
    and provide a correct answer along with an explanation for that answer.


    ## Let’s Unlearn Some Words in Order to Learn More About the ChatGPT API


    First of all, before you get started working with the ChatGPT and OpenAI APIs,
    there are few words and terms that you should be familiar with first; otherwise,
    things won’t exactly make sense. So let’s make sure that we’re all clear on the
    definition of `Models`, `Prompts`, `Tokens`, and `Temperature` when using ChatGPT
    programmatically.'
  raw: '## Regex vs. ChatGPT – Fight!


    Note


    If you already know that a regular expression can’t perform Natural Language Understanding
    or sentiment analysis, then feel free to skip this section.


    I’m thoroughly convinced that every programmer somewhere in their lifetime has
    met *somebody* who happens to be an expert in writing regular expressions. Regular
    expressions are great because they serve the purpose of being able to parse large
    amounts of text in order to find patterns within the text programmatically.


    *However*, one of the biggest downsides to regular expressions is that once they
    have been written, they are extremely difficult to read (in my opinion, even by
    the developer who originally wrote it).


    So let’s see how regex holds up against ChatGPT, which has Natural Language Processing
    (NLP) and Natural Language Understanding (NLU) capabilities.


    Listing [1-3](#625846_1_En_1_Chapter.xhtml#PC3) is a story of an impractically
    sad situation. However, it drives home the point that although regular expressions
    can be used to find words and phrases within a body of text, it can’t be used
    to provide any type of NLU.


    ```

    In the city of Buttersville, United States, on Milkmaid street, there''s a group
    of three friends: Marion Yogurt, Janelle de Queso, and Steve Cheeseworth III.
    On a hot summer''s day, they heard the music from an ice cream truck and decided
    to buy something to eat.

    Marion likes strawberries, Janelle prefers chocolate, and Steve is lactose intolerant.
    That day, only two kids ate ice cream, and one of them bought a bottle of room-temperature
    water. The ice cream truck was fully stocked with the typical flavors of ice cream.

    Listing 1-3

    Sadstory.txt – A Sad Story About a Kid Who Didn’t Eat Ice Cream

    ```


    ### Analysis Question #1: Who Didn’t Get Any Ice Cream and Why?


    Now let’s analyze this for a bit and ask some questions among ourselves. First
    of all, who didn’t get any ice cream and why? The obvious answer is that Steve
    did not get any ice cream because of his lactose intolerance. However, since the
    story did not directly say that Steve did not buy ice cream, there’s no way for
    a regular expression to match a text pattern in the story.


    The regular expression could look for keywords such as “didn’t have,” “no ice
    cream,” or the names of the kids. However, it would only be able to provide a
    response based on the presence of these patterns. For example, if the regular
    expression matches the pattern “didn’t have” or “no ice cream” with Steve’s name,
    it could show you the result of the text pattern. However, it certainly wouldn’t
    be able to explain why Steve was the one who didn’t have ice cream or provide
    any context-specific reasoning.


    Now, let’s provide the same story to ChatGPT, and ask the question, “Who didn’t
    get any ice cream?” Listing [1-4](#625846_1_En_1_Chapter.xhtml#PC4), located below,
    takes our question and the story above and puts both together as a prompt.


    ```

    Using the information in the story below, who didn''t get any ice cream and why?

    ###

    In the city of Buttersville, United States, on Milkmaid street, there''s a group
    of three friends: Marion Yogurt, Janelle de Queso, and Steve Cheeseworth III.
    On a hot summer''s day, they heard the music from an ice cream truck, and decided
    to buy something to eat.

    Marion likes strawberries, Janelle prefers chocolate, and Steve is lactose intolerant.
    That day, only two kids ate ice cream, and one of them bought a bottle of room-temperature
    water. The ice cream truck was fully stocked with the typical flavors of ice cream.

    Listing 1-4

    PROMPT. The Sad Story Put Into a Prompt

    ```


    Notice how it is a best practice to provide some type of separation, in this case,
    “###”, when creating a prompt (like the one above) where you have both instructions
    and data together. Later on, when we start using either the Playground or JavaScript
    to programmatically invoke the ChatGPT API, you’ll see that there’s a much better
    way to provide that separation.


    So, after sending the prompt, ChatGPT will provide you an answer like shown in
    Listing [1-5](#625846_1_En_1_Chapter.xhtml#PC5):


    ```

    A geometric, interwoven pattern resembling a knot, composed of black lines forming
    a symmetrical, circular design on a white background.

    Based on the given information, Steve is lactose intolerant and therefore cannot
    eat ice cream. Therefore, Steve is the one who didn''t get any ice cream.

    Listing 1-5

    RESPONSE. ChatGPT’s Answer to Analysis Question #1

    ```


    As you can see, ChatGPT can utilize NLP and NLU, and therefore it can understand
    (artificially intelligently, that is) the context of the scenario. It can interpret
    the relationships between the kids, their preferences, and Steve’s lactose intolerance.
    It is able to understand that the last names of the children, the street name,
    and the city name are the names of dairy products, but are obviously irrelevant
    to the question at hand.


    ### Analysis Question #2: Which Kid Was Probably Left Sad?


    Now to further prove the point that a regular expression is unable to provide
    any type of NLP or NLU, now let’s use a new term called **sentiment analysis**.
    Therefore, after the ice cream truck drove away, which kid was left sad?


    Since the story had no mention of any of the children’s feelings or emotions,
    there is no text pattern that would allow any regular expression to return a match.


    However, if you posed the same question to ChatGPT, it will return a response
    like shown in Listing [1-6](#625846_1_En_1_Chapter.xhtml#PC6):


    ```

    A black and white geometric logo featuring an interlocking pattern of six shapes
    forming a symmetrical design.

    Since Steve is lactose intolerant and cannot eat ice cream, he would be the kid
    left sad because he couldn''t enjoy the ice cream like Marion and Janelle.

    Listing 1-6

    RESPONSE. ChatGPT’s Answer to Analysis Question #2

    ```


    Therefore, ChatGPT is able to comprehend the scenario, reason through the information,
    and provide a correct answer along with an explanation for that answer.


    ## Let’s Unlearn Some Words in Order to Learn More About the ChatGPT API


    First of all, before you get started working with the ChatGPT and OpenAI APIs,
    there are few words and terms that you should be familiar with first; otherwise,
    things won’t exactly make sense. So let’s make sure that we’re all clear on the
    definition of Models, Prompts, Tokens, and Temperature when using ChatGPT programmatically.'
  trans: '

    # 正则表达式 vs. ChatGPT——对决！


    **注意：** 如果你已经知道正则表达式无法进行自然语言理解或情感分析，可以随意跳过本节。


    我深信，每个程序员在职业生涯的某个阶段都曾遇到过*某个*精通正则表达式的人。正则表达式之所以强大，是因为它们能够以编程方式解析大量文本，从而在文本中查找模式。


    *然而*，正则表达式最大的缺点之一是，一旦编写完成，它们就极难阅读（在我看来，即使是原始开发者本人也难以读懂）。


    那么，让我们看看正则表达式在面对具备自然语言处理（NLP）和自然语言理解（NLU）能力的 ChatGPT 时表现如何。


    清单 1-3 讲述了一个不切实际的悲伤故事。然而，它清楚地说明了一个观点：尽管正则表达式可用于在文本中查找单词和短语，但它无法提供任何类型的 NLU。


    ```

    在美国黄油镇牛奶女工街上，住着三个朋友：马里昂·酸奶、珍妮尔·德·克索和史蒂夫·切斯沃斯三世。在一个炎热的夏日，他们听到了冰淇淋车的音乐，决定去买点吃的。

    马里昂喜欢草莓味，珍妮尔偏爱巧克力味，而史蒂夫有乳糖不耐症。那天，只有两个孩子吃了冰淇淋，其中一个还买了一瓶常温的水。冰淇淋车备齐了各种经典口味。

    清单 1-3

    Sadstory.txt – 一个关于没吃冰淇淋的孩子的悲伤故事

    ```


    ## 分析问题 #1：谁没吃到冰淇淋？为什么？


    现在，让我们稍微分析一下这个故事，并问自己几个问题。首先，谁没吃到冰淇淋？为什么？显而易见的答案是，史蒂夫因为乳糖不耐症没吃冰淇淋。然而，由于故事没有直接说史蒂夫没买冰淇淋，正则表达式无法匹配到故事中的任何文本模式。


    正则表达式可以查找诸如“没吃”、“没有冰淇淋”或孩子们的名字等关键词。但它只能根据这些模式是否存在来提供响应。例如，如果正则表达式将“没吃”或“没有冰淇淋”的模式与史蒂夫的名字匹配上，它可以向你展示该文本模式的结果。然而，它肯定无法解释为什么史蒂夫是那个没吃冰淇淋的人，也无法提供任何特定于上下文的推理。


    现在，让我们把同样的故事提供给 ChatGPT，并提问：“谁没吃到冰淇淋？”下面的清单 1-4 将我们的问题和上面的故事组合在一起，作为一个提示。


    ```

    根据下面故事中的信息，谁没吃到冰淇淋？为什么？

    ###

    在美国黄油镇牛奶女工街上，住着三个朋友：马里昂·酸奶、珍妮尔·德·克索和史蒂夫·切斯沃斯三世。在一个炎热的夏日，他们听到了冰淇淋车的音乐，决定去买点吃的。

    马里昂喜欢草莓味，珍妮尔偏爱巧克力味，而史蒂夫有乳糖不耐症。那天，只有两个孩子吃了冰淇淋，其中一个还买了一瓶常温的水。冰淇淋车备齐了各种经典口味。

    清单 1-4

    提示。将悲伤故事放入提示中

    ```


    请注意，在创建提示（如上所示）时，将指令和数据放在一起，提供某种分隔符（本例中为 `###`）是一种最佳实践。稍后，当我们开始使用 Playground 或
    JavaScript 以编程方式调用 ChatGPT API 时，你会看到有更好的方法来实现这种分隔。


    因此，发送提示后，ChatGPT 会提供一个答案，如清单 1-5 所示：


    ```

    一个几何形状的、交织的图案，类似于一个结，由黑色线条组成，在白色背景上形成对称的圆形设计。

    根据所给信息，史蒂夫有乳糖不耐症，因此不能吃冰淇淋。所以，史蒂夫是那个没吃到冰淇淋的人。

    清单 1-5

    响应。ChatGPT 对分析问题 #1 的回答

    ```


    如你所见，ChatGPT 能够利用 NLP 和 NLU，因此它可以（以人工智能的方式）理解场景的上下文。它可以解读孩子们之间的关系、他们的偏好以及史蒂夫的乳糖不耐症。它能够理解孩子们的姓氏、街道名称和城市名称都是乳制品的名称，但这些显然与当前问题无关。


    ## 分析问题 #2：哪个孩子可能留下了悲伤？


    为了进一步证明正则表达式无法提供任何类型的 NLP 或 NLU，现在让我们引入一个新术语：**情感分析**。那么，冰淇淋车开走后，哪个孩子留下了悲伤？


    由于故事中没有提及任何孩子的感受或情绪，因此没有任何文本模式能让正则表达式返回匹配结果。


    然而，如果你向 ChatGPT 提出同样的问题，它会返回一个类似清单 1-6 所示的响应：


    ```

    一个黑白相间的几何标志，由六个形状组成的连锁图案，形成对称设计。

    由于史蒂夫有乳糖不耐症，不能吃冰淇淋，他会是那个留下悲伤的孩子，因为他无法像马里昂和珍妮尔一样享受冰淇淋。

    清单 1-6

    响应。ChatGPT 对分析问题 #2 的回答

    ```


    因此，ChatGPT 能够理解场景，推理信息，并提供正确答案以及该答案的解释。


    ## 为了更深入了解 ChatGPT API，让我们先忘掉一些词汇


    首先，在开始使用 ChatGPT 和 OpenAI API 之前，你需要先熟悉一些词汇和术语；否则，事情可能不会完全说得通。所以，让我们确保大家都清楚在以编程方式使用
    ChatGPT 时，`模型`、`提示`、`令牌`和`温度`的定义。

    '
- fmt: "### Models. Models? Models!!!\n\nAs a JavaScript developer, when you hear\
    \ the term “model,” you may immediately think of the representation of real-world\
    \ entities in your JavaScript app, right? For example, think of the term, “object\
    \ model.” Additionally, if you’ve ever worked with any type of database before,\
    \ then the term “model” may ALSO conjure into your mind the idea of the representation\
    \ of data and their relationships in your database. For example, think of the\
    \ term, “data model.”\n\nHowever, when working with the ChatGPT APIs (and artificial\
    \ intelligence in general, for that matter) you need to forget both of those definitions,\
    \ because they don’t apply. In the realm of artificial intelligence, a “model”\
    \ is a pre-trained **neural network**.\n\nRemember, as I mentioned earlier, you\
    \ won’t need a PhD in Machine Learning in order to read this book. So what’s a\
    \ neural network? Simply stated, a neural network is a fundamental component of\
    \ artificial intelligence systems, because they are designed to simulate the way\
    \ the human brain works by using interconnected layers of artificial neurons to\
    \ process and analyze data. These networks can be trained on vast amounts of data\
    \ to learn patterns, relationships, and to make predictions.\n\n![](images/625846_1_En_1_Chapter/625846_1_En_1_Fig1_HTML.jpg)\n\
    \nDiagram illustrating the process of data input into the ChatGPT model. On the\
    \ left, multiple sheets labeled \"various data sources\" are shown, representing\
    \ diverse data inputs. An arrow points to the right, leading to a silhouette of\
    \ a human head with circuit-like patterns, symbolizing the ChatGPT model. Above\
    \ the head is the OpenAI logo.\n\n**Figure 1-1** — An AI Model Is Trained on Vast\
    \ Amounts of Data\n\nIn the context of AI, a “pre-trained model” refers to a neural\
    \ network that has been trained on a specific task or dataset before being made\
    \ available for use by developers. This training process involves exposing the\
    \ model to large amounts of labeled and categorized (also called, “annotated”)\
    \ data and adjusting its internal parameters to optimize its performance on the\
    \ given task.\n\nLet’s look at some of the models provided by OpenAI for developers\
    \ to use to AI-enable their applications.\n\n| Model | Description |\n| --- |\
    \ --- |\n| `o1` | The `o1` series of large language models is trained through\
    \ reinforcement learning to handle complex reasoning tasks. `o1` models engage\
    \ in deep thought before answering, generating a lengthy internal chain of reasoning\
    \ prior to responding to the user. These models take a significantly longer time\
    \ to generate a response than other models. Some `o1` available models are `o1`\
    \ and `o1-mini`. |\n| `GPT-4` | `GPT-4` is one of the latest generation of OpenAI’s\
    \ GPT set of models. GPT stands for Generative Pre-trained Transformer, and these\
    \ models have been trained to understand natural language as well as multiple\
    \ programming languages. The `GPT-4` models take text and images as inputs as\
    \ the prompt and provide text as the output. Some of the `GPT-4` models available\
    \ are `gpt-4o`, `gpt-4o-mini`, `gpt-4o-realtime`, and `gpt-4o-audio`. |\n| `GPT-3.5`\
    \ | `GPT-3.x` is the previous generation of OpenAI’s GPT set of models. The original\
    \ ChatGPT released to the public in November 2022 used GPT 3. Some of the `GPT-3`\
    \ models available are `gpt-3.5-turbo` and `gpt-3.5-turbo-16k`. |\n| `DALL·E`\
    \ | The `DALL·E` model can generate and edit images given a natural language prompt.\
    \ Later in this book in Chapter [5](#625846_1_En_5_Chapter.xhtml), we’re going\
    \ to have some fun with the `DALL·E` model to visualize the conversation of what\
    \ is being discussed in your favorite podcast episode. Some of the `DALL·E` models\
    \ available are `dall-e-3` and `dall-e-2`. |\n| `TTS` | The `TTS` model takes\
    \ text and converts it to audio with surprisingly good results. In most cases,\
    \ the audio is almost indistinguishable from a human voice. Some of the `TTS`\
    \ models available are `tts-1` and `tts-1-hd`. |\n| `Whisper` | Simply stated,\
    \ the `Whisper` model converts audio into text. In this book, we’re going to use\
    \ the `Whisper` model to search for text in a podcast episode. |\n| `Embeddings`\
    \ | The `Embeddings` model can convert large amounts of text into a numerical\
    \ representation of how the Strings in the text are related. So how is that useful?\
    \ `Embeddings` allows developers to do specific tasks using custom datasets. Yes,\
    \ this means that you can train the `embeddings` model on specific data that is\
    \ relevant to your application. This allows you to do operations such as: Searching\
    \ within your own body of text, Clustering data so that strings of text are grouped\
    \ by their similarity, Getting recommendations (where items with related text\
    \ strings are recommended), Detecting anomalies (where outliers with little relatedness\
    \ are identified), Measuring diversity (where similarity distributions are analyzed),\
    \ and Classifying data (where text strings are classified by their most similar\
    \ label). |\n| `Moderation` | The `moderation` models are fine-tuned models that\
    \ can detect whether text may be sensitive or unsafe. These models can analyze\
    \ text content and classify it according to the following categories: Hate, Hate/threatening,\
    \ Harassment, Harassment/threatening, Self-harm, Self-harm/intent, Self-harm/instructions,\
    \ Sexual, Sexual/minors, Violence, Violence/graphic. The `moderation` models available\
    \ are `text-moderation-latest` and `text-moderation-stable`. |\n| Legacy and Deprecated\
    \ | Since the debut of ChatGPT, OpenAI has continued to support their older AI\
    \ models, but they have been labeled as “legacy” or “deprecated” models. These\
    \ models continue to exist; however, they have released other models that are\
    \ more accurate, faster, and cheaper to use. |\n\n> **Note**  \n> This is by no\
    \ means an exhaustive list of models available for developers provided by OpenAI!\
    \ As newer models are released, the older models will be marked as legacy or deprecated.\
    \ Therefore, it’s important to stay up to date by checking the list of available\
    \ models on the OpenAI documentation list of models:  \n> [https://platform.openai.com/docs/models](https://platform.openai.com/docs/models)\n\
    \n### When We Talk About Tokens, Don’t Think About Access Tokens\n\nWhen using\
    \ a third-party API, such as an external REST service, you might think of a “token”\
    \ in the same sense as an access token, which is typically a UUID that allows\
    \ you to identify yourself and maintain a session with the service. Well, forget\
    \ that definition for now. Instead, when using the OpenAI APIs, a **token** is\
    \ a chunk of a text that is approximately 4 characters long. That’s it – nothing\
    \ else special.\n\nSo if a token is approximately a 4-character chunk of text,\
    \ then why do we care about it?\n\nWhen working with the OpenAI textual models,\
    \ developers need to be aware of token limitations, because they impact the cost\
    \ and performance of API calls. For example, the `gpt-4o` and `o1` models both\
    \ support 128,000 tokens (which is approximately the size of a 300-page novel)\
    \ that can go in your prompt. These input tokens are also called the **context\
    \ window**. In contrast, the maximum output tokens for `gpt-4o` is 16,384, while\
    \ the maximum output tokens for the `o1` model is 32,768.\n\nAs a result, developers\
    \ need to take into account the length of the prompts as inputs and outputs to\
    \ the models, ensuring that they fit within the model’s token constraints.\n\n\
    Table 1-1 provides a list of some of the most current models with the token limitations\
    \ and their pricing.\n\n**Table 1-1** — List of Models with Their Token Limitations\
    \ and the Cost per Token\n\n| Model | Context Window | Cost of Token Input | Cost\
    \ of Token Output |\n| --- | --- | --- | --- |\n| `gpt-4o` | 128,000 | $2.50 /\
    \ 1M tokens | $10.00 / 1M tokens |\n| `gpt-4o-mini` | 128,000 | $0.15 / 1M tokens\
    \ | $0.60 / 1M tokens |\n| `o1` | 128,000 | $15.00 / 1M tokens | $60.00 / 1M tokens\
    \ |\n| `o1-mini` | 128,000 | $3.00 / 1M tokens | $12.00 / 1M tokens |"
  raw: '### Models. Models? Models!!!


    As a JavaScript developer, when you hear the term “model,” you may immediately
    think of the representation of real-world entities in your JavaScript app, right?
    For example, think of the term, “object model.” Additionally, if you’re ever worked
    with any type of database before, then the term “model” may ALSO conjure into
    your mind the idea of the representation of data and their relationships in your
    database. For example, think of the term, “data model.”


    However, when working with the ChatGPT APIs (and artificial intelligence in general,
    for that matter) you need to forget both of those definitions, because they don’t
    apply. In the realm of artificial intelligence, a “model” is a pre-trained **neural
    network**.


    Remember, as I mentioned earlier, you won’t need a PhD in Machine Learning in
    order to read this book. So what’s a neural network? Simply stated, a neural network
    is a fundamental component of artificial intelligence systems, because they are
    designed to simulate the way the human brain works by using interconnected layers
    of artificial neurons to process and analyze data. These networks can be trained
    on vast amounts of data to learn patterns, relationships, and to make predictions.


    ![](images/625846_1_En_1_Chapter/625846_1_En_1_Fig1_HTML.jpg)


    Diagram illustrating the process of data input into the ChatGPT model. On the
    left, multiple sheets labeled "various data sources" are shown, representing diverse
    data inputs. An arrow points to the right, leading to a silhouette of a human
    head with circuit-like patterns, symbolizing the ChatGPT model. Above the head
    is the OpenAI logo.


    Figure 1-1


    An AI Model Is Trained on Vast Amounts of Data


    In the context of AI, a “pre-trained model” refers to a neural network that has
    been trained on a specific task or dataset before being made available for use
    by developers. This training process involves exposing the model to large amounts
    of labeled and categorized (also called, “annotated”) data and adjusting its internal
    parameters to optimize its performance on the given task.


    Let’s look at some of the models provided by OpenAI for developers to use to AI-enable
    their applications.


    | o1 | The o1 series of large language models is trained through reinforcement
    learning to handle complex reasoning tasks. o1 models engage in deep thought before
    answering, generating a lengthy internal chain of reasoning prior to responding
    to the user. These models take a significantly longer time to generate a response
    than other models.Some o1 available models areo1o1-mini |

    | GPT-4 | GPT-4 is one of the latest generation of OpenAI’s GPT set of models.
    GPT stands for Generative Pre-trained Transformer, and these models have been
    trained to understand natural language as well as multiple programming languages.
    The GPT-4 models take text and images as inputs as the prompt and provide text
    as the output.Some of the GPT-4 models available aregpt-4ogpt-4o-minigpt-4o-realtimegpt-4o-audio
    |

    | GPT-3.5 | GPT-3.x is the previous generation of OpenAI’s GPT set of models.
    The original ChatGPT released to the public in November 2022 used GPT 3.Some of
    the GPT-3 models available aregpt-3.5-turbogpt-3.5-turbo-16k |

    | DALL·E | The DALL·E model can generate and edit images given a natural language
    prompt.Later in this book in Chapter [5](#625846_1_En_5_Chapter.xhtml), we’re
    going to have some fun with the DALL·E model to visualize the conversation of
    what is being discussed in your favorite podcast episode.Some of the DALL·E models
    available aredall-e-3dall-e-2 |

    | TTS | The TTS model takes text and converts it to audio with surprisingly good
    results. In most cases, the audio is almost indistinguishable from a human voice.Some
    of the TTS models available aretts-1tts-1-hd |

    | Whisper | Simply stated, the Whisper model converts audio into text.In this
    book, we’re going to use the Whisper model to search for text in a podcast episode.
    |

    | Embeddings | The Embeddings model can convert large amounts of text into a numerical
    representation of how the Strings in the text are related. So how is that useful?
    Embeddings allows developers to do specific tasks using custom datasets. Yes,
    this means that you can train the embeddings model on specific data that is relevant
    to your application. This allows you to do operations such asSearching within
    your own body of textClustering data so that strings of text are grouped by their
    similarityGetting recommendations (where items with related text strings are recommended)Detecting
    anomalies (where outliers with little relatedness are identified)Measuring diversity
    (where similarity distributions are analyzed)Classifying data (where text strings
    are classified by their most similar label) |

    | Moderation | The moderation models are fine-tuned models that can detect whether
    text may be sensitive or unsafe. These models can analyze text content and classify
    it according to the following categories:HateHate/threateningHarassmentHarassment/threateningSelf-harmSelf-harm/intentSelf-harm/instructionsSexualSexual/minorsViolenceViolence/graphicThe
    moderation models available aretext-moderation-latesttext-moderation-stable |

    | Legacy and Deprecated | Since the debut of ChatGPT, OpenAI has continued to
    support their older AI models, but they have been labeled as “legacy” or “deprecated”
    models. These models continue to exist; however, they have released other models
    that are more accurate, faster, and cheaper to use. |


    Note


    This is by no means an exhaustive list of models available for developers provided
    by OpenAI! As newer models are released, the older models will be marked as legacy
    or deprecated. Therefore, it’s important to stay up to date by checking the list
    of available models on the OpenAI documentation list of models:


    [**https://platform.openai.com/docs/models**](https://platform.openai.com/docs/models)


    ### When We Talk About Tokens, Don’t Think About Access Tokens


    When using a third-party API, such as an external REST service, you might think
    of a “token” in the same sense as an access token, which is typically a UUID that
    allows you to identify yourself and maintain a session with the service. Well,
    forget that definition for now. Instead, when using the OpenAI APIs, a **token**
    is a chunk of a text that is approximately 4 characters long. That’s it – nothing
    else special.


    So if a token is approximately a 4-character chunk of text, then why do we care
    about it?


    When working with the OpenAI textual models, developers need to be aware of token
    limitations, because they impact the cost and performance of API calls. For example,
    the gpt-4o and o1 models both support 128,000 tokens (which is approximately the
    size of a 300-page novel) that can go in your prompt. These input tokens are also
    called the **context window**. In contrast, the maximum output tokens for gpt-4o
    is 16,384, while the maximum output tokens for the o1 model is 32,768.


    As a result, developers need to take into account the length of the prompts as
    inputs and outputs to the models, ensuring that they fit within the model’s token
    constraints.


    Table [1-1](#625846_1_En_1_Chapter.xhtml#Tab1) provides a list of some of the
    most current models with the token limitations and their pricing.


    Table 1-1


    List of Models with Their Token Limitations and the Cost per Token


    | Model | Context Window | Cost of Token Input | Cost of Token Output |

    | --- | --- | --- | --- |

    | gpt-4o | 128,000 | $2.50 / 1M tokens | $10.00 / 1M tokens |

    | gpt-4o-mini | 128,000 | $0.15 / 1M tokens | $0.60 / 1M tokens |

    | o1 | 128,000 | $15.00 / 1M tokens | $60.00 / 1M tokens |

    | o1-mini | 128,000 | $3.00 / 1M tokens | $12.00 / 1M tokens |'
  trans: "\n### 模型。模型？模型！！！\n\n作为一名 JavaScript 开发者，当你听到“模型”这个词时，可能立刻会想到 JavaScript\
    \ 应用中现实世界实体的表示，对吧？例如，想想“对象模型”这个词。此外，如果你曾经使用过任何类型的数据库，那么“模型”这个词可能还会让你联想到数据库中数据及其关系的表示。例如，想想“数据模型”这个词。\n\
    \n然而，在使用 ChatGPT API（以及广义上的人工智能）时，你需要忘记这两种定义，因为它们并不适用。在人工智能领域，“模型”是一个预训练的**神经网络**。\n\
    \n请记住，正如我之前提到的，阅读本书并不需要机器学习博士学位。那么什么是神经网络？简单来说，神经网络是人工智能系统的基本组成部分，因为它通过使用相互连接的人工神经元层来处理和分析数据，旨在模拟人脑的工作方式。这些网络可以在大量数据上进行训练，以学习模式、关系并做出预测。\n\
    \n![](img/625846_1_En_1_Fig1_HTML.jpg)\n\n图示说明了数据输入 ChatGPT 模型的过程。左侧显示了多张标有“各种数据源”的纸张，代表多样化的数据输入。一个箭头指向右侧，指向一个带有电路图案的人头剪影，象征着\
    \ ChatGPT 模型。头部上方是 OpenAI 标志。\n\n**图 1-1** — AI 模型在大量数据上进行训练\n\n在 AI 的语境中，“预训练模型”指的是一个神经网络，它在被提供给开发者使用之前，已经在特定任务或数据集上进行了训练。这个训练过程包括将模型暴露于大量已标记和分类（也称为“注释”）的数据，并调整其内部参数以优化其在给定任务上的性能。\n\
    \n让我们看看 OpenAI 为开发者提供的一些模型，以便为其应用程序赋能 AI。\n\n| 模型 | 描述 |\n| --- | --- |\n| `o1`\
    \ | `o1` 系列大型语言模型通过强化学习进行训练，以处理复杂的推理任务。`o1` 模型在回答前会进行深度思考，在响应用户之前生成长篇的内部推理链。这些模型生成响应所需的时间比其他模型长得多。一些可用的\
    \ `o1` 模型包括 `o1` 和 `o1-mini`。 |\n| `GPT-4` | `GPT-4` 是 OpenAI 最新一代 GPT 模型之一。GPT\
    \ 代表生成式预训练变换器，这些模型经过训练，能够理解自然语言以及多种编程语言。`GPT-4` 模型将文本和图像作为输入提示，并输出文本。一些可用的 `GPT-4`\
    \ 模型包括 `gpt-4o`、`gpt-4o-mini`、`gpt-4o-realtime` 和 `gpt-4o-audio`。 |\n| `GPT-3.5`\
    \ | `GPT-3.x` 是 OpenAI 上一代 GPT 模型。2022 年 11 月向公众发布的原始 ChatGPT 使用了 GPT 3。一些可用的\
    \ `GPT-3` 模型包括 `gpt-3.5-turbo` 和 `gpt-3.5-turbo-16k`。 |\n| `DALL·E` | `DALL·E`\
    \ 模型可以根据自然语言提示生成和编辑图像。在本书后面的第 5 章中，我们将使用 `DALL·E` 模型来可视化你最喜欢的播客剧集中讨论的内容，这会很有趣。一些可用的\
    \ `DALL·E` 模型包括 `dall-e-3` 和 `dall-e-2`。 |\n| `TTS` | `TTS` 模型将文本转换为音频，效果出奇地好。在大多数情况下，音频几乎与人类声音无法区分。一些可用的\
    \ `TTS` 模型包括 `tts-1` 和 `tts-1-hd`。 |\n| `Whisper` | 简单来说，`Whisper` 模型将音频转换为文本。在本书中，我们将使用\
    \ `Whisper` 模型在播客剧集中搜索文本。 |\n| `Embeddings` | `Embeddings` 模型可以将大量文本转换为数值表示，表示文本中字符串之间的关联方式。那么这有什么用呢？`Embeddings`\
    \ 允许开发者使用自定义数据集执行特定任务。是的，这意味着你可以在与你的应用程序相关的特定数据上训练 `embeddings` 模型。这使你能够执行诸如以下操作：在你自己的文本中进行搜索、对数据进行聚类以便按相似性对文本字符串进行分组、获取推荐（推荐具有相关文本字符串的项目）、检测异常（识别相关性较低的离群值）、衡量多样性（分析相似性分布）以及对数据进行分类（根据最相似的标签对文本字符串进行分类）。\
    \ |\n| `Moderation` | `moderation` 模型是经过微调的模型，可以检测文本是否敏感或不安全。这些模型可以分析文本内容，并根据以下类别进行分类：仇恨、仇恨/威胁、骚扰、骚扰/威胁、自残、自残/意图、自残/指示、色情、色情/未成年人、暴力、暴力/图形。可用的\
    \ `moderation` 模型包括 `text-moderation-latest` 和 `text-moderation-stable`。 |\n|\
    \ 旧版和已弃用 | 自 ChatGPT 首次亮相以来，OpenAI 一直继续支持其较旧的 AI 模型，但它们已被标记为“旧版”或“已弃用”模型。这些模型仍然存在；然而，他们已经发布了其他更准确、更快且使用成本更低的模型。\
    \ |\n\n> **注意**  \n> 这绝不是 OpenAI 为开发者提供的可用模型的详尽列表！随着新模型的发布，旧模型将被标记为旧版或已弃用。因此，通过查看\
    \ OpenAI 文档模型列表来保持最新状态非常重要：  \n> [`platform.openai.com/docs/models`](https://platform.openai.com/docs/models)\n\
    \n### 当我们谈论 Token 时，不要想到访问令牌\n\n当使用第三方 API（例如外部 REST 服务）时，你可能会将“token”理解为访问令牌，它通常是一个\
    \ UUID，用于标识你自己并与服务保持会话。好吧，现在请忘记这个定义。相反，在使用 OpenAI API 时，**token** 是一个大约 4 个字符长的文本块。仅此而已——没有其他特别之处。\n\
    \n那么，如果 token 是一个大约 4 个字符的文本块，我们为什么要在意它呢？\n\n在使用 OpenAI 文本模型时，开发者需要注意 token 限制，因为它们会影响\
    \ API 调用的成本和性能。例如，`gpt-4o` 和 `o1` 模型都支持 128,000 个 token（大约相当于一本 300 页小说的篇幅）作为你的提示输入。这些输入\
    \ token 也称为**上下文窗口**。相比之下，`gpt-4o` 的最大输出 token 为 16,384，而 `o1` 模型的最大输出 token 为\
    \ 32,768。\n\n因此，开发者需要考虑作为模型输入和输出的提示长度，确保它们符合模型的 token 约束。\n\n表 1-1 列出了一些最新的模型及其\
    \ token 限制和定价。\n\n**表 1-1** — 模型列表及其 Token 限制和每 Token 成本\n\n| 模型 | 上下文窗口 | 输入\
    \ Token 成本 | 输出 Token 成本 |\n| --- | --- | --- | --- |\n| `gpt-4o` | 128,000 |\
    \ $2.50 / 1M tokens | $10.00 / 1M tokens |\n| `gpt-4o-mini` | 128,000 | $0.15\
    \ / 1M tokens | $0.60 / 1M tokens |\n| `o1` | 128,000 | $15.00 / 1M tokens | $60.00\
    \ / 1M tokens |\n| `o1-mini` | 128,000 | $3.00 / 1M tokens | $12.00 / 1M tokens\
    \ |\n"
- fmt: '### Temperature Is All About Creativity


    Of course, ChatGPT isn’t sentient, so it’s incapable of thinking as we humans
    do. However, by adjusting the `temperature` setting in your prompts to the ChatGPT
    API, you can enable the responses to be more creative. Being aware of what it
    understands is crucial if you want to make best use of its potential.


    ![](images/625846_1_En_1_Chapter/625846_1_En_1_Fig2_HTML.jpg)


    An illustration of a creativity scale featuring a thermometer with levels from
    0 to 2. Level 0 is labeled "Not creative, very predictable," and level 2 is labeled
    "Very creative, very random." A light bulb with a gear inside is shown next to
    the thermometer, symbolizing creativity and innovation.


    **Figure 1-2** – Modify the `Temperature` in Order to Get More (or Less) Creative
    Responses


    Now it’s time to take the concepts that we’ve learned so far and start to put
    them to good use! However, we need to do first things first, and therefore you
    will need to have a developer account with OpenAI and create an API key.


    Head over to the following URL to create your dev account and API key:


    [`https://platform.openai.com/account/api-keys`](https://platform.openai.com/account/api-keys)


    As you can see from the image below, you can name your API key anything that you
    want.


    ## Getting Started with the OpenAI Playground


    Now it’s time to take the concepts that we’ve learned so far and start to put
    them to good use! However, we need to do first things first, and therefore you
    will need to have a developer account with OpenAI and create an API key.


    Head over to the following URL to create your dev account and API key:


    [`https://platform.openai.com/account/api-keys`](https://platform.openai.com/account/api-keys)


    As you can see from Figure 1-3, you can name your API key anything that you want.


    ![](images/625846_1_En_1_Chapter/625846_1_En_1_Fig3_HTML.jpg)


    A user interface for creating a new secret API key within a project management
    dashboard. The interface includes options to select ownership by "You" or "Service
    account," with a note about key usage. A text field labeled "Name" is filled with
    "developer key for JS apps." The "Project" dropdown shows "Default project." Permissions
    options include "All," "Restricted," and "Read Only," with "All" selected. Buttons
    for "Cancel" and "Create secret key" are at the bottom. The background shows a
    sidebar with menu items like "Playground," "Assistants," and "API keys."


    **Figure 1-3** – Before You Can Access the Playground or Make API Calls, You Need
    to Have an API Key


    You should be aware that as a requirement to create an API key, you will need
    to provide to OpenAI a credit card so that you can be billed for usage of their
    models.


    Now that you’ve got your API key, let’s go straight to the Chat Playground at
    the following URL:


    [`https://platform.openai.com/playground`](https://platform.openai.com/playground)


    Figure 1-4 depicts the Chat Playground, with certain parts numbered so that they
    can be easily identified.


    ![](images/625846_1_En_1_Chapter/625846_1_En_1_Fig4_HTML.jpg)


    Screenshot of an AI playground interface for chat-based interaction. The main
    chat area displays a system message stating, "You are a JavaScript developer."
    Below, a user input box contains the question, "What are the most common packages
    used by developers?" with a "Run" button next to it. The right panel shows model
    settings, including `gpt-4o` as the selected model, with adjustable parameters
    like `Temperature` set to 1.00 and `Max tokens` set to 2048. The interface includes
    navigation options such as "Realtime," "Assistants," and "Completions" on the
    left sidebar.


    **Figure 1-4** – The Chat Playground Can Be a Little Daunting at First Glance


    ### 1. System Message


    As you can see, the user interface for the Chat Playground is vastly more complex
    than the ChatGPT website that everyone else uses. So let’s talk about the `System
    Message` field (see Figure 1-4, item 1).


    In our opinion, ChatGPT can be described as, “a vastly powerful form of artificial
    intelligence… with amnesia.” Therefore, when you’re using ChatGPT programmatically,
    you need to inform the system who it is in the conversation!


    Figure 1-5, shown below, gives you a glimpse of the thousands of different roles
    that ChatGPT can play in a conversation.


    ![](images/625846_1_En_1_Chapter/625846_1_En_1_Fig5_HTML.jpg)


    A graphic with the text "System: ''You are a...''" followed by four icons representing
    different professions. The first icon shows a graph with a dollar sign labeled
    "economist." The second icon is a computer with a speech bubble labeled "blogger."
    The third icon features a quill and ink pot labeled "15th century poet." The fourth
    icon is a chef''s hat labeled "Chef."


    **Figure 1-5** – The `System Message` Field in the Chat Playground Allows You
    to Set the Role That ChatGPT Will Play in the Conversation


    ### 2. User


    The `User` field (Figure 1-4, item 2) in the Chat Playground is where you type
    your prompt to ChatGPT, which can be anything that you want, for example, “What
    are the most common packages used by developers?”


    ### 3. Assistant (Optional)


    When you initially load the Chat Playground, the `Assistant` field (Figure 1-4,
    item 3) is not visible. In order to make it appear, you need to do the following:


    *   Type in a User message.

    *   Click the “+” button to add the message to the conversation.

    *   Click the User button, to toggle the message type from “User” to “Assistant.”


    Now, you may be asking yourself, “Why is this field needed at all?” Well, that’s
    a fine question. If you want ChatGPT to remember something that it has already
    told you in a previous conversation, then you need to type into the `Assistant`
    field anything that it has already told you that you think is relevant in order
    to continue with the conversation. Remember, it is a vastly powerful AI, but it
    has amnesia!


    ### 4. + (Optional)


    The “`+`” button (Figure 1-4, item 4) is where you’d click in order to add either
    an `Assistant` message to the conversation or another `User` message. Now, you
    may ask, “What’s the point of adding yet another User message to the conversation,
    when I can type what I want in the original User field above?” Good question.


    If you wanted to separate your commands from your data, then you would use a separate
    `User` message for that.


    Do you remember in Listing 1-4 earlier in this chapter, where we had to use the
    “###” to separate the command to ChatGPT from the data that we wanted it to analyze?
    Well, this is now no longer needed because the command would be the first `User`
    message, and the data would be the second `User` message.


    ### 5. Code (Optional)


    After you have submitted your prompt using the Playground, you can click the `Code`
    button (Figure 1-4, item 5) in order to see the code necessary to send the same
    prompt using any of the languages that they support.


    ### 6. Model (Optional)


    Earlier in this chapter, we talked about the various models that are available
    for developers. Click the model field in order to see a list of models that are
    available.


    You may also see that some models have a month and day associated with their name,
    which is simply a snapshot of that model. Programmatically selecting a snapshot
    enables developers to have some sort of predictability in the responses that they
    will receive from ChatGPT, because the current models are always updated.


    ### 7. Temperature (Optional)


    As noted earlier in this chapter, the temperature selector ranges between 0 and
    2 and allows you to select the “randomness” of the response.'
