    \ act as an assistant to the server's mods.\" There are fields for adding tags,\
    \ and buttons to copy the application ID and public key. The left sidebar includes\
    \ navigation options like \"Installation,\" \"OAuth2,\" and \"Bot.\"\n\nFigure\
    \ 6-15\n\nProviding a Name and Icon for the Second Bot\n\n### Specifying OAuth2\
    \ Parameters for the Bot\n\nThis second bot needs more permissions in order to\
    \ perform more tasks. Below are the scopes that we want:\n\n*   Bot\n    *   Kick\
    \ Members\n\n    *   Ban Members\n\n    *   Send Messages\n\n    *   Manage Messages\n\
    \n    *   Read Message History\n\n### Invite Your Bot to Your Server\n\nRepeat\
    \ the same steps as above for the first bot."
  trans: "\n# 用 JavaScript 创建问答机器人应用，从频道中回答问题\n\n当然，既然我们已经完成了所有必要的准备工作，并且知道了要监控用户提问的频道名称，接下来就让我们编写\
    \ JavaScript 代码，让机器人加入我们的服务器并访问特定 Discord 频道中的所有消息。\n\n这是本章中我们要创建的两个 Discord 机器人中的第一个。这个机器人将负责监控我们\
    \ Discord 服务器中 `q-and-a` 频道内的消息。\n\n在本章稍后的部分，我们将创建另一个机器人，负责审核 Discord 服务器中（包括\
    \ `q-and-a` 频道）所有不当内容。这样做的目的是遵循“关注点分离”的架构模式。我们不会创建一个庞大的、能处理 Discord 服务器所有审核需求的\
    \ JavaScript 机器人，而是将功能拆分成两个不同的应用。\n\n我们还将循序渐进，将本章的重点放在攻克 JavaScript 中 Discord\
    \ 功能的学习曲线上。在本书的最后几章中，我们将使用 OpenAI API 来增强这两个机器人，让它们具备人工智能。\n\n代码清单 6-1 展示了创建一个基础\
    \ Discord 机器人所需的代码，该机器人可以监控单个频道中发布的所有消息并提供回答。\n\n```\n// 引入必要的 discord.js 类\n\
    const { Client, Events, GatewayIntentBits } = require(\"discord.js\");\nrequire(\"\
    dotenv\").config();\n// 配置变量\nconst CHANNEL_NAME = \"q-and-a\";\nconst CUSTOM_STATUS\
    \ = \"Ready to answer your questions\";\n// 创建一个新的客户端实例\nconst client = new Client({\n\
    intents: [\nGatewayIntentBits.MessageContent,\nGatewayIntentBits.GuildMessages,\n\
    GatewayIntentBits.Guilds,\n],\n});\nclient.once(Events.ClientReady, (readyClient)\
    \ => {\nconsole.log(`准备就绪！已登录为 ${readyClient.user.tag}`);\n// 设置自定义状态\nclient.user.setActivity(CUSTOM_STATUS);\n\
    });\nclient.on(Events.MessageCreate, async (message) => {\nif (client.user.username\
    \ === message.author.username) return;\nif (message.channel.name !== CHANNEL_NAME)\
    \ return;\nconsole.log(\"用户是：\", message.author.globalName || message.author.username);\n\
    console.log(\"消息内容是：\", message.content);\nconst reply = `${mention(message.author)},\
    \ 我可以帮你解决这个问题！`;\nawait message.channel.send(reply);\n});\nfunction mention(author)\
    \ {\nreturn ``;\n}\n// 使用你的客户端令牌登录 Discord\nclient.login(process.env.DISCORD_BOT_API_TOKEN);\n\
    代码清单 6-1\n我们简化的技术支持机器人\n```\n\n现在，让我们深入分析代码清单 6-1 中的代码，了解我们简化的技术支持机器人是如何工作的。这个机器人旨在监控你\
    \ Discord 服务器中 `q-and-a` 频道的消息，并对用户的问题做出回应。\n\n**注意：** 由于某些原因，Discord 自身的术语有时会将\
    \ Discord 服务器称为“公会”。但从我们的角度来看，公会就是一个 Discord 服务器。\n\n## 创建 Discord 客户端\n\n用几行代码创建一个\
    \ Discord 客户端非常简单：\n\n```\n// 创建一个新的客户端实例\nconst client = new Client({\nintents:\
    \ [\nGatewayIntentBits.MessageContent,\nGatewayIntentBits.GuildMessages,\nGatewayIntentBits.Guilds,\n\
    ],\n});\n```\n\n在这里，我们实例化了一个新的 Discord 客户端，并提供了一个 `intents` 数组，告诉 Discord 我们希望机器人接收哪些事件，即：\n\
    \n- `MessageContent`：允许机器人读取消息内容\n- `GuildMessages`：使机器人能够接收来自 Discord 服务器的消息\n\
    - `Guilds`：允许机器人接收关于其所属 Discord 服务器的更新\n\n## 监听首选 Discord 频道中的新消息\n\n显然，我们的机器人中最重要的功能是\
    \ `client.on()` 事件监听器，我们用它来监控 Discord 服务器中发布的每一条新消息。\n\n```\nclient.on(Events.MessageCreate,\
    \ async (message) => {\nif (client.user.username === message.author.username)\
    \ return;\nif (message.channel.name !== CHANNEL_NAME) return;\nconsole.log(\"\
    用户是：\", message.author.globalName || message.author.username);\nconsole.log(\"\
    消息内容是：\", message.content);\nconst reply = `${mention(message.author)}, 我可以帮你解决这个问题！`;\n\
    await message.channel.send(reply);\n});\n```\n\n如果消息来自 `q-and-a` 频道，我们的机器人会向发送者发送一条友好的（尽管目前还不太有用）回复。作为一个小巧思，回复中会@提及作者，这样他们就能在回复发布时收到通知。\n\
    \n## 成功！运行你的第一个 Discord 机器人\n\n现在让我们运行我们的 JavaScript Discord 机器人。执行脚本后，请务必返回你的\
    \ Discord 服务器，并尝试在你为问答设置的频道中输入一个问题。图 6-14 展示了针对问题“这个机器人会回答我关于这个应用的问题吗？”的回复。\n\n\
    ![](img/625846_1_En_6_Fig14_HTML.jpg)\n\n一个 Discord 界面，显示了一个名为“Crook's Bank”的服务器中的\
    \ `q-and-a` 文本频道。主要区域用“欢迎来到 #q-and-a！这是 #q-and-a 频道的开始。”的消息欢迎用户。下方可见一段对话，其中“PythonChatGPT”询问机器人是否能回答关于应用的问题，“Q\
    \ and A Bot”给出了肯定回复。侧边栏列出了文本频道 `general` 和 `q-and-a`，以及语音频道 `General`。两名用户“PythonChatGPT”和“Q\
    \ and A Bot”处于在线状态。\n\n**图 6-14** 在 Discord 中成功运行问答机器人\n\n当你仔细查看图 6-14 时，你会看到一些关键特性，例如：\n\
    \n- 在右侧，你会看到机器人处于在线状态，并带有绿色状态指示器。\n- 机器人还有一个自定义状态，让你知道它将在频道中做什么。\n- 在频道中提问后，机器人会直接@提及你。\n\
    \n# 简化注册下一个 Discord 机器人应用的流程\n\n既然我们已经成功完成了所有步骤，创建了一个可运行的 Discord 机器人，那么创建第二个机器人就易如反掌了！所以，让我们简要地重复一下上述所有步骤，以便创建我们的第二个\
    \ Discord 机器人。我们会明确指出哪些项目需要更改或增强，因为第二个机器人将作为审核员工作，而不是回答我们 Discord 服务器用户的问题。\n\n\
    ## 向 Discord 注册一个新的机器人应用\n\n执行与上述相同的步骤；不过，明智的做法是给机器人起一个不同的名字。就我们而言，这第二个机器人将被命名为“内容审核机器人”。\n\
    \n## 指定机器人的常规信息\n\n我们决定为内容审核机器人使用不同的图标，因此在这里进行了指定（图 6-15）。\n\n![](img/625846_1_En_6_Fig15_HTML.jpg)\n\
    \nDiscord 应用程序设置界面，显示了一个名为“Mod Bot”的机器人。屏幕显示“常规信息”部分，展示了一个卡通人物应用图标、应用名称“Mod Bot”以及描述“此机器人将作为服务器管理员的助手。”。还有用于添加标签的字段，以及复制应用程序\
    \ ID 和公钥的按钮。左侧边栏包括“安装”、“OAuth2”和“机器人”等导航选项。\n\n**图 6-15** 为第二个机器人提供名称和图标\n\n##\
    \ 为机器人指定 OAuth2 参数\n\n第二个机器人需要更多权限才能执行更多任务。以下是我们想要的作用域：\n\n- 机器人\n  - 踢出成员\n \
    \ - 封禁成员\n  - 发送消息\n  - 管理消息\n  - 读取消息历史\n\n## 邀请你的机器人加入你的服务器\n\n重复与第一个机器人相同的步骤。\n"
- fmt: '### Getting the Discord ID Token for Your Bot and Setting the Gateway Intents


    Again, follow the steps above in order to get the Discord ID Token. Then scroll
    down the page to the section named, “Privileged Gateway Intents” and enable the
    options named, “SERVER MEMBERS INTENT” and “MESSAGE CONTENT INTENT.”


    ## Creating the Next Discord Bot, the Content Moderator


    The role of the content moderator is to make sure that unwanted content is not
    posted in the Discord server. Just like the previous bot that we created earlier
    in this chapter, this bot will not (yet) be artificially intelligent. In its current
    state, the bot will indiscriminately delete any message posted anywhere in the
    server that contains the word, “puppies.”


    It’s not because puppies are inherently evil. However, they do have a tendency
    to destroy your favorite pair of shoes when left alone. In all honesty, we simply
    need something to test our code in Discord when we run our bot.


    Listing [6-2](#625846_1_En_6_Chapter.xhtml#PC4) is the code for this simplified
    Content Moderator.


    ```

    // Require the necessary discord.js classes

    const { Client, Events, GatewayIntentBits } = require("discord.js");

    require("dotenv").config();

    // Create a new client instance

    const client = new Client({

    intents: [

    GatewayIntentBits.MessageContent,

    GatewayIntentBits.GuildMessages,

    GatewayIntentBits.Guilds,

    ],

    });

    const BANNED_WORD = "puppies";

    client.once(Events.ClientReady, (readyClient) => {

    console.log(`Ready! Logged in as ${readyClient.user.tag}`);

    });

    client.on(Events.MessageCreate, async (message) => {

    if (client.user.username === message.author.username) return;

    if (message.content.includes(BANNED_WORD)) {

    if (!(await message.delete())) {

    console.log("Failed to delete message");

    } else {

    const authorMention = `${mention(message.author)}`;

    const reply = `${authorMention} This comment was deemed inappropriate for this
    channel.\nIf you believe this to be in error, please contact one of the human
    server moderators.`;

    await message.channel.send(reply);

    }

    }

    });

    function mention(author) {

    return ``;

    }

    client.login(process.env.DISCORD_BOT_API_TOKEN);

    Listing 6-2

    Our Simplified Content Moderator Bot

    ```


    ### Handling Messages Sent to the Discord Server


    Again, let’s focus our attention on the `client.on()` event listener function,
    since it’s called asynchronously every time a message is posted to the Discord
    server. As you can see, if the message posted to the server contains the banned
    word, then we delete the message, and warn the sender with a `@mention` message
    in the same channel where the offending message was posted.


    ### Success Again! Running Your Second Discord Bot, the Content Moderator


    Now let’s run our second JavaScript Discord bot. After executing the app, be sure
    to return back to your Discord server and type a message in any channel that contains
    the offending word. Figure [6-16](#625846_1_En_6_Chapter.xhtml#Fig16) shows the
    bot in action.


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig16_HTML.jpg)


    A Discord server interface titled "Crooks'' Bank" is displayed. The main section
    shows a checklist for setting up a new server, including tasks like inviting friends,
    personalizing the server, sending a message, downloading the Discord app, and
    adding an app. Most tasks are marked complete with green checkmarks. A message
    from "Mod Bot" warns "PythonChatGPT" about an inappropriate comment, suggesting
    contacting a moderator if it''s an error. The left sidebar lists text and voice
    channels, and the right sidebar shows online and offline users, including "Mod
    Bot" and "Q and A Bot."


    Figure 6-16


    This Bot Has a Strict Rule About Discussing “Puppies”; However, Discussing “Kittens”
    Is Perfectly Fine


    ## Conclusion


    We just went through all the steps necessary to create two functioning Discord
    bots in JavaScript. For those who are unfamiliar with the process of creating
    a Discord server, we showed the process on how to set up a server to manage our
    community.


    As you can see, we took a much different approach compared to our Slack bot that
    we did in Chapter [4](#625846_1_En_4_Chapter.xhtml)! The Slack bot that we created
    was pretty much focused on user productivity within the workplace. The two Discord
    bots, on the other hand, are truly focused on community management. We have everything
    in place for these bots to be artificially intelligent with the help of OpenAI’s
    APIs. This is all accomplished in the final two chapters.


    ## Exercises Left for the Reader


    In the next chapters, we’re going to make our “dumb” bots to be intelligent, but
    there’s at least one thing we can do right now. Rather than using the command
    line to report status messages, it’s better for the bots to have their own channel
    that’s exclusively used for status reports. This way, when the bot starts up,
    shuts down, or has anything important to inform the administrators, it’s all logged
    and recorded in a central location.


    # 7. Adding Intelligence to Our Discord Bots, Part 1: Improving Our Q&A Bot


    At this point, we have all the structure in place to make both our Discord bots
    that we created in the previous chapter to be fully functional and artificially
    intelligent. In these final two chapters of this book, we’re going to follow all
    the steps necessary in order to make both bots to be artificially intelligent.
    In this chapter, we’ll get started with our Tech Support Bot. Below are the two
    major changes that we’re going to make:


    - Improve our script that calls the OpenAI APIs and make a class that can be instantiated
    by the Discord bot. This way, the Discord bot class can ask questions about specific
    information that we provide to it. This class will be used for Q&A purposes in
    this chapter but will be used in the final chapter of the book as well.


    - Modify our Tech Support Discord bot so that it can load an external text file
    that contains frequently asked questions with the answers. This script will then
    provide the contents of the text file to the `ChatGPTClient` class who is responsible
    for creating the prompt and of course invoking ChatGPT.'
