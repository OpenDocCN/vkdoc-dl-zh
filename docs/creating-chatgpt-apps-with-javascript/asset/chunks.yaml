  trans: "\n# 为机器人指定 OAuth2 参数\n\n现在需要为我们的机器人指定作用域和权限。如果你按照第 4 章中创建 Slack 机器人的步骤操作过，那么（如前所述）这个过程会让你感到熟悉。机器人不能也不应该具备执行任何操作的能力——它们只应被允许执行其设计时预设的一系列操作。\n\
    \n在左侧的设置导航菜单中，导航至“**OAuth2 ➤ URL 生成器**”以继续。\n\n以下是我们需要的作用域：\n\n* 作用域\n  * 机器人\n\
    \n如图 6-9 所示。\n\n![](img/625846_1_En_6_Fig9_HTML.jpg)\n\n该图片展示了一个名为“技术支持机器人”的 Discord\
    \ 应用设置界面。左侧边栏中高亮显示了“安装”部分。主面板显示“授权方法”，包含“用户安装”和“服务器安装”选项。下方是“安装链接”部分，包含一个 Discord\
    \ 提供的 URL 和“复制”按钮。“默认安装设置”部分概述了作用域和权限，包括 `applications.commands` 和 `bot`，以及读取消息历史和发送消息的权限。\n\
    \n**图 6-9** – 选择作用域\n\n选择机器人的作用域后，我们会看到所有仅适用于机器人的权限，按字母顺序排列。\n\n根据你赋予的权限，机器人可以变得相当强大。有些权限允许机器人像普通人类管理员一样行事，例如管理服务器、角色和频道。拥有这些权限的机器人还可以踢出和封禁成员。\n\
    \n我们现在要为机器人启用的权限，是允许机器人在文本频道中发送和接收消息的权限。这正是我们所需要的。虽然目前我们不会处理音频相关功能，但我们可以启用语音权限，让机器人能够参与语音频道。很简单，对吧？\n\
    \n为机器人选择以下权限：\n\n* 机器人权限\n  * 读取消息历史\n  * 读取消息/查看频道\n  * 发送消息\n\n虽然你还没有编写任何 JavaScript\
    \ 代码，但现在是将机器人邀请到你的服务器的时候了。\n\n## 将机器人邀请到你的服务器\n\n如图 6-9 所示，选择适当的权限后，Discord 会为你生成一个动态\
    \ URL，用于将机器人邀请到你的服务器。\n\n复制该 URL 并粘贴到你已登录 Discord 的网页浏览器中。结果如图 6-10 所示。\n\n![](img/625846_1_En_6_Fig10_HTML.jpg)\n\
    \nDiscord 外部应用“问答机器人”的授权界面。该机器人请求访问以“javachatgpt_67416”身份登录的 Discord 账户。权限包括将机器人添加到服务器和创建命令，但不包括购买海鲜晚餐。选择的服务器是“Crooks\
    \ Bank”，需要管理服务器权限。提供取消或继续选项。\n\n**图 6-10** – 如果你仔细阅读此屏幕，会发现 Discord 颇具幽默感\n\n\
    点击“**继续**”按钮，将机器人添加到你的服务器。\n\n接下来，你会看到一个与上一页面非常相似的页面，但主要区别在于它会汇总机器人的所有权限和能力。通常，如果你要将机器人添加到一个**不是你创建**的服务器，这个功能会非常有用。不过，既然这个机器人是我们自己创建的，这仅仅是对我们之前已指定设置的确认（图\
    \ 6-11）。\n\n![](img/625846_1_En_6_Fig11_HTML.jpg)\n\nDiscord 外部应用“问答机器人”的授权界面。该机器人请求访问一个\
    \ Discord 账户，权限包括在“Crooks Bank”上发送消息和读取消息历史。用户以“javachatgpt_67416”身份登录。屏幕包含返回或授权请求的选项。该应用自\
    \ 2023 年 10 月 27 日起处于活跃状态，未在任何服务器中使用。\n\n**图 6-11** – 确认机器人的能力\n\n点击“**授权**”按钮，授予机器人在你的服务器上运行的权限。\n\
    \n如果一切顺利，你应该会在服务器的“常规”频道中看到一条自动消息，表明该过程已成功完成。\n\n## 获取机器人的 Discord ID 令牌并设置网关意图\n\
    \n现在需要获取机器人的 Discord ID 令牌，你将在代码中使用它来以编程方式验证你的机器人。\n\n> **注意**  \n> 出于显而易见的原因，在这里使用“令牌”一词让我有些紧张，因为根据上下文，这个词在本书中有两种不同的含义，但这里快速回顾一下其含义：\n\
    > * 使用 Discord 和 Slack API 时，“令牌”指的是身份验证令牌。\n> * 使用 OpenAI API 时，“令牌”指的是单词的一部分。\n\
    \n返回 Discord 开发者网站，点击设置导航菜单中的“**机器人**”类别以继续。\n\n虽然你还没有看到你的令牌，但你需要点击“重置令牌”按钮，如图\
    \ 6-12 所示。\n\n请务必将 ID 令牌复制并保存到安全的地方。你将在本章后面介绍的 JavaScript 代码中用到此令牌。\n\n![](img/625846_1_En_6_Fig12_HTML.jpg)\n\
    \nDiscord 机器人设置界面，显示“机器人”部分。屏幕包括为机器人添加图标和横幅的选项，已选择一个图标。机器人的用户名为“问答机器人”，带有唯一标识符。出于安全目的，有一个“重置令牌”按钮。侧边栏菜单包括常规信息、安装、OAuth2\
    \ 等部分。\n\n**图 6-12** – 点击“重置令牌”按钮查看你的 ID 令牌\n\n向下滚动页面至名为“**特权网关意图**”的部分，并启用名为“**消息内容意图**”的选项。\n\
    \n> **注意**  \n> 让我们放慢节奏，讨论一下意图。究竟什么是“意图”，为什么需要它？就 Discord API 而言，你需要明确指定你希望 Discord\
    \ 以编程方式通知你的每一种信息类型。否则，Discord 会不断向你发送与你或你的机器人无关的事件。例如，就我们的目的而言，我们不关心人们何时加入或离开服务器。但是，如果你想向首次加入服务器的任何人发送服务器规则列表，那么你肯定需要启用“**服务器成员意图**”。当我们深入代码时，你会看到更多关于意图的信息。\n\
    \n请务必点击绿色按钮“**保存更改**”以保存你的更改。结果如图 6-13 所示。\n\n![](img/625846_1_En_6_Fig13_HTML.jpg)\n\
    \n该图片显示了一个名为“技术支持机器人”的机器人应用设置界面。左侧边栏包括常规信息、安装、OAuth2 和机器人等选项，其中机器人部分高亮显示。主面板显示授权流程和特权网关意图的设置。选项包括公共机器人、OAuth2\
    \ 代码授权、在线状态意图、服务器成员意图和消息内容意图的开关。底部有一条通知警告：“注意——您有未保存的更改！”并带有重置和保存更改按钮。\n\n**图\
    \ 6-13** – 启用名为“消息内容意图”的选项\n"
- fmt: "# Creating a Q&A Bot App in JavaScript to Answer Questions from a Channel\n\
    \nOf course, now that we’ve done all the prerequisites necessary and we know the\
    \ name of the channel that we want to monitor for questions from our users, let’s\
    \ get to the code in JavaScript that joins our server and accesses all the messages\
    \ from a specific Discord channel.\n\nThis is the first of two Discord bots that\
    \ we’re creating in this chapter. This bot will be responsible for watching the\
    \ messages in the `q-and-a` channel in our Discord server.\n\nLater on in this\
    \ chapter, we’ll create another bot that will be responsible for moderating ALL\
    \ CONTENT in the Discord server for unwanted content, including the `q-and-a`\
    \ channel. The goal here is follow the architectural pattern of “separation of\
    \ concerns.” Rather than creating a gigantic JavaScript Discord bot that performs\
    \ all the moderation needs for the Discord server, we’re going to separate the\
    \ functionality into two different apps.\n\nWe’re also going to take things step\
    \ by step and focus this chapter on getting past the learning curve for the Discord\
    \ capabilities in JavaScript. In the final chapters of this book, we’ll enhance\
    \ both bots and make them artificially intelligent using the Open AI APIs.\n\n\
    Listing [6-1](#625846_1_En_6_Chapter.xhtml#PC1) is the code that we need to create\
    \ a basic Discord bot that watches all the messages posted in a single channel\
    \ and provides an answer.\n\n```\n// Require the necessary discord.js classes\n\
    const { Client, Events, GatewayIntentBits } = require(\"discord.js\");\nrequire(\"\
    dotenv\").config();\n// Configuration variables\nconst CHANNEL_NAME = \"q-and-a\"\
    ;\nconst CUSTOM_STATUS = \"Ready to answer your questions\";\n// Create a new\
    \ client instance\nconst client = new Client({\nintents: [\nGatewayIntentBits.MessageContent,\n\
    GatewayIntentBits.GuildMessages,\nGatewayIntentBits.Guilds,\n],\n});\nclient.once(Events.ClientReady,\
    \ (readyClient) => {\nconsole.log(`Ready! Logged in as ${readyClient.user.tag}`);\n\
    // Set the custom status\nclient.user.setActivity(CUSTOM_STATUS);\n});\nclient.on(Events.MessageCreate,\
    \ async (message) => {\nif (client.user.username === message.author.username)\
    \ return;\nif (message.channel.name !== CHANNEL_NAME) return;\nconsole.log(\"\
    User is:\", message.author.globalName || message.author.username);\nconsole.log(\"\
    Message is:\", message.content);\nconst reply = `${mention(message.author)}, I\
    \ can help you with that!`;\nawait message.channel.send(reply);\n});\nfunction\
    \ mention(author) {\nreturn ``;\n}\n// Log in to Discord with your client's token\n\
    client.login(process.env.DISCORD_BOT_API_TOKEN);\nListing 6-1\nOur Simplified\
    \ Tech Support Bot\n```\n\nNow let’s delve into the code in Listing [6-1](#625846_1_En_6_Chapter.xhtml#PC1)\
    \ to understand how our simplified tech support bot works. This bot is designed\
    \ to monitor messages in the `q-and-a` channel of your Discord server and provide\
    \ responses to the users’ questions.\n\n**Note:** For some reason, Discord’s own\
    \ terminology sometimes refers to Discord servers as “guilds.” However, from our\
    \ perspective, a guild is simply a Discord server.\n\n## Creating the Discord\
    \ Client\n\nIt’s pretty easy to create a Discord client using a few lines of code:\n\
    \n```\n// Create a new client instance\nconst client = new Client({\nintents:\
    \ [\nGatewayIntentBits.MessageContent,\nGatewayIntentBits.GuildMessages,\nGatewayIntentBits.Guilds,\n\
    ],\n});\n```\n\nHere, we instantiate a new Discord client and provide an `intents`\
    \ array to tell Discord which events we want our bot to receive, namely:\n\n-\
    \ `MessageContent`: Allows the bot to read the content of messages\n- `GuildMessages`:\
    \ Enables the bot to receive messages from the Discord server\n- `Guilds`: Allows\
    \ the bot to receive updates about Discord server it’s a part of\n\n## Listening\
    \ for New Messages in Our Preferred Discord Channel\n\nObviously, the most important\
    \ function here in our bot is the `client.on()` event listener, which we use to\
    \ monitor every new message posted in the Discord server.\n\n```\nclient.on(Events.MessageCreate,\
    \ async (message) => {\nif (client.user.username === message.author.username)\
    \ return;\nif (message.channel.name !== CHANNEL_NAME) return;\nconsole.log(\"\
    User is:\", message.author.globalName || message.author.username);\nconsole.log(\"\
    Message is:\", message.content);\nconst reply = `${mention(message.author)}, I\
    \ can help you with that!`;\nawait message.channel.send(reply);\n});\n```\n\n\
    If a message comes from the `q-and-a` channel, our bot will send a friendly (albeit,\
    \ non-helpful at the moment) response to the sender. As a nice little touch, the\
    \ author is tagged in the reply so they can be notified when the response is posted.\n\
    \n## Success! Running Your First Discord Bot\n\nNow let’s run our JavaScript Discord\
    \ bot. After executing the script, be sure to return back to your Discord server\
    \ and try to type a question in the channel that you setup for Q&A. Figure [6-14](#625846_1_En_6_Chapter.xhtml#Fig14)\
    \ shows the response to the question, “Is this bot going to answer my questions\
    \ about the app?”\n\n![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig14_HTML.jpg)\n\
    \nA Discord interface showing the `q-and-a` text channel in a server named “Crook’s\
    \ Bank.” The main section welcomes users with the message “Welcome to #q-and-a!\
    \ This is the start of the #q-and-a channel.” Below, a conversation is visible\
    \ where “PythonChatGPT” asks if a bot can answer questions about the app, and\
    \ “Q and A Bot” responds affirmatively. The sidebar lists text channels `general`\
    \ and `q-and-a`, and voice channel `General`. Two users, “PythonChatGPT” and “Q\
    \ and A Bot,” are online.\n\n**Figure 6-14** Success running the Q&A Bot in Discord\n\
    \nAs you carefully inspect Figure [6-14](#625846_1_En_6_Chapter.xhtml#Fig14),\
    \ you’ll see some key features such as:\n\n- On the right side, you’ll see that\
    \ the bot is online with a green status indicator.\n- The bot also has a custom\
    \ status to let you know what it will do in the channel.\n- After asking a question\
    \ in the channel, the bot will tag you directly.\n\n# Streamlining the Process\
    \ of Registering Our Next Discord Bot App\n\nNow that we have successfully performed\
    \ all the steps in order to get a functioning Discord bot, creating the second\
    \ bot will be a piece of cake! So, let’s briefly reiterate all the steps from\
    \ above in order to create our second Discord bot. We’ll be sure to point out\
    \ the items that need to be changed or enhanced due to the fact that this second\
    \ bot will work as a moderator, instead of providing answers to questions from\
    \ the users of our Discord server.\n\n## Registering a New Discord Bot App with\
    \ Discord\n\nPerform the same steps as above; however, it would be wise to give\
    \ the bot a different name. For our purposes, this second bot will be named, “Content\
    \ Mod Bot.”\n\n## Specifying General Info for the Bot\n\nWe decided to have a\
    \ different icon for the Content Moderator bot, so we specified it here (Figure\
    \ [6-15](#625846_1_En_6_Chapter.xhtml#Fig15)).\n\n![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig15_HTML.jpg)\n\
    \nDiscord application settings interface for a bot named “Mod Bot.” The screen\
    \ displays the “General Information” section, showing an app icon of a cartoon\
    \ character, the app name “Mod Bot,” and a description stating, “This bot will\
    \ act as an assistant to the server’s mods.” There are fields for adding tags,\
    \ and buttons to copy the application ID and public key. The left sidebar includes\
    \ navigation options like “Installation,” “OAuth2,” and “Bot.”\n\n**Figure 6-15**\
    \ Providing a Name and Icon for the Second Bot\n\n## Specifying OAuth2 Parameters\
    \ for the Bot\n\nThis second bot needs more permissions in order to perform more\
    \ tasks. Below are the scopes that we want:\n\n- Bot\n  - Kick Members\n  - Ban\
    \ Members\n  - Send Messages\n  - Manage Messages\n  - Read Message History\n\n\
    ## Invite Your Bot to Your Server\n\nRepeat the same steps as above for the first\
    \ bot."
