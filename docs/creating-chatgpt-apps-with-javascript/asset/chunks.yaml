- fmt: '# Making Our Tech Support Bot More Intelligent


    Listing [7-1](#625846_1_En_7_Chapter.xhtml#PC1) contains the full contents of
    the frequently asked questions that the fictional customer support team has created
    based upon support tickets from users of the newly launched mobile banking application.


    ```

    1. What is the Crooks Bank Mobile App?

    The Crooks Bank Mobile App is a cutting-edge mobile banking app that allows you
    to manage your finances, make transactions, and access a wide range of banking
    services conveniently from your mobile device.

    2. How can I download the Crooks Bank Mobile App?

    You can download the Crooks Bank Mobile App from the App Store for iOS devices
    and Google Play for Android devices. Simply search for the "Crooks Bank Mobile
    App" and click the "Install" button.

    3. Is the Crooks Bank Mobile App safe and secure?

    Yes, the Crooks Bank Mobile App prioritizes your security. We use state-of-the-art
    encryption and security protocols to protect your data and transactions. Your
    information is safe with us.

    4. What features does the Crooks Bank Mobile App offer?

    The Crooks Bank Mobile App provides a variety of features, including:

    •  Account Management: View account balances, transaction history, and more.

    •  Transfer Funds: Easily transfer money between your accounts or to other bank
    accounts.

    •  Bill Payments: Pay bills and manage recurring payments.

    •  Deposit Checks: Snap photos of checks for remote deposit.

    •  ATM Locator: Find nearby ATMs and branches.

    •  Notifications: Receive alerts for account activity and important updates.

    5. Can I link external accounts to the Crooks Bank Mobile App?

    Yes, the Crooks Bank Mobile App supports linking external accounts from other
    financial institutions. You can monitor and manage your accounts from different
    banks in one place.

    6. How can I reset my password if I forget it?

    If you forget your password, simply click the "Forgot Password" option on the
    login screen. You''ll receive instructions on how to reset your password.

    7. What are the fees associated with the Crooks Bank Mobile App?

    The Crooks Bank Mobile App aims to be transparent with its fees. You can find
    information on account fees, transaction charges, and other costs in the "Fees"
    section within the app or on our website.

    8. Can I get customer support through the Crooks Bank Mobile App?

    Absolutely! We offer customer support through our in-app messaging feature. You
    can also find our customer service contact information on our website.

    9. Is the Crooks Bank Mobile App available for business accounts?

    The Crooks Bank Mobile App primarily caters to personal banking needs. However,
    we have plans to introduce business banking services in the future.

    10. How can I provide feedback or suggestions for the Crooks Bank Mobile App?

    We welcome your feedback! You can submit suggestions and feedback through the
    "Contact Us" section in the app or on our website.

    Listing 7-1

    FAQ.txt

    ```


    As you can see in the Frequently Asked Questions text file in Listing [7–1](#625846_1_En_7_Chapter.xhtml#PC1),
    there’s no magic involved here. It’s simply a list of questions and the answers.
    Now, let’s see the modified Tech Support Discord bot. This is represented in Listing
    [7-2](#625846_1_En_7_Chapter.xhtml#PC2).


    ```

    // Require the necessary discord.js classes

    const { Client, Events, GatewayIntentBits } = require("discord.js");

    const { ChatGPTClient } = require("./chatGPTClient");

    const fs = require("node:fs");

    require("dotenv").config();

    const systemMessage =

    "You are a virtual assistant that provides support for the Crooks Bank banking
    app.";

    const faqContents = fs.readFileSync("./FAQ.txt", "utf8");

    const chatGPTClient = new ChatGPTClient(systemMessage, faqContents);

    // Configuration variables

    const CHANNEL_NAME = "q-and-a";

    const CUSTOM_STATUS = "Ready to answer your questions";

    // Create a new Discord client instance

    const discordClient = new Client({

    intents: [

    GatewayIntentBits.MessageContent,

    GatewayIntentBits.GuildMessages,

    GatewayIntentBits.Guilds,

    ],

    });

    discordClient.once(Events.ClientReady, (readyClient) => {

    console.log(`Ready! Logged in as ${readyClient.user.tag}`);

    // Set the custom status

    discordClient.user.setActivity(CUSTOM_STATUS);

    });

    discordClient.on(Events.MessageCreate, async (message) => {

    if (discordClient.user.username === message.author.username) return;

    if (message.channel.name != CHANNEL_NAME) return;

    console.log("User is:", message.author.globalName);

    console.log("Message is:", message.content);

    await message.channel.sendTyping();

    const chatGPTResponse = await chatGPTClient.sendMessageFromDiscord(

    message.content

    );

    const reply = `${mention(message.author)} ${chatGPTResponse}`;

    await message.channel.send(reply);

    });

    function mention(author) {

    return ``;

    }

    // Log in to Discord with your client''s token

    discordClient.login(process.env.DISCORD_BOT_API_TOKEN);

    Listing 7-2

    Our Smarter Tech Support Discord Bot

    ```


    ## Important Changes to Note from the Previous Version of the Tech Support Bot


    Let’s briefly analyze our updated Tech Support Bot and discuss the changes that
    were made. As you can see, we’re doing a few things at once.


    First of all, this script will function as a client to both Discord and ChatGPT,
    so having a single constant named `client` will be somewhat confusing. Therefore,
    the client that will be used for any AI operations with ChatGPT is a constant
    named `chatGPTClient`:


    ```

    const systemMessage =

    "You are a virtual assistant that provides support for the Crooks Bank banking
    app.";

    const faqContents = fs.readFileSync("./FAQ.txt", "utf8");

    const chatGPTClient = new ChatGPTClient(systemMessage, faqContents);

    ```


    Remember from the previous chapters in the book that you can dramatically set
    the tone of the conversation with ChatGPT by providing a specific message to the
    system itself in your prompt. Therefore, we made a constant to hold the system
    message. Additionally, we defined a constant that holds the contents of the frequently
    asked questions file. With the system message and the contents of the FAQ defined,
    we’re able to instantiate our `ChatGPTClient` class (more details about that later).


    The whole purpose of this bot is to send any message from a Discord user to ChatGPT
    and display the response. Therefore, let’s look at the changes made to `client.on()`,
    which has been renamed to `discordClient.on()`.


    ### Updates to the Newly Named Function, `discordClient.on()`


    The `discordClient.on()` function is asynchronously called every time a message
    is posted into the discord server. For obvious performance reasons, the code needed
    to instantiate the `chatGPTClient` class (which also includes the process of loading
    the contents from the `FAQ.txt` file) is not in this function. We already performed
    those steps earlier in this script seeing that they only need to be done once.


    When a message is received into the channel that we’re observing, be sure to notice
    the following lines of code:


    ```

    await message.channel.sendTyping();

    const chatGPTResponse = await chatGPTClient.sendMessageFromDiscord(

    message.content

    );

    const reply = `${mention(message.author)} ${chatGPTResponse}`;

    await message.channel.send(reply);

    });

    ```


    Here, we provide a nice user experience and show the user that the bot is “typing,”
    while the user’s question is actually being sent to ChatGPT. When the response
    comes back, we provide the reply back to the user.


    Now let’s take a look at our helper class that handles all of our ChatGPT capabilities:
    `chatGPTClient.js`.'
