- fmt: '### Creating a Project with Google Maps Platform API


    Most people already have a Gmail account, but on the off chance that you don’t,
    be sure to create one before proceeding.


    Google has a mountain of APIs for almost everything you can think of. However,
    since we’re trying to accomplish tasks that require geolocation data, we’re going
    to need to go directly to the APIs for Google Maps (as shown in Figure [2-7](#625846_1_En_2_Chapter.xhtml#Fig7))
    which is located at [`https://developers.google.com/maps/documentation`](https://developers.google.com/maps/documentation).


    ![](images/625846_1_En_2_Chapter/625846_1_En_2_Fig7_HTML.jpg)


    Google Maps Platform webpage featuring a headline that reads, "Build awesome apps
    with Google’s knowledge of the real world." Below, there are buttons labeled "Get
    started" and "Read the docs." The page promotes creating real-time experiences
    using Maps, Routes, and Places features. The lower section highlights top topics
    with images, including a colorful graphic, a cityscape, a map with a location
    pin, and a detailed map layout. The navigation bar includes links to Overview,
    Products, Pricing, Documentation, Blog, and Community.


    Figure 2-7


    The Google Maps Platform Homepage


    On the Google Maps Platform page, click **Getting Started** to set up your account
    for using the APIs. After following the steps Google presents you with, you’ll
    be taken to the page shown in Figure [2-7](#625846_1_En_2_Chapter.xhtml#Fig7),
    where you can see the different APIs available with the Google Maps Platform.
    But what’ll probably catch your attention first is the fact that you still have
    to **Finish Account Setup.**


    Finishing your account set up (see Figure [2-8](#625846_1_En_2_Chapter.xhtml#Fig8))
    will compose of entering credit card information so you can start the free trial
    that will allow you $200 worth of credit, which is more than enough for the purposes
    of our testing.


    ![](images/625846_1_En_2_Chapter/625846_1_En_2_Fig8_HTML.jpg)


    Google Maps Platform interface showcasing features for customizing location-based
    experiences. The main section highlights "Locator Plus" with a map pin icon, offering
    tools to drive customers to business locations. Options include displaying the
    ideal business location, simplifying address entry, and visualizing data on maps.
    A sidebar lists features like planning directions and exploring areas in 3D. The
    top banner encourages users to finish account setup.


    Figure 2-8


    Finishing Your Google Maps Platform Account SetUp


    After properly setting up your account, you’ll be greeted by a welcome page. On
    the left, you’ll find a menu icon you can click to reveal a list of services you
    have access to. You want to navigate to **Apps & Services**, and then click **Library**
    (as shown in Figures [2-9](#625846_1_En_2_Chapter.xhtml#Fig9) and [2-10](#625846_1_En_2_Chapter.xhtml#Fig10)).


    ![](images/625846_1_En_2_Chapter/625846_1_En_2_Fig10_HTML.jpg)


    Google Cloud API Library interface displaying a welcome message and a search bar
    for APIs and services. The page features sections for "Maps" and "Machine Learning"
    APIs. The "Maps" section includes options like Maps SDK for Android, Maps SDK
    for iOS, Maps JavaScript API, and Places API. The "Machine Learning" section lists
    APIs such as Dialogflow, Cloud Vision, Cloud Natural Language, and Cloud Speech-to-Text.
    Filters for visibility and category are on the left, with options for public and
    private APIs, and categories like Analytics and Big Data. A banner at the top
    offers a free trial with $300 credit.


    Figure 2-10


    The API Library Page


    ![](images/625846_1_En_2_Chapter/625846_1_En_2_Fig9_HTML.jpg)


    Google Cloud Platform dashboard interface showing a project titled "My Maps Project."
    The search bar contains the word "maps." A dropdown menu under "Pinned Products"
    lists options like APIs & Services, Billing, and IAM & Admin. Buttons for actions
    such as "Run a query in BigQuery" and "Create a storage bucket" are visible. The
    top banner offers a free trial with $300 credit.


    Figure 2-9


    Navigating to the APIs & Services Tab on the Google Maps Platform


    You’re going to want to click **Maps JavaScript API** and then **Enable** it,
    as shown in Figure [2-11](#625846_1_En_2_Chapter.xhtml#Fig11).


    ![](images/625846_1_En_2_Chapter/625846_1_En_2_Fig11_HTML.jpg)


    Google Cloud interface displaying the Maps JavaScript API product details. The
    page includes an "Enable" button, tabs for Overview, Documentation, Support, and
    Related Products. The Overview section describes adding maps to websites using
    Google Maps data. Additional details mention the product type as SaaS & APIs,
    last updated on 9/28/22, and categorized under Maps. The service name is `maps-backend.googleapis.com`.


    Figure 2-11


    Enabling the JavaScript API


    After enabling the JavaScript API, go back twice and open the menu again, and
    then click the **Google Maps Platform** to see the dashboard for Google Maps.


    From here, we’re going to be looking at another side menu that looks similar to
    the one from before, but here we’re going to click **Apps & Services** again to
    see a different page this time. From here, you can click **Routes** to enable
    it, as shown in Figure [2-12](#625846_1_En_2_Chapter.xhtml#Fig12).


    ![](images/625846_1_En_2_Chapter/625846_1_En_2_Fig12_HTML.jpg)


    Google Cloud interface displaying various map-related APIs under "Find the right
    map products." Options include Air Quality API, Pollen API, Solar API, Aerial
    View API, Map Tiles API, Maps Datasets API, Maps Elevation API, and Maps Embed
    API. Each API has a brief description and an "ENABLE" or "DISABLE" button. The
    sidebar suggests tutorials like "Maps Console Quick Tour" and "Restrict Your API
    Key."


    Figure 2-12


    Enabling the Routes API


    Once you’ve enabled the API we need, navigate to the **Keys & Credentials** tab
    and **Create a new API key** (Figure [2-13](#625846_1_En_2_Chapter.xhtml#Fig13)).


    ![](images/625846_1_En_2_Chapter/625846_1_En_2_Fig13_HTML.jpg)


    The image shows a Google Cloud Platform interface for managing API keys within
    the Google Maps Platform. A pop-up window displays a newly created API key with
    a warning that the key is unrestricted, advising users to restrict its use for
    security. The background includes navigation options like Overview, APIs, and
    Quotas. On the right, a sidebar titled "Recommended for you" lists tutorials such
    as "Maps Console Quick Tour" and "Restrict Your API Key."


    Figure 2-13


    The Keys and Credentials Page on the Google Maps Platform


    Now that we have our Google Maps API key, we can make use of ChatGPT to be our
    pair-programmer again. Our end goal is to have an app that tells us how far away
    is the destination and how long will it take to get there. By the way, here’s
    a fun fact – the Google Maps Routes API factors in real-time traffic congestion
    data on the roads when you ask for the estimated travel time, so this makes our
    application perfect for productivity!


    Now, in order to show the flexibility of ChatGPT as a pair-programmer, let’s take
    two different approaches to achieve the same goal.'
