  trans: '

    ### 使用 AccuWeather API 创建天气应用


    按照说明，我们首先需要在 AccuWeather 上注册一个账户。访问 [`https://developer.accuweather.com/`](https://developer.accuweather.com/)
    并点击 **注册** 链接进行注册（图 2-2）。


    ![](img/625846_1_En_2_Fig2_HTML.jpg)


    AccuWeather API 网页，展示了一位戴头盔的男子在城市环境中仰望天空。文字写着“打造前所未有的天气体验”。下方有一个红色按钮，写着“注册”。导航栏包含
    API 参考、常规信息、常见问题以及套餐与定价等链接。右上角有 Twitter、Facebook、LinkedIn 和 Instagram 的社交媒体图标。页面还突出显示了“最近添加的
    API”和“关于 AccuWeather API”部分。


    图 2-2


    AccuWeather 开发者主页


    登录后，导航到 **我的应用**（图 2-3）。


    ![](img/625846_1_En_2_Fig3_HTML.jpg)


    AccuWeather API 网页头部，包含导航菜单，选项有：API 参考、常规信息、我的应用、常见问题以及套餐与定价。背景是一张雪天卡车的模糊图片。


    图 2-3


    导航到 AccuWeather 开发者门户的“我的应用”选项卡


    进入 **我的应用** 选项卡后，你需要 **添加一个新应用**，以便获取一个 API 密钥，用于我们的应用程序（图 2-4）。


    ![](img/625846_1_En_2_Fig4_HTML.jpg)


    图片显示的是 AccuWeather API 网站的“我的应用”页面。它有一个导航栏，包含 API 参考、常规信息、我的应用、常见问题以及套餐与定价等选项。主体部分邀请用户探索他们的应用，提示语为“这些是你的应用！探索它们吧！”右侧有一个标有“添加新应用”的按钮。页脚包含公司、订阅服务以及应用与下载等类别下的链接，选项包括关于我们、AccuWeather
    Premium 和 AccuWeather Professional。顶部有社交媒体图标和联系方式。


    图 2-4


    使用 AccuWeather 创建新应用


    在设置过程中，你需要为应用命名，并回答一些简单的问题，例如 API 的使用地点以及你打算用 API 做什么。如图 2-5 所示，我们将 AccuWeather
    应用命名为“天气追踪器”。


    ![](img/625846_1_En_2_Fig5_HTML.jpg)


    一个标题为“添加应用”的表单界面，用于创建名为“天气追踪器”的新应用。表单包含选择产品的字段，选项有“核心天气有限试用”和“分钟预报有限试用”。API 使用位置设置为“其他”。该应用被归类为“生产力应用”和“天气应用”，使用“Python”编写。其用途为“企业对消费者”，并面向“全球”可用。


    图 2-5


    为我们的 AccuWeather 应用添加规格说明


    这里最重要的配置是，当系统要求你指定打算使用的产品时，**请务必启用核心天气有限试用**。


    你的应用可能需要一些时间才能获得批准，但通常这个过程非常快。完成后，你会在 **我的应用** 页面上看到你的新应用，其中包含你的 API 密钥！任务完成（图
    2-6）。


    ![](img/625846_1_En_2_Fig6_HTML.jpg)


    图片显示了一个标题为“我的应用”的网页，绿色横幅中有一条通知，显示“应用已创建！”。下方有一个列出应用的区域，其中有一个名为“天气追踪器”的新应用，标记为已批准。选项包括查看密钥、产品、详情、分析，以及编辑或删除应用。右侧有一个标有“+
    添加新应用”的按钮。“天气追踪器的密钥”部分显示了模糊的 API 密钥信息。


    图 2-6


    在 AccuWeather 开发者门户上查看你新创建的应用


    ### 通过提示工程优化我们的提示


    现在，一切准备就绪，当你运行代码时，应用程序会要求你输入城市名称。


    ```

    输入你的城市：

    ```


    一旦你输入一个有效的城市名称，你会发现一切运行顺畅，并且会得到类似如下的响应（显然，预报会根据你输入的城市以及运行当天的天气情况而变化）。


    ```

    纽约的天气：

    温度：23.3°C

    天气描述：多云

    清单 2-8

    使用 ChatGPT 作为我们的结对编程伙伴，我们在几分钟内构建了一个功能齐全的天气应用

    ```


    通过运行代码，我们得到了纽约市天气的一个不错的基本描述，但还有一些地方可以改进。


    AccuWeather 为各种天气状况提供了图标。目前，我们可以看到纽约的天气是多云，但我们也可以获得更长的描述，说明当天剩余时间的天气。此外，对于居住在美国的用户来说，用华氏度显示温度更合理。那么，让
    ChatGPT 帮我们进行这些修改吧。


    由于 ChatGPT 可以保留上下文，我们将在与清单 2-9 相同的聊天对话中向 ChatGPT 发出提示：


    ```

    谢谢。我想对这段代码做一些修改。

    •    不要使用摄氏度，而是获取华氏度的温度

    •    进行一次 API 调用，获取图标编号和图标 URL，以便在响应中打印

    •    进行一次 API 调用，获取响应中的天气描述

    清单 2-9

    提示 ChatGPT 修改代码，以从 AccuWeather API 获取更详细的响应

    ```


    这是我们从 ChatGPT 得到的回答（清单 2-10）。

