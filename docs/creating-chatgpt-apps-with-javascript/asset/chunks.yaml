    A black and white geometric logo featuring an interwoven, symmetrical design resembling
    a knot or flower with six loops.

    To use the Google Maps Platform''s Routes API in Node.js to get the travel time
    and distance between two points, you''ll need to make an HTTP request to the API
    endpoint. Below are the steps and an example code snippet to help you get started:

    1\. **Get an API Key**: Ensure you have an API key from the Google Cloud Console
    with access to the Google Maps Platform.

    2\. **Install Axios**: We''ll use the `axios` library to make HTTP requests. If
    you haven''t already installed it, you can do so by running:

    ```sh

    npm install axios

    ```

    3\. **Make the HTTP Request**: Create a Node.js script to make the HTTP request
    to the Routes API endpoint.

    Here''s an example script to achieve this:

    ```javascript

    const axios = require("axios");

    // Replace with your API key

    const apiKey = "YOUR_GOOGLE_MAPS_API_KEY";

    // Function to get travel time and distance between two points

    async function getTravelInfo(origin, destination) {

    const url = `https://maps.googleapis.com/maps/api/directions/json?origin=${encodeURIComponent(

    origin

    )}&destination=${encodeURIComponent(destination)}&key=${apiKey}`;

    try {

    const response = await axios.get(url);

    const data = response.data;

    if (data.status === "OK") {

    const route = data.routes[0];

    const leg = route.legs[0];

    const travelTime = leg.duration.text;

    const distance = leg.distance.text;

    console.log(`Travel time: ${travelTime}`);

    console.log(`Distance: ${distance}`);

    } else {

    console.error(`Error: ${data.status}`);

    }

    } catch (error) {

    console.error("Error making request", error);

    }

    }

    // Replace with your origin and destination

    const origin = "New York, NY";

    const destination = "Los Angeles, CA";

    // Call the function

    getTravelInfo(origin, destination);

    ```

    ### Explanation

    - **API Endpoint**: The URL for the Directions API endpoint is `https://maps.googleapis.com/maps/api/directions/json`.

    - **Parameters**:

    - `origin`: The starting point for the route.

    - `destination`: The endpoint for the route.

    - `key`: Your API key.

    - **Axios**: Used to make the HTTP GET request.

    - **Response Handling**: The response contains a `status` field and a `routes`
    array. The first route''s first leg contains the `duration` and `distance`.

    Replace `''YOUR_GOOGLE_MAPS_API_KEY''` with your actual API key, and update the
    `origin` and `destination` with the desired locations.

    ### Running the Script

    1\. Save the script to a file, e.g., `getTravelInfo.js`.

    2\. Run the script using Node.js:

    ```sh

    node getTravelInfo.js

    ```

    This will print the travel time and distance between the specified origin and
    destination to the console.

    Listing 2-17

    Getting a Response Back from ChatGPT to Avoid Reading Documentation

    ```


    If you run this code, you should get this very clean, very simple response:


    ```

    Distance: 2,789 mi, Duration: 1 day 17 hours

    ```


    ## Conclusion


    Let’s debunk a common myth and set the record straight: ChatGPT isn’t some mind-reading
    wizard! As an AI tool, it can’t replace the expertise of developers and architects.
    It can, however, complement the programming skills of developers and save you
    some time and effort when coding.


    As you can see, one of the biggest benefits of using ChatGPT as a pair-programmer
    is that it can translate your natural language requests into runnable code. However,
    let’s not forget the crucial role of human judgment whenever AI (not just ChatGPT)
    is put into practice. Ultimately, it’s up to humans to decide whether to use,
    tweak, or toss out the result altogether.


    # 3. Creating a Basic ChatGPT Client in JavaScript


    The purpose of this chapter is plain and simple. We’re going to build the most
    powerful ChatGPT client available using only a few lines of code in JavaScript.
    This client will do a lot more than what you’re able to do using the ChatGPT website
    and will provide you more options than what is available using the Chat Playground
    that we saw in Chapter [1](#625846_1_En_1_Chapter.xhtml).


    ## Creating Our ChatGPT Client Application in JavaScript


    Listing [3-1](#625846_1_En_3_Chapter.xhtml#PC1) is the code for our ChatGPT client
    in JavaScript. It’s a simple client that allows us to use JSON to create `system`
    and `user` messages. We can also specify the desired model and configuration parameters
    such as the number of tokens to use.


    ```

    import OpenAI from "openai";

    import "dotenv/config";

    // Create a new open ai client

    const openai = new OpenAI({

    apiKey: process.env["OPENAI_API_KEY"],

    });

    async function main() {

    const chatCompletion = await openai.chat.completions.create({

    messages: [

    {

    role: "system",

    content: "You are a JavaScript developer",

    },

    {

    role: "user",

    content: "Why is JavaScript use for web development?",

    },

    ],

    model: "gpt-4o",

    temperature: 0.85,

    top_p: 1,

    max_tokens: 1921,

    frequency_penalty: 0,

    presence_penalty: 0,

    });

    const result = chatCompletion.choices[0].message.content;

    console.log(result);

    }

    main();

    Listing 3-1

    The Javascript ChatGPT Client

    ```


    As you analyze the code in Listing [3-1](#625846_1_En_3_Chapter.xhtml#PC1), you’re
    going to see several things that are quite familiar from the Chat Playground such
    as the `model`, `messages`, `temperature`, and `tokens`.


    ## Resist the Urge to Put Your API Key in a Web Application!


    As you can see from the code in Listing [3-1](#625846_1_En_3_Chapter.xhtml#PC1),
    it only takes a few lines of code to make a fully functional ChatGPT client app
    in JavaScript. Later on in this chapter, we’ll invoke the script and see the results.


    Of course, we’re all aware that one of the major benefits of JavaScript is that
    it can run both on the server side and within the browser on the client side.
    So, does this mean that it’s a good idea to use this code in your React, Angular,
    or Vue projects to create an amazing experience for the visitors of your website?


    Oh my dear sweet summer child. No, no, no, absolutely not. Remember that any and
    all code within your web applications is 100% visible to the world. In order for
    this code to work in the web browser, you need to provide your OpenAI API key
    to the code that will run in the web browser. Any competent developer can use
    a plethora of tools available to view the source code of your web application
    and discover your OpenAI API key. This means that they can easily rack up a massive
    bill for you and potentially use your API key in ways that will violate the terms
    of service of OpenAI.


    Therefore, the best practice to make AI-enabled web applications is to make all
    your calls to the OpenAI APIs using Node.js on your server side. This way, there’s
    no possibility of your API key to be exposed.


    ## Using `OpenAI.chat.completions.create()` to Send Messages to ChatGPT


    The `OpenAI.chat.completions.create()` method is a method that’s basically a 1-to-1
    representation of what you can do in the Chat Playground; therefore, this method
    should feel like second nature to you.


    Table [3-1](#625846_1_En_3_Chapter.xhtml#Tab1) describes the format of the parameters
    necessary to call the `OpenAI.chat.completions.create()` method. Although the
    table is lengthy, after a quick glance, you should see that only a few fields
    are actually required in order to successfully invoke the method.


    The response to the method is called a `ChatCompletion`.


    ### Examining the Method Parameters


    OK, Table [3-1](#625846_1_En_3_Chapter.xhtml#Tab1) appears to be a little daunting!
    However as mentioned earlier, only the `model` and `messages` are required parameters.


