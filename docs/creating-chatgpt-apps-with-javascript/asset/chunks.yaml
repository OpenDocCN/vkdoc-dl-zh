  trans: '

    # 更新 ChatGPT 的系统消息，再试一次


    你想出解决方案了吗？解决此问题的一种方法是更新系统消息。请参考上方清单 7-2 中的以下代码行：


    ```

    const systemMessage =

    "You are a virtual assistant that provides support for the Crooks Bank banking
    app.";

    ```


    请记住，系统消息向 ChatGPT 指示了它在聊天对话中的角色。目前，它被设定为一个乐于助人的助手，因此它擅自猜测移动应用程序中存在某些功能。现在，让我们确保
    ChatGPT 不会提供任何假设。将系统消息更新为如下所示：


    ```

    const systemMessage = "You are a virtual assistant that provides support for the
    Crooks Bank banking app. You will be provided Information about the application,
    and users will ask you questions about the application. Your role is to answer
    questions explicitly from the training information. If you were not given an answer
    to a question, then provide an apologetic message to the user explaining that
    you do not know the answer.";

    ```


    就是这样。`FAQ.txt` 文件与之前完全相同，我们只需要更新系统消息，让 ChatGPT 知道它在对话中的角色。清单 7-5 展示了我们与 Discord
    机器人的新对话。


    ```

    Me: How are you today?

    Q and A Bot: As a virtual assistant, I don''t have feelings or emotions, but I''m
    here and ready to assist you. How may I help you with the Crooks Bank Mobile App
    today?

    Me: I have an old Blackberry phone, is the app supported on my device?

    Q and A Bot: I''m sorry, but from the information provided, the Crooks Bank Mobile
    App can only be downloaded from the App Store for iOS devices and Google Play
    for Android devices. BlackBerry devices are not mentioned, therefore I cannot
    confirm that it would be compatible.

    Me: So, if I use an iPhone, how do I setup the app?

    Q and A Bot: To set up the Crooks Bank Mobile App on your iPhone, you can download
    it from the App Store. Simply search for "Crooks Bank Mobile App" and click the
    "Install" button. After the installation is finished, open the app and follow
    the prompts to set up your account. If you already have an account, use your login
    information to access your account through the app.

    清单 7-5

    我们与智能问答 Discord 机器人的第二次且更成功的对话

    ```


    现在好多了！我们的技术支持机器人“遵循脚本”，不允许编造或假设任何内容。


    ## 结论


    在本章中，我们收获颇丰！我们拥有一个功能齐全的 Discord 机器人，任何人都可以无需 AI、NLP 或机器学习经验，仅通过一个简单的文本文件来训练它。我们了解到，一个“乐于助人的助手”有时可能会变得“过于乐于助人”，并假设不真实的事实。然而，我们也重申了系统消息的概念和价值，这是提示工程的重要组成部分。


    既然我们已经让问答 Discord 机器人变得智能，现在让我们看看如何让我们的内容审核机器人也变得智能！


    # 8. 为我们的 Discord 机器人增加智能，第 2 部分：改进我们的审核机器人


    在本章中，我们将采取必要的步骤，使我们的内容审核 Discord 机器人具备人工智能。以下是我们将要进行的更改类型。


    首先，我们将创建一个新脚本来调用其中一个**审核**模型。审核模型是一类特殊的模型，允许我们在任何文本内容符合以下任何类别时发出警报：


    - 仇恨

    - 仇恨/威胁

    - 骚扰

    - 骚扰/威胁

    - 自残

    - 自残/意图

    - 自残/指示

    - 色情

    - 色情/未成年人

    - 暴力

    - 暴力/血腥


    接下来，我们将重用上一章中的 `chatGPTClient.js` 脚本。在第 7 章中，它用于使用 `client.chat.completions.create()`
    方法调用聊天模型，以回答用户的问题。在本章中，它将再次用于调用聊天模型，但这次是为了审核目的。


    当然，我们将更新 `chatGPTClient.js` 脚本，使其能够调用审核模型。


    最后，我们将修改内容审核 Discord 机器人，使其能够调用 `chatGPTClient.js` 中的聊天模型和审核模型。如果任一模型指示在 Discord
    频道中输入的内容令人反感，则从该 Discord 频道中删除该消息。请记住，此机器人监视 Discord 服务器所有频道中的所有内容！


    **注意**


    现在，此时，您可能会问自己，如果审核模型已经知道如何标记任何有害内容，那么为什么我们还需要使用任何聊天模型呢？问得好。


    是的，审核模型将让我们了解有害内容，但它**不会**告知我们场景中任何其他类型的不需要的内容，例如当不道德的人试图引诱我们的用户陷入骗局时。请记住，这是一个银行应用程序的
    Discord 服务器，因此诈骗者肯定会喜欢针对此 Discord 服务器的所有成员，因为它是一个充满银行用户的中心位置！


    因此，在最后一章中，我们将在 `chatGPTClient.js` 中同时调用聊天模型和审核模型。


    ## 使用 `OpenAI.moderations.create()` 调用审核模型


    任何审核模型都允许开发者提交一个文本字符串，并随后了解它是否包含暴力、仇恨、威胁或任何形式的骚扰。


    表 8-1 描述了调用 `OpenAI.moderations.create()` 方法主体所需参数的格式。该方法使用起来非常简单，因为只需要一个参数即可正确调用服务。


    **表 8-1** 审核方法的请求主体


    | 字段 | 类型 | 是否必需 | 描述 |

    | --- | --- | --- | --- |

    | `input` | 字符串或数组 | 必需 | 需要分类的文本 |

    | `model` | 字符串 默认值：`"omni-moderation-latest"` | 可选 | 有多种内容审核模型可供使用，例如：`"omni-moderation-latest"`、`"text-moderation-stable"`、`"text-moderation-latest"`。默认情况下，此值设置为
    `"omni-moderation-latest"`。它会随着时间的推移自动升级，这确保您始终使用最准确的模型。如果您决定使用任何基于文本的审核模型，那么您只能提交文本进行评估。然而，全能审核模型能够评估文本和图像内容。因此，请选择最适合您用例的模型。
    |


    ### 创建审核（JSON）

