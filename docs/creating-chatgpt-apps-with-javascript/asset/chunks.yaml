    for server commerce. A dropdown menu allows sorting by "Date Created." A message
    indicates no current applications, with a prompt to click "New Application" to
    begin. A graphic with abstract shapes is shown, and a "New Application" button
    is highlighted in blue.


    Figure 6-6


    In Order to Create a Discord Bot, Go to the Discord Developer Website


    In both Discord and Slack terminology, a “bot” is an “app,” and bots are not allowed
    to run on Discord servers unless they have been registered with Discord first.


    Specify a name for the bot and click the “**Create**” button, as shown in Figure
    [6-7](#625846_1_En_6_Chapter.xhtml#Fig7).


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig7_HTML.jpg)


    A screenshot of the Discord Developer Portal showing the process of creating a
    new application. The "Create an Application" dialog box is open, with the name
    field filled in as "Q and A Bot." A checkbox is marked, indicating agreement to
    the Discord Developer Terms of Service and Developer Policy. The "Create" button
    is highlighted, ready to be clicked. The background shows the Applications section
    with options to sort by date created.


    Figure 6-7


    Creating/Registering a Bot for Discord


    ## Specifying General Info for the Bot


    Afterward, you will be taken to a page where you can specify general information
    about your bot, as shown in Figure [6-8](#625846_1_En_6_Chapter.xhtml#Fig8).


    Be sure to familiarize yourself with the navigation menu on the left side of the
    page. As you can see, we have several categories of settings to configure for
    our bot. By default, we have landed on the “**General Information**” page, where
    we specify basic info about our bot. If you have an icon ready for your bot, you
    can upload it here.


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig8_HTML.jpg)


    Discord Developer Portal interface showing the "General Information" section for
    a bot named "Q and A Bot." The app icon is a robot image. The description states
    the bot will monitor the "q-and-a" channel to answer questions. The interface
    includes fields for tags, application ID, public key, and server count, with options
    to copy the ID and key. The left sidebar lists settings like Installation, OAuth2,
    and Bot.


    Figure 6-8


    We Decided to Give Our Bot a Cute Little Robot Icon'
  trans: '

    # 首要任务：创建你自己的 Discord 服务器


    在制作 AI 版 Discord 机器人之前，我们显然需要先有一个 Discord 服务器供机器人使用。你可以使用 Discord 应用程序或访问 Discord
    网站（当然要先登录），然后开始添加/创建新服务器的流程。


    开始流程后，请选择标注为“**创建我的服务器**”的选项，如图 6-2 所示。


    ![](img/625846_1_En_6_Fig2_HTML.jpg)


    Discord 弹窗提示用户“创建你的第一个 Discord 服务器”。选项包括“创建我的服务器”、“游戏”、“学校社团”和“学习小组”。左侧是一幅彩色插画，描绘了一只小鸟在悬崖上举着旗帜。背景是蓝天白云和远处的船只。


    图 6-2


    创建你自己的 Discord 服务器


    接下来，系统会提示你指定服务器的更多信息。继续完成创建流程，直到系统提示你为服务器提供名称和图标，如图 6-3 所示。


    ![](img/625846_1_En_6_Fig3_HTML.jpg)


    Discord 界面显示“自定义你的服务器”弹窗。弹窗提示为服务器命名并设置图标，示例图标是一个卡通角色。输入的服务器名称为“Crooks Bank”。可以看到
    Discord 社区准则的链接。背景是一幅彩色插画，描绘了悬崖上的小鸟角色。底部有“返回”或“创建”服务器的选项。


    图 6-3


    为你的 Discord 服务器命名


    指定服务器名称，并可选择上传服务器图标（如果有的话）。


    ## 创建问答频道


    默认情况下，每个 Discord 服务器都有一个“通用”频道，但我们希望有一个专门用于问答的频道。根据你创建服务器的方式，系统会显示图 6-4 和图 6-5
    来指导你创建新频道。


    ![](img/625846_1_En_6_Fig5_HTML.jpg)


    深色界面上显示一个标题为“创建频道”的对话框。它显示了频道类型的选项，其中“文字”被选中，允许发送消息、GIF、表情符号、观点和双关语。频道名称设置为“q-and-a”。有一个复选框用于将其设为私密频道，表示只有选定的成员和角色可以查看。底部有“取消”和“创建频道”按钮。


    图 6-5


    使用 Discord 应用程序创建频道


    ![](img/625846_1_En_6_Fig4_HTML.jpg)


    聊天应用程序弹窗显示来自“Crooks Bank”的提示，要求开始对话。它询问群组喜欢的主题，主题字段中已输入“q-and-a”。有“跳过”或点击“完成”的选项。背景是一幅彩色插画，描绘了一个巫师般的角色在帐篷旁，天空明亮。


    图 6-4


    使用网页界面创建频道


    ## 向 Discord 注册新的机器人应用


    现在我们已经创建了带有适当频道的 Discord 服务器，是时候注册机器人本身了——或者更确切地说，在我们的案例中，是注册多个机器人。为了保持代码整洁且易于管理，我们实际上会为
    Discord 服务器设置多个机器人。第一个机器人将专门用于在“q-and-a”频道中回答问题。第二个机器人将监控所有频道，以检测有害内容或广告推销等不良信息。


    要创建机器人，请前往 Discord 开发者网站：


    [**https://discord.com/developers**](https://discord.com/developers)


    在页面右上角，点击“**新建应用**”按钮，如图 6-6 所示。


    ![](img/625846_1_En_6_Fig6_HTML.jpg)


    开发者门户界面显示“应用”部分。侧边栏包括应用、团队、嵌入调试器和文档等选项。主区域鼓励用户使用游戏 SDK 创建新应用以进行服务器商务。下拉菜单允许按“创建日期”排序。一条消息显示当前没有应用，并提示点击“新建应用”开始。显示了一个带有抽象形状的图形，蓝色高亮显示“新建应用”按钮。


    图 6-6


    要创建 Discord 机器人，请访问 Discord 开发者网站


    在 Discord 和 Slack 的术语中，“机器人”就是“应用”，并且机器人必须先向 Discord 注册，才能被允许在 Discord 服务器上运行。


    为机器人指定一个名称，然后点击“**创建**”按钮，如图 6-7 所示。


    ![](img/625846_1_En_6_Fig7_HTML.jpg)


    Discord 开发者门户截图显示了创建新应用的过程。“创建应用”对话框已打开，名称字段填写为“Q and A Bot”。一个复选框已勾选，表示同意 Discord
    开发者服务条款和开发者政策。“创建”按钮已高亮显示，准备点击。背景显示的是“应用”部分，带有按创建日期排序的选项。


    图 6-7


    为 Discord 创建/注册机器人


    ## 指定机器人的常规信息


    之后，你将进入一个页面，可以在其中指定机器人的常规信息，如图 6-8 所示。


    请务必熟悉页面左侧的导航菜单。如你所见，我们有多个设置类别需要为机器人配置。默认情况下，我们位于“**常规信息**”页面，在此指定机器人的基本信息。如果你已为机器人准备好图标，可以在此处上传。


    ![](img/625846_1_En_6_Fig8_HTML.jpg)


    Discord 开发者门户界面显示名为“Q and A Bot”的机器人的“常规信息”部分。应用图标是一个机器人图像。描述说明该机器人将监控“q-and-a”频道以回答问题。界面包括标签、应用
    ID、公钥和服务器数量等字段，并提供复制 ID 和密钥的选项。左侧边栏列出了安装、OAuth2 和机器人等设置。


    图 6-8


    我们决定给机器人一个可爱的小机器人图标

