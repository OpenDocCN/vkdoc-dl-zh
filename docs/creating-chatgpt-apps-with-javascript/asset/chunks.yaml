    Figure 1-5


    The System Message Field in the Chat Playground Allows You to Set the Role That
    ChatGPT Will Play in the Conversation


    ### 2\. User


    The **User** field (Figure [1-4](#625846_1_En_1_Chapter.xhtml#Fig4), item 2) in
    the Chat Playground is where you type your prompt to ChatGPT, which can be anything
    that you want, for example, “What are the most common packages used by developers?”


    ### 3\. Assistant (Optional)


    When you initially load the Chat Playground, the **Assistant** field (Figure [1-4](#625846_1_En_1_Chapter.xhtml#Fig4),
    item 3) is not visible. In order to make it appear, you need to do the following:


    *   Type in a User message.


    *   Click the “+” button to add the message to the conversation.


    *   Click the User button, to toggle the message type from “User” to “Assistant.”


    Now, you may be asking yourself, “Why is this field needed at all?” Well, that’s
    a fine question. If you want ChatGPT to remember something that it has already
    told you in a previous conversation, then you need to type into the **Assistant**
    field anything that it has already told you that you think is relevant in order
    to continue with the conversation. Remember, it is a vastly powerful AI, but it
    has amnesia!


    ### 4\. + (Optional)


    The “**+”** button (Figure [1-4](#625846_1_En_1_Chapter.xhtml#Fig4), item 4) is
    where you’d click in order to add either an **Assistant** message to the conversation
    or another **User** message. Now, you may ask, “What’s the point of adding yet
    another User message to the conversation, when I can type what I want in the original
    User field above?” Good question.


    If you wanted to separate your commands from your data, then you would use a separate
    **User** message for that.


    Do you remember in Listing [1-4](#625846_1_En_1_Chapter.xhtml#PC4) earlier in
    this chapter, where we had to use the “###” to separate the command to ChatGPT
    from the data that we wanted it to analyze? Well, this is now no longer needed
    because the command would be the first **User** message, and the data would be
    the second **User** message.


    ### 5\. Code (Optional)


    After you have submitted your prompt using the Playground, you can click the **Code**
    button (Figure [1-4](#625846_1_En_1_Chapter.xhtml#Fig4), item 5) in order to see
    the code necessary to send the same prompt using any of the languages that they
    support.


    ### 6\. Model (Optional)


    Earlier in this chapter, we talked about the various models that are available
    for developers. Click the model field in order to see a list of models that are
    available.


    You may also see that some models have a month and day associated with their name,
    which is simply a snapshot of that model. Programmatically selecting a snapshot
    enables developers to have some sort of predictability in the responses that they
    will receive from ChatGPT, because the current models are always updated.


    ### 7\. Temperature (Optional)


    As noted earlier in this chapter, the temperature selector ranges between 0 and
    2 and allows you to select the “randomness” of the response.'
