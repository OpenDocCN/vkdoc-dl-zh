    User: Write 3 paragraphs on pros and cons of telemedicine

    Listing 1-8

    PROMPT. The Pros and Cons of Telemedicine as an Opinionated Health Blogger

    ```


    ```

    System: You are a strictly factual researcher

    User: Write 3 paragraphs on pros and cons of telemedicine

    Listing 1-7

    PROMPT. The Pros and Cons of Telemedicine as a Researcher

    ```


    You are encouraged to try these two prompts yourself and see what the responses
    are. Adjust the settings for the temperature and token length to get familiar
    with how those parameters affect the outcome.


    ## Conclusion


    You just learned more about how ChatGPT can be used by developers. We covered
    some of the basics of the Chat Playground, which is a web interface for developers
    to interact with the ChatGPT API.


    We talked about how to set the system, user, and assistant roles in the Chat Playground
    and how to adjust settings such as the temperature and maximum length of output.


    You learned about some of the parameters and terminology necessary to use the
    Chat Playground, such as the model, the temperature, and tokens. Getting familiar
    with the parameters of the Chat Playground is essential to knowing how to use
    the REST API since the Playground is a subset of capabilities offered by the REST
    API.


    In the next chapter, we’ll see how to use ChatGPT as your “pair programmer” and
    create a productivity app that gives us weather and arrival time to work.


    # 2. Using ChatGPT As Your JavaScript Pair-Programmer


    I’m a big fan of some of the practices of XP (eXtreme Programming) and, especially,
    pair-programming. No matter what flavor of pair-programming that you prefer, it
    involves two engineers sitting down at the same screen and solving the same problem
    together. One of the biggest benefits that you get is a fresh set of eyes on a
    problem, and of course, you now have two engineers who have “touched” the codebase
    instead of one. Sometimes you can have one engineer write the code, and the other
    write the tests and the comments. No matter how you slice it, it’s all good stuff.


    ## Chapter Overview


    This chapter will walk you through obtaining and testing out your API key, get
    you comfortable making calls to the OpenAI JavaScript API for ChatGPT, and introduce
    you to how to get things done using other models as well. Furthermore, we’ll be
    using ChatGPT as a pair-programmer to create an application that will allow us
    to input the name of a city and the time you’d like to arrive to work, then give
    you the weather and an estimated arrival time based on current traffic conditions!
    Sound exciting? Then let’s jump right in.


    ## You Have Node.js Already Installed, Right?


    For obvious reasons, you can’t do much in this book without having Node.js installed
    on your computer. Therefore, in order to check the version of Node that you have,
    just open a terminal window and execute:


    ```

    node - v

    ```


    If the output of the command shows you a version number, then you’re all set!


    Now, after executing the command above, if you see an error message, then you
    need to install Node.js for your specific operating system. If that’s the case,
    then use ChatGPT or Google in order to get the instructions depending on your
    OS, and then open a new terminal window and execute the command above in order
    to see the version that you have.


    ## Installing (or Updating) the OpenAI Node.js Library with npm


    In order to use the OpenAI library with JavaScript, the minimum supported version
    of Node compatible is version 18, although the code examples were tested with
    version 20. Now that you have all the prerequisites, it’s time to install the
    OpenAI Node.js library itself. Go back to your terminal window, and execute the
    following command:


    ```

    npm install openai

    ```


    The command above will install the OpenAI library for you if it doesn’t already
    exist and will update the library to the most recent version it’s already there.


    ## Three Ways to Set Your API Key


    When setting up your API key for the OpenAI API, there are different methods to
    choose from, each designed for specific project needs and security concerns.


    ### Option #1: Setting a System-Wide Environment Variable


    The environment variable approach establishes a system-wide environment variable
    for API key storage. This provides a centralized point for key management, simplifying
    deployment across diverse projects.


    Let’s look at the steps on how we’d go about doing it.


    #### For Mac OS


    First off, open Terminal. You can find it in the applications folder or use spotlight
    (Command + Space) to search for it.


    Next, edit your bash profile. For older MacOS versions, you’d use the command
    `nano ~/.bash_profile`. Users of newer MacOS versions will need to use `nano ~/.zshrc`.
    This will open the profile file in a text editor.


    Now let’s add your environment variable. In the editor, add the line below, replacing
    “your-api-key-here” with your actual API key without the single quotation marks.


    ```

    export OPENAI_API_KEY=''your-api-key-here''

    ```


    Let’s save and exit by pressing `Ctrl+O` to write the changes, then pressing `Ctrl+X`
    to close the editor.


    Now you’re going to load your profile by using `source ~/.bash_profile` for older
    Mac OS versions and `source ~/.zshrc` for the newer Mac OS versions. This will
    load the updated profile.


    Finally, we’re going to verify that we’ve done everything correctly. In the terminal,
    type `echo $OPENAI_API_KEY`. If everything went well, you should see the value
    of your API key.


    ```

    echo $OPENAI_API_KEY

    ```


    #### For Windows


    Start by opening the command prompt. You can find it by searching “cmd” in the
    Start/Windows menu.


    Now we’re going to set the environment variable in the current session by using
    the command below, replacing “your-api-key-here” with your actual API key. This
    command sets the `OPENAI_API_KEY` for the current session.


    ```

    setx OPENAI_API_KEY ''your-api-key-here''

    ```


    You can make the setup permanent by adding the variable through system properties:


    *   Right-click “This PC” or “My Computer” and select “Properties.”

    *   Click “Advanced system settings.”

    *   Click the “Environment Variables” button.

    *   In the “System variables” section, click “New...” and enter `OPENAI_API_KEY`
    as the variable name and your API key as the variable value.


    To make sure everything is working properly, reopen the command prompt and type
    the command below to verify the setup. It should display your API key.


    ```

    echo %OPENAI_API_KEY%

    ```'
