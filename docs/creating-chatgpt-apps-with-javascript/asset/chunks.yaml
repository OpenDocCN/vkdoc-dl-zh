    console.log(`就绪！已登录为 ${readyClient.user.tag}`);

    // 设置自定义状态

    discordClient.user.setActivity(CUSTOM_STATUS);

    });

    discordClient.on(Events.MessageCreate, async (message) => {

    if (discordClient.user.username === message.author.username) return;

    if (message.channel.name != CHANNEL_NAME) return;

    console.log("用户是:", message.author.globalName);

    console.log("消息是:", message.content);

    await message.channel.sendTyping();

    const chatGPTResponse = await chatGPTClient.sendMessageFromDiscord(

    message.content

    );

    const reply = `${mention(message.author)} ${chatGPTResponse}`;

    await message.channel.send(reply);

    });

    function mention(author) {

    return ``;

    }

    // 使用您的客户端令牌登录 Discord

    discordClient.login(process.env.DISCORD_BOT_API_TOKEN);

    清单 7-2

    我们更智能的技术支持 Discord 机器人

    ```


    ## 与之前版本技术支持机器人相比的重要变化


    让我们简要分析一下我们更新后的技术支持机器人，并讨论所做的更改。如您所见，我们同时在做几件事。


    首先，这个脚本将同时作为 Discord 和 ChatGPT 的客户端，因此使用一个名为`client`的单一常量会有些令人困惑。因此，用于与 ChatGPT
    进行任何 AI 操作的客户端被命名为`chatGPTClient`：


    ```

    const systemMessage =

    "你是一个为克鲁克斯银行应用提供支持的虚拟助手。";

    const faqContents = fs.readFileSync("./FAQ.txt", "utf8");

    const chatGPTClient = new ChatGPTClient(systemMessage, faqContents);

    ```


    请记住本书前几章的内容，您可以通过在提示中向系统本身提供特定消息来显著设定与 ChatGPT 对话的基调。因此，我们创建了一个常量来保存系统消息。此外，我们定义了一个保存常见问题解答文件内容的常量。定义了系统消息和
    FAQ 内容后，我们就能实例化我们的`ChatGPTClient`类（稍后会详细介绍）。


    这个机器人的全部目的是将 Discord 用户的任何消息发送给 ChatGPT 并显示响应。因此，让我们看看对`client.on()`所做的更改，它已被重命名为`discordClient.on()`。


    ### 对新命名函数 `discordClient.on()` 的更新


    每当有消息发布到 Discord 服务器时，`discordClient.on()`函数会被异步调用。出于明显的性能原因，实例化`chatGPTClient`类（包括从`FAQ.txt`文件加载内容的过程）的代码不在此函数中。我们已经在脚本的早期执行了这些步骤，因为它们只需要执行一次。


    当在我们监控的频道中收到消息时，请务必注意以下代码行：


    ```

    await message.channel.sendTyping();

    const chatGPTResponse = await chatGPTClient.sendMessageFromDiscord(

    message.content

    );

    const reply = `${mention(message.author)} ${chatGPTResponse}`;

    await message.channel.send(reply);

    });

    ```


    在这里，我们提供了良好的用户体验，向用户显示机器人正在“输入”，而用户的问题实际上正在被发送到 ChatGPT。当响应返回时，我们将回复发送给用户。


    现在让我们看看处理所有 ChatGPT 功能的辅助类：`chatGPTClient.js`。

    '
- fmt: "# Analyzing Our ChatGPT Client, `chatGPTClient.js`\n\nSo, we have our own\
    \ class called `chatGPTClient.js`, which is very similar to ones we’ve used before.\
    \ The complete source for `chatGPTClient.js` is shown in Listing [7-3](#625846_1_En_7_Chapter.xhtml#PC5).\n\
    \n```\nconst { OpenAI } = require(\"openai\");\nrequire(\"dotenv\").config();\n\
    class ChatGPTClient {\nconstructor(systemMessage, initialInstructionsToChatGPT)\
    \ {\nthis.systemMessage = systemMessage;\nthis.initialInstructionsToChatGPT =\
    \ initialInstructionsToChatGPT;\nthis.client = new OpenAI({\napiKey: process.env[\"\
    OPENAI_API_KEY\"],\n});\n}\nasync sendMessageFromDiscord(userMessage) {\nconst\
    \ chatCompletion = await this.client.chat.completions.create({\nmessages: [\n\
    {\nrole: \"system\",\ncontent: this.systemMessage,\n},\n{\nrole: \"user\",\ncontent:\
    \ this.initialInstructionsToChatGPT,\n},\n{\nrole: \"user\",\ncontent: userMessage,\n\
    },\n],\nmodel: \"gpt-4\",\ntemperature: 0.85,\ntop_p: 1,\nmax_tokens: 1921,\n\
    frequency_penalty: 0,\npresence_penalty: 0,\n});\nconst result = chatCompletion.choices[0].message.content;\n\
    return result;\n}\n}\nmodule.exports = { ChatGPTClient };\nListing 7-3\nchatGPTClient.js\n\
    ```\n\nOne of the most important things to note is that in the constructor, we\
    \ are sending the full String of the contents of the frequently asked questions\
    \ as well as the message that we’re going to be providing to the system itself.\n\
    \nThis way, after we have constructed the `ChatGPTClient` class, we can reuse\
    \ the object already constructed in order to ask the individual questions from\
    \ our users.\n\nEvery time a question has been posted on our Discord channel,\
    \ our bot will call `sendMessageFromDiscord()` from `chatGPTClient.js`. In this\
    \ method, we will perform all of the usual things necessary in order to invoke\
    \ ChatGPT programmatically.\n\n## Running Our Intelligent Q&A Bot\n\nNow let’s\
    \ run our new and improved Q&A Discord bot. After executing the app, be sure to\
    \ return back to your Discord server and start asking questions. Figure [7-1](#625846_1_En_7_Chapter.xhtml#Fig1)\
    \ shows the bot in action.\n\n![](images/625846_1_En_7_Chapter/625846_1_En_7_Fig1_HTML.jpg)\n\
    \nA screenshot of a Discord channel named \"q-and-a\" under Crooks' Bank server.\
    \ The main message is from \"Q and A Bot,\" welcoming users to the Crooks Bank\
    \ Mobile App support channel. It lists topics users can inquire about, including\
    \ app installation, features, troubleshooting, security measures, password reset\
    \ instructions, costs, linking external accounts, customer support, and feedback.\
    \ The left sidebar shows text channels and voice channels, with \"q-and-a\" highlighted.\
    \ The right sidebar displays online users, including \"PythonChatGPT\" and \"\
    Q and A Bot,\" and one offline user, \"Mod Bot.\"\n\nFigure 7-1\n\nHaving a Discussion\
    \ with Our Intelligent DISCORD Bot for Q&A\n\nListing [7-4](#625846_1_En_7_Chapter.xhtml#PC6)\
    \ shows the conversation between us and the Discord Bot.\n\n1.  ```\n    How to\
    \ install and use the app.\n    ```\n\n2.  ```\n    Features and services within\
    \ the app.\n    ```\n\n3.  ```\n    Troubleshooting any issues you might encounter.\n\
    \    ```\n\n4.  ```\n    Security measures to protect your data and transactions.\n\
    \    ```\n\n5.  ```\n    Instructions for resetting your password.\n    ```\n\n\
    6.  ```\n    Costs and fees associated with using the app.\n    ```\n\n7.  ```\n\
    \    How to link external bank accounts.\n    ```\n\n8.  ```\n    Customer support\
    \ availability.\n    ```\n\n9.  ```\n    Feedback and suggestions for improving\
    \ the app.\n    ```\n\n```\nMe: Hi, I'm new to this channel. What kind of questions\
    \ can I ask?\nQ and A Bot: Hello! Welcome to the Crooks Bank Mobile App support\
    \ channel. Here, you can ask any questions regarding our banking app. For example,\
    \ you can ask about:\nListing 7-4\nOur First Conversation with the Intelligent\
    \ Q&A Discord Bot\n```\n\n```\nFeel free to ask any other questions you might\
    \ have related to the Crooks Bank Mobile App. We're here to assist!\nMe: I have\
    \ an old Blackberry phone, is the app supported on my device?\nQ and A Bot: I'm\
    \ sorry for the inconvenience, but at the moment, the Crooks Bank Mobile App is\
    \ currently only available for iOS and Android devices. It is not supported on\
    \ Blackberry or any other operating systems. You may still manage your bank accounts\
    \ by accessing our website through your phone's browser.\nMe: I'm an iPhone user.\
    \ Can I sign into the app with face or touch ID?\nQ and A Bot: Sure, here's how\
    \ you can set up the Crooks Bank Mobile App on your iPhone:\n1\\. Open the App\
    \ Store on your iPhone.\n2\\. In the search bar at the top, type in \"Crooks Bank\
    \ Mobile App\" and tap \"Search\".\n3\\. Once you can see the app in the search\
    \ results, simply tap on the \"Get\" button to download it.\n4\\. After the app\
    \ downloads, tap \"Open\".\n5\\. You’ll have to agree to our Terms and Conditions\
    \ upon the first launch.\n6\\. If you're an existing Crooks Bank member, you can\
    \ log in using your online banking user ID and password. If you're a new member,\
    \ you'll need to register for an account.\n7\\. Once you're logged in, you can\
    \ set up Touch ID or Face ID for quicker, secure login in the future.\n8\\. Now\
    \ you can start using your Crooks Bank Mobile App to manage your finances, pay\
    \ bills, make transactions, and more!\nPlease make sure you update the app regularly\
    \ to access new features and improvements. If you have any challenges during setup,\
    \ please reach out to us through the app's support feature or call our customer\
    \ service.\n```\n\n## We Have a Monumental Achievement… with One Slight Flaw\n\
    \nOK, if you step back and examine what we have achieved so far, you should realize\
    \ that we’re looking at what is nothing short of a monumental achievement. We\
    \ have the following:\n\n*   A system made up of a few scripts that allows users\
    \ to type in questions and get answers about how to use our mobile application.\n\
    \n*   Using a simple text file, we can teach our bot how to answer the questions\
    \ from our users. This can be edited by anyone in the company and can be used\
    \ as a knowledge base to help improve the intelligence of the bot day by day.\
    \ This is amazing stuff.\n\n*   The system allows customers to type their questions\
    \ using natural language, and the bot provides an intelligent answer back to them.\
    \ Guess what? Customers don’t like reading FAQs – especially really long ones.\
    \ However, using this system, they don’t need to! All they have to do is ask the\
    \ question that is relevant to them.\n\nSo, with all this that we have accomplished,\
    \ there’s one GIGANTIC flaw that we can’t ignore. In Listing [7-4](#625846_1_En_7_Chapter.xhtml#PC6),\
    \ the bot said to the user:\n\n```\nOnce you're logged in, you can set up Touch\
    \ ID or Face ID for quicker, secure login in the future.\n```\n\nNo, no, no! Bad\
    \ bot! In case you didn’t read the frequently asked questions file completely,\
    \ please allow me to explain what went wrong here:\n\n1.  The `FAQ.txt` file in\
    \ Listing [7-1](#625846_1_En_7_Chapter.xhtml#PC1) clearly states that the Crooks\
    \ Bank mobile app is a mobile app. Currently, Touch ID can only be used on Apple\
    \ desktop and laptop computers. So this doesn’t even make sense.\n\n2.  The `FAQ.txt`\
    \ file has no mention of Face ID for authentication to the mobile app at all.\n\
    \nSo unfortunately, ChatGPT is making up things that are simply not true and is\
    \ assuming that certain features exist that are not present. So, for the purposes\
    \ of true tech support, this is absolutely unacceptable.\n\nSo, how do we solve\
    \ this? Think about how you could solve this problem for a second before reading\
    \ the next section."
