    destination\":{ \"location\":{ \"latLng\":{ \"latitude\": 37.417670, \"longitude\"\
    : -122.079595 } } }, \"travelMode\": \"DRIVE\", \"routingPreference\": \"TRAFFIC_AWARE\"\
    , \"departureTime\": \"2023-10-15T15:01:23.045123456Z\", \"computeAlternativeRoutes\"\
    : false, \"routeModifiers\": { \"avoidTolls\": false, \"avoidHighways\": false,\
    \ \"avoidFerries\": false }, \"languageCode\": \"en-US\", \"units\": \"IMPERIAL\"\
    \ }'\n-H 'Content-Type: application/json' -H 'X-Goog-Api-Key: YOUR_API_KEY'\n\
    -H 'X-Goog-FieldMask: routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline'\n\
    'https://routes.googleapis.com/directions/v2:computeRoutes\nListing 2-13\nPROMPT.\
    \ Asking ChatGPT to Convert cURL to JavaScript\n```\n\nThis is the code we got\
    \ in the response from ChatGPT (Listing [2-14](#625846_1_En_2_Chapter.xhtml#PC27)):\n\
    \n```\nA black and white geometric logo featuring an interwoven, symmetrical design\
    \ resembling a knot or flower with six loops.\nTo convert the provided cURL command\
    \ to JavaScript, you can use the `fetch` API. Here is how you can do it:\n```javascript\n\
    const apiKey = \"YOUR_API_KEY\"; // Replace with your actual API key\nconst url\
    \ = \"https://routes.googleapis.com/directions/v2:computeRoutes\";\nconst requestBody\
    \ = {\norigin: {\nlocation: {\nlatLng: {\nlatitude: 37.419734,\nlongitude: -122.0827784,\n\
    },\n},\n},\ndestination: {\nlocation: {\nlatLng: {\nlatitude: 37.41767,\nlongitude:\
    \ -122.079595,\n},\n},\n},\ntravelMode: \"DRIVE\",\nroutingPreference: \"TRAFFIC_AWARE\"\
    ,\ndepartureTime: \"2023-10-15T15:01:23.045123456Z\",\ncomputeAlternativeRoutes:\
    \ false,\nrouteModifiers: {\navoidTolls: false,\navoidHighways: false,\navoidFerries:\
    \ false,\n},\nlanguageCode: \"en-US\",\nunits: \"IMPERIAL\",\n};\nconst requestOptions\
    \ = {\nmethod: \"POST\",\nheaders: {\n\"Content-Type\": \"application/json\",\n\
    \"X-Goog-Api-Key\": apiKey,\n\"X-Goog-FieldMask\":\n\"routes.duration,routes.distanceMeters,routes.polyline.encodedPolyline\"\
    ,\n},\nbody: JSON.stringify(requestBody),\n};\nfetch(url, requestOptions)\n.then((response)\
