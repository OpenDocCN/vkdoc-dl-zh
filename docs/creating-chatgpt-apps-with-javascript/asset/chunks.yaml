- fmt: '# First Things First: Create Your Own Discord Server


    Before we can make an AI Discord Bot, we’re obviously going to need a Discord
    server already in place for the bot to interact with. Use either the Discord App
    or go to the Discord website (login first of course) and start the process to
    Add/Create a new server.


    After you have started the process, select the option labeled, “**Create My Own**”
    as shown in Figure [6-2](#625846_1_En_6_Chapter.xhtml#Fig2).


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig2_HTML.jpg)


    A pop-up window on Discord prompts users to "Create your first Discord server."
    Options include "Create My Own," "Gaming," "School Club," and "Study Group." The
    left side features a colorful illustration of a bird holding a flag on a cliff.
    The background shows a blue sky with clouds and a distant ship.


    Figure 6-2


    Creating Your Own Discord Server


    Next, you’ll be prompted to specify additional information about your server.
    Continue to proceed through the creation process until you are prompted to provide
    a name and icon for your server, as shown in Figure [6-3](#625846_1_En_6_Chapter.xhtml#Fig3).


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig3_HTML.jpg)


    A Discord interface showing a "Customize your server" pop-up. The pop-up includes
    a prompt to give the server a name and icon, with a sample icon of a cartoon character.
    The server name entered is "Crooks Bank." A link to Discord''s Community Guidelines
    is visible. The background features a colorful illustration with a bird character
    on a cliff. Options to go "Back" or "Create" the server are at the bottom.


    Figure 6-3


    Providing a Name for Your Own Discord Server


    Specify the name of your server and provide an optional server icon (if you have
    one).


    ## Create the Q&A Channel


    By default, every Discord server has a “general” channel, but we want a dedicated
    channel especially for questions and answers. Depending upon how you created your
    server, Figures [6-4](#625846_1_En_6_Chapter.xhtml#Fig4) and [6-5](#625846_1_En_6_Chapter.xhtml#Fig5)
    will be presented to you to create your new channel.


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig5_HTML.jpg)


    A dialog box titled "Create Channel" is displayed on a dark interface. It shows
    options for channel type, with "Text" selected, allowing messages, GIFs, emojis,
    opinions, and puns. The channel name is set to "q-and-a." There is a checkbox
    for making it a private channel, indicating only selected members and roles can
    view it. At the bottom, there are "Cancel" and "Create Channel" buttons.


    Figure 6-5


    Creating a Channel Using the discord App


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig4_HTML.jpg)


    A pop-up window from a chat application displays a prompt from "Crooks Bank" to
    start a conversation. It asks for a topic the group likes, with "q-and-a" entered
    in the topic field. Options to "Skip" or click "Done" are available. The background
    features a colorful illustration of a wizard-like character near a tent under
    a bright sky.


    Figure 6-4


    Creating a Channel Using the Web Interface


    ## Registering a New Discord Bot App with Discord


    Now that we have our Discord server with the appropriate channels created, it’s
    time to register the bot itself – or rather, in our case, the bots themselves.
    In order to keep the code clean and manageable, we’ll actually have multiple bots
    for our Discord server. The first bot will be used exclusively to answer questions
    in the “q-and-a” channel. The second bot will monitor all channels for unwanted
    content, such as harmful content or solicitations.


    In order to create our bot, head over to the Discord Developers website:


    [**https://discord.com/developers**](https://discord.com/developers)


    At the top-right of the page, click the button “**New Application**,” as shown
    in Figure [6-6](#625846_1_En_6_Chapter.xhtml#Fig6).


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig6_HTML.jpg)


    Developer Portal interface displaying the "Applications" section. The sidebar
    includes options like Applications, Teams, Embed Debugger, and Documentation.
    The main area encourages users to create a new application using the Game SDK
    for server commerce. A dropdown menu allows sorting by "Date Created." A message
    indicates no current applications, with a prompt to click "New Application" to
    begin. A graphic with abstract shapes is shown, and a "New Application" button
    is highlighted in blue.


    Figure 6-6


    In Order to Create a Discord Bot, Go to the Discord Developer Website


    In both Discord and Slack terminology, a “bot” is an “app,” and bots are not allowed
    to run on Discord servers unless they have been registered with Discord first.


    Specify a name for the bot and click the “**Create**” button, as shown in Figure
    [6-7](#625846_1_En_6_Chapter.xhtml#Fig7).


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig7_HTML.jpg)


    A screenshot of the Discord Developer Portal showing the process of creating a
    new application. The "Create an Application" dialog box is open, with the name
    field filled in as "Q and A Bot." A checkbox is marked, indicating agreement to
    the Discord Developer Terms of Service and Developer Policy. The "Create" button
    is highlighted, ready to be clicked. The background shows the Applications section
    with options to sort by date created.


    Figure 6-7


    Creating/Registering a Bot for Discord


    ## Specifying General Info for the Bot


    Afterward, you will be taken to a page where you can specify general information
    about your bot, as shown in Figure [6-8](#625846_1_En_6_Chapter.xhtml#Fig8).


    Be sure to familiarize yourself with the navigation menu on the left side of the
    page. As you can see, we have several categories of settings to configure for
    our bot. By default, we have landed on the “**General Information**” page, where
    we specify basic info about our bot. If you have an icon ready for your bot, you
    can upload it here.


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig8_HTML.jpg)


    Discord Developer Portal interface showing the "General Information" section for
    a bot named "Q and A Bot." The app icon is a robot image. The description states
    the bot will monitor the "q-and-a" channel to answer questions. The interface
    includes fields for tags, application ID, public key, and server count, with options
    to copy the ID and key. The left sidebar lists settings like Installation, OAuth2,
    and Bot.


    Figure 6-8


    We Decided to Give Our Bot a Cute Little Robot Icon'
