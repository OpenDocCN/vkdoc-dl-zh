    ## Try It Now! Experimenting with the “System” Role


    Now that we’re familiar with several of the features of the Chat Playground, let’s
    send our first prompt using the settings discussed above. Listings [1-7](#625846_1_En_1_Chapter.xhtml#PC7)
    and [1-8](#625846_1_En_1_Chapter.xhtml#PC8) below use the same prompt asking ChatGPT
    to give a few paragraphs on telemedicine, but the role of the system is vastly
