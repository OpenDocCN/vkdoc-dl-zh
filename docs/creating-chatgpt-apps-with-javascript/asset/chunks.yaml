  trans: '

    ### 以编程方式从 Slack 读取消息


    首先，你需要安装官方的 JavaScript Slack 库。以下是安装所有必要依赖项的 `npm` 命令：


    ```

    npm install @slack/web-api @slack/events-api dotenv

    ```


    清单 4-10 是一个简单的 JavaScript Slack 机器人，它可以获取指定频道中每条帖子的用户名、时间戳和消息内容。


    ```

    import { WebClient } from "@slack/web-api";

    import "dotenv/config";

    const token = process.env.SLACK_API_TOKEN;

    const channel_id = process.env.SLACK_CHANNEL_ID;

    async function main() {

    const web = new WebClient(token);

    // 存储对话历史

    let conversationHistory;

    // 你想要获取历史记录的频道 ID

    try {

    // 使用 WebClient 调用 conversations.history 方法

    const result = await web.conversations.history({

    channel: channel_id,

    limit: 50,

    });

    // 按发送顺序获取消息

    conversationHistory = result.messages.reverse();

    // 打印结果

    for (const message of conversationHistory) {

    const userInfo = await web.users.info({ user: message.user });

    // 将时间戳转换为日期

    const timestamp = new Date(parseFloat(message.ts) * 1000);

    if (userInfo.ok) {

    console.log(userInfo.user.name + "[" + timestamp + "]" + message.text);

    console.log("\n");

    }

    }

    } catch (error) {

    console.error(error);

    }

    }

    main();

    清单 4-10

    我们的 JavaScript Slack 机器人

    ```


    让我们一起来解读这段代码。


    首先，我们导入与 Slack API 交互和加载环境变量所需的基本依赖项。


    接下来，我们定义两个关键变量：从环境变量 `SLACK_API_TOKEN` 中获取的 `token`，以及从 `SLACK_CHANNEL_ID` 中获取的
    `channel_id`。这些变量对于向 Slack API 进行身份验证以及指定我们要检索的 Slack 频道历史记录是必需的。


    然后，我们定义一个异步的 `main` 函数，脚本的核心逻辑就在其中。在此函数中，我们使用 Slack API 令牌初始化 `WebClient`，以便能够进行
    API 调用。我们还声明了一个变量 `conversationHistory`，用于存储从频道检索到的消息。


    脚本的原理很简单；它通过调用 Slack API 的 `conversations.history()` 方法，从 Slack 频道中检索最新的 50 条消息。


    成功获取消息后，脚本使用 `.reverse()` 方法反转消息的顺序，以确保按从旧到新的顺序处理，然后打印每条消息。


    清单 4-11 显示了运行 Slack 机器人脚本的结果。


    ```

    Fatima [2023-08-11T09:04:20] : 大家好，我有一个紧急问题需要讨论。我刚和一位客户通完电话，他们的应用一加载就崩溃。他们非常沮丧。我们能尽快解决这个问题吗？:tired_face:

    Keith [2023-08-11T09:04:35] : 感谢你提醒我们，Fatima。我们马上处理这个问题。John，既然我们的架构师今天生病请假了，你能带头调查这个问题吗？

    John [2023-08-11T09:04:52] : 没问题，Keith。我会深入代码库，看看能否找到导致崩溃的潜在原因。

    John [2023-08-11T09:05:30] : Fatima，你能从客户那里收集一些额外信息吗？询问他们具体的设备、操作系统以及最近可能安装的任何更新。

    ...

    清单 4-11

    执行我们的频道读取 Slack 机器人的输出

    ```


    ## 留给读者的练习


    显然，这里还有一些额外的事情可以做，这些步骤将留给你（读者）来完成，例如：


    *   将读取 Slack 消息的代码连接到上一章的 ChatGPT 客户端，这样抓取消息并获取摘要就变成了一个步骤。

    *   为 Slack 机器人本身添加更多功能，例如添加命令，以便频道中的任何人都可以请求摘要。在当前状态下，机器人不会在频道中发布任何内容。然而，机器人的“用户界面”就是频道本身；因此，用户应该能够通过输入命令（例如请求摘要）来与
    Slack 机器人交互。

    *   确保机器人不会让糟糕的情况变得更糟。每当机器人提供摘要时，它不应该在频道本身中发布，因为这可能会给已经嘈杂的情况增加很多噪音。最佳实践是让机器人向请求摘要（或你创建的任何新命令）的人发送一条私密消息。


    ## 结论


    在本章中，我们讨论了当今人工智能在企业中实际应用的多种方式之一。我们探讨了什么是真正的“提示工程”，指出提示工程不能仅仅通过向 ChatGPT 输入文本来完成。为了正确且有效地进行提示工程，你绝对需要理解
    ChatGPT API 所有输入参数的影响。


    利用我们学到的关于提示工程的知识，我们成功地获得了提供给我们的任何大段文本的摘要。最后，我们看到了运行一个自动机器人所需的代码，该机器人可以以编程方式从任何
    Slack 频道抓取消息。


    在本章（以及上一章）中，我们专门使用了 OpenAI API 的聊天补全端点。在下一章中，我们将通过尝试 Whisper 和 DALL-E 端点来突破可能性的边界。

    '
- fmt: "# 5. Multimodal AI: Creating a Podcast Visualizer with Whisper and DALL·E\
    \ 3\n\nIn this chapter, we’re going to see the benefits of combining multiple\
    \ models together in order to create some fascinating results. As an avid podcast\
    \ listener, I’ve often wondered what the scenery, the imagery, the characters,\
    \ the subject, or the background looked like while listening to a very immersive\
    \ story in audio format.\n\nLet’s introduce a new term: **multimodal AI.** In\
    \ the most simplest of terms, generative AI models can create content in one of\
    \ four formats:\n\n- Text\n- Audio\n- Images\n- Video\n\nEach of those formats\
    \ is a **mode**. Multimodal AI is the process of using multiple AI models together\
    \ to generate (or to understand) content where the input is one type of mode,\
    \ and the output is a different type of mode.\n\nTake, for example, OpenAI’s Whisper\
    \ model. If you provide it audio, it is able to create a transcription of everything\
    \ said into text. The same thing applies to DALL·E. If you supply it with a textual\
    \ prompt, then it can generate an image of what you described.\n\nSo we’re going\
    \ to create a Podcast Visualizer using multiple models from OpenAI. There are\
    \ a few steps involved, but the final results are stunning. While listening to\
    \ a podcast about a guy cooking some amazing things with tofu (don’t knock it\
    \ until you try it), the Podcast Visualizer came up with the image in Figure [5-1](#625846_1_En_5_Chapter.xhtml#Fig1).\n\
    \n![](images/625846_1_En_5_Chapter/625846_1_En_5_Fig1_HTML.jpg)\n\nA person wearing\
    \ glasses and a light blue shirt is holding a white bowl containing a large block\
    \ of tofu. The background is blurred, suggesting an indoor setting.\n\n**Figure\
    \ 5-1** AI-Generated Image. The Result of Visualizing a Podcast About Tofu Using\
    \ the GPT-4, Whisper, and DALL·E Models\n\nIn order to make the code for the Podcast\
    \ Visualizer easy to follow along, we’ll do things separately in the following\
    \ three steps:\n\n- **Step-1:** Take a podcast episode and use the Whisper model\
    \ to get a transcript.\n- **Step-2:** Take the resulting transcript and use the\
    \ GPT-4 model to describe the visual aspects of what’s being discussed in the\
    \ podcast episode.\n- **Step-3:** Take the resulting description and use the DALL·E\
    \ model to generate an image.\n\nThe code presented here in this chapter has tons\
    \ of practical uses, for example:\n\n- If you’re just curious about what the things\
    \ in a podcast episode could look like (which is always the case for me), you\
    \ can get a simple representative visual image to associate with what you’re listening\
    \ to.\n- For people who are hearing impaired, you can easily turn a podcast or\
    \ radio program into a slide-show of images. This greatly enhances the accessibility\
    \ of the content.\n- For podcasters, you can now have a simple way to add a visual/hero\
    \ image to each of your episodes. This is useful since podcast players such as\
    \ Apple Podcasts and Spotify allow podcasters to display a single image to associate\
    \ with an individual episode. This can help with engagement for your listeners.\n\
    \n## Introducing the Whisper Model by OpenAI\n\nNow let’s introduce another new\
    \ term: **Automatic Speech Recognition** (ASR). The average everyday consumer\
    \ is very familiar with this technology due to its integration into mobile phones\
    \ (e.g., Siri for the iPhone) and smart speakers (e.g., any Alexa device). At\
    \ its core, ASR technology converts spoken language into text.\n\nWhisper is OpenAI’s\
    \ model for speech recognition, and the accuracy is astonishingly high. The listing\
    \ below is a transcript of an episode of the very popular DuoLingo Spanish podcast,\
    \ which makes the Spanish language easy to be understood by English listeners\
    \ by combining both English and Spanish together in a woven narrative story. The\
    \ transcript was generated using the Whisper model.\n\n```\n...I'm Martina Castro.\
    \ Every episode we bring you fascinating, true stories to help you improve your\
    \ Spanish listening and gain new perspectives on the world. The storyteller will\
    \ be using intermediate Spanish and I'll be chiming in for context in English.\
    \ If you miss something, you can always skip back and listen again. We also offer\
    \ full transcripts at podcast.duolingo.com.\nGrowing up, Linda was fascinated\
    \ with her grandmother, Erlinda. Erlinda was a healer or curandera, someone who\
    \ administers remedies for mental, emotional, physical, or spiritual illnesses.\n\
    In Guatemala, this is a practice passed down orally through generations in the\
    \ same family. Mal de ojo, or the evil eye, is considered an illness by many Guatemalans\
    \ who believe humans have the power to transfer bad energy to others. Neighbors\
    \ would bring their babies to Linda's grandmother when they suspected an energy\
    \ imbalance. Su madre lo llevaba a nuestra casa para curarlo...\n```\n\n**Listing\
    \ 5-1** The Whisper Model Performs Speech Recognition to Convert Audio into Text\n\
    \nIf you’ve ever worked with a speech recognition system before (even with sophisticated\
    \ technologies like Siri and Alexa), you will know that it has problems, for instance:\n\
    \n- **Speech recognition has problems with punctuation.**\n    - Have you noticed\
    \ that nobody speaks with punctuation? For the English language, we use changes\
    \ in tone or volume to ask a question or give an exclamation. We also use short\
    \ and long pauses for commas and periods.\n\n- **Speech recognition has problems\
    \ with foreign words and accents.**\n    - Depending on who you ask, there are\
    \ at least 170k words in the English language. However, in conversational English,\
    \ we are always using foreign words like:\n        - Tsunami (Japanese origin):\
    \ A large sea wave often caused by an earthquake\n        - Hors d’oeuvre (French\
    \ origin): An appetizer\n        - Lingerie (French origin): Women’s underwear\
    \ or nightclothes\n        - Aficionado (Spanish origin): Someone who is very\
    \ passionate about a specific activity or subject\n        - Piñata (Spanish origin):\
    \ A brightly colored box of candy for kids to beat relentlessly\n\n- **Speech\
    \ recognition has problems with names.**\n    - Certain names of people, businesses,\
    \ and websites can often be hard to spell and understand.\n\n- **Speech recognition\
    \ has problems with homophones.**\n    - Do you remember those words that sound\
    \ the same but have different spellings and meanings? The fantastic editor of\
    \ this book knows all of them!\n        - Would / Wood\n        - Flour / Flower\n\
    \        - Two / Too / To\n        - They’re / There / Their\n        - Pair /\
    \ Pare / Pear\n        - Break / Brake\n        - Allowed / Aloud\n\nAs you can\
    \ see from Listing [5-1](#625846_1_En_5_Chapter.xhtml#PC1), Whisper was able to\
    \ understand all the punctuation in the audio, identify all the foreign words\
    \ (of which there were several), understand the names, as well as the company\
    \ name (`Duolingo`) within a URL! Of course, if you noticed, it could also understand\
    \ the difference between `wood` and `would`."
  raw: "# 5. Multimodal AI: Creating a Podcast Visualizer with Whisper and DALL·E\
    \ 3\n\nIn this chapter, we’re going to see the benefits of combining multiple\
    \ models together in order to create some fascinating results. As an avid podcast\
    \ listener, I’ve often wondered what the scenery, the imagery, the characters,\
    \ the subject, or the background looked like while listening to a very immersive\
    \ story in audio format.\n\nLet’s introduce a new term: **multimodal AI.** In\
    \ the most simplest of terms, generative AI models can create content in one of\
    \ four formats:\n\n*   Text\n\n*   Audio\n\n*   Images\n\n*   Video\n\nEach of\
    \ those formats is a **mode**. Multimodal AI is the process of using multiple\
    \ AI models together to generate (or to understand) content where the input is\
    \ one type of mode, and the output is a different type of mode.\n\nTake, for example,\
    \ OpenAI’s Whisper model. If you provide it audio, it is able to create a transcription\
    \ of everything said into text. The same thing applies to DALL⋅E. If you supply\
    \ it with a textual prompt, then it can generate an image of what you described.\n\
    \nSo we’re going to create a Podcast Visualizer using multiple models from OpenAI.\
    \ There are a few steps involved, but the final results are stunning. While listening\
    \ to a podcast about a guy cooking some amazing things with tofu (don’t knock\
    \ it until you try it), the Podcast Visualizer came up with the image in Figure\
    \ [5-1](#625846_1_En_5_Chapter.xhtml#Fig1).\n\n![](images/625846_1_En_5_Chapter/625846_1_En_5_Fig1_HTML.jpg)\n\
    \nA person wearing glasses and a light blue shirt is holding a white bowl containing\
    \ a large block of tofu. The background is blurred, suggesting an indoor setting.\n\
    \nFigure 5-1\n\nAI-Generated Image. The Result of Visualizing a Podcast About\
    \ Tofu Using the GPT-4, Whisper, and DALL⋅E Models\n\nIn order to make the code\
    \ for the Podcast Visualizer easy to follow along, we’ll do things separately\
    \ in the following three steps:\n\n*   Step-1: Take a podcast episode and use\
    \ the Whisper model to get a transcript.\n\n*   Step-2: Take the resulting transcript\
    \ and use the GTP-4 model to describe the visual aspects of what’s being discussed\
    \ in the podcast episode.\n\n*   Step-3: Take the resulting description and use\
    \ the DALL⋅E model to generate an image.\n\nThe code presented here in this chapter\
    \ has tons of practical uses, for example:\n\n*   If you’re just curious about\
    \ what the things in a podcast episode could look like (which is always the case\
    \ for me), you can get a simple representative visual image to associate with\
    \ what you’re listening to.\n\n*   For people who are hearing impaired, you can\
    \ easily turn a podcast or radio program into a slide-show of images. This greatly\
    \ enhances the accessibility of the content.\n\n*   For podcasters, you can now\
    \ have a simple way to add a visual/hero image to each of your episodes. This\
    \ is useful since podcast players such as Apple Podcasts and Spotify allow podcasters\
    \ to display a single image to associate with an individual episode. This can\
    \ help with engagement for your listeners.\n\n## Introducing the Whisper Model\
    \ by OpenAI\n\nNow let’s introduce another new term: **Automatic Speech Recognition**\
    \ (ASR). The average everyday consumer is very familiar with this technology due\
    \ to its integration into mobile phones (e.g., Siri for the iPhone) and smart\
    \ speakers (e.g., any Alexa device). At its core, ASR technology converts spoken\
    \ language into text.\n\nWhisper is OpenAI’s model for speech recognition, and\
    \ the accuracy is astonishingly high. The listing below is a transcript of an\
    \ episode of the very popular DuoLingo Spanish podcast, which makes the Spanish\
    \ language easy to be understood by English listeners by combining both English\
    \ and Spanish together in a woven narrative story. The transcript was generated\
    \ using the Whisper model.\n\n```\n...I'm Martina Castro. Every episode we bring\
    \ you fascinating, true stories to help you improve your Spanish listening and\
    \ gain new perspectives on the world. The storyteller will be using intermediate\
    \ Spanish and I'll be chiming in for context in English. If you miss something,\
    \ you can always skip back and listen again. We also offer full transcripts at\
    \ podcast.duolingo.com.\nGrowing up, Linda was fascinated with her grandmother,\
    \ Erlinda. Erlinda was a healer or curandera, someone who administers remedies\
    \ for mental, emotional, physical, or spiritual illnesses.\nIn Guatemala, this\
    \ is a practice passed down orally through generations in the same family. Mal\
    \ de ojo, or the evil eye, is considered an illness by many Guatemalans who believe\
    \ humans have the power to transfer bad energy to others. Neighbors would bring\
    \ their babies to Linda's grandmother when they suspected an energy imbalance.\
    \ Su madre lo llevaba a nuestra casa para curarlo...\nListing 5-1\nThe Whisper\
    \ Model Performs Speech Recognition to Convert Audio into Text\n```\n\nIf you’ve\
    \ ever worked with a speech recognition system before (even with sophisticated\
    \ technologies like Siri and Alexa), you will know that it has problems, for instance:\n\
    \n*   **Speech recognition has problems with** **punctuation****.**\n    *   Have\
    \ you noticed that nobody speaks with punctuation? For the English language, we\
    \ use changes in tone or volume to ask a question or give an exclamation. We also\
    \ use short and long pauses for commas and periods.\n\n*   **Speech recognition\
    \ has problems with foreign words and** **accents****.**\n    *   Depending on\
    \ who you ask, there are at least 170k words in the English language. However,\
    \ in conversational English, we are always using foreign words like:\n       \
    \ *   Tsunami (Japanese origin): A large sea wave often caused by an earthquake\n\
    \n        *   Hors d’oeuvre (French origin): An appetizer\n\n        *   Lingerie\
    \ (French origin): Women’s underwear or nightclothes\n\n        *   Aficionado\
    \ (Spanish origin): Someone who is very passionate about a specific activity or\
    \ subject\n\n        *   Piñata (Spanish origin): A brightly colored box of candy\
    \ for kids to beat relentlessly\n\n*   **Speech recognition has problems with**\
    \ **names****.**\n    *   Certain names of people, businesses, and websites can\
    \ often be hard to spell and understand.\n\n*   **Speech recognition has problems\
    \ with** **homophones****.**\n    *   Do you remember those words that sound the\
    \ same but have different spellings and meanings? The fantastic editor of this\
    \ book knows all of them!\n        *   Would / Wood\n\n        *   Flour / Flower\n\
    \n        *   Two / Too / To\n\n        *   They’re / There / Their\n\n      \
    \  *   Pair / Pare / Pear\n\n        *   Break / Brake\n\n        *   Allowed\
    \ / Aloud\n\nAs you can see from Listing [5-1](#625846_1_En_5_Chapter.xhtml#PC1),\
    \ Whisper was able to understand all the punctuation in the audio, identify all\
    \ the foreign words (of which there were several), understand the names, as well\
    \ as the company name (”Duolingo”) within a URL! Of course, if you noticed, it\
    \ could also understand the difference between “wood” and “would.”"
  trans: "\n# 5. 多模态 AI：使用 Whisper 和 DALL·E 3 创建播客可视化工具\n\n在本章中，我们将看到如何结合多个模型来创造令人惊叹的结果。作为一名狂热的播客听众，我在收听沉浸式音频故事时，常常会好奇其中的场景、画面、角色、主题或背景究竟是什么样的。\n\
    \n让我们引入一个新术语：**多模态 AI**。简单来说，生成式 AI 模型可以创建以下四种格式的内容：\n\n- 文本\n- 音频\n- 图像\n- 视频\n\
    \n每种格式都是一种**模态**。多模态 AI 是指同时使用多个 AI 模型来生成（或理解）内容的过程，其中输入是一种模态，而输出是另一种不同的模态。\n\n\
    以 OpenAI 的 Whisper 模型为例。如果你提供音频，它能够将所说的所有内容转录为文本。同样，DALL·E 模型也是如此。如果你提供文本提示，它就能根据你的描述生成图像。\n\
    \n因此，我们将使用 OpenAI 的多个模型来创建一个播客可视化工具。虽然涉及几个步骤，但最终效果令人惊艳。在收听一个关于某人用豆腐烹饪美味佳肴的播客时（别急着否定，先试试看），播客可视化工具生成了图\
    \ 5-1 中的图像。\n\n![](img/625846_1_En_5_Fig1_HTML.jpg)\n\n一个人戴着眼镜，穿着浅蓝色衬衫，手里端着一个白色碗，碗里放着一大块豆腐。背景模糊，暗示是室内环境。\n\
    \n**图 5-1** AI 生成的图像。使用 GPT-4、Whisper 和 DALL·E 模型可视化关于豆腐的播客的结果\n\n为了让播客可视化工具的代码易于理解，我们将分以下三个步骤进行：\n\
    \n- **步骤 1：** 选取一集播客，使用 Whisper 模型获取转录文本。\n- **步骤 2：** 获取生成的转录文本，使用 GPT-4 模型描述该集播客中讨论内容的视觉方面。\n\
    - **步骤 3：** 获取生成的描述，使用 DALL·E 模型生成图像。\n\n本章提供的代码具有大量实际用途，例如：\n\n- 如果你只是好奇播客一集中的内容可能是什么样子（我经常如此），你可以获得一个简单的代表性视觉图像，与你正在收听的内容相关联。\n\
    - 对于有听力障碍的人，你可以轻松地将播客或广播节目转换为幻灯片式的图像展示。这大大增强了内容的可访问性。\n- 对于播客创作者，你现在有了一种简单的方法，可以为每一集添加视觉/主图。这很有用，因为\
    \ Apple Podcasts 和 Spotify 等播客播放器允许播客创作者显示单张图像来关联单集节目，这有助于提高听众的参与度。\n\n## 介绍 OpenAI\
    \ 的 Whisper 模型\n\n现在让我们引入另一个新术语：**自动语音识别**（ASR）。普通日常消费者对这种技术非常熟悉，因为它已集成到手机（例如\
    \ iPhone 的 Siri）和智能音箱（例如任何 Alexa 设备）中。其核心是，ASR 技术将口语转换为文本。\n\nWhisper 是 OpenAI\
    \ 的语音识别模型，其准确性高得惊人。下面的列表是广受欢迎的 DuoLingo 西班牙语播客一集的转录文本，该播客通过将英语和西班牙语交织成一个叙事故事，使英语听众能够轻松理解西班牙语。该转录文本是使用\
    \ Whisper 模型生成的。\n\n```\n...我是 Martina Castro。每集节目，我们都会为您带来引人入胜的真实故事，帮助您提高西班牙语听力，并获得看待世界的新视角。讲故事的人将使用中级西班牙语，而我会用英语补充上下文。如果您错过了什么，可以随时回退重听。我们还在\
    \ podcast.duolingo.com 提供完整转录文本。\n在成长过程中，Linda 对她的祖母 Erlinda 非常着迷。Erlinda 是一位治疗师或\
    \ curandera，即那些为精神、情感、身体或灵性疾病提供疗法的人。\n在危地马拉，这是一种通过同一家族世代口头传承的实践。Mal de ojo，即邪恶之眼，被许多危地马拉人视为一种疾病，他们认为人类有能力将负能量传递给他人。邻居们会在怀疑婴儿能量失衡时，把他们带到\
    \ Linda 的祖母那里。Su madre lo llevaba a nuestra casa para curarlo...\n```\n\n**列表\
    \ 5-1** Whisper 模型执行语音识别，将音频转换为文本\n\n如果你以前使用过语音识别系统（即使是像 Siri 和 Alexa 这样复杂的技术），你会知道它存在一些问题，例如：\n\
    \n- **语音识别在标点符号方面存在问题。**\n    - 你有没有注意到，没有人说话时会带标点符号？对于英语，我们通过改变语调或音量来提问或表达感叹。我们也用短停顿和长停顿来表示逗号和句号。\n\
    \n- **语音识别在外来词和口音方面存在问题。**\n    - 根据你问的人不同，英语中至少有 17 万个单词。然而，在英语会话中，我们经常使用外来词，例如：\n\
    \        - Tsunami（源自日语）：通常由地震引起的大海啸\n        - Hors d’oeuvre（源自法语）：开胃菜\n    \
    \    - Lingerie（源自法语）：女性内衣或睡衣\n        - Aficionado（源自西班牙语）：对特定活动或主题非常热衷的人\n \
    \       - Piñata（源自西班牙语）：一个色彩鲜艳的糖果盒，供孩子们尽情敲打\n\n- **语音识别在名称方面存在问题。**\n    - 某些人名、企业名和网站名通常难以拼写和理解。\n\
    \n- **语音识别在同音词方面存在问题。**\n    - 你还记得那些发音相同但拼写和含义不同的词吗？本书那位出色的编辑全都知道！\n        -\
    \ Would / Wood\n        - Flour / Flower\n        - Two / Too / To\n        -\
    \ They’re / There / Their\n        - Pair / Pare / Pear\n        - Break / Brake\n\
    \        - Allowed / Aloud\n\n正如你从列表 5-1 中看到的，Whisper 能够理解音频中的所有标点符号，识别所有外来词（其中有多个），理解名称，以及\
    \ URL 中的公司名称（`Duolingo`）！当然，如果你注意到了，它还能区分`wood`和`would`。\n"
- fmt: "# Features and Limitations of the Whisper Model\n\nThe Whisper model is able\
    \ to convert spoken audio from the following languages into text:\n\n- Afrikaans\n\
    - Arabic\n- Armenian\n- Azerbaijani\n- Belarusian\n- Bosnian\n- Bulgarian\n- Catalan\n\
    - Chinese\n- Croatian\n- Czech\n- Danish\n- Dutch\n- English (of course!)\n- Estonian\n\
    - Finnish\n- French\n- Galician\n- German\n- Greek\n- Hebrew\n- Hindi\n- Hungarian\n\
    - Icelandic\n- Indonesian\n- Italian\n- Japanese\n- Kannada\n- Kazakh\n- Korean\n\
    - Latvian\n- Lithuanian\n- Macedonian\n- Malay\n- Marathi\n- Maori\n- Nepali\n\
    - Norwegian\n- Persian\n- Polish\n- Portuguese\n- Romanian\n- Russian\n- Serbian\n\
    - Slovak\n- Slovenian\n- Spanish\n- Swahili\n- Swedish\n- Tagalog\n- Tamil\n-\
    \ Thai\n- Turkish\n- Ukrainian\n- Urdu\n- Vietnamese\n- Welsh\n\nSo, at the end\
    \ of the day, it will be able to understand audio spoken by yourself and probably\
    \ any language spoken by your friends and colleagues.\n\nDevelopers are limited\
    \ to send no more than 50 requests per minute to the API, so this constraint needs\
    \ to be taken into consideration if you want to transcribe vast amounts of audio.\n\
    \nWhisper supports audio in `flac`, `mp3`, `mp4`, `mpeg`, `mpga`, `m4a`, `ogg`,\
    \ `wav`, or `webm` formats. Regardless of the format that you use, the maximum\
    \ file size to send to the API is 25MB.\n\nNow, if you haven't worked extensively\
    \ with audio files, please be aware that some formats create REALLY HUGE files\
    \ (e.g., `wav` format) and others create really small files (e.g., `m4a` format).\
    \ So, converting your file to a different format can help you with the 25MB limitation.\
    \ However, later in this chapter, we'll see the code for a tool that takes a single\
    \ large audio file and splits it into multiple, smaller files.\n\n## Using `OpenAI.audio.transcriptions.create()`\
    \ to Transcribe Audio\n\nThe `OpenAI.audio.transcriptions.create()` method converts\
    \ audio into text and is only compatible with the Whisper model. Let's take a\
    \ look at what parameters need to be in the method in order to make a successful\
    \ API call.\n\n### Examining the Method Parameters\n\n**Table 5-1. The Request\
    \ Body for Whisper**\n\n| Field | Type | Required? | Description |\n| --- | ---\
    \ | --- | --- |\n| `file` | file | Required | The entire audio file that you want\
    \ to be transcribed. Accepted formats are: `flac`, `mp3`, `mp4`, `mpeg`, `mpga`,\
    \ `m4a`, `ogg`, `wav`, `webm` |\n| `model` | String | Required | The ID of the\
    \ model that you want to use for transcription. Compatible models include: `whisper-1`\
    \ |\n| `prompt` | String | Optional | This is any text that can be provided to\
    \ change the model's transcription style or to provide it with more context from\
    \ a previous segment of audio. Be sure that the prompt is in the same language\
    \ as the audio for best results. Additionally, this field can be used to change\
    \ the spelling or capitalization of any words that Whisper is not familiar with.\
    \ |\n| `response_format` | String (default: `json`) | Optional | This is the format\
    \ of the output of transcription. Accepted formats are: `json`, `text`, `srt`,\
    \ `verbose_json`, `vtt` |\n| `temperature` | Number (default: `0`) | Optional\
    \ | This is the sampling temperature, ranging from 0 to 1. A higher value increases\
    \ the randomness of the output, whereas a lower value ensures a more deterministic\
    \ output. |\n| `language` | String | Optional | This is the language of the input\
    \ audio. It's optional, but providing the value can improve the accuracy and latency\
    \ for the transcription |\n\n## Creating a Utility App to Split Audio Files\n\n\
    So, we're almost at the point where we are able to programmatically invoke the\
    \ Whisper model using the Transcriptions Endpoint. However, the Whisper Model\
    \ has a limitation of 25MB per file.\n\nNow, this is not a problem if you're listening\
    \ to, for example, the StarDate podcast from the University of Texas at Austin.\
    \ This podcast gives you a great glimpse of what to look for in the nighttime\
    \ sky in about 2 minutes of audio. However, that's not the case for other audio\
    \ programs which tend to last for up to an hour (or even more). In cases like\
    \ that, you're going to definitely exceed the 25MB file limitation.\n\nTherefore,\
    \ let's pair-program with ChatGPT and use our human intelligence to create our\
    \ own utility that will take a single audio file and split it into multiple smaller\
    \ files.\n\n**Note:** In this section, I'm presenting one of the many possibilities\
    \ available on how to segment a large audio file into smaller pieces. For instance,\
    \ you can use popular audio editing apps (such as the Open Source tool, Audacity,\
    \ or the licensed tool, Adobe Audition) to manually cut up a large file into smaller\
    \ files.\n\n`FFmpeg` is one of the most reliable tools to programmatically manipulate\
    \ media files, and since it's open source, it makes sense to use it for our needs.\n\
    \nListing 5-2 is the prompt that sums up what we need to get done.\n\n```\nSystem:\
    \ You are a JavaScript developer\nUser: Write an application that takes as input\
    \ a single MP3 file and splits the file into contiguous segments no longer than\
    \ 10 minutes using the ffmpeg library.\n```\n\n**Listing 5-2. PROMPT. Using ChatGPT\
    \ to Create the AudioSplitter App**\n\nAfter a little back and forth, I was able\
    \ to create (as shown in Listing 5-3) the `audiosplitter` application that includes\
    \ my edits to what was generated by ChatGPT.\n\n```\nconst ffmpeg = require(\"\
    fluent-ffmpeg\");\nconst ffmpegPath = require(\"ffmpeg-static\");\nconst path\
    \ = require(\"path\");\nconst fs = require(\"fs\");\n\n// Configure ffmpeg to\
    \ use the static binary\nffmpeg.setFfmpegPath(ffmpegPath);\n\n// Function to split\
    \ MP3 file\nfunction splitMP3(inputFile, duration) {\n    ffmpeg.ffprobe(inputFile,\
    \ (err, metadata) => {\n        if (err) {\n            console.error(`Error occurred:\
    \ ${err.message}`);\n            return;\n        }\n        const totalDuration\
    \ = metadata.format.duration;\n        const numberOfChunks = Math.ceil(totalDuration\
    \ / duration);\n        const outputDir = path.join(__dirname, \"output\");\n\n\
    \        if (!fs.existsSync(outputDir)) {\n            fs.mkdirSync(outputDir);\n\
    \        }\n\n        for (let i = 0; i < numberOfChunks; i++) {\n           \
    \ const startTime = i * duration;\n            const outputFile = path.join(outputDir,\
    \ `output_${i + 1}.mp3`);\n\n            ffmpeg(inputFile)\n                .setStartTime(startTime)\n\
    \                .setDuration(duration)\n                .output(outputFile)\n\
    \                .on(\"end\", () => {\n                    console.log(`Created\
    \ ${outputFile}`);\n                })\n                .on(\"error\", (err) =>\
    \ {\n                    console.error(`Error occurred: ${err.message}`);\n  \
    \              })\n                .run();\n        }\n    });\n}\n\n// Usage\
    \ example\nconst inputFilePath = path.join(__dirname, \"input.mp3\"); // Path\
    \ to your input MP3 file\nconst maxDuration = 600; // 10 minutes in seconds\n\
    splitMP3(inputFilePath, maxDuration);\n```\n\n**Listing 5-3. RESPONSE. Audio-splitter.js**\n\
    \nOur goal is quite simple: split an MP3 file into segments of a specified duration\
    \ using JavaScript and FFmpeg. Each segment should be no longer than 10 minutes\
    \ (which is 600 seconds). The entire process is managed using the `fluent-ffmpeg`\
    \ library, which acts as a Node.js wrapper for FFmpeg, allowing us to handle audio\
    \ and video processing efficiently.\n\nOf course, one of the first steps required\
    \ is to ensure that you have FFmpeg installed and correctly configured. Our script\
    \ uses `ffmpeg-static` to ensure the FFmpeg binary is packaged with the code.\
    \ This avoids system-specific dependency issues. You can install your dependencies\
    \ with the following command:\n\n```\nnpm install fluent-ffmpeg ffmpeg-static\n\
    ```\n\nThe main logic resides in the `splitMP3()` function, which takes two arguments:\
    \ the path to the input MP3 file and the desired segment duration (in seconds).\n\
    \nFirst, we use the `ffmpeg.ffprobe()` function to extract metadata from the input\
    \ MP3 file, specifically its total duration. This is necessary because it lets\
    \ us determine how many segments we need to create.\n\nIf the output directory\
    \ does not exist, we create it using Node.js's `fs` module. This ensures that\
    \ our segmented audio files have a dedicated destination folder.\n\nAfter running\
    \ the script, the output folder will be populated with MP3 files, each no longer\
    \ than 10 minutes in duration. If the input file is less than 10 minutes, only\
    \ one segment will be generated."
  raw: '## Features and Limitations of the Whisper Model


    The Whisper model is able to convert spoken audio from the following languages
    into text:


    *   Afrikaans


    *   Arabic


    *   Armenian


    *   Azerbaijani


    *   Belarusian


    *   Bosnian


    *   Bulgarian


    *   Catalan


    *   Chinese


    *   Croatian


    *   Czech


    *   Danish


    *   Dutch


    *   **English (of course!)**


    *   Estonian


    *   Finnish


    *   French


    *   Galician


    *   German


    *   Greek


    *   Hebrew


    *   Hindi


    *   Hungarian


    *   Icelandic


    *   Indonesian


    *   Italian


    *   Japanese


    *   Kannada


    *   Kazakh


    *   Korean


    *   Latvian


    *   Lithuanian


    *   Macedonian


    *   Malay


    *   Marathi


    *   Maori


    *   Nepali


    *   Norwegian


    *   Persian


    *   Polish


    *   Portuguese


    *   Romanian


    *   Russian


    *   Serbian


    *   Slovak


    *   Slovenian


    *   Spanish


    *   Swahili


    *   Swedish


    *   Tagalog


    *   Tamil


    *   Thai


    *   Turkish


    *   Ukrainian


    *   Urdu


    *   Vietnamese


    *   Welsh


    So, at the end of the day, it will be able to understand audio spoken by yourself
    and probably any language spoken by your friends and colleagues.


    Developers are limited to send no more than 50 requests per minute to the API,
    so this constraint needs to be taken into consideration if you want to transcribe
    vast amounts of audio.


    Whisper supports audio in flac, mp3, mp4, mpeg, mpga, m4a, ogg, wav, or webm formats.
    Regardless of the format that you use, the maximum file size to send to the API
    is 25MB.


    Now, if you haven’t worked extensively with audio files, please be aware that
    some formats create REALLY HUGE files (e.g., wav format) and others create really
    small files (e.g., m4a format). So, converting your file to a different format
    can help you with the 25MB limitation. However, later in this chapter, we’ll see
    the code for a tool that takes a single large audio file and splits it into multiple,
    smaller files.


    ## Using OpenAI.audio.transcriptions.create() to Transcribe Audio


    The OpenAI.audio.transcriptions.create() method converts audio into text and is
    only compatible with the Whisper model. Let’s take a look at what parameters need
    to be in the method in order to make a successful API call.


    ### Examining the Method Parameters


    Table 5-1


    The Request Body for Whisper


    | Field | Type | Required? | Description |

    | --- | --- | --- | --- |

    | file | file | Required | The entire audio file that you want to be transcribed.Accepted
    formats are• flac• mp3• mp4• mpeg• mpga• m4a• ogg• wav• webm |

    | model | String | Required | The ID of the model that you want to use for transcription.Compatible
    models include• whisper-1 |

    | prompt | String | Optional | This is any text that can be provided to change
    the model''s transcription style or to provide it with more context from a previous
    segment of audio.Be sure that the prompt is in the same language as the audio
    for best results.Additionally, this field can be used to change the spelling or
    capitalization of any words that Whisper is not familiar with. |

    | response_format | Stringdefault: json | Optional | This is the format of the
    output of transcription.Accepted formats are• json• text• srt• verbose_json• vtt
    |

    | temperature | Numberdefault: 0 | Optional | This is the sampling temperature,
    ranging from 0 to 1.A higher value increases the randomness of the output, whereas
    a lower value ensures a more deterministic output. |

    | language | String | Optional | This is the language of the input audio. It’s
    optional, but providing the value can improve the accuracy and latency for the
    transcription |


    ## Creating a Utility App to Split Audio Files


    So, we’re almost at the point where we are able to programmatically invoke the
    Whisper model using the Transcriptions Endpoint. However, the Whisper Model has
    a limitation of 25MB per file.


    Now, this is not a problem if you’re listening to, for example, the StarDate podcast
    from the University of Texas at Austin. This podcast gives you a great glimpse
    of what to look for in the nighttime sky in about 2 minutes of audio. However,
    that’s not the case for other audio programs which tend to last for up to an hour
    (or even more). In cases like that, you’re going to definitely exceed the 25MB
    file limitation.


    Therefore, let’s pair-program with ChatGPT and use our human intelligence to create
    our own utility that will take a single audio file and split it into multiple
    smaller files.


    Note


    In this section, I''m presenting one of the many possibilities available on how
    to segment a large audio file into smaller pieces. For instance, you can use popular
    audio editing apps (such as the Open Source tool, Audacity, or the licensed tool,
    Adobe Audition) to manually cut up a large file into smaller files.


    FFmpeg is one of the most reliable tools to programmatically manipulate media
    files, and since it’s open source, it’s make sense to use it for our needs.


    Listing [5-2](#625846_1_En_5_Chapter.xhtml#PC2) is the prompt sums up what we
    need to get done.


    ```

    System: You are a JavaScript developer

    User: Write an application that takes as input a single MP3 file and splits the
    file into contiguous segments no longer than 10 minutes using the ffmpeg library.

    Listing 5-2

    PROMPT. Using ChatGPT to Create the AudioSplitter App

    ```


    After a little back and forth, I was able to create (as shown in Listing [5-3](#625846_1_En_5_Chapter.xhtml#PC3))
    the audiosplitter application that includes my edits to what was generated by
    ChatGPT.


    ```

    A black and white geometric logo featuring an interlocking, symmetrical design
    resembling a knot or woven pattern.

    const ffmpeg = require("fluent-ffmpeg");

    const ffmpegPath = require("ffmpeg-static");

    const path = require("path");

    const fs = require("fs");

    // Configure ffmpeg to use the static binary

    ffmpeg.setFfmpegPath(ffmpegPath);

    // Function to split MP3 file

    function splitMP3(inputFile, duration) {

    ffmpeg.ffprobe(inputFile, (err, metadata) => {

    if (err) {

    console.error(`Error occurred: ${err.message}`);

    return;

    }

    const totalDuration = metadata.format.duration;

    const numberOfChunks = Math.ceil(totalDuration / duration);

    const outputDir = path.join(__dirname, "output");

    if (!fs.existsSync(outputDir)) {

    fs.mkdirSync(outputDir);

    }

    for (let i = 0; i  {

    console.log(`Created ${outputFile}`);

    })

    .on("error", (err) => {

    console.error(`Error occurred: ${err.message}`);

    })

    .run();

    }

    });

    }

    // Usage example

    const inputFilePath = path.join(__dirname, "input.mp3"); // Path to your input
    MP3 file

    const maxDuration = 600; // 10 minutes in seconds

    splitMP3(inputFilePath, maxDuration);

    Listing 5-3

    RESPONSE. Audio-splitter.js

    ```


    Our goal is quite simple: split an MP3 file into segments of a specified duration
    using JavaScript and FFmpeg. Each segment should be no longer than 10 minutes
    (which is 600 seconds). The entire process is managed using the fluent-ffmpeg
    library, which acts as a Node.js wrapper for FFmpeg, allowing us to handle audio
    and video processing efficiently.


    Of course, one of the first steps required is to ensure that you have FFmpeg installed
    and correctly configured. Our script uses ffmpeg-static to ensure the FFmpeg binary
    is packaged with the code. This avoids system-specific dependency issues. You
    can install your dependencies with the following command:


    ```

    npm install fluent-ffmpeg ffmpeg-static

    ```


    The main logic resides in the splitMP3() function, which takes two arguments:
    the path to the input MP3 file and the desired segment duration (in seconds).


    First, we use the ffmpeg.ffprobe() function to extract metadata from the input
    MP3 file, specifically its total duration. This is necessary because it lets us
    determine how many segments we need to create.


    If the output directory does not exist, we create it using Node.js’s fs module.
    This ensures that our segmented audio files have a dedicated destination folder.


    After running the script, the output folder will be populated with MP3 files,
    each no longer than 10 minutes in duration. If the input file is less than 10
    minutes, only one segment will be generated.'
  trans: "\n# Whisper 模型的功能与限制\n\nWhisper 模型能够将以下语言的语音音频转换为文本：\n\n- 南非荷兰语\n- 阿拉伯语\n\
    - 亚美尼亚语\n- 阿塞拜疆语\n- 白俄罗斯语\n- 波斯尼亚语\n- 保加利亚语\n- 加泰罗尼亚语\n- 中文\n- 克罗地亚语\n- 捷克语\n\
    - 丹麦语\n- 荷兰语\n- 英语（当然！）\n- 爱沙尼亚语\n- 芬兰语\n- 法语\n- 加利西亚语\n- 德语\n- 希腊语\n- 希伯来语\n\
    - 印地语\n- 匈牙利语\n- 冰岛语\n- 印度尼西亚语\n- 意大利语\n- 日语\n- 卡纳达语\n- 哈萨克语\n- 韩语\n- 拉脱维亚语\n\
    - 立陶宛语\n- 马其顿语\n- 马来语\n- 马拉地语\n- 毛利语\n- 尼泊尔语\n- 挪威语\n- 波斯语\n- 波兰语\n- 葡萄牙语\n- 罗马尼亚语\n\
    - 俄语\n- 塞尔维亚语\n- 斯洛伐克语\n- 斯洛文尼亚语\n- 西班牙语\n- 斯瓦希里语\n- 瑞典语\n- 他加禄语\n- 泰米尔语\n- 泰语\n\
    - 土耳其语\n- 乌克兰语\n- 乌尔都语\n- 越南语\n- 威尔士语\n\n因此，归根结底，它能够理解您自己说的音频，以及您的朋友和同事可能说的任何语言的音频。\n\
    \n开发者每分钟最多只能向 API 发送 50 个请求，因此如果您要转录大量音频，需要考虑此限制。\n\nWhisper 支持 `flac`、`mp3`、`mp4`、`mpeg`、`mpga`、`m4a`、`ogg`、`wav`\
    \ 或 `webm` 格式的音频。无论您使用哪种格式，发送到 API 的最大文件大小为 25MB。\n\n如果您没有大量处理过音频文件，请注意，某些格式会生成**非常大**的文件（例如\
    \ `wav` 格式），而其他格式会生成非常小的文件（例如 `m4a` 格式）。因此，将文件转换为其他格式可以帮助您应对 25MB 的限制。不过，在本章后面，我们将看到一个工具的代码，该工具可以获取单个大音频文件并将其分割成多个较小的文件。\n\
    \n## 使用 `OpenAI.audio.transcriptions.create()` 转录音频\n\n`OpenAI.audio.transcriptions.create()`\
    \ 方法将音频转换为文本，并且仅与 Whisper 模型兼容。让我们看看该方法需要哪些参数才能成功调用 API。\n\n### 检查方法参数\n\n**表\
    \ 5-1. Whisper 的请求体**\n\n| 字段 | 类型 | 是否必需 | 描述 |\n| --- | --- | --- | --- |\n\
    | `file` | 文件 | 必需 | 您想要转录的整个音频文件。接受的格式为：`flac`、`mp3`、`mp4`、`mpeg`、`mpga`、`m4a`、`ogg`、`wav`、`webm`\
    \ |\n| `model` | 字符串 | 必需 | 您想要用于转录的模型 ID。兼容的模型包括：`whisper-1` |\n| `prompt` |\
    \ 字符串 | 可选 | 可以提供任何文本来改变模型的转录风格，或为模型提供来自先前音频片段的更多上下文。为确保最佳效果，请确保提示与音频使用相同的语言。此外，此字段可用于更改\
    \ Whisper 不熟悉的任何单词的拼写或大小写。 |\n| `response_format` | 字符串（默认值：`json`） | 可选 | 这是转录输出的格式。接受的格式为：`json`、`text`、`srt`、`verbose_json`、`vtt`\
    \ |\n| `temperature` | 数字（默认值：`0`） | 可选 | 这是采样温度，范围从 0 到 1。较高的值会增加输出的随机性，而较低的值则确保输出更具确定性。\
    \ |\n| `language` | 字符串 | 可选 | 这是输入音频的语言。它是可选的，但提供该值可以提高转录的准确性和延迟 |\n\n## 创建用于分割音频文件的实用程序\n\
    \n那么，我们几乎已经能够使用转录端点以编程方式调用 Whisper 模型了。但是，Whisper 模型对每个文件有 25MB 的限制。\n\n现在，如果您收听的是例如德克萨斯大学奥斯汀分校的\
    \ StarDate 播客，这不成问题。这个播客大约有 2 分钟的音频，让您很好地了解夜空中应该寻找什么。但是，对于其他往往持续一小时（甚至更长时间）的音频节目来说，情况就不同了。在这种情况下，您肯定会超过\
    \ 25MB 的文件限制。\n\n因此，让我们与 ChatGPT 结对编程，利用我们的人类智慧创建我们自己的实用程序，该程序将获取单个音频文件并将其分割成多个较小的文件。\n\
    \n**注意：** 在本节中，我将介绍如何将大音频文件分割成较小片段的众多可能性之一。例如，您可以使用流行的音频编辑应用程序（例如开源工具 Audacity\
    \ 或授权工具 Adobe Audition）手动将大文件切割成较小的文件。\n\n`FFmpeg` 是以编程方式操作媒体文件最可靠的工具之一，并且由于它是开源的，因此使用它来满足我们的需求是合理的。\n\
    \n清单 5-2 是总结我们需要完成的任务的提示。\n\n```\n系统：你是一名 JavaScript 开发者\n用户：编写一个应用程序，该应用程序接收单个\
    \ MP3 文件作为输入，并使用 ffmpeg 库将该文件分割成不超过 10 分钟的连续片段。\n```\n\n**清单 5-2. 提示。使用 ChatGPT\
    \ 创建 AudioSplitter 应用程序**\n\n经过一番来回交流，我能够创建（如清单 5-3 所示）`audiosplitter` 应用程序，其中包含我对\
    \ ChatGPT 生成内容的编辑。\n\n```\nconst ffmpeg = require(\"fluent-ffmpeg\");\nconst ffmpegPath\
    \ = require(\"ffmpeg-static\");\nconst path = require(\"path\");\nconst fs = require(\"\
    fs\");\n\n// 配置 ffmpeg 使用静态二进制文件\nffmpeg.setFfmpegPath(ffmpegPath);\n\n// 分割 MP3\
    \ 文件的函数\nfunction splitMP3(inputFile, duration) {\n    ffmpeg.ffprobe(inputFile,\
    \ (err, metadata) => {\n        if (err) {\n            console.error(`发生错误：${err.message}`);\n\
    \            return;\n        }\n        const totalDuration = metadata.format.duration;\n\
    \        const numberOfChunks = Math.ceil(totalDuration / duration);\n       \
    \ const outputDir = path.join(__dirname, \"output\");\n\n        if (!fs.existsSync(outputDir))\
    \ {\n            fs.mkdirSync(outputDir);\n        }\n\n        for (let i = 0;\
    \ i < numberOfChunks; i++) {\n            const startTime = i * duration;\n  \
    \          const outputFile = path.join(outputDir, `output_${i + 1}.mp3`);\n\n\
    \            ffmpeg(inputFile)\n                .setStartTime(startTime)\n   \
    \             .setDuration(duration)\n                .output(outputFile)\n  \
    \              .on(\"end\", () => {\n                    console.log(`已创建 ${outputFile}`);\n\
    \                })\n                .on(\"error\", (err) => {\n             \
    \       console.error(`发生错误：${err.message}`);\n                })\n          \
    \      .run();\n        }\n    });\n}\n\n// 使用示例\nconst inputFilePath = path.join(__dirname,\
    \ \"input.mp3\"); // 输入 MP3 文件的路径\nconst maxDuration = 600; // 10 分钟（以秒为单位）\n\
    splitMP3(inputFilePath, maxDuration);\n```\n\n**清单 5-3. 响应。Audio-splitter.js**\n\
    \n我们的目标很简单：使用 JavaScript 和 FFmpeg 将一个 MP3 文件分割成指定时长的片段。每个片段不应超过 10 分钟（即 600 秒）。整个过程使用\
    \ `fluent-ffmpeg` 库进行管理，该库充当 FFmpeg 的 Node.js 封装器，使我们能够高效地处理音频和视频处理。\n\n当然，首要步骤之一是确保您已安装并正确配置了\
    \ FFmpeg。我们的脚本使用 `ffmpeg-static` 来确保 FFmpeg 二进制文件与代码打包在一起。这避免了特定于系统的依赖性问题。您可以使用以下命令安装依赖项：\n\
    \n```\nnpm install fluent-ffmpeg ffmpeg-static\n```\n\n主要逻辑位于 `splitMP3()` 函数中，该函数接受两个参数：输入\
    \ MP3 文件的路径和所需的片段时长（以秒为单位）。\n\n首先，我们使用 `ffmpeg.ffprobe()` 函数从输入 MP3 文件中提取元数据，特别是其总时长。这是必要的，因为它让我们确定需要创建多少个片段。\n\
    \n如果输出目录不存在，我们使用 Node.js 的 `fs` 模块创建它。这确保了我们分割后的音频文件有一个专用的目标文件夹。\n\n运行脚本后，输出文件夹将填充\
    \ MP3 文件，每个文件的时长不超过 10 分钟。如果输入文件少于 10 分钟，则只会生成一个片段。\n"
- fmt: '# Creating the Audio Transcriber with Whisper


    Now, let’s build our next JavaScript app, which will use the Whisper model to
    create transcriptions of audio. Again, we’re going to pair-program with ChatGPT
    to get a basis to work with.


    Listing [5-4](#625846_1_En_5_Chapter.xhtml#PC5) is the prompt to put in the Chat
    Playground to get things started. Be sure to note that I’m asking for a 60-sec
    HTTP request timeout since Whisper may take a little while to generate the transcript.


    ```

    System: You are a JavaScript developer.

    User: Using JavaScript, write a script that iterates over all of the mp3 files
    in a single folder on my local computer and send all the files in the folder to
    the webservice provided by OpenAI''s Whisper model, using the OpenAI''s node.js
    library.

    Model: gpt-4

    Temperature: 1

    Maximum Length: 1150

    Listing 5-4

    PROMPT: Asking ChatGPT to Use OpenAI’s JavaScript Library and Send MP3 Files to
    Whisper’s API

    ```


    After some back and forth, here’s the response ChatGPT gave us that worked (Listing
    [5-5](#625846_1_En_5_Chapter.xhtml#PC6)):


    ```

    A black and white geometric logo featuring an interlocking, symmetrical design
    resembling a knot or woven pattern.

    const fs = require("fs");

    const path = require("path");

    const { OpenAI } = require("openai");

    // Set up the OpenAI client with your API key

    const openai = new OpenAI({

    apiKey: process.env.OPENAI_API_KEY,

    });

    // Function to read and transcribe .mp3 files in a directory

    async function transcribeMP3Files(directory) {

    try {

    // Read the directory

    const files = fs.readdirSync(directory);

    // Filter out .mp3 files

    const mp3Files = files.filter((file) => path.extname(file) === ".mp3");

    // Process each .mp3 file

    for (const file of mp3Files) {

    const filePath = path.join(directory, file);

    // Read the .mp3 file

    const fileData = fs.readFileSync(filePath);

    // Send the file to OpenAI''s Whisper

    const response = await openai.transcriptions.create({

    file: fileData,

    model: "whisper-1",

    });

    // Output the transcription

    console.log(`Transcription for ${file}:`);

    console.log(response.data.text);

    }

    } catch (error) {

    console.error("Error processing files:", error);

    }

    }

    // Set the directory to read from

    const directoryPath = "./mp3-files";

    // Run the transcription function

    transcribeMP3Files(directoryPath);

    Listing 5-5

    RESPONSE: WhispeR TRANSCRIBER Script

    ```


    ## Having a Little Fun and Trying Things Out with a Podcast


    Ok, so let’s run a test using the code that we have presented so far. “This American
    Life” is a weekly public radio program (and also a podcast) that’s hosted by Ira
    Glass and produced in collaboration with WBEZ Chicago.


    Each episode weaves together a series of stories centered around a specific theme
    or topic. Some stories are investigative journalism, and others are simply interviews
    with ordinary people with captivating stories. Episode 811 is entitled, “The one
    place I can’t go,” and the file is 56MB in MP3 format. Since we already know that
    56MB is way too big to send to Whisper to get transcribed, let’s run our tools
    to break up the audio file and transcribe the individual segments.


    Listing [5-6](#625846_1_En_5_Chapter.xhtml#PC7) shows an excerpt from the full
    transcript of the episode.


    ```

    "...My younger cousin Camille is not really a dog person, but there is one dog
    she adored. Her name was Foxy, because she looked exactly like a fox, except she
    was black. She was the neighbor''s dog, but she and Camille seemed to have a real
    kinship, maybe because they both weren''t very far from the ground. Camille was
    around four or five years old back then, and she had a little lisp, so Foxy came
    out as Fozzie. I thought it was one of the cutest things I''d ever heard.

    The way Camille remembers Foxy, it''s almost like a movie. Her memories feel like
    endless summer, hazy and perfect, like a scene shot on crackly film. I just remembered
    like the feeling of being excited to go and see Foxy. I have an image in my head
    of like coming to the house, and I could see Foxy was like outside. I can see
    Foxy through the door that leads to the garden. There''s a story about Camille
    and Foxy that I think about fairly often. I''ve talked about it with my sister
    for years, but never with Camille. And it''s this. Once when they were playing..."

    Listing 5-6

    The Partial Transcript of Episode 811 of This American Life

    ```


    For brevity, we’re only showing an excerpt of the transcript. The full transcript
    itself is over 8000 words due to the fact that the episode is nearly 1 hr in length.


    ## Going Meta: Prompt Engineering `gpt-4o-mini` to Write a Prompt for DALL·E


    Since the full text transcript of the podcast episode that we want to visualize
    is thousands of words, we’re going to use `gpt-4o-mini` to automatically create
