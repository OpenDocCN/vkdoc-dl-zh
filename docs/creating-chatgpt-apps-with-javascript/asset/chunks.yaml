  trans: '

    #### 针对 Linux 系统


    要为当前会话设置环境变量，请打开终端窗口并使用 `export` 命令。将 `“your-api-key-here”` 替换为你的实际 API 密钥。


    ```

    export OPENAI_API_KEY=''your-api-key-here''

    清单 2-1

    在 Linux 硬盘上添加环境变量

    ```


    要使环境变量在会话间持久化，你可以将其添加到 shell 的配置文件中，例如 Bash 的 `~/.bashrc`。具体操作如下：


    在文本编辑器中打开配置文件。例如：


    ```

    nano ~/.bashrc

    ```


    在文件末尾添加以下行：


    ```

    export OPENAI_API_KEY=''your-api-key-here''

    ```


    保存文件并退出文本编辑器。


    要立即应用更改，你可以关闭并重新打开终端，或者运行：


    ```

    source ~/.bashrc

    ```


    要验证环境变量是否设置正确，你可以在终端中 `echo` 其值。此命令应显示你的 API 密钥：


    ```

    echo $OPENAI_API_KEY

    ```


    ### 选项 #2：创建 .env 文件


    使用系统级环境变量非常适合让机器上运行的任何应用程序或脚本都能访问 API 密钥。但是，如果你的用例更简单一些，我们可以简单地创建一个仅在特定程序或脚本范围内可访问的局部变量。这在不同项目需要不同密钥的情况下也很有用，因此可以防止密钥使用冲突。让我们直接开始吧！


    我们将首先创建一个本地的 `.env` 文件。此文件将保存你的 API 密钥，确保它仅被指定的项目使用。导航到你打算创建 `.env` 文件的项目文件夹。


    **注意**


    为防止你的 `.env` 文件通过版本控制被意外共享，请在项目的根目录中创建一个 `.gitignore` 文件。添加一行 `.env` 以确保你的 API
    密钥和其他敏感信息的机密性。


    接下来，使用终端或 IDE 创建 `.gitignore` 和 `.env` 文件。复制你的 API 密钥，并将 `“your-api-key-here”`
    替换为你的实际 API 密钥（不带单引号）。


    此时，你的 `.env` 文件应如下所示：


    ```

    OPENAI_API_KEY=''your-api-key-here''

    ```


    最后，你可以使用以下代码片段将 API 密钥导入到你的 Node.js 代码中：


    ```

    import OpenAI from "openai";

    import "dotenv/config";

    // 创建一个新的 OpenAI 客户端

    const openai = new OpenAI({

    apiKey: process.env["OPENAI_API_KEY"],

    });

    清单 2-2

    将 .env 文件导入到你的 Node.js 应用程序中

    ```


    当然，如果你还没有安装 `dotenv` 包，你需要安装它。只需执行：


    ```

    npm install dotenv

    ```


    ### 选项 #3：在应用程序中直接硬编码 API 密钥（请谨慎使用）


    出于安全原因，不推荐长期使用最后这种方法。但是，为了了解其工作原理，我们将介绍如何将 API 密钥硬编码到你的应用程序中，以便快速测试你的 API 密钥是否正常工作。


    首先，你需要在 JavaScript 代码中将 API 密钥赋值给一个变量。将 `“YOUR_API_KEY”` 替换为你从 OpenAI 收到的实际 API
    密钥。确保此 API 密钥保持安全，不要公开共享。


    接下来，你需要在 Node.js 脚本中初始化 OpenAI 客户端。这是通过实例化 `OpenAI` 类并将 `api_key` 参数设置为 API 密钥来完成的。通过在初始化时提供
    API 密钥，你可以使 OpenAI 客户端能够访问 OpenAI API 提供的服务。此步骤确保你的 Node.js 脚本可以使用指定的 API 密钥与
    OpenAI API 进行通信。


    ```

    import OpenAI from "openai";

    import "dotenv/config";

    const API_KEY = "YOUR_API_KEY";

    const openai = new OpenAI({

    apiKey: API_KEY,

    });

    清单 2-3

    将 API 密钥直接编码到你的应用程序中

    ```


    现在，让我们使用 OpenAI API 创建我们的第一个应用程序，并通过获取 OpenAI API 中可用模型的列表来同时测试密钥。


    **注意**


    从现在开始，代码示例将通过本地的 `.env` 文件访问我们的 API 密钥。


    ## 创建你的第一个 JavaScript ChatGPT 应用程序：list-models


    实际上，我们将在这里同时完成两项任务。我们将使用 OpenAI API 创建一个基本的 Node.js 脚本，并在此过程中验证我们是否已正确获取 API 密钥。所以，不言而喻，如果你还没有这样做，请按照第
    1 章的说明创建你的 OpenAI 开发者帐户并获取你的 API 密钥。接下来，本书中的所有代码示例都需要一个有效的 API 密钥。


    ## 使用 `openai.models.list()` 获取可用模型列表


    最基本（但也至关重要）的功能之一是我们能够获取可用模型的列表。你可能会问，为什么？ChatGPT 网站只公开了少数几个可用模型，而 Playground 则增加了更多可供使用的模型。然而，通过调用
    `openai.models.list()`，你会得到一个指定了每个模型名称的列表，而且有很多可供选择！


    ### 处理响应


    **注意**


    由于对象可以包含数组（这很难在表格中表示），我们使用以下符号 “↳” 来表示数组的元素。从表 2-1 中可以看出，`“id”`、`“object”`、`“created”`
    和 `“owned_by”` 都是响应中 `“data”` 数组的元素。


    **表 2-1**


    模型对象的结构


    | 字段 | 类型 | 描述 |

    | --- | --- | --- |

    | `object` | 字符串 | 始终返回字面量 `“list”` |

    | `data` | 数组 | OpenAI 提供的 AI 模型数组 |

    | `↳ id` | 字符串 | AI 模型的唯一 ID，本质上是模型的完整名称 |

    | `↳ object` | 字符串 | 始终返回字面量 `“model”` |

    | `↳ created` | 整数 | 模型的创建日期 |

    | `↳ owned_by` | 字符串 | 拥有该模型的组织名称 |


    现在我们有了模型对象的详细信息，让我们讨论一下如何测试我们在第一章中获得的 API 密钥。实际上有几种方法可以做到这一点。

