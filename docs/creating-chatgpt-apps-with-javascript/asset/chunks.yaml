    ## Prompt Engineering 101: Text Summarization


    So, needless to say, no one wants to spend their day constantly scrolling through
    Slack channels reading about issues and problems that are on fire. We’re going
    to utilize the capabilities of ChatGPT for text summarization. To keep things
    simple, let’s try a few prompts to send the entire listing of the chat messages
    to ChatGPT in order for it to give us a usable summary of all the events that
    have happened.


    Note


    Please be aware the ChatGPT is nondeterministic. This simply means that even if
    you executed the same prompt with the same settings multiple times, you won’t
    necessarily get a word-for-word response as shown in the listings in this chapter.
    However, they should be quite similar.


    ### Prompt #1: “tl;dr”


    This prompt is short, sweet, and to the point. In case you’re not familiar with
    it, it’s a term used online frequently to briefly summarize a long article. It
    literally stands for “Too Long; Didn’t Read,” which is how I feel about a lot
    of conversations on Slack when I’m swamped with work. Conveniently, ChatGPT can
    understand this simple term (I wouldn’t necessarily call it a word) as a prompt,
    and the results are pretty impressive.


    ```

    System: You are a helpful assistant

    User:  Fatima [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...

    User: Tl;dr

    Model: gpt-4o

    Temperature: 1

    Maximum length: 360

    Top P: 1

    Frequency penalty: 0

    Presence penalty: 0

    Listing 4-2

    PROMPT. Asking for a Summarized Version of a Longer Conversation

    ```


    Notice how the number of tokens is kept small, at 360, which will ultimately help
    ChatGPT to create a short response. Also see that the temperature is left at 1
    (the default value), but the Top P is increased all the way to its maximum (which
    is 1). Therefore, it’s important to play around with temperature and other settings
    to control the tone and variety of ChatGPT’s responses.


    Listing [4-3](#625846_1_En_4_Chapter.xhtml#PC3) shows ChatGPT’s summarization
    of the conversation from Listing [4-1](#625846_1_En_4_Chapter.xhtml#PC1).


    ```

    A black and white abstract logo featuring an interwoven, symmetrical pattern resembling
    a knot or a flower with six loops.

    The team quickly responds to a client''s app crashing issue. John investigates
    the codebase while Fatima gathers information from the client. They discover a
    compatibility issue with iOS 15.1 and John fixes it. The patch is reviewed and
    approved, and the app is updated in the store. The client is informed and grateful
    for the quick resolution. The team is praised for their collaboration and prompt
    action.

    Listing 4-3

    RESPONSE. Getting a Summarized Version of a Very Long Conversation

    ```


    That’s fantastic! It reduced that extremely long conversation down to a simple
    and brief summary of only 68 words. As you can see, ChatGPT is not replacing a
    job here; however, it will definitely make someone more productive. Now, let’s
    try a few more prompts, shall we?'
