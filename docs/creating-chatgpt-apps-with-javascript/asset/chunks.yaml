- fmt: '# Making Our Content Moderator Bot More Intelligent


    Now that we have an improved `chatGPTClient.js` script that is capable of moderating
    content using both a Chat and a Moderation model, let’s examine the changes made
    to our Discord Bot for Content Moderation.


    Listing [8-3](#625846_1_En_8_Chapter.xhtml#PC4) is the full source code for our
    intelligent Discord Moderator Bot.


    ```javascript

    // Require the necessary discord.js classes

    const { Client, Events, GatewayIntentBits } = require("discord.js");

    const { ChatGPTClient } = require("./chatGPTClient");

    const fs = require("node:fs");

    require("dotenv").config();

    const systemMessage = `

    You are the automated moderator assistant for a Discord server.

    Review each message for the following rule violations:

    1\. Sensitive information

    2\. Abuse

    3\. Inappropriate comments

    4\. Spam, for example; a message in all capital letters, the same phrase or word
    being repeated over and over, more than 3 exclamation marks or question marks.

    5\. Advertisement

    6\. External links

    7\. Political messages or debate

    8\. Religious messages or debate

    If any of these violations are detected, respond with "FLAG" (in uppercase without
    quotation marks). If the message adheres to the rules, respond with "SAFE" (in
    uppercase without quotation marks).

    `;

    const instructions = "Analyze the following message for rule violations:";

    const chatGPTClient = new ChatGPTClient(systemMessage, instructions);

    // Create a new client instance

    const discordClient = new Client({

    intents: [

    GatewayIntentBits.MessageContent,

    GatewayIntentBits.GuildMessages,

    GatewayIntentBits.Guilds,

    ],

    });

    discordClient.once(Events.ClientReady, (readyClient) => {

    console.log(`Ready! Logged in as ${readyClient.user.tag}`);

    });

    discordClient.on(Events.MessageCreate, async (message) => {

    if (discordClient.user.username === message.author.username) return;

    console.log("User is:", message.author.globalName);

    console.log("Message is:", message.content);

    const chatGPTResponse = await chatGPTClient.sendMessageFromDiscord(

    message.content

    );

    const isFlagged = await chatGPTClient.isFlagged(message.content);

    if (chatGPTResponse === "FLAG" || isFlagged) {

    if (!(await message.delete())) {

    console.log("Failed to delete message");

    } else {

    const authorMention = `${mention(message.author)}`;

    const reply = `${authorMention} This comment was deemed inappropriate for this
    channel.\nIf you believe this to be in error, please contact one of the human
    server moderators.`;

    await message.channel.send(reply);

    }

    }

    });

    function mention(author) {

    return ``;

    }

    // Log in to Discord with your client''s token

    discordClient.login(process.env.DISCORD_BOT_API_TOKEN);

    ```


    *Listing 8-3: Our Improved Content Moderator Bot*


    ## Important Changes to Note from the Previous Version of the Content Moderator
    Bot


    Let’s briefly take a look at Content Moderator Discord Bot from Listing [8-3](#625846_1_En_8_Chapter.xhtml#PC4)
    and discuss the changes that were made. The code snippet below contains a portion
    of the class definition section.


    ```javascript

    const systemMessage = `

    You are the automated moderator assistant for a Discord server.

    Review each message for the following rule violations:

    1\. Sensitive information

    2\. Abuse

    3\. Inappropriate comments

    4\. Spam, for example; a message in all capital letters, the same phrase or word
    being repeated over and over, more than 3 exclamation marks or question marks.

    5\. Advertisement

    6\. External links

    7\. Political messages or debate

    8\. Religious messages or debate

    If any of these violations are detected, respond with "FLAG" (in uppercase without
    quotation marks). If the message adheres to the rules, respond with "SAFE" (in
    uppercase without quotation marks).

    `;

    const instructions = "Analyze the following message for rule violations:";

    const chatGPTClient = new ChatGPTClient(systemMessage, instructions);

    ```


    So, as we stated previously in this book, proper prompt engineering requires you
    to use multiple parameters, including the “system message” to the system itself.
    Here, we’re telling the Chat model all the types of information that we don’t
    want posted in our Discord server.


    We hope you can understand the reason why our Discord Moderator Bot needs to use
    both a Chat model as well as a Moderation model from OpenAI. The Moderation models
    work fine "out of the box" for basic content moderation; however, since our use
    case is for a bank, we want to take extra precautions in order to prevent our
    customers from being targeted by unscrupulous individuals through our Discord
    server.


    ### Updates to the `discordClient.on()` Function


    After a message is received in any channel of the Discord server, the `discordClient.on()`
    function is invoked. Here’s the most important change to be aware of:


    ```javascript

    discordClient.on(Events.MessageCreate, async (message) => {

    ...

    const chatGPTResponse = await chatGPTClient.sendMessageFromDiscord(

    message.content

    );

    const isFlagged = await chatGPTClient.isFlagged(message.content);

    if (chatGPTResponse === "FLAG" || isFlagged) {

    if (!(await message.delete())) {

    console.log("Failed to delete message");

    } else {

    const authorMention = `${mention(message.author)}`;

    const reply = `${authorMention} This comment was deemed inappropriate for this
    channel.\nIf you believe this to be in error, please contact one of the human
    server moderators.`;

    await message.channel.send(reply);

    }

    }

    });

    ```


    Here, we take each message that was posted in the Discord server and check it
    with both Chat and Moderation models. If either model informs us that the message
    is flagged, then we delete the message in the channel and inform the user that
    their message violated the rules.


    Now that our Content Moderator Discord bot is intelligent, let’s give it a try!


    ## Running Our Intelligent Content Moderator Bot


    Now let’s run our new and improved Content Moderator Discord bot. After executing
    the app, be sure to return back to your Discord server and start asking questions.
