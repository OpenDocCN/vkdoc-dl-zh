  trans: '

    ### 查看 OAuth 与权限页面


    如图 4-6 所示，导航至 `OAuth & Permissions` 页面，并点击“安装到工作区”按钮。


    ![](img/625846_1_En_4_Fig6_HTML.jpg)


    Slack API 界面展示了“OAuth 与权限”部分。页面突出显示了“通过令牌轮换实现高级令牌安全”，建议开发者使用令牌轮换以确保安全。一条通知提示必须设置重定向
    URL 才能进行令牌轮换。页面上有用于 OAuth 令牌的“选择加入”和“安装到工作区”按钮。侧边栏包含基本设置、协作者和传入 Webhook 等设置和功能。


    图 4-6


    OAuth 与权限界面


    ### 将 Slack 机器人应用安装到你的工作区


    既然所有权限都已请求完毕，现在可以将你的机器人安装到工作区了。在安装过程中，你应该会看到如图 4-7 所示的界面。


    ![](img/625846_1_En_4_Fig7_HTML.jpg)


    Slack 权限请求界面，请求“Tester Bot”访问“Apress Book Testing”工作区。该机器人请求查看频道、对话和工作区内容及信息的权限。提供了“取消”或“允许”选项。顶部横幅显示该应用由工作区成员创建。


    图 4-7


    “安装”一个新的 Slack 机器人应用


    点击 `Allow` 按钮以授权机器人，并允许你在上一步中分配的权限。


    **注意**


    理解此处“安装”的含义非常重要。在传统的 JavaScript 语境中，安装应用意味着将你的代码和依赖项复制到另一台机器上并执行。但这里的情况并非如此。


    在这里，当你“安装”一个机器人应用时，你是在允许你的 Slack 工作区让一个应用加入该工作区——仅此而已。你的机器人代码将在你自己的机器上运行，而不是在
    Slack 的服务器上。


    ### 获取你的 Slack 机器人（访问）令牌


    这次，“令牌”实际上指的是访问令牌！为了以编程方式连接到 Slack API 并访问消息和用户信息，你需要一个为你的 Slack 机器人生成的特定 OAuth
    令牌。


    ![](img/625846_1_En_4_Fig8_HTML.jpg)


    Slack API 界面展示了“OAuth 与权限”部分。页面突出显示了“通过令牌轮换实现高级令牌安全”，建议开发者选择加入以增强安全性。一条警告指出，在启用令牌轮换之前，必须至少设置一个重定向
    URL。页面上有一个“选择加入”按钮。下方，“你的工作区的 OAuth 令牌”区域显示了一个模糊处理的机器人用户 OAuth 令牌，并提供了复制令牌或重新安装到工作区的选项。左侧边栏包含基本设置、协作者和事件订阅等设置和功能。


    图 4-8


    为你的 Slack 机器人应用复制 OAuth 令牌


    回到 `OAuth & Permissions` 页面，请务必从此页面复制机器人令牌（通常以 `xoxb-` 开头），如图 4-8 所示。


    ### 将你的机器人邀请到频道中


    接下来，你需要进入想要用来测试机器人的频道，并在该频道中输入以下命令。


    ```

    /invite

    ```


    选择“将应用添加到此频道”选项，然后选择你之前在 Slack 注册机器人时指定的 Slack 机器人名称。


    ![](img/625846_1_En_4_Fig9_HTML.jpg)


    Slack 界面显示了命令“/invite”的搜索结果。下拉菜单提供了三个选项：“邀请某人加入此频道”、“邀请新成员加入此工作区”和“将应用添加到此频道”，最后一个选项以蓝色高亮显示。


    图 4-9


    将你的 Slack 机器人添加到频道


    恭喜！你现在已成功向 Slack 注册了一个 Slack 机器人应用，使其能够读取你工作区中的消息，并将该 Slack 机器人添加到了一个频道中。在我们编写
    JavaScript 代码来访问工作区中的频道之前，我们需要知道 Slack 为我们的频道使用的内部 ID。


    ## 查找你频道的频道 ID


    好的，这一步很简单。在 Slack 中，右键点击你的频道名称，然后选择“查看频道详情”选项。弹出窗口的底部就是你的频道 ID。复制该编号并保存以备后用。你的
    JavaScript 应用将需要它来加入 Slack 工作区中的正确频道。


    ## 使用你的 Slack 机器人应用自动抓取频道中的消息


    好了，既然我们已经完成了所有准备工作，并且知道了频道的 ID，那么让我们开始编写 JavaScript 代码，用于访问特定 Slack 频道中的所有消息。

    '
- fmt: '### Programmatically Reading Messages from Slack


    First things first, you need to install the official JavaScript Slack library.
    Below is the `npm` command to install all the necessary dependencies:


    ```

    npm install @slack/web-api @slack/events-api dotenv

    ```


    Listing [4-10](#625846_1_En_4_Chapter.xhtml#PC12) is a simple JavaScript Slack
    Bot that obtains the user name, timestamp, and message content of each posting
    in the designated channel.


    ```

    import { WebClient } from "@slack/web-api";

    import "dotenv/config";

    const token = process.env.SLACK_API_TOKEN;

    const channel_id = process.env.SLACK_CHANNEL_ID;

    async function main() {

    const web = new WebClient(token);

    // Store conversation history

    let conversationHistory;

    // ID of channel you watch to fetch the history for

    try {

    // Call the conversations.history method using WebClient

    const result = await web.conversations.history({

    channel: channel_id,

    limit: 50,

    });

    // Get the messages in the order they were sent.

    conversationHistory = result.messages.reverse();

    // Print results

    for (const message of conversationHistory) {

    const userInfo = await web.users.info({ user: message.user });

    // Convert the timestamp into a date

    const timestamp = new Date(parseFloat(message.ts) * 1000);

    if (userInfo.ok) {

    console.log(userInfo.user.name + "[" + timestamp + "]" + message.text);

    console.log("\n");

    }

    }

    } catch (error) {

    console.error(error);

    }

    }

    main();

    Listing 4-10

    Our JavaScript Slack Bot

    ```


    Let’s walk through this code together.


    First, we import essential dependencies required for interfacing with the Slack
    API and loading environment variables.


    Next, we define two crucial variables: the `token`, which is fetched from the
    environment variable `SLACK_API_TOKEN`, and the `channel_id`, obtained from `SLACK_CHANNEL_ID`.
    These variables are necessary for authenticating with the Slack API and specifying
    the Slack channel’s history we want to retrieve.


    We then define an asynchronous `main` function where the core logic of our script
    resides. Within this function, we initialize the `WebClient` using our Slack API
    token to enable API calls. We also declare a variable `conversationHistory` to
    store the messages retrieved from the channel.


    The premise of the script is simple; it retrieves the last 50 messages from the
    Slack channel by calling the `conversations.history()` method of the Slack API.


    After successfully fetching the messages, the script reverses their order using
    `.reverse()` to ensure they are processed from oldest to newest, and then prints
    each message.


    Listing [4-11](#625846_1_En_4_Chapter.xhtml#PC13) shows the result of running
    the Slack Bot script.


    ```

    Fatima [2023-08-11T09:04:20] : Hey everyone, I have an urgent issue to discuss.
    I just got off a call with a client who''s experiencing app crashes as soon as
    they load it. They''re really frustrated. Can we get this sorted ASAP? :tired_face:

    Keith [2023-08-11T09:04:35] : Thanks for bringing this to our attention, Fatima.
    Let''s jump on this right away. John, can you take the lead in investigating the
    issue since our architect is out sick today?

    John [2023-08-11T09:04:52] : Sure thing, Keith. I’ll dive into the codebase and
    see if I can find any potential culprits for the crashes.

    John [2023-08-11T09:05:30] : Fatima, could you gather some additional information
    from the client? Ask them about the specific device, operating system, and any
    recent updates they might have installed.

    ...

    Listing 4-11

    The Output from Executing Our Channel Reader Slack Bot

    ```


    ## Exercises Left for the Reader


    So, there are obviously a few additional things we can do here, and these steps
    will be left for you (the reader) to accomplish, for example:


    *   Connecting the code that reads the messages from Slack to the our ChatGPT
    client in the previous chapter so that grabbing the messages and getting a summary
    is a single step process.


    *   Adding more capabilities to the Slack bot itself such as adding commands so
    that anyone in the channel can request a summary. In its current state, the bot
    doesn’t post anything in the channel. However, the “user interface” to the bot
    is the channel itself; therefore, someone should be able to interact with the
    Slack bot by typing a command (such as requesting a summary).


    *   Making sure that the bot doesn’t make a bad situation worse. Whenever the
    bot provides a summary, it should not post in the channel itself because that
    could add a lot of noise to an already noisy situation. The best practice is to
    have the bot send a private message to the person asking for a summary (or whatever
    new command that you create).


    ## Conclusion


    In this chapter, we talked about one of the various ways artificial intelligence
    can be put to practical use within the enterprise today. We discussed what is
    truly “prompt engineering,” by discussing that prompt engineering cannot be accomplished
    by simply textual input to ChatGPT alone. You definitely need to understand the
    ramifications of all the input parameters to the ChatGPT API, in order to properly,
    and effectively, perform prompt engineering.


    Using what we learned about prompt engineering, we were able to successfully obtain
    summarizations of any large body of text provided to us. Finally, we saw the code
    necessary in order to run an automated bot that will grab messages from any Slack
    channel programmatically.


    In this chapter (as well as the previous chapter), we were working exclusively
    with the Chat Completions Endpoint of the OpenAI APIs. In the next chapter, we’re
    going to push the boundaries of what’s possible by experimenting with the Whisper
    and DALL-E Endpoints.'
