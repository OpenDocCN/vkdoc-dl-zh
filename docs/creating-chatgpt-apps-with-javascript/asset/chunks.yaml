    \ and frameworks (like Angular, Vue) which facilitate easier and faster development.\n\
    6\\. JSON: JavaScript Object Notation (JSON) is a light-weight data interchange\
    \ format that is easy for humans to read and write. It is easy for machines to\
    \ parse and generate. This makes JavaScript particularly useful for APIs and configurations.\n\
    7\\. Community and resources: JavaScript has a large and active developer community,\
    \ which means there are plenty of resources, tutorials, and third-party plugins\
    \ available. This can make problem-solving and learning easier.\n8\\. Real-time\
    \ feedback: JavaScript allows for real-time feedback on websites. This is critical\
    \ for tasks like form validation where you want to give feedback immediately,\
    \ not after a page reload.\n9\\. It's evolving: JavaScript is constantly evolving\
    \ and new features are added regularly, making it an exciting language to work\
    \ with.\n清单 3-5\nChatGPT 解释为什么 JavaScript 如此出色\n```\n\n因此，当我们简要查看清单 3-5 时，我们看到响应（称为\
    \ `ChatCompletion`）是我们在本章开头向 ChatGPT 提出的问题的答案。然而，我们的响应周围有很多元数据，让我们更详细地分析 `ChatCompletion`\
    \ 对象。\n\n### 处理响应（`ChatCompletion`）\n\n**表 3-6**  \n`ChatCompletion` 对象响应的结构\n\
    \n| 字段 | 类型 | 描述 |\n| --- | --- | --- |\n| `id` | `String` | `ChatCompletion`\
    \ 的唯一标识符 |\n| `choices` | `Array` | `ChatCompletion` 选项的列表。如果表 3-1 中的“n”大于 1，则响应中可能有多个选项\
    \ |\n| `↳ finish_reason` | `String` | 每个响应都会包含一个 `finish_reason`。`finish_reason`\
    \ 的可能值为：`stop`：API 返回了完整消息，或由通过 `stop` 参数提供的停止序列之一终止的消息 `length`：由于请求中的 `max_tokens`\
    \ 参数或模型本身的令牌限制，模型输出不完整 `tool_call`：模型调用了工具，例如函数 `content_filter`：由于违反内容过滤器，响应被终止\
    \ `null`：API 响应仍在进行中或不完整 |\n| `↳ index` | `Integer` | 选项在选项列表中的索引 |\n| `↳ message`\
    \ | `Object` | 模型生成的 `ChatCompletionMessage`。这在表 3-6 中有更详细的解释 |\n| `↳ logprobs`\
    \ | `Object` 或 `Null` | 选项的对数概率信息 |\n| `model` | `String` | 用于 `ChatCompletion`\
    \ 的模型 |\n| `system_fingerprint` | `String` | 如果您想从之前的对话中获得可重现的结果，请在后续请求中使用此参数作为“种子”\
    \ |\n| `object` | `String` | 此字段始终返回字面量 `\"chat.completion\"` |\n| `usage` | `Object`\
    \ | 完成请求的使用统计信息 |\n| `↳ completion_tokens` | `Integer` | 生成的完成中的令牌数量 |\n| `↳ prompt_tokens`\
    \ | `Integer` | 提示中的令牌数量 |\n| `↳ total_tokens` | `Integer` | 请求中使用的令牌总数，包括提示和完成\
    \ |\n\n`ChatCompletion` 对象中最重要的项是 `ChatCompletionMessage`，它在表 3-7 中有更详细的解释。\n"
- fmt: '### `ChatCompletionMessage`


    **Table 3-7** The Structure of the `ChatCompletionMessage`


    | Field | Type | Description |

    | --- | --- | --- |

    | `role` | `String` | This will always be the literal, “assistant” |

    | `content` | `String` or `null` | This is a `String` that contains the response
    from ChatGPT to our request |

    | `tool_calls` | `Array` | If you indicated in Table [3-1](#625846_1_En_3_Chapter.xhtml#Tab1)
    that you want ChatGPT to call a tool (which is currently a function), then this
    list will exist in the `ChatCompletionMessage` |

    | `↳ id` | `String` | This is the ID of the tool called by ChatGPT |

    | `↳ type` | `String` | This is the type of the tool called by ChatGPT. Only the
    literal, “function,” is a valid tool |

    | `↳ function` | `Object` | This is the function and the parameters that the model
    called |


    ## Conclusion


    In this chapter, we took our experiences from Chapters [1](#625846_1_En_1_Chapter.xhtml)
    and [2](#625846_1_En_2_Chapter.xhtml) and created a fully functioning ChatGPT
    client in JavaScript. In the code for our ChatGPT client, we saw some terms that
    we were already introduced to from the Chat Playground such as the `model`, `messages`,
    `temperature`, and `tokens`.


    We also saw that, as JavaScript developers, OpenAI gives us a **TON OF ADDITIONAL
    OPTIONS** to invoke ChatGPT that aren’t available to average everyday users or
    even to technical people who use the Chat Playground. In this chapter we took
    the time to explain these options, with a focus on the `messages` that we can
    send.


    Now that we have a working ChatGPT client in JavaScript, let’s see how to leverage
    it for the rest of the examples in the book!


    # 4. Using AI in the Enterprise! Creating a Text Summarizer for Slack Messages


    In today’s corporate world, it’s extremely common for companies to have an instance
    of Slack (or Microsoft Teams) to organize themselves and use it as a central place
    of communication to everyone in the company. Now, if you’ve ever used Slack before,
    I think you know how easily a channel can become flooded with a ton of messages
    because **SOME** important thing happened **SOMEWHERE** in the company or the
    world.


    Of course, the more responsibility that you have within the company (i.e., manager,
    team leader, architect, etc.), the more channels you’re expected to participate
    in. In my opinion, Slack is a double-edged sword. You need to use it to do your
    job, but as a developer, you definitely can’t attend a daily standup meeting and
    say, “Yesterday, uh, I spent all day reading Slack. No roadblocks.”


    Additionally, if you work for a company with clients in various time zones (which
    is quite common nowadays), it’s pretty daunting to open Slack in the morning and
    see a ton of messages that were posted while you were away from the keyboard.


    So, in this chapter, we’re going to apply AI in the enterprise to make Slack more
    useful. We’ll leverage the code in the previous chapter and create a Slack bot
    in JavaScript that will summarize the important conversations in a Slack channel.
    We’re going to be utilizing ChatGPT’s capabilities for text summarization and
    focus a bit more on **Prompt Engineering**.


    ## So, What Is Prompt Engineering?


    Simply stated, Prompt Engineering is the process of carefully crafting and refining
    prompts and input parameters to instruct and guide the behavior of ChatGPT and
    other AI models. It’s basically the industry-wide term for creating the right
    input in order to get the result that you’re looking for.


    ## ChatGPT Is Here to Take Away Everyone’s Jobs (Not Really)


    It is our humble opinion that every company in the world is sitting on a gold
    mine of untapped information. If you are using any system that keeps a log of
    exchanges between employees, a database of support requests from your customers,
    or any large repository of text (yes this includes your email, Microsoft Exchange,
    and corporate Gmail), then, you have a large repository of unstructured text that
    is waiting to be utilized.


    Therefore, the best use of ChatGPT is not to eliminate anyone’s jobs. It should
    be used in order to augment and extend what team members in your company are already
    doing. As we saw in Chapter [2](#625846_1_En_2_Chapter.xhtml), as a software developer,
    ChatGPT can work as a very effective Pair-Programmer. It is also very good at
    performing certain difficult tasks very efficiently and quickly. Therefore, the
    project of this chapter involves tackling a practical example of what can be done
    in order to make use of a large source of unstructured text.


    You can use the ChatGPT client you created in Chapter [3](#625846_1_En_3_Chapter.xhtml)
    for the prompt engineering examples listed further on in this chapter, or you
    can use the playground mode feature we talked about in Chapter [1](#625846_1_En_1_Chapter.xhtml).
    Either way, let’s dive right in.


    ## Examining a Real-World Problem: Customer Support for a Software Company


    Let’s look at one of the most grueling tasks in software development: providing
    tech support. Imagine the joys of fielding calls and messages all day from people
    who might be frustrated, confused, or just in need of a solution while using your
    software. Here’s some of the reasons why customer support is a tough nut to crack:


    *   Your end users and your customers are notoriously bad at explaining problems
    with your software.

    *   Level 1 technicians, often the first line of defense, typically handle the
    most basic issues or user errors. But when problems get more complex, users are
    escalated to Level 2.

    *   The mid-tier is a tricky place, because they have more knowledge and experience
    than the tech support staff at Level 1; however, they don’t have the opportunity
    to directly get answers from the end user.

    *   Really bad problems get escalated to Level 3; however, these are the most
    expensive tech support staff because they have the most knowledge and experience.
    They have hands-on experience with the code as well as the servers and the infrastructure.


    So let’s work with a real-world example of a typical conversation within a typical
    tech support channel within Slack. Below is a list of the team members and their
    roles within a fictional company:


    *   Fatima (Customer Service Representative)

    *   John (Software Engineer)

    *   Dave (PM)

    *   Keith (CTO)


    Listing [4-1](#625846_1_En_4_Chapter.xhtml#PC1) provides an example of a conversation
    between the team members at a software startup. Fatima, the customer service representative,
    lets the team know that their app is crashing immediately after launching (not
    a good problem to have). Keith, the CTO, steps in immediately to escalate the
    issue.'
