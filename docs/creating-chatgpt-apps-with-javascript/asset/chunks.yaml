  trans: "\n# 分析我们的 ChatGPT 客户端：`chatGPTClient.js`\n\n我们有一个名为 `chatGPTClient.js` 的类，它与我们之前使用过的类非常相似。`chatGPTClient.js`\
    \ 的完整源代码如代码清单 7-3 所示。\n\n```\nconst { OpenAI } = require(\"openai\");\nrequire(\"\
    dotenv\").config();\nclass ChatGPTClient {\nconstructor(systemMessage, initialInstructionsToChatGPT)\
    \ {\nthis.systemMessage = systemMessage;\nthis.initialInstructionsToChatGPT =\
    \ initialInstructionsToChatGPT;\nthis.client = new OpenAI({\napiKey: process.env[\"\
    OPENAI_API_KEY\"],\n});\n}\nasync sendMessageFromDiscord(userMessage) {\nconst\
    \ chatCompletion = await this.client.chat.completions.create({\nmessages: [\n\
    {\nrole: \"system\",\ncontent: this.systemMessage,\n},\n{\nrole: \"user\",\ncontent:\
    \ this.initialInstructionsToChatGPT,\n},\n{\nrole: \"user\",\ncontent: userMessage,\n\
    },\n],\nmodel: \"gpt-4\",\ntemperature: 0.85,\ntop_p: 1,\nmax_tokens: 1921,\n\
    frequency_penalty: 0,\npresence_penalty: 0,\n});\nconst result = chatCompletion.choices[0].message.content;\n\
    return result;\n}\n}\nmodule.exports = { ChatGPTClient };\n代码清单 7-3\nchatGPTClient.js\n\
    ```\n\n最需要注意的一点是，在构造函数中，我们发送了常见问题解答内容的完整字符串，以及我们将要提供给系统本身的消息。\n\n这样，在构建了 `ChatGPTClient`\
    \ 类之后，我们就可以重用已构建的对象，以便回答用户提出的各个问题。\n\n每当我们的 Discord 频道上有人发布问题时，我们的机器人就会从 `chatGPTClient.js`\
    \ 中调用 `sendMessageFromDiscord()` 方法。在此方法中，我们将执行所有必要的常规操作，以便以编程方式调用 ChatGPT。\n\n\
    ## 运行我们的智能问答机器人\n\n现在，让我们运行这个全新改进的问答 Discord 机器人。执行应用程序后，请务必返回你的 Discord 服务器并开始提问。图\
    \ 7-1 展示了机器人的运行情况。\n\n![](img/625846_1_En_7_Fig1_HTML.jpg)\n\nCrooks Bank 服务器下名为\
    \ \"q-and-a\" 的 Discord 频道截图。主要消息来自 \"Q and A Bot\"，欢迎用户来到 Crooks Bank 移动应用支持频道。它列出了用户可以询问的主题，包括应用安装、功能、故障排除、安全措施、密码重置说明、费用、关联外部账户、客户支持和反馈。左侧边栏显示了文本频道和语音频道，其中\
    \ \"q-and-a\" 被高亮显示。右侧边栏显示在线用户，包括 \"PythonChatGPT\" 和 \"Q and A Bot\"，以及一名离线用户\
    \ \"Mod Bot\"。\n\n图 7-1\n\n与我们的智能 DISCORD 问答机器人进行讨论\n\n代码清单 7-4 展示了我们与 Discord\
    \ 机器人之间的对话。\n\n1.  ```\n    如何安装和使用该应用。\n    ```\n\n2.  ```\n    应用内的功能和服务。\n\
    \    ```\n\n3.  ```\n    解决你可能遇到的任何问题。\n    ```\n\n4.  ```\n    保护你的数据和交易的安全措施。\n\
    \    ```\n\n5.  ```\n    重置密码的说明。\n    ```\n\n6.  ```\n    使用该应用相关的费用和收费。\n  \
    \  ```\n\n7.  ```\n    如何关联外部银行账户。\n    ```\n\n8.  ```\n    客户支持的可用性。\n    ```\n\
    \n9.  ```\n    改进应用的反馈和建议。\n    ```\n\n```\n我：你好，我是这个频道的新用户。我可以问哪些问题？\n问答机器人：你好！欢迎来到\
    \ Crooks Bank 移动应用支持频道。在这里，你可以询问任何关于我们银行应用的问题。例如，你可以询问：\n代码清单 7-4\n我们与智能问答 Discord\
    \ 机器人的首次对话\n```\n\n```\n请随时提出任何其他与 Crooks Bank 移动应用相关的问题。我们随时准备提供帮助！\n我：我有一部旧的黑莓手机，这个应用支持我的设备吗？\n\
    问答机器人：很抱歉给您带来不便，但目前 Crooks Bank 移动应用仅适用于 iOS 和 Android 设备。它不支持黑莓或其他操作系统。您仍然可以通过手机浏览器访问我们的网站来管理您的银行账户。\n\
    我：我是 iPhone 用户。我可以用面容 ID 或触控 ID 登录应用吗？\n问答机器人：当然可以，以下是在您的 iPhone 上设置 Crooks Bank\
    \ 移动应用的方法：\n1. 打开 iPhone 上的 App Store。\n2. 在顶部的搜索栏中输入 \"Crooks Bank Mobile App\"\
    ，然后点击 \"搜索\"。\n3. 在搜索结果中看到该应用后，只需点击 \"获取\" 按钮即可下载。\n4. 应用下载完成后，点击 \"打开\"。\n5.\
    \ 首次启动时，您需要同意我们的条款和条件。\n6. 如果您是 Crooks Bank 的现有会员，可以使用您的网上银行用户 ID 和密码登录。如果您是新会员，则需要注册一个账户。\n\
    7. 登录后，您可以设置触控 ID 或面容 ID，以便将来更快、更安全地登录。\n8. 现在，您可以开始使用 Crooks Bank 移动应用来管理您的财务、支付账单、进行交易等！\n\
    请确保定期更新应用，以获取新功能和改进。如果在设置过程中遇到任何问题，请通过应用的支持功能联系我们，或致电我们的客户服务。\n```\n\n## 我们取得了里程碑式的成就……但有一个小缺陷\n\
    \n好吧，如果你退后一步，审视一下我们到目前为止所取得的成就，你应该会意识到，我们看到的无疑是一个里程碑式的成就。我们拥有以下成果：\n\n*   一个由几个脚本组成的系统，允许用户输入问题，并获得关于如何使用我们移动应用的答案。\n\
    *   使用一个简单的文本文件，我们可以教会机器人如何回答用户的问题。公司里的任何人都可以编辑这个文件，并且可以将其用作知识库，日复一日地帮助提高机器人的智能水平。这真是太棒了。\n\
    *   该系统允许客户使用自然语言输入问题，机器人会向他们提供智能答案。你猜怎么着？客户不喜欢阅读常见问题解答——尤其是那些非常长的。然而，使用这个系统，他们根本不需要阅读！他们只需提出与自己相关的问题即可。\n\
    \n那么，在我们取得了所有这些成就之后，有一个我们无法忽视的巨大缺陷。在代码清单 7-4 中，机器人对用户说：\n\n```\n登录后，您可以设置触控 ID\
    \ 或面容 ID，以便将来更快、更安全地登录。\n```\n\n不，不，不！坏机器人！如果你没有完整阅读常见问题解答文件，请允许我解释一下这里出了什么问题：\n\
    \n1.  代码清单 7-1 中的 `FAQ.txt` 文件明确指出 Crooks Bank 移动应用是一个移动应用。目前，触控 ID 只能用于苹果台式机和笔记本电脑。所以这根本说不通。\n\
    2.  `FAQ.txt` 文件中完全没有提到使用面容 ID 进行移动应用身份验证。\n\n因此，不幸的是，ChatGPT 在编造一些根本不真实的事情，并假设存在某些并不存在的功能。所以，就真正的技术支持而言，这是绝对不可接受的。\n\
    \n那么，我们该如何解决这个问题呢？在阅读下一节之前，请先思考一下你如何能解决这个问题。\n"
- fmt: '# Update the System Message to ChatGPT and Let’s Try Again


    Have you come up with a solution yet? One way to resolve this issue is to update
    the System message. Refer to the following line in Listing [7-2](#625846_1_En_7_Chapter.xhtml#PC2)
    above:


    ```

    const systemMessage =

    "You are a virtual assistant that provides support for the Crooks Bank banking
    app.";

    ```


    Remember that the System Message indicates to ChatGPT what its role is in the
    chat conversation. Right now it is told to be a helpful assistant, and therefore
    it has taken the liberty to guess that certain features exist within the mobile
    application. Now, let’s ensure that ChatGPT does not provide any assumptions.
    Update the System Message to be as shown below:


    ```

    const systemMessage = "You are a virtual assistant that provides support for the
    Crooks Bank banking app. You will be provided Information about the application,
    and users will ask you questions about the application. Your role is to answer
    questions explicitly from the training information. If you were not given an answer
    to a question, then provide an apologetic message to the user explaining that
    you do not know the answer.";

    ```


    And that’s it. The `FAQ.txt` file remains exactly the same as before, and all
    we needed to do is to update the System Message to let ChatGPT know its role in
    the conversation. Listing [7-5](#625846_1_En_7_Chapter.xhtml#PC20) has the new
    conversation between us and the Discord bot.


    ```

    Me: How are you today?

    Q and A Bot: As a virtual assistant, I don''t have feelings or emotions, but I''m
    here and ready to assist you. How may I help you with the Crooks Bank Mobile App
    today?

    Me: I have an old Blackberry phone, is the app supported on my device?

    Q and A Bot: I''m sorry, but from the information provided, the Crooks Bank Mobile
    App can only be downloaded from the App Store for iOS devices and Google Play
    for Android devices. BlackBerry devices are not mentioned, therefore I cannot
    confirm that it would be compatible.

    Me: So, if I use an iPhone, how do I setup the app?

    Q and A Bot: To set up the Crooks Bank Mobile App on your iPhone, you can download
    it from the App Store. Simply search for "Crooks Bank Mobile App" and click the
    "Install" button. After the installation is finished, open the app and follow
    the prompts to set up your account. If you already have an account, use your login
    information to access your account through the app.

    Listing 7-5

    Our Second and Better Conversation with the Intelligent Q&A Discord Bot

    ```


    Now that’s a lot better! Our Tech Support bot is “sticking to the script” and
    is not allowed to make up or assume anything.


    ## Conclusion


    In this chapter, we’ve accomplished a lot! We have a fully functioning Discord
    bot that can be trained by anyone without any experience in AI, NLP, or Machine
    Learning using a simple text file. We learned that a “helpful assistant” may at
    times become TOO HELPFUL and assume facts that are not true. However, we also
    reiterated the concept and the value of the System Message, which is an important
    part of Prompt Engineering.


    Now that we have made our Q&A Discord bot to be intelligent, now let’s find out
    how to make our Content Moderator bot to be intelligent as well!


    # 8. Adding Intelligence to Our Discord Bots, Part 2: Improving Our Moderator
    Bot


    In this chapter, we’re going to take the steps necessary in order to make our
    Content Moderator Discord bot artificially intelligent. Here’s the kind of changes
    that we’re going to make.


    First of all, we’re going to create a new script to invoke one of the **Moderations**
    models. The Moderations models are a special category of models that allow us
    to be aware when any textual content fits any of the following categories:


    - Hate

    - Hate/threatening

    - Harassment

    - Harassment/threatening

    - Self-harm

    - Self-harm/intent

    - Self-harm/instructions

    - Sexual

    - Sexual/minors

    - Violence

    - Violence/graphic


    Next, we’re going to reuse our `chatGPTClient.js` script from the previous chapter.
    In Chapter [7](#625846_1_En_7_Chapter.xhtml), it was used to invoke a Chat model
    using the `client.chat.completions.create()` method for Q&A purposes from our
    users. In this chapter, it will be used to invoke a Chat model again, but this
    time for moderation purposes.


    Of course, we’re going to update our `chatGPTClient.js` script so that it can
    invoke a Moderation model.


    And finally, we’re going to modify our Content Moderator Discord bot so that it
    can invoke both a Chat and Moderation model in `chatGPTClient.js`. If either model
    indicates that the content typed in the Discord channel is objectionable, then
    delete the message from that Discord channel. Remember, this bot watches all content
    in all channels of the Discord server!


    **Note**


    Now, at this point, you may be asking yourself, if the Moderation models already
    know how to flag any harmful content, then why do we need to use any of the Chat
    models as well? Good question.


    Yes, the Moderation models will allow us to know about harmful content, but it
    **DOES NOT** inform us about any other types of unwanted content for our scenario,
    such as when unscrupulous individuals try to lure our users into a scam. Remember,
    this is a Discord server for a banking app, so scammers would definitely love
    to target all the members of this Discord server since it’s a central location
    full of bank users!


    Therefore, in this final chapter, we’re going to invoke both Chat and Moderation
    models in `chatGPTClient.js`.


    ## Using `OpenAI.moderations.create()` to Invoke a Moderation Model


    Any of the Moderation models allows developers to submit a String of text and
    to subsequently know if it’s violent, hateful, threatening, or contains any form
    of harassment.


    Table [8-1](#625846_1_En_8_Chapter.xhtml#Tab1) describes the format of the parameters
    necessary to call the body for the `OpenAI.moderations.create()` method. The method
    is very simple to use, since only one parameter is required to properly invoke
    the service.


    **Table 8-1** The Request Body for the Moderation Method


    | Field | Type | Required? | Description |

    | --- | --- | --- | --- |

    | `input` | String or Array | Required | The text that needs to be classified
    |

    | `model` | String default: `"omni-moderation-latest"` | Optional | There are
    multiple content moderation models available for use, for example: `"omni-moderation-latest"`,
    `"text-moderation-stable"`, `"text-moderation-latest"`. By default, this is set
    to `"omni-moderation-latest"`. It will be automatically upgraded over time, which
    ensures you’re always using the most accurate model. If you decide to use any
    of the text-based moderation models, then you are only able to submit text to
    be evaluated. The omni moderation models, however, are able to evaluate content
    as text and images. Therefore choose the model that works best for your use case.
    |


    ### Create Moderation (JSON)'
