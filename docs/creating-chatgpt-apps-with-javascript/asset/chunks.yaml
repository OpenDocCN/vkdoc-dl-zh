- fmt: '### Let’s Talk About Real Prompt Engineering


    If you Google the term “prompt engineering,” you’ll find a ton of examples, blogs,
    and even full websites with subscription plans that will try to convince you that
    the perfect prompts can be created by simply only using text. As you have seen
    from the examples above, prompt engineering cannot be accomplished solely by merely
    crafting textual inputs.


    In reality, the process is quite similar to cooking a sophisticated meal. Imagine
    trying to cook, for example, beef bourguignon using only salt as the seasoning,
    and neglecting all other ingredients and spices! Honestly, the result would pale
    in comparison to the actual dish.


    Similarly, try assembling an entire orchestra but only use one instrument and
    one musician. That’s an embarrassing “one man band.” Therefore, simply adjusting
    the text to the prompt isn’t enough in order to truly perform prompt engineering.
    The parameters such as the model’s `temperature`, which controls randomness; the
    `top-p`, impacting token probability; the specific model used; the number of tokens;
    and the other parameters all play highly pivotal roles in getting a great response.


    This book is not about prompt engineering, since (as you can see from the explanation
    above) it truly involves several factors that don’t have anything to do with JavaScript.
    However, you are highly encouraged to experiment with ALL the parameters to the
    models provided by OpenAI to find what works best for your use case.


    ## Registering a Slack Bot App


    Now that we know the various ways for ChatGPT to summarize a large body of text
    for us, let’s see what’s necessary in order to create a simple bot in JavaScript
    that will programmatically grab all the messages from a channel within a Slack
    instance.


    **Note**


    In order to accomplish these steps, you will need to have administrative access
    to a Slack workspace. Most developers will **NOT** have these levels of permissions;
    therefore, in order to fully experiment, I recommend that you create your own
    personal Slack workspace for testing purposes. This way, you will have all the
    rights and privileges to install your Slack bot.


    But, one step at a time. First, we’re going to make our Slack bot app, so head
    over to the Slack API website:


    [`https://api.slack.com/`](https://api.slack.com/)


    ![](images/625846_1_En_4_Chapter/625846_1_En_4_Fig1_HTML.jpg)


    Slack API webpage promoting its platform for automation. The header reads, "Unlock
    your productivity potential with Slack Platform," with buttons for "Get Started"
    and "Explore samples." A dropdown menu shows options to manage or create apps.
    Below, a section highlights Slack''s modular automation tools, featuring "Functions,"
    "Workflows," and "Triggers," each with a brief description and colorful icons.


    **Figure 4-1** In Order to Create a Slack Bot, Go To the Slack API Website


    Of course, you’ll need to have a Slack account in order for this to work, so if
    you don’t have one, then you need to create one first.


    After you have logged in, go to the top-right of the page and navigate to “**Your
    apps ➤ Create your first app**,” as shown in Figure [4-1](#625846_1_En_4_Chapter.xhtml#Fig1)
    above. In Slack terminology, a “bot” is an “app,” and bots are not allowed to
    run on a Slack instance unless they have been registered with Slack first.


    ![](images/625846_1_En_4_Chapter/625846_1_En_4_Fig2_HTML.jpg)


    The image shows the Slack API interface with a pop-up titled "Create an app."
    It offers two options: "From scratch," which allows users to manually add basic
    info, scopes, settings, and features using the configuration UI, and "From an
    app manifest," which uses a manifest file for the same purpose. The background
    displays a sidebar with navigation options like Start Learning, Automation, and
    APIs.


    **Figure 4-2** Creating a New Bot App for Slack


    As shown in Figure [4-2](#625846_1_En_4_Chapter.xhtml#Fig2), above, you’ll be
    taken to the **Your Apps** page where you can manage your Slack apps. Immediately,
    you’ll see a popup to **Create an App** button in the middle of the screen.


    Select the option to create your app **from scratch**. This is because we want
    to be able to manipulate all of the details of the application ourselves without
    overcomplicating things with a bunch of default settings.


    Afterward, you’ll be prompted to specify a name for your bot and to select the
    workspace that you want your bot to have access to, as shown in Figure [4-3](#625846_1_En_4_Chapter.xhtml#Fig3).


    Click the **Create App** button to proceed.


    ![](images/625846_1_En_4_Chapter/625846_1_En_4_Fig3_HTML.jpg)


    Slack API interface for creating a new app. A pop-up window titled "Name app &
    choose workspace" prompts the user to enter an app name and select a workspace
    from a dropdown menu. Instructions note that the workspace choice is permanent.
    Options to "Cancel" or "Create App" are at the bottom. The background shows a
    sidebar with navigation options like "Automation" and "Authentication."


    **Figure 4-3** Creating a New Bot App for Slack


    ### Specifying What Your Bot Can (and Can’t) Do by Setting the Scope


    Now, you’ll be presented with a screen that has a ton of options for bots for
    Slack workspaces. The first thing you need to do, however, is from the sidebar
    on the left, click **OAuth & Permissions**.


    Our bot is going to be pretty simple; all it needs to do is read the messages
    from a channel in order to give us a summary of what was said. In addition to
    reading the messages, we also need to know the names of the people in the Slack
    workspace; otherwise, we’ll get a UUID representation of the person instead of
    their name, which is meaningless to us.


    So, scroll down and be sure to add the following OAuth Scope to your Slack Bot,
    as shown in Figure [4-4](#625846_1_En_4_Chapter.xhtml#Fig4).


    ![](images/625846_1_En_4_Chapter/625846_1_En_4_Fig4_HTML.jpg)


    The image shows a Slack API webpage detailing "Scopes" for app permissions. It
    includes sections for "Bot Token Scopes" and "User Token Scopes." Under "Bot Token
    Scopes," there are three listed: `channels:history` for viewing messages in public
    channels, `channels:read` for viewing basic channel information, and `users:read`
    for viewing people in a workspace. Each scope has a description and an option
    to delete. There is a button labeled "Add an OAuth Scope." The page header includes
    links to "Documentation," "Tutorials," and "Your Apps."


    **Figure 4-4** Adding Scopes for the Slack Bot App


    *   `channels:history`

    *   `channels:read`

    *   `users:read`


    ### Confirming Your Settings


    After you’ve added the appropriate scopes for your bot, scroll back up and click
    **Basic Information** from the left side bar.


    On the page that follows, you’ll see that there’s now a green checkmark beside
    “Add features and functionality,” which confirms that you’ve added your scopes
    correctly, as shown in Figure [4-5](#625846_1_En_4_Chapter.xhtml#Fig5).


    ![](images/625846_1_En_4_Chapter/625846_1_En_4_Fig5_HTML.jpg)


    Slack API interface showing the "Basic Information" section for building apps.
    The sidebar includes settings like Collaborators and Socket Mode. The main panel
    provides steps for adding features, installing the app, and managing distribution,
    with an "Install to Workspace" button. Options to discard or save changes are
    at the bottom.


    **Figure 4-5** Confirm Your Settings'
