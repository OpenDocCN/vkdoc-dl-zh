- fmt: "# Using `OpenAI.openai.images.generate()` to Create Images\n\nThe `OpenAI.images.generate()`\
    \ method allows you to use the DALL·E model to dynamically create an image from\
    \ a text prompt.\n\nTable [5-2](#625846_1_En_5_Chapter.xhtml#Tab2) describes the\
    \ format of the JSON object necessary to create images. For obvious reasons, the\
    \ `prompt` itself is the only required parameter in order to successfully invoke\
    \ the service.\n\n**Table 5-2** Request Body for the Create Image Endpoint\n\n\
    | Field | Type | Required? | Description |\n| --- | --- | --- | --- |\n| `prompt`\
    \ | `String` | Required | This is where you describe the image that you want to\
    \ be created. The maximum length is 1000 characters for `dall-e-2` and 4000 characters\
    \ for `dall-e-3`. |\n| `model` | `String` Default: `\"dall-e-2\"` | Optional |\
    \ The model name to generate the image. Compatible models include: `\"dall-e-2\"\
    `, `\"dall-e-3\"`. |\n| `n` | `integer` or `null` Default: `1` | Optional | This\
    \ is the requested number of images that you want created. Must be between 1 and\
    \ 10. Note: Due to the complexity required for `dall-e-3`, OpenAI may limit your\
    \ request to a single image. |\n| `quality` | `String` Default: `\"standard\"\
    ` | Optional | This allows you to specify the quality of the image to be generated.\
    \ This parameter is only valid for `dall-e-3`. Accepted values are: `\"standard\"\
    `, `\"hd\"`. |\n| `size` | `String` or `null` Default: `\"1024x1024\"` | Optional\
    \ | The size of the generated images. Image sizes available for `dall-e-2` are:\
    \ `\"256x256\"`, `\"512x512\"`, `\"1024x1024\"`. Image sizes available for `dall-e-3`\
    \ are: `\"1024x1024\"`, `\"1792x1024\"` (landscape), `\"1024x1792\"` (portrait).\
    \ |\n| `style` | `String` Default: `\"vivid\"` | Optional | This allows you to\
    \ specify how natural looking the generated image should be. This parameter is\
    \ only valid for `dall-e-3`. Accepted values are: `\"natural\"` (good for photos),\
    \ `\"vivid\"` (good for artistic looks). |\n| `response_format` | `String` or\
    \ `null` Default: `\"url\"` | Optional | This is the format of the generated image.\
    \ Accepted values are: `\"url\"`, `\"b64_json\"`. |\n| `user` | `String` | Optional\
    \ | This is a unique identifier representing your end-user, which can help OpenAI\
    \ to monitor and detect abuse. |\n\n### Create Image (JSON)\n\n### Handling the\
    \ Response\n\nAfter successfully invoking the method, the API will respond with\
    \ an `Image` JSON object. Here’s a breakdown of the `Image` object, which only\
    \ has one parameter (Table [5-3](#625846_1_En_5_Chapter.xhtml#Tab3)).\n\n**Table\
    \ 5-3** The Structure of the `Image` Object\n\n| Field | Type | Description |\n\
    | --- | --- | --- |\n| `url` (or) `b64_json` | `String` | This is a url to your\
    \ generated image if the `response_format` is `\"url\"` in the request. (or) This\
    \ is a base64-encoded JSON image if the `response_format` is `\"b64_json\"` in\
    \ the request. |\n\n### Image\n\n## Creating the Images with the DALL·E Model\n\
    \nAs you can see from Tables [5-2](#625846_1_En_5_Chapter.xhtml#Tab2) and [5-3](#625846_1_En_5_Chapter.xhtml#Tab3),\
    \ creating an image with the DALL·E model is a very straightforward process. Therefore,\
    \ our code in Listing [5-9](#625846_1_En_5_Chapter.xhtml#PC10) shows how to create\
    \ images programmatically in JavaScript.\n\n```\nconst { OpenAI } = require(\"\
    openai\");\nrequire(\"dotenv\").config();\nasync function main() {\n  // Set up\
    \ the OpenAI client with your API key\n  const openai = new OpenAI({\n    apiKey:\
    \ process.env.OPENAI_API_KEY,\n  });\n  const response = await openai.images.generate({\n\
    \    model: \"dall-e-3\",\n    n: 1,\n    // The prompt and for the image\n  \
    \  prompt:\n      \"a 35mm macro photo of 3 cute Rottweiler puppies with no collars\
    \ laying down in a field\",\n    size: \"1024x1024\",\n  });\n  image_url = response.data[0].url;\n\
    \  console.log(image_url);\n}\nmain();\n```\n\n*Listing 5-9* Using the DALL·E\
    \ Model to Create Images with JavaScript\n\nAlright, let’s break down what’s happening\
    \ in this code example. We’re using the `openai.images.generate()` function from\
    \ OpenAI’s API to generate an image based on our prompt.\n\n- A `prompt` is defined.\
    \ In this case, the prompt describes the desired image: “a 35mm macro photo of\
    \ 3 cute Rottweiler puppies with no collars laying down in a field.”\n- The desired\
    \ `size` of the generated image is specified as `\"1024x1024\"`.\n- The `openai.images.generate()`\
    \ function is called with the provided `prompt`, `size`, and `model` parameters.\
    \ This function generates an image based on the input prompt using the specified\
    \ model (`\"dall-e-3\"`).\n- The response object (called an `ImageResponse`) contains\
    \ information about the generated image, including its URL.\n- Finally, the code\
    \ prints out the URL of the generated image.\n\nIn summary, this code generates\
    \ an image of three cute Rottweiler puppies laying down in a field based on the\
    \ provided prompt using the DALL·E model, and then it prints out the URL where\
    \ the generated image can be accessed.\n\n## Visualizing the Podcast\n\nNow that\
    \ we have the code necessary to create images with the DALL·E model, Figure [5-2](#625846_1_En_5_Chapter.xhtml#Fig2)\
    \ shows the images generated from the text prompt in Listing [5-8](#625846_1_En_5_Chapter.xhtml#PC9)\
    \ shown earlier.\n\n![](images/625846_1_En_5_Chapter/625846_1_En_5_Fig2_HTML.jpg)\n\
    \nA young girl with long, curly hair sits barefoot on the grass in a lush, green\
    \ garden. She is wearing a pink sweater and a green skirt. Beside her is a fluffy\
    \ black dog with its tongue out, looking content. The background features vibrant\
    \ greenery and purple flowers, creating a serene and enchanting atmosphere.\n\n\
    **Figure 5-2** AI-Generated Image. The DALL·E Generated Image of a Girl and Her\
    \ Dog from Episode 811 of “This American Life” Podcast\n\n## DALL·E Prompt Engineering\
    \ and Best Practices\n\nNow, creating images with DALL·E takes prompt engineering\
    \ in order to get consistent, desired results, and it’s a good idea to play around\
    \ with different prompts to get some practice to see what works for you and your\
    \ use case. Maybe you prefer paintings instead of 3D looking images? Maybe you\
    \ need photos instead of digital art? Maybe you want the image to be a close-up\
    \ shot instead of a portrait? There’s a lot of possibilities to consider.\n\n\
    Regardless of your use case, here are two golden rules in order to get the most\
    \ out of your DALL·E prompts.\n\n### DALL·E Golden Rule #1: Get Familiar with\
    \ the Types of Images That DALL·E Can Generate\n\nFirst and foremost, one of the\
    \ most important things that DALL·E needs to understand is the type of image that\
    \ needs to be generated. Here’s a list of several of the most common types of\
    \ images that DALL·E is able to create:\n\n- 3-D render\n- Painting\n- Abstract\
    \ painting\n- Expressive oil painting\n- Oil painting (in the style of any deceased\
    \ artist)\n- Oil pastel\n- Digital art\n- Photo\n- Photorealistic\n- Hyperrealistic\n\
    - Neon photo\n- 35-mm macro photo\n- High-quality photo\n- Silhouette\n- Vaporware\n\
    - Cartoon\n- Plush object\n- Marble sculpture\n- Hand sketch\n- Poster\n- Pencil\
    \ and watercolor\n- Synth wave\n- Comic book style\n- Hand drawn\n\n### DALL·E\
    \ Golden Rule #2: Be Descriptive with What You Want in the Foreground and Background\n\
    \nI cannot emphasize enough that you need to be descriptive with DALL·E in order\
    \ to get consistent, desirable results. It may sound weird, but the best way to\
    \ describe your image to DALL·E is to act like you’re describing a dream to another\
    \ person.\n\nSo, as a mental exercise between us, try to describe your last dream.\
    \ As you describe the people, places, and things in your dream, you have in your\
    \ mind the most important things that you remember, as well as the experience\
    \ that you felt. As you describe things to another person, tiny details start\
    \ to emerge such as:\n\n- How many people were present (if any)?\n- What position\
    \ were the people or animals in? Standing, sitting, or laying down?\n- What things\
    \ were in the scenery and the background?\n- What items stood out to you? Sounds?\
    \ Smells? Colors?\n- How did you feel? Happy, eerie, excited?\n- What was the\
    \ perceived time of day? Morning, midday, night?\n\nIf you can describe a dream\
    \ to another person, then you should have no problem describing what you want\
    \ to DALL·E."
  raw: '## Using OpenAI.openai.images.generate() to Create Images


    The OpenAI.images.generate() method allows you to use the DALL⋅E model to dynamically
    create an image from a text prompt.


    Table [5-2](#625846_1_En_5_Chapter.xhtml#Tab2) describes the format of the JSON
    object necessary to create images. For obvious reasons, the prompt itself is the
    only required parameter in order to successfully invoke the service.


    Table 5-2


    Request Body for the Create Image Endpoint


    | Field | Type | Required? | Description |

    | --- | --- | --- | --- |

    | prompt | String | Required | This is where you describe the image that you want
    to be created.The maximum length is 1000 characters for dall-e-2 and 4000 characters
    for dall-e-3. |

    | model | StringDefault: “dall-e-2” | Optional | The model name to generate the
    image.Compatible models include• “dall-e-2”• “dall-e-3” |

    | n | integer or nullDefault: 1 | Optional | This is the requested number of images
    that you want created.Must be between 1 and 10.Note: Due to the complexity required
    for dall-e-3, OpenAI may limit your request to a single image |

    | quality | StringDefault: “standard” | Optional | This allows you to specify
    the quality of the image to be generated. This parameter is only valid for dall-e-3.Accepted
    values are• “standard”• “hd” |

    | size | String or nullDefault: “1024x1024” | Optional | The size of the generated
    images.Image sizes available for dall-e-2 are• “256x256”• “512x512”• “1024x1024”Image
    sizes available for dall-e-3 are• “1024x1024”• “1792x1024” (landscape)• “1024x1792”
    (portrait) |

    | style | StringDefault: “vivid” | Optional | This allows you to specify how natural
    looking the generated image should be. This parameter is only valid for dall-e-3.Accepted
    values are• “natural” (good for photos)• “vivid” (good for artistic looks) |

    | response_format | String or nullDefault: “url” | Optional | This is the format
    of the generated image.Accepted values are• “url”• “b64_json” |

    | user | String | Optional | This is a unique identifier representing your end-user,
    which can help OpenAI to monitor and detect abuse. |


    ### Create Image (JSON)


    ### Handling the Response


    After successfully invoking the method, the API will respond with an Image JSON
    object. Here’s a breakdown of the Image object, which only has one parameter (Table
    [5-3](#625846_1_En_5_Chapter.xhtml#Tab3)).


    Table 5-3


    The Structure of the Image Object


    | Field | Type | Description |

    | --- | --- | --- |

    | url (or) b64_json | String | This is a url to your generated image if the response_format
    is “url” in the request.(or)This is a base64-encoded JSON image if the response_format
    is “b64_json” in the request. |


    ### Image


    ## Creating the Images with the DALL·E Model


    As you can see from Tables [5-2](#625846_1_En_5_Chapter.xhtml#Tab2) and [5-3](#625846_1_En_5_Chapter.xhtml#Tab3),
    the creating an image with the DALL⋅E model is a very straightforward process.
    Therefore, our code in Listing [5-9](#625846_1_En_5_Chapter.xhtml#PC10) shows
    how to create images programmatically in JavaScript.


    ```

    const { OpenAI } = require("openai");

    require("dotenv").config();

    async function main() {

    // Set up the OpenAI client with your API key

    const openai = new OpenAI({

    apiKey: process.env.OPENAI_API_KEY,

    });

    const response = await openai.images.generate({

    model: "dall-e-3",

    n: 1,

    // The prompt and for the image

    prompt:

    "a 35mm macro photo of 3 cute Rottweiler puppies with no collars laying down in
    a field",

    size: "1024x1024",

    });

    image_url = response.data[0].url;

    console.log(image_url);

    }

    main();

    Listing 5-9

    Using the DALL⋅E Model to Create Images with JavaScript

    ```


    Alright, let’s break down what’s happening in this code example. We’re using the
    openai.images.generate() function from OpenAI’s API to generate an image based
    on our prompt.


    *   A prompt is defined. In this case, the prompt describes the desired image:
    “a 35mm macro photo of 3 cute Rottweiler puppies with no collars laying down in
    a field.”


    *   The desired size of the generated image is specified as “1024x1024”.


    *   The openai.images.generate() function is called with the provided prompt,
    size, and model parameters. This function generates an image based on the input
    prompt using the specified model (“dall-e-3”).


    *   The response object (called an ImageResponse) contains information about the
    generated image, including its URL.


    *   Finally, the code prints out the URL of the generated image.


    In summary, this code generates an image of three cute Rottweiler puppies laying
    down in a field based on the provided prompt using the DALL⋅E model, and then
    it prints out the URL where the generated image can be accessed.


    ## Visualizing the Podcast


    Now that we have the code necessary to create images with the DALL⋅E model, Figure
    [5-2](#625846_1_En_5_Chapter.xhtml#Fig2) shows the images generated from the text
    prompt in Listing [5-8](#625846_1_En_5_Chapter.xhtml#PC9) shown earlier.


    ![](images/625846_1_En_5_Chapter/625846_1_En_5_Fig2_HTML.jpg)


    A young girl with long, curly hair sits barefoot on the grass in a lush, green
    garden. She is wearing a pink sweater and a green skirt. Beside her is a fluffy
    black dog with its tongue out, looking content. The background features vibrant
    greenery and purple flowers, creating a serene and enchanting atmosphere.


    Figure 5-2


    AI-Generated Image. The DALL·E Generated Image of a Girl and Her Dog from Episode
    811 of “This American Life” Podcast


    ## DALL·E Prompt Engineering and Best Practices


    Now, creating images with DALL⋅E takes prompt engineering in order to get consistent,
    desired results, and it’s a good idea to play around with different prompts to
    get some practice to see what works for you and your use case. Maybe you prefer
    paintings instead of 3D looking images? Maybe you need photos instead of digital
    art? Maybe you want the image to be a close-up shot instead of a portrait? There’s
    a lot of possibilities to consider.


    Regardless of your use case, here are two golden rules in order to get the most
    out of your DALL⋅E prompts.


    ### DALL·E Golden Rule #1: Get Familiar with the Types of Images That DALL·E Can
    Generate


    First and foremost, one of the most important things that DALL⋅E needs to understand
    is the type of image that needs to be generated. Here’s a list of several of the
    most common types of images that DALL⋅E is able to create:


    *   3-D render


    *   Painting


    *   Abstract painting


    *   Expressive oil painting


    *   Oil painting (in the style of any deceased artist)


    *   Oil pastel


    *   Digital art


    *   Photo


    *   Photorealistic


    *   Hyperrealistic


    *   Neon photo


    *   35-mm macro photo


    *   High-quality photo


    *   Silhouette


    *   Vaporware


    *   Cartoon


    *   Plush object


    *   Marble sculpture


    *   Hand sketch


    *   Poster


    *   Pencil and watercolor


    *   Synth wave


    *   Comic book style


    *   Hand drawn


    ### DALL·E Golden Rule #2: Be Descriptive with What You Want in the Foreground
    and Background


    I cannot emphasize enough that you need to be descriptive with DALL⋅E in order
    to get consistent, desirable results. It may sound weird, but the best way to
    describe your image to DALL⋅E is to act like you’re describing a dream to another
    person.


    So, as a mental exercise between us, try to describe your last dream. As you describe
    the people, places, and things in your dream, you have in your mind the most important
    things that you remember, as well as the experience that you felt. As you describe
    things to another person, tiny details start to emerge such as


    *   How many people were present (if any)?


    *   What position were the people or animals in? Standing, sitting, or laying
    down?


    *   What things were in the scenery and the background?


    *   What items stood out to you? Sounds? Smells? Colors?


    *   How did you feel? Happy, eerie, excited?


    *   What was the perceived time of day? Morning, midday, night?


    If you can describe a dream to another person, then you should have no problem
    describing what you want to DALL⋅E.'
  trans: "\n# 使用 `OpenAI.openai.images.generate()` 创建图像\n\n`OpenAI.images.generate()`\
    \ 方法允许你使用 DALL·E 模型，根据文本提示动态创建图像。\n\n表 5-2 描述了创建图像所需的 JSON 对象格式。显而易见，`prompt`\
    \ 是成功调用服务的唯一必需参数。\n\n**表 5-2** 创建图像端点的请求体\n\n| 字段 | 类型 | 是否必需 | 描述 |\n| --- |\
    \ --- | --- | --- |\n| `prompt` | `String` | 必需 | 在此描述你想要创建的图像。对于 `dall-e-2`，最大长度为\
    \ 1000 个字符；对于 `dall-e-3`，最大长度为 4000 个字符。 |\n| `model` | `String` 默认值：`\"dall-e-2\"\
    ` | 可选 | 用于生成图像的模型名称。兼容的模型包括：`\"dall-e-2\"`、`\"dall-e-3\"`。 |\n| `n` | `integer`\
    \ 或 `null` 默认值：`1` | 可选 | 请求创建的图像数量。必须在 1 到 10 之间。注意：由于 `dall-e-3` 的复杂性，OpenAI\
    \ 可能会将你的请求限制为单张图像。 |\n| `quality` | `String` 默认值：`\"standard\"` | 可选 | 允许你指定生成图像的质量。此参数仅对\
    \ `dall-e-3` 有效。可接受的值有：`\"standard\"`、`\"hd\"`。 |\n| `size` | `String` 或 `null`\
    \ 默认值：`\"1024x1024\"` | 可选 | 生成图像的尺寸。`dall-e-2` 可用的图像尺寸有：`\"256x256\"`、`\"512x512\"\
    `、`\"1024x1024\"`。`dall-e-3` 可用的图像尺寸有：`\"1024x1024\"`、`\"1792x1024\"`（横向）、`\"\
    1024x1792\"`（纵向）。 |\n| `style` | `String` 默认值：`\"vivid\"` | 可选 | 允许你指定生成图像的自然程度。此参数仅对\
    \ `dall-e-3` 有效。可接受的值有：`\"natural\"`（适合照片）、`\"vivid\"`（适合艺术风格）。 |\n| `response_format`\
    \ | `String` 或 `null` 默认值：`\"url\"` | 可选 | 生成图像的格式。可接受的值有：`\"url\"`、`\"b64_json\"\
    `。 |\n| `user` | `String` | 可选 | 代表最终用户的唯一标识符，可帮助 OpenAI 监控和检测滥用行为。 |\n\n### 创建图像（JSON）\n\
    \n### 处理响应\n\n成功调用该方法后，API 将返回一个 `Image` JSON 对象。以下是 `Image` 对象的详细说明，它只有一个参数（表\
    \ 5-3）。\n\n**表 5-3** `Image` 对象的结构\n\n| 字段 | 类型 | 描述 |\n| --- | --- | --- |\n\
    | `url`（或）`b64_json` | `String` | 如果请求中的 `response_format` 为 `\"url\"`，则这是生成图像的\
    \ URL。（或）如果请求中的 `response_format` 为 `\"b64_json\"`，则这是 base64 编码的 JSON 图像。 |\n\
    \n### 图像\n\n## 使用 DALL·E 模型创建图像\n\n从表 5-2 和表 5-3 可以看出，使用 DALL·E 模型创建图像是一个非常直接的过程。因此，我们在清单\
    \ 5-9 中的代码展示了如何在 JavaScript 中以编程方式创建图像。\n\n```\nconst { OpenAI } = require(\"\
    openai\");\nrequire(\"dotenv\").config();\nasync function main() {\n  // 使用你的\
    \ API 密钥设置 OpenAI 客户端\n  const openai = new OpenAI({\n    apiKey: process.env.OPENAI_API_KEY,\n\
    \  });\n  const response = await openai.images.generate({\n    model: \"dall-e-3\"\
    ,\n    n: 1,\n    // 图像的提示词\n    prompt:\n      \"a 35mm macro photo of 3 cute\
    \ Rottweiler puppies with no collars laying down in a field\",\n    size: \"1024x1024\"\
    ,\n  });\n  image_url = response.data[0].url;\n  console.log(image_url);\n}\n\
    main();\n```\n\n*清单 5-9* 使用 DALL·E 模型通过 JavaScript 创建图像\n\n好了，我们来分解一下这个代码示例中发生的事情。我们使用\
    \ OpenAI API 中的 `openai.images.generate()` 函数，根据我们的提示词生成图像。\n\n- 定义了一个 `prompt`。在本例中，提示词描述了所需的图像：“a\
    \ 35mm macro photo of 3 cute Rottweiler puppies with no collars laying down in\
    \ a field.”\n- 指定了生成图像的所需 `size` 为 `\"1024x1024\"`。\n- 使用提供的 `prompt`、`size` 和\
    \ `model` 参数调用 `openai.images.generate()` 函数。该函数使用指定的模型（`\"dall-e-3\"`）根据输入的提示词生成图像。\n\
    - 响应对象（称为 `ImageResponse`）包含有关生成图像的信息，包括其 URL。\n- 最后，代码打印出生成图像的 URL。\n\n总之，这段代码使用\
    \ DALL·E 模型，根据提供的提示词生成了一张三只可爱的罗威纳幼犬躺在田野里的图像，然后打印出可以访问该生成图像的 URL。\n\n## 可视化播客\n\
    \n现在我们有了使用 DALL·E 模型创建图像所需的代码，图 5-2 展示了根据前面清单 5-8 中的文本提示词生成的图像。\n\n![](img/625846_1_En_5_Fig2_HTML.jpg)\n\
    \n一个长着卷曲长发的小女孩赤脚坐在郁郁葱葱的绿色花园的草地上。她穿着一件粉色毛衣和一条绿色裙子。她身边有一只毛茸茸的黑色狗，吐着舌头，看起来很满足。背景是鲜艳的绿色植物和紫色的花朵，营造出一种宁静而迷人的氛围。\n\
    \n**图 5-2** AI 生成的图像。DALL·E 根据“This American Life”播客第 811 集生成的女孩和她的狗的图像\n\n##\
    \ DALL·E 提示词工程与最佳实践\n\n现在，使用 DALL·E 创建图像需要提示词工程，才能获得一致、理想的结果。最好尝试不同的提示词来练习，看看哪些对你和你的用例有效。也许你更喜欢绘画而不是\
    \ 3D 效果的图像？也许你需要照片而不是数字艺术？也许你希望图像是特写镜头而不是肖像？有很多可能性需要考虑。\n\n无论你的用例是什么，这里有两条黄金法则，可以帮助你充分利用\
    \ DALL·E 提示词。\n\n### DALL·E 黄金法则 #1：熟悉 DALL·E 可以生成的图像类型\n\n首先也是最重要的，DALL·E 需要理解的最重要的事情之一是需要生成的图像类型。以下是\
    \ DALL·E 能够创建的几种最常见的图像类型列表：\n\n- 3D 渲染\n- 绘画\n- 抽象画\n- 表现主义油画\n- 油画（任何已故艺术家的风格）\n\
    - 油画棒\n- 数字艺术\n- 照片\n- 照片级真实感\n- 超写实\n- 霓虹照片\n- 35 毫米微距照片\n- 高质量照片\n- 剪影\n- 蒸汽波\n\
    - 卡通\n- 毛绒玩具\n- 大理石雕塑\n- 手绘草图\n- 海报\n- 铅笔与水彩\n- 合成波\n- 漫画风格\n- 手绘\n\n### DALL·E\
    \ 黄金法则 #2：详细描述你希望出现在前景和背景中的内容\n\n我再怎么强调也不为过：为了获得一致、理想的结果，你需要对 DALL·E 进行详细描述。这听起来可能有点奇怪，但向\
    \ DALL·E 描述图像的最佳方式，就像你向另一个人描述一个梦一样。\n\n所以，作为我们之间的一个思维练习，试着描述你最近做的一个梦。当你描述梦中的人物、地点和事物时，你脑海中会浮现出你记得的最重要的事情，以及你所感受到的体验。当你向另一个人描述事情时，微小的细节开始浮现，例如：\n\
    \n- 有多少人在场（如果有的话）？\n- 人或动物处于什么姿势？站着、坐着还是躺着？\n- 场景和背景中有什么东西？\n- 什么东西让你印象深刻？声音？气味？颜色？\n\
    - 你感觉如何？快乐、诡异、兴奋？\n- 感觉是什么时间？早晨、中午、夜晚？\n\n如果你能向另一个人描述一个梦，那么你应该毫无问题地向 DALL·E 描述你想要的东西。\n"
- fmt: '# Conclusion


    In this chapter, we accomplished a lot! With a few scripts, we created a Podcast
    Visualizer.


    - We created and used the `audio-splitter` script, which works as a utility for
    us. If you have an audio file that’s larger than the limitations of the Whisper
    model, this script will give you a folder of smaller audio files to send to Whisper.

    - We created a script to use the `audio-splitter` and send the folder of files
    to Whisper for transcription. Your only limitation is the number of requests that
    you can send to the Whisper model.

    - We did a little prompt engineering in order to get a descriptive prompt of the
    imagery in a podcast based upon the transcript.

    - Finally, we created and used the `DALLE-model` to take the prompt generated
    from calling the `gpt-4-o-mini` model and getting an image that represents the
    podcast episode visually.


    ## Exercises Left for the Reader


    So, there are obviously a few additional things we can do here, and these steps
    will be left for you (the reader) to accomplish, for example:


    - The `audio-splitter` script our JavaScript interface to FFmpeg. FFmpeg can not
    only split audio files, but can also do a lot more with media files, such as format
    conversion and reencoding. Experiment to see which of the supported media formats
    by Whisper are the smallest audio files. Hint: It’s definitely not WAV format.


    If you’re planning to create an app or a service that automatically generates
    images based upon a textual prompt from your end users, then you definitely would
    want to update the DALL-E script in order to ensure that you’re tracking and providing
    in your request the `user` parameter. This is due to the fact that your end user
    has the potential to generate harmful images through your API key. Remember, you
    have an API account with Open AI, and they don’t! As a result, you need to be
    aware if you need to terminate your business relationship with a user who is violating
    Open AI content rules through your service.


    # Creating an Automated Community Manager Bot with Discord and JavaScript


    When you’re launching an app or a service, it’s important to build and maintain
    your own community. Below are the telltale signs of a healthy user community:


    - Members engage in meaningful discussions, sharing insights, feedback, and support.

    - Disagreements or debates occur, but they are approached constructively without
    resorting to personal attacks or derogatory language.

    - There’s an atmosphere of respect, where members listen to each other and acknowledge
    differing opinions.

    - A mix of old and new members actively participate, ensuring the community remains
    vibrant and doesn’t stagnate.

    - Users contribute diverse content, from answering questions to sharing resources,
    which enriches the community’s knowledge base.

    - There’s a balance between giving and taking; members who seek help or information
    also offer it to others.

    - New members frequently join, often referred by existing members, indicating
    that the community is seen positively and worth recommending.

    - Users often become advocates for the community or platform, promoting it outside
    of the direct community space, such as on social media or other forums.

    - The community helps to shape the app or service by providing new ideas for features
    and functionality.


    No matter what type of app or service that we create, we would love for our user
    community to exemplify the items listed above!


    ## Choosing Discord as Your Community Platform


    Over the past few years, Discord has surged in popularity as a useful tool for
    community management for people who are passionate about their communities. This
    is partially due to its cross-platform compatibility, allowing members to stay
    connected whether they’re on a desktop, mobile device, or web browser. However,
    one of its standout features is the invitation-based community system, which helps
    community managers to control growth and prevents spam. This model not only ensures
    a tailored experience for members but also enhances security, since community
    managers have the discretion to grant or deny access.


    Discord not only supports text messaging but also supports voice chats and streaming
    video. Very similar to Slack, Discord allows community managers to separate content
    into channels to organize discussions, streamline information flow, and to help
    users see the content that they’re interested in.


    ## Creating a More Advanced Bot Than Our Slack Bot


    Now, If you successfully went through the steps in Chapter [4](#625846_1_En_4_Chapter.xhtml)
    where we worked with a Slack bot, then the steps in this chapter will feel familiar
    to you. In Chapter [4](#625846_1_En_4_Chapter.xhtml), we created a Slack bot to
    read a single channel during a time period and get a summary of the content discussed.
    The Slack bot was not a community manager, but was more like a helpful assistant.


    For the remainder of this book, we’re going to perform all the steps necessary
    to make powerful bots for Discord that will use AI to help actually manage the
    community.


    ## Creating a More Advanced Bot Than Any Typical Discord Bot


    If you’ve ever had any experience using a Discord bot, then you’re probably aware
    that the most common way in order to interact with them is with what’s called
    a “/command”. This enables typical bots (read: non-intelligent bots) to essentially
    work only when they have received a very specific operation or command. If the
    “/command” is not provided, then the bot will be silent and not do anything. Essentially,
    it exemplifies the phrase, “speak only when you are spoken to.”


    However, we are creating a Discord bot that will be artificially intelligent,
    and therefore it will be much more advanced than any typical Discord bot. We’re
    going to create bots that will be able to read and see all messages in the Discord
    server and be intelligent enough to respond correctly.


    ## Understanding the Roles for the Bots


    So let’s explore a scenario in order to make things real. We’re creating a public
    Discord server to interact with the users of a mobile banking app. Our end goal
    is to have bots written in JavaScript to handle the following scenarios:


    - Q&A: Monitor a specific channel and automatically answer questions from users
    about how to use the banking app. For this to work, the bot will need to be trained
    on how the app works.

    - No Solicitations: For any business community, it’s important that the participants
    of the community are not being targeted by unscrupulous individuals. For example,
    if you’re creating a banking app, do you want your customers contacted by anyone
    whose username is “B4nk Admin”?

    - No Harmful Content: For any community, it’s important for the members to be
    protected from harmful content such as hate language.


    ## Our Example Bank: Crook’s Bank


    For the purposes of this example, we decided upon a fictional name of a fictional
    bank that would have an extremely low likelihood of coinciding with the name of
    a real bank. Therefore, for this example, “Crook’s Bank” is launching a new mobile
    app for customers of their bank. They want to have a channel that will be monitored
    by a bot to answer questions from users of the app, and they also want to ensure
    that no one is soliciting users of their app, or posting hurtful or harmful content
    in their Discord servers.


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig1_HTML.jpg)


    A smartphone screen displays a playful illustration with the text "Welcome to
    Crooks Bank!" A cartoon character dressed as a thief, wearing a mask and beanie,
    holds a money bag with a dollar sign. The background features colorful, abstract
    bubbles and geometric shapes, creating a whimsical and humorous tone.


    **Figure 6-1** This fake App from a Fake Bank has real problems'
  raw: '## Conclusion


    In this chapter, we accomplished a lot! With a few scripts, we created a Podcast
    Visualizer.


    *   We created and used the audio-splitter script, which works as a utility for
    us. If you have an audio file that’s larger than the limitations of the Whisper
    model, this script will give you a folder of smaller audio files to send to Whisper.


    *   We created a script to use the audio-splitter and send the folder of files
    to Whisper for transcription. Your only limitation is the number of requests that
    you can send to the Whisper model.


    *   We did a little prompt engineering in order to get a descriptive prompt of
    the imagery in a podcast based upon the transcript.


    *   Finally, we created and used the DALLE-model to take the prompt generated
    from calling the gpt-4-o-mini model and getting an image that represents the podcast
    episode visually.


    ## Exercises Left for the Reader


    So, there are obviously a few additional things we can do here, and these steps
    will be left for you (the reader) to accomplish, for example:


    *   The audio-splitter script our JavaScript interface to FFmpeg. FFmpeg can not
    only split audio files, but can also do a lot more with media files, such as format
    conversion and reencoding. Experiment to see which of the supported media formats
    by Whisper are the smallest audio files. Hint: It’s definitely not WAV format.


    If you’re planning to create an app or a service that automatically generates
    images based upon a textual prompt from your end users, then you definitely would
    want to update the DALL-E script in order to ensure that you’re tracking and providing
    in your request the user parameter. This is due to the fact that your end user
    has the potential to generate harmful images through your API key. Remember, you
    have an API account with Open AI, and they don’t! As a result, you need to be
    aware if you need to terminate your business relationship with a user who is violating
    Open AI content rules through your service.


    # 6. Creating an Automated Community Manager Bot with Discord and JavaScript


    When you’re launching an app or a service, it’s important to build and maintain
    your own community. Below are the telltale signs of a healthy user community:


    *   Members engage in meaningful discussions, sharing insights, feedback, and
    support.


    *   Disagreements or debates occur, but they are approached constructively without
    resorting to personal attacks or derogatory language.


    *   There’s an atmosphere of respect, where members listen to each other and acknowledge
    differing opinions.


    *   A mix of old and new members actively participate, ensuring the community
    remains vibrant and doesn’t stagnate.


    *   Users contribute diverse content, from answering questions to sharing resources,
    which enriches the community’s knowledge base.


    *   There’s a balance between giving and taking; members who seek help or information
    also offer it to others.


    *   New members frequently join, often referred by existing members, indicating
    that the community is seen positively and worth recommending.


    *   Users often become advocates for the community or platform, promoting it outside
    of the direct community space, such as on social media or other forums.


    *   The community helps to shape the app or service by providing new ideas for
    features and functionality.


    No matter what type of app or service that we create, we would love for our user
    community to exemplify the items listed above!


    ## Choosing Discord as Your Community Platform


    Over the past few years, Discord has surged in popularity as a useful tool for
    community management for people who are passionate about their communities. This
    is partially due to its cross-platform compatibility, allowing members to stay
    connected whether they’re on a desktop, mobile device, or web browser. However,
    one of its standout features is the invitation-based community system, which helps
    community managers to control growth and prevents spam. This model not only ensures
    a tailored experience for members but also enhances security, since community
    managers have the discretion to grant or deny access.


    Discord not only supports text messaging but also supports voice chats and streaming
    video. Very similar to Slack, Discord allows community managers to separate content
    into channels to organize discussions, streamline information flow, and to help
    users see the content that they’re interested in.


    ## Creating a More Advanced Bot Than Our Slack Bot


    Now, If you successfully went through the steps in Chapter [4](#625846_1_En_4_Chapter.xhtml)
    where we worked with a Slack bot, then the steps in this chapter will feel familiar
    to you. In Chapter [4](#625846_1_En_4_Chapter.xhtml), we created a Slack bot to
    read a single channel during a time period and get a summary of the content discussed.
    The Slack bot was not a community manager, but was more like a helpful assistant.


    For the remainder of this book, we’re going to perform all the steps necessary
    to make powerful bots for Discord that will use AI to help actually manage the
    community.


    ## Creating a More Advanced Bot Than Any Typical Discord Bot


    If you’ve ever had any experience using a Discord bot, then you’re probably aware
    that the most common way in order to interact with them is with what’s called
    a “/command”. This enables typical bots (read: non-intelligent bots) to essentially
    work only when they have received a very specific operation or command. If the
    “/command” is not provided, then the bot will be silent and not do anything. Essentially,
    it exemplifies the phrase, “speak only when you are spoken to.”


    However, we are creating a Discord bot that will be artificially intelligent,
    and therefore it will be much more advanced than any typical Discord bot. We’re
    going to create bots that will be able to read and see all messages in the Discord
    server and be intelligent enough to respond correctly.


    ## Understanding the Roles for the Bots


    So let’s explore a scenario in order to make things real. We’re creating a public
    Discord server to interact with the users of a mobile banking app. Our end goal
    is to have bots written in JavaScript to handle the following scenarios:


    *   Q&A: Monitor a specific channel and automatically answer questions from users
    about how to use the banking app. For this to work, the bot will need to be trained
    on how the app works.


    *   No Solicitations: For any business community, it’s important that the participants
    of the community are not being targeted by unscrupulous individuals. For example,
    if you’re creating a banking app, do you want your customers contacted by anyone
    whose username is “B4nk Admin”?


    *   No Harmful Content: For any community, it’s important for the members to be
    protected from harmful content such as hate language.


    ## Our Example Bank: Crook’s Bank


    For the purposes of this example, we decided upon a fictional name of a fictional
    bank that would have an extremely low likelihood of coinciding with the name of
    a real bank. Therefore, for this example, “Crook’s Bank” is launching a new mobile
    app for customers of their bank. They want to have a channel that will be monitored
    by a bot to answer questions from users of the app, and they also want to ensure
    that no one is soliciting users of their app, or posting hurtful or harmful content
    in their Discord servers.


    ![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig1_HTML.jpg)


    A smartphone screen displays a playful illustration with the text "Welcome to
    Crooks Bank!" A cartoon character dressed as a thief, wearing a mask and beanie,
    holds a money bag with a dollar sign. The background features colorful, abstract
    bubbles and geometric shapes, creating a whimsical and humorous tone.


    Figure 6-1


    This fake App from a Fake Bank has real problems'
