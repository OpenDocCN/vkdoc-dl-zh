    the code, but there are a couple of things we can improve on.


    AccuWeather has icons for various weather conditions. Right now, we can see that
    the weather in New York is currently cloudy, but we could also get a longer description
    that describes the weather for the rest of the day. Additionally, for those of
    us who live in the United States, it makes sense to see the temperature in Fahrenheit.
    So let’s get ChatGPT to help us make those changes for us.


    Since ChatGPT can retain the context, we’re going to prompt ChatGPT in the same
    Chat conversation as in Listing [2-9](#625846_1_En_2_Chapter.xhtml#PC22):


    ```

    Thank you. I would like to make a few changes to this code.

    •    Instead of using Celcius retrieve the temperature in Fahrenheit

    •    Make an API call to get an icon number and an icon url to print in the response

    •    Make an API call to get a weather description in the response

    Listing 2-9

    Prompting ChatGPT to Change the Code to Get a More Detailed Response from the
    AccuWeather API

    ```


    This is the answer we got from ChatGPT (Listing [2-10](#625846_1_En_2_Chapter.xhtml#PC23)).'
