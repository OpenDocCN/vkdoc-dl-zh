    \ other capabilities available in the Routes API, you would see features to request\
    \ various types of information such as air quality, pollen count, aerial views\
    \ (like you’d see when you use Google Maps), and many other features of Google\
    \ Maps you may normally take for granted. Do you know what geocoding is? Well,\
