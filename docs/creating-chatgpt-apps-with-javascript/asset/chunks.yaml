- fmt: '#### For Linux


    To set the environment variable for the current session, open a terminal window
    and use the `export` command. Replace `“your-api-key-here”` with your actual API
    key.


    ```

    export OPENAI_API_KEY=''your-api-key-here''

    Listing 2-1

    Adding an Environment Variable on Your Hard Drive on Linux

    ```


    To make the environment variable persistent across sessions, you can add it to
    your shell’s configuration file, such as `~/.bashrc` for Bash. Here’s how you
    can do it:


    Open the configuration file in a text editor. For example:


    ```

    nano ~/.bashrc

    ```


    Add the following line at the end of the file:


    ```

    export OPENAI_API_KEY=''your-api-key-here''

    ```


    Save the file and exit the text editor.


    To apply the changes immediately, you can either close and reopen the terminal
    or run:


    ```

    source ~/.bashrc

    ```


    To verify that the environment variable is set correctly, you can `echo` its value
    in the terminal. This command should display your API key:


    ```

    echo $OPENAI_API_KEY

    ```


    ### Option #2: Creating a .env File


    Using a system-wide environment variable is great for making the API key accessible
    by any application or script running on the machine. However, if your use case
    is a little more simplistic, we can simply create a local variable accessible
    within just the scope of a particular program or script. It’s also useful for
    situations in which different projects necessitate different keys, so you can
    prevent conflicts in key usage. Let’s dive right in!


    We’re going to start by creating a local `.env` file. This file will hold your
    API key, ensuring it’s only utilized by the designated project. Navigate to the
    project folder where you intend to create the `.env` file.


    **Note**


    To prevent your `.env` file from being unintentionally shared via version control,
    create a `.gitignore` file in your project’s root directory. Add a line with `.env`
    to ensure the confidentiality of your API key and other sensitive information.


    Next, use the terminal or an IDE to create both the `.gitignore` and `.env` files.
    Copy your API key and replace `“your-api-key-here”` with your actual API key without
    the single quotation marks.


    At this point, your `.env` file should look like this:


    ```

    OPENAI_API_KEY=''your-api-key-here''

    ```


    Finally, you can import the API key into your Node.js code using the following
    snippet:


    ```

    import OpenAI from "openai";

    import "dotenv/config";

    // Create a new open ai client

    const openai = new OpenAI({

    apiKey: process.env["OPENAI_API_KEY"],

    });

    Listing 2-2

    Importing Your .env File Into Your Node.js Application

    ```


    Of course, you’ll need to install the `dotenv` package if you don’t have it already.
    Just execute:


    ```

    npm install dotenv

    ```


    ### Option #3: Hard Coding the API Key Directly in Your Application (Take with
    Caution)


    This last method isn’t recommended for long-term use because of security reasons.
    But, for the sake of knowing how things work, we’re going to cover how you can
    hard code your API key into your application if you want to quickly test out your
    API key to make sure it’s working.


    To begin, you’ll assign the API key to a variable within the JavaScript code.
    Replace `“YOUR_API_KEY”` with the actual API key you received from OpenAI. Ensure
    that this API key is kept secure and not shared publicly.


    Next, you’ll initialize the OpenAI client within your Node.js script. This is
    done by instantiating the `OpenAI` class with the `api_key` parameter set to the
    API key. By providing the API key during initialization, you enable the OpenAI
    client to access the services offered by the OpenAI API. This step ensures that
    your Node.js script can communicate with the OpenAI API using the specified API
    key.


    ```

    import OpenAI from "openai";

    import "dotenv/config";

    const API_KEY = "YOUR_API_KEY";

    const openai = new OpenAI({

    apiKey: API_KEY,

    });

    Listing 2-3

    Coding Your API Key Directly into Your Application

    ```


    Now let’s make our first application with the OpenAI API and test out the key
    at the same time by getting a list of models available within the OpenAI API.


    **Note**


    From this point on, the code examples will be accessing our API key with a local
    `.env` file.


    ## Creating Your First JavaScript ChatGPT App: list-models


    We’re actually going to accomplish two tasks at once here. We’re going to create
    a basic Node.js script using the OpenAI APIs, and in the process, we’re going
    to verify that we’ve properly obtained an API key. So, needless to say, in case
    you haven’t done so already, follow the instructions in Chapter [1](#625846_1_En_1_Chapter.xhtml)
    to create your OpenAI developer account and obtain your API key. Going forward,
    all the code samples in this book require a valid API key.


    ## Using `openai.models.list()` to Get a List of Available Models


    One of the most basic (but also essential) capabilities that we can get a list
    of available models. Why, you may ask? The ChatGPT website only exposes a handful
    of models available, and the Playground adds a few more that you can use. However,
    by invoking `openai.models.list()`, you get a list that specifies the name of
    every model, and there’s a lot to choose from!


    ### Handling the Response


    **Note**


    Since objects can contain Arrays (which can be hard to represent in a table),
    we’re using the following notation “↳” to indicate the elements of the Array.
    As you can see from Table [2-1](#625846_1_En_2_Chapter.xhtml#Tab1), `“id”`, `“object”`,
    `“created”`, and `“owned_by”` are all elements of the `“data”` Array in the response.


    **Table 2-1**


    The Structure of the Model Object


    | Field | Type | Description |

    | --- | --- | --- |

    | `object` | String | This always returns the literal, `“list”` |

    | `data` | Array | An Array of AI models offered by OpenAI |

    | `↳ id` | String | The unique ID of the AI model, which is essentially the full
    name of the model |

    | `↳ object` | String | This always returns the literal, `“model”` |

    | `↳ created` | integer | The creation date for the model |

    | `↳ owned_by` | String | The name of the organization that owns the model |


    Now that we have the details of the Model object, let’s talk about how we can
    test our API key we obtained in the first chapter. There are actually a few ways
    to do this.'
