- fmt: '### Prompt #2: “Explain This in 3 Sentences or Less”


    So, if `tl;dr` doesn’t provide a brief enough explanation for you, then we can
    tell `ChatGPT` to make things even simpler. `ChatGPT` does well with parameters,
    so let’s specify that the explanation shouldn’t be any longer than three sentences
    (Listing [4-4](#625846_1_En_4_Chapter.xhtml#PC4)).


    ```

    System: You are a helpful assistant

    User:  Fatima [16:00 | 02/08/2019]: Hey everyone, I have an urgent ...

    User: Explain this in 3 sentences or less.

    Model: gpt-4o

    Temperature: 1

    Maximum length: 250

    Top P: 0

    Frequency penalty: 0

    Presence penalty: 0

    Listing 4-4

    PROMPT. Asking for a Shorter Version of a Longer Conversation

    ```


    As you may have noticed, the `temperature` is set to `0.82` in this example. We
    really want `ChatGPT` to give us a concise answer here, so the “drier” the better.


    ```

