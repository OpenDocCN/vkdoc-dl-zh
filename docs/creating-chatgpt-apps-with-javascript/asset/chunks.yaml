    \ 和 `distance`。\n\n将 `'YOUR_GOOGLE_MAPS_API_KEY'` 替换为你的实际 API 密钥，并根据需要更新 `origin`\
    \ 和 `destination`。\n\n### 运行脚本\n\n1. 将脚本保存到文件，例如 `getTravelInfo.js`。\n2. 使用 Node.js\
    \ 运行脚本：\n\n```sh\nnode getTravelInfo.js\n```\n\n这将在控制台打印指定起点和终点之间的行程时间和距离。\n\n\
    **清单 2-17** 从 ChatGPT 获取响应以避免阅读文档\n\n如果你运行此代码，应该会得到这个非常清晰、非常简单的响应：\n\n```\n距离:\
    \ 2,789 英里, 时长: 1 天 17 小时\n```\n\n## 结论\n\n让我们破除一个常见的误解并澄清事实：ChatGPT 并不是什么能读心的巫师！作为一种\
    \ AI 工具，它无法取代开发人员和架构师的专业知识。然而，它可以补充开发人员的编程技能，并在编码时为你节省一些时间和精力。\n\n如你所见，将 ChatGPT\
    \ 用作结对编程伙伴的最大好处之一是，它可以将你的自然语言请求转换为可运行的代码。但是，我们不要忘记，在实践 AI（不仅仅是 ChatGPT）时，人类判断的关键作用。最终，由人类来决定是使用、调整还是完全抛弃结果。\n\
    \n# 3. 在 JavaScript 中创建基础 ChatGPT 客户端\n\n本章的目的简单明了。我们将仅用几行 JavaScript 代码构建最强大的\
    \ ChatGPT 客户端。这个客户端将比你在 ChatGPT 网站上能做的多得多，并且将提供比我们在第 1 章中看到的 Chat Playground 更多的选项。\n\
    \n## 在 JavaScript 中创建我们的 ChatGPT 客户端应用程序\n\n清单 3-1 是我们的 ChatGPT 客户端的 JavaScript\
    \ 代码。这是一个简单的客户端，允许我们使用 JSON 创建 `system` 和 `user` 消息。我们还可以指定所需的模型和配置参数，例如要使用的令牌数量。\n\
    \n```javascript\nimport OpenAI from \"openai\";\nimport \"dotenv/config\";\n//\
    \ 创建一个新的 open ai 客户端\nconst openai = new OpenAI({\napiKey: process.env[\"OPENAI_API_KEY\"\
    ],\n});\nasync function main() {\nconst chatCompletion = await openai.chat.completions.create({\n\
    messages: [\n{\nrole: \"system\",\ncontent: \"你是一名 JavaScript 开发者\",\n},\n{\n\
    role: \"user\",\ncontent: \"为什么 JavaScript 用于 Web 开发？\",\n},\n],\nmodel: \"gpt-4o\"\
    ,\ntemperature: 0.85,\ntop_p: 1,\nmax_tokens: 1921,\nfrequency_penalty: 0,\npresence_penalty:\
    \ 0,\n});\nconst result = chatCompletion.choices[0].message.content;\nconsole.log(result);\n\
    }\nmain();\n```\n\n**清单 3-1** JavaScript ChatGPT 客户端\n\n当你分析清单 3-1 中的代码时，你会看到一些在\
    \ Chat Playground 中非常熟悉的内容，例如 `model`、`messages`、`temperature` 和 `tokens`。\n\n\
    ## 切勿将你的 API 密钥放入 Web 应用程序！\n\n从清单 3-1 的代码可以看出，只需几行代码就可以在 JavaScript 中创建一个功能完整的\
    \ ChatGPT 客户端应用程序。在本章后面，我们将调用该脚本并查看结果。\n\n当然，我们都知道 JavaScript 的主要优势之一是它既可以在服务器端运行，也可以在客户端的浏览器中运行。那么，这是否意味着在你的\
    \ React、Angular 或 Vue 项目中使用此代码为网站访问者创造绝佳体验是个好主意呢？\n\n哦，我亲爱的天真孩子。不，不，绝对不行。请记住，Web\
    \ 应用程序中的所有代码对世界都是 100% 可见的。为了让这段代码在 Web 浏览器中工作，你需要向将在 Web 浏览器中运行的代码提供你的 OpenAI\
    \ API 密钥。任何有能力的开发者都可以使用大量可用的工具来查看你的 Web 应用程序的源代码并发现你的 OpenAI API 密钥。这意味着他们可以轻松地为你产生巨额账单，并可能以违反\
    \ OpenAI 服务条款的方式使用你的 API 密钥。\n\n因此，构建支持 AI 的 Web 应用程序的最佳实践是，在你的服务器端使用 Node.js\
    \ 进行所有对 OpenAI API 的调用。这样，你的 API 密钥就不可能被暴露。\n\n## 使用 `OpenAI.chat.completions.create()`\
