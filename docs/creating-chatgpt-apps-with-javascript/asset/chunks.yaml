    # 结论


    在本章中，我们收获颇丰！仅用几个脚本，我们就创建了一个播客可视化工具。


    -   我们创建并使用了 `audio-splitter` 脚本，它作为我们的一个实用工具。如果你有一个音频文件，其大小超过了 Whisper 模型的限制，这个脚本会为你提供一个包含多个较小音频文件的文件夹，以便发送给
    Whisper。

    -   我们创建了一个脚本，用于调用 `audio-splitter` 并将文件夹中的文件发送给 Whisper 进行转录。你唯一的限制是能够发送给 Whisper
    模型的请求数量。

    -   我们进行了一些提示工程，以便根据转录内容获取播客中图像的描述性提示。

    -   最后，我们创建并使用了 `DALLE-model`，它接收调用 `gpt-4-o-mini` 模型生成的提示，并生成一张能够直观代表该播客剧集的图像。


    ## 留给读者的练习


    显然，这里还有一些额外的工作可以做，这些步骤将留给你（读者）去完成，例如：


    -   `audio-splitter` 脚本是我们与 FFmpeg 交互的 JavaScript 接口。FFmpeg 不仅能分割音频文件，还能对媒体文件做更多处理，例如格式转换和重新编码。请尝试找出
    Whisper 支持的媒体格式中，哪种格式的音频文件最小。提示：肯定不是 WAV 格式。


    如果你计划创建一个能根据最终用户的文本提示自动生成图像的应用或服务，那么你肯定需要更新 DALL-E 脚本，以确保在请求中跟踪并提供 `user` 参数。这是因为你的最终用户有可能通过你的
    API 密钥生成有害图像。请记住，你拥有 OpenAI 的 API 账户，而他们没有！因此，你需要留意，是否要终止与那些通过你的服务违反 OpenAI 内容规则的用户之间的业务关系。


    # 使用 Discord 和 JavaScript 创建自动化社区管理机器人


    当你发布一个应用或服务时，建立并维护自己的社区至关重要。以下是健康用户社区的典型标志：


    -   成员参与有意义的讨论，分享见解、反馈和支持。

    -   存在分歧或辩论，但会以建设性的方式处理，不会诉诸人身攻击或使用贬损性语言。

    -   存在相互尊重的氛围，成员们互相倾听并承认不同意见。

    -   新老成员混合积极参与，确保社区保持活力，不会停滞不前。

    -   用户贡献多样化的内容，从回答问题到分享资源，丰富了社区的知识库。

    -   在索取与给予之间取得平衡；寻求帮助或信息的成员也会向他人提供帮助。

    -   新成员频繁加入，通常由现有成员推荐，这表明社区被视为积极且值得推荐的。

    -   用户经常成为社区或平台的倡导者，在直接社区空间之外（例如社交媒体或其他论坛）进行推广。

    -   社区通过为功能和特性提供新想法，帮助塑造应用或服务。


    无论我们创建何种类型的应用或服务，我们都希望我们的用户社区能够体现上述各项！


    ## 选择 Discord 作为你的社区平台


    在过去几年中，Discord 作为社区管理工具，在热衷于社区的人群中人气飙升。部分原因在于其跨平台兼容性，允许成员无论是在桌面端、移动设备还是网页浏览器上都能保持联系。然而，其最突出的特点之一是基于邀请的社区系统，这有助于社区管理者控制增长并防止垃圾信息。这种模式不仅为成员提供了量身定制的体验，还增强了安全性，因为社区管理者有权决定是否授予访问权限。


    Discord 不仅支持文本消息，还支持语音聊天和视频流。与 Slack 非常相似，Discord 允许社区管理者将内容分隔到不同的频道中，以组织讨论、简化信息流，并帮助用户看到他们感兴趣的内容。


    ## 创建比我们的 Slack 机器人更高级的机器人


    现在，如果你成功完成了第 4 章中关于 Slack 机器人的步骤，那么本章的步骤会让你感到熟悉。在第 4 章中，我们创建了一个 Slack 机器人，用于在特定时间段内读取单个频道并获取所讨论内容的摘要。那个
    Slack 机器人并非社区管理者，而更像一个有用的助手。


    在本书的剩余部分，我们将执行所有必要的步骤，为 Discord 创建强大的机器人，这些机器人将利用 AI 来实际帮助管理社区。


    ## 创建比任何典型 Discord 机器人更高级的机器人


    如果你曾经有过使用 Discord 机器人的经验，那么你可能知道与它们交互的最常见方式是使用所谓的“/命令”。这使得典型的机器人（即非智能机器人）基本上只有在接收到非常具体的操作或命令时才能工作。如果没有提供“/命令”，机器人就会保持沉默，什么也不做。本质上，它体现了“不问你就不说话”这句话。


    然而，我们正在创建一个具有人工智能的 Discord 机器人，因此它将比任何典型的 Discord 机器人先进得多。我们将创建能够读取并查看 Discord
    服务器中所有消息，并且足够智能以做出正确响应的机器人。


    ## 理解机器人的角色


    那么，让我们探讨一个场景，使其变得真实。我们正在创建一个公共 Discord 服务器，以便与移动银行应用的用户进行互动。我们的最终目标是让用 JavaScript
    编写的机器人处理以下场景：


    -   **问答**：监控特定频道，并自动回答用户关于如何使用银行应用的问题。为此，机器人需要接受关于应用如何工作的训练。

    -   **禁止招揽**：对于任何商业社区来说，确保社区参与者不被不道德的人盯上非常重要。例如，如果你正在创建一个银行应用，你希望你的客户被任何用户名为“B4nk
    Admin”的人联系吗？

    -   **禁止有害内容**：对于任何社区来说，保护成员免受仇恨言论等有害内容的侵害非常重要。


    ## 我们的示例银行：克鲁克银行


    出于本示例的目的，我们决定使用一个虚构的银行名称，该名称与真实银行名称重合的可能性极低。因此，在本示例中，“克鲁克银行”正在为其银行客户推出一款新的移动应用。他们希望有一个由机器人监控的频道来回答应用用户的问题，并且他们还希望确保没有人向他们的应用用户进行招揽，或在他们的
    Discord 服务器中发布伤害性或有害的内容。


    ![](img/625846_1_En_6_Fig1_HTML.jpg)


    智能手机屏幕上显示一个有趣的插图，上面写着“欢迎来到克鲁克银行！”一个打扮成小偷的卡通角色，戴着面罩和毛线帽，拿着一个带有美元符号的钱袋。背景是色彩缤纷的抽象气泡和几何形状，营造出一种异想天开和幽默的氛围。


    **图 6-1** 这家假银行的假应用存在真问题

