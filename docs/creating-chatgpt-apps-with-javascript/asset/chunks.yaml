    ## Creating Our Client for Content Moderation


    Listing [8-2](#625846_1_En_8_Chapter.xhtml#PC2) is our updated `chatGPTClient.js`
    script that’s been updated from the previous chapter to allow us to use it for
    invoking both a Chat model and a Moderation model. Take a look at it, and then
    we’ll discuss the important parts afterward.


    ```

    const { OpenAI } = require("openai");

    require("dotenv").config();

    class ChatGPTClient {

    constructor(systemMessage, initialInstructionsToChatGPT) {

    this.systemMessage = systemMessage;

    this.initialInstructionsToChatGPT = initialInstructionsToChatGPT;

    this.client = new OpenAI({

    apiKey: process.env["OPENAI_API_KEY"],

    });

    }

    async sendMessageFromDiscord(userMessage) {

    const chatCompletion = await this.client.chat.completions.create({

    messages: [

    {

    role: "system",

    content: this.systemMessage,

    },

    {

    role: "user",

    content: this.initialInstructionsToChatGPT,

    },

    {

    role: "user",

    content: userMessage,

    },

    ],

    model: "gpt-4",

    temperature: 0.85,

    top_p: 1,

    max_tokens: 1000,

    frequency_penalty: 0,

    presence_penalty: 0,

    });

    const result = chatCompletion.choices[0].message.content;

    return result;

    }

    async isFlagged(message) {

    const response = await this.client.moderations.create({

    input: message,

    });

    return response.results[0].flagged;

    }

    }

    module.exports = { ChatGPTClient };

    Listing 8-2

    The Updated chatgptclient.js

    ```


    If you recall how this script worked from the previous chapter, we defined a class
    with a constructor for the operations that should only be done once, namely, specifying
    the system message and the initial instruction to ChatGPT. None of this has changed
    from the previous chapter.


    The same thing applies to the `sendMessageFromDiscord()` function. We use this
    to invoke the Chat model of our choice using the text of what was typed in the
    Discord channel. As you’ll see later in this chapter, the initial instructions
    will be different from the previous chapter, but the code still works the same.


    However, let’s analyze the following asynchronous function that was added to the
    script:


    ```

    async isFlagged(message) {

    const response = await this.client.moderations.create({

    input: message,

    });

    return response.results[0].flagged;

    }

    ```


    As you can see, using these few lines of code, this is how we are able to invoke
    a Moderations model by calling `OpenAI.moderations.create()` and determine if
    the content has been flagged as being inappropriate.'
