- fmt: "# Specifying OAuth2 Parameters for the Bot\n\nNow it’s time to specify the\
    \ scopes and permissions for our bot. If you followed the steps in creating a\
    \ Slack bot in Chapter [4](#625846_1_En_4_Chapter.xhtml), then (as stated before)\
    \ this procedure will feel familiar to you. Bots cannot and should not have the\
    \ ability to do anything and everything – they should be only allowed to perform\
    \ a list of operations that they were designed to perform.\n\nOn the settings\
    \ navigation menu on the left, navigate to “**OAuth2 ➤ URL Generator**” to continue.\n\
    \nBelow are the scopes that we want:\n\n* Scopes\n  * Bot\n\nThis is reflected\
    \ in Figure [6-9](#625846_1_En_6_Chapter.xhtml#Fig9).\n\n![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig9_HTML.jpg)\n\
    \nThe image shows a Discord application settings interface for a \"Tech Support\
    \ Bot.\" The \"Installation\" section is highlighted in the left sidebar. The\
    \ main panel displays \"Authorization Methods\" with options for \"User Install\"\
    \ and \"Guild Install.\" Below, there's an \"Install Link\" section with a Discord-provided\
    \ URL and a \"Copy\" button. The \"Default Install Settings\" section outlines\
    \ scopes and permissions, including \"applications.commands\" and \"bot,\" with\
    \ permissions for reading message history and sending messages.\n\n**Figure 6-9**\
    \ – Selecting the Scopes\n\nAfter we select the bot’s scope, we get to see all\
    \ the permissions that are only applicable to bots, listed in alphabetical order.\n\
    \nBots can be pretty powerful depending on the permissions you give it. There\
    \ are permissions that allow the bot to act in the capacity of a normal human\
    \ moderator, such as managing the server, roles, and channels. Bots with these\
    \ permissions can also kick and ban members.\n\nWhat we’re going to enable for\
    \ our bot right now are the ones that allow the bot to send and receive messages\
    \ in text channels. This is what we need. Although we’re not doing anything special\
    \ right now with audio, we could enable voice permissions to allow the bot to\
    \ participate in voice channels. Simple enough, right?\n\nSelect the following\
    \ permissions for the bot:\n\n* Bot Permissions\n  * Read Message History\n  *\
    \ Read Messages/View Channels\n  * Send Messages\n\nAlthough you haven’t written\
    \ any JavaScript code yet, now it’s time to invite your bot to your server.\n\n\
    ## Invite Your Bot to Your Server\n\nAs shown in Figure [6-9](#625846_1_En_6_Chapter.xhtml#Fig9),\
    \ after you have selected the appropriate permissions, Discord will give you a\
    \ dynamically generated URL that will enable you to invite your bot to your server.\n\
    \nCopy the URL and paste it into a web browser where you’re already authenticated\
    \ into Discord. The result is shown in Figure [6-10](#625846_1_En_6_Chapter.xhtml#Fig10).\n\
    \n![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig10_HTML.jpg)\n\nDiscord authorization\
    \ screen for an external application named \"Q and A Bot.\" The bot requests access\
    \ to the user's Discord account, signed in as \"javachatgpt_67416.\" Permissions\
    \ include adding a bot to a server and creating commands, but not buying a seafood\
    \ dinner. The server selected is \"Crooks Bank,\" requiring Manage Server permission.\
    \ Options to cancel or continue are available.\n\n**Figure 6-10** – If You Read\
    \ the Screen Carefully Here, You Can See That Discord Has a Sense of Humor\n\n\
    Click the “**Continue**” button to add the bot to your server.\n\nNext, you will\
    \ see a page that looks quite similar to the previous one, but the main difference\
    \ is that it will give you a summary of all the permissions and capabilities of\
    \ the bot. Typically this is quite useful if you are adding a bot to a server\
    \ that you DID NOT CREATE. However, since we created this bot ourselves, this\
    \ is just a confirmation of the settings that we have already specified earlier\
    \ (Figure [6-11](#625846_1_En_6_Chapter.xhtml#Fig11)).\n\n![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig11_HTML.jpg)\n\
    \nDiscord authorization screen for an external application named \"Q and A Bot.\"\
    \ The bot requests access to a Discord account with permissions to send messages\
    \ and read message history on \"Crooks Bank.\" The user is signed in as \"javachatgpt_67416.\"\
    \ The screen includes options to go back or authorize the request. The application\
    \ is noted as active since October 27, 2023, and not used in any servers.\n\n\
    **Figure 6-11** – Confirming the capabilities of the bot\n\nClick the “**Authorize**”\
    \ button to give the bot the permission to run on your server.\n\nIf everything\
    \ went smoothly, then you should see an automated message in the General channel\
    \ of your server that indicates that the process has been successful.\n\n## Getting\
    \ the Discord ID Token for Your Bot and Setting the Gateway Intents\n\nNow it’s\
    \ time to get the Discord ID token for your bot, which you’ll use in your code\
    \ to authenticate your bot programmatically.\n\n> **Note**  \n> For obvious reasons,\
    \ using the word “token” here makes me nervous because this word has two distinct\
    \ meanings in this book due to the context, but here’s a quick refresher on the\
    \ meanings:\n> * When using Discord and Slack APIs, a “token” is an authentication\
    \ token.\n> * When using OpenAI APIs, a “token” is a part of a word.\n\nGo back\
    \ to the Discord developer’s website and click the “**Bot**” category in the settings\
    \ navigation menu to continue.\n\nAlthough you haven’t seen your token yet, you\
    \ need to click on the “Reset Token” button, as shown in Figure [6-12](#625846_1_En_6_Chapter.xhtml#Fig12).\n\
    \nBe sure to copy and save the ID token to someplace safe. You will need this\
    \ token in the JavaScript code that’s presented later in this chapter.\n\n![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig12_HTML.jpg)\n\
    \nDiscord bot setup interface showing the \"Bot\" section. The screen includes\
    \ options to add an icon and banner for the bot, with an icon already selected.\
    \ The bot's username is \"Q and A Bot\" with a unique identifier. There is a \"\
    Reset Token\" button for security purposes. The sidebar menu includes sections\
    \ like General Information, Installation, OAuth2, and more.\n\n**Figure 6-12**\
    \ – Click the “Reset Token” button to see your ID Token\n\nScroll down the page\
    \ to the section named, “**Privileged Gateway Intents**,” and enable the option\
    \ named, “**MESSAGE CONTENT INTENT**.”\n\n> **Note**  \n> So let's slow things\
    \ down a bit and talk about intents. What exactly is an “intent” and why is it\
    \ needed? For the purposes of the Discord API, you need to specify explicitly\
    \ every type of information that you want to be notified by Discord programmatically.\
    \ Otherwise, Discord will constantly bombard you with events that are not relevant\
    \ to you or your bot. For example, for our purposes, we don’t care when people\
    \ join or leave the server. However, if you want to send a list of server rules\
    \ to anyone who joins your server for the first time, then you definitely would\
    \ want to enable the “**SERVER MEMBERS INTENT**.” When we deep dive into the code,\
    \ you'll see more information about intents.\n\nBe sure to click the green button,\
    \ “**Save Changes**,” to save your changes. The result is shown in Figure [6-13](#625846_1_En_6_Chapter.xhtml#Fig13).\n\
    \n![](images/625846_1_En_6_Chapter/625846_1_En_6_Fig13_HTML.jpg)\n\nThe image\
    \ shows a settings interface for a bot application named \"Tech Support Bot.\"\
    \ The left sidebar includes options like General Information, Installation, OAuth2,\
    \ and Bot, with the Bot section highlighted. The main panel displays settings\
    \ for Authorization Flow and Privileged Gateway Intents. Options include toggles\
    \ for Public Bot, OAuth2 Code Grant, Presence Intent, Server Members Intent, and\
    \ Message Content Intent. A notification at the bottom warns, \"Careful — you\
    \ have unsaved changes!\" with buttons to Reset and Save Changes.\n\n**Figure\
    \ 6-13** – Enable the option named, “MESSAGE CONTENT INTENT”"
