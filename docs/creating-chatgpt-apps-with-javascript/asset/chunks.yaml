    \ may not live in a perfect world, but we *don’t* have to know what geocoding\
    \ is, at least not anymore. We can simply use ChatGPT to get through the documentation\
    \ we don’t want to read.\n\nListing [2-16](#625846_1_En_2_Chapter.xhtml#PC29)\
    \ shows the prompt to ChatGPT so you don’t have to read any of the Google Maps\
    \ Route API to get working code:\n\n```\nI need to use the Google Maps Platform's\
    \ Routes API to pull down information pertaining to how much time it'll take to\
    \ get from one destination to the other, as well as how much distance is between\
    \ the two points. How can I make an HTTP request in JavaScript to get the information\
