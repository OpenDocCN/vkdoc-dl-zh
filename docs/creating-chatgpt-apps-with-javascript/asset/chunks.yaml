  trans: '

    ### `ChatCompletionMessage`


    **表 3-7** `ChatCompletionMessage` 的结构


    | 字段 | 类型 | 描述 |

    | --- | --- | --- |

    | `role` | `String` | 该字段的值始终为字面量 `"assistant"` |

    | `content` | `String` 或 `null` | 这是一个 `String`，包含 ChatGPT 对我们请求的响应 |

    | `tool_calls` | `Array` | 如果你在表 3-1 中指示 ChatGPT 调用某个工具（目前指函数），则该列表将存在于 `ChatCompletionMessage`
    中 |

    | `↳ id` | `String` | 这是 ChatGPT 所调用工具的 ID |

    | `↳ type` | `String` | 这是 ChatGPT 所调用工具的类型。目前只有字面量 `"function"` 是有效的工具类型 |

    | `↳ function` | `Object` | 这是模型所调用的函数及其参数 |


    ## 结论


    在本章中，我们结合了第 1 章和第 2 章的经验，用 JavaScript 创建了一个功能完备的 ChatGPT 客户端。在 ChatGPT 客户端的代码中，我们看到了一些在
    Chat Playground 中已经介绍过的术语，例如 `model`、`messages`、`temperature` 和 `tokens`。


    我们还看到，作为 JavaScript 开发者，OpenAI 为我们提供了**大量额外的选项**来调用 ChatGPT，这些选项是普通日常用户甚至使用 Chat
    Playground 的技术人员都无法使用的。在本章中，我们花时间解释了这些选项，重点介绍了我们可以发送的 `messages`。


    既然我们已经有了一个可运行的 JavaScript ChatGPT 客户端，接下来让我们看看如何在本书的其余示例中利用它！


    # 4. 在企业中应用 AI！为 Slack 消息创建文本摘要器


    在当今的企业界，公司使用 Slack（或 Microsoft Teams）来组织内部沟通，并将其作为全公司信息交流的中心，这已经非常普遍。如果你曾经使用过
    Slack，我想你应该知道，一个频道很容易因为公司内部或世界上**某个地方**发生了**某些**重要事情而被大量消息淹没。


    当然，你在公司承担的责任越多（例如经理、团队领导、架构师等），你需要参与的频道就越多。在我看来，Slack 是一把双刃剑。你需要用它来完成工作，但作为开发者，你肯定不能在每日站会上说：“昨天，呃，我花了一整天读
    Slack。没有遇到阻碍。”


    此外，如果你为一家客户遍布不同时区的公司工作（这在当今很常见），早上打开 Slack 看到大量在你离开键盘期间发布的消息，会让人感到相当沮丧。


    因此，在本章中，我们将把 AI 应用到企业中，让 Slack 变得更有用。我们将利用上一章的代码，用 JavaScript 创建一个 Slack 机器人，用于总结
    Slack 频道中的重要对话。我们将利用 ChatGPT 的文本摘要能力，并更多地关注**提示工程**。


    ## 那么，什么是提示工程？


    简单来说，提示工程就是精心设计和优化提示词及输入参数，以指导和引导 ChatGPT 及其他 AI 模型行为的过程。这基本上是行业内用来描述“创建正确输入以获得期望结果”的术语。


    ## ChatGPT 会抢走所有人的饭碗（其实不然）


    我们谦逊地认为，世界上每家公司都坐拥一座未开发的信息金矿。如果你正在使用任何记录员工之间交流日志的系统、存储客户支持请求的数据库，或任何大型文本库（是的，这包括你的电子邮件、Microsoft
    Exchange 和企业版 Gmail），那么你就拥有一个等待被利用的大型非结构化文本库。


    因此，ChatGPT 的最佳用途并非取代任何人的工作。它应该被用来增强和扩展公司团队成员已经在做的事情。正如我们在第 2 章中所见，作为一名软件开发者，ChatGPT
    可以作为一个非常有效的结对编程伙伴。它也非常擅长高效快速地执行某些困难任务。因此，本章的项目涉及一个实际示例，展示如何利用大型非结构化文本源。


    你可以使用在第 3 章中创建的 ChatGPT 客户端来运行本章后面列出的提示工程示例，也可以使用我们在第 1 章中讨论过的 Playground 模式。无论哪种方式，让我们直接开始吧。


    ## 审视一个现实问题：软件公司的客户支持


    让我们看看软件开发中最艰巨的任务之一：提供技术支持。想象一下，整天接听来自可能感到沮丧、困惑或只是需要解决方案的用户电话和消息的“乐趣”。以下是客户支持为何如此棘手的一些原因：


    *   你的最终用户和客户在解释软件问题时通常非常糟糕。

    *   一级技术人员通常是第一道防线，他们处理最基本的问题或用户错误。但当问题变得更复杂时，用户会被升级到二级。

    *   中级是一个棘手的位置，因为他们比一级技术支持人员拥有更多的知识和经验；然而，他们没有机会直接从最终用户那里获得答案。

    *   真正糟糕的问题会被升级到三级；然而，这些是最昂贵的技术支持人员，因为他们拥有最多的知识和经验。他们对代码以及服务器和基础设施都有实践经验。


    那么，让我们来看一个现实世界的例子：Slack 中一个典型技术支持频道里的典型对话。以下是一个虚构公司中团队成员及其角色的列表：


    *   Fatima（客户服务代表）

    *   John（软件工程师）

    *   Dave（项目经理）

    *   Keith（首席技术官）


    代码清单 4-1 提供了一个软件初创公司团队成员之间对话的示例。客户服务代表 Fatima 告知团队，他们的应用在启动后立即崩溃（这可不是什么好问题）。首席技术官
    Keith 立即介入并升级了该问题。

    '
