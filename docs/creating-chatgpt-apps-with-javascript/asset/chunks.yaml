  trans: '

    ### 获取机器人的 Discord ID 令牌并设置网关意图


    同样，请按照上述步骤获取 Discord ID 令牌。然后向下滚动页面至名为“特权网关意图”的部分，并启用“服务器成员意图”和“消息内容意图”选项。


    ## 创建下一个 Discord 机器人：内容审核员


    内容审核员的职责是确保 Discord 服务器中不会发布不当内容。与我们本章前面创建的机器人一样，这个机器人（目前）还不具备人工智能。在当前状态下，它会不加区分地删除服务器中任何包含“puppies”一词的消息。


    这并不是因为“puppies”本身有什么问题。不过，它们确实有在无人看管时毁掉你最爱鞋子的倾向。老实说，我们只是需要一些东西来测试机器人在 Discord
    中运行时的代码。


    清单 6-2 是这个简化版内容审核机器人的代码。


    ```

    // Require the necessary discord.js classes

    const { Client, Events, GatewayIntentBits } = require("discord.js");

    require("dotenv").config();

    // Create a new client instance

    const client = new Client({

    intents: [

    GatewayIntentBits.MessageContent,

    GatewayIntentBits.GuildMessages,

    GatewayIntentBits.Guilds,

    ],

    });

    const BANNED_WORD = "puppies";

    client.once(Events.ClientReady, (readyClient) => {

    console.log(`Ready! Logged in as ${readyClient.user.tag}`);

    });

    client.on(Events.MessageCreate, async (message) => {

    if (client.user.username === message.author.username) return;

    if (message.content.includes(BANNED_WORD)) {

    if (!(await message.delete())) {

    console.log("Failed to delete message");

    } else {

    const authorMention = `${mention(message.author)}`;

    const reply = `${authorMention} This comment was deemed inappropriate for this
    channel.\nIf you believe this to be in error, please contact one of the human
    server moderators.`;

    await message.channel.send(reply);

    }

    }

    });

    function mention(author) {

    return ``;

    }

    client.login(process.env.DISCORD_BOT_API_TOKEN);

    清单 6-2

    我们的简化版内容审核机器人

    ```


    ### 处理发送到 Discord 服务器的消息


    再次，让我们将注意力集中在 `client.on()` 事件监听函数上，因为每当有消息发布到 Discord 服务器时，它都会被异步调用。如你所见，如果发布到服务器的消息包含违禁词，我们会删除该消息，并在发布违规消息的同一频道中，通过
    `@mention` 消息向发送者发出警告。


    ### 再次成功！运行你的第二个 Discord 机器人：内容审核员


    现在让我们运行第二个 JavaScript Discord 机器人。执行应用程序后，请务必返回你的 Discord 服务器，并在任意频道中输入一条包含违禁词的消息。图
    6-16 展示了机器人的运行效果。


    ![](img/625846_1_En_6_Fig16_HTML.jpg)


    显示了一个名为“Crooks'' Bank”的 Discord 服务器界面。主要部分显示了一个设置新服务器的清单，包括邀请好友、个性化服务器、发送消息、下载
    Discord 应用和添加应用等任务。大多数任务已用绿色勾号标记为完成。来自“Mod Bot”的一条消息警告“PythonChatGPT”其评论不当，并建议如有错误请联系管理员。左侧边栏列出了文本和语音频道，右侧边栏显示在线和离线用户，包括“Mod
    Bot”和“Q and A Bot”。


    图 6-16


    这个机器人对讨论“Puppies”有严格规定；然而，讨论“Kittens”则完全没问题


    ## 结论


    我们刚刚完成了用 JavaScript 创建两个可运行 Discord 机器人所需的所有步骤。对于那些不熟悉创建 Discord 服务器流程的人，我们展示了如何设置一个服务器来管理我们的社区。


    如你所见，我们采用的方法与第 4 章中 Slack 机器人的方法截然不同！我们创建的 Slack 机器人主要关注工作场所的用户生产力。而这两个 Discord
    机器人则真正专注于社区管理。我们已经为这些机器人借助 OpenAI 的 API 实现人工智能做好了所有准备。这一切将在最后两章中完成。


    ## 留给读者的练习


    在接下来的章节中，我们将让我们的“笨”机器人变得智能，但至少有一件事我们现在就可以做。与其使用命令行报告状态消息，不如让机器人拥有一个专门用于状态报告的频道。这样，当机器人启动、关闭或有任何重要信息需要通知管理员时，所有信息都会记录并保存在一个中心位置。


    # 7. 为我们的 Discord 机器人添加智能，第 1 部分：改进我们的问答机器人


    至此，我们已经具备了所有结构，可以使我们在上一章中创建的两个 Discord 机器人功能完备并具备人工智能。在本书的最后两章中，我们将遵循所有必要的步骤，使这两个机器人具备人工智能。在本章中，我们将从技术支持机器人开始。以下是我们要做的两个主要更改：


    - 改进我们调用 OpenAI API 的脚本，并创建一个可由 Discord 机器人实例化的类。这样，Discord 机器人就可以针对我们提供的特定信息提出问题。这个类将在本章中用于问答目的，并且也将在本书的最后一章中使用。


    - 修改我们的技术支持 Discord 机器人，使其能够加载一个包含常见问题及其答案的外部文本文件。然后，该脚本将把文本文件的内容提供给 `ChatGPTClient`
    类，该类负责创建提示词，当然也负责调用 ChatGPT。

