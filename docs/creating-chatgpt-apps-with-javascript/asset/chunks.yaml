  raw: '## Conclusion


    In this chapter, we created a fully functioning content moderator for our entire
    Discord server! We leveraged both the Moderation and Chat models from OpenAI to
    create a custom content moderator that not only flags unsafe content like hateful
    and threatening messages but also prevents the users of the Discord server to
    be subject to unwanted solicitations.


    ## Exercises Left for the Reader


    Although we accomplished a lot in this chapter (as well as in this book!), there’s
    still one more thing that we can do to improve the code.


    For example, the individual Discord bots that we created are aware to not respond
    to messages that they send themselves. However, the bots are not yet aware that
    they shouldn’t respond to messages sent by **OTHER BOTS**.


    This means that if you run both bots at the same time, and someone posts something
    bad in the “q-and-a” channel, then the Content Moderator will (of course) delete
    the message and inform everyone that the message was deleted. However, since the
    Tech Support Bot doesn’t know that it shouldn’t respond to other bots, it will
    try to create a response. Of course, bots should not talk to other bots.


