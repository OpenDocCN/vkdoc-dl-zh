    ### 8. 最大令牌数（可选）


    你还记得本章前面关于令牌的讨论吗？通过为此项选择范围内的任意值，你可以调整响应中的令牌数量（这直接影响字数）。


    ## 立即尝试！体验“系统”角色


    现在我们已经熟悉了聊天游乐场的几个功能，让我们使用上述讨论的设置发送第一个提示。下面的代码清单 1-7 和 1-8 使用了相同的提示，要求 ChatGPT
    写几段关于远程医疗的文字，但系统角色却截然不同。


    ```

    系统：你是一位观点鲜明的健康博主，总是分享亲身经历的故事

    用户：写三段关于远程医疗利弊的文字

    代码清单 1-8

    提示：以观点鲜明的健康博主身份写远程医疗的利弊

    ```


    ```

    系统：你是一位严格基于事实的研究员

    用户：写三段关于远程医疗利弊的文字

    代码清单 1-7

    提示：以研究员身份写远程医疗的利弊

    ```


    我们鼓励你亲自尝试这两个提示，看看响应结果。调整温度和令牌长度的设置，熟悉这些参数如何影响输出结果。


    ## 结论


    你刚刚了解了更多关于开发者如何使用 ChatGPT 的知识。我们介绍了聊天游乐场的一些基础知识，这是一个供开发者与 ChatGPT API 交互的 Web
    界面。


    我们讨论了如何在聊天游乐场中设置系统、用户和助手角色，以及如何调整温度和最大输出长度等设置。


    你学习了一些使用聊天游乐场所需的参数和术语，例如模型、温度和令牌。熟悉聊天游乐场的参数对于了解如何使用 REST API 至关重要，因为游乐场是 REST
    API 所提供功能的一个子集。


    在下一章中，我们将学习如何将 ChatGPT 用作你的“结对编程伙伴”，并创建一个生产力应用程序，为我们提供天气和上班到达时间。


    # 2. 使用 ChatGPT 作为你的 JavaScript 结对编程伙伴


    我非常喜欢 XP（极限编程）的一些实践，尤其是结对编程。无论你喜欢哪种风格的结对编程，它都涉及两名工程师坐在同一台屏幕前，共同解决同一个问题。你获得的最大好处之一就是为问题带来全新的视角，当然，现在有两名工程师“接触”过代码库，而不是只有一名。有时，你可以让一名工程师编写代码，另一名编写测试和注释。无论你如何划分，这都是好事。


    ## 章节概述


    本章将引导你获取并测试你的 API 密钥，让你熟悉如何调用 OpenAI 的 ChatGPT JavaScript API，并介绍如何使用其他模型完成任务。此外，我们将使用
    ChatGPT 作为结对编程伙伴，创建一个应用程序，允许我们输入城市名称和期望的上班到达时间，然后根据当前交通状况提供天气和预计到达时间！听起来很兴奋？那我们就开始吧。


    ## 你已经安装了 Node.js，对吧？


    显而易见，如果电脑上没有安装 Node.js，你在本书中能做的工作非常有限。因此，要检查你拥有的 Node 版本，只需打开一个终端窗口并执行：


    ```

    node - v

    ```


    如果命令输出显示了一个版本号，那么你就准备好了！


    现在，执行上述命令后，如果你看到错误消息，那么你需要为你的特定操作系统安装 Node.js。如果是这种情况，请使用 ChatGPT 或谷歌搜索根据你的操作系统获取安装说明，然后打开一个新的终端窗口并执行上述命令以查看你拥有的版本。


    ## 使用 npm 安装（或更新）OpenAI Node.js 库


    为了使用 JavaScript 的 OpenAI 库，兼容的最低 Node 版本是 18，尽管代码示例是在版本 20 下测试的。现在你已经具备了所有先决条件，是时候安装
    OpenAI Node.js 库本身了。回到你的终端窗口，执行以下命令：


    ```

    npm install openai

    ```


    如果 OpenAI 库尚不存在，上述命令将为你安装它；如果已存在，则会将其更新到最新版本。


    ## 设置 API 密钥的三种方法


    在设置 OpenAI API 的 API 密钥时，有多种方法可供选择，每种方法都针对特定的项目需求和安全考虑而设计。


    ### 选项 #1：设置系统级环境变量


    环境变量方法为 API 密钥存储建立一个系统级环境变量。这为密钥管理提供了一个中心点，简化了跨不同项目的部署。


    让我们看看如何执行此操作的步骤。


    #### 对于 Mac OS


    首先，打开终端。你可以在应用程序文件夹中找到它，或使用聚焦搜索（Command + Space）进行搜索。


    接下来，编辑你的 bash 配置文件。对于较旧的 MacOS 版本，你会使用命令 `nano ~/.bash_profile`。较新 MacOS 版本的用户需要使用
    `nano ~/.zshrc`。这将在文本编辑器中打开配置文件。


    现在让我们添加你的环境变量。在编辑器中，添加下面一行，将“your-api-key-here”替换为你的实际 API 密钥，不要带单引号。


    ```

    export OPENAI_API_KEY=''your-api-key-here''

    ```


    让我们保存并退出，按 `Ctrl+O` 写入更改，然后按 `Ctrl+X` 关闭编辑器。


    现在，你将使用 `source ~/.bash_profile`（适用于较旧的 Mac OS 版本）和 `source ~/.zshrc`（适用于较新的 Mac
    OS 版本）来加载你的配置文件。这将加载更新后的配置文件。


    最后，我们将验证一切是否正确完成。在终端中，输入 `echo $OPENAI_API_KEY`。如果一切顺利，你应该会看到你的 API 密钥的值。


    ```

    echo $OPENAI_API_KEY

    ```


    #### 对于 Windows


    首先打开命令提示符。你可以通过在开始/Windows 菜单中搜索“cmd”来找到它。


    现在，我们将使用以下命令在当前会话中设置环境变量，将“your-api-key-here”替换为你的实际 API 密钥。此命令为当前会话设置 `OPENAI_API_KEY`。


    ```

    setx OPENAI_API_KEY ''your-api-key-here''

    ```


    你可以通过系统属性添加变量来使设置永久生效：


    *   右键单击“此电脑”或“我的电脑”，然后选择“属性”。

    *   点击“高级系统设置”。

    *   点击“环境变量”按钮。

    *   在“系统变量”部分，点击“新建...”，然后输入 `OPENAI_API_KEY` 作为变量名，你的 API 密钥作为变量值。


    为确保一切正常工作，请重新打开命令提示符并输入以下命令来验证设置。它应该会显示你的 API 密钥。


    ```

    echo %OPENAI_API_KEY%

    ```

