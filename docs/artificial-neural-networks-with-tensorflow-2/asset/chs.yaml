  plt.plot(epoch_range, r.history['accuracy'])\nplt.plot(epoch_range, r.history['val_accuracy'])\n\
  plt.title('Classification Accuracy')\nplt.ylabel('Accuracy')\nplt.xlabel('Epoch')\n\
  plt.legend(['Train', 'Val'], loc='lower right')\nplt.show()\n```\n\n训练和验证数据的指标都会被绘制出来。典型的绘图如图\
  \ 3-14 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig14_HTML.jpg](img/495303_1_En_3_Fig14_HTML.jpg)\n\
  \n**图 3-14**  \n准确率指标图\n\n同样，我们使用以下代码段绘制损失指标：\n\n```\n#### 绘制训练和验证损失值\nplt.plot(epoch_range,r.history['loss'])\n\
  plt.plot(epoch_range, r.history['val_loss'])\nplt.title('Model loss')\nplt.ylabel('Loss')\n\
  plt.xlabel('Epoch')\nplt.legend(['Train', 'Val'], loc='lower right')\nplt.show()\n\
  ```\n\n典型的绘图如图 3-15 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig15_HTML.jpg](img/495303_1_En_3_Fig15_HTML.jpg)\n\
  \n**图 3-15**  \n损失指标图\n\n上述绘图代码的含义不言自明，已在第 2 章中解释过。至此，`results` 函数的定义完成。以下是完整的函数代码，供您快速参考。\n\
  \n```\ndef results(model):\nepoch = 20\nr = model.fit(x_train, y_train, batch_size\
  \ = 32,\nepochs = epoch, validation_data =\n(x_val, y_val), verbose = 1)\nacc =\
  \ model.evaluate(x_test, y_test)\nprint(\"test set loss : \", acc[0])\nprint(\"\
  test set accuracy :\", acc[1]*100)\n#### 绘制训练和验证准确率\nepoch_range = range(1, epoch+1)\n\
  plt.plot(epoch_range, r.history['accuracy'])\nplt.plot(epoch_range, r.history['val_accuracy'])\n\
  plt.title('Classification Accuracy')\nplt.ylabel('Accuracy')\nplt.xlabel('Epoch')\n\
  plt.legend(['Train', 'Val'], loc='lower right')\nplt.show()\n#### 绘制训练和验证损失值\nplt.plot(epoch_range,r.history['loss'])\n\
  plt.plot(epoch_range, r.history['val_loss'])\nplt.title('Model loss')\nplt.ylabel('Loss')\n\
  plt.xlabel('Epoch')\nplt.legend(['Train', 'Val'], loc='lower right')\nplt.show()\n\
  ```\n\n在开始定义各种模型之前，让我再定义一个函数，该函数将用于预测指定图像中嵌入对象的类别。\n\n### 预测函数\n\n由于我们的数据集包含 10\
  \ 个类别，我们首先在代码中定义这些类别的名称：\n\n```\nclasses = ['airplane','automobile', 'bird', 'cat',\n\
  'deer','dog','frog', 'horse','ship','truck']\n```\n\n我们定义名为 `predict_class` 的函数如下：\n\
  \n```\ndef predict_class(filename, model):\n```\n\n该函数接收两个参数——第一个参数指定图像文件的名称，第二个参数指定用于对给定图像进行分类的模型。因此，这是一个通用函数，可用于比较不同模型的性能。\n\
  \n在函数内部，我们使用以下代码将图像加载到内存中：\n\n```\nimg = load_img(filename, target_size=(32, 32))\n\
  ```\n\n我们在屏幕上显示图像以供参考：\n\n```\nplt.imshow(img)\n```\n\n我们需要将图像数据转换为可以输入到模型 `predict`\
  \ 方法的数组。`img_to_array` 方法结合重塑操作可以完成此转换。\n\n```\nimg = img_to_array(img)\nimg = img.reshape(1,32,32,3)\n\
  ```\n\n然后，我们使用以下语句缩放数组元素：\n\n```\nimg = img.astype('float32')\nimg = img/255.0\n\
  ```\n\n图像数据现在已准备好输入到模型的 `predict` 函数。\n\n```\nresult = model.predict(img)\n```\n\
  \n`predict` 函数返回的输出是矩阵形式。我们将输出复制到一个字典中。我们使用 `for` 循环将输出转换为字典，如下面的语句所示：\n\n```\n\
  dict2 = {}\nfor i in range(10):\ndict2[result[0][i]] = classes[i]\n```\n\n预测结果成为字典中的键，其类别成为字典中的值。\n\
  \n现在，我们将 `result[0]`（即预测结果）复制到一个名为 `res` 的列表中。我们对这个数组进行排序，以按升序排列预测结果。\n\n```\nres\
  \ = result[0]\nres.sort()\n```\n\n我们选取前三个预测结果进行显示。请注意，最佳预测结果存储在最后一个索引处。\n\n```\n\
  res = res[::-1]\nresults = res[:3]\n```\n\n我们最终在屏幕上打印结果。\n\n```\nprint(\"Top predictions\
  \ of these images are\")\nfor i in range(3):\nprint(\"{} : {}\".format(dict2[results[i]],\n\
  (results[i]*100).round(2)))\n```\n\n我们还显示实验中使用的图像以供参考。请注意，该图像已包含在 `plt` 对象中。\n\n\
  ```\nprint('The image given as input is')\n```\n\n至此，我们的 `predict_class` 函数定义完成。以下是完整的定义，供您快速参考：\n\
  \n```\n#### 预测给定图像中的类别\nfrom tensorflow.keras.preprocessing.image\nimport load_img,\
  \ img_to_array\nclasses = ['airplane','automobile', 'bird', 'cat', 'deer',\n'dog','frog',\
  \ 'horse','ship','truck']\ndef predict_class(filename, model):\nimg = load_img(filename,\
  \ target_size=(32, 32))\nplt.imshow(img)\n#### 转换为数组\n#### 重塑为具有 3 个通道的单个样本\nimg\
  \ = img_to_array(img)\nimg = img.reshape(1,32,32,3)\n#### 准备像素数据\nimg = img.astype('float32')\n\
  img = img/255.0\n#### 预测结果\nresult = model.predict(img)\ndict2 = {}\nfor i in range(10):\n\
  dict2[result[0][i]] = classes[i]\nres = result[0]\nres.sort()\nres = res[::-1]\n\
  results = res[:3]\nprint(\"Top predictions of these images are\")\nfor i in range(3):\n\
  print(\"{} : {}\".format(dict2[results[i]],\n(results[i]*100).round(2)))\nprint('The\
  \ image given as input is')\n```\n\n现在是时候开始定义我们的模型了。\n\n## 定义模型\n\n在本节中，我们将定义 5\
  \ 个复杂度递增的模型。定义每个模型后，我们将立即对其进行训练，评估其性能并进行一些预测。最后，我们将比较不同模型产生的结果。那么，让我们从第一个模型开始。\n\
  \n\n\n### 包含 2 个卷积层的模型\n\n我们在实验中使用的第一个模型是一个简单的模型，仅包含 2 个卷积层。为了定义模型，Keras 提供了你在第\
  \ 2 章中已经使用过的 Sequential API。你可以通过以下语句导入 Sequential API：\n\n```\nfrom tensorflow.keras.models\
  \ import Sequential\n```\n\nSequential API 允许你构建一个顺序网络架构，你可以按照所需的顺序不断向其中添加层。Keras\
  \ 提供了多种现成的层类型供你使用。同时，它也允许你在需要时创建自己的自定义层。对于这个应用，我们将使用 Keras 提供的层。其中一些命名的层包括`Conv2D`、`Dense`、`Dropout`和`Flatten`。你可以通过以下程序语句在代码中导入它们：\n\
  \n```\nfrom tensorflow.keras.layers import Dense, Dropout, Conv2D, MaxPooling2D,\
  \ Flatten, BatchNormalization\n```\n\n现在，我们通过实例化`Sequential`类来定义模型，如下所示：\n\n```\n\
  model_1 = Sequential([\n    Conv2D(32, (3, 3), activation = 'relu', padding = 'same',\
  \ input_shape = (32, 32, 3)),\n    Conv2D(32, (3, 3), activation = 'relu', padding\
  \ = 'same'),\n    MaxPooling2D((2, 2)),\n    Flatten(),\n    Dense(128, activation\
  \ = 'relu'),\n    Dense(10, activation = 'softmax')\n])\n```\n\n如构造函数中所指定的，该网络由\
  \ 6 层组成。第一层是`Conv2D`类型，即我们的卷积层。它包含 32 个大小为 3x3 的滤波器，作用于 32x32x3 的图像上。网络的输入是 32x32x3，你应该记得这是`x_train`向量的维度。第二层同样是卷积层。第三层是`MaxPooling2D`层，其后是`Flatten`层。最后两层是`Dense`层——第一层包含\
  \ 128 个节点，使用 ReLU 激活函数；第二层包含 10 个节点，使用 softmax 激活函数。请记住，我们的网络应该输出 10 个类别，因此最后一层包含\
  \ 10 个节点。可以使用以下代码生成网络图：\n\n```\nfrom tensorflow.keras.utils import plot_model\n\
  plot_model(model_1, to_file='model1.png')\n```\n\n生成的网络图如图 3-16 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig16_HTML.jpg](img/495303_1_En_3_Fig16_HTML.jpg)\n\
  \n**图 3-16** 模型 1 的网络图\n\n可以通过在`model_1`实例上调用`summary`方法来打印网络摘要，如下所示：\n\n```\nModel:\
  \ \"sequential\"\n_______________________________________________________________\n\
  Layer (type)                 Output Shape              Param #\n===============================================================\n\
  conv2d (Conv2D)              (None, 32, 32, 32)        896\n_______________________________________________________________\n\
  conv2d_1 (Conv2D)            (None, 32, 32, 32)        9248\n_______________________________________________________________\n\
  max_pooling2d (MaxPooling2D) (None, 16, 16, 32)        0\n_______________________________________________________________\n\
  flatten (Flatten)            (None, 8192)              0\n_______________________________________________________________\n\
  dense (Dense)                (None, 128)               1048704\n_______________________________________________________________\n\
  dense_1 (Dense)              (None, 10)                1290\n===============================================================\n\
  Total params: 1,060,138\nTrainable params: 1,060,138\nNon-trainable params: 0\n\
  ```\n\n定义网络后，我们将优化器设置为 SGD，并使用损失函数`categorical_crossentropy`编译模型，如下面的代码片段所示：\n\n\
  ```\nopt = tf.keras.optimizers.SGD(lr=0.001, momentum=0.9)\nmodel_1.compile(optimizer=opt,\
  \ loss = 'categorical_crossentropy', metrics = ['accuracy'])\n```\n\n现在，我们通过调用之前定义的`results`函数，并将`model_1`作为参数传递给它，来训练、评估并显示误差指标。\n\
  \n```\nresults(model_1)\n```\n\n生成的输出如图 3-17 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig17_HTML.jpg](img/495303_1_En_3_Fig17_HTML.jpg)\n\
  \n**图 3-17** 模型 1 的误差指标\n\n如你所见，准确率约为 66%——显然在大多数情况下不在可接受范围内。此外，还存在明显的过拟合现象。你可以通过参数优化和正则化来减少过拟合。我们将持续应用此类技术来改进模型的性能。\n\
  \n现在，你将使用以下代码段对一张未见过的图像进行预测：\n\n```\nimport urllib\nresource = urllib.request.urlopen(\"\
