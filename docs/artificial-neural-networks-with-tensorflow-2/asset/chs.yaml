  \n## 完整源代码\n\n`LargeCorpusTextGeneration` 的完整源代码如代码清单 7-3 所示。\n\n```python\nimport\
  \ sys\nimport requests\nimport numpy as np\nimport tensorflow as tf\nfrom tensorflow.keras\
