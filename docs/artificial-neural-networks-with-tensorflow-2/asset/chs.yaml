  \ result\n```\n\n该函数的实现很直接。我们像处理训练图像一样创建图像张量，调用编码器提取其特征，然后调用解码器预测 `max_length` 次单词。请注意，`max_length`\
  \ 是之前计算好的，它指定了固定的序列长度。\n\n我们编写 `predict` 函数来接受图像 URL 和图像的一些随机名称。下载的图像文件存储在 `/root/.keras`\
