  \ `cifar10` 数据集来开发当前应用程序。\n\n### 创建训练/测试数据集\n\n在上一章开发的二元分类器中，您使用了 `sklearn` 的 `train_test_split`\
  \ 方法来创建训练集和测试集。现在，`keras.datasets` 提供了一个 `load_data` 方法，可以通过一次调用创建训练集和测试集。使用以下语句从内置的\
