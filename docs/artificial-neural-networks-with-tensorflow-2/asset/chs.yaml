  \n图 3-1\n\n单层/单神经元模型\n\n现在，使用函数式 API 是定义 Keras 深度学习模型的推荐方式。\n\n## 用于模型构建的函数式 API\n\
  \n使用函数式 API，您将能够创建具有非线性拓扑结构的极其复杂的模型。您可以在模型内共享层，还可以创建具有多个输入和输出的模型。因此，在本书的所有应用中，我将使用函数式\
  \ API 来定义 ANN 模型。接下来，我将向您展示如何使用函数式 API 定义几种架构。\n\n\n\n### 序列模型\n\n假设你想构建一个如图 3-2\
  \ 所示的模型。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig2_HTML.jpg](img/495303_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\n多层模型\n\n如图 3-2 所示，所需的网络由多个层组成。函数式 API 提供了一套用于构建层图的工具。\n\n假设你已经完成了必要的导入，如下代码所示：\n\
  \n```\nimport tensorflow as tf\nfrom tensorflow import keras\n```\n\n要创建图 3-2 所示的模型，首先需要创建一个输入层，这可以通过以下代码语句完成：\n\
  \n```\ninputs = keras.Input(shape=(8,), name=\"image\")\n```\n\n上述语句返回一个大小为 8 的\
  \ `inputs` 张量。接下来，我们将使用以下语句添加一个包含 12 个节点的 `Dense` 层：\n\n```\nx = layers.Dense(12,\
  \ activation=\"relu\")(inputs)\n```\n\n请注意，我们将 `inputs` 张量作为输入传递给了新添加的层。新层本身返回一个大小为\
  \ 12 的张量，该张量可以作为下一层的输入。现在，我们将使用以下语句再添加一个包含 8 个节点的层：\n\n```\nx = layers.Dense(8,\
  \ activation=\"relu\")(x)\n```\n\n再次注意，前一层的张量被输入到新层。同样，你可以向网络中添加任意数量的层，每层都有自己的节点集和激活函数。最后，我们将使用以下语句向网络中添加输出层：\n\
  \n```\noutputs = layers.Dense(5)(x)\n```\n\n该层的输出是一个大小为 5 的张量。因此，我们期望网络在给定特定输入时输出五个值之一。\n\
  \n现在，可以使用这些输入和输出来定义模型，如下所示：\n\n```\nmodel = keras.Model(inputs=inputs, outputs=outputs,\n\
  name='multilayer model')\n```\n\n可以使用以下语句生成网络图：\n\n```\nkeras.utils.plot_model(model,\
  \ 'multilayer_model.png',\nshow_shapes=True)\n```\n\n生成的网络图如图 3-3 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig3_HTML.jpg](img/495303_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\n多层网络的网络图\n\n函数式 API 还允许你创建具有多个输入和输出、共享层等的复杂架构。表 3-1 中展示了一些此类复杂架构。\n\n\
  表 3-1\n\n几种复杂的 ANN 架构\n\n| ![../images/495303_1_En_3_Chapter/495303_1_En_3_Figa_HTML.gif](img/495303_1_En_3_Figa_HTML.gif)\
  \ |\n\n### 模型子类化\n\n如果你更倾向于面向对象编程，并且有 Java/C++ 等背景，你可能想知道是否存在子类化的概念，以便能够重用之前创建的模型。TensorFlow\
  \ 支持模型子类化。要创建用于模型定义的自定义类，你需要继承 `tf.keras.Model`：\n\n```\nclass MyModel(tf.keras.Model):\n\
  ```\n\n你需要在类定义中提供两个重写的方法——`__init__` 和 `call`。顾名思义，`__init__` 在类实例化时被调用。下面代码片段给出了\
  \ `__init__` 的典型定义：\n\n```\ndef __init__(self, use_dp = False, num_output = 1):\n\
  \    super(MyModel, self).__init__()\n    self.use_dp = use_dp\n    self.dense1\
  \ = tf.keras.layers.Dense(12, activation=tf.nn.relu)\n    self.dense2 = tf.keras.layers.Dense(24,\
  \ activation=tf.nn.relu)\n    self.dense3 = tf.keras.layers.Dense(4, activation=tf.nn.relu)\n\
  \    self.dense4 = tf.keras.layers.Dense(10, activation=tf.nn.sigmoid)\n    if self.use_dp:\n\
  \        self.dp = tf.keras.layers.Dropout(0.3)\n```\n\n在构造函数中，我们为构建网络时将使用的不同类型的层定义了变量。这里所有的层都是\
  \ `Dense` 类型——全连接层。第一层包含 12 个节点，第二层包含 24 个节点，第三层包含 4 个节点，最后一层包含 10 个节点。前三层使用 ReLU\
  \ 作为激活函数，而最后一层使用 sigmoid。我们还定义了一个 dropout 层，以防我们决定在上述任何 `Dense` 层上添加 dropout 层。dropout\
  \ 比例为 30%，如 dropout 参数值 0.3 所示。\n\n接下来，你定义在对象创建期间使用的 `call` 方法。下面代码段展示了一个典型的 `call`\
  \ 方法：\n\n```\ndef call(self, x):\n    x = self.dense1(x)\n    x = self.dense2(x)\n\
  \    if self.use_dp:\n        x = self.dp(x)\n    x = self.dense3(x)\n    if self.use_dp:\n\
  \        x = self.dp(x)\n    return self.dense4(x)\n```\n\n该网络由四层组成，每一层的输出成为下一层的输入。最后，我们返回\
  \ `dense4`，它给出了 10 个类别。第二层和第三层使用了 dropout。至此，我们完成了模型的子类化。接下来，我们将实例化这个模型。\n\n要在程序代码中实例化该模型，你可以使用以下程序语句：\n\
  \n```\nmodel = MyModel()\n```\n\n创建模型对象后，你可以调用其常规的 `compile` 方法，通过传递所需的参数集来编译它，如下代码所示：\n\
  \n```\nmodel.compile(loss = tf.losses.binary_crossentropy,\n              optimizer\
  \ = 'adam',\n              metrics = ['accuracy'])\n```\n\n通常，如果你喜欢面向对象编程，你会使用模型子类化。否则，没有特别的需要进行子类化，函数式\
  \ API 可以满足你创建复杂架构的所有需求。\n\n### 预定义层\n\n为了创建网络架构，`tf.keras` 提供了顺序 API，你可以不断向其添加网络层。有多个预定义层可供你直接使用。这个列表非常详尽。每个层都定义为一个类，你在代码中实例化该类并将其实例添加到你的模型中。以下是常用预定义层的部分列表：\n\
  \n*   `Dense` – 全连接层\n*   `Conv2D` – 二维卷积层\n*   `InputLayer` – 网络的入口点\n*   `LSTM`\
  \ – 长短期记忆层\n*   `RNN` – 自定义循环层的基类\n\n这个列表确实非常详尽，你会找到诸如 `Dropout`、`Flatten`、`LayerNormalization`、`Multiply`\
  \ 等类。除了这些预定义的类之外，你还可以定义自己的自定义层。\n\n\n\n### 自定义层\n\n自定义类继承自 `tf.keras.layers.Layer`。你需要重写四个函数：`init`、`build`、`call`\
  \ 和 `compute_output_shape`。一个典型的自定义类定义如下方代码所示：\n\n```\nclass MyLayer(tf.keras.layers.Layer):\n\
  \    def __init__(self, output_dim, **kwargs):\n        self.output_dim = output_dim\n\
  \        super(MyLayer, self).__init__(**kwargs)\n    def build(self, input_shape):\n\
  \        self.W = self.add_weight(name='kernel',\n                             \
  \    shape=(input_shape[1], self.output_dim),\n                                \
  \ initializer='uniform',\n                                 trainable=True)\n   \
  \     self.built = True\n    def call(self, x):\n        return tf.matmul(x, self.W)\n\
  \    def compute_output_shape(self, input_shape):\n        return (input_shape[0],\
  \ self.output_dim)\n```\n\n在 `init` 方法中，我们调用了父类的构造函数，并设置了输出的维度。在 `build` 方法中，我们设置了初始权重矩阵。矩阵的形状借助输入参数\
  \ `input_shape` 来设定。权重通过 `initializer` 参数设置为均匀分布。并且我们将此矩阵设置为可训练的。在 `call` 方法中，我们设定了要对权重矩阵执行的任何操作。在当前代码中，我们对权重与输入向量\
  \ `x` 执行矩阵乘法。最后，`compute_output_shape` 返回输出维度。\n\n现在，你可以在任何网络配置中使用这个自定义层，如下方代码片段所示：\n\
  \n```\nmodel = tf.keras.Sequential([\n    tf.keras.layers.Dense(256, input_shape=(784,)),\n\
  \    tf.keras.layers.Dense(256, activation='relu'),\n    MyLayer(10),\n    tf.keras.layers.Dense(10,\
  \ activation='softmax')\n])\n```\n\n请注意自定义层是如何被添加在两个 `Dense` 层之间的。事实上，你可以将自定义层添加到网络中任何你想要的位置。上述配置的网络结构图如图\
  \ 3-4 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig4_HTML.jpg](img/495303_1_En_3_Fig4_HTML.jpg)\n\
  \n**图 3-4** 包含自定义层的网络\n\n现在，你可以使用通常的 `compile` 函数来编译模型：\n\n```\nmodel.compile(optimizer='adam',\n\
  \              loss=tf.keras.losses.binary_crossentropy,\n              metrics=['accuracy'])\n\
  ```\n\n最后，通过调用模型的 `fit` 方法来训练它：\n\n```\nmodel.fit(x, y1, batch_size=32, epochs=30)\n\
  ```\n\n自定义层的完整项目代码可在本书的下载资源中找到。\n\n创建自定义层让你在设计复杂的网络架构时拥有极大的灵活性。在本书中，你将使用函数式 API\
  \ 创建各种各样的网络拓扑结构。\n\n### 保存模型\n\n通常，在模型完全训练好后，你会将其保存到磁盘，以便后续部署到生产机器上。不仅如此，你在 `tf.keras`\
  \ 中创建的模型也可以在训练过程中的任何时刻保存。利用这个保存的模型，你可以从之前中断的地方恢复训练。这有助于避免在单次会话中花费过长的训练时间。此外，你可以与他人共享保存的模型，以便他们能够重现并继续你的工作。`tf.keras`\
  \ 提供了几种保存工作成果的方法，接下来将进行讨论。\n\n### 保存整个模型\n\n当你保存整个模型时，以下信息将被保存：\n\n*   模型的架构\n*\
  \   权重\n*   你传递给其 `compile` 方法的训练配置\n*   优化器及其状态\n\n要保存模型，你将使用以下代码：\n\n```\nmodel.save('filename.h5')\n\
  ```\n\n要重新创建模型，你将使用以下代码：\n\n```\nnew_model = keras.models.load_model('filename.h5')\n\
  ```\n\n#### 导出为 SavedModel 格式\n\nTensorFlow 使用一种名为 SavedModel 的独立序列化格式，该格式可供除 Python\
  \ 之外的 TensorFlow 实现使用。TensorFlow Serving 也支持此格式。要将整个模型保存为此格式，你将使用以下代码：\n\n```\n\
  model.save('filename', save_format='tf')\n```\n\n要加载保存的模型，你将使用：\n\n```\nnew_model\
  \ = keras.models.load_model('filename')\n```\n\n#### 保存架构\n\n在某些情况下，你可能只对保存模型的架构感兴趣，而不关心其权重值或优化器状态。在这种需求下，你可以调用\
  \ `get_config` 方法来检索模型的配置，并在之后使用它来在保存的实例上重新创建模型。如下方代码片段所示：\n\n```\n##### 检索并保存模型配置\n\
  config = model.get_config()\n##### 重新创建模型\nmodel = keras.Model.from_config(config)\n\
  ```\n\n请注意，当你像此语句所示那样重新创建模型时，你将丢失所有先前学习到的信息。\n\n#### 保存权重\n\n在某些情况下，你可能只对保存模型的训练状态感兴趣，而不关心其架构。在这种情况下，你可以使用\
  \ `get_weights` 和 `set_weights` 方法来单独保存和检索权重。如下方代码所示：\n\n```\n##### 检索模型状态\nweights\
  \ = model.get_weights()\n##### 恢复状态\nmodel.set_weights(weights)\n```\n\n**注意：**\
  \ 默认情况下，自定义层不支持 `model.save()` 和 `model.get_config()`。你需要重写 `get_config()` 以支持自定义层。不过，自定义层支持保存权重。\n\
  \n#### 保存为 JSON 格式\n\n有时，你可能希望将模型保存为 JSON 格式。你可以使用以下代码片段来实现：\n\n```\nfrom keras.models\
  \ import model_from_json\n##### 序列化为 JSON\njson_model = model_1.to_json()\nwith\
  \ open(\"model_1.json\", \"w\") as json_file:\n    json_file.write(json_model)\n\
  ##### 加载 JSON 并重新创建模型\nfrom keras.models import model_from_json\nfile = open('model_1.json',\
  \ 'r')\nbuffer = file.read()\nfile.close()\nmodel = tf.keras.models.model_from_json(buffer)\n\
  ```\n\n考虑以下模型定义：\n\n```\nmodel_1 = tf.keras.Sequential([\n    Conv2D(32, (3, 3),\
  \ activation='relu', padding='same', input_shape=(32, 32, 3)),\n    Conv2D(32, (3,\
  \ 3), activation='relu', padding='same'),\n    MaxPooling2D((2, 2)),\n    Dense(128,\
  \ activation='relu'),\n    Dense(10, activation='softmax')\n])\n```\n\n当你将此模型架构保存为\
  \ JSON 格式时，你将看到如清单 3-1 所示的代码：\n\n```\n{\n    \"class_name\": \"Sequential\",\n \
  \   \"config\": {\n        \"name\": \"sequential_3\",\n        \"layers\": [\n\
  \            {\n                \"class_name\": \"Conv2D\",\n                \"\
  config\": {\n                    \"name\": \"conv2d_2\",\n                    \"\
  trainable\": true,\n                    \"batch_input_shape\": [null, 32, 32, 3],\n\
  \                    \"dtype\": \"float32\",\n                    \"filters\": 32,\n\
  \                    \"kernel_size\": [3, 3],\n                    \"strides\":\
  \ [1, 1],\n                    \"padding\": \"same\",\n                    \"data_format\"\
  : \"channels_last\",\n                    \"dilation_rate\": [1, 1],\n         \
  \           \"activation\": \"relu\",\n                    \"use_bias\": true,\n\
  \                    \"kernel_initializer\": {\n                        \"class_name\"\
  : \"GlorotUniform\",\n                        \"config\": { \"seed\": null }\n \
  \                   },\n                    \"bias_initializer\": {\n          \
  \              \"class_name\": \"Zeros\",\n                        \"config\": {}\n\
  \                    },\n                    \"kernel_regularizer\": null,\n   \
  \                 \"bias_regularizer\": null,\n                    \"activity_regularizer\"\
  : null,\n                    \"kernel_constraint\": null,\n                    \"\
  bias_constraint\": null\n                }\n            }\n        ]\n    },\n \
  \   ...\n    \"keras_version\": \"2.2.4-tf\",\n    \"backend\": \"tensorflow\"\n\
  }\n```\n\n**清单 3-1** 模型的 JSON 表示形式\n\n保存为 JSON 格式的项目代码可在本书的下载资源中找到。\n\n通过对 `tf.keras`\
