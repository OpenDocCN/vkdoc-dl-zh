  fig = plt.figure(figsize=(4,4))

  for i in range(predictions.shape[0]):

  plt.imshow(predictions[i, :, :, 0]

  * 127.5 + 127.5, cmap="gray")

  plt.axis(''off'')

  plt.savefig(''image_at_epoch_

  {:01d}.png''.format(epoch_number))

  plt.show()

  def train(dataset, epochs):

