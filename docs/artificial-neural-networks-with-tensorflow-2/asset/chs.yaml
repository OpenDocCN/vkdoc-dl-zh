  \ tf.zeros((batch_size, self.units))\n```\n\n```python\nencoder = Inception_Encoder(embedding_dim)\n\
  decoder = RNN_Decoder(embedding_dim, units, vocab_size)\ntf.keras.utils.plot_model(encoder)\n\
