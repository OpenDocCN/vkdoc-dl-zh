  现在，我们将开始构建模型。你将创建三个复杂度递增的模型。定义模型后，你将对其进行训练，并在测试数据上评估其性能。我们将使用相同的测试数据来评估在本练习中构建的各种模型的性能。在案例研究中，我们将尝试为大型模型使用不同的优化器。我会向你展示过拟合何时发生以及如何检测它。然后，我会给你一些关于如何缓解过拟合的提示。


