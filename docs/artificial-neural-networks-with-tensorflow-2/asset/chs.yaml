  \ * 128\nplt.imshow(img)\nplt.axis('off')\n\n### 列表 14-1\n### AutoEncoder_Custom\n\
  ```\n\n\n\n### 使用预训练模型进行特征提取\n\n现在，我将向你展示如何使用预训练模型进行特征提取，从而节省大量训练时间，并获得更好的特征提取效果。\n\
  \n## 将预训练模型用作编码器\n\n目前有多种预训练模型可用于图像处理。你在第 12 章中使用过这样一个 `VGG16` 模型。使用该模型可以提取图像特征，这正是我们在之前的程序中通过创建自己的编码器所做的事情。那么，为什么不使用迁移学习，用\
  \ `VGG16` 预训练模型来代替编码器呢？这正是我将在本应用中演示的内容。与你自己定义的编码器相比，使用预训练模型无疑会提供更好的结果，并且训练速度也更快。\n\
  \n## 项目描述\n\n你将使用与上一个项目相同的图像数据集。因此，数据加载和预处理代码保持不变。变化的是模型定义和推理过程。所以，我将只描述相关的改动。整个项目源码可在本书的下载网站上找到，本节末尾也提供了源码，方便你快速参考。项目名称为\
  \ `AutoEncoder-TransferLearning`。\n\n由于 `VGG16` 是在大小为 224x224 的图像上训练的，你需要将这两个常量值修改为以下内容：\n\
  \n```\nIMG_WIDTH = 224\nIMG_HEIGHT = 224\n```\n\n## 定义模型\n\n你已经在第 12 章（图 12-5）中看到了\
  \ `VGG16` 的架构。VGG 模型的前 18 层用于提取图像特征。因此，我们将使用这些层，并丢弃所有后续层。我们使用以下代码片段创建一个新的序贯模型：\n\
  \n```\nvggmodel = tf.keras.applications.vgg16.VGG16()\nnewmodel = Sequential()\n\
  num = 0\nfor i, layer in enumerate(vggmodel.layers):\nif i<19:\nnewmodel.add(layer)\n\
  newmodel.summary()\nfor layer in newmodel.layers:\nlayer.trainable=False\n```\n\n\
  我们将所有这些层的 `trainable` 参数设置为 `false`，因为我们打算使用预训练模型进行特征提取。模型摘要如图 14-11 所示。\n\n![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig11_HTML.jpg](img/495303_1_En_14_Fig11_HTML.jpg)\n\
  \n**图 14-11** 预训练编码器模型摘要\n\n## 提取特征\n\n你将使用已创建的 `newmodel` 提取训练数据集图像中的特征。我们只需将每张训练图像传入网络，并在第\
  \ 19 层收集预测结果。\n\n```\nvggfeatures = []\nfor sample in x_train:\nsample = gray2rgb(sample)\n\
  sample = sample.reshape((1,224,224,3))\nprediction = newmodel.predict(sample)\n\
  prediction = prediction.reshape((7,7,512))\nvggfeatures.append(prediction)\nvggfeatures\
  \ = np.array(vggfeatures)\n```\n\n## 定义网络\n\n现在，你将按如下方式定义我们的编码器/解码器架构：\n\n```\n\
  #编码器\nencoder_input = Input(shape=(7, 7, 512,))\n#解码器\ndecoder_output = Conv2D(256,\
  \ (3,3),\nactivation='relu', padding=\"same\")\n(encoder_input)\ndecoder_output\
  \ = Conv2D(128, (3,3),\nactivation='relu', padding=\"same\")\n(decoder_output)\n\
  decoder_output = UpSampling2D((2, 2))(decoder_output)\ndecoder_output = Conv2D(64,\
  \ (3,3), activation=\"relu\",\npadding='same')(decoder_output)\ndecoder_output =\
  \ UpSampling2D((2, 2))(decoder_output)\ndecoder_output = Conv2D(32, (3,3), activation=\"\
  relu\",\npadding='same')(decoder_output)\ndecoder_output = UpSampling2D((2, 2))(decoder_output)\n\
  decoder_output = Conv2D(16, (3,3), activation=\"relu\",\npadding='same')(decoder_output)\n\
  decoder_output = UpSampling2D((2, 2))(decoder_output)\ndecoder_output = Conv2D(2,\
  \ (3, 3), activation=\"tanh\",\npadding='same')(decoder_output)\ndecoder_output\
  \ = UpSampling2D((2, 2))(decoder_output)\nmodel = Model(inputs=encoder_input,\n\
  outputs=decoder_output)\nmodel.summary()\n```\n\n对于编码器，我们只需指定输入，而解码器架构与上一个示例相同，我们不断放大图像并为其添加颜色。\n\
  \n模型摘要如图 14-12 所示。\n\n![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig12_HTML.jpg](img/495303_1_En_14_Fig12_HTML.jpg)\n\
  \n**图 14-12** 编码器-解码器模型摘要\n\n### 模型训练\n\n使用以下两条语句编译并训练模型：\n\n```\nmodel.compile(optimizer='Adam',\
  \ loss=\"mse\")\nmodel.fit(vggfeatures, image_a_b_gen(x_train),\nverbose=1, epochs=100,\
  \ batch_size=128)\n```\n\n我们使用 `Adam` 优化器和 `mse` 损失函数进行训练。在 GPU 上训练网络时，每个 epoch\
  \ 大约需要一秒钟——这比我们之前的网络有了显著改进。由于我们使用了预训练编码器，因此只需要训练解码器的参数。\n\n### 推理\n\n现在，运行以下代码从测试数据集中生成图像。该代码足够简单，易于理解。\n\
