  \n```python\nclass Inception_Encoder(tf.keras.Model):\n    def __init__(self, embedding_dim):\n\
  \        super(Inception_Encoder, self).__init__()\n        self.fc = tf.keras.layers.Dense(embedding_dim)\n\
  \n    def call(self, x):\n        x = self.fc(x)\n        x = tf.nn.relu(x)\n  \
  \      return x\n```\n\n```python\nclass RNN_Decoder(tf.keras.Model):\n    def __init__(self,\
  \ embedding_dim, units, vocab_size):\n        super(RNN_Decoder, self).__init__()\n\
  \        self.units = units\n        self.embedding = tf.keras.layers.Embedding(vocab_size,\
  \ embedding_dim)\n        self.gru = tf.keras.layers.GRU(self.units, return_sequences=True,\
  \ return_state=True, recurrent_initializer='glorot_uniform')\n        self.fc1 =\
  \ tf.keras.layers.Dense(self.units)\n        self.dropout = tf.keras.layers.Dropout(0.5,\
  \ noise_shape=None, seed=None)\n        self.batchnormalization = tf.keras.layers.BatchNormalization(axis=-1,\
  \ momentum=0.99, epsilon=0.001, center=True, scale=True, beta_initializer='zeros',\
  \ gamma_initializer='ones', moving_mean_initializer='zeros', moving_variance_initializer='ones',\
  \ beta_regularizer=None, gamma_regularizer=None, beta_constraint=None, gamma_constraint=None)\n\
  \        self.fc2 = tf.keras.layers.Dense(vocab_size)\n        self.W1 = tf.keras.layers.Dense(units)\n\
  \        self.W2 = tf.keras.layers.Dense(units)\n        self.V = tf.keras.layers.Dense(1)\n\
