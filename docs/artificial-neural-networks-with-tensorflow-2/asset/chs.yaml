  \ 32、64 和 128 个滤波器\n\n修改后的模型定义如下方代码所示：\n\n```python\nmodel_3 = Sequential([\nConv2D(32,\
  \ (3, 3), activation = 'relu', padding = 'same',\ninput_shape = (32, 32, 3)),\n\
  Conv2D(32, (3, 3), activation = 'relu', padding = 'same'),\nMaxPooling2D((2, 2)),\n\
  Conv2D(64, (3, 3), activation = 'relu', padding = 'same'),\nConv2D(64, (3, 3), activation\
