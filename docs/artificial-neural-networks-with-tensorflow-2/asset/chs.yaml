  \ `fit` 方法来训练模型。\n\n```python\nmodel.fit(x, y, epochs=300, batch_size=32,\n    \
  \      callbacks=model_callbacks)\n```\n\n我将 epoch 数设置为 10，批次大小设置为 32 个序列。稍后我将向您展示增加这两个变量值的效果。当我在\
