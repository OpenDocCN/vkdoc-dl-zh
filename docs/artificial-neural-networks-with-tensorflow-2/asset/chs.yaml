  \n最后，我们使用分类交叉熵和 Adam 优化器编译模型。\n\n```\nmodel.compile(optimizer='adam',\nloss='categorical_crossentropy',\n\
  metrics=['accuracy'])\n```\n\n### 模型训练\n\n我们通过将零作为输入来创建初始状态。\n\n```\ninitial_s_training=np.zeros((NUM_SAMPLES,LATENT_DIM))\n\
  initial_c_training =np.zeros(shape=(NUM_SAMPLES,LATENT_DIM))\n```\n\n我们使用以下语句训练模型：\n\
