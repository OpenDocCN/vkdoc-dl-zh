  \ ImageNet 分类器来提取狗图片的特征。然后，你将在其之上添加一个层，根据这些提取的特征来区分不同品种的狗。简而言之，你将迁移 ImageNet 的学习成果来对狗的种类进行分类，从而省去为特征提取而训练模型的麻烦。\n\
