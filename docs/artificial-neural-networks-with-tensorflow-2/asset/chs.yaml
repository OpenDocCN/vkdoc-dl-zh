  ## TensorFlow 中的二分类


  在前面的示例中，我们使用了内置数据集来训练模型。现在，我们将使用一个真实的数据集来进行一些实际的机器学习。您将解决一个分类问题。我们将使用来自热门 Kaggle
  网站的一个挑战赛中的数据集。该数据集包含一家银行的客户数据。现在假设这家银行找到您，希望您开发一个机器学习预测模型，该模型能提供关于客户离开银行可能性的洞察。在金融术语中，这被称为客户流失。如果银行知道某个客户可能在不久的将来离开，就可以采取一些预防措施来留住该客户。


  您要解决的问题是开发一个二分类模型。您将使用 TensorFlow 的深度学习库，并利用 Keras 高级 API 来实现该模型。更具体地说，您将在本示例中学习以下内容：


  - 如何从本地或远程服务器加载 CSV 数据？

  - 如何对其进行预处理并使其准备好用于机器学习算法？

  - 如何使用 TensorFlow 的高级 Keras API 定义多层人工神经网络？

  - 如何训练模型？

  - 在测试数据上评估模型性能。

  - 在 TensorBoard 上可视化结果。

  - 进行性能分析。

  - 对未见数据进行推断。


  那么，让我们开始项目开发。


  ## 项目设置


