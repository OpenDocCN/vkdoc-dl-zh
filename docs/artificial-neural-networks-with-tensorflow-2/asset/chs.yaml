  \ -O art-images-drawings-painting-sculpture-engraving.zip\n```\n\n下载数据文件后，使用 `unzip`\
  \ 工具将其解压到你的驱动器中：\n\n```bash\n!unzip art-images-drawings-painting-sculpture-engraving.zip\n\
  ```\n\n文件解压后，你的驱动器中将存储大量图像，这些图像按特定文件夹结构排列。图像尺寸各异。我们将所有训练图像转换为固定的 256x256 尺寸。我们定义一些变量来创建训练数据集，如下所示：\n\
  \n```python\nIMG_WIDTH = 256\nIMG_HEIGHT = 256\nTRAIN_PATH = '/content/dataset/dataset_updated/training_set/painting/'\n\
  train_ids = next(os.walk(TRAIN_PATH))[2]\n```\n\n`os.walk` 获取文件夹中存在的所有文件名。\n\n我们首先检查代码中是否有损坏的图像（不可读），并将其从数据集中移除，尽管这一步对我们的目的来说并非必需。\n\
  \n```python\nmissing_count = 0\nfor n, id_ in tqdm(enumerate(train_ids), total=len(train_ids)):\n\
  \    path = TRAIN_PATH + id_+''\n    try:\n        img = imread(path)\n    except:\n\
  \        missing_count += 1\nprint(\"\\n\\nTotal missing: \"+ str(missing_count))\n\
  ```\n\n运行此代码时，你会发现数据集中有 86 张损坏的图像。\n\n现在，我们将创建训练集，并注意移除损坏的图像。\n\n```python\nX_train\
  \ = np.zeros((len(train_ids)-missing_count, IMG_HEIGHT, IMG_WIDTH, 3), dtype=np.uint8)\n\
  missing_images = 0\nfor n, id_ in tqdm(enumerate(train_ids), total=len(train_ids)):\n\
  \    path = TRAIN_PATH + id_+''\n    try:\n        img = imread(path)\n        img\
  \ = resize(img, (IMG_HEIGHT, IMG_WIDTH), mode='constant', preserve_range=True)\n\
  \        X_train[n-missing_images] = img\n    except:\n        missing_images +=\
  \ 1\nX_train = X_train.astype('float32') / 255.\n```\n\n现在，你可以使用以下语句查看图像的外观：\n\n\
  ```python\nplt.imshow(X_train[5])\n```\n\n输出如图 14-5 所示。\n\n![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig5_HTML.jpg](img/495303_1_En_14_Fig5_HTML.jpg)\n\
  \n**图 14-5** 示例图像\n\n### 创建训练/测试数据集\n\n我们将从已创建的数据集中保留少量图像用于测试。\n\n```python\nx_train,\
  \ x_test = train_test_split(X_train, test_size=20)\n```\n\n`train_test_split` 方法根据\
  \ `test_size` 参数指定，保留 20 张图像用于测试。\n\n### 准备训练数据集\n\n为了训练模型，我们将图像从 RGB 格式转换为 Lab\
  \ 格式。如前所述，L 通道是灰度通道，代表图像的亮度。“a” 是绿色和红色之间的色彩平衡，“b” 是蓝色和黄色之间的色彩平衡。\n\n首先，我们将从 Keras\
  \ 库创建一个 `ImageDataGenerator` 实例，将图像转换为像素数组，最后将它们组合成一个巨大的向量。\n\n```python\ndatagen\
  \ = ImageDataGenerator(\n    shear_range=0.2,\n    zoom_range=0.2,\n    rotation_range=20,\n\
  \    horizontal_flip=True)\n```\n\n如果每张图像都发生扭曲，模型将学习得更好。`shear_range` 使图像向左或向右倾斜，其他参数\
  \ `zoom`、`rotation` 和 `horizontal_flip` 各有其含义。\n\n现在，我们将编写一个函数来创建用于训练的数据批次。函数定义如下：\n\
  \n```python\ndef create_training_batches(dataset=X_train, batch_size = 20):\n  \
  \  # iteration for every image\n    for batch in datagen.flow(dataset, batch_size=batch_size):\n\
  \        # convert from rgb to grayscale\n        X_batch = rgb2gray(batch)\n  \
  \      # convert rgb to Lab format\n        lab_batch = rgb2lab(batch)\n       \
  \ # extract L component\n        X_batch = lab_batch[:,:,:,0]\n        # reshape\n\
  \        X_batch = X_batch.reshape(X_batch.shape+(1,))\n        # extract a and\
  \ b features of the image\n        Y_batch = lab_batch[:,:,:,1:] / 128\n       \
  \ yield X_batch, Y_batch\n```\n\n该函数首先通过调用 `rgb2gray` 方法将给定图像从 RGB 转换为灰度。然后通过调用\
  \ `rgb2lab` 方法将图像转换为 Lab 格式。如果我们采用 Lab 色彩空间，只需要预测两个分量，而其他色彩空间则需要预测三个或四个分量。如前所述，这有助于减小网络规模并实现更快的收敛。最后，我们从图像中提取\
  \ L、a 和 b 分量。\n\n## 定义模型\n\n现在，我们将定义自动编码器模型。模型配置基于论文“Let there be Color!”（[`http://iizuka.cs.tsukuba.ac.jp/projects/colorization/data/colorization_sig2016.pdf`](http://iizuka.cs.tsukuba.ac.jp/projects/colorization/data/colorization_sig2016.pdf)）中提出的建议。\n\
  \n\n\n```python\n### 编码器层的输入\ninputs1 = Input(shape=(IMG_WIDTH, IMG_HEIGHT, 1,))\n\
  ### 编码器\n### 使用 Conv2d 减小特征图和图像尺寸\n### 将图像转换为 128x128\nencoder_output = Conv2D(64,\
  \ (3,3), activation=\"relu\",\npadding='same', strides=2)(inputs1)\nencoder_output\
  \ = Conv2D(128, (3,3),\nactivation='relu',\npadding='same')(encoder_output)\n###\
  \ 将图像转换为 64x64\nencoder_output = Conv2D(128, (3,3),\nactivation='relu', padding=\"\
  same\",\nstrides=2)(encoder_output)\nencoder_output = Conv2D(256, (3,3),\nactivation='relu',\n\
  padding='same')(encoder_output)\n### 将图像转换为 32x32\nencoder_output = Conv2D(256,\
  \ (3,3),\nactivation='relu', padding=\"same\",\nstrides=2)(encoder_output)\nencoder_output\
  \ = Conv2D(512, (3,3),\nactivation='relu', padding=\"same\")\n(encoder_output)\n\
  ### 中层特征提取\nencoder_output = Conv2D(512, (3,3),\nactivation='relu',\npadding='same')(encoder_output)\n\
  encoder_output = Conv2D(256, (3,3),\nactivation='relu',\npadding='same')(encoder_output)\n\
  ### 解码器\n### 为灰度图像添加颜色并放大尺寸\ndecoder_output = Conv2D(128, (3,3),\nactivation='relu',\n\
  padding='same')(encoder_output)\ndecoder_output = UpSampling2D((2, 2))(decoder_output)\n\
  ### 图像尺寸 64x64\ndecoder_output = Conv2D(64, (3,3), activation=\"relu\",\npadding='same')(decoder_output)\n\
  decoder_output = Conv2D(64, (3,3), activation=\"relu\",\npadding='same')(decoder_output)\n\
  decoder_output = UpSampling2D((2, 2))(decoder_output)\n### 图像尺寸 128x128\ndecoder_output\
  \ = Conv2D(32, (3,3), activation=\"relu\",\npadding='same')(decoder_output)\ndecoder_output\
  \ = Conv2D(2, (3, 3), activation=\"tanh\",\npadding='same')(decoder_output)\ndecoder_output\
  \ = UpSampling2D((2, 2))(decoder_output)\n### 图像尺寸 256x256\n```\n\n编码器和解码器都包含少量\
  \ `Conv2D` 层。编码器通过一系列层对图像进行下采样以提取其特征，而解码器则通过其自身的层集，尝试使用不同位置的上采样并为灰度图像添加颜色来重建原始图像，最终生成尺寸为\
  \ 256x256 的图像。解码器的最后一层使用 `tanh` 激活函数，将值压缩到 -1 到 +1 之间。请记住，我们之前已将 `a` 和 `b` 值归一化到\
  \ -1 到 +1 的范围内。\n\n定义编码器和解码器层之后，构建模型并使用其 `compile` 方法进行编译。我们使用 `mse` 作为损失函数，并使用\
  \ `Adam` 优化器。\n\n```python\nmodel = Model(inputs=inputs1, outputs=decoder_output)\n\
  model.compile(loss='mse', optimizer=\"adam\",\nmetrics=['accuracy'])\nprint(model.summary())\n\
  ```\n\n模型摘要如图 14-6 所示。\n\n![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig6_HTML.jpg](img/495303_1_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6\n自编码器模型摘要\n\n你可以通过绘制模型来获得可视化效果：\n\n```python\ntf.keras.utils.plot_model(model)\n\
  ```\n\n输出如图 14-7 所示。\n\n![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig7_HTML.jpg](img/495303_1_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7\n模型图\n\n### 模型训练\n\n我们通过调用模型的 `fit` 方法来训练模型。\n\n```python\nBATCH_SIZE =\
  \ 20\nmodel.fit_generator(create_training_batches\n(X_train,BATCH_SIZE),\nepochs=\
  \ 100,\nverbose=1,\nsteps_per_epoch=X_train.shape[0]/BATCH_SIZE)\n```\n\n在 GPU 上训练模型，每个\
  \ epoch 花费了我略多于一分钟的时间。通过使用预训练模型，训练时间减少到大约每秒一个 epoch，正如你在本章运行第二个项目时将会看到的那样。\n\n##\
  \ 测试\n\n现在，你可以在我们之前创建的测试数据集上检查模型性能。请注意，对于测试图像，我们不会像对训练图像那样进行扭曲。我们只需将图像转换为 Lab 格式并进行预测。以下是对测试图像进行模型预测的代码。\n\
  \n```python\ntest_image = rgb2lab(x_test)[:,:,:,0]\ntest_image = test_image.reshape\n\
  (test_image.shape+(1,))\noutput = model.predict(test_image)\noutput = output * 128\n\
  ### 生成输出图像数组\ngenerated_images = np.zeros\n((len(output),256, 256, 3))\nfor i in\
  \ range(len(output)):\n### 遍历输出\ncur = np.zeros((256, 256, 3))\n### 虚拟数组\ncur[:,:,0]\
  \ = test_image[i][:,:,0]\n### 分配灰度分量\ncur[:,:,1:] = output[i]\n### 分配 a 和 b 分量\n\
  ### 从 lab 转换为 rgb 格式，因为 plt 仅适用于 rgb 模式\ngenerated_images[i] = lab2rgb(cur)\n```\n\
  \n使用以下代码片段显示生成的图像以及原始图像：\n\n```python\nplt.figure(figsize=(20, 6))\nfor i in range(10):\n\
  ### 灰度图\nplt.subplot(3, 10, i + 1)\nplt.imshow(rgb2gray(x_test)[i].reshape(256,\
  \ 256))\nplt.gray()\nplt.axis('off')\n### 重新着色\nplt.subplot(3, 10, i + 1 +10)\n\
  plt.imshow(generated_images[i].reshape\n(256, 256,3))\nplt.axis('off')\n### 原始图像\n\
  plt.subplot(3, 10, i + 1 + 20)\nplt.imshow(x_test[i].reshape(256, 256,3))\nplt.axis('off')\n\
  plt.tight_layout()\nplt.show()\n```\n\n输出如图 14-8 所示。\n\n![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig8_HTML.jpg](img/495303_1_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8\n模型推理\n\n第一行是从第三行给出的原始彩色图像创建的一组灰度图像。中间行显示模型生成的图像。如你所见，模型能够生成与原始图像足够接近的图像。现在，我将向你展示如何在不同尺寸的未见图像上使用此模型。\n\
  \n## 对未见图像进行推理\n\n你可以在自己选择的未见图像上测试模型的性能。本书网站提供了一张示例图像，可以使用 `wget` 下载。\n\n```bash\n\
