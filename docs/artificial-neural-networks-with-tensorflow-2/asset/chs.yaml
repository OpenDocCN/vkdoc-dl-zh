  \nnb_chars = len(x_data)\nprint('Number of sequences:', int(len(x_data)/maxlen))\n\
  \n#### scale and transform data\nx = np.reshape(x_data, (nb_chars, maxlen, 1))\n\
  n_vocab = len(chars)\nx = x/float(n_vocab)\nx.shape\n\ny = tf.keras.utils.to_categorical(y_data)\n\
  print(\"The shape of x_training data : \", x.shape)\nprint(\"The shape of y_training\
  \ data : \", y.shape)\n\nModel = tf.keras.Sequential([\n    tf.keras.layers.LSTM(800,\
  \ input_shape=(len(x[1]), 1), return_sequences=True),\n    tf.keras.layers.Dropout(0.2),\n\
  \    tf.keras.layers.LSTM(800, return_sequences=True),\n    tf.keras.layers.Dropout(0.2),\n\
  \    tf.keras.layers.LSTM(800),\n    tf.keras.layers.Dropout(0.2),\n    tf.keras.layers.Dense(len(y[1]),\
  \ activation='softmax')\n])\n\nModel.compile(loss='categorical_crossentropy', optimizer='adam')\n\
  \nfilepath = \"model_weights_saved.hdf5\"\ncheckpoint = ModelCheckpoint(filepath,\
  \ monitor='loss', verbose=1, save_best_only=True, mode='min')\nmodel_callbacks =\
  \ [checkpoint]\n\nepoch_number = 0\nfilename = 'predictions.txt'\nfile = open(filename,\
  \ 'w')\nfile.truncate()\nfile.close()\n\nclass CustomCallback(tf.keras.callbacks.Callback):\n\
  \    def on_epoch_end(self, epoch, logs=None):\n        global epoch_number\n  \
  \      epoch_number = epoch_number + 1\n        filename = 'predictions.txt'\n \
  \       file = open(filename, 'a')\n        seed = \"looking fo\"\n        pattern\
  \ = []\n        for i in seed:\n            value = char_to_ix[i]\n            pattern.append(value)\n\
  \        file.seek(0)\n        file.write(\"\\n\\n Epoch number : {}\\n\\n\".format(epoch_number))\n\
  \        for i in range(100):\n            X = np.reshape(pattern, (1, len(pattern),\
  \ 1))\n            X = X/float(n_vocab)\n            int_prediction = Model.predict(X,\
  \ verbose=0)\n            index = np.argmax(int_prediction)\n            prediction\
  \ = ix_to_char[index]\n            #sys.stdout.write(prediction)\n            file.write(prediction)\n\
  \            pattern.append(index)\n            pattern = pattern[1:len(pattern)]\n\
  \        file.close()\n\nModel.fit(x, y, batch_size=2000, epochs=10, callbacks=[CustomCallback(),\
  \ model_callbacks])\n\ntry:\n    Model.load_weights(filepath)\nexcept Exception\
  \ as error:\n    print(\"Error loading in model : {}\".format(error))\n\nModel.fit(x,\
  \ y, batch_size=200, epochs=25, callbacks=[CustomCallback(), model_callbacks])\n\
  ```\n\n*代码清单 7-3* `LargeCorpusTextGeneration` 完整源代码\n\n## 拓展阅读\n\nAndrej Karpathy\
