  209 增加到了惊人的 51,201。那么，在这样一个简单的回归案例中，是否有必要使用复杂模型呢？可以得出结论，在这种小数据集的情况下，使用小型模型是可以的。


  总结我们目前的研究，可以得出结论：神经网络和深度学习技术可用于解决回归问题。当你拥有多个不同范围数值特征时，请确保在数据预处理阶段将每个特征独立缩放到相同范围。如果没有足够的数据，请使用具有少量隐藏层的小型网络以避免过拟合。


  在我们的回归项目中，我们使用均方误差（`mse`）作为损失函数，平均绝对误差（`mae`）作为评估指标。这些在回归模型中很常见。然而，`tf.keras` 库为回归模型提供了更多损失函数。我现在将讨论其中一些，以便你在实验中可以尝试使用它们来创建性能更好的模型。


  ### 损失函数


  损失函数是衡量模型预测预期结果好坏程度的一种指标。没有一种损失函数可以适用于所有类型的数据。根据数据的分布和异常值的存在，你需要使用不同的损失函数。回归问题使用的损失函数可能与分类问题使用的不同。我将介绍几种专门用于回归问题的损失函数，以及它们适用于哪种数据分布。我将讨论以下五种损失函数：


  *   均方误差（`mse`）/二次损失/L2 损失

  *   平均绝对误差（`mae`）/L1 损失

  *   Huber 损失

  *   Log cosh 损失

  *   分位数损失


  ### 均方误差


  这可能是最常用的损失函数。数学上，它表示为


  ![$$ MSE=\frac{1}{N}\sum \limits_{i=1}^N\ {\left({y}_i-{\hat{y}}_i\right)}² $$](img/495303_1_En_5_Chapter_TeX_Equc.png)


  你计算预测值与真实值之间的差值，将其平方，然后在整个数据集上取平均值。该损失函数理想情况下适用于消除异常值，因为平方会放大误差。该函数在 `tf.keras`
  库中作为 `tf.keras.losses.MSE` 提供。


  ### 平均绝对误差


  数学上，`mae` 表示为


  ![$$ MAE=\frac{1}{n}\sum \limits_{j=1}^n\ \left|{y}_j-{\hat{y}}_j\right| $$](img/495303_1_En_5_Chapter_TeX_Equd.png)


  这里，你取预测值与真实值之差的绝对值，然后在整个数据集上取平均值。该函数不会过分重视异常值，并在所有数据点上提供均匀的度量。该函数在 `tf.keras` 库中作为
  `tf.keras.losses.MAE` 提供。


  ### Huber 损失


  `mse` 能检测异常值，而 `mae` 会忽略它们。可能存在这两种方法都无法给出理想预测的情况。考虑一种数据分布，其中大约 80% 的数据的真实目标值为 `y1`，而其余
  20% 的真实目标值为 `y2`。基于平均值工作的 `mae` 模型会将 20% 视为异常值，而放大误差的 `mse` 模型可能在许多情况下将 `y2` 作为预测值。Huber
  损失提供了介于 `mae` 和 `mse` 之间的解决方案。数学上，它表示为


  ![$$ {L}_{\delta}\left(y,f(x)\right)=\kern0.75em \left\{\begin{array}{c}\frac{1}{2}{\left(y-f(x)\right)}²\kern4.75em
  \mathrm{for}\ \left|y-f(x)\right|\le \delta, \kern1em \\ {}\delta \left|y-f(x)\right|-\frac{1}{2}\
  {\delta}²\kern2em \mathrm{otherwise}\kern5.75em \end{array}\right. $$](img/495303_1_En_5_Chapter_TeX_Eque.png)


  从方程中可以看出，当 𝛿 趋近于 0 时，Huber 损失趋近于 `mae`；当 𝛿 趋近于无穷大时，趋近于 `mse`。它对异常值不太敏感，并提供了介于 `mae`
  和 `mse` 之间的解决方案。Huber 损失函数作为 `tf.keras` 库的一部分提供，并使用 `tf.keras.losses.Huber()` 指定。




  ### 对数双曲余弦损失


  其数学表达式为：


  ![$$ L\left(y,{y}^p\right)=\sum \limits_{i=1}^n\log \left(\cosh \left({y}_i^p-{y}_i\right)\right)
  $$](img/495303_1_En_5_Chapter_TeX_Equf.png)


  该函数计算误差的双曲余弦的对数。对于小误差，`log(cosh(x))` 近似于 ![$$ \frac{(error)²}{2} $$](img/495303_1_En_5_Chapter_TeX_IEq1.png)；对于大误差，则近似于
  `abs(error) – log(error)`。因此，它在大多数情况下表现类似于 `mse`。该函数处处二阶可导，并具备 Huber 损失的所有优点。在 `tf.keras`
  库中，该函数以 `tf.keras.losses.LogCosh()` 的形式提供。


  ### 分位数损失


  考虑图 5-12 左侧所示的数据分布。


  ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig12_HTML.jpg](img/495303_1_En_5_Fig12_HTML.jpg)


  图 5-12


  分位数回归图


  你可能希望用多条回归线来建模这些数据，如图 5-12 右侧所示，而不是仅用一条回归线。在这种情况下，分位数损失就能派上用场。其数学表达式为：


  ![$$ L\left(y,{y}^p\right)={\sum}_{i={y}_i&lt;{y}_i^p}\left(\gamma -1\right).\left|{y}_i-{y}_i^p\right|+{\sum}_{i={y}_i\ge
  {y}_i^p}\left(\gamma \right).\left|{y}_i-{y}_i^p\right| $$](img/495303_1_En_5_Chapter_TeX_Equg.png)


  其中 *γ* 取值在 0 到 1 之间。分位数损失实际上是 `mae` 的扩展。当 *γ* 取值为 0.5 时，它就变成了 `mae`。*γ* 取其他值则会对高估或低估分别施加惩罚。


  当你希望预测一个区间而非单个点时，分位数损失函数非常有用。这可以在许多业务问题中显著改善决策。


  现在，我们已经了解了可用于回归的各种损失函数，接下来让我介绍一下 `tf.keras` 中可用的优化器，它们可以与这些损失函数配合使用。


  ## 优化器


  优化器本质上是用于在模型训练过程中减少损失的算法。它们通过更新权重参数来最小化损失函数，而损失函数则持续告知优化器其是否正朝着达到全局最小值的正确方向前进。与损失函数不同，优化器并非回归问题所独有，所有可用的优化器都可以应用于回归问题。`tf.keras`
  中提供的各种优化器如下：


  - `Adagrad`

  - `RMSprop`

  - `Adam`

  - `SGD`

  - `Adadelta`

  - `Adamax`

  - `Nadam`


  我们在之前的项目中已经使用过其中一些优化器。每个优化器都有其特定的用途。我强烈建议你阅读 `tf.keras` 文档，以了解每个优化器的重要性。根据需求，尝试使用不同的优化器来提升模型性能。再次强调，这些优化器并非回归问题所独有，而是适用于所有类型的深度学习项目。


  '
