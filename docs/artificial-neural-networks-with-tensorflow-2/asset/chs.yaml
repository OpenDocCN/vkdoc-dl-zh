- '# 7. 文本生成


  在本书中，到目前为止你使用的都是普通神经网络，即那些不具备记忆过去能力的网络。它们接受固定大小的向量作为输入，并产生固定大小的输出。以图像分类为例，输入是一张图像，输出是模型训练过的类别之一。现在，考虑一种情况，即预测需要依赖先前预测的结果。举个例子，假设你在看电影。你的大脑会不断猜测下一个场景是什么。这种猜测不仅依赖于刚刚发生的情节，还可能依赖于
  15 分钟前甚至一小时前（对于长电影）发生的事情。我们使用的普通神经网络，就其工作方式而言，没有记忆来记住过去发生的事情，也无法将这种知识应用于当前的猜测。


  再举一个例子：我说我来自印度。好的，你获得了“我来自印度”这个信息。过了一段时间，有人让你猜我说什么语言。你回答“印度国语”的概率很大程度上取决于你是否还记得我来自印度。我们目前所见的神经网络根本无法解决这类问题。这正是循环神经网络（RNN）及其特殊版本——长短期记忆网络（LSTM）登场的原因。在本章中，你将了解
  RNN 和 LSTM，随后会有一个文本生成的示例。后续所有章节也将使用这些网络来解决不同领域的问题。因此，充分理解本章内容将有助于你更好地理解后续章节。


  在本章中，我们将训练基于字符级别的 RNN 语言模型。我们将一段文本作为输入提供给模型，训练模型理解文本中字符的序列关系，然后让模型预测用户指定字符序列的下一个字符出现的概率。简而言之，如果有人让你预测字符序列
  `"hell"` 之后的下一个字符，你很可能会回答 `"o"`。这是因为字符 `"o"` 的概率在所有字母中最高。我们将训练我们的网络来执行此类预测。


  具体来说，我将讨论两个文本生成应用；第一个应用比较简单，旨在让你熟悉该过程的细节。在这个简单的应用中，你将训练模型根据其对现有名字的了解来生成婴儿名字。第二个应用则更具挑战性，我们将尝试让模型学习一部著名小说的语义和写作风格，然后创作一部新的小说。


  那么，首先让我们尝试理解什么是循环神经网络。




  '
- '# 循环神经网络


  与你用于图像分类问题的卷积神经网络类似，RNN 也已存在数十年之久。然而，直到最近，随着可供研究人员使用的计算资源日益增长，其全部潜力才得以充分发挥。如今，RNN
  被用于语音转文本转录、语言翻译、手写文本生成、时间序列预测，并已成为强大的语言模型。在计算机视觉应用中，我们也能看到 RNN 的身影，例如帧级视频分类、图像描述生成、视觉问答等。当前，RNN
  及其变体有着众多应用。在本书的后续章节中，你将学习如何使用 RNN 来开发各类此类应用。


  RNN 使我们能够处理向量序列，这些序列可以是输入、输出，或者最常见的情况是两者兼有。图 7-1 展示了三种模型。


  ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig1_HTML.jpg](img/495303_1_En_7_Fig1_HTML.jpg)


  图 7-1


  说明：具有不同输入/输出的神经网络模型


  请看图 7-1 中所示的图像描述生成神经网络模型。它接收单个输入，即一张图像。然后为图像生成一个描述，即一个单词/字符序列。在图 7-1 所示的情绪分析模型中，模型的输入是一条推文，它由一个单词/字符序列组成。模型产生的输出是负面或正面情绪，这是一个二值输出，即单个输出。最后，考虑一个接受序列作为输入并输出另一个序列的模型。图
  7-1 所示的语言翻译模型接收一个英文单词/句子，并输出其法语翻译，这同样是一个单词/句子序列。


  在阐述了 RNN 的优势之后，接下来让我描述一个简单 RNN 的架构。


  ## 简单 RNN


  借助图 7-2 所示的架构图，可以最好地描述 RNN。


  ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig2_HTML.jpg](img/495303_1_En_7_Fig2_HTML.jpg)


  图 7-2


  RNN 架构


  在每个节点处，`X[i]` 是输入向量，`h[i]` 是输出。整个网络中除第一个节点外的每个节点，都会接收前一个节点的输出作为额外输入。同样，该网络由多个节点组成，每个节点的输出不仅受其自身输入的影响，还受先前节点推理结果的影响。因此，RNN
  可以被视为一种旨在识别数据序列中模式的人工神经网络。简而言之，RNN 不仅接收当前输入，还会考虑其在时间上先前感知到的信息，因此网络接收两个输入：当前值和过去值。问题在于，我们要让
  RNN 考虑过去值的深度是多少。当你训练深度较大的 RNN 时，会遇到一个众所周知的梯度消失问题。在具有大量层的网络训练中，梯度消失和梯度爆炸问题广为人知。RNN
  本质上处理的是可能规模相当大的序列，因此容易发生梯度消失。在讨论这个问题的解决方案之前，让我先简要描述一下什么是梯度消失和梯度爆炸。


  ## 梯度消失与梯度爆炸


  在神经网络模型训练期间，梯度会一直反向传播到初始层。在每一层，它们都会经历连续的矩阵乘法。对于较深的网络，由于链较长，梯度会呈指数级收缩，趋近于远小于 1 的值，最终消失，导致模型停止进一步学习。这被称为梯度消失问题。另一方面，如果梯度值大于
  1，它们会随着在链中传播而变得更大，最终爆炸导致模型崩溃。这被称为梯度爆炸问题。


  通过以上讨论，你可以很容易理解为什么 RNN 容易发生梯度消失问题。为了克服这个问题，人们提出了一种称为长短期记忆网络的新模型，接下来我将对此进行讨论。


  ## LSTM – 一种特殊情况


  长短期记忆网络，通常称为 LSTM，是一种特殊的 RNN。它们能够学习长期依赖关系，同时避免简单 RNN 模型中出现的梯度消失问题。Hochreiter 和 Schmidhuber
  于 1997 年首次提出 LSTM。后来，许多人对其进行了改进和推广。如今，LSTM 被广泛用于解决各种问题。


  开发 LSTM 的主要动机是让模型能够长时间记住信息。这应该是它们的默认行为，而不是需要费力去实现的事情。


  与其他循环神经网络一样，LSTM 具有重复模块链的形式，只是重复模块的内部架构与标准 RNN 不同。标准 RNN 模块及其链已在图 7-2 中展示。RNN 中的每个模块都具有简单的结构，例如图
  7-2 中所示的单个 `tanh` 层。与此相反，LSTM 模块的结构更为复杂。LSTM 模块如图 7-3 所示。


  ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig3_HTML.jpg](img/495303_1_En_7_Fig3_HTML.jpg)


  图 7-3


  LSTM 架构


  每个重复模块包含四个网络层。它们以一种非常特殊的方式相互交互。在 LSTM 中，信息通过一种称为细胞状态的机制流动。整个流程可以借助以下四个细胞状态来解释：


  - 遗忘门

  - 输入门

  - 更新门

  - 输出门


  我将简要描述每个门的作用。


  ### 遗忘门


  遗忘门在我们的 LSTM 模块中高亮显示，如图 7-4 所示。


  ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig4_HTML.jpg](img/495303_1_En_7_Fig4_HTML.jpg)


  图 7-4


  遗忘门


  遗忘门层具有一个 sigmoid 函数（`σ`），用于决定丢弃或保留哪些信息。该层的输入是前一个隐藏状态（`h[t-1]`）和当前输入（`x[t]`），输出是二值。对于细胞状态
  `C[t-1]` 中的每个数字，输出 False 告诉网络遗忘该信息，输出 True 则要求网络保留该信息。数学上，这用以下方程表示：


  ```

  f_t = σ(W_f . [h_{t-1}, x_t] + b_f)

  ```


  ### 输入门


  输入门在图 7-5 中高亮显示。


  ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig5_HTML.jpg](img/495303_1_En_7_Fig5_HTML.jpg)


  图 7-5


  输入门


  sigmoid 输入层决定我们将更新哪些值，而 `tanh` 激活层创建一个新的候选值向量 `C̃_t`。数学上，这表示为


  ```

  i_t = σ(W_i . [h_{t-1}, x_t] + b_i)

  ```


  ```

  C̃_t = tanh(W_c . [h_{t-1}, x_t] + b_c)

  ```




  ### 更新门


  更新门在图 7-6 中高亮显示。


  ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig6_HTML.jpg](img/495303_1_En_7_Fig6_HTML.jpg)


  图 7-6


  更新门


  此处，旧的细胞状态 `C[t-1]` 与 `f[t]` 相乘，并加上 `i[t] * C[t]`，从而将旧的细胞状态更新为新的细胞状态 ![$$ {\overset{\sim
  }{C}}_t $$](img/495303_1_En_7_Chapter_TeX_IEq2.png)。数学上，其表达式为：


  ![$$ {C}_t={f}_t\ast {C}_t+{i}_t\ast {\overset{\sim }{C}}_t $$](img/495303_1_En_7_Chapter_TeX_Equd.png)


  ### 输出门


  输出门在图 7-7 中高亮显示。


  ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig7_HTML.jpg](img/495303_1_En_7_Fig7_HTML.jpg)


  图 7-7


  输出门


  首先，sigmoid 层决定我们将保留细胞状态的哪一部分。然后，我们将细胞状态输入 `tanh` 激活函数，并将其与 sigmoid 门的输出相乘，以得到最终输出。数学上，其表达式为：


  ![$$ {o}_t=\sigma \left({W}_o\left[{h}_{t-1,}{x}_t\right]+{b}_o\right) $$](images/495303_1_En_7_Chapter/495303_1_En_7_Chapter_TeX_Eque.png)


  ![$$ {h}_t={o}_t\ast \mathit{\tanh}\left({C}_t\right) $$](img/495303_1_En_7_Chapter_TeX_Equf.png)


  因此，通过这种对 RNN 模块的增强，LSTM 实现了长短期记忆，并克服了简单 RNN 中出现的梯度消失问题。


  凭借长期记忆的能力，LSTM 被广泛应用于许多领域。在本章中，我将重点介绍 LSTM 在语言模型中的应用。说到语言模型，它又有众多应用，其中一些列举如下：


  -   在打字时预测下一个字符或单词

  -   单词或句子补全

  -   学习大量文本的句法和语义含义，例如，学习莎士比亚和阿加莎·克里斯蒂的风格，并以其风格生成新故事

  -   神经机器翻译


  在介绍了所有这些理论之后，我将继续向你演示 LSTM 在文本生成中的应用。


  ### 文本生成


  一个语言句子是一系列字符，它们向读者传达句法和语义含义。每位作者也有自己的写作风格。我们在文本生成中的任务是创建一个遵循作者写作风格的新文本，并且使生成的文本也具有句法和语义含义。例如，你可能想根据莎士比亚的写作风格写一部新小说，或者根据先前判决的法律案例创建一份法律文件，并遵循撰写此类文件的法律写作风格。你甚至可能想通过理解其他
  Python 程序的语法和语言结构来生成 Python 计算机源代码。可能性是无限的。其中大多数都需要大量的资源和时间处理。在接下来的示例中，我将向你展示如何生成婴儿名字——这是一个可以应用文本生成的简单示例，随后是一个更实际的示例，即根据一部著名小说的文本生成文本。


  让我先描述一下文本生成背后的一些理论。


  ### 模型训练


  由于我们希望在字符级别进行预测，我们将整个文本划分为称为序列的字符组。考虑下面这段取自我们将用于训练的文本：


  > *“Investors so much about their startup hubs. As a lot of mind I don’t know the
  more airborning case of the European of the schedule, and from such sites …”*


  我们将把这个输入分割成每 25 个字符的序列。如图 7-8 所示。


  ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig8_HTML.jpg](img/495303_1_En_7_Fig8_HTML.jpg)


  图 7-8


  将输入文本切片为序列


  前 25 个字符将按其出现的顺序组合在一起，形成第一个序列。该序列后面跟着字符 `h`。因此，我们训练网络，对于这个给定的字符序列，下一个字符应该是 `h`。然后，我们将窗口向右移动一个字符，对于新序列，我们告诉模型该序列的下一个字符是
  `e`。接着再进行一次窗口移动，如最后一个序列所示，下一个字符将是 `i`。同样，我们针对整个语料库持续训练模型，告诉它对于文本中任何给定的 25 个字符序列，下一个字符是什么。现在，你会理解为什么简单的
  DNN（深度神经网络）不能用于此类应用，因为这些应用需要长期记忆来记住序列及其后续字符。


  一旦模型训练完成，希望它已经学习了文本的写作风格、句法和语义。显然，你提供的语料库越多，模型获得的理解就越好。这相当于一个事实：在阅读了阿加莎·克里斯蒂的几部小说后，一个人开始理解她的写作风格。训练完成后，我们如何使用模型来生成具有其学习风格的新文本呢？


  ### 推理


  我们遵循与训练期间类似的步骤。我们从包含预定义序列的种子开始。假设我们定义一个 25 个字符的窗口大小，就像我们在训练期间所做的那样。用于推理的窗口大小不必与训练期间使用的相同。基于给定的
  25 个字符序列，我们要求模型预测第 26 个字符。我们将预测结果作为预测文本的一部分存储起来。然后，我们将窗口向右移动一个字符，这次将预测的字符作为新序列中的最后一个（第
  25 个）字符。对于这个新创建的序列，我们要求模型预测下一个字符。新的预测将被添加到下一个序列中，依此类推。同样，我们可以要求模型预测给定输入种子之后的任意数量的字符。如果模型已经很好地学习了这些序列，它将生成有意义的文本。在本章的大型语料库示例中，我将向你展示长时间训练过程中的逐步结果。


  ### 模型定义


  我们用于训练的网络模型将主要由多个 LSTM 层组成，如图 7-9 所示。


  ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig9_HTML.jpg](img/495303_1_En_7_Fig9_HTML.jpg)


  图 7-9


  用于文本生成的神经网络


  每个 LSTM 层将由大量节点组成。节点数量越多，模型的长期记忆能力就越强。然而，这也意味着需要训练大量的权重。通过使网络变深，即增加更多 LSTM 层，模型可以很好地学习复杂数据。对于每个
  LSTM 层，`return_sequences` 参数将设置为 `True`，因为它将其输出连接到下一个 LSTM 层。对于最后一个 LSTM 层，此参数将设置为
  `False`，其输出被馈送到一个 `Dense` 层，用于根据每个可能字符的概率分数进行字符分类。为此，我们使用 `softmax`。


  在介绍了所有这些理论之后，现在让我们进入一个实际示例，以便更好地理解这些理论。我接下来要描述的应用是，给定一组已知名字，生成婴儿名字。




