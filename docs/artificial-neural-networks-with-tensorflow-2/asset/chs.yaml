  ### 结果讨论


  输出中的第一张图片被解释为手推车，这是正确的。第二张图片被解释为开信刀，其外观与剑相似。请注意，实际图片是一把剑。开信刀在外观上与剑相似。因此，这个推理结果可以认为是合理的。第三张图片是一棵树，被解释为花盆。最后一张是一束玫瑰，被解释为粉饼——完全错误。那么，我们从这次讨论中能得出什么结论呢？为了区分泰迪熊和玫瑰花束，ImageNet
  需要更多图片进行进一步训练。这显然超出了我们的能力范围。然而，我们将能够扩展 ImageNet，添加我们自己的分类。这正是我将在下一个主题中展示的内容。




