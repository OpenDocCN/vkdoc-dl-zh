  \ `tfhub` 模块构建自定义估算器。\n\n要使用估算器，你需要理解两个新概念——输入函数和特征列。输入函数基于 `tf.data.dataset` 创建一个数据管道，该管道以批次方式将数据馈送到模型中进行训练和评估。你也可以为推理创建一个数据管道。我将在\
  \ `DNNClassifier` 项目中向你展示如何做到这一点。特征列指定估算器如何解释数据。在我讨论这些输入函数和特征列概念之前，我将概述一个基于估算器的项目的开发流程。\n\
  \n### 基于估算器的项目工作流程\n\n基于估算器的项目开发所需的各种步骤如下：\n\n*   加载数据\n*   数据预处理\n*   定义特征列\n*\
  \   定义输入函数\n*   模型实例化\n*   模型训练\n*   模型评估\n*   在 TensorBoard 上判断模型性能\n*   使用模型进行预测\n\
  \n作为你在之前所有章节中所学内容的一部分，你肯定对上述工作流程中的许多步骤都很熟悉。需要关注的是定义特征列和输入函数。我现在将描述这些要求。\n\n\n\n\
  ### 特征列\n\n特征列在原始数据和估计器之间搭建了一座桥梁。它能将各种原始数据转换为估计器所需的格式。你可以使用 `tf.feature_column`\
  \ 模块来构建一个特征列列表。这个列表随后会成为估计器构造函数的输入。估计器对象在解释来自输入函数的数据时会使用这个列表。整个过程如图 6-4 所示。\n\n\
  ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig4_HTML.jpg](img/495303_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4 – 特征列的使用方式\n\n如图 6-4 中间区块所示，特征列列表如下：\n\n*   固定酸度（数值型）\n*   挥发性酸度（数值型）\n\
  *   柠檬酸（数值型）\n*   …\n\n这些是你在上一章开发的葡萄酒质量模型的特征。列表中的每个元素都是 `tf.feature_column.numeric_column`\
  \ 类型。以下代码片段说明了如何构建这样一个列表：\n\n```\n# 构建数值特征数组\nnumeric_feature = []\nfor col in numeric_columns:\n\
  \    numeric_feature.append(tf.feature_column.numeric_column(key=col))\n```\n\n\
  有时，你的数据集可能包含你想用作模型构建特征的分类型字段。以下代码片段说明了如何为这些分类型字段构建特征列：\n\n```\ncategorical_features\
  \ = []\nfor col in categorical_columns:\n    vocabulary = data[col].unique()\n \
  \   cate = tf.feature_column.categorical_column_with_vocabulary_list(col, vocabulary)\n\
  \    categorical_features.append(tf.feature_column.indicator_column(cate))\n```\n\
  \n请注意，我们首先通过调用 `categorical_column_with_vocabulary_list` 方法获取词汇表，然后将指示器列追加到列表中。\n\
  \n如图 6-4 所示，此列表作为参数传递给估计器构造函数。如果你的模型同时需要数值型和分类型特征，则需要将两者都追加到目标特征列中。\n\n图 6-4 左侧区块显示了实际由输入函数构建的数据。这些数据将输入到估计器的\
  \ `train`/`evaluate`/`predict` 方法调用中。\n\n接下来，我将介绍如何编写输入函数。\n\n### 输入函数\n\n输入函数的目的是返回以下两个对象，供我们的估计器模型对象使用：\n\
  \n*   一个特征名称（键）与包含相应特征数据的张量或稀疏张量（值）组成的字典\n*   一个包含一个或多个标签的张量\n\n基本框架如下所示：\n\n```\n\
  def input_fn(dataset):\n    # 创建包含特征名称的字典\n    # 以及包含相应数据的张量\n    # 为标签数据创建张量\n\
  \    return dictionary, label\n```\n\n你可以基于此原型编写用于训练/评估/推理的独立函数。\n\n现在，我将向你展示一个取自本章稍后讨论的示例中的输入函数的实际实现。这将进一步澄清你们脑海中关于输入函数的概念。\n\
  \n输入函数是一个具有以下原型的 Python 函数：\n\n```\ndef input_fn(features, labels, training=True,\
  \ batch_size=32):\n```\n\n这里的 `features` 和 `labels` 参数代表包含特征和标签数据的张量。在函数内部，通过调用\
  \ `tf.data.Dataset` 模块的 `from_tensor_slices` 函数将数据转换为张量。\n\n```\n#### 将输入转换为数据集\n\
  Dataset = tf.data.Dataset.from_tensor_slices((dict(features), labels))\n```\n\n\
  该函数的输入参数是一个包含特征和相应标签的 Python 字典。最后，该函数通过使用 `tf.data.Dataset` 的 `batch` 方法，以批次形式将此数据返回给调用者。\n\
  \n```\nreturn dataset.batch(batch_size)\n```\n\n函数结构如图 6-5 所示，以便进一步理解。\n\n![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig5_HTML.jpg](img/495303_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5 – 输入函数结构\n\n整个过程可能看起来相当复杂；一个实际的例子将有助于澄清整个实现过程，而这正是我接下来要做的。\n\n"
- "# 预置估计器\n\n我将讨论两种类型的预置估计器——一种用于分类问题，另一种用于回归类型的问题。首先，我将描述一个分类项目。我们将为此项目使用预置的 `DNNClassifier`。`DNNClassifier`\
  \ 定义了一个深度神经网络，并将其输入分类到多个类别中。你将使用 MNIST 数据库将手写数字分类为十个数字。我要描述的第二个项目使用了名为 `LinearRegressor`\
  \ 的预置估计器。该项目使用了波士顿地区的 Airbnb 数据库。该数据库包含 Airbnb 上列出的多个房屋。对于每个列出的房屋，会捕获多个特征，并列出房屋的售价/可售价。利用这些信息，你将开发一个回归模型来预测新上市房屋可能售出的价格。\n\
  \n使用这两个不同的模型将让你深入了解如何在你自己的模型开发问题中使用预置估计器。那么，让我们先从分类模型开始。\n\n## 用于分类的 DNNClassifier\n\
  \n创建一个新的 Colab 项目并将其重命名为 `DNNClassifier-estimator`。像往常一样，使用以下语句导入 TensorFlow：\n\n\
  ```\nimport tensorflow as tf\n```\n\n我们将为此项目使用 MNIST 数据库。该数据集可在 `sklearn` 工具包中找到。它是手写数字的数据库。我们的任务是使用预置分类器来识别这些图像中嵌入的数字。输出包含十个类别，对应十个数字。\n\
  \n### 加载数据\n\n要从 `sklearn` 加载 MNIST 数据，请使用以下代码：\n\n```\nfrom sklearn import datasets\n\
  digits = datasets.load_digits()\n```\n\n你可以通过绘制一些图像来检查加载数据的内容。以下代码将显示前四张图像：\n\n\
  ```\n#### 绘制样本图像\nimport matplotlib.pyplot as plt\nplt.figure(figsize=(1,1))\nfig,\
  \ ax = plt.subplots(1,4)\nax[0].imshow(digits.images[0])\nax[1].imshow(digits.images[1])\n\
  ax[2].imshow(digits.images[2])\nax[3].imshow(digits.images[3])\nplt.show()\n```\n\
  \n你将看到如图 6-6 所示的输出。\n\n![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig6_HTML.jpg](img/495303_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6 – 样本图像\n\n每张图像的大小为 8x8 像素。\n\n## 准备数据\n\n所有图像都是彩色图像。我们不需要颜色分量来识别数字。灰度图像就足以满足我们的需求。因此，我们通过重塑图像来移除颜色分量：\n\
  \n```\nn_samples = len(digits.images)\ndata = digits.images.reshape((n_samples,\
  \ -1))\n```\n\n如果你检查 `data` 的形状，你会注意到共有 1797 张图像，每张图像总共包含 64 个像素值。\n\n我们使用以下代码将数据拆分为训练集和测试集：\n\
  \n```\nfrom sklearn.model_selection import train_test_split\nX_train, X_test, y_train,\
  \ y_test = train_test_split(\n    data, digits.target, test_size=0.05, shuffle=False)\n\
  ```\n\n至此，我们已经准备好为估计器定义输入函数。\n\n\n\n#### 估算器输入函数\n\n正如您之前所见，输入函数需要特定格式的数据。我们需要指定一个列列表，然后将实际数据作为输入提供给估算器。图像数据由\
  \ 64 个像素组成。在模型训练期间，每个像素将表示为一个数值列。因此，要创建包含这些像素数据的张量，我们首先为像素列创建名称：\n\n```\n#### 为模型输入函数创建列名\n\
  columns = ['p_'+ str(i) for i in range(1,65)]\n```\n\n列名将依次为 `p_1`、`p_2` 等。现在，我们将通过从\
  \ `tf.feature_column` 类中追加一个 `numeric_column` 类型到一个名为 `feature_columns` 的数组中来构建我们的特征列。\n\
  \n```\nfeature_columns = []\nfor col in columns:\n    feature_columns.append\n \
  \   (tf.feature_column.numeric_column(key = col))\n```\n\n我们按如下方式定义输入函数：\n\n```\n\
  def input_fn(features, labels, training =\nTrue, batch_size = 32):\n```\n\n第一个参数定义特征数据，第二个参数定义目标值，第三个参数指定数据是用于训练还是评估。数据以批次处理——批次大小由最后一个参数决定。\n\
  \n现在，我们将这些数据转换为张量数据集，以便估算器更高效地处理。\n\n```\n#### 将输入转换为数据集\ndataset = tf.data.Dataset.from_tensor_slices\n\
  ((dict(features),labels))\n```\n\n通过调用 `from_tensor_slices` 方法将数据转换为张量。该方法接受由特征字典和对应标签组成的输入。\n\
  \n如果输入数据用于训练，我们会打乱数据集。\n\n```\n#### 在训练模式下打乱并重复\nif training:\n    dataset=dataset.shuffle(1000).repeat()\n\
  ```\n\n`shuffle` 方法用于打乱数据集。我们指定了 1000 的缓冲区大小来进行打乱。为了处理那些太大而无法完全放入内存的数据集，打乱操作是按数据批次进行的。如果缓冲区大小大于数据集中的数据点数量，您将获得均匀的打乱效果。如果缓冲区大小为\
  \ 1，则完全不会进行打乱。\n\n最后，我们返回数据批次：\n\n```\n#### 以批次形式提供输入用于训练\nreturn dataset.batch(batch_size)\n\
  ```\n\n现在，是时候创建一个估算器实例了。\n\n#### 创建估算器实例\n\n我们使用预制的 `DNNClassifier` 估算器来实现我们的目的。使用以下语句创建实例：\n\
  \n```\nclassifier = tf.estimator.DNNClassifier\n(hidden_units = [256, 128, 64],\n\
  feature_columns = feature_columns,\noptimizer = 'Adagrad',\nn_classes = 10,\nmodel_dir\
  \ = 'classifier')\n```\n\n构造函数接受五个参数。第一个参数定义了网络架构。在这里，我们在架构中定义了三个隐藏层；第一层包含 256 个神经元，第二层包含\
  \ 128 个，第三层包含 64 个。第二个参数指定数据将具有的特征列表。请注意，我们之前已经创建了 `feature_columns` 向量，因此这里将其设置为默认参数。第三个参数指定要使用的优化器，此处默认设置为\
  \ `Adagrad`。`Adagrad` 是一种基于梯度的优化算法，它正是这样做的：它根据参数调整学习率，执行更小的更新。`n_classes` 参数定义了输出类别的数量。在我们的例子中，它是\
  \ 10，即数字 0 到 9 的个数。最后一个参数 `model_dir` 指定了用于维护日志的目录名称。\n\n接下来是模型训练的重要部分。\n\n### 模型训练\n\
  \n我们创建的估算器模型将使用我们常用的 `train` 方法进行训练。在开始训练之前，我们需要创建用于训练的输入数据集。为此，我们使用以下语句创建一个包含训练数据和特征列表的\
  \ pandas 数据框：\n\n```\n#### 为训练创建数据框\nimport pandas as pd\ndftrain = pd.DataFrame(X_train,\
  \ columns = columns)\n```\n\n我们通过调用之前创建的分类器对象上的 `train` 方法来开始训练：\n\n```\nclassifier.train(input_fn\
  \ = lambda:input_fn\n(dftrain,\ny_train,\ntraining = True),\nsteps = 2000)\n```\n\
  \n该方法将我们的 `input_fn` 作为参数。`input_fn` 本身将特征和标签数据作为前两个参数。`training` 参数设置为 `True`，以便数据会被打乱。步数定义为\
  \ 2000。让我解释一下这意味着什么。在机器学习中，一个 epoch 意味着对整个训练集进行一次遍历。一个 step 对应一次前向传播和一次反向传播。如果您没有在数据集中创建批次，那么一个\
  \ step 就恰好对应一个 epoch。但是，如果您将数据集分成了批次，那么一个 epoch 将包含许多 steps——请注意，一个 step 是对单个数据批次的一次迭代。您可以使用以下公式计算整个训练周期中执行的总\
  \ epoch 数：\n\n`Number_of_epochs = (batch_size * number_of_steps) / (number_of_training_samples)`\n\
  \n在当前示例中，批次大小为 32，步数为 2000，训练样本数为 1707。因此，完成训练需要 `(32 * 2000) / 1707`，即 38 个 epochs。\n\
  \n### 模型评估\n\n为了评估模型的性能，您将像之前一样创建一个数据框，但这次使用测试数据作为输入：\n\n```\ndftest = pd.DataFrame(X_test,\
  \ columns = columns)\n```\n\n通过调用分类器上的 `evaluate` 方法来执行评估。\n\n```\neval_result =\
  \ classifier.evaluate(\n    input_fn = lambda:input_fn(dftest, y_test,\n    training\
  \ = False)\n)\n```\n\n请注意，`training` 参数设置为 `false`。您可以通过简单地打印 `eval_result` 的值来打印评估结果。输出结果如图\
  \ 6-7 中的截图所示。\n\n![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig7_HTML.jpg](img/495303_1_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7\n\n模型评估结果\n\n评估完成后，您可以通过加载在 `DNNClassifier` 构造函数的 `model_dir` 参数中指定为值的文件夹中的日志，在\
  \ TensorBoard 中查看各种参数。\n\n```\n%load_ext tensorboard\n%tensorboard --logdir ./classifier\n\
  ```\n\n来自日志的样本损失图如图 6-8 所示。\n\n![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig8_HTML.jpg](img/495303_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8\n\n样本评估指标\n\n接下来，您将学习如何使用我们训练好的估算器来预测未见过的数据。\n\n\n\n### 预测未见数据\n\n为了预测未见数据，我们首先创建一个名为\
  \ `pred_input_fn` 的输入函数，如下所示：\n\n```python\n#### 用于预测的输入函数\ndef pred_input_fn(features,\
  \ batch_size = 32):\n  # 将输入转换为不含标签的数据集。\n  return tf.data.Dataset.from_tensor_slices(dict(features)).batch(batch_size)\n\
  ```\n\n该函数返回仅包含特征而不含标签的数据张量批次。我们将从 `dftest` 数据集中选取两个数据点来测试预测功能，如下所示：\n\n```python\n\
  test = dftest.iloc[:2,:]\n```\n\n我们将从 `y_test` 数据集中获取这两个数据项的目标值：\n\n```python\n\
  expected = y_test[:2].tolist()\n```\n\n我们通过在估计器对象上调用 `predict` 方法来执行实际预测：\n\n```python\n\
  pred = list(classifier.predict(\n    input_fn =  lambda: pred_input_fn(test))\n\
  )\n```\n\n输入函数使用我们为测试这两个未见数据项而创建的测试数据。\n\n最后，我们使用以下循环打印这两个项的预测类别、预测概率以及实际目标值：\n\n\
  ```python\nfor pred_dict, expec in zip(pred, expected):\n  class_id = pred_dict['class_ids'][0]\n\
  \  probability = pred_dict['probabilities'][class_id]\n  print('predicted class\
  \ {} , probability of prediction {} , expected label {}'.format(class_id, probability,\
  \ expec))\n```\n\n上述语句执行后的输出如下：\n\n```\npredicted class 8 , probability of prediction\
  \ 0.9607188701629639 , expected label 8\npredicted class 4 , probability of prediction\
  \ 0.9926437735557556 , expected label 4\n```\n\n### 尝试不同的 ANN 架构\n\n在评估模型性能时，尝试不同的\
  \ ANN 架构非常容易。例如，您可以通过更改估计器构造函数中的 `hidden_units` 参数值，为之前的架构增加一个层。我在现有代码中尝试了以下配置：\n\
  \n```python\nhidden_units = [256, 128, 64, 32],\n```\n\n执行后产生的评估结果如图 6-9 所示。\n\n\
  ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig9_HTML.jpg](img/495303_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9 更密集网络的评估结果\n\n不仅可以调整隐藏层数量及其神经元数量，您还可以通过在估计器实例化代码中添加参数来引入 dropout，如下所示：\n\
  \n```python\nclassifier = tf.estimator.DNNClassifier(\n    hidden_units = [256,\
  \ 128, 64, 32],\n    feature_columns = feature_columns,\n    optimizer='Adagrad',\n\
  \    n_classes=10,\n    dropout = 0.2,\n    model_dir='classifier')\n```\n\n此配置的评估结果如图\
