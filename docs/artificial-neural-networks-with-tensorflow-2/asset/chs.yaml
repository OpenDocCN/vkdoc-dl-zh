- '# 8. 语言翻译


  ## 引言


  我第一次在法兰克福国际机场转机时，因为不懂德语，很难看懂机场的指示牌。那是很多年前的事了。如今，你只需将手机对准这些指示牌，手机里的应用程序就会为你提供英语或你选择的语言的翻译。这些翻译是如何完成的呢？这些翻译背后涉及不止一种技术。其核心是一个机器学习模型，它利用一个包含大量预定义词汇的庞大词库进行逐词翻译。显然，这种逐词翻译，或者用机器学习的术语来说，序列到序列的翻译，在机场和道路指示牌的情况下准确率很高，但在自然语言句子中可能无法产生可接受的翻译。举个例子，像“How
  are you today?”这样的问句，不能简单地通过独立翻译句子中的每个单词来完成。为了执行此类翻译，人们构建了复杂的模型。谷歌最初使用统计语言翻译；2016
  年，他们开始使用 NMT（神经机器翻译）。在本章中，你将学习如何开发这样一个模型。




