  \ 12-2** `TFHubStyleTransfer` 完整源代码\n\n## 动手实践\n\n学习了如何进行快速风格迁移后，现在是时候了解这些项目背后的技术了。风格迁移的原理是提取一张图像（通常是著名画作）的风格，并将其应用于你选择的图像内容上。因此，有两个输入图像，即内容图像和风格图像。新生成的图像通常称为风格化图像。生成的图像包含与内容图像相同的内容，但获得了与*风格*图像相似的风格。正如你所理解的，这显然不是通过简单叠加图像来实现的。因此，我们的程序必须能够分别区分给定图像的内容和风格。这时我们将使用\
  \ `VGG16` 预训练网络模型来提取这些信息，并构建我们自己的网络，基于这些输入创建风格化图像。诸如 Prisma 和 Lucid 等 Android 应用就是进行此类风格迁移的。虽然你不会被教授如何开发类似的\
  \ Android 应用，但这个项目将教会你此类应用的内部原理。\n\n让我们首先看看 `VGG16` 架构，以了解如何从图像中提取内容和风格。\n\n## VGG16\
  \ 架构\n\n\n\n"
- "# 使用 VGG16 进行风格迁移\n\n`Gatys 等人 (2015)` 提出了风格迁移背后的核心思想。其核心思想是，用于图像分类的预训练 CNN（卷积神经网络）能够编码图像的感知和语义信息。目前世界上有许多这样的预训练\
  \ CNN 可供使用。我们将使用 `VGG16` 来提取图像的特征，然后分别处理其内容和风格。原始论文使用了来自 `Simonyan 和 Zisserman (2015)`\
  \ 的 19 层 VGG 网络模型。`VGG16` 模型架构如图 12-5 所示。\n\n![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig5_HTML.jpg](img/495303_1_En_12_Fig5_HTML.jpg)\n\
  \n**图 12-5** VGG16 架构（图片来源：[researchgate.net](https://www.researchgate.net)）\n\n\
  由于我们不是在进行图像分类，而只对特征提取感兴趣，因此我们不需要 VGG 网络的全连接层或最终的 softmax 分类器。我们只需要模型的一部分。那么，我们如何只提取模型的特定部分呢？幸运的是，这对我们来说是一项非常简单的任务，因为\
  \ Keras 提供了一个预训练的 `VGG16` 模型，你可以从中分离出各层。Keras 还提供了许多其他模型，包括后来的 `VGG19`。要移除顶部的全连接层，你需要在提取模型层时将\
  \ `include_top` 变量的值设置为 `False`。\n\n### 创建项目\n\n创建一个新的 Colab 项目，并将其重命名为 `CustomStyleTransfer`。安装以下两个包：\n\
  \n```\n!pip install keras==2.3.1\n!pip install tensorflow==2.1.0\n```\n\n**注意：**\
  \ 在发布时发现，本项目使用的预训练 `VGG16` 模型在上述指定的 Keras 和 TensorFlow 版本下运行，并且截至撰写本文时，尚不支持更新的版本。\n\
  \n导入所需的库。\n\n```\nimport tensorflow as tf\nimport re\nimport urllib\nfrom tensorflow.keras.preprocessing.image\
  \ import load_img, img_to_array\nfrom matplotlib import pyplot as plt\nfrom IPython\
  \ import display\nfrom PIL import Image\nimport numpy as np\nfrom tensorflow.keras.applications\
  \ import vgg16\nfrom tensorflow.keras import backend as K\nfrom keras import backend\
  \ as K\nfrom scipy.optimize import fmin_l_bfgs_b\n```\n\n## 下载图像\n\n与之前的项目一样，你需要编写一个下载函数并调用它来下载本项目所需的两张图像。代码如代码清单\
  \ 12-3 所示。\n\n```\ndef download_image_from_URL(imageURL):\n    imageName = re.search('[a-z0-9\\\
  -]+\\.(jpe?g|png|gif|bmp|JPG)', imageURL, re.IGNORECASE)\n    imageName = imageName.group(0)\n\
  \    urllib.request.urlretrieve(imageURL, imageName)\n    imagePath = \"./\" + imageName\n\
  \    return imagePath\n\n### 这是你想要转换的目标图像的路径。\ntarget_url = \"https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch12/blank-sign.jpg\"\
  \ntarget_path = download_image_from_URL(target_url)\n\n### 这是风格图像的路径。\nstyle_url\
  \ = \"https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch12/road.jpg\"\
  \n```\n\n**代码清单 12-3** 下载图像的函数\n\n我们将目标图像缩放为高度 400 像素。为了保持宽高比，我们按如下方式重新计算宽度：\n\n\
  ```\nwidth, height = load_img(target_path).size\nimg_height = 400\nimg_width = int(width\
  \ * img_height / height)\n```\n\n## 显示图像\n\n为了显示这两张图像，我们使用与上一个项目类似的代码。代码如代码清单 12-4\
  \ 所示。\n\n```\ncontent = Image.open(target_path)\nstyle = Image.open(style_path)\n\
  \nplt.figure(figsize=(10, 10))\nplt.subplot(1, 2, 1)\nplt.imshow(content)\nplt.title('内容图像')\n\
  plt.subplot(1, 2, 2)\nplt.imshow(style)\nplt.title('风格图像')\nplt.tight_layout()\n\
  plt.show()\n```\n\n**代码清单 12-4** 显示内容和风格图像\n\n输出如图 12-6 所示。\n\n![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig6_HTML.jpg](img/495303_1_En_12_Fig6_HTML.jpg)\n\
  \n**图 12-6** 内容和风格图像\n\n## 预处理图像\n\n如前所述，你将使用 `VGG16` 模型来提取图像中的特征。我们需要根据 VGG 训练过程来处理图像数据。幸运的是，Keras\
  \ 不仅为 `VGG16` 提供了这种预处理，还为许多其他流行模型（如 ResNet、Inception、DenseNet 等）提供了预处理。该库提供了一个名为\
  \ `preprocess_input` 的函数，该函数接受一个编码了一批图像的张量或 numpy 数组作为输入，并返回一个预处理后的 numpy 数组或类型为\
  \ `float32` 的 `tf.tensor`。该方法将图像从 RGB 转换为 BGR，并对每个通道进行零中心化。请注意，VGG 网络是在每个通道均值为 `[103.939,\
  \ 116.779, 123.68]` 且通道顺序为 BGR（蓝/绿/红）的图像上训练的。代码清单 12-5 中的代码对给定图像执行此预处理。\n\n```\n\
  def preprocess_image(image_path):\n    img = load_img(image_path, target_size=(img_height,\
  \ img_width))\n    img = img_to_array(img)\n    img = np.expand_dims(img, axis=0)\n\
  \    img = tf.keras.applications.vgg16.preprocess_input(img)\n    return img\n```\n\
  \n**代码清单 12-5** 为 VGG16 网络预处理图像\n\n如果你希望查看输出，我们需要进行反向预处理。此外，我们必须将所有值裁剪到 0–255 范围内。我们在以下函数定义中执行此操作：\n\
  \n```\ndef deprocess_image(x):\n    # 通过均值像素移除零中心化\n    x[:, :, 0] += 103.939\n\
  \    x[:, :, 1] += 116.779\n    x[:, :, 2] += 123.68\n    # 'BGR' -> 'RGB'\n   \
  \ x = x[:, :, ::-1]\n    x = np.clip(x, 0, 255).astype('uint8')\n    return x\n\
  ```\n\n现在，你将基于 `VGG16` 模型构建模型。\n\n### 模型构建\n\n为了构建模型，我们将图像张量数据输入 `VGG16`，并提取特征图、内容表示和风格表示。模型将加载预训练的\
  \ ImageNet 权重。模型构建代码如下所示：\n\n```\ntarget = K.constant(preprocess_image(target_path))\n\
  style = K.constant(preprocess_image(style_path))\n\n### 这个占位符将包含我们生成的图像\ncombination_image\
  \ = K.placeholder((1, img_height, img_width, 3))\n\n### 我们将三张图像合并成一个批次\ninput_tensor\
  \ = K.concatenate([target, style, combination_image], axis=0)\n\n### 使用我们的三张图像批次作为输入来构建\
  \ VGG16 网络。\nmodel = vgg16.VGG16(input_tensor=input_tensor, weights='imagenet',\
  \ include_top=False)\n```\n\n在这段代码中，我们首先通过调用之前定义的 `preprocess` 方法来构建内容和风格图像的输入张量。我们为目标图像创建一个占位符，然后通过调用\
  \ `concatenate` 方法为三张图像创建一个张量。然后将其作为参数传递给 `VGG16` 方法，以提取我们所需的模型。\n\n现在，你可以查看模型摘要。\n\
  \n```\nmodel.summary()\n```\n\n摘要输出如图 12-7 所示。\n\n![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig7_HTML.jpg](img/495303_1_En_12_Fig7_HTML.jpg)\n\
  \n**图 12-7** 模型摘要\n\n## 内容损失\n\n我们将在每个期望的层计算内容损失，并将它们相加。在每次迭代中，我们将输入图像馈送到模型。模型将正确计算所有内容损失，并且由于我们使用的是即时执行模式，所有梯度也将被计算。内容损失表示随机生成的噪声图像\
  \ (G) 与内容图像 (C) 的相似程度。内容损失的计算方式如下。\n\n假设我们选择预训练网络（VGG 网络）中的一个隐藏层 (L) 来计算损失。令 P 和\
  \ F 分别代表原始图像和生成的图像。令 `F[l]` 和 `P[l]` 为层 L 中各自图像的特征表示。那么，内容损失定义如下：\n\n\n\n![$$ {L}_{content}\\\
  left(\\overrightarrow{P},\\overrightarrow{X},l\\right)=\\frac{1}{2}\\sum \\limits_{ij}{\\\
  left({F}_{ij}^l-{P}_{ij}^l\\right)}² $$](img/495303_1_En_12_Chapter_TeX_Equa.png)\n\
  \n我们将内容损失的公式编码如下：\n\n```\ndef content_loss(base, combination):\n    return K.sum(K.square(combination\
  \ - base))\n```\n\n## 风格损失\n\n为了计算风格损失，我们首先需要计算 Gram 矩阵。Gram 矩阵是一个额外的预处理步骤，用于找出不同通道之间的相关性，这些相关性随后将用于衡量风格本身。\n\
  \n我们定义 Gram 矩阵如下：\n\n```\ndef gram_matrix(x):\n    features = K.batch_flatten(K.permute_dimensions(x,\
  \ (2, 0, 1)))\n    gram = K.dot(features, K.transpose(features))\n    return gram\n\
  ```\n\n风格损失会计算风格图像和生成图像的 Gram 矩阵，然后将代价返回给调用者。该代价是风格图像的 Gram 矩阵与生成图像的 Gram 矩阵之差的平方。用数学公式表示如下：\n\
  \n![$$ {L}_{GM}\\left(S,G,l\\right)=\\frac{1}{4{N}_l²{M}_l²}\\sum \\limits_{ij}{\\\
  left( GM\\left[l\\right]{(S)}_{ij}- GM\\left[l\\right]{(G)}_{ij}\\right)}² $$](images/495303_1_En_12_Chapter/495303_1_En_12_Chapter_TeX_Equb.png)\n\
  \n风格损失函数的定义如下：\n\n```\ndef style_loss(style, combination):\n    S = gram_matrix(style)\n\
  \    C = gram_matrix(combination)\n    channels = 3\n    size = img_height * img_width\n\
  \    return K.sum(K.square(S - C)) / (4. * (channels ** 2) * (size ** 2))\n```\n\
  \n## 总变差损失\n\n为了对输出进行正则化以实现平滑，我们定义了相邻像素的总变差损失，如下所示：\n\n```\ndef total_variation_loss(x):\n\
  \    a = K.square(x[:, :img_height - 1, :img_width - 1, :] - x[:, 1:, :img_width\
  \ - 1, :])\n    b = K.square(x[:, :img_height - 1, :img_width - 1, :] - x[:, :img_height\
  \ - 1, 1:, :])\n    return K.sum(K.pow(a + b, 1.25))\n```\n\n## 计算内容和风格的损失\n\n我们首先选择\
  \ VGG16 的内容层和风格层。我使用了 Johnson 等人（2016）定义的层，而不是 Gatys 等人（2015）建议的层，因为这样能产生更好的最终结果。\n\
  \n首先，我们将所有层映射到一个字典中。\n\n```\n### 将层名称映射到激活张量的字典\noutputs_dict = dict([(layer.name,\
  \ layer.output) for layer in model.layers])\n```\n\n我们提取内容层：\n\n```\n### 用于内容损失的层名称\n\
  content_layer = 'block5_conv2'\n```\n\n我们提取风格层：\n\n```\n### 用于风格损失的层名称列表\nstyle_layers\
  \ = ['block1_conv1', 'block2_conv1', 'block3_conv1', 'block4_conv1', 'block5_conv1']\n\
  ```\n\n我们定义几个权重变量，用于计算损失分量的加权平均值。可以将它们视为风格层和内容层的超参数，决定这些层在最终模型中的权重。\n\n```\ntotal_variation_weight\
  \ = 1e-4\nstyle_weight = 10.\ncontent_weight = 0.025\n```\n\n我们通过添加所有分量来计算总损失。\n\
  \n```\n### 通过将所有分量添加到一个 `loss` 变量中来定义损失\nloss = K.variable(0.)\nlayer_features =\
  \ outputs_dict[content_layer]\ntarget_features = layer_features[0, :, :, :]\ncombination_features\
  \ = layer_features[2, :, :, :]\nloss = loss + content_weight * content_loss(target_features,\
  \ combination_features)\nfor layer_name in style_layers:\n    layer_features = outputs_dict[layer_name]\n\
  \    style_reference_features = layer_features[1, :, :, :]\n    combination_features\
  \ = layer_features[2, :, :, :]\n    sl = style_loss(style_reference_features, combination_features)\n\
  \    loss += (style_weight / len(style_layers)) * sl\nloss += total_variation_weight\
  \ * total_variation_loss(combination_image)\n```\n\n## 评估器类\n\n最后，我们将定义一个名为 `Evaluator`\
  \ 的类，用于在一次传递中计算损失和梯度。\n\n```\ngrads = K.gradients(loss, combination_image)[0]\n\
  ### 用于获取当前损失值和当前梯度值的函数\nfetch_loss_and_grads = K.function([combination_image], [loss,\
  \ grads])\n\nclass Evaluator(object):\n    def __init__(self):\n        self.loss_value\
  \ = None\n        self.grads_values = None\n\n    def loss(self, x):\n        assert\
  \ self.loss_value is None\n        x = x.reshape((1, img_height, img_width, 3))\n\
  \        outs = fetch_loss_and_grads([x])\n        loss_value = outs[0]\n      \
  \  grad_values = outs[1].flatten().astype('float64')\n        self.loss_value =\
  \ loss_value\n        self.grad_values = grad_values\n        return self.loss_value\n\
  \n    def grads(self, x):\n        assert self.loss_value is not None\n        grad_values\
  \ = np.copy(self.grad_values)\n        self.loss_value = None\n        self.grad_values\
  \ = None\n        return grad_values\n\nevaluator = Evaluator()\n```\n\n## 生成输出图像\n\
  \n现在我们已经准备好了所有实用函数，是时候生成风格化图像了。我们从一组随机像素（一张随机图像）开始，并使用 L-BFGS（有限内存 Broyden-Fletcher-Goldfarb-Shanno）算法进行优化。该算法使用二阶导数来最小化或最大化函数，并且比标准梯度下降法快得多。训练循环如下所示：\n\
  \n```\niterations = 50\nx = preprocess_image(target_path)\nx = x.flatten()\nfor\
  \ i in range(1, iterations):\n    x, min_val, info = fmin_l_bfgs_b(evaluator.loss,\
  \ x, fprime=evaluator.grads, maxfun=10)\n    print('Iteration %0d, loss: %0.02f'\
  \ % (i, min_val))\nimg = x.copy().reshape((img_height, img_width, 3))\nimg = deprocess_image(img)\n\
  ```\n\n训练结束时，我们将最终输出图像复制到一个变量中，并重新处理它，使其准备好显示。\n\n## 显示图像\n\n我们现在使用以下代码显示所有三张图像：\n\
  \n```\nplt.figure(figsize=(50, 50))\nplt.subplot(3,3,1)\nplt.imshow(load_img(target_path,\
  \ target_size=(img_height, img_width)))\nplt.subplot(3,3,2)\nplt.imshow(load_img(style_path,\
  \ target_size=(img_height, img_width)))\nplt.subplot(3,3,3)\nplt.imshow(img)\nplt.show()\n\
  ```\n\n输出图像如图 12-8 所示。\n\n![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig8_HTML.jpg](img/495303_1_En_12_Fig8_HTML.jpg)\n\
  \n**图 12-8** 内容图像、风格图像和风格化图像\n\n## 完整源代码\n\n`CustomStyleTransfer` 的完整源代码见代码清单 12-6。\n\
  \n\n```python\n!pip install keras==2.3.1\n!pip install tensorflow==2.1.0\nimport\
  \ tensorflow as tf\nimport re\nimport urllib\nfrom tensorflow.keras.preprocessing.image\
  \ import load_img, img_to_array\nfrom matplotlib import pyplot as plt\nfrom IPython\
  \ import display\nfrom PIL import Image\nimport numpy as np\nfrom tensorflow.keras.applications\
  \ import vgg16\nfrom tensorflow.keras import backend as K\nfrom keras import backend\
  \ as K\nfrom scipy.optimize import fmin_l_bfgs_b\n\ndef download_image_from_URL(imageURL):\n\
  \    imageName = re.search('[a-z0-9\\-]+\\.(jpe?g|png|gif|bmp|JPG)', imageURL, re.IGNORECASE)\n\
  \    imageName = imageName.group(0)\n    urllib.request.urlretrieve(imageURL, imageName)\n\
  \    imagePath = \"./\" + imageName\n    return imagePath\n\n### 这是你想要转换的图片路径。\n\
  target_url = \"https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch12/blank-sign.jpg\"\
  \ntarget_path = download_image_from_URL(target_url)\n\n### 这是风格图片的路径。\nstyle_url\
  \ = \"https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch12/road.jpg\"\
  \nstyle_path = download_image_from_URL(style_url)\n\n### 生成图片的尺寸。\nwidth, height\
  \ = load_img(target_path).size\nimg_height = 400\nimg_width = int(width * img_height\
  \ / height)\n\ncontent = Image.open(target_path)\nstyle = Image.open(style_path)\n\
  \nplt.figure(figsize=(10, 10))\nplt.subplot(1, 2, 1)\nplt.imshow(content)\nplt.title('内容图片')\n\
  plt.subplot(1, 2, 2)\nplt.imshow(style)\nplt.title('风格图片')\nplt.tight_layout()\n\
  plt.show()\n\n### 根据 VGG16 的要求预处理数据\ndef preprocess_image(image_path):\n    img\
  \ = load_img(image_path, target_size=(img_height, img_width))\n    img = img_to_array(img)\n\
  \    img = np.expand_dims(img, axis=0)\n    img = tf.keras.applications.vgg16.preprocess_input(img)\n\
  \    return img\n\ndef deprocess_image(x):\n    # 通过均值像素去除零中心化\n    x[:, :, 0] +=\
  \ 103.939\n    x[:, :, 1] += 116.779\n    x[:, :, 2] += 123.68\n    # 'BGR' -> 'RGB'\n\
  \    x = x[:, :, ::-1]\n    x = np.clip(x, 0, 255).astype('uint8')\n    return x\n\
  \ntarget = K.constant(preprocess_image(target_path))\nstyle = K.constant(preprocess_image(style_path))\n\
  \n### 这个占位符将包含我们生成的图片\ncombination_image = K.placeholder((1, img_height, img_width,\
  \ 3))\n\n### 我们将三张图片合并成一个批次\ninput_tensor = K.concatenate([target, style, combination_image],\
  \ axis=0)\n\n### 以包含三张图片的批次作为输入，构建 VGG16 网络。\nmodel = vgg16.VGG16(input_tensor=input_tensor,\
  \ weights='imagenet', include_top=False)\nmodel.summary()\n\n### 计算生成图片的内容损失\ndef\
  \ content_loss(base, combination):\n    return K.sum(K.square(combination - base))\n\
  \ndef gram_matrix(x):\n    features = K.batch_flatten(K.permute_dimensions(x, (2,\
  \ 0, 1)))\n    gram = K.dot(features, K.transpose(features))\n    return gram\n\n\
  def style_loss(style, combination):\n    S = gram_matrix(style)\n    C = gram_matrix(combination)\n\
  \    channels = 3\n    size = img_height * img_width\n    return K.sum(K.square(S\
  \ - C)) / (4. * (channels ** 2) * (size ** 2))\n\ndef total_variation_loss(x):\n\
  \    a = K.square(x[:, :img_height - 1, :img_width - 1, :] - x[:, 1:, :img_width\
  \ - 1, :])\n    b = K.square(x[:, :img_height - 1, :img_width - 1, :] - x[:, :img_height\
  \ - 1, 1:, :])\n    return K.sum(K.pow(a + b, 1.25))\n\n### 将层名称映射到激活张量的字典\noutputs_dict\
  \ = dict([(layer.name, layer.output) for layer in model.layers])\n\n### 用于内容损失的层名称\n\
  content_layer = 'block5_conv2'\n\n### 用于风格损失的层名称；\nstyle_layers = ['block1_conv1',\
  \ 'block2_conv1', 'block3_conv1', 'block4_conv1', 'block5_conv1']\n\n### 损失分量加权平均中的权重\n\
  total_variation_weight = 1e-4\nstyle_weight = 10.\ncontent_weight = 0.025\n\n###\
  \ 通过将所有分量添加到 `loss` 变量来定义损失\nloss = K.variable(0.)\nlayer_features = outputs_dict[content_layer]\n\
  target_features = layer_features[0, :, :, :]\ncombination_features = layer_features[2,\
  \ :, :, :]\nloss = loss + content_weight * content_loss(target_features, combination_features)\n\
  \nfor layer_name in style_layers:\n    layer_features = outputs_dict[layer_name]\n\
  \    style_reference_features = layer_features[1, :, :, :]\n    combination_features\
  \ = layer_features[2, :, :, :]\n    sl = style_loss(style_reference_features, combination_features)\n\
  \    loss += (style_weight / len(style_layers)) * sl\n\nloss += total_variation_weight\
  \ * total_variation_loss(combination_image)\n\ngrads = K.gradients(loss, combination_image)[0]\n\
  \n### 用于获取当前损失值和当前梯度值的函数\nfetch_loss_and_grads = K.function([combination_image],\
  \ [loss, grads])\n\nclass Evaluator(object):\n    def __init__(self):\n        self.loss_value\
  \ = None\n        self.grads_values = None\n\n    def loss(self, x):\n        assert\
  \ self.loss_value is None\n        x = x.reshape((1, img_height, img_width, 3))\n\
  \        outs = fetch_loss_and_grads([x])\n        loss_value = outs[0]\n      \
  \  grad_values = outs[1].flatten().astype('float64')\n        self.loss_value =\
  \ loss_value\n        self.grad_values = grad_values\n        return self.loss_value\n\
  \n    def grads(self, x):\n        assert self.loss_value is not None\n        grad_values\
  \ = np.copy(self.grad_values)\n        self.loss_value = None\n        self.grad_values\
  \ = None\n        return grad_values\n\nevaluator = Evaluator()\n\niterations =\
  \ 50\nx = preprocess_image(target_path)\nx = x.flatten()\n\nfor i in range(1, iterations):\n\
  \    x, min_val, info = fmin_l_bfgs_b(evaluator.loss, x, fprime=evaluator.grads,\
  \ maxfun=10)\n    print('迭代次数 %0d，损失值: %0.02f' % (i, min_val))\n\nimg = x.copy().reshape((img_height,\
  \ img_width, 3))\nimg = deprocess_image(img)\n\nplt.figure(figsize=(50, 50))\nplt.subplot(3,3,1)\n\
  plt.imshow(load_img(target_path, target_size=(img_height, img_width)))\nplt.subplot(3,3,2)\n\
  plt.imshow(load_img(style_path, target_size=(img_height, img_width)))\nplt.subplot(3,3,3)\n\
  plt.imshow(img)\nplt.show()\n\n列表 12-6\nCustomStyleTransfer 完整源代码\n```\n\n\n"
- '# 总结


  在本章中，你学习了神经网络中的另一项重要技术——神经风格迁移。该技术允许你将所选图像的内容转换为另一幅图像的风格。你学会了通过两种不同方式实现风格迁移。第一种方法是使用`tfhub`中提供的预训练模型来执行快速的艺术风格迁移。使用这种方法进行风格迁移速度快且效果出色。第二种方法是构建你自己的网络，从核心层面实现风格迁移。我们使用了用于图像分类的`VGG16`预训练模型来提取图像的内容和风格。接着，你学会了创建一个网络，该网络通过多次迭代学习如何将风格应用于给定的内容。这种方法允许你自行进行风格迁移实验。


  在下一章中，你将学习如何使用生成对抗网络（GAN）生成图像。


  '
- "# 13. 图像生成\n\n你是否曾想象过神经网络可用于生成复杂的彩色图像？动漫呢？名人面孔呢？卧室呢？听起来是不是很有趣？所有这些都可以通过神经网络中最有趣的概念——生成对抗网络（GAN）来实现。这一概念由伊恩·J·古德费洛于\
  \ 2014 年提出并发展。GAN 生成的图像看起来非常逼真，以至于几乎无法区分真假图像。需要提醒的是，要生成如此复杂的图像，你需要大量资源来训练网络，但正如你在学习本章时会看到的，它确实有效。那么，让我们来看看什么是\
  \ GAN。\n\n## GAN – 生成对抗网络\n\n在 GAN 中，有两个神经网络模型通过对抗过程同时训练。一个网络称为生成器，另一个称为判别器。生成器（艺术家）学习创建看起来真实的图像。判别器（评论家）学习区分真实图像和伪造图像。因此，这是两个相互竞争的模型，试图击败对方。最终，如果你能训练生成器超越判别器，你就实现了目标。\n\
  \n## GAN 如何工作？\n\n正如我所说，GAN 由两个网络组成。训练 GAN 需要两个步骤：\n\n1.  保持生成器空闲，训练判别器。在真实图像上训练判别器若干个周期，看它是否能正确地将它们预测为真实图像。在同一训练阶段，在伪造图像（由生成器生成）上训练判别器，看它是否能将它们预测为伪造图像。\n\
  2.  保持判别器空闲，训练生成器。利用判别器对伪造图像的预测结果来改进这些图像。\n\n重复上述步骤大量周期，并手动检查结果（伪造图像）是否看起来真实。如果看起来真实，则停止训练。如果不真实，则继续上述两个步骤，直到伪造图像看起来真实为止。\n\
  \n整个过程如图 13-1 所示。\n\n![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig1_HTML.jpg](img/495303_1_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1** GAN 工作原理示意图\n\n### 生成器\n\n生成器示意图如图 13-2 所示。\n\n![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig2_HTML.jpg](img/495303_1_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2** 生成器架构\n\n生成器接收一个具有一定维度的随机噪声向量。在我们的示例中，我们将使用 100 维。从这个随机向量中，它生成一个 64x64x3\
  \ 的图像。图像通过一系列卷积层转换进行上采样。每个卷积转置层之后都跟着一个批归一化和一个带泄露的 ReLU。带泄露的 ReLU 既没有梯度消失问题，也没有 ReLU\
  \ 死亡问题。带泄露的 ReLU 试图修复“ReLU 死亡”问题。ReLU 会获得一个 0.01 左右的小值，而不是消亡为 0。我们在每个卷积层中使用步长以避免不稳定的训练。注意，在每次卷积时，图像是如何被上采样以创建最终的\
  \ 64x64x3 图像的。\n\n### 判别器\n\n判别器示意图如图 13-3 所示。\n\n![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig3_HTML.jpg](img/495303_1_En_13_Fig3_HTML.jpg)\n\
  \n**图 13-3** 判别器架构\n\n判别器也使用卷积层，并对给定图像进行下采样以进行评估。\n\n### 数学公式\n\nGAN 的工作原理可以用下面给出的简单数学公式表示：\n\
  \n![$$ \\frac{\\mathit{\\min}}{G}\\frac{\\mathit{\\max}}{D}V\\left(D,G\\right)=\\\
  frac{\\mathit{\\min}}{G}\\frac{\\mathit{\\max}}{D}\\left({E}_{z\\sim {P}_{data}(x)}\\\
  left[ logD(x)\\right]+{E}_{z\\sim {P}_z(z)}\\left[\\mathit{\\log}\\left(1-D\\left(G(z)\\\
  right)\\right)\\right]\\right) $$](images/495303_1_En_13_Chapter/495303_1_En_13_Chapter_TeX_Equa.png)\n\
  \n其中`G`代表生成器，`D`代表判别器。`data(x)`代表真实数据的分布，`pz`代表生成数据或伪造数据的分布。`x`代表来自真实数据的样本，`z`代表来自生成数据的样本。`D(x)`代表判别器网络，`G(z)`代表生成器网络。\n\
  \n在真实数据上训练时的判别器损失表示为\n\n![$$ L\\left(D(x),1\\right)=\\mathit{\\log}\\left(D(x)\\\
  right) $$](img/495303_1_En_13_Chapter_TeX_Equ1.png)\n\n(1)\n\n在来自生成器的伪造数据上训练时的判别器损失表示为\n\
  \n![$$ L\\left(D\\left(G(z)\\right),0\\right)=\\mathit{\\log}\\left(1-D\\left(G(z)\\\
  right)\\right) $$](img/495303_1_En_13_Chapter_TeX_Equ2.png)\n\n(2)\n\n对于真实数据，判别器的预测应接近\
  \ 1。因此，应最大化方程 1 以使`D(x)`接近 1。第一个方程是真实数据上的判别器损失，应最大化以使`D(G(z))`接近 1。因为第二个方程是伪造数据上的判别器损失，所以也应最大化。注意，log\
  \ 是一个递增函数。对于第二个方程，判别器对生成的伪造数据的预测应接近零。为了最大化第二个方程，我们必须将`D(G(z))`的值最小化到零。因此，我们需要最大化判别器的两个损失。判别器的总损失是方程\
  \ 1 和 2 给出的两个损失之和。因此，组合后的总损失也将被最大化。\n\n生成器损失表示为\n\n![$$ {L}^{(G)}=\\mathit{\\min}\\\
  left[\\mathit{\\log}\\left(D(x)\\right)+\\mathit{\\log}\\left(1-D\\left(G(z)\\right)\\\
  right)\\right] $$](images/495303_1_En_13_Chapter/495303_1_En_13_Chapter_TeX_Equ3.png)\n\
  \n(3)\n\n在生成器训练期间，我们需要最小化这个损失。\n\n## 数字生成\n\n在这个项目中，我们将使用 Kaggle 提供的流行 MNIST 数据集。如你所知，该数据集包含手写数字的图像。我们将创建一个\
  \ GAN 模型来生成与这些图像看起来相同的额外图像。这可能有助于某些人在未来的开发中增加训练数据集的大小。\n\n### 创建项目\n\n创建一个 Colab\
  \ 项目并将其重命名为`DigitGen-GAN`。导入所需的库。\n\n\n\n```python\nimport matplotlib.pyplot as\
  \ plt\nimport tensorflow as tf\nimport numpy as np\nimport time\nfrom tensorflow\
  \ import keras\nfrom tensorflow.keras import layers\nimport os\n```\n\n## 加载数据集\n\
  \n使用以下语句将数据集加载到代码中：\n\n```python\n(train_images,train_labels),\n(test_images,test_labels)\
  \ =\ntf.keras.datasets.mnist.load_data()\n```\n\n训练和测试数据集被分别加载到独立的 `numpy` 数组中。由于我们只对生成单个数字（例如\
  \ 9）感兴趣，因此将从训练数据集中提取所有包含数字 9 的图像。\n\n```python\ndigit9_images = []\nfor i in range(len(train_images)):\n\
  if train_labels[i] == 9:\ndigit9_images.append(train_images[i])\ntrain_images =\
  \ np.array(digit9_images)\ntrain_images.shape\n```\n\n形状为 `(5949, 28, 28)`。因此，我们有\
  \ 5949 张 28x28 大小的图像。这是一个庞大的数据集。我们的模型将尝试生成同样大小的图像，并匹配这些图像的外观。\n\n你可以通过以下代码在终端打印几张图像，验证是否只包含数字\
  \ 9 的图像：\n\n```python\nn = 10\nf = plt.figure()\nfor i in range(n):\nf.add_subplot(1,\
  \ n, i + 1)\nplt.subplot(1, n, i+1 ).axis(\"off\")\nplt.imshow(train_images[i])\n\
  plt.show()\n```\n\n你将看到如图 13-4 所示的输出。\n\n![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig4_HTML.jpg](img/495303_1_En_13_Fig4_HTML.jpg)\n\
  \n**图 13-4** 样本图像\n\n现在，我们将准备用于训练的数据集。\n\n## 准备数据集\n\n首先，使用以下语句对数据进行重塑；请注意，数据集中图像的大小为\
  \ 28x28 像素。\n\n```python\ntrain_images = train_images.reshape (\ntrain_images.shape[0],\
  \ 28, 28, 1).astype\n('float32')\n```\n\n由于图像中每个颜色值的范围是 0 到 256，我们将这些值归一化到 -1 到\
  \ 1 的范围内，以便更好地学习。平均值为 127.5，因此以下公式将值归一化到 -1 到 +1 的范围内。你也可以选择使用 255 将值归一化到 0 到 1\
  \ 之间。\n\n```python\ntrain_images = (train_images - 127.5) / 127.5\n```\n\n我们通过调用\
  \ `from_tensor_slices` 方法来创建用于训练的批次数据集。\n\n```python\ntrain_dataset = tf.data.Dataset.from_tensor_slices(\n\
  train_images).shuffle\n(train_images.shape[0]).batch(32)\n```\n\n接下来是我们应用的重要部分，即定义生成器模型。\n\
  \n## 定义生成器模型\n\n生成器的目的是创建包含数字 9 的图像，这些图像看起来与训练数据集中的图像相似。\n\n你将使用 Keras 顺序模型来创建生成器。\n\
  \n```python\ngen_model = tf.keras.Sequential()\n```\n\n你将添加 Keras `Dense` 层作为第一层。你也可以选择将\
  \ `Conv2D` 层作为第一层。\n\n```python\ngen_model.add(tf.keras.layers.Dense(7*7*256,\n\
  use_bias=False,\ninput_shape=(100,)))\n```\n\n该层的输入指定为 100，因为稍后我们将使用维度为 100 的噪声向量作为该\
  \ GAN 模型的输入。我们将从 7x7 的图像尺寸开始，并不断将其放大到最终的目标尺寸 28x28。z 维度 256 指定了用于图像的滤波器数量，最终会转换为\
  \ 3 用于最终图像。\n\n接下来，我们向模型添加一个批归一化层以提供稳定性。\n\n```python\ngen_model.add(tf.keras.layers.BatchNormalization())\n\
  gen_model.add(tf.keras.layers.LeakyReLU())\n```\n\n我们添加激活层为 leaky ReLU。\n\n我们将输出重塑为\
  \ 7x7x256：\n\n```python\ngen_model.add(tf.keras.layers.Reshape((7, 7, 256)))\n```\n\
  \n现在，我们使用 `Conv2D` 层来放大生成的图像。\n\n```python\ngen_model.add(tf.keras.layers.Conv2DTranspose\n\
  (128, (5, 5),\nstrides=(1, 1),\npadding='same',\nuse_bias=False))\n```\n\n第一个参数是输出空间的维度，即卷积中输出滤波器的数量。第二个参数是\
  \ `kernel_size`，它指定了卷积滤波器的高度和宽度。第三个参数指定了沿高度和宽度的卷积 `strides`。要理解步长，可以想象一个滤波器从左到右、从上到下以每次\
  \ 1 个像素的方式在图像上移动。这种移动称为步长。步长为 `(2, 2)` 时，滤波器每侧移动 2 个像素，将图像放大 2x2 倍。\n\n由于步长指定为 `(1,\
  \ 1)`，该层的输出将是大小为 7x7 的图像——与其输入相同。`padding` 确保尺寸保持不变。`use_bias` 参数中的 `false` 值表示该层不使用偏置向量。该层之后是批归一化和激活层，与之前相同：\n\
  \n```python\ngen_model.add(tf.keras.layers.BatchNormalization())\ngen_model.add(tf.keras.layers.LeakyReLU())\n\
  ```\n\n接下来，我们添加步长设置为 `(2, 2)` 的 `Conv2DTranspose` 层，然后是批归一化和激活层。\n\n```python\n\
  gen_model.add(tf.keras.layers.Conv2DTranspose\n(64, (5, 5),\nstrides=(2, 2),\npadding='same',\n\
  use_bias=False))\ngen_model.add(tf.keras.layers.BatchNormalization())\ngen_model.add(tf.keras.layers.LeakyReLU())\n\
  ```\n\n输出图像现在将是 14x14 的大小。\n\n我们现在添加最后一个 `Conv2D` 层，步长等于 `(2, 2)`，从而进一步将图像放大到 28x28\
  \ 的大小。这是我们最终期望的图像尺寸。\n\n```python\ngen_model.add(tf.keras.layers.Conv2DTranspose\n\
  (1, (5, 5),\nstrides=(2, 2),\npadding='same',\nuse_bias=False,\nactivation='tanh'))\n\
  ```\n\n最后一层使用 `tanh` 激活函数，映射参数值为 1，从而为我们提供单个输出图像。\n\n由绘图工具生成的模型图如图 13-5 所示。\n\n\
  ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig5_HTML.jpg](img/495303_1_En_13_Fig5_HTML.jpg)\n\
  \n**图 13-5** 生成器架构\n\n模型摘要如图 13-6 所示。\n\n![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig6_HTML.jpg](img/495303_1_En_13_Fig6_HTML.jpg)\n\
  \n**图 13-6** 生成器模型摘要\n\n## 测试生成器\n\n你将使用随机输入向量测试生成器，并通过以下代码在控制台上显示结果：\n\n```python\n\
  noise = tf.random.normal([1, 100])\n#giving random input vector\ngenerated_image\
  \ = gen_model(noise, training=False)\nplt.imshow(generated_image[0, :, :, 0], cmap=\"\
  gray\")\n```\n\n图像将类似于图 13-7 所示。\n\n![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig7_HTML.jpg](img/495303_1_En_13_Fig7_HTML.jpg)\n\
  \n**图 13-7** 生成器生成的随机图像\n\n检查图像的形状：\n\n```python\ngenerated_image.shape\n```\n\n\
  它给出以下输出：\n\n```\nTensorShape([1, 28, 28, 1])\n```\n\n输出表明图像具有我们期望的 28x28 尺寸。接下来，我们将定义判别器。\n\
  \n## 定义判别器模型\n\n我们按如下方式定义判别器：\n\n```python\ndiscri_model = tf.keras.Sequential()\n\
  discri_model.add(tf.keras.layers.Conv2D\n(64, (5, 5),\nstrides=(2, 2),\npadding='same',\n\
  input_shape=[28, 28, 1]))\ndiscri_model.add(tf.keras.layers.LeakyReLU())\ndiscri_model.add(tf.keras.layers.Dropout(0.3))\n\
  discri_model.add(tf.keras.layers.Conv2D\n(128, (5, 5),\nstrides=(2, 2),\npadding='same'))\n\
  discri_model.add(tf.keras.layers.LeakyReLU())\ndiscri_model.add(tf.keras.layers.Dropout(0.3))\n\
  discri_model.add(tf.keras.layers.Flatten())\ndiscri_model.add(tf.keras.layers.Dense(1))\n\
  ```\n\n判别器仅使用两个卷积层。最后一个卷积层的输出类型为 `(batch size, height, width, filters)`。网络中的 `Flatten`\
  \ 层将此输出展平，以馈送到网络中的最后一个 `Dense` 层。\n\n\n\n模型图如图 13-8 所示。\n\n![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig8_HTML.jpg](img/495303_1_En_13_Fig8_HTML.jpg)\n\
  \n**图 13-8** 判别器架构\n\n模型摘要如图 13-9 所示。\n\n![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig9_HTML.jpg](img/495303_1_En_13_Fig9_HTML.jpg)\n\
  \n**图 13-9** 判别器模型摘要\n\n请注意，判别器只有大约 20 万个可训练参数。\n\n## 测试判别器\n\n你可以通过将我们之前生成的图像输入判别器来对其进行测试。\n\
  \n```\ndecision = discri_model(generated_image)\n```\n\n如果图像是假的，判别器会给出一个负值；如果是真的，则给出正值。打印该测试图像的判别器决策结果。\n\
  \n```\nprint (decision)\n```\n\n它会输出以下决策结果：\n\n```\ntf.Tensor([[0.0033829]], shape=(1,\
  \ 1), dtype=float32)\n```\n\n决策值为 `0.0033`，这是一个正数，表明该图像是真实的。最大值为 `1` 表示模型确信该图像是真实的。如果你使用生成器生成另一张图像并测试判别器的输出，可能会得到负值结果。这是因为我们尚未在某些数据集上训练生成器和判别器。\n\
  \n## 定义损失函数\n\n现在，我们将为生成器和判别器定义损失函数。\n\n```\ncross_entropy = tf.keras.losses.BinaryCrossentropy(from_logits=True)\n\
  ```\n\n我们使用 Keras 的二元交叉熵函数来实现此目的。请注意，我们有两个类别——一个（`1`）代表真实图像，另一个（`0`）代表虚假图像。我们针对这两个类别计算损失，因此这使我们的问题成为一个二元分类问题。因此，我们使用二元交叉熵作为损失函数。\n\
  \n我们定义一个函数来计算生成器损失，如下所示：\n\n```\ndef generator_loss(generated_output):\n    return\
  \ cross_entropy(tf.ones_like(generated_output), generated_output)\n```\n\n该函数的返回值量化了生成器欺骗判别器的能力。如果生成器表现良好，判别器会将虚假图像分类为真实图像，并返回决策值\
  \ `1`。因此，该函数将判别器对生成图像的决策与全 1 数组进行比较。\n\n我们定义判别器损失函数如下：\n\n```\ndef discriminator_loss(real_output,\
  \ generated_output):\n    # 计算将图像视为真实图像时的损失 [1,1,...,1]\n    real_loss = cross_entropy(tf.ones_like(real_output),\
  \ real_output)\n    # 计算将图像视为虚假图像时的损失 [0,0,...,0]\n    generated_loss = cross_entropy(tf.zeros_like(generated_output),\
  \ generated_output)\n    # 计算总损失\n    total_loss = real_loss + generated_loss\n\
  \    return total_loss\n```\n\n我们首先让判别器认为给定的图像是真实的，然后计算相对于全 1 数组的损失。接着，我们让判别器认为该图像是虚假的，然后要求其计算相对于全\
  \ 0 数组的损失。判别器确定的总损失是这两个损失之和。\n\n现在，我们为生成器和判别器定义优化器，两者均设置为 `Adam`。\n\n```\ngen_optimizer\
  \ = tf.optimizers.Adam(1e-4)\ndiscri_optimizer = tf.optimizers.Adam(1e-4)\n```\n\
  \n接下来，你将编写一些在训练过程中使用的实用函数。\n\n## 定义训练所需的几个函数\n\n首先，我们声明几个变量：\n\n```\nepoch_number\
  \ = 0\nEPOCHS = 100\nnoise_dim = 100\nseed = tf.random.normal([1, noise_dim])\n\
  ```\n\n我们将训练模型 `100` 个周期。你可以随时根据自己的选择更改此变量。更多的周期数将为我们要生成的数字 `9` 生成更好的图像。噪声维度设置为\
  \ `100`，用于在创建随机图像时作为生成器网络的首次输入。种子设置为单张图像的随机数据。\n\n## 检查点设置\n\n由于训练可能需要很长时间，我们在训练中提供了检查点功能，以便将生成器和判别器的中间状态保存到本地文件中。\n\
  \n```\ncheckpoint_dir = '/content/drive/My Drive/GAN1/Checkpoint'\ncheckpoint_prefix\
  \ = os.path.join(checkpoint_dir, \"ckpt\")\ncheckpoint = tf.train.Checkpoint(\n\
  \    generator_optimizer=gen_optimizer,\n    discriminator_optimizer=discri_optimizer,\n\
  \    generator=gen_model,\n    discriminator=discri_model\n)\n```\n\n如果发生断连，你可以从最后一个检查点继续训练。我将向你展示如何操作。\n\
  \n## 设置云端硬盘\n\n检查点数据将保存到 Google 云端硬盘中名为 `GAN1/Checkpoint` 的文件夹中。因此，在运行代码之前，请确保你已在\
  \ Google 云端硬盘中创建了此文件夹结构。\n\n使用以下代码将云端硬盘挂载到你的项目中：\n\n```\nfrom google.colab import\
  \ drive\ndrive.mount('/content/drive')\n```\n\n将当前文件夹更改为新位置，以便检查点文件存储在此位置。\n\n```\n\
  cd '/content/drive/My Drive/GAN1'\n```\n\n接下来，我们编写一个 `gradient_tuning` 函数。\n\n##\
  \ 模型训练步骤\n\n我们的生成器和判别器模型都将分多个步骤进行训练。我们将为这些步骤编写一个函数。\n\n我们将使用梯度带（`tf.GradientTape`）对生成器和判别器进行自动微分。自动微分计算计算相对于其输入变量的梯度。在梯度带上下文中执行的操作会被记录到磁带上。然后使用反向模式微分来计算新的梯度。你无需深入了解这些操作即可理解模型的训练方式。\n\
  \n在每个步骤中，我们将一批图像作为输入传递给该函数。我们将要求判别器对训练图像和生成的图像都产生输出。我们将训练输出称为真实输出，将生成的图像输出称为虚假输出。我们将计算生成器在虚假输出上的损失以及判别器在真实和虚假输出上的损失。我们将使用梯度带根据这些损失计算两者的梯度，然后将新的梯度应用于模型。完整的函数定义以及每行的注释见代码清单\
  \ 13-1。\n\n```\ndef gradient_tuning(images):\n    # 创建一个噪声向量。\n    noise = tf.random.normal([16,\
  \ noise_dim])\n    # 使用梯度带进行自动微分\n    with tf.GradientTape() as generator_tape,\
  \ tf.GradientTape() as discriminator_tape:\n        # 要求生成器生成随机图像\n        generated_images\
  \ = gen_model(noise, training=True)\n        # 要求判别器评估真实图像并生成其输出\n        real_output\
  \ = discri_model(images, training=True)\n        # 要求判别器对生成的（虚假）图像进行评估\n       \
  \ fake_output = discri_model(generated_images, training=True)\n        # 计算生成器在虚假数据上的损失\n\
  \        gen_loss = generator_loss(fake_output)\n        # 计算之前定义的判别器损失\n      \
  \  disc_loss = discriminator_loss(real_output, fake_output)\n        # 计算生成器的梯度\n\
  \        gen_gradients = generator_tape.gradient(gen_loss, gen_model.trainable_variables)\n\
  \        # 计算判别器的梯度\n        discri_gradients = discriminator_tape.gradient(disc_loss,\
  \ discri_model.trainable_variables)\n        # 使用优化器处理梯度并将其应用于变量\n        gen_optimizer.apply_gradients(zip(gen_gradients,\
  \ gen_model.trainable_variables))\n        # 对判别器执行相同操作\n        discri_optimizer.apply_gradients(zip(discri_gradients,\
  \ discri_model.trainable_variables))\n```\n\n**代码清单 13-1** 梯度调整函数\n\n现在，我们再编写一个函数，用于生成数字\
  \ `9`（我们期望的输出）的图像，并将其保存到你的 Google 云端硬盘中。\n\n\n\n```python\ndef generate_and_save_images(model,\
  \ epoch, test_input):\n    global epoch_number\n    epoch_number = epoch_number\
  \ + 1\n    # set training to false to ensure inference mode\n    predictions = model(test_input,\
  \ training=False)\n    # display and save image\n    fig = plt.figure(figsize=(4,4))\n\
  \    for i in range(predictions.shape[0]):\n        plt.imshow(predictions[i, :,\
  \ :, 0] * 127.5 + 127.5, cmap=\"gray\")\n        plt.axis('off')\n    plt.savefig('image_at_epoch_{:01d}.png'.format(epoch_number))\n\
  \    plt.show()\n```\n\n该函数使用全局变量 `epoch_number` 来追踪训练轮次，以便在断连后继续训练。模型的 `test_input`\
  \ 始终是我们的随机种子。将 `training` 设置为 `False` 后，在此种子上执行推理，以确保批归一化生效。然后，我们在用户控制台上显示图像，并将其保存到驱动器中，文件名后缀为\
  \ `epoch_number`。\n\n利用这些函数，你现在可以编写代码来训练模型并生成一些输出。\n\n### 模型训练\n\n要训练生成器和判别器模型，你需要设置一个简单的\
  \ `for` 循环，如清单 13-2 所示。`train` 方法将真实图像数据集作为其第一个参数。我将其设为参数，以便你可以使用不同的图像数据集和/或不同尺寸进行实验。第二个参数是你希望执行训练的轮次数。我们对数据集中的每个批次数据调用\
  \ `gradient_tuning`。在每个轮次结束时，我们生成图像并将其保存到用户的驱动器中。此外，网络状态会作为检查点保存，以便在断连后能从最后一个检查点继续训练。每个轮次的执行时间会被追踪并打印在用户控制台上。模型训练的函数如清单\
  \ 13-2 所示。\n\n```python\ndef train(dataset, epochs):\n    for epoch in range(epochs):\n\
  \        start = time.time()\n        for image_batch in dataset:\n            gradient_tuning(image_batch)\n\
  \        # Produce images as we go\n        generate_and_save_images(gen_model,\
  \ epoch + 1, seed)\n        # save checkpoint data\n        checkpoint.save(file_prefix\
  \ = checkpoint_prefix)\n        print ('Time for epoch {} is {} sec'.format(epoch\
  \ + 1, time.time()-start))\n```\n\n清单 13-2：模型训练函数\n\n现在，通过调用此 `train` 方法开始模型训练。\n\
  \n```python\ntrain(train_dataset, EPOCHS)\n```\n\n随着训练的进行，检查点会被保存，并且每个轮次都会生成图像。图像会显示在控制台上，并保存到你的\
  \ Google Drive 中。我运行 100 个轮次的输出如表 13-1 所示。\n\n**表 13-1** 程序生成的数字 9 的图像\n\n![../images/495303_1_En_13_Chapter/495303_1_En_13_Figa_HTML.gif](img/495303_1_En_13_Figa_HTML.gif)\n\
  \n从输出中可以看出，网络在仅 20/30 个轮次后就能生成可接受的输出，而在 70 轮次及以上时，质量达到最佳。\n\n在训练过程中，如果发生断连，你可以从之前已知的检查点恢复网络状态，如下面的语句所示，并继续训练。\n\
  \n```python\n#run this code only if there is a runtime disconnection\ntry:\n   \
  \ checkpoint.restore(tf.train.latest_checkpoint(checkpoint_dir))\nexcept Exception\
  \ as error:\n    print(\"Error loading in model : {}\".format(error))\ntrain(train_dataset,\
  \ EPOCHS)\n```\n\n在我运行此应用时，在 GPU 上每个轮次大约需要 10 秒。很多时候，对于更复杂的图像生成，可能需要几个小时才能获得可接受的输出。在这种情况下，检查点对于重新启动训练非常有用。\n\
  \n## 完整源代码\n\n用于生成手写数字图像的完整源代码如清单 13-3 所示。\n\n\n\n```python\nimport matplotlib.pyplot\
  \ as plt\nimport tensorflow as tf\nimport numpy as np\nimport time\nfrom tensorflow\
  \ import keras\nfrom tensorflow.keras import layers\nimport os\n\n(train_images,\
  \ train_labels), (test_images, test_labels) = tf.keras.datasets.mnist.load_data()\n\
  \ndigit9_images = []\nfor i in range(len(train_images)):\n    if train_labels[i]\
  \ == 9:\n        digit9_images.append(train_images[i])\n\ntrain_images = np.array(digit9_images)\n\
  train_images.shape\n\nn = 10\nf = plt.figure()\nfor i in range(n):\n    f.add_subplot(1,\
  \ n, i + 1)\n    plt.subplot(1, n, i + 1).axis(\"off\")\n    plt.imshow(train_images[i])\n\
  plt.show()\n\ntrain_images = train_images.reshape(train_images.shape[0], 28, 28,\
  \ 1).astype('float32')\ntrain_images = (train_images - 127.5) / 127.5\n\ntrain_dataset\
  \ = tf.data.Dataset.from_tensor_slices(train_images).shuffle(train_images.shape[0]).batch(32)\n\
  \ngen_model = tf.keras.Sequential()\n#### 向网络输入一张 7x7 的随机图像\ngen_model.add(tf.keras.layers.Dense(7\
  \ * 7 * 256, use_bias=False, input_shape=(100,)))\n#### 添加批归一化以增强稳定性\ngen_model.add(tf.keras.layers.BatchNormalization())\n\
  gen_model.add(tf.keras.layers.LeakyReLU())\n#### 重塑输出\ngen_model.add(tf.keras.layers.Reshape((7,\
  \ 7, 256)))\n### 应用 (5x5) 滤波器和 (1,1) 步长。输出图像仍为 7x7。\ngen_model.add(tf.keras.layers.Conv2DTranspose(128,\
