  ## 解码器层


  如图 9-6 所示，解码器层实际上包含两个多头注意力机制：


  1.  多头注意力（`Attention_2`，如图 9-6 所示）

  2.  掩码多头注意力（`Attention_1`，如图 9-6 所示）


  前面列表中的第一个多头注意力 `Attention_2` 接收来自编码器的输入。这个输入是*值*和*键*向量。该多头注意力的另一个输入来自掩码多头注意力子层的输出。列表中第二个多头注意力（`Attention_1`），我们为其添加了“掩码”前缀，它接收的输入是前一个解码器状态和位置编码的组合。这两个层都使用了适当的填充掩码。多头注意力
  `Attention_2` 的输出经过两个密集层，然后进行 dropout。这就构成了一个解码器层的结构。在解码器的实现中，该层会被重复 N 次。


  解码器层的代码如下：


