  `%tensorflow_version` 被称为 Colab 魔法命令，用于加载 TF 2.x 而非默认的 TF 1.x。该魔法命令的使用将在后续章节 2 讨论
  TF Hello World 应用时进行说明。


  注意


  在当前版本的 Colab 中，不再需要使用 `%tensorflow_version`。因此该语句是多余的，我已在后续所有章节中将其删除。


