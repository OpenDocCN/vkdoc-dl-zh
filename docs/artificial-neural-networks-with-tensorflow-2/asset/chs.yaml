  **图 5-10**


  在大型模型中添加 dropout 的效果


  从图 5-10 中可以清楚地看到，添加 dropout 层可以消除或至少减少过拟合。


  Dropout 层通常添加到大型网络中，因为它们的每一层都有足够数量的神经元，你可以从中舍弃掉一部分的输出。




