- "# 6. 估算器\n\n## 简介\n\n任何机器学习项目都包含多个阶段，包括训练、评估、预测，以及最终导出到生产服务器上提供服务。你在前几章中已经学习了这些阶段，当时我们讨论了分类和回归的机器学习项目。为了开发性能最佳的模型，你尝试了不同的\
  \ ANN 架构。基本上，你通过实验多种不同的原型来达到期望的结果。在 TF 2.0 之前，整个实验过程并不容易，因为每次修改代码，你都需要构建一个计算图并在会话中运行它。你将在本章学习的估算器正是为了处理所有这些底层工作而设计的。创建图并在会话中运行它们的整个过程非常耗时，并且给代码调试带来了许多挑战。\n\
  \n此外，在模型完全开发完成后，将其部署到生产环境也面临挑战，你可能希望将其部署到分布式环境以获得更好的性能。同时，你可能还希望在 CPU、GPU 或 TPU\
  \ 上运行模型。这都需要修改代码。为了帮助你解决所有这些问题，并将一切统一在一个框架下，估算器应运而生，尽管这是在 TF 2.0 之前。然而，你将在本章学习并在未来所有项目中使用的估算器，能够利用\
  \ TF 2.x 中引入的许多新功能。例如，构建数据管道和模型开发之间有了清晰的分离。在分布式环境上的部署也无需任何代码更改。增强的日志记录和追踪功能使调试更加容易。在本章中，你将学习估算器是如何实现这一切的。\n\
  \n具体来说，你将学习以下内容：\n\n- 什么是估算器？\n- 什么是预制的估算器？\n- 使用预制估算器解决分类问题\n- 使用预制估算器解决回归问题\n\
  - 基于 Keras 模型构建自定义估算器\n- 基于 `tfhub` 模块构建自定义估算器\n\n## 估算器概述\n\nTensorFlow 估算器是一个高级\
  \ API，它将机器学习开发的多个阶段统一在一个框架下。它封装了用于训练、评估、预测以及导出模型以供生产使用的各种 API。它是一个高级 API，为现有的 TensorFlow\
  \ API 栈提供了进一步的抽象。\n\n\n\n### API 栈\n\n在引入估算器之后，TensorFlow 的新 API 栈如图 6-1 所示。\n\n\
  ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig1_HTML.jpg](img/495303_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\nTensorFlow API 栈\n\n到目前为止，你主要使用了中级 API；当你需要对模型开发进行更精细的控制时，低级 API 的使用才成为罕见的需求。现在，学习了估算器\
  \ API 之后，你可能甚至不会在模型开发中使用中级 API。但你已经开发好的模型会怎样呢——它们能否从这个 API 中受益？如果可以，如何让它们使用这个 API？幸运的是，TensorFlow\
