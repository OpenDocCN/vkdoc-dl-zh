  ### 设置图像和标签\n\n现在我们将设置图像路径，以便为训练准备数据。这通过以下两条程序语句完成：\n\n```\n#### 为方便使用，定义训练文件路径\n\
  train_path = \"/content/train\"\n#### 根据图像 ID 创建路径名称\nfilenames = [train_path +\
  \ '/'+fname + \".jpg\" for fname in labels_csv[\"id\"]]\n```\n\n你可以通过打印其中一张图像来验证文件路径是否正确设置，如下所示：\n\
