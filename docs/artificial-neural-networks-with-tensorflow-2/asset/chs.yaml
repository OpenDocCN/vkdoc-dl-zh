  \n**图 12-2** 内容图像和风格图像\n\n因此，我们有两张尺寸不同的图像。\n\n### 准备模型输入的图像\n\n`tfhub` 中执行图像变换的模块要求图像采用特定格式才能获得良好效果。首先，我们使用以下函数将风格图像转换为张量：\n\
  \n```python\ndef image_to_tensor_style(path_to_img):\n    img = tf.io.read_file(path_to_img)\n\
  \    img = tf.image.decode_image(img, channels=3, dtype=tf.float32)\n    img = tf.image.resize(img,\
  \ [256, 256])\n    img = img[tf.newaxis, :]\n    return img\n```\n\n该函数通过调用 `read_file`\
  \ 方法读取图像数据。它通过调用 `decode_image` 将图像解码为三个 RGB 通道。图像被调整为 `256x256`，因为预训练模型使用此特定尺寸进行风格化。最后，图像数据以形状为\
  \ `(1, 256, 256, 3)` 的张量形式返回给调用者。我们为图像添加了一个新维度，稍后在处理一批图像时会用到。\n\n同样，我们编写一个函数将目标图像转换为张量，如下所示：\n\
  \n\n\n```python\ndef image_to_tensor_target(path_to_img, image_size):\n    img =\
  \ tf.io.read_file(path_to_img)\n    img = tf.image.decode_image(img, channels=3,\
  \ dtype=tf.float32)\n    img = tf.image.resize(img, [image_size, image_size], preserve_aspect_ratio=True)\n\
  \    img = img[tf.newaxis, :]\n    return img\n```\n\n该函数除了图像路径外，还接受一个额外的参数，即用户自定义的图像尺寸。大图像在处理过程中会占用大量内存，因此我添加了一个参数，以便你可以在保持图像宽高比的同时缩小图像尺寸。请注意图像缩放方法调用中的\
  \ `preserve_aspect_ratio` 参数。当你之前加载的目标图像被缩放到 400 时，输出张量的形状将为 `(1, 1200, 1600, 3)`。注意，宽高比得以保留。宽高比是图像宽度与高度的比值。如果你将宽度设置为\
  \ 400，高度将根据此宽高比按比例增加或减少。\n\n现在，你将通过调用之前定义的两个方法将两张图像转换为张量：\n\n```python\noutput_image_size\
  \ = 400\ntarget_image = image_to_tensor_target(target_path, output_image_size)\n\
  style_image = image_to_tensor_style(style_path)\n```\n\n## 执行风格迁移\n\n要将新样式应用于目标图像，你需要从\
  \ `tfhub` 加载预训练模块。使用以下语句完成此操作：\n\n```python\nhub_module = hub.load('https://tfhub.dev/google/magenta/arbitrary-image-stylization-v1-256/2')\n\
  ```\n\n模块名称为 `arbitrary-image-stylization-v1-256/2`。加载模块后，只需将两个张量作为输入传递给模块即可执行转换，如下所示：\n\
  \n```python\noutputs = hub_module(tf.constant(target_image), tf.constant(style_image))\n\
  stylized_image = outputs[0]\n```\n\n`outputs` 是一个形状为 `(1, 300, 400, 3)` 的张量。这是转换后图像的数据。请注意尺寸\
  \ 300x400，它是原始图像尺寸 1600x1200 的缩小版本。\n\n## 显示输出\n\n要显示图像，我们需要使用以下代码将张量转换为图像格式：\n\n\
  ```python\ntensor = stylized_image * 256\ntensor = np.array(tensor, dtype=np.uint8)\n\
  tensor = tensor[0]\nPIL.Image.fromarray(tensor)\n```\n\n我们需要将图像数据乘以 256 的缩放比例，因为\
  \ `stylized_image` 包含的数据范围是 0 到 1。输出图像如图 12-3 所示。\n\n![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig3_HTML.jpg](img/495303_1_En_12_Fig3_HTML.jpg)\n\
  \n**图 12-3** 风格化图像\n\n如果你想显示缩小的图像，如图 12-4 所示，只需按如下方式调用 `imshow` 方法：\n\n![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig4_HTML.jpg](img/495303_1_En_12_Fig4_HTML.jpg)\n\
  \n**图 12-4** 缩小的风格化图像\n\n```python\nplt.imshow(tensor)\n```\n\n## 更多结果\n\n我对项目中加载的图像进行了更多转换。结果如表\
