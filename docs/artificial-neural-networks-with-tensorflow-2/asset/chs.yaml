  \    # 原图\n    plt.subplot(3, 10, i + 1 + 20)\n    plt.imshow(x_test[i].reshape(256,\
  \ 256, 3))\n    plt.axis('off')\n\nplt.tight_layout()\nplt.show()\n\n!wget https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch14/mountain.jpg\n\
  img = imread(\"mountain.jpg\")\nplt.imshow(img)\nimg = resize(img, (IMG_HEIGHT,\
  \ IMG_WIDTH), mode='constant', preserve_range=True)\nimg = img.astype('float32')\
  \ / 255.\ntest_image = rgb2lab(img)[:,:,0]\ntest_image = test_image.reshape((1,)\
