  \n### 估算器类型\n\n估算器分为两类：\n\n*   预置估算器\n*   自定义估算器\n\n这种分类可以在图 6-3 所示的图表中直观地看到。\n\n\
  ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig3_HTML.jpg](img/495303_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\n估算器分类\n\n预置估算器就像一个盒子里的模型，其模型功能已由 TensorFlow 团队编写好。另一方面，在自定义估算器中，你需要提供这种模型功能。在这两种情况下，你创建的估算器对象都将具有用于训练、评估和预测的通用接口。两者都可以以类似的方式导出用于服务。\n\
  \nTensorFlow 库提供了一些预置估算器供你立即使用；如果这些不能满足你的目的，和/或你想迁移现有模型以获得估算器的优势，你将创建自己的估算器类。所有估算器都是\
  \ `tf.estimator.Estimator` 基类的子类。\n\n`DNNClassifier`、`LinearClassifier` 和 `LinearRegressor`\
  \ 是预置估算器的几个例子。`DNNClassifier` 用于创建基于密集神经网络的分类模型，而 `LinearRegressor` 用于处理线性回归问题。你将在本章后续部分学习如何使用这两个类。\n\
