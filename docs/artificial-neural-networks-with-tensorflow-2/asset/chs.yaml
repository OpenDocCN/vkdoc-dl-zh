  \n### 模型 5\n\n`BatchNormalization` 的工作方式与常规归一化相同，区别在于它作用于数据批次。前一层的激活在每个批次上进行处理，以保持平均激活值接近\
  \ 0，标准差接近 1。因此，它减少了训练步数，从而加快了训练过程。在某些情况下，它还可能消除前一个模型中使用 dropout 的需求。\n\n正则化是一种通过在训练集上适当拟合函数以减少误差，从而避免过拟合的技术。\n\
  \n我们将在新的模型定义中应用这些技术。\n\n模型定义如下代码所示：\n\n```python\nweight_decay = 1e-4\nmodel_5 =\
  \ Sequential([\nConv2D(32, (3, 3), activation = 'relu', padding = 'same',\nkernel_regularizer\
  \ = tf.keras.regularizers.l2(weight_decay),\ninput_shape = (32, 32, 3)),\nBatchNormalization(),\n\
  Conv2D(32, (3, 3), activation = 'relu', kernel_regularizer =\ntf.keras.regularizers.l2(weight_decay),\
  \ padding = 'same'),\nBatchNormalization(),\nMaxPooling2D((2, 2)),\nDropout(0.2),\n\
  Conv2D(64, (3, 3), activation = 'relu', kernel_regularizer =\ntf.keras.regularizers.l2(weight_decay),\
  \ padding = 'same'),\nBatchNormalization(),\nConv2D(64, (3, 3), activation = 'relu',\
  \ kernel_regularizer =\ntf.keras.regularizers.l2(weight_decay), padding = 'same'),\n\
  BatchNormalization(),\nMaxPooling2D((2, 2)),\nDropout(0.3),\nConv2D(128, (3, 3),\
  \ activation = 'relu', kernel_regularizer =\ntf.keras.regularizers.l2(weight_decay),\
  \ padding = 'same'),\nBatchNormalization(),\nConv2D(128, (3, 3), activation = 'relu',\
  \ kernel_regularizer =\ntf.keras.regularizers.l2(weight_decay), padding = 'same'),\n\
  BatchNormalization(),\nMaxPooling2D((2, 2)),\nDropout(0.3),\nFlatten(),\nDense(128,\
  \ activation = 'relu'),\nDense(10, activation = 'softmax')\n])\nopt = tf.keras.optimizers.SGD(lr\
  \ = 0.001, momentum = 0.9)\nmodel_5.compile(optimizer = opt, loss = 'categorical_crossentropy',\n\
  metrics = ['accuracy'])\n```\n\n模型摘要如下：\n\n\n\n```\nModel: \"sequential_4\"\n_______________________________________________________________\n\
