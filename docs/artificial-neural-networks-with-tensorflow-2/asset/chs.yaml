- '# 前言


  随着深度学习的近期进展和 TensorFlow 日益增长的普及，您可以看到机器学习模型在多个领域产生了巨大影响。对于开发者来说，这提供了一个绝佳的机会，可以将他们的技能应用于跨广泛领域的实际项目中。了解当今行业中的可用技术成为一项重要的资产。本书旨在为您提供基于深度神经网络（DNN）和最新版本
  TensorFlow 的广泛实际应用。它全面涵盖了各种深度学习架构。本书完全以项目为导向，包含约 25 个完整实现的真实项目。


  第 1 章从 TensorFlow 2 的介绍开始，描述了为什么它被认为是一个完整的机器学习平台。它描述了 TensorFlow 的各种新增功能，例如 `tf.keras`
  集成、即时执行、分布式训练、在边缘设备上的部署以及数据管道的使用。最后，它为设置本书中运行项目的开发环境提供了指导。


  第 2 章深入探讨 TensorFlow 2。按照惯例，我们从一种简单的“Hello World”类应用程序开始，向您介绍完整的机器学习开发周期。然后，本章处理一个二分类问题，这是任何机器学习课程开始时教授的典型应用。在这里，您将了解数据预处理、使用
  `tf.keras` API 定义密集神经网络、训练模型，以及使用 TensorBoard 指标和传统混淆矩阵评估其性能。该项目不仅涉及分类，还教您如何在运行时将数据加载到开发环境中、如何预处理数据、如何开发机器学习模型，以及最后如何使用
  TensorBoard 分析和其他传统技术评估模型性能。


  第 3 章深入探讨 `tf.keras` 模块。它向您介绍了用于模型构建的函数式 API。它讨论了 TensorFlow 中的面向对象，并展示了如何为您的模型创建类层次结构，以及如何通过子类化创建自定义层。您将学习如何使用
  TensorFlow 的新 `SavedModel` 接口保存模型，以及保存部分或完整模型的几种方法。然后，您将使用 `tf.keras` 中预定义的卷积神经网络（CNN）层进行一个多类分类项目。同样，与传统的教学方式不同，我将向您展示如何尝试不同的网络架构以优化模型性能。


  由于使用多个 CNN 层训练深度神经网络非常消耗资源，在第 4 章中，我将向您展示如何利用他人的训练成果。本章涉及迁移学习，即利用领域专家的知识和他人模型开发的努力，几乎毫不费力地为您所用。本章包含两个项目。第一个项目向您展示如何使用预训练的
  `ImageNet` 分类器对您自己的图像集进行分类。第二个项目向您展示如何基于预训练模型构建您自己的分类器。


  任何机器学习训练都从分类和回归问题开始。在前面的章节中，我们深入探讨了分类。问题来了：我们能否将深度神经网络用于回归分析，而我们已经有了几种成功的基于统计的技术可供使用？在第
  5 章中，我将借助三种不同的密集神经网络架构，向您展示如何使用 DNN 进行回归。


  尽管使用预训练模型简化了您的自定义模型开发，但在许多情况下，您找不到适合您目的的预训练模型。从头开始开发模型需要大量的管道工作；在这些情况下，TensorFlow
  中的 Estimator 可以为您提供帮助。第 6 章涉及 Estimator。它包含四个项目。前两个项目描述了如何使用预定义的 Estimator 进行分类，然后进行回归。第三个项目讨论了如何从头开始创建自定义
  Estimator，最后一个项目讨论了为预训练模型创建自定义 Estimator。


  第 7 章讨论了文本生成技术。它描述了用于文本生成的传统 RNN（循环神经网络）和 LSTM（长短期记忆）技术，并向您展示如何使用 LSTM 进行一个简单的应用程序——生成婴儿名字。本章的下一个项目使用一些先进的文本生成技术来创建与托尔斯泰著名小说语言风格相匹配的文本。由于训练文本生成模型是一个非常漫长的过程，我将展示一些执行此类长时间训练的技术，向您展示如何在中断的训练（可能是有意或无意的中断）后继续训练。


  第 8 章将带您进一步了解文本生成，其中我描述了 seq2seq 模型、编码器/解码器架构，以及最近用于语言翻译的注意力模型。本章深入介绍了使用 GloVe 词嵌入的英译西翻译器。它向您展示了如何使用编码器、解码器和注意力层定义您自己的机器学习模型。


  第 9 章描述了用于文本生成的最先进技术。它描述了用于自然语言处理的最新基于 Transformer 的架构。一个完整的深入项目将教您如何在 Python 中自行构建
  Transformer 模型，而不是完全依赖像 BERT（来自 Transformer 的双向编码器表示）这样的预训练模型。




  在文本生成之后，本书将带你进入图像处理领域。第 10 章将教你如何处理图像，并利用你在第 7 章和第 8 章学到的 `LSTM` 架构为图像生成描述。本章涉及一个图像描述的实际项目。该项目使用预训练模型
  `InceptionV3` 进行图像处理。这是你在第 4 章学到的迁移学习的又一个实际应用。它向你展示了如何使用 Bahdanau 注意力机制创建解码器。最后，你将使用此模型为从网络获取的任何图像生成描述。


  第 11 章将带你进入机器学习的另一个领域，即时间序列分析与预测。本章提供了两个完整的项目——一个用于单变量时间序列预测，另一个用于多变量时间序列预测。


  第 12 章涉及机器学习的另一个方面，即可以将著名画家的风格应用到你自己用相机拍摄的照片上，使其看起来像那位著名画家的画作。我们称之为风格迁移。本章包含两个项目。第一个项目向你展示如何使用
  `TensorFlow` 模型库中的预训练模型快速执行风格迁移。通过这样做，你将理解什么是风格迁移。下一个项目将带你更深入地了解这项技术，你将使用预定义的 `VGG16`
  架构来提取图像和一幅名画的特征。然后，你将学习如何定义一个评估器，在风格迁移过程中比较内容和风格损失，以创建最终的风格化图片。


  第 13 章涉及另一个重要的 `DNN` 架构，称为 `GAN`（生成对抗网络）。它总共包含三个项目。第一个项目很简单，向你展示如何使用 `GAN` 生成手写数字图像。第二个项目则进一步带你生成手写字母。最后一个项目最终带你进入
  `GANs` 最先进的用途，即生成复杂的动漫彩色角色图像。


  第 14 章教你一项重要的图像处理技术，即如何为黑白图像着色。你使用 `AutoEncoder` 为图像着色。本章描述了两个项目。第一个项目向你展示如何构建你自己的
  `AutoEncoder`。第二个项目使用预训练的 `VGG16` 模型进行编码，以提高模型性能。


  本书详尽地收集了几种深度神经网络架构，并着重强调了它们在实际场景中的实用价值。那么，开始吧！


