  #### 打乱数据


  现场收集的数据可能会按照数据收集者的便利性和舒适度以特定顺序排列。为了获得更好的机器学习效果，你应该对数据进行随机化处理，这样学习过程就不会遵循数据中不期望的模式。因此，我们使用以下语句打乱数据：


  ```

  data=shuffle(data)

  ```


  #### 检查数据


  你可以通过打印 `data` 数据帧的内容来验证数据是否正确加载。我没有通过调用 `data.head()` 来打印前几行，而是打印了整个数据集，以便你了解其中的记录数和列数。如图
  2-12 所示。


  ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig12_HTML.jpg](img/495303_1_En_2_Fig12_HTML.jpg)


  图 2-12


  数据集


  数据库中有 10,000 行和 14 列。以下是各个字段的简要说明：


  *   `RowNumber` – 从 1 到 10,000 的编号。

  *   `CustomerId` – 客户的唯一标识。

  *   `Surname` – 客户的姓氏。

  *   `CreditScore` – 客户的信用评分。

  *   `Geography` – 客户所在国家。

  *   `Gender` – 男性或女性。

  *   `Age` – 客户年龄。

  *   `Tenure` – 客户与该银行合作的时间长度。

  *   `Balance` – 客户的银行余额。

  *   `NumOfProducts` – 客户当前使用的银行产品数量。

  *   `HasCrCard` – 客户是否持有信用卡？

  *   `IsActiveMember` – 客户当前是否活跃？

  *   `EstimatedSalary` – 客户当前的预估薪资。

  *   `Exited` – 值为 1 表示客户已离开该银行。


  现在，既然你已经将数据加载到内存中，下一步任务是在将其输入到我们的网络之前对其进行清洗。我们称之为数据预处理，接下来将讨论这一点。


  ### 数据预处理


  原始的实时数据可能并不总是满足神经网络（ANN）的训练要求。具体来说，你需要检查数据并针对以下项目进行处理：


  *   数据可能包含空值。

  *   数据库中的所有字段可能并非都对学习有用。

  *   数值字段的值可能存在较大差异，因此必须将其缩放到同一水平。

  *   某些字段可能包含分类值，例如男性和女性；这些需要编码为 0 和 1。

  *   最后，你需要决定哪些字段用作特征，以及标签是什么。


  那么，让我们开始处理数据。


  #### 检查空值


  如果数据包含空值，将严重影响网络训练。检查空值最简单的方法是调用 `isnull` 函数。这通过以下程序语句完成：


  ```

  data.isnull().sum()

  ```


  上述语句的输出结果如下：


  ```

  RowNumber          0

  CustomerId         0

  Surname            0

  CreditScore        0

  Geography          0

  Gender             0

  Age                0

  Tenure             0

  Balance            0

  NumOfProducts      0

  HasCrCard          0

  IsActiveMember     0

  EstimatedSalary    0

  Exited             0

  dtype: int64

  ```


  对空值计算总和会生成错误。很明显，我们的数据集不包含任何空值。因此，不存在从数据集中删除行（包含空字段的行）的问题。


  接下来是选择机器学习字段的主要任务。


  #### 选择特征和标签


  并非数据库中的所有字段都对训练算法有用。例如，`CustomerId` 和 `Surname` 等字段对我们的机器学习没有任何意义。因此，我们需要删除这些列。这通过以下语句完成：


  ```

  X = data.drop(labels=[''CustomerId'', ''Surname'', ''RowNumber'', ''Exited''], axis
  = 1)

  ```


  请注意，我们从数据集中删除了四个字段。`X` 是一个新数组，包含与我们的模型构建相关的字段。


  客户是否离开银行标志着我们模型的输出。因此，`Exited` 字段成为我们模型构建的标签。这通过以下语句提取到变量 `y` 中：


  ```

  y = data[''Exited'']

  ```


  至此，你已经准备好了特征（`X`）和标签（`y`）张量。


  #### 编码分类列


  你必须检查所选列中是否有任何列包含分类值。为此，我们将使用以下语句检查所有选定列的数据类型：


  ```

  X.dtypes

  ```


  上述语句的输出如下所示：


  ```

  CreditScore          int64

  Geography           object

  Gender              object

  Age                  int64

  Tenure               int64

  Balance            float64

  NumOfProducts        int64

  HasCrCard            int64

  IsActiveMember       int64

  EstimatedSalary    float64

  Dtype: object

  ```


  请注意，`Geography` 和 `Gender` 是对象类型。你可以通过打印特征张量的前五行来检查它们包含的值，如图 2-13 所示。


  ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig13_HTML.jpg](img/495303_1_En_2_Fig13_HTML.jpg)


  图 2-13


  特征向量的前五行


  `Gender` 取两个分类值：Male 和 Female，而 `Geography` 有三个分类值：Germany、Spain 和 France。在将其输入网络之前，你需要将这些值转换为数值。编码通过使用
  sklearn 预处理模块中的 `LabelEncoder` 完成。如下代码片段所示：


  ```

  from sklearn.preprocessing import LabelEncoder

  label = LabelEncoder()

  X[''Geography''] = label.fit_transform(X[''Geography''])

  X[''Gender''] = label.fit_transform(X[''Gender''])

  ```


  独热编码为分类列创建虚拟变量。由于 `Geography` 列有三个不同的值，它将创建三个变量——每个国家一个。因此，我们的训练数据集中将有三个与国家相关的特征。特征过多会增加训练时间。为了减少特征数量，你可以排除与国家字段相关的一个虚拟变量，同时仍能达到相同的结果。我们通过调用
  `get_dummies` 方法来删除第一个变量：


  ```

  X = pd.get_dummies(X, drop_first=True, columns=[''Geography''])

  ```


  如果你此时通过打印前五行来检查数据，你会注意到 `Geography` 只有两列——`Geography_1` 和 `Geography_2`。


  在将数据输入网络之前，我们还需要做一件事，就是将所有的数值缩放到 -1 到 1 的范围内。




  ### 缩放数值


  由于真实数据中的特征可能具有很宽的数据值范围，如果我们将所有这些数据点标准化到同一尺度，机器学习的效果会更好。理想情况下，为了使机器学习获得更好的结果，每列的平均值应为
  0，标准差应为 1。因此，我们使用以下方程对所有数据点进行变换：


  ```

  z = (x - mu) / s

  ```


  其中 `mu` 是平均值，`s` 是标准差。这种标准化通过使用 `sklearn` 的 `StandardScaler` 函数来执行，如下代码片段所示：


  ```

  from sklearn.preprocessing import StandardScaler

  scaler = StandardScaler()

  X = scaler.fit_transform(X)

  ```


  至此，我们的数据预处理工作已完成。我们现在准备定义并训练模型。在训练模型时，我们还需要验证训练过程。如果训练结果不符合我们的预期，我们将需要进一步预处理数据——例如调整特征数量等。为了进行测试，我们将保留一部分数据。因此，我们将整个预处理后的数据分割开——大部分用于训练，小部分用于测试训练好的模型。


  ### 创建训练集和测试集


  为了将数据分成两部分，我们使用 `sklearn` 的 `train_test_split` 方法，如下面的程序语句所示：


  ```

  #### 将数据集分割为训练集和测试集

  from sklearn.model_selection import train_test_split

  X_train, X_test, y_train, y_test = train_test_split(X, y, test_size = 0.3)

  ```


  `test_size` 参数决定了应保留多少百分比的数据用于测试。该函数返回一组用于训练和测试的向量。


  很多时候，验证集和测试集这两个术语会被混用。为了避免混淆，我在此给出这些术语被广泛接受的明确定义：


  *   **训练集** – 用于模型拟合的那部分数据。

  *   **验证集** – 在训练期间用于调整超参数的那部分数据。

  *   **测试集** – 在模型训练后用于评估其性能的那部分数据。


  现在，是时候定义我们的网络了。


  ### 定义人工神经网络


  预处理后，我们的数据集中有 11 个特征。特征的数量通过以下语句计算训练数据集的形状来确定：


  ```

  X_train.shape[1]

  ```


  网络的预期输出是一个二进制值，指示客户离开银行的可能性。目标值在 `y_train` 向量中指定。


  你将创建一个四层深度学习网络模型。在第一层，你将使用 128 个节点，第二层有 64 个，第三层有 32 个，第四层是一个单一的输出节点。为了创建网络，你使用
  `tf.keras` API，这是 TensorFlow 中的一个新标准。你使用 `Sequential` API 来创建层的线性堆叠。你使用以下语句实例化模型：


  ```

  model = keras.models.Sequential()

  ```


  你使用以下语句将包含 128 个节点的第一层添加到堆叠中：


  ```

  model.add(keras.layers.Dense(128, activation = ''relu'',

  input_dim = X_train.shape[1]))

  ```


  该层的输入维度在参数 `input_dim` 中设置，该参数是由 `X_train` 向量的形状定义的特征数量。我们使用 ReLU（修正线性单元）作为激活函数。激活函数用于根据节点的加权和来决定该节点是否被激活。ReLU
  是使用最广泛的激活函数，它对负输入输出 0，否则输出 1。


  同样，你使用以下语句将第二层添加到网络中：


  ```

  model.add(keras.layers.Dense(64, activation = ''relu''))

  ```


  该层的输入来自前一层，因此无需指定输入向量的维度。使用以下语句添加第三层：


  ```

  model.add(keras.layers.Dense(32, activation = ''relu''))

  ```


  最后，使用以下语句添加网络中的最后一层：


  ```

  model.add(keras.layers.Dense(1, activation = ''sigmoid''))

  ```


  我们在这里使用 sigmoid 作为激活函数，因为这一层输出的是二进制值。sigmoid 函数是一种激活函数，也称为挤压函数。挤压函数将输出限制在 0 到 1
  之间，使其适用于预测概率。


  你通过调用 `summary` 函数来打印网络摘要，如下所示：


  ```

  model.summary()

  ```


  屏幕上打印的摘要如下所示：


  ```

  Model: "sequential"

  _______________________________________________________________

  Layer (type)                 Output Shape              Param #

  ===============================================================

  dense (Dense)                (None, 128)               1536

  _______________________________________________________________

  dense_1 (Dense)              (None, 64)                8256

  _______________________________________________________________

  dense_2 (Dense)              (None, 32)                2080

  _______________________________________________________________

  dense_3 (Dense)              (None, 1)                 33

  ===============================================================

  Total params: 11,905

  Trainable params: 11,905

  Non-trainable params: 0

  _______________________________________________________________

  ```


  ### 编译模型


  在模型架构定义之后，需要对其进行编译。要编译模型，你调用模型的 `compile` 方法：


  ```

  model.compile(loss = ''binary_crossentropy'',

  optimizer=''adam'', metrics=[''accuracy''])

  ```


  由于我们正在开发的模型是一个二元分类器，我们使用 `binary_crossentropy` 作为损失函数。我们在训练模型时使用 `Adam` 优化器，因为它最适合这种情况。在训练之后，如果你对模型的性能不满意，你可以尝试其他优化器。通过为
  `metrics` 参数指定值，可以收集准确率指标用于分析。


  我还将向你展示如何使用 TensorBoard 来分析网络性能。为此，我们需要定义一个回调函数，该函数将在训练期间的每个 epoch 被调用。我们将把日志收集在
  `log` 文件夹中。要清除之前的日志，我们使用以下操作：


  ```

  !rm -rf ./log/

  ```


  你使用以下代码片段定义回调函数：


  ```

  #tensorboard 可视化

  import datetime, os

  logdir = os.path.join("log",

  datetime.datetime.now().strftime("%Y%m%d-%H%M%S"))

  tensorboard_callback = tf.keras.callbacks.TensorBoard(logdir,

  histogram_freq = 1)

  ```


  完成训练分析的设置和模型的编译后，我们现在可以开始训练了。


  ### 模型训练


  要训练模型，你在模型实例上使用 `fit` 方法：


  ```

  r = model.fit(X_train, y_train, batch_size = 32, epochs = 50,

  validation_data = (X_test, y_test),

  callbacks = [tensorboard_callback])

  ```


  `fit` 函数的第一个参数定义了特征向量，第二个参数定义了标签。`batch_size` 参数顾名思义定义了训练的批次大小。`epochs` 参数决定了训练期间将执行多少次迭代。我们在数据预处理期间生成的测试数据用于模型验证，并通过
  `validation_data` 参数传递给 `fit` 函数。最后，`callbacks` 参数指定了每次迭代结束时将调用哪个回调函数。训练期间的部分输出如图
  2-14 所示。


  ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig14_HTML.jpg](img/495303_1_En_2_Fig14_HTML.jpg)


  图 2-14


  训练期间的程序输出


  训练结束后，你可以使用收集到的指标来评估模型是否训练到了你期望的准确率。




  ### 性能评估


  为了评估性能，我们将在 Colab 环境中使用 `%tensorboard` 魔术命令启动 TensorBoard。在此之前，我们需要使用 `%load_ext`
  魔术命令加载 tensorboard。


  ```

  %load_ext tensorboard

  %tensorboard --logdir log #在 colab 上启动 tensorboard 的命令

  ```


  运行此魔术命令会启动 TensorBoard，你将在屏幕上看到准确率和损失指标的图表。准确率和损失指标的图表如图 2-15 所示。


  ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig15_HTML.jpg](img/495303_1_En_2_Fig15_HTML.jpg)


  图 2-15


  TensorBoard 中的准确率和损失指标


  这里显示的两条曲线分别绘制在训练数据和验证数据上。检查准确率和损失指标有助于你判断模型是否表现良好。这些图表基本上展示了模型在每个 epoch 的准确率和损失。如果准确率在每个
  epoch 都在提升，说明你的训练方向是正确的。同样，损失应该在每个 epoch 持续降低。这些图表可以轻松检测出过拟合等问题。如果你对性能不满意，可以调整模型参数并重新训练以提高准确率。你可以尝试不同的优化器和/或引入正则化来提升模型准确率。


  你还可以通过调用 `evaluate` 方法，并将测试特征和标签向量作为参数传递，来评估模型在测试数据上的性能。评估模型的程序语句及其输出如下所示：


  ```

  test_scores = model.evaluate(X_test, y_test)

  print(''Test Loss: '', test_scores[0])

  print(''Test accuracy: '', test_scores[1] * 100)

  Test Loss:  0.6143370634714762

  Test accuracy:  83.96666646003723

  ```


  测试数据上的准确率约为 83%，这表明模型能够正确分类 83% 的给定数据点。


  我还将向你展示如何使用 matplotlib（一种传统的性能评估方式）在验证数据上绘制性能图表。使用以下代码片段即可实现：


  ```

  %matplotlib inline

  import matplotlib.pyplot as plt #用于绘制曲线

  plt.plot(r.history[''val_accuracy''], label="val_acc")

  plt.plot(r.history[''val_loss''], label="val_loss")

  plt.legend()

  plt.show()

  ```


  由 matplotlib 生成的图表如图 2-16 所示。


