  \n## 创建数据集\n\n创建数据集的代码与你在上一章（第 8 章）中开发的代码相同。我在此仅提供代码供你快速参考。\n\n```\n### 读取数据\nwith\
  \ open('/content/spa.txt',encoding='utf-8', errors='ignore') as file:\n    text=file.read().split('\\\
  n')\ninput_texts=[] #编码器输入\ntarget_texts=[] #解码器输入\n\n#### 我们将选择整个数据的一个子集\nNUM_SAMPLES\
  \ = 10000\nfor line in text[:NUM_SAMPLES]:\n    english, spanish  = line.split('\\\
  t')[:2]\n    target_text = spanish.lower()\n    input_texts.append(english.lower())\n\
  \    target_texts.append(target_text)\n```\n\n与之前的情况一样，我们将只使用整个语料库的一个子集。我们将只使用完整语料库中的\
  \ 10,000 个样本。\n\n### 数据预处理\n\n我们使用以下代码从数据中移除标点符号：\n\n```\nregex = re.compile('[%s]'\
  \ %re.escape(string.punctuation))\nfor s in input_texts:\n    regex.sub('', s)\n\
  for s in target_texts:\n    regex.sub('', s)\n```\n\n现在，你已经准备好进行分词和填充数据了。\n\n###\
  \ 分词数据\n\n在此应用中，我们将使用 `SubWordTextEncoder` 类在我们的数据语料库上创建分词器。分词器将文本映射到一个 ID。如果指定的文本不在字典中，它会将其拆分为子词。\n\
  \n首先，我们将为我们的输入数据集（英文）构建一个分词器。\n\n```\ntokenizer_input = tfds.features.text.SubwordTextEncoder.build_from_corpus(\n\
  \    input_texts, target_vocab_size=2**13)\n```\n\n第二个参数 `target_vocab_size` 中指定的值是一个任意大的值。\n\
  \n为了测试分词器，你可以尝试向其输入一个字符串。例如，在以下代码段中，我们对字符串进行编码：\n\n```\n#### 示例展示此分词器如何工作\ntokenized_string1=tokenizer_input.encode('hello\
  \ i am good')\ntokenized_string1\n```\n\n输出如下：\n\n```\n[2269, 1, 41, 89]\n```\n\n\
  你可以以表格格式打印相同内容，以便更好地查看映射关系。\n\n```\nfor token in tokenized_string1:\n    print ('{}\
  \ ----> {}'.format(token, tokenizer_input.decode([token])))\n```\n\n输出为：\n\n```\n\
  2269 ----> hello\n1 ----> i\n41 ----> am\n89 ----> good\n```\n\n如你所见，每个单词都在字典中，并映射到一个唯一的\
  \ ID。现在，让我们尝试输入一些可能不在字典中的内容。\n\n\n\n### 如果单词不在词典中\n\n`tokenized_string2 = tokenizer_input.encode('how\
  \ is the moon')`\n```\nfor token in tokenized_string2:\n    print('{} ----> {}'.format(token,\
  \ tokenizer_input.decode([token])))\n```\n\n输出结果为\n\n```\n64 ----> how\n4 ---->\
  \ is\n21 ----> the\n2827 ----> m\n2829 ----> o\n75 ----> on\n```\n\n观察未知单词 `moon`\
  \ 是如何被拆分为已知单词的。\n\n同样地，为西班牙语文本创建一个映射，这是我们翻译的目标语言。\n\n```\ntokenizer_out = tfds.features.text.SubwordTextEncoder.build_from_corpus(\n\
  \    target_texts, target_vocab_size=2**13)\n```\n\n现在，为输入和输出添加起始标签和结束标签的标记。\n\n\
  ```\nSTART_TOKEN_in = [tokenizer_input.vocab_size]  # 输入起始标记\nEND_TOKEN_in = [tokenizer_input.vocab_size\
  \ + 1]  # 输入结束标记\nSTART_TOKEN_out = [tokenizer_out.vocab_size]  # 输出起始标记\nEND_TOKEN_out\
  \ = [tokenizer_out.vocab_size + 1]  # 输出结束标记\n```\n\n你可以使用以下语句查看它们的 ID：\n\n```\n\
  START_TOKEN_in, END_TOKEN_in, START_TOKEN_out, END_TOKEN_out\n```\n\n输出结果为\n\n```\n\
  ([2974], [2975], [5737], [5738])\n```\n\n现在，我们将编写一个函数，用于对两个数据集进行分词和填充。我们将标记的最大长度设为\
  \ 10。\n\n```\nMAX_LENGTH = 10\n\n#### 对句子进行分词、过滤和填充\ndef tokenize_and_padding(inputs,\
  \ outputs):\n    tokenized_inputs, tokenized_outputs = [], []\n    for (input_sentence,\
  \ output_sentence) in zip(inputs, outputs):\n        # 对句子进行分词\n        input_sentence\
  \ = START_TOKEN_in + tokenizer_input.encode(input_sentence) + END_TOKEN_in\n   \
  \     output_sentence = START_TOKEN_out + tokenizer_out.encode(output_sentence)\
  \ + END_TOKEN_out\n\n        # 检查分词后句子的最大长度\n        # if len(input_sentence) <=\
  \ MAX_LENGTH and len(output_sentence) <= MAX_LENGTH:\n        tokenized_inputs.append(input_sentence)\n\
  \        tokenized_outputs.append(output_sentence)\n\n    # 对分词后的句子进行填充\n    tokenized_inputs\
  \ = tf.keras.preprocessing.sequence.pad_sequences(\n        tokenized_inputs, maxlen=MAX_LENGTH,\
  \ padding='post')\n    tokenized_outputs = tf.keras.preprocessing.sequence.pad_sequences(\n\
  \        tokenized_outputs, maxlen=MAX_LENGTH, padding='post')\n    return tokenized_inputs,\
  \ tokenized_outputs\n\nenglish, spanish = tokenize_and_padding(input_texts, target_texts)\n\
  ```\n\n你可以通过打印其中一个元素来检查此函数的结果。\n\n```\nenglish[1], spanish[1]\n```\n\n输出结果为\n\n\
  ```\n(array([2974,   50, 2764, 2975,   0,   0,   0,   0,   0,   0], dtype=int32),\n\
  \ array([5737, 1017, 5527, 5738,   0,   0,   0,   0,   0,   0], dtype=int32))\n\
  ```\n\n可以看到每个句子都被填充到了十个元素。另外，请注意索引为 1 的英语句子是 \"go.\"，其中单词 `go` 映射为 50，句点映射为 2764。2974\
  \ 是我们的起始标记，2975 是我们的结束标记。\n\n### 准备训练数据集\n\n现在我们将准备训练数据集。为了创建输入管道，我们将使用 `tf.data.Dataset`，并利用缓存和预取等功能来加速处理过程。训练过程中使用了教师强制（teacher\
  \ forcing）。以下代码用于准备数据集：\n\n```\nBATCH_SIZE = 32\nBUFFER_SIZE = 10000\n\n### 解码器输入使用前一个目标作为输入\n\
  ```\n\n\n```python\n### 从目标数据中移除 START_TOKEN\ndataset = tf.data.Dataset.from_tensor_slices((\n\
  {\n'inputs': english,\n'decoder_inputs': spanish[:, :-1]\n},\n{\n'outputs':spanish[:,\
  \ 1:]\n},\n))\ndataset = dataset.cache()\ndataset = dataset.shuffle(BUFFER_SIZE)\n\
  dataset = dataset.batch(BATCH_SIZE)\ndataset = dataset.prefetch(tf.data.experimental.AUTOTUNE)\n\
  ```\n\n对数据集进行预取操作，可以在数据预处理和模型执行之间创建重叠。当模型正在执行第 `n` 步训练时，输入管道会同时读取第 `n+1` 步的数据。这能显著提升整体训练速度。\n\
  \n### Transformer 模型\n\n在解释 Transformer 模型的实现时，我将采用自上而下的方法。该模型由多个组件构成，显然，在组件未创建之前无法构建整个模型。但为了更好地理解模型的构建方式，我会先概述其主要组件，再深入讲解每个组件的细节及其实现。项目代码主要基于\
  \ TensorFlow 作者发布的 Transformer 聊天机器人实现，该实现遵循 Apache 2.0 许可证。毋庸置疑，代码编写精良、结构清晰，几乎无需任何改进。因此，我直接沿用了其中部分实现。\n\
  \n现在，让我们来看图 9-2 所示的 Transformer 架构总览图。\n\n![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig2_HTML.jpg](img/495303_1_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2** Transformer 的详细架构\n\n如图所示，该模型包含编码器、解码器和多头注意力模块。整个架构的核心就是多头注意力。我将先讨论其构建过程，然后依次讲解编码器和解码器的构建。最后，我会展示如何训练并使用该\
  \ Transformer 模型进行推理——即通过比以往 seq2seq 语言翻译模型更强大的自然语言理解能力，将英语转换为西班牙语。\n\n## 多头注意力\n\
  \n多头注意力是本项目的核心。它在 Transformer 架构的多个位置被使用，并作为网络层包含在 Transformer 网络的定义中。因此，我们将为其编写一个类，该类继承自\
  \ Keras 的 Layer 类（`tf.keras.layers.Layer`）。这个类的实例（即一个 Keras 层）将被嵌入到编码器和解码器网络的适当位置。多头注意力的示意图组件如图\
  \ 9-3 所示。\n\n![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig3_HTML.jpg](img/495303_1_En_9_Fig3_HTML.jpg)\n\
  \n**图 9-3** 多头注意力架构\n\n在此示意图中，一个显著特点是使用了多个头来处理 Q（查询）、K（键）和 V（值）向量。这三个向量被分割成多个头，并通过线性（全连接）层处理。这使得模型能够并发处理输入句子中的多个单词，从而促进分布式训练。每个头都应用了缩放点积注意力。根据该多头注意力是用于编码器还是解码器，我们会在注意力步骤中应用相应的掩码。两种掩码类型将在后文解释。三个头的注意力输出通过\
  \ `tf.transpose` 和 `tf.reshape` 进行拼接，然后通过一个全连接层生成最终的注意力向量。\n\n虽然示意图看起来实现起来可能很复杂，但实际上并不太难。架构图显示了五个主要组件（层），编号为\
  \ 1 到 5。我将给出多头注意力类的完整实现，然后解释这些层 1 到 5 在类定义中的位置。以下是清单 9-1 中的类定义。\n\n```python\nclass\
  \ MultiHeadAttention(tf.keras.layers.Layer):\n    def __init__(self, d_model, num_heads,\
  \ name=\"multi_head_attention\"):\n        super(MultiHeadAttention, self).__init__(name=name)\n\
  \        self.num_heads = num_heads\n        self.d_model = d_model\n        self.depth\
  \ = d_model // self.num_heads\n        self.query_dense = tf.keras.layers.Dense(units=d_model)\n\
  \        self.key_dense = tf.keras.layers.Dense(units=d_model)\n        self.value_dense\
  \ = tf.keras.layers.Dense(units=d_model)\n        self.dense = tf.keras.layers.Dense(units=d_model)\n\
  \n    def split_heads(self, inputs, batch_size):\n        inputs = tf.reshape(inputs,\
  \ shape=(batch_size, -1, self.num_heads, self.depth))\n        return tf.transpose(inputs,\
  \ perm=[0, 2, 1, 3])\n\n    def call(self, inputs):\n        query, key, value,\
  \ mask = inputs['query'], inputs['key'], inputs['value'], inputs['mask']\n     \
  \   batch_size = tf.shape(query)[0]\n\n        # 线性层\n        query = self.query_dense(query)\n\
  \        key = self.key_dense(key)\n        value = self.value_dense(value)\n\n\
  \        # 分割头\n        query = self.split_heads(query, batch_size)\n        key\
  \ = self.split_heads(key, batch_size)\n        value = self.split_heads(value, batch_size)\n\
  \n        # 缩放点积注意力\n        scaled_attention = scaled_dot_product_attention(query,\
  \ key, value, mask)\n        scaled_attention = tf.transpose(scaled_attention, perm=[0,\
  \ 2, 1, 3])\n\n        # 拼接头\n        concat_attention = tf.reshape(scaled_attention,\
  \ (batch_size, -1, self.d_model))\n\n        # 最终线性层\n        outputs = self.dense(concat_attention)\n\
  \        return outputs\n```\n\n**清单 9-1** MultiHeadAttention 类定义\n\n`MultiHeadAttention`\
  \ 类继承自 Keras 的 Layer 类：\n\n```python\nclass MultiHeadAttention(tf.keras.layers.Layer):\n\
  ```\n\n在初始化（类构造函数）中，传入了一些参数，这些参数被存储在类变量中供后续使用。\n\n```python\ndef __init__(self,\
  \ d_model, num_heads, name=\"multi_head_attention\"):\n    super(MultiHeadAttention,\
  \ self).__init__(name=name)\n    self.num_heads = num_heads\n    self.d_model =\
  \ d_model\n    self.depth = d_model // self.num_heads\n```\n\n注意力网络的输入通过一个全连接线性层。请注意，该网络接收三个输入：V、K\
  \ 和 Q（参见图 9-3）。Q 是一个包含查询的矩阵，表示序列中一个单词的向量表示。K（键）是序列中所有单词的向量表示。V（值）也是序列中所有单词的向量表示。\n\
  \n这三个输入层定义如下：\n\n```python\nself.query_dense = tf.keras.layers.Dense(units=d_model)\n\
  self.key_dense = tf.keras.layers.Dense(units=d_model)\nself.value_dense = tf.keras.layers.Dense(units=d_model)\n\
  ```\n\n我们还声明了另一个全连接层，它将用于注意力模型的输出。\n\n```python\nself.dense = tf.keras.layers.Dense(units=d_model)\n\
  ```\n\n至此，类构造函数定义完成。\n\n现在，让我们定义一个将输入数据分割成多个头的方法。这允许你并发处理输入句子中的不同单词，并促进分布式训练。函数定义如下，它仅对数据进行重塑、转置若干列，然后将处理后的输入返回给调用者。\n\
  \n```python\ndef split_heads(self, inputs, batch_size):\n    inputs = tf.reshape(inputs,\
  \ shape=(batch_size, -1, self.num_heads, self.depth))\n    return tf.transpose(inputs,\
  \ perm=[0, 2, 1, 3])\n```\n\n接下来是构建整个网络的重要函数调用。我们首先分离出四个输入，如下所示：\n\n```python\n\
  def call(self, inputs):\n    query, key, value, mask = inputs['query'], inputs['key'],\
  \ inputs['value'], inputs['mask']\n    batch_size = tf.shape(query)[0]\n```\n\n\
  接着，我们为三个输入创建线性层，如下所示。这是图 9-3 中显示的第 1 部分。\n\n\n### 线性层\n\n`query = self.query_dense(query)`\n\
  `key = self.key_dense(key)`\n`value = self.value_dense(value)`\n\n我们使用 `split_heads`\
  \ 函数对输入进行拆分。这是图 9-3 中所示的第二部分。\n\n```\n### 拆分注意力头\nquery = self.split_heads(query,\
  \ batch_size)\nkey = self.split_heads(key, batch_size)\nvalue = self.split_heads(value,\
  \ batch_size)\n```\n\n接下来，我们计算缩放点积注意力，如图 9-3 中的第三部分所示。\n\n```\n### 缩放点积注意力\nscaled_attention\
  \ = scaled_dot_product_attention(query, key, value, mask)\nscaled_attention = tf.transpose(scaled_attention,\
  \ perm=[0, 2, 1, 3])\n```\n\n稍等！我们还没有定义这个函数。正如我所说，我将采用自上而下的方法来解释代码。因此，在完成这个多头类的定义后，我会立即定义并解释这个函数。\n\
  \n现在，我们使用以下语句将所有注意力头拼接起来。这是图 9-3 中的第四部分。\n\n```\n### 拼接注意力头\nconcat_attention =\
  \ tf.reshape(scaled_attention, (batch_size, -1, self.d_model))\n```\n\n最后，我们定义输出密集层——图\
  \ 9-3 中的第五部分。\n\n```\noutputs = self.dense(concat_attention)\n```\n\n然后将输出返回给调用者。现在，我将定义用于计算缩放点积注意力的函数。\n\
  \n## 缩放点积注意力函数\n\nTransformer 使用的缩放点积注意力函数接收三个输入：Q（查询）、K（键）、V（值）。计算注意力的公式为\n\n![$$\
  \ Attention\\left(Q,K,V\\right)={softmax}_k\\left(\\frac{QK^T}{\\sqrt{d_k}}\\right)V\
  \ $$](img/495303_1_En_9_Chapter_TeX_Equa.png)\n\n首先，我们计算 *QK*^(*T*)。\n\n```\nQxK_transpose\
  \ = tf.matmul(query, key, transpose_b=True)\n```\n\n接下来，我们计算表达式 *QK*^(*T*) 除以 ![$$\
  \ \\sqrt{d_k} $$](img/495303_1_En_9_Chapter_TeX_IEq1.png) 的结果。\n\n```\ndepth = tf.cast(tf.shape(key)[-1],\
  \ tf.float32)\nlogits = QxK_transpose / tf.math.sqrt(depth)\n```\n\n如果指定了掩码，我们将其加上以屏蔽填充标记。\n\
  \n```\nif mask is not None:\n    logits += (mask * -1e9)\n```\n\n为什么将掩码乘以一个很大的负值？这是因为\
  \ softmax 的很大负输入在输出中接近于零。\n\n我们对结果应用 softmax：\n\n```\nattention_weights = tf.nn.softmax(logits,\
  \ axis=-1)\n```\n\n最后，我们通过将注意力权重与 V 输入向量进行矩阵乘法来计算输出。\n\n```\noutput = tf.matmul(attention_weights,\
  \ value)\n```\n\n然后将输出返回给调用者。\n\n```\nreturn output\n```\n\n完整的函数代码如代码清单 9-2 所示。\n\
  \n```\ndef scaled_dot_product_attention(query, key, value, mask):\n    QxK_transpose\
  \ = tf.matmul(query, key, transpose_b=True)\n    depth = tf.cast(tf.shape(key)[-1],\
  \ tf.float32)\n    logits = QxK_transpose / tf.math.sqrt(depth)\n    if mask is\
  \ not None:\n        logits += (mask * -1e9)\n\n    # softmax 在最后一个轴（seq_len_k）上归一化\n\
  \    attention_weights = tf.nn.softmax(logits, axis=-1)\n    output = tf.matmul(attention_weights,\
  \ value)\n    return output\n```\n\n*代码清单 9-2*  \n*缩放点积注意力函数*\n\n在定义了 Transformer\
  \ 架构的主要组件之后，现在让我们定义编码器和解码器。首先，我将展示编码器是如何构建的，然后是解码器。\n\n## 编码器架构\n\n编码器架构如图 9-4 所示。\n\
  \n![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig4_HTML.jpg](img/495303_1_En_9_Fig4_HTML.jpg)\n\
  \n*图 9-4*  \n*编码器架构*\n\n如图 9-4 所示，编码器由一个单一的 Keras 层或块（我们称之为编码器层）组成，该层重复 N 次。而编码器层本身又由几个层组成，包括我们之前定义的多头注意力和一个带有归一化的前馈网络。编码器接收的输入包括输入句子嵌入以及定义句子中单词相对位置的位置编码。在定义编码器层之前，我将定义两个辅助函数，用于位置编码和屏蔽一批序列中的所有填充标记。\n\
  \n首先，我将介绍掩码函数。\n\n## 掩码函数\n\n当你向网络输入填充序列时，网络可能会将这些额外的标记（零）视为输入。例如，我们的第一个英文句子 \"\
  go.\" 编码如下：\n\n```\n(array([2974,  50, 2764, 2975,   0,   0,   0,   0,   0,   0],\
  \ dtype=int32),\n```\n\n该序列包含开始和结束标记，这对我们来说没问题。然而，我们不希望模型将所有尾随零视为有效输入。因此，我们编写一个掩码函数来屏蔽所有我们添加的额外填充。\n\
  \n```\ndef create_padding_mask(x):\n    mask = tf.cast(tf.math.equal(x, 0), tf.float32)\n\
  ```\n\n\n\n### (batch_size, 1, 1, sequence length)\n返回 `mask[:, tf.newaxis, tf.newaxis,\
  \ :]`\n\n你可以在上述有效序列上测试该函数：\n\n```\nx=tf.constant([[2974,   50, 2764, 2975,    0,\
  \    0,\n0,    0,    0,    0]])\ncreate_padding_mask(x)\n```\n\n输出结果如下：\n\n```\n\
  你可以清晰地看到，所有填充的零现在都被标记为 1，\n而其余字符则被标记为 0。\n同样，我们编写另一个填充函数来遮蔽序列中的未来\n标记。前瞻掩码用于遮蔽序列中的未来\n\
  标记。换句话说，掩码指示哪些条目\n不应被使用。这意味着，为了预测第三个词，只有\n第一个和第二个词会被使用。类似地，为了预测第四个\n词，只有第一、第二和第三个词会被使用，以此类推。\n\
  ```\n\n我们定义的前瞻掩码函数如下：\n\n```\ndef create_look_ahead_mask(x):\nseq_len = tf.shape(x)[1]\n\
  look_ahead_mask = 1 - tf.linalg.band_part\n(tf.ones((seq_len, seq_len)), -1, 0)\n\
  padding_mask = create_padding_mask(x)\nreturn tf.maximum(look_ahead_mask, padding_mask)\n\
  ```\n\n我们将把这些辅助函数用作 `tf.keras.layers.Lambda` 层。接下来，我们将为位置编码做好准备。\n\n## PositionalEncoding\
  \ 类\n\n与你上一章使用的 seq2seq 模型类似，Transformer 模型并不通过 LSTM 来拥有记忆。因此，为了提供给定句子中单词相对位置的信息，我们向网络输入一个名为位置编码的额外输入。然后，位置编码和嵌入这两个向量会一起被送入网络。嵌入将具有相似含义的标记（单词）聚集在一起，但它们并不指定（编码）单词在句子中的相对位置。因此，将两者相加，可以根据单词含义的相似性及其在句子中的位置，使单词更紧密地聚集在一起。这发生在整个\
  \ d 维空间中。\n\n位置编码的计算公式如下：\n\n![$$ {PE}_{\\left( pos,2i\\right)}=\\mathit{\\sin}\\\
  left( pos/{10000}^{2i/{d}_{model}}\\right) $$](img/495303_1_En_9_Chapter_TeX_Equb.png)\n\
  \n![$$ {PE}_{\\left( pos,2i+1\\right)}=\\mathit{\\cos}\\left( pos/{10000}^{2i/{d}_{model}}\\\
  right) $$](img/495303_1_En_9_Chapter_TeX_Equc.png)\n\n该公式的证明（[`https://arxiv.org/pdf/1706.03762.pdf`](https://arxiv.org/pdf/1706.03762.pdf)）超出了本书的范围。该公式的实现很简单，可以在下面给出的类定义中看到：\n\
  \n```\nclass PositionalEncoding(tf.keras.layers.Layer):\ndef __init__(self, position,\
  \ d_model):\nsuper(PositionalEncoding, self).__init__()\nself.pos_encoding = self.positional_encoding\n\
  (position, d_model)\ndef get_angles(self, position, i, d_model):\nangles = 1 / tf.pow(10000,\
  \ (2 * (i // 2)) /\ntf.cast(d_model, tf.float32))\nreturn position * angles\ndef\
  \ positional_encoding(self, position, d_model):\nangle_rads = self.get_angles(\n\
  position=tf.range(position, dtype=tf.float32)\n[:, tf.newaxis],\ni=tf.range(d_model,\
  \ dtype=tf.float32)\n[tf.newaxis, :],\nd_model=d_model)\n### 对数组中的偶数索引应用正弦函数\nsines\
  \ = tf.math.sin(angle_rads[:, 0::2])\n### 对数组中的奇数索引应用余弦函数\ncosines = tf.math.cos(angle_rads[:,\
  \ 1::2])\npos_encoding = tf.concat([sines, cosines],\naxis=-1)\npos_encoding = pos_encoding[tf.newaxis,\
  \ ...]\nreturn tf.cast(pos_encoding, tf.float32)\ndef call(self, inputs):\nreturn\
  \ inputs + self.pos_encoding\n[:, :tf.shape(inputs)[1], :]\n```\n\n定义好辅助函数后，现在让我们继续定义编码器层，它在编码器中会重复多次。\n\
  \n## 编码器层\n\n如图 9-4 的编码器示意图所示，重复 N 次的编码器层包含以下部分：\n\n1.  多头注意力（带填充掩码）\n2.  两个全连接层，后接\
  \ dropout\n\n每个部分还将包含一个归一化层，用于处理深度神经网络中的梯度消失问题。\n\n在下面的编码器层定义中，可以很容易地观察到这种网络结构：\n\
  \n```\ndef encoder_layer(units, d_model, num_heads, dropout,\nname=\"encoder_layer\"\
  ):\ninputs = tf.keras.Input(shape=(None, d_model),\nname=\"inputs\")\npadding_mask\
  \ = tf.keras.Input(shape=(1, 1, None),\nname=\"padding_mask\")\n### 带填充掩码的多头注意力\n\
  attention = MultiHeadAttention(\nd_model, num_heads, name=\"attention\")({\n'query':\
  \ inputs,\n'key': inputs,\n'value': inputs,\n'mask': padding_mask\n})\nattention\
  \ = tf.keras.layers.Dropout\n(rate=dropout)(attention)\nattention = tf.keras.layers.LayerNormalization(\n\
  epsilon=1e-6)(inputs + attention)\n### 两个全连接层，后接 dropout\noutputs = tf.keras.layers.Dense(units=units,\n\
  activation='relu')(attention)\noutputs = tf.keras.layers.Dense(units=d_model)\n\
  (outputs)\noutputs = tf.keras.layers.Dropout(rate=dropout)\n(outputs)\noutputs =\
  \ tf.keras.layers.LayerNormalization(\nepsilon=1e-6)(attention + outputs)\nreturn\
  \ tf.keras.Model(\ninputs=[inputs, padding_mask],\noutputs=outputs, name=name)\n\
  ```\n\n有了这个设置，我们现在就可以定义编码器本身了。\n\n### 编码器\n\n正如你目前所看到的，编码器将包含以下组件：\n\n1.  给定句子的输入嵌入\n\
  2.  给定句子中单词相对位置的位置编码\n3.  重复的编码器层\n\n重复编码器层的数量由你决定。在我们的项目中，我们将使用两次重复。第一个编码器层的输入是输入嵌入和位置编码之和。第二个编码器层的输出，即编码器的最终输出，将成为解码器的输入。\n\
  \n```\ndef encoder(vocab_size,\nnum_layers,\nunits,\nd_model,\nnum_heads,\ndropout,\n\
  name=\"encoder\"):\ninputs = tf.keras.Input(shape=(None,),\nname=\"inputs\")\n###\
  \ 创建填充掩码\npadding_mask = tf.keras.Input(shape=(1, 1, None),\nname=\"padding_mask\"\
  )\n### 创建词嵌入 + 位置编码的组合\nembeddings = tf.keras.layers.Embedding\n(vocab_size, d_model)(inputs)\n\
  embeddings *= tf.math.sqrt(tf.cast\n(d_model, tf.float32))\nembeddings = PositionalEncoding\n\
  (vocab_size, d_model)(embeddings)\noutputs = tf.keras.layers.Dropout(rate=dropout)\n\
  (embeddings)\n### 重复编码器层两次\nfor i in range(num_layers):\noutputs = encoder_layer(\n\
  units=units,\nd_model=d_model,\nnum_heads=num_heads,\ndropout=dropout,\nname=\"\
  encoder_layer_{}\".format(i),\n)([outputs, padding_mask])\nreturn tf.keras.Model(\n\
  inputs=[inputs, padding_mask], outputs=outputs,\nname=name)\n```\n\n请注意，在两个嵌入层之间，我们共享相同的权重矩阵，只是在输入到\
  \ `PositionalEncoding` 之前，将这些权重乘以 `d_model` 的平方根。\n\n为了可视化编码器架构，你可以使用以下代码生成其模型图：\n\
  \n```\nsample_encoder = encoder(\nvocab_size=8192,\nnum_layers=5,\nunits=512,\n\
  d_model=128,\nnum_heads=4,\ndropout=0.3,\nname=\"sample_encoder\")\ntf.keras.utils.plot_model(\n\
  sample_encoder, to_file='encoder.png')\n```\n\n请注意，这里我重复了五次编码器层，仅用于演示目的。在实际项目中，我只重复了两次。编码器的网络图如图\
  \ 9-5 所示。\n\n![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig5_HTML.jpg](img/495303_1_En_9_Fig5_HTML.jpg)\n\
  \n**图 9-5** 编码器网络图\n\n请注意，输入是如何先进行词嵌入，然后与位置编码结合，再送入第一个编码器层的。编码器层本身重复了五次，每一层都对输入应用了填充掩码。编码器的输出将成为解码器的输入。虽然为了清晰起见，我将编码器层重复了五次，但在项目代码中，为了节省训练时间，只重复了两次。我们现在继续定义解码器。\n\
  \n\n\n"
