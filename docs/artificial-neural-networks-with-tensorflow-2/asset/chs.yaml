  \ = model.predict(vggpred)\nab = ab*128\ncur = np.zeros((224, 224, 3))\ncur[:,:,0]\
  \ = l\ncur[:,:,1:] = ab\nplt.subplot(1,2,1)\nplt.title(\"生成的图像\")\nplt.imshow( lab2rgb(cur))\n\
