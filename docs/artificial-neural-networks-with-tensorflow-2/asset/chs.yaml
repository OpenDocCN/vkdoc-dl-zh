  Dense(10, activation = 'softmax')\n])\nopt = tf.keras.optimizers.SGD(lr = 0.001,\
  \ momentum = 0.9)\nmodel_3.compile(optimizer = opt, loss = 'categorical_crossentropy',\n\
  metrics = ['accuracy'])\n```\n\n模型摘要如下：\n\n```\nModel: \"sequential_2\"\n_______________________________________________________________\n\
