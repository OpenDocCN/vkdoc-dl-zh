  start = time.time()

  for image_batch in dataset:

  gradient_tuning(image_batch)

  ### 在训练过程中生成图像

  generate_and_save_images(gen_model,

  epoch + 1,

  seed)

  ### 保存检查点数据

  checkpoint.save(file_prefix = checkpoint_prefix)

  print (''第 {} 轮耗时 {} 秒''.format

  (epoch + 1,

