  \ 中的每张图像，`y_train` 中都有一个 0 到 9 范围内的特定整数值。`y_train` 成为我们机器学习的标签。我们将使用 `x_train` 来训练模型，使用\
  \ `x_test` 来评估模型的性能。\n\n如果您好奇内存中加载了什么，可以尝试使用以下代码在控制台上打印其中一张图像：\n\n```python\nimport\
  \ matplotlib.pyplot as plt\nplt.imshow(x_train[40])\n```\n\n执行上述代码将显示索引值为 40 的图像。该图像如图\
  \ 3-11 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig11_HTML.jpg](img/495303_1_En_3_Fig11_HTML.jpg)\n\
  \n图 3-11：数据集中的示例图像\n\n很明显，这张 32x32 像素的图像几乎无法让您猜测它包含什么？但是，正如我所说，对于我们的机器学习算法来说，这种尺寸的图像足以用于训练。现在，我们将准备用于模型训练的训练数据集。\n\
  \n### 准备模型训练数据\n\n如前所述，我们将使用 `x_train` 来训练模型。您需要保留一部分数据用于训练阶段的验证。我们将保留 5% 的训练数据用于验证。\n\
  \n#### 创建验证数据集\n\n为了将训练数据拆分为实际的训练数据集和验证数据集，我们使用 `sklearn` 的拆分方法，如下面的代码段所示：\n\n```python\n\
  from sklearn.model_selection import train_test_split\nx_train, x_val, y_train, y_val\
  \ = train_test_split(x_train, y_train, test_size = 0.05, random_state = 0)\n```\n\
  \n在这里，我们保留 5% 的训练数据用于模型训练期间的验证。`x_val` 和 `y_val` 分别代表我们的特征和标签验证数据集。接下来，我们将对数据进行增强。\n\
  \n\n\n#### 数据增强\n\n在解释如何进行数据增强之前，先说明什么是数据增强以及它在机器学习中的必要性。数据增强是数据科学家用来增加模型训练期间可用数据多样性的策略。现场收集的原始数据可能表现出单一性，导致训练不完善。数据增强避免了为增加多样性而收集新数据的需要。常用的增强技术包括裁剪、填充和水平翻转。对于图像数据增强，Keras\
  \ 预处理模块提供了 `ImageDataGenerator` 类。你可以通过以下代码片段实例化该类：\n\n```\nfrom tensorflow.keras.preprocessing.image\
  \ import ImageDataGenerator\ndatagen = ImageDataGenerator(\nrotation_range=15,\n\
  width_shift_range=0.1,\nheight_shift_range=0.1,\nhorizontal_flip=True, )\n```\n\n\
  各个参数决定了在指定图像上执行的增强类型。如示例中的参数名称所示，图像可能会被旋转、平移甚至翻转，以在捕获的数据中获得所需的多样性。你将使用这个 `datagen`\
  \ 实例来增强训练数据。\n\n由于每个 RGB 值的范围在 0 到 255 之间，因此也需要将其缩放到 0 到 1 的范围内。为了进行缩放，我们定义缩放函数如下：\n\
  \n```\ndef normalize(data):\ndata = data.astype(\"float32\")\ndata = data/255.0\n\
  return data\n```\n\n现在，我们将使用以下代码片段对训练/测试数据进行增强和缩放：\n\n```\nx_train = normalize(x_train)\n\
  datagen.fit(x_train)\nx_val = normalize(x_val)\ndatagen.fit(x_val)\nx_test = normalize(x_test)\n\
  ```\n\n`normalize` 函数对训练数据和验证数据进行缩放。`ImageDataGenerator` 的 `fit` 方法对数据进行增强。我们仅对测试数据进行归一化，但不进行增强，因为我们需要在真实图像（而非增强后的图像）上获得测试结果。\n\
  \n作为数据处理的一部分，最后需要做的是调用 `to_categorical` 方法将整数值转换为矩阵。请注意，我们的标签列包含十个类别，分别对应不同的对象类型，例如鸟和汽车。为了转换这一列，我们使用\
  \ Keras 工具库中的 `to_categorical` 函数，如下所示：\n\n```\ny_train = tf.keras.utils.to_categorical(y_train,\
  \ 10)\ny_test = tf.keras.utils.to_categorical(y_test, 10)\ny_val = tf.keras.utils.to_categorical(y_val,\
  \ 10)\n```\n\n完成所有这些转换后，如果你想查看它们对图像的影响，只需使用下面给出的 `imshow` 函数在控制台上再次打印图像即可：\n\n```\n\
  plt.imshow(x_train[40])\n```\n\n生成的图像如图 3-12 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig12_HTML.jpg](img/495303_1_En_3_Fig12_HTML.jpg)\n\
  \n图 3-12\n\n索引为 40 的转换后图像\n\n现在，既然我们已经完成了数据预处理，让我们打印修改后数据的维度，以便了解预处理的最终结果。你可以使用以下代码片段打印维度：\n\
  \n```\nprint(\"x_train dimensions : \",x_train.shape)\nprint(\"y_train dimensions\
  \ : \",y_train.shape)\nprint(\"x_test dimensions  : \",x_test.shape)\nprint(\"y_test\
  \ dimensions  : \",y_test.shape)\nprint(\"x_val dimensions   : \",x_val.shape)\n\
