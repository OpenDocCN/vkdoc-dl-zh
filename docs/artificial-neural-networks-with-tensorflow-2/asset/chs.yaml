  \n图 3-7\n\n缩小后的图像 32x32 像素\n\n你仍然能辨认出图像中显示的是一只鸟。现在，我们来思考一个问题：既然你眼前有一张美丽的鸟图可供欣赏，为什么还要进行所有这些变换呢？如果我们的目标是让机器学会解释（分类）给定图像中的物体，我们真的需要向计算机输入如此高分辨率的图像吗？如果人类即使只看图像的简化版本也能做出预测，为什么我们不能让计算机在这些简化图像上学习图像识别的基础知识呢？这样做的原因是，高分辨率图像包含大量“比特”信息，而这些信息对于我们进行物体识别的目的来说是冗余的。向计算机输入大量“比特”信息会需要大量的内存和处理能力，而这两者在现实世界中都非常稀缺。因此，为了减少神经网络所需的训练时间并避免使用重型资源，我们将在数据集中使用简化图像。图\
  \ 3-8 展示了另一张汽车图片。原始图像大小为 200x200。即使在缩小到 32x32 的简化图像中，你仍然能辨认出这是一辆汽车。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig8_HTML.jpg](img/495303_1_En_3_Fig8_HTML.jpg)\n\
  \n图 3-8\n\n汽车图像及其变换\n\n关于图像分类，已有大量研究，人们成功设计了人工神经网络（ANN）架构以实现高精度。上述图像变换过程被称为卷积。由于本书主要侧重于在\
  \ TF2.x 中构建高性能网络，因此图像卷积的精确定义和解释超出了本书的范围。研究人员设计了称为卷积神经网络（CNN）的网络来解决图像分类和物体识别问题。CNN\
  \ 包含卷积层，其后是若干其他类型的层。一个包含两个卷积层的典型 CNN 架构如图 3-9 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig9_HTML.jpg](img/495303_1_En_3_Fig9_HTML.jpg)\n\
  \n图 3-9\n\nCNN 架构\n\n幸运的是，如前所述，`tf.keras` 提供了几个即用型层，包括卷积层、池化层、展平层等。你的任务现在是将这些层按正确的顺序和架构组装起来。这正是你将在下一节中学习的内容，届时你将创建\
  \ 5 种不同的 CNN 架构并评估它们的性能。\n\n## 使用 CNN 进行图像分类\n\n在本节中，你将学习如何将给定图像分类为已知类型之一。假设给你一张图像，要求你识别图像中显示的物体。对人类来说，这通常是一项简单的任务。但对于机器来说，解释图像并将其分类为已知物体类型并非易事。幸运的是，该领域已有大量研发成果，你拥有许多经过训练、即用型的机器学习模型，能够以很高的准确度正确识别给定图像中的物体。在本项目中，你将学习如何借助\
  \ `tf.keras` 提供的库，自行开发这样一个模型。那么，让我们开始这个项目吧。\n\n### 创建项目\n\n在 Colab 中打开一个新的 Python3\
  \ 笔记本，并将其命名为 `Ch3-imageClassifier`。使用以下代码加载并导入 TensorFlow 2.x：\n\n```\nimport tensorflow\
  \ as tf\n```\n\n海量数据是任何机器学习项目的首要需求。幸运的是，对于图像分类，已经有人付出了大量努力来收集和清洗图像，使其可以直接用于你的图像分类算法。你的任务现在只是开发一个模型，并不断优化它，使其能够以可接受的准确度检测给定图像中的物体。在我们深入研究模型开发之前，先看看有哪些数据集可供我们使用。\n\
  \n\n\n### 图像数据集\n\n本项目将使用的图像数据集由加拿大高等研究院（CIFAR）创建。该数据集向公众开放，旨在鼓励人们开发图像识别技术。CIFAR\
  \ 研究院的研究人员创建了两个数据集：CIFAR-10 和 CIFAR-100。这两个数据集均由 60000 张 32x32 像素的彩色图像组成。CIFAR-10\
  \ 图像分为 10 个类别，包含猫、鸟、船、飞机等类别。每个类别有 6000 张图像，并且这些图像经过适当随机化处理，适合用作机器学习数据集。请注意，在第 2\
  \ 章学习二元分类时，我们需要自行对数据进行随机化处理。CIFAR-10 数据集也适当地划分为训练集和测试集：训练集包含 50000 张图像，其余 10000\
  \ 张图像属于测试集。图 3-10 展示了一组示例图像及其类别，以便您快速了解所提供的图像数据。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig10_HTML.jpg](img/495303_1_En_3_Fig10_HTML.jpg)\n\
  \n图 3-10：CIFAR-10 示例图像\n\n请注意，所有图像都具有固定尺寸——32x32 像素。这是机器学习所必需的。您不能将不同尺寸的图像输入到机器学习算法中。神经网络的输入始终是预先确定的固定尺寸。分辨率可变的图像包含数量不等的像素，因此无法输入到预设拓扑结构的网络中。幸运的是，CIFAR\
  \ 数据集的创建者不辞辛劳地将所有真实图像缩小到固定的微型尺寸。请注意，如果您尝试使用真实世界中的图像（例如 512x512 像素或更大）来训练模型，那么人工神经网络所需的输入点（像素）数量将非常庞大。这直接意味着需要训练大量的“权重”，从而需要巨大的处理能力和时间。当图像缩小到\
  \ 32x32 像素时，显然会丢失数据；但是，您会发现，在这些精简后的图像上进行训练，仍然能产生出色的结果，并且在现实世界中识别未见过的对象时，也能获得非常可接受的结果。\n\
  \nCIFAR-100 数据集与 CIFAR-10 类似，不同之处在于它代表 100 个类别而非 10 个。每个类别进一步分为粗粒度和细粒度。例如，一个名为“人”的超类包含“婴儿”、“男孩”、“女孩”、“男人”和“女人”这些子类。\n\
  \n本项目将使用 CIFAR-10 数据集。那么，让我们开始将此数据集加载到程序中。\n\n## 加载数据集\n\n`tf.keras` 集成提供了几个内置数据库，方便您进行模型开发。这些数据库也包括\
  \ CIFAR-10。这些数据库位于 `tf.keras.dataset` 模块中。可以使用以下两行代码将可用数据集的列表打印到控制台：\n\n```python\n\
  import tensorflow_datasets as tfds\nprint (\"数据集数量: \", len(tfds.list_builders()))\n\
  tfds.list_builders()\n```\n\n以下是输出结果的部分列表，供您快速参考。\n\n```\n数据集数量: 141\n['abstract_reasoning',\n\
