    \n```\noutputs = layers.Dense(5)(x)\n```\n\n该层的输出是一个大小为 5 的张量。因此，我们期望网络在给定特定输入时输出五个值之一。\n\
    \n现在，可以使用这些输入和输出来定义模型，如下所示：\n\n```\nmodel = keras.Model(inputs=inputs, outputs=outputs,\n\
