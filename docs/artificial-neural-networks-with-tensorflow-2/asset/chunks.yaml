    by ![$$ \sqrt{d_k} $$](images/495303_1_En_9_Chapter/495303_1_En_9_Chapter_TeX_IEq1.png).


    ```

    depth = tf.cast(tf.shape(key)[-1], tf.float32)

    logits = QxK_transpose / tf.math.sqrt(depth)

    ```


