- fmt: '# Decoder Architecture


    The Decoder architecture is shown in Figure [9-6](#495303_1_En_9_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig6_HTML.jpg](images/495303_1_En_9_Chapter/495303_1_En_9_Fig6_HTML.jpg)


    Figure 9-6 Decoder architecture


    The input to the Decoder is the output of the Encoder. As in the case of the Encoder
    where we use repetitive Encoder Layers, a Decoder too consists of repetitive Decoder
    Layers. The first layer receives the input from the Encoder, and the last layer
    goes through the linear Dense network to the final Softmax layer which spits out
    the probabilities of the target words. The other inputs to the Decoder are the
    combination of output word embeddings and positional encoding. I will now describe
    the construction of the repetitive Decoder Layer.


    ## Decoder Layer


    As seen in Figure [9-6](#495303_1_En_9_Chapter.xhtml#Fig6), the Decoder Layer
    actually contains two Multi-Head Attentions:


    1. The Multi-Head Attention (`Attention_2`, as marked in Figure [9-6](#495303_1_En_9_Chapter.xhtml#Fig6))

    2. The Masked Multi-Head Attention (`Attention_1`, as marked in Figure [9-6](#495303_1_En_9_Chapter.xhtml#Fig6))


    The first Multi-Head Attention in the preceding list, `Attention_2`, is the one
    which receives its input from the Encoder. This input is the *Value* and *Key*
    vectors. The other input to this Multi-Head Attention comes from the output of
    the Masked Multi-Head Attention sublayer. The second Multi-Head Attention in the
    list (`Attention_1`), which we prefixed Masked, is the one which takes its input
    as the combination of the previous decoder state and the positional encoding.
    Both the layers use appropriate padding masks. The output of the Multi-Head Attention
    `Attention_2` passes through two Dense layers followed by dropout. This completes
    the structure of a Decoder Layer. This layer is multiplied N times in the Decoder
    implementation.


    The Decoder Layer is coded as follows:


    ```

    def decoder_layer(units, d_model, num_heads,

    dropout, name="decoder_layer"):

    inputs = tf.keras.Input(shape=

    (None, d_model), name="inputs")

    enc_outputs = tf.keras.Input(shape=(None, d_model),

    name="encoder_outputs")

    look_ahead_mask = tf.keras.Input(

    shape=(1, None, None), name="look_ahead_mask")

    padding_mask = tf.keras.Input(shape=(1, 1, None),

    name=''padding_mask'')

    attention1 = MultiHeadAttention(

    d_model, num_heads, name="attention_1")(inputs={

    ''query'': inputs,

    ''key'': inputs,

    ''value'': inputs,

    ''mask'': look_ahead_mask

    })

    attention1 = tf.keras.layers.LayerNormalization(

    epsilon=1e-6)(attention1 + inputs)

    attention2 = MultiHeadAttention(

    d_model, num_heads, name="attention_2")(inputs={

    ''query'': attention1,

    ''key'': enc_outputs,

    ''value'': enc_outputs,

    ''mask'': padding_mask

    })

    attention2 = tf.keras.layers.Dropout

    (rate=dropout)(attention2)

    attention2 = tf.keras.layers.LayerNormalization(

    epsilon=1e-6)(attention2 + attention1)

    outputs = tf.keras.layers.Dense(units=units,

    activation=''relu'')(attention2)

    outputs = tf.keras.layers.Dense(units=d_model)

    (outputs)

    outputs = tf.keras.layers.Dropout(rate=dropout)

    (outputs)

    outputs = tf.keras.layers.LayerNormalization(

    epsilon=1e-6)(outputs + attention2)

    return tf.keras.Model(

    inputs=[inputs, enc_outputs, look_ahead_mask,

    padding_mask],

    outputs=outputs,

    name=name)

    ```


    Here `Attention_1` is our Masked Multi-Head Attention defined as item 2 in the
    preceding list and `Attention_2` is the item 1 defined in the list. The output
    of `Attention_2` goes through two Dense blocks followed by dropout.


    You can visualize the network architecture of the decoder layer by executing the
    following code:


    ```

    sample_decoder_layer = decoder_layer(

    units=512,

    d_model=128,

    num_heads=4,

    dropout=0.3,

    name="sample_decoder_layer")

    tf.keras.utils.plot_model(

    sample_decoder_layer,

    to_file=''decoder_layer.png'')

    ```


    The output which is the architecture of the Decoder Layer is shown in Figure [9-7](#495303_1_En_9_Chapter.xhtml#Fig7).


    ![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig7_HTML.jpg](images/495303_1_En_9_Chapter/495303_1_En_9_Fig7_HTML.jpg)


    Figure 9-7 Decoder layer network plot


    Note the position of two Multi-Head Attentions, their inputs, and outputs. Next,
    I will define the Decoder block.


    ## Decoder


    As in the case of the Encoder, the Decoder network is constructed by multiplying
    the Decoder Layers N times. We have already seen the various inputs to the Decoder.
    The Decoder output goes to a linear layer and softmax classification.


    The Decoder is defined as follows:


    ```

    def decoder(vocab_size,

    num_layers,

    units,

    d_model,

    num_heads,

    dropout,

    name=''decoder''):

    inputs = tf.keras.Input(shape=(None,),

    name=''inputs'')

    enc_outputs = tf.keras.Input(shape=(None, d_model),

    name=''encoder_outputs'')

    look_ahead_mask = tf.keras.Input(

    shape=(1, None, None), name="look_ahead_mask")

    padding_mask = tf.keras.Input(shape=(1, 1, None),

    name=''padding_mask'')

    embeddings = tf.keras.layers.Embedding

    (vocab_size, d_model)(inputs)

    embeddings *= tf.math.sqrt(tf.cast

    (d_model, tf.float32))

    embeddings = PositionalEncoding

    (vocab_size, d_model)(embeddings)

    outputs = tf.keras.layers.Dropout(rate=dropout)

    (embeddings)

    for i in range(num_layers):

    outputs = decoder_layer(

    units=units,

    d_model=d_model,

    num_heads=num_heads,

    dropout=dropout,

    name=''decoder_layer_{}''.format(i),

    )(inputs=[outputs, enc_outputs, look_ahead_mask,

    padding_mask])

    return tf.keras.Model(

    inputs=[inputs, enc_outputs, look_ahead_mask,

    padding_mask],

    outputs=outputs,

    name=name)

    ```


    A sample decoder can be constructed using the following code:


    ```

    sample_decoder = decoder(

    vocab_size=8192,

    num_layers=2,

    units=512,

    d_model=128,

    num_heads=4,

    dropout=0.3,

    name="sample_decoder")

    tf.keras.utils.plot_model(

    sample_decoder, to_file=''decoder.png'')

    ```


    The plot generated by this code is given in Figure [9-8](#495303_1_En_9_Chapter.xhtml#Fig8).


    ![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig8_HTML.jpg](images/495303_1_En_9_Chapter/495303_1_En_9_Fig8_HTML.jpg)


    Figure 9-8 Decoder network plot


    Finally comes our ultimate goal, and that is to define the Transformer.


    ## Transformer Model


    The Transformer consists of the encoder, the decoder, and a final linear layer.
    The output of the decoder is the input to the linear layer.


    The Transformer is defined as follows:


    ```

    def transformer(input_vocab_size,

    target_vocab_size,

    num_layers,

    units,

    d_model,

    num_heads,

    dropout,

    name="transformer"):

    inputs = tf.keras.Input(shape=(None,),

    name="inputs")

    dec_inputs = tf.keras.Input(shape=(None,),

    name="decoder_inputs")

    enc_padding_mask = tf.keras.layers.Lambda(

    create_padding_mask, output_shape=(1, 1, None),

    name=''enc_padding_mask'')(inputs)

    # mask the future tokens for decoder inputs at the 1st attention block

    look_ahead_mask = tf.keras.layers.Lambda(

    create_look_ahead_mask,

    output_shape=(1, None, None),

    name=''look_ahead_mask'')(dec_inputs)

    # mask the encoder outputs for the 2nd attention block

    dec_padding_mask = tf.keras.layers.Lambda(

    create_padding_mask, output_shape=(1, 1, None),

    name=''dec_padding_mask'')(inputs)

    enc_outputs = encoder(

    vocab_size=input_vocab_size,

    num_layers=num_layers,

    units=units,

    d_model=d_model,

    num_heads=num_heads,

    dropout=dropout,

    )(inputs=[inputs, enc_padding_mask])

    dec_outputs = decoder(

    vocab_size=target_vocab_size,

    num_layers=num_layers,

    units=units,

    d_model=d_model,

    num_heads=num_heads,

    dropout=dropout,

    )(inputs=[dec_inputs, enc_outputs, look_ahead_mask,

    dec_padding_mask])

    outputs = tf.keras.layers.Dense(units=target_vocab_size,

    name="outputs")(dec_outputs)

    return tf.keras.Model(inputs=[inputs, dec_inputs],

    outputs=outputs, name=name)

    ```


    You can see the network architecture by running the following code:


    ```

    sample_transformer = transformer(

    input_vocab_size = 100,

    target_vocab_size = 100,

    num_layers=4,

    units=512,

    d_model=128,

    num_heads=4,

    dropout=0.3,

    name="sample_transformer")

    tf.keras.utils.plot_model(

    sample_transformer, to_file=''transformer.png'')

    ```'
