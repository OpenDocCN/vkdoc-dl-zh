- fmt: '### Update Gate


    The update gate is highlighted in Figure [7-6](#495303_1_En_7_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig6_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Update gate


    Here, the old cell state `C[t-1]` is multiplied by `f[t]` and `i[t] * C[t]` is
    added to it to update the old cell state to a new cell state ![$$ {\overset{\sim
    }{C}}_t $$](images/495303_1_En_7_Chapter/495303_1_En_7_Chapter_TeX_IEq2.png).
    Mathematically, this is expressed as


    ![$$ {C}_t={f}_t\ast {C}_t+{i}_t\ast {\overset{\sim }{C}}_t $$](images/495303_1_En_7_Chapter/495303_1_En_7_Chapter_TeX_Equd.png)


    ### Output Gate


    The output gate is highlighted in Figure [7-7](#495303_1_En_7_Chapter.xhtml#Fig7).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig7_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Output gate


    First, the sigmoid layer decides which part of the cell state we are going to
    keep. Then we feed the cell state through a `tanh` activation function and multiply
    it from the output of the sigmoid gate to get the final output. Mathematically,
    this is expressed as


    ![$$ {o}_t=\sigma \left({W}_o\left[{h}_{t-1,}{x}_t\right]+{b}_o\right) $$](images/495303_1_En_7_Chapter/495303_1_En_7_Chapter_TeX_Eque.png)


    ![$$ {h}_t={o}_t\ast \mathit{\tanh}\left({C}_t\right) $$](images/495303_1_En_7_Chapter/495303_1_En_7_Chapter_TeX_Equf.png)


    So, with this enhancement of RNN block, LSTM achieves a long short-term memory
    and overcomes the problem of vanishing gradients observed in simple RNN.


    With the ability of a long-term memory, LSTMs are widely used in many domains.
    In this chapter, I will focus on applications of LSTM for language models. When
    I say language models, there are again numerous applications, some of which are
    listed as follows:


    - Predict the next character or the word while typing

    - Word or sentence completion

    - Learn the syntactic and semantic meanings of a large chunk of text, for example,
    learn the style of Shakespeare and Agatha Christie and generate new stories in
    their styles

    - Neural Machine Translation


    After all these theories, I will now move forward to demonstrate to you the application
    of LSTMs in generating text.


    ## Text Generation


    A language sentence is a series of characters that convey a syntactic and semantic
    meaning to the reader. Every author also has their own style of writing. Our task
    in text generation is to create a new text that follows the author’s style of
    writing and also has syntactic and semantic meaning to the created text. For example,
    you may like to write a new novel based on Shakespeare’s writing style or create
    a legal document based on the previously judged legal cases, observing the legal
    style of writing such documents. You may even like to generate a computer source
    code in Python after understanding the syntax and the language structure from
    the other Python programs. The possibilities are endless. Most of these would
    require lots of processing in terms of resources and time. In the example that
    follows, I will show you how to generate baby names – a trivial example where
    text generation can be applied followed by a more realistic example of generating
    text based on a text from a well-known novel.


    Let me first describe some theory behind the text generation.


    ### Model Training


    As we want to predict at the character level, we divide the entire text into groups
    of characters called sequences. Consider the passage shown here taken from the
    text that is to be used for our training:


    > *“Investors so much about their startup hubs. As a lot of mind I don’t know
    the more airborning case of the European of the schedule, and from such sites
    …”*


    We will split this input into sequences of 25 characters each. This is illustrated
    in Figure [7-8](#495303_1_En_7_Chapter.xhtml#Fig8).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig8_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Slicing input text into sequences


    The first 25 characters would be grouped together in the order in which they occur
    to create the first sequence. This sequence is followed by the character `h`.
    Thus, we train the network saying that for this given sequence of characters,
    the next character should be `h`. Then, we move the window by one character to
    the right, and for the new sequence, we tell the model that the next character
    for this sequence is `e`. This is now followed by another shift in window where,
    as shown in the last sequence, the next character would be `i`. Likewise, we keep
    training the model for the entire corpus, telling it what would be the next character
    for any given sequence of 25 characters in the text. Now, you will appreciate
    why the simple DNN (deep neural network) cannot be used for such applications,
    as these applications require a long-term memory to memorize the sequences and
    the characters following them.


    Once the model is trained, hopefully it has learned the writing style, syntax,
    and semantics of the text. Obviously, the more the corpus that you feed, the better
    will be the understanding gained by the model. This is equivalent to the fact
    that after reading several novels written by Agatha Christie, a person starts
    understanding her style of writing. After the training is complete, how do we
    use the model to generate a new text in the style of what it has learned?


    ### Inference


    We follow the steps similar to what we did during training. We start with a seed
    consisting of a predefined sequence. Let us say we define a window size of 25
    characters like what we did during the training. The window size used for inference
    need not be the same as the one used during the training. Based on the given sequence
    of 25 characters, we ask the model to predict the 26th character. We store the
    prediction somewhere as part of the predicted text. We now shift the window to
    the right by one character, this time taking the predicted character as the last
    25th character in the new sequence. For this newly created sequence, we ask the
    model to predict the next character. The new prediction will now be added to the
    next sequence and so on. Likewise, we can ask the model to predict any number
    of characters following the given input seed. If the model has learned the sequences
    well enough, it would produce the meaningful text. I will show you the stepwise
    results during a long training in the large corpus example in this chapter.


    ### Model Definition


    The network model that we used for training will mainly consist of multiple LSTM
    layers as depicted in Figure [7-9](#495303_1_En_7_Chapter.xhtml#Fig9).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig9_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Neural network for text generation


    Each LSTM layer would consist of a large number of nodes. The more the number
    of nodes, the better would be the model’s ability to memorize in the long term.
    This however would mean the large number of weights to be trained. The model can
    learn the complex data well by making the network deep, that is, adding more number
    of LSTM layers. For each LSTM layer, the `return_sequences` parameter would be
    set to `True` because it connects its output to the next LSTM layer. For the last
    LSTM layer, this parameter would be set to `False` where the output is fed to
    a `Dense` layer for character classification based on the probability score of
    each possible character. We use `softmax` for this purpose.


    With all these theories covered, now let us move on to a practical example to
    have a better understanding of these theories. The application that I am going
    to describe next is to generate baby names given a set of known names.'
