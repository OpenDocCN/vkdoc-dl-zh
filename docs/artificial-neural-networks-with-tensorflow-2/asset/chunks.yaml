    \    self.dense4 = tf.keras.layers.Dense(10, activation=tf.nn.sigmoid)\n    if\
    \ self.use_dp:\n        self.dp = tf.keras.layers.Dropout(0.3)\n```\n\n在构造函数中，我们为构建网络时将使用的不同类型的层定义了变量。这里所有的层都是\
    \ `Dense` 类型——全连接层。第一层包含 12 个节点，第二层包含 24 个节点，第三层包含 4 个节点，最后一层包含 10 个节点。前三层使用 ReLU\
    \ 作为激活函数，而最后一层使用 sigmoid。我们还定义了一个 dropout 层，以防我们决定在上述任何 `Dense` 层上添加 dropout 层。dropout\
    \ 比例为 30%，如 dropout 参数值 0.3 所示。\n\n接下来，你定义在对象创建期间使用的 `call` 方法。下面代码段展示了一个典型的 `call`\
    \ 方法：\n\n```\ndef call(self, x):\n    x = self.dense1(x)\n    x = self.dense2(x)\n\
    \    if self.use_dp:\n        x = self.dp(x)\n    x = self.dense3(x)\n    if self.use_dp:\n\
    \        x = self.dp(x)\n    return self.dense4(x)\n```\n\n该网络由四层组成，每一层的输出成为下一层的输入。最后，我们返回\
    \ `dense4`，它给出了 10 个类别。第二层和第三层使用了 dropout。至此，我们完成了模型的子类化。接下来，我们将实例化这个模型。\n\n要在程序代码中实例化该模型，你可以使用以下程序语句：\n\
    \n```\nmodel = MyModel()\n```\n\n创建模型对象后，你可以调用其常规的 `compile` 方法，通过传递所需的参数集来编译它，如下代码所示：\n\
    \n```\nmodel.compile(loss = tf.losses.binary_crossentropy,\n              optimizer\
    \ = 'adam',\n              metrics = ['accuracy'])\n```\n\n通常，如果你喜欢面向对象编程，你会使用模型子类化。否则，没有特别的需要进行子类化，函数式\
    \ API 可以满足你创建复杂架构的所有需求。\n\n### 预定义层\n\n为了创建网络架构，`tf.keras` 提供了顺序 API，你可以不断向其添加网络层。有多个预定义层可供你直接使用。这个列表非常详尽。每个层都定义为一个类，你在代码中实例化该类并将其实例添加到你的模型中。以下是常用预定义层的部分列表：\n\
    \n*   `Dense` – 全连接层\n*   `Conv2D` – 二维卷积层\n*   `InputLayer` – 网络的入口点\n*   `LSTM`\
    \ – 长短期记忆层\n*   `RNN` – 自定义循环层的基类\n\n这个列表确实非常详尽，你会找到诸如 `Dropout`、`Flatten`、`LayerNormalization`、`Multiply`\
    \ 等类。除了这些预定义的类之外，你还可以定义自己的自定义层。\n"
- fmt: "### Custom Layers\n\nThe custom class inherits from `tf.keras.layers.Layer`.\
    \ You need to override four functions: `init`, `build`, `call`, and `compute_output_shape`.\
    \ A typical custom class definition is shown in the code below:\n\n```\nclass\
    \ MyLayer(tf.keras.layers.Layer):\n    def __init__(self, output_dim, **kwargs):\n\
    \        self.output_dim = output_dim\n        super(MyLayer, self).__init__(**kwargs)\n\
    \    def build(self, input_shape):\n        self.W = self.add_weight(name='kernel',\n\
    \                                 shape=(input_shape[1], self.output_dim),\n \
    \                                initializer='uniform',\n                    \
    \             trainable=True)\n        self.built = True\n    def call(self, x):\n\
    \        return tf.matmul(x, self.W)\n    def compute_output_shape(self, input_shape):\n\
    \        return (input_shape[0], self.output_dim)\n```\n\nIn the `init` method\
    \ we call the superclass constructor and also set the dimensions for our output.\
    \ In the `build` we set the initial weight matrix. The matrix shape is set with\
    \ the help of input parameter – `input_shape`. The weights are uniformly distributed\
    \ using the `initializer` parameter. And we set this matrix to trainable. In the\
    \ `call` method, we set whatever the operation that we want to do on the weight\
    \ matrix. In the current code, we do matrix multiplication of weights with the\
    \ input vector `x`. Finally, the `compute_output_shape` returns the output dimensions.\n\
    \nYou can now use this custom layer in any network configuration as illustrated\
    \ in the code segment below:\n\n```\nmodel = tf.keras.Sequential([\n    tf.keras.layers.Dense(256,\
    \ input_shape=(784,)),\n    tf.keras.layers.Dense(256, activation='relu'),\n \
    \   MyLayer(10),\n    tf.keras.layers.Dense(10, activation='softmax')\n])\n```\n\
    \nNote how the custom layer was added between two `Dense` layers. As a matter\
    \ of fact, you can add the custom layer at any desired position in your network.\
    \ The network plot for the above configuration is shown in Figure [3-4](#495303_1_En_3_Chapter.xhtml#Fig4).\n\
    \n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig4_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig4_HTML.jpg)\n\
    \n**Figure 3-4** Network containing a custom layer\n\nYou would now compile the\
    \ model using the usual `compile` function:\n\n```\nmodel.compile(optimizer='adam',\n\
    \              loss=tf.keras.losses.binary_crossentropy,\n              metrics=['accuracy'])\n\
    ```\n\nFinally, the model is trained by calling its `fit` method:\n\n```\nmodel.fit(x,\
    \ y1, batch_size=32, epochs=30)\n```\n\nThe entire project code for the custom\
    \ layers is available in the book’s download.\n\nCreating custom layers allows\
    \ you a great flexibility in designing sophisticated network architectures. Throughout\
    \ this book, you would be creating a wide variety of network topologies using\
    \ functional API.\n\n## Saving Models\n\nGenerally, after a model is fully trained,\
    \ you would save it to the disk for later deploying it to the production machine.\
    \ Not only this, but the models that you create in `tf.keras` can also be saved\
    \ any time during training. Using this saved model, you can resume training where\
    \ it left off in the first place. This will help in avoiding long training times\
    \ in one session. Also, you can share the saved model with others so that they\
    \ can recreate and continue further on your work. The `tf.keras` provides several\
    \ ways of saving your work, which are discussed next.\n\n### Whole-Model Saving\n\
    \nWhen you save the whole model, the following information will be saved:\n\n\
    *   The model’s architecture\n*   Weights\n*   Training configuration that you\
    \ passed to its `compile` method\n*   The optimizer and its state\n\nTo save the\
    \ model you would use the following code:\n\n```\nmodel.save('filename.h5')\n\
    ```\n\nTo recreate the model, you would use the following code:\n\n```\nnew_model\
    \ = keras.models.load_model('filename.h5')\n```\n\n#### Export to SavedModel Format\n\
    \nTensorFlow uses a standalone serialization format called SavedModel that can\
    \ be used by TensorFlow implementations other than Python. This format is also\
    \ supported by TensorFlow serving. To save the whole model to this format, you\
    \ would use the following code:\n\n```\nmodel.save('filename', save_format='tf')\n\
    ```\n\nTo load the saved model, you would use:\n\n```\nnew_model = keras.models.load_model('filename')\n\
    ```\n\n#### Saving Architecture\n\nIn some situations, you may be interested in\
    \ saving the model’s architecture and not its weight values or the optimizer state.\
    \ In such requirements, you call the `get_config` method to retrieve the model’s\
    \ configuration and use it later to recreate the model on the saved instance.\
    \ This is illustrated in the code segment below:\n\n```\n# Retrieve and save model\
    \ configuration\nconfig = model.get_config()\n# Recreate model\nmodel = keras.Model.from_config(config)\n\
    ```\n\nNote that when you recreate the model as shown in this statement, you will\
    \ lose all the previously learned information.\n\n#### Saving Weights\n\nIn some\
    \ situations, you may be interested in saving model’s training state and not its\
    \ architecture. In this situation, you would use `get_weights` and `set_weights`\
    \ method to save and retrieve the weights alone. This is illustrated in the code\
    \ below:\n\n```\n# Retrieving model's state\nweights = model.get_weights()\n#\
    \ Restoring state\nmodel.set_weights(weights)\n```\n\n**Note:** The custom layers\
    \ do not support `model.save()` and `model.get_config()` by default. You will\
    \ need to override `get_config()` to support custom layers. However, custom layers\
    \ support saving weights.\n\n#### Saving to JSON\n\nSometimes, you may want to\
    \ save the model to JSON format. You can do so using the following code fragment:\n\
    \n```\nfrom keras.models import model_from_json\n# serialize to JSON\njson_model\
    \ = model_1.to_json()\nwith open(\"model_1.json\", \"w\") as json_file:\n    json_file.write(json_model)\n\
    # load json and re-create model\nfrom keras.models import model_from_json\nfile\
    \ = open('model_1.json', 'r')\nbuffer = file.read()\nfile.close()\nmodel = tf.keras.models.model_from_json(buffer)\n\
    ```\n\nConsider the following model definition:\n\n```\nmodel_1 = tf.keras.Sequential([\n\
    \    Conv2D(32, (3, 3), activation='relu', padding='same', input_shape=(32, 32,\
    \ 3)),\n    Conv2D(32, (3, 3), activation='relu', padding='same'),\n    MaxPooling2D((2,\
    \ 2)),\n    Dense(128, activation='relu'),\n    Dense(10, activation='softmax')\n\
    ])\n```\n\nWhen you save this model architecture to a JSON format, you would see\
    \ the code shown in Listing [3-1](#495303_1_En_3_Chapter.xhtml#PC27):\n\n```\n\
    {\n    \"class_name\": \"Sequential\",\n    \"config\": {\n        \"name\": \"\
    sequential_3\",\n        \"layers\": [\n            {\n                \"class_name\"\
    : \"Conv2D\",\n                \"config\": {\n                    \"name\": \"\
    conv2d_2\",\n                    \"trainable\": true,\n                    \"\
    batch_input_shape\": [null, 32, 32, 3],\n                    \"dtype\": \"float32\"\
    ,\n                    \"filters\": 32,\n                    \"kernel_size\":\
    \ [3, 3],\n                    \"strides\": [1, 1],\n                    \"padding\"\
    : \"same\",\n                    \"data_format\": \"channels_last\",\n       \
    \             \"dilation_rate\": [1, 1],\n                    \"activation\":\
    \ \"relu\",\n                    \"use_bias\": true,\n                    \"kernel_initializer\"\
    : {\n                        \"class_name\": \"GlorotUniform\",\n            \
    \            \"config\": { \"seed\": null }\n                    },\n        \
    \            \"bias_initializer\": {\n                        \"class_name\":\
    \ \"Zeros\",\n                        \"config\": {}\n                    },\n\
    \                    \"kernel_regularizer\": null,\n                    \"bias_regularizer\"\
    : null,\n                    \"activity_regularizer\": null,\n               \
    \     \"kernel_constraint\": null,\n                    \"bias_constraint\": null\n\
    \                }\n            }\n        ]\n    },\n    ...\n    \"keras_version\"\
    : \"2.2.4-tf\",\n    \"backend\": \"tensorflow\"\n}\n```\n\n**Listing 3-1** JSON\
    \ representation of the model\n\nThe project code for saving to JSON format is\
    \ available in the book’s download.\n\nWith this brief introduction to `tf.keras`,\
    \ I will now take you into a more practical approach of learning `tf.keras`. In\
    \ the next section, you will be developing an image classification model based\
    \ on Convolutional Neural Networks (CNN)."
  raw: '### Custom Layers


    The custom class inherits from tf.keras.layers.Layer. You need to override four
    functions, init, build, call and compute_output_shape. A typical custom class
    definition is shown in the code below:


    ```

    class MyLayer(tf.keras.layers.Layer):

    def __init__(self, output_dim, ** kwargs):

    self.output_dim = output_dim

    super(MyLayer, self).__init__( ** kwargs)

    def build(self, input_shape):

    self.W = self.add_weight(name = ''kernel'',

    shape = (input_shape[1], self.output_dim),

    initializer = ''uniform'',

    trainable = True)

    self.built = True

    def call(self, x):

    return tf.matmul(x, self.W)

    def compute_output_shape(self, input_shape):

    return (input_shape[0], self.output_dim)

    ```


    In the init method we call the superclass constructor and also set the dimensions
    for our output. In the build we set the initial weight matrix. The matrix shape
    is set with the help of input parameter – input_shape. The weights are uniformly
    distributed using the initializer parameter. And we set this matrix to trainable.
    In the call method, we set whatever the operation that we want to do on the weight
    matrix. In the current code, we do matrix multiplication of weights with the input
    vector x. Finally, the compute_output_shape returns the output dimensions.


    You can now use this custom layer in any network configuration as illustrated
    in the code segment below:


    ```

    model = tf.keras.Sequential([tf.keras.layers.Dense(256,

    input_shape=(784,)),

    tf.keras.layers.Dense(256, activation = ''relu''), MyLayer(10),

    tf.keras.layers.Dense(10, activation = ''softmax'')])

    ```


    Note how the custom layer was added between two Dense layers. As a matter of fact,
    you can add the custom layer at any desired position in your network. The network
    plot for the above configuration is shown in Figure [3-4](#495303_1_En_3_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig4_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Network containing a custom layer


    You would now compile the model using the usual compile function:


    ```

    model.compile(optimizer=''adam'',

    loss=tf.keras.losses.binary_crossentropy,

    metrics=[''accuracy''])

    ```


    Finally, the model is trained by calling its fit method.


    ```

    model.fit(x,y1, batch_size=32, epochs=30)

    ```


    The entire project code for the custom layers is available in the book’s download.


    Creating custom layers allows you a great flexibility in designing sophisticated
    network architectures. Throughout this book, you would be creating a wide variety
    of network topologies using functional API.


    ## Saving Models


    Generally, after a model is fully trained, you would save it to the disk for later
    deploying it to the production machine. Not only this, but the models that you
    create in tf.keras can also be saved any time during training. Using this saved
    model, you can resume training where it left off in the first place. This will
    help in avoiding long training times in one session. Also, you can share the saved
    model with others so that they can recreate and continue further on your work.
    The tf.keras provides several ways of saving your work, which are discussed next.


    ### Whole-Model Saving


    When you save the whole model, the following information will be saved.


    *   The model’s architecture


    *   Weights


    *   Training configuration that you passed to its compile method


    *   The optimizer and its state


    To save the model you would use the following code:


    ```

    model.save(''filename.h5'')

    ```


    To recreate the model, you would use the following code:


    ```

    new_model = keras.models.load_model(''filename.h5'')

    ```


    #### Export to SavedModel Format


    TensorFlow uses a standalone serialization format called SavedModel that can be
    used by TensorFlow implementations other than Python. This format is also supported
    by TensorFlow serving. To save the whole model to this format, you would use the
    following code:


    ```

    model.save(''filename'', save_format = ''tf'')

    ```


    To load the saved model, you would use:


    ```

    new_model = keras.models.load_model(''filename'')

    ```


    #### Saving Architecture


    In some situations, you may be interested in saving the model’s architecture and
    not its weight values or the optimizer state. In such requirements, you call the
    get_config method to retrieve the model’s configuration and use it later to recreate
    the model on the saved instance. This is illustrated in the code segment below:


    ```

    # Retrieve and save model configuration

    config = model.get_config()

    #Recreate model

    model = keras.Model.from_config(config)

    ```


    Note that when you recreate the model as shown in this statement, you will lose
    all the previously learned information.


    #### Saving Weights


    In some situations, you may be interested in saving model’s training state and
    not its architecture. In this situation, you would use get_weights and set_weights
    method to save and retrieve the weights alone. This is illustrated in the code
    below:


    ```

    # Retrieving model''s state

    weights = model.get_weights()

    # Restoring state

    model.set_weights(weights)

    ```


    Note The custom layers do not support model.save() and model.get_config() by default.
    You will need to override get_config() to support custom layers. However, custom
    layers support saving weights.


    #### Saving to JSON


    Sometimes, you may want to save the model to JSON format. You can do so using
    the following code fragment:


    ```

    from keras.models import model_from_json

    # serialize to JSON

    json_model = model_1.to_json()

    with open("model_1.json", "w") as json_file:

    json_file.write(json_model)

    # load json and re-create model

    from keras.models import model_from_json

    file = open(''model_1.json'', ''r'')

    buffer = file.read()file.close()

    model = tf.keras.models.model_from_json(buffer)

    ```


    Consider the following model definition:


    ```

    model_1 = tf.keras.Sequential([

    Conv2D(32, (3, 3), activation = ''relu'', padding = ''same'',

    input_shape = (32, 32, 3)),

    Conv2D(32, (3, 3), activation = ''relu'', padding = ''same''),

    MaxPooling2D((2, 2)),

    Dense(128, activation = ''relu''),

    Dense(10, activation = ''softmax'')

    ])

    ```


