  trans: '

    ### TensorBoard


    TensorBoard 是一个可视化工具，可帮助您在机器学习模型开发过程中进行实验。借助 TensorBoard，您可以执行以下操作：


    - 可视化损失和准确率指标

    - 可视化模型图

    - 查看权重、偏置等的直方图

    - 显示图像

    - 分析程序


    显示准确率和损失指标的 TensorBoard 典型截图如图 1-12 所示。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig12_HTML.jpg](img/495303_1_En_1_Fig12_HTML.jpg)


    图 1-12：TensorBoard 指标显示


    借助 TensorBoard，您可以直接在 Jupyter 环境中可视化模型训练。它提供了许多有用且令人兴奋的功能，例如内存分析、查看混淆矩阵和概念模型图等。它是一个允许您在机器学习工作流程中进行测量并查看结果的工具。


    ### Vision Kit


    借助 TensorFlow 2.x，您现在可以设计自己的、能够进行图像识别的物联网设备。这些物联网设备将由 TensorFlow 的机器学习模型驱动。借助
    Google AIY Vision Kit，您将能够构建自己的、可以看见并识别物体的智能相机。您可以选择为此智能相机创建自己的识别模型，或使用预训练模型。整个套件可装入一个方便的小纸板立方体中，并由
    Raspberry Pi 驱动。该套件提供了构建您自己的智能相机所需的一切。


    ### Voice Kit


    就像您构建为物联网设备提供视觉能力的智能相机一样，借助 Voice Kit，您将能够为物联网设备提供聆听和应答能力。在 Google AIY Voice Kit
    的帮助下，您将能够创建自己的自然语言处理器，它可以连接到 Google Assistant 或云端的语音转文本服务。有了它，您将能够向物联网设备发出语音命令，甚至提出问题并获得答案。与
    Vision Kit 一样，它也可以装入一个方便的纸板立方体中，并由 Raspberry Pi 驱动。该套件包含构建支持音频的物联网设备所需的一切，包括 Raspberry
    Pi。


    ### Edge TPU


    如果您是物联网设备制造商，您会很高兴能够在设备本身上快速原型化您的新机器学习模型。Coral 正是为此目的创建了 Edge TPU 板。这是一个用于快速原型化设备端机器学习产品的开发板。它是一个带有可拆卸系统模块（SOM）的单板计算机。SOM
    包含 eMMC、SOC、无线芯片和 Edge TPU。这也非常适合物联网设备和其他嵌入式系统所需的快速设备端机器学习推理。


    ### AIY 套件的预训练模型


    有多个预训练模型可供您在 AIY 套件上使用。其中一些列举如下：


    - 人脸检测器

    - 狗/猫/人检测器

    - 用于识别食物的菜肴分类器

    - 图像分类器

    - 用于识别鸟类、昆虫和植物的自然探索器


    如果您开发了自己的模型，欢迎您将其提交给 Google，以便纳入上述 Google 网站上显示的预训练模型列表中。


    ### 数据管道


    正如我们所看到的，借助 TensorFlow 2.0，训练可以分布在 GPU 和 TPU 上，从而大大减少执行单个训练步骤所需的时间。这也要求在两步之间提供高效的数据传输。新的
    `tf.data` API 有助于跨各种模型和加速器构建灵活高效的输入管道。您将在第 2 章中使用数据管道。


    ## 安装


    TensorFlow 2.x 可以安装在以下平台上：


    - macOS 10.12.6 或更高版本

    - Ubuntu 16.04 或更高版本

    - Windows 7 或更高版本

    - Raspbian 9.0 或更高版本


    我个人使用 Mac 进行开发。本教程中给出的所有程序均在 Mac 上开发和测试。


    TensorFlow 的安装很简单。它需要 `pip` 版本 > 19.0。您可以通过在控制台窗口中运行以下命令来确保您的机器上安装了最新的 `pip`：


    ```

    pip install --upgrade pip

    ```


    要安装仅 CPU 版本的 TensorFlow，请运行以下命令：


    ```

    pip install tensorflow

    ```


    要安装 CPU/GPU 版本，请使用以下命令：


    ```

    pip install tensorflow-gpu

    ```


    ### 安装


    要在 Mac 上安装 TensorFlow，您的机器上必须安装 Xcode 9.2 或更高版本（命令行工具）。`pip` 包有一些依赖项，可以使用命令行工具上的以下命令进行安装：


    ```

    pip install -U --user pip six numpy wheel setuptools mock ''future>=0.17.1''

    pip install -U --user keras_applications --no-deps

    pip install -U --user keras_preprocessing --no-deps

    ```


    安装完这些依赖项后，您可以运行 `pip install` 来安装您想要使用的任何版本的 TensorFlow。


    ### Docker 安装


    如果您不想自己费心安装 TensorFlow，可以利用 Docker 容器中现成的镜像。要下载 Docker 镜像，请使用以下命令：


    ```

    docker pull tensorflow/tensorflow

    ```


    成功下载 Docker 容器后，运行以下命令启动 Jupyter notebook 服务器：


    ```

    docker run -it -p 8888:8888 tensorflow/tensorflow

    ```


    Jupyter 环境启动后，打开一个 notebook 并按需使用 TensorFlow。这将在下一节“测试”中解释。


    ### 无需安装


    到目前为止，我已经向您展示了在几个平台上安装 TensorFlow 的方法。使用 Docker 镜像可以省去您研究依赖项的工作。还有另一种学习和使用 TensorFlow
    的简单方法——那就是使用 Google Colab。这无需安装即可使用 TensorFlow。您只需在浏览器中启动 Google Colab。Google
    Colab 是一个 Google 研究项目，它本质上在浏览器中为您提供了一个 Jupyter notebook 环境。无需任何设置，您的整个 notebook
    代码都在云端运行。您将使用 Google Colab 来运行本教程中的程序。

