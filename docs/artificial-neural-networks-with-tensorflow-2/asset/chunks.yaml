  trans: '

    ### 创建数据批次


    首先，我们来理解什么是批次。批次是数据的一小部分——即图像及其标签。通常，一个批次的大小为 32；这意味着一个批次中包含 32 张图像和 32 个对应的标签。在深度学习中，我们通常不会一次性在整个数据集中寻找模式，而是每次在一个批次中寻找。一次性加载和处理
    10,000 多张图像需要巨大的内存和处理能力。因此，我们将其分成小批次，一次处理一个。现在，我们将编写一个函数，将数据划分为批次，并创建由图像数据及其关联标签组成的张量。


    创建批次的函数如代码清单 4-2 所示。


    ```

    # 定义批次大小，32 是一个不错的默认值

    BATCH_SIZE = 32

    # 创建一个将数据转换为批次的函数

    def create_data_batches(x, y = None, batch_size = BATCH_SIZE, data_type = 1):

    """

    根据图像（x）和标签（y）对创建数据批次。

    如果是训练数据则进行打乱，如果是验证数据则不进行打乱。

    也接受测试数据作为输入（无标签）。

    """

    # 如果数据是测试数据集，则没有标签

    if data_type == 3:

    print("正在创建测试数据批次...")

    data = tf.data.Dataset.from_tensor_slices((tf.constant(x))) # 仅文件路径

    data_batch = data.map(process_image).batch(BATCH_SIZE)

    return data_batch

    # 如果数据是验证数据集，则无需打乱

    elif data_type == 2:

    print("正在创建验证数据批次...")

    data = tf.data.Dataset.from_tensor_slices((tf.constant(x), # 文件路径

    tf.constant(y))) # 标签

    data_batch = data.map(get_image_label).batch(BATCH_SIZE)

    return data_batch

    else:

    # 如果数据是训练数据集，则进行打乱

    print("正在创建训练数据批次...")

    # 将文件路径和标签转换为张量

    data = tf.data.Dataset.from_tensor_slices((tf.constant(x), # 文件路径

    tf.constant(y))) # 标签

    # 在映射图像处理函数之前打乱路径名和标签

    # 比打乱图像更快

    data = data.shuffle(buffer_size = len(x))

    # 创建（图像，标签）元组

    # （这也会将图像路径转换为预处理后的图像）

    data = data.map(get_image_label)

    # 将数据转换为批次

    data_batch = data.batch(BATCH_SIZE)

    return data_batch

    代码清单 4-2

    创建数据批次的函数

    ```


    根据输入值，该函数会为训练、验证和测试数据集创建批次。在训练数据集中，我们打乱数据以实现一定的随机性。函数 `from_tensor_slices` 将数据转换为输入管道。`map`
    函数将（图像，标签）元组转换为数据输入管道。`batch` 函数将数据分割成批次。


    现在，我们将编写一个函数来显示数据集中的一些图像。这在测试过程中对我们很有用。


    ### 图像显示函数


    我们现在编写一个函数来显示数据集中的 25 张图像。函数 `show_25_images` 的完整代码如代码清单 4-3 所示。假设您熟悉 `matplotlib`
    绘图，该代码不言自明，无需进一步注释。


