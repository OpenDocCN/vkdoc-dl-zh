    ```\n\n*Listing 7-3* `LargeCorpusTextGeneration` full source\n\n## Further Work\n\
    \nThe work done by Andrej Karpathy on text generation is worth mentioning, which\
    \ is published in his famous blog *The Unreasonable Effectiveness of Recurrent\
    \ Neural Networks* ([`http://karpathy.github.io/2015/05/21/rnn-effectiveness/`](http://karpathy.github.io/2015/05/21/rnn-effectiveness/)).\
    \ For his experiments, he has used Shakespeare literature, Wikipedia articles,\
    \ LaTeX (Algebraic Geometry language text), and even Linux source code. The results\
    \ produced after an exhaustive training are fabulous. He is able to generate fantastic\
