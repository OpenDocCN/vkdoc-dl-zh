    ## 训练步骤函数


    现在我们编写一个函数来定义训练步骤。我们将按照所需的轮次调用此函数。函数定义如下：


    ```python

    loss_plot = []

    def train_step(img_tensor, target):

    loss = 0

    # 为每个批次初始化隐藏状态

    # 因为不同图像的描述文本不相关

    hidden = decoder.reset_state

    (batch_size=target.shape[0])

    dec_input = tf.expand_dims([tokenizer.word_index

    [''<start>'']] *

    BATCH_SIZE, 1)

    with tf.GradientTape() as tape:

    features = encoder(img_tensor)

    for i in range(1, target.shape[1]):

    # 将特征传递给解码器

    predictions, hidden, _ = decoder(dec_input,

    features, hidden)

    loss += loss_function(target[:, i],

    predictions)

    # 使用教师强制

    dec_input = tf.expand_dims(target[:, i], 1)

    total_loss = (loss / int(target.shape[1]))

    trainable_variables = encoder.trainable_variables +

    decoder.trainable_variables

    gradients = tape.gradient

    (loss, trainable_variables)

    optimizer.apply_gradients(zip(gradients,

    trainable_variables))

    return loss, total_loss

    ```


    该函数首先调用解码器模型中定义的 `reset_state` 来为每个批次初始化解码器的隐藏状态。我们这样做是因为我们不想使用前一批次的状态/描述文本。请注意，每个批次中的描述文本不会相同。我们在第一个批次中添加
    `<start>` 标签。我们使用梯度带遍历数据批次，并在每次迭代中更新梯度。


