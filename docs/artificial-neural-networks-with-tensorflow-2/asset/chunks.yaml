    你可以通过输入自己手写的 `a–z`、`A–Z` 以及数字 `0–9` 的图像来训练上述网络，使其模仿你的笔迹。利用这个训练好的模型，任何有权访问该模型的人都能将任意印刷文本转换成由你创作的个性化手写文本。我曾使用这样一个训练好的网络中的几个字符来个性化书写单词“tensor”，如图
    13-12 所示。


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig12_HTML.jpg](img/495303_1_En_13_Fig12_HTML.jpg)


    **图 13-12** 通过组合图像创建的示例文本


    接下来要创建更复杂的图像。


    # 彩色卡通图像


    到目前为止，你已经创建了手写数字和字母的图像。那么，如何创建像卡通图像这样复杂的彩色图像呢？你目前学到的技术同样可以应用于创建复杂的彩色图像。这正是我将在本项目中演示的内容。


    ## 下载数据


    Kaggle 网站上有大量动漫角色数据集。我们已为本项目准备好了数据集，并将其放在本书的下载网站上供你使用。使用 `wget` 工具将数据下载到你的项目中。


    ```

    ! wget --no-check-certificate -r ''https://drive.google.com/uc?export=download&id=1z7rXRIFtRBFZHt-Mmti4HxrxHqUfG3Y8''
    -O tf-book.zip

    ```


    解压下载文件的内容。


    ```

    !unzip tf-book.zip

    ```


    ## 创建数据集


    编写一个函数来创建数据集：


    ```

    def load_dataset(batch_size, img_shape,

    data_dir = None):

    # 创建一个大小为 (30000,64,64,3) 的元组

    sample_dim = (batch_size,) + img_shape

    # 创建一个形状为 (30000,64,64,3) 的未初始化数组

    sample = np.empty(sample_dim, dtype=np.float32)

    # 从文件中提取所有图像

    all_data_dirlist = list(glob.glob(data_dir))

    # 从数据列表中随机选择一个图像文件

    sample_imgs_paths = np.random.choice

    (all_data_dirlist,batch_size)

    for index,img_filename in enumerate

    (sample_imgs_paths):

    # 打开图像

    image = Image.open(img_filename)

    # 调整图像大小

    image = image.resize(img_shape[:-1])

    # 将输入转换为数组

    image = np.asarray(image)

    # 归一化数据

    image = (image/127.5) -1

    # 将预处理后的图像赋值给样本

    sample[index,...] = image

    print("数据已加载")

    return sample

    ```


    下载代码不言自明，并附有完整注释，便于你理解。现在调用此函数来创建数据集：


    ```

    x_train=load_dataset(30000,(64,64,3),

    "/content/tf-book/chapter13/anime/data/*.png")

    BUFFER_SIZE = 30000

    BATCH_SIZE = 256

    train_dataset = tf.data.Dataset.from_tensor_slices

    (x_train).shuffle(BUFFER_SIZE).batch

    (BATCH_SIZE)

    ```


