    \n图 3-3\n\n多层网络的网络图\n\n函数式 API 还允许你创建具有多个输入和输出、共享层等的复杂架构。表 3-1 中展示了一些此类复杂架构。\n\
    \n表 3-1\n\n几种复杂的 ANN 架构\n\n| ![../images/495303_1_En_3_Chapter/495303_1_En_3_Figa_HTML.gif](img/495303_1_En_3_Figa_HTML.gif)\
    \ |\n\n### 模型子类化\n\n如果你更倾向于面向对象编程，并且有 Java/C++ 等背景，你可能想知道是否存在子类化的概念，以便能够重用之前创建的模型。TensorFlow\
    \ 支持模型子类化。要创建用于模型定义的自定义类，你需要继承 `tf.keras.Model`：\n\n```\nclass MyModel(tf.keras.Model):\n\
    ```\n\n你需要在类定义中提供两个重写的方法——`__init__` 和 `call`。顾名思义，`__init__` 在类实例化时被调用。下面代码片段给出了\
    \ `__init__` 的典型定义：\n\n```\ndef __init__(self, use_dp = False, num_output = 1):\n\
    \    super(MyModel, self).__init__()\n    self.use_dp = use_dp\n    self.dense1\
