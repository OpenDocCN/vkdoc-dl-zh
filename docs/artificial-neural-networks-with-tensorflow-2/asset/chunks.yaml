- fmt: '# Summary


    In this chapter, you learned another important technique in neural networks, and
    that is neural style transfer. The technique allows you to transform the contents
    of an image of your choice into a style of another image. You learned how to do
    this style transfer in two different ways. The first one was to use a pre-trained
    model provided in `tfhub` to perform a fast artistic style transfer. The style
    transfers using this method are quick and do a very good job. The second approach
    was to build your own network to do the style transfers at the core level. We
    used a `VGG16` pre-trained model for image classification to extract the contents
    and style of images. You then learned to create a network which learned how to
    apply the style to the given contents over several iterations. This method allows
    you to perform your own experiments on style transfer.


    In the next chapter, you will learn how to generate images using Generative Adversarial
    Networks (GANs).


    ## 13. Image Generation


    Did you ever imagine that neural networks could be used for generating complex
    color images? How about Anime? How about the faces of celebrities? How about a
    bedroom? Doesn’t it sound interesting? All these are possible with the most interesting
    idea in neural networks and that is Generative Adversarial Networks (GANs). The
    idea was introduced and developed by Ian J. Goodfellow in 2014. The images created
    by GAN look so real that it becomes practically impossible to differentiate between
    a fake and a real image. Be warned, to generate complex images of this nature,
    you would require lots of resources to train the network, but it does certainly
    work as you would see when you study this chapter. So let us look at what is GAN.


    ### GAN – Generative Adversarial Network


    In GAN, there are two neural network models which are trained simultaneously by
    an adversarial process. One network is called a generator, and the other is called
    a discriminator. A generator (an artist) learns to create images that look real.
    A discriminator (the critic) learns to tell real images apart from the fakes.
    So these are two competing models which try to beat each other. At the end, if
    you are able to train the generator to outperform the discriminator, you would
    have achieved your goal.


    ### How Does GAN Work?


    As I said, the GAN consists of two networks. Training a GAN requires two parts:


    1. Keeping the generator idle, train the discriminator. Train the discriminator
    on real images for a number of epochs and see if it can correctly predict them
    as real. In the same training phase, train the discriminator on the fake images
    (generated by the generator) and see if it can predict them as fake.

    2. Keeping the discriminator idle, train the generator. Use the prediction results
    made by the discriminator on the fake images to improve upon those images.


    The preceding steps are repeated for a large number of epochs, and the results
    (fake images) are examined manually to see if they look real. If they do, stop
    the training. If not, continue the preceding two steps until the fake image looks
    real.


    The whole process is depicted in Figure [13-1](#495303_1_En_13_Chapter.xhtml#Fig1).


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig1_HTML.jpg](images/495303_1_En_13_Chapter/495303_1_En_13_Fig1_HTML.jpg)


    **Figure 13-1** GAN working schematic


    ### The Generator


    The generator schematic is shown in Figure [13-2](#495303_1_En_13_Chapter.xhtml#Fig2).


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig2_HTML.jpg](images/495303_1_En_13_Chapter/495303_1_En_13_Fig2_HTML.jpg)


    **Figure 13-2** Generator architecture


    The generator takes a random noise vector of some dimension. We will be using
    a dimension of 100 in our examples. From this random vector, it generates an image
    of 64x64x3. The image is upscaled by a series of transitions through convolutional
    layers. Each convolutional transpose layer is followed by a batch normalization
    and a leaky ReLU. The leaky ReLU has neither vanishing gradient problems nor dying
    ReLU problems. The leaky ReLU attempts to fix the “dying ReLU” problem. The ReLU
    will acquire a small value of 0.01 or so instead of dying out to 0. We use strides
    in each convolutional layer to avoid unstable training. Note how, at each convolution,
    the image is upscaled to create a final image of 64x64x3.


    ### The Discriminator


    The discriminator schematic is shown in Figure [13-3](#495303_1_En_13_Chapter.xhtml#Fig3).


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig3_HTML.jpg](images/495303_1_En_13_Chapter/495303_1_En_13_Fig3_HTML.jpg)


    **Figure 13-3** Discriminator architecture


    The discriminator too uses Convolutional layers and downsizes the given image
    for evaluation.


    ### Mathematical Formulation


    The working of GAN can be formulated with the simple mathematical equation given
    here:


    ![$$ \frac{\mathit{\min}}{G}\frac{\mathit{\max}}{D}V\left(D,G\right)=\frac{\mathit{\min}}{G}\frac{\mathit{\max}}{D}\left({E}_{z\sim
    {P}_{data}(x)}\left[ logD(x)\right]+{E}_{z\sim {P}_z(z)}\left[\mathit{\log}\left(1-D\left(G(z)\right)\right)\right]\right)
    $$](images/495303_1_En_13_Chapter/495303_1_En_13_Chapter_TeX_Equa.png)


    where `G` represents the generator and `D` the discriminator. The `data(x)` represents
    the distribution of real data and `p[z](z)` the distribution of generated or fake
    data. The `x` represents a sample from real data and `z` from the generated data.
    The `D(x)` represents the discriminator network and `G(z)` the generator network.


    The discriminator loss while training on the real data is expressed as


    ![$$ L\left(D(x),1\right)=\mathit{\log}\left(D(x)\right) $$](images/495303_1_En_13_Chapter/495303_1_En_13_Chapter_TeX_Equ1.png)


    (1)


    The discriminator loss while training on the fake data coming from the generator
    is expressed as


    ![$$ L\left(D\left(G(z)\right),0\right)=\mathit{\log}\left(1-D\left(G(z)\right)\right)
    $$](images/495303_1_En_13_Chapter/495303_1_En_13_Chapter_TeX_Equ2.png)


    (2)


    For real data, the discriminator prediction should be close to 1. Thus, the equation
    [1](#495303_1_En_13_Chapter.xhtml#Equ1) should be maximized in order to get `D(x)`
    close to 1. The first equation is the discriminator loss on real data, which should
    be maximized in order to get `D(G(z))` close to 1. Because the second equation
    is the discriminator loss on the fake data, it should also be maximized. Note
    that the log is an increasing function. For the second equation, the discriminator
    prediction on the generated fake data should be close to zero. In order to maximize
    the second equation, we have to minimize the value of `D(G(z))` to zero. Thus,
    we need to maximize both losses for the discriminator. The total loss of the discriminator
    is the addition of two losses given by equations [1](#495303_1_En_13_Chapter.xhtml#Equ1)
    and [2](#495303_1_En_13_Chapter.xhtml#Equ2). Thus, the combined total loss will
    also be maximized.


    The generator loss is expressed as


    ![$$ {L}^{(G)}=\mathit{\min}\left[\mathit{\log}\left(D(x)\right)+\mathit{\log}\left(1-D\left(G(z)\right)\right)\right]
    $$](images/495303_1_En_13_Chapter/495303_1_En_13_Chapter_TeX_Equ3.png)


    (3)


    We need to minimize this loss during the generator training.


    ### Digit Generation


    In this project, we will use the popular MNIST dataset provided by Kaggle. As
    you know, the dataset consists of images of handwritten digits. We will create
    a GAN model to create additional images looking identical to these images. Maybe
    this could be helpful to somebody in increasing the training dataset size in their
    future developments.


    #### Creating Project


    Create a Colab project and rename it to `DigitGen-GAN`. Import the required libraries.'
