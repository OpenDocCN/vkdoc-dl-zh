  trans: '

    ### 创建数据集


    对于机器学习，你需要训练数据集和测试数据集。训练数据集进一步划分为训练集和验证集。为了创建这些数据集，我们使用 `sklearn` 的 `train_test_split`
    方法，如下所示：


    ```python

    # 创建训练集、验证集和测试集

    from sklearn.model_selection import train_test_split

    x_train_1 , x_test , y_train_1 , y_test =

    train_test_split

    (x , y , test_size = 0.15 , random_state = 0)

    x_train , x_val , y_train , y_val =

    train_test_split(x_train_1 , y_train_1 ,

    test_size = 0.05 , random_state = 0)

    ```


    请注意，15% 的数据被保留用于测试。训练数据按 95:5 的比例分割——95% 用于训练，5% 用于验证。


    通常，不同字段的数据在数值上表现出很大的差异。如果将这些数据项缩放到一个固定的尺度，神经网络将学习得更好。因此，我们需要对整个数据进行预处理。这种预处理主要包括通过标准化或
    Z-score 归一化进行特征缩放。你需要重新缩放特征值，使其具有均值为零、标准差为一的标准正态分布。如图 5-3 所示。


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig3_HTML.jpg](img/495303_1_En_5_Fig3_HTML.jpg)


    图 5-3


    期望的数据分布


    我们现在开始缩放数据，以便理想地达到图 5-3 中所示的分布曲线。


    ### 缩放数据


    为了缩放我们的输入数据，或者更准确地说，为了使其居中，你需要减去均值，然后将结果除以标准差：


    ![$$ {x}^{\prime }=\frac{x-\mu }{\sigma } $$](img/495303_1_En_5_Chapter_TeX_Equb.png)


    其中 **μ** 是均值，**σ** 是标准差。


    你首先对训练集进行变换。为此，我们使用 `sklearn` 的 `StandardScaler` 类，并调用其 `fit_transform` 方法。以下代码执行此变换：


    ```python

    from sklearn.preprocessing import StandardScaler

    sc_x = StandardScaler()

    x_train_new = sc_x.fit_transform(x_train)

    ```


    你可以通过绘制变换前后的原始数据来检查此变换的效果。以下代码为 `fixed_acidity` 字段生成了这两个图：


    ```python

    fig, (ax1, ax2) = plt.subplots

    (ncols = 2, figsize = (20, 10))

    ax1.scatter(x_train.index,

    x_train[''fixed acidity''],

    color = c,

    label = ''raw'',

    alpha = 0.4,

    marker = m

    )

    ax2.scatter(x_train.index,

    x_train_new[: , 1],

    color = c,

    label = ''adjusted'',

    alpha = 0.4,

    marker = m

    )

    ax1.set_title(''Training dataset'')

    ax2.set_title(''Standardized training dataset'')

    for ax in (ax1, ax2):

    ax.set_xlabel(''index'')

    ax.set_ylabel(''fixed acidity'')

    ax.legend(loc =''upper right'')

    ax.grid()

    plt.tight_layout()

    plt.show()

    ```


    输出如图 5-4 所示。


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig4_HTML.jpg](img/495303_1_En_5_Fig4_HTML.jpg)


    图 5-4


    标准化前后的数据分布


    左侧的图显示的是原始数据，你可以看到 `fixed acidity` 字段的值范围大约从 0 到 14，均值在 7 左右。右侧的图显示的是变换后的相同数据。请注意，均值约为
    0，数据变化范围在 –2 到 +2 之间，表明标准差为 +/-1。如果你检查其他字段的图，你会再次注意到均值被拉到了零，并且在零的两侧有大致均匀的分布，其范围等于标准差。


    你可以再尝试绘制一个图——这次将 `total sulfur dioxide` 放在 y 轴上，将 `residual sugar` 放在 x 轴上。以下代码生成这些图：


    ```python

    fig, (ax1, ax2) =

    plt.subplots(ncols = 2, figsize = (20, 10))

    for l, c, m in zip(range(0, 2),

    (''blue'', ''red''), (''^'', ''s'')):

    ax1.scatter(x_train[''residual sugar''],

    x_train[''total sulfur dioxide''],

    color = c,

    label = ''class %s'' % l,

    alpha = 0.4,

    marker = m

    )

    for l, c, m in zip(range(0, 2),

    (''blue'', ''green''), (''^'', ''s'')):

    ax2.scatter(x_train_new[: , 3],

    x_train_new[: , 6],

    color = c,

    label = ''class %s'' % l,

    alpha = 0.4,

    marker = m

    )

    ax1.set_title(''Training dataset'')

    ax2.set_title(''Standardized training dataset'')

    for ax in (ax1, ax2):

    ax.set_xlabel(''residual sugar'')

    ax.set_ylabel(''total sulfur dioxide'')

    ax.legend(loc =''upper right'')

    ax.grid()

    plt.tight_layout()

    plt.show()

    ```


    输出如图 5-5 所示。


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig5_HTML.jpg](img/495303_1_En_5_Fig5_HTML.jpg)


    图 5-5


    标准化后两个字段的数据分布


    如图 5-5 左侧图所示，`residual sugar` 值在 0 到 30 之间变化，而 `total sulfur dioxide` 值在 0 到 400
    之间有很大的变化。经过变换后，如图 5-5 右侧图所示，两个字段的均值都显示为 0，其余数据点在 –2 到 +2 之间均匀分布。


    这种变换有助于神经网络更好地学习。因此，我们对所有特征都进行这些变换。`fit_transform` 不仅变换数据，还将 **μ** 和 **σ** 的值存储在内部变量中。出于非常明显的原因，你必须将应用于训练集的相同变换应用于你的测试集和交叉验证集。因此，保留这些参数的值是使用
    `fit_transform` 方法的一个重要目标。该方法拟合这些值，记住它们，然后应用变换。现在，为了变换测试集和验证集，我们只需调用 `transform`
    方法，而不是 `fit_transform` 方法。这通过以下两条语句完成：


    ```python

    x_test_new = sc_x.transform(x_test)

    x_val_new = sc_x.transform(x_val)

    ```


    现在所有字段都已标准化为均值为零，并且其他数据点由标准差决定的均匀分布，你已经准备好构建模型了。


    ## 模型构建


    在构建模型之前，我将编写一个小函数来可视化训练结果，该函数可用于我们将要训练的多个模型。

    '
- fmt: '### Visualization Function for Metrics


    Rather than using TensorBoard for analysis, I am going to use `matplotlib` to
    draw the analysis metrics. I am going to define a function that will be repeatedly
    called after every trial of a new model. If you decide to use TensorBoard instead,
    remember you may be required to reset its state or provide a separate log folder
    after every plot and the model run. So, it is probably more convenient to use
    a plotting function.


    The entire plotting function is given in Listing [5-1](#495303_1_En_5_Chapter.xhtml#PC20).
    As before, the function does not need any further comments; it is self-explanatory.


    ```python

    import matplotlib.pyplot as plt

    epoch = 30

    def plot_learningCurve(history):

    # Plot training & validation accuracy values

    epoch_range = range(1, epoch+1)

    #plotting the mae vs epoch of training set

    plt.plot(epoch_range, history.history[''mae''])

    #plotting the val_mae vs epoch of the validation dataset.

    plt.plot(epoch_range, history.history[''val_mae''])

    plt.ylim([0, 2])

    plt.title(''Model mae'')

    plt.ylabel(''mae'')

    plt.xlabel(''Epoch'')

    plt.legend([''Train'', ''Val''], loc = ''upper right'')

    plt.show()

    print("--------------------------------

    ------------------------")

    # Plot training & validation loss values

    plt.plot(epoch_range, history.history[''loss''])

    plt.plot(epoch_range, history.history[''val_loss''])

    plt.ylim([0, 4])

    plt.title(''Model loss'')

    plt.ylabel(''Loss'')

    plt.xlabel(''Epoch'')

    plt.legend([''Train'', ''Val''], loc = ''upper right'')

    plt.show()

    Listing 5-1

    Metrics visualization function

    ```


    Now, we will start our model building exercise. You will be creating three models
    with increasing complexity. After defining the model, you will train it and evaluate
    its performance on a test data. We will use the same test data to evaluate the
    performance of the various models that we build in this exercise. We will try
    to experiment with a different optimizer for a large model in our case studies.
    I will show you when the overfitting occurs and how to detect it. Then, I will
    give you some clues on how to mitigate it.


    So, let us start our experiment with the small model.


    ### Small Model


    In the small model, we will construct a model that has only one hidden layer.


    #### Definition


    The input to the model is a tensor of 11 input features, and the output is a single
    layer that gives out the wine quality. We will set 16 neurons in the hidden layer
    with the ReLU activation on each neuron. The model is defined using the following
    statement:


    ```python

    small_model = tf.keras.Sequential([

    tf.keras.layers.Dense(16 ,

    activation = ''relu'' ,

    input_shape = (11 , )),

    tf.keras.layers.Dense(1)

    ])

    ```


    We will use the Adam optimizer and `mean_squared_error` (`mse`) as a loss function.
    We will use the mean absolute error (`mae`) for our analysis. The model is compiled
    using the following statement:


    ```python

    small_model.compile(optimizer = ''adam'' ,

    loss = ''mse'' ,

    metrics = [''mae''])

    ```


    #### Training


    We train the model by calling its `fit` method. We use the batch size of 32 during
    training. Note that we have 4000 and odd number of records available in our dataset.
    Thus, there is a scope to create enough number of batches during training. The
    following statement performs the training and captures the results in the `history_small`
    variable:


    ```python

    history_small = small_model.fit

    (x_train_new, y_train ,

    batch_size = 32,

    epochs = 30,verbose = 1 ,

    validation_data =

    (x_val_new , y_val))

    ```


    #### Evaluation


    After training is over, we plot the evaluation metrics by calling our previously
    defined plotting function:


    ```python

    plot_learningCurve(history_small)

    ```


    The output is shown in Figure [5-6](#495303_1_En_5_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig6_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Small model evaluation metrics


    You may evaluate the model''s performance on the test data that we have previously
    created by calling its `evaluate` method. The method call and its output are shown
    here:


    ```python

    s_test_loss , s_test_mae = small_model.evaluate

    (x_test_new , y_test ,

    batch_size = 32 , verbose = 1)

    print("small model test_loss : {}"

    .format(s_test_loss))

    print("small model test_mae : {} "

    .format(s_test_mae))

    small model test_loss : 0.6353380084037781

    small model test_mae : 0.6149751543998718

    ```


    #### Evaluation on Unseen Data


    To evaluate the model’s performance on an unseen data, we will need to create
    such a data item. For this, I picked up the data point from the test data with
    the id equal to 2125. I removed the label (the wine quality) from it and created
    the unseen data using the following declaration:


    ```python

    unseen_data = np.array([[6.0 , 0.28 , 0.22 , 12.15 ,

    0.048 , 42.0 , 163.0 ,

    0.99570 , 3.20 , 0.46 ,

    10.1]])

    ```


    You may then do the prediction on this test data and print its result as follows:


    ```python

    y_small = small_model.predict

    (sc_x.transform(unseen_data))

    print ("Wine quality on unseen data

    (small model): ", y_small[0][0])

    Wine quality on unseen data (small model):  5.618517

    ```


    The wine quality is predicted to be 5.62, which is close to the actual label value
    of 5.0 as seen in the training dataset for the data item of id 2125.


    Now, we will proceed with a more complex model.


    ### Medium Model


    In this model, we will increase the number of hidden layers from 1 to 3. We will
    also increase the number of neurons in each of these layers to 64. We will continue
    using the earlier used Adam optimizer and the `mse` as our loss function. We will
    use `mae` for our evaluation metrics.


    #### Model Definition/Training


    The following code defines the model, compiles it, and performs training on it:


    ```python

    medium_model = tf.keras.Sequential([

    tf.keras.layers.Dense

    (64 , activation = ''relu'' ,

    input_shape = (11, )),

    tf.keras.layers.Dense

    (64 , activation = ''relu''),

    tf.keras.layers.Dense

    (64 , activation = ''relu''),

    tf.keras.layers.Dense(1)

    ])

    medium_model.compile(loss = ''mse'' ,

    optimizer = ''adam'' ,

    metrics = [''mae''])

    history_medium = medium_model.fit

    (x_train_new , y_train ,

    batch_size = 32,

    epochs = 30, verbose = 1 ,

    validation_data =

    (x_val_new , y_val))

    ```


    In the `medium_model` definition, we have simply added two `Dense` layers, making
    it a total of three hidden layers, each consisting of 64 neurons. As before, each
    neuron is activated by the ReLU function. The idea behind adding these layers
    is to check whether adding more layers to the network would help in getting better
    accuracy. So, let us test it out by checking the evaluation results.'
