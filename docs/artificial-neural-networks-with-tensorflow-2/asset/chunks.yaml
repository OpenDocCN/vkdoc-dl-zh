    #### Shuffling Data


    The data that is collected on field may be in a specific order as per the convenience
    and the comfort of the data collector. For better machine learning, you should
    randomize the data so that the learning does not follow the undesired patterns
    in the data. So, we shuffle the data using the following statement:


    ```

    data=shuffle(data)

    ```


    #### Examining Data


    You can verify that the data is correctly loaded by printing the contents of the
    `data` dataframe. Instead of printing the top rows by calling `data.head()`, I
    have printed the full dataset so that you will know the number of records and
    columns present in it. This is shown in Figure [2-12](#495303_1_En_2_Chapter.xhtml#Fig12).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig12_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    Dataset


    There are 10,000 rows and 14 columns in the database. A brief explanation of the
    various fields is given here:


    *   `RowNumber` – Numbers from 1 to 10,000.

    *   `CustomerId` – A unique identification for the customer.

    *   `Surname` – Customer’s last name.

    *   `CreditScore` – Customer’s credit score.

    *   `Geography` – Customer’s country.

    *   `Gender` – Male or female.

    *   `Age` – Customer’s age.

    *   `Tenure` – How long the customer is banking with them?

    *   `Balance` – Customer’s bank balance.

    *   `NumOfProducts` – The count of bank products the customer is currently using.

    *   `HasCrCard` – Does the customer hold a credit card?

    *   `IsActiveMember` – Is the customer currently active?

    *   `EstimatedSalary` – Customer’s current estimated salary.

    *   `Exited` – A value of 1 indicates that the customer has left the bank.


    Now, as you have loaded the data in memory, your next task is to cleanse it before
    feeding it to our network. We call it data preprocessing, which is discussed next.


    ### Data Preprocessing


    The raw real data may not always meet the training requirements of a neural network
    (ANN). Specifically, you will be checking out data and processing it for the following
    items:


    *   Data may contain null values.

    *   All fields in the database may not be useful for learning.

    *   The numerical fields may exhibit large variance in their values and thus must
    be scaled to the same level.

    *   Certain fields may contain categorical values, for example, male and female;
    these need to be encoded to 0s and 1s.

    *   Finally, you will need to decide which fields are to be used as features and
    what the labels are.


    So, let us start processing the data.


    #### Checking Nulls


    If the data contains null values, it will severely affect the network training.
    The easiest way to check for a null value is to call the `isnull` function. This
    is done using the following program statement:


    ```

    data.isnull().sum()

    ```


    The output of the preceding statement gives the following result:


    ```

    RowNumber          0

    CustomerId         0

    Surname            0

    CreditScore        0

    Geography          0

    Gender             0

    Age                0

    Tenure             0

    Balance            0

    NumOfProducts      0

    HasCrCard          0

    IsActiveMember     0

    EstimatedSalary    0

    Exited             0

    dtype: int64

    ```


    Computing the sum on a null value generates an error. Very clearly, our dataset
    does not contain any null values. So there is no question of removing rows from
    the dataset (the ones containing null fields).


    Now comes the major task of selecting fields for machine learning.


    #### Selecting Features and Labels


    Not all the fields in our database would be useful for training the algorithm.
    For example, fields such as `CustomerId` and `Surname` do not make any sense to
    our machine learning. So, we need to drop these columns. This is done using the
    following statement:


    ```

    X = data.drop(labels=[''CustomerId'', ''Surname'', ''RowNumber'', ''Exited''],
    axis = 1)

    ```


    Note that we dropped four fields from the dataset. `X` is a new array containing
    the fields which are relevant to our model building.


    Whether the customer exited the bank marks the output of our model. Thus, the
    field `Exited` becomes the label for our model building. This is extracted into
    the variable `y` using the following statement:


    ```

    y = data[''Exited'']

    ```


    At this point, you are ready with features (`X`) and labels (`y`) tensors.


    #### Encoding Categorical Columns


    You must check if any of the selected columns have categorical values. For this,
    we will check the data types of all the selected columns using the following statement:


    ```

    X.dtypes

    ```


    The output of the preceding statement is shown as follows:


    ```

    CreditScore          int64

    Geography           object

    Gender              object

    Age                  int64

    Tenure               int64

    Balance            float64

    NumOfProducts        int64

    HasCrCard            int64

    IsActiveMember       int64

    EstimatedSalary    float64

    Dtype: object

    ```


    Note that `Geography` and `Gender` are object types. You can check the values
    they contain by printing the first five rows of the features tensor as shown in
    Figure [2-13](#495303_1_En_2_Chapter.xhtml#Fig13).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig13_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Top five rows of the features vector


    The `Gender` takes two categorical values, Male and Female, while `Geography`
    has three categorical values – Germany, Spain, and France. You will need to convert
    these into numerical values before feeding it to the network. The encoding is
    done by using the `LabelEncoder` in sklearn’s preprocessing module. This is shown
    in the following code snippet:


    ```

    from sklearn.preprocessing import LabelEncoder

    label = LabelEncoder()

    X[''Geography''] = label.fit_transform(X[''Geography''])

    X[''Gender''] = label.fit_transform(X[''Gender''])

    ```


    The one-hot encoding creates dummy variables for categorical columns. As `Geography`
    column has three distinct values, it will create three variables – one for each
    country. Thus, we will have three features pertaining to the country in our training
    dataset. Having many features increases the training time. To reduce the number
    of features, you can exclude one of the dummy variables pertaining to the country
    field and yet achieve the same results. We drop the first variable by calling
    `get_dummies` method:


    ```

    X = pd.get_dummies(X, drop_first=True, columns=[''Geography''])

    ```


    If you examine the data at this point by printing the top five rows, you will
    notice that there are only two columns for `Geography` – `Geography_1` and `Geography_2`.


    One more thing that we need to do before feeding data to the network is to scale
    all the numerical values in the range –1 to 1.'
