    \ = 8,\n    dropout = 0.1)\n```\n\n如前所述，我将层数设置为2，而参考论文（[`https://arxiv.org/abs/1706.03762`](https://arxiv.org/abs/1706.03762)）建议该值为6。同样，其他参数也设置为较低值以加快训练速度。要获得更准确的结果，您应该尝试为`num_layers`、`units`和`d_model`设置更大的值。\n\
    \n要编译此模型，我们需要定义损失函数和优化器。\n\n## 损失函数\n\n损失是通过使用稀疏分类熵函数测量输出`y`的真实值与预测值之间的差异来计算的。由于所有输入序列都经过填充，因此在计算损失时应用填充掩码非常重要。损失函数代码如下所示：\n\
    \n```python\ndef loss(y_true, y_pred):\n    y_true = tf.reshape(y_true, shape=(-1,\
    \ 10 - 1))\n    loss = tf.keras.losses.SparseCategoricalCrossentropy(\n      \
    \  from_logits=True, reduction=\"none\")\n    (y_true, y_pred)\n    mask = tf.cast(tf.not_equal(y_true,\
    \ 0), tf.float32)\n    loss = tf.multiply(loss, mask)\n    return tf.reduce_mean(loss)\n\
    ```\n\n## 优化器\n\n我们将使用`Adam`优化器来训练模型。参考论文（[`https://arxiv.org/pdf/1706.03762.pdf`](https://arxiv.org/pdf/1706.03762.pdf)）建议为优化器使用自定义学习率。自定义学习率由以下公式指定：\n\
    \n![$$ lrate={d}_{model}^{-0.5}\\ast \\mathit{\\min}\\left( step\\_{num}^{-0.5},\
    \ step\\_ num\\ast warmup\\_{steps}^{-1.5}\\right) $$](images/495303_1_En_9_Chapter/495303_1_En_9_Chapter_TeX_Equd.png)\n\
    \n根据该公式，学习率最初会随着`warmup_steps`设置步数线性增加，然后随着步数的平方根倒数成比例下降。在上一段引用的论文中，作者将`warmup_steps`设置为4000，我们将继续使用相同的值。\n\
    \n为了实现此公式，我们创建一个自定义调度器类，如下所示：\n\n```python\nclass CustomSchedule\n    (tf.keras.optimizers.schedules.LearningRateSchedule):\n\
    \    def __init__(self, d_model, warmup_steps=4000):\n        super(CustomSchedule,\
    \ self).__init__()\n        self.d_model = d_model\n        self.d_model = tf.cast(self.d_model,\
    \ tf.float32)\n        self.warmup_steps = warmup_steps\n    def __call__(self,\
    \ step):\n        arg1 = tf.math.rsqrt(step)\n        arg2 = step * (self.warmup_steps**-1.5)\n\
    \        return tf.math.rsqrt(self.d_model) *\n            tf.math.minimum(arg1,\
    \ arg2)\n```\n\n## 编译\n\n我们使用选定的优化器和损失函数编译模型：\n\n```python\nmodel.compile(optimizer=optimizer,\
    \ loss=loss)\n```\n\n## 训练\n\n最后，我们通过调用模型的`fit`方法开始训练：\n\n```python\nEPOCHS =\
    \ 20\nmodel.fit(dataset, epochs=EPOCHS)\n```\n\n每个epoch大约需要70秒来训练模型。\n\n## 推理\n\
    \n对于推理（即将给定的英语句子翻译成德语），我们创建一个名为`translate`的函数。我们需要使用之前创建的`tokenizer`对输入语句进行编码，并为其添加开始和结束标记。我们的最大序列长度由变量`MAX_LENGTH`定义为10。因此，我们创建一个循环来迭代十个输入单词，通过将注意力集中在整个输入句子上，逐个翻译它们。`translate`的函数代码如下所示：\n\
