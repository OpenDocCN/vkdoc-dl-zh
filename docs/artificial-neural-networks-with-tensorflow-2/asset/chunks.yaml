- fmt: 'I will now move on to explain how to develop a model for performing multivariate
    analysis.


    ## Multivariate Time Series Analysis


    In this section, I will describe how to create a multivariate time series analysis
    machine learning model. You will use the London bike sharing dataset provided
    by Kaggle ([`www.kaggle.com/hmavrodiev/london-bike-sharing-dataset`](https://www.kaggle.com/hmavrodiev/london-bike-sharing-dataset))
    for this purpose. The dataset provides a count of bike shares at a given time
    along with the weather conditions. It is observed that the demand for bikes is
    also seasonal. The aim of our model is to take into account all these variables
    in predicting the future demand for bikes. The various columns in the dataset
    are described as follows:


    1.  `timestamp`

    2.  `cnt` – The count of bike shares

    3.  `t1` – Real temperature in Celsius

    4.  `t2` – Temperature in Celsius “feels like”

    5.  `hum` – Humidity in percentage

    6.  `wind_speed` – Wind speed in km/h

    7.  `weather_code` – Weather category

    8.  `is_holiday` – Boolean, 1-holiday

    9.  `is_weekend` – Boolean, 1-weekend

    10. `season` – Categorical: 0-spring, 1-summer, 2-fall, 3-winter


    The `cnt` column is going to be our target for prediction. All the rest may be
    used as a feature. So this is a multivariate problem where the target depends
    on the values of nine other fields.


    ## Creating Project


    Create a Colab project and rename it to `Multivariate time series analysis`. Import
    the desired libraries as usual:


    ```python

    import numpy as np

    import pandas as pd

    import tensorflow as tf

    import matplotlib.pyplot as plt

    import sklearn.preprocessing

    import seaborn as sns

    ```


    ## Preparing Data


    You load the data into the project using the following code:


    ```python

    url = ''https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch11/london_merged.csv''

    df = pd.read_csv(url, parse_dates=[''timestamp''], index_col="timestamp")

    ```


    Like in the earlier example, we will be using the `timestamp` column as date rather
    than an object. Examine the data. The screenshot is shown in Figure [11-15](#495303_1_En_11_Chapter.xhtml#Fig15).


    ![../images/495303_1_En_11_Chapter/495303_1_En_11_Fig15_HTML.jpg](images/495303_1_En_11_Chapter/495303_1_En_11_Fig15_HTML.jpg)


    **Figure 11-15** Data for the multivariate time series analysis


    As you can see, there are 17,414 records and 9 columns. Note that we have taken
    out the `timestamp` column from the dataset and are using it as an index.


    We will examine the data types by calling the `dftypes` method. The output is
    shown in Figure [11-16](#495303_1_En_11_Chapter.xhtml#Fig16).


    ![../images/495303_1_En_11_Chapter/495303_1_En_11_Fig16_HTML.jpg](images/495303_1_En_11_Chapter/495303_1_En_11_Fig16_HTML.jpg)


    **Figure 11-16** Data types in the bike share database


    All our features columns are numeric type. However, a few columns like `weather_code`
    and `season` used categorical values. The columns `is_holiday` and `is_weekend`
    hold boolean values. We should not be scaling these columns when we scale all
    our numerical values for standardization.


    ## Checking for Stationarity


    We will now check if all columns in our analysis are stationary. A stationary
    series is one in which the properties – mean, variance, and covariance – do not
    vary with time. For a series to be stationary, the eigenvalues should be less
    than one in modulus. The Johansen test can be used to check for cointegration
    between a maximum of 12 time series. In the current dataset, we have nine time
    series, so we can apply this test easily without any further provisions in the
    coding. We conduct the test using the following code:


    ```python

    #checking stationarity

    from statsmodels.tsa.vector_ar.vecm import coint_johansen

    johan_test_temp = df

    coint_johansen(johan_test_temp, -1, 1).eig

    ```


    When you run the test, it prints the eigenvalues for all nine columns, which are
    shown as follows:


    ```

    array([2.61219379e-01, 1.31970167e-01, 5.22046139e-02, 4.19830465e-02, 2.10126207e-02,
    1.75450605e-02, 1.36518877e-02, 6.26085775e-04, 7.56291478e-05])

    ```'
