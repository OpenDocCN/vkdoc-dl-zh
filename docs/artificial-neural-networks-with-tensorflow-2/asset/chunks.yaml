    # 3. 深入探索 `tf.keras`


    Keras 是一个运行在 TensorFlow 之上的高级神经网络 API。过去许多年，您一直在使用以 TensorFlow 为后端的 Keras API。随着
    TensorFlow 2.x 的发布，这一情况发生了变化。TensorFlow 现已将 Keras 集成到 `tf.keras` API 中。`tf.keras`
    是 TensorFlow 对 Keras API 规范的实现。这一变化主要是为了在使用 Keras 与 TensorFlow 时保持一致性，同时也使得在使用
    Keras 时能够利用 TensorFlow 的多项特性，例如即时执行、分布式训练等。截至撰写本文时，最新的 Keras 版本是 2.3.0。该版本增加了对
    TensorFlow 2.x 的支持，并且也是多后端 Keras 的最后一个主要版本。此后，您将在所有深度学习应用中使用 `tf.keras`。在第二章中，您已经开始使用
    `tf.keras` 入门 TensorFlow。本章将带您更深入地了解 `tf.keras` 的使用。


    ## 入门指南


    在创建深度学习应用时，最重要的任务是定义神经网络模型。在上一章开发一个简单应用时，您创建了一个包含单层单神经元的网络。回顾一下，这是通过以下程序语句实现的：


    ```

    model = tf.keras.Sequential([tf.keras.layers.Dense(units=1)])

    ```


    虽然我没有明确说明，但上述语句在 TensorFlow 中使用了 Keras 函数式 API。该语句创建了一个单层/单神经元网络模型。在早期的 Keras
    实现中，您可以通过以下两条语句完成相同操作：


    ```

