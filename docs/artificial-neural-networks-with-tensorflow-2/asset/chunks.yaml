    \nApress 标准 © Poornachandra Sarang 2021  \n本作品受版权保护。出版商保留所有权利，无论是全部还是部分材料，特别是翻译、重印、重用插图、朗诵、广播、以缩微胶片或任何其他物理方式复制，以及传输或信息存储与检索、电子改编、计算机软件，或现在已知或以后开发的类似或不同方法的权利。在本出版物中使用通用描述性名称、注册商标名称、商标、服务标志等，即使没有明确声明，也不意味着这些名称不受相关保护法律和法规的约束，因此可自由使用。出版商、作者和编辑可以假定，本书中的建议和信息在出版之日是真实准确的。出版商、作者或编辑均不对本文所含材料或可能存在的任何错误或遗漏提供明示或暗示的保证。出版商对已出版地图中的管辖权主张和机构隶属关系保持中立。\n\
    \n本书通过 Springer Science+Business Media New York 在全球图书贸易中发行，地址：233 Spring Street,\
    \ 6th Floor, New York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮件：orders-ny@springer-sbm.com，或访问\
    \ www.springeronline.com。Apress Media, LLC 是一家加利福尼亚有限责任公司，其唯一成员（所有者）是 Springer\
    \ Science + Business Media Finance Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州公司。\n\
    \n# 前言\n\n随着深度学习的近期进展和 TensorFlow 日益增长的普及，您可以看到机器学习模型在多个领域产生了巨大影响。对于开发者来说，这提供了一个绝佳的机会，可以将他们的技能应用于跨广泛领域的实际项目中。了解当今行业中的可用技术成为一项重要的资产。本书旨在为您提供基于深度神经网络（DNN）和最新版本\
    \ TensorFlow 的广泛实际应用。它全面涵盖了各种深度学习架构。本书完全以项目为导向，包含约 25 个完整实现的真实项目。\n\n第 1 章从 TensorFlow\
    \ 2 的介绍开始，描述了为什么它被认为是一个完整的机器学习平台。它描述了 TensorFlow 的各种新增功能，例如 `tf.keras` 集成、即时执行、分布式训练、在边缘设备上的部署以及数据管道的使用。最后，它为设置本书中运行项目的开发环境提供了指导。\n\
    \n第 2 章深入探讨 TensorFlow 2。按照惯例，我们从一种简单的“Hello World”类应用程序开始，向您介绍完整的机器学习开发周期。然后，本章处理一个二分类问题，这是任何机器学习课程开始时教授的典型应用。在这里，您将了解数据预处理、使用\
    \ `tf.keras` API 定义密集神经网络、训练模型，以及使用 TensorBoard 指标和传统混淆矩阵评估其性能。该项目不仅涉及分类，还教您如何在运行时将数据加载到开发环境中、如何预处理数据、如何开发机器学习模型，以及最后如何使用\
    \ TensorBoard 分析和其他传统技术评估模型性能。\n\n第 3 章深入探讨 `tf.keras` 模块。它向您介绍了用于模型构建的函数式 API。它讨论了\
    \ TensorFlow 中的面向对象，并展示了如何为您的模型创建类层次结构，以及如何通过子类化创建自定义层。您将学习如何使用 TensorFlow 的新\
    \ `SavedModel` 接口保存模型，以及保存部分或完整模型的几种方法。然后，您将使用 `tf.keras` 中预定义的卷积神经网络（CNN）层进行一个多类分类项目。同样，与传统的教学方式不同，我将向您展示如何尝试不同的网络架构以优化模型性能。\n\
    \n由于使用多个 CNN 层训练深度神经网络非常消耗资源，在第 4 章中，我将向您展示如何利用他人的训练成果。本章涉及迁移学习，即利用领域专家的知识和他人模型开发的努力，几乎毫不费力地为您所用。本章包含两个项目。第一个项目向您展示如何使用预训练的\
    \ `ImageNet` 分类器对您自己的图像集进行分类。第二个项目向您展示如何基于预训练模型构建您自己的分类器。\n\n任何机器学习训练都从分类和回归问题开始。在前面的章节中，我们深入探讨了分类。问题来了：我们能否将深度神经网络用于回归分析，而我们已经有了几种成功的基于统计的技术可供使用？在第\
    \ 5 章中，我将借助三种不同的密集神经网络架构，向您展示如何使用 DNN 进行回归。\n\n尽管使用预训练模型简化了您的自定义模型开发，但在许多情况下，您找不到适合您目的的预训练模型。从头开始开发模型需要大量的管道工作；在这些情况下，TensorFlow\
    \ 中的 Estimator 可以为您提供帮助。第 6 章涉及 Estimator。它包含四个项目。前两个项目描述了如何使用预定义的 Estimator 进行分类，然后进行回归。第三个项目讨论了如何从头开始创建自定义\
    \ Estimator，最后一个项目讨论了为预训练模型创建自定义 Estimator。\n\n第 7 章讨论了文本生成技术。它描述了用于文本生成的传统 RNN（循环神经网络）和\
    \ LSTM（长短期记忆）技术，并向您展示如何使用 LSTM 进行一个简单的应用程序——生成婴儿名字。本章的下一个项目使用一些先进的文本生成技术来创建与托尔斯泰著名小说语言风格相匹配的文本。由于训练文本生成模型是一个非常漫长的过程，我将展示一些执行此类长时间训练的技术，向您展示如何在中断的训练（可能是有意或无意的中断）后继续训练。\n\
    \n第 8 章将带您进一步了解文本生成，其中我描述了 seq2seq 模型、编码器/解码器架构，以及最近用于语言翻译的注意力模型。本章深入介绍了使用 GloVe\
    \ 词嵌入的英译西翻译器。它向您展示了如何使用编码器、解码器和注意力层定义您自己的机器学习模型。\n\n第 9 章描述了用于文本生成的最先进技术。它描述了用于自然语言处理的最新基于\
    \ Transformer 的架构。一个完整的深入项目将教您如何在 Python 中自行构建 Transformer 模型，而不是完全依赖像 BERT（来自\
    \ Transformer 的双向编码器表示）这样的预训练模型。\n"
- fmt: 'After text generation, the book takes you into image processing. Chapter [10](#495303_1_En_10_Chapter.xhtml)
    teaches you how to process an image and use an `LSTM` architecture that you learned
    in Chapters [7](#495303_1_En_7_Chapter.xhtml) and [8](#495303_1_En_8_Chapter.xhtml)
    to generate a caption for an image. The chapter deals with a hands-on project
    for image captioning. The project uses a pre-trained model, `InceptionV3`, for
    image processing. This is yet another practical use of transfer learning that
    you learned in Chapter [4](#495303_1_En_4_Chapter.xhtml). It shows you how to
    create a decoder with Bahdanau Attention. In the end, you will use this model
    for captioning any image taken from the Web.


    Chapter [11](#495303_1_En_11_Chapter.xhtml) takes you into another domain of machine
    learning, and that is time series analysis and forecasting. The chapter gives
    you two full projects – one for a univariate time series forecasting and the other
    one for a multivariate time series forecasting.


    Chapter [12](#495303_1_En_13_Chapter.xhtml) deals with yet another aspect of machine
    learning that can apply the style of a famous painter to your own camera-captured
    pictures to make them look like the paintings created by the famous painter. We
    call this style transfer. The chapter contains two projects. The first project
    shows you how to use a pre-trained model from the `TensorFlow` hub to perform
    a quick style transfer. By doing this, you will understand what is a style transfer.
    The next project takes you deeper into the technique where you would use a predefined
    `VGG16` architecture to extract the features of an image and a famous painting.
    Then, you will learn how to define an evaluator to compare the content and style
    losses during a style transfer to create a final stylized picture.


    Chapter [13](#495303_1_En_4_Chapter.xhtml) deals with another important `DNN`
    architecture called `GAN` (Generative Adversarial Networks). It contains a total
    of three projects. The first one is trivial. It shows you how to use `GAN` for
    generating images for handwritten digits. The second one takes you further into
    the generation of handwritten alphabets. The last one finally takes you into the
    most advanced use of `GANs` for generating complex anime colored character images.


    Chapter [14](#495303_1_En_14_Chapter.xhtml) teaches you an important technique
    of image manipulation, that is, how to colorize a B&W image. You use `AutoEncoder`
    for colorizing an image. The chapter describes two projects. The first one shows
    you how to build an `AutoEncoder` of your own. The second one uses a pre-trained
    `VGG16` model for encoding to improve the model’s performance.


    The book gives an exhaustive collection of several deep neural network architectures
    with an emphasis on their practical usage in real-life scenarios. So, get started!


    ## Acknowledgments


    I would first like to thank my past student Prof. Abhijit Gole, who is currently
    a faculty member in the Department of Computer Science at an autonomous college
    affiliated to the University of Mumbai. Abhijit initiated me into delivering a
    postgraduate course in machine learning to his students. This triggered my interest
    in guiding students in machine/deep learning for their projects at the master’s
    level and in guiding those pursuing Ph.D.


    My sincere thanks to my four intern students for their contribution in developing
    this book. Mukul Rawat graduated this year (2020), and Karan Aryan, Chandrakant
    Sharma, and Udit Dashore will be graduating next year (2021). All four are brilliant
    students, and without their help in developing the projects in this book, I would
    have taken much longer time in completing this book. All of them took painstaking
    efforts in reviewing the first draft of this book for technical discrepancies.


    I would like to thank Mr. Aaron Black, Senior Editor, Apress, who gave me the
    opportunity to author this book, taking quick decisions on the book’s outline
    and providing me the desired flexibility in finalizing the outline as I kept developing
    the contents. I would like to thank Jessica Vakili, Coordinating Editor, for her
    excellent coordination on various fronts, especially on tech review. I would also
