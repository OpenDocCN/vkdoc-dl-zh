    请注意，在第 12/13/14 次迭代时，验证数据集上的准确率分别为 0.8161/0.8122/0.8122，表明训练已饱和。在验证数据上测试准确率可以让你了解模型在训练集之外的情况下的泛化能力。


    ### 检查日志


    你现在可以使用以下魔术命令在你的 Colab 环境中打开 TensorBoard：


    ```

    %tensorboard --logdir logs

