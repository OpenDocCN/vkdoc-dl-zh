  trans: '

    #### 导入 TensorFlow 2.x


    要在 Python 笔记本中导入 TensorFlow，你需要使用以下程序语句：


    ```

    import tensorflow as tf

    ```


    这会导入默认版本，目前（撰写本文时）是 1.x。执行上述命令的输出如图 2-3 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig3_HTML.jpg](img/495303_1_En_2_Fig3_HTML.jpg)


    图 2-3 — 默认的 TensorFlow 库导入


    由于本书基于 TensorFlow 2.x，我们需要显式导入它。为此，你必须运行一个 `tensorflow_version` 魔法命令。魔法命令是 Colab
    的一项功能，通过以下语句运行：


    ```

    %tensorflow_version 2.x

    ```


    当你运行这段代码时，TensorFlow 2.x 将被选中。输出如图 2-4 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig4_HTML.jpg](img/495303_1_En_2_Fig4_HTML.jpg)


    图 2-4 — 加载 TensorFlow 2.x


    在选中 TensorFlow 2.x 之后，你可以使用传统的导入语句来导入 TensorFlow 库，如下所示：


    ```

    import tensorflow as tf

    ```


    **注意：** 在当前版本的 Colab 中，不再需要使用魔法命令。


    Keras 库现在是 TensorFlow 的一部分。要在我们的应用中使用 Keras，我们需要从 TensorFlow 中导入它。这通过以下导入语句完成：


    ```

    from tensorflow import keras

    ```


    要使用 Keras 模块，你现在需要使用 `tf.keras` 语法。接下来，你将导入其他必需的库。


    #### 导入 NumPy


    NumPy 是一个用于在 Python 中支持大型多维数组的库。它包含一组高级数学函数，用于对这些数组进行操作。任何机器学习模型的开发都严重依赖于数组的使用。你将使用
    NumPy 数组来存储网络所需的输入数据。


    要导入 NumPy，请使用以下导入语句：


    ```

    import numpy as np

    ```


    `matplotlib` 是一个用于创建高质量二维图表的 Python 库。你将在我们的项目中使用这个库来绘制准确度和误差指标。


    要导入 `matplotlib`，请使用以下语句：


    ```

    import matplotlib.pyplot as plt

    ```


    至此，我们完成了应用的导入工作。接下来，你将创建应用所需的数据。


    ### 设置数据


    我们将创建一组包含 `x` 和 `y` 坐标的 100 个数据点。数据点的数量通过以下语句在 Python 变量中声明：


    ```

    number_of_datapoints = 100

    ```


    要生成 `x` 和 `y` 坐标，你需要使用 NumPy 中的 `random` 模块。要生成 `x` 值，请使用以下程序语句：


    ```

    # 生成范围在 -5 到 +5 之间的随机 x 值

    x = np.random.uniform(low = -5 , high = 5 ,

    size = (number_of_datapoints, 1))

    ```


    `uniform` 函数中的 `low` 和 `high` 参数定义了随机数生成器的下限和上限。`size` 参数指定了数组的维度，即要生成多少个值。上述程序语句的返回值是一个包含
    100 行和 1 列的数组。你可以使用以下语句打印生成数组的前五个值：


    ```

    x[:5,:].round(2)

    ```


    在输出中，通过调用 `round` 函数，每个值都被截断为两位小数。执行此语句的示例输出如下所示：


    ```

    array([[ 4.57],

    [-0.68],

    [ 2.64],

    [-3.17],

    [-4.86]])

    ```


    请注意，每次运行的输出都会有所不同。同样，`y` 值使用类似的语句生成，如下所示：


    ```

    y = np.random.uniform(-5 , 5 , size = (number_of_datapoints , 1))

    ```


    我们使用一个线性方程来建立 `x` 和 `y` 之间的关系：


    ```

    z = 7 * x + 6 * y + 5

    ```


    在机器学习术语中，`x` 和 `y` 是特征，`z` 是标签。一旦我们的模型训练完成，我们将要求模型根据给定的 `x` 和 `y` 预测 `z`。我之前提到过，我们将训练网络来发现
    `x` 和 `y` 之间的关系。为此，我们需要在我们使用上述方程计算的每个 `z` 值中引入一些噪声。你使用与之前相同的 `random` 函数生成噪声，其值范围从
    –1 到 +1，使用以下语句：


    ```

    noise = np.random.uniform(low =-1 , high =1,

    size = (number_of_datapoints, 1))

    ```


    现在，你使用线性方程创建 `z` 数组，并向其中添加噪声，如下所示：


    ```

    z = 7 * x + 6 * y + 5 + noise

    ```


    我们神经网络的输入是一个一维数组，包含 100 行，每行由另一个一维数组组成，该数组以 `x` 和 `y` 值作为列。要创建所需的输入数据格式，你需要使用
    `column_stack` 函数，如下所示：


    ```

    input = np.column_stack((x,y))

    ```


    打印 `input` 数组的前五个值会产生以下输出：


    ```

    array([[-1.9 ,  2.91],

    [-2.14, -0.81],

    [ 4.18,  1.79],

    [-0.93, -4.41],

    [-1.8 , -1.31]])

    ```


    至此，你已经准备好了用于训练网络的数据。我们的下一个任务是创建网络本身。


    ### 定义神经网络


    如前所述，我们的神经网络将包含一个单一的神经元，该神经元接受一个一维向量并输出一个单一值。该网络如图 2-5 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig5_HTML.jpg](img/495303_1_En_2_Fig5_HTML.jpg)


    图 2-5 — 单层/单节点网络


    为了定义网络模型，Keras 提供了一个 Sequential API。使用这个 API，你将能够构建多层次的复杂网络架构。在我们当前的需求中，我们需要创建一个由单层单神经元组成的
    ANN 架构。你使用以下语句定义模型：


    ```

    model = tf.keras.Sequential([keras.layers.Dense(units=1, input_shape=[1])])

    ```


    `units` 参数定义了输出空间的维度。在这里，通过指定值为 1，你定义了一个单层网络，其中包含一个输出单一值的神经元。`Dense` 函数接受多个参数，允许你创建复杂的
    ANN 架构。在本书中，你将使用 `keras.Sequential` API 创建许多复杂的架构。


    模型定义完成后，我们需要编译它，并使其准备好在我们数据集上进行训练。

    '
- fmt: '### Compiling Model


    To train a model, we first need to define a learning process. The model compilation
    is a way of setting up its learning process. The learning process itself consists
    of a few components:


    - Objective loss function

    - Optimizer

    - Metrics


    Firstly, it uses some loss function to determine how far the inference is from
    the target value. The model tries to minimize the loss during its training. Keras
    provides several predefined loss functions, to name a few, `categorical_crossentropy`,
    `mean_squared_error`, `huber_loss`, and `poisson`. Secondly, to help in reducing
    the losses, we use an optimizer. An optimizer is an algorithm or a method used
    to change the attributes of a neural network. The attributes are the weights and
    the learning rate. By changing these attributes, we try to minimize the losses.
    Keras provides several predefined optimizers, again to name a few, `SGD` (stochastic
    gradient descent), `RMSprop`, `Adagrad`, and `Adam`. Lastly, we define a metric
    function that is used to judge the performance of the model – to name a few predefined
    metric functions, `MSE` (mean squared error), `RMSE` (root mean squared error),
    `MAE` (mean absolute error), and `MAPE` (mean absolute percentage error).


    So we set up the learning process by calling the `compile` function on the model.
    The `compile` takes the abovesaid three parameters as its arguments. The following
    code segment illustrates the use of `compile`:


    ```

    model.compile(optimizer = ''sgd'' ,

    loss = ''mean_squared_error'' ,

    metrics = [''mse''] )

    ```


    Here we specify the stochastic gradient descent as the optimizer, the mean squared
    error as the loss function, and again the mean squared error as the metrics.


    Now, as the model knows the learning process, it is time to feed some training
    data to it.


    ### Training Network


    The model is trained in several iterations. Initially, we assign some preset weights
    to the various nodes in the network. After the first training iteration, we look
    at the losses and then adjust these weights for the second iteration where we
    try to minimize the losses. The process continues through several iterations;
    we call it epochs. At the end of each epoch, we save and monitor the losses to
    ensure that we are optimizing the network in the right direction. To save this
    state, we need to create a history object in Keras, which is done using the following
    code segment:


    ```

    from tensorflow.keras.callbacks import History

    history = History()

    ```


    We will pass the preceding `history` object to the model training method as a
    parameter. The training itself is done by calling the model''s `fit` method as
    shown here:


    ```

    model.fit(input, z , epochs = 15 , verbose = 1,

    validation_split = 0.2, callbacks = [history])

    ```


    The first parameter specifies the stacked input that we have created earlier.
    The second parameter specifies the target values. The `epochs` parameter defines
    the number of iterations. The `verbose` parameter specifies if you want to observe
    the training progress. The `validation_split` parameter specifies that 20% of
    the given data would be used for validating the trained model. Lastly, the `callbacks`
    parameter specifies where the intermediate monitoring data would be stored. It
    specifies the callback function which is called at the end of each epoch. The
    partial output during training is shown in Figure [2-6](#495303_1_En_2_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig6_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Output during model training


    Once all epochs are completed, the model is supposedly trained. We need to verify
    that the model is indeed trained to meet our needs. To do so, we will examine
    the training output by observing the metrics that we have asked the model to create
    during its learning.


    ### Examining Training Output


    We have asked the model to save the status at each epoch in a `history` variable.
    We can examine what is recorded in `history` with the help of the following statement:


    ```

    print(history.history.keys())

    ```


    The output of this print statement would be:


    ```

    dict_keys([''loss'', ''mse'', ''val_loss'', ''val_mse''])

    ```


    We see that at each epoch the model has saved the `loss` and the `mse` (mean squared
    error) on both the training and the validation data. The validation loss and `mse`
    are indicated with the prefix `val_`. We will now create a plot for both `loss`
    and `mse`. To print the loss on both the training and validation data, use the
    following code segment:


    ```

    plt.plot(history.history[''loss''])

    plt.plot(history.history[''val_loss''])

    plt.title(Accuracy'')

    plt.ylabel(''loss'')

    plt.xlabel(''epoch'')

    plt.legend([''train'', ''validation''], loc=''upper right'')

    plt.show()

    ```


    Here, we plot the `loss` and `val_loss` key values from the recorded history.
    The output is shown in Figure [2-7](#495303_1_En_2_Chapter.xhtml#Fig7).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig7_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    The loss vs. epoch


    We observe from Figure [2-7](#495303_1_En_2_Chapter.xhtml#Fig7) that the loss
    is minimized quite early by the end of the third epoch, and the model is fully
    trained by the end of 15 epochs that we have specified in the `fit` method. We
    will also print the mean squared error to further verify this claim. To plot the
    `mse`, use the following code segment:


    ```

    plt.plot(history.history[''mse''])

    plt.plot(history.history[''val_mse''])

    plt.title(''mean squared error'')

    plt.ylabel(''mse'')

    plt.xlabel(''epochs'')

    plt.legend([''train'' , ''validation''] , loc = ''upper right'')

    plt.show()

    ```


    The output of the execution of the preceding code is shown in Figure [2-8](#495303_1_En_2_Chapter.xhtml#Fig8).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig8_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    mse vs. epoch


    Lastly, we will also plot the predicted output vs. the real output using the following
    code segment:


    ```

    plt.plot(np.squeeze(model.predict_on_batch(input)), np.squeeze(z))

    plt.xlabel(''predicted output'')

    plt.ylabel(''real output'')

    plt.show()

    ```


    The program output is shown in Figure [2-9](#495303_1_En_2_Chapter.xhtml#Fig9).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig9_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Predicted vs. real output values


    As you observe in Figure [2-9](#495303_1_En_2_Chapter.xhtml#Fig9), the output
    predicted by the model is very close to the expected output. So, we can certainly
    assume that the model is well trained. To pass the test, we need to test the model''s
    prediction on unseen data, which is done next.


    ### Predicting


    To make a prediction on an unseen `x` and `y` values, you will use the `predict`
    function on the trained model. This is shown in the following program statement:


    ```

    print("Predicted z for x=2, y=3 ---> ",

    model.predict([[2,3]]).round(2))

    ```


    Here, we specify `x` equals 2 and `y` equals 3. The result is rounded to two decimal
    digits. When you execute the preceding print statement, you would see the following
    output:


    ```

    Predicted z for x=2, y=3 ---> [[36.99]]

    ```


    Now, let us check whether the prediction is close enough to the expected output.
    To see the expected output, run the following code:


    ```

    # Checking from equation

    # z = 7*x + 6*y + 5

    print("Expected output: ", 7*2 + 6*3 + 5)

    ```


    The execution prints 37 on the screen. Our model''s prediction is 36.99, which
    is close enough to the expected value. Note that if you run the code, the predicted
    output would vary on each run because the model''s accuracy varies each time.
    You can test the model''s predictions with a few more `x` and `y` values to satisfy
    yourself on the model''s training.'
