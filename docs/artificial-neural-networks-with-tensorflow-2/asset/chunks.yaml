    ```


    You can then check the maximum value for the predictions. If this value is less
    than a certain threshold, you may conclude that the given image is not of a dog
    at all.


    ```

    if result_proba.max() > 0.7:

    print(pred_label)

    else:

    print(''Not a dog breed as the predicted probability is {}''.format(result_proba.max()))

    ```


    The output of running this code is shown in Figure [4-26](#495303_1_En_4_Chapter.xhtml#Fig26).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig26_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig26_HTML.jpg)


    Figure 4-26


    Prediction result on an unseen image


    Now, you will be able to appreciate the usefulness of transfer learning. As the
    MobileNet model was trained on a wide variety of categories, we could use its
