  trans: "\n### 自定义层\n\n自定义类继承自 `tf.keras.layers.Layer`。你需要重写四个函数：`init`、`build`、`call`\
    \ 和 `compute_output_shape`。一个典型的自定义类定义如下方代码所示：\n\n```\nclass MyLayer(tf.keras.layers.Layer):\n\
    \    def __init__(self, output_dim, **kwargs):\n        self.output_dim = output_dim\n\
    \        super(MyLayer, self).__init__(**kwargs)\n    def build(self, input_shape):\n\
    \        self.W = self.add_weight(name='kernel',\n                           \
    \      shape=(input_shape[1], self.output_dim),\n                            \
    \     initializer='uniform',\n                                 trainable=True)\n\
    \        self.built = True\n    def call(self, x):\n        return tf.matmul(x,\
    \ self.W)\n    def compute_output_shape(self, input_shape):\n        return (input_shape[0],\
    \ self.output_dim)\n```\n\n在 `init` 方法中，我们调用了父类的构造函数，并设置了输出的维度。在 `build` 方法中，我们设置了初始权重矩阵。矩阵的形状借助输入参数\
    \ `input_shape` 来设定。权重通过 `initializer` 参数设置为均匀分布。并且我们将此矩阵设置为可训练的。在 `call` 方法中，我们设定了要对权重矩阵执行的任何操作。在当前代码中，我们对权重与输入向量\
    \ `x` 执行矩阵乘法。最后，`compute_output_shape` 返回输出维度。\n\n现在，你可以在任何网络配置中使用这个自定义层，如下方代码片段所示：\n\
    \n```\nmodel = tf.keras.Sequential([\n    tf.keras.layers.Dense(256, input_shape=(784,)),\n\
    \    tf.keras.layers.Dense(256, activation='relu'),\n    MyLayer(10),\n    tf.keras.layers.Dense(10,\
    \ activation='softmax')\n])\n```\n\n请注意自定义层是如何被添加在两个 `Dense` 层之间的。事实上，你可以将自定义层添加到网络中任何你想要的位置。上述配置的网络结构图如图\
    \ 3-4 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig4_HTML.jpg](img/495303_1_En_3_Fig4_HTML.jpg)\n\
    \n**图 3-4** 包含自定义层的网络\n\n现在，你可以使用通常的 `compile` 函数来编译模型：\n\n```\nmodel.compile(optimizer='adam',\n\
    \              loss=tf.keras.losses.binary_crossentropy,\n              metrics=['accuracy'])\n\
    ```\n\n最后，通过调用模型的 `fit` 方法来训练它：\n\n```\nmodel.fit(x, y1, batch_size=32, epochs=30)\n\
    ```\n\n自定义层的完整项目代码可在本书的下载资源中找到。\n\n创建自定义层让你在设计复杂的网络架构时拥有极大的灵活性。在本书中，你将使用函数式 API\
    \ 创建各种各样的网络拓扑结构。\n\n## 保存模型\n\n通常，在模型完全训练好后，你会将其保存到磁盘，以便后续部署到生产机器上。不仅如此，你在 `tf.keras`\
    \ 中创建的模型也可以在训练过程中的任何时刻保存。利用这个保存的模型，你可以从之前中断的地方恢复训练。这有助于避免在单次会话中花费过长的训练时间。此外，你可以与他人共享保存的模型，以便他们能够重现并继续你的工作。`tf.keras`\
    \ 提供了几种保存工作成果的方法，接下来将进行讨论。\n\n### 保存整个模型\n\n当你保存整个模型时，以下信息将被保存：\n\n*   模型的架构\n\
    *   权重\n*   你传递给其 `compile` 方法的训练配置\n*   优化器及其状态\n\n要保存模型，你将使用以下代码：\n\n```\nmodel.save('filename.h5')\n\
    ```\n\n要重新创建模型，你将使用以下代码：\n\n```\nnew_model = keras.models.load_model('filename.h5')\n\
    ```\n\n#### 导出为 SavedModel 格式\n\nTensorFlow 使用一种名为 SavedModel 的独立序列化格式，该格式可供除\
    \ Python 之外的 TensorFlow 实现使用。TensorFlow Serving 也支持此格式。要将整个模型保存为此格式，你将使用以下代码：\n\
    \n```\nmodel.save('filename', save_format='tf')\n```\n\n要加载保存的模型，你将使用：\n\n```\n\
    new_model = keras.models.load_model('filename')\n```\n\n#### 保存架构\n\n在某些情况下，你可能只对保存模型的架构感兴趣，而不关心其权重值或优化器状态。在这种需求下，你可以调用\
    \ `get_config` 方法来检索模型的配置，并在之后使用它来在保存的实例上重新创建模型。如下方代码片段所示：\n\n```\n# 检索并保存模型配置\n\
    config = model.get_config()\n# 重新创建模型\nmodel = keras.Model.from_config(config)\n\
    ```\n\n请注意，当你像此语句所示那样重新创建模型时，你将丢失所有先前学习到的信息。\n\n#### 保存权重\n\n在某些情况下，你可能只对保存模型的训练状态感兴趣，而不关心其架构。在这种情况下，你可以使用\
    \ `get_weights` 和 `set_weights` 方法来单独保存和检索权重。如下方代码所示：\n\n```\n# 检索模型状态\nweights\
    \ = model.get_weights()\n# 恢复状态\nmodel.set_weights(weights)\n```\n\n**注意：** 默认情况下，自定义层不支持\
    \ `model.save()` 和 `model.get_config()`。你需要重写 `get_config()` 以支持自定义层。不过，自定义层支持保存权重。\n\
    \n#### 保存为 JSON 格式\n\n有时，你可能希望将模型保存为 JSON 格式。你可以使用以下代码片段来实现：\n\n```\nfrom keras.models\
    \ import model_from_json\n# 序列化为 JSON\njson_model = model_1.to_json()\nwith open(\"\
    model_1.json\", \"w\") as json_file:\n    json_file.write(json_model)\n# 加载 JSON\
    \ 并重新创建模型\nfrom keras.models import model_from_json\nfile = open('model_1.json',\
    \ 'r')\nbuffer = file.read()\nfile.close()\nmodel = tf.keras.models.model_from_json(buffer)\n\
    ```\n\n考虑以下模型定义：\n\n```\nmodel_1 = tf.keras.Sequential([\n    Conv2D(32, (3, 3),\
    \ activation='relu', padding='same', input_shape=(32, 32, 3)),\n    Conv2D(32,\
    \ (3, 3), activation='relu', padding='same'),\n    MaxPooling2D((2, 2)),\n   \
    \ Dense(128, activation='relu'),\n    Dense(10, activation='softmax')\n])\n```\n\
    \n当你将此模型架构保存为 JSON 格式时，你将看到如清单 3-1 所示的代码：\n\n```\n{\n    \"class_name\": \"Sequential\"\
    ,\n    \"config\": {\n        \"name\": \"sequential_3\",\n        \"layers\"\
    : [\n            {\n                \"class_name\": \"Conv2D\",\n            \
    \    \"config\": {\n                    \"name\": \"conv2d_2\",\n            \
    \        \"trainable\": true,\n                    \"batch_input_shape\": [null,\
    \ 32, 32, 3],\n                    \"dtype\": \"float32\",\n                 \
    \   \"filters\": 32,\n                    \"kernel_size\": [3, 3],\n         \
    \           \"strides\": [1, 1],\n                    \"padding\": \"same\",\n\
    \                    \"data_format\": \"channels_last\",\n                   \
    \ \"dilation_rate\": [1, 1],\n                    \"activation\": \"relu\",\n\
    \                    \"use_bias\": true,\n                    \"kernel_initializer\"\
    : {\n                        \"class_name\": \"GlorotUniform\",\n            \
    \            \"config\": { \"seed\": null }\n                    },\n        \
    \            \"bias_initializer\": {\n                        \"class_name\":\
    \ \"Zeros\",\n                        \"config\": {}\n                    },\n\
    \                    \"kernel_regularizer\": null,\n                    \"bias_regularizer\"\
    : null,\n                    \"activity_regularizer\": null,\n               \
    \     \"kernel_constraint\": null,\n                    \"bias_constraint\": null\n\
    \                }\n            }\n        ]\n    },\n    ...\n    \"keras_version\"\
    : \"2.2.4-tf\",\n    \"backend\": \"tensorflow\"\n}\n```\n\n**清单 3-1** 模型的 JSON\
    \ 表示形式\n\n保存为 JSON 格式的项目代码可在本书的下载资源中找到。\n\n通过对 `tf.keras` 的简要介绍，现在我将带你进入更实用的 `tf.keras`\
    \ 学习方法。在下一节中，你将基于卷积神经网络（CNN）开发一个图像分类模型。\n"
- fmt: '# Convolutional Neural Networks


    Before you start defining the network for image classification, let me give you
    a few concepts. Look at the image shown in Figure [3-5](#495303_1_En_3_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig5_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Color image 275x183 pixels


    If I ask you what the image shows? You would immediately say that it shows a bird.
    This image is of size 275x183 pixels with each pixel representing a color value
    with RGB components in it. I will now convert the same image into a B&W sketch.
    The new image is shown in Figure [3-6](#495303_1_En_3_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig6_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Sketched B&W image 275x183 pixels


    Again, if I asked you what does it show? You would say that this is a bird. Now,
    I will scale down the image to 32x32 pixels. The new scaled down image is shown
    in Figure [3-7](#495303_1_En_3_Chapter.xhtml#Fig7).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig7_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Scaled down image 32x32 pixels


    You can still make out that the image shows a bird. Now, let us come to a point
    to understand why all these transformations when you have a beautiful picture
    of a bird for your eyes to appreciate? If our objective is to make the machine
    learn to interpret (classify) objects in a given image, do we need to feed such
    high-resolution images to the computer? If a human-being can make the prediction
    even by looking at a stripped-down version of the image, why can’t we have the
    computer learn the basics of image recognition on such stripped-down images? The
    reason for doing this is that the high resolution images contain lots of “bits”
    information that is redundant for our purpose of object identification. Feeding
    lots of “bits” into a computer would demand lots of memory and processing power,
    both of which are very scarce in this world. Thus, to reduce the training time
    required by a neural network and avoiding the use of heavy resources, we will
    use stripped-down images in our dataset. The Figure [3-8](#495303_1_En_3_Chapter.xhtml#Fig8)
    shows another picture of an automobile. The original image is of size 200x200.
    You can still make out in the stripped-down 32x32 image that it is a car.


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig8_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Car image and the transformations


    A lot of research has already been done on image classification and people have
    successfully designed ANN architectures to achieve a high level of accuracy. The
    above-described process of image transformation is called convolution. The exact
    definition and explanation of image convolution is beyond the scope of this book
    as this book primarily focuses on building high-performance networks in TF2.x.
    Researchers have designed networks called Convolutional Neural Networks (CNN)
    to solve the image classification and object recognition problems. The CNN contains
    convolutional layers followed by a few more layers of different types. A typical
    CNN architecture containing two convolutional layers is shown in Figure [3-9](#495303_1_En_3_Chapter.xhtml#Fig9).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig9_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    CNN architecture


    Fortunately, as seen earlier, `tf.keras` provides several ready-to-use layers
    that include convolution, pooling, flatten, etc. Your task is now to assemble
    these layers in a proper order and architecture. And that’s what you are going
    to learn in the next section where you will be creating 5 different CNN architectures
    and evaluate their performances.


    ## Image Classification with CNN


    In this section, you will learn how to classify a given image into one of the
    known types. Suppose, you are shown a certain image and asked to identify an object
    displayed in the image. For a human-being, this is usually a simple task. But
    for the machine to interpret the image and classify it to a known object type
    is not an easy task to learn. Fortunately, a lot of research and development has
    already been done in this domain and you have many trained ready-to-use ML models
    that correctly identify an object in a given image with a great degree of accuracy.
    In this project, you will learn how to develop such a model on your own with the
    help of libraries provided in `tf.keras`. So, let us get started with the project.


    ### Creating Project


    Open a new Python3 notebook in Colab and name it `Ch3-imageClassifier`. Load and
    import TensorFlow 2.x as using the following code:


    ```

    import tensorflow as tf

    ```


    The huge amounts of data are the primary necessity for any machine learning project.
    To our luck, for image classification somebody has already taken lots of efforts
    in collecting images and cleansing them so that they are ready for feeding to
    your image classification algorithm. Your task will now be just to develop a model
    and keep on refining it so that it can detect objects in a given image with acceptable
    amounts of accuracy. Before we look into this model development let us look at
    what dataset is available for our use.'
