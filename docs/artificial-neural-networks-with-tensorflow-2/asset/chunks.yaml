    值为 0 表示该客户不太可能离开银行。请注意，此预测的准确率仍约为之前计算的 83%。


    在模型完全训练到令你满意之后，你可以将其保存到磁盘，并部署到生产服务器上进行实际应用。具体如何操作将在下一章深入讨论 `tf.keras` 实现时进行说明。

