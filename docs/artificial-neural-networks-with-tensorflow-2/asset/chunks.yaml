  trans: '

    ### 编译模型


    要训练模型，我们首先需要定义一个学习过程。模型编译就是设置其学习过程的一种方式。学习过程本身包含以下几个组成部分：


    - 目标损失函数

    - 优化器

    - 评估指标


    首先，它使用某个损失函数来确定推理结果与目标值之间的差距。模型在训练过程中会尝试最小化这个损失。Keras 提供了几个预定义的损失函数，例如 `categorical_crossentropy`、`mean_squared_error`、`huber_loss`
    和 `poisson`。其次，为了帮助减少损失，我们使用优化器。优化器是一种用于改变神经网络属性的算法或方法。这些属性包括权重和学习率。通过改变这些属性，我们试图最小化损失。Keras
    提供了几个预定义的优化器，再举几个例子，如 `SGD`（随机梯度下降）、`RMSprop`、`Adagrad` 和 `Adam`。最后，我们定义一个用于评判模型性能的评估指标函数——举几个预定义的评估指标函数为例，如
    `MSE`（均方误差）、`RMSE`（均方根误差）、`MAE`（平均绝对误差）和 `MAPE`（平均绝对百分比误差）。


    因此，我们通过在模型上调用 `compile` 函数来设置学习过程。`compile` 函数将上述三个参数作为其参数。以下代码片段说明了 `compile`
    的用法：


    ```

    model.compile(optimizer = ''sgd'' ,

    loss = ''mean_squared_error'' ,

    metrics = [''mse''] )

    ```


    这里，我们指定随机梯度下降作为优化器，均方误差作为损失函数，并且同样将均方误差作为评估指标。


    现在，既然模型已经了解了学习过程，是时候向其输入一些训练数据了。


    ### 训练网络


    模型的训练需要经过多次迭代。最初，我们为网络中的各个节点分配一些预设的权重。在第一次训练迭代之后，我们查看损失，然后调整这些权重以进行第二次迭代，并在此次迭代中尝试最小化损失。这个过程会持续多次迭代；我们称之为轮次（epochs）。在每个轮次结束时，我们保存并监控损失，以确保我们正朝着正确的方向优化网络。为了保存这种状态，我们需要在
    Keras 中创建一个历史对象，这可以通过以下代码片段完成：


    ```

    from tensorflow.keras.callbacks import History

    history = History()

    ```


    我们将把前面的 `history` 对象作为参数传递给模型训练方法。训练本身是通过调用模型的 `fit` 方法来完成的，如下所示：


    ```

    model.fit(input, z , epochs = 15 , verbose = 1,

    validation_split = 0.2, callbacks = [history])

    ```


    第一个参数指定了我们之前创建的堆叠输入。第二个参数指定了目标值。`epochs` 参数定义了迭代次数。`verbose` 参数指定你是否希望观察训练进度。`validation_split`
    参数指定将使用给定数据的 20% 来验证训练好的模型。最后，`callbacks` 参数指定了中间监控数据的存储位置。它指定了在每个轮次结束时调用的回调函数。训练过程中的部分输出如图
    2-6 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig6_HTML.jpg](img/495303_1_En_2_Fig6_HTML.jpg)


    图 2-6


    模型训练期间的输出


    一旦所有轮次完成，模型应该就训练好了。我们需要验证模型是否确实训练得符合我们的需求。为此，我们将通过观察模型在学习过程中被要求创建的评估指标来检查训练输出。


    ### 检查训练输出


    我们要求模型在每个轮次将状态保存到一个 `history` 变量中。我们可以借助以下语句来检查 `history` 中记录了哪些内容：


    ```

    print(history.history.keys())

    ```


    这条打印语句的输出将是：


    ```

    dict_keys([''loss'', ''mse'', ''val_loss'', ''val_mse''])

    ```


    我们看到，在每个轮次，模型都保存了训练数据和验证数据上的 `loss` 和 `mse`（均方误差）。验证损失和 `mse` 以 `val_` 前缀表示。现在，我们将为
    `loss` 和 `mse` 创建一个图表。要打印训练数据和验证数据上的损失，请使用以下代码片段：


    ```

    plt.plot(history.history[''loss''])

    plt.plot(history.history[''val_loss''])

    plt.title(Accuracy'')

    plt.ylabel(''loss'')

    plt.xlabel(''epoch'')

    plt.legend([''train'', ''validation''], loc=''upper right'')

    plt.show()

    ```


    这里，我们绘制了记录历史中的 `loss` 和 `val_loss` 键值。输出如图 2-7 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig7_HTML.jpg](img/495303_1_En_2_Fig7_HTML.jpg)


    图 2-7


    损失 vs. 轮次


    从图 2-7 中我们观察到，损失在第三个轮次结束时就已经降得很低了，并且模型在我们于 `fit` 方法中指定的 15 个轮次结束时已经完全训练好。我们还将打印均方误差以进一步验证这一说法。要绘制
    `mse`，请使用以下代码片段：


    ```

    plt.plot(history.history[''mse''])

    plt.plot(history.history[''val_mse''])

    plt.title(''mean squared error'')

    plt.ylabel(''mse'')

    plt.xlabel(''epochs'')

    plt.legend([''train'' , ''validation''] , loc = ''upper right'')

    plt.show()

    ```


    执行上述代码的输出如图 2-8 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig8_HTML.jpg](img/495303_1_En_2_Fig8_HTML.jpg)


    图 2-8


    均方误差 vs. 轮次


    最后，我们还将使用以下代码片段绘制预测输出与实际输出的对比图：


    ```

    plt.plot(np.squeeze(model.predict_on_batch(input)), np.squeeze(z))

    plt.xlabel(''predicted output'')

    plt.ylabel(''real output'')

    plt.show()

    ```


    程序输出如图 2-9 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig9_HTML.jpg](img/495303_1_En_2_Fig9_HTML.jpg)


    图 2-9


    预测输出 vs. 实际输出值


    正如你在图 2-9 中所观察到的，模型预测的输出与预期输出非常接近。因此，我们完全可以认为模型训练得很好。为了通过测试，我们需要在未见过的数据上测试模型的预测能力，接下来将进行这一步。


    ### 预测


    要对未见过的 `x` 和 `y` 值进行预测，你将在训练好的模型上使用 `predict` 函数。如下面的程序语句所示：


    ```

    print("Predicted z for x=2, y=3 ---> ",

    model.predict([[2,3]]).round(2))

    ```


    这里，我们指定 `x` 等于 2，`y` 等于 3。结果四舍五入到两位小数。当你执行上述打印语句时，你会看到以下输出：


    ```

    Predicted z for x=2, y=3 ---> [[36.99]]

    ```


    现在，让我们检查一下预测值是否足够接近预期输出。要查看预期输出，请运行以下代码：


    ```

    # Checking from equation

    # z = 7*x + 6*y + 5

    print("Expected output: ", 7*2 + 6*3 + 5)

    ```


    执行后会在屏幕上打印 37。我们模型的预测值是 36.99，与预期值非常接近。请注意，如果你运行代码，预测输出每次都会不同，因为模型的准确率每次都会变化。你可以用更多的
    `x` 和 `y` 值来测试模型的预测，以验证模型的训练效果。

