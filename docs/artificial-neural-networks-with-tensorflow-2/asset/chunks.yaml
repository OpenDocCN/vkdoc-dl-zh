  trans: '

    ### `CustomCallback` 类


    现在我们将创建另一个回调函数，用于写入模型的预测结果。我们会在每个 epoch 结束时将预测结果存储到一个文本文件中。我们创建一个全局变量来跟踪 epoch
    编号。


    ```

    epoch_number = 0

    ```


    我们声明一个用于存储预测结果的文件名：


    ```

    filename = ''predictions.txt''

    ```


    如果文件已存在，我们覆盖其内容。


    ```

    file = open(filename , ''w'')

    file.truncate()

    file.close()

    ```


    我们按如下方式声明自定义类：


    ```

    class CustomCallback(tf.keras.callbacks.Callback):

    ```


    我们使用以下语句定义一个名为 `on_epoch_end` 的方法：


    ```

    def on_epoch_end(self , epoch , logs = None):

    ```


    该方法将在每个 epoch 结束时被调用。在方法体中，我们首先增加全局 epoch 计数：


    ```

    global epoch_number

    epoch_number = epoch_number + 1

    ```


    我们以追加模式打开预测文件，以便添加我们的预测结果：


    ```

    filename = ''predictions.txt''

    file = open(filename , ''a'')

    ```


    我们声明种子文本：


    ```

    seed = "looking fo"

    ```


    我们通过一个简单的 for 循环从该种子文本创建一个模式：


    ```

    pattern = []

    for i in seed:

    value = char_to_ix[i]

    pattern.append(value)

    ```


    我们首先将 epoch 编号写入文件：


    ```

    file.seek(0)

    file.write("\n\n Epoch number :

    {}\n\n".format(epoch_number))

    ```


    我们设置一个循环来进行 100 次预测：


    ```

    for i in range(100):

    ```


    我们重塑并缩放输入数据：


    ```

    X = np.reshape(pattern ,

    (1, len(pattern) , 1))

    X = X/float(n_vocab)

    ```


    我们让模型预测给定种子文本的下一个字符：


    ```

    int_prediction = Model.predict(X ,

    verbose = 0)

    ```


    我们选取概率最大的字符，并将其复制到预测变量中：


    ```

    index = np.argmax(int_prediction)

    prediction = ix_to_char[index]

    ```


    我们将预测的字符写入文件：


    ```

    file.write(prediction)

    ```


    我们将预测的字符添加到模式中，并提取最后十个字符（我们种子文本的大小）以创建新模式：


    ```

    pattern.append(index)

    pattern = pattern[1:len(pattern)]

    ```


    现在我们迭代进行下一次预测。在预测 100 次之后，我们关闭文件：


    ```

    file.close()

    ```


    ### 模型训练


    创建两个回调函数后，我们现在使用以下语句训练模型：


    ```

    Model.fit(x, y , batch_size = 200,

    epochs = 10 ,

    callbacks = [CustomCallback() ,

    model_callbacks])

    ```


    我们定义了一个足够大的批次大小，即 200 个序列。在 `fit` 调用中指定了两个回调函数。自定义回调函数存储预测结果，模型回调函数存储模型状态。


    当我运行训练时，在 GPU 上每个 epoch 大约需要 550 秒。幸运的是，结果在每个 epoch 结束时都会保存。因此，无需担心超时或断开连接，因为我能够看到模型直到上次中断时的性能，并且还可以使用“结果”部分之后讨论的代码，从上一个断点继续进一步训练。


    ### 结果


    第一个、第五个和第十个 epoch 之后的预测结果如下：


    ```

    Epoch number : 1

    r the soldiers were all the same time the soldiers were all the same time the
    soldiers were all the

    Predictions after 5 epochs:

    Epoch number : 5

    r the first time to the countess was a serious and the servants and the servants
    and the servants an

    Predictions after 10 epochs:

    Epoch number : 10

    r the first time they had been sent to the countess was a still more than the
    countess was a still m

    ```


    你可以注意到，模型的性能在每个 epoch 都在不断提升。


    ### 训练续接


    要从最后一个已知的检查点继续训练，请使用以下代码：


    ```

    try:

    Model.load_weights(filepath)

    except Exception as error:

    print("Error loading in model : {}".format(error))

    ```


    我们只需从存储的检查点文件加载权重，然后调用模型的 `fit` 方法来继续训练。


    ```

    Model.fit(x, y , batch_size = 200, epochs = 10 ,

    callbacks = [CustomCallback() ,

    model_callbacks])

    ```


    请注意，epoch 编号将从全局 epoch 的最后一个值继续。


    以下是我继续训练总共 50 个 epoch 时的一些结果。


    ```

    Epoch number : 20

    r the first time to the countess was a small conversation with the state of a
    strange and the counte

    Epoch number : 30

    r the first time the soldiers who were all the same time he had seen and was about
    to see the counte

    Epoch number : 40

    r the first time the staff officer who had been at the same time he had seen him
    to the countess was

    Epoch number : 50

    r the first time the streets of the countess was a man of his soul and the same
    time he had seen and

    ```


    如你所见，随着训练的进行，模型的输出质量不断提升。


    ### 一些观察


    为了进行一些实验并减少训练时间，我将每个 LSTM 层中的节点数从 800 减少到 100。这确实将训练时间从大约 10 分钟缩短到了 2 分钟。在运行训练
    100 个 epoch 后，以下是几个时间点的结果：


    ```

    Epoch number : 1

    and the same and the same and the same and the same and the same and the same
    and the same and the

    Epoch number : 25

    and the service and the service and the service and the service and the service
    and the service and

    Epoch number : 50

    and the same to the same to the same to the same to the same to the same to the
    same to the same to

    Epoch number : 75

    and the strength to the same and the strength to the same and the strength to
    the same and the stre

    Epoch number : 100

    and the same and the same and the same and the same and the same and the same
    and the same and the

    ```


    如你所见，尽管 epoch 数量更多，但模型不再学习。我们可以得出结论，理解大型文本需要更多的内存，这通过增加每个 LSTM 层中的节点数来实现。


    我进行了另一个实验，将每个 LSTM 层中的节点数增加到 500。结果，训练时间增加到大约 11 分钟/epoch。以下是结果：


    ```

    Epoch number : 5

    the same time to the same time to the same time to the same time to the same time
    to the same time

    Epoch number : 10

    the countess was a strange and the same things and the same things and the same
    things and the same

    Epoch number : 15

    the countess and the same time the soldiers and the same time the soldiers and
    the same time the so

    Epoch number : 20

    , and the same time the countess was still the staff of the countess was still
    the staff of the coun

    ```


    我们看到通过增加节点数有所改进。在第 20 个 epoch，它甚至生成了一个逗号。继续进一步训练可能会进一步提升性能。

