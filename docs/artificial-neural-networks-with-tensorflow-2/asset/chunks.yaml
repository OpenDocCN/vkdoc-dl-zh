  trans: '

    ### 使用较小数据集进行训练


    由于在每种情况下收集大量数据点可能很困难，我们将检验迁移学习是否有助于我们利用较小的数据集开发出可用的模型。


    你首先需要编写一个名为 `train_model` 的函数，该函数可被一组模型调用。函数定义如下：


    ```

    model_performances = []

    # 用于在指定数量的图像上训练给定模型的函数

    def train_model (model, NUM_IMAGES):

    model.fit(x=train_data,

    epochs=NUM_EPOCHS,

    validation_data=val_data,

    callbacks=[model_tensorboard,

    model_early_stopping])

    # 追加结果

    model_performances.append(model.evaluate(val_data))

    ```


    `train_model` 函数接受两个参数：`model` 参数指定要训练的模型，`NUM_IMAGES` 指定用于训练模型的图像数量。该函数简单地调用模型的
    `fit` 方法进行训练，然后通过调用其 `evaluate` 方法来评估性能。评估结果会被添加到一个数组中，以便后续进行比较。


    该函数本身通过以下代码片段进行调用：


    ```

    # 训练

    NUM_EPOCHS = 100

    # 创建模型并测试 1000、2000、3000、4000 张图像

    for NUM_IMAGES in range(1000, 5000, 1000):

    model = create_model()

    x_train,x_val,y_train,y_val=train_test_split(X[:NUM_IMAGES],y[:NUM_IMAGES],test_size=0.2,random_state=10)

    train_data=create_data_batches(x_train,y_train,batch_size=10)

    val_data=create_data_batches(x_val,y_val,batch_size=10,data_type=2)

    train_model(model,NUM_IMAGES)

    model_performances.append(model.evaluate(val_data))

    ```


    在调用 `train_model` 之前，我们通过调用 `create_model` 函数来创建一个模型。我们针对指定数量的图像，将训练数据集分割为训练集和验证集。我们像之前一样预处理数据，然后在处理后的数据上训练所创建的模型。请记住，训练结束后，评估结果会存储在一个数组中。现在，你将创建一个用于存储损失和准确率指标的
    pandas 数据框：


    ```

    import pandas as pd

    comp = pd.DataFrame(model_performances,index = [1000,2000,3000,4000], columns
    = [''val_loss'', ''val_acc''])

    ```


    你可以使用以下代码绘制结果以进行可视化：


    ```

    # 绘制表格

    import matplotlib.pyplot as plt

    plt.style.use(''ggplot'')

    comp.plot.bar()

    plt.xlabel(''图像数量'')

    plt.ylabel(''性能值'')

    plt.show()

    ```


    输出图如图 4-27 所示。


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig27_HTML.jpg](img/495303_1_En_4_Fig27_HTML.jpg)


    图 4-27


    不同大小数据集上的误差指标


    从这些图中可以看出，准确率得分在大约 2000 张图像后趋于饱和。因此，与其在包含 10000 张图像的完整数据集上训练模型，不如在更小的数据集上训练，同时仍能获得可接受的结果。这将是迁移学习的一大优势，尤其是在你没有足够的数据点可用于训练时。


    现在，既然你已经完成了用于狗品种分类的新模型的创建，你可能会想将其投入实际使用。为此，我将向你展示如何保存训练好的模型，并在之后重新使用它来推断未见过的图像。


    ### 保存/重新加载模型


    要以 h5 格式保存训练好的模型，请调用其 `save` 方法：


    ```

    model.save(''model.h5'') # 保存模型

    ```


    要加载保存的模型，请使用 `load_model` 方法。


    ```

    from tensorflow.keras.models import load_model

    model=load_model(''model.h5'',custom_objects={"KerasLayer":hub.KerasLayer})

    ```


    你可以检查模型的摘要，以确保模型已正确加载：


    ```

    model.summary()

    ```


    你将看到如图 4-28 所示的输出。


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig28_HTML.jpg](img/495303_1_En_4_Fig28_HTML.jpg)


    图 4-28


    已加载模型的摘要


    现在，你可以像我们对未知图像所做的那样，自由地使用加载的模型进行进一步的推断。尽情享受吧！


    ## 提交你的作品


    你难道不为到目前为止所学到的知识感到兴奋吗？TensorFlow 允许你提交自己的创作，以便纳入 tfhub 仓库。`tensorflow_hub` 库用于从该仓库加载模型。基于
    HTTP 的协议支持检索模型的文档，并提供获取模型本身的端点。要从仓库加载模型，你可以使用 `load_model` 方法，就像你在本章示例中看到的那样。你可以创建自己的模型仓库，这些模型可通过
    `tensorflow_hub` 库加载。为此，你的 HTTP 分发服务需要遵循特定的协议。


    当你的模型完全训练到令你满意的程度后，你将使用以下代码保存计算图和参数值：


    ```

    saver = tf.train.saver()

    saver.save (sess, ‘my_model’)

    ```


    然后，可以将保存的模型部署到生产服务器上，供公众使用。经过 Beta 测试后，你可以将其添加到仓库中，通过 tfhub 库造福社区。有关此规范的更多细节超出了本书的范围。感兴趣的读者可以参考
    TensorFlow 网站上“托管你自己的模型”下的更多信息。


    ## 进一步工作


    我已经向你展示了一个图像分类的示例，该示例使用了 TensorFlow Hub 中的预训练模型。如前所述，Hub 也提供其他领域的模型。例如，你可以轻松开发自己的目标检测分类器、文本分类器、通用句子编码器等。建议你访问
    TensorFlow Hub 网站，探索这些预训练模型。


    TensorFlow 网站上列出了几个商业部署的案例研究。举个例子，Airbnb 通过重新训练 ResNet50 模型对其图像进行分类，以改善客户体验。有人使用
    TensorFlow.js 让 Amazon Echo 响应手语，以造福残障人士。可口可乐在其移动购买凭证应用程序中使用了 SqueezeNet CNN 进行
    OCR。谷歌 Pixel 手机使用 TF Hub 的 MobileNet 模块进行相机图像识别，并增强其相机功能。在你的应用程序中使用迁移学习有无限的可能性。因此，请不断尝试
    TensorFlow Hub 中提供的预训练模型，并运用你的智慧将它们应用到自己的应用程序中。


    ## 总结


    迁移学习是机器学习中一种重要的知识迁移技术。在软件工程中，人们使用二进制库来重用代码。在机器学习中，训练好的模型包含算法、数据、处理能力以及专家的领域知识。所有这些都需要迁移到新模型中。这正是迁移学习所提供的。在
    TensorFlow Hub 中，有多个跨领域和由不同开发者提供的预训练模型。在本章中，你首先学习了如何重用其中一个模型来对你自己的图像进行分类。在后续部分，你开发了一个多类图像分类器，该分类器运行在谷歌预训练的模型之上，利用了他们的专业知识、处理时间和处理能力。Hub
    中还有其他几个模型可供你探索。


    在下一章中，你将通过一个回归模型开发的示例来学习机器学习的复杂性。

