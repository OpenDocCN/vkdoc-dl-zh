  trans: '

    ### 对数双曲余弦损失


    其数学表达式为：


    ![$$ L\left(y,{y}^p\right)=\sum \limits_{i=1}^n\log \left(\cosh \left({y}_i^p-{y}_i\right)\right)
    $$](img/495303_1_En_5_Chapter_TeX_Equf.png)


    该函数计算误差的双曲余弦的对数。对于小误差，`log(cosh(x))` 近似于 ![$$ \frac{(error)²}{2} $$](img/495303_1_En_5_Chapter_TeX_IEq1.png)；对于大误差，则近似于
    `abs(error) – log(error)`。因此，它在大多数情况下表现类似于 `mse`。该函数处处二阶可导，并具备 Huber 损失的所有优点。在
    `tf.keras` 库中，该函数以 `tf.keras.losses.LogCosh()` 的形式提供。


    ### 分位数损失


    考虑图 5-12 左侧所示的数据分布。


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig12_HTML.jpg](img/495303_1_En_5_Fig12_HTML.jpg)


    图 5-12


    分位数回归图


    你可能希望用多条回归线来建模这些数据，如图 5-12 右侧所示，而不是仅用一条回归线。在这种情况下，分位数损失就能派上用场。其数学表达式为：


    ![$$ L\left(y,{y}^p\right)={\sum}_{i={y}_i&lt;{y}_i^p}\left(\gamma -1\right).\left|{y}_i-{y}_i^p\right|+{\sum}_{i={y}_i\ge
    {y}_i^p}\left(\gamma \right).\left|{y}_i-{y}_i^p\right| $$](img/495303_1_En_5_Chapter_TeX_Equg.png)


    其中 *γ* 取值在 0 到 1 之间。分位数损失实际上是 `mae` 的扩展。当 *γ* 取值为 0.5 时，它就变成了 `mae`。*γ* 取其他值则会对高估或低估分别施加惩罚。


    当你希望预测一个区间而非单个点时，分位数损失函数非常有用。这可以在许多业务问题中显著改善决策。


    现在，我们已经了解了可用于回归的各种损失函数，接下来让我介绍一下 `tf.keras` 中可用的优化器，它们可以与这些损失函数配合使用。


    ## 优化器


    优化器本质上是用于在模型训练过程中减少损失的算法。它们通过更新权重参数来最小化损失函数，而损失函数则持续告知优化器其是否正朝着达到全局最小值的正确方向前进。与损失函数不同，优化器并非回归问题所独有，所有可用的优化器都可以应用于回归问题。`tf.keras`
    中提供的各种优化器如下：


    - `Adagrad`

    - `RMSprop`

    - `Adam`

    - `SGD`

    - `Adadelta`

    - `Adamax`

    - `Nadam`


    我们在之前的项目中已经使用过其中一些优化器。每个优化器都有其特定的用途。我强烈建议你阅读 `tf.keras` 文档，以了解每个优化器的重要性。根据需求，尝试使用不同的优化器来提升模型性能。再次强调，这些优化器并非回归问题所独有，而是适用于所有类型的深度学习项目。


    ## 总结


    总结本章所学内容，可以这样说：如果现有的统计回归模型能够满足你的需求，那就无需使用神经网络。


    如果你正在建模一个具有大量特征且这些特征与目标值之间存在复杂超平面关系的数据集，那么请使用深度学习神经网络来获得额外的预测能力。传统的回归函数在 `R`、`scikit-learn`
    以及其他类似的库中都有提供。例如，`scikit-learn` 库除了线性回归之外，还提供了其他几种回归器，如 `KNeighboursRegressor`、`DecisionTreeRegressor`
    和 `RandomForestRegressor`。另一方面，神经网络虽然有一些额外的开销，但其提供的预测能力是前面提到的任何回归器都无法比拟的。很难找到一个能完美拟合给定数据集的回归方程。相反，深度学习网络会自行尝试找到最佳拟合，无需你付出额外的努力。因此，总而言之，今后即使是解决小型的回归问题，也请考虑使用神经网络；谁知道呢，这个小问题（数据集）可能会随着时间的推移变得庞大，届时再依赖传统的统计技术将是一场噩梦。


    下一章将带你了解一些快速机器学习的技术。


    # 6. 估算器


    ## 简介


    任何机器学习项目都包含多个阶段，包括训练、评估、预测，以及最终导出到生产服务器上提供服务。你在前几章中已经学习了这些阶段，当时我们讨论了分类和回归的机器学习项目。为了开发性能最佳的模型，你尝试了不同的
    ANN 架构。基本上，你通过实验多种不同的原型来达到期望的结果。在 TF 2.0 之前，整个实验过程并不容易，因为每次修改代码，你都需要构建一个计算图并在会话中运行它。你将在本章学习的估算器正是为了处理所有这些底层工作而设计的。创建图并在会话中运行它们的整个过程非常耗时，并且给代码调试带来了许多挑战。


    此外，在模型完全开发完成后，将其部署到生产环境也面临挑战，你可能希望将其部署到分布式环境以获得更好的性能。同时，你可能还希望在 CPU、GPU 或 TPU
    上运行模型。这都需要修改代码。为了帮助你解决所有这些问题，并将一切统一在一个框架下，估算器应运而生，尽管这是在 TF 2.0 之前。然而，你将在本章学习并在未来所有项目中使用的估算器，能够利用
    TF 2.x 中引入的许多新功能。例如，构建数据管道和模型开发之间有了清晰的分离。在分布式环境上的部署也无需任何代码更改。增强的日志记录和追踪功能使调试更加容易。在本章中，你将学习估算器是如何实现这一切的。


    具体来说，你将学习以下内容：


    - 什么是估算器？

    - 什么是预制的估算器？

    - 使用预制估算器解决分类问题

    - 使用预制估算器解决回归问题

    - 基于 Keras 模型构建自定义估算器

    - 基于 `tfhub` 模块构建自定义估算器


    ## 估算器概述


    TensorFlow 估算器是一个高级 API，它将机器学习开发的多个阶段统一在一个框架下。它封装了用于训练、评估、预测以及导出模型以供生产使用的各种 API。它是一个高级
    API，为现有的 TensorFlow API 栈提供了进一步的抽象。

    '
- fmt: '### API Stack


    After the introduction of estimators, the new API stack for TensorFlow can be
    depicted as shown in Figure [6-1](#495303_1_En_6_Chapter.xhtml#Fig1).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig1_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    TensorFlow API stack


    So far, you have mostly used mid-level APIs; the use of low-level APIs becomes
    a rare necessity when you need a finer control over the model development. Now,
    after learning the estimator API, you may not even use the mid-level APIs for
    your model developments. But then what happens to the models which you have already
    developed – can they benefit from using this API? And if so, how to make them
    use this API? Fortunately, the TensorFlow team has developed an interface that
    allows you to migrate the existing models to use the estimator interface. Not
    only that, they have created a few estimators on their own to get you quickly
    started. These are called premade estimators. They are not just the start-up points.
    They are fully developed and tested for you to use in your immediate projects.
    If at all these do not meet your purpose or if you want to migrate existing models
    to facilitate the benefits offered by the estimator, you can develop custom estimators
    using the estimator API. Before you learn how to use premade estimators and to
    build your own ones, let me discuss its benefits in more detail.


    ### Estimator Benefits


    To give you a quick overview of the major benefits offered by an estimator, I
    am first going to list them here:


    *   Providing a unified interface for train/evaluate/predict

    *   Handling data input through an Input function

    *   Creating checkpoints

    *   Creating summary logs


    These need not be the only benefits, but are certainly the most important ones.
    I will now discuss each one in further detail. To understand the discussion, keep
    the estimator interface depicted in Figure [6-2](#495303_1_En_6_Chapter.xhtml#Fig2)
    in your mind.


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig2_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Estimator interface


    As you can see in Figure [6-2](#495303_1_En_6_Chapter.xhtml#Fig2), the estimator
    class provides three interface methods for training, evaluation, and predictions.
    So, once you develop an estimator object, you will be able to call the `train`,
    `evaluate`, and `predict` methods on the same object. Note that you need to send
    different datasets for each. This is achieved with the help of an input function.
    I have explained the structure of this input function in more detail later in
    this section. It is sufficient to say at this point that the introduction of the
    Input function simplifies your experimentation with different datasets.


    The checkpoints created during training allow you to roll back to a known state
    and continue the training from this checkpoint. This would save you lots of training
    time, especially when the errors occur toward the fag end of an epoch. This also
    makes the debugging quicker. After the training is over, the summary logs created
    during evaluation can be visualized on TensorBoard, giving you quick insights
    on how good the model is trained.


    After the model is trained to your full satisfaction, next comes the task of deployment.
    Deploying a trained model on CPU/GPU/TPU, even mobiles and the Web, and a distributed
    environment previously required several code changes. If you use an estimator,
    you will deploy the trained model as is or at the most with minimal changes on
    any of these platforms.


    Having said all these benefits, let us first look at the types of estimators.


    ### Estimator Types


    The estimators are classified into two categories:


    *   Premade estimators

    *   Custom estimators


    The classification can be visualized in the diagram shown in Figure [6-3](#495303_1_En_6_Chapter.xhtml#Fig3).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig3_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Estimator classifications


    The premade estimators are like a model in a box where the model functionality
    is already written by the TensorFlow team. On the other hand, in custom estimators,
    you are supposed to provide this model functionality. In both cases, the estimator
    object that you create will have a common interface for training, evaluation,
    and prediction. Both can be exported for serving in a similar way.


    The TensorFlow library provides a few premade estimators for your immediate go;
    if these do not meet your purpose and/or you want to migrate your existing models
    to get the benefits of estimators, you would create your own estimator class.
    All estimators are subclasses of the `tf.estimator.Estimator` base class.


    The `DNNClassifier`, `LinearClassifier`, and `LinearRegressor` are the few examples
    of premade estimators. The `DNNClassifier` is useful for creating classification
    models based on dense neural networks, while the `LinearRegressor` is for handling
    linear regression problems. You will learn how to use both these classes in the
    upcoming sections in this chapter.


    As part of building a custom estimator, you will be converting an existing Keras
    model to an estimator. Doing so will enable you to take advantage of the several
    benefits offered by estimators, which you have seen earlier. You will be building
    a custom estimator for the wine quality regression model that you developed in
    the previous chapter. Finally, I will also show you how to build a custom estimator
    based on `tfhub` modules.


    To work with the estimators, you need to understand two new concepts – Input functions
    and Feature columns. The input function creates a data pipeline based on `tf.data.dataset`
    that feeds the data to the model in batches for both training and evaluation.
    You may also create a data pipeline for inference. I will show you how to do this
    in the `DNNClassifier` project. Feature columns specify how the data is to be
    interpreted by the estimator. Before I discuss these Input function and Feature
    column concepts, I will give you an overview of the development of an estimator-based
    project.


    ### Workflow for Estimator-Based Projects


    The various steps required in the development of an estimator-based project are
    listed here:


    *   Loading data

    *   Data preprocessing

    *   Defining Features columns

    *   Defining the Input function

    *   Model instantiation

    *   Model training

    *   Model evaluation

    *   Judging a model’s performance on TensorBoard

    *   Using a model for predictions


    As part of the learning that you have done in all previous chapters, you are definitely
    familiar with many steps in the preceding workflow. What needs attention is defining
    Features columns and the Input function. I will now describe these requirements.'
