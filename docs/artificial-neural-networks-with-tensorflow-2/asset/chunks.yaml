    \ the alignment scores.\n\n4.  Compute the context vector.\n\n5.  Decode the output.\n\
    \n6.  Repeat steps 2 through 5 until an end token is encountered.\n\nYou  will\n\
    understand these steps better when you look at its implementation, which\nis discussed\
    \ in the “Decoder Implementation” section.\n\nCreating Encoder\nThe Encoder takes\
    \ the extracted features as input and\npasses it to a fully connected layer.\n\
    \nThe inception encoder is defined as follows:\n\n```\nclass Inception_Encoder(tf.keras.Model):\n\
    def __init__(self, embedding_dim):\nsuper(Inception_Encoder, self).__init__()\n\
    # shape after fc = (batch_size, 64,\nembedding_dim)\nself.fc = tf.keras.layers.Dense\n\
    (embedding_dim)\ndef call(self, x):\nx = self.fc(x)\nx = tf.nn.relu(x)\nreturn\
    \ x\n```\n\nCreating Decoder\nHere comes the most important part of this application.\
    \ You will\nnow be writing a Decoder with the embedded attention mechanism. You\
    \ will\nbe using Bahdanau Attention. I will give you a brief introduction to\n\
    Bahdanau Attention.\n\nBahdanau Attention\nAccording to the “Show, Attend and\
    \ Tell” ([`https://arxiv.org/pdf/1502.03044.pdf`](https://arxiv.org/pdf/1502.03044.pdf))\n\
    research paper, we extract a set of feature vectors from every image,\nwhich is\
    \ a vector of the N-dimensional representation of the\ncorresponding part of an\
    \ image. The Encoder passes these\nfeature vectors through a fully connected layer.\n\
    \nIn general, there are two types of attention mechanisms:\n\n1.  **Bahdanau\n\
    \    Attention**  – Deterministic “soft” attention\n\n2.  **Luong\n    Attention**\
    \  – Stochastic “hard” attention"
  trans: "\n# 该输出层的形状为 `8x8x2048`，这是 `InceptionV3` 模型的最后一个卷积层。我们使用到最后一个卷积层为止的层，是因为将对从该层提取的特征应用注意力机制。\n\
    \n## 准备数据集\n\n`InceptionV3` 模型要求输入图像尺寸为 `299x299`。此外，图像必须经过归一化处理，使其像素值范围在 –1 到\
    \ 1 之间。\n\n我们编写一个用于加载和调整图像大小的函数：\n\n```\ndef load_image(image_path):\n    img\
    \ = tf.io.read_file(image_path)\n    img = tf.image.decode_jpeg(img, channels=3)\n\
    \    img = tf.image.resize(img, (299, 299))\n    img = tf.keras.applications.inception_v3.preprocess_input(img)\n\
    \    return img, image_path\n```\n\n我们通过调用 `from_tensor_slices` 并使用上述 `load_image`\
    \ 函数进行预处理来创建图像数据集。\n\n```\nencode_train = sorted(set(img_name_vector))\nimage_dataset\
    \ = tf.data.Dataset.from_tensor_slices(encode_train)\nimage_dataset = image_dataset.map(load_image,\
    \ num_parallel_calls=tf.data.experimental.AUTOTUNE).batch(16)\n```\n\n## 提取特征\n\
    \n对于数据集中的每张图像，我们通过调用之前创建的模型 `image_features_extract_model` 来提取特征。在重塑数据后，我们将其保存到物理文件中。我们通过以下\
    \ for 循环来实现这一点：\n\n```\nfor img, path in tqdm(image_dataset):\n    batch_features\
    \ = image_features_extract_model(img)\n    batch_features = tf.reshape(batch_features,\
    \ (batch_features.shape[0], -1, batch_features.shape[3]))\n    for bf, p in zip(batch_features,\
    \ path):\n        path_of_feature = p.numpy().decode(\"utf-8\")\n        np.save(path_of_feature,\
    \ bf.numpy())\n```\n\n请注意，虽然将特征保存到内存中会更高效，但每张图像需要 `8x8x2048` 个浮点数，因此会消耗大量资源。请注意，在撰写本文时，Colab\
    \ 的内存限制为 `12GB`。在 GPU 上运行上述循环大约花费了我 2 分钟。\n\n## 创建词汇表\n\n现在，我们将创建一个包含所有唯一单词的词汇表。\n\
    \n```\ntokenizer = tf.keras.preprocessing.text.Tokenizer(filters='!\"#$%&()*+.,-/:;=?@[\\\
    ]^_`{|}~ ')\ntokenizer.fit_on_texts(train_captions)\nmax_size = len(tokenizer.word_index)\n\
    ```\n\n## 创建输入序列\n\n我们使用以下代码创建分词后单词的输入序列：\n\n```\ntrain_seqs = tokenizer.texts_to_sequences(train_captions)\n\
    ```\n\n打印几个序列：\n\n```\ntrain_seqs[:5]\n```\n\n输出结果为：\n\n```\n[[2, 1, 2339, 8,\
    \ 155, 2340, 1198, 19, 2341, 1390, 24, 480, 554, 3],\n [2, 21, 1714, 7, 1199,\
    \ 1715, 1, 108, 2342, 19, 5, 173, 3],\n [2, 1, 11, 4, 1, 28, 32, 506, 1, 507,\
    \ 3],\n [2, 1, 101, 102, 12, 1, 26, 3],\n [2, 63, 34, 4, 1, 272, 3]]\n```\n\n\
    如您所见，这些序列的长度各不相同。为了进行模型开发，我们需要所有序列具有相同的长度。因此，我们对序列进行填充。\n\n```\nmax_length = max(len(t)\
    \ for t in train_seqs)\ncap_vector = tf.keras.preprocessing.sequence.pad_sequences(train_seqs,\
    \ padding='post')\n```\n\n打印 `cap_vector` 以检查其内容：\n\n```\ncap_vector[:5]\n```\n\
    \n输出结果如图 10-4 所示。\n\n![../images/495303_1_En_10_Chapter/495303_1_En_10_Fig4_HTML.jpg](img/495303_1_En_10_Fig4_HTML.jpg)\n\
    \n**图 10-4** 填充后的序列示例\n\n您可以看到，所有分词后的单词都经过了填充，因此长度相等。\n\n## 创建训练数据集\n\n我们声明一些用于创建数据集的变量：\n\
    \n```\nBATCH_SIZE = 64\nBUFFER_SIZE = 1000\nembedding_dim = 256\nunits = 512\n\
    vocab_size = max_size + 1\nnum_steps = len(img_name_vector) // BATCH_SIZE\n```\n\
    \n以下函数将之前保存的每张图像的特征向量加载到张量中。\n\n```\ndef map_func(img_name, cap):\n    img_tensor\
    \ = np.load(img_name.decode('utf-8') + '.npy')\n    return img_tensor, cap\n```\n\
    \n我们使用以下函数创建数据集：\n\n```\ndef create_dataset(img_name_train, caption_train):\n\
    \    dataset = tf.data.Dataset.from_tensor_slices((img_name_train, caption_train))\n\
    \    # 使用 map 并行加载 numpy 文件\n    dataset = dataset.map(lambda item1, item2: tf.numpy_function(map_func,\
    \ [item1, item2], [tf.float32, tf.int32]), num_parallel_calls=tf.data.experimental.AUTOTUNE)\n\
    \    # 打乱并分批\n    dataset = dataset.shuffle(BUFFER_SIZE).batch(BATCH_SIZE).prefetch(buffer_size=tf.data.experimental.AUTOTUNE)\n\
    \    return dataset\n```\n\n在上述代码中，我们使用 `map` 函数加载 numpy 文件。我们对数据进行打乱并创建数据批次。\n\
    \n```\ndataset = create_dataset(img_name_vector, cap_vector)\n```\n\n## 创建模型\n\
    \n我们使用 Bahdanau 注意力机制和门控循环单元（GRU）创建序列到序列模型。GRU 在 RNN 中提供了一种门控机制。它类似于您在第 9 章中使用的带有遗忘门的\
    \ LSTM，但其参数比 LSTM 少。由于训练参数较少，它比 LSTM 训练更快，占用内存更少，执行速度也更快。然而，其缺点是在处理长序列时，准确率不如\
    \ LSTM。\n\nBahdanau 注意力机制的工作方式如下：\n\n1.  为给定的输入图像生成编码器隐藏状态。\n2.  计算对齐分数——对齐分数是在每个先前的编码器隐藏状态与先前的解码器隐藏状态之间计算的。\n\
    3.  对对齐分数进行 Softmax 处理。\n4.  计算上下文向量。\n5.  解码输出。\n6.  重复步骤 2 到 5，直到遇到结束标记。\n\n\
    当您查看其实现时（在“解码器实现”部分讨论），您将更好地理解这些步骤。\n\n### 创建编码器\n\n编码器将提取的特征作为输入，并将其传递到一个全连接层。\n\
    \nInception 编码器定义如下：\n\n```\nclass Inception_Encoder(tf.keras.Model):\n    def\
    \ __init__(self, embedding_dim):\n        super(Inception_Encoder, self).__init__()\n\
    \        # fc 后的形状 = (batch_size, 64, embedding_dim)\n        self.fc = tf.keras.layers.Dense(embedding_dim)\n\
    \n    def call(self, x):\n        x = self.fc(x)\n        x = tf.nn.relu(x)\n\
    \        return x\n```\n\n### 创建解码器\n\n这是本应用中最关键的部分。现在，您将编写一个嵌入注意力机制的解码器。您将使用\
    \ Bahdanau 注意力机制。我将对 Bahdanau 注意力机制进行简要介绍。\n\n#### Bahdanau 注意力机制\n\n根据“Show,\
    \ Attend and Tell”([`https://arxiv.org/pdf/1502.03044.pdf`](https://arxiv.org/pdf/1502.03044.pdf))研究论文，我们从每张图像中提取一组特征向量，这些向量是图像对应部分的\
    \ N 维表示。编码器将这些特征向量通过一个全连接层传递。\n\n通常，有两种类型的注意力机制：\n\n1.  **Bahdanau 注意力机制** – 确定性的“软”注意力\n\
    2.  **Luong 注意力机制** – 随机性的“硬”注意力\n"
- fmt: '我们使用确定性软注意力机制，即 Bahdanau 注意力。该注意力机制基本上为每个`input_vector`（即图像的提取特征）计算注意力权重和上下文向量。简单来说，上下文向量是图像在时间`t`时相关部分的动态表示。我们定义了一个注意力机制，它从输入向量中计算上下文向量，这些输入向量代表了在不同图像位置提取的特征。对于图像中的每个位置，我们称之为`loc`；该机制会生成一个正权重，在我们的代码中也称为`score`。该分数可以解释为位置`loc`是生成下一个单词的正确关注点的概率，或者我们是否应该给予`loc`一定的相对重要性。每个输入向量的注意力权重由一个注意力模型计算，为了计算这些注意力权重，我们使用一个多层感知器层，该层将先前的解码器隐藏状态和当前输入向量的隐藏状态作为输入。这个隐藏状态是编码器的输出。


    ## 解码器功能


    解码器的功能可以总结为以下三个简单步骤。


    为了预测目标词，解码器使用以下内容：


    1.  上下文向量（注意力权重与编码器输出的加权乘积）

    2.  上一个时间步的解码器输出

    3.  先前的解码器隐藏状态


    ## 解码器初始化


    我们按如下方式声明`Decoder`类：


    ```

    class RNN_Decoder(tf.keras.Model):

    ```


    在类初始化中，我们创建一个 GRU 层：


    ```

    self.gru = tf.keras.layers.GRU(self.units,

    return_sequences=True,

    return_state=True,

    recurrent_initializer=

    ''glorot_uniform'')

    ```


    我们使用批归一化来加速训练过程，并通常提高模型的性能。批归一化会自动标准化深度学习神经网络中某一层的输入。


    ```

    self.batchnormalization =

    tf.keras.layers.BatchNormalization

    (axis=-1,

    momentum=0.99,

    epsilon=0.001,

    center=True,

    scale=True,

    beta_initializer=''zeros'',

    gamma_initializer=''ones'',

    moving_mean_initializer=''zeros'',

    moving_variance_initializer=''ones'',

    beta_regularizer=None,

    gamma_regularizer=None,

    beta_constraint=None,

    gamma_constraint=None)

    ```


    为了实现注意力机制，我们声明了几个线性层：


    ```

    self.W1 = tf.keras.layers.Dense(units)

    self.W2 = tf.keras.layers.Dense(units)

    self.V = tf.keras.layers.Dense(1)

    ```


    ## 解码器调用方法


    解码器需要三个输入：


    1.  编码器输出

    2.  隐藏状态（初始化为 0）

    3.  解码器输入（即起始标记）


    我们按如下方式声明`call`方法：


    ```

    def call(self, x, features, hidden):

    ```


    其中`x`是解码器输入，`features`代表编码器输出，`hidden`是解码器隐藏状态，初始化为零。

    首先，我们通过将先前的解码器隐藏状态的维度加 1 来改变其形状。


    ```

    hidden_with_time_axis = tf.expand_dims(hidden, 1)

    ```


    然后，我们计算注意力分数。


    ## 注意力分数


    注意力分数由以下公式指定：


    ![$$ score\left({h}_t,{\underset{\_}{h}}_s\right)={v}_a^T\tanh \left({W}_1{h}_t+{W}_2{\underset{\_}{h}}_s\right)
    $$](images/495303_1_En_10_Chapter/495303_1_En_10_Chapter_TeX_Equd.png)


    以 Bahdanau 风格实现注意力代码的伪代码如下：


    ```

    score = FC(tanh(FC(EO) + FC(H)))

    ```


    这是实际的实现：


    ```

    score = tf.nn.tanh(self.W1(features) +

    self.W2(hidden_with_time_axis))

    ```


    在前面的语句中，提供了先前的解码器隐藏状态和当前输入向量的隐藏状态作为输入。

    接下来，我们计算注意力权重。


    ## 注意力权重


    注意力权重的数学表达式为：


    ![$$ {\alpha}_{ts}=\frac{\mathit{\exp}\ \left( score\left({h}_t,{\underset{\_}{h}}_s\right)\right)}{\varSigma_{s\prime
    =1}^S\mathit{\exp}\ \left( score\left({h}_t,{\underset{\_}{h}}_{s\prime}\right)\right)}
    $$](images/495303_1_En_10_Chapter/495303_1_En_10_Chapter_TeX_Eque.png)


    我们按如下方式实现：


    ```

    attention_weights = tf.nn.softmax(self.V(score),

    axis=1)

    ```


    我们对分数应用 softmax 激活函数以获得注意力权重。softmax 激活函数将得到概率，其总和等于 1。这将有助于表示每个输入序列的权重或影响。输入序列的注意力权重越高，其对预测目标词的影响就越大。

    然后，我们继续计算上下文向量。


    ## 上下文向量


    上下文向量的数学表达式为：


    ![$$ {c}_t=\sum \limits_s{a}_{ts}{\underset{\_}{h}}_s $$](images/495303_1_En_10_Chapter/495303_1_En_10_Chapter_TeX_Equf.png)


    我们分两步实现。首先，我们计算每个输入的上下文向量：


    ```

    context_vector = attention_weights * features

    ```


    请注意，上下文向量是编码器隐藏状态及其各自分数的乘积。它基本上是注意力权重与当前输入向量隐藏状态（由编码器产生）的加权乘法。


    接下来，我们对所有这些乘积求和。


    ```

    context_vector = tf.reduce_sum(context_vector, axis=1)

    ```


    这解码了输出——上下文向量与先前的解码器输出连接，并与先前的解码器隐藏状态一起馈送到该时间步的解码器 RNN 中，以产生新的输出。基本上，我们通过在前面的语句中重塑上下文向量来实现这一点。

    至此，Bahdanau 注意力模型的实现完成。

    我们现在继续进行实际的解码器实现。


    ## 解码器实现


    我们首先通过嵌入层将字幕索引转换为向量。


    ```

    x = self.embedding(x)

    ```


    接下来，将上下文向量与字幕向量（`x`）映射并组合成一个向量。


    ```

    x = tf.concat([tf.expand_dims(context_vector, 1),

    x], axis=-1)

    ```


    现在，将此向量传递通过 GRU。


    ```

    output, state = self.gru(x)

    ```


    将 GRU 层的输出传递通过一个 Dense 层。


    ```

    x = self.fc1(output)

    ```


    此时`x`的形状为 (`batch_size`, `max_length`, `hidden_size`)。接下来，将`x`重塑为 (`batch_size
    * max_length`, `hidden_size`)。


    ```

    x = tf.reshape(x, (-1, x.shape[2]))

    ```


    添加 Dropout 和 BatchNorm 层。


    ```

    x = self.dropout(x)

    x = self.batchnormalization(x)

    ```


    此时输出形状为 (64 x 512)。将其传递通过一个 Dense 层，将其转换为 (64 x 8329)。在我们的例子中，8329 是词汇表大小。


    ```

    x = self.fc2(x)

    ```


    最后，将计算出的值返回给调用者。


    ```

    return x, state, attention_weights

    ```


    我们为解码器类再定义一个函数，用于重置解码器的初始状态。


    ```

    def reset_state(self, batch_size):

    return tf.zeros((batch_size, self.units))

    ```


    解码器实现的完整代码在清单 [10-1](#495303_1_En_10_Chapter.xhtml#PC56) 中给出，供您快速参考。'
  raw: "We use a deterministic soft attention and that is Bahdanau Attention.\nThis\
    \ attention mechanism basically computes the attention weights and\ncontext vector\
    \ for every input_vector, which is the extracted features\nof an image. In simple\
    \ terms, the context vector is a dynamic\nrepresentation of the relevant part\
    \ of the image input at time t. We\ndefine an attention mechanism that computes\
    \ context vectors from the\ninput vectors, which represent features extracted\
    \ at different image\nlocations. For each location in the image, let us call it\
    \ loc; the\nmechanism generates a positive weight, also stated as score in our\
    \ code.\nThe score can be interpreted either as the probability that location\
    \ loc\nis the right place to focus for producing the next word, or whether we\n\
    should give some relative importance to loc. The attention weights for\neach input\
    \ vector are computed by an attention model, and for computing\nthese attention\
    \ weights, we use a multilayer perceptron layer which\ntakes the previous decoder\
    \ hidden state and current input vector hidden\nstate as input. This hidden state\
    \ is the output from the Encoder.\n\nDecoder Functionality\nThe Decoder functionality\
    \ can be\nsummarized in these three simple steps.\n\nTo predict the target word,\
    \ the Decoder uses the following:\n\n1.  Context vector (the weighted multiplication\
    \ of attention weights and\n    Encoder output)\n\n2.  The Decoder’s output from\
    \ the previous time step\n\n3.  The previous Decoder’s hidden state\n\nDecoder\
    \ Initialization\n\nWe declare the Decoder class as follows:\n\n```\nclass RNN_Decoder(tf.keras.Model):\n\
    ```\n\nIn the class initialization, we create a GRU layer:\n\n```\nself.gru =\
    \ tf.keras.layers.GRU(self.units,\nreturn_sequences=True,\nreturn_state=True,\n\
    recurrent_initializer=\n'glorot_uniform')\n```\n\nWe use batch normalization to\
    \ accelerate the training process and in\ngeneral to improve the model’s performance.\
    \ Batch normalization\nautomatically standardizes the inputs to a layer in a deep\
    \ learning\nneural network.\n\n```\nself.batchnormalization =\ntf.keras.layers.BatchNormalization\n\
    (axis=-1,\nmomentum=0.99,\nepsilon=0.001,\ncenter=True,\nscale=True,\nbeta_initializer='zeros',\n\
    gamma_initializer='ones',\nmoving_mean_initializer='zeros',\nmoving_variance_initializer='ones',\n\
    beta_regularizer=None,\ngamma_regularizer=None,\nbeta_constraint=None,\ngamma_constraint=None)\n\
    ```\n\nFor the implementation of the\nattention mechanism, we declare a few linear\
    \ layers:\n\n```\nself.W1 = tf.keras.layers.Dense(units)\nself.W2 = tf.keras.layers.Dense(units)\n\
    self.V = tf.keras.layers.Dense(1)\n```\n\nDecoder Call Method\n\nThe Decoder needs\n\
    three inputs:\n\n1.  The encoder output\n\n2.  The hidden state (initialized to\
    \ 0)\n\n3.  The decoder input (which is the start token)\n\nWe declare the call\
    \ method as follows:\n\n```\ndef call(self, x, features, hidden):\n```\n\nwhere\
    \ x is the decoder input, *features* represents the\nEncoder output, and hidden\
    \ is the decoder hidden state, which is\ninitialized to zero.\nFirst, we change\
    \ the shape of the previous decoder hidden state by\nadding 1 to its dimensions.\n\
    \n```\nhidden_with_time_axis = tf.expand_dims(hidden, 1)\n```\n\nThen, we compute\
    \ the attention score.\n\nAttention Score\n\nThe attention\nscore is specified\
    \ with this formula:\n\n![$$ score\\left({h}_t,{\\underset{\\_}{h}}_s\\right)={v}_a^T\\\
    tanh \\left({W}_1{h}_t+{W}_2{\\underset{\\_}{h}}_s\\right) $$](images/495303_1_En_10_Chapter/495303_1_En_10_Chapter_TeX_Equd.png)\n\
    \nThe pseudocode for the implementation of the attention code in\nBahdanau’s style\
    \ will be as follows:\n\n```\nscore = FC(tanh(FC(EO) + FC(H)))\n```\n\nThis is\
    \ the actual implementation:\n\n```\nscore = tf.nn.tanh(self.W1(features) +\n\
    self.W2(hidden_with_time_axis))\n```\n\nThe previous\ndecoder hidden state and\
    \ current input vector hidden state are provided\nas input in the preceding statement.\n\
    Next, we compute the attention weights.\n\nAttention Weights\n\nAttention weights\n\
    are mathematically expressed as\n\n![$$ {\\alpha}_{ts}=\\frac{\\mathit{\\exp}\\\
    \ \\left( score\\left({h}_t,{\\underset{\\_}{h}}_s\\right)\\right)}{\\varSigma_{s\\\
    prime =1}^S\\mathit{\\exp}\\ \\left( score\\left({h}_t,{\\underset{\\_}{h}}_{s\\\
    prime}\\right)\\right)} $$](images/495303_1_En_10_Chapter/495303_1_En_10_Chapter_TeX_Eque.png)\n\
