    # 总结


    在本章中，你学习了自然语言处理的另一个重要应用。你创建了一个为任意给定图像生成标题的应用。图像描述包含两个重要部分：一是提取图像特征，二是将这些特征映射为文本描述。提取图像特征是一项简单的工作，有许多预训练网络可用于此目的。你使用了`InceptionV3`网络来提取特征。为了将其转换为描述文本，你使用了带有
    Bahdanau 注意力机制的 RNN。本章深入介绍了 Bahdanau 注意力机制及其实现。


    在下一章中，你将学习另一项重要技术：时间序列预测。


    # 11. 时间序列预测


    ## 引言


    预测一直是每个人感兴趣的话题。我的未来会怎样？五年内我会成为百万富翁吗？我什么时候结婚？这些都是我们许多人提出的问题。世界上有些人从事预测工作，并至少试图为这些问题提供答案。到目前为止，神经网络在做出此类预测方面并不成功。但它们确实能够预测那些过去数据包含可发现模式的未来。本章的主题是学习如何训练神经网络来执行此类预测。这被称为时间序列预测。首先，让我描述一下时间序列的含义，然后介绍如何预测未来。


    ## 什么是时间序列预测？


    对未来进行预测在经典统计学中称为外推法。在现代世界中，人们使用术语“时间序列预测”来表示与外推法相同的含义。预测涉及创建适合历史数据的模型，并利用它们来预测尚未发生的未来事件。比如什么？"明天会热吗？"这个问题的答案就是一种未来预测。神经网络可以进行这种预测，而且其准确性远高于人类仅凭直觉所做的预测。它们是如何做到的呢？我们向它们提供过去几天、几个月甚至几年的温度数据。网络会找到本质上属于时间序列模式的规律，并基于此模式进行预测。时间序列预测的另一个例子是预测股票的未来价格。"IBM
    股票一个月后的价格会是多少？"这个问题可以由训练好的神经网络来回答。


    以下是时间序列的更多示例：


    *   根据患者的脑电图预测其是否正在癫痫发作

    *   预测芭比娃娃在十二月的产品销量

    *   预测服务器每小时的带宽利用率需求

    *   预测明年的农作物产量

    *   预测某个城市的出生率


    像这样，你会发现许多人类非常感兴趣的问题。为了解决这些问题，人们在一段时间内开发了许多统计技术。在当今时代，神经网络为这一人类努力提供了帮助。在我讨论如何进行此类预测之前，让我先描述一下此类预测中的一些重要关注点。


    ## 预测的关注点


    预测时的一些主要关注点可列举如下：


    *   你拥有多少历史数据？

    *   用户想要预测短期、中期还是长期？

    *   预测是静态的吗？

    *   对于给定的问题，是否需要定期预测？


    时间序列预测中首要且最重要的一点是你拥有多少历史数据。请注意，神经网络将分析历史数据以发现其中的趋势。只有基于这些趋势，才能进行未来预测。


    短期预测相对容易，而中期或长期预测通常较难，因为在这些时间段内，数据趋势可能会发生变化，从而存在许多不确定性。


    当用户请求预测时，他们是在寻找一个静态预测，还是愿意在条件变化时接受新的预测？动态预测的需求可能是设计预测模型时需要考虑的问题之一。


    有时，对同一问题的预测会以预先确定的频率进行。预测频率的高低成为数据采样时的决定性因素，进而影响建模。每天预测明天的温度被认为是低频预测，而股票市场的高频交易则被认为是高频预测。


    现在，我将描述时间序列的各种组成部分。


    ## 时间序列的组成部分


    在分析时间序列以进行建模时，有几个要点需要你仔细观察。这些是时间序列的组成部分，可分为以下几类：


    *   总体趋势

    *   季节性变动

    *   周期性变动

    *   噪声（不规则波动）


    总体或长期趋势是时间序列的主要组成部分。遵循某种可观察模式的时间序列趋势，可能在一段时间内显示出上升或下降，这主要是由于社会经济和政治因素的影响。冰淇淋制造商在夏季销量增加、冬季销量下降，被称为销售趋势中的季节性变动。假设你有长期数据（例如
    5 到 12 年的数据）可供分析，你可能会观察到时间序列中的长期波动。这些是在一个国家经济的经济数据中观察到的长期周期。企业也会表现出众所周知的商业周期长期波动。最后，当出现像
    COVID-19 疫情这样的不可预见情况时，数据中会出现噪声或不规则波动。在开发时间序列分析模型时，你必须在分析中考虑上述组成部分。


    最后，我们来到另一个重要方面，即时间序列在其两个主要组成部分上的分类。


    ## 单变量与多变量


    所有时间序列分为两大类：


    *   单变量

    *   多变量


    随时间测量的单个变量称为单变量时间序列。例如，你家一年内测量的用电量被视为单变量时间序列。此类时间序列最好使用统计技术进行建模，例如自回归移动平均模型。顾名思义，它结合了自回归技术和移动平均技术来预测未来值。它假设先前的观测值是未来值的良好预测因子。


    多变量时间序列具有多个随时间变化的变量。因此，结果不仅取决于多个变量的过去值，而且还是它们之间相互依赖关系的函数。用于建模多变量时间序列的一种著名统计技术是向量自回归模型。该模型假设每个变量是其自身过去值以及所有相关变量过去值的函数。多变量时间序列的一个例子是空气污染，它取决于几个相互依赖的组成部分。


    说了这么多，现在我将向你展示如何开发用于预测单变量和多变量时间序列的神经网络模型。

