    # 2. 深入探究 TensorFlow


    在上一章中，你了解了 TensorFlow 平台的能力。在领略了 TensorFlow 的强大功能之后，现在是时候学习如何将这些能力应用到你自己的实际应用中去了。


    我们将从一个简单的应用开始，它将教你一个简单机器学习应用开发的复杂细节。


    ## 一个简单的机器学习应用


    为了让你开始 TensorFlow 编码，我们将从一个简单的 Hello World 类应用开始。在这个简单的应用中，你将开发一个使用统计回归技术进行预测的机器学习模型。


    在此应用中，我们将使用程序代码本身内部声明的一组固定数据点。我们的数据将由 (`x`, `y`) 坐标值组成。我们计算一个名为 `z` 的值，它与 `x`
    和 `y` 存在某种线性关系。例如，对于给定的 `x` 和 `y` 值，`z` 的值可以使用以下数学公式计算：


    ```

    z = 7 * x + 6 * y + 5

    ```


    我们的任务是让机器自行学习，在给定足够多的 `x` 和 `y` 值以及相应的目标 `z` 值的情况下，为上述关系找到最佳拟合。一旦模型训练完成，我们将使用该模型来预测任何未见过的
    `x` 和 `y` 值对应的 `z`。例如，给定 `x` 等于 2 且 `y` 等于 3，模型应预测输出 `z` 等于 37。如果它预测出 37，并且对于任何先前未知的
    `x` 和 `y` 都能以 100% 的准确率预测 `z`，我们就说该模型已完全训练，准确率达到 100%。实际上，开发一个能以 100% 准确率预测的模型是永远不可能的。因此，我们尝试优化模型性能，以达到
    100% 这一理想准确率水平。


    从上述讨论可以看出，我们试图解决的问题是一个经典的线性回归案例研究。为简单起见，我们将创建一个仅包含一个神经元的单层网络，该网络经过训练来解决线性回归问题。在实践中，你的网络通常由多个层和多个节点组成。在这个简单的应用中，我将避免使用此类深度网络，因为定义它们需要对
    Keras API 有更深入的理解。你将在本章后面接触到这些 Keras API。对于这个简单的应用以及本书中的所有后续应用，你将使用 Google Colab
    进行开发。


    ### 创建 Colab 笔记本


    在第一个应用中，我将指导你完成在 Colab 中创建、测试和推理机器学习模型开发的整个过程。这是为了那些刚接触机器学习开发的读者而对开发过程进行的较为详细的解释。


    在浏览器中通过输入以下网址启动 Google Colab：


    ```

    http://colab.research.google.com

    ```


    你将看到如图 2-1 所示的屏幕。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig1_HTML.jpg](img/495303_1_En_2_Fig1_HTML.jpg)


    图 2-1


    创建新的 Colab 笔记本


    选择 **新建 PYTHON3 笔记本** 选项以打开一个新的 Python 3 笔记本。假设你已登录 Google 账户，你将看到如图 2-2 所示的屏幕。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig2_HTML.jpg](img/495303_1_En_2_Fig2_HTML.jpg)


    图 2-2


    新的 Colab 笔记本


    笔记本的默认名称以 `Untitledxxx.ipnyb` 开头。将其名称更改为 Hello World 或你喜欢的任何名称。接下来，你将编写代码以在你的
    Python 代码中导入 TensorFlow 库。


    ### 导入


    我们简单的程序将需要三个导入——TensorFlow 2.x、用于处理数据的 `numpy` 库，以及用于绘制图表的 `matplotlib`。

