    除了准确率和损失指标，我们还经常使用混淆矩阵来评估网络的性能，接下来将对此进行讨论。


    ### 对测试数据进行预测


    混淆矩阵需要预测值和真实标签。因此，我们首先需要对测试数据生成预测。使用 `predict_classes` 方法进行预测，如下所示：


