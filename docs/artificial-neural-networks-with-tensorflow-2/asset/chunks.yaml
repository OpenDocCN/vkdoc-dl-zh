    \n# Preface\n\nWith recent advances in deep learning and the ever-growing popularity\
    \ of TensorFlow, you see several domains where machine learning models have caused\
    \ a tremendous impact. For a developer, it gives a great opportunity to apply\
    \ their skills in real-world projects across a wide range of domains. Having a\
    \ knowledge of what is available in the industry today becomes an important asset.\
    \ This book attempts to provide you with a wide range of real-world applications\
    \ based on deep neural networks (DNN) and the latest version of TensorFlow. It\
    \ provides a comprehensive coverage of various deep learning architectures. It\
    \ is fully project-oriented and contains about 25 fully implemented real-life\
    \ projects.\n\nChapter [1](#495303_1_En_1_Chapter.xhtml) starts with an introduction\
    \ to TensorFlow 2, describing why it is considered a complete platform for machine\
    \ learning. It describes the various additions to TensorFlow such as `tf.keras`\
    \ integration, eager execution, distributed training, deployment on edge devices,\
    \ and the use of data pipelines. At the end, it provides guidance for setting\
    \ up the development environment for running projects in the book.\n\nChapter\
    \ [2](#495303_1_En_2_Chapter.xhtml) goes deeper into TensorFlow 2. As is the convention,\
    \ we start with a trivial “Hello World” kind of application introducing you to\
    \ the complete machine learning development cycle. The chapter then deals with\
    \ a binary classification problem that is a typical application taught at the\
    \ beginning of any machine learning course. Here, you are introduced to data preprocessing,\
    \ defining a dense neural network using `tf.keras` API, training the model, and\
    \ evaluating its performance using TensorBoard metrics and the traditional confusion\
    \ matrix. Rather than dealing with only the classification, the project teaches\
    \ you how to load data at runtime into your development environment, how to preprocess\
    \ it, how to develop a machine learning model, and finally how to evaluate the\
    \ model’s performance using TensorBoard analytics and other traditional techniques.\n\
    \nChapter [3](#495303_1_En_3_Chapter.xhtml) goes deeper in the `tf.keras` module.\
    \ It introduces you to the functional API for model building. It talks about object\
    \ orientation in TensorFlow and shows how to create a class hierarchy for your\
    \ models and how to create custom layers by subclassing. You will learn how to\
    \ save the model using TensorFlow’s new `SavedModel` interface and several ways\
    \ of saving partial or full models. You will then do a project on a multiclass\
    \ classification using predefined Convolutional Neural Network (CNN) layers in\
    \ `tf.keras`. Again, unlike the traditional ways of teaching, I show you how to\
    \ experiment with different network architectures to optimize model performance.\n\
    \nAs training deep neural networks using multiple CNN layers is resource hungry,\
    \ in Chapter [4](#495303_1_En_4_Chapter.xhtml) I show you how to take advantage\
    \ of somebody else’s training. This chapter deals with transfer learning where\
    \ the knowledge of a domain expert and somebody else’s model development efforts\
    \ are used to your advantage almost effortlessly. The chapter deals with two projects.\
    \ The first project shows you how to use a pre-trained `ImageNet` classifier to\
    \ classify your own set of images. The second project shows you how to construct\
    \ your own classifier based on a pre-trained model.\n\nAny machine learning training\
    \ starts with classification and regression problems. In the previous chapters,\
    \ we tackled classification to a great depth. The question arises: Can we use\
    \ deep neural networks for regression analysis where there are several successful\
    \ statistical-based techniques already available for our use? I show you how to\
    \ use DNN for regression in Chapter [5](#495303_1_En_5_Chapter.xhtml) with the\
    \ help of three different dense neural network architectures.\n\nThough the use\
    \ of pre-trained models eases your custom model development, there are many instances\
    \ where you cannot find a pre-trained model that fits your purpose. The model\
    \ development from scratch requires lots of plumbing; the Estimators in TensorFlow\
    \ come to your help in these situations. Chapter [6](#495303_1_En_6_Chapter.xhtml)\
    \ deals with estimators. It contains four projects. The first two projects describe\
    \ how to use a predefined estimator for classification and then a regression.\
    \ The third project talks about how to create a custom estimator from scratch,\
    \ and the last one talks about creating a custom estimator for a pre-trained model.\n\
    \nChapter [7](#495303_1_En_7_Chapter.xhtml) talks about text generation techniques.\
    \ It describes the traditional techniques of RNNs (recurrent neural networks)\
    \ and LSTM (long short-term memory) for text generation and shows you how to use\
    \ LSTM for a trivial application of generating baby names. The next project in\
    \ the chapter uses some advanced text generation techniques to create text matching\
    \ the linguistics of a famous novel by Tolstoy. As training a text generation\
    \ model is a very lengthy process, I will show some techniques of performing such\
    \ long-duration training by showing you how to continue upon an interrupted training,\
    \ which may be an intentional or unintentional interrupt.\n\nChapter [8](#495303_1_En_8_Chapter.xhtml)\
    \ takes you further in the text generation where I describe the seq2seq model,\
    \ encoder/decoder architecture, and a recent attention model for language translation.\
    \ The chapter gives an in-depth coverage of the English to Spanish translator\
    \ that uses glove word embedding. It shows you how to define your own machine\
    \ learning model with encoder, decoder, and attention layers.\n\nChapter [9](#495303_1_En_9_Chapter.xhtml)\
    \ describes the state-of-the-art technology for text generation. It describes\
    \ the latest transformer-based architecture for natural language processing. A\
    \ complete in-depth project teaches you how to construct a transformer model on\
    \ your own in Python, and not to depend fully on just the pre-trained models such\
    \ as BERT (Bidirectional Encoder Representations from Transformers)."
