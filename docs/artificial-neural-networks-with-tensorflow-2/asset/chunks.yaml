- fmt: "# Generating Baby Names\n\nFor this project, you will be using the dataset\
    \ given in the famous Andrej Karpathy blog on text generation – *The Unreasonable\
    \ Effectiveness of Recurrent Neural Networks* (`http://karpathy.github.io/2015/05/21/rnn-effectiveness/`).\
    \ The dataset consists of several known baby names separated by a newline character.\
    \ You will use these names to train the LSTM model so that it memorizes the sequences\
    \ defined in the set. After the training, you will ask the model to predict a\
    \ few new names based on the semantics it has learned.\n\n## Creating Project\n\
    \nCreate a new Colab project and rename it to `TextGenerationBabyNames`. Import\
    \ the required libraries.\n\n```\nimport sys\nimport re\nimport requests\nimport\
    \ numpy as np\nimport tensorflow as tf\nfrom tensorflow.keras import Sequential\n\
