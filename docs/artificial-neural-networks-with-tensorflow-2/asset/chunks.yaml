    \ The Transformer model eliminates the need for LSTMs and produces far better\
    \ results than the `seq2seq` model that uses LSTMs. So, let us understand what\
    \ a Transformer model is.\n\n## Transformer\n\nIn the last chapter, you saw the\
    \ importance of Attention while doing language translation. The Attention module\
    \ provided the weightage to the words that are important to the semantics of the\
    \ sentence. This was then given as an input to the decoder along with the regular\
    \ translation. Knowing what parts of the sentence are important, the decoder was\
    \ able to provide a better translation.\n\nThe schematic of the Transformer model\
    \ is shown in Figure [9-1](#495303_1_En_9_Chapter.xhtml#Fig1).\n\n![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig1_HTML.jpg](images/495303_1_En_9_Chapter/495303_1_En_9_Fig1_HTML.jpg)\n\
    \n**Figure 9-1** General architecture of Transformer\n\nAs such, the Transformer\
    \ has an Encoder and a Decoder like the one you saw in the previous chapter. The\
    \ major difference here is that both Encoders and Decoders do not contain the\
    \ LSTM layers like in the previous case. Rather, both of them contain multiple\
    \ layers of specially designed Keras layers called the Encoder layer and Decoder\
    \ layer. The number of this Encoder Layer and Decoder Layer is user configurable.\
    \ An Encoder Layer contains a special Attention block called the Multi-Head Attention\
    \ – marked as MA in the diagram. The Decoder too contains this kind of MA block.\
    \ Additionally, the decoder contains another Attention block called the Masked\
    \ Multi-Head Attention – marked as MMA in the diagram. The Encoding/Decoding does\
    \ not happen sequentially as in the earlier case. Rather, the entire sentence\
    \ is split into words which are processed in parallel. They are divided into heads,\
    \ and probably thus the name comes MultiHead. This division also facilitates the\
    \ distributed training and inference. Thus, the Transformer model outperforms\
    \ the Encoder/Decoder model with the Attention discussed in Chapter [14](#495303_1_En_14_Chapter.xhtml).\n\
    \nThere is another thing that you may have noticed in the diagram, and that is\
