    \ the response into a local variable:\n\n```\nraw_txt = r.text\n```\n\nCheck the\
    \ length of the data read by calling the `len` method on the `raw_txt`:\n\n```\n\
    len(raw_txt)\n```\n\nYou will get the output as `52127`, indicating that there\
    \ are totally 52,127 characters in the dataset. To see what the data looks like,\
    \ simply print the `raw_txt` on the terminal:\n\n```\nraw_txt\n```\n\nThe command\
    \ and its output are shown in Figure 7-10.\n\n![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig10_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig10_HTML.jpg)\n\
    \n**Figure 7-10** Data file contents\n\nYou see a long list containing the names\
    \ separated by a newline character. You can check out the first few names by printing\
    \ them on individual lines using the `print` statement:\n\n```\nprint(raw_txt[:100])\n\
    ```\n\nYou will see the following output:\n\n```\njka\nDillie\nRyine\nCherita\n\
    Dasher\nChailine\nFrennide\nGremaley\nPatj\nHandi\nGully\nWennie\nFerentra\nJixandli\n\
    ```\n\nThe program has printed the first 100 characters. The names obviously are\
    \ of variable lengths.\n\n## Processing Text\n\nFor inputting the data to our\
    \ model for training, we must get rid of the `\\n` character. We replace it with\
    \ a space by using the following command:\n\n```\nraw_txt = raw_txt.replace('\\\
    n', ' ')\n```\n\nWe now extract all the unique characters from the `raw_txt` by\
    \ creating a set on it:\n\n```\nset(raw_txt)\n```\n\nThe partial output is shown\
    \ in Figure 7-11.\n\n![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig11_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig11_HTML.jpg)\n\
    \n**Figure 7-11** Unique character set\n\nAs you can see, the set contains characters\
    \ such as space, dash (`-`), dot (`.`), colon (`:`), and numerics (0 through 9).\
    \ Before training the model, these characters should be removed from the set as\
    \ they are not useful in the new names that the model would be generating. We\
    \ remove these characters by using the regular expressions.\n\n```\nraw_txt =\
    \ re.sub('[-.0-9:]', '', raw_txt)\n```\n\nAlso, we do not need the presence of\
    \ both uppercase and lowercase characters in the generated baby names. So, we\
    \ convert all the characters to lowercase by calling the `lower` method:\n\n```\n\
    raw_txt1 = raw_txt.lower()\nset(raw_txt1)\n```\n\nTry printing the set again,\
    \ and you will notice that it contains only the lowercase alphabets and the space\
    \ character.\n\nYou would be wondering why I did this entire exercise of data\
    \ processing if, finally, we wanted only a set of lowercase alphabets and the\
    \ space character. For generating the baby names, the destination character set\
    \ just contains the alphabets and the space to separate out the names. However,\
    \ in more advanced text generation applications such as generating documents containing\
    \ mathematical equations, legal documents, science abstracts, and so on, your\
    \ destination character set would be much larger, containing all sorts of characters.\
    \ However, taking a large destination character set would also result in an exponential\
    \ increase in the training period. So, generally, we will strip a few unwanted\
    \ characters from the original text. Such text processing for removing the undesired\
    \ characters would result in faster training.\n\nYou can now check the size of\
    \ this new set:\n\n```\nlen1 = len(set(raw_txt1))\nprint(len1)\n```\n\nIt would\
    \ print `27` on your terminal.\n\nAs the model works on numbers and not on the\
    \ alphabets, you need to map the alphabets to distinct numbers. Also, when the\
    \ model outputs a prediction, it will send you a set of numbers which must be\
    \ converted back to alphabets for you to make sense. Thus, we create two arrays\
    \ for these mappings. This is done using the following code snippet:\n\n```\n\
    chars = sorted(list(set(raw_txt1)))\narr = np.arange(0, len1)\nchar_to_ix = {}\n\
    ix_to_char = {}\nfor i in range(len1):\n    char_to_ix[chars[i]] = arr[i]\n  \
    \  ix_to_char[arr[i]] = chars[i]\n```\n\nThe `char_to_ix` array will provide a\
    \ mapping from characters in the set to unique integers, and `ix_to_char` will\
    \ provide the reverse mappings from integer to characters. Try printing the `ix_to_char`\
    \ array, and you will see the partial output shown in Figure 7-12.\n\n![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig12_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig12_HTML.jpg)\n\
    \n**Figure 7-12** Unique character set after preprocessing\n\nNow, you will create\
    \ the input and output sequences using the following code snippet:\n\n```\nmaxlen\
    \ = 5\nx_data = []\ny_data = []\nfor i in range(0, len(raw_txt1) - maxlen, 1):\n\
    \    in_seq = raw_txt1[i: i + maxlen]\n    out_seq = raw_txt1[i + maxlen]\n  \
    \  x_data.append([char_to_ix[char] for char in in_seq])\n    y_data.append([char_to_ix[out_seq]])\n\
    nb_chars = len(x_data)\nprint('Text corpus: {}'.format(nb_chars))\nprint('Sequences\
    \ # ', int(len(x_data) / maxlen))\n```\n\nNote that we define a sequence length\
    \ of 5. So the first five characters would be input, and the sixth character would\
    \ be the target. In the next loop, characters from 2 to 6 would be the input sequence,\
    \ and character 7 would be the target and so on. Thus, in a `for` loop, we create\
    \ the `x_data` for training our model, `y_data` being the target values used while\
    \ training. The output of the preceding code snippet would be as follows:\n\n\
    ```\nText corpus: 52038\nSequences #  10407\n```\n\nThe dataset consists of 52,038\
    \ characters, which is divided into 10,407 sequences, each of length 5.\n\nNext,\
    \ we transform the data into numpy arrays for inputting to our model and also\
    \ normalize the training data to a scale of 0 to 1.\n\n```\nx = np.reshape(x_data,\
    \ (nb_chars, maxlen, 1))\nx = x / float(len(chars))\n```\n\nWe convert the target\
    \ sequence into categorical columns.\n\n```\ny = tf.keras.utils.to_categorical(y_data)\n\
    y[:1]\n```\n\nIn the preceding statement, when you print one of the items in the\
    \ `y_data` after conversion, you would see an output shown in Figure 7-13.\n\n\
    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig13_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig13_HTML.jpg)\n\
    \n**Figure 7-13** A sample target data after categorization\n\nIn this array,\
    \ one of the values is 1, while the rest are 0. The value 1 corresponds to the\
    \ character in the `char_to_ix` array at that particular index in the array.\n\
    \nYou may now print the shape of `x_data`:\n\n```\nx.shape\n```\n\nThe output\
    \ is\n\n```\n(52038, 5, 1)\n```\n\nThis indicates that the input has 52,038 sequences,\
    \ each of length 5. You may also check the size of `y` by calling `y.shape`.\n\
    \n```\ny.shape\n```\n\nThe output is\n\n```\n(52038, 27)\n```\n\nThere are 27\
    \ categories in the output."
  raw: '## Generating Baby Names


    For this project, you will be using the dataset given in the famous Andrej Karpathy
    blog on text generation – *The Unreasonable Effectiveness of Recurrent Neural
    Networks* ([`http://karpathy.github.io/2015/05/21/rnn-effectiveness/`](http://karpathy.github.io/2015/05/21/rnn-effectiveness/)).
    The dataset consists of several known baby names separated by a newline character.
    You will use these names to train the LSTM model so that it memorizes the sequences
    defined in the set. After the training, you will ask the model to predict a few
    new names based on the semantics it has learned.


    ### Creating Project


    Create a new Colab project and rename it to TextGenerationBabyNames. Import the
    required libraries.


    ```

    import sys

    import re

    import requests

    import numpy as np

    import tensorflow as tf

    from tensorflow.keras import Sequential

    from tensorflow.keras.callbacks

    import ModelCheckpoint

    from tensorflow.keras.layers

    import Dense, Activation,

    Dropout, LSTM

    ```


    ### Downloading Text


    To download the dataset, make a HTTP request on the URL specified in the following
    command:r = requests.get(''[https://​cs.​stanford.​edu/​people/​karpathy/​namesGenUnique.​txt](https://cs.stanford.edu/people/karpathy/namesGenUnique.txt)'')


    On successful completion, you can extract the dataset by copying the text from
    the response into a local variable:


    ```

    raw_txt = r.text

    ```


    Check the length of the data read by calling the len method on the raw_txt:


    ```

    len(raw_txt)

    ```


    You will get the output as 52127, indicating that there are totally 52,127 characters
    in the dataset. To see what the data looks like, simply print the raw_txt on the
    terminal:


    ```

    raw_txt

    ```


    The command and its output are shown in Figure [7-10](#495303_1_En_7_Chapter.xhtml#Fig10).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig10_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Data file contents


    You see a long list containing the names separated by a newline character. You
    can check out the first few names by printing them on individual lines using the
    print statement:


    ```

    print(raw_txt[:100])

    ```


    You will see the following output:


    ```

    jka

    Dillie

    Ryine

    Cherita

    Dasher

    Chailine

    Frennide

    Gremaley

    Patj

    Handi

    Gully

    Wennie

    Ferentra

    Jixandli

    ```


    The program has printed the first 100 characters. The names obviously are of variable
    lengths.


    ### Processing Text


    For inputting the data to our model for training, we must get rid of the \n character.
    We replace it with a space by using the following command:


    ```

    raw_txt = raw_txt.replace(''\n'' , '' '')

    ```


    We now extract all the unique characters from the raw_txt by creating a set on
    it:


    ```

    set(raw_txt)

    ```


    The partial output is shown in Figure [7-11](#495303_1_En_7_Chapter.xhtml#Fig11).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig11_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Unique character set


    As you can see, the set contains characters such as space, dash (-), dot (.),
    colon (:), and numerics (0 through 9). Before training the model, these characters
    should be removed from the set as they are not useful in the new names that the
    model would be generating. We remove these characters by using the regular expressions.


    ```

    raw_txt = re.sub(''[-.0-9:]'' , '''' , raw_txt)

    ```


    Also, we do not need the presence of both uppercase and lowercase characters in
    the generated baby names. So, we convert all the characters to lowercase by calling
    the lower method:


    ```

    raw_txt1 = raw_txt.lower()

    set(raw_txt1)

    ```


    Try printing the set again, and you will notice that it contains only the lowercase
    alphabets and the space character.


    You would be wondering why I did this entire exercise of data processing if, finally,
    we wanted only a set of lowercase alphabets and the space character. For generating
    the baby names, the destination character set just contains the alphabets and
    the space to separate out the names. However, in more advanced text generation
    applications such as generating documents containing mathematical equations, legal
    documents, science abstracts, and so on, your destination character set would
    be much larger, containing all sorts of characters. However, taking a large destination
    character set would also result in an exponential increase in the training period.
    So, generally, we will strip a few unwanted characters from the original text.
    Such text processing for removing the undesired characters would result in faster
    training.


    You can now check the size of this new set:


    ```

    len1 = len(set(raw_txt1))

    print (len1)

    ```


    It would print 27 on your terminal.


    As the model works on numbers and not on the alphabets, you need to map the alphabets
    to distinct numbers. Also, when the model outputs a prediction, it will send you
    a set of numbers which must be converted back to alphabets for you to make sense.
    Thus, we create two arrays for these mappings. This is done using the following
    code snippet:


    ```

    chars = sorted(list(set(raw_txt1)))

    arr = np.arange(0, len1)

    char_to_ix = {}

    ix_to_char = {}

    for i in range(len1):

    char_to_ix[chars[i]] = arr[i]

    ix_to_char[arr[i]] = chars[i]

    ```


    The char_to_ix array will provide a mapping from characters in the set to unique
    integers, and ix_to_char will provide the reverse mappings from integer to characters.
    Try printing the ix_to_char array, and you will see the partial output shown in
    Figure [7-12](#495303_1_En_7_Chapter.xhtml#Fig12).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig12_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig12_HTML.jpg)


    Figure 7-12


    Unique character set after preprocessing


    Now, you will create the input and output sequences using the following code snippet:


    ```

    maxlen = 5

    x_data = []

    y_data = []

    for i in range(0, len(raw_txt1) - maxlen, 1):

    in_seq  = raw_txt1[i: i + maxlen]

    out_seq = raw_txt1[i + maxlen]

    x_data.append([char_to_ix[char]

    for char in in_seq])

    y_data.append([char_to_ix[out_seq]])

    nb_chars = len(x_data)

    print(''Text corpus: {}''.format(nb_chars))

    print(''Sequences # '', int(len(x_data) / maxlen))

    ```


    Note that we define a sequence length of 5\. So the first five characters would
    be input, and the sixth character would be the target. In the next loop, characters
    from 2 to 6 would be the input sequence, and character 7 would be the target and
    so on. Thus, in a for loop, we create the x_data for training our model, y_data
    being the target values used while training. The output of the preceding code
    snippet would be as follows:


    ```

    Text corpus: 52038

    Sequences #  10407

    ```


    The dataset consists of 52,038 characters, which is divided into 10,407 sequences,
    each of length 5.


    Next, we transform the data into numpy arrays for inputting to our model and also
    normalize the training data to a scale of 0 to 1.


    ```

    x = np.reshape(x_data , (nb_chars , maxlen , 1))

    x = x/float(len(chars))

    ```


    We convert the target sequence into categorical columns.


    ```

    y = tf.keras.utils.to_categorical(y_data)

    y[:1]

    ```


    In the preceding statement, when you print one of the items in the y_data after
    conversion, you would see an output shown in Figure [7-13](#495303_1_En_7_Chapter.xhtml#Fig13).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig13_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig13_HTML.jpg)


    Figure 7-13


    A sample target data after categorization


    In this array, one of the values is 1, while the rest are 0\. The value 1 corresponds
    to the character in the char_to_ix array at that particular index in the array.


    You may now print the shape of x_data:


    ```

    x.shape

    ```


    The output is


    ```

    (52038, 5, 1)

    ```


    This indicates that the input has 52,038 sequences, each of length 5. You may
    also check the size of y by calling y.shape.


    ```

    y.shape

    ```


    The output is


    ```

    (52038, 27)

    ```


    There are 27 categories in the output.'
