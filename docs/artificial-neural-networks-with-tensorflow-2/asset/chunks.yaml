    ### 索引词向量


    `glove` 词嵌入提供了四种维度的映射：50、100、200 和 300。在我们的程序中，将使用 200 维的文件。使用的维度越高，翻译效果越好，但代价是处理时间和资源消耗的增加。


    以下是 50 维文件中的一行示例：


    ```

    more 0.87943 -0.11176 0.4338 -0.42919 0.41989 0.2183 -0.3674 -0.60889 -0.41072
    0.4899 -0.4006 -0.50159 0.24187 -0.1564 0.67703 -0.021355 0.33676 0.35209 -0.24232
    -1.0745 -0.13775 0.29949 0.44603 -0.14464 0.16625 -1.3699 -0.38233 -0.011387 0.38127
    0.038097 4.3657 0.44172 0.34043 -0.35538 0.30073 -0.09223 -0.33221 0.37709 -0.29665
    -0.30311 -0.49652 0.34285 0.77089 0.60848 0.15698 0.029356 -0.42687 0.37183 -0.71368
    0.30175

    '' -0.039369 1.2036 0.35401 -0.55999 -0.52078 -0.66988 -0.75417 -0.6534 -0.23246
    0.58686 -0.40797 1.2057 -1.11 0.51235 0.1246 0.05306 0.61041 -1.1295 -0.11834
    0.26311 -0.72112 -0.079739 0.75497 -0.023356 -0.56079 -2.1037 -1.8793 -0.179 -0.14498
    -0.63742 3.181 0.93412 -0.6183 0.58116 0.58956 -0.19806 0.42181 -0.85674 0.33207
    0.020538 -0.60141 0.50403 -0.083316 0.20239 0.443 -0.060769 -0.42807 -0.084135
    0.49164 0.085654

    ```


    词索引是 `more`。该行中的其余条目是其他词的共现概率。我们将嵌入矩阵文件中的每一行分割成词标记。我们将第一个标记用作字典中的键。其余标记是该目标词与其他词的共现概率，并作为值插入字典中。


    创建此字典的代码如下所示：


    ```

    #creating dictionary of words corresponding to vectors

    print(''Indexing word vectors.'')

    embeddings_index = {}

    # Use this open command in case of downloading using wget above

    #f = open(''glove.6B.200d.txt'', encoding=''utf-8'')

    # we can choose any dimensions 50 100 200 300

    f = open(''drive/My Drive/tfbookdata/glove.6B.200d.txt'',

    encoding=''utf-8'')

    for line in f:

    values = line.split()

    word = values[0]

    coefs = np.asarray(values[1:], dtype="float32")

    embeddings_index[word] = coefs

    f.close()

    print(''Found %s word vectors.'' %

    len(embeddings_index))

    ```


    运行代码时，它会打印出 `400000`，表明完整数据集中有这么多嵌入可用。当然，我们需要为从 2332 个词的数据集中选出的词获取嵌入。你可以尝试打印其中一个关键词的矩阵：


    ```

    embeddings_index["any"]

    ```


    矩阵的部分输出如图 8-9 所示。


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig9_HTML.jpg](img/495303_1_En_8_Fig9_HTML.jpg)


    **图 8-9** 关键词“any”的嵌入矩阵


    你会注意到，对于像“any”这样的每个词，都有 200 个可用的映射，这正是我们选择的维度大小。


    ### 创建子集


    现在，我们将使用一个简单的 `for` 循环提取英语输入词汇表的条目，如下所示：


    ```

    #embedding matrix

    num_words = len(tokenizer_in.word_index)+1

    word2idx_input = tokenizer_in.word_index

    embedding_matrix = np.zeros((num_words, 200))

    for word,i in word2idx_input.items():

    if i<num_words:

    embedding_vector = embeddings_index.get(word)

    if embedding_vector is not None:

    embedding_matrix[i] = embedding_vector

    embedding_matrix.shape

    ```


    矩阵创建后，其形状将打印在终端上，如下所示：


    ```

    (2332, 200)

    ```


    请注意，我们之前看到输入库中有 2332 个标记化的词（英语）。每个词都有 200 个共现概率。为什么是 200？这是因为我们选择了一个 200 维的映射文件。


    ### 定义嵌入层


    我们声明两个变量，在创建 LSTM 和嵌入层时将使用它们。


    ```

    #lstm hidden dimensions

    LATENT_DIM=256

    #embeding layer dimensions

    EMBEDDING_DIM=200

    ```


    我们按如下方式声明嵌入层：


    ```

    embedding_layer=Embedding(input_vocab_size,

    EMBEDDING_DIM,

    weights=[embedding_matrix],

    input_length=maxlen_input)

    ```


    请注意，我们的输入词汇表大小是 2332，维度是 200——即我们选择的矩阵大小。`weights` 参数被设置为我们之前创建的嵌入矩阵，该矩阵提供了词到向量的映射。`input_length`
    被设置为我们填充序列的最大长度，在本例中为 5。


    现在，我们将开始定义模型。为此，我们将创建一些实用方法和层。


    ### 定义编码器


    我们现在定义编码器。对于编码器，首先定义输入层。


    ```

    #encoder

    encoder_input = Input(shape=(maxlen_input,),

    name = ''encoderinput'')

    ```


    该层的输入大小为 5，由 `maxlen_input` 参数值决定。我们使用以下语句创建一个带有此输入的 `embedding_layer`：


    ```

    encoder_input = embedding_layer(encoder_input)

    ```


    接下来，我们按如下方式定义 LSTM 层：


    ```

    encoder = Bidirectional(LSTM(LATENT_DIM,

    return_sequences=True,

    dropout = 0.3),

    name = ''encoder_bidirection'')

    ```


    我们使用双向 LSTM。隐藏层数量设置为 `LATENT_DIM`，即 200。序列在每个时间步都返回到下一个隐藏层。每层有 30% 的 dropout。


    最后，我们将编码器输入层传递给此编码器。


    ```

    encoder_outputs = encoder(encoder_input)

    ```


    这将生成编码器输出。你可以通过在其上调用 `shape` 方法来检查其形状。


    ```

    encoder_outputs.shape

    ```


    它给出以下输出：


    ```

    TensorShape([None, 5, 512])

    ```


    由于 LSTM 是双向的，我们得到 512 维，这是我们的潜在维度（`LATENT_DIM`）256 乘以 2 的结果。潜在维度是 LSTM 层中的单元数。


    至此，我们将继续定义解码器。


    ### 定义解码器


    我们首先为解码器模型定义输入层：


    ```

    decoder_inputs = Input(shape=(maxlen_output,),

    name=''decoder_input'')

    ```


    其中，对于我们的数据集，`maxlen_output` 是 9。嵌入层使用以下语句定义：


    ```

    decoder_embedding = Embedding(output_vocab_size,

    EMBEDDING_DIM,

    name=''decoder_embedding'')

    ```


    对于我们的数据集，`output_vocab_size` 是 4964，而由 `EMBEDDING_DIM` 值指定的输出维度是 200。最后，我们创建解码器输入：


    ```

    decoder_input = decoder_embedding(decoder_inputs)

    ```


    通过调用 `shape` 方法打印此张量的形状：


    ```

    decoder_input.shape

    ```


    输出为


    ```

    TensorShape([None, 9, 200])

    ```


    请注意，输出词汇表的序列长度为 9。


    #### 定义解码器层


    我们现在定义解码器层。我们需要一个 LSTM 层和一个 softmax 激活的全连接层。


    LSTM 层定义如下：


    ```

    decoder_lstm = LSTM(LATENT_DIM,

    return_state = True,

    name = ''decoder_lstm'')

    ```


    `LATENT_DIM` 参数的值为 256，即隐藏层数量。在每个时间步，状态都会返回到下一层。


    softmax 全连接层定义如下：


    ```

    decoder_dense = Dense(output_vocab_size,

    activation=''softmax'',

    name=''decoder_dense'')

    ```


    该层的维度设置为 `output_vocab_size`，在本例中为 4964。该层将预测词汇表中每个词出现的概率。如果我们采用完整数据集，该层的维度会非常高，从而导致解码时间增加。


    我们现在定义注意力层。


    ### 注意力网络


    我们现在将开始为我们的注意力网络定义模型。

    '
- fmt: '#### Defining Softmax


    Our Attention context is computed for each time step with a different set of attention
    weights assigned to the network. The attention weights (`α`) at any given time
    step `t[s]` can be expressed mathematically as follows:


    ![$$ {\alpha}_{t_s}=\frac{\mathit{\exp}\ \left( score\left({h}_t,{\overline{h}}_s\right)\right)}{\sum_{s^{\prime
    }=1}^s\mathit{\exp}(score){h}_t,{\overline{h}}_{s\prime}\left)\right)} $$](images/495303_1_En_8_Chapter/495303_1_En_8_Chapter_TeX_Equd.png)


    We implement the calculation of alphas in the following method called `softmax_attention`:


    ```

    # Computing alphas

    import tensorflow.keras.backend as k

    def softmax_attention(x):

    assert(k.ndim(x)>2)

    e=k.exp(x-k.max(x,axis=1,keepdims=True))

    s=k.sum(e,axis=1,keepdims=True)

    return e/s

    ```


    The data is expected to be in the shape `NxTxD`, where `N` is the number of samples,
    `T` is the sequence length, and `D` is the vector dimensionality. With softmax
    over time, we want to ensure all the outputs in time dimension sum to 1. So, we
    exponentiate all values in the input but subtract the max for numerical stability.
    Then, we divide the sum of exponentials. The operations are done on `axis=1`,
    which is the time dimension.


    #### Attention Layers


    We will define a few layers for the use of our Attention model. We declare these
    layers globally as they will be repeatedly used by the decoder.


    We create an `attention_repeat` that acts as a bridge between the encoder and
    decoder modules.


    ```

    attention_repeat =  RepeatVector(maxlen_input)

    ```


    The `maxlen_input` is 5 in our case. We define the concatenation layer as follows:


    ```

    attention_concat = Concatenate(axis=-1)

    ```


    We define a Dense layer with ten nodes and tanh activation.


    ```

    dense1_layer = Dense(10,activation=''tanh'')

    ```


    We create another Dense layer with a single node. The activation is done by our
    especially written softmax over time function.


    ```

    dense2_layer = Dense(1,activation = softmax_attention)

    ```


    Finally, we write a Dot layer for performing the weighted sum of `α[t] * h[t]`.


    ```

    dot_layer = Dot(axes=1)

    ```


    #### Attention Context


    We now write an attention function called `context_attention` that will be called
    by the decoder at each time step.


    ```

    def context_attention(h, st_1):

    ```


    The function takes two parameters: `h` is the current hidden state of the encoder,
    and `s[t_1]` is the previous hidden state of the decoder. So, `h` will take different
    values like `h[1]`, `h[2]`, …, `h[t]` at each iteration; similarly, the `s` will
    also assume different values at each time step. The shape of this will be `LATENT_DIM*2`,
    which equals 512 in our case. We defined `LATENT_DIM` to be 256. Why is this multiplied
    by 2? This is because we will use a bidirectional LSTM.


    We will now use our repeat layer to copy `s[t-1]` `t[x]` times. The shape will
    be (`t[x]`, `LATENT_DIM`).


    ```

    st_1=attention_repeat(st_1)

    ```


    We concatenate all `h[t]` with `s[t-1]`.


    ```

    x=attention_concat([h,st_1])

    ```


    The shape of `x` will be (`t[x]`, `LATENT_DIM + LATENT_DIM * 2`).


    We now use our first Dense layer for learning `α` values.


    ```

    x=dense1_layer(x)

    ```


    We use our second Dense layer with our custom softmax function.


    ```

    alphas=dense2_layer(x)

    ```


    We finally take a dot product of all `α` and `h`.


    ```

    context = dot_layer([alphas,h])

    ```


    The final context is returned to the caller.


    ```

    return context

    ```


    The full function code for `context_attention` is given in Listing [8-1](#495303_1_En_8_Chapter.xhtml#PC75).


    ```

    # computing attention context

    def context_attention(h, st_1)

    st_1=attention_repeat(st_1)

    x=attention_concat([h,st_1])

    x=dense1_layer(x)

    alphas=dense2_layer(x)

    context = dot_layer([alphas,h])

    return context

    Listing 8-1

    Function for computing the attention context

    ```'
