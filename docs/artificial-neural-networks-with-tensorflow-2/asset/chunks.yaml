    # the input for the encoder layer

    inputs1 = Input(shape=(IMG_WIDTH, IMG_HEIGHT, 1,))

    # encoder

    # Using Conv2d to reduce the size of feature maps and image size

    # convert image to 128x128

    encoder_output = Conv2D(64, (3,3), activation="relu",

    padding=''same'', strides=2)(inputs1)

    encoder_output = Conv2D(128, (3,3),

    activation=''relu'',

    padding=''same'')(encoder_output)

    # convert image to 64x64

    encoder_output = Conv2D(128, (3,3),

    activation=''relu'', padding="same",

    strides=2)(encoder_output)

    encoder_output = Conv2D(256, (3,3),

    activation=''relu'',

    padding=''same'')(encoder_output)

    # convert image to 32x32

    encoder_output = Conv2D(256, (3,3),

    activation=''relu'', padding="same",

    strides=2)(encoder_output)

    encoder_output = Conv2D(512, (3,3),

    activation=''relu'', padding="same")

    (encoder_output)

    # mid-level feature extractions

    encoder_output = Conv2D(512, (3,3),

    activation=''relu'',

    padding=''same'')(encoder_output)

    encoder_output = Conv2D(256, (3,3),

    activation=''relu'',

    padding=''same'')(encoder_output)

    # decoder

    # Adding colors to the grayscale image and upsizing it

    decoder_output = Conv2D(128, (3,3),

    activation=''relu'',

    padding=''same'')(encoder_output)

    decoder_output = UpSampling2D((2, 2))(decoder_output)

    # image size 64x64

    decoder_output = Conv2D(64, (3,3), activation="relu",

    padding=''same'')(decoder_output)

    decoder_output = Conv2D(64, (3,3), activation="relu",

    padding=''same'')(decoder_output)

    decoder_output = UpSampling2D((2, 2))(decoder_output)

    # image size 128x128

    decoder_output = Conv2D(32, (3,3), activation="relu",

    padding=''same'')(decoder_output)

    decoder_output = Conv2D(2, (3, 3), activation="tanh",

    padding=''same'')(decoder_output)

    decoder_output = UpSampling2D((2, 2))(decoder_output)

    # image size 256x256

    ```


    Both the Encoder and Decoder contain few `Conv2D` layers. The Encoder through
    a series of layers downsamples the image to extract its features, and the Decoder
    through its own set of layers attempts to regenerate the original image using
    upsampling at various points and adding colors to the grayscale image to create
    a final image of size 256x256. The last decoder layer uses `tanh` activation for
    squashing the values between –1 and +1. Remember that we had earlier normalized
    the `a` and `b` values in the range –1 through +1.


    After the Encoder and Decoder layers are defined, construct the model and compile
    it using its `compile` method. We use `mse` for the loss function and `Adam` optimizer.


    ```python

    model = Model(inputs=inputs1, outputs=decoder_output)

    model.compile(loss=''mse'', optimizer="adam",

    metrics=[''accuracy''])

    print(model.summary())

    ```


    The model summary is shown in Figure [14-6](#495303_1_En_14_Chapter.xhtml#Fig6).


