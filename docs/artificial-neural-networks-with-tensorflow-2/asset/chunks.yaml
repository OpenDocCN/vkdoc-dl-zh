    \ `ix_to_char` 将提供从整数到字符的反向映射。尝试打印 `ix_to_char` 数组，你将看到如图 7-12 所示的部分输出。\n\n![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig12_HTML.jpg](img/495303_1_En_7_Fig12_HTML.jpg)\n\
