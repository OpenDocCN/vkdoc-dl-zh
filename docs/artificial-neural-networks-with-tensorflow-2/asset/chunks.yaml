    VGG16 自定义估计器完整源码

    ```


    这个简单的示例演示了如何将预训练模型应用到自己的模型中。


    ## 本章小结


    估计器通过提供统一的训练、评估和预测接口，简化了模型开发流程。它们将数据管道与模型开发分离，从而让你能够轻松地使用不同的数据集进行实验。估计器分为预定义估计器和自定义估计器。在本章中，你学习了如何使用预定义估计器处理分类和回归两类问题。自定义估计器用于将现有模型迁移到估计器接口，以利用估计器提供的优势。基于估计器的模型可以在分布式环境甚至
    CPU/GPU/TPU 上进行训练。一旦你使用估计器开发了模型，即使是在分布式环境中，也可以轻松部署而无需修改任何代码。你还学习了如何在构建自己的模型时使用像
    VGG16 这样的预训练模型。建议尽可能使用预训练模型。如果它不能满足你的需求，再考虑创建自定义估计器。


    # 7. 文本生成


    在本书中，到目前为止你使用的都是普通神经网络，即那些不具备记忆过去能力的网络。它们接受固定大小的向量作为输入，并产生固定大小的输出。以图像分类为例，输入是一张图像，输出是模型训练过的类别之一。现在，考虑一种情况，即预测需要依赖先前预测的结果。举个例子，假设你在看电影。你的大脑会不断猜测下一个场景是什么。这种猜测不仅依赖于刚刚发生的情节，还可能依赖于
    15 分钟前甚至一小时前（对于长电影）发生的事情。我们使用的普通神经网络，就其工作方式而言，没有记忆来记住过去发生的事情，也无法将这种知识应用于当前的猜测。


    再举一个例子：我说我来自印度。好的，你获得了“我来自印度”这个信息。过了一段时间，有人让你猜我说什么语言。你回答“印度国语”的概率很大程度上取决于你是否还记得我来自印度。我们目前所见的神经网络根本无法解决这类问题。这正是循环神经网络（RNN）及其特殊版本——长短期记忆网络（LSTM）登场的原因。在本章中，你将了解
    RNN 和 LSTM，随后会有一个文本生成的示例。后续所有章节也将使用这些网络来解决不同领域的问题。因此，充分理解本章内容将有助于你更好地理解后续章节。


    在本章中，我们将训练基于字符级别的 RNN 语言模型。我们将一段文本作为输入提供给模型，训练模型理解文本中字符的序列关系，然后让模型预测用户指定字符序列的下一个字符出现的概率。简而言之，如果有人让你预测字符序列
    `"hell"` 之后的下一个字符，你很可能会回答 `"o"`。这是因为字符 `"o"` 的概率在所有字母中最高。我们将训练我们的网络来执行此类预测。


    具体来说，我将讨论两个文本生成应用；第一个应用比较简单，旨在让你熟悉该过程的细节。在这个简单的应用中，你将训练模型根据其对现有名字的了解来生成婴儿名字。第二个应用则更具挑战性，我们将尝试让模型学习一部著名小说的语义和写作风格，然后创作一部新的小说。


    那么，首先让我们尝试理解什么是循环神经网络。

    '
- fmt: '# Recurrent Neural Networks


    Like Convolutional Neural Networks that you used in your image classification
    problems, RNNs have been around for decades. Researchers could exploit their full
    potential only recently due to the growing computational resources that are made
    available to them now. RNNs are now used in transcribing speech to text, used
    to perform language translation and generate handwritten text, used in time series
    forecasting, and have been used as powerful language models. We find RNNs in computer
    vision applications that perform frame-level video classification, image captioning,
    visual question answering, and so on. There are numerous applications in which
    RNNs and their variants are used in the current days. In the remainder of this
    book, you will learn to use RNNs for developing such various kinds of applications.


    RNNs allow us to operate over sequences of vectors, which can be in the form of
    input, output, or in the most general case both. The three models are explained
    using Figure [7-1](#495303_1_En_7_Chapter.xhtml#Fig1).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig1_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Caption: NN models with various inputs/outputs


    Look at the Image Captioning neural networks (NN) Model shown in Figure [7-1](#495303_1_En_7_Chapter.xhtml#Fig1).
    It takes a single input, which is an image. It generates a caption for the image,
    which is a sequence of words/characters. In the Sentiment Analysis Model shown
    in Figure [7-1](#495303_1_En_7_Chapter.xhtml#Fig1), the input to the model is
    a tweet. It consists of a sequence of words/characters. The output produced by
    the model is either a negative or positive. The output is binary, which is a single
    output. Finally, consider the case of a model that accepts a sequence as an input
    and outputs another sequence. The Language Translate Model shown in Figure [7-1](#495303_1_En_7_Chapter.xhtml#Fig1)
    accepts a word/sentence in English and spits out its translation in French, which
    is again a sequence of words/sentences.


    Having said the benefits of RNNs, let me describe the architecture of a simple
    RNN.


    ## Simple RNN


    A RNN may be best described with the help of its architecture drawing shown in
    Figure [7-2](#495303_1_En_7_Chapter.xhtml#Fig2).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig2_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    RNN architecture


    At each node, `X[i]` is the input vector and `h[i]` is the output. Each node except
    the first one in the entire network receives the output of the previous node as
    an additional input. Likewise, the network consists of nodes where the output
    of each is not just influenced by its input alone but also by the inference made
    by the earlier nodes. Thus, RNNs can be considered as the type of artificial neural
    networks that are designed to recognize patterns in a sequence of data. In short,
    RNN not only takes the current input but also what they have perceived previously
    in time, so the network takes two inputs, the present value and the past value.
    The question is to what depth in time we will ask RNN to take into account the
    past values. When you train RNNs for larger depths, you will face a well-known
    vanishing gradient problem. In network training with a large number of layers,
    the vanishing and exploding gradient problems are well known. RNNs inherently
    work on sequences which may be of sufficiently large sizes and are therefore prone
    to vanishing gradients. Before I discuss the solution to this problem, let me
    briefly describe what is meant by a vanishing and exploding gradient.


    ## Vanishing and Exploding Gradients


    During neural network model training, gradients are back-propagated all the way
    to the initial layer. At each layer, they go through a continuous matrix multiplication.
    For deeper networks, due to long chains, the gradients shrink exponentially approaching
    values much below 1, and eventually they vanish, making the model stop learning
    further. This is known as the vanishing gradient problem. On the other hand, if
    they have large values greater than 1, they get larger as they progress through
    the chain and eventually blow up to crash the model. This is called the exploding
    gradient problem.


    From this discussion, you can understand easily why RNNs are prone to vanishing
    gradient problems. To overcome this, a new model called long short-term memory
    (LSTM) was proposed, which I am going to discuss next.


    ## LSTM – A Special Case


    Long short-term memory networks, usually called LSTMs, are a special kind of RNN.
    They are capable of learning long-term dependencies and yet avoid the problem
    of vanishing gradients that occur in simple RNN models. Hochreiter and Schmidhuber
    introduced them first in 1997. Later many people refined and popularized it. The
    LSTMs are now widely used to solve a large variety of problems.


    The main motivation for developing LSTMs is that the model should remember information
    for long periods of time. This should be their default behavior and not something
    that they have to struggle with.


    LSTMs like any other recurrent neural network have the form of a chain of repeating
    modules, except that the internal architecture of a repeating module varies from
    that of a standard RNN. A standard RNN module and its chain were already depicted
    in Figure [7-2](#495303_1_En_7_Chapter.xhtml#Fig2). Each module in RNN has a simple
    structure, such as a single `tanh` layer as depicted in Figure [7-2](#495303_1_En_7_Chapter.xhtml#Fig2).
    Contrary to this, LSTM modules have a more complicated structure. The LSTM module
    is shown in Figure [7-3](#495303_1_En_7_Chapter.xhtml#Fig3).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig3_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    LSTM architecture


    Each repeating module has four network layers. They interact with each other in
    a very special way. In LSTM, information flows through a mechanism known as cell
    states. The entire flow can be explained with the help of the four states of the
    following cells:


    - Forget gate

    - Input gate

    - Update gate

    - Output gate


    I will briefly describe the purpose of each.


    ### Forget Gate


    The forget gate is highlighted in our LSTM block as seen in Figure [7-4](#495303_1_En_7_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig4_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Forget gate


    The forget gate layer has a sigmoid function (`σ`) to decide what information
    to throw away or keep. The inputs to this layer are the previous hidden state
    (`h[t-1]`) and the current input (`x[t]`), and the output is binary. The False
    output tells the network to forget the information, and True output asks it to
    keep the information for each number in the cell state `C[t-1]`. Mathematically,
    this is expressed with the following equation:


    ```

    f_t = σ(W_f . [h_{t-1}, x_t] + b_f)

    ```


    ### Input Gate


    The input gate is highlighted in Figure [7-5](#495303_1_En_7_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig5_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    Input gate


    The sigmoid input layer decides which values we will update, and the `tanh` activation
    layer creates a vector of new candidate values, `C̃_t`. Mathematically, this is
    expressed as


    ```

    i_t = σ(W_i . [h_{t-1}, x_t] + b_i)

    ```


    ```

    C̃_t = tanh(W_c . [h_{t-1}, x_t] + b_c)

    ```'
