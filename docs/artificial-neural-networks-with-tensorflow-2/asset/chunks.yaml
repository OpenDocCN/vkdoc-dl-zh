    weights=''imagenet'')

    ```


    `weights` 参数指定的值是 `imagenet`，这是一个包含超过 1500 万张标注高分辨率图像、约 22000 个类别的数据集。InceptionV3
    模型在 120 万张图像上进行了训练，另有 5 万张图像用于验证，10 万张图像用于测试。因此，我们利用这个训练成果，使用预训练权重。


    请注意，在模型提取过程中，我们移除了顶层。顶层用于图像分类。由于我们只对特征提取感兴趣，因此不需要这些顶层。现在，我们将基于 `image_model` 创建自己的
    `tf.keras` 模型，用于提取图像特征。我们首先提取 InceptionV3 模型的最后一层：


