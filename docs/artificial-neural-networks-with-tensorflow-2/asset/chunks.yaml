    ## A Trivial Machine Learning Application


    To get you started on TensorFlow coding, we will start with a trivial Hello World
    kind of application. In this trivial application, you will develop a machine learning
    model that does the predictions using statistical regression techniques.


    In this application, we will use a fixed set of data points declared within the
    program code itself. Our data will consist of (`x`, `y`) coordinate values. We
    compute a value called `z` that has some linear relationship with `x` and `y`.
    For example, the value of `z` for a given `x` and `y` values may be computed using
    the following mathematical equation:


    ```

    z = 7 * x + 6 * y + 5

    ```


    Our task is to make the machine learn on its own to find the best fit for the
    preceding relationship given a sufficiently large number of `x` and `y` values
    and the corresponding target `z` values. Once the model is trained, we will use
    this model to predict `z` for any unseen `x` and `y` values. For example, given
    `x` equals 2 and `y` equals 3, the model should predict an output `z` equal to
    37. If it predicts 37 and likewise if it predicts `z` with 100% accuracy for any
    not previously known `x` and `y`, we say that the model is fully trained with
    100% accuracy. Practically, it is never possible to develop a model that predicts
    with 100% accuracy. So we try to optimize the model performance to achieve this
    idealistic accuracy level of 100%.


    As you can see from the preceding discussion, the problem that we are trying to
    solve is a classical linear regression case study. To keep things simple, we will
    create a single-layer network consisting of only one neuron, which is trained
    to solve a linear regression problem. In practice, your network will always consist
    of multiple layers with multiple nodes. In this trivial application, I will avoid
    the use of such deep networks as defining those requires a deeper understanding
    of Keras API. You will be exposed to those Keras APIs later in this chapter. For
    this trivial application and all subsequent applications in this book, you will
    use Google Colab for developments.


    ### Creating Colab Notebook


    In this first application, I will guide you through the entire process of creating,
    testing, and inferring a ML model development in Colab. This is a bit of a detailed
    explanation of the development process for the benefit of the readers who are
