    \    ckpt.restore(ckpt_manager.latest_checkpoint)\nckpt.restore(tf.train.latest_checkpoint(checkpoint_path))\n\
    loss_plot = []\n```\n\n```python\ndef train_step(img_tensor, target):\n    loss\
    \ = 0\n    hidden = decoder.reset_state(batch_size=target.shape[0])\n    dec_input\
