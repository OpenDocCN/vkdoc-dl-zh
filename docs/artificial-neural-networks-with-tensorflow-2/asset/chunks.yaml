    Trainable params: 1,060,138

    Non-trainable params: 0

    ```


    After defining the network, we set the optimizer to SGD and compile the model
    with the loss function set to categorical_crossentropy as in the following code
    fragment:


    ```

    opt = tf.keras.optimizers.SGD(lr=0.001, momentum=0.9)

    model_1.compile(optimizer=opt, loss = ''categorical_crossentropy'',

    metrics = [''accuracy''])

    ```


    Now, we train, evaluate and display the error metrics by calling our previously
    defined results function with model_1 as the parameter to it.


    ```

    results(model_1)

    ```


    The output generated is shown in Figure [3-17](#495303_1_En_3_Chapter.xhtml#Fig17).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig17_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig17_HTML.jpg)


    Figure 3-17


    Model 1 error metrics


    As you see the accuracy is about 66% - obviously not within acceptable limits
    in most cases. Also, there is clearly an overfitting. You can reduce overfitting
    through parameter optimization and regularization. We will keep applying such
    techniques to improve the performance of our model.


    You will now make some prediction on an unseen image using the following code
    segment:


    ```

    import urllib

    resource = urllib.request.urlopen("https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch03/test01.png")

    output = open("file01.jpg", "wb")

    output.write(resource.read())

    output.close()

    predict_class("file01.jpg", model_1)

    ```


    The output of predication is shown in Figure [3-18](#495303_1_En_3_Chapter.xhtml#Fig18).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig18_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig18_HTML.jpg)


    Figure 3-18


    The model_1 performance


    Now with the hope to improve the accuracy, we will add two more convolutional
    layers to our architecture.'
  trans: "\n### 包含 2 个卷积层的模型\n\n我们在实验中使用的第一个模型是一个简单的模型，仅包含 2 个卷积层。为了定义模型，Keras 提供了你在第\
    \ 2 章中已经使用过的 Sequential API。你可以通过以下语句导入 Sequential API：\n\n```\nfrom tensorflow.keras.models\
    \ import Sequential\n```\n\nSequential API 允许你构建一个顺序网络架构，你可以按照所需的顺序不断向其中添加层。Keras\
    \ 提供了多种现成的层类型供你使用。同时，它也允许你在需要时创建自己的自定义层。对于这个应用，我们将使用 Keras 提供的层。其中一些命名的层包括`Conv2D`、`Dense`、`Dropout`和`Flatten`。你可以通过以下程序语句在代码中导入它们：\n\
    \n```\nfrom tensorflow.keras.layers import Dense, Dropout, Conv2D, MaxPooling2D,\
    \ Flatten, BatchNormalization\n```\n\n现在，我们通过实例化`Sequential`类来定义模型，如下所示：\n\n```\n\
    model_1 = Sequential([\n    Conv2D(32, (3, 3), activation = 'relu', padding =\
    \ 'same', input_shape = (32, 32, 3)),\n    Conv2D(32, (3, 3), activation = 'relu',\
    \ padding = 'same'),\n    MaxPooling2D((2, 2)),\n    Flatten(),\n    Dense(128,\
    \ activation = 'relu'),\n    Dense(10, activation = 'softmax')\n])\n```\n\n如构造函数中所指定的，该网络由\
    \ 6 层组成。第一层是`Conv2D`类型，即我们的卷积层。它包含 32 个大小为 3x3 的滤波器，作用于 32x32x3 的图像上。网络的输入是 32x32x3，你应该记得这是`x_train`向量的维度。第二层同样是卷积层。第三层是`MaxPooling2D`层，其后是`Flatten`层。最后两层是`Dense`层——第一层包含\
    \ 128 个节点，使用 ReLU 激活函数；第二层包含 10 个节点，使用 softmax 激活函数。请记住，我们的网络应该输出 10 个类别，因此最后一层包含\
    \ 10 个节点。可以使用以下代码生成网络图：\n\n```\nfrom tensorflow.keras.utils import plot_model\n\
    plot_model(model_1, to_file='model1.png')\n```\n\n生成的网络图如图 3-16 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig16_HTML.jpg](img/495303_1_En_3_Fig16_HTML.jpg)\n\
    \n**图 3-16** 模型 1 的网络图\n\n可以通过在`model_1`实例上调用`summary`方法来打印网络摘要，如下所示：\n\n```\n\
    Model: \"sequential\"\n_______________________________________________________________\n\
    Layer (type)                 Output Shape              Param #\n===============================================================\n\
    conv2d (Conv2D)              (None, 32, 32, 32)        896\n_______________________________________________________________\n\
    conv2d_1 (Conv2D)            (None, 32, 32, 32)        9248\n_______________________________________________________________\n\
    max_pooling2d (MaxPooling2D) (None, 16, 16, 32)        0\n_______________________________________________________________\n\
    flatten (Flatten)            (None, 8192)              0\n_______________________________________________________________\n\
    dense (Dense)                (None, 128)               1048704\n_______________________________________________________________\n\
    dense_1 (Dense)              (None, 10)                1290\n===============================================================\n\
    Total params: 1,060,138\nTrainable params: 1,060,138\nNon-trainable params: 0\n\
    ```\n\n定义网络后，我们将优化器设置为 SGD，并使用损失函数`categorical_crossentropy`编译模型，如下面的代码片段所示：\n\
    \n```\nopt = tf.keras.optimizers.SGD(lr=0.001, momentum=0.9)\nmodel_1.compile(optimizer=opt,\
    \ loss = 'categorical_crossentropy', metrics = ['accuracy'])\n```\n\n现在，我们通过调用之前定义的`results`函数，并将`model_1`作为参数传递给它，来训练、评估并显示误差指标。\n\
    \n```\nresults(model_1)\n```\n\n生成的输出如图 3-17 所示。\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig17_HTML.jpg](img/495303_1_En_3_Fig17_HTML.jpg)\n\
    \n**图 3-17** 模型 1 的误差指标\n\n如你所见，准确率约为 66%——显然在大多数情况下不在可接受范围内。此外，还存在明显的过拟合现象。你可以通过参数优化和正则化来减少过拟合。我们将持续应用此类技术来改进模型的性能。\n\
    \n现在，你将使用以下代码段对一张未见过的图像进行预测：\n\n```\nimport urllib\nresource = urllib.request.urlopen(\"\
    https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch03/test01.png\"\
