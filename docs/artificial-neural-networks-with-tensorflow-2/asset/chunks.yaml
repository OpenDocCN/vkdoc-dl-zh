    ## Model Training


    We train the model by calling its `fit` method.


    ```python

    BATCH_SIZE = 20

    model.fit_generator(create_training_batches

    (X_train,BATCH_SIZE),

    epochs= 100,

    verbose=1,

    steps_per_epoch=X_train.shape[0]/BATCH_SIZE)

    ```


    It took me slightly over a minute per epoch to train the model on a GPU. By using
    the pre-trained model, this training time came down to about a second per epoch
    as you would see when you run the second project in this chapter.


    ## Testing


    Now, you can check the model performance on the test dataset that we have created
    earlier. Note that for the test images, we do not skew them as we did for the
    training. We simply convert the images to Lab format and do the prediction. Here
    is the code for model predictions on test images.


    ```python

    test_image = rgb2lab(x_test)[:,:,:,0]

    test_image = test_image.reshape

    (test_image.shape+(1,))

    output = model.predict(test_image)

    output = output * 128

    # making the output image array

    generated_images = np.zeros

    ((len(output),256, 256, 3))

    for i in range(len(output)):

    #iterating for the output

    cur = np.zeros((256, 256, 3))

    # dummy array

    cur[:,:,0] = test_image[i][:,:,0]

    #assigning the gray scale component

    cur[:,:,1:] = output[i]

    #assigning the a and b component

    #converting from lab to rgb format as plt only work for rgb mode

    generated_images[i] = lab2rgb(cur)

    ```


