    When I ran the code, I got the output shown in Figure [7-15](#495303_1_En_7_Chapter.xhtml#Fig15).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig15_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Baby names for seed `"handi"`


    The network has probably done a good job of generating some meaningful names.
    You will now try increasing the number of epochs to check if there are any improvements
    in the predictions.


    When I retrained the model for 50 epochs and a batch size of 128, I got the output
    shown in Figure [7-16](#495303_1_En_7_Chapter.xhtml#Fig16) for the same seed `"handi"`.


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig16_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Baby names after 50 epochs


    This may be better looking depending on the individual’s choice of names. At least,
    the names are not repeated.


    The point to understand here is that by running the training for a large number
    of epochs, increasing the number of nodes in LSTM layers, increasing the number
    of LSTM layers, adjusting sequence length, and so on may result in improving the
    quality of predictions. In fact, larger networks with exhaustive training will
    theoretically result in giving the same output as in the original text for a known
    seed from the original text. This is as good as saying that a person having a
    picturesque memory will be able to reproduce the original text as it in the same
    order as the original. What you gain from this discussion is that LSTM neural
    networks can be effectively used for generating quality text on its own that mimics
    the original passage of text.


    As far as our application of generating baby names is concerned, it does not make
    sense in using the network to generate the names which already exist in our database.
    To generate names which do not exist in our database and sounding likewise to
    existing names, you need to seed the network with an input sequence that does
    not exist in the original text. For this, generally people generate a random seed.
    I tried a random seed `"bgajm"` and got the output shown in Figure [7-17](#495303_1_En_7_Chapter.xhtml#Fig17).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig17_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig17_HTML.jpg)


    Figure 7-17


    Names generated with a random seed


    Before I move on to a more complex text generation problem, let me point out one
    more important dependency of the network training time on the batch size. If the
    batch size is small, it will take more time to cover all those characters in the
    entire text corpus, resulting in an increased training time. At the same time,
    increasing the batch size would demand additional resources in terms of system
    memory. Thus, it will be a compromise between the batch size and the resources
    that you can allocate to training while getting the optimal training time for
    the network. Considering the large training time involved in the case of LSTMs,
    it is advised that you save the model after training and reuse it later for different
    seeds. I will now show you how to save and reuse the model for later predictions.


    ### Saving/Reusing Model


    You will save the trained model to your Google Drive. You will have to mount the
    drive for this.


    ```

    from google.colab import drive

    drive.mount(''/content/drive'')

    ```


    During mounting, it will ask you to enter the authorization code. After the drive
    is mounted, change to the folder where you would like to save the model.


    ```

    cd ''drive/My Drive/TextGenerationDemo''

    ```


    Now, call the model’s `save` method to save it to a desired filename.


    ```

    model.save(''baby_names_model.h5'')

    ```


    You can reload the saved model at any later point of time by calling the `load_model`.


    ```

    from tensorflow.keras.models import load_model

    saved_model = load_model(''baby_names_model.h5'')

    ```


    The loaded model is available in the variable `saved_model` which can be used
    for your next predictions or further trainings.


    With this introduction to text generation by using a trivial example, let us move
    on to a more realistic example with a huge text corpus.'
