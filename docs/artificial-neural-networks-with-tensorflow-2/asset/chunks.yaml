- fmt: '# What’s Next?


    In recent days, a new language representation model called `BERT` has become popular
    and is widely used. The model was introduced by Jacob Devlin et al. in their paper
    titled “BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding”
    ([`https://arxiv.org/pdf/1810.04805.pdf`](https://arxiv.org/pdf/1810.04805.pdf))
    dated Oct 2018. `BERT` stands for Bidirectional Encoder Representations from Transformers.
    The beauty of this model is that you can use a pre-trained `BERT` model and fine-tune
    it with just one additional layer for creating a wide variety of applications,
    such as question answering, language translation, and so on. The interested reader
    is referred to this original paper of Devlin et al. for more information.


    # Summary


    In this chapter, you studied another model for Natural Language Processing, which
    is called the Transformer. The Transformer model provides better Natural Language
    Understanding than the previously mentioned `seq2seq` model with Attention. The
    Transformer model does not use `LSTMs` for remembering long input sentences. Rather,
    it uses Positional Embeddings to get knowledge of the relative positions of the
    important words in the sentence. The Transformer uses a different Attention model
    called the Multi-Head Attention that takes inputs from multiple heads created
    by splitting the input into multiple channels. This facilitates the distributed
    training and inference. Overall, the Transformer works far better than the other
    models discussed in this book.


    In the next chapter, you will learn about image captioning where you will learn
    to design a deep neural network that is capable of creating captions on any given
    image.


    # 10. Image Captioning


    When you are vacationing, you capture several pictures of beautiful landscapes
    and places, and then you put some captions on these photos and publish them on
    your social network. Just imagine that you would have a mobile app doing photo
    captioning for you; would this not be a wonderful thing to achieve? In this chapter,
    you will learn how to create and train a neural network to create captions for
    your photos.


    Caption generation is a very challenging problem. To solve this problem, you require
    the knowledge of both computer vision and the natural language processing. The
    computer vision helps you in understanding the contents of the image that is basically
    object detection. `NLP` turns this understanding into words placed in the right
    order.


    A most generalized architecture for solving this problem is shown in Figure [10-1](#495303_1_En_10_Chapter.xhtml#Fig1).


    ![../images/495303_1_En_10_Chapter/495303_1_En_10_Fig1_HTML.jpg](images/495303_1_En_10_Chapter/495303_1_En_10_Fig1_HTML.jpg)


    **Figure 10-1** A generalized architecture for image captioning


    We pass the image through a pre-trained network like `InceptionV3` or `VGG16`,
    which is designed for image classification. However, we will use only the convolutional
    layers of such network to extract the features in the image and ignore the classification
    portion of the network. As Figure [10-1](#495303_1_En_10_Chapter.xhtml#Fig1) shows,
    we have a picture of a man lying on the bench with a dog sitting next to it. When
    you pass this image through an image classification network, you will extract
    various parts of the image, such as the man, the dog, the bench, and so on. With
    these objects detected, you need to generate a caption relating all these image
    components, and this is the most challenging part of this image captioning application.
    You cannot simply list out the names of the objects. Rather, you need to create
    an appropriate and a meaningful sentence using these words (name of detected objects).
    That is where the `NLP` module comes into the picture, which would consist of
    `LSTMs` to generate a sentence. However, to make it more meaningful, you need
    an attention mechanism similar to the one you used in the previous chapter. To
    recall, you used a Transformer model in Chapter [9](#495303_1_En_9_Chapter.xhtml)
    with Multi-Head Attention to do the translation. In this chapter, for `NLP`, you
    are going to use a different Attention module and that is called Bahdanau Attention.
    Dzmitry Bahdanau proposed an Additive attention ([`https://arxiv.org/pdf/1409.0473.pdf`](https://arxiv.org/pdf/1409.0473.pdf))
    that performs a linear combination of encoder and decoder states. It learns to
    jointly align and translate words in a given sequence. Originally, this was developed
    to improve the machine translation based on the Encoder-Decoder `RNN` (recurrent
    neural network).


    The schematic of the Bahdanau model is shown in Figure [10-2](#495303_1_En_10_Chapter.xhtml#Fig2).


    ![../images/495303_1_En_10_Chapter/495303_1_En_10_Fig2_HTML.jpg](images/495303_1_En_10_Chapter/495303_1_En_10_Fig2_HTML.jpg)


    **Figure 10-2** Bahdanau Attention


    This is governed by the following equations:


    ![$$ {a}_t(s)= align\left({h}_{t-1},{\underset{\_}{h}}_s\right) $$](images/495303_1_En_10_Chapter/495303_1_En_10_Chapter_TeX_Equa.png)


    ![$$ {c}_t=\sum {a}_t{h}_s $$](images/495303_1_En_10_Chapter/495303_1_En_10_Chapter_TeX_Equb.png)


    ![$$ {h}_t= RNN\left({h}_{t-1}^{l-1},\left[{c}_t;{h}_{t-1}\right]\right) $$](images/495303_1_En_10_Chapter/495303_1_En_10_Chapter_TeX_Equc.png)


    Like in the previous chapter, I will explain to you the Bahdanau Attention module
    through its implementation. So, let us directly jump into developing a project
    for image captioning.


    ## Project Description


    Like any other `ML` project, what is most important in creating an image captioning
    network model is the availability of proper training and testing data. Fortunately,
    Flickr has made such data available publicly. The `Flickr8k` dataset contains
    about 8000 images, while the `Flickr30k` dataset contains about 30,000 images.
    If you wish to use a larger dataset than these, the `MS COCO` contains about 180,000
    images. All these images are captioned appropriately. Each image may have more
    than one caption. Using larger datasets would give a better prediction accuracy
    on an unseen image; however, this would be resource intensive for training. For
    our learning purpose, `Flickr8k` data is good enough as we are not much worried
    about how good the generated caption represents a given image. Each image in this
    dataset comes with the associated five captions.


    ## Creating Project


    Open a new Colab project and rename it to `ImageCaptioning`. Import the required
    libraries.


    ```python

    import os

    import time

    import pickle

    import numpy as np

    import tensorflow as tf

    import matplotlib.pyplot as plt

    from sklearn.utils import shuffle

    from sklearn.model_selection import train_test_split

    from tensorflow.keras.applications import InceptionV3

    from os import listdir

    from tqdm import tqdm

    from PIL import Image

    ```


