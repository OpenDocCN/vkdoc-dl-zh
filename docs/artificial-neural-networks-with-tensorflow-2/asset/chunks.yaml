    self.dense4 = tf.keras.layers.Dense(10, activation=tf.nn.sigmoid)

    if self.use_dp:

    use_dp = tf.keras.layers.Dropout(0.3)

    ```


    In the constructor, we define variables for different types of layers that we
    will be using for constructing our network. All layers here are of type Dense –
    fully connected layer. The first layer consists of 12 nodes, the second one consists
    of 24 nodes, the third one 4 nodes and the last one 10 nodes. The first three
    layers use ReLU as their activation function, while the last one uses sigmoid.
    We also define a dropout in case if we decide to add a dropout layer on any of
    the above Dense layers. The dropout percentage is 30% as indicated by the dropout
    parameter value of 0.3.


    Next, you define call method used during object creation. A typical call method
    is shown in the code segment below:


    ```

    def call(self, x):

    x = self.dense1(x)

    x = self.dense2(x)

    if self.use_dp:

    x = self.dp(x)

    x = self.dense3(x)

    if self.use_dp:

    x = self.dp(x)

    return self.dense4(x)

    ```


    The network consists of four layers, the output of each one becomes the input
    to the next one. At the end, we return dense4 which gives us 10 classes. The second
    and third layers use dropout. This completes our subclassing of the model. Next,
    we will instantiate this model.


    To instantiate the model in your program code, you would use the following program
    statement:


    ```

    model = MyModel()

    ```


    Once the model object is created, you can call its usual compile method to compile
    it by passing the desired set of parameters as shown in the code below:


    ```

    model.compile(loss = tf.losses.binary_crossentropy,

    optimizer = ''adam'',

    metrics = [''accuracy''])

    ```


    Generally, if you love object-oriented programming, you would use model subclassing.
    Otherwise, there is no specific need to do subclassing, the functional API would
    meet all your requirements of creating complex architectures.


    ### Predefined Layers


    To create network architectures, tf.keras provides Sequential API to which you
    keep adding network layers. There are several predefined layers for your ready
    use. The list is quite exhaustive. Each layer is defined as a class that you instantiate
    in the code and add its instance to your model. Here is a partial list of commonly
    used predefined layers:


    *   Dense – Densely-connected layer


    *   Conv2D – 2D convolutional layer


    *   InputLayer – An entry point into the network


    *   LSTM – Long Short-Term memory layer


    *   RNN – Base class for your custom recurrent layers


    The list is really exhaustive and you will find classes such as Dropout, Flatten,
    LayerNormalization, Multiply, and so on. In addition to these pre-defined classes,
    you can define your own custom layers.'
