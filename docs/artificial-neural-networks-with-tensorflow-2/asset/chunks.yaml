    \        if tokenizer.index_word[predicted_id] == '<end>':\n            return\
    \ result\n        dec_input = tf.expand_dims([predicted_id], 0)\n    return result\n\
    \ndef predict(image_url, random_name):\n    image_extension = image_url[-4:]\n\
