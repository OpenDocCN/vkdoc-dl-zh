- fmt: '# Summary


    The Keras API is now fully implemented in TF and is accessed through `tf.keras`
    module. With the functional API provided in `tf.keras` you are now able to create
    complex network architectures having multiple inputs/outputs, non-linear topology,
    models with shared layers, and so on. You learned how to define such architectures
    using pre-defined and custom layers. You also learned about how to subclass a
    model for object-oriented coding. You learned how to save a model, its state and
    weights. To apply these learnings, the chapter covered a complete example on image
    classification using CNN. With a brief theory behind CNN, the application develops
    a full-fledged application for image classification based on CIFAR-10 dataset.
    You started out with a simple model and kept improving its performance by applying
    different techniques such as increasing the number of `Conv2D` layers, adding
    dropouts, `BatchNormalization` and Regularization. You learned how to save the
    model and use it later for inference on unseen images.


    # 4. Transfer Learning


    In the previous chapter, you developed a binary image classifier. With 60,000
    images, it took a while to train the model. The accuracy we achieved was about
    80 to 90%. If you want a higher accuracy, more images would be required for training.
    As a matter of fact, a deep learning network learns better with a higher number
    of data points. The ImageNet (`https://devopedia.org/imagenet`), the first of
    its kind in terms of scale, consists of 14,197,122 images organized into 21,841
    subcategories which are further classified into 27 subtrees. To classify the images
    in ImageNet, many machine learning models were developed; these were developed
    mainly as a way of research and competitions. In 2017, one such model achieved
    an error rate of as low as 2.3%. The underlying network was very complex. Considering
    the number of trainable points for such a complex network, imagine the number
    of resources and time it would have taken to train the model.


    The question now is can we reuse whatever these networks have learned and gain
    from their knowledge to our own benefits? And exactly, that’s what this chapter
    is all about. The technology behind this is called transfer learning. It is like
    human beings transferring their learnings to younger generations. In this chapter,
    you will learn how to transfer the learnings of other networks to your own benefits
    and develop your own new models based on their work.


    To be concise, this chapter covers the following:


    - What do we mean by knowledge transfer?

    - What is TensorFlow Hub?

    - What pre-trained models are available?

    - How to use a pre-trained model?

    - How transfer learning techniques are used for creating a dog breed classifier?


    So, let us start with the question: What is knowledge transfer?


    ## Knowledge Transfer


    Last several decades, developers have been using binary libraries for reusing
    their own code or the code shared by others. In machine learning, can we adapt
    the same concept by reusing the models developed by others for our own advancements?
    It is not as simple as it may sound. In software libraries, it is only the code
    that gets shared. In machine learning, it is more than the code that needs sharing.
    The four important ingredients of a trained model are listed here:


    - Algorithm

    - Data

    - Training

    - Expertise


    Firstly, it is the algorithm that is developed by somebody to train a neural network.
    This is the code part of the knowledge transfer. The second is the data. Generally,
    a model learns with the help of a huge set of data points. The third is the training
    – to train a model you require tremendous processing power and time. Lots of resources
    are consumed while training a network. Lastly, it is the knowledge and expertise
    of a domain expert that gets inherently embedded in a trained model. So, how do
    we transfer these four aspects to a new model? To facilitate this, researchers
    at TensorFlow were inspired to develop a TensorFlow Hub.


    ## TensorFlow Hub


    TensorFlow Hub is a platform provided by TensorFlow where the pre-trained models
    are published. Other users can discover and reuse parts of the machine learning
    modules from these models. So, what’s a module? A module is visualized as depicted
    in Figure 4-1.


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig1_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig1_HTML.jpg)


    Figure 4-1 Module graph


    A module is essentially a self-contained piece of a TensorFlow graph, along with
    its training weights. This graph can be reused elsewhere to perform similar tasks.
    A developer can add more layers to this graph to create their own model. The new
    model can then be trained using a smaller dataset that can result in faster training.
    In a way, this also results in generalization where the generalized modules can
    be reused across several models. You may think of a model like a binary which
    is the final executable in software engineering and a module like a generalized
    library used for creating executables.


    Modules are composable as depicted in Figure 4-2.


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig2_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig2_HTML.jpg)


    Figure 4-2 TensorFlow Hub architecture


    You can add your own layers on top of the pre-trained modules to create your own
    network. The entire network can then be trained including the embedded pre-trained
    modules.


    Modules are reusable and retrainable with a single parameter passed to a function
    call. When I say they are retrainable, it means that you can back-propagate through
    them just like a usual neural network. Note that if you do retraining, ensure
    a low learning rate; otherwise, the existing weights may go haywire, producing
    totally unexpected results.


    When you create your own model and if you feel that the model could be used by
    the community, you may submit it to Google for inclusion in TensorFlow Hub. There
    are many third-party modules currently available in the Hub. Google warns you
    to use a third-party module with caution, especially if you do not trust the source.


    So, what modules are available for your use today?'
  raw: '## Summary


    The Keras API is now fully implemented in TF and is accessed through tf.keras
    module. With the functional API provided in tf.keras you are now able to create
    complex network architectures having multiple inputs/outputs, non-linear topology,
    models with shared layers, and so on. You learned how to define such architectures
    using pre-defined and custom layers. You also learned about how to subclass a
    model for object-oriented coding. You learned how to save a model, its state and
    weights. To apply these learnings, the chapter covered a complete example on image
    classification using CNN. With a brief theory behind CNN, the application develops
    a full-fledged application for image classification based on CIFAR-10 dataset.
    You started out with a simple model and kept improving its performance by applying
    different techniques such as increasing the number of Conv2D layers, adding dropouts,
    BatchNormalization and Regularization. You learned how to save the model and use
    it later for inference on unseen images.


    # 4. Transfer Learning


    In the previous chapter, you developed a binary image classifier. With 60,000
    images, it took a while to train the model. The accuracy we achieved was about
    80 to 90%. If you want a higher accuracy, more images would be required for training.
    As a matter of fact, a deep learning network learns better with a higher number
    of data points. The ImageNet ([`https://devopedia.org/imagenet`](https://devopedia.org/imagenet)),
    the first of its kind in terms of scale, consists of 14,197,122 images organized
    into 21,841 subcategories which are further classified into 27 subtrees. To classify
    the images in ImageNet, many machine learning models were developed; these were
    developed mainly as a way of research and competitions. In 2017, one such model
    achieved an error rate of as low as 2.3%. The underlying network was very complex.
    Considering the number of trainable points for such a complex network, imagine
    the number of resources and time it would have taken to train the model.


    The question now is can we reuse whatever these networks have learned and gain
    from their knowledge to our own benefits? And exactly, that’s what this chapter
    is all about. The technology behind this is called transfer learning. It is like
    human beings transferring their learnings to younger generations. In this chapter,
    you will learn how to transfer the learnings of other networks to your own benefits
    and develop your own new models based on their work.


    To be concise, this chapter covers the following:


    *   What do we mean by knowledge transfer?


    *   What is TensorFlow Hub?


    *   What pre-trained models are available?


    *   How to use a pre-trained model?


    *   How transfer learning techniques are used for creating a dog breed classifier?


    So, let us start with the question: What is knowledge transfer?


    ## Knowledge Transfer


    Last several decades, developers have been using binary libraries for reusing
    their own code or the code shared by others. In machine learning, can we adapt
    the same concept by reusing the models developed by others for our own advancements?
    It is not as simple as it may sound. In software libraries, it is only the code
    that gets shared. In machine learning, it is more than the code that needs sharing.
    The four important ingredients of a trained model are listed here:


    *   Algorithm


    *   Data


    *   Training


    *   Expertise


    Firstly, it is the algorithm that is developed by somebody to train a neural network.
    This is the code part of the knowledge transfer. The second is the data. Generally,
    a model learns with the help of a huge set of data points. The third is the training –
    to train a model you require tremendous processing power and time. Lots of resources
    are consumed while training a network. Lastly, it is the knowledge and expertise
    of a domain expert that gets inherently embedded in a trained model. So, how do
    we transfer these four aspects to a new model? To facilitate this, researchers
    at TensorFlow were inspired to develop a TensorFlow Hub.


    ## TensorFlow Hub


    TensorFlow Hub is a platform provided by TensorFlow where the pre-trained models
    are published. Other users can discover and reuse parts of the machine learning
    modules from these models. So, what’s a module? A module is visualized as depicted
    in Figure [4-1](#495303_1_En_4_Chapter.xhtml#Fig1).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig1_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Module graph


    A module is essentially a self-contained piece of a TensorFlow graph, along with
    its training weights. This graph can be reused elsewhere to perform similar tasks.
    A developer can add more layers to this graph to create their own model. The new
    model can then be trained using a smaller dataset that can result in faster training.
    In a way, this also results in generalization where the generalized modules can
    be reused across several models. You may think of a model like a binary which
    is the final executable in software engineering and a module like a generalized
    library used for creating executables.


    Modules are composable as depicted in Figure [4-2](#495303_1_En_4_Chapter.xhtml#Fig2).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig2_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    TensorFlow Hub architecture


    You can add your own layers on top of the pre-trained modules to create your own
    network. The entire network can then be trained including the embedded pre-trained
    modules.


    Modules are reusable and retrainable with a single parameter passed to a function
    call. When I say they are retrainable, it means that you can back-propagate through
    them just like a usual neural network. Note that if you do retraining, ensure
    a low learning rate; otherwise, the existing weights may go haywire, producing
    totally unexpected results.


    When you create your own model and if you feel that the model could be used by
    the community, you may submit it to Google for inclusion in TensorFlow Hub. There
    are many third-party modules currently available in the Hub. Google warns you
    to use a third-party module with caution, especially if you do not trust the source.


    So, what modules are available for your use today?'
  trans: '

    # 总结


    Keras API 现已完全在 TF 中实现，并通过 `tf.keras` 模块进行访问。借助 `tf.keras` 提供的函数式 API，你现在能够创建具有多输入/多输出、非线性拓扑结构、共享层模型等复杂网络架构。你学习了如何使用预定义层和自定义层来定义此类架构。你还学习了如何为面向对象编程对模型进行子类化。你学习了如何保存模型、其状态和权重。为了应用这些知识，本章涵盖了一个使用
    CNN 进行图像分类的完整示例。在 CNN 的简要理论基础上，该应用开发了一个基于 CIFAR-10 数据集的完整图像分类应用。你从一个简单模型开始，并通过应用不同技术（如增加
    `Conv2D` 层数量、添加 Dropout、`BatchNormalization` 和正则化）持续提升其性能。你学习了如何保存模型，并在之后用于对未见过的图像进行推理。


    # 4. 迁移学习


    在上一章中，你开发了一个二值图像分类器。使用 60,000 张图像，训练模型花费了一些时间。我们达到的准确率约为 80% 到 90%。如果你想要更高的准确率，则需要更多图像进行训练。事实上，深度学习网络在拥有更多数据点时学习效果更好。ImageNet（`https://devopedia.org/imagenet`）是首个在规模上达到如此程度的数据库，它包含
    14,197,122 张图像，分为 21,841 个子类别，这些子类别又进一步分为 27 个子树。为了对 ImageNet 中的图像进行分类，人们开发了许多机器学习模型；这些模型主要是作为研究和竞赛的一种方式而开发的。2017
    年，其中一个模型实现了低至 2.3% 的错误率。其底层网络非常复杂。考虑到这样一个复杂网络的可训练参数数量，想象一下训练该模型所需的资源和时间。


    现在的问题是，我们能否重用这些网络所学到的知识，并利用它们的知识为我们自身谋利？而这正是本章的全部内容。其背后的技术称为迁移学习。这就像人类将他们的学识传授给年轻一代。在本章中，你将学习如何将其他网络的学习成果转化为自身优势，并在它们工作的基础上开发自己的新模型。


    简而言之，本章涵盖以下内容：


    -   知识迁移是什么意思？

    -   什么是 TensorFlow Hub？

    -   有哪些可用的预训练模型？

    -   如何使用预训练模型？

    -   如何使用迁移学习技术创建犬种分类器？


    那么，让我们从这个问题开始：什么是知识迁移？


    ## 知识迁移


    在过去的几十年里，开发人员一直使用二进制库来重用自己或他人共享的代码。在机器学习中，我们能否通过重用他人开发的模型来促进自身发展，从而应用相同的概念？这并不像听起来那么简单。在软件库中，共享的只是代码。在机器学习中，需要共享的远不止代码。一个训练好的模型的四个重要组成部分如下：


    -   算法

    -   数据

    -   训练

    -   专业知识


    首先，是某人开发的用于训练神经网络的算法。这是知识迁移的代码部分。第二是数据。通常，模型借助大量数据点进行学习。第三是训练——训练一个模型需要巨大的处理能力和时间。训练网络时会消耗大量资源。最后，是领域专家的知识和专业技能，它们会内在地嵌入到训练好的模型中。那么，我们如何将这四个方面迁移到一个新模型中呢？为了促进这一点，TensorFlow
    的研究人员受到启发，开发了 TensorFlow Hub。


    ## TensorFlow Hub


    TensorFlow Hub 是 TensorFlow 提供的一个平台，用于发布预训练模型。其他用户可以从中发现并重用这些模型中的部分机器学习模块。那么，什么是模块？模块的可视化表示如图
    4-1 所示。


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig1_HTML.jpg](img/495303_1_En_4_Fig1_HTML.jpg)


    图 4-1 模块图


    模块本质上是 TensorFlow 图的一个自包含片段，连同其训练权重。该图可以在其他地方重用，以执行类似的任务。开发者可以向该图添加更多层来创建自己的模型。然后，可以使用较小的数据集训练新模型，从而加快训练速度。从某种意义上说，这也会产生泛化效果，使得泛化模块可以在多个模型中重用。你可以将模型想象成软件工程中的最终可执行文件（二进制文件），而模块则像是用于创建可执行文件的通用库。


    模块是可组合的，如图 4-2 所示。


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig2_HTML.jpg](img/495303_1_En_4_Fig2_HTML.jpg)


    图 4-2 TensorFlow Hub 架构


    你可以在预训练模块之上添加自己的层来创建自己的网络。然后，可以训练整个网络，包括嵌入的预训练模块。


    模块是可重用且可重新训练的，只需向函数调用传递一个参数即可。当我说它们是可重新训练时，意味着你可以像对待普通神经网络一样通过它们进行反向传播。请注意，如果你进行重新训练，请确保使用较低的学习率；否则，现有的权重可能会失控，产生完全意想不到的结果。


    当你创建自己的模型，并且觉得该模型可能对社区有用时，你可以将其提交给 Google，以便纳入 TensorFlow Hub。Hub 中目前有许多第三方模块。Google
    警告你要谨慎使用第三方模块，尤其是在你不信任其来源的情况下。


    那么，目前有哪些模块可供你使用呢？

    '
- fmt: '### Pre-trained Modules


    There are several pre-trained modules provided by Google and the channel partners
    in TensorFlow Hub. These are classified in three categories – Image, Text, and
    Video. One of the categories – Image domain – is shown in Figure [4-3](#495303_1_En_4_Chapter.xhtml#Fig3).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig3_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig3_HTML.jpg)


    Figure 4-3 Predefined models in TensorFlow


    Some of the modules in the Image domain are:


    - ImageNet classification with MobileNet/Inception ResNet V2/NASNet-A

    - Feature vectors of images with MobileNet/Inception/ResNet/PNASnet


    The abovementioned modules support TF2. There is an exhaustive list of modules
    developed by Google and other partners that run under TF1 and are waiting for
    migration to TF2. Some of the modules under this TF1 category that you may find
    of your interest are:


    - Progressive GAN

    - Fast arbitrary image style transfer

    - Image augmentation module performing random crop, small rotation, and color
    distortions

    - PlaNet that predicts the rough geolocation of arbitrary photos

    - Google landmarks - deep local features (DELF)


    Under the Text category, you will find modules such as:


    - ELMO

    - BERT

    - Universal Sentence Encoder

    - Token-based text embedding trained on English Wikipedia corpus


    In the Video category, as of this writing, there are no models available for TF2.
    Under TF1, there are a few models created by Google and DeepMind.


    Once again, the total number of modules available under the TF1 category is exhaustive.
    You may see the entire list of modules available by visiting the TensorFlow Hub
    site ([`https://tfhub.dev/`](https://tfhub.dev/)).


    Now, you know what is available for your use. The next question is how to use
    such a pre-trained module.


    ### Using Modules


    To use a pre-trained module in your program code, select the desired module from
    the `tfdev` website. Look for the Model format; under the Saved Model, you will
    find the module’s URL as shown in the screenshot in Figure [4-4](#495303_1_En_4_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig4_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig4_HTML.jpg)


    Figure 4-4 Module’s URL


    Copy the URL and use it in your program code as shown here:


    ```

    module_url = "https://tfhub.dev/google/imagenet/mobilenet_v2_100_160/feature_vector/4"

    my_model = hub.KerasLayer(module_url)

    ```


    You may then add more layers to `my_model`. Train your new model using the `fit`
    method, just the way you train your other models. Once trained, use it for your
    predictions.


    Having seen the capabilities of pre-trained modules, it is time to try it out.


    ## ImageNet Classifier


    In this project, you will use an ImageNet classifier called `mobilenet_v2` provided
    by Google. The classifier provides 1001 different classifications. The model was
    trained on more than one million images. It used the initial learning rate of
    0.045 and learning decay rate of 0.98 per epoch. It used 16 GPU asynchronous workers
    and a batch size of 96. You can imagine the number of resources involved in creating
    this model. You will use the transfer learning to transfer this knowledge into
    building your own image classifier on top of this. You will be doing this over
    the next two projects in this chapter. The first one will teach you how to use
    the MobileNet model to classify your own images. The second one will show you
    how to expand it to add more classifications of your own.


    First, I will show you how to use the ImageNet classifier to classify your own
    images. Essentially, in this project, you will use the MobileNet classifier as
    is without adding any layers to it. You will just learn to load a pre-trained
    model and use it on your own images. The later project (dog breed classifier)
    in this chapter will go into lots of detail where you would be adding your classification
    layer to the ImageNet module and do lots of studies to learn the benefits offered
    by transfer learning.


    So, start by creating a project called `ImageNetClassifier` in Colab.


    ### Setting Up Project


    Set up TensorFlow and import the required packages using the following code segment:


    ```

    import tensorflow as tf

    # other imports

    import tensorflow_hub as hub

    import numpy as np

    import matplotlib.pyplot as plt

    ```


    Note you need to import `tensorflow_hub`. The other two imports `numpy` and `matplotlib`
    serve their usual purpose; you have used them in your earlier projects.


    ### Classifier URL


    We will be using the pre-trained MobileNet classifier for this project. Locate
    this classifier on the TensorFlow Hub. The screenshot of a search done on the
    `tfhub.dev` site is shown in Figure [4-5](#495303_1_En_4_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig5_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig5_HTML.jpg)


    Figure 4-5 MobileNet model on TensorFlow Hub


    Copy the model’s URL by clicking the “Copy URL” button. You will get the following
    URL:


    ```

    https://tfhub.dev/google/tf2-preview/mobilenet_v2/classification/4

    ```


    Note you may get a later version than the one shown here.


    Declare two variables in your project code as follows:


    ```

    classifier_url = "https://tfhub.dev/google/tf2-preview/mobilenet_v2/classification/4"

    IMAGE_SHAPE = (224, 224)

    ```


    The input to this model requires images of 224x224 pixels, as described in the
    model’s description. The model’s description is available in the user guide, which
    you can read by clicking the “our user guide” link shown in Figure [4-5](#495303_1_En_4_Chapter.xhtml#Fig5).


    ### Creating Model


    Next, you create the model by using the Sequential API as follows:


    ```

    # create a model

    classifier = tf.keras.Sequential([

    hub.KerasLayer(classifier_url, input_shape = IMAGE_SHAPE+(3,))

    ])

    ```


    The `hub.KerasLayer` returns the module that is added to our sequential model.
    All the layers included in this module are now available to our network. We do
    not add any more layers of our own to this model. So, our model definition is
    now complete. As this is a fully trained model, we do not need to call the `fit`
    method on our classifier for training it further. You will simply call its `predict`
    method to infer any given input image. Before you call `predict`, let us prepare
    a few images for inputting to our model.'
