- fmt: '# 5. Neural Networks for Regression


    So far, we looked at the classification model in deep learning. Can we apply whatever
    techniques you learned so far as a part of deep learning to a regression problem,
    which is considered probably the simplest in data analytics? Is it worth even
    attempting to use deep learning in the areas of regression, considering the overheads
    of deep learning? Is there an advantage in using deep learning over the traditional
    statistical techniques – especially in the case of regression modeling? You will
    find answers to these and similar questions in this chapter.


    You already know that a simple linear regression is the simplest thing in machine
    learning, and many a times this is the first topic that is taught in machine learning.
    Statistical regression models have been around for many years and are providing
    useful predictions in many real-world applications. These models are equally used
    in industry, business, and scientific environments. At the same time, the deep
    learning networks that we have learned so far in this book are seen to have successfully
    solved the most complex problems of our world. They provide very accurate predictions
    that resemble the learning process of our brains. Now, the question is can we
    use deep learning networks to run a regression problem? And, is there any advantage
    that we could get instead of using the traditional statistical coding techniques
    of running a regression? A brief answer to this question is a big Yes. To understand
    why and how, keep reading!


    Let me first define what regression is.


    ## Regression


    I will start with the regression definition followed by its applications in real-world
    situations. Then, I will explain to you the statistical modeling of regression
    followed by the various regression types.


    ### Definition


    In statistical modeling, a regression analysis is a set of statistical processes.
    These processes try to establish a relationship between a dependent variable (target)
    and an independent variable (feature). The dependent variable is also called an
    outcome variable, and the independent variable is sometimes called a predictor
    or a covariate. In simple situations, there exists only a single predictor, and
    in more complex data distributions, there will be multiple covariates. The simplest
    form of regression is the linear regression where the analyst finds a straight-line
    relationship between the predictor and the outcome. But in many practical situations,
    the relationship cannot be represented by a straight line. The relationship may
    be a set of lines resulting in some sort of a polynomial. Determining hyperplanes
    in complex datasets is a big challenge for data analysts. There exist several
    types of regression such as linear, logistic, stepwise, and so on. Estimating
    the type of relationship and coding the same is not a simple task for the developers.


    Now, where do you apply regression modeling?


    ### Applications


    Regression analysis is primarily used to address the following areas:


    - Prediction and forecasting

    - Inferring causal relationships


    To estimate the pricing of a house is the predictive power of a mostly linear
    regression model. A multivariate model may forecast the future price of a given
    stock. The causal relationship is to answer the question – what event caused another
    or what brought a certain change? What caused an upsurge in a website’s traffic,
    What is the cause of a malfunction in an assembly line, Whether a drug caused
    an improvement in certain medical conditions – are the examples of establishing
    causality. To address such areas of applications, a data analyst must first investigate
    whether a relationship has a predictive power. Why or why not a relationship between
    two variables has a causal interpretation? Answering these questions is not an
    easy task for a statistician or a data analyst in modern terms. Neural networks
    will come to your aid in answering these questions, and that is what I am going
    to show to you in this chapter.


    ### Regression Problem


    In a regression problem, we predict a value or a probability of a dependent variable,
    given an input of a set of continuous values. Contrasting this with a classification
    model that you have studied so far, the problem was to select a class within a
    list of predefined classes. For example, in Chapter [4](#495303_1_En_4_Chapter.xhtml),
    you did a dog breed classifier where the input image was inferred as one of the
    classes within a set of 120 predefined breeds.


    In regression analysis, you model the relationship between a dependent variable
    and one or more independent variables. This relationship can be expressed by a
    simple mathematical equation:


    ```

    γ = β₁X₁ + β₂X₂ + β₃X₃ + ... + βₖXₖ + ε

    ```


    where `γ` is a dependent variable that you are trying to predict, and `X₁`, `X₂`,
    …, `Xₖ` are the independent variables. `β₁`, `β₂` … `βₖ` are the coefficients
    or the weights in neural networks, and `ε` is the error or the bias as it is called
    in ML terminology. Now, let us look at the types of regressions.


    ### Regression Types


    The regression analysis can be classified into the following categories:


    - Linear

    - Polynomial

    - Logistic

    - Stepwise

    - Ridge

    - Lasso

    - ElasticNet


    A linear regression fits a case when there is a linear relationship between the
    dependent and independent variables – a straight line. In the case of polynomial
    regression, the dependent variable is best fitted by a polynomial, that is, a
    curve or a series of curves. In such models, outliers can distort the prediction
    and thus are prone to what is known as overfitting in machine learning terms.
    In the case of logistic regression, the predicted value is a binary and strictly
    follows a binomial distribution. When you have a large number of independent variables,
    in other words, a high dimensionality, you use stepwise regression to detect which
    variables are significant and drop the insignificant ones to maximize the prediction
    power of your model. When the independent variables are highly correlated, also
    called multicollinearity, they make variances large enough to cause a large deviation
    in the predicted value. The technique of ridge regression adds a bias term to
    the regression estimate penalizing the coefficients or the weight values. It uses
    least squares to shrink coefficients to ensure that they do not reach zero. This
    is a form of regularization – an L2 regularization. The lasso regularization is
    similar to the ridge regression and helps in solving the multicollinearity problem
    the same way by shrinking the regression coefficients. However, now the absolute
    values are shrinked rather than the least squares. It also means that some of
    the weights can shrink to zero, eliminating totally the output of that particular
    node. This is useful in feature selection because it essentially picks up the
    one out of a group of dependent variables. This is also a type of regularization
    – an L1 regularization. Lastly, ElasticNet is a combination of ridge and lasso.
    The model is trained successively with L1 and L2 regularizations, resulting in
    a trade-off between the two techniques. As a result, ElasticNet may pick more
    than one correlated variable.


    Have all these things confused you totally? Not only understanding the statistical
    techniques but also considering various kinds of regression, you can easily imagine
    the complexity involved in coding them. Can the deep learning techniques come
    to your rescue? Keep reading!'
  raw: '# 5. Neural Networks for Regression


    So far, we looked at the classification model in deep learning. Can we apply whatever
    techniques you learned so far as a part of deep learning to a regression problem,
    which is considered probably the simplest in data analytics? Is it worth even
    attempting to use deep learning in the areas of regression, considering the overheads
    of deep learning? Is there an advantage in using deep learning over the traditional
    statistical techniques – especially in the case of regression modeling? You will
    find answers to these and similar questions in this chapter.


    You already know that a simple linear regression is the simplest thing in machine
    learning, and many a times this is the first topic that is taught in machine learning.
    Statistical regression models have been around for many years and are providing
    useful predictions in many real-world applications. These models are equally used
    in industry, business, and scientific environments. At the same time, the deep
    learning networks that we have learned so far in this book are seen to have successfully
    solved the most complex problems of our world. They provide very accurate predictions
    that resemble the learning process of our brains. Now, the question is can we
    use deep learning networks to run a regression problem? And, is there any advantage
    that we could get instead of using the traditional statistical coding techniques
    of running a regression? A brief answer to this question is a big Yes. To understand
    why and how, keep reading!


    Let me first define what regression is.


    ## Regression


    I will start with the regression definition followed by its applications in real-world
    situations. Then, I will explain to you the statistical modeling of regression
    followed by the various regression types.


    ### Definition


    In statistical modeling , a regression analysis is a set of statistical processes.
    These processes try to establish a relationship between a dependent variable (target)
    and an independent variable (feature). The dependent variable is also called an
    outcome variable, and the independent variable is sometimes called a predictor
    or a covariate. In simple situations, there exists only a single predictor, and
    in more complex data distributions, there will be multiple covariates. The simplest
    form of regression is the linear regression where the analyst finds a straight-line
    relationship between the predictor and the outcome. But in many practical situations,
    the relationship cannot be represented by a straight line. The relationship may
    be a set of lines resulting in some sort of a polynomial. Determining hyperplanes
    in complex datasets is a big challenge for data analysts. There exist several
    types of regression such as linear, logistic, stepwise, and so on. Estimating
    the type of relationship and coding the same is not a simple task for the developers.


    Now, where do you apply regression modeling?


    ### Applications


    Regression analysis is primarily used to address the following areas:


    *   Prediction and forecasting


    *   Inferring causal relationships


    To estimate the pricing of a house is the predictive power of a mostly linear
    regression model. A multivariate model may forecast the future price of a given
    stock. The causal relationship is to answer the question – what event caused another
    or what brought a certain change? What caused an upsurge in a website’s traffic,
    What is the cause of a malfunction in an assembly line, Whether a drug caused
    an improvement in certain medical conditions – are the examples of establishing
    causality. To address such areas of applications, a data analyst must first investigate
    whether a relationship has a predictive power. Why or why not a relationship between
    two variables has a causal interpretation? Answering these questions is not an
    easy task for a statistician or a data analyst in modern terms. Neural networks
    will come to your aid in answering these questions, and that is what I am going
    to show to you in this chapter.


    ### Regression Problem


    In a regression problem, we predict a value or a probability of a dependent variable,
    given an input of a set of continuous values. Contrasting this with a classification
    model that you have studied so far, the problem was to select a class within a
    list of predefined classes. For example, in Chapter [4](#495303_1_En_4_Chapter.xhtml),
    you did a dog breed classifier where the input image was inferred as one of the
    classes within a set of 120 predefined breeds.


    In regression analysis, you model the relationship between a dependent variable
    and one or more independent variables. This relationship can be expressed by a
    simple mathematical equation:


    ![$$ \gamma ={\beta}_1{X}_1+{\beta}_2{X}_2+{\beta}_3{X}_3+\dots +{\beta}_k{X}_k+\varepsilon
    $$](images/495303_1_En_5_Chapter/495303_1_En_5_Chapter_TeX_Equa.png)


    where *γ* is a dependent variable that you are trying to predict, and X[1], X[2],
    …, X[k] are the independent variables. *β*[1], *β*[2] … *β*[k] are the coefficients
    or the weights in neural networks, and *ε* is the error or the bias as it is called
    in ML terminology. Now, let us look at the types of regressions.


    ### Regression Types


    The regression analysis can be classified into the following categories:


    *   Linear


    *   Polynomial


    *   Logistic


    *   Stepwise


    *   Ridge


    *   Lasso


    *   ElasticNet


    A linear regression fits a case when there is a linear relationship between the
    dependent and independent variables – a straight line. In the case of polynomial
    regression, the dependent variable is best fitted by a polynomial, that is, a
    curve or a series of curves. In such models, outliers can distort the prediction
    and thus are prone to what is known as overfitting in machine learning terms.
    In the case of logistic regression, the predicted value is a binary and strictly
    follows a binomial distribution. When you have a large number of independent variables,
    in other words, a high dimensionality, you use stepwise regression to detect which
    variables are significant and drop the insignificant ones to maximize the prediction
    power of your model. When the independent variables are highly correlated, also
    called multicollinearity, they make variances large enough to cause a large deviation
    in the predicted value. The technique of ridge regression adds a bias term to
    the regression estimate penalizing the coefficients or the weight values. It uses
    least squares to shrink coefficients to ensure that they do not reach zero. This
    is a form of regularization – an L2 regularization. The lasso regularization is
    similar to the ridge regression and helps in solving the multicollinearity problem
    the same way by shrinking the regression coefficients. However, now the absolute
    values are shrinked rather than the least squares. It also means that some of
    the weights can shrink to zero, eliminating totally the output of that particular
    node. This is useful in feature selection because it essentially picks up the
    one out of a group of dependent variables. This is also a type of regularization –
    an L1 regularization. Lastly, ElasticNet is a combination of ridge and lasso.
    The model is trained successively with L1 and L2 regularizations, resulting in
    a trade-off between the two techniques. As a result, ElasticNet may pick more
    than one correlated variable.


    Have all these things confused you totally? Not only understanding the statistical
    techniques but also considering various kinds of regression, you can easily imagine
    the complexity involved in coding them. Can the deep learning techniques come
    to your rescue? Keep reading!'
  trans: '

    # 5. 用于回归的神经网络


    到目前为止，我们研究了深度学习中的分类模型。我们能否将目前所学的深度学习技术应用于回归问题——这个在数据分析中可能被认为是最简单的问题？考虑到深度学习的开销，在回归领域尝试使用深度学习是否值得？与传统的统计技术相比，尤其是在回归建模方面，使用深度学习是否有优势？你将在本章中找到这些及相关问题的答案。


    你已经知道，简单的线性回归是机器学习中最简单的事情，而且很多时候这是机器学习中教授的第一个主题。统计回归模型已经存在多年，并在许多实际应用中提供了有用的预测。这些模型同样被用于工业、商业和科学环境中。与此同时，我们在这本书中学到的深度学习网络已被证明成功解决了世界上最复杂的问题。它们提供了非常准确的预测，模拟了我们大脑的学习过程。现在，问题是我们能否使用深度学习网络来运行一个回归问题？而且，与使用传统统计编码技术运行回归相比，我们能否获得任何优势？对这个问题的简短回答是：完全可以。要理解为什么以及如何做到，请继续阅读！


    让我先定义什么是回归。


    ## 回归


    我将从回归的定义开始，接着介绍它在现实世界中的应用。然后，我将向你解释回归的统计建模，以及各种回归类型。


    ### 定义


    在统计建模中，回归分析是一组统计过程。这些过程试图建立一个因变量（目标）和一个自变量（特征）之间的关系。因变量也被称为结果变量，自变量有时被称为预测变量或协变量。在简单情况下，只存在一个单一的预测变量，而在更复杂的数据分布中，会有多个协变量。回归的最简单形式是线性回归，分析者在此找到预测变量和结果之间的直线关系。但在许多实际情况下，这种关系不能用一条直线来表示。这种关系可能是一组直线，从而形成某种多项式。在复杂数据集中确定超平面是数据分析师面临的一大挑战。存在几种类型的回归，例如线性、逻辑、逐步回归等。估计关系的类型并编写相应的代码对开发者来说并非易事。


    那么，你在哪里应用回归建模呢？


    ### 应用


    回归分析主要用于解决以下领域的问题：


    - 预测和预报

    - 推断因果关系


    估算房屋价格是大多数线性回归模型的预测能力。一个多变量模型可以预测给定股票的未来价格。因果关系是为了回答这样的问题——什么事件导致了另一个事件，或者什么带来了某种变化？网站流量激增的原因是什么，装配线故障的原因是什么，某种药物是否改善了某些医疗状况——这些都是建立因果关系的例子。为了处理这些应用领域，数据分析师必须首先调查一个关系是否具有预测能力。为什么两个变量之间的关系具有或不具有因果解释？用现代术语来说，回答这些问题对统计学家或数据分析师来说并非易事。神经网络将帮助你回答这些问题，这正是我将在本章中向你展示的内容。


    ### 回归问题


    在回归问题中，我们根据一组连续值的输入来预测一个因变量的值或概率。与你之前研究的分类模型相比，分类问题是从预定义的类别列表中选择一个类别。例如，在第 4 章中，你做了一个狗品种分类器，其中输入图像被推断为
    120 个预定义品种集合中的一个类别。


    在回归分析中，你对一个因变量和一个或多个自变量之间的关系进行建模。这种关系可以用一个简单的数学方程表示：


    ```

    γ = β₁X₁ + β₂X₂ + β₃X₃ + ... + βₖXₖ + ε

    ```


    其中 `γ` 是你试图预测的因变量，而 `X₁`、`X₂`、…、`Xₖ` 是自变量。`β₁`、`β₂` … `βₖ` 是神经网络中的系数或权重，`ε` 是误差或偏差，在机器学习术语中如此称呼。现在，让我们看看回归的类型。


    ### 回归类型


    回归分析可以分为以下几类：


    - 线性

    - 多项式

    - 逻辑

    - 逐步

    - 岭

    - 套索

    - 弹性网络


    当因变量和自变量之间存在线性关系（一条直线）时，线性回归适用。在多项式回归的情况下，因变量最适合用多项式拟合，即一条曲线或一系列曲线。在此类模型中，异常值可能会扭曲预测，因此容易受到机器学习术语中所谓的过拟合的影响。在逻辑回归的情况下，预测值是二元的，并且严格遵循二项分布。当你拥有大量自变量（即高维度）时，你可以使用逐步回归来检测哪些变量是显著的，并剔除不显著的变量，以最大化模型的预测能力。当自变量高度相关（也称为多重共线性）时，它们会使方差变得足够大，从而导致预测值出现较大偏差。岭回归技术向回归估计中添加一个偏差项，以惩罚系数或权重值。它使用最小二乘法来收缩系数，确保它们不会达到零。这是一种正则化形式——L2
    正则化。套索正则化类似于岭回归，并通过收缩回归系数以相同的方式帮助解决多重共线性问题。然而，现在收缩的是绝对值，而不是最小二乘值。这也意味着某些权重可以收缩到零，从而完全消除该特定节点的输出。这在特征选择中很有用，因为它本质上是从一组因变量中挑选出一个。这也是一种正则化类型——L1
    正则化。最后，弹性网络是岭回归和套索回归的结合。该模型依次使用 L1 和 L2 正则化进行训练，从而在这两种技术之间取得平衡。因此，弹性网络可能会选择多个相关的变量。


    所有这些是否让你完全困惑了？不仅要理解统计技术，还要考虑各种类型的回归，你可以很容易地想象到编码它们所涉及的复杂性。深度学习技术能否拯救你？继续阅读！

