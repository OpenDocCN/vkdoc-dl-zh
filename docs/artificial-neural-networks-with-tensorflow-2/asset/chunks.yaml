    ### 加载数据


    要加载数据，请在新的代码单元格中输入以下程序代码并执行：


    ```

    data = pd.read_csv(''/content/drive/ /Churn_Modelling.csv'')

    ```


    请注意，你需要为 CSV 文件设置正确的路径。


    如果你决定使用本书 GitHub 仓库中的数据，请使用以下代码替换前面的代码段：


    ```

    data_url = ''https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch02/Churn_Modelling.csv''

    data=pd.read_csv(data_url)

    ```


    `read_csv` 函数从指定文件加载数据，并将其复制到一个 pandas 数据帧中。


    #### 打乱数据


    现场收集的数据可能会按照数据收集者的便利性和舒适度以特定顺序排列。为了获得更好的机器学习效果，你应该对数据进行随机化处理，这样学习过程就不会遵循数据中不期望的模式。因此，我们使用以下语句打乱数据：


    ```

    data=shuffle(data)

    ```


    #### 检查数据


    你可以通过打印 `data` 数据帧的内容来验证数据是否正确加载。我没有通过调用 `data.head()` 来打印前几行，而是打印了整个数据集，以便你了解其中的记录数和列数。如图
    2-12 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig12_HTML.jpg](img/495303_1_En_2_Fig12_HTML.jpg)


    图 2-12


    数据集


    数据库中有 10,000 行和 14 列。以下是各个字段的简要说明：


    *   `RowNumber` – 从 1 到 10,000 的编号。

    *   `CustomerId` – 客户的唯一标识。

    *   `Surname` – 客户的姓氏。

    *   `CreditScore` – 客户的信用评分。

    *   `Geography` – 客户所在国家。

    *   `Gender` – 男性或女性。

    *   `Age` – 客户年龄。

    *   `Tenure` – 客户与该银行合作的时间长度。

    *   `Balance` – 客户的银行余额。

    *   `NumOfProducts` – 客户当前使用的银行产品数量。

    *   `HasCrCard` – 客户是否持有信用卡？

    *   `IsActiveMember` – 客户当前是否活跃？

    *   `EstimatedSalary` – 客户当前的预估薪资。

    *   `Exited` – 值为 1 表示客户已离开该银行。


    现在，既然你已经将数据加载到内存中，下一步任务是在将其输入到我们的网络之前对其进行清洗。我们称之为数据预处理，接下来将讨论这一点。


    ### 数据预处理


    原始的实时数据可能并不总是满足神经网络（ANN）的训练要求。具体来说，你需要检查数据并针对以下项目进行处理：


    *   数据可能包含空值。

    *   数据库中的所有字段可能并非都对学习有用。

    *   数值字段的值可能存在较大差异，因此必须将其缩放到同一水平。

    *   某些字段可能包含分类值，例如男性和女性；这些需要编码为 0 和 1。

    *   最后，你需要决定哪些字段用作特征，以及标签是什么。


    那么，让我们开始处理数据。


    #### 检查空值


    如果数据包含空值，将严重影响网络训练。检查空值最简单的方法是调用 `isnull` 函数。这通过以下程序语句完成：


    ```

    data.isnull().sum()

    ```


    上述语句的输出结果如下：


    ```

    RowNumber          0

    CustomerId         0

    Surname            0

    CreditScore        0

    Geography          0

    Gender             0

    Age                0

    Tenure             0

    Balance            0

    NumOfProducts      0

    HasCrCard          0

    IsActiveMember     0

    EstimatedSalary    0

    Exited             0

    dtype: int64

    ```


    对空值计算总和会生成错误。很明显，我们的数据集不包含任何空值。因此，不存在从数据集中删除行（包含空字段的行）的问题。


    接下来是选择机器学习字段的主要任务。


    #### 选择特征和标签


    并非数据库中的所有字段都对训练算法有用。例如，`CustomerId` 和 `Surname` 等字段对我们的机器学习没有任何意义。因此，我们需要删除这些列。这通过以下语句完成：


    ```

    X = data.drop(labels=[''CustomerId'', ''Surname'', ''RowNumber'', ''Exited''],
    axis = 1)

    ```


    请注意，我们从数据集中删除了四个字段。`X` 是一个新数组，包含与我们的模型构建相关的字段。


    客户是否离开银行标志着我们模型的输出。因此，`Exited` 字段成为我们模型构建的标签。这通过以下语句提取到变量 `y` 中：


    ```

    y = data[''Exited'']

    ```


    至此，你已经准备好了特征（`X`）和标签（`y`）张量。


    #### 编码分类列


    你必须检查所选列中是否有任何列包含分类值。为此，我们将使用以下语句检查所有选定列的数据类型：


    ```

    X.dtypes

    ```


    上述语句的输出如下所示：


    ```

    CreditScore          int64

    Geography           object

    Gender              object

    Age                  int64

    Tenure               int64

    Balance            float64

    NumOfProducts        int64

    HasCrCard            int64

    IsActiveMember       int64

    EstimatedSalary    float64

    Dtype: object

    ```


    请注意，`Geography` 和 `Gender` 是对象类型。你可以通过打印特征张量的前五行来检查它们包含的值，如图 2-13 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig13_HTML.jpg](img/495303_1_En_2_Fig13_HTML.jpg)


    图 2-13


    特征向量的前五行


    `Gender` 取两个分类值：Male 和 Female，而 `Geography` 有三个分类值：Germany、Spain 和 France。在将其输入网络之前，你需要将这些值转换为数值。编码通过使用
    sklearn 预处理模块中的 `LabelEncoder` 完成。如下代码片段所示：


    ```

    from sklearn.preprocessing import LabelEncoder

    label = LabelEncoder()

    X[''Geography''] = label.fit_transform(X[''Geography''])

    X[''Gender''] = label.fit_transform(X[''Gender''])

    ```


    独热编码为分类列创建虚拟变量。由于 `Geography` 列有三个不同的值，它将创建三个变量——每个国家一个。因此，我们的训练数据集中将有三个与国家相关的特征。特征过多会增加训练时间。为了减少特征数量，你可以排除与国家字段相关的一个虚拟变量，同时仍能达到相同的结果。我们通过调用
    `get_dummies` 方法来删除第一个变量：


    ```

    X = pd.get_dummies(X, drop_first=True, columns=[''Geography''])

    ```


    如果你此时通过打印前五行来检查数据，你会注意到 `Geography` 只有两列——`Geography_1` 和 `Geography_2`。


    在将数据输入网络之前，我们还需要做一件事，就是将所有的数值缩放到 -1 到 1 的范围内。

