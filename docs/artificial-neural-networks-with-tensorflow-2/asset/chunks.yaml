- fmt: '### TensorBoard


    TensorBoard is a visualization tool that helps in your experimentation on ML model
    development. With TensorBoard, some of the things that you can do are:


    - Visualizing loss and accuracy metrics

    - Visualizing model graph

    - Viewing histograms of weights, biases, and so on

    - Displaying images

    - Profiling programs


    A typical screenshot of the TensorBoard that displays the accuracy and loss metrics
    is shown in Figure [1-12](#495303_1_En_1_Chapter.xhtml#Fig12).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig12_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig12_HTML.jpg)


    Figure 1-12: TensorBoard metrics display


    With TensorBoard, you can visualize the model training directly within your Jupyter
    environment. It provides several useful and exciting features such as memory profiling,
    viewing confusion matrix and conceptual model graph, and so on. It is a tool that
    allows you to do measurements and view the results in the machine learning workflow.


    ### Vision Kit


    With TensorFlow 2.x, you will now be able to design your own IoT devices which
    are capable of image recognition. These IoT devices will be powered by TensorFlow’s
    machine learning models. With Google AIY Vision Kit, you will be able to build
    your own intelligent camera that can see and recognize objects. You have an option
    of creating your own recognition model or using a pre-trained model for this intelligent
    camera. The entire kit fits in a small handy cardboard cube and is powered by
    a Raspberry Pi. The kit provides everything that you need to build your own intelligent
    camera.


    ### Voice Kit


    Just the way you build an intelligent camera that provides vision to your IoT
    devices, with Voice Kit you will be able to provide the listening and answering
    abilities to your IoT devices. With the help of Google AIY Voice Kit, you will
    be able to create your own natural language processor that can connect to Google
    Assistant or the Speech-to-Text service on the cloud. With this, you will be able
    to issue voice commands to your IoT device or even ask questions and get answers
    to it. Like Vision Kit, this too fits in a handy cardboard cube and is powered
    by a Raspberry Pi. The kit includes everything that you need to build an audio-capable
    IoT device including the Raspberry Pi.


    ### Edge TPU


    If you are an IoT device manufacturer, you will be happy to prototype your new
    ML models on the device itself. Coral has created the Edge TPU board for this
    very purpose. This is a development board to quickly prototype on-device ML products.
    It is a single-board computer with a removable system-on-module (SOM). The SOM
    contains eMMC, SOC, wireless radios, and the Edge TPU. This is also ideally suited
    for fast on-device ML inferencing required by IoT devices and other embedded systems.


    ### Pre-trained Models for AIY Kits


    There are several pre-trained models available for your use on AIY kits. Some
    of these are listed as follows:


    - Face detector

    - Dog/cat/human detector

    - Dish classifier for identifying food

    - Image classifier

    - Nature explorer for recognizing birds, insects, and plants


    If you develop your own model, you are welcome to submit it to Google for inclusion
    in the preceding list of pre-trained models displayed on the Google site.


    ### Data Pipelines


    As we have seen, with TensorFlow 2.0, the training can be distributed across GPUs
    and TPUs considerably reducing the time required to execute a single training
    step. This also calls for providing efficient data transfer between two steps.
    The new `tf.data` API helps in building flexible and efficient input pipelines
    across a variety of models and accelerators. You will use data pipelines in Chapter
    [2](#495303_1_En_2_Chapter.xhtml).


    ## Installation


    TensorFlow 2.x can be installed on the following platforms:


    - macOS 10.12.6 or later

    - Ubuntu 16.04 or later

    - Windows 7 or later

    - Raspbian 9.0 or later


    I personally use Mac for my development. All the programs given in this tutorial
    are developed and tested on Mac.


    The installation of TensorFlow is trivial. It requires a `pip` version >19.0.
    You can ensure that the latest `pip` is available on your machine by running the
    following command in your console window:


    ```

    pip install --upgrade pip

    ```


    To install a CPU-only version of TensorFlow, you would run the following command:


    ```

    pip install tensorflow

    ```


    To install a CPU/GPU version, you will use the following command:


    ```

    pip install tensorflow-gpu

    ```


    ### Installation


    To install TensorFlow on Mac, you must have Xcode 9.2 or later – command-line
    tool available on your machine. The `pip` package has few dependencies which are
    installed using the following commands on the command-line tool:


    ```

    pip install -U --user pip six numpy wheel setuptools mock ''future>=0.17.1''

    pip install -U --user keras_applications --no-deps

    pip install -U --user keras_preprocessing --no-deps

    ```


    Once you have these dependencies installed, you can run `pip install` to install
    whatever the version of TensorFlow you want to use.


    ### Docker Installation


    If you do not want to do the jugglery of installing the TensorFlow yourself, you
    can take advantage of a ready-to-use image in a Docker container. To download
    the Docker image, use the following command:


    ```

    docker pull tensorflow/tensorflow

    ```


    After the Docker container is successfully downloaded, run the following command
    to start a Jupyter notebook server:


    ```

    docker run -it -p 8888:8888 tensorflow/tensorflow

    ```


    Once the Jupyter environment starts, open a notebook and use TensorFlow as you
    wish. This is explained next under the section “Testing.”


    ### No Installation


    So far, I have shown you the ways of installing TensorFlow on a few platforms.
    Using a Docker image saves you from researching the dependencies. There is yet
    another easy way to learn and use TensorFlow – and that is using Google Colab.
    This requires no installation to use TensorFlow. You simply start Google Colab
    in your browser. Google Colab is a Google research project that essentially provides
    you a Jupyter notebook environment in a browser. No setup is required and your
    entire notebook code runs in the cloud. You will be using Google Colab for running
    the programs in this tutorial.'
