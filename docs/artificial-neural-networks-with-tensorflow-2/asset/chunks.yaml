    The scaled dot-product attention

    function used by the transformer takes three inputs: Q (query), K (key),

    V (value). The equation used to calculate the attention is


    ![$$ Attention\left(Q,K,V\right)={softmax}_k\left(\frac{QK^T}{\sqrt{d_k}}\right)V
    $$](images/495303_1_En_9_Chapter/495303_1_En_9_Chapter_TeX_Equa.png)


