    img_path.append(image_path)

    img_cap.append(image_desc)

    else:

    continue

    return img_path , img_cap

    ```


    I am restricting the number of images to 8000 and reading only one caption per
    image. For each caption, we also add the `<start>` and `<end>` tags.


    Call this function to create the two desired lists:


