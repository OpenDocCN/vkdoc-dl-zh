    ## PositionalEncoding Class


    Like the seq2seq model that you used in the previous chapter, the Transformer
    model does not have memories through the use of LSTMs. So, to give information
    about the relative positioning of the words in a given sentence, we feed the network
    with the additional input called positional encoding. The two vectors – positional
    encoding and embedding – are then fed together to the network. Embedding brings
    together the tokens (words) with similar meanings, but they do not specify (encode)
    the relative position of words in a sentence. Thus, adding both results in bringing
    words closer together based on the similarity of their meaning and their position
    in the sentence. This happens in the entire d-dimensional space.


    The formula for calculating the positional encoding is given as follows:


    ![$$ {PE}_{\left( pos,2i\right)}=\mathit{\sin}\left( pos/{10000}^{2i/{d}_{model}}\right)
    $$](images/495303_1_En_9_Chapter/495303_1_En_9_Chapter_TeX_Equb.png)


    ![$$ {PE}_{\left( pos,2i+1\right)}=\mathit{\cos}\left( pos/{10000}^{2i/{d}_{model}}\right)
    $$](images/495303_1_En_9_Chapter/495303_1_En_9_Chapter_TeX_Equc.png)


    The proof of this formula ([`https://arxiv.org/pdf/1706.03762.pdf`](https://arxiv.org/pdf/1706.03762.pdf))
    is beyond the scope of this book. The implementation of the formula is trivial
    and can be seen in the class definition given as follows:


    ```

    class PositionalEncoding(tf.keras.layers.Layer):

    def __init__(self, position, d_model):

    super(PositionalEncoding, self).__init__()

    self.pos_encoding = self.positional_encoding

    (position, d_model)

    def get_angles(self, position, i, d_model):

    angles = 1 / tf.pow(10000, (2 * (i // 2)) /

    tf.cast(d_model, tf.float32))

    return position * angles

    def positional_encoding(self, position, d_model):

    angle_rads = self.get_angles(

    position=tf.range(position, dtype=tf.float32)

    [:, tf.newaxis],

    i=tf.range(d_model, dtype=tf.float32)

    [tf.newaxis, :],

    d_model=d_model)

    # apply sine to even index in the array

    sines = tf.math.sin(angle_rads[:, 0::2])

    # apply cosine to odd index in the array

    cosines = tf.math.cos(angle_rads[:, 1::2])

    pos_encoding = tf.concat([sines, cosines],

    axis=-1)

    pos_encoding = pos_encoding[tf.newaxis, ...]

    return tf.cast(pos_encoding, tf.float32)

    def call(self, inputs):

    return inputs + self.pos_encoding

    [:, :tf.shape(inputs)[1], :]

    ```


    Having defined the helper functions, let us now proceed to define the Encoder
    Layer, which is repeated multiple times in an Encoder.


    ## Encoder Layer


    As seen in the Encoder schematic of Figure [9-4](#495303_1_En_9_Chapter.xhtml#Fig4),
    the Encoder Layer which is repeated N number of times consists of the following:


    1.  Multi-Head Attention (with padding mask)

    2.  Two Dense layers followed by dropout


    Each of these will also include a normalization that takes care of the vanishing
    gradient problem in deep neural networks.


    This network structure is easily observed in the following definition of the encoder
    layer:


    ```

    def encoder_layer(units, d_model, num_heads, dropout,

    name="encoder_layer"):

    inputs = tf.keras.Input(shape=(None, d_model),

    name="inputs")

    padding_mask = tf.keras.Input(shape=(1, 1, None),

    name="padding_mask")

    # multi-head attention with padding mask

    attention = MultiHeadAttention(

    d_model, num_heads, name="attention")({

    ''query'': inputs,

    ''key'': inputs,

    ''value'': inputs,

    ''mask'': padding_mask

    })

    attention = tf.keras.layers.Dropout

    (rate=dropout)(attention)

    attention = tf.keras.layers.LayerNormalization(

    epsilon=1e-6)(inputs + attention)

    # two dense layers followed by a dropout

    outputs = tf.keras.layers.Dense(units=units,

    activation=''relu'')(attention)

    outputs = tf.keras.layers.Dense(units=d_model)

    (outputs)

    outputs = tf.keras.layers.Dropout(rate=dropout)

    (outputs)

    outputs = tf.keras.layers.LayerNormalization(

    epsilon=1e-6)(attention + outputs)

    return tf.keras.Model(

    inputs=[inputs, padding_mask],

    outputs=outputs, name=name)

    ```


    With this setup, we are now ready to define the Encoder itself.


    ## Encoder


    As you have seen so far, the Encoder will consist of the following components:


    1.  Input embedding for a given sentence

    2.  Positional encoding for the relative position of words in a given sentence

    3.  Repeating Encoder Layer


    The number of repeating Encoder Layers is your choice. We will be using two repetitions
    in our project. The input to the first Encoding Layer is the sum of input embedding
    and positional encoding. The output of the second Encoder Layer, which is the
    final output of the Encoder, becomes the input to the decoder.


    ```

    def encoder(vocab_size,

    num_layers,

    units,

    d_model,

    num_heads,

    dropout,

    name="encoder"):

    inputs = tf.keras.Input(shape=(None,),

    name="inputs")

    # create padding mask

    padding_mask = tf.keras.Input(shape=(1, 1, None),

    name="padding_mask")

    # create combination of word embedding + positional encoding

    embeddings = tf.keras.layers.Embedding

    (vocab_size, d_model)(inputs)

    embeddings *= tf.math.sqrt(tf.cast

    (d_model, tf.float32))

    embeddings = PositionalEncoding

    (vocab_size, d_model)(embeddings)

    outputs = tf.keras.layers.Dropout(rate=dropout)

    (embeddings)

    # repeat the Encoder Layer two times

    for i in range(num_layers):

    outputs = encoder_layer(

    units=units,

    d_model=d_model,

    num_heads=num_heads,

    dropout=dropout,

    name="encoder_layer_{}".format(i),

    )([outputs, padding_mask])

    return tf.keras.Model(

    inputs=[inputs, padding_mask], outputs=outputs,

    name=name)

    ```


    Notice that between the two embedding layers, we share the same weight matrix,
    except that we multiply those weights by the square root of `d_model` before inputting
    to `PositionalEncoding`.


    To visualize the Encoder architecture, you can generate its model plot with the
    following code:


    ```

    sample_encoder = encoder(

    vocab_size=8192,

    num_layers=5,

    units=512,

    d_model=128,

    num_heads=4,

    dropout=0.3,

    name="sample_encoder")

    tf.keras.utils.plot_model(

    sample_encoder, to_file=''encoder.png'')

    ```


    Note that I am repeating the Encoder Layer five times here just for the demonstration
    purpose. In the actual project, I am repeating this layer only twice. The network
    plot for the Encoder is shown in Figure [9-5](#495303_1_En_9_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig5_HTML.jpg](images/495303_1_En_9_Chapter/495303_1_En_9_Fig5_HTML.jpg)


    **Figure 9-5** Encoder network plot


    Note how the inputs are word embedded and then combined with positional encoding
    before feeding to the first encoder layer. The encoder layer itself is repeated
    five times with a padding mask applied to the input at each layer. The output
    of the encoder will become the input to the decoder. Though for clarity I have
    repeated the encoder layer five times, in the project code, it was repeated only
    two times to save on the training period. We now proceed to define the Decoder.'
