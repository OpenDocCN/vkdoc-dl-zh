- fmt: '### Log Cosh


    Mathematically, this is expressed as


    ![$$ L\left(y,{y}^p\right)=\sum \limits_{i=1}^n\log \left(\cosh \left({y}_i^p-{y}_i\right)\right)
    $$](images/495303_1_En_5_Chapter/495303_1_En_5_Chapter_TeX_Equf.png)


    The function takes the logarithmic of the hyperbolic cosine of the error. For
    small errors, the `log(cosh(x))` approximates to ![$$ \frac{(error)^2}{2} $$](images/495303_1_En_5_Chapter/495303_1_En_5_Chapter_TeX_IEq1.png),
    and for large errors, it is `abs(error) – log(error)`. So, mostly, it works like
    a `mse`. It is twice differentiable everywhere and has all the advantages of the
    Huber loss. The function is provided as `tf.keras.losses.LogCosh()` in the `tf.keras`
    library.


    ### Quantile


    Consider a data distribution shown in the LHS of Figure [5-12](#495303_1_En_5_Chapter.xhtml#Fig12).


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig12_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    Quantile regression plots


    Rather than modeling a single regression line, you may like to model this data
    with multiple regression lines as shown in the RHS of Figure [5-12](#495303_1_En_5_Chapter.xhtml#Fig12).
    In such situations, the quantile loss comes to your rescue. Mathematically, it
    is specified as


    ![$$ L\left(y,{y}^p\right)={\sum}_{i={y}_i&lt;{y}_i^p}\left(\gamma -1\right).\left|{y}_i-{y}_i^p\right|+{\sum}_{i={y}_i\ge
    {y}_i^p}\left(\gamma \right).\left|{y}_i-{y}_i^p\right| $$](images/495303_1_En_5_Chapter/495303_1_En_5_Chapter_TeX_Equg.png)


    where *γ* takes the value between 0 and 1. The quantile loss is actually an extension
    of `mae`. It becomes `mae` when *γ* takes the value of 0.5. The values on either
    side provide penalties to either overestimate or underestimate.


    The quantile loss functions are useful when you want to predict an interval instead
    of a point prediction. This can significantly improve decision making in many
    business problems.


    Now, having seen the various loss functions that can be used in the context of
    regression, let me tell you what optimizers are available in `tf.keras`, which
    can be used along with these loss functions.


    ## Optimizers


    Optimizers are essentially the algorithms used to reduce losses during the model
    training. They update the weight parameters to minimize the loss function which
    continuously tells the optimizer if it is moving in the right direction to reach
    the global minimum. Unlike loss functions, optimizers are not specific to regression,
    and all available optimizers can be applied to regression problems. The various
    optimizers available in `tf.keras` are listed here:


    - `Adagrad`

    - `RMSprop`

    - `Adam`

    - `SGD`

    - `Adadelta`

    - `Adamax`

    - `Nadam`


    You have already used some of these in our earlier projects. Each optimizer has
    its own purpose. I strongly recommend that you go through the `tf.keras` documentation
    to understand the importance of each one. Depending on the need, try using different
    optimizers to improve the model’s performance. Once again, these are not specific
    to regression problems and apply across all types of deep learning projects.


    ## Summary


    To summarize whatever you have learned in this chapter, it can be said that if
    an existing statistical model of regression meets your purpose, do not bother
    to use neural networks.


    If you are modeling a complex dataset with a large number of features having complex
    hyperplane relationships to the target values, use deep learning neural networks
    to get that extra prediction power. The traditional regression functions are available
    in `R`, `scikit-learn`, and other such similar libraries. For example, the `scikit-learn`
    library besides linear regression provides several other regressors such as `KNeighboursRegressor`,
    `DecisionTreeRegressor`, and `RandomForestRegressor`. On the other hand, neural
    networks have a bit of overhead, but provide a prediction power that is incomparable
    to any of the regressors mentioned earlier. It is very rare to find a regression
    equation that perfectly fits the given datasets. The deep learning network, on
    the contrary, will try to find the best fit on its own without any additional
    efforts from your side. Thus, to conclude, henceforth, think of using neural networks
    for solving even small regression problems; who knows, this small problem (dataset)
    may become huge over a period of time where keeping tab of traditional statistical
    techniques will become a nightmare.


    The next chapter will take you through some of the techniques of quicker machine
    learning.


    # 6. Estimators


    ## Introduction


    Any machine learning project consists of many stages that include training, evaluation,
    prediction, and finally exporting it for serving on a production server. You learned
    these stages in previous chapters where the classification and regression machine
    learning projects were discussed. To develop the best performing model, you played
    around with different ANN architectures. Basically, you experimented with several
    different prototypes to achieve the desired results. Prior to TF 2.0, this entire
    experimentation was not so easy as for every change that you make in the code,
    you were required to build a computational graph and run it in a session. The
    estimators that you are going to study in this chapter were designed to handle
    all this plumbing. The entire process of creating graphs and running them in sessions
    was a time-consuming job and posed lots of challenges in debugging the code.


    Additionally, after the model is fully developed, there was a challenge of deploying
    it to a production environment where you may wish to deploy it in a distributed
    environment for better performance. Also, you may like to run the model on a CPU,
    GPU, or a TPU. This necessitated code changes. To help you with all these issues
    and to bring everything under one umbrella, estimators were introduced, albeit
    prior to TF 2.0. However, the estimators, which you are going to learn in this
    chapter and will be using in all your future projects, are capable of taking advantage
    of the many new facilities introduced in TF 2.x. For example, there is a clear
    separation between building a data pipeline and the model development. The deployment
    on a distributed environment too occurs without any code change. The enhanced
    logging and tracing make debugging easier. In this chapter, you will learn how
    estimator achieves this.


    In particular, you will learn the following:


    - What is an estimator?

    - What are premade estimators?

    - Using a premade estimator for classification problems

    - Using a premade estimator for regression problems

    - Building custom estimators on Keras models

    - Building custom estimators on `tfhub` modules


    ## Estimator Overview


    A TensorFlow estimator is a high-level API that unifies several stages of machine
    learning development under a single umbrella. It encapsulates the various APIs
    for training, evaluation, prediction, and exporting your model for production
    use. It is a high-level API that provides a further abstraction to the existing
    TensorFlow API stack.'
