  trans: '

    # 犬种分类器


    假设你有一个包含狗图片及其品种标签的数据集。你可能无法为每个类别收集到足够多的图片。你希望开发一个模型，根据狗的品种对其进行分类。你可以考虑使用之前课程中讨论过的
    ImageNet 分类器来提取狗图片的特征。然后，你将在其之上添加一个层，根据这些提取的特征来区分不同品种的狗。简而言之，你将迁移 ImageNet 的学习成果来对狗的种类进行分类，从而省去为特征提取而训练模型的麻烦。


    图像分类模型拥有数百万个参数。从头开始训练它们通常是一项艰巨的任务。这需要大量的训练数据，并且计算成本很高。迁移学习通过利用已经训练好的模型的一部分来缩短这一过程。你只需在其之上添加自己的分类层即可。


    本项目将演示如何使用来自 TensorFlow Hub MobileNet V2 的预训练 TF2 保存模型，构建一个用于对犬种进行分类的 Keras 模型。该模型接受尺寸为
    `(224,224,3)` 的输入用于图像特征提取，随后通过我们模型的输出 `Dense` 层，使用 softmax 进行分类。


    让我们开始构建这个项目。


    ## 项目描述


    犬种项目将使用迁移学习来定义一个用于对不同犬种进行分类的新模型。这是一个多类分类器，它将给定的狗图片分类到几个预定义的类别中。区分多类分类和二分类，可以说，狗与猫或人类与马是二分类。特斯拉在其自动驾驶汽车中使用了多类图像分类。


    对于本项目，我们将使用来自 Kaggle 犬种识别竞赛的数据集（`https://www.kaggle.com/c/dog-breed-identification/overview`）。它包含
    10,000 多张标记图像，涵盖 120 个不同的犬种。我们需要通过将图像数据转换为张量来预处理数据。我们的机器学习模型将找出输入张量中的模式。Kaggle
    作为一个竞赛平台，已经分别提供了训练数据和测试数据。显然，测试数据没有标签。


    ## 创建项目


    创建一个新的 Colab 项目，并将其重命名为 `DogBreedClassifier`。使用以下两条语句导入 TensorFlow 和 TensorFlow
    Hub：


    ```

    import tensorflow as tf

    import tensorflow_hub as hub

    ```


    接下来，你将把数据加载到项目中。


    ## 加载数据


    我已将全部数据（来源：`www.kaggle.com/c/dog-breed-identification/data`）保存在项目站点上，以便你可以一次性运行项目，无需担心单独下载数据。要将数据下载到你的项目中，请运行以下代码片段：


    ```

    ! wget --no-check-certificate -r ''https://drive.google.com/uc?export=download&id=11t-eBwdXU9EWriDhyhFBuMqHYiQ4gdae''
    -O dogbreed

    ```


    请注意，在上述下载过程中，假定下载站点是可信的。如果你有任何疑虑，你可以使用自己的工具下载文件，并在项目中包含适当的路径以输入到模型。


    下载的 zip 文件包含用于训练和测试的标签和图像。zip 文件的结构如图 4-8 所示。


