  raw: '#### Features Column


    Features column provide a bridge between raw data and an estimator. It transforms
    a diverse range of raw data into formats that estimators need. You use the tf.feature_column
    module to build a list of Feature columns. This then becomes an input to the estimator
    constructor. The estimator object uses this list while interpreting the data coming
    from the Input function. The whole process can be visualized as shown in Figure
    [6-4](#495303_1_En_6_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig4_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    How Features columns are used


    As seen in the central block of Figure [6-4](#495303_1_En_6_Chapter.xhtml#Fig4),
    the list of Feature columns is as follows:


    *   Fixed acidity (numeric)


    *   Volatile acidity (numeric)


    *   Citric acid (numeric)


    *   …


    These are the features of our wine quality model that you developed in the previous
    chapter. Each element in the list is of type tf.feature_column.numeric_column.
    The following code snippet tells you how to build such a list:


    ```

    # build numeric features array

    numeric_feature = []

    for col in numeric_columns:

    numeric_feature.append

    (tf.feature_column.numeric_column(key=col))

    ```


    Sometimes, your dataset may contain categorical fields which you want to use as
    the features in your model building. The following code snippet tells you how
    to build a Features column for such categorical fields:


    ```

    categorical_features = []

    for col in categorical_columns:

    vocabulary = data[col].unique()

    cate = tf.feature_column.

    categorical_column_with_vocabulary_list

    (col, vocabulary)

    categorical_features.append

    (tf.feature_column.indicator_column(cate))

    ```


    Note we first obtain the vocabulary by calling the categorical_column_with_vocabulary_list
    method and then append the indicator columns to the list.


    This list is passed as a parameter to the estimator constructor, as seen in Figure
    [6-4](#495303_1_En_6_Chapter.xhtml#Fig4). If your model requires both numerical
    and categorical features, you will need to append both to your destination Features
    column.


    The left block in Figure [6-4](#495303_1_En_6_Chapter.xhtml#Fig4) shows data which
    is actually built by an Input function. This data will be input to the estimator’s
    train/evaluate/predict method calls.


    Next, I will describe how to write the Input function.


    #### Input Function


    The purpose of the Input function is to return the following two objects for the
    use of our estimator model object:


    *   A dictionary of feature names (keys) and Tensors or Sparse Tensors (values)
    containing the corresponding feature data


    *   A Tensor containing one or more labels


    The basic skeleton looks like this:


    ```

    def input_fn (dataset):

    # create dictionary with feature names

    # and Tensors with corresponding data

    # create Tensor for label data

    return dictionary, label

    ```


    You may write separate functions based on this prototype for training/evaluation/inferencing.


    I will now present you the practical implementation of the Input function taken
    from the example that is later discussed in this chapter. This would further clarify
    the concepts behind the Input function in your minds.


    The input function is a Python function with the following prototype:


    ```

    def input_fn(features, labels, training =

    True, batch_size = 32):

    ```


    Here the features and labels arguments represent tensors containing the features
    and the labels data. Within the function, the data is converted into tensor by
    calling the function from_tensor_slices of the tf.data.Dataset module.


    ```

    #converts inputs to a dataset

    Dataset = tf.data.Dataset.from_tensor_slices

    ((dict(features),labels))

    ```


    The input parameter to the function is a Python dictionary of features and the
    corresponding labels. Finally, the function returns this data to the caller in
    batches by using the batch method of tf.data.Dataset.


    ```

    return dataset.batch(batch_size)

    ```


    The function structure is visualized in Figure [6-5](#495303_1_En_6_Chapter.xhtml#Fig5)
    for further understanding.


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig5_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    The Input function structure


    The whole matter may look quite complicated; a practical example will help in
    clarifying the entire implementation, and that is what I am going to do next.


    ## Premade Estimators


    I will be discussing two types of premade estimators – one for classification
    and the other for a regression type of problems. First, I will describe a project
    for classification. We will use the premade DNNClassifier for this project. The
    DNNClassifier defines a deep neural network and classifies its input into several
    classes. You will be using the MNIST database for classifying the handwritten
    digits into ten numeric digits. The second project that I am going to describe
    uses the premade estimator called LinearRegressor. The project uses the Airbnb
    database for the Boston region. The database consists of several houses listed
    on Airbnb. For each listed house, several features are captured, and the price
    at which the house is sold/saleable is listed. Using this information, you will
    develop a regression model to predict the price at which a newly listed house
    would probably be sold.


    The use of these two different models will give you a good insight into how to
    use the premade estimators on your own model development problems. So let us start
    with a classification model first.


    ## DNNClassifier for Classification


    Create a new Colab project and rename it to DNNClassifier-estimator. As usual,
    import the TensorFlow using the following statement:


    ```

    import tensorflow as tf

    ```


    We will use the MNIST database for this project. The dataset is available in the
    sklearn kit. It is the database of the handwritten digits. Our task is to use
    the premade classifier to recognize the digits embedded in these images. The output
    consists of ten classes, pertaining to the ten digits.


    ### Loading Data


    To load the MNIST data from the sklearn, you use the following code:


    ```

    from sklearn import datasets

    digits = datasets.load_digits()

    ```


    You can examine the contents of the loaded data by plotting a few images. The
    following code will display the first four images:


    ```

    #plotting sample image

    import matplotlib.pyplot as plt

    plt.figure(figsize=(1,1))

    fig, ax = plt.subplots(1,4)

    ax[0].imshow(digits.images[0])

    ax[1].imshow(digits.images[1])

    ax[2].imshow(digits.images[2])

    ax[3].imshow(digits.images[3])

    plt.show()

    ```


    You will see the output shown in Figure [6-6](#495303_1_En_6_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig6_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Sample images


    Each image is of size 8 by 8 pixels.


    ### Preparing Data


    All images are color images. We do not need the color component to identify the
    digit. The grayscale images would be fine for our needs. So, we remove the color
    component by reshaping the images:


    ```

    n_samples = len(digits.images)

    data = digits.images.reshape((n_samples, -1))

    ```


    If you check the shape of data, you would notice that there are 1797 images, each
    consisting of totally 64 pixel values.


    We split the data into training and testing using the following code:


    ```

    from sklearn.model_selection

    import train_test_split

    X_train, X_test, y_train, y_test =

    train_test_split(

    data, digits.target, test_size =

    0.05, shuffle=False)

    ```


    At this point, we are now ready to define our input function for the estimator.'
