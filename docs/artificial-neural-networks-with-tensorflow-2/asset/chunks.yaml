    `strides`。要理解步长，可以想象一个滤波器从左到右、从上到下以每次 1 个像素的方式在图像上移动。这种移动称为步长。步长为 `(2, 2)` 时，滤波器每侧移动
    2 个像素，将图像放大 2x2 倍。


