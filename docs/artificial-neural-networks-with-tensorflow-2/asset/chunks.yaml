    ## Custom Estimators for Pre-trained Models


    In Chapter [4](#495303_1_En_4_Chapter.xhtml), you saw the use of pre-trained models
    from TF Hub. You have seen how to reuse these models in your own model definitions.
    It is also possible to convert these models into an estimator while extending
    their architecture. The following code shows you how to extend the VGG16 model
    and create a custom estimator on the extended model. VGG16 is a state-of-the-art
    deep learning which is trained to classify an image into 1000 categories. Suppose
    you just want to classify your datasets into just two categories – cats and dogs.
    So, we need just a binary classification. For this, we will need to change the
    output from categorical to binary. This example shows you how to replace the existing
    output layer of VGG16 with a single neuron Dense layer.


    ### Creating Project


    Create a new Colab project and rename it to `tfhub-custom-estimator`. Import TensorFlow
    as usual.


    ```

    import tensorflow as tf

    ```


    ### Importing VGG16


    Import the VGG16 trained model into your project with the following statement:


    ```

    keras_Vgg16 = tf.keras.applications.VGG16(

    input_shape=(160, 160, 3), include_top=False)

    ```


    The input shape to the model is set as per the original model specification. The
    `include_top` parameter specifies that the top layer of the model be eliminated.
    Obviously, we do not want to regenerate the weights for this already trained model.
    So, we set the `trainable` parameter to `false`:


    ```

    keras_Vgg16.trainable = False

    ```


    ### Building Your Model


    We will now build our model on top of the loaded VGG16 model:


    ```

    estimator_model = tf.keras.Sequential([

    keras_Vgg16,

    tf.keras.layers.GlobalAveragePooling2D(),

    tf.keras.layers.Dense(256),

    tf.keras.layers.Dense(1)

    ])

    ```


    We build a sequential model by taking the VGG16 as the base layer. On top of this,
    we add a pooling layer, followed by two Dense layers. The last layer is a binary
    output layer.


    You may print the summaries of the two models to see the changes you have made.


    The original model summary is printed with the following statement:


    ```

    keras_Vgg16.summary()

    ```


    The output is shown in Figure [6-24](#495303_1_En_6_Chapter.xhtml#Fig24).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig24_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig24_HTML.jpg)


    Figure 6-24


    Model summary for VGG16


    As you can see in Figure [6-24](#495303_1_En_6_Chapter.xhtml#Fig24), the VGG16
    models have several hidden layers, and the total number of trainable parameters
    equals more than 14 million. You can imagine the time and resources it would have
    taken to train this model. Obviously, in your application, when you use this model,
    you will never think of retraining this model.


    You can now print the summary of your newly built model.


    ```

    estimator_model.summary()

    ```


    The output is shown in Figure [6-25](#495303_1_En_6_Chapter.xhtml#Fig25).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig25_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig25_HTML.jpg)


    Figure 6-25


    Model summary for the extended model


    In your model, you have only about 100,000 trainable parameters.


    ### Compiling Model


    The model is compiled as usual, with the desired optimizer, loss function, and
    metrics:


    ```

    # Compile the model

    estimator_model.compile(

    optimizer = ''adam'',

    loss=tf.keras.losses.BinaryCrossentropy

    (from_logits = True),

    metrics = [''accuracy''])

    ```


    ### Creating Estimator


    You create an estimator using the `model_to_estimator` method:


    ```

    est_vgg16 = tf.keras.estimator.model_to_estimator

    (keras_model = estimator_model)

    ```


    Before you train the estimator, you need to process your images.'
