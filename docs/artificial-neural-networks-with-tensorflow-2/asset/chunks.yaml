    ### Building Feature Columns


    In the previous application, you created a Features column as a simple list of
    feature names. All the columns in that list were numeric. The current dataset
    has both numeric and categorical features. First, we build the list of numeric
    columns:


    ```

    # selecting numerical feature columns

    numeric_columns = feature.select_dtypes

