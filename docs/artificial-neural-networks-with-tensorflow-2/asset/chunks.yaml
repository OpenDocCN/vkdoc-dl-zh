    \n你现在可以检查这个新集合的大小：\n\n```\nlen1 = len(set(raw_txt1))\nprint(len1)\n```\n\n它会在你的终端上打印\
    \ `27`。\n\n由于模型处理的是数字而不是字母，你需要将字母映射到不同的数字。此外，当模型输出预测时，它会发送一组数字，这些数字必须转换回字母才能理解。因此，我们为这些映射创建两个数组。这通过以下代码片段完成：\n\
    \n```\nchars = sorted(list(set(raw_txt1)))\narr = np.arange(0, len1)\nchar_to_ix\
