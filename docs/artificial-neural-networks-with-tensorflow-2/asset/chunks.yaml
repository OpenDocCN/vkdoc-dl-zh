- fmt: '# Estimator Input Function


    As you have seen earlier, the input function requires data in a particular format.
    We need to specify a list of columns followed by the actual data as an input to
    the estimator. The image data consists of 64 pixels. Each pixel will be represented
    as a numeric column during the model training. So, to create a tensor consisting
    of this pixel data, first we create names for our pixel columns:


    ```

    # create column names for our model input function

    columns = [''p_''+ str(i) for i in range(1,65)]

    ```


    The column names would be simply `p_1`, `p_2`, and so on. We will now construct
    our Features columns by appending a `numeric_column` type from the `tf.feature_column`
    class into an array called `feature_columns`.


    ```

    feature_columns = []

    for col in columns:

    feature_columns.append

    (tf.feature_column.numeric_column(key = col))

    ```


    We define the Input function as follows:


    ```

    def input_fn(features, labels, training =

    True, batch_size = 32):

    ```


    The first parameter defines the features data, the second defines the target values,
    and the third parameter specifies whether the data is to be used for training
    or evaluation. The data is processed in batches – the batch size is decided by
    the last parameter.


    We now convert this data into a tensor dataset for more efficient processing by
    the estimator.


    ```

    #converts inputs to a dataset

    dataset = tf.data.Dataset.from_tensor_slices

    ((dict(features),labels))

    ```


    The data is converted into tensors by calling the `from_tensor_slices` method.
    The method takes an input consisting of the dictionary of features and the corresponding
    labels.


    If the input data is to be used for training, we shuffle the dataset.


    ```

    #shuffle and repeat in a training mode

    if training:

    dataset=dataset.shuffle(1000).repeat()

    ```


    The `shuffle` method shuffles the dataset. We specify the buffer size of 1000
    for shuffling. To handle datasets that are too large to fit in memory, the shuffling
    is done in batches of data. If the buffer size is greater than the number of data
    points in the dataset, you get a uniform shuffle. If it is 1, you get no shuffling
    at all.


    Finally, we return the batches of data:


    ```

    #giving inputs in batches for training

    return dataset.batch(batch_size)

    ```


    Now comes the time to create an estimator instance.


    # Creating Estimator Instance


    We use the premade `DNNClassifier` estimator for our purpose. The instance is
    created using the following statement:


    ```

    classifier = tf.estimator.DNNClassifier

    (hidden_units = [256, 128, 64],

    feature_columns = feature_columns,

    optimizer = ''Adagrad'',

    n_classes = 10,

    model_dir = ''classifier'')

    ```


    The constructor takes five parameters. The first parameter defines the network
    architecture. Here, we have defined three hidden layers in our architecture; the
    first layer contains 256 neurons, the second layer contains 128, and the third
    layer contains 64. The second parameter specifies the list of features that the
    data will have. Note that we have earlier created the `feature_columns` vector,
    so this is set as a default parameter. The third parameter specifies the optimizer
    to be used, set to `Adagrad` by default here. `Adagrad` is an algorithm for gradient-based
    optimization that does just this: It adapts the learning rate to the parameters,
    performing smaller updates. The `n_classes` parameter defines the number of output
    classes. In our case, it is 10, which is the number of digits 0 through 9. The
    last parameter `model_dir` specifies the directory name where the logs will be
    maintained.


    Next comes the important part of model training.


    # Model Training


    The estimator model that we created will be trained with our usual `train` method.
    Before we start the training, we need to create the input dataset for training.
    For this, we create a pandas dataframe consisting of the training data and the
    list of features using the following statement:


    ```

    # create dataframes for training

    import pandas as pd

    dftrain = pd.DataFrame(X_train, columns = columns)

    ```


    We start the training by calling the `train` method on the classifier object that
    we created earlier:


    ```

    classifier.train(input_fn = lambda:input_fn

    (dftrain,

    y_train,

    training = True),

    steps = 2000)

    ```


    The method takes our `input_fn` as the parameter. The `input_fn` itself takes
    the features and labels data as the first two parameters. The `training` parameter
    is set to `True` so that the data will be shuffled. The number of steps is defined
    to be 2000. Let me explain what this means. In machine learning, an epoch means
    one pass over the entire training set. A step corresponds to one forward pass
    and back again. If you do not create batches in your dataset, a step would correspond
    to exactly one epoch. However, if you have split the dataset into batches, an
    epoch will contain many steps – note that a step is an iteration over a single
    batch of data. You can compute the total number of epochs executed during the
    full training cycle with the formula:


    `Number_of_epochs = (batch_size * number_of_steps) / (number_of_training_samples)`


    In our current example, the batch size is 32, the number of steps is 2000, and
    the number of training samples is 1707. Thus, it will take `(32 * 2000) / 1707`,
    that is, 38 epochs, to complete the training.


    # Model Evaluation


    To evaluate the model’s performance, you will create a dataframe as before, but
    this time with the testing data as the input:


    ```

    dftest = pd.DataFrame(X_test, columns = columns)

    ```


    The evaluation is performed by calling the `evaluate` method on the classifier.


    ```

    eval_result = classifier.evaluate(

    input_fn = lambda:input_fn(dftest, y_test,

    training = False)

    )

    ```


    Note that the `training` parameter is set to `false`. You can print the evaluation
    result by simply printing the value of `eval_result`. The output is shown in the
    screenshot given in Figure 6-7.


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig7_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Model evaluation results


    After the evaluation is done, you can check out the various parameters in TensorBoard
    by loading the logs in the folder that you had specified as a value to the `model_dir`
    parameter of the `DNNClassifier` constructor.


    ```

    %load_ext tensorboard

    %tensorboard --logdir ./classifier

    ```


    A sample loss plot from the logs is shown in Figure 6-8.


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig8_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Sample evaluation metric


    Next, you will learn how to predict an unseen data using our trained estimator.'
