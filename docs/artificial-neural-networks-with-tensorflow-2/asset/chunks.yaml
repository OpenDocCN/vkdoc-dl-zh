- fmt: '# Dog Breed Classifier


    Consider you have a dataset of dog pictures with its breed as the label. You may
    not be in a position to collect enough pictures in each class. You want to develop
    a model to classify the dogs as per their breed. You can think of using the ImageNet
    classifier discussed in the previous program to extract the features of a dog
    image. You will then add a layer on top of this to differentiate dogs based on
    these extracted features. In short, you will transfer the learning of ImageNet
    to classify the dog types and save the trouble of training your model for feature
    extractions.


    Image classification models have millions of parameters. Training them from scratch
    is usually a challenging task. It requires lots of training data and is computationally
    expensive. Transfer learning shortens this task by taking a piece of a model that
    has already been trained. You simply need to add your classification layers on
    top of it.


    This project will demonstrate how to build a Keras model for classifying the breed
    of dogs using a pre-trained TF2 saved model from TensorFlow Hub MobileNet V2 which
    takes an input size of `(224,224,3)` for image feature extraction followed by
    the output `Dense` layer of our model for classification using softmax.


    Let us start building the project.


    ## Project Description


    The dog breed project will use transfer learning to define a new model for classifying
    different breeds of dogs. This is a multiclass classifier that classifies the
    given dog image into several predefined classes. Differentiating between a multiclass
    and a binary classification, one can say, a dog vs. cats or a human being vs.
    a horse is the binary classification. Tesla uses a multiclass image classification
    in their self-driving cars.


    For this project, we will use a dataset from the Kaggle dog breed identification
    competition (`https://www.kaggle.com/c/dog-breed-identification/overview`). It
    consists of a collection of 10,000+ labeled images of 120 different dog breeds.
    We will need to preprocess the data by converting the image data into Tensors.
    Our machine learning model will find patterns in the input Tensors. Kaggle, being
    a competition, has provided the training and testing data separately. Obviously,
    the test data does not have labels.


    ## Creating Project


    Create a new Colab project and rename it as `DogBreedClassifier`. Import TensorFlow
    and TensorFlow Hub using the following two statements:


    ```

    import tensorflow as tf

    import tensorflow_hub as hub

    ```


    Next, you will load data into the project.


    ## Loading Data


    I have kept the entire data (source: `www.kaggle.com/c/dog-breed-identification/data`)
    on the project site so as to enable you to run the project in one go without worrying
    about downloading the data separately. To download the data into your project,
    run the following code fragment:


    ```

    ! wget --no-check-certificate -r ''https://drive.google.com/uc?export=download&id=11t-eBwdXU9EWriDhyhFBuMqHYiQ4gdae''
    -O dogbreed

    ```


    Note that in the preceding download, the download site is assumed to be trusted.
    If you have any doubts, you may download the file with your own tools and include
    the appropriate path in the project for inputting to the model.


    The downloaded zip file contains the labels and the images for training and testing.
    The structure of the zip file is shown in Figure 4-8.


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig8_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig8_HTML.jpg)


    Figure 4-8: Folder structure for downloaded data


    Unzip the downloaded file using the command:


    ```

    !unzip dogbreed

    ```


    The zip file also contains the labels for the training images. You can check the
    labels by loading the `labels.csv` file and printing the first five records:


    ```

    # Checkout the labels

    import pandas as pd

    labels_csv = pd.read_csv("/content/labels.csv")

    labels_csv.head()

    ```


    This will show the output given in Figure 4-9.


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig9_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig9_HTML.jpg)


    Figure 4-9: A few labels


    To describe the table''s contents, call the `describe` method on the dataframe.
    The command and its output are shown in Figure 4-10.


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig10_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig10_HTML.jpg)


    Figure 4-10: Labels’ table structure


    As you can see from the output, there are 10,222 images and 120 categories. To
    print the distribution of data, use the following statement:


    ```

    # How many images are there of each breed?

    labels_csv["breed"].value_counts().plot.bar(figsize=(20, 10));

    ```


    The execution will produce the chart shown in Figure 4-11.


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig11_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig11_HTML.jpg)


    Figure 4-11: Image data distribution


    As you can see in Figure 4-11, each category has more than 60 images. Google recommends
    a minimum of ten images per class to get started with image classification. The
    more the number of images, the better are the chances of figuring out the patterns
    between them.


    You may now try printing a sample image from the dataset using the following command:


    ```

    from IPython.display import display, Image

    Image("/content/train/000bec180eb18c7604dcecc8fe0dba07.jpg")

    ```


    The output is shown in Figure 4-12.


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig12_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig12_HTML.jpg)


    Figure 4-12: Sample image from the downloaded dataset


    Now, you have all the data for training and testing your model. This data needs
    to be converted to a specific format for inputting to our model.'
