    ### Model 5


    The `BatchNormalization` works the same way as a regular normalization, except
    that it works on batches of data. The activation of the previous layer occurs
    at each batch to maintain the mean activation close to 0 and the standard deviation
    close to 1. Thus, it reduces the number of training steps thereby speeding up
    the training process. In some situations, it may also result in eliminating the
    need for dropout used in the previous model.


    The Regularization is a technique used to reduce the error by fitting a function
    appropriately on the training set so as to avoid overfitting.


    We will apply these techniques in our new model definition.


    The model definition is shown in the code below:


    ```python

    weight_decay = 1e-4

    model_5 = Sequential([

    Conv2D(32, (3, 3), activation = ''relu'', padding = ''same'',

    kernel_regularizer = tf.keras.regularizers.l2(weight_decay),

    input_shape = (32, 32, 3)),

    BatchNormalization(),

    Conv2D(32, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    MaxPooling2D((2, 2)),

    Dropout(0.2),

    Conv2D(64, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    Conv2D(64, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    MaxPooling2D((2, 2)),

    Dropout(0.3),

    Conv2D(128, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    Conv2D(128, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    MaxPooling2D((2, 2)),

    Dropout(0.3),

    Flatten(),

    Dense(128, activation = ''relu''),

    Dense(10, activation = ''softmax'')

    ])

    opt = tf.keras.optimizers.SGD(lr = 0.001, momentum = 0.9)

    model_5.compile(optimizer = opt, loss = ''categorical_crossentropy'',

    metrics = [''accuracy''])

    ```


