- fmt: '### Training with Smaller Datasets


    As it may be difficult to collect a huge number of data points in every situation,
    we will check whether the transfer learning will help us develop usable models
    with smaller datasets.


    You will first write a function called `train_model` which can be called for a
    set of models. The function definition is given here:


    ```

    model_performances = []

    # function for training the given model on specified

    # number of images

    def train_model (model, NUM_IMAGES):

    model.fit(x=train_data,

    epochs=NUM_EPOCHS,

    validation_data=val_data,

    callbacks=[model_tensorboard,

    model_early_stopping])

    # append the results

    model_performances.append(model.evaluate(val_data))

    ```


    The `train_model` function takes two parameters; the `model` parameter specifies
    the model to be trained, and the `NUM_IMAGES` specifies the number of images on
    which the model will be trained. The function simply calls the model’s `fit` method
    for training and then evaluates the performance by calling its `evaluate` method.
    The evaluation results are added to an array for later comparisons.


    The function itself is called using the following code snippet:


    ```

    # Training

    NUM_EPOCHS = 100

    # Create models and test for 1000,2000, 3000, 4000 images

    for NUM_IMAGES in range(1000, 5000, 1000):

    model = create_model()

    x_train,x_val,y_train,y_val=train_test_split(X[:NUM_IMAGES],y[:NUM_IMAGES],test_size=0.2,random_state=10)

    train_data=create_data_batches(x_train,y_train,batch_size=10)

    val_data=create_data_batches(x_val,y_val,batch_size=10,data_type=2)

    train_model(model,NUM_IMAGES)

    model_performances.append(model.evaluate(val_data))

    ```


    Before calling the `train_model`, we create a model by calling our `create_model`
    function. We split the training dataset into training and validation for the specified
    number of images. We preprocess the data as before and then train the created
    model on the processed data. Remember, after the training, the evaluation results
    are stored in an array. You will now create a pandas dataframe for loss and accuracy
    metrics:


    ```

    import pandas as pd

    comp = pd.DataFrame(model_performances,index = [1000,2000,3000,4000], columns
    = [''val_loss'', ''val_acc''])

    ```


    You may plot the results for visualization using the following code:


    ```

    # plot the table

    import matplotlib.pyplot as plt

    plt.style.use(''ggplot'')

    comp.plot.bar()

    plt.xlabel(''number of images'')

    plt.ylabel(''performance values'')

    plt.show()

    ```


    The output plot is shown in Figure [4-27](#495303_1_En_4_Chapter.xhtml#Fig27).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig27_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig27_HTML.jpg)


    Figure 4-27


    Error metrics on different sizes of dataset


    From these plots, you can see that the accuracy score saturates after about 2000
    images. Thus, instead of training the model on a full dataset of 10,000 images,
    you could train it on a much smaller dataset and yet achieve acceptable results.
    This will be one of the big advantages of transfer learning, especially when you
    do not have enough data points available for training.


    Now, as you have done creating the new model for dog breed classification, you
    will like to put this into a real use. For this, I will show you how to save the
    trained model and later on reuse it for inferring unseen images.


    ### Saving/Reloading Model


    To save the trained model in h5 format, call its `save` method:


    ```

    model.save(''model.h5'') #saving the model

    ```


    To load the saved model, use the `load_model` method.


    ```

    from tensorflow.keras.models import load_model

    model=load_model(''model.h5'',custom_objects={"KerasLayer":hub.KerasLayer})

    ```


    You can check the model’s summary to ensure that the model is correctly loaded:


    ```

    model.summary()

    ```


    You will see the output in Figure [4-28](#495303_1_En_4_Chapter.xhtml#Fig28).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig28_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig28_HTML.jpg)


    Figure 4-28


    Summary for the loaded model


    Now, you are free to use the loaded model for further inferring just the way we
    did for an unknown image. Enjoy!


    ## Submitting Your Work


    Are you not excited with what you learned so far? TensorFlow allows you to submit
    your own creations for inclusion in the tfhub repository. The `tensorflow_hub`
    library is used for loading models from this repository. The HTTP-based protocol
    supports the retrieval of the model’s documentation and provides the endpoint
    to fetch the model itself. To load the model from the repository, you use `load_model`
    method as you had seen in the examples in this chapter. You may create your own
    repository of models that are loadable with the `tensorflow_hub` library. For
    this, there is a certain protocol that needs to be followed by your HTTP distribution
    service.


    After your model is fully trained to your satisfaction, you will save the graph
    and the parameter values using the following code:


    ```

    saver = tf.train.saver()

    saver.save (sess, ‘my_model’)

    ```


    The saved model can then be put on production servers for public serving. Once
    beta-tested, you may add it to the repository for community benefit through the
    tfhub library. Further details of this specification are beyond the scope of this
    book. The interested reader is referred to more information about this on the
    TensorFlow site under “Hosting Your Own Models.”


    ## Further Work


    I have shown you one example of image classification that uses a pre-trained model
    from TensorFlow Hub. As said earlier, the Hub provides models in other domains,
    too. For example, you can easily develop your own object detection classifier,
    a text classifier, a universal sentence encoder, and so on. Suggest you to visit
    the TensorFlow Hub site to explore these pre-trained models.


    There are several commercially deployed case studies listed on the TensorFlow
    site. To give you an example, Airbnb classified their images to improve the guest
    experience by retraining the ResNet50 model. Somebody used TensorFlow.js to make
    Amazon Echo respond to sign language for the benefit of disabled persons. Coca-Cola
    used SqueezeNet CNN for OCR in their mobile proof-of-purchase application. Google
    pixel phones use the MobileNet module of TF Hub for camera image recognition and
    to enhance its camera capabilities. There are endless possibilities for using
    transfer learning in your own applications. So, keep experimenting with the pre-trained
    models provided in TensorFlow Hub and apply your minds in using those in your
    own applications.


    ## Summary


    Transfer learning is an important technique of knowledge transfer in machine learning.
    In software engineering, people use binary libraries to reuse the code. In machine
    learning, the trained models contain the algorithms, the data, the processing
    power, and the expert’s domain knowledge. All these need to be transferred to
    the new model. That’s what the transfer learning provides. In TensorFlow Hub,
    there are several pre-trained models available spanning various domains and developers.
    In this chapter, you first learned to reuse one of such models for classifying
    your own images. In the latter part, you developed a multiclass image classifier
    that runs on top of a model pre-trained by Google, taking advantage of their expertise,
    processing time, and power. There are several other models available in the Hub
    for you to explore.


    In the next chapter, you will learn the intricacies of machine learning with an
    example on regression model development.'
  raw: '### Training with Smaller Datasets


    As it may be difficult to collect a huge number of data points in every situation,
    we will check whether the transfer learning will help us develop usable models
