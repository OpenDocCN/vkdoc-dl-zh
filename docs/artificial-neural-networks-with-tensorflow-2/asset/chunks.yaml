- fmt: '### Image Dataset


    The image dataset that we are going to use in this project is created by Canadian
    Institute For Advanced Research (CIFAR). The dataset is available for public use
    to encourage people to develop techniques of image recognition. Researchers at
    the CIFAR institute have created two datasets - CIFAR-10 and CIFAR-100. Both datasets
    consist of 60000 color images of size 32x32 pixels. The CIFAR-10 images are divided
    in 10 classes containing categories such as cats, birds, ships, airplane, etc.
    There are 6000 images in each category and they are appropriately randomized for
    their use as a dataset in machine learning. Note that in Chapter [2](#495303_1_En_2_Chapter.xhtml),
    while studying binary classification, we had to randomize the data on our own.
    The CIFAR-10 dataset is also split appropriately in training and test datasets
    - the training set consists of 50000 images and the rest 10000 images belong to
    the test dataset. A set of sample images along with their categories are shown
    in Figure [3-10](#495303_1_En_3_Chapter.xhtml#Fig10) for your quick understanding
    of the provided image data.


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig10_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig10_HTML.jpg)


    Figure 3-10: Sample images of CIFAR-10


    Note that all the images are of the fixed size - 32x32 pixels. This is what is
    required for the machine to learn. You cannot feed the images of the varied sizes
    to your machine learning algorithm. The input to your neural network is always
    of a predetermined fixed size. An image with a variable resolution will contain
    a variable number of pixels and thus cannot be input to a network of a preset
    topology. Fortunately, creators of CIFAR datasets have taken the trouble of scaling
    down all the real images to a fixed miniature size. Note that if you try to train
    your model on a real world image consisting of say 512x512 pixels or more, the
    number of input points (pixels) that will be required by your ANN would be very
    large. This directly implies a large number of "weights" to be trained demanding
    in huge processing power and time. When the image is scaled down to 32x32, there
    is obviously loss of data; however, you will find that training on these stripped-down
    images yet produces great results and identifies unseen objects with extremely
    acceptable results in the real world.


    The CIFAR-100 dataset is similar to CIFAR-10, except that it represents 100 classes
    instead of 10. Each category is further divided into fine and coarse. For example,
    a superclass called people contains subclasses baby, boy, girl, man and woman.


    We will be using the CIFAR-10 dataset for this project. So, let us start by loading
    this dataset into our program.


    ### Loading Dataset


    The `tf.keras` integration provides several built-in databases for your ease in
    model development. These also include CIFAR-10. The databases are available in
    `tf.keras.dataset` module. The list of available datasets can be printed on the
    console using the following two lines of code:


    ```python

    import tensorflow_datasets as tfds

    print ("Number of datasets: ", len(tfds.list_builders()))

    tfds.list_builders()

    ```


    A partial list from the output is shown here for your quick reference.


    ```

    Number of datasets: 141

    [''abstract_reasoning'',

    ''aeslc'',

    ''aflw2k3d'',

    ''amazon_us_reviews'',

    ''arc'',

    ''bair_robot_pushing_small'',

    ''big_patent'',

    ''bigearthnet'',

    ''billsum'',

    ''binarized_mnist'',

    ''binary_alpha_digits'',

    ''c4'',

    ''caltech101'',

    ''caltech_birds2010'',

    ...

    ```


    As you must have noticed, there are currently 141 datasets available for your
    use. You will be using `cifar10` dataset for developing the current application.


    ### Creating Training/Testing Datasets


    In the binary classifier that you developed in the last chapter you used the `train_test_split`
    method of `sklearn` to create training and testing datasets. The `keras.datasets`
    now provides a `load_data` method that creates training/testing datasets in a
    single call. Use the following statement to create these datasets from the built-in
    CIFAR dataset.


    ```python

    (x_train, y_train), (x_test, y_test) = tf.keras.datasets.cifar10.load_data()

    ```


    After the data is loaded, you will have both features and labels arrays available
    in the four variables. You may examine the number of images available for training
    and testing using following code segment:


    ```python

    print("x_train dimensions : ",x_train.shape)

    print("x_test dimensions  : ",x_test.shape)

    print("y_train dimensions : ",y_train.shape)

    print("y_test dimensions  : ",y_test.shape)

    ```


    When you execute the above code, you will see the following output:


    ```

    x_train dimensions :  (50000, 32, 32, 3)

    x_test dimensions  :  (10000, 32, 32, 3)

    y_train dimensions :  (50000, 1)

    y_test dimensions  :  (10000, 1)

    ```


    From the size of `x_train`, you know that there are 50000 images in the training
    set, each image is of 32x32 pixels and each pixel possesses three values RGB,
    pertaining to its color. The shape of `x_test` indicates to you that the testing
    dataset contains 10000 images. For every image in `x_train` there is a specific
    integer value in the range 0 to 9 in `y_train`. The `y_train` becomes our labels
    for machine learning. We will use `x_train` for training the model and `x_test`
    for evaluating the model''s performance.


    If you are curious in knowing what is loaded in memory, try printing one of the
    images on the console using the following code:


    ```python

    import matplotlib.pyplot as plt

    plt.imshow(x_train[40])

    ```


    The execution of the above code shows the image at index value of 40. The image
    is shown in Figure [3-11](#495303_1_En_3_Chapter.xhtml#Fig11).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig11_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig11_HTML.jpg)


    Figure 3-11: A sample image from the dataset


    Very clearly, this image of size 32x32 barely allows you to guess what it contains?
    However, as I said, for our machine learning algorithm, the images of these sizes
    are good enough for training. Now, we will prepare our training dataset for model
    training.


    ### Preparing Data for Model Training


    As said earlier, we will use `x_train` for training our model. You need to reserve
    a part of this data for validation during the training phase. We will reserve
    5% of the training data for validation.


    #### Creating Validation Dataset


    To split the training data into the actual training dataset and validation dataset,
    we use `sklearn`''s split method as shown in the code segment here:


    ```python

    from sklearn.model_selection import train_test_split

    x_train, x_val, y_train, y_val = train_test_split(x_train, y_train, test_size
    = 0.05, random_state = 0)

    ```


    Here, we reserve 5% of the training data for validation during model training.
    The `x_val` and `y_val` represent our validation datasets respectively for features
    and labels. Next, we will augment our data.'
