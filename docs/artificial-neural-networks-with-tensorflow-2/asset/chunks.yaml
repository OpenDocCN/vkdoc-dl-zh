    # 总结


    生成对抗网络（`GAN`）提供了一种模拟任意给定图像的新颖思路。`GAN` 由两个网络组成——生成器和判别器。这两个模型通过对抗过程同时训练。在本章中，你学习了如何构建一个用于生成手写数字、字母甚至动漫图像的
    `GAN` 网络。训练一个 `GAN` 需要巨大的处理资源，但它能产生非常令人满意的结果。如今，`GAN` 已成功应用于众多领域。例如，`GAN` 被用于创建大型图像数据集，比如你在本章第一个示例中使用的
    Kaggle 网站提供的手写数字数据集。它在生成名人面孔方面也很成功。它可用于生成卡通角色，如本章中的动漫示例。它还被应用于图像到图像和文本到图像的转换领域。它可以从照片中创建表情符号，也可以用于让照片中的人脸变老。其可能性是无限的；你应该进一步探索，亲眼看看人们是如何利用
    `GAN` 创造出许多有趣应用的。凭借你在本章学到的技术，你将能够实现自己的想法，为这个无限的 `GAN` 应用宝库添砖加瓦。


    # 14. 图像转换


    你是否曾想过为你祖母的老式黑白照片上色？你可能会找一位 Photoshop 艺术家来做这件事，支付高昂的费用，并等待几天/几周才能完成。如果我告诉你，你可以用深度神经网络做到这一点，难道你不会兴奋地想要学习如何操作吗？好吧，本章将教你如何几乎瞬间将黑白图像转换为彩色图像的技术。这项技术很简单，使用了一种称为自编码器的网络架构。那么，让我们先来看看自编码器。


    ## 自编码器


    自编码器由两部分组成——编码器和解码器。其示意图如图 14-1 所示。


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig1_HTML.jpg](img/495303_1_En_14_Fig1_HTML.jpg)


    **图 14-1** 自编码器架构


    在左侧，我们有一张输入到网络的黑白图像。在右侧，即网络输出处，我们得到一张与输入内容相同的彩色图像。中间的过程可以这样描述：编码器通过一系列卷积层处理图像，并缩小图像尺寸，以学习输入图像的降维表示。然后，解码器尝试通过另一系列卷积层重建图像，在此过程中放大图像并添加颜色。


    现在，要理解如何为图像上色，你必须首先了解色彩空间。


    ## 色彩空间


    彩色图像由给定色彩空间中的颜色和亮度强度组成。通过使用红、绿、蓝等原色可以创建一系列颜色。这一系列颜色被称为色彩空间，例如 `RGB`。从数学上讲，色彩空间是一种抽象的数学模型，它简单地将颜色范围描述为数字元组。每种颜色由一个点表示。


    我将介绍三种最流行的色彩空间：


    * `RGB`

    * `YCbCr`

    * `Lab`


    `RGB` 是最常用的色彩空间。它包含三个通道——红色（`R`）、绿色（`G`）和蓝色（`B`）。每个通道由 8 位表示，最大值为 256。三者组合可以表示超过
    1600 万种颜色。


    `JPEG` 和 `MPEG` 格式使用 `YCbCr` 色彩空间。与 `RGB` 相比，它更适用于数字传输和存储。`Y` 通道表示灰度图像的亮度。`Cb`
    和 `Cr` 分别表示蓝色和红色差色度分量。`Y` 通道的取值范围是 16 到 235。`Cb` 和 `Cr` 的取值范围是 16 到 240。请注意，所有这些通道的组合值可能不代表有效的颜色。在我们的上色应用中，我们不使用这种色彩空间。


    `Lab` 色彩空间由国际照明委员会（`CIE`）设计。该色彩空间的视觉表示如图 14-2 所示。


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig2_HTML.jpg](img/495303_1_En_14_Fig2_HTML.jpg)


    **图 14-2** Lab 色彩空间


    `Lab` 色彩空间比计算机显示器和打印机的色域更大。因此，以 `Lab` 表示的位图图像需要每个像素更多的数据才能获得与 `RGB` 或 `CMYK` 相同的精度。因此，`Lab`
    色彩空间通常用作中间色彩空间，而非最终色彩空间。


    `L` 通道表示亮度，取值范围为 0 到 100。“`a`”通道编码从绿色（`-`）到红色（`+`），“`b`”通道编码从蓝色（`-`）到黄色（`+`）。对于
    8 位实现，两者的取值范围均为 `-127` 到 `+127`。`Lab` 色彩空间近似于人眼视觉。这些分量值的数值变化量大致对应于相同的视觉感知变化量。


    我们在项目中使用 `Lab` 色彩空间。通过分离代表亮度的灰度分量，网络只需学习用于上色的剩余两个通道。这有助于减小网络规模并实现更快的收敛。


    我现在将讨论自编码器的不同网络拓扑结构。


    ## 网络配置


    自编码器网络可以通过三种不同方式进行配置：


    * 基础模型

    * 合并模型

    * 使用预训练网络的合并模型


    我现在将讨论这三种模型。


    ### 基础模型


    基础模型的配置如图 14-1 所示，其中编码器有一系列带步长的卷积层，用于缩小图像尺寸并提取特征。解码器也有用于放大和上色的卷积层。在这种自编码器中，编码器不够深，无法提取图像的全局特征。全局特征有助于我们确定如何为图像的某些区域上色。如果我们使编码器网络变深，表示的维度会变得太小，解码器无法忠实地重建原始图像。因此，编码器中需要两条路径——一条用于获取全局特征，另一条用于获取图像的丰富表示。这正是接下来两种模型所做的。你将在本章的第一个项目中构建一个基础网络。


    ### 合并模型


    该模型由 Lizuka 等人在其论文“Let there be Color!”（`http://iizuka.cs.tsukuba.ac.jp/projects/colorization/data/colorization_sig2016.pdf`）中提出。模型架构如图
    14-3 所示。


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig3_HTML.jpg](img/495303_1_En_14_Fig3_HTML.jpg)


    **图 14-3** 合并模型架构

