    inputting as a parameter to our input function that is defined next.


    ```

    # combining both features as our final features list

    features = categorical_features +

    numeric_feature

    ```


    ### Defining Input Function


    The input function is defined as follows:


    ```

    # An input function for training and evaluation

    def input_fn(features,labels,training = True,batch_size = 32):

    #converts inputs to a dataset

    dataset=tf.data.Dataset.from_tensor_slices

    ((dict(features), labels))

    #shuffle and repeat in a training mode

    if training:

    dataset=dataset.shuffle(10000).repeat()

    # return batches of data

    return dataset.batch(batch_size)

    ```


    As seen in the previous project, the function takes features and labels as the
    first two parameters. The `training` parameter determines whether the data is
    to be used for training; if so, the data is shuffled. The `from_tensor_slices`
    function call creates a tensor for the data pipeline to our model. The function
    returns the data in batches.


    ### Creating Estimator Instance


    We now create the instance of a premade estimator using the following statement:


    ```

    linear_regressor = tf.estimator.LinearRegressor(

    feature_columns = features,

    model_dir = "linear_regressor")

    ```


    Note we use the `LinearRegressor` class as a premade estimator for regression.
    The first parameter is the Features columns, which specify the combined numerical
    and categorical columns list. The second parameter is the name of the directory
    where the logs would be maintained.


    ### Model Training


    We train the model by calling the `train` method:


    ```

    linear_regressor.train(input_fn = lambda:input_fn(xtrain,

    ytrain,

    training = True),

    steps = 2000)

    ```


    The input function takes the features data in the `xtrain` dataset and the target
    values in the `ytrain` dataset. The `training` parameter is set to `true` that
    enables data shuffling. The number of steps would decide the number of epochs
    in the training phase.'
