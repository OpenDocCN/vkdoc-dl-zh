    print('Text corpus: {}'.format(nb_chars))\nprint('Sequences # ', int(len(x_data)\
    \ / maxlen))\n```\n\n请注意，我们定义了一个长度为 5 的序列。因此，前五个字符将是输入，第六个字符将是目标。在下一个循环中，第 2 到第\
    \ 6 个字符将是输入序列，第 7 个字符将是目标，依此类推。因此，在 `for` 循环中，我们创建了用于训练模型的 `x_data`，`y_data` 是训练期间使用的目标值。前面代码片段的输出如下：\n\
