    of size 3x3 that runs over 32x32x3 images. The input to the network is 32x32x3
    which you would remember are the dimensions of our x_train vector. The second
    layer is once again a convolutional layer. The third is a MaxPooling2D layer followed
    by Flatten. The last two layers are Dense layers - the first consists of 128 nodes
    with ReLU activation and the second contains 10 nodes with softmax activation.
    Remember our network is supposed to output 10 classes and thus the last layer
    contains 10 nodes. The network plot can be generated using the following code:


    ```

    from tensorflow.keras.utils import plot_model

    plot_model(model_1, to_file=''model1.png'')

    ```


    The generated plot is shown in Figure [3-16](#495303_1_En_3_Chapter.xhtml#Fig16).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig16_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Model 1 network plot


    The network summary can be printed by calling the summary method on the model_1
    instance and is shown below:


    ```

    Model: "sequential"

    _______________________________________________________________

    Layer (type)                 Output Shape              Param #

    ===============================================================

    conv2d (Conv2D)              (None, 32, 32, 32)        896

    _______________________________________________________________

    conv2d_1 (Conv2D)            (None, 32, 32, 32)        9248

    _______________________________________________________________

    max_pooling2d (MaxPooling2D) (None, 16, 16, 32)        0

    _______________________________________________________________

    flatten (Flatten)            (None, 8192)              0

    _______________________________________________________________

    dense (Dense)                (None, 128)               1048704

    _______________________________________________________________

    dense_1 (Dense)              (None, 10)                1290

    ===============================================================

