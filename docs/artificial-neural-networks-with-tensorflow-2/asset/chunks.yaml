    # Summary


    TensorFlow 2.x provides a very powerful platform for developing deep machine learning
    applications. The platform facilitates you right from the data preparation and
    model building to the final deployment on production servers. It is like using
    one tool for an end-to-end development. Keras, the popular machine development
    library, is now fully integrated in TF. Taking advantage of the new features in
    TF such as eager execution, distribution of training, and inferencing across multiple
    CPUs, GPUs, TPUs, and efficient data pipelines, you will be able to develop very
    efficient ML applications in Keras. During development, the TensorBoard provides
    a useful analysis for you to optimize your model. A fully trained model is saved
    to a format that can be deployed even on mobiles and embedded devices. TF also
    provides Vision and Voice Kits for you to deploy your image/video recognition
    and voice-controlled ML models on embedded devices. There are several pre-trained
    models contributed by the community that are available for your use. The use of
    Edge TPU allows you to do inferencing on the device itself. In summary, TF 2.x
    can be considered as a single platform for machine learning – right from development
    to deployment.


