  trans: '

    ### API 栈


    在引入估算器之后，TensorFlow 的新 API 栈如图 6-1 所示。


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig1_HTML.jpg](img/495303_1_En_6_Fig1_HTML.jpg)


    图 6-1


    TensorFlow API 栈


    到目前为止，你主要使用了中级 API；当你需要对模型开发进行更精细的控制时，低级 API 的使用才成为罕见的需求。现在，学习了估算器 API 之后，你可能甚至不会在模型开发中使用中级
    API。但你已经开发好的模型会怎样呢——它们能否从这个 API 中受益？如果可以，如何让它们使用这个 API？幸运的是，TensorFlow 团队开发了一个接口，允许你将现有模型迁移到估算器接口。不仅如此，他们还自行创建了一些估算器，以便你快速上手。这些被称为预置估算器。它们不仅仅是起点。它们已经过充分开发和测试，可供你在当前项目中使用。如果这些估算器不能满足你的需求，或者你想迁移现有模型以利用估算器提供的优势，你可以使用估算器
    API 开发自定义估算器。在了解如何使用预置估算器和构建自己的估算器之前，我先更详细地讨论一下它的优势。


    ### 估算器的优势


    为了让你快速了解估算器提供的主要优势，我首先在此列出它们：


    *   提供统一的训练/评估/预测接口

    *   通过输入函数处理数据输入

    *   创建检查点

    *   创建摘要日志


    这些可能不是唯一的优势，但肯定是最重要的。我现在将逐一详细讨论。为了理解讨论内容，请牢记图 6-2 中描绘的估算器接口。


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig2_HTML.jpg](img/495303_1_En_6_Fig2_HTML.jpg)


    图 6-2


    估算器接口


    如图 6-2 所示，估算器类提供了三个用于训练、评估和预测的接口方法。因此，一旦你开发了一个估算器对象，你将能够在同一个对象上调用 `train`、`evaluate`
    和 `predict` 方法。请注意，你需要为每个方法发送不同的数据集。这是借助输入函数实现的。我将在本节后面更详细地解释这个输入函数的结构。此时只需说明，输入函数的引入简化了你对不同数据集的实验。


    训练期间创建的检查点允许你回滚到已知状态，并从该检查点继续训练。这将为你节省大量训练时间，尤其是当错误发生在某个 epoch 的末尾时。这也使调试更快。训练结束后，评估期间创建的摘要日志可以在
    TensorBoard 上可视化，让你快速了解模型训练得有多好。


    当模型训练到完全满意后，接下来就是部署任务。将训练好的模型部署到 CPU/GPU/TPU，甚至移动设备和 Web，以及分布式环境，以前需要多次更改代码。如果你使用估算器，你可以直接部署训练好的模型，或者最多在这些平台上进行最少的更改。


    说了这么多优势，让我们先看看估算器的类型。


    ### 估算器类型


    估算器分为两类：


    *   预置估算器

    *   自定义估算器


    这种分类可以在图 6-3 所示的图表中直观地看到。


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig3_HTML.jpg](img/495303_1_En_6_Fig3_HTML.jpg)


    图 6-3


    估算器分类


    预置估算器就像一个盒子里的模型，其模型功能已由 TensorFlow 团队编写好。另一方面，在自定义估算器中，你需要提供这种模型功能。在这两种情况下，你创建的估算器对象都将具有用于训练、评估和预测的通用接口。两者都可以以类似的方式导出用于服务。


    TensorFlow 库提供了一些预置估算器供你立即使用；如果这些不能满足你的目的，和/或你想迁移现有模型以获得估算器的优势，你将创建自己的估算器类。所有估算器都是
    `tf.estimator.Estimator` 基类的子类。


    `DNNClassifier`、`LinearClassifier` 和 `LinearRegressor` 是预置估算器的几个例子。`DNNClassifier`
    用于创建基于密集神经网络的分类模型，而 `LinearRegressor` 用于处理线性回归问题。你将在本章后续部分学习如何使用这两个类。


    作为构建自定义估算器的一部分，你将把现有的 Keras 模型转换为估算器。这样做将使你能够利用估算器提供的几个优势，这些优势你之前已经看到过。你将为你上一章开发的葡萄酒质量回归模型构建一个自定义估算器。最后，我还将向你展示如何基于
    `tfhub` 模块构建自定义估算器。


    要使用估算器，你需要理解两个新概念——输入函数和特征列。输入函数基于 `tf.data.dataset` 创建一个数据管道，该管道以批次方式将数据馈送到模型中进行训练和评估。你也可以为推理创建一个数据管道。我将在
    `DNNClassifier` 项目中向你展示如何做到这一点。特征列指定估算器如何解释数据。在我讨论这些输入函数和特征列概念之前，我将概述一个基于估算器的项目的开发流程。


    ### 基于估算器的项目工作流程


    基于估算器的项目开发所需的各种步骤如下：


    *   加载数据

    *   数据预处理

    *   定义特征列

    *   定义输入函数

    *   模型实例化

    *   模型训练

    *   模型评估

    *   在 TensorBoard 上判断模型性能

    *   使用模型进行预测


    作为你在之前所有章节中所学内容的一部分，你肯定对上述工作流程中的许多步骤都很熟悉。需要关注的是定义特征列和输入函数。我现在将描述这些要求。

    '
- fmt: "# Features Column\n\nFeatures column provide a bridge between raw data and\
    \ an estimator. It transforms a diverse range of raw data into formats that estimators\
    \ need. You use the `tf.feature_column` module to build a list of Feature columns.\
    \ This then becomes an input to the estimator constructor. The estimator object\
    \ uses this list while interpreting the data coming from the Input function. The\
    \ whole process can be visualized as shown in Figure [6-4](#495303_1_En_6_Chapter.xhtml#Fig4).\n\
    \n![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig4_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4 – How Features columns are used\n\nAs seen in the central block of\
    \ Figure [6-4](#495303_1_En_6_Chapter.xhtml#Fig4), the list of Feature columns\
    \ is as follows:\n\n*   Fixed acidity (numeric)\n*   Volatile acidity (numeric)\n\
    *   Citric acid (numeric)\n*   …\n\nThese are the features of our wine quality\
    \ model that you developed in the previous chapter. Each element in the list is\
    \ of type `tf.feature_column.numeric_column`. The following code snippet tells\
    \ you how to build such a list:\n\n```\n# build numeric features array\nnumeric_feature\
    \ = []\nfor col in numeric_columns:\n    numeric_feature.append(tf.feature_column.numeric_column(key=col))\n\
    ```\n\nSometimes, your dataset may contain categorical fields which you want to\
    \ use as the features in your model building. The following code snippet tells\
    \ you how to build a Features column for such categorical fields:\n\n```\ncategorical_features\
    \ = []\nfor col in categorical_columns:\n    vocabulary = data[col].unique()\n\
    \    cate = tf.feature_column.categorical_column_with_vocabulary_list(col, vocabulary)\n\
    \    categorical_features.append(tf.feature_column.indicator_column(cate))\n```\n\
    \nNote we first obtain the vocabulary by calling the `categorical_column_with_vocabulary_list`\
    \ method and then append the indicator columns to the list.\n\nThis list is passed\
    \ as a parameter to the estimator constructor, as seen in Figure [6-4](#495303_1_En_6_Chapter.xhtml#Fig4).\
    \ If your model requires both numerical and categorical features, you will need\
    \ to append both to your destination Features column.\n\nThe left block in Figure\
    \ [6-4](#495303_1_En_6_Chapter.xhtml#Fig4) shows data which is actually built\
    \ by an Input function. This data will be input to the estimator’s `train`/`evaluate`/`predict`\
    \ method calls.\n\nNext, I will describe how to write the Input function.\n\n\
    # Input Function\n\nThe purpose of the Input function is to return the following\
    \ two objects for the use of our estimator model object:\n\n*   A dictionary of\
    \ feature names (keys) and Tensors or Sparse Tensors (values) containing the corresponding\
    \ feature data\n*   A Tensor containing one or more labels\n\nThe basic skeleton\
    \ looks like this:\n\n```\ndef input_fn(dataset):\n    # create dictionary with\
    \ feature names\n    # and Tensors with corresponding data\n    # create Tensor\
    \ for label data\n    return dictionary, label\n```\n\nYou may write separate\
    \ functions based on this prototype for training/evaluation/inferencing.\n\nI\
    \ will now present you the practical implementation of the Input function taken\
    \ from the example that is later discussed in this chapter. This would further\
    \ clarify the concepts behind the Input function in your minds.\n\nThe input function\
    \ is a Python function with the following prototype:\n\n```\ndef input_fn(features,\
    \ labels, training=True, batch_size=32):\n```\n\nHere the `features` and `labels`\
    \ arguments represent tensors containing the features and the labels data. Within\
    \ the function, the data is converted into tensor by calling the function `from_tensor_slices`\
    \ of the `tf.data.Dataset` module.\n\n```\n# converts inputs to a dataset\nDataset\
    \ = tf.data.Dataset.from_tensor_slices((dict(features), labels))\n```\n\nThe input\
    \ parameter to the function is a Python dictionary of features and the corresponding\
    \ labels. Finally, the function returns this data to the caller in batches by\
    \ using the `batch` method of `tf.data.Dataset`.\n\n```\nreturn dataset.batch(batch_size)\n\
    ```\n\nThe function structure is visualized in Figure [6-5](#495303_1_En_6_Chapter.xhtml#Fig5)\
    \ for further understanding.\n\n![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig5_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5 – The Input function structure\n\nThe whole matter may look quite\
    \ complicated; a practical example will help in clarifying the entire implementation,\
    \ and that is what I am going to do next.\n\n# Premade Estimators\n\nI will be\
    \ discussing two types of premade estimators – one for classification and the\
    \ other for a regression type of problems. First, I will describe a project for\
    \ classification. We will use the premade `DNNClassifier` for this project. The\
    \ `DNNClassifier` defines a deep neural network and classifies its input into\
    \ several classes. You will be using the MNIST database for classifying the handwritten\
    \ digits into ten numeric digits. The second project that I am going to describe\
    \ uses the premade estimator called `LinearRegressor`. The project uses the Airbnb\
    \ database for the Boston region. The database consists of several houses listed\
    \ on Airbnb. For each listed house, several features are captured, and the price\
    \ at which the house is sold/saleable is listed. Using this information, you will\
    \ develop a regression model to predict the price at which a newly listed house\
    \ would probably be sold.\n\nThe use of these two different models will give you\
    \ a good insight into how to use the premade estimators on your own model development\
    \ problems. So let us start with a classification model first.\n\n# DNNClassifier\
    \ for Classification\n\nCreate a new Colab project and rename it to `DNNClassifier-estimator`.\
    \ As usual, import the TensorFlow using the following statement:\n\n```\nimport\
    \ tensorflow as tf\n```\n\nWe will use the MNIST database for this project. The\
    \ dataset is available in the `sklearn` kit. It is the database of the handwritten\
    \ digits. Our task is to use the premade classifier to recognize the digits embedded\
    \ in these images. The output consists of ten classes, pertaining to the ten digits.\n\
