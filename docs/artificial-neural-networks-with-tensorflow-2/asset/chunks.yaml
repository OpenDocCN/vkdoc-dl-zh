    ## Loading InceptionV3 Model


    We will use the InceptionV3 model for feature extraction from the image. We load
    the model using the following statement:


    ```

    image_model = InceptionV3(include_top=False,

    weights=''imagenet'')

    ```


    The parameter value specified in `weights`, which is the `imagenet`, is a dataset
    of over 15 million labeled high-resolution images with around 22,000 categories.
    The InceptionV3 model was trained on 1.2 million images with another 50,000 images
    for validation and 100,000 images for testing. So, we take advantage of this training
    and use pre-trained weights.


    Note that we eliminate the top layers during model extraction. The top layers
    are used for image classification. As we are interested in only feature extraction,
    we do not need those top layers. We will now create our own `tf.keras` model for
    extracting the features of an image, based on the `image_model`. We first extract
    the last layer of the InceptionV3 model:


    ```

    new_input = image_model.input

    hidden_layer = image_model.layers[-1].output

    ```


    We create our model now by taking the extracted model input architecture and using
    the `hidden_layer` as the output layer. This hidden layer is the layer just before
    the last softmax layer.


    ```

    image_features_extract_model = tf.keras.Model

    (new_input, hidden_layer)

    ```'
