    ## 本章小结\n\n在本章中，你学习了一个用于神经机器翻译（NMT）的复杂深度学习应用。NMT 用于将文本从一种语言翻译成另一种语言。你实现了一个用于英西翻译的\
    \ NMT 模型。为了提高翻译质量，你还使用了词向量字典。NMT 模型本质上是一个 `seq2seq`（序列到序列）模型，包含一个编码器和一个解码器。简单的编码器/解码器模型无法为长句提供高质量的翻译。因此，我们为该模型添加了注意力网络以提高翻译质量。\n\
    \n在下一章中，你将学习另一种用于语言理解的语言模型。\n\n# 9. 自然语言理解\n\n## 引言\n\n在上一章中，你使用了 `seq2seq` 模型结合注意力机制进行语言翻译。在本章中，我将向你展示一种更复杂的自然语言处理技术。你将学习使用自然语言建模领域的最新创新——Transformer\
    \ 模型。Transformer 模型消除了对 LSTM 的需求，并且比使用 LSTM 的 `seq2seq` 模型产生更好的结果。那么，让我们来理解什么是\
    \ Transformer 模型。\n\n## Transformer\n\n在上一章中，你看到了注意力机制在语言翻译中的重要性。注意力模块为对句子语义重要的单词赋予权重。然后，这些权重与常规翻译结果一起作为输入提供给解码器。通过了解句子的哪些部分重要，解码器能够提供更好的翻译。\n\
    \nTransformer 模型的示意图如图 9-1 所示。\n\n![../images/495303_1_En_9_Chapter/495303_1_En_9_Fig1_HTML.jpg](img/495303_1_En_9_Fig1_HTML.jpg)\n\
    \n**图 9-1** Transformer 的通用架构\n\n因此，Transformer 与你在上一章中看到的模型一样，包含一个编码器和一个解码器。这里的主要区别在于，编码器和解码器都不包含像之前案例中那样的\
    \ LSTM 层。相反，它们都包含多层专门设计的 Keras 层，称为编码器层和解码器层。编码器层和解码器的层数可由用户配置。编码器层包含一个特殊的注意力块，称为多头注意力——在图中标记为\
    \ MA。解码器也包含这种 MA 块。此外，解码器还包含另一个注意力块，称为掩码多头注意力——在图中标记为 MMA。编码/解码过程不像之前那样顺序进行。相反，整个句子被分割成单词，这些单词被并行处理。它们被分成多个头，可能因此得名“多头”。这种划分也促进了分布式训练和推理。因此，Transformer\
    \ 模型的性能优于第 14 章讨论的带有注意力机制的编码器/解码器模型。\n\n你可能在图中还注意到了另一件事，那就是使用了额外的嵌入块。通常，我们有词嵌入。在\
    \ Transformer 中，我们有一个额外的嵌入，称为位置嵌入，应用于给定的句子。位置嵌入指定了给定句子中单词的相对位置。这消除了对长期记忆的需求，而长期记忆是使用\
    \ LSTM 的编码器/解码器模型的特点。整个 Transformer 的工作原理在某种程度上复杂得难以消化。对于开发者来说，当他们看到可运行的代码时，他们能更好地理解幕后发生的事情。而这正是我在本章中将要采用的方法。我将向你展示\
