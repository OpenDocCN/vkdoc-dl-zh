- fmt: '### Performance Evaluation


    To evaluate the performance, we will launch the TensorBoard in our Colab environment
    using the `%tensorboard` magic. Before this, we need to load the tensorboard using
    `%load_ext` magic.


    ```

    %load_ext tensorboard

    %tensorboard --logdir log #command to launch tensorboard on colab

    ```


    Running this magic runs the TensorBoard, and you will see the accuracy and loss
    metrics plotted on the screen. The accuracy and loss metrics plot is shown in
    Figure [2-15](#495303_1_En_2_Chapter.xhtml#Fig15).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig15_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig15_HTML.jpg)


    Figure 2-15


    Accuracy and loss metrics in TensorBoard


    The two curves shown here are plotted on the training and the validation data.
    The examination of accuracy and loss metrics helps you in determining if the model
    is performing well. The plots basically show you the model’s accuracy and the
    loss at every epoch. If the accuracy is improving on every epoch, your training
    is in the right direction. Similarly, the loss should keep on reducing on every
    epoch. These plots can easily detect issues such as overfitting and so on. If
    you are not satisfied with the performance, you may adjust the model parameters
    and retrain it to improve the accuracy. You may try a different optimizer and/or
    introduce regularization to improve the model accuracy.


    You can also evaluate the model’s performance on the test data by calling the
    `evaluate` method and passing the test features and labels vectors as parameters.
    The program statement for evaluating the model and its output is shown here:


    ```

    test_scores = model.evaluate(X_test, y_test)

    print(''Test Loss: '', test_scores[0])

    print(''Test accuracy: '', test_scores[1] * 100)

    Test Loss:  0.6143370634714762

    Test accuracy:  83.96666646003723

    ```


    The accuracy on the test data which is about 83% indicates that the model will
    correctly classify 83% of the given data points.


    I will also show you how to plot the performance charts on the validation data
    using the matplotlib – a traditional way of performance evaluation. Use the following
    code snippet to do so:


    ```

    %matplotlib inline

    import matplotlib.pyplot as plt #for plotting curves

    plt.plot(r.history[''val_accuracy''], label="val_acc")

    plt.plot(r.history[''val_loss''], label="val_loss")

    plt.legend()

    plt.show()

    ```


    The plot generated by matplotlib is shown in Figure [2-16](#495303_1_En_2_Chapter.xhtml#Fig16).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig17_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig17_HTML.jpg)


    Figure 2-17


    Confusion matrix


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig16_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig16_HTML.jpg)


    Figure 2-16


    Accuracy/loss matrix on the validation data


    Besides the accuracy and loss metrics, we also used the confusion matrix quite
    often to evaluate the performance of our network, which is discussed next.


    ### Predicting on Test Data


    The confusion matrix requires both the predictions and the True labels. Thus,
    we first need to generate predictions on our test data. For predicting, use `predict_classes`
    method as shown here:


    ```

    y_pred = model.predict_classes(X_test)

    ```


    The method takes the features vector as its argument and returns a tensor of predictions.
    You may print the predictions on the console. The result is shown as follows:


    ```

    y_pred

    array([[1],

    [0],

    [0],

    ...,

    [1],

    [0],

    [0]], dtype=int32)

    ```


    Here the value of 1 at any index value indicates that the customer is going to
    leave the bank, and the value of 0 indicates that the bank has retained the customer.


    You use these prediction results to create and plot a confusion matrix that provides
    a better visualization of the model’s performance.


    ### Confusion Matrix


    I will first show you how to generate a confusion matrix and then show you how
    to interpret the matrix plot. To generate the confusion matrix, you use the sklearn’s
    built-in function as shown here:


    ```

    from sklearn.metrics import confusion_matrix

    cf = confusion_matrix(y_test, y_pred)

    cf

    ```


    This gives the following output:


    ```

    array([[2175,  209],

    [ 283,  333]])

    ```


    You will plot this matrix to give you a visual effect using the following code:


    ```

    from mlxtend.plotting import plot_confusion_matrix

    plot_confusion_matrix(conf_mat = cf, cmap = plt.cm.cmapname)

    ```


    The plot is shown in Figure [2-17](#495303_1_En_2_Chapter.xhtml#Fig17).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig18_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig18_HTML.jpg)


    Figure 2-18


    Screenshot of features data


    The x-axis represents the predicted labels, and the y-axis represents the True
    labels. As the chart shows, there are 2175 True positives and 333 True negatives.
    A True positive indicates that the customers would leave the bank, and they have
    been correctly classified by our model. Likewise, a True negative indicates that
    these customers will not leave the bank, and they have been correctly classified.
    The True positive and True negative help us in determining the accuracy of our
    model.


    The sklearn defines `accuracy_score` function to compute the accuracy score which
    is calculated by adding the number of True positives and True negatives and then
    dividing the sum by the total number of predictions. The following program statement
    computes the accuracy score for our model:


    ```

    from sklearn.metrics import accuracy_score

    accuracy_score(y_test, y_pred)

    0.8396666666666667

    ```


    The execution of this statement gives the accuracy score of 83.63%, which is a
    largely accepted accuracy in machine learning.


    As the model is trained to our satisfaction, it is now time to use it on unseen
    data.


    ### Predicting on Unseen Data


    To create an unseen data for our use case, we need to know the data types of all
    the features to which we will assign some dummy values.


    The head dump of our features shows us the column names and the range of values
    it holds. A partial dump of our features vector is shown in Figure [2-18](#495303_1_En_2_Chapter.xhtml#Fig18).


    So, for our unseen test data, we will use the following values:


    > *CreditScore = 615*

    > *Gender = Male*

    > *Age = 22*

    > *Tenure = m5*

    > *Balance = 20000*

    > *NumOfProducts = 1*

    > *HasCrCard = 1*

    > *IsActiveMember = 1*

    > *EstimatedSalary = 60000*

    > *Geography = Spain*


    You will input this data to our trained model by calling its `predict` method
    with the preceding values at appropriate indexes in the parameters list.


    ```

    customer = model.predict([[615, 1, 22, 5, 20000, 5, 1, 1, 60000, 0, 0]])

    customer

    if customer[0] == 1:

    print ("Customer is likely to leave")

    else:

    print ("Customer will stay")

    ```


    The execution of the preceding code segment gives this output:


    ```

    Customer will stay

    ```


    The value of 0 indicates that this customer is unlikely to leave the bank. Note
    that the accuracy of this prediction is still about 83% as computed earlier.


    After the model is fully trained to your satisfaction, you may save it to disk
    and deploy it on your production server for real-life use. How this is done is
    explained in the next chapter when I discuss the `tf.keras` implementation in
    depth.'
  raw: '#### Performance Evaluation


    To evaluate the performance, we will launch the TensorBoard in our Colab environment
    using the %tensorboard magic. Before this, we need to load the tensorboard using
    %load_ext magic.


    ```

    %load_ext tensorboard

    %tensorboard --logdir log #command to launch tensorboard on colab

    ```


    Running this magic runs the TensorBoard, and you will see the accuracy and loss
    metrics plotted on the screen. The accuracy and loss metrics plot is shown in
    Figure [2-15](#495303_1_En_2_Chapter.xhtml#Fig15).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig15_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig15_HTML.jpg)


    Figure 2-15


    Accuracy and loss metrics in TensorBoard


    The two curves shown here are plotted on the training and the validation data.
    The examination of accuracy and loss metrics helps you in determining if the model
    is performing well. The plots basically show you the model’s accuracy and the
    loss at every epoch. If the accuracy is improving on every epoch, your training
    is in the right direction. Similarly, the loss should keep on reducing on every
    epoch. These plots can easily detect issues such as overfitting and so on. If
    you are not satisfied with the performance, you may adjust the model parameters
    and retrain it to improve the accuracy. You may try a different optimizer and/or
    introduce regularization to improve the model accuracy.


    You can also evaluate the model’s performance on the test data by calling the
    evaluate method and passing the test features and labels vectors as parameters.
    The program statement for evaluating the model and its output is shown here:


    ```

    test_scores = model.evaluate(X_test, y_test)

    print(''Test Loss: '', test_scores[0])

    print(''Test accuracy: '', test_scores[1] * 100)

    Test Loss:  0.6143370634714762

    Test accuracy:  83.96666646003723

    ```


    The accuracy on the test data which is about 83% indicates that the model will
    correctly classify 83% of the given data points.


    I will also show you how to plot the performance charts on the validation data
    using the matplotlib – a traditional way of performance evaluation. Use the following
    code snippet to do so:


    ```

    %matplotlib inline

    import matplotlib.pyplot as plt #for plotting curves

    plt.plot(r.history[''val_accuracy''], label="val_acc")

    plt.plot(r.history[''val_loss''], label="val_loss")

    plt.legend()

    plt.show()

    ```


    The plot generated by matplotlib is shown in Figure [2-16](#495303_1_En_2_Chapter.xhtml#Fig16).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig17_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig17_HTML.jpg)


    Figure 2-17


    Confusion matrix


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig16_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig16_HTML.jpg)


    Figure 2-16


    Accuracy/loss matrix on the validation data


    Besides the accuracy and loss metrics, we also used the confusion matrix quite
    often to evaluate the performance of our network, which is discussed next.


    #### Predicting on Test Data


    The confusion matrix requires both the predictions and the True labels. Thus,
    we first need to generate predictions on our test data. For predicting, use predict_classes
    method as shown here:


    ```

    y_pred = model.predict_classes(X_test)

    ```


    The method takes the features vector as its argument and returns a tensor of predictions.
    You may print the predictions on the console. The result is shown as follows:


    ```

    y_pred

    array([[1],

    [0],

    [0],

    ...,

    [1],

    [0],

    [0]], dtype=int32)

    ```


    Here the value of 1 at any index value indicates that the customer is going to
    leave the bank, and the value of 0 indicates that the bank has retained the customer.


    You use these prediction results to create and plot a confusion matrix that provides
    a better visualization of the model’s performance.


    #### Confusion Matrix


    I will first show you how to generate a confusion matrix and then show you how
    to interpret the matrix plot. To generate the confusion matrix, you use the sklearn’s
    built-in function as shown here:


    ```

    from sklearn.metrics import confusion_matrix

    cf = confusion_matrix(y_test, y_pred)

    cf

    ```


    This gives the following output:


    ```

    array([[2175,  209],

    [ 283,  333]])

    ```


    You will plot this matrix to give you a visual effect using the following code:


    ```

    from mlxtend.plotting import plot_confusion_matrix

    plot_confusion_matrix(conf_mat = cf, cmap = plt.cm.cmapname)

    ```


    The plot is shown in Figure [2-17](#495303_1_En_2_Chapter.xhtml#Fig17).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig18_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig18_HTML.jpg)


    Figure 2-18


    Screenshot of features data


    The x-axis represents the predicted labels, and the y-axis represents the True
    labels. As the chart shows, there are 2175 True positives and 333 True negatives.
    A True positive indicates that the customers would leave the bank, and they have
    been correctly classified by our model. Likewise, a True negative indicates that
    these customers will not leave the bank, and they have been correctly classified.
    The True positive and True negative help us in determining the accuracy of our
    model.


    The sklearn defines accuracy_score function to compute the accuracy score which
    is calculated by adding the number of True positives and True negatives and then
    dividing the sum by the total number of predictions. The following program statement
    computes the accuracy score for our model:


    ```

    from sklearn.metrics import accuracy_score

    accuracy_score(y_test, y_pred)

    0.8396666666666667

    ```


    The execution of this statement gives the accuracy score of 83.63%, which is a
    largely accepted accuracy in machine learning.


    As the model is trained to our satisfaction, it is now time to use it on unseen
    data.


    #### Predicting on Unseen Data


    To create an unseen data for our use case, we need to know the data types of all
    the features to which we will assign some dummy values.


    The head dump of our features shows us the column names and the range of values
    it holds. A partial dump of our features vector is shown in Figure [2-18](#495303_1_En_2_Chapter.xhtml#Fig18).


    So, for our unseen test data, we will use the following values:


    > *CreditScore = 615*


    > *Gender = Male*


    > *Age = 22*


    > *Tenure = m5*


    > *Balance = 20000*


    > *NumOfProducts = 1*


    > *HasCrCard = 1*


    > *IsActiveMember = 1*


    > *EstimatedSalary = 60000*


    > *Geography = Spain*


    You will input this data to our trained model by calling its predict method with
    the preceding values at appropriate indexes in the parameters list.


    ```

    customer = model.predict([[615, 1, 22, 5, 20000, 5, 1, 1, 60000, 0, 0]])

    customer

    if customer[0] == 1:

    print ("Customer is likely to leave")

    else:

    print ("Customer will stay")

    ```


    The execution of the preceding code segment gives this output:


    ```

    Customer will stay

    ```


    The value of 0 indicates that this customer is unlikely to leave the bank. Note
    that the accuracy of this prediction is still about 83% as computed earlier.


    After the model is fully trained to your satisfaction, you may save it to disk
    and deploy it on your production server for real-life use. How this is done is
    explained in the next chapter when I discuss the tf.keras implementation in depth.'
