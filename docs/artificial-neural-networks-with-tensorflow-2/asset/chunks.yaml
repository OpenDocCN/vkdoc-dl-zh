- fmt: '### Creating Datasets


    Read the contents of the translation data file using the following statement:


    ```

    # reading data

    with open(''/content/spa.txt'',encoding=''utf-8'',errors=''ignore'') as file:

    text=file.read().split(''\n'')

    ```


    You can print the first five lines using the following command:


    ```

    text[:5]

    ```


    The output is shown in Figure [8-7](#495303_1_En_8_Chapter.xhtml#Fig7).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig7_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Translation file contents


    Here, the input and target are separated by a tab character.


    You may examine a few more records in the range of 100 through 110 with the following
    loop:


    ```

    for t in text[100:110]:

    print(t)

    ```


    The output is shown in Figure [8-8](#495303_1_En_8_Chapter.xhtml#Fig8).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig8_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Translation file contents in tabular format


    Notice that the translations are separated by a tab character. The first set of
    words/sentences is our input dataset, and the second set after the tab is our
    target dataset. The remaining text is the attributions which we do not use here.
    For example, as seen in Figure [8-8](#495303_1_En_8_Chapter.xhtml#Fig8), the translation
    of the English text “Be nice.” would be “Sé agradable.” Note that the same input
    sentences have more than one translation, all of which convey the same meaning.


    We will now declare two variables for storing our input and target data.


    ```

    input_texts=[] #encoder input

    target_texts=[] # decoder input

    ```


    We will select the first 10,000 words/sentences for our training. There are 122,937
    sentences in the document with the last one being blank. There are 2,751,187 words
    and 18,127,427 characters in the document. If you use the full dataset, it would
    take a long time to train the model. Using a smaller dataset would also restrict
    your vocabulary for translation. We will split each line on the tab character
    to separate the input from the target. We fill the two declared arrays with the
    first 10,000 entries in the database using the following code:


    ```

    NUM_SAMPLES = 10000

    for line in text[:NUM_SAMPLES]:

    english, spanish  = line.split(''\t'')[:2]

    target_text = spanish.lower()

    input_texts.append(english.lower())

    target_texts.append(target_text)

    ```


    Print the first five entries from the two arrays for examining its contents:


    ```

    print(input_texts[:5],target_texts[:5])

    ```


    The output is shown here:


    ```

    [''go.'', ''go.'', ''go.'', ''go.'', ''hi.''] [''ve.'', ''vete.'', ''vaya.'',
    ''váyase.'', ''hola.'']

    ```


    As you can see, there is a dot character present in the text. We need to strip
    it.


    ### Data Preprocessing


    We will now do some text processing to make our text ready for machine learning.


    #### Cleaning Up Punctuation


    We will first remove all the punctuation characters from both target and input
    datasets. The punctuation characters are easily listed by calling the `punctuation`
    method of the `string` class.


    ```

    import string

    print(''Characters to be removed in preprocessing'', string.punctuation)

    ```


    This produces the following output:


    ```

    Characters to be removed in preprocessing !"#$%&''()*+,-./:;?@[\]^_`{|}~

    ```


    To remove the punctuation characters, we define a small function:


    ```

    def remove_punctuation(s):

    out=s.translate(str.maketrans("","",string.punctuation))

    return out

    ```


    We remove the punctuation from both the input and the target output by calling
    this function:


    ```

    input_texts = [remove_punctuation(s)

    for s in input_texts]

    target_texts = [remove_punctuation(s)

    for s in target_texts]

    ```


    We can examine the first five items from both arrays to check that the data is
    clean:


    ```

    input_texts[:5],target_texts[:5]

    ```


    The output is shown as follows:


    ```

    ([''go'', ''go'', ''go'', ''go'', ''hi''], [''ve'', ''vete'', ''vaya'', ''váyase'',
    ''hola''])

    ```


    #### Adding Start/End Tags


    For the target text, we need to add the start and end tags. We have seen the purpose
    of `<start>` `<end>` tags while discussing the Encoder/Decoder architecture. We
    add the tags using the following statement:


    ```

    # adding start and end tags

    target_texts=['' '' + s + '' ''

    for s in target_texts]

    ```


    You can examine one of the target items like this:


    ```

    target_texts[1]

    ```


    You will see the following output:


    ```

    '' vete ''

    ```


    #### Tokenizing Input Dataset


    Our data is in text format, and we know that neural networks don’t understand
    text data, so we will tokenize each word with some integer value.


    We will first tokenize the input text to create the vocabulary. The `word_index`
    dictionary provides the mappings such as (`''hello''`:133).


    ```

    tokenizer_in=Tokenizer()

    #tokenizing the input texts

    tokenizer_in.fit_on_texts(input_texts)

    #vocab size of input

    input_vocab_size=len(tokenizer_in.word_index) + 1

    ```


    You can check the size of the vocabulary:


    ```

    input_vocab_size

    ```


    The size is 2332. It means we have 2332 tokens in the dictionary, using which
    we will be able to do the translation. Had you used the full dataset of 122,937
    words/sentences, you would have got the vocabulary of 13,731 words/sentences.
    You can examine the few items from the tokenized dictionary using the following
    code:


    ```

    # Listing few items

    input_tokens = tokenizer_in.index_word

    for k,v in sorted(input_tokens.items())[2000:2010]:

    print (k,v)

    ```


    You will see the following output:


    ```

    2001 visa

    2002 trains

    2003 poems

    2004 forgetful

    2005 insane

    2006 flew

    2007 harvard

    2008 obvious

    2009 lecture

    2010 divorce

    ```


    As you can see, each word/sentence gets its unique identity by way of a token.


    #### Tokenizing Output Dataset


    Like the input dataset, you will tokenize the output dataset using the following
    code:


    ```

    #tokenizing output that is spanish translation

    tokenizer_out=Tokenizer(filters='''')

    tokenizer_out.fit_on_texts(target_texts)

    #vocab size of output

    output_vocab_size=len(tokenizer_out.word_index) + 1

    output_vocab_size

    ```


    As we have used angular brackets in our special tokens such as `<start>` and `<end>`,
    we do not want the tokenizer to filter on these ( `<` `>` ) symbols. So, for the
    output dataset we set the filter to single quotes ( `''''` ) to filter out the
    output tokens.


    This will print the output of 4964, indicating that you have 4964 Spanish words/sentences
    in your vocabulary. You can check a few items from the dictionary.


    ```

    # Listing few items

    output_tokens = tokenizer_out.index_word

    for k,v in sorted(output_tokens.items())[2000:2010]:

    print (k,v)

    ```


    You will see the following output:


    ```

    2001 suyos

    2002 ley

    2003 palabras

    2004 ausente

    2005 delgaducho

    2006 sucio

    2007 adoptado

    2008 violento

    2009 roncando

    2010 podríamos

    ```


    As you notice, you will have a list of Spanish words tokenized for our translations.


    With these two datasets, you will train your Encoder/Decoder model. The user will
    be able to use your model to do the translations for these standard phrases appearing
    in the dataset. If the user inputs a phrase that is not in the standard dataset,
    the phrase will be split into words, and each word would be translated using these
    sets. After each translation, the model will try to guess the next word with the
    help of the Attention module. Note the importance of the attention module here.
    The decoder takes two inputs – the previous state of the encoder and the context
    vector that comes out of the Attention module. The decoder then predicts the word
    with the max probability based on these two inputs.'
