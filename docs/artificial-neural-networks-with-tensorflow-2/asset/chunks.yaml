    model.fit(x=train_data,

    epochs=NUM_EPOCHS,

    validation_data=val_data,

    callbacks=[model_tensorboard,

    model_early_stopping])

    # append the results

    model_performances.append(model.evaluate(val_data))

    ```


    The train_model function takes two parameters; the model parameter specifies the
    model to be trained, and the NUM_IMAGES specifies the number of images on which
    the model will be trained. The function simply calls the model’s fit method for
    training and then evaluates the performance by calling its evaluate method. The
    evaluation results are added to an array for later comparisons.


    The function itself is called using the following code snippet:


    ```

    # Training

    NUM_EPOCHS = 100

    # Create models and test for 1000,2000, 3000, 4000 images

    for NUM_IMAGES in range(1000, 5000, 1000):

    model = create_model()

