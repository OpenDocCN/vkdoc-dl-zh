  raw: '### Defining Model


    We define our model as follows:


    ```

    model = tf.keras.Sequential([

    tf.keras.layers.LSTM(256,

    input_shape = (maxlen, 1),

    return_sequences = True),

    tf.keras.layers.LSTM(256,

    return_sequences = True),

    tf.keras.layers.Dropout(0.2),

    tf.keras.layers.LSTM(64),

    tf.keras.layers.Dropout(0.2),

    tf.keras.layers.Dense(len(y[1]),

    activation=''softmax'')

    ])

    ```


    The model summary is shown as follows:


    ```

    Model: "sequential"

    ____________________________________________________

    Layer (type)          Output Shape        Param #

    ====================================================

    lstm (LSTM)           (None, 5, 256)      264192

    ____________________________________________________

    lstm_1 (LSTM)        (None, 5, 256)       525312

    ____________________________________________________

    dropout (Dropout)    (None, 5, 256)       0

    ____________________________________________________

    lstm_2 (LSTM)        (None, 64)           82176

    ____________________________________________________

    dropout_1 (Dropout)  (None, 64)           0

    ____________________________________________________

    dense (Dense)        (None, 27)           1755

    ====================================================

    Total params: 873,435

    Trainable params: 873,435

    Non-trainable params: 0

    ```


    As you can see, the model has three LSTM layers each consisting of 500 nodes.
    Each LSTM layer is followed by a dropout layer with 20% dropout. The last layer
    is a Dense layer with 27 nodes classified by softmax activation. Note that our
    data has 27 categorical outputs. The visual representation of the model is shown
    in Figure [7-14](#495303_1_En_7_Chapter.xhtml#Fig14).


    ![../images/495303_1_En_7_Chapter/495303_1_En_7_Fig14_HTML.jpg](images/495303_1_En_7_Chapter/495303_1_En_7_Fig14_HTML.jpg)


    Figure 7-14


    Model architectural layers


    ### Compiling


    We compile the model using the categorical cross-entropy and Adam optimizer.


    ```

    model.compile(loss = ''categorical_crossentropy'',

    optimizer = ''adam'')

    ```


    Note that for these kinds of language model problems, there is no test dataset.
    We model the entire dataset to predict the probability of each categorical character
    in a sequence. The model accuracy in predicting the next character perfectly is
    not important to us. Rather, we are interested in minimizing the chosen loss function.
    Thus, we are trying to achieve a balance between generalization and overfitting
    that is short of memorization.


    ### Creating Checkpoints


    Training an LSTM network typically takes a long time. Due to the nature of the
    network itself, the loss after each epoch may increase or decrease. The lowest
    loss will finally give us the best results in our predictions. Thus, we need to
    capture the model weights for the epoch which has given us the lowest loss. This
    is done by using the ModelCheckPoint method and setting the callback after each
    epoch.


    ```

    filepath = "model_weights_babynames.hdf5"

    checkpoint = ModelCheckpoint(filepath,

    monitor = ''loss'', verbose = 1,

    save_best_only = True, mode = ''min'')

    model_callbacks = [checkpoint]

    ```


    You have earlier used callbacks like early stopping in a project in Chapter [4](#495303_1_En_4_Chapter.xhtml),
    so this is another type of callback which will be called after every epoch.


    ### Training


    We now train the model by calling the fit method.


    ```

    model.fit(x,y, epochs = 300, batch_size = 32 ,

    callbacks = model_callbacks)

    ```


    I have set the number of epochs to 10 and a batch size of 32 sequences. I will
    later on show you the effect of increasing both the values of these variables.
    When I ran this code on a GPU, the training time was roughly 6 seconds per epoch,
    reasonable for us. I shall like to say here, the reason I am so concerned with
    the training time is that training LSTMs on large corpus and having large categorical
    outputs require several hours to complete even when you use distributed training
    across a set of GPUs.


    After the training is over, let us try some predictions.


    ### Prediction


    We will first need to create an input sequence. For the time being, we define
    an input sequence from the original database itself. It is defined using the following
    code snippet:


    ```

    pattern = []

    seed = ''handi''

    for i in seed:

    value = char_to_ix[i]

    pattern.append(value)

    ```


    The sequence that we used is “handi” – having length equal to 5\. Note that our
    model definition expects an input with sequence size of 5\. Each character in
    the seed sequence is converted to its integer value by using the char_to_ix array
    that we created earlier.


    We will now set up a for loop to predict the next 100 characters following the
    given sequence “handi. ” For the reference, we first print the seed and set the
    number of characters in our vocabulary to the n_vocab variable.


    ```

    print(seed)

    n_vocab = len(chars)

    ```


    We set up the loop for doing 100 predictions.


    ```

    for i in range(100):

    ```


    We first reshape this input pattern and normalize its contents using the following
    two statements:


    ```

    X = np.reshape(pattern , (1, len(pattern) , 1))

    X = X/float(n_vocab)

    ```


    We feed this to our model and ask it to predict the next character following the
    given pattern:


    ```

    int_prediction = model.predict(X , verbose = 0)

    ```


    We extract the index of the character having the maximum probability of prediction
    and convert it to a character by using our previously created ix_to_char array.


    ```

    index = np.argmax(int_prediction)

    prediction = ix_to_char[index]

    ```


    We print the predicted character on the terminal:


    ```

    sys.stdout.write(prediction)

    ```


    We append this character to our pattern and recreate a new pattern by extracting
    the last five characters, which is our input sequence length. With this new pattern,
    we ask the model to do the next prediction. Likewise, we will ask the model to
    do 100 predictions starting with the input sequence defined by us as the seed.


    ```

    pattern.append(index)

    pattern = pattern[1:len(pattern)]

    ```


    The entire for loop for generating 100 characters is given in Listing [7-1](#495303_1_En_7_Chapter.xhtml#PC35)
    for your quick reference.


    ```

    print(seed)

    n_vocab = len(chars)

    for i in range(100):

    X = np.reshape(pattern , (1, len(pattern) , 1))

    X = X/float(n_vocab)

    int_prediction = model.predict(X , verbose = 0)

    index = np.argmax(int_prediction)

    prediction = ix_to_char[index]

    sys.stdout.write(prediction)

    pattern.append(index)

    pattern = pattern[1:len(pattern)]

    Listing 7-1

