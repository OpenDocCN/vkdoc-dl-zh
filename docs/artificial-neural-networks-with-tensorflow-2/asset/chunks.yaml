    现在我们已经准备好模型进行训练，让我们创建用于训练的数据集。


    ### 创建数据集


    我们已经将训练数据集拆分为训练集和验证集。现在我们只需要使用之前定义的 `create_data_batches` 函数对这些数据进行预处理。


    ```

    train_data = create_data_batches(X_train, y_train)

    Val_data = create_data_batches(X_val,y_val)

