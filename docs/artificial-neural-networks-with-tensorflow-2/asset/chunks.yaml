    To summarize our studies so far, we can conclude that neural networks and deep
    learning techniques can be used for solving regression problems. When you have
    multiple numeric features with different ranges, ensure that each feature is scaled
    independently to the same range as a part of data preprocessing. If you do not
    have enough data, use a small network with a few hidden layers to avoid overfitting.


    In our regression projects, we used the mean squared error (`mse`) as a loss function
    and mean absolute error (`mae`) as evaluation metrics. These are common in regression
    models. However, the `tf.keras` library provides many more loss functions for
    the use of regression models. I will now discuss some of these so that in your
    experimentation, you may try using them to create a better performing model.


    ## Loss Functions


    A loss function is a measure of how good your model predicts the expected outcome.
    There is not a single loss function that can be applied to all sorts of data.
    Depending on the distribution of data and the presence of outliers, you would
    need to use a different loss function. The loss functions that you use for a regression
    problem may differ from those you use for classification problems. I will describe
    a few loss functions which are specifically used for regression problems and for
    what kind of data distribution are those applied. I will discuss the following
    five loss functions:


    * Mean squared error (`mse`)/quadratic loss/L2 loss

    * Mean absolute error (`mae`)/L1 loss

    * Huber loss

    * Log cosh loss

    * Quantile loss


    ### Mean Squared Error


    This is probably the most commonly used loss function. Mathematically, it is expressed
    as


    ![$$ MSE=\frac{1}{N}\sum \limits_{i=1}^N\ {\left({y}_i-{\hat{y}}_i\right)}^2 $$](images/495303_1_En_5_Chapter/495303_1_En_5_Chapter_TeX_Equc.png)


    You take the difference between the prediction and the truth, square it, and average
    it out across the whole dataset. This loss function is ideally useful for eliminating
    outliers as the errors are magnified due to squaring. The function is available
    as `tf.keras.losses.MSE` in the `tf.keras` library.


    ### Mean Absolute Error


    Mathematically, `mae` is expressed as


    ![$$ MAE=\frac{1}{n}\sum \limits_{j=1}^n\ \left|{y}_j-{\hat{y}}_j\right| $$](images/495303_1_En_5_Chapter/495303_1_En_5_Chapter_TeX_Equd.png)


    Here, you take the absolute value of the difference between the prediction and
    the truth and then average it out across the whole dataset. The function does
    not give too much importance to the outliers and provides an even measure across
    all data points. The function is available as `tf.keras.losses.MAE` in the `tf.keras`
    library.


    ### Huber Loss


    The `mse` detects outliers while `mae` ignores them. There can be situations where
    none of these will give a desirable prediction. Consider a data distribution where
    say 80% of the data have `y1` as the true target, while the remaining 20% have
    `y2` as a true target. The `mae` model as it works on the average will consider
    20% as outliers, while the `mse` which amplifies the error may give `y2` as the
    prediction in many cases. Huber loss provides a solution in between `mae` and
    `mse`. Mathematically, it is expressed as


    ![$$ {L}_{\delta}\left(y,f(x)\right)=\kern0.75em \left\{\begin{array}{c}\frac{1}{2}{\left(y-f(x)\right)}^2\kern4.75em
    \mathrm{for}\ \left|y-f(x)\right|\le \delta, \kern1em \\ {}\delta \left|y-f(x)\right|-\frac{1}{2}\
    {\delta}^2\kern2em \mathrm{otherwise}\kern5.75em \end{array}\right. $$](images/495303_1_En_5_Chapter/495303_1_En_5_Chapter_TeX_Eque.png)


    As you can see from the equation, the Huber loss approaches `mae` when 𝛿 approaches
    0 and `mse` when 𝛿 approaches infinity. It is less sensitive to outliers and provides
    a solution to this in between `mae` and `mse`. The Huber loss function is provided
    as a part of the `tf.keras` library and is specified using `tf.keras.losses.Huber()`.'
