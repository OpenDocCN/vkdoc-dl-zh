    ## About the Author


    ## About the Technical Reviewer


    # 1. TensorFlow Jump Start


    TensorFlow is an end-to-end open source platform for developing and deploying
    machine learning applications. We can call it the complete machine learning (ML)
    ecosystem. All of us have seen face tagging in our photos on Facebook. Well, this
    is a machine learning application. Autonomous cars use object detection to avoid
    collisions on the road. Machines now translate Spanish to English. Human voices
    are converted into text for you to create a digital document. All these are machine
    learning applications. Even a trivial `OCR` (optical character reader) application
    that we use so often uses machine learning. There are many more advanced applications
    developed today – such as captioning images, generating images, translating images,
    forecasting a time series, understanding human languages, and so on. All such
    applications and many more can be developed and deployed on the `TensorFlow` platform.
    And exactly, that’s what you are going to learn in this book.


    It doesn’t matter whether you are a beginner or an expert, `TensorFlow` will help
    you build your own ML models with ease. In `TensorFlow`, you are able to define
    your own neural network architectures, experiment with them, train them, and finally
    deploy them on the production servers. Not only this, a fully trained model can
    be deployed on mobiles, on embedded devices, and also on the Web with JavaScript
    support.


    You might have used other machine learning development libraries – just to name
    a few, `Keras`, `Torch`, `Theano`, and `Pytorch`. A recent research conducted
    by KDnuggets (`www.kdnuggets.com`) on “Which Deep Learning framework is growing
    fastest?” resulted in the findings shown in Figure [1-1](#495303_1_En_1_Chapter.xhtml#Fig1).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig1_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Deep learning framework growth – 2019


    A similar survey in 2018 over several popular frameworks is shown in Figure [1-2](#495303_1_En_1_Chapter.xhtml#Fig2).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig2_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Power scores of several deep learning frameworks


    Very clearly, `TensorFlow` is the winner among all the deep learning frameworks
    surveyed. So you have made the right decision in learning and using `TensorFlow
    2.x` for your deep learning application developments. Let us now get started on
    `TensorFlow`.


    ## What Is TensorFlow 2.0?


    A picture can say a lot more than words. I will give you a simplified conceptual
    representation of the entire `TensorFlow` platform.'
  raw: 'After text generation, the book takes you into image processing. Chapter [10](#495303_1_En_10_Chapter.xhtml)
    teaches you how to process an image and use an LSTM architecture that you learned
    in Chapters [7](#495303_1_En_7_Chapter.xhtml) and [8](#495303_1_En_8_Chapter.xhtml)
    to generate a caption for an image. The chapter deals with a hands-on project
    for image captioning. The project uses a pre-trained model, InceptionV3, for image
    processing. This is yet another practical use of transfer learning that you learned
    in Chapter [4](#495303_1_En_4_Chapter.xhtml). It shows you how to create a decoder
    with Bahdanau Attention. In the end, you will use this model for captioning any
    image taken from the Web.


    Chapter [11](#495303_1_En_11_Chapter.xhtml) takes you into another domain of machine
    learning, and that is time series analysis and forecasting. The chapter gives
    you two full projects – one for a univariate time series forecasting and the other
    one for a multivariate time series forecasting.


    Chapter [12](#495303_1_En_13_Chapter.xhtml) deals with yet another aspect of machine
    learning that can apply the style of a famous painter to your own camera-captured
    pictures to make them look like the paintings created by the famous painter. We
    call this style transfer. The chapter contains two projects. The first project
    shows you how to use a pre-trained model from the TensorFlow hub to perform a
    quick style transfer. By doing this, you will understand what is a style transfer.
    The next project takes you deeper into the technique where you would use a predefined
    VGG16 architecture to extract the features of an image and a famous painting.
    Then, you will learn how to define an evaluator to compare the content and style
    losses during a style transfer to create a final stylized picture.


    Chapter [13](#495303_1_En_4_Chapter.xhtml) deals with another important DNN architecture
    called GAN (Generative Adversarial Networks). It contains a total of three projects.
    The first one is trivial. It shows you how to use GAN for generating images for
    handwritten digits. The second one takes you further into the generation of handwritten
    alphabets. The last one finally takes you into the most advanced use of GANs for
    generating complex anime colored character images.


    Chapter [14](#495303_1_En_14_Chapter.xhtml) teaches you an important technique
    of image manipulation, that is, how to colorize a B&W image. You use AutoEncoder
    for colorizing an image. The chapter describes two projects. The first one shows
    you how to build an AutoEncoder of your own. The second one uses a pre-trained
    VGG16 model for encoding to improve the model’s performance.


    The book gives an exhaustive collection of several deep neural network architectures
    with an emphasis on their practical usage in real-life scenarios. So, get started!


