- fmt: '# Regression in Neural Networks


    To show you that you can indeed use neural networks in solving even the simplest
    regression problem, I am going to demonstrate this with a trivial example. For
    our program, we will use a dataset from a Kaggle competition for simple linear
    regression. You can download the dataset from here (`www.kaggle.com/luddarell/101-simple-linear-regressioncsv`).
    The data consists of only two columns – GPA and SAT. The GPA column represents
    the student’s Grade Point Average, and the SAT column represents the student''s
    SAT (Scholastic Aptitude Test) score. We will develop a linear regression model
    to establish a relationship between a student''s GPA and their SAT score. Once
    a model is trained, we would use it to predict how much a student would score
    in a SAT examination given their GPA.


    ## Setting Up Project


    Create a new Colab project and name it `LinearRegression`. Add the following imports
    in the project code:


    ```

    import tensorflow as tf

    from tensorflow import keras

    import pandas as pd

    ```


    The data file is available at the book’s site. To download the file in your project,
    we will use `wget`. Add the following code to install `wget`:


    ```

    !pip install wget

    import wget

    ```


    Now, to download the file, use the following code:


    ```

    url = ''https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/Ch05/student.csv''

    wget.download(url,''data.csv'')

    ```


    The downloaded file will be stored in the `/content/` folder with the name `data.csv`.
    You can examine its contents by first loading the file in a pandas dataframe and
    then printing the first few records with the following code:


    ```

    import pandas as pd

    df=pd.read_csv(''/content/data.csv'')

    df.head(10)

    ```


    You will see the output shown in Figure 5-1.


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig1_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig1_HTML.jpg)


    Figure 5-1: Sample rows in the loaded dataset


    Next, you will extract features and the label from this dataset.


    ## Extracting Features and Label


    The dataset contains only two columns – GPA and SAT. We will use GPA as our feature
    and SAT as our label. Note we are trying to predict how much a student will score
    on SAT given their GPA. To extract the features and label, use the following code:


    ```

    # Extract features and label

    dataset = df.values

    x = dataset[:,1]

    y = dataset[:,0]

    ```


    To keep this program simple enough, I will not create the training and validation
    datasets. Also, we will not reserve any data for testing. Next, we define our
    model.


    ## Defining/Training Model


    To define the model, we use the Sequential API as in the earlier cases:


    ```

    model = tf.keras.Sequential([tf.keras.layers.Dense

    (units=1, input_shape=[1])])

    ```


    Our network model consists of only a single layer with a single neuron. The input
    to this model is a single dimensional tensor. Next, we compile the model:


    ```

    model.compile(optimizer = ''sgd'',

    loss = ''mean_squared_error'')

    ```


    We use stochastic gradient descent as our optimizer and mean squared error for
    our loss function.


    The model is trained using the usual `fit` method:


    ```

    model.fit(X, y, epochs = 15)

    ```


    Note that in this simple example, I have not captured the error metrics for evaluation
    of the model’s performance.


    ## Predicting


    Now, as the model is trained, we are ready to do some predictions. Suppose you
    want to find out how much a student with GPA 5.0 will score in SAT. You would
    use the `predict` method of the model and print its result as follows:


    ```

    result = model.predict([5.0])

    print("Expected SAT score for GPA 5.0: {:.0f}"

    .format(result[0][0]))

    ```


    To find out how much a student with GPA 3.2 would score on SAT, you would use
    the following:


    ```

    result = model.predict([3.2])

    print("Expected SAT score for GPA 3.2: {:.0f}"

    .format(result[0][0]))

    ```


    Note that we have not taken the trouble of verifying the accuracy of these predictions.
    But it proves to us the point that neural networks can be used to create ML models
    for even the simplest linear regression problems.


    Next, I will deal with a more practical problem of Multicollinearity in Regression
    Analysis.


    # Wine Quality Analysis


    In this project, you would use regression analysis for determining the wine quality
    based on certain features. You will use the white wine quality dataset provided
    in the UCI Machine Learning Repository. The model’s goal is to predict the wine
    quality based on a given set of input features. The dataset provides the following
    input features, which are based on physicochemical tests.


    List of Features:


    1. Fixed acidity

    2. Volatile acidity

    3. Citric acid

    4. Residual sugar

    5. Chlorides

    6. Free sulfur dioxide

    7. Total sulfur dioxide

    8. Density

    9. pH

    10. Sulfates

    11. Alcohol


    The Quality field in the database will be used as the label. The quality value
    ranges between 0 and 10.


    ```

    Output Label:

    Quality

    ```


    ## Creating Project


    Create a new Colab project and rename it to `WineQuality`. Load TensorFlow 2.x
    and import the required libraries using the following code:


    ```

    import tensorflow as tf

    import pandas as pd

    import requests

    import io

    import matplotlib.pyplot as plt

    ```


    ## Data Preparation


    The white wine quality dataset is available at the UCI website.


    ### Downloading Data


    We will declare a variable in our code to refer to the UCI Machine Learning Repository:


    `https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/Ch05/winequality-white.csv`


    ### Preparing Dataset


    You will use the pandas library to read the CSV file into a dataframe.


    ```

    dataset = pd.read_csv(url , sep = '';'')

    ```


    You may display a few records in the dataframe by calling the `head` or `tail`
    method on it. The result of calling `tail` is shown in Figure 5-2.


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig2_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig2_HTML.jpg)


    Figure 5-2: Last few rows of the dataset


    As you can see from Figure 5-2, there are 4897 records in the database. Each record
    contains 12 fields; the last one is the quality that we will be using as the label.
    We extract the features and labels using the following two statements:


    ```

    x = dataset.drop(''quality'', axis = 1)

    y = dataset[''quality'']

    ```


    Next, you will create datasets.'
