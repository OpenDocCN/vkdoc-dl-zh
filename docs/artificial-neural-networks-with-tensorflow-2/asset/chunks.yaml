    Tensor("Add:0", shape=(), dtype=int32)

    ```


    It essentially builds a graph, which can be visualized as shown in Figure [1-11](#495303_1_En_1_Chapter.xhtml#Fig11).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig11_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Computational graph


    To run the graph itself, you need to create a session as follows and run it to
    execute your add function:


    ```

    sess = tf.Session()

    print(sess.run(c))

    sess.close()

    ```


    When you run the preceding code, the result `5` will be printed on your console.


    With TensorFlow 2.x, you can perform the same operation without creating a session.
    The following code illustrates how this is done:


    ```

    import tensorflow as tf

    a = 2

    b = 3

    c = tf.add(a, b, name="Add")

    print(c)

    ```


    The output of executing the preceding code would be


    ```

    tf.Tensor(5, shape=(), dtype=int32)

    ```


    Note that the output tensor value is 5.


    Thus, session creation is totally eliminated. This helps a lot in building big
    models. Typically, during development, a small error may pop up somewhere in the
    beginning of the model, requiring you to build the entire computational graph
    one more time. Every time you fix a bug, you need to build the full graph. This
    causes a lot of inconvenience and is a very time-consuming process. In TensorFlow
    2.x, the eager execution allows you to run the partial code without the need of
    building the full computational graph. This eager execution is implemented by
    default so that you do not have to take any special considerations while defining
    the model. You may run the command tf.executing_eagerly() to convince yourself.


    With the elimination of session creation, the TensorFlow code can now be run like
    a Python code. TF 2.x creates what’s known as a dynamic computation graph rather
    than the static computational graph created in TF 1.x.


    ### Distribution


    The most expensive operation in ML model building is training the model. TensorFlow
    2.x now provides an API called tf.distribute.Strategy to distribute the training
    across multiple GPUs and TPUs. With this API, you will be able to distribute your
    existing models and training code with only minimal code changes. The API provides
    six distribution strategies:


    1.  MirroredStrategy


    2.  CentralStorageStrategy


    3.  MultiWorkerMirroredStrategy


    4.  TPUStrategy


    5.  ParameterServerStrategy


    6.  OneDeviceStrategy


    You may dig further into the documentation to learn more about these strategies.


    As the tf.distribute.Strategy is integrated into tf.keras, it inherently takes
    advantage of improved speed during training and also while inferencing.'
  trans: '

    ### 模型保存


    通用架构中的模型保存模块如图 1-9 所示。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig9_HTML.jpg](img/495303_1_En_1_Fig9_HTML.jpg)


    图 1-9


    模型保存模块


    模型保存包含两个部分——将开发好的模型保存到磁盘，以及从仓库中复用预训练模型。


    在将模型训练到所需的精度水平后，将其保存到磁盘。在 `TensorFlow 1.x` 中，有多种保存模型的方式。`TF 2.x` 将模型保存标准化为名为 `SavedModel`
    的抽象。保存后的模型可以直接加载到您的机器学习应用中，也可以上传到生产服务器进行服务。`TensorFlow 2.x` 模型被保存为标准化格式，以便能够部署到移动设备、嵌入式设备和
    Web 上。`TensorFlow` 提供了 API，可以将开发好的模型部署到这些不同的平台，包括通过 `JavaScript` 和 `Node.js` 支持的
    Web。


    所谓的 `TensorFlow Hub` 是一个包含许多预训练模型的仓库。您可以使用迁移学习来复用和扩展这些模型，以满足您的需求。使用预训练模型的好处是，您可以用更小的数据集和更快的训练速度来训练模型。您会找到用于文本和图像识别的模型、在
    `Google News` 数据集上训练的模型，甚至还有用于 `Progressive GAN` 和 `Google Landmarks Deep Local
    Features` 的模块。不幸的是，在撰写本文时，这些模型中的大多数都是为 `TensorFlow 1.x` 编写的，需要移植到新版本。请查看 `TensorFlow`
    网站以获取模型更新，希望当您阅读本文时，大多数模型都已更新到 `TensorFlow 2.x`。


    接下来，您将了解部署选项。


    ### 部署


    训练好的模型可以部署到各种平台上，如图 1-10 所示。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig10_HTML.jpg](img/495303_1_En_1_Fig10_HTML.jpg)


    图 1-10


    模型部署选项


    `TensorFlow 2.x` 最棒的一点是，您将能够将训练好的模型部署到云端或本地。不仅如此，使用 `TensorFlow 2.0`，您甚至可以将模型部署到移动设备（如
    `Android` 和 `iOS`）以及嵌入式设备（如 `Raspberry Pi`）上。您还可以使用 `Node.js` 将模型部署到 Web 上。这将允许您在喜欢的浏览器中使用该模型。通常，部署可以分为以下几类：


    *   **TensorFlow Serving** – 一个允许模型通过 `HTTP/REST` 或 `gRPC/Protocol buffers` 提供服务的库。


    *   **TensorFlow Lite** – 一种轻量级解决方案，用于在 `Android`、`iOS` 以及像 `Raspberry Pi` 和 `Edge
    TPUs` 这样的嵌入式系统上部署模型。


    *   **TensorFlow.js** – 支持在 `JavaScript` 环境（如 Web 浏览器）或通过 `Node.js` 在服务器端部署模型。使用
    `TensorFlow.js`，您还可以用 `JavaScript` 定义模型，并使用类似 `Keras` 的 API 直接在 Web 浏览器中训练这些模型。


    在对 `TensorFlow` 做了这些简单介绍之后，我将简要描述 `TensorFlow 2.x` 的一些主要显著特性。


    ## TensorFlow 2.x 提供了什么？


    与早期版本相比，`TensorFlow 2.x` 引入了许多新特性。我将简要总结 `TensorFlow 2.x` 的显著特性。在您阅读本书的过程中，您将更好地理解它们的用途。


    ### TensorFlow 中的 `tf.keras`


    `Keras` API 现在可以通过 `TensorFlow` 的 `tf.keras` API 获得。这是一个高级 API，为 `TensorFlow`
    特定的功能（如即时执行、数据管道和估算器）提供支持。使用 `tf.keras`，您可以像使用 `Keras` 一样构建和训练模型，而不会牺牲灵活性和性能。


    要在程序中使用 `tf.keras`，您将使用以下代码：


    ```

    import tensorflow as tf

    from tensorflow import keras

    ```


    一旦加载了 `TensorFlow` 库，您将能够定义自己的神经网络架构、创建模型、训练和测试它们。您将在第 2 章讨论 `TensorFlow 2.x`
    的 Hello World 程序时学习这一点。


    ### 即时执行


    在 `TensorFlow 2.x` 之前，您的机器学习代码分为两部分：


    1.  构建计算图


    2.  创建会话来执行图


    这些步骤可以使用以下代码来解释：


    ```

    import tensorflow as tf

    a = 2

    b = 3

    c = tf.add(a, b, name="Add")

    print(c)

    ```


    这会在您的控制台上打印以下内容：


    ```

    Tensor("Add:0", shape=(), dtype=int32)

    ```


    它本质上构建了一个图，可以如图 1-11 所示进行可视化。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig11_HTML.jpg](img/495303_1_En_1_Fig11_HTML.jpg)


    图 1-11


    计算图


    要运行图本身，您需要按如下方式创建一个会话并运行它以执行您的加法函数：


    ```

    sess = tf.Session()

    print(sess.run(c))

    sess.close()

    ```


    当您运行上述代码时，结果 `5` 将打印在您的控制台上。


    使用 `TensorFlow 2.x`，您无需创建会话即可执行相同的操作。以下代码说明了如何做到这一点：


    ```

    import tensorflow as tf

    a = 2

    b = 3

    c = tf.add(a, b, name="Add")

    print(c)

    ```


    执行上述代码的输出将是


    ```

    tf.Tensor(5, shape=(), dtype=int32)

    ```


    请注意，输出张量的值是 5。


    因此，会话创建被完全消除了。这在构建大型模型时非常有帮助。通常，在开发过程中，一个小错误可能会在模型的开头某处弹出，要求您再次构建整个计算图。每次修复一个错误，您都需要构建完整的图。这会造成很多不便，并且是一个非常耗时的过程。在
    `TensorFlow 2.x` 中，即时执行允许您运行部分代码，而无需构建完整的计算图。这种即时执行是默认实现的，因此您在定义模型时无需考虑任何特殊情况。您可以运行命令
    `tf.executing_eagerly()` 来验证。


    随着会话创建的消除，`TensorFlow` 代码现在可以像 `Python` 代码一样运行。`TF 2.x` 创建的是所谓的动态计算图，而不是 `TF 1.x`
    中创建的静态计算图。


    ### 分布式


    机器学习模型构建中最昂贵的操作是训练模型。`TensorFlow 2.x` 现在提供了一个名为 `tf.distribute.Strategy` 的 API，用于将训练分布到多个
    GPU 和 TPU 上。使用此 API，您只需对现有模型和训练代码进行最少的代码更改，即可实现分布式训练。该 API 提供了六种分布式策略：


    1.  `MirroredStrategy`


    2.  `CentralStorageStrategy`


    3.  `MultiWorkerMirroredStrategy`


    4.  `TPUStrategy`


    5.  `ParameterServerStrategy`


    6.  `OneDeviceStrategy`


    您可以进一步查阅文档以了解有关这些策略的更多信息。


    由于 `tf.distribute.Strategy` 已集成到 `tf.keras` 中，因此它在训练和推理过程中都能自然地利用速度提升的优势。

