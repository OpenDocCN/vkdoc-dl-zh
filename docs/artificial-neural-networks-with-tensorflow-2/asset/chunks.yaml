- fmt: '### Creating Data Batches


    Let us first understand what a batch is. A batch is a small portion of your data
    – images and their labels. Typically, a batch is of size 32; it means there are
    32 images and 32 corresponding labels in a batch. In deep learning, instead of
    finding patterns in an entire dataset at the same time, you often find them in
    one batch at a time. Loading and processing 10,000+ images in one go would require
    a huge amount of memory and processing power. So, we process them in small batches,
    one at a time. We will now write a function to divide our data into batches and
    create Tensors consisting of image data and its associated label.


    The function for creating batches is shown in Listing [4-2](#495303_1_En_4_Chapter.xhtml#PC44).


    ```

    # Define the batch size, 32 is a good default

    BATCH_SIZE = 32

    # Create a function to turn data into batches

    def create_data_batches(x, y = None, batch_size = BATCH_SIZE, data_type = 1):

    """

    Creates batches of data out of image (x) and label (y) pairs.

    Shuffles the data if it''s training data but doesn''t shuffle it

    if it''s validation data.

    Also accepts test data as input (no labels).

    """

    # If the data is a test dataset, we don''t have labels

    if data_type == 3:

    print("Creating test data batches...")

    data = tf.data.Dataset.from_tensor_slices((tf.constant(x))) # only filepaths

    data_batch = data.map(process_image).batch(BATCH_SIZE)

    return data_batch

    # If the data if a valid dataset, we don''t need to shuffle it

    elif data_type == 2:

    print("Creating validation data batches...")

    data = tf.data.Dataset.from_tensor_slices((tf.constant(x), # filepaths

    tf.constant(y))) # labels

    data_batch = data.map(get_image_label).batch(BATCH_SIZE)

    return data_batch

    else:

    # If the data is a training dataset, we shuffle it

    print("Creating training data batches...")

    # Turn filepaths and labels into Tensors

    data = tf.data.Dataset.from_tensor_slices((tf.constant(x), # filepaths

    tf.constant(y))) # labels

    # Shuffling pathnames and labels before mapping image processor function

    # is faster than shuffling images

    data = data.shuffle(buffer_size = len(x))

    # Create (image, label) tuples

    # (this also turns the image path into a preprocessed image)

    data = data.map(get_image_label)

    # Turn the data into batches

    data_batch = data.batch(BATCH_SIZE)

    return data_batch

    Listing 4-2

    Function for creating data batches

    ```


    Depending on the input value, the function creates batches on training, validation,
    and testing datasets. In the training dataset, we shuffle the data to achieve
    some randomness in the data. The function `from_tensor_slices` converts the data
    into input pipelines. The `map` function converts the (image, label) tuples into
    a data input pipeline. The `batch` function splits the data into batches.


    We will now write a function to display a few images from the set. This will be
    useful to us during testing.


    ### Display Function for Images


    We now write a function to display 25 images from the dataset. The full code for
    the function `show_25_images` is given in Listing [4-3](#495303_1_En_4_Chapter.xhtml#PC45).
    Assuming that you are familiar with `matplotlib` plotting, the code is self-explanatory
    and does not require any further comments.


    ```

    # Function for viewing images in a data batch

    import matplotlib.pyplot as plt

    def show_25_images(images, labels):

    """

    Displays 25 images from a data batch.

    """

    # Setup the figure

    plt.figure (figsize = (10, 10))

    # Loop through 25 (for displaying 25 images)

    for i in range(25):

    # Create subplots (5 rows, 5 columns)

    ax = plt.subplot(5, 5, i+1)

    # Display an image

    plt.imshow(images[i])

    # Add the image label as the title

    plt.title(unique_breeds[labels[i].argmax()])

    # Turn grid lines off

    plt.axis("off")

    Listing 4-3

    The display image function

    ```


    Having prepared ourselves with the various functions for data preprocessing and
    displaying, we are now ready to define our machine learning model.


    ### Selecting Pre-trained Model


    As said earlier, we will use the transfer learning in our model definition. For
    this, we need to look out for an appropriate model in TensorFlow Hub. The Hub
    classifies the models under different categories. If you select the image classification
    category, you will find several models listed under it. Some of these models are
    1.x specific. As we are using TF2, select a model that supports TF2. One such
    model is `mobilenet_v2_130_224` as of this writing. The screenshot of the selection
    is shown in Figure [4-17](#495303_1_En_4_Chapter.xhtml#Fig17).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig17_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    Selecting MobileNet from tfhub


    Looking at the model documentation, you would discover that the model takes the
    input of shape `(224, 224, 3)`.'
