    ## Training Step Function


    We now write a function to define a training step. We will call this for our desired
    number of epochs. The function definition is given as follows:


    ```python

    loss_plot = []

    def train_step(img_tensor, target):

    loss = 0

    # initialize the hidden state for each batch

    # because the captions are not related from image to image

    hidden = decoder.reset_state

    (batch_size=target.shape[0])

    dec_input = tf.expand_dims([tokenizer.word_index

    [''<start>'']] *

    BATCH_SIZE, 1)

    with tf.GradientTape() as tape:

    features = encoder(img_tensor)

    for i in range(1, target.shape[1]):

    # Pass the features through the decoder

    predictions, hidden, _ = decoder(dec_input,

    features, hidden)

    loss += loss_function(target[:, i],

    predictions)

    # Use teacher forcing

    dec_input = tf.expand_dims(target[:, i], 1)

    total_loss = (loss / int(target.shape[1]))

    trainable_variables = encoder.trainable_variables +

    decoder.trainable_variables

    gradients = tape.gradient

    (loss, trainable_variables)

    optimizer.apply_gradients(zip(gradients,

    trainable_variables))

    return loss, total_loss

    ```


    The function first calls the `reset_state` defined in the decoder model to initialize
    the hidden state of the decoder for each batch. We do this because we do not want
    to use the state/captions of the previous batch. Note the captions won’t be the
    same in every batch. We add the `<start>` tag in the first batch. We use the gradient
    tape to iterate through the batches of data and update the gradients at each iteration.


