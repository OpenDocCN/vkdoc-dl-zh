    ## Custom Estimators


    In the previous chapter, you developed a wine quality classifier. You used three
    different architectures – small, medium, and large – to compare their results.
    I will now show you how to convert these existing Keras models to a custom estimator
    to take advantage of the facilities provided by the estimator.


    ### Creating Project


    Create a new Colab project and rename it to `ModelToEstimator`. Add the following
    imports to the project:


    ```

    import tensorflow as tf

    import pandas as pd

    from sklearn.model_selection

    import train_test_split

    from sklearn.preprocessing

    import StandardScaler

    ```


    ### Loading Data


    We will use the white wine quality that you have used previously. The data is
    downloaded to your project from the UCI Machine Learning Repository using the
    following code:


    ```

    data_url=''https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/Ch05/winequality-white.csv''

    data=pd.read_csv(data_url,delimiter='';'')

    ```


    As you are already familiar with the data, I am not going to describe it again.
    I will not also include any data preprocessing here. I will straightaway move
    on to features selection.


    ### Creating Datasets


    As you know from the previous chapter, the `quality` field in the database is
    used as a target label, and the rest of the fields are used as features. To separate
    out features and the target label, we used the following code:


    ```

    x = data.iloc[:,:-1]

    y = data.iloc[:,-1]

    ```


    All selected features, which are numeric, must now be scaled to a normal distribution.


    ```

    sc = StandardScaler()

    x = sc.fit_transform(x)

    ```


    We now create the training/testing datasets by using the `train_test_split` method.


    ```

    xtrain, xtest, ytrain, ytest =

    train_test_split(x, y, test_size =

    0.3,random_state = 20)

    ```


    We capture the shape of `xtrain` in a variable; this is required while defining
    the Keras sequential model.


    ```

    input_shape = xtrain.shape[1]

    ```


    ### Defining Model


    We use the small model definition from our previous example. The model definition
    is given here:


    ```

    small_model = tf.keras.models.Sequential([

    tf.keras.layers.Dense

    (64,activation = ''relu'',

    input_shape = (input_shape,)),

    tf.keras.layers.Dense(1)

    ])

    ```


    The output consists of a single neuron which emits a float value for the wine
    quality. Note that we are treating this problem as a regression problem like the
    wine quality problem discussed in the previous chapter.


    We compile the model by calling its `compile` method:


    ```

    small_model.compile

    (loss = ''mse'', optimizer = ''adam'')

    ```


    We consider this as a regression problem and thus use `mse` for our loss function.
    We will use this compiled model in the estimator instantiation. Before that, we
    define the input function.'
