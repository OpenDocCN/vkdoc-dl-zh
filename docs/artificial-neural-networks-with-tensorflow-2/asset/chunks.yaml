    # 下一步是什么？


    近年来，一种名为 `BERT` 的新型语言表示模型变得流行并被广泛使用。该模型由 Jacob Devlin 等人在其 2018 年 10 月发表的论文《BERT：用于语言理解的深度双向
    Transformer 预训练》（[`https://arxiv.org/pdf/1810.04805.pdf`](https://arxiv.org/pdf/1810.04805.pdf)）中提出。`BERT`
    代表来自 Transformer 的双向编码器表示。该模型的精妙之处在于，你可以使用预训练的 `BERT` 模型，并仅通过添加一个额外的层进行微调，就能创建各种应用，例如问答、语言翻译等。感兴趣的读者可参阅
    Devlin 等人的原始论文以获取更多信息。


    # 总结


    在本章中，你学习了另一种用于自然语言处理的模型，即 Transformer。Transformer 模型比之前提到的带有注意力机制的 `seq2seq` 模型提供了更好的自然语言理解能力。Transformer
    模型不使用 `LSTM` 来记忆长输入句子。相反，它使用位置嵌入来获取句子中重要单词的相对位置信息。Transformer 使用了一种不同的注意力模型，称为多头注意力，该模型通过将输入拆分为多个通道，从多个头获取输入。这促进了分布式训练和推理。总体而言，Transformer
    的表现远优于本书中讨论的其他模型。


    在下一章中，你将学习图像描述，你将学习设计一个能够为任何给定图像生成描述的深度神经网络。


    # 10. 图像描述


    当你度假时，你会拍摄许多美丽的风景和地点的照片，然后为这些照片添加一些描述并发布到你的社交网络上。想象一下，如果你有一个移动应用能为你自动生成照片描述，这难道不是一件很棒的事情吗？在本章中，你将学习如何创建和训练一个神经网络来为你的照片生成描述。


    描述生成是一个非常具有挑战性的问题。要解决这个问题，你需要同时具备计算机视觉和自然语言处理的知识。计算机视觉帮助你理解图像的内容，这基本上是目标检测。`NLP`
    则将这种理解转化为按正确顺序排列的词语。


    解决此问题的最通用架构如图 10-1 所示。


    ![../images/495303_1_En_10_Chapter/495303_1_En_10_Fig1_HTML.jpg](img/495303_1_En_10_Fig1_HTML.jpg)


    **图 10-1** 图像描述的通用架构


    我们将图像通过一个预训练的网络，例如 `InceptionV3` 或 `VGG16`，这些网络是为图像分类而设计的。然而，我们将只使用此类网络的卷积层来提取图像中的特征，并忽略网络的分类部分。如图
    10-1 所示，我们有一张图片，上面是一个男人躺在长椅上，旁边坐着一只狗。当你将这张图像通过图像分类网络时，你将提取出图像的各个部分，例如男人、狗、长椅等。检测到这些物体后，你需要生成一个关联所有这些图像组件的描述，而这正是这个图像描述应用中最具挑战性的部分。你不能简单地列出物体的名称。相反，你需要使用这些词语（检测到的物体名称）创建一个恰当且有意义的句子。这就是
    `NLP` 模块发挥作用的地方，它将包含用于生成句子的 `LSTM`。然而，为了使其更有意义，你需要一个类似于上一章中使用的注意力机制。回顾一下，你在第 9
    章中使用了带有**多头注意力**的 Transformer 模型来进行翻译。在本章中，对于 `NLP`，你将使用一个不同的注意力模块，称为 Bahdanau
    注意力。Dzmitry Bahdanau 提出了一种加性注意力（[`https://arxiv.org/pdf/1409.0473.pdf`](https://arxiv.org/pdf/1409.0473.pdf)），它对编码器和解码器的状态进行线性组合。它学习在给定序列中共同对齐和翻译词语。最初，这是为了改进基于编码器-解码器
    `RNN`（循环神经网络）的机器翻译而开发的。


    Bahdanau 模型的示意图如图 10-2 所示。


    ![../images/495303_1_En_10_Chapter/495303_1_En_10_Fig2_HTML.jpg](img/495303_1_En_10_Fig2_HTML.jpg)


    **图 10-2** Bahdanau 注意力


    这由以下公式控制：


    ![$$ {a}_t(s)= align\left({h}_{t-1},{\underset{\_}{h}}_s\right) $$](img/495303_1_En_10_Chapter_TeX_Equa.png)


    ![$$ {c}_t=\sum {a}_t{h}_s $$](img/495303_1_En_10_Chapter_TeX_Equb.png)


    ![$$ {h}_t= RNN\left({h}_{t-1}^{l-1},\left[{c}_t;{h}_{t-1}\right]\right) $$](images/495303_1_En_10_Chapter/495303_1_En_10_Chapter_TeX_Equc.png)


    与上一章类似，我将通过其实现向你解释 Bahdanau 注意力模块。那么，让我们直接跳入开发一个图像描述项目吧。


    ## 项目描述


    与任何其他 `ML` 项目一样，创建图像描述网络模型最重要的是要有合适的训练和测试数据。幸运的是，Flickr 已公开提供此类数据。`Flickr8k` 数据集包含约
    8000 张图像，而 `Flickr30k` 数据集包含约 30,000 张图像。如果你想使用比这些更大的数据集，`MS COCO` 包含约 180,000
    张图像。所有这些图像都有相应的描述。每张图像可能有多条描述。使用更大的数据集可以在未见过的图像上获得更好的预测精度；然而，这会消耗大量训练资源。出于学习目的，`Flickr8k`
    数据已经足够，因为我们不太关心生成的描述在多大程度上代表了给定的图像。该数据集中的每张图像都附有五条相关的描述。


    ## 创建项目


    打开一个新的 Colab 项目，并将其重命名为 `ImageCaptioning`。导入所需的库。


    ```python

    import os

    import time

    import pickle

    import numpy as np

    import tensorflow as tf

    import matplotlib.pyplot as plt

    from sklearn.utils import shuffle

    from sklearn.model_selection import train_test_split

    from tensorflow.keras.applications import InceptionV3

    from os import listdir

    from tqdm import tqdm

    from PIL import Image

    ```


