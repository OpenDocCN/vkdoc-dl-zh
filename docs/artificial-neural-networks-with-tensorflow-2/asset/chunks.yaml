    ## Summary


    In this chapter, you set up your environment for deep learning using TensorFlow
    2.x. You used Colab for developing your Python notebooks. A trivial application
    helped you learn the development environment. This was followed by a more detailed
    realistic example. In this realistic example, you loaded an external database
    and learned how to preprocess the data for making it suitable for machine learning,
    how to define a deep neural network, how to compile it, how to train it, how to
    evaluate the model’s performance using TensorBoard and plots from `matplotlib`,
    and finally how to use the trained model to make predictions on unseen data. Though
    the model’s performance is evaluated, I never talked about how to improve it.
    In the next chapter, you will learn a few techniques for improving a model’s performance.
    The next chapter covers the TensorFlow Keras integration in more depth and discusses
    the image classification problem.


    # 3. Deep Dive in `tf.keras`


    Keras is a high-level neural networks API that runs on top of TensorFlow. Last
    many years, you were using Keras API with TensorFlow running at the backend. With
    TensorFlow 2.x, this has changed. TensorFlow has now integrated Keras in `tf.keras`
    API. The `tf.keras` is the TensorFlow’s implementation of the Keras API specification.
    This change is mainly done to bring consistency in using Keras with TF. It also
    resulted in taking advantage of several TensorFlow features such as eager execution,
    distributed training and others while using Keras. The latest Keras release as
    of this writing is 2.3.0. This release adds support for TensorFlow 2.x and is
    also the last major release of multi-backend Keras. Henceforth, you will be using
    only `tf.keras` in all your deep learning applications. You have already used
    `tf.keras` in Chapter [2](#495303_1_En_2_Chapter.xhtml) while getting started
    on TensorFlow. This chapter will take you deeper in the use of `tf.keras`.


    ## Getting Started


    In creating deep learning applications, the most important task is to define a
    neural network model. In the previous chapter, while developing a trivial application
    you created a network consisting of a single layer with a single neuron. Just
    to recapitulate, this was done using the following program statement:


    ```

    model = tf.keras.Sequential([tf.keras.layers.Dense(units=1)])

    ```


    Though I did not explicitly mention, the above statement uses Keras functional
    API in TensorFlow. The statement creates a single layer/singe neuron network model.
    In earlier Keras implementations, you could do the same thing using following
    two statements:


    ```

    model = keras.Sequential()

    model.add(Dense(1, input_dim = 1))

    ```


    The model is visualized in the screenshot shown in Figure [3-1](#495303_1_En_3_Chapter.xhtml#Fig1).


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig1_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Single layer/single neuron model


    The use of functional API is now the recommended way of defining Keras deep learning
    models.


    ## Functional API for Model Building


    With functional API, you would be able to create extremely complex models with
    non-linear topology. You will be able to share layers within a model. And you
    will also be able to create models with multiple inputs and outputs. So, in all
    the applications in this book, I will be using functional API to define ANN models.
    I will now show you how to define few architectures using functional API.'
