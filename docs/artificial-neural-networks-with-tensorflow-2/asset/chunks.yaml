    #### Encoder


    The encoder architecture is shown in Figure [8-2](#495303_1_En_8_Chapter.xhtml#Fig2).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig2_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Encoder architecture


    We split the entire input sentence at the word level and input it to our Encoder
    at each time step. In the case of our example statement “Peter is a good boy,”
    we will have the inputs to LSTM in five time steps as shown here:


    X1 = “Peter”, X2 = “is”, X3 = “a”, X4 = “good”, X5 = “boy”


    The LSTM calculates the hidden state values h[i]. These hidden states along with
    the next word are fed to the decoder in the next time step. This is how the network
    captures the contextual information of the input sequence. The initial state of
    the encoder is typically a zero vector. The final state, which is also called
    a “thought vector” of the encoder, is used as an input to the decoder.


    #### Decoder


    The decoder architecture is shown in Figure [8-3](#495303_1_En_8_Chapter.xhtml#Fig3)
    with the timestamps for our example input sentence.


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig3_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Decoder architecture


    The decoder is trained to predict the next word given the previous word by feeding
    hidden states of decoder LSTM cells from the previous cell to the next. Before
    feeding the target sequence to the decoder, special tokens <START> and <END> are
    added to the beginning and end of the sequence.


    The target sequence is unknown while decoding the test sequence. So, we start
    predicting the target sequence by passing the first word into the decoder which
    would be always the <start> token. The <end> token signals the end of the sentence.


    I will now discuss the decoding steps during inference.


    #### Inference


    The time steps during the inference are listed as follows:


    *   The initial input to the Decoder is the <start> token.


    *   During inference, the Decoder LSTM is called multiple times in a loop to generate
    an output word in each time step/iteration.


    *   The initial states of the decoder equal the final states of the encoder.


    *   At each time step, the decoder states are preserved and are used as initial
    states during the next time step/iteration.


    *   The predicted output of each time step is fed as an input in the next time
    step/iteration.


    *   The loop breaks at the <end> tag.


    The entire inference process for our sample text is shown in Figure [8-4](#495303_1_En_8_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig4_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Inference process in the Encoder/Decoder


    This is how the sequence-to-sequence (seq2seq) model works. I will now discuss
    the shortcomings of the seq2seq model.


    ### Shortcomings of seq2seq Model


    The seq2seq model is composed of an encoder-decoder architecture, where the encoder
    processes the input sequence and encodes the information into a context vector.
    This context vector is sometimes called a “thought vector” and is of a fixed length.
    The thought vector is expected to represent a good summary of the entire input
    sequence. The decoder is then initialized with this thought vector and asked to
    do the transformation. These fixed-length thought vectors suffer from an apparent
    disadvantage of being incapable of remembering long sequences. Usually, for long
    sequences, they forget the earlier part of the sequence by the time they process
    the entire sequence. To solve this problem, the attention mechanism was proposed.'
  trans: '

    # 序列到序列建模


    在上一章中，你学习了 RNN 和 LSTM。我们将使用这些网络模型，结合编码器/解码器与注意力机制，来创建一个神经机器翻译模型。在阅读过程中，我会向你解释什么是编码器、解码器和注意力机制。编码器/解码器模型是一类通用的序列到序列建模方法，广泛应用于情感分析、神经机器翻译、聊天机器人、命名实体识别，甚至文本生成等多个领域。例如，向聊天机器人提问“How
    are you today?”，它可能会回答“I am fine, thank you! How are you doing today?”。这显然不是逐词翻译及其对应回复。这类翻译需要对庞大的词汇库进行模型训练，并使用神经网络模型，这与你在本书中迄今为止学到的传统机器学习模型有很大不同。


    在本章中，我们将只关注神经机器翻译。我们的模型会将英语短语翻译成对应的西班牙语单词，如图 8-1 所示。


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig1_HTML.jpg](img/495303_1_En_8_Fig1_HTML.jpg)


    图 8-1


    使用 seq2seq 建模进行英西翻译


    英语短语“How are you?”被翻译成“¿Cómo estás?”。输出序列的长度不必与输入序列相同。为了理解这是如何实现的，我先解释一下编码器和解码器的架构。


    ## 编码器/解码器


    编码器和解码器是序列到序列模型的两个主要组成部分。两者都使用 LSTM。你会记得，LSTM 能够记住长序列，并且不会出现梯度消失问题；因此，它们是语言翻译模型的理想选择。编码器和解码器是同一
    LSTM 架构的两组不同实例。首先，我将描述编码器架构。


    ### 编码器


    编码器架构如图 8-2 所示。


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig2_HTML.jpg](img/495303_1_En_8_Fig2_HTML.jpg)


    图 8-2


    编码器架构


    我们将整个输入句子按单词级别拆分，并在每个时间步将其输入到编码器中。以我们的示例语句“Peter is a good boy”为例，我们将按五个时间步将输入送入
    LSTM，如下所示：


    `X1` = “Peter”, `X2` = “is”, `X3` = “a”, `X4` = “good”, `X5` = “boy”


    LSTM 计算隐藏状态值`h[i]`。这些隐藏状态与下一个单词一起，在下一个时间步被送入解码器。这就是网络捕获输入序列上下文信息的方式。编码器的初始状态通常是一个零向量。编码器的最终状态，也称为“思维向量”，被用作解码器的输入。


    ### 解码器


    解码器架构如图 8-3 所示，其中包含了我们示例输入句子的时间戳。


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig3_HTML.jpg](img/495303_1_En_8_Fig3_HTML.jpg)


    图 8-3


    解码器架构


    解码器通过将解码器 LSTM 单元的隐藏状态从前一个单元馈送到下一个单元，来训练根据前一个单词预测下一个单词。在将目标序列送入解码器之前，会在序列的开头和结尾添加特殊标记`<START>`和`<END>`。


    在解码测试序列时，目标序列是未知的。因此，我们通过将第一个单词（始终是`<start>`标记）传入解码器来开始预测目标序列。`<end>`标记表示句子的结束。


    我现在将讨论推理过程中的解码步骤。


    ### 推理


    推理过程中的时间步骤如下所示：


    *   解码器的初始输入是`<start>`标记。

    *   在推理过程中，解码器 LSTM 会在一个循环中被多次调用，以在每个时间步/迭代中生成一个输出单词。

    *   解码器的初始状态等于编码器的最终状态。

    *   在每个时间步，解码器状态被保留，并用作下一个时间步/迭代的初始状态。

    *   每个时间步的预测输出被作为输入馈送到下一个时间步/迭代。

    *   循环在遇到`<end>`标记时终止。


    我们示例文本的整个推理过程如图 8-4 所示。


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig4_HTML.jpg](img/495303_1_En_8_Fig4_HTML.jpg)


    图 8-4


    编码器/解码器中的推理过程


    这就是序列到序列（seq2seq）模型的工作原理。我现在将讨论 seq2seq 模型的缺点。


    ## seq2seq 模型的缺点


    seq2seq 模型由编码器-解码器架构组成，其中编码器处理输入序列并将信息编码成一个上下文向量。这个上下文向量有时被称为“思维向量”，并且是固定长度的。这个思维向量被期望能够很好地概括整个输入序列。解码器随后用这个思维向量进行初始化，并被要求执行转换。这些固定长度的思维向量有一个明显的缺点：无法记住长序列。通常，对于长序列，当它们处理完整个序列时，已经忘记了序列的前面部分。为了解决这个问题，提出了注意力机制。

    '
- fmt: '# Attention Model


    Humans, when they see something or hear something, consciously pay attention to
    a portion of a picture or a text. Consider the photo shown in Figure [8-5](#495303_1_En_8_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig5_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    Image that draws attention to a horse and a lady. Image source: [`http://www.clker.com/clipart-man-riding-a-rearing-horse.html`](http://www.clker.com/clipart-man-riding-a-rearing-horse.html)


    The moment you see this photo, your attention goes to a horse and a lady. So if
    you have to generate a caption for the photo, you would say “Lady riding a Horse.”
    Likewise, if somebody raises a question, “Which sport do you like the most?”,
    your immediate attention is on the words “sport” and “you.” Our Encoder/Decoder
    model misses this feature of paying attention to certain keywords in the input
    sequence. So the intuition behind the attention mechanism is that how much attention
    do we need to pay to every word while generating a word at timestamp `t`? So,
    the basic idea behind the attention mechanism is to increase the importance of
    specific words in the input sequence while generating the target.


    The attention model was created to help memorize long sentences in the input source.
    Instead of building a single context vector from the encoder’s last hidden state,
    the attention model creates a context vector for the entire input sequence. This
    is depicted in Figure [8-6](#495303_1_En_8_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig6_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Encoder/Decoder architecture with the Attention module


    Here, the input sequence is “Peter is a good boy.” This sequence is split into
    the individual words. The decoder gets its input from the encoder outputs in time
    steps. If we use this simple seq2seq modeling, the translation quality will not
    be good. So, we introduce an Attention layer in between. The inputs to the decoder
    at each time step will now be its previous state + the attention context on the
    input sequence. For example, while generating the word “buen,” the decoder will
    pay more attention to the words like Peter, good, and boy. The Attention network
    assigns different weights to the input words to generate an Attention context
    that the decoder uses while predicting the next word.


    The attention weights (`α`) to the network at any given time step `t[s]` can be
    expressed mathematically as follows:


    ![$$ {\alpha}_{t_s}=\frac{\mathit{\exp}\ \left( score\left({h}_t,{\overline{h}}_s\right)\right)}{\sum_{s^{\prime
    }=1}^s\mathit{\exp}(score){h}_t,{\overline{h}}_{s\prime}\left)\right)} $$](images/495303_1_En_8_Chapter/495303_1_En_8_Chapter_TeX_Equa.png)


    Then the context vector can be expressed as


    ![$$ {c}_t=\sum \limits_s{\propto}_{ts}{\overline{h}}_s $$](images/495303_1_En_8_Chapter/495303_1_En_8_Chapter_TeX_Equb.png)


    where `c[t]` represents the context at time step `t`, and the alpha and `h` represent
    the weights and hidden states, respectively. The final Attention vector, which
    is a function of all `c[t]` and `h[t]`, is computed as follows:


    ![$$ {a}_t=f\left({c}_t,{h}_t\right)=\mathit{\tanh}\left({W}_c\left[{h}_t,{h}_t\right]\right)
    $$](images/495303_1_En_8_Chapter/495303_1_En_8_Chapter_TeX_Equc.png)


    The `a[t]` goes as an input to the decoder along with its own previous state.
    You will be able to get a better understanding of this Attention network when
    you look at its implementation, which is provided in the project in the next section.


    With this introduction to neural machine translation, let us move on to a practical
    implementation.


    # English to Spanish Translator


    We will create an English to Spanish translation using NMT techniques you learned
    so far in this chapter. You will be using the Encoder/Decoder model with the Attention
    module. For training such models, you require a set of sentence mappings between
    the two languages. Fortunately, somebody has created such mappings. You will find
    these mappings on this site ([`www.manythings.org/anki/`](http://www.manythings.org/anki/)).
    These are the tab-delimited bilingual sentence pairs. The number of sets is exhaustive,
    and you will find mappings between many popular languages in the world. Each line
    in the file is of the format:


    - English + TAB + The Other Language + TAB + Attribution


    In this project, you are also going to use the Global Vectors for Word Representations
    created by Jeffrey Pennington et al. It is a huge dataset. I suggest that you
    download ([`http://nlp.stanford.edu/data/glove.6B.zip`](http://nlp.stanford.edu/data/glove.6B.zip))
    this set to your local drive before starting on this project. Unzip the downloaded
    `glove*.zip` file. It contains the word to vectors in four different dimensions
    – 50, 100, 200, and 300. The glove files are explained in detail later. These
    are the text files with names `glove.6B.50d.txt`, `glove.6B.100d.txt`, `glove.6B.200d.txt`,
    and `glove.6B.300d.txt`. I have used 200 dimension files in the code. Copy all
    these files into your Google Drive so that your Colab project can access it.


    After completing this download, you are now ready to create your project.


    ## Creating Project


    Open the new Colab document and rename it to `NMT`. Import the following libraries:


    ```python

    import tensorflow as tf

    from tensorflow.keras.models import Model

    from tensorflow.keras.layers import Input,

    Dense, LSTM, Embedding, Bidirectional,

    RepeatVector, Concatenate, Activation,

    Dot, Lambda

    from tensorflow.keras.preprocessing.text

    import Tokenizer

    from tensorflow.keras.preprocessing.sequence

    import pad_sequences

    from keras import preprocessing, utils

    import numpy as np

    import matplotlib.pyplot as plt

    ```


    ## Downloading Translation Dataset


    Download the Spanish to English translation dataset from the book’s repository:


    ```python

    !pip install wget

    import wget

    url = ''https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch08/spa.txt''wget.download(url,''spa.txt'')

    ```'
