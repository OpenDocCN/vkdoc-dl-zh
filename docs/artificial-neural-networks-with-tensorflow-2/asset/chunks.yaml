    print('Number of sequences:', int(len(x_data)/maxlen))\n\n# scale and transform\
    \ data\nx = np.reshape(x_data, (nb_chars, maxlen, 1))\nn_vocab = len(chars)\n\
    x = x/float(n_vocab)\nx.shape\n\ny = tf.keras.utils.to_categorical(y_data)\nprint(\"\
    The shape of x_training data : \", x.shape)\nprint(\"The shape of y_training data\
    \ : \", y.shape)\n\nModel = tf.keras.Sequential([\n    tf.keras.layers.LSTM(800,\
    \ input_shape=(len(x[1]), 1), return_sequences=True),\n    tf.keras.layers.Dropout(0.2),\n\
    \    tf.keras.layers.LSTM(800, return_sequences=True),\n    tf.keras.layers.Dropout(0.2),\n\
    \    tf.keras.layers.LSTM(800),\n    tf.keras.layers.Dropout(0.2),\n    tf.keras.layers.Dense(len(y[1]),\
    \ activation='softmax')\n])\n\nModel.compile(loss='categorical_crossentropy',\
    \ optimizer='adam')\n\nfilepath = \"model_weights_saved.hdf5\"\ncheckpoint = ModelCheckpoint(filepath,\
    \ monitor='loss', verbose=1, save_best_only=True, mode='min')\nmodel_callbacks\
    \ = [checkpoint]\n\nepoch_number = 0\nfilename = 'predictions.txt'\nfile = open(filename,\
    \ 'w')\nfile.truncate()\nfile.close()\n\nclass CustomCallback(tf.keras.callbacks.Callback):\n\
