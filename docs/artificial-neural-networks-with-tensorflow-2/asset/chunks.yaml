    编码器和解码器都包含少量 `Conv2D` 层。编码器通过一系列层对图像进行下采样以提取其特征，而解码器则通过其自身的层集，尝试使用不同位置的上采样并为灰度图像添加颜色来重建原始图像，最终生成尺寸为
