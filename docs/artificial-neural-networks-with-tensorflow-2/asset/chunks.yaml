- fmt: '### Scaling Numerical Values


    As the features in the real data can have a wide range of data values, machine
    learning would work better if we standardized all these data points to the same
    scale. Ideally, the mean for each column should be 0, and the standard deviation
    should be 1 for better results on machine learning. So we transform all our data
    points using the equation:


    ```

    z = (x - mu) / s

    ```


    where `mu` is mean and `s` is standard deviation. This standardization is performed
    by using the `StandardScaler` function of `sklearn` as shown in this code snippet:


    ```

    from sklearn.preprocessing import StandardScaler

    scaler = StandardScaler()

    X = scaler.fit_transform(X)

    ```


    At this point, our preprocessing of data is completed. We are now ready to define
    and train the model. When we train the model, we also need to validate our training.
    If the results of the training do not meet our expectations, we will need to further
    preprocess the data – like adjusting the number of features and so on. For testing,
    we will reserve a part of the data. Thus, we split our entire preprocessed data
    – a larger portion used for training and the smaller portion for testing the trained
    model.


    ### Creating Training and Testing Datasets


    To split the data into two portions, we use the `train_test_split` method of `sklearn`
    as in the following program statement:


    ```

    # Split dataset into training and testing

    from sklearn.model_selection import train_test_split

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size = 0.3)

    ```


    The `test_size` parameter determines what percentage of data should be reserved
    for testing. The function returns a set of vectors for training and testing.


    Many times, the terms validation and test datasets are used interchangeably. To
    avoid further confusions, I am giving widely accepted unambiguous definitions
    of these terms:


    * **Training dataset** – The part of data that is used for model fitting.

    * **Validation dataset** – The part of data used for tuning hyperparameters during
    training.

    * **Test dataset** – The part of data used for evaluating a model’s performance
    after its training.


    Now, it is time to define our network.


    ### Defining ANN


    After preprocessing, we have 11 features in our dataset. The number of features
    is determined by computing the shape of the training dataset with the following
    statement:


    ```

    X_train.shape[1]

    ```


    The expected output of the network is a binary value indicating the likelihood
    of the customer leaving the bank. The target values are specified in the `y_train`
    vector.


    You will create a four-layer deep learning network model. In the first layer,
    you will use 128 nodes, the second one will have 64, the third one will have 32,
    and the fourth will be a single output node. To create the network, you use `tf.keras`
    API, which is a new standard in TensorFlow. You use `Sequential` API to create
    a linear stack of layers. You instantiate the model using the following statement:


    ```

    model = keras.models.Sequential()

    ```


    You add the first layer to the stack consisting of 128 nodes using the following
    statement:


    ```

    model.add(keras.layers.Dense(128, activation = ''relu'',

    input_dim = X_train.shape[1]))

    ```


    The input dimension to this layer is set in the parameter `input_dim`, which is
    the number of features defined by the shape of `X_train` vector. We use ReLU (rectified
    linear unit) as the activation function. The activation function is used in deciding
    whether the node is to be activated depending on its weighted sum. ReLU is the
    most widely used activation function that outputs 0 for negative inputs and 1
    otherwise.


    Likewise, you add the second layer to the network using the following statement:


    ```

    model.add(keras.layers.Dense(64, activation = ''relu''))

    ```


    The input to this layer comes from the previous layer so there is no need to specify
    the dimensions of the input vector. The third layer is added using the statement:


    ```

    model.add(keras.layers.Dense(32, activation = ''relu''))

    ```


    Finally, the last layer in the network is added using the statement:


    ```

    model.add(keras.layers.Dense(1, activation = ''sigmoid''))

    ```


    We use sigmoid as the activation function here as this layer is outputting a binary
    value. A sigmoid function is a type of activation function and is also known as
    a squashing function. A squashing function limits the output to a range between
    0 and 1, making it suitable in predicting probabilities.


    You print the network summary by calling the `summary` function as follows:


    ```

    model.summary()

    ```


    The summary as printed on the screen is shown here:


    ```

    Model: "sequential"

    _______________________________________________________________

    Layer (type)                 Output Shape              Param #

    ===============================================================

    dense (Dense)                (None, 128)               1536

    _______________________________________________________________

    dense_1 (Dense)              (None, 64)                8256

    _______________________________________________________________

    dense_2 (Dense)              (None, 32)                2080

    _______________________________________________________________

    dense_3 (Dense)              (None, 1)                 33

    ===============================================================

    Total params: 11,905

    Trainable params: 11,905

    Non-trainable params: 0

    _______________________________________________________________

    ```


    #### Compiling Model


    After the model architecture is defined, it needs to be compiled. To compile the
    model, you call the model’s `compile` method:


    ```

    model.compile(loss = ''binary_crossentropy'',

    optimizer=''adam'', metrics=[''accuracy''])

    ```


    As the model that we are developing is a binary classifier, we use the `binary_crossentropy`
    as our loss function. We use `Adam` optimizer while training the model as this
    is suited best in such situations. Later on after the training, if you are not
    satisfied with the model’s performance, you may experiment with other optimizers.
    The accuracy metrics are collected for analysis by specifying the value for `metrics`
    parameter.


    I will also show you how to use TensorBoard for analyzing the network performance.
    For this, we need to define a callback function which will be called at each epoch
    during training. We will be collecting the logs in the `log` folder. To clear
    the earlier log, we use the following action:


    ```

    !rm -rf ./log/

    ```


    You define the callback function using the following code snippet:


    ```

    #tensorboard visualization

    import datetime, os

    logdir = os.path.join("log",

    datetime.datetime.now().strftime("%Y%m%d-%H%M%S"))

    tensorboard_callback = tf.keras.callbacks.TensorBoard(logdir,

    histogram_freq = 1)

    ```


    With this setup for training analysis and the compilation of the model, we are
    now ready to start the training.


    ### Model Training


    To train the model, you use the `fit` method on the model instance:


    ```

    r = model.fit(X_train, y_train, batch_size = 32, epochs = 50,

    validation_data = (X_test, y_test),

    callbacks = [tensorboard_callback])

    ```


    The first parameter to the `fit` function defines the features vector and the
    second defines the labels. The `batch_size` parameter as the name suggests defines
    the batch size for the training. The `epochs` parameter determines how many iterations
    would be performed during training. The test data that we generated during data
    preprocessing is used for model validation and is passed to the `fit` function
    in the `validation_data` parameter. Lastly, the `callbacks` parameter specifies
    which callback function would be called at the end of each iteration. The partial
    output during training is shown in Figure [2-14](#495303_1_En_2_Chapter.xhtml#Fig14).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig14_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    Program output during training


    Once the training is over, you can use the collected metrics to evaluate if the
    model is trained to your desired accuracy.'
  raw: '#### Scaling Numerical Values


    As the features in the real data can have a wide range of data values, machine
    learning would work better if we standardized all these data points to the same
    scale. Ideally, the mean for each column should be 0, and the standard deviation
    should be 1 for better results on machine learning. So we transform all our data
    points using the equation:


    ```

    z = (x - mu) / s

    ```


    where mu is mean and s is standard deviation. This standardization is performed
    by using the StandardScaler function of sklearn as shown in this code snippet:


    ```

    from sklearn.preprocessing import StandardScaler

    scaler = StandardScaler()

    X = scaler.fit_transform(X)

    ```


    At this point, our preprocessing of data is completed. We are now ready to define
    and train the model. When we train the model, we also need to validate our training.
    If the results of the training do not meet our expectations, we will need to further
    preprocess the data – like adjusting the number of features and so on. For testing,
    we will reserve a part of the data. Thus, we split our entire preprocessed data –
    a larger portion used for training and the smaller portion for testing the trained
    model.


    #### Creating Training and Testing Datasets


    To split the data into two portions, we use the train_test_split method of sklearn
    as in the following program statement:


    ```

    # Split dataset into training and testing

    from sklearn.model_selection import train_test_split

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size = 0.3)

    ```


    The test_size parameter determines what percentage of data should be reserved
    for testing. The function returns a set of vectors for training and testing.


    Many times, the terms validation and test datasets are used interchangeably. To
    avoid further confusions, I am giving widely accepted unambiguous definitions
    of these terms:


    *   **Training dataset** – The part of data that is used for model fitting.


    *   **Validation dataset** – The part of data used for tuning hyperparameters
    during training.


    *   **Test dataset** – The part of data used for evaluating a model’s performance
    after its training.


    Now, it is time to define our network.


    ### Defining ANN


    After preprocessing, we have 11 features in our dataset. The number of features
    is determined by computing the shape of the training dataset with the following
    statement:


    ```

    X_train.shape[1]

    ```


    The expected output of the network is a binary value indicating the likelihood
    of the customer leaving the bank. The target values are specified in the y_train
    vector.


    You will create a four-layer deep learning network model. In the first layer,
    you will use 128 nodes, the second one will have 64, the third one will have 32,
    and the fourth will be a single output node. To create the network, you use tf.keras
    API, which is a new standard in TensorFlow. You use Sequential API to create a
    linear stack of layers. You instantiate the model using the following statement:


    ```

    model = keras.models.Sequential()

    ```


    You add the first layer to the stack consisting of 128 nodes using the following
    statement:


    ```

    model.add(keras.layers.Dense(128, activation = ''relu'',

    input_dim = X_train.shape[1]))

    ```


    The input dimension to this layer is set in the parameter input_dim, which is
    the number of features defined by the shape of X_train vector. We use ReLU (rectified
    linear unit) as the activation function. The activation function is used in deciding
    whether the node is to be activated depending on its weighted sum. ReLU is the
    most widely used activation function that outputs 0 for negative inputs and 1
    otherwise.


    Likewise, you add the second layer to the network using the following statement:


    ```

    model.add(keras.layers.Dense(64, activation = ''relu''))

    ```


    The input to this layer comes from the previous layer so there is no need to specify
    the dimensions of the input vector. The third layer is added using the statement:


    ```

    model.add(keras.layers.Dense(32, activation = ''relu''))

    ```


    Finally, the last layer in the network is added using the statement:


    ```

    model.add(keras.layers.Dense(1, activation = ''sigmoid''))

    ```


    We use sigmoid as the activation function here as this layer is outputting a binary
    value. A sigmoid function is a type of activation function and is also known as
    a squashing function. A squashing function limits the output to a range between
    0 and 1, making it suitable in predicting probabilities.


    You print the network summary by calling the summary function as follows:


    ```

    model.summary()

    ```


    The summary as printed on the screen is shown here:


    ```

    Model: "sequential"

    _______________________________________________________________

    Layer (type)                 Output Shape              Param #

    ===============================================================

    dense (Dense)                (None, 128)               1536

    _______________________________________________________________

    dense_1 (Dense)              (None, 64)                8256

    _______________________________________________________________

    dense_2 (Dense)              (None, 32)                2080

    _______________________________________________________________

    dense_3 (Dense)              (None, 1)                 33

    ===============================================================

    Total params: 11,905

    Trainable params: 11,905

    Non-trainable params: 0

    _______________________________________________________________

    ```


    #### Compiling Model


    After the model architecture is defined, it needs to be compiled. To compile the
    model, you call the model’s compile method:


    ```

    model.compile(loss = ''binary_crossentropy'',

    optimizer=''adam'', metrics=[''accuracy''])

    ```


    As the model that we are developing is a binary classifier, we use the binary_crossentropy
    as our loss function. We use Adam optimizer while training the model as this is
    suited best in such situations. Later on after the training, if you are not satisfied
    with the model’s performance, you may experiment with other optimizers. The accuracy
    metrics are collected for analysis by specifying the value for metrics parameter.


    I will also show you how to use TensorBoard for analyzing the network performance.
    For this, we need to define a callback function which will be called at each epoch
    during training. We will be collecting the logs in the log folder. To clear the
    earlier log, we use the following action:


    ```

    !rm -rf ./log/

    ```


    You define the callback function using the following code snippet:


    ```

    #tensorboard visualization

    import datetime, os

    logdir = os.path.join("log",

    datetime.datetime.now().strftime("%Y%m%d-%H%M%S"))

    tensorboard_callback = tf.keras.callbacks.TensorBoard(logdir,

    histogram_freq = 1)

    ```


    With this setup for training analysis and the compilation of the model, we are
    now ready to start the training.


    ### Model Training


    To train the model, you use the fit method on the model instance:


    ```

    r = model.fit(X_train, y_train, batch_size = 32, epochs = 50,

    validation_data = (X_test, y_test),

    callbacks = [tensorboard_callback])

    ```


    The first parameter to the fit function defines the features vector and the second
    defines the labels. The batch_size parameter as the name suggests defines the
    batch size for the training. The epochs parameter determines how many iterations
    would be performed during training. The test data that we generated during data
    preprocessing is used for model validation and is passed to the fit function in
    the validation_data parameter. Lastly, the callbacks parameter specifies which
    callback function would be called at the end of each iteration. The partial output
    during training is shown in Figure [2-14](#495303_1_En_2_Chapter.xhtml#Fig14).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig14_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    Program output during training


    Once the training is over, you can use the collected metrics to evaluate if the
    model is trained to your desired accuracy.'
  trans: '

    ### 缩放数值


    由于真实数据中的特征可能具有很宽的数据值范围，如果我们将所有这些数据点标准化到同一尺度，机器学习的效果会更好。理想情况下，为了使机器学习获得更好的结果，每列的平均值应为
    0，标准差应为 1。因此，我们使用以下方程对所有数据点进行变换：


    ```

    z = (x - mu) / s

    ```


    其中 `mu` 是平均值，`s` 是标准差。这种标准化通过使用 `sklearn` 的 `StandardScaler` 函数来执行，如下代码片段所示：


    ```

    from sklearn.preprocessing import StandardScaler

    scaler = StandardScaler()

    X = scaler.fit_transform(X)

    ```


    至此，我们的数据预处理工作已完成。我们现在准备定义并训练模型。在训练模型时，我们还需要验证训练过程。如果训练结果不符合我们的预期，我们将需要进一步预处理数据——例如调整特征数量等。为了进行测试，我们将保留一部分数据。因此，我们将整个预处理后的数据分割开——大部分用于训练，小部分用于测试训练好的模型。


    ### 创建训练集和测试集


    为了将数据分成两部分，我们使用 `sklearn` 的 `train_test_split` 方法，如下面的程序语句所示：


    ```

    # 将数据集分割为训练集和测试集

    from sklearn.model_selection import train_test_split

    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size = 0.3)

    ```


    `test_size` 参数决定了应保留多少百分比的数据用于测试。该函数返回一组用于训练和测试的向量。


    很多时候，验证集和测试集这两个术语会被混用。为了避免混淆，我在此给出这些术语被广泛接受的明确定义：


    *   **训练集** – 用于模型拟合的那部分数据。

    *   **验证集** – 在训练期间用于调整超参数的那部分数据。

    *   **测试集** – 在模型训练后用于评估其性能的那部分数据。


    现在，是时候定义我们的网络了。


    ### 定义人工神经网络


    预处理后，我们的数据集中有 11 个特征。特征的数量通过以下语句计算训练数据集的形状来确定：


    ```

    X_train.shape[1]

    ```


    网络的预期输出是一个二进制值，指示客户离开银行的可能性。目标值在 `y_train` 向量中指定。


    你将创建一个四层深度学习网络模型。在第一层，你将使用 128 个节点，第二层有 64 个，第三层有 32 个，第四层是一个单一的输出节点。为了创建网络，你使用
    `tf.keras` API，这是 TensorFlow 中的一个新标准。你使用 `Sequential` API 来创建层的线性堆叠。你使用以下语句实例化模型：


    ```

    model = keras.models.Sequential()

    ```


    你使用以下语句将包含 128 个节点的第一层添加到堆叠中：


    ```

    model.add(keras.layers.Dense(128, activation = ''relu'',

    input_dim = X_train.shape[1]))

    ```


    该层的输入维度在参数 `input_dim` 中设置，该参数是由 `X_train` 向量的形状定义的特征数量。我们使用 ReLU（修正线性单元）作为激活函数。激活函数用于根据节点的加权和来决定该节点是否被激活。ReLU
    是使用最广泛的激活函数，它对负输入输出 0，否则输出 1。


    同样，你使用以下语句将第二层添加到网络中：


    ```

    model.add(keras.layers.Dense(64, activation = ''relu''))

    ```


    该层的输入来自前一层，因此无需指定输入向量的维度。使用以下语句添加第三层：


    ```

    model.add(keras.layers.Dense(32, activation = ''relu''))

    ```


    最后，使用以下语句添加网络中的最后一层：


    ```

    model.add(keras.layers.Dense(1, activation = ''sigmoid''))

    ```


    我们在这里使用 sigmoid 作为激活函数，因为这一层输出的是二进制值。sigmoid 函数是一种激活函数，也称为挤压函数。挤压函数将输出限制在 0 到
    1 之间，使其适用于预测概率。


    你通过调用 `summary` 函数来打印网络摘要，如下所示：


    ```

    model.summary()

    ```


    屏幕上打印的摘要如下所示：


    ```

    Model: "sequential"

    _______________________________________________________________

    Layer (type)                 Output Shape              Param #

    ===============================================================

    dense (Dense)                (None, 128)               1536

    _______________________________________________________________

    dense_1 (Dense)              (None, 64)                8256

    _______________________________________________________________

    dense_2 (Dense)              (None, 32)                2080

    _______________________________________________________________

    dense_3 (Dense)              (None, 1)                 33

    ===============================================================

    Total params: 11,905

    Trainable params: 11,905

    Non-trainable params: 0

    _______________________________________________________________

    ```


    #### 编译模型


    在模型架构定义之后，需要对其进行编译。要编译模型，你调用模型的 `compile` 方法：


    ```

    model.compile(loss = ''binary_crossentropy'',

    optimizer=''adam'', metrics=[''accuracy''])

    ```


    由于我们正在开发的模型是一个二元分类器，我们使用 `binary_crossentropy` 作为损失函数。我们在训练模型时使用 `Adam` 优化器，因为它最适合这种情况。在训练之后，如果你对模型的性能不满意，你可以尝试其他优化器。通过为
    `metrics` 参数指定值，可以收集准确率指标用于分析。


    我还将向你展示如何使用 TensorBoard 来分析网络性能。为此，我们需要定义一个回调函数，该函数将在训练期间的每个 epoch 被调用。我们将把日志收集在
    `log` 文件夹中。要清除之前的日志，我们使用以下操作：


    ```

    !rm -rf ./log/

    ```


    你使用以下代码片段定义回调函数：


    ```

    #tensorboard 可视化

    import datetime, os

    logdir = os.path.join("log",

    datetime.datetime.now().strftime("%Y%m%d-%H%M%S"))

    tensorboard_callback = tf.keras.callbacks.TensorBoard(logdir,

    histogram_freq = 1)

    ```


    完成训练分析的设置和模型的编译后，我们现在可以开始训练了。


    ### 模型训练


    要训练模型，你在模型实例上使用 `fit` 方法：


    ```

    r = model.fit(X_train, y_train, batch_size = 32, epochs = 50,

    validation_data = (X_test, y_test),

    callbacks = [tensorboard_callback])

    ```


    `fit` 函数的第一个参数定义了特征向量，第二个参数定义了标签。`batch_size` 参数顾名思义定义了训练的批次大小。`epochs` 参数决定了训练期间将执行多少次迭代。我们在数据预处理期间生成的测试数据用于模型验证，并通过
    `validation_data` 参数传递给 `fit` 函数。最后，`callbacks` 参数指定了每次迭代结束时将调用哪个回调函数。训练期间的部分输出如图
    2-14 所示。


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig14_HTML.jpg](img/495303_1_En_2_Fig14_HTML.jpg)


    图 2-14


    训练期间的程序输出


    训练结束后，你可以使用收集到的指标来评估模型是否训练到了你期望的准确率。

