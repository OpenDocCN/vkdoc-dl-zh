  trans: '

    ### 图像数据集


    本项目将使用的图像数据集由加拿大高等研究院（CIFAR）创建。该数据集向公众开放，旨在鼓励人们开发图像识别技术。CIFAR 研究院的研究人员创建了两个数据集：CIFAR-10
    和 CIFAR-100。这两个数据集均由 60000 张 32x32 像素的彩色图像组成。CIFAR-10 图像分为 10 个类别，包含猫、鸟、船、飞机等类别。每个类别有
    6000 张图像，并且这些图像经过适当随机化处理，适合用作机器学习数据集。请注意，在第 2 章学习二元分类时，我们需要自行对数据进行随机化处理。CIFAR-10
    数据集也适当地划分为训练集和测试集：训练集包含 50000 张图像，其余 10000 张图像属于测试集。图 3-10 展示了一组示例图像及其类别，以便您快速了解所提供的图像数据。


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig10_HTML.jpg](img/495303_1_En_3_Fig10_HTML.jpg)


    图 3-10：CIFAR-10 示例图像


    请注意，所有图像都具有固定尺寸——32x32 像素。这是机器学习所必需的。您不能将不同尺寸的图像输入到机器学习算法中。神经网络的输入始终是预先确定的固定尺寸。分辨率可变的图像包含数量不等的像素，因此无法输入到预设拓扑结构的网络中。幸运的是，CIFAR
    数据集的创建者不辞辛劳地将所有真实图像缩小到固定的微型尺寸。请注意，如果您尝试使用真实世界中的图像（例如 512x512 像素或更大）来训练模型，那么人工神经网络所需的输入点（像素）数量将非常庞大。这直接意味着需要训练大量的“权重”，从而需要巨大的处理能力和时间。当图像缩小到
    32x32 像素时，显然会丢失数据；但是，您会发现，在这些精简后的图像上进行训练，仍然能产生出色的结果，并且在现实世界中识别未见过的对象时，也能获得非常可接受的结果。


    CIFAR-100 数据集与 CIFAR-10 类似，不同之处在于它代表 100 个类别而非 10 个。每个类别进一步分为粗粒度和细粒度。例如，一个名为“人”的超类包含“婴儿”、“男孩”、“女孩”、“男人”和“女人”这些子类。


    本项目将使用 CIFAR-10 数据集。那么，让我们开始将此数据集加载到程序中。


    ### 加载数据集


    `tf.keras` 集成提供了几个内置数据库，方便您进行模型开发。这些数据库也包括 CIFAR-10。这些数据库位于 `tf.keras.dataset`
    模块中。可以使用以下两行代码将可用数据集的列表打印到控制台：


    ```python

    import tensorflow_datasets as tfds

    print ("数据集数量: ", len(tfds.list_builders()))

    tfds.list_builders()

    ```


    以下是输出结果的部分列表，供您快速参考。


    ```

    数据集数量: 141

    [''abstract_reasoning'',

    ''aeslc'',

    ''aflw2k3d'',

    ''amazon_us_reviews'',

    ''arc'',

    ''bair_robot_pushing_small'',

    ''big_patent'',

    ''bigearthnet'',

    ''billsum'',

    ''binarized_mnist'',

    ''binary_alpha_digits'',

    ''c4'',

    ''caltech101'',

    ''caltech_birds2010'',

    ...

    ```


    正如您可能注意到的，目前有 141 个数据集可供您使用。您将使用 `cifar10` 数据集来开发当前应用程序。


    ### 创建训练/测试数据集


    在上一章开发的二元分类器中，您使用了 `sklearn` 的 `train_test_split` 方法来创建训练集和测试集。现在，`keras.datasets`
    提供了一个 `load_data` 方法，可以通过一次调用创建训练集和测试集。使用以下语句从内置的 CIFAR 数据集中创建这些数据集。


    ```python

    (x_train, y_train), (x_test, y_test) = tf.keras.datasets.cifar10.load_data()

    ```


    数据加载后，您将在四个变量中获得特征数组和标签数组。您可以使用以下代码段检查可用于训练和测试的图像数量：


    ```python

    print("x_train 维度 : ",x_train.shape)

    print("x_test 维度  : ",x_test.shape)

    print("y_train 维度 : ",y_train.shape)

    print("y_test 维度  : ",y_test.shape)

    ```


    执行上述代码后，您将看到以下输出：


    ```

    x_train 维度 :  (50000, 32, 32, 3)

    x_test 维度  :  (10000, 32, 32, 3)

    y_train 维度 :  (50000, 1)

    y_test 维度  :  (10000, 1)

    ```


    从 `x_train` 的大小可知，训练集中有 50000 张图像，每张图像为 32x32 像素，每个像素具有三个 RGB 值，代表其颜色。`x_test`
    的形状表明测试数据集包含 10000 张图像。对于 `x_train` 中的每张图像，`y_train` 中都有一个 0 到 9 范围内的特定整数值。`y_train`
    成为我们机器学习的标签。我们将使用 `x_train` 来训练模型，使用 `x_test` 来评估模型的性能。


    如果您好奇内存中加载了什么，可以尝试使用以下代码在控制台上打印其中一张图像：


    ```python

    import matplotlib.pyplot as plt

    plt.imshow(x_train[40])

    ```


    执行上述代码将显示索引值为 40 的图像。该图像如图 3-11 所示。


    ![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig11_HTML.jpg](img/495303_1_En_3_Fig11_HTML.jpg)


    图 3-11：数据集中的示例图像


    很明显，这张 32x32 像素的图像几乎无法让您猜测它包含什么？但是，正如我所说，对于我们的机器学习算法来说，这种尺寸的图像足以用于训练。现在，我们将准备用于模型训练的训练数据集。


    ### 准备模型训练数据


    如前所述，我们将使用 `x_train` 来训练模型。您需要保留一部分数据用于训练阶段的验证。我们将保留 5% 的训练数据用于验证。


    #### 创建验证数据集


    为了将训练数据拆分为实际的训练数据集和验证数据集，我们使用 `sklearn` 的拆分方法，如下面的代码段所示：


    ```python

    from sklearn.model_selection import train_test_split

    x_train, x_val, y_train, y_val = train_test_split(x_train, y_train, test_size
    = 0.05, random_state = 0)

    ```


    在这里，我们保留 5% 的训练数据用于模型训练期间的验证。`x_val` 和 `y_val` 分别代表我们的特征和标签验证数据集。接下来，我们将对数据进行增强。

    '
- fmt: '#### Augmenting Data


    Before I explain how to augment data, let me explain what is augmentation and
    why is it necessary in machine learning? Data augmentation is a strategy used
    by data scientists to increase the diversity of data available during model training.
    The raw data collected in the field may exhibit uniformity leading to unperfect
    training. The augmentation avoids the need of collecting new data for diversity.
    Some of the techniques used for augmentation are cropping, padding and horizontal
    flipping. For augmenting image data, Keras preprocessing module provides a `ImageDataGenerator`
    class. You instantiate this class using the following code segment:


    ```

    from tensorflow.keras.preprocessing.image import ImageDataGenerator

    datagen = ImageDataGenerator(

    rotation_range=15,

    width_shift_range=0.1,

    height_shift_range=0.1,

    horizontal_flip=True, )

    ```


