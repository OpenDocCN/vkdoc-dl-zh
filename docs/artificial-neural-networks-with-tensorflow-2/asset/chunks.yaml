    ```


    ## Further Work


    The work done by Andrej Karpathy on text generation is worth mentioning, which
    is published in his famous blog *The Unreasonable Effectiveness of Recurrent Neural
    Networks* ([`http://karpathy.github.io/2015/05/21/rnn-effectiveness/`](http://karpathy.github.io/2015/05/21/rnn-effectiveness/)).
    For his experiments, he has used Shakespeare literature, Wikipedia articles, LaTeX
    (Algebraic Geometry language text), and even Linux source code. The results produced
    after an exhaustive training are fabulous. He is able to generate fantastic mathematical
    equations which are most of the time syntactically correct. His model is able
    to generate computer source code which is almost compilable. This can be considered
    as a great proof that text generation using LSTMs is practically possible to generate
    quality text.


    From the two examples that I have discussed, you can easily understand that it
    takes lots of resources and time to train an LSTM for generating quality text.
    It would also require some experimentation on your side to achieve the best results.
    Here are a few tips that you will like to consider while fine-tuning your text
    generation applications:


    *   To save the training time, reduce the vocabulary size by removing unwanted
    characters.


    *   Add more LSTM and Dropout layers with more LSTM units in each layer.


    *   Try tweaking hyperparameters such as batch size, optimizer, and sequence length
    and see which works best.


    *   Try a large number of epochs.


    *   Use a large text corpus.


    ## Summary


    In this chapter, you studied a new neural network architecture and that is RNN.
    LSTM is a special case of RNN. The traditional DNNs do not have the ability to
    remember, while LSTM has both long- and short-term memories. Thus, for situations
    like text generation where the memory is important, LSTMs do a fantastic job.
    You learned how to create an LSTM-based network for generating baby names and
    even quality text passages after learning from a novel by a famous author.


    In the next chapter, you will learn another language model used for language translation,
    say from English to French or Spanish to Japanese.


    # 8. Language Translation


    ## Introduction


    The first time I was transiting through Frankfurt International Airport, I had
    a tough time following the signs at the airport as I do not understand the German
    language. This was many years ago. Today, you can just point your mobile to these
    signs, and the app within your phone will provide you with the translation in
    English or maybe a language of your choice. How are these translations done? There
    is more than one technology involved behind these translations. The core is a
    machine learning model that provides a word-to-word translation using a huge vocabulary
    of the predefined words. Obviously, this kind of word-to-word or in machine learning
    terms sequence-to-sequence translation works with a great accuracy in the case
    of the airport and road signs, but it may not produce acceptable translations
    in natural language sentences. Just to give you an example, the translation of
    a question like “How are you today?” cannot be simply done by translating each
    word of the sentence independently of other words. Sophisticated models are made
    for performing such translations. Google initially used statistical language translation;
    in 2016, they started using NMT (neural machine translation). You will learn how
    to develop such a model in this chapter.'
