- fmt: '### Collecting Outputs


    We are now going to collect outputs over all time steps. First, we need to create
    initial states for feeding to our decoder.


    ```

    initial_s = Input(shape=(LATENT_DIM,), name="s0")

    initial_c = Input(shape=(LATENT_DIM,), name="c0")

    ```


    We also write a `Concatenate` function to concatenate outputs along axis 2.


    ```

    context_last_word_concat_layer = Concatenate(axis=2)

    ```


    We will iterate through all time steps to collect the outputs. We copy the initial
    states to two local variables which are used in the `for` loop later.


    ```

    s = initial_s

    c = initial_c

    ```


    We declare an `outputs` array for collecting outputs.


    ```

    outputs = []

    ```


    We iterate through all time steps by declaring a `for` loop:


    ```

    for t in range(maxlen_output): #ty times

    ```


    The `maxlen_output` for our vocabulary is nine, so the `for` loop will collect
    nine outputs.


    For the initial state, we create a context by calling our `context_attention`
    function.


    ```

    #get the context using attention mechanism

    context=context_attention(encoder_outputs,s)

    ```


    Note the parameters to the function; the first parameter is the outputs of the
    encoder, and the second parameter is the initial state of the decoder.


    We need a different layer for each time step:


    ```

    selector=Lambda(lambda x: x[:,t:t+1])

    x_t=selector(decoder_input)

    ```


    We call our `context_last_word_concat_layer` function to create an input for the
    decoder.


    ```

    decoder_lstm_input=context_last_word_concat_layer

    ([context,x_t])

    ```


    We pass the combined `[context,last word]` into the LSTM along with `s` and `c`
    to get the new `s`, `c` and output.


    ```

    out,s,c=decoder_lstm(decoder_lstm_input, initial_state=[s,c])

    ```


    We call the final `Dense` layer to get the next word prediction.


    ```

    decoder_outputs = decoder_dense(out)

    ```


    We append the output to our list.


    ```

    outputs.append(decoder_outputs)

    ```


    The complete `for` loop for collecting outputs is shown in Listing [8-2](#495303_1_En_8_Chapter.xhtml#PC87)
    for your quick reference.


    ```

    s = initial_s

    c = initial_c

    outputs = []

    #collect output in a list at first

    for t in range(maxlen_output): #ty times

    #get the context using attention mechanism

    context=context_attention(encoder_outputs,s)

    #we need a different layer for each time step

    selector=Lambda(lambda x: x[:,t:t+1])

    x_t=selector(decoder_input)

    #combine

    decoder_lstm_input=context_last_word_concat_layer

    ([context,x_t])

    #pass the combined [context,last word] into lstm

    #along with [s,c]

    #get the new[s,c] and output

    out,s,c=decoder_lstm(decoder_lstm_input,

    initial_state=[s,c])

    #final dense layer to get next word prediction

    decoder_outputs = decoder_dense(out)

    outputs.append(decoder_outputs)

    Listing 8-2

    Decoder outputs for time steps

    ```


    The `outputs` is now a list of length `t[y]`. Try printing the `outputs` using
    the following command:


    ```

    outputs

    ```


    You will get the following output:


    ```

    [,

    ,

    ,

    ,

    ,

    ,

    ,

    ,

    ]

    ```


    Each element is of shape `(batch size, output vocab size)`. If we simply stack
    all the outputs into a single tensor, it would be of shape `T x N x D`. We want
    the `N` dimension to appear first. So, we define a function to stack and transpose
    the matrix as follows. The parameter `x` is a list of length `T`; each element
    is a `batch_size * output_vocab_size` tensor.


    ```

    def stack(x):

    x=k.stack(x)

    x=k.permute_dimensions(x,pattern=(1,0,2))

    return x

    ```


    The return value is a tensor of `batch_size x T x output_vocab_size`.


    We call this function as follows to generate our final outputs:


    ```

    stacker=Lambda(stack)

    outputs=stacker(outputs)

    outputs

    ```


    This gives the following output:


    ```

    Note how the shape is changed after transposing the matrix.

    ```


    Finally, we are now ready to define our model.


    ### Defining Model


    Our final model will have an encoder, a decoder, and our initial states for the
    encoder as inputs, and the outputs would be our final outputs as generated earlier.
    The model is defined using the following statement:


    ```

    model=Model(inputs=[encoder_inputs,

    decoder_inputs,

    initial_s,

    initial_c],

    outputs=outputs)

    ```


    You can get the model summary by calling its `summary` method. The output is a
    long one. I will show you only the first few lines of the summary, which are depicted
    in Figure [8-10](#495303_1_En_8_Chapter.xhtml#Fig10).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig10_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig10_HTML.jpg)


    **Figure 8-10** Model embedding Encoder/Decoder


    The number of trainable parameters for our model is given in the following output:


    ```

    Total params: 4,670,841

    Trainable params: 4,670,841

    Non-trainable params: 0

    ```


    You can easily judge the complexity of such language models for training. Had
    we used the full dataset, the number of parameters would have been tremendously
    large.


    Try printing the visual representation of the model using the `plot_model` function:


    ```

    tf.keras.utils.plot_model (model)

    ```


    The plot is shown in Figure [8-11](#495303_1_En_8_Chapter.xhtml#Fig11).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig11_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig11_HTML.jpg)


    **Figure 8-11** Visual representation of the full model


    From this visual representation, you will be able to see the complete flow of
    language translation. Verify it for yourself how the input sequence is first embedded
    using the GloVe word to vector dictionary (embedding layer at the top-right corner),
    followed by the bidirectional Encoder and then that entire complex Decoder with
    the Attention network.


    Finally, we compile the model using the categorical cross-entropy and Adam optimizer.


    ```

    model.compile(optimizer=''adam'',

    loss=''categorical_crossentropy'',

    metrics=[''accuracy''])

    ```


    ### Model Training


    We create the initial states by taking zero as inputs.


    ```

    initial_s_training=np.zeros((NUM_SAMPLES,LATENT_DIM))

    initial_c_training =np.zeros(shape=(NUM_SAMPLES,LATENT_DIM))

    ```


    We train the model using the following statement:


    ```

    R = model.fit([encoder_input_data,

    decoder_input_data,

    initial_s_training,

    initial_c_training],

    decoder_target_one_hot,

    batch_size=100,

    epochs=100,

    validation_split=0.3)

    ```


    I trained the model for 100 epochs; each epoch took about 5 seconds on GPU.


    ### Inference


    We are now ready to test our model on some real inference. For this, we will define
    an Encoder for encoding the user input text and a decoder that does the translations.


    #### Encoding


    We create an Encoder model for encoding our input text.


    ```

    encoder_model = Model(encoder_inputs, encoder_outputs)

    ```


    The model summary is shown in Figure [8-12](#495303_1_En_8_Chapter.xhtml#Fig12).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig12_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig12_HTML.jpg)


    **Figure 8-12** Summary of the Encoder model


    You may also generate the visual representation of this model to find out where
    it is placed in our full model shown earlier in Figure [8-12](#495303_1_En_8_Chapter.xhtml#Fig12).


    ```

    tf.keras.utils.plot_model (encoder_model)

    ```


    The model plot is shown in Figure [8-13](#495303_1_En_8_Chapter.xhtml#Fig13).


    ![../images/495303_1_En_8_Chapter/495303_1_En_8_Fig13_HTML.jpg](images/495303_1_En_8_Chapter/495303_1_En_8_Fig13_HTML.jpg)


    **Figure 8-13** Encoder model visualization


    We will use this model while translating the input text.


    #### Decoding


    We will create a few variables for our Decoder model.


    ```

