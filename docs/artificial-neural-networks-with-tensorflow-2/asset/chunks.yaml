    # 2. A Closer Look at TensorFlow


    In the previous chapter, you saw the capabilities of the TensorFlow platform.
    Having seen a glimpse of TensorFlow powers, it is time now to start learning how
    to harness this power into your own real-world applications.


    We will start with a trivial application that will teach you the intricacies of
