    Now, as you have seen how to use a dense neural network classification estimator,
    I will show you how to use a premade classifier for regression problems.


    ## LinearRegressor for Regression


    As I mentioned in the previous chapter, neural networks can be used to solve regression
    problems. To support this claim, we also see a premade estimator in the TF libraries
    for supporting regression model development. I am going to discuss how to use
    this estimator in this section.


    ### Project Description


    The regression problem that we are trying to solve in this project is to determine
    the estimated selling price of a house in Boston. We will use the Airbnb dataset
    for Boston ([`www.kaggle.com/airbnb/boston`](http://www.kaggle.com/airbnb/boston))
    for this purpose. The dataset is multicolumnar and the various columns must be
    examined carefully for their suitableness as a feature in model development. Thus,
    for the regression model development, you would need to have a stringent preprocessing
    of data so that we sufficiently reduce the number of features and yet achieve
    a great amount of accuracy in predicting the house’s price.


    ### Creating Project


    As usual, create a Colab project and rename it to DNNRegressor-Estimator. Import
    the following libraries:


    ```

    import tensorflow as tf

    import pandas as pd

    import matplotlib.pyplot as plt

    import numpy as np

