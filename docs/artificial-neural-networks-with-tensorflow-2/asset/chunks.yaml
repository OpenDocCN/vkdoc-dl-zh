  raw: '## Advanced Text Generation


    In this application, we will use a text from the famous novel by Leo Tolstoy,
    *War and Peace* ([`https://cs.stanford.edu/people/karpathy/char-rnn/warpeace_input.txt`](https://cs.stanford.edu/people/karpathy/char-rnn/warpeace_input.txt)).
    The novel certainly uses many special characters such as question/exclamation
    marks, quotes, and periods. In our earlier example, we stripped such characters
    because we just wanted to generate names. In this project, I will not remove all
    such special characters because we want to create another novel or at least a
    passage that contains all such characters.


    The time required to train a complex LSTM model on such a huge corpus is very
    high; you need to make provisions for storing the model’s training state periodically.
    I will show you how to save the model’s state at every epoch. So in case of disconnection
    during training, you can continue the training from a previously known checkpoint.
    Also, I am going to add another facility of testing the model’s performance by
    asking it to predict on a fixed seed at the end of every epoch. We will be storing
    the predictions to a file in Google Drive. Thus, you can keep on training the
    model in the background and keep checking its performance periodically by examining
    the contents of the prediction file on your disk.


    ### Creating Project


    Create a new Colab project and rename it to LargeCorpusTextGeneration. Import
    the required libraries.


    ```

    import sys

    import requests

    import numpy as np

    import tensorflow as tf

    from tensorflow.keras import Sequential

    from tensorflow.keras.callbacks

    import ModelCheckpoint

    from tensorflow.keras.layers

    import Dense, Activation,

    Dropout, LSTM

    ```


    You will be saving the checkpoint data and the model’s predictions at the end
    of every epoch during training. For this, you need to mount Google Drive and point
    to the appropriate folder for saving your data.


    ```

    from google.colab import drive

    drive.mount(''/content/drive'')

    ```


    During mounting, you will be asked for the authorization. When the drive is mounted,
    you set up the folder for storing your files.


    ```

    cd ''/content/drive/My Drive/TextGenerationDemo''

    ```


    ### Loading Text


    We load the novel text into the project by making the following HTTP request:


    ```

    r = requests.get("https://cs.stanford.edu/people/karpathy/char-rnn/warpeace_input.txt")

    ```


    We read the novel text into a local variable from the response object.


    ```

    raw_txt = r.text

    ```


    We get a list of unique characters in the text and print the corpus size and the
    number of output categories:


    ```

    chars = sorted(list(set(raw_txt)))

    print("Corpus: {}".format(len(raw_txt)))

    print("Categories: {}".format(len(chars)))

    ```


    You will see the following output:


    ```

    Corpus: 3258246

    Categories: 87

    ```


    The novel has more than 3 million characters and contains 87 unique characters
    in the text. Both these figures are much larger than the ones in our baby names
    model.


    ### Processing Data


    Like in the earlier example, we need to map all the unique characters to integers
    for processing by our model. We also need to provide reverse mapping for interpreting
    the model’s output. We do this by creating the following two arrays:


    ```

    ix_to_char = {ix:char for ix,

    char in enumerate(chars)}

    char_to_ix = {char:ix for ix,

    char in enumerate(chars)}

    ```


    We then split the entire text into sequences using the following code segment:


    ```

    maxlen = 10

    x_data = []

    y_data = []

    for i in range(0, len(raw_txt) - maxlen, 1):

    in_seq  = raw_txt[i: i + maxlen]

    out_seq = raw_txt[i + maxlen]

    x_data.append([char_to_ix[char]

    for char in in_seq])

    y_data.append([char_to_ix[out_seq]])

    nb_chars = len(x_data)

    print(''Number of sequences:'',

    int(len(x_data)/maxlen))

    ```


    This code is similar to whatever you saw in the previous example. With a sequence
    size of 10, the number of created sequences is 325,823\. This is the output of
    the preceding code:


    ```

    Number of sequences: 325823

    ```


    We now scale and reshape the input data to make it suitable for feeding to our
    network.


    ```

    # scale and transform data

    x = np.reshape(x_data , (nb_chars , maxlen , 1))

    n_vocab = len(chars)

    x = x/float(n_vocab)

    ```


    We convert the output to its categories by calling the to_categorical method.


    ```

    y = tf.keras.utils.to_categorical(y_data)

    ```


    You may check the size of the input and output using the print statements:


    ```

    print("The shape of x_training data : " ,x.shape)

    print("The shape of y_training data : " ,y.shape)

    ```


    The output is


    ```

    The shape of x_training data :  (3258236, 10, 1)

    The shape of y_training data :  (3258236, 86)

    ```


    As you can see, we have large numbers of sequences. The number of inputs to the
    network will be 10 and 86 categorical outputs.


    ### Defining Model


    We define the model using the following code:


    ```

    Model = tf.keras.Sequential([

    tf.keras.layers.LSTM(800 ,

    input_shape = (len(x[1]) , 1) ,

    return_sequences = True),

    tf.keras.layers.Dropout(0.2),

    tf.keras.layers.LSTM(800,

    return_sequences = True),

    tf.keras.layers.Dropout(0.2),

    tf.keras.layers.LSTM(800),

    tf.keras.layers.Dropout(0.2),

    tf.keras.layers.Dense(len(y[1]),

    activation = ''softmax'')

    ])

    ```


    The model definition is the same as the one used in the previous example, except
    that I have increased the number of nodes in each layer considering the corpus
    size of the input text.


    The model is compiled using the typical cross-entropy and Adam optimizer.


    ```

    Model.compile(loss = ''

    categorical_crossentropy'' ,

    optimizer = ''adam'')

    ```


    Now, I will describe the most important portion of this project, and that is saving
    the model’s state and its predictions at the end of each epoch.


    ### Creating Checkpoints


    For creating checkpoints, you need to create a custom callback for the training
    method. We first assign the name for our checkpoint file.


    ```

    filepath = "model_weights_saved.hdf5"

    ```


    We use the ModelCheckpoint method to create a callback method:


    ```

    checkpoint = ModelCheckpoint(filepath,

    monitor = ''loss'', verbose = 1,

    save_best_only = True, mode = ''min'')

    ```


    In the callback function, we will monitor the loss and save the model’s training
    weights for the minimum loss value.


    We create a variable to list the number of callbacks, which in our case is only
    one.


    ```

    model_callbacks = [checkpoint]

    ```'
