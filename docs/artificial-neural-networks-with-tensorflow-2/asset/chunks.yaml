- fmt: "### A Model with 2 Convolutional Layers\n\nOur first model in the experimentation\
    \ would be a simple one consisting of only 2 convolutional layers. To define the\
    \ models, Keras provides a Sequential API that you have used earlier in Chapter\
    \ [2](#495303_1_En_2_Chapter.xhtml). You import the Sequential API using the following\
    \ statement:\n\n```\nfrom tensorflow.keras.models import Sequential\n```\n\nThe\
    \ Sequential API allows you to build a sequential network architecture where you\
    \ keep adding layers to it in a desired sequence. Keras provides several layer\
    \ types for your ready use. However, it also allows you to create the custom layers\
    \ of your own should the need arise. For this application, we will use Keras provided\
    \ layers. Some of these named layers are `Conv2D`, `Dense`, `Dropout` and `Flatten`.\
    \ You import these in your code using following program statement:\n\n```\nfrom\
    \ tensorflow.keras.layers import Dense, Dropout, Conv2D, MaxPooling2D, Flatten,\
    \ BatchNormalization\n```\n\nNow, we define our model by instantiating the `Sequential`\
    \ class as follows:\n\n```\nmodel_1 = Sequential([\n    Conv2D(32, (3, 3), activation\
    \ = 'relu', padding = 'same', input_shape = (32, 32, 3)),\n    Conv2D(32, (3,\
    \ 3), activation = 'relu', padding = 'same'),\n    MaxPooling2D((2, 2)),\n   \
    \ Flatten(),\n    Dense(128, activation = 'relu'),\n    Dense(10, activation =\
    \ 'softmax')\n])\n```\n\nAs specified in the constructor, the network consists\
    \ of 6 layers. The first layer is of type `Conv2D` which is our convolutional\
    \ layer. This consists of 32 filters of size 3x3 that runs over 32x32x3 images.\
    \ The input to the network is 32x32x3 which you would remember are the dimensions\
    \ of our `x_train` vector. The second layer is once again a convolutional layer.\
    \ The third is a `MaxPooling2D` layer followed by `Flatten`. The last two layers\
    \ are `Dense` layers - the first consists of 128 nodes with ReLU activation and\
    \ the second contains 10 nodes with softmax activation. Remember our network is\
    \ supposed to output 10 classes and thus the last layer contains 10 nodes. The\
    \ network plot can be generated using the following code:\n\n```\nfrom tensorflow.keras.utils\
    \ import plot_model\nplot_model(model_1, to_file='model1.png')\n```\n\nThe generated\
    \ plot is shown in Figure [3-16](#495303_1_En_3_Chapter.xhtml#Fig16).\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig16_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig16_HTML.jpg)\n\
    \n**Figure 3-16** Model 1 network plot\n\nThe network summary can be printed by\
    \ calling the `summary` method on the `model_1` instance and is shown below:\n\
    \n```\nModel: \"sequential\"\n_______________________________________________________________\n\
    Layer (type)                 Output Shape              Param #\n===============================================================\n\
    conv2d (Conv2D)              (None, 32, 32, 32)        896\n_______________________________________________________________\n\
    conv2d_1 (Conv2D)            (None, 32, 32, 32)        9248\n_______________________________________________________________\n\
    max_pooling2d (MaxPooling2D) (None, 16, 16, 32)        0\n_______________________________________________________________\n\
    flatten (Flatten)            (None, 8192)              0\n_______________________________________________________________\n\
    dense (Dense)                (None, 128)               1048704\n_______________________________________________________________\n\
    dense_1 (Dense)              (None, 10)                1290\n===============================================================\n\
    Total params: 1,060,138\nTrainable params: 1,060,138\nNon-trainable params: 0\n\
    ```\n\nAfter defining the network, we set the optimizer to SGD and compile the\
    \ model with the loss function set to `categorical_crossentropy` as in the following\
    \ code fragment:\n\n```\nopt = tf.keras.optimizers.SGD(lr=0.001, momentum=0.9)\n\
    model_1.compile(optimizer=opt, loss = 'categorical_crossentropy', metrics = ['accuracy'])\n\
    ```\n\nNow, we train, evaluate and display the error metrics by calling our previously\
    \ defined `results` function with `model_1` as the parameter to it.\n\n```\nresults(model_1)\n\
    ```\n\nThe output generated is shown in Figure [3-17](#495303_1_En_3_Chapter.xhtml#Fig17).\n\
    \n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig17_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig17_HTML.jpg)\n\
    \n**Figure 3-17** Model 1 error metrics\n\nAs you see the accuracy is about 66%\
    \ - obviously not within acceptable limits in most cases. Also, there is clearly\
    \ an overfitting. You can reduce overfitting through parameter optimization and\
    \ regularization. We will keep applying such techniques to improve the performance\
    \ of our model.\n\nYou will now make some prediction on an unseen image using\
    \ the following code segment:\n\n```\nimport urllib\nresource = urllib.request.urlopen(\"\
    https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch03/test01.png\"\
    )\noutput = open(\"file01.jpg\", \"wb\")\noutput.write(resource.read())\noutput.close()\n\
    predict_class(\"file01.jpg\", model_1)\n```\n\nThe output of predication is shown\
    \ in Figure [3-18](#495303_1_En_3_Chapter.xhtml#Fig18).\n\n![../images/495303_1_En_3_Chapter/495303_1_En_3_Fig18_HTML.jpg](images/495303_1_En_3_Chapter/495303_1_En_3_Fig18_HTML.jpg)\n\
    \n**Figure 3-18** The `model_1` performance\n\nNow with the hope to improve the\
    \ accuracy, we will add two more convolutional layers to our architecture."
  raw: '#### A Model with 2 Convolutional Layers


    Our first model in the experimentation would be a simple one consisting of only
    2 convolutional layers. To define the models, Keras provides a Sequential API
    that you have used earlier in Chapter [2](#495303_1_En_2_Chapter.xhtml). You import
