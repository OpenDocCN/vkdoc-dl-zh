    ## Parsing Token File


    We will now parse the token file to create a list of image names and the corresponding
    captions. You have already seen the structure of the token file – `Flickr8k.token.txt`.
    It contains a filename and a tab-separated caption text. We will create two lists,
    one containing the image path and the other for its respective caption. To keep
    the training time low, I am going to use only one caption per image. It goes without
    saying that if you use five captions per image as given in the dataset, the model
    inference would be better.


    First, we will write a function to load the contents of the token file into memory.


    ### Loading Data


    The following function loads the contents of the token file into memory and returns
    a string.


    ```

    # load doc into memory

    def load(filename):

    file = open(filename, ''r'')

    text = file.read()

    file.close()

    return text

    filename = ''/content/captions/Flickr8k.token.txt''

    doc = load(filename)

    ```


