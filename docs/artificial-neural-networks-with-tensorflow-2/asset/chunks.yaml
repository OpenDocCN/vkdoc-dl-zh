    lower than the quality predicted by the `small_model` which is 5.62.


    Let us now proceed with a more complex model.


    ### Large Model


    Now, we will add two more hidden layers to our medium model, making it a total
    of four hidden layers. We will also increase the number of neurons in each layer
    to 128. Note that adding the layers and number of neurons increases the number
    of parameters to be tuned. We once again continue using `Adam`, `mse`, and `mae`
    as before.


    #### Model Definition/Training


    In the code for model definition and training, not much changes, except for the
    two additional layers and the number of neurons. The following code segment gives
    the model definition and its training:


    ```

    large_model = tf.keras.Sequential([

    tf.keras.layers.Dense

    (128 , activation = ''relu'' ,

    input_shape = (11, )),

    tf.keras.layers.Dense

    (128 , activation = ''relu''),

    tf.keras.layers.Dense

    (128 , activation = ''relu''),

    tf.keras.layers.Dense

    (128 , activation = ''relu''),

    tf.keras.layers.Dense(1)

    ])

    large_model.compile

    (loss = ''mse'' , optimizer = ''adam'' ,

    metrics = [''mae''])

    history_large = large_model.fit

    (x_train_new , y_train ,

    batch_size = 32, epochs = 30,

    verbose = 1 , validation_data =

    (x_val_new , y_val))

    ```


    Now, let us look at the model’s performance evaluation.


    #### Model Evaluation


    The plot of the error metrics is shown in Figure [5-8](#495303_1_En_5_Chapter.xhtml#Fig8)
    which is generated by calling our `plot_learningCurve` method:


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig8_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Large model error metrics


    ```

    plot_learningCurve(history_large)

    ```


    From Figure [5-8](#495303_1_En_5_Chapter.xhtml#Fig8), you observe that the saturation
    is achieved much earlier after about three epochs. You would also notice that
    this is a larger case of overfitting. I will show you techniques of overcoming
    this overfitting in the following sections. Let us now look at the results of
    the evaluation on the test data which are shown here:


    ```

    l_test_loss , l_test_mae = large_model.evaluate

    (x_test_new , y_test ,

    batch_size = 32 , verbose = 1)

    print("large model test_loss : {}"

    .format(l_test_loss))

    print("large model test_mae : {}"

    .format(l_test_mae))

    large model test_loss : 0.5520739555358887

    large model test_mae : 0.5552783012390137

    ```


    The loss is now 0.57 and `mae` too is 0.57. I will provide you a table later on
    to compare the results of the three models. Let us now check the results on unseen
    data.


    ```

    y_large = large_model.predict(sc_x.transform

    (np.array([[6.0 , 0.28 , 0.22 , 12.15 ,

    0.048 , 42.0 , 163.0 ,

