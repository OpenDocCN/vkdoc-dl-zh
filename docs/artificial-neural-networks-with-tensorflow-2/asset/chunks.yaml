  trans: '

    在文本生成之后，本书将带你进入图像处理领域。第 10 章将教你如何处理图像，并利用你在第 7 章和第 8 章学到的 `LSTM` 架构为图像生成描述。本章涉及一个图像描述的实际项目。该项目使用预训练模型
    `InceptionV3` 进行图像处理。这是你在第 4 章学到的迁移学习的又一个实际应用。它向你展示了如何使用 Bahdanau 注意力机制创建解码器。最后，你将使用此模型为从网络获取的任何图像生成描述。


    第 11 章将带你进入机器学习的另一个领域，即时间序列分析与预测。本章提供了两个完整的项目——一个用于单变量时间序列预测，另一个用于多变量时间序列预测。


    第 12 章涉及机器学习的另一个方面，即可以将著名画家的风格应用到你自己用相机拍摄的照片上，使其看起来像那位著名画家的画作。我们称之为风格迁移。本章包含两个项目。第一个项目向你展示如何使用
    `TensorFlow` 模型库中的预训练模型快速执行风格迁移。通过这样做，你将理解什么是风格迁移。下一个项目将带你更深入地了解这项技术，你将使用预定义的
    `VGG16` 架构来提取图像和一幅名画的特征。然后，你将学习如何定义一个评估器，在风格迁移过程中比较内容和风格损失，以创建最终的风格化图片。


    第 13 章涉及另一个重要的 `DNN` 架构，称为 `GAN`（生成对抗网络）。它总共包含三个项目。第一个项目很简单，向你展示如何使用 `GAN` 生成手写数字图像。第二个项目则进一步带你生成手写字母。最后一个项目最终带你进入
    `GANs` 最先进的用途，即生成复杂的动漫彩色角色图像。


    第 14 章教你一项重要的图像处理技术，即如何为黑白图像着色。你使用 `AutoEncoder` 为图像着色。本章描述了两个项目。第一个项目向你展示如何构建你自己的
    `AutoEncoder`。第二个项目使用预训练的 `VGG16` 模型进行编码，以提高模型性能。


    本书详尽地收集了几种深度神经网络架构，并着重强调了它们在实际场景中的实用价值。那么，开始吧！


