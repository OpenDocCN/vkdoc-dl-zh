    \ for i in range(1, target.shape[1]):\n            predictions, hidden, _ = decoder(dec_input,\
    \ features, hidden)\n            loss += loss_function(target[:, i], predictions)\n\
    \            dec_input = tf.expand_dims(target[:, i], 1)\n    total_loss = (loss\
    \ / int(target.shape[1]))\n    trainable_variables = encoder.trainable_variables\
    \ + decoder.trainable_variables\n    gradients = tape.gradient(loss, trainable_variables)\n\
    \    optimizer.apply_gradients(zip(gradients, trainable_variables))\n    return\
    \ loss, total_loss\n\nfor epoch in range(start_epoch, 20):\n    start = time.time()\n\
    \    total_loss_train = 0\n    for (batch, (img_tensor, target)) in enumerate(dataset):\n\
    \        batch_loss, t_loss = train_step(img_tensor, target)\n        total_loss_train\
    \ += t_loss\n    if epoch % 5 == 0:\n        ckpt_manager.save()\n    print('Epoch\
    \ {} Train-Loss {:.4f}'.format(epoch + 1, (total_loss_train/num_steps)))\n   \
    \ print('Time taken for this epoch {} sec\\n'.format(time.time() - start))\n```\n\
    \n```python\ndef evaluate(image):\n    hidden = decoder.reset_state(batch_size=1)\n\
    \    temp_input = tf.expand_dims(load_image(image)[0], 0)\n    img_tensor_val\
    \ = image_features_extract_model(temp_input)\n    img_tensor_val = tf.reshape(img_tensor_val,\
    \ (img_tensor_val.shape[0], -1, img_tensor_val.shape[3]))\n    features = encoder(img_tensor_val)\n\
    \    dec_input = tf.expand_dims([tokenizer.word_index['<start>']], 0)\n    result\
