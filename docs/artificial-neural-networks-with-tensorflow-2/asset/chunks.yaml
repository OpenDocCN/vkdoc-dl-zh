- fmt: '#### Importing TensorFlow 2.x


    To import TensorFlow in your Python notebook, you would use the following program
    statement:


    ```

    import tensorflow as tf

    ```


    This imports the default version, which is currently 1.x (at the time of this
    writing). The output of executing the preceding command is shown in Figure [2-3](#495303_1_En_2_Chapter.xhtml#Fig3).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig3_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig3_HTML.jpg)


    Figure 2-3 — Default TensorFlow library import


    As this book is based on TensorFlow 2.x, we need to import it explicitly. To do
    so, you must run a `tensorflow_version` magic. Magic is a feature of Colab and
    is run using the following statement:


    ```

    %tensorflow_version 2.x

    ```


    When you run the code, TensorFlow 2.x will be selected. The output is shown in
    Figure [2-4](#495303_1_En_2_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig4_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig4_HTML.jpg)


    Figure 2-4 — Loading TensorFlow 2.x


    After TensorFlow 2.x is selected, you would import TensorFlow libraries using
    the traditional import statement as follows:


    ```

    import tensorflow as tf

    ```


    **Note:** The use of magic is no more required in the current version of Colab.


    Keras library is now part of TensorFlow. To use Keras in our application, we need
    to import it from TensorFlow. This is done using the following import statement:


    ```

    from tensorflow import keras

    ```


    To use Keras modules, you now use `tf.keras` syntax. Next, you will import other
    required libraries.


    #### Importing NumPy


    NumPy is a library for supporting large, multidimensional arrays in Python. It
    has a collection of high-level mathematical functions to operate on these arrays.
    Any machine learning model development relies heavily on the use of arrays. You
    will be using NumPy arrays to store the input data required by our network.


    To import NumPy, you use the following import statement:


    ```

    import numpy as np

    ```


    The `matplotlib` is a Python library for creating quality 2D plots. You will use
    this library in our project for plotting accuracy and error metrics.


    To import `matplotlib`, you use the following statement:


    ```

    import matplotlib.pyplot as plt

    ```


    This completes our imports for the application. Next, you will be creating data
    for our application.


    ### Setting Up Data


    We will create a set of 100 data points consisting of `x` and `y` coordinates.
    The count for data points is declared in the Python variable using the statement:


    ```

    number_of_datapoints = 100

    ```


    To generate `x` and `y` coordinates, you use the `random` module in NumPy. To
    generate `x` values, you use the following program statement:


    ```

    # generate random x values in the range -5 to +5

    x = np.random.uniform(low = -5 , high = 5 ,

    size = (number_of_datapoints, 1))

    ```


    The `low` and `high` parameters in the `uniform` function define the lower and
    upper bounds for the random number generator. The `size` parameter specifies the
    dimensions of the array, that is, how many values are to be generated. The return
    value of the preceding program statement is an array consisting of 100 rows and
    1 column. You can print the first five values of the generated array using the
    statement:


    ```

    x[:5,:].round(2)

    ```


    In the output, each value is truncated to two decimal digits by calling the `round`
    function. A sample output of the execution of this statement is shown here:


    ```

    array([[ 4.57],

    [-0.68],

    [ 2.64],

    [-3.17],

    [-4.86]])

    ```


    Note that the output varies on every run. Likewise, the `y` values are generated
    using a similar statement as shown here:


    ```

    y = np.random.uniform(-5 , 5 , size = (number_of_datapoints , 1))

    ```


    We set up the relation between `x` and `y` using a linear equation:


    ```

    z = 7 * x + 6 * y + 5

    ```


    In machine learning terms, the `x` and `y` are the features and `z` is the label.
    Once our model is trained, we will ask the model to predict `z` for the given
    `x` and `y`. I have mentioned it earlier that we will be training our network
    to discover the relationship between `x` and `y`. For this, we need to introduce
    some noise in every value of `z` that we compute using the preceding equation.
    You generate the noise using the `random` function as earlier with the values
    ranging from –1 to +1 using the following statement:


    ```

    noise = np.random.uniform(low =-1 , high =1,

    size = (number_of_datapoints, 1))

    ```


    Now, you create the `z` array using the linear equation and adding noise to it
    as shown in this statement:


    ```

    z = 7 * x + 6 * y + 5 + noise

    ```


    The input to our neural network is a single dimensional array consisting of 100
    rows with each row consisting of another single dimensional array having `x` and
    `y` values as columns. To create the required input data format, you use the `column_stack`
    function as follows:


    ```

    input = np.column_stack((x,y))

    ```


    Printing the first five values of the `input` array produces the following output:


    ```

    array([[-1.9 ,  2.91],

    [-2.14, -0.81],

    [ 4.18,  1.79],

    [-0.93, -4.41],

    [-1.8 , -1.31]])

    ```


    At this point, you are ready with the data for training the network. Our next
    task is to create a network itself.


    ### Defining Neural Network


    As mentioned earlier, our neural network will consist of a single neuron that
    accepts a single dimensional vector and outputs a single value. The network is
    depicted in Figure [2-5](#495303_1_En_2_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_2_Chapter/495303_1_En_2_Fig5_HTML.jpg](images/495303_1_En_2_Chapter/495303_1_En_2_Fig5_HTML.jpg)


    Figure 2-5 — A single layer/single node network


    To define the network models, Keras provides a Sequential API. Using this API,
    you will be able to construct multilevel sophisticated network architectures.
    In our current requirement, we need to create an ANN architecture consisting of
    a single layer with a single neuron. You define the model using the following
    statement:


    ```

    model = tf.keras.Sequential([keras.layers.Dense(units=1, input_shape=[1])])

    ```


    The `units` parameter defines the dimensionality of the output space. Here, by
    specifying a value of 1, you define a single layer network with a single neuron
    outputting a single value. The `Dense` function takes several parameters that
    allows you to create complex ANN architectures. You would create lots of complex
    architectures throughout this book using the `keras.Sequential` API.


    After the model is defined, we need to compile it and make it ready for training
    on our dataset.'
