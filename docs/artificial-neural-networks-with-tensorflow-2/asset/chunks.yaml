    \ loss\ncontent_layer = 'block5_conv2'\n```\n\nWe extract the style layers:\n\n\
    ```\n# Name of layers used for style loss\nstyle_layers = ['block1_conv1', 'block2_conv1',\
    \ 'block3_conv1', 'block4_conv1', 'block5_conv1']\n```\n\nWe define a few weight\
    \ variables to be used in the computation of the weighted average of the loss\
    \ components. Think of them as the hyperparameters for the style and content layers\
    \ that decide the weightage given to these layers in the final model.\n\n```\n\
    total_variation_weight = 1e-4\nstyle_weight = 10.\ncontent_weight = 0.025\n```\n\
    \nWe compute the total loss by adding all components.\n\n```\n# Define the loss\
    \ by adding all components to a `loss` variable\nloss = K.variable(0.)\nlayer_features\
    \ = outputs_dict[content_layer]\ntarget_features = layer_features[0, :, :, :]\n\
    combination_features = layer_features[2, :, :, :]\nloss = loss + content_weight\
    \ * content_loss(target_features, combination_features)\nfor layer_name in style_layers:\n\
    \    layer_features = outputs_dict[layer_name]\n    style_reference_features =\
