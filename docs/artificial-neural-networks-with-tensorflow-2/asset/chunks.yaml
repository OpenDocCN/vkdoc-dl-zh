  raw: '### Evaluating Model Performance


    You can evaluate the model’s performance by calling its evaluate method.


    ```

    model.evaluate(val_data)

    ```


    In my run, it showed me an accuracy of 80.88% as seen in the output shown in Figure
    [4-22](#495303_1_En_4_Chapter.xhtml#Fig22).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig22_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig22_HTML.jpg)


    Figure 4-22


    Model evaluation output


    Now, you will do predictions on test images to see if the model performs to our
    satisfaction.


    ### Predicting on Test Images


    The downloaded dataset contains the images for testing in a separate test folder.
    You just need to set up the path to these images and call our create_data_batches
    function to prepare a dataset for processing.


    ```

    # set up path to test images

    test_path = "/content/test"

    test_filenames = [test_path +''/''+ fname for fname in os.listdir(test_path)]

    # prepare test dataset

    test_data = create_data_batches(test_filenames, data_type = 3)

    ```


    You make the predictions by calling the predict method on the trained model.


    ```

    # Make predictions

    test_predictions = model.predict(test_data,

    verbose=1)

    ```


    When you run the preceding code, you will get an array of predictions. You can
    check the size of this array by printing its shape.


    ```

    test_predictions.shape

    ```


    You will get an output of (10357,120) indicating that 10,357 images were analyzed.
    Each item in an array is another array of 120 items. Each item indicates the probability
    of the type of dog with the corresponding index value. For example, the following
    line would print the predictions for the first image in the test data:


    ```

    test_predictions[0]

    ```


    The output in my case is shown in Figure [4-23](#495303_1_En_4_Chapter.xhtml#Fig23).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig23_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig23_HTML.jpg)


    Figure 4-23


    The 120 probabilities for the first image


    You can find out the maximum probability along with the index value at which this
    occurs by using the argmax function of numpy. The following code snippet would
    print the prediction for the first image:


    ```

    # the max probability value predicted by the model

    print(f"Max value: {np.max(predictions[0])}")

    # the index where the max value in predictions[0] occurs

    print(f"Max index: {np.argmax(predictions[0])}")

    # the predicted label

    print(f"Predicted label: {unique_breeds[np.argmax(predictions[0])]}") # the predicted
    label

    ```


    When you run the code, you will see the following output:


    ```

    Max value: 0.9999655485153198

    Max index: 84

    Predicted label: papillon

    ```


    Now, I will provide you with the code so that you can print the dog’s image, the
    predicted class, and the distribution chart of the top ten predictions. That way
    you will be able to visualize and interpret the test results better.


    ### Visualizing Test Results


    We will create two plots in each row of our output. The first plot will give the
    dog’s image along with its predicted class name. The second plot would be for
    the distribution bar chart.


    The first plotting function is given in Listing [4-5](#495303_1_En_4_Chapter.xhtml#PC71).


    ```

    def plot_pred(prediction_probabilities, images):

    image = process_image(images)

    pred_label = unique_breeds[np.argmax(prediction_probabilities)]

    plt.imshow(image)

    plt.axis(''off'')

    plt.title(pred_label)

    Listing 4-5

    Function for plotting image and prediction

    ```


    The function plot_pred takes the predicted probabilities and images arrays as
    arguments. The image is retrieved by calling the process_image function, which
    is then plotted. The label for the image is retrieved from the unique_breeds array,
    which is then printed as the plot title.


    The function for printing the bar chart of probabilities is given in Listing [4-6](#495303_1_En_4_Chapter.xhtml#PC72).


    ```

    def plot_pred_conf(prediction_probabilities):

    top_10_pred_indexes = prediction_probabilities.argsort()[-10:][::-1]

    top_10_pred_values = prediction_probabilities[top_10_pred_indexes]

    top_10_pred_labels = unique_breeds[top_10_pred_indexes]

    top_plot = plt.bar(np.arange(len(top_10_pred_labels)),

    top_10_pred_values,

    color="grey")

    plt.xticks(np.arange(len(top_10_pred_labels)),

    labels=top_10_pred_labels,

    rotation="vertical")

    top_plot[0].set_color("green")

    Listing 4-6

    Function for plotting predictions on a given image

    ```


    We obtain the top ten prediction indices by sorting the predictions array and
    then picking up the last ten entries from the sorted array. Then, we plot the
    bar chart and provide the x-axis labels as vertical text.


    You will now print the first three images along with their prediction results
    using the following code snippet:


    ```

    num_rows = 3

    plt.figure(figsize = (5 * 2, 5 * num_rows))

    for i in range(num_rows):

    plt.subplot(num_rows, 2, 2*i+1)

    plot_pred(prediction_probabilities=predictions[i],

    images=test_filenames[i])

    plt.subplot(num_rows, 2, 2*i+2)

    plot_pred_conf(prediction_probabilities=predictions[i])

    plt.tight_layout(h_pad=1.0)

    plt.show()

    ```


    The output of running this code is given in Figure [4-24](#495303_1_En_4_Chapter.xhtml#Fig24).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig24_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig24_HTML.jpg)


    Figure 4-24


    Images and prediction probabilities


    Having seen the results on test data, we will now try to predict an unknown image;
    let this be an animal other than a dog.


