    This trivial example has demonstrated how you can use well-trained models into
    your own models.


    ## Summary


    The estimators facilitate model development by providing a unified interface for
    training, evaluation, and prediction. They provide a separation of data pipeline
    from the model development, thus allowing you to experiment with different datasets
    easily. The estimators are classified as premade and custom. In this chapter,
    you learned to use the premade estimators for both classification and regression
    types of problems. The custom estimators are used for migrating the existing models
    to the estimator interface to take advantage of the benefits offered by estimators.
    An estimator-based model can be trained on a distributed environment or even on
    a CPU/GPU/TPU. Once you develop your model using the estimator, it can be deployed
    easily even on a distributed environment without any code changes. You also learned
    to use a well-trained model like VGG16 in your own model building. It is recommended
    that you use the pre-trained model wherever possible. If it does not meet your
    purpose, then think of creating custom estimators.


    # 7. Text Generation


    In this book, so far you have used vanilla neural networks, the networks that
    do not have the ability to remember their past. They accept a fixed-sized vector
    as input and produce a fixed-sized output. Consider the case of image classification
    where the input is an image and the output is one of the classes for which the
    model has been trained. Now, consider a situation where the prediction requires
    the knowledge of the previous predictions. To give you an example, consider you
    are watching a movie. Your mind keeps guessing what will be the next scene. The
    guess depends on what has happened not just in the near past but something that
    also happened 15 minutes ago or even an hour for a long movie. Our vanilla neural
    networks, in the way they work, do not have memory to remember what happened in
    the past and to apply that knowledge to the current guess.


    Take another example; I say I am from India. Okay, you have gained the knowledge
    that I am from India. After some time, you are asked to guess what language I
    speak. The probability of answering it to be the national language of India depends
    largely on the fact that you still remember that I am from India. The neural networks
    that we have seen so far are in no way in a position to solve such kind of problems.
    That is where the recurrent neural networks (RNNs) and a special version of it
    called long short-term memory (LSTM) came into the picture. In this chapter, you
    will be introduced to both RNN and LSTM, followed by an example on text generation.
    All subsequent chapters too will use these networks in solving the problems in
    different domains. So a good understanding of this chapter will help you understand
    the rest better.


    In this chapter, we will train RNN character-level language models. We will give
    a chunk of text as an input to the model, train the model to understand the sequencing
    of characters in the text, and then later on ask it to predict the probability
    of occurrence of a character for a user-defined sequence of characters. In short,
    if you are asked to predict the character that follows the character sequence
    `"hell"`, you would most likely come up with the answer `"o"`. That is the probability
    of the character `"o"` being the highest among the rest of the alphabets. We will
    train our network to perform such predictions.


    Specifically, I will discuss two text generation applications; the first application
    is a trivial one for you to get introduced to the nitty-gritties of the process.
    In this trivial application, you would train the model to generate baby names,
    based on its knowledge of the existing names. The second application is a more
    daring attempt where we will try to create a new novel after making the model
    learn the semantics and style of writing from a well-known novel.


    So, first let us try to understand what a recurrent neural network is.'
