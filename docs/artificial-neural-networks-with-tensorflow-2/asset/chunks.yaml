    as compared to the traditional methods of training. The entire training block
    is shown in Figure [1-4](#495303_1_En_1_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig4_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Training block


    I will now explain to you the individual components of the training block.


    #### Data Preparation


    Consider the Data Design block shown in Figure [1-5](#495303_1_En_1_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig5_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Data Design block


    The Data Design block shows two modules – tf.data and TF Datasets. I will discuss
    what both contain. First, I will describe tf.data.


    Model training requires data be prepared to a specific format as per the model’s
    design. The data preparation requires several steps. Firstly, you need to load
    the data from an external source and cleanse it. The cleansing process consists
    of removing rows containing null fields, mapping categorical fields to columns,
    and scaling numerical values generally to the range of –1 to +1\. Next, you will
    need to decide which columns are to be your features and what the labels are.
    You will need to eliminate the columns which are not at all relevant to model
    training. For example, the name and customer ID fields in the database would be
    totally redundant fields in machine training. Finally, you will need to split
    the data into training and testing sets. The various functions needed for all
    these mentioned data operations are provided in the tf.data module.


    TensorFlow also provides built-in datasets taken from many popular machine learning
    libraries ready for use in your tf.data package. There are more than 100 ready-to-use
    datasets, divided into several categories such as Audio, Image, Video, Text, Translate,
    and so on. Depending on your requirements, you will load the data from one of
    the categories and quickly proceed to your model development. In future, more
    may be added to this module. You will be able to load data from tf.data.dataset
    using a single program statement that also creates both training and testing sets.
    So, this saves you a lot of effort in preparing data, and you will be able to
    quickly focus on model training. Albeit, you may not be able to use dataset as
    is for feeding it into your machine learning algorithm. Numerical fields may require
    scaling. Categorical fields may require conversions. The datasets like imdb which
    is for movie reviews may require encoding to a different format. You may require
    to reshape (change dimensions) the data. Thus, some sort of preprocessing is almost
    always required on these built-in datasets. However, they still provide lots of
    convenience to ML practitioners. Incidentally, these datasets also support high-performance
    data pipelines to facilitate quick data transfer between training iterations,
    resulting in faster training.


    #### Designing Model


    The Keras API is now integrated in the TensorFlow library. You can access the
    entire API using tf.keras. The tf.keras is a high-level API that provides standardization
    to many APIs used in TF 1.x. Using tf.keras, you will be able to take advantage
    of several new features introduced in TensorFlow 2.x; as an example, your model
    development will take advantage of eager execution. Using the functional API of
    the tf.keras module, you will be able to design models with high complexity.


    TensorFlow 2.x also supplies Estimators which can be used to do a quick comparison
    between different models. The estimators block is shown in Figure [1-6](#495303_1_En_1_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig6_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    The tf.estimator block


    The estimators are provided under tf.estimator which is a high-level TensorFlow
    API. They encapsulate the various phases of machine learning like model training,
    evaluation, predicting, and exporting the model for serving through a production
    server. There are several premade estimators provided in the library; LinearClassifier
    and DNNClassifier are two examples of such premade estimators. Besides the use
    of premade estimators, you will be able to build your own custom estimators. Not
    only this, the library provides a function called model_to_estimator to convert
    the existing model to an estimator. Why would you do this? Converting a Keras
    model to an estimator would enable you to use TensorFlow’s distributed training.


    #### Distribution Strategy


    In the entire machine learning process, the most time-consuming part is the training.
    This can take from a few minutes to several days even on very sophisticated equipment.
    You may need lots of processing power and memory to train the model. Fortunately,
    TensorFlow 2.x comes to your rescue here. Look at the distribution strategy block
    shown in Figure [1-7](#495303_1_En_1_Chapter.xhtml#Fig7).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig7_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Distribution strategy block


    The model training can now be done on the CPU (central processing unit), GPU (graphics
    processing unit), or TPU (tensor processing unit). Not only this, but you can
    distribute your training across the multiple hardware units. This reduces your
    training time substantially.


    #### Analysis


    During the model training phase, you need to analyze the results at different
    stages of training. Based on this, you will reconfigure your network, modify your
    loss functions, try different optimizer, and so on. TensorFlow provides a nice
    analysis tool called TensorBoard for this very purpose, as depicted in Figure
    [1-8](#495303_1_En_1_Chapter.xhtml#Fig8).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig8_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    TensorBoard block


    TensorBoard provides the plots of various metrics, such as accuracy and loss,
    which we widely used during model training. There are several other features available
    in TensorBoard, which you will keep learning as you read the book further.'
  trans: '

    ### TensorFlow 2.x 平台


    整个平台的概念如图 1-3 所示。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig3_HTML.jpg](img/495303_1_En_1_Fig3_HTML.jpg)


    图 1-3 TensorFlow 2.x 平台


    与任何典型的机器学习项目一样，它包含三个不同的阶段。在第一阶段（也称为训练阶段），我们定义人工神经网络模型，并在给定数据上对其进行训练。同时，我们使用测试数据测试模型，并重新训练，直到对其性能满意为止。在下一阶段，我们将模型保存到一个文件中，该文件稍后可以部署到生产服务器上。在开发的第三阶段，我们将保存的模型部署到生产服务器上，准备对未见过的数据进行预测。


    现在，我将描述图 1-3 中所示所有三个阶段的各个组件。


    ### 训练


    训练包括读取数据、将其准备成模型所需的特定格式、创建模型本身，以及运行多个周期（epoch）来训练模型。TensorFlow 2.x 提供了大量函数、库和工具来促进快速训练。通常，在整个开发过程中，机器学习模型训练会占用相当多的时间。借助
    TensorFlow 2.x 提供的工具和设施，与传统的训练方法相比，你将能够在更短的时间内训练模型。整个训练模块如图 1-4 所示。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig4_HTML.jpg](img/495303_1_En_1_Fig4_HTML.jpg)


    图 1-4 训练模块


    现在，我将向你解释训练模块的各个组件。


    #### 数据准备


    考虑图 1-5 中所示的数据设计模块。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig5_HTML.jpg](img/495303_1_En_1_Fig5_HTML.jpg)


    图 1-5 数据设计模块


    数据设计模块展示了两个模块——`tf.data` 和 TF Datasets。我将讨论它们各自包含的内容。首先，我将描述 `tf.data`。


    模型训练要求根据模型的设计将数据准备成特定格式。数据准备需要几个步骤。首先，你需要从外部源加载数据并进行清洗。清洗过程包括删除包含空字段的行、将分类字段映射到列，以及通常将数值缩放到
    -1 到 +1 的范围内。接下来，你需要决定哪些列是你的特征，以及标签是什么。你需要删除那些与模型训练完全无关的列。例如，数据库中的姓名和客户 ID 字段在机器学习训练中将是完全冗余的字段。最后，你需要将数据拆分为训练集和测试集。`tf.data`
    模块提供了执行所有这些数据操作所需的各种函数。


    TensorFlow 还提供了从许多流行的机器学习库中获取的内置数据集，这些数据集已准备好可在你的 `tf.data` 包中使用。有超过 100 个即用型数据集，分为多个类别，例如音频、图像、视频、文本、翻译等。根据你的需求，你将从一个类别中加载数据，并快速进入模型开发阶段。未来，此模块可能会添加更多数据集。你将能够使用单个程序语句从
    `tf.data.dataset` 加载数据，该语句同时创建训练集和测试集。因此，这为你节省了大量准备数据的精力，并且你将能够快速专注于模型训练。尽管如此，你可能无法直接使用数据集将其输入到你的机器学习算法中。数值字段可能需要缩放。分类字段可能需要转换。像用于电影评论的
    `imdb` 这样的数据集可能需要编码为不同的格式。你可能需要重塑（改变维度）数据。因此，对这些内置数据集几乎总是需要进行某种预处理。然而，它们仍然为机器学习从业者提供了极大的便利。顺便提一下，这些数据集还支持高性能数据管道，以促进训练迭代之间的快速数据传输，从而实现更快的训练。


    #### 设计模型


    Keras API 现已集成到 TensorFlow 库中。你可以使用 `tf.keras` 访问整个 API。`tf.keras` 是一个高级 API，它为
    TF 1.x 中使用的许多 API 提供了标准化。使用 `tf.keras`，你将能够利用 TensorFlow 2.x 中引入的几个新特性；例如，你的模型开发将受益于即时执行（eager
    execution）。使用 `tf.keras` 模块的函数式 API，你将能够设计高度复杂的模型。


    TensorFlow 2.x 还提供了估算器（Estimators），可用于快速比较不同模型。估算器模块如图 1-6 所示。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig6_HTML.jpg](img/495303_1_En_1_Fig6_HTML.jpg)


    图 1-6 `tf.estimator` 模块


    估算器在 `tf.estimator` 下提供，这是一个高级 TensorFlow API。它们封装了机器学习的各个阶段，如模型训练、评估、预测以及导出模型以通过生产服务器提供服务。库中提供了几个预制的估算器；`LinearClassifier`
    和 `DNNClassifier` 就是此类预制估算器的两个例子。除了使用预制估算器，你还可以构建自己的自定义估算器。不仅如此，该库还提供了一个名为 `model_to_estimator`
    的函数，用于将现有模型转换为估算器。为什么要这样做？将 Keras 模型转换为估算器将使你能够使用 TensorFlow 的分布式训练。


    #### 分布式策略


    在整个机器学习过程中，最耗时的部分是训练。即使在非常先进的设备上，这也可能需要几分钟到几天的时间。你可能需要大量的处理能力和内存来训练模型。幸运的是，TensorFlow
    2.x 在这方面为你提供了帮助。请看图 1-7 中所示的分布式策略模块。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig7_HTML.jpg](img/495303_1_En_1_Fig7_HTML.jpg)


    图 1-7 分布式策略模块


    现在，模型训练可以在 CPU（中央处理器）、GPU（图形处理器）或 TPU（张量处理器）上进行。不仅如此，你还可以将训练分布到多个硬件单元上。这大大减少了你的训练时间。


    #### 分析


    在模型训练阶段，你需要在训练的不同阶段分析结果。基于此，你将重新配置网络、修改损失函数、尝试不同的优化器等。TensorFlow 为此提供了一个很好的分析工具，称为
    TensorBoard，如图 1-8 所示。


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig8_HTML.jpg](img/495303_1_En_1_Fig8_HTML.jpg)


    图 1-8 TensorBoard 模块


    TensorBoard 提供了各种指标的图表，例如准确率和损失，这些指标在模型训练中被广泛使用。TensorBoard 中还有其他几个功能，随着你进一步阅读本书，你将不断学习到它们。

    '
- fmt: '### Model Saving


    The model saving block from the general architecture is depicted in Figure [1-9](#495303_1_En_1_Chapter.xhtml#Fig9).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig9_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Model saving block


    The model saving consists of two parts – saving the developed model to disk and
    reusing the pre-trained models from the repository.


    After you have trained the model to your desired accuracy level, you save it to
    disk. In `TensorFlow 1.x`, there were many ways of saving the model. The `TF 2.x`
    standardized the model saving to an abstraction called `SavedModel`. The saved
    model can be directly loaded into your ML application, or it can be uploaded on
    production servers for serving. `TensorFlow 2.x` models are saved to a standardized
    format so as to enable it to be deployed on mobiles, embedded devices, and the
    Web. `TensorFlow` provides API to deploy once developed models to these different
    platforms, including the Web with the support of `JavaScript` and `Node.js`.


    The `TensorFlow Hub` as it is called is a repository of many pre-trained models.
    You use transfer learning to reuse and extend these models to meet your requirements.
    Using pre-trained models gives you the advantage of training your model with a
    smaller dataset and a quicker training. You will find models for text and image
    recognition, models trained on `Google News` dataset, and even modules for `Progressive
    GAN` and `Google Landmarks Deep Local Features`. Unfortunately, as of this writing,
    most of these models are written for `TensorFlow 1.x` and require porting to the
    newer version. Check the `TensorFlow` site for model updates, and hopefully while
    you are reading this, most of the models are updated to `TensorFlow 2.x`.


    Next, you will look at the deployment options.


    ### Deployment


    The trained model can be deployed on various platforms as shown in Figure [1-10](#495303_1_En_1_Chapter.xhtml#Fig10).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig10_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Model deployment options


    The best part of `TensorFlow 2.x` is that you will be able to deploy the trained
    model on cloud or on premises. Not only that, using `TensorFlow 2.0`, you’ll be
    able to deploy the model even on mobile devices such as `Android` and `iOS` and
    also on an embedded device like `Raspberry Pi`. You will also be able to deploy
    your model on the Web using `Node.js`. This will allow you to use the model in
    your favorite browsers. In general, the deployment may be categorized as follows:


    *   **TensorFlow Serving** – A library that allows models to be served over `HTTP/REST`
    or `gRPC/Protocol buffers`.


    *   **TensorFlow Lite** – A lightweight solution for deploying models on `Android`,
    `iOS`, and embedded systems like `Raspberry Pi` and `Edge TPUs`.


    *   **TensorFlow.js** – Enables model deployment in `JavaScript` environments
    like web browsers or server side through `Node.js`. Using `TensorFlow.js`, you
    will also be able to define models in `JavaScript` and train those directly in
    web browsers using `Keras`-like API.


    With this small introduction to `TensorFlow`, I will now briefly describe some
    of the major salient features of `TensorFlow 2.x`.


    ## What TensorFlow 2.x Offers?


    `TensorFlow 2.x` has introduced many new features compared to its earlier versions.
    I will briefly summarize the salient features of `TensorFlow 2.x`. As you read
    through this book, you will understand their use in a better way.


    ### The `tf.keras` in TensorFlow


    The `Keras` API is now available through `TensorFlow`’s `tf.keras` API. This is
    a high-level API that provides support for `TensorFlow`-specific functionalities
    such as eager execution, data pipelines, and estimators. With `tf.keras` you can
    build and train models just the way you were doing using `Keras`, without sacrificing
    flexibility and performance.


    To use `tf.keras` in your program, you will use the following code:


    ```

    import tensorflow as tf

    from tensorflow import keras

    ```


    Once `TensorFlow` libraries are loaded, you will be able to define your own neural
    network architectures, create models, and train and test them. You will learn
    this in Chapter [2](#495303_1_En_2_Chapter.xhtml) when I discuss the Hello World
    program of `TensorFlow 2.x`.


    ### Eager Execution


    Prior to `TensorFlow 2.x`, your machine learning code was divided into two parts:


    1.  Building the computational graph


    2.  Creating a session to execute the graph


    These steps can be explained using the following code:


    ```

    import tensorflow as tf

    a = 2

    b = 3

    c = tf.add(a, b, name="Add")

    print(c)

    ```


    This prints the following on your console:


    ```

    Tensor("Add:0", shape=(), dtype=int32)

    ```


    It essentially builds a graph, which can be visualized as shown in Figure [1-11](#495303_1_En_1_Chapter.xhtml#Fig11).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig11_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Computational graph


    To run the graph itself, you need to create a session as follows and run it to
    execute your add function:


    ```

    sess = tf.Session()

    print(sess.run(c))

    sess.close()

    ```


    When you run the preceding code, the result `5` will be printed on your console.


    With `TensorFlow 2.x`, you can perform the same operation without creating a session.
    The following code illustrates how this is done:


    ```

    import tensorflow as tf

    a = 2

    b = 3

    c = tf.add(a, b, name="Add")

    print(c)

    ```


    The output of executing the preceding code would be


    ```

    tf.Tensor(5, shape=(), dtype=int32)

    ```


    Note that the output tensor value is 5.


    Thus, session creation is totally eliminated. This helps a lot in building big
    models. Typically, during development, a small error may pop up somewhere in the
    beginning of the model, requiring you to build the entire computational graph
    one more time. Every time you fix a bug, you need to build the full graph. This
    causes a lot of inconvenience and is a very time-consuming process. In `TensorFlow
    2.x`, the eager execution allows you to run the partial code without the need
    of building the full computational graph. This eager execution is implemented
    by default so that you do not have to take any special considerations while defining
    the model. You may run the command `tf.executing_eagerly()` to convince yourself.


    With the elimination of session creation, the `TensorFlow` code can now be run
    like a `Python` code. `TF 2.x` creates what’s known as a dynamic computation graph
    rather than the static computational graph created in `TF 1.x`.


    ### Distribution


    The most expensive operation in ML model building is training the model. `TensorFlow
    2.x` now provides an API called `tf.distribute.Strategy` to distribute the training
    across multiple GPUs and TPUs. With this API, you will be able to distribute your
    existing models and training code with only minimal code changes. The API provides
    six distribution strategies:


    1.  `MirroredStrategy`


    2.  `CentralStorageStrategy`


    3.  `MultiWorkerMirroredStrategy`


    4.  `TPUStrategy`


    5.  `ParameterServerStrategy`


    6.  `OneDeviceStrategy`


    You may dig further into the documentation to learn more about these strategies.


    As the `tf.distribute.Strategy` is integrated into `tf.keras`, it inherently takes
    advantage of improved speed during training and also while inferencing.'
