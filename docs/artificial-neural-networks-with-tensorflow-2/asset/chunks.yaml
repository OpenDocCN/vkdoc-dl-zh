    ### 选择预训练模型


    如前所述，我们将在模型定义中使用迁移学习。为此，我们需要在 TensorFlow Hub 中寻找合适的模型。Hub 将模型分类到不同的类别下。如果您选择图像分类类别，您会发现其下列出了多个模型。其中一些模型是特定于
