    the next example, I will show you how to create handwritten characters.


    ## Alphabet Generation


    Just the way Kaggle provides the dataset for digits, the dataset for handwritten
    alphabets is available in another package called `extra-keras-datasets`. You will
    be using this dataset to generate the handwritten alphabets. The generator and
    discriminator models, their training, and inference all remain the same as in
    the case of digit generation. So, I am just going to give you the code of how
    to load the alphabets dataset from the Kaggle site and will give you the output
    of generated images. The full project source is available in the book’s repository
    under the name `emnist-GAN`.


    ### Downloading Data


    The dataset is available in a separate package that you can install by running
    the `pip` utility.


    ```

    pip install extra-keras-datasets

    ```


    Import the package into your project.


    ```

    from extra_keras_datasets import emnist

    ```


    Load the data into your project and display one image and the corresponding label.


    ```

    (train_images,train_labels),

    (test_images,test_labels) =

    emnist.load_data(type=''letters'')

    plt.imshow(train_images[1])

    print ("label: ", train_labels[1])

    ```


    The output is shown in Figure [13-10](#495303_1_En_13_Chapter.xhtml#Fig10).


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig10_HTML.jpg](images/495303_1_En_13_Chapter/495303_1_En_13_Fig10_HTML.jpg)


    **Figure 13-10** Image for the handwritten G character


    Like in the digits database, each image has a dimension of 28x28. Thus, we will
    be able to use our previous generator model that produces images of this dimension.
    One good thing for our experimentation here is that each alphabet label takes
    the value of its position in the alphabets set. For example, the letter `a` has
    a label value of `1`, the letter `b` has a label value of `2`, and so on.


    ### Creating Dataset for a Single Alphabet


    Like in the digit generation example, we will train the model to produce a single
    alphabet. Thus, we will need to create a dataset of images containing only the
    desired alphabet. This is done using the following code:


    ```

    letter_G_images = []

    for i in range(len(train_images)):

    if train_labels[i] == 7:

    letter_G_images.append(train_images[i])

    train_images = np.array(letter_G_images)

    ```


    You can verify that you have extracted the images of only G alphabet by running
    a small `for` loop as follows:


    ```

    n = 10

    f = plt.figure()

    for i in range(n):

    f.add_subplot(1, n, i + 1)

    plt.subplot(1, n, i+1 ).axis("off")

    plt.imshow(train_images[i])

    plt.show()

    ```


    The output is shown in Figure [13-11](#495303_1_En_13_Chapter.xhtml#Fig11).


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig11_HTML.jpg](images/495303_1_En_13_Chapter/495303_1_En_13_Fig11_HTML.jpg)


    **Figure 13-11** Sample handwritten character images


    Okay, now your dataset is ready. The rest of the code for preprocessing the data,
    defining models, loss functions, optimizers, training, and so on remains the same
    as the digit generation application. I will not reproduce the code here, I will
    simply show you the final output of my run.


    ### Program Output


    The program output at various epochs is shown in Table [13-2](#495303_1_En_13_Chapter.xhtml#Tab2).


    **Table 13-2** Images generated at various epochs


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Figb_HTML.gif](images/495303_1_En_13_Chapter/495303_1_En_13_Figb_HTML.gif)


    As in the case of digit generation, you can notice that the model gets quickly
    trained during the first few epochs, and by the end of 100 epochs, you have a
    quality output.


    ### Full Source


    The full source code for the character image generation is given in Listing [13-4](#495303_1_En_13_Chapter.xhtml#PC42).'
