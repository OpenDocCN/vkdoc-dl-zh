- fmt: '### TensorFlow 2.x Platform


    The entire platform is conceptualized using the picture shown in Figure [1-3](#495303_1_En_1_Chapter.xhtml#Fig3).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig3_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig3_HTML.jpg)


    Figure 1-3 TensorFlow 2.x platform


    As typical of any machine learning project, it consists of three distinct phases.
    During the first phase, also called the training phase, we define our artificial
    neural network model and train it on the given data. Also, we test the model using
    test data and retrain it until we are satisfied with its performance. In the next
    phase, we save the model to a file, which can later be deployed on a production
    server. In the third phase of our development, we deploy the saved model on a
    production server ready to make predictions on unseen data.


    I will now describe the individual components of all three phases shown in Figure
    [1-3](#495303_1_En_1_Chapter.xhtml#Fig3).


    ### Training


    The training consists of reading data, preparing it in a specific format required
    by your model, creating the model itself, and running many epochs to train the
    model. TensorFlow 2.x provides lots of functions, libraries, and tools to facilitate
    quick training. Generally, the ML model training takes a considerable amount of
    time in the entire development process. With the tools and facilities provided
    in TensorFlow 2.x, you would be able to train the model in a much shorter time
    as compared to the traditional methods of training. The entire training block
    is shown in Figure [1-4](#495303_1_En_1_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig4_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig4_HTML.jpg)


    Figure 1-4 Training block


    I will now explain to you the individual components of the training block.


    #### Data Preparation


    Consider the Data Design block shown in Figure [1-5](#495303_1_En_1_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig5_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig5_HTML.jpg)


    Figure 1-5 Data Design block


    The Data Design block shows two modules – `tf.data` and TF Datasets. I will discuss
    what both contain. First, I will describe `tf.data`.


    Model training requires data be prepared to a specific format as per the model’s
    design. The data preparation requires several steps. Firstly, you need to load
    the data from an external source and cleanse it. The cleansing process consists
    of removing rows containing null fields, mapping categorical fields to columns,
    and scaling numerical values generally to the range of –1 to +1. Next, you will
    need to decide which columns are to be your features and what the labels are.
    You will need to eliminate the columns which are not at all relevant to model
    training. For example, the name and customer ID fields in the database would be
    totally redundant fields in machine training. Finally, you will need to split
    the data into training and testing sets. The various functions needed for all
    these mentioned data operations are provided in the `tf.data` module.


    TensorFlow also provides built-in datasets taken from many popular machine learning
    libraries ready for use in your `tf.data` package. There are more than 100 ready-to-use
    datasets, divided into several categories such as Audio, Image, Video, Text, Translate,
    and so on. Depending on your requirements, you will load the data from one of
    the categories and quickly proceed to your model development. In future, more
    may be added to this module. You will be able to load data from `tf.data.dataset`
    using a single program statement that also creates both training and testing sets.
    So, this saves you a lot of effort in preparing data, and you will be able to
    quickly focus on model training. Albeit, you may not be able to use dataset as
    is for feeding it into your machine learning algorithm. Numerical fields may require
    scaling. Categorical fields may require conversions. The datasets like `imdb`
    which is for movie reviews may require encoding to a different format. You may
    require to reshape (change dimensions) the data. Thus, some sort of preprocessing
    is almost always required on these built-in datasets. However, they still provide
    lots of convenience to ML practitioners. Incidentally, these datasets also support
    high-performance data pipelines to facilitate quick data transfer between training
    iterations, resulting in faster training.


    #### Designing Model


    The Keras API is now integrated in the TensorFlow library. You can access the
    entire API using `tf.keras`. The `tf.keras` is a high-level API that provides
    standardization to many APIs used in TF 1.x. Using `tf.keras`, you will be able
    to take advantage of several new features introduced in TensorFlow 2.x; as an
    example, your model development will take advantage of eager execution. Using
    the functional API of the `tf.keras` module, you will be able to design models
    with high complexity.


    TensorFlow 2.x also supplies Estimators which can be used to do a quick comparison
    between different models. The estimators block is shown in Figure [1-6](#495303_1_En_1_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig6_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig6_HTML.jpg)


    Figure 1-6 The `tf.estimator` block


    The estimators are provided under `tf.estimator` which is a high-level TensorFlow
    API. They encapsulate the various phases of machine learning like model training,
    evaluation, predicting, and exporting the model for serving through a production
    server. There are several premade estimators provided in the library; `LinearClassifier`
    and `DNNClassifier` are two examples of such premade estimators. Besides the use
    of premade estimators, you will be able to build your own custom estimators. Not
    only this, the library provides a function called `model_to_estimator` to convert
    the existing model to an estimator. Why would you do this? Converting a Keras
    model to an estimator would enable you to use TensorFlow’s distributed training.


    #### Distribution Strategy


    In the entire machine learning process, the most time-consuming part is the training.
    This can take from a few minutes to several days even on very sophisticated equipment.
    You may need lots of processing power and memory to train the model. Fortunately,
    TensorFlow 2.x comes to your rescue here. Look at the distribution strategy block
    shown in Figure [1-7](#495303_1_En_1_Chapter.xhtml#Fig7).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig7_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig7_HTML.jpg)


    Figure 1-7 Distribution strategy block


    The model training can now be done on the CPU (central processing unit), GPU (graphics
    processing unit), or TPU (tensor processing unit). Not only this, but you can
    distribute your training across the multiple hardware units. This reduces your
    training time substantially.


    #### Analysis


    During the model training phase, you need to analyze the results at different
    stages of training. Based on this, you will reconfigure your network, modify your
    loss functions, try different optimizer, and so on. TensorFlow provides a nice
    analysis tool called TensorBoard for this very purpose, as depicted in Figure
    [1-8](#495303_1_En_1_Chapter.xhtml#Fig8).


    ![../images/495303_1_En_1_Chapter/495303_1_En_1_Fig8_HTML.jpg](images/495303_1_En_1_Chapter/495303_1_En_1_Fig8_HTML.jpg)


    Figure 1-8 TensorBoard block


    TensorBoard provides the plots of various metrics, such as accuracy and loss,
    which we widely used during model training. There are several other features available
    in TensorBoard, which you will keep learning as you read the book further.'
