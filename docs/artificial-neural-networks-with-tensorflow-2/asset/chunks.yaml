- fmt: '### Loading Data


    You can download the data into your project using the URL specified in the following
    code:


    ```

    url = ''https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch06/listings.csv''
    data = pd.read_csv(url)

    ```


    The data is read into a pandas dataframe. You may check the data size by calling
    its `shape` method. You will know that there are 3585 rows and whopping 95 columns.
    Finding out a regression relationship between these 95 columns is not an easy
    task even for a highly skilled data analyst. That’s where once again you will
    realize that neural networks can come to your aid.


    Out of the 95 columns that we have in the database, obviously not all will be
    of use to us in training our model. So, we need some data cleansing to remove
    the unwanted columns and standardize the remaining. We now do the data preprocessing
    as described further.


    ### Features Selection


    The first thing that we do is to list out all columns, which we do by calling
    the `columns` method on the `data`. When you do this, you will see the output
    in Figure [6-11](#495303_1_En_6_Chapter.xhtml#Fig11).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig11_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    List of columns


    If you prefer, you may use `data.info()` to get a better understanding of the
    data structure. You can easily notice that there are many fields that may be irrelevant
    to us. To get a better idea on what columns can be eliminated, get the data description
    by calling the `describe` method. The screen output is shown in Figure [6-12](#495303_1_En_6_Chapter.xhtml#Fig12).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig12_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Data description


    After the careful examination of the data, I decided to use only 17 columns for
    our analytics. In practice, you would use any of the known feature selection techniques
    – just to say univariate selection or correlation matrix with heatmap. These columns
    are selected by explicitly typing out their names as in the following statement:


    ```

    # Selecting only few columns as our features

    data = data[[''property_type'',''room_type'',

    ''bathrooms'',''bedrooms'',''beds'',''bed_type'',

    ''accommodates'',''host_total_listings_count'',

    ''number_of_reviews'',''review_scores_value'',

    ''neighbourhood_cleansed'',''cleaning_fee'',

    ''minimum_nights'',''security_deposit'',

    ''host_is_superhost'',''instant_bookable'',

    ''price'']]

    ```


    After selecting our features, we need to ensure that the data it contains is clean.


    ### Data Cleansing


    We first check if the data contains any null values. You do this by using the
    `isnull` function and taking the `sum` on its output. The screenshot in Figure
    [6-13](#495303_1_En_6_Chapter.xhtml#Fig13) shows the columns containing null values.


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig13_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Checking null values


    As you can see in Figure [6-13](#495303_1_En_6_Chapter.xhtml#Fig13), seven columns
    have null values, where the sum does not equal to zero. As the `security_deposit`
    column has 2243 nulls out of 3585 records, a very large percentage, we will eliminate
    this column in our analysis.


    ```

    data = data.drop(''security_deposit'' , axis = 1)

    ```


    We can examine the data by printing a few records. The command and its output
    are shown in Figure [6-14](#495303_1_En_6_Chapter.xhtml#Fig14).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig14_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Examining data


    ```

    data.head()

    ```


    When you examine this data, you will notice that the `property_type` field is
    categorical. We will deal with it separately during our cleansing operation. You
    also notice that the `cleaning_fee`, `security_deposit`, and `price` columns also
    contain a `$` sign. These values must be converted into a floating-point number
    after stripping the `$` symbol. Also, notice that the amount fields also contain
    a comma in between the digits. This also needs to be stripped. For cleaning up
    the values in these three columns, we write a transform function as shown here:


    ```

    # function to remove $ and , characters

    def transform(x):

    x = str(x)

    x = x.replace(''$'','''')

    x = x.replace(",","")

    return float(x)

    ```


    We now apply this transformation on the three fields in a `for` loop:


    ```

    for col in ["cleaning_fee","price"]:

    data[col] = data[col].apply(transform)

    #filling nan with mean value

    data[col].fillna(data[col].mean(),inplace = True)

    ```


    In the loop, we also replace the null values with the field’s mean value.


    For the rest of the columns, we just replace null values with the column’s mean
    using the following code:


    ```

    #filling nan values with mean value

    for feature in ["bathrooms","bedrooms","beds",

    "review_scores_value"]:

    data[feature].fillna(data[feature].mean(),

    inplace = True)

    ```


    Next, we look into the categorical column – `property_type`. As this is a categorical
    column, we cannot simply replace null values with a mean. We need to find an appropriate
    value for the replacement of the null fields. For this, let us check what the
    unique values are in this column. The unique values can be seen in Figure [6-15](#495303_1_En_6_Chapter.xhtml#Fig15).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig15_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Unique values in categorical columns


    We can check the frequency of each value by calling the `value_counts` method.
    This is shown in Figure [6-16](#495303_1_En_6_Chapter.xhtml#Fig16).


    ![../images/495303_1_En_6_Chapter/495303_1_En_6_Fig16_HTML.jpg](images/495303_1_En_6_Chapter/495303_1_En_6_Fig16_HTML.jpg)


    Figure 6-16


    Frequency distribution for `property_type` values


    As the `Apartment` word occurs most frequently, we will use this as a replacement
    text to our null values in this column. We do this replacement using the following
    code statement:


    ```

    # replacing nan with Apartment

    data[''property_type''].fillna(''Apartment'',

    inplace = True)

    ```'
