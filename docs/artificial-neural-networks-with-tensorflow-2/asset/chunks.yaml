- fmt: '# Summary


    The Generative Adversarial Network (`GAN`) provides a novel idea of mimicking
    any given image. The `GAN` consists of two networks – generator and discriminator.
    Both models are trained simultaneously by an adversarial process. In this chapter,
    you studied to construct a `GAN` network, which was used for creating handwritten
    digits, alphabets, and even animes. To train a `GAN` requires huge processing
    resources. Yet, it produces very satisfactory results. Today, `GAN`s have been
    successfully used in many applications. For example, `GAN`s are used for creating
    large image datasets like the handwritten digits provided on the Kaggle site that
    you used in the first example in this chapter. It is successful in creating human
    faces of celebrities. It can be used for generating cartoon characters like the
    anime example in this chapter. It has also been applied in the areas of image-to-image
    and text-to-image translations. It can be used for creating emojis from photos.
    It can also be used for aging faces in the photos. The possibilities are endless;
    you should explore further to see for yourself how people have used `GAN`s in
    creating many interesting applications. With the techniques that you have learned
    in this chapter, you would be able to implement your own ideas to add this repository
    of endless `GAN` applications.


    # 14. Image Translation


    Have you ever thought of colorizing the old B&W photograph of your granny? You
    would probably approach a Photoshop artist to do this job for you, paying them
    hefty fees and awaiting a couple of days/weeks for them to finish the job. If
    I tell you that you could do this with a deep neural network, would you not get
    excited about learning how to do it? Well, this chapter teaches you the technique
    of converting your B&W images to a colorized image almost instantaneously. The
    technique is simple and uses a network architecture known as AutoEncoders. So,
    let us first look at AutoEncoders.


    ## AutoEncoders


    AutoEncoders consist of two parts – an Encoder and a Decoder. It may be schematically
    represented as shown in Figure [14-1](#495303_1_En_14_Chapter.xhtml#Fig1).


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig1_HTML.jpg](images/495303_1_En_14_Chapter/495303_1_En_14_Fig1_HTML.jpg)


    **Figure 14-1** AutoEncoder architecture


    On the left, we have a B&W image fed to our network. On the right, where we have
    the network output, we have a colorized image of the same input content. What
    goes in between can be described like this. The Encoder processes the image through
    a series of Convolutional layers and downsizes the image to learn the reduced
    dimensional representation of the input image. The decoder then attempts to regenerate
    the image by passing it through another series of Convolutional layers, upsizing
    and adding colors in the process.


    Now, to understand how to colorize an image, you must first understand the color
    spaces.


    ## Color Spaces


    A color image consists of the colors in a given color space and the luminous intensity.
    A range of colors are created by using the primary colors such as red, green,
    blue. This entire range of colors is then called a color space, for example, `RGB`.
    In mathematical terms, a color space is an abstract mathematical model that simply
    describes the range of colors as tuples of numbers. Each color is represented
    by a single dot.


    I will describe the three most popular color spaces:


    * `RGB`

    * `YCbCr`

    * `Lab`


    `RGB` is the most commonly used color space. It contains three channels – red
    (`R`), green (`G`), and blue (`B`). Each channel is represented by 8 bits and
    can take a maximum value of 256. Combined together, they can represent over 16
    million colors.


    The `JPEG` and `MPEG` formats use the `YCbCr` color space. It is more efficient
    for digital transmission and storage as compared to `RGB`. The `Y` channel represents
    the luminosity of a grayscale image. The `Cb` and `Cr` represent the blue and
    red difference chroma components. The `Y` channel takes values from 16 through
    235. The `Cb` and `Cr` values range from 16 to 240. Be careful, the combined value
    of all these channels may not represent a valid color. In our application of colorization,
    we don''t use this color space.


    The `Lab` color space was designed by the International Commission on Illumination
    (`CIE`). A visual representation of this color space is shown in Figure [14-2](#495303_1_En_14_Chapter.xhtml#Fig2).


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig2_HTML.jpg](images/495303_1_En_14_Chapter/495303_1_En_14_Fig2_HTML.jpg)


    **Figure 14-2** The Lab color space


    The `Lab` color space is larger than the gamut of computer displays and printers.
    Then, a bitmap image represented as a `Lab` requires more data per pixel to obtain
    the same precision as an `RGB` or `CMYK`. Thus, the `Lab` color space is typically
    used as an intermediary rather than an end color space.


    The `L` channel represents the luminosity and takes values in the range 0 to 100.
    The “`a`” channel codes from green (`-`) to red (`+`), and the “`b`” channel codes
    from blue (`-`) to yellow (`+`). For an 8-bit implementation, both take values
    in the range `-127` to `+127`. The `Lab` color space approximates the human vision.
    The amount of numerical change in these component values corresponds to roughly
    the same amount of visually perceived change.


    We use the `Lab` color space in our project. By separating the grayscale component
    which represents the luminosity, the network has to learn only two remaining channels
    for colorization. This helps in reducing the network size and results in faster
    convergence.


    I will now discuss the different network topologies for our AutoEncoders.


    ## Network Configurations


    The AutoEncoder network may be configured in three different ways:


    * Vanilla

    * Merged

    * Merged model using pre-trained network


    I will now discuss all three models.


    ### Vanilla Model


    The vanilla model has the configuration shown in Figure [14-1](#495303_1_En_14_Chapter.xhtml#Fig1),
    where the Encoder has a series of Convolutional layers with strides for downsizing
    the image and extracting features. The Decoder too has Convolutional layers which
    are used for upsizing and colorization. In such autoencoders, the encoders are
    not deep enough to extract the global features of an image. The global features
    help us in determining how to colorize certain regions of the image. If we make
    the encoder network deep, the dimensions of the representation would be too small
    for the decoder to faithfully reproduce the original image. Thus, we need two
    paths in an Encoder – one to obtain the global features and the other one to obtain
    a rich representation of the image. This is what is done in the next two models.
    You will be constructing a vanilla network for the first project in this chapter.


    ### Merged Model


    This model was proposed by Lizuka et al. in their paper “Let there be Color!”
    (`http://iizuka.cs.tsukuba.ac.jp/projects/colorization/data/colorization_sig2016.pdf`).
    The model architecture is shown in Figure [14-3](#495303_1_En_14_Chapter.xhtml#Fig3).


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig3_HTML.jpg](images/495303_1_En_14_Chapter/495303_1_En_14_Fig3_HTML.jpg)


    **Figure 14-3** Merged model architecture'
