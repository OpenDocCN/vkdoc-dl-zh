- fmt: '# Using Pre-trained Models for Feature Extraction


    Now, I will show you how to use a pre-trained model for features extraction, thereby
    saving you a lot of training time and giving better feature extraction.


    ## Pre-trained Model as Encoder


    There are several pre-trained models available for image processing. You have
    used one such `VGG16` model in Chapter [12](#495303_1_En_12_Chapter.xhtml). The
    use of this model allows you to extract the image features, and that is what we
    did in our previous program by creating our own encoder. So why not use the transfer
    learning by using a `VGG16` pre-trained model in place of an encoder? And that
    is what I am going to demonstrate in this application. The use of a pre-trained
    model would certainly provide better results as compared to your own defined encoder
    and a faster training too.


    ## Project Description


    You will be using the same image dataset as in the previous project. Thus, the
    data loading and preprocessing code would remain the same. What changes is the
    model definition and the inference. So, I will describe only the relevant changes.
    The entire project source is available in the book’s download site and also given
    at the end of this section for your quick reference. The project is named `AutoEncoder-TransferLearning`.


    As the `VGG16` was trained on images of size 224x224, you will need to change
    those two constant values to the following:


    ```

    IMG_WIDTH = 224

    IMG_HEIGHT = 224

    ```


    ## Defining Model


    You have already seen the `VGG16` architecture in Chapter [12](#495303_1_En_12_Chapter.xhtml)
    (Figure [12-5](#495303_1_En_12_Chapter.xhtml#Fig5)). The first 18 layers of the
    VGG model extract the image features. So, we will use these layers and discard
    all subsequent layers. We create a new sequential model using the following code
    snippet:


    ```

    vggmodel = tf.keras.applications.vgg16.VGG16()

    newmodel = Sequential()

    num = 0

    for i, layer in enumerate(vggmodel.layers):

    if i<19:

    newmodel.add(layer)

    newmodel.summary()

    for layer in newmodel.layers:

    layer.trainable=False

    ```


    We set the `trainable` parameter for all these layers to `false` as we intend
    to use a pre-trained model for feature extraction. The model summary is shown
    in Figure [14-11](#495303_1_En_14_Chapter.xhtml#Fig11).


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig11_HTML.jpg](images/495303_1_En_14_Chapter/495303_1_En_14_Fig11_HTML.jpg)


    **Figure 14-11** Pre-trained encoder model summary


    ## Extracting Features


    You will extract the features in the training dataset images by using the `newmodel`
    that you have created. We just pass each training image through the network and
    collect the predictions at layer 19.


    ```

    vggfeatures = []

    for sample in x_train:

    sample = gray2rgb(sample)

    sample = sample.reshape((1,224,224,3))

    prediction = newmodel.predict(sample)

    prediction = prediction.reshape((7,7,512))

    vggfeatures.append(prediction)

    vggfeatures = np.array(vggfeatures)

    ```


    ## Defining Network


    Now, you will define our encoder/decoder architecture as follows:


    ```

    #Encoder

    encoder_input = Input(shape=(7, 7, 512,))

    #Decoder

    decoder_output = Conv2D(256, (3,3),

    activation=''relu'', padding="same")

    (encoder_input)

    decoder_output = Conv2D(128, (3,3),

    activation=''relu'', padding="same")

    (decoder_output)

    decoder_output = UpSampling2D((2, 2))(decoder_output)

    decoder_output = Conv2D(64, (3,3), activation="relu",

    padding=''same'')(decoder_output)

    decoder_output = UpSampling2D((2, 2))(decoder_output)

    decoder_output = Conv2D(32, (3,3), activation="relu",

    padding=''same'')(decoder_output)

    decoder_output = UpSampling2D((2, 2))(decoder_output)

    decoder_output = Conv2D(16, (3,3), activation="relu",

    padding=''same'')(decoder_output)

    decoder_output = UpSampling2D((2, 2))(decoder_output)

    decoder_output = Conv2D(2, (3, 3), activation="tanh",

    padding=''same'')(decoder_output)

    decoder_output = UpSampling2D((2, 2))(decoder_output)

    model = Model(inputs=encoder_input,

    outputs=decoder_output)

    model.summary()

    ```


    For the encoder, we just specify the input, and the decoder architecture is the
    same as in the previous example where we keep on upsizing the image and adding
    colors to it.


    The model summary is shown in Figure [14-12](#495303_1_En_14_Chapter.xhtml#Fig12).


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig12_HTML.jpg](images/495303_1_En_14_Chapter/495303_1_En_14_Fig12_HTML.jpg)


    **Figure 14-12** Encoder decoder model summary


    ## Model Training


    Compile and train the model using the following two statements:


    ```

    model.compile(optimizer=''Adam'', loss="mse")

    model.fit(vggfeatures, image_a_b_gen(x_train),

    verbose=1, epochs=100, batch_size=128)

    ```


    We use the `Adam` optimizer and the `mse` loss for training. Training the network
    on a GPU, the epoch time was about a second – a considerable improvement over
    our earlier network. As we have used a pre-trained encoder, only the decoder parameters
    need to be trained.


    ## Inference


    Now, run the following code to generate the images from the test dataset. The
    code is trivial enough to understand.


    ```

    sample = x_test[1:6]

    for image in sample:

    lab = rgb2lab(image)

    l = lab[:,:,0]

    L = gray2rgb(l)

    L = L.reshape((1,224,224,3))

    vggpred = newmodel.predict(L)

    ab = model.predict(vggpred)

    ab = ab*128

    cur = np.zeros((224, 224, 3))

    cur[:,:,0] = l

    cur[:,:,1:] = ab

    plt.subplot(1,2,1)

    plt.title("Generated Image")

    plt.imshow( lab2rgb(cur))

    plt.axis(''off'')

    plt.subplot(1,2,2)

    plt.title("Original Image")

    plt.imshow(image)

    plt.axis(''off'')

    plt.show()

    ```


    The output of the preceding code is shown in Figure [14-13](#495303_1_En_14_Chapter.xhtml#Fig13).


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig13_HTML.jpg](images/495303_1_En_14_Chapter/495303_1_En_14_Fig13_HTML.jpg)


    **Figure 14-13** Model inference on test images


    ## Inference on an Unseen Image


    Like the earlier example, test the model’s performance on an unseen image of your
    choice. We will use the same image as in the earlier example.


    ```

    !wget https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch14/mountain.jpg

    ```


    Display the original image if you wish to see it again.


    ```

    img = imread("mountain.jpg")

    plt.imshow(img)

    ```


    Now, run the inference using the following code. Note that we need to change the
    image size to 224x224 before inputting the image to the network.


    ```

    test = img_to_array(load_img("mountain.jpg"))

    test = resize(test, (224,224), anti_aliasing=True)

    test*= 1.0/255

    lab = rgb2lab(test)

    l = lab[:,:,0]

    L = gray2rgb(l)

    L = L.reshape((1,224,224,3))

    vggpred = newmodel.predict(L)

    ab = model.predict(vggpred)

    ab = ab*128

    cur = np.zeros((224, 224, 3))

    cur[:,:,0] = l

    cur[:,:,1:] = ab

    plt.imshow( lab2rgb(cur))

    plt.axis(''off'')

    ```


    The program output is shown in Figure [14-14](#495303_1_En_14_Chapter.xhtml#Fig14).


    ![../images/495303_1_En_14_Chapter/495303_1_En_14_Fig14_HTML.jpg](images/495303_1_En_14_Chapter/495303_1_En_14_Fig14_HTML.jpg)


    **Figure 14-14** A colorized image generated by the autoencoder transfer learning
    model


    ## Full Source


    The full source is given in Listing [14-2](#495303_1_En_14_Chapter.xhtml#PC31)
    for your reference.'
