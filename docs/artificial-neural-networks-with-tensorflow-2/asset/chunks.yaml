    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig5_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    MobileNet model on TensorFlow Hub


    Copy the model’s URL by clicking the “Copy URL” button. You will get the following
    URL:


    ```

    https://tfhub.dev/google/tf2-preview/mobilenet_v2/classification/4

    ```


    Note you may get a later version than the one shown here.


    Declare two variables in your project code as follows:


    ```

    classifier_url = "https://tfhub.dev/google/tf2-preview/mobilenet_v2/classification/4"

    IMAGE_SHAPE = (224, 224)

    ```


    The input to this model requires images of 224x224 pixels, as described in the
    model’s description. The model’s description is available in the user guide, which
    you can read by clicking the “our user guide” link shown in Figure [4-5](#495303_1_En_4_Chapter.xhtml#Fig5).


    ### Creating Model


    Next, you create the model by using the Sequential API as follows:


    ```

    # create a model

    classifier = tf.keras.Sequential([

    hub.KerasLayer(classifier_url, input_shape = IMAGE_SHAPE+(3,))

    ])

    ```


    The hub.KerasLayer returns the module that is added to our sequential model. All
    the layers included in this module are now available to our network. We do not
    add any more layers of our own to this model. So, our model definition is now
    complete. As this is a fully trained model, we do not need to call the fit method
    on our classifier for training it further. You will simply call its predict method
    to infer any given input image. Before you call predict, let us prepare a few
    images for inputting to our model.'
  trans: '

    ### 预训练模块


    TensorFlow Hub 中提供了由谷歌及其渠道合作伙伴开发的多个预训练模块。这些模块分为三类：图像、文本和视频。其中“图像”领域类别如图 4-3 所示。


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig3_HTML.jpg](img/495303_1_En_4_Fig3_HTML.jpg)


    图 4-3 TensorFlow 中的预定义模型


    图像领域中的部分模块包括：


    -   使用 MobileNet/Inception ResNet V2/NASNet-A 进行 ImageNet 分类

    -   使用 MobileNet/Inception/ResNet/PNASnet 提取图像特征向量


    上述模块支持 TF2。此外，还有一份详尽的模块列表，这些模块由谷歌及其他合作伙伴开发，运行于 TF1 环境下，并正在等待迁移至 TF2。以下是一些你可能感兴趣的
    TF1 类别下的模块：


    -   Progressive GAN

    -   快速任意图像风格迁移

    -   执行随机裁剪、小角度旋转和颜色失真的图像增强模块

    -   预测任意照片大致地理位置的 PlaNet

    -   Google landmarks - 深度局部特征 (DELF)


    在文本类别下，你将找到如下模块：


    -   ELMO

    -   BERT

    -   通用句子编码器

    -   基于英文维基百科语料库训练的令牌级文本嵌入


    在视频类别下，截至撰写本文时，尚无适用于 TF2 的模型。在 TF1 环境下，有谷歌和 DeepMind 创建的少量模型。


    再次强调，TF1 类别下的模块总数非常庞大。你可以访问 TensorFlow Hub 网站 ([`https://tfhub.dev/`](https://tfhub.dev/))
    查看所有可用模块的完整列表。


    现在，你已经了解了有哪些资源可供使用。接下来的问题是，如何使用这样的预训练模块。


    ### 使用模块


    要在你的程序代码中使用预训练模块，请从 `tfdev` 网站选择所需的模块。查找“模型格式”；在“保存的模型”下，你将找到该模块的 URL，如图 4-4 的截图所示。


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig4_HTML.jpg](img/495303_1_En_4_Fig4_HTML.jpg)


    图 4-4 模块的 URL


    复制该 URL，并按如下所示在你的程序代码中使用它：


    ```

    module_url = "https://tfhub.dev/google/imagenet/mobilenet_v2_100_160/feature_vector/4"

    my_model = hub.KerasLayer(module_url)

    ```


    然后，你可以向 `my_model` 添加更多层。使用 `fit` 方法训练你的新模型，就像训练其他模型一样。训练完成后，用它进行预测。


    了解了预训练模块的能力之后，是时候动手尝试了。


    ## ImageNet 分类器


    在本项目中，你将使用谷歌提供的名为 `mobilenet_v2` 的 ImageNet 分类器。该分类器提供 1001 种不同的分类。该模型基于超过一百万张图像进行训练。它使用的初始学习率为
    0.045，每个 epoch 的学习率衰减率为 0.98。它使用了 16 个 GPU 异步工作器，批量大小为 96。你可以想象创建此模型所涉及的资源数量。你将利用迁移学习，将这种知识迁移到在此之上构建你自己的图像分类器。你将在本章接下来的两个项目中完成这项工作。第一个项目将教你如何使用
    MobileNet 模型对你自己的图像进行分类。第二个项目将向你展示如何扩展它以添加更多你自己的分类。


    首先，我将向你展示如何使用 ImageNet 分类器对你自己的图像进行分类。本质上，在本项目中，你将按原样使用 MobileNet 分类器，而不向其添加任何层。你只需学习如何加载预训练模型并将其应用于你自己的图像。本章后面的项目（犬种分类器）将深入探讨许多细节，届时你将向
    ImageNet 模块添加你自己的分类层，并进行大量研究，以了解迁移学习带来的好处。


    那么，首先在 Colab 中创建一个名为 `ImageNetClassifier` 的项目。


    ### 设置项目


    使用以下代码片段设置 TensorFlow 并导入所需的包：


    ```

    import tensorflow as tf

    # 其他导入

    import tensorflow_hub as hub

    import numpy as np

    import matplotlib.pyplot as plt

    ```


    请注意，你需要导入 `tensorflow_hub`。另外两个导入 `numpy` 和 `matplotlib` 的作用与往常一样；你在之前的项目中已经使用过它们。


    ### 分类器 URL


    本项目将使用预训练的 MobileNet 分类器。在 TensorFlow Hub 上找到此分类器。在 `tfhub.dev` 网站上搜索的截图如图 4-5
    所示。


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig5_HTML.jpg](img/495303_1_En_4_Fig5_HTML.jpg)


    图 4-5 TensorFlow Hub 上的 MobileNet 模型


    点击“复制 URL”按钮复制模型的 URL。你将获得以下 URL：


    ```

    https://tfhub.dev/google/tf2-preview/mobilenet_v2/classification/4

    ```


    请注意，你获得的版本可能比此处显示的更新。


    在你的项目代码中声明两个变量，如下所示：


    ```

    classifier_url = "https://tfhub.dev/google/tf2-preview/mobilenet_v2/classification/4"

    IMAGE_SHAPE = (224, 224)

    ```


    根据模型描述，该模型的输入需要 224x224 像素的图像。模型描述可在用户指南中找到，你可以通过点击图 4-5 中显示的“我们的用户指南”链接来阅读。


    ### 创建模型


    接下来，你使用 Sequential API 创建模型，如下所示：


    ```

    # 创建一个模型

    classifier = tf.keras.Sequential([

    hub.KerasLayer(classifier_url, input_shape = IMAGE_SHAPE+(3,))

    ])

    ```


    `hub.KerasLayer` 返回添加到我们顺序模型中的模块。该模块中包含的所有层现在都可供我们的网络使用。我们不会向此模型添加任何我们自己的层。因此，我们的模型定义现已完成。由于这是一个完全训练好的模型，我们无需在其上调用
    `fit` 方法进行进一步训练。你只需调用其 `predict` 方法来推断任何给定的输入图像。在调用 `predict` 之前，让我们准备一些图像作为模型的输入。

    '
- fmt: '### Preparing Images


    I have uploaded a few images on the book’s download site. The URLs for these images
    are listed here. Add this code into your project:


    ```

    # set up URLs for image downloads

    image_url1 = "https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/Ch04/bulck_cart.jpg"

    image_url2 = "https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/Ch04/flower.jpg"

    image_url3 = "https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/Ch04/swordweapon.jpg"

    image_url4 = "https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/Ch04/tiger.jpg"

    image_url5 = "https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/Ch04/tree.jpg"

    ```


    You will download these images to your drive using the following code:


    ```

    # download images

    !pip install wget

    import wget

    wget.download(image_url1,''image1.jpg'')

    wget.download(image_url2,''image2.jpg'')

    wget.download(image_url3,''image3.jpg'')

    wget.download(image_url4,''image4.jpg'')

    wget.download(image_url5,''image5.jpg'')

    ```


    We use `wget` for downloading the five image files. These are stored in the `/content/`
    folder of your drive with the names `image1`, `image2`, and so on.


    As these images have varied sizes, you need to resize them to 224x224 after loading
    them into the memory. You also need to rescale the data in the range 0 to 1 for
    better machine learning. All these things are done in the following code:


    ```

    # load images and reshape to 224x224 required by the model

    import PIL.Image as Image

    image1 = tf.keras.utils.get_file("/content/image1.jpg", image_url1)

    image1 = Image.open(image1).resize(IMAGE_SHAPE)

    # load images and reshape to 224x224 required by the model

    import PIL.Image as Image

    image1 = tf.keras.utils.get_file("/content/image1.jpg", image_url1)

    image1 = Image.open(image1).resize(IMAGE_SHAPE)

    # scale the array

    image1 = np.array(image1)/255.0

    image2 = tf.keras.utils.get_file("/content/image2.jpg", image_url2)

    image2 = Image.open(image2).resize(IMAGE_SHAPE)

    image2 = np.array(image2)/255.0

    image3 = tf.keras.utils.get_file("/content/image3.jpg", image_url3)

    image3 = Image.open(image3).resize(IMAGE_SHAPE)

    image3 = np.array(image3)/255.0

    image4 = tf.keras.utils.get_file("/content/image4.jpg", image_url4)

    image4 = Image.open(image4).resize(IMAGE_SHAPE)

    image4 = np.array(image4)/255.0

    image5 = tf.keras.utils.get_file("/content/image5.jpg", image_url5)

    image5 = Image.open(image5).resize(IMAGE_SHAPE)

    image5 = np.array(image5)/255.0

    ```


    Now, you are ready to infer the images. So, let us start with the first image.
    You infer the image by calling the `predict` method of the model:


    ```

    result = classifier.predict(image1[np.newaxis, ...])

    ```


    The probability predictions are now available in the `result` tensor. Print the
    shape of the result using the `shape` method:


    ```

    result.shape

    (1, 1001)

    ```


    You see that there are 1001 values in the `result` array indicating that there
    are 1001 classes in the output. The probability predictions are arranged in an
    ascending order. So pick up the last one as the highest prediction made by our
    model.


    ```

    predicted_class = np.argmax(result[0], axis=-1)

    predicted_class

    ```


    The predicted class as you can see is 293. This integer does not make any sense
    to us. Fortunately, the mapping of these integers to the labels is provided by
    Google.


    ### Loading Label Mappings


    The label names are available on the Google site in the file `ImageNetLabels.txt`
    which is loaded into our program using the following code:


    ```

    labels_path = tf.keras.utils.get_file(''ImageNetLabels.txt'',''https://storage.googleapis.com/download.tensorflow.org/data/ImageNetLabels.txt'')

    imagenet_labels = np.array(open(labels_path).read().splitlines())

    ```


    Print the label names and array’s length using the following two print statements:


    ```

    print (imagenet_labels)

    print ("Number of labels: " , len(imagenet_labels))

    [''background'' ''tench'' ''goldfish'' ... ''bolete'' ''ear'' ''toilet tissue'']

    Number of labels:  1001

    ```


    The output shown on the next two lines lists a few names at the start and end
    of the array. It also tells you that there are 1001 names, each one for the output
    class of our model.


    ### Displaying Prediction


    To display the prediction, we plot the image and the predicted class name using
    the following code:


    ```

    plt.imshow(image1)

    plt.axis(''off'')

    predicted_class_name = imagenet_labels[predicted_class]

    _ = plt.title("Prediction: " + predicted_class_name.title())

    ```


    The result is shown in Figure [4-6](#495303_1_En_4_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig6_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Test image with predicted title


    As you can see, our model predicted the image correctly, saying that it is a tiger.
    Now, do the predictions on other four images by writing the code similar to what
    you did for `image1`.


    For this, you may use the `predict_display_image` function shown here:


    ```

    def predict_display_image(imagex):

    result = classifier.predict(imagex[np.newaxis, ...])

    predicted_class = np.argmax(result[0], axis=-1)

    plt.imshow(imagex)

    plt.axis(''off'')

    predicted_class_name = imagenet_labels[predicted_class]

    _ = plt.title("Prediction: " + predicted_class_name.title())

    ```


    The function receives a preprocessed image as an argument, infers it, and prints
    the prediction result along with the image itself.


    You will call this function on the four remaining images as follows:


    ```

    # predict and print results for the specified image

    predict_display_image(image2)

    predict_display_image(image3)

    predict_display_image(image4)

    predict_display_image(image5)

    ```


    The four prediction results are shown in Figure [4-7](#495303_1_En_4_Chapter.xhtml#Fig7).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig7_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Predictions for the other four images


    Before I discuss the output in Figure [4-7](#495303_1_En_4_Chapter.xhtml#Fig7),
    let us first look at the list of classes that the ImageNet classifier classifies.


    ### Listing All Classes


    To see the list of all classes predicted by ImageNet, use the following code:


    ```

    for i in range (len(imagenet_labels)):

    print (imagenet_labels[i])

    ```


    The first few items from the output are shown here:


    ```

    background

    tench

    goldfish

    great white shark

    tiger shark

    hammerhead

    electric ray

    stingray

    cock

    Hen

    ```


    Now, I will discuss the results shown in Figure [4-7](#495303_1_En_4_Chapter.xhtml#Fig7).


    ### Result Discussions


    The first picture in the output is interpreted as a cart, which is correct. The
    second picture is interpreted as a letter opener, which is close in looks to a
    sword. Note the actual picture is of the sword. A letter opener resembles in looks
    to a sword. So, this inference may be considered okay. The third picture is a
    tree, which is interpreted as a pot. The last one which is a bunch of roses is
    interpreted as face powder – absolutely incorrect. So, what do we derive from
    this discussion? To differentiate between a Teddy and a bunch of roses, the ImageNet
    would require further training with more images. This is obviously beyond our
    reach. However, we will be able to extend the ImageNet to add our own classifications.
    And that’s what I am going to show in the next topic.'
