    10.1]])))

    Print ("Wine quality on unseen data (large model): ",

    y_large[0][0])

    Wine quality on unseen data (large model):  5.389405

    ```


    This predicts a wine quality of 5.39, somewhat larger than the one predicted by
    the medium model. I will have a full discussion of the results later in the chapter.
    Currently, let us look at how to fix the overfitting problem.


    ### Fixing Overfitting


    Before I show you a few techniques of fixing overfitting, let me discuss what
    is overfitting and to that matter what is a good fit and what is underfitted.


    #### What Is Overfitting?


    A diagram in Figure [5-9](#495303_1_En_5_Chapter.xhtml#Fig9) visually shows you
    the difference between overfitting, good fit, and underfitted.


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig9_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Various modes of model fitting


    Generally, the overfitting occurs when the model accuracy is high on the data
    used during the training and drops significantly with the new data. In other words,
    the model knows the training data well but is not able to generalize its inference.
    As you can see from Figure [5-9](#495303_1_En_5_Chapter.xhtml#Fig9), if the curve
    is not balanced, there is a chance of overfitting. One of the techniques of reducing
    the overfitting is by adding dropout layers.


    So, let us try it out.


    #### Adding Dropout Layers


    In the large model, the overfitting is very clearly observed. Let us try by adding
    dropout layers to this model to check if it reduces the overfitting. The new model
    with the dropout layers added is given in the following code snippet:


    ```

    large_model_overfit = tf.keras.Sequential([

    tf.keras.layers.Dense

    (128 , activation = ''relu'' ,

    input_shape = (11, )),

    tf.keras.layers.Dropout(0.4),

    tf.keras.layers.Dense

    (128 , activation = ''relu''),

    tf.keras.layers.Dropout(0.3),

    tf.keras.layers.Dense

    (128 , activation = ''relu''),

    tf.keras.layers.Dropout(0.2),

    tf.keras.layers.Dense

    (128 , activation = ''relu''),

    tf.keras.layers.Dense(1)

    ])

    large_model_overfit.compile(loss = ''mse'' ,

    optimizer = ''adam'' , metrics = [''mae''])

    history_large_overfit = large_model_overfit.fit

    (x_train_new , y_train , batch_size = 32,

    epochs = 30,verbose = 0 , validation_data =

    (x_val_new , y_val))

    plot_learningCurve(history_large_overfit)

    ```


    We have added 40%, 30%, and 20% dropouts after the first three hidden `Dense`
    layers. The rest of the code remains the same as in our testing of the large model.
    Now, let us look at the error metrics generated by this model. Figure [5-10](#495303_1_En_5_Chapter.xhtml#Fig10)
    gives the plots of error metrics for the two networks – one without the dropout
    layer is shown on the left-hand side, and the other one with the dropout layers
    is shown on the right-hand side.


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig10_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Effect of adding dropout in the large model


    You can clearly see from Figure [5-10](#495303_1_En_5_Chapter.xhtml#Fig10) that
    adding the dropout layers eliminates or at least reduces the overfitting.


    The dropout layers are usually added to the large networks as they have enough
    number of neurons available in each layer from which you can afford to drop out
    the outputs of a few.'
