  trans: '

    # 总结


    在本章中，你学习了神经网络中的另一项重要技术——神经风格迁移。该技术允许你将所选图像的内容转换为另一幅图像的风格。你学会了通过两种不同方式实现风格迁移。第一种方法是使用`tfhub`中提供的预训练模型来执行快速的艺术风格迁移。使用这种方法进行风格迁移速度快且效果出色。第二种方法是构建你自己的网络，从核心层面实现风格迁移。我们使用了用于图像分类的`VGG16`预训练模型来提取图像的内容和风格。接着，你学会了创建一个网络，该网络通过多次迭代学习如何将风格应用于给定的内容。这种方法允许你自行进行风格迁移实验。


    在下一章中，你将学习如何使用生成对抗网络（GAN）生成图像。


    ## 13. 图像生成


    你是否曾想象过神经网络可用于生成复杂的彩色图像？动漫呢？名人面孔呢？卧室呢？听起来是不是很有趣？所有这些都可以通过神经网络中最有趣的概念——生成对抗网络（GAN）来实现。这一概念由伊恩·J·古德费洛于
    2014 年提出并发展。GAN 生成的图像看起来非常逼真，以至于几乎无法区分真假图像。需要提醒的是，要生成如此复杂的图像，你需要大量资源来训练网络，但正如你在学习本章时会看到的，它确实有效。那么，让我们来看看什么是
    GAN。


    ### GAN – 生成对抗网络


    在 GAN 中，有两个神经网络模型通过对抗过程同时训练。一个网络称为生成器，另一个称为判别器。生成器（艺术家）学习创建看起来真实的图像。判别器（评论家）学习区分真实图像和伪造图像。因此，这是两个相互竞争的模型，试图击败对方。最终，如果你能训练生成器超越判别器，你就实现了目标。


    ### GAN 如何工作？


    正如我所说，GAN 由两个网络组成。训练 GAN 需要两个步骤：


    1.  保持生成器空闲，训练判别器。在真实图像上训练判别器若干个周期，看它是否能正确地将它们预测为真实图像。在同一训练阶段，在伪造图像（由生成器生成）上训练判别器，看它是否能将它们预测为伪造图像。

    2.  保持判别器空闲，训练生成器。利用判别器对伪造图像的预测结果来改进这些图像。


    重复上述步骤大量周期，并手动检查结果（伪造图像）是否看起来真实。如果看起来真实，则停止训练。如果不真实，则继续上述两个步骤，直到伪造图像看起来真实为止。


    整个过程如图 13-1 所示。


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig1_HTML.jpg](img/495303_1_En_13_Fig1_HTML.jpg)


    **图 13-1** GAN 工作原理示意图


    ### 生成器


    生成器示意图如图 13-2 所示。


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig2_HTML.jpg](img/495303_1_En_13_Fig2_HTML.jpg)


    **图 13-2** 生成器架构


    生成器接收一个具有一定维度的随机噪声向量。在我们的示例中，我们将使用 100 维。从这个随机向量中，它生成一个 64x64x3 的图像。图像通过一系列卷积层转换进行上采样。每个卷积转置层之后都跟着一个批归一化和一个带泄露的
    ReLU。带泄露的 ReLU 既没有梯度消失问题，也没有 ReLU 死亡问题。带泄露的 ReLU 试图修复“ReLU 死亡”问题。ReLU 会获得一个 0.01
    左右的小值，而不是消亡为 0。我们在每个卷积层中使用步长以避免不稳定的训练。注意，在每次卷积时，图像是如何被上采样以创建最终的 64x64x3 图像的。


    ### 判别器


    判别器示意图如图 13-3 所示。


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig3_HTML.jpg](img/495303_1_En_13_Fig3_HTML.jpg)


    **图 13-3** 判别器架构


    判别器也使用卷积层，并对给定图像进行下采样以进行评估。


    ### 数学公式


    GAN 的工作原理可以用下面给出的简单数学公式表示：


    ![$$ \frac{\mathit{\min}}{G}\frac{\mathit{\max}}{D}V\left(D,G\right)=\frac{\mathit{\min}}{G}\frac{\mathit{\max}}{D}\left({E}_{z\sim
    {P}_{data}(x)}\left[ logD(x)\right]+{E}_{z\sim {P}_z(z)}\left[\mathit{\log}\left(1-D\left(G(z)\right)\right)\right]\right)
    $$](images/495303_1_En_13_Chapter/495303_1_En_13_Chapter_TeX_Equa.png)


    其中`G`代表生成器，`D`代表判别器。`data(x)`代表真实数据的分布，`pz`代表生成数据或伪造数据的分布。`x`代表来自真实数据的样本，`z`代表来自生成数据的样本。`D(x)`代表判别器网络，`G(z)`代表生成器网络。


    在真实数据上训练时的判别器损失表示为


    ![$$ L\left(D(x),1\right)=\mathit{\log}\left(D(x)\right) $$](img/495303_1_En_13_Chapter_TeX_Equ1.png)


    (1)


    在来自生成器的伪造数据上训练时的判别器损失表示为


    ![$$ L\left(D\left(G(z)\right),0\right)=\mathit{\log}\left(1-D\left(G(z)\right)\right)
    $$](img/495303_1_En_13_Chapter_TeX_Equ2.png)


    (2)


    对于真实数据，判别器的预测应接近 1。因此，应最大化方程 1 以使`D(x)`接近 1。第一个方程是真实数据上的判别器损失，应最大化以使`D(G(z))`接近
    1。因为第二个方程是伪造数据上的判别器损失，所以也应最大化。注意，log 是一个递增函数。对于第二个方程，判别器对生成的伪造数据的预测应接近零。为了最大化第二个方程，我们必须将`D(G(z))`的值最小化到零。因此，我们需要最大化判别器的两个损失。判别器的总损失是方程
    1 和 2 给出的两个损失之和。因此，组合后的总损失也将被最大化。


    生成器损失表示为


    ![$$ {L}^{(G)}=\mathit{\min}\left[\mathit{\log}\left(D(x)\right)+\mathit{\log}\left(1-D\left(G(z)\right)\right)\right]
    $$](images/495303_1_En_13_Chapter/495303_1_En_13_Chapter_TeX_Equ3.png)


    (3)


    在生成器训练期间，我们需要最小化这个损失。


    ### 数字生成


    在这个项目中，我们将使用 Kaggle 提供的流行 MNIST 数据集。如你所知，该数据集包含手写数字的图像。我们将创建一个 GAN 模型来生成与这些图像看起来相同的额外图像。这可能有助于某些人在未来的开发中增加训练数据集的大小。


    #### 创建项目


    创建一个 Colab 项目并将其重命名为`DigitGen-GAN`。导入所需的库。

