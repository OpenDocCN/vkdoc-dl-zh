    ```python

    gen_model.add(tf.keras.layers.Conv2DTranspose

    (64, (5, 5),

    strides=(2, 2),

    padding=''same'',

    use_bias=False))

    gen_model.add(tf.keras.layers.BatchNormalization())

    gen_model.add(tf.keras.layers.LeakyReLU())

    ```


    输出图像现在将是 14x14 的大小。


    我们现在添加最后一个 `Conv2D` 层，步长等于 `(2, 2)`，从而进一步将图像放大到 28x28 的大小。这是我们最终期望的图像尺寸。


    ```python

