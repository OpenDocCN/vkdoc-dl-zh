  raw: '### Defining Model


    To define a model, we need three important pieces of information:


    *   The input shape (images, in the form of Tensors)


    *   The desired number of classes (number of dog breeds)


    *   The URL of the pre-trained model that we want to use


    We declare the variables for these using the following code segment:


    ```

    # Setup input shape to the model

    INPUT_SHAPE = [None, IMG_SIZE, IMG_SIZE, 3] # batch, height, width, colour channels

    # Setup output shape of the model

    OUTPUT_SHAPE = len(unique_breeds) # number of unique labels

    # Setup model URL from TensorFlow Hub

    MODEL_URL = "https://tfhub.dev/google/imagenet/mobilenet_v2_130_224/classification/4"

    ```


    To define the model, we will write a function called create_model:


    ```

    def create_model(input_shape=INPUT_SHAPE,

    output_shape=OUTPUT_SHAPE,

    model_url=MODEL_URL):

    print("Building model with:", MODEL_URL)

    ```


    The create_model function takes the input shape, the output shape, and the pre-trained
    model URL as parameters. I have created a function for model building so that
    later on you may experiment with different pre-trained models that may require
    different input and output shapes.


    Next, we will use the Sequential API to define two layers in our model.


    ```

    # Setup the model layers

    model = tf.keras.Sequential([

    hub.KerasLayer(MODEL_URL), # TensorFlow Hub layer

    tf.keras.layers.Dense(units=OUTPUT_SHAPE,

    activation="softmax") # output layer

    ])

    ```


    The first layer is the entire pre-trained model taken from the Hub. The second
    layer is the softmax classification layer that classifies the dogs into 120 categories
    that we are seeking.


    Next, you will compile the model using the following statement:


    ```

    # Compile the model

    model.compile(

    loss=tf.keras.losses.CategoricalCrossentropy(),

    optimizer=tf.keras.optimizers.Adam(),

    metrics=["accuracy"]

    )

    ```


    We use CategoricalCrossentropy for our loss function and Adam optimizer. We capture
    the accuracy metrics to evaluate the model’s performance.


    We build the model by calling the build method that takes the input Tensor as
    its parameter:


    ```

    model.build(INPUT_SHAPE)

    ```


    Finally, we returned the compiled model to the caller:


    ```

    return model

    ```


    The full function definition for create_model is given in Listing [4-4](#495303_1_En_4_Chapter.xhtml#PC52).


    ```

    # Create a function which builds a Keras model

    def create_model(input_shape=INPUT_SHAPE,

    output_shape=OUTPUT_SHAPE,

    model_url = MODEL_URL):

    print("Building model with:", MODEL_URL)

    F

    # Setup the model layers

    model = tf.keras.Sequential([

    hub.KerasLayer(MODEL_URL), # TensorFlow Hub layer

    tf.keras.layers.Dense(units=OUTPUT_SHAPE,

    activation="softmax") # output layer

    ])

    # Compile the model

    model.compile(

    loss=tf.keras.losses.CategoricalCrossentropy(),

    optimizer=tf.keras.optimizers.Adam(),

    metrics=["accuracy"]

    )

    # Build the model

    model.build(INPUT_SHAPE)

    return model

    Listing 4-4

    The create_model function

    ```


    You can test this function by creating a model variable and printing its summary
    as follows:


    ```

    model = create_model()

    model.summary()

    ```


    The model summary that is the output generated by the preceding code is shown
    in Figure [4-18](#495303_1_En_4_Chapter.xhtml#Fig18).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig18_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Model summary


    Now that we have our model ready for training, let us create datasets for training
    it.


    ### Creating Datasets


    We have already split our training dataset into training and validation. We now
    just need to preprocess those using our previously defined create_data_batches
    function.


    ```

    train_data = create_data_batches(X_train, y_train)

    Val_data = create_data_batches(X_val,y_val)

    ```


    If you just want to visually inspect a few records of the dataset, use our previously
    developed function show_25_images:


    ```

    train_images, train_labels = next(train_data.as_numpy_iterator())

    show_25_images(train_images, train_labels)

    ```


    You would see the output as shown in Figure [4-19](#495303_1_En_4_Chapter.xhtml#Fig19).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig19_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig19_HTML.jpg)


    Figure 4-19


    Sample images from the dataset


    Note that in your case, the output may show different pictures because we do shuffle
    the training dataset on every run.


    Our dataset for model training is now ready. We need to do just one last thing
    before training the model, and that is to set up TensorBoard for analytics.


    ### Setting Up TensorBoard


    First, you need to load the TensorBoard extension.


    ```

    %load_ext tensorboard

    ```


    Next, you will clean up the logs from the previous run, if any.


    ```

    !rm -rf ./logs/  # cleaning the previous log

    ```


    You will now create a callback function that will be called after every epoch.


    ```

    import datetime

    import os

    # Create a function to build a TensorBoard callback

    def create_tensorboard_callback():

    # Create a log directory for storing TensorBoard logs

    logdir = os.path.join("logs",

    # Timestamp the log

    datetime.datetime.now().strftime("%Y%m%d-%H%M%S"))

    return tf.keras.callbacks.TensorBoard(logdir)

    ```


    Note that in the function we create a logs directory and store the current time
    on each log.


    We will use the EarlyStopping function to monitor the accuracy on the validation
    dataset. The following code will create two variables for logging and monitoring:


    ```

    # TensorBoard callback

    model_tensorboard = create_tensorboard_callback()

    # Early stopping callback

    model_early_stopping = tf.keras.callbacks.EarlyStopping(monitor="accuracy",

    # stops after 3 rounds

    # of no improvements

    patience=3)

    ```


    We will pass these values to the callbacks parameter in the fit method. If, during
    training, the accuracy on validation dataset does not show much improvement over
    the last three cycles, defined by the patience parameter, the training would stop.


    Now, we are ready to code for the actual training.


    ### Model Training


    We first build the model by calling our previously defined function create_model.


    ```

    model = create_model()

    ```


    We define a variable for the number of epochs used during training.


    ```

    NUM_EPOCHS = 100

    ```


    I have declared the number of epochs to be very large. I am going to demonstrate
    to you one important feature of TF2 that stops the training automatically when
    a saturation level is reached on the model’s accuracy, indicating that further
    training is not going to help in getting any better accuracy. When you actually
    do the model training, you will notice that the training halts much earlier than
    the set 100 epochs.


    We now start training by calling the fit method.


    ```

    model.fit(x = train_data,

    epochs = NUMBER_OF_EPOCHS,

    validation_data = val_data,

    callbacks = [model_tensorboard,

    model_early_stopping])

    ```


    The training output is verbosed on your screen. When I ran the training, it stopped
    after 14 iterations. The screenshot of the training progress just before it stopped
    the training is shown in Figure [4-20](#495303_1_En_4_Chapter.xhtml#Fig20).


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig20_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig20_HTML.jpg)


    Figure 4-20


    Training output just before EarlyStopping


    Note that on the 12/13/14 iterations, the accuracy on the validation dataset was
    0.8161/0.8122/0.8122, indicating the saturation in training. Testing the accuracy
    on the validation data shows you how much your model works in general for cases
    outside the training set.


    ### Examining Logs


    You can now open TensorBoard in your Colab environment using the following magic
    command :


    ```

    %tensorboard --logdir logs

    ```


    The screenshot in Figure [4-21](#495303_1_En_4_Chapter.xhtml#Fig21) shows the
    accuracy and loss plots for both training and validation data.


    ![../images/495303_1_En_4_Chapter/495303_1_En_4_Fig21_HTML.jpg](images/495303_1_En_4_Chapter/495303_1_En_4_Fig21_HTML.jpg)


    Figure 4-21


    Accuracy and loss metrics'
