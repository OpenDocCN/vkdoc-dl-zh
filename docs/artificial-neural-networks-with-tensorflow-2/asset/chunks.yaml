    following function:


    ```

    def image_to_tensor_style(path_to_img):

    img = tf.io.read_file(path_to_img)

    img = tf.image.decode_image

    (img, channels=3, dtype=tf.float32)

    img = tf.image.resize(img, [256,256])

    img = img[tf.newaxis, :]

