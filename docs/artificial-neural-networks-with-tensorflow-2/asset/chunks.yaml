- fmt: '### `CustomCallback` Class


    We will now create another callback for writing the model’s predictions. We will
    be storing the predictions at the end of each epoch in a text file. We create
    a global variable for tracking the epoch number.


    ```

    epoch_number = 0

    ```


    We declare a filename for storing predictions:


    ```

    filename = ''predictions.txt''

    ```


    We overwrite the contents of the file if it preexists.


    ```

    file = open(filename , ''w'')

    file.truncate()

    file.close()

    ```


    We declare the custom class as follows:


    ```

    class CustomCallback(tf.keras.callbacks.Callback):

    ```


    We define a method called `on_epoch_end` with the following statement:


    ```

    def on_epoch_end(self , epoch , logs = None):

    ```


    This method will be called at the end of each epoch. In the method body, we first
    increment our global epoch count:


    ```

    global epoch_number

    epoch_number = epoch_number + 1

    ```


    We open the prediction file in the append mode to add our predictions:


    ```

    filename = ''predictions.txt''

    file = open(filename , ''a'')

    ```


    We declare our seed:


    ```

    seed = "looking fo"

    ```


    We create a pattern from this seed in a simple for loop:


    ```

    pattern = []

    for i in seed:

    value = char_to_ix[i]

    pattern.append(value)

    ```


    We first write the epoch number to the file:


    ```

    file.seek(0)

    file.write("\n\n Epoch number :

    {}\n\n".format(epoch_number))

