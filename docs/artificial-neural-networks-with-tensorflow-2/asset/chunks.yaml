- fmt: '### Creating Datasets


    For machine learning, you need training and testing datasets. The training dataset
    is further divided into training and validation sets. To create these datasets,
    we use the `train_test_split` method of `sklearn` as follows:


    ```python

    # creating training, validation and testing datasets

    from sklearn.model_selection import train_test_split

    x_train_1 , x_test , y_train_1 , y_test =

    train_test_split

    (x , y , test_size = 0.15 , random_state = 0)

    x_train , x_val , y_train , y_val =

    train_test_split(x_train_1 , y_train_1 ,

    test_size = 0.05 , random_state = 0)

    ```


    Note that 15% of the data is reserved for testing. The training data is split
    into 95:5 ratio – 95% for training and 5% for validation.


    Generally, the data in different fields show a wide variance in their values.
    The neural network will learn better if these data items are scaled down to a
    fixed scale. Thus, we need to preprocess the entire data. This preprocessing mainly
    consists of feature scaling through standardization or Z-score normalization.
    You rescale the feature values so as to have a standard normal distribution with
    a mean of zero and a standard deviation of one. This is shown in Figure [5-3](#495303_1_En_5_Chapter.xhtml#Fig3).


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig3_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Desired data distribution


    We now proceed to scale our data so as to ideally achieve the distribution curve
    illustrated in Figure [5-3](#495303_1_En_5_Chapter.xhtml#Fig3).


    ### Scaling Data


    To scale our input data or to be more precise to center it, you subtract the mean
    and then divide the result by the standard deviation:


    ![$$ {x}^{\prime }=\frac{x-\mu }{\sigma } $$](images/495303_1_En_5_Chapter/495303_1_En_5_Chapter_TeX_Equb.png)


    where **μ** is the mean and **σ** is the standard deviation.


    You first do the transformation on the training set. For this, we use the `StandardScaler`
    class of `sklearn` and call its `fit_transform` method. The following code does
    this transformation:


    ```python

    from sklearn.preprocessing import StandardScaler

    sc_x = StandardScaler()

    x_train_new = sc_x.fit_transform(x_train)

    ```


    You may check the effect of this transformation by plotting the raw data before
    and after the transformation. The following code generates these two plots for
    the `fixed_acidity` field:


    ```python

    fig, (ax1, ax2) = plt.subplots

    (ncols = 2, figsize = (20, 10))

    ax1.scatter(x_train.index,

    x_train[''fixed acidity''],

    color = c,

    label = ''raw'',

    alpha = 0.4,

    marker = m

    )

    ax2.scatter(x_train.index,

    x_train_new[: , 1],

    color = c,

    label = ''adjusted'',

    alpha = 0.4,

    marker = m

    )

    ax1.set_title(''Training dataset'')

    ax2.set_title(''Standardized training dataset'')

    for ax in (ax1, ax2):

    ax.set_xlabel(''index'')

    ax.set_ylabel(''fixed acidity'')

    ax.legend(loc =''upper right'')

    ax.grid()

    plt.tight_layout()

    plt.show()

    ```


    The output is shown in Figure [5-4](#495303_1_En_5_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig4_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Data distribution before and after standardization


    The plot on the LHS shows the raw data, where you can see that the `fixed acidity`
    field values range from about 0 to 14 with the mean somewhere around 7. The plot
    on the RHS shows the same data after the transformation. Note that the mean is
    about 0 with the data variation between –2 and +2, indicating a standard deviation
    of +/–1. If you check the plots for other fields, you will again notice that the
    mean is brought to zero, and there is a somewhat even distribution on either side
    of zero equal to the standard deviation.


    You can try one more plot – this time plotting the `total sulfur dioxide` on the
    y axis and `residual sugar` on the x axis. The following code generates these
    plots:


    ```python

    fig, (ax1, ax2) =

    plt.subplots(ncols = 2, figsize = (20, 10))

    for l, c, m in zip(range(0, 2),

    (''blue'', ''red''), (''^'', ''s'')):

    ax1.scatter(x_train[''residual sugar''],

    x_train[''total sulfur dioxide''],

    color = c,

    label = ''class %s'' % l,

    alpha = 0.4,

    marker = m

    )

    for l, c, m in zip(range(0, 2),

    (''blue'', ''green''), (''^'', ''s'')):

    ax2.scatter(x_train_new[: , 3],

    x_train_new[: , 6],

    color = c,

    label = ''class %s'' % l,

    alpha = 0.4,

    marker = m

    )

    ax1.set_title(''Training dataset'')

    ax2.set_title(''Standardized training dataset'')

    for ax in (ax1, ax2):

    ax.set_xlabel(''residual sugar'')

    ax.set_ylabel(''total sulfur dioxide'')

    ax.legend(loc =''upper right'')

    ax.grid()

    plt.tight_layout()

    plt.show()

    ```


    The output is shown in Figure [5-5](#495303_1_En_5_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_5_Chapter/495303_1_En_5_Fig5_HTML.jpg](images/495303_1_En_5_Chapter/495303_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Data distribution for two fields after standardization


    As you can see from the LHS plot in Figure [5-5](#495303_1_En_5_Chapter.xhtml#Fig5),
    the `residual sugar` values vary between 0 and 30, while the `total sulfur dioxide`
    value has a large variation between 0 and 400. After the transformation as seen
    in the plot on RHS of Figure [5-5](#495303_1_En_5_Chapter.xhtml#Fig5), both fields
    show a mean value of 0 and even distribution between –2 and +2 for the rest of
    the data points.


    This kind of transformation helps neural networks learn better. So, we do these
    transformations on all our features. The `fit_transform` not only transforms the
    data but also stores the values of **μ** and **σ** in internal variables. For
    very obvious reasons, you must apply the same transformation that you applied
    to the training dataset to your testing and cross-validation sets. Thus, retaining
    the values of these parameters is an important goal behind using the `fit_transform`
    method. The method fits the values, remembers them, and then applies the transformation.
    Now, to transform the testing and validation datasets, we simply call the `transform`
    method and not the `fit_transform` method. This is done using the following two
    statements:


    ```python

    x_test_new = sc_x.transform(x_test)

    x_val_new = sc_x.transform(x_val)

    ```


    With all fields now standardized to a mean value of zero with the even distribution
    of other data points determined by the standard deviation, you are now ready for
    building the model.


    ## Model Building


    Before we build the model, I am going to write a small function for visualizing
    the training results that can be used for the several models that we are going
    to train.'
