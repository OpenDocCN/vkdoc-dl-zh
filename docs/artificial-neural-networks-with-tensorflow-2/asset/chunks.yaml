    ### 模型 5


    `BatchNormalization` 的工作方式与常规归一化相同，区别在于它作用于数据批次。前一层的激活在每个批次上进行处理，以保持平均激活值接近 0，标准差接近
    1。因此，它减少了训练步数，从而加快了训练过程。在某些情况下，它还可能消除前一个模型中使用 dropout 的需求。


    正则化是一种通过在训练集上适当拟合函数以减少误差，从而避免过拟合的技术。


    我们将在新的模型定义中应用这些技术。


    模型定义如下代码所示：


    ```python

    weight_decay = 1e-4

    model_5 = Sequential([

    Conv2D(32, (3, 3), activation = ''relu'', padding = ''same'',

    kernel_regularizer = tf.keras.regularizers.l2(weight_decay),

    input_shape = (32, 32, 3)),

    BatchNormalization(),

    Conv2D(32, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    MaxPooling2D((2, 2)),

    Dropout(0.2),

    Conv2D(64, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    Conv2D(64, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    MaxPooling2D((2, 2)),

    Dropout(0.3),

    Conv2D(128, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    Conv2D(128, (3, 3), activation = ''relu'', kernel_regularizer =

    tf.keras.regularizers.l2(weight_decay), padding = ''same''),

    BatchNormalization(),

    MaxPooling2D((2, 2)),

    Dropout(0.3),

    Flatten(),

    Dense(128, activation = ''relu''),

    Dense(10, activation = ''softmax'')

    ])

    opt = tf.keras.optimizers.SGD(lr = 0.001, momentum = 0.9)

    model_5.compile(optimizer = opt, loss = ''categorical_crossentropy'',

    metrics = [''accuracy''])

    ```


