    train_seqs[:5]\nmax_length = max(len(t) for t in train_seqs)\ncap_vector = tf.keras.preprocessing.sequence.pad_sequences(train_seqs,\
    \ padding='post')\ncap_vector[:5]\n```\n\n```python\nBATCH_SIZE = 64\nBUFFER_SIZE\
    \ = 1000\nembedding_dim = 256\nunits = 512\nvocab_size = max_size + 1\nnum_steps\
    \ = len(img_name_vector) // BATCH_SIZE\n```\n\n## 加载先前提取的特征\n\n```python\ndef\
    \ map_func(img_name, cap):\n    img_tensor = np.load(img_name.decode('utf-8')+'.npy')\n\
