    ```python

    digit9_images = []

    for i in range(len(train_images)):

    if train_labels[i] == 9:

    digit9_images.append(train_images[i])

    train_images = np.array(digit9_images)

    train_images.shape

    ```


    The shape is `(5949, 28, 28)`. Thus, we have 5949 images of size 28x28. It is
    a huge repository. Our model will try to produce images of this size, matching
    the looks of these images.


    You can verify that you have images only for digit 9 by printing a few on the
    terminal using the following code:


    ```python

    n = 10

    f = plt.figure()

    for i in range(n):

    f.add_subplot(1, n, i + 1)

    plt.subplot(1, n, i+1 ).axis("off")

    plt.imshow(train_images[i])

    plt.show()

    ```


    You will see the output in Figure [13-4](#495303_1_En_13_Chapter.xhtml#Fig4).


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig4_HTML.jpg](images/495303_1_En_13_Chapter/495303_1_En_13_Fig4_HTML.jpg)


    **Figure 13-4** Sample images


    We will now prepare the dataset for training.


    ## Preparing Dataset


    First, we reshaped the data using the following statement; note that the image
    size in our dataset is 28x28 pixels.


    ```python

    train_images = train_images.reshape (

    train_images.shape[0], 28, 28, 1).astype

    (''float32'')

    ```


    As each color value in the image is in the range of 0 through 256, we normalize
    these values to the scale of –1 to 1 for better learning. The mean value is 127.5,
    and thus the following equation will normalize the values in the range –1 to +1.
    You could have alternatively chosen 255 to normalize the values between 0 and
    1.


    ```python

    train_images = (train_images - 127.5) / 127.5

    ```


    We create a batch dataset for training by calling the `from_tensor_slices` method.


    ```python

    train_dataset = tf.data.Dataset.from_tensor_slices(

    train_images).shuffle

    (train_images.shape[0]).batch(32)

    ```


    Next comes the important part of our application, and that is defining the model
    for our generator.


    ## Defining Generator Model


    The generator’s purpose is to create images containing digit 9 which look similar
    to the images in our training dataset.


    You will use the Keras sequential model for creating our generator.


    ```python

    gen_model = tf.keras.Sequential()

    ```


    You will add the Keras `Dense` layer as the first layer. Optionally, you could
    make `Conv2D` layer as your first layer.


    ```python

    gen_model.add(tf.keras.layers.Dense(7*7*256,

    use_bias=False,

    input_shape=(100,)))

    ```


    The input to this layer is specified as 100 because later on we will use a noise
    vector of dimension 100 as an input to this GAN model. We will start with an image
    size of 7x7 and keep upscaling it to a final destination size of 28x28. The z-dimension
    256 specifies the filters used for our image, which eventually gets converted
    to 3 for our final image.


    Next, we add a batch normalization layer to the model for providing stability.


    ```python

    gen_model.add(tf.keras.layers.BatchNormalization())

    gen_model.add(tf.keras.layers.LeakyReLU())

    ```


    We add the activation layer as a leaky ReLU.


    We reshape the output to 7x7x256:


    ```python

    gen_model.add(tf.keras.layers.Reshape((7, 7, 256)))

    ```


    We now use the `Conv2D` layer to upscale the generated image.


    ```python

    gen_model.add(tf.keras.layers.Conv2DTranspose

    (128, (5, 5),

    strides=(1, 1),

    padding=''same'',

    use_bias=False))

    ```


    The first parameter is the dimensionality of the output space, that is, the number
    of output filters in the convolution. The second parameter is the `kernel_size`
    that actually specifies the height and width of the convolution filter. The third
    parameter specifies the `strides` of the convolution along the height and width.
    To understand strides, consider a filter being moved across the image from left
    to right and top to bottom, 1 pixel at a time. This movement is referred to as
    the stride. With a stride of `(2, 2)`, the filter is moved 2 pixels on each side,
    upscaling the image by 2x2.


    Since the stride is specified as `(1, 1)`, the output of this layer will be the
    image of size 7x7 – the same as its input. The `padding` ensures that the dimensions
    remain the same. The `false` value in the `use_bias` parameter indicates that
    the layer does not use a bias vector. This layer is then followed by the batch
    normalization and activation layers as before:


    ```python

    gen_model.add(tf.keras.layers.BatchNormalization())

    gen_model.add(tf.keras.layers.LeakyReLU())

    ```


    Next, we add the `Conv2DTranspose` layer with strides set to `(2, 2)` followed
    by the batch normalization and activation layers.


    ```python

    gen_model.add(tf.keras.layers.Conv2DTranspose

    (64, (5, 5),

    strides=(2, 2),

    padding=''same'',

    use_bias=False))

    gen_model.add(tf.keras.layers.BatchNormalization())

    gen_model.add(tf.keras.layers.LeakyReLU())

    ```


    The output image will now be of size 14x14.


    We now add the last `Conv2D` layer with strides equal to `(2, 2)`, thus further
    upscaling the image to size 28x28. This is our final desired image size.


    ```python

    gen_model.add(tf.keras.layers.Conv2DTranspose

    (1, (5, 5),

    strides=(2, 2),

    padding=''same'',

    use_bias=False,

    activation=''tanh''))

    ```


    The last layer uses `tanh` activation and the map parameter value of 1, thus giving
    us a single output image.


    The model plot as generated by the plot utility is shown in Figure [13-5](#495303_1_En_13_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig5_HTML.jpg](images/495303_1_En_13_Chapter/495303_1_En_13_Fig5_HTML.jpg)


    **Figure 13-5** Generator architecture


    The model summary is shown in Figure [13-6](#495303_1_En_13_Chapter.xhtml#Fig6).


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig6_HTML.jpg](images/495303_1_En_13_Chapter/495303_1_En_13_Fig6_HTML.jpg)


    **Figure 13-6** Generator model summary


    ## Testing Generator


    You will test the generator with a random input vector and display it on the console
    using the following code:


    ```python

    noise = tf.random.normal([1, 100])

    #giving random input vector

    generated_image = gen_model(noise, training=False)

    plt.imshow(generated_image[0, :, :, 0], cmap="gray")

    ```


    The image will look like the one shown in Figure [13-7](#495303_1_En_13_Chapter.xhtml#Fig7).


    ![../images/495303_1_En_13_Chapter/495303_1_En_13_Fig7_HTML.jpg](images/495303_1_En_13_Chapter/495303_1_En_13_Fig7_HTML.jpg)


    **Figure 13-7** Random image generated by the generator


    Check the shape of the image:


    ```python

    generated_image.shape

    ```


    It gives the following output:


    ```

    TensorShape([1, 28, 28, 1])

    ```


    The output indicates that the image has dimensions of 28x28, as desired by us.
    Next, we will define the discriminator.


    ## Defining Discriminator Model


    We define our discriminator as follows:


    ```python

    discri_model = tf.keras.Sequential()

    discri_model.add(tf.keras.layers.Conv2D

    (64, (5, 5),

    strides=(2, 2),

    padding=''same'',

    input_shape=[28, 28, 1]))

    discri_model.add(tf.keras.layers.LeakyReLU())

    discri_model.add(tf.keras.layers.Dropout(0.3))

    discri_model.add(tf.keras.layers.Conv2D

    (128, (5, 5),

    strides=(2, 2),

    padding=''same''))

    discri_model.add(tf.keras.layers.LeakyReLU())

    discri_model.add(tf.keras.layers.Dropout(0.3))

    discri_model.add(tf.keras.layers.Flatten())

    discri_model.add(tf.keras.layers.Dense(1))

    ```


    The discriminator uses just two convolutional layers. The output of the last convolutional
    layer is of type `(batch size, height, width, filters)`. The `Flatten` layer in
    our network flattens this output to feed it to our last `Dense` layer in the network.'
