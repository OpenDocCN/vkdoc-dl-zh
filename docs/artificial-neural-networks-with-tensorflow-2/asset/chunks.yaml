- fmt: '# Summary


    In this chapter, you learned another important application of natural language
    processing. You created an application for captioning any given image. Image captioning
    has two important parts – one to extract the image features and the other to map
    these features into a textual caption. Extracting the image features is a trivial
    job, and there are many pre-trained networks available for this purpose. You used
    the `InceptionV3` network for extracting the features. For translating this to
    a caption, you used RNN with Bahdanau Attention. The Bahdanau Attention was described
    in depth alongside its implementation.


    In the next chapter, you will learn another important technique and that is time
    series forecasting.


    # 11. Time Series Forecasting


    ## Introduction


    Forecasting has always been a topic of interest for every human being. What is
    my future? Will I become a millionaire in the next 5 years? When will I get married?
    These are the questions raised by several of us. There are people in this world
    who do forecasting and at least try to provide answers to such questions. Neural
    networks so far are not successful in doing such kinds of forecasts. But they
    do certainly forecast the futures where the past data contains some discoverable
    patterns. The topic of this chapter is to learn how to train neural networks to
    perform such kinds of forecasts. These are called time series forecasting. Let
    me first describe what we mean by a time series followed by forecasting the future.


    ## What Is Time Series Forecasting?


    Making predictions about the future is called extrapolation in classical statistics.
    In the modern world, people use the term time series forecasting to mean the same
    as extrapolation. Forecasting involves creating models that fit on historical
    data and using them to predict the future – things which have not happened so
    far. Like what? The answer to the question "Is it going to be hot tomorrow?" is
    a future prediction. Neural networks can do this kind of prediction, albeit to
    a greater accuracy than a mere intuitional prediction done by a man. How do they
    do this? We provide them the temperature data over the last several days, months,
    and probably years. The network finds the pattern which is essentially a time
    series pattern and does a prediction based on this pattern. Another example of
    time series forecasting can be predicting the future price of a stock. The question
    "What will be the price of IBM stock one month down the line?" can be answered
    by a trained neural network.


    Here are a few more examples of time series:


    *   Forecasting whether a patient is having a seizure based on their EEG (electroencephalogram)

    *   Forecasting product sales of Barbie dolls in the month of December

    *   Forecasting an hourly bandwidth utilization demand on a server

    *   Forecasting the corp yield next year

    *   Forecasting the birth rate in a certain city


    Like this, you will find many questions which have great interests in the minds
    of human beings. To solve such problems, many statistical techniques were developed
    over a period of time. In today''s age, neural networks aid in this human effort.
    Before I discuss how this kind of forecasting is done, let me describe some of
    the important concerns in such forecasting.


    ## Concerns of Forecasting


    Some of the major concerns while forecasting may be listed as follows:


    *   How much past data do you have?

    *   Does the user want to forecast short, medium, or long term?

    *   Are the forecasts static?

    *   Are periodic forecasts required for a given problem?


    The first and foremost important point in time series forecasting is how much
    past data you have. Note that the neural network is going to analyze the past
    data to find trends in it. Based only on these trends, future forecasts can be
    made.


    It will be easier to make short-term forecasts, while medium- or long-term forecasts
    are typically difficult to make due to the fact that there could be lots of uncertainties
    as the trends in data may change over these time periods.


    When a user asks for a forecast, are they looking for a static forecast or are
    they willing to accept a new forecast when the conditions change? The requirement
    of a dynamic forecast can be one of the concerns while designing a forecasting
    model.


    Sometimes, the forecasts on the same problem are made at a predecided frequency.
    The low or high frequency of forecasts becomes a deciding factor while sampling
    the data, which in turn influences the modeling. Predicting tomorrow''s temperature
    every day is considered a low-frequency forecasting, while high-frequency trading
    on a stock market is considered a high-frequency forecasting.


    I will now describe the various components of a time series.


    ## Components of Time Series


    While analyzing a time series for modeling, there are a few points that you will
    need to observe carefully. These are the components of a time series which may
    be classified into the following categories:


    *   General trends

    *   Seasonal movements

    *   Cyclical movements

    *   Noise (irregular fluctuations)


    The general or secular trend is the main component of a time series. The trend
    in a time series which follows a certain observable pattern may show an incline
    or a decline over a period of time, mainly due to the effects of socioeconomic
    and political factors. The ice cream manufacturer''s increased sales during the
    summer and a decline during the winter are termed a seasonal movement in the sales
    trend. You may observe long-time oscillations in a time series assuming you have
    long-term data, say 5–12 years of data, available for analysis. These are the
    long-term cycles observed in economic data of a country''s economy. Businesses
    too show long-term oscillations which are well known as business cycles. Lastly,
    the noise or irregular fluctuations in the data occur when there are unforeseen
    situations like the COVID-19 epidemic. While developing a model for time series
    analysis, you must factor out the preceding components in your analysis.


    Finally, we come to another important aspect, and that is the classification of
    time series in its two major components.


    ## Univariate vs. Multivariate


    All time series are classified into two main categories:


    *   Univariate

    *   Multivariate


    A single variable measured over time is called a univariate time series. For example,
    the consumption of electricity in your home measured over a period of one year
    is considered a univariate time series. Such time series are best modeled using
    statistical techniques, such as autoregressive moving average (ARMA). As the name
    suggests, it combines autoregression techniques with moving average techniques
    to forecast those future values. It assumes that the previous observations are
    good predictors of future values.


    A multivariate time series has more than one time-dependent variable. Thus, the
    resultant not merely depends on the past values of the multiple variables but
    is also a function of interdependencies between them. A well-known statistical
    technique for modeling a multivariate time series is the vector autoregression
    (VAR) model. The model assumes that each variable is a function of the past values
    of itself and also the past values of all correlated variables. An example of
    a multivariate time series would be air pollution which depends on several interdependent
    components.


    Having said all these, I will now show you how to develop neural network models
    for forecasting on both univariate and multivariate time series.'
