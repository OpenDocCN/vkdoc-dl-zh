    \ the quality of translation.\n\nIn the next chapter, you will study another type\
    \ of language model for language understanding.\n\n# 9. Natural Language Understanding\n\
    \n## Introduction\n\nIn the last chapter, you used the `seq2seq` model along with\
    \ the Attention to perform a language translation. In this chapter, I will show\
