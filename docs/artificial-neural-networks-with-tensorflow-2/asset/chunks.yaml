- fmt: "# Style Transfer with VGG16\n\n`Gatys et al. (2015)` came up with the core\
    \ idea behind the style transfers. The core idea is to say that the CNNs (Convolutional\
    \ Neural Networks) pre-trained for image classification know how to encode the\
    \ perceptual and semantic information about an image. There are many such pre-trained\
    \ CNNs available in the world. We will use `VGG16` to extract the features of\
    \ an image and then work independently on its content and style. The original\
    \ paper uses the 19-layer VGG network model from `Simonyan and Zisserman (2015)`.\
    \ The `VGG16` model architecture is shown in Figure [12-5](#495303_1_En_12_Chapter.xhtml#Fig5).\n\
    \n![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig5_HTML.jpg](images/495303_1_En_12_Chapter/495303_1_En_12_Fig5_HTML.jpg)\n\
    \n**Figure 12-5** The VGG16 architecture (Image credits: [researchgate.net](https://www.researchgate.net))\n\
    \nAs we are not doing an image classification and are interested in just the feature\
    \ extraction, we do not need the fully connected layers or the final softmax classifier\
    \ of the VGG network. We only need the part of the model. So, how do we extract\
    \ only a certain portion of the model? Fortunately for us, this is a very trivial\
    \ task as Keras provides a pre-trained `VGG16` model in which you can separate\
    \ out the layers. Keras does provide many other models including the latter `VGG19`.\
    \ To remove the top most fully connected layers, you need to set the value of\
    \ the `include_top` variable to `False` while extracting the model layers.\n\n\
    ## Creating Project\n\nCreate a new Colab project and rename it to `CustomStyleTransfer`.\
    \ Install the following two packages:\n\n```\n!pip install keras==2.3.1\n!pip\
    \ install tensorflow==2.1.0\n```\n\n**Note:** At the time of publishing, it was\
    \ discovered that the pre-trained `VGG16` model used in this project runs with\
    \ the Keras and TensorFlow versions specified above and does not yet support the\
    \ newer versions as of this writing.\n\nImport the required libraries.\n\n```\n\
    import tensorflow as tf\nimport re\nimport urllib\nfrom tensorflow.keras.preprocessing.image\
    \ import load_img, img_to_array\nfrom matplotlib import pyplot as plt\nfrom IPython\
    \ import display\nfrom PIL import Image\nimport numpy as np\nfrom tensorflow.keras.applications\
    \ import vgg16\nfrom tensorflow.keras import backend as K\nfrom keras import backend\
    \ as K\nfrom scipy.optimize import fmin_l_bfgs_b\n```\n\n## Downloading Images\n\
    \nAs in the earlier project, you would write a download function and call it to\
    \ download the two required images for the project. The code is given in Listing\
    \ [12-3](#495303_1_En_12_Chapter.xhtml#PC16).\n\n```\ndef download_image_from_URL(imageURL):\n\
    \    imageName = re.search('[a-z0-9\\-]+\\.(jpe?g|png|gif|bmp|JPG)', imageURL,\
    \ re.IGNORECASE)\n    imageName = imageName.group(0)\n    urllib.request.urlretrieve(imageURL,\
    \ imageName)\n    imagePath = \"./\" + imageName\n    return imagePath\n\n# This\
    \ is the path to the image you want to transform.\ntarget_url = \"https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch12/blank-sign.jpg\"\
    \ntarget_path = download_image_from_URL(target_url)\n\n# This is the path to the\
    \ style image.\nstyle_url = \"https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch12/road.jpg\"\
    \n```\n\n**Listing 12-3** Function for downloading images\n\nWe would scale the\
    \ target image to have a height of 400 pixels. To maintain the aspect ratio, we\
    \ recompute the width as follows:\n\n```\nwidth, height = load_img(target_path).size\n\
    img_height = 400\nimg_width = int(width * img_height / height)\n```\n\n## Displaying\
    \ Images\n\nTo display the two images, we use a code similar to the one in the\
    \ previous project. The code is given in Listing [12-4](#495303_1_En_12_Chapter.xhtml#PC18).\n\
    \n```\ncontent = Image.open(target_path)\nstyle = Image.open(style_path)\n\nplt.figure(figsize=(10,\
    \ 10))\nplt.subplot(1, 2, 1)\nplt.imshow(content)\nplt.title('Content Image')\n\
    plt.subplot(1, 2, 2)\nplt.imshow(style)\nplt.title('Style Image')\nplt.tight_layout()\n\
    plt.show()\n```\n\n**Listing 12-4** Displaying content and style images\n\nThe\
    \ output is shown in Figure [12-6](#495303_1_En_12_Chapter.xhtml#Fig6).\n\n![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig6_HTML.jpg](images/495303_1_En_12_Chapter/495303_1_En_12_Fig6_HTML.jpg)\n\
    \n**Figure 12-6** Content and style images\n\n## Preprocessing Images\n\nAs said\
    \ earlier, you will be using the `VGG16` model for extracting the features in\
    \ an image. We need to process our image data as per the VGG training process.\
    \ Fortunately, Keras provides this preprocessing not just for `VGG16`, but many\
    \ other popular models such as ResNet, Inception, DenseNet, and so on. The library\
    \ provides a function called `preprocess_input` that takes a tensor or numpy array\
    \ encoding a batch of images as an input and returns a preprocessed numpy array\
    \ or a `tf.tensor` with type `float32`. The method converts the image from RGB\
    \ to BGR and zero-centers each channel. Note that the VGG networks were trained\
    \ on images with each channel normalized by mean = `[103.939, 116.779, 123.68]`\
    \ and having channels BGR (Blue/Green/Red). The code in Listing [12-5](#495303_1_En_12_Chapter.xhtml#PC19)\
    \ performs this preprocessing on a given image.\n\n```\ndef preprocess_image(image_path):\n\
    \    img = load_img(image_path, target_size=(img_height, img_width))\n    img\
    \ = img_to_array(img)\n    img = np.expand_dims(img, axis=0)\n    img = tf.keras.applications.vgg16.preprocess_input(img)\n\
    \    return img\n```\n\n**Listing 12-5** Preprocessing image for the VGG16 network\n\
    \nIf you wish to view the outputs, we need to do the reverse preprocessing. Also,\
    \ we must clip all the values within the 0–255 range. We do this in the following\
    \ function definition:\n\n```\ndef deprocess_image(x):\n    # Remove zero-center\
    \ by mean pixel\n    x[:, :, 0] += 103.939\n    x[:, :, 1] += 116.779\n    x[:,\
    \ :, 2] += 123.68\n    # 'BGR'->'RGB'\n    x = x[:, :, ::-1]\n    x = np.clip(x,\
    \ 0, 255).astype('uint8')\n    return x\n```\n\nYou will now build the model based\
    \ on the `VGG16` model.\n\n## Model Building\n\nTo build the model, we feed the\
    \ `VGG16` with our image tensor data and extract the feature maps, the content,\
    \ and style representations. The model will be loaded with pre-trained ImageNet\
    \ weights. The model building code is given here:\n\n```\ntarget = K.constant(preprocess_image(target_path))\n\
    style = K.constant(preprocess_image(style_path))\n\n# This placeholder will contain\
    \ our generated image\ncombination_image = K.placeholder((1, img_height, img_width,\
    \ 3))\n\n# We combine the 3 images into a single batch\ninput_tensor = K.concatenate([target,\
    \ style, combination_image], axis=0)\n\n# Build the VGG16 network with our batch\
    \ of 3 images as input.\nmodel = vgg16.VGG16(input_tensor=input_tensor, weights='imagenet',\
    \ include_top=False)\n```\n\nIn this code, we first build the input tensor for\
    \ our content and style images by calling our earlier defined `preprocess` method.\
    \ We create a placeholder for the destination image and then create a tensor for\
    \ three images by calling the `concatenate` method. This is then used as a parameter\
    \ to the `VGG16` method to extract our desired model.\n\nYou can now examine the\
    \ model summary.\n\n```\nmodel.summary()\n```\n\nThe summary output is shown in\
    \ Figure [12-7](#495303_1_En_12_Chapter.xhtml#Fig7).\n\n![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig7_HTML.jpg](images/495303_1_En_12_Chapter/495303_1_En_12_Fig7_HTML.jpg)\n\
    \n**Figure 12-7** Model summary\n\n## Content Loss\n\nWe will compute the content\
    \ loss at each desired layer and add them up. At each iteration, we feed our input\
    \ image to the model. The model will compute all the content losses properly,\
    \ and as we have an eager execution, all gradients will also be computed. The\
    \ content loss is an indication of how similar the randomly generated noisy image\
    \ (G) is to the content image (C). The content loss is computed as follows.\n\n\
    Assume that we choose a hidden layer (L) in a pre-trained network (VGG network)\
    \ to compute the loss. Let P and F represent the original image and the image\
    \ that is generated. Let `F[l]` and `P[l]` be the feature representation of the\
    \ respective images in layer L. Then, the content loss is defined as follows:"
  raw: 'Gatys et al. (2015) came up with the core idea behind the style

    transfers. The core idea is to say that the CNNs (Convolutional Neural

    Networks) pre-trained for image classification know how

    to encode the perceptual and semantic information about an image. There

    are many such pre-trained CNNs available in the world. We will use VGG16

    to extract the features of an image and then work independently on its

    content and style. The original paper uses the 19-layer VGG network

    model from Simonyan and Zisserman (2015). The VGG16 model architecture

    is shown in Figure [12-5](#495303_1_En_12_Chapter.xhtml#Fig5).


    ![../images/495303_1_En_12_Chapter/495303_1_En_12_Fig5_HTML.jpg](images/495303_1_En_12_Chapter/495303_1_En_12_Fig5_HTML.jpg)


    Figure 12-5

    The VGG16 architecture (Image credits: [researchgate.​net](https://www.researchgate.net))


    As we are not doing an image classification and are interested in

    just the feature extraction, we do not need the fully connected layers

    or the final softmax classifier of the VGG network. We only need the

    part of the model. So, how do we extract only a certain portion of the

    model? Fortunately for us, this is a very trivial task as Keras provides

    a pre-trained VGG16 model in which you can separate out the layers.

    Keras does provide many other models including the latter VGG19\. To

    remove the top most fully connected layers, you need to set the value of

    the include_top variable to False while extracting the model layers.


    Creating Project


    Create a new Colab project and

    rename it to CustomStyleTransfer. Install the following two packages:


    ```

    !pip install keras==2.3.1

    !pip install tensorflow==2.1.0

    ```


    Note


    At the time of publishing, it was discovered that the pre-trained

    VGG16 model used in this project runs with the Keras and TensorFlow

    versions specified above and does not yet support the newer versions as

    of this writing.


    Import the required libraries.


    ```

    import tensorflow as tf

    import re

    import urllib

    from tensorflow.keras.preprocessing.image

    import load_img, img_to_array

    from matplotlib import pyplot as plt

    from IPython import display

    from PIL import Image

    import numpy as np

    from tensorflow.keras.applications import vgg16

    from tensorflow.keras import backend as K

    from keras import backend as K

    from scipy.optimize import fmin_l_bfgs_b

    ```


    Downloading Images


    As in the earlier project, you would write a download function and call

    it to download the two required images for the project.

    The code is given in Listing [12-3](#495303_1_En_12_Chapter.xhtml#PC16).


    ```

    def download_image_from_URL(imageURL):

    imageName = re.search

    (''[a-z0-9\-]+\.(jpe?g|png|gif|bmp|JPG)'',

    imageURL, re.IGNORECASE)

    imageName = imageName.group(0)

    urllib.request.urlretrieve(imageURL, imageName)

    imagePath = "./" + imageName

    return imagePath

    # This is the path to the image you want to transform.

    target_url = "https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch12/blank-sign.jpg"

    target_path = download_image_from_URL(target_url)

    # This is the path to the style image.

    style_url = "https://raw.githubusercontent.com/Apress/artificial-neural-networks-with-tensorflow-2/main/ch12/road.jpg"

    Listing 12-3

    Function for downloading images

    ```


