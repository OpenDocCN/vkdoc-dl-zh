    affects the predictions made by the model.


    The plot in Figure [3-4](#611333_1_En_3_Chapter.xhtml#Fig4) shows that each class
    is equally occupied in the first three bars. This indicates that each characteristic
    affects the prediction of both diabetes (1) and non-diabetes (0) in an equal manner.
    It demonstrates that the first three features have the best ability to forecast.
    However, pregnancy, skin thickness, insulin, and blood pressure do not contribute
    as significantly.


    ### Step 2: Summary Plot


    ```

    [In]:

    shap.summary_plot(shap_values[1], x_test)

    [Out]:

    ```


    ![](images/611333_1_En_3_Chapter/611333_1_En_3_Fig5_HTML.jpg)


    A SHAP summary plot denotes the SHAP values of glucose, BMI, age, Diabetes pedigree
    function, pregnancies, insulin, skin thickness, and blood pressure from top to
    bottom. The plots are in different shades according to a scale of feature value
    ranging from low to high.


    **Figure 3-5** SHAP output impact plot


    This method can give a more detailed perspective of how each attribute affects
    a particular result.


    *   In the plot in Figure [3-5](#611333_1_En_3_Chapter.xhtml#Fig5), positive values
    push the model’s prediction closer to diabetes. In contrast, negative values push
    toward nondiabetes.

    *   Elevated glucose levels may be associated with an increased risk of diabetes,
    while low glucose levels are not indicative of the absence of diabetes.

    *   Similarly, aged patients are more likely to be diagnosed with diabetes. However,
    the model seems uncertain about the diagnosis for younger patients.


    The way of dealing with this for the Age attribute is by using the dependence
    plot to get more-detailed insights.


    ### Step 3: Dependence Plot


    Dependence plots display the relationship between a feature and the outcome for
    each occurrence of the data. It goes beyond just gathering additional specific
    data and verifying the significance of the feature under analysis by confirming
    or challenging the results of other global feature importance measures.


    ```

    [In]:

    shap.dependence_plot(''Age'', shap_values[1], x_test, interaction_index="Age")

    [Out]:

    ```


    ![](images/611333_1_En_3_Chapter/611333_1_En_3_Fig6_HTML.jpg)


    A scatterplot of SHAP value for age versus age represents the distribution of
    dots shaded in different colors. The plots have an increasing trend initially
    and decline approximately after age 55.


    **Figure 3-6** SHAP dependence plot


    The dependence plot reveals that patients under age 30 have a lower risk of being
    diagnosed with diabetes. In contrast, individuals over 30 face a higher likelihood
    of receiving a diabetes diagnosis.


    ## Stage 3: LIME


    Let’s fit the LIME explainer using the training data and the targets. Set the
    mode to classification.


    ### Step 1: Fitting the LIME Explainer


    ```

    [In]:

    class_names = [''Diabetes'', ''No diabetes'']

    feature_names = list(x_train.columns)

    explainer = LimeTabularExplainer(x_train.values, feature_names =

    feature_names,

    class_names = class_names,

    mode = ''classification'')

    ```


    ### Step 2: Plotting the Explainer


    Let’s display a LIME explanation for the first row in the test data using the
    random forest, and show the feature contribution.


    The result contains three main pieces of information:


    1.  The model’s predictions

    2.  Features’ contributions

    3.  The actual value for each feature


    ```

    [In]:

    explainer = explainer.explain_instance(x_test.iloc[1], model.predict_proba)

    explainer.show_in_notebook(show_table = True, show_all = False)

    [Out]:

    ```


    ![](images/611333_1_En_3_Chapter/611333_1_En_3_Fig7_HTML.jpg)


    An illustration represents the prediction probabilities of diabetes. The value
    for diabetes is 0.10, while the value for no diabetes is 0.90. A table on the
    right denotes the values of 8 features and highlights pregnancies, skin thickness,
    and diabetes pedigree function.


    **Figure 3-7** LIME explainer


    We observe that it predicted 90 percent as non-diabetic because, as we see in
    Figure [3-7](#611333_1_En_3_Chapter.xhtml#Fig7),


    *   the glucose level is greater than 142;

    *   age is between 29 and 41;

    *   BMI is between 32 and 36; and

    *   the insulin is greater than 126.


    ## Stage 4: ELI5


    ELI5 is a Python package that allows the inspection of machine learning classifiers
    and provides explanations for their predictions. It is a commonly used tool for
    debugging machine learning algorithms, such as scikit-learn regressors and classifiers,
    XGBoost, CatBoost, Keras, etc. With ELI5, developers and data scientists can better
    understand how a model arrived at a certain result, identify any limitations or
    issues with the model, and ultimately improve the accuracy and reliability of
    their models.


    Source: [`https://github.com/TeamHG-Memex/eli5`](https://github.com/TeamHG-Memex/eli5)


    ### Step 1: Viewing Weights for the Fitted Model


    This displays the weights of a model and their corresponding feature names using
    ELI5.


    | Weight | Feature |

    | --- | --- |

    | 0.2678 ± 0.1203 | Glucose |

    | 0.1609 ± 0.1013 | BMI |

    | 0.1385 ± 0.0899 | Age |

    | 0.1244 ± 0.0692 | DiabetesPedigreeFunction |

    | 0.0895 ± 0.0565 | BloodPressure |

    | 0.0869 ± 0.0635 | Pregnancies |

    | 0.0670 ± 0.050 | SkinThickness |

    | 0.0652 ± 0.0639 | Insulin |


    ```

    [In]:

    # Get a list of all feature names/columns in the dataset

    all_features = x.columns.to_list()

    # Use ELI5 to show the weights of the model, with feature names provided

    eli5.show_weights(model, feature_names=all_features)

    [Out]:

    ```


    The preceding table gives us the weight associated with each feature. The value
    tells us how much of an impact a feature has on the predictions on average, and
    the sign tells us in which direction. Here, we can observe that the “Glucose”
    feature has the highest weight of 0.2678 ± 0.1203, implying that it has the most
    significant impact on the algorithm’s predictions.


    This table can be used to identify the most impactful features that are highly
    relevant to predictions made by an algorithm.'
