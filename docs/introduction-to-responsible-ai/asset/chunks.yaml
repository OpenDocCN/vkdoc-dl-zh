- fmt: "# Techniques to Mitigate Bias\n\nMitigating bias in machine learning models\
    \ is a critical step to ensure fairness and equitable outcomes. There are various\
    \ strategies and techniques that can be employed to reduce bias and promote fairness\
    \ in AI systems. Here’s a detailed explanation of mitigation bias strategies:\n\
    \n1. **Resampling:** Balancing class representation by either oversampling underrepresented\
    \ groups or undersampling overrepresented ones can help reduce bias present in\
    \ the data.\n\n2. **Reweighting:** Assigning different weights to different classes\
    \ or samples can adjust the model’s learning process to address imbalances.\n\n\
    3. **Fairness-Aware Algorithms:**\n   - **Adversarial Debiasing:** Incorporates\
    \ an additional adversarial network to reduce bias while training the main model,\
    \ forcing it to disregard features correlated with bias.\n   - **Equalized Odds:**\
    \ Adjusts model thresholds to ensure equal opportunity for positive outcomes across\
    \ different groups.\n   - **Reject Option Classification:** Allows the model to\
    \ decline to make a prediction when uncertainty about its fairness exists.\n\n\
    4. **Regularization Techniques:**\n   - **Fairness Constraints:** Adding fairness\
    \ constraints to the model’s optimization process to ensure predictions are within\
    \ acceptable fairness bounds.\n   - **Lagrangian Relaxation:** Balancing fairness\
    \ and accuracy trade-offs by introducing Lagrange multipliers during optimization.\n\
    \n5. **Post-processing Interventions:**\n   - **Calibration:** Adjusting model\
    \ predictions to align with desired fairness criteria while maintaining overall\
    \ accuracy.\n   - **Reranking:** Reordering model predictions to promote fairness\
    \ without significantly compromising accuracy.\n\n6. **Preprocessing Interventions:**\n\
    \   - **Data Augmentation:** Adding synthesized data points to underrepresented\
    \ groups to improve model performance and reduce bias.\n   - **De-biasing Data\
    \ Preprocessing:** Using techniques like reweighting or resampling during data\
    \ preprocessing to mitigate bias before training.\n\n7. **Fair Feature Engineering:**\
    \ Creating or selecting features that are less correlated with bias, which can\
    \ help the model focus on relevant and fair attributes.\n\n8. **Ensemble Methods:**\
    \ Combining multiple models that are trained with different strategies can help\
    \ mitigate bias, as biases in individual models are less likely to coincide.\n\
    \n9. **Regular Monitoring and Updates:** Continuously monitoring model performance\
    \ for bias in real-world scenarios and updating the model as new data becomes\
    \ available to ensure ongoing fairness.\n\n10. **Ethical and Inclusive Design:**\
    \ Prioritizing diverse representation and ethical considerations in data collection,\
    \ preprocessing, and model development to prevent bias from entering the system.\n\
    \n11. **Collaborative Development:** Involving stakeholders from diverse backgrounds,\
    \ including ethicists and affected communities, to collaboratively address bias\
    \ and ensure that mitigation strategies align with ethical values.\n\n12. **Transparency\
    \ and Communication:** Being transparent about the steps taken to mitigate bias\
    \ and communicating these efforts to users and stakeholders to build trust in\
    \ the system.\n\n13. **Legal and Regulatory Compliance:** Ensuring that the AI\
    \ system adheres to relevant laws and regulations concerning discrimination and\
    \ bias, and actively working to comply with them.\n\n## Implementing Bias Detection\
    \ and Fairness\n\nThe purpose of this exercise was to start exploring bias, including\
    \ potential methods to reduce bias as well as how bias may very easily become\
    \ exacerbated in ML models. In this exercise, for the sake of brevity, let’s check\
    \ for bias in relation to race, though bias should be checked against the other\
    \ protected classes as well.\n\n### Stage 1: Data Bias\n\nIn this task, we begin\
    \ by training a model on the original dataset. However, upon analyzing and visualizing\
    \ the data, we detect the presence of racial bias. To address this issue, we implement\
    \ a resampling technique to promote a fair and unbiased representation.\n\nResampling\
    \ is a technique used in machine learning to create new training data by altering\
    \ the original data. It can include both oversampling and undersampling and aims\
    \ to create a more balanced and representative training dataset, which helps models\
    \ learn more effectively.\n\nWe then retrain the model on the balanced data and\
