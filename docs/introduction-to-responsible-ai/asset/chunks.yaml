- fmt: '### Defense Mechanisms against Adversarial Attacks


    One of the most effective ways to defend against adversarial attacks is through
    **adversarial training**. This involves augmenting the training dataset with adversarial
    examples and retraining the model. By doing so, the model becomes more robust
    and less susceptible to adversarial manipulation.


    Here’s a simple example that uses `TensorFlow` to demonstrate adversarial training:


    ```

    [In]:

    import tensorflow as tf

    # Create a simple model

    model = tf.keras.Sequential([

    tf.keras.layers.Flatten(input_shape=(28, 28)),

    tf.keras.layers.Dense(128, activation=''relu''),

    tf.keras.layers.Dense(10)

    ])

    # Compile the model

    model.compile(optimizer=''adam'',

    loss=tf.keras.losses.SparseCategoricalCrossentropy(from_logits=True),

    metrics=[''accuracy''])

    # Generate adversarial examples by adding random noise

    train_images_adv = train_images + 0.01 *

    tf.random.normal(shape=train_images.shape)

    # Combine original and adversarial examples for training

    train_images_combined = tf.concat([train_images, train_images_adv], axis=0)

    train_labels_combined = tf.concat([train_labels, train_labels], axis=0)

    # Train the model

    model.fit(train_images_combined, train_labels_combined, epochs=5)

    ```


    **Gradient masking** is another technique used to defend against adversarial attacks.
    It involves modifying the model’s architecture or training process to make it
    difficult for attackers to compute the gradients needed to generate adversarial
    examples. This can be achieved through techniques like dropout, L1/L2 regularization,
    or even custom loss functions that penalize certain types of adversarial perturbations.
    The following example showcases how to build a model with L2 regularization:


    ```

    [In]:

    from tensorflow.keras import regularizers

    # Create a simple model with L2 regularization

    model = tf.keras.Sequential([

    tf.keras.layers.Flatten(input_shape=(28, 28)),

    tf.keras.layers.Dense(128, activation=''relu'', kernel_regularizer=regularizers.l2(0.01)),

    tf.keras.layers.Dense(10)

    ])

    # Compile the model

    model.compile(optimizer=''adam'',

    loss=tf.keras.losses.SparseCategoricalCrossentropy(from_logits=True),

    metrics=[''accuracy''])

    # Train the model

    model.fit(train_images, train_labels, epochs=5)

    ```


    The regularization term helps in constraining the model’s capacity, making it
    less likely to fit to the noise introduced by adversarial perturbations.


    **Feature squeezing** is a pre-processing step that reduces the search space available
    to an adversary. By reducing the depth, color, or even spatial resolution of the
    input data, the model becomes less sensitive to the small perturbations in adversarial
    attacks. This can be particularly useful in image classification tasks.


    Here’s a simple example of feature squeezing by reducing the color depth of images:


    ```

    [In]:

    import numpy as np

    # Function to reduce color depth

    def reduce_color_depth(image, bit=4):

    return np.floor(image * (2**bit - 1)) / (2**bit - 1)

    # Apply feature squeezing to training images

    train_images_squeezed = reduce_color_depth(train_images)

    ```


    By incorporating these additional defensive mechanisms, you can further bolster
    your AI system’s resilience against adversarial attacks. These methods can be
    used in isolation or combined for a more robust defense strategy. The key is to
    understand the specific vulnerabilities of your model and the types of attacks
    it is most likely to face, and then tailor your defensive approach accordingly.


    ### Model Hardening


    Model hardening is a set of techniques aimed at making AI models more resilient
    to various types of attacks, including model extraction and reverse engineering.
    These techniques often involve adding layers of complexity or security checks
    that make it difficult for attackers to manipulate the model or gain unauthorized
    access. For instance, rate limiting can be implemented to restrict the number
    of queries to the model, making it harder for attackers to reverse engineer it.
    Another approach is to use obfuscation techniques that make the model’s internal
    workings less transparent, thereby complicating any attempts to tamper with it.
    Obfuscation can be achieved through various means, such as adding noise to the
    data, ensembling multiple models, or even altering the architecture in subtle
    ways that don’t affect performance but add complexity. For example, you could
    use ensemble methods that combine predictions from multiple base models, each
    with its own layer of added noise or data transformations. Here’s an example using
    `scikit-learn` that combines Gaussian noise and ensembling:


    ```

    [In]:

    from sklearn.base import BaseEstimator, TransformerMixin

    from sklearn.pipeline import Pipeline

    from sklearn.ensemble import RandomForestClassifier, VotingClassifier

    from sklearn.linear_model import LogisticRegression

    from sklearn.svm import SVC

    import numpy as np

    # Custom transformer to add Gaussian noise

    class GaussianNoise(BaseEstimator, TransformerMixin):

    def __init__(self, noise_level=0.01):

    self.noise_level = noise_level

    def fit(self, X, y=None):

    return self

    def transform(self, X):

    noise = np.random.normal(0, self.noise_level, X.shape)

    return X + noise

    # Sample data

    X_train = np.random.rand(100, 10)

    y_train = np.random.randint(2, size=100)

    # Create pipelines with obfuscation

    pipeline1 = Pipeline([

    (''noise_adder'', GaussianNoise(0.01)),

    (''classifier'', LogisticRegression())

    ])

    pipeline2 = Pipeline([

    (''noise_adder'', GaussianNoise(0.02)),

    (''classifier'', RandomForestClassifier())

    ])

    pipeline3 = Pipeline([

    (''noise_adder'', GaussianNoise(0.03)),

    (''classifier'', SVC())

    ])

    # Create an ensemble of the pipelines

    ensemble_clf = VotingClassifier(estimators=[

    (''lr'', pipeline1),

    (''rf'', pipeline2),

    (''svc'', pipeline3)

    ], voting=''hard'')

    # Train the ensemble model

    ensemble_clf.fit(X_train, y_train)

    # Sample test data

    X_test = np.random.rand(5, 10)

    # Make predictions

    y_pred = ensemble_clf.predict(X_test)

    print("Predictions:", y_pred)

    ```


    ### Input Filtering for Evasion Attacks


    Input filtering for evasion attacks is a crucial defensive measure that aims to
    identify and neutralize malicious inputs designed to deceive AI models. Evasion
    attacks often involve slightly altering the input data in a way that is imperceptible
    to humans but can cause the model to make incorrect predictions or classifications.
    By implementing input filtering, you can scrutinize incoming data for any anomalies
    or suspicious patterns that could indicate an evasion attack.


    For example, in the context of image recognition models, input filtering could
    involve checking for pixel values that deviate significantly from the expected
    range or patterns. Similarly, for text-based models, you could look for unusual
    character sequences or unexpected language constructs that are not typical of
    genuine inputs.


    Here’s a simple Python code snippet that demonstrates basic input filtering for
    a text-based model using `scikit-learn`:


    ```

    [In]:

    from sklearn.feature_extraction.text import CountVectorizer

    from sklearn.naive_bayes import MultinomialNB

    import re

    # Sample data and labels

    X_train = ["hello", "world", "hello world"]

    y_train = [1, 0, 1]

    # Train a simple model

    vectorizer = CountVectorizer()

    X_train_vectorized = vectorizer.fit_transform(X_train)

    clf = MultinomialNB()

    clf.fit(X_train_vectorized, y_train)

    # Input filtering function

    def filter_input(input_text):

    # Remove any unusual characters

    filtered_text = re.sub(r''[^a-zA-Z0-9\s]'', '''', input_text)

    return filtered_text

    # Test the model with and without input filtering

    test_input = "hello w@rld!!"

    filtered_test_input = filter_input(test_input)

    # Transform the test input

    test_vectorized = vectorizer.transform([filtered_test_input])

    # Make a prediction

    prediction = clf.predict(test_vectorized)

    ```'
