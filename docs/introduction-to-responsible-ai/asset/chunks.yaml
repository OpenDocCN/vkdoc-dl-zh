  trans: "\n### 偏见如何影响决策过程\n\n偏见会对从个人判断到复杂自动化系统等各个领域的决策过程产生深远影响。它可能扭曲认知、影响选择，并导致不公正或歧视性的结果。理解偏见如何影响决策，对于开发公平公正的系统至关重要。以下是关于偏见如何影响决策过程的深入解释：\n\
    \n- **扭曲的认知：** 偏见会改变信息被感知和解读的方式。当存在偏见时，个体可能会更关注情况的某些方面，而忽略其他方面。这可能导致不完整或片面的理解，最终影响所做出的决策。\n\
    \n- **无意识偏见：** 人类的决策会受到无意识偏见（通常称为内隐偏见）的影响。这些偏见源于文化、社会和个人因素，并会在无意识中塑造认知、态度和判断。即使是善意的人也可能在不知不觉中受到这些偏见的影响。\n\
    \n- **确认偏误：** 确认偏误是指个体倾向于寻找或偏爱那些能证实其现有信念或偏见的信息。这可能导致决策缺乏充分依据或不够平衡，因为矛盾的信息可能被忽视或驳回。\n\
    \n- **刻板印象：** 偏见可能导致刻板印象，即个体基于先入为主的观念对某个人或群体做出假设。刻板印象会导致不公平的决策，因为这些决策基于概括性看法而非个人特质。\n\
    \n- **不平等待遇：** 偏见可能导致对不同个体或群体的不平等待遇。这可以表现为多种形式，例如根据种族、性别或社会经济地位等因素提供不同的机会、资源或惩罚。\n\
    \n- **歧视性结果：** 当偏见影响决策时，可能导致歧视性结果。歧视可能发生在个人和系统层面，影响人们获得教育、就业、医疗保健等机会。\n\n- **对自动化系统的影响：**\
    \ 在自动化决策系统中，训练数据中存在的偏见可能导致有偏见的预测和建议。如果处理不当，这些系统可能会延续现有的偏见，并进一步加剧不平等。\n\n- **反馈循环：**\
    \ 有偏见的决策可能形成反馈循环，随着时间的推移不断延续并放大偏见。例如，如果带有偏见的决策导致某个群体的机会受限，这可能会强化负面的刻板印象，并进一步边缘化该群体。\n\
    \n- **信任侵蚀：** 当个体察觉到决策过程受到偏见影响时，会侵蚀他们对这些过程及其负责机构的信任。这可能导致社会动荡和社会凝聚力的瓦解。\n\n- **加剧不平等：**\
    \ 决策中的偏见会加剧现有的社会不平等。如果某些群体持续面临有偏见的决策，他们的机会和资源获取将受到限制，从而形成劣势循环。\n\n### 偏见的类型\n\n\
    机器学习中的偏见是指在数据或模型中存在系统性且不公平的错误，这些错误可能导致不准确或不公正的预测、决策或结果。在机器学习流程的不同阶段（见图 2-1），可能会出现多种类型的偏见。\n\
    \n![](img/611333_1_En_2_Fig1_HTML.jpg)\n\n一张示意图展示了数据、模型和社会层面下的不同类型偏见。数据层面包括采样偏差、测量偏差和覆盖偏差。模型层面包括表征偏差、算法偏差和反馈循环偏差。社会层面包括文化偏见、性别偏见和经济偏见。\n\
    \n图 2-1 偏见的类型\n\n1. **数据偏见：** 数据偏见涵盖了用于训练和测试机器学习模型的数据中存在的偏见。这种偏见可能由多种原因引起，例如：\n\
    \   - **采样偏差：** 当收集的数据不能代表整个群体时，会导致某些群体或属性的过度或不足代表。例如，在一个医疗诊断数据集中，如果只代表了一个人口统计群体，那么该模型对于代表性不足的群体可能表现不佳。\n\
    \   - **测量偏差：** 数据收集或测量过程中引入的错误或不一致可能导致偏见。例如，如果一项调查使用的语言是某个特定社区不理解的，那么他们的观点将被遗漏，从而导致有偏见的结论。\n\
    \   - **覆盖偏差：** 当数据集中缺少某些群体或观点时发生。这可能是由有偏见的数据收集方法、不完整的抽样或系统性排斥造成的。\n\n2. **模型偏见：**\
    \ 模型偏见源于学习算法在训练过程中对偏见数据的依赖，这可能会延续甚至放大偏见，具体如下：\n   - **表征偏差：** 当用于训练的特征或属性不成比例地偏向某些群体时发生。模型倾向于从训练数据中存在的偏见中学习，可能导致有偏见的预测。\n\
    \   - **算法偏见：** 一些机器学习算法本身就会延续偏见。例如，如果决策树算法学会根据有偏见的特征来分割数据，那么它的预测将反映这些偏见。\n  \
    \ - **反馈循环偏差：** 当模型的预测影响现实世界的决策，而这些决策又反过来影响用于未来训练的数据时，就形成了反馈循环。有偏见的预测会随着时间的推移而延续，从而强化现有的偏见。\n\
    \n3. **社会偏见：** 社会偏见涉及社会中存在的、并在数据和模型中得到反映的偏见，具体如下：\n   - **文化偏见：** 文化规范、信仰和价值观会影响数据的收集和解读方式，从而导致有偏见的结果。\n\
    \   - **性别偏见：** 历史和社会性别角色可能导致数据集中代表性不平等，从而影响模型性能。\n   - **种族偏见：** 有偏见的历史实践可能导致数据中种族群体的代表性不足或错误呈现，影响模型准确性。\n\
    \   - **经济偏见：** 社会经济差距可能导致数据可用性和质量的差异，从而影响模型结果。\n\n理解这些类型的偏见对于制定检测、缓解和预防偏见的策略至关重要。解决偏见需要结合仔细的数据收集、预处理、算法选择和后期处理干预。诸如重新加权、重采样和使用公平性感知算法等技术，有助于在模型开发的不同阶段缓解偏见。\n\
    \n然而，伦理考量在解决偏见问题中起着关键作用。意识到偏见对决策过程的潜在影响，并积极努力减轻这种影响，能使人工智能开发与公平、透明和问责的原则保持一致。通过理解不同类型的偏见，利益相关者可以努力创建能够在不同背景和人群中促进公平结果的人工智能系统。\n"
- fmt: '### Examples of Real-world Cases Where Models Exhibited Biased Behavior


    Several real-world examples illustrate how machine learning models have exhibited
    biased behavior, leading to unfair and discriminatory outcomes. These cases highlight
    the importance of addressing bias in AI systems to avoid perpetuating inequality
    and to ensure ethical and equitable deployments. Here are some detailed examples:


    1. **Amazon’s Gender-Biased Hiring Tool:** In 2018, it was revealed that Amazon
    had developed an AI-driven recruiting tool to help identify top job candidates.
    However, the system displayed a bias against female applicants. This bias resulted
    from the training data, which predominantly consisted of resumes submitted over
    a ten-year period, mostly from male candidates. As a result, the model learned
    to favor male applicants and downgrade resumes that included terms associated
    with women.


    2. **Racial Bias in Criminal Risk Assessment:** Several criminal risk assessment
    tools used in the criminal justice system have been criticized for exhibiting
    racial bias. These tools predict the likelihood of reoffending based on historical
    arrest and conviction data. However, the historical bias in the data can lead
    to overestimating the risk for minority groups, leading to discriminatory sentencing
    and parole decisions.


    3. **Google Photos’ Racist Labeling:** In 2015, Google Photos’ auto-tagging feature
    was found to label images of Black people as “gorillas.” This was a result of
    the model’s biased training data, which did not include enough diverse examples
    of Black individuals. The incident highlighted the potential harm of biased training
    data and the need for inclusive datasets.


    4. **Biased Loan Approval Models:** Machine learning models used for loan approval
    have shown bias in favor of certain demographic groups. Some models have unfairly
    denied loans to minority applicants or offered them higher interest rates, reflecting
    historical biases in lending data.


    5. **Facial Recognition and Racial Bias:** Facial recognition systems have been
    criticized for their racial bias, where they are more likely to misidentify people
    with darker skin tones, particularly women. This bias can result in inaccurate
    surveillance, racial profiling, and infringement of civil rights.


    These real-world examples underscore the urgency of addressing bias in AI systems.
    To prevent such biased behavior, it’s crucial to carefully curate diverse and
    representative training data, use fairness-aware algorithms, implement bias detection
    and mitigation techniques, and continuously monitor and evaluate model outputs
    for fairness. By proactively addressing bias, developers can ensure that AI systems
    contribute positively to society and uphold ethical standards.


    ## Techniques to Detect and Mitigate Bias


    Detecting and mitigating bias in machine learning models and data is essential
    to create fair and equitable AI systems. Let’s look at some techniques to identify
    and address bias (Figure [2-2](#611333_1_En_2_Chapter.xhtml#Fig2)).


    ![](images/611333_1_En_2_Chapter/611333_1_En_2_Fig2_HTML.jpg)


    A block diagram represents lists of techniques to detect bias and migrate bias.
    Some of the detection techniques include synthetic testing scenarios, exploratory
    data analytics, and fairness metrics. The migration techniques include re-sampling
    and re-weighting, fairness-aware algorithms, and regularization.


    Figure 2-2: Techniques to detect and mitigate bias


    ### Techniques to Detect Bias


    Bias-detection techniques are essential tools for identifying and quantifying
    biases present in data, models, and their outputs. These techniques help ensure
    that AI systems are fair, equitable, and free from discriminatory tendencies.
    Here’s a detailed explanation of various bias-detection techniques:


    - **Exploratory Data Analysis (EDA):** EDA involves analyzing the distribution
    and characteristics of data to identify potential sources of bias. By visualizing
    data distributions and exploring patterns across different groups or attributes,
    data scientists can spot disparities that might indicate bias.


    - **Fairness Metrics:** Fairness metrics quantify and measure bias in machine
    learning models’ predictions. Common fairness metrics include disparate impact,
    equal opportunity difference, and statistical parity difference. These metrics
    compare outcomes between different groups to determine if there’s an unfair advantage
    or disadvantage.


    - **Benchmark Datasets:** Benchmark datasets are designed to expose bias in machine
    learning models. They contain examples where fairness issues are intentionally
    present, making them useful for evaluating how well models handle bias.


    - **Group Disparity Analysis:** Group disparity analysis compares outcomes for
    different groups across various attributes. By calculating differences in outcomes,
    such as acceptance rates, loan approvals, or hiring decisions, developers can
    identify disparities that indicate bias.


    - **Sensitivity Analysis:** Sensitivity analysis involves testing how small changes
    in data or model inputs impact outcomes. This can reveal how sensitive predictions
    are to variations in the input, helping identify which features contribute most
    to biased outcomes.


    - **Adversarial Testing:** Adversarial testing involves deliberately introducing
    biased data or biased inputs to observe how models respond. By observing how models
    react to these adversarial inputs, developers can gauge their susceptibility to
    bias.


    - **Real-world Performance Analysis:** Deployed models can be monitored in real-world
    settings to assess whether they generate biased outcomes in practice. Continuous
    monitoring allows developers to detect emerging bias patterns over time.


    - **Proxy Variable Analysis:** Proxy variables are attributes correlated with
    protected characteristics (e.g., gender, race). Analyzing how strongly proxy variables
    affect model outcomes can indicate the presence of hidden bias.


    - **Interpretability Techniques:** Interpretability techniques, like feature importance
    analysis, can help understand which features contribute most to model predictions.
    Biased features that contribute disproportionately might indicate bias.


    - **Human Evaluation and Feedback:** Involving human evaluators from diverse backgrounds
    to review model outputs and provide feedback can help identify bias that might
    not be apparent through automated techniques.


    - **Fairness Audits:** Fairness audits involve a comprehensive review of data
    collection, preprocessing, and model development processes to identify potential
    sources of bias.


    - **Synthetic Testing Scenarios:** Creating controlled scenarios with synthetic
    data can help simulate potential bias sources to observe their impact on model
    predictions.'
