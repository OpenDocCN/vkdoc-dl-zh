    | --- | --- | --- |\n| 0.348 | `<BIAS>` | 1 |\n| 0.325 | `Glucose` | 187 |\n|\
    \ 0.083 | `BMI` | 36.4 |\n| 0.047 | `Age` | 36 |\n| 0.019 | `DiabetesPedigreeFunction`\
