    ```


    ![](images/611333_1_En_3_Chapter/611333_1_En_3_Fig3_HTML.jpg)


    A bar graph represents the counts for the outcomes of 0 and 1. The count at 0
    is 500, and the count at 1 is 250. Values are approximate.


    **Figure 3-3** Distribution of the outcome


    A 37 percent to 63 percent class distribution is slightly imbalanced, but whether
    it’s acceptable depends on your specific problem and algorithm. Some algorithms
    can handle this, while others may require balancing techniques like oversampling
    or undersampling.


    #### Step 5: Model Building


    Now we split the dataset for training and testing. A random forest classifier
    is built to predict diabetes outcomes using the diabetes dataset.


    ```

    [In]:

    # Separate train and test Variables

    x = df.drop(''Outcome'',axis=1)

    y = df[''Outcome'']

    # Create Train & Test Data

    x_train,x_test,y_train,y_test = train_test_split(x,y,test_size=0.3,random_state=101)

    # Build the model

    model = RandomForestClassifier(max_features=2, n_estimators =100, bootstrap =
    True)

    model.fit(x_train, y_train)

    ```


    #### Step 6: Predicting for Test Data


    ```

    [In]:

    # Predict the testing data and build a classification report

    y_pred = model.predict(x_test)

    print(classification_report(y_pred, y_test))

    [Out]:

    precision    recall  f1-score   support

    0       0.83      0.81      0.82       155

    1       0.63      0.67      0.65        76

    accuracy                           0.76       231

    macro avg       0.73      0.74      0.73       231

    weighted avg       0.77      0.76      0.76       231

    ```


    The random forest classifier gives a good performance in predicting diabetes outcomes,
    with room for improvement, but for now we will continue with this.


    Now, let’s integrate the explainability layer into the model to provide more insight
    into the output. The next section will focus on the two categories of model explainability:
    model-specific methods and model-agnostic methods.


    ### Stage 2: SHAP


    Model-agnostic methods can be applied to any machine learning model, regardless
    of its type. They focus on analyzing the feature’s input and output pair. This
    section will introduce and discuss `SHAP`, the widely used models.'
