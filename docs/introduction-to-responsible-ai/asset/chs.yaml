  \ 0，表明受保护群体与未受保护群体之间正向分类的比例没有差异。`均等机会差异`指标为 -0.460858，意味着受保护群体与未受保护群体之间的真正例率差异显著。最后，`平均几率差异`指标为\
  \ -0.282582，表明受保护群体与未受保护群体在真正例率和假正例率上均存在差异。\n\n对于去偏后的模型，其准确率略低，为 0.796014。`差异性影响`指标为\
