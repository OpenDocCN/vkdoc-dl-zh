  \n### 阶段 2：SHAP\n\n模型无关方法可以应用于任何机器学习模型，无论其类型如何。它们侧重于分析特征的输入和输出对。本节将介绍并讨论广泛使用的模型`SHAP`。\n\
  \n\n\n#### 步骤 1：创建解释器与特征重要性图\n\n```\n[In]:\n# 创建解释器\nexplainer = shap.TreeExplainer(model)\n\
  shap_values = explainer.shap_values(x_test)\n# 变量重要性图\nfigure = plt.figure()\nshap.summary_plot(shap_values,\
  \ x_test)\n[Out]:\n```\n\n![](img/611333_1_En_3_Fig4_HTML.jpg)\n\n一张水平堆叠条形图展示了葡萄糖、BMI、年龄、糖尿病遗传函数、怀孕次数、胰岛素、皮肤厚度和血压的类别\
  \ 1 和类别 2 的平均 SHAP 值。\n\n**图 3-4** SHAP 汇总图\n\n使用 `summary_plot()` 函数，特征会根据其平均 SHAP\
  \ 值进行排序，最重要的特征位于顶部，最不重要的特征位于底部。这使得理解每个特征如何影响模型的预测变得更加容易。\n\n图 3-4 中的图表显示，前三个条形图中每个类别所占比例相同。这表明每个特征对糖尿病（1）和非糖尿病（0）的预测影响程度相同。它证明了前三个特征具有最佳的预测能力。然而，怀孕次数、皮肤厚度、胰岛素和血压的贡献并不显著。\n\
  \n#### 步骤 2：汇总图\n\n```\n[In]:\nshap.summary_plot(shap_values[1], x_test)\n[Out]:\n\
  ```\n\n![](img/611333_1_En_3_Fig5_HTML.jpg)\n\n一张 SHAP 汇总图从上到下依次展示了葡萄糖、BMI、年龄、糖尿病遗传函数、怀孕次数、胰岛素、皮肤厚度和血压的\
  \ SHAP 值。这些图根据从低到高的特征值尺度呈现不同的颜色深浅。\n\n**图 3-5** SHAP 输出影响图\n\n这种方法可以更详细地展示每个属性如何影响特定结果。\n\
  \n*   在图 3-5 的图表中，正值将模型的预测推向糖尿病。相反，负值则推向非糖尿病。\n*   升高的血糖水平可能与糖尿病风险增加有关，而低血糖水平并不表示没有糖尿病。\n\
  *   类似地，年龄较大的患者更有可能被诊断为糖尿病。然而，模型对于年轻患者的诊断似乎不确定。\n\n对于年龄属性，处理此问题的方法是使用依赖图来获取更详细的见解。\n\
  \n#### 步骤 3：依赖图\n\n依赖图展示了每个数据实例中特征与结果之间的关系。它不仅仅是收集额外的具体数据，还通过确认或质疑其他全局特征重要性度量的结果，来验证所分析特征的重要性。\n\
  \n```\n[In]:\nshap.dependence_plot('Age', shap_values[1], x_test, interaction_index=\"\
  Age\")\n[Out]:\n```\n\n![](img/611333_1_En_3_Fig6_HTML.jpg)\n\n一张年龄的 SHAP 值相对于年龄的散点图，展示了以不同颜色着色的点的分布。这些图最初呈上升趋势，大约在\
  \ 55 岁后下降。\n\n**图 3-6** SHAP 依赖图\n\n依赖图显示，30 岁以下的患者被诊断为糖尿病的风险较低。相比之下，30 岁以上的个体被诊断为糖尿病的可能性更高。\n\
  \n### 阶段 3：LIME\n\n让我们使用训练数据和目标来拟合 LIME 解释器。将模式设置为分类。\n\n#### 步骤 1：拟合 LIME 解释器\n\
  \n```\n[In]:\nclass_names = ['糖尿病', '非糖尿病']\nfeature_names = list(x_train.columns)\n\
  explainer = LimeTabularExplainer(x_train.values, feature_names =\nfeature_names,\n\
  class_names = class_names,\nmode = 'classification')\n```\n\n#### 步骤 2：绘制解释器\n\n\
  让我们使用随机森林显示测试数据中第一行的 LIME 解释，并展示特征贡献。\n\n结果包含三个主要信息：\n\n1.  模型的预测\n2.  特征的贡献\n3.\
  \  每个特征的实际值\n\n```\n[In]:\nexplainer = explainer.explain_instance(x_test.iloc[1],\
  \ model.predict_proba)\nexplainer.show_in_notebook(show_table = True, show_all =\
  \ False)\n[Out]:\n```\n\n![](img/611333_1_En_3_Fig7_HTML.jpg)\n\n一张图示展示了糖尿病的预测概率。糖尿病的值为\
