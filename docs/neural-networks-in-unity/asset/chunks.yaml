    **Biases and Weights**


    These are important factors when we are dealing with neural networks.


    When we create a neural network, we need some additional factors to


    stabilize the nework. Hence, bias and weights come into the picture. The essential
    understanding of bias is that when we are applying an activation function to an
    input, bias allows us to shift the values either left or right.


    Let’s create a simple neural network (Figur[e 1-11).](#index_split_000.html#p23)


    ***Figure 1-11.** A simple neural network*


    ![](index-24_1.png)


    Chapter 1 Neural Network BasiCs


    Now we consider there is no bias in this network. The output of the


    network is the basis of two things, per the summation rule (Figure [1-12](#index_split_000.html#p24)),
    that is, ∑ *Wi* * *Xi*


    where *Wi* is the weight and *Xi* is the input. We have single weight and single
    input, so, the resultant is the multiplication.


    ***Figure 1-12.** Summation rule*


    ![](index-25_1.png)


    Chapter 1 Neural Network BasiCs


    For a single unit network, the output as we know is found by


    multiplying with input *X* 0 and then passing it over to the activation function.
    If we apply different weight values, the curve changes


    accordingly (Figur[e 1-13](#index_split_000.html#p25)).


    ***Figure 1-13.** Role of weights*


    ![](index-26_1.png)


    Chapter 1 Neural Network BasiCs


    Using weights, we only change the steepness of the curve but cannot


    shift the values either right or left.


    For shifting the values either left or right we need bias (Figure [1-14](#index_split_000.html#p26)).


    ***Figure 1-14.** Applying bias*


    ![](index-27_1.png)


    Chapter 1 Neural Network BasiCs


    Bias is useful if we want a network to output the value of 0 when *x* has a value
    of, say, 1 (Figure [1-15).](#index_split_000.html#p27)


