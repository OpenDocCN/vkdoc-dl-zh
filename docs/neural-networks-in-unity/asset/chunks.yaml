  trans: "\n# 在 Unity C# 中扩展 ML-Agents 与反向传播\n\n在本章中，我们通过一个示例详细介绍了如何在不同的环境中扩展 `ML-Agents`。\n\
    \n接着，我们继续在 Unity 中创建了一个神经网络。利用这个网络，我们进行了一次神经网络模拟，并通过不同的游戏对象观察了行为的变化。\n\n## 第 4\
    \ 章：Unity C# 中的反向传播\n\n在本章中，我们将讨论如何在 Unity C# 中实现反向传播。\n\n由于我们在第一章已经对反向传播做了简要介绍，本章我们将对其进行更深入的探讨。\n\
    \n我们将使用一个空的 Unity 项目，然后开始编写反向传播的脚本。\n\n### 深入探讨反向传播\n\n反向传播用于优化权重，使神经网络能够学习如何正确地将任意输入映射到输出。\n\
    \n在本节中，我们将通过一个示例来演示反向传播（图 4-1）。\n\n© Abhishek Nandy, Manisha Biswas 2018  \nA.\
    \ Nandy and M. Biswas, *Unity 中的神经网络*,  \n<https://doi.org/10.1007/978-1-4842-3673-4_4>\n\
    \n![](img/index-122_1.jpg)\n\n**图 4-1.** 将要进行反向传播的神经网络\n\n输入层的输入传递到隐藏层，然后传递到输出层，从输出层我们得到实际输出。\n\
    \n现在，我们将误差从输出层反向传播到输入层，以便相应地更新权重。\n\n让我们从获取隐藏层所形成的方程开始。\n\n`H1 = X1W1 + X2W2 +\
    \ b`\n\n我们将应用 sigmoid 激活函数来获取隐藏层和输出层的输出。\n\n`Sigmoid σ(x) = 1/1+ e-x`\n\n`输出 H1\
    \ = 1/ 1 + e-x`\n\n让我们分配一些数值。\n\n`X1 = 0.05` `b1 = 0.35`  \n`X2 = 0.1` `b2 = 0.60`\n\
    \n初始权重：\n\n`W1 = 0.15` `W5 = 0.40`  \n`W2 = 0.20` `W6 = 0.45`  \n`W3 = 0.25` `W7\
    \ = 0.50`  \n`W4 = 0.30` `W8 = 0.35`\n\n目标值（输出）：\n\n`T1` `T2`  \n`0.99`\n\n现在我们将计算前向传播。\n\
    \n`H1 = X1W1 + X2W2 + b1`  \n`= 0.05*0.15 + 0.10*0.20 + 0.35`  \n`= 0.3775`\n\n\
    `Out H1 = 1/1+ e-H1 = 1/ 1+e-0.3775 = 0.593269992`\n\n同理，我们推导出 `Out H2 = 0.596884378`。\n\
    \n现在我们将计算 `Y1`。\n\n`Y1 = outH1 * W5 + outH2 * W6 + b2`  \n`= 0.4*0.593269992 +\
    \ 0.596884378*0.45 + 0.6`  \n`= 1.105905967`\n\n`outY1 = 1/1+e-y1 = 1/1+e-1.105905967`\
    \  \n`= 0.75136507`\n\n同理，我们求出 `Y2`。\n\n`OutY2 = 0.772928465`\n\n计算误差的公式如下。\n\n\
    `Etotal = ∑ ½ (目标值 – 输出值)2`  \n`= 1/2(T1 – OutY1)2 + ½(T2 – outY2)2`  \n`= ½(0.01\
    \ – 0.75136507)2 + ½(0.99 – 0.772)2`  \n`= 0.274811083 + 0.023560026`  \n`= 0.298371109`\n\
    \n`E1 = ½(T1 – outY1)2`  \n`E2 = 1/2(T2 – outY2)2`\n\n为了计算误差，我们进行反向传播，这涉及到链式求导或偏微分。这是为了相应地更新权重所必需的。\n\
    \n考虑更新权重 `W5`。\n\n`W5 处的误差 = ∂Etotal/∂W5`\n\n这是偏微分。在误差表达式中没有 `W5` 的值。我们将使用链式法则进一步拆分以得到所需的值。\n\
    \n`∂Etotal/∂W5 = ∂outY1/∂outY1 * ∂outY1/∂Y1 * ∂Y1/∂W5`\n\n`Etotal = ½(T1 – outY1)2\
    \ + ½(T2 – OutY2)2`\n\n`∂Etotal/∂OUTY1 = 2*1/2(T1 – OutY1)2-1 * -1`  \n`= -(T1\
    \ – OutY1)`  \n`= -(0.01 – 0.75136507)`  \n`∂Etotal/∂OUTY1 = 0.74136507`\n\n`OutY1\
    \ = 1/1+ e-Y1`\n\n`∂outY1/∂Y1 = outy1(1 – OutY1)`  \n`= 0.186815602`\n\n`∂Y1/∂W1\
    \ = 1* OUTH1 * W5(1-1)`  \n`= OutH1`  \n`= 0.08216704` → `W5` 的变化量\n\n现在我们将更新\
    \ `W5`。我们将使用一个叫做学习率的东西，它决定了神经网络如何舍弃旧值并适应变化，这样我们就能在每个权重层级得到我们寻找的更新后的权重值。\n\n学习率始终介于\
    \ 0 和 1 之间。\n\n在本例中，分配的学习率 `η` 为 `0.5`。\n\n`W5 = W5 – η * ∂Etotal/∂W5`  \n`= 0.4\
    \ – 0.5 * 0.082167041`  \n`W5 = 0.35891648`\n\n同理，我们计算 `W6`、`W7` 和 `W8`。\n\n现在，在隐藏层，我们将更新\
    \ `W1`、`W2`、`W3` 和 `W4` 的值。\n\n![](img/index-125_1.jpg)\n\n`∂Etotal/∂W1 = ∂Etotal/∂OutH1\
    \ * ∂outH1/∂H1 * ∂H1/∂W1`\n\n同理，我们将计算总和并得到加权值。\n"
- fmt: "# Backpropagation in Unity C#\n\nWe will apply backpropagation in Unity C#.\
    \ For that we need to open a new project in Unity (Figure [4-2](#index_split_000.html#p125)).\n\
    \n***Figure 4-2.** Opening a new project in Unity*\n\nWe name the project `backp`.\n\
    \n## Constructing Data Structures\n\nBefore getting in deep, we will be constructing\
    \ data structures that we will be implementing for backpropagation. First we will\
    \ have a simple one-dimensional matrix, which will have the output values of any\
    \ given layer of a neural network.\n\n```\nFloat[] output = new float[number of\
    \ neurons in layer]\n```\n\nNow we will have to have a weight matrix.\n\n```\n\
    Float[,] weights = new float[number of neurons in layer, number of neurons in\
    \ previous layer]\n```\n\nWe also need delta values of the weights.\n\n```\nFloat[,]\
    \ weightsDelta = new float[number of neurons in layer, number of neurons in previous\
    \ layer]\n```\n\nWe will gamma the matrix.\n\n```\nFloat[] gamma = new float[number\
    \ of neurons in layer]\nFloat[] error = new float[number of neurons in layer]\n\
    ```\n\nThese data structures fulfill the criteria for implementing backpropagation\
    \ in C#.\n\nNow we will create a folder within Unity that will contain our C#\
    \ Script (Figure [4-3](#index_split_000.html#p127)).\n\n***Figure 4-3.** Creating\
    \ a new C# script*\n\nWe will name the folder `script` (Figure [4-4](#index_split_000.html#p127)).\n\
    \n***Figure 4-4.** Creating a script folder*\n\nNow we will create a new C# script\
    \ and name it `NeuralNetwork` (Figure [4-5](#index_split_000.html#p128)).\n\n\
    ***Figure 4-5.** Creating the neural network script*\n\nWe will open it up in\
    \ some editor, in our case Sublime Text (Figure [4-6](#index_split_000.html#p129)).\n\
    \n***Figure 4-6.** Opening the file in Sublime Text*\n\nWe will create a constructor\
    \ for the neural network.\n\n```\npublic NeuralNetwork {\n\n}\n\npublic class\
    \ Layer {\n\n}\n```\n\nThe neural network will take layer information. We will\
    \ deep copy the layer.\n\n```\npublic class NeuralNetwork {\n\n    int[] layer;\n\
    \n    public NeuralNetwork(int[] layer)\n    {\n        this.layer = new int[layer.Length];\n\
