    **Introducing Neural Networks**


    An artificial neural network is similar to a biological neural network in a brain.
    A biological neural network works as follows: *information flows in, is* *processed
    by the neurons, and the results flow out*.


    The basis of the neuron is to react to previously learned patterns.


    When we are creating the same kind of replication in terms of


    technology and computer science, we call it an **artificial neural network**.


    Just like the biological neuron, information flows in, is processed by an artificial
    neural network, and results flow out (Figure [1-1](#index_split_000.html#p12)).


    ***Figure 1-1.** A neural network*


    Chapter 1 Neural Network BasiCs


    The single process becomes a mathematical formula that is the


    combination of summation + threshold.


    In terms of mathematics, it will be similar to a polynomial:


    (In1 * weight1) + (In2 * Weight2) + (In3 * Weight3) = Summation.


    **Digging Deeper into Neural Networks**


    Let us discuss more about neural networks.


    Neural networks consist of:


    • Input


    • Output


    • Weights and biases


    • Activation function


    Artificial neural networks are generally a chain of nodes associated


    with each other via the link from which they start interacting accordingly.


    Neurons perform operations and carry that result.


    Let us consider a scenario. Suppose that a new movie has been


    released at a movie theater. Now there are nearby options to watch this movie
    in a particular movie theater. Our brain makes a split second


    decision where we are going to watch the movie.


    The split second decision is pretty obvious for the brain to trigger from the
    neurons we have, but for same kinds of replication in a computer it is tough.
    For that, we have devised a mathematical approach. Let''s take an example.


    ![](index-14_1.png)


    Chapter 1 Neural Network BasiCs


    We have a single neuron whose threshold value is 7\. We need to find


    out if the neuron will trigger or not (Figure [1-2](#index_split_000.html#p14)).


    ***Figure 1-2.** Formulating the mathematical formula*


    Now let us see how an artificial neuron does the mathematical


    calculation.


    The criterion is that when the threshold 7 is reached, the neuron will trigger.


    The summation rule says, as shown in Figur[e 1-2](#index_split_000.html#p14),
    if one input point has value 2 and weight 1 and the other has input value 4 and
    weight 3, then


    ∑ Summation = (2 * 1) + (4 * 3) = 2 + 12 = 14.


    As 14 is greater then 7, the neuron will trigger. This is the way a neuron works.


    ![](index-15_1.png)


    Chapter 1 Neural Network BasiCs


    **Perceptron**


    In neural network implementation, a perceptron is very significant. When a neural
    network consists of a single layer, we call it a **perceptron**. It is used mostly
    in supervised learning to classify the data.


    A perceptron is composed of four different things:


    • Input values or one input layer


    • Weights and bias


    • Summation


    • Activation function


    When we look at a perceptron, it looks as shown in Figure [1-3](#index_split_000.html#p15).


    ***Figure 1-3.** Activation function*


    It is generally used as a binary classifier. When we are looking to


    classify data into two parts, we rely on a perceptron.


    ![](index-16_1.png)


    Chapter 1 Neural Network BasiCs


    **Activation Function and Its Different Types**


    In this section, we will touch upon one of the most important topics in terms
    of neural network, known as **activation function**.


    The activation looks like Figur[e 1-4.](#index_split_000.html#p16)


    ***Figure 1-4.** One input activation function*


    An activation function allows nonlinear properties to be constructed.


    The activation function is used to predict the output of a neural network, that
    is, yes or no. It maps the resulting values in the range of 0 to 1 or –1 to 1,
    etc. (depending upon the function). It plays a mjor role in an artificial neural
    network because it generates an output that becomes an input for the next layer
    in the stack.


    The general purpose of an activation function is to convert the input


    into an artificial neural network and then into an output.


    Activation functions are of various types, and we will discuss them


    here. There are many activation functions used in machine learning, of which the
    most commonly used are listed below.


    • Identity function


    • Binary step


    • Logistic or sigmoid


    • Tanh


    ![](index-17_1.png)


    Chapter 1 Neural Network BasiCs


    • Arctan


    • Rectified linear unit(ReLU)


    • Leaky ReLU


    • Softmax


    **Identity Function**


    In this function, we have *x* as an input, it will give us *x* itself (Figure
    [1-5).](#index_split_000.html#p17)


    F( *x*) = *x*


    ***Figure 1-5.** The identity function*


    ![](index-18_1.png)


