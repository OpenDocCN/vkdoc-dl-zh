    ![](index-158_1.jpg)


    ## Chapter 5 Data Visualization in Unity


    We have saved the file as a CSV format so that the CSV parser is able to parse
    the information. Let’s copy the file in the `resources` folder.


    The file as copied in the `resources` folder is shown in Figure [5-13.](#index_split_000.html#p158)


    **Figure 5-13.** The `resources` subfolder within the `Assets` folder


    ![](index-159_1.jpg)


    Now we will work on the CSV file in the inspector window.


    In the hierarchy window we see that the plotter is the main field, which contains
    the CSV input (Figure [5-14](#index_split_000.html#p159)).


    **Figure 5-14.** The place where we update the input CSV file


    ![](index-160_1.jpg)


    ![](index-160_2.png)


    We will change the input file to read the CSV file we just downloaded from the
    datagov website. The process as selected from the inspector window is shown in
    Figure [5-15](#index_split_000.html#p160).


    **Figure 5-15.** We changed the input file with the downloaded CSV file name


    Let’s take a look at the snapshot of the CSV file, which contains data related
    to an index of industrial production, as shown in Figure [5-16.](#index_split_000.html#p160)


    **Figure 5-16.** A snapshot of the CSV dataset


    ![](index-161_1.jpg)


    In the columns to project between `x`, `y`, and `z`, we can select years. So let
    us select `2006-2007`, `2011-12`, and `2013-14`.


    The columns selections will be numbered from `0` to `11`.


    We select the first column as `4`.


    The second column is `9`.


    The last column is `11`.


    The inspector view is shown in Figure [5-17](#index_split_000.html#p161).


    **Figure 5-17.** Selecting the columns


    ![](index-162_1.jpg)


    Now let us run the application and see the output.


    The output as achieved is shown in Figure [5-18.](#index_split_000.html#p162)


    **Figure 5-18.** Showing the output for the dataset


    ## Summary


    We hereby concluded the book by adding the essence of data visualization with
    Unity.


    We covered how to use CSV to parse data within Unity, to cover the basic concepts
    of 3D data visualizations.


