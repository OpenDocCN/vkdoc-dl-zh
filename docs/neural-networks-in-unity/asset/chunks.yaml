    \  \n[Index](#index)\n\n## About the Authors\n\n**Abhishek Nandy** is B.Tech in\
    \ IT and he is a constant learner. He is a Microsoft MVP for Windows Platform,\
    \ Intel Black Belt Developer as well as Intel Software Innovator. He has a keen\
