  trans: "\n# 第 3 章：Unity 中的机器学习智能体与神经网络\n\n我们遍历所有神经元，因为如果遗漏任何一个神经元，也会导致整个神经网络结构的输出出错。\n\
    \n```\nfor (int j = 0; j < neurons[i].Length; j++)\n{\n\n}\n```\n\n我们将创建一个`neuronWeights`，它代表我们目标中所有神经元的连接，同时我们还会为其附加一个随机权重。\n\
    \n```\nfor (int j = 0; j < neurons[i].Length; j++)\n{\n    float[] neuronWeights\
    \ = new float[neuronsInPreviousLayer];\n    for (int k = 0; k < neuronsInPreviousLayer;\
    \ k++)\n    {\n\n    }\n    layerWeightList.Add(neuronWeights);\n}\n```\n\n添加随机权重后的更新代码如下所示。\n\
    \n```\nusing System.Collections.Generic;\nusing System;\n\npublic class NeuralNetwork\n\
    {\n    private int[] layers;\n    private float[][] neurons;\n    private float[][][]\
    \ weights;\n    private Random random;\n\n    public NeuralNetwork(int[] layers)\n\
    \    {\n        this.layers = new int[layers.Length];\n        for(int i = 0;\
    \ i < layers.Length; i++)\n        {\n            this.layers[i] = layers[i];\n\
    \        }\n        random = new Random(System.DateTime.Today.Millisecond);\n\
    \        InitNeurons();\n        InitWeights();\n    }\n\n    private void InitNeurons()\n\
    \    {\n        List<float[]> neuronsList = new List<float[]>();\n        for\
    \ (int i = 0; i < layers.Length; i++)\n        {\n            neuronsList.Add(new\
    \ float[layers[i]]);\n        }\n        neurons = neuronsList.ToArray();\n  \
    \  }\n\n    private void InitWeights()\n    {\n        List<float[][]> weightsList\
    \ = new List<float[][]>();\n        for (int i = 1; i < layers.Length; i++)\n\
    \        {\n            List<float[]> layerWeightList = new List<float[]>();\n\
    \            int neuronsInPreviousLayer = layers[i - 1];\n            for (int\
    \ j = 0; j < neurons[i].Length; j++)\n            {\n                float[] neuronWeights\
    \ = new float[neuronsInPreviousLayer];\n                for (int k = 0; k < neuronsInPreviousLayer;\
    \ k++)\n                {\n                    neuronWeights[k] = (float)random.NextDouble()\
    \ - 0.5f;\n                }\n                layerWeightList.Add(neuronWeights);\n\
    \            }\n        }\n    }\n}\n```\n\n现在我们将`layerWeights`转换为二维交错数组，并将其添加到我们的权重列表中。\n\
    \n```\nweightsList.Add(layerWeightList.ToArray());\n```\n\n我们将再次转换为三维权重数组。\n\n\
    ```\nweight = weightsList.ToArray();\n```\n\n## 前馈网络\n\n在本节中，我们将了解如何应用前馈网络。\n\n\
    现在我们将为神经网络编写一个前馈方法。我们将遍历输入，并将输入的内容添加到网络的第一层。\n\n```\nfor (int i = 0; i < inputs.Length;\
    \ i++)\n{\n    neurons[0][i] = inputs[i];\n}\n```\n\n现在我们从第二层开始，遍历每一层。接着我们将遍历这一层中的每一个神经元。\n\
    \n```\nfor (int i = 1; i < layers.Length; i++)\n{\n    for (int j = 0; j < neurons[i].Length;\
    \ j++)\n    {\n\n    }\n}\n```\n\n我们赋予一个值为`0.25f`的常量偏置；该值需要根据我们将要遍历的神经元值计算得出。\n\
    \n```\nfloat value = 0.25f;\n```\n\n当我们计算权重值时，它比当前层少一个维度，即`weights[i-1][j][k]`（第`i-1`层第`j`个神经元的第`k`个权重），并与前一层神经元的值相乘。\n\
    \n```\nvalue += weights[i-1][j][k] * neurons[i-1][k];\n```\n\n在对其应用激活函数后，我们需要将值传回。\n\
    \n```\nneurons[i][j] = (float)Math.Tanh(value);\n```\n\n现在返回激活后的结果。\n\n```\nreturn\
    \ neurons[neurons.Length - 1];\n```\n\n我们将添加一个`Mutate`方法，该方法会遍历权重矩阵中的所有值，并根据概率对其进行变异。\n\
    \n```\nfloat randomNumber = (float)random.NextDouble() * 1000f;\n```\n\n我们将根据概率对权重应用四种不同类型的变异。\n\
    \n```\nif (randomNumber <= 2f)\n{\n    weight *= -1f;\n}\nelse if (randomNumber\
    \ <= 4f)\n{\n    weight = UnityEngine.Random.Range(-0.5f, 0.5f);\n}\nelse if (randomNumber\
    \ <= 6f)\n{\n    float factor = UnityEngine.Random.Range(0f, 1f) + 1f;\n}\nelse\
    \ if (randomNumber <= 8f)\n{\n    float factor = UnityEngine.Random.Range(0f,\
    \ 1f);\n    weight *= factor;\n}\n```\n\n`Mutate`方法如下所示。\n\n```\npublic void Mutate()\n\
    {\n    for (int i = 0; i < weights.Length; i++)\n    {\n        for (int j = 0;\
    \ j < weights[i].Length; j++)\n        {\n            float weight = weights[i][j][k];\n\
    \            float randomNumber = (float)random.NextDouble() * 1000f;\n      \
    \  }\n    }\n}\n```\n"
- fmt: "```csharp\nif (randomNumber <= 2f)\n{\n    weight *= -1f;\n}\nelse if (randomNumber\
    \ <= 4f)\n{\n    weight = UnityEngine.Random.Range(-0.5f, 0.5f);\n}\nelse if (randomNumber\
    \ <= 6f)\n{\n    float factor = UnityEngine.Random.Range(0f, 1f) + 1f;\n}\nelse\
    \ if (randomNumber <= 8f)\n{\n    float factor = UnityEngine.Range(0f, 1f);\n\
    \    weight *= factor;\n}\nweights[i][j][k] = weight;\n```\n\nNow we will do a\
    \ deep copy of the network.\n\n```csharp\npublic NeuralNetwork(NeuralNetwork copyNetwork)\n\
    {\n    this.layers = new int[copyNetwork.layers.Length];\n    for (int i = 0;\
    \ i < copyNetwork.layers.Length; i++)\n    {\n        this.layers[i] = copyNetwork.layers[i];\n\
    \    }\n    InitNeurons();\n    InitWeights();\n    CopyWeights(copyNetwork.layers);\n\
    }\n```\n\nWe will add a method called `CopyWeights`.\n\n```csharp\nprivate void\
    \ CopyWeights(float[][][] CopyWeights)\n{\n    for (int i = 0; i < weights.Length;\
    \ i++)\n    {\n        for (int j = 0; j < weights[i].Length; j++)\n        {\n\
    \            for (int k = 0; k < weights[i][j].Length; k++)\n            {\n \
    \               weights[i][j][k] = CopyWeights[i][j][k];\n            }\n    \
    \    }\n    }\n}\n```\n\nThe following is the complete code.\n\n```csharp\nusing\
    \ System.Collections.Generic;\nusing System;\n\n/// <summary>\n/// Neural Network\
    \ C# (Unsupervised)\n/// </summary>\npublic class NeuralNetwork : IComparable<NeuralNetwork>\n\
    {\n    private int[] layers; //layers\n    private float[][] neurons; //neuron\
    \ matix\n    private float[][][] weights; //weight matrix\n    private float fitness;\
    \ //fitness of the network\n\n    /// <summary>\n    /// Initilizes and neural\
    \ network with random weights\n    /// </summary>\n    /// <param name=\"layers\"\
    >layers to the neural network</param>\n    public NeuralNetwork(int[] layers)\n\
    \    {\n        //deep copy of layers of this network\n        this.layers = new\
