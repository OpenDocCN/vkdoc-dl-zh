    **CHAPTER 1**


    **Neural Network**


    **Basics**


    The evolvement of artificial intelligence, machine learning, and deep


    learning has made so many people start asking questions about what


    exactly the process of machine learning actually is?


    We found that data scientists, enthusiasts, and developers are


    very curious to learn how a neural network works for helping artificial intelligence
    to perform better.


    In this chapter, we will look at the neural network as a whole and touch on some
    common terminologies associated with it. The chapter starts


    with an explanation of neural networks. Then, we move along to defining what exactly
    a perceptron is, with a brief introduction to it. Further, we will compare a single-layer
    neural network with a multilayer neural network, emphasizing the structure of
    the neural network.


    In the subsequent section, we will look at the various activation


    functions available. Next, we will define bias and weight and describe why they
    are useful. In the next section, we will touch on a neural network example.


    In the last section, we will look at how to traverse a neural network.


    We will cover backpropagation and touch on forward propagation and


    feedforward neural networks.


